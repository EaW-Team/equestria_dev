### Leader descs
JUN_doctor_desc:0 "§YБиография§!: Родившийся в Пуэрто-Кабальо доктор Кабальерон не просто злодей из книжек, а более чем реальная личность. Его появление на юго-востоке стало куда более абсурдным поворотом событий, чем любой сюжет из книг Дэринг Ду. Вооружённый докторской степенью по археологии, глубокой страстью к древним культурам и небольшой частной армией, профинансированной годами... весьма энергичного присвоения реликвий, доктор высадился в Солтмейне в тот момент, когда Эквестрия разрывала саму себя на части. Его действия были весьма прямолинейны – он просто пошёл в лоб и изгнал лунаристские гарнизоны, после укрепляя собственную власть сочетанием непревзойдённой харизмы, лёгкого принуждения и обезоруживающей дерзости.\n\nДля внешнего мира он – злодей из романов Дэринг Ду, расхититель гробниц и самоназванный военачальник. В Теночтитлане же картина куда сложнее. Местные вожди, стоявшие перед лицом неминуемого угнетения со стороны найтмеристских гарнизонов, увидели в нём шанс на выживание. Сам Кабальерон, в свою очередь, с обезоруживающей улыбкой и небрежным взмахом копыта отмахивается от некоторых слухов о своём прошлом, всегда ловко уводя разговор в сторону. Даже его ближайшие союзники порой ловят себя на вопросе, а чего же на самом деле хочет Доктор?"
JUN_nice_doctor_desc:0 "§YБиография§!: Родившийся в Пуэрто-Кабальо, очарованный культурами, языками и историей юго-восточной Эквестрии Кабальерон с юных лет изучал искусство археологии. Чтобы финансировать свои исследования, он продавал найденные артефакты, и порой его покупателями были весьма сомнительные личности. В конечном итоге это себя оправдало: несмотря на постоянные попытки его заклятой соперницы, Дэринг Ду, вмешаться и спасти реликвии до их продажи, он сумел получить докторскую степень.\n\nПосле основания государства Ацтлан на юго-востоке Кабальерон приложил немало усилий для создания свободной федерации, в которой гарантированы права каждого пони. Несмотря на своё прошлое, он проявил себя как честный правитель, искренне заботящийся о местных жителях. Тем самым он заслужил доверие Эквестрии... к великому неудовольствию Дэринг Ду."
JUN_resistance_doctor_desc:0 "§YБиография§!: У судьбы, похоже, крайне отвратительное чувство юмора. Ацтлан задумывался как небольшая и простая авантюра – быстрый способ заработать перед уходом на беззаботную пенсию в благополучных краях. Теперь же, когда весь север поглотило безумие, Кабальерон, стиснув зубы, превратил свою федерацию в последний оплот здравомыслия на континенте. Тяжесть ответственности оставляет всё новые морщины на лице уи-тлатоани, даже когда он улыбается, заключая сделки и дёргая за каждую возможную нитку, готовя регион к тому, что может последовать дальше.\n\nКогда-то Кабальерон был заурядным проходимцем, строившим схемы ради быстрой наживы. Теперь же бывший злодей планирует сделать нечто куда более безумное, чем все его прежние планы и интрижки. Шансы ничтожны, а цена провала ужасающа. Но Кабальерону не привыкать к нулевым шансам и олл-инам, особенно когда судьба всего Эквуса встала на кон в его величайшей и опаснейшей игре в жизни."
JUN_loyal_doctor_desc:0 "§YБиография§!: Вопреки всем ожиданиям, авантюра доктора Кабальерона завершилась оглушительным успехом. Регион, некогда являющийся одним сплошным кровавым полем битвы, теперь един под властью его федерации – суверенного, стабильного и поразительно процветающего государства. Из своего кабинета в Теночтитлане недавно провозглашённый "уи-тлатоани" Кабальерон направляет то, что многие называют настоящей эпохой возрождения. Нейуа, тенаньотли, а также существа всех видов обладают равными правами под его знаменем. Торговля процветает, а бесчисленные праздники прославляют культурное многообразие региона.\n\nЗа рубежом критики всё ещё могут шептаться о его прошлом, но внутри границ Ацтлана к таким разговорам относятся с недоумением. Сам Кабальерон выглядит скорее уставшим, но вполне довольным управляющим, куда больше озабоченным бюджетами и доходами, чем какими-либо "злодейскими планами". Из хаоса он создал жизнеспособный, прибыльный и мирный уголок Эквуса. Было ли это альтруизмом, эгоистичными абмициями или величайшей авантюрой в его жизни, уже не важно, ведь результат один и тот же: Доктор, вопреки всем историям из книг Дэринг Ду, оказался тем, кто действительно сдержал свои обещания."


### Advisor Descriptions
JUN_rat_horse_desc:0 "Свит Уотер, кобылка, с детства желавшая приключений и исследований, росла без особого присмотра, занимаясь чем угодно в своё удовольствие. Она не избегала ни болот, ни джунглей, ни пустынь. Свит Уотер был по плечу любой климат, ведь кобыла не боялась запачкаться в грязи, поэтому её с удовольствием брали к себе компании приключенцев и отряды исследователей.\n\nДостигнув совершеннолетия, она завербовалась во вспомогательный отряд лунной стражи, впрочем, отслужив там совсем небольшой срок, она заскучала, поскольку в гвардии для неё не находилось других занятий, кроме патрулирования мощёных улиц и больших залов. Сразу после того как срок её службы истёк, она отправилась на юг, чтобы продолжить свои приключения. Когда однажды с ней связался печально известный Кабальерон и предложил высокооплачиваемую работу – проводить пони и отряды ополченцев через джунгли – она не раздумывая согласилась.\n\nЭта маленькая болотная лиса и крыса джунглей обучит пони под своим командованием, проведёт их через густые и грязные заросли и превратит в грозную силу, что будет непобедимой в джунглях. Но в процессе всем придётся испачкаться в грязи. Очень и очень сильно."
JUN_merc_pone_desc:0 "§YДата рождения§!: 22 декабря 984 года в Тоналцинтли\n\n§YБиография§!: Джангл Трек родился в джунглях, вдали от густонаселённых прибрежных городов юго-востока, и его детство не было типичным для эквестрийца. Школы были слишком далеко, поэтому отец делал всё возможное, чтобы обучить Джангла самому. И хотя тот быстро освоил основные предметы вроде математики, физики и истории, жеребёнка больше интересовало исследование окружающего мира и джунглей. Джангл всегда хотел повидать свет, но вместе с этим он глубоко ценил окружающую его нетронутую природу.\n\nДостигнув совершеннолетия, Джангл отправился на поиски своего собственного пути в жизни, поэтому он присоединился в качестве приспешника к группе доктора Кабальерона, а затем окончательно вошёл в ряды странствующих наёмников. Его харизма и природное мастерство в бою снискали уважение многих коллег, а среди отряда шутили, что Джангл мог бы убедить саму принцессу Селестию выйти за него замуж, если бы ему представилась такая возможность. Когда предыдущий капитан в итоге погиб в бою, Джангл был принят большинством в роли его преемника и нового лидера отряда.\n\nСтав капитаном, Джангл вскоре получил сообщение от своего бывшего работодателя с предложением принять участие в боевых действиях на стороне недавно провозгласившего независимость Ацтлана. Он быстро согласился, причём не только из-за денег или преданности доктору, но и чтобы вернуться на родину. Моральные принципы Джангла весьма строги (хотя его иногда может ослепить блеск золота или сбить с пути забота о подчинённых) и он готов сражаться под новым флагом за страну, которую он вскоре сможет по-настоящему назвать своим домом.\n\n§YАвтор портрета§!: Rari"

JUN_light_narrative_desc:0 "Будучи автором множества статей для популярных газет Эквестрии, таких как Балтимейр Таймз, Эквестрия Дейли, Мейнхеттен Трибунал и даже Кантерлотский Осведомитель, Лайт Нарратив прославился в журналистских кругах Эквестрии, публикуя спорные, но при этом неопровержимо достоверные материалы о правах фестралов. Однако несмотря на самые благие намерения, постоянная смена мест работы стала следствием предвзятости подавляющей части населения Эквестрии к фестралам.\n\nПосле очередного увольнения Лайт Нарратив отправился на юго-восток Эквестрии, чтобы исследовать тему загадочных коренных племён, обитающих в местных джунглях. Однако его расследование было прервано гражданской войной, что, впрочем, ничуть не помешало публикационной деятельности, особенно когда он встал на сторону фестралов, освещая их успехи.\n\nВо время пребывания в гарнизоне в качестве одного из немногих допущенных журналистов Лайт на собственном опыте узнал, что именно на самом деле значит быть найтмеристом, и насколько он оказался не готов к этой реальности. Зайдя слишком далеко, чтобы без лишних проблем выйти из игры, он смирился со своей судьбой – быть одним из множества безмолвных фестралов, подчинённых Найтмер, живым подтверждением всех тех предрассудков и предвзятости, с которыми он сталкивался в Эквестрии.\n\nНо судьба распорядилась иначе. Гарнизон пал в битве, из которой победителем вышло только одно государство – Ацтлан. Для его соратников это означало либо окончательную капитуляцию, либо же партизанскую войну. Для Лайта же это стало той самой возможностью.\n\nЛайт привлёк внимание уи-тлатоани, спася тому жизнь, и таким образом оказался вторым по влиянию жеребцом на всём юго-востоке, вознесясь до роли Сиуакоатля. Само это казалось абсурдным – одно действие, приведшее к столь стремительному взлёту. Но Лайт полон решимости превратить своё новое влияние в инструмент. Он сделает так, чтобы голоса фестралов были услышаны."

JUN_light_narrative_ally_desc:0 "Будучи автором множества статей для популярных газет Эквестрии, таких как Балтимейр Таймз, Эквестрия Дейли, Мейнхеттен Трибунал и даже Кантерлотский Осведомитель, Лайт Нарратив прославился в журналистских кругах Эквестрии, публикуя спорные, но при этом неопровержимо достоверные материалы о правах фестралов. Однако несмотря на самые благие намерения, постоянная смена мест работы стала следствием предвзятости подавляющей части населения Эквестрии к фестралам.\n\nПосле очередного увольнения Лайт Нарратив отправился на юго-восток Эквестрии, чтобы исследовать тему загадочных коренных племён, обитающих в местных джунглях. Однако его расследование было прервано гражданской войной, что, впрочем, ничуть не помешало публикационной деятельности, особенно когда он встал на сторону фестралов, освещая их успехи.\n\nВо время пребывания в гарнизоне в качестве одного из немногих допущенных журналистов Лайт на собственном опыте узнал, что именно на самом деле значит быть найтмеристом, и насколько он оказался не готов к этой реальности. Зайдя слишком далеко, чтобы без лишних проблем выйти из игры, он смирился со своей судьбой – быть одним из множества безмолвных фестралов, подчинённых Найтмер, живым подтверждением всех тех предрассудков и предвзятости, с которыми он сталкивался в Эквестрии.\n\nНо судьба распорядилась иначе. Гарнизон пал в битве, из которой победителем вышло только одно государство – Ацтлан. Для его соратников это означало либо окончательную капитуляцию, либо же партизанскую войну. Для Лайта же это стало той самой возможностью.\n\nРаботая бок о бок с Кабальероном над защитой прав бэтпони, долгое время находившихся в изоляции, он способствовал достижению своей политической цели – сделать так, чтобы фестралы были услышаны. Помимо этого, Лайт Нарратив активно боролся за права всех существ, которые обычно не попадали на первые строки газет, что принесло ему поддержку и множество друзей. Когда Кабальерон ушёл в отставку, не было никаких сомнений в том, кто победит на выборах. Теперь, как уи-тлатоани, он продолжит работать над достижением своей цели – создания равного юго-востока для всех."

JUN_light_narrative_resistance_desc:0 "Будучи автором множества статей для популярных газет Эквестрии, таких как Балтимейр Таймз, Эквестрия Дейли, Мейнхеттен Трибунал и даже Кантерлотский Осведомитель, Лайт Нарратив прославился в журналистских кругах Эквестрии, публикуя спорные, но при этом неопровержимо достоверные материалы о правах фестралов. Однако несмотря на самые благие намерения, постоянная смена мест работы стала следствием предвзятости подавляющей части населения Эквестрии к фестралам.\n\nПосле очередного увольнения Лайт Нарратив отправился на юго-восток Эквестрии, чтобы исследовать тему загадочных коренных племён, обитающих в местных джунглях. Однако его расследование было прервано гражданской войной, что, впрочем, ничуть не помешало публикационной деятельности, особенно когда он встал на сторону фестралов, освещая их успехи.\n\nВо время пребывания в гарнизоне в качестве одного из немногих допущенных журналистов Лайт на собственном опыте узнал, что именно на самом деле значит быть найтмеристом, и насколько он оказался не готов к этой реальности. Зайдя слишком далеко, чтобы без лишних проблем выйти из игры, он смирился со своей судьбой – быть одним из множества безмолвных фестралов, подчинённых Найтмер, живым подтверждением всех тех предрассудков и предвзятости, с которыми он сталкивался в Эквестрии.\n\nНо судьба распорядилась иначе. Гарнизон пал в битве, из которой победителем вышло только одно государство – Ацтлан. Для его соратников это означало либо окончательную капитуляцию, либо же партизанскую войну. Для Лайта же это стало той самой возможностью.\n\nРаботая бок о бок с Кабальероном над защитой прав бэтпони, долгое время находившихся в изоляции, он способствовал достижению своей политической цели – сделать так, чтобы фестралы были услышаны. Помимо этого, Лайт Нарратив активно боролся за права всех существ, которые обычно не попадали на первые строки газет, что принесло ему поддержку и множество друзей. Когда Кабальерон ушёл в отставку, связи, знакомства и полученное уважение сыграли решающую роль, а масштабная пиар-кампания закрепила успех. Теперь, в роли уи-тлатоани, Лайт Нарратив продолжит работать над достижением своей цели – создания равного Эквуса для всех."

JUN_word_bearer_desc:0 "§YДата рождения§!: 21 декабря 980 года, Аякачтли\n\n§YБиография§!: С юных лет Ворд Бирер интересовался теологией тенаньотлей. Он мечтал стать одним из говорящих-с-луной, воспринимая это как обряд собственного становления, чтобы следовать собственной мечте о том, как он поведёт свой народ к новому славному будущему, за которое Найтмер Мун сражалась для них тысячелетие назад. Однако когда его отвергли из-за ярой веры в то, что Найтмер Мун – истинная богиня ночи, он пришёл в ярость. С злобой и пылом он начал проповедовать против того, что считал разложением элит Аякачтли, обрекающих крупнейшее племя фестралов на вечное страдание под господством солнцелюбов. В конце концов он покинул город и отправился странствовать по землям племён фестралов, распространяя свои убеждения среди всех, кто был готов его слушать.\n\nОднако, к потрясению многих найтмеристов, Найтмер Мун была повержена не один раз, а дважды. Для большинства это стало кризисом веры. Но Ворд Бирер, туземный проповедник Найтмер Мун, остался непреклонен. Несмотря на подавление своей богини, он продолжал распространять фанатичные проповеди, объявляя Её регрессию внутри Луны доказательством растущей силы. В последующие годы он писал псалмы и молитвы, посвящённые Найтмер Мун, надеясь подготовить своих собратьев-фестралов к тому моменту, если... нет, когда Она вернётся вновь. И Она действительно вернулась.\n\nИ всё же силы Найтмер Мун потерпели поражение на Юго-Востоке. Впрочем, когда Лайт Нарратив занял пост Сиуакаоатля, найтмеристский проповедник осознал, что на самом деле эта победа могла быть предначертана самой Найтмер Мун. Работа с правительством во благо фестралов лучше всего доказывает, что Кабальерон в действительности был послан и действует с благословения Найтмер Мун. Ну или так утверждает его последняя теологическая работа.\n\n§YПортрет нарисован§!: Aquamuro"

JUN_crescent_glow_desc:0 "§YДата рождения§!: 9 августа 978 года, Аякачтли, Эквестрия\n\n§YБиография§!: С самых ранних лет Кресент Глоу любила принцессу Луну. Рассказы о её доброте и красоте завораживали юную кобылку, и поэтому она, как и многие другие фестралы, стремилась посвятить свою жизнь Принцессе Ночи. К несчастью для неё, прошедшее с момента изгнания Найтмер Мун тысячелетие значительно исказило образ Луны в глазах многих пони, и Кресент пришла в ужас, когда узнала, что Ночная Стража в Кантерлоте – всего лишь церемониальная роль, нередко подвергаемая насмешкам.\n\nТем не менее, Кресент отказывалась сдаваться. Она вознамерилась получить образование в Кантерлотском Университете, а затем, в день её выпуска, произошло нечто удивительное: принцесса Селестия объявила о возвращении своей любимой сестры, и Кресент даже смогла лично увидеть её. Радость, которую вызвало у Кресент возвращение принцессы Луны, уступала лишь её желанию исправить плачевное положение Ночной Стражи. Фестралка быстро вступила в эквестрийскую армию и благодаря своей целеустремлённости превзошла всех сверстников в офицерской школе.\n\nУвы, судьба жестока. Принцесса Луна вновь обратилась в Найтмер Мун, что стало для Кресент сокрушительным ударом. Получив командование частью вооружённых сил Лунной империи, она и многие другие единомышленники дезертировали, чтобы сражаться во имя гармонии. Ведь именно этого, как они верили, желала бы сама принцесса Луна.\n\nОднако и этой цели Кресент так и не смогла добиться. Селестийское сопротивление потерпело поражение, её друзья рассеялись по миру, а сама она оказалась в землях, отвергших и гармонию, и Эквестрию... но не её. Родное племя приняло Кресент с распростёртыми копытами, и она обрела некоторое подобие покоя. Однако вскоре получила крайне неожиданный призыв – фестрал по имени Лайт Нарратив был возведён в сан сиуакаоатля и решил обратиться за помощью к Кресент, надеясь восстановить сожжённые мосты. Это была не та судьба, о которой она мечтала, но терять что-либо ещё фестралка не желала и потому приняла предложение. Ей оставалось лишь надеяться, что принцесса Луна всё ещё рядом и наблюдает за тем, как она помогает создавать лучшее будущее...\n\n§YПортрет нарисован§!: Egil"
JUN_crescent_glow_alt_desc:0 "§YДата рождения§!: 9 августа 978 года, Аякачтли, Эквестрия\n\n§YБиография§!: С самых ранних лет Кресент Глоу любила принцессу Луну. Рассказы о её доброте и красоте завораживали юную кобылку, и поэтому она, как и многие другие фестралы, стремилась посвятить свою жизнь Принцессе Ночи. К несчастью для неё, прошедшее с момента изгнания Найтмер Мун тысячелетие значительно исказило образ Луны в глазах многих пони, и Кресент пришла в ужас, когда узнала, что Ночная Стража в Кантерлоте – всего лишь церемониальная роль, нередко подвергаемая насмешкам.\n\nТем не менее, Кресент отказывалась сдаваться. Она вознамерилась получить образование в Кантерлотском Университете, а затем, в день её выпуска, произошло нечто удивительное: принцесса Селестия объявила о возвращении своей любимой сестры, и Кресент даже смогла лично увидеть её. Радость, которую вызвало у Кресент возвращение принцессы Луны, уступала лишь её желанию исправить плачевное положение Ночной Стражи. Фестралка быстро вступила в эквестрийскую армию и благодаря своей целеустремлённости превзошла всех сверстников в офицерской школе.\n\nУвы, судьба жестока. Принцесса Луна вновь обратилась в Найтмер Мун, что стало для Кресент сокрушительным ударом. Получив командование частью вооружённых сил Лунной империи, она и многие другие единомышленники дезертировали, чтобы сражаться во имя гармонии. Ведь именно этого, как они верили, желала бы сама принцесса Луна.\n\nОднако и этой цели Кресент так и не смогла добиться. Селестийское сопротивление потерпело поражение, её друзья рассеялись по миру, а сама она оказалась в землях, отвергших и гармонию, и Эквестрию... но не её. Родное племя приняло Кресент с распростёртыми копытами, и она обрела некоторое подобие покоя. Однако вскоре получила крайне неожиданный призыв – её бывший друг и союзник вождь Майта был возведён в сан сиуакаоатля и решил обратиться за помощью к Кресент, надеясь восстановить сожжённые мосты. Это была не та судьба, о которой она мечтала, но терять что-либо ещё фестралка не желала и потому приняла предложение. Ей оставалось лишь надеяться, что принцесса Луна всё ещё рядом и наблюдает за тем, как она помогает создавать лучшее будущее...\n\n§YПортрет нарисован§!: Egil"
JUN_crescent_glow_vp:0 "§YДата рождения§!: 9 августа 978 года, Аякачтли, Эквестрия\n\n§YБиография§!: С самых ранних лет Кресент Глоу любила принцессу Луну. Рассказы о её доброте и красоте завораживали юную кобылку, и поэтому она, как и многие другие фестралы, стремилась посвятить свою жизнь Принцессе Ночи. К несчастью для неё, прошедшее с момента изгнания Найтмер Мун тысячелетие значительно исказило образ Луны в глазах многих пони, и Кресент пришла в ужас, когда узнала, что Ночная Стража в Кантерлоте – всего лишь церемониальная роль, нередко подвергаемая насмешкам.\n\nТем не менее, Кресент отказывалась сдаваться. Она вознамерилась получить образование в Кантерлотском Университете, а затем, в день её выпуска, произошло нечто удивительное: принцесса Селестия объявила о возвращении своей любимой сестры, и Кресент даже смогла лично увидеть её. Радость, которую вызвало у Кресент возвращение принцессы Луны, уступала лишь её желанию исправить плачевное положение Ночной Стражи. Фестралка быстро вступила в эквестрийскую армию и благодаря своей целеустремлённости превзошла всех сверстников в офицерской школе.\n\nУвы, судьба жестока. Принцесса Луна вновь обратилась в Найтмер Мун, что стало для Кресент сокрушительным ударом. Получив командование частью вооружённых сил Лунной империи, она и многие другие единомышленники дезертировали, чтобы сражаться во имя гармонии. Ведь именно этого, как они верили, желала бы сама принцесса Луна.\n\nОднако и этой цели Кресент так и не смогла добиться. Впрочем, вопреки всем возможным прогнозам страна [Root.Getname] стала землёй равенства для всех существ, в которой пони и фестралы могут жить вместе в гармонии. Когда Майта был избран в качестве уи-тлатоани, Кресент стала ожидаемым выбором в качестве ближайшей советницы. Они показали всей нации, что даже старые враги могут стать друзьями, а гармония возобладать над распрями. Пример Майты и Кресент Глоу вдохновлял оба племени стать лучше. Несомненно, принцесса Луна была бы горда ей.\n\n§YПортрет нарисован§!: Egil"
JUN_crescent_glow_vp_libertarian_sunset:0 "§YДата рождения§!: 9 августа 978 года, Аякачтли, Эквестрия\n\n§YБиография§!: С самых ранних лет Кресент Глоу любила принцессу Луну. Рассказы о её доброте и красоте завораживали юную кобылку, и поэтому она, как и многие другие фестралы, стремилась посвятить свою жизнь Принцессе Ночи. К несчастью для неё, прошедшее с момента изгнания Найтмер Мун тысячелетие значительно исказило образ Луны в глазах многих пони, и Кресент пришла в ужас, когда узнала, что Ночная Стража в Кантерлоте – всего лишь церемониальная роль, нередко подвергаемая насмешкам.\n\nТем не менее, Кресент отказывалась сдаваться. Она вознамерилась получить образование в Кантерлотском Университете, а затем, в день её выпуска, произошло нечто удивительное: принцесса Селестия объявила о возвращении своей любимой сестры, и Кресент даже смогла лично увидеть её. Радость, которую вызвало у Кресент возвращение принцессы Луны, уступала лишь её желанию исправить плачевное положение Ночной Стражи. Фестралка быстро вступила в эквестрийскую армию и благодаря своей целеустремлённости превзошла всех сверстников в офицерской школе.\n\nУвы, судьба жестока. Принцесса Луна вновь обратилась в Найтмер Мун, что стало для Кресент сокрушительным ударом. Получив командование частью вооружённых сил Лунной империи, она и многие другие единомышленники дезертировали, чтобы сражаться во имя гармонии. Ведь именно этого, как они верили, желала бы сама принцесса Луна.\n\nНедавно её внутренний мирок сотрясла неожиданная новость. Не  только гармония вернулась в Эквестрию, но и известная героиня, а также ученица самой Селестии вернулась в родные земли. Во время предвыборной кампании Сансет Шиммер и Кресент неожиданно поладили между собой, а когда первая победила на самих выборах, то ко всеобщему удивлению выбрала в качестве сиуакаоатля бывшую лунаристку-фестралку. Теперь Кресент Глоу трудится ещё уседрнее, чтобы на этот раз память о принцессе Луне никогда не была утеряна.\n\n§YПотрет нарисован§!: Egil"

JUN_chief_maita_desc:0 "§YДата рождения§!: 31 марта 959 года, Теночтитлан, Эквестрия\n\n§YБиография§!: В юности Майта был известным авантюристом, но со временем смирился со своей ролью вождя, поскольку «Скрытое племя Солнца и Луны», к которому он принадлежал, стремилось отделиться от нейуа. Майта потратил немало времени и сил, пытаясь удержать жаждущих крови радикалов. Однако полного успеха он не добился: некоторые пони так и не отказались от древних традиций, надеясь вновь открыто исповедовать свои жестокие верования. К тому же усилиям Майты постоянно мешал таинственный Ауизотль, нашёптывавший пони обещания начала некоего «нового цикла».\n\nТем не менее, харизма и лёгкий характер Майты сотворили чудеса и позволили убедить большинство членов племени отказаться от кровавых ритуалов. Увы, Гражданская война принесла множество проблем и испытаний как его племени, так и остальным нейуа, и в итоге им пришлось обратиться за помощью к Дэринг Ду.\n\nПоражение Селестийского сопротивления стало переломным моментом для юго-востока. После того как все друзья разбрелись по свету, Майта решил вернуться домой и окончательно отойти от дел. Однако так называемый доктор Кабальерон, похоже, обладал куда более масштабными планами, обратившись к Майте и его племени как к единственным нейуа, ещё не проникшимся к нему доверием. Поначалу Майта опасался подозрительного иноземца, но обещания Кабальерона оставить после его племя в покое развеяли сомнения.\n\nТеперь, занимая должность сиуакаоатля, Майта в основном помогает уи-тлатоани по мере необходимости, чаще всего выступая связующим звеном с племенами и сглаживая переговоры своей успокаивающей манерой общения. Его вполне устраивает небольшой поток работы, позволявший уставшему вождю проводить дни в уюте собственного дома. Ну или же иногда спокойно помогать своему уи-тлатоани в моменты напряжения."
JUN_chief_maita_alt_desc:0 "§YДата рождения§!: 31 марта 959 года, Теночтитлан, Эквестрия\n\n§YБиография§!: В юности Майта был известным авантюристом, но со временем смирился со своей ролью вождя, поскольку «Скрытое племя Солнца и Луны», к которому он принадлежал, стремилось отделиться от нейуа. Майта потратил немало времени и сил, пытаясь удержать жаждущих крови радикалов. Однако полного успеха он не добился: некоторые пони так и не отказались от древних традиций, надеясь вновь открыто исповедовать свои жестокие верования. К тому же усилиям Майты постоянно мешал таинственный Ауизотль, нашёптывавший пони обещания начала некоего «нового цикла».\n\nТем не менее, харизма и лёгкий характер Майты сотворили чудеса и позволили убедить большинство членов племени отказаться от кровавых ритуалов. Увы, Гражданская война принесла множество проблем и испытаний как его племени, так и остальным нейуа, и в итоге им пришлось обратиться за помощью к Дэринг Ду.\n\nКогда уи-тлатоани Кабальерон оставил свой пост, ни у кого не было сомнений кто станет следующим лидером страны [Root.Getname]. Вождь Майта, несмотря на своё желание просто наслаждаться долгожданным отдыхом, теперь стал возглавлять целую страну. Будучи лидером, его успокаивающая и открытая манера речи продолжает помогать каждому, несмотря на весь стресс, который испытывает глава нации. Однако благодаря поддержке верных друзей уи-тлатоани готов к любым испытаниям, которое готовит будущее."

JUN_golden_delicious_desc:0 "Голден Делишес, также известный как Товарищ Делишес в рядах своих ополченцев, является членом синдикалистской организации ОП(р) и военным командиром. Как член большой семьи Эппл, он всю жизнь прожил в Балтимейре, работая в его доках перевозчиком грузов, полных яблок. Плохие условия труда побудили его вступить в профсоюз, и вскоре он стал активным политиком, выступая за улучшение прав рабочего класса Эквестрии. По слухам, он прошёл подготовку в рамках иностранной секретной военной программы, а во время существования республики Балтимейра исполнял обязанности её временного лидера.\n\nПоражение республики стало суровым уроком реальной политики. Революция потерпела крах при самых абсурдных обстоятельствах, оказавшись в подчинении у вымышленного персонажа, сошедшего со страниц книжек в реальность. Для его товарищей это было сродни абсолютному хаосу, но Голден стиснул зубы и был готов сделать всё необходимое, чтобы обеспечить безопасность друзей и соратников.\n\nУвидев возможность защитить своих единомышленников, он принял предложение Кабальерона занять должность сиуакаоатля. Теперь, действуя в самом сердце правительства Ацтлана, он проводит дни, балансируя на тонкой грани: ведёт переговоры о правах рабочих, сдерживает радикальные порывы своих старых профсоюзов и пристально следит за тем, чтобы уи-тлатоани оставался верен их соглашению.\n\nРеволюция, возможно, была отложена, но пока остаётся Голден, её призрак всегда бродит где-то неподалёку. Лишь время покажет, устоит ли этот хрупкий статус-кво."
JUN_golden_delicious_ally_desc:0 "Голден справился. Он выжил, когда пал Балтимейр, завёл новые связи и сохранил старые, а теперь вознёсся на высшую должность Ацтлана. Самый влиятельный голос левых унаследовал систему, внутри которой он сам проработал долгие годы. Сотрудничая с ним, Кабальерон дал внимание и власть, необходимые для подъёма. Революция наконец-то пришла на юго-восток... по крайней мере, таков был план.\n\nПартнёрство задумывалось как временная мера; всего лишь средство для достижения цели. Однако в какой-то момент под тщательно выстроенным образом Голден увидел неожиданную... заботу. Он не мог не разглядеть истинную сущность доктора – несовершенного, но искренне желающего поступать как можно лучше жеребца. Того, кто во время своего правления относился по справедливости к рабочим и жителям юго-востока. Того, кто, не будучи революционером, прислушивался к советам Голдена и поддерживал его инициативы, не допуская серьёзных конфликтов между ними.\n\nМечты Голдена о революции теперь вступили в прямое противоречие с его долгом перед федерацией, в формировании которой он сам участвовал как сиуакаоатль. В его распоряжении есть все инструменты, чтобы привести революцию через избирательные урны, однако мятежный разум мешает ему действовать, пока ожидания каждого существа Ацтлана лишь растут. Каждое решение становится очередным испытанием – сохранит ли своё наследие или же предаст его. Лишь время определит судьбу федерации."
JUN_golden_delicious_revolution_desc:0 "Голден Делишес, также известный как Товарищ Делишес в рядах своих ополченцев, является членом синдикалистской организации ОП(р) и военным командиром. Как член большой семьи Эппл, он всю жизнь прожил в Балтимейре, работая в его доках перевозчиком грузов, полных яблок. Плохие условия труда побудили его вступить в профсоюз, и вскоре он стал активным политиком, выступая за улучшение прав рабочего класса Эквестрии. По слухам, он прошёл подготовку в рамках иностранной секретной военной программы, а во время существования республики Балтимейра исполнял обязанности её временного лидера.\n\nПоражение республики стало суровым уроком реальной политики. Революция потерпела крах при самых абсурдных обстоятельствах, оказавшись в подчинении у вымышленного персонажа, сошедшего со страниц книжек в реальность. Для его товарищей это было сродни абсолютному хаосу, но Голден стиснул зубы и был готов сделать всё необходимое, чтобы обеспечить безопасность друзей и соратников.\n\nУвидев столь необходимый шанс в первых всеобщих выборах страны, Голден развернул кампанию, опираясь на своё пламенное красноречие и репутацию друга рабочих. После подсчёта голосов и закрепления за ним поста уи-тлатоани революцию наконец можно по-настоящему принести в Эквестрию... ну, в некотором смысле. И пусть он не революционер в традиционном понимании, ведь по-прежнему следует демократическим принципам, Голден намерен использовать своё положение, чтобы продвигать права трудящихся и демонтировать все структуры, которые так долго угнетали рабочий класс."

JUN_cricket_chafer_desc:0 "Крикет "Хряк" Чейфер является ветераном ПОН, а также её формальным лидером в течение многих лет. Он провел большую часть своей жизни в Сталлионграде и участвовал в зимней революции 995/996 годов. Остальное время он провел на своей скромной ферме под Солтликингхэмом, в уединении в джунглях, с которыми он познакомился. Работая фермером, он влюбился в кукурузу и теперь всегда выступает за её выращивание.\n\nПосле поражения Балтимейра казалось, что Чейфера ждёт тихая пенсия на собственной ферме, однако вскоре он получил крайне неожиданный клич от одного из его старых товарищей. Назначенный на пост сиуакаоатля Голден Делишес сумел подёргать за нужные нити и обеспечить возвращение Чейфера в политику. Оставаясь убеждённым сторонником идеалов Стил Сталлиона и Карамель Маркс, он всё же смягчил свою риторику и присоединился в надежде, что однажды будущая революция всё же станет реальностью."

