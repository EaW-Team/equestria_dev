newjungle.24.desc_c:0 "Just now a messenger has arrived with a short response from the [HIP.GetAdjective] delegate. The cowards have decided not to provide aid to us in our efforts to restore peace to Equus. It seems the Southeast has tough times ahead if it hopes to stand against madness."
