JUN_crystal_annexation_desc:0 "Кристальная Империя – это пережиток тысячелетнего прошлого, чьё существование целиком и полностью зависело от Эквестрии. Кристальные пони заслуживают подобно нам в кои-то веки быть свободными!"
JUN_annex_stg:0 "Объединить коммуны с племенами"
JUN_annex_stg_desc:0 "Сталлионград был хорошим союзником, но, возможно, нам стоит ещё сильнее укрепить этот союз. Мы объединили Эквестрию, так что пора раз и навсегда закопать топор войны."
JUN_ask_for_buffalo:0 "Обратиться к бизонам"
JUN_ask_for_buffalo_desc:0 "Территории племён бизонов в юго-западной Эквестрии не полностью под нашим контролем. Им стоит целиком присоединиться к нашей федерации, чем к какой-нибудь другой стране, которая просто будет выкачивать из них нефть. Мы должны исправить эту ситуацию."
