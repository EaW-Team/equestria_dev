l_russian:
### ideas ###
JUN_stability_boosted:0 "Winning the Public"
JUN_stability_boosted_desc:0 "We are slowly but surely convincing the common pony that we have their best interests in mind."
JUN_stability_boosted_2:0 "Winning the Public"
JUN_stability_boosted_2_desc:0 "The public's trust continues to grow, helping our efforts greatly."
JUN_selling_luxury_goods:0 "Богатства Ацтлана"
JUN_selling_luxury_goods_desc:0 "В джунглях много богатств вроде бесценных артефактов и минеральные жил, а война – дело очень дорогое. Коренные пони не оценят эксплуатацию, но поймут её необходимость."
JUN_food_surplus_idea:0 "Излишки еды"
JUN_food_surplus_idea_desc:0 "Сытый пони – счастливый пони, и он гораздо сильнее хочет продолжать сражаться, жить и размножаться."
JUN_bury_them_here_idea:0 "Masters Of The Jungle"
JUN_bury_them_here_idea_desc:0 "The natives' understanding of the jungle and its secrets gives us a significant edge compared to any invaders."
JUN_the_final_push_idea:0 "Битва за Ацтлан"
JUN_the_final_push_idea_desc:0 "Джунгли принадлежат коренными пони! Ни равнодушные божества, ни маниакальные революционеры не могут их победить!"
JUN_golden_vp:0 "Cihuacoatl Golden Delicious"
JUN_light_vp:0 "Cihuacoatl Light Narrative"
JUN_maita_vp:0 "Cihuacoatl Maita"
JUN_golden_vp_desc:0 "$JUN_golden_delicious_desc$"
JUN_light_vp_desc:0 "$JUN_light_narrative_desc$"
JUN_maita_vp_desc:0 "$JUN_chief_maita_desc$"
JUN_golden_vp_2:0 "Cihuacoatl Golden Delicious"
JUN_light_vp_2:0 "Cihuacoatl Light Narrative"
JUN_maita_vp_2:0 "Cihuacoatl Maita"
JUN_golden_vp_2_desc:0 "$JUN_golden_delicious_desc$"
JUN_light_vp_2_desc:0 "$JUN_light_narrative_desc$"
JUN_maita_vp_2_desc:0 "$JUN_chief_maita_desc$"
JUN_golden_vp_3:0 "Cihuacoatl Cricket Chafer"
JUN_light_vp_3:0 "Cihuacoatl Word Bearer"
JUN_maita_vp_3:0 "Cihuacoatl Crescent Glow"
JUN_maita_vp_4:0 "Cihuacoatl Crescent Glow"
JUN_golden_vp_3_desc:0 "With Baltimare's defeat, Chafer seemed to be destined to a quiet retirement on his farm – but a call from one of his former comrades changed that. Having been chosen as Cihuacoatl, Golden Delicious was able to pull some strings and ensure Chafer's return to politics.\n\nNow, fate seems to have decreed the revolution one more chance. With Golden Delicious elected as Huey Tlatoani, Chafer had been chosen as his Cihuacoatl as a means of unity. Now, as Golden's right hoof, Chafer has begun to go back to his old rhetoric; less fearful of speaking out of line. After all, the revolution will come soon, why would he hide?"
JUN_light_vp_3_desc:0 "§YBorn§!: 21 December 980, Ayacachtli\n\nWith Light Narrative's ascension to Huey Tlatoani; Word Bearer (surprisingly even for him) turned out to be Light's chosen Cihuacoatl. Having proved to be an useful ally and quite knowledgeable of the Tenanyotl's inner workings, Word has risen to be the second most important stallion of the nation. For now, he is mostly content to remain working as is, but he is certain that the future still holds much in store for him.\n\nIt is his duty as a faithful Nightmareist to serve Her goals, after all.\n\n§YPortrait By§!: Aquamuro"
JUN_maita_vp_3_desc:0 "§YBorn§!: August 9, 978, Ayacachtli, Equestria\n\nRecently, a major change has rocked Crescent Glow's world. Against all odds, [Root.Getname] has become a land of equality and opportunity for all creatures, one where batpony and pony live in harmony with each other. When Maita was elected as Huey Tlatoani, Crescent was the natural choice for him. The two of them have shown the nation that even would-be enemies can be friends and that Harmony is alive and well. The example of Maita and Crescent Glow has carried the tribes together very far. Surely, Princess Luna would be proud.\n\n§YPortrait By§!: Egil"
JUN_maita_vp_4_desc:0 "§YBorn§!: August 9, 978, Ayacachtli, Equestria\n\nRecently, a major change has rocked Crescent Glow's world. Not only has Harmony been restored to Equestria, but the famed hero of harmony and pupil of Celestia herself has come back to the land. Sunset Shimmer and Crescent had taken to each other's quirks fairly well during the latter's election campaign, and when Sunset Shimmer won the election, she surprisingly chose the Lunarist thestral as her Cihuacoatl. Cresent Glow now works harder than ever to ensure that, this time, the ponies's memory of Princess Luna won't be lost.\n\n§YPortrait By§!: Egil"
JUN_codetalkers_idea:0 "Хуаллауатлатолламини"
JUN_codetalkers_idea_desc:0 "Диалекты местных пони джунглей многочисленны и часто совершенно непонятны. Они будут отличной основой для идеального шифра."
JUN_codetalkers_idea_lar:0 "Хуаллауатлатолламини"
JUN_codetalkers_idea_lar_desc:0 "Диалекты местных пони джунглей многочисленны и часто совершенно непонятны. Они будут отличной основой для идеального шифра."
JUN_army_of_aztlan_idea:0 "Защитники Ацтлана"
JUN_army_of_aztlan_idea_desc:0 "Пони Ацтлана гордо защищают свои дома."
JUN_night_fliers_idea:0 "Ночные лётчики"
JUN_night_fliers_idea_desc:0 "Летать ночью очень рискованно, но многие коренные пони привыкли к темноте и с легкостью перемещаются в ней. Это действительно впечатляет."
JUN_carrier_plane_idea:0 "[Root.GetAdjective] Carrier Air Protection"
JUN_naval_air_idea:0 "[Root.GetAdjective] Aerial Coast Guard"
JUN_naval_air_idea_desc:0 "No longer will our shores be unguarded from above. With superior naval bombers, enemy ships won't get close to our shores."
JUN_bombing_capstone_idea:0 "The Harbringers of Huitzilopochtli"
JUN_bombing_capstone_idea_desc:0 "Although we no longer sacrifice captives to appease the Sun, many of our warriors seem to fight as if they on a frenzy. It's hard to say if they are just eager to defend their homes, or fulfilling revenge from the skies."
JUN_expert_fliers_idea:0 "Сыны Кетцалькоатля"
JUN_expert_fliers_idea_desc:0 "Ветры всегда любимы последователями Кетцалькоатля. Они летают выше и лучше по сравнению с остальными, хотя трудно сказать, является ли это прирождённым навыком или самоубийственной самоуверенностью."
JUN_admirality_idea:0 "The [Root.Getadjective] Admiralty"
JUN_admirality_idea_desc:0 "The newly formed [Root.Getadjective] Admiralty handles all the matters of the sea, and provides crucial funding for the development of new seafaring vessels."
JUN_lunar_remnants:0 "Lunar Remnants"
JUN_lunar_remnants_desc:0 "While Nightmare Moon's supporters have been defeated in the battlefield, they still lurk about in the dark, unwilling to accept defeat. We'll need to take steps to reconcile ourselves with the bat ponies and repress those who won't give up violence."
JUN_discontent_in_cities:0 "Недовольство в городах"
JUN_discontent_in_cities_desc:0 "Гражданская война, возможно, закончилась, но враждебность между обычными пони не снизилась ни в малейшей степени. Решение этой проблемы должно быть одной из наших первых забот, если мы не хотим столкнуться со вторым восстанием."
JUN_economic_backwater:0 "Экономическое опустошение"
JUN_economic_backwater_desc:0 "Эквестрийский юго-восток уже был одним из наименее развитых регионов, но гражданская война разрушила ту скромную промышленность, что уже существовала. Правительство должно принять меры для восстановления цивилизации и возвращения в современность."
JUN_economic_backwater_2:0 "Экономическое опустошение"
JUN_economic_backwater_2_desc:0 "Эквестрийский юго-восток уже был одним из наименее развитых регионов Эквестрии, но гражданская война разрушила ту небольшую промышленность, которая уже существовала. Правительство должно принять меры для восстановления цивилизации и возвращения к современности. Однако недавние разработки в определённой степени разрешили эту проблему."
JUN_daring_propaganda:0 "Daring Do's Propaganda War"
JUN_daring_propaganda_desc:0 "Daring Do has been defeated on the battlefield, but she remains committed to toppling our government and Caballeron. Through acts of resistance and speeches, she is stirring up discontent against Dr. Caballeron. This must be stopped."
JUN_daring_propaganda_2:0 "Daring Do's Suspicion"
JUN_daring_propaganda_2_desc:0 "While less active now, Daring Do is still utterly convinced Caballeron is up to something nefarious, and continues to denounce his legitimate administration regularly."
JUN_the_southeast_sucks:0 "Bleed Them Dry"
JUN_the_southeast_sucks_desc:0 "If we cannot win, then we must deny the enemy the luxuries of victory. Every step they take in our land will be another step towards their inevitable deaths."
JUN_stableside_primacy_idea:0 "Urbanization Focus"
JUN_stableside_primacy_idea_desc:0 "В центре нашего развития оказался богатый портовой городом Стейблсайд, ворота в Зебрику и на многие острова, где растут ценные культуры. Это также хорошее место для централизации наших программ по производству оружия."
JUN_tenochtitlan_primacy_idea:0 "Native Model Communities"
JUN_tenochtitlan_primacy_idea_desc:0 "Our development focus has become based on the native communities of the Neighua of Tenochtitlan. Cities should be open with islands for producing argicultural products while being fully self-sufficient. Our resource production will boom as a result."
JUN_tourism_idea:0 "Туристическая индустрия Ацтлана"
JUN_tourism_idea_desc:0 "После установления мира доктор Кабальерон осуществил одну из своих идей по развитию туризма как на берегах, так и в джунглях Ацтлана. Пока никто из посетителей не протестует против жары, он будет прекрасно проводить время! Коренные пони, однако, не любят, когда на них таращатся, а также когда их культуру незаконно присваивают."
JUN_tourism_2_idea:0 "The Aztlan Tourism Industry"
JUN_tourism_2_idea_desc:0 ""Come see the wonders of Aztlan! Have the time of your lives!""
JUN_tourism_idea_3:0 "The Aztlan Tourism Industry"
JUN_tourism_idea_3_desc:0 "Come on down to Aztlan! Enjoy the sun, beaches, exotic scenery, and make sure to spend lots of money!"
JUN_tourism_idea_4:0 "The Aztlan Immigration Service"
JUN_tourism_idea_4_desc:0 "Come on down to Aztlan! Enjoy the sun, beaches, exotic scenery, and unique native cultures! While you're at it, feel free to settle down, and relax. You can stay as long as you want!"
JUN_tourism_idea_3_2:0 "Everypony Loves Aztlan!"
JUN_tourism_idea_3_2_desc:0 "Come on down to Aztlan! Enjoy the sun, beaches, exotic scenery, and make sure to spend lots of money!"
JUN_tourism_idea_4_2:0 "Everypony Loves Aztlan!"
JUN_tourism_idea_4_2_desc:0 "Come on down to Aztlan! Enjoy the sun, beaches, exotic scenery, and unique native cultures! Enjoy your stay, since you won't want to leave!"
JUN_rebuilding_idea:0 "Build Upon What Was Lost"
JUN_rebuilding_idea_desc:0 "Centurires of lost wonders and ancient cities lie under our hooves. Where ponies lived before, we shall modernize to live there now."
JUN_aztlan_for_everypony_idea:0 "Aztlan for Everypony!"
JUN_aztlan_for_everypony_idea_desc:0 "Aztlan is open for everypony to enjoy! Be it the tourist destinations, ancient ruins, or a revitalized economy, we are open for business!"
JUN_peace_in_our_time_idea:0 "Южный маяк"
JUN_peace_in_our_time_idea_desc:0 "Несмотря на множество трудностей и неудач, доктор Кабальерон воплотил свои идеи и принёс прочный мир и стабильность в юго-восточную Эквестрию. Пони, фестралы и коренные пони теперь живут вместе в гармонии и отмечают, что жизнь никогда не была лучше, чем сейчас."
JUN_internal_focus_idea:0 "Internal Focus"
JUN_internal_focus_idea_desc:0 "We must focus on our own affairs before helping others."
JUN_discontent_in_cities_2:0 "Недовольство в городах"
JUN_discontent_in_cities_2_desc:0 "Гражданская война, возможно, закончилась, но напряжённость между обычными пони не уменьшилась ни в малейшей степени. Решение этого должно стать одной из наших первых задач, если мы не хотим столкнуться со вторым восстанием."
JUN_better_torpedos_idea:0 "Fish with Bombs"
JUN_better_torpedos_idea_desc:0 "The foreign designs for torpedoes work really well for us, practically homing in on targets."
JUN_carrier_bonus_idea:0 "Carrier Tactics"
JUN_carrier_bonus_idea_desc:0 "The aircraft carrier is the new star of the navy. Air power is replacing the largest boats, and we're going to be at the forefront of these advances."
JUN_asgore_truck_idea:0 "Domestic Truck Production"
JUN_asgore_truck_idea_desc:0 "The beginnings of the new army of [JUN.GetNameDef] have begun to form with the new idea of using motorized soldiers and producing tons of trucks to support us. Foreign ideas, but with a Southeastern spirit."
JUN_asgore_truck_idea_2:0 "Strike Hard, Strike Fast"
JUN_asgore_truck_idea_2_desc:0 "Our motorized and mechanized army is coming together nicely. Focusing on the manuverable parts of our army is going to have great effects on the frontlines."
JUN_asgore_truck_idea_3:0 "Southeastern Tanks"
JUN_asgore_truck_idea_3_desc:0 "Although many creatures doubt that we have the capabilities for tanks in the jungles, they forget that a lot of our land isn't jungle. If we plan to bring the fight to our enemies, we need to strike them in their homes. That means going on the offensive, and tanks are the future for offensive warfare."
JUN_asgore_truck_idea_4:0 "Panzergrenadier Tactics"
JUN_asgore_truck_idea_4_desc:0 "Our changeling friends have been very helpful in preparing us for a new stage of warfare. Panzergrenadiers are mechanized soldiers capable of operating with speed, armor, and flexibiltiy. It's like the native warbands, but better!"
JUN_asgore_truck_idea_5:0 "Tank Tactics"
JUN_asgore_truck_idea_5_desc:0 "Our changeling friends have been instrumental in preparing us for a new stage of warfare. While the Southeast used to rely on its militias and warbands, now it relies on the hard steel of tanks and mechanized to crush the enemies beneath us."
JUN_asgore_truck_idea_6:0 "Mechanized Fist of Steel"
JUN_asgore_truck_idea_6_desc:0 "The ultimate evolution of the Neighua warfare has come to the Southeast. Combining modern mechanized units with the ideas of warfare of the Southeast will show even the most modern army that Aztlan reigns supreme."
JUN_native_warfare_idea:0 "The Native Way to Warfare"
JUN_native_warfare_idea_desc:0 "It's said that history is the best teacher. If that's the case, then we're geniuses in the war of war."
JUN_southern_army:0 "The Southern National Army"
JUN_southern_army_desc:0 "We fight under our own banner for our own goals!"
JUN_neighuatl_army_idea_3:0 "The Neighua Warband System"
JUN_neighuatl_army_idea_3_desc:0 "Don't fix what isn't broken! The Warbands of the Neighuatl are still among the best in the world, and we're going to work on expanding them."
JUN_neighuatl_army_idea_2:0 "The Aztlan Warband System"
JUN_neighuatl_army_idea_2_desc:0 "The integration of the Tzinacatl into our army has given us mroe recruits and experience to wage war. Who wants to fight a war every hour of every day? Only us."
JUN_neighuatl_army_idea_1:0 "The Tēlpochcalli System"
JUN_neighuatl_army_idea_1_desc:0 "Schooling of the newest soldiers allows us to make our army even better. For the future, this is going to be even better!"
JUN_neighuatl_army_idea_4:0 "The Modern Warbands"
JUN_neighuatl_army_idea_4_desc:0 "Although most would think that our way of fighting was completely outdated, I have to differ. We have an army that is perfectly suited to handle the harshest war in the world and come out on top. Let's see these other nations do that."
JUN_special_forces_idea_1:0 "Tzinacatl Integration"
JUN_special_forces_idea_1_desc:0 "The thestrals cannot be left out of our army. Instead, we'll use them like the shock troops they are. No pony wants to fight a war at night except for our insane bat friends."
JUN_special_forces_idea_2:0 "Racial Equality Through Blood"
JUN_special_forces_idea_2_desc:0 "Battle-brothers and -sisters gather 'round campfires, not scared of the night or day any longer. Not that they have reason to be afraid: that is the role of their prey."
JUN_fleet_defections:0 "Naval Defections"
JUN_fleet_defections_desc:0 "It's hard to replace experienced offiers and sailers that have defected to foreign countries. Our naval abilites will be hampered until we can replace them."
JUN_homefront_idea:0 "Frontline on the Homefront"
JUN_homefront_idea_desc:0 "Our home is under attack by foreign imperialists! All must give their best efforts to successfully keep our homeland free."
JUN_spiritual_warfare_idea:0 "Supremacy of Will"
JUN_spiritual_warfare_idea_desc:0 "As good as tanks, planes, and the biggest boats are at defeating one's enemies, there is no subsitute for the willpower of the average creature to defend their home. As good"
JUN_spiritual_warfare_idea_2:0 "Last Stand of the Natives"
JUN_spiritual_warfare_idea_2_desc:0 "The typical bickering of the native tribes of the Southeast are behind them. United hoof in hoof, the fierceness of Equestria's most ferocious fighters is now being unleashed on the enemies of [JUN.getnamedef]. As the tribes aren't willing to give up, defeat is impossible!"
JUN_NLR_sons_of_sunlight_idea:0 "Sons of the Sun"
JUN_NLR_sons_of_sunlight_idea_desc:0 "The sun's scorching rays shall burn all the heathens beneath the holy light. Blinded by the radiance of Father Sun, there is no safe place for the followers of the heathen goddesses that dare claim divinity from the truly divine. This night ends with a brilliant dawn over the Southeast!"
JUN_NLR_daughters_of_darkness_idea:0 "Daughters of Darkness"
JUN_NLR_daughters_of_darkness_idea_desc:0 "Fear the Night and those who dwell in the darkness! Shrouded by Mother Moon's grace, there is no safe place for the followers of the heathen goddesses that dare claim divinity from the truly divine."
JUN_holy_war_anti_imperialism_idea:0 "War of Anti-Imperialism"
JUN_holy_war_anti_imperialism_idea_desc:0 "We have come a long way since we fought for our freedom in the War in the Southeast. Foreign imperialists seek to establish hegemony over our homes. To them we say: Go to Tartarus!"
JUN_SOL_sons_of_sunlight_idea:0 "Sons of the Sun"
JUN_SOL_sons_of_sunlight_idea_desc:0 "The sun's scorching rays shall burn all the heathens beneath the holy light. Blinded by the radiance of Father Sun, there is no safe place for the followers of the heathen goddesses that dare claim divinity from the truly divine."
JUN_SOL_daughters_of_darkness_idea:0 "Daughters of Darkness"
JUN_SOL_daughters_of_darkness_idea_desc:0 "Fear the Night and those who dwell in the darkness! Shrouded by Mother Moon's grace, there is no safe place for the followers of the heathen goddesses that dare claim divinity from the truly divine. This day ends with a mystical dusk over the Southeast!"
JUN_friends_defensive_bonus:0 "A Hoof on Your Shoulder"
JUN_friends_offensive_bonus:0 "Victory through Friendship"
JUN_new_government_1:0 "Power to the Ponies"
JUN_new_government_2:0 "Freer Market Means Free Ponies"
JUN_new_government_3:0 "Constitutional Racial Equality"
JUN_good_life_1:0 "Aztlan Education Policy"
JUN_good_life_2:0 "Wildlife Protection Act"
JUN_good_life_3:0 "Tourist Destination Zones"
JUN_good_life_4:0 "Under the Guidance of the Speaker"
JUN_first_amendment:0 "Right to Organize"
JUN_second_amendment:0 "Right to Own Firearms"
JUN_civ_greed_tiem:0 "An Economy of Peace"
JUN_alliance_keeper:0 "Anti-Imperialist Pact Member"
JUN_alliance_keeper_desc:0 "While many alliances are built on ideology, ours is built upon a common idea that all creatures should be free to decide their own fate. Imperialists prowl everywhere, but together we stand strong and free."

### Focuses ###
JUN_decleration: "Застрявшие в чужой стране"
JUN_decleration_desc: "Юго-восток объял хаос, отражая войну в самой Эквестрии. В центре Теночтитлана горстка разношёрстных наёмников вырвала власть из копыт найтмеристов. Страх за будущее не ушёл, но их предводитель заверяет: всё, что ему нужно – защитить интересы местных пони."
JUN_shield_the_skies: "Самопальные зенитки"
JUN_shield_the_skies_desc: "Вражеские лётчики думают, что их никто не достанет, когда они утюжат Ацтлан бомбами, но это зря! Хотя нам не хватает сил, чтобы перекрыть всё небо, над Теночтитланом воздух будет под нашей защитой."
JUN_we_need_a_port: "Расширить порт Солтмейна"
JUN_we_need_a_port_desc: "Побережье Солтмейна идеально для будущих вложений, но сейчас война требует не только джунглей и пляжей. Мы превратим этот уголок в главный порт Ацтлана – и он даст нам и торговлю, и силу на море."
JUN_we_need_the_guns: "Вспомнить старые связи"
JUN_we_need_the_guns_desc: "Нестабильность не прощает слабых. Запасы малы, положение у Ацтлана шаткое. Но доктор Кабальерон использует всё, что может – звонит по полузабытым адресам старым друзьям, а также ищет любую помощь ради безопасности страны."
JUN_we_need_even_more: "Сокровища Ацтлана"
JUN_we_need_even_more_desc: "Юго-восток полон богатств, но все эти сокровища пылятся в древних, забитых ловушками храмах, пока вокруг бушует война. Пора это менять: мы отправим экспедиции в самые густые джунгли, чтобы вернуть всё, что спасёт нейуа и принесёт пользу стране."
JUN_the_wealth_of_the_jungle: "Живая душа приключений"
JUN_the_wealth_of_the_jungle_desc: "Ацтлан – это страна возможностей и настоящих приключений! Здесь можно оставить своё имя в истории, окунуться в вихрь любви и ухватить богатство за хвост. Не бойся жить по-настоящему! Приезжай в Ацтлан – и стань тем, кем всегда мечтал!"
JUN_dedicated_smugglers: "Блокадные прорыватели"
JUN_dedicated_smugglers_desc: "Враги Ацтлана мечтают перекрыть нам все дороги, задушить страну голодом и нищетой. Но с контактами Кабальерона и смекалкой местных мы прорвём любую блокаду – пусть торговля и битсы продолжают течь сквозь джунгли."
JUN_fortify_technochitlan: "Восстановить стены Теночтитлана"
JUN_fortify_technochitlan_desc: "Когда-то Теночтитлан был крепостью, которую не могли взять ни армией, ни хитростью. Пора вернуть ему былую мощь: укрепить стены, превратить город в оплот и символ стойкости. Пусть он снова станет гордостью всего Ацтлана!"
JUN_reuse_the_ruins: "Вдохнуть жизнь в руины"
JUN_reuse_the_ruins_desc: "Старые, полуразрушенные руины юго-востока ещё держатся на прочном основании, и теперь они помогут Ацтлану выстоять в новой войне. Построив будущее на плечах прошлого, мы сможем гарантировать своей стране завтрашний день."
JUN_repair_the_cannals: "Починить каналы"
JUN_repair_the_cannals_desc: "Реки – жилы этой земли. Если сумеем подчинить их поток, вода станет нашим союзником: насытит поля, поможет укрыться от врагов и снова наполнит жизнь Ацтлана."
JUN_food_surplus: "Заполнить закрома"
JUN_food_surplus_desc: "Тот, кто голодает, проигрывает любую войну. Пусть наши склады будут полны, пусть пони в Ацтлане не будут знать голода – сытый народ выстоит перед любыми бедами."
JUN_the_old_road: "Восстановить систему «Охтли»"
JUN_the_old_road_desc: "Старые дороги Ацтлана до сих пор держатся на упрямстве корней и прочности камня. Если вложиться в ремонт и обновление, наши тракты станут такими же живыми, как джунгли вокруг: выведут нас к новым возможностям и ускорят движение страны."
JUN_secondary_forts: "Построить дозорные башни"
JUN_secondary_forts_desc: "Ацтлан до сих пор уязвим: наши поселения раскиданы по чащобам. Нужно возвести башни – пусть с них будет виден каждый подход, пусть враг не подберётся незамеченным. Эти форпосты станут нашими глазами и щитом."
JUN_repair_the_temple: "Восстановить пирамиду Тоналцинтли"
JUN_repair_the_temple_desc: "Архитектура нейуа завораживает, и пирамида Тоналцинтли – лучший тому пример. Время изрядно потрепало этот храм, но ему ещё можно вернуть былое величие. Пусть он вдохновляет всех пони и станет для нас укрытием в разгар войны. Главное – чтобы вожди разделяли этот энтузиазм."
JUN_basic_manufacturies: "Мануфактуры Теночтитлана"
JUN_basic_manufacturies_desc: "Сделав первые шаги, мы должны двигаться дальше. Столице нужны новые мастерские и мощное производство. Мы наконец-то сможем создать современную производственную базу, какой в этих краях ещё не бывало."
JUN_basic_saw_mills: "Лесозаготовки"
JUN_basic_saw_mills_desc: "Если в джунглях чего и в избытке, так это древесины. Чтобы добывать её, нам нужны инструменты и инфраструктура. Больше лесопилок – значит, больше прочной древесины, а значит, ни одно копыто не останется без дела."
JUN_win_them_over: "Наладить контакт с местными"
JUN_win_them_over_desc: "Мы здесь гости – пусть и нежданные, да ещё и с оружием наперевес, но всё же гости. Опасно навлекать на себя гнев тех, кто вырос под этими кронами. Только местные племена знают, как выжить и укорениться в этих землях. Если не хотим стать ещё одной провальной страной, должны научиться быть с ними заодно."
JUN_my_old_rival: "Вот уж кто хуже всех"
JUN_my_old_rival_desc: "Дэринг Ду, эта пресловутая «героиня»... В жизни всё куда грязнее, чем в её книжках. На деле она – жадная до власти кобыла, мечтающая сбросить знамя Ацтлана и снова притащить нас на поводке к Кантерлоту. Ради будущего страны её надо остановить любой ценой. Да, врагов у нас хватает... но хуже неё нипони ещё не было!"
JUN_hearts_and_minds: "Сердца и умы"
JUN_hearts_and_minds_desc: "Мы сражались бок о бок с нейуа, но теперь главное – убедить их поверить в общее будущее. Их боги присматривают за этой землёй, их воины её защищают. Если их дело станет нашим, если их дух сольётся с нашим, только тогда мы действительно обретём и сердца, и умы племени."
JUN_borne_of_the_jungle: "Дети тьмы"
JUN_borne_of_the_jungle_desc: "Договоры подписаны, и новые союзники доверили нам своих лучших воинов – сильных, опытных, закалённых джунглями. Это честь и возможность, которые нельзя упустить. Враги ещё узнают, что значит бояться самих джунглей!"
JUN_bury_them_here: "Владыки чащи"
JUN_bury_them_here_desc: "Союз с местными научил нас читать эти земли до последнего корня. Каждый уголок, каждая тайная тропа – теперь часть нашей силы. Пусть попробует сунуться враг: он столкнётся не только с пони, но и с самими джунглями, а они уже выбрали победителя."
JUN_the_chosen: "Избранные богами"
JUN_the_chosen_desc: "Со стороны эти таинственные обряды выглядят как нелепые пляски. Но, как водится, хорошо смеётся тот, кто смеётся последним. Когда боги отмечают тебя своим знаком, ты вступаешь в бой с уверенностью судьбы, а враги встречают не обычного воина, а пони, в чьём взгляде пылает огонь высших сил. Отказаться от такой силы было бы величайшей глупостью."
JUN_the_final_push: "Сражайся за Ацтлан!"
JUN_the_final_push_desc: "Столько всего пришлось пережить, но я не сдался – и мы не сдались, и не отступим теперь. Джунгли были опасны на каждом шагу, полны ловушек и страхов. Так и есть, только теперь врагов пугают эти чащи, а не нас: ведь знания нейуа стали нашими. Теперь мы едины и свободны. За Ацтлан!"

JUN_army_debate: "Мильчималли"
JUN_army_debate_desc: "Ацтлан, наконец, сбросил эквестрийское иго, но наивно рассчитывать только на добрую волю соседей. Если мы не хотим снова потерять свободу, нужна настоящая армия. Любой враг, кто решит сунуться в эти джунгли с мечом, не выберется отсюда живым."
JUN_equestrian_tactics: "Уроки от чейнджлингов"
JUN_equestrian_tactics_desc: "Мы справились с войной, но продолжаем полагаться на то, что нам оставили предки или подсказали чужаки. Чтобы армия Ацтлана могла что-то значить, пора перенять новые тактики и хитрости у мастеров войны. А в Эквусе нет никого хитрее чейнджлингов."
JUN_forest_masters: "Владыки лесов"
JUN_forest_masters_desc: "Пусть юго-восток утопает в джунглях, но по рубежам – сплошные леса. Наши союзники отлично знают, как воевать в такой местности. Объединяя местное чутьё с их опытом, мы выкуем армию, способную драться в любых дебрях."
JUN_trucks: "Оседлать Джекалопа"
JUN_trucks_desc: "Логистика – вот что всегда решало исход войны. Местные научились таскать грузы даже сквозь чащу, но теперь инженеры доработали вездеходы из Сикамеона под наши дороги и прозвали их «Джекалопами». С такими машинами наши тылы не подведут даже там, куда не рискнёт лезть ни один пони."
JUN_cheap_labor_for_ford_factories: "Вложиться в Блю Мейр Моторс"
JUN_cheap_labor_for_ford_factories_desc: "Блю Мейр Моторс – передовики моторизации, да ещё и базируются у нас на юго-востоке. Если поддержать их битсами и вниманием, завод не только выстоит после войны, но и даст нам лучшие грузовики в истории Ацтлана."
JUN_strike_hard_strike_fast: "Бей сильно – бей быстро"
JUN_strike_hard_strike_fast_desc: "Море адреналина, рёв двигателей, поток ветра в гриве – вот как выглядит будущее. Пусть армейский грузовик не такая уж эквестрийская мечта, но даже он даёт вкус настоящей скорости. Наши наёмники влюбятся в этот драйв и научатся использовать его себе во благо."
JUN_mechanized: "Механизация – наш путь"
JUN_mechanized_desc: "Будущее войны – за механизированными частями, как ни крути. Простых грузовиков уже не хватит, когда у каждого второго пехотинца – тяжёлое вооружение. Пора смотреть вперёд: победит тот, кто первым соберёт под свои знамёна механизированную пехоту."
JUN_foreign_expertise: "Зарубежный опыт"
JUN_foreign_expertise_desc: "Кому-то покажется безумием – делать ставку на мехчасти и танки в маленькой стране, где кругом джунгли. Но в других державах уже доказали: за этим будущее. Стоит вложить немного битсов, чтобы пригласить сюда офицеров, которые видят дальше остальных, и подготовить штаб Ацтлана к переменам."
JUN_tanks: "Юго-восточные танки"
JUN_tanks_desc: "Грифоньи наёмники рассказывают, как далеко продвинулась бронетехника в самой Грифонии. Их опыт пригодится, чтобы мы смогли выковать танки, способные выжить даже в самых непроходимых джунглях. Если наши машины выдержат здешние чащи – дальше им не страшно ничего!"
JUN_changeling_tactics: "Тактика панцергренадёров"
JUN_changeling_tactics_desc: "Про чейнджлингов можно говорить что угодно, но одного у них не отнять – они настоящие мастера войны. Их наёмники делятся историями о независимых моторизованных частях и знаменитых командирах. Перенимая их тактики для наших механизированных отрядов, мы поднимем армию Ацтлана на мировой уровень!" 
JUN_modern_army_of_southeast: "Современная армия юго-востока"
JUN_modern_army_of_southeast_desc: "От племенных дружин нейуа и наёмных отрядов – к настоящей современной армии с передовыми стратегиями. Это был долгий и бурный путь. Но теперь [JUN.Getadjective]ая армия может гордиться собой наравне с сильнейшими на Эквусе!"
JUN_new_officers: "Искать таланты в джунглях"
JUN_new_officers_desc: "Несмотря на то, что после обретения независимости мы активно пополняли ряды, среди офицеров по-прежнему не хватает по-настоящему сильных лидеров. Мы обратимся ко всем племенам, чтобы найти и отобрать самых способных командиров, каких может дать Ацтлан."
JUN_train_them:0 "Put Them Through Tartarus" #TODO
JUN_train_them_desc:0 "Some nations have the luxury to build up slowly. Aztlan does not. Its birth was a painful and bloody affair. What is needed now are warriors that can take on any threat in a moment's notice. For this purpose, any new recruits will be put through the most gruesome of training regiments. Those who come out of the jungle after it will be formidable warriors. The others will have done their duty."
JUN_adapt_to_the_jungle: "Дети джунглей"
JUN_adapt_to_the_jungle_desc: "Хотя у нас много бойцов с корнями из нейуа, среди новобранцев есть и те, кто слабо знаком с этими землями. Мы запускаем программу обучения: под началом местных и ветеранов новички пройдут курс выживания и боя в джунглях. Так каждый станет настоящим бойцом Ацтлана."
JUN_sapper_tactics: "Тактика сапёров"
JUN_sapper_tactics_desc: "Джунгли могут быть не менее опасны, чем любой другой враг, если не знать их нрава. Охотники-нейуа давно научились подстраиваться под лес и использовать его странности, особенно в бою и ловушках. Если внедрить их приёмы в армию, мы получим решающее преимущество: ведь враги не знают ничего, кроме уютных рощиц."
JUN_nastive_tactics: "Уроки джунглей"
JUN_nastive_tactics_desc: "Пусть кто-то требует привести армию к единому стандарту, но Ацтлан – страна особенная. Вместо того чтобы навязывать чужие схемы, мы выработаем свой, уникальный стиль войны, взяв лучшее из опыта местных племён и наёмников."
JUN_neighuatl_memery: "Армия нейуа"
JUN_neighuatl_memery_desc: "Отряды нейуа доказали: им по плечу схватка даже с сильнейшими врагами. Селестийцы, дивизии Лунной гвардии, добровольцы из Сталлионграда – все они пали перед натиском нейуа. Зачем трогать то, что и так работает?"
JUN_lessons_of_the_neighua_empire: "Уроки древней империи"
JUN_lessons_of_the_neighua_empire_desc: "Нейуа помнят о древней империи, некогда владевшей всем юго-востоком – маги-короли подчиняли себе стихии, а боевые традиции тех времён живы до сих пор. Пусть многие из этих ритуалов давно стали лишь данью предкам, но их суть не угасла: стоит лишь по-новому взглянуть на старые пути – и они помогут в любой, даже самой современной, войне."
JUN_jungle_masters: "Владыки джунглей"
JUN_jungle_masters_desc: "Наши солдаты закалены джунглями, а нейуа ведут и обучают их с первого дня. Если хотим по-настоящему защитить свой дом, надо официально сделать нейуа главными наставниками для всех новобранцев. Только так мы станем едины с самой чащей."
JUN_native_ways_of_war: "Реформа Телпочкали"
JUN_native_ways_of_war_desc: "Задолго до прихода Эквестрии племена нейуа с ранних лет растили жеребят воинами. Пусть какие-то традиции кажутся суровыми, но в их эффективности сомневаться не приходится. Мы адаптируем этот опыт и создадим военные школы, чтобы каждый новобранец проходил настоящую боевую закалку."
JUN_yet_another_sf_build: "Лучшие из лучших"
JUN_yet_another_sf_build_desc: "Война на юго-востоке показала, что цинакатли – по-настоящему опасные и скрытные бойцы. Бывали случаи, когда даже наши лучшие солдаты уступали им. Теперь мы используем их мастерство: создадим особые подразделения, где служат только лучшие из лучших."
JUN_racial_equality_through_blood: "Равенство, купленное кровью"
JUN_racial_equality_through_blood_desc: "С самого начала рядом с нами шли не только пони, но и грифоны, чейнджлинги – наёмники и воины, что пришли в эти земли искать свой путь. Общие беды и пролитая кровь скрепили нас сильнее любых слов, стёрли старые границы между расами. Возможно, этот хрупкий, но честно заработанный союз сможет стать примером для всех племён Ацтлана."
JUN_cooler_pegasi: "Тактика тенаньотлей-нейуа"
JUN_cooler_pegasi_desc: "Каждому племени есть чему поучиться у других. Пусть нейуа наставляют цинакатлей, а цинакатли – нейуа. Поначалу это может никому не понравиться, но именно так рождается настоящая взаимопомощь и единство."
JUN_native_warfare: "Боевая мудрость племён"
JUN_native_warfare_desc: "На юго-востоке войны всегда было больше, чем мира. Если Ацтлан хочет навсегда сбросить ярмо империалистов, ему нужна собственная сила, выкованная здесь, под кронами и среди камней древних храмов. А опыта битв у местных племён не счесть."
JUN_bring_the_past_to_life: "Возрождение прошлого"
JUN_bring_the_past_to_life_desc: "Ещё недавно казалось, что былое величие местных армий навсегда осталось в легендах: их копыта давно не маршировали по всему юго-востоку. Но с первыми реформами древний дух единства снова проснулся в племенах. Впервые за столько лет они встали плечом к плечу ради одной цели – ради свободы, которую готовы защищать вместе."
JUN_codetalkers: "Хуаллауатлатоламини"
JUN_codetalkers_desc: "Диалекты нейуа так запутаны, что о них слагают легенды. Для мировой славы это, может, и беда, зато в армии – сокровище. Враг, перехватив наши сообщения, вряд ли разберёт хоть слово. Теперь связь в войсках доверят пони-нейуа, а офицеров научат их наречиям – так мы сохраним все тайны джунглей."
JUN_army_of_aztlan: "Защитники Ацтлана"
JUN_army_of_aztlan_desc: "Ацтлан пережил оккупацию и потерю свободы и, несмотря ни на что, выстоял. Но теперь этого не повторится. Империалисты, держитесь подальше: сунетесь в эти джунгли – и потеряете всё! [JUN.Getadjective]ая армия защитит свой дом любой ценой!"

#new army\
JUN_free_guns:0 "Восполнить запасы"
JUN_free_guns_desc:0 "Юго-восточная война серьёзно истощила запасы снаряжения, необходимые для длительных военных действий. Если иностранные империалисты вновь вознамерятся уничтожить Ацтлан и его культуру, мы должны быть готовы дать отпор — а для этого нам нужно оружие. К счастью, для такого предприимчивого пони, как Кабальерон, это не проблема."
JUN_artillery_go_boom:0 "Задействовать тяжёлую артиллерию"
JUN_artillery_go_boom_desc:0 "Артиллерия существует уже не первое столетие, и за это время её важность ничуть не снизилась. Если мы собираемся надёжно защитить себя, то нам необходимо задействовать всю мощь наших крупных орудий."


JUN_build_the_airstrips:0 "Построить взлётные полосы"
JUN_build_the_airstrips_desc:0 "На текущий момент нехватка взлётных полос в нашей стране представляет серьёзную проблему. Прибрежные аэродромы по-прежнему выполняют свою работу, однако их недостаточно, из-за чего любая ошибка пилота во время тренировки грозит катастрофой. Необходимо обеспечить безопасность лётчиков и расширить нашу зону воздушного контроля."
JUN_air_force_new:0 "Ацтланский авиакорпус"
JUN_air_force_new_desc:0 "Для установления реального контроля над небом нам необходимы способные оспорить вражеское господство в воздухе войска. Создание военно-воздушных сил с нуля – задача непростая, но при грамотном финансировании и планировании она осуществима. Первые эскадрильи Ацтлана уже скоро взмоют в небо!"
JUN_import_fighters:0 "Импортировать истребители"
JUN_import_fighters_desc:0 "На текущий момент Ацтлан не может похвастаться значительным авиапарком. Для достижения превосходства в воздухе недостаточно просто переоснащать гражданские суда и восстанавливать сбитые самолёты, однако используя определённые связи в Грифонии, Ацтлан сможет пополнить свой парк истребителей – разумеется, за соответствующую цену."
JUN_import_bombers:0 "Импортировать бомбардировщики"
JUN_import_bombers_desc:0 "Способность отражать вражеские авианалёты, безусловно, важна, однако нельзя забывать и о собственном наступательном потенциале. Благодаря связям в Сикамеоне у нас есть возможность импортировать бомбардировщики. Пришло время нанести ответный удар."
JUN_fighter_doctrine:0 "Очистить небеса"
JUN_fighter_doctrine_desc:0 "Зачем нужны военно-воздушные силы? Чтобы защищать небо над головами наших граждан! Именно эта задача лежит в основе доктрины истребителей. Наши пилоты получат наилучшую подготовку, и никакой вражеский самолёт, что осмелится бросить тень на земли Ацтлана, не останется без внимания."
JUN_steal_the_spitfire:0 "Юго-восточный "Spitfire""
JUN_steal_the_spitfire_desc:0 ""Spitfire" – истребитель нового поколения эквестрийского производства, который нам очень бы пригодился. Из-за хаоса, разразившегося по всей нации, некоторые инженеры-проектировщики переехали в нашу страну, и с помощью убедительных предложений и гарантий щедрой оплаты мы сможем убедить их поделиться своими знаниями."
JUN_better_guns:0 "Непосредственная воздушная поддержка"
JUN_better_guns_desc:0 "Хотя основная задача ВВС – защита воздушного пространства, это не исключает их поддержки сухопутных войск. Оснастив истребители новым вооружением, мы повысим их универсальность: они смогут не только оборонять небо, но и наносить удары по вражеским формированиям на земле."
JUN_fighters_again:0 "Сосредоточиться на отечественных истребителях"
JUN_fighters_again_desc:0 "Независимые ВВС не могут полагаться на иностранные наработки. Следующий естественный шаг в развитии наших ВВС – это проектирование собственного истребителя, что обеспечит стандартизацию, логистическую независимость, а также пригодность самолёта для работы в наших условиях."
JUN_fighter_doctrine_2:0 "Доктрина истребителей нового поколения"
JUN_fighter_doctrine_2_desc:0 "Со времён победы Гиппогрифии над Королём Штормом истребительная доктрина значительно эволюционировала.  Появились новые тактики и стратегии, которые позволили истребителям более эффективно выполнять свою роль. Мы обязаны обеспечить наших пилотов надлежащей подготовкой, чтобы надёжно защитить небо Ацтлана."
JUN_fighter_capstone:0 "Дух Кетцалькоатля"
JUN_fighter_capstone_desc:0 "Покоряя небеса, сам воздух изгибается вокруг наших самолётов, а древние боги благословляют наши эскадрильи. Чёрная жизненная сила наших машин и алая кровь наших пилотов оросят священную землю и насытят Солнце."
JUN_bomber_doctrine:0 "Окропить землю кровью"
JUN_bomber_doctrine_desc:0 "Зачем нужны военно-воздушные силы? Чтобы они отпугивали врага от встречи с нами на поле боя. Вскоре противники Ацтлана узнают, что мы не будем сидеть сложа копыта, пока они пытаются навредить нам. Тех, кто посмеет угрожать нам, будет ждать только огненная лавина."
JUN_long_range_bombers:0 "Бомбардировщики дальнего действия"
JUN_long_range_bombers_desc:0 "Новые достижения в области увеличения дальности полёта и технологии бомбового прицела позволяют нам наносить удары в глубоком тылу врага, уничтожая фабрики, питающие его военную машину. Мы обязаны немедленно инвестировать в эти разработки."
JUN_heavy_fighters:0 "Истребитель сопровождения"
JUN_heavy_fighters_desc:0 "Бомбардировщик без сопровождения – это просто самоубийца. Чтобы обеспечить безопасность экипажей и общую эффективность ВВС, мы разработаем тяжёлые истребители с усиленным вооружением и увеличенной дальностью полёта, что позволит нам сопровождать бомбардировщики при налётах на вражеские территории."
JUN_naval_fighters:0 "Поддержка с авианосцев"
JUN_naval_fighters_desc:0 "Истребители сопровождения отлично справляются с защитой наших самолётов, но их потенциал не ограничивается лишь этой задачей. Разместив самолёты на авианосцах и расширив их радиус действия, мы сможем обеспечить безопасность наших морских акваторий."
JUN_air_coast_guard:0 "Воздушная береговая охрана"
JUN_air_coast_guard_desc:0 "В защите побережий не должны участвовать только армия и флот; ВВС также должны принимать в этом участие. Патрулируя наши воды и береговую линию, пилоты обеспечат, чтобы ни один вражеский корабль или самолёт не смог угрожать нашим берегам."
JUN_CAS_bombers:0 "Тепополани"
JUN_CAS_bombers_desc:0 "Главная задача тяжёлых бомбардировщиков – уничтожение вражеской промышленности, тогда как непосредственная поддержка наземных войск требует иного подхода. Мы создадим специализированный бомбардировщик, который будет наносить удары по логистике и скоплениям войск противника прямо на линии фронта."
JUN_bombing_raids:0 "Увеличение бомбовой нагрузки"
JUN_bombing_raids_desc:0 "Как бы мы ни пытались обелять это, главная задача бомбардировщика – это нести разрушение. Если мы разработаем более крупные и мощные бомбы, то обеспечим, что каждый вылет будет наносить как можно больше урона не только вражеской морали, но и его способности продолжать сражение."
JUN_bombing_capstone:0 "Предвестники Уицилопочтли"
JUN_bombing_capstone_desc:0 "Согласно древним нейуатльским мифам, Солнце требовало жертвоприношений, чтобы оставаться сильным и восходить каждое утро. Сегодня эти жертвы богу Уицилопочтли приносят наши бомбардировщики, поражая тыл врага. За свою жестокость и развязывание войны против Ацтлана противник получит воздаяние огнём." 
JUN_baltimare_foundary:0 "Расширить балтимейрские литейни"
JUN_baltimare_foundary_desc:0 "Алюминий – это основа современного авиастроения. Литейные цеха Балтимейра уже являются крупнейшими производителями стали и алюминия на всём юго-востоке. Их расширение обеспечит рост наших молодых ВВС."
JUN_night_fliers:0 "Ночные пташки"
JUN_night_fliers_desc:0 "Ночные полёты всегда были сопряжены с риском, но коренные нейуа и тенаньотли обладают врождённым умением ориентироваться в темноте. Мы воспользуемся их навыками, чтобы обуздать ночные операции, превратив темноту в нашего союзника."
JUN_nukes:0 "Решение Тлалока"
JUN_nukes_desc:0 "Имя Тлалока, древнего бога гроз, окутано легендой: когда у него похитили жену и помешали исполнить священный долг, он в ярости обрушил на мир огненную бурю. Наши учёные разработали оружие, способное повторить это разрушение. Мы надеемся, что нам никогда не придётся его использовать, но лучше иметь такую возможность, чем остаться беззащитными."

JUN_navy_1_1:0 "Юго-восточный флот"
JUN_navy_1_1_desc:0 "Для установления реального контроля над морем нам необходимо оспорить вражеское морское господство. Создание военно-морских сил с нуля – задача непростая, но при грамотном финансировании и планировании она осуществима. Первые флотилии Ацтлана уже скоро выйдут в море!"
JUN_navy_2_1:0 "Расширить балтимейрские верфи"
JUN_navy_2_1_desc:0 "Верфи Балтимейра были одними из ключевых на юго-востоке, однако бои с коммунистами нанесли им серьёзный урон. После их восстановления этот символ эквестрийской военной мощи станет нашим."
JUN_navy_2_2:0 "Расширить порт Стейблсайда"
JUN_navy_2_2_desc:0 "Благодаря довоенным вложениям в гражданские верфи промышленный потенциал Стейблсайда является одними из самых высоких на юго-востоке. Если мы продолжим инвестировать в этот регион, то сможем превратить его в крупный военный порт."
JUN_navy_3_1:0 "Фокус на эсминцы"
JUN_navy_3_1_desc:0 "Хорошие эсминцы – это залог защищённых берегов. Среди прочих надводных военных судов они являются самыми дешёвыми в производстве и к тому же весьма универсальными. Дабы заложить крепкую основу нашим ВМФ, мы должны вложиться в настоящие военные корабли, а не переоснащённые рыбацкие баржи с прибитыми к ним пулемётами."
JUN_navy_3_2:0 "Инвестировать в порты Солтмейна"
JUN_navy_3_2_desc:0 "Удалённое расположение Балтимейра и Стейблсайда наносит ущерб нашим стратегическим возможностям, в то время как прибрежное поселение Солтмейн остаётся критически недоразвитым. Если мы вложимся сюда, то сможем объединить нашу северную и юго-западную флотилии, а также обеспечим третий по величине порт региона необходимой инфраструктурой."
JUN_navy_3_3:0 "Гордость Селестийского моря"
JUN_navy_3_3_desc:0 "Мы всё ещё являемся малой державой. Дабы нас начали воспринимать всерьёз, во главе нашей флотилии должны встать настоящие морские крепости. Это будет сложно и дорого, но только инвестируя в крупные корабли мы сможем обеспечить безопасность наших акваторий."
JUN_navy_4_1:0 "Атака из глубин"
JUN_navy_4_1_desc:0 "Даже при масштабных вложениях потребуются годы, чтобы наш флот достиг мощи ведущих держав. Впрочем, мы умеем вести асимметричную войну и можем перенести опыт наземных кампаний на море, чтобы создать новый род подводных войск."
JUN_navy_4_2:0 "Рабочие лошадки флотилии"
JUN_navy_4_2_desc:0 "Крейсеры – это, несомненно, костяк флотилии. Они универсальны, недороги в производстве и весьма эффективны; крейсеры обеспечивают прикрытие крупным кораблям, а также обладают боевой мощью, которой недостаёт эсминцам. Мы должны вложить ресурсы в их развитие."
JUN_navy_5_1:0 "Новый вид рыбы"
JUN_navy_5_1_desc:0 "Торпедные технологии быстро развиваются, становясь главной угрозой для вражеских линейных кораблей. Хотя пока мы не можем соревноваться с крупными флотилиями, эта технология может помочь нам уравнять наши шансы."
JUN_navy_5_2:0 "Развитие морской доктрины"
JUN_navy_5_2_desc:0 "Без внятной морской доктрины, задающей порядок действий для эскадр, даже самый опытный капитан будет уподоблен неотёсанному пирату. Дабы избежать разгрома при первой же встрече с организованным противником, нашему флоту необходима единая стратегия, определяющая цели, тактику и правила взаимодействия."
JUN_navy_5_3:0 "Эксперименты с авианосцами"
JUN_navy_5_3_desc:0 "Тот, кто хоть раз бывал в юго-восточных морях, наверняка видел парящих над волнами драконов. Это зрелище навело офицеров на мысль, что авиация могла бы подсобить нам и на море. Без серьёзных вложений это так и останется идеей, однако наш опыт и инфраструктура позволяют нам вложиться как в воздушное, так и морское господство."
JUN_navy_6_1:0 "Юго-восточное адмиралтейство"
JUN_navy_6_1_desc:0 "Юго-восточное адмиралтейство готово к службе! Наш флот стремительно набирает силу и готов к любым вызовам открытого моря. От рыбаков до морских волков – жители юго-востока стали настоящими хозяевами водных просторов."
JUN_navy_6_2:0 "Гордость открытого моря"
JUN_navy_6_2_desc:0 "Линейный корабль – это больше, чем просто оружие; это символ национальной гордости и могущества. Построив величественный флагман, мы вдохновим наших моряков и вселим страх в сердца всех, кто осмелится посягнуть на наши воды."

JUN_look_at_the_economy:0 "Взгляд на экономику"
JUN_look_at_the_economy_desc:0 "Юго-восточная война разбила хрупкую экономику региона. Мы должны тщательно спланировать её восстановление, дабы поставить регион наравне с остальным Эквусом и тем самым позволить ему встать обратно на копыта."
JUN_become_modern:0 "Стать современным государством"
JUN_become_modern_desc:0 "Кантерлотские чиновники никогда не понимали юго-восток, видя в нём лишь отсталую глушь. Но мы готовы сотрудничать с коренными народами и намерены превратить Ацтлан в современное государство, которое одновременно уважает свои традиции и уверенно смотрит в будущее."
JUN_factories_to_life:0 "Грохот работающих заводов"
JUN_factories_to_life_desc:0 "Мы вдохнём жизнь в повреждённые войной фабрики и сделаем из них бьющееся промышленное сердце нашей независимой державы. Труд и решимость позволят Ацтлану восстать из пепла ещё более сильным, чем прежде!"
JUN_example_to_be_followed:0 "Выкованные из земли"
JUN_example_to_be_followed_desc:0 "Костями современного Ацтлана станут сталь, необходимая для возведения новых зданий, уголь, питающий литейни, и алюминий, что станет нам крыльями. Мы освоим эти земли и с помощью их даров построим настолько мощный промышленный комплекс, что он станет завистью всех государств Эквуса."
JUN_abundant_resources:0 "Воспользоваться избытком ресурсов"
JUN_abundant_resources_desc:0 "На юго-востоке полно каучука и нефти, и хотя некоторые коренные жители не горят желанием разрабатывать эти ресурсы, это необходимо для роста Ацтлана. Дабы убедиться, что это не перерастёт в конфликт, мы должны подойти к этому вопросу одновременно с упорством и уважением."
JUN_build_upon_what_was_lost:0 "Вернуть потерянное"
JUN_build_upon_what_was_lost_desc:0 "Война оставила глубокие шрамы, и, к сожалению, восстановить всё нам не удастся. Мы должны смело инвестировать, расчищая руины прошлого, чтобы построить современную инфраструктуру, которая определит наше будущее. Ацтлан никогда не забудет разрушения, принесённые войной, но он восстанет из пепла и не позволит такому ужасу повториться."
JUN_sun_shines_on_tenochtitlan:0 "Солнце, озарившее Теночтитлан"
JUN_sun_shines_on_tenochtitlan_desc:0 "Теночтитлан – это сердце нейуа и душа Ацтлана. Нам необходимо развить этот город в полноценную столицу, чтобы улучшить управление территориями и выразить уважение коренным народам, составляющим основу нашей нации."
JUN_potential_unleashed:0 "Наш раскрытый потенциал"
JUN_potential_unleashed_desc:0 "Как бы коренные народы ни ценили свой традиционный уклад, мы не можем игнорировать, что будущее за урбанизацией. Концентрация населения вокруг промышленных центров повышает производительность труда и уровень жизни, но это не означает насильственного переселения или уничтожения племён – мы готовим почву для процветания будущих поколений."
JUN_example_of_our_beliefs:0 "Пример наших убеждений"
JUN_example_of_our_beliefs_desc:0 "Прогресс всегда должен уважать традиции. Существа следуют традиционному укладу уже на протяжении тысячи лет, и индустриализация должна находиться в гармонии с племенными структурами и обычаями. Модернизацию не остановить, но народная мудрость может её направлять."
JUN_aztlan_rising:0 "Взлёт Ацтлана"
JUN_aztlan_rising_desc:0 "Ценой непомерных усилий мы всё-таки смогли превратить юго-восток в развитый регион, независимый от прихотей Кантерлота! Заводы гудят, ресурсы питают фабрики, а в воздухе витает надежда. Ацтлан стал примером самостоятельного роста в Эквусе!"
JUN_capitalizing_on_beauty:0 "Монетизировать нашу красоту"
JUN_capitalizing_on_beauty_desc:0 "Волна промышленного роста и последовавшего за ним климатического опустошения почти не затронула юго-восток с его пёстрыми джунглями, сотнями племён, древними памятниками и великолепными побережьями. Мы можем создать процветающую туристическую отрасль, которая привлечёт столь необходимый капитал, открыв это уникальное наследие остальному миру."
JUN_culture_of_sun:0 "Культура Солнца"
JUN_culture_of_sun_desc:0 "Племена нейуа хранят богатую культуру поклонения Солнцу. Аккуратно приоткрывая завесу этой традиции иностранным туристам, мы сможем превратить это наследие в устойчивый бизнес и способствовать более глубокому пониманию их образа жизни."
JUN_beauty_of_moon:0 "Красота Луны"
JUN_beauty_of_moon_desc:0 "За тысячелетия изоляции племена тенаньотлей сформировали уникальную и загадочную культуру. Хотя они не доверяют чужакам, мы можем способствовать взаимопониманию между ними и туристами. Это обогатит юго-восток и сделает эти племена одной из визитных карточек страны."
JUN_charms_of_the_city:0 "Шарм городов"
JUN_charms_of_the_city_desc:0 "Наши города немногочисленны, но уникальны: Балтимейр – это суетливый мегаполис, а Стейблсайд, известный как "Скромный уголок гармонии", славится своим культурным разнообразием и "Ложей дружбы". Развивая городской туризм, мы покажем миру, что юго-восток – это не только джунгли, но и земля динамичной, современной жизни." 
JUN_better_connections:0 "Хорошо налаженная связь"
JUN_better_connections_desc:0 "На протяжении долгого времени юго-восток был изолирован не только от остальной Эквестрии, но и других частей региона в целом. Сейчас даже поход из одного селения в другое – та ещё задача. Если мы хотим привлечь туристов, то должны сделать передвижение по стране более доступным и простым – как для местных, так и для приезжих."
JUN_welcome_to_the_jungles:0 "Приглашаем вас в джунгли!"
JUN_welcome_to_the_jungles_desc:0 "Джунгли юго-востока – это поистине удивительное зрелище! Они полны загадок, скрытых приключений и нетронутых красот, которые больше нигде не увидеть; это идеальное место для храбрых духом путешественников! Позволим же нашей пропаганде протрубить это на весь мир, зазывая сюда тех, кто хочет испытать что-то поистине незабываемое!"
JUN_keep_tourists:0 "Задержитесь!"
JUN_keep_tourists_desc:0 "Туристический поток, может, и приносит доход, но не даёт долгосрочной выгоды. Вместо того чтобы выжимать из туристов последние биты, нам стоит создать условия, чтобы они оставались. От программ по выдаче вида на жительство до инвестиционных возможностей – мы можем сделать так, чтобы эти гости почувствовали себя желанными и пустили корни в Ацтлане."
JUN_make_money:0 "Действительно премиальный опыт"
JUN_make_money_desc:0 "Туристы в восторге от Ацтлана! Предлагая им эксклюзивные услуги класса "люкс", мы сможем максимизировать доход с каждого гостя. Наслаждайтесь отелями, сервисом и гостеприимством, но помните: высокое качество требует высокой цены, а Ацтлан стремится быть безупречным."
JUN_everypony_knows_aztlan:0 "Да все знают про Ацтлан!"
JUN_everypony_knows_aztlan_desc:0 "Когда-то Ацтлан считался самым малоизвестным регионом Эквестрии, но теперь он у всех на слуху! Наша репутация земли с богатой культурой, приключениями и загадками привлекает самых разных существ со свежими мыслями и идеями, питающими наш золотой век!"
JUN_aztlan_for_everypony:0 "Дом для всех!"
JUN_aztlan_for_everypony_desc:0 "Туризм процветает, промышленность модернизируется, а жизнь каждого в стране становится всё лучше! Дни бесхозяйственности подошли к концу; теперь во главе Ацтлана стоит администрация, которая заботится о своих гражданах и строит на юго-востоке такой дом, в котором есть место для процветания каждого существа."

JUN_the_political_situation:0 "Мир для нашего поколения"
JUN_the_political_situation_desc:0 "Долгая борьба за свободу, наконец, подошла к концу, однако теперь, когда нашей независимости более ничего не угрожает, мы столкнулись с ещё одной проблемой: становлением государственности."
JUN_meet_the_unions:0 "Протянуть копыто профсоюзам"
JUN_meet_the_unions_desc:0 "Несмотря на окончание войны, в городах продолжаются беспорядки и многие левые организации бастуют против нашего правительства. И хотя коалиция ПОН-ЯШКИ и является слишком радикальной, чтобы у нас получилось найти с ними общий язык, остатки ГАЛ-ОП, вероятно, будут готовы к переговорам."
JUN_meet_the_tribals:0 "Празднование с племенами нейуа"
JUN_meet_the_tribals_desc:0 "Битва за независимость Ацтлана была тяжёлой, и мы бы не смогли одержать вверх без поддержки племён нейуа. В связи с этим мы организуем большое торжество, собрав всех вождей, где постараемся уладить разногласия с бывшими союзниками Дэринг Ду, чтобы обеспечить единство среди наших собратьев-нейуа."
JUN_meet_the_resistance:0 "Обещания Говорящим-с-Луной"
JUN_meet_the_resistance_desc:0 "Мы ожидали, что радикальные найтмеристы продолжат сопротивление, но это не значит, что Ацтлан хочет враждовать с племенами тенаньотлей. И хотя из-за их отношений с нейуа это будет несколько проблематично, мы покажем им, что в федерации есть место и для них."
JUN_volunteers_to_eqs:0 "Волонтёры мира"
JUN_volunteers_to_eqs_desc:0 "Наша нынешняя позиция весьма хрупка. Хотя окончательное решение об отношениях с Эквестрией следует принимать лишь после урегулирования внутренних вопросов, обеспечение её выживания имеет первостепенное значение для сохранения шансов на мир. Надеемся, этих добровольцев будет достаточно, чтобы завоевать расположение наших северных соседей."
JUN_internal_focus:0 "Восстановление нации"
JUN_internal_focus_desc:0 "Наша экономика переживает крах, а армия истощена. Прежде чем ввязываться в иностранные авантюры, нам следует сосредоточиться на восстановлении и залечивании ран, нанесённых войной."
JUN_proclaim_the_federation:0 "Объявить о формировании федерации"
JUN_proclaim_the_federation_desc:0 "Юго-восток всегда был особенным местом: его джунгли населяют сотни племён с их языками и культурами, а на побережьях властвуют крупные города. Удивительно, как регион не погрузился в хаос раньше, но теперь мы знаем, что делать. Каждый должен иметь право голоса, и федерализм – это инструмент, который позволит нам достичь мира." #335
JUN_vp_golden_delicious:0 "Сиуакаоатль Голден Делишес"
JUN_vp_golden_delicious_desc:0 "Поддержка нашего режима рабочими крайне важна, а это значит, что Голден Делишес лучше всего подходит на роль сиуакаоатля. Этот шаг станет жестом доброй воли в адрес трудящихся и наведёт ужас на коррумпированные элиты Кантерлота! Кроме того, это наверняка завоюет симпатии трудолюбивых и прилежных городских кобылок..." #350
JUN_vp_light_narrative:0 "Сиуакаоатль Лайт Нэрратив"
JUN_vp_light_narrative_desc:0 "Племена тенаньотлей боятся будущего, в котором их вновь подчинят "воле солнца". Чтобы развеять их страхи, разумно назначить Лайт Нэрратива сиуакаоатлем. Он отличается восприимчивостью и станет важной опорой стабильности Ацтлана, одновременно демонстрируя нашу приверженность равенству. А ещё он наверняка знает много хорошеньких фестралок..." #340
JUN_vp_chief_maita:0 "Сиуакаоатль Майта"
JUN_vp_chief_maita_desc:0 "Нет ничего плохого в том, чтобы оставаться верным старым друзьям, и Майта – это самый уважаемый вождь нейуа. И хотя до объединения он глупо вверил себя Дэринг Ду, его авторитет среди племён нейуа всё также высок; он наверняка укрепит мою и без того прочную политическую опору, не говоря уже о том, что его обожают нейуаские красавицы-воительницы..."
JUN_an_end_to_the_fear:0 "Положить конец кошмарам"
JUN_an_end_to_the_fear_desc:0 "Лунатики-найтмеристы продолжают сеять хаос на юго-востоке. Мы должны обезглавить их движение, лишив их способности вести войну. После присоединения Лайт Нэрратива и пленения Старри Глори настал черёд Старс Вирл, продолжающей бессмысленное сопротивление. Как только она будет нейтрализована, радикалы неизбежно сложат оружие."
JUN_kill_berry:0 "Пуля для Берри"
JUN_kill_berry_desc:0 "Хотя мы не хотим настраивать левых против себя, среди них есть "товарищи", которые не заслуживают прощения. Так, Лавендер Берри, ненавидимый простыми рабочими офицер тайной полиции и организатор террора в Балтимейре, помилования не получит. По иронии судьбы он был схвачен своими же подчинёнными и теперь будет предан суду за свои преступления."
JUN_language_recognition_act:0 "Закон о языковом признании"
JUN_language_recognition_act_desc:0 "Одна вещь, с которой, кажется, согласны все в нашей стране, – так это то, что она является родиной множества различных культур и языков. Важно признать силу в разнообразии и законодательно закрепить право на использование всех языков, на которых разговаривают существа в нашей федерации."
JUN_kill_stars_whirl:0 "Поймать Старс Вирл"
JUN_kill_stars_whirl_desc:0 "И хотя мы не хотим настраивать племена тенаньотлей против нас, мы не можем закрывать глаза на деяния радикальных найтмеристов. Старс Вирл ведёт партизанскую войну в наших джунглях, сея разрушения и дестабилизируя обстановку в федерации, и пока она на свободе, это никогда не закончится. Мы должны остановить её любой ценой."
JUN_purge_ponies:0 "Запретить деятельность коалиции ПОН-ЯШКИ"
JUN_purge_ponies_desc:0 "Будучи единственными этатистами в Ацтлане, ПОН и ЯШКИ стремятся построить здесь южную Северяну. Чтобы не допустить вовлечения рабочих в эти партии, мы арестуем членов ЯШКИ и привлечём к суду их лидера Лавендера Берри за преступления на посту шефа тайной полиции. ПОН также будет запрещена, а её лидер Крикет Чейфер понесёт заслуженное наказание."
JUN_debunk_daring_propaganda:0 "Развенчать реакцию Дэринг Ду"
JUN_debunk_daring_propaganda_desc:0 "Дэринг Ду кричит на всю округу о своей "дружбе" и "свободе", но на деле стремится ввергнуть юго-восток в новый конфликт, подчинить нас Кантерлоту и обратить вспять всё, чего мы добились. Не верьте её лжи! Она просто не может смириться с моей победой и готова пойти на всё (даже против интересов рабочих!), лишь бы навредить мне."
JUN_friends_on_the_left:0 "Дружба с левыми"
JUN_friends_on_the_left_desc:0 "Во времена скоротечной Балтимейрской республики город славился своей оживлённой политической сценой, и эта традиция продолжает жить в составе федерации. Отфильтровав её наиболее деструктивные элементы, мы можем и даже должны вовлечь этих талантливых существ в нашу административную систему. В конце концов, рабочие вместе – сила."
JUN_friends_in_the_night:0 "Дружба с фестралами"
JUN_friends_in_the_night_desc:0 "Многие фестралы вроде Лайта воевали по вполне понятным причинам; на протяжении многих лет они считались гражданами второго сорта и просто хотели равных прав. В нашей федерации эта мечта стала реальностью! Чтобы показать всем остальным нашу инклюзивность, мы должны найти среди них талантливых индивидов и призвать их к нам на службу." 
JUN_expose_the_harmonist_fraud:0 "Разоблачить лицемерие Дэринг Ду"
JUN_expose_the_harmonist_fraud_desc:0 "Дэринг Ду лицемерно кричит о гармонии и дружбе, однако ей безразлична тяжкая доля фестралов! Да, на её стороне воевала клика Кресент Глоу, но многие фестралы исповедовали традиционное учение Говорящих-с-Луной, а она клеймила этих невинных мышек "антигармонистами". Она завидует нашему прогрессу и лишь стремится сохранить эквестрийский статус-кво!"
JUN_the_workers_federation:0 "Федерация рабочих"
JUN_the_workers_federation_desc:0 "Наша федерация отдаёт себя простому пони. Может, мы и не являемся социалистическим государством вроде Сталлионграда, но проделали немалую работу, чтобы помочь обычному рабочему, на чьём труде зиждется всё наше общество. Да здравствует Ацтланская Федерация!"
JUN_the_tribals_federation:0 "Федерация народа"
JUN_the_tribals_federation_desc:0 "Наша федерация существует для блага каждого! В нашем разнообразии – наша истинная сила, и нам неважно, каково ваше происхождение, богатство или вера: здесь вы всегда желанны! Да здравствует Ацтланская Федерация!" 
JUN_the_peoples_federation:0 "Федерация граждан"
JUN_the_peoples_federation_desc:0 "Наша федерация – это федерация прав и обязанностей, но прежде всего это федерация обычных граждан, которые её населяют. Так как наше общество основано на принципах равенства, дружбы и стабильности, мы стойко преодолеваем все трудности! Да здравствует Ацтланская Федерация!"
JUN_my_final_showdown:0 "Моё последнее столкновение"
JUN_my_final_showdown_desc:0 "После всех тягот я – нет, мы! – наконец победили, и наша Федерация теперь прочно стоит на ногах без какого-либо иностранного вмешательства. Осталось лишь навсегда лишить Дэринг Ду возможности клеветать на наше государство, чтобы мы могли шагнуть в будущее, где моей – нашей! – Федерации больше не будут досаждать всякие скандалистки!"
JUN_join_the_upa:0 "Вступить в ОСП?"
JUN_join_the_upa_desc:0 "Может, Эквестрия и была несправедливой по отношению к юго-востоку, но по сравнению с другими державами она остаётся лучшей надеждой для Эквуса. Возможно, нам стоит бороться вместе с ней, ибо это поможет нам сохранить собственную независимость."
JUN_rebuild_the_pyramids:0 "Реставрировать пирамиды"
JUN_rebuild_the_pyramids_desc:0 "Великие пирамиды Ацтлана были заброшены многие века назад и с тех пор находятся в плачевном состоянии. Эти великолепные чудеса света заслуживают реставрации, а также восхищения всего мира!"
JUN_breakaway_diplomacy:0 ""Переговоры с сепаратистами"
JUN_breakaway_diplomacy_desc:0 "Другие региональные сепаратисты – это не только угроза, но и возможность. Взаимное признание тех, кто разделяет наши цели, может принести нам значительные преимущества. Мы будем готовы к противостоянию с любым, кто посмеет выступить против нас!"
JUN_union_with_southwest:0 "Сделка с южанами"
JUN_union_with_southwest_desc:0 "Хотя культура юго-востока самобытна, у нас есть прочные связи с западными пони. Более того, бизоны настрадались не меньше местных племён, и отправка туда послов может принести взаимную пользу! Однако если юг попадёт в когти тирании, нам придётся принять решительные меры."
JUN_talk_with_vp:0 "Важность сиуакаоатля"
JUN_talk_with_vp_desc:0 "Должность сиуакаоатля не должна терять своего значения, несмотря на полномочия уи-тлатоани. Как вторая по значимости фигура в Ацтлане, сиуакаоатль играет ключевую роль в обеспечении стабильности нашего молодого государства, и важно поддерживать с ним хорошие отношения. Его навыки, несомненно, будут оттачиваться по мере нашего сотрудничества."
JUN_heirs_of_equestria:0 "Убеждающая дипломатия"
JUN_heirs_of_equestria_desc:0 "Хотя мы и не планируем возвращаться на север, при возникновении необходимости умения уи-тлатоани вести переговоры, несомненно, обеспечат нам выгодные условия. В конце концов, какая разница между деловой сделкой и дипломатической?"
JUN_desert_training:0 "Тренировка в пустыне"
JUN_desert_training_desc:0 "Сражаться в пустынях весьма тяжело, но наши войска как-нибудь приспособятся. Мы проведём совместные учения с бизонами и западными пони, чтобы обеспечить максимальную боеготовность."
JUN_southern_federation:0 "Южная конфедерация"
JUN_southern_federation_desc:0 "После объединения стран юга Ацтлан поднялся до небывалых высот! Чтобы обеспечить равноправное обращение со всеми нашими регионами, мы реформируем страну в полноценную конфедерацию и при этом сделаем термин "Ацтлан" символом единства всех южных существ!"
JUN_grand_dissertation:0 "Великий трактат по южным культурам"
JUN_grand_dissertation_desc:0 "Хотя Кабальерон и был занят исполнением роли уи-тлатоани, он не совсем забыл свои академические корни. Во время своего пребывания в регионе он подготовил большой трактат по культурам юго-востока на основе своих мыслей и опыта. Уже скоро планируется публикация этой диссертации, и она наверняка станет знаковой работой по данной теме!"
JUN_restore_sanity:0 "Противостояние тирании"
JUN_restore_sanity_desc:0 "Сошедшие с ума от власти аликорны – это далеко не друзья пони. Если мы будем медлить и покажем слабину, то в будущем юго-восток ждёт либо смерть, либо порабощение. Вместо покорного ожидания смерти мы должны храбро пойти в бой и завоевать себе шанс на обретение свободы!"
JUN_cottage_industry:0 "Расширить традиционную систему хозяйствования"
JUN_cottage_industry_desc:0 "Джунгли хранят множество тайн, но их главное богатство – миллионы пони, которые называют юго-восток своим домом. Неважно, откуда придёт угроза – в ответ мы применим испытанные веками методы труда."
 JUN_bribe_their_fleet:0 "\"Пожертвования\" хорошего доктора"
 JUN_bribe_their_fleet_desc:0 "Многие моряки, служащие в [3.Owner.GetAdjective]ом флоте, исполняют свой долг без энтузиазма, и их преследуют тени сомнения из-за прислуживания тиранам. Если мы мягко подтолкнём их в нужном направлении и встретим хлебом и солью, то они наверняка будут готовы присоединиться к нашей борьбе за свободу!"
 JUN_homefront:0 "Тыл – это тоже фронт"
 JUN_homefront_desc:0 "Как ни посмотри, все понимают – война на пороге. Страх в сердцах пони небезоснователен, но отступать нельзя! Чьи-то отцы и сёстры могут воевать на фронте, а значит, их матери и братья должны стоять у станков, чтобы поддерживать их! Если мы хотим положить конец этому безумию, то все должны вносить свою лепту!"
 JUN_r_and_d_fund:0 ""Подтолкнуть" отдел исследований и разработки"
 JUN_r_and_d_fund_desc:0 "Юго-восток не то чтобы известен за свои академические открытия, но отчаянные времена требуют инноваций! Финансирование исследований в экспериментальных и неординарных областях может принести такие результаты, которые могут повернуть ход войны в нашу пользу."
 JUN_spirit_of_the_jungle:0 "Воззвать к джунглям"
 JUN_spirit_of_the_jungle_desc:0 "Малый Урса занимает особое место в мифологии племён тенаньотлей и нейуатлей, хотя и по совершенно противоположным причинам. В случае, если над юго-востоком нависнет угроза, эти полумифические звери будут готовы пробудиться и помогут нам поставить иностранных империалистов на колени!"
 JUN_spiritual_warfare:0 "Духовная война"
 JUN_spiritual_warfare_desc:0 "Традиционные уклады существовали ещё до появления письменности; и хотя враги местных народов часто превосходили их числом и технологиями, у наших солдат есть то, чего никогда не будет у противника: несгибаемая воля выжить и вернуться домой. В духовном плане каждый воин Ацтлана стоит сотни врагов!"
 JUN_last_stand_of_the_natives:0 "Последний рубеж туземцев юго-востока"
 JUN_last_stand_of_the_natives_desc:0 "Ни для кого не секрет, что племена юго-востока крепко держатся за свои древние уклады. Однако одну их черту часто упускают – воинственный дух, пробуждающийся, когда их традициям угрожает опасность. В такие моменты они забывают о распрях и вместе встают на защиту родной земли. К оружию, братья и сёстры нейуатли и тенаньотли!"
 JUN_sons_of_the_sun:0 "Сыны Солнца"
 JUN_sons_of_the_sun_desc:0 "Палящие лучи солнца испепелят всех язычников, осмелившихся войти в Его священный свет. Ослеплённые сиянием Отца-Солнца, последователи лжебогини, пытавшейся узурпировать божественность истинного творца, не найдут себе спасения."
 JUN_daughters_of_darkness:0 "Дочери тьмы"
 JUN_daughters_of_darkness_desc:0 "Бойтесь ночи и тех, кто в ней скрывается. Мы, осенённые величием Матери-Луны, не позволим последователям лжебогини, посягнувшей на божественность истинного творца, избежать нашего гнева."
 JUN_last_stand_of_freedom:0 "Последний рубеж свободного юго-востока"
 JUN_last_stand_of_freedom_desc:0 "Не надо быть пророком, чтобы понять уготованную нам тиранами участь. Но наша армия – это не сброд из наёмников, гармонистов, лунаристов и коренных племён. Мы – армия всего юго-востока!\nВстанем мы у флага, и как одни возьмём, ударим по врагу-супостату и клич свободы в устах пронесём!"
 JUN_heroes_from_the_north:0 "Heroes from the North"
 JUN_heroes_from_the_north_desc:0 "We're severely outnumbered and outgunned, but we have many potential allies in the far north. The ponies of the Crystal Empire and Stalliongrad face the same threat as us, and as such, are in a unique position to support us. With this in mind, we'll ask for their material support in this conflict. If they are not fools, they will see the value in partnership."
 JUN_call_upon_the_tide:0 "Call Upon the Tide"
 JUN_call_upon_the_tide_desc:0 "Across the seas lie those who have seen tyranny and evil rise upon their shores. New Mareland, Puerto Caballo, and Hippogriffia have seen the dangers that occur when imperialistic ambitions are allowed to thrive firsthoof. Aztlan might not have been their first choice of an ally, but they are faced with supporting us or seeing Equus fall to madness. If they are not fools, they will see the value in partnership."
 JUN_gods_of_the_air:0 "Gods of the Air"
 JUN_gods_of_the_air_desc:0 "Our gods rule the very skies above Aztlan! With their blessing, we will take to the skies and ensure that the southeast is safe from above. Oh, you brave fliers, ensure your home is safe from tyranny!"
 JUN_gods_of_the_land:0 "Gods of the Land"
 JUN_gods_of_the_land_desc:0 "Our gods rule the land that encompasses all of Aztlan! With their blessing, even the soil we walk on is soil will be made safe from the enemy. Oh, you brave fighters, ensure your home is safe from tyranny!"
 JUN_gods_of_the_sea:0 "Gods of the Sea"
 JUN_gods_of_the_sea_desc:0 "Our gods rule the waves that surround Aztlan! With their blessing, water will run red with the blood of those who try to invade our home. Oh, you brave marines, ensure your home is safe from tyranny!"
 JUN_friends_like_these:0 "With Friends like These..."
 JUN_friends_like_these_desc:0 "Together, hoof in hoof, we stand bravely against tyranny as freedom, diversity, and our very way of life is threatened. Every favor is being called in by the Huey Tlatoani to give Aztlan every advantage it can get. A miracle of logistics is being played out by the Good Doctor!"
 JUN_friends_give_defensive_bonus:0 "...Defeat is Impossible!"
 JUN_friends_give_defensive_bonus_desc:0 "There isn't a pony in Aztlan who will tell you that we will lose! Our fight may last a year, ten years, or even fifty years; but we won't ever be defeated! Aztlan will stand defiant forever! The Sun rises without an alicorn! The Moon rises without an alicorn! Aztlan will continue to stand without the damned alicorns!"
 JUN_friends_give_offensive_bonus:0 "...Victory is Assured!"
 JUN_friends_give_offensive_bonus_desc:0 "There isn't a single pony in Aztlan who will tell you that victory is cheap or easy, but there isn't a single pony who will tell you that we will not win this conflict! Our friends in [3.Owner.GetName] who suffer under the rule of tyrants now count on us as their last chance for freedom. Fight on brave warriors of Aztlan, for our cause is just; and for the just, victory is assured!"
 JUN_against_SOL:0 "Operation: Tonalteuctin"
 JUN_against_SOL_desc:0 "Daybreaker threatens to burn the world to ash in her tarnished flame! Her brutal tyranny will inevitably turn towards the southeast, no doubt. We will punish her gross appropriation of the sun's beauty. We will strike first, and topple the alicorn tyrant!"
 JUN_against_NLR:0 "Operation: Yohualtecuhtin"
 JUN_against_NLR_desc:0 "Nightmare Moon threatens to bring eternal night to all of the world! Her brutal tyranny has already fallen over the southeast before, and no doubt her gaze will return here soon. We will punish her gross appropriation of the moon's beauty. We will strike first, and topple the alicorn tyrant!"
 JUN_unify_equestria:0 "The Confederated Republics of Equestria"
 JUN_unify_equestria_desc:0 "With Canterlot in our grasp, Aztlan bears the burden of Equestria's legacy. We have seen how a nation collapses under the whims of the all-too-powerful! Equestria shall be transformed into a confederation of republics that will stand together as one! For freedom and for safety!"
 JUN_expand_the_faction:0 "Expand the Association"
 JUN_expand_the_faction_desc:0 "It will be a hard fight to defeat anycreature one our own. However, if we are able to gather allies from those who supported us earlier, then maybe we can stand a fighting chance against the mad tyrants."
 JUN_holy_war_anti_imperialism:0 "The Dark Den of Imperialism"
 JUN_holy_war_anti_imperialism_desc:0 "Although we have defeated our immediate enemies, Equus remains tense. Chrysalis is an existential threat to all, but they are nothing compared to what we have endured! Aztlan stands for the freedom of all, changelings included!"
 JUN_consolidate_equestria:0 "Consolidate Equestria"
 JUN_consolidate_equestria_desc:0 "Although ruling Equestria was not our aim, fate has decreed it. We must consolidate our borders and ensure no imperialist power can ever threaten us again!"
 JUN_epilogue_1:0 "Equestria at Peace"
 JUN_epilogue_1_desc:0 "Against all odds, we prevailed. The continent is whole, and the fires of war are ashes. Now comes the harder work: building what we fought for. Not the old Equestria, but the idea it was supposed to stand for. We'll need to start preparing for new elections and to pass some last minute policies to ensure the Federation's future is properly secured."
 JUN_epilogue_2:0 "Equusian Common Market"
 JUN_epilogue_2_desc:0 "The United Ponies Alliance was a living contradiction – too meek to secure the continent, and yet, still centered all around Canterlot. To remedy this situation, we plan to unite the continent in a different way: Money. As long as trade is flowing, economies growing and reconstruction progressing, maybe war can become a thing of the past."
 JUN_epilogue_3:0 "No Gods, No Masters"
 JUN_epilogue_3_desc:0 "If a foreigner, a Tenanyotl, a Neighuatl, and a Marksist can put their differences aside and defeat the strongest militaries on the planet, then truly there are no masters over our own destinies but ourselves! It's time for everypony to have a chance of deciding their future, free from the shackles of tyrants and alicorns!"
 JUN_epilogue_4:0 "Retirement is a Good Enough Reward"
 JUN_epilogue_4_desc:0 "It's been a long while since I've been able to just relax. After all I've done, after everything I've been through, maybe... maybe I deserve a break. The confederation will be in good hooves even without me. Now, it's time to kick back, relax, and enjoy a well earned vacation."
 JUN_left_1:0 "Государственные стимулы"
 JUN_left_1_desc:0 "Крупный бизнес уже давно доминирует во влиянии на экономическое развитие, и юго-восток – не исключение. Несмотря на это, малый бизнес и местные предприятия – это душа нации. Поддерживая их определёнными привилегиями, мы обеспечим рабочим честные шансы на успех и сделаем деловую среду более справедливой."
 JUN_left_2_1:0 "Право на собрания"
 JUN_left_2_1_desc:0 "Ацтлан был основан как страна, где каждое существо имеет право на процветание. Но что, если государство не справляется с этой задачей? Тогда у всех должно быть право объединяться в профсоюзы и проводить митинги! Пришло время закрепить это в федеральном законе. Пока вы действуете в рамках системы – мы рады приветствовать вас!"
 JUN_left_2_2:0 "Право на ношение оружия"
 JUN_left_2_2_desc:0 "После многих лет потакания прихотям Кантерлота многие коренные жители юго-востока стали с недоверием относиться к любой центральной власти. Дабы обеспечить неприкосновенность их свобод, мы законодательно закрепим их древнее право на самозащиту. Любой тиран, посмевший посягнуть на нашу независимость, быстро узнает: на юго-востоке нет беззащитных!"
 JUN_left_4:0 "Борьба с бюрократизмом"
 JUN_left_4_desc:0 "У Ацтлана есть большой потенциал для роста, однако из-за определённых древних ограничений он остаётся недостижимым. Впрочем, если мы чуть пересмотрим эти законы вместе с племенами, то откроем доступ к нескончаемому потоку денег!"
 JUN_middle_1:0 "Союзники – не подданные!"
 JUN_middle_1_desc:0 "Дабы установить наш статус в альянсе, мы должны чётко заявить о себе и показать, что юго-восток больше не принадлежит Эквестрии! Мы – ацтланцы, ныне, и присно, и во веки веков. Кантерлот научится относиться к нам как к союзникам, а не как к подчинённым!"
 JUN_middle_2:0 "Тлапатлалоян"
 #JUN_middle_2_desc:0 "Some investors up north are worried about our government's independence from Equestria meaning that investments will sour. We do not wish to scare them off, nor allow them free reign in our lands. To remedy this situation, we will call for a renewal of relations and renegotiation of old deals to better suit our new relationship."
 JUN_middle_2_desc:0 "Некоторые ацтланцы беспокоятся, что наша армия будет казаться слабой на фоне Эквестрии и мы не сможем противостоять их несомненной военной мощи. Но вот что они не понимают, так это того, что наши контакты с военными чиновниками Эквестрии принесут армии огромную выгоду."
 JUN_middle_3:0 "Честные отношения"
 JUN_middle_3_desc:0 "Юго-восток – это больше не просто регион Эквестрии, поскольку наши отношения с ней стали куда более равноправными. Восславим же эру сотрудничества и дружбы между нашими нациями!"
 JUN_middle_1_2:0 "Поистине свободный юго-восток"
 JUN_middle_1_2_desc:0 "Кантерлот продолжает видеть в нас сепаратистов, которых однозначно нужно вернуть в своё лоно. Дабы гарантировать уважение нашей независимости, мы должны ясно дать понять северянам, что мы больше не их подчинённые. Наша свобода безусловна!"
 JUN_middle_2_2:0 "Ни пяди земли!"
 JUN_middle_2_2_desc:0 "Без друзей за границей Ацтлан уязвим для иностранных империалистических амбиций. Чтобы гарантировать уважение нашего суверенитета, мы значительно укрепим границы и дадим понять, что мы не уступим врагу ни пяди земли. Любая империалистическая держава, что осмелится посягнуть на нашу свободу, столкнётся со всей мощью юго-востока!"
 JUN_middle_3_2:0 "Каждый шаг будет стоить им крови"
 JUN_middle_3_2_desc:0 "Можно не сомневаться: империалисты попытаются вторгнуться в нашу страну, однако уже скоро поймут, что мы не сдадимся без боя. Какой бы враг ни ступил на нашу землю, страх за свою жалкую жизнь не позволит ему воевать в полную силу; и этот же страх укажет недругам на то, какую ужасную ошибку они совершили."
 JUN_right_1:0 "Полный учебный план"
 JUN_right_1_desc:0 "Культуры Ацтлана слишком разнообразны для введения единого учебного плана. Вместо централизованного подхода следует позволить школам самим составлять программы, отвечающие местным особенностям и нуждам. Мы установим лишь базовые стандарты, но в остальном предоставим учебным заведениям свободу в выборе методов и содержания."
 JUN_right_2_1:0 "Продвигать природное разнообразие"
 JUN_right_2_1_desc:0 "Хотя некоторые предприятия и рассчитывали получить получить карт-бланш на эксплуатацию джунглей, этому не бывать. Наши леса – дом для уникальных существ и растений, и мы должны сохранить их. Впрочем, мы также можем воспользоваться ими и сделать биоразнообразие ключевым элементом нашего имиджа, поддерживая развитие туризма и науки в регионе."
 JUN_right_2_2:0 "Закон о святилищах"
 JUN_right_2_2_desc:0 "Юго-восток – это родина многих древних святилищ и руин, многие из которых почитаются местными племенами. Дабы обеспечить неприкосновенность этих святых мест, мы примем закон, который сделает мародёрство и уничтожение этих памятников культуры незаконным. Любой, кто будет пойман за осквернением этих священных мест, будет строго наказан!"
 JUN_right_4:0 "Праздник для вас и вашей семьи!"
 JUN_right_4_desc:0 "Работа, безусловно, важна, но и про отдых забывать нельзя! Дабы обеспечить, что у всех есть время отдохнуть, мы введём новые национальные праздники, посвященные культурному разнообразию Ацтлана. Так мы гарантируем, что у всех есть время побыть с семьёй и друзьями, уважим наше многообразие и наверняка улучшим общественное мнение об уи-тлатоани!"
 JUN_left_5:0 "Узаконить расовое равенство"
 JUN_left_5_desc:0 "Будь то чейнджлинг или грифон, тенаньотль или нейуа, Ацтлан стал домом для многих разных существ. Дабы обеспечить процветание взаимного уважения, мы закрепим в законе расовое равенство и заявим, что все, кто живёт в Ацтлане, обладают равными правами."
 JUN_right_5:0 "Что есть уи-тлатоани?" 
 JUN_right_5_desc:0 "Хотя Кабальерон хорошо сослужил Ацтлану, он не может править вечно. Чтобы обеспечить будущую стабильность, мы должны законодательно закрепить полномочия и обязанности уи-тлатоани, создав прецедент для всех будущих правителей."
 JUN_left_epilogue_1:0 "Мир в Эквусе"
 JUN_left_epilogue_1_desc:0 "В Эквусе, наконец, настал мир, и, будучи пони слова, Кабальерон планирует провести первые государственные выборы, дабы не прослыть диктатором. Такое внезапное заявление о смене власти слегка ошеломило страну, однако она с надеждой смотрит в будущее."
 JUN_left_epilogue_2_1:0 "Красный"
 JUN_left_epilogue_2_1_desc:0 "Программа сиуакаоатля Голден Делишеса была сосредоточена на поддержке рабочих и простых пони. Страстные речи и упор на практические результаты сделали его одним из самых популярных лидеров Ацтлана. Сейчас он и Кабальерон совместно готовятся открыть новую главу в истории Федерации, но неизвестно, насколько прочным окажется их союз." #335
 JUN_left_epilogue_2_2:0 "Толстый"
 JUN_left_epilogue_2_2_desc:0 "Программа Майты как сиуакаоатля была посвящена стабильности и поддержке простых пони. Хотя он известен своим стремлением к спокойной жизни, мудрость и принципиальность лишь укрепили его и без того высокий авторитет. Сейчас он и Кабальерон готовятся открыть новую главу в истории Федерации, но неизвестно, останется ли вообще Майта в политике."
 JUN_left_epilogue_2_3:0 "Пищащий"
 JUN_left_epilogue_2_3_desc:0 "Программа Лайт Нэрратива как сиуакаоатля была посвящена объединению и поддержке простых пони. Несмотря на своё скромное прошлое, он стал уверенным управленцем с чётким видением будущего Ацтлана. Сейчас он и Кабальерон готовятся открыть новую главу в истории Федерации, но неясно, останется ли Лайт в тени уи-тлатоани или же выберет собственный путь."
 JUN_left_epilogue_3:0 "Первые выборы Ацтлана"
 JUN_left_epilogue_3_desc:0 "Заложив прочную основу нашей федерации, мы подготовили Ацтлан к его первым демократическим выборам. После стольких лет неопределённости и потрясений юго-восток, наконец, может с надеждой смотреть вперёд – в светлое будущее, где каждый гражданин сможет влиять на судьбу своей страны!"

### Events ### 
## Civil War Stuff##

jungle.1.t:0 "Soldiers of Fortune" #Snow #First event
jungle.1.d:0 "As anarchy found its home in the southeast with the upheaval of Celestial and Communist revolts against the Lunar administration, a strange figure landed at the port of Saltmane and quickly made its way toward Tenochtitlan. A stallion called Caballeron, who insisted on the title of Doctor being used to refer to him, was followed by bands of ponies, changelings, and griffons – all heavily armed and seemingly ready to be unleashed at a moment's notice. The stallion had gone into the local administration building followed by the chief of Saltmane. An hour passed in a tense standstill, a single thought echoing behind the walls of the City of the Sun: "What is going to happen?"\n\nAfter what seemed an eternity, Caballeron emerged, accompanied by the local administrator and several Neighua chiefs. Their laughter and smiles were starkly contrasted by the expressionless faces of his armed followers and the tense brows of the gathered locals. A palpable silence hung over the plaza, until Caballeron climbed into a nearby crate.\n\n"Creatures of the Sun! Freedom has come to you today!" he shouted to the skies. "I, Doctor Caballeron, have come to free you from Lunar subservience and Equestrian neglect! Share the news with your neighbors! You have suffered too long. Join me, and suffer no more!"\n\nThe local administrator and the chiefs did not protest these absurd proclamations; they even cheered and shouted for others to join, sparking a fervor that soon swept through the crowd. Some felt pressured, others were swept away, and all rushed to spread the news. As the town erupted, the doctor spoke into a radio for his soldier to hear.\n\n"Hostile takeover will not be needed, we can proceed as planned." a smile forming as he stashed it back into his bag."
jungle.1.a:0 "Time to make a quick bit..."

jungle.2.t:0 "Enough to Go Around" #Snow #Civil war event
jungle.2.d:0 "With so many pulled from their lives to fight, hooves were lost for farming, foraging, and other essential labor. Food insecurity during wartime could be a death sentence; a hungry people meant no morale and no trust, while a hungry army would certainly mean Aztlan's death. This was a problem Caballeron simply could not afford to let unanswered.\n\nAs ships docked at Saltmane Harbor, he directed his personal guard to oversee the unloading. Their cargo was transferred to a line of waiting trucks: crates upon crates of grain – enough to fill the granaries for months. It was not a luxurious meal, but it was enough for the people to keep on living. That thought tugged oddly at the corner of his mouth. Caballeron raised a hoof to cover it, surprised. He... felt good about helping others?\n\nCaballeron was quickly called back to reality as engines began to roar to life. He boarded a truck as the convoy prepared for the capital, but the disquieting feeling followed. Why should he care for this jungle? It was merely a venture, a means to fund his research and any future objectives he deemed fit for the fortune he would surely make here. A stepping stone, nothing more. Through the window, he glimpsed a distant lakeshore where foals played and adults rested, as if no pain had found its way to this land. Caballeron sharply closed the window and looked straight ahead at the dirt road."
jungle.2.a:0 ""A stepping stone, Caballeron. That is all this is.""

jungle.3.t:0 "Siblings in Arms" #Snow #Civil war end
jungle.3.d:0 "After some months as the top stallion of this Aztlan experiment that started as nothing more than a farce for Caballeron and his troops to make a quick bit, the doctor found himself standing at a podium with the responsibility of speaking for thousands, caring for a million and fighting for the freedom of millions more. He could never have dreamed this: no longer just a goon for Daring Do to outsmart, but a symbol of hope for the Neighua and all the tribes of the Southeast. He took one last, deep breath.\n\n"To all who call the Southeast home, be they Neighua, Coltec, Mareyan, or whatever denomination you fall upon, you have a place here! We have walked great strides to free this land from Equestrian neglect! We have kept it safe from those who would exploit it anew: the Nightmare followers, who would enslave you to a mad goddess; the ponies hiding behind a veil of communism to purge their own in Baltimare; or adventurers like Daring Do, who would chain this land to a distant throne that cares nothing for your plight! I say NO MORE! The Southeast will never again be slaves! Never again be forgotten! After we have all fought and bled for this land, how could we ever give it up?!" The crowd erupted into cheers, Caballeron allowing them to chant his name a while longer before continuing.\n\n"By the principles of freedom that have guided our struggle, I make this vow today: when the fighting is done, I will proclaim this land a true nation! A federation to stand proud on Equus! And all will have a chance to enjoy the fruits of this new era! Be they lunarist or communist, all who have not committed grave crimes against our people shall have a chance at redemption. Long live Aztlan!"\n\nAs the crowds cheered, Caballeron thought of how easy it was to get creatures to trust you if you just spew some honeyed words. Well... it also wasn't the worst to be seen as a hero for once."
jungle.3.a:0 ""LONG LIVE CABALLERON! LONG LIVE AZTLAN!""

jungle.4.t:0 "Sacred Treasures" #Snow #Civil war event
jungle.4.d:0 "Akanti had collected an excellent haul of herbs near the coast. It would surely earn him praise from the elders, perhaps even from — he crouched, freezing. The undergrowth rustled with the movement of many figures. Lunarists? They were near the old temple ruins. Were the bat-ponies planning to loot them? He crept through the foliage, hoping to count their numbers for the chief. But as the scene cleared, he saw not bats, but griffons. They were led by a earth pony stallion. A team of griffons were heaving crates laden with raw gemstones into a waiting truck. A second truck already stood nearby, packed with unmarked boxes. Akanti's breath caught. How could they? These temples were sacred and so were the gems there, this was a horrible thing to do... but what could he do? He was a lone pony watching as dozens of armed creatures ransacked and destroyed their heritage, his people's history. ..\n\nThe torture seemed to finally give break, as the pony and a rather well-off looking griff shook hoof and claw. The gem-laden truck rumbled away, leaving the other behind. The pony smiled, issuing orders to the remaining griffons to open the boxes, before turning and vanishing into the jungle. Akanti kept a close look as to ascertain whatever was in those boxes, it could be valuable information for the tribe to have.\n\nAs the boxes were opened, one of them reached out and took a... rifle? As dozens crowded around the truck, that same realization repeated. That was it? They had stolen from sacred lands for what? Weapons?! Did they know nothing about the importance of those gems? Were they simply misguided? Were they—\n\nA heavy hoof landed on his shoulder. Akanti stiffened, too terrified to turn. "I will not hurt you," a voice said, thick with a foreign accent. "But you must not speak of this to anypony. Nod if you understand." Tears welled in Akanti's eyes. He could do nothing but nod, a slow, trembling motion. "Good," the voice murmured, close to his ear. "You have done a great service for your tribe today.""
jungle.4.a:0 "Heritage exploited for monetary gain."

jungle.5.t:0 "Treasure of the Temples" #Snow #Civil war event
jungle.5.d:0 ""It is good to see you in good health, Schilder." Caballeron found himself sitting at a table by the coast with a Skyfallian... "merchant." They had done business in better times, for different goods. These were not those times. "There is a need for... more guns this time."\n\nThe griffon took a leisurely sip from his flask, barely listening. "Sure, sure. More guns. You're the boss. Say, any chance of amethysts in this haul? Love that purple. Would look magnificent on the wife, if you know what I mean."\n\nGems... The last time they had done business, it was also for gems. He got some of his soldiers to raid a broken down temple a few miles from Ixtapan, it all went well, except... the kid. He had seen shadows and foliage moving in the distance while his mercs brought the guns, he wouldn't have gotten so far facing Daring Do if he wasn't attentive. He was relieved he, and not one of his soldiers, had been the one to creep up behind the observer.\n\nIt was just a foal. Scared, angry, saddened, all feelings amplified by youth... it reminded him of his early days studying archeology, the sadness he felt by having to put a price in such priceless pieces; the anger he felt from his first encounter with Daring Do; that deep fear the first time face to face with Ahuizotl... all things that foal had to face at once due to his... his...\n\n"Doctor? You in there?" Caballeron snapped awake as he noticed the griffon snapping his claw at him. Yes, right. The deal. They still needed guns to keep the fight going. This fight, which he had chosen to lead, had to be won."
jungle.5.a:0 ""On second thought, I will do cash this time.""

jungle.6.t:0 "Artful Negotiations" #Snow #Civil war event
jungle.6.d:0 "Sat around the city hall were the chieftains of Tonaltzintli, Ixtapan, Saltmane and even Tenochtitlan, all looking towards Caballeron, skepticism filling their eyes.\n\n"You expect too much of us, Doctor... the strongest warriors of Ixtapan have already joined you, if even more are mobilized it will mean losing strong hooves at the tribe. If they do not return, it could very well ruin our balance." The other chiefs seemed to agree, all voicing their concerns towards this hasty mobilization.\n\nCaballeron maintained a patient smile, nodding as each chief voiced their fears. When the room finally fell quiet, he put his hooves over the table once more. "Yes, yes, I do understand. Trust me, I do not wish for needless suffering to come to your people; why else would I be here?" He smiled to the chieftains. "I have understood your woes, so I will not ask for so many warriors."\n\nThe chiefs seemed relieved. "So it shall be done like this: You will send half of the previously proposed amount of warriors and half the amount as non-warriors." The chiefs looked to Caballeron aghast, with him quickly amending, "This way... balance is kept, no? With half warriors and half non warriors, there is no risk of ruining your balance. Do not worry! They will be quickly trained by my folk how to use guns." Caballeron smiled. "You have my word, every death will be memorialized as a hero of our freedom. You should get to it soon though, it would be a tragedy if more died due to lack of support, no?"\n\nAs the chiefs left the room, Caballeron couldn't help but feel proud of getting his way done while running circles around them."
jungle.6.a:0 "As easy as taking candy from a foal!"

jungle.7.t:0 "Honor" #Snow #Civil war event
jungle.7.d:0 "The air in Tonaltzintli was thick with a somber quiet, broken only by the crackle of the ceremonial fire. The Neighua had gathered not for celebration, but for a sending. Before the tribe, the chief stood with a cloth-draped form behind him, his stoic face betrayed by grieving eyes. "Quitzá lived and died as a true child of the Sun. Ambushed by the Night's treachery, she stood her ground. Hers was a warrior's death." It was directly because of Caballeron's choices that she had died, being one of the warriors conscripted after his edict to mobilize more creatures. He did not expect to have to see this, much less to be invited here to participate in such private rituals. "Alongside us today is Doctor Caballeron, he will give his words as was promised."\n\nThe chief stepped down and made way for Caballeron to take his place. Taken by surprise but never one to freeze upon headlights, Caballeron found himself standing in front of hundreds of Neighua; some looking upon him with disdain and blame, all sharing a sadness in their eyes. "I... thank you all for giving me this opportunity." He had nothing prepared, nothing left to do but go for it. "I did not know Quitzá as you did. I never asked for her help, or heard her laugh. But I know this: she fell as a soldier of Aztlan. She died for a belief shared by me and many others. She died for a land where the Neighua are free, safe, and sovereign. Though she was taken by the night, we now commit her to the Sun's embrace." As he spoke, sacred oil was poured over the shroud. A torch was handed to Caballeron. "We witness not just death, but her new beginning," he said, his voice gaining strength. "Let this flame carry your prayers, your memories, and your love to guide her journey."\n\nHe lowered the torch. The oil-soaked cloth ignited with a soft whoosh. In the rising light, he looked out. The anger in the crowd was gone, subsumed by a profound, fiery grief. "WE FIGHT ON!" Caballeron shouted, the cry torn from him. "NOT JUST FOR AZTLAN, BUT FOR QUITZÁ! LONG LIVE HER SPIRIT!" Lost in the quickly growing fervor, he failed to notice the heat on his own cheeks, and the wet trails left behind by tears he did not remember shedding."
jungle.7.a:0 "Rest in peace."

##Post Civil War Stuff## 

jungle.8.t:0 "Новый Ацтлан" #Snow
jungle.8.d:0 "Стопки бумаг громоздились на столе Кабальерона. Они в самом деле выиграли войну. Схема по быстрому заработку немалой суммы битов стремительно превратилась в полноценное государство на юго-востоке... но это вовсе не означало, что заботам пришёл конец.\n\nХотя большинство вражеских командиров были захвачены или добровольно сдались, Дэринг Ду и Старс Вирл всё ещё оставались на свободе, подстрекая недовольных. Даже капитулировавшие лидеры продолжали доставлять проблемы, ведь их сторонники всё ещё были занозой в боку.\n\nА ещё Кабальерон сделал множество обещаний, которые теперь нужно было выполнять. И первым в списке стояло создание федерации. А что потом? Требования и ожидания росли как в переносном, так и в буквальном смысле: на столе уже скопилась весьма приличная гора бумаг, с которой ему ещё предстояло разобраться.\n\nИли... возможно, разбираться должен был вовсе не он. Жеребец ведь обещал работать над реинтеграцией и дать голос всем участникам его федерации... и что может быть лучше, чем поставить рядом с собой свой правое копыто? Это продемонстрирует всем его стремление к единству и примирению, а главное – позволит переложить всю эту бюрократию на чьи-то ещё плечи, пока он будет заниматься чем-то действительно важным. Например, улыбаться на камеру!"
jungle.8.a:0 "Уи-тлатоани Кабальерон... Звучит неплохо."

jungle.9.t:0 "ГАЛ-ОПом в будущее!" #Snow
jungle.9.d:0 "Голден Делишес стоял, окружённый членами анархистов из ГАЛ и ОПов-профсоюзников. Он пригласил их на встречу на балтимейрской фабрике, чтобы сообщить о переговорах с Кабальероном, которые должны были состояться через несколько часов. Синдикаты приняли приглашение настороженно. ГАЛ же, с другой стороны...\n\n— Это  возмутительное предательство! Мы должны организовываться, чтобы свергнуть этого бандита, а не вести с ним дела! — выкрикнул один из анархистов. Голден уже было открыл рот, чтобы ответить, как дверь фабрики медленно заскрипела, издав громкий звук, привлёкший всеобщее внимание. В проёме появилась голова, которая принадлежала...\n\n— Кабальерон?! — воскликнул Голден. — Наша встреча должна состояться через три часа у меня в офисе. Как ты вообще сюда попал?\n\n— О, должно быть, я перепутал место! Что за нелепая ошибка, — Доктор шагнул в полумрак. Его жесты были нарочито театральными, а на лице застыла широкая улыбка. — Хотя... раз уж я здесь, то лучше начать наши переговоры прямо сейчас.\n\nКоммунисты в комнате напряглись. Лишь поднятое копыто Голдена удержало их от того, чтобы немедленно не ринуться на наглеца. — Ладно. Может, пройдём в помещение поспокойнее?\n\n— Быстро соображаешь. Уважаю. Но в другой комнате нет нужды, — произнёс Кабальерон, не двигаясь с места. — Скажу прямо: ваши... "профсоюзы" могут найти своё место в моей федерации. Политические детали ещё предстоит определить, но я даю разрешение рабочим на самоорганизацию в знак уважения к вам. И прошу лишь о том, чтобы вы чуть поменьше буянили  в городах... пока мы не определим условия сотрудничества более конкретно, — рабочие молча оценивали двух жеребцов в их негласном противостоянии.\n\nГолден протянул копыто Кабальерону. — Хотя до компромисса ещё далеко, конституционное признание наших прав на забастовку и профсоюз – уже достаточно хороший шаг. Даю слово, что ГАЛ и ОП будут соблюдать это соглашение, — Кабальерон улыбнулся, и они пожали копыта. Затем он развернулся и исчез так же внезапно, как появился, оставив лишь ошеломлённую тишину. Голден вскоре последовал за ним, бросив рабочим напоследок несколько слов."
jungle.9.a:0 "— Я уведомлю остальные синдикаты о происходящем. И не спешите жаловаться."

jungle.10.t:0 "В тени солнца" #Snow
jungle.10.d:0 "Музыка и смех царили в ночи, пока сотни нейуа собирались, чтобы не только отпраздновать свою новообретённую свободу под властью Ацтлана, но и почтить память всех, кого они потеряли на этом пути. На празднике присутствовали все вожди нейуа. Даже те, кто когда-то поддержал Дэринг Ду, теперь делили напитки и оживлённо переговаривались с Кабальероном.\n\n— Право слово, мне искренне жаль, что нам потребовалось так много времени, чтобы встать бок о бок... У Дэринг Ду талант к лживым словам и хитроумным манипуляциям. Я не виню никого из вас за то, что вы поддерживали её во время войны, — жеребец одарил их обаятельной улыбкой. — Оставим старую вражду в прошлом, и, как солнце создаёт каждый день, так пусть новый рассвет озарит нас. Как говорится... чикауилия. Ну что, по стаканчику? — и они праздновали, словно никогда не были врагами. Народ был объединён одной целью... кроме одного.\n\nКоренастый жеребец, который ел и беседовал с вождём иштапана. Судя по комплекции и вызывающей ухмылке, тот идеально подходил под описание нейуа, наиболее близкого к Дэринг Ду. Кабальерон подошёл с отработанной улыбкой, но интересующий его жеребец, обменявшись короткими приветствиями, тут же отошёл. Кабальерон удивлённо замер, когда вождь иштапана обратился к нему: — Майта – очень мудрый пони с добрым сердцем, но он был близким другом Дэринг... Я уверен, вы сможете подружиться в будущем, прошу, не держите на него зла.\n\nКабальерон быстро вернул чуть померкнувшую на миг улыбку. — Разумеется, я вовсе не обиделся. Пойдём? Нас всех впереди ещё ждёт объявление.\n\nПраздник продолжался, улыбки сменяли друг друга, и главным моментом ночи стала церемония провозглашения Кабальерона уи-тлатоани, что делало его не только президентом Ацтлана, но и лидером всех нейуа... кроме Майты, который сохранял отстранённую улыбку, пока остальные смеялись и веселились. Кабальерон был не из тех, кто сдаётся; ведь что может быть большим унижением для Дэринг Ду, чем потеря своих друзей? Он не забудет про Майту, но сейчас пришло время для праздника."
jungle.10.a:0 "Последний трофей, который нужно заполучить."

jungle.11.t:0 "В глубины пещер" #Snow
jungle.11.d:0 "Воздух становился холоднее и тяжелее, пока Кабальерон спускался всё глубже в пещеру, а его шаги эхом отдавались среди каменных стен. Единственный проводник – закутанный в плащ фестрал – вёл его вперёд, за ним следовали его собственные, заметно нервничающие охранники. Фестрал резко остановился. — Мы пришли.\n\nКабальерон в замешательстве огляделся, держа фонарик в зубах, пока тревожная тишина пропитывала воздух. — Что значит пришли? Здесь никого... — он резко развернулся, и луч фонарика выхватил из темноты сотни фестралов, висящих под потолком. Они были вооружены и готовы к бою. Одного вида этого картины хватило, чтобы его так называемые охранники бросились прочь с криками, поджав хвосты. Увы, Кабальерон не мог позволить себе поступить подобным образом, если хотел, чтобы фестралы когда-нибудь опустили оружие. — Вижу, вы... умеете встречать гостей. Очень впечатляюще, — он нервно хохотнул, чувствуя, как по виску стекает капля пота, и надеясь, что сверху её не видно. Если светская болтовня не сработает, придётся придумать что-то ещё... по крайней мере, он на это надеялся. Фонарик мигнул, погас, и его поглотила абсолютная тьма. За ней последовал гул взмахов многих десятков крыльев. Что он ещё может сказать?! Неужто это конец его пути? После всего, чего он добился? Он ведь ещё даже не победил её!\n\n— СТОП! — закричал проводник, выхватывая факел из настенного держателя. — Чего вы хотите добиться его смертью? О чём вы вообще думаете?! — он подошёл чуть ближе и в свете факела он смог рассмотреть довольно молодого, но незнакомого фестрала. — Кабальерон пришёл сюда, чтобы вести переговоры о наших правах! Мы были бы не лучше Селестии, если бы просто проигнорировали его! — при свете факела было видно, что ни один фестрал не сделал ни шага вперёд. — Прошу прощения за всё это... и за то, что не представился раньше. Меня зовут Лайт Нарратив, я журналист в... неважно! Важно то, что мы можем сделать для тенаньотлей.\n\nНемного смущённый и неопытный... но в этом Лайт Нарративе была искра. Если Кабальерон сможет направить его на нужный курс, то превратит в ценный инструмент. Жеребец прочистил горло, и бравада быстро заполнила пустоту, оставшуюся после страха. — Я не осуждаю ваше недоверие ко мне. Для вас я представитель нейуа, но на деле я мечтаю о том, чтобы все члены нашей федерации стали равными друг другу... именно поэтому я пришёл сюда сегодня, чтобы встретиться с вами лицом к лицу, — вновь обретённая уверенность и услуги Лайт Нарратива в роли посредника позволили найти компромисс, в рамках которого не столь фанатичные лунаристы решили дать федерации шанс проявить себя."
jungle.11.a:0 "Надо будет не забыть уволить этих трусов по возвращении..."

jungle.12.t:0 "Рождение федерации" #Snow
jungle.12.d:0 "— Когда я пришёл на юго-восток, то увидел землю, что жаждала быть УВИДЕННОЙ... — Майта сидел у костра вместе со своими жеребятами. Он думал о том, куда пропали его друзья после поражения в войне. Кресент Глоу... Гуд Ворд... Дэринг Ду... никто из них не выходил на связь. Он мог лишь надеяться, что они в безопасности.\n\n— Я увидел землю, что жаждала СВОБОДЫ... — в штаб-квартире ОП Голден Делишес внимательно слушал радиотрансляцию. Эта земля действительно жаждала свободы, перемен. Может ли федерация быть ответом на миллионы невысказанных надежд?\n\n— Я увидел землю, что жаждала РАВЕНСТВА... — Лайт Нэрратив стучал по клавишам своей старой печатной машинки. Его никогда особо не заботила ни Луна, ни Найтмер, но должен был добиться того, чтобы его народ был услышан... и чтобы он сам мог услышать других.\n\n— Я увидел землю, что жаждала МИРА... — Дэринг Ду шагала через леса, а Квиббл без умолку болтал, следуя за ней по пятам. Он раздражал её, но был добрым и искренним. В отличие от того проходимца Кабальерона, который воспользовался доверием стольких невинных существ... Её сердце не будет знать покоя, пока его интригам не придёт конец.\n\n— Я увидел землю, что жаждала ШАНСА... — глубоко в джунглях Старс Вирл затянулась сигаретой. Она всё ещё могла подготовить эту землю к власти Луны – нужно лишь продолжать бороться. Её нельзя было игнорировать, и остановить тоже было невозможно. Воля Луны куда сильнее всего, что эти жалкие наглецы могли ей противопоставить.\n\n— Я увидел землю, что жаждала ЭТОГО! — Кабальерон звучно ударил копытом. — Сегодня мы больше не просто существа – мы граждане! Граждане Ацтланской Федерации! Где у каждого будут равные шансы на успех! Где свобода и мир будут принадлежать всем! Где никто не будет забыт! — Кабальерон поднял копыто, и миллионы существ восторженно закричали, радуясь надежде на лучшее будущее."
jungle.12.a:0 "Даже ты!"

newjungle.7.t:0 "Солдаты Солнечного Света" #Snow #Send volunteers diplo
newjungle.7.d:0 "Когда Дэринг Ду провалила свою миссию на юго-востоке, казалось, что весь регион отныне для нас потерян. Однако недавно оттуда пришло сообщение, предлагающее нам уникальную возможность. Доктор Кабальерон, сепаратист, сумевший объединить юго-восток, предлагает Эквестрии военную помощь. Он готов отправить своих профессиональных наёмников в обмен на перемирие после окончания войны.\n\nПоначалу наши дипломаты решили, что это коммюнике – шутка, ведь оно пришло от злодея прямо со страниц книг о Дэринг Ду. Но, похоже, именно в такой ситуации сейчас оказался юго-восток.\n\nМы уже давно не получали никаких вестей о лояльных нам войсках в тех землях. Возможно, это наш лучший шанс получить преимущество над Найтмер Мун, хотя подобный курс означает, что процесс реинтеграции земель после войны затянется..."
newjungle.7.a:0 "Мы принимаем предложение Кабальерона."
newjungle.7.b:0 "Мы не можем предать Дэринг Ду!"

newjungle.8.t:0 "Сделка с солнцем" #Snow #Yes volunteers
newjungle.8.d:0 "Кабальерон готовил свою речь для официального провозглашения федерации, но тут в комнату ворвался Бифф. — Да? Что такое, у меня дел по горло.\n\nБифф стоял, тяжело дыша, пытаясь перевести дух. — Б-босс, эквестрийцы приняли нашу помощь! Нужно готовить солдат к отправке.\n\nУслышав новость, Кабальерон сразу просиял. — Так чего сразу не начал с этого? Давай, сообщи командирам батальонов, что пора отрабатывать своё жалованье. А насчёт нейуа... можешь сказать, что они идут помогать Солнцу или что-нибудь в этом духе. Если потребуется дополнительное убеждение – зови меня; если нет – марш отсюда, — Бифф кивнул и умчался прочь, а Кабальерон не мог не почувствовать всплеск гордости от своего успеха."
newjungle.8.a:0 "Прекрасные новости перед выступлением!"

newjungle.9.t:0 "Отказ солнца" #Snow #No volunteers
newjungle.9.d:0 "Кабальерон готовил свою речь для официального провозглашения федерации, но тут в комнату ворвался Бифф. — Да? Что такое, у меня дел по горло.\n\nБифф стоял, тяжело дыша, пытаясь перевести дух. — Б-босс, эквестрийцы отказались от нашей помощи! Что нам теперь делать?\n\nУслышав новость, Кабальерон лишь молча перевёл взгляд на него. И даже Биффу было непонятно, о чём думает шеф. — Можешь идти... мне нужно подумать. Спасибо, что сообщил новости, — он быстро отмахнулся от Биффа и вернулся к работе. Когда дверь закрылась, Кабальерон почувствовал, как начинается приступ мигрени."
newjungle.9.a:0 "Лучше готовиться к худшему..."

newjungle.89.t:0 "Aztlan Asks for Peace" #Alternative if EQS already beat NMS
newjungle.89.d:0 "An interesting communiqué has arrived in [GetCapitalVictoryPointName] today. Caballeron – at one point thought only to be a fictional antagonist to the Daring Do books – has sent diplomats to try to work out some sort of arrangement between the "[JUN.Getname]" and ourselves.\n\nThey are proposing a mutual pact of non-aggression between our nations. While we are still weakened from the civil war, Aztlan also has made no steps to try to expand at our expense. This would ensure peace reigns a little while longer with our sorthern borders and allow us to sort other matters, and potentially even serving as the first step towards closer cooperation between Aztlan and the UPA.\n\nThe other choice is to simply refuse their deal, after all: are they not occupying our rightful lands?"
newjungle.89.a:0 "We will accept this offer of peace and hope for a joint future."
newjungle.89.b:0 "We do not negotiate with secessionists."

newjungle.90.t:0 "Equestria Accepts" #Yes NA
newjungle.90.d:0 "The Equestrian government has agreed to our offer of a non-aggression pact! While Aztlan may not be fully safe yet, we will be allowed more time to prepare our agendas and continue our build-up. Perhaps this could open the door to more negotiations in the future."
newjungle.90.a:0 "This has bought us some breathing room."

newjungle.91.t:0 "Equestria Declines" #No NA
newjungle.91.d:0 "The Equestrian government has rejected our offer of a non-aggression pact! It seems they are adamant on their view of seeing us as a rogue statelet that must join the fold one way or another, even if it meant avoiding further bloodshed in the region. While this is disappointing, it is not entirely unexpected; it simply means some changes to policy and tenser days to come..."
newjungle.91.a:0 "Damn it!"

newjungle.92.t:0 "Darling Angel's Coup"
newjungle.92.d:0 "How did you get this event?"
newjungle.92.a:0 "you're just a dirty cheater, aren't you? yeah, get outta here."

newjungle.93.t:0 "Fun in the Sun" #Snow
newjungle.93.d:0 "The drums had already started at dawn. By midday, the entire settlement of Altepetl was a whirl of feathers, color, and dizzying motion. Caballeron, stiff and somewhat uncomfortable in a ceremonial vestment that itched his back, stood at the edge of the crowd. He should have been aghast at the sheer energy that had been erupting non-stop since so early in the morning – months ago, he certainly would have been. But now, watching ponies painted like beasts leap to the primal rhythm had grown strangely mundane. He watched with a bemused smile. The Neighuatl had their own way of doing business with the universe.\n\n"Huey Tlatoani!" The chief approached him with a big smile on his face. "You must join! Show your energy! Give your sweat and our joy so the earth will be fruitful this season!" Before Caballeron could formulate a reply, he was swept forward by a wave of movement.\n\nA young mare, her face painted with precise geometric lines, raised a gourd filled with a viscous liquid near his face. "For the Huey Tlatoani!" she cheered. "Drink, drink!" The strong smell of alcohol rose from it. He had taken this drink once before in one great gulp, and in response, it had taken him down with one great kick. Now, he proceeded more calmly. He took a sip and poured a small libation onto the earth before placing the gourd down. The mare smiled, and the crowd roared.\n\nAs they pushed and pulled, Caballeron found himself matching their energy. 'Respecting the natives and their wishes is the basis for any good anthropological work,' his teachers would have told him. But now, with the cool soil under his hoof, surrounded by the joyful faith of thousands, the lines in his own mind began to blur."
newjungle.93.a:0 "Mixpantsinko!"

newjungle.94.t:0 "Gearing Up" #Zop
newjungle.94.d:0 "The whistle blew and started the shift in the factory. Caballeron didn't know what to expect. He has an archeologist, not a factory worker! It was Golden's idea that he take just one shift at a factory, just to have the workers see that their Huey Tlatonai was capable of a day's hard labor.\n\nCaballeron wished it was just a desk job.\n\nFor four grueling hours, he did the same job over and over again. Take the hammer, hit the steel to shape it, repeat. It wasn't even one of those light hammers; the darned thing nearly weighed a quarter of himself. When the next whistle blew, he watched as ponies immediately quit what they were doing and sat with each other, talking, eating, making jokes, and telling stories of the War of the Southeast. Their comradery was spectacular. Caballeron sat, sweat dripping him his brow, as a stallion sat next to him.\n\n"Good first half, right?"\n\nCaballeron's face dropped. "First half?!"\n\nThe stallion laughed as others who heard the commotion joined in. Caballeron would been red with embarassment if he wasn't red with the effort of swinging hammers. "It's alright. Pace yourself and take a break when you need to. No one's seen you even sit for a minute yet." Caballeron nearly fell from the tough hoof that was slammed on his back. He was knocked out of the momentary trance by the whistle signalling the lunch period was over.\n\n"Back to work, again," he muttered to himself. Somehow, the aching was better with friends."
newjungle.94.a:0 "Bonds stronger than steel."


newjungle.1.t:0 "Class Enemies, Business Partners" #Snow #Golden Cihuacoatl
newjungle.1.d:0 "Caballeron had invited Golden to meet him at his office; the two had not met since their negotiations to stop the strikes. Golden wondered if this meeting was to address the points left unresolved, particularly political representation for the left. As Golden opened the door, he found Caballeron waiting by his table.\n\n"Golden Delicious! Just the stallion I wanted to see! Here, take a seat."\n\nGolden went to sit down. "I'd prefer you to be as direct as last time. The faster we conclude this, the better."\n\nCaballeron couldn't even react properly, but he kept an ever present grin on his face. "Of course! In fact, it would be even better for us to be frank. You see, I like that about you. You have beliefs and you stick by them... but you know how to compromise to get it done." Caballeron took a sip of water. "So, I come here to propose a compromise." Golden kept an impassive look, but allowed Caballeron to continue. "I need a strong voice such as yours by my side. With my charm and the weight your name carries among the left, I can see this federation going far. What do you say? Willing to be my Cihuacoatl?"\n\nGolden seemed to be deep in thought for a few seconds before he spoke. "Fine. However, I have demands of my own. First off I want you to leave PON, TER and CAN alone. While we may diverge at times, they are still my comrades and are to be left alone. I don't care for what you do to IES and Berry, they were a thorn for me too. But understand this one thing: I do this only as it serves the workers' interest. Betray that, or harm them, and our arrangement is null."\n\n"That is all fine by me. You have to understand, Golden... I too want what's best for the worker." Caballeron smiled. "Although... You will have to tone down your anti lunarist rhetoric. I am not losing their support after all I have gone through to get it."\n\n"It is a deal then." "As the two ponies shook hooves, both knew the alliance would only last as long as it was useful."
newjungle.1.a:0 "But for now, it would stay."

newjungle.2.t:0 "Light in the Darkness" #Snow #Light Cihuacoatl
newjungle.2.d:0 "Light had arranged a meeting with the Huey Tlatoani. They hadn't seen each other since Caballeron had gone to meet his kind and he had to stop them from doing something rash. He didn't even try to think about what his resume would look like if that had happened. "Hello! I'm Light Narrative. I was fired from every job I ever had, served as an administrator for Nightmare Moon, and watched a president die once!" He dryly laughed, at least only two of those were true.\n\n"Do not stand laughing at my door. Come in." He gulped, not expecting to already be waited for. As he entered the room, he noticed Caballeron lazily sitting. Light quickly strode towards the opposite chair. "I'm glad you agreed to meet me, Mister President Caballeron. I may be overstepping my luck here, but I wrote up some proposals for your government to assist with integrating thestrals. Now, I know that it's a lot, but—"\n\n"Approved." Caballeron quickly waved him off. "Anything else?"\n\n"W-What? Just like that? But you didn't even read it..." Caballeron kept his relaxed stance as the young thestral began to sweat.\n\n"Kid, I know your worth, unlike those cultists or those papers." Caballeron pointed his hoof at the bat "If this is half as good as what you wrote during your time at the Canterlot Inquirer, it's bound to end tensions for good." Caballeron smiled. "Besides, you saved my hind before, it's the least I can do to repay you... tell you what. How do you feel about helping me with more than just proposals? A functioning state needs more than one creature, and I'm in dire need of a right-hoof at my side... vice-president, Cihuacoatl, whatever you fancy. How about it? You're up for it?"\n\nLight seemed flabbergasted, trying to find the words. "Me? N-no, sir, I couldn't possibly... I'm not... I'm just..." His face kept contorting itself as he tried to find the right words. Caballeron waited patiently, a small smirk forming on his face. In due time and a bit more convincing words from Caballeron, a deal was struck."
newjungle.2.a:0 ""Trust me, this is a story you'll want to write.""

newjungle.3.t:0 "Old Faithful" #Snow #Maita Cihuacoatl
newjungle.3.d:0 "Out of all the Neighua chiefs, there was only one that Caballeron had yet to ally with. While the others treated him as an equal, this one had simply ignored him; the only chief who remained loyal to Daring Do.\n\nAs he heard the heavy steps approach, Caballeron rose and opened the door himself. The stallion who stood there carried not just weight, but a certain aura. "Tlatoani Maita, it is a pleasure to truly be able to meet you. Please, come in." He allowed the rotund chieftain to pass and closed the door. Some snacks were prepared on the table, but Maita paid them no mind as he sat down. "Your fellow Tlatoani have all repeatedly told me you are a truly respectable creature. Wise, kindhearted... loyal."\n\n"I am glad my friends talk well of me, but really, I am just a stallion."\n\nCaballeron laughed. "Humble, too, it seems." He took a bite out of a biscuit he took from the table. "I'll be honest with you, Maita. We have gotten off on the wrong hoof; I wish to fix this. I wish to have you by my side as my Cihuacoatl. What could I do to make it happen?"\n\nMaita seemed to look into the distance, his mind lost in thought. "I wish for you to leave my friends alone; including Daring Do, of course." That statement felt like a knife being twisted in Caballeron's gut. Promising this would mean going against everything he stood for... yet, he could always deal with her without his knowledge. He'd just need to be subtler about it. "That is an acceptable term. I accept it." Caballeron extended his hoof, only to be enveloped in a giant hug by the stallion.\n\n"I think we may get to be friends yet, Mister Caballeron!"" 
newjungle.3.a:0 "I-I am glad, but... please let me go..."

newjungle.4.t:0 "Waking from a Nightmare" #Snow #Golden Cihuacoatl
newjungle.4.d:0 "In a courtroom at Tenochtitlan stood Starry Glory, his face a stoic mask as the judge read him his crimes.\n\n"...with your actions against the southeast during your paramilitary years, your vitriol-filled speeches against all creaturekind outside of Thestrals, and worst of all, the leaked plans for a Thestral-only state in the southeast by arranging camps for the Neighua and other non-thestrals. You have committed inexcusable crimes against creaturekind; I hereby sentence you to death by firing squad. Take him away."\n\nThe bat stood, rage beginning to fill his eyes. "This cowardice was to be expected of a lesser creatures such as you, your so-called leader not even brave enough to face a chained bat, pathetic. HEED MY WORDS, WE THESTRALS WILL RISE AGAIN. BE IT IN A DECADE OR A THOUSAND YEARS, YOU WILL FACE OUR FURY." As he was dragged away to face his fate, none indulged his crazed ramblings; his vile dream dying as irrelevantly as it had lived.\n\nSomewhere else, deep in the jungles of Ayacachtli, a band of soldiers of all kinds stalked a Thestral warband; their leader keeping a close eye on them through his binoculars. They didn't come here to engage in battle, there was no need for that anymore. All they needed was one shot for this cauldron to disperse. After a few days of no opportunity, one finally presented itself as Caballeron noticed Stars Whirl preparing a scout party to leave the camp for the night. With his soldiers ready, they kept a close eye as she stood tall among her most devout followers, surely some beautiful speech about dying for the nightmare and whatnot.\n\n"At my signal, fire at will." Tense moments passed as pony, griffon and changeling alike waited for a signal, Caballeron with one hoof up in the air as he watched her speech. Once Stars Whirl raised her hoof and her followers did the same, it was the perfect moment of weakness. "FIRE" Dozens of shots rang out, many missing, three connecting: hind leg, stomach and neck. As she fell to the ground coughing up blood, Caballeron issued the final signal. "TARGET DOWN, RETREAT!""
newjungle.4.a:0 "The Southeast free to rest once more"

newjungle.5.t:0 "Purging PON-IES" #Snow #Light Cihuacoatl
newjungle.5.d:0 "In the main courtroom of Tenochtitlan stood Lavender Berry. Watched by judging eyes on all sides and sweating profusely as the judge read his long list of crimes.\n\n"...endangering the population, leading to the deaths of thousands during your purges and repressive measures as secret police chief and leader of IES during the times of the Baltimare Republic. You have committed inexcusable crimes against creaturekind; I hereby sentence you to death by firing squad. Take him away."\n\n"You... YOU CAN'T DO THIS TO ME. I'M INNOCENT, THESE ARE ALL LIES, I NEVER DID ANY OF THIS!" The stallion fell to the ground, tears and sweat streaming down his face. "G-GOLDEN IS THE REAL CRIMINAL, THEY ORDERED ME TO DO ALL OF IT, THIS IS ALL A MISTAKE, YOU'RE TAKING AN INNOCENT LIFE, I'M IN—" A hoof hit his face, his glasses falling to the ground as he tried to understand what just happened.\n\n"You killed my son! No one else did; it was you and your orders that did it!" An elderly mare stood in front of him, having left the jury; no guards moved to apprehend her, none daring to deny a mother's grief. "He did nothing wrong and now he's dead because a sociopathic coward treated his life as just quota to meet!" Tears streamed from her rage-filled eyes as others stood up, the whole room erupting with accounts of his crimes, many having lost loved ones during the purges.\n\nAs the gavel was hit to call for order and the guards dragged him away, broken families stood to see his last few scrambling moments, kicking and screaming for mercy that would never come.\n\nSomewhere else in a farm near Saltlickingham was a lone old creature. Swaying lazily in a rocking chair, watching his maize grow. He was saddened to give up his dreams of Stalliongrad being born in the southeast but glad to finally have some peace and quiet to tend to his farm once more, a letter standing by his table.\n\n"Enjoy your retirement and remember to live a quiet and peaceful life. Signed, Huey Tlatoani Caballeron.""
newjungle.5.a:0 "The PON-IES have been neutered"

jungle.15.t:0 "The Coward's Trial" #Snow #Golden or Maita Cihuacoatl
jungle.15.d:0 "In the main courtroom of Tenochtitlan stood Lavender Berry. Watched by judging eyes on all sides and sweating profusely as the judge read his long list of crimes.\n\n"...endangering the population, leading to the deaths of thousands during your purges and repressive measures as secret police chief and leader of IES during the times of the Baltimare Republic. You have committed inexcusable crimes against creaturekind; I hereby sentence you to death by firing squad. Take him away."\n\n"You... YOU CAN'T DO THIS TO ME. I'M INNOCENT, THESE ARE ALL LIES, I NEVER DID ANY OF THIS!" The stallion fell to the ground, tears and sweat streaming down his face. "G-GOLDEN IS THE REAL CRIMINAL, THEY ORDERED ME TO DO ALL OF IT, THIS IS ALL A MISTAKE, YOU'RE TAKING AN INNOCENT LIFE, I'M IN—" A hoof hit his face, his glasses falling to the ground as he tried to understand what just happened.\n\n"You killed my son! No one else did; it was you and your orders that did it!" An elderly mare stood in front of him, having left the jury; no guards moved to apprehend her, none daring to deny a mother's grief. "He did nothing wrong and now he's dead because a sociopathic coward treated his life as just quota to meet!" Tears streamed from her rage-filled eyes as others stood up, the whole room erupting with accounts of his crimes, many having lost loved ones during the purges.\n\nAs the gavel was hit to call for order and the guards dragged him away, broken families stood to see his last few scrambling moments, kicking and screaming for mercy that would never come.\n\nIn a seat nearby, Cricket Chafer watched the judgement silently, his eyes conflicted. Lavender Berry deserved the fate he got, but shouldn't he and Golden also be held accountable? It was peculiar they would be allowed to walk free and even participate in politics after being openly opposed to Aztlan during the war... he couldn't understand the so called doctor; but he wasn't one to pass up an opportunity."
jungle.15.a:0 "His farm would have to wait a while longer"

jungle.17.t:0 "The Language Recognition Act" #Snow
jungle.17.d:0 "With the Language Recognition Act passed, all schools were now expected to have speakers and offer optional classes in, at least, the most spoken languages in Aztlan. Citlali found himself at class for the first time. Before, learning at the tribe would be enough, but his parents wanted him to go to the capital for better opportunities. 'What a waste of time,' he thought.\n\nAs he idly waited for the teacher to arrive, a thestral arrived at the class. Her mane was long and flowing, clearly well kept. Her pretty little snout, her round face... it was all so...\n\n"Cualtzin... Ah!" He clapped a hoof over his mouth, heat flooding his cheeks. The bat pony's ear twitched slightly, but she gave no other sign of understanding as she took a seat across the room. Citlali thanked the Sun for her not knowing Neighua.\n\nThe mare seemed to write and crumple papers, as if deep in thought. Finally satisfied, she stood, glided to his desk, placed a neatly folded paper before him, and returned to her seat without a word. Citlali unfolded it.\n\n"In my language one would say ki'ichpam, however beautiful also works wonderfully! May I have your name? Mine is Shining Dream." At the end of the message, there was a little smiley face.\n\nReading the note, Citlali covered his face to try stopping himself blushing. From across the room, he heard a soft giggle."
jungle.17.a:0 "Perhaps the city isn't so bad."

jungle.19.t:0 "The Beauty of the Night" #Snow #Light and Maita Cihuacoatl
jungle.19.d:0 "The Lunar Administration in the Southeast had fallen, but that did not mean everything was lost just yet. Stars Whirl commanded the last loyal core of her vanguard; others were scattered, their communications severed ever since the collapse. Thinking back, she should have known the administration could never work with civilians having a say during wartime. Light Narrative was never loyal to their ideals, and Starry Glory was only loyal to his own idiotic ramblings... she never should have trusted that letter.\n\nIn the end, her situation mirrored her first incursions in the region: guerrilla warfare alongside her most loyal companions and they had a job to do. As long as they remained alive, they could wreak havoc through the jungles, make sure these sunnies could not have a single day of peace... and then when Nightmare Moon was done with Equestria, the Southeast would be weakened enough, ready for her taking. Her thoughts were interrupted by an aide coming into her tent, notifying that the soldiers were ready for the night's incursion, all that was left was for her to join them.\n\n"Thank you, dismissed." She walked to the middle of the camp, where a party stood with pristine positioning. These were all those that remained for her to lead, all prime examples of soldiers of the night. Taking her place in front of them, Stars couldn't help but feel pride for these creatures... their dream would never truly vanish as long as any believers were left breathing. She found herself speaking before her thoughts had even finished.\n\n"We have been fighting in these jungles for many months now, the enemy may think us to have given up after we lost Ayacachtli, but as the Moon's vanguard, our duty is eternal! Let every single night be a nightmare for those who oppose her will! May eternal night find its way to all who devoutly follow her! PRAISE—"\n\nIn an instant, dozens of bullets rained upon Stars, she felt the ringing pain all throughout her body as she tried to speak for her soldiers to take cover, but no words came out, only splatters of blood from her neck. As she gurgled, her last thoughts were of the beautiful night sky. Her final sight, as if the Moon were giving her one final embrace."
jungle.19.a:0 ""TARGET DOWN, RETREAT!""

newjungle.6.t:0 "The Doctor's Due" #Snow #Caballeron and Daring Confrontation
newjungle.6.d:0 ""You're repeating the same mistake as you did in 'Daring Do and Fleeting Jade', when Doctor Caballeron tricked you by calling you over to negotiate surrender, almost getting you down for the count." Quibble followed Daring as they walked up a hill, clearly more fatigued than the mare. "He's gonna trick you again and you don't even have the Lasso of Equity with you to turn the tides as you did back then!" Quibble complained "The right way to do this would surely be to—"\n\n"THIS is the right way," Daring cut him off. "Lesson one, Quibble: 'Heroes. Never. Lose.' It doesn't matter if he has a thousand schemes; I'll beat him up and bring him to justice a thousand and one times. If you're too scared you can stay here."\n\nAs they climbed, the villain's silhouette came into view. It was— "Caballeron!"\n\n"We meet again, Daring Do! It has been awf—" He couldn't get another word out before she tackled him to the floor. Punches and kicks began to fly. Tussling was something both of them were very familiar with. "Enough!" Caballeron gave her a well timed kick in her abdomen, pushing her away from him and leaving her winded.\n\nShe attempted to get up, her body tired from the restless days marching by the jungle... she had been careless. Caballeron stood over her, his victorious gaze accompanied by a smug smile. Her hooves shook against the floor and her wings flapped desperately as she tried to muster the strength to stand, shouting at her longest-standing enemy. "So what now?! You get rid of me like all the others who were a problem for you?!" Vitriol in her eyes, Daring's shouts echoed throughout the valley, mirrored by Caballeron's menacing laugh. Daring prepared for her final stand, that same mantra echoing on her mind."
newjungle.6.a:0 "Heroes never lose..."

newjungle.11.t:0 "Defeat? Never!" #Snow #Happens if Daybreaker has not ascended, Equestria is alive or either of the previous two happened AND Caballeron decided to remain neutral
newjungle.11.d:0 "Should she duck? Weave? Jump at him? A million ideas ran through Daring's head, her body struggling to keep up with her plans of action. Before she could do anything, a single envelope fluttered down and landed before her. "Open it. I am sure you will like the contents." Caballeron said smugly.\n\nAs Daring tore open the envelope, the words seemed to make no sense at all... she read once, twice, thrice even! But the words didn't change. "'Daring Do is henceforth acquitted from any criminal acts having been done against the government or creatures of Aztlan.' What do you mean?! What is this?!" Confusion filling her mind, Caballeron only laughed in response.\n\n"It is as it says, Daring Do. You would have known earlier had you not attacked me. Frankly, you are too... emotional." He smirked "You see, while you were out playing pretend in the jungles, I had a nation to take care of... the millions of creatures that YOU failed." She winced at the statement.\n\n"Face it, Daring Do: you are nothing but a scared foal who does not know how the world works." As motors revved, Caballeron looked away. "That is my cue, decisions are happening over dinner and I cannot miss them for playing with you any longer. Goodbye, Daring Do!"\n\nAs his silhouette went further and further away, Quibble came to check up on her, whatever annoying remarks he was spouting fell on deaf ears. Daring had finally understood: she couldn't do this by herself. She needed to gather her friends and take down Caballeron before he could do any harm to the southeast. With them alongside her, even the webs of bureaucracy that Caballeron set up to protect himself would not save him from justice! As she quickly got up and marched off, Quibble could only run after her."
newjungle.11.a:0 "...not as long as they never give up!"

newjungle.86.t:0 "The Doctor, Bearer of Bad News" #EQS dead or daybreaker ascended version, if Caballeron went to right path
newjungle.86.d:0 "Should she duck? Weave? Jump at him? A million plans flashed through Daring's mind, her body struggling to keep pace. But something felt off. Caballeron just kept laughing as she braced for her last stand.\n\n"W-What's so funny?!" Daring stammered, using the moment to catch her breath. "Got you right where it hurts, huh, Caballeron?!"\n\nAs she felt strength returning to her legs, his laughter ceased. "Oh, please! I am simply bemused by the foolishness you cannot seem to shed! I come here to offer you a second chance, and you treat me like a common villain? I never thought a single-minded pursuit of revenge would blind even the great Daring Do. Really, it's..." Steadying himself, he looked at her, his expression shifting to surprise. "You... you haven't heard, have you?"\n\nDaring knew she shouldn't lower her guard around anyone, least of all a scoundrel like Caballeron. But she gave him the chance to speak as she regained her breath, and as she did, she found herself growing more and more horrified by what she heard. As he recounted the fate of Equestria, Daring could not help but feel despair. She had entirely missed the catastrophe during her jungle escapades, too focused on toppling him... Caballeron was right. Her single-track obsession had blinded her. She hadn't been there for Equestria in its hour of need, and now it was too late.\n\nThat was, until she saw the hoof extended toward her.\n\n"Come now, 'hero.' Haven't you heard of a team-up story before?" Caballeron offered a thin smile. "I'll need help if I'm to save Aztlan from this madness. So, are you and your buffoonish sidekick going to fight for it, or will you lie down and give up?"\n\nDaring looked at the outstretched hoof, hesitation hanging in the air for a moment. Then, with a resolute smile and a surge of strength, she took it and rose."
newjungle.86.a:0 "...because they never give up!"

newjungle.87.t:0 "Equestria Invades Us!" #War with Equestria due to taking too long to ally them
newjungle.87.d:0 "An emergency meeting had been called by Caballeron after the news arrived of a formal declaration of war. Aztlan was meant to be a safe haven in the Southeast with enough formal recognition and basis to exist, that it would hamper Equestrian will to attack it.\n\nClearly, that had failed.\n\nThe Equestrian diplomat was eager to leave after delivering the message, but Caballeron urged them to stay until day's end so he could convene with his advisors. As Aztlan's most influential figures gathered, the room grew tense with bickering – until a hoof slammed the table.\n\n"SILENCE! ALL OF YOU!" Caballeron shouted, his usual composure gone. The room fell quiet. "Our federation has just begun, and already its existence is threatened..." He sighed deeply. "There are only two ways out of this mess. We can call this a tragic misunderstanding before blood is shed, join the UPA and negotiate for formal recognition of our independence..." Caballeron went quiet, a thoughtful expression taking his face.\n\n"What's the other option, boss?" Biff asked. Caballeron looked up once more, with a fiery determination in his eyes.\n\n"Show the world that Aztlan is not to be messed with.""
newjungle.87.a:0 "Peace can still be achieved if we act quickly!"
newjungle.87.b:0 "We'll show the imperialists how much they messed up!"

newjungle.88.t:0 "Aztlan Sues for Peace" #Equestria peace offer diplo event
newjungle.88.d:0 "Our diplomat has returned after delivering our declaration of war to Aztlan, but they return with dire news. Before the conflict could truly escalate, Aztlan has already called for peace talks, claiming the situation to be a grave misunderstanding and that they always hoped for friendship with Equestria.\n\nTheir terms are simple: they will join the UPA in exchange for recognition of their independence, with both nations putting this short, tragic incident behind them.\n\nGaining a willing ally in the southeast without bloodshed would be a great boon – far better than a grinding jungle war. Yet some argue they sue for peace only because they face impossible odds. Our troops are already mobilized, and without a swift decision, more soldiers may die needlessly."
newjungle.88.a:0 "Apologize for the misunderstanding and accept their offer."
newjungle.88.b:0 "The Southeast is rightfully Equestrian and peace shall only come once it returns to the fold!"

jungle.22.t:0 "The Fate of Aztlan" #Join UPA choice
jungle.22.d:0 "Caballeron paced back and forth around his office. He had gotten a second in command, but it seemed like the mountain of expectations only grew by the minute. His profiteering project had gotten so off his hooves it had truly become a country. Yet, he still had to face the greatest trouble of any nation...\n\nStaying independent.\n\nThe idea of Aztlan may have been his brainchild, but it did not come from nothing. Equestria may have been tangled in its own civil war, but wars don't last forever. Eventually northern forces would look south and see Aztlan as yet another province that slipped away in the chaos of war; yet another opportunist to dethrone. Aztlan could fight for its independence, Caballeron was sure he could rally the creatures to yet another bloodbath, but was that what he wanted? War is only profitable when it's not on your shores after all.\n\nThe other option was the UPA. Aztlan could realign itself to it, but not as a returning territory, oh no. As an equal. It was a laughable idea on paper, but it had its benefits. No invasion, open trade, a shield against any other foreign threats... but it'd also mean tying the region's fate back to Canterlot once more. Aztlan would live and die fighting alongside Equestria. \n\nHe'd have to spin some tales to ensure everypony was appeased, but he was sure he could get the Southeast onboard with whatever course of action he decided. The true issue was deciding..."
jungle.22.a:0 "Send the offer."
jungle.22.b:0 "Aztlan fought to be independent, not tied to Canterlot once more!"

jungle.23.t:0 "The Offer" #EQS choice
jungle.23.d:0 "We have received a message from Aztlan's "Huey Tlatoani", as their leader seems to calls himself. Despite having taken advantage of the civil war to establish a rogue state, he has surprisingly come with an offer to rejoin the United Ponies Alliance. But there is a catch: Caballeron has not offered for the Southeast to be rejoined into Equestria, but instead comes to the table hoping for an equal partnership, where Aztlan would be allowed to remain independent.\n\nWhile he is seen as an opportunistic scoundrel, there is merit in hearing him out. We might be setting a bad example by allowing a secessionist province to simply do as it pleases, but having an ally in the region is better than having yet another enemy. He has seemingly been able to stabilize the region and is even respected by the locals. If we can bring him back into the fold, perhaps we can avoid further bloodshed."
jungle.23.a:0 "Tell Caballeron he has a deal."
jungle.23.b:0 "We do not negotiate with rogue statelets."

jungle.24.t:0 "Equestria Accepts" #EQS UPA yes
jungle.24.d:0 "The Equestrian government has agreed to our plea! While Aztlan may have tied itself to the UPA, it will be allowed to remain independent and enjoy the benefits of the alliance as an equal partner. This means that Aztlan's fate is now tied to Canterlot's, but it also means finally taking another step towards peace in the bloodied continent."
jungle.24.a:0 "To a new era where the Southeast is equal to Canterlot!"

jungle.25.t:0 "Equestria Declines" #EQS UPA no
jungle.25.d:0 "The Equestrian government has rejected our plea! Noting they do not desire allying themselves to a rogue statelet as an equal partner, even if it meant avoiding further bloodshed in the region. While this is disappointing, it is not entirely unexpected; it simply means some changes to policy, considering that now Aztlan truly stands alone..."
jungle.25.a:0 "Damn it!"

newjungle.12.t:0 "A New Home" #Snow #Economy event, non-main story
newjungle.12.d:0 "Herzland was meant to be Griffonia's heart, its greatest region... but the recent wars had left Augustin fearful for the future. He didn't know what that future held for his chicks back home. He had vaguely heard of the conflicts overseas, but it seemed one region had found a safe corner and was apparently thriving compared to the rest of the continent. He was indecisive at first, but life is meant to be lived, and so he booked passage for his family to spend the next two weeks there.\n\nAs he strolled by the hotel pool, the scent of salt air and frying plantains thick in the warm breeze, that feeling of relief began to shift into something else. To see his chicks running around without a care in the world. To see his wife, who had not smiled in months, finally let down her guard. What was this Aztlan place...?\n\n"Look, Papa!" his youngest chirped, pointing at a mixed group of ponies and griffons playing. Augustin watched them for a moment, then looked back at his own chick, who was pleading with his eyes. He waved a claw, laughing as he saw the chick running smiling to get his brother. He chuckled to himself and headed to the bar for a drink, wishing they could simply pack up and live in a small, peaceful town with a climate and friendly creatures like here in this hotel.\n\nAs he reached the bar, he noticed a neat display with pamphlets for the... 'immigration and residency office.' He took one without much thought. 'Skilled worker visas and possibility for permanent settlement. Consult your nearest immigration office today.' The bartender finally came to take his order, but Augustin raised a claw stopping him."
newjungle.12.a:0 "Tell me... where is the nearest immigration office?"

newjungle.13.t:0 "Tourist Trap" #Snow #Economy event, non-main story
newjungle.13.d:0 "Gerard had a middling inheritance from his ailing father, and it was simply burning a hole in his coin purse... so he decided to grieve by enjoying another fresh drink at the pool. The cozy resort of Stableside was everything the brochures promised; it was so liberating to have his every need attended to at any hour, with the staff running to fulfill his every wish... and the mares were quite nice-looking, too. He had truly found bliss here in Aztlan.\n\nAnd so, he just had to stay longer and indulge in their culture! Smoothies, gourmet banquets, access to a private beach and even a casino! One where he had a few modest losses, but it was all in good fun, nothing he couldn't afford! Aztlan was simply perfection. A hidden gem for the discerning traveler who'd grown tired of the stuffy old resorts of Griffonia. He barely even recalled his father's name by the end of his trip, so relaxing was the week.\n\nOn his final morning, Gerard packed his bags with a contented sigh, already mentally composing the glowing review he'd leave. He strode to the front desk, a confident smile on his beak. "The bill for room 407, if you would."\n\nThe receptionist nodded. "Of course, sir. We hope you enjoyed your stay!" Her hooves danced across an abacus with soft, rhythmic clicks that began to sound ominous as the seconds stretched into a minute. Finally, she finished her calculations and presented the bill with a practiced smile.\n\nGerard's own smile faltered as his eyes tracked down the list. The numbers at the bottom swam before his eyes. The total was a figure with which he could have bought a small house. "This... this is a mistake," he stammered, his claw trembling as he pointed. "It was all stated as complimentary in the brochures!"\n\nThe receptionist's smile didn't waver. "Oh, absolutely, sir! The experience was integrated into the room! But so were the sourcing, preparation, and service you received, which you acknowledged upon check-in!" She smiled. "So, will it be check or cash?""
newjungle.13.a:0 "Thank you, and thanks for the bits!"

jungle.31.t:0 "City Lights" #Economy event, non-main story
jungle.31.d:0 "As his family rested, exhausted from the long day's sun, Shimmering Moonlight found himself unable to sleep. He stood by a small square window that offered a view of a million lights spreading through the night sky. The room was thankfully cool, a welcome respite from the heat he had endured. It felt strange to be alone; his whole life had been one of intimate huddles with his family. Here, for today at least, he had his own room.\n\nThe city was all lines. Hard lines of brick and stone, sharp lines of light, straight streets that cut into the land without care. Even this room was all lines, perfectly sculpted into a little square that was all his. From this height, he could see the sea for the first time. Distant and uncaring, it should have been the most fantastical sight... but it was caged between hundreds of buildings that separated him from it. And even that was somewhat comforting.\n\nThe day had been oppressive. They were accustomed to the rhythm of the cave. A full day of relentless heat and the uncaring bustle of thousands had exhausted him and his family. Back home, they could gaze at the stars whenever they wished; it had always been a point of comfort and faith. Here, not even that solace was given. The true sky was gone, replaced by lights that never yielded, not even this late at night as a lone thestral watched from his hostel room. It should have felt terrifying... yet, it didn't.\n\nHe felt a strange calm settle over him. This bright, sprawling place didn't need him. It didn't care about him. And in that indifference, there was a terrifying, exhilarating freedom. His reflection, faint on the window, was superimposed over the grandness of Baltimare. Shimmering realized in that bright night that he was not meant for the mountains."
jungle.31.a:0 "He had found where he belonged."

jungle.32.t:0 "A Rowdy Welcome" #Economy event, non-main story
jungle.32.d:0 "When Rusty Bolt signed up to work in the interior, he expected at least some basic amenities for city folk. What he found on the journey was mosquitoes, overgrown weeds, and even more mosquitoes. The trek had been exhausting, and he couldn't wait to finally reach the plaza he'd been promised so he could just lay down and rest. As he reached what seemed to be the edge of the village, he noticed the figure of a stallion who looked somewhat anxious and dazed. When Rusty approached, the stallion's worry melted away, and he marched forward to meet him.\n\n"Ximopanōltih! You are the one from Baltimare, yes?" The stallion gave him a hug that took Rusty completely off-guard. "I am Tecuetlaza, your host. I hope you enjoy your stay!"\n\n"Woah, woah!" Rusty backed off. "I'm not meant to be staying with anypony. I'll be staying at..." Sudden realization hit him. "Tlaza..."\n\n"That's me!" The stallion simply smiled. "Now come, I must show you the village before you can rest." Before Rusty could argue, the stallion was already marching off. He simply sighed and followed. As they trotted about, he noticed it was a tidy little place, certainly less of a headache than Baltimare. It was also refreshing to breathe without feeling like a smoker. By the time their little tour was done, Rusty felt as if he had met more creatures than in his whole lifetime. Strangely, he didn't feel as tired as before.\n\n"So, here is where you'll be staying! It's not much, but I hope you can make yourself comfortable." Rusty gave a small smile and went to set his things down. It was a two-room home: a small lounge and a bedroom; larger than Rusty's place in Baltimare. He went to the bedroom to lie down but stopped in shock. There was... only one bed. He looked back towards the lounge, where Tecuetlaza was preparing tea, then back at the bed. He shrugged and laid his things down."
jungle.32.a:0 "Not like Baltimare's apartments were known for their personal space either."

##Left Path Events##

newjungle.31.t:0 "Stubborn as a Mule" #Snow #Daring Do event line 1
newjungle.31.d:0 ""That's the trick!" Daring leaned forward towards Maita; the large stallion weaving a basket, even as he listened to her. "He's pretending to be good so you don't see when he uses the Neighua for his misdeeds!"\n\n"He is not a perfect stallion," Maita conceded, his hooves never pausing. "But nopony is, and he has done good for the Southeast. It would be wrong to turn on him." Daring opened her mouth to argue, but he continued gently. "And you should know better, friend. The Neighua are not foals in distress that need saving. The tribes have chosen to trust him for a reason, please do not belittle their will."\n\nSeeing the shame in her eyes, Maita's expression softened. "I could speak to him. Perhaps we could all sit together, that would allow you to better converse." Daring stood up abruptly and looked away. Maita nodded slowly, his smile sad. "You are always welcome here. I wish you safe travels, old friend."\n\nShe left the village at a brisk trot, the heat of the day now feeling oppressive. She didn't have to go far. Quibble Pants was waiting for her just off the main path, leaning against a tree with his signature look. "So? Let me guess. He listened intently to your well-reasoned arguments about Caballeron's inevitable betrayal, was moved by your passionate plea for justice, and is now rallying all the Neighua to your cause as we speak." Quibble's jaw dropped in mock surprise as she grit her teeth. "No! You mean the charismatic leader who provides stability and food is popular? That's a twist I didn't see coming!" Daring kept walking and ignored his quips. He fell into step beside her. "Look, I'm just saying, your 'rally friends' plan is hitting some snags. Maybe we need to re-evaluate."\n\n"Maita is one ally." She began to pick up her pace, heading deeper into the jungle, away from the pain of the rejection. "Crescent Glow and Good Word are out there somewhere. They'll listen. They know what Caballeron really is.""
newjungle.31.a:0 "Someone will listen..."

newjungle.32.t:0 "The Woes of Fame" #Snow #Caballeron event line 1
newjungle.32.d:0 "The Neighua knew how to make a commemoration feel electric, but a more traditional party was comforting in its own way. The only thing that ruined it was the creatures he had to share it with: foreign investors and local rich ponies. Dealing with one or two of those was fine, but getting ambushed by one after the other, hour after hour, was simply exhausting.\n\nAs Caballeron went for a drink at the refreshments table, he bumped into an older-looking stallion. Before he could apologize, the two met eyes. "Color me surprised! Doctor Caballeron, esteemed archaeologist," he gave a curt bow, "and our dear Huey Tlatoani. It is such a pleasure to make your acquaintance."\n\nCaballeron felt something strange as he looked at the stallion: well-dressed, well-groomed, with fine posture and annoyingly good-looking. "That is all me, indeed. And you are?"\n\n"But of course, forgive my lack of transparency! I am Darling Angel, a collector and lover of all things beautiful," he said, extending a hoof. "I am a big fan of all you have done for the Southeast." Caballeron was quickly growing uncomfortable. More than any of his other annoying features, there was one that latched deeply onto all his instincts: this stallion was lying through his teeth. As he gave a curt nod and prepared to return to the festivities, he was halted by the stallion continuing to prattle on. "Say, I have quite a fortune and a graceful collection of artifacts. Perhaps we could meet in private at a later date to better discuss how I could assist the nation? I am sure we both have much to gain from being... partners."\n\nThat was it for Caballeron. He stepped closer to the stallion and leaned in to his ear, his smile faltering. "They say a good liar can recognize another liar. And I have grown quite proficient at that. Don't do anything stupid, 'Darling'." Getting that off his chest, the Doctor walked away, leaving the unpleasant interaction behind."
newjungle.32.a:0 "The look on Darling's face was enough recompense for his time"

newjungle.33.t:0 "A Light at the End of the Tunnel" #Snow #Daring Do event line 2
newjungle.33.d:0 "Daring kicked a rock as hard as she could. She had contacted every single pony she knew in the Southeast, and it all led to the same dead end. An adventure was meant to be shared; they were supposed to be hopeful. She wondered how Equestria was faring, but she couldn't go back! Not until she brought Caballeron to justice...\n\n"You know, as much as I enjoy being a hero, maybe it's time we threw in the towel here? Frankly, I really gotta get back to my—"\n\n"Good day to you. Daring Do, am I correct?" An impeccably dressed stallion approached them. "I am Darling Angel, a collector and lover of all things beautiful." He took one of her forelegs and left a brief kiss upon it. Trying to ignore her growing blush, Daring glanced out of the corner of her eye, catching a rather unimpressed Quibble Pants looking on with annoyance. "And of course, her... companion."\n\n"N-Nice to meet you, too. This is Quibble Pants; he's been accompanying me as we—" The stallion didn't seem to pay much attention, if any, to Quibble. He was much more entranced by Daring herself.\n\n"Oh dear, you are simply in a terrible state! Your clothes are tattered, you are clearly not eating enough, and worst of all... I hear you have been wronged by that scoundrel Caballeron." Daring seemed to wilt a little at that, but Darling quickly raised a hoof. "Say no more! He too has wronged me, but much worse than that, he has wronged a beautiful mare such as yourself. That is simply unforgivable. Say, why don't you come with me to my abode? I live nearby; you can stay as long as you need, and we could better discuss our... shared goals." Daring was taken aback by the offer. Like a knight in shining armour, Darling had appeared, and yet...\n\n"I'm really thankful for the offer, but... there's still something I have to try. I'll keep you in mind, is that alright?" Darling looked a bit taken aback for a moment before smiling and giving her hoof a parting kiss."
newjungle.33.a:0 ""I'm sure you will.""

newjungle.34.t:0 "Keeping the Peace" #Snow #Caballeron event line 2
newjungle.34.d:0 "Caballeron sat behind his desk, the rhythmic tap of Rogue polishing a rifle the only sound. Before him stood three of his lead mercenary captains: a griffon, an earth pony, and a changeling, each commanding sizable portions of Aztlan's force. Biff and Withers flanked the door, still as statues.\n\n"The boys are talking, Doc," the earth pony finally said, breaking the silence. "They're asking what's next. We ain't exactly settlers, and we're working on a very well-defined paycheck, if you'll recall." Both the griffon and the changeling nodded in agreement. "I get that you're bringing in the bits as usual, but fighting's also an important part of being a merc."\n\nCaballeron let the words hang, a faint, knowing smile playing on his lips. "But of course. A blade unused goes dull. You think I do not know this?" He chuckled. "You are still free to fight abroad for the extra money. But remember: as long as Aztlan stands, you are not a simple mercenary cadre. You are soldiers of Aztlan and this is where you will come back to. Trust me, it will make you worth twice your price later."\n\nThe three mercenaries glanced at each other, then back at their employer. With quick nods, they filed out, allowing a sigh to escape Caballeron. "Always a new issue with these mercenary types, it is saddening to see how low the standard falls with time. There was a day when a gentlepony knew how to conduct proper business." He began to rise from his chair. "Furthermore, Rogue, you can stop cleaning that rifle. It was only meant for intimidation."\n\nThe gruff pony quickly set the rifle down, looking embarrassed. "You should've told me, boss! I've been doing my best to get this thing clean, but it seemed to only get dirtier because of this rag you gave me!" Caballeron only laughed in response."
newjungle.34.a:0 "Money and words go a long way."

newjungle.35.t:0 "Daring Do and the 'Great Plan'" #Snow #Daring Do event line 3
newjungle.35.d:0 ""This is insane," Quibble Pants hissed as he pushed the cart around the building. He was wearing a maintenance coverall they had grabbed in a rush from a cleaning closet. "Even for you, this is certifiably insane. We're going to get arrested for trespassing!"\n\nDaring eased the cart's lid open a crack, peering down the empty hall. "We're not trespassing! He's the criminal! Now, stay quiet or you'll blow our cover. His office should be two doors down on the left." They soon reached a door labeled 'HUEY TLATOANI'S OFFICE.' With a quiet nudge of the cart, Daring set to work on the lock.\n\n"Is somepony there? Come in." As the voice called out from inside, time slowed down. Daring sprang from the cart, and in one motion, yanked open the nearest window and grabbed Quibble as she jumped. The two hung on the ledge, warm night air hitting their faces, as they heard the office door open. "What is that doing there? Did I scare the new janitor?"\n\nDaring didn't wait. She dropped and flew into the shadow of an alley with the other pony in her grasp. "See? Clean escape!" she panted, leaning against the cool brick. "Now we just need to think of another way to get in there..."\n\n"Clean?! They almost caught us!" Quibble was beyond annoyed; he seemed... scared. She couldn't deny she was exhausted, she had never spent so long on an adventure. Caballeron's web was tighter than she'd ever expected. As Quibble launched into a whispered rant, Daring's hoof brushed against an inner pocket of her satchel, brushing against the edge of a card. She didn't remember putting anything there. Taking it out she saw the name: Darling Angel. A charming stranger with resources and that had offered a safe harbor. She could certainly use it. \n\n"Look, Quibble, you're free to leave if you want. I... thanks. For staying by my side so long." She turned around to avoid having to stare him in the face. "I'm going to meet Darling now, I wish you luck." She began to trot off and was stopped by a shout."
newjungle.35.a:0 "I didn't say I was leaving! This is a book in the making!"

newjungle.36.t:0 "A Visitor from Abroad" #Snow #Caballeron event line 3
newjungle.36.d:0 "The diplomat had been waiting in the antechamber for precisely seventeen minutes. Caballeron knew this because he'd ordered Withers to time it. A little waiting did wonders for establishing the proper tone. When the doors finally opened, the diplomat – a middle-aged mare – entered with poise. "Mr. President. Thank you for seeing me on such short notice."\n\n"But of course! Your nation is a friend to Aztlan, after all. Please, do forgive the delay; some urgent business required my attention." He offered a broad smile. "May I offer you something to drink?" She took her seat, her eyes performing a slow, discreet sweep of the office. It was tastefully furnished with Neighua tapestries. Her gaze lingered for a half-second on a particularly fine obsidian figurine on the shelf behind his desk. Caballeron's smile didn't waver as he quietly poured the water, even without a response. "I trust your journey was comfortable? The roads have undergone significant improvement these last few months."\n\n"The progress is remarkable, given the circumstances. Few could deny the stability you've brought to the region. It's certainly unique to see such stability in a war-torn continent such as Equus."\n\n"Unique. Yes, it is quite a unique circumstance." Caballeron chuckled, taking his own seat. "One does not build a federation from scratch every day." He noticed her gaze wandering to yet another artifact and let out an amused laugh. "Please, do not be troubled. Everything here has been fully documented, I assure you."\n\nThe diplomat looked faintly flustered. "I didn't mean to imply—"\n\n"No implication taken!" he interjected, his cheer undimmed. "It is a natural question. You must only know me from Daring Do's... let us say, colorful memoirs. But those are adventure stories. This is governance. Far less exciting, but far more... legitimate." His eyes gleamed. "Now, to business. I believe we can offer a most favorable rate for grain...""
newjungle.36.a:0 "Diplomacy is a battlefield as any other; strategy is key to getting what you desire."

newjungle.37.t:0 "A Much Needed Safehaven" #Snow #Daring Do event line 4
newjungle.37.d:0 "The path through the jungle was exactly as Darling Angel had described: a thin, serviceable road that gave way to flagstones winding through lush, overgrown gardens. Exotic, placid animals watched them from the shadows. At the end stood an opulent manor. Shortly after they knocked, Darling Angel greeted them with his customary smile. "Daring Do! And the ever-faithful Mr. Pants! You honor my humble home. Please, come in out of the humidity."\n\nInside was a collector's paradise. Trophies, artifacts, and artworks from across Equus filled every shelf and wall, each meticulously kept and displayed. Darling led them on a grand tour, his voice a pleasant murmur as he shared a charming anecdote for each piece.\n\n"It's all so... incredible," Daring said, her eyes wide despite herself. The sheer opulence was a world away from her usual digs or her own humble home. "But, Darling, we need to talk about why we're here: Caballeron. We need a plan. You said you wanted to help."\n\nDarling waved a dismissive hoof, his gaze lingering on a crystalline sculpture. "All in good time, my dear. Strategy requires a clear head, and you look as though you haven't rested properly in ages." He turned his dazzling smile back to her. "There will be plenty of time for plotting. For now, rest. Consider my home your sanctuary."\n\n"You... but I..." Daring sighed. "You're right." The tension in her back eased for the first time in months. "A short break wouldn't hurt."\n\n"Splendid! I'll fetch the cups and a bottle. The shower is just down that corridor. Please, refresh yourselves while I prepare our refreshments; if you will forgive the turn of phrase."\n\nAs Darling walked away, Quibble leaned close to Daring. "This place is giving me the creeps. I hope you're not planning to stay long."\n\nDaring just shook her head, a weary smile on her face. "You worry too much. He's just a tad eccentric, not a villain! Besides, isn't this what you wanted? A place to finally rest for a minute?""
newjungle.37.a:0 ""Now, where was that shower?""

newjungle.38.t:0 "Hustle and Bustle" #Snow #Caballeron event line 4
newjungle.38.d:0 "The site for the railyard bustled with activity in every corner; even Caballeron was present that day, surveying the construction. Listening with half an ear to an engineer's droning report, he felt as if he could drift away at any moment. They were both startled by a sudden shout.\n\n"Boss! A-And Mr. Huey Tlatoani! You need to see this!"\n\nEager for any excuse to free himself from the yapping, Caballeron was at the trench edge in moments. Below, where a shovel had bitten too deep, the soil gave way to ancient, fitted stone: a wall carved with the distinct markings of an ancient Neighua period. For Caballeron, the world narrowed to that stone. The sounds of the construction site faded. He had seen such markings in his books, but few examples from this period remained in such pristine condition; despite its age, it had resisted time remarkably well.\n\n"Mr. Huey Tlatoani?" The forepony's hesitant voice hauled him back to the present. "What should we do?" The curious crew had stopped, gathering around and waiting for instructions.\n\n"Is it not obvious?!" he declared, his voice ringing with a conviction that surprised even him. He pointed a hoof at a stunned aide. "Send for the chief of the nearest tribe! Immediately!" He turned back to the trench, his eyes alight. "Not a single stone will be disturbed without the proper rites observed." As the crew scrambled to obey, Caballeron remained at the edge, looking down. For all the items he'd ever sold, for all the titles he'd acquired, this felt like a different kind of treasure altogether."
newjungle.38.a:0 "An archaeologist's heart is not easily dismissed."

newjungle.39.t:0 "The Burden of Conscience" #Snow #Daring Do event line 5
newjungle.39.d:0 "Four months. four months of elegant meals, soft beds, and a gnawing, restless guilt that grew louder with each passing day. Daring paced the length of the sitting room, her wings twitching. Quibble watched her from an overstuffed armchair, his own anxiety written clearly on his face. The 'short break' had become a vacation by this point. She had to do something.\n\nDarling entered the room, humming lightly as he carried a tray of pastries. "My dear, you'll wear a trench in the marble. Have a macaron; they're exquisite today."\n\n"No, Darling!" Daring stopped pacing to face him directly. "We've rested! We've been clear-headed for months! We need a plan to expose Caballeron, to rally support, to do something! You promised you wanted to help."\n\nDarling set the tray down with a soft sigh, his smile twitching. "Daring, Daring... always so impetuous, so heroic. These things simply cannot be rushed. Just wait a bit more, I promise you."\n\n"I've done more than enough waiting! If you're not going to help, then we'll do it ourselves. Thank you for hosting us, but Quibble and I are leaving today."\n\nDarling's pleasant mask finally slipped. The warm charm evaporated as he let out a long, disappointed sigh. "I truly didn't want it to go this way. I had so hoped you'd come to appreciate my hospitality." He slammed a hoof on the ground. The response was instantaneous. Hidden panels in the floor slid open. Before Daring could even spread her wings, a section of the floor spun and slammed upward, catching her on the head.\n\nDaring felt so foalish. As her consciousness faded, she heard screaming. "No! Damn you, come back here! Argh, no matter! He was never the prize... you were... my dear..." As his voice began to fade, Daring could only feel thankful that Quibble had escaped; she'd never forgive herself if he had to suffer for her mistakes."
newjungle.39.a:0 "Heroes... never... lose?"

newjungle.40.t:0 "The Spice of Life" #Snow #Caballeron event line 5
newjungle.40.d:0 "Caballeron was savoring a glass of decent brandy when that peace was suddenly shattered by a commotion. Raised voices, a scuffle, and the unmistakable sound of his goons grunting in exertion were followed by the doors bursting open. A disheveled, panting stallion tumbled through. "I tried to stop 'im, boss. But he's like a bull."\n\nCaballeron set his glass down, studying the panting intruder. Mud-spattered, wild-eyed, and vibrating with panic. The face was irritatingly familiar. "You. I know you." Caballeron said, his voice dripping with annoyance. The stallion stumbled forward. "You are that idiot of a pony who set off the pressure plate traps at the Temple of Chicomoztoc! You cost me the Seven-Sided Chest! All because you couldn't stop blabbering!"\n\nThe pony, still gasping for air, waved his hooves frantically. "There's no time for that! Daring is in danger! Real, right-now danger!"\n\n"How tragically ironic." Caballeron leaned back. "And what does that have to do with me? She has made her disdain for my methods perfectly clear. Let her heroic instincts see her through."\n\n"He's got her!" He shouted, his voice cracking. "That pony, Darling Angel! He's a psychopath! He knocked her out and took her somewhere in that mansion of his!"\n\nThe name extinguished Caballeron's smirk instantly. "Darling Angel... describe him."\n\n"Fancy, smarmy, kept calling her 'my dear,' has a mansion full of creepy trophies. But please, you have to help! I don't know who else to go to!"\n\nA low, humorless chuckle escaped Caballeron. "I told him not to do anything stupid." He stood up. "It appears he lacked the sense to listen." He walked around the desk, heading for a cabinet and pulling out a worn leather satchel. "You three! We have a pest to deal with." He glanced back at the stunned visitor. "Well? Are you coming... whatever you are called? Or would you prefer to wait here and draft a critique of how this rescue operation should be plotted?""
newjungle.40.a:0 "It seems the hero requires saving from a far less charming villain – oh, the indignity."

newjungle.41.t:0 "End of the Run" #Snow #Daring do and Caballeron event line 1
newjungle.41.d:0 "The signs of Caballeron's passage were everywhere. Overturned statues, disabled pressure plates, the unconscious forms of guards slumped against the walls. But it had not been easy getting here. Biff and Rogue were off fighting a tiger to allow Caballeron to keep going. Withers had stopped to hold down a door as they were being chased. And Quibble... he'd last seen the panicked stallion sliding down a tilting floor into a library that had then sealed shut. He hoped they were all alive, but he had to keep going.\n\nHe felt like he had been running down that staircase for a few minutes at this point. Until finally, a light revealed itself at the distance. The room beyond was a cavernous space, a museum of pilfered grandeur. And there, in the center, was the only piece that mattered. Daring Do hung in a cage of ornate, gilded bronze, suspended by a heavy chain from the distant ceiling. She was bruised, her wings bound, and most disgustingly, she wore an ornate dress.\n\n"Caballeron!" Her voice was hoarse. He didn't answer. He just started walking, a low, determined march across the wide, empty marble floor. "Stop!" Daring's cry echoed in the vast space. He didn't slow. He began to pick up his pace. That pedestal was the control. He just had to reach it. "It's a trap! He's right behind you!" As Caballeron turned, he saw—\n\nA loud, echoing explosion of noise filled the room as the doctor crashed to the marble with a heavy thud. As Daring looked on in shock, she felt powerless as that monster's slow laugh began to echo from the staircase as he slowly marched forward"
newjungle.41.a:0 "Heroes never lose... but villains do not have such privileges."

newjungle.42.t:0 "Never Punished" #Snow #Daring do and Caballeron event line 2
newjungle.42.d:0 "Darling Angel stepped fully into the light, the elegant pistol still smoking faintly in his grip. His eyes, bright with a fanatical gleam, were locked solely on Daring. "Oh, my dear... look at what your insistence has wrought," he said, gesturing with the pistol toward the fallen doctor. "A crude ending for a crude stallion." He slid the pistol into a hidden sheath within his tailored coat and began to slowly pace towards the cage, his voice swelling with unrestrained grandiosity.\n\n"With Caballeron gone there is no one left in this jungle with the wit or the resources to oppose me." He stopped, spreading his hooves wide as if addressing an invisible audience. "No one even knows you or the good doctor are here. You simply... vanished. A tragic, unsolved mystery. And I? I am free. Free to expand my collection, free to reshape the antiquities markets, free to do as I please without some uncouth creature sticking their nose in!" He threw his head back and laughed. "It's perfect! The ultimate—"\n\nTHWUMP.\n\nThe sound was a heavy impact. Darling's laugh cut off as his eyes rolled back, his grand stance melted into limpness, and he crumpled to the floor like a marionette with its strings cut. Daring stared, flabbergasted. Against the light, the silhouette revealed itself to be—"Caballeron?!" He stood unsteadily, a heavy, leather-bound book held in his hooves.\n\n"Finally, some quiet." Caballeron winced, rubbing where his wound should be. "I could not even die in peace with all that prattling." He finally looked up at Daring, who was still grappling with the sheer, impossible reversal before her. He saw the shock in her eyes and slowly – and very smugly – began to smile. "Please, Daring Do, spare me your admiration. If anypony in this room knows how a grand, self-congratulatory speech inevitably precedes a failure to secure the prize..." He paused, tapping a hoof against the dark stain on his vest – not blood, but the spreading ink from a shattered inkwell."
newjungle.42.a:0 "...it would be I.""

newjungle.43.t:0 "Two of a Kind" #Snow #Daring do and Caballeron event line 3
newjungle.43.d:0 "With a flick of a lockpick and a heavy clunk, the gilded cage swung open. Daring Do tumbled out, the dress pooling around her. She quickly shrugged it off and tore at the bindings on her wings. Free of the last restraint, she looked up to find Caballeron already marching away. He was halfway back to the staircase when her voice cut through the silence.\n\n"Wait!"\n\nHe paused, one hoof on the first step. "What is it now, Daring Do? My schedule is, as you can imagine, quite busy." Seeing her conflicted expression, Caballeron let out a sigh and fully turned to face her. She was standing now, but her usual defiant posture was gone, replaced by uncertainty. She stared at the floor, her mouth opening and closing as she fought with the words.\n\nShe took a shaky breath, her gaze flicking up to meet his for a second before darting away again. "I... I'm sorry."\n\nThe words hung in the air, quiet but clear. Caballeron blinked. Once. Twice. The smugness melted from his face, replaced by pure shock. His jaw went slightly slack. "Excuse me?" His accent betrayed him for a brief moment. "Could you repeat that? The acoustics in this mausoleum are atrocious."\n\n"I said I'm sorry!" she burst out, her voice gaining strength, laced with frustration – mostly at herself. "For... treating you like a villain. I never expected you could change and that led to this situation."\n\nThe shock held for another second. Then, a low chuckle escaped him, building into full, uncontrollable laughter. He threw his head back, a hoof pressed to his chest. "Ha! Oh, this is priceless! THE Daring Do! The paragon of virtue! The scourge of tomb-robbers everywhere! Apologizing... to me!" He wiped a mock tear from his eye. "Tell me, is this in your next manuscript? 'Daring Do and the Humbling Realization'? I must demand royalties!"\n\nAll of Daring's previous flustered guilt vanished, incinerated by familiar, blazing annoyance. Her wings flared. "You... you are the most insufferable, egotistical jerk of a pony I have ever met! I try to say one decent thing—!"\n\n"And you did!" he interrupted, his laughter subsiding into a wide, triumphant grin. "And I shall cherish the memory forever!" With a final, exasperated groan at the universe, she kicked the gilded dress across the marble floor and marched off to find Quibble, determined to be gone before Caballeron could see the embarrassed flush on her face."
newjungle.43.a:0 "The bond of a rival is not something easy to shatter."

newjungle.44.t:0 "Breaking the News" #Snow #Daring do and Caballeron event line 4 (plays if great war already started)
newjungle.44.d:0 "The echoes of Daring Do's exasperated hoofsteps had just faded from the marble hall. Caballeron watched her go, the lingering smirk from her apology still on his lips. He savored the moment for a few seconds more before his mind rudely interrupted his triumph. He took a deep breath, his smile fading into something more serious as he spoke. "Daring Do!" Her wings twitched in irritation, but she did stop to listen. "War has taken hold of Equus."\n\nThat made her turn. She took a few steps back into the main chamber, her annoyance replaced by confusion. "What are you talking about? What war?"\n\n"Equestria's at war. A proper war with another major nation. Aztlan has joined the fray to ensure the continent remains free. The front lines are already formed... frankly, it was quite an endeavor to even come here and rescue you. It is not easy for a leader of a nation to simply disappear." He met her gaze, and his cool composure slipped a little. "I felt you should know. Given your... attachments."\n\nA storm of emotions crossed Daring's face before settling into anger. She jabbed a hoof at his chest with enough strength to make him grunt from the pain. "You felt I should know?! You let me walk away, you stood there laughing at me, with Equestria at war?! That seems a little more important!"\n\nCaballeron had the decency to look briefly chagrined. He cleared his throat. "In my defense, you rendered me temporarily insensible. It drove all other matters from my head," he cleaned his clothes as he made some distance between the two. "Now, comes my offer." Caballeron spoke, extending a hoof towards her. "We make an accord. I am committed to seeing this foreign menace repelled, and you have your own... particular set of skills. So I propose a ceasefire, Daring Do. At least until Equus is safe."\n\nShe looked at his hoof, then back at his face. After a heartbeat that seemed to stretch for a long time, she reached out and took it. "Only until it's safe.""
newjungle.44.a:0 "Home is more important than petty rivalries"

newjungle.45.t:0 "When it is Most Needed" #Snow #Daring do and Caballeron event line 4 (plays if great war starts after event line 3)
newjungle.45.d:0 "The war room in Tenochtitlan was busier than it had been even during the southeastern war. Caballeron stood at the head of the table, surrounded by his mercenary captains and the Neighua chiefs. He pointed to a position near the Equestrian border. "Our objective is simple. We let the Equestrian regulars take the blunt of the force, while we—"\n\nThe tall, arched window behind him exploded inward in a shower of glass. A pegasus shot through the gap, executed a tight, rolling landing that scattered papers, and sprang to its hooves in the center of the room, wings flared. She stood there with all the defiant poise of a hero. Mercenaries moved for their weapons as the Neighua tried to calm the situation. Only Caballeron didn't move. He looked at the shattered window and let out a long, weary sigh.\n\n"I didn't come here to fight," she said, her eyes scanning the maps strewn across the table and floor. "Not you, anyway."\n\n"So. You have broken into the heart of my government. You have my attention." Though the room was still tense, the immediate threat had passed into spectacle. It felt like something straight from the pages of a book.\n\nDaring looked at him, her expression set in that annoyingly determined way he knew all too well. She reached out a hoof toward him. "A truce. Until Equestria is safe."\n\nCaballeron looked at her hoof, then grinned. "Astute as ever," he reached out and the two shook hooves. "Until it is safe." Then, he quickly turned back to the table, paying no mind to what had just happened. "As I was saying, there is a benefit to this maneuver... somepony, please get those papers from the ground. While you are at it, call for someone to board that window.""
newjungle.45.a:0 "What's more trustworthy than a rival by your side?"

newjungle.49.t:0 "New Lessons for an Old Stallion" #Snow #Golden Cihuacoatl event 1
newjungle.49.d:0 "Somewhere else, on a farm near Saltlickingham, two creatures – one old, one new – sat facing each other on the front porch. Golden Delicious sat across from Cricket Chafer. Golden had ensured that Chafer and PON would be safe from Caballeron's crackdowns, so he had expected this call would come sooner or later. "The farm is not enough for you, is it?"\n\n"It is. Frankly it is more than enough. But the flame is still there." Chafer had a quiet flame in his eyes. "The revolution may have stalled, but he has kept you around. In due time, conditions will present themselves once more so we can topple the tyrant."\n\n"Things are different now, you know that. I was able to ensure the members of PON and CAN were left alone, but the organizations are politically irrelevant. IES is gone, and TER is only still around because I curbed its ideological fervor to focus on worker rights." Golden sighed and looked toward the swaying maize field. "If you try to raise the banner now, you won't be a revolutionary. You'll be a nuisance, and then the state will have every excuse to ensure you stop being one."\n\nChafer flinched and looked away, the fight draining somewhat from the old stallion. Golden felt bad for so casually dismissing his hopes, especially after he'd agreed to come here. "Look, if you want to stay politically active, there's still an avenue. TER has the structure and the legitimacy to stick around." He looked hopefully at Chafer. "Comrades need to stick together in these trying times, not bicker amongst themselves."\n\nChafer gazed into the fields with a conflicted expression. "I... I will take your offer. Comrades do need to stick together," he said, smiling as he raised a hoof to his chest. "To the revolution?""
newjungle.49.a:0 "Golden smiled in response. "Yes, comrade. To the revolution.""

newjungle.50.t:0 "An Annoying Surprise" #Snow #Golden Cihuacoatl event 2
newjungle.50.d:0 "On one side of the long table sat representatives from the newly formed dockworkers' union of Saltmane Harbor (affiliated with TER, of course) and the harbor manager. On the other side sat Huey Tlatoani Caballeron. And right beside him, silent as a statue, was Golden Delicious.\n\nGolden was still somewhat annoyed at this turn of events. The negotiations had been his to handle: a straightforward dispute over hazard pay for workers handling volatile crystal shipments. But an hour before the meeting, it seemed Caballeron had actually read his communique about the meeting and decided to "show the government's commitment to its workers and ensure proceedings are concluded favorably." Golden had barely suppressed a scoff.\n\nCaballeron was all practiced charm and attentive nods, interjecting with perfectly timed questions that made him seem engaged without understanding anything. He deferred to Golden on technical points with a wave of his hoof: "My Cihuacoatl is the expert here!" He wanted to ensure credit for any success would still be seen as flowing from the top.\n\nGolden played his part. He cited regulations and steadily wore down the harbor's bourgeois representative. Throughout it all, he and Caballeron exchanged no unnecessary words—just a brief, muttered consultation over a clause or a curt nod of agreement at most. As the final agreement was being read aloud, Golden allowed his eyes to drift from the paper. They passed over Caballeron, who was offering a practiced smile to the union head.\n\nCaballeron signed the document with a flourish, as did Golden. The meeting ended with hoofshakes and smiles. As the room cleared, Caballeron gathered his papers without sparing Golden a glance. He seemed to have a locket alongside his papers, barely noticeable. As he left, Golden remained for a moment. Curiosity had taken hold. Why would Caballeron have that? But, more importantly..."
newjungle.50.a:0 "He had actually been quite fair to the union."

newjungle.51.t:0 "Quiet Afternoons" #Snow #Golden Cihuacoatl event 3
newjungle.51.d:0 "The only sounds in the Huey Tlatoani's office were the scratching of Golden's quill on budget reports and the soft thud of Caballeron's stamp on decrees. Hours had passed in this steady rhythm; a silent and efficient division of labor that had become routine. The tensions of their early dealings had settled into a familiar quiet.\n\nGolden finished annotating a column, his mind wandering back to a negotiation from before. He had never stopped to ask about Caballeron's locket. He glanced up. Caballeron was leaning back in his chair, massaging his temple. The locket's chain was just visible against his vest. The question left Golden's lips before his common sense could stop it. "You carry a locket."\n\nCaballeron snapped back to reality and adjusted his vest. He seemed startled for a moment, like a thief caught. It was there and gone in an instant, smoothed over into his usual performative persona. " Yes, I suppose I do. An archaeologist develops a sentiment for relics. That also applies to the portable ones." He gave a dismissive wave, his gaze already drifting back to the papers on his desk. "It is just a... memento."\n\nGolden had spent a lifetime listening to ponies lie. A deflection as careless as this was foal's play to notice. It was not his place to question it... "It seemed well-kept." ...but that didn't stop his mouth from running once more.\n\n"All things of value deserve care, do they not? Unlike this trade proposal." Caballeron was already fully back to his papers. "Would you mind taking a look at the clauses? They seem to think we are running a charity here."\n\nThe conversation was over. Golden gave a curt nod and took the offered parchment, but his mind was no longer fully in it. That locket clearly wasn't a trophy; a stallion like Caballeron would display it proudly if it was. This was hidden and carried close, something that instigated Golden's curiosity"
newjungle.51.a:0 "What could be in there...?"

newjungle.52.t:0 "Apples and Doctors" #Snow #Golden Cihuacoatl event 4 (pre-election)
newjungle.52.d:0 "They were a short time away from the official end of Caballeron's term, and the weight of impending transition hung unspoken in the air. It was Caballeron who broke the silence, his voice uncharacteristically pensive. "Golden. Your family... are they in Baltimare?"\n\nGolden looked up, surprised. It was the first personal question Caballeron had ever asked him. "Not really, no. I have a very large family, spread throughout Equus. Though we all try to meet every hundred months." He chuckled earnestly. "Quite an odd number, but we are an odd family, I suppose." He realized his rambling and cleared his throat, the usual mask hastily sliding back into place. "Apologies. You didn't ask for a biography."\n\n"No, no," Caballeron said, a soft, unguarded laugh escaping him. "Do not apologize. It is... refreshing. I do not really have a family. Not one that would be here for me now, at least." His hoof drifted to his vest in a subconscious gesture. Then, slowly, he unclasped the locket and held it out on his hoof. Inside the simple, worn golden case was a small, faded photograph. It showed a younger Caballeron, standing between three familiar figures. They were all in some dusty canyon, squinting against the sun. All of them were smiling for the picture, except Caballeron, who wore a serious expression. "These nitwits stood by me through... everything." He snapped the locket shut with a soft click. "I suppose that means they are family, no?"\n\nFor a long moment, he just looked at the closed locket in his hoof, his expression unreadable. Then, he took a sharp breath, straightened his tie, and slid the locket back beneath his vest. The moment was over, sealed away as neatly as the photograph. Golden was still looking at the spot where the locket had been. He didn't just understand; he saw him. And for the first time, a genuine smile rested on his face as he turned his attention back to the budget papers."
newjungle.52.a:0 "Perhaps he isn't so bad."

newjungle.53.t:0 "An Apple Does Keep the Doctor Away" #Snow #Golden Cihuacoatl event 4 (post-election)
newjungle.53.d:0 "As Golden knocked on the door, an answer came quickly. "Come in." He entered to find Caballeron's chair facing away from the door. "Sit, please." Golden did as instructed. The two were now seated directly opposite each other, yet the moment felt strange. In a matter of days, Golden would be the one in Caballeron's position. He had... won. He didn't know what to expect. Would it be a confrontation? Should he have brought backup? A wave of thoughts raced through his mind as Caballeron slowly spun his chair around.\n\nThe stallion looked tired, yet he still carried his characteristic charm. He looked Golden up and down, then finally met his eyes. "You will be good for them. I know you will," Caballeron said as he began to stand. "I wish you luck, Huey Tlatoani Golden." He smiled, gave Golden a quick tap on the side, and left the room without another word. Golden was stunned. Was that it? No grand speeches, no confrontation – nothing? He had simply allowed one of the most known syndicalists of Equus to take the reins of his life's experiment?\n\nThe revolution had come to the Southeast so abruptly that it made him wonder... had it come at all? He was a democratically elected leader of a federation that absolutely loved its previous leader. He, too, enjoyed considerable public support due to his initiatives to assist all workers, not just those unionized under TER... but would it be enough to up-end all he had helped create these last few years?\n\nHe thought of Chafer and his comrades. He thought of Caballeron. He thought of the millions of creatures of the Southeast that now looked to him for guidance... and in that moment, he felt completely lost."
newjungle.53.a:0 "What to do..."

newjungle.54.t:0 "Old Friends, New Nations" #Snow #Maita Cihuacoatl event 1
newjungle.54.d:0 "The air in Maita's home was thick with the cozy scent of mint from the boiling tea. He had invited Crescent Glow for a simple meal—a gesture of normalcy in a world that had been anything but. He had tried to contact his other friends, but none of them had the time... and in Daring's case, it was hard to even reach her. Crescent sat across from him, picking at her food distractedly. "So, you are his right hoof now."\n\nMaita took a slow sip of his soup, his large form a picture of calm as he nodded. Crescent finally looked up, her eyes sharp with a hurt not yet assuaged. "He's out there giving speeches while the Neighua cheer for him. After everything Daring did for them." She shook her head, her wings rustling with frustration. "Daring is out there somewhere, still fighting. Good Word is just happy to do his ponytarian work. And we are here, eating soup while he rules, no better than any of his flunkies."\n\nMaita listened, his expression patient. "A heavy heart needs a full stomach to carry it. The soup helps." He pushed the plate of bread closer to her. "Please, my friend." Crescent still looked hurt. Maita regarded her with a worried expression. "He is going to leave all of our friends alone. I made him promise. I am working to help all creatures of the Southeast, no matter their tribe." He met her gaze, his own steady. "I hope you remain by my side as we do that. I could not bear to lose another friend."\n\nCrescent stared down, conflicted. "And you believe him? You believe he will keep his word?"\n\n"I believe he is not as bad as Daring portrayed him – the two clearly had many unresolved issues with each other. The Federation has already done much good in such a short time, and I do believe it is yet to do more. Our path may be different than what we envisioned, but friendship remains the same. You will always be welcome in my home and in Aztlan. I promise."
newjungle.54.a:0 "Crescent had to hold back the tears forming in her eyes as she took a sip of her soup."

newjungle.55.t:0 "The Quiet Mountain" #Snow #Maita Cihuacoatl event 2
newjungle.55.d:0 "The grand hall in Tenochtitlan was meant to be a symbol of unity. But just two hours before a summit of the Neighua, it stood as a monument to chaos. A rainstorm had leaked through a newly repaired section of the roof, creating a puddle. Two aides were having an argument over the seating positions, their instructions now damp and smudged. The drummers were loudly practicing in a corner, making it impossible to hear anything else. From the door, Caballeron and Maita reached the room, but Caballeron had quickly found some words to say.\n\n"Why is there a lake in the middle of the floor?! And will somepony please tell the percussion section that we are not under attack? The meeting is in two hours, not right this second!" He spun towards the arguing aides. "And you two! If you cannot figure out who sits where, I will seat you both in that puddle! Now, where is my tea?!"\n\nAs Caballeron ran around, Maita began to walk around calmly. He first approached the drummers, urging them to save their energy for the meeting and offered them some refreshments until then. Then, he explained to the aides that it did not truly matter where anypony sat, the Neighua were not as arbitrary to be bothered by this. Then, looking at the leaking ceiling, he looked conflicted for a moment, before seemingly figuring it out. He simply asked the now calm aides to help him by mopping the floor, as he went to get a bucket to put there.\n\nAs Caballeron came running back with his tea, his words died on his lips as he saw a completely different room. "I took the liberty of instructing the aides and the drummers since it seemed like they were a bit confused," Maita smiled. "I hope you do not mind."\n\nA faint, uncharacteristic blush tinged Caballeron's cheeks. "Ah. Thank you, Maita. That is... adequate." He took a sip of his tea and cleared his throat, shortly beginning to run around once more – now a bit more calmly."
newjungle.55.a:0 "Another perspective can do wonders."

newjungle.56.t:0 "The One Thing None Can Outrun" #Snow #Maita Cihuacoatl event 3
newjungle.56.d:0 "The last petitioner had left over an hour ago, but the stress of the day still sat heavy, a dull ache behind Caballeron's eyes. He sat slouched at his desk, rubbing his temple. A gentle knock interrupted his solitude. He sighed and spoke. "The door is open."\n\nMaita's large frame filled the doorway, a tray balanced on his back. "I heard the kitchen was closed. I brought some snacks." Caballeron put up no resistance as his stomach growled. They ate in comfortable silence for a while, Maita occasionally speaking of idle events from his village these last few weeks. Caballeron found himself listening, the tension leaving him.\n\n"So, how has it been for you?" Maita suddenly turned the conversation. "It has been some time since you became Huey Tlatoani. To be honest, you seem very tired."\n\nCaballeron froze, a piece of flatbread halfway to his mouth. He set it down as he thought. "It is... a peculiar kind of exhaustion."\n\nMaita nodded, his gaze kind. "You spend all day being a mountain for others to lean on. You forget that mountains, too, bask in the morning sun. The people do not need a monument. They need somepony they can empathize with, somepony they know truly cares for them. Perhaps you could walk through the city one of these days and simply speak to others? I am sure it would help re-contextualize your worries."\n\nMaita's sudden wisdom had taken him off-guard. After a moment's astonishment, Caballeron couldn't help but chuckle. "A wise suggestion, my friend. Perhaps I will try that tomorrow.""
newjungle.56.a:0 "Perhaps there is a good reason why the chief is so respected among the tribes."

newjungle.57.t:0 "Off the Chest" #Snow #Maita Cihuacoatl event 4 (pre-election)
newjungle.57.d:0 "In the final days of Caballeron's term, the weight of the impending transition hung in the air. Maita and Caballeron were nearly finished with the day's paperwork when Maita spoke. "You know," he said, gazing out the window at the setting sun painting the city gold, "when this is all over, I look forward to going home. I find I like the quiet times best."\n\nCaballeron, who had been pressing a seal onto a document, looked up. "I understand the feeling. Age is inescapable, after all. Personally, I... I do not think I will run again. Let someone new take the reins. Or perhaps... you should try?"\n\nMaita blinked, his tranquil expression shifting to one of mild surprise. "I... should?"\n\nCaballeron gestured vaguely with a hoof. "What I mean is the federation would do well with some continuity. A steady hoof the populace already knows and trusts could be exactly what the federation needs these next few years." The admission seemed to embarrass him. He quickly straightened a stack of papers. "Do keep in mind this is merely an observation. The tribes trust you. The thestrals respect you. You are quite a persona for the Southeast." He coughed. "It would also ensure the newer generation faces real competition rather than being handed Aztlan on a platter. A test, if you will."\n\nMaita watched him, the stallion's awkward energy almost amusing. As roundabout as it was, his intent was clear. 'I cannot stay, but I cannot bear to leave this in hooves I trust less than yours.' A warm smile slowly spread across Maita's broad face. "I will think about it."\n\nCaballeron finally met his eyes once more and gave a small, relieved smile. The topic ended there, and for the next few hours, the only sound was the quiet shuffle of paperwork between them."
newjungle.57.a:0 "What better way for youth to prove itself than to compete with experience?"

newjungle.58.t:0 "A Friend's Obligation" #Snow #Maita Cihuacoatl event 5 (post-election)
newjungle.58.d:0 "Maita reached the door of the office that would soon be his, knocking it as soon as he reached. "Come in." As he entered, he quickly noticed how different the room was. It was signicantly emptier as Caballeron stood by a window, looking out at the city. He turned, a smile touching his face. "Maita! Congratulations!" He gestured to the now-empty chair behind the desk. "Come here, let's get you acquainted to your new point of view." Caballeron didn't wait for an answer, guiding Maita towards the chair. As he sat down, Caballeron spoke. "So... I was the one who made the suggestion, yes... but I never truly expected you to agree. What changed your mind? I suppose Crescent finally convinced you it was your duty? Or... did Daring tell you to ensure a goon of mine could not take power in my stead?" Caballeron smirked to himself.\n\nMaita shook his head slowly. "Them too, but it was mostly for you."\n\nCaballeron froze, his practiced expression melting into surprise. He blinked, his mouth opening slightly as if to form a word that wouldn't come. Then, the moment passed and Caballeron cleared his throat, his composure sliding back into place as he offered a smile. He stepped forward and gave Maita a light tap.\n\n"Then I am honored, my friend. I know you will do much more as Huey Tlatoani than I ever could. And of course, feel free to come visit me if the need arises. I would wish you luck, but I know you do not need it." With a final, solid pat, he left, closing the door softly behind him.\n\nNow, Maita was alone. He looked around the room from a perspective he had never expected. What should his first order of business be... yes, a picnic! He could get them all together again – Crescent, Good Word, Ms. Do; and of course, Caballeron. There might be some bad blood at first, but good food on a sunny day had a way of smoothing things over. He was sure they would all learn to like each other."
newjungle.58.a:0 "As if it was always meant to be."

newjungle.59.t:0 "Teicniuhtlaliztli" #Snow #Light Cihuacoatl event 1
newjungle.59.d:0 "In the room there were three creatures: one seemingly calm, another very angry, and then there was Light Narrative, sweat already threatening to drip from his mane. He needed to get closer to the Tenanyotl if he was ever to be seen as more than an intermediary. He knew he was an outsider, but he wished to truly connect with his own people. What better way than to bring two creatures that were in opposing sides of the Southeastern war to truly understand how each side came to their views?\n\nHe had quickly understood what a fool he had been.\n\n"I refuse to be anywhere near this monster! I told you, Light, I had one condition for working with you, and that was no Nightmareists. And you bring one of their fanatics here?!" Crescent Glow was livid, understandably so. It had been hard enough to get her to agree to work alongside him. He couldn't screw this up now. He had to make it clear that—\n\n"That is a wild mischaracterization, Miss Glow." Light turned in panic toward the other figure. "Truly, do you not understand even now? Nightmare Moon, praise be unto Her, is not the source of your pain." Word Bearer closed his eyes as he continued to speak. "Her advisors, scum that they are, serve as a venom corrupting her host body even now. Suffice to say, we both wish for the same goal: the purity of—"\n\nLight dared not move as Crescent rose and struck Word square in the face. "DO NOT SPEAK OF PURITY AFTER YOU AND YOUR ILK DID TO PRINCESS LUNA!" He could see tears forming in her eyes as she prepared to strike again, but Light quickly rose to hold her back – no easy task.\n\nAs he led the sobbing Crescent away, Word coughed, followed by a remark she was mercifully spared from hearing: "A-Ah, afraid to even properly engage in debate. She still has much to learn.""
newjungle.59.a:0 "To make friends of enemies, huh..."

newjungle.60.t:0 "Background Light" #Snow #Light Cihuacoatl event 2
newjungle.60.d:0 "Light Narrative stood rigidly on the stage, a fixed smile on his face as the crowd roared and the sun burned his back. The Huey Tlatoani was in his element, his voice soaring over the plaza as he unveiled some new building. His gestures were broad and captivating as the entire crowd cheered for him. Light, positioned just a step behind and to the right, felt like a potted plant someone had forgotten to water.\n\n'Why am I even here?' was his main thought as he smiled at the crowd. His cheeks were already aching, but it would feel even more awkward to not do anything. He was the Cihuacoatl in title, but in moments like this, he felt like an accessory to the Huey Tlatoani. He resisted the urge to shuffle his hooves or adjust his scarf. What he'd give for a cigar right now...\n\nThen the Huey Tlatoani's speech pivoted. "Let this serve as a renewal of my promises! Here in Aztlan, every voice has a place! Every story deserves to be heard!" As the crowd roared its approval, Caballeron half-turned, extending a hoof towards Light. "And none of it would be possible without the aid of my Cihuacoatl, Light Narrative!"\n\nA thousand eyes swiveled to him. The crowd renewed its cheers, now directed squarely at him. Light's wings gave an involuntary, tiny flutter. He managed a nod, hoping his smile looked alright.\n\nAs the ceremony concluded and the two were escorted out of the stage, Light finally spoke. "If I may, Huey Tlatoani... my presence there seemed... superfluous. The credit is all yours."\n\n"Nonsense!" Caballeron glanced at the young thestral with his usual smile. "These ponies need to see your face until it is as familiar as mine. Now, smile. There news will be here soon." He straightened his posture with those words, composing himself just in time for the approaching reporters."
newjungle.60.a:0 "Smile for the cameras!"

newjungle.61.t:0 "Stresses of Planning" #Snow #Light Cihuacoatl event 3
newjungle.61.d:0 "Light Narrative stared at the seemingly endless guest list the Huey Tlatoani had given him for the upcoming gala. Earlier that day, he had dismissively assigned him the task, claiming it was 'Perfect work for my Cihuacoatl!' For hours now, Light had painstakingly done everything to get the gala perfected. He had triple-checked the protocols, agonized over the seating arrangements, and tried to recall the favorite dishes of each creature coming... only to realize he didn't actually know half the names on the list. As he worked, he could feel the Huey Tlatoani's occasional glances from across the office. The gaze was, quite frankly, very intense.\n\nHe had reached a section mentioning a Hippogriff magnate, which led to more questions popping up. Would he need to prepare a pool for them? What titles were they even addressed with? Light recalled a recent conversation where one guest requested to be listed under their military rank; was it this one?! As he hesitated, he began chewing his quill. His notes were quickly becoming a frantic mess of scratched-out sentences and question marks.\n\nThen, he felt heard something drop, followed by the Huey Tlatoani marching towards him with purpose. He took the papers from Light and began to read; nodding along, grunting a few times, and then giving them back. "They can transform at will, so no pool. No special honorifics needed either; she is just rich, not nobility." And with that, as quickly as he had appeared, the Huey Tlatoani withdrew to his desk.\n\nLight sat frozen for a moment, then looked back at the list. Did... did the Huey Tlatoani give him this task to evaluate him? Looking up, he noticed those occasional glances continued. He was totally being evaluated! But... if it was meant to be a test, why did he help him? That thought nagged at him. There had to be a lesson in this, something beyond simple evaluation..."
newjungle.61.a:0 "But that could wait for later; Light really needed to get this done."

newjungle.62.t:0 "His Ambition" #Snow #Light Cihuacoatl event 4 (pre-election)
newjungle.62.d:0 "In the final days of Caballeron's term, the weight of the impending transition hung in the air. Light Narrative placed a bound proposal on the Huey Tlatoani's desk. He had called it his newest magnum opus – a comprehensive plan for a mixed settlement of Neighua and Tzinacatlians, designed to lift the underclass from poverty through state funded housing and integrated services. It may have seemed a bit utopian, but that didn't stop the Huey Tlatoani from dropping what he was doing and reading it with care.\n\nSlowly his eyes tracked each line, his hoof occasionally tapping a paragraph in thought. Eventually, he reached the final page, closed the proposal with a soft thump, and set it down. He looked straight at Light, his expression conflicted as he searched for the right words.\n\n"This... this is good." He paused, gathering his thoughts. "The structural reasoning is sound, even if a tad utopian. You have even budgeted for it in advance... and it serves to tackle poverty directly." He allowed himself an approving smile. "You have learned."\n\nThis was the moment of truth. "I intend to see it implemented. But we would not have the time for such a daring project before your term ends..." He took a steadying breath. "And to do that, I'll need authority. So... I'll be running for Huey Tlatoani." Light braced himself for anger, for a chastisement over his ingratitude.\n\nInstead, after a moment of silence, he was met with laughter. "Well, naturally!" The Huey Tlatoani laughed, his tone shifting back to its natural, charismatic warmth. "I would be disappointed if you were not! You have shown too much potential to be relegated to a sideshow forever!"\n\nLight looked taken aback for a moment, then soon joined in the Huey Tlatoani's laughter."
newjungle.62.a:0 "Student and mentor as equals."

newjungle.63.t:0 "The Fate of the Old is to Make Way for the New" #Snow #Light Cihuacoatl event 5 (post-election)
newjungle.63.d:0 "Light Narrative stood before the heavy door of the Huey Tlatoani's office for the last time as Cihuacoatl. He raised a hoof to knock, but a wave of anxiety about the coming conversation washed over him. He closed his eyes and went for it. A voice from inside quickly answered "Come in."\n\nAs he entered, he quickly noticed how different the room was. It was significantly emptier. Caballeron stood by a window, looking out at the city. He turned, a smile touching his face. "Light. Congratulations on your victory. I suppose the first step is getting your proposal through?"\n\nLight walked towards Caballeron. There was one question that had remained ever since the election began. "I... I was prepared to face you. But you never even filed the paperwork to run... did you never intend to?"\n\nCaballeron's smile deepened. He walked over, closing the distance between them, and gave Light a light tap. "Indeed. Perhaps when I first took the role of Huey Tlatoani, I had some intent of fighting to stay at the top. But... at some point, that changed. You have proven yourself worthy of taking care of the federation... and I believe to have proven myself worthy of a break." He gave Light one final tap on his side as he smirked. "You will do good by Aztlan. Of that I have no doubt."\n\nAnd with that, he left, closing the door softly behind him. Light was left standing in the center of the room, alone. He walked behind the desk and lowered himself into the chair. It was all so... strange. He had worked under the Nightmare just for a chance to give thestrals a chance at rights – but here in this sunlit office, that past felt so blurry; like a bad memory he couldn't quite recall. These last few years had been wild, something that began as just another scoop had become something much bigger. He smiled as he got himself comfortable in the chair."
newjungle.63.a:0 "He had found home."

newjungle.64.t:0 "Reelection Season" #Caballeron pre-election #Snow
newjungle.64.d:0 "With the election season heating up, a quiet moment had settled over Caballeron's office... but not for Biff, Withers, and Rogue, who stood anxiously by the table.\n\n"Boss, the deadline is tomorrow," Rogue spoke. "The papers are askin'. The ponies are askin'. We're askin'. You're runnin', right?"\nWithers looked down with a sad expression. "I'd finally gotten used to being on a plane..."\nBiff cut the two off. "Of course he's running, you blockheads! He's the boss for a reason. Right, boss?"\n\nCaballeron looked up, somewhat annoyed. "No. I will not be running." He held up a hoof to stop the immediate stuttering from the three goons. "Because," he continued, producing a key from under his desk, "I have a reservation for four. At a beachside villa that expressly forbids discussing politics, economics, or anything of the sort. My only plan is to do absolutely nothing of consequence for several weeks, and I am obligated by law to bring three trusted associates to ensure I do not sneak off to do any misdeeds.'" As he turned his gaze back to them, he noticed their glistening eyes and braced for the worst.\n\n"You mean... a vacation?" Biff whispered. "A real one?"\n"No treasure hunting?" Rogue asked, a grin spreading.\n"Pure leisure...?" Withers's glasses slipped down his muzzle.\n\nBefore Caballeron could say anything else, he found himself assaulted. Withers and Biff launched into a tearful, tight hug from his sides, and Rogue enveloped them all in a crushing embrace. "ACK! Too tight! Unhoof me, you oafs!" Caballeron squawked, his face turning red as he flailed helplessly in the center of the pile. "This is a breach of professional conduct! I am still your employer! I demand—ARGH!" His demands were ignored, lost in the sound of their laughter."
newjungle.64.a:0 "Despite his loud protests, he found he didn't mind it one bit."

newjungle.65.t:0 "Aztlan's First Elections" #Actual election event #Snow
newjungle.65.d:0 "The political landscape of Aztlan has been irrevocably altered. With the continent now stabilized enough to hold the nation's first elections, it was widely assumed that Huey Tlatoani Caballeron would run and secure a democratic mandate of his own. Instead, in a move that stunned the political class, Caballeron formally announced he would not seek election. With characteristic flair, he declared his work complete, entrusting the nation's foundations and future to another pony.\n\nWhat followed was a campaign unlike any the Southeast had seen. Without its charismatic founder competing, dozens of candidates emerged, all vying to define Aztlan's next chapter. Yet from the first opinion polls, it became clear there was simply no competition.\n\nDominating every provincial poll and every major demographic was the Cihuacoatl. Hailed by the press as the natural continuation of the federation's stability, recognition, and progress, they had been the trusted hoof at Caballeron's side. For most creatures, there was no compelling reason to change course.\n\nWhen the final results were announced, the message from the Southeast was crystal clear. The legacy of the Doctor's unlikely nation was secure, even if he would not be the one to steer it."
newjungle.65.a:0 "Congrats to the new Huey Tlatoani!"

newjungle.66.t:0 "A Surprise Visit" #Caballeron and Daring post-election #Snow
newjungle.66.d:0 "Caballeron was packing light for the next few weeks. That vacation with Withers, Rogue, and Biff was sounding better by the minute. A knock echoed through the living room, which was strange since he wasn't expecting visitors. "It's open! Unless you are a bureaucrat – in which case, I am not home!"\n\nThe door creaked open. "Wow. Even out of office, the charm just radiates." Caballeron turned slowly at the voice. Daring Do stood in the doorway, leaning against the frame with a smirk.\n\nA wide grin spread across his face as he recomposed himself. "Well, well! A.K. Yearling on my humble doorstep? To what do I owe the immense pleasure? Seeking an endorsement for your next thrilling installment?"\n\n"Oh, shut up," she said, rolling her eyes as she stepped inside. "I see losing your fancy title hasn't deflated your ego."\n\n"Excuse me, I do still have a fancy title! My doctorate still stands, after all." He gestured to the bare room. "And as you can see, the doctor is quite busy."\n\nDaring glanced around and entered fully, closing the door. "Yeah... I saw the news." Her expression was uncharacteristically conflicted. "Look... I never got a chance to properly thank you. For... you know. The whole Darling Angel mess."\n\n"Please," he waved a dismissive hoof. "I could not have a third-rate collector like that putting a stain on Aztlan's reputation."\n\n"Right. Sooo..." She took a small breath. "You're officially less busy now. Maybe we could... get something to eat?"\n\nA laugh almost escaped Caballeron from the sheer shock. But seeing her face made him stutter. He coughed, adjusting his collar. "I... well... I suppose my schedule may have an opening." He glanced at his bag. Ah, they could manage their excitement for a few more hours. "I do know a place. Decent food, terrible decor. My posture may be a bit tense at first, it will be strange not to expect a tackle at any moment during dinner.""
newjungle.66.a:0 "Daring laughed. "Well, don't get used to it... wait, I didn't mean—""

newjungle.83.t:0 "An Uneventful Retirement" #Snow #Alternate ending to left path if Daring hates you
newjungle.83.d:0 "Caballeron was packing light for the next few weeks. That vacation with Withers, Rogue, and Biff was sounding better by the minute. As he finished his packing uninterrupted, he sighed and wiped his brow. He looked around his home; the tidy place hadn't been his for long, but it had been perfect for his short but very eventful tenure as Huey Tlatoani, especially with all the chaos up north.\n\nAnd how short it had been! It felt somewhat out of character to leave power so readily, but considering how often he'd given Ahuizotl avenues to power for a few bits in the past, he supposed it was in his blood to be satisfied with 'just enough'. Besides, if he didn't give up power willingly, he'd eventually be thrown out in shame – he was grateful to get through one scheme without needing to run away in shame. Especially since that Daring Do...\n\nCaballeron shook his head. This was his nation, his successes. Why should he be thinking about that accursed mare in his triumphant moment? It did feel somewhat dull without their constant confrontations, but this was what he had always wanted: peace and quiet, money and fame. Caballeron had gotten everything he'd ever wished for as a scoundrel, and he'd even gotten it through legal means! The federation was flourishing, the creatures were happy, and he had left a legacy to be followed and built upon by his former Cihuacoatl. But...\n\nAs he looked outside, he wondered why it was so sunny already. It shouldn't be so sunny at seven AM... "I'm late!" Exclaiming to himself, he quickly gathered his bags and ran out of the house, leaving that particular doubt to be unpacked at a later date... or, hopefully, never."
newjungle.83.a:0 "Prosperous retirement, here I come!"

newjungle.74.t:0 "Sun Solstice Day!" #Flavor event left path
newjungle.74.d:0 "As the sun rose on one of the longest days of the year, Tenochtitlan and all of Aztlan surrendered themselves to the sun and the summer. Plazas around every settlement, usually mere backdrops to daily life, were transformed into rivers of color and food. This was the Day of the Sun, the commemoration of the Summer Solstice – one of the most sacred Neighua celebrations and now a national holiday.\n\nFrom dawn, processions wound through the cities. Dozens of dancers, bodies painted with vibrant patterns, moved to the beat of towering drums. Intricate headdresses rose tall, reaching for the sky. The air shimmered with fragrant scents of spices and spirits.r\n\nWhile this explosive and energetic ritual was traditionally performed only by the Neighuatl, curiosity drew many others to join. Griffons circled above, admiring the spectacle. Vendors wove through the crowd, selling drinks and snacks. Even Tenanyotl found themselves amidst the procession, twirling with colorful umbrellas to protect from the sun among the revelers.\n\nThe climax came at noon. As the sun reached its zenith, the rituals calmed and transformed into a more mellow moment of quiet gratitude – thanks to the sun that grew their crops and warmed their foals. For the Neighua, this day was a reaffirmation of respect and adoration. For every other creature in Aztlan, it was a day off, a fantastic party, and a powerful lesson."
newjungle.74.a:0 "To the light that feeds us all!"

newjungle.75.t:0 "Winter Solstice Night!" #Flavor event left path
newjungle.75.d:0 "As the moon rose on one of the longest nights of the year, Ayacachtli and all of the lands of the Tenanyotl surrendered to moon and winter. From the mountain peaks to base, every settlement was alive with songs sung in foreign languages and exotic smells that could only be found deep within the jungles and swamps. This was the Festival of the Moon the commemoration of the Winter Solstice - one of the most sacred Tzinacatl celebrations and now a national holiday.\n\nFrom dusk, processions wound through the cities. Dozens of dancers, bodies painted with vibrant patterns, moved to the beat of towering drums. Intricate headdresses rose tall, reaching for the sky. The air shimmered with fragrant scents of spices and spirits. Ponies got higher than the moon from just the smoke in the air as the celebrations ran throughout the night.\n\nWhile this explosive and energetic ritual was traditionally only performed by the Tenanyotl, curiosity drew many others to join. Griffons circled above, admiring the spectacle. Vendors wove through the crowd, selling drinks and snacks. Even the Neighua found themselves amongst the festival-goers, holding torches close to keep warm.\n\nThe climax came at midnight. Mother Moon's glory basked all under the silvery light of the moon. Sacred fruits were broken, juices poured, and the Moonspeakers sermoned. Soon, the rituals calmed and transformed into a more mellow moment of gratitude - thanks to the moon that guided their sleep and kept the shadows out of the home at night. For the Tenanyol, this was a day of reaffirmation of pride and the bonds forged between tribes. For every other creature of Aztlan, it was the next day off, a fantastic party, and a powerful lesson."
newjungle.75.a:0 "Wooo!"

newjungle.14.t:0 "Merger with [JUN.GetNameDef]?" #Diplo event southwest
newjungle.14.d:0 "A recent offer has come to the office of [Root.Getname] from the office of [JUN.getnamedef]. They have proposed a merger between our two countries, although a closer look at the offer has some concerning points. Most among them is the clause about the government of [Jun.GetNameDef] "being the one to take over temporary powers until a point in which a future administration can be properly put in place in accordance with the merged government." Effectively, this would put us at their mercy. However, there are a lot of other good points of the agreement, and we really could really use their support. The choice is ours."
newjungle.14.a:0 "Sure, he seems nice."
newjungle.14.b:0 "Let's politely decline."

newjungle.76.t:0 "[FROM.Getname] Asks for the Buffalo Tribes"
newjungle.76.d:0 "A delegation from [JUN.getname] has arrived in our capital to discuss a potential offer. Citing the awkward situation that the buffalo are in following the liberation of the Southwest, [JUN.Getleader] has requested that we transfer the lands that historically have belonged to the Buffalo Chiefdom to them. They do have much more experience in the governing of tribes and in inter-tribal conflict resolution, so the idea isn't insane. However, some government ministers fear this sets a precedent that land that is ours will not longer be ours for the future."
newjungle.76.a:0 "They would be better rulers of this land."
newjungle.76.b:0 "We shall divide the land of the Southwest along the Rockville Strip."
newjungle.76.c:0 "We didn't fight for nothing. He will not get it."
newjungle.76.e:0 "We didn't fight for nothing. He will not get it."

newjungle.77.t:0 "The Equestrian Counteroffer"
newjungle.77.d:0 "The delegation we sent to Canterlot has come back with an unique offer. Instead of rejecting or accepting our offer, it appears that [EQS.GetLeader] has proposed a compromise. They would receive all of the lands above and including the Rockville Strip, while allowing us to integrate Mixie as a rightful part of our territory. The offer is almost too good to refuse, although some particularly hawkish individuals don't desire to hand over what they view as our rightful land. The choice is ultimately the Huey Tlatoani."
newjungle.77.a:0 "We want our cake and to eat it too!"
newjungle.77.b:0 "It is a fair deal."

newjungle.78.t:0 "Equestria Refuses!"
newjungle.78.d:0 "Unfortunately, despite our best efforts, our delegation has come back with bad news. Equestria has refused to even consider the offer, let alone actually accept it. It seems that the land of the Southwest will be divided amongst those who care for the ponies (that is not [EQS.GetLeader] by the way!) and those who care for power."
newjungle.78.a:0 "A shame."

newjungle.79.t:0 "A Diplomatic Disaster!"
newjungle.79.d:0 "It appears that [3.Owner.Getnamedef] has not only decided to not give us our rightful land, but actually now views us as a threat! They have kicked us out of their alliance, and reconnaissance shows they are preparing soldiers on our mutual border. It seems our fair request has angered them greatly."
newjungle.79.a:0 "This is a disaster!"

newjungle.80.t:0 "Mangos and Moonshine" #Zop
newjungle.80.d:0 "Caballeron did not know what to expect from the Drinoktlhyoualtika tribe in Axomolli, located at the base of the River Pa'Chan. While Light Narrative might have joined the government, the Tenanyotl were still on edge with the victory of the Neighua and their foreign mercenaries. Still, the Drinoktlhyoualtika were not far from being one of the friendliest tribes out there, if for nothing more than their love of living and drinking. That love of drinking is why Caballeron came there in the first place. He would ensure that they understood he was just as much of their Tlatoani as he was the Neighua's, and it would start with some moonshine, their sacred drink.\n\nCaballeron wasn't not used to strong liquors from his time in university, but even one whiff of the moonshine nearly had him gagging. A sip had him on the floor. "That is... strong stuff you drink," he coughed out weakly, gasping for the humid jungle air that seemed cooler than whatever he just drank. The thestrals laughed at the Tlatoani's weakness. "What exactly is in this?" He barely managed to mutter out.\n\n"Nothing unusual. Mango, corn for fermentation, giant frog toxins, some -" Caballeron's heart sank as he chugged water, much to the amusement of the thestrals. "It's okay! You'll be fine! We only put a little in!" One shouted as she started to chug the toxic liquid. Caballeron could see through their smiles at the sadness growing in their eyes as their leader who tried to be friendly couldn't even properly partake in their celebrations. With a rousing effort, he took a shot glass and let one of the bats fill it up. The smell was putrid, the taste would be horrible, and he would probably regret it tomorrow. He needed to do it though. Without thinking, he downed the shot and rushed to drink water after.\n\nNow, he was truly their friend."
newjungle.80.a:0 "Cheers!"

