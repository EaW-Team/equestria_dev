l_russian:
 seer_tech:0 "Прорицание"
 seer_tech_research:0 "Темпы исследований прорицаний"
 deer_folder:0 "Технологии оленей"
 deer_folder_desc:0 "Магические, экономические и военные технологии, свойственные расе оленей."
 deer_race:0 "Раса оленей"
 deer_race_desc:0 "Олени – некрупные разумные четвероногие млекопитающие. Их легко узнать по ветвистым рогам и густому меху на шее. Олени обладают магическими способностями, основанными на мистической связи с духами, что позволяет им в ограниченных масштабах предвидеть будущее. Несмотря на отсутствие врождённых способностей к магии воды, олени считаются выдающимися мореходами. В основном они травоядны, но иногда употребляют в пищу мясо и, в особенности, рыбу."
 tactic_motti_tactics:0 "Мотти"
 motti_tech:0 "Мотти"
 deer_army_tech:0 "Армейские технологии оленей"
 deer_navy_tech:0 "Морские технологии оленей"
 TITLE_DEER_SOCIETY_MAGIC_SUBTITLE:0 "ЭКОНОМИКА И ТОРГОВЛЯ"
 TITLE_DEER_NAVY_MAGIC_SUBTITLE:0 "МОРСКИЕ ТРАДИЦИИ"
 TITLE_DEER_SEER_MAGIC_SUBTITLE:0 "ПРОРИЦАНИЕ"
 TITLE_DEER_ARMY_MAGIC_SUBTITLE:0 "ВОЕННОЕ ДЕЛО"
 tech_deer_misc:0 "Помощь духов в геологии"
 tech_deer_misc_desc:0 "Благодаря особой связи с миром духов некоторые олени способны чуять залежи минералов глубоко под землёй. Это напоминает таланты некоторых пони, но в поиске ресурсов олени не знают себе равных."
 tech_deer_misc2:0 "Современная экономическая теория"
 tech_deer_misc2_desc:0 "Слишком долго наша экономика оставалась архаичной. Чтобы сохранить конкурентоспособность в современном мире, нам жизненно необходима масштабная модернизация."
 tech_deer_misc3:0 "Магия в средствах производства"
 tech_deer_misc3_desc:0 "Объединив мистическую силу духов с мощью современной промышленности, мы обеспечим небывалый прогресс для всего нашего народа."
 tech_deer_misc_a:0 "Архитектура природы"
 tech_deer_misc_a_desc:0 "Строительство фабрик и жилых кварталов с учётом природного ландшафта позволит не только повысить их эффективность, но и естественным образом замаскирует заводы от вражеских бомбардировок."
 tech_deer_misc_b:0 "Купеческое наследие"
 tech_deer_misc_b_desc:0 "Олени издавна торговали с самыми далёкими землями. Эти традиции следует развивать и адаптировать под нужды современной глобальной экономики."
 tech_deer_misc_c:0 "Рейнкардская школа"
 tech_deer_misc_c_desc:0 "В последнее время наш ведущий экономист обретает мировую известность благодаря своим взглядам на инфляцию и торговое регулирование. Приняв его идеи, мы ускорим промышленный рост и обезопасим себя от экономических потрясений."
 tech_deer_naval:0 "Передовое кораблестроение"
 tech_deer_naval_desc:0 "Несмотря на многовековую историю мореплавания, наши методы строительства судов начали отставать от мировых стандартов. Мы обязаны внедрить новые технологии, чтобы флот оленей оставался грозной силой."
 tech_deer_naval2:0 "Тактика быстрых набегов"
 tech_deer_naval2_desc:0 "Применяя тактику «ударил – отступил», мы сможем изматывать превосходящие силы противника, сохраняя свои корабли, и уничтожать малые суда практически без риска."
 tech_deer_naval3:0 "Проектирование торговых судов"
 tech_deer_naval3_desc:0 "Нельзя поддаваться искушению тратить все ресурсы только на военные корабли – ведь именно торговля питает нашу военную машину. Модернизация гражданских судов позволит строить конвои быстрее и в больших объёмах."
 tech_deer_naval3_tp:0 "Конвои £production_cost  Стоимость производства:  §G-10%§!"
 tech_deer_naval_a:0 "Викинги нового времени"
 tech_deer_naval_a_desc:0 "Когда-то один вид оленьих драккаров на горизонте приводил моряков в ужас. Пусть те времена прошли, мы не должны забывать традиции предков. Модернизированное каперство позволит нам эффективно перехватывать вражеское снабжение, лишая противника ресурсов и продовольствия."
 tech_deer_naval_b:0 "Морской камуфляж"
 tech_deer_naval_b_desc:0 "Снижение заметности кораблей с помощью как современных методов маскировки, так и магических завес, даст нашему флоту преимущество в любом столкновении."
 tech_deer_naval_c:0 "Духи моря"
 tech_deer_naval_c_desc:0 "Взывая к морским духам, наши капитаны смогут лучше координировать действия флота и точнее наводить орудия, нанося сокрушительный урон любому агрессору."
 tech_deer_seer:0 "Проблеск грядущего"
 tech_deer_seer_desc:0 "Присутствие одарённых провидцев в штабах позволит генералам лучше ориентироваться в обстановке и точнее планировать будущие операции."
 tech_deer_seer2:0 "Полевые ведуньи"
 tech_deer_seer2_desc:0 "Ведуньи обладают редким даром мистиков. Формируя из них специальные корпуса, мы сможем использовать их предсказания для получения тактического преимущества непосредственно на поле боя."
 tech_deer_seer3:0 "Научные видения"
 tech_deer_seer3_desc:0 "Многие провидцы сообщают о видениях из будущего: они видят странные машины и неведомые механизмы. Глупо игнорировать такие подсказки, позволяющие нам буквально опережать само время."
 tech_deer_seer_a:0 "Стратегическое прорицание"
 tech_deer_seer_a_desc:0 "Наша разведка обязана использовать потенциал ясновидящих. Шпионы и контрразведчики должны научиться видеть проблески будущего, чтобы пресекать вражеские козни в зародыше."
 tech_deer_seer_b:0 "Тактическое предсказание"
 tech_deer_seer_b_desc:0 "Подготовка специалистов, сочетающих навыки стратега и провидца, позволит применять уникальный дар предсказания напрямую при планировании масштабных сражений."
 tech_deer_army:0 "Зимняя экипировка"
 tech_deer_army_desc:0 "Хотя олени привычны к холодам, северные пустоши всё ещё таят в себе опасность. Специализированное зимнее снаряжение защитит солдат от обморожений и повысит их боеспособность в суровых условиях."
 tech_deer_armyb:0 "Тропическое снаряжение"
 tech_deer_armyb_desc:0 "Олени расселились по всему миру, включая жаркую Хиндию. Местные общины приспособились к климату: их мех тоньше, а лёгкая одежда обеспечивает отличную вентиляцию, спасая от перегрева."
 tech_deer_army2:0 "Мобильная пехота"
 tech_deer_army2_desc:0 "Олени – проворные существа, легко адаптирующиеся к пересечённой местности. Тонкие ноги облегчают бег, а использование лыж зимой и мачете в джунглях обеспечивает нам непревзойдённую мобильность."
 tech_deer_army2_tp:0 "§YСнег§!\n     Движение: §G+10%§!§W\n§YДжунгли§!\n     Движение: §G+10%§!§W"
 tech_deer_army2a:0 "Горная артиллерия"
 tech_deer_army2a_desc:0 "Опираясь на наши знания о горах, мы разработаем облегчённые и маневренные орудия, способные поддерживать войска там, где обычная артиллерия застрянет."
 tech_deer_army3:0 "Снайперские группы"
 tech_deer_army3_desc:0 "Подготовленные стрелки, обученные разведке и скрытному передвижению, смогут не только добывать ценные сведения, но и эффективно уничтожать приоритетные цели в тылу врага."
 tech_deer_army_def:0 "Тактика «Мотти»"
 tech_deer_army_def_desc:0 "Создавая небольшие «карманы» вокруг наступающих сил врага и дожидаясь истощения их ресурсов в окружении, мы сможем успешно обороняться против численно превосходящего противника."
 tech_deer_army_def2:0 "Знатоки родного края"
 tech_deer_army_def2_desc:0 "Враги вторгаются в неизвестные им земли, которые для нас – дом родной. Солдаты, знающие каждый куст в своём лесу, сражаются в разы эффективнее: от логистики до меткости стрельбы – всё даётся легче тем, кто стоит за свою землю."
 tech_deer_army_def3:0 "Тотальная горная подготовка"
 tech_deer_army_def3_desc:0 "Обучение всей пехоты навыкам выживания и боя в горах значительно повысит общую эффективность нашей армии на сложном рельефе."
 tech_deer_army_def3_tp:0 "   §YХолмы§!\n     Атака: §G+5%§!§W\n     Движение: §G+5%§!§W\n   §YГоры§!\n     Атака: §G+10%§!§W\n     Оборона: §G+5%§!§W\n     Движение: §G+7%§!§W"
 tech_deer_army_atk:0 "Духи предков"
 tech_deer_army_atk_desc:0 "Наши предки славились своей яростью и отвагой. Призывая их волю и идя в бой под их незримым покровительством, наши солдаты обретут былую славу великих воителей."
 tech_deer_army_atk2:0 "Духи леса"
 tech_deer_army_atk2_desc:0 "Веками олени жили в гармонии с природой. Обратившись к мистическим источникам, наши воины смогут использовать саму энергию лесов, чтобы стать практически неуязвимыми для врага."
 tech_deer_army_atk2_tp:0 "   §YЛес§!\n     Атака: §G+10%§!§W\n     Защита: §G+10%§!§W\n     Движение: §G+5%§!§W\n   §YДжунгли§!\n     Атака: §G+10%§!§W\n     Защита: §G+10%§!§W\n     Движение: §G+5%§!§W""
 tech_deer_army_atk3:0 "Штурмовые отряды"
 tech_deer_army_atk3_desc:0 "Пока другие народы довольствуются обычными «морпехами», наши бойцы станут чем-то неизмеримо большим. Под покровительством духов предков, дарующих им свою силу, наши солдаты не оставят врагу ни единого шанса."