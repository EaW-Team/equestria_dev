l_russian:
 griffon_folder:0 "Технологии грифонов"
 griffon_folder_desc:0 "Промышленные, социальные и военные технологии, свойственные расе грифонов."
 griffon_race:0 "Раса грифонов"
 griffon_race_desc:0 "Грифоны – разумные существа, которые наполовину являются птицей и наполовину – львом. Они четвероногие создания с острыми когтями на передних лапах и мягкими подушечками на задних. Благодаря крыльям они способны летать, что облегчает путешествия по пересечённой местности. Грифоны также известны своей силой, но не обладают значительными магическими способностями, умея лишь накладывать простые чары и заклинания. Говорят, что они жадные и одержимые золотом, но это жалкая ложь, придуманная должниками, не сумевшими расплатиться вовремя. С биологической точки зрения грифоны – плотоядные, хотя не прочь полакомиться свежей выпечкой. Однако они не едят сырые растения."
 knights_tech_research:0 "Темпы исследований технологий рыцарей"
 TITLE_GRIFFON_KNIGHTS_SUBTITLE:0 "ГРИФОНЬИ РЫЦАРИ"
 TITLE_GRIFFON_SOCIETY_SUBTITLE:0 "ОБЩЕСТВО И ЭКОНОМИКА"
 TITLE_GRIFFON_ARMY_SUBTITLE:0 "ВОЕННЫЕ ТЕХНОЛОГИИ"
 TITLE_GRIFFON_AIR_NAVY_SUBTITLE:0 "АВИАЦИЯ И ФЛОТ"
 ME_KNIGHTS_TOOLTIP:0 "\n£unit_knights_icon_small Рыцари будут требовать §Yмагического пехотного снаряжения§W вместо §Yобычного§W\n"
 ME_WE_CAN_FLY_TOOLTIP:0 "   §YХолмы§!\n     Атака: §G+5%§!\n     Движение: §G+5%§!\n   §YГоры§!\n     Атака: §G+5%§!\n     Движение: §G+10%§!"
 knights:0 "Рыцари"
 knights_desc:0 "С незапамятных времён государства и полисы грифонов использовали рыцарей в качестве элитной тяжёлой пехоты. Но развитие технологий не оставило их на обочине истории. Рыцари просто сменили свои копья и пластинчатые доспехи на крупнокалиберное огнестрельное оружие и пуленепробиваемые зачарованные доспехи, с гордостью продолжая традиции грифоньего рода."
 knights_tech:0 "Рыцарские технологии"
 tech_knights:0 "Рыцарская дивизия I"
 tech_knights_desc:0 "Грифоньи рыцарские традиции, известные во всём мире за их доблесть и честь, восходят к самым ранним грифоньим обществам. Используя заколдованные доспехи и оружие, эти солдаты могут сразиться на равных даже с некоторыми бронемашинами."
 tech_knights2:0 "Рыцарская дивизия II"
 tech_knights2_desc:0 "Благодаря улучшенной подготовке и оснащению мы сможем укрепить наши дивизии рыцарей."
 tech_knights3:0 "Рыцарская дивизия III"
 tech_knights3_desc:0 "Продолжая модернизацию и совершенствование наших рыцарей, мы обеспечим их дальнейшее доминирование на поле боя."
 tech_knights_a:0 "Рыцарская дивизия IV"
 tech_knights_a_desc:0 "С усиленными чарами, используемыми для зачарования брони, наши рыцари смогут дольше сражаться на поле боя."
 tech_knights_b:0 "Рыцарская дивизия V"
 tech_knights_b_desc:0 "Чтобы наши рыцари могли и дальше противостоять врагам, мы должны снабдить их ещё более сильными чарами и оружием."
 tech_knights_c:0 "Рыцарская дивизия VI"
 tech_knights_c_desc:0 "Пригласив некоторых из самых могущественных чародеев со всего мира, мы превратим наших рыцарей в непобедимых бойцов."
 tech_knights_magical:0 "Лучшие из лучших"
 tech_knights_magical_desc:0 "Мы должны гарантировать, что будем использовать не только лучшее снаряжение для наших рыцарей, но и самых лучших воинов – лишь те, кто пройдут суровые испытания, заслуживают право быть частью наших элитных рыцарей."
 tech_knights_magical2:0 "Наивысшие стандарты"
 tech_knights_magical2_desc:0 "В нашей армии допустимо лишь самое лучшее, и это касается и обучения: соблюдая самые строгие правила призыва и подготовки, мы сделаем наших рыцарей предметом зависти всего мира."
 tech_knights_regular:0 "Расширить ряды"
 tech_knights_regular_desc:0 "Мы не можем позволить себе ограничивать вербовку кандидатов в рыцари. Вместо этого мы должны позволить любому мотивированному рекруту пройти испытания. Любой достаточно смелый грифон может стать рыцарем."
 tech_knights_regular2:0 "Боевой дух"
 tech_knights_regular2_desc:0 "То, чего некоторым рекрутам может не хватать в умении, они восполняют несгибаемым духом. Пусть новобранцы не привыкли к физическим трудностям, но они будут сражаться голым клювом и когтями за свою страну."
 tech_griffon_misc:0 "Зачарованные инструменты"
 tech_griffon_misc_desc:0 "Хотя у нас нет «правильной» магии по мнению других рас, кое-что мы всё же умеем. Использование зачарований позволит выполнять работу проще и быстрее."
 tech_griffon_misc2:0 "Зачарованные механизмы"
 tech_griffon_misc2_desc:0 "Грифонье зачарование должно быть приспособлено для новой эры – и что может быть современнее промышленности? Зачарованные машины могут работать гораздо плавнее и быстрее обычных."
 tech_griffon_misc3:0 "Грифонья архитектура"
 tech_griffon_misc3_desc:0 "Наша архитектура славится естественным слиянием с ландшафтом, особенно горным. Мы можем использовать это, чтобы упростить ремонт и размещать больше заводов на крошечных участках земли."
 tech_griffon_misc_a:0 "Магические системы раннего предупреждения"
 tech_griffon_misc_a_desc:0 "Используя чары, мы можем создать системы раннего предупреждения об атаках, что поможет спасти жизни гражданского населения и улучшить понимание тактики противника."
 tech_griffon_misc_b:0 "Гибкое производство"
 tech_griffon_misc_b_desc:0 "Мы не можем рисковать, делая заводы слишком узкоспециализированными. Чары помогут упростить конверсию снаряжения и поддерживать гибкость производства."
 tech_griffon_misc_c:0 "Неразрушимые материалы"
 tech_griffon_misc_c_desc:0 "Массовое производство прочных магических материалов для оружия и доспехов сделает нашу армию и ВВС гораздо более живучими."
 tech_griffon_airnavy:0 "Современные гнёзда"
 tech_griffon_airnavy_desc:0 "Грифонья практика «гнездования», являясь естественным явлением, может быть изучена и адаптирована для военной сферы, особенно для военно-воздушных и военно-морских сил. Поощряя строительство «гнёзд» для кораблей и самолётов, мы обеспечим нашим лётчикам и матросам надёжную базу для операций."
 tech_griffon_airnavy2:0 "Зачарованные корпуса"
 tech_griffon_airnavy2_desc:0 "Мы можем использовать чары на самолётах и кораблях, делая их такими же прочными, как броня солдат."
 tech_griffon_navy3:0 "Самонаводящиеся ракеты"
 tech_griffon_navy3_desc:0 "Идея зачарованных «самонаводящихся ракет», способных отслеживать цели, становится популярной среди наших военно-морских офицеров. При широком внедрении эта технология значительно облегчит атаки на вражеские суда."
 tech_griffon_navy4:0 "Абордажные команды"
 tech_griffon_navy4_desc:0 "Следует поощрять захват конвоев противника, если мы хотим поддерживать нашу блокаду."
 tech_griffon_navy5:0 "Магические морские системы управления"
 tech_griffon_navy5_desc:0 "Улучшенная структура командования и коммуникации внутри ВМФ всесторонне укрепит наш флот."
 tech_griffon_air3:0 "Война пилотов"
 tech_griffon_air3_desc:0 "Тренировки, укрепляющие боевой дух пилотов, обеспечат более агрессивную тактику и лучшие результаты."
 tech_griffon_air4:0 "Современная авиация"
 tech_griffon_air4_desc:0 "Наши бомбардировщики должны быть крепкими и прочными, чтобы выдерживать полёты над вражеской территорией."
 tech_griffon_air5:0 "Рождены летать"
 tech_griffon_air5_desc:0 "Многие расы видят летательные аппараты лишь как транспортные средства для достижения недоступных мест. Мы же рассматриваем их как продолжение себя, и потому наши пилоты будут гораздо более квалифицированными."
 tech_griffon_army:0 "Мы можем летать?!"
 tech_griffon_army_desc:0 "С появления расы грифонов крылья были нашей величайшей гордостью, и мы лучше всех знаем, как их использовать."
 tech_griffon_army_def2:0 "Зачарованные коммуникации"
 tech_griffon_army_def2_desc:0 "Многие армии используют радио для передачи сообщений. Но, интегрируя обмен зачарованными сообщениями в отряды поддержки, мы сделаем переговоры проще и надёжнее, а перехватить их будет гораздо труднее."
 tech_griffon_army_def3:0 "Зачарованная броня"
 tech_griffon_army_def3_desc:0 "Грифоньи доспехи рыцарей долгое время были предметом зависти всего мира. Используя их во всех специальных силах и улучшая дизайн, мы сохраним превосходство."
 tech_griffon_army_def_a:0 "Зачарованная броня танков"
 tech_griffon_army_def_a_desc:0 "Зачарованная броня танков гарантирует их выживание при столкновении с противником."
 tech_griffon_army_def_b:0 "Бронированные когти"
 tech_griffon_army_def_b_desc:0 "Улучшенная связь между офицерами-танкистами позволит выполнять манёвры гораздо легче."
 tech_griffon_army_def_c:0 "Зачарованные стволы"
 tech_griffon_army_def_c_desc:0 "С помощью специальных заклятий наша артиллерия станет значительно мощнее."
 tech_griffon_army_atk2:0 "Быстрые удары"
 tech_griffon_army_atk2_desc:0 "Мы должны уделять первоочередное внимание скорости наших армий."
 tech_griffon_army_atk2_tp: "   §YЛес§!\n     Движение: §G+5%§!\n   §YХолмы§!\n     Движение: §G+5%§!\n   §YГоры§!\n     Движение: §G+5%§!\n   §YДжунгли§!\n     Движение: §G+5%§!\n   §YБолото§!\n     Движение: §G+5%§!\n   §YРавнины§!\n     Движение: §G+5%§!\n   §YПустыня§!\n     Движение: §G+5%§!\n   §YРека§!\n     Движение: §G+5%§!"
 tech_griffon_army_atk3:0 "Остриё копья"
 tech_griffon_army_atk3_desc:0 "Использование специальных сил и разведывательных операций сделает наши атаки гораздо эффективнее."
 tech_griffon_army_atk_a:0 "Прыжок веры"
 tech_griffon_army_atk_a_desc:0 "В отличие от десантников прикованных к земле рас, которые боятся разбиться, у наших десантников есть крылья. Эта страховка делает их гораздо более готовыми следовать приказам."
 tech_griffon_army_atk_b:0 "Снабжение по воздуху"
 tech_griffon_army_atk_b_desc:0 "Используя крылатых курьеров и сброс снаряжения с самолётов, наши армии смогут дольше сражаться без доступа к общей логистике."
 tech_griffon_army_atk_c:0 "Зачарованные бронемашины"
 tech_griffon_army_atk_c_desc:0 "Зачарование моторизованных транспортных средств повысит их скорость и атакующие возможности, делая их гораздо более опасным противником."
