aryan_uberpony_desc: "§YДата рождения§!: 23 апреля 977 года в Кольтринте\n\n§YЗвание§!: Лохос\n\n§YБиография§!: Жизнь Клауд Джет, дочери высокопоставленного нимбусийского командира, – это бесконечная череда тягот и испытаний. Её отец был суровым фанатиком дисциплины, любившим в жизни только долг и свою супругу. Он страстно желал сына, чтобы выковать из него истинного нимбусийского воина, но судьба распорядилась иначе, оставив его с рухнувшими надеждами и нежеланной дочерью.\n\nКлауд Джет росла в тени суровых отцовских требований, из года в год пытаясь выполнить сизифов труд – заслужить его признание и тепло. Однако ни безупречные успехи в испытаниях Агогэ, ни образцовая служба в рядах нимбусийских гоплитов не могли растопить сердце старого солдата. Став живым воплощением нимбусийских идеалов, Клауд Джет так и не познала радости собственных триумфов.\n\nВетер перемен коснулся её крыльев, когда её направили с почётным поручением в Речные земли – обучать союзные войска вдали от родного полиса и железной отцовской хватки. Внутренние оковы дали трещину под натиском обретённой свободы. Вскоре Клауд Джет дезертировала, сплотив вокруг себя изгнанников и мятежных единомышленников под знаменем «Oi Myrioi» – наёмного братства, состоящего исключительно из закалённых в боях пегасов. С тех пор они продают своё воинское мастерство тому, кто предложит больше, и сейчас этот щедрый заказчик – Скайфол.\n\n§YАвтор портрета§!: Scroup"
angry_trade_bird_desc: "§YДата рождения§!: 15 марта 914 года в городе Скайфол\n\n§YПрозвище§!: Самый ненавистный грифон во всей Грифонии\n\n§YБиография§!: Гислен Гишар родился шестым ребёнком в семье фезерской аристократки и крупного промышленника. В юности он преуспевал в науках, питая особую страсть к математике. Будучи шестым в очереди на наследство, он не мог рассчитывать на семейное состояние, и близкие пророчили ему службу в имперской армии – обычная доля младших сыновей в подобных кругах. Но судьба Гишара сложилась иначе. В возрасте двадцати четырёх лет, едва окончив университет Ромау, он попросил у отца позволения возглавить убыточную ткацкую фабрику где-то в глуши, которую семья уже собиралась закрыть. Отец отказался отдавать предприятие даром, но одолжил сыну денег на его выкуп, обязав вернуть долг до последней монеты. Гишар с головой ушёл в работу и уже через год полностью рассчитался с родителем. Вскоре он начал скупать мелкие мануфактуры в провинции, неуклонно укрепляя своё финансовое могущество. Один за другим он выкупил доли у собственных братьев, выказав полное презрение к зыбкому понятию «семейных уз» и предпочтя ему чистую погоню за наживой.\n\nВесь Скайфол знал Гишара как расчётливого дельца, но вскоре городу довелось увидеть другую его сторону – куда более грозную. В 977 году Гишар был избран мэром Вольного города Скайфола. Будучи натурой суровой, он немедленно взялся за урезание привилегий имперской знати и военных, из-за чего Грифенхейм не раз угрожал отозвать хартию вольностей. Всё переменилось в 978 году. Когда Кемерскай совершил переворот в Грифенхейме, никто из скайфольской элиты его не поддержал. Однако, столкнувшись с волнениями на улицах, Гишар решился на дерзкий шаг. Связавшись с местными республиканцами, он выразил сочувствие их делу и предложил помощь в захвате Имперского флота. Когда мятежники бросились на штурм порта и увязли в сражении с охраной, Гишар хладнокровно послал наёмников и безжалостно добил всех оставшихся в живых с обоих сторон. Следом он провозгласил полную независимость Скайфола.\n\nМало кто верил, что одинокий город сумеет выстоять, но благодаря коварству и железной хватке Гишара Скайфол процветал, пока соседи тонули в разрухе.\n\nВ свои 93 года Гишар всё ещё правит стальной волей. Но ведь он не может быть бессмертным... Или всё-таки может?\n\n§YАвтор портрета§!: Scroup"
damn_bat_desc: "§YДата рождения§!: 23 октября 982 года на Луносветном Берегу\n\n§YЗвание§!: Бригадный генерал\n\n§YБиография§!: В раннем детстве Перкунас рос тихим и боязливым жеребёнком – никто вокруг не думал, что он добьётся в жизни чего-то стоящего. Всё изменилось в тот день, когда он на спор влетел в самое сердце бушующей грозы и вернулся оттуда невредимым, получив свой знак отличия. Очевидцы поговаривали, будто он без тени страха танцевал в самом сердце бури, не боясь ослепительных разрядов.\n\nКогда Перкунасу исполнилось восемнадцать, из многовекового изгнания вернулась Найтмер Мун. Возвращение Ночной принцессы подарило ему надежду, что вековому недоверию к фестралам наконец-то придёт конец. Однако чаяния не оправдались: даже после того как мятежная правительница вновь стала принцессой Луной, положение бэтпони едва ли изменилось. Обида сменилась глухим гневом, когда Перкунасу, несмотря на его прекрасное образование, наотрез отказали в зачислении на военную службу. Тогда он принял решение покинуть Эквестрию и примкнуть к наёмникам.\n\nС тех пор Перкунас заслужил славу толкового, хотя порой и излишне нерешительного командира. Главным его триумфом стало умение вместе с подчинёнными пегасами вызывать свирепые грозы, после направляя удары молний прямо на врага. Пока небесные стрелы крушат оборонительные порядки противника, Перкунас и его бойцы пикируют на цель, укрытые штормом. Многих пегасов и грифонов этот пугающий натиск приводит в трепет. А бойцы Перкунаса знают: пока они следуют за ним в едином танце, их ведут надёжные и умелые крылья.\n\n§YАвтор портрета§!: Sesek"
defiantposition_prize_desc: "§YДата рождения§!: 29 января 971 года в Скайфоле\n\n§YБиография§!: Янус Голдкло появился на свет в семье богатых торговцев. Родители с малых лет готовили его к управлению семейным делом, однако сам Янус тяготился этой участью – он страстно желал посвятить себя чему-то большему, чем простое приумножение капитала. Юноша всем сердцем восхищался мощью Имперского флота и в свободное время многие часы проводил у скайфольских причалов, заворожённо провожая взглядом уходящие и прибывающие корабли. Когда пришёл час выбирать свой жизненный путь, Янус без колебаний поступил на флотскую службу. Поскольку он не принадлежал к потомственной династии флотских офицеров, а сослуживцы посматривали свысока на выходца из богатой купеческой семьи, Янус решил доказать свою полезность делом. Он с головой ушёл в изучение военной истории, кораблестроения и тактики. И пускай в его манерах – неизменно учтивых и сдержанных – всё ещё угадывалось происхождение из высших слоёв общества, на службе он не щадил себя. С глубокой душевной болью Янус наблюдал, как некогда грозный Имперский флот превращается в скопище устаревших музейных экспонатов. Одержимый мыслью вернуть морскому делу Скайфола былое величие, он стал ярым защитником авианосцев и сокрушительной силы авиации.\n\n§YАвтор портрета§!: MonAx"
nice_trade_bird_desc: "§YДата рождения§!: 5 октября 969 года в Скайфоле\n\n§YБиография§!: Женевьева Гильдедвинг, племянница Гислена Гишара, росла в достатке, и детство её протекало мирно и просто. Всё круто изменилось в грозовом 978 году, когда её дядя снискал славу самого ненавистного грифона во всей Грифонии. И пускай Женевьева вовсе не была его наследницей, вчерашние друзья из верных престолу семей объявили ей бойкот, вынудив юную грифину уйти в глубокое уединение.\n\nВ 985 году она оставила учёбу, ведомая искренним желанием стать жрицей Эйр. Год спустя родители уступили её упорству, и Женевьева приняла духовный сан. На ниве служения она всецело отдала себя делам милосердия, воочию увидев бездну нищеты и бесправия скайфольских низов. Увиденное потрясло её до глубины души. В 989 году она сложила с себя обеты и вернулась в мир. Вновь вступив в светскую жизнь, она связала судьбу не со знатным родом, а с представителем скайфольской интеллигенции, после чего с головой ушла в изучение права и экономики.\n\nОкончив обучение, Женевьева развернула бурную общественную деятельность: писала научные труды, вращалась в самых разных кругах – вплоть до радикальных республиканцев и синдикалистов, но неизменно сохраняла безупречную репутацию и независимость суждений. Со временем она полностью избавилась от ярлыка «малышки Гишар», заслужив признание как сильная и харизматичная личность. Тем не менее именно благодаря семейным связям в 1006 году её ввели в Совет Торговой Федерации. Многие пророчили ей роль очередной чопорной советницы, однако менее чем за два года она сумела переубедить самого упрямого грифона в истории, заставив его сменить политический курс, и в конечном итоге заняла пост канцлера.\n\nЖеневьева уже вписала своё имя в историю, но просто почивать на лаврах она не собирается.\n\n§YАвтор портрета§!: Printik"
ford_trade_bird_desc: "§YДата рождения§!: 30 июля 945 года в Скайфоле\n\n§YБиография§!: Генрих Кесслер родился в семье крупных промышленников и с самого детства не знал ни в чём нужды. Однако семейное производство эмалированной посуды мало привлекало юного грифона – ещё неоперившимся птенцом он заворожённо наблюдал за потоком новых технологий, хлынувших в Скайфол из Эквестрии. Наперекор воле родни он отказался продолжать старое дело и в 968 году открыл свою первую автомобильную фабрику, свято веря, что будущее за самоходными каретами. Его первые модели, впрочем, пользовались лишь скромным успехом среди знати, профессиональных гонщиков да богатеев всех мастей.\n\nПереломным для дела Кесслера стал грозовой 978 год. Потеряв доступ к рынкам Империи Грифонов, его предприятие оказалось на грани краха, но именно этот кризис заставил промышленника проявить истинную деловую хватку. Созданный им «Кесслер модель G» – получивший в Скайфоле прозвище «Гишар», а за его пределами – «Гровер» – стал принципиально иной машиной. Надёжный, неприхотливый и, главное, доступный автомобиль превратился в живой символ успеха обретшего независимость Скайфола, а самого Кесслера соотечественники превозносили как национального героя.\n\nСо временем Кесслер стал отдаляться от своего покровителя Гишара и его политического курса. Развитие бизнеса упёрлось в глухую стену: простые рабочие были не в состоянии купить его машины и грузовики, даже самые дешёвые, а возможности снижения себестоимости за счёт модернизации станков были полностью исчерпаны. Тогда он превратился в главного сторонника социальных реформ и повышения заработной платы. Двигал им вовсе не поиск равенства или справедливого мироустройства, а холодный, точный коммерческий расчёт. И теперь, заняв пост канцлера, он наконец близок к исполнению своего замысла.\n\n§YАвтор портрета§!: Scroup"
fat_trade_bird_desc: "§YДата рождения§!: 17 апреля 968 года в Скайфоле\n\n§YБиография§!: Фердинанд фон Хохсклауэ родился в баснословно богатой семье. Детство и юность его прошли в роскоши; он получил лучшее образование и познал все блага, какие только можно купить за деньги. С ранних лет родня настойчиво вводила его в мир больших капиталов и высокой политики. Род фон Хохсклауэ, несмотря на скромное положение в иерархии знати, питал глубокую обиду на имперский двор, где менее успешные, но более родовитые семьи пользовались незаслуженными привилегиями. Поэтому, когда Гислен Гишар объявил об отделении от Империи, Хохсклауэ стали его главными финансовыми покровителями.\n\nКогда молодой Фердинанд окончил Скайфольский университет, он производил впечатление типичного никчёмного наследника: грузного, избалованного, погрязшего в излишествах и презирающего всех, кто стоял ниже по положению. Ему выделили тёплое местечко в банке фон Хохсклауэ, и окружение единодушно пророчило ему роль обузы для семейного дела. Однако Фердинанд внезапно проявил гений финансиста: он приумножал средства на всех вверенных счетах и беспрестанно открывал новые источники дохода. Вместе с тем он выказал редкую беспощадность, разоряя и предавая публичному позору любого банкира, перешедшего ему дорогу, – пусть даже тот всего лишь проявил к нему бытовую грубость.\n\nВ начале одиннадцатого века Фердинанд прочно сосредоточил в своих когтях управление семейным делом и усердно принялся ковать себе новое имя – мецената и покровителя искусств. Газетчики, правда, пытались уличить его в теневых махинациях через личные благотворительные фонды, но за этим неизменно следовали разорительные судебные иски о клевете.\n\nВ 1002 году он занял кресло престарелой матери в Совете Торговой Федерации, а после кончины Гишара путём изощрённых интриг проложил дорогу к посту канцлера. Теперь он готов вознести Скайфол и собственную династию на невиданную прежде высоту.\n\n§YАвтор портрета§!: Rich May"
