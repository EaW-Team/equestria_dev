### Leader Descriptions ###
blizz_blizz_desc: "§YДата рождения§!: 18 февраля 979 года в Придее\n\n§YЗвание§!: Капитан-генерал\n\n§YБиография§!: Привилегированная кобыла редкой утончённости, Арклайт де Лини родилась в знатной семье, осевшей в квартале пони Аквилы. Любящие родители всячески поощряли её страсть к военному делу – и особенно к боевой магии. Однако безмятежное детство прервал грохот Аквелийской революции 980 года. Из-за верности короне оставаться в родном гнезде стало смертельно опасно, и семья бежала за море, в Эквестрию.\n\nЖизнь на чужбине текла сытно, но невыносимо скучно. Арклайт томилась в этом покое и искала повод уйти, пока до неё не донеслись слухи о наёмном отряде «Carnaval Magique» под предводительством такого же изгнанника по имени Тартюф. То было элитное братство магов, известное своими ослепительными чарами и готовностью обнажить клинки за того, кто щедрее заплатит.\n\nВ 1005 году Тартюф сгинул в трактирной стычке, и Арклайт приняла командование. С тех пор она ведёт отряд с истинно аквелийским шиком и блеском. Её знаменитая фуражка видна издалека, куда бы ни вела дорога. А сейчас эта тропа привела её в Скайфол.\n\n§YАвтор портрета§!: Scroup"
#trd_littlebusta_desc:0 "§YДата рождения§!:\n\n§YЗвание§!:\n\n§YБиография§!: \n\n§YАвтор портрета§!: "
