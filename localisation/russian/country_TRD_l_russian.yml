mercenary_trade_bird_desc: "§YДата рождения§!: 12 марта 952 года в Придее\n\n§YБиография§!: Ипполит Бешар родился в семье потомственных моряков и с малых лет бредил морскими просторами. В возрасте шестнадцати лет он поступил на службу в королевский флот, где служил исправно и преданно, искренне наслаждаясь корабельной жизнью. В схватках с пиратами он проявил себя беспощадным бойцом, снискав неподдельную любовь и уважение всей команды.\n\nКогда грянула Аквелийская революция, их корабль на время примкнул к мятежникам, но в конце концов на борту вспыхнул бунт. Судно сменило нескольких капитанов, пока командование окончательно не принял Бешар. Вместо бегства он дерзко повернул корабль обратно к Придее под флагом республиканского флота и проявил невероятную наглость: убедил экипажи ещё нескольких судов объединиться в разбойничью эскадру. Подпалив оставшиеся в гавани корабли, чтобы отсечь погоню, они ушли в открытое море.\n\nБешар решил искать удачи на бескрайних водных путях и в итоге добрался до Хаукланда. Там он преуспел настолько, что стал настоящей головной болью для скайфольских адмиралов. Со временем он рассорился с Мейером, и пиратский капитан решился на сделку: он предложил Скайфолу услуги своих судов как каперской эскадры в обмен на полное прощение прежних грехов. Получив отказ, Бешар решил продемонстрировать силу и разгромил скайфольский конвой, устроив сокрушительный налёт. Правителям города пришлось уступить, выплатив вдобавок баснословный выкуп. На службу Скайфолу Бешар явился не с пустыми когтями – он привёл с собой грозные корабли и сотни головорезов да изгнанников, уставших от вечной жизни в бегах.\n\nСо временем он расширил дело: начал нанимать сухопутные отряды, и, пользуясь обширными связями, превратился в крупного торговца оружием. Скопленный капитал открыл ему двери в Совет Торговой Федерации, откуда он пробил дорогу к посту канцлера.\n\n§YАвтор портрета§!: Squiggles"
drug_trade_bird_desc: "§YДата рождения§!: 7 сентября 958 года в Грифтоне\n\n§YБиография§!: Уолтер Уайтфезер был единственным сыном в семье школьных учителей. Смышлёный и прилежный ученик, он получил редкую возможность изучать химию в Йельском университете. Ему прочили блестящее будущее в науке, однако из-за потрясений Грифоньей революции выплата стипендии прекратилась, и юноше пришлось завершать обучение уже в Скайфоле. Получив диплом, он устроился в перспективную химическую компанию, но вскоре покинул её из-за личных разногласий. В итоге судьба вынудила его пойти по стопам родителей – стать обычным учителем.\n\nНа этом история Уолтера могла бы и закончиться, если бы один из его учеников – молодой грифон, связавшийся со скайфольским преступным синдикатом, – не обратился к нему за помощью из-за проблем с качеством партии опиума. Вопреки ожиданиям, Уолтер согласился помочь. Увидев, какие колоссальные барыши сулит подпольный промысел, он с головой окунулся в это дело уже без посредников. Дальнейшие события покрыты завесой тайны, но скромный школьный учитель внезапно проявил себя как безжалостный и расчётливый криминальный гений. Ни разу не подставив собственные крылья под удар, он сумел устранить всех конкурентов, возвысился в преступной иерархии и в конце концов прибрал к когтям всё теневое дело. Тихо и уверенно он стал входить в высшее общество города, хотя и оставался там чужаком. Мало кто сомневался в грязном происхождении его богатств, пусть официально он владел лишь простыми легальными предприятиями – вроде самой прибыльной таксомоторной фирмы мира.\n\nПосле кончины Гислена Гишара, умело оседлав волну успеха своего сигаретного бренда «Золотой грифон», Уолтер замахнулся на высший пост – кресло канцлера Торговой Федерации. В очередной раз растоптав политических соперников, теперь он намерен использовать всю мощь Скайфола, чтобы выстроить наркоимперию в масштабах всей Грифонии. По крайней мере, так поговаривают в кулуарах.\n\n§YАвтор портрета§!: Nyatta"
degrelle_desc: "§YДата рождения§!: 4 августа 976 года\n\n§YБиография§!: Гертьян Дезрамо появился на свет в бедной скайфольской семье, и вера с ранних лет стала неизменной опорой его жизни. Его отец, в прошлом матрос Имперского флота, вынужден был оставить службу после того, как Скайфол самочинно присвоил корабли себе. Глава семейства устроился работать в порт, чтобы прокормить жену и ребёнка, но достатка в доме Дезрамо отродясь не водилось. Это заронило в душу юного Гертьяна глубокую обиду на оторванных от жизни скайфольских капиталистов – в особенности на банкиров. С малых лет он вместе с матерью усердно посещал местный храм Борея, и вера его никогда не ведала колебаний. По мере взросления юноша стал проявлять живой интерес к богословию, праву, а также к печатному слову и ораторскому искусству. Вдохновляясь речами неистовых проповедников, он, едва переступив порог совершеннолетия, с головой ушёл в политику.\n\nВ двадцатилетнем возрасте Дезрамо отправился в Бруму, поступив в тамошний университет на юридический факультет. Во время учёбы молодой грифон подрабатывал редактором в университетской газете. К юриспруденции у него душа так и не лежала: он трижды проваливал выпускные экзамены, пока наконец не бросил учёбу и не вернулся в родной город. Новый опыт позволил быстро осознать, что его родина погрязла в пороках куда сильнее, чем ему казалось прежде. Простые рабочие гнули спину под гнётом корыстных олигархов, в ответ на что в городе лавиной рос синдикализм, а городская беднота от безысходности опускалась на самое дно – до пьянства, преступности и проституции. Ужаснувшись упадку родных мест, он начал путь пламенного оратора, взывая к заветам Борея и традиционным устоям, яростно обличая капиталистов, допустивших духовное разложение города. Гертьян снискал оглушительный успех у народных масс после череды громких банковских скандалов. Эту волну народного гнева он искусно оседлал, чтобы вывести своё движение «бореистов» в центр общественного внимания. Вскоре оно превратилось в самую мощную народно-религиозную силу города. Несмотря на сопротивление правящих кругов, со временем всё больше прихожан и храмовых служителей стали переходить на их сторону.\n\nПосле совершённого канцлером покушения на его жизнь Дезрамо был вынужден бежать в провинцию, укрывшись там с небольшой горсткой верных соратников. Едва до окраин донеслись слухи о масштабных бунтах, вспыхнувших из-за вестей о состоянии канцлера, Дезрамо немедленно двинулся на город. Он твёрдо знал: жив Гишар или мёртв, час действовать настал. На волне бурной и стремительной революции Дезрамо взял управление в свои когти, обещая светлое будущее всем верным чадам Скайфола..."
harmonic_socialist_trade_birb_desc: "§YДата рождения§!: 21 июля 972 года\n\n§YБиография§!: Клотбик де Альтесбург родился в семье, которую по меркам Скайфола можно было отнести к среднему классу. Его отец владел небольшой верфью в городском порту, занимался строительством, ремонтом и переоборудованием судов, а также вкладывал средства в торговые дела и рыбный промысел. Мать была простой провинциалкой, приехавшей в город в надежде на выгодный брак, но вместо этого обретшей искреннюю и глубокую любовь.\n\nОтец Клотбика долгие годы пользовался славой известного благотворителя и проявлял искреннюю заботу о судьбе каждого рабочего на своей верфи. Однако привычный уклад вещей рухнул, когда по континенту покатилось колесо революции. Мятежные силы вынудили отца Клотбика спешно бежать к берегам Нова Грифонии, в то время как остальная семья укрылась в скромном доме, унаследованном от материнской родни. Когда пожар войны охватил их городок, Альтесбурги прославились среди соседей тем, что укрывали от насилия самых разных грифонов – вплоть до имперского командира, которого они сумели убедить сложить оружие перед республиканцами и тем самым избавили его солдат от неминуемой гибели.\n\nВ таком мире и рос Клотбик де Альтесбург. На его глазах изгоняли республиканцев, утверждалась власть Гишара, а правление стареющего ненавистного грифона становилось всё более тяжким бременем. Отец Клотбика так и остался на чужбине, поскольку Гишар считал его присутствие в Скайфоле опасным. В 1000 году Клотбик вернулся в город и вскоре сблизился с протестными кругами. Неизменно предпочитая мирные реформы кровавому насилию, он воспользовался революцией после кончины диктатора, чтобы сплотить вокруг себя умеренные силы и провозгласить, по его собственному выражению, «правление, опирающееся на мягкое крыло, а не на острый коготь».\n\n§YАвтор портрета§!: Scroup"
anarcho_socialist_trade_birb_desc: "§YДата рождения§!: 1 мая 941 года\n\n§YБиография§!: Хендрик Роузбик появился на свет в семье фабричных рабочих. В те годы Скайфол стремительно превращался в индустриальное сердце Грифонии, а его бурно растущая экономика возвещала приход новой промышленной эпохи для всего континента. Родители Хендрика перебрались в город из глухой провинции в поисках лучшей доли, однако суровая реальность быстро развеяла их надежды, подчинив изнурительному труду в душных цехах. Хендрик с малых лет разделил их участь, впитав в себя тяжёлый фабричный дух.\n\nОтдав заводским станкам первые двадцать лет своей жизни, Роузбик сплотился с трудящимися разных предприятий в единый рабочий союз. Они начали распространять листовки, в которых призывали вовсе не к кровавому бунту, а к мирным преобразованиям. В ту пору Хендрик не считал индустриальный мир злом, а окружающие его порядки порочными до основания. Но вскоре всё изменилось.\n\nВ один из дней, когда он выступал с речью перед товарищами, в цех ворвались некие громилы. Назвавшись «частной полицией», они объявили, что Роузбик арестован по обвинению в государственной измене, убийстве, разбое и насилии над ребёнком, имя которого назвать отказались, равно как и предъявить доказательства. Поняв, какая участь его ждёт, Хендрик не растерялся: он схватил лежащий рядом револьвер и открыл огонь по нападавшим. Выиграв секунды для бегства, он на долгие годы ушёл в подполье. Время скитаний лишь закалило его дух. В 978 году ему выпал шанс поквитаться с угнетателями, но, вовремя осознав обречённость республиканского восстания в городе, Роузбик увёл своих сторонников до того, как каратели нанесли основной удар. Так он спас рабочее движение от полного истребления.\n\nИ вот теперь, когда самый ненавистный грифон во всей Грифонии наконец мёртв, пожилой Роузбик готов возглавить Скайфол, чтобы воплотить в жизнь давние помыслы о подлинном народном освобождении.\n\n§YАвтор портрета§!: Cofido"
authoritarian_socialist_trade_birb_desc: "§YДата рождения§!: 23 декабря 957 года\n\n§YБиография§!: Адальберт Гровдер родился в зажиточной скайфольской семье на самом пороге эпохи повальной индустриализации. Его отец работал банкиром у одного из зарождавшихся магнатов города, считал себя интеллектуалом и держал дома множество книг, которые Адальберт поглощал с ненасытной жадностью. Однажды юноше в когти попал примечательный труд кобылицы Карамель Маркс из далёкой земли, призывавшей к восстанию мирового пролетариата и освобождению от власти капитализма. Семья Гровдеров посчитала это лишь юношеской блажью и закрывала глаза на горы социалистической литературы, заполонившей комнату Адальберта.\n\nВ двадцатилетнем возрасте Гровдер решил заявить о себе во весь голос и явился на митинг в защиту видного социалиста тех лет, Хендрика Роузбика, с которым в будущем ему ещё предстояло столкнуться лбами. К тому времени Адальберт уже отточил ораторское мастерство. Взобравшись на деревянные ящики перед заводскими воротами, он разразился пламенной речью с критикой капиталистического уклада, сыпал перед собравшимися собственные выводы из марксистского учения. Его выступление довело толпу до исступления, и на самом пике Гровдер открыто призвал к скайфольской революции. Разумеется, его тут же скрутили стражи порядка и бросили за решётку. Однако заточение обернулось благом: за год в камере он написал автобиографический трактат «Моя жизнь и борьба за революцию». Книга быстро снискала популярность среди городских радикалов и республиканцев, разглядевших сокрушительную силу в труде этого грифона. Но весь этот потенциал оказался тщетен перед лицом грозового 978 года. Гровдер оставался в неволе, пока кровь его восставших единомышленников заливала улицы родного города. Эта демонстрация насилия лишь ещё сильнее ожесточила Гровдера и укрепила его радикальные убеждения.\n\nПосле освобождения он долго держался в тени, не вмешиваясь в подпольные распри, и явил себя миру лишь тогда, когда крушение старого порядка в Скайфоле стало неизбежным. Теперь он готов железным крылом перекроить страну согласно собственному видению.\n\n§YАвтор портрета§!: Didicody"

