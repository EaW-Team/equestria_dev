HAU_naval_raiding_desc:0 "Когда Мейер и его асы прибыли на Перекрёсток, они обнаружили бедный и покорный Хаукланд. Давным-давно исчезло наследие пиратов и искателей приключений с хаукландских островов. Но теперь прибрежное население других стран снова научилось молиться своим богам. Молиться, чтобы корабли и грифоны из старых сказок не подошли к их берегам. Ведь когда они приходят, современные хаукландские пираты бороздят моря не на старых деревянных лодках, а на стальных судах, работающих на угле или мазуте и поддерживаемых авиацией.\n\nУ нас есть §G[?loot|0]§! ед. £loot_text  §Yдобычи§!.\n\n§YНажмите на один из маршрутов, чтобы открыть меню рейдов!§!"
