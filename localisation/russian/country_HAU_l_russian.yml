### LEADER DESCRIPTIONS ###
Hermman_Meyer_desc:0 "§YДата рождения§!: 5 октября 953 года в Кроне\n\n§YБиография§!: Герман Киссенберг-Боткамп, родился вне брака в Кроне в 953 году от несовершеннолетнего дворянина и крестьянки. Он провёл странное детство. Его отец был имперским дипломатом, но лишён удачи из-за азартных игр. Герман всё ещё наслаждался роскошной жизнью, будучи принят в особняке за пределами Грифенхейма дворянином, который имел роман с его матерью. Эта ситуация не давала ему ни стабильности, ни счастья, но он всё же путешествовал с отцом и посещал престижные военные кадетские училища. Будучи молодым кадетом, он мало интересовался рыцарскими обычаями, но было одно изобретение, которое захватило его ум: самолет. К сожалению, вступление в Императорскую Воздушную Академию было для него слишком скромным положением. Именно в это время его семья была изгнана из особняка его юных лет и его отец, теперь уже пьяница, начал терять благосклонность при дворе. По странной иронии судьбы это дало Герману свободно следовать своей мечте. После прощания с матерью, он записался в Академию под фамилией своей матери: Мейер.\n\nГерман оказался одаренным и популярным пилотом и уже в 974 году окончил высшую школу. В последующие годы он много писал о воздушной тактике, но к большому неудовольствию неумелых дворян, возглавлявших Академию, они видели в нём не более чем выскочку-дурака. Эти дворяне регулярно отправляли его на бесполезные миссии, но это было не так уж и плохо. Поездка в Ведину в 977 году привела его к встрече с любовью всей его жизни: Стеллой, на которой он женился в течение года.\n\nПосле Грифоньей Революции 978 года он был поставлен во главе новых республиканских военно-воздушных сил, несмотря на то, что он мало заботился о мечтах Кемерская. Когда Республика пала, он запрыгнул в свой самолет со своими товарищами, и они улетели в Хаукланд. Хоть он добился большого успеха в возрождении старых хаукландских традиций рейдов и пиратства, но его также настигла трагедия. Стелла умерла от пневмонии в Ведине в 980 году.\n\nТеперь Мейер самопровозгласил себя графом Хаукланда и больше не был простым летчиком-асом или предателем как Революции, так и Империи. Но ему этого было недостаточно. Он хочет большего, гораздо большего.\n\n§YАвтор портрета§!: Scroup"
Meyer_king_desc:0 "§YДата рождения§!: 5 октября 953 года в Кроне\n\n§YБиография§!: Рожденный от мелкого дворянина и крестьянки, Герман Киссенберг-Боткамп вёл странную жизнь. Родившись больным в дворянстве и плохо воспитанным неумелым отцом, он бросил учебу, взяв фамилию матери, и поступил в Императорскую Воздушную Академию. Однако его начальство не признало его таланта, и только в 978 году он был признан великим, получив роль лидера республиканских ВВС. Однако, когда случилась контрреволюция, он снова ударил по своим товарищам и бежал в Хаукланд. Там он стал графом Хаукланда и бичом моря. Но этого было недостаточно. В 1007 году он начал реорганизацию Хаукланда, чтобы сделать его пригодным для великой войны. Теперь его достижение окончено. Его имя Герман Мейер, первый своего имени, король Ведины и Повелитель Драконов. Легенда, пусть и старая и без наследника. Но кого волнует, что произойдет после?\n\n§YАвтор портрета§!: Scroup"
HAU_ivory_ice_desc:0 "§YДата рождения§!: 23 июня 969 года, Хаукланд\n\n§YБиография§!: Айвори Айс является защитницей коренных пони Хаукланда. Она отстаивает их права в краю, где выживание часто ставится превыше идеалов. Будучи убеждённой защитницей природы, она долгое время боролась против безрассудной эксплуатации богатств Хаукланда, веря, что земля должна служить всем, а не только тем, кто стремится опустошить её ради сиюминутной выгоды.\n\nЕё политический путь был тернист. В стране, где военачальники, наёмники и изгои правят силой, призывы к сотрудничеству и устойчивому развитию зачастую считают наивными глупостями. Однако она выстояла вопреки опасностям и политическим бурям, зарекомендовав себя редкостной упрямостью и непоколебимостью на раздробленной политической арене Хаукланда.\n\nДля одних она идеалистка, для других – последний нравственный ориентир в стране, всё глубже погружающейся в анархию. Но лишь время покажет, сможет ли когда-нибудь воплотиться в жизнь её видение мирного и процветающего Хаукланда.\n\n§YАвтор портрета§!: BunnyShrubby"
HAU_ervin_krain_desc:0 "§YДата рождения§!: 14 августа 956 года, Альтенкирх, Герцланд\n\n§YЗвание§!: первый лейтенант\n\n§YБиография§!: Эрвин Крайн был офицером 6-ой дивизии "Герцландер" и яростно сражался во время Республиканской революции 978 года на стороне проигравших имперцев. Его некогда гордая и верная имперскому трону дивизия постепенно таяла по мере наступления революционеров. В отчаянной попытке спасти своих солдат генерал Хайнер Прайдфезер перешёл вместе с дивизией на сторону Республики.\n\nОднако они получили лишь временную передышку. Не прошло и года, как контрреволюция сокрушила республиканцев в вихре крови и стали. Для Крайна поражение стало не только политическим, но и глубоко личным. Он потерял товарищей, дело всей жизни и даже часть самого себя – осколок снаряда пробил его череп, повредив лобную долю мозга. Эрвин выжил, но перестал быть прежним. Травмы изменили его личность: под маской обаяния и идеализма теперь таится непредсказуемая нестабильность.\n\nКогда остаткам 6-ой дивизии предложили новую жизнь в Хаукланде под началом мятежного Мейера, Крайн последовал за ними без колебаний и возражений. Там, на холодных островах, он обрёл новое братство, сблизившись с Мейером за общими попойками и горестями. И всё же, несмотря на узы товарищества, во взгляде Крайна сквозит холод. Его мысли постоянно уносятся на восток, к далёкому Герцланду и павшим товарищам, которые так и остались лежать в родной земле.\n\n§YПортрет§!: BunnyShrubby"
HAU_noble_result_desc:0 "§YДата рождения§!: 4 ноября 960 года, Лонгсворд\n\n§YБиография§!: Бывший боец Освободительной армии Лонгсворда ожесточённо сражался за идеалы революции, пока цена этой борьбы не стала невыносимой. Бесконечное кровопролитие и давящая тяжесть войны в конце концов сломили волю Ноубл Резалта. Оставив прошлое позади, он бежал на север в поисках убежища, где никто и никогда не смог бы его узнать.\n\nХаукланд дал ему этот второй шанс. Принятый разрозненными племенами пони Северных островов, он нашёл новый смысл жизни среди местных рыболовов. Возглавив Союз северных рыбаков, Ноубл стал добиваться справедливого отношения к рабочим и укреплять трудовую солидарность. Но что более важно – он обрел здесь семью, женившись на местной кобылке и став отцом маленькой дочки. Эта жизнь была бесконечно далека от кровавых полей Лонгсворда.\n\nОднако, как бы он ни пытался принять это мирное существование, прошлое никогда не исчезает бесследно. Несправедливость, с которой он когда-то боролся, по-прежнему процветает, и теперь, когда Хаукланд замер на пороге перемен, Ноубл Резалт может снова оказаться втянут в борьбу – хочет он того или нет.\n\n§YПортрет§!: Ansta"
HAU_raimund_kuchler_desc:0 "§YРождён§!: 2 мая 969 года в Грозенштайне, Нова Грифония\n\n§YЗвание§!: адмирал\n\n§YБиография§!: Родившись в семье простого рыбака в Нова Грифонии, Раймунд Кюхлер всегда хотел от жизни большего, чем вытаскивать сети и потрошить рыбу. Он поступил в морскую академию, надеясь обрести престиж, но бунтарская натура и неуважение к любой власти сделали своё дело: он вышел оттуда с минимальным баллом – и то лишь потому, что отчисление оказалось слишком бюрократизированным.\n\nПо-настоящему его карьера началась только после дезертирства. Подавшись в пираты, он заработал репутацию грозного налётчика, атакуя нова-грифоньи торговые суда, и собрал вокруг себя команду из таких же моряков-неудачников и прожжённых преступников. Раймунд много лет бороздил моря и грабил гражданские корабли, но однажды с ним связался Мейер. Тот предложил ему принять командование флотом Хаукланда и навести порядок в его работе, а взамен предоставил его команде защиту своего государства-изгоя.\n\nМейеру не пришлось повторять дважды – грифон сразу принял предложение. Теперь, бороздя моря под флагом Хаукланда, пиратская флотилия Раймунда стала куда более организованной, наглой и опасной, чем прежде, а вместе с тем под его управление перешла и кустарная флотилия самого государства – сила столь же непредсказуемая, сколь и её лидер. Действительно ли пират служит Мейеру или просто видит в Хаукланде свои новые охотничьи угодья – вопрос открытый, но пока что их цели совпадают, а это самое главное.\n\n§YАвтор портрета§!: Blakasmoko"
HAU_onyxstar_desc:0 "§YДата рождения§!: 26 февраля 972 года в Галлопфрее\n\n§YЗвание§!: Оберст\n\n§YБиография§!: Оникс Стар родился в семье землевладельцев в Галлопфрее и был далек от идеального жеребенка: неуправляемый, легко отвлекающийся и склонный к насилию. Будучи третьим в очереди и не проявляя большого интереса к горнодобывающему или лесозаготовительному бизнесу, Оникс Стар отправили учиться в Кантерлот, но после года вечеринок он эффектно провалил экзамены. Ему был дан окончательный вариант: военная академия. Он согласился.\n\nХотя он лучше учился в армии, чем в классных комнатах, инструкторы не смогли научить его надлежащей дисциплине, и его часто наказывали. Через четыре года его выгнали и ненадолго вернули домой.\n\nБлудный пони украл немного денег у своих родителей и сбежал на юго-восток, где присоединился к разной группе наемников, в какой-то момент работая на доктора Кабальерона. В 1003 году он сформировал собственную команду и начал продавать свои услуги на море, защищая корабли от пиратов или работая на них. Пока он не получил известие, что Герман Мейер набирает рекрутов.\n\n§YАвтор портрета§!: BunnyShrubby" 
HAU_helga_spinebreaker_desc: "§YРождена§!: 21 февраля 964 года в Махарь-Фьяранне, Сообщества Полярных Медведей\n\n§YРоль§!: Советница по делам наёмников\n\n§YБиография§!: Свою репутацию Хельга заработала ещё задолго до того, как сошла на берега Хаукланда. Эта высокая медведица-воительница была одной из самых доверенных офицеров Пау Веллингтона, маршируя во главе его армии во время республиканской революции. Суровая, дисциплинированная и абсолютно невозмутимая перед ужасами войны, она служила одновременно и щитом для своих соратников, и молотом их врагов.\n\nКогда война закончилась и их контракты были выполнены, многие наёмники разошлись по домам. Хельга этого не сделала. Заработав свои деньги и насытившись по горло приказами других, она решила остаться в Грифонии в поисках места, где её силу и боевое чутьё смогут оценить по достоинству. Это был всего лишь вопрос времени, когда Мейер придёт к ней с правильным предложением.\n\nВ качестве советницы Хельга обладает не только силой, но и практическими знаниями закалённой наёмницы. Она известна своей прямолинейностью, профессионализмом и абсолютной верностью – пока ей платят, конечно же. Хельга не обольщается насчёт политики или идеологии; для неё война – это ремесло, а её дело – проливать кровь. Некоторые шепчут, что её верность столь же холодна, сколь и тундра, из которой она прибыла, но для тех, кто может позволить её слуги, она является бесценной союзницей.\n\n§YАвтор портрета§!: Blakasmoko"
HAU_frosch_desc:0 "§YРождён§!: 13 июля 947 в Марчштеттене\n\n§YЗвание§!: полковник\n\n§YБиография§!: Эрхард Фрош родился в семье худородных дворян в Катерине. Его род никогда не имел влияния при дворе, не говоря уже о богатстве, и поэтому молодому Эрхарду, по сути, не оставалось иного выбора, кроме как устроиться на службу имперским юнкером. До 978 года он служил совершенно непримечательным кадровым офицером, а затем, во время Грифоньей революции, перешёл на сторону республиканцев. Впрочем, будучи очень блёклым и к тому же одним из немногих республиканцев родом из Катерина, он не смог заручиться достаточной поддержкой и так и остался обычным офицером на службе у молодой республики.\n\nВ день, когда контрреволюционеры перешли в повторное наступление, отряды Фроша были расквартированы на юге Грифенхейма и во всеоружии схлестнулись с ними в бою. Несмотря на отчаянную храбрость, противников было слишком много, и солдаты Эрхарда столкнулись с реальной угрозой полного уничтожения. Тогда же офицер решает связаться со штабом, чтобы запросить помощь, и по радио узнаёт, что Герман Мейер предал революцию и готовится бежать. Несмотря на это, Фрош принимает роковое решение и напрямую просит Германа об авиаподдержке, и тот соглашается, давая возможность войскам Эрхарда перегруппироваться и отступить.\n\nФрош, чья армейская карьера была загублена на корню, во время похода до Клаудбьюри аналогично разочаровался в республиканских идеалах и подался в наёмники. Теперь же, услышав зов Мейера, он прибыл в Хаукланд, намереваясь вернуть Герману свой долг.\n\n§YАвтор портрета§!: Blakasmoko" 
sunglider_hau_desc:0 "§YДата рождения§!: 12 июня 956 года в Грифенхейме\n\nШнабель Санглайдер ещё не потерял свой глаз на службе славной Республике, так что он мог видеть, как Клаудбьюри пал перед монархистами – но история уготовила ему иную роль. Вице-президент республики с 995 по 1003 годы и начальник штаба с 1003 года, Шнабель Санглайдер был одним из самых верных сторонников режима Александра Кемерская и демократических ценностей, обещанных революцией 978 года.\n\nБудучи идеалистом, Санглайдер боролся за права народа с тех пор, как в 975 году вступил в Национальную Республиканскую Партию, став её неофициальным лидером ещё в юности. Оттуда он пришёл к власти во время революции 978 года, пожимая когти маршалу Кемерскаю вместе с генералами Николь Роузвинг и Рейнхардом Сантейлом. Санглайдер сражался бок о бок с Рейнхардом Сантейлом в Кронской кампании, но получил пулю в глаз во время боевых действий. Унесённый медиками, он чудом выжил, но нашёл Крону в руинах – Рейнхард Сантейл разграбил город до основания в отместку за имперские преступления и предполагаемую смерть Санглайдера.\n\nХотя он так и не оправился от потери глаза, Санглайдер продолжал сражаться. Недовольный Сантейлом, он бился за Кемерская в северных кампаниях с яростью, с которой двуглазые грифоны едва могли сравниться. Одноглазый призрак, Санглайдер оставался закалённым тактиком и грозным генералом на протяжении всей службы в республиканских вооружённых силах.\n\nСегодня Санглайдер принял мантию президента-маршала республики в Хаукланде и готов защищать Республиканскую мечту любой ценой.\n\n§YАвтор портрета§!: Upevig"
alex_jr_hau_desc:0 "§YДата рождения§!: 6 октября 974 года в Виннине\n\nАлександр Кемерскай-младший родился, когда его отец был еще рыцарем Александром Кемерским, принцем Виннином и маршалом Императорской Армии.\n\nАлександру было всего 4 года, когда его отец начал революцию, которая должна была изменить ход мировой истории. Его мать приютила его в Грифенхейме, и Кемерскай, боясь потерять их, организовал для них поездку на лодке из недавно захваченного порта Фетизии в мирное Королевство Ведина. Когда Кемерскай в конце концов прибыл в Клаудбьюри после неудавшейся революции, он попросил своего сына поехать с ним, и в 981 году они снова объединились, Александру-младшему было тогда всего 7 лет.\n\nАлександр, как и его отец, вступил в армию как только ему исполнилось 18 лет, и он с достоинством служил, поднимаясь в ряды, чтобы стать генералом Республики, как и его отец до него.\n\nВ настоящее время он поднялся на должность Президента-Маршала Республики в Хаукланде, готовый продолжать наследие своего отца и положить конец имперцам, даже если он контролирует лишь несколько островов в узком море.\n\n§YАвтор портрета§!: Upevig"
emerich_hau_desc:0 "§YДата рождения§!: 3 мая 957 года в Винтербелле\n\nВальтер Эммерих родился в семье торговцев в Винтербелле, в Клубничном Герцогстве, и должен был присоединиться к семейному бизнесу на реке Грифинг. Однако у Эммериха были другие планы относительно своей судьбы, и когда ему исполнилось 16 лет, он попрощался с родителями и отправился на пароходе вниз по Грифингу в Грифенхейм.\n\nОднако жизнь городская жизнь оказалась совсем не такой, какой её представлял себе Эммерих, и вскоре ему захотелось вернуться обратно домой. Разочарованный бедностью и раздорами в столице после смерти популярного Гровера IV, Эммерих стал активно действовать в подпольных республиканских кругах.\n\nКогда революция разразилась в 978 году, Эммерих ликовал и участвовал в штурме Императорского дворца вместе с тысячами простых граждан. Несмотря на то, что он не имел ни малейшего военного опыта, Президент-Маршал назначил его офицером за его действия при штурме дворца, но большинство историков утверждают, что Кемерскай назначил его для обеспечения поддержки среди фанатичных республиканцев, которые всё ещё рассматривали его как оппортуниста.\n\nЭммерих быстро учился у своих товарищей-офицеров, участвовавших в Первой и Второй Междуреченских Кампаниях, но был побежден во Второй Битве при Виннине Эрихом Эбенвингом.\n\nТеперь, Эммерих добрался до Хаукланда, с новой, демократической идентичностью для Республики — единством и сотрудничеством.\n\n§YАвтор портрета§!: Upevig"
