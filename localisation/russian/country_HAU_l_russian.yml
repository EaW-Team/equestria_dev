l_russian:

### ideas ###
HAU_trading_crossroads:0 "Перекрёсток"
HAU_trading_crossroads_desc:0 "Хаукланд занимает стратегическое положение к северу от небесного моря, буквально на перекрестке между Грифонией и Эквусом. В прошлом это позволяло Хаукланду быть плацдармом для вторжений между двумя континентами и очагом пиратства. После порабощения династией Гроверов Хаукланд превратился в простой ряд портов на полпути между берегами Империи и Нова Грифонией, к большому разочарованию свободомыслящих хаукландцев. Под руководством Мейера Хаукланд возродил старый перекресток платных путей. Корабли платят либо за защиту, снабжение, либо просто за то, чтобы сбросить хаукландцев со спины. Нова-грифонцы, грифоны всех мастей, вединцы, эквестрийцы, пираты или даже коммунисты из Сталлионграда, Мейер приветствует их всех, пока они платят. Многие так и делают. Как оказалось, многие корабли недолго думая столкнулись с пиратами при поддержке авиации. И все это стекает обратно в карманы клики Мейера."
HAU_trading_crossroads_1:0 "Перекрёсток"
HAU_trading_crossroads_1_desc:0 "Благодаря реформам Мейера наша ситуация изменилась. Мы больше не полагаемся только на продажу пиратской добычи. Вместо этого, мы начинаем экспортировать наши собственные товары."
HAU_trading_crossroads_2:0 "Перекрёсток"
HAU_trading_crossroads_2_desc:0 "Раньше Хаукланд был просто торговым постом между Эквусом и Грифонией. Под руководством Мейера, мы научились использовать ресурсы морей. Теперь рыболовство и китобойный промысел — это не только небольшие виды деятельности, приносящие доход, но и промышленный источник дохода."
HAU_actual_industrial_base:0 "Промышленные предприятия Хаукланда"
HAU_actual_industrial_base_desc:0 "Администрация Мейера позволила индустриализации действительно взлететь в Хаукланде через комбинацию схем, низких налогов и свободных правил. Там, где у нас когда-то были влажные леса и пустынные равнины, теперь стоят заводы, гудящие и выпускающие товары для Хаукланда, чтобы пользоваться ими нам самим или продавать."
HAU_resource_extraction_idea:0 "Богатство Хаукланда"
HAU_resource_extraction_idea_desc:0 "Хаукланд должен приносить доход, это очевидно. Однако мало кто догадывался, что извлекать выгоду можно из самих островов. Недра и территориальные воды Хаукланда полны нетронутых ресурсов. И у нас уже есть целый класс предприимчивых грифонов и пони, которые, почуяв наживу, с энтузиазмом взялись за освоение этих сокровищ."
HAU_enigma:0 "Код Глокенрейхера"
HAU_enigma_desc:0 "Несмотря на все наши сомнения, наши инженеры сделали то, что превзошло наши самые бурные ожидания. Мы, наконец, получили нашу собственную систему шифрования. Названный в честь хитрой зебриканской птицы, Глокенрейхер и его роторный механизм позволяют нам шифровать наши сообщения и документы на высшем уровне сложности, никогда не виданном раньше. Теперь мы можем использовать их на досуге, и если у любого врага глаза станут слишком любопытными, они получат только серию бессмысленных цифр и букв."
HAU_enigma_lar:0 "Код Глокенрейхера"
HAU_enigma_lar_desc:0 "Несмотря на все наши сомнения, наши инженеры сделали то, что превзошло наши самые бурные ожидания. Мы, наконец, получили нашу собственную систему шифрования. Названный в честь хитрой зебриканской птицы, Глокенрейхер и его роторный механизм позволяют нам шифровать наши сообщения и документы на высшем уровне сложности, никогда не виданном раньше. Теперь мы можем использовать их на досуге, и если у любого врага глаза станут слишком любопытными, они получат только серию бессмысленных цифр и букв."
HAU_best_pilots:0 "Новые асы Мейера"
HAU_best_pilots_desc:0 "Когда-то в 979 году летчики-асы Мейера были одними из лучших пилотов. Они были смелыми, молодыми, неортодоксальными и инновационными. Но они становились старше и их становилось всё меньше. Сейчас, когда мы инвестируем в наши ВВС, новое поколение пилотов готовится продолжить наследие асов: быть лучшими из лучших."
HAU_flying_insititue_idea:0 "Мейерский Институт Передовой Авиации"
HAU_flying_insititue_idea_desc:0 "История Германа Мейера и его летчиков-асов началась в Имперской Военно-Воздушной Академии ещё в Грифенхейме. Вполне уместно, что его успех празднуется и почитается в его собственной академии. Те, кто покинет эти стены, будут иметь как современное понимание летной тактики и знаний, так и наследие смелости летчиков-асов."
HAU_piracy_idea:0 "Наследие пиратства"
HAU_piracy_idea_desc:0 "Хаукланд уже давно стал местом пиратства, которое Империя Грифонов успешно уничтожила много веков назад. Но у пиратства, как и у сорняков, есть способ вернуться. И сегодня, в очередной раз, корабли пиратов свободно плавают по Хаукландским островам."
HAU_absolutism:0 "Хаукландский абсолютизм"
HAU_absolutism_desc:0 "Хаукланд под властью Мейера долгое время был местом, где доминировали близкие друзья и Граф в каком-то смысле не вмешивался в дела жителей. Теперь всё изменилось. С той же страстью, с какой он применял в прошлом к восстановлению платы за проезд по перекрестку и созданию безопасного убежища для пиратства, Мейер теперь взял на себя истинное руководство страной в целом. Было дано новое обещание, и мало кто сомневается, что он снова выполнит его."
HAU_absolutism_2:0 "Король горы"
HAU_army_idea:0 "Армия Хаукланда"
HAU_army_idea_desc:0 "С необходимыми осуществленными реформами армия Хаукланда, наконец, на пути к тому, чтобы стать настоящей боевой силой, а не просто разношерстной кучкой неудачников."
HAU_officer_core:0 "Gewinnsüchtig Generalstab"
HAU_officer_core_desc:0 "Самая хорошо вооруженная кучка оборванцев и разгильдяев или другими словами: наш офицерский корпус. Собранные со всех концов мира, эти авантюристы и бывшие офицеры объединили свои знания чтобы использовать их в будущих войнах Хаукланда. Однако, не ожидайте такого же уровня формальности или дисциплины, которого вы обычно ожидаете от военных офицеров."
HAU_smugglers_idea:0 "Порт контрабандистов"
HAU_smugglers_idea_desc:0 "В каждой стране есть контрабандисты, а на стратегически расположенных островах их еще больше. Хаукланд ничем не отличается. Однако для того, чтобы контрабанда действительно стала успешной и устойчивой деятельностью, требуется еще несколько шагов, которые мы предприняли."
HAU_successful_raid_idea:0 "Успешный рейд"
HAU_successful_raid_idea_desc:0 "Пиратские команды всё ещё не отошли от нашего последнего рейда. Мы должны заставить их протрезветь, заправить корабли и самолеты и сделать кое-какой ремонт, прежде чем мы сможем запустить еще один."
HAU_raided_idea:0 "Рейд Хаукланда"
HAU_raided_idea_desc:0 "Хаукландцы совершили набег на наши берега. Это займет некоторое время, прежде чем мы сможем восстановить повреждения."
HAU_take_the_hoards_idea:0 "Налог на сокровища"
HAU_take_the_hoards_idea_desc:0 "В мире есть несколько простых истин. Одна из них заключается в том, что драконы любят золото и хранят его. Как таковые, они были истощением мировых запасов золота. Но в очередной раз Хаукланд бросил вызов здравому смыслу чистой решимостью и немного безумием. Теперь, драконы платят свою справедливую долю. Ну, настолько справедливо, насколько это возможно, когда налогоплательщики — это огнедышащие машины смерти."
HAU_airforce_with_a_state:0 "Старая гвардия"
HAU_airforce_with_a_state_desc:0 "Хаукланд был восстановлен к независимости летчиками-асами, и они оставили свой след на крошечном государстве, этот след был настолько большим, что ВВС считалось наравне с самим государством. С таким почитанием приходит мастерство воздушной войны и сила, с которой нужно считаться. Тем не менее, это также стареющая сила, которая имеет все больше и больше проблем с поддержанием своего превосходства в области, которая видела несколько десятилетий технического и доктринального прогресса."
HAU_DRG_war_between_the_isles:0 "Война между островами"
HAU_DRG_war_between_the_isles_desc:0 "Используя откровенный шантаж, связи и всевозможные услуги, которые многие задолжали Мейеру, мы сумели добиться доступа к портам по всему западному побережью Грифонии. Это обеспечит нам надёжную логистическую поддержку при вторжении на Драконьи острова."

### Focus ###
HAU_meyers_wild_ride:0 "Вотчина Мейера"
HAU_meyers_wild_ride_desc:0 "28 лет назад Мейер рискнул – и заполучил Хаукланд. С тех пор он пробовал свои силы во многих схемах, всегда добиваясь успеха. При этом он никогда не забывал своих товарищей и сторонников. И за это его прозвали графом хаукландским."
HAU_consolidate_rule:0 "Встреча со старым экипажем"
HAU_consolidate_rule_desc:0 "Со времен "дикой авантюры" старые имперские пилоты составляли истинную основу могущества Мейера и были самыми верными союзниками Графа. Самое время встретиться и поговорить о том, что ждет нас впереди, среди друзей и товарищей по оружию."
HAU_strenghten_authority:0 "Когти на подходе"
HAU_strenghten_authority_desc:0 "В течение многих лет повседневные дела Хаукланда оставались на усмотрение одного из его закадычных друзей, в то время как Граф занимался другими проектами, непосредственно управляя только тем, что ему было нужно. Пришло время объявить, что его новый любимый проект требует всего Хаукланда."
HAU_all_the_ponies:0 "Поняшки"
HAU_all_the_ponies_desc:0 "Хаукланд исторически был главным убежищем для предприимчивых пони, ищущих необычные возможности. Давайте напомним им какую-нибудь историю и побудим их прийти к нашим берегам."
HAU_and_the_griffons_too:0 "и грифошки,"
HAU_and_the_griffons_too_desc:0 "Многие грифоны в последние десятилетия слышали рассказы об успехах Мейера. Давайте пустим слух, что наши двери открыты. Если и есть что-то, способное привлечь грифона, так это пара лишних битов в кармане и обещание, что здесь до его кошелька не дотянутся налоговые инспекторы."
HAU_a_couple_of_pirates:0 "все пираты"
HAU_a_couple_of_pirates_desc:0 "Мир полон пиратов всех мастей, и они всегда ищут безопасную гавань с возможностями для большего грабежа. Привлечь их сюда, на перекресток, будет несложно."
HAU_and_some_mercenaries:0 "и братишки,"
HAU_and_some_mercenaries_desc:0 "Наёмники сейчас очень востребованы. Все хотят их услуг, но немногие страны готовы принять их в мирное время из-за присущей им шумливости. Мы делаем дебош. Они будут чувствовать себя здесь как дома."
HAU_and_a_couple_criminals:0 "а также их грабители!"
HAU_and_a_couple_criminals_desc:0 "Большинство стран видят в преступниках только подонков, возможно, не без оснований, но в Хаукланде мы верим во второй шанс для тех, кто хочет реинвестировать себя за пределами тюрьмы. И если у нас выйдет размять застоявшиеся мышцы, тем лучше."
HAU_build_an_army:0 "Будем строить армию!"
HAU_build_an_army_desc:0 "В Хаукланде есть пираты, летчики-асы и рыбаки. Чего у него нет, так это армии. Чтобы выполнить планы Мейера, нам нужно будет создать всего одну. Нам придётся вернуться к основам, стать умными и срезать много углов. Надеюсь, у нас будет та сила, с которой придется считаться, а если нет — большинство наших солдат уже знают как вести грязную войну."
HAU_get_them_some_guns:0 "Дать им несколько винтовок..."
HAU_get_them_some_guns_desc:0 "Большинству наших новых солдат и экипажей всё ещё приходится сражаться с разными видами оружия. Некоторые из них прибыли из самого Грифенхейма времён "дикой авантюры", и они даже не самые старые в использовании. Если мы хотим иметь шанс выжить, мы должны как следует вооружиться и не надеяться, что наши грифоны привезут достаточно с материка..."
HAU_implement_conscription:0 "...и модную униформу"
HAU_implement_conscription_desc:0 "Нам давно пора выдать нашим грифонам в униформе... Ну, униформу. Не то, чтобы они сражались в своих парадных нарядах, но наши солдаты носят смесь гражданской и военной одежды со всего мира. Хотя это и в странном смысле очаровательно, это очень непрактично."
HAU_actual_officers:0 "Нанять профессиональных офицеров"
HAU_actual_officers_desc:0 "Армии Эквуса и Грифонии славятся косностью, неповоротливостью и одержимостью дисциплиной, из-за чего многие талантливые офицеры уходят со службы. Большинство из них ждёт карьера бандитов или, что ещё хуже, обывателей. Мы можем предложить им свободу и все необходимые ресурсы, чтобы они могли не бросать любимое дело."
HAU_build_a_navy:0 "Будем строить флот!"
HAU_build_a_navy_desc:0 "С тех пор как Мейер разрешил возвращение пиратства в Хаукланд, у нас было достаточно кораблей, чтобы совершать морские набеги. Но даже тогда единственной причиной нашего успеха было присутствие летчиков-асов Мейера. Нам нужен флот, способный стоять на собственных лапах. Ну, у кораблей нет лап, но вы понимаете нашу точку зрения."
HAU_more_pirates:0 "Ещё несколько пиратов..."
HAU_more_pirates_desc:0 "Хаукланду всё ещё не хватает флота, но дела уже обстоят получше. Для этого нам нужны специалисты и корабли. К счастью, у пиратов есть и то и другое, и нам уже удалось привлечь некоторых из них."
HAU_smugglers:0 "...и пара контрабандистов"
HAU_smugglers_desc:0 "Создание флота — это прежде всего военное дело, но это не значит, что мы не можем извлечь из него какие-то выгоды. Имея больше возможностей вместе с нашим флотом, мы сможем обеспечить некоторую защиту контрабандистов и расширить наши операции. У нас уже есть контакты, давайте свяжемся с ними по радио — мы открыты для бизнеса!"
HAU_dockyards:0 "Наши собственные верфи"
HAU_dockyards_desc:0 "У нас есть корабли, но ни один из них не был построен здесь. Все они были куплены, украдены во время "дикой авантюры" или во время набегов или засух пиратами и контрабандистами, которые присоединились к нашему флоту. Такое больше не будет продолжаться. Нам нужно наладить морские работы и начать строить собственные корабли."
HAU_start_industry:0 "Начнём наше развитие!"
HAU_start_industry_desc:0 "Империя никогда по-настоящему не инвестировала в Хаукланд, не говоря уже о том, чтобы помогать ему развивать промышленность. Однако, теперь времена изменились. Теперь это центр нашей власти, и мы не можем полностью полагаться на чёрный рынок, добычу и импорт. С новым притоком населения, у нас будет рабочая сила и ноу-хау, чтобы запустить хаукландскую индустрию."
HAU_electronics_experts:0 "«Специалисты» по электронике"
HAU_electronics_experts_desc:0 "Несмотря на слабую модернизацию Хаукланда, радиосвязь здесь прижилась очень рано из-за необходимости для сообщения между островами и судами. Это породило целое поколение умельцев-самоучек. Многие из этих радиолюбителей не знают даже обычной грамоты, но при должном подходе мы сможем направить их необычные таланты в нужное русло."
HAU_construction_scams:0 "Строительные аферы"
HAU_construction_scams_desc:0 "Чтобы запустить индустрию, вам нужно много вещей. Три из них — это заводские корпуса, жилье и склады. Некоторые из наших более склонных к финансам консультантов придумали схему продвижения иностранных инвесторов. Они могут не получить обещанных доходов, но у нас будут наши здания, даже если некоторые из них не будут такими уж прочными или безопасными."
HAU_first_factories:0 "Наши первые фабрики"
HAU_first_factories_desc:0 "Это не было легко, но через тяжелый труд, мы, наконец, достигли нашей цели: открытия нашей первой настоящей фабрики. Есть ещё много кочек которые нам нужно преодолеть, но в целом, хаукландская промышленность теперь с гордостью существует. У нас просто есть небольшой вопрос, как сделать его прибыльным. И эффективным. И безопасным. Что ж, прибыльным сделаем."
HAU_beat_the_drums:0 "Стучите в барабаны!"
HAU_beat_the_drums_desc:0 "Мы строим флот, армию и промышленность. Только идиоты не поймут, что задумал Мейер. Но для тех, кто этого всё ещё не понял, скажем громко и ясно: война приближается к Перекрёстку. Настало время, чтобы подготовиться."
HAU_intellectual_refuge:0 "Зарубежная интеллигенция"
HAU_intellectual_refuge_desc:0 "В Хаукланде не так уж много университетов и ученых. Всё что у нас есть — это слабая концепция бюджета, свободные правила и некоторые очень убедительные пушки. Мы будем побуждать иностранных интеллектуалов работать на нас, возможно, даже тех, кто не имеет судимости."
HAU_empire_of_the_isles:0 "Король Островов"
HAU_empire_of_the_isles_desc:0 "Признание графа Хаукланда всегда было одним из определяющих достижений Мейера, но Хаукланд так и оставался небольшим, никому ненужным островком в Северном море. Он стремился к чему-то большему и населённому более опасными обитателями, чем пираты. Ни один грифон никогда не побеждал драконов — Мейер будет первым."
HAU_light_dragons_f:0 "Подчинить дракончиков"
HAU_light_dragons_f_desc:0 "Интеграция драконов в наши войска будет трудной задачей во многих смыслах. Однако, многие из них все ещё молодые щенки, и как таковые, они могут быть интегрированы в нашу армию. Мы включим драконов в хаукландскую армию на наших условиях, даже если часть их разрушительной дикости будет потеряна в процессе."
HAU_heavy_dragons_f:0 "Убедить старейшин"
HAU_heavy_dragons_f_desc:0 "Драконы были побеждены, но побежденные существа превращаются в бедных солдат, когда их заставляют служить. Драконы, хотя и находятся в совершенно чуждой шкале силы, ничем не отличаются от других существ. Чтобы по-настоящему насладиться плодами нашего завоевания, нам придется убедить самых могущественных драконов сотрудничать с нами."
HAU_dragonlord:0 "Повелитель драконов"
HAU_dragonlord_desc:0 "Благодаря отваге, силе воли и, вероятно, шальному везению Хаукланд сокрушил Драконьи земли. Никогда прежде никто не устанавливал власть над драконьим родом. Горе тем, кто перейдёт дорогу Мейеру, ибо теперь он летает среди величайших хищников, которых когда-либо видел этот мир."
HAU_crystal_mines:0 "Покормить драконов"
HAU_crystal_mines_desc:0 "Любой идиот знает, что первое и главное условие стабильности — это чтобы население было сытым. Если это условие не будет выполнено, начнутся восстания. Хотя мы победили драконов, лучше нам не видеть как выглядит восстание драконьего голода. Мы позаботимся о том, чтобы значительная часть нашей добычи кристаллов была отведена для их кормёжки."
HAU_settle_the_isles:0 "Поселиться на островах"
HAU_settle_the_isles_desc:0 "Драконьи земли долгое время считались запретным краем, пригодным лишь для самих драконов. Но это вовсе не мрачное место из детских страшилок: эти земли обширны, богаты, красивы и смертельно опасны. И теперь они наши. Раз Мейер смог собрать на дождливых скалах Хаукланда армию, способную сокрушить драконов, то и колонисты на эти берега точно придут."
HAU_take_the_hoards:0 "Налог на драконьи сокровища"
HAU_take_the_hoards_desc:0 "Драконы копят несметные сокровища исключительно ради гордости и любви ко всему блестящему. Мы найдём этим богатствам куда лучшее применение и обложим их налогом. Мы могли бы просто отобрать всё силой, но заставить настолько могучих существ добровольно отдать свои ценности – задача не из лёгких. Пока что ограничимся податями."
HAU_the_one_true_king_of_vedina:0 "Уничтожить Ведину"
HAU_the_one_true_king_of_vedina_desc:0 "Ведина всегда была занозой Хаукланда. Или, может быть, всё было наоборот? Несомненно лишь то, что из всех народов северных морей рыцарское королевство всегда меньше всего желало иметь дело с Мейером на равных условиях или каким-либо случайным образом. Самое время наконец стереть это самодовольство с их лиц... проверенным способом."
HAU_the_king_in_da_norf:0 "Король на Севере"
HAU_the_king_in_da_norf_desc:0 "Если и есть что-то, что коммунисты в Скайнавии не любят, так это монархию — каждый из них сможет это сказать. Мейер не из тех грифонов, которые заботятся о том что о них говорят, но он, конечно, не потерпит идиотов призывающих других подняться и взять то что принадлежит ему. Настало время показать скайнавцам значение и мощь хаукландского капитализма."
HAU_the_coronation:0 "Коронация"
HAU_the_coronation_desc:0 "Драконы пали, вединские рыцари преклонили колени, а коммунисты наконец-то усвоили преподанный им урок. Какой король или император может похвастаться столь легендарным подвигом? Кто ещё смог бы зайти так далеко, начав почти с нуля, если не Герман Мейер? Теперь мир признаёт то, что он заслужил силой, а не правом рождения: титул короля."
HAU_in_the_shadow_of_the_past:0 "В тенях прошлого"
HAU_in_the_shadow_of_the_past_desc:0 "Мейер никогда не разделял взглядов республиканцев на будущее. И всё же годы, проведённые в сражениях плечом к плечу, выковали узы, которые не так-то просто разорвать границами или флагами. Теперь, когда Хаукланд окружён врагами, а судьба северного царства висит на волоске, сентиментальность стала непозволительной роскошью."
HAU_our_new_republican_buddies:0 "Наши старые республиканские друзья"
HAU_our_new_republican_buddies_desc:0 "Война окончена, знамёна сорваны, а некогда непоколебимые идеалы обратились в пепел. И всё же Мейер не забыл узы товарищества, выкованные в грязи и крови республиканской борьбы. Не всякий враг не заслуживает прощения, и не каждая война должна заканчиваться полным истреблением."
HAU_whitetails_ruin:0 "Гибель Уайттейла"
HAU_whitetails_ruin_desc:0 "Драконы Хаукланда теряют терпение. Некоторые требуют собственных земель, но не чтобы строить или править, а чтобы копить богатства и властвовать, как велит им их природа. Если позволить подобной жадности пустить корни внутри наших границ, это лишь сильнее расколет страну. К счастью, горы Уайттейла – простая и лёгкая цель..."
HAU_dragons_new_lair:0 "Новое логово драконов"
HAU_dragons_new_lair_desc:0 "Горы Уайттейла захвачены, и драконы согласились переселиться туда. Там ящеры обустроят собственные владения, что позволит погасить разгорающееся пламя напряжённости в самом сердце Хаукланда. Подобная договорённость заставила драконов присмиреть... хотя бы на время."

HAU_bridge_the_archipelago:0 "Соединить архипелаг"
HAU_bridge_the_archipelago_desc:0 "Жители Хаукланда проявляли изобретательность, налаживая навигацию и связь между островами. Яркими примерами тому служат раннее внедрение радио и повсеместное использование маяков. К сожалению, эти методы безнадёжно устарели. Если мы действительно хотим модернизировать страну, пора инвестировать в радары и современные стандарты радиосвязи."
HAU_coffe_fields:0 "Расширение рыбного хозяйства"
HAU_coffe_fields_desc:0 "Давайте смотреть фактам в лицо. В Хаукланде нет практически ничего ценного, кроме рыбы и морских солей. Это не славно, но каждый должен с чего-то начать. Давайте инвестировать в наш промысел, покупая новые лодки и оборудование."
HAU_coffee_canning_plant:0 "Хаукландский Рыбный Консервный Завод"
HAU_coffee_canning_plant_desc:0 "Рыбаки традиционно работают индивидуально или небольшими группами в Хаукланде. Хотя он может воплощать нашу традицию жесткого индивидуализма, он создает плохую экономическую организацию. Мы создадим компанию, чтобы организовать их, упорядочить рыбную промышленность и максимизировать прибыль."
HAU_incentivize_farmers:0 "Стимулирование рыбаков"
HAU_incentivize_farmers_desc:0 "Традиционная рыбалка на островах может вместить совсем немного населения. С появлением современных судов и более интенсивным промыслом в открытом море нам не хватает рабочей силы. Мы приманим еще больше грифонов и пони, чтобы они пришли к нашим берегам и работали."
HAU_coffee_profits:0 "Живое серебро"
HAU_coffee_profits_desc:0 "Многие скептически отнеслись к инвестициям в рыбную промышленность. Вряд ли стоило ожидать, что предприимчивые пилоты и пираты найдут промышленное рыболовство привлекательным. Но под грудами вонючей чешуи скрываются биты – точно такие же, как те, что высятся стопками на столах зажиточных бизнеспони. Деньги не пахнут, откуда бы они ни взялись."
HAU_radio_schools:0 "Ночные радиоуроки"
HAU_radio_schools_desc:0 "Вопреки тому, что думает о Хаукланде большинство, наши жилища – вовсе не ветхие лачуги без электричества и удобств. Это суровые лачуги, оборудованные радиоприёмниками! С помощью эфира мы сможем нести знания в массы и обучать народ хаукландскому образу жизни. Метод неортодоксальный, но мы и не привыкли действовать по шаблону."
HAU_open_high_schools:0 "Финансировать вузы"
HAU_open_high_schools_desc:0 "Теперь, когда мы немного продвинулись в области образования, мы можем начать финансировать и строить некоторые средние школы, где наши жеребята и птенцы смогут получить надлежащее образование. Это будет гораздо эффективнее, но мы всегда будем с любовью вспоминать те дни, когда мы могли просто отключить скучного учителя по радио."
HAU_whaleing:0 "Поддержка китобойного промысла"
HAU_whaleing_desc:0 "Китобойный промысел – вековая традиция хаукландских моряков, но это занятие всегда оставалось тяжёлым и смертельно опасным. С помощью государственных субсидий мы поможем китобоям обновить снаряжение, сделав их ремесло более эффективным и безопасным. Это способно революционизировать отрасль на годы вперёд и существенно пополнить нашу казну."
HAU_expand_dockyards:0 "Расширить верфи"
HAU_expand_dockyards_desc:0 "Суда, приспособленные для китобойного промысла, трудно найти и дорого стоят. Если мы будем производить их на месте, мы сможем сократить расходы и улучшить их за счет непосредственного контакта с самими китобоями."
HAU_mechanical_slaughter_techniques:0 "Расширить Китобойни"
HAU_mechanical_slaughter_techniques_desc:0 "Киты — это не рыба, которую можно просто бросить на черствый лед и забыть. Они нуждаются в инфраструктуре, рабочих и специальных инструментах для эффективного извлечения из них всех ресурсов. В Хаукланде было несколько таких китобойнь, но не настолько, чтобы вместить то количество, в которое они прибывают сейчас. Нам нужно их расширить."
HAU_whale_profits:0 "Жировая индустрия"
HAU_whale_profits_desc:0 "Китовый жир является ценным промышленным и химическим продуктом. И благодаря нашим инвестициям, у нас его огромное количество. Теперь, нам как раз нужно начать экспортировать жир за море. И скептики, которые говорят, что китовый жир не сможет конкурировать в долгосрочной перспективе с нефтепродуктами, могут вернуться к плаванию в Грифонию."
HAU_heavy_industry:0 "Усиление индустриализации"
HAU_heavy_industry_desc:0 "Модернизация рыболовства и китобойного промысла была лишь первым шагом в развитии нашей экономики. В этом мире равнодушных машин нет места для тех, кто не желает двигаться в будущее. Мы должны продолжать наши инвестиции и проводить настоящую индустриализацию."
HAU_island_roads:0 "Мосты, дороги и ж/д пути"
HAU_island_roads_desc:0 "Долгое время хаукландцы передвигались по островам на лодке или на своих лапах и когтях. Мы прошли долгий путь, и мы должны стремиться к тому, чтобы Хаукланд присоединился к остальному миру, где автобусы, поезда и автомобили заняли свое законное место."
HAU_caneries:0 "Расширить консервные заводы"
HAU_caneries_desc:0 "Наши консервные банки оказались большим успехом в нашем экспорте. Это и не удивительно на самом деле. Эта эпоха была настолько беспокойной, что спрос на длительные и легкие в хранении консервы очень даже высок. Мы должны получать прибыль от этого, расширяя наше производство."
HAU_military_industry:0 "Финансировать оружейников"
HAU_military_industry_desc:0 "Несмотря на нашу репутацию счастливой пиратской нации, поиск современного оружия и боеприпасов всегда был в какой-то степени проблемой в Хаукланде. Субсидируя наших оружейников, мы позволим им наконец-то начать местное производство оружия и боеприпасов в разумных масштабах."
HAU_resource_extraction:0 "Богатство Хаукланда"
HAU_resource_extraction_desc:0 "Как нация, полагающаяся на импорт-экспорт на Перекрестке, Хаукланд всегда немного слишком полагался на импорт. Хотя мы могли бы продолжать уделять основное внимание индустриализации и модернизации, было бы разумно пересмотреть наши земли и территориальные воды в поисках ресурсов. Производство товаров, полностью основанных на наших собственных ресурсах, даст некоторую стабильность и определенность в эпоху, которая остро нуждается в них."
HAU_offshore_oil:0 "Морские нефтяные платформы"
HAU_offshore_oil_desc:0 "Ещё в имперскую эпоху поступали сообщения о том, что в районе Хаукланда скрыты запасы нефти. Однако из-за революции планы по их освоению были отложены. Именно эти сведения стали одной из причин, по которой Мейер выбрал острова в 979 году. Долгое время ему не хватало ресурсов, чтобы начать бурение самостоятельно, но теперь всё изменилось."
HAU_expanded_dockyards:0 "Укрепить судоходные пути"
HAU_expanded_dockyards_desc:0 "Чтобы обеспечить наш возросший выпуск сырья и готовой продукции, нам потребуется больше прочных судов, чтобы экспортировать товары по всему миру, а также импортировать то, что мы до сих пор не можем произвести здесь."
HAU_dig_deep_and_dig_greedily:0 "Копать глубоко и жадно"
HAU_dig_deep_and_dig_greedily_desc:0 "В наши дни металлы пользуются всё большим спросом. К сожалению для нас мы до сих пор должны были импортировать их и не дешево. Мейер возобновил нашу программу добычи, чтобы пробурить землю в поисках новых металлов. Не может быть, чтобы в почве этих скал ничего не было!"

HAU_branching_out:0 "Разветвление"
HAU_branching_out_desc:0 "До сих пор наши Вооруженные Силы были весьма ограничены и состояли только из наших немногих кораблей и морских пехотинцев. Однако, если мы действительно хотим создать нацию, мы должны разветвиться и создать надлежащую армию, чтобы контролировать её."
HAU_army_modernisation:0 "Армия Хаукланда"
HAU_army_modernisation_desc:0 "Наша армия в настоящее время недостаточно велика, чтобы соответствовать амбициям Мейера, и должна быть улучшена и расширена, чтобы удовлетворить его требованию — нам нужна настоящая армия для Хаукланда."
HAU_modern_rifles:0 "Современные винтовки"
HAU_modern_rifles_desc:0 "Наши винтовки, хотя и не неэффективны, довольно примитивны по сравнению с некоторыми зарубежными конструкциями. Наша новая армия требует нового оружия, чтобы соответствовать мировым стандартам, и поэтому мы должны разработать более современные винтовки для наших солдат."
HAU_fill_the_armouries:0 "Заполнить оружейные склады"
HAU_fill_the_armouries_desc:0 "Наши арсеналы пустуют, а нам нужно вооружить ещё солдат. Мы должны делать всё, что потребуется, возвращая выброшенное оружие, покупая его оптом и наращивая производство, чтобы пополнить наши арсеналы и когти наших солдат."
HAU_paratroopers_focus:0 "Десантники"
HAU_paratroopers_focus_desc:0 "Сложная география наших островов затрудняет любые операции. Раньше эти задачи решались исключительно силами флота, но недавние успехи в развитии ВВС позволяют создать специализированные воздушно-десантные подразделения. ВДВ станут эффективной альтернативой морским десантам и долгой транспортировке войск по воде."
HAU_recruitment_drive:0 "Набор персонала"
HAU_recruitment_drive_desc:0 "Какие бы усилия мы ни предпринимали, невозможно построить армию без солдат, чтобы её восполнить. В настоящее время нашему комплексу крайне не хватает новых рекрутов, и если мы планируем какие-либо надлежащие военные действия, мы должны исправить это с помощью пропаганды и стимулов."
HAU_special_forces_drive:0 "Тайные операции"
HAU_special_forces_drive_desc:0 "Мы, или Мейер, часто нуждаемся в солдатах, чтобы выполнять более скрытную работу; такую работу наши простые солдаты могут выполнять недостаточно дисциплинированно или самоотверженно. Обучая элитные, крайне лояльные войска, мы будем иметь солдат для проведения этих операций."
HAU_doctrinal_development:0 "Развитие доктрины"
HAU_doctrinal_development_desc:0 "Несмотря на нашу военную экспансию и модернизацию во многих областях, наша доктрина всё еще устарела — то, что только ухудшается с нашей обновленной и более крупной армией. Чтобы отдать должное нашим новым силам, мы должны углубиться в современную военную теорию с помощью как отечественных, так и зарубежных экспертов."
HAU_support_squads:0 "Радиотряды"
HAU_support_squads_desc:0 "Чтобы идти с нашей новой пехотой, нам нужны способы общения. Мы должны назначить радиогрифонов для наших дивизий, чтобы помочь в общении между нашими солдатами и создать более организованную армию."
HAU_actual_artillery:0 "Гаубица"
HAU_actual_artillery_desc:0 "Армия не может выжить с солдатами в одиночку или, по крайней мере, не может преуспевать. Поэтому для поддержки нашей великой армии мы должны вооружить наши войска более совершенными артиллерийскими орудиями."
HAU_anti_air_focus:0 "Охрана небес"
HAU_anti_air_focus_desc:0 "Допустить контроль неприятеля над нашим небом было бы катастрофой, и мы должны быть готовы к худшему сценарию. Если авиация – наша первая линия обороны – будет разбита, пехоте потребуется достойный ответ вражеским бомбардировщикам. Мощные зенитные орудия позволят нам поражать цели в облаках и защитят солдат от опустошительных налётов."
HAU_the_enigma_code_focus:0 "Принять код Глокенрейхера"
HAU_the_enigma_code_focus_desc:0 "Некоторые инженеры убедили Мейера в поддержке "чудо"-шифровальной машины, где машина декодирует сообщения с помощью системы, использующей роторы и штепсельную плату. Хотя это открытие не оправдывает всё что было объявлено, это все равно было бы большим благом для наших военных и позволило бы проводить более секретные операции."
HAU_paratrooper_tanks:0 "Десантная танковая дивизия"
HAU_paratrooper_tanks_desc:0 "Мейер давно восхищался мощью тяжёлых боевых машин, и развитие танкостроения за рубежом лишь подогрело его интерес. Подобно нашим элитным десантным частям, новые бронетанковые подразделения станут гордостью армии. Это наш первый серьёзный опыт в создании бронетанковых сил, который, тем не менее, обеспечит надёжную поддержку в бою."

HAU_new_officers:0 "Свежее мышление"
HAU_new_officers_desc:0 "Хотя у нас есть военно-воздушные силы, они несколько неразвиты. Если мы хотим взять на себя задачу расширения наших Вооруженных Сил, нам нужно переосмыслить, как мы используем наши самолеты, и изучить различные доктрины."
HAU_strat_bomber_focus:0 "Нет пощады"
HAU_strat_bomber_focus_desc:0 "В наших новых ВВС мы должны использовать легкие многоцелевые бомбардировщики — эти полезные самолеты могут быть использованы как для нанесения ущерба нашим врагам, так и для разрушения их инфраструктуры и промышленности."
HAU_tact_bomber_focus:0 "Бомбы, бомбы, бомбы..."
HAU_tact_bomber_focus_desc:0 "При разработке более совершенных бомбардировщиков мы должны сосредоточиться прежде всего на одном — разрушительной силе. С большим количеством более мощных бомб, упакованных в каждый самолет, мы можем пролить взрывной ад на заводы и солдат нашего врага."
HAU_new_airfields:0 "Соединить острова"
HAU_new_airfields_desc:0 "Наши острова удалены, и путешествовать между ними непросто. Раньше мы полагались на лодки, но с развитием наших ВВС использование авиации для транспортировки стало реальностью. Чтобы наладить сообщение, мы должны расширить существующие базы и построить новую на северных островах."
HAU_fighter_focus:0 "Править небесами"
HAU_fighter_focus_desc:0 "Если мы вообще хотим использовать наши воздушные силы, мы должны сначала контролировать воздух. Без контроля над воздухом наши солдаты уязвимы, а наши бомбардировщики легко уничтожаются врагами. Поэтому истребители должны быть нашим главным приоритетом."
HAU_heavy_fighters_focus:0 "Стражи небес"
HAU_heavy_fighters_focus_desc:0 "Истребители отлично справляются с защитой неба от сил врага, но нам не так важна их дальность полёта, которую можно «обменять» на более мощное вооружение и броню. Давайте модернизируем наши самолёты, превратив их в настоящих «рыцарей неба». Пусть мы не улетим на них далеко от родных островов, зато обеспечим полный контроль над своим небом."
HAU_doctrinal_development_air:0 "Надлежащая подготовка"
HAU_doctrinal_development_air_desc:0 "Наши военно-воздушные силы расширяются, и с производством новых самолетов возникает потребность в новых пилотах. В то время как мы занимались их элементарной подготовкой, она оказалась неэффективной, и её следует реформировать как для того, чтобы больше думать о воздушной доктрине, так и для того, чтобы улучшить способности наших пилотов."
HAU_CAS_focus:0 "Поддержка армии"
HAU_CAS_focus_desc:0 "Войны не выигрываются только с воздуха, и поэтому авиация должна быть сосредоточена на поддержке наших операций на земле. Для этого нам нужно разработать самолеты, способные поражать наземные цели точными ударами, что прекрасно сделали бы самолёты специализированные на непосредственную авиационную поддержку."
HAU_napalm:0 "Напалм"
HAU_napalm_desc:0 "С ростом численности нашего флота и упором на авиационную поддержку войск возникла идея использования альтернативного вооружения. Мейер одобрил внедрение напалма – вязкой нефтехимической смеси, обладающей колоссальной разрушительной силой. Это чрезвычайно горючее вещество идеально подходит для наших бомбардировщиков."
HAU_rocket_projects:0 "Хаукландское ракетостроение"
HAU_rocket_projects_desc:0 "Интерес Мейера к ракетам долгое время оставался лишь мечтой. Но, несмотря на всё ещё ограниченные ресурсы, лидер приказал начать исследования в области ракетной техники, видя в ней будущее военного дела. Неизвестно, оправдаются ли его ожидания, но эти инвестиции позволят нам освоить технологии, доступные лишь немногим."
HAU_the_best_of_the_best:0 "Лучший из лучших"
HAU_the_best_of_the_best_desc:0 "Некоторые считают, что в ВВС должны быть допущены только самые элитные, которые, по мнению некоторых, имеют более высокое качество жизни, чем другие отрасли. Продвигая это отношение и применяя более жесткие стандарты, мы можем гарантировать, что наши грифоны хорошо обучены и дисциплинированы выше остальных."
HAU_flying_institute:0 "Институт Авиации имени Мейера"
HAU_flying_institute_desc:0 "Наша ориентация на элитных пилотов и быстрое развитие более передовых технологий и доктрин привела к открытию университета для пилотов, санкционированного самим Мейером, который было метко назвал Институтом Авиации Мейера. Все пилоты должны пройти специальную подготовку в этой школе, обучаясь как пилотированию, так и ночным полётам."

HAU_reinforce_the_navy:0 "Усилить флот"
HAU_reinforce_the_navy_desc:0 "Море разделяет нашу страну и поэтому вместе с морем необходимо контролировать всю нашу нацию, однако наш флот мал и устарел, печальное зрелище. Мы должны быстро исправить это, если мы хотим сохранить контроль над нашей страной и иметь возможность проводить операции за рубежом."
HAU_naval_aviation:0 "Морская авиация"
HAU_naval_aviation_desc:0 "Идея воздушной и морской войны становится всё более вероятной по мере развития технологий во всем мире, и Хаукланд не останется позади. Нам нужно развивать палубные бомбардировщики, как в дополнение к нашему флоту, так и для возможного использования в будущих авианосцах."
HAU_carrier_efforts:0 "Эксперименты на авианосцах"
HAU_carrier_efforts_desc:0 "Как и к многим другим новым идеям, Мейер проникся симпатией к авианосцам. Он приказал провести эксперименты с моделями авианосцев разрабатываемыми на основе старых линкоров с измененными конструкциями, а также с некоторыми совершенно новыми предлагаемыми проектами."
HAU_new_marines:0 "Укрепить морских пехотинцев"
HAU_new_marines_desc:0 "Контролировать море с помощью флота — это одно, но делать это одновременно нашим флотом и армией — это совсем другое. Наша нация имеет историю сильного морского корпуса пехоты из-за нашей островной природы, и это должно поощряться, поскольку мы возвращаемся к нашим корням."
HAU_winterhold_base:0 "База Винтерхолд"
HAU_winterhold_base_desc:0 "Винтерхолд, самый важный город на северных островах, уже имеет значительную военно-морскую базу. Однако, чтобы лучше соединить острова и позволить большему количеству кораблей причаливать для прибрежных операций, мы должны расширить его еще больше."
HAU_haukland_base:0 "База Хаукланд"
HAU_haukland_base_desc:0 "Военно-морская база в нашей столице Хаукхамне должна быть расширена. Поскольку наш флот становится все больше, нам нужна центральная военно-морская база, чтобы наши корабли могли работать вне береговых операций, и наш капитал позволяет нашим кораблям это вместе с более близким расположением к гражданским и промышленным центрам."
HAU_transport_craft:0 "Десантные суда"
HAU_transport_craft_desc:0 "Несмотря на множество наших морских пехотинцев, у нас все еще есть относительно невпечатляющие и неэффективные десантные корабли. Если мы хотим использовать наших морских пехотинцев в полной мере, нам нужны лучшие десантные корабли для их использования."
HAU_destroyer_focus:0 "Сторожевые корабли"
HAU_destroyer_focus_desc:0 "Чтобы контролировать моря между нашими островами, нам нужны эсминцы, чтобы патрулировать их и поддерживать постоянное присутствие. В то время как наши текущие проекты подходят нам отлично, мы должны развивать варианты посильнее чтобы лучше поддерживать присутствие в наших морях."
HAU_submarine_focus:0 "Эксперименты на подводных лодках"
HAU_submarine_focus_desc:0 "Разработка unterseeboot, сокращенная некоторыми до U-Boot, очаровала многих и считается хорошей инвестицией. Хотя эти корабли не особенно эффективны в управлении морем, они могут легко нарушить снабжение противника на море и атаковать с неожиданностью и сильной огневой мощью."
HAU_guard_the_carriers:0 "Охрана наших авианосцев"
HAU_guard_the_carriers_desc:0 "Чтобы наши новые авианосцы оставались в строю, им необходимо сопровождение. И если малые корабли недостаточно эффективны в этой роли, то крейсеры станут идеальным средством защиты для тяжёлых авианесущих судов, практически лишённых собственного вооружения."
HAU_loot_the_ships:0 "Наследие пиратства"
HAU_loot_the_ships_desc:0 "Наши берега издавна были убежищами для пиратов, и эта традиция отразилась на нашем флоте. Вместо того, чтобы пытаться уничтожить её, мы можем принять это, используя тактику старых пиратов в наших рейдах на подводных лодках и парусах."
HAU_a_grand_flagship:0 "Грандиозный флагман"
HAU_a_grand_flagship_desc:0 "С расширением нашего флота нам нужен корабль вокруг которого мы сможем объединиться — и что может быть лучше, чем великий линкор который будет направлять наш флот? Мощное судно, построенное по последнему слову техники, обеспечит большую общественную поддержку нашему флоту и повысит моральный дух моряков, а также сильно повлияет на морские сражения."

### Events ###
haukland.1.t:0 "Проект Радио-школы"
haukland.1.d:0 "Когда администрация Хаукланда объявила о проведении вечерних занятий в прямом эфире, многие отнеслись к этому скептически и ожидали, что большинство из них откажется от такой скучной темы. Однако оказалось, что эти простые передачи разожгут жажду знаний по всем островам. Первоначальная аудитория была намного больше, чем ожидалось, и оттуда только росла популярность.\n\nВследствие этого успеха радио Хаукланда запустило несколько новых уроков для грифонов всех возрастов. Мы всё ещё далеки от более современных систем образования, внедряемых во всем мире, но нам удалось создать уникальную форму обучения, адаптированную к нашей особой ситуации и ресурсам."
haukland.1.a:0 "Замечательно!"

haukland.2.t:0 "Плоды нашего труда"
haukland.2.d:0 "Это было нелегко, но наши усилия в области образования, похоже, окупились. Студенты всех возрастов настроились на наши радиопередачи и многому у них научились. Благодаря чистому творчеству мы бросили вызов ожиданиям и воспитали нашу нацию. Тем не менее, уроки радио показывают свои пределы, и наши граждане, стремящиеся учиться, требуют больше традиционных библиотек и школ, на что у нас начинает выделяться бюджет. Со временем это может означать конец или, по крайней мере, значительное сокращение Радиошколы. Для многих из нас это будет печально, но у нас всегда будут воспоминания о том времени, когда мы могли бы отключиться или выйти из класса одним щелчком когтя."
haukland.2.a:0 "Отлично!"

haukland.3.t:0 "Жалобы экологов"
haukland.3.d:0 "Расширение нашей китобойной промышленности было встречено с большим энтузиазмом. Условия труда наших китобоев улучшились, и прибыль стала более чем удовлетворительной. Однако есть одна группа, которая была не в восторге от этого: экологи.\n\nГруппа экологов собралась вокруг бойни в гавани Хаукхамн, чтобы потребовать прекращения китобойного промысла в Хаукланде и введения в действие закона О защите морских обитателей. Но в ответ на это, китобои избили экологов, а после их подобрала полиция. Они пытались отправить их домой с предупреждением, но группа не хотела отпускать эту проблему."
haukland.3.a:0 "Просто выбросим их за борт."

haukland.4.t:0 "Прибыль Хаукландского Рыбного Консервного Завода"
haukland.4.d:0 "Поступают сообщения от недавно созданного Хаукландского Рыбного Консервного Завода. Многие рыбаки выражали опасение по поводу переезда или критиковали идею "распродажи". В конечном счёте, большинство из них согласились присоединиться и работать в рамках новых стандартов и квот. Результат был удовлетворительным, прибыль резко возросла. Благодаря участию нашей администрации в компании, наше казначейство видит приток средств и ожидает ещё большего в ближайшие годы!"
haukland.4.a:0 "Чудесно!"

haukland.5.t:0 "Разлив нефти в Винтерхолде"
haukland.5.d:0 "Бедствие обрушилось у побережья Винтерхолда. Во время бурения огромное количество метана под высоким давлением поднялось в буровой установке. Он загорелся и взорвался, разрушив большую часть морской платформы. Сам по себе этот взрыв был достаточно неприятен: он вызвал утечку нефти, которая ежедневно выбрасывала в море тысячи баррелей нефти. Хуже того, управляющий нефтью морской платформы улетел, вместо того чтобы сообщить Хаукхамну об аварии и организовать ответные действия. Некоторые предполагают, что он мог быть иностранным агентом, а не трусливым и некомпетентным грифоном, но сейчас не время спекулировать. Наше драгоценное чёрное золото расходуется впустую, и рыбаки не могут ловить рыбу, пока мы не очистим воды от неё. Нефть, мертвая рыба и птицы омывают берега наших островов."
haukland.5.a:0 "Подумает ли кто-нибудь о тюленях!"

haukland.6.t:0 "Безумный и амбициозный"
haukland.6.d:0 "Двадцать восемь лет назад Мейер убедил значительную часть имперских ВВС позволить республиканцам и имперцам уладить свои дела и отправиться на поиски приключений. И они улетели. Они поселились в Хаукланде, объявив это своим собственным свободным государством. Мало кто из посторонних думал, что они продержатся так долго. Кемерскай поклялся отомстить Мейеру, но так и не сделал этого. Имперское регентство клялось, что оно сокрушит их, но они никогда этого не делали. Эквестрийцы даже присылали письма с приглашением Мейера провести переговоры и восстановить стабильность в регионе, но Хаукланд не реагировал.\n\nТогда Мейер решил попробовать свои силы в пиратстве. Его пилоты скучали и следовали за ним всем сердцем, вместе с местным населением. Он восстановил всё в первоначальное состояние: родовой проезд был восстановлен, каждый корабль должен был заплатить или наслаждаться разговором с рыбой — все было довольно просто. Нова-грифонцы были в ярости, но они платили. Империя не могла ничего сделать из-за того, что их флот и военно-воздушные силы были украдены, разве что они могли жаловаться. Воры скайфольцы тоже жаловались, но в итоге пришли к выводу, что платить дешевле, чем пытаться управлять полным имперским флотом из бюджета города. Эквестрийцы снова послали очень сильно сформулированные, умно написанные письма — Мейер повесил их в своем кабинете как сувенир. Так была восстановлена плата за проезд по Перекрестку.\n\nИтак, Мейер выполнил свои обещания пилотам и местным жителям. Хаукланд процветал. Ну, в каком-то смысле. Деньги текли, существа вокруг со временем привыкли к их присутствию, как к холодному дождю или раздражающему соседу. Они даже узнали, что хаукландцы очень даже приветливы, если вы можете оплатить проезд. То, что многие необдуманные нации, такие как Сталлионград, Скайнавия или Республика, оказались полезными. Эквестрийцы даже перестали отправлять письма.\n\nМногие говорили, что Мейер в какой-то момент уйдёт, но он все ещё здесь и не собирается никуда уходить в ближайшее время."
haukland.6.a:0 "Да здравствует граф!"

haukland.7.t:0 "Речь"
haukland.7.d:0 "Герман Мейер собрал всех своих сторонников и друзей в самом близком месте к парламенту Хаукланда, в баре пилотов аэродрома Хаукланда. Он с любовью огляделся по сторонам – это место напомнило ему о временах обучения в старой академии в Грифенхейме. Много старых лиц, большинство из которых присоединились к нему ещё в "дикой авантюре" 979 года. Без них всех Хаукланд не был бы Хаукландом. Он вышел на сцену, и множество глаз смотрело на него.\n\n"Дорогие друзья. Добро пожаловать всем вам. Нет лучшего места в этом мире где можно пить до утра вместе со всеми вами." Некоторые подняли бокалы за это и зааплодировали. Мейер тоже поднял свой бокал и выпил.\n\nМейер говорил о более ярких временах. Временах, когда несколько отважных революционных пилотов вырвались на свободу от Кемерская и проложили свой путь. Например, когда Ганс украл флаг у эквестрийского линкора, или когда Джейн выкупила сына олигарха из Скайфола только для того, чтобы он сделал ей предложение после того как за него заплатят выкуп. Грифоны кивали, смеялись, кричали, чтобы добавить зловещие детали или выть в насмешливом гневе. Но за всем этим стояла определенная грусть — ностальгия по прошлым временам. Мейер почувствовал перемену и уставился на них...\n\n"Да. Нам действительно было весело. Но мы не становимся моложе, не так ли? Мы осуществили все наши мечты молодости, а затем и некоторые другие, но разве этого достаточно? Я знаю, что у многих из вас есть дети. Некоторые даже знают вас! Не пора ли нам получить немного настоящих денег, чтобы оставить их себе? Не пора ли нам подумать о нашем наследии? Я предлагаю выйти и показать всем этим идиотам, что летчики-асы Мейера — это легенда! Что мы те, которые заставят звучать династию Гроверов как историю на дождливом пикнике! Вы со мной?!"\n\nКаждый из пилотов разразился радостными криками, расплескивая пиво и виски во время воспевания. Потребовалось всего несколько секунд, чтобы поднять весь бар. Мейер улыбнулся. Теперь они собирались ввязаться в последнюю дикую авантюру. Такую, что запомнят на века!"
haukland.7.a:0 "Мейер! Мейер! Мейер!"

haukland.8.t:0 "Власть Графа"
haukland.8.d:0 "На протяжении многих лет хаукландцы пользуются определенной степенью автономии. Никто не мог поставить под сомнение власть Мейера, он всегда оставлял определенную форму невмешательства в управление островами. Некоторые, далеко за пределами Хаукланда, считали это доказательством слабого правления Мейера, но местные жители знали лучше. Правление Мейера было особенным — когда он нацелился на проблему, все должны повиноваться. Что касается остальных, то он с радостью назначал их и позволял им набивать себе карманы и управлять вещами вместо него, пока дела шли хорошо. Но в конце концов, это была не более чем власть дилетантов.\n\nТеперь ситуация изменилась. У асов Хаукланда теперь большие планы, и для их реализации Мейеру нужен был контроль. Многие старые приближенные были сняты со своих постов. В нескольких случаях этот шаг открыто поддержали местные жители, разочарованные соратниками и приветствовавшие правление Мейера. На большей части Хаукланда эта власть была признана без особой суеты. И если в ближайшие недели с теми, кто выступал против Графа, произойдут какие-то несчастные случаи, что ж... В конце концов, это Хаукланд."
haukland.8.a:0 "Я ЗДЕСЬ ГРАФ."

haukland.9.t:0 "Поняшки"
haukland.9.d:0 "На протяжении веков Селестия управляла процветающим царством, и многие пони пожинали эти плоды. Однако не все из них довольны её правлением. Несмотря на все её принципы и силу, многие не могли наслаждаться всем, что могла предложить им жизнь. В конце концов, обещания знаков отличия далеко не проведут...\n\nИменно этих оставленных пони мы взяли к себе под крыло. Конечно, они могли рискнуть, сражаясь за новую надежду, которую предоставлял Сталлионград. Они могли бы эмигрировать за пределы огромных океанов в сообщества пони в Речных Землях, в Новом Мейрленде или даже в Зебрике, но на самом деле... Что предлагали эти места, как не то же самое? То, что есть у Хаукланда, мало есть у кого. Это возможности, прекрасные мечты и, что более важно, кто-то, достаточно смелый, чтобы сделать хорошее для них...\n\nТысячи существ отвечают на призыв наших вербовщиков. Мигранты со всей Эквестрии и даже дальше прибывают в Хаукхамн и Винтерхолд. Некоторые из них могут чувствовать себя немного обманутыми, увидев истинное состояние наших островов. К сожалению, у нас довольно строгая политика невозврата."
haukland.9.a:0 "Добро пожаловать в Хаукланд!"

haukland.10.t:0 "и грифошки"
haukland.10.d:0 "В эпоху революции было понятно, что только смелый будет следовать за Мейером в Хаукланд. Тогда еще была надежда, что Гровер V вернет Империю к славе. А для тех кто так не думал были варианты. Кемерскай избежал контрреволюционной бойни. Аквелия и Вингбардия оба стояли на свободе после столетий угнетения. Но что теперь? Гровер V мёртв, Аквелия превратилась в жгучий беспорядок, а Вингбардия обанкротилась. Что касается Кемерская, он едва удерживает кучу коррумпированных полевых командиров. Но что случилось с этим сумасшедшим молодым пилотом? Он был занят созданием самого успешного пиратского государства в новейшей истории.\n\nНе так уж много нужно, чтобы убедить грифонов прийти и рискнуть в заработке битсов. А что для тех, кто сомневался в Мейере в те дни? Ну, Граф не из тех, кто затаивает обиду."
haukland.10.a:0 "Добро пожаловать в ваш новый дом, ребята!"

haukland.11.t:0 "Все Пираты"
haukland.11.d:0 "В мире есть много мест, где пират может зарабатывать на жизнь. Можно найти много возможностей заработать деньги в этих местах, но среди пиратского мира есть одно имя, которое завоевало популярность: Хаукланд. Ни один пират не может похвастаться тем, что контролирует главный торговый путь между Грифонией и Эквестрией, бросает вызов основным силам нашего времени и живет. Так что, когда мы распространили слух что Мейер нанимает, сразу стало понятно почему множество из них сразу же присоединилось к нам.\n\nПорты Винтерхолда и Хаукхамна видели, что пиратов прибыло очень много. Большинство — подражатели, просто пытающиеся зарабатывать на жизнь вокруг Грифонии, но некоторые приплыли из Зебрики.\n\nЗаселение этих новобранцев оказалась сложной задачей, но этого следовало ожидать. Пираты на самом деле не самая дисциплинированная группа, мы видели это по тому как они штурмовали бары портов после прибытия. Скажем так, было несколько разбитых стекол."
haukland.11.a:0 "Надеюсь, они не слишком шумные."

haukland.12.t:0 "И братишки"
haukland.12.d:0 "Кампании по привлечению мигрантов к берегам Хаукланда — это хорошо, но для продвижения по плану Мейера нужны солдаты. Конечно, теперь можно призывать их из населения, но это требует времени и ресурсов — две вещи, которые драгоценны и которых у нас нет. Решили просто привлечь грифонов с фактическим боевым опытом, чтобы те прибыли в Хаукланд, но такие грифоны не дешевы. Позже приплыл Эрхард Фрош.\n\nМейер улыбнулся, услышав это имя. Как и он, Фрош был одним из тех молодых офицеров, которых поспешно повысили во время Грифоньей Революции. Он находился рядом с Грифенхеймом, но эти два грифона никогда не встречались во плоти. Фрош отбивался от приближающихся контрреволюционеров, когда Мейер решил улететь. Когда Фрош узнал об этом, он связался с Мейером по радио. "Мне все равно, куда вы идете или что вы планируете делать. Я просто прошу вас об одном: пролетите над имперской армией и напугайте их, чтобы они заняли оборонительную позицию и мои грифоны могли перегруппироваться. Считай, что я твой должник." Мейер мог оставить их всех умирать, но он согласился, и Фрош смог отступить и предотвратить бойню. Это решение сделало Фроша авиа нон грата в кругу Кемерская, и он выбрал наемническую жизнь, когда все республиканцы стояли перед выбором следовать за республиканцами в Клаудбьюри или нет.\n\nКогда Фрош услышал о том, что Мейер начал вербовку, он предложил Хаукланду сделку: он отдаст свой опыт в распоряжение Хаукланда в обмен на выгодное место для уединения со своими товарищами. И он вернет последнюю услугу, которую задолжал."
haukland.12.a:0 "Добро пожаловать, Фрош!"

haukland.13.t:0 "А также их грабители"
haukland.13.d:0 "В то время как мы работаем над более ортодоксальной вербовочной и иммиграционной кампанией, некоторые в кругу Мейера играли с самой безумной идеей подкрепления наших рядов: вербовкой преступников. В конце концов, многие жители Хаукланда уже были преступниками в изгнании или их потомками. Эти острова были и до сих пор остаются местом, где можно заново открыть себя и для этих советников не было никаких причин не использовать это. Идея потрепала некоторые перья, но Мейер в конечном итоге позволил это сделать.\n\nВнедрение политики "второго шанса", как стало известно, было сделано с небольшой фанфарой — вербовщики постарались быть немного разборчивыми в отношении этих новобранцев и набирать только несовершеннолетних правонарушителей, которые, по разумным основаниям, не вызовут особых проблем, если им будут предоставлены возможности. Когда дело дошло до их прибытия на острова, они были рассредоточены по другим судам, а не привозились навалом, чтобы предотвратить появление в доках нежелательных "встречающих"."
haukland.13.a:0 "Я знаю, что они не вызовут никаких проблем!"

haukland.14.t:0 "Успешный военно-морской рейд"
haukland.14.d:0 "Отряд, который мы послали, вернулся с полным грузом добычи. Их посредственные военно-морские и полицейские силы не смогли остановить хаукландскую тактику. Наши парни грабили прибрежные города, забирая всё ценное, что не было прибито к полу, пока наши самолеты патрулировали над городом. Они выбрались оттуда раньше, чем успели прибыть сухопутные войска.\n\nКак всегда, добыча была продана на чёрном рынке Хаукланда и доход был разделён между пиратами, командой поддержки и, конечно же, самим Мейером."
haukland.14.a:0 "Хреново им пришлось... Выпивка за мой счёт!"

haukland.15.t:0 "Морской рейд Хаукланда"
haukland.15.d:0 "На наши берега обрушился рейдерский отряд из Хаукланда. Наши силы не смогли остановить поддерживаемую с воздуха военно-морскую группу, присланную Мейером. Прибрежные города были повреждены и разграблены. Сообщается о нескольких погибших и еще многих раненых.\n\nВ свете этого поражения было много призывов реструктурировать и укрепить наши военно-морские возможности. Только превосходящая сила будет держать хаукландских пиратов на расстоянии."
haukland.15.a:0 "Будь ты проклят, Мейер!"

haukland.16.t:0 "Неудачный морской рейд"
haukland.16.d:0 "Отряд, который мы послали, вернулся с голыми когтями. Несмотря на нашу превосходную тактику, местным силам удалось удержать нас от высадки. Бой был жестким и стоил нам дорого — в итоге наши пираты были отбиты. Если бы мы продвинулись дальше, это обошлось бы нам дороже, чем можно было бы заплатить за добычу, и поэтому атака была отменена.\n\nВ барах порта проводились мемориальные вечеринки в честь тех, кто погиб там и не вернулся, грифоны пили от их имени. По крайней мере, бармены получали прибыль от всего этого."
haukland.16.a:0 "Нельзя всегда побеждать."

haukland.17.t:0 "Рейдеры из Хаукланда отбиты"
haukland.17.d:0 "С наших берегов пришли донесения. Отряд хаукландских пиратов предпринял попытку рейда, но наш храбрый флот отбил его. Моряков официально поздравили за отвагу.\n\nНесмотря на эту победу, несколько голосов в нашей администрации призвали укрепить наши военно-морские силы, чтобы удержать Германа Мейера от повторных попыток напасть на нас."
haukland.17.a:0 "Не сегодня, Мейер."

haukland.18.t:0 "Новый Король"
haukland.18.d:0 "Когда вединский прелат подошёл, чтобы увенчать его, Мейер встал. Старый священник отшатнулся от удивления. Он не сказал ни слова, когда хаукландский военачальник просто вырвал корону Ведины из его когтей. Затем он посмотрел на присутствующих и быстро надел корону на голову. Вединские дворяне, которых "пригласили", были ошеломлены, но ни один из этих одержимых рыцарством дураков не осмелился произнести ни слова. И этого было достаточно для Мейера, что они поняли правду. На Севере появился новый король, и его звали Герман, первый своего имени Мейер Завоеватель, тот, кто Повелевает Драконами.\n\nСвященник безропотно произнес последние ритуальные слова, провозгласив его законным монархом Вединой, но на самом деле они не имели значения. Что касается короля, Мейер не полагался на ритуалы, традиции или законы. Он просто сделал то, что хотел, и заставил всех вокруг принять это. Удовлетворенный произведенным эффектом, он направился ко входу в храм, чтобы представиться своему народу как Король Севера. Когда он проходил мимо гостей, они начали аплодировать. Вединская знать и иностранные послы были, вероятно, наименее восторженными, но все же они уступали. Самыми неуместными аплодисментами были, вероятно, радостные возгласы его старых товарищей по Академии, тех немногих уцелевших летчиков-асов, которые бросили всё, чтобы последовать за ним в Хаукланд три десятилетия назад.\n\nКогда он вышел за пределы Храма Борея, Мейер был принят аплодисментами и приветствиями его войск и многих жителей Хаукланда, которые отправились в Турхамн на церемонию. Были даже некоторые вединцы, но Мейер не возражал. Со временем они привыкнут к нему. И даже если они не захотят, они не скажут ни слова пока их небо будет заполнено драконами. Герман подошел к мысу. Аплодисменты начали утихать, поскольку слушатели думали, что он заговорит. Но Мейер — пылкий в своей старой идее, что действие говорит громче слов, просто поднял символ всего, что он сделал: скипетр кровавого камня. За этим последовал гром аплодисментов, но вскоре он был превзойден ревом присутствующих драконов и звуком 21-пушечного оружия. Наблюдательный мог также заметить, что молодой дракончик хлопает в толпе, как грифон."
haukland.18.a:0 "Да здравствует Король!"

haukland.19.t:0 "Другие маяки Хаукхамна" 
haukland.19.d:0 "Хаукланд всегда был местом, где пираты, преступники и искатели приключений могли найти убежище. Но скрываться здесь приходилось не только им. Во все времена артисты, чьё творчество выходило за рамки дозволенного, бежали на Хаукландские острова после громких скандалов на родине. Долгое время они безвестно прозябали здесь, вспоминая дни былой славы. Однако при Мейере, на фоне процветающего пиратства, в Хаукхамне начала зарождаться своя индустрия развлечений. Ещё в 988 году изгнанный фетизец открыл первое в городе кабаре под названием «Лейхттурм». Оно имело оглушительный успех, став пристанищем для множества обездоленных талантов. За прошедшие годы открылось немало подобных заведений, и само слово «Маяк» стало синонимом ночной жизни города.\n\nПусть Хаукхамну далеко до гламура Лас-Пегасуса, Мейнхеттена или Аквилы, здесь можно творить по-настоящему свободно – без цензуры и предрассудков."
haukland.19.a:0 "Жизнь – это канкан!"

haukland.20.t:0 "Господство эфирными волнами"
haukland.20.d:0 "В течение долгого времени Хаукланд имел мало общего с культурной жизнью. Но с момента обретения независимости возникло желание что-то сделать. У многих не было ничего, чем можно было бы развлечься, кроме выпивки или драк, но у многих грифонов и пони были радиоприемники, чрезвычайно важный предмет на этих островах. И вот, некоторые начали получать удовольствие от общения с их помощью, пользуясь слабым правлением новой администрации. Работники радиовышек начали выходить в эфир и транслировать розыгрыши. За ними последовали и другие, одни транслировали музыку, а другие просто рассказывали истории или проводили дебаты. И по слову клюва или случайной удачи, публика начала настраиваться. Так спонтанно родилась хаукландская радио-культурная жизнь.\n\nС течением времени некоторые энтузиасты начали приобретать или устанавливать больше оборудования. Трансляция стала более профессиональной, но из-за того, что государство никогда не вмешивалось, любой выскочка мог попробовать свои копыта или когти на хостинге радиопередач. Изгнанные исполнители и музыканты также начали пробовать себя на радио, предоставляя Хаукланду свежую и уникальную музыку.\n\nА теперь, если у вас есть радио в Хаукланде, вы можете настроиться на всё, что захотите."
haukland.20.a:0 "Где ещё такое могло случиться?"

haukland.21.t:0 "Утренняя эстакада"
haukland.21.d:0 "Это было прекрасное утро, Кобальт Бриз прогуливался по рынку Хаукхамна. Город был не таким красивым, как его родная Филлидельфия, но он был в восторге от открытия. Он слышал о неприятных делах, в которых участвовали хаукландцы, но он не задумывался о том, как это повлияет на товары, которые вы можете получить в простом ларьке. Теперь он начинал понимать, почему его кузен с таким энтузиазмом живет здесь. Стоп, что это за надоедливый шум? Кобальт Бриз застыл, когда он понял, что шум странным образом доносится с неба. Он поднял голову и увидел самолет, летящий над рыночной площадью. Затем он увидел, как она опрокинулась и упала на землю, издав ужасающий жужжащий звук. Вот оно что! Они были под атакой. О, почему он вообще решил, что приехать сюда — хорошая идея? Он попытался схватить своего кузена, но страх взял верх, и он нырнул в ящики с продуктами, чтобы укрыться. Он зажал уши копытами и задрожал от страха. Затем эта ноющая боль в боку. Шрапнель наверняка. Вот и все. Он умер. За исключением того, что это не было похоже на смерть, и боль больше походила на повторный удар. Он открыл глаза и увидел кричащего на него гневного торговца грифона, после чего поднялся и выслушал. \n\n"Убирайся из моего салата, бродяга!"\n\nОн посмотрел в небо. Самолет летел вдаль, и весь рынок, казалось, не заботился. Всё ещё сидя в раздавленном салате, он посмотрел на своего кузена, который неторопливо сравнивал две канталопы. Он позвал его, и тот беспечно посмотрел на него.\n\n"Что, во имя Селестии, это было?!"\n\nОн пожал плечами."
haukland.21.a:0 "Ох. Это всего лишь Мейер."

haukland.22.t:0 "Вышел из себя"
haukland.22.d:0 "Около аэродрома Хаукхамна остановилась машина. Ночь была тёмной, нарушаемой только сиянием автомобильных фар и аэродромных огней. Герман Мейер открыл багажник и вытащил Корна Коба, пинающегося и кричащего.\n\nНесчастный пони встретил Графа всего час назад, когда был в городе. Хаукланд был добр к нему. Несмотря на всё, что они говорили о дружбе, эквестрийские пони не очень-то любили прощать. Он потратил некоторое время в путешествиях, но только в Хаукланде другие наконец начали забывать о его преступном прошлом. Итак, он был там, наслаждаясь своей новой жизнью в баре, пока какой-то бродяга не столкнулся с ним, заставив его пролить свой сидр. Корн Коб не из тех, кто позволил бы такому неуважению пройти незамеченным, он позвал его и отобрал напиток бродяги из его когтя. Однако как он это сделал, то "бродягой" оказался сам граф Хаукланда, неофициально развлекающийся со своими подданными. Разумеется, никто не вмешался, чтобы помочь ему. Пьющие друзья, как правило, не были на стороне "защиты вас от главы государства". Короче говоря, он оказался в багажнике машины Графа.\n\nКорн Коб попытался договориться о своём освобождении, но от Мейера не последовало ответа. Он просто схватил его за заднее копыто и начал медленно тащить. Опрокинувшись, пони тихонько заскулил, но, увидев, что его тащат к аэродрому, начал молить о пощаде. Опять же, Мейер молчал. Они остановились за одним из личных самолетов Мейера: небольшим пилотажным бипланом. Корн Коб попытался убежать, но Мейер снова схватил его и ударил. "Не двигайся. Больно не будет," — сказал он. Корн Коб не хотел подчиняться, но похититель начал связывать его веревкой, прежде чем он получил бы ещё один шанс бежать. Когда Корн больше не мог двигаться, Мейер просто оставил его на земле и пошёл к самолету с концом веревки в своих когтях. Там он привязал веревку к задней части самолета. Корн Коб издал долгий крик о пощаде и закрыл глаза, не желая видеть, что будет дальше. Он услышал запуск двигателя, и как самолет взлетел, потом вдалеке послышался смех Мейера, а затем ничего. Это была смерть? Если и так, то скорее наоборот... ну... нет, это точно была не смерть. Корн Коб открыл глаза и увидел, что конец веревки просто лежал на земле, а самолёт улетел."
haukland.22.a:0 "В следующий раз он будет привязан. Или нет. Кто знает?"

haukland.23.t:0 "Драконий трепет"
haukland.23.d:0 "Аэродром Хаукхамн гудел от активности, а Мейер неспешно прогуливался вокруг него — ему нравился этот район. Из-за шума воздушного движения здесь было мало грифонов и несколько прекрасных мест для отдыха и наблюдения за взлетающими или приземляющимися самолетами. Сегодня все было также как и всегда, но когда он подошел к одному из своих любимых мест на маленьком мостике, он увидел жеребенка, наблюдающего за аэродромом. Он улыбнулся и спросил, что делает жеребенок. Жеребенок, вероятно, не узнав Мейера в штатском, откровенно ответил: "Я хочу летать, как грифоны и пегасы, сэр. Но мама говорит, что я слишком молод, чтобы летать на самолете. Так что я пришел сюда, чтобы посмотреть на них." Мейер улыбнулся. Он напомнил его молодого, скучающего до смерти в поместье Грифенхейма. Он сел рядом с жеребенком и начал рассказывать ему всё о проходящих мимо самолетах. Так продолжалось несколько часов. В какой-то момент жеребенок задумался: "Какой самый большой самолет вы видели, сэр?". "Это был не самолет," — ответил Мейер. Жеребенок посмотрел на него так, словно он рассказывал дурную шутку. Он улыбнулся.\n\n"Я всегда буду помнить это. Мой отец настоял на том, чтобы отвезти меня на экскурсию в Эквестрию. И вот я сидел, скучая как птенец, на лодке, медленно плывущей в Мейнхеттен. Потом я услышал, как хлещут грифоны, и посмотрел на небо. Самый большой дракон, которого я когда-либо видел, пролетел над нами. Это было просто замечательно. Он был велик, как военный корабль, и всё же летел более грациозно, чем лучшие из грифонов. А потом он издал такой рёв, от которого аж лодку тряхнуло. Это был самый мощный звук, который я когда-либо слышал, он потрясает тебя до костей. И знаешь, что было самым удивительным в этом? Он просто пролетел мимо. Все мы на корабле наблюдали за ним. Я думаю, что команда даже пыталась вооружиться каким-то оружием, чтобы защититься, но ему было всё равно. Мы были просто муравьями, плавающими на большой доске в море."\n\nЖеребёнок просто ответил впечатленным: "Вау"."
haukland.23.a:0 "Когда-нибудь они увидят меня..."

haukland.24.t:0 "Близкий друг"
haukland.24.d:0 "Сегодня состоялась воздушная гонка между многочисленными ветеранами летчиков-асов Мейера, в которой участвовал сам Мейер. Гонка шла хорошо, пока два самолета не столкнулись. Оба упали на землю и разбились. Один загорелся, убив пилота, в то время как другой пилот вышел из кабины с видимыми повреждениями и споткнулся. Прибыв к месту крушения, наблюдатели увидели, что раненым пилотом был сам Мейер, его лицо было в крови. После того, как его поспешили отправить в лазарет, выяснилось, что его травмы были незначительными, и он быстро выздоровел.\n\nБыстрое расследование опровергло любые слухи о намеренном покушении на жизнь Мейера. Карл Инклав, умерший пилот, был известен своими плохими жизненными привычками, и вскрытие показало, что он участвовал в гонке в нетрезвом состоянии, что привело к столкновению. Несмотря на травмы, Мейер сам участвовал в похоронной церемонии и оплакивал безвременную кончину грифона, которого он называл своим близким другом."
haukland.24.a:0 "Чтобы убить графа Хаукланда, требуется нечто большее, чем просто катастрофа!"

haukland.25.t:0 "Стеллахалл"
haukland.25.d:0 "Сегодня Герман Мейер наконец посетил свой достроенный особняк. Поместье расположилось неподалёку от Хаукхамна, в небольшой, но живописной долине, ставшей теперь его частным владением. Особняк получил имя Стеллахалл в память о покойной жене Мейера. Его архитектура напоминала лесные поместья Ведины: Герман решил, что нет лучшего способа почтить её память, чем воссоздать атмосферу мест, которые они так любили, когда она была рядом.\n\nЗдесь было всё. Двенадцать роскошных спален, двадцать ванных комнат с новейшей эквестрийской сантехникой, сауна в оленьем стиле и гостевые апартаменты на любой вкус. Бальный зал был стилизован под древний арктурианский храм. Огромная современная кухня и погреб, заставленный лучшими винами из Аквелии и Скайфола, могли удовлетворить самый изысканный каприз. В подвале нашлось место даже для небольшого кинотеатра и огромной модели железной дороги – давнего увлечения Мейера. Имелись, конечно, и помещения для дел: обширная библиотека и личный кабинет, из которого он мог управлять Хаукландом. Сад в долине гармонично объединял остальные постройки: бассейн, спортзал, охотничьи угодья и частный аэродром.\n\nОставшись один, Мейер решил побродить по дому, проверяя, насколько точно архитектор следовал его указаниям. В гостиной его встретил великолепный портрет Стеллы. Он грустно улыбнулся: как же она была прекрасна... Шумно отодвинув стул, Мейер сел. Посмотрел направо, в сторону анфилады комнат. Налево – в окно, на сады. Его взгляд затуманился. Он глубоко вздохнул, задумчиво поиграл когтями и поймал себя на том, что смотрит в пустую стену."
haukland.25.a:0 "Что теперь?"

haukland.26.t:0 "Корона и могила"
haukland.26.d:0 "Это было холодное, но прекрасное утро, подумал Мейер, когда на его закрытое лицо подул легкий ветерок. Кладбище Хаукхамн было почти пустым, оставляя его со своими мыслями. Он подошёл к могиле своей покойной жены. Он никогда не понимал, почему она всегда настаивала на том, чтобы её похоронили на общественном кладбище, но такова была воля Стеллы. Несмотря на все подарки, которыми её осыпал Мейер, она оставалась верна себе: воплощением скромности. И вот она здесь. Простая могила на простом кладбище. Мейер остановился и сел рядом. Он хотел что-то сказать, но слова не шли, и он просто спокойно стоял.\n\nВдова прошла мимо. Мейер улыбнулся ей и кивнул. "Доброе утро," — просто сказал он. Вдова в шоке посмотрела на него и быстро ушла, не сказав ни слова. Мейер не возражал такой реакции. Не каждый день вы встречали короля в полных военных регалиях и горностаевом плаще в таком обычном месте.\n\nМейер некоторое время молчал. Затем он медленно снял корону Ведины с головы и осторожно положил её на могильный камень Стеллы. Зрелище вызвало краткую улыбку на его лице. Затем он встал и медленно ушел, оставив жемчужину Севера на могиле, где ей и полагалось находится."
haukland.26.a:0 "Ты всегда должна была быть членом королевской семьи. Не я."

haukland_raiding.1.t:0 "Налёт успешен!"
haukland_raiding.1.d:0 "Рейд увенчался колоссальным успехом. Наши корабли направились к ничего не подозревающим торговым судам ранним утром, незадолго до рассвета. Сблизившись, наша флотилия взяла их в кольцо с тыла, а превосходство в скорости не оставило им ни единого шанса на бегство. Затем наши налётчики произвели предупредительные выстрелы, призывая моряков сдаться и позволить абордажным командам взойти на борт. Видя безнадёжность своего положения и опасаясь, что мы можем их потопить, капитаны неохотно заглушили двигатели.\n\nВскоре начался грабёж. Наши матросы очистили суда от любого ценного груза, переправив его на лодки. Захват самих медлительных судов был сочтён слишком рискованным, поэтому их с миром отпустили восвояси. По возвращении на родные берега налётчики никак не могли перестать хвастаться награбленными богатствами."
haukland_raiding.1.a:0 "...Йо-хо-хо и бутылка рома!"

haukland_raiding.2.t:0 "Налёт провалился!"
haukland_raiding.2.d:0 "Наш последний рейд, к сожалению, закончился совсем не так, как мы планировали. Наши налётчики выбрали несколько неприметных грузовых судов, но стоило нам приблизиться, как на горизонте показались военные суда. По всей видимости, торговцы заподозрили неладное и заранее запросили подкрепление.\n\nРазумеется, наши сравнительно скромные суда не могли противостоять столь могучему неприятелю. Вражеские силы не только превосходили нас числом, но и обладали гораздо лучшим бронированием, так что наши пушки, скорее всего, даже не смогли бы пробить их корпуса. Ввиду этого бой был быстро прекращён, и наши корабли поспешно отступили, полагаясь на своё превосходство в скорости."
haukland_raiding.2.a:0 "Мы достанем их в следующий раз."

haukland_raiding.3.t:0 "[HAU.GetName] устраивает налёт на торговые маршруты!"
haukland_raiding.3.d:0 "Вчера вечером от торговых судов, направляющихся в наши порты, поступили тревожные сообщения. Похоже, налётчики из Хаукланда напали на них прямо в море. Рейдеры умело заблокировали корабли и не дали им позвать на помощь, после чего забрали с собой все ценности.\n\nРазумеется, правительственные чиновники немедленно отреагировали, пообещав полностью компенсировать убытки всем пострадавшим. По предварительным оценкам, ущерб неприятно скажется на государственном бюджете в этом году, хотя потери всё же нельзя назвать катастрофическими."
haukland_raiding.3.a:0 "Нам серьёзно приходится иметь дело с пиратством в одиннадцатом веке?"

haukland_raiding.4.t:0 "[HAU.GetAdjective]ий налёт отражён!"
haukland_raiding.4.d:0 "Сегодня утром поступили сообщения о том, что налёт Хаукланда был успешно отражён. По всей видимости, торговцы заблаговременно запросили сопровождение у нашего флота. Однако пока ещё непонятно, было ли это простым совпадением или же имелась информация о готовящемся нападении. Как бы то ни было, флот сумел быстро разогнать горе-пиратов, заставив их бежать, поджав хвосты. Капитан, ответственный за операцию, был рекомендован к повышению."
haukland_raiding.4.a:0 "Выкусите, хаукландцы!"

