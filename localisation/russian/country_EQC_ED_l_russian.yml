# Weather magic (EQS)
EQS_weather_magic_category:0 "Магия погоды"
EQS_weather_magic_category_desc:0 "§4Погодные манипуляции§! – естественная часть магии пегасов, которая интегрирована в культуру Эквестрии с незапамятных времён. Обычно эта магия применяется с предельной осторожностью, чтобы не нарушить гармонию с самой природой, культивируя союз животных и пони. Однако теперь, когда на Эквестрию надвигается грозный противник, некоторые ограничители в этой сфере можно смело засунуть туда, где не светит солнце...\n\nИспользуйте £weather_magic_texticon §4возможности магии погоды§!, чтобы получать §Gобщие бонусы§!, или же накладывать отрицательные модификаторы армиям в некоторых регионах. Впрочем, попытки боевого применения магии погоды §Rне всегда успешны§!, и чтобы §Gувеличить шансы на удачу§! необходимо следить за: §Yналичием ПВО§!, §Yпревосходством в воздухе§!, и §Yуровнем технологии радаров§!.\n\nНынешняя готовность £weather_magic_texticon §4погодных магов§!: [?weather_pb_var|Y]/§Y300§!\n\nЕжедневный прирост £weather_magic_texticon §Gпогодных магических сил!: [?daily_weather_magic_gain|Y]"

