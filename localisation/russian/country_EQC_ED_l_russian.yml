EQC_ED_AF_daybreaker_trait:0 "Богиня солнца"
EQC_ED_AF_daybreaker_trait_desc:0 "Единственная и неповторимая богиня солнца и законная императрица Эквестрии. Её огненный взор несёт ужас врагам и рвение последователям, когда аликорн является на поле боя, наделённая мощью самих звёзд. Никто не смеет бросить ей вызов и выжить, ибо она – Дейбрейкер, и, подобно своему имени, совершенно неотвратима."
EQC_ED_AF_nmm_trait:0 "Богиня ночи"
EQC_ED_AF_nmm_trait_desc:0 "Единственная и неповторимая богиня ночи и законная императрица Эквестрии. Из теней она сеет хаос, становясь единым целым с ночной мглой; аликорн проникает даже в сны своих недругов. Для своих последователей она – надёжное прибежище во тьме, для врагов же – ужас перед неведомым. Она – Найтмер Мун, готовая обрушить кару на тех, кто отринул её божественность. Не ведать им покоя нигде, даже в глубинах собственного разума."
