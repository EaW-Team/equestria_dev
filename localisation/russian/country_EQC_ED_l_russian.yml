EQC_dummy_artifact_idea:0 "Статуя грифона"
EQC_actual_artifact:0 "Статуя грифона (стрёмная)"
art_EQC_dummy_artifact_idea_desc:0 "Статуя грифона. Выглядит знакомо."
art_EQC_actual_artifact_desc:0 "Тоже статуя. Но эта какая-то погнутая (как вообще такое возможно?)"
# Equestrian Artefacts
EQS_shard_of_transformation_artefact:0 "Осколок Жемчужины"
art_EQS_shard_of_transformation_artefact_desc:0 "Осколок магической Жемчужины трансформации. Принцесса Скайстар прислала его, чтобы помочь нам в борьбе с тиранией злой диархии."
EQS_journal_of_the_two_sisters_artefact:0 "Дневник двух сестёр"
art_EQS_journal_of_the_two_sisters_artefact_desc:0 "Дневник двух сестёр повествует о временах, предшествовавших первому падению Найтмер Мун. Он служит источником вдохновения для всех, кто по-прежнему верит в гармонию. Кроме того, в нём содержатся подробные описания Вечнодикого леса и Замка двух сестёр."
EQS_star_swirls_hat_artefact:0 "Шляпа Стар Свирла"
art_EQS_star_swirls_hat_artefact_desc:0 "Шляпа Стар Свирла Бородатого, одного из самых прославленных магов в истории Эквестрии. Бытует мнение, что бубенцы на этом головном уборе до сих пор хранят в себе частицу его магической силы."
EQS_yickslurs_helm_artefact:0 "Шлем Йикслура"
art_EQS_yickslurs_helm_artefact_desc:0 "Йикслур быть великий и благородный воин-як, что жить и КРУШИТЬ много веков назад. Его шлем перейти во владение принцессы Селестии, которая потом отдать его на хранение в Школу Дружбы."
EQS_knuckerbockers_shell_artefact:0 "Раковина Накерброкера"
art_EQS_knuckerbockers_shell_artefact_desc:0 "Древние легенды гласят, что эта раковина могла призвать могучего дракона по имени Накерброкер. Хотя она давно утратила эту способность, в ней всё ещё ощущаются отголоски некогда наложенных чар."
EQS_auroras_amulet_artefact:0 "Амулет Авроры"
art_EQS_auroras_amulet_artefact_desc:0 "Способен призывать цунами. Использовать с крайней осторожностью."
EQS_grovers_crown_artefact:0 "Корона Гровера"
art_EQS_grovers_crown_artefact_desc:0 "Это корона Гровера I, короля Грифонстоуна. Не путать с Рейхскроной! До конца не ясно, как она очутилась в Школе Дружбы, но так уж вышло."
EQS_talisman_of_mirage_artefact:0 "Талисман миража"
art_EQS_talisman_of_mirage_artefact_desc:0 "Защищает своего владельца от древнего проклятия. К сожалению, особенности самого проклятия уже давно забыты."
EQS_clover_the_clevers_cloak_artefact:0 "Плащ Кловер Мудрой"
art_EQS_clover_the_clevers_cloak_artefact_desc:0 "Кловер Мудрая была одной из легендарных основательниц Эквестрии и единорогом великого ума. В дань уважения её наследию плащ был бережно сохранён, и, несмотря на почтенный возраст, он выглядит так, будто его соткали буквально вчера."
EQS_rings_of_scorchero_artefact:0 "Кольца Скорчеро"
art_EQS_rings_of_scorchero_artefact_desc:0 "Кольца Скорчеро были найдены в пирамиде нейуа, где Ауизотль пытался с их помощью пленить само солнце."
EQS_truth_talisman_of_tonatiuh_artefact:0 "Талисман правды Тонатиу"
art_EQS_truth_talisman_of_tonatiuh_artefact_desc:0 "Истина – тяжкое бремя. Этот артефакт поможет вам её отыскать, но прежде хорошенько подумайте, действительно ли вы к ней готовы."
EQS_horn_of_the_abada_artefact:0 "Рог абады"
art_EQS_horn_of_the_abada_artefact_desc:0 "Этот рог принадлежал представителю благородной расы единорогов, известных как абады. Они исчезли так давно, что даже почти не упоминаются в легендах. Однако этот уцелевший рог всё ещё хранит в себе частицы их некогда великой магии."
EQS_silver_shawl_of_shadows_artefact:0 "Серебряная шаль теней"
art_EQS_silver_shawl_of_shadows_artefact_desc:0 "Проклятая шаль, позволяющая владельцу стать невидимым. Однако цена велика: долгое использование этого артефакта лишает рассудка его владельца. Особенности природы вложенной в шаль магии всё ещё изучаются."
EQS_crystal_heart_artefact:0 "Кристальное сердце"
art_EQS_crystal_heart_artefact_desc:0 "Кристальное сердце было связано со Щитом Гармонии во время великой церемонии Кристаллинга. Пока артефакт остаётся в Кристальной империи, его тепло и защита распространяются на каждого, кто сражается за идеалы гармонии."
EQS_chrysalis_throne_artefact:0 "Трон Кризалис"
art_EQS_chrysalis_throne_artefact_desc:0 "О, что за прискорбная участь постигла некогда великих. Когда-то это был могучий трон Кризалис, поглощавший всю магию не-чейнджлингов вокруг себя. Теперь же он, тщательно изолированный, чтобы заблокировать этот эффект, стал лишь одним из многих артефактов на службе гармонии."
EQS_starsteel_armour_suit_artefact:0 "Доспех из звёздной стали"
art_EQS_starsteel_armour_suit_artefact_desc:0 "Давным-давно, когда чудовища ещё бродили по этим землям, а медведи были крупнее и не скованы ограничениями цивилизации, из магической звёздной стали ковались подобные легендарные доспехи. Теперь они служат лишь музейными экспонатами, ведь их размер слишком велик даже для самых могучих нынешних воинов, но они по-прежнему воплощают в себе истинную полярную душу."
EQS_ceremonial_pipe_artefact:0 "Церемониальная трубка"
art_EQS_ceremonial_pipe_artefact_desc:0 "Также известна как "Трубка мира". Бизоны используют эти магические трубки для общения с богами, а также при заключении важных сделок. Каждый, кто вдохнёт дым такой трубки и если потом не отправится на встречу к предкам, оказывается неразрывно связан данным им словом."
# Griffonian Artefacts
EQC_scepter_of_arantigos_artefact:0 "Скипетр Арантигоса"
art_EQC_scepter_of_arantigos_artefact_desc:0 "Целую тысячу лет этот скипетр покоился в гробнице Арантигоса, будучи единственным предметом, погребённым вместе с великим завоевателем. Неужто в этом мире не осталось ничего святого?"
EQC_reichskrone_artefact:0 "Рейхскрона"
art_EQC_reichskrone_artefact_desc:0 "Корона императоров Грифонии со времён Гровера I. Она ослепительно сияет, поскольку усыпана множеством разноцветных драгоценных камней. Приписка снизу: держите её подальше от алмазных псов и драконов."
EQC_elixir_of_life_artefact:0 "Эликсир жизни"
art_EQC_elixir_of_life_artefact_desc:0 "Странный сосуд, найденный в катакомбах под обширными архивами Гамии. Надпись гласит, что эликсир способен возвращать мертвецов к жизни, но до сих пор, судя по всему, им никто не пользовался. Ну или рецениент не вернулся."
EQC_griffichronicon_artefact:0 "Грифихромикон"
art_EQC_griffichronicon_artefact_desc:0 "Древний фолиант об истории грифоньего рода, изначально написанный жрецами-отшельниками в Соларспайке. Позже, по приказу Гровера I, сия бесценная летопись была перевезена в Грифенхейм."
EQC_sword_of_grover_ii_artefact:0 "Меч Гровера II"
art_EQC_sword_of_grover_ii_artefact_desc:0 "Этот благородный клинок был выкован псами Бронзхилла для своего спасителя. Говорят, что Тесса Алмазный Щит, прапрабабка Ровера, прокляла их за мятеж против законного господина и сородичей, но жители Бронзхилла отвечают просто: "Проклятие тиранши – истинное благословение для честного пса"."
EQC_idol_of_maar_artefact:0 "Идол Маара"
art_EQC_idol_of_maar_artefact_desc:0 "Говорят, что ни один порядочный грифон не станет создавать идол этого презренного божества. И всё же, похоже, кое-кто не слишком порядочный, да нашёлся"
EQC_wittenlander_tome_artefact:0 "Виттенлендский фолиант"
art_EQC_wittenlander_tome_artefact_desc:0 "Старинный том из библиотек Виттенбурга. Его страницы испещрены описаниями древних и могущественных заклинаний."
EQC_pearl_of_the_mountain_artefact:0 "Вуффенстоун"
art_EQC_pearl_of_the_mountain_artefact_desc:0 "Его почему-то называют жемчужиной горы, хотя это не жемчужина в буквальном смысле, а колоссальный алмаз идеальной огранки. Он – главная гордость горной сокровищницы, за которым ведут охоту драконы всего мира с незапамятных времён."
EQC_head_of_an_eygsic_spider_artefact:0 "Голова эйгсикского павука"
art_EQC_head_of_an_eygsic_spider_artefact_desc:0 "Этот павук лишил жизни трёх могучих воинов, прежде чем четвёртый сумел нечаянно сразить его и принести голову домой в качестве трофея."
EQC_reactor_core_artefact:0 "Ядро реактора"
art_EQC_reactor_core_artefact_desc:0 "Ядро колоссального реактора, обнаруженного в Барраде. Оно работает на кристаллах, а также чистой силе воли (иначе никак не объяснить его принципы работы), и излучает мощные потоки магической энергии."
EQC_grimoire_of_magehold_artefact:0 "Гримуар Мейджхолда"
art_EQC_grimoire_of_magehold_artefact_desc:0 "Этот гримуар, найденный в недрах библиотеки Мейджхолда, посвящён описанию запретного искусства воскрешения из мёртвых."
EQC_vial_of_holy_water_artefact:0 "Флакон святой воды"
art_EQC_vial_of_holy_water_artefact_desc:0 "Источники в окрестностях Ручьеграда считаются священными как пони, так и грифонами. Кое-кто утверждает, что их воды способны исцелить больного от любой болезни. К тому же, он почему-то постоянно притягивает к себе пиратов всех мастей."
EQC_vikingar_drinking_horn_artefact:0 "Питейный рог викингара"
art_EQC_vikingar_drinking_horn_artefact_desc:0 "Один из легендарных рогов, которые оленийские викингары привезли с собой, когда впервые высадились на берегах Грифонии, отстав от остальных и по ошибке перепутав материки."
EQC_statue_of_sycaecia_artefact:0 "Статуя Сикейции"
art_EQC_statue_of_sycaecia_artefact_desc:0 "Статуя Сикейции, богини-покровительницы Сикамеона. На протяжении веков она внимала бесчисленным молитвам грифонов, пока не была похищена захватчиками."
EQC_the_oovervinnlighet_artefact:0 "Оувервинлингет"
art_EQC_the_oovervinnlighet_artefact_desc:0 "Также известный как Божественный меч Бротурия. Был преподнесён в дар первому королю Ведины ведьмой Сьёнавдам."
EQC_idol_of_boreas_artefact:0 "Идол Борея" ### FAKE! (Hence why it has no desc)

