landmark_ed_af_statue_of_daybreaker: "Статуя Дейбрейкер"
landmark_ed_af_statue_of_daybreaker_plural: "$landmark_ed_af_statue_of_daybreaker$"
landmark_ed_af_statue_of_daybreaker_desc:0 "Яркая, словно утреннее солнце, и тёплая, как летний вечер, золотая статуя нашей глубокочтимой богини Дейбрейкер ныне украшает центр Сансета своей неземной красотой. Всех проходящих мимо согревает Её улыбка, а кроткий и материнский облик Дейбрейкер вдохновляет на новые свершения.\n\nНу, или за это следует благодарить вооружённую стражу у подножия статуи."

landmark_ed_af_statue_of_nightmare_moon: "Статуя Найтмер Мун"
landmark_ed_af_statue_of_nightmare_moon_plural: "$landmark_ed_af_statue_of_nightmare_moon$"
landmark_ed_af_statue_of_nightmare_moon_desc: "Сияющая, словно бледный лунный свет, и умиротворяющая, как безмолвие полуночного часа, золотая статуя нашей глубокочтимой богини Найтмер Мун ныне украшает центр Сансета своей неземной красотой. Любой, кто пройдёт под Её ликующим взором и насладится преисполненной холодного величия улыбкой, продолжит свой путь с небывалой бодростью, понимая, что Богиня знает, как совладать с грядущими испытаниями.\n\nНу, или за это следует благодарить вооружённую стражу у подножия статуи."

