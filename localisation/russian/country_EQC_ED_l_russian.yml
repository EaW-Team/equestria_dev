# tag_news.1.b:0 "News Event Option B"

evildiarchy_news.0.t:0 "Eclipse Sisters"
evildiarchy_news.0.d:0 "[This.GetNewspaperHeader]The sun blackens, bathing the world in a global eclipse, as the largest surge of magical power ever registered ripples out across the planet from its starting point in New Mareland. From what little has managed to exit the country, it seems something terrible has happened to the Princesses of Equestria, as the two have transformed into new personas. Declaring themselves to be Daybreaker and Nightmare Moon, these reborn alicorns boast godlike power, and should ancient records be believed, lack the morals of their former selves. Already refugees have begun trickling out of their newly-declared "Imperial Condominium", fleeing in terror with tales of mobilizing religious zealots and a nation rapidly descending into absolute rule.\nThe true extent of the danger posed by these new arrivals has yet to be seen, but if their power is as great as is feared, the entire globe may be facing catastrophe."
evildiarchy_news.0.a:0 "§RLet's see who's ready to play ruler...§!"
evildiarchy_news.0.b:0 "They are our greatest fears."
evildiarchy_news.0.c:0 "Are we headed towards a battle royale?"
evildiarchy_news.0.dop:0 "Do... do we count this as a success?"
ED_puppet_BAT:0 "§gThe Nightmare's loyal followers rally to her.§!"

evildiarchy_news.1.t:0 "Аликорны на тропе войны"
evildiarchy_news.1.d:0 "[This.GetNewspaperHeader]Сегодня в городе Даль Море, что расположен в Понияне, состоялась встреча лидеров множества стран, созванная для обсуждения растущей угрозы со стороны Имперского соправительства Нового Мейрленда. По итогам краткого совещания был достигнут консенсус: угроза культуре и образу жизни грифонов была признана чрезвычайным обстоятельством, требующим создания единого фронта против сестёр-аликорнов.\n\nСразу после этого заявления "Грифонья коалиция" провозгласила себя оплотом надежды и свободы для грифонов и пони континента, поклявшись стоять до конца в борьбе против тирании аликорнов."
evildiarchy_news.1.a:0 "Плечом к плечу, мы будем сражаться!"
evildiarchy_news.1.b:0 "Мило."
evildiarchy_news.1.b_tooltip:0 "§RБудто это способно нас остановить.§!\n\n"

evildiarchy_news.2.t:0 "Equestria at War"
evildiarchy_news.2.d:0 "[This.GetNewspaperHeader]Этим днём, сразу после успешного уничтожения щита, укрывавшего Эквестрию, аликорны Дейбрейкер и Найтмер Мун выступили с речью. В своём обращении они официально объявили войну Твайлайт Спаркл и силам сопротивления.\n\nСёстры заявили о намерении уничтожить любого, кто встанет у них на пути, однако милостиво пообещали "шанс на искупление" тем, кто сохранит им верность.\n\nВслед за этим объявлением в юго-восточной Эквестрии, а также в Мейнхеттене и Филлидельфии вспыхнули восстания лоялистов аликорнов. Лишь время покажет, ограничатся ли выступления этими городами или нас ждут новые очаги сопротивления."
evildiarchy_news.2.a:0 "Скоро..."
evildiarchy_news.2.b:0 "Вместе мы восторжествуем."
evildiarchy_news.2.c:0 "Весьма тревожные новости."

