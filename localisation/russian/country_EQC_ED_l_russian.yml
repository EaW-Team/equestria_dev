EQS_EQC_AF_dialogue_1: "Это определённо был... любопытный опыт."
EQS_EQC_AF_dialogue_2: "Спасибо Дискорду за то, что он такой потрясающий гейм-мастер!"
EQS_EQC_AF_dialogue_3: "Даже слишком потрясающий, как по мне. Местами всё казалось пугающе реальным."
EQS_EQC_AF_dialogue_4: "У Дискорда по-другому не бывает."
EQS_EQC_AF_dialogue_5: "Ой, да какой толк в магии хаоса, если с ней нельзя хоть капельку поразвлечься, верно? Ну скажите же, что вы тоже так думаете!"
EQS_EQC_AF_dialogue_6: "Это определённо было куда масштабнее того, во что мы играли в мои школьные годы."
EQS_EQC_AF_dialogue_7: "Отличное шоу, если позволите так выразиться."
EQS_EQC_AF_dialogue_8: "Для нас с Луной стало большой неожиданностью, что нам достались роли злодеек."
EQS_EQC_AF_dialogue_9: "И мы вас наголову разгромили."
EQS_EQC_AF_dialogue_10: "Вините кости, это они решили именно так."
EQS_EQC_AF_dialogue_11: "С этими фальшивыми зубами, которые Дискорд выдал моей "Дейбрейкер", было довольно трудно членораздельно говорить."
EQS_EQC_AF_dialogue_12: "Зато у вас двоих были просто изумительные наряды!"
EQS_EQC_AF_dialogue_13: "О, вдохновением был один сон Старлайт Глиммер, о котором мне как-то рассказала Твайлайт."
EQS_EQC_AF_dialogue_14: "Да, помню это..."
EQS_EQC_AF_dialogue_15: "Но заставлять Дейбрейкер и Найтмер Мун сражаться друг с другом – это так предсказуемо. Мне нравится вносить в сюжет перчинку, понимаете?"
EQS_EQC_AF_dialogue_16: "Вне всяких сомнений. И как, пожалуй, единственная пони, досконально изучившая книгу правил..."
EQS_EQC_AF_dialogue_17: "Ты правда это сделала?"
EQS_EQC_AF_dialogue_18: "...я могу сказать, что и с правилами ты обошёлся весьма вольно."
EQS_EQC_AF_dialogue_19: "Всё ради достойного погружения! Именно это и делает меня хорошим мастером."
EQS_EQC_AF_dialogue_20: "Не сомневаюсь, что ты самый лучший!"
EQS_EQC_AF_dialogue_21: "Из тебя бы и организатор вечеринок вышел отличный, Дискорд."
EQS_EQC_AF_dialogue_22: "Ну что, когда соберёмся на второй раунд?"

EQS_EQC_AF_TwilightTheory_Regent_dialogue_1: "Аха-ха-ха-ха-ха..." # (Twilight)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_2: "Ты уже закончила со своим маниакальным смехом, или нам выделить тебе ещё пару часов звезды вечера?" # (Discord)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_3: "Ого, Твай, не знала, что ты так... погрузишься в роль." # (AJ)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_4: "О-оу, простите меня. Кажется, я немного переборщила с отыгрышем." # (Twilight)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_5: "Не терпелось дождаться следующей недели и нашей сессии в "Песнь Сирен", верно? "Часики тикают"!" # (Discord)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_6: "Эй, не задирай её!" # (RD)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_7: "...А по-моему, было весело." # (Flutters)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_8: "Поворот с тремя злодейками был просто отпадным!" # (Spike)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_9: "И впрямь. Я была удивлена, что нам с сестрой достались роли злодеек, но появление "Миднайт" сделало всё куда интереснее." # (Celestia)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_10: "...Пожалуйста, не говорите так, мне ужасно неловко." # (Twilight)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_11: "Прошло уже несколько Ночей Кошмаров с тех пор, как мне доводилось использовать мой "злодейский" голос." # (Luna)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_12: "Должна признать, наряды у вас всех были совершенно очаровательные." # (Rarity)
EQS_EQC_AF_TwilightTheory_Regent_dialogue_13: "О, вдохновением был один сон Старлайт Глиммер, о котором мне как-то рассказала Твайлайт."
EQS_EQC_AF_TwilightTheory_Regent_dialogue_14: "Да, помню это..."
EQS_EQC_AF_TwilightTheory_Regent_dialogue_15: "Но заставлять Дейбрейкер и Найтмер Мун сражаться друг с другом – это так предсказуемо. Мне нравится вносить в сюжет перчинку, понимаете?"
EQS_EQC_AF_TwilightTheory_Regent_dialogue_16: "Вне всяких сомнений. И как, пожалуй, единственная пони, досконально изучившая книгу правил..."
EQS_EQC_AF_TwilightTheory_Regent_dialogue_17: "Ты правда это сделала?"
EQS_EQC_AF_TwilightTheory_Regent_dialogue_18: "...я могу сказать, что и с правилами ты обошёлся весьма вольно."
EQS_EQC_AF_TwilightTheory_Regent_dialogue_19: "Всё ради достойного погружения! Именно это и делает меня хорошим мастером"
EQS_EQC_AF_TwilightTheory_Regent_dialogue_20: "Не сомневаюсь, что ты самый лучший!"
EQS_EQC_AF_TwilightTheory_Regent_dialogue_21: "Из тебя бы и организатор вечеринок вышел отличный, Дискорд."
EQS_EQC_AF_TwilightTheory_Regent_dialogue_22: "Ну что, когда соберёмся на второй раунд?"

EQS_EQC_AF_TwilightTheory_Sentry_dialogue_1: "...Я всё ещё не могу поверить, что из-за тебя я проиграла так рано."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_2: "Прости, Твайлайт, но так уж решила судьба. Не злись на меня, злись на кости."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_3: "Нет, она права! Мы пустили его в нашу игру, и что он сделал? Заграбастал себе всю славу!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_4: "Верно, Дэш! Всем должно было быть весело, а он взял и превратил это в своё шоу!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_5: "Д-давайте не будем грубить, я уверена, он хотел как лучше."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_6: "Не защищай его, Флаттершай! Он явно пропихивает какую-то историю про Мэри Сью исключительно для самолюбования! Да у него даже биография не имеет никакого смысла!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_7: "Верно! С чего бы у Городка Старлайт вообще взялся адмирал?!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_8: "Вообще-то, для стран без выхода к морю наличие адмиралов – не такая уж редкость. Вдобавок к речным флотилиям..."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_9: "Мне кажется, вы все слишком строги к нему! Слушайте, он же создал коммунистическую партию с ВЕЧЕРИНКАМИ! Как это может быть плохо?"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_10: "Пинки..."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_11: "В самом деле. Он сшил такие щегольские мундиры. К тому же, глядя на то, как вела себя Твайлайт, я не уверена, что хотела бы увидеть, куда бы зашёл её отыгрыш."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_12: "Пони, пожалуйста, успокойтесь. Не будем слишком суровы к нашему гостю, он..."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_13: "«Слишком суровы»? Сестра, я считаю, мы были НЕДОСТАТОЧНО суровы! Этот вечер должен был быть про НАС, а он сделал его про СЕБЯ!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_14: "Ну, мы всё равно доиграли! Концовка вышла довольно приятной, если позволите заметить!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_15: "Но это должна была быть игра с друзьями! Нашими друзьями, которые – позволю себе напомнить – оказались на обочине почти сразу!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_16: "Ой, да ладно вам, мы все знали, что такое возможно. Нельзя включать СРАЗУ ДВА первоапрельских обновления и ожидать, что всё будет работать!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_17: "Пинки, о чём ты вообще говоришь?!?"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_18: "А она права. Если подумать, во всём этом виноват §Rигрок§!."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_19: "Я ПОНЯТИЯ НЕ ИМЕЮ, О ЧЁМ ВЫ! КАКОЙ ЕЩЁ §RИГРОК§?!"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_20: "Э-эм, пони?.."
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_21: "ЧТО?!?"
EQS_EQC_AF_TwilightTheory_Sentry_dialogue_22: "С-спасибо, что пригласили меня сегодня..."

