#### CHARACTER NAMES
EQC_ED_theevilsisters:0 "Дейбрейкер и Найтмер Мун"
EQC_ED_theevilsisters_desc:0 "Здравый смысл подсказывает, что день и ночь не могут существовать одновременно, ибо что есть одно, если не отсутствие другого? Небо не может вместить два небесных светила сразу, иначе оно обратится против самого себя и будет раздирать себя на части, пока одно не поглотит другое. Сами раздумья о подобном парадоксе по своей природе есть не что иное, как упражнение в абсурде.\nИ всё же этот парадокс явился миру. Дейбрейкер, воплощение солнца, и Найтмер Мун, императрица ночи, заключили порочный союз. Отныне луна восходит вместе с солнцем, а мир содрогается перед их мощью. Две богини-аликорна выступают в поход, ведя за собой бесконечное воинство преданных последователей. Всякий либо склонится перед ним, либо будет обращён в прах. Силой лунного пламени они заставят этот мир вспыхнуть.\n\n§YАвтор портрета:§! kelKessel"
EQC_ED_AF_big_sisters_name:0 "Старшие сёстры"
EQC_ED_AF_big_sisters_desc:0 "Здравый смысл подсказывает, что день и ночь не могут существовать одновременно, ибо что есть одно, если не отсутствие другого? Небо не может вместить два небесных светила сразу, иначе оно обратится против самого себя и будет раздирать себя на части, пока одно не поглотит другое. Сами раздумья о подобном парадоксе по своей природе есть не что иное, как упражнение в абсурде.\nИ всё же этот парадокс явился миру. Дейбрейкер, воплощение солнца, и Найтмер Мун, императрица ночи, заключили порочный союз. Отныне луна восходит вместе с солнцем, а мир содрогается перед их мощью. Две богини-аликорна выступают в поход, ведя за собой бесконечное воинство преданных последователей. Всякий либо склонится перед ним, либо будет обращён в прах. Силой лунного пламени они заставят этот мир вспыхнуть.\n\n§YАвтор портрета:§! kelKessel"

EQC_ED_emergency_council:0 "Чрезвычайный совет"
EQC_ED_emergency_council_desc:0 ""Я стала Принцессой Дружбы не для того, чтобы править в одиночку!" — Твайлайт Спаркл\n\nКогда обе прежние правительницы Эквестрии погрузились в безумие, держава осталась без лидера. Перед лицом этого кризиса Рэйвен Инквелл обратилась за помощью к Твайлайт, которая в ответ создала Чрезвычайный совет, состоящий из Спайка, Эпплджек, Рэйнбоу Дэш, Флаттершай, Пинки Пай, Рарити и неё самой. На Совет возложена задача поддерживать работу нации и организовывать оборону против неизбежного нападения павших сестёр.\n\n§YАвтор портрета:§! kelKessel"

