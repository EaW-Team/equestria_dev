# Equestrian Artefacts
EQS_shard_of_transformation_artefact:0 "Shard Of Transformation"
art_EQS_shard_of_transformation_artefact_desc:0 "A shard from the pearl of transformation. Princess Skystar sent it to help with our efforts to defeat the evil diarchy."
EQS_journal_of_the_two_sisters_artefact:0 "Journal Of The Two Sisters"
art_EQS_journal_of_the_two_sisters_artefact_desc:0 "The journal of the two sisters tells of a time before the first rise of Nightmare Moon, being an inspiration to all who still believe in harmony. It also contains detailed descriptions of the Everfree Forest and the Castle of the Two Sisters."
EQS_star_swirls_hat_artefact:0 "Star Swirl's Hat"
art_EQS_star_swirls_hat_artefact_desc:0 "The hat of Star Swirl the Bearded, one of Equestria's most famous mages. It is believed that the bells on this hat store some of his magical ability."
EQS_yickslurs_helm_artefact:0 "Yickslur's Helm"
art_EQS_yickslurs_helm_artefact_desc:0 "Yickslur was a great and honourable Yak warrior who lived many centuries ago. His helm passed into prossession of Princess Celestia, who stored it in the School of Harmony."
EQS_knuckerbockers_shell_artefact:0 "Knuckerbocker's Shell"
art_EQS_knuckerbockers_shell_artefact_desc:0 "In legends past, this shell could summon a mighty dragon named Knuckerbrocker. Although it lost this ability, residue of the spell once used still linger."
EQS_auroras_amulet_artefact:0 "Aurora's Amulet"
art_EQS_auroras_amulet_artefact_desc:0 "Can summon tsunamis. Use with caution."
EQS_grovers_crown_artefact:0 "Grover's Crown"
art_EQS_grovers_crown_artefact_desc:0 "Not to be confused with the Reichskrone, this was Grover I's crown as King of Griffonstone. It is unclear how it ended up in the School of Friendship, but somehow, it did."
EQS_talisman_of_mirage_artefact: "Talisman of Mirage"
art_EQS_talisman_of_mirage_artefact_desc:0 "Protects its wearer from an ancient curse. Sadly, the curse has long been forgotten."
EQS_clover_the_clevers_cloak_artefact:0 "Clover The Clever's Cloak"
art_EQS_clover_the_clevers_cloak_artefact_desc:0 "Clover The Clever was one of the mystical founders of Equestria and a unicorn of great wisdom. To honour his legacy, his cloak was preserved, and despite its age, it looks as good as freshly woven."
EQS_rings_of_scorchero_artefact:0 "Rings Of Scorchero"
art_EQS_rings_of_scorchero_artefact_desc:0 "The Rings of Scorchero come from a Neighuatl pyramid, where the cursed Ahuizotl tried to use them to capture the sun."
EQS_truth_talisman_of_tonatiuh_artefact:0 "Truth Talisman Of Tonatiuh"
art_EQS_truth_talisman_of_tonatiuh_artefact_desc:0 "The truth carries a heavy burden. This artefact will help you find it, but ponder if you are truly ready."
EQS_horn_of_the_abada_artefact:0 "Horn Of The Abada"
art_EQS_horn_of_the_abada_artefact_desc:0 "This horn stems from a noble race of unicorns called the Abada. They are now long gone, so long that even legends hardly tell of them. But this remaining horn still carries parts of the once-powerful magic."
EQS_silver_shawl_of_shadows_artefact:0 "Silver Shawl Of Shadows"
art_EQS_silver_shawl_of_shadows_artefact_desc:0 "An accursed shawl which causes you to vanish to the naked eye, but the price is prolonged use will cause your sanity to vanish as well. The exact magic imbued within it is still being studied."
EQS_crystal_heart_artefact:0 "Crystal Heart"
art_EQS_crystal_heart_artefact_desc:0 "The Crystal Heart was connected to the Shield of Harmony in a grand Crystalling ceremony. While it remains in the Crystal Empire, it now stretches its warmth to all who fight for harmony."
EQS_chrysalis_throne_artefact:0 "Chrysalis' Throne"
art_EQS_chrysalis_throne_artefact_desc:0 "Oh how the might has fallen. Once this was Chrysalis' almighty throne, used to absorb all non-changeling magic around it. Carefully insulated to block its magic-absorbing effects, it now is one artefact amongst many used to serve harmony."
EQS_starsteel_armour_suit_artefact:0 "Starsteel Armour Suit"
art_EQS_starsteel_armour_suit_artefact_desc:0 "Once upon a time, when monsters roamed the lands and the bears were bigger and less shackled by civilization, legendary armour suits like this one were crafted from magic starsteel. Now they serve mostly as museum pieces, being too large for even the mightiest of bears, but they still embody the polar soul."
EQS_ceremonial_pipe_artefact:0 "Ceremonial Pipe"
art_EQS_ceremonial_pipe_artefact_desc:0 "Also called a "Peace Pipe". These magical pipes are used by the buffalo when communicating with the gods, as well as when conducting important business. All who inhale the smoke of these pipes are bound by their word."
# Griffonian Artefacts
EQC_scepter_of_arantigos_artefact:0 "Scepter Of Arantigos"
art_EQC_scepter_of_arantigos_artefact_desc:0 "For a thousand years, this scepter has set in the tomb of Arantigos, being the only item to be buried with him. Is there nothing holy anymore in this world?"
EQC_reichskrone_artefact:0 "Reichskrone"
art_EQC_reichskrone_artefact_desc:0 "The crown of the Griffonian Emperors since the times of Grover I. It shines brightly, filled with colourful gems."
EQC_elixir_of_life_artefact:0 "Elixir Of Life"
art_EQC_elixir_of_life_artefact_desc:0 "A strange bottle found in the catacombs of Gamia's wide archives. Its inscription claims that it can bring back the dead, but so far, it seems to be unused."
EQC_griffichronicon_artefact:0 "The Griffichronicon"
art_EQC_griffichronicon_artefact_desc:0 "Originally written by hermit priests in Solarspike, this ancient folio about the history of griffonkind has been brought to Griffenheim by Grover I."
EQC_sword_of_grover_ii_artefact:0 "Sword Of Grover II"
art_EQC_sword_of_grover_ii_artefact_desc:0 "This noble sword was crafted by the dogs of Bronzehill for their saviour. It is said that Tessa Diamondshield, great-great-grandmother of Rover, cursed them for rising against their rightful master and kin, but the Bronzehillians claim that "only blessing can come from the curse of a tyrant.""
EQC_idol_of_maar_artefact:0 "Idol Of Maar"
art_EQC_idol_of_maar_artefact_desc:0 "It is said that no good griffon would ever craft an idol of Maar. Yet, some seem to disagree."
EQC_wittenlander_tome_artefact:0 "Wittenlander Tome"
art_EQC_wittenlander_tome_artefact_desc:0 "An old tome from the libraries of Wittenburgh. It is filled with ancient and powerful spells."
EQC_pearl_of_the_mountain_artefact:0 "Pearl Of The Mountain"
art_EQC_pearl_of_the_mountain_artefact_desc:0 "Not a literal pearl, but an enormous, perfectly flawless diamond. It is the pride of the Mountain's hoard."
EQC_head_of_an_eygsic_spider_artefact:0 "Head Of An Eygsic Spider"
art_EQC_head_of_an_eygsic_spider_artefact_desc:0 "This spider claimed the life of three fierce warriors before the fourth one could slay it and bring the head home as a trophy."
EQC_reactor_core_artefact:0 "Reactor Core"
art_EQC_reactor_core_artefact_desc:0 "The core of an enormous reactor found in Barrad. Powered by crystals, it radiates magical energy."
EQC_grimoire_of_magehold_artefact:0 "Grimoire Of Magehold"
art_EQC_grimoire_of_magehold_artefact_desc:0 "Hidden in the depths of Magehold's library, this grimoire dedicates itself to discussing the forbidden art of resurrection."
EQC_vial_of_holy_water_artefact:0 "Vial Of Holy Water"
art_EQC_vial_of_holy_water_artefact_desc:0 "The springs around Watertown are deemed holy by ponies and griffons alike. Some claim they can cure of any illness known to creaturekind."
EQC_vikingar_drinking_horn_artefact:0 "Vikingar Drinking Horn"
art_EQC_vikingar_drinking_horn_artefact_desc:0 "One of the famed drinking horns Olenian vikings brought with them when they first landed in Griffonia."
EQC_statue_of_sycaecia_artefact:0 "Statue Of Sycaecia"
art_EQC_statue_of_sycaecia_artefact_desc:0 "A statue of Sycaecia, the godess of Sicameon. It has heard countless prayers from griffons over the centuries, before being stolen by the invaders."
EQC_the_oovervinnlighet_artefact:0 "The Oövervinnlighet"
art_EQC_the_oovervinnlighet_artefact_desc:0 "Also called the Godsword of Broturius. Gifted to the first king of Vedina by the witch Sjönavdam."

