## FOCUS ##

EQC_ED_jet_set_new_job:0 "Новая должность Джет Сета"
EQC_ED_jet_set_new_job_desc:0 "Джет Сет хорошо служил Нам как верный вассал, пусть даже и Нашим недостойным прежним воплощениям. Мы должны действовать быстро, чтобы закрепить Нашу власть, поэтому Мы даруем ему честь стать Нашим монаршим секретарём. Ему стоит поскорее осознать, насколько никчёмны его демократические "идеалы", если он желает своей стране блага."
EQC_ED_return_to_equestria:0 "Возвращение в Эквестрию"
EQC_ED_return_to_equestria_desc:0 "Хотя Наше пребывание в Новом Мейрленде и было... необходимым, пришло время Нам вернуться домой. Эквестрия принадлежит Нам по праву, и настал час заявить на неё Свои права."
EQC_ED_modify_the_congress:0 ""Скорректировать" конгресс"
EQC_ED_modify_the_congress_desc:0 "В обычных обстоятельствах Мы бы просто упразднили "конгресс", но он всё ещё может сослужить Нам службу. Местный народ цепляется за глупые идеалы демократии и верховенства закона. Если Мы встроим эти структуры в Нашу систему патронажа, то мигом лишим его всякой реальной власти, оставив прежний фасад на месте."
EQC_ED_disband_the_congress:0 "Разогнать конгресс"
EQC_ED_disband_the_congress_desc:0 "Нам нет нужды потакать Нашим маленьким пони в их глупых затеях. Как Наши подданные, они должны подчиняться Нашей воле, а не Мы – их прихотям. "Конгрессу" Нового Мейрленда нет места в Нашем новом царстве."
EQC_ED_assemble_the_solarists:0 "Собрать соляристов"
EQC_ED_assemble_the_solarists_desc:0 "Наш союз хрупок, но должен выстоять. Мы обе должны быть представлены в залах власти, иначе Мы разорвем Наше царство на части в порыве ревности. Соляристы должны сплотиться вокруг Нового Мейрленда и служить Нашему величию."
EQC_ED_convince_the_harmonists:0 ""Убедить" гармонистов"
EQC_ED_convince_the_harmonists_desc:0 "Гармония как идеология не полностью ошибочна – вопрос лишь в том, как её применять. По правде говоря, пони должна объединять дружба... и Наше правление. Только под Нашим чутким наставничеством можно достичь истинной гармонии. Пока гармонисты принимают это, им нечего бояться. Но если нет... Скажем так, это будет не слишком мудрый выбор."
EQC_ED_theyve_outlived_their_purpose:0 "Они изжили себя"
EQC_ED_theyve_outlived_their_purpose_desc:0 "Мы не намерены пресмыкаться и кланяться, подобно какому-нибудь грифоньему республиканцу, выпрашивая поддержку! Мы стоим гордо и твёрдо диктуем свои условия. Если бывшие политики Нового Мейрленда не желают склониться по доброй воле, Мы заставим их преклонить и колени, и шеи."
EQC_ED_approach_the_shadowbolts:0 "Призыв ко всем лунаристам"
EQC_ED_approach_the_shadowbolts_desc:0 "Наш союз зиждется лишь на необходимости и той малой толике сестринской любви, что всё ещё уцелела. Обе Наших силы должны быть представлены в залах власти, иначе Наше новое царство будет разорвано в клочья. Лунаристы должны сплотиться под Нашим знаменем в Новом Мейрленде и служить Нашему величию."
EQC_ED_follow_candy_garden:0 "Принять план Кэнди Гарден"
EQC_ED_follow_candy_garden_desc:0 "На первый взгляд может показаться, что Кэнди Гарден не достаёт рвения, необходимого для исполнения Нашей воли. Однако на самом деле её планы работают на долгий срок. Реформы Кэнди Гарден помогут постепенно приобщить население к Нашей божественности, что сведёт к минимуму общественные волнения и позволит Нам избежать ненужных крайностей."
EQC_ED_call_over_arcane_nova:0 "Призвать Аркэйн Нову"
EQC_ED_call_over_arcane_nova_desc:0 "Наша божественность не должна ставиться под сомнение ни на секунду! Нам нужен не мягкий подход, а решительные действия! Аркэйн Нова возьмёт на себя идеологическую обработку населения, ибо лишь она обладает необходимым для этого рвением!"
EQC_ED_install_loyal_governors:0 "Назначить верных губернаторов"
EQC_ED_install_loyal_governors_desc:0 "Никакая империя не может быть крепче своей бюрократии, а нынешний аппарат Нам не по душе. Пока Мы не сможем доверять Нашим губернаторам, Мы не сможем гарантировать исполнение Наших указов. Давайте же попрощаемся со старым и поприветствуем новый порядок."
EQC_ED_elevate_the_thestrals:0 "Возвысить фестралов"
EQC_ED_elevate_the_thestrals_desc:0 "Фестралы Нового Мейрленда жили на задворках общества с самого основания колонии. Пора с этим покончить! Как Наши благословенные подданные, они наконец должны получить заслуженные привилегии и должным образом войти в Нашу систему патронажа."
EQC_ED_the_shadow_works_concept:0 "Воспользоваться Шэдоуболтами"
EQC_ED_the_shadow_works_concept_desc:0 "Шэдоуболты давно обосновались в Новом Мейрленде и глубоко пустили здесь корни. Поэтому их ресурсы будут использованы для милитаризации колонии и укрепления Нашего праведного домена."
EQC_ED_silence_pickets_group:0 "Заткнуть группу Пикета"
EQC_ED_silence_pickets_group_desc:0 "Пикета Фенса можно называть по-разному, но для Нас он – явная проблема. Его отношение к грифонам в Нашем царстве нанесёт прямой ущерб Нашей способности вести войну, а этого никак нельзя допустить. Мы предпримем шаги, чтобы устранить эту проблему до того, как она разрастётся до масштабов катастрофы."
EQC_ED_utilize_dews_loyalty:0 "Использовать преданность Дью"
EQC_ED_utilize_dews_loyalty_desc:0 "Несмотря на приверженность идеалам, не все из которых Нам... по нраву, Ивнинг Дью остаётся верной слугой, чья репутация безупречна. Нам надлежит воспользоваться этим активом, ибо Нашему царству сейчас нужны все доступные ресурсы."
EQC_ED_sideline_evening_dew:0 "Отстранить Ивнинга Дью"
EQC_ED_sideline_evening_dew_desc:0 "Хотя его верность как слуги не вызывает сомнений, взгляды Ивнинга Дью на грифонов попросту неприемлемы. Грифоны – Наши подданные, и с любым, кто желает Нашим подданным зла, необходимо разобраться. В знак признания преданности ему будет сохранена жизнь, но на большее милосердие рассчитывать не стоит."
EQC_ED_griffons_are_ours_too:0 "Грифоны тоже Наши"
EQC_ED_griffons_are_ours_too_desc:0 "Все живущие в Нашем царстве – Наши подданные, невзирая на расу и вид. Будь то грифон или пони, зебра или йети, гиппогриф или пёс – все они склонятся перед Нами как верные слуги."
EQC_ED_big_sister:0 "Методичка Старшей сестры"
EQC_ED_big_sister_desc:0 "Изучая политические дебри Нового Мейрленда, Мы наткнулись на любопытную группу – MARESOC. Хотя их идеи о "коллективисткой олигархии" – чистейший бред, методы шпионажа весьма изобретательны. Мы встретимся с этой Старшей сестрой и выведаем всё о предложенных ею методах."
EQC_ED_coopt_equalist_ideals:0 "Перенять идеалы эквализма"
EQC_ED_coopt_equalist_ideals_desc:0 "Эквализм, как и большинство затей Старлайт Глиммер – это фарс. Но не бесполезный. Мы используем его как основу для плана по расслоению общества на истинно равный класс, из которого возвыситься можно будет лишь по Нашему дозволению. Мы построим будущее, полное однообразной посредственности, покорной Нашей воле."
EQC_ED_make_the_unions_bend:0 "Заставить профсоюзы подчиниться"
EQC_ED_make_the_unions_bend_desc:0 "Левые идеи строятся на мысли, будто истинная власть в стране принадлежит народу. Что за абсурд! Истинная власть проистекает лишь из божественного права, коим обладаем лишь Мы! Все эти глупцы с их союзами и синдикатами научатся служить тем, кто выше их. Иначе они познают смерть!"
EQC_ED_absorb_the_populists:0 "Поглотить популистов"
EQC_ED_absorb_the_populists_desc:0 "Старые популисты проявили мудрость, избегая вражды с Нами. В знак признания этого Мы протянем им Наши копыта и предложим место подле Нас."
EQC_ED_purge_the_dissenters:0 "Избавиться от инакомыслящих"
EQC_ED_purge_the_dissenters_desc:0 "Мы слишком долго проявляли терпение. Тем, кто по-прежнему не желает принимать Наше правление, нет места в Нашем царстве. Если они так жаждут отделить себя от Нас – что ж, Мы пойдём им навстречу. И отделим их головы от шей."
EQC_ED_no_place_for_disloyalty:0 "Никакой неверности"
EQC_ED_no_place_for_disloyalty_desc:0 "Повиновение Нашей воле – это не выбор и не просьба, это приказ свыше. Тем, кто не способен или не желает исполнять Наши веления, нет места в Нашем государстве. Мы ясно дадим это понять всем Нашим подданным и заставим их ощутить на себе всю тяжесть Нашей мощи."
EQC_ED_a_newer_mareland:0 "Новейший Мейрленд"
EQC_ED_a_newer_mareland_desc:0 "Наконец-то Новый Мейрленд переродился. На месте захолустной и слабой колонии родилась могучая машина. Под Нашим наставничеством Новый Мейрленд станет авангардом Нашего правления и распространит Нашу славу по всему континенту!"
EQC_ED_breaking_free_of_our_prison:0 "Вырваться из Нашей тюрьмы"
EQC_ED_breaking_free_of_our_prison_desc:0 "Хотя достижения Нового Мейрленда нельзя отрицать, нам нужен далеко не только этот клочок Грифонии. Мы будем править всем этим континентом и используем его ресурсы для возвращения того, что принадлежит Нам по праву. Да начнутся завоевания Наших новых земель!"
EQC_ED_send_the_economy_into_overdrive:0 "Разогнать экономику"
EQC_ED_send_the_economy_into_overdrive_desc:0 "Даже после Наших прошлых мер экономика Нового Мейрленда ведёт себя довольно вяло. Но теперь, когда Мы переходим к военной экономике, такой слабости не будет места. Экономика должна быть разогнана до предела: работа будет кипеть без перерывов днём и ночью, ночью и днём ради Наших нужд!"
EQC_ED_transform_civilian_buildings:0 "Перепрофилировать гражданские здания"
EQC_ED_transform_civilian_buildings_desc:0 "Под Нашим правлением всё должно иметь своё предназначение. То, что бесполезно, может и должно быть изменено по Нашему капризу. Каждое здание будет использовано надлежащим образом или заменится тем, что принесёт пользу Нам."
EQC_ED_to_power_a_nation:0 "Осветить нацию"
EQC_ED_to_power_a_nation_desc:0 "В отличие от былых времён, Мы не можем создать армию, полагаясь лишь на кузницы и железо – Нам не обойтись без угля. Наше царство должно быть должным образом обеспечено энергией, иначе в нём погаснет свет, положив конец Нашим военным амбициям."
EQC_ED_ultima_ratio:0 "Последний довод"
EQC_ED_ultima_ratio_desc:0 "Порой Мы сталкиваемся с проблемами, что нельзя решить одними лишь пулями, но которые при этом не требуют Нашего прямого вмешательства. Для таких случаев Мы создадим абсолютное оружие, дабы карать всякого, кто посмеет противиться Нашей воле."
EQC_ED_a_gun_for_every_blade_of_grass:0 "Винтовка за каждой травинкой"
EQC_ED_a_gun_for_every_blade_of_grass_desc:0 "Имперская армия должна быть готова исполнить Нашу волю в любой момент, независимо от обстоятельств. Мы не допустим, чтобы она хоть на миг осталась без снаряжения. Во имя Нашего великого замысла Мы обеспечим каждого солдата оружием."
EQC_ED_every_little_bit_counts:0 "Важна каждая крупица"
EQC_ED_every_little_bit_counts_desc:0 "Одинокое зерно не раздавит кузнечика, но мощный поток способен смыть целый рой. То же касается и Наших подданных. Даже единственная лишняя минута труда может стать решающей в достижении нужных объёмов производства, без которых Наша армия дрогнет. Наши подданные должны принять это и трудиться на износ во имя Нашего имени."
EQC_ED_the_imperial_research_institute:0 "Имперский исследовательский институт"
EQC_ED_the_imperial_research_institute_desc:0 "Мы должны добиться того, чтобы Наше царство преуспевало во всех областях, включая науку. Застой в исследованиях ведёт к упадку прогресса в целом, и Мы не потерпим этого. Наше покровительство будет распространено на разработку новых технологий, дабы те ещё эффективнее служили Нашей воле."
EQC_ED_the_magic_of_industry:0 "Магия промышленности"
EQC_ED_the_magic_of_industry_desc:0 "Некоторые твердят, будто заводы противоположны магии, но это не так. Подобно алхимикам, фабрики превращают груды железа и грязи в танки, пули, бомбы и корабли. А благодаря масштабированию промышленность может превзойти магические аналоги. Мы обуздаем эту мощь и добавим "магию промышленности" в длинный список чар, которыми Мы овладели."
EQC_ED_we_need_equipment_now:0 "Снаряжение нужно СЕЙЧАС"
EQC_ED_we_need_equipment_now_desc:0 "Невероятное мастерство исполнения может быть приемлемым в обычные времена, но Мы правим совсем не в обычное время. Нам нужно как можно больше оружия, и ради этого Мы сосредоточимся на количестве в ущерб качеству."
EQC_ED_royal_standard:0 "Монарший стандарт"
EQC_ED_royal_standard_desc:0 "Легко поддаться искушению сиюминутной выгодой, но краткосрочные успехи не значат ничего, если в долгосрочной перспективе Наши армии не смогут сражаться из-за ломающегося оружия. Мы должны поднять стандарты, гарантируя, что те, кто сражается во Имя Наше, идут в бой с самым лучшим снаряжением."
EQC_ED_industrial_heart_of_griffonia:0 "Промышленное сердце Грифонии"
EQC_ED_industrial_heart_of_griffonia_desc:0 "Великий подвиг для некоторых – лишь рутина для Нас. И всё же за короткий срок Мы выковали нацию, чья промышленность соперничает – нет, превосходит мощь величайших держав этого континента. Мы сотворили титана, которым можно гордиться! Подданные Наши, внемлите: в этот день вы обрели величие во Имя Наше!"
EQC_ED_every_creature_must_serve:0 "Все должны служить"
EQC_ED_every_creature_must_serve_desc:0 "Единственный способ одолеть Наших врагов – мобилизовать как можно больше существ. Мы сосредоточимся на создании бесчисленной Имперской армии, чьи легионы затмят звёзды, оставив видимыми лишь Солнце и Луну. Даже если это потребует некоторых компромиссов, таков единственный путь к безопасности Нашего царства."
EQC_ED_bet_on_elite_units:0 "Ставка на элитные части"
EQC_ED_bet_on_elite_units_desc:0 "Наши враги будут многочисленны, и их число превысит Наше. Путь к победе над ними лежит не в попытках превзойти их по числу, а в сосредоточении на Нашей собственной силе. Наши солдаты должны стать непобедимыми среди смертных, уступая лишь Нам."
EQC_ED_royal_bonds:0 "Выпустить монаршие облигации"
EQC_ED_royal_bonds_desc:0 "По необъяснимой причине Нам не удалось собрать достаточно средств, несмотря на Наши неортодоксальные методы добычи денег. Кто бы мог подумать, что война – это так дорого? Чтобы и дальше финансировать Наши усилия, Мы будем "поощрять" граждан покупать монаршие облигации, которые будут погашены в будущем с процентами."
EQC_ED_rip_and_tear:0 "Рвать и терзать"
EQC_ED_rip_and_tear_desc:0 "Время имеет решающее значение: чем больше Мы тратим на планирование, тем дольше остаёмся вдали от Эквестрии. Мы сокрушим Наших врагов свирепостью и рвением, а не картами и бумажками."
EQC_ED_meticulous_planning:0 "Тщательное планирование"
EQC_ED_meticulous_planning_desc:0 "Война – это не просто битва, это сложный танец миллиона различных участников. Лишь должным образом координируя их всех, Мы можем надеяться на победу."
EQC_ED_destroying_the_shield:0 "Сокрушить щит"
EQC_ED_destroying_the_shield_desc:0 "Наши копыта однажды исходят всю Грифонию, но даже величайшее путешествие начинается с первого шага. Нации Карфинии могут считать себя в безопасности благодаря альянсу, но вскоре они познают истинные пределы Нашей власти. Мы сокрушим их как вместе, так и поодиночке."
EQC_ED_no_crown_but_our_own:0 "Нет корон, кроме Нашей"
EQC_ED_no_crown_but_our_own_desc:0 "Мысль о том, что в этом мире есть какие-то ещё особы монаршей крови, достойные титула, помимо Нас самих, нелепа. Мы покажем миру истину и добьёмся того, чтобы каждый, кто именует себя "монархом", преклонил колени наравне с остальными."
EQC_ED_the_karthinian_conquest:0 "Покорение Карфинии"
EQC_ED_the_karthinian_conquest_desc:0 "С поражением Вингбардии пала первая костяшка домино на Нашем пути к завоеванию. Богатства южной Грифонии теперь готовы к тому, чтобы Мы использовали их для достижения Наших дальнейших целей."
EQC_ED_divide_the_spoils:0 "Разделить добычу"
EQC_ED_divide_the_spoils_desc:0 "С новыми завоеваниями под Наше покровительство перешли новые богатства и ресурсы. Как великодушные правительницы, Мы одарим Нашим благословением тех подданных, кто доказал свою верность. Пусть все знают: Мы – добрые владычицы, которые заботятся о тех, кто служит Нам верой и правдой."
EQC_ED_demand_their_loyalty:0 "Потребовать их преданности"
EQC_ED_demand_their_loyalty_desc:0 "Покорённые народы слишком долго поклонялись ложным богам чужеземного происхождения, но этому пришёл конец. Все они – от самого смиренного крестьянина до наиболее упрямого атеиста – познают, что отныне ими правят их истинные богини."
EQC_ED_settling_on_a_new_faith:0 "Утвердить новую веру"
EQC_ED_settling_on_a_new_faith_desc:0 "По мере роста Нашего царства Мы должны принять решение по вопросу, которого Мы стратегически избегали: какова же природа веры в Наших землях? Нам нужно пройти по острию ножа и объединить соляризм и найтмеризм так, чтобы это не повлияло ни одну из половин Нашей власти."
EQC_ED_pacify_lake_rumare:0 "Усмирить озеро Румейр"
EQC_ED_pacify_lake_rumare_desc:0 "Хотя большинство народов, живущих на берегах озера, не заслуживают ни капли уважения, они занимают стратегически важное положение. Озеро Румейр покорится нам и станет плацдармом для дальнейших завоеваний."
EQC_ED_our_subjects_now_and_forever:0 "Наши подданные, отныне и вовеки"
EQC_ED_our_subjects_now_and_forever_desc:0 "Все существа под Нашей властью должно осознать и принять тот факт, что отныне они – Наши подданные на веки вечные. Для тех, кто находится в тени Нашего знамени, есть только два пути: стать частью Нашего царства или исчезнуть."
EQC_ED_a_stab_at_the_heart_of_griffonkind:0 "Удар в сердце грифоньего рода"
EQC_ED_a_stab_at_the_heart_of_griffonkind_desc:0 "Хотя регион вокруг Грифонстоуна весьма, мягко говоря, убог, сам город всё ещё имеет огромное значение для грифонов. Его захват продемонстрирует праведность Нашего дела и законность Нашего правления Нашим грифоньим подданным – как нынешним, так и будущим."
EQC_ED_topple_his_tomb:0 "Низвергнуть его гробницу"
EQC_ED_topple_his_tomb_desc:0 "Грифоны Арантиги совершили тяжкий грех, ибо сотворили себе кумира из простого грифона. Они поймут ошибочность своего пути, но, поскольку Мы – милосердные правительницы, им будет дан шанс на искупление. Мы разрушим гробницу ложного героя и покажем грифонам, что поклонения достойны лишь Мы, и никто иной."
EQC_ED_destroy_heretical_sites:0 "Уничтожить святыни еретиков"
EQC_ED_destroy_heretical_sites_desc:0 "По мере того как Мы закрепляем власть над Нашими новыми землями, Нам будут снова и снова встречаться идолы ложных богов. Мы не должны колебаться: следует сжигать эти святыни при первой же возможности, однозначно доказывая Нашу божественность и превосходство."
EQC_ED_pacify_the_east:0 "Приоритет востока"
EQC_ED_pacify_the_east_desc:0 "Пока Грифония мобилизует свои силы в тщетной попытке остановить Нас, Мы должны определить направление основных усилий. На востоке лежат Сикамеон и Астерион, чья география представляет куда большую опасность, чем их армии. Ударив по ним, мы сможем беспрепятственно закрепиться на южном побережье Грифонии."
EQC_ED_no_more_revolutions:0 "Конец революциям"
EQC_ED_no_more_revolutions_desc:0 "Аквелия остаётся грозным противником, и теперь, когда она справилась с внутренними неурядицами, она будет становиться всё сильнее. Бить нужно немедленно, не давая им времени на восстановление. Чем быстрее Аквелия будет покорена, тем скорее падут остальные Наши враги."
EQC_ED_they_might_have_their_uses:0 "Найти им применение"
EQC_ED_they_might_have_their_uses_desc:0 "Хотя бандиты Блэкрок – однозначный сброд, они всё же доказали своё мастерство в кое-каких сферах и могут пригодиться Нам в будущем. Мы дадим им шанс искупить вину, сея хаос на тех землях, что продолжают сопротивляться Нашему правлению."
EQC_ED_death_to_bandits:0 "Смерть бандитам"
EQC_ED_death_to_bandits_desc:0 "Никакой пощады бандитам. Не слушайте их ложь – единственная польза от подобных им, это служить удобрением для нашего овса. Они примерят пеньковые галстуки, став наглядным примером для каждого, кто посмеет пойти по их стопам."
EQC_ED_bringing_order_to_evi:0 "Принести порядок в Эви"
EQC_ED_bringing_order_to_evi_desc:0 "Преодолев горы Блэкхоллоу, мы добрались до долины Эви. Этот регион богат не только природными ресурсами: его сельскохозяйственное плодородие не имеет равных на всём континенте. Равнинный ландшафт позволит Нам провести молниеносную кампанию, захватив богатства долины Эви с минимальным для них ущербом."
EQC_ED_peripheral_no_longer:0 "Больше не периферия"
EQC_ED_peripheral_no_longer_desc:0 "Периферия лежит на пути Нашего продвижения на север, являясь ключевой целью, которую необходимо занять для продолжения наступления. Эти земли перестанут быть "периферией" и перейдут под Наше прямое управление."
EQC_ED_bring_aquileian_ponies_into_the_fold:0 "Обратиться к пони Аквелии"
EQC_ED_bring_aquileian_ponies_into_the_fold_desc:0 "В Аквелии проживает огромное количество пони, которые веками соседствовали с грифонами. Несомненно, Мы сможем наставить их на Наш праведный путь и использовать в качестве связующего звена для интеграции всей Аквелии."
EQC_ED_integrate_their_economy:0 "Интегрировать их экономику"
EQC_ED_integrate_their_economy_desc:0 "Экономика Аквелии процветала, подпитываясь её собственными завоеваниями. Теперь, когда их промышленность находится в Наших копытах, пришло время интегрировать её и поставить это благополучие на службу Нашему собственному праведному делу."
EQC_ED_rescue_the_posniaks:0 "Спасти пошняков"
EQC_ED_rescue_the_posniaks_desc:0 "Вести о геноциде в Лонгсворде достигли даже Наших ушей, и они наполняют Нас праведным гневом. Подумать только: эти варвары осмелились поднять коготь на Наших маленьких пони! Мы спасём Наших подданных и сделаем так, чтобы никто и никогда не посмел причинить им вред."
EQC_ED_conquering_the_southern_coast:0 "Покорить южное побережье"
EQC_ED_conquering_the_southern_coast_desc:0 "Юго-восток Грифонии – последний оплот Наших врагов на южном берегу. Покорив этот регион, мы не только обезопасим южный фланг от морских атак, но и сокрушим этих зебр с их нелепыми идеями о "гармонии" и "свободе"."
EQC_ED_only_one_empire_can_stand:0 "Лишь одна империя на континенте"
EQC_ED_only_one_empire_can_stand_desc:0 "Золотой век Империи Грифонов давно миновал, а грифоны отчаянно нуждаются в истинном правителе. Лишь Мы способны дать им это, ибо под Нашим началом раздоры прошлого будут смыты приливом божественной славы. Мы захватим само сердце грифоньего рода, доказав тщетность противостояния Нашей мощи."
EQC_ED_dethrone_the_bankers:0 "Свергнуть банкиров"
EQC_ED_dethrone_the_bankers_desc:0 "Скайфол – живое воплощение грехов грифоньего рода, великий идол их развращённости и алчности. Мы обрушимся на эту язву на теле мира и вырежем её, уничтожив банкиров и принеся континенту очищающий свет."
EQC_ED_make_them_bend_to_us:0 "Заставить их склониться"
EQC_ED_make_them_bend_to_us_desc:0 "Мы – великодушные правители, проявляющие заботу о Своих подданных. Однако в обмен на подобную заботу подданные обязаны исполнять свой долг. Пошнякам ещё только предстоит усвоить эту истину: платой за их освобождение станет вечная служба Нашему царству."
EQC_ED_erase_local_superstitions:0 "Искоренить местные суеверия"
EQC_ED_erase_local_superstitions_desc:0 "Похоже, что пошняки всё ещё отвергают Нашу божественность, глупо цепляясь за свои старые обычаи. Мы больше не намерены терпеть это оскорбление: отныне у пошняков не будет иных богов, кроме Нас."
EQC_ED_last_days_of_the_federation:0 "Последние дни Федерации"
EQC_ED_last_days_of_the_federation_desc:0 "Возможно, в ином мире или в иные времена Речная Федерация могла бы стоять подле Нас, заслужив признание за свой вклад в разгром лживой Империи. Но Нам был брошен вызов. Они осознают свою ошибку, когда на них обрушится Наш гнев. Подобно тому как они пытались приблизить Наш конец, Мы станем предвестницами их собственного."
EQC_ED_yales_research:0 "Йельские исследования"
EQC_ED_yales_research_desc:0 "Университеты Йеля ведут множество... любопытных проектов с огромным потенциалом, а также обладают развитой базой для более приземлённых исследований. Отныне и впредь они будут исполнять Нашу волю, неся просвещение тем, кого Мы сочтём достойными."
EQC_ED_loot_the_imperial_palace:0 "Разграбить Императорский дворец"
EQC_ED_loot_the_imperial_palace_desc:0 "У древних карфинцев была поговорка: vae victis, горе побеждённым. По законам войны проигравшая сторона отдаётся на милость победителя, который вправе забирать всё, что пожелает. Мы желаем разграбить Императорский дворец и изъять все хранящиеся там ценности. Если у грифонов возникнут вопросы, пусть обсуждают их с Нашими танками у своих ворот."
EQC_ED_the_north_must_fall:0 "Север должен пасть"
EQC_ED_the_north_must_fall_desc:0 "Северная Грифония превратилась в вертеп разврата и политического активизма. Республиканцы и скайнавцы обосновались там и распространяют свои вероломные убеждения по всему континенту. Мы сбросим их в море, показав остальным, что происходит с теми, кто смеет противиться Нашему законному правлению."
EQC_ED_riding_down_the_hill:0 "Спуститься с холмов"
EQC_ED_riding_down_the_hill_desc:0 "Отсталые пони холмов и застрявшие на островах чейнджлинги Гринклифа слабы и немощны, но Мы не можем мириться с их существованием, ибо Наш враг может использовать их как плацдарм против Нас. Мы должны забрать эти земли себе и показать миру: какой бы далёкой ни была страна, она неизбежно попадёт под Наше правление."
EQC_ED_no_subject_is_for_sale:0 "Подданные не продаются"
EQC_ED_no_subject_is_for_sale_desc:0 "Рабство... что за варварский институт. Сама мысль о том, что Нашего подданного можно купить или продать, словно обычный товар, абсурдна! Можно ли продать город? Можно ли продать звёзды? Наши подданные принадлежат Нам и только Нам одним, и никто другой не вправе заявлять на них права собственности."
EQC_ED_a_good_dog_is_a_loyal_dog:0 "Хорошая собачка – верная собачка"
EQC_ED_a_good_dog_is_a_loyal_dog_desc:0 "Псы Бронзхилла прославились своей непоколебимой верностью, и было бы расточительством игнорировать этот факт. Мы дадим псам шанс присягнуть тем, кто действительно достоин поклонения."
EQC_ED_secure_the_staging_ground:0 "Подготовка плацдарма"
EQC_ED_secure_the_staging_ground_desc:0 "Расположение Хаукленда посреди §OСелестийского§!/§gЛунного§! моря придает ему огромное стратегическое значение и делает ключом к возвращению на Наши законные земли в Эквестрии. Если Майер не желает признавать превосходство тех, кто выше него, то пришло время оборвать ему крылья."
EQC_ED_the_death_of_republicanism:0 "Смерть республиканизма"
EQC_ED_the_death_of_republicanism_desc:0 "После падения Республики пришло время для окончательного искоренения республиканизма – как формы правления, так и самой идеи. Глупцы могут твердить, что идею невозможно убить, но они просто никогда не сталкивались с Нашим могуществом."
EQC_ED_death_of_the_undead:0 "Погибель нежити"
EQC_ED_death_of_the_undead_desc:0 "Хотя большая часть Грифонии уже под Нашим контролем, на дальнем севере всё ещё существует Лига Ужаса. Там процветает извращённая магия, а некроманты и вампиры называют эти ледяные пустоши своим домом. Мы обрушим на них всю Нашу мощь, выжигая эту заразу. Перед лицом Нашего могущества даже нежить может умереть."
EQC_ED_knowledge_of_the_dead:0 "Знания мёртвых"
EQC_ED_knowledge_of_the_dead_desc:0 "Хм... Изучив их архивы, Мы обнаружили, что Лига Ужаса, несмотря на свои богохульства, всё же наткнулась на кое-что ценное. Мы заберём то немногое, что заслуживает внимания, и включим в Наше собрание знаний, а оставшееся и весь проклятый город в целом Мы предадим огню."
EQC_ED_griffonia_united_under_the_twin_crowns:0 "Единая под двумя коронами Грифония"
EQC_ED_griffonia_united_under_the_twin_crowns_desc:0 "Теперь, когда вся Грифония склонилась пред Нами, час решающей битвы близок. Готовьте легионы, созывайте инквизиторов, ибо вскоре Мы выступим в поход!"
EQC_ED_arcturians_no_longer:0 "Конец Ордена"
EQC_ED_arcturians_no_longer_desc:0 "В бесконечных сражениях против Лиги Ужаса Арктурианский орден доказал свою стойкость. Мы не станем разбрасываться такими талантами и предложим им место подле Нас. Им нужно лишь покориться Нашей воле."
EQC_ED_preparations_for_the_homecoming:0 "Подготовка к возвращению домой"
EQC_ED_preparations_for_the_homecoming_desc:0 "Час Нашего возвращения близок. Если Наша первая попытка закончилась крахом, то теперь Мы сделаем всё, чтобы вторая увенчалась успехом. Мы собрали великую мощь былых эпох под Нашим началом. Нашим армиям нет числа, а промышленность необъятна. Глупая Принцесса и её друзья вскоре познают Наш гнев. Эквестрия будет Нашей."
EQC_ED_secure_the_dragon_lands:0 "Покорить Драконьи земли"
EQC_ED_secure_the_dragon_lands_desc:0 "Несмотря на свою легендарную силу, драконы слишком малочисленны и отсталы, чтобы остановить Нашу современную армию. Мы включим их острова в состав Нашей державы, превратив эту землю в передовой плацдарм для наступления на Эквус."
EQC_ED_contact_loyalists:0 "Связь с лоялистами"
EQC_ED_contact_loyalists_desc:0 "Несмотря на Наш прежний призыв, в Эквусе всё ещё немало тез, кто не смог примкнуть к Нам. Прежний провал сейчас оказался редкостной удачей, ибо теперь они станут Нашим авангардом. Пусть же лоялисты делом докажут свою верность и преданность Нашему имени."
EQC_ED_bolster_our_naval_capabilities:0 "Укрепление морского могущества"
EQC_ED_bolster_our_naval_capabilities_desc:0 "Как и во многих войнах, Нашим злейшим врагом станут не вражеские солдаты, а логистика. Чтобы §OСелестийское§!/§gЛунное§! море превратилось в ровную дорогу для Наших войск, Мы должны добиться полного господства Нашего флота над волнами."
EQC_ED_promote_chaos:0 "Посеять хаос"
EQC_ED_promote_chaos_desc:0 "Несмотря на внешнюю видимость единства, фасад этой жалкой гармонии испещрён множеством трещин. Мы вонзимся в них, срывая броню с Нашего врага и проникая в каждую доступную брешь."
EQC_ED_around_the_clock:0 "Круглосуточный труд"
EQC_ED_around_the_clock_desc:0 "По мере приближения судьбоносного дня Мы не можем позволить таким нелепостям, как "права рабочих" или "перерывы для повышения эффективности", стоять на пути возвращения того, что принадлежит Нам по праву. Народ будет беспрекословно исполнять Нашу волю, телом и душой посвятив себя возвращению Нашего наследия."
EQC_ED_taking_back_what_is_ours_by_right:0 "Возвращение Нашего по праву"
EQC_ED_taking_back_what_is_ours_by_right_desc:0 "Наконец настал миг Нашего триумфа. Ложные правители Эквестрии будут вынуждены склониться перед своими законными повелительницами и признать Нашу власть. Если они проявят должное раскаяние, Мы, возможно, соблаговолим вновь принять их под Свою опеку."
EQC_ED_the_great_return:0 "Великое возвращение"
EQC_ED_the_great_return_desc:0 "[EQC_ED_the_great_return_desc_dyn]"
EQC_ED_the_great_return_desc_normal:0 "Вопреки всем трудностям, Мы вернулись в Свои законные владения. Несмотря на внешних и внутренних предателей, невзирая на сопротивление Древа Гармонии и Наших собственных подданных, Мы вновь в Кантерлоте. Доказательство Нашего могущества неоспоримо, ибо даже сам мир не смог предотвратить Наше возвращение!"
EQC_ED_the_great_return_desc_alternate:0 "Вопреки всем трудностям, Мы вернулись в Свои законные владения... и всё же не всё ладно в Нашем царстве. Древо Гармонии ослабло, а несносные Элементы Гармонии так и не явили себя с самого начала Нашего триумфального похода. Нам надлежит оборвать эту последнюю нить, дабы она впредь не стала занозой в Нашем копыте."
EQC_ED_dealing_with_the_malevolent_six:0 "Участь Злобной шестёрки"
EQC_ED_dealing_with_the_malevolent_six_desc:0 "Элементы Гармонии не справились со своими обязанностями. Они предпочли ослушаться Нас и выступить против Нашего законного правления, вместо того, чтобы подчиниться. Мы этого не простим, так что пришло время определиться с наказанием."
EQC_ED_it_must_go:0 "Срубить его" #WHO MUST GO?
EQC_ED_it_must_go_desc:0 "Древо Гармонии было занозой в Нашем боку с самого Нашего появления. Его попытки помешать Нам явиться в Эквестрию непростительны, и от него нужно избавиться в кратчайшие сроки. Только тогда Мы будем в безопасности от появления очередных компаний "верных друзей", получающих в последний момент силу дружбы и побеждающих Нас."
EQC_ED_jet_sets_reckoning:0 "Расплата Джет Сета"
EQC_ED_jet_sets_reckoning_desc:0 "Похоже, Наш монарший секретарь не оценил по достоинству дарованную ему должность и плёл интриги за Нашей спиной вместе с предателями... За это его ждёт расплата, ибо никто не может предать Нас и избежать правосудия."
EQC_ED_after_the_dust_settles:0 "Когда осядет пыль"
EQC_ED_after_the_dust_settles_desc:0 "Мы принесли мир, справедливость и процветание Нашей новой империи, но теперь не осталось ничего, что удерживало бы Нас едиными. Оседает пыль сражений, а на передний план выходит неуютный вопрос: что же будет дальше?"
EQC_ED_what_we_do_best:0 "Что Мы умеем лучше всего"
EQC_ED_what_we_do_best_desc:0 "Наши верные подданные славились умением создавать разведывательные сети. Вместо того чтобы полагаться на некую "добрую волю", Мы сделаем так, чтобы каждый подданный знал – Мы наблюдаем за ним, а у Наших врагов больше не осталось места, где можно было бы скрыть свои тайны."
EQC_ED_build_on_the_motherly_image:0 "Образ заботливой матери"
EQC_ED_build_on_the_motherly_image_desc:0 "Шпионаж – дело грязное и неприглядное. Вместо этого Мы взрастим образ любящей матери, к которой Наши подданные смогут обратиться в любой миг. Ведь тысячу лет Мы правили Эквестрией не одним лишь страхом. Но если Наши маленькие пони будут плохо себя вести, у Матери всегда найдётся время выслушать рассказы более послушных братьев и сестёр."
EQC_ED_the_imperial_war_plan:0 "Имперский военный план"
EQC_ED_the_imperial_war_plan_desc:0 "Наши планы по покорению Грифонии и Эквуса потребуют масштабной трансформации вооружённых сил. Она будет столь глубокой, что по завершении армия, когда-то принадлежавшая Новому Мейрленду, необратимо изменится и будет верна лишь Нашей воле."
EQC_ED_locate_promising_mages:0 "Найти перспективных магов"
EQC_ED_locate_promising_mages_desc:0 "С потерей Эквестрии были утрачены и лучшие маги-пони. Но это не значит, что чародеев не осталось вовсе. В Грифонии, несомненно, найдётся немало умельцев, искушённых в магии и жаждущих служить Нашему делу. А если нет? Что ж... мы применим наше фирменное "красноречие"."
EQC_ED_new_training_methods:0 "Новые методы подготовки"
EQC_ED_new_training_methods_desc:0 "Из-за невероятного технологического прогресса методов ведения войны, что особенно остро проявился в последние десятилетия, Нашим войскам необходимо научиться адаптироваться на лету. Мы привьём им это умение в ходе обучения, чтобы они всегда могли беспрекословно исполнять Нашу волю."
EQC_ED_followers_of_the_night:0 "Последователи Ночи"
EQC_ED_followers_of_the_night_desc:0 "Никто не может отрицать, что Нашим слугам нет равных. Мы улучшим их экипировку и подготовку, дабы последователи Найтмер стали лучшими воинами на планете. Благодаря железной дисциплине они обратят врага в бегство, и им для этого не придётся бросаться грудью на пулемёты."
EQC_ED_warriors_of_the_sun:0 "Воины Солнца"
EQC_ED_warriors_of_the_sun_desc:0 "В Нашей державе нет никого более преданного, чем солдаты Дейбрейкер. Мы не позволим врагу обескровить Наши "элитные формирования" постоянными атаками. Наоборот, Мы сделаем так, чтобы именно противник разбился о Наших воинов, рвущихся вперёд подобно солнечным лучам. Веру и рвение ничто не удержит."
EQC_ED_the_need_for_war:0 "Жажда войны"
EQC_ED_the_need_for_war_desc:0 "Для чего она нужна война? О, абсолютно для всего. Только через войну Мы сможем обрести то, что принадлежит Нам по праву; только в огне войны Мы закалим Наших подданных. Отвергать войну – значит отвергать перемены и поощрять застой. Мы не допустим застоя, ибо Нашему могуществу нет предела!"
EQC_ED_bravery_will_be_rewarded:0 "Награда за храбрость"
EQC_ED_bravery_will_be_rewarded_desc:0 "Хотя Мы ожидаем от каждого проявлений отваги в бою, среди смертных всегда найдутся те, кто готов приложить больше усилий. Мы отметим их рвение, осыпав золотом и орденами, дабы почтить их жертву и воодушевить остальных следовать их примеру."
EQC_ED_redefining_friendship:0 "Переосмысление дружбы"
EQC_ED_redefining_friendship_desc:0 "Дружба и гармония – давние столпы идентичности Эквестрии, поэтому Мы не станем их разрушать. Напротив, Мы откроем подданным истину: настоящая дружба заключается в послушании тем, кто желает вам блага, а истинная гармония – в слаженном труде на благо общества и государства."
EQC_ED_to_cross_an_ocean:0 "Пересечь океан"
EQC_ED_to_cross_an_ocean_desc:0 "Путь в Эквус лежит через море, но если Мы можем пересечь его с легкостью, Нашим подданным понадобятся корабли, которым потребуется защита от вражеских судов. А значит, Нам нужен флот."
EQC_ED_everything_for_victory:0 "Всё для победы"
EQC_ED_everything_for_victory_desc:0 "Победа – Наша главная цель, стоящая превыше всего остального. Да, иные блага могут быть желанны, но без победы они недостижимы. Наши подданные должны осознать это и быть готовыми принести себя в жертву ради Наших нужд."
EQC_ED_to_dominate_the_skies:0 "Господство в небесах"
EQC_ED_to_dominate_the_skies_desc:0 "Мы раз за разом убеждались в важности воздушной мощи, да и сами преподали немало уроков на этот счёт. Мы не можем находиться повсюду одновременно, а потому Нашим подданным придётся взять часть этой ноши на себя. Наши самолёты затмят собой небо, позволяя армии и флоту беспрепятственно наступать."
EQC_ED_the_grand_fleet:0 "Великий флот"
EQC_ED_the_grand_fleet_desc:0 "Нам нужны корабли в большом количестве. Не те, что с самыми огромными пушками и толстейшей броней, а просто как можно больше судов. Мы можем позволить себе экономить на качестве, ведь, в конце концов, в море Мы надолго не задержимся."
EQC_ED_focus_on_firepower:0 "Ставка на огневую мощь"
EQC_ED_focus_on_firepower_desc:0 "Нам необходимы тяжёлые корабли, чтобы смести противника с океанской глади и сокрушить его флагманы. Когда Наш эсминец может быть потоплен вражеским линкором ещё до того, как сам сделает первый выстрел, количество перестаёт иметь значение. Линкор, который стоит двадцати слабых судов – вот Наш ключ к победе."
EQC_ED_experimental_designs:0 "Экспериментальные разработки"
EQC_ED_experimental_designs_desc:0 "Мы начнём продвигать самые передовые проекты самолётов, чтобы подавить врага Нашим технологическим превосходством. Пусть некоторые машины самопроизвольно взрываются при пустом баке или слишком резком вираже – это приемлемая цена за 5% прироста огневой мощи и дополнительные 3% к скорости и манёвренности."
EQC_ED_keep_to_what_works:0 "Работает? Не трогай!"
EQC_ED_keep_to_what_works_desc:0 "Наши ресурсы ограничены, и Мы должны тратить их только на проверенные временем средства. Каждый экспериментальный аппарат – это три самолёта, которые могли быть построены вместо него. Из этой тройки двое заберут с собой по врагу, а третий вернётся домой."

## Equestria Side
EQS_ED_what_now:0 "Что теперь?"
EQS_ED_what_now_desc:0 "Мы оказались в на редкость затруднительном положении. Принцессы, правившие нами последнюю тысячу лет, судя по всему, лишились рассудка и сейчас заняты укреплением своей власти в нашей бывшей колонии – Новом Мейрленде. Нам нужно побыстрее прийти в себя и понять, что делать дальше."
EQS_ED_visit_the_tree_of_harmony:0 "Посетить Древо Гармонии"
EQS_ED_visit_the_tree_of_harmony_desc:0 "Носительницы Элементов Гармонии – и, конечно, Спайк – согласились сформировать чрезвычайный совет, который станет нашим новым правительством. Однако даже они далеко не всесильны. Пришло время довериться древнему Древу."
EQS_ED_calm_the_ponies:0 "Успокоить пони"
EQS_ED_calm_the_ponies_desc:0 "Пони Эквестрии вполне ожидаемо охватила паника: две принцессы подвели свою страну. Но надежда ещё потеряна, ведь у нас всё ещё есть третья."
EQS_ED_a_glimmer_of_hope:0 "Проблеск надежды"
EQS_ED_a_glimmer_of_hope_desc:0 "Наконец-то открылся новый путь вперёд. Пони доверились Элементам, а Древо Гармонии выиграло столь необходимое для нас время. Нашим маленьким пони пришлось время объединиться и помнить, что дружба – это чудо."
EQS_ED_gather_friends:0 "Собрать друзей"
EQS_ED_gather_friends_desc:0 "Если мы вступим в этот бой в одиночку, то проиграем ещё до его начала. Но, к счастью, за эти годы Носительницы Элементов Гармонии завели множество друзей и знакомых, и готовы завести ещё больше новых. Пришло время собрать всех наших друзей, чтобы мы могли встретить врага вместе."
EQS_ED_not_over_a_barrel:0 "Друзья-бизоны"
EQS_ED_not_over_a_barrel_desc:0 "На юго-западе Эквестрии издавна живут бизоны. Хотя в прошлом у нас случались конфликты, Носительницам Элементов Гармонии несколько лет назад удалось восстановить мир. Однако времена изменились, и нам нужно подтвердить нашу дружбу, иначе ситуация грозит выйти из-под контроля."
EQS_ED_the_princess_of_love:0 "Принцесса Любви"
EQS_ED_the_princess_of_love_desc:0 "Разве могут быть более верные друзья, чем кристальные пони? Принцесса Каденс, Принцесса Любви, правит ими уже несколько лет вместе со своим мужем, который к тому же приходится братом Принцессе Дружбы. Нам нужно подтвердить эту дружбу и убедиться, что они встанут на нашу сторону в борьбе против злой Диархии."
EQS_ED_help_across_the_ocean:0 "Помощь из-за океана"
EQS_ED_help_across_the_ocean_desc:0 "У далёких берегов Зебрики раскинулось королевство Гиппогрифия, которым правит королева Ново. С тех пор как мы помогли им в войне против Короля Шторма, гиппогрифы стали нашими друзьями. И хотя живут они на другом континенте, наладить с ними связь может оказаться весьма полезным делом."
EQS_ED_to_change_a_changeling:0 "Изменить чейнджлинга"
EQS_ED_to_change_a_changeling_desc:0 "Чейнджлинги всегда были одними из наших самых опасных противников, а королева Кризалис по-прежнему одержима идеей завоевания наших земель. Пришло время Носительницам Элементов Гармонии решить эту проблему раз и навсегда. Ведь в глубине души мы и так знаем, что даже чейнджлинг может измениться. Торакс – лучший тому пример."
EQS_ED_not_asking_for_trouble:0 "КРУШИТЬ?"
EQS_ED_not_asking_for_trouble_desc:0 "На севере, в Якякистане, назревают неприятности. Принц Резерфорд и его брат, принц Брэдфорд, зашли в тупик в своём непримиримом противостоянии. Похоже, это срочная проблема дружбы, которую нам необходимо поскорее решить."
EQS_ED_secrets_of_the_changelings:0 "Секреты чейнджлингов"
EQS_ED_secrets_of_the_changelings_desc:0 "Чейнджлинги могут похвастать уникальным подходом ко многим вещам. Они живут в тесных ульях, легче пони принимают стремительную индустриализацию и показали себя весьма умелыми бойцами. Будет мудро тщательно обдумать, сможем ли мы адаптировать некоторые из их инноваций."
EQS_ED_the_north_secured:0 "Обезопасить север"
EQS_ED_the_north_secured_desc:0 "На севере Эквуса проживает множество народов: олени, полярные медведи и пингвины. Нам необходимо найти с ними общий язык; в конце концов, злые аликорны представляют для них не меньшую угрозу, чем для нас."
EQS_ED_strength_in_the_polar_soul:0 "Сила полярной души"
EQS_ED_strength_in_the_polar_soul_desc:0 "Цивилизации севера никогда не знали ласковой улыбки бессмертных принцесс. Это закалило эти народы и даже, по мнению некоторых, сделало слишком грубыми. Но разве в эти трудные времена нам не пригодится толика суровости? Пусть они научат нас выживать в диких условиях."
EQS_ED_unity_in_diversity:0 "Единство в многообразии"
EQS_ED_unity_in_diversity_desc:0 "В Эквусе обитает множество видов, что построили ещё больше цивилизаций. Но у нас никогда не было возможности оценить это в полной мере, пока осада со стороны более сильного врага не заставила нас открыть свои сердца и умы. Отныне разнообразие станет фундаментом нашей победы."
EQS_ED_the_matter_of_severyana:0 "Вопрос Северяны"
EQS_ED_the_matter_of_severyana_desc:0 "Северяна откололась от нас после революции и стала советской республикой. Отношения между нами всегда были натянутыми: они грезят о том, чтобы принести революцию в Эквестрию, а мы изо всех сил стараемся их игнорировать. Но так больше продолжаться не может – перед лицом Найтмер Мун и Дейбрейкер нам нужно объединиться."
EQS_ED_the_lost_griffons_of_equus:0 "Потерянные грифоны Эквуса"
EQS_ED_the_lost_griffons_of_equus_desc:0 "Столетия назад Империя Грифонов, находившаяся тогда на пике своего могущества, основала колонию на нашем континенте. Ныне империя рухнула, а бывшей колонии приходится справляться самостоятельно. Учитывая, что злые диархи творят с их сородичами, нам стоит отправить к грифонам миссию дружбы, ведь они знают Грифонию лучше любого из нас."
EQS_ED_griffon_insights:0 "Опыт грифонов"
EQS_ED_griffon_insights_desc:0 "Грифоны являются полуорлами-полульвами, и, как и пегасы, они рождены, чтобы летать. Однако воинские традиции грифонов и пегасов разительно отличаются. Разве не разумно, если мы сможем взять друг у друга уроки ратного мастерства? И, быть может, грифоны научат нас чему-нибудь ещё."
EQS_ED_equus_in_harmony:0 "Эквус в гармонии"
EQS_ED_equus_in_harmony_desc:0 "Весь Эквус ныне един как союзники, партнёры и друзья, что готовятся к битве против злой диархии. В одном строю мы сильнее, чем когда-либо прежде, и поэтому вместе мы победим."
EQS_ED_the_magic_of_friendship:0 "Магия дружбы"
EQS_ED_the_magic_of_friendship_desc:0 "Дружба и гармония определяли облик Эквестрии на протяжении многих поколений. Это не просто ценности, которых придерживается общество, это сам фундамент, на котором построена вся нация. И даже когда те, кто некогда был главными столпами гармонии, пытаются её сокрушить, мы всё равно помним о ней. Пока жива магия дружбы, ничто не сможет нас сломить."
EQS_ED_recapitulate_past_adventures:0 "Вспомнить былые приключения"
EQS_ED_recapitulate_past_adventures_desc:0 "Носительницы Элементов Гармонии путешествовали по всей Эквестрии и даже за её пределами, раз за разом помогая другим находить путь к компромиссу и дружбе. В этих приключениях они и сами завели множество друзей. Пришло время задействовать эти связи, ибо нам пригодится любая доступная помощь."
EQS_ED_another_visit_to_the_tree:0 "Снова посетить Древо"
EQS_ED_another_visit_to_the_tree_desc:0 "Древо Гармонии стало одним из главных приятных сюрпризов в этом кризисе. Щит Гармонии, который оно воздвигло, защищает нас от немедленного гнева павших аликорнов, даруя драгоценное время на подготовку. Но мы всё ещё слабо понимаем, как именно функционирует Древо. Нам нужно глубже изучить его связь с Эквестрией и её обитателями."
EQS_ED_star_swirls_library:0 "Библиотека Стар Свирла"
EQS_ED_star_swirls_library_desc:0 "Стар Свирл Бородатый был одним из величайших магов в истории Эквестрии. Его библиотека, сохранившаяся до сих пор в катакомбах кантерлотского замка, представляет собой богатейшую сокровищницу магических исследований."
EQS_ED_lessons_from_school:0 "Школьные уроки"
EQS_ED_lessons_from_school_desc:0 "Стоить начать наши поиски магических артефактов со Школы Дружбы. В своё время Селестия передала туда несколько реликвий для изучения студентами. Нам следует вернуть их, чтобы использовать в деле."
EQS_ED_wisdom_of_other_races:0 "Мудрость других рас"
EQS_ED_wisdom_of_other_races_desc:0 "Пони – далеко не единственная раса, считающая Эквус своим домом. У всех – от чейнджлингов до полярных медведей – есть собственные артефакты, наделённые магической силой."
EQS_ED_study_the_shield:0 "Изучение щита"
EQS_ED_study_the_shield_desc:0 "Щит, который Древо Гармонии воздвигло над Эквестрией, обладает загадочной природой, во многом схожей с самим Древом. Нам стоит более детально изучить этот барьер, чтобы понять, как максимально эффективно его укрепить."
EQS_ED_legends_lost_to_time:0 "Легенды, затерянные в веках"
EQS_ED_legends_lost_to_time_desc:0 "В нашей стране всё ещё сокрыто множество артефактов, о существовании которых мы знаем, но не имеем представления, где именно их искать. Тщательное изучение библиотеки кантерлотского замка может пролить свет на зацепки, которые откроют перед нами ценнейшие возможности."
EQS_ED_extraordinary_crystalling:0 "Необычный Кристаллинг"
EQS_ED_extraordinary_crystalling_desc:0 "Обычно Кристаллинг – это церемония принятия новорождённого в правящую семью Кристальной империи. Однако на этот раз мы хотим собрать кристальных пони для Кристаллинга иного рода, в ходе которой попытаемся направить энергию Кристального сердца на укрепление Щита Гармонии."
EQS_ED_artifacts_of_power:0 "Могучие артефакты"
EQS_ED_artifacts_of_power_desc:0 "Собранные нами реликвии обладают колоссальной силой. Демонстрация их мощи сопряжена с риском, однако это поможет укрепить в сердцах пони надежду на то, что мы сможем одолеть злую диархию."
EQS_ED_spell_training:0 "Обучение боевым чарам"
EQS_ED_spell_training_desc:0 "Тома и манускрипты, найденные и изученные нами в библиотеках Стар Свирла и кантерлотского замка, содержат не только сведения об артефактах или теоретические рассуждения о природе магии. Мы обнаружили множество заклинаний, имеющих военный потенциал. Следует обновить программу подготовки наших магов, включив в неё новооткрытые чары."
EQS_ED_a_flurry_of_ideas:0 "Вихрь идей"
EQS_ED_a_flurry_of_ideas_desc:0 "Каденс, Шайнинг Армор и Фларри Харт наконец-то прибыли в Эквестрию. Твайлайт вне себя от радости: она может вволю проводить время со своей племянницей, и кто знает – быть может, это общение вдохновит их на парочку блестящих идей."
EQS_ED_the_power_of_alicorn_magic:0 "Мощь магии аликорнов"
EQS_ED_the_power_of_alicorn_magic_desc:0 "Дейбрейкер и Найтмер Мун вовсю используют свои невероятно могучие способности аликорнов. Однако это не значит, что мы беззащитны: на нашей стороне Твайлайт Спаркл, Каденс и Фларри Харт. Трое против двоих, так что счёт в нашу пользу. И пусть мы никогда не опустимся до их низменных методов, наша магия по-прежнему сильна."
EQS_ED_taming_the_flow:0 "Укротить поток"
EQS_ED_taming_the_flow_desc:0 "Опытнейшие маги направляют энергию собранных нами артефактов на поддержание Щита Гармонии. Однако эта мощь порой бывает дикой и непокорной, чего и следовало ожидать от могущественнейших предметов в истории Эквестрии. Нам необходимо сосредоточиться на укрощении энергетического потока, чтобы снизить риски и повысить стабильность."
EQS_ED_their_magic_and_ours:0 "Их магия и наша"
EQS_ED_their_magic_and_ours_desc:0 "Там, за океаном, злая диархия упивается запретными сферами магии, неся разрушение, смерть и порабощение запуганному и отчаявшемуся населению. Но мы докажем, что магия сама по себе не зла. Зло творят лишь те, кто её используют неверным образом. Грядущая война станет битвой чар, и мы встретим врага во всеоружии."
EQS_ED_slowing_them_down:0 "Замедлить их"
EQS_ED_slowing_them_down_desc:0 ""Соправительство", основанное Дейбрейкер и Найтмер Мун, представляет серьёзную угрозу для Эквестрии. Пока что они сосредоточены на завоевании Грифонии для поиска артефактов, способных пробить наш щит. Возможно, нам удастся немного усложнить им задачу..."
EQS_ED_refugees_from_new_mareland:0 "Беженцы из Нового Мейрленда"
EQS_ED_refugees_from_new_mareland_desc:0 "Когда две сестры захватили нашу бывшую колонию, далеко не все местные пони остались довольны новой властью. И хотя всяческое сопротивление было безжалостно подавлено, некоторым всё же удалось бежать в Эквестрию."
EQS_ED_our_most_valuable_asset:0 "Наш ценнейший актив"
EQS_ED_our_most_valuable_asset_desc:0 "Джет Сет и раньше связывался с Рэйвен Инквелл, чтобы узнать, как подступиться к венценосным аликорнам. Именно он предупредил нас об их охоте за артефактами. Но теперь, судя по всему, он готов зайти куда дальше прежнего."
EQS_ED_contact_the_griffons:0 "Связаться с грифонами"
EQS_ED_contact_the_griffons_desc:0 "Если мы хотим уводить артефакты прямо из-под носа злых сестёр, то будет разумно наладить контакт с оставшимися непорабощёнными государствами грифонов."
EQS_ED_securing_the_artefacts:0 "Собрать больше артефактов"
EQS_ED_securing_the_artefacts_desc:0 "Если мы сосредоточимся на логистике и наймём больше исследователей для подготовки экспедиций, то сможем проводить несколько раскопок одновременно."
EQS_ED_tricking_the_omniscient:0 "Обмануть всевидящих"
EQS_ED_tricking_the_omniscient_desc:0 "Злые диархи всегда были опасно близки к тому, чтобы раскрыть в Джет Сете двойного агента. Однако у него нашлось несколько козырей, позволивших развеять их недоверие. К сожалению, абсолютно все следы замести не удалось, так что в будущем ему придётся действовать с удвоенной осторожностью."
EQS_ED_emergency_diplomacy:0 "Чрезвычайная дипломатия"
EQS_ED_emergency_diplomacy_desc:0 "Грамотно используя дипломатическую поддержку, мы можем укрепить решимость грифоньих наций, сражающихся против злой диархии. Эффект, скорее всего, будет ограниченным, но любая помощь не будет лишней."
EQS_ED_digging_up_the_history:0 "Раскапывая историю"
EQS_ED_digging_up_the_history_desc:0 "Чтобы повысить шансы на успех экспедиций в Грифонии, правильная подготовка имеет решающее значение. Внеся небольшие изменения в организацию раскопок, мы сможем заранее задействовать больше ресурсов для достижения наилучших результатов."
EQS_ED_the_diplomat_archaelogist:0 "Дипломат-археолог"
EQS_ED_the_diplomat_archaelogist_desc:0 "Один старый "знакомый" Дэринг Ду способен заниматься раскопками почти столь же успешно, как она сама, а заодно и наладить для нас дополнительные связи в Грифонии. Похоже, у неё уже есть идеи, где именно его можно отыскать."
EQS_ED_foreign_artifact_studies:0 "Изучение зарубежных артефактов"
EQS_ED_foreign_artifact_studies_desc:0 "Когда разразится война со злыми сёстрами, они будут не единственными нашими врагами, ведь под их началом выступят бесчисленные легионы грифонов. Будет полезно узнать побольше об их магии, и сложно найти для этого место лучше, чем лаборатория с артефактами, найденными на их континенте."
EQS_ED_perfectly_measured_chaos:0 "Идеально отмеренная доза хаоса"
EQS_ED_perfectly_measured_chaos_desc:0 "Мы не желаем свергать диархию изнутри или даже подрывать основы их правления. Слишком велик риск того, что сёстры ополчатся на Джет Сета или, что ещё хуже, друг на друга. Но отдельные просчёты тут да там всегда можно списать на обычный хаос в госуправлении."
EQS_ED_the_precarious_balance:0 "Хрупкое равновесие"
EQS_ED_the_precarious_balance_desc:0 "Наши диверсии должны постоянно балансировать на грани: быть эффективными, но не настолько серьёзными, чтобы вызвать подозрения. К счастью, со временем Джет Сет всё лучше понимает, что именно может сойти ему с копыт."
EQS_ED_harmless_tomfoolery:0 "Безобидное жеребячество"
EQS_ED_harmless_tomfoolery_desc:0 "Если нам не удалось заполучить артефакт с первого раза, нужно просто попробовать снова. Главное – не падать духом, верно?"
EQS_ED_it_is_not_grave_robbing:0 "Это не расхищение гробниц"
EQS_ED_it_is_not_grave_robbing_desc:0 "Наши поисковые отряды немного похожи на расхитителей гробниц, но это лишь совпадение. Ведь мы на стороне добра и спасаем исторические реликвии от тех, кто может ими злоупотребить. Однако нам не помешало бы поучиться паре вещей у настоящих грабителей – в первую очередь тому, как правильно обеспечить скрытность и безопасность миссии."
EQS_ED_expand_our_operations:0 "Расширить операции"
EQS_ED_expand_our_operations_desc:0 "Развитие логистики внутри страны и подготовка более эффективных маршрутов проникновения в Грифонию позволят нам в случае неудачи гораздо быстрее снова пытать счастья."
EQS_ED_prepare_the_army:0 "Подготовить армию"
EQS_ED_prepare_the_army_desc:0 "Столетиями эквестрийской армии отводилась преимущественно церемониальная роль, поэтому сейчас она находится в плачевном состоянии. Хотя после Кантерлотской свадьбы были предприняты некоторые шаги, сейчас ситуация стала критической. Если мы хотим противостоять силам злой диархии на равных, полная переоценка военных доктрин неизбежна."
EQS_ED_weather_magic:0 "Погодная магия"
EQS_ED_weather_magic_desc:0 "Магия управления погодой – один из столпов культуры пегасов. Опытные погодные бригады регулярно подстраивают небо под самые разные нужды, а, учитывая нынешние обстоятельства, к этому длинному списку задач добавятся и военные цели."
EQS_ED_denying_them_sight:0 "Ослепить врага"
EQS_ED_denying_them_sight_desc:0 "Победа в сражении во многом зависит от разведки или, если говорить о защитниках, от противодействия противнику в этом. Благодаря магии погоды мы можем пойти ещё дальше: сквозь наши плотные облака враг не разглядит ровным счётом ничего."
EQS_ED_rain_on_their_parade:0 "Испортить им мундиры"
EQS_ED_rain_on_their_parade_desc:0 "Успех в бою часто зависит от погоды. Множество армий позорно застревали в грязи, а затем терпели сокрушительное поражение. С помощью направленных манипуляций погодой мы сможем изменить условия сражения в нашу пользу."
EQS_ED_wonderbolts_new_job:0 "Новая задача для вандерболтов"
EQS_ED_wonderbolts_new_job_desc:0 "Один из немногих по-настоящему ценных военных активов в нашем распоряжении – это вандерболты, непревзойденные летуны и мастера управления погодой. Рэйнбоу Дэш, сама будучи опытным членом этой команды, предложила план по максимально эффективному использованию их талантов."
EQS_ED_new_fighter_projects:0 "Новые истребители"
EQS_ED_new_fighter_projects_desc:0 "Даже самые талантливые пегасы не станут отрицать, что самолёты – важнейшая часть современной войны. Хотя они не смогут полностью заменить живых пони, защита и огневая мощь летающих машин делают их массовое производство первоочередной задачей для нашей промышленности."
EQS_ED_heavy_plane_construction:0 "Строительство тяжёлой авиации"
EQS_ED_heavy_plane_construction_desc:0 "Тяжёлые самолёты способны преодолевать огромные расстояния и нести внушительную боенагрузку, что делает их грозным оружием, способным нанести удар в самое сердце вражеской территории. Инвестиции в соответствующие проекты откроют перед нашими ВВС целый спектр новых стратегических возможностей."
EQS_ED_the_hoof_troops:0 "Пешие войска"
EQS_ED_the_hoof_troops_desc:0 "Основную массу нашей армии неизбежно составят пехотные части. Обеспечение их должной подготовкой и снаряжением крайне важно, чтобы в грядущих сражениях они смогли проявить себя с наилучшей стороны."
EQS_ED_the_magic_of_rifles:0 "Магия винтовок"
EQS_ED_the_magic_of_rifles_desc:0 "Магия огневой мощи – к счастью, как сказали бы некоторые – до сих пор не играла значительной роли в нашей истории. Однако грядущая война всё изменит. Винтовки, стреляющие заклинаниями вместо пуль, могут быть не менее смертоносными, и нам стоит отнестись к ним со всей серьёзностью."
EQS_ED_artillery_advances:0 "Успехи артиллерии"
EQS_ED_artillery_advances_desc:0 "Артиллерия – это ключевой компонент современного поля боя. "Снаряды, а не пони" – вот девиз нынешнего дня. Без современной артиллерии наши войска неизбежно понесут огромные потери, поэтому инвестиции в новые орудия крайне важны."
EQS_ED_supercharge_rifle_development:0 "Ускоренная разработка винтовок"
EQS_ED_supercharge_rifle_development_desc:0 "В настоящее время магическое оружие по-прежнему находится на ранних стадиях разработки. Нам необходимо как можно быстрее преодолеть текущий этап и перейти к созданию более совершенных образцов."
EQS_ED_harshwhinnys_ideas:0 "Идеи мисс Харшвинни"
EQS_ED_harshwhinnys_ideas_desc:0 "Обычно мисс Харшвинни занимается Эквестрийскими играми, на которых соревнуются команды со всей страны и даже из-за рубежа. Недавно её жизнь, как и многих других, перевернулась с ног на голову, но эта кобыла оказалась относительно подготовленной. Как танковый инженер-самоучка, она стала ярой сторонницей доктрины бронетанковой войны."
EQS_ED_taming_the_metal:0 "Укротить металл"
EQS_ED_taming_the_metal_desc:0 "Массовое производство танков требует колоссальных объёмов металлообработки и сварки. Применение особых заклинаний, способных плавить и придавать форуму металлу, поможет нам сократить время работы и повысить качество сборки."
EQS_ED_fast_and_furious:0 "Форсаж Х"
EQS_ED_fast_and_furious_desc:0 "Многие армейские подразделения выиграют от моторизации. В грузовиках нуждается не только пехота,но и различные службы обеспечения, а также логистика, работа которой невозможна без автотранспорта."
EQS_ED_crystalline_shells:0 "Кристаллические снаряды"
EQS_ED_crystalline_shells_desc:0 "Даже артиллерийские снаряды можно усилить магией: это обеспечит ускоренную перезарядку, увеличит силу взрыва при попадании и позволит эффективно пробивать вражескую броню. К сожалению, это потребует огромного расхода магических кристаллов."
EQS_ED_stopping_their_advances:0 "Сдерживание наступления"
EQS_ED_stopping_their_advances_desc:0 "Суровая реальность такова, что наш противник, скорее всего, будет превосходить нас, по крайней мере на первых порах. Крайне важно подготовить наши оборонительные позиции как можно лучше, чтобы мы могли обескровить врага во время его первоначального наступления."
EQS_ED_terrors_of_the_battlefield:0 "Ужасы поля боя"
EQS_ED_terrors_of_the_battlefield_desc:0 "Дальнейшие исследования открыли новые способы улучшения снарядов и боеприпасов, усиленных кристаллами."
EQS_ED_combined_arms_doctrine:0 "Доктрина взаимодействия родов войск"
EQS_ED_combined_arms_doctrine_desc:0 "Все ветви вооружённых сил должны координироваться наиболее эффективным образом, чтобы полностью реализовать свой потенциал."
EQS_ED_the_mobile_war:0 "Мобильная война"
EQS_ED_the_mobile_war_desc:0 "Мобильная армия – универсальная армия. Обход с флангов и окружение противника – самый эффективный способ победы. Ставка на производство грузовиков и механизированных частей в сочетании с доктринами использования танков обеспечит нам возможности для нанесения молниеносных ударов."
EQS_ED_superiority_in_movement:0 "Превосходство в манёвре"
EQS_ED_superiority_in_movement_desc:0 "Даже при наличии самого лучшего снаряжения в мире, конечный результат зависит от умения наших командиров. Мы обучим их искусству манёвренной войны и предоставим необходимую свободу в принятии решений на поле боя. Это сделает нашу армию гибкой и способной мгновенно реагировать на любые действия противника."
EQS_ED_our_first_line_of_defense:0 "Наша первая линия обороны"
EQS_ED_our_first_line_of_defense_desc:0 "Эквус отделён от Грифонии океаном, и прежде чем любые силы злой диархии смогут высадиться здесь, им сначала придётся пересечь водные просторы. Мы можем нанести врагу колоссальный урон, максимально осложнив этот переход и постоянно нарушая морские пути снабжения."
EQS_ED_island_defence:0 "Островная оборона"
EQS_ED_island_defence_desc:0 "Малые острова трудно защищать, но столь же трудно и захватывать. Однако тот, кто владеет ими, получает ценные морские базы и передовые аванпосты. Мы должны сделать всё возможное, чтобы противнику было максимально непросто отобрать их у нас."
EQS_ED_repurpose_civilian_boats:0 "Переоборудовать гражданские суда"
EQS_ED_repurpose_civilian_boats_desc:0 "Эквестрия никогда не могла похвастать великим флотом, и хотя в последние годы мы построили несколько боевых кораблей, этого явно недостаточно. Нам нужно модернизировать нынешние суда и даже задействовать часть гражданского флота, если мы хотим противостоять врагу."
EQS_ED_dockyard_expansion_plan:0 "План расширения верфей"
EQS_ED_dockyard_expansion_plan_desc:0 "Больше верфей – значит больше кораблей, а чем больше у нас кораблей, тем меньше вражеских солдат высадится на наших берегах."
EQS_ED_forward_defence:0 "Передовая оборона"
EQS_ED_forward_defence_desc:0 "Стратегические пособия для наших боевых штабов сильно устарели и не соответствуют принципам современной войны. Мы подготовим обновлённую редакцию и разошлём её военно-морскому командованию."
EQS_ED_unify_the_navcom:0 "Единое морское командование"
EQS_ED_unify_the_navcom_desc:0 "Структуры военно-морского управления находятся в плачевном состоянии из-за наслоения полномочий и создания дополнительных штабов без проведения коренных реформ. Нам необходимо реорганизовать и объединить наше морское командование."
EQS_ED_bits_of_victory:0 "Биты победы"
EQS_ED_bits_of_victory_desc:0 "Если мы хотим одержать верх в грядущей войне, то никак не обойтись без глубоких экономических реформ. Хотя Эквестрия может гордиться статусом лидера в области промышленных инноваций, на деле наша индустрия разрознена, неэффективна и почти полностью ориентирована на гражданское производство мирного времени."
EQS_ED_emergency_industrialisation:0 "Экстренная индустриализация"
EQS_ED_emergency_industrialisation_desc:0 "Война не для нерешительных. Нам необходимо стремительно наращивать промышленные мощности, а это значит, что старые законы, препятствующие строительству новых заводов, должны быть отменены или пересмотрены."
EQS_ED_the_fluttershy_plan:0 "План Флаттершай"
EQS_ED_the_fluttershy_plan_desc:0 "На протяжении веков пони жили в гармонии с природой. И они не могли не научиться за это время парочке трюков. Как член Чрезвычайного совета, Флаттершай предложила подход, в корне отличающийся от ускоренной застройки Эквестрии фабриками."
EQS_ED_lessons_from_the_coast:0 "Уроки побережий"
EQS_ED_lessons_from_the_coast_desc:0 "Прибрежные регионы вроде Балтимейра, Мейнхеттена или Лас-Пегасуса долгое время были промышленными центрами Эквестрии, а вот внутренние земли оставались преимущественно сельскими и использующими традиционные методы. Теперь нам необходимо побыстрее распространить современную модель развития на всю страну."
EQS_ED_rethink_the_cutiemark_system:0 "Пересмотреть систему знаков отличия"
EQS_ED_rethink_the_cutiemark_system_desc:0 "Система знаков отличия веками гарантировала, что каждый пони найдёт себе дело по душе. Однако нужды современной промышленности требуют совершенно иного. Нам следует подумать об ослаблении влияния знаков отличия на выбор профессии и поощрять пони искать себя за пределами их основного таланта."
EQS_ED_magic_makes_industry:0 "Магия – основа промышленности"
EQS_ED_magic_makes_industry_desc:0 "Значительная часть нашей промышленности опирается на магию, присущую нам как пони. Именно эти чары формируют нас и наш подход к любому делу."
EQS_ED_the_needs_of_modernity:0 "Нужды современности"
EQS_ED_the_needs_of_modernity_desc:0 "Военная промышленность – это чудовище, пожирающее колоссальное количество ресурсов: нефть, руду, древесину и многое другое. К несчастью, мы вынуждены непрестанно кормить этого зверя, иначе нас всех ждёт полный крах."
EQS_ED_nature_provides:0 "Дары природы"
EQS_ED_nature_provides_desc:0 "Хотя без некоторых заводов никак не обойтись, очень многие наши нужды – даже военные – можно удовлетворить с помощью природы, если только знать, где искать."
EQS_ED_its_not_foraging:0 "Это не собирательство"
EQS_ED_its_not_foraging_desc:0 "Последние несколько столетий мы заводили друзей любых всех животных, больших и малых. Когда мы идём в лес, то не занимаемся собирательством – мы просто находим то, что наши друзья оставили для нас, и пускаем подарки в дело."
EQS_ED_secrets_of_the_everfree:0 "Тайны Вечнодикого леса"
EQS_ED_secrets_of_the_everfree_desc:0 "Вечнодикий лес – одно из самых насыщенных магией мест в Эквестрии, полное нераскрытых тайн. Здесь также расположен Замок двух сестёр, хранящий древние знания. Нам нужно лишь отправиться туда и отыскать секреты."
EQS_ED_kindness_creates_kindness:0 "Доброта порождает доброту"
EQS_ED_kindness_creates_kindness_desc:0 "Доброта – это не просто моральный принцип, а фундамент сотрудничества. Она создаёт основу, с помощью которой мы все можем объединиться: если каждый перестанет думать только о собственной выгоде, то в конечном итоге выиграют абсолютно все."
EQS_ED_pacifist_no_more:0 "Больше не пацифисты"
EQS_ED_pacifist_no_more_desc:0 "Эквестрия – страна гармонии, и война веками была чужда этим землям. В прошлом мы решали проблемы, указывая врагам на их заблуждения, а если это не помогало – использовали мощь Элементов Гармонии. Однако на сей раз старых методов недостаточно."
EQS_ED_new_armouries:0 "Новые арсеналы"
EQS_ED_new_armouries_desc:0 "Нам нужно как можно больше арсеналов, чтобы должным образом экипировать солдат для грядущей войны."
EQS_ED_repurpose_what_we_have:0 "Использовать имеющееся"
EQS_ED_repurpose_what_we_have_desc:0 "Чтобы ускорить наращивание военной мощи, нам необходимо перестроить существующую промышленность, переориентировав её на выпуск военного снаряжения. К сожалению, это пойдёт в ущерб долгосрочному процветанию, но вот оккупация злыми аликорнами точно не поспособствует этому."
EQS_ED_the_necessary_evil:0 "Необходимое зло"
EQS_ED_the_necessary_evil_desc:0 "Отчаянные времена требуют радикальных мер. Разработка ядерно-магического оружия, не говоря уже о его применении, приводит нас в ужас, но если дела на фронте пойдут совсем плохо, лишь это сможет спасти нас."

#### DECISIONS & DECISION CATEGORIES

ED_artefacts_mechanic:0 "Поиск артефактов"
ED_artefacts_mechanic_desc:0 "По всему миру в укромных уголках спрятаны §Yмощные артефакты§!, обладающие §0магической энергией§!. Смекалистые и умелые маги могут использовать эти артефакты для усиления собственной мощи, что, собственно, и планируют сделать §YДейбрейкер и Найтмер Мун§!, чтобы разрушить укрывающий Эквестрию §Pщит гармонии§!.\n\nЗахватывайте территории Грифонии, чтобы §Gзаполучить находящиеся на них артефакты§!. Как только будет достигнут уровень в §Y10,000 магической энергии§!, фокус на атаку Эквестрии будет разблокирован. Впрочем, стоит быть осторожным: прежняя родина §Rявно не оценит такой поступок§!, поэтому стоит предварительно §Cхорошо подготовиться и заполучить как можно больше энергии§!..."
EQS_ED_artefacts_mechanic:0 "Поиск артефактов"
EQS_ED_artefacts_mechanic_desc:0 "По всему миру в укромных уголках спрятаны §Yмощные артефакты§!, обладающие §0магической энергией§!. Смекалистые и умелые маги могут использовать эти артефакты для усиления собственной мощи, что, собственно, и планируют сделать §YДейбрейкер и Найтмер Мун§!, чтобы разрушить укрывающий Эквестрию §Pщит гармонии§!. В ответ на это чрезвычайный совет постановил, что необходимо §Yпойти на опережение§! в надежде на то, что это поможет §Gостановить§! амбиции злых диархов.\n\nЗанимайтесь поиском артефактов как в Эквестрии, так и за её пределами, чтобы собрать как можно больше магической энергии. Как только падшие аликорны неизбежно атакуют, возможность §Yпротивостоять§! их магии будет незаменимым подспорьем, §Gи чем больше мы соберём артефактов, тем лучше§!.\n\nНа данный момент количество единовременно доступных нам археологических экспедиций – §Y[?ROOT.max_excavation_projects]§!, из которых в процессе находится §Y[?ROOT.current_excavation_projects]§!.\n\n[EQS_ED_artefact_research_dyn]"
EQS_ED_artefact_research_desc:0 "§YПоиски артефактов§! разблокированы. Начните раскопки артефакта, кликнув по нему. Каждая конкретная экспедиция может быть отправлена только один раз."
