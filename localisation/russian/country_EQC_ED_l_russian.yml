EQS_sabotage_mechanic_decisions:0 "Саботаж Соправительства изнутри"
EQS_sabotage_mechanic_decisions_desc:0 "В ходе удивительного стечения обстоятельств, Джет Сет, монарший секретарь Дейбрейкер и Найтмер Мун, сам предложил нам саботировать их правительство. Благодаря своему положению, он может эффективно мешать их деятельности, однако любая подобная попытка может нарушить хрупкое равновесие между двумя монархами. Поэтому он ограничится куда более скромными и незаметными операциями, которые в правильных копытах всё равно могут сыграть важную роль.\n\nТем не менее, главное во всей этой затее то, чтобы о двойной роли Джет Сета никто и ни за что не узнал. Если диархам станет известно о его измене, пони не только ждёт страшная участь, но и без того, кто худо бедно поддерживает мир между аликорнами, произойдёт катастрофа...\n\nТекущий уровень подозрений по отношению к Джет Сету – [EQS_ED_sabotage_jetset_compromised_dyn]"
EQS_ED_jetset_is_fine:0 "§Gвне подозрений§!."
EQS_ED_jetset_is_not_fine:0 "§Rпод угрозой§!. Повторное достижение подозрительности до 100 повлечёт §Rжуткие последствия§!."
EQS_ED_alter_construction_plans:0 "Подменить чертежи"
EQS_ED_alter_construction_plans_desc:0 "Вы что, совсем с ума сошли? Переверните чертёж, кретины!"
EQS_ED_bureaucratic_errors:0 "Бюрократические ошибки"
EQS_ED_bureaucratic_errors_desc:0 "Уважаемый, сначала вам надо заполнить форму 23-Б, затем получить допуски А-12, А-31 и С-21. Затем вам нужно получить одобрение Её Высочества – не путайте с Её Высочеством! И только потом прийти сюда."
EQS_ED_fake_military_orders:0 "Фальшивые военные приказы"
EQS_ED_fake_military_orders_desc:0 "Всегда знал, что наша подготовка рассчитана на то, чтобы весь день маршировать взад-вперёд по плацу."
EQS_ED_wrong_weapon_manufacturing_plans:0 "Неправильные производственные планы"
EQS_ED_wrong_weapon_manufacturing_plans_desc:0 "Вы думаете, я поверю вашим оправданиям?! Вот она, правда – вы перепутали производственный план. Стоимость материалов будет вычтена из вашего жалования, и вы будете работать здесь 24 часа, потому что вам потребуется именно столько времени, чтобы выполнить план, который вы должны были выполнить изначально!"
EQS_ED_manual_landscape_change:0 "Дать разные поручения стратегам"
EQS_ED_manual_landscape_change_desc:0 "Пока противник рисует карты наступления, мы меняем ландшафты, причём копытами. Когда приходит время атаки, противник теряется на незнакомой местности и приходит в полную небоеготовность. В этом смысл, в этом наша стратегия."
EQS_ED_weather_manipulation:0 "Накладки в погодном графике"
EQS_ED_weather_manipulation_desc:0 "Люблю грозу в начале мая, но не когда в разгаре лета метель, не знавшая завета, июльский полдень застилает."
EQS_ED_invite_refugees:0 "Принять беженцев из страны [FROM.GetNameDefCap]"

# Griffonian puppets (EQC)
EQC_ED_AF_puppets:0 "Establishment Of Griffonian Subjects"
EQC_ED_AF_puppets_desc:0 "With Our inevitable victory, the need to reorganize Griffonia into proper governorships is rapidly approaching. While these lands shall still remain under Our purview, We simply cannot be everywhere at once. Local collaborators who have seen the light shall be empowered in Our name, allowing us to more efficiently rule Our new territories as they adjust to their new reality."
EQC_ED_AF_new_prance:0 "Establish The Condominium Of New Prance"
EQC_ED_AF_hertlands_decision:0 "Establish The Imperial Heartlands"
EQC_ED_AF_skyfall_decision:0 "Establish The Special Investment Zone"
EQC_ED_AF_rumare_decision:0 "Establish The Rumare Testing Grounds"
EQC_ED_AF_everfrost:0 "Establish The Everfrost Autonomous Zone"
EQC_ED_AF_vartai:0 "Establish The Great Gate"
EQC_ED_AF_sicameon:0 "Establish The South Griffonia Naval Garrison"
EQC_ED_AF_evi:0 "Establish The Bountiful Fields"
EQC_ED_AF_austurland:0 "Establish The Broken Coast Governorate"
EQC_ED_AF_riverlands:0 "Establish The Almighty Equine Realm"
EQC_ED_AF_hillpony:0 "Establish The Holy Domain Of Beorgfordas"
EQC_ED_AF_dread:0 "Establish The Northern Outpost"
EQC_ED_AF_holy_sites:0 "Destruction Of Heretical Sites"
EQC_ED_AF_holy_sites_desc:0 "Scattered across Griffonia lies sites dedicated to their false gods. While in centuries past, We may have been content to allow these false idols to exist, Our return has occurred, and it is time that the record be set straight. Graven images of falsehoods shall not stand, the entire world shall know Our divinity. And it starts in Griffonia."
EQC_ED_AF_destroy_temple_arcturius:0 "Destroy The Grand Temple of Arcturius"
EQC_ED_AF_destroy_temple_arcturius_desc:0 "Legends say that Arcturius was the god who gave griffons strength. Well if he did, it was evidently not enough. To punish his failure, we shall tear down his grand temple and erect in its place something more befitting Our glory."
EQC_ED_AF_destroy_temple_eyr:0 "Destroy The Grand Temple of Eyr"
EQC_ED_AF_destroy_temple_eyr_desc:0 "It would seem that the Giver of Kin was unable to forge bonds stronger than those of Ourselves and Our subjects. Perhaps if she had been better at her job, the griffons would have fought on longer in the name of their families. Alas, she did not, and now they stand before one who can. As their new family, We ill need a temple of dedicated to a failure."
EQC_ED_AF_destroy_temple_boreas:0 "Destroy The Grand Temple of Boreas"
EQC_ED_AF_destroy_temple_boreas_desc:0 "Perhaps in times long past, the wisdom of Boreas was greater than it is now. Unfortunately, this vaunted wisdom has become preciously scarce in recent times, with the griffons seemingly unable to cooperate even with an existential threat on their doorstep. But Boreas' squandering shall be Our benefit. As the nail in the coffin of Boreas' Light, his temple shall be removed in a spectacular lightshow."
EQC_ED_AF_destroy_temple_eviliana:0 "Destroy The Grand Temple of Eviliana"
EQC_ED_AF_destroy_temple_eviliana_desc:0 "The rivers of Griffonia provided the lifeblood for many a civilization. Entire nations have been founded on the rivers that the heathens thought were blessed by Eviliana. The rivers they thought would bring them life have only brought us forth to deliver unto them death, or, should they see the truth of Our splendor, their true lives."
EQC_ED_AF_racial_research:0 "Specialized Racial Research"
EQC_ED_AF_racial_research_desc:0 "As the Empire continues to grow, so too does the list of our subjects. With the wide variety of abilities available to them, it would behoove us to ensure that they all see their proper use."
EQC_ED_AF_dog_research:0 "Further Improve Ironpaw Technology"
EQC_ED_AF_dog_research_desc:0 "The Ironpaws are a unit that excel at seizing a position and fortifying it, no matter how rough the terrain. They shall be the imperial fist, gaining Us a foothold wherever ordered and holding the line until reinforcements arrive."
EQC_ED_AF_griffon_research:0 "Further Improve Knight Technology"
EQC_ED_AF_griffon_research_desc:0 "Griffon knights serve the role of an armored infantrygriff, creating a middle point between a proper armored vehicle and normal infantry. With careful deployment, these forces can be used to in close quarters fighting to clear out enemy positions at a much lower cost than if We relied on unarmored infantry instead."
EQC_ED_AF_research_enchanted_tools_tech:0 "Research Enchanted Tools"
EQC_ED_AF_research_enchanted_tools_tech_desc:0 "While they do not have magic like Our pony subjects, the griffons have managed to make do in quite ingenious ways. Chief of these is the utilization of enchanted tools, which work more efficiently than their normal counterparts. There is no reason this can not be integrated into Our efforts, for a good idea is a good idea, regardless of the source."

