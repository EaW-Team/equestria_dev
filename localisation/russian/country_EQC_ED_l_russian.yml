#### EVENTS

evildiarchy_newmareland.1.t:0 "Незваный гость"
evildiarchy_newmareland.1.d:0 "В кабинете Отэм Бриза царила тишина, которую лишь изредка нарушал шелест бумаги. Подготовка к операции "Муншайн" шла полным ходом, и для уверенного достижения успеха требовалось поистине ошеломляющее количество бумажной работы. Агенты были внедрены в Эквестрию, сети связи налажены или восстановлены, а план действий уже получил одобрение Легионерского совета. И всё же работы оставалось невпроворот.\n\nВнезапный порыв ветра заставил его поднять взгляд. Посреди кабинета стояло существо в капюшоне, возникшее словно из ниоткуда. Чёрный плащ полностью скрывал личность незнакомца. Отэм Бриз не мог не заметить сходства с тем, как в жеребячьих сказках изображают мрачного жнеца, но жеребец был воителем и не намеревался пугаться гостя из страшных историй.\n\n— Что тебе нужно? — прорычал он. — И как ты попал в мой кабинет? Я что, забыл убрать коврик с надписью "Добро пожаловать"?\n\nСущество не шелохнулось, но ответило весьма медленно и неестественно, будто стараясь не выдать свой настоящий голос: — Ваш план обречён. Луна не превратится в вашу богиню лишь от того, что вы подорвёте под ней бомбу, — Отэм Бриз прижал уши, но существо осталось невозмутимым. — У меня есть более действенное предложение. Прими его, и операция "Муншайн" увенчается успехом.\n\n— Что ты предлагаешь? И что хочешь в ответ? — ответил воитель, прищурив глаза.\n\nСущество мрачно фыркнуло и извлекло из-под капюшона маленький флакон – впечатляюще ловко, не обнажив ни дюйма передней ноги. — Это магическая субстанция, которая возносит любого аликорна до истинной, наиболее могущественной формы. Используй зелье с умом, ибо, как видишь, его совсем немного, — после короткой паузы гость продолжил. — Что же до моей цены... её заплатишь не ты и не Хироптерра. Действуй осторожно. Я верю в тебя. А теперь, — существо склонило голову, — прощай.\n\nПрежде чем Отэм Бриз успел что-либо ответить, незнакомец поставил флакон на стол. Воитель вскочил, чтобы задержать незваного гостя, но к тому моменту, как он обогнул стол, фигура уже бесшумно открыла дверь и покинула кабинет. Отэм выбежал в коридор, но незнакомца нигде не было.\n\nНикто другой в здании не видел даже тени, так что ему не оставалось ничего другого, кроме как вернуться в кабинет. Флакон всё так же лежал на столе, а эссенция мерцала ярким сине-фиолетовым светом."
evildiarchy_newmareland.1.a:0 "Так, как же мы воспользуемся этим?"

evildiarchy_newmareland.2.t:0 "Смена планов"
evildiarchy_newmareland.2.d:0 "Легионерский совет на удивление быстро одобрил новый план. Даже слишком быстро, на вкус Отэм Бриза. Они не видели того странного существа... Но нельзя было отрицать, что новый план казался куда более надёжным и менее зависящим от воли случая.\n\nКогда в распоряжении Хироптерры оказался магический флакон, способный превратить Луну обратно в Найтмер Мун, всё остальное стало делом техники. Совет решил не пытаться внедрить агента в замок Кантерлота – это было бы слишком дерзко, учитывая количество находящихся там магов. Вместо этого принцессе передадут поддельный отчёт, вызывающий её в Новый Мейрленд по просьбе местных фестралов. Затем агент незаметно подмешает магическое зелье в её напиток, и вскоре после этого, если флакон сработает, в мире станет одной принцессой меньше и одной императрицей больше.\n\nБлагодаря сети осведомителей, изначально подготовленной для операции "Муншайн", состряпать фальшивый отчёт о фестралах Нового Мейрленда оказалось проще простого. Этим вечером Отэм Бриз должен встретиться с агентом, выбранным для применения зелья. Но сколько бы он ни перечитывал план, его не покидало странное чувство. Казалось, он и совет что-то упустили, но он никак не мог понять, что именно.\n\nМагический флакон всё так же стоял на его столе, и жидкость в нём переливалась сине-фиолетовым цветом. Присмотревшись, он заметил кружащиеся внутри крошечные яркие искры. Кто сварил это зелье? И кем на самом деле было то существо в капюшоне? И главное – сработает ли оно так, как было обещано?"
evildiarchy_newmareland.2.a:0 "Теперь нам остаётся только ждать и надеяться."

evildiarchy_newmareland.3.t:0 "Проблемы в Новом Мейрленде"
evildiarchy_newmareland.3.d:0 "— Луна, ты уверена в этом? — спросила Селестия, наблюдая, как её сестра бродит по своим покоям в Кантерлотском замке, постепенно собирая багаж.\n\n— Абсолютно. Ситуация в Новом Мейрленде гораздо хуже, чем я могла себе представить, — ответила та, даже не взглянув на Селестию. — Фестралы Нового Мейрленда столкнулись с неслыханным кризисом. Я обязана лично во всём разобраться и появиться на публике.\n\nОднако слова Луны ничуть не уняли беспокойства Селестии. Хотя Новый Мейрленд обладал очень высокой независимостью во внутренних делах, она не могла припомнить ни единого инцидента, который мог бы намекать на подобное положение дел. В конце концов, в Новом Мейрленде жило не так много фестралов, да и многие исторические причины, вызывавшие трения в Эквестрии, там напрочь отсутствовали.\n\nКонечно, Селестия была далеко не безгрешна, и вполне допускала, что всё же могла проглядеть назревающий кризис. Она видела отчёт и у неё не было причин сомневаться в нём. Источник был надёжным, а изложенные факты – вполне логичными, хоть и неожиданными. Игнорирование ситуации могло привести к весьма мрачным последствиям, поэтому она понимала настойчивость Луны. И всё же... у Селестии было дурное предчувствие.\n\nОна вздохнула. — Луна, как думаешь, можешь отложить поездку ещё на один день? — Луна наконец обернулась. В её взгляде читалось одновременно замешательство и негодование. — Я бы хотела поехать с тобой, но мне нужно уладить кое-какие дела с Рэйвен перед отъездом.\n\n— Сестра? — глаза Луны расширились. — Ты это серьёзно?"
evildiarchy_newmareland.3.a:0 "— Разумеется. Мы должны решать такие вопросы сообща."
evildiarchy_newmareland.3.b:0 "Будет мудро последовать за ними."

evildiarchy_newmareland.4.t:0 "Принцессы посещают Новый Мейрленд"
evildiarchy_newmareland.4.d:0 "Удивительные новости разлетелись со скоростью молнии: Селестия и Луна, правящие принцессы Эквестрии, отправляются в Новый Мейрленд. Ходят слухи, что их вызвало местное правительство после получения крайне тревожных сообщений о прискорбном положении фестралов в эквестрийской колонии. Визит, судя по всему, продлится всего неделю, ведь присутствие обеих сестёр наверняка позволит быстро разрешить ситуацию. Тем не менее, впервые в известной истории оба аликорна покинули Эквестрию. Вдобавок это первый раз, когда они посетят Грифонию."
evildiarchy_newmareland.4.a:0 "Принцессы в Новом Мейрленде? Мне нужно это увидеть!"
evildiarchy_newmareland.4.b:0 "Но как же Эквестрия?"
evildiarchy_newmareland.4.c:0 "Интересно, но нас это не касается."
evildiarchy_newmareland.4.c_tt:0 "§RИграть за любую страну в Эквусе, кроме Эквестрии, во время нынешнего первого апреля не рекомендуется.§!"
evildiarchy_newmareland.4.e:0 "Подождите, что? Кто именно их вызвал?"
evildiarchy_newmareland.4.f:0 "ОБА аликорна? Но ведь только Луна... Нужно немедленно во всём разобраться!"
evildiarchy_newmareland.4.g:0 "Это не по плану. Будем надеяться, что всё пройдёт гладко."

evildiarchy_newmareland.5.t:0 "Чай с сюрпризом"
evildiarchy_newmareland.5.d:0 "Ранним утром, сразу на следующий день после прибытия в Новый Мейрленд, Селестия и Луна немедленно затребовали аудиенцию у Джет Сета. К вящему разочарованию Луны, губернатор ничего не знал о ситуации, описанной в отчёте, который Луна перечитывала столько раз, что выучила наизусть. Он ничего не слышал ни о конфискациях, ни тем более о внесудебных казнях фестралов.\n\nСелестии пришлось использовать весь свой многовековой дипломатический опыт, чтобы удержать гнев сестры под контролем, пока они не разберутся, что тут происходит на самом деле. После часа крайне напряжённых обсуждений было решено, что все трое лично расследуют факты, изложенные в отчёте. Хотя основной эмоцией после встречи было недоумение, это лишь усилило тревогу Селестии.\n\nЗатем принцессы вернулись в свои апартаменты в отеле с намерением перевести дух, в то время как Джет Сет отправился подстраивать свой график под их расследование.\n\nЛуна не стала сразу садиться на диван рядом с Селестией, предложив вместо этого заварить чай. Потом она вернулась, присела за низкий столик и вздохнула: — Хорошие новости, сестра, здесь есть кофе, — поймав на себе прищуренный взгляд Селестии, она улыбнулась. — Не волнуйся, тебе я всё равно заварю чай.\n\n— Никогда не пойму, как ты пьёшь эту горькую гадость, Луна, — усмехнулась та, — но спасибо за чай, — сестра лишь кивнула в ответ.\n\nТем временем на кухне пребывающая в крайнем замешательстве шпионка-фестралка никак не могла решить, куда вылить содержимое своего флакона: в чайник или в вингбардийскую джезву. После мучительных колебаний она разделила зелье пополам между обоими сосудами и поскорее ретировалась.\n\nКак только чайник засвистел, Селестия зашла на кухню, заварила себе чай и налила Луне чашку кофе, после чего вернулась на диван. Чай Селестии оказался чуть слаще, чем ожидалось, но после такого непростого утра она не придала этому значения. Однако по её спине пробежал холодок, когда Луна спросила: — Сестра, зачем ты добавила сахар? Я же говорила, что пью чёрный кофе, — обе принцессы оцепенели, начиная понимать, что что-то тут не так."
evildiarchy_newmareland.5.a:0 "Но мир перед их глазами стал меркнуть."

evildiarchy_newmareland.6.t:0 "Вознесение"
evildiarchy_newmareland.6.d:0 "Магические потоки вырвались из Селестии и Луны – ослепительно белые и угольно-чёрные соответственно – оторвав их от пола и заключив в плотные сферы. Спустя мгновение шерсть Луны окрасилась в цвет полуночи, а грива Селестии вспыхнула, яростно трепеща на эфирном ветру.\n\nПотребовалось всего несколько секунд, чтобы их истинная мощь полностью высвободилась, после магические вихри утихли так же быстро, как и возникли. В следующее мгновение пламенные зрачки Дейбрейкер встретились с вертикальными зрачками Найтмер Мун. Оба аликорна отступили на шаг, опуская головы и направляя рога друг на друга, концентрируя разрушительную силу.\n\n— Ты! Что ты здесь делаешь? — выкрикнула Найтмер Мун.\n\n— Всё такая же вспыльчивая, не правда ли? — несмотря на насмешливый тон, Дейбрейкер оставалась начеку, следя за каждым движением своей противницы. — Отвечая на твой вопрос: не знаю. Полагаю, у тебя самой идей не больше?\n\n— Нет, но я не собираюсь попадаться на твои уловки, — тем не менее, Найтмер не нанесла удар первой.\n\nДейбрейкер закатила глаза. — Сестра, умоляю тебя. Мы обе знаем: если бы я хотела уничтожить тебя, то просто это сделала. В отличие от тебя, мне нет нужды играть в глупые игры.\n\nНайтмер сузила глаза, обнажив клыки, но вовремя осознала, что в этих словах есть доля правды. Желай того Дейбрейкер, она бы уже напала. По правде говоря, у Найтмер Мун тоже не было причин для драки. — Тебе повезло, что я готова проигнорировать этот выпад, ибо тоже не ищу бессмысленной битвы. Но ни на секунду не думай, будто я ослаблю бдительность.\n\n— И в мыслях не было, — Дейбрейкер улыбнулась. — Ох, никогда бы не подумала, что заключу перемирие именно с тобой, но это может сработать."
evildiarchy_newmareland.6.a:0 "Теперь они на одной стороне?"

evildiarchy_newmareland.7.t: "Новое назначение Джет Сета"
evildiarchy_newmareland.7.d: "Добрую половину минуты Джет Сет не находил в себе сил даже на вдох. Он лишь беспомощно взирал на двух аликорнов, чьи фигуры возвышались над ним.\n\n— Как?.. Когда?.. — наконец выдавил он, чувствуя, как предательски пересохло в горле.\n\n— Нам это неведомо, — отозвалась Найтмер Мун. — Мы лишь ведаем, что отринули ничтожные, сковывающие нас оболочки. Мы оставили их в прошлом, дабы вознестись и обрести своё истинное, вечное естество.\n\nДжет Сет не имел ни малейшего представления, как реагировать на подобные метаморфозы. Впрочем, тот факт, что его до сих пор не испепелили, вероятно, следовало считать хорошим знаком.\n\n— Полагаю, ты изнываешь от желания узнать, зачем мы вызвали тебя к себе, — с ленивой, хищной ухмылкой произнесла Дейбрейкер. — На самом деле всё предельно просто.\n\nОна выдержала театральную паузу, наслаждаясь тем, как её слова тяжёлым жаром повисли в воздухе, но была бесцеремонно прервана сестрой.\n— Нам потребен секретарь, — отчеканила Найтмер. — Ибо отныне бразды правления Новым Мейрлендом переходят в наши копыта.\n\nВ голове Джет Сета роем закружились вопросы, один тревожнее другого. Почему именно Новый Мейрленд? Почему бы им не вернуться в Эквестрию? Неужели им и впрямь так нужна власть? Впрочем, инстинкт самосохранения заставил его оставить эти мысли при себе.\n\nТем временем Дейбрейкер, бросив на сестру взгляд, полный высокомерного раздражения, картинно закатила глаза:\n— Обязательно было портить такой момент?\n\nНайтмер ответила ледяным взором:\n— Я лишь полагаю, сестра, что сейчас нет ни малейшей нужды в дешёвом лицедействе. Пред нами стоят задачи, чей масштаб превышает твои сценические амбиции.\n\n— Напомни-ка мне, сестрица, — голос Дейбрейкер так и сочился сарказмом, — с чего я вообще решила, что союз с тобой – это хорошая идея?\n\nВновь ведомый лишь отчаянным желанием выжить, Джет Сет робко прочистил горло, пытаясь унять дрожь:\n— П-прошу прощения, Ваше Солнечное... э-э... Лунное... Прошу прощения, что прерываю вас. Не собирались ли вы поручить мне поиск подходящих кандидатов на должность секретаря? Я немедленно составлю список...\n\n— О, это... — Дейбрейкер вновь хищно улыбнулась. — Боюсь, ты неверно истолковал наши намерения."
evildiarchy_newmareland.7.a: "— Ты, Джет Сет. Именно ты станешь нашим секретарём."

evildiarchy_newmareland.8.t: "«Останки» конгресса"
evildiarchy_newmareland.8.d: "Сегодня состоялась инаугурация новых членов конгресса, отобранных, разумеется, лично сёстрами-аликорнами. Многих из них я знаю в лицо, и именно это пугает меня сильнее всего. Среди назначенных есть пони, слишком мягкие для подобных кресел – из тех, что склонны соглашаться с чем угодно. Хватает и молодых, амбициозных карьеристов, готовых расшибить голову о мраморный пол, лишь бы заслужить одобрительный кивок сверху. Есть и совершенно откровенные взяточники. Но даже те, кто не вписывается в эти категории, слишком дорожат своим положением, чтобы рискнуть и открыто пойти против сестёр.\n\nТакие политики – неизбежная плесень на теле любого государства, но в подлинный ужас меня приводит иное. Аликорны методично выкорчевали каждого пони, кто был готов хоть слово сказать против них, заменив всех недовольных послушными «кивалами», чья единственная задача состоит в том, чтобы бездумно утверждать всё, что им подсунут. Слабым утешением служит лишь то, что конгресс всё ещё существует. Сомневаюсь, что в нынешнем виде он принесёт хоть каплю пользы, но мне приходится цепляться за любую соломинку. В конце концов, даже затупившийся инструмент можно заточить заново.\n\nПо крайней мере, я пытаюсь себя в этом убедить. По нашей демократии был нанесён тяжелейший удар; это мрачное предзнаменование того, что дальше будет только хуже. Эти двое поглощают и централизуют власть с пугающей скоростью, а я вынужден исполнять этот хрупкий и опасный танец на канате. Стоит мне из кожи вон вылезти, чтобы осадить одну из сестёр, я обязан разыграть целый спектакль, столь же рьяно ограничивая вторую. А если я буду слишком усердствовать, то они просто от меня избавятся. Какая прелесть..."
evildiarchy_newmareland.8.a: "Со вздохом Джет Сет отложил перо и закрыл дневник."

evildiarchy_newmareland.9.t: "Словно его и не было"
evildiarchy_newmareland.9.d: "[GetDateStringNoHourLong]\n\nВсё-таки это случилось. Каждый раз, когда мне начинает казаться, будто я мало-мальски привык к ситуации, реальность выбивает почву у меня из-под копыт. Сегодня конгресс был официально распущен. Я знал об этом задолго до публикации указа. Видит Тартар, я сам приложил к этому копыто. Но по-настоящему осознал масштаб содеянного только сейчас.\n\nПока шёл процесс, я твердил себе, что конгресс всё равно ничего бы не решил – не с этими двумя во главе государства. Но теперь, когда его окончательно не стало, я чувствую, что лишь отчаянно пытался отыскать хоть какое-то подобие утешения. Правда в том, что конгресс, по крайней мере, позволял нам сохранять видимость стабильности или законности.\n\nТеперь всё иначе: все знают, чего эти двое хотят на самом деле. Пони напуганы, а напуганные пони принимают эгоистичные решения. Я не могу их винить, но мне до смерти страшно представить, что будет, когда всё начнёт рушиться. Хуже того, я даже не беспокоюсь о судьбах обывателей – по крайней мере, не напрямую. Признаться честно, я просто боюсь того, что случится, если аликорны не получат своего. Делает ли это меня бессердечным? Имею ли я вообще право судить о таких вещах?\n\nКакая-то часть меня готова ответить на это «да». В конце концов, если сёстры испепелят нас всех в пылу мелкой семейной склоки, вопрос о стабильности отпадёт сам собой. С другой стороны, совершенно неважно, что я думаю. Я бессилен их остановить. Я могу лишь выигрывать время для тех, кто на это способен. Если бы только эти мысли перестали лишать меня сна по ночам..."
evildiarchy_newmareland.9.a: "Со вздохом Джет Сет отложил перо и закрыл дневник."

evildiarchy_newmareland.10.t: "Веские слова"
evildiarchy_newmareland.10.d: "— Вы желали видеть меня, Ваше Величество? — произнёс Джет Сет, осторожно приоткрыв дверь в новый кабинет Дейбрейкер.\n\nЕго не покидало дурное предчувствие. Впрочем, как и всегда.\n— Да. У меня созрел план... Я решила, как нам поступить с местными гармонистами.\n\nДейбрейкер издала тихий, едва слышный смешок, от которого сердце Джет Сета пропустило удар, а по спине пробежал холодок.\n\n«Неужели она решилась на... самое худшее?» — пронеслось у него в голове.\nПриказав себе сохранять лицо, он осторожно уточнил:\n— Каков ваш дальнейший замысел, Ваше Величество?\n\nДейбрейкер усмехнулась, и в её глазах, сияющих подобно двум сверхновым, промелькнуло издевательское сочувствие. Его страх явно её забавлял.\n— Я поговорю с ними. Лично.\n\nДжет Сет невольно выдохнул. Это... это было куда лучше, чем он смел надеяться.\n— Я немедленно распоряжусь о встрече, — быстро проговорил он, будто опасаясь, что малейшее промедление заставит её передумать. — В котором часу прикажете созвать делегацию?\n\n— О... — её улыбка стала шире, обнажая зубы в хищном оскале. — Полагаю, полдень подойдёт идеально. Это поможет им во всех красках осознать, чем именно они рискуют, отказываясь подчиниться.\n\nВот оно что. В этом и заключался подвох. Она заставит их либо играть по её правилам, либо исчезнуть навсегда. Иного и не стоило ждать от эгоцентричного, всемогущего и глубоко порочного аликорна."
evildiarchy_newmareland.10.a: "— Слушаюсь."

evildiarchy_newmareland.11.t: "Простейшее решение в мире"
evildiarchy_newmareland.11.d: "— И ещё кое-что, Ваше Величество, — заметил Джет Сет, едва касаясь пером последнего пункта в своём перечне. — Партия гармонистов исконно обладала немалым весом в Новом Мейрленде.\n\nОт того, что он преподносил это как нейтральный факт, желудок сжался в тугой, болезненный комок.\n\n— Они уже начали смыкать ряды, формируя оппозицию нашему курсу...\n\n— О, отринь свои суетные тревоги. Сей маловажный спор уже обрёл своё завершение, — произнесла Найтмер Мун с безмятежностью самой ночи.\n\n— Что... что именно вы имеете в виду? — Джет Сет всем своим существом не желал слышать ответа, но знал, что обязан спросить.\n\n— Я замышляла вручить тебе сие поручение лишь с приходом солнца, но коль речи твои коснулись их участи...\n\nАликорна отворила один из ящиков стола, и густое сияние магии извлекло оттуда сложенный лист бумаги. Он плавно поплыл по воздуху к Джету. Это был список имён с адресами, начертанными безупречным каллиграфическим почерком.\n\n— Будь же любезен, донеси сию весть до кровных родичей тех изменников, что в ослеплении своём дерзнули восстать против воли нашей.\n\n— Да... конечно...\n\nДжет Сету стоило колоссальных, почти невозможных усилий сохранить на лице маску беспристрастности, хотя к горлу уже подступала тошнота. И чему он удивлялся? Он ведь знал, что всё к этому и шло.\n\nНайтмер одарила его мрачной, певучей усмешкой:\n— Полагаю, ты волен поднести им в дар корзину с каким-нибудь лакомым подношением, дабы сладость угощения умерила горечь их пустых сетований и скрасила часы безвозвратной разлуки.\n\nДжет Сет стиснул зубы так, что челюсть свело судорогой. Ему пришлось собрать всю свою волю, дабы не позволить этой издевательской «шутке» вызвать в воображении живую картину происходящего, потому что даже мысль об этом сломила бы пони."
evildiarchy_newmareland.11.a: "— Будет исполнено, Ваше Величество."

evildiarchy_newmareland.12.t: "Проблеск здравомыслия"
evildiarchy_newmareland.12.d: "В дверь кабинета Джет Сета постучали. Должно быть, это Кэнди Гарден.\n— Войдите, — отозвался он. Отложив ворох отчётов, он жестом пригласил гостью к креслу. — Прошу простить мою поспешность. Признателен, что вы изыскали возможность для встречи в столь сжатые сроки.\n\n— О, пустяки, — ответила она, устраиваясь поудобнее. — Для меня большая честь знать, что мои соображения по реформированию армии удостоились вашего внимания.\n\n— Не стоит быть столь скромной, мисс Гарден. Я бы и не узнал о ваших трудах, если бы о них не отзывались с таким восторгом, — он одарил её искренней улыбкой. — Чем глубже я вникаю в суть ваших предложений, тем сильнее мой интерес. В наши дни трибуны захвачены радикалами, жаждущими мгновенных перемен любой ценой. Вы же, напротив, понимаете, что истинные реформы нуждаются во времени и осторожности.\n\n— Прошу вас, зовите меня просто Кэнди.\n\nОна принялась подробно излагать каждый этап своего плана. Джет Сет изредка вставлял замечания, уточняя технические детали или предлагая косметические правки, но про себя отметил, что эта кобыла из министерства обороны знает своё дело безупречно. Впрочем, саму суть её идей он внутренне отвергал.\n\nВскоре стало предельно ясно, почему диархия благоволит Кэнди: с каждым новым витком её реформ армия, а за ней и всё общество всё теснее опутывались невидимыми нитями зависимости от воли сестёр. И всё же постепенный, вкрадчивый характер этого плана давал пони хоть какую-то возможность свыкнуться с новым положением вещей."
evildiarchy_newmareland.12.a: "Это решение не было идеальным, но оно казалось благом на фоне любых альтернатив."

evildiarchy_newmareland.13.t: "Проблеск не совсем здравомыслия"
evildiarchy_newmareland.13.d: "Когда Аркэйн Нова вошла в кабинет, Джет Сету пришлось приложить немало усилий, чтобы не вздохнуть – он прекрасно знал, к чему всё идёт. Кобыла, если и заметила его досаду, никак её не прокомментировала и просто уселась напротив.\n\n— Доброго дня, Джет Сет, — произнесла она с самодовольной ухмылкой.\n\n— Здравствуйте, мисс Нова. Полагаю, вам уже сообщили о цели нашего разговора? — он решил не тратить время на светские прелюдии, хотя сухой тон и претил его натуре. Джет Сет гордился своим умением встречать каждого пони с одинаковым радушием, но сейчас маска «доброго секретаря» сидела на нём скверно: слишком уж много доносов и сводок он успел прочесть об этой кобыле.\n\n— Разумеется. Её Божественное Величество Дейбрейкер избрала меня своим мечом для надзора за военными реформами, — улыбка Новы мгновенно сменилась гримасой брезгливости. — Впрочем, скажу прямо: я в ярости от того, что мне придётся работать бок о бок с этой Найтмер и её безумным сбродом сектантов.\n\nДжет Сет всё-таки не выдержал и прикрыл глаза. Что ж, по крайней мере, она сама избавила его от необходимости поднимать эту тему.\n\n— Мисс Нова, я не вправе диктовать вам, кому из наших правительниц отдавать своё сердце, но прошу... на мгновение задумайтесь о том, чего желает сама Её Величество, — он сделал паузу, поймав её заинтригованный, колючий взгляд. — Её Величество Дейбрейкер лично скрепила союз с Найтмер Мун. Как вы думаете, придётся ли ей по нраву, если её верный офицер начнёт сеять смуту и ставить под сомнение мудрость её выбора?\n\nЭто была чистой воды импровизация: Дейбрейкер вряд ли заботили чувства подчинённых, но только взывая к фанатичной преданности, он мог удержать Нову в узде.\n\nАркэйн, разумеется, и не подумала скрывать своего раздражения.\n— Поняла вас. Буду работать с тем материалом, что есть в наличии, — она картинно закатила глаза, выплёвывая слова. — Даже если это означает, что мне придётся терпеть этих... «найтмеристов».\n\nОна подалась вперёд, и её взгляд стал по-деловому жёстким:\n— В любом случае, полагаю, нам есть что обсудить по существу.\n\nХотя остаток беседы прошёл внешне благопристойно, Джет Сет не мог отделаться от липкого чувства тревоги. Идеи Новы были просты, эффективны и разрушительны, как пушечный залп. В её мире не было места компромиссам – только победа или смерть."
evildiarchy_newmareland.13.a: "Похоже, его возможности по «сглаживанию углов» оказались небезграничны."

evildiarchy_newmareland.14.t: "Конец маскарада"
evildiarchy_newmareland.14.d: "Аликорны повздорили вновь. К этому моменту Джет Сет уже почти ничего не чувствовал – то ли привык, то ли липкий страх вытеснил все остальные мысли. Он предпринял отчаянную попытку вмешаться, надеясь робким словом отвлечь сестёр от бездны, но лишь навлек на себя гнев обеих разом – и аликорны с удвоенным пылом вернулись к своей ядовитой перепалке.\n\n— Знаешь... — процедила Дейбрейкер, — я часто гадаю, сколь большего я бы достигла, если бы не твоя вечная жажда внимания. Это живо напоминает мне, почему в старые добрые времена я держала тебя в тени.\n\nСердце Джет Сета пропустило удар. Найтмер Мун вперила в сестру испепеляющий взор. В наступившей тишине было слышно, как пролетает муха.\n\n— Довольно! — взревела она, и её рог начал окутываться пугающим количеством магии. — Не ведаю, как могла я помыслить, будто из сего союза воссияет нечто достойное! Слеп был мой взор, когда я верила тебе!\n\nДжет Сет ласточкой нырнул за массивный письменный стол – как раз вовремя, чтобы его не посекло каменным градом от разлетающейся в пыль стены. Рискнув высунуть голову, он увидел, как Дейбрейкер с картинным пренебрежением погасила магический щит.\n\n— О, умоляю тебя. Не делай вид, будто это моя вина, когда мы обе знаем: если бы ты хоть на миг усмирила свою гордыню... — ей пришлось вскинуть новую преграду, чтобы отразить яростный, как звёздный сполох, залп сестры. — Ну началось...\n\n— Ты никогда и ничего не воспринимаешь всерьёз! — Найтмер топнула по полу, с лёгкостью кроша мраморные плиты. — Единственное поприще, где ты не жалеешь усилий, – сие есть подрыв моего авторитета!\n\nДейбрейкер издевательски фыркнула:\n— Как будто там есть что подрывать.\n\nС ледяной ухмылкой она уклонилась от луча, даже не удостоив сестру взглядом. Секундой позже ей едва удалось отразить ответный удар, едва не опаливший крыло. Стиснув зубы, она пробормотала:\n\n— Ну хорошо. Да будет по-твоему.\n\nВспышка. Температура в кабинете мгновенно подскочила, воздух сделался сухим и горьким – залп Дейбрейкер превратил камень за спиной Найтмер Мун в раскалённую лаву.\n\nКогда рухнула очередная стена, открывая вид на онемевший город, аликорны в мгновение ока исчезли в небесах. Джет Сет остался один в руинах своего кабинета; он в панике прислушивался к тому, как грохот взрывов сотрясает соседние здания."
evildiarchy_newmareland.14.a: "Если бы только всё сложилось иначе..."

evildiarchy_newmareland.15.t:0 "Наконец-то хорошие новости"
evildiarchy_newmareland.15.d:0 "Джет Сет вздохнул, и на его лице заиграла довольная улыбка. Прямо перед ним дюжина стражников под конвоем выводила из здания Пикет Фенса вместе с его прихвостнями. Джет Сет жалел лишь о том, что не сделал этого раньше. Он не противостоял Пикет Фенсу так решительно, как следовало бы, и ничего не предпринимал, чтобы обуздать ту ненависть к грифонам, на волне которой лидер партии и пришёл к власти.\n\nС другой стороны, методы самого Джет Сета были бы куда более изящными и, вероятно, принесли бы куда меньше удовлетворения. А может, как раз дополнительные усилия сделали бы финал ещё слаще.\n\nТак или иначе, Пикет Фенс наконец-то лишился всяческой власти, и впервые с момента появления злых сестёр Джет Сет по-настоящему гордился своими действиями. Ему не нужно было убеждать себя в том, что он поступает правильно; он это просто знал."
evildiarchy_newmareland.15.a:0 "Если бы только не пара безумных аликорнов..."

evildiarchy_newmareland.16.t:0 "Встреча с "пророком""
evildiarchy_newmareland.16.d:0 "Джет Сету стоило огромных усилий не стиснуть зубы. — Мистер Дью, — произнёс он, — я был бы признателен, если бы вы перестали уклоняться от вопросов и уводить разговор в сторону. Давайте наконец перейдём к сути нашей встречи, — Джет Сет пытался обсудить роль, которую Ивнинг Дью, самопровозглашённый пророк Найтмер Мун, будет играть в правительстве, но каждая попытка натыкалась на очередную байку, лирическое отступление или спонтанную тираду.\n\nИвнинг Дью подался вперёд, подпирая голову копытами, и изобразил на редкость ядовитую улыбку. — Раз уж мы заговорили прямо: я отказываюсь обсуждать эти вопросы с вами и требую личной аудиенции у Её Величества Найтмер Мун.\n\nДжет Сет вздохнул, потирая висок. Ну хотя бы Дью наконец решил сбросить маски. — Тогда, полагаю, я тоже был недостаточно ясен. Её Монаршее Величество Найтмер Мун назначила меня своим секретарём по ряду веских причин и поручила мне официально нанять вас в качестве оратора от её имени, — он сделал паузу, пристально глядя на несносного жеребца. — Вы можете принять её решение, поговорить со мной и работать на неё. Или нет. Выбор за вами.\n\nЭти слова наконец стёрли раздражающую ухмылку с лица Ивнинг Дью. — Хорошо, если вы настаиваете на этом в таком тоне. Императрица непременно оценит мой труд, так что я уверен: это не единственный мой шанс, — Джет Сет сдержал желание закатить глаза и уже открыл рот, чтобы ответить, но его перебили. — Нет-нет, не утруждайтесь. Я знаю, чего вы от меня хотите. В конце концов, я и так уже этим занимаюсь.\n\n— Хорошо, тогда позвольте выдвинуть два условия, — Ивнинг Дью вскинул бровь. — Во-первых, вы должны помнить, что императрица решила заключить союз с Дейбрейкер, и вам не следует разжигать ссоры, — теперь пришла очередь Дью закатывать глаза, но он всё же кивнул. — Кроме того, будет неплохо, если вы постараетесь избегать враждебности по отношению к грифонам и...\n\n— Совершенно исключено. Я могу попытаться игнорировать соляристское отребье, но грифоны – враги всего рода пони. И императрица, и... второй аликорн прекрасно об этом знают."
evildiarchy_newmareland.16.a:0 "Что ж, на большее рассчитывать и не стоило."

evildiarchy_newmareland.17.t: "Ожидаемый исход"
evildiarchy_newmareland.17.d: "Взор Найтмер Мун, холодный и неподвижный, замер на Ивнинг Дью. Офицер, приученный не дрожать перед врагом, под этим ледяным сиянием с каждой секундой всё больше терял остатки самообладания.\n\n— Верный мой Ивнинг Дью, — заговорила она наконец. — Я по достоинству ценю рвение твоё, однако до слуха моего долетели известия... прескверного свойства. Увы, недавние распри среди подданных моих стали для меня источником глубокой, неизбывной печали.\n\nОна роняла слова медленно, веско, позволяя каждому из них вонзиться в его сознание ледяной иглой. Офицер растерянно моргнул, не смея поднять головы.\n\n— Ваше Величество... боюсь, я не совсем понимаю. Мне ещё не доводилось слышать о раздорах в кругу ваших верных слуг.\n\n— Не строй из себя невежду, Ивнинг Дью, — отрезала она, и в голосе её лязгнул металл. Найтмер видела, что он говорит искренне, и эта твердолобая убеждённость раздражала её пуще прежнего. — Я веду речь о тех постыдных стычках между грифонами и моими последователями – именно теми, кто привык внимать твоему слову. Быть может, ты и невысокого мнения о грифоньем роде, но и они днесь пребывают под сенью моих крыльев. С какой стати мне отвергать чьё-то служение лишь из-за формы их когтей или перьев?\n\n— Но, Ваше Величество...\n\n— Не утруждай себя речами. Я уповала удержать тебя в узде милостью и поощрениями, но, видимо, то была лишь моя слепая надежда. Ныне я зрю, что в дозволенных... пределах ты удержаться не в силах.\n\n — «И, что прискорбнее, рассудка тебе также недостаёт», — добавила она про себя. — И всё же, ради блага твоего, спрошу я прямо. Если бы я повелела тебе прекратить сей «священный поход» против грифонов, склонил бы ты голову перед волей моей?\n\nК чести Ивнинга Дью, он на мгновение замер, взвешивая верность богине и верность своей ненависти, прежде чем ответить:\n\n— Нет, Ваше Величество. Ни я, ни многие из ваших преданнейших слуг не в силах делить тот благословенный свет, что вы нам даруете, с этими грязными пернатыми тварями, — в наступившей тишине он болезненно поморщился и поспешно добавил: — Но я... пожалуй, мог бы не проявлять свою неприязнь столь открыто.\n\n— Ясно. Надеюсь, ты разумеешь, что сие ставит меня в весьма затруднительное положение? — Дью сглотнул, и по его шее скатилась капля пота. — Ныне я стою пред распутьем: либо срубить сей сорняк под корень, очистив сад мой от скверны, либо и впредь вкушать горькие плоды твоего строптивого нрава. Будь воля моя столь же проста, как взмах крыла, я не тратила бы драгоценные мгновения ночи на пустые речи с тобой. Но, к досаде моей, работаешь ты эффективно.\n\nНайтмер Мун продолжала пристально наблюдать за ним, пока офицер в мучительном ожидании ловил каждое её мимолётное движение. Это не только усиливало бремя его вины, но и давало ей последние мгновения, чтобы вынести окончательный вердикт."
evildiarchy_newmareland.17.a: "— Ты попросту не стоишь сей долгой возни, Ивнинг Дью. Прощай."
evildiarchy_newmareland.17.b: "— Я оставлю тебя при себе, но помни: даже моему терпению есть предел."

evildiarchy_newmareland.18.t:0 "Сломанные часы"
evildiarchy_newmareland.18.d:0 "Джет Сет что-то напевал себе под нос, заполняя документы. Как и любая бумажная волокита, это занятие было невыносимо скучным. Или, по крайней мере, было бы таким в обычные времена. Но сегодня задача ощущалась простой, понятной и однозначно благой: пока ручка выводила всё новые и новые строки, внутренний взор Джет Сета видел, как пони конфискуют счета Ивнинга Дью.\n\nВ теории бумаги следовало оформить ещё до начала самого процесса, но абсолютная власть аликорнов позволила ему сегодня обойти это правило. Какая-то часть души Джет Сета противилась подобным методам, но в конечном итоге это значительно ускорит процесс лишения Ивнинг Дью финансирования и, как следствие, влияния.\n\nПравда, истинная причина этого решения была, по его мнению, далека от идеала. Оно было продиктовано не заботой о тех, кто пострадал от речей и действий этого презренного пони, а простой прагматичной необходимостью: сохранить лояльность подданных-грифонов и не допустить внутренних распрей."
evildiarchy_newmareland.18.a:0 "Даже злые аликорны иногда, пусть и неосознанно, делают что-то хорошее."

evildiarchy_newmareland.19.t: "Уроки врага"
evildiarchy_newmareland.19.d: "Дейбрейкер, Найтмер Мун и Джет Сет возвращались после встречи с двумя на редкость немногословными представителями MARESOC-а. Как и всегда, аликорны не прекращали перебранку.\n\n— Умоляю тебя, сестра, — бросила Дейбрейкер. — Совершенно очевидно, что мы обязаны внедрить эти методы на каждом уровне нашего общества, без малейших исключений.\n\n— Разумеется, нет! — возразила Найтмер Мун, с яростью глядя на соправительницу. — Высшие сословия – наши вернейшие чада – должны чувствовать, что их рвение вознаграждается милостью божественной! Напротив, нам надлежит лишь разжигать рознь между слоями, дабы в распрях своих они не помышляли о большем. Дейбрейкер коротко расхохоталась, чуть отстав. Когда же она увидела, что сестра продолжает сверлить её гневным, мерцающим взором, на её лице отразилась злая, хищная усмешка:\n\n— О, так ты это всерьёз?\n\nПрежде чем богини успели обменяться новыми колкостями, у Джет Сета сработал инстинкт самосохранения.\n\n— Если позволите, Ваши Величества, — обе принцессы замерли, обратив к нему свои лики. — Если я правильно уловил суть, ваши идеи в-вовсе не исключают друг друга. Напротив, они... дополняют этот дивный новый порядок.\n\nСлова казались ему омерзительными, но диархи уже твёрдо вознамерились внедрить отвратительные методы MARESOC-а, так что его вмешательство ничего бы не изменило... верно?\n\nОбе владычицы уставились на него в леденящем молчании. Секретарь с трудом сглотнул.\n\n— Я... я лишь хочу сказать, что вы обе правы. Можно заставить пони внутри каждой касты в-видеть друг в друге смертельных соперников, и при этом щедро вознаграждать их за личную, фанатичную преданность.\n\nИрония ситуации – необходимость мирить тех, кто стоит на самой вершине, пока они спорят, как эффективнее растоптать тех, кто внизу, – не укрылась от него.\n\n— В конце концов, — добавил он, едва сдерживая дрожь, — мифическая «Большая Сестра» – лишь блёклый вымысел, но вы обе исполните эту роль куда лучше, если будете действовать заодно.\n\nПосле недолгой, но леденящей душу тишины их лица смягчились, и они согласно кивнули."
evildiarchy_newmareland.19.a: "Кризис миновал."

evildiarchy_newmareland.20.t: "Осквернённый идеал"
evildiarchy_newmareland.20.d: "— Итак, Блюберри Фрост, — произнесла Дейбрейкер с леденящей душу ухмылкой. — Мне доложили, что в твоём распоряжении имеются идеи, вполне заслуживающие нашего монаршего внимания.\n\nБлюберри с трудом сглотнула, чувствуя, как во рту пересохло. Одно неверное слово – и эта аудиенция станет для неё последней. Она до сих пор не могла осознать, как вообще оказалась здесь, в присутствии не одной, а сразу двух богинь.\n\n— Ответствуй ей, — тон Найтмер Мун заставил кровь в жилах Блюберри заледенеть; она мгновенно вспомнила, что участь её была бы не менее мрачной, осмелься она отклонить приглашение.\n\nСделав судорожный вдох, Блюберри заговорила:\n— О-основная идея, как вам, без сомнения, известно, заключается в том, что все пони должны быть р-равными, — поскольку обе сестры хранили гробовое молчание, она поспешила продолжить: — Пусть это и означает, что нипони не сможет стать великим, ведь... то есть, нипони не сможет несправедливо возвыситься н-над остальными.\n\nПервой отозвалась Найтмер Мун:\n— Любопытно. Сие дивное единообразие сулит нам покой в управлении чернью, не так ли, дорогая сестра? Когда всякий низведён до единого, серого уровня, любые ростки мятежа в душах подданных наших будут истреблены ещё в зародыше.\n\nДейбрейкер едва заметно кивнула, и на её морде заиграла зловещая, хищная улыбка:\n\n— Совершенно верно. Покорность через навязанную нужду «быть как все»... В этом есть определённое изящество, — она вновь обратила взор на гостью. — Я полагаю, эти теории разделяют многие. Скажи мне... распространяется ли ваша «уравниловка» на иные расы? В противном случае нам придётся внести в проект кое-какие прагматичные правки, — она недобро усмехнулась. — Видишь ли, у нас возникли досадные трения: подданные-пони и подданные-грифоны затевают утомительные драки. Кажется, твоё «равенство» станет идеальным намордником, чтобы заставить их умолкнуть.\n\n— О-о, да. Это подразумев... я имею в виду, что все разумные расы уже включены в систему. В-се разумные... равны."
evildiarchy_newmareland.20.a: "— В таком случае продолжай свой рассказ, Блюберри Фрост. Мы внимаем."

evildiarchy_newmareland.21.t:0 "Всё принадлежит Нам"
evildiarchy_newmareland.21.d:0 "Джет Сет наблюдал за тем, как Дейбрейкер и Найтмер Мун выходят на сцену, втихомолку проклиная себя за то, что в порыве раздражения предложил аликорнам лично произнести эту речь. Разумеется, в итоге именно ему пришлось созывать всех профсоюзных лидеров и старейшин гильдий, проводить исследования и лично следить за тем, чтобы каждый приглашённый понял: присутствие на этом мероприятии обязательно. Даже смерть не является достойной причиной для отсутствия.\n\nИ теперь Джет Сет горько жалел, что упустил шанс подать новости более тонко. Ныне об этом объявят две безумные правительницы, и добром это не кончится. Что если...\n\n— Доброго здравия вам, подданные Наши, — начала Найтмер Мун. — Желаем Мы возвестить о переменах в правлении Нашем.\n\nБольше всего Джет Сета беспокоило то, что сестры неизбежно начнут препираться на глазах у сотен пони.\n\n— Внемлите Нам, — подхватила Дейбрейкер, — ибо более нет в вас нужды.\n\nПо толпе пронеслись вздохи и испуганный ропот, но прежде чем шум стал невыносимым, Найтмер Мун оборвала его.\n\n— Довольно! Любезная сестра Наша желала поведать, что отныне вся промышленность переходит в Нашу личную собственность. А посему никто из вас Нам более не потребен.\n\nВ наступившей гробовой тишине Дейбрейкер усмехнулась и добавила.\n\n— И не смейте оспаривать волю Нашу. Либо вы смиритесь пред новой реальностью, либо... сгорите на работе.\n\nКак только аликорны сошли со сцены, в зале разверзся настоящий Тартар. Пони выкрикивали вопросы, кто-то пытался прорваться на трибуну, но путь им преградили королевские стражники. Большинство же просто пыталось перекричать соседа в общем хаосе."
evildiarchy_newmareland.21.a:0 "И всё же Джет Сет почувствовал облегчение."

evildiarchy_newmareland.22.t: "Остатки былого"
evildiarchy_newmareland.22.d: "Джет Сет встретился взглядом с Кингфишером, присаживаясь напротив него в почти пустом кафе. Последний едва заметно улыбнулся и отпил чаю.\n\n— Доброе утро, Джет Сет. Благодарю, что согласились на встречу в столь... неформальной обстановке, — произнёс он с вежливой, безупречно отрепетированной улыбкой.\n\n— Пустяки. Мне всё равно было по пути, так что это едва ли можно назвать крюком.\n\nНа самом деле Джет Сет предпочитал проводить официальные встречи в кабинете, но даже он был готов порой делать исключения, если это шло на пользу переговорам.\n\n— Сразу перейду к делу, так сказать, к теме под копытом, — Джет Сет снял очки и принялся медленно протирать линзы. — Полагаю, вы догадываетесь, почему я искал встречи?\n\nУлыбка Кингфишера немного померкла. Он поставил чашку на блюдце.\n— Да. Это было лишь вопросом времени, когда аликорны обратят взор на нашу скромную партию, — он задумчиво слегка качнул чашку, наблюдая за коричневым водоворотом чаинок. — Полагаю, вы намерены предложить нам некую сделку. Иначе нас бы давно... заставили замолчать иными средствами. Менее изысканными.\n\n«Ожидаемо проницателен», — холодно отметил про себя Джет Сет.\n\n— Именно так. Они желают интегрировать вас и ваших сторонников в государственный аппарат, притом без какого-либо преследования.\n\nДжет Сет ожидал, что Кингфишер хотя бы немного удивится новости, но тот лишь терпеливо кивнул.\n— От вас требуется лишь держать остальных под контролем и, само собой, не высовываться.\n\nЧасть души Джет Сета всё ещё протестовала против того, как легко и буднично он научился выдвигать подобные ультиматумы, но всей остальной его сущности было уже всё равно. Особенно когда речь шла о таких «мелочах».\n\n— Это не станет проблемой. Честно говоря, условия куда мягче, чем я рассчитывал, — Кингфишер безрадостно усмехнулся. — Если, конечно, это не всё.\n\nДжет Сет медленно кивнул и подался вперёд, понизив голос:\n— Вы должны публично отречься от идей республиканизма."
evildiarchy_newmareland.22.a: "— Прискорбно, — вздохнул Кингфишер. — Считайте, дело сделано."

evildiarchy_newmareland.23.t: "Первый из многих шагов"
evildiarchy_newmareland.23.d: "Площадь перед зданием, некогда служившим оплотом правительства Нового Мейрленда, была забита до отказа. Пони и грифоны со всех концов страны стекались сюда, чтобы стать свидетелями момента, который при любом описании можно было назвать не иначе как историческим. Одних пригнало сюда болезненное, липкое любопытство; других – фанатичное, почти религиозное преклонение перед аликорнами.\n\nСамо здание преобразилось до неузнаваемости, утратив былую строгость. Тесные кабинеты чиновников стали кельями для слуг, а два крыла превратились в личные чертоги диархов. Главный зал заседаний, где раньше спорили о налогах и портах, перестроили в колоссальный тронный зал. Впрочем, простым смертным путь туда был заказан: аликорны редко снисходили до того, чтобы давать аудиенции.\n\nГул толпы оборвался, когда на балкон вышел Джет Сет. Его голос, усиленный заклинанием, заполнил площадь, как раскат грома:\n— Склонитесь и узрите величие Их Императорских Величеств – Дейбрейкер и Найтмер Мун!\n\nСтоило толпе смолкнуть, как секретарь исчез, словно его и не было.\n— Добрый вечер, мои дорогие подданные, — Дейбрейкер шагнула вперёд; её огненная грива сияла ярче заходящего солнца, заливая светом парапет. — Отрадно видеть столь многих из вас здесь. Это поистине согревает моё сердце, — промурлыкала она.\n\n— Ведомо многим из вас ныне, — продолжила Найтмер Мун, выступая из тени. — Преобразования внутренние завершили мы. Страной, двух богинь воистину достойной, Новый Мейрленд ныне стал.\n\nДейбрейкер самодовольно ухмыльнулась, окинув взглядом горизонт:\n— Став сияющим примером образцового государства, Новый Мейрленд тем не менее, остаётся тесноват для существ нашего масштаба.\n\n— И всё же, — отозвалась Найтмер, и взгляд её скользнул по притихшим рядам пони, — неблагодарны мы были бы, коль о возможностях, краем сим дарованных, умолчали. Ныне, когда страна готова служить нам и смиренно принять наше владычество, труда не составит нам волю божественную на континент весь простереть!\n\nНайтмер Мун разразилась леденящим, торжествующим хохотом, к которому тут же присоединился резкий, торжествующий смех Дейбрейкер."
evildiarchy_newmareland.23.a: "— И именно это мы намерены сделать."

evildiarchy_newmareland.24.t:0 "Создано для войны"
evildiarchy_newmareland.24.d:0 "Ойлд Гир тяжело вздохнула и подошла к окну своего кабинета, выходящему на нижний ярус фабрики. Внизу рабочие уже отключали станки, готовясь к предстоящему четырёхдневному перерыву. Остановка производства на такой строк приведёт к большим расходам, но расчёты были неумолимы.\n\nПока Гир не удастся нанять ещё хотя бы дюжину пони или грифонов, будет выгоднее гонять фабрику на полную мощь, а затем периодически останавливать её, давая рабочим передышку. И она знала, что не одинока в своём затруднении: по всему Новому Мейрленду главным бутылочным горлышком стремительной индустриализации была нехватка рабочих.\n\nГир подхватила ключи и направилась к двери. Подумать только, как же стремителен прогресс в нынешние дни... От этой мысли на глаза почти наворачивались слёзы. Спрос был высок как никогда, и, как бы она ни любила поворчать, её прибыли следовали за этим спросом, а если быть совершенно честной – даже опережали его. И конкуренция внутри страны её почти не беспокоила. Почему? Да всё просто: даже конкуренты не могли производить достаточно. Им тоже не хватало рабочих, чтобы поспеть за рынком.\n\nОднако, когда она подошла к лестнице, в голове мелькнула мрачная мысль, которая в последнее время всё чаще давала о себе знать... Что, если спрос исчезнет? Что, если война внезапно зайдёт в тупик и вся эта колоссальная индустрия заложит крутой вираж и резко споткнётся?"
evildiarchy_newmareland.24.a:0 "Или императрицы вдруг и вовсе прекратят свои войны?"

evildiarchy_newmareland.25.t: "Падение первой кости домино"
evildiarchy_newmareland.25.d: "Дейбрейкер и Найтмер Мун переступили порог здания, которое ещё вчера было сердцем вингбардийской власти. Джет Сет тенью следовал за ними; его планшет послушно парил в ауре телекинеза, а сам жеребец мучительно пытался разгадать, какой высокий смысл таится в его присутствии на этом визите.\n\nНайтмер Мун властно кашлянула:\n— Внемли, о верный Джет Сет, и запечатлей на свитках сей миг триумфа! Да ведают потомки: две владычицы, коим нет равных в мироздании, вошли в сию цитадель, сокрушив гордыню тех, кто дерзнул оспорить наше величие.\n\n«Неужели я здесь только для того, чтобы им было перед кем бахвалиться?» — тоскливо подумал жеребец.\n\n— Прошу прощения, Ваше Величество, но разве это... строго обязательно? — он старался держать голос нейтральным, чтобы не испортить благодушное настроение безумной богини. — В конце концов, ваш триумфальный вход в здание видело не меньше сотни свидетелей.\n\nОн пожалел о своей реплике, прежде чем затих последний слог.\n\n— О, разумеется, это необходимо, — отозвалась Дейбрейкер, не оборачиваясь. — Речь об имидже, мой дорогой подданный. Грош цена толпе зевак, если мы не закрепим успех детальным отчётом, в котором каждый абзац внушает трепет. Нам нужно разъяснить исключительную, я бы сказала, историческую значимость этого шага. Сие должно быть вырублено в граните, дабы быть явлёным сотне грядущих поколений.\n\nНайтмер Мун милостиво кивнула, и на её губах заиграла ледяная улыбка:\n— Истинно так. Немногое сравнится с блеском нашей победы. Я могла бы проречь, что грядущие века преклонятся пред этим триумфом, но мы зрим истину: сие есть лишь первая ласточка в долгой череде наших свершений.\n\nДейбрейкер повернулась к сестре с самодовольной ухмылкой:\n— Знаешь, а ведь мы с тобой – по-настоящему блестящая команда. Рождённая для того, чтобы править миром.\n\nЭто неприкрытое упоение властью должно было напугать Джет Сета до икоты, но он, как ни странно, почувствовал прилив слабого облегчения. Впервые на его памяти сёстры ладили. Возможно, у этого их государства всё же есть шанс продержаться... По крайней мере, достаточно долго, чтобы Твайлайт и её друзья успели во всём разобраться и всё исправить.\n\nСловно прочитав его мысли, Найтмер Мун произнесла:\n— Соглашусь, о сестра моя. Во всём мироздании, средь мириадов существ и подданных, нет нипони, кого желала бы я зрить своим правым копытом более, нежели тебя.\n\n— Правым копытом? — Дейбрейкер картинно закатила глаза, не скрывая ехидства. — Мы обе прекрасно знаем, что мои армии проделали куда больше работы, чем твои.\n\nНайтмер Мун уже набрала в грудь воздуха для гневной отповеди, но Джет Сет, подавив тяжёлый вздох, поспешил вклиниться между божествами."
evildiarchy_newmareland.25.a: "— Вам не кажется, Ваши Величества, что подобные мелочи бледнеют в лучах вашей общей славы?"

evildiarchy_newmareland.26.t: "Достигнутый компромисс"
evildiarchy_newmareland.26.d: "— Скажи мне, сестра, — начала Найтмер Мун, с ледяным изяществом опустив чашку на блюдце. Тонкий фарфор звякнул в тишине зала. — Надеюсь, в твоём распоряжении есть помыслы более глубокие, нежели те, что посетили меня. Ибо ведай: чада мои с великим трудом приемлют тебя как равную мне. Ежели мы возвестим о слиянии их святынь с культами твоих адептов, прольются реки крови. Мы рискуем лишиться самых преданных сердец в бессмысленной сече.\n\nДейбрейкер едва сдержалась, чтобы не съязвить: она и сама всё ещё с трудом принимала Найтмер Мун как равную себе.\n\n— Ты права, сестрица, это было бы... досадно, — она приставила копыто к подбородку, имитируя глубокую задумчивость, а затем самодовольно усмехнулась. — Но давай сменим угол обзора. К чему эти сложности с теологией? Разве мы не можем просто приказать им прекратить это безобразие? Моё слово – это закон, не требующий пояснений. Мои подданные это усвоили. Неужто твои ведут себя иначе?\n\nНайтмер нахмурилась, вглядываясь в колышущуюся поверхность чая, и медленно кивнула:\n\n— В речах твоих звучит истина, хоть и суровая. В конечном счёте, они питают к тебе неприязнь лишь оттого, что в лике твоём не зрят моего отражения. Но трепет их пред моим величием затмит любое роптание.\n\n«На сей раз, — подумала Повелительница Ночи, — эта её привычка ломиться напролом и полное отсутствие гибкости могут оказаться единственно верным решением».\n\nДейбрейкер снова ухмыльнулась:"
evildiarchy_newmareland.26.a: "— Что ж, это оказалось куда проще, чем я ожидала."

evildiarchy_newmareland.27.t: "Повсюду взор"
evildiarchy_newmareland.27.d: "Тяжело дыша, Глория нырнула в тесную пекарню. Пока что – в безопасности. Она была почти уверена, что оторвалась от преследования, но инстинкты подсказывали: времени в обрез. Вечно так везти не может.\n\nБросив лихорадочный взгляд на улицу, она обернулась к залу, втайне моля ныне запрещённых богов встретить здесь хоть одно дружеское лицо. Комок в животе сжался ещё сильнее: в полумраке пекарни не было ни одной знакомой фигуры. Но вдруг она наткнулась на чей-то взгляд. Не друг, скорее случайная смутно узнаваемая пони – та сидела за столиком в одиночестве, безучастно помешивая чай.\n\nУжас на лице Глории, должно быть, был слишком красноречив. Пони... как же её звали?.. Флауэр Дью выглядела встревоженной, когда грифина стремительно подошла к ней. Впрочем, имя уже не имело значения.\n\n— Ты должна мне помочь, — выпалила Глория без предисловий, едва сдерживая дрожь в голосе. — За мной следят. Я не знаю, кто, но...\n\n— О чём... о чём ты говоришь? — Флауэр Дью тряхнула головой и попыталась улыбнуться. — Глория, верно? Погоди, отдышись. Расскажи толком, что стряслось.\n\nГлория сделала судорожный вдох, обнаружив, что ей легче смотреть на собственные подрагивающие когти, чем в глаза собеседнице.\n\n— Я не знаю, кто это, но там кобыла... я вижу её весь день. Сначала думала – совпадение. Знаешь, у меня отличная память на лица? Я всегда узнаю прохожих, даже если мы никогда не общались, — она сглотнула сухой ком в горле. — Но она... Куда бы я ни пошла, она оказывается там. Никогда на меня не смотрит. Просто... она там. Всегда за спиной.\n\nНемного успокоившись, Глория снова подняла взгляд на Флауэр и увидела на её лице не сочувствие, а неподдельный, животный ужас.\n\n— Я... я думаю, тебе просто померещилось, — выдавила пони с натянутым смешком. Она окутала чашку неровным сиянием телекинеза и осушила её одним глотком, едва не подавившись. — В любом случае, мне... мне жаль уходить так в-внезапно, но мне пора. Сестра... её пора забирать из школы.\n\nГлория попыталась её остановить, но через мгновение кобыла уже скрылась за дверью, даже не оглянувшись. Грифина с трудом сглотнула, ещё раз глубоко вздохнула и направилась к выходу. Бежать? Но куда? Город, который она считала домом, внезапно превратился в лабиринт с прозрачными стенами. Быть может, кто-то из родни согласится приютить её хотя бы на одну ночь?"
evildiarchy_newmareland.27.a: "В конечном счёте Флауэр Дью стала последней живой душой, видевшей Глорию."

evildiarchy_newmareland.28.t: "Матерям виднее"
evildiarchy_newmareland.28.d: "В тесном, пахнущем дешёвым табаком и казённым воском кабинете полицейского участка Сансета Глория лениво качалась на стуле. Стопка рапортов ждала своего часа, но грифина предпочла отдаться мечтам. Обычно она вцеплялась в работу мёртвой хваткой, но сегодня мысли то и дело уносили её прочь. Она не уставала поражаться своей удаче. Ещё недавно – безработная, выброшенная на обочину жизни, доведённая до отчаяния... и вдруг «Святые Матери» даровали ей второй шанс. Кто бы мог подумать, что солнечная и лунная богини станут спасительницами для неё? Если бы кто-то сказал ей об этом раньше... Стук в дверь вырвал её из раздумий.\n\n— Войдите! — отозвалась она, неохотно опуская стул на все четыре ножки и убирая задние лапы со стола.\n\nДверь отворилась, на пороге показалась дежурная в сопровождении юной единорожки.\n— Кобылка желает дать показания, — коротко бросила дежурная.\n\nГлория вальяжным жестом пригласила гостью войти. По крайней мере, это сулило избавление от скуки. Когда за дежурной закрылась дверь, единорожка робко опустилась на край стула. Глория когтем подтянула чистый бланк протокола и ободряюще, как ей казалось, улыбнулась:\n— Привет. Как тебя зовут?\n\n— М-Морнинг Дью, — выдохнула та, судорожно сглотнув. — Я... я здесь из-за тех листовок... ну, вы понимаете... — Морнинг замолчала так надолго, что Глория уже открыла клюв, чтобы подбодрить её, но кобылка всё же выдавила: — О тех, кто отвернулся от наших Матерей... \n\nОна несколько секунд неподвижно разглядывала собственные копыта.\n— Это... это моя старшая сестра, Флауэр Дью. Я места себе не нахожу. Она наговорила всякого, и я... я просто не знала, что делать.\n\nГлории пришлось проявить всё своё терпение, чтобы вытянуть из Морнинг подробности. И чем больше она слушала, тем больше видела в этой Флауэр Дью отражение своего прошлого. Та была молодой кобылой без будущего, которая винила в своих бедах весь мир и подстрекала других к ропоту. Неудивительно, что младшая сестра забила тревогу. Когда Морнинг Дью наконец ушла, Глория принялась за отчёт. Именно тогда в её душу закралось первое холодное сомнение. Она знала, что далеко не все способны «реинтегрироваться» так, как это удалось ей. Некоторые пони и грифоны, посмевшие пойти против воли Императриц, попросту... исчезали."
evildiarchy_newmareland.28.a: "Но ведь Флауэр Дью тоже спасут... верно?"

evildiarchy_newmareland.29.t:0 "Лучше и быть не может"
evildiarchy_newmareland.29.d:0 "[GetDateStringNoHourLong]\n\nМне довелось провести день в тренировочном лагере. Официальная причина визита: собрать запросы и нужды солдат для прямой передачи аликорнам. На деле же я должен был оценить эффективность новой программы – полагаю, это ни для кого не было секретом, но моё присутствие вызывало куда меньше трепета, чем если бы сюда явилась одна из наших уважаемых диархов.\n\nКак бы то ни было, я был приятно удивлён. Солдаты, с которыми мне удалось пообщаться, вели себя вежливо и профессионально, несмотря на их очевидную преданность режиму. Большую часть времени они казались совершенно обычными, пусть и высококвалифицированными военными.\n\nВпрочем, ключевое слово здесь – "казались". Были моменты, когда я почти что терял бдительность, но тут же натыкался на чей-то ледяной взгляд. Не помню точно, что именно я сказал, но в какой-то момент моё пренебрежение к "императрицам" всё же как-то просочилось наружу. Меня не покидает чувство, что сегодня я оказался на волосок от смерти: всего лишь одно неверное слово – и моё тело выставили бы на всеобщее обозрение в назидание остальным."
evildiarchy_newmareland.29.a:0 "Медленно покачивая головой, Джет Сет отложил перо."

evildiarchy_newmareland.30.t:0 "Воля к служению"
evildiarchy_newmareland.30.d:0 "[GetDateStringNoHourLong]\n\nМне довелось провести день в тренировочном лагере. Официальная причина визита: собрать запросы и нужды солдат для прямой передачи аликорнам. На деле же я должен был оценить эффективность новой программы – полагаю, это ни для кого не было секретом, но моё присутствие вызывало куда меньше трепета, чем если бы сюда явилась одна из наших уважаемых диархов.\n\nВсё прошло примерно так, как и ожидалось. Солдаты, которых я там встретил, оказались одними из самых преданных фанатиков, что мне попадались. К счастью, на моей должности часто приходится иметь дело с подобными типами, так что я привык тщательно взвешивать каждое слово. Стоит признать, они были охвачены страстью сильнее обычного, но это и неудивительно, учитывая, что ключевую роль в их подготовке играет идеологическая обработка. Пожалуй, даже слишком сильную – некоторые из них смотрели на меня с нескрываемой злобой или даже... завистью.\n\nТем не менее, это были отлично обученные, компетентные бойцы, жаждущие исполнить свой долг. Конечно, не обошлось без накладок, но это лишь потому, что пони остаются пони: они несовершенны по своей природе. Или, быть может, непоколебимый фанатизм затуманивает им рассудок? Допускаю и такой вариант."
evildiarchy_newmareland.30.a:0 "Со вздохом Джет Сет отложил перо и закрыл дневник."

evildiarchy_newmareland.31.t:0 "Настоящей дружбы ещё никто не пробовал"
evildiarchy_newmareland.31.d:0 "Сегодня по всему Имперскому Соправительству книжные лавки начали распространять новый труд Императриц под названием "Подлинный дневник дружбы". Новинка возымела оглушительный успех – что неудивительно, учитывая новый закон, обязывающий каждого ознакомиться с ним, а также включение книги в обязательную школьную программу по всей державе.\n\nОсновная цель работы – указать на вопиющие изъяны и несостыковки в оригинальном "Дневнике дружбы", выставляя достижения Твайлайт Спаркл и её окружения как лживую пропаганду. Её Монаршее и Божественное Величество Найтмер Мун отрицает какую-либо личную предвзятость в своих суждениях. Более того, Императрицы оспорили само эквестрийское определение гармонии, которое, по их утверждению, было создано специально для подрыва их статуса богинь. Также они прямо называют Твайлайт Спаркл и её друзей мошенницами, настаивая, что их связь с Элементами Гармонии – не более чем искусная ложь. Ведь, как известно каждому, наши милостивые правительницы – единственные, кто достоин владеть мощью элементов.\n\nКнига же предлагает совершенно иной подход к дружбе: глубокие связи между пони следует рассматривать не как личный выбор, а как долг перед Императрицами – если только вы и ваши друзья не замышляете пойти против наших славных правительниц. Далее подчеркивается важность сплочённости населения для создания прочной сети поддержки наших всемогущих богинь."
evildiarchy_newmareland.31.a:0 "Помните: только через дружбу наши богини смогут процветать."

evildiarchy_newmareland.32.t:0 "Сгущающиеся тучи"
evildiarchy_newmareland.32.d:0 "Джет Сет стиснул зубы, наблюдая, как Найтмер Мун и Дейбрейкер выходят на сцену. Он уже знал, какое именно объявление они собираются сделать, и это ему совсем не нравилось. Первой заговорила Дейбрейкер. — Доброго здравия вам, о верные чада наши, — её тон был привычно самодовольным. И хотя Джет Сет уже привык к этому, сейчас его это бесило. Как она смеет так начинать подобную речь? — Мы предстали пред вами, дабы возвестить о важных переменах.\n\n— Как многим из вас ведомо, — продолжила Найтмер. В отличие от сестры, она не выказывала спеси, но даже не старалась скрыть маниакальный восторг в своём голосе. — Ныне примирили Мы веру паствы Нашей, дабы отныне каждый мог славить Обоих Нас, не страшась хулы. Однако ж сие есть лишь первый шаг к слиянию всех верноподданных Наших воедино, — по толпе пронёсся шёпот, и у Джет Сета засосало под ложечкой. Какая-то часть его души всё ещё отчаянно надеялась, что они передумают.\n\nДейбрейкер ухмыльнулась, сделав шаг вперёд. — Отныне и впредь объявляем Мы вне закона всякую веру, чтящую иных "богов"... — она презрительно закатила глаза, — ...кроме Нас Самих, — напряжение в толпе можно было резать ножом. У некоторых пони начали появляться улыбки по мере того, как до них доходила суть сказанного, в то время как другие в ужасе уставились на сцену. Джет Сет же мог думать лишь о том, скольких врагов по всей Грифонии они только что себе нажили, и сколько ещё появится, когда они закончат речь. — Но какими богинями были бы Мы, ежели бы остановились на этом? Напротив, дабы ни один из чад Наших не впал во искушение пред ложными идолами..."
evildiarchy_newmareland.32.a:0 "— ...предадим Мы огню каждый еретический храм материка."

evildiarchy_newmareland.33.t:0 "Туда, где наш дом"
evildiarchy_newmareland.33.d:0 "— Сестра... что есть сие пред нами? — спросила Найтмер Мун, наблюдая, как над горизонтом поднимается сияющий радужный купол. — Оно подобно...\n\n— Исполинскому щиту, воистину, — отозвалась Дейбрейкер, нахмурив брови. — Нам надлежит рассмотреть его поближе, прежде чем корабль достигнет преграды, — не проронив более ни слова, она взлетела с палубы судна, а Найтмер Мун через мгновение последовала за ней.\n\nМенее чем через полчаса весь их взор заслонила прозрачная стена, переливающаяся розовым и радужными всполохами, простираясь так далеко, как только мог видеть глаз. Аликорны пытались забраться повыше, но спустя двадцать минут безуспешного подъёма решили испытать преграду на прочность – сперва магией, а затем копытами. Результат оказался предсказуем: перед ними была непреодолимая стена. Попытки телепортироваться на ту сторону также не увенчались успехом. Наконец, обе рискнули сотворить заклятие прямого переноса в Кантерлот, поскольку чары такой мощи оставили бы даже их опасно истощёнными в случае успеха. Но, как и ожидалось, магия отринула их.\n\n— Зримо, Нас лишили доступа в Эквестрию, сестра, — Найтмер Мун тяжело вздохнула, бросив гневный взгляд на Дейбрейкер. — Я твердила тебе, что Нам следовало возвратиться тотчас после нашего вознесения. Какой был прок медлить?\n\n— О нет, дражайшая сестрица, — голос Дейбрейкер сочился сарказмом. — Ты сама настаивала, дабы Мы прежде всего собрали воинство в Хироптерре. Твой замысел обернулся бы столь же прискорбным крахом, мозготовитая ты Наша, — она закатила глаза. — К тому же, ты весьма скоро согласилась, что Нам стоит утвердить Нашу империю в Новом Мейрленде, так что не строй из себя провидицу, — когда Найтмер открыла рот, сестра оборвала её. — Знаю, знаю, ты отчаянно жаждешь доказать мою неправоту и обелить себя. Довольно! — она выплюнула это слово, словно яд. — Никакие препирательства не заставят сей великий щит исчезнуть.\n\nНайтмер стиснула зубы. — Как ни прискорбно сие признавать, но ты права, — она вздохнула. — Мы обречены оставаться в Грифонии, доколе не обретём магию, способную сокрушить этот купол, — аликорн умолкла, нахмурившись. — Быть может... быть может, на сем злосчастном материке найдётся некий могучий артефакт? Или же мы сумеем воссоединить мощь нескольких реликвий?"
evildiarchy_newmareland.33.d_alternate:0 "— Скажи, сестрица, чем нам подобает заняться, когда мы прибудем в Кантерлот? — спросила Найтмер Мун, пока они летели бок о бок. — Лично Я помышляю о том, дабы заглянуть в ту лавку игр, кою столь давно желала посетить, но не имела на то времени.\n\n— Разумеется, ты жаждешь пустого времяпрепровождения, сестра, — усмехнулась Дейбрейкер. — Впрочем, быть может, краткий миг забавы не будет столь уж дурным решением, прежде чем Мы займём наш законный престол.\n\n— Я бы не был в этом столь уверен, — раздался голос у них за спинами. — Более того, я полагаю, вам стоит лететь обратно.\n\nАликорны резко развернулись в воздухе, завидев парящего позади серого драконикуса. — Дискорд, — прошипела Дейбрейкер. — Мы полагали, ты не станешь вмешиваться в дела подобного рода.\n\n— О, обычно я так и делаю, — Дискорд небрежно взмахнул лапой, – но события в Эквестрии слишком любопытны, чтобы всё закончилось так быстро! — он безрадостно улыбнулся. — Думаю, вам стоит пока сосредоточиться на Грифонии. Пусть сюжет дойдёт до подобающей кульминации.\n\n— Ты возомнил, будто волен остановить нас? — насмешливо бросила Найтмер Мун. — С дороги, порочное создание. Мы сокрушили тебя единожды и сокрушим вновь, коли ты дерзнёшь стоять у нас на пути.\n\n— Ой-ёй, — ахнул Дискорд. — Маленький я, совсем один, против сразу двух сестёр? Уверен, вы не поступите столь несправедливо, — он рассмеялся, когда рога сестёр нацелились на него, зловеще сияя. — Ах, вот оно что. Вы и впрямь намерены проложить себе путь назад силой? — он цокнул языком и покачал головой. — Увы, я вынужден проявить твёрдость и решимость. Вы не вернётесь сюда, пока не настанет должный час.\n\nДейбрейкер яростно уставилась на Дискорда поверх своего светящегося рога. — И что же ты... — внезапно она и Найтмер Мун оказались в кабинете Джет Сета. Перепуганный единорог вскрикнул, осознав, что на него наставлены два заряженных и готовых к стрельбе орудия массового поражения. — Какого...\n\n— Прошу прощения, мне следовало выражаться яснее, — произнёс Дискорд, чьи голова, шея и лапа торчали прямо из стены. — Вам двоим нужно собрать артефакты, чтобы превзойти мою мощь. Когда получите их, я уверен, всё и все остальные уже займут подобающие места на сцене, — он исчез, и лишь смех драконикуса доносился снаружи. — О, чуть не забыл! — его голос просочился сквозь стену, за мгновение до того, как та обрушилась внутрь. — Чао-какао, мои дорогие! Я буду наблюдать, так что не заставляйте меня скучать!\n\nКашель Джет Сета, задыхающегося от пыли, сменился судорожным вдохом – аликорны выплеснули магическую ярость с такой силой, что в воздухе образовался вакуум, а их пылающие взгляды впились в пустоту, где только что был Дискорд. — Что же, сестрица, — прорычала Найтмер Мун, — имеешь ли ты возражения против поиска сих... артефактов?\n\n— Ни малейших, сестра, — огрызнулась в ответ Дейбрейкер."
evildiarchy_newmareland.33.a:0 "— Сие звучит весьма благоразумно..."
evildiarchy_newmareland.33.b:0 "— Напротив, Я настроена крайне решительно."

evildiarchy_newmareland.34.t: "Щедрое предложение"
evildiarchy_newmareland.34.d: "Сказать, что Джет Сет был не в духе, пока мерил шагами гулкий тюремный коридор, – значит не сказать ничего. Он мог смириться с тем, что его вечерний отдых прерывают из-за какого-то «неотложного дела». Порой, как сегодня, безумным аликорнам приспичивало объявить срочным любое своё поручение, даже если никакой чрезвычайной ситуации и в помине не было. С этим он тоже мог совладать, пусть и скрипя зубами.\n\nНо что заставляло его по-настоящему закипать, так это монументальная, поистине космическая глупость принимаемых решений. Решений, которые ни один здравомыслящий пони не допустил бы и в мыслях. Например – помилование бывшего отребья Блэкрок.\n\nМало того, что ему пришлось аннулировать безупречно выстроенный судебный приговор, так ещё и делать это в последнюю секунду. А всё потому, что две бессмертные кобылы, одолеваемые капризами, целую вечность принимали своё простейшее идиотское решение и в итоге всё равно были неспособны его придерживаться.\n\nВид у Джет Сета был настолько свирепый, что тюремные стражи вжимались в стены, не решаясь даже на формальное приветствие. Ярость в сочетании с левитирующим планшетом – великая вещь, отметил он про себя. Когда же он вышел во внутренний двор, в рядах выстроенных бандитов мгновенно воцарилась тишина.\n\n— Дабы не тратить впустую моё и ваше время, я буду краток, — процедил он, не глядя в их немытые рожи. — Вам и прочим членам шаек даруется высочайшее помилование. Условие одно: беспрекословное подчинение воле Императриц. Через несколько дней вы получите директивы, согласно которым из вас сформируют так называемые «отряды хаоса». Ваша задача...\n\n— И что, мы теперь станем карманными шавками этих размалёванных принцессок? — перебил один из бандитов, кривя клюв в ухмылке. — Если ты думаешь, пиджак, что я или мои парни будем плясать под вашу дудку, то ты идиот. Можешь катиться...\n\nГлумление оборвал сухой, резкий выстрел, эхо которого ещё долго металось между каменными стенами двора. Грифон рухнул замертво, так и не закончив фразу. Охранник хладнокровно опустил дымящийся ствол."
evildiarchy_newmareland.34.a: "На этот раз Джет Сет не испытывал ни капли сожаления."

evildiarchy_newmareland.35.t: "Лишние души"
evildiarchy_newmareland.35.d: "Толпа у виселиц начала неохотно расходиться с площади, и Джет Сет, подчиняясь общему ритму, побрёл к дому. В душе его воцарилось странное, тягучее оцепенение. К своему стыду, он чувствовал... облегчение. Обычно он питал искреннее, почти физическое отвращение к публичным казням, но сегодня всё было иначе. Сегодня он ловил себя на постыдной мысли, что полностью согласен с волей сестёр. Более того, пока палач возился с петлями, Джет Сет с нарастающей тревогой ждал стука люка – словно боялся, что аликорны в последний миг передумают.\n\nРазмышления прервались внезапно: он осознал, что идёт по улице по привычке, совершенно не глядя по сторонам. В нынешние времена подобная рассеянность была непозволительной роскошью. К его радости, верная охрана следовала за ним по пятам, не отставая ни на шаг.\n\nИ всё же... Глубоко внутри шевелилось нечто гадкое. Разве можно праздновать чью-то смерть? Даже если, по совести говоря, они это заслужили. После всего, что эти налётчики сотворили, они едва ли имели право на честный суд. В конце концов, их смерть должна была хоть немного ослабить тугую, как струна, атмосферу в империи. Публичный акт правосудия – именно то, что способно вернуть подданным хоть каплю веры в правительство."
evildiarchy_newmareland.35.a: "Или это лишь попытка договориться с собственной совестью?"

evildiarchy_newmareland.36.title: "Грифоны, поклоняющиеся пони"
evildiarchy_newmareland.36.desc: "— В-вы... неужто это вправду вы? — заикаясь, пролепетал грифон. Его взгляд, полный суеверного ужаса и восторга, был прикован к иссиня-чёрной аликорне, чья грива струилась подобно ночному небу. Сюда, в Верхние Когтесечья, в глухие и суровые земли Полшавы, редко заглядывали чужаки, а уж небожители и вовсе никогда не жаловали эти края своим вниманием.\n\nНайтмер Мун одарила его милостивой, едва приметной ухмылкой и величественно склонила голову:\n\n— Да, это я, законная императрица этих земель!\n\nГрифон рухнул на колени, распластав крылья в пыли в знак глубочайшего почтения.\n— О владычица Луна, Та-Что-Стережёт-Сновидения! Мы приветствуем твой возврат в этот мир! — он кланялся столь истово, что не заметил, как Найтмер Мун невольно вздрогнула при звуках старого имени. — Пусть пони Речных земель позабыли тебя, мы здесь свято храним старые обычаи и память о твоём величии!\n\n— ХА! — резкий, обжигающий смех Дейбрейкер разрезал воздух. — Слышишь, Луна? Тебя помнят!\n\nНайтмер Мун с яростью обернулась к сестре:\n— ТЫ!..\n\n— В-владычица Селестия! — воскликнул другой грифон, поспешно падая ниц рядом с первым. — Какой чести удостоился наш скромный хутор, что сама Поднимающая-Светило-Над-Миром почтила нас своим визитом?\n\nТеперь настала очередь Дейбрейкер глухо рычать под торжествующий, певучий смех Найтмер Мун.\n— О да, просвети же нас, «Селестия», — выделила имя сестра, — какими судьбами мы здесь оказались?\n\n— Что ж, — прошипела Дейбрейкер, едва сдерживая корону белого пламени, готовую вот-вот вспыхнуть гневом, — до нас дошли вести, что здесь живут грифоны, поклоняющиеся богам пони. Мы прибыли, дабы убедиться, что вы поклоняетесь тем, кому следует.\n\n— Истинно так, — ухмыльнулась Найтмер Мун, расправляя огромные крылья. — Мы прознали о вашей верности, столь редкой среди грифоньего племени, и возжелали воочию убедиться в крепости ваших клятв. И хотя обряды ваши кажутся нам... несколько запылёнными временем, нам отрадно видеть, что вы всё ещё чтите своих истинных богинь, — она бросила ледяной, полный превосходства взгляд на сестру. — Не так ли, сестрица?\n\nДейбрейкер криво усмехнулась."
evildiarchy_newmareland.36.a: "— Да, разумеется, дорогая сестра."

evildiarchy_newmareland.37.t: "Объявление"
evildiarchy_newmareland.37.d: "Джет Сет замер у края помоста в тревожном ожидании. На сей раз даже он пребывал в полном неведении. С самого прибытия в Нимбусию диархи не соизволили посвятить его в свои замыслы, а он был слишком благоразумен, чтобы пытаться вытянуть ответ силой.\n\nЗанавес шелохнулся, вырвав секретаря из раздумий. Ветхие доски сцены натужно заскрипели под тяжёлыми копытами Императриц, вышедших к толпе.\n\n— О подданные наши, внемлите! — начала Найтмер Мун, и голос её колокольным звоном поплыл над площадью. — Завершение походов наших на земли псов алмазных и пределы Нимбусии знаменует день сей.\n\nДжет Сет сглотнул; в груди у него неприятно сжалось.\n\nДейбрейкер выступила вперёд.\n— Ведомо большинству из вас: мы не из тех, кто расточает время на высокопарные речи по поводу каждой мелкой провинции, принятой под наше покровительство.\n\nСекретарь отчётливо слышал пульс в собственных ушах и втихомолку проклинал вечную тягу аликорнов к театральным эффектам.\n\n— Разумеется, — продолжила Дейбрейкер, — этот регион известен своими... скажем так, специфическими обычаями.\n\n— О рабстве традиции вековой вещает сестра моя. Взяв край сей под копыто наше, ответственность за культуру его ныне несём мы, — подхватила Найтмер Мун.\n\nВот он, момент истины. Насколько сокрушительным будет удар? Попытаются ли они легализовать рабство во всей империи? Или ограничатся «особым статусом» местных провинций? Любой из вариантов сулил Джет Сету административный ад и окончательную дестабилизацию тылов...\n\n— Как справедливые правительницы, коими мы являемся, мы не видим иного выхода, кроме полной и окончательной отмены рабства. Указ вступает в силу немедленно.\n\nДжет Сет моргнул. Неужели? Вот так просто – они не только поступили по совести, но и облегчили ему жизнь? Сам того не замечая, он расплылся в широкой улыбке. В кои-то веки всё прошло гладко! Даже самодовольный тон Дейбрейкер не мог испортить ему этот внезапный праздник здравого смысла.\n\n— Разумеется, помыслы наши ясны и не терпят толкований, — добавила Дейбрейкер, и в её голосе прорезался металл. — Наши подданные принадлежат нам. И только нам. Мы не потерпим, чтобы кто-то ещё смел заявлять права собственности на то, что является нашим личным достоянием."
evildiarchy_newmareland.37.a: "Улыбка Джет Сета мгновенно погасла."

evildiarchy_newmareland.38.t:0 "Looking For a Birdie"
evildiarchy_newmareland.38.d:0 "Jet Set had been following the alicorns around as they — for a lack of a better term — toured the Griffonian imperial palace. Following their orders, many parts of the palace had already been looted or otherwise ravaged, but occasionally the three of them would cross a hallway or chamber that still held its decorations.\n\nIt was breathtaking. The walls were covered in tapestries of the highest detail, made of the most vibrant colours, and many decorations that would be centrepieces in an average wealthy household simply lined the walls like commodities. Jet Set wouldn't ever openly express that opinion, but despite his reservations about the nature of the empire, he had to admit that seeing this done to the palace was tragic, to put it simply.\n\nWorse still was the reason for this. Officially, they were searching for artefacts and snuffing out imperial troops, but he knew better. This was a deliberate blow to the pride of the Griffonian Empire, as well as an attempt to find the young Grover VI."
evildiarchy_newmareland.38.a:0 "Thankfully, nothing had come of these efforts."

evildiarchy_newmareland.39.t:0 "The Fugitives"
evildiarchy_newmareland.39.d:0 "Steps gently reverberated through the ancient tunnels below the imperial capital. Both Grover and his diamond dog guard, Benito, had been quiet for some time now, but not out of worry of being heard; they had put enough distance between themselves and the palace by now. No, the two simply had nothing to say. Or perhaps too much to say.\n\nThe initial rush of adrenaline had long since worn off, and all that remained was the cold, hard reality. It was over. No matter what politics could have had in store for the young emperor, it had been taken away by two crazy power-hungry alicorns. To Benito, it was very tempting to think Grover had lost it all.\n\nBut he knew better. Grover was still alive, and the odds of their escape looked better with every step. Questions for his future piled up, but the more that pile grew, the more it became apparent... "
evildiarchy_newmareland.39.a:0 "The boy still had a future."

evildiarchy_newmareland.40.t: "Приготовления к возвращению домой"
evildiarchy_newmareland.40.d: "Над просторами Грифонии день и ночь стоял непрерывный лязг металла и гул раскалённых машин. Рёв тяжёлых грузовиков, пронзительный свист эшелонов, мерный топот копыт и хлопанье миллионов крыльев сливались в единый военный марш. Огромный поток стали, пороха и живой силы неудержимо тянулся на запад, к морю. [356.GetName] и Бакара: разные народы всех мастей, от этих земель и до самых дальних рубежей, сплотились под общим знаменем, охваченные единым порывом. Жаль лишь, что их венценосные предводительницы были бесконечно далеки от того единства, что выказывали их подданные.\n\nДейбрейкер стремительно пронзала небеса, оставляя в вышине пылающий, сочащийся жаром след. Впереди, за горизонтом, высился исполинский магический щит – преграда, дерзко вставшая между ней и её законным троном.\n\n— Я по-прежнему считаю, что нам следует высадиться на Грифьих островах и оттуда ударить по побережью! — выкрикнула она, даже не удостаивая сестру взглядом. — Нет никаких причин затягивать это дело!\n\n— Юго-восток сулит нам куда более верный успех, — отозвалась Найтмер Мун, летевшая чуть поодаль. Взгляд её, холодный и цепкий, был прикован к мерцающей пелене щита. — Те края уже полны нашими преданными чадами, а бездорожье лишь станет верным союзником, когда настанет черёд удерживать плацдарм против наземных атак.\n\n— Если кто-то посмеет атаковать, мы их просто сожжём! — прорычала Дейбрейкер и в яростном порыве выпустила в облака ослепительный разряд. — Не вижу смысла тратить время на манёвры, когда нужно идти прямо на Кантерлот! Раздавим мою неблагодарную ученицу в её же замке – и победа за нами!\n\n— Сестра, я уже взывала к твоему разуму: Элементы...\n\nПока их армии внизу готовились к решающей схватке, сёстры в небесах продолжали осыпать друг друга упрёками."
evildiarchy_newmareland.40.a: "Смогут ли они когда-нибудь поладить?.."

evildiarchy_newmareland.41.t: "На связи с верными"
evildiarchy_newmareland.41.d: "Нейсент Дрим со вздохом перевёл взгляд на старый радиоприёмник. Прошли годы с тех пор, как его богиня вернулась в мир, а он всё ещё томился здесь, запертый под переливчатым куполом щита, бесконечно далёкий от её взора. Но хуже всего было то, что принцесса-предательница Твайлайт Спаркл теперь призывала его и других детей ночи готовиться к войне против той, кому они присягали в сердце своём. Если бы в день Великого Призыва он не был несмышлёным жеребёнком, то давно бы пересёк океан, чтобы оказаться по правое копыто от своей госпожи.\n\nОн осторожно коснулся корпуса приёмника – потёртого, пахнущего пылью и старым лаком, но всё ещё крепкого. Этот аппарат достался ему от дяди перед самым его отплытием в Грифонию. «Береги его, — шепнул тогда старый солдат, пряча взгляд. — Настанет день, когда он вновь заговорит во имя Найтмер».\n\nНо Дрим не питал иллюзий. Радио было настроено на узкую, мёртвую полосу частот; вряд ли у кого-то за пределами Эквестрии сохранились передатчики, работающие на той же волне.\n\nДрим снова вздохнул, поставил приёмник на место и поднялся, собираясь выйти из комнаты. Его ждали друзья: сегодня они собирались пропустить по стаканчику сидра (или чего-то куда более крепкого и жгучего, что здесь стыдливо именовали «сидром»). Как бы то ни было, жизнь продолжалась, и он уже направился к двери, как вдруг..."
evildiarchy_newmareland.41.a: "Динамик внезапно ожил, и сквозь треск донёсся долгожданный голос."

evildiarchy_newmareland.42.t: "Начало конца"
evildiarchy_newmareland.42.d: "Джет Сет не сводил глаз с помоста, где застыли две монументальные фигуры. Голоса Дейбрейкер и Найтмер Мун доносились до него словно сквозь толщу воды – вязкий туман слов не достигал сознания, распадаясь на бессмысленные фонемы. Он даже не заметил, как его взгляд потерял фокус. В висках набатом стучала одна-единственная мысль: всё это уже давно должно было рухнуть. Ещё тогда, во время войны с Вингбардией, под тяжестью собственных противоречий. И всё же, вопреки всякой логике, этот чудовищный механизм устоял.\n\nБыл ли это плод его собственных усилий? Его бесконечных компромиссов, отчётов и сглаженных углов? Или этим вечно враждующим аликорнам самой судьбой предсказано подмять под копыта весь мир? Он тешил себя иллюзией, что выигрывает время для Твайлайт, что его покорность – лишь ширма для подготовки сопротивления. Но что, если он лишь помог сёстрам зацементировать фундамент их тирании?\n\n«Нет, я не могу винить в этом себя», — он оборвал внутренний монолог, вспоминая их самые безобразные, пугающие ссоры. — «Оставь их наедине, и они вцепились бы друг другу в глотки, потянув в могилу всю планету».\n\nНо долго ли простоит этот карточный домик, выстроенный на крови и амбициях? Сколько ещё две эгоцентричные маньячки смогут делить один пьедестал на двоих, прежде чем теснота станет невыносимой?\n\nТеперь, когда впереди война с Эквестрией... отвлечёт ли это их от бесконечной грызни достаточно надолго, чтобы... ещё немного отсрочить неизбежное? Или, что куда страшнее, именно эта кампания станет для них точкой невозврата? Джет Сета захлестнула дурнота. В любом случае, он бессилен их остановить. Долгое время щит Древа Гармонии казался незыблемой преградой, последним оплотом здравого смысла, но теперь они нашли способ его пробить.\n\nОн зажмурился и с силой потёр виски, пытаясь изгнать наваждение как раз вовремя, чтобы уловить финал речи Императриц."
evildiarchy_newmareland.42.a: "— ...И именно поэтому мы выступаем в поход, дабы вернуть наши земли."

evildiarchy_newmareland.43.t: "Час пробил"
evildiarchy_newmareland.43.d: "Дейбрейкер победоносно ухмыльнулась, возвышаясь над морем голов. Золото её доспехов полыхало, ослепляя подданных.\n\n— Мои дорогие подданные! Долгие годы нас отсекали от наших законных владений. Слишком долго то, что принадлежит нам по праву рождения, удерживали чужие, недостойные копыта.\n\n— Долгий срок сей миновал, — подхватила Найтмер Мун, и голос её, рокочущий и тёмный, поплыл над площадью. — Всю Грифонию под властью нашей ныне объединили мы. Всему миру искусство наше и долгу верность явили мы сполна. Копыта к тому, что наше есть, ныне протянем мы, и себе заберём всё!\n\nДейбрейкер оскалилась, и в лучах полуденного солнца сверкнули её неестественно острые зубы:\n— И потому мы обнажаем клыки перед предателями Эквуса и самозваными «Элементами Гармонии». Мы – буря, несущаяся на них, и им не пережить нашего гнева!\n\nК этому моменту толпа застыла в оцепенении. Тишина на площади стала такой плотной, тяжёлой и неподатливой, словно литой свинец.\n\n— Однако милосердны столь же, сколь могущественны мы, — произнесла Найтмер Мун, и звёзды в её гриве вспыхнули холодным блеском. — Искупления шанс даруем ныне вам мы. Пусть каждый в Эквусе – пони ли он, иль тварь иная – ведает: пощада возможна.\n\nПо рядам слушателей пронёсся недоумённый, испуганный шёпот. Найтмер Мун выдержала театральную паузу, позволяя тишине вновь сомкнуться над площадью."
evildiarchy_newmareland.43.a: "— Лишь восстать и на сторону нашу перейти вам нужно."

evildiarchy_newmareland.44.t:0 "Что же с ними сотворить?"
evildiarchy_newmareland.44.d:0 "Когда Найтмер Мун и Дейбрейкер спустились в подземелья Кантерлотского замка, Рэйнбоу Дэш первой бросилась к решётке: — А ну-ка выпустите меня! Я вам обеим хорошенько наваляю! — Найтмер Мун лишь закатила глаза, а Дейбрейкер ответила мрачным смешком.\n\nНи та, ни другая не удостоили её бахвальство ответом. Вместо этого из соседней камеры донёсся голос Рарити. — Дорогуша, я почти уверена, что это они хорошенько наваляют тебе. И не думаю, что они стали бы тебя выпускать, если бы действительно боялись проиграть.\n\nПрежде чем кто-то ещё успел отвлечь их от цели визита, Найтмер Мун холодно кашлянула. — Мы явились сюда, дабы возвестить участь вашу, а не внимать пустому бахвальству.\n\n— Дайте угадаю, — раздался поникший голос закованной в цепи Твайлайт Спаркл. — Публичная казнь?\n\n— О, верная ученица Моя, — проворковала Дейбрейкер. — Неужто ты мнишь Нас истинными чудовищами? — она коротко покачала головой, не дав Твайлайт вставить ни слова. — Быть может, тебе сие и не по нраву, но даже в истинном Своём обличье Я всё ещё Селестия. Сердцу Моему по-прежнему дороги ты и твои друзья, — в этот момент, никем не замеченная, распрямившаяся грива Пинки Пай начала вновь завиваться в кудряшки.\n\n— Истинно так и для Меня, — добавила Найтмер. — И Мы всё ещё храним привязанность к вам шестерым. Однако суровая и хладная реальность такова: за мятеж вам суждено предстать пред карой.\n\nПинки Пай подпрыгнула и подскочила к самой решётке: — О! Это будет похоже на миссию дружбы в каком-нибудь жутко суровом месте вроде Якякистана? В этом я разбираюсь!\n\n— Ох, П-Пинки, я не думаю, что о-они отправят нас... на миссию дружбы... — слова Флаттершай становились всё тише, и к концу фразы, когда все взгляды обратились к ней, она практически слилась со стеной своей камеры.\n\nДейбрейкер усмехнулась. — О, милая Флаттершай, неведомо как, но Пинки Пай прозрела истину. Более того: коль вы преуспеете, дозволено вам будет вернуться, а Мы обе отречёмся от престола.\n\nКогда Дейбрейкер замолчала, брови Эпплджек взлетели выше некуда, оказавшись чуть ли не макушке. — Погодьте-ка минутку... Тут ведь есть подвох, верно? Вы бы не несли этой чепухи, будь оно осуществимо."
evildiarchy_newmareland.44.d_alternate:0 "— Тщетны сии деяния, — сказала Дейбрейкер, идя бок о бок с Найтмер Мун по залам Кристального замка. — Поведай Мне, сестра, отчего Нам подобает прозябать в этой земле, а не в Нашем великом Кантерлоте?\n\n— Отколе в тебе проснулось сие малодушие? — Найтмер Мун одарила сестру язвительной усмешкой. — То проклятое древо испито до дна – магическая мощь его иссякла, а докучливые Элементы Гармонии трусливо сокрылись во тьме. Остался лишь единый артефакт, дерзнувший состязаться с Моей божественностью, и Я не совершу оплошности, оставив его без присмотра.\n\nПрежде чем Дейбрейкер успела возразить, внезапный грохот откуда-то сверху привлёк внимание обеих. Они стремительно взмыли к одной из башен, объятой яростным фиолетовым пламенем. Сёстры приземлились на соседние шпили, взирая на разворачивающееся зрелище. Когда магический огонь рассеялся, у Кристального Сердца – ныне абсолютно чёрного и лишённого всякой любви – проявился силуэт. Грива этой кобылы развевалась в потоках магии, рог сиял неоново синим светом, а лицо скрывала маска. Заметив Сестёр, она безумно оскалилась.\n\n— НАКОНЕЦ-ТО ВЫ ЯВИЛИСЬ, ГНУСНЫЕ ПОХИТИТЕЛЬНИЦЫ! — её рог вспыхнул ярче прежнего, и сёстры приняли боевые стойки. — ТРЕПЕЩИТЕ! Я ОБРУШУ НА ВАС ВСЮ СВОЮ МОЩЬ, ПОКА ВЫ НЕ ПОКАЖЕТЕ МНЕ ИСТИННЫХ ПРИНЦЕСС!\n\n— Сама Твайлайт Спаркл решилась восстать против Нас в одиночестве? Мнится Мне, что даже твои мнимые друзья уразумели, что сей путь ведёт лишь к погибели, — Найтмер Мун хищно улыбнулась. — С великим упоением Я воздам тебе за былые обиды!\n\nС этими словами она рванулась вперёд, испустив магический луч, который тут же столкнулся с ответным залпом Спаркл. Его мощь едва не сокрушила Найтмер, которую спасло своевременное вмешательство Дейбрейкер.\n\n— Она преисполнена тёмной силы Кристального Сердца и пребывает в неистовстве. Не смей мнить её обычным аликорном, иначе падение Твоё будет скорым, — Дейбрейкер вновь взлетела. — Уразумей же: более Я не стану щитом твоим!\n\nРыча от ярости, Найтмер Мун быстро выровнялась и присоединилась к сестре в воздушном бою против осквернённой Спаркл."
evildiarchy_newmareland.44.a:0 "— Что ж, всё зависит от грифонов, поклоняющихся лжебогу Маару..."
evildiarchy_newmareland.44.b:0 "— Сёстры против ученицы в последней битве за дружбу."

evildiarchy_newmareland.45.t:0 "Никогда более"
evildiarchy_newmareland.45.d:0 "После сравнительно недолгого полёта Дейбрейкер и Найтмер Мун прибыли к замку в Вечнодиком лесу. Его вид обычно пробуждал в сёстрах странную ностальгию, но, как и всегда, их привели сюда иные дела, нежели воспоминания о горько-сладком прошлом. Уж точно не теперь, когда настоящее было столь же сладостным, как их победа над Носительницами Элементов.\n\nИменно поэтому аликорны понимали, как важно сохранять бдительность, пока они окончательно не утвердят свою власть. Для этого они должны были вырвать занозу в форме Древа Гармонии, глубоко засевшую в их боку. Они знали, что это будет нелёгкой задачей, и потому освободили весь свой распорядок дня ради "уборки в саду".\n\nАликорны принялись осыпать кристаллическое древо своими мощнейшими заклятиями – от чистой магической энергии до взрывающихся огненных шаров, едва не обрушивших саму пещеру — но вскоре стало ясно, что их опасения подтвердились. Методы становились всё изощреннее, а заклинания – тоньше и сфокусированнее, но решение по-прежнему ускользало от них.\n\nСпустя часы бесплодных трудов Найтмер Мун обнаружила, что попросту впилась взглядом в Древо Гармонии, будто это одно могло заставить его наконец расколоться. — Сестра... мнится Мне, Нам надлежит глубже изучить сию скверную магию, ежели Мы желаем избавиться от неё.\n\n— Согласна, — отозвалась Дейбрейкер, — но Мы не намерены терпеть его присутствие хоть сколь-то долго."
evildiarchy_newmareland.45.a:0 "— Согласна. Дни его сочтены."

evildiarchy_newmareland.46.t:0 "Последствия"
evildiarchy_newmareland.46.d:0 "Стоя перед дверью в зал для совещаний, Джет Сет судорожно сглотнул. Аликорны потребовали его немедленного присутствия. Разум твердил, что это лишь очередная попытка заставить его разрешить их глупый спор. Но интуиция шептала: есть шанс, что они нашли его письма к Рэйвен. Да, та должна была уничтожить их, но вдруг что-то упустила? Сделав глубокий вдох, пони постучал и, получив приглашение, вошёл. Внутри, расположившись в зловещем согласии на одном диване, его ждали Дейбрейкер и Найтмер Мун. Тревожный знак.\n\n— Вы хотели видеть меня, Ваши Величества? — произнёс он нейтральным тоном, несмотря на колоссальный стресс. Когда оба аликорна ухмыльнулись, по его спине пробежал холодок – Джет Сет понял, что опасения были вовсе не беспочвенны. — Что-то... что-то случилось?\n\n— Ты сперва присядь, — в голосе Дейбрейкер чувствовались нотки рыка хищника, загнавшего добычу в угол. Он повиновался, но стоило пони подойти к столу, как взгляд упал на стопку писем. Бумаг, покрытых до боли знакомым почерком – его собственным. Казалось, их положили намеренно, чтобы он заметил их в этот самый миг.\n\nНайтмер Мун мрачно усмехнулась. — Неужто ты и впрямь полагал, что Мы пребудем в неведении? — она медленно покачала головой. — Мы признаём, ты искусно вёл свою игру, Джет Сет, но в конечном итоге победа осталась за Нами, — Джет Сет отступил на шаг. Всё кончено. Его жизни конец. Нет, всё ещё хуже. Без него, способного сглаживать их разногласия, сёстры рано или поздно вновь вцепятся друг другу в глотки, и тогда...\n\n— Ведомо всем, что за измену столь непотребную предписана плаха, — промурлыкала Дейбрейкер. — Но, по правде... ты слишком полезен, дабы предать тебя топору палача. И пусть слова, коими ты поносил Нас, были преисполнены желчи, — она притворно смахнула слезу со щеки, прежде чем вновь оскалиться, — они же и открыли Нам потаённые помыслы твои.\n\n— И посему, — продолжила Найтмер, — Мы отринули кару очевидную в пользу наказания более... изощрённого, — она выдержала томительную паузу в несколько секунд. — Мы сошлём тебя в самую глушь Эквестрии, к простым пахарям, коим вменено в обязанность вовек не отпускать тебя от плуга. И жить ты будешь в сарае, построенном из отходов и палок. Но, быть может, однажды Мы вновь вспомним о тебе."
evildiarchy_newmareland.46.a:0 "В этот момент Джет Сет, пожалуй, предпочёл бы казнь."

evildiarchy_newmareland.47.t:0 "Последний довод"
evildiarchy_newmareland.47.d:0 "Дейбрейкер закатила глаза и тяжело вздохнула. — Поведай Нам ещё раз... отчего же твой проект танка мнится тебе лучше Моего? В речах твоих лишь сомнения да домыслы, но Я не зрю в сем творении ровным счётом ничего достойного.\n\n— Неужто Мне надобно повторять сие в четвёртый раз? — Найтмер Мун стиснула зубы. — Список преимуществ безмерен! Те "домыслы", о коих ты сокрушаешься – не пустые бредни, но важнейшие рассуждения! — она с силой обрушила копыта на дубовый стол, и по дереву поползли трещины. — Не ведаю, почто Я доселе терпела твоё вечное упрямство! И не ведаю, зачем Я вообще тебя терплю! — её глаза расширились, а гнев сменился ледяным спокойствием. — Воистину, Я более не желаю терпеть тебя, — повторила она с пугающей улыбкой. — Я устала от сей игры в равновесие.\n\nЗамерев на мгновение, Дейбрейкер вдруг разразилась смехом. — О, сие просто бесценно! — она встретила яростный взгляд Найтмер Мун, вновь закатив глаза. — Уймись же, сестрица. Я смеюсь не над тобой – хотя поводов ты даёшь в избытке, особенно с этим твоим корытом на гусеницах, — она не дала сестре вставить ни слова. — Забавно лишь то, что в этом вопросе Мы наконец единодушны, — она вновь рассмеялась. — Выходит, Джет Сет был прав, полагая, что без его посредничества Мы не сладим? Что лишь он удерживал Наш союз от краха?\n\nДаже этот ядовитый комментарий не испортил настроения Найтмер, и на её губах вновь заиграла улыбка. — Должна признать, Я чувствую облегчение. Ныне, когда Эквестрия вновь у Наших копыт, стало предельно ясно, что в Нашем соратничестве более нет нужды, не так ли? — Дейбрейкер лишь качнула головой. — Тогда Я предлагаю покончить с сим так, как следовало в самом начале. Без хитростей, без лукавства и без лишних глаз. Лишь ты против Меня в чистом поле."
evildiarchy_newmareland.47.d_alternate:0 "Прошли многие часы с тех пор, как три аликорна сошлись в яростной битве. Почти весь Кристальный замок лежал в руинах, пока противницы на огромной скорости проносились сквозь его залы. Хотя сёстры обладали численным преимуществом, обширные познания Спаркл в магии и колоссальная мощь, поглощенная из Кристального Сердца, не давали им возможности нанести решающий удар. Однако после многочасового сражения стало ясно, что тело Миднайт оказалось на пределе из-за постоянного использования сложнейших заклинаний. Заминки в долю секунды хватило, чтобы она не успела воздвигнуть щит, в результате чего магический луч отбросил её через весь тронный зал, и она без сил рухнула подле трона.\n\n— Похоже... мне не хватило сил спасти Принцесс... надеюсь... они гордятся тем, что я свершила... — Спаркл закашлялась, пока сёстры приближались к её обмякшему телу. Найтмер Мун взирала на павшего аликорна с нескрываемым отвращением, тогда как на лице Дейбрейкер застыло странное, меланхоличное выражение. Спаркл посмотрела на неё и на мгновение улыбнулась. — Это ты... Селестия? Здесь так тепло... — услышав эти слова, Дейбрейкер вздрогнула. — Здесь так хорошо... — прошептала Миднайт. — Дейбрейкер сделала шаг к ней, но резкая боль в боку заставила её остановиться. Обернувшись к источнику боли, она увидела свою сестру: та торжествующе улыбалась, а её рог светился магией.\n\n— О, умоляю Тебя, — процедила Найтмер Мун. — Неужто в Твоей груди внезапно пробудилось сердце? Пожалуй, Мне стоит покончить с Тобою ныне, прежде чем сие малодушие преградит Мне путь.\n\nДейбрейкер усмехнулась в ответ, и меланхолия мгновенно сменилась до боли знакомым высокомерным гневом. Из трещин в стенах замка начали сочиться тени и яркий свет. — Немудрено, что ночные кошмары страшат лишь неразумных жеребят, — голос Дейбрейкер зазвучал подобно раскату грома, а её крылья вспыхнули неистовым пламенем. — Они лишь трусливо терзают спящих и бесследно исчезают при пробуждении. Пришло время и миру сему пробудиться, "любезная сестрица".\n\nКогда обе богини начали взлетать от земли, солнце и луна в небесах пустились в безумный пляс, словно сами светила оспаривали право на власть над миром. Миднайт Спаркл, наблюдая за этой сценой, не могла не восхититься явленной мощью... и не сдержала короткого смешка. — Лживые самозванки, которых я так отчаянно пыталась низвергнуть... решили сами довершить то, что не удалось мне... ха... ха-ха... ха-ха-ха-АХАХАХА! — её смех эхом разносился под сводами, пока солнце и луна сходились в зените, а весь мир содрогался."
evildiarchy_newmareland.47.a:0 "Дейбрейкер ответила хищным оскалом."
evildiarchy_newmareland.47.b:0 "А-ХА-ХА-ХА-ХА-ХА-ХА-ХА-ХА-ХА-ХА!"
evildiarchy_newmareland.47.a.tt:0 "§RВесь мир затаил дыхание, наблюдая за противостоянием двух божеств. Речь не о том, кто выйдет победительницей – вопрос лишь в том, переживёт ли сам мир это столкновение.\n\nБлизится роковой час...§!"

evildiarchy_newmareland.48.t:0 "Идол Борея"
evildiarchy_newmareland.48.d:0 "Среди всех артефактов Грифонии идол Борея, пожалуй, был самым важным. Использованный Гровером I – тогда ещё королём Грифонстоуна – для объединения грифоньего рода, предмет, по преданиям, вселял гордость в каждого, кто видел его. Династия Гроверов оставила идол в Грифонстоуне, откуда его в конечном итоге похитил циклоп Аримаспи. По роковому стечению обстоятельств это случилось всего за несколько лет до краха Империи Грифонов. Неудивительно, что идол возглавлял список разыскиваемых реликвий континента.\n\nХотя десятилетиями судьба Аримаспи и местонахождение идола оставались тайной, всего несколько лет назад тайна раскрылась во время визита двух Элементов Гармонии в Грифонстоун. Аримаспи постигла печальная участь: он упал в ущелье неподалёку от города. Однако из-за бушующих там яростных ветров ни один грифон так и не сумел достать сокровище.\n\nРазумеется, подобные пустяки не заботили сестёр, которые велели дюжине пегасов спуститься в расщелину и любой ценой забрать артефакт. Однако после того как трое из двенадцати погибли в воздушных потоках, группа сменила подход. В ущелье начала возводиться сложная деревянная конструкция, и спустя неделю напряжённой работы инженеры рапортовали о готовности.\n\nНо судьба распорядилась иначе. Как только пони спустились по помостам и схватили артефакт, по ущелью ударил порыв ветра ещё более страшной силы, обрушив всю лестницу. Оставшимся наверху оставалось лишь в ужасе наблюдать, как их товарищи гибнут, а идол падает на самое дно бездны. Спешно развёрнутые сонары не смогли обнаружить и следа реликвии, так что в итоге миссию пришлось свернуть."
evildiarchy_newmareland.48.a:0 "Что ж, напрасная трата сил."

evildiarchy_newmareland.1000.t:0 "Wool Over the Eyes"
evildiarchy_newmareland.1000.d:0 "Autumn Breeze sat in his office, looking over the papers. It just didn't fit. Their agents had successfully infiltrated New Mareland and had caused the re-emergence of Nightmare Moon, they had succeeded. And yet, their goddess had tied herself to the solar harlot, exhorting Chiropterra to remain loyal and that this was only a temporary state of affairs. He had wanted to believe her, but it had rapidly become far too much. When news came that the Imperial Condominium was rallying Solarists, it was clear that something was beyond wrong.\n\nHad they failed? That was the thought that kept running through his head. Should he have trusted that stranger? Was the powder they had used truly capable of reviving the Nightmare? While it certainly seemed so, the Nightmare would not have even for a second considered allying with Daybreaker, and even if she was using her temporarily, she would never have allowed this to happen. No matter how he looked at it, only two options came to mind to explain the current situation.\n\nOption 1: They had been fools to trust their guest, and had been tricked into waking a pale imitation of their goddess, a great blasphemy.\n\nOption 2: The current "Nightmare Moon" was a fake, an even greater one.\n\nAutumn's jaw set. Regardless of what was true, the fact remained that their goddess was not with them. As followers of the true Nightmare, it was their duty to reject this pale imitation and continue their work. Even if it meant invoking the wrath of the, still doubtlessly powerful, pretender, it was what any true Nightmarist would do without hesitation. And as he walked to the window overlooking New Ayacachtli, he muttered to himself;\n\n"Even if it takes a thousand years more.""
evildiarchy_newmareland.1000.a:0 "We must entrench in Zebrica, then begin anew."

evildiarchy_newmareland.1001.t:0 "A Betrayal Most Foul"
evildiarchy_newmareland.1001.d:0 ""Sister!" Daybreaker roared merrily, slamming her head through Jet Set's office wall, "have you heard the good news?"\n\n"What is it?" Nightmare Moon huffed, setting down her coffee. "You know I don't like being made to guess."\n\n"Your "loyal subjects" in Chiropterra have decried you as a false goddess, and have declared they will no longer follow you!"\n\nNightmare Moon froze, eyes burrowing into Daybreaker with steadily-building rage. "What?" Her voice was as cold as the moon's surface, but underneath boiled with enough anger to match its radiation levels. "You're lying."\n\n"Oh trust me, sister dear, I am most certainly not. In fact, there are several thousand Chiropterrans who have made the journey here because they disagree with their government!" Daybreaker's smile widened as she leaned forward, knocking another chunk out of the wall. "At least your followers aren't completely fickle, sister."\n\nJet Set watched with growing terror as Nightmare Moon's breathing rapidly sped up, then slowed to a steady pace. He had seen her act like this before, and it was an occasion he had hoped never to see again. "Y-your Majesty, if I may?"\n\nNightmare Moon glared at him. "Speak."\n\n"It is likely only the leadership that has abandoned you there. Please remember that the people are loyal to you."\n\nNightmare Moon exhaled, tension leaving her body. "You are right, Royal Secretary. A complete purge of Chiropterra will not be necessary." She glared at a snickering Daybreaker. "But that does not mean a purge will not happen. Sister, would you like to accompany me on a little... demonstration of divinity?""
evildiarchy_newmareland.1001.a:0 ""When I get my hooves on them, I'll paint the moon red.""

evildiarchy_random.1.t: "Новая мета?"
evildiarchy_random.1.d: "— Сестра моя... во имя предвечного Мрака, почто пред очи наши явлено сие непотребство? — безжизненным тоном осведомилась Найтмер Мун. — Мнится мне, что трата сия – лишь тлен и суетное расточительство ресурсов. Сколь драгоценных, столь и невосполнимых... — на последних словах её голос едва не сорвался, но она мастерски умела держать язык за зубами.\n\n— Ну как же, дорогая сестра, это же новая мета! — Дейбрейкер ухмыльнулась, вальяжно прохаживаясь перед выставленной техникой. — Посмотри на это чудо: БТР «Киллбауэр» MKIII. Тридцать миллиметров закалённой брони и шестиствольный сдвоенный пулемёт «Беллимер» на крыше. И не забудь, — она звонко хлопнула копытом по раскалённому металлу, — в эту крошку влезет целая куча пони!\n\nНайтмер Мун перевела на неё всё тот же невозмутимый взгляд:\n— ...А сии повозки, мечущие огненные стрелы? Что за причудливая реактивная артиллерия пред нами?\n\n— Запатентованные двенадцатиствольные пусковые установки «Баскервиль»! — ухмылка Дейбрейкер стала ещё шире. — В связке с «Киллбауэрами» они превратят нашу армию в неудержимый вихрь. Мы сомнём их порядки раньше, чем они успеют осознать масштаб катастрофы. Урон по пехоте будет просто сокрушительным!\n\n— Сдаётся мне, — промолвила Найтмер Мун, — что у воинства сего будет прискорбно низкая организация. И достанет ли нам «промки» на подобные причуды, о коих ты столь вдохновенно вещаешь?..\n\n— Это твои проблемы, сестра! — Дейбрейкер нетерпеливо тряхнула гривой. — Ты слишком глубоко увязла в таблицах. Иногда лучший шаблон рождается не из сухих цифр, а из чистого вдохновения! — она бросила лукавый, обжигающий взгляд на притаившегося в тени жеребца. — Скажи же и ты, наш верный секретарь... Разве это не само совершенство?\n\nДжет Сет побледнел, почувствовав на себе обжигающий взгляд обеих аликорнов."
evildiarchy_random.1.a: "— В теории... это может стать весьма... д-достойным решением..."
evildiarchy_random.1.b: "— М-может... н-нам стоит дождаться... б-более детальных отчётов и д-данных?.."

evildiarchy_random.2.t: "Мундир"
evildiarchy_random.2.d: "— МОНАРШИЙ СЕКРЕТАРЬ! — Джет Сет мысленно воззвал к небесам, когда Дейбрейкер буквально вынесла дубовые двери в его кабинет. — Мне требуются твои услуги. Немедленно!\n\n— Погоди-ка, сестра! — бедный пони вздрогнул, услышав, как Найтмер Мун с грохотом проломила сводчатый потолок (и чем ей не угодила дыра рядом, которую она оставила в прошлый раз?) и замерла в паре дюймов над его заваленным бумагами столом. — Мы условились, что предстанем пред взором сего смертного вдвоём!\n\n— Да-да, — Дейбрейкер пренебрежительно махнула копытом. — Я помню. Сейчас важно лишь то, чтобы ты взглянул на это, — золотистым магическим хватом она извлекла два комплекта униформы. — Нам известно, что ты мнишь себя великим знатоком стиля, а потому мы решили, что именно тебе надлежит разрешить наш... затянувшийся спор.\n\n— Тот, что по левое копыто – плод моих неустанных трудов, — проронила Найтмер Мун, величественно подплывая к сестре, — а сие безвкусное творение по правую сторону – её дерзкая затея. Выбирай с умом, секретарь. Твой взор должен быть проницателен и разумеется направлен в сторону верного выбора.\n\n— Ч-что ж, — Джет Сету доводилось видеть дни и поспокойнее... — И-из чего мне исходить при оценке? Практичности, эстетики или и того, и другого?\n\n— Практичность! — отрезала Дейбрейкер.\n\n— Эстетика! — возвысила голос Найтмер Мун.\n\nАликорны хором выдохнули и гневно воззрились друг на друга.\n\n— Нет, я сказала – практичность! — припечатала солнечная сестра, топнув копытом.\n\n— Нет же, безупречная эстетика, коя суть зеркало духа! — взрыкнула повелительница ночи в унисон с сестрой.\n\n— Мы уже это обсуждали! — выкрикнули они в один голос, стремительно сближаясь. — Мундиру важнее всего...\n\nДжет Сет откинулся на спинку кресла, размышляя о превратностях своей судьбы и краем уха следя за их перебранкой. Как всё к этому пришло? Два живых апокалипсиса превратили его в свою любимую игрушку. И чем он занят прямо сейчас? Выслушивает перепалку богинь из-за какого-то проклятого мундира? Он тряхнул головой, возвращаясь в реальность – кажется, дискуссия подходила к опасному финалу. В памяти всплыли обрывки их яростных аргументов: внешнее величие должно внушать трепет врагам, рвение соратникам и благоговение обывателям... против маскировочных свойств, надёжной фурнитуры и, собственно, удобства в марш-броске. Обмен колкостями по поводу стиля продолжался, но...\n\n— Ну же, секретарь? — одновременный окрик богинь прервал его грёзы. — Чьё величие неоспоримо?!\n\nНесмотря на всю тяжесть своего положения, Джет Сет не смог сдержать мимолётной внутренней улыбки. Перед ним были два почти божественных существа, но в глубине души – вопреки всему – они всё ещё оставались сёстрами."
evildiarchy_random.2.a: "Вариант Дейбрейкер выглядит куда практичнее."
evildiarchy_random.2.b: "Я отдаю предпочтение изяществу мундира Найтмер Мун."

evildiarchy_random.3.t:0 "Вечная ночь"
evildiarchy_random.3.d:0 "Телефоны полицейских участков разрывались от звонков паникующих горожан, генералы умоляли правительство хоть о каких-то новостях, а метеорологи пребывали в полной прострации, пытаясь понять, как случившееся отразится на их прогнозах. Несмотря на то, что на часах было всего 14:55, небо снаружи было чёрным, как в самую глухую полночь.\n\n— НАШИ ПОДДАННЫЕ! — Найтмер Мун звучно выступала перед толпой фестралов, собравшихся у здания оперного театра в городе [356.GetName]. — Мы наконец-то исполнили своё обещание, данное тысячу лет назад! Слишком долго верные Нам были вынуждены скрываться в тенях и чахнуть в пещерах, пока неблагодарные существа этого мира нежились в лучах солнца! Пробил час триумфа созданий ночи! Настало время для процветания тех, кто помнит свою истинную богиню! Сим Мы провозглашаем, что сия ночь будет длиться вечно!\n\nУ Джет Сета подкосились ноги, когда он услышал бахвальство аликорна. Но всё же шок от осознания случившегося был слишком силён. Ноги пошатнулись, сознание начало меркнуть, но в последние мгновения ему показалось, будто Найтмер Мун посмотрела на него с беспокойством. Но этого не могл...\n\nПрежде чем Джет Сет успел закончить мысль, его тело с глухим стуком рухнуло на мостовую."
evildiarchy_random.3.a:0 "Добром это не кончится."

evildiarchy_random.4.t:0 "Усмирение гнева"
evildiarchy_random.4.d:0 "— Сестра, не соизволишь ли объяснить причины того, ПОЧЕМУ НЕБО СТАЛО ЧЕРНЕЕ СМОЛИ?! — взревела Дейбрейкер, влетая в окно кабинета Джет Сета и снова разнося оконную раму в щепки. — Изволь пояснить: почему ты не соблюдаешь условия нашего договора?\n\n— Прошу прощения? — прошипела Найтмер Мун, нехотя отрываясь от налоговых документов, которые она с упоением изучала. — Мы в Своём праве! Ибо, как истинная богиня сего мира...\n\n— Немедля опусти луну, ЛУНА! — оборвала её Дейбрейкер. — Мы думали, что ты повзрослела, но очевидно, что так и осталась маленькой кобылкой!\n\n— Не Моё это имя, СЕЛЕСТИЯ! — огрызнулась в ответ Найтмер Мун, обнажив клыки. — Неужто ты возомнила себя превыше других? Ведь на деле всего лишь...\n\n— П-пожалуйста, — заикаясь, вклинился Джет Сет, поймав на себе яростные взгляды обеих аликорнов. — В-ваши Величества, в-вспомните, почему вы согласились работать вместе. П-подобные распри лишь мешают вашему возвращению в Эквус!\n\nНайтмер Мун оскалилась. — Ты, червь, смеешь прерывать Нас и указывать, что Нам делать? Ах ты наглый щенок, ты забываешься...\n\n— Сестра, молвит истину он, — процедила сквозь зубы Дейбрейкер. — Сейчас должны Мы действовать сообща, дабы скорейше вернуться в Эквестрию.\n\nНайтмер Мун на мгновение сузила глаза, глядя на Джет Сета, который едва снова не лишился чувств, но затем фыркнула и отвернулась.\n\n— Что ж, да будет так. Раз это необходимо для возвращения на Наш законный престол, Мы повелеваем временно отложить приход вечной ночи, — она сердито взглянула на Дейбрейкер, пока покорная её воле луна медленно уходила за горизонт. — Довольна, сестрица?\n\nДжет Сет наблюдал, как Дейбрейкер коротко кивнула и, развернувшись, пробила новую дыру в стене кабинета на вылете. Он рухнул в кресло, пытаясь унять бешено колотящееся сердце."
evildiarchy_random.4.a:0 "Неужели сработало?"

evildiarchy_random.5.t: "Великое изваяние"
evildiarchy_random.5.d: "Строительство этого исполинского монумента в самом сердце Сансета растянулось на долгие месяцы – на редкость неспешная затея для империи, которая обычно не страдала бюрократическим параличом. Горожане шептались, что стройку тормозила прежде всего параноидальная секретность: площадку обнесли глухой стеной, превратив часть центра города в зону отчуждения. День за днём обыватели проходили мимо, гадая, какой колосс растёт за забором, пока стройка не примелькалась, став привычной деталью пейзажа, и в итоге о ней попросту забыли.\n\nДаже в министерских кабинетах царило неведение. Чиновники, как бы высоко ни возносила их иерархическая лестница, только пожимали плечами. Возможно, они лишь притворялись неосведомлёнными, но в народе ходили слухи, что даже Джет Сет, вечно погружённый в бумаги диархии, не знал, кто стоял у истоков проекта и к чему он в итоге приведёт.\n\nИ вот в один прекрасный день стены исчезли. Посреди площади, в плотном кольце гвардейцев, высилась статуя – огромная и пока ещё надёжно укрытая полотном. Она была выше многих окрестных зданий, а судя по тому, как в отдельных местах её поверхность ослепительно вспыхивала в лучах полуденного солнца, отлили её из чистого золота. Или, по крайней мере, покрыли толстым слоем позолоты, хотя, зная непомерное эго своих правительниц, жители Нового Мейрленда сомневались, что те стали бы размениваться на позолоту.\n\nНо загадка лишь множилась. Под тканью угадывался силуэт одинокого аликорна – это было очевидно. Но чьего? Ответ должен был прозвучать сегодня перед многотысячной толпой, забившей площадь до отказа.\n\nКо всеобщему удивлению, ни одна из Императриц на церемонии не появилась. И как раз в тот момент, когда по толпе поползли тревожные шепотки, к монументу подошёл гвардеец и без лишних церемоний сорвал покрывало. Мгновение спустя стало ясно, почему никто не счёл нужным устраивать пышное представление: перед ними предстало нечто настолько величественное и самовлюблённое, что оно не просто говорило – оно ревело о своём триумфе.\n\nЧьё же грозное лико, застывшее в безупречном металле, возвышается теперь над городом, требуя поклонения?"
evildiarchy_random.5.a: "Грандиозное изваяние Дейбрейкер."
evildiarchy_random.5.b: "Прекрасная статуя Найтмер Мун."

evildiarchy_random.6.t:0 "Лучшая танковая дивизия в истории"
evildiarchy_random.6.d:0 "— УЗРИ! — Джет Сет отпрянул, когда гигантский танк проломил стену кабинета и явил его взору восседающую на броне торжествующую Найтмер Мун. — Монарший секретарь, ты удостоен чести лицезреть НАШ НОВЕЙШИЙ ШЕДЕВР!\n\nДжет Сет замер в оцепенении. И не потому что дуло этой дуры смотрело прямо на него. Нет, танк не удерживался магией... Но ведь его кабинет расположен на четвёртом этаже... Он осторожно выглянул в пролом: да, корма машины буквально висела в воздухе. Безо всякой опоры.\n\n— СЕКРЕТАРЬ! — безумно расхохоталась Найтмер Мун. — Мы знали, что ты зорок и наблюдателен! Не можешь налюбоваться плодами НАШЕГО гения? Сей красавец – бронированный штурмовой танк PK-FHxGVI модели «НММ»! С 250-миллиметровой бронёй, 130-миллиметровым орудием и самым мощным двигателем, какой только можно найти за пределами флота! Мы также жаждали сделать сразу одиннадцать стволов, чтобы явить миру настоящую МОЩЬ, но к сожалению конструкция уже была перегружена, поэтому мы оставили как есть. Он сокрушит любых НАШИХ врагов! Генералы уже видели его и лишились дара речи от восторга! — она уставилась на Джет Сета с неожиданно искренней улыбкой. — Ну, что скажешь?\n\n— ...Как вы затащили его сюда?\n\n— Пфф, аликорна не заботят мелочные ограничения физики! — фыркнула Найтмер Мун. — А теперь просто яви свои мысли касательно сия орудия! Мы задумали спустить на недругов целую дивизию таких машин не только по воздуху, но и на земле в самое ближайшее время, так что молви свой положительный ответ немедленно!\n\nВнезапно дверь в кабинет распахнулась.\n— Секретарь, — раздался сонный голос Дейбрейкер, — у меня было дело к... ПРЕСВЯТЫЕ МЫ, ЧТО ЗДЕСЬ ПРОИСХОДИТ?!\n\nДжет Сет обернулся и увидел аликорна с чашкой чая, в ужасе созерцающую опасно кренившийся танк. У него окончательно "съехала крыша", и мозг просто выдал первую попавшуюся чушь.\n— ...Северное сияние?\n\n— С-северное сияние?! В это время года? В этой части Империи? Воплотившееся в форме танка?!\n\n— ...Да.\n\nДейбрейкер перевела взгляд с Найтмер Мун на Джет Сета, вздохнула и отхлебнула чаю.\n— Насколько же всё это глупо... Сестра, немедля убери сию консервную банку, Мы уже слышим, как глохнет мотор этой презренной железяки вместе с ушами секретаря.\n\n— Сестрица моя, не тебе это решать это! — зарычала Найтмер Мун. — Пусть Наш монарший секретарь провозгласит своё суждение, рассудив сей мелочный спор!\n\n— Верно, — Дейбрейкер бросила на Джет Сета тяжёлый взгляд, — и Мы уверены, что он уже принял наивернейшее решение. Не так ли, секретарь?\n\nДжет Сет сглотнул, чувствуя, как взгляды обеих богинь буквально впиваются в него."
evildiarchy_random.6.a:0 "Выглядит... Потрясающе."
evildiarchy_random.6.b:0 "Может, всё-таки не стоит?"

evildiarchy_random.7.t:0 "Вопрос о наименовании"
evildiarchy_random.7.d:0 "— В этом названии слышится явный перекос в твою пользу, сестрица! — отрезала Найтмер Мун, расхаживая по кабинету Джет Сета, залитому бледным лунным светом, проникающим сквозь подозрительно напоминающую силуэт Найтмер Мун дыру в стене. — Как и всегда! Ты даже море пытаешься объявить своей собственностью!\n\n— Сие название лишь отдаёт дань уважения законной правительнице! — огрызнулась в ответ Дейбрейкер. — То есть Мне.\n\n— О, молю тебя, умерь нарциссизм! — крылья Найтмер Мун раскрылись, а рог зловеще засветился. — Клянусь, ты ведёшь себя словно избалованная кобылка, вечно требующая то, что есть у других жеребят, просто потому что ты несносная маленькая су...\n\n— В-ваши Величества, — сумел заговорить Джет Сет, едва удерживаясь от того, чтобы не забиться под стол. — П-позвольте мне вставить словечко?\n\n— Молви, — прошипела Найтмер Мун, — пока Мы не показали одной наглой пони, где морские пони зимуют.\n\n— Н-название Сансет происходит от имени основателя города, Сансет Хорайзона, — пролепетал Джет Сет. — Кроме того, я полагаю, оно очень удачно служит знаком единства между вами обеими. Прекрасная встреча дня и ночи, демонстрирующая ваш общий потенциал, когда вы работаете в гар... то есть в унисон.\n\nНайтмер Мун откинулась назад, раздумывая. — ...Да, теперь Мы понимаем, почему Мы сделали тебя нашим секретарём. Ты, на удивление, весьма умён и проницателен.\n\n— Благодарю вас, Ваше Величество, но уверяю вас, с вами по остроте ума мне не сравниться.\n\n— Ещё и скромный! — рассмеялась Дейбрейкер. — Что ж, верно. Сим Мы повелеваем провести более... подобающее обсуждение названия. У тебя есть возражения, сестра?\n\nНайтмер Мун усмехнулась. — Никаких."
evildiarchy_random.7.a:0 ""Миднайт" звучит гордо."
evildiarchy_random.7.b:0 "Текущий вариант неплох."

evildiarchy_random.8.t: "Собственная ученица"
evildiarchy_random.8.d: "— Сестра моя и ты, монарший секретарь, внемлите! — голос Найтмер Мун заполнил кабинет Джет Сета, где проходило их еженедельное «стратегическое совещание».\n\nНа деле же это было обычное чаепитие – привычка, сохранившаяся от их прежних воплощений, от которой они всё ещё не желали или не могли избавиться. Пока что.\n\n— Узрела я в тишине ночной, что настала пора и мне обрести достойную ученицу.\n\n— Ученицу? — Дейбрейкер взглянула на сестру поверх чашки. — Полагаю, Повелительнице Ночи пристало иметь заботы и посущественнее. До меня доходили вести, что мануфактуры в Новом Мейрленде опять не справляются с нормой выработки.\n\n— Джет Сет уладит сии бренные хлопоты в промежутке между делами, — Найтмер Мун пренебрежительно махнула копытом. — Но что истинно не терпит отлагательств, так это исправление вопиющей несправедливости! У тебя, сестра, есть Твайлайт Спаркл – пусть она ныне и строптивничает. Будет честно, если и у меня появится собственная протеже.\n\n— Справедливо... — Дейбрейкер кивнула. — Я понимаю твоё страстное желание обладать тем же, что есть у меня, сестра. С тобой это случается... часто.\n\nСолнечная аликорна позволила себе тонкую, ядовитую усмешку, заметив, как на мордочке Найтмер Мун на мгновение промелькнул хищный оскал. Джет Сет, похолодев, переводил взгляд с одной богини на другую.\n\n— Ваше Величество, вы... вы уже определились с кандидатурой? — подал он голос, отчаянно пытаясь разрядить сгустившуюся атмосферу.\n\n— О да, разумеется! — Найтмер Мун обнажила клыки в торжествующей улыбке. — Видишь ли, я навела справки. Оказывается, одна из подруг дражайшей ученицы моей сестры перебралась в Новый Мейрленд ещё до нашего... преображения. Её имя – Мунденсер, и она весьма начитанная особа. И хотя в магии ей, кажется, недостаёт природной искры, теорию она постигла блестяще. Уверена, я сумею выковать из неё по-настоящему сильную единорожку.\n\n— О, вот оно что, хитрый ход! — Дейбрейкер приглушённо рассмеялась. — Дай угадаю: она также будет выступать в роли... заложницы? Для гарантии лояльности Твайлайт?\n\n— Оставь сии низменные помыслы! — захохотала Найтмер Мун, и тени в углах кабинета качнулись. — Она станет моей ученицей по доброй воле. Совершенно добровольно!\n\nДейбрейкер откинулась на спинку кресла, заходясь в ласковом, но пугающем смехе:\n— О, чудесно, сестра! Развлекайся. Мне не терпится увидеть, сможет ли твоя воспитанница хотя бы приблизиться к высотам моей. Я буду милостива: если она станет ровней Сансет Шиммер, я, пожалуй, признаю твоё первенство!\n\nДжет Сет молча наблюдал за тем, как две богини зашлись в приступе жутковатого хихиканья. В груди у секретаря росло тяжёлое, давящее чувство."
evildiarchy_random.8.a: "Бедная, бедная кобыла."

evildiarchy_newmareland.nmm_reset_1.t: "Найтмер Мун отвергает командование"
evildiarchy_newmareland.nmm_reset_1.d: "Найтмер Мун самовольно оставила пост командующей армией. Своё решение она объяснила тем, что негоже Ей тратить время на столь мелкие задачи, ибо таланты Её найдут достойное применение лишь в командовании целой группой армий."
evildiarchy_newmareland.nmm_reset_1.a: "Вот как..."

evildiarchy_newmareland.db_reset_1.t: "Дейбрейкер отвергает командование"
evildiarchy_newmareland.db_reset_1.d: "Дейбрейкер самовольно оставила пост командующей армией. Своё решение она объяснила тем, что негоже Ей тратить время на столь мелкие задачи, ибо таланты Её найдут достойное применение лишь в командовании целой группой армий."
evildiarchy_newmareland.db_reset_1.a: "Вот как..."


######### Equestria events ############

evildiarchy_equestria.1.t:0 "Рэйвен Инквелл зовёт на помощь"
evildiarchy_equestria.1.d:0 "Принцесса Дружбы появилась во вспышке розовой магии. — Рэйвен! Что случилось? Селестия сказала мне, что они с Луной отправятся в Новый Мейрленд на неделю, а ты остаешься за главную в замке до их возвращения. Но, я не ожидала увидеть твоё срочное послание, поэтому прибыла сразу как только смогла.\n\n— Твайлайт! Хвала Селестии, ты здесь. Или, может, не совсем ей... я уже не знаю, что и думать. Этим утром я получила телеграмму от Джет Сета – ну, губернатора Нового Мейрленда – и... Селестия и Луна... они уже не те, что прежде! Он пишет, что они как-то... преобразились... в Найтмер Мун и... Дейбрейкер? — голос Рэйвен Инквелл дрогнул, она заметно дрожала. Её привычное бюрократическое хладнокровие окончательно испарилось. — Что нам теперь делать, Твайлайт?\n\n— Найтмер Мун, говоришь? Луна снова преобразилась? Но как? Почему? Неважно, сейчас нет времени обсуждать детали. Мне нужно собрать Элементы Гармонии. Вместе мы уже побеждали Найтмер Мун, так что опять же вместе сделаем это снова!\n\n— Погоди! — выкрикнула Рэйвен Инквелл. — Не только Найтмер Мун! Джет Сет пишет, что Селестия тоже изменилась. Он не сообщил подробностей, но, похоже, они обе трансформировались, Селестия знает как! — кобыла осеклась, осознав сказанное. — Наверное, мне стоит перестать так выражаться.\n\n— Обе? Это крайне тревожно. Не представляю, как нам всё исправить, если они обе сошли с ума. Элементы Гармонии могут справиться только с одним аликорном! Нам нужно выяснить, что произошло, и чего они хотят. Похоже, пока сёстры решили задержаться в Новом Мейрленде? Но боюсь, это ненадолго, — Твайлайт принялась рысить кругами. — Дейбрейкер... Дейбрейкер... где же я слышала это имя? Может, в какой-то книге? Мог ли Старсвирл Бородатый знать что-то о ней? — она внезапно остановилась, врезавшись в секретаршу. — А хотя нет, о чём я вообще? Дейбрейкер... Старлайт Глиммер рассказывала мне о ней! Злая версия Селестии! Я и не знала, что она реальна, — Твайлайт обернулась. — Рэйвен, никуда не уходи, я сейчас оповещу остальных носительниц элементов гармонии. И пока что никому ни слова. Я вернусь как только смогу."
evildiarchy_equestria.1.a:0 "Последовала ещё одна розовая вспышка, и Рэйвен Инквелл осталась в одиночестве."

evildiarchy_equestria.2.t:0 "Карта знаков отличия"
evildiarchy_equestria.2.d:0 "Как только Твайлайт Спаркл телепортировалась домой, она почувствовала знакомый зуд – Древо Гармонии призывало её. И, судя по всему, не её одну, так как у Карты знаков отличия её уже ждали Спайк и остальные пятеро носительниц элементов. Но было кое-что странное: обычно Карта просто указывала место проблемы и, возможно, тех, кто должен отправиться на помощь, но на этот раз сияла вся Эквестрия.\n\nЭпплджек указала копытом на карту: — Твайлайт, ты понимаешь, в чём дело? Я тут как раз спорила с Рэйнбоу Дэш, но это же какая-то ошибка, верно? Я имею в виду, как это Древо ожидает от нас спасения всей Эквестрии разом? Не то чтобы мы раньше такого не делали, но сейчас эта карта – самая бесполезная вещь, что я видела в своей жизни.\n\n— Могу только догадываться. Считанные минуты назад меня вызвала Рэйвен и сообщила, что Селестия и Луна... они обе преобразились! Вы помните Старлайт Глиммер и её кошмар? Тот, где Селестия превратилась в Дейбрейкер и сражалась с Найтмер Мун? Если Рэйвен права, то вся Эквестрия в опасности. И, возможно, именно поэтому светится вся карта.\n\n— Ну и как нам тогда это исправить? Древо могло бы немного помочь и хотя бы подсказать, с чего начать, разве нет? То, что оно подсветило вообще всё, на мой взгляд, не особо-то помогает.\n\n— Погодьте, — вмешалась Рэйнбоу. — Селестия и Луна превратились в своих злых двойников, а мы ничего не заметили? Как такое вообще возможно? Это же должна была почувствовать вся страна. И разве они не сражались друг с другом в том сне Старлайт? Ну, когда ещё Дейбрейкер вела себя столь заносчиво?\n\n— Не знаю! Я не вижу всей картины целиком, только отдельные фрагменты. Селестия и Луна отправились с визитом в Новый Мейрленд, а потом Рэйвен Инквелл получила телеграмму от губернатора. Полагаю, мы не почувствовали магического всплеска просто потому, что это случилось слишком далеко. Но это не отменяет опасности, да и Древо тоже утверждает, что у Эквестрии проблемы. А пока мне нужно, чтобы вы все отправились со мной в Кантерлот: я не могу оставить Рэйвен одну, пока мы ищем решение."
evildiarchy_equestria.2.a:0 "Будем надеяться, что во всём разберёмся – и быстро."

evildiarchy_equestria.3.t:0 "Чрезвычайный совет"
evildiarchy_equestria.3.d:0 "Шесть носительниц элементов гармонии вместе со Спайком и крайне обеспокоенной Рэйвен Инквелл собрались в тронном зале кантерлотского замка. Ещё мгновение назад Рэйнбоу Дэш читала Рэйвен лекцию о крутости элементов – видимо, в тщетной попытке успокоить единорожку – пока Рарити её не остановила.\n\n— Я полагаю, — начал Спайк, — теперь ты правящая принцесса Эквестрии, Твайлайт? Селестия и Луна сошли с ума, Каденс и Фларри Харт в Кристальной Империи... так что кроме тебя других кандидаток нет, — Рэйвен слегка кивнула и поклонилась. Она настолько успокоилась, что к ней вернулась привычная бюрократическая выправка. Остальные пятеро пони последовали её примеру.\n\n— Сейчас не время для принцесс, Спайк! — резко ответила Твайлайт. — И вы пятеро, вы же мои подруги, вам вовсе незачем мне кланяться! Нам в копыта свалилась проблема дружбы просто планетарного масштаба. Как я могу просто сидеть на этом троне и править Эквестрией? Нужно вернуться к Древу Гармонии, чтобы понять смысл карты знаков отличия. А после нам понадобятся все элементы, чтобы превратить Дейбрейкер и Найтмер Мун обратно в Селестию и Луну – если, конечно, мы поймём, как это сделать.\n\n— Но ты же единственная оставшаяся аликорн, дорогуша, — возразила Рарити. — Кто ещё сможет управлять Эквестрией? Пони нужна принцесса.\n\n— Мы должны решить это вместе. Как подруги! Вшестером... — Спайк демонстративно откашлялся, — ...то есть всемером мы сформируем чрезвычайный совет для управления Эквестрией. Это непросто, но необходимо. Рэйвен, без твоей помощи нам никак не обойтись, потому что нам шестерым... то есть семерым, вероятно, придётся отправиться в далёкие земли или заниматься другими делами. Ты согласна, Рэйвен? — единорожка кивнула. — Тогда решено. Мы подготовим радиообращение к гражданам Эквестрии как можно скорее. Спайк, займёшься этим? — дракон отсалютовал. — Мы с Рэйвен попробуем разузнать больше деталей у Джет Сета. А вы пятеро... управление Эквестрией параллельно с нашей миссией потребует всех доступных сил, так что, пожалуйста, посмотрите, чем вы можете помочь правительству."
evildiarchy_equestria.3.a:0 "Только бы избежать массовой паники."

evildiarchy_equestria.4.t:0 "У Древа гармонии – Часть I"
evildiarchy_equestria.4.d:0 "— Так, давайте-ка докопаемся до сути.\n\nТвайлайт расправила крылья и спустилась в пещеру, где росло Древо гармонии. Позади она услышала звонкое "И-и-и-ха!" Эпплджек, которая галопом неслась вниз по ступеням. Вскоре вся шестёрка стояла у входа в пещеру, откуда изливался ослепительный свет.\n\n— Не припоминаю, чтобы оно сияло так ярко, — прошептала Флаттершай. — Как... как вы думаете, это не опасно, Твайлайт? Может, нам стоит вернуться к карте и поискать ответы у неё?\n\n— Да брось, Флатти. Нет причин пугаться какого-то дерева. Оно всегда нам помогало, разве нет? — Рэйнбоу Дэш зависла в воздухе, лениво взмахивая крыльями. — Твайлайт, одно твоё слово – и ворвёмся в эту пещеру!\n\n— Не нужно никуда нестись, сломя голову, — ответила Твайлайт. — Но нам действительно стоит подойти к Древу. Мы уже достаточно изучили карту, и, кроме того что она подсветила всю Эквестрию, никаких новых зацепок не получили. Нет, нам нужно навестить само Древо. Но с должной осторожностью, Рэйнбоу.\n\nПони вошли в пещеру. Древо Гармонии сияло, а камни Элементов вибрировали. Но это было не единственное изменение со времени их последнего визита: на Древе выросла новая ветвь, образовав некое подобие подставки. На ней покоился сияющий шар, словно созданный из чистой магии. Твайлайт подошла поближе и осмотрела предмет со всех сторон. Внутри шара плясали искры магии, из-за чего он походил на миниатюрное солнце."
evildiarchy_equestria.4.a:0 "Она слегка коснулась шара своим рогом."

evildiarchy_equestria.5.t:0 "У Древа гармонии – Часть II"
evildiarchy_equestria.5.d:0 "Как только рог Твайлайт коснулся магического шара, она почувствовала, как копыта отрываются от земли. Она смутно видела, как её друзей точно так же поднимает вверх: Древо устанавливало связь с Элементами Гармонии. Мысли закружились в голове, и Твайлайт уже не могла отличить собственные чувства от того, что показывало Древо – перед её глазами замелькали образы Кантерлота, Селестии, Понивилля, её друзей и Спайка. Она вспомнила День Согревающего Очага, Школу Дружбы и великое множество приключений и заданий, на которые Карта знаков отличия посылала её с подругами. Вот чем была для неё Эквестрия – душой нации, истинным смыслом гармонии. И Твайлайт была готова защищать её всеми силами.\n\nРаздался мягкий хлопок, и Твайлайт почувствовала, как её окатило волной магии. В отличие от многих иных заклинаний, это не заставило её пошатнуться – напротив, поток был приятным и комфортным, словно светлая мысль. Когда сияние погасло и Твайлайт вновь коснулась земли, она открыла глаза как раз вовремя, чтобы увидеть стремительно расширяющийся купол щита. Совсем скоро он накроет всю Эквестрию.\n\nГолос Эпплджек вырвал её из раздумий. — Э-э, Твайлайт, ты-то хоть поняла, что щас было? Буду с тобой честна, сахарок, как на духу: если мы хотим одолеть Найтмер Мун или Дейбрейкер, то должны встретиться с ними, понимаешь? Ну, или так мне кажется.\n\nТвайлайт покачала головой. — О нет, победить их будет весьма непросто. И я не думаю, что на этот раз нам хватит одних лишь Элементов Гармонии. Это... это был лишь первый шаг. Древо не могло предоставить нам решение всех проблем сразу, но при этом выиграло время, создав этот барьер. Я была права. Да, это защитное заклинание, но весьма необычное. Это щит гармонии, и Древу нужны были мы – Элементы Гармонии, чтобы завершить чары. Ну или так мне кажется. Обязательно загляну позже в библиотеку Старсвирла Бородатого – вдруг он писал о чём-то подобном."
evildiarchy_equestria.5.a:0 "Гармония защитит нас на какое-то время."

evildiarchy_equestria.6.t:0 "Обращение"
evildiarchy_equestria.6.d:0 "Твайлайт выходила на балкон кантерлотского замка так медленно, как только могла. Тем не менее, несмотря на все её старания, подруги умудрились "случайно" остаться позади. Не отстал лишь Спайк. Он, напротив, вышагивал впереди неё, больше походя на королевского стражника, чем на равноправного члена Чрезвычайного совета. Хуже того, подруги настояли на том, чтобы Твайлайт надела корону и подковы, подобающие принцессе. Она безмолвно вздохнула.\n\nНу хотя бы Спайк и Рэйвен подготовили отличную речь. — Дорогие граждане Эквестрии! Я обращаюсь к вам сегодня не как принцесса, но как член недавно сформированного Чрезвычайного совета. Как большинство из вас, вероятно, уже знает, нас постигла страшная трагедия: не только Луна вновь превратилась в Найтмер Мун, но и Селестия, что так долго правила этими землями в мире и согласии, преобразилась вслед за ней, став Дейбрейкер. Пока неясно, что послужило причиной этого и каковы их дальнейшие планы. На данный момент они захватили Новый Мейрленд, превратив его в оплот тирании. Если судить по всему тому, что они творят там, нам стоит страшиться дня их возвращения. Сёстры-аликорны более не представляют нашу заветную гармонию.\n\nТвайлайт сделала короткую паузу, чтобы набраться решимости. — Но не всё потеряно! Эквестрия сильна, а гармония трёх племён выстояла на протяжении тысячелетий. Сёстры могли пасть, но только не мы! В свете последних событий меня просили принять на себя обязанности правящей принцессы Эквестрии. Я отказалась. Я, Твайлайт Спаркл – Принцесса Дружбы. И в этой роли я попросила своих друзей сформировать правительство вместе со мной. Вы знаете их как носительниц Элементов Гармонии: Эпплджек воплощает Честность, Флаттершай – Доброту, Рэйнбоу Дэш – Верность, Пинки Пай – Смех, а Рарити – Щедрость. И, конечно же, Спайк, мой самый дорогой друг, который хоть и не является Элементом, но при этом множество раз выручал меня. Вместе мы сражались с королевой Кризалис, противостояли Тиреку и победили Найтмер Мун. Да, до сих пор нам приходилось иметь дело лишь с одним злым аликорном за раз, но не сомневаюсь, что вместе мы сможем дать отпор даже злой диархии, возникшей за океаном.\n\nОна сделала глубокий вдох. – Граждане Эквестрии! Вместе мы сможем преодолеть этот кризис. И под словом "вместе" я имею в виду не только Элементы Гармонии. Я имею в виду всех вас, жителей Эквестрии! Весь наш народ. Вместе мы найдём способ снять проклятие, павшее на сестёр!"
evildiarchy_equestria.6.a:0 "Гармония восторжествует!"

evildiarchy_equestria.7.t:0 "Проблеск надежды"
evildiarchy_equestria.7.d:0 "Носительницы Элементов Гармонии и Спайк собрались в тронном зале кантерлотского замка. Оба престола по личной (и очень настойчивой) просьбе Твайлайт пустовали. Вместо этого Спайк где-то раздобыл круглый стол, который они поставили прямо посреди зала. Все семеро членов Чрезвычайного совета выглядели на редкость измотанными. Последние недели выдались крайне напряжёнными: на них внезапно легла ответственность за жизнь всей страны, а из Нового Мейрленда тем временем приходили всё более тревожные вести.\n\n— Поверь-ка мне, Твайлайт, даже в самый разгар сбора яблок я не выматывалась так сильно, как за последние дни, — устало сказала Эпплджек. — Ума не приложу, как Селестия умудрялась справляться со всем этим в одиночку целую тысячу лет. Ведь нас целых семеро, а мы едва поспеваем.\n\n— У неё также была тысяча лет, чтобы всему научиться, — ответила Твайлайт. — К сожалению, у нас нет подобной роскоши. Древо гармонии дало нам щит, да... кстати, это потрясающая тема: я перерыла половину своей библиотеки, пытаясь выяснить, как Древо удерживает заклинание. Да и вообще, обычное ли это защитное заклинание или нечто более изощрённое? Мне определённо нужно проверить ещё несколько источников из сносок... О чём я? Ах да, Древо гармонии создало этот щит, но я подозреваю, что оно не будет защищать нас вечно. Если Дейбрейкер подобна Найтмер Мун – а я верю, что так оно и есть – их совместная мощь должна быть колоссальной. Они попытаются вернуться, а то и уже предпринимали попытки, и в какой-то момент им однозначно удастся пробить преграду. И тогда мы должны быть готовы.\n\n— И что же мы можем сделать? — испуганно спросила Флаттершай.\n\n— Я... я пока не знаю, — Твайлайт нервно махнула хвостом. — Нам нужно собрать друзей. Возможно, стоит отправить делегации в соседние страны, а ещё лучше – отправиться лично. Кажется, само Древо хочет, чтобы мы занялись миссиями дружбы. А пока мы готовимся к их прибытию, нужно найти способы укрепить оборону Эквестрии – как магическую, так и обычную. В какой-то момент нам придётся сразиться с сёстрами, — Твайлайт продолжила уже тише, а в голосе появились надрывные нотки. — Я лишь надеюсь, что в итоге мы всё же сможем их исцелить."
evildiarchy_equestria.7.a:0 "Часики тикают, Твайлайт."

evildiarchy_equestria.8.t:0 "Письмо от Джет Сета"
evildiarchy_equestria.8.d:0 "Дорогая Рэйвен,\n\nВ своей телеграмме я упоминал, что сёстры-аликорны назначили меня своим секретарём, но лишь спустя несколько дней службы я осознал, какая огромная ответственность легла на мои плечи.\n\nПроблема в том, что они яростно ненавидят друг друга. Не понимаю, как им изначально удалось прийти к перемирию, ведь сейчас они, кажется, только и ищут способ побольнее задеть друг дружку. Я бы сказал, что это выводит из себя, но не хотелось бы лгать. Я слишком напуган, чтобы злиться. Меня приводит в ужас сама мысль о том, что эти двое могут сорваться с цепи и вцепиться друг другу в глотки. Ведь в таком случае они почти наверняка уничтожат всё, что нам дорого. Не из злого умысла, а просто превратив остальной мир в сопутствующий ущерб во время своей вражды.\n\nИ потому я пишу это письмо, моля тебя о помощи. Мне нужно знать, как вести себя с павшими сёстрами, чтобы хоть как-то соответствовать их ожиданиям в призрачной надежде, что это поможет сдерживать их гнев. Понимаю, что это уже не те принцессы, которых ты знала, но, возможно, твои советы хоть как-то мне помогут.\n\nИзначально я планировал просить тебя лишь об этом. Однако, пока во время составления черновика, ко мне пришло осознание: я просто обязан сделать хоть что-то, чтобы остановить их. Сейчас над нашими шеями занесён меч палача, потому что рано или поздно они вторгнутся в Эквестрию, а я могу лишь выигрывать время.\n\nНо, быть может, мне всё же удастся как-то повлиять на ситуацию. Я занимаю уникальное положение, и хотя боюсь за свою жизнь и страну, всё же смогу что-то изменить. Я могу передавать информацию, любые сведения об этих двоих. Понятия не имею, как обстоят дела в Эквестрии, но молю тебя: пересылай всё, что я отправлю, Твайлайт Спаркл. Не знаю никого другого, кто мог бы придумать способ положить конец этому безумию.\n\nПожалуйста, Рэйвен, ты – наша единственная надежда."
evildiarchy_equestria.8.a:0 "Искренне твой, Джет Сет."

evildiarchy_equestria.9.t: "Ещё одно письмо от Джет Сета"
evildiarchy_equestria.9.d: "Библиотека кантерлотского замка всегда внушала трепет, но теперь её безмолвное величие казалось почти давящим. Книжные стеллажи уходили в бесконечную высь, храня в своих недрах пыльные фолианты, забытые манускрипты и свитки, видевшие зарю Эквестрии. Каждую свободную минуту Твайлайт проводила здесь, среди запаха старой бумаги и чернил, пытаясь разгадать природу Древа Гармонии и того немыслимого магического щита, что оно воздвигло. К несчастью, древние авторы скупились на подробности: о самом Древе были написаны лишь крупицы, а о его истинных пределах – и того меньше.\n\nВ дверях показался Спайк. Балансируя очередную чашку кофе на подносе, он негромко позвал:\n— Твайлайт? Можно тебя отвлечь? Рэйвен только что передала новости: пришло письмо от Джет Сета.\n\nТвайлайт оторвалась от книжки. Её глаза были красными от недосыпа.\n— Что там? В Новом Мейрленде что-то случилось?\n\n— Похоже, они пытались пробить щит снаружи, но потерпели крах, — Спайк поставил кофе на край заваленного книгами стола. — Ты сама продвинулась? Магия Древа должна быть запредельно могущественной, если в одиночку сдерживает натиск сразу двух аликорнов... Впрочем, я хотел сказать другое. Если верить Джет Сету, диархия сменила тактику. Теперь они одержимы поисками артефактов.\n\n— Артефактов?\n\n— Именно так. Логика у сестёр простая: раз уж щит не поддался грубой силе, они намерены выпотрошить руины Грифонии в поисках древних реликвий, чтобы приумножить свою мощь.\n\n— Это... это очень плохо. Пытаясь найти сведения о Древе, я перерыла горы книг не только об Эквестрии, но и обо всём Эквусе. О Грифонии информации меньше, но всё же... там повсюду разбросаны древние артефакты. Вспомни Короля Шторма – кем бы он был без своего посоха? Если диархия получит в свои копыта нечто подобное...\n\nОна резко поднялась, едва не опрокинув стопку книг.\n— Я... нет, мы должны что-то предпринять. Вместе. Раз они вознамерились сокрушить нашу защиту извне, мы обязаны укрепить её изнутри собственными реликвиями. В этих легендах, — она обвела копытом зал, — сокрыта великая магия.\n\n— И что, ты теперь собираешься поселиться здесь на ближайшие недели? — сочувственно вздохнул Спайк.\n\n— Нет. Я бы не успела прочесть всё это, даже если бы в моём распоряжении была вечность, что принадлежала Селестии. Нам нужна рабочая группа: лучшие умы и сильнейшие маги страны, — Твайлайт тяжело вздохнула, потирая виски. — Похоже, мне предстоит организовать ещё и это."
evildiarchy_equestria.9.a: "Быть может, нам стоит связаться с Дэринг Ду?"

evildiarchy_equestria.10.t: "Беседа с А. К. Йерлинг"
evildiarchy_equestria.10.d: "— Твайлайт Спаркл? Кажется, вы хотели со мной поговорить? — А. К. Йерлинг осторожно переступила порог помещения, которое прежде было тронным залом кантерлотского замка.\n\nТеперь же его былое величие тонуло в хаосе: каждый угол был забит штабелями отчётов, картами и ветхими фолиантами. В самом центре этого бумажного лабиринта за временным столом сидела фиолетовая аликорнша. Вид у принцессы дружбы был крайне изнурённым – казалось, она не спала с момента начала кризиса.\n\nТвайлайт вздрогнула и подняла взгляд:\n— А? Да... Э-э, добро пожаловать, Дэр... то есть, мисс Йерлинг. Простите за этот беспорядок. Как видите, сейчас на нас навалилось слишком много дел разом, — телекинезом она сдвинула стопку документов в сторону, освобождая гостье стул. — Ситуация критическая. Вы, несомненно, в курсе событий за океаном, где наши принцессы... преобразились в Дейбрейкер и Найтмер Мун. Однако они жаждут вернуться, и логика подсказывает, что щит не сможет защищать нас вечно.\n\nТвайлайт потёрла виски и продолжила:\n— Если этот день настанет, мы столкнёмся с такой концентрацией магии, какой мир ещё никогда не видел. По моим данным, диархия начала лихорадочные поиски древних артефактов в Грифонии. Они хотят приумножить свои силы, чтобы пробить щит одним ударом. Мы должны действовать на опережение.\n\nА. К. Йерлинг тяжело вздохнула и поправила очки:\n— Значит, вы вызвали меня не как скромного автора приключенческих романов, — она насторожила уши, оглядывая заваленный зал. — Здесь безопасно говорить?.. — получив короткий кивок, она сбросила маску вежливой писательницы: — Что ж, тогда забудьте про Йерлинг. Пришло время Дэринг Ду. Вы разгадали мой маленький секрет ещё много лет назад, так что к чему церемонии? В моих закромах полно зацепок, ведущих к реликвиям, которые я считала слишком опасными, чтобы их тревожить. Впрочем, кантерлотская библиотека – ресурс куда более мощный, чем мои скромные заметки.\n\n— О, в зацепках недостатка нет, — Твайлайт невесело усмехнулась. — История Эквестрии полна теней великих магов прошлого, создававших вещи, которые не должны были увидеть свет. Не говоря уже о наследии других народов нашего континента... Но книги лишь указывают направление. Мне нужен ваш опыт, Дэринг. Помогите превратить эти смутные намёки в успешные экспедиции.\n\nДэринг Ду хищно ухмыльнулась, и в её глазах промелькнул тот самый блеск авантюристки из книг:\n— Я сделаю всё, что в моих силах."
evildiarchy_equestria.10.a: "Из этого выйдет отличная серия книг. Если, конечно, мы выживем."

evildiarchy_equestria.11.t: "Ответ от принцессы Скайстар"
evildiarchy_equestria.11.d: "Дорогая Твайлайт!\n\nЯ была так счастлива получить твою весточку! Сейчас просто невозможно добиться внятных ответов, а мама – ну, ты же знаешь королеву Ново – даже если что-то подозревает, мне ничего не рассказывает. Так что было просто чудесно наконец-то узнать из первых уст, что там затеяли Дейбрейкер и Найтмер Мун и как вы со всем этим справляетесь.\n\nЯ сразу же побежала к маме спросить, могу ли я присоединиться к вашей борьбе, но, увы, она сказала твёрдое «нет». «У нас своих забот в Северной Зебрике хватает», – так она и отрезала. Представляешь? Тут буквально два поехавших аликорна на свободе, а она переживает из-за какого-то Кольтфагена! Но что поделать? Похоже, в обозримом будущем я заперта здесь, на горе Арис.\n\nНо ты писала про щит и про то, что вы ищете артефакты для его укрепления. Это заставило меня задуматься: чем мы, гиппогрифы, могли бы помочь? В итоге я всё-таки упросила маму отправить вам осколок «Жемчужины Трансформации». Это по-настоящему могущественная вещь, Твайлайт! Знаешь, то странное чувство, когда превращаешься из гиппогрифа в морского пони?.. Всё немного чешется. Но ты и сама помнишь: проходила же через это!\n\nО чём ещё написать? Я бы очень хотела сказать, что поддержу вас делом, но слова звучат пустовато, раз уж мама запретила мне приехать. И всё же я верю: вы во всём разберётесь. Вы одолели столько злодеев, одолеете и этих двоих. И я абсолютно с тобой согласна: мы должны попытаться вернуть прежних Селестию и Луну. Мама сомневается, но в последнее время она вообще во всём сомневается. В общем, сражайтесь, оно того стоит! Мы всем сердцем с вами!\n\nВсего самого наилучшего, принцесса Скайстар."
evildiarchy_equestria.11.a: "Гиппогрифы всё ещё наши друзья."

evildiarchy_equestria.12.t: "Необычный Кристаллинг"
evildiarchy_equestria.12.d: "Оставалось лишь надеяться, что этот Кристаллинг пройдёт спокойнее предыдущего, размышляла Твайлайт. Хотя едва ли что-то могло быть хуже разбитого Сердца и ледяного шторма... Она поймала себя на том, что тревожно косится на Фларри Харт, стоящую рядом. К счастью, племянница ничего не заметила. Юная аликорн заметно подросла, и, вопреки угрозе, нависшей над миром, они провели всё утро за играми. «Лучшая тётя на свете», – вспомнила Твайлайт: это был её старый девиз. Сейчас он казался каким-то выхолощенным, почти болезненным. Слишком много судеб теперь зависело от её решений. Глядя на Фларри, Твайлайт твёрдо решила пригласить её в Кантерлот: малышка уже не раз проявляла недюжинный ум.\n\nМерный перестук копыт вырвал её из раздумий. Кристальные пони плотным кольцом собрались вокруг Сердца. В этот раз древняя церемония проводилась не ради новорождённого – сегодня они укрепляли сам фундамент своей безопасности. Сердце Империи и щит Гармонии занимали удивительно схожие роли. Удастся ли им стать единым целым?\n\nСтоявшая подле неё принцесса Каденс произнесла краткую речь:\n\n— Дорогие мои кристальные пони! Сегодня мы собрались здесь для обряда Кристаллинга. Однако на сей раз мы не приветствуем нового члена нашей семьи – мы взываем к Кристальному Сердцу, дабы оно защитило нас от тьмы и пламени, охвативших мир. Вы знаете правду: те, кого мы чтили как Селестию и Луну, ныне стали Дейбрейкер и Найтмер Мун – тиранами, желающими склонить весь мир к своим копытам. Но принцесса дружбы, — она положила копыто на плечо Твайлайт, — и Элементы Гармонии воздвигли над нашими землями щит, преградивший путь деспотам. Теперь наш черёд внести свой вклад. Обратимся же к Кристальному Сердцу! Пусть его свет переплетётся с полотном щита, укрепляя нашу общую мощь так же, как крепка наша связь с Эквестрией!\n\nКристальные пони склонились в едином порыве. Сердце взмыло ввысь, вращаясь в неистовом танце света. Твайлайт почувствовала, как по её телу прошла мощная волна тепла, а высоко в небе она увидела, как магия Сердца вплетается в полотно щита, раскинувшегося до самого горизонта. Преграда стала плотнее, надёжнее, словно напитавшись самой любовью и надеждой северного народа."
evildiarchy_equestria.12.a: "Мы встретим врага вместе."

evildiarchy_equestria.13.t: "Вихрь идей"
evildiarchy_equestria.13.d: "— Это просто крутотень!\n\nФларри Харт восторженным вихрем носилась под сводами кантерлотской библиотеки, то и дело пикируя с одного постамента на другой. За неимением более надёжного хранилища Твайлайт приказала свозить найденные реликвии сюда. Одни артефакты открыто сияли на пьедесталах, другие, наиболее непредсказуемые, покоились в сейфах под бронированным стеклом и магическими печатями. Твайлайт Спаркл следовала за племянницей по пятам, всерьёз опасаясь, что юная аликорн может случайно что-нибудь активировать.\n\nВнезапно Фларри замерла в воздухе и резко обернулась к тёте, едва не задев крылом стеллаж:\n— Послушай, ты ведь всё-всё про них знаешь, да? Как они работают? Тётя Твайлайт, а с их помощью можно устроить по-настоящему большой «кабум»?! — она замахала крыльями с такой силой, что принцессу дружбы едва не сдуло.\n\n— Нет... то есть, они не совсем для этого, — ответила та. — Мы изучаем их, чтобы укрепить щит Гармонии. Ты ведь видела его в небе? Он закрывает собой всю Эквестрию и Кристальную Империю.\n\n— Ну да, видела, — Фларри небрежно махнула копытом, явно разочарованная скучным ответом, — но в книжках про Дэринг Ду у каждой такой штуковины есть супер-пупер способности! Значит, и эти умеют что-то крутое, правда же?\n\n— Полагаю, что так, — Твайлайт задумчиво потёрла подбородок, — но чтобы раскрыть их потенциал, требуются годы исследований, колоссальные средства, усилия лучших умов и...\n\n— Ой, да разберёмся! Я тебе во всём помогу, честное аликорнье!\n\nТвайлайт ответила не сразу. Разумеется, от гиперактивного жеребёнка помощи в лабораториях ждать не стоило, но сама мысль заставила её замереть. Эти артефакты... Действительно, почему она видит в них лишь батарейки для щита? Эквестрия на пороге войны, и магические технологии прошлого могут найти куда более широкое применение. Нужно связаться с профессорами из школы для одарённых единорогов. И, конечно, задействовать кантерлотский центр магических исследований – тот самый, что Селестия когда-то построила специально для неё...\n\nТвайлайт уже начала мысленно набрасывать план мобилизации научного сообщества, но её размышления прервала Фларри, которая снова куда-то умчалась, явно заскучав рядом с невнимательной тетей."
evildiarchy_equestria.13.a: "— Фларри, стой! Вернись немедленно!"

evildiarchy_equestria.14.t: "Зов карты дружбы"
evildiarchy_equestria.14.d: "Рэйнбоу Дэш зависла над сияющей поверхностью карты, нахмурив брови.\n— Да уж... Весь Эквус полыхает. Похоже, на всём континенте не осталось ни одного угла, где не было бы проблем с дружбой.\n\nТвайлайт, понуро осевшая в кресле, махнула копытом:\n— У нас у всех сейчас проблемы с дружбой, Рэйнбоу. И я бы сказала, что наш масштаб бедствия куда больше, чем у любого другого народа. Но мы все в одной лодке. Не стоит тешить себя иллюзиями, будто Найтмер Мун или Дейбрейкер остановятся на границах Эквестрии, когда дело дойдёт до крайности. Карта пытается донести до нас именно это, — она тяжело вздохнула, потирая виски. — Были же времена, когда мы решали по одной маленькой проблемке за раз...\n\n— И впрямь, нынче всё навалилось скопом, — заметила Эпплджек, поправляя шляпу. — Как бы там ни было, сахарок, нам вовсе не обязательно таскаться на все эти задания всей гурьбой. Я, к примеру, могу потолковать с бизонами. Всё равно собиралась проведать родню в тех краях.\n\n— А я отправлюсь к якам! — Пинки Пай восторженной пружиной заскакала по комнате. — В конце концов, я их официальный посол дружбы! Давненько я не видела принца Резерфорда!\n\n— Я... я бы хотела навестить полярных медведей, — тихо проговорила Флаттершай. — Давно мечтала там побывать. Говорят, на севере есть леса, куда ещё не ступало копыто пони... Только представьте, сколько там редких зверей, которым нужна забота...\n\n— Что? Нет, это я пойду к медведям! — бесцеремонно перебила её Рэйнбоу Дэш, сделав мёртвую петлю под потолком. — Они же огромные, сильные и просто запредельно крутые! Им нужна по-настоящему боевая пони, чтобы их впечатлить, и этой пони буду я!\n\nТвайлайт наморщила нос:\n— Наверное, лучше будет разбиться на пары, как мы делали раньше. И не думайте, что эти миссии будут лёгкими. У нас всего одна попытка, и нам придётся уладить их местные конфликты, если хотим, чтобы наш план сработал. У меня где-то припрятаны наработки для уроков дружбы Старлайт, если они пони-будь понадобятся. Раз уж мы делим задачи... я отправлюсь на север. Мне нужно увидеть брата. И Каденс с племянницей. Спайк пойдёт со мной."
evildiarchy_equestria.14.a: "Будем надеяться, нам удастся склонить всех на нашу сторону."
evildiarchy_equestria.14.a_tt: "§RМы должны сплотить народы Эквуса узами дружбы, прежде чем павшие богини перейдут в наступление.§!"

evildiarchy_equestria.15.t:0 "На фабрике погоды"
evildiarchy_equestria.15.d:0 "На погодной фабрике Клаудсдейла выдался суматошный день. Множество пегасов сновало по коридорам, ожидая новых назначений или сдавая отчёты о выполненных заданиях. За последние несколько лет индустриализация постепенно преобразила фабрику: гонцов, прилетавших из соседних городов и деревень, сменила добрая дюжина телефонов, которые разрывались от звонков пони, запрашивающих смену погоды. Более сотни опытных погодных пони были заняты расчётами оптимального распределения осадков и розы ветров.\n\nОднако сегодня на фабрике был особенный день. Чиновники из Кантерлота запросили встречу с самыми опытными мастерами погоды Клаудсдейла, чтобы обсудить "потенциальное расширение областей применения погодной магии". К их удивлению, к ним лично прибыла сама Рэйнбоу Дэш – Элемент Верности, вандерболт и член чрезвычайного совета. Её сопровождал Спайк с комично огромным свитком.\n\nВскоре совещание началось, и Рэйнбоу Дэш представила свои планы. — Вы, вероятно, смекаете, почему я здесь: грядёт битва со злыми сёстрами, и в этой схватке нам нужно, чтобы каждый пони внёс свой вклад. Это, конечно, касается и всех тех, кто владеет магией погоды. А где начинать, как не здесь, у самого истока? — она указала на дракончика рядом с собой, который уже начал сверяться со своим свитком. С лёгкой ухмылкой пегаска добавила. — Моя подруга, Твайлайт Спаркл, любезно составила скромных список всех возможных манипуляций с погодой, которые могли бы нам помочь нашему делу."
evildiarchy_equestria.15.a:0 "Пегасы готовы поддержать подготовку к войне."
evildiarchy_equestria.15.a_tt:0 "Теперь §Gдоступна§! механика §Yманипуляции погодой§!.\n\n"

evildiarchy_equestria.16.t:0 "Об экономической политике"
evildiarchy_equestria.16.d:0 "Шло очередное заседание Чрезвычайного совета. На этот раз на повестке дня стоял вопрос экономики. [evildiarchy_equestria_16_d_war_or_nowar] Эквестрии однозначно потребуется полноценная военная промышленность, чтобы противостоять злой диархии и обеспечивать армию необходимым снаряжением.\n\n— Если мы хотим, чтобы это сработало, то нужно действовать масштабно, — сказал Спайк. — В городах вроде Мейнхеттена, Филлидельфии или Лас-Пегасуса уже есть промышленность, но нам нужно сделать нечто подобное во всей Эквестрии. Разумеется, само по себе этого не произойдет. Нам придётся убеждать или даже принуждать промышленников. Или, что ещё лучше, управлять строительством новых заводов прямиком из Кантерлота. Только вот в Эквестрии действуют довольно... строгие экологические нормы для большинства регионов. Селестия никогда не жаловала современные заводы, и я не могу её винить. Конечно, мы, драконы, любим дым и серу, но даже вулкан пахнет куда приятнее, чем дым этих фабрик.\n\n— Разве нет другого пути? — тихо отозвалась Флаттершай. — Понимаю, о чём говорит Спайк, но боюсь, что это превратит всю Эквестрию в аналог пустошей. Неужели мы ничему не научились? Нам же следует использовать дары природы и работать с ней, а не против неё. Да, без заводов никак не обойтись... но для солдат придётся производить гораздо меньше снаряжения, если они научатся использовать то, что их окружает."
evildiarchy_equestria.16.a:0 "Нам следует выбрать классический индустриальный подход."
evildiarchy_equestria.16.b:0 "План Флаттершай звучит перспективнее."
evildiarchy_equestria.16.d_war:0 "Начало войны сделало этот вопрос более насущным, чем когда-либо прежде."
evildiarchy_equestria.16.d_nowar:0 "Хотя недавно наконец был издан указ о содействии экономической мобилизации, вскоре стало совершенно ясно, что этого недостаточно."

evildiarchy_equestria.17.t:0 "Наш ценнейший актив"
evildiarchy_equestria.17.d:0 "— Ты всё ещё переписываешься с Джет Сетом? — удивлённо спросила Твайлайт.\n\n— Да, — ответила Рэйвен Инквелл. — Хотя в основном это он отправляет мне послания, а я отвечаю по мере необходимости. У него накопилось немало вопросов. Развлекать сестёр после их перехода на сторону зла весьма непросто, так что головной боли у него предостаточно. Я даю ему кое-какие советы и помогаю сглаживать острые углы – но, вынуждена признаться, я бы ни за что не хотела оказаться на его месте. Он писал, что Дейбрейкер и Найтмер Мун непрестанно препираются.\n\n— Но как вам вообще удаётся обмениваться письмами? Разве эти двое не контролируют каждый его шаг?\n\n— О, далеко не каждый. Тонкости управления интересуют аликорнов лишь... отчасти. Боюсь, это дурная (но полезная для нас сейчас) привычка, которую они сохранили из прошлой жизни. Но верно, отправить письмо обычной почтой он бы ни за что не смог. К счастью, Джет Сету это и не нужно. Видишь ли, у Селестии всегда были свои способы переписки с учениками – тебе ли не знать об этом – но и мы, скромные госслужащие, разработали свои методы. Существуют заклинания для передачи писем на огромные расстояния, не слишком отличающиеся от тех чар, что Селестия использовала для общения с тобой и Спайком, — пони улыбнулась. — Джет Сет – искусный маг. Сомневаюсь, что злая диархия когда-нибудь узнает о его письмах, они слишком заняты другими заботами, — её лицо снова стало серьёзным. — Но хватит об этом. В последних письмах Джет Сет затронул тему того, как остановить сестёр, и мне нужно обсудить это с тобой.\n\n— Он... что? Он хочет их остановить?\n\n— Ну разумеется! Он находится в самом эпицентре этого безумия и понимает всё слишком хорошо. Он поддерживает работу их администрации только потому, что пока сёстры заняты бахвальством, они не пытаюсь всерьёз противостоять друг другу. А подобное может легко привести к концу света, — Рэйвен поёжилась. — Он предельно ясно выразился на этот счёт. Им неведомы те ограничения, что сдерживали прежних Селестию и Луну, или... — её взгляд впился в Твайлайт, — любого другого ответственного аликорна. Столкновения сестёр друг с другом нужно избегать любой ценой. Тем не менее, Джет Сет готов тайно поддерживать нас. Я... я рассказала ему о твоём плане, и он доверяет тебе.\n\nТвайлайт вымученно улыбнулась: — На данный момент это скорее лишь черновик плана. Но... поблагодари его за усилия и скажи, что я обдумаю это."
evildiarchy_equestria.17.a:0 "Не представляю, через что приходится проходить Джет Сету."
evildiarchy_equestria.17.a_tt:0 "Теперь можно §Gсаботировать§! действия злой диархии.\n\n§RПредупреждение: разоблачение Джет Сета приведёт к ужасным последствиям.§!"

evildiarchy_equestria.18.t:0 "На волоске"
evildiarchy_equestria.18.d:0 "— Джет Сет прислал письмо, — сообщила Рэйвен Инквелл. — Он говорит, что ему нужно на время приостановить свои операции, так как Дейбрейкер и Найтмер Мун всё чаще выражают недовольство этими "помехами". Он не думает, что его подозревают, но при этом не хочет, чтобы их гнев выплеснулся наружу.\n\nТвайлайт Спаркл вздохнула: — Полагаю, это мудрое решение. Мы и так слишком поспешили, пытаясь добиться немедленного результата. Сейчас нужно любой ценой сделать так, чтобы Джет Сет оставался на своём посту. Его работа по усмирению этих двоих первостепенна. Страшно даже представить, что произойдёт, если сёстры вступят в открытую схватку друг с другом.\n\n— Похоже, он пришёл к тем же выводам. Однако теперь обе сёстры неизбежно будут гораздо пристальнее следить за происходящим. Когда мы возобновим наши усилия, нам нужно будет действовать с редкостной осторожностью."
evildiarchy_equestria.18.a:0 "Фух, пронесло."

evildiarchy_equestria.19.t:0 "Джет Сет раскрыт"
evildiarchy_equestria.19.d:0 "— Нет, нет, нет, нет, нет! — причитала Твайлайт. — Этого... нет... почему всё должно закончиться именно так?!\n\nПоследняя неделя была сплошным потоком дурных вестей. Сначала Джет Сет снова написал, что операции нужно приостановить, так как Дейбрейкер и Найтмер Мун что-то заподозрили. Два дня спустя пришло полное отчаяния сообщение о том, что они начали полноценное расследование в отношении него. Это были последние вести от Джет Сета. Даже задействование оставшихся связей в Новом Мейрленде не дало никаких результатов.\n\nЕго сочли погибшим. Злые диархи не привыкли подолгу держать перебежчиков в живых. Косвенно это подтвердилось ещё через два дня, когда разведчики зафиксировали необычный магический выброс со стороны города [EQC.capital.GetName]. Без сдерживающего влияния Джет Сета союз двоих аликорнов продержался недолго: они уже вступили в открытое противостояние.\n\nНо, как Твайлайт и опасалась, на этом дело не закончилось. После нескольких часов затишья – во время которых, вероятнее всего, оба аликорна собирали своих верных последователей – сражения вспыхнули с новой силой. И если они решат использовать свой магический потенциал на полную мощь, миру несдобровать."
evildiarchy_equestria.19.a:0 "Ой-ёй..."

evildiarchy_equestria.20.t:0 "Старый недруг"
evildiarchy_equestria.20.d:0 "— Не хочешь-ка объяснить, что ты здесь делаешь, Кабальерон? — язвительно спросила Дэринг Ду.\n\n— Для тебя всё ещё "доктор Кабальерон", — прошипел он в ответ, прикрывая глаза копытом от яркого света фонаря.\n\n— Ну что ж, "всё ещё доктор Кабальерон", с превеликим удовольствием вынуждена сообщить, что ты пойман с поличным при попытке кражи артефакта. Ввиду текущей ситуации, — она указала копытом на сияющий в небе Щит Гармонии, — подобные реликвии считаются военным имуществом, а миссии по их поиску и извлечению приравнены к военным операциям. Иными словами, тебя обвиняют в саботаже, посягательстве на военное снаряжение и препятствовании армейским операциям. Тебя ждёт трибунал, так что, — она широко и крайне самодовольно улыбнулась, — готовься отвечать перед законом, "доктор".\n\nКабаллерон сглотнул. — Ах, но... я всего лишь пытался... рассмотреть артефакт поближе. У меня и в мыслях не было его красть, — он нервно махнул хвостом. — Послушай, давай не будем раздувать из этого проблему. И вообще, не припомню, чтобы ты была военным командиром, верно?\n\n— Пф-ф, а она-то права, — Рэйнбоу Дэш внезапно возникла прямо над головой Кабальерона, заставив того подпрыгнуть от испуга. — Чрезвычайный совет, который я имею честь здесь представлять, объявил поиск этих артефактов делом государственной важности и официальной военной операцией. Твайлайт и Рэйвен перерыли кучу старых законов Эквестрии и издали целую пачку указов на этот счёт. Все нужные бумаги у меня в Кантерлоте. Это будет простейшее дело. Обвинить тебя – всё равно что летний дождик вызвать. Впрочем, — она впилась взглядом в Кабальерона, — у тебя всё же есть иной выход. Как член Чрезвычайного совета, я имею право снять подобные обвинения. Нужна лишь моя подпись. У тебя полно связей, даже за пределами Эквестрии. Если ты готов перейти на нашу сторону и использовать эти контакты в наших интересах, то я закрою дело.\n\n— Выбора у меня нет, верно? — вздохнул Кабальерон.\n\n— Нет. Кстати, твоим куратором будет Дэринг Ду, — ухмыльнулась Рэйнбоу."
evildiarchy_equestria.20.a:0 "Посмотрим, насколько он окажется полезен."

evildiarchy_equestria.21.t:0 "Прямо из-под носа"
evildiarchy_equestria.21.d:0 "Это был один из тех самых моментов, когда Твайлайт запиралась в библиотеке, позволяя лишь Спайку изредка приносить ей кофе. Стопки книг, громоздящиеся по обе стороны от неё, служили немым свидетельством невероятной скорости чтения аликорна и её упорства.\n\n— Что на этот раз? — спросил Спайк. — Снова изучаешь чары щитов? Или исследуешь природу магии аликорнов? — дракончик скользнул взглядом по названиям на переплётах. — О, похоже, опять пытаешься отыскать магические артефакты в Эквестрии. Я думал, что раз теперь нам помогает Дэринг Ду, то ты оставишь это ей.\n\n— Я читаю не об Эквестрии, Спайк. Пытаюсь найти информацию о грифоньих артефактах. Как ты помнишь, охоту за реликвиями начали Дейбрейкер и Найтмер Мун после того, как не смогли пробить щит. Мы делаем всё возможное, чтобы противопоставить им эквестрийские артефакты, но недавно Дэринг выдвинула разумную идею: что, если нам попытаться сработать на опережение и украсть уже их артефакты?\n\n— Ты хочешь пробраться в Сансет и ограбить его колдовские хранилища?\n\n— Нет, Спайк, не глупи. Это было бы истинным самоубийством и подставило бы немногих оставшихся у нас связных. Нам нужно просто добраться до артефактов раньше, чем злые аликорны наложат на них свои копыта. Поэтому нужно выяснить, что это за реликвии, где они находятся и подготовить раскопки. И успеть сделать это до прибытия злых диархов. Именно поэтому-то я и зарылась носом в книги.\n\n— Это твоё обычное поведение, — небрежно бросил Спайк, почёсывая подбородок. — Но твой план... звучит очень рискованно.\n\n— Верно. Мы не можем рассчитывать на успех каждой миссии, поэтому нужно будет продумать план отхода."
evildiarchy_equestria.21.a:0 "Придётся рискнуть."
evildiarchy_equestria.21.a_tt:0 "Теперь доступны §Y"Враждебные раскопки"§!, позволяющие добывать артефакты в Грифонии раньше, чем до них доберётся злая диархия. Эти операции §Rне гарантируют стопроцентный успех§!, но определённые действия могут §Rповысить шансы на удачу§!."

evildiarchy_equestria.22.t:0 "Исследование артефакта завершено"
evildiarchy_equestria.22.d:0 "Недавно начатое исследование артефакта подошло к своему завершению. Учёные, задействованные в проекте, подвергли глубокому анализу магические свойства объекта, а также изучили обстоятельства его создания и историю применения в разные эпохи. В ходе изысканий был получен колоссальный объём теоретических познаний в области высшей магии, что, несомненно, послужит на благо будущим поколениям, однако возможности немедленного практического внедрения этих знаний остаются весьма скромными. Если говорить точнее, в итоговом отчёте указано, что были выявлены..."
evildiarchy_equestria.22.a:0 "... увы, лишь теоретические выкладки без практической пользы."
evildiarchy_equestria.22.b:0 "... некоторые новые данные о природе магии пони."
evildiarchy_equestria.22.c:0 "... определённые улучшения для промышленных процессов."
evildiarchy_equestria.22.e:0 "... новые открытия в области магической электроники."
evildiarchy_equestria.22.f:0 "... методы практического использования магии."
evildiarchy_equestria.22.g:0 "... наработки в области военной стратегии."

evildiarchy_equestria.23.t:0 "Раскопки завершены"
evildiarchy_equestria.23.d:0 "Завершив долгую и опасную миссию, наша группа археологов вернулась с триумфом. Преодолев бесчисленные трудности, они сумели добраться до цели и захватить артефакт прежде, чем злые диархи успели наложить на него свои копыта. Теперь эта реликвия будет служить гармонии, а не тирании. Мы пообещали местным жителям вернуть её, как только кризис останется позади."
evildiarchy_equestria.23.a:0 "Ура!"

evildiarchy_equestria.24.t:0 "Раскопки провалены"
evildiarchy_equestria.24.d:0 "Несмотря на все приложенные усилия, группе, которую мы отправили в Грифонию за древним артефактом, не удалось выполнить задачу. Экспедиция столкнулась с многочисленными трудностями: неточными и устаревшими картами местности, неполной информацией о самой реликвии и враждебностью местных жителей. Но вернувшись домой, наши специалисты уже начали составлять планы для новой попытки."
evildiarchy_equestria.24.a:0 "В следующий раз нам повезёт."

evildiarchy_equestria.25.t:0 "Грифонья коалиция"
evildiarchy_equestria.25.d:0 "Твайлайт Спаркл нахмурилась. — Ситуация крайне тяжёлая. Грифоны объединились против диархов. Это само по себе удивительно, учитывая их историю, – но боюсь, даже подобного единства будет недостаточно, — после чего добавила безжизненным голосом. — Магия аликорнов, пущенная в ход в полную силу – поистине страшная вещь.\n\n— Сахарок, то есть ты хочешь сказать, что супротив аликорна нужен другой аликорн? — спросила Эпплджек.\n\nТвайлайт уставилась на неё в ответ. — Это ведь так просто, да? Просто слетать в Грифонию и бросить им вызов? Может, по пути захватить Каденс, чтобы уравнять шансы? Проще простого, — она покачала головой. — Всё работает не так. Магия... использование чар истощает, и я не только о физической усталости. Разум тоже с трудом справляется с нагрузкой. Обычные бытовые заклинания тут ни при чём, но магический поединок – совсем другое дело. Чтобы сотворить заклятие, нужно вкладывать в него всё своё естество. В дуэли всё так же. Я... я не хочу убивать их, но сражаться с ними напрямую – значит причинять сёстрам боль.\n\n— Сахарок, я и не предлагала тебе лично драться с ними! — запротестовала Эпплджек.\n\nТвайлайт, казалось, не слышала её. Теперь она перешла почти на шёпот. — Нет. Я никак не могу сражаться с ними напрямую. Только с помощью Элементами. Книги о магии аликорнов говорят об этом предельно ясно. Была причина, по которой Селестия не стала давать отпор Найтмер Мун, когда та только появилась. Риск был слишком велик.\n\n— Чегось? О каком риске ты говоришь?\n\n— Я стану третьей, — ответила Твайлайт, вздрогнув всем телом.\n\n— Твайлайт, приди в себя! — крикнул Спайк. — Признаю, не сразу понял, почему ты настояла на созыве Чрезвычайного совета, но теперь до меня дошло. Мы здесь, с тобой. Тебе не придётся сражаться в одиночку. Да и они не одни. Под их началом огромные армии, но мы соберём не меньшие.\n\n— Верно, — Твайлайт вздохнула, и её голос снова стал нормальным. — Простите. Мои исследования аликорнов, их падения на сторону зла и способов борьбы с ними неизбежно заставили меня прочесть слишком много о Найтмер Мун. Я ещё многого не знаю: например, понятия не имею, как эти двое уживаются друг с другом, но хотя бы представляю, как нужно бороться. А вот грифонам... очень не повезло."
evildiarchy_equestria.25.a:0 "Время ещё не пришло."

evildiarchy_equestria.100.t: "Грядущая буря"
evildiarchy_equestria.100.d: "Все начиналось исподволь, почти незаметно. Долгие годы пони жили под защитой радужного щита, мерцавшего в небесах, и со временем привыкли к нему настолько, что перестали замечать. Прошли дни первоначальной паники, миновали времена суровой решимости; им на смену вернулась тихая, убаюкивающая беспечность. Но в последние дни каждый, кто поднимал взгляд к зениту, видел, что радужной магии становится всё меньше. Прежде яркое сияние поблекло и подёрнулось мутной дымкой, словно старое зеркало.\n\nЩит слабел, и тишину над Эквестрией вот-вот должно было разорвать беспощадное пробуждение. В тронном зале Кантерлотского замка собрался чрезвычайный совет – иными словами, носительницы Элементов Гармонии и Спайк. Они тоже видели происходящее, но для них это не стало неожиданностью. Они знали, что этот день настанет, и неустанно трудились, готовясь к нему.\n\n— Как думаешь, сколько нам осталось? — негромко спросил Спайк.\n\nТвайлайт нервно махула хвостом.\n— Трудно сказать наверняка. Я перерыла всю библиотеку, но ни в одной книге не упоминается щит, подобный нашему. Маги из института делали замеры последние несколько дней... Если деградация пойдёт линейно, у нас в запасе около шести недель. Если же структура начнёт рушиться по экспоненте – того меньше, может быть, всего две, — она тяжело вздохнула и поправила сползающую на глаза гриву. — Но, честно говоря, сейчас это уже не так важно. Мы сделали всё, что было в наших силах.\n\n— Я... я бы так хотела, чтобы нам не пришлось с ними сражаться, — едва слышно прошептала Флаттершай, прижимая уши.\n\n— Я тоже, сахарок, я тоже, — глухо отозвалась Эпплджек, положив тяжёлое копыто подруге на плечо.\n\nВ зале воцарилась тишина. Твайлайт подтянула к себе планшет с бумагами и начала набрасывать список последних приготовлений к войне. Спайк заглядывал ей через плечо с нескрываемой тревогой. Все они понимали, что этот момент неизбежен, но легче от этого не становилось."
evildiarchy_equestria.100.a: "Последний акт прелюдии окончен."
evildiarchy_equestria.100.a_tt: "§RСкоро начнётся война.§!"

evildiarchy_equestria.101.t: "Щит пал"
evildiarchy_equestria.101.d: "Час пробил. Прогнозы сбылись с пугающей точностью: за последние недели радужная мощь щита гармонии сошла на нет. Кантерлотская обсерватория в мельчайших деталях фиксировала этот процесс, ежедневно поставляя отчёты чрезвычайному совету. И хотя некоторые маги предлагали отчаянные способы оттянуть неизбежное, по прямому приказу Твайлайт Спаркл никакие меры не предпринимались.\n\n— Нет смысла и дальше откладывать неизбежное, — отрезала она. — Чему быть, того не миновать. Мы готовы настолько, насколько это вообще возможно. Мирная передышка дала нам время, в котором мы отчаянно нуждались, но если ждать дольше, мы снова впадём в опасную, убаюкивающую беспечность. Не говоря уже о том, что враг за океаном копит силы не медленнее нашего, а то и быстрее. Нет, сейчас самое время встретить их лицом к лицу, чего бы это нам ни стоило.\n\nНе все в совете были согласны, но никто не решился возразить. И вот, наконец, Эквестрия начала готовиться к большой войне, а вместе с ней её друзья и союзники на континенте. Полетели депеши с приказами о мобилизации, и вскоре тысячи и тысячи пони начали прибывать на назначенные рубежи. Над страной повисла странная, тяжёлая атмосфера. Всё яснее становилось: война не любезность, а самое гадкое дело в жизни. Немногие по-настоящему понимали, с чем им предстоит столкнуться, но гнетущее беспокойство ощущалось повсюду. Впрочем, рассказов выживших из Нового Мейрленда и редких грифонов-беженцев о бесконечной тирании Солнца и Луны хватило, чтобы ни у кого не осталось сомнений: защищаться необходимо.\n\n— Чувство такое, будто на тебя несётся ураган, — негромко признался Спайк в редкую минуту затишья, обращаясь к Рарити. — Ты знаешь, что он несёт смерть и разрушение, но прямо сейчас это кажется чем-то совершенно нереальным. Убежать от него нельзя, и ты просто замираешь в ожидании удара, понимая при этом, что по-настоящему подготовиться к такому невозможно.\n\nРарити печально кивнула:\n— Я помню, дорогуша, как будто это было вчера, как мы собрали Элементы Гармонии, чтобы вернуть Найтмер Мун её истинный облик... Кто же знал, что нам придётся столкнуться с ней снова? Только на этот раз одной магии Элементов может не хватить. Я не знаю, чем всё это закончится, — она тяжело вздохнула, — но очень надеюсь, что Твайлайт права."
evildiarchy_equestria.101.a: "К бою! Пони, к бою! Победа будет за нами!"

evildiarchy_equestria.102.t: "Последняя проблема дружбы"
evildiarchy_equestria.102.d: "— Они идут. Передовые дозоры так называемого «Соправительства» замечены вдоль побережья.\n\nТвайлайт почти не шелохнулась, лишь коротко кивнув гвардейцу. На бумаге битва вспыхнула лишь сейчас, но в мыслях принцессы дружбы она шла годами. И эти годы не были потрачены впустую. Бесчисленные часы Твайлайт провела в тишине кантерлотской библиотеки, листая том за томом в поисках ответа на единственный вопрос: как остановить павших сестёр и, что ещё важнее, как вернуть им прежний облик.\n\nПолки ломились от гримуаров по практической магии, но лишь единицы касались самой сути природы аликорнов, и совсем немногие – их падения в бездну. До того как мир содрогнулся от «злой диархии», история знала лишь один подобный случай: Найтмер Мун. Но тысячелетнее изгнание на луну делало любые наблюдения затруднительными. Позже, когда Найтмер Мун вернулась, Элементы Гармонии исцелили её, и Твайлайт лично в этом участвовала. В итоге всё, что ей удалось почерпнуть из книг, лишь подтверждало горькую истину: исцелить павшего аликорна способны лишь Элементы Гармонии.\n\nНо теперь ей предстояло иметь дело с двумя тёмными богинями, которые вопреки всякой логике и здравому смыслу объединились в этом безумии. Пока обе они на пике своего могущества, Элементы будут бессильны. Годы расчётов привели Твайлайт к дерзкому и опасному плану. Любой единорог имеет предел, за которым наступает истощение; и даже аликорны, при всём их величии, не были исключением. Изучая доклады и разную хронику, Твайлайт поняла: и Дейбрейкер, и Найтмер Мун слишком горды, чтобы прятаться за спинами своих легионов. Они будут сражаться на передовой. План был прост как топор и страшен как приговор: опираясь на мощь собранных артефактов и самопожертвование защитников, Эквестрия должна была непрерывно навязывать врагу бой, вынуждая павших принцесс выжигать свой резерв до последней искры, до последнего дыхания. Если им удастся изнурить богинь, если они выстоят под градом солнечного огня и ледяных теней... тогда, и только тогда, пробьёт час Элементов Гармонии."
evildiarchy_equestria.102.a: "На карту поставлена судьба Эквестрии. На карту поставлен весь мир."
evildiarchy_equestria.102.a_tt: "§YНам нужно выстоять под натиском, пока мощь павших принцесс не начнёт угасать.§!"

evildiarchy_equestria.200.t: "Триумф Гармонии"
evildiarchy_equestria.200.d: "— Вам... нас... не одолеть!\n\nГолос Дейбрейкер сорвался. Огненная грива, прежде ослеплявшая нестерпимым солнечным гневом, теперь лишь едва тлела, выпуская робкие, бессильные языки дыма. Рядом с ней Найтмер Мун попыталась было зайтись своим леденящим торжествующим смехом, но закашлялась на полуслове. Магическое истощение, точно тяжкие оковы, наконец сковало божественные силы. По всему фронту натиск сестёр захлёбывался – самопровозглашённые владычицы стремительно теряли власть над миром, который едва не обратили в пепел.\n\nТвайлайт и её друзья приближались. На их лицах застыла суровая решимость. Когда они подошли почти вплотную, Дейбрейкер резко вскинула голову, выпуская в них заряд тёмного пламени, но Твайлайт без труда отразила этот ослабевший всполох. Самопровозглашённая богиня в ужасе уставилась на носительниц Элементов Гармонии, не в силах поверить в происходящее.\n\n— Это всё ты... — прорычала она, обращая пылающий взор на сестру. — Если бы не твои немощные, испорченные прихвостни, Эквестрия давно лежала бы у моих копыт!\n\n— Неужто? — прошипела в ответ Найтмер Мун. — Я мню иначе: нас низвергла во тьму твоя безумная спесь и суетный блеск фальшивого величия. Клянусь Тартаром: нет прискорбнее вины на моей душе, чем миг, когда я сочла тебя достойной союза!\n\n— Ах ты, ничтожество... Сейчас я выжгу из тебя это заблуждение!\n\nВоздух вокруг Дейбрейкер задрожал от чистой ненависти; она припала к земле, готовясь в последнем безумном порыве вцепиться в глотку сестре. Внезапно между ними ударило розовое заклинание, разметав аликорнов в стороны.\n\n— Вы обе совершили уже более чем достаточно ошибок, — отрезала Твайлайт. — Вашей тирании пришёл конец. Девочки, по моему сигналу!\n\nОслепительный каскад магии захлестнул сестёр. Сияющий вихрь подхватил их, отрывая от выжженной земли. Шестеро друзей замерли в круге, их амулеты сияли первозданным светом, высвобождая накопленную энергию. Мгновение спустя заклинание завершилось колоссальной вспышкой, и все восемь пони, среди которых были три аликорна, два пегаса, две земные пони и единорог, без чувств рухнули на траву."
evildiarchy_equestria.200.a: "Магия дружбы всё-таки одержала верх."

evildiarchy_equestria.201.t: "Послесловие"
evildiarchy_equestria.201.d: "Шестеро друзей очнулись первыми. Эпплджек, морщась, потирала висок, а Рэйнбоу Дэш осторожно разминала затёкшие крылья. Но Твайлайт не сводила глаз с сестёр, и вскоре остальные проследили за её взглядом. Два аликорна лежали неподвижно, застыв в пугающем, почти мертвенном безмолвии. Нипони не смел проронить ни слова; тишина, воцарившаяся над полем боя, казалась осязаемой и гнетущей.\n\nСекунды тянулись мучительно долго – Твайлайт казалось, что это самые длинные мгновения в её жизни. Наконец, Селестия зашевелилась. Она растерянно обвела взглядом окрестности и, встретившись глазами с сестрой, едва слышно пробормотала:\n— Мне... привиделся... такой странный... сон, Луна.\n\nЛуна открыла глаза.\n— Мне тоже, сестра. Страшный, удушливый морок.\n\n— Я... я была объята яростью, — продолжала Селестия, голос её то и дело прерывался. — Но не помню, почему. Моя грива... она полыхала диким огнём... Я упивалась собственным величием, я бахвалилась силой... Я... я... — Она осеклась, чувствуя, как горло перехватывает спазм.\n\nТвайлайт сделала шаг вперёд. Её голос, охрипший от волнения, нарушил тишину:\n— Это... это не было сновидением. Всё это свершилось наяву.\n\n— Не сон? — голос Селестии стал почти неразличим. — Но пламя... ужас... павшие... Я бы никогда не... Нет, моё сердце не могло породить подобное, — сорвавшись на молящий шёпот, она взмолилась: — Пожалуйста, пусть это окажется неправдой...\n\nКогда заговорила Луна, в её голосе эхом отозвался истинный, беспредельный ужас:\n— Увы, сестра, то была явь. Это... я помню, каково это было в первый раз... — она повернулась к Твайлайт. — Вы ведь использовали Элементы Гармонии, верно?\n\nТвайлайт молча кивнула и прижала обеих принцесс к себе. По лицу Селестии покатились слёзы, и вскоре все трое уже рыдали, слившись в одном объятии.\n\n— По крайней мере, вы вернулись, — наконец выдохнула Твайлайт. — Только это сейчас и важно. Были моменты, когда я почти потеряла надежду."
evildiarchy_equestria.201.a: "Впервые за долгие годы Твайлайт почувствовала себя по-настоящему счастливой."

evildiarchy_equestria.202.t: "Конец истории и последняя пони"
evildiarchy_equestria.202.d: "Последняя неделя выдалась для Твайлайт необычайно суматошной, даже если сравнивать с испытаниями прошлых лет. Казалось, каждый пони в стране жаждет услышать её голос; за советом потянулись делегации грифонов и посланники иных земель. Спайк оставался её единственной опорой, виртуозно совмещая роли секретаря, советника и дракона. Последняя ипостась была самой важной – иначе бы она просто ничего не успела.\n\nВ этот раз, когда в дверь постучали, Спайк впустил гостей без промедления. Это были остальные носительницы Элементов Гармонии, а следом за ними вошли Селестия и Луна.\n— Похоже, наш чрезвычайный совет собрался на своё последнее заседание, — заметил Спайк, прикрывая дверь.\n\nОднако первой заговорила Селестия.\n— Твайлайт, нам нужно обсудить будущее Эквестрии. После всего, что было... мы с Луной более не вправе быть принцессами. Скажу честно: мы и сами этого не желаем, — она едва заметно качнула головой. — До сегодняшнего дня я не понимала до конца участь моей сестры. Жить с памятью о том, что я совершила под личиной Дейбрейкер, – невыносимая ноша. Но Эквестрии всё ещё нужна принцесса. Каденс правит Кристальной империей, Фларри Харт ещё совсем жеребёнок... Да и когда вырастет, она унаследует трон матери. Остаёшься только ты. Я не могла бы желать лучшей преемницы. Ты провела страну сквозь самый мрачный час и завершила его триумфом дружбы, гармонии и магии.\n\nТвайлайт встала из-за стола и принялась медленно обходить собравшихся.\n— Нет. Нет, я не думаю, что хочу быть принцессой всей Эквестрии. Не поймите меня неправильно: я аликорн, и я принцесса. Но не правительница страны. Я отказалась от этого титула, когда Рэйвен Инквелл предложила его много лет назад, и отказываюсь сейчас. Чрезвычайный совет прекращает свою работу – это правда, ведь буря миновала. Но мы вшестером... нет, мы семеро, включая тебя, Спайк, – мы всегда побеждали только сообща. Давайте создадим «Совет Дружбы». Последние годы показали нам, что государственные заботы не так уж сильно отличаются от тех проблем дружбы, с которыми мы сталкивались в прошлом.\n\nВ кабинете воцарилась тишина. Друзья обдумывали эти слова, примеряя на себя тяжесть новой ответственности. Наконец, один за другим они согласно закивали.\n\nЛишь Эпплджек недоверчиво вскинула бровь:\n— Твай, всё это звучит складно да ладно. Да только есть одна неувязка: ты – аликорн. Ты задержишься на этом свете на больно уж долгий срок, а мы-то тысячу лет не протянем, сама понимаешь. Даже если ты не наденешь корону сегодня, рано или поздно время всё равно заставит тебя это сделать."
evildiarchy_equestria.202.a: "Давайте не будем заглядывать в эту бездну сегодня."

evildiarchy_friendship_missions.1.t: "Миссия дружбы: Кристальная Империя" # Harmony Var
evildiarchy_friendship_missions.1.d: "— Твайлайт! — Шайнинг Армор сгрёб сестру в охапку, едва та сошла с поезда. Следом, светясь искренней радостью, её поприветствовали Каденс и Фларри Харт.\n\n— Как же вовремя ты приехала. И ты, конечно, тоже, Спайк, храбрый и прославленный спаситель империи! — рассмеялся Шайнинг, крепко пожимая лапу дракону. — Надеюсь, эшелон из Кантерлота добрался без происшествий? В наши дни спокойная дорога – это уже подарок судьбы. Кстати, Твай, я видел твой щит... Это невероятно. Если верить донесениям, то он в самом деле выдержал ярость двух аликорнов разом, и это потрясающе впечатляющее достижение. Хотел бы я сказать то же самое о своих чарах, но боюсь, такая мощь мне и близко не под силу.\n\n— Этот щит не мой, Шайнинг, хотя то, что ты когда-то научил меня защитным заклинаниям, очень помогло, — Твайлайт грустно улыбнулась. — Его породило само Древо Гармонии. Я до сих пор не могу до конца постичь магическую природу случившегося. Мы, Элементы, лишь... ну, стали проводниками? Трудно подобрать верное слово. Но ясно одно: он неразрывно связан с гармонией Эквестрии и её жителей. И именно поэтому я здесь. Когда Дейбрейкер и Найтмер Мун нанесут новый удар, а они его нанесут, – щит должен укрыть собой каждый уголок континента, до самых окраин севера.\n\n— Ты хочешь сказать, что кристальные пони должны всем сердцем поверить в Гармонию, чтобы укрепить его? — уточнила Каденс, внимательно глядя на золовку.\n\n— Не думаю, что щиту нужно именно это, — Твайлайт медленно покачала головой. — Скорее, речь о единстве. Щит – это физическое воплощение того, как магия Эквестрии отвергает саму суть павших принцесс. Это наше коллективное «нет» их тирании. Само Древо Гармонии – лишь отражение всей Эквестрии.\n\n— Живая душа народа? — негромко спросил Шайнинг.\n\n— Что-то в этом роде. Но хватит теории. Нам нужно собрать кристальных пони на площади. Спайк подготовил для меня речь – за эти месяцы он стал настоящим мастером слова, — Твайлайт с теплотой оглянулась, ища помощника.\n\nОднако дракончика рядом не оказалось. Он уже был там, где его любили больше всего – в самом центре ликующей толпы кристальных пони. Каждое его слово вызывало волну одобрительного гула, и хотя Твайлайт не слышала, о чём именно он говорит, она физически ощутила, как купол щита, пульсируя, накрывает всю Кристальную Империю.\n\nУлыбнувшись Каденс, Твайлайт тихо заметила:\n— А может, всё даже проще, чем я думала."
evildiarchy_friendship_missions.1.a: "Наша дружба никогда не пошатнётся."

evildiarchy_friendship_missions.2.t: "Миссия дружбы: Кристальная Империя" # Sombra Var
evildiarchy_friendship_missions.2.d: "Король Сомбра.\n\nОбстоятельства его возвращения из небытия оставались загадкой, но он вновь сумел поработить Кристальную Империю и её обитателей. Что ещё страшнее, в его плену оказались Каденс, Шайнинг Армор и малютка Фларри Харт. От одной мысли об этом у Твайлайт всё внутри бурлило от ярости и вины. Ей следовало прибыть сюда гораздо раньше. Она яростнее заработала крыльями, рассекая морозный воздух; Спайк, вцепившийся в её спину, пригнулся, спасаясь от бешеного встречного потока. Твайлайт едва заметно улыбнулась: храбрый дракон снова готов войти в историю как спаситель Империи.\n\nВ обычной ситуации попытка бросить вызов Сомбре в одиночку (ну, или только со Спайком) означала бы верную смерть. Но нынешние времена были какими угодно, только не обычными. Твайлайт чувствовала, как её знак отличия пульсирует едва уловимым ритмом. Древо Гармонии даровало ей магическую мощь, далеко выходящую за пределы её собственных сил. Она была уверена: этой мощи хватит, чтобы стереть тирана в порошок. В уме она хладнокровно перебирала боевые чары. Редко ей приходилось действовать столь дерзко, и ещё реже она ощущала такую абсолютную, почти ледяную уверенность.\n\nТвайлайт ворвалась в воздушное пространство Кристального города на молниеносной скорости. Когда она ушла в крутое пике, Спайк мёртвой хваткой впился когтями в её плечи, но она даже не почувствовала боли. На подлёте принцесса выпустила колоссальный поток чистой энергии, который с оглушительным грохотом проломил внешнюю стену замка. План был прост и эффективен: она свяжет Сомбру боем, пока Спайк не проберётся к Кристальному Сердцу и не изгонит захватчика.\n\n— Твайлайт Спаркл! — Сомбра пытался сохранить надменный тон, но не сумел полностью скрыть изумление.\n\nОна не удостоила его ответом. Вместо слов ударил второй магический луч, заставив короля в последнюю долю секунды воздвигнуть щит. Сомбра немедленно перешёл в контратаку, и какое-то время они сражались в полном молчании, сосредоточенно обмениваясь ударами. Твайлайт каждой клеткой ощущала ток силы Древа. Никогда прежде плетение чар не давалось ей так легко, и никогда прежде они не несли в себе столько разрушения.\n\nНо внезапно магия Сомбры дрогнула и начала стремительно иссякать. Спайк выполнил свою часть миссии. С протяжным, полным бессильной ярости криком «Не-е-ет!» тень узурпатора развеялась, вновь извергнутая в пустоту. Вскоре Твайлайт уже обнимала брата, няню и племянницу. Кристальная Империя снова была свободна и готова сосредоточиться на истинном враге."
evildiarchy_friendship_missions.2.a: "Сомбра, возвращайся в свой гроб!"

evildiarchy_friendship_missions.3.t: "Миссия дружбы: Кристальная Империя" # Commie Var
evildiarchy_friendship_missions.3.d: "Твайлайт и Спайк ехали на север, в Кристальную Империю – вернее, в то, что от неё осталось. Не так давно кристальные пони решили, что монархия им больше не по вкусу, и провозгласили республику под предводительством Арктик Лили. В Кантерлоте о новой «лидерше» знали преступно мало, и Твайлайт оставалось лишь надеяться на её благоразумие.\n\nНа перроне их встретила делегация с незнакомыми флагами.\n— Спайк, храбрый и прославленный спаситель империи... и, надо полагать, Твайлайт Спаркл? — Арктик Лили окинула аликорна холодным, оценивающим взглядом. — Я возглавляю народное правительство. Мы решили, что принцесса нам больше не указ, и я копытами вырывала право нашего народа на самоопределение. Но идёмте. Полагаю, вы здесь ради Каденс и её семьи.\n\nТвайлайт и Спайк направились к Кристальному дворцу в сопровождении делегации. К удивлению Твайлайт, Лили полностью проигнорировала её статус, обратившись напрямую к дракону.\n\n— Спайк, скажи мне, правда ли то, о чём шепчутся? Говорят, Селестия и Луна превратились в чудовищ под стать нечестивому Сомбре, от которого мы натерпелись. На севере слухи обрывочны, но я слышала, что ты и твои друзья готовитесь к войне. Мы... мы расстались с нашим аликорном не на самой доброй ноте, это правда. Каденс не была злой. Она просто... заблуждалась в некоторых вещах. Но сейчас... возможно, пришло время пересмотреть наши взгляды.\n\n— Ещё бы мы не готовились! — Спайк выпрямился, стараясь звучать как можно внушительнее. — Твайлайт, её друзья и я костьми ляжем, чтобы остановить Дейбрейкер и Найтмер Мун. И вы тоже можете помочь, клянусь своим именем! Но скажи мне, Лили, зачем вообще было избавляться от Каденс? Неужели нельзя было просто договориться?\n\nАрктик Лили устало потёрла мордочку.\n— Я... я и волоска с её гривы не уронила! Но она была глуха к нуждам рабочих, Спайк. Если бы только... Ах, клянусь Сердцем, если бы мы только знали, к чему всё придёт. Поговори с ней, Спайк. Объясни ей, что такое права трудящихся, а я в это время поговорю со своими товарищами. Если эти аликорны так же ужасны, как Сомбра, нам нужно сплотиться. В конце концов, именно ты когда-то разбил наши цепи, — она неуверенно улыбнулась дракону и горько добавила: — Кто бы мог подумать, что всё закончится именно так?"
evildiarchy_friendship_missions.3.a: "Кристальные пони чуют истинное зло за версту."

evildiarchy_friendship_missions.4.t:0 "Миссия дружбы: к бизонам" # Little Strongheart var
evildiarchy_friendship_missions.4.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на перрон станции, её встретила старая знакомая – Литтл Стронгхарт. Эпплджек познакомилась с молодой бизонихой ещё в свой первый визит, ведь именно она тогда помогла прийти к компромиссу. То, что бизоны прислали в качестве доверенного лица именно её, было добрым знаком.\n\n— Литтл Стронгхарт! Давненько мы не виделись, а? Как там ваше великое переселение? Надеюсь, пирогов всем хватило? Но хватит об этом. Ты наверняка заметила, что в Грифонии творятся неладные дела, и мне нужно обсудить это с вождем Тандерхувсом. Проводишь меня к нему?\n\n— Переселение идёт своим чередом, хотя многие старейшины по-прежнему ворчат, что мы покинули наши святые земли. Но... вождь Тандерхувс больше не наш лидер. Несколько лет спустя после твоего визита вожди выбрали меня своей предводительницей. И да, до меня дошли слухи, что принцесс больше нет. Скажи мне, что всё это значит?\n\n— Ты – лидер всех бизонов? И-и-иха! Это просто потрясающие новости, сахарок! А если честно, то дела обстоят прескверно: Селестия и Луна превратились в свои искажённые версии и теперь называют себя Дейбрейкер и Найтмер Мун. Их взоры обращены на Эквестрию. Мы создали щит, который сдерживает их, но нам всем нужно держаться вместе, понимаешь? Вот ради этого я и здесь.\n\nВскоре после этого Литтл Стронгхарт и Эпплджек собрали вождей бизонов. В итоге все, кроме таинственной фигуры по прозвищу "Старейшина", проголосовали за принятие дружбы пони и готовность сражаться против злых правительниц по ту сторону моря."
evildiarchy_friendship_missions.4.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.5.t:0 "Миссия дружбы: к бизонам" # Thunderhooves Var
evildiarchy_friendship_missions.5.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на станции, её встретил пустой перрон. Не самое лучшее начало. Земная пони порысила в сторону лагеря бизонов, ориентируясь по предусмотрительно установленным табличкам, и гадала, как её встретят. Ждать ответа пришлось недолго.\n\nДорогу ей преградил страж-бизон. — Чего тебе здесь нужно, пони? Это земли бизонов.\n\n— Это хорошо, потому что я как раз к бизонам и приехала, понимаешь? — парировала Эпплджек. — Я здесь не просто так, а от лица всей Эквестрии. Не знаю, заметили вы или нет, но в мире творятся неладные дела. Мне нужно поговорить с вашим самым главным бизоном. Ну что, проводишь меня к нему?\n\nНе проронив ни слова, страж развернулся, жестом пригласив Эпплджек следовать за ним. Вскоре её поприветствовал Тандерхувс – вождь всех бизонов. Пони помнила его по их прошлой встрече и понимала, что переговоры будут непростыми. После традиционной церемонии встречи он согласился выслушать её объяснения. Земная пони рассказала ему всё, что знала о Дейбрейкер и Найтмер Мун, об их деяниях и целях, а также о том, что предпринимает Эквестрия, дабы противостоять им.\n\nКогда она закончила, Тандерхувс медленно покачал головой. — Я помню, что ты – Элемент Честности, Эпплджек, и ты действительно была честна со мной. Ты просишь меня присоединиться к битве со злом, но увы: не я подхожу для этой задачи. Вместо этого я передам бразды правления Литтл Стронгхарт. У неё подходящий склад ума для таких дел. Пожалуй, мне следовало сделать это давным-давно, — бизон снова покачал головой. — Ох уж эти эквестрийцы... Чем же всё это закончится?"
evildiarchy_friendship_missions.5.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.6.t:0 "Миссия дружбы: к бизонам" # Elder var
evildiarchy_friendship_missions.6.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на станции, её встретил пустой перрон. Не самое лучшее начало. Земная пони порысила в сторону лагеря бизонов, ориентируясь по предусмотрительно установленным табличкам, и гадала, как её встретят. Ждать ответа пришлось недолго.\n\nДорогу ей преградил страж-бизон. — Чего тебе здесь нужно, пони? Это земли бизонов.\n\n— Это хорошо, потому что я как раз к бизонам и приехала, понимаешь? — парировала Эпплджек. — Я здесь не просто так, а от лица всей Эквестрии. Не знаю, заметили вы или нет, но в мире творятся неладные дела. Мне нужно поговорить с вашим самым главным бизоном. Ну что, проводишь меня к нему?\n\nНе проронив ни слова, страж развернулся, жестом пригласив Эпплджек следовать за ним. Вскоре её поприветствовал вождь всех бизонов – таинственный лидер, известный лишь как "Старейшина". Он недружелюбно посматривал на неё, но Эпплджек никак не могла вспомнить его по их прошлой встрече. Но после традиционной церемонии встречи он всё же согласился выслушать её объяснения. Земная пони рассказала ему всё, что знала о Дейбрейкер и Найтмер Мун, об их деяниях и целях, а также о том, что предпринимает Эквестрия, дабы противостоять им.\n\nКогда она закончила, Старейшина медленно покачал головой. — Ты меня не помнишь, но я знаю, что ты – Элемент Честности, Эпплджек, и ты действительно была честна со мной. Ты просишь меня присоединиться к битве со злом, но увы: я не могу исполнить твою просьбу. Вместо этого я передам бразды правления Литтл Стронгхарт. У неё подходящий склад ума для таких дел. А я... я подожду своего часа, — бизон снова покачал головой. — Ох уж эти эквестрийцы... Чем же всё это закончится?"
evildiarchy_friendship_missions.6.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.7.t: "Миссия дружбы: к чейнджлингам" # Thorax var
evildiarchy_friendship_missions.7.d: "— Спайк! Друг мой, добро пожаловать! — Торакс расплылся в широкой улыбке. — Я так счастлив, что чрезвычайный совет прислал именно тебя. В конце концов... ты был первым, кто разглядел во мне нечто большее, чем просто голодного монстра. Отныне и навеки ты – почётный гость Королевства Чейнджлингов.\n\n— Честно говоря, я сам вызвался, — признался Спайк, с любопытством озираясь по сторонам. — Мне давно хотелось увидеть воочию то, что вы построили после свержения Кризалис. Помнишь ту пещеру под Кристальной Империей? Я и все пони были так напуганы... И всё же мы стали друзьями. Ты не представляешь, какой груз свалился у меня с плеч, когда я узнал, что вы окончательно покончили с её тиранией.\n\nЧейнджлинг в генеральском мундире негромко кашлянул:\n— Король Торакс? Я глубоко ценю ваши мемуарные изыскания, но, быть может, мы перейдём к протоколу? Коль это официальный дипломатический визит, а не дружеское чаепитие...\n\n— Ой, да брось ты, брат, вечно ты ворчишь, — добродушно отмахнулся Торакс. — Спайк, знакомься, это Фаринкс – мой брат, верный советник и один из наших лучших генералов. Мы одолели Кризалис во многом благодаря ему, хоть он поначалу и считал наш бунт безумием. Но ведь так жизнь стала куда ярче, верно?\n\nФаринкс тяжело вздохнул:\n— Выменивать дружбу на любовь – в этом есть свои плюсы, признаю. Но иногда... иногда я скучаю по былым временам, — его лицо на мгновение исказила гримаса сомнения. — Мирная жизнь... она делает нас мягкими, слабыми. Я хоть и числюсь генералом, но порой сомневаюсь, что мне ещё доведётся увидеть настоящую карту боевых действий.\n\n— Ну, с этим я могу помочь, — вмешался Спайк. — Ты прав, Фаринкс, я здесь не только ради чаепития. До вас наверняка уже дошли вести: Селестии и Луны... какими мы их знали, больше нет. Теперь они зовут себя Дейбрейкер и Найтмер Мун и вовсю разоряют Грифонию. По словам Твайлайт, нет сомнений, что рано или поздно они обратят взор на нас, так что нам лучше держаться плечом к плечу. Именно за этим я здесь – я прошу народ чейнджлингов примкнуть к нашей борьбе против диархии.\n\nТоракс мгновенно подобрался, и в его взгляде промелькнула решимость:\n— И как король чейнджлингов, я принимаю это предложение от всей души. Чейнджлинги снова устремятся к Кантерлоту, но на сей раз не как захватчики, а как его защитники."
evildiarchy_friendship_missions.7.a: "Тост за нерушимый союз пони и чейнджлингов!"

evildiarchy_friendship_missions.8.t: "Миссия дружбы: к чейнджлингам" # Chrysalis var
evildiarchy_friendship_missions.8.d: "Торакс нервно облизнул клыки, глядя на стоящую рядом шестёрку пони.\n— Так каков, собственно, наш план?\n\n— О, он супер-пупер простой! — Пинки Пай возникла прямо перед его носом, едва не сбив с копыт. — Просто идём к Кризалис, бац – Элементами Гармонии, превращаем её в камень и закатываем грандиозную, крутейшую вечеринку. Делали так уже сто раз. Сущие пустяки, правда. Нам только нужно начать готовить угощения.\n\nБудущий король чейнджлингов не выглядел убеждённым.\n— Но как мы к ней подберёмся? Последние годы она только и делала, что превращала свою «Башню Королевы» в неприступный бастион. Она окружена лучшими гвардейцами из УОБВ. Вы что, планируете и всю её личную стражу в камень обратить?\n\n— О нет, это так не работает, — Твайлайт Спаркл снисходительно улыбнулась. — Все книги об Элементах, что я прочла, говорят одно: они созданы для защиты Эквестрии и действуют лишь на тех, кто представляет для неё угрозу. Мы не смогли бы обратить простых солдат в камень, даже если бы очень постарались. Но у нас есть метод куда эффективнее: направленная телепортация.\n\nЗаметив, что Торакс всё ещё с сомнением облизнул клыки, Твайлайт продолжила:\n\n— Твой скепсис оправдан. Обычно мы не можем телепортироваться на такое расстояние. Это сложное заклинание даже для аликорнов, ведь затраты сил растут квадратично дистанции. Но в этот раз у нас есть подмога, — она подмигнула. — Впрочем, нам всё равно нужно подобраться поближе, так что сейчас лучше соблюдать тишину.\n\nОни двинулись дальше. Торакс всё ещё сомневался, но придержал мысли при себе. Спустя какое-то время Твайлайт резко вскинула копыто. Вспышка ослепительно-белого света на мгновение выжгла сетчатку, и вот они уже стоят в самом центре тронного зала. Кризалис, восседавшая на троне, удивлённо зашипела, но шестёрка не теряла ни секунды. Торакс с благоговением наблюдал, как Элементы сплетаются в радужный вихрь. Как только окаменение Кризалис завершилось, по зданию и, насколько он мог судить по дрожи воздуха, по всему городу пронеслась очищающая волна магии.\n\n— И не думай, что у нас всегда всё так гладко! — Пинки Пай весело помахала копытом перед его застывшим лицом. — Но теперь-то уж точно пришло время для вечеринки!"
evildiarchy_friendship_missions.8.a: "Элементы Гармонии наносят ответный удар."

evildiarchy_friendship_missions.9.t:0 "Миссия дружбы: к якам" # (Pre-)Civil War var
evildiarchy_friendship_missions.9.d:0 "— Ну давай, хотя бы поговори с ним.\n\n— Нет.\n\n— Он же твой брат, ты должен хотя бы попытаться! — Пинки Пай кружила вокруг принца Резерфорда. — Обещаю, мы закатим супер-пупер-крутую вечеринку, как только вы всё обсудите.\n\n— Нет! Брэдфорд отвергнуть власть Резерфорда, объявить себя истинный принц и поднять кланы против меня. Резерфорд не принять этого. Никаких разговоров, теперь яки КРУШИТЬ жалких йаков! — он топнул копытом. — Резерфорд пробовать говорить. Брат не слушать голос разума. Резерфорд хотеть видеть Якякистан современной страной, другом Эквестрии. Брат же говорить "нет": Якякистан оставаться прежним и закрыть границы. Теперь мы сражаться за душу Якякистана!\n\nИх перепалка продолжалась ещё какое-то время, но постепенно упрямство Резерфорда начало поддаваться. В глубине души он всё ещё оставался яком, с которым можно договориться. Под давлением своей "почётной подруги-яка" и при поддержке Йоны он в конце концов согласился на прекращение огня и переговоры с принцем Брэдфордом. На мгновение Пинки Пай задумалась: как там идут дела у Рарити с самим Брэдфордом? Её миссия казалась куда сложнее.\n\nОднако вскоре Рарити подтвердила, что и Брэдфорд тоже готов к встрече. Пока братья вели беседу, Пинки тихо спросила подругу, как ей удалось его уговорить.\n\nРарити довольно улыбнулась. — О, это оказалось куда проще, чем я ожидала. Яки со стороны кажутся такими агрессивными, верно? Но в этот раз я подготовилась заранее, чтобы выбрать подобающий случаю наряд. У них такая богатая культура, стоит только присмотреться чуть внимательнее, дорогуша. В итоге мой наряд вызвал у них всеобщее одобрение. Даже этот вечно злой як – кажется, его звали Керр – признался мне, что никогда не думал, что пони могут так тонко разбираться в традициях яков. Разумеется, я пообещала создать для них изысканный традиционный, но в то же время новаторский гардероб, и они с восторгом согласились. Но смотри – кажется, братья пришли к соглашению."
evildiarchy_friendship_missions.9.a:0 "В Якякистан вернуться... тьфу ты, вернулся мир."

evildiarchy_friendship_missions.10.t:0 "Миссия дружбы: к якам"
evildiarchy_friendship_missions.10.d:0 "Глухой ночью к палатке приблизились три тёмные фигуры. Издалека все они напоминали яков, но при ближайшем рассмотрении становилось ясно, что двое ими не являются, да и третья была куда меньше среднего яка. Их явно ждали: вход в палатку открылся мгновенно и так же быстро закрылся. Одинокий глаз выглянул наружу, проверяя, не было ли любопытствующих, но поблизости никого не оказалось.\n\nВнутри Пинки Пай и Рарити сбросили тяжёлую верхнюю одежду. — У них здесь и впрямь какой-то особенный климат, верно, дорогая? — заметила Рарити. — Но я не жалуюсь. Более того, почти уверена, что именно погода помогла нашей маленькой миссии остаться незамеченной.\n\nЙона, на которой ничего не было надето, промолчала, но их хозяйка ответила: — Тира-як рада, что вы добраться сюда в безопасности. Тира очень за вас переживать, — она посмотрела на Йону. — Ты мочь меня простить? Всё не должно было зайти так далеко. Почему Тира быть глупой и верить Ингвару?\n\n— Всё хорошо. Йона никогда не думать, что Тира хотеть этого.\n\nПинки Пай вклинилась в их разговор, подпрыгивая от радости. — А ещё... — прыжок, — ...у нас отличные новости! — прыжок. — Яки... — прыжок, — ...больше не хотят... — прыжок, — ...власти Ингвара! Так что... — прыжок, — ...давайте устроим грандиозную вечеринку!\n\nРарити удивлённо подняла бровь. — А не стоит ли нам, ну, для начала всё же свергнуть Ингвара?\n\n— Но вечеринка и есть свержение! Мы должны показать якам, что они могут быть свободны, если захотят. Так что давайте соберём их всех вместе.\n\nТира покачала головой. — Почему революция заканчиваться вот так? Тира просто хотеть, чтобы рабочий быть услышан.\n\n— Глупенькая, революция не заканчивается. Как только Ингвар уйдёт, ты возьмёшь всё в свои копыта."
evildiarchy_friendship_missions.10.a:0 "Революция возвращается рабочим."

evildiarchy_friendship_missions.11.t:0 "Миссия дружбы: к якам" # Rutherford var
evildiarchy_friendship_missions.11.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Что тут делать столько яков? — за их спинами раздался знакомый голос. — Розовая Пони! Ты вернуться! Принц Резерфорд приветствовать тебя в гостях. А, и ты привести подругу, как я видеть. Як помнить её по Понивилль. Но о чём ты желать говорить с яками?\n\n— Принц Резерфорд! Я так рада тебя видеть! В последний раз я слышала о тебе ещё во время той гражданской войны. Моя подруга Рарити и я пришли просить твоей помощи в битве против Дейбрейкер и Найтмер Мун – ну, знаешь, злых версий Селестии и Луны. Они безумно сильны, поэтому нам нужно, чтобы весь Эквус объединился против них. Мы можем на тебя рассчитывать?\n\n— Принц Резерфорд слышать про злых аликорнов. Не быть уверен, угроза это для яков или нет. Теперь я не сомневаться! Яки готовы сражаться и КРУШИТЬ аликорнов. Яки очень сильные, а ещё якам нравиться пони!"
evildiarchy_friendship_missions.11.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.12.t:0 "Миссия дружбы: к якам" # Yona var
evildiarchy_friendship_missions.12.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Рарити! Что Пинки Пай там делать? Як Йона не знать, что ты приехать в Якякистан, — Рарити обернулась и увидела приближающуюся бывшую ученицу Школы Дружбы. — Это быть связано с исчезновения Селестия и Луна? Йона знать, что что-то случиться, но не знать, что именно.\n\n— Йона! Я так рада тебя видеть. Мы прибыли навестить принца Резерфорда и яков. Селестия и Луна, к несчастью, не исчезли, а сошли с ума. Теперь, став Дейбрейкер и Найтмер Мун, они представляют угрозу для всего мира. Поэтому мы и собираем друзей, чтобы подготовиться к их грядущему нападению. А что касается того, чем занята Пинки... Думаю, она просто наслаждается собственным представлением.\n\n— О, ты не слышать новости? Принц Резерфорд отречься. Яки создать республика. Як Йона – первый президент новая республика. И Йона готова вступить в битва вместе с пони!"
evildiarchy_friendship_missions.12.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.13.t:0 "Миссия дружбы: к якам" # Thyra var
evildiarchy_friendship_missions.13.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Что тут происходить? — к Рарити подошла як в сопровождении двух офицеров. — Ты есть кто? Як Тира знать розовую пони, но не тебя. Тира не разрешать это собрание. Вы хотеть подорвать революция?\n\n— Меня зовут Рарити. Мы с Пинки Пай прибыли сюда, чтобы поговорить с яками. Как вы, возможно, знаете, Селестия и Луна превратились в Дейбрейкер и Найтмер Мун. Они планируют вторгнуться на Эквус и покорить его, как уже сделали с Грифонией. В ответ мы хотим объединить весь континент а борьбе против них. Но вы упомянули революцию... Скажите, что случилось с принцем Резерфордом? Мы ожидали застать его здесь.\n\n— Резерфорд больше не принц. Яки требовать отречение, поэтому Резерфорд отказаться от титул. Теперь рабочие править всеми яки. Я возглавлять совет рабочих, так что ты говорить со мной. Но если вы не угрожать революция, Тира сражаться против злых аликорнов вместе с вами. Яки КРУШИТЬ!"
evildiarchy_friendship_missions.13.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.14.t:0 "Миссия дружбы: к якам" # Bradford var
evildiarchy_friendship_missions.14.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд — отличный як, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Знаю, что всё закончилось не слишком хорошо, так что нам нужно попытаться воззвать к разуму Брэдфорда.\n\nИх прервал суровый голос. — Стоять, пони! Принц Брэдфорд приказать закрыть граница. Что вы хотеть?\n\nРарити повернулась к яку. — Мы пришли поговорить с принцем яков. Возможно, вы слышали, что Селестия больше не правит в Кантерлоте. Быть может, до вас даже дошли слухи, что она и Луна превратились в Дейбрейкер и Найтмер Мун, опустошающих Грифонию... Нам чрезвычайно важно поговорить с принцем, потому что, при всём нашем уважении к вашим закрытым границам, это касается и безопасности яков. Теперь уже злые диархи рано или поздно вернутся, чтобы покорить весь Эквус, — видя, что як не собирается ни двигаться, ни отвечать, она добавила. — Пожалуйста, позвольте нам поговорить с Брэдфордом и всё объяснить!\n\nНа этот раз як всё же ответил. — Я И ЕСТЬ Брэдфорд, глупая пони. Ты думать, граница яков так плохо охраняться? Что вы мочь просто гулять где хотеть? Принц Брэдфорд наблюдать за вами уже много дней. И пусть я не знать тебя, я знать твоя подруга розовая пони. Она помогать предатель-Резерфорд, — як состроил мрачную гримасу и топнул копытом. — Но... Брэдфорд действительно слышать, что Селестия сойти с ума, и Луна тоже. Яки сильные, якам не нужна помощь. Но Брэдфорд знать, что помощь нужна пони, — он снова топнул. — Яки КРУШИТЬ злых аликорнов!"
evildiarchy_friendship_missions.14.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.15.t:0 "Миссия дружбы: к якам" # Star Mountain / Kerr var
evildiarchy_friendship_missions.15.d:0 "— Да ладно тебе, это совсем не трудно!\n\n— Як Йона не быть уверена. Йона сомневаться, — молодая як, шествующая между двумя пони, покачала головой.\n\n— Пф-ф! — легкомысленно ответила Пинки Пай. — Нам всего-то нужно тайком проникнуть в страну, свергнуть тирана и поставить тебя главной. А потом мы закатим грандиозную, потрясающую, просто бомбическую вечеринку в честь победы. Там можно будет даже вволю ПОКРУШИТЬ! Проще простого. Я так делала кучу раз. Хотя... — она драматично почесала подбородок. — Мне нужно потренировать свои навыки КРУШЕНИЯ, чтобы это была лучшая вечеринка в истории.\n\n— И Пинки Пай думать, это всё легко? Слышать про [JAK.GetLeader]? [JAK.GetLeader.GetSheHeCap] – жестокий деспот, что губить прекрасный Якякистан.\n\nПинки Пай ничего не ответила, лишь подмигнула. Рарити в ответ только пожала плечами, и они продолжили путь в молчании. Они уже были высоко в горах, отделяющих Кристальную Империю от Якякистана. По какой-то причине Пинки будто бы знала точный маршрут, хотя он пролегал вдали от хоженых троп. После трёх дней восхождения склон наконец стал более пологим.\n\nВнезапно Пинки Пай вскрикнула, заставив Йону и Рарити отпрыгнуть в стороны. Но прежде чем они успели что-либо предпринять, неподалёку раздался ответный крик, и Пинки бросилась на звук. Остальные последовали за ней и вскоре вышли к пещере, заполненной яками.\n\n— Як Майя мочь сказать: всё идти по плану. Правильные яки проникнуть в стража [JAK.GetLeader]. Мы готовы нанести удар, чтобы вернуть свобода Якякистан!\n\nЗаметив удивлённые лица подруг, Пинки Пай упёрла копыта в бока. — Что? Вы думали, я заявлюсь в Якякистан просто так? Я знаю парочку яков ещё со времён Йикслурбертфеста, да и после праздника заглядывала к ним не раз. Я ведь официальный посол дружбы у яков, а каким бы я была послом без дружеских связей, хм? В общем, у нас тут тиран, которого надо свергнуть, а что ещё важнее – вечеринка, которую нужно подготовить!"
evildiarchy_friendship_missions.15.a:0 "Якякистан вновь свободен от безумия."

evildiarchy_friendship_missions.16.t: "Миссия дружбы: к оленям" # Supremacist var
evildiarchy_friendship_missions.16.d: "— Я всегда мечтала воочию увидеть Олению, — негромко призналась Флаттершай, провожая взглядом проплывающие рядом облака. — Говорят, в их чащах скрываются создания, которых не встретишь больше нигде в мире. Да и сами олени – чудесный народ. Помню, как добра и внимательна была ко мне королева Вельвет при нашей последней встрече.\n\n— Да брось ты, Флаттершай, всё совсем не так! — перебила её Рэйнбоу Дэш. — Олени – это прежде всего крутые и могучие воины! Ты хоть знаешь, что они когда-то покорили Хиндию? Твайлайт клянётся, что это чистая правда: века назад их предки установили «Дирлаг», и их потомки правят там до сих пор. Я этими легендами ещё в жеребячестве зачитывалась! — она заложила крутой вираж в воздухе. — Эх, поскорее бы встретить их бойцов. Посмотрим, чьи трюки круче!\n\nДорога до Хьёртланда выдалась спокойной. Стоило копытам пони коснуться северной земли, как они запросили аудиенции у аллшерьяргоди. Вскоре их принял Юрва – темношёрстный олень с рогами цвета запёкшейся крови. Он долго изучал гостей тяжёлым взглядом, прежде чем заговорить, медленно взвешивая каждое слово.\n\n— Рэйнбоу Дэш и Флаттершай, посланницы Эквестрии. Я – Юрва, аллшерьяргоди и владыка этих земель. Впрочем, вы и так это знаете, а я знаю, что знаете вы. Боги предрекли ваш приход и открыли мне суть вашей миссии. И всё же говорите то, что должны, и я отвечу вам так, как велят боги.\n\nРэйнбоу Дэш зависла в воздухе прямо перед вождём, нетерпеливо взмахивая крыльями, и скрестила копыта.\n— Ну, раз вы и так в курсе, давайте ближе к делу. Я слышала, что олени – великие бойцы. Поможете нам в битве против Дейбрейкер и Найтмер Мун? Я читала предания о Кнуфе и Иваре – пришло время доказать, что в ваших жилах всё ещё течёт та же кровь!\n\n— По правде говоря, я бы предпочла пообщаться со зверями в ваших лесах, а не звать вас на войну, — добавила Флаттершай, и голос её дрогнул, но не ослаб. — Но для этого ещё будет время. Павшие сёстры – угроза для всего мира, и я верю, что ваши боги не могли утаить от вас эту правду.\n\nЮрва хранил молчание, и тишина в зале стала почти осязаемой. Наконец он произнёс:\n\n— Ваши слова мудры, и боги чтят это. Олени – гордый народ. Долгое время я опасался, что близость Эквестрии лишает нас воли, делает слабыми... Но вы доказали мне, что это не так. Впрочем, это лишь слова. Мой путь был начертан ещё до того, как вы покинули Кантерлот. Королева Вельвет, истинная наследница, вернёт свой трон. Мы примкнём к вашей борьбе."
evildiarchy_friendship_missions.16.a: "Олени встают под наши знамёна."

evildiarchy_friendship_missions.17.t: "Миссия дружбы: к оленям" # Neutrality var
evildiarchy_friendship_missions.17.d: "— Я всегда мечтала воочию увидеть Олению, — негромко призналась Флаттершай, провожая взглядом проплывающие рядом облака. — Говорят, в их чащах скрываются создания, которых не встретишь больше нигде в мире. Да и сами олени – чудесный народ. Помню, как добра и внимательна была ко мне королева Вельвет при нашей последней встрече.\n\n— Да брось ты, Флаттершай, всё совсем не так! — перебила её Рэйнбоу Дэш. — Олени – это прежде всего крутые и могучие воины! Ты хоть знаешь, что они когда-то покорили Хиндию? Твайлайт клянётся, что это чистая правда: века назад их предки установили «Дирлаг», и их потомки правят там до сих пор. Я этими легендами ещё в жеребячестве зачитывалась! — она заложила крутой вираж в воздухе. — Эх, поскорее бы встретить их бойцов. Посмотрим, чьи трюки круче!\n\nК их удивлению, едва копыта пони коснулись земли Хьёртланда, к ним вышел офицер и почтительно пригласил на встречу с королём Йоханом. Оказалось, монарху доложили об их визите ещё до того, как они пересекли границу Олении, но он решил им не препятствовать. Пони провели в небольшой зал, где их ждал изнурённый олень. Флаттершай невольно отметила, что его шёрстка была темнее, чем у Вельвет, а рога были лишены её ярких красок.\n\n— Что ж, полагаю, комедия окончена, — он слабо, болезненно улыбнулся, и от этой улыбки его лицо прорезали ещё более глубокие морщины. — Если вы пришли требовать моего отречения, не утруждайте себя. Поверьте, поступить правильно – задача куда более тяжкая, чем кажется на первый взгляд. Я грезил о великой Олении, свободной от тени Кантерлота и его ставленников. Но... из этого ничего не вышло. С тех пор как я узнал о вашей миссии, я вопрошал богов. Их воля была предельно ясна: Вельвет – законная наследница, я же – не более чем узурпатор. Я больше не стану сражаться.\n\nРэйнбоу Дэш недоумённо вскинула бровь, зависнув в воздухе.\n— Вообще-то мы здесь, чтобы просить тебя как раз сражаться! Не с Вельвет, конечно, а плечом к плечу с нами против павших сестёр. Я в детстве зачитывалась легендами об оленях-викингарах, о Кнуфе и Иваре... Пришло время доказать, что в ваших жилах всё ещё течёт та же кровь!\n\n— Я знаю о вашей войне, но мой путь на этом окончен, — Йохан покачал головой. — Пусть Вельвет ведёт Олению на битву свободных народов против тирании аликорнов. Моё время вышло."
evildiarchy_friendship_missions.17.a: "Олени встают под наши знамёна."

evildiarchy_friendship_missions.18.t: "Миссия дружбы: к оленям" # Harmony var
evildiarchy_friendship_missions.18.d: "— Я всегда мечтала воочию увидеть Олению, — негромко призналась Флаттершай, провожая взглядом проплывающие рядом облака. — Говорят, в их чащах скрываются создания, которых не встретишь больше нигде в мире. Да и сами олени – чудесный народ. Помню, как добра и внимательна была ко мне королева Вельвет при нашей последней встрече. Ей было так горько от того, что за трон пришлось сражаться, но она говорила, что иначе было нельзя.\n\n— Да брось ты, Флаттершай, всё совсем не так! — перебила её Рэйнбоу Дэш. — Олени – это прежде всего крутые и могучие воины! Ты хоть знаешь, что они когда-то покорили Хиндию? Твайлайт клянётся, что это чистая правда: века назад их предки установили «Дирлаг», и их потомки правят там до сих пор. Я этими легендами ещё в жеребячестве зачитывалась! — она заложила крутой вираж в воздухе. — Эх, поскорее бы встретить их бойцов. Посмотрим, чьи трюки круче!\n\nДорога до Хьёртланда выдалась спокойной. Королева Вельвет поспешила даровать им аудиенцию, и вскоре пони уже сидели в уютных креслах, беседуя с правительницей в неформальной обстановке.\n\n— Добро пожаловать в Олению, друзья мои, — начала она с тёплой улыбкой. — Я знала, что ваш визит – лишь вопрос времени, — она на мгновение прикрыла глаза и вздохнула. — Мир стал слишком мрачным местом, не находите? Здесь, на севере, мы осознали это раньше прочих. Переворот Йохана стал страшным потрясением, а гражданская война, вспыхнувшая после моего возвращения, оставила после себя тысячи разбитых судеб... И всё же в конце туннеля всегда есть свет. Иначе бы я не сидела сейчас перед вами. Со злом можно и нужно бороться.\n\n— Истинно так! — воскликнула Рэйнбоу Дэш, азартно взмахивая крыльями. — Мы ещё покажем этим двум тираншам, где раки зимуют!\n\n— И Оления встанет плечом к плечу с вами, — кивнула Вельвет. — Но не стоит недооценивать цену грядущей войны."
evildiarchy_friendship_missions.18.a: "Олени встают под наши знамёна."

evildiarchy_friendship_missions.19.t: "Миссия дружбы: к оленям" # Communist var
evildiarchy_friendship_missions.19.d: "— Я всегда мечтала воочию увидеть Олению, — негромко призналась Флаттершай, провожая взглядом проплывающие рядом облака. — Говорят, в их чащах скрываются создания, которых не встретишь больше нигде в мире. Да и сами олени – чудесный народ. Помню, как добра и внимательна была ко мне королева Вельвет при нашей последней встрече.\n\n— Да брось ты, Флаттершай, всё совсем не так! — перебила её Рэйнбоу Дэш. — Олени – это прежде всего крутые и могучие воины! Ты хоть знаешь, что они когда-то покорили Хиндию? Твайлайт клянётся, что это чистая правда: века назад их предки установили «Дирлаг», и их потомки правят там до сих пор. Я этими легендами ещё в жеребячестве зачитывалась! — она заложила крутой вираж в воздухе. — Эх, поскорее бы встретить их бойцов. Посмотрим, чьи трюки круче!\n\nЕдва копыта пони коснулись земли Хьёртланда, к ним подошёл офицер полиции. Как выяснилось, президент республики уже знал об их визите и выразил желание встретиться. Пони не заставили себя ждать: вскоре их уже принимали в президентском дворце. Навстречу гостьям вышел подчёркнуто холёный олень.\n\n— Добро пожаловать. Куллерво Сирола, лидер партии и президент республики Оления, к вашим услугам, — представился он. — А вы, стало быть, Рэйнбоу Дэш и Флаттершай, посланницы «Эквестрийского Принцесства». Итак, чего же желает от нас, оленей, новая принцесса Твайлайт Спаркл? Я догадываюсь, о чём пойдёт речь, но всё же излагайте своё дело.\n\n— Твайлайт Спаркл – не наша принцесса. Она отказалась от титула, — тихо ответила Флаттершай. — Конечно, она всё ещё принцесса дружбы, но она не захотела единолично править Эквестрией после того, как Селестия и Луна... ну... когда они обратились в Дейбрейкер и Найтмер Мун. Мы сформировали чрезвычайный совет. Так что, технически, вы говорите с правителями Эквестрии напрямую – или, по крайней мере, с частью из них.\n\n— И мы пришли сюда, чтобы позвать вас на битву! — вмешалась Рэйнбоу Дэш, не в силах больше сдерживаться. — Сражаться так, как в стародавние времена, о которых я читала в книжках про Кнуфа и Ивара ещё в жеребячестве! — она взмыла к потолку, нанося стремительные удары по невидимому врагу. — Викингары были потрясающими воинами! И сейчас нам нужно, чтобы вы выступили против павших сестёр. Весь Эквус должен сплотиться, чтобы они не нашли брешь в нашей обороне.\n\n— Понимаю, понимаю, — Сирола задумчиво потёр подбородок, глядя на пируэты пегаски. — Любопытно, что вы ни словом не обмолвились о месте Вельвет во всей этой истории, — Рэйнбоу открыла было рот, чтобы возразить, но олень предостерегающе поднял копыто. — Нет-нет, не портите момент. Моё решение уже принято. Было бы безумием разобщать оленей, когда над миром сгущается такая тьма. Вельвет может вернуться – до тех пор, пока она чтит данные ею обещания и волю народа."
evildiarchy_friendship_missions.19.a: "Олени встают под наши знамёна."

evildiarchy_friendship_missions.20.t: "Миссия дружбы: к полярным медведям" # Polar Bears
evildiarchy_friendship_missions.20.d: "Едва прознав, что её вместе с Флаттершай выбрали для дипломатической миссии на далёкий север, Рэйнбоу Дэш пришла в неописуемый восторг. До Эквестрии доходили слухи, что полярные медведи – ребята крутые и могучие, да к тому же не так склонны КРУШИТЬ всё подряд, как яки. Всё обещало стать идеальным приключением... ровно до того момента, как они пересекли границу. Почти сразу на них вылетело чудовище, в десятки раз превосходящее пони по размеру. Рэйнбоу воинственно расправила крылья, готовясь к эпической схватке, набрала в грудь побольше воздуха и... оторопела, увидев, как Флаттершай пулей пронеслась мимо неё прямо в когти монстра.\n\n— Флатти, назад! — Рэйнбоу рванулась следом, но замерла на полувзмахе.\n\nЧудище довольно топало задней лапой, прикрыв глаза от удовольствия, пока Флаттершай невозмутимо гладила его по голове.\n— Флатти, эта махина размером с дракона! Улетай оттуда немедленно!\n\n— Это вовсе не дракон, это тунбэк. Посмотри, какой он пушистый милашка! — отозвалась та, принимаясь начёсывать зверя ещё усерднее. — Правда ведь, ты мой хороший? Кто у нас тут такой славный?\n\nРэйнбоу и раньше случалось видеть безумные выходки подруги, но это выходило за всякие рамки. По крайней мере, путь был свободен... или так ей казалось. Следующие несколько часов Флаттершай провела, порхая вокруг монстра и осыпая его сюсюкающими прозвищами. То, что начиналось как пугающее и героическое приключение, стремительно превращалось в невыносимую скукотищу.\n\nВнезапный громовой хохот заставил пегаску вздрогнуть. Вдали показался отряд полярных медведей – и Рэйнбоу поняла: вот он, её шанс. Она пулей метнулась к ним, стараясь произвести впечатление прежде, чем вожак успеет её рассмотреть. Вблизи медведи выглядели внушительно: огромные, массивные и свирепые. Просто потрясающие воины... способные, кажется, раздавить её одним движением лапы. Рэйнбоу сглотнула и зависла перед ними, стараясь унять дрожь в крыльях.\n\n— Э-эй, ну, в общем... — вожак медленно перевёл на неё тяжёлый взгляд, от которого пони невольно втянула голову в плечи. Она помедлила секунду, дрожа всем телом, затем глубоко вздохнула и взяла себя в копыта. — Я – Рэйнбоу Дэш! А там, с тем огромным парнем – Флаттершай! Мы прибыли из Эквестрии, чтобы просить вашей помощи – ну, в смысле, помощи медведей. Нам нужно вместе выступить против Дейбрейкер и Найтмер Мун. Вы ведь слышали о них? Они сейчас жгут Грифонию! Мы просто хотели узнать, не поможете ли вы нам, раз уж вы все такие большие, могучие, крутые и...\n\nВожак медленно поднял лапу, и Рэйнбоу мгновенно замолчала на полуслове.\n— Приведи ко мне ту, чья душа чиста, как вечный лёд, — пробасил он, указывая когтем на Флаттершай, продолжавшую возиться с тунбэком. — Тогда и поговорим.\n\nРэйнбоу быстро закивала и умчалась назад со скоростью молнии."
evildiarchy_friendship_missions.20.a: "Ласковое слово порой сильнее острой стали."

evildiarchy_friendship_missions.21.t: "Миссия дружбы: к пингвинам" # Supremacist var
evildiarchy_friendship_missions.21.d: "— С-С-СТРАЙК! — Пинки Пай с восторженным визгом пронеслась на животе по льду, эффектно врезаясь в кучу вылепленных ею же снежных фигурок. — Три из трёх! Пинки Пай – чемпионка снежного боулинга! — провозгласила она, пока Рарити обречённо смотрела вдаль, кутаясь в меховую накидку.\n\nЭтот визит с самого начала напоминал форменный кошмар: угрюмые пингвины едва удостоили их приветствием. Честно говоря, им несказанно повезло, что их вообще впустили в Дахи, а не выставили вон под ледяной ветер или, что ещё хуже, не бросили в темницу. Рарити никак нельзя было в темницу – только не в таком платье! Она тяжело вздохнула, глядя на резвящуюся подругу: по крайней мере, хоть кто-то здесь умудрялся веселиться.\n\n— Дорогуша, полагаю, нам пора собирать чемоданы и возвращаться домой, — Рарити покачала головой, наблюдая, как Пинки с энтузиазмом принялась ваять из снега гигантского пингвина. — Я уверена, что у Твайлайт найдётся идея, как со всем этим разобраться, но нам одним такое не под силу. Мне ужасно жаль, что мы проделали столь долгий путь впустую.\n\n— Ты о чём это, глупышка? Мы вовсе не одни – у нас вон сколько друзей, и они уже вовсю нам помогают! — прежде чем Рарити успела возразить, её взгляд проследил за копытом Пинки – прямиком к огромной толпе пингвинов, маршировавших к главному правительственному зданию.\n\n— ...И кто же это, позволь полюбопытствовать? — Рарити нервно поправила шарф.\n\n— Ну как же, это рабочие, дурилка!\n\n— Я и сама вижу, что это не придворные дамы. Но когда и как именно они успели стать твоими друзьями?\n\n— Ну, пока ты тут кисла, парочка из них подошла спросить, каково это – быть пони! Вот я и рассказала им про наши приключения, про гармонию и про всю эту заварушку с вредными принцессами. А они пожаловались, что их нынешний лидер – точно такой же большой и вредный злюка, и им совсем не по вкусу то, что он творит. Ну, я и ответила, что нельзя позволять всяким злюкам помыкать собой и портить всем настроение. Вот они и пошли с этим разбираться, я так думаю! — Пинки с гордостью посмотрела на марширующую колонну. — Так, мне пора готовить вечеринку – они же скоро закончат! Увидимся, Рарити!\n\nПотеряв дар речи, Рарити могла лишь безмолвно смотреть вслед упрыгивающей Пинки, которая уже вовсю прикидывала в уме количество кексов, необходимое для празднования победы."
evildiarchy_friendship_missions.21.a: "— ...Я отвернулась всего на полминуты. Как такое вообще возможно?"

evildiarchy_friendship_missions.22.t: "Миссия дружбы: к пингвинам" # Harmonist var
evildiarchy_friendship_missions.22.d: "— Должна признаться, дорогуша, я не совсем знала, чего ожидать от пингвинов, но они превзошли все мои ожидания! — хихикнула Рарити, пока Пинки с нескрываемой тоской сверлила взглядом окно. — Ты только взгляни, какой изумительный крой у фрака того джентльмена, что нас встретил. Подумать только: работать такими ластами и достигать подобного изящества... Поистине, хороший вкус не знает границ!\n\n— А я просто хотела бы покататься на пузике по льду... — удручённо вздохнула Пинки, прижимаясь копытами к стеклу. — Если бы только... Ой, погоди-ка, я же вполне могу!\n\nВ один прыжок Пинки вылетела из комнаты, едва не сбив только что вошедшего дипломата. Тот лишь на мгновение замер, провожая розовый вихрь невозмутимым взглядом.\n\n— Весьма... энергичная особа, — заметил дипломат, поправляя свой фрак и направляясь к креслу. — Надеюсь, наш климат не показался вам слишком суровым.\n\n— О, ничуть! Я прибыла во всеоружии, готовая встретить и снег, и лёд, и бурю. В путешествиях нельзя пренебрегать подготовкой, особенно если хочешь выглядеть безупречно в любой ситуации, — Рарити улыбнулась, грациозным жестом указывая на свой наряд. — И как бы мне ни хотелось продолжить беседу о моде, я должна спросить о другом. Мы слышали, что пингвины весьма искусны в магии льда, и надеемся, что вы будете открыты к переговорам. Эквестрия и Пингленд должны выстоять плечом к плечу против Дейбрейкер и Найтмер Мун.\n\n— Пингленд глубоко сочувствует вашей борьбе, — кивнул дипломат (насколько это позволяло полное отсутствие шеи). — Мы будем рады поддержать Эквестрию в этот тёмный час.\n\nПока они обменивались вежливыми улыбками, скрепляя договор официальным жестом, со стороны окна донёсся звучный, сочный «шлёп». Обернувшись, они увидели Пинки Пай, которая буквально распласталась по стеклу с обратной стороны.\n\n— Горка была просто супер-пупер-мега-класс! Я летела как птица! — просияла она, прилипнув к раме. — Но тут, кажется, можно замёрзнуть...\n\nПинки по-жеребячьи высунула язык, коснулась им холодного стекла и... замерла. Её глаза округлились.\n— Ой-ёй, я пвимёрзва! — прошепелявила она, безуспешно пытаясь отцепиться.\n\nРарити посмотрела на окно, затем на дипломата и выдавила из себя вежливую улыбку."
evildiarchy_friendship_missions.22.a: "— Предлагаю расценить это как... весьма неординарный жест дружбы."

evildiarchy_friendship_missions.23.t: "Миссия дружбы: Сталлионград" # Stalliongrad
evildiarchy_friendship_missions.23.d: "Эпплджек и Рарити в молчании замерли у окна поезда, провожая взглядом суровые пейзажи Сталлионграда. Лишь однажды им довелось проезжать эти края – по пути в «Наш Городок», но тогда они почти не видели самопровозглашённой «Северянской Советской Республики» (таково было официальное название Сталлионграда). Спайк, который тоже вызвался взглянуть на столицу коммунизма, сейчас мирно посапывал на сиденье, прикрывшись хвостом. Подруги переглянулись. Насколько трудной будет эта встреча? Почти два столетия Северяна де-факто была частью Эквестрии, пусть и со своим правительством, пока чуть более десяти лет назад окончательно не разорвала связи.\n\nНа Кантерлотском вокзале Сталлионграда, величественном здании из гранита и стали, их встречал председатель местного Совета: [STG.GetLeader].\n— Эквестрия присылает послов? Что-то новенькое в наших краях. Но добро пожаловать, — слова председателя местного Совета прозвучали одновременно с крепким пожатием копыт гостьям. — Уверен, вы захотите осмотреть город и увидеть, чего добились простые пони, сбросив ярмо знати. После революции мы восстали из пепла. Когда на шее у простого пони не сидят пиявки, высасывающие плоды его труда, и все равны, нет ничего невозможного.\n\n— Надеюсь, это не те же сказки, что рассказывала в своё время Старлайт Глиммер, — негромко проворчала Эпплджек, поправляя шляпу. — Наслышана я про этот ваш коммунизм, у нас в семье о нём спорили до хрипоты. Для фермы от него проку мало, одни лозунги. Но мы здесь по другому делу.\n\n— Погоди, дорогуша, — мягко вмешалась Рарити, придерживая подругу за плечо. — Полагаю, нам стоит сперва взглянуть на город, а уж потом судить о методах управления, — заметив изумлённый взгляд Эпплджек, Рарити лишь едва заметно улыбнулась. — Знаешь, если есть что-то, чего я не выношу органически, так это вульгарную жадность. А всё, что мне доводилось слышать о здешней старой знати, говорит об её непомерной алчности и дурном вкусе. Не знаю, была ли революция единственным верным выходом, но это уже дела минувших дней, — она повернулась в сторону председателя. — Очень недурно. Ваш наряд выглядит весьма элегантно.\n\n— Я хочу всё осмотреть! — вставил Спайк, окончательно проснувшись. — В конце концов, именно за этим я... то есть, это же отличная возможность, верно? А о выходках Дейбрейкер и Найтмер Мун мы всегда успеем поговорить позже.\n\nСледующие несколько часов прошли в прогулках по широким проспектам: монументальную архитектуру, строгие фасоны местных ателье и кухню победившего пролетариата с гордостью демонстрировал председатель – [STG.GetLeader]. Затем в зале Совета начались переговоры. Вопрос о павших аликорнах уже не раз поднимался на заседаниях, и Сталлионград вовсю готовил заслон на своих границах. Получив твёрдые заверения в том, что революции Северяны ничто не угрожает, председатель [STG.GetLeader] заявил: республика примкнёт к борьбе против диархии."
evildiarchy_friendship_missions.23.a: "Эквестрия приветствует своих товарищей."

evildiarchy_friendship_missions.24.t:0 "Миссия дружбы: в Наш Городок" # Our Town
evildiarchy_friendship_missions.24.d:0 "Наш Городок.\n\nФлаттершай казалось, будто она только вчера слышала безупречно отрепетированную речь Старлайт Глиммер. Это был далеко не самый лучший момент в жизни пегаски: она тогда чуть не попала под влияние культа. Разумеется, на деле всё это случилось годы назад, а Старлайт Глиммер давным-давно превратилась из лидера секты в верную ученицу Твайлайт. Флаттершай поймала себя на том, что искоса поглядывает на идущую рядом Твайлайт, которая, кажется, ничего не замечала. Флаттершай нервно махнула хвостом. Почему именно её выбрали для этой миссии? Принцесса почему-то настояла именно на её кандидатуре.\n\nКогда пони добрались до города, их тут же встретил кое-кто знакомый – Шугар Белль, одна из первых, кто восстал против правления Старлайт. — Твайлайт Спаркл и Флаттершай! Вы вернулись! Что привело вас к нам? Неужто снова возникли проблемы с дружбой? — её улыбка несколько померкла. — Надеюсь, ничего серьёзного. Мы ведь... я имею в виду, что после поражения Старлайт Глиммер здешним пони пришлось заново искать своё истинное призвание. Лишиться знака отличия – это ужасно, но жить с ним снова тоже не всегда просто.\n\n— Могу себе представить, — тихо ответила Флаттершай. — Я просто хочу, чтобы все мирно уживались. Несмотря на всё то зло, что совершила Старлайт, согласия она умела добиваться. Но, конечно, пони не должны жить без своих знаков отличия, — поспешно добавила пегаска.\n\n— Это было фальшивое, порочное согласие, — возразила Шугар Белль. — Насильное единообразие. Но я помню тебя. Со стороны это выглядело притягательно, верно? — она устало улыбнулась. — Как бы то ни было, после вашего ухода наше будущее стало туманным. [evildiarchy_friendship_missions_24_dynloc] Впрочем, вы так и не сказали, что привело вас к нам на этот раз?\n\n— Ты говорила о проблемах с дружбой, и в каком-то смысле так и есть. Но на этот раз помощь нужна нам самим, — ответила Твайлайт. — Видишь ли, Селестия и Луна... они изменились. И нам понадобится помощь каждого в Эквусе, если мы хотим иметь хотя бы призрачный шанс вернуть их прежних."
evildiarchy_friendship_missions.24.a:0 "— Вы помогли нам, а теперь мы поможем вам."
evildiarchy_friendship_missions.24_doublediamond:0 "Но мы выбрали Дабл Даймонда нашим новым мэром – на настоящих выборах, не то что раньше. Он всё ещё поддерживает идеи радикального равенства. Иногда я гадаю, не мечтает ли он стать новой Старлайт. К счастью, со знаками отличия он пока что ничего не вытворял..."
evildiarchy_friendship_missions.24_featherbangs:0 "Но мы выбрали Фезер Бэнгса нашим новым мэром – на настоящих выборах, не то что раньше. Да, того самого Фезер Бэнгса, которому я когда-то отказала. Но должна признать, что он добрый мэр..."

evildiarchy_friendship_missions.25.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Supremacist var
evildiarchy_friendship_missions.25.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты? Сомневаюсь, что нашему президенту интересно то, что вы хотите ему сказать, — он вздохнул. — Хотя, пожалуй, стоило бы, — понизив голос, он спросил. — Это правда, что Селестия и Луна сошли с ума и теперь порабощают грифонов в Новом Мейрленде? До нас доходят лишь слухи, но я слышал всякое...\n\n— О, ты совершенно прав, — подтвердила Пинки Пай. — Хотя они уже не совсем Селестия и Луна. Теперь аликорны предпочитают называть себя Дейбрейкер и Найтмер Мун. Мы здесь, потому что хотим остановить их, и нам нужна ваша помощь. Так что, если хочешь помочь своим собратьям-грифонам, тебе лучше отвести нас к вашему президенту.\n\nСтраж выглядел встревоженным. — Я же сказал, что он не станет слушать. Я... послушайте, у меня остались кое-какие связи со времён гражданской войны. Я пропущу вас и дам имена грифонов, с которыми стоит поговорить. Только пообещайте мне, что НИКОГДА, слышите, НИ ПРИ КАКИХ ОБСТОЯТЕЛЬСТВАХ не упомянете о моей роли в этом.\n\nПони переглянулись и согласно кивнули. Пообещав хранить тайну пограничника, они пересекли границу Нова Грифонии. А несколько дней спустя случилось немыслимое: [GRF.GetLeader] был свергнут и арестован в ходе продемократического переворота, а новым президентом стал Вильгельм Сильвервинг."
evildiarchy_friendship_missions.25.a:0 "Дружба снова торжествует."

evildiarchy_friendship_missions.26.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Civil war var
evildiarchy_friendship_missions.26.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты, значит. Ну, не знаю, слышали вы или нет, но у нас тут сейчас как бы два правительства. Так с кем вы хотите говорить: с "красными" или с "белыми"?\n\nРэйнбоу Дэш повернулась к подруге: — Похоже, им и правда нужна наша помощь. Хочешь поговорить с "красными", а я возьму на себя "белых"?\n\nПинки Пай кивнула, и пони разделились. Позже, обмениваясь впечатлениями, они обнаружили, что переговоры с обеими сторонами прошли по схожему сценарию. Рэйнбоу Дэш впечатлила Хайхилла своим лётным мастерством и военной выучкой, в то время как Пинки Пай расположила к себе Редтейла, процитировав по памяти отрывки из "Манифеста Партии Социальной Справедливости" за авторством Маркс. Когда озадаченная Рэйнбоу спросила, где та познакомилась с этой работой, Пинки лишь подмигнула.\n\nВ итоге подругам удалось убедить обе стороны заключить временное перемирие и продолжить переговоры. В конечном счёте противники согласились сформировать коалиционное правительство под началом Вильгельма Сильвервинга, умеренного республиканца, и присоединиться к борьбе против истинного врага грифонов – злых аликорнов в Грифонии."
evildiarchy_friendship_missions.26.a:0 "Мы не должны сражаться друг с другом, пока на кону стоит наше выживание."

evildiarchy_friendship_missions.27.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Other var
evildiarchy_friendship_missions.27.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты, значит. А я-то думал, у Эквестрии уже есть консульство в Уэтере. Впрочем, полагаю, вы хотите поговорить с нашим лидером? Идите за мной.\n\nСпустя несколько часов пони прибыли в столицу. Пограничник уже телеграфировал об их прибытии [evildiarchy_friendship_missions_27_dyntitle], поэтому их сразу отвезли к нему на виллу.\n\n[GRF.GetLeader] встретил их весьма тепло. — Я уже слышал немало историй об этом. Селестия и Луна... они обе сошли с ума, верно? И теперь Принцессе Дружбы приходится разгребать эти проблемы, — он покачал головой. — [evildiarchy_friendship_missions_27_dyndesc]\n\n— Почти угадали, но не совсем, — ответила Пинки Пай. — Селестия и Луна не просто сошли с ума, они превратились в супермощных и суперзлых аликорнов и теперь зовут себя Дейбрейкер и Найтмер Мун. И Твайлайт не правит Эквестрией – это делает чрезвычайный совет. О, и Эквестрия вовсе не разваливается! На самом деле мы готовимся к нападению злой диархии и пришли спросить, не хотите ли вы присоединиться к нам. В конце концов, гляньте, что они вытворяют с грифонами в Грифонии! — Пинки Пай повернулась к подруге. — Я ничего не забыла, Дэш?\n\n— Мне ни за что не сравниться с твоими дипломатическими усилиями, — саркастично заметила Радуга Дэш. — Господин [evildiarchy_friendship_missions_27_dyntitlecap], если позволите...\n\nНо [GRF.GetLeader] прервал её, усмехнувшись: — Всё в порядке. Я в деле."
evildiarchy_friendship_missions.27.a:0 "Грифоны, отомстите за своих собратьев!"
evildiarchy_friendship_missions_27_dyntitle_governor:0 "губернатору"
evildiarchy_friendship_missions_27_dyntitle_president:0 "президенту"
evildiarchy_friendship_missions_27_dyntitle_governorcap:0 "губернатор"
evildiarchy_friendship_missions_27_dyntitle_presidentcap:0 "президент"
evildiarchy_friendship_missions_27_dyndesc_teafeather:0 "Что за катастрофа. Я родился в Империи Грифонов и, хотя не припомню, чтобы кто-то из Гроверов сходил с ума подобным образом, я хорошо помню её крах. Пожалуй, Эквестрии повезло, что у неё всё ещё есть принцесса, которой не всё равно."
evildiarchy_friendship_missions_27_dyndesc_highhill:0 "Что за катастрофа. Нация, внезапно лишившаяся лидера, всегда пребывает в смятении. Мы проходили через это здесь, в Нова Грифонии. Но то, что случилось с вами, пожалуй, куда хуже."
evildiarchy_friendship_missions_27_dyndesc_redtail:0 "Это поистине трагедия. Надеюсь, Твайлайт сможет всё исправить."
evildiarchy_friendship_missions_27_dyndesc_silverwing:0 "Для меня лично это тоже большая трагедия. Я всегда считал их примером для подражания. И вот теперь такое."
evildiarchy_friendship_missions_27_dyndesc_blackpeak:0 "Я искренне не могу этого осознать. Они всегда были столь непоколебимым примером добродетели."

evildiarchy_friendship_missions.28.t:0 "Миссия дружбы: в Пуэрто-Кабальо"
evildiarchy_friendship_missions.28.d:0 "— Ах, здешний климат просто идеален! — с наслаждением вздохнула Пинки Пай. — Мне так и хочется провести этот день на пляже. А температура воды в самый раз для купания. Не понимаю, почему тебя это не радует, Эпплджек.\n\n— Может, ты просто лучше умеешь расслабляться, сахарок, — саркастично парировала земная пони. — А может, дело в том, что мы здесь вовсе не в отпуске! Мы прибыли, чтобы завести друзей среди местных. Не то чтобы для меня это было сложно: большинство здешних пони вкалывают на сахарных плантациях, а это на редкость тяжёлый труд. Я и сама рабочая деревенская пони, так что нам будет о чём потолковать. Это совсем не то, в чём разбираются любители вечеринок, уж извини, Пинки.\n\n— Думаю, тебе не стоит так... ухмыляться, если ты хочешь завести друзей, — ответила Пинки Пай. — А я пойду-ка поболтаю с Понсе Коктейлем, потому что ему точно нужен кто-то, кто умеет закатывать отличные вечеринки.\n\nЭпплджек не пришлось долго искать собеседников среди местных. В ближайшем баре трое довольно суровых на вид земных пони с радостью поделились своими историями. Однако эти рассказы оказались совсем не такими, как она ожидала. В отличие от семьи Эппл, большинство здешних рабочих не владели собственной землёй. Весь архипелаг принадлежал горстке крупных землевладельцев, большинство из которых даже не были родом из Пуэрто-Кабальо.\n\n— Послушай-ка, не всё то золото, что блестит. Не знаю, как вы там справляетесь на материке, но здесь ни у кого нет таких денег, чтобы открыть свою плантацию. При Понсе ситуация чутка улучшилась, но любая его попытка подкинуть нам пару битов встречает яростное сопротивление богатеев. А Кантерлот годами ничего с этим не делал. Даже не знаю, в курсе ли они вообще, что тут происходит. А ещё наш островок – налоговый рай. Зарубежные дельцы скупают всё доступное жильё. Сейчас найти крышу над головой стоит безумных денег. Но хватит об этом, ты ведь даже не назвала своего имени.\n\nЭпплджек почувствовала себя невероятно неловко. Что скажут эти пони, если она признается, что является частью той самой кантерлотской элиты, которую они терпеть не могут? Но лгать она никак не могла, да и это лишь усложнило бы ситуацию в будущем.\n\n— Я Эпплджек из Понивилля. У меня небольшая яблочная ферма... то есть у моей семьи.\n\n— Ты Эпплджек, Элемент Честности? — переспросил один из троицы. — Ты ведь теперь часть правительства, верно? Значит ли это, что Кантерлоту наконец-то стало не всё равно?\n\n— Да. Именно так, — ответила она, и мысленно поклялась любой ценой добиться справедливости."
evildiarchy_friendship_missions.28.a:0 "На эти острова наконец-то придёт равенство."

evildiarchy_friendship_missions.29.t:0 "Миссия дружбы: в Земли драконов"
evildiarchy_friendship_missions.29.d:0 "— Ты прилично подрос с нашей последней встречи, — подметила Эмбер.\n\n— Я могу сказать то же самое о тебе, — с усмешкой ответил Спайк. — Как поживает Повелительница драконов?\n\n— Дела идут неплохо. Иногда я гадаю, что именно держит остальных в узде: Скипетр из Кровавого камня или мой отец Торч. Он всё ещё околачивается поблизости и пытается давать мне советы, но в целом уже смирился с тем, что я всё делаю по-своему. Он был настроен крайне скептически, когда я отправила Смолдер в Школу Дружбы, так что я тем более рада, что в итоге всё получилось. И да, твои подруги могут перестать пытаться маскироваться. Я, да и любой другой дракон, чуем их за милю. К тому же я ещё несколько лет назад отменила то глупое правило, запрещающее пони посещать наши острова. Верно ведь, Гарбл?\n\nСтоявший неподалёку Гарбл издал невнятный звук. Заметив направленный на него Скипетр, он буркнул: — Да, Повелительница драконов Эмбер.\n\n— Какое облегчение, — прокомментировала Рарити, выбираясь из-под фальшивого камня. — Моя грива уже начала приходить в полный беспорядок.\n\n— Рада снова видеть тебя, Эмбер, — поздоровалась Твайлайт. — Мы долго переписывались с тобой о культуре драконов, и я была счастлива принять Смолдер в Школу Дружбы. Но при этом, мне всегда хотелось лично навестить Земли драконов. В конце концов, во время первого визита я... скажем так, была не в курсе многих вещей, — она хихикнула. — Впрочем, думаю, ты уже догадываешься о причине нашего визита. Земли драконов ближе к Грифонии, чем любой другой уголок Эквуса, и ты наверняка уже знаешь о Дейбрейкер и Найтмер Мун.\n\n— Конечно, — ответила Эмбер. — Естественно, отец советовал мне сохранять нейтралитет, но я этого не сделаю. Я – друг Спайка, а значит, и всей Эквестрии в целом. Но даже если забыть об этом – что бы там ни утверждал мой отец, самопровозглашённые богини могут быть опасны даже для нас, драконов. Мы привыкли сражаться в одиночку, и слишком часто в прошлые годы это становилось причиной нашего поражения."
evildiarchy_friendship_missions.29.a:0 "Драконы на стороне Эквестрии."

