#### EVENTS

evildiarchy_newmareland.1.t:0 "Незваный гость"
evildiarchy_newmareland.1.d:0 "В кабинете Отэм Бриза царила тишина, которую лишь изредка нарушал шелест бумаги. Подготовка к операции "Муншайн" шла полным ходом, и для уверенного достижения успеха требовалось поистине ошеломляющее количество бумажной работы. Агенты были внедрены в Эквестрию, сети связи налажены или восстановлены, а план действий уже получил одобрение Легионерского совета. И всё же работы оставалось невпроворот.\n\nВнезапный порыв ветра заставил его поднять взгляд. Посреди кабинета стояло существо в капюшоне, возникшее словно из ниоткуда. Чёрный плащ полностью скрывал личность незнакомца. Отэм Бриз не мог не заметить сходства с тем, как в жеребячьих сказках изображают мрачного жнеца, но жеребец был воителем и не намеревался пугаться гостя из страшных историй.\n\n— Что тебе нужно? — прорычал он. — И как ты попал в мой кабинет? Я что, забыл убрать коврик с надписью "Добро пожаловать"?\n\nСущество не шелохнулось, но ответило весьма медленно и неестественно, будто стараясь не выдать свой настоящий голос: — Ваш план обречён. Луна не превратится в вашу богиню лишь от того, что вы подорвёте под ней бомбу, — Отэм Бриз прижал уши, но существо осталось невозмутимым. — У меня есть более действенное предложение. Прими его, и операция "Муншайн" увенчается успехом.\n\n— Что ты предлагаешь? И что хочешь в ответ? — ответил воитель, прищурив глаза.\n\nСущество мрачно фыркнуло и извлекло из-под капюшона маленький флакон – впечатляюще ловко, не обнажив ни дюйма передней ноги. — Это магическая субстанция, которая возносит любого аликорна до истинной, наиболее могущественной формы. Используй зелье с умом, ибо, как видишь, его совсем немного, — после короткой паузы гость продолжил. — Что же до моей цены... её заплатишь не ты и не Хироптерра. Действуй осторожно. Я верю в тебя. А теперь, — существо склонило голову, — прощай.\n\nПрежде чем Отэм Бриз успел что-либо ответить, незнакомец поставил флакон на стол. Воитель вскочил, чтобы задержать незваного гостя, но к тому моменту, как он обогнул стол, фигура уже бесшумно открыла дверь и покинула кабинет. Отэм выбежал в коридор, но незнакомца нигде не было.\n\nНикто другой в здании не видел даже тени, так что ему не оставалось ничего другого, кроме как вернуться в кабинет. Флакон всё так же лежал на столе, а эссенция мерцала ярким сине-фиолетовым светом."
evildiarchy_newmareland.1.a:0 "Так, как же мы воспользуемся этим?"

evildiarchy_newmareland.2.t:0 "Смена планов"
evildiarchy_newmareland.2.d:0 "Легионерский совет на удивление быстро одобрил новый план. Даже слишком быстро, на вкус Отэм Бриза. Они не видели того странного существа... Но нельзя было отрицать, что новый план казался куда более надёжным и менее зависящим от воли случая.\n\nКогда в распоряжении Хироптерры оказался магический флакон, способный превратить Луну обратно в Найтмер Мун, всё остальное стало делом техники. Совет решил не пытаться внедрить агента в замок Кантерлота – это было бы слишком дерзко, учитывая количество находящихся там магов. Вместо этого принцессе передадут поддельный отчёт, вызывающий её в Новый Мейрленд по просьбе местных фестралов. Затем агент незаметно подмешает магическое зелье в её напиток, и вскоре после этого, если флакон сработает, в мире станет одной принцессой меньше и одной императрицей больше.\n\nБлагодаря сети осведомителей, изначально подготовленной для операции "Муншайн", состряпать фальшивый отчёт о фестралах Нового Мейрленда оказалось проще простого. Этим вечером Отэм Бриз должен встретиться с агентом, выбранным для применения зелья. Но сколько бы он ни перечитывал план, его не покидало странное чувство. Казалось, он и совет что-то упустили, но он никак не мог понять, что именно.\n\nМагический флакон всё так же стоял на его столе, и жидкость в нём переливалась сине-фиолетовым цветом. Присмотревшись, он заметил кружащиеся внутри крошечные яркие искры. Кто сварил это зелье? И кем на самом деле было то существо в капюшоне? И главное – сработает ли оно так, как было обещано?"
evildiarchy_newmareland.2.a:0 "Теперь нам остаётся только ждать и надеяться."

evildiarchy_newmareland.3.t:0 "Проблемы в Новом Мейрленде"
evildiarchy_newmareland.3.d:0 "— Луна, ты уверена в этом? — спросила Селестия, наблюдая, как её сестра бродит по своим покоям в Кантерлотском замке, постепенно собирая багаж.\n\n— Абсолютно. Ситуация в Новом Мейрленде гораздо хуже, чем я могла себе представить, — ответила та, даже не взглянув на Селестию. — Фестралы Нового Мейрленда столкнулись с неслыханным кризисом. Я обязана лично во всём разобраться и появиться на публике.\n\nОднако слова Луны ничуть не уняли беспокойства Селестии. Хотя Новый Мейрленд обладал очень высокой независимостью во внутренних делах, она не могла припомнить ни единого инцидента, который мог бы намекать на подобное положение дел. В конце концов, в Новом Мейрленде жило не так много фестралов, да и многие исторические причины, вызывавшие трения в Эквестрии, там напрочь отсутствовали.\n\nКонечно, Селестия была далеко не безгрешна, и вполне допускала, что всё же могла проглядеть назревающий кризис. Она видела отчёт и у неё не было причин сомневаться в нём. Источник был надёжным, а изложенные факты – вполне логичными, хоть и неожиданными. Игнорирование ситуации могло привести к весьма мрачным последствиям, поэтому она понимала настойчивость Луны. И всё же... у Селестии было дурное предчувствие.\n\nОна вздохнула. — Луна, как думаешь, можешь отложить поездку ещё на один день? — Луна наконец обернулась. В её взгляде читалось одновременно замешательство и негодование. — Я бы хотела поехать с тобой, но мне нужно уладить кое-какие дела с Рэйвен перед отъездом.\n\n— Сестра? — глаза Луны расширились. — Ты это серьёзно?"
evildiarchy_newmareland.3.a:0 "— Разумеется. Мы должны решать такие вопросы сообща."

evildiarchy_newmareland.4.t:0 "Принцессы посещают Новый Мейрленд"
evildiarchy_newmareland.4.d:0 "Удивительные новости разлетелись со скоростью молнии: Селестия и Луна, правящие принцессы Эквестрии, отправляются в Новый Мейрленд. Ходят слухи, что их вызвало местное правительство после получения крайне тревожных сообщений о прискорбном положении фестралов в эквестрийской колонии. Визит, судя по всему, продлится всего неделю, ведь присутствие обеих сестёр наверняка позволит быстро разрешить ситуацию. Тем не менее, впервые в известной истории оба аликорна покинули Эквестрию. Вдобавок это первый раз, когда они посетят Грифонию."
evildiarchy_newmareland.4.a:0 "Принцессы в Новом Мейрленде? Мне нужно это увидеть!"
evildiarchy_newmareland.4.b:0 "Но как же Эквестрия?"
evildiarchy_newmareland.4.c:0 "Интересно, но нас это не касается."
evildiarchy_newmareland.4.e:0 "Подождите, что? Кто именно их вызвал?"
evildiarchy_newmareland.4.f:0 "ОБА аликорна? Но ведь только Луна... Нужно немедленно во всём разобраться!"
evildiarchy_newmareland.4.g:0 "Это не по плану. Будем надеяться, что всё пройдёт гладко."

evildiarchy_newmareland.5.t:0 "Чай с сюрпризом"
evildiarchy_newmareland.5.d:0 "Ранним утром, сразу на следующий день после прибытия в Новый Мейрленд, Селестия и Луна немедленно затребовали аудиенцию у Джет Сета. К вящему разочарованию Луны, губернатор ничего не знал о ситуации, описанной в отчёте, который Луна перечитывала столько раз, что выучила наизусть. Он ничего не слышал ни о конфискациях, ни тем более о внесудебных казнях фестралов.\n\nСелестии пришлось использовать весь свой многовековой дипломатический опыт, чтобы удержать гнев сестры под контролем, пока они не разберутся, что тут происходит на самом деле. После часа крайне напряжённых обсуждений было решено, что все трое лично расследуют факты, изложенные в отчёте. Хотя основной эмоцией после встречи было недоумение, это лишь усилило тревогу Селестии.\n\nЗатем принцессы вернулись в свои апартаменты в отеле с намерением перевести дух, в то время как Джет Сет отправился подстраивать свой график под их расследование.\n\nЛуна не стала садиться на диван рядом с Селестией, предложив вместо этого заварить чай. Потом она вернулась, присела за низкий столик и вздохнула: — Хорошие новости, сестра, здесь есть кофе, — поймав на себе прищуренный взгляд Селестии, она улыбнулась. — Не волнуйся, тебе я всё равно заварю чай.\n\n— Никогда не пойму, как ты пьёшь эту горькую гадость, Луна, — усмехнулась та, — но спасибо за чай, — сестра лишь кивнула в ответ.\n\nТем временем на кухне пребывающая в крайнем замешательстве шпионка-фестралка никак не могла решить, куда вылить содержимое своего флакона: в чайник или в вингбардийскую джезву. После мучительных колебаний она разделила зелье пополам между обоими сосудами и поскорее ретировалась.\n\nКак только чайник засвистел, Селестия зашла на кухню, заварила себе чай и налила Луне чашку кофе, после чего вернулась на диван. Чай Селестии оказался чуть слаще, чем ожидалось, но после такого непростого утра она не придала этому значения. Однако вскоре Луна спросила: — Сестра, зачем ты добавила сахар? Я же говорила, что пью чёрный кофе, — обе принцессы оцепенели, начиная понимать, что что-то тут не так."
evildiarchy_newmareland.5.a:0 "Но мир перед их глазами стал меркнуть."

evildiarchy_newmareland.6.t:0 "Вознесение"
evildiarchy_newmareland.6.d:0 "Магические потоки вырвались из Селестии и Луны – ослепительно белые и угольно-чёрные соответственно – оторвав их от пола и заключив в плотные сферы. Спустя мгновение шерсть Луны окрасилась в цвет полуночи, а грива Селестии вспыхнула, яростно трепеща на эфирном ветру.\n\nПотребовалось всего несколько секунд, чтобы их истинная мощь полностью высвободилась, после магические вихри утихли так же быстро, как и возникли. В следующее мгновение пламенные зрачки Дейбрейкер встретились с вертикальными зрачками Найтмер Мун. Оба аликорна отступили на шаг, опуская головы и направляя рога друг на друга, концентрируя разрушительную силу.\n\n— Ты! Что ты здесь делаешь? — выкрикнула Найтмер Мун.\n\n— Всё такая же вспыльчивая, не правда ли? — несмотря на насмешливый тон, Дейбрейкер оставалась начеку, следя за каждым движением своей противницы. — Отвечая на твой вопрос: не знаю. Полагаю, у тебя самой идей не больше?\n\n— Нет, но я не собираюсь попадаться на твои уловки, — тем не менее, Найтмер не нанесла удар первой.\n\nДейбрейкер закатила глаза. — Сестра, умоляю тебя. Мы обе знаем: если бы я хотела уничтожить тебя, то просто это сделала. В отличие от тебя, мне нет нужды играть в глупые игры.\n\nНайтмер сузила глаза, обнажив клыки, но вовремя осознала, что в этих словах есть доля правды. Желай того Дейбрейкер, она бы уже напала. По правде говоря, у Найтмер Мун тоже не было причин для драки. — Тебе повезло, что я готова проигнорировать этот выпад, ибо тоже не ищу бессмысленной битвы. Но ни на секунду не думай, будто я ослаблю бдительность.\n\n— И в мыслях не было, — Дейбрейкер улыбнулась. — Ох, никогда бы не подумала, что заключу перемирие именно с тобой, но это может сработать."
evildiarchy_newmareland.6.a:0 "Теперь они на одной стороне?"

evildiarchy_newmareland.7.t: "Новое назначение Джет Сета"
evildiarchy_newmareland.7.d: "Добрую половину минуты Джет Сет не находил в себе сил даже на вдох. Он лишь беспомощно взирал на двух аликорнов, чьи фигуры возвышались над ним.\n\n— Как?.. Когда?.. Почему?.. — наконец выдавил он, чувствуя, как предательски пересохло в горле.\n\n— Нам неведомо «почему», — отозвалась Найтмер Мун. — Мы лишь ведаем, что отринули ничтожные, сковывающие нас оболочки. Мы оставили их в прошлом, дабы вознестись и обрести своё истинное, вечное естество.\n\nДжет Сет не имел ни малейшего представления, как реагировать на подобные метаморфозы. Впрочем, тот факт, что его до сих пор не испепелили, вероятно, следовало считать хорошим знаком.\n\n— Полагаю, ты изнываешь от желания узнать, зачем мы потребовали твоего присутствия, — с ленивой, хищной ухмылкой произнесла Дейбрейкер. — На самом деле всё предельно просто.\n\nОна выдержала театральную паузу, наслаждаясь тем, как её слова тяжёлым жаром повисли в воздухе, но была бесцеремонно прервана сестрой.\n— Нам потребен секретарь, — отчеканила Найтмер. — Ибо отныне бразды правления Новым Мейрлендом переходят в наши копыта.\n\nВ голове Джет Сета роем закружились вопросы, один тревожнее другого. Почему именно Новый Мейрленд? Неужели они бросили Эквестрию? Или путь назад отрезан? Впрочем, инстинкт самосохранения заставил его оставить эти мысли при себе.\n\nТем временем Дейбрейкер, бросив на сестру взгляд, полный высокомерного раздражения, картинно закатила глаза:\n— Обязательно было портить такой момент?\n\nНайтмер ответила ледяным взором:\n— Я лишь полагаю, сестра, что сейчас нет ни малейшей нужды в дешёвом лицедействе. Пред нами стоят задачи, чей масштаб превышает твои сценические амбиции.\n\n— Напомни-ка мне, сестрица, — голос Дейбрейкер так и сочился сарказмом, — с чего я вообще решила, что союз с тобой – это хорошая идея?\n\nВновь ведомый лишь отчаянным желанием выжить, Джет Сет робко прочистил горло, пытаясь унять дрожь:\n— П-прошу прощения, Ваше Солнечное... э-э... Лунное... Прошу прощения, что прерываю вас. Не собирались ли вы поручить мне поиск подходящих кандидатов на должность секретаря? Я немедленно составлю список...\n\n— О, это... — Дейбрейкер вновь хищно улыбнулась. — Боюсь, ты неверно истолковал наши намерения."
evildiarchy_newmareland.7.a: "— Ты, Джет Сет. Именно ты станешь нашим секретарём."

evildiarchy_newmareland.8.t: "«Останки» конгресса"
evildiarchy_newmareland.8.d: "Сегодня состоялась инаугурация новых членов конгресса, отобранных лично сёстрами-аликорнами. Многих из них я знаю в лицо, и именно это пугает меня сильнее всего. Среди назначенных есть пони, слишком мягкие для подобных кресел – из тех, что склонны соглашаться с чем угодно. Хватает и молодых, амбициозных карьеристов, готовых расшибить голову о мраморный пол, лишь бы заслужить одобрительный кивок сверху. Есть и совершенно откровенные взяточники. Но большинство просто слишком дорожит своим положением, чтобы рискнуть и открыто пойти против сестёр.\n\nТакие политики – неизбежная плесень на теле любого государства, но в подлинный ужас меня приводит иное. Сёстры методично выкорчевали каждого пони, кто был готов хоть слово сказать против них, заменив всех недовольных послушными «кивалами», чья единственная задача – скреплять печатями любые, даже самые безумные указы. Слабым утешением служит лишь то, что конгресс всё ещё существует. Сомневаюсь, что в нынешнем виде он принесёт хоть каплю пользы обществу, но мне приходится цепляться за любую соломинку. В конце концов, даже затупившийся инструмент можно заточить заново, если подвернётся случай.\n\nИ всё же эта мысль не слишком греет. По Новому Мейрленду был нанесён тяжелейший удар; это мрачное предзнаменование, что дальше будет только хуже. Эти двое поглощают власть с пугающей жадностью, и это напрямую отражается на моём положении. Оно незавидно: я не могу позволить себе осадить одну, если не в состоянии так же удержать вторую. Стоит мне хотя бы на шаг ограничить аппетиты одной, и чаша весов тут же качнётся в сторону второй, окончательно похоронив хрупкое равновесие, на котором ещё держится страна."
evildiarchy_newmareland.8.a: "Со вздохом Джет Сет отложил перо и закрыл дневник."

evildiarchy_newmareland.9.t: "Словно его и не было"
evildiarchy_newmareland.9.d: "Всё-таки это случилось. Каждый раз, когда мне начинает казаться, будто я мало-мальски привык к новому порядку, реальность сбивает меня с копыт очередным глухим ударом. Сегодня конгресс был официально распущен. Я знал об этом задолго до публикации указа. Видит Тартар, я сам приложил к этому копыто. Но по-настоящему осознал масштаб содеянного только сейчас.\n\nПока шёл процесс, я прикрывался удобной ложью: твердил себе, что конгресс всё равно превратился в декорацию и ничего бы не решил – не с этими двумя во главе государства. Но теперь, когда его не стало, я ясно вижу: я лишь отчаянно пытался разжечь хоть искру смысла из кучи пепла. Правда в том, что конгресс был нашей последней вуалью. Он служил тем необходимым фасадом, который позволял выдавать волю диархов за решения суверенного государства и поддерживать в народе иллюзию порядка.\n\nТеперь маски сброшены. Пони напуганы, а страх – плохой советчик: он толкает к эгоизму, заставляя думать лишь о себе. Я не вправе их винить, но мне до смерти страшно представить, что будет, когда всё начнёт рушиться. Признаться честно, я дрожу вовсе не за судьбы обывателей – по крайней мере, не в первую очередь. Я попросту боюсь того, на что способны аликорны, если что-то вдруг пойдёт не по их указке. Делает ли это меня бессердечным подонком? Имею ли я вообще право рассуждать о таких вещах?\n\nКакая-то часть меня ядовито шепчет: «да». В конце концов, если сёстры испепелят нас всех в пылу очередной семейной склоки, вопрос о стабильности отпадёт сам собой за отсутствием живых. С другой стороны, совершенно неважно, что я думаю. Мне их не остановить. Мой удел – лишь выторговывать крохи времени для тех, кто ещё на это способен. Если бы только эти мысли перестали выжигать меня изнутри."
evildiarchy_newmareland.9.a: "Со вздохом Джет Сет отложил перо и закрыл дневник."

evildiarchy_newmareland.10.t: "Веские слова"
evildiarchy_newmareland.10.d: "— Вы желали видеть меня, Ваше Величество? — произнёс Джет Сет, осторожно приоткрыв дверь в новый кабинет Дейбрейкер.\n\nЕго не покидало дурное предчувствие. Впрочем, как и всегда.\n— Да. У меня созрел план... Я решила, как нам поступить с местными гармонистами.\n\nДейбрейкер издала тихий, едва слышный смешок, от которого сердце Джет Сета пропустило удар, а по спине пробежал холодок.\n\n«Неужели она решилась на... самое худшее?» — пронеслось у него в голове.\nПриказав себе сохранять лицо, он осторожно уточнил:\n— Каков ваш дальнейший замысел, Ваше Величество?\n\nДейбрейкер усмехнулась, и в её глазах, сияющих подобно двум сверхновым, промелькнуло издевательское сочувствие. Его страх явно её забавлял.\n— Я поговорю с ними. Лично.\n\nДжет Сет невольно выдохнул. Это... это было куда лучше, чем он смел надеяться.\n— Я немедленно распоряжусь о встрече, — быстро проговорил он, будто опасаясь, что малейшее промедление заставит её передумать. — В котором часу прикажете созвать делегацию?\n\n— О... — её улыбка стала шире, обнажая зубы в хищном оскале. — Полагаю, полдень подойдёт идеально. Это поможет им во всех красках осознать, чем именно они рискуют, отказываясь подчиниться.\n\nВот оно что. В этом и заключался подвох. Она заставит их либо играть по её правилам, либо исчезнуть навсегда. Иного и не стоило ждать от эгоцентричного, всемогущего и глубоко порочного аликорна."
evildiarchy_newmareland.10.a: "— Слушаюсь."

evildiarchy_newmareland.11.t: "Простейшее решение в мире"
evildiarchy_newmareland.11.d: "— И ещё кое-что, Ваше Величество, — заметил Джет Сет, едва касаясь пером последнего пункта в своём перечне. — Партия гармонистов исконно обладала немалым весом в Новом Мейрленде.\n\nОт того, что он преподносил это как нейтральный факт, желудок сжался в тугой, болезненный комок.\n\n— Они уже начали смыкать ряды, формируя оппозицию нашему курсу...\n\n— О, отринь свои суетные тревоги. Сей маловажный спор уже обрёл своё завершение, — произнесла Найтмер Мун с безмятежностью самой ночи.\n\n— Что... что именно вы имеете в виду? — Джет Сет всем своим существом не желал слышать ответа, но знал, что обязан спросить.\n\n— Я замышляла вручить тебе сие поручение лишь с приходом солнца, но коль речи твои коснулись их участи...\n\nАликорна отворила один из ящиков стола, и густое сияние магии извлекло оттуда сложенный лист бумаги. Он плавно поплыл по воздуху к Джету. Это был список имён с адресами, начертанными безупречным каллиграфическим почерком.\n\n— Будь же любезен, донеси сию весть до кровных родичей тех изменников, что в ослеплении своём дерзнули восстать против воли нашей.\n\n— Да... конечно...\n\nДжет Сету стоило колоссальных, почти невозможных усилий сохранить на лице маску беспристрастности, хотя к горлу уже подступала тошнота. И чему он удивлялся? Он ведь знал, что всё к этому и шло.\n\nНайтмер одарила его мрачной, певучей усмешкой:\n— Полагаю, ты волен поднести им в дар корзину с каким-нибудь лакомым подношением, дабы сладость угощения умерила горечь их пустых сетований и скрасила часы безвозвратной разлуки.\n\nДжет Сет стиснул зубы так, что челюсть свело судорогой. Ему пришлось собрать всю свою волю, дабы не позволить этой издевательской «шутке» вызвать в воображении живую картину происходящего."
evildiarchy_newmareland.11.a: "— Будет исполнено, Ваше Величество."

evildiarchy_newmareland.12.t: "Проблеск здравомыслия"
evildiarchy_newmareland.12.d: "В дверь кабинета Джет Сета постучали. Должно быть, это Кэнди Гарден.\n— Войдите, — отозвался он. Отложив ворох отчётов, он жестом пригласил гостью к креслу. — Прошу простить мою поспешность. Признателен, что вы изыскали возможность для встречи в столь сжатые сроки.\n\n— О, пустяки, — ответила она, устраиваясь поудобнее. — Для меня большая честь знать, что мои соображения по реформированию армии удостоились вашего внимания.\n\n— Не стоит быть столь скромной, мисс Гарден. Я бы и не узнал о ваших трудах, если бы о них не отзывались с таким восторгом, — он одарил её искренней улыбкой. — Чем глубже я вникаю в суть ваших предложений, тем сильнее мой интерес. В наши дни трибуны захвачены радикалами, жаждущими мгновенных перемен любой ценой. Вы же, напротив, понимаете, что истинные реформы нуждаются во времени и осторожности.\n\n— Прошу вас, зовите меня просто Кэнди.\n\nОна принялась подробно излагать каждый этап своего плана. Джет Сет изредка вставлял замечания, уточняя технические детали или предлагая косметические правки, но про себя отметил, что эта кобыла из министерства обороны знает своё дело безупречно. Впрочем, саму суть её идей он внутренне отвергал.\n\nВскоре стало предельно ясно, почему диархия благоволит Кэнди: с каждым новым витком её реформ армия, а за ней и всё общество всё теснее опутывались невидимыми нитями зависимости от воли сестёр. И всё же постепенный, вкрадчивый характер этого плана давал пони хоть какую-то возможность свыкнуться с новым положением вещей."
evildiarchy_newmareland.12.a: "Это решение не было идеальным, но оно казалось благом на фоне любых альтернатив."

evildiarchy_newmareland.13.t: "Проблеск не совсем здравомыслия"
evildiarchy_newmareland.13.d: "Когда Аркэйн Нова вошла в кабинет, Джет Сету пришлось приложить немало усилий, чтобы не вздохнуть – он прекрасно знал, к чему всё идёт. Кобыла, если и заметила его досаду, никак её не прокомментировала и просто уселась напротив.\n\n— Доброго дня, Джет Сет, — произнесла она с самодовольной ухмылкой.\n\n— Здравствуйте, мисс Нова. Полагаю, вам уже сообщили о цели нашего разговора? — он решил не тратить время на светские прелюдии, хотя сухой тон и претил его натуре. Джет Сет гордился своим умением встречать каждого пони с одинаковым радушием, но сейчас маска «доброго секретаря» сидела на нём скверно: слишком уж много доносов и сводок он успел прочесть об этой кобыле.\n\n— Разумеется. Её Божественное Величество Дейбрейкер избрала меня своим мечом для надзора за военными реформами, — улыбка Новы мгновенно сменилась гримасой брезгливости. — Впрочем, скажу прямо: я в ярости от того, что мне придётся работать бок о бок с этой Найтмер и её безумным сбродом сектантов.\n\nДжет Сет всё-таки не выдержал и прикрыл глаза. Что ж, по крайней мере, она сама избавила его от необходимости поднимать эту тему.\n\n— Мисс Нова, я не вправе диктовать вам, кому из наших правительниц отдавать своё сердце, но прошу... на мгновение задумайтесь о том, чего желает сама Её Величество, — он сделал паузу, поймав её заинтригованный, колючий взгляд. — Её Величество Дейбрейкер лично скрепила союз с Найтмер Мун. Как вы думаете, придётся ли ей по нраву, если её верный офицер начнёт сеять смуту и ставить под сомнение мудрость её выбора?\n\nЭто была чистой воды импровизация: Дейбрейкер вряд ли заботили чувства подчинённых, но только взывая к фанатичной преданности, он мог удержать Нову в узде.\n\nАркэйн, разумеется, и не подумала скрывать своего раздражения.\n— Поняла вас. Буду работать с тем материалом, что есть в наличии, — она картинно закатила глаза, выплёвывая слова. — Даже если это означает, что мне придётся терпеть этих... «найтмеристов».\n\nОна подалась вперёд, и её взгляд стал по-деловому жёстким:\n— В любом случае, полагаю, нам есть что обсудить по существу.\n\nХотя остаток беседы прошёл внешне благопристойно, Джет Сет не мог отделаться от липкого чувства тревоги. Идеи Новы были просты, эффективны и разрушительны, как пушечный залп. В её мире не было места компромиссам – только победа или смерть."
evildiarchy_newmareland.13.a: "Похоже, его возможности по «сглаживанию углов» оказались небезграничны."

evildiarchy_newmareland.14.t:0 "The Charade Comes To An End"
evildiarchy_newmareland.14.d:0 "##TODO, event in which the fragile relationship between the sisters collapse and the administration goes along with it. The event doesn't show anything directly, but it suggests that their fighting might lead to the end of the world just by describing how heated things are becoming. The player's game ends here."
evildiarchy_newmareland.14.a:0 "If only things went differently."

evildiarchy_newmareland.15.t:0 "Наконец-то хорошие новости"
evildiarchy_newmareland.15.d:0 "Джет Сет вздохнул, и на его лице заиграла довольная улыбка. Прямо перед ним дюжина стражников под конвоем выводила из здания Пикет Фенса вместе с его прихвостнями. Джет Сет жалел лишь о том, что не сделал этого раньше. Он не противостоял Пикет Фенсу так решительно, как следовало бы, и ничего не предпринимал, чтобы обуздать ту ненависть к грифонам, на волне которой лидер партии и пришёл к власти.\n\nС другой стороны, методы самого Джет Сета были бы куда более изящными и, вероятно, принесли бы куда меньше удовлетворения. А может, как раз дополнительные усилия сделали бы финал ещё слаще.\n\nТак или иначе, Пикет Фенс наконец-то лишился всяческой власти, и впервые в жизни Джет Сет по-настоящему гордился своими действиями. Ему не нужно было убеждать себя в том, что он поступает правильно; он это просто знал."
evildiarchy_newmareland.15.a:0 "Если бы только не пара безумных аликорнов..."

evildiarchy_newmareland.16.t:0 "Встреча с "пророком""
evildiarchy_newmareland.16.d:0 "Джет Сету стоило огромных усилий не стиснуть зубы. — Мистер Дью, — произнёс он, — я был бы признателен, если бы вы перестали уклоняться от вопросов и уводить разговор в сторону. Давайте наконец перейдём к сути нашей встречи, — Джет Сет пытался обсудить роль, которую Ивнинг Дью, самопровозглашённый пророк Найтмер Мун, будет играть в правительстве, но каждая попытка натыкалась на очередную байку, лирическое отступление или спонтанную тираду.\n\nИвнинг Дью подался вперёд, подпирая голову копытами, и изобразил на редкость ядовитую улыбку. — Раз уж мы заговорили прямо: я отказываюсь обсуждать эти вопросы с вами и требую личной аудиенции у Её Величества Найтмер Мун.\n\nДжет Сет вздохнул, потирая висок. Ну хотя бы Дью наконец решил сбросить маски. — Тогда, полагаю, я тоже был недостаточно ясен. Её Королевское Величество Найтмер Мун назначила меня своим секретарём по ряду веских причин и поручила мне официально нанять вас в качестве оратора от её имени, — он сделал паузу, пристально глядя на несносного жеребца. — Вы можете принять её решение, поговорить со мной и работать на неё. Или нет. Выбор за вами.\n\nЭти слова наконец стёрли раздражающую ухмылку с лица Ивнинг Дью. — Хорошо, если вы настаиваете на этом в таком тоне. Императрица непременно оценит мой труд, так что я уверен: это не единственный мой шанс, — Джет Сет сдержал желание закатить глаза и уже открыл рот, чтобы ответить, но его перебили. — Нет-нет, не утруждайтесь. Я знаю, чего вы от меня хотите. В конце концов, я и так уже этим занимаюсь.\n\n— Хорошо, тогда позвольте выдвинуть два условия, — Ивнинг Дью вскинул бровь. — Во-первых, вы должны помнить, что императрица решила заключить союз с Дейбрейкер, и вам не следует разжигать ссоры, — теперь пришла очередь Дью закатывать глаза, но он всё же кивнул. — Кроме того, будет неплохо, если вы постараетесь избегать враждебности по отношению к грифонам и...\n\n— Совершенно исключено. Я могу попытаться игнорировать соляристское отребье, но грифоны – враги всего рода пони. И императрица, и... второй аликорн прекрасно об этом знают."
evildiarchy_newmareland.16.a:0 "Что ж, на большее рассчитывать и не стоило."

evildiarchy_newmareland.17.t:0 "Just As Expected"
evildiarchy_newmareland.17.d:0 "##TODO, some days after the choice to ally Dew has been made a new event will play in which it will describe how the choice might not have been that great. Namely brawls have been reported between griffon subjects and lunarist forces who have been listening to what Evening Dew has been putting out. Due to this Nightmare Moon herself had to get involved and drag him to a private room where she can decide upon her next step. Does she admit she was wrong and fire him or does she keep him around despite the danger?"
evildiarchy_newmareland.17.a:0 ""You need to go. For good.""
evildiarchy_newmareland.17.b:0 ""Don't mess up again or it will be the last time.""

evildiarchy_newmareland.18.t:0 "A Broken Clock"
evildiarchy_newmareland.18.d:0 "##TODO, Jet Set is tasked with the job of cutting Evening Dew off from all his sources of funding and power in the name of keeping the griffon subjects loyal. He does not mind carrying this out in the slightest, at least something slightly positive is being done for once, even if for all the wrong reasons."
evildiarchy_newmareland.18.a:0 "Better than the alternative."

evildiarchy_newmareland.19.t:0 "Learning From The Enemy"
evildiarchy_newmareland.19.d:0 "##TODO, Jet Set hadn't paid much attention to Maresoc back in the "normal" days of New Mareland, but now that he was tasked with setting up a meeting between this Big Sister and the diarchs he had to quickly become familiar with them. He is unable to find this pony, theorizing she might not really exist, so instead he invites some higher-ups of the party for the meeting in which they share their methods with the monarchs who in response allow these members to be integrated into the government as long as they swear loyalty to them. As expected the sisters were really interested in the spy and social control methods."
evildiarchy_newmareland.19.a:0 "This shall be useful."

evildiarchy_newmareland.20.t:0 "An Ideal Corrupted"
evildiarchy_newmareland.20.d:0 "##TODO, The meeting with Blueberry Frost was as intense as one could expect, but it was surprisingly fruitful. The mare personally might not have been too happy to work with the monarchs, but she knew she had to if she wanted her head to remain where it was. The idea was simple: "equalism" would be used to create an eternal united class in which all the people of the realm would belong to, one where mediocrity and compliance would be expected and race would be ignored. A cemented cast for all the populace, where they would only act and rise the ladder when instructed to."
evildiarchy_newmareland.20.a:0 "You will learn to like it."

evildiarchy_newmareland.21.t:0 "Know Your Place"
evildiarchy_newmareland.21.d:0 "##TODO, The diarchs decide that there is no need to meet with anyone or make any deals, instead they make Jet Set set up an event in which union leaders from all over New Mareland are forced to participate. The message of the diarchs is clear, either bend your head down and accept becoming state-owned or be "removed". There is no room for compromise or deals."
evildiarchy_newmareland.21.a:0 "No more of this socialism nonsense."

evildiarchy_newmareland.22.t:0 "The Remainder"
evildiarchy_newmareland.22.d:0 "##TODO, To Jet Set and the diarchs it is clear the Kingfisher is a republican, but even so he's also not dumb, therefore an agreement is reached where the remaining fence-sitting ponies are fully integrated into the government without any major punishments as long as the stallion is able to keep them under control and is able to keep his head down. He's also tasked with denouncing his own support of republicanism, which he does, even if against his wishes. This is all done in a meeting with Jet Set. It is very clear that the diarchs aren't becoming populists, more so that they're giving these ponies one last chance before being culled."
evildiarchy_newmareland.22.a:0 "Do what you're told and it will be fine."

evildiarchy_newmareland.23.t:0 "First Of Many Steps"
evildiarchy_newmareland.23.d:0 "##TODO, The monarchs present themselves to a crowd as they stand on a high balcony of what once was the seat of government of New Mareland, which has now been transformed into a prim and proper palace fit for empresses. The two get their own chance of speaking during the shared speech before they jointly announce their ambitions for Griffonia and beyond."
evildiarchy_newmareland.23.a:0 "This can't be good."

evildiarchy_newmareland.24.t:0 "Built For War"
evildiarchy_newmareland.24.d:0 "##TODO, This event is from the POV of an "average" pony in New Mareland, namely, a shadowbolt factory owner. Here they think to themselves about how things have drastically changed in just a few months. New Mareland was always somewhat industrialized, but it had become something even more than that, it felt like there were new factories popping up every other second, at this point factory owners were running out of people to hire. Even though this could be considered a positive the pony still worries that this ultra-industrialization will all come crashing down as soon as any tiny issue shows itself. For example, what will happen to the economy if a big war stagnates? Or what if, at some point, there are no new wars at all?"
evildiarchy_newmareland.24.a:0 "One can hope that everything goes to plan."

evildiarchy_newmareland.25.t:0 "The First Domino Falls"
evildiarchy_newmareland.25.d:0 "##TODO, The first great conquest has been achieved. Here we see Nightmare Moon and Daybreaker having a rare bonding moment as they jointly gloat about their conquest of the region. Jet Set is relieved to see them getting along for once and gets lured into a false sense of security that this state might just work after all. This perception gets shattered rather quickly as they start to claim their side was the one responsible for the victory after the friendly gloating gets out of hand."
evildiarchy_newmareland.25.a:0 "Griffonia should be worried."

evildiarchy_newmareland.26.t:0 "Reaching A Compromise"
evildiarchy_newmareland.26.d:0 "##TODO, The question of faith has been one haunting this diarchy since it first appeared. It is clear that there needs to be some unifying faith that helps to unite all the people in the continent, at least that was what Jet Set suggested to the diarchs. Neither was particularly happy about having to combine their religious movements but they saw no other way around it. In this event we see both of them trying to figure out the best way to do it, from symbolism to what exactly it means. They refused to get outside help for this, it's something they want to do on their own."
evildiarchy_newmareland.26.a:0 "Will this work?"

evildiarchy_newmareland.27.t:0 "Keeping An Eye"
evildiarchy_newmareland.27.d:0 "##TODO, Event based on NMM's idea, here it is decided to double-down on the spy operations against the citizenry of the country in order to keep any future "problems" at bay. Will include a scene in which a pony is being followed for the entire day, he tells this to people around him but they tell him he's imagining things due to them not wanting to be followed too. The pony ends up disappearing at the end of the event."
evildiarchy_newmareland.27.a:0 "Whatever it takes to keep them safe."

evildiarchy_newmareland.28.t:0 "Mothers Knows Best"
evildiarchy_newmareland.28.d:0 "##TODO, Instead of betting on increasing spy and intelligence assets the diarchs decide to go with Daybreaker's idea. Here the alicorns are presented as these motherly figures to the public, ones who only wish the best for their people, and, as such, the people should report anyone who wishes to harm or depose those who look out for them. The idea is to build this unhealthy relationship between the state and the citizens. Could include a scene where a foal reports their own brother to the state."
evildiarchy_newmareland.28.a:0 "They only want our best."

evildiarchy_newmareland.29.t:0 "As Best As It Can Get"
evildiarchy_newmareland.29.d:0 "##TODO, When deciding in which way to train the army New Mareland ends up going with Nightmare Moon's idea, that being to train the troops with "lunarist standards". That mainly means focusing on discipline and training, even if it means taking a lot longer to get ponies out in the field. Jet Set writes here in his journal that the troops seemed pretty good and professional, but that he couldn't help but feel like they would display his body in a public square if he ever messed up, that edge of zealotry and intensity was clearly there."
evildiarchy_newmareland.29.a:0 "Victory is near."

evildiarchy_newmareland.30.t:0 "The Will To Serve"
evildiarchy_newmareland.30.d:0 "##TODO, It is decided to adopt a more "solarist" way of training divisions, and by that it mostly means Daybreaker's idea of doubling down on the zealotry and unquestioning loyalty. Here Jet Set writes in his journal on how these new troops seemed pretty eager to do what needed to be done besides some minor setbacks with their less than clear state of mind. He could tell they lacked a bit of discipline by the way they stared at him with those death glares due to his close proximity with the alicorns the day he went to visit. It's as if they were both jealous and angry."
evildiarchy_newmareland.30.a:0 "Victory is the only option."

evildiarchy_newmareland.31.t:0 "True Friendship Has Never Been Tried"
evildiarchy_newmareland.31.d:0 "##TODO, Equestria was proving to be a big issue to the diarch's operation in Griffonia, and this fact was not helped by Equestria clearly having a moral and ideological edge over the alicorns. But this wouldn't stand. In a rare show of direct cooperation both Nightmare Moon and Daybreaker decide on redefining what friendship, the elements, and harmony really is, and after that's done they release their own version of the journal of friendship, one that is distributed to schools and libraries across the nation. This is also done to discredit the mane 6 back home, since it directly calls them out as being “fake” elements."
evildiarchy_newmareland.31.a:0 "War is your best friend."

evildiarchy_newmareland.32.t:0 "The Gathering Storm"
evildiarchy_newmareland.32.d:0 "##TODO, Based on the success of the destruction of the tomb and the need to impose the new faith in the newly conquered territories the alicorns decide that it is necessary to destroy all temples to other “gods” that are present in Griffonia. In this event both also publicly announce that it is now illegal to publicly be part of any faith but theirs. Jet Set just kind of sits there during the speech trying not to pass out over the instability this will cause. He knows that the rest of Griffonia will answer, and their answer won't be very nice or peaceful."
evildiarchy_newmareland.32.a:0 "Griffonia won't know peace."

evildiarchy_newmareland.33.t:0 "Back To Where We Belong"
evildiarchy_newmareland.33.d:0 "##TODO, New event that had to be added for lore reasons. Soon after appointing Jet Set as their secretary they immediately try to launch a “solo” invasion of Equestria to get back what's theirs, but they find themselves stopped by a magic shield apparently created by the tree of harmony that keeps the evil alicorns away from being able to return to Equus. Seems like they are truly stuck in Griffonia until they find enough magic to be able to defeat said shield. One of the alicorns suggests trying to gather artifacts from all over Griffonia and use their magic to destroy the shield. From then on the objective is clear, find as many artifacts as possible to bring down the shield and defeat the pretenders, along the way also solidify control over the continent to both reach the artifacts and to build a power base."
evildiarchy_newmareland.33.a:0 "Guess we should start looking."

evildiarchy_random.1.t:0 "The New Meta?"
evildiarchy_random.1.d:0 "##TODO, In this event Daybreaker announces the creation of the “special unit” consisting almost entirely of armored cars and rocket artillery. The unit isn't any good and cannot be deleted. Nightmare Moon opposes the creation of it, saying there's no way it could work. Jet Set has the option of siding with NMM to prevent it from being created."
evildiarchy_random.1.a:0 "Maybe it will be good?"
evildiarchy_random.1.b:0 "Absolutely not."

evildiarchy_random.2.t:0 "Uniforms"
evildiarchy_random.2.d:0 "##TODO, In a calmer event Daybreaker and Nightmare Moon drag Jet Set aside as they try to get his help in deciding for new uniforms for the army and other public institutions. The stallion considers himself a stylish pony, one who greatly cares about fashion, but even he gets burnt out and overwhelmed by the indecisiveness and constant bickering between the alicorns as they have a hard time agreeing on the same designs. This moment was a great reminder that they were siblings. Ultimately he will have to choose between them."
evildiarchy_random.2.a:0 "Daybreaker's looks better."
evildiarchy_random.2.b:0 "I prefer Nightmare Moon's."

evildiarchy_random.3.t:0 "Eternal Night"
evildiarchy_random.3.d:0 "##TODO, Not to leave Daybreaker being the only one who ends up breaking the agreement by accident in the heat of the moment we have another case. Here Nightmare Moon decides to declare eternal night in order to appease her support base and to show her power to the world. If possible this will actually make the game have an eternal night. Jet Set passes out over the news."
evildiarchy_random.3.a:0 "This won't end well."

evildiarchy_random.4.t:0 "Calming Tensions"
evildiarchy_random.4.d:0 "##TODO, To no one's surprise Daybreaker isn't all that pleased about the change in scenery and demands that Nightmare Moon backtracks or else. Even if not too happy about it NMM still would rather the realm not collapse right now, so she ends up accepting to lower the moon. Jet Set has to do a lot of heavy lifting in this event to prevent the two fighting like they did the first time this happened, namely by bringing up how they need to work together if they ever wish to return to Equus."
evildiarchy_random.4.a:0 "It worked?"

evildiarchy_random.5.t:0 "The Great Statue"
evildiarchy_random.5.d:0 "##TODO, Nightmare Moon and Daybreaker are grumpy to reveal to their subjects the construction of a grand statue in the capital of “New Mareland”, the construction had been happening in secret and now it had been completed. The statue in question is covered by a big piece of fabric and it's clearly made out of solid gold judging by the bits that stick out, it seems they will reveal it soon. Now the question is, who does this statue depict? It is clear it only depicts one of them by the way they keep eyeing each other with those very friendly gazes. Either way it will cost the coffers a pretty penny."
evildiarchy_random.5.a:0 "A grand statue of Daybreaker"
evildiarchy_random.5.b:0 "A beautiful statue of Nightmare Moon."

evildiarchy_random.6.t:0 "The Best Tank Division Ever Made"
evildiarchy_random.6.d:0 "##TODO, In this event Nightmare Moon is excited to show off the newest model of tank that she has developed all on her own without any professional supervision. None of the generals present are brave enough to say the truth, that being that the tanks developed by the alicorn is truly horrendous in every conceivable way. They take way too much fuel, they're slow, and they are sure to eat through supply, the only positive is their thick armor and big guns, which, in truth, are more of a detriment. This event spawns in a division filled with these tanks, it cannot be deleted as the NMM wouldn't appreciate it. The player can decide to side with Daybreaker and prevent it from being deployed."
evildiarchy_random.6.a:0 "They look just... Amazing."
evildiarchy_random.6.b:0 "Maybe let's not."

evildiarchy_random.7.t:0 "Name Question"
evildiarchy_random.7.d:0 "##TODO, Daybreaker and Nightmare Moon are getting quite heated over the discussion of what name Sunset should have. Daybreaker argues that the current name is fine, but NMM wants it changed to “Midnight”, before things get out of hoof Jet Set intervenes and has to choose one."
evildiarchy_random.7.a:0 "Midnight is a good name."
evildiarchy_random.7.b:0 "The name is fine as is."

evildiarchy_random.8.t:0 "Student Of My Own"
evildiarchy_random.8.d:0 "Even though Daybreaker does not have a student of her own anymore, Nightmare Moon is still jealous over the fact her sister once had one. In order to get back at her, NMM decides to look for a student of her own. After some looking and convincing she proudly announces her new student to Daybreaker and Jet Set, that being no other than one of Twilight's old friends, Moon Dancer. Even if unhappy, Daybreaker doesn't have a real argument of why her sister couldn't have a student, so she's allowed to “keep” her."
evildiarchy_random.8.a:0 "Poor mare."


######### Equestria events ############

evildiarchy_equestria.1.t:0 "Рэйвен Инквелл зовёт на помощь"
evildiarchy_equestria.1.d:0 "Принцесса Дружбы появилась во вспышке розовой магии. — Рэйвен! Что случилось? Селестия сказала мне, что они с Луной отправятся в Новый Мейрленд на неделю, а ты остаешься за главную в замке до их возвращения. Но, я не ожидала увидеть твоё срочное послание, поэтому прибыла сразу как только смогла.\n\n— Твайлайт! Хвала Селестии, ты здесь. Или, может, не совсем ей... я уже не знаю, что и думать. Этим утром я получила телеграмму от Джет Сета – ну, губернатора Нового Мейрленда – и... Селестия и Луна... они уже не те, что прежде! Он пишет, что они как-то...  преобразились... в Найтмер Мун и... Дейбрейкер? — голос Рэйвен Инквелл дрогнул, она заметно дрожала. Её привычное бюрократическое хладнокровие окончательно испарилось. — Что нам теперь делать, Твайлайт?\n\n— Найтмер Мун, говоришь? Луна снова преобразилась? Но как? Почему? Неважно, сейчас нет времени обсуждать детали. Мне нужно собрать Элементы Гармонии. Вместе мы уже побеждали Найтмер Мун, так что опять же вместе сделаем это снова!\n\n— Погоди! — выкрикнула Рэйвен Инквелл. — Не только Найтмер Мун! Джет Сет пишет, что Селестия тоже изменилась. Он не сообщил подробностей, но, похоже, они обе трансформировались, Селестия знает как! — кобыла осеклась, осознав сказанное. — Наверное, мне стоит перестать так выражаться.\n\n— Обе? Это крайне тревожно. Не представляю, как нам всё исправить, если они обе сошли с ума. Элементы Гармонии могут справиться только с одним аликорном! Нам нужно выяснить, что произошло, и чего они хотят. Похоже, пока сёстры решили задержаться в Новом Мейрленде? Но боюсь, это ненадолго, — Твайлайт принялась рысить кругами. — Дейбрейкер... Дейбрейкер... где же я слышала это имя? Может, в какой-то книге? Мог ли Старсвирл Бородатый знать что-то о ней? — она внезапно остановилась, врезавшись в секретаршу. — А хотя нет, о чём я вообще? Дейбрейкер... Старлайт Глиммер рассказывала мне о ней! Злая версия Селестии! Я и не знала, что она реальна, — Твайлайт обернулась. — Рэйвен, никуда не уходи, я сейчас оповещу остальных носительниц элементов гармонии. И пока что никому ни слова. Я вернусь как только смогу."
evildiarchy_equestria.1.a:0 "Последовала ещё одна розовая вспышка, и Рэйвен Инквелл осталась в одиночестве."

evildiarchy_equestria.2.t:0 "Карта знаков отличия"
evildiarchy_equestria.2.d:0 "Как только Твайлайт Спаркл телепортировалась домой, она почувствовала знакомый зуд – Древо Гармонии призывало её. И, судя по всему, не её одну, так как у Карты знаков отличия её уже ждали Спайк и остальные пятеро носительниц элементов. Но было кое-что странное: обычно Карта просто указывала место проблемы и, возможно, тех, кто должен отправиться на помощь, но на этот раз сияла вся Эквестрия.\n\nЭпплджек указала копытом на карту: — Твайлайт, ты понимаешь, в чём дело? Я тут как раз спорила с Рэйнбоу Дэш, но это же какая-то ошибка, верно? Я имею в виду, как это Древо ожидает от нас спасения всей Эквестрии разом? Не то чтобы мы раньше такого не делали, но сейчас эта карта – самая бесполезная вещь, что я видела в своей жизни.\n\n— Могу только догадываться. Считанные минуты назад меня вызвала Рэйвен и сообщила, что Селестия и Луна... они обе преобразились! Вы помните Старлайт Глиммер и её кошмар? Тот, где Селестия превратилась в Дейбрейкер и сражалась с Найтмер Мун? Если Рэйвен права, то вся Эквестрия в опасности. И, возможно, именно поэтому светится вся карта.\n\n— Ну и как нам тогда это исправить? Древо могло бы немного помочь и хотя бы подсказать, с чего начать, разве нет? То, что оно подсветило вообще всё, на мой взгляд, не особо-то помогает.\n\n— Погодьте, — вмешалась Рэйнбоу. — Селестия и Луна превратились в своих злых двойников, а мы ничего не заметили? Как такое вообще возможно? Это же должна была почувствовать вся страна. И разве они не сражались друг с другом в том сне Старлайт? Ну, когда ещё Дейбрейкер вела себя столь заносчиво?\n\n— Не знаю! Я не вижу всей картины целиком, только отдельные фрагменты. Селестия и Луна отправились с визитом в Новый Мейрленд, а потом Рэйвен Инквелл получила телеграмму от губернатора. Полагаю, мы не почувствовали магического всплеска просто потому, что это случилось слишком далеко. Но это не отменяет опасности, да и Древо тоже утверждает, что у Эквестрии проблемы. А пока мне нужно, чтобы вы все отправились со мной в Кантерлот: я не могу оставить Рэйвен одну, пока мы ищем решение."
evildiarchy_equestria.2.a:0 "Будем надеяться, что во всём разберёмся – и быстро."

evildiarchy_equestria.3.t:0 "Чрезвычайный совет"
evildiarchy_equestria.3.d:0 "Шесть носительниц элементов гармонии вместе со Спайком и крайне обеспокоенной Рэйвен Инквелл собрались в тронном зале кантерлотского замка. Ещё мгновение назад Рэйнбоу Дэш читала Рэйвен лекцию о крутости элементов – видимо, в тщетной попытке успокоить единорожку – пока Рарити её не остановила.\n\n— Я полагаю, — начал Спайк, — теперь ты правящая принцесса Эквестрии, Твайлайт? Селестия и Луна сошли с ума, Каденс и Фларри Харт в Кристальной Империи... так что кроме тебя других кандидаток нет, — Рэйвен слегка кивнула и поклонилась. Она настолько успокоилась, что к ней вернулась привычная бюрократическая выправка. Остальные пятеро пони последовали её примеру.\n\n— Сейчас не время для принцесс, Спайк! — резко ответила Твайлайт. — И вы пятеро, вы же мои подруги, вам вовсе незачем мне кланяться! Нам в копыта свалилась проблема дружбы просто планетарного масштаба. Как я могу просто сидеть на этом троне и править Эквестрией? Нужно вернуться к Древу Гармонии, чтобы понять смысл карты знаков отличия. А после нам понадобятся все элементы, чтобы превратить Дейбрейкер и Найтмер Мун обратно в Селестию и Луну – если, конечно, мы поймём, как это сделать.\n\n— Но ты же единственная оставшаяся аликорн, дорогуша, — возразила Рарити. — Кто ещё сможет управлять Эквестрией? Пони нужна принцесса.\n\n— Мы должны решить это вместе. Как подруги! Вшестером... — Спайк демонстративно откашлялся, — ...то есть всемером мы сформируем чрезвычайный совет для управления Эквестрией. Это непросто, но необходимо. Рэйвен, без твоей помощи нам никак не обойтись, потому что нам шестерым... то есть семерым, вероятно, придётся отправиться в далёкие земли или заниматься другими делами. Ты согласна, Рэйвен? — единорожка кивнула. — Тогда решено. Мы подготовим радиообращение к гражданам Эквестрии как можно скорее. Спайк, займёшься этим? — дракон отсалютовал. — Мы с Рэйвен попробуем разузнать больше деталей у Джет Сета. А вы пятеро... управление Эквестрией параллельно с нашей миссией потребует всех доступных сил, так что, пожалуйста, посмотрите, чем вы можете помочь правительству."
evildiarchy_equestria.3.a:0 "Только бы избежать массовой паники."

evildiarchy_equestria.4.t:0 "У Древа гармонии – Часть I"
evildiarchy_equestria.4.d:0 "— Так, давайте-ка докопаемся до сути.\n\nТвайлайт расправила крылья и спустилась в пещеру, где росло Древо гармонии. Позади она услышала звонкое "И-и-и-ха!" Эпплджек, которая галопом неслась вниз по ступеням. Вскоре вся шестёрка стояла у входа в пещеру, откуда изливался ослепительный свет.\n\n— Не припоминаю, чтобы оно сияло так ярко, — прошептала Флаттершай. — Как... как вы думаете, это не опасно, Твайлайт? Может, нам стоит вернуться к карте и поискать ответы у неё?\n\n— Да брось, Флатти. Нет причин пугаться какого-то дерева. Оно всегда нам помогало, разве нет? — Рэйнбоу Дэш зависла в воздухе, лениво взмахивая крыльями. — Твайлайт, одно твоё слово – и ворвёмся в эту пещеру!\n\n— Не нужно никуда нестись, сломя голову, — ответила Твайлайт. — Но нам действительно стоит подойти к Древу. Мы уже достаточно изучили карту, и, кроме того что она подсветила всю Эквестрию, никаких новых зацепок не получили. Нет, нам нужно навестить само Древо. Но с должной осторожностью, Рэйнбоу.\n\nПони вошли в пещеру. Древо Гармонии сияло, а камни Элементов вибрировали. Но это было не единственное изменение со времени их последнего визита: на Древе выросла новая ветвь, образовав некое подобие подставки. На ней покоился сияющий шар, словно созданный из чистой магии. Твайлайт подошла поближе и осмотрела предмет со всех сторон. Внутри шара плясали искры магии, из-за чего он походил на миниатюрное солнце."
evildiarchy_equestria.4.a:0 "Она слегка коснулась шара своим рогом."

evildiarchy_equestria.5.t:0 "У Древа гармонии – Часть II"
evildiarchy_equestria.5.d:0 "Как только рог Твайлайт коснулся магического шара, она почувствовала, как копыта отрываются от земли. Она смутно видела, как её друзей точно так же поднимает вверх: Древо устанавливало связь с Элементами Гармонии. Мысли закружились в голове, и Твайлайт уже не могла отличить собственные чувства от того, что показывало Древо – перед её глазами замелькали образы Кантерлота, Селестии, Понивилля, её друзей и Спайка. Она вспомнила День Согревающего Очага, Школу Дружбы и великое множество приключений и заданий, на которые Карта знаков отличия посылала её с подругами. Вот чем была для неё Эквестрия – душой нации, истинным смыслом гармонии. И Твайлайт была готова защищать её всеми силами.\n\nРаздался мягкий хлопок, и Твайлайт почувствовала, как её окатило волной магии. В отличие от многих иных заклинаний, это не заставило её пошатнуться – напротив, поток был приятным и комфортным, словно светлая мысль. Когда сияние погасло и Твайлайт вновь коснулась земли, она открыла глаза как раз вовремя, чтобы увидеть стремительно расширяющийся купол щита. Совсем скоро он накроет всю Эквестрию.\n\nГолос Эпплджек вырвал её из раздумий. — Э-э, Твайлайт, ты-то хоть поняла, что щас было? Буду с тобой честна, сахарок, как на духу: если мы хотим одолеть Найтмер Мун или Дейбрейкер, то должны встретиться с ними, понимаешь? Ну, или так мне кажется.\n\nТвайлайт покачала головой. — О нет, победить их будет весьма непросто. И я не думаю, что на этот раз нам хватит одних лишь Элементов Гармонии. Это... это был лишь первый шаг. Древо не могло предоставить нам решение всех проблем сразу, но при этом выиграло время, создав этот барьер. Я была права. Да, это защитное заклинание, но весьма необычное. Это щит гармонии, и Древу нужны были мы – Элементы Гармонии, чтобы завершить чары. Ну или так мне кажется. Обязательно загляну позже в библиотеку Старсвирла Бородатого – вдруг он писал о чём-то подобном."
evildiarchy_equestria.5.a:0 "Гармония защитит нас на какое-то время."

evildiarchy_equestria.6.t:0 "Обращение"
evildiarchy_equestria.6.d:0 "Твайлайт выходила на балкон кантерлотского замка так медленно, как только могла. Тем не менее, несмотря на все её старания, подруги умудрились "случайно" остаться позади. Не отстал лишь Спайк. Он, напротив, вышагивал впереди неё, больше походя на королевского стражника, чем на равноправного члена Чрезвычайного совета. Хуже того, подруги настояли на том, чтобы Твайлайт надела корону и подковы, подобающие принцессе. Она безмолвно вздохнула.\n\nНу хотя бы Спайк и Рэйвен подготовили отличную речь. — Дорогие граждане Эквестрии! Я обращаюсь к вам сегодня не как принцесса, но как член недавно сформированного Чрезвычайного совета. Как большинство из вас, вероятно, уже знает, нас постигла страшная трагедия: не только Луна вновь превратилась в Найтмер Мун, но и Селестия, что так долго правила этими землями в мире и согласии, преобразилась вслед за ней, став Дейбрейкер. Пока неясно, что послужило причиной этого и каковы их дальнейшие планы. На данный момент они захватили Новый Мейрленд, превратив его в оплот тирании. Если судить по всему тому, что они творят там, нам стоит страшиться дня их возвращения. Сёстры-аликорны более не представляют нашу заветную гармонию.\n\nТвайлайт сделала короткую паузу, чтобы набраться решимости. — Но не всё потеряно! Эквестрия сильна, а гармония трёх племён выстояла на протяжении тысячелетий. Сёстры могли пасть, но только не мы! В свете последних событий меня просили принять на себя обязанности правящей принцессы Эквестрии. Я отказалась. Я, Твайлайт Спаркл – Принцесса Дружбы. И в этой роли я попросила своих друзей сформировать правительство вместе со мной. Вы знаете их как носительниц Элементов Гармонии: Эпплджек воплощает Честность, Флаттершай – Доброту, Рэйнбоу Дэш – Верность, Пинки Пай – Смех, а Рарити – Щедрость. И, конечно же, Спайк, мой самый дорогой друг, который хоть и не является Элементом, но при этом множество раз выручал меня. Вместе мы сражались с королевой Кризалис, противостояли Тиреку и победили Найтмер Мун. Да, до сих пор нам приходилось иметь дело лишь с одним злым аликорном за раз, но не сомневаюсь, что вместе мы сможем дать отпор даже злой диархии, возникшей за океаном.\n\nОна сделала глубокий вдох. – Граждане Эквестрии! Вместе мы сможем преодолеть этот кризис. И под словом "вместе" я имею в виду не только Элементы Гармонии. Я имею в виду всех вас, жителей Эквестрии! Весь наш народ. Вместе мы найдём способ снять проклятие, павшее на сестёр!"
evildiarchy_equestria.6.a:0 "Гармония восторжествует!"

evildiarchy_equestria.7.t:0 "Проблеск надежды"
evildiarchy_equestria.7.d:0 "Носительницы Элементов Гармонии и Спайк собрались в тронном зале кантерлотского замка. Оба престола по личной (и очень настойчивой) просьбе Твайлайт пустовали. Вместо этого Спайк где-то раздобыл круглый стол, который они поставили прямо посреди зала. Все семеро членов Чрезвычайного совета выглядели на редкость измотанными. Последние недели выдались крайне напряжёнными: на них внезапно легла ответственность за жизнь всей страны, а из Нового Мейрленда тем временем приходили всё более тревожные вести.\n\n— Поверь-ка мне, Твайлайт, даже в самый разгар сбора яблок я не выматывалась так сильно, как за последние дни, — устало сказала Эпплджек. — Ума не приложу, как Селестия умудрялась справляться со всем этим в одиночку целую тысячу лет. Ведь нас целых семеро, а мы едва поспеваем.\n\n— У неё также была тысяча лет, чтобы всему научиться, — ответила Твайлайт. — К сожалению, у нас нет подобной роскоши. Древо гармонии дало нам щит, да... кстати, это потрясающая тема: я перерыла половину своей библиотеки, пытаясь выяснить, как Древо удерживает заклинание. Да и вообще, обычное ли это защитное заклинание или нечто более изощрённое? Мне определённо нужно проверить ещё несколько источников из сносок... О чём я? Ах да, Древо гармонии создало этот щит, но я подозреваю, что оно не будет защищать нас вечно. Если Дейбрейкер подобна Найтмер Мун – а я верю, что так оно и есть – их совместная мощь должна быть колоссальной. Они попытаются вернуться, а то и уже предпринимали попытки, и в какой-то момент им однозначно удастся пробить преграду. И тогда мы должны быть готовы.\n\n— И что же мы можем сделать? — испуганно спросила Флаттершай.\n\n— Я... я пока не знаю, — Твайлайт нервно махнула хвостом. — Нам нужно собрать друзей. Возможно, стоит отправить делегации в соседние страны, а ещё лучше – отправиться лично. Кажется, само Древо хочет, чтобы мы занялись миссиями дружбы. А пока мы готовимся к их прибытию, нужно найти способы укрепить оборону Эквестрии – как магическую, так и обычную. В какой-то момент нам придётся сразиться с сёстрами, — Твайлайт продолжила уже тише, а в голосе появились надрывные нотки. — Я лишь надеюсь, что в итоге мы всё же сможем их исцелить."
evildiarchy_equestria.7.a:0 "Часики тикают, Твайлайт."

evildiarchy_equestria.8.t:0 "#TODO Letter from Jet Set"
evildiarchy_equestria.8.d:0 ""
evildiarchy_equestria.8.a:0 ""

evildiarchy_equestria.9.t: "Ещё одно письмо от Джет Сета"
evildiarchy_equestria.9.d: "Библиотека кантерлотского замка всегда внушала трепет, но теперь её безмолвное величие казалось почти давящим. Книжные стеллажи уходили в бесконечную высь, храня в своих недрах пыльные фолианты, забытые манускрипты и свитки, видевшие зарю Эквестрии. Каждую свободную минуту Твайлайт проводила здесь, среди запаха старой бумаги и чернил, пытаясь разгадать природу Древа Гармонии и того немыслимого магического щита, что оно воздвигло. К несчастью, древние авторы скупились на подробности: о самом Древе были написаны лишь крупицы, а о его истинных пределах – и того меньше.\n\nВ дверях показался Спайк. Балансируя очередную чашку кофе на подносе, он негромко позвал:\n— Твайлайт? Можно тебя отвлечь? Рэйвен только что передала новости: пришло письмо от Джет Сета.\n\nТвайлайт оторвалась от книжки. Её глаза были красными от недосыпа.\n— Что там? В Новом Мейрленде что-то случилось?\n\n— Похоже, они пытались пробить щит снаружи, но потерпели крах, — Спайк поставил кофе на край заваленного книгами стола. — Ты сама продвинулась? Магия Древа должна быть запредельно могущественной, если в одиночку сдерживает натиск сразу двух аликорнов... Впрочем, я хотел сказать другое. Если верить Джет Сету, диархия сменила тактику. Теперь они одержимы поисками артефактов.\n\n— Артефактов?\n\n— Именно так. Логика у сестёр простая: раз уж щит не поддался грубой силе, они намерены выпотрошить руины Грифонии в поисках древних реликвий, чтобы приумножить свою мощь.\n\n— Это... это очень плохо. Пытаясь найти сведения о Древе, я перерыла горы книг не только об Эквестрии, но и обо всём Эквусе. О Грифонии информации меньше, но всё же... там повсюду разбросаны древние артефакты. Вспомни Короля Шторма – кем бы он был без своего посоха? Если диархия получит в свои копыта нечто подобное...\n\nОна резко поднялась, едва не опрокинув стопку книг.\n— Я... нет, мы должны что-то предпринять. Вместе. Раз они вознамерились сокрушить нашу защиту извне, мы обязаны укрепить её изнутри собственными реликвиями. В этих легендах, — она обвела копытом зал, — сокрыта великая магия.\n\n— И что, ты теперь собираешься поселиться здесь на ближайшие недели? — сочувственно вздохнул Спайк.\n\n— Нет. Я бы не успела прочесть всё это, даже если бы в моём распоряжении была вечность, что принадлежала Селестии. Нам нужна рабочая группа: лучшие умы и сильнейшие маги страны, — Твайлайт тяжело вздохнула, потирая виски. — Похоже, мне предстоит организовать ещё и это."
evildiarchy_equestria.9.a: "Быть может, нам стоит связаться с Дэринг Ду?"

evildiarchy_equestria.10.t: "Беседа с А. К. Йерлинг"
evildiarchy_equestria.10.d: "— Твайлайт Спаркл? Кажется, вы хотели со мной поговорить? — А. К. Йерлинг осторожно переступила порог помещения, которое прежде было тронным залом кантерлотского замка.\n\nТеперь же его былое величие тонуло в хаосе: каждый угол был забит штабелями отчётов, картами и ветхими фолиантами. В самом центре этого бумажного лабиринта за временным столом сидела фиолетовая аликорнша. Вид у принцессы дружбы был крайне изнурённым – казалось, она не спала с момента начала кризиса.\n\nТвайлайт вздрогнула и подняла взгляд:\n— А? Да... Э-э, добро пожаловать, Дэр... то есть, мисс Йерлинг. Простите за этот беспорядок. Как видите, сейчас на нас навалилось слишком много дел разом, — телекинезом она сдвинула стопку документов в сторону, освобождая гостье стул. — Ситуация критическая. Вы, несомненно, в курсе событий за океаном, где наши принцессы... преобразились в Дейбрейкер и Найтмер Мун. Однако они жаждут вернуться, и логика подсказывает, что щит не сможет защищать нас вечно.\n\nТвайлайт потёрла виски и продолжила:\n— Если этот день настанет, мы столкнёмся с такой концентрацией магии, какой мир ещё никогда не видел. По моим данным, диархия начала лихорадочные поиски древних артефактов в Грифонии. Они хотят приумножить свои силы, чтобы пробить щит одним ударом. Мы должны действовать на опережение.\n\nА. К. Йерлинг тяжело вздохнула и поправила очки:\n— Значит, вы вызвали меня не как скромного автора приключенческих романов, — она насторожила уши, оглядывая заваленный зал. — Здесь безопасно говорить?.. — получив короткий кивок, она сбросила маску вежливой писательницы: — Что ж, тогда забудьте про Йерлинг. Пришло время Дэринг Ду. Вы разгадали мой маленький секрет ещё много лет назад, так что к чему церемонии? В моих закромах полно зацепок, ведущих к реликвиям, которые я считала слишком опасными, чтобы их тревожить. Впрочем, кантерлотская библиотека – ресурс куда более мощный, чем мои скромные заметки.\n\n— О, в зацепках недостатка нет, — Твайлайт невесело усмехнулась. — История Эквестрии полна теней великих магов прошлого, создававших вещи, которые не должны были увидеть свет. Не говоря уже о наследии других народов нашего континента... Но книги лишь указывают направление. Мне нужен ваш опыт, Дэринг. Помогите превратить эти смутные намёки в успешные экспедиции.\n\nДэринг Ду хищно ухмыльнулась, и в её глазах промелькнул тот самый блеск авантюристки из книг:\n— Я сделаю всё, что в моих силах."
evildiarchy_equestria.10.a: "Из этого выйдет отличная серия книг. Если, конечно, мы выживем."

evildiarchy_equestria.11.t: "Ответ от принцессы Скайстар"
evildiarchy_equestria.11.d: "Дорогая Твайлайт!\n\nЯ была так счастлива получить твою весточку! Сейчас просто невозможно добиться внятных ответов, а мама – ну, ты же знаешь королеву Ново – даже если что-то подозревает, мне ничего не рассказывает. Так что было просто чудесно наконец-то узнать из первых уст, что там затеяли Дейбрейкер и Найтмер Мун и как вы со всем этим справляетесь.\n\nЯ сразу же побежала к маме спросить, могу ли я присоединиться к вашей борьбе, но, увы, она сказала твёрдое «нет». «У нас своих забот в Северной Зебрике хватает», – так она и отрезала. Представляешь? Тут буквально два поехавших аликорна на свободе, а она переживает из-за какого-то Кольтфагена! Но что поделать? Похоже, в обозримом будущем я заперта здесь, на горе Арис.\n\nНо ты писала про щит и про то, что вы ищете артефакты для его укрепления. Это заставило меня задуматься: чем мы, гиппогрифы, могли бы помочь? В итоге я всё-таки упросила маму отправить вам осколок «Жемчужины Трансформации». Это по-настоящему могущественная вещь, Твайлайт! Знаешь, то странное чувство, когда превращаешься из гиппогрифа в морского пони?.. Всё немного чешется. Но ты и сама помнишь: проходила же через это!\n\nО чём ещё написать? Я бы очень хотела сказать, что поддержу вас делом, но слова звучат пустовато, раз уж мама запретила мне приехать. И всё же я верю: вы во всём разберётесь. Вы одолели столько злодеев, одолеете и этих двоих. И я абсолютно с тобой согласна: мы должны попытаться вернуть прежних Селестию и Луну. Мама сомневается, но в последнее время она вообще во всём сомневается. В общем, сражайтесь, оно того стоит! Мы всем сердцем с вами!\n\nВсего самого наилучшего, принцесса Скайстар."
evildiarchy_equestria.11.a: "Гиппогрифы всё ещё наши друзья."

evildiarchy_equestria.12.t: "Необычный Кристаллинг"
evildiarchy_equestria.12.d: "Оставалось лишь надеяться, что этот Кристаллинг пройдёт спокойнее предыдущего, размышляла Твайлайт. Хотя едва ли что-то могло быть хуже разбитого Сердца и ледяного шторма... Она поймала себя на том, что тревожно косится на Фларри Харт, стоящую рядом. К счастью, племянница ничего не заметила. Юная аликорн заметно подросла, и, вопреки угрозе, нависшей над миром, они провели всё утро за играми. «Лучшая тётя на свете», – вспомнила Твайлайт: это был её старый девиз. Сейчас он казался каким-то выхолощенным, почти болезненным. Слишком много судеб теперь зависело от её решений. Глядя на Фларри, Твайлайт твёрдо решила пригласить её в Кантерлот: малышка уже не раз проявляла недюжинный ум.\n\nМерный перестук копыт вырвал её из раздумий. Кристальные пони плотным кольцом собрались вокруг Сердца. В этот раз древняя церемония проводилась не ради новорождённого – сегодня они укрепляли сам фундамент своей безопасности. Сердце Империи и щит Гармонии занимали удивительно схожие роли. Удастся ли им стать единым целым?\n\nСтоявшая подле неё принцесса Каденс произнесла краткую речь:\n\n— Дорогие мои кристальные пони! Сегодня мы собрались здесь для обряда Кристаллинга. Однако на сей раз мы не приветствуем нового члена нашей семьи – мы взываем к Кристальному Сердцу, дабы оно защитило нас от тьмы и пламени, охвативших мир. Вы знаете правду: те, кого мы чтили как Селестию и Луну, ныне стали Дейбрейкер и Найтмер Мун – тиранами, желающими склонить весь мир к своим копытам. Но принцесса дружбы, — она положила копыто на плечо Твайлайт, — и Элементы Гармонии воздвигли над нашими землями щит, преградивший путь деспотам. Теперь наш черёд внести свой вклад. Обратимся же к Кристальному Сердцу! Пусть его свет переплетётся с полотном щита, укрепляя нашу общую мощь так же, как крепка наша связь с Эквестрией!\n\nКристальные пони склонились в едином порыве. Сердце взмыло ввысь, вращаясь в неистовом танце света. Твайлайт почувствовала, как по её телу прошла мощная волна тепла, а высоко в небе она увидела, как магия Сердца вплетается в полотно щита, раскинувшегося до самого горизонта. Преграда стала плотнее, надёжнее, словно напитавшись самой любовью и надеждой северного народа."
evildiarchy_equestria.12.a: "Мы встретим врага вместе."

evildiarchy_equestria.13.t: "Вихрь идей"
evildiarchy_equestria.13.d: "— Это просто крутотень!\n\nФларри Харт восторженным вихрем носилась под сводами кантерлотской библиотеки, то и дело пикируя с одного постамента на другой. За неимением более надёжного хранилища Твайлайт приказала свозить найденные реликвии сюда. Одни артефакты открыто сияли на пьедесталах, другие, наиболее непредсказуемые, покоились в сейфах под бронированным стеклом и магическими печатями. Твайлайт Спаркл следовала за племянницей по пятам, всерьёз опасаясь, что юная аликорн может случайно что-нибудь активировать.\n\nВнезапно Фларри замерла в воздухе и резко обернулась к тёте, едва не задев крылом стеллаж:\n— Послушай, ты ведь всё-всё про них знаешь, да? Как они работают? Тётя Твайлайт, а с их помощью можно устроить по-настоящему большой «кабум»?! — она замахала крыльями с такой силой, что принцессу дружбы едва не сдуло.\n\n— Нет... то есть, они не совсем для этого, — ответила та. — Мы изучаем их, чтобы укрепить щит Гармонии. Ты ведь видела его в небе? Он закрывает собой всю Эквестрию и Кристальную Империю.\n\n— Ну да, видела, — Фларри небрежно махнула копытом, явно разочарованная скучным ответом, — но в книжках про Дэринг Ду у каждой такой штуковины есть супер-пупер способности! Значит, и эти умеют что-то крутое, правда же?\n\n— Полагаю, что так, — Твайлайт задумчиво потёрла подбородок, — но чтобы раскрыть их потенциал, требуются годы исследований, колоссальные средства, усилия лучших умов и...\n\n— Ой, да разберёмся! Я тебе во всём помогу, честное аликорнье!\n\nТвайлайт ответила не сразу. Разумеется, от гиперактивного жеребёнка помощи в лабораториях ждать не стоило, но сама мысль заставила её замереть. Эти артефакты... Действительно, почему она видит в них лишь батарейки для щита? Эквестрия на пороге войны, и магические технологии прошлого могут найти куда более широкое применение. Нужно связаться с профессорами из школы для одарённых единорогов. И, конечно, задействовать кантерлотский центр магических исследований – тот самый, что Селестия когда-то построила специально для неё...\n\nТвайлайт уже начала мысленно набрасывать план мобилизации научного сообщества, но её размышления прервала Фларри, которая снова куда-то умчалась, явно заскучав рядом с невнимательной тетей."
evildiarchy_equestria.13.a: "— Фларри, стой! Вернись немедленно!"

evildiarchy_equestria.14.t: "Зов карты дружбы"
evildiarchy_equestria.14.d: "Рэйнбоу Дэш зависла над сияющей поверхностью карты, нахмурив брови.\n— Да уж... Весь Эквус полыхает. Похоже, на всём континенте не осталось ни одного угла, где не было бы проблем с дружбой.\n\nТвайлайт, понуро осевшая в кресле, махнула копытом:\n— У нас у всех сейчас проблемы с дружбой, Рэйнбоу. И я бы сказала, что наш масштаб бедствия куда больше, чем у любого другого народа. Но мы все в одной лодке. Не стоит тешить себя иллюзиями, будто Найтмер Мун или Дейбрейкер остановятся на границах Эквестрии, когда дело дойдёт до крайности. Карта пытается донести до нас именно это, — она тяжело вздохнула, потирая виски. — Были же времена, когда мы решали по одной маленькой проблемке за раз...\n\n— И впрямь, нынче всё навалилось скопом, — заметила Эпплджек, поправляя шляпу. — Как бы там ни было, сахарок, нам вовсе не обязательно таскаться на все эти задания всей гурьбой. Я, к примеру, могу потолковать с бизонами. Всё равно собиралась проведать родню в тех краях.\n\n— А я отправлюсь к якам! — Пинки Пай восторженной пружиной заскакала по комнате. — В конце концов, я их официальный посол дружбы! Давненько я не видела принца Резерфорда!\n\n— Я... я бы хотела навестить полярных медведей, — тихо проговорила Флаттершай. — Давно мечтала там побывать. Говорят, на севере есть леса, куда ещё не ступало копыто пони... Только представьте, сколько там редких зверей, которым нужна забота...\n\n— Что? Нет, это я пойду к медведям! — бесцеремонно перебила её Рэйнбоу Дэш, сделав мёртвую петлю под потолком. — Они же огромные, сильные и просто запредельно крутые! Им нужна по-настоящему боевая пони, чтобы их впечатлить, и этой пони буду я!\n\nТвайлайт наморщила нос:\n— Наверное, лучше будет разбиться на пары, как мы делали раньше. И не думайте, что эти миссии будут лёгкими. У нас всего одна попытка, и нам придётся уладить их местные конфликты, если хотим, чтобы наш план сработал. У меня где-то припрятаны наработки для уроков дружбы Старлайт, если они пони-будь понадобятся. Раз уж мы делим задачи... я отправлюсь на север. Мне нужно увидеть брата. И Каденс с племянницей. Спайк пойдёт со мной."
evildiarchy_equestria.14.a: "Будем надеяться, нам удастся склонить всех на нашу сторону."
evildiarchy_equestria.14.a_tt: "§RМы должны сплотить народы Эквуса узами дружбы, прежде чем павшие богини перейдут в наступление.§!"

evildiarchy_equestria.15.t:0 "На фабрике погоды"
evildiarchy_equestria.15.d:0 "На погодной фабрике Клаудсдейла выдался суматошный день. Множество пегасов сновало по коридорам, ожидая новых назначений или сдавая отчёты о выполненных заданиях. За последние несколько лет индустриализация постепенно преобразила фабрику: гонцов, прилетавших из соседних городов и деревень, сменила добрая дюжина телефонов, которые разрывались от звонков пони, запрашивающих смену погоды. Более сотни опытных погодных пони были заняты расчётами оптимального распределения осадков и розы ветров.\n\nОднако сегодня на фабрике был особенный день. Чиновники из Кантерлота запросили встречу с самыми опытными мастерами погоды Клаудсдейла, чтобы обсудить "потенциальное расширение областей применения погодной магии". К их удивлению, к ним лично прибыла сама Рэйнбоу Дэш – Элемент Верности, вандерболт и член чрезвычайного совета. Её сопровождал Спайк с комично огромным свитком.\n\nВскоре совещание началось, и Рэйнбоу Дэш представила свои планы. — Вы, вероятно, смекаете, почему я здесь: грядёт битва со злыми сёстрами, и в этой схватке нам нужно, чтобы каждый пони внёс свой вклад. Это, конечно, касается и всех тех, кто владеет магией погоды. А где начинать, как не здесь, у самого истока? — она указала на дракончика рядом с собой, который уже начал сверяться со своим свитком. С лёгкой ухмылкой пегаска добавила. — Моя подруга, Твайлайт Спаркл, любезно составила скромных список всех возможных манипуляций с погодой, которые могли бы нам помочь нашему делу."
evildiarchy_equestria.15.a:0 "Пегасы готовы поддержать подготовку к войне."
evildiarchy_equestria.15.a_tt:0 "Теперь §Gдоступна§! механика §Yманипуляции погодой»§!.\n\n"

evildiarchy_friendship_missions.1.t: "Миссия дружбы: Кристальная Империя" # Harmony Var
evildiarchy_friendship_missions.1.d: "— Твайлайт! — Шайнинг Армор сгрёб сестру в охапку, едва та сошла с поезда. Следом, светясь искренней радостью, её поприветствовали Каденс и Фларри Харт.\n\n— Как же вовремя ты приехала. И ты, конечно, тоже, Спайк, храбрый и прославленный спаситель империи! — рассмеялся Шайнинг, крепко пожимая лапу дракону. — Надеюсь, эшелон из Кантерлота добрался без происшествий? В наши дни спокойная дорога – это уже подарок судьбы. Кстати, Твай, я видел твой щит... Это невероятно. Если верить донесениям, то он в самом деле выдержал ярость двух аликорнов разом, и это потрясающе впечатляющее достижение. Хотел бы я сказать то же самое о своих чарах, но боюсь, такая мощь мне и близко не под силу.\n\n— Этот щит не мой, Шайнинг, хотя то, что ты когда-то научил меня защитным заклинаниям, очень помогло, — Твайлайт грустно улыбнулась. — Его породило само Древо Гармонии. Я до сих пор не могу до конца постичь магическую природу случившегося. Мы, Элементы, лишь... ну, стали проводниками? Трудно подобрать верное слово. Но ясно одно: он неразрывно связан с гармонией Эквестрии и её жителей. И именно поэтому я здесь. Когда Дейбрейкер и Найтмер Мун нанесут новый удар, а они его нанесут, – щит должен укрыть собой каждый уголок континента, до самых окраин севера.\n\n— Ты хочешь сказать, что кристальные пони должны всем сердцем поверить в Гармонию, чтобы укрепить его? — уточнила Каденс, внимательно глядя на золовку.\n\n— Не думаю, что щиту нужно именно это, — Твайлайт медленно покачала головой. — Скорее, речь о единстве. Щит – это физическое воплощение того, как магия Эквестрии отвергает саму суть павших принцесс. Это наше коллективное «нет» их тирании. Само Древо Гармонии – лишь отражение всей Эквестрии.\n\n— Живая душа народа? — негромко спросил Шайнинг.\n\n— Что-то в этом роде. Но хватит теории. Нам нужно собрать кристальных пони на площади. Спайк подготовил для меня речь – за эти месяцы он стал настоящим мастером слова, — Твайлайт с теплотой оглянулась, ища помощника.\n\nОднако дракончика рядом не оказалось. Он уже был там, где его любили больше всего – в самом центре ликующей толпы кристальных пони. Каждое его слово вызывало волну одобрительного гула, и хотя Твайлайт не слышала, о чём именно он говорит, она физически ощутила, как купол щита, пульсируя, накрывает всю Кристальную Империю.\n\nУлыбнувшись Каденс, Твайлайт тихо заметила:\n— А может, всё даже проще, чем я думала."
evildiarchy_friendship_missions.1.a: "Наша дружба никогда не пошатнётся."

evildiarchy_friendship_missions.2.t: "Миссия дружбы: Кристальная Империя" # Sombra Var
evildiarchy_friendship_missions.2.d: "Король Сомбра.\n\nОбстоятельства его возвращения из небытия оставались загадкой, но он вновь сумел поработить Кристальную Империю и её обитателей. Что ещё страшнее, в его плену оказались Каденс, Шайнинг Армор и малютка Фларри Харт. От одной мысли об этом у Твайлайт всё внутри бурлило от ярости и вины. Ей следовало прибыть сюда гораздо раньше. Она яростнее заработала крыльями, рассекая морозный воздух; Спайк, вцепившийся в её спину, пригнулся, спасаясь от бешеного встречного потока. Твайлайт едва заметно улыбнулась: храбрый дракон снова готов войти в историю как спаситель Империи.\n\nВ обычной ситуации попытка бросить вызов Сомбре в одиночку (ну, или только со Спайком) означала бы верную смерть. Но нынешние времена были какими угодно, только не обычными. Твайлайт чувствовала, как её знак отличия пульсирует едва уловимым ритмом. Древо Гармонии даровало ей магическую мощь, далеко выходящую за пределы её собственных сил. Она была уверена: этой мощи хватит, чтобы стереть тирана в порошок. В уме она хладнокровно перебирала боевые чары. Редко ей приходилось действовать столь дерзко, и ещё реже она ощущала такую абсолютную, почти ледяную уверенность.\n\nТвайлайт ворвалась в воздушное пространство Кристального города на молниеносной скорости. Когда она ушла в крутое пике, Спайк мёртвой хваткой впился когтями в её плечи, но она даже не почувствовала боли. На подлёте принцесса выпустила колоссальный поток чистой энергии, который с оглушительным грохотом проломил внешнюю стену замка. План был прост и эффективен: она свяжет Сомбру боем, пока Спайк не проберётся к Кристальному Сердцу и не изгонит захватчика.\n\n— Твайлайт Спаркл! — Сомбра пытался сохранить надменный тон, но не сумел полностью скрыть изумление.\n\nОна не удостоила его ответом. Вместо слов ударил второй магический луч, заставив короля в последнюю долю секунды воздвигнуть щит. Сомбра немедленно перешёл в контратаку, и какое-то время они сражались в полном молчании, сосредоточенно обмениваясь ударами. Твайлайт каждой клеткой ощущала ток силы Древа. Никогда прежде плетение чар не давалось ей так легко, и никогда прежде они не несли в себе столько разрушения.\n\nНо внезапно магия Сомбры дрогнула и начала стремительно иссякать. Спайк выполнил свою часть миссии. С протяжным, полным бессильной ярости криком «Не-е-ет!» тень узурпатора развеялась, вновь извергнутая в пустоту. Вскоре Твайлайт уже обнимала брата, няню и племянницу. Кристальная Империя снова была свободна и готова сосредоточиться на истинном враге."
evildiarchy_friendship_missions.2.a: "Сомбра, возвращайся в свой гроб!"

evildiarchy_friendship_missions.3.t: "Миссия дружбы: Кристальная Империя" # Commie Var
evildiarchy_friendship_missions.3.d: "Твайлайт и Спайк ехали на север, в Кристальную Империю – вернее, в то, что от неё осталось. Не так давно кристальные пони решили, что монархия им больше не по вкусу, и провозгласили республику под предводительством Арктик Лили. В Кантерлоте о новой «лидерше» знали преступно мало, и Твайлайт оставалось лишь надеяться на её благоразумие.\n\nНа перроне их встретила делегация с незнакомыми флагами.\n— Спайк, храбрый и прославленный спаситель империи... и, надо полагать, Твайлайт Спаркл? — Арктик Лили окинула аликорна холодным, оценивающим взглядом. — Я возглавляю народное правительство. Мы решили, что принцесса нам больше не указ, и я копытами вырывала право нашего народа на самоопределение. Но идёмте. Полагаю, вы здесь ради Каденс и её семьи.\n\nТвайлайт и Спайк направились к Кристальному дворцу в сопровождении делегации. К удивлению Твайлайт, Лили полностью проигнорировала её статус, обратившись напрямую к дракону.\n\n— Спайк, скажи мне, правда ли то, о чём шепчутся? Говорят, Селестия и Луна превратились в чудовищ под стать нечестивому Сомбре, от которого мы натерпелись. На севере слухи обрывочны, но я слышала, что ты и твои друзья готовитесь к войне. Мы... мы расстались с нашим аликорном не на самой доброй ноте, это правда. Каденс не была злой. Она просто... заблуждалась в некоторых вещах. Но сейчас... возможно, пришло время пересмотреть наши взгляды.\n\n— Ещё бы мы не готовились! — Спайк выпрямился, стараясь звучать как можно внушительнее. — Твайлайт, её друзья и я костьми ляжем, чтобы остановить Дейбрейкер и Найтмер Мун. И вы тоже можете помочь, клянусь своим именем! Но скажи мне, Лили, зачем вообще было избавляться от Каденс? Неужели нельзя было просто договориться?\n\nАрктик Лили устало потёрла мордочку.\n— Я... я и волоска с её гривы не уронила! Но она была глуха к нуждам рабочих, Спайк. Если бы только... Ах, клянусь Сердцем, если бы мы только знали, к чему всё придёт. Поговори с ней, Спайк. Объясни ей, что такое права трудящихся, а я в это время поговорю со своими товарищами. Если эти аликорны так же ужасны, как Сомбра, нам нужно сплотиться. В конце концов, именно ты когда-то разбил наши цепи, — она неуверенно улыбнулась дракону и горько добавила: — Кто бы мог подумать, что всё закончится именно так?"
evildiarchy_friendship_missions.3.a: "Кристальные пони чуют истинное зло за версту."

evildiarchy_friendship_missions.4.t:0 "Миссия дружбы: к бизонам" # Little Strongheart var
evildiarchy_friendship_missions.4.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на перрон станции, её встретила старая знакомая – Литтл Стронгхарт. Эпплджек познакомилась с молодой бизонихой ещё в свой первый визит, ведь именно она тогда помогла прийти к компромиссу. То, что бизоны прислали в качестве доверенного лица именно её, было добрым знаком.\n\n— Литтл Стронгхарт! Давненько мы не виделись, а? Как там ваше великое переселение? Надеюсь, пирогов всем хватило? Но хватит об этом. Ты наверняка заметила, что в Грифонии творятся неладные дела, и мне нужно обсудить это с вождем Тандерхувсом. Проводишь меня к нему?\n\n— Переселение идёт своим чередом, хотя многие старейшины по-прежнему ворчат, что мы покинули наши святые земли. Но... вождь Тандерхувс больше не наш лидер. Несколько лет спустя после твоего визита вожди выбрали меня своей предводительницей. И да, до меня дошли слухи, что принцесс больше нет. Скажи мне, что всё это значит?\n\n— Ты – лидер всех бизонов? И-и-иха! Это просто потрясающие новости, сахарок! А если честно, то дела обстоят прескверно: Селестия и Луна превратились в свои искажённые версии и теперь называют себя Дейбрейкер и Найтмер Мун. Их взоры обращены на Эквестрию. Мы создали щит, который сдерживает их, но нам всем нужно держаться вместе, понимаешь? Вот ради этого я и здесь.\n\nВскоре после этого Литтл Стронгхарт и Эпплджек собрали вождей бизонов. В итоге все, кроме таинственной фигуры по прозвищу "Старейшина", проголосовали за принятие дружбы пони и готовность сражаться против злых правительниц по ту сторону моря."
evildiarchy_friendship_missions.4.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.5.t:0 "Миссия дружбы: к бизонам" # Thunderhooves Var
evildiarchy_friendship_missions.5.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на станции, её встретил пустой перрон. Не самое лучшее начало. Земная пони порысила в сторону лагеря бизонов, ориентируясь по предусмотрительно установленным табличкам, и гадала, как её встретят. Ждать ответа пришлось недолго.\n\nДорогу ей преградил страж-бизон. — Чего тебе здесь нужно, пони? Это земли бизонов.\n\n— Это хорошо, потому что я как раз к бизонам и приехала, понимаешь? — парировала Эпплджек. — Я здесь не просто так, а от лица всей Эквестрии. Не знаю, заметили вы или нет, но в мире творятся неладные дела. Мне нужно поговорить с вашим самым главным бизоном. Ну что, проводишь меня к нему?\n\nНе проронив ни слова, страж развернулся, жестом пригласив Эпплджек следовать за ним. Вскоре её поприветствовал Тандерхувс – вождь всех бизонов. Пони помнила его по их прошлой встрече и понимала, что переговоры будут непростыми. После традиционной церемонии встречи он согласился выслушать её объяснения. Земная пони рассказала ему всё, что знала о Дейбрейкер и Найтмер Мун, об их деяниях и целях, а также о том, что предпринимает Эквестрия, дабы противостоять им.\n\nКогда она закончила, Тандерхувс медленно покачал головой. — Я помню, что ты – Элемент Честности, Эпплджек, и ты действительно была честна со мной. Ты просишь меня присоединиться к битве со злом, но увы: не я подхожу для этой задачи. Вместо этого я передам бразды правления Литтл Стронгхарт. У неё подходящий склад ума для таких дел. Пожалуй, мне следовало сделать это давным-давно, — бизон снова покачал головой. — Ох уж эти эквестрийцы... Чем же всё это закончится?"
evildiarchy_friendship_missions.5.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.6.t:0 "Миссия дружбы: к бизонам" # Elder var
evildiarchy_friendship_missions.6.d:0 "Прошло немало времени с тех пор, как Эпплджек в последний раз навещала свою родню на юго-западе. Она отлично помнила, как они с друзьями приехали в гости и оказались втянуты в назревающий конфликт между бизонами и местными пони. Теперь же она вернулась в эти края, и на этот раз направилась прямиком к бизонам. Пока поезд пыхтел, преодолевая засушливые просторы юго-запада, земная пони обдумывала предстоящую задачу. Эпплджек вызвалась отправиться в эту миссию дружбы в одиночку. Это было несколько необычно, но пони чувствовала, что так будет правильно. Чем занимались бизоны с их последней встречи? Осознают ли они необходимость сплотиться перед лицом угрозы Дейбрейкер и Найтмер Мун?\n\nКогда Эпплджек сошла на станции, её встретил пустой перрон. Не самое лучшее начало. Земная пони порысила в сторону лагеря бизонов, ориентируясь по предусмотрительно установленным табличкам, и гадала, как её встретят. Ждать ответа пришлось недолго.\n\nДорогу ей преградил страж-бизон. — Чего тебе здесь нужно, пони? Это земли бизонов.\n\n— Это хорошо, потому что я как раз к бизонам и приехала, понимаешь? — парировала Эпплджек. — Я здесь не просто так, а от лица всей Эквестрии. Не знаю, заметили вы или нет, но в мире творятся неладные дела. Мне нужно поговорить с вашим самым главным бизоном. Ну что, проводишь меня к нему?\n\nНе проронив ни слова, страж развернулся, жестом пригласив Эпплджек следовать за ним. Вскоре её поприветствовал вождь всех бизонов – таинственный лидер, известный лишь как "Старейшина". Он недружелюбно посматривал на неё, но Эпплджек никак не могла вспомнить его по их прошлой встрече. Но после традиционной церемонии встречи он всё же согласился выслушать её объяснения. Земная пони рассказала ему всё, что знала о Дейбрейкер и Найтмер Мун, об их деяниях и целях, а также о том, что предпринимает Эквестрия, дабы противостоять им.\n\nКогда она закончила, Старейшина медленно покачал головой. — Ты меня не помнишь, но я знаю, что ты – Элемент Честности, Эпплджек, и ты действительно была честна со мной. Ты просишь меня присоединиться к битве со злом, но увы: я не могу исполнить твою просьбу. Вместо этого я передам бразды правления Литтл Стронгхарт. У неё подходящий склад ума для таких дел. А я... я подожду своего часа, — бизон снова покачал головой. — Ох уж эти эквестрийцы... Чем же всё это закончится?"
evildiarchy_friendship_missions.6.a:0 "Долгожданный мир на юго-западе."

evildiarchy_friendship_missions.7.t: "Миссия дружбы: к чейнджлингам" # Thorax var
evildiarchy_friendship_missions.7.d: "— Спайк! Друг мой, добро пожаловать! — Торакс расплылся в широкой улыбке. — Я так счастлив, что чрезвычайный совет прислал именно тебя. В конце концов... ты был первым, кто разглядел во мне нечто большее, чем просто голодного монстра. Отныне и навеки ты – почётный гость Королевства Чейнджлингов.\n\n— Честно говоря, я сам вызвался, — признался Спайк, с любопытством озираясь по сторонам. — Мне давно хотелось увидеть воочию то, что вы построили после свержения Кризалис. Помнишь ту пещеру под Кристальной Империей? Я и все пони были так напуганы... И всё же мы стали друзьями. Ты не представляешь, какой груз свалился у меня с плеч, когда я узнал, что вы окончательно покончили с её тиранией.\n\nЧейнджлинг в генеральском мундире негромко кашлянул:\n— Король Торакс? Я глубоко ценю ваши мемуарные изыскания, но, быть может, мы перейдём к протоколу? Коль это официальный дипломатический визит, а не дружеское чаепитие...\n\n— Ой, да брось ты, брат, вечно ты ворчишь, — добродушно отмахнулся Торакс. — Спайк, знакомься, это Фаринкс – мой брат, верный советник и один из наших лучших генералов. Мы одолели Кризалис во многом благодаря ему, хоть он поначалу и считал наш бунт безумием. Но ведь так жизнь стала куда ярче, верно?\n\nФаринкс тяжело вздохнул:\n— Выменивать дружбу на любовь – в этом есть свои плюсы, признаю. Но иногда... иногда я скучаю по былым временам, — его лицо на мгновение исказила гримаса сомнения. — Мирная жизнь... она делает нас мягкими, слабыми. Я хоть и числюсь генералом, но порой сомневаюсь, что мне ещё доведётся увидеть настоящую карту боевых действий.\n\n— Ну, с этим я могу помочь, — вмешался Спайк. — Ты прав, Фаринкс, я здесь не только ради чаепития. До вас наверняка уже дошли вести: Селестии и Луны... какими мы их знали, больше нет. Теперь они зовут себя Дейбрейкер и Найтмер Мун и вовсю разоряют Грифонию. По словам Твайлайт, нет сомнений, что рано или поздно они обратят взор на нас, так что нам лучше держаться плечом к плечу. Именно за этим я здесь – я прошу народ чейнджлингов примкнуть к нашей борьбе против диархии.\n\nТоракс мгновенно подобрался, и в его взгляде промелькнула решимость:\n— И как король чейнджлингов, я принимаю это предложение от всей души. Чейнджлинги снова устремятся к Кантерлоту, но на сей раз не как захватчики, а как его защитники."
evildiarchy_friendship_missions.7.a: "Тост за нерушимый союз пони и чейнджлингов!"

evildiarchy_friendship_missions.8.t: "Миссия дружбы: к чейнджлингам" # Chrysalis var
evildiarchy_friendship_missions.8.d: "Торакс нервно облизнул клыки, глядя на стоящую рядом шестёрку пони.\n— Так каков, собственно, наш план?\n\n— О, он супер-пупер простой! — Пинки Пай возникла прямо перед его носом, едва не сбив с копыт. — Просто идём к Кризалис, бац – Элементами Гармонии, превращаем её в камень и закатываем грандиозную, крутейшую вечеринку. Делали так уже сто раз. Сущие пустяки, правда. Нам только нужно начать готовить угощения.\n\nБудущий король чейнджлингов не выглядел убеждённым.\n— Но как мы к ней подберёмся? Последние годы она только и делала, что превращала свою «Башню Королевы» в неприступный бастион. Она окружена лучшими гвардейцами из УОБВ. Вы что, планируете и всю её личную стражу в камень обратить?\n\n— О нет, это так не работает, — Твайлайт Спаркл снисходительно улыбнулась. — Все книги об Элементах, что я прочла, говорят одно: они созданы для защиты Эквестрии и действуют лишь на тех, кто представляет для неё угрозу. Мы не смогли бы обратить простых солдат в камень, даже если бы очень постарались. Но у нас есть метод куда эффективнее: направленная телепортация.\n\nЗаметив, что Торакс всё ещё с сомнением облизнул клыки, Твайлайт продолжила:\n\n— Твой скепсис оправдан. Обычно мы не можем телепортироваться на такое расстояние. Это сложное заклинание даже для аликорнов, ведь затраты сил растут квадратично дистанции. Но в этот раз у нас есть подмога, — она подмигнула. — Впрочем, нам всё равно нужно подобраться поближе, так что сейчас лучше соблюдать тишину.\n\nОни двинулись дальше. Торакс всё ещё сомневался, но придержал мысли при себе. Спустя какое-то время Твайлайт резко вскинула копыто. Вспышка ослепительно-белого света на мгновение выжгла сетчатку, и вот они уже стоят в самом центре тронного зала. Кризалис, восседавшая на троне, удивлённо зашипела, но шестёрка не теряла ни секунды. Торакс с благоговением наблюдал, как Элементы сплетаются в радужный вихрь. Как только окаменение Кризалис завершилось, по зданию и, насколько он мог судить по дрожи воздуха, по всему городу пронеслась очищающая волна магии.\n\n— И не думай, что у нас всегда всё так гладко! — Пинки Пай весело помахала копытом перед его застывшим лицом. — Но теперь-то уж точно пришло время для вечеринки!"
evildiarchy_friendship_missions.8.a: "Элементы Гармонии наносят ответный удар."

evildiarchy_friendship_missions.9.t:0 "Миссия дружбы: к якам" # (Pre-)Civil War var
evildiarchy_friendship_missions.9.d:0 "— Ну давай, хотя бы поговори с ним.\n\n— Нет.\n\n— Он же твой брат, ты должен хотя бы попытаться! — Пинки Пай кружила вокруг принца Резерфорда. — Обещаю, мы закатим супер-пупер-крутую вечеринку, как только вы всё обсудите.\n\n— Нет! Брэдфорд отвергнуть власть Резерфорда, объявить себя истинный принц и поднять кланы против меня. Резерфорд не принять этого. Никаких разговоров, теперь яки КРУШИТЬ жалких йаков! — он топнул копытом. — Резерфорд пробовать говорить. Брат не слушать голос разума. Резерфорд хотеть видеть Якякистан современной страной, другом Эквестрии. Брат же говорить "нет": Якякистан оставаться прежним и закрыть границы. Теперь мы сражаться за душу Якякистана!\n\nИх перепалка продолжалась ещё какое-то время, но постепенно упрямство Резерфорда начало поддаваться. В глубине души он всё ещё оставался яком, с которым можно договориться. Под давлением своей "почётной подруги-яка" и при поддержке Йоны он в конце концов согласился на прекращение огня и переговоры с принцем Брэдфордом. На мгновение Пинки Пай задумалась: как там идут дела у Рарити с самим Брэдфордом? Её миссия казалась куда сложнее.\n\nОднако вскоре Рарити подтвердила, что и Брэдфорд тоже готов к встрече. Пока братья вели беседу, Пинки тихо спросила подругу, как ей удалось его уговорить.\n\nРарити довольно улыбнулась. — О, это оказалось куда проще, чем я ожидала. Яки со стороны кажутся такими агрессивными, верно? Но в этот раз я подготовилась заранее, чтобы выбрать подобающий случаю наряд. У них такая богатая культура, стоит только присмотреться чуть внимательнее, дорогуша. В итоге мой наряд вызвал у них всеобщее одобрение. Даже этот вечно злой як – кажется, его звали Керр – признался мне, что никогда не думал, что пони могут так тонко разбираться в традициях яков. Разумеется, я пообещала создать для них изысканный традиционный, но в то же время новаторский гардероб, и они с восторгом согласились. Но смотри – кажется, братья пришли к соглашению."
evildiarchy_friendship_missions.9.a:0 "В Якякистан вернуться... тьфу ты, вернулся мир."

evildiarchy_friendship_missions.10.t:0 "Миссия дружбы: к якам"
evildiarchy_friendship_missions.10.d:0 "Глухой ночью к палатке приблизились три тёмные фигуры. Издалека все они напоминали яков, но при ближайшем рассмотрении становилось ясно, что двое ими не являются, да и третья была куда меньше среднего яка. Их явно ждали: вход в палатку открылся мгновенно и так же быстро закрылся. Одинокий глаз выглянул наружу, проверяя, не было ли любопытствующих, но поблизости никого не оказалось.\n\nВнутри Пинки Пай и Рарити сбросили тяжёлую верхнюю одежду. — У них здесь и впрямь какой-то особенный климат, верно, дорогая? — заметила Рарити. — Но я не жалуюсь. Более того, почти уверена, что именно погода помогла нашей маленькой миссии остаться незамеченной.\n\nЙона, на которой ничего не было надето, промолчала, но их хозяйка ответила: — Тира-як рада, что вы добраться сюда в безопасности. Тира очень за вас переживать, — она посмотрела на Йону. — Ты мочь меня простить? Всё не должно было зайти так далеко. Почему Тира быть глупой и верить Ингвару?\n\n— Всё хорошо. Йона никогда не думать, что Тира хотеть этого.\n\nПинки Пай вклинилась в их разговор, подпрыгивая от радости. — А ещё... — прыжок, — ...у нас отличные новости! — прыжок. — Яки... — прыжок, — ...больше не хотят... — прыжок, — ...власти Ингвара! Так что... — прыжок, — ...давайте устроим грандиозную вечеринку!\n\nРарити удивлённо подняла бровь. — А не стоит ли нам, ну, для начала всё же свергнуть Ингвара?\n\n— Но вечеринка и есть свержение! Мы должны показать якам, что они могут быть свободны, если захотят. Так что давайте соберём их всех вместе.\n\nТира покачала головой. — Почему революция заканчиваться вот так? Тира просто хотеть, чтобы рабочий быть услышан.\n\n— Глупенькая, революция не заканчивается. Как только Ингвар уйдёт, ты возьмёшь всё в свои копыта."
evildiarchy_friendship_missions.10.a:0 "Революция возвращается рабочим."

evildiarchy_friendship_missions.11.t:0 "Миссия дружбы: к якам" # Rutherford var
evildiarchy_friendship_missions.11.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Что тут делать столько яков? — за их спинами раздался знакомый голос. — Розовая Пони! Ты вернуться! Принц Резерфорд приветствовать тебя в гостях. А, и ты привести подругу, как я видеть. Як помнить её по Понивилль. Но о чём ты желать говорить с яками?\n\n— Принц Резерфорд! Я так рада тебя видеть! В последний раз я слышала о тебе ещё во время той гражданской войны. Моя подруга Рарити и я пришли просить твоей помощи в битве против Дейбрейкер и Найтмер Мун – ну, знаешь, злых версий Селестии и Луны. Они безумно сильны, поэтому нам нужно, чтобы весь Эквус объединился против них. Мы можем на тебя рассчитывать?\n\n— Принц Резерфорд слышать про злых аликорнов. Не быть уверен, угроза это для яков или нет. Теперь я не сомневаться! Яки готовы сражаться и КРУШИТЬ аликорнов. Яки очень сильные, а ещё якам нравиться пони!"
evildiarchy_friendship_missions.11.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.12.t:0 "Миссия дружбы: к якам" # Yona var
evildiarchy_friendship_missions.12.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Рарити! Что Пинки Пай там делать? Як Йона не знать, что ты приехать в Якякистан, — Рарити обернулась и увидела приближающуюся бывшую ученицу Школы Дружбы. — Это быть связано с исчезновения Селестия и Луна? Йона знать, что что-то случиться, но не знать, что именно.\n\n— Йона! Я так рада тебя видеть. Мы прибыли навестить принца Резерфорда и яков. Селестия и Луна, к несчастью, не исчезли, а сошли с ума. Теперь, став Дейбрейкер и Найтмер Мун, они представляют угрозу для всего мира. Поэтому мы и собираем друзей, чтобы подготовиться к их грядущему нападению. А что касается того, чем занята Пинки... Думаю, она просто наслаждается собственным представлением.\n\n— О, ты не слышать новости? Принц Резерфорд отречься. Яки создать республика. Як Йона – первый президент новая республика. И Йона готова вступить в битва вместе с пони!"
evildiarchy_friendship_missions.12.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.13.t:0 "Миссия дружбы: к якам" # Thyra var
evildiarchy_friendship_missions.13.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд – отличный парень, если узнать его поближе. Нужно просто знать, как правильно себя вести. Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Я знаю, что он победил, но, к сожалению, после этого потеряла с ним связь.\n\nДобравшись до Яктауна, двое пони вскоре оказались в окружении любопытных яков. Несмотря на то что Резерфорд открыл страну для торговли с Эквестрией, немногие из местных жителей когда-либо видели пони вживую. Пинки Пай в своём шлеме с имитацией рогов яка активно жестикулировала, наперебой объясняя им цель своего визита.\n\n— Что тут происходить? — к Рарити подошла як в сопровождении двух офицеров. — Ты есть кто? Як Тира знать розовую пони, но не тебя. Тира не разрешать это собрание. Вы хотеть подорвать революция?\n\n— Меня зовут Рарити. Мы с Пинки Пай прибыли сюда, чтобы поговорить с яками. Как вы, возможно, знаете, Селестия и Луна превратились в Дейбрейкер и Найтмер Мун. Они планируют вторгнуться на Эквус и покорить его, как уже сделали с Грифонией. В ответ мы хотим объединить весь континент а борьбе против них. Но вы упомянули революцию... Скажите, что случилось с принцем Резерфордом? Мы ожидали застать его здесь.\n\n— Резерфорд больше не принц. Яки требовать отречение, поэтому Резерфорд отказаться от титул. Теперь рабочие править всеми яки. Я возглавлять совет рабочих, так что ты говорить со мной. Но если вы не угрожать революция, Тира сражаться против злых аликорнов вместе с вами. Яки КРУШИТЬ!"
evildiarchy_friendship_missions.13.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.14.t:0 "Миссия дружбы: к якам" # Bradford var
evildiarchy_friendship_missions.14.d:0 "— Очень-очень надеюсь, что на этот раз яки будут более благоразумны, — произнесла Рарити. — Я слишком хорошо помню их поведение в Понивилле. Пусть даже тебе и удалось завоевать их дружбу, — она кивнула идущей рядом Пинки Пай. — Статус "почётного яка", верно? И официального посла в Якякистане.\n\n— Принц Резерфорд — отличный як, если узнать его поближе. Нужно просто знать, как правильно себя вести.  Он гордый як, этого не отнять, но при этом всё же добрый. Не так давно у него случился ужасный разлад с братом, принцем Брэдфордом. Яки пережили сокрушительную гражданскую войну. Тогда он и Йона обратились ко мне за помощью. Знаю, что всё закончилось не слишком хорошо, так что нам нужно попытаться воззвать к разуму Брэдфорда.\n\nИх прервал суровый голос. — Стоять, пони! Принц Брэдфорд приказать закрыть граница. Что вы хотеть?\n\nРарити повернулась к яку. — Мы пришли поговорить с принцем яков. Возможно, вы слышали, что Селестия больше не правит в Кантерлоте. Быть может, до вас даже дошли слухи, что она и Луна превратились в Дейбрейкер и Найтмер Мун, опустошающих Грифонию... Нам чрезвычайно важно поговорить с принцем, потому что, при всём нашем уважении к вашим закрытым границам, это касается и безопасности яков. Теперь уже злые диархи рано или поздно вернутся, чтобы покорить весь Эквус, — видя, что як не собирается ни двигаться, ни отвечать, она добавила. — Пожалуйста, позвольте нам поговорить с Брэдфордом и всё объяснить!\n\nНа этот раз як всё же ответил. — Я И ЕСТЬ Брэдфорд, глупая пони. Ты думать, граница яков так плохо охраняться? Что вы мочь просто гулять где хотеть? Принц Брэдфорд наблюдать за вами уже много дней. И пусть я не знать тебя, я знать твоя подруга розовая пони. Она помогать предатель-Резерфорд, — як состроил мрачную гримасу и топнул копытом. — Но... Брэдфорд действительно слышать, что Селестия сойти с ума, и Луна тоже. Яки сильные, якам не нужна помощь. Но Брэдфорд знать, что помощь нужна пони, — он снова топнул. — Яки КРУШИТЬ злых аликорнов!"
evildiarchy_friendship_missions.14.a:0 "Яки и пони вместе КРУШИТЬ всех врагов."

evildiarchy_friendship_missions.15.t:0 "Миссия дружбы: к якам" # Star Mountain / Kerr var
evildiarchy_friendship_missions.15.d:0 "— Да ладно тебе, это совсем не трудно!\n\n— Як Йона не быть уверена. Йона сомневаться, — молодая як, шествующая между двумя пони, покачала головой.\n\n— Пф-ф! — легкомысленно ответила Пинки Пай. — Нам всего-то нужно тайком проникнуть в страну, свергнуть тирана и поставить тебя главной. А потом мы закатим грандиозную, потрясающую, просто бомбическую вечеринку в честь победы. Там можно будет даже вволю ПОКРУШИТЬ! Проще простого. Я так делала кучу раз. Хотя... — она драматично почесала подбородок. — Мне нужно потренировать свои навыки КРУШЕНИЯ, чтобы это была лучшая вечеринка в истории.\n\n— И Пинки Пай думать, это всё легко? Слышать про [JAK.GetLeader]? [JAK.GetLeader.GetSheHeCap] – жестокий деспот, что губить прекрасный Якякистан.\n\nПинки Пай ничего не ответила, лишь подмигнула. Рарити в ответ только пожала плечами, и они продолжили путь в молчании. Они уже были высоко в горах, отделяющих Кристальную Империю от Якякистана. По какой-то причине Пинки будто бы знала точный маршрут, хотя он пролегал вдали от хоженых троп. После трёх дней восхождения склон наконец стал более пологим.\n\nВнезапно Пинки Пай вскрикнула, заставив Йону и Рарити отпрыгнуть в стороны. Но прежде чем они успели что-либо предпринять, неподалёку раздался ответный крик, и Пинки бросилась на звук. Остальные последовали за ней и вскоре вышли к пещере, заполненной яками.\n\n— Як Майя мочь сказать: всё идти по плану. Правильные яки проникнуть в стража [JAK.GetLeader]. Мы готовы нанести удар, чтобы вернуть свобода Якякистан!\n\nЗаметив удивлённые лица подруг, Пинки Пай упёрла копыта в бока. — Что? Вы думали, я заявлюсь в Якякистан просто так? Я знаю парочку яков ещё со времён Йикслурбертфеста, да и после праздника заглядывала к ним не раз. Я ведь официальный посол дружбы у яков, а каким бы я была послом без дружеских связей, хм? В общем, у нас тут тиран, которого надо свергнуть, а что ещё важнее – вечеринка, которую нужно подготовить!"
evildiarchy_friendship_missions.15.a:0 "Якякистан вновь свободен от безумия."

evildiarchy_friendship_missions.16.t:0 "Friendship Mission To The Deer" # Supremacist var
evildiarchy_friendship_missions.16.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nThey reached Hjortland without issue. Upon their arrival, they requested an audience with the Allsherjargoði. Not long afterwards, they were welcomed by a darkfurred stag with red horns. He mustered the two before beginning to speak in a slow, deliberate tone.\n\n"Rainbow Dash and Fluttershy, diplomats from Equestria. I am Jurva, the Allsherjargoði, and ruler of these lands. But you know all this, and I know that you know. The gods have already foretold your arrival, and they also laid open your mission. Yet, speak what you must speak, and I shall give you an answer as the gods demand."\n\nRainbow Dash flapped her wings, hovering over the ground with her forelegs crossed. "Well, if you already know everything, then let's cut to the chase. I've heard you Olenians are awesome warriors, so do you want to help us fight Daybreaker and Nightmare Moon? I've read the legends of Cnoof and Ivor; now is your time to prove it."\n\n"I have to admit, I'd rather talk to the animals in your forests rather than calling you to fight," Fluttershy added. "But there's time later for that. The evil diarchs are a danger to the world, and I hope the gods told you so as well."\n\nJerva looked at them with a stern expression. After a moment of pause, he answered, "You have spoken wisely, and the gods honour that. The deer are a proud and strong race. For a long time, I have seen Equestria as an influence which makes us weak. You have shown me that it does not need to be this way. But this is just to ease my mind. The gods already told me what I have to do before you departed from Canterlot. Queen Velvet will be restored, as she was the rightful heir, and we will join your fight.""
evildiarchy_friendship_missions.16.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.17.t:0 "Friendship Mission To The Deer" # Neutrality var
evildiarchy_friendship_missions.17.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nTo their surprise, after reaching Hjortland, an officer approached them to invite them to a meeting with King Johan. Apparently, the king had been informed of their arrival before they even crossed the Olenian border, but decided to not stop them. They were led to a small room in the castle, where they met a tired-looking stag. Fluttershy noticed that his fur was slightly darker than that of Velvet, and he didn't have her colourful antlers.\n\n"I guess the charade is over then." He smiled slightly, but it just made him look even more tired. "If you come to convince me to abdicate, there is no need to. I... It is not always easy to do the right thing. I wanted Olenia to be stronger than under an Equestrian sponsored doe. It... did not work out. I have consulted with the gods since I first heard about your mission. Their demands have been clear. She is the rightful heir, while I am merely a usurper. I will no longer fight."\n\nRainbow Dash raised an eyebrow. "Actually, we've come here to ask you to fight. Not with Velvet, of course, but to join our fight against the evil diarchy. As a filly, I've always read the legends of Olenian Vikingars, of Cnoof and Ivor and so on. Now is the time for the deer to prove they still have it in them."\n\n"I know your fight, but it won't be mine. Velvet will lead Olenia to fight with the free against alicorn tyranny." "
evildiarchy_friendship_missions.17.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.18.t:0 "Friendship Mission To The Deer" # Harmony var
evildiarchy_friendship_missions.18.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful. She was so sad that she had to fight for her throne, but she said it had to be done."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nThey reached Hjortland without issue. Queen Velvet was quick to grant them an audience, and soon enough they sat on cushy armchairs speaking with the queen.\n\n"Welcome to Olenia, my friends," she began. "I knew it would only be a matter of time." She sighed. "The world has become a dark place, hasn't it? Here in Olenia, we've known that sooner than many others. Johan's coup was a terrible event, and the civil war upon my return has left so many families in ruins. Yet – there is always a bright side, otherwise I wouldn't be sitting here. Evil can be fought, and must be fought."\n\n"That's precisely right!" Rainbow Dash answered, flapping her wings excitedly. "We'll show those two tyrants!"\n\n"And Olenia will stand by your side," Velvet nodded. "But don't you underestimate the cost of war.""
evildiarchy_friendship_missions.18.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.19.t:0 "Friendship Mission To The Deer" # Communist var
evildiarchy_friendship_missions.19.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nArriving in Hjortland, they were approached by a police officer. Apparently, the president of the Deer's Republic had heard of their arrival, and wanted to meet them. The two quickly agreed, and not much later they sat in the presidential palace, where a well-groomed stag approached them.\n\n"Welcome. My name is Kullervo Sirola, leader of the Deer's Party and president of the Deer's Republic of Olenia. And you are Rainbow Dash and Fluttershy, emissaries from the Princessdom of Equestria. So, what does the new Princess Twilight Sparkle want from us deer? I can already think of what she would ask, but please, make your case."\n\n"Twilight Sparkle isn't our princess. She refused," Fluttershy answered quietly. "Of course, she is still the Princess of Friendship, but she didn't want to be Princess of Equestria when Celestia and Luna... well... when they turned into Daybreaker and Nightmare Moon. We've formed an emergency council. So technically, you're speaking with the rulers of Equestria directly – or at least, with some of them."\n\n"And we've come here to ask you to fight," Rainbow Dash interrupted. "Fight like in the old days, like I've read about Cnoof and Ivor as a filly." She flew up in the air while making fake kicks in the air. "The Vikingar were awesome warriors! And now we need you to fight against the evil diarchy. All of Equus must stand united, so that they can't find a way in."\n\n"I see, I see." Sirola scratched his chin. "Interesting that you haven't mentioned Velvet's position in all of this." Rainbow Dash wanted to answer, but the deer lifted a hoof and continued. "No, no, don't ruin it now. I have already made my decision anyway. It would be a folly of me to divide the deer during these trying times. She can return – as long as she honours my promises.""
evildiarchy_friendship_missions.19.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.20.t:0 "Friendship Mission To The Polar Bears" # Polar Bears
evildiarchy_friendship_missions.20.d:0 "When Rainbow heard that she and Fluttershy had been picked for the diplomatic mission so far north, she was immediately pumped. She'd heard the bears were awesome and strong, and less prone to smashing stuff than the Yaks. It had everything to go great... until they crossed the border and were almost instantly attacked by a giant monster, a few dozen times larger than them. As she flared her wings and prepared to brawl, she took a breath and... saw as Fluttershy flew straight past her, directly at the beast.\n\n"Flutters, wait!" Rainbow flew after her, only to be shocked by the next sight. The beast had begun stamping its hind leg on the ground as Fluttershy pat its head. "Flutters, that thing's as big as a dragon! You need to get away from it!"\n\n"It's not a dragon at all; it's a Tuunbaq! They're just fluffy little fellows," she said, turning to pet the Tuunbaq more vigorously. "Aren't you, you cutie!"\n\nRainbow had seen Fluttershy pull off some crazy stunts before, but this topped them all. At least it meant they could continue on their way unimpeded... or so she thought. Fluttershy then spent the next few hours playing with the beast, flying around and calling it cutsy-wootsy names. What had begun as terrifying and awesome encounter had very quickly become very boring.\n\nA bellowing laugh suddenly startled her. Rainbow noticed a polar bear envoy had appeared in the distance – this was her chance! She quickly flew towards them before their leader even noticed her approach. Up close, she could see them better: big, bulky, and ferocious. They were awesome... and looked like they could swat her away with one claw. She gulped and approached. "H-Hey, so." Their leader slowly turned their gaze towards her, making her flinch. She trembled for a moment longer, took a deep breath, and psyched herself up. "I'm Rainbow Dash! That over there is Fluttershy! We've come from Equestria to ask for your help – you, as in, the bears – so we can stand together against Daybreaker and Nightmare Moon. You've heard, right? They're currently ravaging Griffonia! We just wanted to see if you could help, considering you're all so big, and powerful, and awesome, and—" Their leader raised a paw, instantly stopping Rainbow in her tracks.\n\n"Bring the one with the soul of frost to me," their leader said, pointing towards Fluttershy. "Then we can talk." Rainbow nodded quickly and flashed away just as quick."
evildiarchy_friendship_missions.20.a:0 "Somestimes, a friendly pat can earn honest friendship."

evildiarchy_friendship_missions.21.t:0 "Friendship Mission To The Penguins" # Supremacist var
evildiarchy_friendship_missions.21.d:0 ""SSSSSTRIKE!" Pinkie Pie screamed, sliding dramatically into a cluster of snowponies she had built. "That's three for three – Pinkie wins!" she exclaimed to herself as Rarity looked down. This visit had been going horribly, they had barely been welcomed – frankly, they were lucky they were even allowed to get to Dachaigh and not shown away, or worse, imprisoned! Rarity could not be imprisoned; not with a dress like that! She sighed as she looked at pinkie – at least someone here was having fun.\n\n"Darling, perhaps we should pack our bags and go home." Rarity shook her head as Pinkie had begun constructing a snow penguin. "I'm certain Twilight will have an idea of how to deal with this, but it isn't something the two of us can manage alone. I'm awfully sorry we came all this way for nothing."\n\n"Waddya mean, silly? We're not alone at all – we have all those friends to help us!" Before Rarity could question it, she followed Pinkie's gaze to a massive crowd of penguins marching towards a grand building in the capital.\n\n"...And who, pray tell, might they be?"\n\n"Well, they're workers, duh!"\n\n"I can see that. But how, precisely, did they become your friends?"\n\n"Well, while you were stewing away, a few of them came over and asked me what being a pony was like! So I told them all about our adventures, about Harmony, and the whole situation with the princesses! Then they said their current leader was a big old meanie just like them and they didn't like what he was doing. So I told them they shouldn't allow a meanie to boss them around, and so they went to do that, I think!" Pinkie looked proudly at the marching crowd. "Well, I'd better go and prepare a party for after they're done over there! See you later, Rarity!"\n\nDumbfounded, Rarity could only watch as Pinkie bounced away to prepare the victory celebration."
evildiarchy_friendship_missions.21.a:0 ""...I looked away for 30 seconds, how did this happen.""

evildiarchy_friendship_missions.22.t:0 "Friendship Mission To The Penguins" # Harmonist var
evildiarchy_friendship_missions.22.d:0 "I must say, darling, I didn't quite know what to expect from the penguins, but they have delivered so much more," Rarity giggled as Pinkie looked out the window. "And did you see the beautiful suit on the fellow who welcomed us? Gosh, you'd think it would be hard to tailor with flippers, but they have found a way to do it quite exquisitely!"\n\n"I wanted to be able to slide around on the ice..." Pinkie sighed dejectedly, gazing back out the window. "If only... oh, wait, I totally can!" Pinkie quickly left the room with a bounce, passing through a penguin diplomat on her way out.\n\n"She's... quite the energetic type," the diplomat spoke as he brushed down his suit and walked towards his chair. "I hope the climate has not proven too trying for your visit."\n\n"Oh, not at all! I came quite prepared to face snow, ice, storm, and wind! One can never be too prepared while travelling." Rarity smiled and gestured to her clothes. "As much as I would adore discussing fashion further, there is another thing I must ask about. We have heard the penguins are quite proficient with magic and hoped you might be open to negotiating for Equestria and Pingland to stand together against Daybreaker and Nightmare Moon."\n\n"Well, of course," the diplomat nodded – or at least seemed to; penguins do not have much of a neck for it. "Pingland is sympathetic to your cause and would be glad to stand by Equestria's side."\n\nAs the two smiled and shook hoof and flipper, a loud thud drew their attention to the window. A splattered Pinkie had found herself stuck to the pane. "The ramp was so fun! I felt like I could fly as I slid down it," she beamed, even as she seemed glued to the glass. "But it might be freezing out here!" She stuck out her tongue and placed it on the window, failing to pull it back. "Shee, ish fozen!"\n\nRarity looked out and then back at the diplomat, forcing a smile."
evildiarchy_friendship_missions.22.a:0 ""Let's understand it as a gesture of friendship.""

evildiarchy_friendship_missions.23.t:0 "Friendship Mission To Stalliongrad" # Stalliongrad
evildiarchy_friendship_missions.23.d:0 "Applejack and Rarity looked out the train window, pondering over Stalliongrad's landscape. They had only once before crossed these lands, on their way to Our Town, but back then they had barely seen anything from the self-proclaimed "Severyanian Soviet Republic" (as was Stalliongrad's official name). Spike had expressed interest in seeing the communist capital as well, and so had come with them, but he was currently asleep. They shared a glance. How easy would their mission be? For two centuries, Severyana had been de facto part of Equestria, if under their own government, only to break away a bit more than a decade ago.\n\nAt Canterlot Station in Stalliongrad, they were greeted by [STG.GetLeader], the chairpony of the Stalliongrad soviet. "Equestria sending emissaries? That's new. But welcome – I'm sure you want a look around the city to see what we've accomplished since we overthrew the nobles. We have renovated a lot since the revolution. Much is possible when there aren't leeches around sucking the wealth of the common pony and everyone is equal."\n\n"I hope you're not talking about the same stuff as Starlight Glimmer did back in her days." Applejack grumbled. "I heard quite a bit about this communism, even in my family. Doesn't do good for the farm. But that's not the point now."\n\n"Hold on, darling." Rarity intervened. "I think we should first look at the city and then judge their approach." Applejack looked at her with big eyes, making Rarity give her a slight smile in response. "You know, if there is one thing I cannot stand, it's greed. And everything I heard about the nobles points to their greed. I don't know if I can call revolution the right answer, but that's the past now." She turned to [STG.GetLeader]. "Très chic, your outfit."\n\n"I'd want to see the city too." Spike proclaimed. "After all, that's why... I mean, it's just a good opportunity, right? We can still talk about Daybreaker and Nightmare Moon and their shenanigans later."\n\nThe next hours were spent wandering the city, with [STG.GetLeader] showing off communist architecture, fashion and food. Afterwards, negotiations commenced. Of course, the evil alicorns had already been a topic in the Supreme Soviet, and Stalliongrad had readied its own defences against the threat. After reassurance that the revolution in Severyana would not be threatened, [STG.GetLeader] agreed to join them in the fight against the diarchy."
evildiarchy_friendship_missions.23.a:0 "Equestria welcomes its comrades."

evildiarchy_friendship_missions.24.t:0 "Миссия дружбы: в Наш Городок" # Our Town
evildiarchy_friendship_missions.24.d:0 "Наш Городок.\n\nФлаттершай казалось, будто она только вчера слышала безупречно отрепетированную речь Старлайт Глиммер. Это был далеко не самый лучший момент в жизни пегаски: она тогда чуть не попала под влияние культа. Разумеется, на деле всё это случилось годы назад, а Старлайт Глиммер давным-давно превратилась из лидера секты в верную ученицу Твайлайт. Флаттершай поймала себя на том, что искоса поглядывает на идущую рядом Твайлайт, которая, кажется, ничего не замечала. Флаттершай нервно махнула хвостом. Почему именно её выбрали для этой миссии? Принцесса почему-то настояла именно на её кандидатуре.\n\nКогда пони добрались до города, их тут же встретил кое-кто знакомый – Шугар Белль, одна из первых, кто восстал против правления Старлайт. — Твайлайт Спаркл и Флаттершай! Вы вернулись! Что привело вас к нам? Неужто снова возникли проблемы с дружбой? — её улыбка несколько померкла. — Надеюсь, ничего серьёзного. Мы ведь... я имею в виду, что после поражения Старлайт Глиммер здешним пони пришлось заново искать своё истинное призвание. Лишиться знака отличия – это ужасно, но жить с ним снова тоже не всегда просто.\n\n— Могу себе представить, — тихо ответила Флаттершай. — Я просто хочу, чтобы все мирно уживались. Несмотря на всё то зло, что совершила Старлайт, согласия она умела добиваться. Но, конечно, пони не должны жить без своих знаков отличия, — поспешно добавила пегаска.\n\n— Это было фальшивое, порочное согласие, — возразила Шугар Белль. — Насильное единообразие. Но я помню тебя. Со стороны это выглядело притягательно, верно? — она устало улыбнулась. — Как бы то ни было, после вашего ухода наше будущее стало туманным. [evildiarchy_friendship_missions_24_dynloc] Впрочем, вы так и не сказали, что привело вас к нам на этот раз?\n\n— Ты говорила о проблемах с дружбой, и в каком-то смысле так и есть. Но на этот раз помощь нужна нам самим, — ответила Твайлайт. — Видишь ли, Селестия и Луна... они изменились. И нам понадобится помощь каждого в Эквусе, если мы хотим иметь хотя бы призрачный шанс вернуть их прежних."
evildiarchy_friendship_missions.24.a:0 "— Вы помогли нам, а теперь мы поможем вам."
evildiarchy_friendship_missions.24_doublediamond:0 "Но мы выбрали Дабл Даймонда нашим новым мэром – на настоящих выборах, не то что раньше. Он всё ещё поддерживает идеи радикального равенства. Иногда я гадаю, не мечтает ли он стать новой Старлайт. К счастью, со знаками отличия он пока что ничего не вытворял..."
evildiarchy_friendship_missions.24_featherbangs:0 "Но мы выбрали Фезер Бэнгса нашим новым мэром – на настоящих выборах, не то что раньше. Да, того самого Фезер Бэнгса, которому я когда-то отказала. Но должна признать, что он добрый мэр..."

evildiarchy_friendship_missions.25.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Supremacist var
evildiarchy_friendship_missions.25.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты? Сомневаюсь, что нашему президенту интересно то, что вы хотите ему сказать, — он вздохнул. — Хотя, пожалуй, стоило бы, — понизив голос, он спросил. — Это правда, что Селестия и Луна сошли с ума и теперь порабощают грифонов в Новом Мейрленде? До нас доходят лишь слухи, но я слышал всякое...\n\n— О, ты совершенно прав, — подтвердила Пинки Пай. — Хотя они уже не совсем Селестия и Луна. Теперь аликорны предпочитают называть себя Дейбрейкер и Найтмер Мун. Мы здесь, потому что хотим остановить их, и нам нужна ваша помощь. Так что, если хочешь помочь своим собратьям-грифонам, тебе лучше отвести нас к вашему президенту.\n\nСтраж выглядел встревоженным. — Я же сказал, что он не станет слушать. Я... послушайте, у меня остались кое-какие связи со времён гражданской войны. Я пропущу вас и дам имена грифонов, с которыми стоит поговорить. Только пообещайте мне, что НИКОГДА, слышите, НИ ПРИ КАКИХ ОБСТОЯТЕЛЬСТВАХ не упомянете о моей роли в этом.\n\nПони переглянулись и согласно кивнули. Пообещав хранить тайну пограничника, они пересекли границу Нова Грифонии. А несколько дней спустя случилось немыслимое: [GRF.GetLeader] был свергнут и арестован в ходе продемократического переворота, а новым президентом стал Вильгельм Сильвервинг."
evildiarchy_friendship_missions.25.a:0 "Дружба снова торжествует."

evildiarchy_friendship_missions.26.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Civil war var
evildiarchy_friendship_missions.26.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты, значит. Ну, не знаю, слышали вы или нет, но у нас тут сейчас как бы два правительства. Так с кем вы хотите говорить: с "красными" или с "белыми"?\n\nРэйнбоу Дэш повернулась к подруге: — Похоже, им и правда нужна наша помощь. Хочешь поговорить с "красными", а я возьму на себя "белых"?\n\nПинки Пай кивнула, и пони разделились. Позже, обмениваясь впечатлениями, они обнаружили, что переговоры с обеими сторонами прошли по схожему сценарию. Рэйнбоу Дэш впечатлила Хайхилла своим лётным мастерством и военной выучкой, в то время как Пинки Пай расположила к себе Редтейла, процитировав по памяти отрывки из "Манифеста Партии Социальной Справедливости" за авторством Маркс. Когда озадаченная Рэйнбоу спросила, где та познакомилась с этой работой, Пинки лишь подмигнула.\n\nВ итоге подругам удалось убедить обе стороны заключить временное перемирие и продолжить переговоры. В конечном счёте противники согласились сформировать коалиционное правительство под началом Вильгельма Сильвервинга, умеренного республиканца, и присоединиться к борьбе против истинного врага грифонов – зловещих аликорнов в Грифонии."
evildiarchy_friendship_missions.26.a:0 "Мы не должны сражаться друг с другом, пока на кону стоит наше выживание."

evildiarchy_friendship_missions.27.t:0 "Миссия дружбы: в Нова Грифонию" # Nova Griffonia - Other var
evildiarchy_friendship_missions.27.d:0 "— У меня какое-то дежавю, — сказала Пинки Пай. — Ты и я, снова на миссии дружбы в земле грифонов.\n\n— Ага, вот только на этот раз помощь нужна нам самим, — ответила Рэйнбоу Дэш. — И Нова Грифония – это не Грифонстоун, хотя здесь почти так же уныло. Статус колонии рухнувшей империи не особо способствует ни дружбе, ни процветанию. Ну ладно, посмотрим. Надеюсь только, что в этот раз я не сломаю ногу. В тот раз было охренительно больно и совершенно не круто.\n\n— Граница закрыта, пони! Что вам нужно? — суровый голос прервал их разговор. Они достигли границы Нова Грифонии. Рэйнбоу Дэш протянула пограничнику паспорта, которые им дала Твайлайт. Грифон недовольно фыркнул. — Дипломаты, значит. А я-то думал, у Эквестрии уже есть консульство в Уэтере. Впрочем, полагаю, вы хотите поговорить с нашим лидером? Идите за мной.\n\nСпустя несколько часов пони прибыли в столицу. Пограничник уже телеграфировал об их прибытии [evildiarchy_friendship_missions_27_dyntitle], поэтому их сразу отвезли к нему на виллу.\n\n[GRF.GetLeader] встретил их весьма тепло. — Я уже слышал немало историй об этом. Селестия и Луна... они обе сошли с ума, верно? И теперь Принцессе Дружбы приходится разгребать эти проблемы, — он покачал головой. — [evildiarchy_friendship_missions_27_dyndesc]\n\n— Почти угадали, но не совсем, — ответила Пинки Пай. — Селестия и Луна не просто сошли с ума, они превратились в супермощных и суперзлых аликорнов и теперь зовут себя Дейбрейкер и Найтмер Мун. И Твайлайт не правит Эквестрией – это делает чрезвычайный совет. О, и Эквестрия вовсе не разваливается! На самом деле мы готовимся к нападению злой диархии и пришли спросить, не хотите ли вы присоединиться к нам. В конце концов, гляньте, что они вытворяют с грифонами в Грифонии! — Пинки Пай повернулась к подруге. — Я ничего не забыла, Дэш?\n\n— Мне ни за что не сравниться с твоими дипломатическими усилиями, — саркастично заметила Радуга Дэш. — Господин [evildiarchy_friendship_missions_27_dyntitlecap], если позволите...\n\nНо [GRF.GetLeader] прервал её, усмехнувшись: — Всё в порядке. Я в деле."
evildiarchy_friendship_missions.27.a:0 "Грифоны, отомстите за своих собратьев!"
evildiarchy_friendship_missions_27_dyntitle_governor:0 "губернатору"
evildiarchy_friendship_missions_27_dyntitle_president:0 "президенту"
evildiarchy_friendship_missions_27_dyntitle_governorcap:0 "губернатор"
evildiarchy_friendship_missions_27_dyntitle_presidentcap:0 "президент"
evildiarchy_friendship_missions_27_dyndesc_teafeather:0 "Что за катастрофа. Я родился в Империи Грифонов и, хотя не припомню, чтобы кто-то из Гроверов сходил с ума подобным образом, я хорошо помню её крах. Пожалуй, Эквестрии повезло, что у неё всё ещё есть принцесса, которой не всё равно."
evildiarchy_friendship_missions_27_dyndesc_highhill:0 "Что за катастрофа. Нация, внезапно лишившаяся лидера, всегда пребывает в смятении. Мы проходили через это здесь, в Нова Грифонии. Но то, что случилось с вами, пожалуй, куда хуже."
evildiarchy_friendship_missions_27_dyndesc_redtail:0 "Это поистине трагедия. Надеюсь, Твайлайт сможет всё исправить."
evildiarchy_friendship_missions_27_dyndesc_silverwing:0 "Для меня лично это тоже большая трагедия. Я всегда считал их примером для подражания. И вот теперь такое."
evildiarchy_friendship_missions_27_dyndesc_blackpeak:0 "Я искренне не могу этого осознать. Они всегда были столь непоколебимым примером добродетели."

