EQS_sabotage_mechanic_decisions:0 "Sabotaging The Condominium"
EQS_sabotage_mechanic_decisions_desc:0 "In a surprise turn of events, Jet Set, royal chancellor to Daybreaker and Nightmare Moon, has offered to sabotage their government. With his position at the centre of operations, he would be able to effectively stifle their operations, but any such endeavour could break the delicate balance between the two diarchs. Instead, he will restrict himself to smaller-scale actions – yet, if applied properly, they could still prove valuable.\n\nHowever, in all of this, the most important objective is to keep Jet Set from being found out. Should the diarchs find out about his treason, not only will he suffer severe consequences, but he won't be able to keep the peace between them anymore...\n\nJet Set is currently [sabotage_jetset_compromised_dyn]"
