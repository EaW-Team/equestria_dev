ED_tree_of_harmony_magic:0 "Сила гармонии"
ED_tree_of_harmony_magic_desc:0 "Знаменитое Древо гармонии – древнее волшебное дерево, растущее в Вечнодиком лесу. Посаженное во времена основания Эквестрии, оно излучает магию благодаря глубокой и искренней вере пони в силу дружбы. Некоторое время назад Древо создало Замок Дружбы для Твайлайт Спаркл вместе с картой знаков отличия, которая отправляла носительниц элементов гармонии на задания по восстановлению дружбы, где бы та ни находилась под угрозой.\n\nТеперь, когда разразился беспрецедентный кризис, Древо снова ожило и создало мощный щит, чтобы помешать злым аликорнам вернуться в Эквестрию. Но это ещё не все. Древо также даёт героиням силу распространять гармонию и собирать друзей как внутри, так и за пределами Эквестрии, чтобы подготовиться к последнему бою...\n\nСейчас £GFX_magic_texticon сила Дружбы находится на уровне: §Y[?EQS_ED_friendship_power_current]/100§!\nЕженедельный прирост: §Y[?EQS_ED_friendship_power_gain]§!"
