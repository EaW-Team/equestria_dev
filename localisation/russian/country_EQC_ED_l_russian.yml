# Special Projects
sp_alicorn_slayer_gun:0 "Орудие "Убийца аликорнов""
sp_alicorn_slayer_gun_desc:0 "Проект под кодовым названием "Убийца аликорнов" усиливает авиационные пушки, покрывая их ствол магическими кристаллами. Специализированные снаряды, аналогично насыщенные кристаллами, могут летать по траекториям, недоступным для обычного вооружения. Первые испытания показали, что опытные маги способны корректировать полёт снаряда даже после выстрела, что придает орудию невероятную гибкость."
alicorn_slayer_cannon:0 "Пушка "Убийца аликорнов""
alicorn_slayer_cannon_desc:0 "Орудие, использующее снаряды с кристаллическим наполнением. Благодаря магическому самонаведению эти снаряды крайне эффективны."
sp_arcane_laser_cannon:0 "Магическая лазерная пушка"
sp_arcane_laser_cannon_desc:0 "Даже в суровых реалиях современной войны старые методы не всегда бесполезны, их нужно лишь правильно адаптировать. Это "орудие" не стреляет снарядами, поскольку представляет собой устройство для концентрации и усиления гармонической энергии операторов-пони. А из-за того, что магический луч внешне напоминает лазер, проект получил название "Магическая лазерная пушка"."
light_arcane_laser_cannon:0 "Лёгкая магическая лазерная пушка"
light_arcane_laser_cannon_desc:0 "Это орудие не использует снаряды. Вместо этого оно концентрирует гармоническую энергию экипажа в магический луч, вселяющий сомнения и страх в сердца тех, кто стремится к завоеваниям и господству."
medium_arcane_laser_cannon:0 "Средняя магическая лазерная пушка"
