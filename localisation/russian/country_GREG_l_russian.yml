### Focuses
 TMB_focus: "Древо фокусов Тамбелона"
 TRT_revolt_focus_1: "Вечная Доктрина"
 TRT_revolt_focus_2: "Путь Сейчас и Навсегда"


 NE_strengthen_the_army: "Возвращение Тамбелона"
 NE_strengthen_the_army_desc: "Звон Чарующего Колокола огласил этот мир. Отец вернулся из своего изгнания, как и Тамбелон. Скоро вернётся и их правление. Так начинается новая эра. Уроборос вновь укусил себя за хвост, цикл замкнулся."
 NE_rally_troops: "Плоть и кости"
 NE_rally_troops_desc: "Власть коз над миром поддерживалась с помощью жутких созданий. Сшитые из плоти множества животных, химеры были идеальными и послушными конструктами. И клетки в лабораториях Тамбелона всё ещё хранят в себе множество подобных существ. Но понадобится намного больше монстров, чтобы восстановить мощь козьего рода..."
 NE_recruit_spies: "Всевидящее око"
 NE_recruit_spies_desc: "Теперь, когда кристальный шар вновь принадлежит Грогару, ничто не скроется от его взора. Артефакт видит всё сущее. Взгляду Отца не будет препятствием ни облака, ни тени, не земля, ни даже плоть. Секреты любого врага будут раскрыты для всех коз."
 NE_forced_labour: "Удар хлыста"
 NE_forced_labour_desc: "Отец создал общество, в котором не было обязательной работы, и все козы были вольны заниматься искусствами магии. Эта утопия была построена на спинах множества ничтожных рабов. Похоже, осевшие на бескрайних песках зебры и верблюды позабыли свои корни. Пора им напомнить об их истинной цели."
 NE_heavy_units: "Пробуждение титана"
 NE_heavy_units_desc: "Перед началом времён, перед появлением первой материи, не существовало ничего. Но перед тем, как появилась пустота, в мире господствовали великие монстры. Всего один выжил во время первобытной эпохи и был приручен Грогаром, чтобы стать стражем Тамбелона. Со времён изгнания он спал под толщей песков. Теперь пришло время ему пробудиться."

 NE_country_roads_take_me_home_to_the_place_where_i_belong: "Все дороги ведут в Тамбелон"
 NE_country_roads_take_me_home_to_the_place_where_i_belong_desc: "В давние времена все дороги вели в Тамбелон. На протяжении тысячелетий они были погребены под песком и почвой, из-за чего сердце всех земель оказалось изолировано. Теперь, когда у нас появились свежие рабы, пора восстановить старые дороги."
 NE_hire_generals: "Рабы-солдаты тьмы"
 NE_hire_generals_desc: "Во время изгнания в мир тьмы Грогар поработил примитивную расу под названием трогглы. Эти дикари показали себя отличными солдатами, которые при этом обладают слишком слабой волей, чтобы бунтовать против своих новых хозяев. Грогару нужны преданные подчинённые, которые будут командовать армией монстров, поэтому трогглы исполнят эту обязанность."
 NE_airforce_expansion: "Когда свиньи летают"
 NE_airforce_expansion_desc: "Козы не могут и не желают летать. В прошлом они даровали такую возможность некоторым своим творениям, чтобы они сражались против враждебных рас, обладающих этой особенностью. Теперь же все пользуются новыми чудовищами из металла. Нам необходима новая химера, которая будет способна противостоять этой грубой подделке."
 NE_its_almost_harvesting_season: "Начать жатву"
 NE_its_almost_harvesting_season_desc: "Самый лёгкий способ набрать биомассу - просто взять её из дикой природы. Это всегда работало. Козы забирали несовершенные организмы и превращали их в нечто большее. В прекрасных монстров, собранных из лучших частей. И главное, сейчас у нас не будет недостатка в животных, поскольку за время изгнания их численность увеличилась во много раз."
 NE_crystal_mining: "Покорение пустыни"
 NE_crystal_mining_desc: "Завоевание южной части Зебхары будет отличным первым испытанием для новой армии. Это позволит получить ценный боевой опыт для козьих повелителей зверей, которые не воевали целое тысячелетие. К тому же, кристальная шахта в Гребне Анеги будет полезным дополнением к поставленной цели."
 NE_magic_generators: "По ком звонит колокол"
 NE_magic_generators_desc: "Чарующий Колокол - это невероятно могущественный артефакт, выкованный в огнях самого Тартара многие тысячелетия назад. Но его мощь не растёт сама по себе. Колокол действует как магический накопитель, обладая возможностью хранить в себе гигантские запасы энергии, которые должны быть получены из других источников... таких как низшие расы этого мира."
 NE_magical_experiment: "Меч и Магия"
 NE_magical_experiment_desc: "Теперь, когда мы тренируем новое поколение биомантов, козы вернут принадлежавший им ранее титул самых могущественных магов в мире. Их заклинания обрушатся на врагов, сминая волю и тела противника. Низшие расы будут наказаны и выучат урок послушания раз и навсегда."
 NE_reign_of_terror: "Царство террора"
 NE_reign_of_terror_desc: "Почему козы стали так слабы и ничтожны после изгнания Грогара? Потому что никто их больше не боялся. Страх всегда был основой могущества нашей расы. И мы вернём утраченную мощь, обрушив ужасающую войну на омерзительные недокозлиные расы."
 NE_crackdown_on_populace: "Спустить монстров"
 NE_crackdown_on_populace_desc: "В далёкие времена козы спускали тысячи тварей для охоты на низшие расы. И если те не хотели быть истреблены, то они становились рабами для всего козьего рода. Теперь Отец и его монстры вернулись. И все, кто когда-то смотрел на нас свысока, будут молить о том, чтобы вновь стать рабами."
 NE_crystal_armour: "Мощь кристаллов"
 NE_crystal_armour_desc: "Магические кристаллы - это сырая концентрированная энергия, которая образовывается на пересечении природных лей-линий. Козья раса первой раскрыла их истинный потенциал, а также научилась искусственно создавать, используя магическую эссенцию разумных существ."

 NE_southern_offensive: "Четыре рабские расы"
 NE_southern_offensive_desc: "Гиены, йети, гаргульи и кентавры обладали важными ролями в козьем обществе. Гиены были шахтёрами, добывая минералы, которые остальные рабы обрабатывали. Йети являлись морозостойкими воинами. Гаргульи работали каменщиками, высекая статуи во славу Грогара. А кентавры представляли собой магические накопители. Время им вновь занять древнейшие роли."
 NE_western_offensive: "Дары Нейла"
 NE_western_offensive_desc: "Плодородная река Нейл когда-то орошала множество ферм, чьи плоды кормили не только рабов, но и самих коз. После изгнания Отца в этом регионе поселились омерзительные пони, которые возвели жалкие грубые пирамиды из песчаника. Все потомки рода пони - заклятые враги Грогара. И они будут наказаны за своё высокомерие с особой жестокостью."
 NE_northern_offensive: "Через пустоши"
 NE_northern_offensive_desc: "Зебры-варвары поселились на севере, который по большей части превратился в пустынные и засушливые земли. Тем не менее, нам необходимо создать опорные позиции перед экспансией на дальний север. Дикари-кочевники будут снова приручены и превращены в послушных, смиренных и цивилизованных рабов."
 NE_eastern_offensive: "Затерянные в песках корабли"
 NE_eastern_offensive_desc: "Верблюды отлично приспособились к пустыне и иногда были полезными перевозчиками во времена правления козлократии. Со времён изгнания они попытались построить собственное королевство, но, понятное дело, потерпели неудачу и были завоёваны другой расой. Очевидно, что верблюды неспособны управлять своей судьбой и крайне нуждаются в присмотре коз."
 NE_attack_lakes: "Усмирить Великие Озёра"
 NE_attack_lakes_desc: "Обширные пресноводные водоёмы, созданные козьим родом, хоть и пришли в упадок, но всё ещё остаются самыми большими озёрами на континенте. На их богатых жизнью берегах поселились зебры, сражаясь друг с другом за каждый клочок земли и подчиняя себе подобных, словно истинные варвары. Весь регион остро нуждается в усмирении и полномасштабном порабощении."
 NE_attack_rivers: "Родина Брэя"
 NE_attack_rivers_desc: "Брэй, самый полезный слуга Грогара, был родом из Асстирии. Наконец пришло время ему вернуться домой в качестве завоевателя. И не только ослы преклонят колени перед своими новыми хозяевами, но и двуногие коты Абиссинии. Все они будут одинаково равны в рабстве у своих новых повелителей."
 NE_attack_coast: "Северные берега"
 NE_attack_coast_desc: "Освоение севера идёт полным ходом и на горизонте уже видны бескрайние просторы океана. Земля обильно кишит зебрами, хотя есть и кое-кто ещё. Эквестрийские пони. Даже мысли об этой отвратительной недокозлиной низшей расе приводят Грогара в чистую ярость. Они явно заслуживают... особых мер за свои прошлые прегрешения."
 NE_attack_miners: "Чужеземцы на чужой земле"
 NE_attack_miners_desc: "Последних, кого ожидал увидеть Отец на юго-востоке Зебрики, так это грифонов. Как создания с другого континента вообще здесь оказались? Но в принципе, это не важно. Просто именно эти грифоны вернутся к рабству быстрее, чем их родственники за океаном. Знакомые лица - зебры и жирафы, быстро вернутся к своей службе вместе с ними."
 NE_attack_southwest: "Приручить лошадей"
 NE_attack_southwest_desc: "Во времена козлократии лошади использовались в качестве вьючных животных для немагических перевозок. Они сильные создания и к тому же обладают магическими способностями, как их меньшие сородичи. Вдобавок, пони тоже поселились в холодных юго-западных землях. Обе расы должны быть покорены. Хотя, последние должны страдать больше, чем первые."
 NE_attack_northwest: "Кошмары Седельной Аравии"
 NE_attack_northwest_desc: "Похоже, лошади запада установили тесные связи со своими сородичами-пони, а также укротили природу с помощью технологий и магии. И всё же, несмотря на их «прогресс», они всё так же склонны к мелким распрям. Им ничуть не меньше, чем другим низшим расам, не осквернённым так называемой «современностью», необходимо сильное копыто господина."
 NE_attack_northeast: "Пересекая Анделайи"
 NE_attack_northeast_desc: "Анделайские горы являются крайне серьёзным природным препятствием, но и их можно обойти. За ними пролегают земли Зебриканских оленей, которые каким-то образом смешались с своими дальними родственниками из Эквуса. Этот нечистивый союз никак не поможет им избежать нашего гнева."
 NE_attack_southeast: "Восстановить погодный коллектор"
 NE_attack_southeast_desc: "Великое магическое сооружение, построенное козьим родом, повреждено и работает со сбоями, вызывая хаос на юго-востоке. Его магическая мощь опустошила местную экосистему, а низшие расы слишком глупы, чтобы починить устройство. Вместо этого варвары называют его «Золотым Храмом». Наш долг – восстановить устройство и исцелить юго-восток."
 NE_attack_north: "Обезопасить моря"
 NE_attack_north_desc: "Гиппогрифов, гарпий и оленей северных островов будет труднее подчинить, чем остальных, но у нас нет недостатка в водных чудовищах. И пусть морское вторжение будет чрезвычайно трудным, наши завоевания пока что доказывают наше превосходство и способность сокрушить любое сопротивление на нашем пути."
 NE_attack_east: "Потушить пламя"
 NE_attack_east_desc: "Кирины - это лошадиная раса, способная превращаться в устрашающих нириков, используя эмоции ярости и ненависти. Это делает их ненадёжными рабами, но вместе с этим отличным источником энергии и тепла. Поэтому, козы посчитали их очень ценными для владения. Достигнув восточных земель континента, мы поработим их жалкую расу."


 TRT_relocate_capital: "Переместить Совет"
 TRT_relocate_capital_desc: "Тамбелон больше не безопасен. Следуйте плану релокации. Совет должен выдвигаться немедленно, чтобы избежать плена. После завершения продолжить выполнение плана.\n\n"Живи чтобы очищать.""
 TRT_exterminate: "Наградить трогглов за службу"
 TRT_exterminate_desc: "Трогглы перестали быть полезны нам, их верность нельзя гарантировать. С этого момента они классифицируются как грязь. Грязь надо очищать. Относитесь к ним как к остальным недокозлам.\n"Не привязывайтесь к бесполезным вещам из-за сентиментальности. Это слабость.""
 TRT_mass_crystal_production: "Расширить производство кристаллов"
 TRT_mass_crystal_production_desc: "Процесс преобразования кристаллов проходит медленно из-за нежелания тратить труд рабов попусту. Это больше не имеет значения. Производство кристаллов будет расширено под наши нужды. Субъектам на переработку следует говорить, что после этого они перестанут быть бесполезными.\n"Смерть — это лишь начало.""
 TRT_begin_marching: "Начать Марш Смерти"
 TRT_begin_marching_desc: "Раса, господствовавшая над нами, была давно уничтожена. Путь Сейчас и Навсегда был несовершенен из-за нежелания применять данный метод к остальным. Данную ужасающую задачу теперь нужно выполнить из необходимости. Используйте любые методы, живых не оставлять.\n"Планета только с одной разумной расой познает мир и свободу.""
 TRT_increased_fear: "Страх вымирания"
 TRT_increased_fear_desc: "Разумные существа по своей натуре боятся смерти. Уровни страха можно повысить до недостижимых высот. Никто не сравнится с козами.\n"Страх — это ключ. Страх — это свобода. Они должны нас бояться.""
 TRT_recycling: "Развить огромные пасти"
 TRT_recycling_desc: "Был создан новый вид монстра: огромная пасть с пищеварительной системой. Она будет перерабатывать грязь в чистую, сырую биомассу. Это позволит нам в разы ускорить производство биомассы.\n"Да не назовут нас расточительными!""
 TRT_new_economy: "Новая экономическая система"
 TRT_new_economy_desc: "Рабов больше нет, поэтому работу придётся делать козлам. Эпоха упадка ушла, они теперь не могут проводить всё время, как хотят. Треть жизни козла должна быть потрачена на выполнение общественных нужд.\n"Индивидуум является лишь клеткой в гигантском организме. Клетке нужен организм так же сильно, как и организму клетка.""
 TRT_goat_production: "Мобилизовать рабочих козлов"
 TRT_goat_production_desc: "У нас не осталось рабов, которых можно использовать для создания брони из кристаллов. Козлы должны также взять ответственность. Продуктивность и качество должны вырасти, так как рабы были склонны к саботажу и лени.\n"Один мотивированный и фанатично преданный козёл может сделать столько же работы, сколько и тысяча рабов.""
 TRT_new_occupation_law: "Дать им корм"
 TRT_new_occupation_law_desc: "Монстров тренировали щадить существ, которые приняли рабство. В этом более нет необходимости, надо позволить им охотиться на популяцию. Любое "сопротивление" будет тратить своё время на борьбу за выживание.\n"Монстры охотились на разумных существ с первобытных времён. Почему в будущем должно быть по другому?""
 TRT_recycling_2: "Пустить трогглов в дело"
 TRT_recycling_2_desc: "Ценная биомасса не должна гнить. Трогглы могут продолжить служить нам в иной, более эффективной форме. Пустите их на биомассу, а потом раздайте её биомантам.\n"Они продолжат свою службу после смерти.""
 TRT_goat_generals: "Новые лидеры армии монстров"
 TRT_goat_generals_desc: "Мы нашли новое применение трогглам, так что нам требуется новое военное командование. Козлам будут выданы соответствующие военные звания по заслугам и способности к обучению. Главы Совета станут высокопоставленными командирами.\n"Опыт — вот лучший учитель.""
 TRT_goatscription: "Ввести козлозыв"
 TRT_goatscription_desc: "Боевые действия уже не могут быть возложены на рабов-солдат. Долг козлов - служить. Нам требуется больше погонщиков и биомантов. Отказ от службы будет караться. Призывники будут освобождены от службы после завершения очистки мира.\n"Нет ничего благороднее, чем отдать свою жизнь за великое благо.""
 TRT_repopulation: "Заселить мир"
 TRT_repopulation_desc: "Сейчас в мире около 500 000 козлов. Восстановление популяции до чисел перед изгнанием займёт века. Рост населения требуется ускорить, поощряя создание и расширение семей.\n"Очищенный мир станет садом, полным плодородной почвы. Нам всего лишь надо посеять семена, тогда мы сможем расти и процветать.""
 TRT_superior_armor: "Зачарованная броня монстров"
 TRT_superior_armor_desc: "Противник разрабатывает эффективные меры противодействия. Мы должны приспособиться к этому, иначе умрём. Увеличенная магическая мощь позволит наносить мощные зачарования. Дополнительное кристальное покрытие улучшит качество брони.\n"Пускай они сражаются с нами всем чем могут. Это лишь отсрочит неизбежное.""
 TRT_goatvisors: "Меритократическая козлократия"
 TRT_goatvisors_desc: "Козлы, проявившие военный гений, будут повышены до командирских позиций. Повышения будут выдаваться следуя меритократическим стандартам. Хорошая работа должна вознаграждаться. При этом следует учитывать преданность делу.\n"Выживание сильнейших - это простой и универсальный биологический принцип. Его нельзя обойти или нарушить.""
 TRT_superior_magic: "Невероятно сильная магия"
 TRT_superior_magic_desc: "При достаточном уровне страха все козлы раскрывают свой истинный потенциал. Божественность может быть достигнута каждым. Реальность либо подчинится нам, либо схлопнется.\n"Я стал смертью, разрушителем миров.""
 TRT_leviathan: "Левиафаны"
 TRT_leviathan_desc: "Методы создания морских змеев стремительно устаревают. Требуется разработать новую тварь для подводного боя. Она должна превосходить любой корабль, когда-либо произведённый недокозлами. Растраты биомассы - вторичны.\n"Если ты думаешь, что победишь левиафана, забудь — нет никакой надежды, ты даже его вида устрашишься.""
 TRT_remake_titans: "Анализ биологии титана"
 TRT_remake_titans_desc: "Титаны — первородные существа с инопланетной биологией. Единственный живой образец можно разобрать и тщательно скопировать. Создание искусственных титанов даст нам преимущество в борьбе с грязью.\n"Создадим ли мы фальшивых богов, чтобы они правили нами? Как мы горды, и как слепы."" # Фанатам Альфа Центавры привет
 

 TRT_relocate_capital_2: "Оплот безопасности"
 TRT_relocate_capital_2_desc: "Всё началось внезапно. Некоторые козлы требовали других принять их Вечную Доктрину, включающую в себя убийство всех рабов без разбора. Отказавшихся ждала незавидная судьба. Эта организованная попытка переворота вместе с исчезновением Грогара привела к формированию временного совета. Однако в Тамбелоне больше не безопасно."
 TRT_save_troggles: "Спасти трогглов"
 TRT_save_troggles_desc: "Трогглы верно служили нам. Многие из них, не понимая смысла этой войны, остались верны Вечной Доктрине, считая себя в безопасности. Они не правы. Мы должны внедрить козлов в стан врага и связаться со столькими трогглами, со сколькими сможем. Надеемся, их можно убедить сбежать."
 TRT_reconsider_technology: "Пересмотр отношений к технологиям"
 TRT_reconsider_technology_desc: "Ранее Грогар был против внедрения изобретений низших рас. Есть что-то ироничное в использовании технологий недокозлов против них. Без использования современного снаряжения у нас нет шансов против наших врагов."
 TRT_more_slave_soldiers: "Больше солдат-рабов"
 TRT_more_slave_soldiers_desc: "Трогглы издавна использовались в качестве солдат-рабов, они доказали свою верность. Почему бы и не использовать другие низшие расы в качестве солдат? В Зебрике полно существ, которые могут оказаться полезными на фронте. Что мешает отправить их воевать, ведь вариантов у нас не так уж и много?"
 TRT_reignite_forges: "Разжечь кузни"
 TRT_reignite_forges_desc: "Огромные промышленные комплексы покорённых народов были практически заброшены, а их обширные предприятия остались бесхозными. Теперь всё должно измениться. Рабы будут возвращены на свои фабрики, и им будет позволено работать на нас с помощью машин, а не только с помощью своих конечностей."
 TRT_slave_scientists: "Достойные науки низших рас"
 TRT_slave_scientists_desc: "На данный момент практически все рабы занимаются физическим трудом или же работают прислугой во благо козлов. Достаточно умные экземпляры могут принести пользу в других сферах жизни. Нам нужны не только рабы-учёные, но и переводчики, способные перевести работы, написанные недокозлами, чтобы мы могли изучить их, расширив наши знания о мире."
 TRT_new_occupation_law_2: "Разнообразить эксплуатацию рабов"
 TRT_new_occupation_law_2_desc: "Вместо того чтобы пускать на самотёк монстров и порабощать тех, кто сдался, следует использовать более эффективную оккупационную политику. Каждое способное существо должно работать, а её мы выдадим по их способностям. Это гарантирует более эффективное использование рабов."
 TRT_improve_living_conditions: "Улучшить жизненные условия рабов"
 TRT_improve_living_conditions_desc: "Смертность рабов высока и их жизни полны страданий и мучений. Это делает крупные восстания рабов неизбежными. Необходимо улучшить отношения к рабам, так как плохое отношение к ним заставило их ненавидеть нас, а не бояться. Выдача им добротных домов, еды, здравоохранения и выходных должно их угомонить."
 TRT_soc_dev: "Принять современность"
 TRT_soc_dev_desc: "Если мы хотим в полной мере использовать технологии в широком масштабе, нам необходимо внедрять более совершенные и сложные общественные организации. К счастью, некоторые из завоёванных нами стран уже используют их, и нам останется только последовать их примеру."
 TRT_read_nigga_read: "Научить всех козлов читать"
 TRT_read_nigga_read_desc: "Несмотря на то, что многие козлы одарены биомантией, есть те, кто даже не умеют читать. Мы должны предоставить козлам базовое образование, чтобы они смогли достигнуть пика своих способностей."
 TRT_civ_concerns: "Организовать гражданскую экономику"
 TRT_civ_concerns_desc: "Низшие расы создали множество различных организаций для организации труда рабочих и повышения продуктивности. Мы должны перенять эти методы для использования в гражданской сфере для повышения производительности. К сожалению, это значит, что нам нужно положиться советы и помощь рабов, но это на время."
 TRT_mil_concerns: "Организовать военную экономику"
 TRT_mil_concerns_desc: "Низшие расы создали множество различных организаций для организации труда рабочих и повышения продуктивности. Мы должны перенять эти методы для использования в военной сфере для повышения производительности. К сожалению, это значит, что нам нужно положиться советы и помощь рабов, но это на время."
 TRT_aircraft: "Использовать авиационные разработки"
 TRT_aircraft_desc: "Летающим монстрам не сравниться с современной авиацией, сделанной из металла и работающих на двигателях внутреннего сгорания. Нужно не только изучить наработки порабощённых наций, но и найти бывших пилотов для формирования рабских эскадрилий."
 TRT_ships: "Использовать флотские разработки"
 TRT_ships_desc: "За то время, пока мы создаём одного морского змея, низшие расы производят десяток стальных и вооружённых кораблей. Мы можем усилить наши военно-морские силы, начав использовать корабли с рабами-моряками наряду с монстрами."
 TRT_army_shit: "Современная армия"
 TRT_army_shit_desc: "Вместе с армией монстров у нас будет и современная армия, вооружённая новейшими технологиями низших рас. Состоять она будет полностью из рабов, добровольцев и вспомогательных войск. С поддержкой флота и авиации, мы сможем с гордостью встретить врагов правления Грогара."
 TRT_accelerate: "Ускорение науки"
 TRT_accelerate_desc: "Недостаточно просто копировать достижения низших рас. Нужно и самим развиваться, ведь интеллект козлов в разы лучше, чем у всех остальных. Вскоре мы превзойдем все остальные расы на планете и станем полноправными хозяевами науки."
 TRT_nukes: "Секреты ядерного синтеза"
 TRT_nukes_desc: "Наши заклинания, конечно, сильны, но низшие расы разработали мощные устройства, равные нашей магии по уровню разрушений. Почему бы и нам их не использовать? К тому же топливо для этих устройств является полезным источником энергии, которая нам необходима."
 TRT_the_final_focus: "Конец пути"
 TRT_the_final_focus_desc: "Путь сейчас и навсегда имел точную цель: решить серьёзную проблему, но если эту проблему решить навсегда, то зачем следовать Пути?"


### Events
 some_secrets_are.173.t: "Истории дюн"
 some_secrets_are.173.d: "Дорогой дневник,\n\nПосле долгого и трудного приключения сегодня караван, наконец, пришёл в точку назначения, а именно город-оазис Азир. Впрочем, называть это городом будет большой лестью. На самом деле это была всего лишь куча палаток да небольших торговых прилавков. И, тем не менее, это самое большое поселение во всём пустынном регионе. Наши запасы воды заканчивались к концу путешествия, поэтому мы вместе с измученными жаждой верблюдами каравана с наслаждением бросились к пресной воде. Местные дикари были достаточно гостеприимны, поскольку подобные караваны вполне привычное для них дело. Однако зебры проявили ко мне особое любопытство, поскольку, похоже, они никогда в своей жизни не видели пони из Эквестрии. Гид перевёл их слова, сказав, что они восхищались цветом моего окраса.\n\nПосле короткой передышки я направился к своей основной цели, а именно загадочным руинам неподалёку от поселения. К счастью, мой осёл-гид знал наилучшую дорогу, поэтому мы уверенно направились вдаль по песчаным дюнам. Когда мы забрались на очередную из них, мне, наконец, удалось увидеть эти самые руины, из-за чего у меня откровенно отпала челюсть от изумления. Возвышающиеся над окружающим пространством монолитные чёрные камни были наполовину погребены под песком и, похоже, простояли здесь множество веков. И подобные постройки виднелись повсюду. Это была попросту бесценная находка для археолога вроде меня!\n\nМы вместе с гидом спустились вниз по дюне, чтобы посмотреть на эти руины поближе. У меня буквально всё внутри переворачивалось от нетерпения! Слухи оказались правдивыми, и мне удалось обнаружить находку, которая точно прославит меня на всю Эквестрию. Тем не менее, на моём лице эти мысли не отразились, и в дороге у меня на лице отражались только профессионализм и собранность, а в блокнот попутно вносилось множество записей. Впрочем, пока мы вдвоём бродили по этим руинам, мне повезло наткнуться на нечто особенное, наполовину скрытое под грудой мусора, а именно идеально круглую сферу. Мой гид был ещё больше восхищён моей находкой, чем я. На мой вопрос об этом шаре он ответил, что данное сокровище было утеряно несколько веков назад. Совместно нам удалось вытащить эту сферу из мусора, не повредив в процессе. Это была воистину потрясающая находка. А ещё, если смотреть прямо в неё, то создавалось впечатление, будто ты глядишь прямиком в бездну..."
 some_secrets_are.173.a: "..."

 some_secrets_are.137.t: "Загадка"
 some_secrets_are.137.d: "Дорогой дневник,\n\nПриятно вновь вернуться в цивилизацию, хотя, печёт в Кольтфагене сильнее, чем в Азире, возможно это из-за большой влажности. Однако, я сюда прибыл не для использования благ цивилизации и сразу отправился в местный университет. Мне надо было узнать, правдива ли информация гида о кристальном шаре. Был ли это магический артефакт? Можно ли его использовать для открытия гробницы? Я не был уверен, был ли там кто-то, кто мог ответить на эти вопросы, но я их как-нибудь найду. Я обязан.\n\nЯ встретился с местными археологами и представил свои фотографии и записи о руинах в пустыне. Джентльзебры были впечатлены, заявив, что это требует дальнейшего изучения. Они не были готовы к тому, какой артефакт я им покажу. Сказал им, что нашёл его с помощью гида, но они были слишком заняты любованием кристальным шаром. Один из них всё-таки меня услышал, сказал, что они с радостью готовы принять шар в коллекцию для дальнейшего изучения, но я отказался, заявив, что шар отправится со мной в Эквестрию.\n\nК сожалению, зебры знали о руинах и шаре ещё меньше меня. Печально, конечно. Покинув университет, я опять встретился с гидом. Он сказал мне, что если я бы хотел узнать больше о шаре, мне надо встретиться с определёнными козлами, обладающими нужными знаниями. Он дал мне список с шестью странными именами, уточняя, что только они смогут ответить на его вопросы. Придётся найти способ связаться с ними и договориться о встрече. Я настроен решительно. Загадка кристального шара должна быть решена."
 some_secrets_are.137.a: "..."

 some_secrets_are.129.t: "Обратно домой"
 some_secrets_are.129.d: "Дорогой дневник,\n\nКак же хорошо вернуться в Кантерлот. Однако мне некогда было расслабляться, поскольку у меня ещё презентация на носу. Многие уважаемые пони собрались, чтобы выслушать мой рассказ о находке в пустыне Зебхара. Даже принцесса Твайлайт Спаркл посетила это собрание! Но мне удалось не поддаться волнению. Мой рассказ о находках был спокоен, как и демонстрация фотографий с места раскопок руин и презентация теорий об их истории. Аудитория была довольна и наградила меня громкими аплодисментами, что очень мне польстило.\n\nВпрочем, о кристальном шаре и вещах, о которых рассказал мой гид-осёл, так никто и не узнал. У меня появилось ощущение, что этой информации... ещё недостаточно, чтобы быть опубликованной. Всё, что у меня есть, – это разрозненные записи, которых явно недостаточно, чтобы сформировать полноценную картину. И это раздражало меня. Таким образом, мне ничего не оставалось, кроме как вновь отправиться в путешествие, дабы встретиться с теми самыми козлами, которые, похоже, могут рассказать больше об этом кристальном шаре. Я не могу спать спокойно, пока эта тайна не раскрыта. Мне нужно отыскать правду. Это моя обязанность.\n\nПосле недолгих раздумий мой выбор пал на..."
 some_secrets_are.129.a: "...Оскара в Катерине."
 some_secrets_are.129.b: "...Абрама в Йаки-Клане."
 some_secrets_are.129.c: "...Рэйчел в Центральнозебриканской Империи."

 some_secrets_are.47.t: "Сбившись со следа"
 some_secrets_are.47.d: "Дорогой дневник,\n\nК сожалению, у меня не получилось найти одну из шести моих целей. Страна, в которой она находилась, была аннексирована другой нацией, а личностью, которую я ищу, пропала без следа. Без всех шести лиц у меня, скорее всего, не получится разгадать эту тайну. Но, тем не менее, я не сдамся, слишком много уже было сделано, чтобы так просто всё бросить. Это расследование продолжится, невзирая ни на что. У меня есть чувство, что мне по силам достигнуть успеха. Что это моя обязанность."
 some_secrets_are.47.a: "..."

 some_secrets_are.152.t: "Оккультист"
 some_secrets_are.152.d: "Дорогой дневник,\n\nСегодня моей остановкой стали тёмные земли Катерина, места, где живёт Оскар. Я не имею ни малейшего понятия, почему он решил жить в этих ужасных землях. Лес Шайсвальд ещё хуже, чем Вечнодикий, но, тем не менее, грифоны добровольно живут здесь, подвергаясь регулярным атакам магических монстров. Я восхищаюсь их храбростью... и жалею за глупость.\n\nЧтобы попасть в страну мне пришлось путешествовать вверх по течению реки Гриффкинг, а потом потратить ещё несколько часов в вагоне, чтобы добраться до столицы, поскольку город был перенесён подальше от реки несколько лет назад. По словам местных, это был приказ Безумной Принцессы, да и я мог видеть остатки брошенных зданий на берегах могучей реки. Странно, но это почему-то напомнило мне руины в Азире. По прибытии в [KAT.Capital.GetName] я начал спрашивать разных грифонов о том, слышали ли они об Оскаре. Никто не узнавал имени и не слышал ни о каких козах, и только одна священница смогла дать ответ. Она рассказала о том, где живёт Оскар и что он на самом деле оккультист, который даёт теологические советы местному духовенству, а также обладает обширными знаниями в области магических тайн. Мне было сложно поверить словам жрицы, как и тому, что козёл сможет мне дать хоть немного научно обоснованный совет. Но его имя было в списке, поэтому у меня не было другого выбора, кроме как довериться ему.\n\nОскара не интересовала встреча, пока не зашёл разговор о сфере. Он сразу же открыл мне дверь своего дома и объяснил, что был занят поеданием религиозной литературы, дабы впитать содержащиеся там знания. Мне лишь оставалось закатить глаза и рассказать о том, где мне удалось найти сферу и что рассказал мой гид. В ответ козёл подтвердил правдивость всего этого. Кристальный шар мог быть использован, но для этого потребуются все шестеро коз. Затем сфера дарует видение о настоящем ключе от гробницы. Если это правда, то шар сам по себе не может её открыть, но артефакт все ещё нужен, чтобы найти скрытый ключ. Оскар сказал, что рано или поздно лично приедет в Эквестрию, чтобы увидеть кристальный шар собственными глазами."
 some_secrets_are.152.a: "..."

 some_secrets_are.42.t: "Редактор"
 some_secrets_are.42.d: "Дорогой дневник,\n\nПутешествие в Йаки-Клан было сложным. Не только потому, что страна была крайне изолирована от внешнего мира, но и ещё из-за ужасного состояния дорог в горах, которые только ещё больше замерзали из-за местного климата. Мне даже пришлось нанять телохранителя из-за слухов о том, что яки как-то линчевали эквестрийцев.\n\nПусть местные и были неприветливы, но по прибытию в [JAK.Capital.GetName] мне удалось пересилить себя и походить вокруг поспрашивать об Абраме. Многие отказывались со мной даже говорить, но один молодой як, который заявил, что ненавидит нынешнюю власть и их политику изоляционизма, был рад рассказать мне о том, где я могу найти козла. Этот Абрам работал редактором новостей для правительства.\n\nОн был рад видеть меня, пусть и был занят... работой. Козёл в прямом смысле поедал новостные статьи, написанные сторонниками якякистанской политики. Официально он был редактором, но по факту просто живой машиной по уничтожению бумаги. Как только Абрам закончил свой... обед, мы обсудили мои находки. Он рассказал, что на самом деле эти руины далеко не открытие, поскольку все козы всегда знали о них. Другие расы не были в курсе о них, поскольку все упоминания были кропотливо удалены. Однако он отказался говорить почему. Впрочем, козёл рассказал, что эти руины были очень древними и сохранились только благодаря сухому жару пустыни. Абрам заявил, что этим руинам больше пяти тысяч лет, и пусть у меня были сомнения по поводу правдивости этих сведений, не удивлюсь, если это правда. Ещё он сказал, что хочет увидеть кристальный шар лично, дабы удостовериться, что я говорю правду. Похоже, работа редактором привила ему некоторую долю скептицизма."
 some_secrets_are.42.a: "..."

 some_secrets_are.3.t: "Гений"
 some_secrets_are.3.d: "Дорогой дневник,\n\nМне удалось вернуться в пустыню Зебхару. Однако моей точкой назначения был не Азир. Пока нет. Вместо этого моим пристанищем стала небольшая лодка, идущая вверх по Нейлу. Государство [CZR.GetNameDef] было моей целью, а точнее – его столица, [CZR.Capital.GetName]. Это была опасная затея: регион в последнее время был далеко не спокойным, но торговцы, чей путь совпадал с моим, наняли опытных охранников, так что путешествие обещало быть безопасным.\n\nКогда каноэ прибыло, купцы отправились на базар торговать с местными. Моей же целью была Рэйчел. Большая часть местного населения – зебры, которые никогда в жизни не видели пони, но, как мне кажется, некоторые из них должны были видеть коз. И, разумеется, после того как я нарисовал козу на песке, один из жителей указал мне направление.\n\nДом Рэйчел представлял собой самодельную мастерскую или лабораторию. Она явно была изобретательницей и обладала соответствующим складом ума. Это... довольно необычно, поскольку большинство коз, которых мне доводилось встречать, были откровенно туповаты. Как только она увидела меня, то тут же начала засыпать вопросами – кто я и что здесь делаю. В итоге мне пришлось многое о себе рассказать ещё до того, как разговор зашёл о руинах и кристальном шаре. И ни разу за весь диалог моя собеседница не проявила ни малейшего признака скуки.\n\nРэйчел сказала, что кто-то явно хотел, чтобы этот шар был найден именно мной. Это ценный артефакт, и его давно бы обнаружили и украли, если бы он пролежал в куче мусора столько веков. Расхитители гробниц буквально облазили всю пустыню Зебхару и до сих пор роются в руинах. Это было неожиданно, но если подумать, слова Рэйчел звучали логично. На мой вопрос о том, зачем кому-то подкидывать мне этот шар, она ответила, что «они» хотят помочь мне открыть гробницу, в которой содержится нечто ценное. Она не уточнила, кто такие эти «они» или какая именно гробница должна быть найдена, но Рэйчел тоже очень хотела узнать, что скрывается внутри. Поэтому она вызвалась помочь мне всем, чем сможет."
 some_secrets_are.3.a: "..."

 some_secrets_are.12.t: "Следующая остановка"
 some_secrets_are.12.d: "Дорогой дневник,\n\nПосле встречи с одним из козлов мне удалось столько всего узнать о загадке кристального шара. Но впереди было ещё столько всего неизведанного, поэтому мне надо решить, куда следует идти дальше. Каждое путешествие обходится мне в крупную сумму, но с крупным займом мои затраты не должны быть проблемой. Решение этой грандиозной загадки куда важнее мелочи вроде моих личных сбережений."

 some_secrets_are.153.a: "Рэнди в государстве [MIT.GetName]."
 some_secrets_are.153.b: "Джайлз в государстве [BUF.GetName]."
 some_secrets_are.153.c: "Гор в государстве [LMB.GetName]."

 some_secrets_are.1852.t: "Менеджер"
 some_secrets_are.1852.d: "Дорогой дневник,\n\nМоё путешествие на корабле подошло к концу по прибытию в Астерскую гавань, после чего начались поиски Рэнди. Я считаю, что это будет несложно, поскольку он работает на известного минотавра по имени Айрон Вилл. И, разумеется, поспрашивав о нём местных, мне удалось узнать его адрес. На нашей встрече он сначала подумал, что я покупатель, который заинтересован в его семинарах по увеличению самоуверенности, поэтому сказал, что отошёл от дел несколько лет назад. Мне пришлось объяснить свои намерения по встрече с Рэнди, из-за чего он сначала очень удивился, но потом всё же согласился организовать встречу. Козёл всё ещё работал в качестве помощника Айрон Вилла даже после его возвращения домой из Эквестрии. После моей просьбы дать нам поговорить наедине, минотавр покинул нас.\n\nПосле моего рассказа Рэнди позабавил факт, что я смог найти один из самых ценных артефактов козлиной расы. Он упомянул, что именно пони были ответственны за деградацию его расы, пусть козёл и не таил злобы за древние события. Рэнди полушутливо сказал, что теперь козлы нуждаются в пони, и мне выпала честь стать тем, кто искупит грехи моей расы в прошлом. Пусть он это и сказал с юмором, у меня создалось впечатление, что на самом деле подтекст этих слов был куда серьёзнее.\n\nКозёл согласился помочь мне, сказав, что смог сохранить достаточно денег, чтобы прибыть в Эквестрию, если это надо. Мне оставалось лишь поблагодарить его и надеяться, что Айрон Вилл не против заимствования его менеджера."
 some_secrets_are.1852.a: "..."

 some_secrets_are.997.t: "Шаман"
 some_secrets_are.997.d: "Дорогой дневник,\n\nКак же было прекрасно в кои-то веки путешествовать по Эквестрии, а не плавать по морям и сталкиваться с пограничным контролем множества стран. Моей точкой назначения был Тихий Запад, земли, где жили бизоны, всё ещё самоизолировавшиеся от всех вокруг, несмотря на попытки Эквестрии интегрировать их. И пусть между пони и бизонами было несколько конфликтов в прошлом, я понадеялся на их гостеприимство в отношении любопытного путника.\n\nРазумеется, пусть они и отнеслись ко мне скептически, бизоны всё же позволили мне войти в их поселение. На мой вопрос о том, слышал ли кто-то о Джайлзе, его узнали моментально. Он был шаманом-эзотериком и единственным козлом, о котором знали бизоны. Так как тот жил один в пустыне, мне пришлось продолжить своё путешествие дальше. К счастью, молодая бизониха помогла мне с дорогой, ведь она отлично знала местные тропы.\n\nШаман жил в одиночестве в палатке рядом с небольшим источником воды, пробивающимся среди сухих камней. Джайлз выскочил из своего жилища почти моментально, как только услышал наши шаги, и попытался атаковать, размахивая длинной палкой с неприкрытой угрозой. К моему облегчению, бизониха смогла угомонить его и сказать о моём желании с ним встретиться. Ввиду того, что мы были не одни, мне пришлось опустить в рассказе сведения о кристальном шаре. Из-за этого шаман был не особо заинтересован в разговоре, но, к счастью, вскоре бизонихе наскучило нас слушать, и она ушла посмотреть окрестности. Только тогда у меня появилась возможность рассказать об артефакте, после чего козёл моментально воспрял духом.\n\nОн начал что-то частить о давно минувших днях, когда его раса правила миром. Джайлз сказал, что руины, которые мне удалось найти, на самом деле являются §RТАМБЕЛОНОМ§!, древней столицей всего козьего рода. А ещё он рассказал о старом пророчестве: «Когда звёзды сойдутся в один день, город воспрянет и обретёт старую славу».\n\nРазумеется, это всё было абсолютной бессмыслицей, но Джайлз крайне желал увидеть шар глазами, поэтому мы договорились встретиться ещё раз."
 some_secrets_are.997.a: "..."

 some_secrets_are.5.t: "Жрец"
 some_secrets_are.5.d: "Дорогой дневник,\n\nПутешествие в Ламбет было сложным, поскольку эта земля окружена горами почти со всех сторон, а местные жители не очень дружелюбны к чужеземцам. Прибытие в [LMB.Capital.GetName] сегодня было настоящим облегчением, однако я решил не останавливаться на отдых и продолжить поиски Гора. Ламы и альпаки оказались достаточно высокомерными существами и не хотели со мной даже общаться. Некоторые из них даже плевали в меня с презрением! Но этого было недостаточно, чтобы поколебать мою уверенность, и вскоре мне удалось увидеть в храме существо, которое не принадлежало ни к одной из распространённых в Ламбете рас. Он был занят своей «проповедью», громко блея перед аудиторией, поэтому мне ничего не оставалось, кроме как терпеливо ждать. Когда я спросил, он ли Гор, козёл кивнул, сохраняя бесстрастное выражение лица и не выдавая никаких мыслей.\n\nМне пришлось продолжить говорить и объяснять, почему я здесь нахожусь. Но на лице моего собеседника всё ещё не было никаких эмоций. И только когда в разговоре зашла речь о кристальном шаре, он наконец улыбнулся. Козёл сказал, что с помощью этой сферы можно найти и сам Колокол. Похоже, шар был ключом к гробнице, о которой мне довелось услышать раньше. Она была утеряна целые тысячелетия назад, однако козлы всё равно каким-то образом знали, как её найти. Просто у них не было нужды это делать до сегодняшнего дня. Козёл сказал, что нам необходимо достать артефакт как можно быстрее, поскольку гробница может быть открыта только в определённый день. Мне пришлось сделать расчёты и перенести их на Эквестрийский календарь, и получилась дата – 9 сентября 1009 года.\n\nИз его речи мне удалось понять далеко не всё, да и Гор сам явно что-то скрывал. Но мы нужны были друг другу, поэтому всё же согласились сотрудничать. Только так главная тайна могла быть раскрыта."
 some_secrets_are.5.a: "..."

 some_secrets_are.23.t: "Виденье"
 some_secrets_are.23.d: "Шестеро коз собрались в комнате пони. Они представились друг другу, радуясь знакомству с другими представителями широко распространенной козьей диаспоры, в то время как археолог достал хорошо спрятанную сферу и положил на стол. Она была закрыта одеялом, поэтому шестеро замолчали и подошли ближе, желая увидеть долгожданное сокровище.\n\nВыдержав драматическую паузу, пони скинул покрывало. Компания коз ахнула в изумлении. Это было правдой, артефакт действительно был найден. И теперь пришло время его использовать. Шестеро встали вокруг сферы, после чего каждый положил своё копыто на неё и закрыл глаза. Вскоре они начали громко блеять. Пони в это время начал всерьёз волноваться, что кто-то из соседей услышит шум, поэтому необходимо было утихомирить компаньонов. Впрочем, те не слышали слов. По мере того, как их голоса разносились в комнате, в самой сфере будто сгущались тени, а также постепенно появлялся глаз. Горизонтальный и прямоугольный зрачок расширился и даровал видение - древний колокол, магически запечатанный в пещере на вершине очень высокой заснеженной горы. После этого видение пропало, а блеяние козлов закончилось.\n\nШестеро начали спорить об увиденном. В мире было очень много высоких горных вершин, так что колокол мог находиться где угодно среди них. Они так и не смогли решить этот вопрос, поэтому в итоге пони использовал свой интеллект и знания мира, чтобы определить точку, в которой им следует искать артефакт."
 some_secrets_are.23.a: "Соларспайк, в Грифонстоуне."
 some_secrets_are.23.b: "Гора Эверхуф, в Кристальной Империи."
 some_secrets_are.23.c: "Т’аги Хогер в Гаргилои."

 some_secrets_are.998.t: "Священная гора"
 some_secrets_are.998.d: "Шестеро вместе с спутником прибыли к Соларспайку, самому священному месту грифоньей веры. Пони сделал вывод, что колокол должен быть размещён на вершине горы, поскольку никому из смертных не разрешается подниматься на её вершину. И поэтому, ни одна душа не знает, что находится на покрытой туманом верхушке горы. Это прекрасное место для хранения очень важного артефакта.\n\nШестеро и один начали своё восхождение на гору, стараясь не привлекать внимание пилигримов-грифонов, которые также посещали это место. Это было достаточно сложно, поскольку только их раса посещала данное место. Пока компания взбиралась всё выше и выше по вырезанной в камне лестнице, они привлекали внимание множества посетителей, из-за чего огромное количество грифонов вскоре смотрело на них с любопытством. И поэтому, когда они достигли вершины лестницы, дальше которой ходу смертным не было, им пришлось ждать, когда же их оставят в покое. Некоторые грифоны задавали вопросы, но не получали уместных ответов, из-за чего их компания быстро начала вызывать . Пока грифоны отвлеклись на разговор, один из шести, Шаман, почувствовал нестерпимое желание продолжить путешествие, из-за чего перешёл запретную черту и начал прыгать по камням вверх к священному туману. К несчастью, один из грифонов увидел это и пришёл в ярость от такого осквернения священного места. Вскоре началась драка, во время которой Шамана стащили вниз летающие грифоны, после чего сбросили вниз со скал, из-за чего череп козла был расколот. Остальные побежали обратно вниз по лестнице, спасая свои жизни.\n\nСо смертью этого персонажа нить вашей судьбы обрывается."
 some_secrets_are.998.a: "..."

 some_secrets_are.666.t: "Лес"
 some_secrets_are.666.d: "Гора Эверхуф была одной из самых больших гор во всём мире, и располагалась она недалеко от Эквестрии. Именно поэтому пони сделал вывод, что это было самым логичным местом, где мог быть спрятан колокол. Попасть туда было достаточно сложно, поскольку гора находилась в отдалении от всех поселений и к тому же окружена кишащим офиотаврами сосновым лесом. К счастью, шестеро и один потратили целое состояние на снаряжение для альпинизма, а также некоторое число оружия. Им нужны были любые инструменты, которые они могли бы раздобыть, чтобы найти утерянный артефакт.\n\nОтряд проехал на поезде так далеко на север, как смог, после чего компания продолжила поход на своих собственных копытах. Всё это время они могли видеть гору Эверхуф на горизонте, и она медленно, но верно росла в размерах по мере их путешествия. Однако вместе с этим становилось всё меньше признаков цивилизации, пока они и вовсе не закончились на входе в дикий лес у подножья горы. Когда солнце начало клониться к закату, им пришлось разбить лагерь. Пони сильно нервничал, ожидая, что их атакуют дикие звери, но козлы сохраняли странное спокойствие.\n\nПосле нескольких часов в беззвучной темноте он наконец забылся беспокойным сном, который легко был нарушен звуком ломающейся ветки. Пони осторожно выглянул из палатки, но ничего не увидел.\n\nИ в этот момент острые рога офиотавра разорвали ткань укрытия на части. Это было огромное чудовище - наполовину змей, наполовину бык - и оно явно было не радо незваным гостям в его лесу. Козлы вскочили, когда пони в ужасе пробежал мимо них сломя голову. Шестерым пришлось быстро думать, как избавиться от неожиданной угрозы."
 some_secrets_are.666.a: "Дать отпор, это шестеро на одного!"
 some_secrets_are.666.b: "Издать подобие брачного зова офиотавра!"
 some_secrets_are.666.c: "Отогнать зверя огнём!"
 some_secrets_are.666.e: "Бежать и прятаться в лесах!"

 some_secrets_are.15.t: "Страж"
 some_secrets_are.15.d: "После ночлега в лесу, защитив свой лагерь от дикого офиотавра, группа прибыла к подножию горы. Там их остановил престарелый пони по имени Расти Бакет. Он посоветовал им не забираться на опасный Эверхуф. На нём были поношенные одеяния с заплатками и, что не странно, ржавое ведро на голове. Шестёрка убедила его, что их раса приспособлена к скалолазанию, и то что они спокойно на него заберутся, но стражник сказал, что пони они с собой не возьмут. Шестёрка настояла на том, что он им нужен, но страж настоял на своём.\n\nВ пони виднелась странная решимость не пускать никого на гору. Похоже, диалог с ним вести не получится, будто ему поручили охранять Эверхуф от нарушителей... или существ, ищущих колокол.\n\nПока страж переосмысливал смысл всего путешествия, козы обсуждали, как поступить с этим престарелым охранником."
 some_secrets_are.15.a: "Пройдём мимо него, когда уснёт."
 some_secrets_are.15.b: "Похороним его под лавиной."
 some_secrets_are.15.c: "Пригрозим расправой."
 some_secrets_are.15.e: "Спросить про колокол."

 some_secrets_are.150.t: "Сказка на ночь"
 some_secrets_are.150.d: "— Папа, а почитаешь про Гасти? — спросила кобылка, уютно укутавшись в тёплое одеяло.\n\nОтец ласково улыбнулся:\n— Конечно, милая. Помнишь, на чём мы остановились?\n\nОна взволнованно закивала:\n— Там сейчас такое крутое будет!\n\nОтец тихонько рассмеялся, взял книгу и раскрыл её на нужной странице:\n— Это уж точно. Будем надеяться, что Гасти и её друзья в конце концов победят, — он откашлялся и принялся читать, а глаза дочурки заблестели от предвкушения. — «И хотя ещё нипони не пытался добраться до Клаудсдейла на своих копытах, Гасти Великую это не остановило! Она и её воины-единороги двинулись вверх по склону. Но вдруг на их пути вырос...»\n\n— Кто?! Кто там был?!\n\n— Это был коварный §AА§!§OО§!§RР§!§GГГ§!§RР§!...\n\nМалышка испуганно ахнула.\n\n— ...и Гасти сразу поняла, что Он готов к жестокой битве. Она воззвала к своим воинам: «Мы одолеем §AА§!§OО§!§RР§!§GГГ§!§RР§!, если сплотим наши силы!» И тогда единороги устремили в облака волшебные лучи, магия их сплелась воедино. Тот луч, что был сильнее тысячи армий, хлынул с облаков слепящим светом!\n\n— Ха-ха, теперь этому глупому злому козлу несдобровать!\n\n— Свет опутал §AА§!§OО§!§RР§!§GГГ§!§RР§! и повалил Его наземь! «Не дайте Ему уйти!» — закричала Гасти.\n\nКобылка опять затаила дыхание:\n— Ой-ёй!\n\n— Но §AА§!§OО§!§RР§!§GГГ§!§RР§! был пугающе силён, ибо чужой страх питал Его мощью, и Он сумел разорвать эти путы!\n\n— Э-это слишком страшно! И я н-не хочу давать Ему силу!\n\n— Тсс, успокойся, родная, — утешил  её отец. — Это всего лишь сказка. На самом деле §AА§!§OО§!§RР§!§GГГ§!§RР§! не существует.\n\n— Очень надеюсь!\n\nОн закрыл книгу и нежно прикоснулся губами к её лбу:\n— Завтра дочитаем, хорошо?\n\n— Я даже не знаю, хочу ли...\n\n— Ну, тогда выберем другую сказку, не такую пугающую.\n\nМалышка согласно кивнула.\n\n— Вот и ладно, засыпай. Пускай тебе приснятся зайчики и цветы.\n\n— Спокойной ночи, пап..."
 some_secrets_are.150.a: "Эту сказку они так никогда и не дочитали."

 some_secrets_are.283.t: "Гора"
 some_secrets_are.283.d: "Расти Бакет больше не представлял угрозы, пусть пони-археологу и было его жаль. Взбираясь по огромным кучам снега, все они могли с лёгкостью добраться до начала горы и начать восхождение. Как шестеро и говорили, у них не было никаких проблем со скалолазанием, но Абраму пришлось нести пони на себе. Ветра здесь были сильны, но они держались и работали вместе, дабы никто не сорвался со скал. Потребовалось много часов, но в конце концов они достигли вершины, и только ради того, чтобы обнаружить широкую продуваемую всеми ветрами пропасть. С другой стороны находилась ещё одна заснеженная вершина, в которой виднелась замёрзшая тропа к пещере.\n\nШестеро и один начали спорить как им пересечь препятствие. Ветра были сильными, а расстояние большим. В конце концов, именно пони предложил решение."
 some_secrets_are.283.a: "Спуститесь в пропасть, затем поднимитесь на другую сторону."
 some_secrets_are.283.b: "Найдите способ обойти пропасть."
 some_secrets_are.283.c: "Просто перепрыгните через нее."
 some_secrets_are.283.e: "Телекинезом завяжите верёвку поперек пропасти."

 some_secrets_are.6.t: "Пещера"
 some_secrets_are.6.d: "Пока они пытались пересечь глубокую пропасть, ветер дул с такой силой, что пони едва не сбросило вниз, и только Оскар успел спасти попутчика. Постепенно все семеро прошли препятствие безопасно. По другую сторону пропасти они держались извилистой тропинки, пока наконец не добрались до магически запечатанной пещеры, в которой виднелся колокол. Шестеро повернулись к пони и наконец раскрыли его истинное предназначение. Печать могла быть открыта только единорогом. Всё что требовалось - сделать небольшую дырку в силовом поле с помощью магии, тогда Рэйчел сможет использовать телескопический захват, чтобы ухватиться за колокол.\n\nИ всё же в конце пути пони одолевали сомнения."
 some_secrets_are.6.a: "У меня нет другого выбора кроме как согласиться это сделать."
 some_secrets_are.6.b: "Забудьте. Я передумал это делать."

 good_ending.15.t: "Обратно домой"
 good_ending.15.d: "Дорогой дневник,\n\nЭто было нелёгкое приключение, во время которого моя жизнь не раз висела на волоске. Именно поэтому возвращение в безопасный Кантерлот оказалось особенно приятным. Конечно, теперь он не столь безопасен, как прежде: козы всерьёз злы на меня за отказ помочь им вернуть колокол. И дело было вовсе не в моей злой воле, а в том, что это очень опасно. Колокол охранялся и был запечатан так тщательно вовсе не случайно. Что бы ни скрывалось в гробнице в Азире, оно было заключено там не без основания. Однако мои доводы не убедили шестерых, и они отказались меня слушать, вынудив бежать. Не обошлось без пары ушибов, но с помощью Расти Бакет мы сумели оторваться от погони козлов.\n\nУ меня всё ещё оставался тот самый кристальный шар, хотя он больше и не был нужен. Я решил оставить эту тайну в покое и сделать её достоянием общества. Но я не могу избавиться от ощущения, будто сфера наблюдает за мной. Пожалуй, лучше уничтожить её раз и навсегда. Так никто никогда не найдёт запретный колокол."
 good_ending.15.a: "Некоторые секреты должны остаться нераскрытыми."


 best_left_hidden.9.t: "Колокол звонит"
 best_left_hidden.9.d: "Пони нерешительно кивнул, после чего его рог начал светиться. Однако ничего не произошло. Тогда жеребец осознал, что дело будет сложнее, чем казалось на первый взгляд. Он начал прилагать больше усилий, и свечение стало ярче. Но всё ещё ничего не происходило. Объёмы энергии, которые пони вкладывал в заклинание, начали увеличиваться до тех пор, пока он не начал вливать почти всю свою магическую силу. Только тогда на ткани пространства проявилась миниатюрная дыра, чьё появление сопровождалось жутким неестественным визгом. Увидев это, Рэйчел сразу же засунула внутрь разрыва телескопический захват, выдвигая его на полную длину. Размера устройства едва хватило, чтобы ухватиться за ручку колокола. Кобыла потянула его назад, но ширины разлома в пространстве не хватало, чтобы вытащить артефакт, поэтому она крикнула напарнику удвоить усилия.\n\nОднако тот был уже на пределе своих возможностей. Ну, или, по крайней мере, пони так думал. В его голове уже звенели колокола от перенапряжения, а из рога сыпались искры во все стороны. Но был необходим последний рывок, и он обязан его сделать.\n\nЖеребец закричал и вложил все свои возможные силы в последний поток магии. Дыра в пространстве ещё чуть-чуть расширилась, как раз чтобы колокол проскользнул сквозь неё. Рэйчел вытащила его, после чего разрыв моментально схлопнулся, а её напарник рухнул на землю без сознания."
 best_left_hidden.9.a: "..."


 
 best_left_hidden.999.t: "Ритуал"
 best_left_hidden.999.d: "После произошедшего пони на долгие дни лишился всяких сил. Их едва хватало, чтобы сохранять проблески сознания, так что козлам пришлось нести своего компаньона на собственных плечах. У единорога остались лишь обрывочные воспоминания о первых днях в таком состоянии. Спуск с горы и крики собственной агонии. Подъём и закат солнца и луны. Танец звёзд в небе. Поезд, корабль, караван. Жар и холод. Темнота и свет. Всё смешалось воедино в разуме, превращаясь в тусклую темноту и мрачный оранжевый свет. И наблюдающий Глаз.\n\nИ вновь те самые руины. Они появились так же внезапно, как и осознание, что козлы вновь вернулись туда. По крайней мере, это объясняло, откуда было ощущение жара. Это было так давно, но, тем не менее, пони не составило труда узнать монолиты из тёмного камня, которые сейчас казались особенно зловещими и ужасающими. Пони несли глубоко внутрь руин в одну знакомую комнату.\n\n— Гробница – это ложь, — вспомнился знакомый гид-осёл и его слова. — Тот, кто никогда не умирал, не нуждается в гробнице. Нет, на самом деле это алтарь.\n\nВсё вновь погрузилось в темноту после захода солнца. — Звёзды почти встали на свои места! — прокричал Джайлз. — Начинаем подготовку ритуала!\n\nКолокол прозвенел. Тело пони было помещено на плиту. Оккультист вознёс кривой нож. Комнату наполнило блеяние. Колокол прозвенел. Нож вошёл в грудь пони, не способного даже закричать. Кровь хлынула на камни, когда сердце было вырезано. Колокол прозвенел. Оккультист поглотил сердце. Колокол прозвенел. Звёзды сошлись. Глаз наблюдал.\n\nРуины начали плыть и меняться. Дюны начали исчезать. Давно рухнувшие колонны вновь поднимались. Обрушившиеся крыши начали восстанавливаться. §RТАМБЕЛОН§! вернулся в мир после своего долгого изгнания. Отец улыбнулся, когда Его верные последователи пали ниц перед Его присутствием и преподнесли Ему Чарующий Колокол."
 best_left_hidden.999.a: "Колокол звонит по всем нам."
 best_left_hidden.999.b: "Ты ведь грязный читер, да? Брысь отсюда."

 tidings.99.t: "Возвращение Тамбелона"
 tidings.99.d: "[This.GetNewspaperHeader]Странные новости приходят из пустыни Зебхара. Широко распространяются слухи о буквальном возникновении из воздуха великого города, после чего все маршруты караванов были перекрыты. Местные зебры-кочевники массово бегут из региона, тараторя о возвращении «древнего зла». Все беженцы находятся в состоянии шока и повторяют одно-единственное слово вновь и вновь:\n\n§RТАМБЕЛОН.§!"
 tidings.99.a: "Колокол звонит по всем нам."

 ### Focus events
 tarrin.47.t: "Верная шестёрка"
 tarrin.47.d: "Грогар стоял на балконе самой большой башни Тамбелона и наблюдал за Своими владениями. Яркий солнечный свет озарял знойные пески пустыни Зебхары. Он помнил, как эти земли когда-то были зелёными и плодоносными. Теперь же это была мёртвая пустошь. Возможно, однажды здесь вновь распустятся цветы.\n\n"Господин," — послышался голос позади Него, на что Грогар обернулся. Это был Брэй, осёл, который подготовил основной ритуал и являлся Его самым верным последователем. — "Шестеро коз, которые способствовали вашему возвращению, желают аудиенции." Грогар кивнул, после чего его помощник поклонился и покинул помещение. Вскоре шестеро героев вышли на балкон и преклонили колени перед Ним. Он уже знал их имена: Гор, Рэнди, Оскар, Джайлз, Абрам и Рэйчел.\n"Встаньте," — приказал Он, после чего козлы послушались. — "Вы показали себя достаточно компетентными и смышлёными. Поэтому вы станете моими советниками. Вашей первой задачей будет рассказать обо всём, что случилось с миром, пока Я отсутствовал."\n"Мир пришёл в упадок," — сказала Рэйчел. — "Низшие расы не смогли найти единства и ссорятся между собой. Некоторые ваши монстры до сих пор бродят по различным землям, и никто так и не смог их истребить. Эти дураки помешались на технологиях вместо магии."\n"Так ты тоже," — подал голос Рэнди, проблеяв со смешком.\n"Молчать!" — Скомандовал Грогар. — "Если мы собираемся восстановить власть над миром, мы должны быть лучше, чем все варвары вокруг. Я не потерплю внутренних склок или возни с бесполезными гаджетами. Всем это ясно?"\n"Н-но повелитель," — возразила Рэйчел, — "Я ведь смогла вернуть колокол с помощью моего телеско..."\n"Тихо! Тебе больше не нужна помощь технологий. Пришло время козам вновь стать мастерами магии.""
 tarrin.47.a: "Нам предстоит много работы."
 
 you_did_this.6.t: "Тревожные новости"
 you_did_this.6.d: "Принцесса Твайлайт Спаркл потягивала свой утренний кофе, пока читала новости. Она нахмурилась, когда увидела статью о пропаже без вести знаменитого археолога. Это имя было знакомо ей, поскольку принцесса сама лично посетила презентацию о мистических руинах в Азире. Семья пони слёзно молила о хоть какой-то информации о местонахождении археолога. Твайлайт сочувствовала им и надеялась, что пони найдётся вскоре живым и невредимым.\n\nИ пока пустыня Азира всё ещё была свежей в её памяти, она заметила ещё одну маленькую заметку о ней. В ней была короткая сводка странных слухов, которые приходят из этого региона, впрочем, без каких-либо подтверждений. Но по странному стечению обстоятельств эти слухи появились одновременно с пропажей археолога. Могла ли быть между этими событиями связь?\n\nИли возможно, принцессу просто снедает паранойя. Но отчасти ей хотелось изучить всё это подробнее. Во всяком случае, Твайлайт так или иначе хотела помочь семье археолога."
 you_did_this.6.a: "Может быть, это часть чего-то большего?"
 
 you_did_this.7.t: "Расследование"
 you_did_this.7.d: ""Не волнуйся, дорогуша, детектив Рарити сможет легко раскрыть эту загадку!"\nТвайлайт нахмурилась. — "А этот костюм действительно необходим?"\n"Ну конечно же!" — ответила единорог, одетая в чёрный плащ и фетровую шляпу. — "Я должна полностью проецировать на себя образ Шэдоу Спейдс, дабы войти в роль детектива."\nПринцесса лишь закатила глаза. — "Как скажешь." После этого она повернулась к двери в апартаменты археолога и открыла её ключом, который предоставила семья пони. Твайлайт с подругой зашли внутрь и осмотрелись. — "Хмм, всё выглядит как обычно," — пробормотала аликорн себе под нос.\nРарити начала внимательно осматриваться, прищурив глаза и пристально разглядывая мебель. — "Это всё потому, что ты не смотришь на вещи, как детектив. Ага!" — Её рог засветился, после чего она подняла телекинезом прядь белых волос. — "Судя по твоему описанию, у пропавшего пони не было белого хвоста, шерсти или гривы, но тем не менее, я нашла это!"\n"Это... хм, странно. Но всё ещё ничего не доказывает. Продолжай поиск, наверное."\n"Ну конечно, больше улик - проще дело!"\nПосле этого они осмотрели стол археолога. В нём были записи о различных предыдущих экспедициях, однако ничего об Азире. "Странно," — сказала Твайлайт. — "Я думаю, что части бумаг здесь нет, они куда-то пропали."\n"Ай-яй! Говорю же, думай как детектив. А что если здесь есть потайное отделение?"\n"...Зачем этому пони прятать записи о своих открытиях?"\nРарити подошла к столу поближе и постучала копытом по дереву, вслушиваясь в звук. — "Тише, я пытаюсь расслышать пустоту внутри." После нескольких попыток её глаза неожиданно расширились, а сама единорог начала тереть поверхность стола в поисках шва. Как только она нашла его, то использовала магию, чтобы потянуть крышку, под которой оказались скрытые записки и дневник. — "А вот и они!"\nПринцесса была ошеломлена, когда подруга отдала ей эти вещи. — "Ты действительно нашла их! И они все о последнем путешествии в Азир!" Она быстро пролистала все страницы и даже нашла несколько зарисовок. Одна из них изображала чёрную, выточенную из кристалла сферу."
 you_did_this.7.a: "Похоже, мы нашли кое-что важное..."

 you_did_this.8.t: "Пропавший козёл"
 you_did_this.8.d: "После тщательного обследования кабинета археолога Твайлайт и Рарити начали опрос соседей. Обе пони спрашивали о том, когда последний раз его видели, и раз за разом получали интересную деталь: странный звук, похожий на блеяние множества коз, который доносился из квартиры. Это был достаточно загадочный факт, но когда Принцесса изучила белый клок волос, который нашла подруга, то сделала вывод, что тот действительно принадлежал козлу. Произошло что-то поистине странное в этом кабинете.\n\nИх было немного, да и жили козлы действительно далеко друг от друга, но Основная Шестёрка их всё же видела. Например, Флаттершай однажды познакомилась с тренером по курсам самоутверждения по имени Айрон Вилл, который нанял в помощники нескольких козлов. Из-за его хоть каких-то связей с этой неуловимой расой Твайлайт решила отправить телеграмму в Астерион с просьбой предоставить какую-нибудь информацию, если он ей располагает.\n\nИ как выяснилось, минотавр действительно смог помочь.\n\nОтвет пришёл достаточно быстро. Один из самых важных помощников Айрон Вилла, а именно Рэнди Козлик-ведущий, тоже пропал без вести после посещения некоего пони археолога. И пусть минотавр не знал, что с ним случилось, тем не менее, он вспомнил, что его менеджер собирался в гости к археологу в Эквестрию. И это отчётливо доказывает, что именно козёл был в этой квартире. Но зачем? Почему козы были заинтересованы в каких-то руинах в пустыне, которые недавно были найдены?\n\nТвайлайт поняла, что существует только один способ это выяснить. Ей нужно лично посетить руины и раскрыть эту тайну с помощью своих друзей."
 you_did_this.8.a: "Мы докопаемся до правды!"
 
 you_did_this.9.t: "Экспедиция в пустыню"
 you_did_this.9.d: ""Я начинаю жалеть о том, что пошла с тобой, Твай," — пробормотала Рэйнбоу Дэш, вытирая пот со лба.\n"Ну, я же предупреждала тебя!" — ответила Принцесса. — "К тому же, мы подготовились намного лучше, чем в прошлое наше путешествие по пустыне."\n"Ну-ну, как скажешь!" — Сказала Пинки, сделав глоток из комично огромной фляжки.\n"Поосторожнее с этой штукой, нам надо ещё оставить на дорогу назад," — отозвалась Эпплджек.\n"Сколько нам ещё идти?" — спросила Рарити, шагая под тенью зонтика, который держала Флаттершай.\nТвайлайт посмотрела на карту и компас. — "Мы почти на месте! Если, конечно, мои расчёты верны. А они обычно всегда правдивы!"\n"Похоже, ты права," — сказала Рэйнбоу, после чего указала на силуэт вдалеке. — "Кто-то приближается!"\n\nШестеро пони присмотрелись, после чего распознали огромное существо, которое очень быстро сокращало дистанцию между ними. И это явно был не мираж.\n"Эмм... это не похоже на разумное создание." — сказала Флаттершай.\nЭпплджек прищурила свои глаза. — "Это ещё что такое? Мне не нравится, как выглядит эта штука."\n\nКак только существо достаточно приблизилось, оно расправило свои крылья и взмыло вверх. Ненадолго закрыв солнце собой, оно вскоре начало стремительно лететь прямо к пони.\n"Ну, это кажется... это мантикора!" — Воскликнула Твайлайт и за секунду до того, как зверь упал прямо на них, она создала между ними магический щит. Мантикора с силой ударилась прямо о него, после чего моментально начала пытаться поцарапать когтями, при этом свирепо рыча."
 you_did_this.9.a: "..."
 
 you_did_this.10.t: "Мантикора"
 you_did_this.10.d: "Спустя пару секунд шестеро оправились от первоначального шока. "Что мантикора делает здесь, в Зебхаре?!" — Спросила Рарити, заметно дрожа.\n"Я-я... не знаю! И я не могу держать этот щит вечно!" — ответила Твайлайт.\n"Она выглядит очень злой!" — Заметила Флаттершай. — "Мне надо успокоить зверя!"\n"...Ты уверена, что это хорошая идея?" — Спросила Рэйнбоу. — "А что если я просто..."\n"Пони, отойдите. Твайлайт, опусти щит!" — Приказала Флаттершай. Остальные послушались её, хотя и несколько поколебавшись. — "А теперь, мистер мантикора, я..."\nСоздание моментально подняло свои когти, но пони была спасена из под удара благодаря Дэш. — "П-погодите, почему она не послушалась меня?" — Спросила жёлтая пони, выглядя крайне ошеломлённой. — "Может быть, она не в настроении болтать," — ответила Рэйнбоу. — "Эйджей, ты знаешь, что надо сделать!"\nЭпплджек кивнула, после чего достала винтовку. — "Хорошо, что мы в этот раз подготовились, правда?" — Как только зверь вновь приблизился к ним, она зарядила оружие, прицелилась и выстрелила.\n\nМантикора была застигнула врасплох вспышкой света, после чего скорчила гримасу, а затем обмякла и рухнула на песок. Дэш закрыла глаза Флаттершай. Воцарилась оглушающая тишина.\n\nОна была нарушена Пинки. — "Вау, отличный выстрел!"\n"Хех, спасибо. Я тренировалась," — сказала Эпплджек, после чего убрала винтовку обратно на спину. Затем она повернулась к двум пегасам. — "Рэйнбоу, скажи уже ей, что я использовала магический электрошокер."\n"Думаешь это поможет?" — Спросила та с сарказмом.\nФлаттершай почти рыдала. — "Я... я не понимаю, почему оно не..."\nТвайлайт внимательно изучила бессознательное существо. — "Что-то здесь не так. Мантикор никогда не видели в пустынях."\n"Кхм кхм... а что по поводу этих существ?" — Спросила Рарити, указав на горизонт.\n\nДесятки зверей приближались, поднимая поистине песчаный шторм своими лапами, когтями и крыльями. Это было жуткое зрелище, поэтому глаза всех пони расширились, когда они увидели это. Твайлайт громко сглотнула. — "Похоже, девочки, обратно домой мы отправимся рано. И бегом!""
 you_did_this.10.a: "..."
 
 you_did_this.11.t: "Неудача"
 you_did_this.11.d: "Во время пути назад Элементы Гармонии особо не разговаривали между собой. Рэйнбоу Дэш была особенно расстроена тем фактом, что им пришлось сдаться и вернуться домой. Она искренне верила, что сможет в одиночку победить всех монстров. Вот только горькая правда заключалась в том, что даже вся их компания вряд ли способна что-то найти в бескрайней пустыне. По крайней мере, они выяснили, что с Зебхарой происходит нечто странное. Обычно эта земля была лишена какой-либо жизни, а теперь буквально кишела всеми видами чудовищ, словно Вечнодикий Лес. Но если пони хотели выяснить, что там происходит, им необходимо было вернуться домой и разработать новый план.\n\nТвайлайт уже была этим занята ещё во время дороги в Эквестрию. Буквально перед тем, как их корабль причалил в Балтимейре, её глаза засветились, и она воскликнула: «Эврика!». Принцесса быстро объяснила свою идею подругам. Поскольку путешествие по земле было трудным и крайне опасным, военный самолёт виделся наилучшим выходом. Лететь на нём было безопаснее, чем на собственных крыльях, а ещё этот борт был вооружён на случай встречи с летающими монстрами вроде мантикор. Крылатая машина сможет проникнуть прямо в сердце пустыни, обнаружить источник угрозы и сделать фотографии, если возникнет необходимость. Большинство пони, кроме Рэйнбоу Дэш, бахвалявшейся, что она легко может и сама туда долететь, назвали эту идею хорошей. Впрочем, Твайлайт лишь ответила: «Конечно, ты сможешь», после чего начала составлять письмо в ВВС Эквестрии."
 you_did_this.11.a: "..."
 
 you_did_this.19.t: "Видимое доказательство"
 you_did_this.19.d: "Твайлайт Спаркл находилась в библиотеке внутри своего кристального замка, с одержимым видом проводя исследования о монстрах, козлах и пустыне Зебхаре. Медленно, но верно кусочки пазла начинали вставать на свои места. Однако чего-то всё ещё не хватало.\n\nОна невольно подскочила, когда об окно рядом с ней что-то с силой ударилось. Выскочив из-за стола, принцесса побежала к стеклу посмотреть, не прилетела ли какая птица случайно, однако обнаружила на балконе лежавшую на спину серую пегаску в почтовой форме, у которой глаза смотрели в разные стороны. Рог Твайлайт засветился, после чего окно открылось, а посетительница поднялась и привела себя в порядок.\n"Срочное письмо от ВВС Эквестрии!" — сказала та, неуклюже отдав честь и передав письмо.\n"О! Эмм, спасибо, Дерпи. Ты не слишком сильно ударилась головой?"\nПегаска, в свою очередь, с недоумением склонила голову. — "Я что сделала?"\n"...Ничего, забудь." Твайлайт быстро открыла конверт, левитируя оттуда несколько бумаг и множество фотографий. Похоже, разведывательная миссия в Зебхаре увенчалась успехом. Она смотрела одну фотографию за другой, и на большинстве из них были песчаные дюны... как вдруг принцесса невольно вскрикнула. На одной из нескольких фотографий было изображение великого города с огромными зубчатыми стенами и могущественными укреплениями... Чёрные и монументальные горы из железа, стальные врата, башни из адаманта...\nДерпи уже расправляла свои крылья, чтобы взлететь, как была прервана. "Погоди!" — крикнула Твайлайт. — "Можешь, пожалуйста, отправить письмо... а знаешь, забудь. У меня же это может сделать Спайк. Извини, давно не пользовалась этой его способностью!"\n"...А?""
 you_did_this.19.a: "Я должна немедленно уведомить Селестию."
 
 you_did_this.23.t: "Опасная затея"
 you_did_this.23.d: ""Каким-то образом Грогар вернулся в наш мир," — сказала Твайлайт.\n\n"...Грогар?" — Принцесса Селестия спросила, нахмурившись. — "Но он же был изгнан в Измерение Тьмы тысячи лет назад Великой Гасти. Я даже не была уверена в том, что эта история реальна. В ней всегда было что-то... мифическое."\n"Да, и в наши дни это всего лишь сказка для жеребят. Но я провела собственное исследование. Всё указывает на то, что изгнание было прервано. Только это может объяснить хаос, который объял Зебрику!"\n"Не возмущайся, конечно я верю тебе, моя верная ученица. У тебя уже есть какие-нибудь планы на этот случай?"\n"Я... ну, помнишь о том, как я когда-то сражалась с Тиреком, и ты с остальными принцессами передали мне собственную магию?"\n"Может быть, я стара, но память у меня ещё вполне неплохая," — сказала Селестия со смешком.\n"В общем, нам стоит поступить так же. Вместе с остальными Элементами Гармонии у нас хватит магических сил, чтобы победить Грогара."\n"Почему бы нам просто не сразиться всем вместе против него?"\n"Потому... потому что это слишком опасно!" — Воскликнула Твайлайт. — "Я знаю, что мои друзья всегда будут со мной, невзирая ни на что. Но если что-то пойдёт не так, Эквестрии всё ещё нужны лидеры."\nСелестия тяжело вздохнула. — "Я понимаю тебя. Может быть, военные силы страны тебе как-то смогут помочь?"\n"Хмм, нам бы пригодился самолёт, чтобы быстрее добраться до нужного места. В остальном, история Великой Гасти говорит о том, что обычное оружие бессильно против Грогара. Единственный способ победить его, это ударить прямиком по источнику его могущества."\nПринцесса слабо улыбнулась. — "Я верю тебе, Твайлайт. Ты сможешь спасти Эквестрию в очередной раз. Как всегда."\nЭто было трудно, но аликорн смогла сохранить самообладание и улыбнуться в ответ. — "Д-да, спасибо, Селестия. Спасибо за всё.""
 you_did_this.23.a: "Очередной злодей, которого нужно победить."
 
 you_did_this.24.t: "Проникновение"
 you_did_this.24.d: "После яркой вспышки света шестеро пони и молодой дракон появились внутри пустой комнаты. Быстро оправившись от последствий телепортации, они осмотрелись.\n"Вау, я даже и не думала, что это сработает!" — Воскликнула Рэйнбоу Дэш.\n"Тихо!" — Ответила Эпплджек. — "Мы даже не знаем где оказались!"\nТвайлайт тяжело вздохнула. — "Мне пришлось много тренироваться. Даже с мощью четырёх аликорнов было крайне тяжело телепортировать нас всех сюда. К счастью, мы оказались где-то в безопасности."\nСпайк выглянул в ближайшее окно и уставился на гигантскую башню из камня. — "Было бы лучше, если бы ты телепортировала нас прямиком туда. Бьюсь об заклад, именно там прячется Грогар."\n"А как он выглядит?" — Спросила Флаттершай. — "Я думала он баран, а не козёл. Так было написано в сказке..."\nТвайлайт ответила, пока шла к двери в следующую комнату. — "Согласно историям, Грогар не просто обычный козёл или овца. Он синего окраса, высокий, с огромными рогами, а также обладает светящимися красными глазами. И на шее он носит Чарующий Колокол, который нам надо отобрать."\n"Просто удержи его магией, а мы жахнем радугой!" — Предложила Пинки.\n"Я... очень надеюсь, что всё будет так просто," — сказала Твайлайт, после чего осторожно открыла дверь.\n\nОна увидела огромный обеденный зал, в котором сидели сотни странных свиноподобных существ. Все они разом перестали есть, повернувшись к ней. И у многих рядом лежало оружие.\n\nПринцесса с силой быстро захлопнула дверь."
 you_did_this.24.a: ""Похоже, мы снова телепортируемся!""
 
 you_did_this.26.t: "Узник"
 you_did_this.26.d: "Одинокий троггл шёл по улицам Тамбелона, озираясь по сторонам. Когда он проходил мимо тёмного переулка, неожиданно оттуда послышался странный грохочущий звук. Забежав туда проверить его, троггл был схвачен летающим существом, которое утянуло пленника на крышу. Там, в свою очередь, он был окружён шестью цветными пони и маленьким драконом.\n"Ты попал прямиком в нашу ловушку!" — Заявила Рэйнбоу Дэш. — "Даже не пытайся сопротивляться нам, а иначе...!"\n"О, погоди погоди, Дэши, я хочу быть плохим полицейским!" — Сказала Пинки. — "Можешь побыть хорошим в этот раз?"\n"И всё же, что это за создание?" — Спросила Рарити. — "Оно выглядит... неприглядно. Без обид."\n"Не зли его!" — Ответила Эпплджек.\n"А теперь скажи нам, где найти Грогара, после чего мы отпустим тебя," — сказала Твайлайт.\n\nТроггл на всё это только рассмеялся, из-за чего пони недоумённо переглянулись. — "У меня и было желание попасть в вашую ловушку. Почему ещё пошёл бы я в одиночку? Имя моё есть Дрог, и я являюсь трогглом. Мой род был порабощён зловредным Грогаром, поэтому далеко не все из нас являются лояльными ему."\nСпайк нахмурился. — "Ты говоришь... странно."\n"Похоже на старый понийский," — сказала Твайлайт.\n"Разумеется. Мной были позаимствованы и изучены старые тома из архивов, дабы в один день наладить взаимосвязь с расой Гасти. Поскольку пони вышли победителями в сражении с Грогаром. Я верую, что вам по силам вновь это сделать, как и освободить мой род."\n"А-а как мы можем верить тебе?" — Спросила Флаттершай.\nДрог пожал плечами. — "Это есть риск, который вы должны позволить себе. Весь город настороже в связи с вашим присутствием. Без моего участия вы будете схвачены без любых сомнений." — Он преклонил колено перед ними. — "Я к вашим услугам.""
 you_did_this.26.a: ""Мы принимаем твою помощь, друг.""
  
 you_did_this.27.t: "Было близко"
 you_did_this.27.d: "Дрог вёл пони и дракона через город, осторожно избегая патрулирующих трогглов, коз и монстров. Он явно был знаком с устройством города и знал наиболее безопасные дороги.\n"Куда ты нас ведёшь?" — Спросил Спайк. — "Мы отдаляемся от этой башни. Разве Грогар не там находится?"\nДрог покачал головой. — "Обычно так и есть, но сейчас он укрывается. Хоть и не признавая, но для него пони есть величайший страх наравне с ненавистью."\nНеожиданно группа других трогглов появилась из-за угла. "Остановитесь!" — Прошептал Дрог пони. — "Оставайтесь спокойными и действуйте как мои пленники!"\nЕго спутники, в свою очередь, переглянулись в сомнении, однако понурили головы и сделали грустный вид.\n"А, вот ты где, Дрог!" — Сказал один из трогглов на грубом наречии, которое пони не понимали. — "Похоже, тебе удалось схватить незваных гостей!"\nДрог кивнул. — "Я тоже рад тебя видеть, Крог. Да, я держу ситуацию под контролем. Можешь положиться на меня."\nЕго собеседник нахмурился. — "В одиночку? Уверен? Точно не нужна помощь?"\n"Я усмирил пони. Они больше не будут сопротивляться, поверь."\nКрог пожал плечами. — "Ну как скажешь. Но если они сбегут, Грогар превратит тебя в кусок мяса!" После этого троггл крякнул и приказал солдатам следовать дальше, после чего они все ушли.\n"Похоже Дрог смог наврать и вывернуться из проблем," — прошептала Эпплджек.\n"А может он и нам так же лжёт?" — Отозвалась Рэйнбоу Дэш."
 you_did_this.27.a: "..."
 
 you_did_this.28.t: "Секретный проход"
 you_did_this.28.d: "Компания продолжала идти до тех пор, пока Дрог не остановился перед кирпичной стеной. — "Мы прибыли на место," — сказал он.\n"Эмм... а куда... если быть точнее?" — Спросила Флаттершай.\nДрог осмотрелся вокруг, после чего ткнул в какой-то кирпич на стене. Она отодвинулась и открыла потайную дверь. — "Этот путь ведёт в нижние уровни Тамбелона. Там вы сможете найти Грогара, если будете следовать моей карте." — Он вытащил из кармана свиток, после чего передал Твайлайт. — "Но вы должны быть начеку. Данные подземелья наполнены охранниками, козлами и монстрами. Вам надо выждать в этом проходе до тех пор, пока не услышите стук в дверь. Тогда будет ясно, что путь свободен."\nСпайк нахмурился. — "А что ты будешь делать?"\n"Вам необходимо соответствующее отвлечение. Я подниму восстание с моими единомышленникам, которые ненавидят Грогара. Это есть большой риск, но путь также будет расчищен. Благодаря Крогу все будут думать, что вы схвачены и больше не представляете угрозы. Поэтому надеюсь, что вскоре все о вас забудут."\n"А как мы поймём, что это не ловушка?" — Спросила Рэйнбоу. — "Он всё ещё приближённый Грогара."\nДрог вздохнул. — "Вам необходимо поверить мне. Это наша единственная надежда на победу."\n"Я понимаю, это возможно прозвучит необычно для меня," — сказала Рарити, — "но мы не должны судить по его внешности. До сих пор он был сущим джентлькольтом... э-э, джентльтрогглом по отношению к нам."\n"Но что если он всего лишь притворяется?" — Спросила Эпплджек.\n"Дрог прав," — вставила Твайлайт. — "Мы должны довериться ему в очередной раз, несмотря на то, кто он. И даже если это ловушка, то я уверена, что мы сможем выбраться."\nТроггл вздохнул с облегчением. — "Мои благодарности. А теперь залезайте внутрь, пока нас не заметили!"\nПони и дракончик залезли внутрь прохода, после чего дверь захлопнулась за ними. Внутри была непроглядная темень, пока Твайлайт не зажгла рог и не осветила пространство.\n"Жаль мы не успели научить его нормально говорить," — сказала Пинки, посмеявшись при этом."
 you_did_this.28.a: "..."
  
 you_did_this.29.t: "Сердце тьмы"
 you_did_this.29.d: "Шестеро пони и дракон терпеливо выжидали в проходе, прислушиваясь к происходящему снаружи. Но там всё было ужасающе спокойно.\n"Скуууукота," — протянула Рэйнбоу Дэш. — "Сколько мы уже ждём? Я не думаю, что этот Драг вернётся."\n"Эмм, вообще, его имя Дрог," — поправила её Твайлайт.\n"Ну, мы можем выглянуть наружу и посмотреть, что там происходит," — предложил Спайк.\nПринцесса изучила дверь, освещённую её магией, после чего попыталась толкнуть, а затем потянуть телекинезом. — "Она не поддаётся!"\n"Тогда просто телепортируй нас отсюда!" — Предложила Рарити. — "Мне действительно однажды надо собраться и выучить это заклинание..."\nТвайлайт покачала головой. — "Я с трудом контролирую всю магию внутри меня, это будет слишком рискованно. Я думаю... нам надо идти вглубь прохода."\n"...Но это звучит ещё более опасно," — сказала Флаттершай.\n"Отличная идея!" — воскликнула Рэйнбоу. — "Пойдёмте же!"\n\nТёмный туннель вел всё глубже и глубже под землю. Он всё так же был неестественно тих, а внутри не было никаких признаков жизни. Твайлайт ещё раз внимательно изучила карту, которую дал Дрог. "Сейчас, по идее, мы должны попасть в какую-то большую комнату," — сказала она. — "Секунду, сейчас я увеличу мощь заклинания..."\nЕё рог засветился ярче, освещая огромный зал полный клеток. Тишина была моментально прервана оглушающей какофонией звуков, которые издавали животные и монстры, находившиеся в этих клетках.\nСемеро осмотрелись со смесью недоумения и ужаса. "Ну, это явно не то, что я ожидала," — сказала Эпплджек.\n"Бедняжки!" — отозвалась Флаттершай. — "Они наверняка очень расстроены, если так испугались нас."\n"Их тут слишком много!" — Воскликнул Спайк. — "Что, Тартар побери, Грогар с ними делает?"\n"Создаёт чудовищ," — пробормотала Твайлайт, — "и спускает на всех вокруг. Мы их освободим сразу, как только победим его. Поэтому нам надо идти дальше."" 
 you_did_this.29.a: "..."
 
 you_did_this.30.t: "Отец"
 you_did_this.30.d: "Покинув тюремную камеру, группа продолжила следовать по маршруту на карте Дрога. "Мы почти на месте," — сказала Твайлайт. — "На самом деле, я думаю, эти врата и есть вход в комнату, где прячется Грогар."\n"Круто," — ответила Рэйнбоу Дэш. — "А теперь давай взорвём её твоей магией!"\n\nВрата неожиданно открылись.\n\n"Похоже, им не понравилась твоя идея о взрыве!" — Отозвалась Пинки.\nПринцесса в свою очередь нахмурилась. — "Он... кажется он ожидает нас. И явно приглашает войти."\nВсе семеро переглянулись. "Стоит ли нам идти?" — Спросила Флаттершай.\n"Другого выбора нет," — ответила Твайлайт. — "Не волнуйся, я использую свою магию, чтобы защитить нас."\nКомпания зашла внутрь через врата. Там оказался мрачный тронный зал, посередине которого был светящийся кристальный шар. И в нём они видели самих себя. За парящим шаром находился трон, на котором восседало синее козоподобное существо с зловещими красными глазами, а также блестящим колоколом, свисающим с его шеи.\n"А вы не торопились," — сказал Грогар на достаточно беглом современном эквестрийском, после чего поднялся.\nТвайлайт нахмурилась, а остальные её друзья приготовились к битве. — "Ты всё это время наблюдал за нами, так ведь? Грогар."\n"Я так и знала!" — Воскликнула Рэйнбоу Дэш. — "Дрог предал нас!"\nХозяин помещения подошёл к кристальному шару. — "Я могу увидеть всё что пожелаю, однако мне нужно знать, куда смотреть. Это было последним местом, где бы я ожидал увидеть таких крыс, как вы. Мне повезло услышать шум от моих любимых созданий, который предупредил меня о вашем отвратительном присутствии."\n"'Любимых созданий?!" — Прошипела Флаттершай. — "Они выглядят несчастными в своих тесных клетках!"\n"Они любят меня так же, как и мой народ. Для них я герой. А для вас?" — Он маниакально захихикал. — "Я ХУДШИЙ КОШМАР!""
 you_did_this.30.a: "Его чёрные рога ярко засветились."
 
 you_did_this.31.t: "Прелюдия"
 you_did_this.31.d: "Вся комната осветилась, когда стрелы из чистой магии ударили в пони. Впрочем, рог Твайлайт тоже засиял, после чего вокруг компании появился фиолетовый щит, отразивший атаку.\nГлаза Грогара расширились. — "Что? Ты смогла отразить моё заклинание? Это требует огромного количества магии!"\nПрицесса сделала глубокий вдох. — "Да уж, и у меня куда больше есть в запасе."\nКозёл восстановил невозмутимость на лице, после чего презрительно фыркнул. — "Тогда ты больше не грязь. А угроза. И я буду относиться соответствующе. Моя Верная Шестёрка! Придите на зов своего господина и помогите избавиться от них."\nНесколько дверей открылись, после чего шестеро козлов вошли в тронный зал, окружив пони и дракончика.\n"После сражения с Гасти Я осознал, что никогда не стоит недооценивать собственных врагов," — сказал Грогар и ухмыльнулся.\n"Погоди!" — Воскликнула Твайлайт. — "Нам не обязательно сражаться."\n"...У тебя опять что ли обострение?" — Спросила Рэйнбоу Дэш с неверием.\nГрогар поднял свою пышную бровь. — "И почему же?"\n"Я кое-что выучила из своих прошлых битв. А именно то, что каждый заслуживает второго шанса. Почему ты это делаешь? Зачем тебе терроризировать мир своими монстрами и порабощать всех существ?"\nГрогар мерзко захихикал. — "Вы, пони, действительно нечто! Для вас мир делится на чёрное и белое, добро и зло. Вы никогда не понимали и не сможете понять Путь Сейчас и Навсегда."\n"Но я пытаюсь понять," — сказала Твайлайт, даже несмотря на зловеще приближающихся коз.\n"Цель этого пути - не дать ни одной расе использовать секреты магии контроля разума для доминирования над другими. Для господства над чьим-либо разумом необходимо отсутствие страха. С помощью вселяемого ужаса козий род и все остальные расы никогда снова не познают ужасы ментального порабощения. Вам всем очень повезло, что этого не случилось за время моего отсутствия. То, что мы делаем, ужасно. Но разве это неправильно? Нет. Это необходимо."\n"...Но ведь должен быть другой способ!" — Ответила Твайлайт.\n"Нет, его не существует. Есть только Путь Сейчас и Навсегда. И теперь вы все умрёте.""
 you_did_this.31.a: "Шестеро пони и дракон с храбростью встретили их."
 you_did_this.31.b: "Семеро козлов бросились в атаку."

 you_did_this.32.t: "Дружба всегда побеждает"
 you_did_this.32.d: "В хаосе битвы, одолев Верную Шестёрку, пони сумели выкрасть Чарующий колокол. — НЕТ! — закричал Грогар. — Только не снова! А ну отдайте назад! — с этими словами он бросился на пони, пытаясь протаранить их Своими рогами. Истощённые битвой, те едва успели отскочить. — И что нам с ним делать? — спросил Спайк.\n\n— Нам нужно повторить подвиг Великой Гасти! — отозвалась Твайлайт, стремительно уклоняясь от очередной атаки. — Изгнать Тамбелон в Измерение Тьмы!\n\n— Но... мы вообще-то УЖЕ в нём! — заметила Эпплджек.\n\n— И здесь всё ещё Дрог и бедные трогглы! — добавила Флаттершай.\n\nПринцесса нахмурилась: — Вы правы. Но, может быть, мы сможем использовать колокол на самом Грогаре?\n\n— Я ВООБЩЕ-ТО ВСЁ ЕЩЁ ЗДЕСЬ И СЛЫШУ ВАС! — заорал козёл, едва не зацепив Рарити рогами.\n\n— Грубиян! — возмущённо прошипела Рарити, после чего нанесла Ему сокрушительный удар копытами прямо в челюсть, ненадолго оглушив злодея.\n\n— Быстрее! — воскликнула Рэйнбоу Дэш. — Используй колокол, пока Он не пришёл в себя!\n\n— Хорошо! Эмм... надеюсь, сработает! — неуверенно произнесла Твайлайт, направила артефакт на Грогара и позвонила в него.\n\nУдар колокола эхом разнёсся по тронному залу. Злодей пришёл в чувство ровно в тот момент, когда вокруг Него начали сгущаться тени. — НЕТ! ТОЛЬКО НЕ СНОВА! БУДЬТЕ ВЫ ПРОКЛЯТЫ, ПОНИ!\n\nВ считанные мгновения Грогар исчез.\n\n— ...И что теперь? — спросил Спайк.\n\n— Теперь мы являемся свободными, — раздался знакомый голос.\n\nВсе обернулись и увидели Дрога в сопровождении множества трогглов.\n\n— Однако битва далеко не будет завершена, покуда подчинённые Грогара и их чудища не побеждены. Но теперь, когда ими некому командовать, это ненадолго.\n\n— Ого! — наконец отреагировала Рэйнбоу. — Он всё-таки нас не предал и даже начал говорить почти нормально!\n\n— Я так рада, что мы победили этого противного синего козла, — сказала Пинки Пай, после чего повернулась прямиком к тебе. — И я уверена, что нашу победу не перепишет какая-нибудь долговязая обезьяна за экраном компьютера!"
 you_did_this.32.a: "— Правда ведь?"

 you_did_this.33.t: "Пиррова победа"
 you_did_this.33.d: "Грогар тяжело дышал. — "Да как вы, пони, всегда можете вызывать так много проблем? Если бы у других рас была такая же целеустремлённость, Путь Сейчас и Навсегда был бы обречён."\nТвайлайт лежала на земле, едва сохраняя сознание и тяжело дыша. Ей удалось выдавить из себя. — "Кажется... я понимаю... почему ты себя так ведёшь."\nГрогар фыркнул. — "Я веду себя так, как должен, и у меня нет никаких проблем с этим, кроме тебя. И я предпочитаю их решать с концами."\nВпрочем, принцесса не была впечатлена. — "Ты всего лишь страдаешь от паранойи," — выпалила она. — "Неспособный доверять другим расам, ты рассматриваешь... каждое существо... как своего будущего врага. Если бы ты умел верить... всем остальным, то не было бы причин... не стать нам друзьями."\nРога козла засветились. — "Ты потерпела поражение! У тебя нет права голоса, и твой рот будет сшит!"\nТвайлайт закашлялась. — "По правде говоря... мне бы очень хотелось научиться... биомантии у тебя."\nЛицо Грогара исказилось в ярости, но перед тем, как он ударил Своей магией, сотни трогглов ворвались в тронный зал. — "Что это значит? Я не вызывал вас сюда! Опустить оружие!"\nДрог стоял впереди всех. — "Мы более не будем слушать твои приказы, злобный тиран!" — Сказал он. — "Мой народ освободит себя, будь то чрез смерть или победу!"\n\nГрогар моментально уничтожил Дрога своей магией.\n\nОстальные трогглы бросились в атаку или бежать, но были убиты все до единого, неспособные уйти от магии козлов. Но когда пыль опустилась, главный злодей осознал кое-что ужасное.\nПони и дракон исчезли. Они сбежали, воспользовавшись хаосом."
 you_did_this.33.a: ""АААААРРРРГХХХ!""
 
 you_did_this.34.t: "Мы проиграли битву,"
 you_did_this.34.d: "Твайлайт медленно открыла глаза, но увидела лишь светло-коричневый песок. Который также попал ей в рот. Выплюнув его, принцесса подняла голову и осмотрелась. Какой-то странный жужжащий звук разбудил её, однако ей не получалось обнаружить источник. Впрочем, Твайлайт обнаружила своих друзей, лежавших неподалёку. Они были ранены и без сознания. Принцесса ощущала магическое истощение, поэтому постаралась вспомнить, что произошло. Она помнила великую и ужасную битву против Грогара, забегающих внутрь тронного зала трогглов, а затем... телепортацию всей группы в безопасность, оставляющую их союзников на произвол судьбы.\n\nИсточник жужжащих звуков, похоже, раздавался откуда-то сверху. Твайлайт посмотрела вверх и увидела маленькую чёрную точку. Это был медвежук, желающий их добить? Вроде нет, у него нет крыльев. Птица рух? Нет, они не издают жужжание.\n\nЭто был эквестрийский самолёт. Тот самый, который доставил их в город. Он продолжал кружить вокруг Тамбелона на тот случай, если им понадобится эвакуация. И сейчас им она явно нужна.\n\nРог Твайлайт засветился, вкладывая остатки магической силы в маленькую сигнальную вспышку. Пилот самолёта заметил её и вскоре повернул машину в их направлении, медленно снижаясь.\n\nЗатем принцесса поднялась и подошла к друзьям, которые медленно приходили в себя. — "Угх... мы потерпели поражение?" — Спросила Рэйнбоу Дэш. — "Ненавижу проигрывать."\n\n"Нет," — ответила Твайлайт. — "Битва только начинается.""
 you_did_this.34.a: "Но не войну."

 you_did_this.22.t: "Древний враг"
 you_did_this.22.d: "Вновь завладевший своим кристальным шаром Грогар наблюдал за происходящим в мире, желая узнать, в каком состоянии тот находился. То, что рассказали шестеро козлов, было правдой - мир действительно был объят хаосом и варварством. Это вызвало у Него довольную улыбку, поскольку разобщённого врага легко победить. Но Его ухмылка пропала, стоило обратить внимание на обитателей огромного острова в северной Зебрике. Что-то там было не так. Их глаза горели неестественным зелёным светом, а сами жители вели себя словно куклы.\n\nНа краткое мгновение выражение лица Грогара сменилось чистым ужасом.\n\nВпрочем, потом, оно поменялось на чистейшую неконтролируемую ярость. "Брэй! Бегом сюда!" — Закричал он громыхающим голосом. В считанные секунды осёл влетел в его покои.\n"Да мой господин?"\n"Уведоми всех коз в Тамбелоне, что некоторые сирены выжили. Всем надо быть наготове. Даже если осталось всего несколько наших былых поработительниц, они всё ещё крайне опасны. Мы должны быть готовы к встрече с древним врагом. Основная цель пути Сейчас и Навсегда будет исполнена! Я поклялся не допустить ещё одного порабощения козьего рода, и Я его выполню!"\nБрэй просто кивнул и покинул комнату."
 you_did_this.22.a: "Только мы можем спасти мир."
 
 you_did_this.12.t: "Перерождение"
 you_did_this.12.d: "Раньше Рэнди работал в качестве помощника Айрон Вилла в течение многих лет, а до этого проживал в Астерионе вместе с семьёй. Теперь же он исполнил предначертанное и начал новую жизнь в Тамбелоне, древней столице всего козьего рода. Его отец рассказывал множество мифов об этом месте перед своей смертью, однако ни один из них не отражал полностью суть этого места. Козлы были повсюду, проживая вместе с монстрами и рабами, которые выполняли всю чёрную работу и помогали своим хозяевам во всех делах. Больше Рэнди не надо быть чьим-либо помощником. Эта мысль вызвала невольное счастливое блеяние.\n\nТеперь представители его расы были вольны делать что угодно, главное - не навредить остальным сородичам. (те, кто нарушал этот закон, были биомантически изменены в искажённые абоминации, обречённые на вечные страдания). Некоторые козлы выбрали жизнь, полную роскоши и богатства, но обычно им вскоре это наскучивало, и они брали на себя выполнение какой-либо обязанности, подобно остальным жителям. Многие становились биомантами, другие изучали таинства мира, третьи выбирали судьбу надсмотрщика за рабами или чудовищами. Рэнди решил использовать полученные ранее навыки и стать менеджером на новом месте. Он стал координировать работу рабов, а также помогал в управлении всем обществом Тамбелона. И пусть козлы считали его чужаком, тем не менее, все знали, что он был частью Шестерки, которая участвовала в ритуале освобождения Тамбелона, поэтому к нему проявляли глубокое почтение. К тому же, вскоре его усилия оправдались, и он зарекомендовал себя достаточно компетентным. И пусть Рэнди не платили, но, тем не менее, козёл бесплатно получал всё необходимое для комфортной жизни. Ощущение хорошо выполненной работы было для него достаточной наградой."
 you_did_this.12.a: "Продуктивный член общества."
  
 you_did_this.13.t: "Старые пути"
 you_did_this.13.d: "Жизнь Абрама была простой, и заключалась она в поедании газет, содержавших запрещённые материалы, хотя сейчас в Тамбелоне, свою работу в качестве редактора он не мог больше продолжать, так как не было газет. Жизнь в Тамбелоне в целом была довольно странной, каждый козёл говорил на древнекозлином. Мать Абрама в детстве научила его языку, но он давно всё позабыл. Бесцельно бродя по улицам Тамбелона (очень чистым благодаря рабам), Абрам был в раздумьях, что же ему делать. Одна из коз заметила его и подскакала к нему.\n— Что такое, друг? — спросила она, говоря на козлином. Абрам вздохнул и грустно промычал. — Я чувствую себя чужим, я не могу жить своей старой жизнью, когда вокруг меня были недокозлы.\n— Ох, ну, как говорит Грогар, позаботься о ближнем козле своём! Может я чем смогу помочь, я — архивист, сортирую документы в Великом Архиве, может ты хочешь с этим помочь?\n— Там есть съедобная бумага?\nНезнакомка была удивлена. — Ну, не совсем, нет. Ты этим занимался на своей работе?\nОн нахмурился. — Да, но я должен был тщательно ознакомиться с текстом, чтобы узнать, есть ли в нём запрещённые слова или фразы, перед тем как есть его.\n— Похоже на то, что твои навыки смогут пригодится в архиве! Ну что, по копытам?\nАбрам улыбнулся. — Ну, можно попробовать. Прошу прощения за акцент, я не привык говорить на козлином. Как вас зовут? Меня Абрам.\n— Меня зовут Мария. Так ты один из шестёрки?! Это будет честь работать с вами! Идём, архив там! Она взяла его за копыто и потянула за собой."
 you_did_this.13.a: "Ни козла не оставим позади."
 
 you_did_this.14.t: "Новые пути"
 you_did_this.14.d: "Технология порицалась в Тамбелоне, к сожалению Рэйчел. Город жил в своём средневековье. Зачем им машины, если рабы и монстры сами делали чёрную работу? И всё же Рэйчел потратила большую часть жизни на создание устройств, приспособлений и изучение новейших изобретений. Трудно было всё взять и бросить. Так что, игнорируя предупреждение Отца, в тени ночи, она собирала вещицы из всякого металлолома в своей комнате. К сожалению, в скором времени об этом узнали.\n\nВ один прекрасный день, группа козлов, вместе с неуклюжим медвекротом, вломилась в её комнату. Не успев ничего предпринять, Рэйчел с ужасов смотрела, как существо когтями уничтожило всё, что она создала. Рэйчел начала плакать, размякнув на полу.\n\n— Глубоко извиняюсь, но вы знаете приказ Отца. — сказал один из козлов. — Низшие расы отравили ваш мозг всей этой чепухой о машинах и технологиях. Вы действительно думали, что сможете спрятать что-то от нашего Отца?\n\n— П-простите! Я не могла устоять...я этим занималась всю жизнь...\n\n— Тогда придётся измениться и адаптироваться, ну, и найти новую работу.\n\n— Один из козлов улыбнулся. — Почему бы тебе не стать биомантом, как мы? Создавать вещи из живой плоти, а не безжизненного металла. Создавать новых зверей, а не машины, которые не могут думать или чувствовать.\n\nРэйчел хмыкнула и посмотрела на него. — М-может... стоит попробовать. Спасибо."
 you_did_this.14.a: "Её можно излечить."
 
 you_did_this.15.t: "Проповедь"
 you_did_this.15.d: "Гор глубоко вздохнул, подготавливая себя морально и физически. Он в первый раз в жизни проведёт настоящую проповедь, а не просто что-то там говорить о фальшивых верах низших рас, ради красного словца. Нет, теперь он будет говорить о настоящем Боге, его Отце, Грогаре. И не будет он говорить с вольнодумными еретиками, а будет проповедовать настоящим последователям повелителя всех козлов. Настоящего владыки мира.\n\nОн вошёл в зал, по которому разносилось эхо цокающих копыт. Сотни козлов в тишине смотрели, пока он взбирался на подиум. Гор пробежался глазами по комнате и заговорил. — Друзья мои, мы здесь сегодня собрались, чтобы отпраздновать возвращение Всеотца, чтобы отпраздновать возвращение старого порядка в этот мир. Это радостное событие, и мы должны воздать должное нашему Отцу за все то хорошее, что Он сделал для всех козлов. Тому, кто повёл нас по Пути Сейчас и Навсегда. Тому, кто пробился сквозь врата Тартара. Тому, кто создал новую жизнь для нас. Тому, кто научил нас секретам биомантии. Каждый день, мы должны помнить и благодарить Его. В ответ мы получили Его благословение, только оставаясь верными и скромными. Только подумайте обо всех еретиках, что отвергают право Отца. Они никогда не получат Его благословение. На них снизойдёт кара, они станут рабами, их тела послужат нам вдоволь. По ним не будет скорби. Это и есть Путь Сейчас и Навсегда: превосходство козлов, козлократия, вечный мир и свобода.\n\n— Многие из вас видели бесчисленные поколения еретиков, прожили бесчисленные тысячелетия среди них, даже я так жил. Но мы остались верны Ему, не теряя надежду на то, что Отец вернётся. И воздастся нам за веру, ибо Отец живёт среди нас. И да вернётся старый рай. Нужно успеть сделать многое, множество еретиков дышит тем же воздухом, что и мы, не зная кары нашей. Нашим долгом является исполнение желаний Отца и уничтожить их раз и навсегда. Веря в нашу победу, мы станем победителями. Слава Грогару, Всеотцу!\n\nЗал охватило громкое блеяние. Гор улыбнулся, почувствовал духовное удовлетворение."
 you_did_this.15.a: "Слава!"
 
 you_did_this.16.t: "Свежее мясо"
 you_did_this.16.d: "После завоевания очередного поселения новая партия рабов прибыла в Тамбелон. Это было вполне рядовое событие, поскольку невольники регулярно умирали в городе и требовалась постоянная замена.\n\nНовоприбывшие моментально были пущены в дело, поскольку огромная статуя, изображающая Грогара, сама себя не построит. За ними в центре города присматривала стая голодных медвежуков и несколько коз. Одним из них был Оскар – оккультист, прославившийся своим участием в ритуале по освобождению Грогара из изгнания. Пока между рабами распределяли задачи, он обратился к ним на понятном им языке: — Я надеюсь, вы все понимаете важность собственной работы. Наш Отец требует множество монументов, которые увековечат Его образ. Вы, еретики, конечно, думаете, что это чепуха, что всё, что вы делаете, бесполезно, но это далеко не так. Чем больше Его слава, тем больше Его мощь. Однажды для всех вас Он тоже станет Отцом, после чего вы всё-таки отбросите мысли о сопротивлении, саботаже или восстании. Это неизбежно.\n\nОдна из рабынь разъярилась от этих слов. Она бросила своё зубило в Оскара и прокричала несколько проклятий в его сторону. Козёл проворно увернулся от летящего инструмента и нахмурился. Его рога ярко засветились, и тело рабыни внезапно треснуло и изогнулось. Она испустила булькающий крик агонии, когда нервы в её плоти лопнули. Тело продолжало биться в конвульсиях и менять форму даже после того, как крик оборвался. В конце концов от неё ничего не осталось, кроме бесформенной кучи плоти и костей. Другие рабы лишь пялились в ужасе, но когда Оскар повернулся к ним, они быстро вернулись к работе.\n\n— Съешьте останки, — приказал Оскар, после чего один из медвежуков послушно проглотил то, что осталось от рабыни. — Мне начинает казаться, что недокозлы никогда не примут Грогара как своего Отца... может быть, это всё же не неизбежно. А может быть, Путь «Сейчас и Навсегда» ошибочен...? — он задумчиво нахмурился, после чего развернулся и ушёл. Другие козлы глядели ему вслед с отчётливым недоумением."
 you_did_this.16.a: "Как по мне, так это ересь."
 
 you_did_this.17.t: "Видение"
 you_did_this.17.d: "Джайлз-шаман придерживался старых привычек, которым его научил учитель-бизон, и который также показал ему путь Радужного Ворона. Вот только в отличие от грешного увлечения Рэйчел технологиями, поведение Джайлза открыто не порицалось. В конце концов, всем козлам, которые не жили в изгнании, необходимо было в Тамбелоне восстановить свои магические способности. Джайлз был неортодоксален, но, тем не менее, в нём таился огромный потенциал.\n\nВ один день козёл отважился отправиться в пустыню вместе с необходимыми ингредиентами для ритуала. Он уселся на вершину дюны, после чего использовал магический кристалл, чтобы направить луч солнца прямо в миску с сушёными галлюциногенными растениями. Когда те начали гореть, Джайлз глубоко вдохнул дым и закрыл глаза, начиная читать мантру. И пусть в физическом теле он уже ничего не видел, но духовно его взор раскрылся. А затем пришло видение.\n\nОн видел мир, в котором естественный порядок победил. Ему открылись города в руинах, низшие расы, которых толпами вели монстры, а также коз, управлявших всем этим. А затем стрельба и взрывы. Это была засада. Монстры пали, покорённые начали бунт. Порядок начал рушиться. И в конце Джайлзу открылась огромная гора из черепов всех видов. А на вершине был череп Грогара. Козёл запаниковал, после чего резко очнулся от транса.\n\nОн тяжело и глубоко вздохнул. На пустыню уже опустилась ночь и было крайне холодно. Были ли это видение... знамением будущего? И у козла было ужасающее осознание того, что должно быть сделано.\n\nДжайлз поднялся и побежал обратно к Тамбелону."
 you_did_this.17.a: "..."
 
 you_did_this.18.t: "Вечная Доктрина"
 you_did_this.18.d: "Оскар стоял в тёмной аллее, ожидая, когда патрулирующее чудовище пройдёт мимо. После этого он выглянул на улицу, выискивая кое-кого. Вскоре ему удалось увидеть нужного козла, после чего он помахал ему. Тот, в свою очередь, заметил знак и, не вызывая лишних подозрений, зашёл в переулок.\n\n— Я рад, что ты смог прийти, Джайлз, — прошептал Оскар.\n— Меня тоже радует, что ты дождался меня здесь. Уверен, что за тобой не было хвоста? В этом городе даже у стен есть глаза и уши.\n— Уверен.\n— Хорошо. В таком случае, давай поговорим. Как продвигается набор? Тебе удалось разнести слухи?\nОккультист кивнул: — Всё больше козлов убеждаются в праведности нашего дела.\n— Прекрасно. К тому же, недавно я получил ещё одно видение, которое открыло мне название нашей идеологии.\nОскар поднял бровь: — И какое же?\nДжайлз ухмыльнулся: — Вечная Доктрина.\n— Звучит очень похоже на Путь «Сейчас и Навсегда»...\n— Разумеется. Ведь это просто наша интерпретация этого пути. Я бы даже мог её назвать более ортодоксальным видением. В конце концов, рабство всё-таки не вечно. — Его ухмылка стала ещё шире. — А вот смерть – наоборот.\nОскар живо кивнул: — Наш собственный «Путь» тёмный и жестокий, но мы должны его пройти. Я уверен, что с достаточной поддержкой наш Отец тоже согласится последовать за нашим видением дальнейшей жизни.\n— Да... а теперь давай обсудим создание Совета Очищения – следующий шаг в нашем плане..."
 you_did_this.18.a: "..."

 you_did_this.4.t: "Утерянное искусство"
 you_did_this.4.d: "Грогар вошёл в обширную сеть подземелий под Тамбелоном. Множество существ, заключённых в клетках этого места, почувствовали Его присутствие и моментально замолчали. Он посмотрел на них и вспомнил всё, что хотел с ними сделать перед тем, как эта проклятая пони Гасти изгнала Его в Измерение Тьмы.\n\nТеперь Грогар наконец мог исполнить Свои планы.\n\nОн спускался всё ниже, пока не достиг уровней, где содержались Его более старые создания. Они были по своему красивы, даже неудачные эксперименты, которые с трудом существуют и постоянно страдают. В обучении есть своя прелесть, поэтому Отец оставил все неудачные опыты как напоминание Себе. Однако самыми прекрасными были те создания, чьё сотворение увенчалось успехом. Особенно Он гордился гидрами, созданиями, которые были сделаны, чтобы противостоять Его древнему врагу, драконам. Впрочем, здесь было много и других хороших существ. Некоторые были созданы другими козлами, Его лучшими учениками. Жаль, что армия Гасти перебила множество Его творений, но, к счастью, они так и не обнаружили хранилище. В противном случае все монстры до единого были бы безжалостно убиты этими глупыми пони.\n\nТеперь пришло время спустить этих монстров и использовать животных в своих целях. Мощь Тамбелона будет медленно, но верно восстановлена. Производство ужасных чудовищ возобновится, и мир вновь познает страх перед козлами."
 you_did_this.4.a: "Искусство возродится вновь."
 
 you_did_this.5.t: "Естественный порядок"
 you_did_this.5.d: "Беспомощность - вот что чувствовал Тинь Цзинань. Буквально из ниоткуда в пустыне появились демонические козы, которых сопровождали ужасающие звери. У них не было ни малейшего шанса на сопротивление, а немногочисленные храбрецы быстро погибли. Его народ, жители Азира, были выдворены из собственных домов и согнаны, словно скот, в огромный тёмный город, который казался миражом в пустыне. В нём их заставили работать, невзирая на прежнее положение. Вожди трудились бок о бок со слугами. Теперь они все были одинаково равны пред ликом рабства.\n\nОднажды Тинь уже был рабом. И он поклялся самому себе никогда им не стать вновь.\n\nДни и ночи напролёт они вкалывали в мастерских, где их обучили делать огромные, насыщенные кристаллами пластины брони для зверей. Их заставляли использовать самые примитивные инструменты, позволяли очень мало отдыха и крайне скудно кормили. Цзинань не мог этого вынести. Он должен показать на собственном примере, что зебры никогда не примут рабство. Лучше смерть, чем это.\n\nЖеребец залез на верстак и обратился к остальным рабам. — "Мои собратья-азирцы! Нас постигла ужаснейшая участь! Но не отчаивайтесь! Надежда живёт в наших сердцах. Однажды мы сорвём оковы рабства! Мы не должны добровольно склонять голову! Необходимо использовать малейшую возможность сопротивляться злобным хозяевам. Саботируйте производство брони, работайте так медленно, как можете, объявляйте голодовку, делайте всё, что угодно, чтобы показать, что вы свободные зебры!"\n\nОстальные рабы подхватили клич и начали скандировать его имя, после чего начался стихийный бунт, во время которого они ломали инструменты и куски сделанной брони. Но это не длилось вечно. Вскоре двери мастерской распахнулись, и жуткие химеры и мантикоры хлынули внутрь. Началась страшная резня. Зебры кричали, когда их разрывали на части клыками и когтями, а также поедали заживо. Тинь Цзинань старался как мог дать отпор, но всё было бессмысленно.\n\nНа следующий день он и кучка других бунтовавших рабов вернулись в мастерскую. Их тела были биомантически модифицированы. Рты были заменены маленькими отверстиями для кормления, а задние конечности удалены, вынуждая их ползать, словно личинки. Это было предупреждение для всех рабов, что сопротивление будет жестоко и беспощадно наказано."
 you_did_this.5.a: "У меня нет рта, но я должен кричать."
 
 you_did_this.25.t: "Цена войны"
 you_did_this.25.d: "Грогар сидел на своём латунном троне и смотрел в кристальный шар. Тот показывал исход недавних битв против варварских орд других рас. Отец видел, что и Его войска несли потери. Среди них были неудачливые козлы, монстры и трогглы. Всех их ранило, калечило или разрывало в клочья пулями, шрапнелью и другими взрывающимися снарядами из металла. Его лицо скривилось в отвращении. Какое безумие и жестокость заставили эти вырождающиеся дегенеративные низшие расы изобрести такое ужасающее оружие? Они сражались как трусы, сбрасывая куски взрывающегося металла с небес, пока сами прятались, словно крысы в земляных дырах. Но даже Он признавал, что это было эффективно. Необходимо увеличить производство насыщенной кристаллами брони, а также приказать Его подчинённым изучить эти орудия. Не потому, что Он хотел, чтобы их использовали Его приспешники, а чтобы понять, как им лучше противостоять. Его вера в абсолютную победу козьего рода осталась непоколебима. Просто она будет стоить куда дороже, чем предполагалось раньше."
 you_did_this.25.a: "Война это Тартар."
 
 cityfoul.1010.t: "Падение Сиквестрии"
 cityfoul.1010.d: "Владычество козьего рода когда-то простиралось не только над сушей, но и под водой. В конце концов, большая часть планеты покрыта ей, и как можно править миром, не владея при этом другой его частью?\n\nПрячущиеся глубоко под водой морские пони были шокированы, когда многочисленные чудовища напали на их деревни и города. И пусть они и обладали опытом сражений с монстрами, количество врагов было слишком большим. Им удалось убить лишь нескольких, прежде чем их оборона была сломлена. Вскоре всё сопротивление в так называемой Сиквестрии было подавлено.\n\nИ пусть обеспечение контроля над подводным населением непрактично для коз, монстры, по крайней мере, гарантируют, что морские пони не будут бунтовать против правления Грогара."
 cityfoul.1010.a: "Нет ничего недосягаемого для хватки Отца."
 
 you_did_this.20.t: "Конфликт Доктрин"
 you_did_this.20.d: "Оскар и Джайлз вошли в тронный зал Грогара, после чего немедленно распластались перед Ним и поцеловали каменный пол.\nОтец на это только фыркнул: — Встаньте. Что вам надо?\nКак только оккультист поднялся, он сразу же начал объяснять: — У нас есть вопрос, который нужно срочно обсудить, Отец. Джайлз недавно получил видение будущего, а я мог видеть намёки на него собственными глазами. Путь «Сейчас и Навсегда» обречён повторить события прошлого. Низшие расы восстанут против рабства и в очередной раз попытаются избавиться от нас. Это неизбежно.\nГрогар поднял бровь: — Ну, и что вы предлагаете в таком случае?\n— Вечную Доктрину, — пробормотал Джайлз.\n— Ну, и что это?\nОккультист начал отвечать: — Новая философия, которая направлена на спасение козьего рода от вырождения и стагнации. Вместо того чтобы порабощать других, мы просто истребим их всех. Упование на рабский труд вновь делает нас слабыми и уязвимыми. Мы должны полагаться только сами на себя. С уничтожением всей остальной разумной жизни мы сможем жить в вечном мире.\n\nГрогар нахмурился: — В твоих размышлениях есть смысл. Но это решение повлияет на весь козлиный род, поэтому я не могу принять его в одиночку.\n— Многие козлы поддерживают нашу точку зрения, как вы уже знаете, Отец, — сказал Оскар. — Я предлагаю устроить голосование, чтобы решить, будет ли эта доктрина принята.\nГрогар разразился хриплым смехом: — Чего?! Нет! Нет. Докажите превосходство собственной «Доктрины» с помощью силы. Тогда я отступлю и дам вам всё-таки уладить разногласия с теми, кто поддерживает «Путь». Вы обещаете сделать козлов сильнее, значит, докажите это и победите тех, кто стоит на вашем пути. Если вы сможете это сделать, я приму ваше предложение. Но если нет... — Он зловеще ухмыльнулся. — Ну, вы уже будете мертвы, так что волноваться об этом не придётся.\nОскар и Джайлз посмотрели друг на друга в ужасе, после чего кивнули дрожащими головами. — Как вы пожелаете, Отец, — неуверенно сказал оккультист. — Пусть... победит... сильнейший."
 you_did_this.20.a: "Вечная Доктрина – последняя надежда козьего рода!"
 you_did_this.20.b: "Мы всегда должны придерживаться Пути «Сейчас и Навсегда»."
 
 you_did_this.21.t: "Альянс свободных рас"
 you_did_this.21.d: "Страны на других континентах поначалу игнорировали странные новости, приходящие из пустыни Зебхара. И только когда монстры Тамбелона обрушились на соседние нации одну за другой, тогда в странах начали нарастать волнения. Впрочем, они были слишком вовлечены в местные конфликты, чтобы вмешаться в происходящее. Однако когда темпы экспансии Тамбелона начали нарастать, тогда нации осознали, что бездействие может привести и к их собственному поражению.\n\nБлагодаря определённой группе пони было достигнуто всеобщее соглашение. Все оставшиеся свободными расы объединились, чтобы остановить Грогара, пока не стало слишком поздно. И пусть это всё же не принесло конечного мира на континенты Эквус и Грифонию, тем не менее, соглашение означало, что весь мир признаёт козий род как угрозу всеобщей свободе. Все расы постараются взаимодействовать друг с другом и выполнить задачу по освобождению всей Зебрики от деспотии Тамбелона."
 you_did_this.21.a: "Мы будем ждать."

 you_did_this.35.t: "Конец борьбы доктрин"
 you_did_this.35.d_edge: "Джайлз, Гор и Оскар распластались перед Всеотцом, восседавшим на троне. — Мы сделали всё, как вы приказали, — сказал оккультист. — Все, кто противостоял нашей праведной Доктрине, побеждены, а весь остальной козий род принял новые взгляды.\n\nНа лице Грогара появилась кривая ухмылка: — Хорошо. С помощью силы вы доказали, что ваша Доктрины единственно верная. — Его улыбка пропала. — Вы же не ожидаете какой-то награды за уничтожение своих же собратьев?\n\nТрое козлов переглянулись в ужасе: — Н-нет, господин, — проблеял Гор.\n\nГрогар нахмурился: — Очень хорошо. А теперь у вас появилось много работы. В мире, где-то 750 миллионов разумных существ, от которых вам надо избавиться. Каждый из них обладает возможностью развить способности по подчинению разума, а у некоторых потенциал даже выше, чем у других. Но как только они все умрут, мы будем в безопасности.\n\n— ...Но что если козёл попробует использовать подобную магию? — сказал Джайлз.\n\nОстальные уставились на него в шоке.\n\n— Только пришло на ум, — сказал тот, пожав плечами.\n\n— С ЭТОГО ПРЕДАТЕЛЯ ВСЕЙ РАСЫ ЗАЖИВО СДЕРУТ ШКУРУ И ЧЕТВЕРТУЮТ! — проорал Грогар, после чего глубоко вдохнул. — До сих пор Я доверял своей пастве в том, что они не отдалятся далеко от того Пути, который Я им завещал. Но если хотя бы один козёл действительно может использовать... ЭТУ ОМЕРЗИТЕЛЬНУЮ МАГИЮ, тогда, похоже, нам надо истребить и себя тоже.\n\n— ...Что, простите? — спросил Оскар.\n— Это закономерный итог твоей собственной Доктрины, идиот. Ты будешь ей следовать или нет?\nТрое помялись в сомнениях, переглянулись, после чего обречённо кивнули."
 you_did_this.35.d_unedge: "Рэйчел, Абрам и Рэнди стояли перед Грогаром, восседавшим на своём троне. — Я не могу поверить, что вы это сделали, — сказала Рэйчел. — Вы позволили произойти гражданской войне, разорвавшей козий род на части, только ради того, чтобы увидеть, чья идеология «сильнее»?\n\nЛицо Грогара скривилось: — Твоя вера и не требуется. И ты отлично знаешь, как я расправляюсь с еретиками.\n\nРэнди поспешил вмешаться: — О-она хотела сказать, что мы рады, что эта бессмысленная война окончена!\n\nОтец оставался напряжённым: — Я не ожидал, что традиционалисты выиграют. Впрочем, как и того, что многие бросят наши старые традиции.\n\n— Мы сделали то, что должны были, — сказал Абрам. — Нам нужны технологии низших рас, чтобы выжить.\n\nГрогар фыркнул: — Как скажешь. Но вы должны помнить, что Вечная Доктрина, насколько ложной она ни оказалась бы, была в чём-то права. Как вы планируете предотвратить очередное восстание рабов и изгнание Тамбелона? Как по мне, вы увеличили шансы на бунт, раздав рабам оружие, которое они смогут использовать против нас.\n\n— Вообще-то, — сказала Рэйчел, — если мы будем относиться к рабам хорошо, большинство из них будут не против своего статуса. За исключением некоторых крикунов.\n\nОтец нахмурился: — Но они перестанут нас бояться. Сделают нас СЛАБЫМИ!\n\n— Вы волнуетесь о повторении прошлых событий, — сказал Абрам. — Но мы приложим все силы, чтобы этого избежать. Возможно, это будет трудно, но доверьтесь нам.\n\nГрогар лишь скрипнул зубами."
 you_did_this.35.a: "А теперь по поводу остальной части мира."

 
 now_live_with_it.1.t: "Новая база операций"
 now_live_with_it.1.d_edge: "Оскар, Джайлз и Гор сидели за столом в тишине. Они обосновались в доме какой-то челяди, от которой избавились чуть раньше. Теперь это была их временная штаб-квартира. Переезд совершили из крайней нужды, чтобы предотвратить быстрое поражение от копыт тех, кто отказался принять свет Вечной Доктрины, хотя ощущалось это как изгнание из райского Тамбелона.\n\n— Я рад, что вы приняли меня в совет, — нарушил тишину Гор. — Я знал, что вы настроены скептически, но вы сказали, что Всеотец увидел мудрость в вашей доктрине. Значит, я обязан ей следовать.\n\n— Да, мы рады, что ты не предал нас, — проворчал Оскар. — В отличие от других козлов.\n\n— Не позволяй гневу взять верх, — сказал Джайлз. — Когда мы докажем превосходство нашей чистой доктрины, они поймут свою ошибку и сдадутся. Тогда Отец сможет вновь править нами.\n\n— Именно! Мы не должны унывать! Мы должны верить в победу! Когда другие козлы увидят свет и тьму их обречённого пути, они встретят нас с распростёртыми копытами как учителей и наставников. Доктрина вступит в силу, и мы достигнем Вечности.\n\nОскар улыбнулся. — Спасибо, друзья. Я знаю, что вместе мы достигнем победы. А пока обсудим дальнейший план действий."
 now_live_with_it.1.d_unedge: "Рэйчел, Рэнди и Абрам сидели за столом в тишине. Они находились в палатке, служившей резиденцией правительства. Без Грогара и с общим беспределом культа у них не оставалось выбора, кроме как взять бразды правления козлами в свои копыта и сбежать в более безопасное место.\n\nРэйчел первой нарушила тишину: — Так, эмм... я единственная тут пытаюсь понять, что произошло?\n\nОставшиеся двое покачали головами. — Мы снова потеряли Отца, — сказал Рэнди. — И теперь мы застряли среди недокозлиной челяди! Всё было так хорошо, а теперь всё пропало!\n\n— Успокойся, — сказал Абрам. — Попробуй пожевать бумаги, помогает расслабиться.\n\n— Мы не можем сейчас расслабляться, — возразила Рэйчел. — Как часть Верной Шестёр... то есть Верной Троицы, наш долг — спасение всех козлов и рабов.\n\n— ...Спасение рабов? — переспросил Рэнди.\n\n— Ну да, — подтвердил Абрам. — Эти культисты сказали, что их всех надо убить.\n\n— Я... я когда-то дружил с недокозлом, — признался Рэнди. — С минотавром. Да, он был челядью, но он не заслуживает смерти. Это просто жестоко.\n\n— Именно, — сказала Рэйчел. — Они зашли слишком далеко. Кто знает, может они пленили Грогара или сделали с ним что-то похуже. Мы должны остановить их. И сделать это мы сможем только вместе!"
 now_live_with_it.1.a: "Вместе мы победим."
 now_live_with_it.2.t_edge: "Нет конца"
 now_live_with_it.2.t_unedge: "Новый век"
 now_live_with_it.2.d_edge: "Грогар посмотрел на высокую тонкую башню, пронзающую облака. Затем он взглянул на бесчисленные врата из камня и кристаллов, возведённые козлами. — Брэй, мне нужен подробный отч... — Грогар прервался, осознав, что Брэй мёртв. Он недовольно фыркнул и поскакал вниз по ступеням.\n\nВскоре он нашёл Верную Тройку: Гора, Оскара и Джайлза. — Вот вы где, мне нужен отчёт.\n\nТроица поклонилась ему. — Отец, — сказал Оскар, — первые эксперименты с монстрами, рождёнными в космосе, имели относительный успех. Они прожили там несколько часов, прежде чем задохнулись. Также они смогли развить более высокую скорость. Такими темпами мы достигнем цели через десять лет.\n\n— Отец, — добавил Гор, — порталы в другие измерения почти завершены. Изучив сооружения пони, мы смогли создать копии, функционирующие несколько минут, прежде чем рушились. Такими темпами мы достигнем цели через десять лет.\n\n— Все миры будут под нашим контролем, — подытожил Джайлз. — Нам нужно лишь терпение.\n\nГрогар нахмурился. — Я терпел столетия. Десяток лет — не страшно. Но когда всё будет готово, мы отправимся в миллиарды миров и будем уничтожать звёзды, пока каждая не погаснет. Только так мы освободимся от контроля разума."
 now_live_with_it.2.d_unedge: "С уничтожением последних враждебных сил Война за прекращение всех войн подошла к концу. Целью Грогара было восстановление козлократического правления над миром, но теперь в этом нет смысла. Козлы нашли иной путь, позволяющий избежать ошибок прошлого. Зачем же их повторять?\n\nПуть «Сейчас и Навсегда» был заброшен, а рабство отменено. Некоторые всё ещё сопротивлялись власти Тамбелона, но многие существа считали свои новые жизни достаточно комфортными, а кто-то даже жил лучше, чем прежде. Козлы больше не правили страхом и жестокостью, а действовали мягко и сдержанно. Многие осознали и другую истину: мир во всём мире был достигнут и продлится ещё долго.\n\nТеперь, когда козлы относятся к другим расам с уважением, кооперация и торговля процветают по всему миру. Тамбелон стал многокультурной и межрасовой столицей единого мира. Тем временем, на окраине древнего города Рэйчел гордо смотрела на космическую ракету, готовую к запуску.\n\nЭто было начало золотого века планеты. Вскоре они достигнут звёзд."
 now_live_with_it.2.a: "Горы изломанных тел в жерновах."
 now_live_with_it.2.b: "Мы осознали свои ошибки."
 now_live_with_it.3.t: "Предательство"
 now_live_with_it.3.d: "— В смысле все трогглы предали нас и перешли на сторону врага?! — Оскар требовал ответа.\n\nНапуганный козёл сжался в комок. — Я... ну, какую часть именно ты не понимаешь?\n\nГор попытался разрядить обстановку улыбкой. — Думаю, он не понимает, почему они это сделали.\n\n— Это же очевидно, — ответил Джайлз, фыркнув. — Козлы, следующие Пути «Сейчас и Навсегда», захотели сохранить своих дорогих солдат-рабов. Поэтому они послали агентов, чтобы спасти трогглов. — Он пожал плечами. — Это мало что меняет, мы просто устраним их позже."
 now_live_with_it.3.a: "Вот тебе и верность..."
 now_live_with_it.4.t: "Технофобия"
 now_live_with_it.4.d: "— Зовите меня еретичкой, если хотите, — заявила Рэйчел совету. — Но есть еретики похуже. К тому же, оригинальный трактат Пути «Сейчас и Навсегда» ничего не говорит об использовании продвинутых технологий.\n\n— Если они не связаны с контролем разума, — добавил Абрам. — Я это когда-то вычитал в архивах.\n\n— Да, кроме этого, но что ещё препятствует? Да, изобретения были созданы чернью, но разве сами наработки от этого становятся порочными? Можно ли отделить идею от её создателя?\n\n— У меня был опыт с технологиями, — сказал Рэнди. — Устройства низших рас могут быть очень полезными. Например, микрофон: я использовал его, чтобы моё блеяние звучало громче.\n\n— Именно! — ответила Рэйчел. — Зачем нам отрекаться от полезных инструментов? Мы же только мешаем самим себе, а это может обречь нас. Нам нужно любое преимущество над врагом, пока не стало слишком поздно!\n\nКозлы в совете начали роптать с сомнением. Вскоре Абрам высказался: — Мы решили назначить самых умных козлов для изучения машин недокозлов. Отец может быть недоволен, но я считаю, что Его можно убедить в том, что это правильное решение в условиях кризиса.\n\nРэйчел улыбнулась."
 now_live_with_it.4.a: "Как необычно."
 now_live_with_it.5.t: "Щит для разума"
 now_live_with_it.5.d: "— Хэйрика! — выкрикнула Рэйчел, ворвавшись в кабинет Абрама и напугав козла.\n\n— Чт... Рэйчел, это сейчас что было?\n\n— Это выражение, используемое пегасами, когда они празднуют открытия или изобретения. Но не в этом суть. Абрам, мои эксперименты принесли плоды!\n\nТот приподнял бровь, пытаясь вспомнить, о каких экспериментах речь, затем распахнул глаза от удивления. — А! Ты имеешь в виду щит против контроля разума?\n\nРэйчел неистово кивала. — Да, да! Захваченный практикант контроля разума не смог ничего сделать испытуемым в зоне действия мозго-щита! Ты понимаешь, что это значит!\n\n— Эм... ну, наверное мы можем немного отдохнуть.\n\n— А ещё, с современными технологиями мы сможем выдать такое устройство каждому козлу. А это значит, что страх, рабство и завоевание мира больше не нужны!\n\nАбрам моргнул. — Эмм... немного поздновато для этого.\n\n— Чушь, никогда не поздно! Я пришла попросить распространить эти новости по всему миру. Ты же редактор, как-никак. Когда все узнают, каждый козёл откажется от Пути. Навсегда.\n\n— Спасибо, что напомнила... время обеда. — Абрам принялся есть газету."
 now_live_with_it.5.a: "И... что теперь?"
 
 ### cityfoul like events
 cityfoul.999.t: "Освобождение Козлестана"
 cityfoul.999.d: "После падения козлократии геноцид невиданных масштабов развернулся по всему миру, когда бывшие рабы начали уничтожать своих бывших хозяев. Выжившие козлы сбежали и сформировали изолированные и уединённые сообщества, которые нередко подвергались гонениям.\n\nСуществует один регион, в котором сохранилась значительная часть населения коз, а именно, Козлестан. Тысячи козлов живут здесь в отдалённых деревнях среди зеленеющих холмов. Доминирующее большинство зебр по большей части оставило их в покое, во многом благодаря пересечённой местности, позволяя козам спокойно пастись.\n\nНо козлы никогда не забывали. В этом месте память о Грогаре была как никогда крепка, в то время как во всём остальном мире она исчезла. Козлы терпеливо ждали его возвращения целые тысячелетия, молясь и не теряя надежды.\n\nКогда орда чудовищ Отца прибыла, местных переполняла эйфория. Среди холмов происходило великое празднование, пока козлы радовались долгожданному событию. Они ждали этого дня многие поколения. Тысячи сразу же отправились в Тамбелон, желая присоединиться к реформированной козлократии. Местные зебры были быстро схвачены и закованы в цепи в наказание за грехи их прародителей.\n\nДревняя поговорка всё же была верна и мудра. И гласила она: "Жди и надейся.""
 cityfoul.999.a: "Они будут вознаграждены за свою верность."
 
 cityfoul.1000.t: "Дедушка пустыни"
 cityfoul.1000.d: "Пока козы-биоманты вели орды чудовищ через пески пустынь, называемые низшими расами Зарантией, они встретили старого монстра, однажды созданного Грогаром - татцельвурма. Козлы быстро подчинили нескольких подобных существ, и таким образом смогли восстановить их шаблон, ранее утерянный в хаосе восстаний тысячелетия назад.\n\nТатцельвурм станет прекрасным дополнением арсенала козлократии. Черви являются хищниками по своей натуре, а также прекрасно приспособлены к пустыне. После восстановления их шаблона вновь может быть налажено массовое производство татцельвурмов."
 cityfoul.1000.a: "Прекрасное дополнение коллекции."
 
 cityfoul.1001.t: "Ужас небес"
 cityfoul.1001.d: "Когда козлы увидели одну из них, они не могли поверить собственным глазам. Живая птица рух, широко расправив крылья, парила в небесах. Это была огромная хищная птица, когда-то созданная Грогаром. Считалось, что в живых уже никого из них не осталось, однако это оказалось неверно. Козы быстро захватили несколько диких птиц и принесли в Тамбелон, поскольку шаблон их производства был давно утерян. Грогар был рад тому, что одно из его лучших творений было спасено от забвения.\n\nПтицы рух - это вселяющие ужас существа с острыми как железо когтями, способные разрывать на части ничтожные летающие машины недокозлиных рас. Скоро небеса вновь будут принадлежать козам."
 cityfoul.1001.a: "Прекрасное дополнение коллекции."
 
 cityfoul.1002.t: "Дождь из камней"
 cityfoul.1002.d: "В каменистых горах Абиссинии козлы обнаружили ещё одно их старое создание - пращехвоста. Это было похожее на рептилию существо с очень сильным хвостом, который тот использовал при охоте, чтобы швырять камни на большие расстояния. Эти монстры были древним оружием в первобытной войне с драконьим родом и при этом как-то сумели выжить в дикой природе на протяжении нескольких тысячелетий. Некоторых из них быстро поймали и смогли восстановить шаблон производства.\n\nОсобая способность пращехвоста позволит армии монстров получить столь необходимую способность наносить удары на большом расстоянии, особенно по тяжело бронированным или летающим целям. Это было доказательством гения Отца, поскольку это существо даже после стольких веков будет всё ещё полезно против врагов козьего рода, очень изменившихся за это время."
 cityfoul.1002.a: "Прекрасное дополнение коллекции."
 
 cityfoul.1003.t: "Ярость стража"
 cityfoul.1003.d: "Юго-Восточная Зебрика была опустошена неконтролируемой магией, которая превратила весь регион в заросшее и очень влажное болото. Грогар мечтал решить эту проблему и устранить ущерб, вернув региону его первоначальный климат. Однако для этого необходимо захватить построенный козлами путеводный камень, расположенный на пересечении лей-линий посреди полуострова и испускающий магию. К сожалению, магический дух охраняет здание, питаясь его силой, а местные варвары поклоняются ему и относятся к зданию как к храму. Когда козлы и их монстры попытались войти туда, местные жрецы провели ритуал призыва духа, которого они назвали Громовым тигром. В одно мгновение разразилась гигантская буря, которая поразила золотой город вокруг него молниями и убивала всё живое в окрестностях, а также разрушила и повредила здания, включая сам "храм".\n\nПосле уничтожения путеводного камня потребуются десятилетия или даже века, чтобы надлежаще восстановить климат в этом регионе. Это была досадная неудача, и даже сам Грогар мало что мог с этим поделать."
 cityfoul.1003.a: "Бывают сущности, которые могут сравняться с Ним в силах..."

 cityfoul.1004.t: "Почётные козлы"
 cityfoul.1004.d: "Когда козлы со своими монстрами достигли травянистых долин Зерганы, они встретили знакомых существ, которых местные зебры держали в качестве домашнего скота – овец. Будучи ближайшими родственниками козлов, овцы поддерживали с ними тесные узы ещё в эпоху до изгнания Тамбелона. Однако, в отличие от козлов, овцы были лишь полуразумными и покорно принимали роль скота, в то время как их кузены яростно сопротивлялись подобному обращению. Где бы ни появлялись легионы Грогара, овцы радостно приветствовали их, ничуть не сочувствуя своим прежним хозяевам, обращённым в рабство. Вскоре Грогар объявил, что, как и в древние времена, к овцам будут относиться как к «почётным козлам» – гражданам второго сорта, наделённым особыми правами и защитой. Большинству овец было всё равно: они лишь хотели, чтобы их регулярно стригли и оставляли пастись на сочных лугах. Тем не менее, некоторые из них добровольно вызвались помогать биомантам, взяв на себя роль верных подручных."
 cityfoul.1004.a: "Мы с радостью примем наших двоюродных братьев и сестёр."
 
 cityfoul.1005.t: "Марш к морю"
 cityfoul.1005.d: "Козлы наконец увидели нечто, что было крайне необычным зрелищем для тех, кто всю свою жизнь прожил в Тамбелоне - океан. Необъятные просторы мерцающей голубой воды. Козы, конечно, были не очень хороши в плавании. Однако этого нельзя было сказать про множество существ, которые провели всю свою жизнь под водой. Исходя из этого, козлы занялись поисками таких созданий и вскоре нашли живого морского змея.\n\nС шаблоном этого существа козий род сможет захватить моря. Теперь ничто больше не будет для них недосягаемым. Низшие расы, прячущиеся на своих островах, обречены."
 cityfoul.1005.a: "Прекрасное дополнение коллекции."
 
 cityfoul.1006.t: "Магический лес"
 cityfoul.1006.d: "Есть несколько мест в мире, где пересекаются лей-линии, создавая места, полные сырой магической энергии. Она имеет сильный эффект на местную флору и фауну, создавая густые леса, наполненные странными тварями. Козлы так и выучили биомантию, анализируя то, как такие существа естественно появлялись в мире.\n\nОдно такое место было захвачено силами козлократии. Это — единственное место во всей Зебрике, и, скорее всего, самый большой магический лес в мире. Грогар уже прибыл, чтобы разузнать, не был ли нанесён ущерб лесу низшими расами. Он был рад увидеть его в хорошем состоянии, тем самым явив источник биомассы и магической энергии."
 cityfoul.1006.a: "Есть ещё нетронутые места в мире..."
 
 cityfoul.1007.t: "Дикая магия"
 cityfoul.1007.d: "Грогар давно знал, что у глупых лошадей Мейртании была гора необычных и сильных артефактов, спрятанных в пещерах. Ему эти безделушки, впрочем, не были нужны, так как они все слабее, чем его Чарующий Колокол, хотя эти лошадки отчаянно пытаются спасти их от копыт Грогара. Огромные взрывы разразили горы Мейртании, закапывая бесчисленные артефакты под грудами камня.\n\nУщерб был велик, скорее всего, эти кони использовали один из своих артефактов, чтобы уничтожить остальные. Потери исчислялись сотнями тысяч. Ну, они были недокозлами, так что плевать как-то. Всё это лишь доказывает, как низшие расы боятся истинной мощи козлов."
 cityfoul.1007.a: "Пустая трата."

 cityfoul.1008.t: "Ослиный род пал"
 cityfoul.1008.d: "Осёл Брэй прошёл через железные врата в сад, расположенный в центре Тамбелона. Он был полон жизни: там зеленели растения и резвились многочисленные животные. Пели птицы, несколько козлов неспешно гуляли по территории, наслаждаясь местной природой. Брэй всё это проигнорировал и поспешил дальше, желая отыскать более важную цель.\n\nОн увидел Грогара, сидевшего перед прудом. "Господин," — позвал осёл Его, — "у меня важные новости с передовой."\n\n"Подойди сюда!" — Ответил Грогар.\n"...Хозяин?"\n\n"Это был приказ, идиот!"\n\nБрэй поспешил к Нему. — "Что-то случилось, господин?"\n\nГрогар смотрел на воду, поэтому осёл последовал примеру. Там плавал буфогрен, окружённый головастиками. На лице козла была так редко появляющаяся улыбка. — "Разве природа не прекрасна, Брэй?"\n\nЕго собеседник моргнул с недоумением. — "Но господин, а как же новости?"\n\nГрогар закатил глаза и вздохнул. — "Ладно-ладно, давай уже!"\n"Ослы Асстирии и Ансерука... были покорены. Вы можете это сами увидеть в кристальном шаре."\n\n"Похоже, тебя что-то беспокоит," — заметил Грогар. — "Тебя ведь действительно волнует судьба твоих собратьев-ослов?"\n\n"Н-нет, хозяин."\n\n"Не лги мне! Я знаю, что беспокоит. А я ведь спас тебя от рака, и вот так ты мне платишь в ответ. Глупой сентиментальностью! Ослы ничем не отличаются от других рас, ненавидящих природу. Все они держали мой вид как домашний скот! Относились к нам как к животным! И мы отплатим им тысячекратно. Тебе лучше быть благодарным за то, что мы тебя пощадили, раз уж ты оказался полезен мне."\n\nБрэй ничего не ответил и лишь слабо кивнул."
 cityfoul.1008.a: ""Да, господин.""
 
 cityfoul.1009.t: "Звёзды солгали?"
 cityfoul.1009.d: "Хирам Зерранид болезненно дёрнулся, когда по нему пришёлся удар хлыстом от странного свиноподобного существа. Он пытался отделиться от группы его же собратьев-зебр, закованных в цепи, и подойти к ближайшей козе. Она, похоже, была здесь главной, раздавая приказы монстрам и свиноподобным существами. Очевидно, если та понимает язык зебр, то прислушается к голосу разума. — "Эй! Послушайте меня, вы совершаете ошибку!"\n\nКоза заметила его, после чего кивнула ближайшему свинолюду, который сделал ещё один удар по Хираму, на этот раз куда сильнее. Его полосатая шерсть быстро начала окрашиваться кровью. — "Пожалуйста, послушайте! Мы, копытные существа, не должны быть врагами! Мы должны работать вместе, чтобы устранить птичью угрозу миру!"\n\nХирам с трудом подавил крик, когда его ткнули копьём. Коза высокомерно смотрела на него.\n\n"Я умоляю вас, выслушайте меня! Нам не нужно быть врагами!"\n\nЕщё один удар копьём на этот раз пронзил его плоть. Зебра упал на колени.\n\n"Божество... За’ал-Маар... только если... вы... вы и есть криптоптицы!"\n\nРога козы засветились. Хирам ощутил что что-то происходит с его ртом, после чего тот буквально взорвался болью. Он начал кататься по земле, тогда как лицо зебры скорчилось в гримасе. Когда боль прекратилась, он судорожно вдохнул и ощупал лицо копытом. К его сущему ужасу, теперь там находился птичий клюв.\n\nКоза сказала что-то непонятное на своём странном языке, после чего жестом указала вернуться к остальным рабам.\n\nХирам лишь мог смотреть на неё и трястись от ужаса, неспособный ничего сказать."
 cityfoul.1009.a: "..."

 cityfoul.1011.t: "Надоедливые мошки"
 cityfoul.1011.d: "Во время прочесывания холодных гор на юге Зебрики одна из коз заметила дикого медвежука, собирающего ягоды в лесу. Он был быстро пойман и доставлен обратно в Тамбелон, дабы восстановить его шаблон.\n\nМедвежуки - необычные существа, представляющие собой смесь медведя и осы. Они обладают невероятной силой и размерами, которые вкупе с шестью конечностями позволяют им переносить других монстров на огромные расстояния. К тому же они далеко не беззащитные, поскольку у них есть острое жало и когти. С ними не будет ничего недосягаемого для хватки Отца."
 cityfoul.1011.a: "Прекрасное дополнение коллекции."
 
 cityfoul.1012.t: "Живые машины"
 cityfoul.1012.d: "Во время усмирения Баррада козлы наткнулись на поистине необычную находку. Конечно это не было совсем неожиданностью, поскольку местность была разрушена невероятно сильной магией, но тем не менее, всё равно оказалось сюрпризом.\n\nГлубоко под землёй козы обнаружили странную и мощную магическую сущность, защищаемую фанатиками-культистами и окружённую машинами из биомассы. Учитывая насколько опасной и хаотичной была эта сущность, козы призвали самого Грогара, дабы он разобрался с этим.\n\nПод предводительством Отца козлы и их монстры уничтожили культистов и вступили в бой с сущностью. Несмотря на всю его мощь, оно не смогло ничего противопоставить Грогару, который вскоре смог разобраться что это такое. Ему удалось разделить её на семь единорогов. После первоначального ступора они были быстро убиты. Грогар предположил, что семеро пытались использовать какое-то заклинание, чтобы слиться в одну большую сущность, но это явно пошло не по плану. Вероятно, они пытались использовать биомантию, что было крайне глупо, учитывая, что только козы были способны полностью контролировать такую магию.\n\nНа устранение ущерба, нанесённого региону, уйдёт много времени. Но с нашей помощью местная природа медленно, но верно восстановится."
 cityfoul.1012.a: "Очередное доказательство того, насколько глупы низшие расы."
 
 cityfoul.1013.t: "Лес грязи"
 cityfoul.1013.d: ""КАК они называют этот лес?" — Потребовал Грогар ответ от Оскара, прожившего большую часть жизни рядом с этим местом.\n\n"Эмм... ну, если повториться, то имя грубо переводится как..."\n\n"Это был риторический вопрос," — сказал Отец. — "Сколько бы я не смотрел на низшие расы, они каждый раз умудряются ещё больше разочаровать." — Он вздохнул. — "Котоптицы не только дали ему позорное имя, но ещё и опустошили лес, срубив половину него и вырезав местных монстров. Потребуются десятилетия, если не века, чтобы лес восстановился!"\n\n"Пожалуйста, успокойтесь," — попросил Оскар. — "Ярость тут в любом случае не поможет."\n\nГрогар фыркнул. — "Правда. Ну, ты и так знаешь, что надо сделать. Депортируй местное население грифонов подальше от лесных участков, собирай любые возможные излишки биомассы и используй местные лей-линии для получения магической энергии."\n\nОскар кивнул. — "Конечно, мой господин. Лес грязи постепенно восстановит свою былую славу.""
 cityfoul.1013.d_alt: ""КАК они называют этот лес?" — Потребовал Грогар ответ от своего самого верного помощника Брэя.\n\n"Для большей прозрачности, это название грубо переводится как..."\n\n"Это был риторический вопрос," — сказал Отец. — "Сколько бы я ни смотрел на низшие расы, они каждый раз умудряются ещё больше разочаровать." — Он вздохнул. — "Котоптицы не только дали ему позорное имя, но ещё и опустошили лес, срубив половину него и вырезав местных монстров. Потребуются десятилетия, если не века, чтобы лес восстановился!"\n\n"Вы, к сожалению, правы," — кивнул Брэй. — "Однако ярость не ускорит прогресс."\n\nГрогар фыркнул. — "Правда. В любом случае, ты знаешь, что надо сделать. Депортируй местных грифонов подальше от лесных участков, собирай любые возможные излишки биомассы и используй местные лей-линии для получения магической энергии."\n\nБрэй кивнул. — "Конечно, мой господин. Лес грязи постепенно восстановит свою былую славу.""
 cityfoul.1013.a: "Какая дикость."
 
 cityfoul.1014.t: "Это должны быть сделано"
 cityfoul.1014.d: "Лес Эйгсик был хорошо известен козам, но они всё равно были удивлены, обнаружив, что он кишит гигантскими разумными пауками. Хуже всего то, что эти пауки сильно опекали местное население пони и, казалось, управлялись какой-то магической силой. Поскольку они встали на пути Грогара, у него не было другого выбора, кроме как уничтожить пауков. Однако те продолжали появляться и нападать на монстров и коз. Даже сам лес, казалось, ополчился против козлиного рода.\n\nГрогар помнил, как тысячелетия назад он посещал лес Эйгсик и восхищался его безмятежной красотой. Теперь это место было наводнено пони, расой, которая когда-то бросила ему вызов и изгнала. Они осквернили сам лес. У него не было иного выбора, кроме как полностью уничтожить это древнее место. Одинокая слеза скатилась из его красного глаза, когда он отдал приказ огнедышащим химерам сжечь весь регион.\n\nВскоре гигантский пожар охватил весь Эйгсик, сжигая деревья, бесчисленные столетия жившие бок о бок с пауками, которые могли бы быть друзьями козьего рода. В итоге не осталось ничего, кроме пепла и обугленных мертвых деревьев."
 cityfoul.1014.a: "Самая ужасная трагедия за всю историю."

 cityfoul.1015.t: "Навсегда свободен"
 cityfoul.1015.d: "Я долго ждал того дня\n\nДабы прогнать жадных волков от себя\n\nТеперь магия - моё спасенье\n\nПодойдите за благословеньем\n\nМы... будем... стоять на страже Вечнодикого!\n\nУзрите лик природы во всей красе\n\nНе нужно бояться стервятников у двери\n\nЯ смогу вас защитить\n\nЗа этими стенами шипов\n\nНавсегда свободен во веки веков!\n\nПоверьте мне, это ради вашего же блага\n\nНе бойтесь, природа ваш друг\n\nВся красота, что нас окружает\n\nКаждый прекрасный цветок создан для того, чтобы защищать нас\n\nМы... будем... стоять на страже Вечнодикого!"
 cityfoul.1015.a: "Мы будем свободны вечно."
 
 cityfoul.1016.t: "Напоминание о поражении"
 cityfoul.1016.d: "Грогар стоял на холме и смотрел на парящий вдалеке облачный город Клаудсдейл. Даже спустя столетия он всё ещё был смутно узнаваемым, несмотря на все перемены.\n\nИ пусть город был перенесён в совершенно другое место, Грогар до сих пор помнил ту роковую битву, которая произошла неподалёку от него. Глупая пони по имени Гасти повела армию воинов-единорогов навстречу Ему. Он был уверен, что сможет уничтожить её жалкие войска в одиночку. Когда единороги сформировали магический луч, чтобы связать Его, он использовал силу страха и разорвал путы. И всё же Грогар был слишком высокомерен и недооценил своего врага. В хаосе битвы Гасти удалось украсть Чарующий Колокол, источник его силы, и использовать артефакт, чтобы изгнать козла и Тамбелон в Измерение Тьмы.\n\nГрогар хорошо выучил урок смирения. Больше он никогда не будет недооценивать вероломство и хитрость низших рас. А Клаудсдейл... должен быть уничтожен. Пусть урок и усвоен, но Ему не нужно напоминание о собственных ошибках, совершённых множество лет назад.\n\nГрогар фыркнул и отвернулся, спускаясь вниз с холма, пока сотни летающих монстров направлялись к облачному городу."
 cityfoul.1016.a: "Этого больше не произойдёт."

 cityfoul.1017.t: "Хранилище магии"
 cityfoul.1017.d: "Ключ-Озеро было известно не только своей уникальной формой на карте, но и своими магическими свойствами. Подобно волшебным лесам, оно располагалось на пересечении магических лей-линий. Таким образом, озеро похоже на источник силы, из которого любой способный маг может черпать энергию. И на этом его уникальность не заканчивается, ведь холодные воды полны странных существ, которых больше нигде нельзя найти.\n\nСо времён последнего визита Грогара к Ключ-Озеру на его берегах обосновалось значительное количество чейнджлингов. Это напомнило ему о необходимости изучить способность этой расы к изменению собственного облика на случай, если удастся привить данную черту монстрам. Впрочем, скорее всего это не получится сделать, поскольку способность казалась скорее магической, чем биологической по своей природе. Другими примечательными обитателями озера были полярные медведи, которые почему-то оказались разумными. Насколько знал Грогар, эта раса всегда по уровню развития была на уровне животных. Но, по-видимому, они в какой-то момент обрели разум и даже основали собственную примитивную цивилизацию. Он сделал вывод, что козы больше не смогут использовать полярных медведей для создания медвежуков, поскольку по моральным соображениям разумные существа не должны преобразовываться в материал для биомантии. Тем не менее, Ключ-Озеро будет очень полезным в качестве источника магической силы, если ему не найдётся другое применение."
 cityfoul.1017.a: "Это будет полезным."

 cityfoul.1018.t: "Секреты жизни и смерти"
 cityfoul.1018.d: "Козы добрались до ещё одного места, полного магической энергии, однако обнаружили нечто совершенно неожиданное. Ковен некромантов основал здесь собственный город, располагающийся на вершине старого хранилища для неудачных козлиных экспериментов. Грогара позабавили беспочвенные старые слухи о том, что Он когда-то был некромантом. Он не испытывал особого уважения к этой магической отрасли. На самом деле козёл вообще не считал это искусством, в отличие от биомантии. Некромантия заключалась в манипулировании мёртвой и гнилой плотью, переработке старого, а не создании нового. И хотя эта ветвь магии была достаточно могущественной, а также могла быть использована для обретения бессмертия, то же самое было верно и для биомантии.\n\nДля того, чтобы играться с трупами не нужно особых навыков, а в биомантии, наоборот, требуется предельная точность и расчёт, дабы организмы выжили и функционировали. Несмотря на все эти мысли, Грогар всё ещё считал некромантов потенциальной угрозой и приказал уничтожить их всех. Любые немёртвые животные, найденные в регионе, могут быть повторно использованы для создания живой биомассы. Большой запас различных костей тоже будет крайне полезным."
 cityfoul.1018.a: "По крайней мы сможем извлечь что-то полезное из этого."
 
 cityfoul.1019.t: "Освобождение Козказа"
 cityfoul.1019.d: "Козлестан был не единственным местом в мире, где проживало немало козлов. В горах Козказа на северо-востоке Эквестрии также обитали десятки тысяч коз, которые тысячелетиями страдали от тирании эквестрийских пони. С возвращением Грогара на них стали смотреть как на пятую колонну и относиться к ним как к потенциальным врагам. Многие из них были допрошены или помещены под домашний арест. Поэтому, когда армии монстров наконец прибыли, местные козлы возрадовались и вновь обрели свободу.\n\nОгромный праздник прошёл в горах, музыка эхом отдавалась в долинах. Вечеринка продолжалась далеко за полночь. К тому времени, когда взошло солнце, козы блаженно спали, довольные тем, что теперь они в безопасности и на свободе."
 cityfoul.1019.a: "За это мы и сражаемся."


