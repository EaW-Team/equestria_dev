### Characters
 FRN_donkey_chief: "Брэй"
 FRN_donkey_chief_desc: "§gБрэй – верный слуга Грогара, ставший ключевой фигурой в деле его возвращения. Это асстирийский осёл, родившийся в простой семье. Большая часть его взрослой жизни прошла в охране караванов, но всё изменилось, когда он обнаружил кристальный шар, зарытый в песках Зебхары.\n\nАртефакт заговорил с ним, и после недолгих сомнений Брэй ответил. Поначалу он хотел выбросить шар, однако магическая сила принудила его оставить находку себе. Вскоре Брэй начал доверять таинственному голосу, и тогда шар предложил ему сделку: Грогару был необходим верный слуга, который поможет провести ритуал призыва, а в обмен на это Брэй будет вознаграждён. И тот согласился.\n\nОн беспрекословно следовал инструкциям артефакта, став буквально воплощением воли Грогара. Теперь же пришло время получить заслуженную награду.§!"

 war_justification.301.e: "Грогар"
 SUPPLYAREA_439: "Давным-давно, в далёкие времена, я, Грогар, могущественный повелитель плоти, выпустил на волю огромное зло. Я дал жизнь самым нечестивым монстрам и дал им свободу, забирая то, что принадлежит мне по праву и уничтожая остальное. Моё правление было величественным, эпоха страха и тьмы.\n\nНо глупая пони по имени Гасти бросила мне вызов! Она не смогла победить меня в открытом бою. Прежде чем я смог нанести смертельный удар, она украла мой Чарующий Колокол. Ей удалось открыть портал в другое измерение и отправить меня и мою столицу, Тамбелон, в Царство Тьмы.\n\nОставшиеся козлы потеряли контроль над монстрами и наше правление пришло к концу. Нас массово истребляли, а оставшиеся в живых разбежались по всему миру, потеряв остатки магии и интеллекта по пути. Их никто не боялся.\n\nНе все козлы позабыли о своём прошлом. Некоторые ждали столетиями, выжидая, когда звёзды вновь встанут в ряд, чтобы я вновь смог вернуться к правлению миром. Их терпение было вознаграждено. Отец монстров вернулся, и дрогнул мир в ужасе." # я загазлайтил хорса запихнуть сюда отсылку на самурая джека я доволен

 ZAI_gote: "Готэ"
 ZAI_gote_desc: "Али Мухаммад бин Хасан бин Ладан бин Мухаммад Фархан бин Азиз, также известный как Готэ, родился в семье эмигрантов-козлов из старого Тамбелона. Они разошлись с Грогаром по вопросам доктрины и, опасаясь его мести, поселились в землях Оската, где в городе Кольтбылия и родился Готэ. В окрестных землях клан козлов основал свою неофициальную общину под названием "Козистан", а его отца изгнанники признали своим вождём.\n\nВ юности отец Готэ предупреждал его о мрачных тайнах старого Тамбелона и рассказывал истории о жестокой тирании Грогара. Отец хорошо обучил своего сына и не сомневался, что вырастил достойного наследника. Однако, повзрослев, Готэ предпочёл забыть отцовские наставления и отправился в мистические земли Азира, где, по легендам, находилась родина козлов.\n\nПо воле судьбы Готэ явился как раз в тот момент, когда Грогар вновь обрёл свои силы. Древний козёл легко одурачил юнца и заставил служить ему. И по сей день не совсем ясно, понимает ли Готэ, кому именно он служит..."

 ZAI_pomni: "Пом"

 ZAI_gary: "Гэри Козловский"
 ZAI_gary_desc: ""В первую эпоху, в самой первой битве, когда тени только-только удлинились, сражался он.\n\nТот, кто избрал путь вечных мучений.\n\nВ своей лютой ненависти он не находил покоя и с кипящей кровью рыскал по окутанным теням равнинам, стремясь отомстить извращённым пони, что лишили его славы.\n\nИ те, кто испробовали на вкус стали безжалостного топора, прозвали его...\n\nГэри Козловским.""

