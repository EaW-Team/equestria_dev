l_russian:

 brodfeld_rework.173.t: "Истории дюн"
 brodfeld_rework.173.d: "Дорогой дневник,\n\nПосле долгого и трудного приключения сегодня караван, наконец, пришёл в точку назначения, а именно город-оазис Азир. Впрочем, называть это городом будет большой лестью. На самом деле это была всего лишь куча палаток да небольших торговых прилавков. И, тем не менее, это самое большое поселение во всём пустынном регионе. Наши запасы воды заканчивались к концу путешествия, поэтому мы вместе с измученными жаждой верблюдами каравана с наслаждением бросились к пресной воде. Местные дикари были достаточно гостеприимны, поскольку подобные караваны вполне привычное для них дело. Однако зебры проявили ко мне особое любопытство, поскольку, похоже, они никогда в своей жизни не видели пони из Эквестрии. Гид перевёл их слова, сказав, что они восхищались цветом моего окраса.\n\nПосле короткой передышки я направился к своей основной цели, а именно загадочным руинам неподалёку от поселения. К счастью, мой осёл-гид знал наилучшую дорогу, поэтому мы уверенно направились вдаль по песчаным дюнам. Когда мы забрались на очередную из них, мне, наконец, удалось увидеть эти самые руины, из-за чего у меня откровенно отпала челюсть от изумления. Возвышающиеся над окружающим пространством монолитные чёрные камни были наполовину погребены под песком и, похоже, простояли здесь множество веков. И подобные постройки виднелись повсюду. Это была попросту бесценная находка для археолога вроде меня!\n\nМы вместе с гидом спустились вниз по дюне, чтобы посмотреть на эти руины поближе. У меня буквально всё внутри переворачивалось от нетерпения! Слухи оказались правдивыми, и мне удалось обнаружить находку, которая точно прославит меня на всю Эквестрию. Тем не менее, на моём лице эти мысли не отразились, и в дороге у меня на лице отражались только профессионализм и собранность, а в блокнот попутно вносилось множество записей. Впрочем, пока мы вдвоём бродили по этим руинам, мне повезло наткнуться на нечто особенное, наполовину скрытое под грудой мусора, а именно идеально круглую сферу. Мой гид был ещё больше восхищён моей находкой, чем я. На мой вопрос об этом шаре он ответил, что данное сокровище было утеряно несколько веков назад. Совместно нам удалось вытащить эту сферу из мусора, не повредив в процессе. Это была воистину потрясающая находка. А ещё, если смотреть прямо в неё, то создавалось впечатление, будто ты глядишь прямиком в бездну..."
 brodfeld_rework.173.a: "..."

 yale.137.t: "Загадка"
 yale.137.d: "Дорогой дневник,\n\nПриятно вновь вернуться в цивилизацию, хотя, печёт в Кольтфагене сильнее, чем в Азире, возможно это из-за большой влажности. Однако, я сюда прибыл не для использования благ цивилизации и сразу отправился в местный университет. Мне надо было узнать, правдива ли информация гида о кристальном шаре. Был ли это магический артефакт? Можно ли его использовать для открытия гробницы? Я не был уверен, был ли там кто-то, кто мог ответить на эти вопросы, но я их как-нибудь найду. Я обязан.\n\nЯ встретился с местными археологами и представил свои фотографии и записи о руинах в пустыне. Джентльзебры были впечатлены, заявив, что это требует дальнейшего изучения. Они не были готовы к тому, какой артефакт я им покажу. Сказал им, что нашёл его с помощью гида, но они были слишком заняты любованием кристальным шаром. Один из них всё-таки меня услышал, сказал, что они с радостью готовы принять шар в коллекцию для дальнейшего изучения, но я отказался, заявив, что шар отправится со мной в Эквестрию.\n\nК сожалению, зебры знали о руинах и шаре ещё меньше меня. Печально, конечно. Покинув университет, я опять встретился с гидом. Он сказал мне, что если я бы хотел узнать больше о шаре, мне надо встретиться с определёнными козлами, обладающими нужными знаниями. Он дал мне список с шестью странными именами, уточняя, что только они смогут ответить на его вопросы. Придётся найти способ связаться с ними и договориться о встрече. Я настроен решительно. Загадка кристального шара должна быть решена."
 yale.137.a: "..."

 flowena.129.t: "Обратно домой"
 flowena.129.d: "Дорогой дневник,\n\nКак же хорошо вернуться в Кантерлот. Однако мне некогда было расслабляться, поскольку у меня ещё презентация на носу. Многие уважаемые пони собрались, чтобы выслушать мой рассказ о находке в пустыне Зебхара. Даже принцесса Твайлайт Спаркл посетила это собрание! Но мне удалось не поддаться волнению. Мой рассказ о находках был спокоен, как и демонстрация фотографий с места раскопок руин и презентация теорий об их истории. Аудитория была довольна и наградила меня громкими аплодисментами, что очень мне польстило.\n\nВпрочем, о кристальном шаре и вещах, о которых рассказал мой гид-осёл, так никто и не узнал. У меня появилось ощущение, что этой информации... ещё недостаточно, чтобы быть опубликованной. Всё, что у меня есть, – это разрозненные записи, которых явно недостаточно, чтобы сформировать полноценную картину. И это раздражало меня. Таким образом, мне ничего не оставалось, кроме как вновь отправиться в путешествие, дабы встретиться с теми самыми козлами, которые, похоже, могут рассказать больше об этом кристальном шаре. Я не могу спать спокойно, пока эта тайна не раскрыта. Мне нужно отыскать правду. Это моя обязанность.\n\nПосле недолгих раздумий мой выбор пал на..."
 flowena.129.a: "...Оскара в Катерине."
 flowena.129.b: "...Абрама в Йаки-Клане."
 flowena.129.c: "...Рэйчел в Центральнозебриканской Империи."

 baltimare.47.t: "Сбившись со следа"
 baltimare.47.d: "Дорогой дневник,\n\nК сожалению, у меня не получилось найти одну из шести моих целей. Страна, в которой она находилась, была аннексирована другой нацией, а личностью, которую я ищу, пропала без следа. Без всех шести лиц у меня, скорее всего, не получится разгадать эту тайну. Но, тем не менее, я не сдамся, слишком много уже было сделано, чтобы так просто всё бросить. Это расследование продолжится, невзирая ни на что. У меня есть чувство, что мне по силам достигнуть успеха. Что это моя обязанность."
 baltimare.47.a: "..."

 katerin.152.t: "Оккультист"
 katerin.152.d: "Дорогой дневник,\n\nСегодня моей остановкой стали тёмные земли Катерина, места, где живёт Оскар. Я не имею ни малейшего понятия, почему он решил жить в этих ужасных землях. Лес Шайсвальд ещё хуже, чем Вечнодикий, но, тем не менее, грифоны добровольно живут здесь, подвергаясь регулярным атакам магических монстров. Я восхищаюсь их храбростью... и жалею за глупость.\n\nЧтобы попасть в страну мне пришлось путешествовать вверх по течению реки Гриффкинг, а потом потратить ещё несколько часов в вагоне, чтобы добраться до столицы, поскольку город был перенесён подальше от реки несколько лет назад. По словам местных, это был приказ Безумной Принцессы, да и я мог видеть остатки брошенных зданий на берегах могучей реки. Странно, но это почему-то напомнило мне руины в Азире. По прибытии в [KAT.Capital.GetName] я начал спрашивать разных грифонов о том, слышали ли они об Оскаре. Никто не узнавал имени и не слышал ни о каких козах, и только одна священница смогла дать ответ. Она рассказала о том, где живёт Оскар и что он на самом деле оккультист, который даёт теологические советы местному духовенству, а также обладает обширными знаниями в области магических тайн. Мне было сложно поверить словам жрицы, как и тому, что козёл сможет мне дать хоть немного научно обоснованный совет. Но его имя было в списке, поэтому у меня не было другого выбора, кроме как довериться ему.\n\nОскара не интересовала встреча, пока не зашёл разговор о сфере. Он сразу же открыл мне дверь своего дома и объяснил, что был занят поеданием религиозной литературы, дабы впитать содержащиеся там знания. Мне лишь оставалось закатить глаза и рассказать о том, где мне удалось найти сферу и что рассказал мой гид. В ответ козёл подтвердил правдивость всего этого. Кристальный шар мог быть использован, но для этого потребуются все шестеро коз. Затем сфера дарует видение о настоящем ключе от гробницы. Если это правда, то шар сам по себе не может её открыть, но артефакт все ещё нужен, чтобы найти скрытый ключ. Оскар сказал, что рано или поздно лично приедет в Эквестрию, чтобы увидеть кристальный шар собственными глазами."
 katerin.152.a: "..."

 haukland.42.t: "Редактор"
 haukland.42.d: "Дорогой дневник,\n\nПутешествие в Йаки-Клан было сложным. Не только потому, что страна была крайне изолирована от внешнего мира, но и ещё из-за ужасного состояния дорог в горах, которые только ещё больше замерзали из-за местного климата. Мне даже пришлось нанять телохранителя из-за слухов о том, что яки как-то линчевали эквестрийцев.\n\nПусть местные и были неприветливы, но по прибытию в [JAK.Capital.GetName] мне удалось пересилить себя и походить вокруг поспрашивать об Абраме. Многие отказывались со мной даже говорить, но один молодой як, который заявил, что ненавидит нынешнюю власть и их политику изоляционизма, был рад рассказать мне о том, где я могу найти козла. Этот Абрам работал редактором новостей для правительства.\n\nОн был рад видеть меня, пусть и был занят... работой. Козёл в прямом смысле поедал новостные статьи, написанные сторонниками якякистанской политики. Официально он был редактором, но по факту просто живой машиной по уничтожению бумаги. Как только Абрам закончил свой... обед, мы обсудили мои находки. Он рассказал, что на самом деле эти руины далеко не открытие, поскольку все козы всегда знали о них. Другие расы не были в курсе о них, поскольку все упоминания были кропотливо удалены. Однако он отказался говорить почему. Впрочем, козёл рассказал, что эти руины были очень древними и сохранились только благодаря сухому жару пустыни. Абрам заявил, что этим руинам больше пяти тысяч лет, и пусть у меня были сомнения по поводу правдивости этих сведений, не удивлюсь, если это правда. Ещё он сказал, что хочет увидеть кристальный шар лично, дабы удостовериться, что я говорю правду. Похоже, работа редактором привила ему некоторую долю скептицизма."
 haukland.42.a: "..."

 dragon.3.t: "Гений"
 dragon.3.d: "Дорогой дневник,\n\nМне удалось вернуться в пустыню Зебхару. Однако моей точкой назначения был не Азир. Пока нет. Вместо этого моим пристанищем стала небольшая лодка, идущая вверх по Нейлу. Государство [CZR.GetNameDef] было моей целью, а точнее – его столица, [CZR.Capital.GetName]. Это была опасная затея: регион в последнее время был далеко не спокойным, но торговцы, чей путь совпадал с моим, наняли опытных охранников, так что путешествие обещало быть безопасным.\n\nКогда каноэ прибыло, купцы отправились на базар торговать с местными. Моей же целью была Рэйчел. Большая часть местного населения – зебры, которые никогда в жизни не видели пони, но, как мне кажется, некоторые из них должны были видеть коз. И, разумеется, после того как я нарисовал козу на песке, один из жителей указал мне направление.\n\nДом Рэйчел представлял собой самодельную мастерскую или лабораторию. Она явно была изобретательницей и обладала соответствующим складом ума. Это... довольно необычно, поскольку большинство коз, которых мне доводилось встречать, были откровенно туповаты. Как только она увидела меня, то тут же начала засыпать вопросами – кто я и что здесь делаю. В итоге мне пришлось многое о себе рассказать ещё до того, как разговор зашёл о руинах и кристальном шаре. И ни разу за весь диалог моя собеседница не проявила ни малейшего признака скуки.\n\nРэйчел сказала, что кто-то явно хотел, чтобы этот шар был найден именно мной. Это ценный артефакт, и его давно бы обнаружили и украли, если бы он пролежал в куче мусора столько веков. Расхитители гробниц буквально облазили всю пустыню Зебхару и до сих пор роются в руинах. Это было неожиданно, но если подумать, слова Рэйчел звучали логично. На мой вопрос о том, зачем кому-то подкидывать мне этот шар, она ответила, что «они» хотят помочь мне открыть гробницу, в которой содержится нечто ценное. Она не уточнила, кто такие эти «они» или какая именно гробница должна быть найдена, но Рэйчел тоже очень хотела узнать, что скрывается внутри. Поэтому она вызвалась помочь мне всем, чем сможет."
 dragon.3.a: "..."

 temple.12.t: "Следующая остановка"
 temple.12.d: "Дорогой дневник,\n\nПосле встречи с одним из козлов мне удалось столько всего узнать о загадке кристального шара. Но впереди было ещё столько всего неизведанного, поэтому мне надо решить, куда следует идти дальше. Каждое путешествие обходится мне в крупную сумму, но с крупным займом мои затраты не должны быть проблемой. Решение этой грандиозной загадки куда важнее мелочи вроде моих личных сбережений."

 wittenland.153.a: "Рэнди в государстве [MIT.GetName]."
 wittenland.153.b: "Джайлз в государстве [BUF.GetName]."
 wittenland.153.c: "Гор в государстве [LMB.GetName]."

 MAN_ELF_new.1852.t: "Менеджер"
 MAN_ELF_new.1852.d: "Дорогой дневник,\n\nМоё путешествие на корабле подошло к концу по прибытию в Астерскую гавань, после чего начались поиски Рэнди. Я считаю, что это будет несложно, поскольку он работает на известного минотавра по имени Айрон Вилл. И, разумеется, поспрашивав о нём местных, мне удалось узнать его адрес. На нашей встрече он сначала подумал, что я покупатель, который заинтересован в его семинарах по увеличению самоуверенности, поэтому сказал, что отошёл от дел несколько лет назад. Мне пришлось объяснить свои намерения по встрече с Рэнди, из-за чего он сначала очень удивился, но потом всё же согласился организовать встречу. Козёл всё ещё работал в качестве помощника Айрон Вилла даже после его возвращения домой из Эквестрии. После моей просьбы дать нам поговорить наедине, минотавр покинул нас.\n\nПосле моего рассказа Рэнди позабавил факт, что я смог найти один из самых ценных артефактов козлиной расы. Он упомянул, что именно пони были ответственны за деградацию его расы, пусть козёл и не таил злобы за древние события. Рэнди полушутливо сказал, что теперь козлы нуждаются в пони, и мне выпала честь стать тем, кто искупит грехи моей расы в прошлом. Пусть он это и сказал с юмором, у меня создалось впечатление, что на самом деле подтекст этих слов был куда серьёзнее.\n\nКозёл согласился помочь мне, сказав, что смог сохранить достаточно денег, чтобы прибыть в Эквестрию, если это надо. Мне оставалось лишь поблагодарить его и надеяться, что Айрон Вилл не против заимствования его менеджера."
 MAN_ELF_new.1852.a: "..."

 austurland.999.t: "Шаман"
 austurland.999.d: "Дорогой дневник,\n\nКак же было прекрасно в кои-то веки путешествовать по Эквестрии, а не плавать по морям и сталкиваться с пограничным контролем множества стран. Моей точкой назначения был Тихий Запад, земли, где жили бизоны, всё ещё самоизолировавшиеся от всех вокруг, несмотря на попытки Эквестрии интегрировать их. И пусть между пони и бизонами было несколько конфликтов в прошлом, я понадеялся на их гостеприимство в отношении любопытного путника.\n\nРазумеется, пусть они и отнеслись ко мне скептически, бизоны всё же позволили мне войти в их поселение. На мой вопрос о том, слышал ли кто-то о Джайлзе, его узнали моментально. Он был шаманом-эзотериком и единственным козлом, о котором знали бизоны. Так как тот жил один в пустыне, мне пришлось продолжить своё путешествие дальше. К счастью, молодая бизониха помогла мне с дорогой, ведь она отлично знала местные тропы.\n\nШаман жил в одиночестве в палатке рядом с небольшим источником воды, пробивающимся среди сухих камней. Джайлз выскочил из своего жилища почти моментально, как только услышал наши шаги, и попытался атаковать, размахивая длинной палкой с неприкрытой угрозой. К моему облегчению, бизониха смогла угомонить его и сказать о моём желании с ним встретиться. Ввиду того, что мы были не одни, мне пришлось опустить в рассказе сведения о кристальном шаре. Из-за этого шаман был не особо заинтересован в разговоре, но, к счастью, вскоре бизонихе наскучило нас слушать, и она ушла посмотреть окрестности. Только тогда у меня появилась возможность рассказать об артефакте, после чего козёл моментально воспрял духом.\n\nОн начал что-то частить о давно минувших днях, когда его раса правила миром. Джайлз сказал, что руины, которые мне удалось найти, на самом деле являются §RТАМБЕЛОНОМ§!, древней столицей всего козьего рода. А ещё он рассказал о старом пророчестве: «Когда звёзды сойдутся в один день, город воспрянет и обретёт старую славу».\n\nРазумеется, это всё было абсолютной бессмыслицей, но Джайлз крайне желал увидеть шар глазами, поэтому мы договорились встретиться ещё раз."
 austurland.999.a: "..."

 equestriancolony.5.t: "Жрец"
 equestriancolony.5.d: "Дорогой дневник,\n\nПутешествие в Ламбет было сложным, поскольку эта земля окружена горами почти со всех сторон, а местные жители не очень дружелюбны к чужеземцам. Прибытие в [LMB.Capital.GetName] сегодня было настоящим облегчением, однако я решил не останавливаться на отдых и продолжить поиски Гора. Ламы и альпаки оказались достаточно высокомерными существами и не хотели со мной даже общаться. Некоторые из них даже плевали в меня с презрением! Но этого было недостаточно, чтобы поколебать мою уверенность, и вскоре мне удалось увидеть в храме существо, которое не принадлежало ни к одной из распространённых в Ламбете рас. Он был занят своей «проповедью», громко блея перед аудиторией, поэтому мне ничего не оставалось, кроме как терпеливо ждать. Когда я спросил, он ли Гор, козёл кивнул, сохраняя бесстрастное выражение лица и не выдавая никаких мыслей.\n\nМне пришлось продолжить говорить и объяснять, почему я здесь нахожусь. Но на лице моего собеседника всё ещё не было никаких эмоций. И только когда в разговоре зашла речь о кристальном шаре, он наконец улыбнулся. Козёл сказал, что с помощью этой сферы можно найти и сам Колокол. Похоже, шар был ключом к гробнице, о которой мне довелось услышать раньше. Она была утеряна целые тысячелетия назад, однако козлы всё равно каким-то образом знали, как её найти. Просто у них не было нужды это делать до сегодняшнего дня. Козёл сказал, что нам необходимо достать артефакт как можно быстрее, поскольку гробница может быть открыта только в определённый день. Мне пришлось сделать расчёты и перенести их на Эквестрийский календарь, и получилась дата – 9 сентября 1009 года.\n\nИз его речи мне удалось понять далеко не всё, да и Гор сам явно что-то скрывал. Но мы нужны были друг другу, поэтому всё же согласились сотрудничать. Только так главная тайна могла быть раскрыта."
 equestriancolony.5.a: "..."
