l_russian:
 hippogriff_folder:0 "Технологии гиппогрифов"
 hippogriff_folder_desc:0 "Промышленные, социальные и военные технологии, присущие расе гиппогрифов."
 hippogriff_race:0 "Раса гиппогрифов"
 hippogriff_race_desc:0 "Гиппогрифы – четвероногая раса, обитающая на горе Арис. В целом они похожи на грифонов. Передняя половина гиппогрифа напоминает орла, но они выше ростом и задней половиной напоминают лошадь, а не кошку. Теории о том, что гиппогрифы являются гибридом лошадей и грифонов, не подтвердились. Кроме того, гиппогрифы могут использовать осколок волшебной жемчужины трансформации, чтобы превращаться в морских пони. В этой форме они становятся водными рыбоподобными существами. В обеих формах они преимущественно плотоядны и питаются в основном рыбой."
 TITLE_HIPPOGRIFF_SEAPONIES_SUBTITLE:0 "МОРСКИЕ ПОНИ-МОРПЕХИ"
 TITLE_HIPPOGRIFF_ENGINEERING_SUBTITLE:0 "ИНЖЕНЕРИЯ"
 TITLE_HIPPOGRIFF_RECON_SUBTITLE:0 "РАЗВЕДКА И ОБНАРУЖЕНИЕ"
 TITLE_HIPPOGRIFF_COMBINED_SUBTITLE:0 "ОБЩЕВОЙСКОВАЯ ВОЙНА"
 TITLE_HIPPOGRIFF_ENDURANCE_SUBTITLE:0 "ВЫНОСЛИВОСТЬ"
 tech_seaponies:0 "Морские пони-морпехи I"
 tech_seaponies_desc:0 "Способность дышать под водой и плавать подобно рыбам значительно облегчает проведение морских операций."
 tech_seaponies2:0 "Морские пони-морпехи II"
 tech_seaponies2_desc:0 "Морские пони-морпехи и техники могут проводить ремонтные работы в затопленных отсеках, что снимает одну из самых важных проблем в морском бою."
 tech_seaponies3:0 "Морские пони-морпехи III"
 tech_seaponies3_desc:0 "Обычно штурм пляжей – смертельно опасное дело, где одна ошибка приводит к катастрофе. Но у нас под водой могут быть целые передовые базы: госпитали, припасы, связь. В таких условиях бой за пляж перестаёт быть чем-то особенным."
 tech_seaponies_a:0 "Морские пони-морпехи IV"
 tech_seaponies_a_desc:0 "Хотя тяжёлое снаряжение всё ещё приходится доставлять на лодках, новая артиллерия может быть разобрана и перевезена эскадронами морских пони, а затем собрана прямо на пляже для обеспечения огневой поддержки."
 tech_seaponies_b:0 "Морские пони-морпехи V"
 tech_seaponies_b_desc:0 "Наши морские пехотинцы, будучи хорошо подготовленными и способными действовать под водой, на суше и в воздухе, представляют собой удивительно самодостаточную боевую силу. Они могут выживать на скудных припасах длительное время и наносить удары в стиле «бей-беги», даже когда ресурсы на исходе."
 tech_seaponies_c:0 "Морские пони-морпехи VI"
 tech_seaponies_c_desc:0 "Наши морские пехотинцы способны добывать припасы с кораблей и подводных тайников даже во время тяжёлых боёв. Это позволяет нам продолжать сражение ещё несколько дней после того, как у других сил боеприпасы давно бы закончились."
 tech_hippogriff_engineering:0 "Инженерия высокого давления"
 tech_hippogriff_engineering_desc:0 "Мы многому научились, строя значительную часть нашей инфраструктуры под водой. Наши инженеры знают, как справляться с нагрузками и напряжениями, которые заставили бы представителей других видов опустить копыта или когти."
 tech_hippogriff_engineering2:0 "Редкие водные материалы"
 tech_hippogriff_engineering2_desc:0 "На морском дне можно найти множество прочных материалов, которым можно найти применение как в магии, так и в обычной инженерии."
 tech_hippogriff_engineering3:0 "Взмывающая ввысь архитектура"
 tech_hippogriff_engineering3_desc:0 "Гиппогрифы всегда тяготели к величественному, а гора Арис вдохновляла их на строительство шпилей и небоскрёбов."
 tech_hippogriff_engineering4:0 "Форма следует за функцией"
 tech_hippogriff_engineering4_desc:0 "Философия дизайна гиппогрифов подчёркивает гармонию эстетики и практичности. Всё создаётся интуитивно: наши инженеры одновременно художники и технические специалисты. Они гордятся элегантностью своих разработок."
 tech_hippogriff_engineering5a:0 "Гидродинамика I"
 tech_hippogriff_engineering5a_desc:0 "Тела морских пони – шедевр гидродинамики. Мы вдохновились ими и создали корабли, которые рассекают воду подобно рыбам."
 tech_hippogriff_engineering6a:0 "Гидродинамика II"
 tech_hippogriff_engineering6a_desc:0 "Наши новые суда скользят по воде, создавая меньше шума и волн, чем прежние конструкции."
 
 tech_hippogriff_engineering5b:0 "Аэродинамика I"
 tech_hippogriff_engineering5b_desc:0 "Тела гиппогрифов – шедевр аэродинамики. Мы вдохновились ими и разработали изящные самолёты, способные легко менять курс, что крайне полезно в воздушных боях."
 tech_hippogriff_engineering6b:0 "Аэродинамика II"
 tech_hippogriff_engineering6b_desc:0 "Следующее поколение гиппогрифьих самолётов поднимет аэродинамику на новый уровень: модели с низким сопротивлением смогут достигать невероятных скоростей."
 tech_hippogriff_recon:0 "Глаза вверху и глаза внизу"
 tech_hippogriff_recon_desc:0 "Наши наблюдатели могут занимать отличные точки обзора как высоко над землёй, так и глубоко под волнами, обнаруживая врагов, которые считают себя хорошо спрятанными."
 tech_hippogriff_recon2:0 "Разведчики-морские пони"
 tech_hippogriff_recon2_desc:0 "Разведчики-морские пони сопровождают наши корабли, выслеживая вражеские суда и предупреждая о возможных угрозах."
 tech_hippogriff_recon3:0 "Передовые команды подрывников"
 tech_hippogriff_recon3_desc:0 "Наши разведчики могут подобраться к противнику благодаря способности ходить, летать и плавать. Мы обучим их диверсиям и минному делу, чтобы они могли наносить ущерб бронетехнике и складам снабжения врага."
 tech_hippogriff_recon4a:0 "Абордажные команды"
 tech_hippogriff_recon4a_desc:0 "Абордаж может казаться устаревшим в век современных орудий, но возможность подплыть к врагу и затем влететь на борт делает эту тактику весьма жизнеспособной."
 tech_hippogriff_recon4b:0 "Тысяча укромных уголков"
 tech_hippogriff_recon4b_desc:0 "Картирование русел рек и донных участков водоёмов значительно облегчает подводное передвижение."
 tech_hippogriff_recon5:0 "Продвинутая тактика коммандос"
 tech_hippogriff_recon5_desc:0 "Спецназ – гордость Ариса. Он одинаково уверенно действует на суше, в воде и в воздухе. Ежедневные тренировки позволяют им перехитрить врага на любом театре военных действий."
 tech_hippogriff_recon6:0 "Полное превосходство на море"
 tech_hippogriff_recon6_desc:0 "Никто не сражается в воде так, как мы. Наш флот объединяет абордажников, воздушных наблюдателей и подводное охранение в единое, элегантное целое."
 tech_hippogriff_combined:0 "Мы умеем плавать!"
 tech_hippogriff_combined_desc:0 "Пересекать водоёмы становится куда проще, когда можно просто превратиться в рыбу."
 tech_hippogriff_combined2:0 "Воздушно-морская война"
 tech_hippogriff_combined2_desc:0 "Авианосец – чистейшее воплощение арисского стиля войны: корабль перевозит самолёты, чтобы те уничтожали другие корабли."
 tech_hippogriff_combined3a:0 "Прирождённые летуны"
 tech_hippogriff_combined3a_desc:0 "Высота – куда меньшая проблема для нас, чем для других видов: мы можем просто взлететь на хребты и вершины, получая идеальные точки обзора."
 tech_hippogriff_combined3b:0 "Интегрированное охранение морских пони"
 tech_hippogriff_combined3b_desc:0 "Патрули морских пони способны обнаруживать вражеские торпеды и предупреждать корабли об опасности."
 tech_hippogriff_combined4:0 "Универсальная морская подготовка"
 tech_hippogriff_combined4_desc:0 "Не каждый солдат может стать морским пехотинцем. Но каждый должен уверенно чувствовать себя и в форме гиппогрифа, и в форме морского пони – и знать, как использовать последнюю для преимущества."
 tech_hippogriff_combined5:0 "Трёхмерное мышление"
 tech_hippogriff_combined5_desc:0 "Для нас естественно мыслить в трёх измерениях. Это позволяет воздушным силам теснее взаимодействовать с сухопутными войсками, а корректировщикам – точнее направлять огонь морских батарей."
 tech_hippogriff_combined6:0 "Многослойный бой"
 tech_hippogriff_combined6_desc:0 "Армия, флот и ВВС будут сражаться как единое целое. Каждый род войск будет понимать других на инстинктивном уровне и поддерживать их."
 tech_hippogriff_endurance:0 "Сильны, как гора"
 tech_hippogriff_endurance_desc:0 "Мы, гиппогрифы, опираемся на фундамент горы и на дно океана, и потому умеем создавать долговечные вещи."
 tech_hippogriff_endurance2:0 "Прикладная регенерация"
 tech_hippogriff_endurance2_desc:0 "Мы приспособлены к физическому преобразованию тела и обладаем способностью к перестройке тканей, которую можно использовать для ускоренной регенерации."
 tech_hippogriff_endurance3:0 "Полупогружённые редуты"
 tech_hippogriff_endurance3_desc:0 "Другие существа ненавидят, когда их укрепления заливает водой. Для нас же это дополнительный слой защиты. Главное – следить, чтобы снаряды не попадали в воду: гидравлический удар – точно не ваш друг."
 tech_hippogriff_endurance4:0 "Океаностойкое снаряжение"
 tech_hippogriff_endurance4_desc:0 "Наше снаряжение создано так, чтобы выдерживать постоянное воздействие солёной воды. Оно удивительно прочное."
 tech_hippogriff_endurance5:0 "Война в океанских впадинах"
 tech_hippogriff_endurance5_desc:0 "Хотя даже мы не выдержим давления самых глубоких впадин, учения в менее глубоких дали нам много знаний – например, как устанавливать магнитные мины с помощью плавников или вырывать укрытия в твёрдой породе."
 tech_hippogriff_endurance6:0 "Трансформация во время боя"
 tech_hippogriff_endurance6_desc:0 "Менять форму сложно, привыкать к новой – тоже. Но обучение солдат трансформации под давлением даст нам непревзойдённую тактическую гибкость."
 HIP_MW_unexpected:0 "Тактика неожиданного удара"
 HIP_sfp_barrage:0 "Тактика подавляющего огня"
 HIP_MA_relentless:0 "Тактика безостановочного нападения"

