### characters ###
 ROA_servius_sindisiwe:0 "Ззет Зеебтах"
 ROA_kaiser_augustus:0 "Кайзер Август"
 ROA_kaiser_augustus_desc:0 "§YРодился§!: 29 февраля 960 года в Роаме\n\n§YБиография§!: После интенсивного обучения в университете Бикавии Август вернулся в Роам с мечтой. Во время учёбы он питал пылкую страсть к истории взлёта и падения Империи Грифонов. Связи его богатой семьи позволили жеребцу по возвращении занять должность заместителя командующего первой объединённой армией зебр Ассини, созданной для противостояния Королю Шторму.\n\nНо тиран-йети повернул на север, а не на восток. Думая, что они в безопасности, коррумпированные знатные семьи городов потребовали разоружения созданного ополчения в пользу своих грифонов-наёмников. Однако после таинственного исчезновения своего непосредственного командира Август воспользовался возможностью нанести ответный удар. Он настроил призванных в ополчение зебр против знати и их элитных грифонов-наёмников и впервые объединил народ Ассини под единой властью.\n\nТеперь Август, ставший бесспорным лидером Роама и зебр центрального Чисимби, не остановится ни перед чем, чтобы объединить всех зебр под своей властью.\n\n§YАвтор портрета§!: BunnyShrubby"
 ROA_flavoniusa:0 "Флавониус"
 ROA_lansin:0 "Лансин Влесса"
 ROA_valcostus:0 "Валькостус"
 ROA_dassal:0 "Дассаль Тессандри"
 ROA_dassal_desc:0 "§YРодился§!: 15 мая 963 г.\n\n§YБиография§!: Семья легата Дассаля веками торговала магическими амулетами, и он не был бы исключением, если бы не его детская дружба с Августом. Даже сегодня его знание современной военной тактики и особенно технологии делает его ценным сотрудником кайзеровских войск.\n\n Теперь же, став могущественным легатом, Дассаль призывает к осторожности. Земля Юго-Восточной Зебрики так же опасна и неспокойна, как и ее моря, и достаточно одного неверного шага, чтобы утонуть в амбициях. Его долгосрочные планы и вспыльчивый характер могут показаться противоречивыми, пока не поймешь, что последнее обычно служит первому.Его собственные идеи о процветающем Юго-Востоке хорошо продуманы и тщательно проработаны, но не могут быть реализованы из-за вмешательства других легатов... или самого кайзера.\n\n§YПортрет от автора§!: BunnyShrubby"
 ROA_kaiser_dassal_desc:0 "§YРодился§!: 15 мая 963 г.\n\n§YБиография§!: Семья легата Дассаля веками торговала магическими амулетами, и он не был бы исключением, если бы не его детская дружба с Августом. Даже во время службы Кайзеру его знания из других стран о современной военной тактики и особенно технологиях делали его ценным активом легионов Августа.\n\n Теперь же, став могущественным императором, Дассаль призывает к осторожности. Земля Юго-Восточной Зебрики так же опасна и неспокойна, как и ее моря, и достаточно одного неверного шага, чтобы утонуть в амбициях. Его долгосрочные планы и вспыльчивый характер могут показаться противоречивыми, пока не поймешь, что последнее обычно служит первому. Теперь, когда он достиг абсолютной власти, его собственные идеи о процветающем Юго-Востоке хорошо продуманы, тщательно проработаны и неодолимы, если только он сам их не испортит.\n\n§YПортрет от автора§!: BunnyShrubby"
 ROA_alsa:0 "Альса Вессари"
 ROA_Marius:0 "Марий Айронкросс"
 ROA_Marius_desc:0 "Родился: 15 сентября 979 года, Аркстури\n\nМарий Айронкросс – незаконнорождённый сын богатого аристократа и рабыни-пони. После смерти отца в 996 году он был быстро продан в качестве домашнего слуги генералу из Кваггатая и научился многим трюкам, подслушивая военные собрания. После распада Королевства Шторма он оказался в Зумидии, где некоторое время работал на автомобильном заводе гиппогрифов, а затем вернулся в Роам и начал военную карьеру. За проявленную инициативу при штурме города Аурелисс Кайзер назначил его легатом."
 
