EYE_occupation_cat:0 "Старый добрый грабёж!"
EYE_occupation_cat_desc:0 "Народ йети никогда не жил так богато, как в те времена, когда дирижабли Короля Шторма свозили награбленное на родину. Наверняка там ещё осталось чем поживиться и нам? Нужно лишь действовать тщательнее, чем он, и забрать всё, что не прибито гвоздями."
