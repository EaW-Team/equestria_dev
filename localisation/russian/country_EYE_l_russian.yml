EYE_wardecs_cat:0 "Великий Поход"
EYE_wardecs_cat_desc:0 "Некогда Король Шторм поставил половину Зебрики на колени. Хотя он не смог удержать завоёванные земли, он показал миру, на что способен народ йети. Последуем же этому примеру и напомним всем прочим расам, кто является истинным хозяином континента!"

