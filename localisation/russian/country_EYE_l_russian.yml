EYE_gel_war_cat:0 "Дальнейшие амбиции"
EYE_gel_war_cat_desc:0 "Теперь, когда ситуация стабилизировалась, можно вновь обратить взгляд вовне. Как оказалось, метод Краваша – просто расстреливать всех подряд – всё же работает. Мы можем использовать его и дальше, расширяя наши границы и покоряя любого, кто осмелится встать у нас на пути."

EYE_gel_puppets_cat:0 "Укрепление нашего контроля"
EYE_gel_puppets_cat_desc:0 "Вместо того чтобы пытаться установить прямое управление, куда надёжнее поддерживать империю, предоставляя местным жителям ограниченную автономию – своего рода подачку. Всегда найдутся те, кто готов сотрудничать с новыми хозяевами. В награду за их верность мы посадим этих полезных идиотов на руководящие должности и получим своё "местное представительство"."

##Starting ideas and their derivatives

EYE_council_dominance:0 "Господство Совета"
EYE_council_dominance_desc:0 "Впервые в новейшей истории сердце цивилизации йети оказалось под властью чужеземцев. Но сторонники Древнего Пакта напрасно принимают это за победу, ибо день ото дня задетая гордость обитателей острова толкает их на борьбу во имя свободы.\n\nСовет, возглавляющий эту труднейшую из зон оккупации, оказался в незавидном положении, сколь бы необходимой ни была его работа. Йети обретут свободу, но по чужой воле – иначе новый Король Шторм и ещё полдесятка лет катастроф – а то и больше – снова станут реальностью."
EYE_forced_disarmament:0 "Принудительное разоружение"
EYE_forced_disarmament_desc:0 "Разоружение побеждённых – ожидаемый исход любой войны. Но пацифизм, навязанный целому народу, якобы гордящемуся своими варварскими нравами, ранит куда глубже. Кучке заговорщиков достаточно лишь горстки стволов и пары умных голов, чтобы развязать кампанию, достойную нового Короля Шторма, а потому это необходимо пресечь. Так и было сделано... Хочется верить. Так говорят."
EYE_war_reps:0 "Военные репарации"
EYE_fully_open_borders:0 "Полностью открытые границы"
EYE_fully_open_borders_desc:0 "На первый взгляд, политика открытых границ практически лишена этических изъянов, позволяя каждому свободно путешествовать туда, куда ему заблагорассудится. Но открыть покорённый остров для посещения гражданами его же завоевателей – задача, не решаемая простой моральной арифметикой. Тем более когда угроза расправы вполне реальна как для любого иностранного предприятия, так и просто для обычного туриста, которому не повезло оказаться гиеной, гаргульей или кентавром..."
EYE_crippled_economy:0 "Подорванная экономика"
EYE_crippled_economy_desc:0 "Остров – дважды павший, дважды опозоренный – теперь стремительно катится в пропасть. Монеты и прочая валюта разлетаются по ветру, словно пыль, ускользая от непрестанно множащихся нищих и обездоленных. И всё это – под бдительным взором новых владык Глаза."
EYE_political_crackdowns:0 "Политические репрессии"
EYE_political_crackdowns_desc:0 "Для народа, пережившего ужас злодеяний Короля Шторма и его преемников, насильственное затыкание ртов, что ныне пронизывает Мандат, может показаться лицемерием. Но крики «Довольно!» и «Больше никогда!» вырываются из измученных душ – даже если они принимают странный облик. В конце концов, если однажды сам тиран принёс с собой тьму и неописуемые кошмары, то выжившие готовы на всё, лишь бы не терять бдительности, лишь бы не сомкнуть глаз."
EYE_council_balance:0 "Баланс Совета"
EYE_council_balance_desc:0 "В последнее время Мандат всё чаще привлекает йети в высшие эшелоны власти – тех, кто неравнодушен к плачевной судьбе своего острова. Конечно, действующие члены Совета могут сколько угодно твердить, что это лишь медленный и коварный захват власти в интересах очередного зебриканского диктатора, однако такой шаг, по крайней мере, помогает убедить граждан, что их голос имеет значение. И что немаловажно, когда речь заходит о делах Совета, они начинают задумываться о том, чтобы взяться за лопату, а не за автомат."
