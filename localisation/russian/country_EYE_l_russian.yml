##Characters##

EYE_council:0 "Совет Мандата"
EYE_council_desc: "Что представляет из себя Совет Мандата? Этот консорциум гиен, гаргулий, кентавров и йети, управляющий всем островом?\n\nДля Древнего пакта и его королевской созидательницы они авангард порядка и здравомыслия, единственная цель которых – навсегда сокрушить наследие Короля Шторма. Несмотря на расовое разнообразие, Совет стремится поддерживать мир, что является непростой задачей, учитывая необходимость выступать посредником во всех конфликтах в средоточии культуры йети. Однако важно учитывать временный характер Мандата: этим чужакам нельзя задерживаться надолго, зная, что в конечном итоге у измученных коренных жителей должно появиться государство, – а также и достойная этика, – которым они смогут гордиться. И лишь только когда эта цель будет достигнута – Совет покинет свой пост. Но до тех пор он и его силы безопасности останутся, чтобы помочь восстановить ситуацию.\n\nДля йети – это олицетворение контроля, подпитываемое страхом иностранцев перед неизвестным. Они – дети войны Короля Шторма, поэтому в глазах Пакта они осквернены и подозреваются в самых ужасных деяниях. Если иго Пакта будет смягчено и будут устранены лишь самые вопиющие проявления тирании старого Короля, тогда, возможно, удастся достичь компромисса. Но если жители материка будут говорить о прогрессе, одновременно принуждая к повиновению всех, кто осмелится выйти за рамки дозволенного, то йети станут настоящей головной болью для своих новых лидеров."
EYE_curadka:0 "Курадка" #Comma-claim
EYE_curadka_desc: "Сколько он себя помнил, йети всегда были лишь «воинствующими племенами» Зебрики – и, казалось, иначе быть не могло. Он родился слишком поздно, чтобы попасть под призыв в безумные войны Короля Шторма, но достаточно рано, чтобы трудиться на острове Шторма, отправляя припасы за море. На плечи Курадки легло бремя трёх войн: ещё подростком он застал, как Король Шторм железом и кровью сшивал Земли Шторма воедино; юношей потерял отца, павшего в ходе покорения всего континента; а затем, уже молодым рабочим, надрывался на заводах, пока наследники Империи Шторма ожесточённо рвали друг другу глотки.\n\nПоявился слабый луч надежды, когда Древний пакт положил конец бесконечной бойне. И хотя установленный им Мандат над островом вскоре обернулся диктатурой, а затем стремительно распался, эту надежду он продолжал бережно хранить. Власть одного существа никогда не принесёт его народу мира. Освобождение от новых владык – нет, освобождение от собственного мрачного прошлого – стало их последним шансом. Вскоре этим смутным надеждам придал идеологическую форму гиена по имени Рааксан, исповедующий Кайлидскую веру. Его призыв разорвать цепи прошлого и устремиться к добродетельному будущему стал прочным фундаментом для нового политического эксперимента – Чидхору.\n\nМожно было ожидать, что столь идеалистичный освободитель, ведущий за собой целую армию, окажется могучим исполином, неустанно превозносящим собственные свершения во имя народа йети, зебр и всех прочих. Но именно здесь и проявляется величайшая добродетель Курадки – скромность. Он маленький и хрупкий, а сам признаёт себя мастером лишь в одном: вдохновлять других верить в лучшее завтра, в единство народов, во всё истинное и прекрасное."
EYE_kravash:0 "Краваш Тандеркрашер" #Comma-claim
EYE_kravash_desc: "Когда Король Шторм пал в битве при Эйн-Тротгуре, его сыновья и дочери показали себя недостойными. Ни промышленные махинации Иквуса, ни религиозный пыл Виндборн, ни благосклонный к зебрам прагматизм Ибыз, ни магические артефакты Тандарии не могли заменить простую силу Короля Шторма. Да и чего стоят генералы и полководцы без рядовых солдат? Без героев, способных голыми руками поднять врага и размозжить его? А величайшим и самым достойным йети в истории – по его собственному мнению – является сам Краваш.\n\nЗакалённый ветеран Войны Шторма, он прошёл через всё: испытал на себе и лишения, и славу, прошагав путь от Южной Зебрики до самых окраин Гиппогрифии. За годы странствий и после них Краваш приобрёл известность как странствующий громила, которого охотно нанимали во время гражданской войны те, кто надеялся переломить ход очередного малозначительного сражения. Но вскоре он понял, что и эти претенденты на власть слишком хитры и трусливы, чтобы быть достойными трона. Король Шторм просто... правил. Завоёвывал. И если бы он не занимался грабежом, то, возможно, жил бы и по сей день. И именно эту ошибку Краваш не повторит.\n\nТолько посмотрите на него! От него исходил смрад, который был присущ только ему; именно его физическая мощь повергла Мандат Пакта, и теперь, если ему дать достаточно времени, она обрушится на всю Зебрику. Для него нет никакого вероучения, и, с последователями, достаточно сильными, чтобы пробиться сквозь что угодно, этого вполне достаточно. К ужасу всего континента, никакой более глубокой идеи у Краваша нет – лишь неприкрытая «вторая попытка» повторить злодеяния Короля Шторма... просто ради самого процесса, ради того, чтобы сильные могли доказать силу, и почти ни ради чего больше. Для Доминиона Йети сила – единственная добродетель, и остальному миру придётся считаться с ним, когда он смело смотрит каждому в глаза; всем этим важным правителям с их забавными понятиями вроде дипломатии и реальной политики. И говорит лишь одно: «Нападайте»."
EYE_raacsan:0 "Рааксан" #Comma-claim
EYE_raacsan_desc: "Первый принцип Кайлидской веры – мимолётность. Всё находится в постоянном движении, а настоящее всегда служит лишь переходом между прошлым и будущим. Для такого последователя, как Рааксан, оставаться на одном месте было невозможно. Ему нужно было приспосабливаться и воплощать собой перемены.\n\nПосле победы Гиении над йети его потянуло в земли, которые совсем недавно были покорены клинками его народа. Прежде всего, баланс сил изменился: гиены, прежде угнетаемые йети, теперь заняли господствующее положение, и Рааксан не мог не отправиться туда, чтобы собственными глазами увидеть, как Пакт обращается с йети в самом сердце родных земель этого народа. Его разочарование бессердечием, поразившим новое начальство, было неизмеримым, а его день был безнадёжно испорчен, когда призывы к снисходительности с обеих сторон остались без ответа. Вскоре, с началом распада Мандата, за ним уже пришли с оружием.\n\nЛишь встретив Курадку, убеждавшего своих последователей, что впереди их ждёт нечто лучшее, Рааксан смог хотя бы поверить, что его не расстреляют в разгар продолжающейся революции. Но чем дольше он оставался рядом с этим кротким йети, тем больше видел в нём искреннюю душу, открытую духовному. И хотя сам Курадка так и не принял Кайлидскую веру целиком, третий и четвёртый её принципы – не быть пленником прошлого и устремляться к добродетельному будущему – глубоко запали ему в душу.\n\nПоскольку Рааксан никогда не был создан для сражений, ему поручили заниматься всей бюрократической работой молодого государства Чидхору. Но ещё важнее было другое: делиться с Курадкой знаниями и направлять его на путь просветления – как ради него самого, так и ради всех остальных, если верить его стремлению объединить юг."
EYE_harkon:0 "Харкон Блицболт"
EYE_harkon_desc: ""
EYE_kohrak:0 "Кохрак"
EYE_kohrak_desc:0 "Кохрак – чужак среди самих существ шторма. Он не разделяет представлений о власти, которых придерживается большинство: будто всякий, кто становится вождём йети, автоматически заслуживает их безоговорочной преданности. По мнению Кохрака, право называться истинным лидером народа нужно заслужить собственными делами – сражаясь в первых рядах, завоёвывая уважение простых йети личным общением или создавая новые методы и технологии, которые делают жизнь всего народа йети лучше. Кохрак считает, что тот, кто желает стать настоящим Королём Штормом, обязан лично браться за дело и не бояться испачкать лапы. Два предыдущих правителя были полной противоположностью: они не вели воинов в бой, не трудились бок о бок с простыми йети, а лишь отдавали приказы издалека, так и не став по-настоящему частью собственного народа."
EYE_pure_anarchy:0 "Полная анархия"
EYE_pure_anarchy_desc: "Тут царит анархия."
EYE_gel_frostwind:0 "Джил Фроствинд" #Comma-claim
EYE_gel_frostwind_desc: "Некогда Джил Фроствинд был всего лишь младшим офицером Короля Шторма, помогавшим поддерживать оккупационный режим Мейргипта. Однако едва Король пал и стало ясно, что дни Империи сочтены, он поспешил вернуться на родину, раздираемую междоусобицей. У него не хватило влияния, чтобы, подобно Иквусу и Ибыз, собрать вокруг себя собственную внушительную клику. Вместо этого он зарекомендовал себя способным заместителем, переходя на службу к тому претенденту на трон Глаза, который в тот момент казался наиболее перспективным, и столь же легко меняя сторону, когда считал это выгодным.\n\nНо когда Древний пакт вмешался во внутренние распри йети, именно на пепелище этих событий он встретил Краваша – а может, это Краваш встретил его. Этот демагог провозгласил грубую силу единственным спасением для жителей Земель Шторма. Рядом с ним – или даже без него – отчётливо ощущается влияние Тандеркрашера: безжалостный в наступлении, всегда готовый первым броситься в самую гущу боя вместе со своими последователями. Джил изменился не в лучшую сторону: он лишь самую малость сообразительнее самого Краваша, но в остальном точно так же ценит насилие. Всё прочее для него потеряло значение. Насилие и применение силы стали высшим смыслом и конечной целью жизни. Лишь время покажет, останется ли он в истории всего лишь фигурой, навеки затенённой славой Краваша, или сумеет стать чем-то большим."
EYE_iamidi_uzerasi:0 "Иамиди"
EYE_iamidi_uzerasi_desc: "Казалось бы, родиться перспективной наследницей семьи Узераси в богатом регионе Южной Зебрики – участь, которой многие могли бы только позавидовать. Но для Иамиди это оказалось бременем. Диплом в области финансов дал бы ей серьёзное преимущество почти в любой другой семье, однако Узераси были влиятельны настолько, что даже их «средний» представитель значительно превосходил большинство остальных.\n\nКогда казалось, что все возможности уже упущены, а другие члены рода успевали воспользоваться хаосом, охватившим Королевство Шторма, судьба неожиданно дала ей шанс: письмо, предложение о компромиссе и задача, успешное выполнение которой навсегда вписало бы её имя в число тех, кто определяет будущее Зебрики, а возможно, и всего мира. Ей было предложено стать главой финансового управления Союза Чидхору – более снисходительного государства йети, соседствующего с Зуахили. Саму же Иамиди направили к Курадке как представительницу семьи, рассчитывая через неё влиять на решения нового лидера для собственной выгоды.\n\nТеперь, занимая пост министра финансов в кабинете Курадки, Иамиди прекрасно понимает, какое место занимает в новой власти. Курадка может быть лицом и сердцем освободительного движения, но никакое освобождение не продлится долго без денег... А ключи от казны находятся именно в её копытах."
