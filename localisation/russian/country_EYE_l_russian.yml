mandate_anarchy.1.t:0 "Забудьте о свободных мандатах"
mandate_anarchy.1.d:0 "Никакие рваные костюмы и разбитые очки не могли скрыть того, что Вакууи – гиена, что в последнее время было равносильно смертельному приговору. Успев на последний тесный автобус, пропитанный страхом бегущих йети, гаргулий и кентавров, он направлялся к переполненным причалам, где беженцы буквально ходили по головам, лишь бы попасть на борт. Спрятаться среди хаоса – таким был его план.\n\nАвтобус вскоре промчался мимо разрушенных стен и арок. За главными магистралями почти каждая улица выглядела опустелой, словно заброшенной, а на дорогах стояли брошенные пропускные пункты с изображёнными на них символами Мандата.\n\nСвист пуль оглушил Вакууи, а затем, накрытый градом стеклянных осколков, он рухнул под тяжестью десятков безжизненных тел попутчиков. Приглушённые крики спереди сменились глухими ударами кулаков и ног – автобус оказался под новым "руководством". Вакууи уловил обрывки чужой ругани, и сидевший рядом гаргулья шёпотом описывал гиене происходящее: "Бандиты... Ищут сокровища под сиденьями и в моторе". Чьи-то лапы стали оттаскивать тела, под которыми он прятался, и так его укрытию и ставке на незаметность пришёл конец. Резкий рывок и выстрел – главарь бандитов упал, пистолет Вакууи задымился, а лапы моментально понесли его сквозь беснующиеся ряды беженцев мимо летящих пуль и взмывающих в воздух осколков бетона, чей свист сливался с воем сирен.\n\nВпереди на блокпосту показались йети. С оружием наперевес они взяли на мушку гиену, зажатого в толпе испуганных беженцев."
mandate_anarchy.1.a:0 "Вдали, под надрывный вой сирен, ворота порта начали закрываться."

mandate_anarchy.2.t:0 "Его лик"
mandate_anarchy.2.d:0 "На вершине утёса развевался изорванный флаг Короля Шторма и тлела едва угасшая надежда. Пушистые руки вздымали знамя высоко, словно маяк памяти о том, кем они были.\n\nИх священный дом, их родной остров превратился в осквернённую клетку, чьи железные прутья изогнулись подобно чужакам, шептавшим: "Так чувствовали себя ваши тысячи рабов!". Книги конфисковали, оружие ломали пополам, сувениры с ликом Короля Шторма сжигали, чтобы стереть в йети чувство собственного "я" и достоинства. Это был остров-тюрьма без надежды на освобождение и искупление.\n\nНа заброшенных стенах граффити вызывающе кричали о долге, по которому невозможно расплатиться, а заключённые выходили на свободу, неся с башен знамёна с ликом Короля Шторма – символом единства и стремления к освобождению. С балконов летели фотографии Пакта, на которых изображались сцены жестокости над жителями острова; со снимками, на которых йети, словно скот, гнали к собственным загонам.\n\nОсвобождённые, разорвавшие свои цепи существа шли по пыльным тропам и мощёным проспектам, направляясь в центр города. Предательская местность замедляла их марш, однако оставшиеся батальоны Пакта получили приказ любой ценой удержать дворец. Толпа в тысячу йети шла медленно – но была вооружена. Медленно – но с решимостью. Медленно – но ни перед кем и ни перед чем не останавливаясь. Со сводов арок и крыш, пусть и всего на один день, но лик йети-чьё-имя-попытались-стереть – Короля Шторма – озарил небеса и светом пролился на землю, провозглашая, что..."
mandate_anarchy.2.a:0 "...им больше не суждено быть разобщёнными и покорёнными."

mandate_anarchy.3.t:0 "Дезориентация"
mandate_anarchy.3.d:0 "Запершись в кабинете вместе с двумя такими же бюрократами (они занимали его с тех пор, как обнаружили, что это самое безопасное место во всём здании), гиена Хибин осторожно выглянул в окно. На улицах бесновались йети: громили витрины, врывались в магазины, вытаскивали жильцов из домов и тащили всё, что попадалось под руку. Казалось, они всё время куда-то спешили, поэтому коммерческий этаж в середине здания пока не привлёк их внимания. Это и позволяло троице оставаться незамеченной.\n\nГаргулья Гахист от скуки повесила дробовик на потолок. Привязать верёвкой спусковой крючок к двери, дождаться, пока какой-нибудь ничего не подозревающий псих её откроет, и устроить ему кровавый сюрприз.\n\nВ один момент кентавр Янсагуси привлёк к себе своих товарищей по несчастью, резко смахнув со стола карты и записи, которые сам же сделал. — Итак, поставки продовольствия снова перекрыты, все основные дороги постепенно становятся непроходимыми, а от нашего начальства – ни денег, ни вестей. Пересидеть это не получится.\n\n— Ну наконец-то до тебя дошло, — Гахист взвела дробовик. — Так мы наконец дадим им бой?\n\n— Чтобы они нас перебили?! — воскликнул Хибин так громко, как вообще можно сделать шёпотом. — Должен же быть способ как-то угомонить их! Они взбесились потому, что мы потеряли контроль над ситуацией. Мы можем добиться иностранной помощи... или пообещать им автономию!\n\n— Слишком мало и слишком поздно, — ответил кентавр. — И если мы хотим сохранить себе жизнь, лучший выход – уйти отсюда.\n\n— Но как же Подмандатная территория? Самоуправление? Все наши обещания?\n\n— Пусть управляют собой без нас. Гахист, хватит ворчать. Посмотри на это с другой стороны: если не переборешь свою внезапную жажду крови, ещё успеешь убить их позже. Ладно, все, собирайте всё, что сможете..."
mandate_anarchy.3.a:0 "Порядок с каждым днём всё слабее..."

mandate_anarchy.4.t:0 "Свято место пусто не бывает"
mandate_anarchy.4.d:0 "Двери тронного зала со скрипом распахнулись и туда тут же вошёл Курадка в сопровождении отряда йети и существ шторма. Внутри никого не было – прежние обитатели старого дворца Короля Шторма уже покинули его. Из зала унесли всё ценное, поэтому единственным примечательным предметом был сам трон.\n\nКурадка остановился перед ним, а его спутники рассыпались по комнате, чтобы обеспечить безопасность и убедиться, что она действительно пуста. Он в раздумьях уставился на пустое седалище из чёрного камня. На нём восседало множество существ: сам Король Шторм, затем претендующий на престол регент Иквус Хэйлсторм, после гиены, и теперь, наконец, трон принадлежал ему. Йети подумал про себя, что он – последний шанс для его народа на лучшее будущее. Курадка усмехнулся. Насколько же ужасной стала ситуация, раз из всех йети жители Земель Шторма обратились именно к нему в самый мрачный час?\n\nОн отвёл взгляд от трона, на котором когда-то сидели тираны, и понял, что остальные йети в комнате смотрят не на пустой трон, а на него самого – и в их глазах светились надежда и восхищение."
mandate_anarchy.4.a:0 "Этот трон принадлежит нам всем, а не только мне."

mandate_anarchy.5.t:0 "Конец экспедиции" #Comma
mandate_anarchy.5.d:0 "Осталось меньше сотни шагов – и он станет правителем. Краваш проложил себе кровавый путь сквозь древние залы, отделявшие его от трона Короля Шторма; ещё раньше его ружье и клинок успели утолить свою жажду крови.\n\nТам, в королевской спальне, лежала уязвимая сторона Мандата: политики и бюрократы, не способные оказать настоящего сопротивления – разве что схватиться за пистолеты и случайные острые предметы. Пуля куда угодно, только не в голову, – такова была их незавидная судьба. Они ещё могли пригодиться, рассуждал Краваш. Они могут стать свидетелями смены власти, громкого заявления о том, что последним, что они увидят в своих жалких жизнях, будет удар всепоглощающего шторма.\n\nЛишь бульканье крови нарушало тишину после этой почти всеобщей бойни. Рвота, слюна и прочие телесные жидкости покрывали холодный каменный пол; прекрасная кровь колонизаторов уродовала их безупречно скроенные костюмы. А по ту сторону, над всем этим, сам Король Шторм сидел на троне и улыбался – пусть лишь в глубинах воспалённого сознания Краваша. Каждый шаг к трону был кругом почёта, которым он упивался, облизывая губы, пока начиналось его царствование.\n\nКогда Краваш обернулся, чтобы занять трон, мир будто разделился на два рода существ: здоровых и живых йети с существами шторма, которых ожидала щедрая награда, и умирающих, которых подвозили целыми тачками, – тела громоздились в небольшие пирамиды, стонали, истекали кровью. Почти мёртвая, едва дышащая публика."
mandate_anarchy.5.a:0 "Возрадуйтесь."

mandate_anarchy.6.t:0 "Оратор"
mandate_anarchy.6.d:0 "В тёмном переулке города Болтпорт скрывался гиена-дервиш по имени Рааксан. Он прибыл сюда, чтобы проповедовать йети острова Шесть Принципов, но после восстания был вынужден скрываться от них. Без доступа к лодке или кораблю выбраться с острова было невозможно.\n\nКак раз в тот момент, когда он тяжело вздохнул от усталости и отчаяния, до него донёсся голос с улицы. Двигаясь ловко и бесшумно, как и подобает настоящему дервишу, он осторожно подкрался к выходу из переулка и выглянул наружу. Там он увидел йети, не похожего на тех, кого ему доводилось встречать прежде: стройного, мягко говорившего, но обладавшего голосом, полным убеждённости. Этот йети говорил о прошлом, настоящем и будущем своего народа. Он обращался к зачарованной толпе, рассказывая о том, что должно произойти, чтобы йети смогли подняться из грязи и раскрыть свой потенциал, который так долго подавляли прежние короли-тираны и переменчивые владыки; чтобы разорвать круг невежества и ненависти, державший их народ в цепях столь долгое время.\n\nСам того не желая, Рааксан глубоко вдохнул, собираясь с духом, вышел из переулка и присоединился к толпе, окружившей оратора. Ему казалось, будто слова этого йети озаряют всё вокруг, и в неверии осознал, что ему вовсе не было нужды распространять здесь Шесть Принципов – среди йети уже был тот, кто делал это за него. Нет, теперь Рааксан понял, что оказался здесь по иной причине. Он был здесь, чтобы служить стоявшему перед ним йети – йети по имени Курадка."
mandate_anarchy.6.a:0 "Возможно, всё было не так плохо, как он думал."

mandate_anarchy.7.t:0 "Возвращение повелителя"
mandate_anarchy.7.d:0 "Изысканный аромат духов объявил о его прибытии на переполненную, пропахшую потом площадь. Было непросто смыть с себя следы битвы, и по такому случаю он облачился в чистый мундир и надушился украденным одеколоном, чтобы выделиться на фоне остальных йети. У подножия платформы, увешанной десятком знамён с его лицом и старым реющим флагом Короля Шторма, ему не требовалось никаких жестов, чтобы привлечь внимание публики к себе.\n\n— Сегодня! — прогремел он, высоко подняв винтовку. Он наслаждался моментом, видя, как йети боролись между собой за право удостоиться краткого взгляда лидера. — Да, я обращаюсь ко всем вам! Сегодня – это славный день для всех нас, — за его спиной распустился гигантский стяг с самодовольным ликом Короля Шторма, и буря аплодисментов вызвала в нём гордость. — Но хватит слов! Расправимся же с врагом, как того бы пожелал сам Король Шторм!\n\nОн спрыгнул со сцены, указал винтовкой направление марша, и часть толпы, беспорядочно прорываясь через улицы, кинулась вслед за ним. Лик Короля Шторма на дешёвом полотнище возвещал их появление на каждом углу, а сам Краваш кричал в мегафон: "Как мы обретём силу? Как Король Шторм! Как мы завоюем свою свободу? Как Король Шторм! И как мы вернём себе растоптанную славу старых властителей Зебрики? Как Король Шторм!"\n\nОн так и не назвал своего имени, ибо народная молва сделает это за него. Молва о том, что именно Краваш помогал сломленным йети встать на ноги и делал их частью своего быстрорастущего войска вооружённых сторонников, и что именно Краваш гнал миротворцев Пакта одной простой фразой:"
mandate_anarchy.7.a:0 "Как Король Шторм!"

mandate_anarchy.8.t:0 "Кохрак"
mandate_anarchy.8.d:0 "Пока Курадка вёл по улицам Глаза Шторма вооружённую толпу своих сторонников, он внезапно остановился и поднял руку, давая знак всем остановиться. К ним приближалось одинокое, массивное существо шторма. Несколько йети Курадки подняли оружие и вполголоса выругались, но он остановил их, позволив молчаливому йети подойти ближе. С каждым его шагом Курадка слышал, как его последователи всё сильнее затихали по мере того, как напряжение нарастало.\n\nЗатем существо шторма, державшее в руках глефу, остановилось прямо перед Курадкой и подняло взгляд на более высокого йети. Не моргая и не отводя глаз, тот пристально смотрел в ответ. Боковым зрением Курадка видел, как один из его последователей целится существу в голову из винтовки. Наконец, оно подняло своё оружие...\n\n...и с силой вонзило его в мостовую, расколов камень. Затем существо шторма опустилось на одно колено и склонило голову в знак покорности. Увидев это, Курадка улыбнулся и медленно положил руку ему на плечо. — Можешь подняться, — сказал он. Существо шторма подчинилось. — Добро пожаловать в наши ряды. Впереди всех нас ждёт светлое будущее, и ты сделал правильный выбор, присоединившись к нашему делу."
mandate_anarchy.8.a:0 "Существо шторма кивнуло."

mandate_anarchy.9.t:0 "Преемственность"
mandate_anarchy.9.d:0 "Там, в густом облаке дыма, под свист солдат, размахивающих знамёнами своего любимого правителя, танцевали Кохрак и Краваш, обмениваясь тяжёлыми ударами. Это был не первый раз, когда войска военачальника, словно воры в ночи, проникали на территорию Кохрака, но в тот час, когда существо шторма уже было на полпути к месту атаки, его настигли скверные вести: было слишком поздно; его войска отступали для перегруппировки. Молниеносные атаки Краваша никогда не теряли темпа, его влияние никогда не ставилось под сомнение – вплоть до момента схватки с Кохраком, которую последний уже не мог выиграть.\n\nКраваш должен был признать – Кохрак был свирепым воином, который не боялся испачкать лапы и всегда вёл солдат в бой, оставаясь с ними даже в самой гуще сражения. В нём Краваш видел себя, и поэтому очень удивился, когда тот решился опустить оружие.\n\nСущество шторма сдалось, признавая превосходство Краваша, преклонив перед ним голову и колени в знак безмолвного уважения. Стоило Кравашу увидеть это, как он тут же оскалился в улыбке, а кулак, который он заносил для удара, раскрылся. Он протянул руку поверженному сопернику.\n\n— Было бы глупо растрачивать такой талант. Король Шторм гордился бы тобой. А теперь ты поможешь мне вернуть всё, что мы потеряли. Но перед этим тебе придётся потренироваться и набраться сил. Мне ты можешь проиграть, но вот служить мне, проигрывая врагам, уже не сможешь. Всё понял?"
mandate_anarchy.9.a:0 "Он готов послужить зарождающемуся дикому и ничем не скованному Королю Шторму."

mandate_anarchy.10.t:0 "Столкновение умов" #Comma
mandate_anarchy.10.d:0 "Город Тайфун не оправдывал своего названия – это был всего лишь разросшийся торговый пост на спокойном побережье океана. Но, насколько смогли выяснить Янсагуси и его команда, именно он был самым дальним форпостом Мандата. Только поэтому они и набились в автомобиль кентавров ради этой поездки.\n\n— Как я уже говорил, это был тщеславный проект одного из моих начальников, — продолжил Янсагуси. — Он осушил ручьи, чтобы создать искусственный канал. Закончить работу они так и не успели, но продвинулись достаточно далеко, чтобы осталось сухое русло. Проблема в том, что воду спустили слишком быстро и несколько рыбацких лодок застряли. Это случилось неделю назад.\n\n— И мы просто будем толкать лодку до моря? — заныл Хибин. — Почему ты раньше не рассказал нам об этом своём идиотском плане?!\n\n— Потому что ты бы всю дорогу ныл, — огрызнулся Янсагуси. — Хибин... Хибин! Сейчас не время трястись от страха!\n\n— П-почему в нас никто не стреляет?\n\n— Может, потому что здесь и правда всё заброшено? — вмешалась Гахист, передёрнув затвор дробовика, чтобы припугнуть труса. — Кто вообще станет стрелять по старой раздолбанной машине? Какие-нибудь безмозглые ублюд...\n\nРезко и внезапно мир содрогнулся и перевернулся. Оконные стёкла разлетелись осколками, а Хибин лишь теперь осознал, что произошёл взрыв. Его отбросило прочь. Каждая конечность, каждая мучительно ноющая лапа, каждая шерстинка – всё кричало от боли. Кровь хлестала, старые шрамы сочились гноем, смешиваясь с другими жидкостями, а он понимал, слишком хорошо понимал, как кошмары превращаются в ужасную реальность: смерть. Он хотел, чтобы всё уже закончилось, чтобы погрузиться во тьму, обрести покой, встретить быстрый конец, но он услышал иностранную речь – язык, который изучал, чтобы стать ближе к народу тех, кто теперь собирался его убить. Он слышал, вслушивался изо всех сил, но сквозь гул в повреждённых ушах доносилось лишь невнятное бормотание. Силуэты приближались, а в их руках виднелось ружьё. Сердце колотилось, а он повторял одно и то же: «Пожалуйста... пожалуйста... пощадите меня...»"
mandate_anarchy.10.a:0 "А затем – холодное ничто."

mandate_anarchy.11.t:0 "Тусовка в Мандате Глаза"
mandate_anarchy.11.d:0 "Следующей контрольной точкой для Кикру и его клики вооружённых гангстеров, с большой натяжкой называвшихся полком, было небольшое прибрежное поселение с портом, являвшимся последним выходом к материковой части Зебрики. Краваш приказал его банде ввалиться в город, а наряду с этим выполнить какое-нибудь стратегическое поручение. Детали миссии никого не волновали, чего нельзя было сказать про данное военачальником обещание: Краваш уверил их, что йети вернут себе всё, что когда-то завоевал Король Шторм – и это было самым главным.\n\nМногодневные гуляния в честь полка проходили под аккомпанемент свиста пуль и прорезавших воздух  артиллерийских снарядов. Кикру и сам стрелял из пистолета в воздух, озадачивая противоборствующую сторону и побуждая всё мирное население поскорее бежать без оглядки из города. Другие же городские фракции на горьком опыте поняли, что их здания превращались в руины даже при малейшей провокации. Всё это также было перемешано с обеденными перерывами, во время которых подчинённые Кикру обменивались украденным оружием и артиллерийскими установками, украшая их различными узорами, чтобы подчеркнуть "самобытность" вооружения, а также представить, сколько денег они смогут выручить за подобное оригинальное художество. Это стало неплохой темой для бесед, которые йети вели во время поимки и распределения всех не-йети по клеткам.\n\nНа третий день город сдался в лапы Кикру, что стало поводом для очередного пиршества. Все пережившие осаду здания стали собственностью полка, их домом, базой и многоэтажной столовой, обвешанной флагами с изображениями Краваша. Костры пылали, словно далёкие звёзды, а их пламя питал бесполезный хлам вроде ковров и картин, под уютное потрескивание которых йети громко спорили друг с другом о том, у кого на счету больше убийств. Последняя ночь закончилась охотой и жестоким (почти смертельным) кулачным боем, во время которого пламя отбрасывало от громадных фигур чёткие и массивные тени прямо на стены их базы.\n\nКикру откинулся на спинку седалища и сделал столь необходимый глоток из бутылки пива, восседая на горстке опилок и пуль: импровизированном троне из пороха."
mandate_anarchy.11.a:0 "Мне платят, чтобы я расстреливал их!"

mandate_anarchy.12.t:0 "Дерзкий налёт"
mandate_anarchy.12.d:0 "Рааксан, теперь уже полностью ставший частью освободительной армии Курадки, вызвался принять участие в операции, которую Курадка и непрестанно растущее число его сторонников проводили против складского комплекса Пакта. Используя навыки, приобретённые ещё в те времена, когда почти десять лет назад он сражался как дервиш за освобождение Гиении, Рааксан провёл порученный ему отряд вооружённых йети в обход опасных мест и патрулей, добравшись до склада в центре комплекса.\n\nРааксан оглянулся на йети позади себя, чтобы убедиться, что Курадка, находившийся среди них, был в порядке. На мгновение он задумался, почему такой йети, как Курадка, считает нужным лично участвовать в подобных операциях, но тут же упрекнул себя за то, что усомнился в том, за кем теперь следовал. Рааксан напомнил себе о доверии, которое ему оказали, и, собравшись с духом, тихо открыл дверь склада. Хотя внутри горел свет, никого из персонала Пакта там не оказалось, и он жестом приказал остальным следовать за ним. Они вошли, Курадка – последним. И как раз когда Рааксан сделал шаг к нему, вышел вооружённый винтовкой гаргулья и направил её на ближайшую цель – Курадку.\n\nМысли заметались. Рааксан бросился к йети и сбил его с ног в тот самый момент, когда один за другим прогремели два выстрела. Плечо пронзила резкая боль. Подняв голову, он увидел, что гаргулью уже застрелил один из товарищей. Затем он опустил взгляд на лежавшего под ним Курадку – невредимого и улыбающегося. Последней мыслью Рааксана перед тем, как потерять сознание, было то, что он станет обузой для своего отряда, потому что до конца операции им придётся нести его на себе."
mandate_anarchy.12.a:0 "Едва пронесло."

mandate_anarchy.13.t:0 "Добровольный убой"
mandate_anarchy.13.d:0 "Вакууи, сидя около рабочей кустарной радиостанции, выжидал нужного момента на заброшенной пристани в районе Штормовых Берегов, избегая лишнего внимания благодаря обветшалому внешнему виду окружавшей его местности. Прятавшиеся здесь остатки Пакта прикидывались скитающимися рыбаками и обсуждали грядущее опасное плавание в земли, исторически считавшиеся каркаданнистанскими, или даже дальше.\n\nПередачи, которые гиена принимал по радио, рисовали картину молниеносного захвата острова, в которой художник использовал широкие и грубые мазки, свойственные последователям дремучих идей Краваша:\n\n— Йети всех мастей! — из трещащих динамиков послышался голос йети-безумца. — Сегодня мы выкурили очередную заблудшую банду смутьянов, которая занимала земли, что никогда им не принадлежали! Я обращаюсь ко всем тем рабам, кто находился под каблуком этих никчёмных пиратов: с завтрашнего дня вы должны будете направить свои силы в правильное русло! Одолжите нам свои мускулы, силу и мощь! Я верю, что наши десятники достаточно компетентны, чтобы вести вас за собой, но что, если они проявят слабину? Займите же тогда их место! Это то, чего хотел Король Шторм! Его рабы были существами, которые думали сами за себя; кто стоял за созданием гениальных идей и затем доказывал их работоспособность кулаками! Станьте же величайшими рабами, которыми вы только можете стать!...\n\nВакууи повернул переключатель, заглушив эти и другие бредни, потёр глаза и пробормотал что-то невнятное себе в лапы. Позволять ребёнку играться с армией было очень опасным делом, особенно если этим ребёнком был капризный фетишист, вдохновлённый дуэлями и тяжёлой атлетикой. Краваш утверждал, что собирался восстановить порядок, но задумывался ли он о том, насколько губительным будет то, что он называл этим самым "порядком"?\n\n— Приём, — затрещало другое радио. — Готовьте лодки. В нашу сторону движутся машины йети, — размышления насчёт выскочки, пытавшегося восстановить правление Короля Шторма, могут подождать. Вакууи собрал сумки, отключил радиоустановку и направился в сторону некогда брошенной лодки."
mandate_anarchy.13.a:0 "Кто сильнее, тот и прав, а из-за "правых" появляются беженцы."

mandate_curadka.1.t:0 "Зов завтрашнего дня"
mandate_curadka.1.d:0 "Курадка стоял перед толпой йети. По правую руку от него находился Корак, по левую – Рааксан. Было странно видеть, что королю понадобились телохранители даже здесь; по толпе уже поползли шепотки о его слабости. Будто не замечая этого или попросту не придавая значения, хрупкий йети начал говорить.\n\n— Многие из вас, возможно, раньше обо мне не слышали и сомневаются в том, что я достоин вести вас за собой. И это нормально, — Курадка тепло и спокойно улыбнулся. — Прежде право на власть определялось лишь тем, кто стоял выше остальных; значение имели только сила и корона. Я не хочу стать ещё одним Королём Штормом. Более того, я вообще не хочу быть монархом, — когда ропот в толпе усилился, могучий йети справа от него заметно напрягся, готовясь к возможной стычке, но Курадка мягко остановил его, положив руку ему на плечо. — Я хочу стать тем, за кем вы сами захотите пойти. Хочу доказать всем народам, что методы йети не ограничиваются кровью или насилием. Что мы сами, без принуждения, способны выбрать другой путь, — когда гнев толпы постепенно пошёл на убыль и перешёл просто в приглушённый гул, Корак заметно расслабился.\n\n— Наш народ слишком долго считали разжигателями войн. Нас ненавидели и боялись... Меня эта предвзятость тоже не обошла стороной, — гиена слева от него неловко поёжился, но Курадка успокаивающе положил руку ему на плечо. — Но я понял, что измениться способен каждый. Что каждый имеет право жить и любить. «Даруй ближнему возможность познать блага, которых он никогда прежде не знал». Эти слова из Кристальной сутры, произнесённые гиеной с надеждой в глазах, глубоко тронули меня. Пусть я и не дервиш, но они научили меня тому, что нам есть чему учиться друг у друга, и что мы должны любить ближнего так же, как любим собственный народ, — на лице Рааксана появилась улыбка.\n\n— Прошу вас, не следуйте за мной слепо. Лучше храните надежду – так, как когда-то та гиена, как надеюсь сейчас я и, как мне хочется верить, однажды будет надеяться весь народ йети. Не на войну и не на избавление от нужды, а на простой мир. Благодарю всех, кто меня выслушал, — когда Курадка вместе со своими спутниками покинул трибуну, толпу охватил не восторг и не воодушевление, а куда более сложное чувство – тихая задумчивость. Не было слышно ни шёпота, ни единого слова."
mandate_curadka.1.a:0 "Для народа йети, возможно, открылся новый путь." 
mandate_curadka.2.t:0 "Радикс" #Comma
mandate_curadka.2.d:0 "Ибутузам и Агажолекси не горели желанием принимать в своих владениях очередного вождя йети, но его наивный вид заставил их задуматься, не упустил ли Король Шторм возможность расправиться с этим слабаком ещё во время войны. Неужели именно этот агитатор сумел поднять под своим знаменем весь Мандат, собрав армию, готовую идти за ним до конца?\n\n— Курадка, — начал Агажолекси, — давайте сегодня говорить прямо: с вашей стороны очень смело просить нас присоединиться к вашей стране, когда ещё совсем недавно мы страдали от рук ваших сородичей.\n\n— Разве плохо быть смелым? — Курадка даже говорил наивно! — Какой бы дерзкой ни была моя просьба, это всего лишь просьба. Вы вправе отказаться.\n\nВозможность просто отказаться ошеломила высокопоставленных зебр. Ибутузама беспокоило отсутствие у Курадки, казалось бы, самых элементарных навыков управления государством. Это выглядело почти жалко. Он решил подкинуть ему подачку. — Мы не можем отказаться от просьбы, которую ещё не выслушали до конца. О чём вы просите?\n\nКурадка развёл руки в стороны, открыв ладони, чтобы они оба смогли увидеть всю искренность его намерений. — Конфедерация равных. Устранив границы между нами – как настоящие, так и все остальные, – мы сможем помогать друг другу. Узераси будут править вместе с нами на правах соправителей. А дальше всё зависит от вас – не только от ваших способностей, но и от вашей нравственности, в которой я не сомневаюсь... Вам, несомненно, будет легче, чем нам, за плечами которых куда более жестокое прошлое. — Если что и обезоруживало его, так это его улыбка в конце.\n\n— Вы искренни, — заключил Агажолекси. В его голосе смешались ужас и облегчение. — Наивны? Не тогда, когда за вашими плечами стоит тысяча вооружённых существ. Но вы удивительно прямолинейны. — Ибутузам молча кивнул, давая ему продолжить. — Вы должны понимать, что просите о чрезвычайно многом, поэтому нам понадобится ваше сотрудничество. Должен предупредить: выполнить это будет непросто."
mandate_curadka.2.a:0 "Курадка оставался всё так же кроток. — Всё в порядке."
mandate_curadka.3.t:0 "Мост" #Comma
mandate_curadka.3.d:0 "Всё это напоминало эквестрийский детективный роман: поезд, идущий через странные земли в странные времена. Для Иамиди, финансистки Узераси, выбранной стать частью этого эксперимента по строительству нового государства, загадкой был тот, кто сидел рядом с ней. Этот добрый йети (она призналась себе, что подобные мысли были проявлением ксенофобии) выбрал именно её для столь важной задачи – служить делу тех, кто был связан с угнетателем народа. Выбрал с такой уверенностью, что Курадке даже не понадобилось проводить собеседование или хотя бы поговорить за чашкой горячего напитка: рекомендации одного из её родственников оказалось достаточно. Всё это заставило её задать один вопрос: «Почему?»\n\n— А почему нет? — спросил он в ответ, глядя на суровые, но разнообразные земли Глаза Шторма и его окрестностей. — Они доверяют вам, я доверяю им. Почему этим существом не можете быть вы?\n\n— Помогать своей семье и её союзникам – это совсем не то же самое, что управлять только что родившимся государством. Государством, чьё видение будущего, позвольте заметить, состоит в том, чтобы залечить раны, нанесённые нам жителями этого острова всего половину поколения назад. — Её слова повисли в воздухе, словно вопрос, требующий ответа.\n\n— Вы ведь компетентны? — начал Курадка. — У вас богатый набор навыков, а этого более чем достаточно, чтобы укреплять единство. Я тоже волнуюсь о том, что всё может пойти не так, беспокоюсь о нашем прошлом... Но я предпочёл бы смотреть в завтрашний день и думать о том, как мы можем отплатить вам за всё зло, которое причинили. Посмотрите на поля... — она тоже взглянула: за окном они расплывались из-за скорости поезда. — ...Сейчас они пусты, но когда-то были залиты кровью, пролитой из-за разделения. Будущим, где мы перестанем беспокоиться о том, кто мы – йети или зебры, жители Земель Шторма или Великих Озёр... и будем просто самими собой? От одной родственной души к другой, какую бы форму мы ни принимали. Я верю, что эта мечта не станет пустой тратой ваших времени и сил, мисс Иамиди."
mandate_curadka.3.a:0 "Расплывчатые, но искренние мечты, словно ему ещё предстояло их доказать..."
