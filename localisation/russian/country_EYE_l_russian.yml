EYE_gel_cleanup_duty_cat:0 "Навести порядок"
EYE_gel_cleanup_duty_cat_desc:0 "Может быть, Король Шторм был прав, когда отказывался присоединять завоёванные земли и просто их грабил. Идея Краваша построить огромную многорасовую державу, расстреливая всех подряд... мягко говоря не сработала. Теперь они все хотят нас убить – и это целиком его вина. Я бы с удовольствием его пристрелил ещё раз, будь у меня такая возможность."

