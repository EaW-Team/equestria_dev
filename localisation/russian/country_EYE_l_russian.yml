mandate_curadka.6.t:0 "Зуахили присоединяется к Союзу"
mandate_curadka.6.d:0 "Несмотря на многочисленные проблемы, омрачившие наши будущие отношения с Зуахили, зебры южного побережья по ту сторону моря решили присоединиться к нашему делу, полностью интегрируясь в наше правительство. Они не питают к нам никакой злобы и признают, что мы сильно отличаемся от Короля Шторма и его приспешников. Так что подобное решение служит знаком того, что положение йети и существ шторма в глазах мировой общественности, возможно, начинает меняться к лучшему."
mandate_curadka.6.a:0 "Такой мир действительно необходим."
mandate_curadka.7.t:0 "Зуахили отвергает Союз"
mandate_curadka.7.d:0 "Прощение – трудный путь, и, когда мы просим других оправдать нас в своих глазах, мы делаем это, понимая, что чаще всего нам будет отказано. Именно это и произошло с Зуахили, которое решительно отвергло наше предложение присоединиться к империи мира и любви.\n\nХотя подозрительность зебр по отношению к нам вполне оправдана, моральный расчёт в данном случае таков: другого выхода, кроме как привести их к нам силой, не существует."
mandate_curadka.7.a:0 "Мы будем творить добро, пусть и порознь..."
mandate_curadka.8.t:0 "Верхний Хэйзебленд соглашается войти в Союз!"
mandate_curadka.8.d:0 "Ещё совсем недавно Хэйзеб был подчинён одному жестокому господину за другим, и Король Шторм был лишь последним воплощением их общих страхов и ужасов. Однако, хотя некоторые предпочли бы независимость на уровне изоляции, многие поверили словам Курадки: пусть и чужеземец, но он всё же является источником свободы и самоуправления настолько, что за ним закрепилось прозвище «Маленький Освободитель».\n\nТак Верхний Хэйзебленд станет неотъемлемой частью Чидхорубанского Союза, получив полную свободу следовать своим обычаям и распространять благую весть о новых ярмах, которые ещё предстоит сбросить."
mandate_curadka.8.a:0 "Этот международный союз растёт, чтобы стереть не только рабство..."
mandate_curadka.9.t:0 "Верхний Хэйзебленд бросает вызов Союзу!"
mandate_curadka.9.d:0 "Бунтарский нрав Хэйзеба – пусть и вполне оправданный – к сожалению, настроил его против нас. Недавний опыт общения с Королём Штормом был лишь последней каплей в длинной череде трагедий, настолько основательно сломившей зебр, что сама мысль о передачи власти кому-либо, кроме кого-то вроде них самих, стала бы предательством.\n\nИ это не оставляет нам иного выхода, кроме как приветствовать их в объятиях Курадки под прицелом. Проклятая ирония... "
mandate_curadka.9.a:0 "...но всё же необходимая."
mandate_curadka.10.t:0 "Отречение"
mandate_curadka.10.d:0 "Сцена была готова для его просьбы. Посол-йети поднимался по ступеням над зданиями, которые, словно гигантский металлический штырь, соединили землю и небеса, благословляя его праведные шаги к матери их бывшего повелителя: Джавхарад, королеве, печально поглощённой ненасытным аппетитом своего времени и правительства.\n\nВ душе он проклинал паутину лжи и интересов, проглотивших прежде праведных дервишей. Курадка всегда лучше него разбирался в Кайлиде, но даже тех немногих знаний, которыми он обладал, было достаточно, чтобы осудить притворство преемницы, сидевшей перед ним и изображавшей королеву, но при этом не знающей – или не желавшей знать – о систематическом разорении родины. Его родины.\n\nПросьба была короткой и лаконичной, изложенной на языке, рассчитанном на то, чтобы сразу достучаться до сути и до её сердца: уступить Долину Грозовых Облаков Освободительной Армии Земель Шторма и позволить им жить в мире, изменяясь к лучшему без столь сильного вмешательства.\n\nА если нет – будет война."
mandate_curadka.10.a:0 "По ту сторону пролива бесстрашный Курадка ждёт."
mandate_curadka.11.t:0 "Глаз Бури смотрит в ответ" # Hyenia gets this
mandate_curadka.11.d:0 "Один из постулатов, не столь хорошо известный среди последователей Кайлидской веры, о котором Джавхарад не забыла, заключался в том, чтобы ценить времена, когда ничего не происходило. Перерыв, отсутствие чего-либо – всё это было подобно негативному пространству: даже у небытия существовала форма, и её следовало ценить, а не уничтожать бесконечной жаждой продуктивности.\n\nТак она и поняла, что проиграла в тот момент, когда прибыло существо из Глаза, а Масаска исчез. Ни оправданий, ни предупреждений... Иногда он пропадал в странные моменты, но совпадение было слишком идеальным, чтобы быть случайностью. Слишком идеальным, чтобы не быть испытанием для неё.\n\nЙети подтвердил название силы, которую представлял: Освободительная Армия Земель Шторма. Просьба была проста: отказаться от Долины Грозовых Облаков и позволить её жителям жить в мире, следуя за лидером, который вполне мог быть учеником Великой Просветительницы. Ирония была настолько густой, что её можно было разрезать когтями. Сражаться из тени лишь для того, чтобы выжить против безнравственного наследия Короля Шторма, и в итоге неосознанно согласиться на перемену, в результате которой кто-то другой придёт свергнуть её как тирана.\n\nПослу, провозглашавшему освобождение, позже предоставили достойное место проживания на всё время, пока королева обдумывала ответ. С одной стороны – признание поражения и того, что она заковала свободу во имя мира (никогда не задаваясь вопросом, чей именно мир она защищала). С другой – праведный отказ: йети снова ошибаются и должны задуматься, даже если для этого им придётся делать это посреди мира пепла и огня."
mandate_curadka.11.a:0 "Мы ошибались. Земли Шторма будут свободны!" #AI will always do this
mandate_curadka.11.b:0 "Они всего лишь изгои, не более. Наши клинки скрестятся..."
mandate_curadka.12.t:0 "[HYE.GetNameDef] уступает Долину Грозовых Облаков [Root.GetNameDef]!"
mandate_curadka.12.d:0 "Похоже, Джавхарад вняла разуму и увидела ошибочность своих действий: она отказалась от притязаний Гиении на Долину Грозовых Облаков, позволив Освободительной Армии и всем, кто от неё зависит, жить без угрозы отправиться на смерть против другого последователя Кайлидской веры.\n\nБолее того, королева гиен выразила глубочайшее сожаление по поводу «отступления от принципов Великой Просветительницы» при разрешении вопроса о Мандате. Однако ей не придётся беспокоиться о возмездии, поскольку Курадка протянул руку прощения самой Джавхарад. Это произошло после признания боли и страданий, которые жители Земель Шторма претерпели во время правления Древнего Пакта."
mandate_curadka.12.a:0 "Сегодня день освобождения, который следует отпраздновать!"
mandate_curadka.13.t:0 "[HYE.GetNameDef] отказывается возвращать Долину Грозовых Облаков!"
mandate_curadka.13.d:0 "Показная духовность королевы Джавхарад оказалась хрупкой: поддавшись странному убеждению, что Освободительная Армия «должна обдумать методы своего благого дела», она объявила нас государством-агрессором. Нетрудно заметить скрытую подоплёку её рассуждений: она (или её подданные) боятся повторения эпохи Короля Шторма.\n\nХотя мы знаем, что в разы лучше нашего грешного предшественника, похоже, Джавхарад не поверит в это, пока не предоставим ей неопровержимые доказательства наших перемен..."
mandate_curadka.13.a:0 "...даже если за них придётся платить кровью и жизнями."
mandate_curadka.14.t:0 "Просвет среди облаков"
mandate_curadka.14.d:0 "Выбить одновременно вооружённые силы трёх почтенных государств из долины и с острова, столько времени терзаемых Королём Штормом и последствиями его деяний? Стратегическое чудо, но для них это было привычным делом. Условия мира предложила сама королева гиен. В её понимании всё было кончено.\n\nНо Курадка не сразу осознал, что произошло. На нейтральное место – сторожевую башню на утёсе с видом на тихий ручей – он прибыл с целым грузом ожиданий. Джавхарад и другие лидеры Древнего Пакта наверняка станут торговаться за столом переговоров, добиваясь более мягких условий, более щедрых уступков. Часами будут вести словесную битву.\n\nНичего этого не произошло. Его улыбка обезоружила их, сама того не желая став ещё одним ударом по уже нанесённой ране. И лишь теперь он понял почему: они размышляли о своих деяниях. Их глаза говорили о днях, проведённых в раздумьях, о попытках понять, в чём они ошиблись... Не в стратегии и не в тактике, а в нравственном отношении.\n\nПереговоры были недолгими. Они согласились передать Армии всю Долину Грозовых Облаков. Без каких-либо условий."
mandate_curadka.14.a:0 "Всё, о чём он и его народ просили..."
mandate_curadka.15.t:0 "Точка" # Hyenia gets this
mandate_curadka.15.d:0 "Шесть Принципов больше не придавали королеве уверенности. Если бы они были созданиями из крови и плоти, они бы только и смотрели на неё, следуя за ней до конца её дней. Если бы Кайлид был живым существом, он стал бы призраком, преследующим всю Гиению. Её доброе лицо ещё могло обмануть обычных гиен, но откровения Великой Просветительница охватывали всё: то был поисковый отряд, который никогда не устаёт.\n\nИ они нашли её. Жаждущей. Но их наказание не было мгновенным. По их мнению, лучше было заставить её день за днём ощущать тот дисбаланс, который она сама породила на этой земле. И вести приходили одна за другой: прорванные оборонительные линии, горящие машины и техника, всё рушилось под тяжестью её прегрешений и их праведного дела. Имя врага оправдало себя: они действительно были Освободительной Армией Земель Шторма. Долина скандировала имена их солдат и генералов, имена их героев. Сама вселенная вновь утверждала себя вопреки королеве, настолько одержимой порядком, что она забыла о необходимости следовать течению и проявлять гибкость.\n\nОна смотрела на своё отражение в зеркале. Ледяная вода стекала по её шерсти. Текла, словно кровь.\n\nПолотенце рядом напомнило ей вытереться насухо. Стереть всё это."
mandate_curadka.15.a:0 "«Курадка, — напишет она, — я предлагаю капитуляцию Гиении...»"
mandate_curadka.16.t:0 "Права существ"
mandate_curadka.16.d:0 "Как ни странно, в таверне в центре Тандер Поинта слышались всего два звука: скрип полотенца, которым хозяин заведения протирал стакан, да тихое потрескивание радио. Группа йети, слушавшая передачу, не произносила ни слова.\n\nИз радиоприёмника доносился голос Курадки: — ...Две новые революционные меры вступают в силу немедленно. Во-первых: все существа, будь то йети, зебры или кто-либо ещё, отныне будут обладать одинаковым набором личных прав и свобод, без каких-либо различий между ними – разумеется, при условии, что они являются гражданами. Во-вторых: каждое существо, родившееся или проживающее в пределах новых государственных границ, автоматически получает гражданство. Кроме того, это распространяется на каждое существо, которое родится или будет проживать на любых новых территориях, уже находящихся или в будущем перешедших под контроль Освободительной Армии.\n\nКогда Курадка закончил своё обращение, слушатели были сбиты с толку. — Он просто раздаёт гражданство направо и налево, — проворчал один из них.\n\n— Может, у него есть веская причина так поступать? — сказал другой, отпив из кружки.\n\n— Если это делает Курадка, значит, плохой идеей это никак быть не может! — с улыбкой заявил третий йети.\n\n— Что ж, посмотрим, к чему это приведёт, — ответил первый и тяжело вздохнул."
mandate_curadka.16.a:0 "Со временем они привыкнут."
mandate_curadka.17.t:0 "Liberation Of The Great Lakes"
mandate_curadka.17.d:0 "Curadka's lips had twisted into a wide smile as he raised a glass of sparkling wine. "A toast to our victory."\n\nRaacsan and Kohrak nodded and raised their glasses. The hyena simply drank, but the storm creature did not, still wearing his mask and refusing to take it off in the presence of others. To him, the toast was merely symbolic.\n\nCuradka savoured the drink in his mouth, then swallowed and smacked his lips, satisfied. "My vision of a new world is now that much closer. The first part of my grand plan is done. Now, we have to make sure our successes stick. And I have the perfect idea for it."\n\n"I'm listening," Raacsan replied, while Kohrak looked at the yeti with curiosity.\n\n"First, we shall rename the state to represent the concept I've named 'Chidhoru' - the combination of the Rainband and the Great Lakes, the lands of the yeti and the lands of the zebras. It is an idea that will glue all my dreams together. A utopian state built on peaceful co-existence of the races. I believe now is not the time to dream of the future, but to create it."\n\nRaacsan stared at him with widened, awestruck eyes. However, Kohrak's expression was almost entirely hidden by his mask. There was merely a hint of scepticism in the blue eyes gleaming from its holes."
mandate_curadka.17.a:0 "Towards a better future, together."
mandate_curadka.18.t:0 "Argument"
mandate_curadka.18.d:0 "Curadka walked down the hallway, sighing after holding a speech that had been broadcast on the radio. He walked past a room and, much to his surprise, heard Iamidi's frustrated voice. He peeked inside and saw Kohrak as well, who of course was completely silent as usual. He realised an argument was taking place.\n\n"We cannot act harsh towards our new zebra subjects," Iamidi explained. "Instead, we need to expand the Union's soft power through market and diplomacy."\n\nKohrak shook his head and motioned quickly with his hands, using the storm creature sign language.\n\n"Please slow down," Iamidi asked, "I'm not so proficient at the sign language yet."\n\nKohrak let out an annoyed grunt and repeated his movements, slower.\n\n"'The Union must be maintained not with words and money, but with threats and violence'. Did I understand that correctly?" Iamdidi asked, sounding offended.\n\nKohrak nodded confidently.\n\n"You do know what happened to both the Imperial Mazwi and the Storm Kingdom? Both collapsed because they relied on violence, and were thus destroyed with violence. It's simply not sustainable."\n\nBefore the argument could escalate further, Curadka decided to step inside the room. The two immediately turned to look at him. "Now, calm down you two. Both of you have a point, even if you do not see eye to eye. We must use both soft and hard power when necessary. There's no use arguing about it, alright?"\n\nIamidi and Kohrak glanced at each other, then slowly and hesitantly nodded."
mandate_curadka.18.a:0 "Hopefully they'll understand this."
mandate_curadka.19.t:0 "Zelitha's Third" #ZELITHA EVENT WOOO #Comma?
mandate_curadka.19.d:0 "Raacsan had come in expecting more than an interview. The dossier on Zelitha had laid bare the facts: she was a "collaborator," and that said enough. To him, she was a broken soul, her loyalty abused.\n\nBut instead of a smug know-it-all swaggering into the corner of a dinghy little eatery he'd taken comfort in while in town, the real Zelitha shambled her way in. She spilled onto his table before spilling her story: bad blood with the hyenas, the new Hyenian government cautioning civilians to watch for a certain Zelitha, then hiding out in Windborn with the robes to hide her stripes from spies. Her dishevelled eyes spoke not of realising her error but more of yearning for relief. "You're a sane hyena, working for a yeti who hides his strengths well—no, don't tell me he's humble and nice. Curadka's cunning; you just don't know it yet."\n\nShe leaned closer, the detailed creases on her muzzle turning her out like a drunk, far from the strategist and martial logician she truly was. "But he'll need my help as much as I need his. He needs the Zwahileans to accept yet another yeti leader. It's because of me the Storm King and Ibyz went as far as they've ever gone, because when everything else was burning around them, the zebras had someone who could understand them... and that's me, me and a few other friends who might like Curadka's hot air about freedom, rights, and whatever keeps them happy."\n\nWhen Raacsan spoke up about how Curadka's not a single inch of oppressive as the others, her stare shut him up. "Say that to my former neighbours. They hated my guts for seeing the light. Do you think they'd be okay with their third yeti ruler in a row? Stop thinking about how it's the only shot you've got for the Rainband to be free — no, this is MY shot, my people's only shot, to survive, so you bring me in, or you'll get nothing!""
mandate_curadka.19.a:0 "She got the job; all he thought was, "Poor mare...""
mandate_curadka.20.t:0 "A New Capital"
mandate_curadka.20.d:0 ""So, gentlecreatures, are you ready to talk?" Curadka asked with a wide, friendly smile, sitting at a table.\n\nSeated next to him were Iamidi, the zebra, Kohrak, the storm creature, and Raacsan, the hyena. They all nodded in agreement.\n\n"Very well, let us begin." Curadka cleared his throat. "I talked to you before to think about a better location for the national capital. Just as a reminder, I do not like the Eye of the Storm. Not only does it have unfortunate ties to the Storm King, being the location of his palace, but it's in the centre of Stormland and inhabited almost entirely by yeti. I think a far superior national capital would have a more central location and a more diverse population. What places do you think fit these criteria?"\n\nIamidi was first to speak, smiling politely. "Mzizima, the old capital of the Uzerasi, is perfect in my humble opinion. It is a centrally located port city populated by zebras."\n\nCuradka nodded. "A good choice, though I feel you might be slightly biased." He chuckled.\n\nKohrak then quietly offered him a piece of paper. Curadka took it and read it quickly.\n\n"Ah, Karen, another excellent proposal. I was thinking of it myself, too. It is both central and populated by both yetis and zebras."\n\n"If I may speak," said Raacsan, "I have a... different kind of idea. Instead of choosing an existing large city, we could choose any small town and build a new capital for the nation from scratch. I think Ibeji, for example, is in a good location."\n\nCuradka's eyebrows rose. "What an interesting idea. We should definitely consider that, too."\n\nThe conversation then continued, Curadka and his companions debating at length the pros and cons of each location, until they finally reached a consensus."
mandate_curadka.20.a:0 "The new capital will be Mzizima."
mandate_curadka.20.b:0 "The new capital will be Karen."
mandate_curadka.20.c:0 "The new capital will be Ibeji."
mandate_curadka.21.t:0 "Statements Of Purpose"
mandate_curadka.21.d:0 ""We need you, Amanyi."\n\nThere was silence as Amanyi, the heir of Ugabi's former ruler Mukisa, stared at the zebra mare. He felt a conflict inside himself, as he just wanted to tell her to leave him alone. Ever since Ugabi's fall, he had gone into hiding and spent his time focusing on his true passion of soil chemistry. But he also knew he had a duty to uphold.\n\n"...Your majesty?" the zebra asked, concerned by the prolonged silence.\n\nAmanyi sighed deeply. "Very well. I will join your resistance movement. I can't simply sit idly by while my homeland gets despoiled by socialist madyetis."\n\nThe zebra appeared relieved and smiled. "Wonderful. We will spread word that you've joined our cause, and many Ugabians will rally and support us. With your help, Ugabi may be free again."\n\nThe words encouraged Amanyi, and he returned the smile. "Hopefully so." Then, the smile dissipated. "But we have much work to do, I imagine."\n\nShe nodded. "Our odds aren't great, and our enemies are strong. But with faith and courage, we will overcome the odds.""
mandate_curadka.21.a:0 "Amanyi was ready to embrace his destiny."
mandate_curadka.22.t:0 "The Means To Believe"
mandate_curadka.22.d:0 "As part of the resistance, Amanyi had to get used to moving around a lot to avoid detection and to blending in to the local populace. So now, he and some fellow freedom fighters were hiding in a Ugabian village, preparing for the next strike against the foreign oppressors. But as Amanyi looked around, he felt unsure if there was any actual oppression.\n\nLand had been socialised, the houses had been rebuilt, there was functional plumbing, the streets were paved. Not only that, but the leader of the socialist madyetis, Curadka, had spoken on public radio and invited Amanyi to come and meet him for negotiations. Until now, he had believed that the grand promises of the Union were just a cover-up for oppression borne of massive ignorance, with their good intentions being a road to Tartarus. Perhaps he had been wrong.\n\n"Is everything alright, your majesty?" a resistance member asked him.\n\nHe snapped out of his thoughts and turned to look at him. "Yes, yes. I just... think I want to negotiate with this Curadka. Perhaps we can resolve our differences peacefully. Do you think we could arrange a meeting with him?""
mandate_curadka.22.a:0 "The zebra stared at him in shock."
mandate_curadka.23.t:0 "Down To Earth"
mandate_curadka.23.d:0 "Amanyi had expected to meet a massive, brutish yeti surrounded by intimidating bodyguards, who would probably use the meeting as an excuse to capture and imprison him, beheading the Ugabian resistance movement in one deceptive stroke. But instead, he saw a smiling yeti and a single storm creature bodyguard. And then the yeti asked the bodyguard to leave, leaving just him and Amanyi alone in the meeting room.\n\n"So... you are Curadka?" Amanyi asked carefully, clumsily trying to use the yeti language.\n\n"Yes, yes, pleasure to meet you," the yeti replied and offered out a hand in greeting.\n\nThe zebra frowned and looked at the hand in doubt.\n\n"Oh, sorry, I sometimes forget you folk don't do handshakes..." He retracted his hand with an embarrassed chuckle. "Also, would it be easier for you if we spoke in Mazwian or Zwahilean? I am at least somewhat familiar with those languages."\n\n"Mazwian is fine."\n\n"Right," Curadka replied with a nod, and switched to surprisingly fluent Mazwian speech. "So, I am glad you agreed to meet me. I think we can resolve our differences peacefully, stop the violence and restore order in Ugabi."\n\nAmanyi raised an impressed eyebrow. Was this yeti trying to deceive him by putting up a polite and kind appearance? "Perhaps. Are you willing to restore our independence?"\n\nCuradka winced. Looked like he had wished he wouldn't ask that. "I'm afraid my multiracial union that erases borders and divisions isn't exactly compatible with nationalist sentiments... But perhaps some autonomy can be offered?"\n\nAmanyi sighed. This meeting was pointless, after all. But perhaps they could yet come to a shared understanding."
mandate_curadka.23.a:0 "The meeting continued, and ended inconclusively."
mandate_curadka.24.t:0 "Falling Inside The Light"
mandate_curadka.24.d:0 "Raacsan had followed lead after lead on the Chainbreaker's location, traipsing from city-state to farming village to desert redoubt to track down the one zebra who could get the Hayzeb on-side, the shadow of revolt following him wherever he went. When he finally found her, it was in the backroom of a dive bar catering to the most disreputable folk, choked with a haze of cheap incense.\n\nThey hadn't bothered to search him, blindfold him, or anything. The only weapon in the room that he could see was Bamina's takoba: the sword she'd used to slay her own father at the dawn of her reign. Her half-sister sat at her side, regarding him quizzically; the once-queen herself was inscrutable.\n\n"So, the yetis wish to negotiate. Wise of them, sending a hyena lapdog rather than one of their own."\n\n"Lapdog? You misunderstand us entirely. Our people desire peace, but to you, the sword is the only path to liberation. Is that not so, Chainbreaker? How many cells do you have around this city, how many zebras prepared to orphan their children for your stubborn pride?"\n\nBamina gave a tiny smile. "More than you know, less than you fear. Peace, friend. I would not have revealed one of my hideouts to you if I didn't want to deal."\n\n"And what are your terms?"\n\n"I want a certain zebra released from your custody. The Seer of the Slums he is called. A dangerous agitator, a practitioner of dark magic, and a dear friend of mine. And I want the yetis gone: my people will accept a peacekeeping force of hyenas and lakezebras, but we bear too many scars from yeti occupiers to accept them patrolling our lands."\n\n"I cannot accept those terms," said Raacsan, "We'll never get anywhere if we cling to past grievances."\n\n"I see," said the queen, glancing at her sister. One hoof strayed to her sword hilt. "Go in peace tonight. Tomorrow... We'll be in touch.""
mandate_curadka.24.a:0 "That could have gone better."
mandate_curadka.25.t:0 "Forever On Your Side"
mandate_curadka.25.d:0 "It wasn't Iamidi's custom to travel with armed guards, but in Zigali she'd relented. The former city-states of the Hayzeb were powderkegs, rife with sedition and discontent, and an unguarded official was just the spark they'd need. So it was with some relief that Iamidi left her escort behind on the long drive from Zigali to Zano. The arid countryside was peaceful, almost idyllic: row after row of groundnut and indigo plantations, fields of millet gently swaying in the dry breeze.\n\nIamidi was just about starting to doze off when her yeti driver grunted something about getting gas and pulled off onto a dirt road into a quaint market village. They found a curious scene: the doors were all shut, the shops were empty. Iamidi got out, and her keen ears picked up a distant sound. Leaving her driver to search the village, she passed through a grain field and into a cleared circle, where scores of zebras sat together, humming and swaying around a central figure.\n\n"You are Zwahile?" said one at the edge, struggling with the dialect, "You come to see the ceremony? Sit, drink."\n\nShe gave him a cup of Fura De Nono, blended with spices she did not recognise. Iamidi drank deep, and soon felt the potion take effect. Swaying back and forth, she felt the spirit present in the community overtake her, and soon the humming had become singing, and the swaying was dancing, and the central zebra was a medium. Time had no meaning, and when the medium spoke it was in the voice of those departed long ago, or those departed a month ago, or with a hundred voices and one.\n\n"Now you know our magic," the medium said once the sky had grown dark. "You see now, why we chafe at regulations, at curfews, at those who try to box us in?"\n"I don't want the Zwahile and the Hayzeb to fight."\n"Fight? My friend, our people are restless. But we are curious of outsiders, not hostile. Come, you've begun to learn our ways, now teach us yours.""
mandate_curadka.25.a:0 "And we shall have peace."
mandate_curadka.26.t:0 "The State We're In"
mandate_curadka.26.d:0 "Of all the things Bamina had expected the Grand Vizier to get up to after his convalescence, the absolute last one was to become a film producer. Her friend had taken ill shortly after her fall from power, but she'd gotten a letter that he was working on a new project: one that would 'strike a blow for the cause of liberation.' And so the Chainbreaker, the one-time Queen of All Hayzeb, found herself in a hastily thrown-together casting studio watching B-roll footage with her old advisor.\n\n"What... is this?" she asked after a few minutes. "Is this about the civil war? The Storm War? Curadka's conquests?"\nThe Vizier waved a hoof. "It's not about one specific conflict; we're not doing a historical drama. It's a conflict that happens everywhere, at all times, between reaction and progress, tyranny and liberty, the people and the oppressors. This is just some of the footage: the director's cutting together scenes of student protests, reading groups, strikes, uprisings, and armed rebellions to create a dizzying effect and show how all these struggles are one. There's a plot, but it's secondary to the way the film is supposed to make you feel, the ideas it conveys. There's no single central character, either. No one visionary, just multitudes of people fighting for a better world."\n\n"Well... it sounds compelling as an idea. I hadn't thought of it that way... But I don't know, this footage is pretty terrible."\n\nThe Vizier nodded. "That's where you come in. All the battle scenes need to be re-shot, and the director's asked me to find real guerillas to play the extras. Zebras who have really been there, to give it the authenticity it needs."\n\nBamina smiled. "Well, that I can help with. I know a few hardened fighters who'd love a chance to appear on the silver screen...""
mandate_curadka.26.a:0 "And just like that, the causes aligned"
#PROMPT - a sequel to curadka.25, Bamina learns more of Curadka's socialist futurist ideology through practice: a couple of fellow Hayzeb friends and some from the Union are collaborating together to create a modern piece of art (movie, music album, whatever it may be)... a statement against the modern-day slavery of misused capital and what not, but it's not preachy but rather thoughtful. It eventually makes Bamina feel fulfilled even if the liberation wasn't completed under her sole banner: the Hayzeb aren't just free, their potential is only just beginning to be realized..."

mandate_curadka.27.t:0 "From Root To Crown"
mandate_curadka.27.d:0 "Recently, the Ugabian resistance movement had been faltering. They were lacking recruits and support, as the Ugabians received generous help and support from the Union and saw little reason to resist their so-called "oppressors". Things got worse when some resistance fighters resorted to banditry to sustain themselves, turning popular sentiment against them. Amanyi, their figurehead leader, grew frustrated from this and decided to take a break, retiring to an abandoned farmstead in the Ugabian countryside, where he could study the local soil in peace.\n\nHis peace was interrupted by none other than Curadka himself.\n\nAmanyi was outside, hooves deep in mud, when he saw the yeti approach. He froze in place and stared in horror, even though Curadka was smiling and unarmed.\n\nThe yeti chuckled as he looked at the monarch toiling in the soil. "You're a hard zebra to find, Amanyi. But farming? Really?"\n\n"It's a peaceful life," Amanyi retorted.\n\n"I am sure. So you have decided to abandon the resistance?"\n\nHe did not respond.\n\nCuradka smiled. "Don't you want peace for everycreature, not just yourself? Look around this village. It's not just zebras here anymore, but hyenas and yetis too, all living together in harmony, under one shared Union."\n\nAmanyi nodded. That was true.\n\n"Besides, I think your talents would be better used elsewhere. Like at an institute of agriculture, or something."\n\n"You don't want to throw me behind bars for resisting your rule?"\n\nCuradka laughed. "Don't be silly! We can leave all that behind us, and look towards a brighter future."\n\nStill, Amanyi hesitated.\n\nThe yeti shook his head. "You know what, forget about it. We can negotiate later. How about you tell me what you're doing? What would motivate a God-King like you to do dig the soil?"\n\nIn an instant, Amayi's eyes lit up with passion. He could finally tell someone all he knew about soil chemistry. "...How much do you know about pedogenesis?""
mandate_curadka.27.a:0 "Amanyi would talk for an hour and forget all about the resistance."
mandate_curadka.28.t:0 "Then They Were One"
mandate_curadka.28.d:0 "If there was one thing the former Queen of All Hayzeb was good at, it was political theatre. Curadka and Bamina had spoken for hours upon hours, going over Curadka's beliefs and goals and hammering out their disagreements. All of that - their conflict, their coming to agreement, the lasting tensions between the Chainbreaker's way and Curadka's way - would be communicated to the public in a single scene.\n\nHead held high, Bamina the Chainbreaker marched into the Zano city council chambers. Curadka greeted her, extending a hand but not leaving the mayor's chair. The Chainbreaker extended her hoof, shaking the yeti's hand while the transitional government of Zano peered down. Then she unbuckled her sword: the takoba she'd used to behead the previous king and end slavery in the Hayzeb city-states. She walked past Curadka, and hung it on the wall behind the mayor's chair.\n\n"Listen to my words, brothers and sisters: with this, I relinquish the sword of the Chainbreaker. It shall stay here, as long as peace reigns in these lands. I am putting my trust in Curadka, in socialism, in the future. But should the yetis plunge us into civil strife and oppression yet again, then I shall reclaim it, and the earth shall be watered with the blood of tyrants and heroes."\n\nAfter that, she sat down in one of the council chairs, patiently listening as Curadka announced the transitional government of Zano dissolved, and that municipal elections would be held over the next six weeks for mayor and council. Several members of the transitional government stood for election as councillors, alongside the freed Seer of the Slums and other important figures in the city. But the mayoral vote was a landslide, for there was one candidate whose popularity was unrivalled from the start: Bamina, ex-Queen of All Hayzeb, and the first mayor of the new Zano."
mandate_curadka.28.a:0 "Harmony at last."
mandate_curadka.29.t:0 "Pass The Peace"
mandate_curadka.29.d:0 "Kohrak, Raacsan and Iamidi quietly glanced at each other as they sat down around a table, then looked at Curadka, who was already seated at the end of it.\n\n"I am glad all of you could attend this meeting, friends," the yeti said with a smile, which then faded. "Something has been bothering me lately. So far, I have led both the government and the armed forces, much like the Storm King did back in the day. But this role makes me feel... uncomfortable. Now that the country's reconstruction is reaching completion, I feel like it's time for this to change. I'm just not sure how, so I figured I would ask you all for advice."\n\nIamidi nodded in sympathetic understanding. "Of course. I know just what to do. You should let an elected council to take charge of the armed forces. This will ensure it is ultimately the people's representatives who decide military matters."\n\n"I don't know..." Raacsan replied, and scratched the back of his head anxiously. "In Hyenia, it was always the monarch's duty to lead the military as well, acting as the ultimate authority in matters of war. I see nothing wrong with it, and it is not something the Storm King alone did."\n\nKohrak used storm creature sign language to say that the Premier, not the Great Leader of Chidhoru, should be trusted with leadership of the armed forces. This would take the weight off of Curadka's shoulders while still keeping decisionmaking efficiently centralised under one authority figure.\n\nCuradka frowned in thought and nodded, rubbing his chin with a finger. After some deliberation, he decided that..."
mandate_curadka.29.a:0 "...The Council should lead the armed forces."
mandate_curadka.29.b:0 "...The Premier should lead the armed forces."
mandate_curadka.29.c:0 "...The Great Leader should continue to lead the armed forces."
mandate_curadka.30.t:0 "For Everyone You Know And Everyone You Don't"
mandate_curadka.30.d:0 ""Everyone dies someday," Curadka said, "but the Storm King was seemingly in denial, so he never made any preparations for his death. That's why the bloody succession war happened."\n\nRaacsan, Iamidi and Kohrak nodded.\n\n"I will not repeat his mistake. We need clear, written succession laws in place. Who knows, maybe I fall down the stairs tomorrow and die. We need to be prepared for that." He chuckled at his own words.\n\n"Well, to me it has always been clear what we need to do," Iamidi replied. "An open, fair and public election for the position of the Great Leader. Anyone can get elected, provided they have the needed support."\n\n"Elections..?" Raacsan questioned. "I'm not sure about that. A hereditary monarchy provides long-term stability, like it did in Hyenia." He looked at Curadka. "Though you uh, don't have any living relatives, do you?"\n\nCuradka took a deep breath and shook his head.\n\n"Right. In that case, it could simply be an internal agreement, maybe a closed election, for someone within the government to succeed you. Or you could just pick and choose the successor."\n\nIn the meantime, Kohrak had already drawn a crude image on paper showing some kind of gathering of creatures in an elaborate ceremony, where a single person is elevated.\n\n"Hm, thank you for your ideas once again, friends. I am always happy to receive advice from you all. But now, I have to decide...""
mandate_curadka.30.a:0 "Curadka will choose open succession."
mandate_curadka.30.b:0 "Curadka will choose simple succession."
mandate_curadka.30.c:0 "Curadka will choose ceremonial succession."
mandate_curadka.31.t:0 "Meeting With The Resistance"
mandate_curadka.31.d:0 "As Curadka looked at the group of Mozzi zebras, he remembered the report on the ambush these rebels had carried out against a peaceful convoy that had been conducting a census in Wagaduzu. His lips curled in slight disgust, yet he offered out his hand in greeting.\n\nNone of the zebras shaked his hand. "We proud sons and daughters of Mozzi greet you in the name of the Heavenly One," one of them said. "Our leader has entrusted us with representing him in these negotiations."\nCuradka lowered his hand. He still did not know who led this mysterious resistance movement. "I, Curadka, greet you as well," he replied in a bone-dry formal tone. "Let us begin the discussions, then."\n\nWhat followed was several hours of negotiations. It quickly became clear that the Mozzi rebels' primary demand was extensive local autonomy. They wanted their tribes' traditions and independence to be respected, otherwise they would continue resisting. These were the worst kind of demands, so reasonable that rejecting them would make Curadka appear as the oppressor, not the liberator that he saw himself as. Yet accepting them would set a dangerous precedent, and perhaps encourage other regions in Chidhoru to assert their own local rights as well, hurting the unity of the entire Union.\n\nAs the negotiations were coming to a conclusion, he frowned, took a deep breath, and said:"
mandate_curadka.31.a:0 ""I accept your demands.""
mandate_curadka.31.b:0 ""Unfortunately, I have no choice but to refuse.""
mandate_curadka.32.t:0 "Frozen Over"
mandate_curadka.32.d:0 "A yeti officer in uniform stood as still as a statue, waiting for Curadka as he read through the reports.\n\n"So," the Great Leader finally said, "you've found out Gel Frostwind has been stashing weapons, gathering followers and building a base of operations in a remote corner of Stormland?"\n\nThe officer nodded. "Yes, sir. A clear sign of treason."\n\nCuradka sighed deeply. "I always knew he couldn't be trusted... well, Gel has served his purpose by now. This is enough of a justification to get rid of him."\n\n"Yes, sir. I believe a swift surprise attack against the secret base would be successful. But I have a question. Do we simply round up Frostwind and all the officers suspected of being loyal to him? Or do we eliminate both him and all his supporters?"\n\nCuradka frowned. "And if we capture him alive, we could simply exile him so he can't cause trouble anymore. However, who knows how many of his loyalists would remain? I don't think they'd be happy."\n\n"Indeed, sir. Which is why I favour the latter option. We must thoroughly eliminate this threat and purge the ranks of the army."\n\n"I don't know, feels an awful lot like something the Storm King would've done..." Curadka groaned in exasperation. "Alright, I've decided. Here's what you will do:""
mandate_curadka.32.a:0 ""Capture Gel and kick him out of Stormland.""
mandate_curadka.32.b:0 ""Wipe them out.""
mandate_curadka.33.t:0 "Unexpected Resistance"
mandate_curadka.33.d:0 "Deep in the forests of Wagaduzu, a small caravan of vans and trucks drove along a dirt track. Each one had a symbol of Chidhoru displayed upon it. Inside the leading vehicle, a yeti in glasses was reading through a list. "Three thousand and seventy two..."\nThe zebra driver glanced at him. "Checking the numbers?"\nThe yeti nodded. "I must be absolutely certain the census data is correct, and there's time to do so while we're heading to the next town."\nThe zebra mare smiled. "Alright, was just curious. You know, I always start feeling sick if I try to read while driving-"\n\nA bright and loud explosion interrupted her, and before the zebra and the yeti realised it, the car had flipped upside down.\n\n"By the ancestors!" the yeti exclaimed, clutching his bleeding head. "What happened?"\nThe zebra mare crawled out of the car and threw up.\n\nThe entire caravan had stopped, all the zebras, yetis and hyenas in the vehicles exiting and rushing to the exploded car. But as they did so, gunfire erupted from the nearby forest, riddling them with bullets. Those who survived ducked behind cover and pulled out their own weapons. Yet before they could shoot back, the attack had stopped. It was deathly silent, except for the sound of the zebra driver retching. The symbols of Chidhoru were covered in blood."
mandate_curadka.33.a:0 "That's going to be a problem..."
mandate_curadka.34.t:0 "Open Hands, Closed Eyes" #Comma
mandate_curadka.34.d:0 "It took all Curadka had (with some not-so-gentle prodding from Kohrak and the armed guards he'd put up) to not linger for too long, to not talk with the throng of citizens from all races and all creeds bunched up against his train of destiny. The send-off he was receiving had charged him with such joy, such gratitude, that sleep would flee from his eyes on the long trip eastward: here he was, a recipient of infinite love befitting a true liberator... yet from Kohrak, a piece of advice stuck true, to listen closely to what they said. Amidst an outcry of hope, other voices snuck in. Calls to arms, a rightful accounting for crimes. Punishment.\n\nHours approaching days on a coastal rail line with a pristine scenic sea was the cost of that revelation. Who knew how many lives and how much land he'd taken just to get here, just for him to confront the queen behind the slaughter. Soon, the ocean would recede, Hyenia would loom overhead, and then... well, then it would be over. Freedom had been his bread, his butter, his lifeline, but as the wars drew to a close, freedom turned more to stalling. Going on speeches, meeting with soldiers, attending banquets and celebrations... the long chain of events that separated him from confrontation lay in the past now. Just one more thing left to do, one hard choice. It couldn't be mercy all the way, but for him to have the heart to punish, even if it was just...?\n\nAt that, the dreariness of travel finally took him to sleep."
mandate_curadka.34.a:0 "The rhythm of wheels and tracks soon faded."
mandate_curadka.35.t:0 "From Burlap To Cashmere"
mandate_curadka.35.d:0 "With the Chidhoru Union finally in a good upward rhythm, Iamidi decided to take a short break from work and visit the new shopping mall at the centre of [ROOT.Capital.GetCapitalVictoryPointName]. She had always had a dream of indulging herself in luxury, since long before she decided to join the "crazy" Curadka, and now there was nothing stopping her from fulfilling that dream.\n\nWhen she arrived at the mall, she saw it was a bustling place full of all kinds of creatures, yetis, hyenas, zebras and others, all enjoying their time here in this temple of commerce. Yet she also saw not all of them were here just to buy things, but to spend time with family and friends. They had all escaped poverty, thanks to the efforts of the government, and were now free to spend less time working and more time on leisure. Seeing the results of all their labours made Iamidi smile.\n\nYet her smile vanished and her eyes widened when, out of all the people in the world, she saw Curadka and Raacsan... sitting at a table in a cafe, sharing cups of steaming hot drink and chatting casually. And the way they looked at each other, the way they made each other laugh... it did not look like friendship, but something more. They were so absorbed in one another, they did not even notice her. After a moment of hesitation, she decided to simply walk around them and continue her trip in the mall, leaving the two alone. If they were happy together, then so be it, she thought to herself."  
mandate_curadka.35.a:0 "Good for them."
mandate_curadka.36.t:0 "Bound To Be"
mandate_curadka.36.d:0 "Another meeting between Curadka, Iamidi, Kohrak and Raacsan was over. As always, four stood up silently and left the room. But as Raacsan was in the doorway, Curadka placed his hand on his shoulder. "Sorry, could we uh... talk in private a little?" the yeti asked nervously.\n\nRaacsan raised a brown fuzzy eyebrow. "Um, of course," he replied.\n\nIamidi and Kohrak heard this, then stopped and looked at them. While the storm creature's emotions were unreadable behind the mask, the zebra smiled warmly. "We'll let you two have some time alone, then," she said. "See you later, friends."\n\nCuradka and Raacsan returned to the meeting room and sat down on opposite ends. At first, they said nothing and Curadka twiddled his thumbs anxiously.\n\n"So, what did you want to talk about?" Raacsan asked quietly. "Did I do something wrong?"\n\n"By the ancestors, no..." Curadka mumbled. "It's funny, in my head I imagined I'd be far more confident." He inhaled sharply and deeply, gathering his strength. "We talked in the meeting how I'd like to take a step back from leadership. But I didn't really explain what I'd like to do instead. I think I'd... like to spend more time with you, outside of work."\n\nThe hyena's eyes widened. "Oh. Uh, sure. That sounds nice."\n\n"Yeah."\n\n"Is this... meant to be platonic, or..?"\n\nCuradka clenched his fists. "I don't... know... I've been questioning it ever since you saved my life during that raid."\n\n"Oh... well, I've admired you ever since I saw you holding that speech in Boltport."\n\nThe two chuckled, and the tension in the room seemed to dissipate. Then, slowly, Curadka's hand moved onto Raacsan's paw. The two looked each other in the eye silently, and smiled."
mandate_curadka.36.a:0 "To Curadka, Raacsan is more than just an advisor."
mandate_curadka.37.t: "Stand Back And Watch"
mandate_curadka.37.d: "After Curadka had told everyone that he was retiring and appointing Kohrak as his successor (under pressure from the national collectivist faction), no one had quite expected him to choose the career of a law enforcement officer. Despite his lack of experience, he was already proving to be quite competent, as Kohrak discovered from the reports he was reading. He had made a habit of going through them after a long day of work in the capital, partially out of curiosity, but mostly to make sure his old boss was doing fine.\n\nIn today's report, Kohrak read that Curadka was out in Boltport solving a murder mystery: a corpse had been found hanging from a tree in the backyard of a local hostel cafeteria. Yet this time, he had a partner. Kohrak's eyes widened behind his mask when he read the name: Raacsan. The timid Raacsan, actually chipping in with some martial effort and a bit of big-brain stuff to figure out the mystery? They seemed to be working quite closely together on solving the case, too. According to the report, the murder was linked to some local labour dispute involving the harbour's dockworkers' union and a foreign logistics company, and the two were also trying to resolve this in favour of the union. It was an ambitious task, but Kohrak was sure they could handle it. After all, it was petty and small in comparison to the task of building a nation from the ashes.\n\nUnderneath his mask, Kohrak smiled, as he was happy for the two. Yet he wondered if he'd be all alone for the rest of his life, buried in an avalanche of government-related work, or if he, too, would eventually find someone..."
mandate_curadka.37.a: "Never say never."

mandate_kravash.1.t: "Так, на чём мы там остановились?"
mandate_kravash.1.d: "— Мои воины, это не рассвет новой эры, — начал Краваш, чей громогласный голос эхом прокатился по полуразрушенной площади и вынудил собравшихся существ посмотреть на него с широкими улыбками. — Это продолжение славных лет золота и стали, вернувшихся к нам после краткого периода слабости, созданного корыстными генералами и напуганными чужаками! Наш золотой век начался на пороге первого тысячелетия, и он продолжится ещё тысячи лет!\n\n— Некоторые из нас – вероятно, те, кто боится смотреть страху в глаза, – могут посчитать, что мы, непобедимые йети, не имеем ни единого шанса одолеть Пакт и его прихвостней. "В конце концов, — утверждают такие, — однажды мы уже проиграли им, а теперь владеем лишь этим маленьким островком!" Эти йети, естественно, забывают парочку важных деталей. Вот они, послушайте...\n\nКраваш поднёс к глазам длинный свиток и начал монотонным голосом считывать его содержание. Туда входила информация о непоследовательных процедурах подготовки дивизий, о некачественных материалах для дирижаблей и о тактических провалах командования. Внезапная перемена стиля заставила многих йети нахмуриться и сконфузиться, другие же ухмыльнулись, понимая, что шутка вот-вот достигнет своего апогея. Примерно через полторы минуты манера Краваша внезапно сменилась со скучной считки на разъярённый рык:\n\n— А ЕЩЁ НАШИ ЛИДЕРЫ БЫЛИ СЛАБЫМИ СОПЛИВЫМИ ПРЕДАТЕЛЯМИ! ОНИ ХОТЕЛИ ВЗЯТЬ КОНТРОЛЬ НАД КОРОЛЕВСТВОМ, ЧТОБЫ ПРЕВРАТИТЬ ЕГО В КАКОЙ-ТО ЭЗОТЕРИЧЕСКИЙ КУЛЬТ СОБСТВЕННОЙ ПЕРСОНЫ! КОРОЛЬ ШТОРМ БЫЛ ИДЕАЛЬНЫМ ЙЕТИ, ОДНАКО ОНИ ОТКАЗАЛИСЬ СЛЕДОВАТЬ ЕГО БЕЗУПРЕЧНОМУ ПРИМЕРУ! КОРОЛЬ ШТОРМ ПОКОРИЛ ЗЕБРИКУ, НЕ ИМЕЯ И ПОЛОВИНЫ ТОГО, ЧТО ЕСТЬ У НАС СЕЙЧАС! НАМ ПРОСТО НУЖНО УПОДОБИТЬСЯ ЕМУ, И ТОГДА МЫ ВНОВЬ СТАНЕМ ВЛАДЫКАМИ ЭТОГО КОНТИНЕНТА!"
mandate_kravash.1.a: "Для этой речи ему даже микрофон не понадобился."
mandate_kravash.2.t: "Ride The Lightning?!"
mandate_kravash.2.d: "Kravash was in the so-called Windborn Authority, a pseudo-state that had been carved up after the war with the hyenas. He stood atop a rocky hill and watched a group of yetis climb up to meet him. His eyes scanned each of them, trying to see which of them was the strongest one. Indeed, the yeti leading the group looked like a grizzled veteran, despite not appearing much older than him.\n\nThe group then finally arrived at the summit of the hill. Their leader seemed unfazed by the climb. "You are Kravash, I presume?"\n\nHe nodded. "Graz Shatterstorm?"\n\n"In the flesh. So, you're the one promising to bring back the glory of the first Storm King's reign?"\n\nKravash grinned, revealing his fangs. "Yes. And I need all the help I can get."\n\n"I can provide it. I fought in the Storm War back in the day and know how to win a fight. It's terrible to see what has happened to yetikind since then."\n\n"You won't have to fight alone anymore. You should join forces with us. Together, we can make things right."\n\n"As equals?" Graz asked.\n\nFor a moment, Kravash did not know what to say. Was Graz going to defy him if he said no? But he felt like he had to assert his dominance. It's what the Storm King would've done. So, he laughed. "No! Of course not. I'll be the one to lead us all to further greatness. Now join me, and let Windborn unite with the rest of yetikind once more!" He offered out his hand and grinned confidently.\n\nFor a brief moment, it seemed like Graz would refuse and question his authority, which would've meant war. But this did not happen, as he instead firmly grasped his hand and shook it."
mandate_kravash.2.a: "Kravash made sure to squeeze his hand as hard as possible."
mandate_kravash.3.t: "Let's Just Kill 'Em All" #Comma
mandate_kravash.3.d: "The mood resembled celebration, which was all Kravash cared about. Every attending yeti at the ruined open space that used to be the foundations of a building either partied with enough booze and food to drop dead with if they had one more bite or with enough pointy sticks and gunpowder to blow up a quarter of the audience with one fatal mistake.\n\nThe festivities had gone on for an hour. He was supposed to... speak? Oh, he'd had a speech prepared (the Storm King did that), all natural, liberated from the tyranny of dictionaries and good grammar. The old guy held up a spear, shouted death to all his enemies, and they took over a continent. There was power in the Storm King's tongue, and Kravash yearned to grasp it, power that spoke in a language like, "You know what, why waste my words on talking to you like this? Let's not waste any more time! Let's just kill everyone! Get revenge! I said that already, yeah? Yeah, yeah, yeah, yeah! YOU ALL HEARD MY FIRST SPEECH, RIGHT?! YOU'RE ALL FIRED UP! LET'S! RAID! AND! PILLAGE! YOU GET ZEBRICA, AND YOU GET ZEBRICA — EVERYONE GETS ZEBRICA!"\n\nPossessed certainly by the spirit of the Storm King, Kravash shot his hands out to the sky before diving into the crowd, clapping everyone's hands. Roar, roar, roar — that was the only holy sound in this place, roaring with them all, charging headfirst into the unknown, ecstatic at the very idea of crossing borders. He turned to see their faces too, painted in the strokes of rabid bliss, joy fuelling footsteps rambunctious enough to record a small earthquake.\n\nThe very idea of burning every fur and skin into crisp, cooking their food over their bodies and hoarding their gold into his trunks? Glorious. And the camaraderie around him in communal domination?"
mandate_kravash.3.a: "All the sweeter for it."
mandate_kravash.4.t: "Free Help" #Comma
mandate_kravash.4.d: "Come drink and enjoy the spoils of war, so Kravash would say to himself and his newfound visitors: the big and strong creatures that Ibyz Icepaw had manipulated into servitude. Now, they'd be unleashed at this random campfire, for the town he'd been in had been torched.\n\nTwo of them, he'd greeted wholeheartedly: age was visible on Urzak Deepfrost's features, but as the saying went, there was much to fear in a creature whose profession had many die young (though Kravash wasn't told he'd mostly held desk positions in the military, probably for the best); Vurka, meanwhile, brimmed with youthful vitality, raring to dive into a brawl on the battlefield with all those bristling bones and muscles and bad breath in their prime. The both of them had thought Ibyz the stronger once upon a time, but with her bested, to Kravash they'd kneel. Here, an offering of stolen alcohol from the zebras was given as a sign of good will! But a blot, blight, was in their midst. "What weakling is this?!" Kravash proclaimed after pointing at the creature.\n\nAny hope for a good time, crushed. "That is Zelitha," Urzak replied. "She's been helpful—"\n\n"The bold and courageous Zelitha is a zebra?! She's so puny and small, not like us! Are you trying to trick me!? You're plotting my downfall!"\n\nHis swung spear would've struck had not Vurka took out a blade to block the strike. Instant. "As Urzak was saying, she convinced many Zwahileans to assist Ibyz willingly. Now, are you going to deny free help?"\n\n"Don't speak for her! You, striped freak, speak for yourself! Prove your strength!"\n\nSo stood the mare of the hour, who in her entire career of serving the yetis, had not expected... Kravash. Yet, Kravash was the king, and he was... better than complete anarchy?\n\nShe didn't flinch. "You beat me up and kill me here and now? I don't think zebras would serve you if they know they'll still get shot after everything.""
mandate_kravash.4.a: "That finally got through to his thick skull."
mandate_kravash.5.t: "The Ultimate Lifeform" #Comma
mandate_kravash.5.d: "A dance by the fire, a fire he'd formed himself. From when his parents told him of wars and rumours of wars, until the inexplicable light of the Storm King pierced his very soul... his name, Telkar, mattered not save for the reputation that it could hold, for the light it now shone, just as his fiery spear — ceremonial, save it for when the enemy can't easily kill you — reflected Telkar's worn-out face, smeared in real liquid, real red.\n\nOh, how he'd been deemed too young to join when the Storm King sallied out! Thank Kravash that he could partake in it finally. From the tales his bedfellows in the military had told him about other countries, the nations the Storm King laid waste to, there was no other culture, no other way of life. They existed: he lived. Kravash had put it out in big words in the radio: "join up how we transfer power!" Ignorant of how jumbled up that would seem to the inferior ones, that was life: a transfer of power. And he was power. He and his people were strong, and when you looked yourself in the mirror and saw a physique that would dominate all other species in the world, you were on a one-track road to an inescapable conclusion:\n\nBurn the unknown. The primitive. The quadruped zebras who had to hold everything in their disgusting mouths. Watch them cry, then find four hundred ways to make their mothers cry as you ravage their homes, desecrate their heirlooms, set to destruction centuries and millennia of living in the same manner it takes to play a game of tag.\n\nEnjoy the night, Telkar, you and your friends with a campfire the size of the latest village you'd just visited."
mandate_kravash.5.a: "You deserve it."
mandate_kravash.6.t: "My Beloved Disaster"
mandate_kravash.6.d: "Glyd looked down at her blueprints with childlike glee. The company, or rather the group of designers loosely organised under her command, had just one more week to present their project for Kravash's approval. It had been, in her opinion, the most enjoyable nightmare of her life. The team was busy almost all the time, and the stress was clearly getting to some of them, but the complete lack of regulations or even bullet points as to what the vehicle should do was wonderfully liberating. She and the team could flex their full engineering creativity.\n\nThe blueprints of what the others had taken to calling 'Mister Sputter' were likely indecipherable to outsiders and as a whole were extremely messy. But it worked. Well, the blueprints did, everyone on the team could read them, and she hoped Mister Sputter would be the same. What a handsome chap the thing was - Clawbeak suspension on a half-track, modular armouring and a massive engine visible to any passengers. With part of the engine's cover taken off you could cook marshmallows on it. Probably. Above the cab was a big question mark, as the team hadn't decided what to put there. Glyd herself had suggested a good old machine gun, but others had swayed her with anti-tank guns, grenade launchers and even rocket launchers. Mister Sputter was a mess of wacky ideas, and it was beautiful. Neither Glyd nor the team were daft enough to believe that this was the most effective APC they could build, but that was hardly the point. It was good enough.\n\n Ah, 'good enough'. What an amazing pair of words. This vehicle would be noisy, ugly and unreliable, but it would pass Kravash's sniff test with flying colours. Part of her worried about the poor field mechanics who would constantly be needed to fix the damn things, but another part of her knew just how popular it would be with the troops, what with all its toys and barbaric charm. It was far from the best thing she'd made, but this one had a bit of her soul in it. Tired but happy, she picked up the paper, gave it a smooch, then carried it into the next room."
mandate_kravash.6.a: "Never was love so sincere."
mandate_kravash.7.t: "For The Zebras Who Kinda Suck At Fighting"
mandate_kravash.7.d: "Storm creatures stood guard silently as a group of zebras was herded into a large, empty room. The clothes of the equines reflected their statuses as Zwahilean elites: they were chieftains, officials and priests. Yet despite their "power", they all looked very afraid, muttering prayers to their God and the spirits that they worshipped.\n\nTheir anxious wait ended as a yeti warrior entered the room as well. He glared at the zebras, but more out of frustration than anger. "Arright, listen up!" he shouted, speaking the Zwahilean language crudely, but loud enough that the message was carried across. "I'd love to bash all your skulls in for resisting yeti rule before, but Kravash ordered me to act nice. So instead, I'm gonna tell you how things will work from now on. Instead of punishment, you'll receive a reward. We will let you lot be alone, far more than the Storm King or that Ibyz chick ever did. BUT this comes under one condition. You remain loyal to our rule. You obey our orders. As long as you keep your heads down, we won't touch you. Got it, ya striped mules?"\n\nThe Zwahileans stared at him in shock, confusion, and maybe a little bit of awe. Then they glanced at each other, as if they were all unsure of how to respond. Lastly, they all nodded, one by one, accepting the new conditions despite whatever doubts they might have had."
mandate_kravash.7.a: "Sometimes, the carrot is mightier than the stick."
mandate_kravash.8.t: "Virtues" #Comma
mandate_kravash.8.d: "Twiver cursed the beggar that'd duped him. That damned hyena had been persistent. A couple pieces of gold and silver given to shut him up and then... they noticed. Superiors rifling through his pockets. "Where did you spend the money?" He said he didn't know, but it was a lie, and then the accusation came: You've been generous. You must learn.\n\nThe only thing the yetis on top were smart at, he learned, was how to beat those lessons into your head. A no-name facility... it was no facility, just bare-bones empty desert and all you knew was the military perimeter and your inmates. No walls, but you had each other. How long would you live with each other? Before you became desperate? Looked for longing beyond this bedlam as long and as wide as a desert?\n\nHe'd been smart enough to see it, but he was also smart enough to know the dead end that loomed ahead. Countless hours of megaphoned officers walking back and forth from the watchtowers to say, "Hey, no sharing! No kindness! Go!" Of living, of breaking, welts and sticks on his back the moment he smiled, the moment they saw into his thoughts and saw hints of seditious crimes like helping a brother up from a fall. No rhyme or reason, no way to predict, just then. Anyone who ratted out? Given much more food than he deserved... and the mob would pounce on him. Just as planned.\n\nThen, the final test: a hyena. The beggar, identified and captured. Starved, bones see-through, eyes red and bleeding. A raspy voice might've been asking for help if the vocal cords weren't so damaged that words couldn't exist if they'd come from him.\n\nThey looked. Eyes bloody, dripping sweat and tears. A chance to prove yourself."
mandate_kravash.8.a: "Open palms beaten to a pulp. You'll like the crunch of bones as they wither."
mandate_kravash.9.t: "The Not-Quite Titans"
mandate_kravash.9.d: "Kravash stood in front of a group of hyenas, gargoyles and centaurs and grinned, revealing his fangs. "Hi there, I'm Kravash. Remember that name well. So, you were all in prison when we beat the crap out of the Pact, and have done some pretty big crimes. Not just any petty theft, but like, big time, full on organised crime. And I respect that, I gotta say! You're just the kind of folks I'm looking for. You may just have what it takes to be a yeti."\n\nThe group looked at him in a mixture of confusion and amusement.\n\n"You don't care about morality, you care about getting what you want and beating up others if needed. That's some true yeti spirit! And I need some yeti-spirited folks to run things after our conquest. I offer you all not just redemption from your crimes, but a place to be, where you won't be hunted down by some MORALISTS who think they're better than everyone else. I offer you job security! Paid vacations! Just as long as you beat up anyone who falls out of line. And you'll be free to do whatever! There won't be no laws holding you back. You'll rule over your lands like kings and queens. The ONLY thing I require is ABSOLUTE TOTAL LOYALTY TO ME. Sound good?"\n\nWhile some of them were unimpressed and looked like they'd rather go back to prison, most of them smiled and nodded, already dreaming of running their own little criminal fiefdoms under Kravash.\n\n"Then what are you waiting for?" he asked and spread out his arms wide. "Kneel before me, and I'll give you all the power you've ever wanted!""
mandate_kravash.9.a: "One by one, almost all of them obeyed and kneeled."
mandate_kravash.10.t: "Just Enjoy The Show"
mandate_kravash.10.d: "The tall windows of the Storm King's old palace in the Eye of the Storm flashed with bright, colourful lights and music echoed from its hallways. Inside, a joyous celebration was being held, with Kravash at its centre. After all, he had restored the lost glory of yetikind. If that was not worth celebrating, then nothing was. Steaming hot meat was served, foaming alcohol was drunk and many songs were sang. All this time, Kravash had a big smile on his face, which only widened as he got drunker.\n\nOne yeti, however, was less jubilant. Gel Frostwind stood in the shadows, glaring at Kravash. "He's already getting complacent," he muttered to himself. "He knows how to conquer like the Storm King did, but when he dies, it's all going to go to Tartarus again." He stepped forward towards Kravash, who turned to look at him, blushing from drunkenness.\n\n"Oh hi Gel... you want some?" He raised his own tankard of drink that was almost empty.\n\nGel shook his head. "All I want is a duel." He drew his sword from his scabbard. "I hereby challenge you! Prove to me that you are not weak, that you can defend yourself against all threats, whenever necessary!"\n\nAll the yetis and even the storm creatures around the two gasped and the music stopped. Some of them drew their own weapons and prepared to kill Gel on the spot. Yet Kravash laughed. "Alrrrrright then... I accept. This should be fun!" He hiccuped, threw away his tankard and drew his own sword. "Show me what you got!"\n\nGel swung his weapon, aiming at Kravash's neck. Immediately the blade cut right through it, unleashing a torrent of blood. Kravash gurgled and fell dead on the ground. His sword fell from his hands and clattered on the floor, unused. The entire room went completely silent as Gel stared at the corpse in disbelief. Then, he regained his composure and raised his bloodied sword in the air. "The Storm King is dead! Long live the Storm King!"\n\nAfter a moment of hesitation, the storm creatures kneeled in respect and the yetis, too, raised their weapons. "Long live the Storm King!" they chanted loudly."
mandate_kravash.10.a: "To the strongest."
mandate_kravash.11.t: "It's Different Here"
mandate_kravash.11.d: "Kravash's corpse had no time to even get cold before Gel Frostwind went to work. The party was over, and he had a nation to salvage. An emergency meeting was held at the palace with all of Kravash's top leaders. As they had all mostly followed Kravash out of fear, respect or selfish motives rather than actual loyalty, they seemed to hold no ill will towards Gel.\n\n"Alright, listen up. I haven't had time to hold a coronation ceremony yet, but if you don't all obey me, everything is going to fall apart once news of Kravash's death starts to spread. My first order is that all wars of expansions will be stopped. We must focus on consolidating our gains, and concentrate on internal struggles. Therefore my second order is that you all will take whatever forces you can gather and send them into the lands we've already conquered. We are going to build an empire that lasts, instead of having another short-sighted spree of pillaging and conquest. My third order is that from now on, everycreature under my command will be rewarded for their performance, so treat your work as a form of competition. If you don't perform well, don't expect to get much anymore. Any questions?"\n\nThe couple dozen yetis, storm creatures and the token zebra glanced at each other. Then, Graz Shatterstorm asked: "What's stopping any of us from challenging you to a duel and taking the Horned Crown from you?"\n\n"Try it," Gel retorted, then continued: "Do you want another civil war? Do you want yetikind to once again be weak and divided, to once again be victim to foreign interests? I am the only one in this room with a long-term plan to ensure lasting domination of our race. If you think I am wrong about that, then go ahead. Slay me!"\n\nNone of them made a move. They simply stared at him in silence.\n\n"Thought so. Now go! We have no time to waste!""
mandate_kravash.11.a: "There's much work to do."
mandate_kravash.12.t: "Faulty Recall"
mandate_kravash.12.d: ""Sir, Re'em has declared independence."\n\nThe words hung in the air as Gel glared intensely at the messenger. He knew it was going to happen, and now it had happened, yet he still had to take a moment to come to terms with it.\n\nThe messenger, a young yeti, started to look uncomfortable. "Uh, sir, what are your orders?"\n\nGel snarled. "This is just the beginning. Now that the Re'emite horses have shown an example, others will follow. Here's my order: all of our forces in the area need to pull out of there. We need to secure what we still have, instead of trying to crush this minor revolt."\n\nThe messenger saluted hesitantly. "Understood, sir... I will go deliver the message."\n\nWith that, the yeti was gone, leaving Gel alone with his thoughts."
mandate_kravash.12.a: "Here we go."
mandate_kravash.13.t: "Pay No Heed"
mandate_kravash.13.d: ""Sir, there are reports of revolts in Maregypt, and-"\n\nBefore the young yeti messenger could finish his sentence, Gel pulled out a pistol and shot him a dozen times, emptying its magazine and sending shells clattering on the floor. As the messenger's limp corpse collapsed, Gel panted heavily and growled. "I GET IT! SHUT UP!" he shouted at the lifeless body, then threw the empty pistol at it. "This is all Kravash's fault. I killed him too quickly and cleanly." He then marched out of the room he was in, told a couple of storm creature guards outside to clean up the mess, and headed down the hallway. He knew he couldn't keep doing this forever, but he was convinced that once all the revolts were crushed, he could move onto the next stage of his plans. Yet getting there was proving even more difficult than he had imagined. As he walked with echoing hoofsteps, he realised he had to try something new, as desperate times called for desperate measures..."
mandate_kravash.13.a: "There must be some way to salvage this."
mandate_kravash.14.t: "The Big Blue View"
mandate_kravash.14.d: "A great crowd of yetis and storm creatures had gathered in front of the Storm King's palace in the Eye of the Storm, where a microphone and radio equipment had been set up, all in preparation for a speech Gel Frostwind had said he would hold. And now, when he appeared, the crowd did not react with cheers, but with murmurs, as he was not a particularly popular leader, despite his efforts to crush uprisings.\n\nAfter checking that the microphone worked by tapping it with his finger, he cleared his throat and began to speak. "My loyal subjects. Today, I have a very important announcement to make. But first, I must explain things. Our nation - the Yeti Dominion, the Storm Kingdom, or whatever you wish to call it - is not sustainable at its current extent. It is supposedly a nation of yetis, by the yetis, for the yetis, yet it rules over a vast expanse of land inhabited by numerous races. How can such a country survive united, without falling apart like a house of cards? That is the question I've been trying to answer ever since I became the new ruler. Thankfully, my old friend Kravash had the perfect solution to this problem! A national identity to unite us all under one cause. So, from now on, a new nation will rise. The nation of Katabatia!"\n\nHe let the name sink in, but the audience mostly reacted with confusion.\n\n"Katabatia is a nation where any creature, regardless of race, can rise to the top, where power is given to those who deserve it. It is a nation of all, by all, for all. A union not based on oppression or conflict, but on strength and merit. A nation designed to last a thousand years if necessary. On this day, Katabatia rises!" As he shouted, he raised a fist in the air and above him, a massive new banner of Katabatia was unfurled, displayed on the side of the palace.\n\nWhat followed was absolute silence, as the audience glared at Gel and the banner behind him."
mandate_kravash.14.a: "They'll get used to it eventually."
mandate_kravash.15.t: "Origins Of A Contender?" #Comma
mandate_kravash.15.d: "It was a challenge of a mess for Iksilta and the rest of the archivist team, tasked only with "write an account of Kravash's deeds," enough for her to curse the conqueror (though only secretly, lest she were interested in a very short life expectancy): Why didn't you write anything down? Were you a stubborn illiterate to the end? Was reading and getting the truth down just too good for your bruising ways? Chronicling the fights and the duels were too easy: he'd been posing for everything, so many photos and stories he'd told definitely staged, with the corpses to one side and him standing on a pile of stench and refuse, standing without a care for whoever would put to ink his history.\n\nHis ideas? The entire venture became murky right there. There were only so many ways to say "revenge" and "the strong must feed on the weak." Born from the cradle with thoughts of blades and bullets, it almost seemed like. Hearsay had gone around that he didn't even know what a god was, didn't even think about death... just that his enemies stopped bothering him. No higher opposition, no higher purpose, just best and not be bested. Nothing to write home about.\n\nBut... that was it, wasn't it? And there was the inspiration: nothingness could be the foundation, a canvas for Iksilta to paint in broad strokes and personal embellishments. The myth of yeti liberation? She almost laughed at how Kravash could smoothly slot into the narrative of liberator."
mandate_kravash.15.a: "A little flourish here, a little citation there, and here's your Kravash the... Great?"
mandate_kravash.16.t: "Clear Skies, Clear Heads" ##Comma
mandate_kravash.16.d: ""Fight me. Now." Gel's first words to a random citizen on the street had spilled into a half-dead face slammed against the streetlight for at least the sixth time. The audience had borne witness to what wasn't a fight but a trashing, the victor over someone now barely alive.\n\nHe stepped aside to provide the onlookers a view of that wretched body. Muscles overstrained on legs and arms all splayed, mouth and jaw wrestling with each other grasping at oxygen, fur sprinkled in dirt and crimson.\n\n"This is what Kravash would've done to you all!" Gel suddenly shouted. Now all eyes were on him. Good. "Tire you out until you're so weak, a toddler can take you down! All so caught up in the fight you forget to take care of yourselves! Kravash has given us this land, but he would have easily given it away the moment we lost a single battle!"\n\nWith a singular nudge of an outstretched finger, he moved his opponent's head to fall limp. Gel's icy gaze immobilised his subjects. Finally, they understood Kravash's fatal stupidity."
mandate_kravash.16.a: "He may be the storm, but he is no king."
mandate_kravash.17.t: "An Epic Of Copper" #Comma
mandate_kravash.17.d: "Kravash's former executioner put on a solemn veneer. Gel had to. The cameras would immortalise his sorrow, this final act of putting Our Hero to rest (never mind that the ogre of a yeti would've protested at the idea of commanding a whole martial horde to attend his burial if he were alive right now). Hastily erected statues of the deceased shine copper reflections of a dying sun into Gel's eyes, perhaps a silent judgement on the lie he was selling on an international scale.\n\nThey'd gone into overdrive, all of them, thanks to a single directive straight from his mouth: honour the most honourable of the Stormlands, the living legend among us who saw his god fail, his head dashed against the shores of Hippogriffia, only to dare to conquer anyway, retracing his path though he'd known how he would die. When yetikind had wallowed in a malaise of weakness and servitude, Kravash stood up. When foreign species told them no, Kravash said yes, an unassailable yes, a yes that was backed with nothing but his spear, his gun, his fists, and the undying trust of an entire race.\n\nIt was treason, then, to not honour him with their all: streets renamed to words he'd said, children born with enough Kravashes in their name to send a census taker to madness... and the statues. The innumerable statues, great and small, turned cities into a party of metal giant clones.\n\nBut none would compare to Gel and the real Kravash in a touching moment together. The veteran's body had been preserved with balms and esoteric magics... no hiding away from view. Here was your hero, with his killer the first to visit him."
mandate_kravash.17.a: "The first visitor of many. May Our Hero reign."
mandate_kravash.18.t: "What's Left Unfinished"
mandate_kravash.18.d: "A messenger horse kneeled before Shahanshah Tahmasp, the leader of Karkadannistan, and presented him a sealed message. "Word from the east, your majesty."\n\nThe tall equine conqueror frowned. "Read it to me."\n\n"As you wish." The messenger bowed, unsealed the message, and read the contents out loud. It was from Gel Frostwind, a yeti who had recently seized power and now looked to the west. "...Therefore, if I were you, I would consider joining forces with us. Otherwise, I'll be convinced that you cannot be trusted and thus must be destroyed before you can threaten us. Either we will have Karkadannistan in peace, or by force. Choose wisely."\n\nTahmasp grimaced in disgust. "That is a thinly veiled threat. Is this how the yetis propose alliances to their neighbours?"\n\nThe messenger shrugged. "That is how it was written."\n\nThe Shahanshah stroked his beard. "I want you to deliver my response to him. Tell him that...""
mandate_kravash.18.a: ""...we accept the alliance.""
mandate_kravash.18.b: ""...we refuse the alliance.""
mandate_kravash.19.t: "Between Thieves"
mandate_kravash.19.d: "Gel Frostwind sat upon the Storm King's old throne, legs crossed and one elbow leaning on an armrest, as a messenger horse kneeled before him. "So, I assume you're here to deliver the response from that... Shaha... Tama... something?"\n\nThe messenger showed no sign of being offended as he stood up. "Yes, your majesty." He took out a sealed scroll from a pouch hanging on his flank and presented it to Gel.\n\n"Read it to me," Gel replied and sighed, rolling his eyes at the mere suggestion that he should read it himself.\n\n"As you wish," the messenger replied, unsealed the message and read. "The Most Sublime Excellency, Shahanshah Tahmasp, greets you, Sovereign of the East. While your words were far from polite, I wish for no conflict between our noble nations. You and I both rose to the top by proving our valiant strength, so we may have more in common than it may initially seem. I thus believe that by joining our forces, we can ensure no one will dare to ever threaten us. Therefore, after much deliberation, I have chosen to accept-"\n\nGel grinned and snapped his fingers. "Okay you can stop reading now. That's a lot of words to say 'yes', but I got all I wanted. You may leave now. Tell your ruler I wish him well or whatever."\n\nThe messenger took a deep breath and bowed again." 
mandate_kravash.19.a: "He chose wisely."
mandate_kravash.20.t: "Blind Ire"
mandate_kravash.20.d: "Gel Frostwind sat upon the Storm King's old throne, legs crossed and one elbow leaning on an armrest, as a messenger horse kneeled before him. "So, I assume you're here to deliver the response from that... Shaha... Tama... something?"\n\nThe messenger showed no sign of being offended as he stood up. "Yes, your majesty." He took out a sealed scroll from a pouch hanging on his flank and presented it to Gel.\n\n"Read it to me," Gel replied and sighed, rolling his eyes at the mere suggestion that he should read it himself.\n\n"As you wish," the messenger replied, unsealed the message and read. "The Most Sublime Excellency, Shahanshah Tahmasp, greets you, Sovereign of the East. Not only were you far from polite, but you presumed that I, the Great Uniter of Karkadannistan, the Conqueror of Hestraya, would be somehow shaken by your pathetic threats. Do you really think you can destroy my mighty nation? You think yourself to be the new Storm King, yet you have not proven yourself to be anywhere near as mighty as he was-"\n\nThe messenger was cut off by loud gunshots as Gel pulled out a pistol and shot him. The horse fell limp and collapsed onto the floor, blood gushing from his wounds. The message he had been reading was soon drenched red in it. Gel stood in front of his throne and breathed quickly, inhaling the smoke of his weapon, as he intensely glared at the mess he had made. "That lame mule! I will TEACH him to fear me!" he growled. "KARKADANNISTAN WILL BURN!""
mandate_kravash.20.a: "A storm is coming."
mandate_kravash.21.t: "Entangled, Ensnared, Enamored" #Comma
mandate_kravash.21.d: "Deep in the hinterlands, from mists of pre-time, cried the young, these unhewn stones: "Shape us!" None were shaped, for tools had not yet been fashioned for the task. In a great cry to be formed, they crashed into each other, willing the nothingness of their spirits into something. Like primeval stones, they collided, discovering, then, a spark. A fire. A chipping away, a little death each time, until, smoothed by the fight, they would manifest. Proof that they existed.\n\nWord spread. The striped ones ran rumours of terror from the underworld, of creatures finding purpose in each other. Their garments would change: rags transformed into robes, wheels enslaved into treads, but the spectacle of self-defeating fire would remain. Not even the crown that half-ruled an epic of land stalled that self-immolation. Not even the crown after that.\n\nBut then, apotheosis. They were their own kings, their own masters, their own fighters. Kravash or not, a name would be muttered somewhere, dumb prayer before the final blow. Another fight, another battle—against each other. Stripped from the modern world, to fight was an honest wrestle, a grappling of bodies striving for dominance, with life on the line, true nature revealed, claws gouging everything out until the skull was but an empty bowl, searched out. Inside your head, your thoughts, your inner being, your spirit. The urges, the desire to be, to exist by life replacing life, yours against another's.\n\nHow do you know you deserve to exist?\n\nDeeper into the skull you descend. A vast wind, arctic in its embrace, informs you of the many that must yet die, that must satisfy your lust for blood, your will to live. To be at peace is to blot yourself out. To struggle is to live. To win is to be worthy of existence.\n\nHow precious is your existence!"
mandate_kravash.21.a: "Your knife, your bullet, against foreign skin and veins. Feel it. Viva."

