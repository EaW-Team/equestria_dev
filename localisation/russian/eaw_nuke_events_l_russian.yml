l_russian:
 nuke_first.1.t:0 "Последний довод"
 nuke_first.1.d:0 "[This.GetNewspaperHeader][This.GetNukeEventDesc]"
 nuke_first.1.a:0 "[This.GetNukeEventOption]"

 nuke_first.1.d_pony_democratic:0 "«Двадцать часов назад [Root.GetAdjective]ие вооружённые силы испытали новое и крайне мощное оружие на изолированном полигоне. Бомба превосходила по мощности десять тысяч обычных зарядов. Это оружие представляет собой атомную бомбу, объединяющую магию и науку для раскрытия сил, ранее нам неподвластных.\nНо следует помнить, что благоговение должен вызывать не сам взрыв, а тот факт, что тысячи умов смогли собраться вместе, чтобы создать это чудо науки. Все пони-учёные работали сообща, чтобы создать это оружие в столь короткие сроки. Будем надеяться, что нам никогда не придётся использовать эту бомбу в реальных боевых условиях и она будет лишь обеспечивать нам мир».\n — Речь лидера [Root.GetLeader], [?global.date.GetDateStringNoHourLong]"
 nuke_first.1.a_pony_democratic:0 "Мы стоим на распутье: создать новый мир или погрузиться во тьму."

 nuke_first.1.d_pony_communism:0 "Сегодня обычные заголовки в официальных газетах исчезли, уступив место необычной полосе. На ней – фотография гигантского гриба после взрыва, сделанная в малонаселённом регионе государства [Root.GetName]. Лидер [Root.GetLeader] выступил с балкона Дворца Науки в городе [Root.capital.GetName]. В речи подчёркивалось, что оружие под кодовым названием «Единство» «должно использоваться в войне с реакционерами». Ходят слухи, что ещё одна бомба уже изготовлена и готова к применению. Лидер [Root.GetLeader] завершил заявление словами: «Лишь единство пролетариата позволило создать это оружие, более мощное, чем самые смелые мечты предыдущих поколений!»."
 nuke_first.1.a_pony_communism:0 "Очередное оружие революции."

 nuke_first.1.d_pony_fascism:0 "Лидер [Root.GetLeader] стоял перед толпой на площади, куда охранники согнали лоялистов и прочих пони. Над головами пролетали самолёты с национальными знаками отличия – обычные и стратегические бомбардировщики.\n«Сегодня мы доказали, что нет ничего, чего [Root.GetName] не сможет достичь. Наше новое оружие, объединяющее магию и науку, содержит ключ к силе Виндиго. Оно увеличило нашу мощь в тысячу раз, и враги будут дрожать от страха! Часть силы самого солнца, которую можно использовать в любой момент. Теперь они знают, что наши слова подкреплены ядерным оружием»."
 nuke_first.1.a_pony_fascism:0 "Будут смерти... которые обеспечат мир."

 nuke_first.1.d_pony_neutrality:0 "По всей стране – по радио и с помощью пегасов – распространились новости о том, что наш народ испытал новое разрушительное оружие. Сообщалось, что оно использует смесь кристаллов и урана и способно уничтожить целый город, возможно – полностью погубив его население. Лидер [Root.GetLeader] подтвердил существование оружия, названного создателями «Виндиго», чтобы отразить его силу. По данным военных, Виндиго «сравнял с землёй здания в большом радиусе». Будь то средство сдерживания или катализатор агрессии, влияние этого оружия на страну будет огромным."
 nuke_first.1.a_pony_neutrality:0 "Это – оружие будущего."

 nuke_first.1.d_griffon_democratic:0 "Когда были сделаны последние корректировки, подсчитаны переменные и завинчен последний шуруп на прототипе, мы подготовили оружие к его ужасной цели. Отправив его в незаселённую зону, мы укрылись в бункере, чтобы наблюдать за испытанием. Сначала взвыла тревога, и красные огни залили помещение. Затем начался обратный отсчёт: «10... 9...». Я лишь надеялся, что всё это было не зря. «6... 5...» – работа допоздна, вместо времени с семьёй, всё ради завершения проекта. «2... 1...» – земля задрожала, и мы почувствовали ударную волну. Бомба взорвалась, ослепив нас светом и уничтожив всё вокруг пурпурной вспышкой. Ничто не устояло: внешний слой бункера превратился в пыль, а область пульсировала нездоровым фиолетовым светом, когда излучение и магия слились в нечто ужасное."
 nuke_first.1.a_griffon_democratic:0 "Эйр плачет, видя наше творение, а Маар хихикает от нашей глупости."

 nuke_first.1.d_griffon_communism:0 "Пыль осела на тестовой площадке, а фиолетовое грибовидное облако исчезло. Грифоны в тяжёлых резиновых костюмах и противогазах роились вокруг мерцающего свечения, оставшегося в воздухе. Небольшие молнии выстреливали вокруг площадки, временами почти попадая в кого-то. Подойдя ближе, они увидели руины тестовых зданий. Один из грифонов достал радио и произнёс:\n\n«Узурпатор преуспел».\n\nВ конференц-зале где-то в городе [Root.capital.GetName] раздалось троекратное «ура»."
 nuke_first.1.a_griffon_communism:0 "Время Маара ушло – теперь такая мощь в когтях рабочих."

 nuke_first.1.d_griffon_fascism:0 "Последние винты корпуса были затянуты, а сердечники загружены в устройство. Генерал подошёл к маленькому смотровому окну бункера, наблюдая за устройством, болтающимся на стальных тросах. Все грифоны надели защитные очки – и яркая фиолетовая вспышка затмила весь свет. Магия и наука спели в унисон – песнь власти и разрушения. Стоило ли оно того? Создать оружие, способное испарять города?\n\nДа."
 nuke_first.1.a_griffon_fascism:0 "Мы стали Мааром, разрушителем миров."

 nuke_first.1.d_griffon_neutrality:0 "Последние циферблаты были отрегулированы, когда устройство под кодовым названием «Борей» подняли на вышку. Учёные суетились, считывая данные с приборов. Зазвучали сигналы тревоги. Грифоны вернулись в бункер и надели защитные очки.\nЗатем произошёл взрыв, ослепивший тех, кто не успел защититься. Ударная волна разбросала танки и деревья, фактически уничтожив весь полигон. Устояли лишь бункеры, где укрылись учёные, хотя и они были покрыты пурпурной пылью и сильно пострадали. Один из набожных учёных поднялся и сказал, глядя на облако:"
 nuke_first.1.a_griffon_neutrality:0 "Помоги нам, Борей..."

 nuke_first.1.d_changeling_democratic:0 "Наскоро сконструированные подпорки, удерживающие бомбу, гнулись и потрескивали под её весом. Вокруг гудели трутни, подключая последние провода, а раскалённый припой стекал серебряным дождём. Переключатели щёлкнули, рабочие отступили... и завыла сирена. Тридцать секунд до взрыва. Все оставшиеся чейнджлинги бросились в бункеры... двадцать секунд... двери закрылись... десять секунд... очки опустились... детонация.\nВзрыв разбросал старые танки и бетонные конструкции. Башня с бомбой испарилась. Когда грибное облако поднялось в небо, в толпе учёных раздался тихий шёпот:"
 nuke_first.1.a_changeling_democratic:0 "Мы выпустили смерть на волю. Пусть наши дети простят нас."

 nuke_first.1.d_changeling_communism:0 "Красные флаги развевались на ветру, а через динамики звучал гимн. На площади собрались полчища трутней, ожидая объявления – и радуясь возможности отвлечься от работы. Уже смеркалось.\nПогас свет. Проекторы на вышке включились, показывая запись испытания. Она была чёрно-белой, но ясно демонстрировала взрыв – не обычный, ведь из грибовидного облака вырывались молнии. Это напоминало реакцию от огромных объёмов магии, но куда более разрушительную.\nОдин из трутней начал скандировать. Вскоре крик подхватили остальные:"
 nuke_first.1.a_changeling_communism:0 "Всю власть Свободным Ульям!"

 nuke_first.1.d_changeling_fascism:0 "[Root.GetLeader] вошла в бункер в парадной форме. Сквозь толстое стекло виднелось оружие – бомба, способная испарять города и завершать войны. И всё же она выглядела безобидно: просто металлическое яйцо.\n[Root.GetLeader] подошла к красной кнопке с черепом и нажала её. В бункере замигали красные огни, снаружи завыли сирены. Трутни улетели, инструменты ожили. Оставалось всего несколько трутней, когда оружие взорвалось, превратившись в магический шторм. Пурпурные молнии ударили во все стороны, испарив или разорвав несчастных трутней. И всё же учёные заметили, как [Root.GetLeader] улыбнулась."
 nuke_first.1.a_changeling_fascism:0 "Технологии приносят победу."
 
 nuke_first.1.d_changeling_neutrality:0 "Теорема о квантовом кольце. То, что некоторые считали болтовней. Но мы знаем, что это можно объединить с наукой. Магия — это наука. А наука о войне — это благородная наука. И теперь это может быть доведено до завершения. Мы создали способ извлечь силу магии из контролируемых заклинаний и сделать её свободной и неудержимой. Хотя многие за нашими границами думают, что используем это оружие для нападения, я утверждаю, что это неправда. Но если мы окажемся жертвой нападения, мы без колебаний воспользуемся любыми доступными нам средствами."
 nuke_first.1.a_changeling_neutrality:0 "Будет ли это работать? Сдерживающий фактор?"

 nuke_first.1.d_yeti_democratic:0 "Бункеры были битком набиты учёWными и генералами, большинство из которых уже надели защитные очки. Все они намеревались стать свидетелями эпохального научного события. Офицеры с интересом изучали устройство, опасно свисающее с металлической конструкции, провожая взглядами различные провода, идущие с одной стороны от земли к сфере, а с другой в обратном направлении. Это был настолько странный и непонятный механизм, что военные сомневались в том, можно ли его вообще использовать в качестве оружия. Учёные, конечно, в свою очередь были уверены.\n\nЛидер [Root.GetLeader] тоже присутствовал на испытании, с каменным выражением лица глядя в смотровое окно бункера. Йети не дрогнул ни во время срабатывания сигнала тревоги, ни при последующей детонации устройства. Лидер страны пытался осмыслить ту невероятную силу, которую только что заполучил в свои руки не обладающий магией вид.\n\nОслепительная вспышка света, охватившая Высокогорные острова, была обещанием. Надеждой на защиту от всех, кто стремится разрушить мир и стабильность в Купели Дождя. Обетом помнить принципы и защищать тех, кто нам дорог. Клятвой бороться за правое дело."
 nuke_first.1.a_yeti_democratic:0 "Мы должны защитить нашу юную гармонию."

 nuke_first.1.d_yeti_communism:0 "Бункеры были битком набиты учёными и генералами, большинство из которых уже надели защитные очки. Все они намеревались стать свидетелями эпохального научного события. Офицеры с интересом изучали устройство, опасно свисающее с металлической конструкции, провожая взглядами различные провода, идущие с одной стороны от земли к сфере, а с другой в обратном направлении. Это был настолько странный и непонятный механизм, что военные сомневались в том, можно ли его вообще использовать в качестве оружия. Учёные, конечно, в свою очередь были уверены.\n\nЛидер [Root.GetLeader] тоже присутствовал на испытании, с каменным выражением лица глядя в смотровое окно бункера. Йети не дрогнул ни во время срабатывания сигнала тревоги, ни при последующей детонации устройства. Лидер страны пытался осмыслить ту невероятную силу, которую только что заполучил в свои руки не обладающий магией вид.\n\nОслепительная вспышка света, охватившая Высокогорные острова, была доказательством прогресса. Это было свидетельством того, что революция действительно может достичь чего угодно, независимо от цены в жизнях или ресурсах. Подтверждением того, что эпохе тирании скоро придёт жестокий конец, окрашенный в красный цвет."
 nuke_first.1.a_yeti_communism:0 "До мировой революции рукой подать."

 nuke_first.1.d_yeti_fascism:0 "Бункеры были битком набиты учёными и генералами, большинство из которых уже надели защитные очки. Все они намеревались стать свидетелями эпохального научного события. Офицеры с интересом изучали устройство, опасно свисающее с металлической конструкции, провожая взглядами различные провода, идущие с одной стороны от земли к сфере, а с другой в обратном направлении. Это был настолько странный и непонятный механизм, что военные сомневались в том, можно ли его вообще использовать в качестве оружия. Учёные, конечно, в свою очередь были уверены.\n\nЛидер [Root.GetLeader] тоже присутствовал на испытании, с каменным выражением лица глядя в смотровое окно бункера. Йети не дрогнул ни во время срабатывания сигнала тревоги, ни при последующей детонации устройства. Лидер страны пытался осмыслить ту невероятную силу, которую только что заполучил в свои руки не обладающий магией вид.\n\nОслепительная вспышка света, охватившая Высокогорные острова, была оружием возмездия. Огненным мечом, способным вернуть утраченную славу старого королевства. Оружием, что в одно мгновение может прекратить войну, если это когда-нибудь потребуется. Это была воплощённая в проводах и металле победа."
 nuke_first.1.a_yeti_fascism:0 "Король Шторм злорадно и гордо ухмыляется из великого запределья."
 
 nuke_first.1.d_yeti_neutrality:0 "Бункеры были битком набиты учёными и генералами, большинство из которых уже надели защитные очки. Все они намеревались стать свидетелями эпохального научного события. Офицеры с интересом изучали устройство, опасно свисающее с металлической конструкции, провожая взглядами различные провода, идущие с одной стороны от земли к сфере, а с другой в обратном направлении. Это был настолько странный и непонятный механизм, что военные сомневались в том, можно ли его вообще использовать в качестве оружия. Учёные, конечно, в свою очередь были уверены.\n\nЛидер [Root.GetLeader] тоже присутствовал на испытании, с каменным выражением лица глядя в смотровое окно бункера. Йети не дрогнул ни во время срабатывания сигнала тревоги, ни при последующей детонации устройства. Лидер страны пытался осмыслить ту невероятную силу, которую только что заполучил в свои руки не обладающий магией вид.\n\nОслепительная вспышка света, охватившая Высокогорные острова, была угрозой. Не оружие, которое нужно агрессивно применять, а мрачный противовес, что тут же отпугнёт любого недруга, стоит ему задуматься о наших землях. Это была неопровержимая гарантия безопасности в постоянно меняющемся мире."
 nuke_first.1.a_yeti_neutrality:0 "Мощный инструмент в ответственных руках."
 
 nuke_first.1.d_generic_democratic:0 "«Итак, в заключение мы можем сказать, что все существа, независимо от их происхождения или внешнего вида, должны заслуживать того, чтобы с ними обращались как с равными другим. Но есть те, кто стремится уничтожить нас. Фашисты и эквалисты стремятся разрушить то, что мы построили. Они уже взялись за оружие или хотят использовать его против нас. Поэтому мы всегда должны быть на страже гармонии. Поэтому мы должны быть бдительными в отношении угроз. И мы неохотно признаём, что уже готово оружие, настолько мощное, что никто не осмелится уничтожить нас».\n - письмо неизвестного [Root.GetAdjective]ого учёного, [GetYear]"
 nuke_first.1.a_generic_democratic:0 "Гармония должна быть сохранена."

 nuke_first.1.d_generic_communism:0 "«Мы стоим сегодня как хозяева своей судьбы. На нас больше не будут влиять другие народы. Но мы не одни: мы стоим вместе, защищая своё будущее. Рабочие и крестьяне никогда больше не будут страдать под игом реакционеров, ибо мы едины как пролетариат. Они не смогут покорить нас своим оружием, ведь у нас теперь есть своё – использующее силу самого солнца, укрощённого и покорённого.\n\nИ если реакционеры попытаются вернуться и снова заковать нас в цепи, мы говорим: если они придут, то будут истекать кровью на солнце по воле народа!»\n — Речь лидера [Root.GetLeader], [?global.date.GetDateStringNoHourLong]"
 nuke_first.1.a_generic_communism:0 "Реакционеры в ужасе дрожат!"

 nuke_first.1.d_generic_fascism:0 "[Root.GetLeader] стоял на балконе, ожидая сигнала, а толпа внизу волновалась. Затем это случилось: вдали поднялось грибное облако, и толпа повернулась, чтобы увидеть его.\n\n«Сегодня мы показали миру, что обладаем силой самого солнца, подчинённой нашей воле. Это устройство доказывает, что мы можем использовать эту силу. Те, кто стремятся уничтожить наше государство, должны знать: им будет противостоять мощь солнца и воля нашего народа. Мы продолжим побеждать врагов. Мы станем избранными, чтобы стоять превыше всех. Никто не сможет противостоять нашей силе, когда мы раскроем нашу новую мощь»."
 nuke_first.1.a_generic_fascism:0 "Мы сильны перед всеми угрозами."

 nuke_first.1.d_generic_neutrality:0 "[Root.capital.GetName], [?global.date.GetDateStringNoHourLong] – лидер [Root.GetLeader] объявил по радио, что армия испытала новый тип оружия. Из различных источников стало известно, что оно сочетает магию и технику, а его сила столь велика, что ранее казалась лишь теоретической.\nВ своём обращении лидер [Root.GetLeader] заявил, что это может стать первым шагом к новой силе, пригодной и для мирных целей. Армия сообщила, что новое оружие окутало полигон «густым облаком дестабилизированной магии и радиации»."
 nuke_first.1.a_generic_neutrality:0 "Будущее будет иметь ядерный оттенок."

 nuke_dropped.101.t:0 "Ядерная бомбардировка Грифонстоуна"
 nuke_dropped.101.d:0 "[This.GetNewspaperHeader]Сегодня мир содрогнулся, узнав о ядерной бомбардировке Грифонстоуна. Несмотря на жестокость современной войны, многие ожидали, что культурное и религиозное значение города защитит его от масштабных разрушений. Однако держава [From.Owner.GetNameDef] проигнорировала эти опасения и нанесла по Грифонстоуну ядерный удар.\n\nОстатки священного дерева быстро превратились в пепел, и вскоре на его месте остался лишь голый склон горы. Атака вызвала широкое международное возмущение, и даже в [From.Owner.GetAdjective]ом правительстве нашлись те, кто осудил её. Многие называют этот удар «отвратительным» деянием и требуют от своих правительств принять меры против государства [From.Owner.GetNameDef]. Ядерная бомбардировка Грифонстоуна – несмываемая чёрная метка на репутации страны [From.Owner.GetNameDef]."
 nuke_dropped.101.a:0 "Трагическая потеря"
 nuke_dropped.101.b:0 "Чудовища..."
 nuke_dropped.101.c:0 "Мы клянёмся, что это было стратегически оправданно."
 nuke_dropped.101.e:0 "Грифонстоун будет далеко не последним."

 nuke_dropped.102.t:0 "Ядерная бомбардировка Грифенхейма"
 nuke_dropped.102.d.grover_alive:0 "[This.GetNewspaperHeader]В начале XI столетия алмазные псы из Бронзхилла выкопали секретный подземный туннель под Императорским дворцом, предназначенный для эвакуации семьи Гроверов. Сегодня этот туннель оправдал своё существование, когда [From.Owner.GetAdjective]ие бомбардировщики применили своё разрушительное оружие против государства [From.From.Owner.GetNameDef].\n\nЗа последние десятилетия Грифенхейм пережил множество потрясений – республиканскую революцию, споры о регентстве, политические кризисы – но всё это меркнет перед нынешним хаосом. Гровер VI и Имперский регент покинули столицу через туннель при поддержке Баркгинской гвардии. Император выжил, что принесло облегчение гражданам [From.From.Owner.GetNameDef], но сможет ли страна пережить такое?"
 nuke_dropped.102.d.grover_ded:0 "[This.GetNewspaperHeader]В начале XI столетия алмазные псы из Бронзхилла выкопали секретный туннель под Императорским дворцом. Сегодня он спас множество жизней – хотя, возможно, не тех, кого псы намеревались спасать – когда [From.Owner.GetAdjective]ие бомбардировщики нанесли удар по государству [From.From.Owner.GetNameDef].\n\nГрифенхейм пережил множество потрясений, но нынешний хаос превосходит всё. Благодаря туннелям [From.From.Owner.GetLeader] и его сторонники избежали взрыва и радиоактивных осадков. [From.From.Owner.GetLeader] жив, но в ярости. Он призвал народ сокрушить «подлых [From.Owner.GetAdjective]их сволочей»."
 nuke_dropped.102.d.grover_emperor:0 "[This.GetNewspaperHeader]В начале XI столетия алмазные псы из Бронзхилла выкопали секретный туннель под Императорским дворцом для эвакуации семьи Гроверов. Сегодня он спас жизнь Гроверу VI, когда [From.Owner.GetAdjective]ие бомбардировщики нанесли удар по государству [From.From.Owner.GetNameDef].\n\nГрифенхейм пережил множество потрясений, но нынешний хаос превосходит всё. Император покинул город через туннель при поддержке Баркгинской гвардии. Он выжил – но сможет ли страна выстоять?"
 nuke_dropped.102.a:0 "Это конец государства [From.From.Owner.GetNameDef]?"
 nuke_dropped.102.b:0 "Наши враги ударили в самое сердце нации!"

 nuke_dropped.103.t:0 "Ядерная бомбардировка Аквилы"
 nuke_dropped.103.d:0 "[This.GetNewspaperHeader]Статус Аквилы как культурного центра Грифонии заставлял многих верить, что город избежит самых мощных [From.Owner.GetAdjective]их ударов. Но, возможно, именно поэтому он и был выбран целью: чтобы оказать колоссальное психологическое давление на [From.From.Owner.GetAdjective]ий народ и вынудить его капитулировать, как это произошло во времена Гровера II.\n\nАквила уже страдала, когда Гровер II сжёг её после восстания. Но разрушения от ядерного удара несоизмеримо больше. Три великих белых храма, посвящённых Эйр, Борею и Арктурию, всё ещё пылают, а пожарные расчёты отчаянно пытаются сдержать огонь. [From.From.Owner.GetAdjective]ий народ потрясён гибелью своего великого города. Перед правительством стоит тяжёлый выбор: продолжать борьбу, рискуя новыми ударами, или повторить путь Первого Аквелийского восстания и капитулировать в надежде на милость врага."
 nuke_dropped.103.a:0 "Аквила снова горит."
 nuke_dropped.103.b:0 "Не в этот раз."

 nuke_dropped.104.t:0 "Ядерная бомбардировка Карфина"
 nuke_dropped.104.d:0 "[This.GetNewspaperHeader]Карфин, известный как Вечный город, оказался не таким уж вечным. Этот день стал днём позора для всех южных грифонов. Над жемчужиной юга, гордым Карфином, сегодня взорвалась ядерная бомба. Жители государства [From.From.Owner.GetNameDef] потрясены: их величайший город и его древние здания за мгновение превратились в руины.\n\nХотя различные источники подтверждают, что [From.From.Owner.GetLeader] выжил, [From.From.Owner.GetAdjective]ая мораль резко упала, и ходят слухи о возможной капитуляции. Многие здания были старыми и нуждались в восстановлении, но недавнее промышленное возрождение вселяло надежду, что Карфин будет процветать и в XI веке. Эти надежды рассыпались в прах вместе с жизнями множества грифонов."
 nuke_dropped.104.a:0 "Жемчужины юга больше нет."
 nuke_dropped.104.b:0 "Однажды мы восстановим Карфин."

 nuke_dropped.105.t:0 "Ядерная бомбардировка Мейджхолда"
 nuke_dropped.105.d:0 "[This.GetNewspaperHeader]Мейджхолд – мрачное, тёмное место, не предназначенное для живых – сильно пострадал от термомагической детонации. Ещё недавно подобное считалось невозможным. Немногие живые существа бывали в Мейджхолде, и все они говорили о тёмной магии, осквернившей эту землю. [From.Owner.GetAdjective]ий генштаб сомневался, что даже столь разрушительное оружие сможет повредить Мейджхолду.\n\nХотя воздушная разведка подтверждает, что Роза Маледикта и большинство её сторонников выжили – вероятно, благодаря своей неживой природе – самому Мейджхолду нанесён огромный урон. Многие здания, включая Крепость и Колледж некромантии, уничтожены. [From.Owner.GetAdjective]ие пилоты, участвовавшие в миссии, объявлены героями, и ожидается, что [From.Owner.GetLeader] лично наградит их."
 nuke_dropped.105.a:0 "Шаг к победе для всей жизни."
 nuke_dropped.105.b:0 "Их технология... опасна."

 nuke_dropped.106.t:0 "Ядерная бомбардировка Скайфола"
 nuke_dropped.106.d:0 "[This.GetNewspaperHeader]Скайфол – важный торговый центр и ключевая военно-морская база государства [From.From.Owner.GetNameDef]. Вероятно, именно поэтому он стал целью [From.Owner.GetAdjective]их ВВС.\n\nБесчисленные магазины, банки и фабрики, включая знаменитый автомобильный завод Кесслера, уничтожены. [From.From.Owner.GetAdjective]ий флот находился вне порта и избежал удара, но база серьёзно повреждена и потребует месяцев восстановления. Экономика города также понесла огромный ущерб, и пройдут годы, прежде чем Скайфол вернётся к прежнему уровню. Компании спешно переносят деятельность в другие города, торговцы ищут новые порты. Статус Скайфола как «самого большого маленького города Грифонии» утрачен."
 nuke_dropped.106.a:0 "Прощай, маленький город."
 nuke_dropped.106.b:0 "Наш бедный маленький город..."

 nuke_dropped.107.t:0 "Ядерная бомбардировка Кантерлота"
 nuke_dropped.107.d:0 "[This.GetNewspaperHeader]Кантерлот был прекрасной столицей Эквестрии, и его величие отражало всю страну. Нации пришлось пойти на крайние меры в войне против государства [From.Owner.GetNameDef], и эти изменения затронули и сам Кантерлот: вербовочные плакаты заполнили улицы, а заводы перешли на военное производство. Но недавние события обрекли город на ужасную судьбу. Сегодня [From.Owner.GetAdjective]ие бомбардировщики взорвали ядерную бомбу прямо над Кантерлотом.\n\n[From.From.Owner.GetLeader] была найдена в руинах вместе с несколькими ближайшими советниками. Все они пережили взрыв благодаря мощному магическому щиту над Королевским замком. Однако остальная часть города подверглась чудовищным разрушениям: уничтожены многочисленные здания, включая Школу для одарённых единорогов. Смогут ли пони нанести ответный удар после такой атаки, или это предвестник конца их нации?"
 nuke_dropped.107.a:0 "[From.From.Owner.GetName] встречает зарю атомной эры."
 nuke_dropped.107.b:0 "Мы будем сражаться."

 nuke_dropped.108.t:0 "Ядерная бомбардировка Речкограда"
 nuke_dropped.108.d:0 "[This.GetNewspaperHeader]Паника охватила Речные Земли: на Речкоград была сброшена ядерная бомба [From.Owner.GetAdjective]ими силами. Взрыв нанёс серьёзный ущерб городу: «Palaca Rijeke» полностью разрушена, а стадион Джанкшн превратился в руины.\n\nЕщё более тревожным является воздействие радиоактивных осадков. Широко распространены опасения, что участки рек Гриффкинг, Злата и Зелена были загрязнены и теперь могут разнести радиацию на большие расстояния. Положение Речкограда в месте слияния трёх рек когда-то было благословением, но теперь стало проклятием, последствия которого будут ощущаться десятилетиями. К счастью, [From.From.Owner.GetLeader] находилась в дипломатической миссии во время взрыва и призвала к экстренной встрече лидеров Речных Земель. Перед лицом столь мощного оружия им нужно единство как никогда прежде."
 nuke_dropped.108.a:0 "Будут ли Речные Земли действовать сообща?"
 nuke_dropped.108.b:0 "Речные Земли будут действовать сообща."

 nuke_dropped.109.t:0 "Ядерная бомбардировка Кристального Города"
 nuke_dropped.109.d.crystal_heart:0 "[This.GetNewspaperHeader][From.Owner.GetAdjective]ие военно-воздушные силы взорвали ядерную бомбу над Кристальным городом, стремясь сломить [From.From.Owner.GetAdjective]ую мораль. [From.Owner.GetAdjective]ие истребители пытались перехватить бомбардировщики, но их было слишком мало, чтобы прорвать оборону эскорта. Когда бомбардировщик появился над городом, противовоздушная оборона предприняла последнюю попытку остановить его, но безуспешно.\n\nКоролевская семья находилась в городе и могла лишь с ужасом наблюдать за падением бомбы. Но когда пыль рассеялась, оказалось, что семья – как и большая часть Кристального города – не пострадала. В момент, когда казалось, что город обречён, сила Кристального Сердца создала над ним мощный щит. Хотя поступили сообщения о незначительных повреждениях, Кристальный город остался почти невредим, а потери были минимальными."
 nuke_dropped.109.d.no_crystal_heart:0 "[This.GetNewspaperHeader][From.Owner.GetAdjective]ие военно-воздушные силы взорвали ядерную бомбу над Кристальным городом, стремясь сломить мораль [From.From.Owner.GetAdjective]. Попытки перехвата провалились, и бомба упала на город.\n\nКристальные пони могли лишь с ужасом смотреть на падающую бомбу, и многие, вероятно, желали, чтобы Кристальное Сердце всё ещё было с ними. Когда пыль рассеялась, стало ясно: разрушения чудовищны. Сообщения о широкомасштабных разрушениях поступали со всех концов города. Высокая плотность населения Кристального города привела к особенно большому числу жертв – это, вероятно, одна из самых смертоносных бомбардировок в истории."
 nuke_dropped.109.a:0 "Сила Сердца спасла их. Как интересно."
 nuke_dropped.109.b:0 "Кристальное Сердце спасло нас."
 nuke_dropped.109.c:0 "Как хорошо, что меня там не было."
 nuke_dropped.109.d:0 "Может быть, Кристальное Сердце спасло бы и нас?"

 nuke_dropped.110.t:0 "Ядерная бомбардировка Сталлионграда"
 nuke_dropped.110.d:0 "[This.GetNewspaperHeader]Город, который когда-то победил эквестрийского гиганта, сегодня стал целью ядерной атаки. Оправдано это или нет, но война между государствами [From.From.Owner.GetNameDef] и [From.Owner.GetNameDef] достигла точки, когда применение оружия массового уничтожения стало реальностью. Взрыв пришёлся в самое сердце [From.From.Owner.GetAdjective]ого правительства: Дворец Советов почти полностью разрушен.\n\n[From.From.Owner.GetLeader], давно опасавшийся всех угроз, успел эвакуироваться и выжил. Но [From.From.Owner.GetName] – небольшая страна, и лидер не сможет вечно избегать ударов безжалостного врага. Если это будет продолжаться, мечта о сталлионградском пролетариате, вдохновляющем мир, угаснет."
 nuke_dropped.110.a:0 "Труднейший выбор требует сильнейшей воли."
 nuke_dropped.110.b:0 "Эти трудности лишь укрепят нашу решимость!"

 nuke_dropped.111.t:0 "Ядерная бомбардировка Кольтфагена"
 nuke_dropped.111.d:0 "[This.GetNewspaperHeader]Немногие города столь тесно связаны с древностью, как Кольтфаген – сердце зоникийской цивилизации. Но богатая история не спасла его от удара государства [From.Owner.GetNameDef]: древние стены цитадели не выдержали мощи ядерного оружия.\n\nВ одно мгновение тысячи жителей в центре города превратились в пепел. Разрушения распространились по всему Кольтфагену, унося всё больше жизней. Даже массивный фундамент знаменитой круглой гавани треснул, и море поглотило сооружение, веками сопротивлявшееся стихии. Выжившие зебры отчаянно ищут своих близких. Когда грибовидное облако рассеялось, над городом пошёл дождь. Говорят, что сама Занит плакала в тот момент."
 nuke_dropped.111.a:0 "Тысячи лет истории исчезли в один миг."
 nuke_dropped.111.b:0 "Кто мы без Кольтфагена?"

 nuke_dropped.112.t:0 "Ядерная бомбардировка горы Арис"
 nuke_dropped.112.d:0 "[This.GetNewspaperHeader]Хотя несколько городов Северной Зебрики были разграблены или разрушены в результате боёв в XI веке, многие полагали, что гора Арис будет защищена своим островным расположением. Однако море не смогло спасти город от сегодняшнего удара. [From.Owner.GetAdjective]им бомбардировщикам удалось прорвать противовоздушную оборону государства [From.From.Owner.GetNameDef] и сбросить атомную бомбу прямо на гору.\n\nСообщения об ущербе всё ещё поступают, но, похоже, гора Арис полностью разрушена. Многие здания уничтожены, а повреждения самой горы ослабили и другие постройки. На Гармонизирующих Высотах всё ещё полыхают пожары, а радиоактивный мусор, вероятно, сделает эту местность небезопасной на долгие годы. Атака укрепила решимость части [From.From.Owner.GetAdjective]их граждан продолжать борьбу против государства [From.Owner.GetNameDef], но другие впадают в отчаяние от того, что рай, созданный для них богами, был разрушен оружием смертных."
 nuke_dropped.112.a:0 "Гора больше не сияет."
 nuke_dropped.112.b:0 "Им не сломить наш дух!"
 nuke_dropped.112.c:0 "Эй, ядерное оружие – наша прерогатива!"

 nuke_dropped.113.t:0 "Ядерная бомбардировка Нового Аякачтли"
 nuke_dropped.113.d:0 "[This.GetNewspaperHeader]Государство [From.From.Owner.GetNameDef] всегда было одним из самых скрытных обществ в мире, но то, что произошло сегодня, невозможно утаить. Получив контроль над небом над Имперскими Горами, [From.Owner.GetAdjective]ие военно-воздушные силы сбросили ядерный заряд на Новый Аякачтли.\n\nТрудно точно оценить ущерб, поскольку [From.From.Owner.GetNameDef] отказывается раскрывать какую-либо информацию, но немногочисленные сведения указывают на крайне тяжёлую ситуацию. В разрозненных сообщениях говорится о тысячах существ, спасающихся бегством, а некоторые утверждают, что [From.From.Owner.GetAdjective]ое правительство не позволяет никому входить или выходить из района. Городской храм Говорящих-с-Луной и его искусные витражи с изображением Найтмер Мун почти наверняка уничтожены. Некоторые наблюдатели восприняли это как знак того, что богиня покинула своих самых преданных последователей."
 nuke_dropped.113.a:0 "Найтмер не смогла спасти их."
 nuke_dropped.113.b:0 "Благословенная Найтмер, прости нас!"

 nuke_dropped.114.t:0 "Ядерная бомбардировка Сияния"
 nuke_dropped.114.d:0 "[This.GetNewspaperHeader]Разрушительная и смертоносная корпоративная война между Торговым Домом Сайси и Всекиринской Гильдией Артефакторов в Кирии достигла ужасающего апогея, когда в город Сияние контрабандой было доставлено грубое ядерное устройство, взорвавшееся затем в центре города. Сообщается о множестве погибших, а большая часть Сияния загрязнена радиоактивными осадками. Виновный в этом чудовищном преступлении пока не установлен: обе стороны обвиняют друг друга. Поскольку корпоративный конфликт перешёл к применению оружия массового поражения, крайне маловероятно, что НАКП удастся в ближайшее время усмирить своих враждующих корпоративных вассалов и предотвратить новые жертвы."
 nuke_dropped.114.a:0 "Это экстремальный уровень рыночной конкуренции!"
 nuke_dropped.114.b:0 "Как такое могло случиться? Кирия сходит с ума!"

 nuke_dropped.115.t:0 "Рёв тигра"
 nuke_dropped.115.d:0 "[This.GetNewspaperHeader]Цель ритуала, проведённого умирающим жречеством на вершине последней пирамиды Золотого Города, стала ясна лишь после его завершения. Небо над городом раскололось, когда древний хранитель – существо, известное как Громовой Тигр – обрушился на него в виде грозы, видимой за сотни миль. Весь город, построенный из магического золота, превратился в единый гигантский проводник, а [From.From.Controller.GetAdjective]ие захватчики были уничтожены. Те, кто осмелился осквернить этот священный город, заплатили за это наивысшую цену."
 nuke_dropped.115.a:0 "Святейший высказался."
 nuke_dropped.115.b:0 "Нам понадобится пушка побольше."

 nuke_dropped.116.t:0 "Атомная бомбардировка Глаза"
 nuke_dropped.116.d:0 "[This.GetNewspaperHeader]Хотя многие жаждали отомстить Королю Шторму, мало кто предполагал, что возмездие свершится столь безжалостным и эффективным образом. Всего несколько часов назад бомбардировщики с [From.Owner.GetAdjective]ими эмблемами успешно прорвались через мощную противовоздушную оборону Земель шторма и сбросили атомную бомбу на Глаз Бури.\n\nСообщения из города доходят с большими сложностями, но все они свидетельствуют о том, что Глазу Бури был нанесён катастрофический ущерб. Взрыв бомбы сровнял с землёй большую часть города, включая королевский дворец и несколько важных святынь; нетронутыми остались только лачуги, высеченные прямо в окружающих горах. Похоже, что горный хребет препятствует дальнейшему распространению радиоактивных осадков, но и сам он подвергается значительному облучению, поскольку на склоны гор постоянно падают радиоактивные обломки скал. Свидетели сообщают, что существа шторма пробираются через разрушенные улицы и горящие здания, чтобы, пусть и рискуя собой, перенести остальных йети в относительную безопасность своих пещер."
 nuke_dropped.116.a:0 "Разумно ли навлекать на себя гнев йети?"
 nuke_dropped.116.b:0 "Их предки зарыдают, когда мы в отместку сожжём их мертвецов."

 despicable_action:0 "§RНаши подлые действия привели к ухудшению международной репутации, и другие страны, вероятно, попытаются поддержать наших врагов.§!\n"
 HIE_totally_justified_action:0 "§RНаши §rдействия во благо всего лошадиного рода§! разъярили мерзких птиц. Нас не волнует, что говорят эти животные.§!\n"
 BOI_rage_on_griffonstone_nuker:0 "Отомстить за Грифонстоун"
 BOI_rage_on_griffonstone_nuker_desc:0 "Наши враги сожгли Грифонстоун ядерным ударом! Возможно, они думали, что это сломит волю нашего народа, но произошло обратное. Народ зол и яростно требует ответного удара. Кроме того, международное сообщество поддерживает нас: оно готово направить снаряжение и добровольцев, а также разорвать связи с нашим врагом. Мы отомстим этим подлецам!"