 # King Epilogue Events
 zongo_king_epilogue.1.t:0 "The Crimes of the Queen-Mother" #Snow
 zongo_king_epilogue.1.desc:0 ""The stack of parchment on Akida's desk stood as a monument to his own blindness. With his mother secured and a promise of pardons for information, he had invited the council and those she had accused as former collaborators to come forward. He had expected the worst, but somehow, the sheer size made even the folder Anarbek compiled look tiny.\n\nAkida picked up one just to get started. It detailed the 'accidental' poisoning of the former Mani Zowando during a feast. He read it closely and put it to the side. The next described the forced disappearance of a work crew that had protested for better hours. Akida laid it down alongside the previous paper, but as parchment followed parchment, it all unfolded a completely different mare from the mother he had known: evidence tampered with, witnesses silenced, and a reputation that ensured complete fear, just from the possibility of facing her ire.\n\nThen came a testimony that made the blood drain from his face. It was from one of the Mani who had fought alongside his father.\n\n'While the official narrative claims King Nkosi had fallen in battle, he had died after leaving to meet one of Nzuzi's messengers. There was an enemy offensive right in the section of the camp where he was to meet them; it couldn't have been a coincidence. It was clear to all in camp what had really happened, it—' Akida crumbled the paper and tossed it as fiercely as he could at a nearby wall.\n\nHe wished to kick something, to make this entire pile simply disappear, to just undo what happened! He had already known much of this from Anarbek's investigation, but the question laid in his mind: how had they hid from him... how much did Ayana know? How much of their love was truth and how much was a lie?! How much—\n\nHe bit his lip, as if to wake himself. There was no use in doubting those closest to him or ignoring his problems like a foal; he would only drive himself into an early grave. He lowered his head into his hooves, took a long breath and steeled himself to fulfil his duty."
 zongo_king_epilogue.1.a:0 "He had been so naive, but there still was a chance to fix his errors."
 zongo_king_epilogue.2.t:0 "A Red-Coloured Economy" #Snow
 zongo_king_epilogue.2.desc:0 "Akida's allies from the intelligentsia met once more. This time, however, their discussions were not based on theory, but on hard data gathered from the successes and failures of his plan. Akida was filled with a nervous anticipation as Anarbek prepared to present their findings. "It's... not good, Your Majesty," Anarbek began, his face etched with worry. "We've found rampant corruption at every level of the civil service. Inflation is through the roof. Zongo's economy may look strong to an outsider, but—"\n\n"It's going to collapse under its own weight." The hyena cut Anarbek off, earning a sharp glance from the centaur. At a nod from Akida, she was permitted to continue. "Thousands are already suffering in poverty because the state's institutions are failing to protect them; soon it will be millions. The treasury may appear full, but the economy is sure to stagnate within the next few decades... if we do not act, of course. But that is why we are here today, yes?"\n\nAkida's face fell for a moment before he gathered his courage and met the hyena's gaze. "You tried to warn me. All of you did." He looked pained as he spoke. "I was too proud to listen. I was so enamoured with my Magnum-Opus, so confident in my own ideas, that I failed to see the rotten foundation they were being built upon." He then bowed his head, a gesture that drew reactions from everyone in the room. "My pride and naivety led to this, I truly apologise!"\n\nHe raised his head once more, a new resolve in his eyes. "But while the past cannot be changed, the future can be shaped. We will implement anti-corruption measures, targeted relief for the poorest provinces, and a scale back the plan to focus on sustainability!" He paused, catching himself. "And of course, you are all free to suggest any ideas you may have. We will build this together." With an encouraging smile from Anarbek, the experts soon got to work, doing what they did best."
 zongo_king_epilogue.2.a:0 "When a thesis is rejected, one must simply rewrite and revise until it is satisfactory."
 zongo_king_epilogue.3.t:0 "The Grand Army And Police Tribunal" #Ardent
 zongo_king_epilogue.3.desc:0 "This was not right. None of this was. Yet here Zezu sat, following the orders of Zongo's Crown like the good loyal Mani he was. His eyes burned with contempt and all his muscles constricted with wrath but righteous, but bitterly he funneled all his rage into slamming down the stamp he clutched. A hard smack thrummed through his office, and Zezu idly tossed the dossier into a case on his desk corner. The green ink spelling the word "PARDONED" had already dried in the night air.\n\nZezu sneered. He knew every one of these names. They were not the powerless Mani simply following the Queen-Mother orders. They were zebras deserving nothing except punishment for the crimes they committed, the corruptions they proliferated, and their abhorrent abuses of position and power... but here they were, getting pardoned, as the King wished for the sake of kingdom stability. Such reprehensible actions and consequences by these Mani... the lives they ruined... so easily let go and brushed aside.\n\nHe slammed the stamp down again. Not every Mani was being pardoned, but those were few and far in between. The punishment criteria was too specific to be of any use for their tribunals to convict with. Never mind the authority they lavished in. Or the privileges they succored on. Or how they poorly treated their subordinates. These Mani deliberately acted for the Queen-Mother with the same free will he himself cleverly refused with!His narrowed eyes fell upon the case bearing all the dossiers he was told to pardon. Somewhere in there was Mani Zuba's packet, the Field Marshal, bearing a 'PARDON' stamp.\n\nThere was no justice here. Only the presumption that every single Mani was a poor zebra coerced. A Mani, much less a leader, ought to be held to higher standards and harsher punishments for their criminal actions and inaction. But no, the Kingdom of Zongo wanted to suddenly cling to the moniker of moral high ground... as it stood atop its pedestal of all whom it destroyed.\n\nAnother thump rang out from Zezu's stamp, and many more followed that the night." #Make sure Mani Zuba, the field marshal is mentioned here but cleared of wrongdoing
 zongo_king_epilogue.3.a:0 "Mercy for the guilty was just cruelty to the innocent."
 zongo_king_epilogue.4.t:0 "Formulating A Solution" #Snow
 zongo_king_epilogue.4.desc:0 "The council chamber was filled with all of its members. Akida stood at the head of the table, the faces he had grown to know watching him with anticipation. The past weeks had been busy; the previous meetings and work to uncover the scale of his mother's crimes had been long and tiring, but there was one more meeting to be held before they could truly begin the work of rebuilding.\n\nAkida had brought a stack of papers alongside him, but had not yet revealed their purpose. As he motioned for someone to come see them, Zuba was the first to walk forward and opened his mouth in surprise once he saw the contents. "It's... empty?" Confusion and whispers began to fill the room, but Akida's laugh silenced them.\n\n"That is my plan to get us back on track," he declared. "I have made two great mistakes during my short time as king: I believed my opinion was flawless when it came to my plan, yet I also completely delegated tasks I deemed insignificant to others without bothering to understand them. To become a true king worthy of your respect, I must tackle these flaws. So, these pages will be written not by me alone, but by all of us, together. I am here to listen. I want your voices, your ideas, and your criticisms. So, please," he said, gesturing to the empty pages, "let the council deliberate."\n\nThe debates started wearily, the council members lacking full confidence. But as they witnessed the King's willingness to listen, more and more ideas began to emerge, and day quickly became night without any noticing the passage of time. The once blank pages were now filled to the brim. As the last advisor departed, Akida remained, looking over the annotations that had been made. Ayana approached him, resting a gentle hoof on his shoulder. "It's very late, my dear. Perhaps we could finish arranging these papers tomorrow?" Akida looked a moment longer at them, and then looked up at her with a smile."
 zongo_king_epilogue.4.a:0 "Of course, let's do this tomorrow – together."
 zongo_king_epilogue.5.t:0 "The Commission Report" #TODO
 zongo_king_epilogue.5.desc:0 ""
 zongo_king_epilogue.5.a:0 ""
 zongo_king_epilogue.6.t:0 "The Governors Of Zongo" #Snow
 zongo_king_epilogue.6.desc:0 "Zuba stood on the balcony of his residence, looking out over the province that shared his title. The King's reforms had demoted him from Mani to Governor. It was a disrespect to their traditions, but one he could stomach. The real surprise was that he still had this balcony to stand on. He, like all his contemporaries, had been spared. Despite having served as a tool for Nzuzi's reign of terror during her time as regent, he had received a full pardon.\n\nAkida had shown himself weak many times over. His naivety, his idealism – it had all led to the near-collapse of Zongo. Zuba had once considered that he might need to get rid of both Bombokos to restore Nkosi's legacy. He had thought it would be easy... but then he had seen the respect the young king had garnered among the other Mani. There was no choice left but to fall in line.\n\nZuba's gaze swept over the province below. His province. The infrastructure was excellent, the Marekong raids were a distant memory, and his own standing remained largely intact—it was just a new coat of paint. Akida was not his father, nor was he strong in the way that mattered... but he was respected enough that Zuba no longer had any chance of shaking up the status quo. He could, at least, be grateful he was still around and that the witch Nzuzi had been dealt with.\n\nZuba was one of the last few relics of the old Zongo that was still around. He wondered if any of it would remain in the future as he and the last Mani died off, making the way for a generation of 'governors' who did not care for their past. He poured a drink and made a toast. The Zongo he knew would soon be gone, but he could enjoy its remnants while he was still around.\n\nHis reverie was broken barely a sip in by the approach of a young aide. The zebra skidded to a halt. "A word, sir V—" With a sharp raise of his hoof, Zuba silenced him. The foal flinched under the field marshal's gaze now fixed upon him."
 zongo_king_epilogue.6.a:0 ""Governor. It's Governor Zuba now.""
 zongo_king_epilogue.7.t:0 "A Union Of Crown And Faith" #Snow
 zongo_king_epilogue.7.desc:0 "The Grand Temple of Zongo, usually a place of quiet reverence, hummed with a palpable, joyful energy. Sunlight streamed through the windows, painting pools of emerald and gold across the stone floor where two zebras stood facing one another. To one side stood Akida. He looked every inch the respectable monarch in a long tunic of deep crimson velvet, its borders a breathtaking tapestry of gold-threaded embroidery, and a traditional cap replacing his crown. Before him was Ayana, a vision in cascading silks. The formal headdress of her office was absent, replaced by a garland of blooming flowers crowning her mane. Her smile was a familiar anchor in the storm inside them both. The ancient rites were spoken and blessings invoked. Then, the moment of truth. As the officiating elder stepped back, Akida took both of Ayana's hooves in his. His voice was softer now, yet it carried through the temple for all to hear.\n\n"You saw the king I wished to be, but you loved the stallion I was. You stood for our people every step of the way, just as you stood by me." He took a steadying breath, the slight tremor in his hoof betraying his confidence. "I promise you, before all we hold sacred, I will walk every path beside you. I will be your shelter and your greatest admirer. Always."\n\n"Your dreams for a better future captivated me ever since our first conversation. I thought I had finished finding my family when I joined the faith, but life always finds ways to surprise you." Tears welled in Ayana's eyes, tears of a joy so profound it overflowed. "I promise you, before all we hold sacred, I will walk every path beside you. I will be your shelter and your greatest admirer. Always."\n\nAs their final words hung in the air, they leaned in. A quiet convergence of crown and faith; of two souls who had found, against all odds, their other half in the midst of these trying times. The temple erupted. A roar of cheers, stomping hooves, and ringing bells swallowed the silence."
 zongo_king_epilogue.7.a:0 "Long live Akida and Ayana! May their lives be as prosperous as their home!"
 zongo_king_epilogue.8.t:0 "Epilogue Part 1" #Snow
 zongo_king_epilogue.8.desc:0 "Akida stood just outside the cell that held his mother. Its heavy wooden door featured a small port to see inside. He opened it and noticed a creature that barely looked like a zebra laying on the bed, the room itself had no amenities besides the simplest of necessities. He had wished to keep her under house arrest but there was no justifying allowing her such comforts, even if she was his mother. Gathering his courage, he finally knocked on the door to attract her attention.\n\nAs his mother noticed him, her eyes began to glow. She took slow steps closer and closer towards the barrier that separated them. Akida felt all his planned speeches and plans to tackle this disappear as his heart began to hammer against his chest.\n\n"Akida," she said, her voice almost a whisper. "My dear Akida." A smile grew on her face. "I always knew you had it in you. That fire, that will to survive and be on top. I knew you had it since you were a foal, you were my child after all. So brilliant, so determined, so... stubborn. I tried to nurture it, to guide it, but you were so convinced of your own wonderful little world of trains and books."\n\nShe reached her hooves forward, but could not reach him as he stepped back. She laughed. "Look at you now! You show no mercy even to close family! You throw her in a cell like a common criminal! You must understand now... what I did to your father was for the good of the kingdom. Just as you have done to me." Her smile widened into a malicious grin that did not fit a herbivore's face. "You truly are my son."\n\nAkida took another step back, tripping on the stairs behind him. Without a word, he turned and scrambled upwards, running up the stairs as fast as he could. He had so much he wanted to say to her, to demand of her. He had wished to see her apologise for all she had done, or to disprove it all somehow, so they could go back to how it was. But..."
 zongo_king_epilogue.8.a:0 "His mother was worse than any rumour or report he had ever heard."
 zongo_king_epilogue.9.t:0 "Epilogue Part 2" #TODO
 zongo_king_epilogue.9.desc:0 ""
 zongo_king_epilogue.9.a:0 ""
 zongo_king_epilogue.10.t:0 "An Alliance With [FROM.GetNameDefCap]" #Snow
 zongo_king_epilogue.10.desc:0 "A communiqué has arrived from the southeast. The entire region has united under the banner of the Zongolese flag, triumphing over even the Kirians. By a stroke of luck, the message comes from their young king, Akida Bomboko, who spent many years studying in the lands of the ancient pact; even having sought refuge in Karuk's court for a time after the Storm King's attack. King Akida claims to have greatly modernised and strengthened his kingdom, and now hopes to repay the kindness he was shown, proposing that our nations face the future together.\n\nWhile the offer seems generous, rumours suggest his country has recently endured great turmoil, undergoing sweeping reforms after his own mother's arrest. To tie ourselves to an unstable kingdom would be foolish; yet, the potential benefits of an alliance with a resurgent Zongo could also be immense... provided they can keep themselves afloat."
 zongo_king_epilogue.10.a:0 "For a future of peace, our causes unite!"
 zongo_king_epilogue.10.b:0 "It would be wise not to tie ourselves to a paper crown."
 zongo_king_epilogue.11.t:0 "[FROM.GetNameDefCap] Has Accepted" #Snow
 zongo_king_epilogue.11.desc:0 "The communiqué from İlkşehir arrived in the early morning. Akida had received the news from a diplomat and maintained a veneer of quiet respect. Now, alone in his study, a wide smile tugged at his lips. They had accepted his offer. He recited the words once more savoring each word. "...a formal alliance... in recognition of mutual interests and lasting friendship, and the successes of Zongo's efforts." The language was impeccable, respectful, and firm. It was everything he'd hoped for.\n\nAlone in the quiet room, he allowed himself a moment of unguarded joy. This was validation as grand as receiving the crown or becoming a doctor. Zongo was not a stagnant kingdom any longer; it was a partner of equal standing to even the Ancient Pact! His mind raced ahead, sketching possible futures.\n\nJoint rail standards with the Pact, student exchanges, shared minds, goals, futures! He carefully placed the document on his desk, stealing one more glance at the Pact's official insignia. Later today, he would announce it to the council with his usual composure. But for now, the King of Zongo stood in a sunlit room, smiling over the success."
 zongo_king_epilogue.11.a:0 "A bright future ahead!"
 zongo_king_epilogue.12.t:0 "[FROM.GetNameDefCap] Has Refused" #Snow
 zongo_king_epilogue.12.desc:0 "The communiqué from İlkşehir arrived in the early morning. Akida had received the news from a diplomat and maintained a veneer of quiet respect. Now, alone in his study, he wondered where it had gone wrong. They had refused his offer. He recited the words once more. Each "with profound respect" and "enduring friendship" was a velvet cushion around the firm, unyielding "no".\n\nAlone in the quiet room, he allowed himself a moment of disappointment he could not show the council. He had proven his thesis and shown himself worthy of his doctorate; yet that was not enough to earn the respect of the Pact that had housed him. Zongo was not a stagnant kingdom any longer; it was a partner of equal standing to even the Ancient Pact! Why couldn't they see that?\n\nJoint rail standards with the Pact, student exchanges, shared minds, goals, futures – so much that could have been! He carefully placed the document on his desk, stealing one more glance at the Pact's official insignia. Later today, he would announce it to the council with his usual composure. But for now, the King of Zongo stood in a sunlit room, wondering what this meant for Zongo's future."
 zongo_king_epilogue.12.a:0 "Back to the drawing board..."
