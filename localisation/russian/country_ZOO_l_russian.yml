 inherit_MQA_techs_tt:0 "Будут изучены технологии Самбовато"
 ZOO_chargers_tt:0 "Будут развёрнуты две дивизии шириной фронта 21, в составе которых находятся 9 батальонов §Yналётчиков§! и 1 §Yартиллерийский§! батальон.\n"
 ZOO_capital_guard_tt:0 "Будут развёрнуты три дивизии шириной фронта 21, в составе которых находятся 9 §Yпехотных§! и 1 §Yартиллерийский§! батальон.\n"
 zongo_kiria_7_tt:0 "Хрупкий статус-кво разлетается на тысячи осколков, и судьба Зонго будет определена тем доверием, которое Акида сумел заслужить у своего народа за это время."
 zongo_kiria_8_tt:0 "Когда надежду подавляют страх и уважение со стороны матери, сыну необходимо преподать урок мастерства госуправления. Уважение нужно завоевать, но Акида этого не сделал. Мама позаботится о том, чтобы исправить эту проблему."
 zongo_kiria_9_tt:0 "Как бы он ни старался, Акида так и не смог стать одним из великих монархов. План мани Зубы сорван, а семья Бомбоко сломлена, так что будущее Зонго остаётся в тумане..."
 zongo_kiria_10_tt:0 "Теперь, когда Акида внушает мани тот же страх, что и когда-то его мать, величайший источник коррупции в Зонго устранён... или так надеется Акида. Лишь время покажет, сможет ли уважение исправить ущерб от долгих лет некомпетентности."
 zongo_king_epilogue_13_tt:0 "Пока страна празднует и ликует, нынешний тяжёлый этап истории Зонго завершается. Этот путь, несмотря на провалы, потери и трагедии, всё же не был лишён надежд, прогресса и настоящих реформ. Но хотя бы сегодня кажется, что дальше всё будет хорошо.\n\nСпасибо, что сыграли за Зонго!"
 zongo_queen_mother_epilogue_10_tt:0 "Пока элиты празднуют, нынешний тяжёлый этап истории Зонго завершается. Хотя Акида и доказал, что всё ещё слишком наивен, чтобы править, мать позаботится о том, чтобы их дом стал владыками давно причитавшейся им империи. Мама всегда права – просто улыбнитесь и поблагодарите её.\n\nСпасибо, что сыграли за Зонго!"
 zongo_council_epilogue_11_tt:0 "Когда двое наконец разделяют долгожданный момент наедине, нынешний тяжёлый этап истории Зонго завершается. Путь, полный предательств и трагедий, всё же привёл к появлению куда более справедливой страны, чем когда-либо прежде. Сегодня они отдыхают и наслаждаются миром, ведь завтра у королевы будет много работы.\n\nСпасибо, что сыграли за Зонго!"
 zongo_council_epilogue_13_tt:0 "Пока двое строят планы на будущее, нынешний тяжёлый этап истории Зонго завершается. Путь, полный предательств и трагедий, всё же привёл к появлению куда более справедливой страны, чем когда-либо прежде. Сегодня они смеются и наслаждаются миром, ведь завтра у премьер-министра будет много работы.\n\nСпасибо, что сыграли за Зонго!"

