 ### CHARACTERS ###
 ZOO_akida_bomboko:0 "Акида Бомбоко" #Snow
 ZOO_akida_bomboko_desc:0 "§YДата рождения§!: 5 ноября 985 года в Зонго\n\n§YБиография§!: Будучи единственным сыном и наследником покойного короля, Акида с самого рождения воспитывался как будущий мвенезонго. Он получал всё, что хотел, а это также подразумевало и доступ ко всей возможной информации в королевской библиотеке. Различные науки, история, арифметика – его интересовало всё, и это было отнюдь не праздное любопытство. Вскоре все начали осознавать, что перед ними настоящий маленький гений. Именно в этот ранний период Акида приобрёл главное увлечение всей жизни – поезда. Эффективные, мощные и просто невероятно крутые, эти чудеса инженерии вдохновили его на мысль, что королевство, которым ему суждено править, может стать ещё более эффективным, чем когда-либо прежде.\n\nВпрочем, дальнейшую судьбу Бомбоко омрачило несчастье – его отец погиб во время войны между Зонго и Зеблу. Опасаясь за жизнь сына и желая, чтобы он получил куда более качественное образование за пределами родины, мать отправила его учиться в политехнический институт Илкшехира на факультет экономики. Уже там Акида обучился огромному количеству вещей, которые наверняка помогут ему выстроить для Зонго светлое будущее.\n\nАкида – гений, в чём он сам полностью уверен. И несмотря на то, что эта уверенность отнюдь не беспочвенна, он всё же сохраняет скромность в отношении своих академических достижений, пусть изредка и позволяя себе лёгкое самодовольство. Также отличительной особенностью наследника престола является неиссякаемый энтузиазм и оптимизм в отношении дел, за которые он берётся. Особенно это касается его стремления доказать, что академическая теория применима на практике, в чём все смогут убедиться на примере Зонго, когда даже такая "отсталая" страна будет способна достичь современности, если будет следовать его расчётам.\n\nИ всё же, несмотря на свою гениальность и острый ум, Акида остаётся прискорбно наивным относительно всего, что касается политики. Зебра безгранично доверяет семье и друзьям во всём, что он считает "неважным", и это привело многих к мысли, что он – мягкотелый утопист. Со временем Бомбоко поймёт, что управлять страной куда сложнее, чем просто быть умным... по крайней мере, на это надеются."
