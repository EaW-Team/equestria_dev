 ### Ideas ###
 ZOO_regency_1:0 "Правление регента-матери"
 ZOO_regency_1_desc:0 "Во время правления регента Зонго сохранил хрупкий баланс между былыми традициями и стремлением к переменам. Период регентства нёс в себе осторожное управление с консервативным подходом ко внутренним делам и дипломатии. Хотя это обеспечило стабильность управления, оно также привело к отсутствию значительного прогресса и инноваций."

 ZOO_grand_coronation:0 "Великолепная коронация"
 ZOO_grand_coronation_desc:0 "Правительство не экономило на проведении коронации. Все присутствующие были ослеплены демонстрацией роскоши: от экзотических танцоров до изысканных королевских драгоценностей. Многие увидели молодого короля в первый раз, а грандиозная церемония только укрепила их уверенность в блистательности грядущего правления монарха."

 ZOO_under_chieftains_control:0 "Уполномоченные местные мани"

 ZOO_weak_constitution:0 "Обычное право"
 ZOO_weak_constitution_desc:0 "Верховная власть в Зонго принадлежит монархии, которую консультирует Королевский совет, состоящий из духовенства и манис, выступающих в качестве региональных управляющих. Ожидается, что мани будут обеспечивать порядок в своих региональных провинциях, гарантируя защиту основных прав зонголезцев в соответствии с историческими прецедентами."
 ZOO_mediocre_constitution:0 "Кодифицированный закон"
 ZOO_mediocre_constitution_desc:0 "Король Акида кодифицировал обычные законы, гарантируя их справедливое применение по всему королевству, независимо, какой мани правит на местном уровне. Это привело к тому, что их стали называть "Кодексом Акиды". Совет консультирует монарха по любым законам или поправкам к новому законодательству, причём окончательное слово остаётся за королём."
 ZOO_strong_constitution:0 "Королевская конституция"
 ZOO_strong_constitution_desc:0 "Королевская конституция содержит законы, на основе которых строится весь Зонго. Правовой кодекс описывает стандартизированные законы для всех регионов, в то время как мани просто выступают в качестве церемониальных правителей и советников монарха. Хотя ценности веры закреплены в конституции, все граждане сохраняют свободу вероисповедания."
 ZOO_suspended_constitution:0 "Приостановленная королевская конституция"
 ZOO_suspended_constitution_desc:0 "Королева-регентша приостановила действие конституции, и в настоящее время в Зонго действуют чрезвычайные меры. Хотя в королевстве по-прежнему действует единый закон, ситуация может измениться в любой момент, поскольку королевский совет бессилен, а королева-регентша является единственной абсолютной правительницей Зонго."
 ZOO_dictatorial_constitution:0 "Реформированная королевская конституция"
 ZOO_dictatorial_constitution_desc:0 "Королева-регентша внесла поправки в реформированную конституцию, закрепив её абсолютную и неоспоримую власть в Зонго. Мани теперь частично облечены властью, в результате чего вместе с рядом ключевых лиц в Зонго они превратились в новый олигархический класс, в то время как вера полностью подчинена действующему монарху."
 ZOO_broken_constitution:0 "Нерабочая королевская конституция"
 ZOO_broken_constitution_desc:0 "Королевская конституция перестала действовать:  недавние события показали, что в копытах монархии находится слишком много полномочий и что злоумышленники могут злоупотребить этими полномочиями. Система мани оказалась неспособной обеспечить надлежащий надзор. Необходимо внести поправки в конституцию, чтобы мы не скатились к хаосу и расколу."
 ZOO_perfected_constitution:0 "Идеальная королевская конституция"
 ZOO_perfected_constitution_desc:0 "Недавно изменённая королевская конституция передала большую часть полномочий губернаторам регионов и значительно ограничила полномочия монарха и его наместников. Полномочия совета теперь закреплены в конституции, а независимый судебный орган обеспечивает дополнительный надзор."
 ZOO_collapsed_constitution:0 "Рухнувшая королевская конституция"
 ZOO_collapsed_constitution_desc:0 "Королевская конституция была полностью дискредитирована в результате государственного переворота. Лояльность мани находится под вопросом, в то время как стало ясно, что королева-мать сильно злоупотребляла властью монархии. Если мы в ближайшее время не внесём поправки в конституцию, зонголезское государство может развалиться само по себе."
 ZOO_federal_constitution:0 "Королевская федеративная конституция"
 ZOO_federal_constitution_desc:0 "Новая конституция превратила Зонго в конституционную монархию, усиливая регионы и гарантируя независимость судебной власти. Королевский совет был преобразован в демократически избранный парламент. Королева Аяна и премьер Анарбек видят будущее, где права каждого неприкосновенны, а солидарность – основа процветания."

 ZOO_unfinished_modernization:0 "$ZOO_grand_railroad_project$: наследие"
 ZOO_unfinished_modernization_desc:0 "Королева-мать резко отменила  $ZOO_grand_railroad_project$ и вместо этого решила приватизировать многие активы, принадлежащие ему и монархии, в рамках так называемой экономической шоковой терапии, утверждая, что это принесёт больше свободы и возможностей населению."
 ZOO_reworked_modernization_program:0 "Королевский совет по разработкам"
 ZOO_reworked_modernization_program_desc:0 "Королевский совет по разработкам обеспечивает надзор, управление и субсидии промышленному сектору Зонго в условиях свободного рынка, так как наши первоначальные планы неосуществимы без мудрости Акиды. Правление действительно использует опыт старого $ZOO_grand_railroad_project$, обеспечивающего устойчивый рост нашей экономики."

 ZOO_purging_the_disloyal:0 "Избавление от нелояльных"
 ZOO_purging_the_disloyal_desc:0 "Королева-мать приказала провести во благо народа массовые аресты тех, кто нелоялен к правительству. Да здравствует Зонго!"
 ZOO_lack_of_trust:0 "Отсутствие доверия"
 ZOO_lack_of_trust_desc:0 "Как только преступления королевы-матери всплыли на поверхность, многие зебры в Зонго, по понятным причинам, перестали нам доверять. Многие пострадавшие от её действий в страхе перестали различать Зонго и её саму. Нам нужно приложить усилия, чтобы вернуть доверие народа к нашей стране."
 ZOO_uncertainty_about_truth_1:0 "Неопределённая истина"
 ZOO_uncertainty_about_truth_1_desc:0 "Крайне неприятная правда кроется в тени паутин интриг и преступлений. Мало что однозначно известно о преступлениях королевы-матери, но можно с уверенностью сказать: нас ждут максимально неприятные вещи, так что мы должны дойти до истины, если хотим покаяться."
 ZOO_uncertainty_about_truth_2:0 "Завеса тайны приподнята"
 ZOO_uncertainty_about_truth_2_desc:0 "Словно лук, который чистят слой за слоем, подлинная сущность властей Зонго медленно обнажается. В самом сердце нашей монархии лежат исчезновения несогласных, коррупция и многое другое."
 ZOO_uncertainty_about_truth_3:0 "Правда о наших недостатках"
 ZOO_uncertainty_about_truth_3_desc:0 "Пока лук продолжает очищаться, глаза короля наполняются слезами, поскольку весь масштаб преступлений королевы-матери вот-вот раскроется. Сердце Зонго давно зачерствело и покрылось плесенью коррупции, так что все скептики были правы в своём недоверии к государству."
 ZOO_uncertainty_about_truth_4:0 "Правда восторжествовала"
 ZOO_uncertainty_about_truth_4_desc:0 "Новый план появится из слёз короля. Зонго раскается за свои недостатки и предпримет великие действия, чтобы исправить ошибки прошлого. Наследие королевы-матери не должно быть наследием Зонго."
 ZOO_queen_mother_loyalists_1:0 "Лоялисты королевы-матери"
 ZOO_queen_mother_loyalists_1_desc:0 "Коррумпированные чиновники, армейские офицеры, полиция и бюрократы продолжают свою деятельность на территории Зонго. Если мы когда-то отойдём от ужасов, творимых королевой-матерью, то должны будем разобраться с её лоялистами."
 ZOO_queen_mother_loyalists_2:0 "Лоялисты королевы-матери"
 ZOO_queen_mother_loyalists_2_desc:0 "Медленно, один за одним, коррупционеры и оппортунисты заменяются на компетентных и честных сотрудников. Хоть на зонголезской бюрократии и останется пятно, а мы ещё не приложили достаточно усилий для исправления прошлых ошибок, можно уверенно сказать, что скоро наше государство очистится от гнили королевы-матери."

 ZOO_commute_to_work:0 "Общественный транспорт"
 ZOO_commute_to_work_desc:0 "Сделав транспортировку граждан приоритетной задачей, мы обеспечили их своевременное прибытие на работу, что принесло долгосрочные преимущества. Повышение надёжности транспортной системы дарит каждому гражданину самый ценный ресурс – время."
 ZOO_increased_freight_trains:0 "Больше грузовых поездов!"
 ZOO_increased_freight_trains_desc:0 "Оптимизация грузопотоков на нашей обширной сети железных дорог позволила вывести на новый уровень эффективность всего производства: от первичного сырья до сложных изделий."

 ZOO_untapped_potential_1:0 "Скрытый потенциал"
 ZOO_untapped_potential_1_desc:0 "Зонго – это страна неосвоенных богатств: как природных ресурсов, так и рабочей силы. Несмотря на это, на протяжении прошлого тысячелетия эти ресурсы не использовались должным образом; текущая экономическая политика привела к стагнации, и до сих пор традиционное племенное сельское хозяйство преобладает над современными экономическими структурами. И хотя местное население сохраняет свою стойкость и находчивость, ему не хватает доступа к современным благам образования и здравоохранения, что в целом пагубно влияет на развитие королевства. В связи с этим Зонго оказался на перепутье: потенциал нашей страны поистине велик, но мы не можем его реализовать из-за нехватки новаторских разработок и современной инфраструктуры, позволившей бы нам покорить наши обширные леса."
 ZOO_untapped_potential_2:0 "Разработка природных ресурсов"
 ZOO_untapped_potential_2_desc:0 "Зонго (некогда являвшийся страной неосвоенных богатств) медленно, но верно приступил к разработке обширных залежей природных ресурсов, сокрытых в недрах наших лесов. Новая экономическая политика дала мощный импульс началу крупномасштабных геологоразведочных работ по поиску всевозможных месторождений полезных ресурсов и их освоению. Находчивость и стойкость нашего населения, проявленные в условиях стремительного роста, обещают в будущем принести ещё более весомые плоды."
 ZOO_untapped_potential_3:0 "Промышленный потенциал"
 ZOO_untapped_potential_3_desc:0 "Так как разработка ресурсов из бассейна Зонго идёт полным ходом, стало очевидным, что наше королевство обладает всеми необходимыми ресурсами для осуществления промышленного экономического чуда. Благодаря изобретательности и стойкости нашего народа, покорившего великие леса, эти же качества теперь питают и нашу промышленность. Опираясь на неисчерпаемый потенциал страны и её граждан, мы в кратчайшие сроки создадим современную экономику."
 ZOO_untapped_potential_4:0 "Промышленная революция"
 ZOO_untapped_potential_4_desc:0 "Теперь наши крупнейшие промышленные центры связаны разветвлённой сетью железных дорог, что позволяет ресурсам из бассейна Зонго оперативно поступать на ближайшие заводские комплексы. Так в полной мере реализуются преимущества взаимосвязанности, заложенные в проекте $ZOO_grand_railroad_project$."

 ZOO_army_reforms_1:0 "Наследие войны с Зеблу"
 ZOO_army_reforms_1_desc:0 "На пороге нового тысячелетия зеблуйский хан пересекла нашу границу и вторгся в Итебру, развязав кровавую войну, одной из жертв которой стал и король Нкоси. Наши вооружённые силы обескровлены, но опытны; несмотря на это, конфликт с Зеблу показал, что нам нужно увеличить численность армии. Мы должны принять определённые меры для решения этой проблемы, пополнить запас резервистов и модернизировать военные структуры в единую централизованную армию."
 ZOO_army_reforms_2:0 "Возрождённая королевская стража"
 ZOO_army_reforms_2_desc:0 "Высокая заработная плата и новые учебные учреждения привели к тому, что многие зонголезцы ищут карьеру во вновь возрождённой королевской гвардии. Нам необходимо сосредоточиться на дальнейшем реформировании структуры армии и заимствовании системы вооружённых сил у Сентурии, которая отличается от нашей профессиональным офицерским корпусом и централизованным командованием."
 ZOO_army_reforms_3:0 "Королевская армия"
 ZOO_army_reforms_3_desc:0 "Новая Королевская армия теперь состоит из объединённых под единым централизованным командованием гвардейских дивизий. Многие мани служат в рядах наших войск в качестве высшего офицерского состава, и эту же роль также выполняют ветераны зеблуйской войны, прошедшие обучение применению современных военных тактик в наших новых офицерских школах. Многие зебры теперь с удовольствием пользуются возможностью вступить в Королевскую армию, зная, что самые способные из них имеют шанс стать настоящими кадровыми офицерами."
 ZOO_army_reforms_4:0 "Гордость за Королевскую армию"
 ZOO_army_reforms_4_desc:0 "Теперь многие зонголезцы гордятся институтом Королевской армии. Видя этих солдат в современном снаряжении, марширующих на регулярных парадах, жеребята из самых разных семей – и бедных, и богатых – лелеют мечту однажды встать в их ряды, чтобы защищать Зонго от любой угрозы."
 ZOO_army_reforms_5:0 "Королевская армия под подозрением"
 ZOO_army_reforms_5_desc:0 "Верность Королевской армии теперь находится под вопросом. Недавние события показали, что мы не можем гарантировать верность вооружённых сил, если командующие ими офицеры-мани также не демонстрируют лояльности трону. Со стороны короля было бы предусмотрительным принять меры, которые бы гарантировали ему верность армии в случае раскольничества со стороны какого-бы то ни было члена совета."
 ZOO_army_reforms_6:0 "Верная Королевская армия"
 ZOO_army_reforms_6_desc:0 "Благодаря недавним успехам особого трибунала, многие оппортунисты и неблагонадёжные офицеры были отправлены в отставку. Королевская армия теперь беспрекословно подчиняется тем, кто платит ей жалованье. Солдаты уважают силу, и в последние месяцы мы ясно дали понять, что именно король является бесспорным источником этой силы. Отныне их верность трону не подлежит сомнению, ибо теперь, присягнув на верность монарху лично, солдаты по праву могут называть себя членами Королевской армией."
 ZOO_army_reforms_5_council:0 "Конфликт лояльности в армии"
 ZOO_army_reforms_5_council_desc:0 "Предательство мани Зубы – фельдмаршала Королевской армии – указало нам на конфликт в вооружённых силах. В то время как верность мани-оппортуниста остаётся под сомнением, зебры, занявшие свои места в армии благодаря собственным заслугам, остаются верны короне. Было бы разумным реструктурировать армию и обеспечить приоритетное место в вооружённых силах тем, у кого есть необходимые способности, а не тем, кому повезло родиться во влиятельную семью."
 ZOO_army_reforms_6_council:0 "Меритократия в рядах Королевской армии"
 ZOO_army_reforms_6_council_desc:0 "После окончания чистки офицерского класса от оппортунистов оставшиеся офицеры были избраны и повышены исключительно на основе их навыков и верности короне. Теперь граждане могут смело рассчитывать на наши вооружённые силы как на своих защитников, а также как на организацию, в которой каждый может достичь высокого звания, опираясь лишь на свои навыки и знания."
 
 ZOO_navy_production_bonus:0 "[ZOO.GetAdjective] Naval Production" #Probably come up with something better
 ZOO_navy_production_bonus_desc:0 "More boats!" #TODO

 ZOO_grand_railroad_project:0 "Rail & Nation Program" #TODO
 ZOO_grand_railroad_project_desc:0 "Prompt: all state funds are being funneled into this massive, technocratic modernisation program heavily based upon the usage of railways for industrial interconnectivity"
 
 ZOO_zaikirian_subject_idea:0 "Зонголезско-зайкирский договор о развитии"
 ZOO_zaikirian_subject_idea_desc:0 "Договор с зонголезцами привёл к тому, что большая часть наших природных ресурсов отправляется в Зонго для поддержания роста их ненасытной промышленности, в то время как нам взамен на это предоставляются лишь мелкие крупицы. Впрочем, мы рады такому обмену, так как это позволяет нам сохранять нашу независимость и автономию."
 ZOO_zongolese_trade_relations_idea:0 "Зонголезское торговое соглашение"
 ZOO_zongolese_trade_relations_idea_desc:0 "Зонголезцы пообещали сохранять с нами мир и не вмешиваться в наши дела в обмен на выгодное тарифное соглашение."
 ZOO_zongolese_defender_idea:0 "Подготовка Мейрконга"
 ZOO_zongolese_defender_idea_desc:0 "Мы не питаем иллюзий относительно отношений с киринами. И даже если в настоящий момент с Зайкирией сохраняется мир, нам необходимо тщательно изучить их технологии, военные доктрины и прочее, чтобы обеспечить себе преимущество в любом будущем конфликте."
 ZOO_zebluan_army_inspiration_idea:0 "Зеблуйская военная мысль"
 ZOO_zebluan_army_inspiration_idea_desc:0 "Опыт войны со старыми врагами – зеблуйцами, – победившими нас в прошлом конфликте, позволил нам перенять некоторые уловки и приёмы различных племён для быстрого перемещения и развертывания армии."

 ZOO_kirian_war_effort_idea:0 "Всеобщая мобилизация Зонго"
 ZOO_kirian_war_effort_idea_desc:0 "Если мы потерпим неудачу сейчас, это перечеркнёт все наши прошлые усилия. Долг каждого гражданина – предоставлять всё необходимое для нужд фронта, и тысячи зебр уже откликнулись на этот призыв."
 ZOO_kirian_resistance_suppresion_idea:0 "Акт по предотвращению восстаний в Зайкирии"
 ZOO_kirian_resistance_suppresion_idea_desc:0 "Мы приняли меры по предотвращению крупномасштабных восстаний киринов на оккупированных территориях. Эти меры необходимы для обеспечения безопасности как нашей армии, так и самих киринов, находящихся в нашем подчинении."

 ZOO_super_heavy_artillery_development_idea:0 "Инвестиции в зонголезскую артиллерию"
 ZOO_super_heavy_artillery_development_idea_desc:0 "Будущее зонголезской армии зависит от её возможности накрыть врага снарядами до того, как тот доберётся до пехоты. Мы разработали новые способы производства крупной артиллерии, однако эти эксперименты потребовали много ресурсов, и пройдёт какое-то время, прежде чем мы полностью интегрируем их в наши вооружённые силы."
 ZOO_army_support_idea_1:0 "Полки МТО"
 ZOO_army_support_idea_1_desc:0 "Для улучшения снабжения войск были сформированы полки МТО. Одной из предпринятых ими мер является внедрение стандартизированного комплекта снаряжения и отказ от использования нештатного оружия местного производства."
 ZOO_army_support_idea_2:0 "Полки МТО"
 ZOO_army_support_idea_2_desc:0 "Для улучшения снабжения войск были сформированы полки МТО. Кроме прочего, теперь в каждой дивизии имеется штатный алхимик, обеспечивающий подразделения зельями."
 ZOO_army_artillery_idea_1:0 "Доктрина артиллерийского огня"
 ZOO_army_artillery_idea_1_desc:0 "Армия Зонго полагается на мощь своей артиллерии, и мы приложили все усилия, чтобы выковать из наших канониров истинных мастеров своего дела. Когда враг решится скрестить с нами мечи, ему следует приготовиться к оглушительному грохоту наших орудий."
 ZOO_army_artillery_idea_2:0 "Доктрина артиллерийского огня"
 ZOO_army_artillery_idea_2_desc:0 "Армия Зонго полагается на мощь своей артиллерии, и мы приложили все усилия, чтобы выковать из наших канониров истинных мастеров своего дела. Когда враг решится скрестить с нами мечи, ему следует приготовиться к оглушительному грохоту наших орудий."
 ZOO_army_spec_ops_idea_1:0 "Доктрина ударных частей"
 ZOO_army_spec_ops_idea_1_desc:0 "В доктрине зонголезской армии особая роль отведена ударным частям, наносящим противнику максимальный урон до подхода основных сил. Противник должен быть готов к ударам из тени – наши диверсанты будут атаковать внезапно, сводя собственные потери к минимуму."
 ZOO_army_spec_ops_idea_2:0 "Доктрина ударных частей"
 ZOO_army_spec_ops_idea_2_desc:0 "В доктрине зонголезской армии особая роль отведена ударным частям, наносящим противнику максимальный урон до подхода основных сил, вооружённых противотанковыми и противовоздушными орудиями. Противник должен быть готов к ударам из тени – наши диверсанты будут атаковать внезапно, сводя собственные потери к минимуму и ослабляя врага перед встречей с нашими основными и готовыми к любой ситуации силами."

 ZOO_royal_mining_company:0 "Зонголезская горнопромышленная компания"
 ZOO_royal_mining_company_desc:0 "ЗГК – это государственная компания, главной целью которой является увеличение добычи полезных ископаемых."
 ZOO_royal_construction_corp:0 "Зонголезский строительный корпус"
 ZOO_royal_construction_corp_desc:0 "ЗСК – это государственная компания, отвечающая за координацию инженерно-строительных работ и повышение их эффективности."
 ZOO_royal_electronics_company:0 "Зонголез Электроникс"
 ZOO_royal_electronics_company_desc:0 "Зонголез Электроникс – это государственная компания, специализирующаяся на исследовании современной электроники."
 
 zoo_naval_1_1:0 "Sambovatan Naval Knowledge"
 zoo_naval_1_1_desc:0 "Why learn anew that which our Sambovatan cousins figured out decades ago? We shall copy their techniques for our own means."
 zoo_naval_2_1:0 "Draw Up Naval Strategy"
 zoo_naval_2_1_desc:0 "Zongo has never had a proper navy, and while our sailors may know how to sail a ship tactically, we lack any kind of unified strategy. Bright minds will be put to the task of designing guidelines for our captains and strategies for how to utilise our navy."
 zoo_naval_3_1:0 "Defending Our Trade"
 zoo_naval_3_1_desc:0 "The most important thing a navy can do is protect our convoys, and thus, our industry. Investments will be made into designing ships better suited for this task."
 zoo_naval_3_2:0 "Arming Our Ships"
 zoo_naval_3_2_desc:0 "What is a ship worth without weapons to fire on the enemy? We shall utilise our knowledge of land-artillery to design guns for our ships."
 zoo_naval_4_1:0 "Iterate Further On Designs"
 zoo_naval_4_1_desc:0 "The key to progress is constant iterations; constantly improving our designs with each one. We shall continue to iterate upon our ship designs so that they may be better protected from enemy fire."
 zoo_naval_4_2:0 "The Importance Of Naval Equipment"
 zoo_naval_4_2_desc:0 "There is more to ships than guns and armor, various equipment required to sail these ships must be modernised so we might use our ships effectively."
 zoo_naval_4_3:0 "Striking Beneath The Sea"
 zoo_naval_4_3_desc:0 "Abroad there seems to be a new type of under-sea ship changing how naval warfare is done. These so-called submarines have been used to great effect in sinking enemy convoys. We should draw up our own designs to replicate their successes."
 zoo_naval_5_1:0 "Large Guns On Large Ships"
 zoo_naval_5_1_desc:0 "In a one-on-one battle, the one with the larger firepower usually prevails. We will design grand ships capable of carrying massive artillery that can fire far beyond the range of any of our traditional ships."
 zoo_naval_5_2:0 "Utilise The Airforce"
 zoo_naval_5_2_desc:0 "Several countries have used their airforce to great effect against ships, even putting them on specially-designed carriers. We should replicate these experiments so our airforce might complement our artillery volleys."
 zoo_naval_6_1:0 "Expand Naval Production"
 zoo_naval_6_1_desc:0 "Ships are expensive and take a long time to build. Zongo may have a highly-efficient industry but our naval production is lacking. By integrating our naval production closer with our industry, we will be able to outproduce any enemy."

 ZOO_air_reforms_1:0 "Воздушная эра Зонго"
 ZOO_air_reforms_1_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_2:0 "Воздушная эра Зонго"
 ZOO_air_reforms_2_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_sb:0 "Воздушная эра Зонго"
 ZOO_air_reforms_sb_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_bsp:0 "Воздушная эра Зонго"
