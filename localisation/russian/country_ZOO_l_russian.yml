 ZOO_railway_desc: "§L[ZOO_get_under_construction_line_desc]§!"
 ZOO_1_railway_line_desc:0 "Благодаря плодородным равнинам регион Заму является вторым по уровню благоустройства в Зонго, уступая лишь столице. Его стратегическое положение рядом с Чисимби и богатая природа делают инвестиции в Заму ключевым элементом для экономического роста."
 ZOO_2_railway_line_desc:0 "Будучи самым бедным регионом Зонго, Зупинамба долгое время не получала должного внимания из-за сурового рельефа и обширных джунглей. Программа призвана уменьшить хроническую бедность и многочисленные проблемы региона, наконец продвинув его в современную эпоху."
 ZOO_3_railway_line_desc:0 "Родина одноимённого мани и часто используемый полигон для королевской армии, регион Зуба обладает ключевым значением для защиты Мейрконга. Модернизация инфраструктуры в этом регионе, что является основным костяком и опорой для армии, жизненно необходима для улучшения качества вооружённых сил и продвижения внешней политики."
 ZOO_4_railway_line_desc:0 "Южные земли Танайги, хотя и менее прибыльны, чем территории Мелахаки, остаются важным элементом в достижении панзонголезских целей. Их развитие необходимо для укрепления доверия местных жителей и интеграции региона в единую национальную идентичность."
 ZOO_5_railway_line_desc:0 "Южные земли Мелахаки являются крайне важным портом для выхода Зонго на мировой рынок и расширения торговли. Соединение Мелахаки с остальной страной необходимо для укрепления доверия и интеграции региона."
 ZOO_6_railway_line_desc:0 "Будучи нашим главным связующим звеном с Чисимби, линия Роам-Зеблу обладает ключевым значением для всех дальнейших инициатив в регионе. Её успешное завершение является приоритетом программы с логистической и стратегической точки зрения."
 ZOO_7_railway_line_desc:0 "После разрушения Золотого города и утраты его бога регион пребывает в глубоком кризисе. Враждебное к нашему присутствию, технологически отсталое и покрытое даже более густыми чем в Зупинамбе джунглями, это место станет серьёзным испытанием для инженеров."
 ZOO_8_railway_line_desc:0 "Несколько обособленные от соседей племена Наугдау проявляют интерес к нашим последним достижениям и действиям. Несмотря на их находчивость, регион остаётся технологически отсталым, а местность трудна для работ, что делает его соединение серьёзным вызовом."
 ZOO_9_railway_line_desc:0 "Как пристанище для грифоньих меньшинств и крупный порт, Имба-Зару – это крайне важный фундамент расширения внешней торговли Зонго. Будущая модернизация региона позволит извлечь значительную экономическую выгоду."
 ZOO_10_railway_line_desc:0 "Регион Цимейн наглядно демонстрирует, как неравенство доходов и угнетение низших слоёв приводят к нестабильности. Улучшение транспортных связей необходимо для облегчения жизни местных обитателей и полноценной модернизации района."
 ZOO_11_railway_line_desc:0 "Твизаньика – экономическая и административная катастрофа, отягощённая наследием пиратства, рабства и коррумпированной олигархии. Соединение региона с остальным Зонго позволит остановить застой и обеспечить процветание местных жителей."
 ZOO_12_railway_line_desc:0 "Путь Самбовато – уникальный проект программы, реализуемый за рубежом в сотрудничестве с местными компаниями и правительством. Мы обязаны строго соблюдать соглашения, чтобы развитие продвигалось равномерно во всех поселениях, а ресурсы Перламутровых Врат распределялись справедливо."
 ZOO_na_railway_line_desc:0 "Выберите новый путь для строительства железной дороги."
 
