 ### Focuses ###
 ##intro
 zoo_the_homecoming:0 "Прибытие"
 zoo_the_homecoming_desc:0 "Во времена смуты и раздоров внутри королевства принц Акида был отправлен в другую страну как ради собственной безопасности, так и для того, чтобы научиться управлению. Теперь пришла весть о его возвращении и готовности взойти на трон. Учитывая увлечение экономикой и поездами он, несомненно, поведёт Зонго в совершенно новую эпоху."
 zoo_gathering_the_council:0 "Созвать совет"
 zoo_gathering_the_council_desc:0 "Долгие годы королевский совет был лишь придатком монархии и формальностью без какого-либо реального влияния. Акида терпеть не может интриг и политических игр, поэтому с его приходом совет наконец получит шанс стать чем-то большим, чем простой кучкой болтунов."
 zoo_homecoming_celebrations:0 "Отпраздновать возвращение"
 zoo_homecoming_celebrations_desc:0 "Принц наконец вернулся на родину – празднествам быть! Пусть он и не проявляет особого энтузиазма, королева-мать посчитала, что это станет удобной возможностью познакомить его с элитой страны. Мнение Акиды в расчёт принималось."
 zoo_send_for_specialists:0 "Призвать специалистов"
 zoo_send_for_specialists_desc:0 "Проведя годы среди величайших умов Древнего Пакта, принц Акида крайне разочаровался в интеллигенции своей страны после разговора с ней. Чтобы его планы не были саботированы банальной нехваткой знаний, он призовёт иностранных экспертов. Их труд, разумеется, будет щедро вознаграждён."
 zoo_assure_the_chiefs:0 "Успокоить вождей"
 zoo_assure_the_chiefs_desc:0 "Последнее, что сейчас нужно принцу – чтобы вожди ставили палки в колёса его планам. Хотя ему и неприятно общаться с таким количеством существ, лучше сразу ясно дать понять о своих намерениях, чем столкнуться с проблемами в будущем."
 zoo_talk_to_mother:0 "Разговор с матерью"
 zoo_talk_to_mother_desc:0 "Нзузи Бомбоко – королева-регент, мать наследника и вдова прежнего короля. Пока Акида отсутствовал, она держала в своих копытах власть, которую её сын теперь унаследует. Перед скорой коронацией им будет нужно обсудить государственные дела для плавного перехода власти."
 zoo_prepare_the_coronation:0 "Подготовить коронацию"
 zoo_prepare_the_coronation_desc:0 "После нескольких недель, проведённых Акидой на берегах Зонго, пора подготовить его официальную коронацию. Осталось лишь решить, каким будет бюджет праздника." 
 zoo_new_budget:0 "Спланировать бюджет"
 zoo_new_budget_desc:0 "Решив перейти к куда более важным делам, чем всё, что он делал до этого, принц Акида созовёт экономистов, чтобы подготовить бюджет для своих замыслов. В его амбициях нет места экономии, так что средства найдутся, сколько бы расчётов ни потребовалось."
 zoo_talk_to_the_church:0 "Встретиться с духовенством"
 zoo_talk_to_the_church_desc:0 "Из всех важных встреч осталась последняя – разговор с духовными лидерами. После этого Акида наконец сможет заняться своими планами. Он лишь надеется, что этот старый зебра не окажется таким же льстивым и дремучим как другие... хотя с приверженцами религии редко бывает иначе." 
 zoo_the_coronation:0 "Коронация"
 zoo_the_coronation_desc:0 "Бейте в барабаны! Готовьте пиры! Пусть все зебры соберутся в Зонго! Последний день принца Акиды настал: сегодня он переродится как король! Да здравствует король Акида! Да здравствует Зонго!"
 zoo_enact_the_railroad_plan:0 "Начать строительство железных дорог"
 zoo_enact_the_railroad_plan_desc:0 "Оставив позади формальности и пустую политическую суету после коронации, Акида наконец может занять свои копыта тем, о чём всегда мечтал – поездами! Он уже видит локомотивы, направляющиеся во все уголки страны, связывающие его народ и национальную экономику стальными рельсами. Зонго наконец вкусит современность!"

 ##Railway program tree
 zoo_railway_1_1:0 "Основать экономический университет"
 zoo_railway_1_1_desc:0 "После нескольких лет в Илкшехирском политехническом институте, Акида считает, что следующим закономерным шагом будет открытие подобного учебного заведения для своих подданных. Однажды Зонго наполнится умами, чьи мечты будут ещё грандиознее, чем у него."
 zoo_railway_2_1:0 "Преодолеть базовые теории"
 zoo_railway_2_1_desc:0 "Подданные Акиды не процветают. Да что там, они даже не живут, а выживают. Чтобы повести страну в новый век, Зонго должен наконец повысить уровень жизни и выстроить современную экономику для создания передового государства."
 zoo_railway_2_2:0 "Воспользоваться правом на собственность"
 zoo_railway_2_2_desc:0 "Многие земли, на которых будет проходить прокладка рельс, принадлежат вождям и их деревням, что только мешает работе. Чтобы разобраться со всеми этими мелочами, строители снесут мешающиеся преграды, а корона компенсирует владельцам стоимость их участков, дабы строить напрямую, а не делать петли вокруг домов на пути."
 zoo_railway_3_1:0 "Необходимость для нацбезопасности"
 zoo_railway_3_1_desc:0 "Многие тревожатся о том, что $ZOO_grand_railroad_project$ означает для страны. Акида успокоит их речью о важности этого проекта для защиты Зонго от внешних угроз. Индустриализированная страна – безопасная страна!"
 zoo_railway_3_2:0 "Внедрить импортозамещение"
 zoo_railway_3_2_desc:0 "Наша молодая экономика слишком сильно зависит от иностранных материалов и ресурсов, хотя Зонго сам по себе богатый регион. Чтобы по-настоящему модернизировать промышленность, мы должны научиться полагаться на себя и свой труд."
 zoo_railway_3_3:0 "Необходимость народного благосостояния"
 zoo_railway_3_3_desc:0 "Многие тревожатся о том, что $ZOO_grand_railroad_project$ означает для страны. Акида успокоит их своей речью о том, что этот проект станет благом для каждого жителя. Индустриализированная страна означает комфорт для всех её подданных!"
 zoo_railway_4_1:0 "Привлечь иностранных учёных"
 zoo_railway_4_1_desc:0 "Открытие новой экономической школы ознаменовалось успехом, но ей всё же не хватает преподавателей, так что иногда самому королю приходится вести лекции на сложные темы. Чтобы сохранить качество обучения, Акида вновь призовёт лучшие умы в Зонго, щедро оплатив их знания и работу."
 zoo_railway_4_2:0 "Обезопасить железные дороги"
 zoo_railway_4_2_desc:0 "Атаки бандитов на стройбригады и новые поезда были головной болью уже слишком долго. Мы оснастим грузовые составы специальным бронированным вагоном с солдатами, чтобы обеспечить безопасность путей."
 zoo_railway_5_1:0 "Изучить теорию развития"
 zoo_railway_5_1_desc:0 "Акиду всегда интересовала теория развития, которая гласит, что чтобы вывести отсталую страну на новый уровень, нужно расширять рынок и вводить высокие тарифы на импорт для поощрения внутренней экономики. Ради поддержки независимости своего благосостояния Зонго стоит воспользоваться этим набором предложений."
 zoo_railway_6_1:0 "Открыть доступ к железным дорогам"
 zoo_railway_6_1_desc:0 "Сеть железных дорог теперь охватывает всю страну. Время открыть несколько общественных линий, упростив путешествия для каждого жителя Зонго."
 zoo_railway_6_2:0 "Основать железнодорожную стражу"
 zoo_railway_6_2_desc:0 "С ростом экономики и связей между городами внутри страны, многие преступные организации также начали масштабировать свою деятельность. Мы расширим программу бронированных вагонов и создадим мобильную полицейскую силу."
 zoo_railway_7_1:0 "Теория развития Зонго"
 zoo_railway_7_1_desc:0 "Теории развития принесли как позитивный результат, так и негативные последствия. Возможно, смягчив некоторые позиции, мы адаптируем идеи развития под нужды подданных. Это ведь живые зебры, а не просто бездушные цифры."
 zoo_railway_8_1:0 "Забота о группе риска"
 zoo_railway_8_1_desc:0 "Новые локомотивы оправдывают ожидания короля, поэтому экономика стремительно развивается. Теперь, введя акт о госпомощи, можно гарантировать, что никто не останется голодным в стране. О нации судят по жизни её беднейших – это единственно верный путь."
 zoo_railway_8_2:0 "Сократить дефицит"
 zoo_railway_8_2_desc:0 "Новые локомотивы оправдывают ожидания короля, поэтому экономика стремительно развивается. Королева-мать советует урезать часть затрат для повышения прибыли. Больше денег значит больше инвестиций – это логичный и правильный шаг."
 zoo_railway_9_1:0 "Зонго связан рельсами"
 zoo_railway_9_1_desc:0 "Акида по праву гордится увиденным: звуки свистков и дым наполняют города, которые связываются между собой грузовыми локомотивами и поездами. От Заму до Зубы, от Зупинамбы до Зонго все стали свидетелями триумфа современности и гения нашего короля."

 ##Industrial tree
 zoo_industrial_1_1:0 "Создать промышленную зону в Заму"
 zoo_industrial_1_1_desc:0 "Благодаря бескрайним равнинам, Заму – это идеальное место для создания здесь промышленной зоны. Это не только станет толчком для всей отрасли, но позволит нам направлять и ускорять все проекты в регионе."
 zoo_industrial_2_1:0 "Профинансировать разработку вольфрама"
 zoo_industrial_2_1_desc:0 "Вольфрам долгое время пренебрегался мастерами Зонго из-за ограниченной сферы применения, однако с новой эрой строительства и производства его ценность стремительно растёт. Следует проспонсировать открытие новых шахт, чтобы полностью раскрыть его потенциал."
 zoo_industrial_2_2:0 "Реконструировать кузни Змпангу"
 zoo_industrial_2_2_desc:0 "Кузни Змпангу хорошо служили армии как в древних войнах, так и в недавнем конфликте с Зеблу, однако теперь они уступают современным стандартам. Финансирование их модернизации повысит эффективность и позволит увеличить выпуск продукции."
 zoo_industrial_3_1:0 "Профинансировать исследования кристаллов"
 zoo_industrial_3_1_desc:0 "Магические кристаллы долгое время пренебрегались мастерами Зонго из-за ограниченной сферы применения, но с появлением магического оружия и иных магических технологий их ценность стремительно растёт. Следует проспонсировать открытие новых шахт, чтобы полностью раскрыть их потенциал."
 zoo_industrial_3_2:0 "Расширить шахты Змпангу"
 zoo_industrial_3_2_desc:0 "Эффективность кузен Змпангу всегда была высока благодаря исторически удачному расположению железных шахт под ними. Логично, что по мере расширения кузниц, добыча также должна развиваться вместе с ними. Мы должны рыть глубже, чтобы раскрыть истинный потенциал нашей промышленности."
 zoo_industrial_3_3:0 "Открыться для внешних инвестиций"
 zoo_industrial_3_3_desc:0 "Наша экономика слишком долго оставалась закрытой для внешнего экспорта. С нашими огромными запасами природных ресурсов Зонго может значительно выиграть, начав торговлю со всеми, кто готов платить."
 zoo_industrial_4_1:0 "Расширить оружейные предприятия"
 zoo_industrial_4_1_desc:0 "Промышленный бум в Заму благотворно сказался на казне, и теперь мы можем повторить этот успех по всей стране. Расширив государственные арсеналы, мы создадим центры, полностью обеспечивающие армию всем: от оружия до пайков и униформы."
 zoo_industrial_4_2:0 "Построить новые промышленные зоны"
 zoo_industrial_4_2_desc:0 "Промышленный бум в Заму благотворно сказался на казне, и теперь мы можем повторить этот успех по всей стране. Создав по всей стране промышленные зоны по образцу Заму, мы распространим его достижения на всю нацию, обеспечив большую эффективность и контроль."
 zoo_industrial_5_1:0 "Отдать приоритет производству товаров"
 zoo_industrial_5_1_desc:0 "Опираясь на фундамент, заложенный в Заму, мы продолжим расширять фабрики и промышленность. Товары будут течь непрерывным потоком, экономика расти, а Зонго достигнет невиданных высот. Кривые на графике идут вверх, а пределы эффективности постоянно растут благодаря планам Акиды."
 zoo_industrial_5_2:0 "Отдать приоритет производству оружия"
 zoo_industrial_5_2_desc:0 "Опираясь на фундамент, заложенный в Заму, мы продолжим расширять фабрики и промышленность. Оружие будет сходить с конвейеров непрерывным потоком, а склады армии наполнятся новым вооружением для защиты Зонго. Производство растёт, а пределы эффективности постоянно растут благодаря планам Акиды."
 zoo_industrial_6_1:0 "Промышленная революция Зонго"
 zoo_industrial_6_1_desc:0 "Король Акида совершил чудо века! Некогда отсталая страна, подобная своим соседям, стремительно ворвалась на международную арену как самая быстрорастущая экономика мира. Другие могут лишь восхищаться, наблюдая за успехами молодого короля."

 ##Politics/research tree
 zoo_research_1_1:0 "Пересмотр системы вождей"
 zoo_research_1_1_desc:0 "Хотя формально они лояльны королю, децентрализация привела к тому, что вожди получили слишком много власти в своих владениях. Это породило коррупцию и застой на землях, которые давно можно было бы использовать на благо всех. Пора воспользоваться своей властью и напомнить вождям, кто здесь главный."
 zoo_research_2_1:0 "Подъём городской грамотности"
 zoo_research_2_1_desc:0 "Даже в больших городах немало тех, кто не умеет читать: только священники да и те, кто мог оплатить учёбу, знакомы с грамотой. Глава конфессии предложила поэтапную реформу, чтобы грамотным стал каждый. С поддержкой верующих мы начнём перемены в городах и посмотрим, что из этого выйдет."
 zoo_research_2_2:0 "Систематизация традиционных законов"
 zoo_research_2_2_desc:0 "Сейчас у нас нет единой системы законов. Законы основаны на традициях: что сложилось с давних времён – то, и считается правильным, а многие споры решаются от случая к случаю. Так дальше нельзя – пора навести порядок: обеспечив каждому гражданину Зонго равные права."
 zoo_research_3_1:0 "Подъём сельской грамотности"
 zoo_research_3_1_desc:0 "В городах борьба с неграмотностью дала плоды – план Аяны оказался эффективным. Теперь же пришёл черёд деревень: даже самые дальние сёла и далёкие от цивилизации деревенские сообщества должны получить должное образование." 
 zoo_research_3_2:0 "Программы для бедных"
 zoo_research_3_2_desc:0 "Наша нацеленность на программу "Рельсы и нация" привела к тому, что наиболее финансово уязвимые члены общества были вынуждены насильно переселиться. Дабы гарантировать, что мы не причиним нашему народу больше вреда, чем пользы, будут созданы программы помощи бедным, чтобы они могли снова встать на копыта."
 zoo_research_3_3:0 "Пределы чрезвычайных полномочий"
 zoo_research_3_3_desc:0 "Один из пока нерешённых вопросов – это вопрос ЧП. Традиционно монарх сам мог объявлять военное положение ради безопасности Зонго, но с появлением более современной системы, над которой сейчас работают, появилась хорошая возможность переопределить, в каких случаях монарх может использовать эти полномочия, полностью обходя совет."
 zoo_research_4_1:0 "Образование для всех"
 zoo_research_4_1_desc:0 "Учитывая успех наших программ по борьбе с неграмотностью как в городах, так и в сельской местности, можно ошибочно подумать, что мы закончили. Однако нельзя забывать о самых бедных и ущемлённых слоях общества. В рамках нашего плана даже самые обездоленные из нас получат возможность читать и писать, что повысит их шансы на выживание!"
 zoo_research_4_2:0 "Встреча тет-а-тет"
 zoo_research_4_2_desc:0 "Чтобы заручиться поддержкой духовенства, король назначил личную встречу с Аяной. Королева-мать предложила, что она может пойти вместо него, но Акида заверил её, что это то, что он должен сделать сам, чтобы лучше понять свои обязанности монарха."
 zoo_research_4_3:0 "Указ о мобилизации"
 zoo_research_4_3_desc:0 "В современном мире слишком много войн, дабы за ними успевать, и если Зонго не будет осторожен, войны смогут вскоре поглотить и его. Поскольку идея объединения рода зебр становится всё более актуальной в нынешнем мировом контексте, Зонго не должны застать врасплох. Если кто-то и объединит юго-восток, то это будем мы. К этому армия будет готова."
 zoo_research_4_4:0 "Созыв вождей к двору"
 zoo_research_4_4_desc:0 "Акида не желает избавляться от вождей, хотя многие из них, похоже, этого опасаются. Чтобы продемонстрировать свою готовность к сотрудничеству, он пригласит всех, кто может, принести пользу его усилиям, официально присоединиться к двору в качестве советников."
 zoo_research_5_1:0 "Синкретизм меж верой и державой"
 zoo_research_5_1_desc:0 "Поскольку наши планы на будущее Зонго охватывают обширные территории, где живут существа разных верований, Акида не хочет, чтобы одни были ущемлены ради других. Пора ясно отделить веру от власти: важно сохранить собственные ценности и одновременно защищая права тех, чьи убеждения отличаются от наших."
 zoo_research_5_2:0 "Учебный компромисс"
 zoo_research_5_2_desc:0 "Поскольку учителями в наших школах служат священнослужители, им важно помнить: жеребята учатся не только вере и письменности, но и формальным наукам. Хотя некоторые могут жаловаться, Акида и Аяна уже разработали стандарты, которым они должны следовать."
 zoo_research_5_3:0 "Совет королевы-матери"
 zoo_research_5_3_desc:0 "Хотя обычно король обращается за помощью к королеве-матери, на этот раз это она организовала встречу, чтобы обсудить некоторые волнующие её вопросы. Пускай Акида уверен, что его мать просто чрезмерно опекает его, следует отдать должное её опыту и мудрости."
 zoo_research_6_1:0 "Современная конституция Зонго"
 zoo_research_6_1_desc:0 "Зонго проделал долгий путь от устаревшего уклада и до современности. Дабы закрепить все произошедшие с тех пор изменения, королевский свод законов будет адаптирован в актуальную конституцию! Королева-мать опасается ограничений власти короны, но Акида считает, что она слишком переживает. Он надеется, что она успокоится, когда это пройдёт."
 zoo_research_6_1_tt:0 "Высокое влияние королевы-матери на подписание конституции может иметь непредвиденные последствия!"






 ##Sambovato tree
 zoo_sambovato_1_1:0 "Импорт через Перламутровые врата"
 zoo_sambovato_1_1_desc:0 "Перламутровые врата – оживлённый морской путь, соединяющий Чисимби с остальным миром и служащий важнейшим торговым узлом между всеми странами Юго-Востока и Древним Пактом. Благодаря нашему договору мы сможем получать выгоду от более дешёвого импорта и ускорить индустриализацию страны."
 zoo_sambovato_2_1:0 "Посетить королевский приём"
 zoo_sambovato_2_1_desc:0 "Для монарха светские встречи вроде балов, ужинов и прочих мероприятий важны – они дают возможность завести связи, сплотить союзников и продемонстрировать владение этикетом... но король Акида ненавидит всё это. Однако, чтобы не проявить неуважение к новым союзникам, он присоединится к королеве Сейде Ватосоа на приёме, укрепив наш союз."
 zoo_sambovato_2_2:0 "Поделиться методами охраны правопорядка"
 zoo_sambovato_2_2_desc:0 "Мы хотим продемонстрировать королеве Сейде Ватосоа, что наши индустриальные достижения полезны не только для экономики, но и для защиты страны. В знак укрепления союза мы отправим им несколько бронепоездов, чтобы они узрели их эффективность. В конце концов, всем известно, что кобылы любят поезда."
 zoo_sambovato_3_1:0 "Навеки связать Самбовато"
 zoo_sambovato_3_1_desc:0 "Железные дороги пересекают остров от Акорадриакаровы до Тсеналаканы, заводы работают без остановки, а гавани полны как никогда. Благодаря нашим усилиям теперь их промышленность настолько переплетена с Зонго, что они буквально зависят от нас. Если укрепить связи ещё сильнее, можно будет сказать, что мы сформировали федерацию." 


 ##Southern tree
 zoo_south_1_1:0 "Принять пан-зонголезскую культуру"
 zoo_south_1_1_desc:0 "После того, как весь бассейн вновь оказался под нашим флагом, мы должны воспользоваться зонголезскими корнями, чтобы способствовать реинтеграции Танайги и Мелахаки в качестве провинций Зонго."
 zoo_south_2_1:0 "Объединить фабрики в $ZOO_infantry_equipment_company$"
 zoo_south_2_1_desc:0 "Танайганские оружейные заводы могут быть перепрофилированы нами и отданы под общее управление $ZOO_infantry_equipment_company$. Это удешевит производство и простимулирует дальнейший рост."
 zoo_south_2_2:0 "Использовать мелахакские торговые порты"
 zoo_south_2_2_desc:0 "Мелахакские порты куда удобнее приспособлены для южной торговли, чем те что во владении Заму. Мы можем использовать их для привлечения большего количества торговых партнёров и заключения новых сделок, способствуя дальнейшей индустриализации."
 zoo_south_3_1:0 "Сталелитейные цеха Танайги"
 zoo_south_3_1_desc:0 "Регион Танайга очень богат железом, однако, по-видимому, есть более глубокие залежи, которые племена не могли добыть. С современными инструментами мы сможем лучше использовать эти природные богатства."
 zoo_south_3_2:0 "Продвигать пан-зонголезских офицеров"
 zoo_south_3_2_desc:0 "По мере того как юг все больше интегрируется с остальной частью Зонго, многие начинают принимать свою связь с нашим общим зонголезским наследием и желают вступить в армию, чтобы защищать свою старую родину, которой они снова учатся гордиться."
 zoo_south_3_3:0 "Новый каучуковый завод в Зесалампи"
 zoo_south_3_3_desc:0 "Остров Зесалампи очень богат каучуковыми деревьями, однако его потенциал ещё не раскрыт полностью. С современными инструментами мы сможем лучше использовать эти природные богатства."
 zoo_south_4_1:0 "Перепрофилировать школу Танайги"
 zoo_south_4_1_desc:0 "В то время как школа в Танайге в настоящее время служит учебным заведением для получения базовых знаний, её южное расположение позволяет нам улучшить охват Зонго современными знаниями. Мы перепрофилируем школу в новый университет с несколькими новыми курсами, посвящёнными авионике и аэродинамике."
 zoo_south_4_2:0 "Восстановить военно-морскую школу в Заредлинди"
 zoo_south_4_2_desc:0 "Несмотря на то, что школа была заброшена с тех пор, как Зонго был вынужден покинуть регион, она находится в удивительно хорошем состоянии. Мы проведём небольшую реставрацию, и вскоре её двери снова будут открыты для начинающих зебр-моряков."
 zoo_south_5_1:0 "Зонголезская программа по расширению юга"
 zoo_south_5_1_desc:0 "После завершения первого этапа программы нам следует создать региональные центры, чтобы лучше использовать её особенности и расширить наши планы по дальнейшему развитию. Будь это море или воздух, юг дал нам возможность коснуться копытами светлого будущего."
 zoo_south_5_1_tt:0 "Построенный объект будет зависеть от школы, в которую мы инвестировали." 

 ##Western tree
 zoo_west_1_1:0 "Наследие войны с Зеблу"
 zoo_west_1_1_desc:0 "После стольких потерь Акида наконец отомстил за смерть отца и вернул законные земли Итебры и Мзинги... но и не только их. Учитывая что почти весь юго-восток оказался под контролем, Акида должен решить, что ждёт эти земли дальше."
 zoo_west_2_1:0 "Роамские города-государства"
 zoo_west_2_1_desc:0 "Учитывая относительную нестабильность их легионов, укреплённые города Ассини веками жонглировали разными союзами ради выживания. Мы не будем покорять их, поскольку гораздо разумнее добиться того, чтобы верность Зонго стала самым рациональным выбором."
 zoo_west_2_2:0 "Дома Имба-Зару"
 zoo_west_2_2_desc:0 "После гибели монарха несколько столетий назад в этой стране веками правили шесть родов. Нам предстоит решить, как обращаться с этой необычной системой, чтобы восстановить порядок и обеспечить стабильность региона."
 zoo_west_3_1:0 "Будущее для бывших рабов"
 zoo_west_3_1_desc:0 "Рабы Цимейна так или иначе смогли освободиться от угнетения, и их стремление к свободе справедливо, пусть методы и... чрезмерны. Зонго свободно от рабства, поэтому мы покажем им, что впереди их ждёт спокойная и свободная жизнь."
 zoo_west_3_2:0 "Разделяй и властвуй"
 zoo_west_3_2_desc:0 "Удивительно, что Зеблу вообще продержался так долго, учитывая что это союз своевольных племён, вечно грызущихся между собой и объединяемых лишь железным копытом. Теперь, когда у них нет хана, воспользоваться этими разногласиями – наилучший способ сохранить Зеблу разобщённым навсегда."
 zoo_west_3_3:0 "Управление в стиле гиен"
 zoo_west_3_3_desc:0 "Гиены Твизаньики... мягко говоря, были не очень хороши в управлении. Пиратство, плантации и рабы, не говоря уже о хаотичной бюрократии – чудо, что эта гремучая смесь вообще работала. Мы можем попытаться реформировать эту кашу, но, возможно, проще снести и построить всё заново."
 zoo_west_4_1:0 "Гражданство Роама-Зонго"
 zoo_west_4_1_desc:0 "Ассини долго сражались за независимость своих городов-государств, но борьба за выживание не позволяла им в полной мере проявлять свою любовь к искусству. Предоставление этим зебрам гражданства и демонстрация нашей приверженности миру должны стать отличным шагом вперёд. Им не впервой адаптироваться к новым обстоятельствам."
 zoo_west_4_2:0 "Будущее Имба-Зару в составе Зонго"
 zoo_west_4_2_desc:0 "Система домов Имба-Зару быстро приспосабливается к новым условиям, которые во многом схожи с нашей системой вождей. Похоже, местные примут Зонго как свой новый дом куда быстрее, чем ожидалось." 
 zoo_west_5_1:0 "Разобраться с наёмниками"
 zoo_west_5_1_desc:0 "Войны Чисимби привлекли множество чужаков со специфичным опытом и верностью. Наёмники, служившие рабовладельцам Мавелас, теперь остались без дома и работы. Мы можем просто отправить их прочь... или нанять, чтобы их навыки не обернулись против нас."
 zoo_west_5_2:0 "Учиться у племён Зеблу"
 zoo_west_5_2_desc:0 "Хотя у наших старых врагов мало что можно было назвать хорошо работающим, их армии – исключение. Они были известны своим молниеносным натиском, сокрушающем всё на своём пути, так что пусть те, кто когда-то побеждал нас на поле боя, научат своим приёмам."
 zoo_west_5_3:0 "Бывшие пираты Твизаньики"
 zoo_west_5_3_desc:0 "Многие бывшие пираты Твизаньики нашли себе куда более мирную работу – перевозить наши товары за границу. Возможно, некоторых из них стоит взять на службу в флот, чтобы их знания из прошлого помогли нам в случае, если Мирное море решит сменить название."
 zoo_west_6_1:0 "Дать работу купцам Роама"
 zoo_west_6_1_desc:0 "Представители гильдии купцов Роама – мастера торговли, известные по всему Чисимби. Война уничтожила Роам, но не его богатства и опыт. Их таланты станут огромным подспорьем для программы "Рельсы и нация"."
 zoo_west_6_2:0 "Предложение для грифонов"
 zoo_west_6_2_desc:0 "Юг Чисимби три века был домом для уникальной общины грифонов – Компелов. Их архитектура впечатляет, а мастерство в строительстве позволит нам возводить прочные и долговечные новые сооружения."
 zoo_west_7_1:0 "Новое наследие Зонго"
 zoo_west_7_1_desc:0 "Цимейн веками страдал от рабства, богачей и их войн, но теперь здесь рождается надежда. Все рабы освобождены, а уже мавеласских хозяев сковали цепи. Северный Чисимби впервые получает невиданный прежде дар – свободу."
 zoo_west_7_2:0 "Житница Зеблу"
 zoo_west_7_2_desc:0 "Плодородные равнины Зеблу питали их армии столько, сколько требовалось. Теперь они кормят целую нацию. Едва ли их хан мог представить, что его земли станут житницей для старейшего врага. Покойный король, наверное, смеётся из своей могилы."
 zoo_west_7_3:0 "Гиены Зонго"
 zoo_west_7_3_desc:0 "Хотя многие держали невольников, это не значит, что абсолютно все гиены были рабовладельцами. Те, кто отказался от старых практик, теперь могут служить под новым стягом – знаменем прогресса."
 zoo_west_8_1:0 "Инвестиции в хром"
 zoo_west_8_1_desc:0 "Пусть наши войска и не требуют хрома прямо сейчас, ресурс всё равно невероятно ценен. Его экспорт поможет как финансировать программы, так и наладить танковую армию, если мы когда-то его создадим и будем нуждаться в поставках."
 zoo_west_8_2:0 "Кристаллы – будущее"
 zoo_west_8_2_desc:0 "Хотя мы редко использовали кристаллы в производстве, мир вокруг нас проявляет к ним огромный интерес. Расширив добычу, мы увеличим экспортные возможности, а после и, возможно, однажды сами найдём для них применение."
 zoo_west_9_1:0 "Использовать университет Цимейна"
 zoo_west_9_1_desc:0 "Мавеласы были мерзавцами, но университет Цимейна – один из лучших в регионе, почти сравнимый с тем, где учился наш король. Прежде он служил лишь богатым, укрепляя их власть. Теперь он станет домом знаний для всех – даже для бывших рабов." 

 ##Army tree
 zoo_army_1_1:0 "Возродить королевскую гвардию"
 zoo_army_1_1_desc:0 "Наша Королевская гвардия с гордостью защищала Зонго, но её ряды всё ещё носят на себе шрамы от войны с Зеблу. Нам стоит начать набор рекрутов, чтобы вновь пополнить ряды наших войск."
 zoo_army_2_1:0 "Современный пехотный корпус"
 zoo_army_2_1_desc:0 "Во время обучения в Сентурии Акида увидел по настоящему современные вооружённые силы, гордо марширующие с современным оружием. Хотя наша армия тоже вполне недурна, её отставание очевидно. Мы приложим все усилия для модернизации наших технологий и доктрин, чтобы они лучше соответствовали новым реалиям войны."
 zoo_army_2_2:0 "Новые офицеры – новая цель"
 zoo_army_2_2_desc:0 "Традиционно наши армии возглавляют вожди, но они нередко ведут себя слишком гордо и дерзко, что приводит к принятию решений, неподходящих для современного поля боя. В нынешнюю эпоху офицеры и командиры получают посты за опыт и заслуги, а не право рождения, поэтому мы доверим защиту родного дома только самым лучшим."
 zoo_army_3_1:0 "Вернуть власть над Танайгой"
 zoo_army_3_1_desc:0 "Мы вернули земли Танайги и начали их интеграцию в состав нашего королевства. Местные племена, возможно, сейчас насторожены, но вскоре они вновь научатся считать себя частью Зонго."
 zoo_army_3_2:0 "Воссоединить бассейн Зонго"
 zoo_army_3_2_desc:0 "Бассейн Зонго исторически был частью нашего королевства. Однако два столетия назад южные земли воспользовались нестабильностью и отделились. Пора исправить эту ошибку. Наши армии сейчас сильны как никогда, так что мы легко вернём себе законный контроль над бассейном."
 zoo_army_3_3:0 "Реинтегрировать Мелахаку"
 zoo_army_3_3_desc:0 "Мы вернули земли Мелахаки и начали интегрировать их в состав нашего королевства. Благодаря близости к Самбовато, у них есть надёжные порты для торговли, ресурсы для освоения и некоторые интересные технологии, приобретённые в результате внешней торговли. Это идеальная база для распространения влияния на Мирные моря и Большой Рог."
 zoo_army_4_1:0 "Изучить самолёты Танайги"
 zoo_army_4_1_desc:0 "Во время войны Танайга очень эффективно использовала самолёты. Нам следует изучить уцелевшие образцы в качестве примера для дальнейшего развития вооружённых сил Зонго. Мы не будем ограничиваться господством на земле, ибо вскоре само небо подчинится нам!" 
 zoo_army_4_2:0 "Расширить программу на юг"
 zoo_army_4_2_desc:0 "Поскольку наша территория расширилась и вновь охватила бассейн Зонго, вполне естественно, что наши усилия по индустриализации должны поставить эти регионы в один ряд с остальным Зонго."
 zoo_army_4_3:0 "Интегрировать элитных налётчиков"
 zoo_army_4_3_desc:0 "Воины Мелахаки, возможно, и проиграли войну, но было бы глупо игнорировать их доблесть на поле боя. Мы включим гордых налётчиков в нашу королевскую гвардию." 
 zoo_army_5_1:0 "Угрозы по всему Мейрконгу"
 zoo_army_5_1_desc:0 "Зайкирия давно уже представляет собой сплошной ворох проблем: Лан Кир периодически совершает набеги на нас через Мейрконг, а матриархи Кирии жадно посматривают на регион. Мы должны сосредоточить своё внимание там и определиться с дальнейшими действиями."
 zoo_army_5_2:0 "Сотрудничество с Самбовато"
 zoo_army_5_2_desc:0 "Небольшое островное государство Самбовато является центром региональной торговли. Учитывая отсутствие у них интересов на материке, мы могли бы попытаться заключить договор, что позволит обеим нашим странам действовать сообща, дабы мы могли раскрыть их потенциал и содействовать индустриализации в обмен на сотрудничество в качестве союзников."
 zoo_army_6_1:0 "План объединения зебр"
 zoo_army_6_1_desc:0 "Наши пан-зонголезские амбиции удовлетворены, но мы никогда не будем в безопасности, пока существует Чисимби, чьи лидеры видят в нас очередную цель. Мы должны быть готовы к конфликту с ними, но если мы всё равно будем воевать, то возможно, пан-зебринский подход позволит нам интегрировать их в наши усилия по индустриализации."
 zoo_army_6_2:0 "Армия, которой можно гордиться"
 zoo_army_6_2_desc:0 "Парады с современным оружием, престижные военные академии и многое другое превратили королевскую армию из простой силы, защищающей наши границы, в институт, к которому наши граждане горды принадлежать и на который равняются."
 zoo_army_6_3:0 "Захватить восточный полуостров"
 zoo_army_6_3_desc:0 "Затерянные джунгли долгое время были изолированы от остального юго-востока из-за густых зарослей и чужеродной фауны. Все прошлые попытки добиться там влияния были недолговечными. Но сегодня, когда Зонго модернизирован и силён, наконец-то пришло время быстро положить конец этим племенным государствам и принести джунглям современность."

 ##Eastern tree #May change up later
 zoo_east_1_1:0 "Морская власть над Мейнлилиполем"
 zoo_east_1_1_desc:0 "Юго-восточные рубежи проходят по землям Маглибинга. Окружённое горами поселение Мейнлилиполь станет опорной точкой для нашего флота, позволив ему там расквартироваться и расшириться, тем самым усилив влияние в южной части Зебрики."
 zoo_east_1_2:0 "Расширить гарнизоны мыса"
 zoo_east_1_2_desc:0 "Религиозные фанатики Таларая продолжают оказывать сопротивление даже после уничтожения их основного священного храма. Мы усилим гарнизоны у мыса, чтобы они не причинили ещё большего вреда ни себе, ни окружающим."
 zoo_east_1_3:0 "Планирование железных дорог Наугдау"
 zoo_east_1_3_desc:0 "Инженеры с трудом прокладывают железные дороги в Наугдау. Болота здесь одни из самых глубоких и обширных в Затерянных Джунглях, что лишь увеличивает сложность работ. Если мы справимся здесь, ничто больше не остановит инженерный прогресс Зонго."
 zoo_east_2_1:0 "Рельсы Тампука"
 zoo_east_2_1_desc:0 "Земли племён Маглибинга богаты неосвоенными ресурсами, которые местные не желали или не могли использовать. С нашими инструментами и возможностями этот край вскоре станет процветать."
 zoo_east_2_2:0 "Увеличить экспорт каучука Наугдау"
 zoo_east_2_2_desc:0 "Затерянные Джунгли богаты ресурсами, и один из них – каучук – до сих пор почти не использовался. Многие государства проявляют к нему интерес, поэтому расширение добычи в Наугдау заметно увеличит наши доходы."
 zoo_east_3_1:0 "Наши кузены из Маглибинга"
 zoo_east_3_1_desc:0 "Хотя между нами многие километры, жители Маглибинга остаются нашей семьёй, как и все зебры юго-востока. Со временем они поймут, что отказ от традиций и устоев – это единственный путь вперёд. Как уже сделали мы."
 zoo_east_3_2:0 "Использовать ресурсы Тампука"
 zoo_east_3_2_desc:0 "Как и во многих частях Затерянных Джунглей, ресурсы Тампука никогда не осваивались должным образом, несмотря на их стратегическую ценность. Расширение добычи в регионе принесёт немалую выгоду."
 zoo_east_3_3:0 "Наши кузены из Наугдау"
 zoo_east_3_3_desc:0 "Хотя между нами многие километры, жители Наугдау остаются нашей семьёй, как и все зебры юго-востока. Со временем они поймут, что отказ от традиций и устоев – это единственный путь вперёд. Как уже сделали мы."
 zoo_east_4_1:0 "Инфраструктурная программа Маглибинга"
 zoo_east_4_1_desc:0 "Маглибинг остро нуждается в инфраструктуре. Горы, джунгли и холмы почти полностью лишены дорог, и местные веками полагались на собственный опыт хождения по тропам или же вьючных животных. Вскоре эти времена останутся в прошлом – регион свяжут рельсы и дороги."
 zoo_east_4_2:0 "Инфраструктурная программа Наугдау"
 zoo_east_4_2_desc:0 "Наугдау остро нуждается в инфраструктуре. Болота, джунгли и реки почти полностью лишены дорог, и местные веками полагались на собственный опыт хождения по тропам или же вьючных животных. Вскоре эти времена останутся в прошлом – регион свяжут рельсы и дороги."
 zoo_east_5_1:0 "Жители Золотого города"
 zoo_east_5_1_desc:0 "Существа Таларая сопротивлялись яростнее других, решившись даже на подрыв собственного храма в отчаянной попытке отбросить нас. Это было прискорбно, но со временем дороги, рельсы и рост уровня жизни помогут им осознать себя зонголезцами."
 zoo_east_5_2:0 "Расширить планы Наугдау"
 zoo_east_5_2_desc:0 "Работы в Наугдау идут успешно. Болота стали фундаментом для железных дорог, протянувшихся вдоль северного побережья Затерянных Джунглей. Пусть работа ещё не завершена, но достигнутый уровень инфраструктуры внушает гордость."

 ##Zaikirian tree
 zoo_north_1_1:0 "Угроза Лан Кира"
 zoo_north_1_1_desc:0 "Фанатики в Лан Кире всё ещё являются угрозой, и нам повезло, что они не послали против нас своих яростных воинов-нириков. Чтобы обеспечить дальнейший мир, мы должны погасить пожар, прежде чем он разгорится во всю мощь."
 zoo_north_1_2:0 "Послевоенная ситуация в Зайкирии"
 zoo_north_1_2_desc:0 "К счастью, с обезумевшими воинами Лан Кира разобрались без нашего вмешательства. Теперь мы можем с большей осторожностью изучить ситуацию, чтобы принять решение о дальнейших действиях."
 zoo_north_2_1:0 "Закрепиться в Зайкирии"
 zoo_north_2_1_desc:0 "Кирия ещё не готова контактировать со своими южными родичами. Следуя совету матери-королевы, мы должны быстро разобраться с Зайкирией, чтобы защитить интересы зонголезцев. Конечно, мы предоставим им автономию, пусть и на время. Ведь если мы не обезопасим регион, то просто позволим делать киринам всё, что их душе угодно. Ну или так утверждает мама..."
 zoo_north_2_2:0 "Взаимовыгодное разделение Зайкирии"
 zoo_north_2_2_desc:0 "Хоть мы и оккупируем земли Зайкирии, мы не намерены забирать всё до последнего клочка земли. Мы предложим сделку членам правительств Сен Киня и Хамрина, что пережили лан кирское нападение, позволив им получить контроль над регионом в обмен на некоторые взаимовыгодные торговые сделки, которыми обе стороны останутся довольны."
 zoo_north_2_3:0 "Экспорт в Зайкирию"
 zoo_north_2_3_desc:0 "В данный момент в Зайкирии царит покой, что не оставляет поводов для вмешательства. Это позволит нам извлечь выгоду из мирных времён: мы укрепим отношения со странами Зайкирии и будем торговать с ними."
 zoo_north_3_1:0 "Обезопасить зайкирские ресурсы"
 zoo_north_3_1_desc:0 "Как и планировалось до нашей оккупации, в Зайкирии будет создана союзная администрация . Это поспособствует защите зонголезских интересов: так мы получим доступ к местным ресурсам и защитим их от кирийского империализма."
 zoo_north_3_2:0 "Богатства Зайкирии"
 zoo_north_3_2_desc:0 "Мы больше всего вложились в умиротворение Зайкирии, поэтому будет более чем справедливо, если в дальнейшем мы сможем проинвестировать в добычу кое-каких ключевых ресурсов. Конечно, ко взаимной выгоде."
 zoo_north_3_3:0 "Расширить торговлю с Зайкирией"
 zoo_north_3_3_desc:0 "Как и весь прочий юго-восток, Зайкирия богата различными полезными ископаемыми. Пользуясь преимуществами мирного времени, мы будем поддерживать стабильные торговые отношения так долго, как это будет возможно."
 zoo_north_3_4:0 "Собрать информацию о наших 'партнёрах'"
 zoo_north_3_4_desc:0 "Хотя на данный момент между нами может царить мир, это не будет длиться вечно. В наших интересах внимательно следить за событиями в регионе, ведь сегодняшний друг вполне может стать врагом завтра."


 ##Kirian tree
 zoo_kiria_1_1:0 "Слон с кирийскими корнями в комнате"
 zoo_kiria_1_1_desc:0 "Тысячелетие река Мейрконг отделяла земли зебр от земель киринов. Теперь, когда весь восток объединён, королева-мать постановила отправить делегацию в Кирию, чтобы договориться о том, что кирины останутся на своём берегу ещё на тысячу лет. Но если мы получим отказ и увидим признаки агрессии, нам стоит подготовиться к мрачному будущему."
 zoo_kiria_2_1:0 "Укрепить Мейрконг"
 zoo_kiria_2_1_desc:0 "Раз война неизбежна, мы должны укрепить стратегическую границу по реке Мейрконг, защищавшей земли зебр от киринов тысячелетиями. Ни дюйма зонголезской земли не должно пасть под их ударами."
 zoo_kiria_2_2:0 "Сплотить совет"
 zoo_kiria_2_2_desc:0 "Главное – обеспечить единство государства перед грядущим великим конфликтом. Сплочённость совета жизненно важна для победы."
 zoo_kiria_3_1:0 "Последний рывок"
 zoo_kiria_3_1_desc:0 "Каждый знает о надвигающемся великом конфликте. Мы должны вдохновить наших граждан, заставить выйти за пределы зоны комфорта и сплотиться ради последнего рывка и нашего общего выживания."
 zoo_kiria_3_2:0 "Временно ослабить ограничения на железные дороги"
 zoo_kiria_3_2_desc:0 "$ZOO_grand_railroad_project$ приносит выгоду и процветание, но централизованное планирование строительства путей может помешать подготовке к войне. По совету мани Зубы мы временно позволим армии использовать своих инженеров для экстренного строительства железных дорог, обходя обычные правила."
 zoo_kiria_3_3:0 "Подготовиться к бунту киринов"
 zoo_kiria_3_3_desc:0 "Пока мы занимаем земли киринов, всегда найдутся те, кто будет замышлять против нас. Королева-мать предлагает ввести ряд... смелых указов и мер для администрации, чтобы обеспечить порядок на оккупированных территориях и предотвратить попытки организации сопротивления."
 zoo_kiria_4_1:0 "Судьба Кирии"
 zoo_kiria_4_1_desc:0 "Миллионы киринов оказались под нашей властью. Управлять этой землёй напрямую невозможно, да и это никогда не было нашим стремлением. Непонимание этого привело к своим трагичным последствиям, но сейчас нам нужно собрать совет и обеспечить мирное будущее."
 zoo_kiria_5_1:0 "Инвестировать в шахты гор Мейртайм"
 zoo_kiria_5_1_desc:0 "Горный хребет Мейртайм содержит множество важных ресурсов. Мейрконгский договор позволяет нам инвестировать в новые шахты в Кирии ради общей безопасности, и мы должны воспользоваться этим пунктом."
 zoo_kiria_5_2:0 "Копать глубже в Вершинах Опасности"
 zoo_kiria_5_2_desc:0 "По нашим данным, Вершины Опасности содержат намного больше ресурсов, чем даже сама Кирия предполагает. В рамках Мейрконгского договора мы поможем развивать регион, тем самым открывая новые шахты и ведя добычу глубже, чем когда-либо прежде."
 zoo_kiria_6_1:0 "Будущее Зонго"
 zoo_kiria_6_1_desc:0 "Пришло время для последнего шага, завершающего наши реформы и модернизацию. Акида представит совету план, который обеспечит долгосрочную стабильность и процветание для всего королевства Зонго."

 ##Advanced Army tree
 zoo_advanced_army_1_1:0 "Уроки объединительных войн"
 zoo_advanced_army_1_1_desc:0 "В последние годы мы активно воюем, стремясь воплотить в жизнь мечту о пан-зонголезском государстве и защититься от агрессии наших соседей. Новая структура нашей армии эффективна, но мы могли бы улучшить использование современного оружия. Поэтому мы разработаем планы дальнейшей модернизации вооружения и материально-технического обеспечения."
 zoo_advanced_army_2_1:0 "Артиллерия – богиня войны"
 zoo_advanced_army_2_1_desc:0 "Нет никаких сомнений в том, что артиллерия – это будущее армии Зонго. Большая гаубица может стрелять снарядами со столь разрушительной силой, что лишь немногие виды оружия могут превзойти её. Тяжёлые орудия сложно подвести к линии фронта, но мы можем справится с этим, используя наши новые железнодорожные пути." 
 zoo_advanced_army_2_2:0 "Стандартизация логистики"
 zoo_advanced_army_2_2_desc:0 "Объединение с нашими соседями значительно увеличило численность нашей армии, но сейчас она вооружена и экипирована гремучей смесью из местного оружия, униформы и снаряжения. Мы должны всё стандартизировать отечественными аналогами, чтобы обеспечить функционирование зонголезской армии как единой силы, которой она и является."
 zoo_advanced_army_3_1:0 "Важность рот поддержки"
 zoo_advanced_army_3_1_desc:0 "Роты боевой поддержки часто упускаются из виду в пользу более активных участников боевых действий. Роты обеспечивают солдат припасами, медицинской помощью, разведкой и многим другим. Реформируя наши роты в наиболее критичных аспектах, мы будем уверены, что они окажут помощь своим подразделениям в меру своих возможностей в любое время."
 zoo_advanced_army_3_2:0 "Доктрина шока и трепета"
 zoo_advanced_army_3_2_desc:0 "Наша артиллерия, несомненно, является лучшей на континенте, а железные дороги могут в кратчайшие сроки доставить её на любое поле боя. Об эти факты, мы можем разработать новую тактику "шок и трепет", которая заставит наших врагов пасть ниц перед огнём орудий и боевых кличей наших штурмовых отрядов, прежде чем они смогут что-либо понять."
 zoo_advanced_army_3_3:0 "Полевые алхимики"
 zoo_advanced_army_3_3_desc:0 "Алхимия – гордость зебр. Мы не исключение, и по мере модернизации нашего общества это искусство должно развиваться. Применение алхимии на поле боя будет многообещающим: от целебных зелий для раненых солдат до эликсиров силы и скорости. Раскрытие потенциала этих направлений исследований, несомненно, даст нам много преимуществ перед врагами."
 zoo_advanced_army_4_1:0 "Оглушительные, как гром"
 zoo_advanced_army_4_1_desc:0 "Артиллерия — ключевой пункт нашей победы. Поэтому подготовка и обслуживание подразделений должны иметь первостепенное значение, начиная с набора канониров и заканчивая регулярным проведением учебных стрельб и обслуживанием оружия. Когда враги выступят против нас, то встретят оглушительный грохот орудий, который обратит их в пепел."
 zoo_advanced_army_4_2:0 "Тихие, как ночь"
 zoo_advanced_army_4_2_desc:0 "В армии Зонго много подразделений. Наши спецназовцы не кричат о себе на каждом углу, но при этом они являются одним из самых эффективных видов войск. Удвоив их тренировки, мы можем гарантировать, что они смогут нанести максимальный урон своим целям с минимальными потерями. Они станут нашими убийцами, уничтожающими врагов под покровом ночи."
 zoo_advanced_army_5_1:0 "Последнее слово за нами"
 zoo_advanced_army_5_1_desc:0 "Генералы любят говорить, что артиллерия ставит точку в любом вопросе, а мы лучшие в этом. Инженеры гарантируют, что пушки смогут вести огонь в любое время в ходе наступления, а наши артиллеристы разнесут позиции противника в пух и прах по мере продвижения союзных войск. Давайте продолжим совершенствовать нашу бомбезную риторику."
 zoo_advanced_army_5_2:0 "Большие пушки никогда не устают"
 zoo_advanced_army_5_2_desc:0 "Подразделения Зонго вооружены артиллерией всех калибров, но ей обладают и враги. Поэтому мы должны разрабатывать орудия ЕЩЁ большего калибра, чтобы наши соперники никогда не смогли превзойти нас в огневой мощи. Хотя наша охрана может спать, а корабли стоять на якоре, враги будут прекрасно знать, что тяжёлая артиллерия никогда не устаёт."
 zoo_advanced_army_5_3:0 "Готовы ко всему"
 zoo_advanced_army_5_3_desc:0 "Несмотря на то, что наши войска могут разгромить любого противника, остаётся угроза того, что армия будет подавлена танками или авиацией. Для обеспечения безопасности наземных сил мы должны инвестировать во вспомогательное вооружение, специально разработанное для компенсации слабых сторон пехоты."
 zoo_advanced_army_6_1:0 "Единая современная армия"
 zoo_advanced_army_6_1_desc:0 "Наши войска действуют слаженно, подавляя противника артиллерийским огнём, пока в бой не вступит пехота. Этот успех обусловлен применением сильных сторон в современных реалиях войны, а всем известно, война постоянно меняется. Хотя эти методы уже являются большим шагом вперёд в обеспечении безопасности Зонго, мы должны продолжать развивать их."

 ##Advanced Air tree
 zoo_advanced_air_1_1:0 "Зонго взмывает ввысь"
 zoo_advanced_air_1_1_desc:0 "Некогда небом правили лишь немногочисленные летающие существа, но эта эпоха подходит к концу. Ныне во всех уголках мира в воздух взлетают самолёты, и всё больше рас принимают участие в гонке за небеса. А тот, кто будет править в воздухе, сможет обрушить на землю сокрушительный огонь. Хочешь узнать, где победа? Подними голову."
 zoo_advanced_air_2_1:0 "Воздушные эксперты"
 zoo_advanced_air_2_1_desc:0 "Мы только начали производить самолёты. Чтобы создать великие военно-воздушные силы, способные господствовать в небе над Зебрикой, мы должны учиться у опытных тактиков, инженеров и пилотов со всего мира. А ещё мы ненавязчиво продемонстрируем преимущества службы в наших рядах, если они присягнут на верность короне."
 zoo_advanced_air_2_2:0 "Обучение полётам"
 zoo_advanced_air_2_2_desc:0 "Самолёты прибывают на недавно построенные взлетно-посадочные полосы, а за ними следуют курсанты новейших лётных школ Зонго. Чтобы гарантировать их постоянную готовность к бою, мы должны регулярно проводить с ними тренировки, пока они не будут знать свои "птички" так же хорошо, как и себя, и не смогут вслепую выполнять даже самые сложные манёвры."
 zoo_advanced_air_3_1:0 "Вестники урагана"
 zoo_advanced_air_3_1_desc:0 "Война больше не сводится к сражениям только на земле. Флот стратегических бомбардировщиков с достаточным количеством топлива для континентального перелёта может опустошить целую страну так, как не мог мечтать ни один давно умерший завоеватель, и мы должны воспользоваться этим фактом, прежде чем это сделают наши враги."
 zoo_advanced_air_3_2:0 "Принцессы поля брани"
 zoo_advanced_air_3_2_desc:0 "Артиллерия – богиня войны, но это не единственное оружие для обстрела противника. Тактические бомбардировщики и непосредственная поддержка с воздуха могут обеспечить наступающей пехоте огневую мощь, необходимую для прорыва вражеской обороны, без необходимости разворачивать и перемещать батарею окопавшихся гаубиц."
 zoo_advanced_air_3_3:0 "Главные в небе"
 zoo_advanced_air_3_3_desc:0 "Невозможно заполнить воздушное пространство достаточным количеством бомбардировщиков, не установив превосходство в воздухе. Эскадрилья, состоящая из талантливых лётчиков истребителей, способных превзойти противника в точности стрельбы и манёвренности, так же важна, как и эскадрилья тяжёлых бомбардировщиков. Именно на асах зиждется контроль небес."
 zoo_advanced_air_4_1:0 "Неусыпный надзор"
 zoo_advanced_air_4_1_desc:0 "Зонго – не единственная страна, обладающая воздушными силами. По мере индустриализации Зебрики многие наши соперники также стремятся к господству в воздушном пространстве. Разработка новых технологий, позволяющих обнаруживать приближающиеся самолёты, позволит уничтожить силы вторжения, прежде чем они смогут причинить вред нашим гражданам."
 zoo_advanced_air_4_2:0 "Ветер перемен"
 zoo_advanced_air_4_2_desc:0 "Двигатель внутреннего сгорания – не единственный способ дабы летать. Инженеры часто говорят, что использование струй перегретого воздуха в разы увеличит скорость по сравнению с ними. Оснащение самолётов такими двигателями может дать существенное преимущество перед нашими врагами."
 zoo_advanced_air_5_1:0 "Небо за Зонго"
 zoo_advanced_air_5_1_desc:0 "Хотя наши воздушные силы начинали с нуля, сегодня трудно представить поле боя, где истребители Зонго не парят в небе, а пилоты бомбардировщиков не летят в тыл врага. Когда реактивные самолёты сходят с конвейеров заводов, а радиолокационные вышки прочёсывают небо в поисках неприятеля, можно с уверенностью сказать, что небо принадлежит нам."

 ##Epilogues
 zoo_queen_mother_epilogue_1_1:0 "И вновь королева-регент"
 zoo_queen_mother_epilogue_1_1_desc:0 "Жеребёнок всё-таки умудрился натворить дел. И это после всего, что я сделала, чтобы его глупые мечты смогли воплотиться. Впрочем, уже не важно: я снова возьмусь за поводья и покажу ему, что бывает, если не умеешь вести себя прилично. Игры кончились. Мать всегда знает, что лучше, и надеюсь в конце концов он осознает, что я желаю ему лишь блага."
 zoo_queen_mother_epilogue_2_1:0 "Свершить правосудие" 
 zoo_queen_mother_epilogue_2_1_desc:0 "Зонго слишком долго был детской площадкой, где резвился всякий сброд. Королевству больше не нужны всякие заговоры и интриги, поэтому все они познают мою ярость. А те, кто стал участвовать в их игрищах, прочувствуют всю тяжесть последствий предательства нашей нации."
 zoo_queen_mother_epilogue_3_1:0 "Арестовать духовенство"
 zoo_queen_mother_epilogue_3_1_desc:0 "Эти типы всегда выводили меня из себя, бесконечно болтая о пустяках вместо того, чтобы хотя бы делать вид, что заняты чем-то полезным. Хоть с ними и не получится так просто расправиться, как с прошлыми проходимцами, я всё ещё могу бросить их предводительницу и её прихвостней в темницу, пока не решу, что с ними делать."
 zoo_queen_mother_epilogue_3_2:0 "Закрепить верность"
 zoo_queen_mother_epilogue_3_2_desc:0 "Трусы? Да. Но верный трус может оказаться весьма полезным. Все, кто стоял подле меня, не поднимая взгляда, будут вознаграждены. Мать никогда не забывает ни тех, кто помогает... ни тех, кто мешает. Им лучше помнить это, если они хотят остаться при дворе."
 zoo_queen_mother_epilogue_4_1:0 "Чистка совета"
 zoo_queen_mother_epilogue_4_1_desc:0 "Эти заседания совета всегда были одной сплошной головной болью с их бесконечной пустой болтовнёй. Особенно иностранцы и духовенство – только и знают, что трещать без толку. Намного лучше быть в окружении тех, кто знает границы своих полномочий и находится там, где ему самое место."
 zoo_queen_mother_epilogue_4_2:0 "Принять декрет о превосходстве зебр"
 zoo_queen_mother_epilogue_4_2_desc:0 "Гиены, жирафы, грифоны, кирины – всё одно и то же! Существа, рождённые служить, и этим они и будут заниматься. Зонго – страна ЗЕБР. Хотели свою страну? Не стоило так легко позволять себя покорить."
 zoo_queen_mother_epilogue_4_3:0 "Подружиться с элитой Цимейна"
 zoo_queen_mother_epilogue_4_3_desc:0 "Ах, Мавелас. Существа с золотыми кошельками и нужными идеями в головах. Их практика рабства была неприятным бельмом на глазу, но они всегда умели удержаться на плаву. Они станут полезными союзниками, а в обмен... возможно, я закрою глаза на кое-какие их привычки." 
 zoo_queen_mother_epilogue_5_1:0 "Улучшенная конституция"
 zoo_queen_mother_epilogue_5_1_desc:0 "Из всех глупых идей моего сына эта имела наибольший потенциал. Верховный свод законов, который говорит подданным, что им делать и что будет за нарушение? Идеально. Просто его наполнение и исполнение хромало, что я с удовольствием исправлю."
 zoo_queen_mother_epilogue_6_1:0 "Отмена программы "Рельсы и нация""
 zoo_queen_mother_epilogue_6_1_desc:0 "Нельзя отрицать очевидное: его "модернизация" зашла слишком далеко. Конечно, мы не вернёмся в прошлое, ведь отбрасывать плоды индустриализации глупо. Но средства, что раньше щедрым потоком лились в одном направлении, куда лучше использовать для расширения армии."
 zoo_queen_mother_epilogue_6_2:0 "Защита наших границ" 
 zoo_queen_mother_epilogue_6_2_desc:0 "Некоторые шепчутся, что Зонго растянулся слишком далеко, а я же отвечу – настоящая проблема в уязвимости границ. Истинная безопасность основана не на договорах, а на контроле. Создав сеть лояльных буферных государств, мы защитим королевство на поколения вперёд."
 zoo_queen_mother_epilogue_7_1:0 "Рождение национального движения Зонго"
 zoo_queen_mother_epilogue_7_1_desc:0 "В ответ на наше великое расширение новое поколение гордых зонголезских националистов создало настоящую военизированную организацию для защиты короны! Им нужны лишь крошки внимания, и они будут превозносить государство и душить любое недовольство. А мне больше не придётся пачкать копыта!" 
 zoo_queen_mother_epilogue_8_1:0 "Офицеры на каждом посту"
 zoo_queen_mother_epilogue_8_1_desc:0 "Внутренняя безопасность чрезвычайно важна! Представьте, что случится с бедными жеребятами, если их не защитить?! В знак моей заботы ни один квартал не останется без солдата, ни один город – без базы, а ни одна граница – без гарнизона. Не благодарите, ведь я хочу лишь заботиться о своих детях."
 zoo_queen_mother_epilogue_8_2:0 "Уладить дела дома"
 zoo_queen_mother_epilogue_8_2_desc:0 "Я наконец нашла применение для той мерзкой кобылы! Акида получит свою любимую, а она будет свободна... пока радует моего сына. Брак, счастье, наследник – идеальное решение. Разумеется, после этого он наконец поймёт мою любовь и правоту моих решений."
 zoo_queen_mother_epilogue_8_3:0 "Неужели бедность настолько плоха?"
 zoo_queen_mother_epilogue_8_3_desc:0 "Право слово, эти существа только и делают, что жалуются! Голод! Страдания! Всё у них плохо. Они должны научиться трудиться и... получать от этого удовольствие. Ну, наслаждаться, конечно, не обязательно, ведь тишины от них уже будет вполне достаточно."
 zoo_queen_mother_epilogue_9_1:0 "Императрица-Регент Зонго"
 zoo_queen_mother_epilogue_9_1_desc:0 "Титул королевы-регента достаточно послужил нам, но страна перестала быть просто королевством. Чтобы показать миру истинный масштаб Зонго, я назову себя Императрицей-Регентом! Титул, достойный меня... и однажды императора Акиды. Надо будет рассказать ему новость – он точно оценит возвращение истинного величия своего дома." 


 zoo_king_epilogue_1_1:0 "Разрушающаяся иллюзия"
 zoo_king_epilogue_1_1_desc:0 "Хотя королева-мать арестована, она успела серьёзно навредить нации. Конституция, коя должна была стать шагом модернизации, разработанная Акидой, выявила множество явных недостатков... И даже это лишь верхушка айсберга. Чтобы окончательно избавиться от её влияния, король должен открыть глаза на всё, чего он не видел во время своего правления."
 zoo_king_epilogue_2_1:0 "Снять розовые очки"
 zoo_king_epilogue_2_1_desc:0 "Этот план стал грандиозным успехом Акиды, величайшим благом, какого Зонго никогда прежде не видел... Или так он считал. Похоже, цифры были незаметно подделаны его матерью. Пришло время снять розовые очки и наконец взглянуть на истинное состояние экономики."
 zoo_king_epilogue_2_2:0 "Создать специальный трибунал"
 zoo_king_epilogue_2_2_desc:0 "С помощью верного мани необходимо провести расследование масштабов преступлений королевы-матери и её пособников. Их необходимо выявить и привлечь к ответственности на специальном трибунале, уполномоченном королём очистить государство от его гнилых пороков."
 zoo_king_epilogue_3_1:0 "Рецензированный план"
 zoo_king_epilogue_3_1_desc:0 "Масштаб наших раскрывшихся недостатков может ошеломить, но Акида никогда не сдавался, даже при самых сложных обстоятельствах! Он призвал своих ближайших советников разработать план, который действительно избавит Зонго от всего, что когда-то его разлагало. Он вернёт себе королевство." #Меня это разлагает
 zoo_king_epilogue_4_1:0 "Конституционная комиссия"
 zoo_king_epilogue_4_1_desc:0 "В конституции было множество скрытых недостатков. Мы нашли многочисленные лазейки и неясные формулировки, поэтому будет создана комиссия для её тщательного пересмотра и переписывания. Больше не будет обхода полномочий путём злоупотребления формальностями. В нашей новой конституции всё будет чётко определено."
 zoo_king_epilogue_4_2:0 "Реорганизация бюджета"
 zoo_king_epilogue_4_2_desc:0 "Акида был ослеплён амбициями, его мечта затмила всё остальное, подданные страдали, а он этого не замечал. Анарбек и интеллигенция призваны обеспечить оптимизацию бюджета, чтобы они больше не страдали от мелких препятствий и ошибок, которые мешали развитию Зонго."
 zoo_king_epilogue_4_3:0 "Лояльность армии"
 zoo_king_epilogue_4_3_desc:0 "Он много раз слышал фразу "Армия следует за сильным лидером", но это просто враньё. Армия следует за теми, кто, по их мнению, обеспечит их семьи едой и крышей над головой. Благодаря успехам специального трибунала мы должны восстановить и обеспечить доверие армии к короне, чтобы предотвратить дальнейшие разногласия."
 zoo_king_epilogue_4_4:0 "Доверие подданных"
 zoo_king_epilogue_4_4_desc:0 "Справедливо будет заявить, что многие из наших подданных не до конца верят, что тяжёлые времена закончились, особенно те, кто стал жертвой войны и кровопролития. Чтобы наша страна не рухнула под собственной тяжестью, мы будем работать над восстановлением их доверия к короне и Зонго."
 zoo_king_epilogue_5_1:0 "Мани как губернаторы"
 zoo_king_epilogue_5_1_desc:0 "Система вождей больше не может работать. Она устарела и слишком нерегулируема. Но это не значит, что от них нужно избавиться. Мани сохранят свои должности, однако в более современном виде. У них появятся новые обязанности и директивы, которым они должны будут следовать, адаптируясь к своим новым ролям губернаторов."
 zoo_king_epilogue_5_2:0 "Завершение программы"
 zoo_king_epilogue_5_2_desc:0 "Настал ключевой этап модернизации: переход от плановой экономики к свободному рынку. Хотя государство сохранит контроль над ключевыми отраслями, важными для общественного благополучия, и будет следить за эффективностью и инновационностью промышленности, капитал теперь получит возможность развиваться естественно, стимулируя рост и процветание."
 ZOO_unlock_one_final_line_tt: "§CОткрывает§! возможность §Gзавершить§! §Yпрограмму§!, как только каждая железнодорожная линия достигнет уровня (§G5§!/§Y5§!)."
 zoo_king_epilogue_5_3:0 "Дружба с кентаврами"
 zoo_king_epilogue_5_3_desc:0 "Древний Пакт долгое время был оплотом стабильности и прогресса в регионе. Акида с теплотой вспоминает время, проведенное в Сентурии, и свои редкие визиты в Гаргилою. Теперь Анарбек отправился в Илкшехир, чтобы предложить формальный военный союз, который, как монарх надеется, обеспечит мир и более тесное сотрудничество в будущем."
 zoo_king_epilogue_6_1:0 "Поднимая обездоленных"
 zoo_king_epilogue_6_1_desc:0 ""Они сыты и им хорошо платят." Какая наглая ложь. Акида теперь видит правду: его стремление к индустриализации оставило многих в нищете. В качестве искупления за эту серьёзную ошибку были мобилизованы огромные ресурсы при поддержке религии, чтобы помочь тем, кто остался позади, и обеспечить им возможность наслаждаться процветанием Зонго."
 zoo_king_epilogue_6_2:0 "Королевская свадьба"
 zoo_king_epilogue_6_2_desc:0 "Мы наконец-то дождались момента стабильности для исполнения своих клятв. Зонго оправился от ошибок и интриг, которые его омрачали, и одно событие вселяет надежду во всё население. По всей стране бьют в колокола, а страна готовится к празднику: Акида и Аяна женятся!"
 zoo_king_epilogue_7_1:0 "Магнум опус"
 zoo_king_epilogue_7_1_desc:0 "Путь был тернист, полон обмана и страданий. И всё же, пока поезда свистят, а заводы грохочут, король, кажется, доволен свершениями, с нетерпением ожидая того, что принесёт ему и его ближайшим друзьям будущее. Они больше не трудятся только ради мечты Акиды, но ради общей цели – стремления к славному Зонго."

 zoo_council_epilogue_1_1:0 "Королевство в огне"
 zoo_council_epilogue_1_1_desc:0 "Произошла страшная трагедия! Акида в коме, королева-мать окончательно стала безучастной, а трон остался без правителя! Кто-то должен вмешаться, чтобы всё королевство не рухнуло."
 zoo_council_epilogue_2_1:0 "Разоблачить гниль"
 zoo_council_epilogue_2_1_desc:0 "Выявление ненадёжных и коррумпированных элементов в совете, государстве и бюрократии жизненно необходимо для настоящего прогресса страны. Мы поощрим мани и других чиновников доносить на нечестных на копыто ради общего блага."
 zoo_council_epilogue_2_2:0 "Беседа с кентавром"
 zoo_council_epilogue_2_2_desc:0 "Анарбек, как лидер интеллигенции и близкий друг Акиды, – крайне важный союзник во всём этом хаосе. Аяна свяжется с кентавром и понадеется, что он останется с Зонго в эти тяжёлые дни."
 zoo_council_epilogue_3_1:0 "План стабильности"
 zoo_council_epilogue_3_1_desc:0 "Получив поддержку совета, интеллигенции и духовенства, Аяна и Анарбек подготовили реформы, чтобы пережить трудные годы. Первая станет королевой-регентом, а второй её ближайшим советником, пока корона не вернётся своему владельцу – пока Акида не пробудится!"
 zoo_council_epilogue_4_1:0 "Общественные работы Аяны"
 zoo_council_epilogue_4_1_desc:0 "Бедность – позор нации, который индустриализация лишь усилила. Многие подданные с трудом выживают, работая в жутких условиях, пока страна шагает вперёд. Теперь, с государственным аппаратом на её стороне, Аяна начнёт борьбу с величайшим грехом Зонго."
 zoo_council_epilogue_4_2:0 "Армейская реформа Анарбека"
 zoo_council_epilogue_4_2_desc:0 "Беспорядок после покушения показал, что лояльность армии короне под большим вопросом. Чтобы избавиться от таких элементов, Анарбек проведёт её полную перестройку, оставив лишь тех, кто доказал свою преданность и умение."
 zoo_council_epilogue_5_1:0 "Выслушать просителей"
 zoo_council_epilogue_5_1_desc:0 "Система королевских прошений – полезный инструмент, но, из-за одержимости Акиды планом и пренебрежения королевы-матери, он почти забыт. Если мы хотим доказать подданным, что их судьба нам важна – мы обязаны вновь начать их слушать."
 zoo_council_epilogue_5_2:0 "Пенсия для Мани"
 zoo_council_epilogue_5_2_desc:0 "Мани, удерживающие титул пожизненно – архаизм. Постепенно все они стареют, теряют рассудительность и просто начинают потакать собственным капризам. Чтобы совет оставался полезным инструментом короны, мы введём выход на пенсию в 60 лет и передачу титула достойному наследнику."
 zoo_council_epilogue_5_3:0 "Меритократические повышения"
 zoo_council_epilogue_5_3_desc:0 "Пожизненный титул мани – пережиток прошлого, не соответствующий новым реалиям. Чтобы совет служил эффективно, будет введён пенсионный возраст в 60 лет. Хотя многих нынешних мани коснётся подобная мера, они уступят место новому поколению, "почётно" уходя со службы."
 zoo_council_epilogue_5_4:0 "Гражданские в совете"
 zoo_council_epilogue_5_4_desc:0 "Долгое время совет состоял лишь из мани и представителей духовенства. Реформы Акиды добавили интеллигенцию, но этого мало. Чтобы совет лучше служил Зонго, необходимо привлечь профессиональных гражданских служащих."
 zoo_council_epilogue_6_1:0 "Положение веры"
 zoo_council_epilogue_6_1_desc:0 "С Аяной в качестве бывшей Верховной жрицы на троне многие боятся превращения Зонго в теократию. Мы заверим всех: этого не будет. Вера станет лишь духовным ориентиром нового Зонго."
 zoo_council_epilogue_6_2:0 "Реформа программы "Рельсы и нация""
 zoo_council_epilogue_6_2_desc:0 "Мечта Акиды была грандиозной и современное Зонго многим ей обязано... однако она оказалась слишком утопичной. Без короля некому стать её духовным лидером и проект быстро становится уязвимым. Аяна и Анарбек создадут Королевский совет развития, чтобы внести порядок в финансирование и экономику."
 zoo_council_epilogue_6_3:0 "Акт о мультинациональности"
 zoo_council_epilogue_6_3_desc:0 "С гиенами, грифонами, жирафами и даже киринами Зонго стало чем-то большим, чем просто страной зебр. Анарбек подготовил Прокламацию о многообразии, чтобы доказать: Зонго – не этногосударство, а дом для всех рас с одинаковыми правами, как и у него."
 zoo_council_epilogue_7_1:0 "Что могло быть"
 zoo_council_epilogue_7_1_desc:0 "Будущее Зонго было украдено пулей. Мечты, планы, надежды Акиды погрузились в сон и не смогут жить без него. Аяна лишь надеется подготовить страну к возвращению своего настоящего короля. Когда бы это ни произошло..."
 zoo_council_epilogue_7_2:0 "Что будет"
 zoo_council_epilogue_7_2_desc:0 "Даже когда всё превращается в трагедию, время не стоит на месте. Мы сражались за новую судьбу и, когда надежда почти исчезла, сумели её удержать. Реформы регентства дали Зонго шанс на завтрашний день."
 zoo_council_epilogue_8_1:0 "Новая Конституция"
 zoo_council_epilogue_8_1_desc:0 "Король уже сделал важный шаг, но конституция была несовершенна, а сейчас и вовсе не подходит для нового Зонго, рождённого реформами. Работа будет идти днём и ночью, чтобы исправить недостатки и подготовить страну к новой эпохе."
 zoo_council_epilogue_9_1:0 "Зонголезская Федерация"
 zoo_council_epilogue_9_1_desc:0 "Называть Зонго просто королевством было бы лукавством. После трагедии оно поднялось куда выше, чем прежде. Чтобы лучше представлять всех существ, живущих здесь, мы провозгласим Зонголезскую Федерацию!"

 ### Decision Categories ###
 ZOO_railway_decisions_category:0 "$ZOO_grand_railroad_project$"
 ZOO_railway_decisions_category_gui_desc:0 "§YПрограмма "Рельсы и Нация"§!\n--------------\n§LЧтобы Зонго смог выдержать огромные расходы §YПрограммы "Рельсы и Нация"§!, королевство вынуждено сосредотачиваться лишь на одном участке проекта за раз. При этом фокус можно §Gсвободно менять в любой момент§!, ведь предыдущий прогресс сохраняется. Чтобы начать строительство, вы должны выбрать путь. Также вы будете получать уведомления по мере прогресса региональных этапов.\n\nБолее высокие уровни путей можно разблокировать в ходе игры, а максимальный доступный этап будет отображён цифрой справа на карте. Левая цифра показывает текущий этап, которого программа достигла в регионе. Максимальный этап любой линии – 5, что приносит государству значительные выгоды.\n\nОднако, несмотря на всю предварительную подготовку, §Yпрограмма§! сталкивается с серьёзными §Rнедостатками§!. Из-за централизованного характера §Yпрограммы§! переключение фокуса на новый участок происходит только после того, как мвенезонго отдаст прямой приказ – без королевского одобрения прогресс будет заморожен. Помимо этого, наша стремительная индустриализация будет §Rпостоянно влиять на уровень бедности в Зонго§!, причём и без того уязвимые низшие слои окажутся §Rещё в большей опасности§! из-за наших усилий. Чтобы эти проблемы не вышли из-под контроля и не поставили под угрозу крах его мечты, §Yмвенезонго§! должен внимательно следить за ситуацией и обеспечивать стабильность как подданных, так и §Yпрограммы§!§!."
