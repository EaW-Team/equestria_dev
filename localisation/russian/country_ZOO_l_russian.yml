 ZOO_under_construction_line_progress: "§G[?temp_line_progress]§!/§Y[?temp_line_length]§!"
 ZOO_gui_map_construction_explanation_tooltip:0 "Каждую неделю §Gеженедельный прогресс строительства ж/д секций§! будет добавлен к общему прогрессу строительства на этой линии.\n\nКаждая готовая секция ж/д становится §Gзавершённым участком§!, а §Lизбыток строительства§! переносится на следующую рабочую неделю.\n\nКогда §Gобщий прогресс строительства железной дороги§! достигнет §Yнужного значения§!, уровень железнодорожного пути §Gповысится§!."
