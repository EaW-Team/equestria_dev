 # Queen-mother Epilogue Events
 zongo_queen_mother_epilogue.1.t:0 "The Queen-Regent's Declaration" #Snow
 zongo_queen_mother_epilogue.1.desc:0 "The crackle of the radio was the only sound in countless homes and public squares across Zongo. Then, a sharp voice began to speak. "People of Zongo. The kingdom is safe. Your King, Akida, has been led astray by traitors who sought to undermine our very soul. To protect my son and our kingdom, I have reassumed the regency."\n\nIn a dimly lit room, Anarbek listened, his face grim. He was already packing bags with as much as he could feasibly carry. "The foreigners are parasites; their lies have served only to fog our King's mind." The centaur did not need to hear more; he knew his fate if he stayed. Gathering what he had already packed, he prepared to call in every favour he could. He had to go home.\n\n"They were not alone in this. The current Head Priestess, Ayana, was in league with their ilk." Ayana listened in horror, a hoof over her mouth. "She attempted to corrupt not only our King but the Faith itself. She shall be swiftly dealt with to ensure this rot spreads no further." Her heart broke not for her own plight, but for the future she had dreamed of, and for this awful corruption of all they had worked for.\n\n"We will ensure our safety by showing the world the true, unyielding power of Zongo!" Mani Zuba listened with a look of satisfaction. "No longer will we be seen as a backward kingdom. They will learn to fear our name, for our strength and resolve will be absolute!" Zuba nodded to himself; this was the way it had always been meant to be. Zongo was finally casting off weakness once and for all.\n\n"Zongo will be purified of all rot, and it will once and for all show all who have disrespected it its true strength. Long live Zongo. Long live the King." As the transmission ended, Nzuzi could not stop a smile from forming. She truly had not wished for it to go this way, but alas, her son could not yet understand. Her mistake last time was sending him to study abroad, when there had been a far better teacher just a hoof's reach away."
 zongo_queen_mother_epilogue.1.a:0 "Lesson number one: Mother always knows best."
 zongo_queen_mother_epilogue.2.t:0 "A Day in the Life of a Mavela" #Snow
 zongo_queen_mother_epilogue.2.desc:0 "From his balcony, a Mavela and his daughter watched the Zongolese soldiers march in lockstep through the streets below. He took a slow sip of his tea as his daughter stood aghast, fidgeting with her own cup anxiously.\n\nThe father allowed a thin, knowing smile to grace his lips as he noticed her feelings. He did not turn from the view. "Believe it. It is the most natural thing in the world." He gestured idly with his cup towards the streets below. "Conquerors come and go. But a kingdom, especially an empire, does not run on ideals. It runs on administration. It runs on gold. It runs on the creatures who know where the levers of power are, and how to pull them."\n\nThe younger zebra nodded slowly, the tension leaving her shoulders. "So we... adapt?"\n\n"As we always have," the father spoke as he took another sip. "We make ourselves indispensable. We offer our experience, our networks, our efficiency. In return, the Regent offers us a return to influence and overlooks our... past indulgences. It is a transaction as old as civilisation itself." He finally turned, his eyes cunning. "Llamas, camels, Quaggans, the would-be unifiers of Chisimbi, and now, the Zongolese. Do you know what they all share?" He smiled. "None of them last, the Zongolese themselves won't be here a hundred years from now."
 zongo_queen_mother_epilogue.2.a:0 ""But we will."" 
 zongo_queen_mother_epilogue.3.t:0 "The Fate of the Council" #Snow 
 zongo_queen_mother_epilogue.3.desc:0 "The council chamber was thick with a mix of silence and fear. The seats once occupied by the Nganga and Head Priestess Ayana now stood empty, a reminder of the recent arrests. Nzuzi stood at the head of the table, gazing upon the assembled Mani and the few remaining members of the intelligentsia who had not yet fled.\n\n"I thank you all for coming at such short notice," she began, a practiced smile on her face. "While this council has long served as an advisory body to the Bomboko family, it has also proven susceptible to traitorous beliefs. Therefore, by my authority as Queen-Regent, this assembly is hereby dissolved until the realm is stabilised."\n\nBefore a single word of protest could be formed, the doors swung open. Royal guards moved in, their hoofbeats echoing in the room. They moved with methodical precision, not towards the Mani, but towards the scholars and advisors. With no time to even process what was happening, they were dragged out by inexpressive guards. As the Mani looked on, Zuba approached the Queen-Regent's side, his voice a low murmur. "Your Majesty, the centaur is nowh—"\n\nNzuzi cut him off with an almost bored wave of her hoof, her eyes fixed on the door. "He is irrelevant. What matters is that there were enough of them left to send a message. Make sure they don't leave a mess, understood?" Zuba did a quick salute and left.\n\nAs he did, Nzuzi turned her gaze towards the rest of the room. The Mani were quiet, their eyes cast down, while the rest of the seats were now all emptied. This den of lies had finally been dealt with; with no council to cloud his mind and the Mani remembering their place, the next generation would surely be more docile towards Akida. She smiled, there was still much more to be done to ensure her son had no issues with his next reign."
 zongo_queen_mother_epilogue.3.a:0 ""
 zongo_queen_mother_epilogue.4.t:0 "Supremacy of the Zebras" #Snow
 zongo_queen_mother_epilogue.4.desc:0 "Aye moved through the streets of Zongo with a practiced caution. His internal monologue was a frantic recitation of the new decrees: Walk on the right. Do not gather in groups larger than three. Keep your papers on you at all times. Do not make eye contact with the officers. He had studied the laws, committed every syllable to memory. He would be a model subject. He would be invisible, and he would tough it out through these trying times.\n\nAs he walked through the market, he noticed an officer ahead and instinctively lowered his gaze, patting his pocket where his identification papers were neatly folded. He avoided any market stalls he had no intention of buying from, to avoid being accused of theft. He was doing everything right. He was following the rules.\n\nA shadow fell over him. Two officers, their uniforms immaculate, blocked his path. Aye's heart hammered against his ribs. He had done nothing wrong. He was sure of it. "You," one of them spoke, her voice flat. "Please present your identification, standard procedure." He felt a wave of relief; his papers were all up to date. He presented the neatly folded identification. The officer took them and looked it over for a few moments. "They seem to be in order," the officer said. Her expression did not change. "But you were loitering. That is a fine. Please follow us."\n\n"I-I was just walking," Aye stammered, his voice barely a whisper. "To my home. I live nearby; I have a family. They can vouch for my character."\n\nThe second officer sneered. "Likely story. You are acting erratically. Are you planning something? How many of you are involved?"\n\nAye felt each hammering of his heart like a piston. "No! I-I..." The first officer leaned in close, her voice dropping to a level only Aye could hear."
 zongo_queen_mother_epilogue.4.a:0 "It doesn't matter what the papers say, hyena. You were breathing our air. That's crime enough."
 zongo_queen_mother_epilogue.5.t:0 "The Zongolese National Union" #Snow
 zongo_queen_mother_epilogue.5.desc:0 "The hall was electric as applause thundered through it. The first meeting of the Zongolese National Union had been a great success; many locals, and even zebras from afar, had come just to witness the event. At the front stood one of the founding members, his heart swelling with pride and anticipation. The excitement of the secret he alone knew was almost enough to make him faint, but he held steady as the lights abruptly cut out. The applause died, replaced by a wave of confused whispers, which were then stifled by a collective gasp that swept the crowd as the lights fell onto one Mare.\n\nShe was here.\n\nThe Queen-Regent herself stood in the doorway, a small, knowing smile gracing her lips as she glided to the podium. The room erupted as she marched forward. "My loyal subjects," she began, reaching the top, her smile that of a mother beholding her beloved children. (Blank) felt a tear form, this was beauty itself. "I am overcome to see you all organise for the betterment of our kingdom! I will ensure all your wishes are fulfilled! No more traitors! No more lies! We will show the entire world the might of the Zongolese!" The room roared its approval, yet her voice cut through, louder than any other.\n\nAs (Blank) cheered, he felt Her gaze find his. That slight nod, that smile – it was for him and him alone. His reward for his loyalty, for the things he had done precisely as she asked. The Queen-Regent had spoken to him of how the youth must organise to keep Zongo safe, so he had called upon every friend, every family member, every soul he knew. He had nurtured it from a mere idea into truth, and this was his reward. She would have her followers. She would have a clean Zongo. The vermin of the traitors would be cleansed, and she would have all she desired. All he needed was for that smile to grace him, and he knew everything had been worth it."
 zongo_queen_mother_epilogue.5.a:0 "A millions soul united for one cause."
 zongo_queen_mother_epilogue.6.t:0 "Officers Ready Everywhere" #Snow
 zongo_queen_mother_epilogue.6.desc:0 "Life in the small settlement kept to the same rhythm as always. The sun still rose, the market stalls still opened, and everyone went on their days as usual. There was only one tiny difference, noticeable to every resident. Where there had previously been a small guard of a few officers, now it was as if there was one on every corner, silent and watchful. To an old mare like Nsuka, it was simply the way of things. Besides, a bit of order never hurt anyzebra.\n\nOn her way to the well, she passed a narrow alley. From within came the muffled sounds of a struggle. Nsuka didn't slow her pace as she passed. She had seen such things before and knew it was none of her business. Hopefully, the young ones would learn their lesson and stay away from trouble in the future.\n\nAs she rounded the street, bucket in her mouth, a young officer stepped politely into her path. "Good morning, miss," he said, his voice soft. "Might I bother you for a few moments?"\n\n"Oh, of course!" she replied, setting her bucket down. "What might I help you with, officer?"\n\nThe stallion smiled. "Certainly, I'll soon let you be on your way. Now," he said, patiently taking a notepad from his pocket. "What is your association with Menji?"\n\nNsuka blinked. "Why, yes... that's my grandfoal's name. Has he been in any trouble?" The officer simply hummed as he wrote, his smile unfazed as Nsuka started to grow anxious. "I'm sorry, I may have spoken a bit too quietly, it is a bad habit of mine. Has he—"\n\nThe officer looked at her once more as he closed his notepad. "I'm terribly sorry, miss. I'll need a few more minutes of your time; could you accompany me to the station?"\n\nNsuka was speechless. Her grandfoal was a good colt; there was no way he had done something to warrant this. Yet, she obliged, she was sure she could clear the misunderstanding that had surely happened."
 zongo_queen_mother_epilogue.6.a:0 "Nsuka followed him, unaware of the looks she was receiving from a passing mare."
 zongo_queen_mother_epilogue.7.t:0 "A Home-Marriage" #Snow 
 zongo_queen_mother_epilogue.7.desc:0 "The door to Akida's chambers opened without a knock. He did not look up from where he sat; the door had not opened for anything good these last few weeks. Even as he kept his gaze averted, an all-too-familiar voice began to speak, as it always did, no matter how much he ignored it.\n\n"I have a surprise for you, my dear, something to finally lift your spirits." Akida remained silent. He knew better than to engage her. He heard her signal to someone outside, followed by the sound of hesitant hoofsteps. His eyes flickered towards the door, and his composure shattered as he saw Ayana. Before he could move, she was shoved into the room, stumbling onto the floor. A blindfold was tied tightly over her eyes, and her hooves were bound. A whimper escaped her as she struggled.\n\n"Ayana!" In an instant, Akida jumped up and pulled her close. His hooves worked frantically to undo the blindfold and bonds. As the cloth fell away, Ayana's eyes were wide with fear. They welled with tears the moment she recognised him.\n\n"There now," his mother said, smiling as always. "I am a giving mother, am I not? Now, let's not waste any more time." She raised her hoof towards the room. "By the power vested in me as Regent of Zongo, and as your mother, I now pronounce you husband and wife." She clapped her hooves together softly. "Congratulations!"\n\nAkida could only stare, his breath caught in his throat. He had so many thoughts running through his mind he could barely choose which profanity to scream at her. "I wish you two good omens and fertility; I cannot wait to meet my grandfoal soon."\n\nWith that, she turned and closed the door, leaving as if this had just been small talk. The moment they could hear no more steps, Ayana fell onto his chest. Her body shuddered as she sobbed and clung to him, her tears soaking into his fur. He held her as tightly as he could, powerless to do anything else."
 zongo_queen_mother_epilogue.7.a:0 "Some suffering is too terrible to name."
 zongo_queen_mother_epilogue.8.t:0 "A Mother's Touch" #Snow
 zongo_queen_mother_epilogue.8.desc:0 "Nzuzi rushed to break the news to Akida; he would finally recognize all she had done. As she entered, she saw Akida and Ayana standing by the window, and they immediately fell silent. Nzuzi's eyes swept over them, barely registering Ayana's existence, a triumphant light in her gaze. "Akida, my son," she began, her voice dripping with pride. "I come with grand news! Zongo stands at its pinnacle! Our borders are unbreachable, our enemies cowed, and our people united under a single purpose. The world finally understands our strength." She took a step closer. "It is an empire... an empire for you, my little Emperor Akida. Can you see it? Can you finally understand why I had to do all of this?"\n\nHer hoof rose, intending to gently caress his cheek; the first time in so long she could touch him!\n\nAkida recoiled as if struck by a hot brand. His whole body flinched back, his head jerking to the side to avoid her touch. When his eyes met hers, they held no trace of the brilliant, hopeful foal she remembered in her lap. There was only disgust and hate in them.\n\nNzuzi's hoof hung in the air as she simply stood there for a single, unguarded moment, her face a canvas of pure shock. The silence stretched, thick and heavy, for seconds that felt like years. "I see," she finally said, her voice quiet. She lowered her hoof, her posture stiffening. "I will... take my leave." She turned and walked out, but as she walked away, her composure broke.\n\nA tremor of pure rage ran through her, her hooves clenching so tightly they ached. Beneath the fury, however, was a much worse feeling... sadness. After everything she had built, every sacrifice she had made, every life she had broken to secure his future, he looked at her as if she were a monster. He was still so foalish, so blind! He did not understand now?! So be it! She would simply have to do more. She would build a legacy so grand, so unshakeable, that he would have no choice but to see her love. One day, he would understand."
 zongo_queen_mother_epilogue.8.a:0 "One day"
 zongo_queen_mother_epilogue.9.t:0 "A Toy to You" #Snow
 zongo_queen_mother_epilogue.9.desc:0 "The moment the door clicked shut, Akida felt worse than ever. He slumped forward, his head in his hooves, a shuddering breath escaping him. Just seeing his mother was enough to remind him of all his failures and all those false smiles she had given him. Ayana stood by his side. She didn't speak, simply resting her head on him, her presence calming him down. For a long time, the only sound was his ragged breathing slowly steadying.\n\n"I hope... I hope Anarbek is safe," Akida finally murmured. "Wherever he is." A hollow laugh escaped Akida. "He was right, you know. He warned me about being too idealistic. He tried to warn me ever since I first arranged the meetings with him and the foreign experts, and he risked his life just to give us a way to see it. And now?" He gestured weakly towards the window, beyond which lay the kingdom she had perverted. "What was supposed to be my magnum opus has been corrupted. She's using the railways I built to move her troops. The factories I envisioned for prosperity now churn out weapons. It's all become a tool for her... I should have listened to him, and now I can never thank him properly."\n\n"You couldn't have known," Ayana said firmly as she held him. "Your dream was beautiful. It was for everycreature. She is the one who twisted it."\n\nAkida fell silent again. He looked at the quiet streets, and he saw a Zongo that was no longer his. The weight of it all felt infinite. When he spoke again, it was barely a whisper, a confession meant for no one but himself and the mare who held him.\n\n"I hope she dies soon."\n\nAyana simply pulled him closer, resting her head back on his shoulder. There was nothing more to say nor do. They could only wait for the horrors to end while there was still a nation left for them to heal."
 zongo_queen_mother_epilogue.9.a:0 "A boulevard of broken dreams."
 zongo_queen_mother_epilogue.10.t:0 "The Empress-Mother Victorious" #Snow 
 zongo_queen_mother_epilogue.10.desc:0 "The capital throbbed with euphoria. On this day, Zongo would cast off its status as a mere backwards kingdom, once and for all. A massive military parade stormed through the city; rank upon rank of ZNU paramilitaries, their faces set with pride, stomped in perfect unison. Newly forged tanks, products of the repurposed factories, rumbled over the cobbled streets. Flatbed trains followed the parade, laden with giant artillery pieces. From every building, banners bearing the Bomboko crest fluttered.\n\nFrom a car right in the middle of it all, Nzuzi was the centre of all this adulation... yet, she did not feel satisfied. As the parade unfolded, her mind drifted back to the memory of her own child recoiling from her. It harked back to Nkosi, to Akida lying in her hooves, to the three of them laughing together on those rare, lazy days. She had achieved everything she had ever wished for, ever since she was a filly, and yet... could Akida be—\n\n"Your Majesty." The voice of Zuba cut through her brooding. He stood beside her as a guard; she had already forgotten he was there. "They await your words." As she looked around, she noticed the car was stationary, surrounded by crowds, and parked near a tall set of stairs; the stage set for the culmination of the parade. She smiled as she stood up, her mere presence reason enough for the crowds to roar in approval once more. As she ascended to her rightful spot, she gazed out towards the crowds and smiled.\n\n"Subjects of Zongo! Look around you and think of what you see! Strength! Unity! Safety! Pride! All are apt descriptions for the land we stand upon today!" She paused as the crowd roared once more. "We have transformed what was considered a backwards kingdom into something the rest of the world respects, and so it shall be forever! From today on, they will all know Zongo for what it truly is! A mighty empire that will stand for all time!"
 zongo_queen_mother_epilogue.10.a:0 "Long live the Empire! Long live the Bomboko!"
 zongo_queen_mother_epilogue.11.t:0 "Doing The 'Right' Thing" #Snow
 zongo_queen_mother_epilogue.11.desc:0 "The chest, when opened, seemed to swallow the light from the room. Mani Karabaza ran a hoof over the gleaming gold coins and polished jewels within; he could barely contain his smile. It was more wealth than his domain would usually see in months of trade. His son, on the other hoof, didn't seem as enraptured.\n\nMakaya stood a few steps back, his face conflicted as his father was practically entranced by the fortune. "Father, I..." he began, his voice hesitant. "This is very generous, but there have been no recent festivities or anything of the sort. It seems out of season for such a gift; it is also a pretty exorbitant amount. What could be the reasoning for it?"\n\nKarabaza's head snapped up. The gleam in his eyes was instantly replaced by a look of panic. He strode over to his son and struck him with the back of his hoof, sending him tumbling backwards in surprise. "Silence, you foal!" he hissed, a mix of anger and fear in his voice. "You will shut your mouth and lose this habit of yours. You take what is given, and you thank the giver." He pulled his son closer, his breath hot against the younger zebra's ear. "Do you understand? One more word like that, and you may not be my heir any longer. You will be a lesson. I will be without a son, and you... you will be a corpse to bury. Now, smile. We are loyal subjects, and we are being rewarded. There is nothing more to it."\n\nMakaya fell silent, his gaze dropping to the floor. He nodded once, and his father's mania receded. "Good. You are lucky this lesson came behind closed doors. Remember it for the rest of your life." As his father released him, Makaya saw the chest for what it truly was."
 zongo_queen_mother_epilogue.11.a:0 "A reward can also serve as a reminder."

 # Council Epilogue Events
 zongo_council_epilogue.1.t:0 "Fallout Of The Coup" #Snow
 zongo_council_epilogue.1.desc:0 "Ayana sat in her usual spot at the table as she tried to guide the council, though it wasn't proving easy without many leading figures. With Zuba in a cell, Queen-Mother lost in a catatonic stupor and Akida lying dormant, the room felt much emptier. In an attempt to get the meeting going, she asked the question that hung in the air: 'what happened in this room that day?' Like rats scrambling when hit with light, the Mani fought to be heard.\n\n"It was Zuba! His ambition blinded him!"\n"The Queen-Mother's schemes led to all of this!"\n"We acted as soon as we could! We took down the traitor!"\n"Akida acted with bravery; he stood up to the traitor, but..."\n\nAyana simply listened, her face composed as the Mani bickered. She absorbed their words as she tried to connect the dots of the scrambled story. They painted a picture of heroism, but Ayana was unsure if she could believe them. If they had reacted instantly, why was Akida shot and now comatose? Why did Zuba believe his coup could succeed unless he had reason to expect compliance... or at least for the council to have been bickering so much that they wouldn't even stop him? They were quick to spew the sins of Nzuzi now that she was so detached... but if the king had truly tried to have her arrested, why did the entire situation devolve into this tragic event? There were simply too many blanks in their story.\n\nShe thanked them for their testimony and soon dismissed the council. As the door closed behind the last zebra, she was left alone with her thoughts. They could tell as many tales as they wanted, but the empty chair at the head of the table was enough to showcase their failure."
 zongo_council_epilogue.1.a:0 "What would he have done in this situation?"
 zongo_council_epilogue.2.t:0 "Civil Officials in the Council" #Snow
 zongo_council_epilogue.2.desc:0 "Among the many seats of the council, stood a new one. Behind it sat a stallion, unfamiliar to all council members, his posture rigid and his attire simple. As Ayana called the session to order, she gestured to him with a smile.\n\n"Councillors, I present Kato. He has been working to assist the government ever since the king's reforms started," she announced, her tone bright. "The efforts of zebras like him have ensured that the plan could proceed with as few issues as possible. To better connect the crown to its subjects, he will now serve as a new council member. Please warmly welcome him."\n\nKato rose and gave a short and measured bow as the council members clapped. As the applause died down, he began to speak. "Thank you, Queen-Regent. It is a profound honour to serve Zongo as a member of the council." He offered another bow in Ayana's direction. "I am certain my unique knowledge will serve Zongo well. I intend to ensure that certain... persistent inefficiencies are not as pronounced as they have been allowed to become." He paused, letting the words hang in the air as all watched him. "While I know some oversights are inevitable when looking from on high, I hope to ensure that they become less of a problem in the future." His gaze drifted across the Mani before he looked down, a faint, self-satisfied smile playing on his lips. "That is all."\n\nHe extended a hoof to Ayana, who met it with her own. She could feel it in his grip and his confident demeanor: this stallion would be a good ally to have. He was someone who rose from the populace, like the Nganga, while still being more closely tied to the Intelligentsia due to his position, yet not being directly tied to either of them. But, even more importantly, he was a clear adversary to the Mani. They had surely made his job harder before, and his smile was a promise to give them just as much trouble."
 zongo_council_epilogue.2.a:0 "She just hoped he would not be blinded by ambition."
 zongo_council_epilogue.3.t:0 "Ayana's Talk With Anarbek" #Snow
 zongo_council_epilogue.3.desc:0 "In the silence of a private study, away from the chaos of the court, Ayana and Anarbek met privately for the first time. They had spoken before as council members, but this was different. This was no longer a meeting of the intelligentsia and faith, it was a meeting of Ayana and Anarbek. The centaur listened with an unreadable expression as Ayana spoke.\n\n"I know this might all be too much," the mare began, her voice strained. "You're a professor in Senturya, renowned and respected. None would fault you if you were to leave Zongo behind." She sighed, gathering her courage. "But I plead for you to stay! While you may not be of Zongolese origin, you were still a trusted ally and friend of Akida. With you, we can save this nation! But if you left then I... I..." The words felt like a lump in her throat as her eyes began to tear up.\n\n"You misunderstand my intentions, Head-Priestess," Anarbek interjected gently, before she could finish her fearful thought. "I never planned to leave. Not once." As she looked at him in surprise, he continued, his voice softening. "When Akida asked me to come here, I was deeply moved. As I saw him during meetings and our private conversations I saw the same stallion I had seen so often at class. He had become a true king, yet he had not lost his kind soul. Some say power corrupts, yet he remained himself all the way." Ayana wiped at her eyes, and Anarbek placed a reassuring hand on her shoulder. "We will get through this together. I promise you."\n\nWith a resolved nod, Ayana steadied herself as the two got to discussing how they would tackle the future of the nation. This was not for power or for their own political beliefs, the two simply wished that Akida's dreams could keep moving on as the king slumbered. One day he would wake and he could be proud of how far Zongo had come... that was the silent hope that kept the two moving forward."
 zongo_council_epilogue.3.a:0 "Plans are formed as a promise is made."
 zongo_council_epilogue.4.t:0 "Presenting A Plan Forwards" #Snow
 zongo_council_epilogue.4.desc:0 "The council chamber was thick with a tense silence as every zebra awaited for the Head-Priestess to speak. Ayana stood at the head of the table, her expression composed and determined. "This matter was to remain private, but the tragedy that unfolded in this very room has forced my hoof." She took a steadying breath. "Before the Kirian war, King Akida proposed to me." Whispering began to fill the room, yet Ayana did not falter. "We intended to announce our union in a time of peace... but I am left with no choice. As Akida's wife, I will take the reins of Zongo as Queen-Regent until our rightful king awakens!"\n\nThe Nganga watched in quiet approval, while the Mani and Intelligentsia shifted with palpable anxiety; with the exception of Anarbek, who observed the scene calmly. "I have not come empty-hoofed! I have a plan of action to ensure stability comes to Zongo once more. But I did not draft it alone." She turned towards the centaur. "Anarbek, please join me."\n\nAs the centaur moved to her side, the Intelligentsia seemed to steadily calm down as the Mani's whispers grew more urgent. "As a close confidant to our king, Anarbek has assisted our nation in many ways. These trying times demand a new perspective, and so I make a second announcement: effective immediately, he shall serve as Royal Advisor until this crisis is resolved." Her words swept over the council silencing all whispers. "We shall now hold a vote. Speak any objections now."\n\nHooves began to rise in approval. The hesitant Mani, seeing themselves outnumbered by a two-thirds majority and with the recent betrayal of Mani Zuba, they saw the no other choice but to reluctantly add their own anxious assent. "The vote is unanimous," Ayana declared as she smiled. "There is much work to be done."\nThey did not yet know the full extent of the pair's ambitions to reform Zongo. Yet, it was as Akida always said..."
 zongo_council_epilogue.4.a:0 "There is no stopping the march of progress."
 zongo_council_epilogue.5.t:0 "Hearing All Royal Petitions" #Snow
 zongo_council_epilogue.5.desc:0 "As the doors opened for the petitioning to begin, Ayana was overwhelmed by the sheer length of the line. It began at the throne room doors and stretched far beyond the limits of her sight. As the first zebra looked at her expectantly, she raised a hoof and called them forward.\n\nThe zebra spoke their worries and Ayana listened. When they finished, she assured them she would do her best to remedy their situation. As one left, another came, and another – more and more zebras, each carrying worries and fears that had accumulated over a decade, or even a lifetime, all aggravated by the actions of Nzuzi. Some concerns were trivial, but an overwhelming majority came with truly heart-shattering accounts: families separated, missing parents, homes appropriated for the sake of 'progress'... the weight of these stories took a heavy toll on Ayana's mind, but she kept on.\n\nWhen the bells rang to signal the end of the petitions, the line began to disperse as the royal guard escorted them out. Yet, they couldn't stop a rushing figure who burst into the hall, ignoring the bells. It was a small foal, no older than eight, running desperately towards the throne. A distressed mare lingered at the doors, being stopped by the guards having tried and failed to hold the foal back. The guards moved to intercept the foal too, but Ayana raised a hoof.\n\nShe stopped not far from the throne with desperation in her eyes. "Please, Miss Queen, please give me my daddy back!" The foal's voice broke as tears streamed down her face. "His name is Manoka, please bring him back! Mommy said he would come back after the mean mare was gone, but he's not home yet! Please, please!"\n\nAyana fought to maintain her composure, but she could hold it no longer. The weight of it all was simply too much. "Guards, look for any records of Manoka!" she commanded, her own voice breaking. "Spread the word; this stallion must be freed posthaste!" She looked at the weeping foal, a fire igniting in her eyes. She couldn't undo all the suffering Nzuzi had caused. But that did not mean she would be idle in the face of her wrongdoings."
 zongo_council_epilogue.5.a:0 "One cannot move on if they don't confront the past head-on."
 zongo_council_epilogue.6.t:0 "The Future Of The Faith" #Snow
 zongo_council_epilogue.6.desc:0 "Everything had been meticulously prepared for the passing of the torch. The venue was full, her speech would be heard by the entire nation, and the Nganga had approved her actions. The only thing missing was her successor.\n\n"Miezi! Where are you?" Ayana had been running around for the last few minutes trying to find her successor. The Nganga were in a frenzy searching for the mare, but so far, they had had no luck. As she hurried past a stack of crates, a flicker of movement caught her eye – a nearly perfectly hidden figure, betrayed only by a tail poking upwards. "Miezi?"\n\nThe figure jumped up as if she were a foal caught misbehaving, her face tearful. "H-Head Priestess Ayana... I can't do it, I'm sorry!" She trembled, her voice shaking. "I wanted to make you proud, I really did. But I simply can't do it!" She hid her face in shame. "How could I follow up after all you have done?"\n\nAyana simply smiled. "Oh, Miezi, you could have told me this before." She sat beside the trembling mare. "I was just as scared when I took the mantle... well, perhaps a little less. The point is, I didn't wish to take Nala's place. She was..." Ayana looked toward the ceiling, a fond smile on her face. "To me, she was perfect. It was really hard to take her place as arch-priestess... but she wasn't perfect; no one is. So I don't need you to be perfect." She took Miezi's hooves in her own. "I just need you to be you. And remember, you can always ask for help. The weight of leadership is not meant to be carried alone... trust me, I know." A certain sorrow touched her smile.\n\nMiezi looked down, a mix of shame and embarrassment colouring her features. "Well, I'll do my best for you then, Head-Priest—" She stopped herself, a new resolve in her eyes. "Queen-Regent Ayana." The two smiled as Ayana helped her up, and together, they went to prepare the nation for a new tomorrow."
 zongo_council_epilogue.6.a:0 "Separate yet united, the relations of crown and faith reaffirmed."
 zongo_council_epilogue.7.t:0 "Awakening From A Nightmare" #Snow
 zongo_council_epilogue.7.desc:0 " "It was so dark. For what felt like weeks Akida had wandered through an endless, lightless expanse. Sometimes, a pinprick of light would glimmer in the distance. He would shout until his voice was raw, run until his legs burned, but it always remained agonisingly out of reach. In the silence, his regrets tormented him: his last, vitriolic words to his mother; the gratitude left unspoken to his professor; the dream of a reformed Zongo, forever unfulfilled. But most of all, he wished for...\n\nSuddenly, a light erupted, brighter than any before. Akida ran and ran as fast as he could, hoping he would finally be able to see it. As he approached, he found Ayana alone, standing tall untouched by the darkness. "Ayana, it's me! It's your Akida!" He rushed to embrace her, yet his hooves passed through her form as if she were a mirage.\n\nYet, her figure remained, quietly whispering into the dark. "Please... please awake, my love. I cannot deal with this anymore, I never wished to deal with this... not alone..." His own tears fell silently, his words trapped and unheard. "Zongo needs you... no, I need you! You promised me we'd both reach our dreams together! What is the point of it all if I'm forced to walk that road alone!" As her tears fell, they disappeared into the darkness, but somewhere else Akida felt a warmth on his body.\n\nLike a shattered spell, the darkness collapsed. His eyes fluttered open to the dim light of a bedchamber. His hoof was resting upon Ayana's, her tears falling onto him. She gasped as his arms wrapped around her, pulling her into a tight embrace. His body screamed in protest, but the pain was nothing. The room filled with her sobs of relief and his own breathless laughter, their manes damp with shared tears. In that moment, nothing else in the world mattered. They had found each other again."
 zongo_council_epilogue.7.a:0 "The King has awoken! Akida has awoken!"
 zongo_council_epilogue.8.t:0 "A New Future For Zongo" #Snow
 zongo_council_epilogue.8.desc:0 "With the king's awakening, every council meeting had become a waiting game. The unspoken anxiety that he could appear any day to retake the throne filled the chamber before each session. Today, that expectation was realised, though not as expected. The doors opened for the king, followed by the Queen-Regent, but his figure was barely recognisable. Yet, the entire room watched as he entered.\n\nHe did not walk so much as will his body forward. Each step was a deliberate, shaky effort, his hooves dragging across the polished floor. His frame, once commanding, was now gaunt and brittle beneath ceremonial robes. The silence in the chamber was absolute, broken only by the soft, labored sound of his breathing and the scrape of his movement. As he slowly, painstakingly found himself at the head of the table, the entire council bowed. With a cough, he began to speak.\n\n"I'm... resigning... Ayana... my wife... will be... Queen... goodbye..." With those words, he began to exit the room as the council stood in awe.\n\nAkida had announced monumental changes in short succession. Yet, no one attacked his proposals. Instead, applause began with Anarbek and grew into a true ovation for the king. For while some may have disagreed, none could ignore the strength the king had shown them simply by standing there."
 zongo_council_epilogue.8.a:0 "One of the greatest acts a creature can do is letting go"
 zongo_council_epilogue.9.t:0 "Constitutional Woes" #Snow
 zongo_council_epilogue.9.desc:0 "The meeting with Akida had gone well; he had promptly accepted what Ayana had asked of him and had returned to his rest. While the changes had not yet been publicly announced, it fell to Anarbek and Ayana to ensure the new constitution was as perfect as possible – free from the loopholes that had plagued the old one and robust enough to not require major revisions for many years to come. Anarbek was quietly writing and revising papers as he sipped his tea, until he heard Ayana's voice.\n\n"I think I want to resign."\n\nAnarbek almost spat his drink out. Ayana realised she had spoken the thought out loud. "W-Wait, I don't mean it like that!" she clarified quickly. "It's just... Akida is finally back, and he's so fragile. His mother is still unresponsive, the doctors say he'll probably never regain full movement of his hind legs, and he's returned to a Zongo he barely recognizes after such a short time. I just... want to be there for him." She sighed, looking at the ceiling. "Sorry for spouting such nonsense and breaking your concentration. We should probably get back to work."\n\nAnarbek finally composed himself and looked at her with a serious expression. "You know... you don't have to use the full extent of your royal authority. You could, if you wanted, choose to exercise your powers only when you deem it necessary and let the council handle most affairs themselves. As the first monarch under the new constitution, you could set the precedent for how much a monarch is expected to intervene."\n\nAyana pondered the question. It seemed like a decision that should not be made on the spur of the moment... yet, the answer had been inside her for a long time. "Actually, there's no need to avoid it. I can give you my answer right now.""
 zongo_council_epilogue.9.a:0 "It was simply my tiredness speaking, I intend to fully do my duties." #Ayana keeps being active
 zongo_council_epilogue.9.b:0 "It would be better if the council handles most things, if needed you can always call upon me." #Anarbek will become country leader
 zongo_council_epilogue.10.t:0 "Epilogue Part 1 - Ayana" #Snow
 zongo_council_epilogue.10.desc:0 "From a grand balcony, Ayana looked over a sea of her subjects. The Zongolese capital, once a place of rigid tradition, now hummed with a modern energy. At her side stood Anarbek, and behind them sat Akida. As the crowd's murmur settled, she began to speak.\n\n"To all Zongolese! We have been tested by war, scarred by betrayal, and tempered by loss. But from that fire, a stronger Zongo has emerged! Today, we consecrate that strength not in one zebra, but in its subjects. The position of Royal Advisor shall be elevated to Prime Minister, and current Royal Advisor Anarbek shall fulfil that role!"\n\nA thunderous cheer erupted, but Ayana pressed on. "Akida dreamed of seeing his home grow to the same heights as the rest of the world. He envisioned a Zongo of true progress, where tables would have full plates, and all could travel as they wish, unburdened by distance! A Zongo where all could simply be... happy, where foals could be foals."\n\nShe paused, her voice softening yet losing none of its power. "The old Zongo, where families feared if they could feed their foals, is passing into history. So as Mwenezongo, I vow this: we will build a Zongo where no one suffers at the hooves of unaccountable power ever again! A Zongo that is fair, that is just, and that honours its past by building a better future for all its subjects!"\n\nAs she waved to her cheering people, she couldn't help but wonder. Akida had dreamed of a new Zongo, but could he ever have imagined it to be like this? She sneaked a gaze at him, and his smiling face as he clapped washed away any doubts.\nIt had all been so messy to get to this point... but they had done it."
 zongo_council_epilogue.10.a:0 "Long live Zongo! Long live the Queen!"
 zongo_council_epilogue.11.t:0 "Epilogue Part 2 - Ayana" #Snow
 zongo_council_epilogue.11.desc:0 "Weak sunlight beamed into the room through the curtains. While Akida still slept, Ayana was already working—not with the usual bustle of council or temple life, but simply preparing a meal for the two of them. She re-entered the room to find him sleeping peacefully. Ayana smiled and laid the tray down on the bedside table, the aroma slowly coaxing the stallion awake.\n\n"Good morning, sleepyhead," Ayana said, already flipping through some papers. "I hope you slept well; breakfast is right beside you. Don't mind me, I'm just reviewing some things for tomorrow's council meeting. I still need to revise them with Anarbek later, though your opinion would also be appreciated." She felt a nudge on her gown and looked to see what it was. "W-wait, you shouldn't be up!" Akida had gotten beside her without her noticing. Though it was a short distance to the table, she hadn't heard the tell-tale sound of his wheelchair cart.\n\n"...ed." It was barely a mumble. Ayana tried to understand him but struggled. Akida looked embarrassed to repeat himself. "You should... lay down in bed a bit more. I want to... cuddle..." Ayana blushed at his words, though certainly not as much as Akida was. She knew he could be meek about such things, but she hadn't expected him to ask so directly, nor to be so flustered by asking his own wife. Smiling, she laid the papers aside, took his hoof, and led him back to bed.\n\nAs the two settled in, Akida quickly got comfortable, and Ayana laid down beside him. They cuddled as she spoke of simple, day-to-day matters, to which Akida mostly murmured in response, sometimes laughing or speaking a few words. They talked until the weak sunlight grew stronger, Ayana turned to her husband to nudge him so she could go back to work, but was disarmed by his peaceful expression as he slept. She sighed as she gently stroked his face, soon nestling in once more."
 zongo_council_epilogue.11.a:0 "Tomorrow she'd work as Queen, but today she was satisfied to simply be Ayana."
 zongo_council_epilogue.12.t:0 "Epilogue Part 1 - Anarbek" #Snow
 zongo_council_epilogue.12.desc:0 "From the grand balcony, Anarbek looked out over the nation. The Zongolese capital, once a place of rigid tradition, now hummed with a modern energy. Behind him sat Ayana and Akida, presiding over what felt like a rite of passage for the centaur. As the crowd's murmur settled, he began to speak.\n\n"Creatures of Zongo. The period of regency has officially passed. Yet, as you may have heard, our King has no intention of retaking the reins. In his place, Queen Ayana shall reign as our leading monarch." He took a breath, feeling the weight of the crowd's gaze. "For those who do not know me, I am the Royal Advisor, Anarbek. It is with the full confidence of the Crown and the Council that I now assume the office of Prime Minister to oversee Zongo as it continues its march forward."\n\nThe crowd, a sea of distant dots, seemed confused. Anarbek's glasses had slipped slightly from a nervous tremor he hadn't noticed. He pushed them back up, and in that simple act, he remembered Akida's advice: 'Treat this like a class.' He took a deep breath and began to speak once more. "The primary achievement of these last few years hasn't been just rails or factories; it is so much more. Look around you: Zongo stands as a beacon! And my duty? It remains what it was the day I was first called to this nation: to ensure that Zongo moves forward with as few setbacks as possible." He turned and gestured passionately toward the monarchs behind him. "I, Anarbek, do this for the honour of our King, our Queen, and for every single one of you! Long live Zongo!"\n\nAs he finished, his chest heaving and his glasses once again askew from his fervour, the sound of clapping hooves began behind him. As he turned to face it, the applause quickly swelled into a roaring ovation as the entire sea of creatures erupted in cheers. He quickly righted his glasses, and a small smile crept up as he gazed at the living, breathing nation he now served.\n'So be it,' he thought. 'What's a class of a few million?'"
 zongo_council_epilogue.12.a:0 "Long live Zongo!"
 zongo_council_epilogue.13.t:0 "Epilogue Part 2 - Anarbek" #Snow
 zongo_council_epilogue.13.desc:0 "The speech had gone well, Anarbek thought. While it was strange to be at the forefront of the nation after years as an advisor, it felt like teaching a class once more. Today, he had one final thesis to review. He overlooked his papers as Akida sat anxiously nearby.\n\n"As your tutor, I assisted your thesis defence... now, I have seen it in action." He set the papers down with a sigh. "The numbers are solid, as they were in your first draft. But the cost in lives and the number of creatures displaced... it is frightening." Akida's heart felt ready to burst. Even now, he regarded the centaur with profound respect.\n\n"However, as your advisor, I share responsibility for that, and must account for it. There were other situations that also influenced it; the things your mother did were unavoidable, so I did not weigh it against you. Ayana and the faith worked tirelessly to keep people from poverty, and you also deserve praise for heeding her counsel." Anarbek coughed. "All things considered, while it could have gone better, the speed and extent of Zongo's modernisation will serve as an example for future study. I am already drafting a paper on it, though new responsibilities delay its completion. Overall, my final assessment is positive," the centaur offered a soft smile. "Though I admit, there may be some bias."\n\nAkida finally exhaled. He felt like he could barely breathe ever since the centaur had started speaking. "Hah... it felt like I was back at Senturya as a graduate..." he murmured, gazing towards the sky. "I wonder where Zyles is... between the stresses of ruling and now... recovery... I fear I have failed my friends."\n\n"Time is a rare resource for us all, but I am sure he would answer your call," Anarbek said, rising. "In fact, I shall prepare a letter post-haste! He can hardly refuse an official invitation to be a guest of honour!" As Akida raised a hoof in protest, he smiled. The centaur had certainly opened up much more since his teaching days."
 zongo_council_epilogue.13.a:0 "Akida looked at his role model in wonder, questioning if there was anything the centaur could not do."

