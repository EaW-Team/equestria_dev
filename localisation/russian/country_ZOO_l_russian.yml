 ### CHARACTERS ###
 ZOO_akida_bomboko:0 "Акида Бомбоко" #Snow
 ZOO_akida_bomboko_desc:0 "§YДата рождения§!: 5 ноября 985 года в Зонго\n\n§YБиография§!: Будучи единственным сыном и наследником покойного короля, Акида с самого рождения воспитывался как будущий мвенезонго. Он получал всё, что хотел, а это также подразумевало и доступ ко всей возможной информации в королевской библиотеке. Различные науки, история, арифметика – его интересовало всё, и это было отнюдь не праздное любопытство. Вскоре все начали осознавать, что перед ними настоящий маленький гений. Именно в этот ранний период Акида приобрёл главное увлечение всей жизни – поезда. Эффективные, мощные и просто невероятно крутые, эти чудеса инженерии вдохновили его на мысль, что королевство, которым ему суждено править, может стать ещё более эффективным, чем когда-либо прежде.\n\nВпрочем, дальнейшую судьбу Бомбоко омрачило несчастье – его отец погиб во время войны между Зонго и Зеблу. Опасаясь за жизнь сына и желая, чтобы он получил куда более качественное образование за пределами родины, мать отправила его учиться в политехнический институт Илкшехира на факультет экономики. Уже там Акида обучился огромному количеству вещей, которые наверняка помогут ему выстроить для Зонго светлое будущее.\n\nАкида – гений, в чём он сам полностью уверен. И несмотря на то, что эта уверенность отнюдь не беспочвенна, он всё же сохраняет скромность в отношении своих академических достижений, пусть изредка и позволяя себе лёгкое самодовольство. Также отличительной особенностью наследника престола является неиссякаемый энтузиазм и оптимизм в отношении дел, за которые он берётся. Особенно это касается его стремления доказать, что академическая теория применима на практике, в чём все смогут убедиться на примере Зонго, когда даже такая "отсталая" страна будет способна достичь современности, если будет следовать его расчётам.\n\nИ всё же, несмотря на свою гениальность и острый ум, Акида остаётся прискорбно наивным относительно всего, что касается политики. Зебра безгранично доверяет семье и друзьям во всём, что он считает "неважным", и это привело многих к мысли, что он – мягкотелый утопист. Со временем Бомбоко поймёт, что управлять страной куда сложнее, чем просто быть умным... по крайней мере, на это надеются.\n\n§YПортрет нарисован§!: Egil"
 ZOO_akida_bomboko_epilogue_desc:0 "§YBorn§!: 5th of November, 985 in Zongo\n\n§YBiography§!: \n\n§YPortrait By§!: Egil." #TODO
 ZOO_queen_mother:0 "Нзузи Бомбоко" #Snow
 ZOO_queen_mother_desc:0 "§YДата рождения§!: 17 марта 965 года в Итебре\n\n§YБиография§!: Будучи младшей дочерью мани Итебры, Нзузи с самого детства привыкла бороться за своё место под солнцем. Любовь родителей всегда оставалась для неё на расстоянии вытянутого копыта, но это отнюдь не значило, что она не могла найти её в другом месте. Вскоре после достижения брачного возраста судьба свела её с Нкоси Бомбоко на одном из приёмов. То, что начиналось как брак по расчёту, быстро превратилось в нечто большее. Нкоси пленила волевая натура и стремление к самостоятельности, а Нзузи же влюбилась в мягкий и заботливый характер, сочетавшийся с манерами и поведением истинного короля. Их отношения развивались бурно и пылко, и уже к концу того же года они правили вместе как муж и жена.\n\nВсего год спустя, в 985 году, Нзузи забеременела и назвала своего первенца Акидой, надеясь, что он станет первым из многих. Однако тяготы беременности оказались для кобылы слишком велики – тяжёлые осложнения сделали её бесплодной, так что Акида так и остался её единственным жеребёнком. Но Нзузи не сетовала на тягости судьбы, ведь у неё был любящий муж, обожаемый сын и уважение других зебр, которого она так никогда и не добилась от родителей. Можно сказать, все её мечты юности наконец сбылись.\n\nУвы, судьба не позволила ей долго наслаждаться этим счастьем. В своём стремлении реформировать Зонго и вернуть провинцию Итебра у Зеблу её муж пал в бою. Пока сын не достиг совершеннолетия, Нзузи провозгласила себя регентшей и отправила Акиду за границу ради его безопасности. Пока он учился, она посвятила себя завершению дела своего мужа – укреплению королевской власти и подготовке страны к общественным реформам, которые однажды возглавит её сын. И хотя покойный король пользовался большей любовью народа, чем она, Нзузи это устраивает.\n\nЕё единственные цели – увидеть улыбку сына и процветание родины, и она не остановится ни перед чем, чтобы этого добиться.\n\n§YПортрет нарисован§!: kelKessel"
 ZOO_queen_mother_leader_desc:0 "§YДата рождения§!: 17 марта 965 года в Итебре\n\n§YБиография§!: Как младшая дочь мани Итебры, Нзузи усвоила одну простую основополагающую истину: мир ничего не даёт сам. Привязанность, безопасность, уважение – всё нужно выгрызать самому. Безразличие родителей стало первым настоящим уроком, однако встреча с Нкоси Бомбоко – величайшим ограничением и заблуждением. Его мягкий характер обезоружил даже её, и со временем она почувствовала нечто похожее на любовь. Вскоре они поженились.\n\nРождение единственного жеребёнка стало живым воплощением наследия Бомбоко, но осложнения после родов сделали невозможным появление его братьев и сестёр. Несколько лет семья жила счастливо. Муж, сын и заслуженное влияние – она обрела всё, о чём мечтала в детстве... или так ей казалось.\n\nСо временем муж стал слишком мягким. Он лишился решительности, на которую она рассчитывала, и даже когда Нзузи убедила его вернуть родную провинцию жены, он действовал с сомнением. Перед выбором между личным счастьем и будущим Зонго путь был очевиден. Когда Нкоси не стало, она отправила Акиду за границу учиться, оберегая его от той жестокости, которая сопровождала её регентство. Нзузи посвятила себя подавлению инакомыслия, устранению соперников и созданию паутины власти такой силы, что королевство вздохнуть не смело без её ведома. Её реформы сосредоточили всю светскую и духовную власть в одних копытах, чтобы Акида однажды мог править без помех.\n\nТеперь воля сына дрогнула так же, как некогда у Нкоси, вновь вынуждая её взять власть. Но даже если его наивность ведёт её планы под откос, оба желания Нзузи остаются неизменны: видеть улыбку сына и процветание родины. И она остановится лишь тогда, когда эти цели будут исполнены.\n\n§YПортрет нарисован§!: kelKessel"
 ZOO_anarbek:0 "Анарбек" #Snow
 ZOO_anarbek_desc:0 "§YДата рождения§!: 19 декабря 949 года в Илкшехире\n\n§YБиография§!: Анарбек – кентавр, в котором преобладают тихий ум и взвешенный характер. С юности он предпочитает меньше говорить и больше слушать, поэтому во время карьерного роста от молодого исследователя до уважаемого профессора экономики Политехнического института Илкшехира кентавр жил спокойной жизнью. Он написал несколько примечательных трудов по экономике, которые принесли ему некоторую известность в академических кругах. Впрочем, этого было мало, чтобы его имя стало на слуху, подобно другим учёным.\n\nЭту размеренность разрушил недолгий, но жестокий поход Короля Шторма. Хотя Сентурия пострадала меньше, чем северные земли, последствия оказались беспрецедентными. Изолированность Илкшехира казалась надёжной защитой, но, учитывая стратегию Короля Шторма, город всё же был втянут в войну. Пережитое вызвало у кентавра тяжёлую скрытую меланхолию, сопровождавшую его многие последующие годы, пока он наблюдал за восстановлением родного города.\n\nИменно в послевоенные годы он встретил принца Акиду Бомбоко. Молодой зебра выделялся не только титулом, но и пылкой убеждённостью. Анарбек заинтересовался его дерзкой докторской работой о стремительной модернизации. Он видел в ней одновременно захватывающую идею и тревожную утопию, но не мог отрицать глубину анализа. Они быстро нашли общий язык, обсуждая и полируя работу до достойного защиты уровня.\n\nКогда из Зонго пришло предложение о работе, Анарбек не колебался. Он собрал вещи, оформил бумаги и получил почётный отпуск. Ведь это был шанс увидеть попытку воплотить утопию в реальность.\n\n§YПортрет нарисован:§! darkskroll"
 ZOO_anarbek_leader_desc:0 "§YДата рождения§!: 19 декабря 949 года в Илкшехире\n\n§YБиография§!: Кентавр из Сентурии сегодня занимает кресло главы гордого королевства зебр. По любым традиционным меркам это звучит абсурдно, и это лучше всего понимает сам Анарбек, ведь изначально он был простым советником. Премьер-министром, лицом нации и архитектором её будущего он становиться точно не планировал.\n\nНо в тяжёлые времена именно качества чужака стали достоинством. В стране, страдающей от тяжёлого кровавого наследия, он символизирует нечто новое: он не Бомбоко, не прославленный деятель и не особенно харизматичен. Но его компетентность, а также доверие со стороны короля и королевы, утвердили кентавра как первого премьер-министра Зонго, определив новую систему отношений между короной и кабинетом.\n\nИ пусть он кажется самым странным существом на посту лидера, Анарбек намерен сделать всё, чтобы пережитые страдания не оказались напрасными.\n\n§YПортрет нарисован:§! darkskroll"
 ZOO_ayana:0 "Аяна" #Snow
 ZOO_ayana_desc:0 "§YДата рождения§!: неизвестно, около 985 года, в деревне у Мейрконга.\n\n§YБиография§!: Происхождение Аяны окутано тайной. Известно лишь, что родилась она в деревне рядом с рекой Мейрконг. Сирота, жившая на подаяния – почти все считали, что у кобылки нет будущего. Но судьба сделала крутой поворот, когда юная зебра совершила чудо. Аяна предсказала, что река выйдет из берегов и затопит деревню. Большинство отнеслось к её словам как к бреду маленького жеребёнка, ведь до сезона наводнений было ещё далеко. Однако нганга, прислушавшись к предупреждению, действительно увидела признаки. Благодаря этому деревня была эвакуирована задолго до того, как вода поднялась.\n\nТак Аяна получила прозвище "Нищая пророчица" и была взята под опеку служителями веры. Под наставничеством верховной жрицы Зонго Налы она проявила себя преданной и сострадательной ученицей. Более десяти лет Аяна провела рядом с ней, наконец обретя в духовности и вере ту семью, которой у неё никогда не было.\n\nЕё взлёт к вершине иерархии был столь же стремительным, сколь и трагичным. Вскоре после смерти старого короля внезапно скончалась и Нала. Как ближайшая помощница и любимица народа, Аяна была избрана преемницей. Но срок её служения в качестве верховной жрицы оказался недолгим. Во время реформ королевы-матери Нзузи вера была централизована, а над всеми нганга создан новый пост – Главная жрица. Аяна стала первой в этой должности и оказалась в центре внимания.\n\nТеперь, став обладательницей нового титула, Аяна неустанно трудится, чтобы использовать новую власть во благо. Знавшая голод и нужду с детства, она хорошо понимает беды самых уязвимых жителей Зонго. Зебра может стать верной союзницей короля, если он будет помнить, что королевство держится не только на армии и заводах.\nОно стоит на своих подданных.\n\n§YПортрет нарисован:§! wldhow"
 ZOO_ayana_leader_desc:0 "§YДата рождения§!: неизвестно, около 985 года, в деревне у Мейрконга.\n\n§YБиография§!: Жизнь Аяны – олицетворение смиренной веры и служения. От пророческих слов до сострадательной Главной жрицы её путь всегда определяли милосердие и самопожертвование. Она обрела предназначение в храме, семью среди верующих, а счастье – в своих личных обетах жеребцу, которого любила. Корону она уважала издали – поддерживала всем сердцем, но никогда не желала носить.\n\nНо судьба, в своей жестокой иронии, возложила корону на её голову. Возведённая на трон монарха трагедией и предательством, она правит королевством, израненным войной и отравленным заговором. Бремя огромно – скорбь и ответственность, которых она никогда не искала. Но внутри Аяны пылает огонь решимости.\n\nПовинуясь этой стойкости и опираясь на верных союзников, она носит корону, чтобы мечта Акиды не умерла – хотя воплотится иначе, чем он задумал. Аяна может быть невольной правительницей, но не позволит считать себя пассивной, и всякому, кто мнит себя выше закона, это будет показано.\n\n§YПортрет нарисован:§! wldhow"
 ZOO_mani_zuba:0 "Мани Зуба" #Snow
 ZOO_mani_zuba_desc:0 "§YДата рождения§!: 12 июня 961 года в Зубе.\n\n§YБиография§!: Рождённый с именем, которое больше не носит, Зуба – военный до мозга костей, чья жизнь посвящена служению короне Зонго. Репутацию он заслужил не парадами и тщеславными церемониями, как многие его современники, а в грязи и крови приграничных стычек с воинами Зеблу и нириками. Именно эта репутация привлекла внимание покойного короля Нкоси, увидевшего в Зубе командира, целиком преданного делу и обладающего нужными умениями. Их отношения были союзом взаимного уважения между монархом и его надёжнейшим оружием. Во время их сотрудничества Зуба поднялся от наследника мани до владетеля своего дома после смерти отца.\n\nЗолотое время закончилось слишком быстро: Нкоси погиб во время войны с Зеблу. Роль Зубы расширилась – теперь он стал фельдмаршалом, получив от королевы-регента поручение обеспечить безопасность границ после поражения при Итебре. Хотя он испытывает мало любви к политике, его присутствие в совете гарантирует, что о Королевской страже не забудут.\n\nПреданность Зубы принадлежит самому Зонго – не идее, а силе, стабильности и уважению. Он служит трону с дисциплиной солдата, но в первую очередь непоколебимо верен самому королевству, которое он защищает всю свою жизнь.\n\n§YПортрет нарисован:§! Scroup"
