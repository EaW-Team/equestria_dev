 ### Events ###
 zongo.1.t:0 "Подтверждение" #SIREN
 zongo.1.desc:0 "Зал церемоний в институте Илкшехиры был переполнен. В нём собрались кентавры, зебры и множество других существ. Для него всё это выглядело почти как генеральная репетиция коронации. Он улыбнулся этой мысли. Долгие годы учёбы и упорного труда вели его к этому моменту. Совсем скоро он сможет применить все свои знания на практике во благо своей страны.\n\n— А теперь я с гордостью представляю, — уши зебры дёрнулись, когда ректор начал говорить со сцены долгожданные слова, — одного из наших лучших студентов. Того, кто неустанно трудился, чтобы удовлетворить свою тягу к знаниям, и многократно повысил престиж института. Поприветствуйте наследного принца Акиду Бомбоко! — по сигналу Акида под бурные аплодисменты вышел на сцену с высоко поднятой головой. Он остановился перед ректором, старым кентавром, который смотрел на него с гордостью.\n\n— Принц Бомбоко. Ваш труд о применении железных дорог для ускоренной модернизации не остался незамеченным. Вы обогатили не только наш институт, но и всю сферу экономической теории. И потому... — кентавр протянул руку к кафедре, где лежала маленькая круглая брошь с рогатым символом института, — для меня большая честь даровать вам титул доктора. — Он наклонился и прикрепил брошь к лацкану костюма Акиды. — А теперь, если хотите, скажите несколько слов.\n\nАкида не мог сдержать улыбку. — Конечно, хочу! — сказал он с лёгким смешком, поднимаясь на несколько ступеней к кафедре. Перед ним раскинулось море лиц. — Сказать, что я глубоко тронут этой честью – значит сильно приуменьшить мои чувства. За время моего пребывания в Сентурии я сталкивался лишь с добротой. Во время нападения короля Шторма мне была дарована привилегия оказаться в безопасности при дворе королевы, чего многие были лишены, — он сделал паузу, позволяя тяжести воспоминания опуститься на зал. Затем зебра вновь посмотрел на толпу, и его страсть вспыхнула с новой силой. — Но позвольте мне выразиться ясно: даже в той безопасности я никогда не забывал город, ставший моим вторым домом – Илкшехир! Ни я, ни Зонго не забудем вашей помощи и желания поделиться знаниями! Я благодарю всех, кто помог мне на этом пути. Благодаря вам..."
 zongo.1.a:0 "..."Зонго" вскоре станет синонимом "индустриальной державы"!"
 zongo.1.b:0 "...Зонго будет вознесён до ваших высот современности!"
 
 zongo.2.t:0 "Прощание" #SIREN
 zongo.2.desc:0 "В окна кафе светило закатное солнце. Акида смотрел, как небо окрашивается в багряный цвет, и постепенно осознавал неизбежность возвращения домой. Домой – туда, где он не был со дня смерти отца. Туда, где мать правила вместо него. Тогда юный Акида едва справился с горем, когда его отправили прочь. Теперь же он возвращается домой зрелым жеребцом. Впервые он почувствовал тревожное предвкушение: как его встретят после столь долгого отсутствия?\n\n— Подобная хмурость тебе совсем не идёт, — Акида отвёл взгляд от неба и посмотрел на зебру напротив, который усмехнулся в ответ. Зайлс был блестящим жеребцом, прибывшим с другого конца континента. Они были верными друзьями много лет. Сердце Акиды болезненно сжалось, но принц всё же улыбнулся. — Я всего лишь практикую подходящее королю выражение.\n\n— Ну да, если король, судя по его кислому лицу, съел целый лимон, — Зайлс отодвинул тарелку с недоеденным блюдом, — но мне кажется, что Его Высочество не говорит всей правды.\n\nАкида вздохнул. — Думаю, я только сейчас начинаю осознавать, сколько же лет своей жизни провёл здесь. Я так долго ходил по этим улицам, создал столько воспоминаний, что уход отсюда ощущается как потеря дома во второй раз, — он смущённо улыбнулся. — Звучит по-детски, когда произносишь вслух, да?\n\n— Вовсе нет, друг. Я буду скучать по тебе. — Зайлс задумался, затем постучал копытом по столу. Потом он пошарил в сумке и достал небольшую книгу. — Моя последняя работа только что вышла, так что этот том прямиком из типографии. Прими его как подарок на прощание. Чтобы не забыть меня, — он подмигнул. — И я не буду против, если ты упомянешь моё имя, когда займёшь трон.\n\nЛицо Акиды озарилось радостью, затем смягчилось нежной улыбкой. — Я... даже не знаю, что сказать... Я тронут, — затем он посмотрел на книгу и наконец-то прочёл название, отпечатанное на обложке крупными блестящими буквами:"
 zongo.2.a:0 "Искусство большого бабаха"
 zongo.2.b:0 "Гонка к величию"
 zongo.2.c:0 "Применение укреплённого бетона"
 
 zongo.3.t:0 "Сборы домой" #SIREN
 zongo.3.desc:0 "Выделенная Акиде половина комнаты была пуста. Исчезли газетные вырезки и зарисовки чертежей. Не осталось следа от книг, сложенных в башни. Стены, некогда украшенные личными памятными вещами и многочисленными подарками из дома, тоже опустели. Теперь лишь один дорожный сундук, лежащий на полу, напоминал о том, что Акида когда-то здесь жил. Все годы его жизни в институте уместились в не слишком весомую дорожную поклажу. Зебра намеревался налегке отправиться в светлое будущее. Акида подхватил сундук, закинул его за спину и направился к двери. Но остановился, бросив последний взгляд на комнату. Он взглянул уже на другую сторону комнаты, принадлежащую его соседу по общежитию. Там было полно вещей, но внимание зебры привлёк один чертёж.\n\nЭто было подробное изучение уже существующего образца огнестрельного оружия, некогда очень популярного в регионе. Акида вспомнил, как молодой кентавр месяцами не умолкал о своём проекте, объясняя, что он, как конструктор, должен попрактиковаться на уже известных образцах, прежде чем приниматься за что-то новое. Зебра изучил точные линии и ясные подписи. В его собственном королевстве пока почти не было производственной базы для подобных вещей. Если хоть сколько-то современное оружие и появлялось в его пределах, то уж точно оно было произведено не в Зонго. И тогда в голове зебры начала зарождаться мысль. Да, ему придётся без промедления приглашать специалистов в королевство. Но с этими чертежами он сможет заложить основу производства сразу же по возвращении!\n\nВскоре на столе появилась записка, прижатая тяжёлым мешочком с монетами. Акида снова отправился в путь, спрятав сложенные чертежи в свой плащ, пока его мысли мчались вперёд, к волнительному грядущему."
 zongo.3.a:0 "В записке было написано: "Одолжил парочку чертежей. Надеюсь, ты не против?""
 
 zongo.4.t:0 "Прибытие" #SIREN
 zongo.4.desc:0 "Акида почувствовал, как его дыхание перехватило, когда корабль пришвартовался к порту Заму. Вереницы низких домиков тянулись вдаль, окрашивая горизонт белым, серым и коричневым. И куда бы он ни взглянул – каждый уголок города кипел жизнью, яркой и шумной. Корабль наконец-то пришвартовался у причала, на котором его ждало множество зебр. Принц наконец прибыл домой.\n\nОн поспешил к трапу, махая копытом собравшейся толпе. Там, у причала, стояла процессия солдат. И среди них он наконец увидел её – элегантно одетую зебру средних лет. Она, казалось, не замечала Акиду, отдавая распоряжения командиру. Зебра улыбнулся и почти вприпрыжку направился вниз. — Мама! — позвал он. — Неужто для достойного приветствия нужно загонять этого беднягу до полусмерти?\n\nВластный голос зебры внезапно оборвался, и она с пустым выражением повернулась к нему. — Акида? — неверяще спросила она. Не успел он ответить, как она бросилась вперёд и заключила его в крепкие объятия. — Ты наконец-то здесь, мой жеребёнок! — когда зебра отстранилась, в её взгляде сияла лишь чистая нежность. — Не обращай внимания на это. Как прошла дорога? Ты не заболел? — заботливо спросила мать, но сын перебил её.\n\n— Уверяю, со мной всё в порядке. Я уж точно в силах добраться до дворца.\n\nМать кивнула. — Конечно, конечно. Нам лучше поспешить, — она бросила короткий, властный взгляд на командира. — Проследи, чтобы вещи принца доставили во дворец, — жеребец низко поклонился и тут же начал отдавать команды подчинённым. А затем, столь же быстро, как отдала приказ, зебра снова обратила всё внимание на Акиду. Её улыбка вернулась, и она мягко подтолкнула его. — Пойдём, дорогой. Тебе предстоит многое наверстать."
 zongo.4.a:0 "Леса Зонго мягко шелестели, пока они ехали к столице."
 
 zongo.5.t:0 "Созыв совета" #SIREN
 zongo.5.desc:0 "Принц Акида стоял перед огромной дверью, не обращая внимания на недоумённые взгляды королевской стражи. Ему нужно было лишь мгновение, чтобы собраться с мыслями, прежде чем переступить через последний порог.\n\nОдно дело – мечтать о власти своего отца. Но совсем другое – погрузиться в самую суть управления державой. За дверью его уже ждал совет, у каждого члена которого были свои планы, убеждения, да и верны они были далеко не только трону. Мечты Акиды о современном Зонго должны были выдержать испытание этим собранием. Принц нервно облизнул пересохшие губы. Изнутри доносились голоса – собравшиеся уже спорили. Это было похоже на первый удар грома от надвигающейся грозы.\n\nНо, как и всякая буря, спор стих. Когда Акида вошёл в зал, он внимательно взглянул на каждого присутствующего, и их пререкания мигом оборвались – зебры без промедления склонились перед ним в знак почтения. Именно с ними – советниками из разных слоёв общества – будущему королю предстояло иметь дело весь срок, что был отмерен ему на троне. Мать Акиды со своей неизменной улыбкой заняла место рядом с троном монарха.\n\nСделав последний глубокий вдох, Акида обратился к собравшимся."
 zongo.5.a:0 "— Я рад видеть вас всех здесь. Давайте приступим к делу."
 
 zongo.6.t:0 "Празднование возвращения домой" #Snow
 zongo.6.desc:0 "Пока зебры танцевали и пели, верхушка зонголезского общества собралась, чтобы приветствовать будущего короля, наконец готового вновь вести их вперёд. Среди весёлого торжества лишь одна фигура сидела в одиночестве с кружкой сидра, пока остальные танцевали и общались на площади. Не то чтобы его избегали – скорее наоборот. Акида переходил от одной группы к другой, обмениваясь короткими приветствиями и тут же с извинениями двигаясь дальше, как только подобное позволял придворный этикет. Вскоре большинство гостей поняли намёк и перестали докучать юному принцу.\n\nТеперь же, сидя в углу и размышляя о том, сколько ещё придётся ждать, пока всё это закончится, он заметил приближающегося пожилого зебру – одного из мани времён правления его отца. Акида приготовился к новому обмену любезностями и изобразил привычную улыбку. Но прежде чем он успел встать, старик заговорил.\n\n— Вы всегда были смышлёным, юный Акида. Уверен, у вас, как мвенезонго, уже есть множество планов на будущее... Я лишь надеюсь дожить до того дня, когда они воплотятся, — сказал старый зебра, усаживаясь рядом. Его взгляд не встречался с глазами Акиды, а был устремлён куда-то вдаль, в ночное небо. Принц ответил слабой улыбкой.\n\n— Вы оказываете мне честь своими словами, хотя я ещё не достоин их, — ответил Акида. — Я тоже надеюсь, что мои планы успеют исполниться при вашей жизни. Ведь именно благодаря вам и всем тем, кто верно служил моему покойному отцу и моей матери, у меня появилась возможность изменить будущее. Я не смогу спокойно спать, если не докажу вам и народу Зонго свою компетентность. Будьте уверены: я сделаю всё, чтобы показать вам, что страна в надёжных копытах."
 zongo.6.a:0 "Не говоря больше ни слова, они тихо, по-своему наслаждались праздником."
 
 zongo.7.t:0 "Разговор с матерью" #SIREN
 zongo.7.desc:0 "В последний раз Акида пил чай со своей матерью ещё в Сентурии. Официально это был дипломатический визит, но на деле она просто использовала его как повод увидеть сына. Всего год назад их беседа была лёгкой, и он даже не мог вспомнить, о чём они тогда говорили. Теперь же атмосфера была совершенно иной. Впервые они разговаривали не просто как мать с сыном, а как монархи.\n\n— Зонго процветал при тебе, — признал Акида. — Но я оглядываюсь вокруг и понимаю, что королевство выглядит точно так же, как в день моего отъезда. По правде говоря, оно не менялось ещё со времён правления отца, — он слегка улыбнулся, но глаза остались серьёзными. — Я считаю, что без перемен не обойтись. Только великие изменения способны вывести наше королевство из оцепенения. У нас есть все средства, чтобы полностью преобразить Зонго и сделать его предметом зависти всего региона, если не континента. Но без твоей помощи этого не достичь. У меня есть видение, но у тебя есть опыт и знания, которых мне не хватает. Так... — принц поёрзал на месте. — Ты поможешь мне?\n\nМать сделала неторопливый глоток чая. Её взгляд пронзал сына насквозь. Со стороны было понятно, почему многие находили эту зебру поистине устрашающей. Хотя её золотые годы давно позади, она всё ещё держалась с такой уверенностью и достоинством, что многие начисто забывали о её возрасте. — Не буду притворяться, будто меня не тревожит масштаб твоих планов, — призналась она ровным голосом, — перемены всегда несут смуту. Я управляла Зонго подобным образом не без причины, — увидев нахмуренное лицо своего сына, мать продолжила чуть мягче. — Но теперь король – это ты. Именно твоё видение важно. Я же буду советовать и делать всё, что в моих силах, чтобы направлять и защищать тебя и Зонго, — она ласково улыбнулась Акиде. — Будь уверен, сын мой, я буду рядом с тобой на каждом шагу."
 zongo.7.a:0 "На. Каждом. Шагу."
 
 zongo.8.t:0 "Коронация" #Snow 
 zongo.8.desc_lavish:0 "Он стоял в великом зале, а зебры вокруг уважительно молчали. Наряд Акиды был изысканным: золотые серьги и яркая одежда являли собой демонстрацию богатства Зонго. Зебра направился к трону, у подножия которого его ждала кобыла.\n\n— Рад вновь встретиться с вами, верховная жрица, — Акида слегка поклонился ей. В этот важный момент зебра вела себя совсем иначе: добрые улыбки и лёгкий смех, что прежде сопровождали её, исчезли. Но Акида не чувствовал себя обиженным – это был торжественный миг не только для него, но и для неё, ведь они стояли перед самыми влиятельными существами королевства. Принц улыбнулся. — Никому не говорите, но я тоже немного волнуюсь.\n\nЖрица едва заметно улыбнулась – так, что издалека этого нельзя было различить, как будто тяжесть спала с её плеч. Собравшись с духом, она заговорила. — Обещаешь ли ты, Акида Бомбоко, быть справедливым ко всем своим подданным и уважать их? Клянёшься ли чтить своих предков и долг? Понимаешь, что с сегодняшнего дня ты живёшь не просто как наследник престола, но и как представитель всего Зонго?\n\nПринц быстро дал положительные ответы на каждый вопрос.\n\n— Что ж, тогда... как верховная жрица я провозглашаю тебя... — словно по сигналу Акида склонил голову, сердце его билось от ожидания, — Мвенезонго, королём зонголезцев! — когда корона опустилась на его голову, великий зал наполнился ликующими криками: все собравшиеся приветствовали нового короля. Вдали королева-мать улыбалась гордо, но сдержанно, разделяя торжественность момента вместе с верховной жрицей.\n\nКогда Акида вышел наружу, толпа расступилась, открыв ему путь к богато украшенной карете. Тысячи зебр выстроились по обеим сторонам прохода и разразились радостными криками, как только он появился. Сердце новоиспечённого монарха билось быстрее, чем когда-либо прежде... Неужели вот так чувствует себя король, когда понимает, сколь многие подданные полагаются на него? Пока толпа приветствовала его, Акида думал лишь об их улыбающихся лицах и о том, как его план движется вперёд. Он должен был довести его до конца – не только ради себя. В этот момент мать слегка тронула его за плечо и тихо прошептала на ухо. — Помни, постарайся не разбить слишком много сердец на церемонии, ты ещё слишком молод, чтобы думать о наследнике, — Акида покраснел, и мать с сыном рассмеялись. В ту минуту он вновь, но уже в последний раз почувствовал себя жеребёнком. Впрочем, миг прошёл, и он окончательно стал королём."
 zongo.8.desc_normal:0 "Он стоял в великом зале, а зебры вокруг уважительно молчали. Наряд Акиды был тем самым, что носил его отец на своей коронации в знак почтения к предкам. Зебра направился к трону, у подножия которого его ждала кобыла.\n\n— Рад вновь встретиться с вами, верховная жрица, — Акида слегка поклонился ей. В этот важный момент зебра вела себя совсем иначе: добрые улыбки и лёгкий смех, что прежде сопровождали её, исчезли. Но Акида не чувствовал себя обиженным – это был торжественный миг не только для него, но и для неё, ведь они стояли перед самыми влиятельными существами королевства. Принц улыбнулся. — Никому не говорите, но я тоже немного волнуюсь.\n\nЖрица едва заметно улыбнулась – так, что издалека этого нельзя было различить, как будто тяжесть спала с её плеч. Собравшись с духом, она заговорила. — Обещаешь ли ты, Акида Бомбоко, быть справедливым ко всем своим подданным и уважать их? Клянёшься ли чтить своих предков и долг? Понимаешь, что с сегодняшнего дня ты живёшь не просто как наследник престола, но и как представитель всего Зонго?\n\nПринц быстро дал положительные ответы на каждый вопрос.\n\n— Что ж, тогда... как верховная жрица я провозглашаю тебя... — словно по сигналу Акида склонил голову, сердце его билось от ожидания, — Мвенезонго, королём зонголезцев! — когда корона опустилась на его голову, великий зал наполнился ликующими криками: все собравшиеся приветствовали нового короля. Вдали королева-мать улыбалась гордо, но сдержанно, разделяя торжественность момента вместе с верховной жрицей.\n\nАкида вышел наружу, всё ещё пребывая в лёгком оцепенении, и сразу оказался перед тысячами зебр, которые мгновенно разразились радостными криками, заметив украшение на его голове. Сердце новоиспечённого монарха билось быстрее, чем когда-либо прежде... Неужели вот так чувствует себя король, когда понимает, сколь многие подданные полагаются на него? Пока толпа приветствовала его, Акида думал лишь об их улыбающихся лицах и о том, как его план движется вперёд. Он должен был довести его до конца – не только ради себя, но и ради всех своих подданных."
 zongo.8.a:0 "Да здравствует Зонго! Да здравствует наш король!"
 
 zongo.9.t:0 "Приготовления к коронации" #Snow
 zongo.9.desc:0 "Акида стоял несколько безучастно, а его усталое лицо резко контрастировало с оживлённым выражением матери, которая листала каталог, показывая иллюстрации юному королю.\n\n— Смотри, сын мой! Разве эти золотые серьги не будут прекрасно смотреться на тебе во время коронации? — она сделала движение, словно собираясь ущипнуть его за щёки, но удержалась. — Конечно, есть ещё вопрос места проведения... это будет позором для тебя и твоего покойного отца, если зал для празднества не сможет подчеркнуть твои лучшие качества. Ах! — она воскликнула, перелистывая страницы. — И разумеется никак нельзя забывать о заграничных танцорах: они привлекут внимание и знати, и простонародья. Ты предпочитаешь сентурийских или, может быть, что-то более экзотическое? Я ещё слышала, что кирийские танцоры с клинками – на редкость впечатляющее зрелище. Кентавры, на мой взгляд, слишком неуклюжи, но учитывая, что ты провёл последние годы среди них, это могло бы создать особую атмосферу... Что скажешь?\n\nАкида чувствовал, что его голова идёт кругом, и сделал паузу, чтобы перевести дух, когда мать наконец прекратила поток предложений и вопросов. — Мама... я всё пытаюсь сказать, что не хочу ничего этого. Обычной коронации будет вполне достаточно, — старшая зебра продолжила непонимающе улыбаться. Она лишь пару раз моргнула и заговорила только после долгой паузы.\n\n— Обычной?.. — её улыбка на миг дрогнула. — Сын мой, это и есть обычные ожидания... Я была настолько бережлива, насколько могла! Потратим ещё меньше средств – и тебя будут называть позорными прозвищами вроде "Бедного" или "Скупого короля". Тебя сочтут слабым, если ты выйдешь столь плохо одетым, и этого я не могу допустить. Я не позволю им порочить моего дорогого сына! А теперь будь добр, выбери танцоров, — улыбка вернулась так же быстро, как исчезла, поставив Акиду перед перспективной немедленного и весьма непростого выбора.\n\nОн не мог не думать о том, сколько же средств уйдёт на все эти церемонии. Ведь унаследованный им бюджет был крайне ограниченным, а реализация его планов даже не началась. Однако мать была права: пышная церемония традиционно служила демонстрацией силы зонголезских монархов и наверняка удовлетворила бы всех... но Акиду всё никак не отпускала мысль о напрасно потраченных средствах. Так ли важны традиции в современную эпоху прогресса? Мать продолжала улыбаться, и Акида понял, что времени на размышления не осталось."
 zongo.9.a:0 "— Что ты там говорила про серьги?"
 zongo.9.b:0 "— Право же, мама, я желаю чего-то более скромного."
 zongo_9_tt:0 "После коронации вы получите следующие эффекты:\n"
 
 zongo.10.t:0 "$ZOO_grand_railroad_project$"
 zongo.10.desc:0 "Акида был в восторге, поскольку наконец-то мог начать воплощение своего великого плана – видения прогрессивного будущего для Зонго, основанного на полученных во время многолетней учёбы в Сентурии знаниях. Королевство было настоящей сокровищницей возможностей, и король это прекрасно понимал. Поэтому он обратился к совету – исполнителям его воли, собравшимся в зале, чтобы услышать о своей роли в формировании будущего королевства.\n\n— Достопочтенные советники, сегодня мы делаем первый шаг на долгом пути к процветанию. Как всем известно, наша страна богата, как никакая другая земля, но многие подданные Зонго живут так же, как их предки сотни лет назад. Пора изменить это! С помощью заграничных специалистов я разработал великий план стремительной модернизации Зонго, — уверенно заявил Акида, раскладывая карту предложенной железнодорожной сети.\n\n— Я видел, как далеко продвинулись другие страны – и в прямом, и в переносном смысле – в которых путь из одной провинции в другую занимает часы, а не дни. В таких условиях поселения могут с лёгкостью обмениваться и торговать едой и утварью. Так что всего через несколько лет весь Зонго будет идти в ногу с остальным миром – а может, даже обгонит его!\n\nСоветники нерешительно переглянулись, пока Акида выжидательно смотрел на них. Но вскоре мани услышали вежливый кашель Нзузи, после чего в тот же миг начали топать копытами, выражая поддержку плану короля Акиды. Он улыбнулся, предвкушая грядущую работу и преобразование своей родины. Именно так, как было изложено в его дипломной работе."
 zongo.10.a:0 "Всеобщее процветание начинается здесь!"
 
 zongo.11.t:0 "Призыв к экспертам" #Snow
 zongo.11.desc:0 "Когда корабль пришвартовался у причала в Заму, в груди Акиды что-то тревожно сжалось. Кто-то мог бы сказать, что будущему королю не пристало ждать гостей	прямо в гавани, словно тревожный супруг, но для принца этот визит был очень важен.\n\nОн позвал учёных, исследователей и специалистов, которых встречал или о которых слышал во время учёбы в Сентурии, и верил, что они помогут в модернизации Зонго. Но откликнется ли хоть кто-то на его призыв? Хотя Акида предлагал щедрое жалование из королевской казны, он понимал, что весьма немногие решатся приехать в Зонго. Однако мысли его были сосредоточены на одном особом госте.\n\nКогда трап опустился, привычная смесь торговцев и путешественников сошла на пирс. Среди них он заметил знакомый по дням учёбы в Сентурии силуэт. Акида постарался сохранить самообладание и быстро подошёл к новоприбывшим.\n\n— Скажи, вы приехали ради здешних красот? — Акида говорил менее формально, чем принято при дворе. — Или моё письмо всё же дошло до вас?\n\nНа лице кентавра было лишь глубокое и такое знакомое спокойствие и уверенность, когда он встретил взгляд своего бывшего ученика. — Да, ваше письмо действительно дошло до меня, Ваше Величество.\n\n— Пожалуйста, — мягко перебил Акида. — Здесь нет нужды в подобных формальностях. Мне будет очень неловко, если мой профессор начнёт вести себя как простой подданный.\n\n— Ну тогда и ты обращайся ко мне на ты. Мы больше не учитель ученик: называй меня просто Анарбек, — кентавр улыбнулся и поклонился. — Надеюсь, ты понимаешь, что моё уважение к тебе не сводится лишь к почтению подданного перед правителем. Я высоко ценил тебя ещё в те дни, когда ты был студентом. Я надеялся увидеть, как великие планы, которые ты набрасывал на моих лекциях, воплотятся в реальности, хотя никогда не думал, что именно меня призовут помочь тебе в этом. Получив твоё письмо, я сел на первый попавшийся корабль.\n\n— Ты первый, кто откликнулся на мой призыв. Если повезёт, то и не последний. Если Зонго хочет модернизироваться, ему понадобится ещё много светлых умов вроде твоего. Как бы ни был блестящ ум, одному-единственному существу не удастся противостоять тысячелетнему строю традиций, что боятся перемен, — Акида указал прочь от доков. — Но это не лучшее место для бесед. Пойдём, я знаю более уютное местечко, где мы сможем лучше обсудить, с чего начать."
 zongo.11.a:0 "Учитель и ученик вновь воссоединились как союзники."
 
 zongo.12.t:0 "Убеждая старейшин" #Snow
 zongo.12.desc:0 "Принц Акида внешне сохранял внимательность, но его мысли блуждали где-то далеко, пока старейшина-мани говорил. Казалось, они уже целую вечность ходят вокруг одного и того же.\n\n— ...и вы должны понять, я уж точно не желаю стать проблемой, — сказал старейшина-мани. Слова менялись каждые несколько предложений, но смысл оставался прежним. — Ваш отец был великим королём, а ваша мать... — взгляд пожилого зебры блуждал по комнате. Казалось, он был столь же утомлён, как и сам Акида. — ...обеспечила, чтобы вы смогли без помех взойти на трон. Я верю, что вы справитесь не хуже их, — он прочистил горло, издав нервный и сухой звук. — Однако ваши планы встревожили многих других старейшин-мани в совете. Я лишь хочу предостеречь вас: будьте осторожны. Вы идёте по опасной тропе.\n\n— Разумеется, мудрый мани. Будьте уверены, я вовсе не стремлюсь разрушить власть вождей или наши вековые традиции. Я лишь хочу принести те достижения современности, которые я видел во внешнем мире, в Зонго, чтобы все могли пользоваться благами, что я лично наблюдал в Сентурии, — Акида улыбнулся. — Если появятся какие-либо сомнения или вы сочтёте, что я сбился с пути, вновь без колебаний обращайтесь ко мне, чтобы мы своевременно решили этот вопрос.\n\nКогда мани ушёл с тревожным выражением лица, выдержка Акиды дала трещину. Это был уже третий старейшина за день, каждый приносил одни и те же расплывчатые предостережения о "голосах несогласных". Он ожидал сопротивления, но постоянные повторения жутко утомляли. Никто не осмеливался прямо высказать свои претензии, все лишь ходили вокруг да около. В тот момент Акида скучал по прямоте своих одноклассников в Сентурии. Для них он был не принцем, а другом. Если бы они были здесь, возможно, они могли бы...\n\nСтук прервал его мысли. Дверь открылась, и паж объявил, что следующий мани готов предстать перед монархом. Увы, времени на ностальгию не осталось: предстояло заложить слишком много основ, чтобы Зонго был готов к его планам. Акида жестом велел пажу впустить очередного мани."
 zongo.12.a:0 "Чтобы обеспечить будущее Зонго, нужно сперва разобраться с его прошлым."
 
 zongo.13.t:0 "План нового бюджета" #Snow
 zongo.13.desc:0 "Королевский кабинет преобразился. Карты и книги по алхимии теперь оказались погребены под свитками по экономической теории из Сентурии, а в воздухе витала меловая пыль. Король Акида стоял во главе стола, пока остальные экономисты изучали его первоначальные расчёты.\n\n— Теория верна, — заявил Анарбек. — Экспортируя обширные государственные запасы природных ресурсов, мы сможем заработать внушительный капитал. Королевские резервы обеспечат начальную ликвидность для плана, — он взглянул на последний расчёт на столе. — Да, это может сработать. Если теория выдержит проверку реальностью.\n\nТихий кашель раздался от другой участницы – гиены-специалистки по статистике. — Ваше Величество, если позволите. Эти прогнозы... слишком оптимистичны. Они предполагают стабильный внешний спрос и, что ещё важнее, игнорируют первоначальный шок для населения, — она постучала когтем по другому пергаменту. — Перенаправление стольких средств и труда на строительство однозначно вызовет дефицит в других сферах. Мы прогнозируем резкий, пусть и временный, рост бедности и недовольства среди ваших подданных. Народ почувствует это задолго до того, как увидит плоды ваших планов.\n\n— Если вы называете мои идеи оптимистичными, то ваши слишком мрачны. Тема бедности уже обсуждалась с королевой-матерью. Она заверила меня, что позаботится о помощи обездоленным, чтобы мы могли двигаться вперёд с планом, — Акида уверенно, почти пренебрежительно махнул копытом. — Зонголезцы более стойкие, чем вы думаете.\n\nКогда речь заходила о теории, новый король чувствовал себя очень уверенно. Некоторые переглянулись с тревогой. Гений Акиды был неоспорим, но его непоколебимая вера в теорию была той переменной, которую они не учли. После короткой паузы Анарбек кивнул, и остальные экономисты один за другим последовали за ним, пока вся комната не пришла к согласию. На бумаге план казался идеальным.\n\nИменно его воплощение в реальном мире вызывало у них беспокойство."
 zongo.13.a:0 "Прогресс ПРИДЁТ в Зонго."
 
 zongo.14.t:0 "Встреча с духовенством" #Snow
 zongo.14.desc:0 "Акида оказался в небольшой, тускло освещённой молитвенной комнате. Ему сказали, что верховная жрица часто молится здесь, и он предпочёл выбрать такой неформальный подход вместо душной официальной встречи. Дверь открылась, но слова застряли у него в горле. Вошедшая кобыла была молода, примерно его возраста, но её одежда была гораздо более формальной, чем у любой нганги. Это была не верховная жрица времён его отца. — Ты не Нала. Её преемница? — наконец спросил он.\n\n— Прошу прощения, что приношу такие печальные вести, но... Нала умерла несколько лет назад, — сказала кобыла с мягкой, но грустной улыбкой. — Я была её помощницей при жизни, а после её смерти меня быстро назначили преемницей и возвели в сан верховной жрицы Зонго. Тогда эта должность, конечно, относилась только к городу.\n\nОна тихо, смущённо рассмеялась. — Я была потрясена. Да, я служила помощницей Налы, но никогда не ожидала оказаться в центре внимания. С тех пор я стараюсь изо всех сил, но... ой! Ещё раз прошу прощения, — зебра хихикнула. — Я увлеклась и забыла спросить твоё имя.\n\n— Акида Бомбоко.\n\nКобыла моргнула, её выражение отразило то же удивление, что и у него пару минут раньше. Он тепло рассмеялся. — Я думал, ты знаешь. Извини, что не представился первым, не хотел прерывать твою историю.\n\nГлубокий румянец залил её лицо. — О боги, я болтала с будущим королём, словно с обычным жеребёнком! Простите мою дерзость! — она была готова вот-вот расплакаться, но Акида мягко заверил её, что всё в порядке. — Позвольте мне представиться как следует, — сказала она, собравшись с силами. — Моё имя Аяна, нганга-кулу Зонго. Надеюсь, мы сможем работать вместе ради светлого будущего.\n\nОна снова улыбнулась – принцу показалось, будто в дождливый сумрачный день сквозь тучи выглянуло солнце – и поклонилась. Акида подумал, что, возможно, работа с духовенством окажется не такой утомительной, как он опасался."
 zongo.14.a:0 "— Я тоже с нетерпением жду этого, верховная жрица."

 #Railway events
 zongo_railway.1.t:0 "Путь Заму, уровень 1" #Snow
 zongo_railway.1.desc:0 "— Так в чём проблема? — спросил прораб. — Мы уже прокладывали рельсы в карьерах: выравниваешь их, закрепляешь болтами – и всё, вагонетка едет. Небольшая неровность не остановит её.\n\n— Это... немного сложнее, — Анарбек потёр лоб, встречая недоумённые взгляды рабочих. Он указал на стык рельсов перед ними. — Как указано в чертежах, пути должны быть идеальными. Даже если один участок чуть-чуть выше остальных, это создаёт линию излома, и под нагрузкой гружёного локомотива оно... — кентавр осёкся, понимая, что рабочие перестали следить за его объяснениями, и отправил бригаду трудиться, дав себе минуту на размышления.\n\nПринцип был тот же, но масштаб менял всё. Когда поезд понесётся со скоростью в сотни километров в час – а такие скорости неизбежно будут достигнуты – случится катастрофа. Проект не просто так следовал точнейшим инженерным расчётам.\n\nАкида направил его лично курировать один из важнейших участков проекта. Заму должен был стать промышленным центром страны, но Анарбек чувствовал себя так, словно объяснял высшую математику классу, который едва освоил арифметику. Уровень мастерства строителей Зонго – способных возводить как простейшие хижины, так и вычурную архитектуру столицы – сильно различался. Даже здесь рабочие вроде бы понимали саму идею, но применяли привычные стандарты к проекту, требующему абсолютной точности. Разрыв между линиями на его чертежах и долиной перед ним оказался пропастью, которую он не предвидел. Именно эту реальность должна была преодолеть теория его ученика, чтобы стать действительностью.\n\nКентавр глубоко вдохнул. Размышления – роскошь, уместная лишь в лекционном зале. Здесь же была лишь задача: уложить рельсы до заката. Из своей сумки он достал чистый свиток и начал писать: "Полевое наблюдение: основное ограничение не материальное, а когнитивное. Необходимо разработать упрощённый стандартизированный протокол. Теоретически возможный оптимум в данный момент недостижим. Необходимо начать с расчёта практической базы"."
 zongo_railway.1.a:0 "Попробуем ещё раз."
 zongo_railway.2.t:0 "Путь Заму, уровень 2" #Snow
 zongo_railway.2.desc:0 "Земля была глубоко вскрыта мощью машин. Зебры были поражены скоростью, с которой расширялись шахты Змпангу: то, что раньше при хорошем темпе заняло бы недели, теперь было выполнено всего за несколько дней, полностью преобразив пещеры. Анарбек наблюдал за процессом, занося данные в планшет и одобрительно кивая при виде цифр по тоннажу добычи и скорости. И всё же...\n\n— Лентяи, а ну-ка за работу! — рявкнул прораб, указывая на огромную сверкающую груду необработанной железной руды. — Мои бригады простаивают полсмены, потому что некуда складывать то, что они накопали!\n\n— В расписании указано только десять вагонеток в день! — парировал специалист по логистике, обвиняюще указывая копытом. — Мы рискуем сходом с рельсов, если будем перегружать систему. Это не наша проблема, если твоя бригада хочет добровольно загнать себя до смерти!\n\nАнарбек слушал, сохраняя нейтральное выражение лица. Модель Акиды рассматривала добычу и транспорт как взаимосвязанные переменные. Здесь же они оказались двумя отдельными системами, одна из которых обгоняла другую.\n\n— У меня есть решение, — наконец произнёс кентавр. — Добыча сейчас превышает возможности транспортировки, и немедленно ничего изменить нельзя. Сосредоточьтесь пока на поиске более богатых жил. Это сократит объём добычи до уровня нынешних перевозок, пока я не организую расширение, чтобы учесть полный объём выработки. Если времени окажется недостаточно, я компенсирую трудности вычетом из своей зарплаты в пользу пострадавших рабочих. Это приемлемо?\n\nДвое зебр были удовлетворены предложением. Когда они разошлись, чтобы начать выполнять его распоряжения, Анарбек посмотрел на залежи руды. Спор о переизбытке практически рассмешил его. Из сумки кентавр достал свежий свиток и начал писать: "Жила Змпангу оказалась куда богаче, чем предполагалось. Следует принять предварительные меры на других шахтах, чтобы избежать схожих логистических проблем. Необходимо начать разработку практического метода.""
 zongo_railway.2.a:0 "Занятно."
 zongo_railway.3.t:0 "Путь Заму, уровень 3" #Snow
 zongo_railway.3.desc:0 "Фабрики Заму ревели во всю силу, небо заволокло смогом, молоты и машины отбивали бешеный ритм, а готовая продукция текла непрерывным потоком. Производственные графики впечатляли; методы, применяемые здесь, наверняка будут распространены по всему Зонго. Однако из окна своего кабинета Анарбек воочию лицезрел непредвиденное последствие этого роста: на окраине поселения возникло маленькое сообщество.\n\nОно выросло там, словно сорняк. Запутанный лабиринт лачуг, собранных из всякого хлама, теснился возле стройки. Местных рабочих было недостаточно, но и приезжих в Заму было столько, что устроить их в таких количествах, особенно неквалифицированных тружеников, было попросту невозможно. Ветер приносил смрад, свидетельствующий об отсутствии нормальной санитарии, а ночью тускло мигающие огоньки не давали забыть о существовании этого дрянного местечка. Кентавр попросил медика изучить ситуацию, и отчёты оказались ужасающими: респираторные заболевания и болезни, передающиеся через воду, встречались в этом поселении в три раза чаще. Без стороннего вмешательства ситуация вскоре превратится в кризис здравоохранения невиданного масштаба.\n\nАнарбек развернул генеральную карту Заму. Он взял линейку и начал спокойными, размеренными жестами чертить новую сетку прямо к северу от промышленного центра, обозначив её как планируемый квартал, где можно поселить этих неформальных рабочих. Здесь будет канализация, нормальные уборные и водоснабжение, а также место для простых, одинаковых бараков. Всё будет построено максимально строго и скромно, чтобы уложиться в бюджет, но при этом подобный шаг предотвратит смерти и болезни. А также позволит рабочим полноценно интегрироваться в общество Заму.\n\nВ ту ночь у кентавра не осталось времени на заметки для отчёта: его ждало куда более важное дело."
 zongo_railway.3.a:0 "Он должен был пресечь катастрофу в зародыше."
 zongo_railway.4.t:0 "Путь Заму, уровень 4" #Snow
 zongo_railway.4.desc:0 "Убогого поселения больше не было. На его месте вырос новый жилой сектор с аккуратными рядами одинаковых, но надёжных бараков и мощёными дорожками, соединяющими его с Заму. Дома не были величественными, но всё же сухими, чистыми и безопасными. Последний отчёт медика отметил резкое снижение заболеваемости. Производительность испытала краткий спад, но потом восстановилась и стабилизировалась.\n\nАнарбек принял первые делегации: мани из других провинций, послов из-за границы и даже журналиста из Сентурии, с которым он уже встречался ранее. Все они прибыли, чтобы увидеть "Чудо Заму", как его стали называть. Разумеется, как "ответственный" за него, кентавр должен был оставаться и давать интервью. День прошёл в целом без проблем: гости приходили и уходили, удовлетворённые увиденным. Они не видели ни лихорадочных расчётов, ни перенаправленных ресурсов, ни грязной земли, где совсем недавно были трущобы. Они видели лишь триумф Заму – и это был лучший результат, на который мог надеяться Анарбек.\n\nКогда солнце склонилось к закату и кентавр вновь обрёл покой, он воспользовался моментом, чтобы подготовить свой обычный отчёт. Из сумки он достал свежий свиток и начал писать: "Перенаселение – потенциально катастрофическая проблема и наверняка останется таковой в будущем. Хотя Заму удалось избежать кризиса, методы, применённые для достижения успеха, были несовершенны. Промышленный рост устойчив лишь при условии заранее продуманного планирования жилья. Подробности о методах и личные мысли будут изложены в полном отчёте. Если при нынешних расширениях возникнут подобные трудности, уведомите меня немедленно"."
 zongo_railway.4.a:0 "Он мог лишь надеяться, что подобное не повторится."
 zongo_railway.5.t:0 "Путь Заму, уровень 5" #Snow
 zongo_railway.5.desc:0 "Анарбек в одиночестве стоял на платформе железнодорожной станции Заму. Он пришёл пораньше – возможно, даже слишком рано – чтобы насладиться вечерним бризом. Последние несколько месяцев стали для него удивительным опытом, позволившим воочию увидеть, как теория оживает в самых наглядных формах: от прискорбных недостатков до великих успехов, отражённых в многочисленных фабриках и складах, ныне усеявших окрестности. Заму превратился в настоящий город, где объём торговли и численность населения достигли невиданных высот. Весь хаос, с которым он боролся, в конце концов улёгся, став гармоничным повседневным ритмом.\n\nКентавр на мгновение остановился, чтобы ещё раз перечитать свой полный отчёт. Из сумки он достал переплетённую работу с простым заголовком: "Об управлении индустриальной трансформацией: наблюдения во время пребывания в Заму". Это был его итоговый отчёт по региону – полное изложение бурного рождения города, изложенное научным языком и пригодное к воспроизведению. Первая часть подтверждала теорию программы «Железные дороги и нация» с помощью исчерпывающих данных, собранных им во время наблюдения за промышленным ростом. Вторая часть описывала разработанные методики для управления логистическими, инфляционными и социальными переменными, неизбежно возникающими при столь стремительных переменах.\n\nКогда платформа начала наполняться пассажирами, Анарбек убрал отчёт обратно в сумку; время для правок ещё найдётся. Его взгляд скользнул по формирующейся толпе: кого-то он мог встретить прежде или даже изменить его или её судьбу. Но абсолютное большинство даже не знали, кто он такой. Это приносило кентавру особое удовлетворение. Даже после всего сделанного он мог наслаждаться покоем и тишиной.\n\nВскоре на станцию прибыл поезд, и существа начали заходить внутрь... мягко говоря, не слишком организованно. Анарбек сдержал лёгкий смешок. Судя по всему, всё ещё существовали вещи, которые он не мог исправить привычными научными методами. Решив не создавать пробку на входе, кентавр отошёл в сторону и сделал последнюю заметку."
 zongo_railway.5.a:0 ""Предложить совету провести общественную кампанию по правилам поведения в поездах.""
 zongo_railway.6.t:0 "Zupinamba Line Level 1" #24
 zongo_railway.6.desc:0 ""Alright everyzebra, let's put it all together! Starting from the left, each of you will say one word in turn."\n\nAyana stood next to an old slate board from the local temple and pointed to each of the words written in large letters as across from her a small group of six young foals squinted at the chalk and tried to sound them out. Far away from the hustle and bustle, not to mention the intrigue, of the capital, Ayana found that excursions to the more underdeveloped parts of Zongo to perform charity work for the poor kept her grounded despite her station. Today's mission saw her stepping in as a teacher for the temple's struggling schooling program to help the foals learn to read at a basic level, which was a much more enjoyable change of pace from the machinations of the Mani.\n\n"Ebery... I-I mean, every." "Foal?" "Of!" "Z-Za... Zongo!" "Is good!" the foals shouted off in turn, with the last filly letting her excitement get the better of her and taking two words instead of one, much to the last foal's chagrin. Ayana chuckled as the foals squabbled over the right to say the words; she couldn't deny that they were excited to learn how to read, as if they were discovering some secret of the universe. Who knew? Maybe they were.\n\n"Now, now, let's not fight. You know it was Zanoka's turn to read the last word, Zahina." Then she smiled and wrote another word on the slate; the foals' eyes widened as the word grew longer, letter following letter like it would never end. "Here's a special word, just for you. Can you sound it out?"\n\nWhile Zanoka frowned at the word and stuck out his tongue as he thought. Ayana looked over her class one more time and thought to herself. If six poor foals living near the temple were so enthusiastic to learn how to read, what could she do if she had the resources to reach sixty? If she could scale her classes, have other teachers teach in more towns throughout the province... no, throughout the nation? It was something worth mentioning to the king when she returned to Zongo. So engrossed was she with her idea that she almost missed Zanoka's excited gasp when he realised what the word she'd written on the chalkboard was."
 zongo_railway.6.a:0 ""Zupinamba! That's where we live!""
 zongo_railway.7.t:0 "Zupinamba Line Level 2" #24
 zongo_railway.7.desc:0 "Ayana smiled as she watched the foals begin to pack up their meagre possessions and get set to leave the Zupinamba temple as the class came to a close, but she still had to stifle a small sigh as she realised her fun was coming to an end. Ever since she'd pitched her plan to Akida and received his approval, she'd been able to make use of the new railway to Zupinamba to continue teaching this class, and she treated it almost like a working holiday. Politics were messy and stressful; teaching a small class of children how to read was a breath of fresh air. Every time her last class she could teach that week came to an end, she couldn't help but feel disappointed.\n\nBut the fact that she could continue teaching these classes was a boon she wouldn't take for granted. After getting Akida's approval to pioneer Zongo's first mass literacy program, he'd blessed her hobby as the Zupinamba temple's favorite substitute teacher with royal backing. It was her job to see how the program was evolving firsthoof and take lessons learned from the temple's expanding program back to the capital to help the other new schools.\n\nIt had also let her get to know the foals coming to her lessons personally, and when she saw a foal nervously lingering by her desk while the others left, she went to her and put a hoof on her shoulder. "Zahina? What's wrong?"\n\nThough the foal was clearly unsure, she still answered anyway. "Miss Ayana, do you have anything to eat?" she asked, seemingly shrinking in her shame as the words left her mouth. "Mama didn't give me a lunch."\n\n"Of course, dear. The temple keeps food for anycreature that needs it. We can go get some, okay?" The filly smiled and bounced along behind her as they made their way to the temple's kitchen, but something gnawed at Ayana's thoughts. "Why didn't your mama give you a lunch? Did she forget?"\n\n"Mama wasn't able to get food from the market," Zahina said with a frown. "We can't grow our own food since the train station bought our field."\n\nAyana's eyes widened in shock, but all she said to the little filly was "The temple will always have food for you and your family. Don't worry about it, little one." But in her mind, she knew that this wasn't just one poor family's problem. How many more were suffering similar fates?"
 zongo_railway.7.a:0 "We must find a way to modernise without hurting our most vulnerable."
 zongo_railway.8.t:0 "Zupinamba Line Level 3" #24
 zongo_railway.8.desc:0 ""Good morning, Miss Ayana!" came the cheerful greetings of almost two dozen children as Ayana stepped into the brand new classroom at the Zupinamba Writing School. The school was the first of its kind in the kingdom, and it had been designed around Ayana's experiences with teaching foals at the temple and growing the literacy campaign with the lessons she learned there. The new building had four classrooms, an office for the faculty, and a cafeteria that everycreature shared during the lunch hour. Compared to the still largely undeveloped and rural surroundings of Zupinamba, it was an engineering marvel. Ayana was just pleased that Akida had taken such an interest in her campaign and had diverted all the resources she would need to make it successful to her hooves, much to the Mani's chagrin.\n\n"Good morning, class!" Ayana sang back, and she turned to the chalkboard with a few words already scribed across it. "Today is an important day! We're going to be learning about contractions. Now tell me, who read ahead in their packet last night and knows what a contraction is?" By the time she turned around, half of the class already had their hooves raised, ready to answer, and her grin grew a little wider.\n\nBy the end of the class, Ayana felt proud of everything she'd gotten her foals through, if a little exhausted. Teaching twenty-something children was a lot more intense than the six she first started with! As the bell rang and her students began to file out of the classroom, she noticed Zahina lingering at her desk, shuffling her hooves awkwardly. "Zahina? What's wrong, dear?" Ayana asked, remembering the last time the filly had nervously asked her for food, only for Zahina to reach out and hug her as soon as she got close.\n\n"Thank you for helping me read, Miss Ayana," the filly said, giving Ayana's legs a little squeeze. "All the other kids ask me to read things to them all the time, and I can! Even Mama asks me for help reading things!" She beamed up at Ayana, though it quickly faltered. "I wish Mama could read, too."\n\n"I'm sure she will be able to one day soon," Ayana said, giving the filly a hug back. "Especially if she's got a good teacher like you."\n\n"I'm not good at teaching," the filly pouted, but then she gasped and beamed at her. "But you are! I'm gonna tell Mama that she should come next time!" A train whistle blew from the station a few blocks away, and Zahina gave Ayana another hug before darting away. "The train! I can't be late! Bye, Miss Ayana!"\n\nAyana watched the little tempest dash away. When she was gone, she just chuckled and shook her head. It was always so rewarding to see how excited the children got over their lessons. And if their parents saw how excited they were to learn how to read..."
 zongo_railway.8.a:0 "How long until the parents come to class too?"
 zongo_railway.9.t:0 "Zupinamba Line Level 4" #24
 zongo_railway.9.desc:0 ""Sorry I'm late!" Ayana exclaimed as she burst through the door of her reading classroom, papers practically slipping from her bags in the whirlwind that followed her. Zongo's ever-expanding railroads, and especially the line between the capital and Zupinamba, had also meant more rail traffic than ever along the lines. That traffic meant too many trains and not enough lines for them, meaning Ayana's train to Zupinamba had to keep diverting at the switches into bypasses and she'd lost two hours of travel time. But still, Zongo had adapted to the growing pains of its massive railroad project well, and she knew those issues would soon be worked out.\n\nSo worried was she about being late that she didn't realize that there was a new student in the classroom. She blinked once when she saw the grown mare struggling to sit behind a desk that was much too small for her, but when she saw Zahina by the mare's side, and saw the resemblance between the two, it didn't take a genius to realize who her new student was. Despite how awkward and embarrassed Zahina's mother looked, Ayana flashed her a reassuring smile as she got her papers in order. "Well, class, since we're running late, I'm going to change plans for today's lesson. Let's have a refresher on some basic phrases, alright? Start by writing down the alphabet, and when that's done, open your workbook packets to the exercise at the end of chapter one and work on those. I'll come around and see how everyzebra is doing once I get my things in order."\n\nThough the children groaned at such a simple lesson, it wasn't for their benefit that Ayana had adjusted the lesson on the fly. Thanks to the standardised curriculum beginning to be issued from the capital, she could adjust her plans as needed without having to lose an entire day thinking up a new lesson. And when a new beginner entered her classroom partway through the course, it helped to be able to go back to the basics for her, no matter how old she was.\n\nEven if the other foals didn't realize it, Zahina's mother did, and as Ayana sat down behind her breath, the other mare gave her a thankful smile—at least until her daughter chastised her for not paying attention during class and tried to get her to go back to writing out the alphabet with her help."
 zongo_railway.9.a:0 "Every foal we teach to read is another family that learns to read."
 zongo_railway.10.t:0 "Zupinamba Line Level 5" #24
 zongo_railway.10.desc:0 "There were going to be tears. Ayana had done her best to hold them in all day, but as her last class wound down to its conclusion, she knew she couldn't stem them for much longer. She had wanted to at least make it to the train ride back to Zongo, but watching her students go and take turns reading aloud Akida's most recent speech to the class, it was getting harder and harder to keep composure.\n\nWhen the class finally finished the speech, she led a self-congratulatory round of applause for everyzebra, and then she stood up to address them all. "My students, I'm so proud of each and every one of you," she began, her eyes moving from one face to the next, big and small, young and old. "You've all learned so much. You all can read like you were born knowing how! There's nothing more I can teach you about how to read, and so it is my honour to congratulate you on graduating!"\n\nThe foals in the room raised their hooves and cheered, and even the adults had satisfied smiles on their faces, but as the noise died down, it was Zahina, Ayana's favorite student, who was the first to ask the question she dreaded. "So, what will you teach us next?" she asked with a beaming smile.\n\n"I'm afraid I won't be teaching you any more," Ayana said to the foals' dismay. As disappointed mewling rose up from the classroom, Ayana could feel the first of her tears start to pool at the corners of her eyes. "You've all been a joy to teach, but the King needs me in the capital, and I won't be able to spare time to come out to Zupinamba as often anymore. But don't worry! Just because I'm leaving doesn't mean you have to stop learning. There will be more classes where you can learn things like maths and science. You can even learn how to read in a new language, like Equiish or Kirian! And even though I can't teach those classes, you will have plenty of wonderful teachers even better than me. Thank you for being wonderful students, and I know you'll be just as wonderful for your next teacher."\n\nThough some more disappointed cries of protest came from her students, it was Zahina who said "Thank you, Miss Ayana!" and soon the rest of the class was thanking her too, even the adults. That was the moment the dam burst, and soon Ayana was apologizing profusely as she wiped away tears with her fetlocks, even before her students surrounded her in a heartfelt group hug."
 zongo_railway.10.a:0 "When she returned to the capital, she couldn't thank Akida enough for believing in her."
 zongo_railway.11.t:0 "Путь Зубы, уровень 1" #Snow
 zongo_railway.11.desc:0 "Мани Зуба стоял на маленьком пыльном холме, наблюдая за своими новыми подопечными. Внизу отряд юных солдат трудился бок о бок с гражданскими инженерами; их мундиры пропитались потом и грязью, пока они таскали брёвна и выравнивали землю ради новой железнодорожной мании, которой страдал их король. Взгляд Зубы был прикован к этим солдатам – не к тому, что они делали, а к тому, к чему приведёт их труд. Неужели ради именно такого будущего умер Нкоси? Его сын меняет копья на лопаты. Он зовёт чужеземцев советовать ему, как управлять страной. Он разоружает лучших воинов и заставляет их возиться в земле, словно простых рабочих.\n\nДвижение на краю поля зрения заставило зебру вновь выпрямиться; вспышка ярких тканей и выверенные шаги – лишь одна кобыла могла явиться в таком виде на строительную площадку.\n\nКоролева-мать пришла лично увидеть строительство железной дороги. Его челюсть напряглась. Зуба терпеть не мог Нзузи. Она всегда оказывала дурное влияние на Нкоси, а теперь и на его сына. Куда бы ни шла эта кобыла, она сеяла слабость. У Акиды был потенциал стать великим вождём, но он с детства был окружён заботой и вырос мягким жеребцом, не осознающим необходимости войны.\n\nЗуба медленно вздохнул, но благодаря гулу стройки звук остался неуслышанным. Мани направился вниз, чтобы присоединиться к своим солдатам. Видеть Нзузи в совете было достаточно тяжело, но он ни за что не позволит ей портить его настроение на собственной территории. Если уж ему поручили задачу, то он будет выполнять её бок о бок со своими солдатами. Так они поймут, что Зуба не ставит себя выше их. А ещё это позволит ему как можно меньше сталкиваться с этой невыносимой кобылой."
 zongo_railway.11.a:0 "Чтобы снова сражаться, солдат должен сначала строить."
 zongo_railway.12.t:0 "Путь Зубы, уровень 2" #Snow
 zongo_railway.12.desc:0 "Зуба наблюдал, как мимо грохочет снабженческий поезд. Ни один, даже самый большой караван из телег и повозок не мог сравниться по скорости и эффективности с этим стальным чудовищем. Первоначальное недовольство улеглось, и старый жеребец начал испытывать к поездам определённую симпатию. Эта новая система обладала неоспоримой полезностью. В мыслях он начертил маршрут на карте: сеть потенциальных линий снабжения, которая вскоре достигла цели – Мелахаки и Танайги. Эти земли были вне сферы влияния Зонго со времён его прадеда, но одних только рассказов об объединении региона было достаточно, чтобы вновь зажечь огонь в сердце Зубы.\n\nОн уже наяву представлял себе войска, свежие и полностью экипированные, перемещающиеся из центра страны на границу за день, а не за неделю. Артиллерийские орудия, некогда вызывавшие кошмары у специалистов по логистике, теперь могли доставляться на передовую с невероятной лёгкостью. Переброска войск ныне сможет осуществляться не через изнурительные марши, утомлявшие тела и умы, а с помощью комфортной поездки на поезде до другого региона.\n\nЗуба почувствовал удовлетворение. Оказалось, что за всеми разговорами о единстве и процветании скрывается великая истина: армия и королевская гвардия получат огромную выгоду от этих реформ. Но тут мани задумался: кто же в действительности спланировал всё это? Была ли это работа короля или всё же королевы-матери? Вполне возможно, что изрядно выигравшей от этого армии следует благодарить вовсе не Бомбоко.\n\nНо в итоге это было неважно. Железная дорога оказалась гораздо полезнее, чем изначально считал Зуба, и этого было достаточно, чтобы оправдать её расширение."
 zongo_railway.12.a:0 "Инструмент остаётся инструментом. Его ценность – в применении."
 zongo_railway.13.t:0 "Путь Зубы, уровень 3" #Snow
 zongo_railway.13.desc:0 "Группа молодых солдат неуклюже возилась с новым экспериментальным образцом оружия: с непривычки им было непросто разобраться в мудрёных механизмах. Постоянный лязг металла и раздражённые возгласы начинали действовать Зубе на нервы. Да с чем они там возятся? Навёл и выстрелил, всё просто. Он устал от этого жеребячества.\n\n— Хватит, — одним словом мани прервал их возню. Зуба шагнул вперёд, и его появление заставило солдат расступиться, словно траву под ветром. Быстрым движением он выхватил оружие у ближайшего солдата и осмотрел его. Провёл копытом по холодному металлу. Оно было похожим на предыдущим образцы и одновременно совершенно иным. Прежние длинные винтовки остались в прошлом, это оружие было изящным, компактным и имело увеличенный магазин. Одним резким рывком Зуба устранил заклинивание, заглянул в прицел и плавно зажал спусковой крючок.\n\nОчередь автоматического огня без промедления вырвалась наружу, магазин был опустошён всего за пару секунд, и целый рой пуль разорвал учебное чучело в клочья. Тишина, последовавшая за выстрелами, оказалась громче самой стрельбы. В наступившей тишине, пропитанной едким запахом кордита, солдаты с откровенным благоговением ошеломлённо смотрели на Зубу. Сам мани тоже был заворожён, но отнюдь не собственным мастерством – в нём он никогда не сомневался. Нет, его взгляд был прикован к дымящемуся оружию. Столько выстрелов за секунду; такая мощь в копытах одного солдата! Зубу было трудно впечатлить, но это превзошло все ожидания. Один зебра, вооружённый таким оружием, мог бы сдержать в одиночку не меньше десятка противников.\n\nЗуба чувствовал, как сердце бьётся всё быстрее, а адреналин продолжал бурлить в крови. Этот проект оказался бесценным. Пока поезда будут доставлять новые мощные вооружения, а фабрики массово их производить, армию Зонго никто не сможет победить."
 zongo_railway.13.a:0 "На каждого, кто мечтает о мире, найдётся тот, кто жаждет войны."
 zongo_railway.14.t:0 "Путь Зубы, уровень 4" #Snow
 zongo_railway.14.desc:0 "За стенами совета мани собрались в резиденции Зубы, как делали это каждые несколько месяцев. Комната была густо наполнена дымом трубок и приглушёнными разговорами о политике; отчёты со всех уголков растущего королевства были разбросаны по столу. Сам Зуба лишь слушал, потягивая ром, пока остальные хвастались своими мелкими достижениями, и помещение эхом отдавалось звуками голосов самодовольных болванов.\n\nНалив себе ещё порцию рома, чтобы выдержать этот парад тщеславия, Зуба уловил обрывок разговора, прорезавший общий гул. Мани Рутшуру говорил с Змпангу вполголоса, хотя алкоголь, похоже, развязал им языки. — Надо признать, — слегка заплетающимся языком произнёс Рутшуру, — что если дела будут развиваться подобным образом, возможно, мы сумеем покончить с угрозой Мейрконга раз и навсегда.\n\nЗмпангу кивнул, а Зуба медленно сделал глоток. — Кузницы готовы, — он глубоко затянулся трубкой. — И я слышал, что реформы армии снова превращают королевскую стражу в достойную силу.\n\n— Это... весьма щекотливая тема. Они действительно стали лучше, но король не разбирается в военных делах, а его ма...\n\nОдин удар копытом Зубы по столу заставил смолкнуть всех собравшихся. Недоумённые взгляды обратились к нему, но он смотрел только на Рутшуру. — Не смейте осквернять мой дом такими речами, — сказал он низким голосом. — Прочь.\n\nОстальные мани замерли, наблюдая, как лицо Рутшуру покраснело от смеси страха, удивления и негодования. Долгий миг два жеребца смотрели друг на друга. Первым отвёл взгляд Рутшуру. Не сказав ни слова и не извинившись, он развернулся и вышел из комнаты. Один за другим прочие мани пробормотали оправдания и тоже покинули собрание, поскольку праздничное настроение мигом угасло. Вскоре Зуба остался один во внезапно наступившей тишине, чувствуя лишь тяжёлый запах застоявшегося дыма да пролитого рома. Он сделал последний глоток из стакана и отставил его в сторону."
 zongo_railway.14.a:0 "Ужасный вечер... но через месяц всё вернётся на круги своя."
 zongo_railway.15.t:0 "Путь Зубы, уровень 5" #Snow
 zongo_railway.15.desc:0 "Мани Зуба стоял на плацу, наблюдая за тем, как королевская стража вновь проходит маршем перед ним. Форма солдат была опрятной, они в ритм били копытами о землю, держа у бедра современные винтовки. За процессией следовал поезд, на открытой платформе которого возвышалось артиллерийское орудие. Это был не просто военный парад, марш солдат нёс куда более глубокий смысл. Тысячи зонголезцев наблюдали за шествием с обочин, и в их глазах читались не равнодушие, а гордость и доверие. Зуба тоже почувствовал искру гордости. Модернизация Акиды принесла впечатляющие результаты, пусть и невольно. Королевство было в безопасности. Это был миг триумфа.\n\nНо, оглядывая море преданных лиц, в сердце мани зародилась холодная, удушающая мысль. Неужели эта совершенная военная машина теперь обречена служить трону, который не до конца понимает силу, которую породил? Идеализм короля до сих пор удобно совпадал с нуждами армии, но надолго ли? Что будет, когда придёт следующий кризис, а за ним другие? Устоит ли Акида перед угрозами, которых он не мог предвидеть? Не рухнет ли уважение мани к нему? Не вернутся ли они к старым привычкам и не обратятся ли за наставлениями к Нзузи? Или же... в конце концов все они окажутся слабыми?\n\nНыне воцарился хрупкий мир, но никто не знал, как долго он продержится. Пока что Зуба был доволен тем, что просто исполнял свой долг и наблюдал за волнами перемен, катившимися вперёд. И в одном он был уверен: каким бы ни было будущее, у Зонго всегда найдётся место для его гордого сына."
 zongo_railway.15.a:0 "Верность короне, идее или самому себе?"
 zongo_railway.16.t:0 "Путь Танайги, уровень 1" #Ardent
 zongo_railway.16.desc:0 "— Но отец, я...\n\n— Нет, Зира! — гневно фыркнул старый жеребец. — Я запрещаю это! Единственная дочь Злубе ни за что не станет рабыней Зонго! Им не нужны воины или союзники; они лишь хотят, чтобы наши песни были забыты, а история оказалась погребена под их железными дорогами! Я не позволю – агх! — жеребец попытался подняться, чтобы указать на мир за пределами дома, но вскрикнул и схватился за повязки, обмотанные вокруг его ноги. Зира тут же бросилась к нему и, несмотря на слабые протесты, уложила отца обратно на койку. Она попыталась возразить, но снова была прервана. — От них следует ждать лишь лжи да бесполезных подачек.\n\nЗира нахмурилась. — Отец, эти бесполезные подачки приносят еду на стол и доставляют тебе лекарства, — проницательные слова заставили отца замолчать, и она наблюдала, как тот тяжело дышит, пытаясь взять боль под контроль. Каждый его хриплый вздох был почти невыносим для Зиры, но она знала, что в ближайшие дни ему полегчает. — Повезло, что в бою с Зонго тебе прострелили только ногу.\n\nОтец фыркнул. — Они должны были оставить нас в покое. Мечты жрицы Дары...\n\n—...относились к Танайге, которой больше нет, — перебила его Зира. — Мечты не прокормят нас, отец. Мир изменился, и мы должны измениться вместе с ним, — за этим последовало долгое молчание, и Зира перехватила взгляд отца, устремлённый на отброшенную в угол комнаты винтовку. — Если воин Злубе сражался за прошлое Танайги, то теперь строитель Зира должна бороться за её место в будущем.\n\nОтец открыл рот, но слова застряли в горле под взглядом дочери. Злубе видел в её глазах, унаследованных от матери, решимость, не уступавшую его собственной. Он вздохнул, понимая, что решение уже принято."
 zongo_railway.16.a:0 "— Ты и вправду моя кровь. Столь же упрямая до невозможности."
 zongo_railway.17.t:0 "Путь Танайги, уровень 2" #Ardent
 zongo_railway.17.desc:0 "Зира вытерла пот со лба, выступивший из-за тяжёлого труда и удушающей влажности, вызванной палящим солнцем. Оказалось, что строительство и индустриализация на деле куда труднее, чем она думала. Каждый день на протяжении последних недель она работала бок о бок с молодёжью Танайги, возводя фундамент их будущего. Благодаря бетону и рельсам их родина должна была обрести роскошные дары современности, обещанные королём.\n\nБазары превратятся в торговые центры, где будут продаваться многочисленные и качественные вещи. Учёные и исследователи со всей Зебрики захотят приехать сюда. Импорт и экспорт будут процветать, появятся лучшие лекарства для её отца и, возможно, даже... — Перерыв окончен, Зира! — крик прораба быстро вырвал её из грёз.\n\nСделав быстрый глоток из фляги, зебра вновь схватила инструменты и поспешила обратно. — Иду! — У них было будущее, которое нужно построить, и оно не станет ждать ни её, ни кого-либо ещё..."
 zongo_railway.17.a:0 "...Ей оставалось лишь заставить свои копыта перестать дрожать."
 zongo_railway.18.t:0 "Путь Танайги, уровень 3" #Snow
 zongo_railway.18.desc:0 "Зира шла по Танайге, наслаждаясь зрелищем преобразившегося поселения. Новые акценты и запахи наполняли воздух, вдалеке слышался стук очередной стройки, а вид инструментов и тканей на прилавках радовал глаз. Вот она – современность!\n\n— Хм, — проворчал старый зебра. — Халтура. Построено слишком быстро. Видишь эти трещины? Они не учли сезон дождей, — да, действительно. — Всё поселение смоет, говорю тебе, — Зира вздохнула, но промолчала. С каждой претензией её уши опускались всё ниже. Первоначальный энтузиазм постепенно угасал. От конструкции колодца до расположения скамеек – ничто не избежало его насмешек. Зира надеялась, что они смогут просто провести день вместе как отец и дочь, чего не делали со смерти матери... но, похоже, она хотела слишком многого.\n\nВ надежде закончить день без новых жалоб она отвела его в знакомый ресторан, который они посещали, когда она была ещё кобылкой. — Вот это качество, — оживился отец. — Радует, что зонголезцы ещё не успели испортить всю Танайгу, — повисло напряжённое молчание, пока они ждали еду. Зира была слишком уставшей для продолжения споров. Когда еду подали, они приступили к трапезе, не сказав друг другу ни слова. Отец выглядел озадаченным после первого кусочка, но продолжил есть. Когда Зира пошла оплатить счёт, она услышала, как он говорит хозяину: — Скажите, вы добавили что-то новое в рецепт? На вкус иначе, чем я помню.\n\n— Ах, да! — жеребец вернулся из кухни с незнакомой приправой. — Она прибыла на последнем поезде снабжения. Из Зупинамбы, кажется.\n\nОтец Зиры вздрогнул при этих словах, но удержался от немедленной критики. — Это... допустимое дополнение. Достаточно хорошо скрывает горечь местных клубней, — он больше ничего не сказал, но, заметив пустую миску в его копытах, Зира не смогла сдержать улыбку."
 zongo_railway.18.a:0 "Пожалуй, поездка всё же была не напрасной."
 zongo_railway.19.t:0 "Путь Танайги, уровень 4" #Snow
 zongo_railway.19.desc:0 "Когда дверь со скрипом открылась, Зира едва держалась на ногах, а её рабочая одежда была заляпана грязью. Зебра даже не дошла до стула, а просто опустилась на пол с глубоким вздохом. — Ещё один, — выдохнула она. — Как только мы закончили расчищать прошлый обвал, случился ещё один внезапный паводок. Смыл целый склад оборудования... и мне "повезло" оказаться среди тех, кто должен был решать эту проблему. Она попыталась подняться снова. — Пап, извини за беспорядок, я сейчас всё уберу.\n\nЕё отец некоторое время наблюдал за дочерью из кресла. В комнате стояла тишина и единственным звуком, нарушавшим её, был звук капающей с одежды на пол воды. С тихим ворчанием пожилой зебра поднялся и, прихрамывая, направился к её кровати, вернувшись с чистым полотенцем. — Вот, дорогая. Вытрись-ка этим, — сказал он на удивление мягко. — А беспорядок оставь мне. Тебе нужно просто отдохнуть, — он развернулся и, прихрамывая, пошёл за шваброй.\n\nА затем его голос снова принял привычный в последние дни ворчливый тон. — Я же говорил, работа этих зонголезцев никуда не годится! — пробурчал он, но его слова не были ровней буре, ставшей причиной сегодняшних бед. — Они знают свои леса, но не наши! И пока зонголезцы думают, что Танайга – всего лишь продолжение Зонго, как они считали двести лет назад, эти предрассудки будут дорого им обходиться.\n\nЗира умылась и открыла рот, готовясь возразить. Но вид отца, терпеливо готовящегося убрать принесённую её грязь, остановил молодую зебру. Раздражение дня растаяло, уступив место мысли, которая заставила её хитро улыбнуться."
 zongo_railway.19.a:0 "— Тогда, пожалуй, пора познакомить их с тем, кто действительно знает Танайгу."
 zongo_railway.20.t:0 "Путь Танайги, уровень 5" #Snow
 zongo_railway.20.desc:0 "Строительная площадка как никогда кипела активностью: каждый рабочий изо всех сил старался поспевать за старым жеребцом, командовавшим ими, словно сержант новобранцами в армии. Злубе стоял на краю недавно расчищенного участка, опираясь на трость и указывая копытом на рощу деревьев выше по склону. — Оставьте их. Срубите – пожалеете.\n\nЗира и её начальник, который лишь кивал да делал пометки в блокноте, шли следом. В редкий момент паузы между командами Зира подошла к отцу с насмешливой улыбкой. — Кажется работа пришлась тебе по душе, папа? Кто-то говорит, что старые жеребцы только и могут, что жаловаться, но с тобой совсем другое дело! Ты жалуешься продуктивно!\n\nЗлубе фыркнул, а она захихикала, и жеребец отвернулся. Начальник поднял глаза от записей и посмотрел на отца с дочерью. — Сэр, если говорить откровенно, — он закрыл блокнот. — Было бы крайне полезно продолжить сотрудничество с вами. Мы могли бы предложить вам официальную должность: никакой тяжёлой работы, только консультации. Уверяю, оплата более чем достойная.\n\nЗлубе уже было открыл рот, чтобы отказаться: он был воином, а не каким-то там советчиком! Но, взглянув на Зиру, он заметил её улыбку. В последнее время она так редко улыбалась, а сейчас её лицо озарила та самая улыбка прямиком из юности. Она так долго кормила их двоих своим тяжёлым трудом... разве честь воина важнее чести отца?\n\nПожилой жеребец тяжело вздохнул. — Ладно, — пробормотал он. — Но только чтобы не позволить вам, бестолковой молодёжи, затопить всю долину, — он посмотрел на начальника. — Но я хочу официальную бумагу со всеми подписями и печатями. И я не работаю под дождём – старые раны, что вы, зонголезцы, мне оставили, дают о себе знать, — его горделивая осанка дрогнула, когда дочь внезапно крепко обняла его, а затем быстро отстранилась, заметив взгляд начальника. Тот усмехнулся и ушёл, а кобыла покраснела. Придя в себя, Злубе посмотрел на оживлённую стройплощадку и с удивлением понял, что и сам хочет улыбнуться."
 zongo_railway.20.a:0 "Старые пути нашли своё место рядом с новыми."
 zongo_railway.21.t:0 "Melahaka Line Level 1" #Ardent #TODO #Up for Revision 
 zongo_railway.21.desc:0 "Another swig of fruit juice ran down Kenze's throat before begrudgingly he opened his eyes again. Everything spanning the Peaceful Seas now came to his mind with a roiling, bitter knowing Melahaka's independence was gone. Two-hundred years...undone. Kenze capped his canteen and slammed it down on the rickety table.\n\n"Was 200 years not enough?!"\n\nHis anguish echoed over the calm waves, his canoe just the distance offshore where nozebra could hear him. Kenze spit off the side and recalled the history of Melahaka and its two centuries of sovereignty. Were there any older generations of zebras that could claim they remembered when Melahaka belonged to Zongo? Or were those wistful longings repeated until they became nostalgia for a time present-day Zongolese never had?\n\nKenze ran his hoof through his mane and sighed, idly prodding his oars. He had done all he could with himself and his canoe acting as a blockade runner. Would it have made a difference if he joined Melahaka's navy or its Chargers? Could there have been a different outcome if he somehow did more and made the entirety of Zongo stop and reconsider their military invasion?\n\nA sad smile crept on Kenze's face before he opened his eyes to take in the morosely sight of his distant homeport and its fluttering Zongo flag. Two hundred years of independence was sadly not enough."
 zongo_railway.21.a:0 "There was nothing they could do."
 zongo_railway.22.t:0 "Melahaka Line Level 2" #Ardent #TODO #Up for Revision
 zongo_railway.22.desc:0 "CLASSIFIED MESSAGE\nSUBJECT – Royal Guard Integration\nSTATUS - Ongoing\n\nInitial efforts to integrate the Chargers of Melahaka into our ranks yielded subpar success on account of each warrior still being devoted to their vanquished nation. This commitment alone is admirable in its own right, but the Royal Guard has thus resorted to a method beyond generous offers and promises in order to achieve the stated objective of Charger integration.\n\nPut simply, an individual Charger of Melahaka is brought to our training facility and subject to fight an unarmed Royal Guard with their bare hooves (under watch of armed Royal Guards and medical staff of course). The Charger is then either beaten or pummels the Royal Guard likewise. Another Royal Guard is introduced if the latter is reached and the process repeats.\n\nOnce the Charger nears defeat, the overseeing Royal Guard officer approaches them and offers basic amenities in exchange for the Charger's service in the privileges of the Royal Guard's ranks.\n\nThis approach has yielded a 90-percent integration success. We are currently refining this integration method for mass-adoption and efficiency.\n\nEND MESSAGE"
 zongo_railway.22.a:0 "Guess force is sometimes the only way"
 zongo_railway.23.t:0 "Melahaka Line Level 3" #Ardent #TODO #Up for Revision 
 zongo_railway.23.desc:0 ""Careful now! Careful!"\n\nS'zow watched the clumsy zebras knock over a supply crate and the ensuing loud domino effect of the crate they were hauling also dropping. The fumbling zebras quickly froze when they caught S'zow's glare before they quickly snapped and got to cleaning up the materials spilled everywhere. S'zow held his glares for a moment before exhaling, his prying away the itch in his left hoof for his sidearm.\n\nHe was the overseer on development for Zongo's industrialisation efforts on this island. This entailed not only him using his previous knowledge on the Melahaka's ecosystem, but also trying how best to exercise his managerial skills with the local workers. S'zow knew better than to simply point and demand like he had seen many other overseers lazily do, but by Zongo did he feel his irritations bubbling up. Topping it all, his own higher-ups continued to pour on more and more deadlines with each new supply delivery.\n\nS'zow huffed and went back to overseeing this ragged shift. It felt wrong to blame these zebras for their ignorance and his higher-ups for their demands after having glimpse at the scale of Zongo's entire plan for industrialisation. Did it all have to be done so quickly? They still were delivering results as intended, but still...\n\nOne zebra he oversaw approached him timidly with an envelope, and S'zow composed himself with a sigh. "Yes?"\n\n"Ah, Overseer Mokenzeli wished to inform you that you'll be taking over his shift while he's in Twizanbwe," the zebra said. The envelope was snatched and torn open in under a second. "He said something about a medical procedure for zebras his age?"\n\nS'zow blazed through the letter and gnashed his teeth."
 zongo_railway.23.a:0 "The itch to pull his trigger at something grew stronger."
 zongo_railway.24.t:0 "Melahaka Line Level 4" #Ardent #TODO #Up for Revision 
 zongo_railway.24.desc:0 "The first time in what felt like forever, in strolled the corrections officer with the same bored expression she had when she left him in this prison cell to begin with. The zebra colt felt his rebellious instincts temper to the painful echoes of the room's incessant speaker system. "Do you swear to the Crown that your declaration is true and nothing but the true?" she asked.\n\n"Yes Principle! I am Zongolese! I swear it this time!"\n\n"That's what you said last week after you painted graffiti on the playground," the Principle (not actually a corrections officer) rolled her eyes. "Look, I know how much Melahaka means to us, but things are different now. You and I are both Zongolese, as the powers above our heads have deemed it. It's not as bad as you make it do be."\n\nShe led him out of the library detention room (sort of like a prison cell) and into the hallway where his peers went about to after school clubs. "Be lucky you're still a colt for one more year. Otherwise you'd be sentenced to horsewording school somewhere in Zongo."\n\nHe stilled at the admission. This was the first time he had heard of such thing. Maybe it was a new edict? "W-would I ever come back?"\n\n"Not until you write over a million sentences."\n\nThe colt remained silent and small as he was escorted out of the school."
 zongo_railway.24.a:0 "I am Zongolese!"
 zongo_railway.25.t:0 "Melahaka Line Level 5" #Ardent #TODO #Up for Revision 
 zongo_railway.25.desc:0 ""What do you mean there are new docking regulations?!" Captain Barakabad stomped his hoof. "Melahaka's docking traditions maintained fairness and efficiency for over two centuries!"\n\n The radio operator maintained his station. "Captain, they're saying Zongo decreed new regulations to allow for bigger trade ships."\n\n"No more regulations?! Outrageous! Absurdity! How did Zongo expect to uphold the distinction and honor of seafaring admiralty?!" Captain Barakabad glared out the port window of the ship and over to the Trade-Port in the distance.\n\nThe radio operator listened and looked to the Captain. "Sir, they told me there's a dock opening in about five minutes. But we have to give way to a Feathisian cargo ship."\n\nCaptain Barakabad opened his mouth to say something until the corner of his eye spotted another large convoy vessel on their broadside begin to slowly surge forward towards the Trade-Port. Immediately he dashed forward and grabbed the intercom speaker.\n\n"All hooves on deck! Ramming speed! Don't let that ship take our rightful place!"""
 zongo_railway.25.a:0 ""Commerce flow is nominal. All is well," reported the dockmaster."
 zongo_railway.26.t:0 "Roam-Zeblu Line Level 1" #Ardent #Up for Revision 
 zongo_railway.26.desc:0 "Melozi stormed into the hidden room with her rifle readied and trigger eager to pull. She knew this abandoned warehouse outside of Talissa was hiding something, much to the indifference and ridicule of her teammates who let her search the building alone. The forces of Zongolese were hunting down and rounding up the remnants of the Assini militias and their Legionnaire soldiers. Despite being of Zeblu herself, Melozi was quick to join the volunteer teams hunting down these remnants; if they were still resisting after so long, it was clear they had reason to hide.\n\nHer eyes locked onto the unkempt face of a uniformed Legionnaire in the room's far corner - and was also beset by dozens of little eyes between them. He had surrounded himself with foals. Melozi's mind reeled in fury. "You!—"\n\n"Don't kill Mr. Marsil!" a little voice cried out.\n\n"Tasi get back!" the Legionnaire ordered fiercely. Melozi observed the Legionnaire zebra quickly wade through foals and place himself protectively with spread hooves between her rifle and the little ones, his eyes clearly tired. "Don't shoot...not here... it will scare them."\n\n"Eh?!" Melozi kept her rifle aimed, but a few foals dashing to cling to the Legionnaire's armored haunches made her step back. "W-wha—"\n\n"Do you have any means to transport these foals to safety right now?"The Legionnaire asked. Melozi fought through her stupor to speak. "No, we—"\n\nHer radio speaker flared to life. "Melozi, you done there? Over." The Legionnaire's eyes in front of her flashed to the radio for a moment before meeting hers again, his voice a whisper. "Return when you can take these foals to safety. I promise we will stay here. I will not leave them."\n\nMelozi glared incredulously at the Legionnaire, the little herd of foals suddenly pressing themselves closer behind him. With a shaking hoof, she finally answered her radio."
 zongo_railway.26.a:0 ""Melozi here... heading back. Over.""
 zongo_railway.27.t:0 "Roam-Zeblu Line Level 2" #Ardent #Up for Revision 
 zongo_railway.27.desc:0 "Melozi watched the foals running in and out of the warehouse's open hangar door. They brayed and trotted without a care as they chased each other and rolled about in the dirt while a few other little ones watched on. Briefly, her eyes could track the bright little ball she brought for them to play with before it was thrashed around by their hooves.\n\n"What of their parents?" she asked, leaning her rifle against the wall.\n\n"Dead," the former Legionnaire said, having sat on a chair next to her. "They attempted to stage an escape as Zongo's forces moved in."\n\n"So you killed them."\n\n"No... no..." Melozi glanced down at him and witnessed perhaps the most un-Legionnaire thing she ever saw: he was burying his face in his hooves. "I told them not to. Told them to wait for the Zongolese to come free them, but they charged me and knocked me out." Marsil gestured at the foals. "When I came to, my centurion was preparing to 'finish the rest' he said."\n\n"So you killed him."\n\nShe could practically hear the despondent smile in Marsil's voice as he spoke. "I was a terrible Legionnaire," he finally whispered. "And now I am a traitor. When other troops find me, they will either execute me or... by what you said they sometimes re-integrate low-risk prisoners into their auxiliary forces." He spoke weakly. "It would be a way to provide for them."\n\n"No." Her words came as her thoughts had not yet formed. "You don't need to carry that burden anymore, you... you have another duty now. They need you alive and present." She held his gaze for a long moment in silence and then turned back to the playing foals, her voice softening."
 zongo_railway.27.a:0 ""You were one of the good ones.""
 zongo_railway.28.t:0 "Roam-Zeblu Line Level 3" #Ardent #Up for Revision 
 zongo_railway.28.desc:0 "What on Zeblu was she doing? Why was she still here in Maressapa visiting this little warehouse just outside Talissa? Melozi sighed and trotted up to the decrepit structure, lugging behind her a cart of snacks and hay bushels.\n\nThe door ahead swung open and outpoured the little zebra foals rushing her. "Miss Melozi!"\n\nShe rebutted her loathing, 'That's why.' Melozi smiled and she greeted the foals as she began handing out the food she brought them. "Miss Melozi! Mister Marsil told me not to tell you he said thank you for the cleaning stuff you gave him."\n\nMelozi couldn't help but laugh and bent down to level with the foal, "Well then don't tell him I have a big surprise to share when I see him." She expected nothing less when the little foal nodded eagerly and sprinted off with her snack to do exactly the opposite.\n\nLater on, she was sitting across from Marsil now cleaned up and dressed in the clothes she 'loaned' him. "You... bought this property."\n\nMelozi smirked. "Yes, all this industrialisation has brought so much opportunity, even out here in Talissa. The new growth means lumber and supplies are cheap. We are also so far enough away that we don't deal with any of the bad aspects, so that's a plus." She beamed proudly and conspiratorially as the new landowner. "You know what that means?"\n\nMarsil smiled hesitantly. "What?"\n\n"It means a dirty ex-Legionnaire is staying on my property without paying me!" Melozi laughed. "Since these little ones won't let you leave and I'm a simple harbinger of their wishes," She took a bow as Marsil rolled his eyes. "I guess you'll have to earn your keep. Starting with repairs."\n\nMarsil chuckled, "What? Did you already order the supplies too?" Her silence was his answer; and the shipment order receipt she passed him. He took it, his expression soft yet serious. "You've given us a future, Melozi. I won't squander it."
 zongo_railway.28.a:0 "Her heart seemed to skip a beat."
 zongo_railway.29.t:0 "Roam-Zeblu Line Level 4" #Ardent #Up for Revision 
 zongo_railway.29.desc:0 "The Maressapa Foster Home was fully up and running, its shanty warehouse transformed into a clean, remodeled homestead. The two of them walked the fenceline in a comfortable evening silence, the foals finally burned out from their play.\n\n"You never told me your story," Marsil said, breaking the quiet. "I didn't think a Zebluan could change sides so easily." He seemed to rethink his words as soon as they had left his mouth. "I-I didn't mean..."\n\nMelozi was quiet for a long moment. "I was seventeen when the first war ended," she began, her voice low. "I was a brash foal who didn't know anything but fighting. I survived both conflicts unscathed, but Zeblu didn't. When the recent war ended and Zongo recruited locals... I didn't want to join them. But I didn't know how to do anything else. It was just survival at first. But now..." She stopped, looking back at the home they'd built. "Now it's different. That work pays for all of this. I'm doing it for a better future. For them."\n\nMarsil listened intently. "You're a better zebra than I am, Melozi. To turn your service into something so... noble. I wish I had your courage."\n\nHe had thrown his life away for these foals, yet still carried the weight of actions he couldn't have stopped. She wished he could see the nobility he carried so effortlessly. "You have your own kind of courage, Marsil," was all she could muster. He shook his head with a self-deprecating smile. Melozi spoke before he could. "Don't discredit what you've done. It's because of you they are still alive."\n\n"And... you as well," Marsil said, looking down. "You didn't shoot me that night. I wouldn't be here if you did. Thank you for that, Melozi." He held his head high and closed his eyes with a smile. Melozi continued to look at him. He still couldn't see it, but she was determined to prove to him that he had worth. Not only to these foals..."
 zongo_railway.29.a:0 "...but to her."
 zongo_railway.30.t:0 "What Sound Does a Train Make? (5/5)" #Ardent #Up for Revision 
 zongo_railway.30.desc:0 ""Choo! Choo!"\n\nMarsil smiled as the foster foals erupted in giggles. He kept a watchful eye on the group while Melozi took the lead. They had come to the city to allow the little ones, and himself, their first experience outside of Talissa for once. The loud whistle of the approaching locomotive caused the foals to cheer, but Marsil flinched at the deafening noise, his eyes wide as he took in the massive, smoking machine. "First time out in a while?" Melozi teased, nudging him. She seemed completely at ease amidst the station's chaos. "Don't worry, they don't bite. Much."\n\nBefore he could form a rebuttal, the conductor approached. "Mister Melozi, correct?" Marsil turned towards him, still looking dazed. "I've reserved a passenger cart for your group, as the miss requested," the conductor explained. "A complimentary meal will be served mid-journey. Please try to keep the seats clean."\n\n"Alright! Everyzebra, line up single-file!" Melozi called out, her voice cutting through the noise. The conductor excused himself, and Marsil found himself even more shocked than before. She expertly began herding the foals toward their carriage while Marsil fumbled to help, still a bit overwhelmed. "Come on," she said to him with a grin, "Try to keep up."\n\nAs he stepped onto the train, his annoyance quickly turned to surprise as Melozi pleasantly ambushed him with a kiss. "Come on," she said, her face flushed but her expression confident. "The ice cream is gonna melt if you keep being that slow... Mister Melozi." As she ran inside, Marsil stood flabbergasted for a moment before rushing after her into the cabin. As the train pulled away and the two zebras acted like foals again, it seemed their pasts were left further behind with every turn of the wheels. For this moment, the world seemed a bit less heavy."
 zongo_railway.30.a:0 "Choo choo!"
 zongo_railway.31.t:0 "Tampuk Line Level 1" #Snow 
 zongo_railway.31.desc:0 "Destruction and chaos were all that remained of the Golden City. Where the Talarayi once kept their ways and honoured the Thunder Tiger in peace, there was now only a silent, scorched city. The Tiger was gone. The people were gone. In his long life, Dalisay had heard the cruelty of the Kompel invasion – the pillaged temples, the fallen warriors. But they seemed tame, almost respectful compared to this. They left bodies to bury and spirits to appease. This... this was an erasure.\n\nDalisay walked the empty streets of his vanished home. He had been at Tud Bukole when the war began. He had marched day and night without sleep, but he could not be faster than destruction. Now, as he wandered the husk of his city, he was denied even the final mercy of finding the bodies of his comrades. All but the sturdiest of buildings had been disintegrated in the blast from the Tiger's final roar – a divine punishment upon his people for their failure, and a personal punishment upon him for his absence.\n\nBut even that divine punishment had proven fleeting. No, Dalisay was still being punished now. His rage was not for the Tiger, whom they had failed. It was not for his comrades, who had died with honour. It was not even for himself or the enemy who had wrought this.\n\nIt was for the iron beasts now subjecting his land to its final mockery. As the Zongolese railways advanced, their steam whistles screamed unbothered by the sacred land they desecrated or the graves of his people they built over. They were not just conquerors; they were architects of forgetting, hammering their tracks into the sacred earth, ensuring that not even the memory of what was here could remain undisturbed.\n\nHe could not cry or scream. All he could do was watch as he lost all he once knew as home."
 zongo_railway.31.a:0 "Tampuk died with a blast, the Talarayi die with a whimper."
 zongo_railway.32.t:0 "Tampuk Line Level 2" #Snow 
 zongo_railway.32.desc:0 "Masikap was scared, he had not been more scared in his entire life.\n\nDimasupil had warned their people that these iron beasts were for the warriors of Maglibing alone, and that for a common creature to step into one would be a challenge to his authority. It meant disrespect to one's family and even the spirits... But Dimasupil was gone now. So was the great spirit. Masikap's family was all that remained from these horrible times.\n\nBut how long could they remain safe? With the Zongolese taking charge, working merely to survive was no longer an option. Now you had to earn 'money' to 'buy' things and even pay 'taxes' on them. Masikap was accustomed to foraging for what was needed and trading for some extra goods when he could, but now they had to integrate into what seemed to be a whole different world.\n\nHis mother was sick, his father had been crippled protecting their lands, and his two little siblings were still foals. As the strongest and oldest of the siblings, Masikap was the one who had to provide. He had been offered work down south to help reconstruct the Golden City after the destruction from the Thunder Tiger's roar. This was the best opportunity he had found, so he planned to march there. However, he was told he had to arrive in two days for the offer to stand. It was an impossible journey, unless... he boarded one of their trains.\n\nMasikap truly was scared, to do this was to go against everything he had been taught... to refuse meant giving up on his family, and that was something he refused to do. He finally extended a leg and brought himself inside the iron beast."
 zongo_railway.32.a:0 "Change is scary... but giving up is even worse."
 zongo_railway.33.t:0 "Tampuk Line Level 3" #Snow 
 zongo_railway.33.desc:0 "Dalisay watched from the edge of the city as another train, belching smoke and noise, shuddered to a halt. From its carriages emerged a stream of zebras – thin, wide-eyed, and clutching meager bundles. More were coming south now, Zongolese, Maglibing and other tribes from all around. Not with weapons, but with tools, seeking opportunity in the skeleton of the Golden City.\n\nHe hadn't seen movement like this in the city since before the Roar. Frankly, even then, it had never been this crowded, not with this constant stream of workers flowing in and out. The Kompel came as pillagers. The Zongolese came as a cataclysm. But this? This was a quiet migration, a current of life flowing back into a land he thought had died. It was a strange sight, and it felt... fragile.\n\nHis gaze drifted over the crowd, settling almost without intent on a young stallion. He moved with determination, yet with clear anxiety. His eyes scanned the chaotic site not with fear, but with a fierce, focused need. He marched as if he carried the world on his back, his body clearly crying for rest, his eyes tired and scared. Everything about this stallion seemed like a walking contradiction... and yet, he was here. Looking for work like all the others. Looking to rebuild what was lost. Looking just to... live.\n\nAs the crowd walked into the city, Dalisay felt an old, almost forgotten feeling, something he expected to never feel again. It wasn't joy, but the absence of a certain despair. The Zongolese may have been the reason the city was destroyed... but they have not let it remain in ruins. Foals now studied under Zongolese priests, creatures sought aid from doctors instead of shamans, and all worked no longer for simple subsistence, but to find their place within a new system. The Golden City was not healing. It could never heal from what had happened – but it was, unmistakably, continuing. And for now, that was enough."
 zongo_railway.33.a:0 "Even amidst tragedy, life marches on."
 zongo_railway.34.t:0 "Tampuk Line Level 4" #Snow 
 zongo_railway.34.desc:0 "As the head scientist in charge of ensuring the engineers and builders could work with no issue, Nailah's tent was a warzone of parchment, snapped saw blades, and samples of unnervingly resilient foliage. The rails had been avoiding the thickest patches of jungle whenever possible, zigging and zagging around to ensure they could be built. Her job was to find a way to simplify their work. Make the jungle submit to modernity, whatever the cost. She had attempted stronger saws, hotter fires, and more powerful chemicals, yet the jungle swallowed every effort, its magical regrowth making a mockery of their progress. They were fighting the land itself, and losing badly.\n\nExhaustion finally claimed her as she laid back in her chair. She stopped trying to cut and simply observed the nature outside. She watched how the vines served as a reinforced ceiling for the jungle's creatures, how the root systems created a natural foundation more stable than any concrete pilings.. her eyes went wide with recognition as she finally understood. This didn't feel like an "I got it!" moment, but a surrender to the obvious she had tried to ignore in favor of more traditional methods. She wasn't looking at an obstacle; she was looking at a partner.\n\nScrambling for a fresh sheet of parchment, her quill flew. The plan was no longer to conquer, but to integrate. They would use the living wood as natural support beams for structures, follow the rivers as a safe spot and utilise whatever other mechanism the jungle used to protect itself as a way to assist modernity. They could protect the land's heart while still laying rails and raising buildings. It wasn't a compromise, she told herself; it was a superior form of engineering!\n\nShe went to reach for a cigarette to congratulate a job well done, but stopped as a cut vine on the table seemed as if glaring at her. She sighed and put the pack in her pocket again. It was best to not annoy a grouchy roommate."
 zongo_railway.34.a:0 "Respect goes both ways."
 zongo_railway.35.t:0 "Tampuk Line Level 5" #Snow 
 zongo_railway.35.desc:0 ""Dalisay stood before an open carriage door. This was the threshold he had watched so many cross day after day, the iron beast he had resented as the ultimate symbol of desecration. Now, he too, was stepping into it. He felt horribly afraid and disgusted with himself. He breathed in and out, attempting to calm himself, but to no avail. Perhaps it was best if he—\n\n"Breathe. Not fast, but slowly. Isn't that what you always tell me?" The young stallion looked at him from behind. They had been... talking, ever since he arrived. It may have been folly, but he felt he had to, as if Masikap called to him. "Hey? Are you alright? If this is still too hard we could – oh! Wait, don't pull me that hard!" What? Was he... moving? Like a splinter being pulled from his hoof, with one swift jump they both found themselves inside. Masikap laughed. "See, it's just like I told you! Come on, let's find our seats." Now it was Masikap that pulled on him, as they went further inside.\n\nAs the train pulled away, Dalisay expected to feel a jarring violence, the land screaming as it was carved. Instead, he felt only a smooth, powerful glide. He watched the world stream past the window, a testament to a new era. Jungle and city were no longer at war; Zongo's authority flowed alongside the landscape. Gleaming buildings of polished stone and living wood stood where tribal camps once were, all connected by this pulsating network of rails. This was not the conquest he had witnessed, nor the cataclysm he had survived. This was the "continuing" he had observed, now matured into something profound.\n\nThe Zongolese had not tamed the land, nor had they destroyed it. They had listened to it. The industrialisation he had feared had found harmony, not in submission, but in symbiosis. The balance he saw here contrasted with the far away factories billowing smoke. This arrangement was not perfect, but Dalisay could no longer deny that the Zongolese had brought civilisation with them.\n\nWordlessly, Masikap's hoof found his. He looked towards the blushing stallion and smiled before turning his view back towards the passing scenery, giving his hoof a tight squeeze.he balance he saw here contrasted with the far away factories billowing smoke. This arrangement was not perfect, but Dalisay could no longer deny that the Zongolese had brought civilisation with them."
 zongo_railway.35.a:0 "To move forward, together."
 zongo_railway.36.t:0 "Naugdaw Line Level 1" #Snow 
 zongo_railway.36.desc:0 "The sound of hammering filled Barko Gecit. Engineers and workers ran about, debating how best to integrate the new plans into the settlement. The tribes were still very wary of the Zongolese, but that was to be expected. Yet, progress would not be stopped; Aamiina would ensure that… even if these roots were proving to be a nuisance.\n\nThe hyena stood watching as the zebras worked. They had been trying to clear the street to keep the construction on schedule. She sighed as she lit a cigarette. Some workers were supposed to be bringing the heavy equipment to deal with it at lea—\n\n"STOP!" Aamiina jumped, biting down hard on her cigarette at the sudden scream. She looked to find the source and saw a zebra, not dressed like a worker, running towards them. "It's a foal's errand to try and cut down the [blank]! They were here long before the Naugdaw and they're still there for a reason! You're lucky they haven't attacked you!"\n\nAs the mare caught her breath, Aamiina felt the stress of the day rising. "A local, I assume," she snarled. "Got any bright ideas on how to get through this, then? We need access to the next street, but you Naugdaw built this settlement like a damned labyrinth."\n\nThe mare didn't seem bothered... a knowing smile was plastered on her face. Her eyes shone as she began to speak."
 zongo_railway.36.a:0 ""Well, since you asked... I actually have a lot of them!""
 zongo_railway.37.t:0 "Naugdaw Line Level 2" #Snow 
 zongo_railway.37.desc:0 "Aamiina trailed behind the mare – whom she had come to know was called Ligaya – as they ran around the settlement. While she was still sceptical towards her methods, she was also curious. Her crew who had cut their way through many other regions, had simply proved useless against this jungle; yet, Ligaya promised she could deal with all their issues.\n\nLigaya chirped, pointing to some baskets of a pungent fruit. "I had some friends of mine gather these! The Saurians find them irresistible. I brought Dakila and Kidlat to help!" Beside her stood two giant lizards. Aamiina went to raise a question but was cut off as Ligaya pointed them towards a muddy incline from the riverbank. Where zebra were struggling to haul up heavy sacks of wet sand, the Saurians, with their clawed feet, climbed the slope with ease. "We'll just have to take them back home later; my friend's foal cries if Kidlat is away too long."\n\nThey soon moved to another part of the settlement, where canals had proven a great inconvenience. Aamiina had planned to get a bridge constructed at one of the shallower crossings, yet Ligaya... simply led two giant turtles across it, carrying the needed equipment. "The Chelonids are essential for traversing the city!" Ligaya explained brightly. "They'll make this far simpler than having to build a new bridge. They're also very cute!" She massaged the chin of one of them.\n\nLater, back at the site of the obstructive roots where they had first met, Ligaya had yet another plan. "These little guys are not to be cut, they're friends!" she explained, patting one like a pet. "Why fight them when we can ask for their help?" Aamiina opened her mouth to argue... but the words died in her throat. Even before Ligaya directed her crew to do this new idea of hers, Aamiina knew it would somehow work and prove her wrong once more. Slowly, she took a drag of her cigarette. "This jungle seems like another world..." she muttered. "None of this should work...""
 zongo_railway.37.a:0 "Yet... it did." 
 zongo_railway.38.t:0 "Naugdaw Line Level 3" #Snow 
 zongo_railway.38.desc:0 ""Aamiina found Ligaya not at one of her usual places, running around and getting things done, but on a newly finished platform overlooking the Barko Gecit. While for the hyena this was just another city, for the mare this was home. The plan had been a success in the region; factories were running, trains connected the region to Zongo, everything had gone perfectly and Ligaya had been a great help to ensure it... yet, right now she seemed almost wistful.\n\n"It really is beautiful," Ligaya said, pointing towards the settlement. "It's already grown so strong in so little time. I wonder how much more we—" She was interrupted by a dry cough as she turned her head away. Aamiina had walked up to the railing and stood beside the zebra, yet didn't look over.\n\n"That's a new sound from you. Didn't expect you to pick up smoking so quickly," she said as she lit a cigarette. "I ain't sharing, by the way."\n\n"It's... nothing," Ligaya insisted, her voice regaining its usual brightness. "The changing seasons always get to me." She raised a hoof once more. "There'll be new equipment arriving tomorrow, from what I heard. I wonder if it'll be anything new."\n\nAamiina watched her as Ligaya gazed into the skies. This little upstart who had been bothering her ever since she had arrived; she was loud, annoying, and frankly, too cheerful... yet, she had also been a great help. Without her, Aamiina would have surely kept banging her head with methods that would never have worked in this land. Aamiina considered herself a pretty smart hyena, yet, looking at the mare she could see someone who was undeniably, frustratingly... brilliant."
 zongo_railway.38.a:0 "Smoke filled the skies, coming from more than just the cigarette."
 zongo_railway.39.t:0 "Naugdaw Line Level 4" #Snow 
 zongo_railway.39.desc:0 "The hyena stood supervising as the workers hammered the last bolts connecting the newest railway expansion. The project had been scheduled for completion a full month later, but it was finished far faster, thanks to a certain mare Aamiina had been seeing a lot of lately. "You know, you don't really need to be among my crew working the equipment directly," she said, approaching the sweating Ligaya. "You've already been promoted a few times. You can take a break and just ensure it goes well from the sidelines."\n\n"Well, what better way to motivate your fellow workers than to show them how it's done? Besides," she added, making a gesture as if to show off her muscles, "I may not have arms like you, but if I did, I'm sure they'd be very toned." She giggled, but the sound was quickly overtaken by a coughing fit. These had become common over the last few weeks, so much so that even Aamiina was prepared for it. She wordlessly offered a water bottle.\n\n"T-Thank you, but I'll be fine, really," Ligaya insisted.\n\n"You've said that the last few dozen times, and you don't seem to be getting any finer," Aamiina snarled to herself. "Look, I don't wanna get all over your business, but you ought to be more honest with yourself. Otherwise, all you're gonna find is an early grave." The hyena looked at the downcast mare and sighed. "What I'm trying to say is... we care about you here. You've helped us a lot. Hell, you've... you've helped me a lot, okay? I don't wanna see you torture yourself."\n\nLigaya looked up after a moment and took the water bottle. "Thanks, Aamiina," she smiled. "If you like me, you can just say it, by the way. I'll even treat you to dinner sometime."\n\n"Yeah, sure... wait!" The hyena blushed as Ligaya walked away laughing. "I was just showing some courtesy, don't let it get to your head!" As Ligaya disappeared from view, she couldn't help but smile."
 zongo_railway.39.a:0 "There was one more who needed to be honest with herself."
 zongo_railway.40.t:0 "Naugdaw Line Level 5" #Snow 
 zongo_railway.40.desc:0 "Aamiina had dressed up as best she could, though it wasn't much better than her usual work clothes; she was never one for this kind of thing. With the regional section of the line completed, Anarbek had expressed his satisfaction when he heard that a local had helped them so much, and a promotion had been offered. With it, Ligaya would be able to keep working beside her, and everything could remain the same. As the mare came into view on the pier where they had agreed to meet, Aamiina focused, knowing she needed to keep her composure.\n\n"Beautiful night, huh?" Ligaya said, noticing her before she could speak. "I... I have been thinking about what you said... about honesty." Aamiina quickly hid the flowers behind her back as the mare turned towards her and took a deep breath. "Our confederation was dismantled, so many creatures died, damn it, even the Tiger is gone! Do you understand that?! My whole world crumbled when the Zongolese came, but I couldn't just crumple up and die!"\n\nWhile no tears came, her face was clearly distressed. "I... I spoke to a medic the other day. They say my lungs are badly damaged," she chuckled. "They said if I want to ensure it doesn't get even worse, I have to get away from this line of work." She threw a rock into the sea. "What good is a Naugdaw who can't build..."\n\nAamiina was shocked, she never expected the ever smiling Ligaya to sound so... beaten. What could she do? She couldn't be snarky as always; it wouldn't be appropriate. Should she console her? Hug her? Kiss her?! Ligaya seemed to notice her distress and gave her a small pat on the head. "You've been a good friend, Aamiina, but I need to go away now. I don't know where I'll go yet, but I'll take the train to one of the borders and see where I can find passage." She smiled sweetly, Aamiina wanted to hold her fearing if she did not she would never see it again. "It was wonderful to have met you." Aamiina felt the bouquet in her paws crush as she heard those words."
 zongo_railway.40.a:0 "With no more words exchanged, the two parted ways."
 zongo_railway.41.t:0 "Imba-Zaru Line Level 1" #Herr B
 zongo_railway.41.desc:0 "Geerhard Goedsmaak looked at the smouldering crater in the factory. So much precious beer, seeping away into the ground! And it was good beer, Feathisian beer, true to the recipe of his great-grandfather, who had come here from Mirabelle to Muromo Werwizi. Some said the griffons here were only fighters, mercenaries, or adventurers, but this was not true for his great-grandfather. According to his family's tales, Adrianus Goedsmaak had been a jovial griffon, a bit on the rounder side as well, like a good brewer should be. His family had also always been good friends with the local zebras, which was perhaps the reason why it had never grown particularly large...\n\nBut "Goedsmaak's Beer Feathisian style" was a well-known brand throughout Imba-Zaru – not that there were many brewers here anyway –, and it came with a promise of quality: only barley, hops, and water were used during the brewing process, and the yeast was the same good Feathisian yeast his great-grandfather had once brought from Feathisia. Geerhard was now leading the family business in the fourth generation, since the death of his mother in 985, and he had expanded the business markedly by building the new factory in the 990s.\n\nBut then, in 1006, the stupid Roamans came under their pretentious "Kaiser". His factory had been hit by an artillery strike, costing him much time and money to have it rebuilt. And now, the Zongolese had come and another artillery strike had hit the factory! The precious beer! And how much gold it would cost to get it repaired again! But, most importantly of all, hopefully he could recover enough yeast... the stockpile had not quite recovered yet. He should have grown more, had gotten too greedy... He lashed out with his tail. The profits of this year had already seeped away, at the very least."
 zongo_railway.41.a:0 "Here we go rebuilding again..."
 zongo_railway.42.t:0 "Imba-Zaru Line Level 2" #Herr B
 zongo_railway.42.desc:0 "The construction noise filled the air with a constant humming. Geerhard Goedsmaak was hovering over the factory with the construction plans in his claws, yelling commands to the workers below. It was quite taxing for him to fly for so long every day – particularly because he wasn't the most slender of griffs – but it made supervising the rebuilding process much more efficient. Good progress was made every day, and soon enough the beer would flow again.\n\nA while later, the workers had gone for lunch, and Geerhard was in his office reviewing his business plans. The last year had been a total loss, and the family fortune had shrunk significantly. The Zongolese attack had been the last thing he needed, particularly after the damage already caused by the war with Roam. But he was not yet losing his optimism. The first rule for any businessgriff was always to look for opportunities. Flexibility, speed, and precision, these were the most important traits for a griffon in his position. And as luck would have it, there was exactly such an opportunity.\n\nFor all the damage the Zongolese did, they also brought positive developments. In particular, their king seemed to be obsessed with trains, and consequently, they had built a massive railway network all over their ever-expanding empire. Of course, trains hadn't been exactly new to Chisimbi – in sharp contrast to Zongo, Geerhard figured – but the result was all the same: transporting goods had become cheaper. Much cheaper, in fact.\n\nWhen the factory reopened – something only weeks away – he would focus on spreading his brand beyond the borders of Imba-Zaru. Surely the Zongolese had never tasted good, Feathisian beer before, if they even knew beer at all. He had already started to make contacts with key figures in charge of overseeing railroad transports. If he could get the transport costs just a little cheaper still, and maybe bring some officials to promote his beer, there was money to be made. He grinned. A lot of money."
 zongo_railway.42.a:0 "The beer must flow!"
 zongo_railway.43.t:0 "Imba-Zaru Line Level 3" #Herr B
 zongo_railway.43.desc:0 ""And that, my son, is what I like to call a big pile of money." The eyes of Geerhard Goedsmaak and his son Hendrik focused on a rather large bag of gold coins. Sometimes, a griffon just needed to let the gold run through his claws, and so Geerhard had decided to take the latest quarterly profits of his beer factory home in their physical form.\n\nAs he observed his son rummaging through the gold, he contemplated the newest developments. The repairs on the factory had now been completed for a while, and production was humming. In fact, there was construction work going on at the factory again, but this time it was to make room for even more mash tuns, coppers and fermenters. When the expansion was complete, his factory would have almost double the output.\n\nHe was also very happy that he could hire back many of the griffons and zebras he had to lay off when the factory was damaged. Some of them had been friends, and so his economic calamity had also turned into a personal loss. Now, as things were looking up again, this trend had reversed quickly, and when he wandered through the factory, he could hear their happy greetings. In fact, production had picked up so much that he now had more employees than ever before, which filled him with great pride.\n\nExports of his beer to other parts of the expanding Zongolese realm had become a huge success. Many zebras, especially in the south, had never tasted good Feathisian beer, or any beer at all. It was less intense than the alcoholic drinks they knew, and you could have a glass or two without ruining your evening. Consequently, demand had been great, and profits had soon followed.\n\nAnd the best thing was that the Zongolese were continuing to build up the railway network. Geerhard had made crucial contacts within their administration, and had secured ample transport capacity from their latest expansion. While it had cost him some of his hard-earned money, as soon as the new capacity went online, it would pay off a thousandfold."
 zongo_railway.43.a:0 "It's time to profit"
 zongo_railway.44.t:0 "Imba-Zaru Line Level 4" #Herr B
 zongo_railway.44.desc:0 ""You are dating WHOM?" Geerhard Goedsmaak looked at his son in shock.\n\n"What? Am I not allowed to date a zebra mare? What's the issue, Auntie Wilhelmina also..." Hendrik answered.\n\nGeerhard interrupted him. "No, that's not the point. Many in our family have married zebras. But why would you go out with a Zongolese, a Zongolese soldier no less, rather than some nice Imba-Zarunite mare? Have they not conquered and subjugated us? Where is your pride, Hendrik?"\n\nHis son looked confused before bursting out laughing.\n\n"Really, Father? You of all people are complaining that the Zongolese conquered and subjugated us? Look around you! These piles of gold coins don't come from nothing; they come from our beer being exported into every corner of Zongo through the rail network they built. Our business has quadrupled since they came and 'subjugated' us. You yourself said more than once that their conquest has been a gift from the gods, and now you're suddenly discovering your patriotism? Please, that is ridiculous."\n\nThe older griff breathed heavily. "I think there is quite the difference between a business contract and a relationship. I... I would have never..." He paused for a moment, being lost for words. "Fine, I'll admit it, we have profited greatly from the circumstances. But that doesn't mean I consider myself Zongolese! That is... I mean... I don't know how to describe it... But... Are you sure?"\n\n"She is a real sweetheart. Nineteen, just like me, and she grew up in the thick forests. She never saw a piece of machinery until her sixteenth birthday, can you imagine that? They really had it hard, but eventually the new king came, industrialised their country and started to conquer. She only has two more months to serve, and she's on garrison duty here. We will see how things develop, but... I think I am in love, Father.""
 zongo_railway.44.a:0 "Love finds its ways, hmm?"
 zongo_railway.45.t:0 "Imba-Zaru Line Level 5" #Herr B
 zongo_railway.45.desc:0 "Geerhard Goedsmaak leaned back in his chair, a large mug of beer in his claw. So many things had happened recently that it was hard to keep track of everything. How much had the world changed around him! He could hardly believe it. And what was he to make of the situation?\n\nLast week, his son Hendrik had married Niya, a soldier mare from the densest of Zongolese forests, who had been stationed in Imba-Zaru as part of the garrison. The marriage had certainly come as a shock to her family as well, and he could see a sombre look in the eyes of Niya's mother as she realised Niya would never bear foals. His family, griffons living among zebras for centuries, was more used to this aspect...\n\nBut overall, Niya's family had been very nice, and they shared many stories. Strange, how Zongo had been so close and yet so far. With the new trains, the journey between the two homes barely lasted a day, and Hendrik and Niya had already decided they wanted to maintain two households. How close everything suddenly was...\n\nYet, there was also another aspect. Niya had at some point said during the ceremony that 'at the end we are all Zongolese'. Was that true? As for himself, Geerhard had already decided that he would never consider himself Zongolese. But for his son, he wasn't so sure. Hendrik had never shown any hesitation when interacting with the conquerors. Perhaps his view was outdated...\n\nAt least the business was unequivocally doing well. Profits had risen again last quarter, as had production. New factories were planned in Roam and Zongo City, and exports now also reached far beyond just the kingdom's borders. For some reason, he could feel his great-grandfather Adrianus smiling upon him. Was it because of the booming family business, or because his family had proven once more able to integrate into a new zebra society?"
 zongo_railway.45.a:0 "Life gives you much up and down, you just have to make the most out of it."
 zongo_railway.46.t:0 "Tzhimane Line Level 1" #Ardent
 zongo_railway.46.desc:0 "A new chance. A new life.\n\nTeluke carried only a sack of empty notebooks and pencils on his back. His hooves, worn and calloused from his life before, stepped onto the brick path leading to Tzhimane's prized university. This new life felt surreal, but Teluke knew deep down he would get from it what he put into it. Not like before.\n\nTrotting forward, Teluke thought back on his life: he had been a slave for so long, the Ibhayiz expected him to fight and die for their cause, while the Mavelas wished for him to toil until he was used up and thrown away. The Zongolese came and allowed him to choose a third way: to make his life his own. While his hooves toiled away in hard labor for so long, his mind never lost its curiosity to wonder about the world and all else there was. Now, being a free Zongolese subject, Teluke had done everything he could to join the prestigious Tzhimane university.\n\nTeluke made his way through the moving zebras, trying to seek out an available map of sorts or any markers on the institutional structures to pinpoint where he was and needed to be. The introduction seminar for new university students was to begin soon, but for what it was worth, the open plaza space he found himself standing in was beautiful.\n\nAdjusting his sack, Teluke trotted past a growing herd of rowdy students."
 zongo_railway.46.a:0 "For some reason, they all looked at him with disgust."
 zongo_railway.47.t:0 "Tzhimane Line Level 2" #Ardent
 zongo_railway.47.desc:0 ""...And that is why industrialisation at such a rapid pace is catastrophic in its collateral," the sound of chalk hitting the whiteboard filled the room. "Be it through failed modernisations or more recent cases such as can be seen in Kiria and their overly ambitious three and a half year plan." He set his chalk down and looked towards the class. "Any questions?"\n\nAmachi wrote with equal speed as the professor spoke, as one a respect enviromentalist, his opinions on the matter were to be deeply considered. She prepared to raise her hoof up only to be beaten by another student. She hadn't seen him in the class before; was he a transfer?\n\n"With all due respect, Professor, it is disrespectful for you to be so ill-willed towards industrialisation. If it were not for the railways and modernisation efforts of King Akida, I would not have been able to get to this class," the zebra spoke with conviction. "Furthermore, modernisation allows a country to move past outdated economic systems, such as slavery, another policy that allows me to be here today... or is slavery just?"\n\nThe professor leaned against the wall as whispers began to fill the class. "Teluke, correct? I had heard we were getting a... freed zebra as a student." The professor coughed. "It is true, slavery is considered immoral and backwards in many countries. However... the system itself was undeniable in keeping a healthy environment." He waved his hoof around as he spoke. "In the end, this debate is much deeper than good or bad. I'd be glad to have a closer debate on the matter. Any other questions?"\n\nAmachi knew she had to ask something, otherwise the class would be completely derailed. She raised her hoof. "Are there ways for a society to reduce or negate industrialisation's collateral?" The professor regarded her for a hard moment before picking his chalk back up and class went on as if nothing had ever happened."
 zongo_railway.47.a:0 "Only she noticed the freed zebra was gone."
 zongo_railway.48.t:0 "Tzhimane Line Level 3" #Snow 
 zongo_railway.48.desc:0 "Teluke found a quiet bench in a secluded corner of the university gardens, a rare pocket of peace away from the glares and whispered conversations he had to contend with. He closed his eyes, taking in a deep breath. Even here, the air carried the distant, rhythmic clang of hammers and the faint scent of coal smoke from the new railways and factories that had reshaped the city's edge.\n\nHe didn't mind it. To the other students, it was noise pollution, a vulgar intrusion upon their ivory tower. But to Teluke, it was the sound of progress. The same progress that had shattered chains and paved the road to this very bench. He pulled out a notebook, its pages filled with his own rough sketches and observations: bridge designs and calculations inspired by Zongolese engineers, ideas for improving irrigation to feed growing industrial towns, all sorts of different ideas, very rough still, but they were his own.\n\nHe dreamed of the day he could present these to the King or his council. That he wouldn't just be seen as just a freed slave; but a Zongolese, helping build the kingdom by his own choice. The modernisation was far from perfect, he saw the soot staining the city's ancient stones and heard the complaints about the frantic pace, but it was a force for liberation. For the first time in his life, Teluke felt his mind had a value that was being measured. He fell asleep with his notebook in his lap, the distant sounds of construction a lullaby of a future he was now helping to build."
 zongo_railway.48.a:0 "For some, the sound of industry is the sound of freedom."
 zongo_railway.49.t:0 "Tzhimane Line Level 4" #Snow 
 zongo_railway.49.desc:0 "The usual hum of scholarly debate in the university's central plaza had curdled into a low, angry buzz. A herd of students, their coats impeccably groomed, had gathered. Their world was being dismantled by cranes and smokestacks, and they needed a target. They found one in Teluke, with shouts and curses coming from all sides as the once silent tensions had finally exploded into public harassment.\n"Who let you in here?!"\n"This isn't a work camp!"\n"Did you get lost on your way to the railyard?"\n"Go back to where you belong!"\n\nTeluke stood his ground, his posture stiff. "My admission was processed through the same office as yours. I have been allowed here by my own hard work."\n\n"Your hard work? Your kind's work is with your hooves, not your head. This is a place for thinkers!"\n"They're letting in anyone to fill quotas now!"\n\nTeluke did not budge, he kept a steadfast posture and a determined look, his jaw was clenched ready for whatever could come, yet, holding himself back from acting. From the edge of the crowd, Amachi watched, her hoofsteps hesitant. She saw the raw hatred in the students' eyes. She was not ecstatic about having a freed zebra in the university, their role was to serve after all, the Ibhayiz and the Zongo had served to radicalize them too much, yet... bullying and threatening one student couldn't be the way to solve this.\n\nAs she thought, a professor waddled over. "It is not befitting to cause this much of a scene," he said, looking at the students with a certain disdain. "Have you learned no manners? The Mavelas have fallen, yet you are all their legacy. To act in such imprudent ways is to besmirch your own upbringing." The crowd seemed to back off as the teacher spoke. "Teluke, you should come with me. We must continue that discussion I had promised you."\n\nAs they walked away, Amachi wondered if this was the right way to deal with the situation."
 zongo_railway.49.a:0 "A fragile peace."
 zongo_railway.50.t:0 "Tzhimane Line Level 5" #Snow 
 zongo_railway.50.desc:0 "The halls of the university were quieter now, but not empty. Once the correspondences of professors and students littered with slurs, conspiracies, and open contempt for the King, had faced a swift response from the Crown. Many of the old faculty and students were dismissed. The halls, once crowded by the entitled foals of the Mavelas and the upper classes of the region, now saw new and more varied faces, ranging from Zongolese subjects coming from the farthest reaches by train, or freed zebra such as Teluke, no longer standing out as an anomaly, but just another student.\n\nTeluke walked through the corridors, heading for a lecture hall. The curriculum had been greatly rebuilt, while the courses that still had professors to give out lectures could stay; those that none had remained were swiftly removed, with engineering, economics, and logistics being central to the new university.\n\nAs he turned a corner, he nearly collided with another zebra. She flinched back, her eyes wide. They stood in awkward silence for a moment.\n\n"Teluke," she finally said, her voice barely a whisper. "We never talked before. My name is Amachi, and I... I wanted to say I'm sorry. For how you were treated. It was shameful."\n\nTeluke offered a small, tight smile. "Thank you," he said, his tone polite but distant.\n\nShe shifted uncomfortably under his gaze. "It's good that things are... changing."\n\n"It is," he agreed. They stood for another moment. Then, with a final nod, Teluke continued on his way to class. They weren't friends, and they never would be. However, he would not look down upon her as her colleagues had done to him. Whether she liked it or not, if she kept quiet, perhaps she could get to see the future he would build. He smiled as he walked to class."
 zongo_railway.50.a:0 "An apology cannot rebuild what was never built together."
 zongo_railway.51.t:0 "Twizanyika Line Level 1" #HerrB
 zongo_railway.51.desc:0 "Yohana rubbed her hind paw. It had hurt for a few days now; her carrying sandbags on the construction side had been one of her worst jobs so far in this city, but she needed the money... She wasn't the youngest anymore, and she scratched her head over how long this situation could continue.\n\nAnd anyway: carrying sandbags was a job for slaves, not for a proud hyena. One of the longnecks should have carried the heavy materials, like in the past. Everything was wrong these days, with Twizanyika being occupied by stupid zebras from the east, and the giraffes running around freely... Ha! The Zongolese would learn soon enough that they were useless unless you had a whip. She had always carried a whip, back in her days on the plantation...\n\nShe continued to rub her hind paw while she reflected on the past few years. For most of her life, she had worked on a plantation in eastern Twizanyika, first as Supporting Accountant, later as the Head Accountant. The plantation had owned over five hundred enslaved giraffes, being one of the larger ones in the region. But then, Twizanyika had been drawn into the Chisimbi-wide conflicts, and the zebras had pillaged the lands. The slaves had dispersed in all directions, and the farm was closed down. Since Baraka, her husband, had not returned from the war, she had left for the city, hoping for a job. But it had not gone well, and she was mostly doing day jobs now to scrape by. What a disgrace!\n\nAnd now, the Zongolese had come, but instead of bringing back the natural order of things, they had insisted the giraffes be free, and if anything, had closed down the last plantations. Stupid conquerors! How much she hated every second of this... At least Asante, her son, was already grown up. Last time she heard of him he had found a job in Chiteshihara, but mail service wasn't the most reliable in these times. One day... one day she would have the money to visit him again."
 zongo_railway.51.a:0 "What has become of this world?"
 zongo_railway.52.t:0 "Twizanyika Line Level 2" #HerrB
 zongo_railway.52.desc:0 "The factory towered over the creatures queuing before its gate. They were mostly hyenas, with some giraffes and zebras mixed in. Word had spread that the factory would open today, and many had come here hoping to find a job. Yohana also stood in the queue, but her hopes were not high, too many were standing before her – she just wasn't the fastest anymore. And of course the factory was operated by the Zongolese, who surely would treat the longnecks preferentially...\n\nShe was lost in thought as the gates of the factory opened. From a cursory glance she could see the many halls and workshops that the site featured. And many, many chimneys as well. She instinctively rubbed her nose, although there was no smoke yet. But how pristine and clear the air had been on the plantation... Without her really noticing, the queue moved forward. She expected any moment that the factory doors would close and the remaining workers would be dispersed, but no such thing happened.\n\nAn hour later, she was called in. A rather bored looking zebra noted down her name, age and previous work experience. She said "Head Accountant" with as much pride as she could muster, but the zebra in front of her just scribbled "accountant" without even looking up. Lastly, the zebra hoofed the paper over to a more important looking mare, who had followed the interview with a stern look.\n\nGlancing quickly at the paper, the mare nodded. "You can work as a secretary here. We have lots of product to move around – praise be to the railroad, otherwise this factory wouldn't be possible – and you having experience with accounting can help." She whistled, and a young hyena came running. "Hamadi will show you your workplace." And with a further nod, she was given a contract to scribble her name under.\n\nWhile she trotted behind the boy, she sighed. At last, she had a job. Being a secretary was better than the day jobs she did for the last years, for sure. But in the old days..."
 zongo_railway.52.a:0 "At least the bills get paid now."
 zongo_railway.53.t:0 "Twizanyika Line Level 3" #HerrB
 zongo_railway.53.desc:0 ""Fired? Just because I showed these longnecks... giraffes what real work means? You have to be kidding me! They get to run around and whatnot, I don't keep them chained like I should've, they can't complain! It's just that they are lazy, yes, that's what they are! Not my fault that I had to use a bit of force."\n\nThe loud voice of Yohana Zugai's boss carried easily, and the hyenas in the secretariat all listened intently. They didn't have a giraffe working here – most of them weren't literate, so they had little use with paperwork. Of course, the whole floor knew the boss beat the giraffes working in this section of the factory from time to time. They all knew it wasn't really allowed, but after all, they were giraffes... and what could you expect from them?\n\nBut apparently, the Zongolese saw this differently. Yesterday, the factory manager had questioned many of the workers. Of course, Yohana and the other hyenas had denied everything – while the boss raised his voice quite often with them as well, it was an absolute shame that the giraffes were trying to get him fired. But of course the zebras and giraffes had told everything, and exaggerated every story.\n\nThe hyenas in the secretariat exchanged some whispers. "That is such a shame. A hyena being fired over longnecks, can you believe it?" "What times we live in!" "It's a shame." "The Zongolese just don't understand our lands."\n\nWith a slightly louder voice, Yohana said: "If he is fired, I will go as well."\n\nImmediately, the whispering stopped, with unsure glances being exchanged. Some of her colleagues wrinkled their nose. Eventually, one spoke up: "Oh really?"\n\nYohana scratched her ear with her hind paw. Perhaps she should not be so hasty."
 zongo_railway.53.a:0 "What is it with these giraffes?"
 zongo_railway.54.t:0 "Twizanyika Line Level 4" #HerrB
 zongo_railway.54.desc:0 "Yohana wrinkled her nose. "What? Do the giraffes not have long necks? What's wrong with calling them longnecks? You had to build your entire factory with extra large doors to accommodate them." She tried to muster nonchalance, but it sounded more defensively cubish.\n\nIn front of her stood her new boss, a zebra from Zongo, after her previous boss had been fired. He slowly shook his head. "You know very well that it's a slur, and you have used it exactly in this fashion. I won't tolerate this any further. You are a good worker, one of our most productive, but I can't let you insult your co-workers. Yes, don't look at me like that. You hyenas have enslaved the giraffes for centuries, but in Zongo, we are all free creatures, including them. You will work alongside them, and you will treat them with respect, or I can't employ you any longer."\n\nShe narrowed her eyes, ready to give a snarky response, but deflated under a long sigh. There was no doubt he could fire her on the spot, and perhaps she should be happy to even be given this talk. Not that the situation would be better elsewhere. She needed this job, and she had to accept the giraffes. In a flat tone, she said: "Yes, Sir." After a little pause, she added: "I'll do my best."\n\nHer boss looked at her for a long second. "You hyenas really are a special breed. I've seen a lot, but I have rarely seen a society so consistently racist. Perhaps it is to be expected of carnivores like you." He flicked his ears. "I just wish we could make y'all see the world in a brighter light. Look, the railway has brought so many new industries to your lands. There is enough for everyone. Why do you need to hate the giraffes so much?" After not getting an answer, he flicked his ears again. "Well then, dismissed. Do better next time."Yohana left his office and returned to her workplace in the secretariat. These zebras! Could they just not see...? But it wouldn't matter for her now. At least in one respect, her boss had been right: the economy was finally looking up, and she could save some money. Soon, she would be able to visit her son again, after so many years."
 zongo_railway.54.a:0 "'Tolerance'! Easier said than done..."
 zongo_railway.55.t:0 "Twizanyika Line Level 5" #HerrB
 zongo_railway.55.desc:0 ""Asante!" The train arrived at the station, and as soon as it stopped, Yohana ran towards her son. How many years it had been! And he had become so much older. She embraced him warmly, only then noticing the female hyena standing next to him. "You have brought company, I see?"\n\n"Yes! Shani, this is Yohana, my mom – mom, this is Shani, my friend. We met last year at a party, and we're going to get married soon." They greeted, and then trotted homewards to Asante's apartment. Shani soon left, leaving mother and son on their own.\n\n"Now, mom, tell me, how did you manage to organize this visit? In your letter you said that you now work for a Zongolese manufacturing company? How is your life there?"\n\n"Yes. As you know, after the plantation got closed down, I had to move to the city, and I had to do day jobs for a number of years. Now I work as a secretary in the factory, which is definitely better. They pay okay, of course it's not as good as on the plantation, but I take what I can get. Just a lot of giraffes running around there, you know? I can't really stand these longnecks."\n\n"Oh c'mon, mom, don't be one of these silly old yeens who can't let go. Don't call them longnecks. I've made a lot of friends in the city, some zebras from Imba-Zaru, some from Zongo of course as well, and I also made friends with some giraffes. They had it pretty rough, you know? As a kid I didn't really understand all of this, but honestly, I think it's better for all of us now. Yeah, I know you and father had a cushy job on a plantation, but honestly, they were holding back Twizanyikan industry. And we don't need this racism anymore."\n\n"Son, you don't understand. We conquered this place, and the giraffes were our rightful property! They..."\n\nHer son interrupted her. "Mom, this was centuries ago. Now is now. The giraffes are our fellow citizens, and it's best for us all if we can become friends. Stop clinging to the past."\n\nYohana looked at her son, rubbing her hind paw as she remembered her days as a labourer. Letting it go? Her son, her own son... was she really 'an old yeen' who clung to the past?"
 zongo_railway.55.a:0 "Twizanyika really has changed a lot."
 zongo_railway.56.t:0 "Sambovato Line Level 1" #Ardent
 zongo_railway.56.desc:0 "A cool ocean breeze stirred the waves lapping against the docks of Akorandriakarova. Three low officials sat at a table, enjoying their breakfast. Or at least, one zebra in particular did whilst the two others talked shop.\n\n"The alliance with Zongo was the best thing to happen to this island," Ozuvu said, gesturing with a piece of his bread towards the bustling construction workers further down the coast. "Just look at the modernisation on the mainland. With their rails, the Nacre Gate will finally live up to its name. Sambovato will be known as more than just a resting spot."\n\nSaadi nodded, a shrewd smile on her face. "Agreed. Those avaricious Zebrides will only be able to gawk at their importance suddenly disappearing." Saadi looked at the two of them and bent over a little bit. "More importantly than that... how can we use this to our advantage?"\n\nMazut swallowed his food and opened his mouth to speak.\n\n"Exclusive contracts," Ozuvu interjected with a confident smile. "That's the answer. We use our positions to secure the supply contracts for the railway construction – lumber, provisions, labour. We become indispensable to their efforts."\n\nSaadi chuckled. "A closed loop, as economics should be. Zongo builds its prosperity, and we build ours right alongside it, funded by their treasury." She turned to Mazut, who was munching on some saltine crackers. "You can draft the initial proposals, right? All three of us stand to gain immensely."\n\nMazut paused, a cracker hovering at his mouth, and lowered it with a sigh."
 zongo_railway.56.a:0 "Three minds are better than one"
 zongo_railway.57.t:0 "Sambovato Line Level 2" #Ardent
 zongo_railway.57.desc:0 "The three zebras met once more, now at a newly purchased office building, Saadi was the first to break the silence. "This has... gone better than I ever imagined."\n\n"I'll say!" Ozuvu laughed as he took a sip of his drink.\n\nMazut sat at the desk, listening to the other two muse aloud. Their proposal had not only gone through; it had earned them significant wealth, with their political influence growing in tandem with the Zongolese efforts. Ozuvu and Saadi were ecstatic.\n\nSaadi leaned back in her plush new chair. "The scale and speed of Zongo's construction is incredible. The new railyards, the expanded docks..."\n\n"So are the benefits," Ozuvu said, gesturing to the view of cranes and new buildings from their office window. "Our coffers are fuller than ever! We're not just officials anymore; we're pioneers of a new Sambovato!"\n\n"The Nacre Gate is handling more traffic in a week than it used to in a season." Saadi agreed, her smile not quite reaching her eyes as she glanced at a report. "This will show those Zebrides know-it-alls how its done!" The two laughed around and drank the day away as they partied. Mazut glanced between the two and brought his gaze back down to the inventory lists on his desk, his posture tense."
 zongo_railway.57.a:0 "It's only fair to enjoy a job well done."
 zongo_railway.58.t:0 "Sambovato Line Level 3" #Ardent
 zongo_railway.58.desc:0 "Ozuvu sipped his imported coffee. "We should use our influence to secure the provisioning contract for the main railyard. I believe it will be another very good investment."\n\n"A fine idea. Mazut, don't forget to write it down." Saadi said, stirring her own brew. The three of them were sitting outside a little café, its traditional thatched roof looking increasingly out of place amidst the new brick buildings littering the cities. Mazut opened his mouth to say something.\n\n"Just look at this skyline," Ozuvu daydreamed. "Who would have thought that Sambovato could look this different in less than a decade? Jobs are plentiful and creatures are happy," Ozuvu said, gesturing to the view of cranes and rumbling factories in the distance. "All thanks to us three!" Ozuvu dryly laughed, but silence soon took over as the scenery weighed heavy.\n\nThe new, soot-stained warehouse blocking their view of the sea, the constant clang of industry drowning out the waves – it was a stark contrast to the vibrant, if poorer, port they had grown up with. How could they complain when they had profited so handsomely from its transformation? The silence wore them down, a shared, unspoken feeling settling over them.\n\nOzuvu finally scoffed, breaking the tension with a smile. "We wanted importance and wealth. We got it." Saadi winced as she stared into her cup. Mazut simply closed his eyes, letting out a silent sigh."
 zongo_railway.58.a:0 "The price of progress laid unspoken, but not unnoticed."
 zongo_railway.59.t:0 "Sambovato Line Level 4" #Ardent
 zongo_railway.59.desc:0 "It had been a normal day for the three of them, managing their lucrative side ventures amid the smoke-hazed streets of Akorandriakarova. The air, once clean and salted, now carried the permanent tang of coal smoke; a fitting backdrop for their work. But as they exited a building for a midday meeting, everything turned upside-down day.\n\nZongolese military units stood waiting, blocking the street. Ozuvu and Saadi watched, stunned, as their lead officer began to speak. "You three are under arrest," the lead officer declared as his squad closed in. "Do not resist."\n\n"On what grounds—" Ozuvu began, but his words ended in a grunt as he was tackled to the cobblestones. Saadi and Mazut swiftly found themselves in the ground beside him.\n\n"What are you doing? I demand my lawyer! I know my rights!" Saadi shouted, her voice sharp with panic.\n\nThe Zongolese officer looked down at her, his expression impassive. "You have the right to remain silent," he stated, as if her pleas were mere static. "A High Judge has ordered your immediate incarcerations for corruption and subverting of Zongolese-Sambovato relations. I ask once again: do not resist.\n\nAs they were dragged toward a waiting truck, Mazut finally snapped, his composure shattering as he hissed and tugged hard at his shackles."
 zongo_railway.59.a:0 ""I was trying to say we should've never dealt with Zongo from the start!""
 zongo_railway.60.t:0 "Sambovato Line Level 5" #Snow 
 zongo_railway.60.desc:0 "ZONGOLESE FOREIGN OFFICE - OFFICE OF INTERNAL SECURITY - FOR (REDACTED) EYES ONLY\nOPERATION: BURNING ISLAND\nSTATUS: CONCLUDED\n\nSUBJECT: Disposition of Assets and Personnel relevant to the Nacre Project\n\nBACKGROUND: Officials Ozuvu Andriana, Saadi Rakoto, and Mazut Randrianasolo were identified as both key facilitators and primary points of corruption hindering the full integration of Sambovato's infrastructure and governance into closer partnership with Zongo. Their continued actions posed an unacceptable risk to Zongo's strategic interests in the Peaceful Seas.\n\nACTIONS TAKEN:\n\nAll three suspects have been apprehended due to crimes of corruption, embezzlement, and abuse of office for personal enrichment, while also standing in the way of Zongo-Sambovato unity.\n\nTheir personal and commercial assets have been seized by the Zongolese government and are being liquidated to fund further industrial development.\nCURRENT SITUATION:\nThe suspects have been (REDACTED).\nTheir current holding place is (REDACTED).\n\nCONCLUSION: The "Burning Island" initiative has proven a great success. Resource extraction and industrial output remain on schedule. The environment of Sambovato finds itself largely depleted; however, it has served its purpose as a foundation for Zongo's prosperity. The situation is considered: RESOLVED."
 zongo_railway.60.a:0 "LONG LIVE THE CROWN. LONG LIVE ZONGO."

 zongo_railway.100.t:0 "Select a new line!"
 zongo_railway.100.desc:0 "Select a new line to be built, you reached the level cap on your previous one."

 zongo_dilemma.1.t:0 "Bandit Attacks on a Railway" #Snow 
 zongo_dilemma.1.desc:0 "A report lay on the King's desk: bandit attacks leading construction delays and lost supplies. As long as they went unanswered, they would gain the confidence to attack again and again. As he stared at the map his options unfolded in his mind:\n\nHe could deploy the army, their efficiency was unquestionable. But to divert his regiments was to peel vital resources away from garrisons, drills, and other necessary posts. It was a clean solution, but a costly one in time and momentum.\n\nHe could task the Royal Council. It would show his respect for their decision making and they were sure to get it done... eventually. By the time their bickering was done, the other methods would have already gotten results.\n\nThen, there was the Queen-Mother. Her talent for quiet diplomacy was reliable. She never spoke of mobilizing troops or funds, only of "resolving misunderstandings". Her solutions were always swift and bloodless. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Banditry was sadly common; to stagnate on something he'd surely be dealing with many more times would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.1.a:0 "Deploy a contingent of soldiers"
 zongo_dilemma.1.b:0 "The council will deal with them"
 zongo_dilemma.1.c:0 "Let the queen-mother handle it"
 zongo_dilemma.1.d:0 "Deploy the railway police"
 zongo_dilemma.2.t:0 "Workers Demand Higher Wages" #Snow 
 zongo_dilemma.2.desc:0 "A report lay on the King's desk: workers were threatening strikes due to supposed price increases. He knew they were bluffing for higher wages; the Queen-Mother had made it clear that prices were under control, as she had promised. Yet, this situation had led to construction delays, which could not be ignored. As long as they went unanswered, they would grow more and more restless. As he stared at the demands his options unfolded in his mind:\n\nHe could simply raise their wages. Even if they were exaggerating, heeding their demands and giving them the money they wanted was sure to make them go back to work. However, the statisticians would not be pleased with him diverting the already very well defined royal budget.\n\nHe could simply call their bluff. They would shout and kick around, but they would surely not risk their livelihoods to keep up a lie. However, it would not set a good precedent to simply ignore the workers and it would mean having to wait until they stopped causing trouble.\n\nThen, there was the Queen-Mother. Her talent for quiet diplomacy was reliable. She could quickly go there to have a talk with them, the strikes would be done by the same day. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Threats such as these were sadly common; to stagnate on something he'd surely be dealing with many more times would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.2.a:0 "Raise wages slightly"
 zongo_dilemma.2.b:0 "Call their bluff"
 zongo_dilemma.2.c:0 "Let the queen-mother handle it"
 zongo_dilemma.3.t:0 "Natural Terrain Slowing Down Construction" #Snow 
 zongo_dilemma.3.desc:0 "A report lay on the King's desk: workers had gotten stuck in difficult terrain. This situation had led to construction delays. Until he decided on a course of action, they would not be able to continue. As he stared at the situation his options unfolded in his mind:\n\nHe could ask the council to send for extra workers. This would ensure they had enough hooves to get through the situation quickly; however, the statisticians would not be pleased with him diverting the already very well defined royal budget.\n\nHe could simply allow them to continue to work as they were. It would be slow, but they would end up getting past the difficult terrain in due time.\n\nThen, there was the Queen-Mother. Her talent for quiet diplomacy and creative problem-solving was reliable. If she were sent there, she would surely be able to motivate the workers and resolve the situation swiftly. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Situations such as these were sadly common; to stagnate on something he'd surely be dealing with many more times would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.3.a:0 "Hire some extra workers"
 zongo_dilemma.3.b:0 "They'll finish eventually"
 zongo_dilemma.3.c:0 "Let the queen-mother handle it"
 zongo_dilemma.4.t:0 "A Wrongly Built Railway Track" #Snow 
 zongo_dilemma.4.desc:0 "A report lay on the King's desk: a section of the railway had been constructed off course due to an error by the workers and poor supervision.\n\nQueen-Mother had some corrupt crew managers fired recently; it seems, however, that the newest contractors had not acclimated themselves well enough to the job yet.\n\nIn the end, there was nothing for Akida to do besides waiting for it to be fixed."
 zongo_dilemma.4.a:0 "Damn it!"
 zongo_dilemma.5.t:0 "Construction materials late on delivery" #Snow 
 zongo_dilemma.5.desc:0 "A report lay on the King's desk: late deliveries of construction materials has led to a delay in railway construction.\n\nQueen-Mother had some corrupt union leaders arrested recently; it seems, however, that the newest contractors had not acclimated themselves well enough to the job yet.\n\nIn the end, there was nothing for Akida to do besides waiting for it to be fixed."
 zongo_dilemma.5.a:0 "Damn it!"
 zongo_dilemma.6.t:0 "Small Issues Pile Up, Causing Delays" #Snow 
 zongo_dilemma.6.desc:0 "A report lay on the King's desk: a cascade of smaller delays had snowballed into a true problem. It was now clear the project was behind schedule due to a variety of issues and incidents. Until he decided on a course of action, the situation would not improve. As he stared at the situation his options unfolded in his mind:\n\nHe could authorize overtime pay. This would fund an effort to get the project back on track; however, the statisticians would not be pleased with him diverting the already very well-defined royal budget.\n\nHe could simply accept the delay and adjust the official schedule. It would mean a later completion date, but the work would continue at its current, steady pace without additional cost.\n\nThen, there was the Queen-Mother. Her talent for quiet diplomacy was reliable. If she were sent there, she would surely be able to motivate the workers and resolve the situation swiftly. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Situations such as these were sadly common; to stagnate on something he'd surely be dealing with many more times would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.6.a:0 "Give extra overtime bonuses"
 zongo_dilemma.6.b:0 "Adjust the schedule"
 zongo_dilemma.6.c:0 "Let the queen-mother handle it"
 zongo_dilemma.7.t:0 "Errant Beast Harassing Workers" #Snow
 zongo_dilemma.7.desc:0 "A report lay on the King's desk: a large native creature was harassing supply lines. Attempts to capture or kill it have failed, leading to costly delays. As long as the beast goes unanswered, it will grow bolder. As he stared at the situation, his options unfolded in his mind:\n\nHe could hire a local guide. Such a creature was part of the fauna; a skilled tracker could likely lure it away from the tracks with minimal fuss. It was a simple, direct solution; however, the statisticians would not be pleased with him diverting the already very well-defined royal budget.\n\nThen, there was the Queen-Mother. Her talent for dealing with problems was reliable. If she were sent there, she would surely be able to get rid of the beast and resolve the situation swiftly. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Nuisances such as these were sadly common; to be paralysed by a single beast would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.7.a:0 "Hire local guides to lure it away"
 zongo_dilemma.7.b:0 "Scare it off with Armored Trains"
 zongo_dilemma.7.c:0 "Let the queen-mother handle it"
 zongo_dilemma.8.t:0 "Funds Are Missing From The $ZOO_grand_railroad_project$" #Snow
 zongo_dilemma.8.desc:0 "A report lay on the King's desk: funds have been disappearing from the budget for a certain railway section. With the calculations being (perfect?) the only explanation was that some zebra was skimming money into their pockets. As long as they remained unfound, they would damage the effectiveness of the plan. As he stared at the situation, his options unfolded in his mind:\n\nHe could get Anarbek into the case. Money does not simply stop existing; it must have left a trail that he could track to ensure the culprit would be eventually found.\n\nThen, there was the Queen-Mother. Her talent for dealing with problems was reliable. If she were in charge of the investigation, the culprit would certainly be found quickly. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Nuisances such as these were sadly common; to be paralysed by such a scheme would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.8.a:0 "Assign Anarbek to deal with it"
 zongo_dilemma.8.b:0 "Let the queen-mother handle it"
 zongo_dilemma.9.t:0 "Local Festivities Delay Construction" #Snow
 zongo_dilemma.9.desc:0 "A report lay on the King's desk: the workers have reached a settlement having festivities and have taken some time off to spend time with the locals, even inviting their families to come. The Queen-Mother has reviewed the case and insists they must go back to work. The King, however, does not seem that phased.\n\nHe has decided there is nothing wrong with the workers taking a break once in a while, especially if it's to spend time with their families. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.9.a:0 "Let them enjoy their festivities!"
 zongo_dilemma.10.t:0 "Workers Threaten to Strike" #Snow
 zongo_dilemma.10.desc:0 "A report lay on the King's desk: workers are threatening to strike, claiming unsafe conditions and unfair pay. The Queen-Mother has reviewed the case and insists their demands are baseless, with the conditions meeting royal standards and their pay fair. Yet, as long as their ultimatum goes unanswered, the entire railway project will grind to a halt. The King must choose a path:\n\nHe could offer minor concessions: a small pay increase for their supposed troubles or a promise to review safety protocols. This would likely placate the workers and get the tracks laid without major disruption, even if it rewards their opportunism.\n\nHe could replace the problematic workers. Bringing in new laborers from another region would get the construction back on track, though the recruitment and training would cause some delays.\n\nThen, there was the Queen-Mother. Her talent for problem-solving was reliable. She could go there to talk with them, and the strikes would be over by the same day. However, he already relied on her for so much; perhaps it would be best if he did not overburden her.\n\nThe King leaned back. Threats such as these were sadly common; to stagnate on something he'd surely be dealing with many more times would be a poor sign of his leadership. In the end, Akida decided to deal with the issue by:"
 zongo_dilemma.10.a:0 "Throw them a bone"
 zongo_dilemma.10.b:0 "Bring in new workers"
 zongo_dilemma.10.c:0 "Let the queen-mother handle it"


 zongo_political.1.t:0 "Primacy of the Monarch" #Snow #Up to revise
 zongo_political.1.desc:0 "The new book of Royal Law was almost completed; yet, there was one space still blank: royal authority. He could simply write it down as absolute and be done with it, yet...\n\nHis mother entered the study, her eyes going straight to the unfinished document as she sighed. "You are still hesitating on this? After all the stress you suffered trying to tackle their autonomy, you wish to hand them the very tool to make it official?" She leaned over the desk, her presence filling the room. "To grant them a right to supersede your orders is to reward their defiance and weaken yourself willingly. And in exchange for what? If you show such hesitation now, they will see your kindness as weakness." Her gaze did not falter for a single second. "Put your hoof down and show them the crown is absolute."\n\nThere was a logic to what she said; he couldn't deny it. Having clear, uncontestable authority would ensure his plan could proceed with fewer headaches... Yet, this simply did not sit right with him. His reign was new, his respect not yet earned. He ruled only through lineage. To enshrine such power as one of the first laws of his land would be a great disrespect to their traditional powers, portraying himself as a master and not simply their king. It would only serve to further feed their fears and go further away from the mutual trust he wished with them.\n\nAkida saw a different path. A harder one? Perhaps. It could even be called foalish. If he enshrined their right to appeal his decisions, it would clearly show the Mani that he was not a tyrant and that he was willing to respect their traditional role; that he governed through a law that was greater than even his own will. It was a plea for cooperation... he hoped that would be enough to build some respect.\nAs he looked at his mother one last time, he reached for his quill and wrote:"
 zongo_political.1.a:0 "A monarch cannot be completely unchecked, the Mani's right of appeal shall be enshrined."
 zongo_political.1.b:0 "The Mwenezongo's words are law, none can be above them."
 zongo_political.2.t:0 "State of Emergency?" #Comma
 zongo_political.2.desc:0 "The dramatis personae of Akida's mindscape included every manner of death and destruction for anything that could go wrong. A Zongo stepping into the modern world could easily steep itself into a mire of controversy, of broken peaces. No one could argue the finer details of a plan of action when their own little worlds were burning and their very lives were slipping away. Or so said Queen-Mother: she was merely pointing out the contradictions of the Royal Council. Someone as powerful as a king tied down to the whims of a self-interested cabal even if a nation-ending crisis were underway? What foolishness!\n\nBut Akida was only one stallion. A greatly powerful stallion, but who was he to override the wisdom of his elders (and not just his matron)? Anyone could light up the metaphorical fire and call it the end of everything. His classes in modern history had told him just as much of tyrannies established against some imagined permanent emergency. If he were to somehow go astray, then Zongo would fall into ruin... the Council, they said, would be there to tell him if there was any real issue that required desperate measures.\n\nEither way, an uncanny feeling flooded his senses in the middle of his deliberation. His ambitious design would send Zongo barreling into the future. Of course, there would always be the risk of it crashing into something emergency-worthy. It was no hypothetical but a fatal fact just waiting for its fulfillment.\n\nAwaiting his judgment on the matter: Should the King require the Royal Council's assent before issuing a joint decree of a state of emergency? Or should he be ready to proclaim it when necessary, with no obstacles in his way?"
 zongo_political.2.a:0 "The Royal Council must be granted this right."
 zongo_political.2.b:0 "There is no time for debate during the apocalypse."
 zongo_political.3.t:0 "Priority For Public Railways?" #Snow
 zongo_political.3.desc:0 "As the council met, the question on the floor was simple: with the introduction of trains for civilian commute, new situations had to be accounted for to ensure the nation kept running properly. On a shared rail line, who yields the right of passage? Akida waited for any to raise their points, the Queen-Mother's voice cutting through the murmurs of the Mani. "This is not a debate at all. The freight lines are the arteries of our progress. Every minute a train carrying ore or machinery idles is a direct drain on the Royal Treasury. Civilian transit is a luxury; industrial transport is a necessity."\n\nWhile the Mani remained quiet and Akida pondered her point, Anarbek broke the silence by clearing his throat. "With all due respect, Your Grace, the data suggests a different story." He laid a report on the table. "The economists have already run many calculations on this. The data shows that prioritising civilian transport stimulates local commerce, allows for a more flexible workforce, and encourages economic development away from the major industrial hubs. The long-term effects from these benefits far outweigh the marginal gains in factory efficiency from unimpeded freight. Industrial transport might be important, but it is easier to account for slightly delayed equipment than for hundreds of thousands of delayed creatures."\n\nThe council chamber was thick with tension as all waited for the Queen-Mother to react. As she opened her mouth to speak, a hoof tapped firmly on the King's side of the table. All eyes quickly turned to Akida, who had been quietly listening. "The council has been heard," he stated, his voice calm but firm. "I have reached a decision:""
 zongo_political.3.a:0 ""Anarbek's reasoning is sound, public trains get priority.""
 zongo_political.3.b:0 ""Mother's reasoning is sound, freight trains get priority.""
 zongo_political.4.t:0 "Big Iron" #Comma
 zongo_political.4.desc:0 "Sheer altitude gave birth to the isolation that was the nascent mining village of Nyin, and for Pedem, chipping away at metals and minerals at a far-off distance had become its own peaceful seclusion. Far from the centers of government power, the staff chosen to watch over them weren't the best nor the brightest. He and his fellow adventurers into the hills and mountains could, on cue, overpower the lanky fellows posted to guard them, force them to push their bodies to limit. The sturdy rocks and stones would break before Nyin would, he was certain of it.\n\n"Pedem, were we supposed to get another carriage full of workers today? Then why's there a train here now?"\n\nHis tentmate's words sent his blood skyrocketing. Any break in the routine meant complications. Rushing then to the only connection they've had to the rest of civilisation, he saw that unwelcome visitor:\n\nA cannon as long as a creek, on wheels. Aimed at him. The total darkness of the barrel, he could see straight to the very end.\n\nWhen the officers were asked, they told him that it was a security measure. He wasn't dumb: that was code for "stay in line or we will shoot you all down and haul in more compliant workers." The temptation was strong to tell them that, no, he did not know what a "revolution" was, but he knew what the forbidden word implied. Dangerous enough information. Was it the way he acted? The smile on his facae and the swagger he carried every day to work, knowing there was a way out if things broke? Who told them this, if anyone?\n\nBut the village and its overseers could see one clear difference in the end:"
 zongo_political.4.a:0 "A mood diminished."
 zongo_political.4_tt:0 "Worker strikes will fire 30% less often."
 zongo_political.5.t:0 "The Flaws of the Tribal System"
 zongo_political.5.desc:0 "It was already late into the evening and Akida had not yet been able to decide on a safe course of action to deal with the Mani. He hadn't proven himself worthy of respect yet, so it was obvious that it would be hard to deal with them as a perceived 'outsider'. If this kept up, his plans would be smothered before they could ever reach their potential. He sighed as he once again went over his notes. Each of the Mani had goals and visions for Zongo... very few of them seemed compatible with his at a glance. However, if he could take advantage of their wishes and rivalries then maybe—\n\n"Dear?" He almost jumped as he suddenly felt a hoof on his back. As he turned, he saw his mother already wearing her nightgown. "It is already very late, especially for the Mwenezongo. Is something troubling you?"\n\nHe rubbed his eyes, unable to stifle a yawn. "I am trying to find a way to keep the Mani appeased. Frankly, I don't know how you could keep them all under control after father passed; it seems like an impossible task." He began gathering his papers from the table. "Forgive me if the lights bothered you. I'll go to my own room to concentrate."\n\nAs he turned back, his mother simply smiled. "Oh, Akida. You are trying to solve in one night a puzzle I have spent years mastering." She gently guided him toward the door. "Go and rest, dear. A rested mind is much more useful than a sleepless night. Let me deal with the Mani for now, you will learn how they work with time." He wanted to protest, but she had already blown out the candle and soon closed the door, pausing to plant a quick kiss on his cheek. "Sleep well."\n\nHe felt a flicker of frustration, but it was overwhelmed by a wave of relief; he hadn't noticed how tired he had gotten... yet, he wouldn't forget this. It was not shameful to rely on others at times, yet, for as long as he did not show he could stand on his own hooves, neither the Mani nor his mother would treat him as his own stallion. For now though, he would rest."
 zongo_political.5.a:0 ""Good night to you too, mother.""
 zongo_political.5_tt:0 "There is a danger in the methods the Queen-Mother uses to handle disloyal elements, temperance might be wise.\nThe following decision will become visible in our states."
 zongo_political.6.t:0 "The Decree on Mobilisation" #TODO #Comma
 zongo_political.6.desc:0 "Prompt - Zongo must face that geopolitical circumstance forces us to prepare for war, both defensive and offence and as such a series of decrees are to be passed to better prepare the country. The Queen-Mother attempts to convince the king that there must be an increased state of readiness now for the economy, while the rest of the royal council finds this to be quite unnecessary instead favouring an extra set of decrees in the rural border regions which would help prepare the local populace more."
 zongo_political.6.a:0 "Prepare the Zebras in Border Regions in case of war"
 zongo_political.6.b:0 "The economy as a whole needs to enact emergency measures"
 zongo_political.7.t:0 "A Meeting With the Priestess" #Snow
 zongo_political.7.desc:0 "Akida waited in the humble temple at Zupinamba; this time not a surprise visit, but a planned meeting. Its clean but time-worn interior a stark contrast to the newly constructed capital's grand temple. He wondered why the Head-Priestess preferred this simplicity. Ayana came with a tea tray, her composure far more measured than during their first meeting. "Forgive the wait, Mwenezongo. I hope simple tea will suffice." She calmly served him. "Your letter mentioned the faith's role. Be assured, we seek no political entanglement; our duty is to the common creature."\n\n"You have read me well," Akida replied, cradling the warm cup. "The faith's values are a cornerstone of both Zongo's culture and its future" He looked at her earnestly. "I wish for it to remain a guiding light for my subjects and for it to remain uncorrupted by petty politicking, Aya—" He stopped as faint heat rose to his cheeks. "Head-Priestess."\n\nHer own postured seemed to soften as she smiled. "Just Ayana is fine, feels more comfortable that way." She met his gaze. "With our duty discussed, perhaps we could simply talk?"\n\nThe direct, personal offer struck him with unexpected force. For a heartbeat, his kingly composure faltered. He could feel the warmth on his face, grateful for the dim light that was hopefully hiding it. "That would be a pleasure... Ayana," he managed, the name feeling both strange to say aloud and wonderfully pleasant on his tongue. He took a deliberate sip of tea to mask his disarray.\n\nThey spoke as the afternoon waned. When he realised the late hour, he rose startled, offering flustered apologies. Ayana saw him out. But as he stepped into the evening, a strange feeling settled over him. He turned back with his body moving faster than his mind as he saw the mare silhouetted in the doorway. "May we do this again?" he called out, the words more earnest than composed."
 zongo_political.7.a:0 "He heard no words after that, for he had already lost himself on her smile."
 zongo_political.8.t:0 "A New Understanding Between Faith And State" #Snow
 zongo_political.8.desc:0 "The grand hall of the palace shimmered with movement. Before the assembled Mani and Nganga; King Akida and Head-Priestess Ayana put quill to parchment, formalising the result of their many meetings and discussions. The terms were straightforward: the state would ensure the faith's funding and uphold its values, while the clergy pledged its support to the crown and separated itself from politics, remaining focused on their usual matters. The room filled with applause as the two signed the document and smiled for the crowd, yet soon enough the commemoration had turned into just another party.\n\nLater, as the night wore on, music began to play and dances were shared across the hall. Akida found Ayana observing the festivities from a corner, a small smile on her face. The rigid formality she had worn during the signing had melted away as she noticed him approaching. "You disappeared after the signing; many hooves to shake?"\n\n"You could say that," he laughed. "Frankly, I did not expect it to go on for so long. I mostly avoided parties during my time studying; I did not expect they would catch up to me after becoming king. Perhaps I should have practiced a bit more in Senturya." The two shared a laugh as a comfortable silence fell between them, watching the other zebras dance. As a new song began, Akida extended his hoof. "To symbolise the new partnership; would the Head-Priestess honour the Mwenezongo with a dance?"\n\nA faint blush touched Ayana's cheeks, but her eyes sparkled. "I think she would prefer a dance with Akida." she replied softly as she took his hoof.\n\nThey joined the floor, their movements initially cautious and a bit awkward. But as the music swelled, the rest of the world seemed to fade away as they gazed into each other's eyes and slowly swayed to the song. In that moment, among the crowd, a quiet consecration of faith and crown happened, unnoticed by anyone else."
 zongo_political.8.a:0 "Separate yet united."
 zongo_political.9.t:0 "The Signing of the Constitution" #Snow #TODO
 zongo_political.9.desc:0 "Prompt - There is a ceremony to sign the constitution, the king signs, the priestess signs with the king making quick eyecontact, the chiefs start signing one by one. Queen-Mother seems a bit tenser than usual but also signs. The royal event continues, the king of Zongo and the priestess talking to each other when a Mani brings up the subject of marriage. The king shyly dodges the question as to when he intends to wed, he looks at her for a moment and he blushes looking away. Queen-Mother is looking at them from a distance, otherwise everything is going well, end on a happy note, maybe hint somehow that there is some slight movement in the shadows (there is a hooded zebra here who will later shoot at the king)."
 zongo_political.9.a:0 ""
 zongo_political.10.t:0 "Tragedy Befalls" #Snow
 zongo_political.10.desc:0 "What seemed once to be a perfect day suddenly turned upside down as a deafening sound echoed, followed instantly by a sharp, burning pain in Akida's side. The world seemed to slow, sounds muffled as if he were submerged in deep water. Ayana's face, once serene, was now a mask of sheer horror. The other attendees were a blur of panicked motion, their gazes darting between him and... a hooded zebra holding a smoking pistol. Akida looked down at the source of the sting, his mind struggling to process the sight of blood blossoming across his royal vestments. His legs gave way, and he collapsed to the floor, his vision blurring at the edges. Ayana seemed to be screaming, her mouth forming his name, but her voice was lost in the relentless, high-pitched ringing that filled his skull.\n\nIn the distance, his mother had a furious expression as two guards rushed and grappled with the assailant. A single shot rang out, then another, then a dozen more. The hooded figure finally crumpled, motionless as guards quickly moved to all corners of the palace. At least the other zebras would be safe.\n\nHe fought to keep his eyes open, a losing battle against the creeping cold that was seizing his body. Yet, a single point of warmth persisted – Ayana's hooves clutching his, her tears falling onto his coat. He wanted to tell her it would be alright, that they would soon laugh as they did few moments ago. The constitution had passed; this was a time for celebration, not for tears. He tried to form the words, to offer one final reassurance, but she was suddenly shoved aside.\n\nHis mother's face filled his dimming view, her expression one of raw, frantic terror as she screamed words he could no longer hear. He wished he could comfort her too, but his eyelids simply proved too heavy."
 zongo_political.10.a:0 "Suddenly, darkness."
 zongo_political.11.t:0 "The King Wakes Up!" #Snow
 zongo_political.11.desc:0 "Akida's eyes fluttered open, the world swimming into focus to reveal the white room he was in and the sullen face of his mother. She stood by his bedside, her hoof gripping his with a force that was almost painful. For a long moment, she simply stared, her breath a ragged sob. "My Akida," she whispered, her voice cracking with a relief so profound it seemed to physically pain her. She reached out with her other hoof, gently brushing the sweat-dampened mane from his forehead, her touch as tender as he remembered. But just as quickly as it came, it vanished, replaced by a feeling much more simple: anger. "You see?" she hissed, her voice dropping to a venomous, trembling whisper. "You see what your openness, your reforms, have brought you? A bullet! They will kill you for your kindness, Akida! They want to tear you apart!"\n\nShe leaned in closer, her eyes wide and pleading. "Please," she begged, the word a desperate, broken sound. "Please, my brilliant Akida! You must slow down! Postpone your plans for a year or two, you must rein in the kingdom first; punish those who would hurt you! Show Zongo your strength!" Her expression shifted again in a heartbeat as a tear traced a path down her cheek. "I cannot lose you."\n\nAs he looked into his mother's tormented eyes, his own resolve did not break. He moved his hoof weakly to cover hers. "Mother... I'm sorry," he breathed, his voice weak but his gaze unwavering. "A fair and stable kingdom, governed by laws its people believe in... does not try to assassinate its king. This just... proves why the reforms are needed now... more than ever."\n\nWith a slow, shuddering exhalation, she bowed her head. "Of course, my dear... as you wish." They stood in silence for a moment, soon broken by his mother standing up and leaving the room. Akida sighed. He knew why she was so worried, to see hew own foal like this in what was supposed to be a joyous occasion... he feared what she could do while like this, but who was he to deny her grief? Alone in his room he wondered about the future."
 zongo_political.11.a:0 "An idea cannot be killed by bullets, moving forward is a sign of strength."
 zongo_political.11.b:0 "Task mother with finding whoever was behind this!"
 zongo_political.12.t:0 "Remembering the Zebluan War"
 zongo_political.12.desc:0 "With Ithebra finally back in Zongolese hooves and Zeblu decisively gone, a commemoration was held for the recent victory and in remembrance of the Zongo-Zeblu war that began the millennium. Mani Zuba stood before a crowd of medalled veterans and fellow Mani, the Queen-Mother among them.\n\n"Many good zebras lost their lives in the war as King Nkosi led us toward victory," he began. "Tragedy struck when he was taken from us far too early. I battled by his side many times. Nkosi was a true beast on the battlefield, always balancing the safety of as many as possible with being undefeated in single combat. It was only through cowardice and deceit that he was taken from us. With Ithebra back in its rightful homeland and our borders secured, I truly believe Nkosi must be smiling, wherever he is, knowing Zongo is safe."\n\nAs the crowd applauded, Zuba felt a spike of anger. He had been given direct orders to end his speech with a message of unity and rebuilding. How could the King be so disrespectful to all they had fought and bled for? To the legacy of his own father?! As the crowd looked on, Zuba spoke once more, his tone shifting. "We must never forget the sacrifices that brought us here today; we also cannot forget...""
 zongo_political.12.a:0 "...We are all Zongolese now, no matter our origins."
 zongo_political.12.b:0 "...We must remain vigilant against those who would see us fall again."
 zongo_political.13.t:0 "The Imba-Zaru Houses" #Nap
 zongo_political.13.desc:0 ""Cheers!" "Cheers!" "For happy years to come!"\n\nGlasses clinked together in feigned respect. The representatives of the five Imba-Zaru houses wore their business smiles as they bowed to the envoy of Zongo. Normally, it would be natural for them to hold grievances against their conquerors. In truth, the more traditional houses did harbour deep resentment, yet none dared to voice it. The exclusion of the sixth house from this meeting had been warning enough. They had lost, and now they had to adapt.\n\n"I'm glad Imba-Zaru has such enlightened zebras as yourselves," the Zongolese diplomat said with a broad smile. He had pushed and pulled the five houses through relentless negotiations, wearing them down to simple terms that effectively integrated their political structure into Zongo. A more than satisfactory outcome. "The Queen-Mother and the King will be most pleased with this resolution. As everyone is aware, we desire stability in the region."\n\nThe house representatives nodded, some in acceptance, others in delight. The deal elevated them to local Mani, granting influence over the region and positions within the Zongolese court. They might have a ruler above them now, but they retained much of their authority and could reap the benefits of being part of a larger, industrialising nation. It was simply a step back to take two forward.\n\nThere were finer details to discuss, but those could be left to their subordinates. For now, they clinked their glasses and traded polite words. They idly wondered how to hint they wished to create ties with the Queen-Mother. She seemed like-minded in the needs of aristocracy."
 zongo_political.13.a:0 "The houses will toil for our benefit."
 zongo_political.14.t:0 "Dealing with the Roaman City-States" #Ardent
 zongo_political.14.desc:0 "The terms laid out to the Arksturi rulers seemed fair, to say the least. Which was exactly what caused them to eye the proposal with keen suspicion. The noontime sun bleated through their assembly's windows and made the air more stifling, but still did these zebras of status refuse to yield in their efforts... or suspicions.\n\nOne official set his hoof down, "Again, these terms seem fair."\n\n"More than fair," said another zebra near, "And that's what's bothering me."\n\nThe de facto ruler amongst them read over the terms again with quiet analysis. Much of how they were operating before would be incorporated into the Zongolese system, meaning Arksturi would operate as it normally did with but minimal interference from Zongo. The catch?\n\nIt was an exchange of wickedness for personal freedoms.\n\n"Better that we're on the winning side than not," said another official, "Otherwise we'd be replaced." They all shared a chuckle at the glaringly true insinuation.\n\n"So be it then," the head zebra stated, "Arksturi shall accept these terms and be the first among the cities to warmly cooperate with the Zongolese.""
 zongo_political.14.a:0 "They later learned the officials of Tisha accepted a week ago."
 zongo_political.15.t:0 "Aiding the Former Slaves" #Nap
 zongo_political.15.desc:0 "It was an odd feeling, one that threatened to slip into the heart and kindle a fire of hope when all had been lost. The ex-slaves had suffered greatly, be it during the conflict for liberation or the Chisimbi unification wars. Their living conditions had only grown worse through those struggles. Poverty, famine, disease, lack of security and more.\n\nThen the news arrived. Zongo had conquered their lands, yet instead of continuing the cycle of violence, it shattered it into pieces. The former slaves were dazed, uncertain how to proceed with their lives. They were given simple accommodations and food, a treatment they thought unbefitting of their status. Government personnel began cataloguing each creature's age, health and skills, deeming it necessary to find them suitable work to begin their new lives.\n\nThey had grown sceptical after so many conflicts, yet even they hesitated before rejecting such a rare opportunity. Zongo implemented many of the programmes once used in its own past of slavery, easing friction to the point that a quiet camaraderie began to grow. Creatures found themselves forging new friendships and relationships with their colleagues in their new roles.\n\nThe years ahead would demand hard work, with countless challenges awaiting them, yet for the first time, they allowed themselves to hope for the future."
 zongo_political.15.a:0 "'Akida' is sure to become a household name!"
 zongo_political.15.b:0 "The Queen-mother is praised for her kindness!"
 zongo_political.16.t:0 "Divide et Impera" #Snow
 zongo_political.16.desc:0 "Smoke hung thick in the private meeting hall, a haze that matched the mood. Zuba's abode served as a chance to speak freely, away from the prying eyes of the council. The latest dispatches from the Zeblu territories lay open on the central table.\n\nZeblu had been a state tethered by a hair even before its defeat. With Shaka Khan deposed, the clans were sure to revert to their old bickering. Her own clan was now irrelevant, destined to fade into history. Ithebra was rightfully Zongolese, and any clans there would bend the knee; the same for Mzinga. Kismaneyo and Zarawa were the important central regions, while Uzundi and Zana were distant enough to be of secondary concern. The plan was simple: favour the clans in Zarawa and Kismaneyo, while Uzundi and Zana were quietly stripped of their privileges.\n\nBut this would not be done in one fell swoop. One month, an exclusive trade route to a favoured clan. The next, a lucrative deal. Perhaps in a year, settling a bitter territory dispute by ruling in one clan's favour. It would all seem a natural extension of their ancient rivalries, until soon enough there were calls of one side being a traitor, another being unfit, and their internal rifts grew ever wider. Bad blood would coagulate as their influence rotted from within. The only choices for Zeblu's future would be to disappear in its own hatred or fall in line as subjects of Zongo.\n\nPerhaps even more unnerved by this series of events were the Mani themselves. This strategy proved that even if the king lacked martial prowess, he could wield tradition as a weapon to devastating effect. It was, in its way, a silent warning, whether Akida intended it or not. The fate of Zeblu would linger in the back of every Mani's mind. Even Zuba could not help but feel a certain thrill at this coldly elegant turn of events. Their long standing enemy was gone; they need only be careful not to follow its lead."
 zongo_political.16.a:0 "The pen, it seems, can be sharper than the sword."
 zongo_political.17.t:0 "The Hyena's mismanagement" #TODO #Fluff #Comma
 zongo_political.17.desc:0 "Prompt - Dealing with the local governance system which is shite, oligarchic and mainly rural. The system requires heavy evolution to fit, or we could just redesign it altogether. The downtrodden Zebra's in Baniremuka are very pleased to be out of Hyena governance and enthousiastically support our rule."
 zongo_political.17.a:0 "A modern Hyena system"
 zongo_political.17.b:0 "Redesign the whole system"
 zongo_political.18.t:0 "The Queen-Mother's Advice" #Snow
 zongo_political.18.desc:0 "...and with every decree, you give them another tool to question you," the Queen-Mother continued. "These Mani are not scholars, Akida. They are stubborn creatures who measure power in gifts given and favours owed. You cannot win them over with logic. You must bind them with loyalty, or failing that, with strength. All these council meetings make you look as if you need their permission to rule."\n\nAkida watched her with care. She had called for a private audience, but he did not expect so many worries to be aired out at once. "I hear your counsel, Mother," he said, turning to face her with a respectful nod. "And I value your experience. But the council is a tool to ensure—"\n\n"A tool does not give opinions!" she interjected, a rare flash of heat in her eyes as she stepped closer. "They will see your reliance as weakness. They will begin to believe their voices matter more than your own. You must consolidate. You must show them the crown does not ask; it commands. You must—"\n\n"Mother."\n\nShe stopped mid-sentence, her eyes widening a fraction. Akida saw the flicker in her gaze and instantly regretted his tone. He had been so blunt to his own progenitor. "I am sorry," he said, softening his voice. "I did not mean to cut you off so harshly. I know you speak from love, and from a lifetime of holding this kingdom together." He took a steadying breath, meeting her eyes with earnest resolve. "But I am the king now. And I must rule as I see fit. Trust in me. This is the path Zongo must take."\n\nFor a long moment, Nzuzi was silent, her regal composure a mask over a turmoil he could only guess at. She offered a slow nod and her characteristic smile. "Of course. I must take my leave now, if you'll excuse me." She quickly rose and left, leaving Akida alone. She was so quick to close herself when confronted... he only hoped his mother would eventually understand the importance of doing things this way."
 zongo_political.18.a:0 "The path is set, for better or worse."
 zongo_political.19.t:0 "Trust in the Queen-Mother" #Snow
 zongo_political.19.desc:0 "A heavy silence hangs over the council table. Discussions are brief, led almost entirely by key figures, with other members offering little more than quiet assents. When Akida speaks, proposing an idea with vigour, the council's eyes subtly flicker towards the Queen-Mother. She sits with a composed smile, her gaze resting on Akida with the fond look of a mother seeing their child play."
 zongo_political.19.a:0 "A council following the whims of the queen's son."
 zongo_political.20.t:0 "Trust in the King" #Snow
 zongo_political.20.desc:0 "The council chamber hums with a productive energy. Hooves are raised, voices speak in turn, and debates flow freely across the table. King Akida sits at the head, listening intently, his occasional nods or questions guiding the discussion. There is an air of respect in the way the council members look to him. From her seat, the Queen-Mother observes, a small smile gracing her features as she watches her son command the room with confidence."
 zongo_political.20.a:0 "A king in full command of his court."
 zongo_political.21.t:0 "Consequences of the Thunder Tiger's Explosion" #Ardent
 zongo_political.21.desc:0 "REPORT:\n\nTalarayi's cataclysmic destruction courtesy of the Thunder Tiger still continues to hamper progress and stability in the region. With its ultimate fate, the native population still clings to its cultural identity now enshrined by martyrdom, making unrest throughout the region prominent.\n\nLikewise, Zongo's development must also take account the dangerous aftereffects of the Golden City's fallout. Local tribes claim the land is now forever cursed by the desecration of the Golden City, but superstition cannot be the only reason for several frequent mishaps that have occurred in the area (construction tools breaking easily, railroads being blocked by sudden foliage, paperwork somehow vanishing, etc). Zero signs of insurgency indicate anyone is to blame here.\n\nHowever, this notion "forever cursed" may hold more merit on accounts of excavating crews and salvage teams unable to remain in the ruins of the Golden City for long due to sudden symptoms of nausea, dizziness, crippling anxiety, unexplainable paranoia, and other emerging symptoms. This can be rectified with better contracting standards in theory... but there is a possibility the Thunder Tiger's explosion also imbued the place with magical hexes.\n\nThe extent of these afflictions is unknown, but a full report on the instabilities caused by an entire city destroying itself will be compiled and countermeasures can be formulated for adaptation. It will be dispatched upon completion."
 zongo_political.21.a:0 "Every copy and the report itself mysteriously vanished."
 zongo_political.22.t:0 "An Undeniable Offer From [FROM.GetNameDefCap]" #Snow
 zongo_political.22.desc:0 "A communiqué has come from the Kingdom of Zongo, wishing for our two nations to be allied. They have laid their cards on the table very clearly: Our navy and strategic position as the Nacre Gate is of great interest to them. In return for prime access to them and a mutual guarantee of our independences, they have proposed an expansion of their own modernisation and industrialisation plans into Sambovato. They will completely fund it, expecting only cooperation for it to go smoothly.\n\nWhile the offer seems very good for our economy and ensuring a partner so that revanchist centaurs or gargoyles do not come after us in the future; there is a great risk to tying our own industrialisation to another nation. The choice is up to [MQA.GetLeader]."
 zongo_political.22.a:0 "For our mutual benefit, we accept!"
 zongo_political.22.b:0 "'Undeniable' offer? Let us show them how deniable it is!"
 zongo_political.23.t:0 "[FROM.GetNameDefCap] Has Accepted" #TODO #Fluff
 zongo_political.23.desc:0 ""
 zongo_political.23.a:0 ""
 zongo_political.24.t:0 "[FROM.GetNameDefCap] Has Refused" #TODO #Fluff
 zongo_political.24.desc:0 ""
 zongo_political.24.a:0 ""
 zongo_political.25.t:0 "Partying With [MQA.GetLeader]" #Snow
 zongo_political.25.desc:0 "The pavilion shimmered under the soft glow of paper lanterns and starlight. From the terrace, the sound of the sea mingled with the hum of string instruments and the chatter of diplomats, merchants, and nobles dressed in fine silks. King Akida stood near a potted palm with a half-finished glass of something too sweet for his taste. He had exchanged the necessary pleasantries, nodded through three conversations about shipping tariffs, and now sought the quietest corner to survive the rest of the evening—a task proven impossible by the sound of approaching steps.\n\n"Your Majesty," Akida said, offering a respectful bow as Queen Ceyda Vatosoa approached. "A magnificent gathering. Your hospitality is... vibrant."\n\n"Vibrant! That's a word for it!" Ceyda laughed as she took a glass from a passing tray. "Say, you've been hovering by this palm for over twenty minutes. I know it's a very nice palm, but I promise the company is better over by the music."\n\nAkida felt heat rise to his cheeks. "I was... taking in the view. The logistics of your harbour are impressive. I believe—"\n\n"That's a conversation for tomorrow. Tonight is for impressions. And my impression is that my new ally is quite fond of foliage rather than small talk." Akida began to fumble his words once more but was stopped by her laugh. "Relax, I'm only teasing." She took a final sip of her drink, noticing the empty glass. "Ah, seems I drank too fast. Well, my point is: I don't wish to make you uncomfortable, but I also don't want us to be allies of mere convenience. We are of similar age, so it felt refreshing to see someone in a similar situation to mine; I hoped we could simply speak without having to dance around each other." She raised her empty glass. "To progress, then?"\n\nAkida smiled slightly as he raised his own glass, the awkward tension melting away. "To progress, and... to potted plants." Ceyda looked stunned for a moment, but soon burst into laughter." 
 zongo_political.25.a:0 ""That's the spirit! Now, let's go get you something stronger to drink!""
 zongo_political.26.t:0 "Balanced Trust" #Snow
 zongo_political.26.desc:0 "The council meeting proceeds with the familiar rhythm of routine. Scrolls are passed, reports are read, and decisions are made with quiet efficiency. The other members offer their input when needed as the work of governance goes on. It is simply another day, and the business of ruling Zongo continues."
 zongo_political.26.a:0 "The steady rhythm of governance."

 # Kirian Events
 zongo_kiria.1.t:0 "Mincemeat" #Comma
 zongo_kiria.1.desc:0 "Arnyaan and the rest of the envoy had been trekking for days now. No reliable railroads around these parts, and gasoline couldn't be found growing on trees, so on hoof they'd gone. This was a walk for peace, for diplomacy. Their destination: Kiria. An historic nation, a league far above any modern-day Zongo could've dared to reach until now. The giant, recently awaken from slumber, must be talked to, negotiated with. For him and his team of journeyzebras, this was their ambition: a deal with a formidable would-be ally.\n\nThe grass moved. Grew shapes, grew shadows, grew cloaks. "Bandits!" he cried—he or someone else. In the lengthy span of the three seconds needed to pull out an ancient firearm and shoot at his unwelcome visitors, he couldn't tell who shouted who.\n\nOr who exactly was screaming. Or who was shooting what and where. Clothes fell limp to the grass: his team's clothes, his team's bodies.\n\n"Who are you?!" he dared cry out. Last stallion standing. Here lay a circle of his executioners, perfectly cloaked in vermilion robes. Fancy fabrics, of silks and other luxurious names... kirin. Blades were aimed at him, ready to be thrown. No witnesses.\n\nBut therein lay a mistake. No magic was used. No horn could be seen.\n\nAn untimely cough revealed an inch of muzzle from the one that would end his life a second later."
 zongo_kiria.1.a:0 "Stripes."
 zongo_kiria.2.t:0 "News From The Envoy!" #Snow
 zongo_kiria.2.desc:0 "The mood in the council was thick enough to choke on. They all stood in silence as Mani Zuba delivered the report.\n\n"The entire diplomatic envoy to Kiria was ambushed before they reached the border. There were... no survivors. While the assailants remain unknown, scorched earth was found at the camp. The evidence suggest—"\n\nThe Queen-Mother shot up from her seat, breaking the quiet of the room. "Do not play the foal!" she snapped, her usual composure shattered as she slammed a hoof on the table. "The convoy was on a mission of peace under the banner of Zongo! Who else would dare but the crazed kind of the kirin?! Their true nature has always been clear; now they have simply acted upon it." She turned a searing gaze to Akida. "This is a clear act of war."\n\nAkida looked at his mother, but the words died in his throat. The Mani, the Nganga, the Intelligentsia – all of them watched him with a mix of anxiety and expectation. He searched for an argument, for a path to peace, for a way to avoid this tremendous bloodshed... yet he simply found none. He could not show weakness with the blood of his subjects being spilt. The burden of choice was his alone.\n\nAs he took one final breath, the words none wanted to hear finally came into existence. "I hereby open a vote for Zongo to be put under a state of emergency" As his mother raiser her hoof in approval, others slowly began to rise too. His eyes flickered to Ayana, her own gaze downcast. Even with some hooves unraised, the necessary majority was reached. Akida spoke with a solemn expression. "Very well then, the council is dismissed until further orders." Even if they all refused to speak it aloud, they all knew: Zongo was about to face a conflict of unimaginable scale. Akida tightened his hoof on the table as the council dispersed."
 zongo_kiria.2.a:0 ""I must act before it is too late.""
 zongo_kiria.3.t:0 "An Awaited Proposal" #Snow
 zongo_kiria.3.desc:0 "Akida had called for Ayana to meet him in the same quiet chamber where they had first spoken. This room was usually a place of comfort for them, but it now hung heavy with the threat of war. Ayana entered, her expression clearly tired, yet she managed a soft smile as she always did. She seemed to notice Akida's tension immediately, settling herself beside him.\n\n"The last few days have been nothing short of terrible," she began, her voice weary. "So many innocent souls lost for a peace they could never reach. I have spoken with the..." She continued, outlining plans and preparations, but Akida barely heard her. As she spoke, the words he had thoroughly practiced deserted him. It felt as if a widening gap formed between them with every second of his silence, yet he simply couldn't bring himself to speak, perhaps it would be best if he—\n\n"Akida!" He snapped back to reality as she leaned closer, her face now mere inches from his. "You seem like you're a thousand miles away." She placed her hoof over his as she distanced herself once more. "It is unfair for so many to expect you to tackle this alone. You are strong, Akida. Stronger than anyone I know. Which is why I'm asking you to please say what's on your mind."\n\nIf there was ever a moment, this was it. He held her hoof tightly and lowered himself. "I do not know what awaits Zongo, or us, once this war comes. I do not know if we will live past it. That is why... I-I simply couldn't let another moment pass." He took a deep breath, his heart hammering against his ribs. "Ayana, will you marry me?" He searched her eyes, a flicker of his old awkwardness returning. "Is this as surprising as when I told you who I was?"\n\nFor a long moment, Ayana was utterly still, her eyes wide as she looked at the kneeling king. Then, a sound escaped her – a mix of a gasp and a sob – as she surged forward to wrap him in a tight embrace."
 zongo_kiria.3.a:0 "Even in the worst situations, love finds a way."
 zongo_kiria.4.t:0 "Into The Fray Once More" #Snow
 zongo_kiria.4.desc:0 "Strategies had been outlined, the royal guard mobilised, and Zongo was once more at war. The air in the council chamber was thick with the scent of ink, sweat, and dread. As the council members departed, Akida remained seated for a long moment, the weight of war settling on his back like a physical burden. He found himself walking towards a nearby balcony to simply gaze at the city. Zongo was more industrialised than ever... yet, was the only purpose of his plan to have created assets to face inevitability?\n\nThe soft clop of hooves announced another's presence. As he looked towards the door, a familiar face calmed the king. "I thought I might find you here," Anarbek's voice cut through the silence. He stood beside Akida, gazing at the city. "It is never easier to send your subjects to war."\n\nAkida let out a slow, shaky breath. "All plans for peace... they all led to a dead end, just as my mother said they would." He shook his head, resignation in his eyes. "She saw the truth of it before any of us. This conflict was inevitable from the moment that envoy was destroyed."\n\n"The Queen-Mother's foresight..." There was a subtle shift in Anarbek's posture. "It was indeed striking. Though, it is a pity such clarity often comes too late." He placed a reassuring hand on Akida's shoulder. "Yet, we follow a king who feels the weight of his decisions and feels for the suffering of his subjects. Never forget this, you are the Mwenezongo... we all fight for you."\n\nAkida nodded, drawing strength from his teacher's presence as they gazed at the city, unaware of how his words had just taken root in Anarbek's mind. Yet, there was no time for thinking anymore; the time had come to face their final challenge."
 zongo_kiria.4.a:0 "The die is cast; Zongo marches to war."
 zongo_kiria.5.t:0 "The Treaty of the Marekong" #Snow
 zongo_kiria.5.desc:0 "Now that the threat of the kirin was truly dealt with, meetings to decide the fate of the occupied lands had been ongoing day in and day out. Akida had decided to take a break, leaving his mother to work out some finer terms. He didn't worry for her; he knew she would do just as well without him there. Akida felt a lightness inside him that was rare these last few months as he stepped into the corridor. As he walked, he saw a familiar figure in the distance.\n\n"Anarbek!" Akida called out to gain their attention. "We have done it! The war is won and we can finally rest once more. I'll be honest, I'm quite anxious now that the war is finally over; it is surreal to be standing here." A genuine, almost foalish smile took over his face. "I wonder why I'm so anxious about a question I already know the answer to!"\n\nAs Akida laughed, he noticed Anarbek's expression was tense, sweat trickling down his temple. The usual warmth in his eyes was gone, replaced by a grim tension. "Akida... we must talk about something. It is about your mother," Anarbek said, stepping closer. "I began a private investigation when the war started into some of the more... unsightly rumours I had heard during my time here. It will be easier if you just see for yourself."\n\nAkida was handed a file that seemed to weigh more than his whole library combined. As his face shifted through a myriad of emotions in a matter of seconds, Akida took a half-step back, his hoof rising to his chest as if physically wounded.\n\n"I... I must excuse myself," Akida stammered, the words hollow. He turned and walked away, his stride quickening to a near-flee, not noticing as Anarbek called for him. The centaur could only hope his friend would not do anything rash."
 zongo_kiria.5.a:0 "Peace... achieved?"
 zongo_kiria.6.t:0 "A Revelation" #Snow
 zongo_kiria.6.desc:0 "Akida's request to meet had been strange, his note uncharacteristically rushed, with ink spots blotting the paper. When Ayana found him in their quiet chamber, she barely recognised him at first glance. She rushed to his side, and he looked up at her with exhausted eyes.\n\n"Ayana," he began, his voice raw. "I need to tell you something. Something... I..." He struggled with his words, yet when they finally left his mouth they poured out like a torrent: Anarbek's investigation, the file he had compiled, how it spoke of his own father, of the old Arch-priestess of Zongo, of past Mani... all deaths linked to one creature. Crime after crime, life after life, all leading back to one he relied on for his whole reign. His voice broke as he finished, his composure shattered. "All this time... my own mother..."\n\nAyana stood in stunned silence, her hooves clasped over her mouth as a cold dread seeped into her. Her mind filled with visions of Nala – the mare who had taken her in when she had no one else, the happy days they had shared, the profound grief that followed her death, and the weight of being forced to rise to a title she never wanted... but as she looked at Akida, she saw him trembling on the verge of tears and was jolted from her own pain. She was not the only one suffering: they were both victims of Nzuzi.\n\n"Ayana," Akida said softly as he reached out and took her hooves. "Thank you. For listening. For simply... being here." He held her gaze for a long moment. "I am the luckiest stallion alive to have you with me." She looked at him with worry for a moment, yet relented and smiled as the two embraced. Yet, over her shoulder, she could not see how his face hardened with conviction."
 zongo_kiria.6.a:0 "It was time to grow up, once and for all."
 zongo_kiria.7.t:0 "The Confrontation" #Snow
 zongo_kiria.7.desc:0 "The summons had been for an emergency council, yet the chamber felt unnaturally hollow. The seats of the Nganga and the Intelligentsia sat conspicuously empty, leaving only the Mani and, at the head of the table, a stony-faced Akida and his mother. Akida's gaze was fixed on her as he spoke, hiding any emotion. "I have but one question for you... why?"\n\nA ripple of unease moved through the assembled Mani, who began to whisper. Nzuzi's eyes widened in shock. "Akida! Are you well? You are not making any sense." She reached a hoof towards Akida. "Perhaps it would be best for us to speak of this in private—"\n\n"The time for private words is over." Akida's voice rose as he stood. "For the first time in your life, be honest!" He took a step towards his mother. "You always speak of love, but what I have learned shows anything but! I will hear the truth from you now! Speak!"\n\n"You are not yourself..." Nzuzi replied, taking a step back. "This is the grief of war talking. Please, my son, I implore you, do not believe whatever lies have been whispered to you!" As son and mother stared each other down, the Mani watched, frozen; the two pillars of the state fracturing before their eyes. Akida, took a step closer to her, his mother taking another back.\n\n"He was my father! Your husband! OUR KING!" he finally roared, the words echoing off the council walls. His gaze fell for a second as he tightened his hoof. "...do you even feel any remorse?" He hardened his expression once more as his mother averted her gaze. "You leave me with no choice. Guards, seize her! On the charges of high-treason and murder, seize Nzuzi!"
 zongo_kiria.7.a:0 "For a heartbeat, there was only a deafening silence."
 zongo_kiria.8.t:0 "The King Defeated" #Snow
 zongo_kiria.8.desc:0 "As Akida shouted the order for his mother to be arrested, he expected the guards to move and the Mani to assent to his choice. Yet the vision he had was nothing like the reality. Guards stood unflinching by the door, while the Mani simply looked away. He screamed once more, and once more. "Move! I said move! MOVE!" Yet it was as if his words fell on deaf ears.\n\nHis mother looked downcast for a moment, only to raise her face to meet his. It wasn't a look of fear or anger, it was... pity. She raised two hooves toward his face and gently caressed it. "Oh, my poor Akida... I expected more of you." He felt a chill as she spoke those words; they carried the tone of a disappointed mother scolding a foal. "You should think about how your actions make other creatures feel. You're a smart stallion, I know you are... so you'll understand why I must do this."\n\nWith a swift movement, Akida found himself surrounded on both sides by guards—his guards, apprehending him instead of his mother. "W-Wait, what are you doing?! Let me go! I am the Mwenezongo! LET ME GO!" As he kicked and shouted, his mother simply gazed at him as he was dragged from the room, vitriol spewing from his mouth.\n\nAs the doors slammed, Nzuzi sighed. "Someday he'll understand... Now, for you lot." Her gaze rose towards the Mani, any semblance of her motherly expression disappeared as her eyes fired with rage. "I think it's clear that the Mwenezongo is not in the right state of mind after the war. To protect the crown, the council will begin voting to reinstate the regency and emergency powers to Nzuzi Bomboko until Akida Bomboko is ready to take the reins once more!" As the Mani whispered quietly amongst themselves, they noticed the icy gaze of Nzuzi upon them. As if compelled, the Mani began one-by-one to raise their hooves in approval. Nzuzi simply smiled."
 zongo_kiria.8.a:0 ""Good.""
 zongo_kiria.9.t:0 "An Unimaginable Tragedy" #Snow
 zongo_kiria.9.desc:0 "The room had fallen to chaos. With the King shouting, his mother pleading and the Mani in utter confusion; Zuba could see the weakness that had festered in Zongo since Nkosi's passing perfectly exemplified. This was the final, pathetic unraveling of the Bomboko line; the very legacy Nkosi had bled for being torn apart by his own family. Zuba knew: the moment was now.\n\nHe rose, his voice cutting through the room. "The Bomboko line has failed! Guards, deal with the two of them!" A single moment of stillness followed as every head turned to him. Then, he could see his plan coming to life. A loyal guard had acted, firing a bullet aimed straight at Nzuzi's heart. Finally, she would pay for corrupting their home! Finally, she would pay for all the threats and scheming... yet, the bullet never found its mark. In a blur, the King shoved his mother aside and took the shot. He crumpled to the floor as if a puppet with its strings cut.\n\n'Why?' Zuba's mind stalled. 'Why throw away his life for that serpent?' He would have been dealt with shortly too, sure, but to see him use his final action to protect her when he was trying to order her arrest mere moments ago was simply... confounding. He was even more surprised as he saw Nzuzi act. She let out a sound that was neither cunning nor icy... it was despair.\n\n"AKIDA! AKIDA! PLEASE, PLEASE, SOMEZEBRA HELP MY FOAL!" He watched as Nzuzi cradled her son, his blood staining her fancy clothes. She shook him to no avail. "HELP HIM! AKIDA, PLEASE, STAY ALIVE!". She screamed and cried, the king laying unmoving on the ground. No matter, they would soon be reunited—\n\nThe sight was shattered as a crushing weight slammed him onto the table. "Y-You foals! Let me go! This is an order!" The Mani fell upon him with a fury. He roared, struggling against the bodies pinning him. Yet, as he looked up, he saw his loyal guard similarly subdued by his comrades. Ah... so this was how it ended."
 zongo_kiria.9.a:0 "With a slam to his head, the last true loyalist of Zongo passed out."
 zongo_kiria.10.t:0 "The Queen-Mother Arrested" #Snow
 zongo_kiria.10.desc:0 "For a heartbeat that stretched into an eternity, the council chamber was frozen. The guards marched towards the Queen-Mother in a matter of seconds. She looked towards the Mani, only to see their eyes fixed on her, resolute and proud. As if a spell had been broken, no one stood up for her; and she did not take this well.\n\n"Cowardly vermin! You have the nerve to betray me?!" she snarled. "I know the extent of your failures!" As the guards grabbed her, her irritation flared into raw fury. She bucked and kicked, but lacked the strength to back up her rage. She glared at Akida, her eyes holding no semblance of love, only pure, unadulterated disgust. "How dare you do this to your own mother?! Have you no shame?! Zongo will collapse without my guidance!" As she was dragged towards the door, she shouted one final venomous protest. "I should have never dealt with your father if I had known you'd be twice the failure he was!"\n\nWith that, the door slammed. Akida stood rigid, holding back the storm of emotions threatening to break him. He took a steadying breath and turned to face the Mani. "Our true work begins today, and I will need every one of you beside me to see it through."\n\nFor a moment more, there was silence as the Mani stood there. Then one rose, and another, and soon enough, the entire chamber erupted with a thunderous ovation, unlike any he had received before. Hooves stomped on the floor, and voices rose as one, shouting his name. "Long live King Akida! Long live Zongo!" He raised a hoof as they cheered for him, a flood of emotions overwhelming him. In their smiling faces, he could see a respect that had not been there before; they saw him as more than just his mother's son or a mere stallion they were obliged to follow. It was no longer a forced emotion, but true respect for their one true liege, Akida Bomboko."
 zongo_kiria.10.a:0 "It marked the beginning of a new age and new trials; but they were all undoubtedly his."

