 ### Ideas ###
 ZOO_regency_1:0 "Правление регента-матери"
 ZOO_regency_1_desc:0 "Во время правления регента Зонго сохранил хрупкий баланс между былыми традициями и стремлением к переменам. Период регентства нёс в себе осторожное управление с консервативным подходом ко внутренним делам и дипломатии. Хотя это обеспечило стабильность управления, оно также привело к отсутствию значительного прогресса и инноваций."

 ZOO_grand_coronation:0 "Великолепная коронация"
 ZOO_grand_coronation_desc:0 "Правительство не экономило на проведении коронации. Все присутствующие были ослеплены демонстрацией роскоши: от экзотических танцоров до изысканных королевских драгоценностей. Многие увидели молодого короля в первый раз, а грандиозная церемония только укрепила их уверенность в блистательности грядущего правления монарха."

 ZOO_under_chieftains_control:0 "Уполномоченные местные мани"

 ZOO_weak_constitution:0 "Обычное право"
 ZOO_weak_constitution_desc:0 "Верховная власть в Зонго принадлежит монархии, которую консультирует Королевский совет, состоящий из духовенства и мани, выступающих в качестве региональных управляющих. Ожидается, что мани будут обеспечивать порядок в своих региональных провинциях, гарантируя защиту основных прав зонголезцев в соответствии с историческими прецедентами."
 ZOO_mediocre_constitution:0 "Кодифицированный закон"
 ZOO_mediocre_constitution_desc:0 "Король Акида кодифицировал обычные законы, гарантируя их справедливое применение по всему королевству, независимо, какой мани правит на местном уровне. Это привело к тому, что их стали называть "Кодексом Акиды". Совет консультирует монарха по любым законам или поправкам к новому законодательству, причём окончательное слово остаётся за королём."
 ZOO_strong_constitution:0 "Королевская конституция"
 ZOO_strong_constitution_desc:0 "Королевская конституция содержит законы, на основе которых строится весь Зонго. Правовой кодекс описывает стандартизированные законы для всех регионов, в то время как мани просто выступают в качестве церемониальных правителей и советников монарха. Хотя ценности веры закреплены в конституции, все граждане сохраняют свободу вероисповедания."
 ZOO_suspended_constitution:0 "Приостановленная королевская конституция"
 ZOO_suspended_constitution_desc:0 "Королева-регентша приостановила действие конституции, и в настоящее время в Зонго действуют чрезвычайные меры. Хотя в королевстве по-прежнему действует единый закон, ситуация может измениться в любой момент, поскольку королевский совет бессилен, а королева-регентша является единственной абсолютной правительницей Зонго."
 ZOO_dictatorial_constitution:0 "Реформированная королевская конституция"
 ZOO_dictatorial_constitution_desc:0 "Королева-регентша внесла поправки в реформированную конституцию, закрепив её абсолютную и неоспоримую власть в Зонго. Мани теперь частично облечены властью, в результате чего вместе с рядом ключевых лиц в Зонго они превратились в новый олигархический класс, в то время как вера полностью подчинена действующему монарху."
 ZOO_broken_constitution:0 "Нерабочая королевская конституция"
 ZOO_broken_constitution_desc:0 "Королевская конституция перестала действовать: недавние события показали, что в копытах монархии находится слишком много полномочий и что злоумышленники могут злоупотребить этими полномочиями. Система мани оказалась неспособной обеспечить надлежащий надзор. Необходимо внести поправки в конституцию, чтобы мы не скатились к хаосу и расколу."
 ZOO_perfected_constitution:0 "Идеальная королевская конституция"
 ZOO_perfected_constitution_desc:0 "Недавно изменённая королевская конституция передала большую часть полномочий губернаторам регионов и значительно ограничила полномочия монарха и его наместников. Полномочия совета теперь закреплены в конституции, а независимый судебный орган обеспечивает дополнительный надзор."
 ZOO_collapsed_constitution:0 "Рухнувшая королевская конституция"
 ZOO_collapsed_constitution_desc:0 "Королевская конституция была полностью дискредитирована в результате государственного переворота. Лояльность мани находится под вопросом, в то время как стало ясно, что королева-мать сильно злоупотребляла властью монархии. Если мы в ближайшее время не внесём поправки в конституцию, зонголезское государство может развалиться само по себе."
 ZOO_federal_constitution:0 "Королевская федеративная конституция"
 ZOO_federal_constitution_desc:0 "Новая конституция превратила Зонго в конституционную монархию, усиливая регионы и гарантируя независимость судебной власти. Королевский совет был преобразован в демократически избранный парламент. Королева Аяна и премьер Анарбек видят будущее, где права каждого неприкосновенны, а солидарность – основа процветания."

 ZOO_unfinished_modernization:0 "Наследие программы "Рельсы и нация""
 ZOO_unfinished_modernization_desc:0 "Королева-мать резко отменила программу и вместо этого решила приватизировать многие активы, принадлежащие ему и монархии, в рамках так называемой экономической шоковой терапии, утверждая, что это принесёт больше свободы и возможностей населению."
 ZOO_reworked_modernization_program:0 "Королевский совет по разработкам"
 ZOO_reworked_modernization_program_desc:0 "Королевский совет по разработкам обеспечивает надзор, управление и субсидии промышленному сектору Зонго в условиях свободного рынка, так как наши первоначальные планы неосуществимы без мудрости Акиды. Правление действительно использует опыт старой программы, обеспечивающей устойчивый рост нашей экономики."

 ZOO_purging_the_disloyal:0 "Избавление от нелояльных"
 ZOO_purging_the_disloyal_desc:0 "Королева-мать приказала провести во благо народа массовые аресты тех, кто нелоялен к правительству. Да здравствует Зонго!"
 ZOO_lack_of_trust:0 "Отсутствие доверия"
 ZOO_lack_of_trust_desc:0 "Как только преступления королевы-матери всплыли на поверхность, многие зебры в Зонго, по понятным причинам, перестали нам доверять. Многие пострадавшие от её действий в страхе перестали различать Зонго и её саму. Нам нужно приложить усилия, чтобы вернуть доверие народа к нашей стране."
 ZOO_uncertainty_about_truth_1:0 "Неопределённая истина"
 ZOO_uncertainty_about_truth_1_desc:0 "Крайне неприятная правда кроется в тени паутин интриг и преступлений. Мало что однозначно известно о преступлениях королевы-матери, но можно с уверенностью сказать: нас ждут максимально неприятные вещи, так что мы должны дойти до истины, если хотим покаяться."
 ZOO_uncertainty_about_truth_2:0 "Завеса тайны приподнята"
 ZOO_uncertainty_about_truth_2_desc:0 "Словно лук, который чистят слой за слоем, подлинная сущность властей Зонго медленно обнажается. В самом сердце нашей монархии лежат исчезновения несогласных, коррупция и многое другое."
 ZOO_uncertainty_about_truth_3:0 "Правда о наших недостатках"
 ZOO_uncertainty_about_truth_3_desc:0 "Пока лук продолжает очищаться, глаза короля наполняются слезами, поскольку весь масштаб преступлений королевы-матери вот-вот раскроется. Сердце Зонго давно зачерствело и покрылось плесенью коррупции, так что все скептики были правы в своём недоверии к государству."
 ZOO_uncertainty_about_truth_4:0 "Правда восторжествовала"
 ZOO_uncertainty_about_truth_4_desc:0 "Новый план появится из слёз короля. Зонго раскается за свои недостатки и предпримет великие действия, чтобы исправить ошибки прошлого. Наследие королевы-матери не должно быть наследием Зонго."
 ZOO_queen_mother_loyalists_1:0 "Лоялисты королевы-матери"
 ZOO_queen_mother_loyalists_1_desc:0 "Коррумпированные чиновники, армейские офицеры, полиция и бюрократы продолжают свою деятельность на территории Зонго. Если мы когда-то отойдём от ужасов, творимых королевой-матерью, то должны будем разобраться с её лоялистами."
 ZOO_queen_mother_loyalists_2:0 "Лоялисты королевы-матери"
 ZOO_queen_mother_loyalists_2_desc:0 "Медленно, один за одним, коррупционеры и оппортунисты заменяются на компетентных и честных сотрудников. Хоть на зонголезской бюрократии и останется пятно, а мы ещё не приложили достаточно усилий для исправления прошлых ошибок, можно уверенно сказать, что скоро наше государство очистится от гнили королевы-матери."

 ZOO_commute_to_work:0 "Общественный транспорт"
 ZOO_commute_to_work_desc:0 "Сделав транспортировку граждан приоритетной задачей, мы обеспечили их своевременное прибытие на работу, что принесло долгосрочные преимущества. Повышение надёжности транспортной системы дарит каждому гражданину самый ценный ресурс – время."
 ZOO_increased_freight_trains:0 "Больше грузовых поездов!"
 ZOO_increased_freight_trains_desc:0 "Оптимизация грузопотоков на нашей обширной сети железных дорог позволила вывести на новый уровень эффективность всего производства: от первичного сырья до сложных изделий."

 ZOO_untapped_potential_1:0 "Скрытый потенциал"
 ZOO_untapped_potential_1_desc:0 "Зонго – это страна неосвоенных богатств: как природных ресурсов, так и рабочей силы. Несмотря на это, на протяжении прошлого тысячелетия эти ресурсы не использовались должным образом; текущая экономическая политика привела к стагнации, и до сих пор традиционное племенное сельское хозяйство преобладает над современными экономическими структурами. И хотя местное население сохраняет свою стойкость и находчивость, ему не хватает доступа к современным благам образования и здравоохранения, что в целом пагубно влияет на развитие королевства. В связи с этим Зонго оказался на перепутье: потенциал нашей страны поистине велик, но мы не можем его реализовать из-за нехватки новаторских разработок и современной инфраструктуры, позволившей бы нам покорить наши обширные леса."
 ZOO_untapped_potential_2:0 "Разработка природных ресурсов"
 ZOO_untapped_potential_2_desc:0 "Зонго (некогда являвшийся страной неосвоенных богатств) медленно, но верно приступил к разработке обширных залежей природных ресурсов, сокрытых в недрах наших лесов. Новая экономическая политика дала мощный импульс началу крупномасштабных геологоразведочных работ по поиску всевозможных месторождений полезных ресурсов и их освоению. Находчивость и стойкость нашего населения, проявленные в условиях стремительного роста, обещают в будущем принести ещё более весомые плоды."
 ZOO_untapped_potential_3:0 "Промышленный потенциал"
 ZOO_untapped_potential_3_desc:0 "Так как разработка ресурсов из бассейна Зонго идёт полным ходом, стало очевидным, что наше королевство обладает всеми необходимыми ресурсами для осуществления промышленного экономического чуда. Благодаря изобретательности и стойкости нашего народа, покорившего великие леса, эти же качества теперь питают и нашу промышленность. Опираясь на неисчерпаемый потенциал страны и её граждан, мы в кратчайшие сроки создадим современную экономику."
 ZOO_untapped_potential_4:0 "Промышленная революция"
 ZOO_untapped_potential_4_desc:0 "Теперь наши крупнейшие промышленные центры связаны разветвлённой сетью железных дорог, что позволяет ресурсам из бассейна Зонго оперативно поступать на ближайшие заводские комплексы. Так в полной мере реализуются преимущества взаимосвязанности, заложенные в программе "Рельсы и нация"."

 ZOO_army_reforms_1:0 "Наследие войны с Зеблу"
 ZOO_army_reforms_1_desc:0 "На пороге нового тысячелетия зеблуйский хан пересекла нашу границу и вторгся в Итебру, развязав кровавую войну, одной из жертв которой стал и король Нкоси. Наши вооружённые силы обескровлены, но опытны; несмотря на это, конфликт с Зеблу показал, что нам нужно увеличить численность армии. Мы должны принять определённые меры для решения этой проблемы, пополнить запас резервистов и модернизировать военные структуры в единую централизованную армию."
 ZOO_army_reforms_2:0 "Возрождённая королевская стража"
 ZOO_army_reforms_2_desc:0 "Высокая заработная плата и новые учебные учреждения привели к тому, что многие зонголезцы ищут карьеру во вновь возрождённой королевской гвардии. Нам необходимо сосредоточиться на дальнейшем реформировании структуры армии и заимствовании системы вооружённых сил у Сентурии, которая отличается от нашей профессиональным офицерским корпусом и централизованным командованием."
 ZOO_army_reforms_3:0 "Королевская армия"
 ZOO_army_reforms_3_desc:0 "Новая Королевская армия теперь состоит из объединённых под единым централизованным командованием гвардейских дивизий. Многие мани служат в рядах наших войск в качестве высшего офицерского состава, и эту же роль также выполняют ветераны зеблуйской войны, прошедшие обучение применению современных военных тактик в наших новых офицерских школах. Многие зебры теперь с удовольствием пользуются возможностью вступить в Королевскую армию, зная, что самые способные из них имеют шанс стать настоящими кадровыми офицерами."
 ZOO_army_reforms_4:0 "Гордость за Королевскую армию"
 ZOO_army_reforms_4_desc:0 "Теперь многие зонголезцы гордятся институтом Королевской армии. Видя этих солдат в современном снаряжении, марширующих на регулярных парадах, жеребята из самых разных семей – и бедных, и богатых – лелеют мечту однажды встать в их ряды, чтобы защищать Зонго от любой угрозы."
 ZOO_army_reforms_5:0 "Королевская армия под подозрением"
 ZOO_army_reforms_5_desc:0 "Верность Королевской армии теперь находится под вопросом. Недавние события показали, что мы не можем гарантировать верность вооружённых сил, если командующие ими офицеры-мани также не демонстрируют лояльности трону. Со стороны короля было бы предусмотрительным принять меры, которые бы гарантировали ему верность армии в случае раскольничества со стороны какого-бы то ни было члена совета."
 ZOO_army_reforms_6:0 "Верная Королевская армия"
 ZOO_army_reforms_6_desc:0 "Благодаря недавним успехам особого трибунала, многие оппортунисты и неблагонадёжные офицеры были отправлены в отставку. Королевская армия теперь беспрекословно подчиняется тем, кто платит ей жалованье. Солдаты уважают силу, и в последние месяцы мы ясно дали понять, что именно король является бесспорным источником этой силы. Отныне их верность трону не подлежит сомнению, ибо теперь, присягнув на верность монарху лично, солдаты по праву могут называть себя членами Королевской армией."
 ZOO_army_reforms_5_council:0 "Конфликт лояльности в армии"
 ZOO_army_reforms_5_council_desc:0 "Предательство мани Зубы – фельдмаршала Королевской армии – указало нам на конфликт в вооружённых силах. В то время как верность мани-оппортуниста остаётся под сомнением, зебры, занявшие свои места в армии благодаря собственным заслугам, остаются верны короне. Было бы разумным реструктурировать армию и обеспечить приоритетное место в вооружённых силах тем, у кого есть необходимые способности, а не тем, кому повезло родиться во влиятельную семью."
 ZOO_army_reforms_6_council:0 "Меритократия в рядах Королевской армии"
 ZOO_army_reforms_6_council_desc:0 "После окончания чистки офицерского класса от оппортунистов оставшиеся офицеры были избраны и повышены исключительно на основе их навыков и верности короне. Теперь граждане могут смело рассчитывать на наши вооружённые силы как на своих защитников, а также как на организацию, в которой каждый может достичь высокого звания, опираясь лишь на свои навыки и знания."
 
 ZOO_navy_production_bonus:0 "[ZOO.GetAdjective]ое расширение флота"
 ZOO_navy_production_bonus_desc:0 "Используя ресурсы, полученные благодаря программе "Рельсы и нация", Зонго может значительно усилить темпы строительства кораблей за счёт собственной промышленной мощи."

 ZOO_grand_railroad_project:0 "Программа "Рельсы и нация""
 ZOO_grand_railroad_project_desc:0 "Разработанная королём Акидой программа "Рельсы и нация" – это крупномасштабный проект модернизации, основанный на строительстве железных дорог, призванных связать все уголки страны воедино. Даже столь богатая ресурсами держава, как наша, испытывает беспрецедентные бюджетные трудности из-за амбиций этого начинания. До завершения проекта почти все доступные средства будут направляться исключительно на него.\n\nМвенезонго полон решимости доказать правильность своей теории любой ценой."
 
 ZOO_zaikirian_subject_idea:0 "Зонголезско-зайкирский договор о развитии"
 ZOO_zaikirian_subject_idea_desc:0 "Договор с зонголезцами привёл к тому, что большая часть наших природных ресурсов отправляется в Зонго для поддержания роста их ненасытной промышленности, в то время как нам взамен на это предоставляются лишь мелкие крупицы. Впрочем, мы рады такому обмену, так как это позволяет нам сохранять нашу независимость и автономию."
 ZOO_zongolese_trade_relations_idea:0 "Зонголезское торговое соглашение"
 ZOO_zongolese_trade_relations_idea_desc:0 "Зонголезцы пообещали сохранять с нами мир и не вмешиваться в наши дела в обмен на выгодное тарифное соглашение."
 ZOO_zongolese_defender_idea:0 "Подготовка Мейрконга"
 ZOO_zongolese_defender_idea_desc:0 "Мы не питаем иллюзий относительно отношений с киринами. И даже если в настоящий момент с Зайкирией сохраняется мир, нам необходимо тщательно изучить их технологии, военные доктрины и прочее, чтобы обеспечить себе преимущество в любом будущем конфликте."
 ZOO_zebluan_army_inspiration_idea:0 "Зеблуйская военная мысль"
 ZOO_zebluan_army_inspiration_idea_desc:0 "Опыт войны со старыми врагами – зеблуйцами, – победившими нас в прошлом конфликте, позволил нам перенять некоторые уловки и приёмы различных племён для быстрого перемещения и развертывания армии."

 ZOO_kirian_war_effort_idea:0 "Всеобщая мобилизация Зонго"
 ZOO_kirian_war_effort_idea_desc:0 "Если мы потерпим неудачу сейчас, это перечеркнёт все наши прошлые усилия. Долг каждого гражданина – предоставлять всё необходимое для нужд фронта, и тысячи зебр уже откликнулись на этот призыв."
 ZOO_kirian_resistance_suppresion_idea:0 "Акт по предотвращению восстаний в Зайкирии"
 ZOO_kirian_resistance_suppresion_idea_desc:0 "Мы приняли меры по предотвращению крупномасштабных восстаний киринов на оккупированных территориях. Эти меры необходимы для обеспечения безопасности как нашей армии, так и самих киринов, находящихся в нашем подчинении."

 ZOO_super_heavy_artillery_development_idea:0 "Инвестиции в зонголезскую артиллерию"
 ZOO_super_heavy_artillery_development_idea_desc:0 "Будущее зонголезской армии зависит от её возможности накрыть врага снарядами до того, как тот доберётся до пехоты. Мы разработали новые способы производства крупной артиллерии, однако эти эксперименты потребовали много ресурсов, и пройдёт какое-то время, прежде чем мы полностью интегрируем их в наши вооружённые силы."
 ZOO_army_support_idea_1:0 "Полки МТО"
 ZOO_army_support_idea_1_desc:0 "Для улучшения снабжения войск были сформированы полки МТО. Одной из предпринятых ими мер является внедрение стандартизированного комплекта снаряжения и отказ от использования нештатного оружия местного производства."
 ZOO_army_support_idea_2:0 "Полки МТО"
 ZOO_army_support_idea_2_desc:0 "Для улучшения снабжения войск были сформированы полки МТО. Кроме прочего, теперь в каждой дивизии имеется штатный алхимик, обеспечивающий подразделения зельями."
 ZOO_army_artillery_idea_1:0 "Доктрина артиллерийского огня"
 ZOO_army_artillery_idea_1_desc:0 "Армия Зонго полагается на мощь своей артиллерии, и мы приложили все усилия, чтобы выковать из наших канониров истинных мастеров своего дела. Когда враг решится скрестить с нами мечи, ему следует приготовиться к оглушительному грохоту наших орудий."
 ZOO_army_artillery_idea_2:0 "Доктрина артиллерийского огня"
 ZOO_army_artillery_idea_2_desc:0 "Армия Зонго полагается на мощь своей артиллерии, и мы приложили все усилия, чтобы выковать из наших канониров истинных мастеров своего дела. Когда враг решится скрестить с нами мечи, ему следует приготовиться к оглушительному грохоту наших орудий."
 ZOO_army_spec_ops_idea_1:0 "Доктрина ударных частей"
 ZOO_army_spec_ops_idea_1_desc:0 "В доктрине зонголезской армии особая роль отведена ударным частям, наносящим противнику максимальный урон до подхода основных сил. Противник должен быть готов к ударам из тени – наши диверсанты будут атаковать внезапно, сводя собственные потери к минимуму."
 ZOO_army_spec_ops_idea_2:0 "Доктрина ударных частей"
 ZOO_army_spec_ops_idea_2_desc:0 "В доктрине зонголезской армии особая роль отведена ударным частям, наносящим противнику максимальный урон до подхода основных сил, вооружённых противотанковыми и противовоздушными орудиями. Противник должен быть готов к ударам из тени – наши диверсанты будут атаковать внезапно, сводя собственные потери к минимуму и ослабляя врага перед встречей с нашими основными и готовыми к любой ситуации силами."

 ZOO_royal_mining_company:0 "Зонголезская горнопромышленная компания"
 ZOO_royal_mining_company_desc:0 "ЗГК – это государственная компания, главной целью которой является увеличение добычи полезных ископаемых."
 ZOO_royal_construction_corp:0 "Зонголезский строительный корпус"
 ZOO_royal_construction_corp_desc:0 "ЗСК – это государственная компания, отвечающая за координацию инженерно-строительных работ и повышение их эффективности."
 ZOO_royal_electronics_company:0 "Зонголез Электроникс"
 ZOO_royal_electronics_company_desc:0 "Зонголез Электроникс – это государственная компания, специализирующаяся на исследовании современной электроники."
 
 zoo_naval_1_1:0 "Мореходские знания Самбовато"
 zoo_naval_1_1_desc:0 "Зачем изобретать заново то, что наши кузены из Самбовато освоили десятилетия назад? Мы позаимствуем их наработки и методы, адаптировав под собственные нужды."
 zoo_naval_2_1:0 "Разработка морской стратегии"
 zoo_naval_2_1_desc:0 "У Зонго никогда не было полноценного флота. Наши моряки умеют управлять кораблями, но единой актуальной доктрины не существует. Наши лучшие умы займутся разработкой свода правил для капитанов и общей тактики действий флота."
 zoo_naval_3_1:0 "Защита нашей торговли"
 zoo_naval_3_1_desc:0 "Главная задача флота – охрана конвоев, а значит и нашей промышленности. Мы вложимся в проектирование кораблей, специально приспособленных для сопровождения конвоев и защиты торговых путей."
 zoo_naval_3_2:0 "Вооружение кораблей"
 zoo_naval_3_2_desc:0 "Чего стоит корабль без оружия? Мы применим опыт использования наземной артиллерии для создания корабельных орудий, способных эффективно поражать врага в морских сражениях."
 zoo_naval_4_1:0 "Дальнейшая доработка проектов"
 zoo_naval_4_1_desc:0 "Прогресс требует постоянных модернизаций. Мы продолжим совершенствовать конструкции кораблей, улучшая защиту и повышая их выживаемость под вражеским огнём."
 zoo_naval_4_2:0 "Значение морского оснащения"
 zoo_naval_4_2_desc:0 "Корабль – это не только пушки и броня. Навигационные и вспомогательные системы также требуют модернизации, чтобы флот мог действовать эффективно и без нареканий."
 zoo_naval_4_3:0 "Удар из глубины"
 zoo_naval_4_3_desc:0 "За рубежом появился новый тип подводных кораблей, меняющий характер морской войны. Эти "подлодки" крайне эффективно топят вражеские конвои. Мы разработаем собственные проекты, повторив успех других."
 zoo_naval_5_1:0 "Крупные орудия на крупных кораблях"
 zoo_naval_5_1_desc:0 "В поединке один на один побеждает тот, у кого огневая мощь выше. Мы создадим крупные корабли с тяжёлой артиллерией, способной вести огонь с недосягаемой для старых судов дистанции."
 zoo_naval_5_2:0 "Задействовать авиацию"
 zoo_naval_5_2_desc:0 "Некоторые страны успешно применяют авиацию против кораблей, даже размещая её на специальных суднах. Мы повторим эти эксперименты, чтобы авиация эффективно взаимодействовала с остальным флотом."
 zoo_naval_6_1:0 "Расширение морского производства"
 zoo_naval_6_1_desc:0 "Строительство кораблей недёшево и требует времени. Несмотря на развитую промышленность, наше морское производство... отстаёт. Интеграция верфей с новейшей промышленностью позволит нам превзойти любого противника."

 ZOO_air_reforms_1:0 "Воздушная эра Зонго"
 ZOO_air_reforms_1_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_2:0 "Воздушная эра Зонго"
 ZOO_air_reforms_2_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_sb:0 "Воздушная эра Зонго"
 ZOO_air_reforms_sb_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_bsp:0 "Воздушная эра Зонго"
 ZOO_air_reforms_bsp_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"
 ZOO_air_reforms_oe:0 "Воздушная эра Зонго"
 ZOO_air_reforms_oe_desc:0 "Эпоха, когда небо принадлежало лишь горстке крылатых существ, подошла к концу: теперь со взлётных полос поднимаются всё более совершенные самолёты, а ряды участвующих в битве за воздушное превосходство множатся ежедневно. Тот, кто владеет небесами, способен обрушить на землю неслыханный доселе смертоносный ливень, и если ты желаешь узнать, кому достанется победа – подними глаза к небу!"

 ### Events ###
 zongo.1.t:0 "Подтверждение" #SIREN
 zongo.1.desc:0 "Зал церемоний в институте Илкшехиры был переполнен. В нём собрались кентавры, зебры и множество других существ. Для него всё это выглядело почти как генеральная репетиция коронации. Он улыбнулся этой мысли. Долгие годы учёбы и упорного труда вели его к этому моменту. Совсем скоро он сможет применить все свои знания на практике во благо своей страны.\n\n— А теперь я с гордостью представляю, — уши зебры дёрнулись, когда ректор начал говорить со сцены долгожданные слова, — одного из наших лучших студентов. Того, кто неустанно трудился, чтобы удовлетворить свою тягу к знаниям, и многократно повысил престиж института. Поприветствуйте наследного принца Акиду Бомбоко! — по сигналу Акида под бурные аплодисменты вышел на сцену с высоко поднятой головой. Он остановился перед ректором, старым кентавром, который смотрел на него с гордостью.\n\n— Принц Бомбоко. Ваш труд о применении железных дорог для ускоренной модернизации не остался незамеченным. Вы обогатили не только наш институт, но и всю сферу экономической теории. И потому... — кентавр протянул руку к кафедре, где лежала маленькая круглая брошь с рогатым символом института, — для меня большая честь даровать вам титул доктора. — Он наклонился и прикрепил брошь к лацкану костюма Акиды. — А теперь, если хотите, скажите несколько слов.\n\nАкида не мог сдержать улыбку. — Конечно, хочу! — сказал он с лёгким смешком, поднимаясь на несколько ступеней к кафедре. Перед ним раскинулось море лиц. — Сказать, что я глубоко тронут этой честью – значит сильно приуменьшить мои чувства. За время моего пребывания в Сентурии я сталкивался лишь с добротой. Во время нападения короля Шторма мне была дарована привилегия оказаться в безопасности при дворе королевы, чего многие были лишены, — он сделал паузу, позволяя тяжести воспоминания опуститься на зал. Затем зебра вновь посмотрел на толпу, и его страсть вспыхнула с новой силой. — Но позвольте мне выразиться ясно: даже в той безопасности я никогда не забывал город, ставший моим вторым домом – Илкшехир! Ни я, ни Зонго не забудем вашей помощи и желания поделиться знаниями! Я благодарю всех, кто помог мне на этом пути. Благодаря вам..."
 zongo.1.a:0 "..."Зонго" вскоре станет синонимом "индустриальной державы"!"
 zongo.1.b:0 "...Зонго будет вознесён до ваших высот современности!"
 
 zongo.2.t:0 "Прощание" #SIREN
 zongo.2.desc:0 "В окна кафе светило закатное солнце. Акида смотрел, как небо окрашивается в багряный цвет, и постепенно осознавал неизбежность возвращения домой. Домой – туда, где он не был со дня смерти отца. Туда, где мать правила вместо него. Тогда юный Акида едва справился с горем, когда его отправили прочь. Теперь же он возвращается домой зрелым жеребцом. Впервые он почувствовал тревожное предвкушение: как его встретят после столь долгого отсутствия?\n\n— Подобная хмурость тебе совсем не идёт, — Акида отвёл взгляд от неба и посмотрел на зебру напротив, который усмехнулся в ответ. Зайлс был блестящим жеребцом, прибывшим с другого конца континента. Они были верными друзьями много лет. Сердце Акиды болезненно сжалось, но принц всё же улыбнулся. — Я всего лишь практикую подходящее королю выражение.\n\n— Ну да, если король, судя по его кислому лицу, съел целый лимон, — Зайлс отодвинул тарелку с недоеденным блюдом, — но мне кажется, что Его Высочество не говорит всей правды.\n\nАкида вздохнул. — Думаю, я только сейчас начинаю осознавать, сколько же лет своей жизни провёл здесь. Я так долго ходил по этим улицам, создал столько воспоминаний, что уход отсюда ощущается как потеря дома во второй раз, — он смущённо улыбнулся. — Звучит по-детски, когда произносишь вслух, да?\n\n— Вовсе нет, друг. Я буду скучать по тебе. — Зайлс задумался, затем постучал копытом по столу. Потом он пошарил в сумке и достал небольшую книгу. — Моя последняя работа только что вышла, так что этот том прямиком из типографии. Прими его как подарок на прощание. Чтобы не забыть меня, — он подмигнул. — И я не буду против, если ты упомянешь моё имя, когда займёшь трон.\n\nЛицо Акиды озарилось радостью, затем смягчилось нежной улыбкой. — Я... даже не знаю, что сказать... Я тронут, — затем он посмотрел на книгу и наконец-то прочёл название, отпечатанное на обложке крупными блестящими буквами:"
 zongo.2.a:0 "Искусство большого бабаха"
 zongo.2.b:0 "Гонка к величию"
 zongo.2.c:0 "Применение укреплённого бетона"
 
 zongo.3.t:0 "Сборы домой" #SIREN
 zongo.3.desc:0 "Выделенная Акиде половина комнаты была пуста. Исчезли газетные вырезки и зарисовки чертежей. Не осталось следа от книг, сложенных в башни. Стены, некогда украшенные личными памятными вещами и многочисленными подарками из дома, тоже опустели. Теперь лишь один дорожный сундук, лежащий на полу, напоминал о том, что Акида когда-то здесь жил. Все годы его жизни в институте уместились в не слишком весомую дорожную поклажу. Зебра намеревался налегке отправиться в светлое будущее. Акида подхватил сундук, закинул его за спину и направился к двери. Но остановился, бросив последний взгляд на комнату. Он взглянул уже на другую сторону комнаты, принадлежащую его соседу по общежитию. Там было полно вещей, но внимание зебры привлёк один чертёж.\n\nЭто было подробное изучение уже существующего образца огнестрельного оружия, некогда очень популярного в регионе. Акида вспомнил, как молодой кентавр месяцами не умолкал о своём проекте, объясняя, что он, как конструктор, должен попрактиковаться на уже известных образцах, прежде чем приниматься за что-то новое. Зебра изучил точные линии и ясные подписи. В его собственном королевстве пока почти не было производственной базы для подобных вещей. Если хоть сколько-то современное оружие и появлялось в его пределах, то уж точно оно было произведено не в Зонго. И тогда в голове зебры начала зарождаться мысль. Да, ему придётся без промедления приглашать специалистов в королевство. Но с этими чертежами он сможет заложить основу производства сразу же по возвращении!\n\nВскоре на столе появилась записка, прижатая тяжёлым мешочком с монетами. Акида снова отправился в путь, спрятав сложенные чертежи в свой плащ, пока его мысли мчались вперёд, к волнительному грядущему."
 zongo.3.a:0 "В записке было написано: "Одолжил парочку чертежей. Надеюсь, ты не против?""
 
 zongo.4.t:0 "Прибытие" #SIREN
 zongo.4.desc:0 "Акида почувствовал, как его дыхание перехватило, когда корабль пришвартовался к порту Заму. Вереницы низких домиков тянулись вдаль, окрашивая горизонт белым, серым и коричневым. И куда бы он ни взглянул – каждый уголок города кипел жизнью, яркой и шумной. Корабль наконец-то пришвартовался у причала, на котором его ждало множество зебр. Принц наконец прибыл домой.\n\nОн поспешил к трапу, махая копытом собравшейся толпе. Там, у причала, стояла процессия солдат. И среди них он наконец увидел её – элегантно одетую зебру средних лет. Она, казалось, не замечала Акиду, отдавая распоряжения командиру. Зебра улыбнулся и почти вприпрыжку направился вниз. — Мама! — позвал он. — Неужто для достойного приветствия нужно загонять этого беднягу до полусмерти?\n\nВластный голос зебры внезапно оборвался, и она с пустым выражением повернулась к нему. — Акида? — неверяще спросила она. Не успел он ответить, как она бросилась вперёд и заключила его в крепкие объятия. — Ты наконец-то здесь, мой жеребёнок! — когда зебра отстранилась, в её взгляде сияла лишь чистая нежность. — Не обращай внимания на это. Как прошла дорога? Ты не заболел? — заботливо спросила мать, но сын перебил её.\n\n— Уверяю, со мной всё в порядке. Я уж точно в силах добраться до дворца.\n\nМать кивнула. — Конечно, конечно. Нам лучше поспешить, — она бросила короткий, властный взгляд на командира. — Проследи, чтобы вещи принца доставили во дворец, — жеребец низко поклонился и тут же начал отдавать команды подчинённым. А затем, столь же быстро, как отдала приказ, зебра снова обратила всё внимание на Акиду. Её улыбка вернулась, и она мягко подтолкнула его. — Пойдём, дорогой. Тебе предстоит многое наверстать."
 zongo.4.a:0 "Леса Зонго мягко шелестели, пока они ехали к столице."
 
 zongo.5.t:0 "Созыв совета" #SIREN
 zongo.5.desc:0 "Принц Акида стоял перед огромной дверью, не обращая внимания на недоумённые взгляды королевской стражи. Ему нужно было лишь мгновение, чтобы собраться с мыслями, прежде чем переступить через последний порог.\n\nОдно дело – мечтать о власти своего отца. Но совсем другое – погрузиться в самую суть управления державой. За дверью его уже ждал совет, у каждого члена которого были свои планы, убеждения, да и верны они были далеко не только трону. Мечты Акиды о современном Зонго должны были выдержать испытание этим собранием. Принц нервно облизнул пересохшие губы. Изнутри доносились голоса – собравшиеся уже спорили. Это было похоже на первый удар грома от надвигающейся грозы.\n\nНо, как и всякая буря, спор стих. Когда Акида вошёл в зал, он внимательно взглянул на каждого присутствующего, и их пререкания мигом оборвались – зебры без промедления склонились перед ним в знак почтения. Именно с ними – советниками из разных слоёв общества – будущему королю предстояло иметь дело весь срок, что был отмерен ему на троне. Мать Акиды со своей неизменной улыбкой заняла место рядом с троном монарха.\n\nСделав последний глубокий вдох, Акида обратился к собравшимся."
 zongo.5.a:0 "— Я рад видеть вас всех здесь. Давайте приступим к делу."
 
 zongo.6.t:0 "Празднование возвращения домой" #Snow
 zongo.6.desc:0 "Пока зебры танцевали и пели, верхушка зонголезского общества собралась, чтобы приветствовать будущего короля, наконец готового вновь вести их вперёд. Среди весёлого торжества лишь одна фигура сидела в одиночестве с кружкой сидра, пока остальные танцевали и общались на площади. Не то чтобы его избегали – скорее наоборот. Акида переходил от одной группы к другой, обмениваясь короткими приветствиями и тут же с извинениями двигаясь дальше, как только подобное позволял придворный этикет. Вскоре большинство гостей поняли намёк и перестали докучать юному принцу.\n\nТеперь же, сидя в углу и размышляя о том, сколько ещё придётся ждать, пока всё это закончится, он заметил приближающегося пожилого зебру – одного из мани времён правления его отца. Акида приготовился к новому обмену любезностями и изобразил привычную улыбку. Но прежде чем он успел встать, старик заговорил.\n\n— Вы всегда были смышлёным, юный Акида. Уверен, у вас, как мвенезонго, уже есть множество планов на будущее... Я лишь надеюсь дожить до того дня, когда они воплотятся, — сказал старый зебра, усаживаясь рядом. Его взгляд не встречался с глазами Акиды, а был устремлён куда-то вдаль, в ночное небо. Принц ответил слабой улыбкой.\n\n— Вы оказываете мне честь своими словами, хотя я ещё не достоин их, — ответил Акида. — Я тоже надеюсь, что мои планы успеют исполниться при вашей жизни. Ведь именно благодаря вам и всем тем, кто верно служил моему покойному отцу и моей матери, у меня появилась возможность изменить будущее. Я не смогу спокойно спать, если не докажу вам и народу Зонго свою компетентность. Будьте уверены: я сделаю всё, чтобы показать вам, что страна в надёжных копытах."
 zongo.6.a:0 "Не говоря больше ни слова, они тихо, по-своему наслаждались праздником."
 
 zongo.7.t:0 "Разговор с матерью" #SIREN
 zongo.7.desc:0 "В последний раз Акида пил чай со своей матерью ещё в Сентурии. Официально это был дипломатический визит, но на деле она просто использовала его как повод увидеть сына. Всего год назад их беседа была лёгкой, и он даже не мог вспомнить, о чём они тогда говорили. Теперь же атмосфера была совершенно иной. Впервые они разговаривали не просто как мать с сыном, а как монархи.\n\n— Зонго процветал при тебе, — признал Акида. — Но я оглядываюсь вокруг и понимаю, что королевство выглядит точно так же, как в день моего отъезда. По правде говоря, оно не менялось ещё со времён правления отца, — он слегка улыбнулся, но глаза остались серьёзными. — Я считаю, что без перемен не обойтись. Только великие изменения способны вывести наше королевство из оцепенения. У нас есть все средства, чтобы полностью преобразить Зонго и сделать его предметом зависти всего региона, если не континента. Но без твоей помощи этого не достичь. У меня есть видение, но у тебя есть опыт и знания, которых мне не хватает. Так... — принц поёрзал на месте. — Ты поможешь мне?\n\nМать сделала неторопливый глоток чая. Её взгляд пронзал сына насквозь. Со стороны было понятно, почему многие находили эту зебру поистине устрашающей. Хотя её золотые годы давно позади, она всё ещё держалась с такой уверенностью и достоинством, что многие начисто забывали о её возрасте. — Не буду притворяться, будто меня не тревожит масштаб твоих планов, — призналась она ровным голосом, — перемены всегда несут смуту. Я управляла Зонго подобным образом не без причины, — увидев нахмуренное лицо своего сына, мать продолжила чуть мягче. — Но теперь король – это ты. Именно твоё видение важно. Я же буду советовать и делать всё, что в моих силах, чтобы направлять и защищать тебя и Зонго, — она ласково улыбнулась Акиде. — Будь уверен, сын мой, я буду рядом с тобой на каждом шагу."
 zongo.7.a:0 "На. Каждом. Шагу."
 
 zongo.8.t:0 "Коронация" #Snow 
 zongo.8.desc_lavish:0 "Он стоял в великом зале, а зебры вокруг уважительно молчали. Наряд Акиды был изысканным: золотые серьги и яркая одежда являли собой демонстрацию богатства Зонго. Зебра направился к трону, у подножия которого его ждала кобыла.\n\n— Рад вновь встретиться с вами, верховная жрица, — Акида слегка поклонился ей. В этот важный момент зебра вела себя совсем иначе: добрые улыбки и лёгкий смех, что прежде сопровождали её, исчезли. Но Акида не чувствовал себя обиженным – это был торжественный миг не только для него, но и для неё, ведь они стояли перед самыми влиятельными существами королевства. Принц улыбнулся. — Никому не говорите, но я тоже немного волнуюсь.\n\nЖрица едва заметно улыбнулась – так, что издалека этого нельзя было различить, как будто тяжесть спала с её плеч. Собравшись с духом, она заговорила. — Обещаешь ли ты, Акида Бомбоко, быть справедливым ко всем своим подданным и уважать их? Клянёшься ли чтить своих предков и долг? Понимаешь, что с сегодняшнего дня ты живёшь не просто как наследник престола, но и как представитель всего Зонго?\n\nПринц быстро дал положительные ответы на каждый вопрос.\n\n— Что ж, тогда... как верховная жрица я провозглашаю тебя... — словно по сигналу Акида склонил голову, сердце его билось от ожидания, — Мвенезонго, королём зонголезцев! — когда корона опустилась на его голову, великий зал наполнился ликующими криками: все собравшиеся приветствовали нового короля. Вдали королева-мать улыбалась гордо, но сдержанно, разделяя торжественность момента вместе с верховной жрицей.\n\nКогда Акида вышел наружу, толпа расступилась, открыв ему путь к богато украшенной карете. Тысячи зебр выстроились по обеим сторонам прохода и разразились радостными криками, как только он появился. Сердце новоиспечённого монарха билось быстрее, чем когда-либо прежде... Неужели вот так чувствует себя король, когда понимает, сколь многие подданные полагаются на него? Пока толпа приветствовала его, Акида думал лишь об их улыбающихся лицах и о том, как его план движется вперёд. Он должен был довести его до конца – не только ради себя. В этот момент мать слегка тронула его за плечо и тихо прошептала на ухо. — Помни, постарайся не разбить слишком много сердец на церемонии, ты ещё слишком молод, чтобы думать о наследнике, — Акида покраснел, и мать с сыном рассмеялись. В ту минуту он вновь, но уже в последний раз почувствовал себя жеребёнком. Впрочем, миг прошёл, и он окончательно стал королём."
 zongo.8.desc_normal:0 "Он стоял в великом зале, а зебры вокруг уважительно молчали. Наряд Акиды был тем самым, что носил его отец на своей коронации в знак почтения к предкам. Зебра направился к трону, у подножия которого его ждала кобыла.\n\n— Рад вновь встретиться с вами, верховная жрица, — Акида слегка поклонился ей. В этот важный момент зебра вела себя совсем иначе: добрые улыбки и лёгкий смех, что прежде сопровождали её, исчезли. Но Акида не чувствовал себя обиженным – это был торжественный миг не только для него, но и для неё, ведь они стояли перед самыми влиятельными существами королевства. Принц улыбнулся. — Никому не говорите, но я тоже немного волнуюсь.\n\nЖрица едва заметно улыбнулась – так, что издалека этого нельзя было различить, как будто тяжесть спала с её плеч. Собравшись с духом, она заговорила. — Обещаешь ли ты, Акида Бомбоко, быть справедливым ко всем своим подданным и уважать их? Клянёшься ли чтить своих предков и долг? Понимаешь, что с сегодняшнего дня ты живёшь не просто как наследник престола, но и как представитель всего Зонго?\n\nПринц быстро дал положительные ответы на каждый вопрос.\n\n— Что ж, тогда... как верховная жрица я провозглашаю тебя... — словно по сигналу Акида склонил голову, сердце его билось от ожидания, — Мвенезонго, королём зонголезцев! — когда корона опустилась на его голову, великий зал наполнился ликующими криками: все собравшиеся приветствовали нового короля. Вдали королева-мать улыбалась гордо, но сдержанно, разделяя торжественность момента вместе с верховной жрицей.\n\nАкида вышел наружу, всё ещё пребывая в лёгком оцепенении, и сразу оказался перед тысячами зебр, которые мгновенно разразились радостными криками, заметив украшение на его голове. Сердце новоиспечённого монарха билось быстрее, чем когда-либо прежде... Неужели вот так чувствует себя король, когда понимает, сколь многие подданные полагаются на него? Пока толпа приветствовала его, Акида думал лишь об их улыбающихся лицах и о том, как его план движется вперёд. Он должен был довести его до конца – не только ради себя, но и ради всех своих подданных."
 zongo.8.a:0 "Да здравствует Зонго! Да здравствует наш король!"
 
 zongo.9.t:0 "Приготовления к коронации" #Snow
 zongo.9.desc:0 "Акида стоял несколько безучастно, а его усталое лицо резко контрастировало с оживлённым выражением матери, которая листала каталог, показывая иллюстрации юному королю.\n\n— Смотри, сын мой! Разве эти золотые серьги не будут прекрасно смотреться на тебе во время коронации? — она сделала движение, словно собираясь ущипнуть его за щёки, но удержалась. — Конечно, есть ещё вопрос места проведения... это будет позором для тебя и твоего покойного отца, если зал для празднества не сможет подчеркнуть твои лучшие качества. Ах! — она воскликнула, перелистывая страницы. — И разумеется никак нельзя забывать о заграничных танцорах: они привлекут внимание и знати, и простонародья. Ты предпочитаешь сентурийских или, может быть, что-то более экзотическое? Я ещё слышала, что кирийские танцоры с клинками – на редкость впечатляющее зрелище. Кентавры, на мой взгляд, слишком неуклюжи, но учитывая, что ты провёл последние годы среди них, это могло бы создать особую атмосферу... Что скажешь?\n\nАкида чувствовал, что его голова идёт кругом, и сделал паузу, чтобы перевести дух, когда мать наконец прекратила поток предложений и вопросов. — Мама... я всё пытаюсь сказать, что не хочу ничего этого. Обычной коронации будет вполне достаточно, — старшая зебра продолжила непонимающе улыбаться. Она лишь пару раз моргнула и заговорила только после долгой паузы.\n\n— Обычной?.. — её улыбка на миг дрогнула. — Сын мой, это и есть обычные ожидания... Я была настолько бережлива, насколько могла! Потратим ещё меньше средств – и тебя будут называть позорными прозвищами вроде "Бедного" или "Скупого короля". Тебя сочтут слабым, если ты выйдешь столь плохо одетым, и этого я не могу допустить. Я не позволю им порочить моего дорогого сына! А теперь будь добр, выбери танцоров, — улыбка вернулась так же быстро, как исчезла, поставив Акиду перед перспективной немедленного и весьма непростого выбора.\n\nОн не мог не думать о том, сколько же средств уйдёт на все эти церемонии. Ведь унаследованный им бюджет был крайне ограниченным, а реализация его планов даже не началась. Однако мать была права: пышная церемония традиционно служила демонстрацией силы зонголезских монархов и наверняка удовлетворила бы всех... но Акиду всё никак не отпускала мысль о напрасно потраченных средствах. Так ли важны традиции в современную эпоху прогресса? Мать продолжала улыбаться, и Акида понял, что времени на размышления не осталось."
 zongo.9.a:0 "— Что ты там говорила про серьги?"
 zongo.9.b:0 "— Право же, мама, я желаю чего-то более скромного."
 zongo_9_tt:0 "После коронации вы получите следующие эффекты:\n"
 
 zongo.10.t:0 "$ZOO_grand_railroad_project$"
 zongo.10.desc:0 "Акида был в восторге, поскольку наконец-то мог начать воплощение своего великого плана – видения прогрессивного будущего для Зонго, основанного на полученных во время многолетней учёбы в Сентурии знаниях. Королевство было настоящей сокровищницей возможностей, и король это прекрасно понимал. Поэтому он обратился к совету – исполнителям его воли, собравшимся в зале, чтобы услышать о своей роли в формировании будущего королевства.\n\n— Достопочтенные советники, сегодня мы делаем первый шаг на долгом пути к процветанию. Как всем известно, наша страна богата, как никакая другая земля, но многие подданные Зонго живут так же, как их предки сотни лет назад. Пора изменить это! С помощью заграничных специалистов я разработал великий план стремительной модернизации Зонго, — уверенно заявил Акида, раскладывая карту предложенной железнодорожной сети.\n\n— Я видел, как далеко продвинулись другие страны – и в прямом, и в переносном смысле – в которых путь из одной провинции в другую занимает часы, а не дни. В таких условиях поселения могут с лёгкостью обмениваться и торговать едой и утварью. Так что всего через несколько лет весь Зонго будет идти в ногу с остальным миром – а может, даже обгонит его!\n\nСоветники нерешительно переглянулись, пока Акида выжидательно смотрел на них. Но вскоре мани услышали вежливый кашель Нзузи, после чего в тот же миг начали топать копытами, выражая поддержку плану короля Акиды. Он улыбнулся, предвкушая грядущую работу и преобразование своей родины. Именно так, как было изложено в его дипломной работе."
 zongo.10.a:0 "Всеобщее процветание начинается здесь!"
 
 zongo.11.t:0 "Призыв к экспертам" #Snow
 zongo.11.desc:0 "Когда корабль пришвартовался у причала в Заму, в груди Акиды что-то тревожно сжалось. Кто-то мог бы сказать, что будущему королю не пристало ждать гостей	прямо в гавани, словно тревожный супруг, но для принца этот визит был очень важен.\n\nОн позвал учёных, исследователей и специалистов, которых встречал или о которых слышал во время учёбы в Сентурии, и верил, что они помогут в модернизации Зонго. Но откликнется ли хоть кто-то на его призыв? Хотя Акида предлагал щедрое жалование из королевской казны, он понимал, что весьма немногие решатся приехать в Зонго. Однако мысли его были сосредоточены на одном особом госте.\n\nКогда трап опустился, привычная смесь торговцев и путешественников сошла на пирс. Среди них он заметил знакомый по дням учёбы в Сентурии силуэт. Акида постарался сохранить самообладание и быстро подошёл к новоприбывшим.\n\n— Скажи, вы приехали ради здешних красот? — Акида говорил менее формально, чем принято при дворе. — Или моё письмо всё же дошло до вас?\n\nНа лице кентавра было лишь глубокое и такое знакомое спокойствие и уверенность, когда он встретил взгляд своего бывшего ученика. — Да, ваше письмо действительно дошло до меня, Ваше Величество.\n\n— Пожалуйста, — мягко перебил Акида. — Здесь нет нужды в подобных формальностях. Мне будет очень неловко, если мой профессор начнёт вести себя как простой подданный.\n\n— Ну тогда и ты обращайся ко мне на ты. Мы больше не учитель ученик: называй меня просто Анарбек, — кентавр улыбнулся и поклонился. — Надеюсь, ты понимаешь, что моё уважение к тебе не сводится лишь к почтению подданного перед правителем. Я высоко ценил тебя ещё в те дни, когда ты был студентом. Я надеялся увидеть, как великие планы, которые ты набрасывал на моих лекциях, воплотятся в реальности, хотя никогда не думал, что именно меня призовут помочь тебе в этом. Получив твоё письмо, я сел на первый попавшийся корабль.\n\n— Ты первый, кто откликнулся на мой призыв. Если повезёт, то и не последний. Если Зонго хочет модернизироваться, ему понадобится ещё много светлых умов вроде твоего. Как бы ни был блестящ ум, одному-единственному существу не удастся противостоять тысячелетнему строю традиций, что боятся перемен, — Акида указал прочь от доков. — Но это не лучшее место для бесед. Пойдём, я знаю более уютное местечко, где мы сможем лучше обсудить, с чего начать."
 zongo.11.a:0 "Учитель и ученик вновь воссоединились как союзники."
 
 zongo.12.t:0 "Убеждая старейшин" #Snow
 zongo.12.desc:0 "Принц Акида внешне сохранял внимательность, но его мысли блуждали где-то далеко, пока старейшина-мани говорил. Казалось, они уже целую вечность ходят вокруг одного и того же.\n\n— ...и вы должны понять, я уж точно не желаю стать проблемой, — сказал старейшина-мани. Слова менялись каждые несколько предложений, но смысл оставался прежним. — Ваш отец был великим королём, а ваша мать... — взгляд пожилого зебры блуждал по комнате. Казалось, он был столь же утомлён, как и сам Акида. — ...обеспечила, чтобы вы смогли без помех взойти на трон. Я верю, что вы справитесь не хуже их, — он прочистил горло, издав нервный и сухой звук. — Однако ваши планы встревожили многих других старейшин-мани в совете. Я лишь хочу предостеречь вас: будьте осторожны. Вы идёте по опасной тропе.\n\n— Разумеется, мудрый мани. Будьте уверены, я вовсе не стремлюсь разрушить власть вождей или наши вековые традиции. Я лишь хочу принести те достижения современности, которые я видел во внешнем мире, в Зонго, чтобы все могли пользоваться благами, что я лично наблюдал в Сентурии, — Акида улыбнулся. — Если появятся какие-либо сомнения или вы сочтёте, что я сбился с пути, вновь без колебаний обращайтесь ко мне, чтобы мы своевременно решили этот вопрос.\n\nКогда мани ушёл с тревожным выражением лица, выдержка Акиды дала трещину. Это был уже третий старейшина за день, каждый приносил одни и те же расплывчатые предостережения о "голосах несогласных". Он ожидал сопротивления, но постоянные повторения жутко утомляли. Никто не осмеливался прямо высказать свои претензии, все лишь ходили вокруг да около. В тот момент Акида скучал по прямоте своих одноклассников в Сентурии. Для них он был не принцем, а другом. Если бы они были здесь, возможно, они могли бы...\n\nСтук прервал его мысли. Дверь открылась, и паж объявил, что следующий мани готов предстать перед монархом. Увы, времени на ностальгию не осталось: предстояло заложить слишком много основ, чтобы Зонго был готов к его планам. Акида жестом велел пажу впустить очередного мани."
 zongo.12.a:0 "Чтобы обеспечить будущее Зонго, нужно сперва разобраться с его прошлым."
 
 zongo.13.t:0 "План нового бюджета" #Snow
 zongo.13.desc:0 "Королевский кабинет преобразился. Карты и книги по алхимии теперь оказались погребены под свитками по экономической теории из Сентурии, а в воздухе витала меловая пыль. Король Акида стоял во главе стола, пока остальные экономисты изучали его первоначальные расчёты.\n\n— Теория верна, — заявил Анарбек. — Экспортируя обширные государственные запасы природных ресурсов, мы сможем заработать внушительный капитал. Королевские резервы обеспечат начальную ликвидность для плана, — он взглянул на последний расчёт на столе. — Да, это может сработать. Если теория выдержит проверку реальностью.\n\nТихий кашель раздался от другой участницы – гиены-специалистки по статистике. — Ваше Величество, если позволите. Эти прогнозы... слишком оптимистичны. Они предполагают стабильный внешний спрос и, что ещё важнее, игнорируют первоначальный шок для населения, — она постучала когтем по другому пергаменту. — Перенаправление стольких средств и труда на строительство однозначно вызовет дефицит в других сферах. Мы прогнозируем резкий, пусть и временный, рост бедности и недовольства среди ваших подданных. Народ почувствует это задолго до того, как увидит плоды ваших планов.\n\n— Если вы называете мои идеи оптимистичными, то ваши слишком мрачны. Тема бедности уже обсуждалась с королевой-матерью. Она заверила меня, что позаботится о помощи обездоленным, чтобы мы могли двигаться вперёд с планом, — Акида уверенно, почти пренебрежительно махнул копытом. — Зонголезцы более стойкие, чем вы думаете.\n\nКогда речь заходила о теории, новый король чувствовал себя очень уверенно. Некоторые переглянулись с тревогой. Гений Акиды был неоспорим, но его непоколебимая вера в теорию была той переменной, которую они не учли. После короткой паузы Анарбек кивнул, и остальные экономисты один за другим последовали за ним, пока вся комната не пришла к согласию. На бумаге план казался идеальным.\n\nИменно его воплощение в реальном мире вызывало у них беспокойство."
 zongo.13.a:0 "Прогресс ПРИДЁТ в Зонго."
 
 zongo.14.t:0 "Встреча с духовенством" #Snow
 zongo.14.desc:0 "Акида оказался в небольшой, тускло освещённой молитвенной комнате. Ему сказали, что верховная жрица часто молится здесь, и он предпочёл выбрать такой неформальный подход вместо душной официальной встречи. Дверь открылась, но слова застряли у него в горле. Вошедшая кобыла была молода, примерно его возраста, но её одежда была гораздо более формальной, чем у любой нганги. Это была не верховная жрица времён его отца. — Ты не Нала. Её преемница? — наконец спросил он.\n\n— Прошу прощения, что приношу такие печальные вести, но... Нала умерла несколько лет назад, — сказала кобыла с мягкой, но грустной улыбкой. — Я была её помощницей при жизни, а после её смерти меня быстро назначили преемницей и возвели в сан верховной жрицы Зонго. Тогда эта должность, конечно, относилась только к городу.\n\nОна тихо, смущённо рассмеялась. — Я была потрясена. Да, я служила помощницей Налы, но никогда не ожидала оказаться в центре внимания. С тех пор я стараюсь изо всех сил, но... ой! Ещё раз прошу прощения, — зебра хихикнула. — Я увлеклась и забыла спросить твоё имя.\n\n— Акида Бомбоко.\n\nКобыла моргнула, её выражение отразило то же удивление, что и у него пару минут раньше. Он тепло рассмеялся. — Я думал, ты знаешь. Извини, что не представился первым, не хотел прерывать твою историю.\n\nГлубокий румянец залил её лицо. — О боги, я болтала с будущим королём, словно с обычным жеребёнком! Простите мою дерзость! — она была готова вот-вот расплакаться, но Акида мягко заверил её, что всё в порядке. — Позвольте мне представиться как следует, — сказала она, собравшись с силами. — Моё имя Аяна, нганга-кулу Зонго. Надеюсь, мы сможем работать вместе ради светлого будущего.\n\nОна снова улыбнулась – принцу показалось, будто в дождливый сумрачный день сквозь тучи выглянуло солнце – и поклонилась. Акида подумал, что, возможно, работа с духовенством окажется не такой утомительной, как он опасался."
 zongo.14.a:0 "— Я тоже с нетерпением жду этого, верховная жрица."

 #Railway events
 zongo_railway.1.t:0 "Путь Заму, этап 1" #Snow
 zongo_railway.1.desc:0 "— Так в чём проблема? — спросил прораб. — Мы уже прокладывали рельсы в карьерах: выравниваешь их, закрепляешь болтами – и всё, вагонетка едет. Небольшая неровность не остановит её.\n\n— Это... немного сложнее, — Анарбек потёр лоб, встречая недоумённые взгляды рабочих. Он указал на стык рельсов перед ними. — Как указано в чертежах, пути должны быть идеальными. Даже если один участок чуть-чуть выше остальных, это создаёт линию излома, и под нагрузкой гружёного локомотива оно... — кентавр осёкся, понимая, что рабочие перестали следить за его объяснениями, и отправил бригаду трудиться, дав себе минуту на размышления.\n\nПринцип был тот же, но масштаб менял всё. Когда поезд понесётся со скоростью в сотни километров в час – а такие скорости неизбежно будут достигнуты – случится катастрофа. Проект не просто так следовал точнейшим инженерным расчётам.\n\nАкида направил его лично курировать один из важнейших участков проекта. Заму должен был стать промышленным центром страны, но Анарбек чувствовал себя так, словно объяснял высшую математику классу, который едва освоил арифметику. Уровень мастерства строителей Зонго – способных возводить как простейшие хижины, так и вычурную архитектуру столицы – сильно различался. Даже здесь рабочие вроде бы понимали саму идею, но применяли привычные стандарты к проекту, требующему абсолютной точности. Разрыв между линиями на его чертежах и долиной перед ним оказался пропастью, которую он не предвидел. Именно эту реальность должна была преодолеть теория его ученика, чтобы стать действительностью.\n\nКентавр глубоко вдохнул. Размышления – роскошь, уместная лишь в лекционном зале. Здесь же была лишь задача: уложить рельсы до заката. Из своей сумки он достал чистый свиток и начал писать: "Полевое наблюдение: основное ограничение не материальное, а когнитивное. Необходимо разработать упрощённый стандартизированный протокол. Теоретически возможный оптимум в данный момент недостижим. Необходимо начать с расчёта практической базы"."
 zongo_railway.1.a:0 "Попробуем ещё раз."
 zongo_railway.2.t:0 "Путь Заму, этап 2" #Snow
 zongo_railway.2.desc:0 "Земля была глубоко вскрыта мощью машин. Зебры были поражены скоростью, с которой расширялись шахты Змпангу: то, что раньше при хорошем темпе заняло бы недели, теперь было выполнено всего за несколько дней, полностью преобразив пещеры. Анарбек наблюдал за процессом, занося данные в планшет и одобрительно кивая при виде цифр по тоннажу добычи и скорости. И всё же...\n\n— Лентяи, а ну-ка за работу! — рявкнул прораб, указывая на огромную сверкающую груду необработанной железной руды. — Мои бригады простаивают полсмены, потому что некуда складывать то, что они накопали!\n\n— В расписании указано только десять вагонеток в день! — парировал специалист по логистике, обвиняюще указывая копытом. — Мы рискуем сходом с рельсов, если будем перегружать систему. Это не наша проблема, если твоя бригада хочет добровольно загнать себя до смерти!\n\nАнарбек слушал, сохраняя нейтральное выражение лица. Модель Акиды рассматривала добычу и транспорт как взаимосвязанные переменные. Здесь же они оказались двумя отдельными системами, одна из которых обгоняла другую.\n\n— У меня есть решение, — наконец произнёс кентавр. — Добыча сейчас превышает возможности транспортировки, и немедленно ничего изменить нельзя. Сосредоточьтесь пока на поиске более богатых жил. Это сократит объём добычи до уровня нынешних перевозок, пока я не организую расширение, чтобы учесть полный объём выработки. Если времени окажется недостаточно, я компенсирую трудности вычетом из своей зарплаты в пользу пострадавших рабочих. Это приемлемо?\n\nДвое зебр были удовлетворены предложением. Когда они разошлись, чтобы начать выполнять его распоряжения, Анарбек посмотрел на залежи руды. Спор о переизбытке практически рассмешил его. Из сумки кентавр достал свежий свиток и начал писать: "Жила Змпангу оказалась куда богаче, чем предполагалось. Следует принять предварительные меры на других шахтах, чтобы избежать схожих логистических проблем. Необходимо начать разработку практического метода.""
 zongo_railway.2.a:0 "Занятно."
 zongo_railway.3.t:0 "Путь Заму, этап 3" #Snow
 zongo_railway.3.desc:0 "Фабрики Заму ревели во всю силу, небо заволокло смогом, молоты и машины отбивали бешеный ритм, а готовая продукция текла непрерывным потоком. Производственные графики впечатляли; методы, применяемые здесь, наверняка будут распространены по всему Зонго. Однако из окна своего кабинета Анарбек воочию лицезрел непредвиденное последствие этого роста: на окраине поселения возникло маленькое сообщество.\n\nОно выросло там, словно сорняк. Запутанный лабиринт лачуг, собранных из всякого хлама, теснился возле стройки. Местных рабочих было недостаточно, но и приезжих в Заму было столько, что устроить их в таких количествах, особенно неквалифицированных тружеников, было попросту невозможно. Ветер приносил смрад, свидетельствующий об отсутствии нормальной санитарии, а ночью тускло мигающие огоньки не давали забыть о существовании этого дрянного местечка. Кентавр попросил медика изучить ситуацию, и отчёты оказались ужасающими: респираторные заболевания и болезни, передающиеся через воду, встречались в этом поселении в три раза чаще. Без стороннего вмешательства ситуация вскоре превратится в кризис здравоохранения невиданного масштаба.\n\nАнарбек развернул генеральную карту Заму. Он взял линейку и начал спокойными, размеренными жестами чертить новую сетку прямо к северу от промышленного центра, обозначив её как планируемый квартал, где можно поселить этих неформальных рабочих. Здесь будет канализация, нормальные уборные и водоснабжение, а также место для простых, одинаковых бараков. Всё будет построено максимально строго и скромно, чтобы уложиться в бюджет, но при этом подобный шаг предотвратит смерти и болезни. А также позволит рабочим полноценно интегрироваться в общество Заму.\n\nВ ту ночь у кентавра не осталось времени на заметки для отчёта: его ждало куда более важное дело."
 zongo_railway.3.a:0 "Он должен был пресечь катастрофу в зародыше."
 zongo_railway.4.t:0 "Путь Заму, этап 4" #Snow
 zongo_railway.4.desc:0 "Убогого поселения больше не было. На его месте вырос новый жилой сектор с аккуратными рядами одинаковых, но надёжных бараков и мощёными дорожками, соединяющими его с Заму. Дома не были величественными, но всё же сухими, чистыми и безопасными. Последний отчёт медика отметил резкое снижение заболеваемости. Производительность испытала краткий спад, но потом восстановилась и стабилизировалась.\n\nАнарбек принял первые делегации: мани из других провинций, послов из-за границы и даже журналиста из Сентурии, с которым он уже встречался ранее. Все они прибыли, чтобы увидеть "Чудо Заму", как его стали называть. Разумеется, как "ответственный" за него, кентавр должен был оставаться и давать интервью. День прошёл в целом без проблем: гости приходили и уходили, удовлетворённые увиденным. Они не видели ни лихорадочных расчётов, ни перенаправленных ресурсов, ни грязной земли, где совсем недавно были трущобы. Они видели лишь триумф Заму – и это был лучший результат, на который мог надеяться Анарбек.\n\nКогда солнце склонилось к закату и кентавр вновь обрёл покой, он воспользовался моментом, чтобы подготовить свой обычный отчёт. Из сумки он достал свежий свиток и начал писать: "Перенаселение – потенциально катастрофическая проблема и наверняка останется таковой в будущем. Хотя Заму удалось избежать кризиса, методы, применённые для достижения успеха, были несовершенны. Промышленный рост устойчив лишь при условии заранее продуманного планирования жилья. Подробности о методах и личные мысли будут изложены в полном отчёте. Если при нынешних расширениях возникнут подобные трудности, уведомите меня немедленно"."
 zongo_railway.4.a:0 "Он мог лишь надеяться, что подобное не повторится."
 zongo_railway.5.t:0 "Путь Заму, этап 5" #Snow
 zongo_railway.5.desc:0 "Анарбек в одиночестве стоял на платформе железнодорожной станции Заму. Он пришёл пораньше – возможно, даже слишком рано – чтобы насладиться вечерним бризом. Последние несколько месяцев стали для него удивительным опытом, позволившим воочию увидеть, как теория оживает в самых наглядных формах: от прискорбных недостатков до великих успехов, отражённых в многочисленных фабриках и складах, ныне усеявших окрестности. Заму превратился в настоящий город, где объём торговли и численность населения достигли невиданных высот. Весь хаос, с которым он боролся, в конце концов улёгся, став гармоничным повседневным ритмом.\n\nКентавр на мгновение остановился, чтобы ещё раз перечитать свой полный отчёт. Из сумки он достал переплетённую работу с простым заголовком: "Об управлении индустриальной трансформацией: наблюдения во время пребывания в Заму". Это был его итоговый отчёт по региону – полное изложение бурного рождения города, изложенное научным языком и пригодное к воспроизведению. Первая часть подтверждала теорию программы «Железные дороги и нация» с помощью исчерпывающих данных, собранных им во время наблюдения за промышленным ростом. Вторая часть описывала разработанные методики для управления логистическими, инфляционными и социальными переменными, неизбежно возникающими при столь стремительных переменах.\n\nКогда платформа начала наполняться пассажирами, Анарбек убрал отчёт обратно в сумку; время для правок ещё найдётся. Его взгляд скользнул по формирующейся толпе: кого-то он мог встретить прежде или даже изменить его или её судьбу. Но абсолютное большинство даже не знали, кто он такой. Это приносило кентавру особое удовлетворение. Даже после всего сделанного он мог наслаждаться покоем и тишиной.\n\nВскоре на станцию прибыл поезд, и существа начали заходить внутрь... мягко говоря, не слишком организованно. Анарбек сдержал лёгкий смешок. Судя по всему, всё ещё существовали вещи, которые он не мог исправить привычными научными методами. Решив не создавать пробку на входе, кентавр отошёл в сторону и сделал последнюю заметку."
 zongo_railway.5.a:0 ""Предложить совету провести общественную кампанию по правилам поведения в поездах.""
 zongo_railway.6.t:0 "Путь Зупинамбы, этап 1" #24
 zongo_railway.6.desc:0 "— Так, жеребята, давайте теперь ещё раз и все вместе! Начиная слева, каждый говорит по одному слову.\n\nАяна стояла у старой каменной доски из местного храма и показывала копытом на несколько крупно написанных мелом слов, пока напротив неё шестеро жеребят щурились и пытались их произнести. Вдали от столичного шума и суеты, не говоря уже о придворных интригах, Аяна чувствовала облегчение. Поездки в менее развитые районы Зонго ради помощи бедным помогали ей смотреть на мир приземлённо, сбросив ярмо высокого статуса. Сегодня она заменила учителя в храмовой школе, чтобы помочь жеребятам освоить основы чтения, и это было куда приятнее, чем разбираться с интригами мани.\n\n— Каж... э-э, т...то есть, каждый! — Жеребёнок? — Из! — З-За... Зонго! — Очень хороший! — выкрикивали собравшиеся по очереди, причём последняя кобылка от радости выпалила сразу два слова, чем сильно огорчила последнего жеребёнка. Аяна улыбнулась, наблюдая, как дети спорили за право произнести одно слово. Все они настолько искренне восхищались чтением, словно познавали секрет вселенной. Впрочем, кто знает? Может, так оно и было.\n\n— Так, так, не ругайтесь между собой. Захина, ты знаешь, что последнее слово должен был читать Занока, — Аяна улыбнулась и написала на доске всего одно слово, но куда более длинное. Глаза жеребят округлились, пока оно тянулось буква за буквой, будто не собиралось заканчиваться. — Вот особенное слово, только для тебя. Сможешь его прочесть?\n\nПока Занока хмурился на доску и от усердия высунул язык, пытаясь его разобрать, Аяна ещё раз оглядела класс. Если всего шестеро бедных жеребят из домов рядом с храмом так стремятся научиться читать – чего она сможет добиться, если доступ к обучению получат шестьдесят? Если удастся расширить классы, найти учителей для других городов... или даже для всей страны? Эта мысль однозначно стоила того, чтобы озвучить её королю по возвращении в Зонго. Настолько погрузившись в свои размышления, она едва не пропустила восторженный вздох Заноки, когда он понял, какое слово появилось на доске."
 zongo_railway.6.a:0 "— Зупинамба! Мы здесь живём!"
 zongo_railway.7.t:0 "Путь Зупинамбы, этап 2" #24
 zongo_railway.7.desc:0 "Аяна улыбнулась, наблюдая за тем, как жеребята начинают складывать свои скромные пожитки и готовиться покинуть храм Зупинамбы, когда урок подошёл к концу. Но после подавила лёгкий вздох сожаления, осознав, что это также значит, что и веселье заканчивается. С тех пор как она предложила Акиде свой план и получила его поддержку, Аяна получила неограниченный доступ к новой железной дороге до Зупинамбы и право продолжать вести занятия, что звучало почти как отдых во время работы. Политика была неприятной и утомительной, но вот учить маленькую группу жеребят читать – словно глоток свежего воздуха. Каждый раз, когда уроки на неделе подходили к концу, она чувствовала лёгкое разочарование.\n\nВозможность продолжать преподавание стала даром, которым она не собиралась пренебрегать. Получив одобрение Акиды на создание первой в Зонго массовой программы по ликвидации неграмотности, она получила королевскую поддержку как избранная храмовая учительница. Теперь её задачей было наблюдение за развитием программы собственными глазами и передавать опыт экспертам в столицу, чтобы помогать другим учителям в новых школах.\n\nЭто также позволило ей лучше узнать жеребят, посещавших её занятия, и когда она увидела, что одна из кобылок нерешительно задержалась у парты, пока остальные уходили, Аяна подошла и положила ей копыто на плечо. — Захина? Что-то случилось?\n\nНесмотря на смущение, та всё же ответила. — Мисс Аяна, у вас есть что-нибудь поесть? — спросила она, съёживаясь от стыда с каждым словом. — Мама не дала мне с собой обед.\n\n— Конечно, дорогая. Храм хранит еду для всех, кто нуждается. Пойдём возьмём, хорошо? — кобылка улыбнулась и припрыгивая последовала за ней к храмовой кухне, но её слова не давали Аяне покоя. — Почему твоя мама не дала тебе обед? Забыла?\n\n— Она... не смогла достать еды на рынке, — нахмурилась Захина. — Мы больше не можем выращивать её сами, потому что наше поле было выкуплено под железную дорогу.\n\nГлаза Аяны расширились от удивления, но вслух она лишь сказала: — В храме всегда будет еда для тебя и твоей семьи. Не беспокойся, маленькая, — впрочем, в мыслях она уже ясно понимала – это проблема не одной бедной семьи. Сколько ещё столкнутся с тем же?"
 zongo_railway.7.a:0 "Мы должны модернизироваться не в ущерб самым уязвимым."
 zongo_railway.8.t:0 "Путь Зупинамбы, этап 3" #24
 zongo_railway.8.desc:0 "Доброе утро, мисс Аяна! — радостно проскандировали почти два десятка жеребят, когда зебра вошла в совершенно новый класс Зупинамбской школы письма. Это была первая подобная школа в королевстве, и её построили исходя из опыта Аяны в преподавании жеребятам при храме и расширения кампании по обучению грамоте. Новое здание включало четыре класса, кабинет для преподавателей и столовую, в которую все шли в обеденный час. На фоне ещё почти неразвитых сельских окрестностей Зупинамбы это было настоящее инженерное чудо. Аяну же больше всего радовало то, что Акида проявил большой интерес к её начинанию и направил ей все ресурсы, необходимые для успеха... к огромному неудовольствию различных мани.\n\n— Доброе утро, класс! — отозвалась зебра в ответ и повернулась к доске, где уже были написаны несколько слов. — Сегодня важный день! Мы будем учиться сокращениям. Ну-ка, кто уже успел прочитать наперёд в своём учебнике вчера вечером и знает, что такое сокращение? — когда она обернулась, половина класса уже подняла копыта, готовясь отвечать, из-за чего её улыбка стала ещё шире.\n\nК концу урока Аяна, несмотря на лёгкую усталость, ощущала неподдельную гордость за своих жеребят, которые прошли долгий путь. Учить больше двадцати маленьких зебр было куда тяжелее, чем тех шестерых, с которых она начинала! Когда прозвенел звонок и ученики начали выходить из класса, она заметила Захину, задержавшуюся у парты и неловко перебирающую копытами. — Захина? Что-то не так, дорогуша? — спросила Аяна, вспоминая, как в прошлый раз малышка стеснительно просила еду. Стоило ей подойти, как кобылка просто прижалась и обняла её.\n\n— Спасибо, что помогли мне читать, мисс Аяна, — сказала та, обхватывая преподавательницу за ногу. — Теперь все остальные просят меня читать им надписи, а я могу это делать! Даже мама просит меня помогать с чтением! — кобылка просияла, но улыбка тут же дрогнула. — Жаль, что мама сама не умеет читать.\n\n— Я уверена, она очень скоро научится, — ответила Аяна, мягко обнимая ученицу в ответ. — Особенно если у неё будет такая хорошая учительница, как ты.\n\n— Я плохо учу, — надулась малышка, но вдруг ахнула и сияюще улыбнулась. — Зато вы это делаете хорошо! Я скажу маме, что ей надо в следующий раз прийти со мной! — со станции в нескольких кварталах раздался свист поезда, и Захина ещё раз обняла учительницу, прежде чем сорваться с места. — Мне надо бежать на поезд! До свидания, мисс Аяна!\n\nТа проводила глазами маленький ураганчик. Когда она скрылась, зебра лишь фыркнула и покачала головой. Наблюдать, как дети радуются урокам, было бесценно. А если их родители перенимут хотя бы часть энтузиазма в обучении чтению..."
 zongo_railway.8.a:0 "Интересно, через сколько уроков взрослые тоже начнут посещать занятия?"
 zongo_railway.9.t:0 "Путь Зупинамбы, этап 4" #24
 zongo_railway.9.desc:0 "— Простите, что опоздала! — выпалила Аяна, забегая в класс с такой скоростью, что бумаги едва не вывалились из её сумок. Постоянно строящиеся железные дороги в Зонго, а особенно на линии между столицей и Зупинамбой, означали и беспрецедентный рост движения поездов. Это, в свою очередь, приводило к избытку составов и нехватке путей для них, из-за чего поезд Аяны в Зупинамбу раз за разом переводили на запасные ветки, и она потеряла почти два часа. Но Зонго вполне справлялся с неизбежными трудностями столь масштабного железнодорожного проекта, и она знала, что вскоре всё наладится.\n\nЗебра так волновалась из-за опоздания, что не сразу заметила новую ученицу в классе. Аяна лишь недоумённо моргнула, увидев взрослую кобылу, тщетно пытавшуюся устроиться поудобнее за слишком маленькой для неё партой. Впрочем, стоило ей увидеть рядом с кобылой Захину, похожую на неё как две капли воды, как всё стало очевидно. Несмотря на явную неловкость и смущение матери кобылки, Аяна подарила ей ободряющую улыбку, пока приводила в порядок бумаги. — Ну что ж, класс, раз уж мы начинаем несколько позже, то давайте изменим сегодняшний урок. Для начала повторим основы. Начнём с того, что перепишем алфавит. Когда закончите, откройте рабочие тетради на упражнении в конце первой главы и приступайте. Я подойду и посмотрю, как у каждого получается, когда закончу разбирать сумку.\n\nПусть жеребята и недовольно застонали от такой простой работы, но это изменение было сделано не ради них. Благодаря стандартизированной программе, которую начали разрабатывать в столице, Аяна теперь могла легко и гибко менять уроки, не теряя времени на их переделку и не снижая качество. Ведь когда в класс посреди курса приходила новая ученица, всегда важно вернуться к основам ради неё, вне зависимости от возраста.\n\nДаже если другие жеребята этого не понимали, мама Захины прекрасно всё уловила, и когда Аяна наконец села и перевела дух, то заметила безмолвный и благодарный взгляд от взрослой кобылы... по крайней мере, пока собственная дочь не начала одёргивать её за то, что та отвлекается, и не принялась усердно поучать написанию алфавита."
 zongo_railway.9.a:0 "За каждым жеребёнком, которого мы учим читать, стоит семья, которая подтянется следом."
 zongo_railway.10.t:0 "Путь Зупинамбы, этап 5" #24
 zongo_railway.10.desc:0 "Будут слёзы. Аяна весь день старалась их сдержать, но когда подходил к концу её последний урок, она понимала, что они вот-вот выступят. Она хотела дождаться хотя бы обратной дороги в Зонго, но наблюдая за тем, как ученики по очереди вслух читают последнюю речь Акиды, становилось всё труднее сохранять самообладание.\n\nКогда класс дочитал речь, она наградила их аплодисментами и похвалила каждого лично, а затем поднялась, чтобы обратиться ко всем присутствующим.\n\n— Мои дорогие ученики, я так горжусь каждым из вас, — начала она, переводя взгляд с одного лица на другое. Больших и маленьких, юных и взрослых. — Вы столькому научились за всё это время и теперь каждый из вас читает так, словно занимался этим с рождения! Мне больше нечему вас учить, и для меня честь поздравить вас с окончанием обучения!\n\nЖеребята подняли копыта и затопали в ответ, и даже взрослые удовлетворённо заулыбались, но когда шум стих, первой задала вопрос та, кто меньше всего хотел бы услышать ответ – Захина, любимая ученица Аяны.\n\n— А чему вы научите нас дальше? — спросила она, сияя.\n\n— Боюсь, больше я не смогу вас учить, — произнесла учительница под недовольный ропот класса. Разочарованные возгласы наполнили комнату, и Аяна почувствовала первые слёзы, подбирающиеся к уголкам глаз. — Я была искренне счастлива учить вас, но король в столице нуждается во мне, и больше я не смогу так часто приезжать в Зупинамбу. Но не переживайте! То, что я уезжаю, не значит, что вы обязательно должны перестать учиться. Будут другие уроки, вроде математики и прочих наук. Вы даже можете научиться читать на новом языке – эквестрийском или киринском! И хотя я не буду вести эти занятия, у вас появятся другие чудесные учителя, куда лучше меня. Спасибо, что были такими замечательными учениками! Я уверена, что следующий учитель поймёт это тоже очень быстро.\n\nНесмотря на гул начинающихся новых возгласов протеста и ропота, первой, кто заговорил вслух всё же была Захина. — Спасибо за всё, мисс Аяна! — и вскоре благодарить её начали все, даже взрослые. В этот момент плотина прорвалась. Через пару секунд Аяна уже извинялась, утирая слёзы копытами, пока ученики обступили её и начали все вместе обнимать."
 zongo_railway.10.a:0 "По возвращении она будет долго благодарить Акиду за эту возможность."
 zongo_railway.11.t:0 "Путь Зубы, этап 1" #Snow
 zongo_railway.11.desc:0 "Мани Зуба стоял на маленьком пыльном холме, наблюдая за своими новыми подопечными. Внизу отряд юных солдат трудился бок о бок с гражданскими инженерами; их мундиры пропитались потом и грязью, пока они таскали брёвна и выравнивали землю ради новой железнодорожной мании, которой страдал их король. Взгляд Зубы был прикован к этим солдатам – не к тому, что они делали, а к тому, к чему приведёт их труд. Неужели ради именно такого будущего умер Нкоси? Его сын меняет копья на лопаты. Он зовёт чужеземцев советовать ему, как управлять страной. Он разоружает лучших воинов и заставляет их возиться в земле, словно простых рабочих.\n\nДвижение на краю поля зрения заставило зебру вновь выпрямиться; вспышка ярких тканей и выверенные шаги – лишь одна кобыла могла явиться в таком виде на строительную площадку.\n\nКоролева-мать пришла лично увидеть строительство железной дороги. Его челюсть напряглась. Зуба терпеть не мог Нзузи. Она всегда оказывала дурное влияние на Нкоси, а теперь и на его сына. Куда бы ни шла эта кобыла, она сеяла слабость. У Акиды был потенциал стать великим вождём, но он с детства был окружён заботой и вырос мягким жеребцом, не осознающим необходимости войны.\n\nЗуба медленно вздохнул, но благодаря гулу стройки звук остался неуслышанным. Мани направился вниз, чтобы присоединиться к своим солдатам. Видеть Нзузи в совете было достаточно тяжело, но он ни за что не позволит ей портить его настроение на собственной территории. Если уж ему поручили задачу, то он будет выполнять её бок о бок со своими солдатами. Так они поймут, что Зуба не ставит себя выше их. А ещё это позволит ему как можно меньше сталкиваться с этой невыносимой кобылой."
 zongo_railway.11.a:0 "Чтобы снова сражаться, солдат должен сначала строить."
 zongo_railway.12.t:0 "Путь Зубы, этап 2" #Snow
 zongo_railway.12.desc:0 "Зуба наблюдал, как мимо грохочет снабженческий поезд. Ни один, даже самый большой караван из телег и повозок не мог сравниться по скорости и эффективности с этим стальным чудовищем. Первоначальное недовольство улеглось, и старый жеребец начал испытывать к поездам определённую симпатию. Эта новая система обладала неоспоримой полезностью. В мыслях он начертил маршрут на карте: сеть потенциальных линий снабжения, которая вскоре достигла цели – Мелахаки и Танайги. Эти земли были вне сферы влияния Зонго со времён его прадеда, но одних только рассказов об объединении региона было достаточно, чтобы вновь зажечь огонь в сердце Зубы.\n\nОн уже наяву представлял себе войска, свежие и полностью экипированные, перемещающиеся из центра страны на границу за день, а не за неделю. Артиллерийские орудия, некогда вызывавшие кошмары у специалистов по логистике, теперь могли доставляться на передовую с невероятной лёгкостью. Переброска войск ныне сможет осуществляться не через изнурительные марши, утомлявшие тела и умы, а с помощью комфортной поездки на поезде до другого региона.\n\nЗуба почувствовал удовлетворение. Оказалось, что за всеми разговорами о единстве и процветании скрывается великая истина: армия и королевская стража получат огромную выгоду от этих реформ. Но тут мани задумался: кто же в действительности спланировал всё это? Была ли это работа короля или всё же королевы-матери? Вполне возможно, что изрядно выигравшей от этого армии следует благодарить вовсе не Бомбоко.\n\nНо в итоге это было неважно. Железная дорога оказалась гораздо полезнее, чем изначально считал Зуба, и этого было достаточно, чтобы оправдать её расширение."
 zongo_railway.12.a:0 "Инструмент остаётся инструментом. Его ценность – в применении."
 zongo_railway.13.t:0 "Путь Зубы, этап 3" #Snow
 zongo_railway.13.desc:0 "Группа молодых солдат неуклюже возилась с новым экспериментальным образцом оружия: с непривычки им было непросто разобраться в мудрёных механизмах. Постоянный лязг металла и раздражённые возгласы начинали действовать Зубе на нервы. Да с чем они там возятся? Навёл и выстрелил, всё просто. Он устал от этого жеребячества.\n\n— Хватит, — одним словом мани прервал их возню. Зуба шагнул вперёд, и его появление заставило солдат расступиться, словно траву под ветром. Быстрым движением он выхватил оружие у ближайшего солдата и осмотрел его. Провёл копытом по холодному металлу. Оно было похожим на предыдущим образцы и одновременно совершенно иным. Прежние длинные винтовки остались в прошлом, это оружие было изящным, компактным и имело увеличенный магазин. Одним резким рывком Зуба устранил заклинивание, заглянул в прицел и плавно зажал спусковой крючок.\n\nОчередь автоматического огня без промедления вырвалась наружу, магазин был опустошён всего за пару секунд, и целый рой пуль разорвал учебное чучело в клочья. Тишина, последовавшая за выстрелами, оказалась громче самой стрельбы. В наступившей тишине, пропитанной едким запахом кордита, солдаты с откровенным благоговением ошеломлённо смотрели на Зубу. Сам мани тоже был заворожён, но отнюдь не собственным мастерством – в нём он никогда не сомневался. Нет, его взгляд был прикован к дымящемуся оружию. Столько выстрелов за секунду; такая мощь в копытах одного солдата! Зубу было трудно впечатлить, но это превзошло все ожидания. Один зебра, вооружённый таким оружием, мог бы сдержать в одиночку не меньше десятка противников.\n\nЗуба чувствовал, как сердце бьётся всё быстрее, а адреналин продолжал бурлить в крови. Этот проект оказался бесценным. Пока поезда будут доставлять новые мощные вооружения, а фабрики массово их производить, армию Зонго никто не сможет победить."
 zongo_railway.13.a:0 "На каждого, кто мечтает о мире, найдётся тот, кто жаждет войны."
 zongo_railway.14.t:0 "Путь Зубы, этап 4" #Snow
 zongo_railway.14.desc:0 "За стенами совета мани собрались в резиденции Зубы, как делали это каждые несколько месяцев. Комната была густо наполнена дымом трубок и приглушёнными разговорами о политике; отчёты со всех уголков растущего королевства были разбросаны по столу. Сам Зуба лишь слушал, потягивая ром, пока остальные хвастались своими мелкими достижениями, и помещение эхом отдавалось звуками голосов самодовольных болванов.\n\nНалив себе ещё порцию рома, чтобы выдержать этот парад тщеславия, Зуба уловил обрывок разговора, прорезавший общий гул. Мани Рутшуру говорил с Змпангу вполголоса, хотя алкоголь, похоже, развязал им языки. — Надо признать, — слегка заплетающимся языком произнёс Рутшуру, — что если дела будут развиваться подобным образом, возможно, мы сумеем покончить с угрозой Мейрконга раз и навсегда.\n\nЗмпангу кивнул, а Зуба медленно сделал глоток. — Кузницы готовы, — он глубоко затянулся трубкой. — И я слышал, что реформы армии снова превращают королевскую стражу в достойную силу.\n\n— Это... весьма щекотливая тема. Они действительно стали лучше, но король не разбирается в военных делах, а его ма...\n\nОдин удар копытом Зубы по столу заставил смолкнуть всех собравшихся. Недоумённые взгляды обратились к нему, но он смотрел только на Рутшуру. — Не смейте осквернять мой дом такими речами, — сказал он низким голосом. — Прочь.\n\nОстальные мани замерли, наблюдая, как лицо Рутшуру покраснело от смеси страха, удивления и негодования. Долгий миг два жеребца смотрели друг на друга. Первым отвёл взгляд Рутшуру. Не сказав ни слова и не извинившись, он развернулся и вышел из комнаты. Один за другим прочие мани пробормотали оправдания и тоже покинули собрание, поскольку праздничное настроение мигом угасло. Вскоре Зуба остался один во внезапно наступившей тишине, чувствуя лишь тяжёлый запах застоявшегося дыма да пролитого рома. Он сделал последний глоток из стакана и отставил его в сторону."
 zongo_railway.14.a:0 "Ужасный вечер... но через месяц всё вернётся на круги своя."
 zongo_railway.15.t:0 "Путь Зубы, этап 5" #Snow
 zongo_railway.15.desc:0 "Мани Зуба стоял на плацу, наблюдая за тем, как королевская стража вновь проходит маршем перед ним. Форма солдат была опрятной, они в ритм били копытами о землю, держа у бедра современные винтовки. За процессией следовал поезд, на открытой платформе которого возвышалось артиллерийское орудие. Это был не просто военный парад, марш солдат нёс куда более глубокий смысл. Тысячи зонголезцев наблюдали за шествием с обочин, и в их глазах читались не равнодушие, а гордость и доверие. Зуба тоже почувствовал искру гордости. Модернизация Акиды принесла впечатляющие результаты, пусть и невольно. Королевство было в безопасности. Это был миг триумфа.\n\nНо, оглядывая море преданных лиц, в сердце мани зародилась холодная, удушающая мысль. Неужели эта совершенная военная машина теперь обречена служить трону, который не до конца понимает силу, которую породил? Идеализм короля до сих пор удобно совпадал с нуждами армии, но надолго ли? Что будет, когда придёт следующий кризис, а за ним другие? Устоит ли Акида перед угрозами, которых он не мог предвидеть? Не рухнет ли уважение мани к нему? Не вернутся ли они к старым привычкам и не обратятся ли за наставлениями к Нзузи? Или же... в конце концов все они окажутся слабыми?\n\nНыне воцарился хрупкий мир, но никто не знал, как долго он продержится. Пока что Зуба был доволен тем, что просто исполнял свой долг и наблюдал за волнами перемен, катившимися вперёд. И в одном он был уверен: каким бы ни было будущее, у Зонго всегда найдётся место для его гордого сына."
 zongo_railway.15.a:0 "Верность короне, идее или самому себе?"
 zongo_railway.16.t:0 "Путь Танайги, этап 1" #Ardent
 zongo_railway.16.desc:0 "— Но отец, я...\n\n— Нет, Зира! — гневно фыркнул старый жеребец. — Я запрещаю это! Единственная дочь Злубе ни за что не станет рабыней Зонго! Им не нужны воины или союзники; они лишь хотят, чтобы наши песни были забыты, а история оказалась погребена под их железными дорогами! Я не позволю – агх! — жеребец попытался подняться, чтобы указать на мир за пределами дома, но вскрикнул и схватился за повязки, обмотанные вокруг его ноги. Зира тут же бросилась к нему и, несмотря на слабые протесты, уложила отца обратно на койку. Она попыталась возразить, но снова была прервана. — От них следует ждать лишь лжи да бесполезных подачек.\n\nЗира нахмурилась. — Отец, эти бесполезные подачки приносят еду на стол и доставляют тебе лекарства, — проницательные слова заставили отца замолчать, и она наблюдала, как тот тяжело дышит, пытаясь взять боль под контроль. Каждый его хриплый вздох был почти невыносим для Зиры, но она знала, что в ближайшие дни ему полегчает. — Повезло, что в бою с Зонго тебе прострелили только ногу.\n\nОтец фыркнул. — Они должны были оставить нас в покое. Мечты жрицы Дары...\n\n—...относились к Танайге, которой больше нет, — перебила его Зира. — Мечты не прокормят нас, отец. Мир изменился, и мы должны измениться вместе с ним, — за этим последовало долгое молчание, и Зира перехватила взгляд отца, устремлённый на отброшенную в угол комнаты винтовку. — Если воин Злубе сражался за прошлое Танайги, то теперь строитель Зира должна бороться за её место в будущем.\n\nОтец открыл рот, но слова застряли в горле под взглядом дочери. Злубе видел в её глазах, унаследованных от матери, решимость, не уступавшую его собственной. Он вздохнул, понимая, что решение уже принято."
 zongo_railway.16.a:0 "— Ты и вправду моя кровь. Столь же упрямая до невозможности."
 zongo_railway.17.t:0 "Путь Танайги, этап 2" #Ardent
 zongo_railway.17.desc:0 "Зира вытерла пот со лба, выступивший из-за тяжёлого труда и удушающей влажности, вызванной палящим солнцем. Оказалось, что строительство и индустриализация на деле куда труднее, чем она думала. Каждый день на протяжении последних недель она работала бок о бок с молодёжью Танайги, возводя фундамент их будущего. Благодаря бетону и рельсам их родина должна была обрести роскошные дары современности, обещанные королём.\n\nБазары превратятся в торговые центры, где будут продаваться многочисленные и качественные вещи. Учёные и исследователи со всей Зебрики захотят приехать сюда. Импорт и экспорт будут процветать, появятся лучшие лекарства для её отца и, возможно, даже... — Перерыв окончен, Зира! — крик прораба быстро вырвал её из грёз.\n\nСделав быстрый глоток из фляги, зебра вновь схватила инструменты и поспешила обратно. — Иду! — У них было будущее, которое нужно построить, и оно не станет ждать ни её, ни кого-либо ещё..."
 zongo_railway.17.a:0 "...Ей оставалось лишь заставить свои копыта перестать дрожать."
 zongo_railway.18.t:0 "Путь Танайги, этап 3" #Snow
 zongo_railway.18.desc:0 "Зира шла по Танайге, наслаждаясь зрелищем преобразившегося поселения. Новые акценты и запахи наполняли воздух, вдалеке слышался стук очередной стройки, а вид инструментов и тканей на прилавках радовал глаз. Вот она – современность!\n\n— Хм, — проворчал старый зебра. — Халтура. Построено слишком быстро. Видишь эти трещины? Они не учли сезон дождей, — да, действительно. — Всё поселение смоет, говорю тебе, — Зира вздохнула, но промолчала. С каждой претензией её уши опускались всё ниже. Первоначальный энтузиазм постепенно угасал. От конструкции колодца до расположения скамеек – ничто не избежало его насмешек. Зира надеялась, что они смогут просто провести день вместе как отец и дочь, чего не делали со смерти матери... но, похоже, она хотела слишком многого.\n\nВ надежде закончить день без новых жалоб она отвела его в знакомый ресторан, который они посещали, когда она была ещё кобылкой. — Вот это качество, — оживился отец. — Радует, что зонголезцы ещё не успели испортить всю Танайгу, — повисло напряжённое молчание, пока они ждали еду. Зира была слишком уставшей для продолжения споров. Когда еду подали, они приступили к трапезе, не сказав друг другу ни слова. Отец выглядел озадаченным после первого кусочка, но продолжил есть. Когда Зира пошла оплатить счёт, она услышала, как он говорит хозяину: — Скажите, вы добавили что-то новое в рецепт? На вкус иначе, чем я помню.\n\n— Ах, да! — жеребец вернулся из кухни с незнакомой приправой. — Она прибыла на последнем поезде снабжения. Из Зупинамбы, кажется.\n\nОтец Зиры вздрогнул при этих словах, но удержался от немедленной критики. — Это... допустимое дополнение. Достаточно хорошо скрывает горечь местных клубней, — он больше ничего не сказал, но, заметив пустую миску в его копытах, Зира не смогла сдержать улыбку."
 zongo_railway.18.a:0 "Пожалуй, поездка всё же была не напрасной."
 zongo_railway.19.t:0 "Путь Танайги, этап 4" #Snow
 zongo_railway.19.desc:0 "Когда дверь со скрипом открылась, Зира едва держалась на ногах, а её рабочая одежда была заляпана грязью. Зебра даже не дошла до стула, а просто опустилась на пол с глубоким вздохом. — Ещё один, — выдохнула она. — Как только мы закончили расчищать прошлый обвал, случился ещё один внезапный паводок. Смыл целый склад оборудования... и мне "повезло" оказаться среди тех, кто должен был решать эту проблему. Она попыталась подняться снова. — Пап, извини за беспорядок, я сейчас всё уберу.\n\nЕё отец некоторое время наблюдал за дочерью из кресла. В комнате стояла тишина и единственным звуком, нарушавшим её, был звук капающей с одежды на пол воды. С тихим ворчанием пожилой зебра поднялся и, прихрамывая, направился к её кровати, вернувшись с чистым полотенцем. — Вот, дорогая. Вытрись-ка этим, — сказал он на удивление мягко. — А беспорядок оставь мне. Тебе нужно просто отдохнуть, — он развернулся и, прихрамывая, пошёл за шваброй.\n\nА затем его голос снова принял привычный в последние дни ворчливый тон. — Я же говорил, работа этих зонголезцев никуда не годится! — пробурчал он, но его слова не были ровней буре, ставшей причиной сегодняшних бед. — Они знают свои леса, но не наши! И пока зонголезцы думают, что Танайга – всего лишь продолжение Зонго, как они считали двести лет назад, эти предрассудки будут дорого им обходиться.\n\nЗира умылась и открыла рот, готовясь возразить. Но вид отца, терпеливо готовящегося убрать принесённую её грязь, остановил молодую зебру. Раздражение дня растаяло, уступив место мысли, которая заставила её хитро улыбнуться."
 zongo_railway.19.a:0 "— Тогда, пожалуй, пора познакомить их с тем, кто действительно знает Танайгу."
 zongo_railway.20.t:0 "Путь Танайги, этап 5" #Snow
 zongo_railway.20.desc:0 "Строительная площадка как никогда кипела активностью: каждый рабочий изо всех сил старался поспевать за старым жеребцом, командовавшим ими, словно сержант новобранцами в армии. Злубе стоял на краю недавно расчищенного участка, опираясь на трость и указывая копытом на рощу деревьев выше по склону. — Оставьте их. Срубите – пожалеете.\n\nЗира и её начальник, который лишь кивал да делал пометки в блокноте, шли следом. В редкий момент паузы между командами Зира подошла к отцу с насмешливой улыбкой. — Кажется работа пришлась тебе по душе, папа? Кто-то говорит, что старые жеребцы только и могут, что жаловаться, но с тобой совсем другое дело! Ты жалуешься продуктивно!\n\nЗлубе фыркнул, а она захихикала, и жеребец отвернулся. Начальник поднял глаза от записей и посмотрел на отца с дочерью. — Сэр, если говорить откровенно, — он закрыл блокнот. — Было бы крайне полезно продолжить сотрудничество с вами. Мы могли бы предложить вам официальную должность: никакой тяжёлой работы, только консультации. Уверяю, оплата более чем достойная.\n\nЗлубе уже было открыл рот, чтобы отказаться: он был воином, а не каким-то там советчиком! Но, взглянув на Зиру, он заметил её улыбку. В последнее время она так редко улыбалась, а сейчас её лицо озарила та самая улыбка прямиком из юности. Она так долго кормила их двоих своим тяжёлым трудом... разве честь воина важнее чести отца?\n\nПожилой жеребец тяжело вздохнул. — Ладно, — пробормотал он. — Но только чтобы не позволить вам, бестолковой молодёжи, затопить всю долину, — он посмотрел на начальника. — Но я хочу официальную бумагу со всеми подписями и печатями. И я не работаю под дождём – старые раны, что вы, зонголезцы, мне оставили, дают о себе знать, — его горделивая осанка дрогнула, когда дочь внезапно крепко обняла его, а затем быстро отстранилась, заметив взгляд начальника. Тот усмехнулся и ушёл, а кобыла покраснела. Придя в себя, Злубе посмотрел на оживлённую стройплощадку и с удивлением понял, что и сам хочет улыбнуться."
 zongo_railway.20.a:0 "Старые пути нашли своё место рядом с новыми."
 zongo_railway.21.t:0 "Путь Мелахаки, этап 1" 
 zongo_railway.21.desc:0 "Ещё один глоток фруктового сока скатился по горлу Кензе, прежде чем он нехотя снова открыл глаза. Перед ним пронеслась вся история Мирных Морей, такая знакомая и горькая в конце, ведь независимость Мелахаки исчезла. Двести лет... перечёркнуты. Кензе закрутил крышку фляги и со злостью опустил её на шаткую подставку.\n\n— Разве двухсот лет было мало?!\n\nЕго отчаянный возглас эхом прокатился над спокойными волнами. Каноэ стояло на таком расстоянии от берега, что ни одна зебра не могла его услышать. Кензе сплюнул за борт и вновь вспомнил историю Мелахаки и её двух веков независимости. Остались ли ещё старики, которые могли сказать, что помнят время, когда Мелахака принадлежала Зонго? Или же это были повторяемые старшим поколением сладкие сказания, которые уже превратились в ностальгию по эпохе, которой у современных зонголезцев никогда не было?\n\nКензе провёл копытом по гриве и тяжело вздохнул, рассеянно толкая вёсла. Будучи разведчиками блокады, он и его каноэ сделали всё, что могли. Могло ли всё пойти по-другому, если бы он вступил в флот Мелахаки или в налётчики? Приложи зебра больше усилий, стал бы исход другим, смог бы он в одиночку вынудить Зонго остановиться и прекратить вторжение?\n\nПечальная улыбка тронула его лицо, прежде чем он вновь открыл глаза и взглянул на удручающий вид далёкого порта с развевающимся флагом Зонго. Двухсот лет независимости, увы, оказалось недостаточно."
 zongo_railway.21.a:0 "Мы ничего не смогли сделать."
 zongo_railway.22.t:0 "Путь Мелахаки, этап 2" #Ardent
 zongo_railway.22.desc:0 "СЕКРЕТНОЕ СООБЩЕНИЕ\nТЕМА – Интеграция королевской стражи\nСТАТУС – в процессе\n\nПервоначальные попытки интегрировать налётчиков Мелахаки в наши ряды дали посредственный результат, поскольку каждый воин по-прежнему оставался предан своей павшей стране. Эта приверженность достойна уважения, однако королевская стража была вынуждена прибегнуть к методу, выходящему за пределы коллаборационных предложений и обещаний, чтобы добиться поставленной цели по интеграции налётчиков.\n\nЕсли углубиться в детали, то налётчиков Мелахаки по одному доставляли в наш учебный центр и заставляли сражаться с безоружным гвардейцем в копытопашном поединке (разумеется, под наблюдением вооружённых стражей и медиков). Налётчика либо одолевали, либо он сам побеждал гвардейца. Если происходило второе, перед победителем вставал новый страж, и процесс повторялся.\n\nВ случае если налётчик был близок к поражению, наблюдающий офицер стражи останавливал бой и вербовал налётчика на условиях предоставления самых базовых благ в обмен на службу в королевской страже.\n\nТакой подход дал девяностопроцентный успех интеграции. В настоящее время мы совершенствуем этот метод для массового применения и повышения эффективности.\n\nКОНЕЦ СООБЩЕНИЯ"
 zongo_railway.22.a:0 "Похоже, иногда грубая сила действительно выход."
 zongo_railway.23.t:0 "Путь Мелахаки, этап 3" #Ardent
 zongo_railway.23.desc:0 "— Осторожнее! Осторожнее!\n\nС’зоу наблюдал, как неуклюжие зебры опрокинули ящик с припасами, из-за чего произошёл эффект домино – с треском упал и второй ящик. Рабочие мигом замерли под взглядом С’зоу, а затем торопливо бросились поднимать рассыпавшиеся материалы. Зебра удерживал тяжёлый взгляд ещё пару секунд, затем выдохнул, давя в себе порыв потянуться к пистолету.\n\nОн был старшим надсмотрщиком на объектах индустриализации Зонго на этом острове. Это, как оказалось, требовало не только вспоминать особенности природы Мелахаки, но и отрабатывать управленческие навыки на местных рабочих. С’зоу, разумеется, был достаточно умным, чтобы понимать, что просто тыкать копытом и требовать, как это делают ленивые надсмотрщики, не приносит нормального результата, но – о Зонго! – как же иногда его подчинённые раздражали! А сверху ещё и начальство продолжало навешивать всё новые задачи с каждым прибывающим грузом.\n\nС’зоу тяжело фыркнул и вернулся к надзору за измотанной сменой. Было неправильно винить этих зебр за их неопытность и требования начальства, особенно после того, как он увидел размах всего индустриального плана Зонго. Неужели всё действительно нужно делать так быстро? Они ведь и так работают и приносят удовлетворительные результаты, но всё же...\n\nОдин из рабочих подошёл к нему и нерешительно протянул конверт, на что С’зоу, вздохнув, подобрался. — Да?\n\n— Э-э, надсмотрщик Мокензели просил передать, что вы должны принять его смену, пока он в Твизамбве, — сказал зебра. Конверт был выхвачен и вскрыт меньше чем за секунду. — Он говорил о какой-то медицинской процедуре для зебр его возраста?\n\nС’зоу пробежал глазами письмо и стиснул зубы."
 zongo_railway.23.a:0 "Желание выхватить пистолет выросло в разы."
 zongo_railway.24.t:0 "Путь Мелахаки, этап 4" #Ardent 
 zongo_railway.24.desc:0 "Впервые за, казалось бы, целую вечность в комнату вошла надзирательница с тем же скучающим выражением, с каким и оставила его здесь в прошлый раз. У жеребёнка-мелахакца бунтарские порывы мгновенно стихли, когда его ушей достигло болезненно громкое эхо от непрекращающихся объявлений из динамиков в коридоре. — Клянешься ли ты Короне, что твоё заявление – правда и только правда?\n\n— Да, директор! Я зонголезец! Честно клянусь на этот раз!\n\n— Именно это ты сказал на прошлой неделе, после того как разрисовал игровую площадку, — директор (вовсе не тюремная надзирательница) закатила глаза. — Слушай, я знаю, как много для нас значит Мелахака, но теперь всё иначе. И ты, и я – зонголезцы, так решили силы над нами. И это не так плохо, как ты себе надумываешь.\n\nОна вывела его из библиотечной каморки (скорее похожей на камеру) в коридор, где сверстники уже расходились по кружкам. — Радуйся, что ты ещё считаешься жеребёнком целый год. Иначе тебя бы сослали в школу переписчиков где-нибудь в Зонго.\n\nОн застыл. Ему первый раз довелось услышать что-то такое. Возможно, какой-то новый указ? — А... е-если я туда попаду, то когда вернусь оттуда?\n\n— Не раньше, чем перепишешь миллион предложений.\n\nСъёжившийся и разом поскромневший жеребёнок дальше шагал из школы уже куда спокойнее."
 zongo_railway.24.a:0 "Я зонголезец!"
 zongo_railway.25.t:0 "Путь Мелахаки, этап 5" #Ardent 
 zongo_railway.25.desc:0 "— Что значит – введены новые правила швартовки?! — капитан Баракабад с силой ударил копытом. — Традиции Мелахаки два столетия обеспечивали честность и порядок!\n\nРадист спокойно выслушал и ответил, не отходя от передатчика. — Капитан, говорят, Зонго ввёл регламент, чтобы принимать большие торговые суда.\n\n— Старые правила теперь вообще не действуют?! Нелепость! Безумие! Как Зонго собирается сохранять честь морского адмиралтейства?! — капитан Баракабад уставился в иллюминатор на далёкий торговый порт.\n\nРадист взглянул на него. — Сэр, мне передали, что через пять минут освободится причал. Но мы должны пропустить фетизское грузовое судно.\n\nКапитан уже открыл рот, чтобы возразить, когда краем глаза заметил, как у их борта другое крупное судно медленно берёт курс прямо на порт. В ту же секунду он бросился к переговорному устройству.\n\n— Всем на палубу! Полный вперёд! Не позволим им занять наше место!"
 zongo_railway.25.a:0 "— Коммерческий поток в норме. Всё как обычно, — отчитался позже начальник порта."
 zongo_railway.26.t:0 "Путь Роама-Зеблу, этап 1" #Ardent 
 zongo_railway.26.desc:0 "Мелози ворвалась в спрятанную комнату, держа винтовку наготове, и готовясь нажать на спуск. Несмотря на скептицизм и насмешки о паранойе сослуживцев, она знала, что на этом заброшенном складе на окраине Талиссы что-то происходит, поэтому отправилась туда в одиночку. Силы зонголезцев прочёсывали местность и выискивали остатки ополчения Ассини, а также солдат Легиона. Несмотря на то, что она сама была из Зеблу, Мелози без раздумий присоединилась к добровольцам, занимавшимся поисками остатков войск. Если они всё ещё сопротивлялись спустя столько времени – значит, им было что скрывать.\n\nСтоило глазам привыкнуть к полумраку комнаты, как её взгляд застыл на неухоженной морде легионера в форме в дальнем углу комнаты... а затем заметил десятки маленьких глаз рядом с ним. Он окружил себя жеребятами. Внутри Мелози вскипела ярость. — Ты...!\n\n— Не убивай мистера Марсиля! — раздался тоненький голос.\n\n— Таси, назад! — резко скомандовал взрослый зебра. Мелози увидела, как легионер быстро пробирается сквозь жеребят и встаёт перед ними, раскинув копыта в стороны и заслоняя малышей грудью от её винтовки. Глаза у него были измождённые. — Не стреляй... или хотя бы не здесь. Ты их напугаешь.\n\n— Что?!. — Мелози продолжала держать его на прицеле, но несколько жеребят бросились к легионеру и прижались к бронированному бедру, заставив её инстинктивно отступить. — Ч-чт...\n\n— У вас есть место, где жеребята будут в безопасности? — спросил легионер. Мелози с трудом взяла себя в копыта, чтобы ответить. — Нет, мы...\n\nНеожиданно её приёмник ожил треском статики. — Мелози, ты закончила там? Приём, — глаза легионера метнулись к рации на секунду, затем вновь к её лицу. Голос стал едва слышным. — Возвращайся, когда сможешь забрать жеребят. Я обещаю, мы останемся здесь. Я их не оставлю.\n\nМелози с удивлённым недоверием посмотрела на легионера, а маленькое стадо жеребят плотнее прижалось к нему сзади. Дрожащим копытом она наконец ответила в рацию."
 zongo_railway.26.a:0 "— Мелози на связи. Я закончила... иду обратно. Приём."
 zongo_railway.27.t:0 "Путь Роама-Зеблу, этап 2" #Ardent 
 zongo_railway.27.desc:0 "Мелози наблюдала, как жеребята носятся туда-сюда через распахнутую створку старого склада. Они смеялись и резвились, не ведая забот, гоняясь друг за другом и катаясь в пыли, пока несколько других малышей смотрели со стороны. Порой её взгляд успевал выхватить яркий мячик, который она принесла им поиграть, прежде чем он снова исчезал под веером копыт.\n\n— Что стало с их родителями? — спросила она, прислоняя винтовку к стене.\n\n— Мертвы, — ответил бывший легионер, усевшийся рядом на потрёпанный стул. — Пытались бежать, когда силы Зонго вошли в регион.\n\n— Значит, ты их убил.\n\n— Нет... нет, — Мелози взглянула на него и увидела, пожалуй, самый не-легионерский жест из всех возможных – он закрыл лицо копытами. — Я говорил им не делать этого. Сказал ждать, пока зонголезцы не захватят регион целиком. Но они бросились на меня, сбили с ног и вырубили, — Марсиль кивнул на жеребят. — Когда очнулся, мой центурион уже собирался "добить остатки", так он сказал.\n\n— Значит, ты убил его.\n\nБессильная, горькая усмешка прозвучала в его голосе. — Я был ужасным легионером, — прошептал он наконец. — А теперь ещё и стал предателем. Когда меня найдут новые войска, они либо казнят, либо... как ты сказала раньше, интегрируют как неопасного преступника во вспомогательные части. Так я мог бы всё ещё быть полезным для них, — он проговорил слабо.\n\n— Нет, — слова вырвались прежде, чем она успела осознать что хотела сказать. — Армии больше не нужен легионер-дезертир. У тебя... у тебя теперь другая обязанность. Ты нужен им. Живой и рядом, — его долгий и безмолвный взгляд она выдержала твёрдо и непоколебимо, а затем повернулась к играющим малышам, и сказала куда мягче."
 zongo_railway.27.a:0 "— Твоя служба окончена. Ты хорошо послужил."
 zongo_railway.28.t:0 "Путь Роама-Зеблу, этап 3" #Ardent
 zongo_railway.28.desc:0 "Что она вообще творила? Почему всё ещё приходила сюда, в Мейрссапу, к этому маленькому складу на окраине Талиссы? Мелози тяжело вздохнула и подошла к обветшалому строению, волоча за собой тележку со снедью и охапками сена.\n\nДверь впереди распахнулась, и наружу хлынули маленькие зебры, бросаясь ей навстречу. — Мисс Мелози!\n\n"Вот почему", — Мелози улыбнулась и поприветствовала малышей, раздавая принесённую еду, также чувствуя угрызения совести за недавнее ворчание про себя.\n\n— Мисс Мелози! А мистер Марсиль сказал не говорить вам, что он благодарит за чистящие штуки, которые вы ему дали!\n\nМелози не удержалась и рассмеялась, присев так, чтобы смотреть прямо в глаза жеребёнку. — Ну тогда не говори ему, что у меня есть большой сюрприз, когда мы встретимся, — тот радостно кивнул и тут же ускакал обратно, получив свою порцию, очевидно, чтобы тут же рассказать всё Марсилю. Как она и ожидала.\n\nПозднее Мелози сидела напротив Марсиля, теперь вымытого и одетого в вещи, которые она ему "одолжила". — Ты... купила эту землю.\n\nМелози усмехнулась. — Да. Вся эта индустриализация принесла массу возможностей, даже здесь, близ Талиссы. Курс правительства на развитие означает снижение цен на стройматериалы и дерево. К тому же в этой глуши почти ничего не происходит и концентрация внимания войск крайне низкая, что для нас только плюс, — она заговорщицки улыбнулась, вживаясь в роль новой владелицы земли. — И знаешь, что это значит?\n\nМарсиль неуверенно улыбнулся. — Что?\n\n— Что гнусный бывший легионер почему-то живёт у меня на территории бесплатно! — расхохоталась Мелози. — И раз уж эти малыши тебя никуда не отпустят, а я всего лишь покорная вестница их желаний... — она театрально склонилась, пока Марсиль закатывал глаза. — Думаю, тебе придётся отрабатывать свое пребывание. Начнёшь с ремонта.\n\nМарсиль хмыкнул. — Что, ты уже и материалы заказала? — её молчание стало ответом, как и протянутые документы на получение груза. Он взял их, а в его взгляде отражались мягкость и одновременно серьёзность. — Ты дала нам шанс на будущее, Мелози. Я его не упущу."
 zongo_railway.28.a:0 "Её сердце дрогнуло при этих словах."
 zongo_railway.29.t:0 "Путь Роама-Зеблу, этап 4" #Ardent 
 zongo_railway.29.desc:0 "Мейрссапский детский дом официально заработал, а обветшалый склад превратился в чистое, ухоженное строение. Двое зебр шли вдоль забора в комфортной вечерней тишине, когда жеребята наконец вымотались от игр.\n\n— Ты никогда раньше не рассказывала о себе, — сказал Марсиль, нарушив молчание. — Не думал, что житель Зеблу может так легко переменить сторону, — после сказанного он, кажется, сразу пожалел о своих словах, — Я-я не это имел в виду...\n\nМелози молчала достаточно долго, но в конце ответила. — Мне было семнадцать, когда закончилась первая война, — начала она тихо. — Я была задиристой кобылой, умевшей только воевать. Мне повезло пережить оба конфликта, в отличие от Зеблу. Когда новая война закончилась и Зонго начал набирать местных... я не хотела вступать в их ряды. Но поскольку в жизни ничему другому не научилась... Сначала это было просто выживание. А теперь... — она остановилась, оглянувшись на дом, который они вместе построили. — Теперь всё по-другому. Эта работа помогла мне измениться. Я делаю это ради лучшего будущего. Ради них.\n\nМарсиль слушал внимательно. — Как зебра ты лучше меня, Мелози. Ты смогла обратить службу во что-то такое... благородное. Если бы я был таким же смелым...\n\nЖеребец перечеркнул свою жизнь ради этих жеребят, и всё же тащил на себе груз поступков, которых не мог предотвратить. Как же ей хотелось, чтобы он наконец нашёл в себе то же благородство, что так хорошо было заметно ей. — Ты тоже смелый, Марсиль, но по-другому, — только и смогла ответить она. Он покачал головой с самоироничной улыбкой. Мелози заговорила, прежде чем он открыл рот. — Не обесценивай то, что сделал. Благодаря тебе они живы.\n\n— И... благодаря тебе тоже, — сказал Марсиль, смотря себе под копыта. — Ты не застрелила меня той ночью. Меня бы не было здесь, если бы ты это сделала. Спасибо тебе, Мелози, — он поднял голову с закрытыми глазами, но на его устах появилась улыбка. Мелози продолжала смотреть на него. Он всё ещё этого не видел, но она была полна решимости доказать, что бывший легионер важен. Не только для жеребят..."
 zongo_railway.29.a:0 "...но и для неё."
 zongo_railway.30.t:0 "Что говорит поезд? (Этап 5)" #Ardent 
 zongo_railway.30.desc:0 "— Чух-чух!\n\nМарсиль улыбнулся, когда его воспитанники разразились смехом. Он не сводил глаз с группы, пока Мелози шла впереди. Они выбрались в город, чтобы дать малышам возможность, да и ему самому, впервые выбраться за пределы Талиссы. Громкий свист приближающегося паровоза вызвал у жеребят радостные крики, но Марсиль вздрогнул от оглушающего звука, невольно широко раскрыв глаза при виде огромной дымящейся машины. — Давненько не выбирался? — поддела его Мелози, слегка толкнув. Она чувствовала себя абсолютно спокойно посреди вокзального хаоса. — Не волнуйся, они не кусаются. Почти.\n\nПрежде чем он смог что-то сказать в ответ, подошёл кондуктор. — Мистер Мелози, верно? — всё ещё глазеющий по сторонам Марсиль повернулся к нему. — Я зарезервировал пассажирское купе для вашей группы, как просила миссис, — объяснил кондуктор. — В середине пути будет подан бесплатный обед. Постарайтесь не пачкать сиденья.\n\n— Хорошо. Жеребята, стройтесь по одному в линию! — позвала Мелози, чей голос прорезал шум вокзала. Кондуктор удалился, а она умело начала выстраивать малышей и вести их к вагону, пока Марсиль растерянно суетился рядом, пытаясь помогать и ощущая себя не в своей тарелке. — Пойдём, — сказала она ему с ухмылкой. — Не промахнись мимо двери.\n\nКогда он зашёл в поезд, раздражение сменилось удивлением, ведь Мелози внезапно наградила его поцелуем. — Пойдём, — сказала она с раскрасневшимся лицом, но уверенным взглядом. — Мороженое растает, если ты будешь так долго идти... мистер Мелози, — она умчалась внутрь, оставив Марсиля стоять в оцепенении ещё на секунду, прежде чем он рванул за ней следом, ничуть не смущаясь того, что они вдвоём вели себя словно жеребята из их же группы. Когда поезд тронулся, оба ощущали, что их прошлое оставалось всё дальше с каждым оборотом колёс. В этот миг мир становился чуточку легче."
 zongo_railway.30.a:0 "Чух-чух!"
 zongo_railway.31.t: "Путь Тампука, этап 1" #Snow
 zongo_railway.31.desc: "После той войны в Золотом Городе не осталось ни жизни, ни шума – только пепел и мёртвая тишина. Когда-то тут жили таларайцы, поклонялись Громовому Тигру и хранили свои древние обычаи, а теперь город выжжен дотла, словно его никогда и не было. Тигр исчез. Народ исчез. Дэлисай, на своём веку повидавший жестокость «компельских» захватчиков и видевший, как грабили храмы, хоронили убитых воинов, не мог бы даже представить, что бывает вот так: те хотя бы оставляли тела для похорон и право вознести молитву над могилой. Это... это же было вымарывание самой истории.\n\nДэлисай бродил по пустым улицам, где некогда стоял его дом. В начале войны он был в Туд Буколе и мчался обратно без сна, день и ночь, но беда всегда быстра. Теперь он бродил по пустым развалинам, где не осталось ни искры надежды, ни тел друзей, ни даже уголка, пережившего последний рёв Тигра. Было стёрто всё, кроме самых мощных стен: для его народа это стало высшей карой за слабость, для него – горьким упрёком за собственное отсутствие.\n\nНо и этого, казалось, было мало: наказание продолжалось. Он не винил Тигра – вина лежала на них самих, не сумевших уберечь святыню. Не терзал себя и за павших – те ушли с честью. Даже на врага не хватило ярости.\n\nВся его злость уходила в ненависть к железным чудовищам, что теперь глумились над его родным краем. Зонголезская железная дорога продвигалась вперёд, паровозы свистели поверх святых мест, прямо по могиле его народа. Это были не завоеватели, но зодчие забвения, прибивавшие рельсы прямо к самому сердцу святой земли, чтобы и память о прошлом не уцелела.\n\nПлакать он не мог. Кричать тоже. Оставалось лишь смотреть, как исчезает всё, что он когда-то называл домом."
 zongo_railway.31.a: "Тампук погиб в огне, Таларай – в молчании."
 zongo_railway.32.t: "Путь Тампука, этап 2" #Snow
 zongo_railway.32.desc: "Мэсикапу никогда в жизни не было так страшно.\n\nДимасупил предупреждал: эти железные чудища – для воинов Маглибинга, и простой смертный, осмелившийся ступить на них, бросает вызов не только самому вождю, но и памяти предков и духам. Но Димасупила больше нет. Нет и великого духа. От прошлого у Мэсикапа осталась только семья.\n\nНо долго ли им ещё удастся быть в безопасности? С приходом зонголезцев нельзя было просто выживать – теперь надо было «зарабатывать деньги», чтобы «покупать» вещи, и даже платить за это «налоги». Мэсикап привык собирать, что найдёт, и обменивать находки на мелкие нужды, но теперь их гнали в совершенно чужой, непонятный мир.\n\nМать болела, отец остался калекой, защищая землю, а два младших брата были ещё совсем жеребятами. Будучи старшим и самым сильным, Мэсикап был обязан тянуть всё на себе. Ему предложили работу на юге – восстанавливать Золотой Город после того, как его стёр рёв Громового Тигра. Это был шанс, какой выпадает раз в жизни, и Мэсикап был готов ради него пройти пешком через всю страну. Но ему сказали – нужно быть там за два дня. Это был невозможный путь... если только не сесть в поезд.\n\nМэсикапу было по-настоящему страшно: сделать это – значит пойти против всего, чему его учили. Но отказаться – значило бросить семью, а на такое он не мог решиться ни за что на свете. Он сделал шаг и, затаив дыхание, вошёл в брюхо железного чудища."
 zongo_railway.32.a: "Страшно меняться... но сдаться – ещё страшнее."
 zongo_railway.33.t: "Путь Тампука, этап 3" #Snow
 zongo_railway.33.desc: "Дэлисай стоял на окраине города и наблюдал, как очередной поезд, чёрный от дыма и гари, с рывком остановился у перрона. Из вагонов потянулась вереница зебр, худых, растерянных, с узелками на копытах. Всё больше народу стекалось теперь на юг: зонголезцы, маглибингцы, другие племена – все, кто искал свой шанс среди обломков Золотого Города. Не с оружием, а с инструментами, не грабить, а работать, строить новую жизнь на развалинах.\n\nСо времён до Великого Рёва Дэлисай не видел в городе такого движения. И даже тогда не было столько лиц – не было этой нескончаемой реки рабочих, что шла туда-сюда. «Компелы» приходили как мародёры. Зонголезцы – как катастрофа. А теперь?.. Теперь это было тихое переселение, невидимая река жизни, возвращающаяся туда, где, казалось, навсегда всё вымерло. Странное зрелище, и от этого всё казалось хрупким, уязвимым.\n\nВзгляд его скользнул по толпе и остановился на одном молодом жеребце. Тот двигался решительно, но не без тревоги; в глазах – не страх, а такая острая, сосредоточенная нужда, что ей нельзя не поверить. Он шёл, будто тащил на себе целый мир – своё усталое, измученное тело и глаза, полные страха и решимости. Всё в этом жеребце спорило само с собой... но он был здесь. Искал работу, как и все остальные. Искал хоть какой-то способ вернуть утраченное. Искал... просто возможность жить.\n\nТолпа втекала в город, и Дэлисай вдруг ощутил что-то старое, почти забытое чувство, которое думал уже не вернуть. Это была не радость, скорее исчезновение привычной безнадёжности. Да, зонголезцы разрушили город... но они не дали ему остаться развалинами. Теперь жеребята учились у зонголезских жрецов, а каждый, кому нужна была помощь, шёл к врачу, а не к шаману; и уже трудились не только ради выживания, но и чтобы найти своё место в новом мире. Золотой Город не исцеляется. После того, что случилось, он не сможет исцелиться, но он живёт. И сейчас, пожалуй, этого достаточно."
 zongo_railway.33.a: "Даже за чертой жизнь продолжается."
 zongo_railway.34.t: "Путь Тампука, этап 4" #Snow
 zongo_railway.34.desc: "В шатре Найлы, главной учёной на стройке, царил полный хаос: всюду валялись клочки пергамента, сломанные пилы и поразительно живучие образцы лиан. Рельсы старались обходить самые дикие заросли, петляли и сворачивали, чтобы хоть где-то можно было строить. Задача Найлы – сделать эту работу проще, заставить джунгли уступить место железу любой ценой. Она пробовала более крепкие пилы, разводила костры всё жарче, возилась с агрессивной химией, и всё напрасно: магия леса быстро зализывала все раны, смеясь над любыми попытками подчинить его. Это была война с самой природой, и проигрывали именно они.\n\nВ конце концов усталость её одолела. Откинувшись на стуле, Найла перестала резать и просто смотрела наружу. Она разглядела, как лианы образуют надёжную крышу для обитателей чащи, как корни сплетаются в основания прочнее любого бетона... И вдруг до неё дошло. Это не был момент победного крика «эврика!» – скорее сдача перед очевидностью, которую она всё время игнорировала в попытке действовать «по науке». Она стала смотреть на лес уже не как на помеху, а как на соратника.\n\nНашарив чистый лист, она выхватила перо и строки сами побежали по бумаге. Теперь главным замыслом было вплести железную дорогу в живое полотно чащи. Использовать живое дерево как опоры для зданий, идти вдоль рек, брать на вооружение всё, чем сама чаща защищает своё сердце. Строить так, чтобы лес оставался цел, но и дорога шла вперёд. Для себя она повторяла, что тут нет никакой уступки, а как раз наоборот – это новый уровень мастерства в инженерном ремесле!\n\nОна потянулась было за сигаретой, чтобы порадоваться находке, но тут заметила, что срезанная лиана на столе будто сверлила её взглядом. Найла тяжело вздохнула, спрятала сигареты обратно и решила не злить ворчливую соседку по лагерю."
 zongo_railway.34.a: "Относись к другим так, как хочешь, чтобы относились к тебе."
 zongo_railway.35.t: "Путь Тампука, этап 5" #Snow
 zongo_railway.35.desc: "Дэлисай стоял у открытой двери вагона. Именно через этот порог день за днём проходили сотни других – к железному чудовищу, которое для него стало воплощением осквернения и потери. Теперь и он должен был сделать этот шаг. Ему было страшно до отвращения – к себе и к тому, что вот так, вдруг, оказался на месте тех, кого ещё недавно не понимал. Он пытался дышать глубже, найти покой, но сердце билось только быстрее. Может, всё-таки лучше...\n\n— Дыши спокойно, не торопись... Ты ведь сам учил меня этому, помнишь?.. — Мэсикап мельком взглянул на него, стоя позади. С тех пор, как Мэсикап приехал, они почти не переставали разговаривать: сначала из вежливости, а потом уже будто и не могли иначе. Это кажется дико странным, но было ощущение, что сама судьба толкала их к этим разговорам.\n\n— Слушай, тебе не тяжело? Если что, не обязательно сразу... ой, не тяни так сильно! — Дэлисай не успел договорить, как вдруг почувствовал, что двинулся с места. Всё случилось так быстро, что оба одним махом оказались внутри вагона.\n\nМэсикап засмеялся:\n— Видишь, я же говорил – ничего страшного! Пойдём, найдём наши места.\n\nМэсикап крепко взял его за копыто и повёл вперёд по вагону. Когда поезд тронулся, Дэлисай ждал резкого удара, как будто сама земля взвывает под сталью. Но вместо этого почувствовал ровное, сильное скольжение вперёд. За окном проплывала новая жизнь – мир менялся у него на глазах. Город и чаща больше не были врагами: Зонго проводило свои дороги так, чтобы не нарушать покоя природы. Там, где раньше были племенные стоянки, теперь стояли светлые дома из камня и живого дерева, связанные этой пульсирующей сетью рельсов. Он ждал катастрофы, но вместо привычного разлома ощутил, как на том же месте, где когда-то всё оборвалось, зарождается движение вперёд.\n\nЗонголезцы не подчинили природу и не уничтожили её. Они прислушались к ней. Индустриализация, что пугала его раньше, здесь почему-то вписалась в ритм этой земли. Это равновесие так сильно отличалось от далёких фабрик, чёрных от дыма. Всё было не идеально, но Дэлисай уже не мог отрицать: вместе с Зонго пришла и новая эпоха.\n\nВ тишине Мэсикап взял его за копыто. Дэлисай посмотрел на смущённого жеребца, улыбнулся и снова уставился в окно, крепко сжимая его копыто в ответ."
 zongo_railway.35.a: "Вперёд идти легче, когда рядом свои."
 zongo_railway.36.t: "Путь Наугдау, этап 1" #Snow
 zongo_railway.36.desc: "По всему Барко Гечиту гремели удары молотов, инженеры и рабочие метались по площадке, споря, как вписать новые чертежи в тесное поселение. Племена по-прежнему смотрели на зонголезцев с опаской, но это было ожидаемо. Прогресс всё равно не остановить: Аамина позаботится об этом, даже если эти мешающиеся повсюду корни уже порядком действуют на нервы.\n\nГиена стояла в стороне и наблюдала, как зебры пытались расчистить улицу – нужно было уложиться в сроки строительства. Она тяжело вздохнула и закурила. По идее, рабочие вот-вот должны были притащить тяжёлую технику...\n\n— Стойте! — Аамина вздрогнула и едва не перекусила сигарету: крик разорвал гомон стройки. Она оглянулась – к ним бежала зебра, явно из местных жителей.\n\n— Глупо пытаться срезать эти корни! Они тут появились задолго даже до нас – наугдаунцев, и всё ещё стоят, потому что так надо! Хорошо ещё, что они на вас не напали! — сказала она, переводя дух.\n\nПока кобыла пыталась отдышаться, Аамина почувствала, как после этой тирады у неё окончательно сдают нервы.\n\n— Местная, что ли, — процедила она. — Может, ты тогда подскажешь, как нам пробиться дальше? До следующей улицы не добраться: вы, наугдаунцы, тут устроили настоящий лабиринт.\n\nКобылка только загадочно улыбнулась и по её виду сразу стало понятно: она явно знала, что сказать."
 zongo_railway.36.a: "Ну, раз спрашиваешь... идей у меня целый вагон и маленькая тележка!"
 zongo_railway.37.t: "Путь Наугдау, этап 2" #Snow
 zongo_railway.37.desc: "Аамина шагала следом за кобылкой, чьё имя – Лигайя – она уже успела узнать. Они кружили по всему поселению. Скепсис к её методам никуда не делся, но теперь к нему добавилось и любопытство. Бригада Аамины, привычная прорубать себе путь где угодно, здесь, в этой чаще, оказалась бессильна. А Лигайя, между тем, уверяла, что со всем справится.\n\n— Вот, — щебетала Лигайя, указывая на корзины с едкими фруктами. — Попросила собрать знакомых! Ящеры не могут устоять – привела Дакылу и Кидлата помочь! — Рядом с ней стояли две гигантские рептилии. Аамина уже собралась спросить, что это за помощь такая, но Лигайя опередила её, показывая в сторону глинистого склона у реки. Там зебры с трудом тащили мешки мокрого песка, а ящеры, ступая когтистыми лапами, легко взбирались наверх.\n\n— Потом просто отведём их домой – у приятельницы жеребёнок плачет, если Кидлат долго не возвращается, — добавила Лигайя.\n\nОни перебрались в другую часть поселения – здесь каналы изрядно осложняли жизнь строителям. Аамина уже решила строить мост на одном из мелких переходов, но Лигайя... просто переправила их через воду на двух огромных черепахах, гружёных инструментами.\n\n— Без черепах через город не пройти! — с улыбкой объяснила Лигайя. — С ними куда проще, чем возиться с новым мостом. Да и черепахи такие милые! — Она нежно погладила одну из них по подбородку.\n\nПозже, уже на том самом месте с упрямыми корнями, где они впервые встретились, у Лигайи нашёлся ещё один план.\n\n— С этими малышами не воевать надо, а дружить! — объясняла она, поглаживая корень, словно питомца. — Зачем бороться с ними, если можно попросить о помощи?\n\nАамина раскрыла рот, чтобы возразить, но слова застряли в горле. Даже прежде чем Лигайя что-то велела рабочим, было ясно – и этот её способ наверняка сработает, снова опровергнув все привычные правила. Медленно затянувшись сигаретой, Аамина пробормотала:\n\n— Этот лес как будто с другой планеты... Ничего из этого не должно было сработать..."
 zongo_railway.37.a: "Но всё же – сработало."
 zongo_railway.38.t: "Путь Наугдау, этап 3" #Snow
 zongo_railway.38.desc: "На этот раз Аамина встретила Лигайю не во время привычной беготни по делам, а на только что построенной платформе с видом на Барко Гечит. Для гиены это был просто ещё один из множества городов, а для кобылки – родной дом. План сработал: фабрики гудели, поезда связывали регион с Зонго, всё шло как надо, и во многом благодаря Лигайе. Но сейчас в её глазах мелькала какая-то грусть.\n\n— Красиво, — тихо сказала Лигайя, указывая на посёлок. — Здесь так быстро всё выросло, как на дрожжах... Кто знает, чего мы ещё добьёмся... — она вдруг осеклась и, отвернувшись, кашлянула.\n\nАамина подошла к перилам и встала рядом, не смотря на посёлок.\n\n— Вот так номер. Не думала, что ты так быстро пристрастишься к сигаретам, — сказала она, закуривая. — И не надейся, делиться не буду.\n\n— Ерунда... не обращай внимания, — быстро отозвалась Лигайя, вновь найдя свою обычную живость в голосе. — Просто смена времени года всегда так действует, — она снова вскинула копыто, указывая куда-то вдаль. — Завтра, слышала, новое оборудование привезут. Интересно, будет ли что-то новое.\n\nАамина смотрела на неё, а Лигайя задумчиво вглядывалась в небо. Эта маленькая заводила, которая только и делала, что мешала с самого первого дня; шумная, надоедливая, чересчур весёлая... но, надо признать, без неё всё бы рухнуло. Если бы не Лигайя, Аамина до сих пор бы лоб разбивала об местные проблемы, которые не решить привычными способами. Она всегда считала себя сообразительной, но теперь, глядя на кобылку, ясно понимала: рядом стоит кто-то по-настоящему, до обидного... талантливая."
 zongo_railway.38.a: "Дым стелился над городом и далеко не только от одних лишь сигарет."
 zongo_railway.39.t: "Путь Наугдау, этап 4" #Snow
 zongo_railway.39.desc: "Гиена стояла, наблюдая, как рабочие вбивают последние болты и соединяют новые участки железной дороги. Работу должны были закончить только через месяц, но справились куда раньше, и всё благодаря одной кобылке, которую Аамина в последнее время видела чаще всех.\n\n— Знаешь, тебе ведь не обязательно крутиться тут с моей бригадой, работать наравне со всеми, — сказала она, подходя к вспотевшей Лигайе. — Тебя уже и так не раз повышали. Можешь взять передышку и просто приглядывать со стороны, чтобы всё шло как надо.\n\n— А как ещё воодушевлять рабочих, если не собственным примером? — улыбнулась Лигайя, делая вид, будто показывает мускулы. — Пусть у меня нет таких лап, как у тебя, но если бы были, держу пари, они были бы куда крепче! — Она рассмеялась, но смех быстро перешёл в приступ кашля. За последние недели такое случалось всё чаще, так что даже Аамина уже была к этому готова: молча протянула бутылку воды.\n\n— С-спасибо, но я и правда в порядке, — попыталась отмахнуться Лигайя.\n\n— Это ты уже раз двадцать мне говоришь, — пробурчала Аамина. — И что-то не видно, чтобы тебе становилось лучше. Не хочу лезть в душу, но, может, пора быть честнее с собой? А то докашляешься до беды, — она взглянула на Лигайю и вздохнула. — Просто... мы тут за тебя волнуемся, понимаешь? Ты многим помогла. Да ты мне, по правде говоря, больше всех помогла, если уж на то пошло. Не хочу смотреть, как ты себя гробишь.\n\nЛигайя подняла глаза, взяла бутылку и улыбнулась.\n\n— Спасибо, Аамина, запомню. Кстати, если ты меня и правда так любишь, скажи прямо! Я тебя даже на ужин приглашу.\n\n— Ага... стой-ка, что?! — Аамина смутилась, а Лигайя уже уходила, смеясь. — Я ведь просто из вежливости сказала, не воображай себе невесть что! — но когда Лигайя скрылась из виду, Аамина всё-таки не сдержала улыбку."
 zongo_railway.39.a: "Кто-то ещё в этой истории тоже избегал честного разговора с собой."
 zongo_railway.40.t: "Путь Наугдау, этап 5" #Snow
 zongo_railway.40.desc: "Аамина нарядилась так вычурно, как только могла, хотя и выглядела не сильно лучше, чем в обычной рабочей одежде – она никогда не любила все эти церемонии. С завершением участка пути по региону Анарбек выразил своё одобрение, когда услышал, что местная кобылка так помогла стройке, и сразу предложил ей повышение. Благодаря этому Лигайя могла бы остаться рядом и работать дальше, и вроде бы всё могло бы не меняться. Когда кобылка показалась на причале, где они договорились встретиться, Аамина попыталась собраться: ей нельзя было показывать волнение.\n\n— Красивая ночь, да? — первой заговорила Лигайя, заметив её раньше. — Я... я тут думала над тем, что ты тогда сказала... про честность, — Аамина быстро спрятала цветы за спину, пока Лигайя поворачивалась к ней и глубоко вдохнула. — Нашу конфедерацию растоптали, столько народу погибло, даже Тигра больше нет! Ты понимаешь? У меня весь мир рухнул, когда пришли зонголезцы, но я ведь не могла просто лечь и умереть!\n\nСлёз не было, но на лице читалось отчаяние.\n\n— Я... я недавно разговаривала с врачом. Сказали, что у меня с лёгкими всё плохо, — Лигайя даже усмехнулась. — Сказали, что если не хочу, чтобы стало ещё хуже, надо уходить с этой работы, — она бросила камешек в море. — Ну и что я теперь за наугдаунка такая, если строить не могу...\n\nАамина опешила – никогда бы не подумала, что вечно смеющаяся Лигайя может так сломаться. Что теперь делать? Сарказм здесь был бы не к месту... Утешить? Обнять? Поцеловать?.. Лигайя, словно почувствовав её замешательство, тихо похлопала её по голове.\n\n— Ты была хорошей подругой, Аамина, но мне пора уходить. Я ещё не знаю, куда. Сяду на поезд до границы, а там посмотрю, куда судьба занесёт, — она улыбнулась, и Аамина вдруг испугалась, что, если не обнимет её сейчас, больше никогда не увидит этой улыбки. — Я рада, что встретила тебя.\n\nАамина почувствовала, как букет в её лапах беззвучно сминается."
 zongo_railway.40.a: "Не проронив больше ни слова, они разошлись."
 zongo_railway.41.t:0 "Путь Имба-Зару, этап 1" #Herr B
 zongo_railway.41.desc:0 "Герхард Гудсмак смотрел на тлеющий кратер посреди фабрики. Столько пива ушло в землю! И ведь пиво-то было отменное – фетизское! – сваренное по старинному рецепту его прапрадеда, который когда-то прибыл в Муромо Вервизи прямиком из Мирабеля! В прошлом бытовало мнение, будто все грифоны, осевшие здесь в старину, были не кем иными, как наёмниками, солдатами и искателями приключений, однако его предок в эту схему не вписывался. Судя по семейным преданиям, Адрианус Гудсмак был грифоном жизнерадостным, но для авантюр чересчур упитанным – зато идеально подходившим на роль пивовара. Да и семья его всегда ладила с местными зебрами, что, вероятно, и объясняет, почему бизнес так и не вырос во что-то большее...\n\nВпрочем, "Фетизское пиво Гудсмаков" славилось на весь Имба-Зару (не то чтобы конкурентов тут было много, но суть-то не в этом!), а это о многом говорило. При производстве в ход шли только ячмень, хмель и вода, да и дрожжи были особые – те самые, что прадед привёз с исторической родины! Теперь вот, после смерти матери в 985 году, Герхард, представитель уже четвёртого поколения, возглавляет семейное дело и даже расширил его, построив в 990-х новый завод.\n\nНо потом, в 1006-м году, нагрянули эти тупые роамцы со своим напыщенным "кайзерком", и его завод попал под артобстрел. Восстановление потребовало много средств и заняло уйму времени. Только-только всё наладилось – и опять нахлынула беда: явились зонголезцы, и шальной снаряд снова угодил прямиком в цех. Столько хорошего пива утекло! А сколько денег ещё придётся потратить, чтобы восстановить производство! Но всё это, по правде говоря, ерунда. Главное, чтобы дрожжи уцелели: запасы-то и без того были на исходе. А он ведь собирался закваску размножить, да жадность помешала...\n\nГерхард гневно махнул хвостом. Прибыль за этот год уже наверняка ушла в землю..."
 zongo_railway.41.a:0 "Опять придётся заниматься восстановлением..."
 zongo_railway.42.t:0 "Путь Имба-Зару, этап 2" #Herr B
 zongo_railway.42.desc:0 "Из-за строительных работ вокруг стоял непрекращающийся гул. Герхард Гудсмак парил над своей фабрикой, держа в когтях чертежи и отдавая распоряжения бригаде внизу. Держаться в воздухе так долго было для него делом нелёгким – да он и сам был не из лёгких, – зато с высоты он мог лично наблюдать за ходом работ и эффективнее управлять восстановлением. Каждый день бригада семимильными шагами приближалась к завершению, и Герхард уже предвкушал, как вскоре пиво потечёт рекой.\n\nКогда рабочие ушли на обед, Герхард вернулся в офис, чтобы обдумать новую бизнес-стратегию. Прошлый год оказался сплошным убытком, и состояние его семьи значительно уменьшилось. Ущерб от войны с Роамом, а затем и атака зонголезцев едва не разорили его окончательно, но Герхард не унывал. Первое правило любого бизнесгрифона – никогда не упускать возможности заработать; гибкость, скорость и точность – вот те черты, которыми должен обладать грифон, находящийся в его положении. И, по счастливому стечению обстоятельств, такая возможность ему представилась.\n\nЗонголезцы, конечно, нанесли изрядный урон, но помимо прочего, за их атакой последовали и положительные перемены. Их король, к примеру, оказался помешан на поездах и выстроил по всей империи разветвлённую сеть железных дорог. Поезда, конечно, не были новинкой для Чисимби – в отличие от самого Зонго, – но результат был налицо: транспортные расходы сократились. В разы, если быть точным.\n\nКак только завод будет вновь запущен – а это должно было случиться уже с недели на неделю, – Герхард собирался вывести свой бренд за пределы Имба-Зару. Наверняка зонголезцы никогда не пробовали хорошего фетизского пива (если они вообще знают, что это за напиток такой). Он уже работал над налаживанием контактов с ключевыми фигурами в управлении железнодорожными перевозками. Если удастся ещё снизить логистические издержки и, возможно, заручиться поддержкой чиновников для продвижения бренда, думал он, прибыль могла бы быть очень внушительной.\n\nГерхард усмехнулся. *Очень* внушительной."
 zongo_railway.42.a:0 "Пиво должно литься рекой!"
 zongo_railway.43.t:0 "Путь Имба-Зару, этап 3" #Herr B
 zongo_railway.43.desc:0 "— А это, сынок, называется "большая куча денег", — произнёс Герхард, и оба – он и его сын Хендрик – уставились на увесистый мешок с золотом. Иногда грифонам бывает просто необходимо ощутить тяжесть монет в когтях, и именно поэтому он решил забрать прибыль за последний квартал наличными.\n\nНаблюдая за тем, как его сын ощупывает монетки, старший грифон задумался о недавних событиях. Восстановительные работы уже были завершены, и производство так и кипело! Более того, строители уже вовсю перестраивали цеха, чтобы вместить больше пивоваренных чанов, сусловарочных котлов и бродильных аппаратов. Когда расширение завершится, подсчитал грифон, объёмы производства должны вырасти вдвое!\n\nНе меньше Герхард радовался и тому, что смог вернуть на завод многих грифонов и зебр, уволенных после разрушения завода: некоторые из них были не просто его сотрудниками, но и друзьями, и поэтому эта экономическая катастрофа в момент стала ещё и личной. Теперь же жизнь снова налаживалась, а последствия катастрофы окончательно отступили, когда он, в очередной раз прогуливаясь по цеху, услышал, как его сотрудники и друзья радостно здоровались с ним. Более того, производство настолько увеличилось, что теперь у него в подчинении было куда больше рабочих, чем прежде, и это наполняло его глубочайшей гордостью.\n\nЧто касается экспорта пива в другие части Зонго – эта авантюра также обернулась большой прибылью. Многие зебры (особенно те, что живут на юге) вообще никогда не пробовали ни фетизского пива, ни пива как такового. Местные сочли его напитком мягче своего традиционного и были рады, что у них появилась возможность выпить пару кружек горячительного, не рискуя при этом испортить себе вечер. Вследствие этого спрос вновь повысился, а прибыль уж тем более.\n\nНо самое главное – зонголезцы продолжали развивать свою железнодорожную сеть. Герхард наладил важные связи в их администрации и обеспечил себе значительные транспортные мощности, увеличившиеся в ходе недавнего расширения магистралей. Хотя это и стоило ему немалой части с трудом заработанных денег, он знал, что как только новые пути будут запущены, вложения окупятся сторицей."
 zongo_railway.43.a:0 "Пришло время зарабатывать!"
 zongo_railway.44.t:0 "Путь Имба-Зару, этап 4" #Herr B
 zongo_railway.44.desc:0 "— Ещё раз, с КЕМ ты встречаешься? — спросил Герхард Гудсмак и уставился на сына шокированными глазами.\n\n— А что, мне нельзя встречаться с зебрами? В чём вообще проблема? Вот у тётушки Вильгельмины... — парировал Хендрик.\n\nГерхард прервал его: — Я не это имею в виду. У нас много у кого в семье были отношения с зебрами. Мне просто интересно, почему ты выбрал именно зонголезскую солдафонку вместо хорошей имба-заруйской кобылы? Ты что, забыл, что они напали на нашу родину и поработили нас? Где твоя гордость, Хендрик!\n\nЕго сын сконфузился и рассмеялся: — Отец, ты это серьёзно? Тебе ли жаловаться на то, что зонголезцы сместили прошлых правителей? Разуй глаза и оглянись! Всё это золото не могло появиться у нас из воздуха; его нам создали зонголезцы, скупавшие наше пиво и перевозившие его по своим железным дорогам! Наша прибыль и производство увеличились в четыре раза после того, как эти "захватчики" покорили нас. Да ты и сам не раз говорил, что их нашествие – манна небесная, а теперь внезапно в тебе проснулся патриотизм? Отец, ну не смеши ты меня.\n\nУ старшего грифона перехватило дыхание. — Ну послушай, есть всё-таки разница между деловыми и романтическими отношениями. Я... я бы ни за что... — грифон оторопел. — Ладно, признаю: мы неплохо заработали на всём этом бедламе, но это не значит, что я считаю себя зонголезцем! Это... Ну то есть... Не знаю, как это описать... Но... Ты уверен?\n\n— Она просто прелесть. Ей девятнадцать, как и мне, а родом она из глухих лесов Зонго. Ты только представь себе: до шестнадцати лет она никогда вживую не видела рабочие станки. Тяжело им было, но когда ко власти пришёл новый король, они быстро подняли свою промышленность и тут же начали покорять соседей. Ей осталось служить всего два месяца, а потом её откомандируют в местный гарнизон. Посмотрим ещё, как пойдут дела дальше, но... Отец, наверное, я влюбился."
 zongo_railway.44.a:0 "Да уж, любовь на замок не закроешь."
 zongo_railway.45.t:0 "Путь Имба-Зару, этап 5" #Herr B
 zongo_railway.45.desc:0 "Герхард Гудсмак откинулся на спинку кресла, сжимая в когтях большую кружку пива. За последнее время произошло столько всего, что было трудно уследить. А как изменился мир вокруг! Он с трудом мог в это поверить. Но что он сам обо всём этом думал?\n\nНа прошлой неделе его сын Хендрик сыграл свадьбу со своей возлюбленной, Нией – той самой кобылой-солдатом из зонголезских лесов, откомандированной в местный гарнизон. Учитывая, как мрачно выглядела мать Нии на церемонии, такой союз оказался неожиданностью и для её семьи: каждый из них понимал, что теперь она не сможет продолжить род. Семья Герхарда, веками жившая среди зебр, уже давно привыкла к такому казусу...\n\nВпрочем, семья Нии оказалась весьма милой, и на празднике всем нашлось о чём поговорить. Грифону было странно осознавать, что Зонго теперь ощущался и так близко, и так далеко одновременно. С запуском новых поездов дорога между двумя владениями занимала меньше дня, а Хендрик с Нией уже решили, что будут содержать два поместья сразу. Как же всё внезапно сблизилось...\n\nНо было и кое-что ещё, что заставляло Герхарда задуматься: во время церемонии Ния как-то невзначай обмолвилась, что, несмотря ни на что, все они – зонголезцы. Но так ли это на самом деле? Для себя Герхард твёрдо решил, что никогда не признает себя зонголезцем, а вот насчёт сына он сомневался: тот никогда не видел ничего дурного в работе с пришлыми. Может, Герхард просто стал слишком консервативным...\n\nПо крайней мере, бизнес у них шёл в гору: в прошлом квартале снова выросли и прибыль, и объёмы производства; семья планировала строительство новых заводов уже в Роаме и столице Зонго, а экспорт шёл далеко за пределы королевства. Герхарду почему-то казалось, что его прадед Адрианус смотрит на него с улыбкой, но он не до конца понимал почему: то ли из-за процветающего семейного дела, то ли потому, что их род в очередной раз доказал своё умение интегрироваться в общество зебр."
 zongo_railway.45.a:0 "Жизнь – это как качели: на них то вверх, то вниз. Главное – уметь на них качаться."
 zongo_railway.46.t: "Путь Цимейна, этап 1" #Ardent
 zongo_railway.46.desc: "Новая жизнь. Новые возможности.\n\nУ Тилука за плечами – только мешок с пустыми тетрадями да карандашами. Копыта, стёртые тяжёлым трудом прежней жизни, ступили на выложенную кирпичом дорожку, что вела к главному университету Цимейна. Всё это казалось нереальным, но где-то глубоко внутри Тилук знал: здесь он возьмёт столько, сколько сам сможет унести. Не так, как прежде.\n\nИдя вперёд, Тилук вспоминал свою прежнюю жизнь: столько лет был рабом – Ибхаиз ждали от него только войны и смерти, а Мавелас было нужно лишь, чтобы он работал до изнеможения, пока его не выкинут прочь. Зонголезцы предложили ему третий путь: самому стать хозяином своей судьбы. Копыта годами пахали на тяжёлых работах, но ум так и не угас – Тилук всегда тянулся понять этот мир, узнать, что есть за его пределами. Теперь, став свободным подданным Зонго, он сделал всё, чтобы поступить в прославленный университет Цимейна.\n\nТилук пробирался сквозь спешащих зебр, пытаясь найти хоть какую-нибудь карту или табличку – понять, где он и куда должен идти. До начала вводного семинара для новых студентов оставались считанные минуты, но взгляд то и дело возвращался к просторной, светлой площади.\n\nПерекинув мешок поудобнее, Тилук наконец решился двинуться дальше и прошёл мимо всё увеличивающейся толпы шумных студентов."
 zongo_railway.46.a: "По какой-то причине все они смотрели на него с отвращением."
 zongo_railway.47.t: "Путь Цимейна, этап 2" #Ardent
 zongo_railway.47.desc: "...Вот почему столь стремительная индустриализация неизбежно влечёт за собой катастрофические издержки, — по классу разносился скрип мела по доске. — Мы видели это и на примере провалившихся модернизаций, и на свежих историях вроде Кирии с её чересчур амбициозным 3½-летним планом.\n\nПрофессор отложил мел и обвёл взглядом аудиторию.\n— Вопросы?\n\nАмачи торопливо записывала каждое слово: если уважаемый эколог говорит о будущем страны, к его мнению стоит прислушаться. Она уже приготовилась поднять копыто, но её опередил кто-то другой. Этого студента она раньше не видела; может, переводной?\n\n— С уважением, профессор, но неужели вы действительно так скептически относитесь к самой идее индустриализации? Без железных дорог и модернизации, начатых королём Акидой, я бы никогда не попал в этот класс, — уверенно сказал зебра. — Кроме того, модернизация позволяет стране оставить устаревшие порядки, вроде рабства, в прошлом. Благодаря этому я тоже здесь... или вы считаете рабство справедливым?\n\nПрофессор прислонился к стене, в классе зашептались.\n— Тилук, да? Говорили, к нам поступил... освобождённый зебра, — он кашлянул. — Да, во многих странах рабство считают и устаревшим, и безнравственным. Однако... сама система, как ни крути, способствовала поддержанию здоровой среды.\n\nОн обвёл зал копытом.\n— В конце концов, этот спор куда сложнее простого деления на чёрное и белое. Буду рад обсудить подробнее. Есть ещё вопросы?\n\nАмачи поняла: надо срочно что-то спросить, иначе обсуждение уйдёт совсем не туда. Она подняла копыто.\n— А есть ли способы для общества снизить или вообще избежать издержек от индустриализации?\n\nПрофессор внимательно посмотрел на неё, затем снова взял мел и лекция вновь пошла, как ни в чём не бывало."
 zongo_railway.47.a: "Только она заметила, что освобождённый зебра исчез."
 zongo_railway.48.t: "Путь Цимейна, этап 3" #Snow
 zongo_railway.48.desc: "В дальнем уголке университетского сада Тилук отыскал скамейку, про которую почти никто не знал. Здесь не было ни шепота, ни косых взглядов – только густая тень и редкая тишина. Он закрыл глаза, вдохнул глубже: даже сюда добирался размеренный звон молотов, тянуло угольным дымком с новых железных дорог и фабрик, что ползли к окраинам города.\n\nДля других студентов этот гул был чем-то чужим, почти враждебным, словно кто-то проломил стену их башни из слоновой кости и пустил в неё гарь и шум жизни. А для Тилука это был голос перемен, которые вырвали его из цепей и привели к этой скамейке. Он достал блокнот, исписанный набросками мостов, предварительными расчётами, фантазиями об орошении полей близ фабричных посёлков; всё это выросло под впечатлением от зонголезских инженеров, всё ещё не доведено до конца, но уже – своё, настоящее.\n\nОн мечтал о том дне, когда сможет показать свои работы королю или его советникам. О дне, когда его будут видеть не как бывшего раба, а как зебру, что сам выбрал строить новое королевство. Он знал: до своей судьбы дорога ещё длинная, и копоть ложится на старые камни, и все вокруг ворчат на этот бесконечный грохот. Но для него в этом шуме была свобода. Впервые в жизни Тилук чувствовал, что его ум чего-то стоит. Он заснул с блокнотом в копытах, под гул далёкой стройки – под колыбельную того будущего, в котором, наконец, нашлось место и для него."
 zongo_railway.48.a: "Для кого-то фабричный гул – это и есть свобода."
 zongo_railway.49.t: "Путь Цимейна, этап 4" #Snow
 zongo_railway.49.desc: "Сегодня над университетской площадью не было привычного гула споров – всё смешалось в глухое, давящее гудение. Вокруг памятника собралась стайка студентов, все до блеска вычищенные, с аккуратными причёсками. Их внутренний манямирок рушили краны и трубы новых фабрик, и нужно было на кого-то вылить страх и злость. Под копыто попался Тилук. Один за другим полетели выкрики: злые, резкие, будто накапливались годами.\n— Кто тебя сюда пустил?!\n— Тут не лагерь для чернорабочих!\n— Заблудился по дороге в депо, что ли?\n— Иди туда, откуда пришёл!\n\nТилук стоял, не шелохнувшись, только спина стала ещё прямее, копыта – будто налились свинцом.\n— Я поступал сюда, как и все вы, — выговорил он. — Своим трудом заслужил право быть здесь.\n\n— Труд? Твой труд – это за станком копытами махать, а не в университете сидеть! Здесь учатся те, у кого есть мозги!\n— Теперь сюда кого попало пускают, лишь бы циферки в отчётах были!\n\nОн держался до последнего. Челюсть сжата, взгляд твёрдый, внутри – узел тревоги, но шагу назад не сделал. На краю толпы затаилась Амачи: видела, как на него смотрят остальные. Её саму учили считать таких, как Тилук, не более чем просто слугами. Но даже ей случившееся показалось перебором.\n\nК их спору присоединился профессор. Он вальяжно вышел вперёд и заговорил с явным неодобрением:\n— Такие сцены – позор для университета, — обвёл всех холодным взглядом. — Чему вас вообще тут учат? Мавелас больше нет, но вы всё ещё тянете за собой их наследие. Вести себя так – значит позорить не только себя, но и свою семью.\n\nТолпа стала медленно таять, шептаться, пятиться назад. Профессор кивнул Тилуку:\n— Пойдём, у нас остался незаконченный разговор.\n\nКогда они ушли, Амачи осталась стоять в стороне, не зная, на чьей она стороне и кто в итоге был прав."
 zongo_railway.49.a: "Временная передышка."
 zongo_railway.50.t: "Путь Цимейна, этап 5" #Snow
 zongo_railway.50.desc: "В коридорах университета стало тише, но всё же они не опустели окончательно. Совсем недавно в переписках между преподавателями и студентами звучали ругань, подозрения, презрение к монархии, и корона ответила быстро и жёстко. Старых профессоров и избалованных студентов из мавеласских семей просто вывели за порог. Вместо прежней толкучки появились новые лица: зонголезцы с окраин, добравшиеся по железной дороге, и бывшие рабы вроде Тилука, которые теперь никого не удивляли, просто ещё одни студенты среди других.\n\nТилук шагал по коридору к аудитории. Учёба стала совсем иной: оставили только те курсы, для которых нашлись новые преподаватели; всё прочее исчезло. Теперь на первом месте были инженерное дело, экономика, логистика.\n\nНа одном из поворотов он столкнулся с зеброй, которую прежде лишь замечал среди толпы. Та вздрогнула и испуганно посмотрела на него. Несколько секунд они стояли в неловкой тишине.\n\n— Тилук, — наконец тихо сказала она. — Мы раньше не разговаривали... Я Амачи. Я... хотела попросить прощения. За то, как с тобой обращались. Это было... по-настоящему отвратительно.\n\nТилук улыбнулся коротко, чуть устало:\n— Спасибо, — ответил он.\n\nАмачи не знала, что сказать дальше, поэтому отвела взгляд:\n— Всё меняется... и, наверное, в лучшую сторону.\n\n— Да, — просто кивнул он. Ещё мгновение они стояли рядом, не зная, что добавить. Потом Тилук кивнул на прощание и пошёл дальше, к аудитории. Они не станут друзьями, и в этом не было ничего страшного. Однако он не собирался платить ей той же высокомерной монетой, какой её коллеги расплачивались с ним. Если она захочет молчать, пусть молчит, а там, может быть, ей и удастся увидеть то будущее, что он собирался построить. А Тилук, двигаясь к своей аудитории, вдруг осознал, что всё это время не переставал улыбаться."
 zongo_railway.50.a: "Где не строили вместе, там и прощение стен не воздвигнет."
 zongo_railway.51.t:0 "Путь Твизаньики, этап 1" #HerrB
 zongo_railway.51.desc:0 "Йохана потёрла заднюю лапу, которая болела уже несколько дней. Таскать мешки с песком на стройке было одной из самых тяжёлых работ за всё время её жизни в этом городе, но деньги были нужны... Она была уже немолода, и с тоской думала о том, сколько ещё так протянет.\n\nДа и вообще: таскать мешки – занятие для рабов, а не для гордой гиены. Эти длинношеие должны были возить тяжёлые грузы, как и раньше. Всё пошло наперекосяк после того, как Твизаньика оказалась под властью тупых зебр с востока, а жирафы вдруг стали разгуливать свободно... Ха! Зонголезцы ещё узнают, чего стоят эти бездельники без кнута. Йохана всегда носила кнут раньше, в те времена на плантации...\n\nОна продолжала растирать лапу и вспоминать последние годы. Почти всю жизнь она работала на плантации в восточной Твизаньике, сперва помощником бухгалтера, а позже старшим бухгалтером. На плантации держали более пятисот рабов-жирафов, из-за чего она была одной из крупнейших в округе. Но потом Твизаньика втянулась в войны по всему Чисимби, и земли разорили зебры. Рабы разбежались кто куда, а хозяйство закрылось. Её муж, Барака, с войны так и не вернулся, так что она уехала в город, надеялась найти там работу. Но всё сложилось плохо, и теперь она перебивалась случайными подработками. Что за позор!\n\nИ вот пришли зонголезцы. Но вместо того, чтобы вернуть естественный порядок вещей, они объявили жирафов свободными, да ещё и позакрывали последние плантации. Тупые завоеватели! Как же она ненавидела всё, что сейчас происходит. По крайней мере, её сын Ассанте уже вырос. В последний раз она слышала, что он нашёл работу в Читешихаре, но почта нынче ужасно ненадёжна. Но однажды... однажды у неё будут деньги, и она снова его увидит."
 zongo_railway.51.a:0 "Что стало с этим миром?"
 zongo_railway.52.t:0 "Путь Твизаньики, этап 2" #HerrB
 zongo_railway.52.desc:0 "Завод возвышался над существами, выстроившимися в очередь у ворот. В основном это были гиены, но среди них попадались и жирафы, и зебры. Разнёсся слух, что предприятие откроется сегодня, и многие пришли, надеясь найти работу. Йохана тоже стояла в очереди, но особо на что-то не надеялась, ибо впереди было слишком много желающих, а она уже не та, что раньше. И, конечно, завод принадлежал зонголезцам, а значит, длинношеих наверняка примут в первую очередь...\n\nОна задумалась, и в этот момент ворота открылись. Первым делом в глаза бросилось множество цехов и мастерских, расположенных на территории. И очень, очень много труб. Пусть дым ещё ниоткуда не валил, но Йохана уже машинально потёрла нос. Как же чист и свеж был воздух на плантации... Очередь медленно продвигалась, и она даже не заметила, как начал подходить её черёд. Инстинктивно гиена ожидала, что двери закроются именно перед ней и остаток толпы отправят по домам, но этого не случилось.\n\nЧерез час её позвали. Скучающая зебра записала имя, возраст и место работы. Во фразу "старший бухгалтер" Йоханна вложила всю оставшуюся гордость, но зебра лишь нацарапала "бухгалтер", даже не подняв глаз. Затем лист перешёл к более важной на вид кобыле, наблюдавшей за опросом с суровым видом.\n\nБегло взглянув на бумагу, та кивнула. — Ты можешь трудиться здесь секретарём. Мы будем работать с большим количеством продукции, хвала железной дороге, иначе этот завод бы не работал, а твой опыт в бухгалтерии нам очень пригодится, — она свистнула, и к ним подбежал молодой гиена. — Хамади покажет тебе твоё рабочее место, — после этого кобыла простым кивком велела подписать протянутый ей договор.\n\nПлестись вслед за мальчишкой оказалось почти приятно. Наконец-то работа. Быть секретарём куда лучше, чем жить случайными шабашками все эти годы. Но в старые времена..."
 zongo_railway.52.a:0 "Этого хватит, чтобы платить по счетам, а большего и не надо."
 zongo_railway.53.t:0 "Путь Твизаньики, этап 3" #HerrB
 zongo_railway.53.desc:0 "— Я уволен?! Только потому что я показал этим длинношеим... жирафам, что такое настоящая работа?! Это какое-то издевательство! Они и так тут бегают как хотят, я ж не держу их в цепях! Хотя следовало бы наоборот, так что грех им жаловаться! Просто они ленивые, вот и всё! Не моя вина, что пришлось применить немного силы.\n\nГромкий голос начальника Йоханы разносился эхом по всему административному отделу, и все гиены в канцелярии слушали с напряжением. В этом отделе жирафов не было, ибо большинство из них читать не умели, так что в бумажной работе они были бесполезны. Конечно, весь этаж прекрасно знал, что начальник время от времени бил жирафов, работающих здесь. Каждый понимал, что это вроде как запрещено, но в конце концов... это же жирафы. Что с них взять?\n\nОднако, судя по всему, зонголезцы смотрели на это иначе. Вчера управляющий заводом опросил многих работников. Разумеется, Йохана и остальные гиены всё отрицали. Хоть начальник и на них голос повышал регулярно, попытка длинношеих добиться увольнения босса была совершенно возмутительной. Но зебры и жирафы, конечно же, рассказали всё, и наверняка ещё преувеличили.\n\nГиены в канцелярии вполголоса обменивались комментариями. "Вот позор-то. Гиену увольняют из-за длинношеих, слышали такое?" "Какие времена настали!" "Позор." "Зонголезцы вообще ничего не понимают в наших краях."\n\nЙохана в знак поддержки сказала чуть громче нужного. — Если его уволят, я тоже уйду.\n\nРазговоры оборвались сразу. Несколько гиен переглянулись с сомнением, кто-то сморщил нос. Наконец одна спросила. — Правда, что ли?\n\nЙохана почесала ухо задней лапой. Может быть, она и правда погорячилась."
 zongo_railway.53.a:0 "Да что такого в этих жирафах-то?"
 zongo_railway.54.t:0 "Путь Твизаньики, этап 4" #HerrB
 zongo_railway.54.desc:0 "Йохана сморщила нос. — А что? Жирафы разве не длинношеие? Почему их нельзя называть так? В конце концов, вам пришлось строить весь завод с высоченными дверями ради них, — она попыталась говорить равнодушно, но прозвучало это скорее детски-оборонительно.\n\nНапротив неё стоял её новый начальник – зебра из Зонго, пришедший на смену уволенному предшественнику. Он медленно покачал головой. — Вы прекрасно знаете, что это оскорбление, и употребили его именно в таком ключе. Я больше не потерплю подобного. Вы хорошая работница, одна из самых продуктивных, но я не позволю оскорблять коллег. И не стоит на меня так смотреть. Вы, гиены, поработили жирафов века назад, но в Зонго все существа свободны, и они тоже. Вы будете работать рядом с ними и обращаться уважительно, иначе вам придётся искать новое место работы.\n\nОна сузила глаза, готовая съязвить, но выдохнула и сникла. Не оставалось сомнений, что он может уволить её прямо сейчас, и, возможно, ей стоило радоваться тому, что этот разговор хотя бы происходит, а не как с прошлым начальником. Всё равно в других местах не лучше. Эта работа была ей нужна, а жирафов, похоже, придётся терпеть. Ровным тоном она сказала. — Да, сэр, — а после небольшой паузы добавила, — я постараюсь.\n\nНачальник кинул на неё тяжёлый взгляд. — Вы, гиены, поистине особая порода. Я многое видел, но редко встречал общество настолько упорно сохраняющее свои расистские взгляды. Может, от вас, плотоядных, и следовало ожидать подобного, — он дёрнул ушами. — Я только надеюсь, что когда-нибудь вы увидите мир в более ярком свете. Смотрите, железная дорога принесла в ваши земли столько новых отраслей. Возможностей хватает для всех. Зачем же вам так ненавидеть жирафов? — не услышав ответа, он снова дёрнул ушами. — Ладно, свободны. И чтобы больше такого не повторилось.\n\nЙохана покинула его офис и вернулась на рабочее место в секретариате. Эти зебры! Неужели они просто не могли понять?.. Но сейчас это уже ничего не меняло. Хотя в одном её начальник был прав: экономика действительно пошла в гору, и она наконец могла начать откладывать деньги. Вскоре у неё будет возможность увидеть сына. После стольких лет."
 zongo_railway.54.a:0 "Толерантность... Проще сказать, чем действительно принять это."
 zongo_railway.55.t:0 "Путь Твизаньики, этап 5" #HerrB
 zongo_railway.55.desc:0 "— Ассанте! — поезд прибыл на станцию, и как только он остановился, Йохана сразу бросилась к сыну. Сколько лет прошло! И он так повзрослел. Она крепко обняла его и только тогда заметила рядом с ним подружку-гиену. — Вижу, ты не один?\n\n— Да! Шани, это Йохана, моя мама. Мам, это Шани, моя подруга. Мы познакомились в прошлом году на вечеринке, и скоро поженимся, — они поздоровались и направились к квартире Ассанте. Шани вскоре ушла, оставив мать и сына вдвоём.\n\n— Ну, мам, рассказывай: как тебе удалось самой сюда приехать? В письме ты писала, что теперь работаешь в зонголезской производственной фирме? Как вообще твоя жизнь?\n\n— Я правда там работаю. Как ты знаешь, когда плантацию закрыли, мне пришлось переехать в город, и несколько лет там перебиваться различными подработками. Теперь вот тружусь секретаршей на заводе – там определённо лучше и платят нормально. Конечно, не так как на плантации, но что есть то есть. Только жирафов там полно. Терпеть этих длинношеих не могу.\n\n— Мам, брось, не становись одной из тех глупых старых гиен, которые не могут отпустить прошлое. Не называй их длинношеими. У меня полно друзей в городе – как зебр из Имба-Зару и Зонго, так и жирафов. Им очень доставалось в прошлом, знаешь? В детстве я всего этого не понимал, но, если честно, сейчас лучше для всех. Да, я знаю, у тебя и отца было тёплое местечко на плантации, но подобные места как раз и тормозили всю промышленность Твизаньики. И нам больше не нужен подобный расизм.\n\n— Сын, ты не понимаешь. Мы завоевали эти земли, и жирафы были нашей законной собственностью! Они...\n\nНо Ассанте перебил её: — Мам, это было века назад. Сейчас всё по-другому. Жирафы наши сограждане, и всем нам будет лучше, если мы станем друзьями. Перестань цепляться за прошлое.\n\nЙохана посмотрела на сына, в задумчивости потерев заднюю лапу и вспоминая годы работы простой чернорабочей. Отпустить прошлое? Её сын, собственный сын... неужели она и правда стала той самой "старой гиеной", цепляющейся за прошлое?"
 zongo_railway.55.a:0 "Твизаньика и правда сильно изменилась."
 zongo_railway.56.t:0 "Путь Самбовато, этап 1" #Ardent
 zongo_railway.56.desc:0 "Холодный океанический бриз качал невысокие волны, бьющиеся о доки Акорадриакаровы. Три мелких чиновника сидели за столом и наслаждались своим завтраком. Точнее, лишь один из них действительно завтракал, в то время как оставшаяся пара продолжала говорить о работе.\n\n— Союз с Зонго – лучшее, что вообще могло случиться с нашим островом, — сказал Озуву, тыча куском хлеба в сторону суетящихся на побережье строителей. — Взгляните только, что они вытворяют с материком! Благодаря их железным дорогам Перламутровые врата наконец-то оправдают своё имя. Самбовато станет чем-то большим, чем ночлежкой для матросов.\n\nСаади кивнула, и на её губах мелькнула хитрая улыбка. — Согласна. Когда их важность внезапно сойдёт на нет, этим скрягам из Зебридов останется только рот разинуть, — кобыла перевела взгляд на друзей и придвинулась ближе. — Но что куда важнее... как бы нам на этом заработать?\n\nМазут проглотил пищу и тут же заговорил: — Заключим эксклюзивные контракты, — услышав это, Озуву уверенно улыбнулся. — Вот тебе и ответ. Просто воспользуемся своим положением, чтобы обеспечить себе договора на поставку материалов для строительства железных дорог: пиломатериалов, продовольствия, рабочей силы. Так мы станем для них незаменимыми.\n\nСаади усмехнулась. — Замкнутый круг – как и положено в здоровой экономике. Зонго работает на своё процветание, а мы – на своё, только за их счёт, — она повернулась к Мазуту, хрустящему солёными крекерами. — Ты же сможешь разработать проект первоначального предложения? Мы можем ой как много на этом заработать.\n\nМазут задумался, замер с крекером у самого рта и со вздохом опустил его."
 zongo_railway.56.a:0 "Три ума лучше одного."
 zongo_railway.57.t:0 "Путь Самбовато, этап 2" #Ardent
 zongo_railway.57.desc:0 "Трое зебр вновь собрались вместе, но на сей раз не в кафе, а в новом офисе. Саади первой решилась нарушить тишину. — Это... превзошло все мои ожидания.\n\n— Это точно! — усмехнулся Озуву и сделал глоток своего напитка.\n\nПока двое делились восторгом, Мазут хранил молчание и размышлял. Зонголезцы не просто приняли их предложение – они щедро за него заплатили, что в одночасье укрепило политический вес троицы и в разы ускорило работу самих зонголезцев. От такого развития событий Озуву и Саади были на седьмом небе от счастья.\n\nСаади откинулась в своём новом роскошном кресле. — Масштабы и скорость работы Зонго просто поразительны. Новые сортировочные станции, расширенные пирсы...\n\n— А ещё поражает, сколько мы на этом срубили! — воскликнул Озуву, указав на новые видневшиеся из окна строительные краны и новостройки. — Кошельки наши тоже толще некуда! Мы больше не простые чиновники, мы – творцы нового Самбовато!\n\n— Теперь через Перламутровые врата за неделю проходит больше судов, чем раньше за целый сезон! — подтвердила Саади, не отрываясь от отчёта и сияя улыбкой. — Вот это уж точно заткнёт за пояс этих зебридских выскочек!\n\nПара усмехнулась и, наслаждаясь моментом, осушила бокалы. Мазут же лишь переводил взгляд с кобылы на жеребца и затем снова уставился в списки товаров. В отличие от них, он чувствовал лишь нарастающую тревогу."
 zongo_railway.57.a:0 "Нет ничего плохого в том, чтобы наслаждаться хорошо выполненной работой."
 zongo_railway.58.t:0 "Путь Самбовато, этап 3" #Ardent
 zongo_railway.58.desc:0 "Озуву сидел и попивал импортированное кофе. — Нам нужно использовать своё влияние, чтобы закрепить за собой контракт на снабжение главной сортировочной станции. По-моему, это стоящее вложение.\n\n— Отличная мысль. Мазут, не забудь её записать, — сказала Саади, помешивая свой напиток.\n\nТроица снова сидела за столиком небольшого кафе, чья соломенная крыша резко выделялась на фоне кирпичных зданий, число которых за последнее время выросло в геометрической прогрессии.\n\nМазут уже было хотел что-то сказать в ответ на просьбу Саади, но витавший в метафорических облаках Озуву опередил его: — Вы только посмотрите, как преобразился город... Кто бы мог подумать, что меньше чем за десять лет Самбовато изменится до неузнаваемости. Работы в стране – хоть отбавляй, а народ доволен, — установил зебра и провёл копытом по линии горизонта, где маячили строительные краны и пыхтели фабрики. — И всё благодаря нам! — Озуву сухо усмехнулся и замолчал. Наступившая тишина оказалась куда пронзительнее "городских красот", которые теперь давили на троицу сильнее, чем когда-либо: новые покрытые копотью склады закрывали им вид на море, а постоянный грохот заводов глушил шум прибоя. Всё это было так непохоже на пёструю, хоть и бедную, портовую окраину, где они выросли. Но могли ли они жаловаться на это "преображение", если оно помогло им набить карманы золотом?\n\nПоследовавшее за этим неозвученным, но въевшимся в подкорку вопросом молчание навалилось на них тяжёлым камнем.\n\nОзуву, наконец, прервал повисшую тишину, фыркнув и улыбкой сломив хребет охватившему их напряжению. — Мы хотели власти и богатства. Мы их получили.\n\nВ ответ на это Саади поморщилась и пустым взглядом уставилась в кружку. Мазут просто закрыл глаза и беззвучно вздохнул."
 zongo_railway.58.a:0 "Цену прогресса нельзя было подсчитать, но можно было заметить."
 zongo_railway.59.t:0 "Путь Самбовато, этап 4" #Ardent
 zongo_railway.59.desc:0 "День у троицы начинался как обычно: они занимались управлением своими прибыльными сторонними проектами из офиса в центре Акорадриакаровы, чьи улицы, некогда пропахшие морской солью, теперь пропитались запахом угольного дыма. Да, это было поистине подходящим фоном для их работы. Впрочем, это умиротворение не могло длиться вечно, и только они вышли из здания на полуденную встречу, как их мир тут же перевернулся с ног на голову.\n\nПосреди улицы выстроились зонголезские солдаты, оцепившие главный офис чиновников. Стоило командующему офицеру обратиться к троице, как ошеломлённые Саади и Озуву замерли на месте. — Вы арестованы, — объявил офицер, и солдаты тут же сомкнули круг. — Не сопротивляйтесь.\n\n— На каких основаниях... — начал уж было Озуву, но его грубо повалили на тротуар. Саади и Мазут уже вскоре оказались в том же положении.\n\n— Вы что творите?! Я требую адвоката! Я знаю свои права! — взвизгнула Саади, чей пронзительный голос выдал её панику.\n\nОфицер встал прямо над кобылой и окинул её бесстрастным взглядом. — У вас есть право хранить молчание, — произнёс он таким тоном, будто вопли зебры были не более чем фоновым шумом. — Верховный судья распорядился о вашем немедленном заключении под стражу по обвинению в коррупции и подрыве отношений между Зонго и Самбовато. Повторяю: не сопротивляйтесь.\n\nКогда их потащили к полицейскому грузовику, нервы Мазута, наконец, сдали: его самообладание дало трещину и он дико зашипел, из последних сил дёрнувшись в наручниках."
 zongo_railway.59.a:0 "— Я с самого начала хотел сказать вам, что нам не стоило работать с зонголезцами!"
 zongo_railway.60.t:0 "Путь Самбовато, этап 5" #Snow 
 zongo_railway.60.desc:0 "МИНИСТЕРСТВО ИНОСТРАННЫХ ДЕЛ ЗОНГО – ОТДЕЛ ПО МЕРАМ ВНУТРЕННЕЙ БЕЗОПАСНОСТИ – (ОТРЕДАКТИРОВАНО) ДЛЯ СЛУЖЕБНОГО ПОЛЬЗОВАНИЯ\nОПЕРАЦИЯ: "ГОРЯЩИЙ ОСТРОВ"\nСТАТУС: ЗАВЕРШЕНО\n\nТЕМА: Ликвидация ресурсов и персонала, задействованных в проекте "Перламутр"\n\nКРАТКОЕ СОДЕРЖАНИЕ: Нижеперечисленные должностные лица (Озуву Андриана, Саади Ракото, Мазут Рандрианасоло) были идентифицированы в качестве ключевых пособников и основных бенефициаров коррупционной схемы, препятствовавшей полной интеграции инфраструктуры и системы управления Самбовато в единое партнёрство с Зонго. Их деятельность представляла собой неприемлемый риск для стратегических интересов Зонго в акватории Мирного Моря.\n\nПРИНЯТЫЕ МЕРЫ:\n\nВсе трое фигурантов были задержаны по обвинениям в коррупции, растрате, злоупотреблении служебными полномочиями в целях личного обогащения, а также в подрыве государственного единства между Зонго и Самбовато.\n\nИх личные и коммерческие активы были конфискованы правительством Зонго. Средства от реализации направляются на финансирование дальнейшего промышленного развития.\nТЕКУЩАЯ ОБСТАНОВКА:\nФигуранты были (ОТРЕДАКТИРОВАНО).\nМесто их текущего содержания – (ОТРЕДАКТИРОВАНО).\n\nЗАКЛЮЧЕНИЕ: Операция "Горящий остров" достигла всех поставленных целей. Добыча ресурсов и объёмы промышленного производства сохранены на прежнем уровне. Месторождения ресурсов демонстрируют признаки истощения, однако они выполнили свою стратегическую задачу, позволив заложить основу для будущего процветания Зонго. Ситуация считается: РЕШЁННОЙ."
 zongo_railway.60.a:0 "СЛАВА МОНАРХИИ. СЛАВА ЗОНГО."

 zongo_dilemma.1.t: "Налёты на железной дороге" #Snow
 zongo_dilemma.1.desc: "На столе у короля лежит очередное донесение: банды снова сорвали работы на стройке, увели грузы, нарушили график. Пока им не дадут отпор, они будут только наглеть: сегодня налёт, завтра грабёж. Акида склоняется над картой и в голове прокручивает варианты, каждый со своими рисками.\n\nСолдат отправить проще всего: армия не подведёт, порядок наведёт быстро. Но стоит снять часть полков с гарнизонов, так где-нибудь сразу образуется брешь. Всё чисто и быстро, но цена – время, силы, потерянный темп\n\nМожно доверить вопрос на усмотрение совета – формально подчеркнуть значимость их решений. Они и правда доведут дело до конца... когда-нибудь. Пока там спорят, взвешивают и перекладывают ответственность, по сути переливая из пустого в порожнее, другой способ уже давно бы сработал.\n\nЕсть ещё королева-мать. В её искусстве мирить самых упрямых – не раз спасалась страна. Она не говорит ни о мобилизации, ни о финансах, только о «поиске взаимопонимания». Но и так слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается на спинку кресла. Разбой на дорогах случается чаще, чем хотелось бы, и если зацикливаться на каждом таком случае, те, кто ждёт промаха, неизбежно воспримут это как слабость. В конце концов, Акида решает:"
 zongo_dilemma.1.a: "Бросить солдат на защиту."
 zongo_dilemma.1.b: "Позволить совету разобраться самому."
 zongo_dilemma.1.c: "Положиться на королеву-мать."
 zongo_dilemma.1.d: "Выдвинуть железнодорожную полицию."
 zongo_dilemma.2.t: "Рабочие требуют прибавки" #Snow
 zongo_dilemma.2.desc: "На столе у короля лежит очередное донесение: рабочие грозят забастовкой, ссылаясь на якобы подорожавшие товары. Акида видит суть: им нужно выбить прибавку. Королева-мать уверяла, что цены под контролем, как и обещала, но стройка стоит, а такие задержки опасны. Если пустить всё на самотёк, недовольство только разрастётся. Акида перебирает варианты, глядя на список требований.\n\nМожно просто поднять зарплату. Пусть требования преувеличены, но стоит дать денег, и народ снова вернётся к работам. Правда, финансисты будут не в восторге: для них королевский бюджет уже давно расписан по монете.\n\nМожно не реагировать. Погрозят копытами, пошумят, но вряд ли кто-то рискнёт остаться без заработка надолго. Но такой подход чреват ещё большими проблемами: он продемонстрирует глухоту власти к требованиям простых рабочих, и до тех пор, пока вся смена не перебесится, нормальной работы не будет.\n\nЕсть ещё королева-мать. Она умеет гасить такие споры одним разговором: стоит ей появиться, и к вечеру бастующих не останется. Но и так слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается в кресле. Такие истории для Зонго не редкость: если каждый раз тормозить из-за подобных неурядиц, все быстро увидят, что власть не справляется. В конце концов, Акида решает:"
 zongo_dilemma.2.a: "Чуть-чуть повысить жалование."
 zongo_dilemma.2.b: "Не поддаваться на провокации."
 zongo_dilemma.2.c: "Положиться на королеву-мать."
 zongo_dilemma.3.t: "Тяжёлый грунт задерживает стройку" #Snow
 zongo_dilemma.3.desc: "На столе у короля лежит новое донесение: рабочие застряли в грунте, техника вязнет, стройка снова стоит. Пока не будет решения, дело с места не сдвинется. Он смотрит на ситуацию и перебирает в уме варианты.\n\nМожно просить совет увеличить количество рабочих – так быстрее разберутся с грунтом, но финансисты будут не в восторге: для них королевский бюджет уже давно расписан по монете.\n\nМожно оставить всё как есть: пусть копают нынешним составом. Да, это медленно, но рано или поздно грунт поддастся, и дорога пойдёт дальше.\n\nЕсть ещё королева-мать. Она умеет находить путь даже там, где все другие разводят копытами: стоит ей появиться, и дело сдвинется. Но и так уже слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается в кресле. Такие истории для Зонго не редкость: если каждый раз тормозить из-за подобных неурядиц, все быстро увидят, что власть не справляется. В конце концов, Акида решает:"
 zongo_dilemma.3.a: "Нанять дополнительных рабочих."
 zongo_dilemma.3.b: "Довольствоваться имеющейся рабочей силой."
 zongo_dilemma.3.c: "Положиться на королеву-мать."
 zongo_dilemma.4.t: "Поворот не туда" #Snow
 zongo_dilemma.4.desc: "На столе у короля лежит новое донесение: участок железной дороги уложили не по плану – рабочие ошиблись, да и за порядком особо никто не следил.\n\nКоролева-мать недавно выгнала нескольких коррумпированных бригадиров, но, похоже, новые подрядчики ещё не до конца освоились.\n\nАкиде остаётся только ждать, пока всё исправят."
 zongo_dilemma.4.a: "Да что ж такое!"
 zongo_dilemma.5.t: "Опоздание стройматериалов" #Snow
 zongo_dilemma.5.desc: "На столе у короля лежит новое донесение: из-за просрочки поставок стройматериалов работы на железной дороге опять задержались.\n\nКоролева-мать недавно расправилась с коррумпированными профсоюзными заправилами, но, похоже, новые подрядчики ещё не втянулись в дело как следует.\n\nАкиде остаётся только ждать, когда ситуацию выправят."
 zongo_dilemma.5.a: "Да что ж такое!"
 zongo_dilemma.6.t: "Задержка из-за тысячи мелочей" #Snow
 zongo_dilemma.6.desc: "На столе у короля лежит новое донесение: из-за цепочки мелких сбоев и случайных накладок вся стройка ощутимо выбилась из графика. Теперь ясно: задержка стала уже не случайностью, а цепью проблем, и без решительных шагов положение не изменить. Акида перебирает варианты, глядя на сводку.\n\nМожно выделить средства на сверхурочные. Это поможет вернуть стройку в нужное русло, но финансисты наверняка будут ворчать: королевский бюджет и так расписан по монете.\n\nМожно просто принять задержку, оформить перенос сроков – дорога появится позже, зато траты не вырастут, и рабочие будут работать в прежнем темпе.\n\nЕсть ещё королева-мать. Она умеет находить путь даже там, где все другие разводят копытами: стоит ей появиться, и дело сдвинется. Но и так уже слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается в кресле. Такие истории для Зонго не редкость: если каждый раз тормозить из-за подобных неурядиц, все быстро увидят, что власть не справляется. В конце концов, Акида решает:"
 zongo_dilemma.6.a: "Выделить премии за сверхурочные."
 zongo_dilemma.6.b: "Официально сдвинуть сроки."
 zongo_dilemma.6.c: "Положиться на королеву-мать."
 zongo_dilemma.7.t: "Дикая тварь мешает работе" #Snow
 zongo_dilemma.7.desc: "На столе у короля лежит новое донесение: на линии снабжения завёлся крупный зверь, который мешает подвозу припасов. Поймать его не удаётся, прогнать – тоже: из-за зверя простаивает вся дорога, и если не вмешаться, с каждым днём он будет наглеть всё сильнее. Акида перебирает варианты, глядя на схему участка.\n\nМожно нанять местного проводника. Для здешних такие твари – не редкость. Опытный ловец быстро прогонит зверя, не поднимая шума. Решение простое, но финансисты снова будут недовольны: королевский бюджет давно расписан по монете.\n\nЕсть ещё королева-мать. Она умеет решать подобные вопросы быстро и жёстко: стоит ей появиться, и от зверя не останется и следа, а работа тут же закипит. Но и так уже слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается на спинку кресла. Для Зонго такие напасти привычны: если стройка остановится из-за одной твари, все только и будут ждать, осилит ли король новое испытание. В конце концов, Акида решает:"
 zongo_dilemma.7.a: "Нанять проводника, чтобы отогнать зверя."
 zongo_dilemma.7.b: "Прогнать его бронепоездом."
 zongo_dilemma.7.c: "Положиться на королеву-мать."
 zongo_dilemma.8.t: "$ZOO_grand_railroad_project$: пропажа бюджетных средств" #Snow
 zongo_dilemma.8.desc: "На столе у короля лежит новое донесение: с участка железной дороги пропали деньги. Проверили все счета, и ясно одно: кто-то просто прикарманил часть бюджета. Пока вор не найден, вся стройка висит на волоске: бессмысленно строить планы, если золото утекает из казны. Акида перебирает варианты.\n\nМожно поручить расследование Анарбеку. Деньги не исчезают сами по себе: где-то должен остаться след, а он умеет разбирать такие схемы до последней монеты.\n\nЕсть ещё королева-мать. Она умеет решать подобные вопросы быстро и жёстко: стоит ей взяться за дело, и виновного найдут очень скоро. Но и так уже слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается на спинку кресла. Для Зонго такие напасти привычны: если замешкаться, вор только расправит крылья, а корона покажет слабость. В конце концов, Акида решает:"
 zongo_dilemma.8.a: "Поручить дело Анарбеку."
 zongo_dilemma.8.b: "Положиться на королеву-мать."
 zongo_dilemma.9.t: "Праздники тормозят стройку" #Snow
 zongo_dilemma.9.desc: "На столе у короля лежит новое донесение: рабочие дошли до поселения, где как раз шли праздники, и задержались, чтобы отметить вместе с местными, а заодно пригласили свои семьи. Королева-мать уже изучила вопрос и настаивает: пора возвращаться к работе. Но Акида не видит в этом беды.\n\nОн считает, что нет ничего страшного, если рабочие иногда устраивают себе передышку, тем более когда рядом родные. Акида лишь кивает в ответ:"
 zongo_dilemma.9.a: "Пусть веселятся, заслужили!"
 zongo_dilemma.10.t: "Рабочие грозят забастовкой" #Snow
 zongo_dilemma.10.desc: "На столе у короля лежит новое донесение: рабочие собираются остановить стройку, жалуются на условия труда и требуют прибавки. Королева-мать уже изучила ситуацию и уверена, что жалобы безосновательны: условия соответствуют королевским стандартам, а платят им честно. Но пока ультиматум остаётся без ответа, стройка находится под угрозой остановки. Акида должен сделать выбор.\n\nМожно пойти на уступки – немного добавить к жалованью или пообещать проверить уровень безопасности на стройке. Такой шаг, скорее всего, быстро уладит конфликт и позволит продолжить работу, даже если по сути поощрит хитрость.\n\nМожно сменить недовольных: привезти новых рабочих из других мест, чтобы вернуть стройку в прежнее русло. Но на набор и обучение уйдёт время, так что задержки неизбежны.\n\nЕсть ещё королева-мать. Она умеет гасить такие споры одним разговором: стоит ей появиться, и к вечеру бастующих не останется. Но и так уже слишком многое держится на её плечах – стоит ли снова полагаться на её силы?\n\nАкида откидывается в кресле. Такие истории для Зонго не редкость: если каждый раз тормозить из-за подобных неурядиц, все быстро увидят, что власть не справляется. В конце концов, Акида решает:"
 zongo_dilemma.10.a: "Пойти на уступки."
 zongo_dilemma.10.b: "Набрать новых рабочих."
 zongo_dilemma.10.c: "Положиться на королеву-мать."


 zongo_political.1.t:0 "Право монарха" #Snow
 zongo_political.1.desc:0 "Новая книга королевского права была почти завершена; однако одно положение всё ещё оставалось пустым – рамки королевской власти. Он мог бы просто оставить власть короны абсолютной и на этом закончить, но...\n\nВ кабинет вошла его мать, и её взгляд сразу упал на незавершённый документ, после чего она тяжело вздохнула. — Ты всё ещё колеблешься? После всего стресса, что принесла их автономия, ты хочешь вручить им прямо в копыта инструмент, чтобы узаконить всю эту нервотрёпку? — она склонилась над столом, возвышаясь над документом и королём. — Дать им право отменять твои приказы – значит вознаградить их неповиновение и добровольно ослабить себя. И ради чего? Проявление нерешительности сейчас лишь явит всем твою собственную доброту как слабость, — её взгляд не смягчился ни на мгновение. — Оставь последнее слово за собой и покажи всем, что власть короны абсолютна.\n\nВ её словах была логика – он не мог этого отрицать. Чёткая, неоспоримая власть позволила бы продвигать его план с куда меньшим числом проблем... и всё же это решение не находило у него отклика. Его правление началось недавно, уважение ещё не было заслужено. Акида правил лишь по праву крови. Закрепить такую власть одним из первых законов страны означало бы проявить глубокое неуважение к традициям власти, выставив себя господином, а не просто королём. Это лишь подпитает их страхи и ещё дальше отдалит от того взаимного доверия, которого он хотел добиться.\n\nАкида видел иной путь. Более трудный, возможно, его даже можно было назвать по-детски наивным. Если он закрепит право совета обжаловать и отменять его решения, это ясно покажет, что он не тиран и готов уважать их древнюю роль. Что он управляет, опираясь на закон, стоящий выше даже его собственной воли. Это станет мольбой о сотрудничестве... чего, как он надеялся, будет достаточно, чтобы зародить уважение.\n\nВ последний раз взглянув на мать, он взял перо и написал:"
 zongo_political.1.a:0 "Монарх не может быть непогрешим, первенство совета будет обеспечено."
 zongo_political.1.b:0 "Слово Мвенезонго закон, никто не выше его."
 zongo_political.2.t:0 "Чрезвычайное положение?" #Comma
 zongo_political.2.desc:0 "Мысли Акиды рисовали всевозможные картины смерти и разрушения – на случай, если что-то пойдёт не так. Зонго, делающий шаг в современный мир, легко мог увязнуть в трясине споров и нарушенных негласных соглашений. Никто не станет разбирать тонкости плана, когда их собственные маленькие мирки горят, жизнь в опасности. По крайней мере, так утверждала королева-мать – по её словам, она лишь указывала на противоречия королевского совета. Король, наделённый властью, но при этом связанный прихотями корыстной клики даже в условиях кризиса, способного уничтожить страну? Какая глупость!\n\nНо Акида был всего лишь одним жеребцом. Очень могущественным, конечно, и всё же кто он такой, чтобы перечёркивать мудрость старейшин (и не только своей матери)? Кто угодно может раздуть метафорический пожар и выставить его концом всего сущего. Занятия по новейшей истории несут в себе достаточно примеров тираний, возведённых на почве некоего воображаемого постоянного чрезвычайного положения. Если он сам когда-нибудь собьётся с пути, то Зонго, лишённый малейших тормозов, сойдёт с рельс... Совет же, по их словам, всегда будет рядом, чтобы указать королю, есть ли на самом деле проблема, требующая отчаянных мер.\n\nТак или иначе, посреди раздумий его охватило странное, тревожное чувство. Его дерзкий замысел должен был стать трамплином Зонго в будущее. И разумеется, в ходе таких радикальных изменений всегда оставался риск вляпаться во что-то, достойное стать чрезвычайным положением. Это была не гипотеза, а неизбежный факт, который ждал своего часа.\n\nРешение должно быть принято – станет ли король получать согласие королевского совета перед объявлением указа о чрезвычайном положении? Или же он обязан быть готов провозгласить его в час нужды, невзирая ни на какие препятствия?"
 zongo_political.2.a:0 "Королевский совет получит право."
 zongo_political.2.b:0 "Когда всё вокруг рушится, нет времени обсуждать и уговаривать каждого."
 zongo_political.3.t:0 "Приоритет на железных дорогах?" #Snow
 zongo_political.3.desc:0 "Когда Совет собрался, вопрос на повестке был прост: после разрешения на использование поездов для гражданских перевозок необходимо учитывать возможные ситуации, чтобы страна продолжала нормально функционировать. Итак, кто будет уступать право проезда на общей железнодорожной линии? Акида ждал, пока кто-нибудь выскажет свои доводы, и тут голос королевы-матери прорезал гул перешёптываний мани. — Это даже не стоит обсуждения. Грузовые линии – артерии нашего прогресса. Каждая минута простоя поезда с рудой или оборудованием – прямой отток средств из королевской казны. Гражданские перевозки – роскошь, промышленный же транспорт – это необходимость.\n\nПока мани хранили молчание, а Акида обдумывал её слова, тишину нарушил Анарбек, прочистив горло. — При всём уважении, Ваша Милость, данные говорят об ином, — он положил на стол отчёт. — Экономисты уже провели множество расчётов. Цифры показывают, что приоритет гражданских перевозок стимулирует местную торговлю, делает рабочую силу более мобильной и поощряет экономическое развитие вне крупных промышленных центров. Долгосрочный эффект от этих преимуществ значительно перевешивает предельную выгоду от повышения заводской эффективности за счёт беспрепятственного грузового движения. Промышленный транспорт важен, но куда легче учесть небольшую задержку оборудования, чем сотни тысяч задержанных пассажиров.\n\nВ зале Совета повисло напряжение, все ждали реакции королевы-матери. Когда она уже раскрыла рот, чтобы заговорить, со стороны короны послышался стук копыта по столу. Все взгляды мгновенно обратились к Акиде, который до этого молча слушал. — Совет был услышан, — произнёс он спокойно, но твёрдо. — Я принял решение:"
 zongo_political.3.a:0 "— Слова Анарбека имеют смысл. Гражданские поезда получат приоритет."
 zongo_political.3.b:0 "— Слова Нзузи верны, грузовые поезда будут в приоритете."
 zongo_political.4.t:0 "Биг айрон" #Comma
 zongo_political.4.desc:0 "Сама высота породила изоляцию, так появился шахтёрский посёлок Ньин, и для Педема разработка месторождений вдали от всего прочего мира стала своеобразной формой уединения. Вдали от центров государственной власти над ними поставили далеко не самых лучших или умных надзирателей. Он и его товарищи по вылазкам в холмы и горы при желании могли без труда одолеть типов, приставленных их охранять и заставлять работать на пределе сил. Крепкие камни и порода сломаются раньше, чем Ньин – в этом он был уверен.\n\n— Педем, разве нам сегодня не должны были прислать ещё рабочих? Тогда почему здесь другой поезд?\n\nСлова соседа по палатке заставили его кровь вскипеть. Любое нарушение привычного распорядка означало осложнения. Он рванул к единственной ниточке, связывавшей их с остальной цивилизацией, и там увидел нежеланного гостя.\n\nПушку длиной с ручей, на колёсах. Наведённую прямо на него. В темноте большого ствола он будто глядел в бездну.\n\nКогда он задал вопрос офицерам, те сказали, что это мера безопасности. Он не был дураком. Иными словами, это было "не делайте глупостей, иначе мы всех вас перестреляем и привезём более покладистых рабочих". Искушение было велико – сказать им, что нет, он не знает, что такое "революция", но прекрасно понимает, что означает это запретное слово. Слишком опасные знания. Это из-за его поведения? Из-за улыбки на лице и уверенной походки, с которой он каждый день шёл на работу, зная, что в случае чего есть иной выход? Кто донёс им это? Если вообще кто-то донёс?\n\nНо в конце концов и деревня, и её надсмотрщики увидели одну очевидную разницу."
 zongo_political.4.a:0 "Рабочие резко поскучнели."
 zongo_political.4_tt:0 "Забастовки станут на треть реже."
 zongo_political.5.t:0 "Издержки племенной системы"
 zongo_political.5.desc:0 "Был уже поздний вечер, а Акида так и не смог выбрать безболезненный курс действий в отношении мани. Он ещё не достиг чего-то глобального, чтобы вызвать уважение, поэтому всё ещё будучи "чужаком", король понимал, что мани требуют деликатного подхода. Если всё так и останется, его планы не достигнут чего-то весомого. Он вздохнул, в очередной раз перебирая свои записи. У каждого из мани были собственные цели и представления о будущем Зонго... и на первый взгляд лишь немногие из них хоть как-то совпадали с его собственными. Впрочем, если грамотно использовать их желания и соперничество, тогда, возможно...\n\n— Дорогой? — он едва не подпрыгнул, внезапно почувствовав копыто у себя на спине. Обернувшись, он увидел мать, уже облачённую в ночную сорочку. — Уже очень поздно, особенно для мвенезонго. Тебя что-то тревожит?\n\nОн потёр глаза, не в силах сдержать зевок. — Я пытаюсь найти способ удовлетворить всех мани. Честно говоря, не представляю, как тебе удавалось держать их всех под контролем после смерти отца. Это кажется невозможной задачей, — Акида начал собирать бумаги со стола. — Прости, если свет мешал тебе. Я пойду в свою комнату, чтобы сосредоточиться.\n\nКогда он снова повернулся к ней, мать лишь улыбнулась. — О, Акида. Ты пытаешься за одну ночь решить задачу, над которой я работала годами, — она мягко направила его к двери. — Иди и отдохни, дорогой. Утро вечера мудренее Позволь мне пока заняться мани, а со временем ты сам научишься понимать, как они мыслят, — он хотел было возразить, но она уже погасила свечу и вскоре закрыла дверь, задержавшись лишь на мгновение, чтобы быстро поцеловать его в щёку. — Спокойной ночи.\n\nОн почувствовал вспышку раздражения, но её тут же поглотила волна облегчения. Акида и не заметил, насколько сильно устал... и всё же он не спустит это на тормозах. Полагаться на других порой не порок, но до тех пор, пока он не покажет, что способен стоять на собственных копытах, ни мани, ни его мать не будут воспринимать короля как самостоятельного жеребца. Но сейчас он отдохнёт."
 zongo_political.5.a:0 "— И тебе спокойной ночи, мама."
 zongo_political.5_tt:0 "Методы королевы-матери по управлению нелояльными элементами опасны – умеренность может оказаться более мудрым решением.\nСледующие решения станут доступны в наших регионах."
 zongo_political.6.t: "Указ о мобилизации" #Snow
 zongo_political.6.desc: "Юго-восток всегда был на грани – тревожное место, где политика походила скорее на хождение по острию ножа. В Чисимби снова стреляют, вдоль Мейрконга распространяются мрачные слухи, и никто уже не решается назвать завтрашний день мирным. Совет собрали ради одной цели: понять, что делать, когда угроза становится слишком явной.\n\nКоролева-мать сразу развеяла любые иллюзии:\n— Мир не будет длиться вечно! — голос кобылы прошёлся по залу, оставляя после себя тишину. — Пока мы ждём, соседи точат на нас зубы, а армия всё ещё не готова к тому, что может случиться завтра. Тут нечего обсуждать – на кону само выживание Зонго. Решать будем сейчас: вся экономика Зонго должна быть мобилизована, и сделано это должно быть немедленно!\n\nВ её словах было зерно правды: готовность решает всё. Но...\n\n— Простите за дерзость, Ваше Величество, но это слишком большая цена! — вдруг поднялась Аяна. Все взгляды обернулись к ней. — Осторожность нам необходима, но не такой ценой, которая ломает судьбы каждой семьи. Мобилизация забирает отцов и матерей из домов, опустошает деревни, лишает поля рабочих копыт. Мы принесём народу годы тревоги и страха ещё до войны, если она вообще случится. Разве это выход? Мы можем слишком дорого заплатить.\n\nОна резко выдохнула, чуть склонилась в уважительном поклоне и села, а её слова повисли в воздухе.\n\nТишину разрезал чёткий, резковатый голос мани Зубы:\n— При всём уважении, наши войска не готовы к крупной войне, объявим мы мобилизацию или нет. Полная мобилизация, возможно, и была бы идеальным решением, но если мы на неё не решимся, прошу хотя бы увеличить финансирование и издать указы об укреплении приграничных районов.\n\nСовет вот-вот скатился бы в перебранку, но Акида не стал больше слушать. Он решительно ударил копытом по столу:\n— Мнение совета услышано, — он говорил тихо, но с такой уверенностью, что спорить уже никто не решился. — Решение принято:"
 zongo_political.6.a: "Ограничимся лишь дополнительным финансированием пограничных районов."
 zongo_political.6.b: "Экономика немедленно переводится на военные рельсы."
 zongo_political.7.t: "Встреча с жрицей" #Snow
 zongo_political.7.desc: "Акида пришёл в скромный храм Зупинамбы не случайно – встреча с главной жрицей была назначена заранее. Здесь, в тишине и простоте стен, всё выглядело совсем иначе, чем в нарядном храме столицы: никакой показной роскоши, только свет, немного пустоты и запах старого дерева. Он невольно задумался, зачем главная жрица держится за эту скромность? Вскоре она неспешно вошла, аккуратно неся поднос – движения уравновешенные, спокойные, совсем не такие, как в их первую встречу.\n\n— Простите за ожидание, мвенезонго. Надеюсь, обычный чай вам подойдёт.\n\nОна аккуратно поставила чашку рядом.\n— Вы писали мне о вере. Можете не волноваться: власть нас не интересует. Для нас главное – забота о нуждающихся.\n\n— Спасибо, вы всё правильно поняли, — ответил Акида, ощущая в копытах тёплую чашку. — Вера – это опора Зонго, то, что ведёт нас вперёд. Я хочу, чтобы она осталась этим светом: чтобы её не затянула суета политики, чтобы вера оставалась настоящей, Ая...\n\nОн запнулся и почувствовал, как по щекам прошёл жар.\n— Главная жрица...\n\nУлыбка Аяны стала мягче, а поза проще.\n— Можно просто Аяна. Так теплее.\n\nОна посмотрела ему прямо в глаза.\n— А теперь, раз формальности позади, может, просто поговорим?\n\nВнезапная искренность сбила Акиду с толку, а всё королевское в нём словно растворилось, осталось только лёгкое волнение и тепло на морде, которое так хотелось скрыть – хорошо, что в комнате царил полумрак.\n\n— Было бы очень приятно... Аяна, — выдохнул он, и это имя прозвучало так по-новому, что он чуть не улыбнулся.\n\nЧтобы не выдать волнения, король сделал нарочито долгий глоток чая.\n\nОни разговаривали до самого вечера. Только когда комната совсем потемнела, Акида опомнился, вскочил и стал спешно извиняться за задержку. Аяна проводила его до порога. Но, уже выходя в прохладу вечера, он поймал себя на странном ощущении, будто не готов уходить. Обернувшись, он увидел её в дверях и, прежде чем всё обдумал, спросил громче, чем собирался:\n\n— Мы можем ещё так встретиться?"
 zongo_political.7.a: "Дальше он уже ничего не замечал – только её улыбку, в которой утонул с головой."
 zongo_political.8.t: "Союз веры и короны" #Snow
 zongo_political.8.desc: "Парадный зал дворца наполнился движением и ожиданием: мани, нганга, придворные и гости столпились у большого стола, где Акида и верховная жрица Аяна ставили подписи под соглашением, которого добивались через долгие, непростые разговоры. Условия оказались ясны и честны: государство берёт на себя заботу о финансировании веры и уважении её устоев, а духовенство обещает поддерживать корону, не вмешиваясь в политику и занимаясь своей паствой. Когда последние подписи были поставлены, зал взорвался аплодисментами. Но вскоре формальность сменилась обычным весельем: музыка, танцы, шутки – как это бывает на всех больших праздниках.\n\nУже глубокой ночью, когда усталые музыканты брали передышку, Акида заметил Аяну у колонны. Она наблюдала за торжеством с лёгкой улыбкой, и в ней не осталось той строгой собранности, что была днём. Завидев его, Аяна первой подошла навстречу.\n\n— Ты будто пропал после подписания. Сколько копыт пришлось пожать ради короны?\n\n— Можно сказать, потерял счёт, — улыбнулся он. — Честно, не думал, что всё так затянется. В университете я обычно избегал балов, а теперь вот догоняю после коронации. Надо было больше тренироваться в Сентурии.\n\nОни оба рассмеялись, и на мгновение зал будто исчез: остались только музыка и их голоса. Они смотрели, как кружатся пары, и не спешили возвращаться к веселью. Когда зазвучала новая мелодия, Акида чуть смущённо протянул копыто:\n\n— В честь нового союза... не согласится ли верховная жрица подарить мвенезонго танец?\n\nЩёки Аяны чуть порозовели, но в глазах заиграли огоньки.\n— Кажется, в этот вечер ей было бы куда приятнее танцевать с Акидой, — ответила она и вложила своё копыто в его.\n\nОни вышли на середину зала: сперва осторожно, даже немного неловко, но с каждым тактом музыка уносила их всё дальше от суеты, оставляя только взгляды друг на друга и неторопливое покачивание в такт мелодии. Среди толпы, смеха и света никто, кажется, не заметил, как в эту ночь вера и корона по-настоящему стали союзниками."
 zongo_political.8.a: "Разделены, но едины."
 zongo_political.9.t: "Подписание конституции" #Snow
 zongo_political.9.desc: "В центре зала, на тяжёлом столе, лежали два предмета – лист чистой бумаги и увесистый том законов. Для всех собравшихся они уже давно перестали быть просто вещами: сегодня на бумаге рождалась новая судьба страны – первая собственная конституция Зонго.\n\nСначала свою подпись поставил мвенезонго, за ним – нганга, затем мани. Один за другим, под одобрительные взгляды, зебры заключали невидимый союз. Осталась только королева-мать. Она подошла последней, задержалась, перечитывая последние строки, и, встретившись взглядом с Акидой, чуть улыбнулась. Её росчерк завершил круг: теперь в Зонго официально появилась собственная конституция. В зале раздались аплодисменты, в которых слышалась тихая радость и облегчение. Церемония переросла в настоящий праздник.\n\nНемного погодя Акида и Аяна отошли к окну. Король почти что светился от радости:\n— Мы почти у цели. Ещё один шаг к тому, чтобы сделать Зонго по-настоящему современной страной. Не могу дождаться, когда...\n\nОн не успел договорить – в зал вбежал молодой слуга, задел Акиду, что-то пролепетал в извинениях и исчез в толпе.\n\nАяна нахмурилась:\n— Акида, ты видел? С ним точно всё в порядке? Он выглядел... совсем плохо.\n\nАкида поискал его взглядом, но зебра уже растворился среди гостей.\n— Просто волнуется, — махнул он копытом. — Уж такой сегодня день, никому не до покоя. Давай не будем...\n\nОн снова повернулся к Аяне, смягчив выражение.\n— Всё это – ради сегодняшнего дня.\n\nВ этот момент их перебил раскатистый, чуть захмелевший голос:\n— Ваше Величество! Какой день, в летописи войдёт! Скажите, а о династии подумали? Гляжу – невеста всё ещё не выбрана? А у меня, между прочим, несколько дочерей без пары, подумайте...\n\nАкида тут же смутился, словно вновь стал жеребёнком.\n— Я... то есть... не сейчас... — он беспомощно перевёл взгляд на Аяну, а та поспешно отвернулась, кашлянув. — Это разговор для другого дня. Но спасибо за заботу.\n\nОбернувшись, Акида увидел, что мани уже уходит, пошатываясь. Король выдохнул с облегчением: неловкий разговор миновал.\n\nМожно было бы сказать, что день удался. Закон подписан, страна едина, в зале витала тихая надежда. Сквозь окна лился тёплый свет заката – и казалось, что хотя бы сегодня в Зонго всё будет хорошо."
 zongo_political.9.a: "За конституцию!"
 zongo_political.10.t: "Беда пришла внезапно" #Snow
 zongo_political.10.desc: "Мгновение назад дворец жил радостью, казалось, впереди только свет. Всё рухнуло в один миг: резкий выстрел, пронзительная боль в боку. Время растянулось, звуки ушли куда-то вглубь, словно сам утонул в тёплой воде, накрывшей с головой. Перед глазами – Аяна. Её лицо мгновенно побелело от ужаса. Гости – сплошное пятно, их взгляды мечутся между ним и зеброй в одежде слуги, что держит дымящийся пистолет.\n\nАкида опустил взгляд: не сразу понял, почему жжёт, пока не увидел, как алая кровь растекается по праздничной одежде. Ноги подломились, пол встретил его холодом, всё вокруг стало размытым, далёким. Аяна кричит – губы складываются в его имя, но до него не доходит ни звук, ни слово, только звон и тяжесть.\n\nГде-то дальше, в зале, мать смотрела на всё с лицом, полным ярости. Стражники кинулись к убийце – очередной выстрел, потом ещё, и фигура в тёмном одеянии беззвучно оседает на мрамор. Гул, суета, гвардия рыщет по залу, но остальные зебры уже в безопасности.\n\nОн пытался не закрывать глаза, как будто мог ещё что-то изменить, сдержать подступающий холод. Только в одном месте ещё тепло: там Аяна крепко держит его копыто, и на его шкуру падают горячие слёзы. Так хочется сказать: всё будет хорошо, мы ещё посмеёмся, ведь сегодня праздник. Конституция уже принята, не время для слёз. Но нужные слова где-то теряются, а потом кто-то резко отталкивает Аяну.\n\nВ последний раз перед глазами – лицо матери. Во взоре видится уже не железо, а неприкрытый страх. Она что-то кричит, пытаясь удержать, но шум всё глуше, движения всё тяжелее. Он бы хотел утешить и её... но глаза уже не слушаются, веки налились тяжестью."
 zongo_political.10.a: "Вдруг всё померкло."
 zongo_political.11.t: "Король приходит в себя!" #Snow
 zongo_political.11.desc: "Мир вернулся к Акиде белым потолком и лицом матери, застывшей у самой кровати. Её копыто держало его так крепко, что было больно. Несколько долгих секунд она просто смотрела на него, дыша прерывисто, словно каждый вдох был всхлипом.\n\n— Мой Акида... — прошептала она, и в голосе было столько облегчения, что становилось тяжело даже слушать. Она осторожно убрала с его лба влажную прядь гривы – знакомый, родной жест. Но нежность быстро сменилась гневом, прямым и обжигающим.\n\n— Видишь? — прошипела она, стиснув зубы. — Вот к чему приводит твоя доброта и открытость! Пуля! За твои реформы тебя и убьют, Акида! Стоит только дать повод – и разорвут на части!\n\nВ её глазах застыл страх, смешанный с яростью. Она наклонилась ближе:\n— Прошу... — голос оборвался, превратившись в хрип. — Прошу тебя, мой умный, мой единственный... Остановись хотя бы на время! Наведи порядок, найди и покарай тех, кто посмел поднять на тебя копыто! Зонго должен увидеть твою силу! — она резко отстранилась, по щеке скользнула слеза. — Я не вынесу, если тебя не станет.\nНо Акида не отвёл взгляда и слабо накрыл её копыто своим.\n— Мама... прости, — выдохнул он едва слышно, но в глазах стояла твёрдость. — Королевство, где народ живёт по закону и верит в справедливость, не станет стрелять в своего короля. Всё это... только доказывает, что перемены нужны сильнее прежнего.\n\nОна опустила голову, тяжело выдохнув.\n— Конечно, сын... Как скажешь.\n\nПовисла тишина, затем мать резко поднялась и вышла из палаты. Акида устало вздохнул, оставаясь один. Он понимал её страх: увидеть сына на грани между жизнью и смертью в день, что должен был стать праздником... Он боялся того, что мать может совершить в таком отчаянии, но разве мог он винить её за это? Оставшись один, Акида надолго задумался о будущем."
 zongo_political.11.a: "Идею не убить пулей. Пусть путь будет долог и тяжёл, но дорогу осилит идущий."
 zongo_political.11.b: "Поручить матери найти виновных!"
 zongo_political.12.t: "Вспоминая войну с Зеблу"
 zongo_political.12.desc: "Итебра снова принадлежит Зонго. От Зеблу остались только память и шрамы, которые каждый несёт с той войны. На площади – церемония: не только в честь недавней победы, но и ради того, чтобы не забывать о той, прежней, войне, которая встретила Зонго в новом тысячелетии. Мани Зуба стоит перед строем: у кого-то – медали на потёртых мундирах, рядом – старые товарищи; в первом ряду – мани и королева-мать.\n\n— Многие достойные зебры отдали жизни в той войне, — начал он. — Король Нкоси вёл нас вперёд. Но беда пришла внезапно: его не стало, когда мы нуждались в нём больше всего. Я не раз стоял рядом с ним и видел, каким зверем он становился на поле боя: он умел беречь жизнь как можно большего числа наших воинов и при этом ни разу не был побеждён в поединке один на один. Он пал не от вражеской силы, а из-за предательства и трусости. Но теперь Итебра вернулась к нам, границы стоят крепко. Верю, что где бы ни был сейчас Нкоси, он спокоен: страна в безопасности.\n\nАплодисменты только начали стихать, а внутри у Зубы снова забурлило. Ему велели закончить речь словами о единстве и восстановлении. Но как король может так легко отмахнуться от всего, за что они бились и умирали? От наследия собственного отца?..\n\nПод взглядами толпы Зуба снова поднял голос, и тон его изменился:\n— Мы не вправе забывать цену, за которую вернули эту землю. И ещё – не вправе забывать..."
 zongo_political.12.a: "...Теперь мы все – дети Зонго, кем бы ни были раньше."
 zongo_political.12.b: "...Нам нельзя терять бдительность – враги никуда не исчезли."
 zongo_political.13.t: "Дома Имба-Зару" #Nap
 zongo_political.13.desc: "— За светлое будущее! — звон бокалов звучал нарочито весело, пытаясь заглушить непривычное напряжение. Представители пяти домов Имба-Зару обменивались церемонными улыбками и короткими поклонами послу Зонго. По всем правилам они должны бы хранить обиду на новых хозяев, но в зале и без слов было понятно: шестой дом приглашения не получил. Проигравших не спрашивают – теперь остаётся только учиться жить по-новому.\n\nДипломат из Зонго вёл переговоры с каждым домом до изнеможения, уговаривая принять условия, которые ещё недавно показались бы неприемлемыми. Теперь он улыбался, пусть и изрядно уставший:\n— Рад видеть, что в Имба-Зару хватает мудрых зебр. Королева-мать и король будут довольны вашим согласием. Мы все хотим только одного – чтобы в регионе воцарился порядок.\n\nГлавы домов кивали – кто с настоящим интересом, кто поневоле. Новое соглашение поднимало их до статуса местных мани, открывало двери к двору Зонго и сулило влияние, о котором раньше могли только мечтать. Формально теперь у них был над собой властитель, но истинная сила оставалась при них – шаг назад для вида, чтобы позже сделать два вперёд.\n\nМелкие детали ещё предстояло обсудить: этим займутся слуги и младшие советники. Пока же все обменивались тостами и вежливыми репликами, пытаясь найти повод завести знакомство с королевой-матерью. Она, казалось, понимала дворянские интересы не хуже их самих."
 zongo_political.13.a: "Дома будут трудиться на благо Зонго."
 zongo_political.14.t: "Переговоры с роамскими городами-государствами" #Ardent
 zongo_political.14.desc: "Условия, предложенные правителям Аркстури, казались до обидного справедливыми. Возможно, именно поэтому в зале заседаний царила такая глухая настороженность. За мутными окнами царил полуденный зной, воздух делался вязким и тяжёлым – никто из чиновников не спешил уступать, ни в подозрениях, ни в упрямстве.\n\n— Повторю ещё раз: условия, кажется, честные, — сказал один из чиновников и решительно опустил копыто на стол.\n\n— Даже слишком честные, — заметил другой, — вот это меня и тревожит.\n\nГлава города молча разглядывал бумаги, обдумывая каждую строчку. Почти всё оставалось по-прежнему: Аркстури вливался в новую систему, но ему обещали минимум контроля, а старым порядкам давали жить дальше. На первый взгляд всё выглядит хорошо – что тут может настораживать? Но где-то в этом и прятался подвох: за личные свободы придётся отдать привычные хитрости, отпустить старые уловки.\n\n— Рыба ищет, где глубже, а мы – где лучше, — сухо произнёс ещё один голос. — С победителями будет спокойнее.\n\nВ ответ по залу пробежал нервный смех – каждый понял: истина слишком проста, чтобы спорить.\n\n— Пусть будет так, — наконец сказал глава. — Аркстури примет эти условия и первым из городов встанет на сторону Зонго."
 zongo_political.14.a: "Позже они узнали, что чиновники Тисши согласились ещё неделю назад."
 zongo_political.15.t:0 "Помощь бывшим рабам" #Nap
 zongo_political.15.desc:0 "Это было странное чувство. Такое, которое могло проникнуть в сердце и разжечь огонь надежды в тех, у кого помимо неё уже ничего не осталось.\n\nРабы (будь то участники борьбы за своё освобождение или солдаты в войнах за объединение Чисимби) испытали немало страданий из-за бесконечных конфликтов, ведь их последствиями всегда были нищета, голод, болезни, отсутствие безопасности и многое другое. Именно поэтому, когда завоеватели объявили о решении покончить с циклом насилия, это потрясло бывших рабов до глубины души; а когда им стали предоставлять бесплатное жильё (пусть и самое простое) и продовольствие, они и вовсе растерялись, ведь всю жизнь считали, что недостойны такого обращения.\n\nВскоре к ним начали наведываться государственные чиновники: они проводили перепись, расспрашивали о возрасте, здоровье и навыках – якобы для того, чтобы подобрать им подходящую работу. Шрамы прошлого вытесали из этих существ скептиков, но даже самые недоверчивые из них не спешили отказываться от возможности начать новую жизнь.\n\nОпираясь на горький опыт прошлого, Зонго внедрял на завоёванных территориях программы поддержки бывших рабов. Это смягчало напряжение, вызванное сменой власти, и постепенно рождало тихое чувство общности между монархией и новыми подданными. А те, в свою очередь, завязывали дружеские и рабочие отношения с товарищами по судьбе.\n\nПусть новоосвобождённым ещё предстояло проделать немало работы и преодолеть неписанное число препятствий, сейчас, впервые за свою жизнь, они могли с надеждой смотреть в будущее."
 zongo_political.15.a:0 "— Имя "Акида" станет точно станет нарицательным!"
 zongo_political.15.b:0 "Да будет же благословлена королева-мать за свою доброту!"
 zongo_political.16.t:0 "Разделяй и властвуй" #Snow
 zongo_political.16.desc:0 "Обитель Зубы была местом, где можно было говорить откровенно, не опасаясь внезапного появления любопытных советников. По этой причине король и решил провести совет здесь – в личном приёмном зале Зубы, где, под стать царившей там атмосфере, стоял густой дым. В центре обсуждения были последние донесения из Зеблу, лежавшие на столе посреди комнаты.\n\nЕщё до своего поражения Зеблу было государством, которое удерживалось воедино лишь несколькими хрупкими нитями, но теперь, после свержения Шаки Хан, кланы неизбежно возобновят старые распри. Даже её собственный клан изжил себя и стремглав нёсся к забвению. Итебра по праву принадлежала Зонго, а поэтому населяющие её кланы наверняка подчиняться воле зонголезцев, и то же самое касалось Мзинги. Кисмэйнйо и Зарава были важными центральными регионами, а вот лежащие на окраинах Узунди и Зана – нет, и поэтому корона собиралась сфокусировать свои усилия на первых двух провинциях.\n\nПлан был до предела прост: мы благоволим кланам в Зараве и Кисмэйнйо, заручаясь их поддержкой, и под шумок лишаем любых привилегий Узунди и Зано.\n\nРазумеется, дело это небыстрое: в один месяц мы предложим привилегированному клану проложить к ним особые торговые пути, в другой – заключим прибыльную сделку, а через год – решим в его пользу какой-нибудь важный территориальный спор. Всё это будет выглядеть как естественное продолжение их древнего соперничества, пока в конце концов один не назовёт другого предателем, а тот в ответ – негодником, лишь укрепляя взаимную вражду. Как корка на свежей ране, эта междоусобица перекроет кислород их влиянию и обречёт кланы на гибель. Тогда им останется либо сгнить в собственной ненависти, либо покориться и стать истинными подданными Зонго.\n\nБольше всего такое развитие событий пугало самих мани, ибо оно доказывало, что несмотря на недостаток военного опыта, король мог обратить клинок традиций против них самих – и в его копытах это оружие становилось смертоносным. Было ли так задумано или нет, но таким образом Акида безмолвно сделал предупреждение всей окружавшей его знати. Теперь судьба Зеблу, словно старый больной шрам, будет напоминать о себе каждому мани. Даже Зуба почувствовал холодный восторг от этого изящного и расчётливого хода.\n\nИх давний враг канул в небытие; оставалось только не повторить его участь."
 zongo_political.16.a:0 "Слово, может, и не стрела, а разит сильнее оного."
 zongo_political.17.t:0 "Бесхозяйственность гиен" #Snow
 zongo_political.17.desc:0 "И без того длинный день Акиды грозился стать ещё более длинным из-за осадившей его мигрени.\n\nТа задача, над которой он ломал голову, казалась королю настолько мудрёной и необоримой, что не шла ни в какое сравнение с прежними испытаниями. Всё дело было в том, что прежний режим Твизаньики вообще не имел ни единого положительного качества: он буквально вобрал в себя худшее из Чисимби, не переняв у соседних стран ничего хорошего! Учитывая обнищавших граждан-зебр, порабощенных жирафов и совершенно отсталую олигархическую систему, было удивительно, как эта страна вообще дотянула до современности.\n\nКаждый раз, когда Акида и интеллигенция находили решение одной проблемы, на её месте, словно головы у гидры, тут же вырастали две новые: будь то влиятельные укоренившиеся семьи, переусложнённый бюрократический аппарат, аграрная экономика, впавшая в глубокую стагнацию, или, на худой конец, пираты, которые не только свободно хозяйничали на землях и в портах, но и были тесно связаны с местными элитами. Казалось, Твизаньику уже не спасти.\n\nК этому моменту корона всерьёз рассматривала лишь два варианта. Первый – сам по себе та ещё головная боль – заключался в том, чтобы начать сотрудничать с местными элитами и постепенно реформировать прогнившую систему. Второй – и наиболее простой – заключался в том, чтобы раз и навсегда избавиться от неё, ведь она погрязла в коррупции и была совершенно неэффективна; сохранение этой системы в каком бы то ни было виде просто откладывало возможные проблемы на потом.\n\nСейчас Акида всё больше склонялся ко второму варианту, но это означало открытый конфликт с местными элитами. Теперь ему предстояло решить, что станет большей проблемой: сама система или те, кто её поддерживает."
 zongo_political.17.a:0 "Возможно, если мы будем работать с элитами, то сможем модернизировать эту систему."
 zongo_political.17.b:0 "Всё в топку, *это* уже не спасти."
 zongo_political.18.t:0 "Совет матери-королевы" #Snow
 zongo_political.18.desc:0 "... и с каждым новым указом ты просто даёшь им в копыта очередной инструмент, которым они могут ослабить твою власть, — продолжала мать-королева. — Эти мани – не учёные, Акида, а просто упрямцы, меряющие власть подарками и благосклонностью, которые ты им расточаешь. Расположить их к себе логикой не удастся; их нужно сковать верностью, а если не выйдет – силой! Все эти совещания, что ты проводишь, лишь укрепят в их головах мысль, что это тебе нужно их разрешение на то, чтобы править.\n\nАкида смотрел на мать с беспокойством. Это она была той, кто попросила аудиенции, но он не ожидал, что у Нзузи накопилось столько хлёстких комментариев о его политике. — Мама, я слышу твои замечания, — сказал он, повернувшись к ней и почтительно кивнув, — и ценю твой опыт. Но совет – это инструмент, который гарантирует...\n\n— Инструмент не должен раздавать советы! — тут же вставила она и сделала шаг вперёд. В этот момент у неё на лице отразилась редкая вспышка ярости. — В твоей зависимости от них эти стервятники мигом увидят слабость. Они начнут считать, что их мнение важнее твоего. Ты должен укрепить свою власть, показать им, что монарх ни у кого не просит разрешений – он сам отдаёт приказы. Ты должен...\n\n— Мать.\n\nОна замолкла на полуслове, а её зрачки чуть расширились. Акида заметил, как что-то блеснуло у неё в глазах, и тут же пожалел о своём тоне: видимо то, как он перебил её, показалось ей слишком резким. — Прости, — сказал он, сделав голос чуть мягче. — Я не хотел тебя так обрывать. Я знаю, что ты говоришь из любви и многолетнего опыта правления, но... — он вздохнул, собравшись с силами, и уверенно посмотрел ей в глаза, демонстрируя решимость. — ... теперь правлю я, и я должен поступать так, как считаю нужным. Верь в меня. Это тот путь, которым должен идти Зонго.\n\nДолгие несколько секунд королева молчала, не выдавая ни единой эмоции, но Акида знал, что за этой королевской сдержанностью скрывалась буря эмоций, о которой он мог только догадываться. Через некоторое время Нзузи медленно кивнула и сверкнула своей фирменной улыбкой. — Да, конечно. В таком случае, с вашего позволения, я удалюсь, — она быстро встала и ушла, оставив Акиду наедине с самим собой. Она так быстро замыкалась в себе, когда ей перечили...\n\nКороль мог лишь надеяться, что однажды мать всё же поймёт, почему он решил делать всё по-своему – и никак иначе."
 zongo_political.18.a:0 "Путь уже избран – к худу это или к добру."
 zongo_political.19.t:0 "Вера в королеву-мать" #Snow
 zongo_political.19.desc:0 "В зале заседаний повисла тяжёлая тишина. В кратких обсуждениях участвуют лишь самые влиятельные фигуры, а остальные же просто тихо им поддакивают. Когда начинает выступать Акида, он живо и с энергией представляет собственную идею, а члены совета украдкой посматривают на королеву-мать. Она сдержанно улыбается и наблюдает за королём с тем выражением, с каким любящая мать смотрит на сына, увлечённо играющего в свои игрушки."
 zongo_political.19.a:0 "Совет исполняет любую прихоть сына королевы."
 zongo_political.20.t:0 "Вера в короля" #Snow
 zongo_political.20.desc:0 "В зале заседаний царит атмосфера продуктивной энергии: советники поднимают копыта, поочерёдно высказываются и свободно обсуждают насущные вопросы. Во главе стола сидит король Акида, внимательно слушающий каждого выступающего. Он кивает в знак понимания, задаёт уточняющие вопросы и мягко направляет обсуждение в нужное русло. И судя по тому, как на него смотрят советники, они уважают его.\n\nРядом с ним сидит королева-мать. Она наблюдает за ходом совета и, видя, как уверенно её сын ведёт это собрание, довольно улыбается."
 zongo_political.20.a:0 "Двор во всём подчиняется королю."
 zongo_political.21.t:0 "Последствия рыка Громового Тигра" #Ardent
 zongo_political.21.desc:0 "ДОНЕСЕНИЕ:\n\nКатастрофическое уничтожение Таларая в результате рыка Громового Тигра продолжает серьёзно затруднять восстановление и стабилизацию региона. Последствия трагедии усугубляются настроениями среди местного населения, которое, считая себя мучениками, упорно сохраняет культурную самобытность и повсеместно демонстрирует глубокое недовольство нашей администрацией.\n\nПомимо прочего, во время работы над восстановлением региона мы должны учитывать опасные последствия разрушения Золотого Города. Местные племена утверждают, что "осквернение священного места наложило на эти земли вечное проклятие", однако суеверия не могут быть единственной причиной, по которой наши рабочие, занимающиеся восстановительными работами, сталкиваются с частыми аномальными происшествиями вроде быстрого износа инструментов, внезапного появления зарослей на железнодорожных путях, бесследного исчезновения документов и прочего. При этом следов организованного повстанческого движения не обнаружено, что не позволяет установить виновных.\n\nВместе с тем полностью отвергать "проклятие" как фактор не следует: группы, работавшие на раскопках в руинах Золотого Города, жаловались на приступы тошноты, головокружения, острую тревожность, паранойю и другие симптомы. Теоретически ситуацию можно улучшить ужесточением стандартов подрядных работ, однако нельзя исключать, что рык Громового Тигра действительно мог наложить на местность магическую порчу.\n\nМасштаб бедствий остаётся неизвестен. По завершении анализа будет подготовлен полный отчёт о нарушениях, вызванных уничтожением города, а также предложены способы противодействия и адаптации к текущим условиям."
 zongo_political.21.a:0 "После доклада все копии этого отчёта, как и сам оригинал, таинственным образом исчезли."
 zongo_political.22.t:0 "Предложение, от которого невозможно отказаться" #Snow
 zongo_political.22.desc:0 "Мы получили коммюнике из Королевства Зонго с предложением о формализации союза между нашими нациями. Их правительство предельно чётко обозначило свою позицию: особый интерес у них вызывают наш флот и стратегическое расположение острова в качестве Перламутровых Врат Зебрики. В обмен на гарантированный доступ к проливу и взаимные гарантии независимости они предложили распространить свои планы модернизации и индустриализации на Самбовато. Проект будет полностью профинансирован их стороной; от нас ожидается лишь содействие для его бесперебойной реализации.\n\nИ хотя это предложение выглядит заманчиво (ведь таким образом мы не только разовьём собственную экономику, но и отвадим кентавров и гаргулий с их возможными экспансионистскими замашками), если мы напрямую свяжем нашу индустриализацию с прогрессом другой страны, то последствия могут быть очень серьёзными. [MQA.GetLeader] уже готовит ответ на это предложение."
 zongo_political.22.a:0 "В интересах общей выгоды мы принимаем это предложения!"
 zongo_political.22.b:0 "Говорите, от него "невозможно отказаться"? Ещё как возможно!"
 zongo_political.23.t:0 "[FROM.GetNameDefCap] принимает наше предложение" #Snow
 zongo_political.23.desc:0 "Мы получили долгожданный ответ от правительства Самбовато, и он знаменует собой крупную победу внешней политики Зонго. С заключением этого договора будущее наших держав становится неразрывно связанным. Гавани островного королевства предоставят нам значительные преимущества, включая доступ к дешёвому импорту их товаров, а также обеспечат помощь самбоватцев в строительстве собственного военного флота. В обмен инженеры Зонго уже готовы отправиться в Акорадриакарову, чтобы интегрировать Самбовато в нашу программу "Железные дороги и нация"."
 zongo_political.23.a:0 "В юго-восточной Зебрике формируется новый бастион."
 zongo_political.24.t:0 "[FROM.GetNameDefCap] отклоняет наше предложение" #Snow
 zongo_political.24.desc:0 "Мы получили долгожданный ответ от правительства Самбовато, и он знаменует собой крупную неудачу во внешней политике Зонго. Хотя никто не ожидал полного отказа от союза между нашими державами, Акида смирился с таким исходом и начал искать другие направления для внешнеполитического курса страны. Впрочем, не все в Зонго разделяют его сдержанность: многие мани выразили недовольство подобным развитием событий и уже начали разрабатывать планы по самостоятельному наращиванию военно-морского флота и возможному вторжению на остров.\n\nИ хотя Акида пока отвергает любую возможность интервенции, он отдаёт себе отчёт в том, что в будущем Самбовато и Зонго, возможно, всё же встретятся на поле боя."
 zongo_political.24.a:0 "На горизонте собираются тёмные тучи."
 zongo_political.25.t:0 "Бал в компании Сейды Ватосоа" #Snow
 zongo_political.25.desc:0 "Танцевальный зал сиял мягким светом бумажных фонарей и мерцающих в ночном небе звёзд. С террасы открывался прекрасный вид на море, чей шум сливался с нежным перебором струнных инструментов и оживлёнными голосами дипломатов, торговцев и знати, облачённых в изысканные шёлковые наряды. На самой террасе, возле кадочной пальмы, стоял король Акида, держа в копытах бокал слишком сладкого по его меркам напитка. Он уже обменялся со всеми посетителями необходимыми любезностями, молчаливо поучаствовал в трёх обсуждениях транспортных тарифов, кивая на все реплики собеседников, и, наконец, удалился в самый тихий угол, надеясь просто пережить остаток вечера. Увы, услышав цокот приближающихся копыт, он понял: его планам не суждено сбыться.\n\n— Ваше величество, — почтительно поклонился Акида, обращаясь к подошедшей королеве Сейде Ватосоа. — Приём восхитителен. Ваше гостеприимство просто... несравненно.\n\n— Несравненно! Да, так тоже можно выразиться, — усмехнулась Сейда и взяла бокал у прошедшего мимо них официанта. — Я заметила, что вы стоите у этой пальмы уже больше двадцати минут. Не спорю, растение прекрасное, но уверяю, в зале найдётся немало не менее приятных собеседников.\n\nАкида ощутил, как быстро загорелись его щеки. — Я просто... наслаждался видом. Меня впечатляет организация вашего порта. Мне кажется...\n\n— Давайте оставим этот разговор на завтра, а сегодняшний вечер посвятим знакомству. Я вот узнала, что вы, должно быть, большой ценитель растительности и не слишком любите светские беседы. — Акида собирался как-то оправдаться, но начал запинаться, словно ребёнок, и умолк, когда королева рассмеялась от его смущения. — Расслабьтесь, я шучу, — она сделала ещё один глоток и с лёгким удивлением посмотрела на опустевший бокал. — О, кажется, я пью слишком быстро. Что ж, я не хочу вас стеснять, но и не желаю, чтобы наш союз строился лишь на сухом расчёте. Мы с вами одного возраста, и мне было интересно встретить кого-то в похожей ситуации. Я надеялась, мы могли бы просто поговорить, не избегая друг друга, — а затем она подняла пустой бокал. — Ну, за прогресс?\n\nАкида слабо улыбнулся и повторил её жест, отбросив накопившуюся неловкость. — Да, за прогресс и... за деревья в горшках! — этот тост настолько удивил Сейду, что на мгновение она просто застыла, после чего тут же разразилась смехом." 
 zongo_political.25.a:0 "— Вот это другое дело! Пойдёмте возьмём нам чего-нибудь покрепче!"
 zongo_political.26.t:0 "Доверительное равновесие" #Snow
 zongo_political.26.desc:0 "Заседание совета проходит в уже привычном рабочем ритме: советники передают свитки, зачитывают отчёты и принимают решения без лишней демагогии. При необходимости другие члены совета также высказываются по конкретным вопросам, после чего заседание продолжается. Это очередной рабочий день, и государственный аппарат Зонго продолжает свою бесперебойную работу."
 zongo_political.26.a:0 "Мерный ритм госуправления."

 # Kirian Events
 zongo_kiria.1.t:0 "Как колосья под серпом" #Comma
 zongo_kiria.1.desc:0 "Арньяан и остальные члены делегации шли пешком уже несколько дней. В этих краях не было надёжных железных дорог, а бензин не рос на деревьях, так что им приходилось полагаться лишь на свои копыта. Это был путь во имя мира и дипломатии. Они направлялись в Кирию. В великую страну, находящуюся на недосягаемом (до недавнего времени) для Зонго уровне. С великаном, недавно пробудившимся после долгого сна, нужно было связаться и провести переговоры. Для Арньяана и его отряда зебр-путешественников это была цель всей жизни: заключить сделку с грозным потенциальным союзником.\n\nТрава внезапно зашевелилась. В зарослях стали проступать очертания, сгустились тени, зашуршали плащи. — Бандиты! — закричал Арньяан – или кто-то другой. За те три секунды, что потребовались ему, чтобы выхватить древний мушкет и выстрелить в незваных гостей, он так и не понял, кто кричал.\n\nИ кто в кого стрелял. На траву вокруг него безвольно падали тела его зебр.\n\n— Кто вы такие?! — осмелился крикнуть Арньяан, оставшийся последним из вышивших. Вокруг него сомкнулся круг палачей, укутанных в алые мантии. Изысканные ткани, шёлк и другие роскошные материалы... Это явно были кирины. На него были наставлены клинки, готовые сделать смертельный взмах. Никаких свидетелей.\n\nНо в этом и крылась ошибка. Магии не было. Рога не было видно.\n\nНесвоевременный кашель явил того, кто через секунду должен был оборвать его жизнь."
 zongo_kiria.1.a:0 "Проклятье."
 zongo_kiria.2.t:0 "Вести от посольства!" #Snow
 zongo_kiria.2.desc:0 "Настроение в совете было таким мрачным, что даже само солнце за окнами как будто померкло. Все молча слушали, пока мани Зуба зачитывал доклад.\n\n— Дипломатическая делегация, направлявшаяся в Кирию, была атакована, прежде чем успела достигнуть границы. Выживших... не было. Личности нападавших неизвестны, но на месте лагеря обнаружена выжженная земля. Улики указывают...\n\nКоролева-мать резко вскочила со своего места, нарушив тишину. — Не строй из себя наивного жеребёнка! — рявкнула она, её обычное спокойствие исчезло без следа, когда она в ярости ударила копытом по столу. — Делегация шла с миссией мира под знаменем Зонго! Кто ещё мог осмелиться на нападение, кроме безумных киринов?! Их истинная сущность всегда была очевидна; теперь же они просто действуют открыто, — она метнула пышущий гневом взгляд на Акиду. — Это открытый акт войны.\n\nАкида посмотрел на мать, но слова застряли у него в горле. Мани, нганга, интеллигенция – все они смотрели на него с тревогой и ожиданием. Он искал аргумент, путь к миру, хоть какой-то способ избежать чудовищного кровопролития... но потерпел неудачу. Король не мог показать слабость, когда пролилась кровь его подданных. Бремя выбора лежало только на нём.\n\nГлубоко вдохнув, он решительно произнёс слова, которых никто не хотел слышать. — Я объявляю голосование о введении в Зонго чрезвычайного положения, — когда его мать подняла копыто в знак одобрения, остальные зебры следом начали медленно поднимать свои. Взгляд Акиды скользнул к Аяне – она смотрела в пол. И хоть не все проголосовали "за", необходимое большинство было достигнуто. Акида заговорил, стараясь сохранять суровое выражение: — Да будет так. Совет распускается до дальнейших распоряжений, — и хотя никто не сказал этого вслух, все зебры понимали: Зонго стоял на пороге конфликта невообразимого масштаба. Акида нервно упёрся копытами в стол, пока совет расходился."
 zongo_kiria.2.a:0 "— Я должен действовать, пока не стало слишком поздно."
 zongo_kiria.3.t:0 "Долгожданное предложение" #Snow
 zongo_kiria.3.desc:0 "Акида попросил Аяну встретиться с ним в той самой тихой комнате, где они впервые заговорили. Обычно эти стены приносили им спокойствие, но теперь в них поселилась тяжесть надвигающейся войны. Аяна вошла и Акида сразу же заметил следы усталости на её лице, но кобыла, как всегда, мягко улыбнулась ему. Она сразу заметила напряжение монарха и устроилась рядом.\n\n— Последние дни были просто ужасны, — начала она усталым голосом. — Столько невинных душ погибло ради мира, которого они так и не увидели. Я говорила с... — она продолжила, рассказывая о планах и подготовке, но Акида почти не слышал её. Пока она говорила, тщательно отрепетированные слова покинули его. Казалось, между ними с каждой секундой тишины росла пропасть, и всё же он никак не мог заставить себя заговорить. Может, лучше ему...\n\n— Акида! — он резко вернулся в реальность и понял, что Аяна наклонилась совсем близко и её лицо оказалось всего в нескольких дюймах от его. — Ты будто оказался за тысячу миль отсюда, — она положила копыто на его копыто, а затем чуть отстранилась. — Несправедливо, что все только и ждут, будто ты должен справиться с этим один. Ты сильный, Акида. Сильнее любого, кого я знаю. Поэтому я прошу тебя – скажи, что у тебя на душе.\n\nЕсли для задуманного им и был подходящий момент, то настал именно он. Монарх крепко сжал её копыто и опустился на колени. — Я не знаю, что ждёт Зонго... или нас... когда начнётся эта война. Не знаю, переживём ли мы её. Поэтому... я... я просто не мог позволить себе потратить впустую хоть ещё один миг, — он глубоко вдохнул, сердце стучало так, будто готово вырваться из груди. — Аяна... ты выйдешь за меня? — пока в комнате висела тишина, и он с ожиданием смотрел в её глаза, Акида несколько смутился. — Это... наверное было столь же неожиданно, как когда я рассказал тебе, кто я?\n\nНесколько долгих секунд Аяна стояла неподвижно, широко раскрыв глаза, глядя на склонившегося перед ней короля. Затем из её груди вырвался звук – нечто среднее между всхлипом и вздохом, – и зебра бросилась вперёд, заключив его в крепкие объятия."
 zongo_kiria.3.a:0 "Даже в худшие времена есть место для любви."
 zongo_kiria.4.t:0 "И снова в бой" #Snow
 zongo_kiria.4.desc:0 "Стратегии были подготовлены, королевская стража – мобилизована, так что Зонго вновь вышел на тропу войны. Воздух в зале совета пропитался запахом чернил, пота и тревоги. Когда члены совета разошлись, Акида ещё долго сидел неподвижно, ощущая, как тяжесть войны ложится на его спину непосильным, почти физически ощущаемым грузом. Он поймал себя на том, что идёт к ближайшему балкону, чтобы просто взглянуть на город. Зонго заполонили бесчисленные заводы и фабрики... но неужели единственной целью его плана было лишь создание инструментов для встречи неизбежного?\n\nМягкий стук копыт возвестил о чьём-то приближении. Акида обернулся к двери, и знакомое лицо немного успокоило короля. — Так и думал, что найду тебя здесь, — голос Анарбека прорезал тишину. Он встал рядом с Акидой, глядя на город. — Отправлять своих подданных на войну никогда не станет легче.\n\nАкида медленно выдохнул, но дыхание дрогнуло. — Все планы ради мира... привели в тупик, как и говорила моя мать, — король покачал головой, и в его глазах читалась покорность воле судьбы. — Она осознала правду раньше всех нас. Этот конфликт был неизбежен с того момента, как посольство было перебито.\n\n— Проницательность королевы-матери... — в осанке Анарбека что-то едва заметно изменилось. — Она и правда оказалась поразительной. Жаль лишь, что подобная ясность приходит слишком поздно, — он успокаивающе положил руку на плечо Акиды. — Но мы следуем за королём, который чувствует тяжесть своих решений и боль своих подданных. Не забывай этого. Ты – мвенезонго... и мы все сражаемся за тебя.\n\nАкида кивнул, черпая силы в присутствии своего наставника, пока они вдвоём смотрели на город, не подозревая, как глубоко его слова укоренились в мыслях Анарбека. Но времени на размышления больше не осталось, настал час встретить их последний вызов."
 zongo_kiria.4.a:0 "Жребий брошен; Зонго идёт на войну."
 zongo_kiria.5.t:0 "Договор Мейрконга" #Snow
 zongo_kiria.5.desc:0 "Угроза со стороны киринов была окончательно устранена, так что заседания по решению судьбы оккупированных земель шли день за днём. Акида решил сделать перерыв, оставив матери разбираться с деталями. Он не беспокоился за неё, зная, что она справится ничуть не хуже даже в его отсутствие. Когда он вышел в коридор, то впервые за многие месяцы испытал лёгкое чувство свободы. И тут зебра заметил знакомую фигуру вдалеке.\n\n— Анарбек! — окликнул он, чтобы привлечь внимание. — Мы сделали это! Война выиграна, и мы наконец можем снова отдохнуть. Честно говоря, теперь, когда всё закончилось, я чувствую себя странно: как будто всё это нереально, — на лице монарха появилась искренняя, почти жеребячья улыбка. — Забавно, что я волнуюсь из-за вопроса, на который уже знаю ответ!\n\nАкида рассмеялся, но смех угас, когда он заметил, что выражение Анарбека было напряжённым, а по виску стекала капля пота. Привычное тепло в его глазах исчезло, уступив место мрачной сосредоточенности. — Акида... нам нужно поговорить. Дело касается твоей матери, — сказал Анарбек, делая шаг вперёд. — Когда началась война, я начал собственное расследование кое-каких... неприглядных слухов, которые слышал за время службы здесь. Тебе будет проще, если ты увидишь всё сам.\n\nКентавр передал Акиде папку, которая, несмотря на скромный размер, казалась тяжелее всей его библиотеки. Пока монарх её листал, лицо зебры за считанные секунды сменило десятки эмоций. Он отступил на полшага, прижав копыто к груди, словно получив удар.\n\n— Я... я должен идти, — выдавил Акида, голос звучал пусто. Он развернулся и быстро пошёл прочь, почти переходя на бег, не обращая внимания, как Анарбек зовёт его. Кентавр мог лишь надеяться, что его друг не совершит ничего необдуманного."
 zongo_kiria.5.a:0 "Мир... достигнут?"
 zongo_kiria.6.t:0 "Откровение" #Snow
 zongo_kiria.6.desc:0 "Просьба Акиды о встрече была странной: записка написана явно в крайней спешке, поскольку по бумаге расползлись кляксы. Когда Аяна нашла Акиду в их комнате для встреч, она едва узнала его. Жрица бросилась к нему, а он поднял на неё усталый, почти что мёртвый взгляд.\n\n— Аяна, — начал он хриплым голосом. — Мне нужно тебе кое-что сказать. Что-то... я... — король запнулся, но когда слова всё же сорвались с его губ, они хлынули потоком: расследование Анарбека, собранное им досье, рассказы о его собственном отце, о старой верховной жрице Зонго, о прежних мани... все смерти вели к одному существу. Преступление за преступлением, жизнь за жизнью – и всё это сходилось на той, на кого он опирался всё своё правление. Его голос задрожал, а самообладание окончательно рухнуло. — Всё это время... моя собственная мать...\n\nАяна стояла в оцепенении, прижав копыта ко рту, пока холодный ужас сковывал её. В голове вспыхнули образы Налы – кобылы, что приютила её, когда у неё никого не было; счастливые дни, что они провели вместе; глубокая скорбь после её смерти; тяжесть титула, которого она никогда не желала... Но, взглянув на Акиду, она увидела, как он дрожит и готов вот-вот расплакаться, и это вырвало её из пучины собственных мыслей. Она была не единственной, кто страдал: они оба стали жертвами Нзузи.\n\n— Аяна, — тихо сказал Акида, беря её за копыта. — Спасибо. За то, что выслушала. За то, что просто... была рядом, — он долго смотрел ей в глаза. — Я самый счастливый жеребец на свете, раз ты со мной, — она взглянула на него с тревогой, но затем позволила себе расслабиться и улыбнуться, когда они обнялись. Однако Аяна так и не увидела, как лицо Акиды приняло выражение непреклонной решимости."
 zongo_kiria.6.a:0 "Пора повзрослеть – раз и навсегда."
 zongo_kiria.7.t:0 "Столкновение" #Snow
 zongo_kiria.7.desc:0 "Было объявлено экстренное заседание совета, однако зал казался неестественно пустым. Места нганги и интеллигенции были вакантны, присутствовали лишь мани да застывшие во главе стола Акида и его мать. Взгляд короля был прикован к родительнице, но он не позволял себе проявить ни тени эмоций. — У меня к тебе лишь один вопрос... почему?\n\nПо собравшимся мани пробежала волна тревоги, они начали перешёптываться. Глаза Нзузи расширились от потрясения. — Акида! Ты в порядке? Говоришь какую-то бессмыслицу, — она протянула к нему копыто. — Возможно, нам стоит обсудить это наедине...\n\n— Время для частных разговоров прошло, — голос Акиды стал куда громче, когда он поднялся. — Впервые в жизни скажи правду! — он сделал шаг к матери. — Ты всегда говоришь о любви, но твои поступки берут исток явно не в ней! Я услышу правду от тебя. Сейчас же. Говори!\n\n— Ты не в себе... — ответила Нзузи, отступив назад. — За тебя говорит горе войны. Прошу тебя, сын мой, умоляю – не верь тем лживым словам, что тебе нашептали! — пока мать и сын смотрели друг другу в глаза, мани застыли, словно окаменев: прямо у них на глазах бежала трещина между столпами государства. Акида сделал ещё шаг вперёд, и мать вновь отступила.\n\n— Он был моим отцом! Твоим мужем! НАШИМ КОРОЛЁМ! — наконец взревел король, и слова его отозвались эхом под сводами зала. Его взгляд на миг опустился, копыто сжалось. — ...ты хоть каплю раскаяния чувствуешь? — он вновь напрягся, когда мать отвела взгляд. — Ты не оставляешь мне выбора. Стража, взять её! Арестовать Нзузи по обвинению в государственной измене и убийстве!"
 zongo_kiria.7.a:0 "На одно короткое мгновение в зале воцарилась оглушительная тишина."
 zongo_kiria.8.t:0 "Поражение короля" #Snow
 zongo_kiria.8.desc:0 "Когда Акида выкрикнул приказ арестовать свою мать, он ожидал, что стража без колебаний подчинится, а мани поддержат его решение. Но реальность оказалась совсем иной. Стражники у дверей стояли неподвижно, словно статуи, а мани лишь отводили взгляды. Он вновь закричал: — Живо! Это приказ! ВПЕРЁД! — но его слова будто затухали в пустоте.\n\nМать на мгновение опустила глаза, затем подняла голову и встретилась с ним взглядом. Она смотрела не со страхом или гневом, а с... жалостью. Королева-мать подняла копыта к его лицу и мягко провела ими. — Ох, мой бедный Акида... я ожидала от тебя большего, — холодок пробежал по его спине: её слова звучали как упрёк матери, отчитывающей жеребёнка. — Тебе стоит подумать о том, как другие видят твои действия. Ты умный жеребец, я знаю... поэтому ты поймёшь, почему я должна это сделать.\n\nВ одно мгновение Акида оказался окружён стражей – своими собственными гвардейцами, которые ослушались приказа монарха. — Ч-что вы делаете?! Отпустите меня! Я – мвенезонго! ОТПУСТИТЕ! — он бился и кричал, а его мать лишь спокойно наблюдала, пока его волокли прочь под яростные проклятия.\n\nКогда двери захлопнулись, Нзузи тяжело вздохнула. — Когда-нибудь он поймёт... А теперь вернёмся к вам, — её взгляд пал на мани, и от материнской мягкости не осталось ни следа: глаза вспыхнули яростью. — Думаю, всем ясно, что мвенезонго не в состоянии здраво мыслить после войны. Во имя защиты короны Совет приступает к голосованию о восстановлении регентства и наделению Нзузи Бомбоко чрезвычайными полномочиями до тех пор, пока Акида Бомбоко не будет вновь готов вернуться на трон! — мани тихо зашептались, но, заметив ледяной взгляд Нзузи, один за другим начали поднимать копыта в знак согласия. Нзузи кратко улыбнулась."
 zongo_kiria.8.a:0 "— Хорошо."
 zongo_kiria.9.t:0 "Невообразимая трагедия" #Snow
 zongo_kiria.9.desc:0 "В зале воцарился хаос. Король кричал, его мать умоляла, мани пребывали в полном замешательстве. Зуба же видел перед собой воплощение той слабости, что разъедала Зонго со смерти Нкоси. Это был окончательный, жалкий конец династии Бомбоко: наследие, за которое Нкоси проливал кровь, теперь рвалось на части его собственной семьёй. Зуба понял: долгожданный момент настал.\n\nОн поднялся, а его голос заглушил шум. — Род Бомбоко окончательно выродился! Стража, разберитесь с ними обоими! — на мгновение наступила тишина, и все головы повернулись к нему. А затем Зуба увидел, как его план начал оживать. Верный стражник действовал без колебаний: раздался выстрел, и первая пуля полетела прямо в сердце Нзузи. Наконец-то она заплатит за то, что развратила их дом! Наконец-то она встретит возмездие за все угрозы и интриги... но пуля так и не достигла цели. За мгновение до этого король оттолкнул мать в сторону и принял удар на себя. Он рухнул на пол, словно кукла с перерезанными нитями.\n\n"Почему?" — эта мысль заставила Зубу застыть. — "Почему он пожертвовал собой ради этой змеи?" — да, самого Акиду вскоре бы устранили, но видеть, как король в последний миг пытается защитить кобылу, которую приказал арестовать всего мгновение назад, было... необъяснимо. Ещё больше его поразило то, что сделала Нзузи. Она позабыла всю свою привычную хитрость и холодность... и вместо этого отчаянно закричала.\n\n— АКИДА! АКИДА! ПОЖАЛУЙСТА, ПОЖАЛУЙСТА, КТО-НИБУДЬ, ПОМОГИТЕ МОЕМУ ЖЕРЕБЁНКУ! — Зуба безучастно смотрел, как Нзузи прижимает сына к себе, а его кровь пропитывает её роскошные одежды. Она трясла его, но безрезультатно. — ПОМОГИТЕ ЕМУ! АКИДА, ПОЖАЛУЙСТА, ОЧНИСЬ! — кобыла кричала и рыдала, а король лежал неподвижно. Ничего – скоро они воссоединятся...\n\nИ тут тяжесть нескольких тел, швырнувших его на стол, прервала рассуждения. — Идиоты! Отпустите меня! Это приказ! — но мани навалились на него с невиданной прежде яростью. Зуба ревел, пытаясь вырваться из-под навалившихся тел. Но, подняв взгляд, жеребец увидел, что его верного стражника аналогично прижали к полу его же товарищи. Ах... значит, вот как всё кончается."
 zongo_kiria.9.a:0 "После удара по голове последний истинный лоялист Зонго потерял сознание."
 zongo_kiria.10.t:0 "Арест королевы-матери" #Snow
 zongo_kiria.10.desc:0 "На один-единственный удар сердца, растянувшийся в вечность, зал совета застыл. Стража двинулась к королеве-матери лишь через несколько секунд. Она посмотрела на мани, но увидела лишь их твёрдые, преисполненные гордости взгляды. Будто заклятье спало: никто не встал на её защиту; и восприняла она это крайне плохо.\n\n— Трусливые твари! Как вы смеете предавать меня?! — прорычала она. — Я знаю, насколько вы ничтожны! — когда стражники схватили её, раздражение сменила ярость. Она брыкалась и лягалась, но силы, чтобы подкрепить гнев, ей не хватало. Она метнула взгляд на Акиду – но в её глазах не было ни капли любви, лишь чистая, неразбавленная ненависть. — Как ты смеешь делать это с собственной матерью?! Ты совсем стыд потерял?! Зонго рухнет без моего лидерства! — и когда её тащили к дверям, она выкрикнула последнее, самое ядовитое обвинение. — Если бы я знала, что ты окажешься вдвое большим неудачником, чем твой отец, я бы никогда с ним не связалась!\n\nДверь захлопнулась. Акида стоял неподвижно, удерживая бурю эмоций, готовую вот-вот прорваться сквозь маску спокойствия. Он глубоко вдохнул и повернулся к мани. — Наше истинное дело начинается сегодня. И мне нужен каждый из вас, чтобы довести его до конца.\n\nЕщё миг – и тишина сменилась движением: один мани поднялся, затем за ним последовал другой, и вскоре весь зал взорвался оглушительными овациями, каких тут прежде ещё не звучало. Копыта грохотали по полу, голоса сливались в единый крик, повторяя его имя. — Да здравствует король Акида! Да здравствует Зонго! — монарх поднял копыто, принимая их приветствие, и поток эмоций захлестнул его. В их улыбающихся лицах он видел то уважение, которого прежде не было: они видели в нём не просто сына своей матери и не жеребца, которого обязаны слушаться. Это больше не была вынужденная покорность – это было истинное признание Акиды Бомбоко своим законным правителем."
 zongo_kiria.10.a:0 "Начиналась новая эпоха и новые испытания – но все они принадлежали только ему."

 zongo_kiria.100.t:0 "Возвращение к централизованному планированию" #Snow
 zongo_kiria.100.desc:0 "Хотя упрощение правил строительства железных дорог во время войны значительно ускорило их возведение, эти послабления теперь угрожают долгосрочной целостности программы "Железные дороги и нация". Вынужденное распределение и без того перегруженных ресурсов программы между разрозненными военными проектами грозит полным крахом в самое ближайшее время.\n\nЧтобы восстановить прежний фокус на одной линии и обеспечить сохранение программы, строительство любых железных дорог вне её рамок отменяется. С этого момента мы возвращаемся к строгому режиму централизованного планирования и распределения бюджета. Остаётся лишь надеяться, что это не станет препятствием для уже начатых работ."
 zongo_kiria.100.a:0 "Возвращаемся на привычный курс."
 

 # King Epilogue Events
 zongo_king_epilogue.1.t:0 "Преступления королевы-матери" #Snow
 zongo_king_epilogue.1.desc:0 "Стопка пергаментов на столе Акиды возвышалась памятником его собственной слепоте. Мать была взята под стражу, а король пообещал помилование за предоставленную информацию, так что он пригласил совет всех, кого она обвиняла в соучастии, выступить с показаниями. Он ожидал даже более ужасных вещей, но всё же масштаб явившегося на свет заставил даже папку, собранную Анарбеком, казаться ничтожной.\n\nАкида взял верхний лист, просто чтобы с чего-то начать. В нём описывалось "случайное" отравление бывшего мани Зовандо во время пира. Он внимательно прочитал документ и отложил его. Следующая страница рассказывала об "исчезновении" бригады рабочих, протестовавшей ради улучшения условий труда. Акида положил её рядом с предыдущей, но чем больше он читал, тем отчётливее перед ним раскрывалась совершенно иная кобыла, ничуть на похожая на его мать: подделанные улики, принудительно замолчавшие свидетели, и репутация, внушавшая абсолютный страх одним лишь намёком на её гнев.\n\nЗатем он наткнулся на свидетельство, от которого кровь отхлынула от его лица. Его написал один из мани, сражавшихся рядом с его отцом.\n\n"Хотя официальная версия утверждает, что король Нкоси пал в бою, это случилось после того, как он отправился на встречу с посланником Нзузи. На тот самый сектор лагеря, где должна была состояться встреча, внезапно напал противник, это никак не могло быть совпадением. Всем в лагере было ясно, что на самом деле произошло, это..." Акида скомкал пергамент и со всей силой швырнул его в стену.\n\nЕму хотелось что-нибудь пнуть, разорвать всю эту кипу, просто стереть случившееся! Он уже знал многое из расследования Анарбека, но в голове засел один вопрос: как всё это скрывали от него... сколько знала Аяна? Сколько в их любви было правдой, а сколько – ложью?! Сколько...\n\nОн прикусил губу, пытаясь успокоить чувства. Не было смысла сомневаться в самых близких или прятаться от проблем, словно жеребёнок; так он лишь загонит себя в могилу раньше времени. Акида опустил голову на копыта, сделал долгий вдох и заставил себя собраться, чтобы исполнить свой долг."
 zongo_king_epilogue.1.a:0 "Он был наивен, но получил шанс исправить ошибки."
 zongo_king_epilogue.2.t:0 "Алая экономика" #Snow
 zongo_king_epilogue.2.desc:0 "Вновь собрались союзники Акиды из числа интеллигенции. На этот раз их обсуждения строились не на теориях, а на чётких данных, собранных на основе успехов и провалов его плана. Акида чувствовал нервное напряжение, пока Анарбек готовился представить результаты. — Дела... плохи, Ваше Величество, — начал он, и на его лице ясно читалась тревога. — Мы обнаружили повсеместную коррупцию на всех уровнях госслужбы. Инфляция бьёт рекорды. Экономика Зонго может выглядеть сильной со стороны, но...\n\n— Она рухнет под собственным весом, — гиена перебила Анарбека, заработав резкий взгляд от кентавра. По кивку Акиды ей позволили продолжить. — Тысячи уже живут в нищете, потому что государственные институты не в силах их защитить; скоро счёт пострадавшим пойдёт на миллионы. Казна может казаться полной, но экономика неизбежно застынет в стагнации в ближайшие десятилетия... если мы, конечно, не начнём действовать. Но именно для этого мы здесь, верно?\n\nЛицо Акиды на мгновение помрачнело, прежде чем он собрался с духом и встретил взгляд гиены. — Вы пытались меня предупредить. Все вы, — он говорил с явно слышимой болью. — Я был слишком горд, чтобы слушать. Так ослеплён своим Магнум опус, столь уверен в собственных идеях, что не заметил гнилого фундамента, на котором они стояли, — король склонил голову, что вызвало удивление у всех присутствующих. — Моя гордыня и наивность привели к этому. Я искренне прошу прощения!\n\nАкида поднял голову вновь, и в его глазах засветилась новая решимость. — Прошлое изменить нельзя, зато можно сформировать будущее. Мы введём меры против коррупции, окажем целевую помощь беднейшим провинциям и сократим масштаб плана, сосредоточившись на устойчивости! — он запнулся, чуть не забыв сказать важное дополнение. — И, конечно, вы все вольны предложить любые идеи, какие сочтёте нужными. Мы вместе возродим нашу страну, — под ободряющую улыбку Анарбека эксперты вскоре принялись за работу. Ведь это то, что они умели лучше всего."
 zongo_king_epilogue.2.a:0 "Если работу отклоняют, то её дорабатывают, пока она не станет достойной."
 zongo_king_epilogue.3.t:0 "Трибунал над армией и полицией" #Ardent
 zongo_king_epilogue.3.desc:0 "Это было неправильно. Всё это было совершенно неправильно. И всё же Зезу сидел здесь, исполняя приказы короны Зонго, как и подобало верному мани. Его глаза горели презрением, мышцы сводило от праведного гнева, но, с горечью подавляя ярость, он вновь и вновь звучно обрушивал печать на бумаги. Глухой удар прокатился по кабинету, и Зезу небрежно отбросил досье в ящик на краю стола. Зелёные чернила, являвшие миру слово "ПОМИЛОВАН", уже успели высохнуть в ночном воздухе.\n\nЗезу скривился. Он знал каждое из этих имён. Это были не безвластные мани, слепо исполнявшие приказы королевы-матери. Это были зебры, целиком и полностью заслуживавшие наказания за совершённые преступления, коррупцию и отвратительные злоупотребления властью... вот только вместо этого они получают помилование, поскольку король пожелал этого "ради стабильности королевства". Множество мерзких поступков, бесчисленные разрушенные судьбы... и всё это так легко прощается и сметается под ковёр.\n\nОн снова поставил печать. Помиловали не всех мани, но абсолютное большинство. Критерии вины были настолько узкими, что трибуналы почти не могли никого осудить. Неважно, сколько они злоупотребляли властью. Без разницы, какими привилегиями пользовались. Неважно, насколько отвратительно обращались со своими подчинёнными. Эти мани действовали по воле королевы-матери – той самой воле, которой он сам когда-то сумел воспротивиться! Его взгляд сузился, упав на ящик с досье тех, кого ему приказали помиловать. Где-то там лежало дело мани Зубы, фельдмаршала, уже отмеченное штампом "ПОМИЛОВАН".\n\nЗдесь не было и тени справедливости. Лишь наивное предположение, что каждый мани – бедный, запуганный зебра. Но мани, лидер народа, должен отвечать куда строже за свои преступления или бездействие. Но нет, королевство Зонго внезапно решило продемонстрировать моральное превосходство... стоя на пьедестале, воздвигнутом на страданиях и несправедливости.\n\nРазнёсся ещё один глухой удар от печати Зезу. За ним последовал другой, третий и так продолжалось до самого рассвета."
 zongo_king_epilogue.3.a:0 "Милосердие к виновным – жестокость к невинным."
 zongo_king_epilogue.4.t:0 "Формулируя решение" #Snow
 zongo_king_epilogue.4.desc:0 "Зал совета был полон. Акида стоял во главе стола, а множество знакомых лиц с ожиданием смотрело на него. Прошедшие недели были напряжёнными: предыдущие заседания и работа по раскрытию масштабов преступлений его матери оказались долгими и изматывающими, но прежде чем они действительно могли приступить к восстановлению, нужно было провести ещё одну встречу.\n\nАкида принёс с собой стопку бумаг, но пока не раскрывал их содержания. Когда он жестом пригласил кого-нибудь подойти, первым шагнул Зуба. Но когда жеребец поближе взглянул на документы, то удивлённо раскрыл рот. — Они... пустые? — произнёс он. В комнате поднялся ропот, но смех Акиды мгновенно его пресёк.\n\n— Это и есть мой план, который вернёт нас на верный путь, — объявил он. — За весьма короткое пребывание на троне я совершил две большие ошибки: считал своё мнение непогрешимым, когда речь шла о моих замыслах, и одновременно полностью перекладывал незначительные на мой взгляд задачи на других, даже не пытаясь вникнуть в них. Чтобы стать настоящим королём, достойным вашего уважения, я должен исправить эти недостатки. Поэтому эти страницы будут написаны не мной одним, а всеми нами. Вместе. Я здесь, чтобы слушать. Мне нужны ваши голоса, ваши идеи и ваша критика. Итак, прошу вас, — сказал он, указывая на пустые листы, — пусть совет начнёт обсуждение.\n\nДебаты начались неуверенно: членам совета недоставало уверенности. Но, увидев готовность короля слушать, они постепенно оживились, и идеи стали выдвигаться одна за другой. День незаметно сменился ночью, а страницы, ещё недавно пустые, теперь были исписаны с обеих сторон. Когда последний советник ушёл, Акида задержался, просматривая сделанные пометки. К нему подошла Аяна и мягко положила копыто на плечо. — Уже очень поздно, дорогой. Может, закончим разбирать бумаги завтра? — Акида ещё мгновение смотрел на записи, затем поднял взгляд на неё и улыбнулся."
 zongo_king_epilogue.4.a:0 "— Конечно. Завтра – и обязательно вместе."
 zongo_king_epilogue.6.t:0 "Губернаторы Зонго" #Snow
 zongo_king_epilogue.6.desc:0 "Зуба стоял на балконе своей резиденции, глядя на провинцию, чьё имя совпадало с его титулом. Реформы короля понизили его в статусе – из мани жеребец стал губернатором. Да, это было проявление неуважения к традициям, но всё же Зуба мог стерпеть подобное. В основном потому, что он в данный момент стоял на этом самом балконе. Зуба, как и все его современники, неожиданно был помилован. Несмотря на то, что при регентстве Нзузи он служил орудием её террора, ему даровали полное прощение.\n\nАкида не раз показывал свою слабость. Его наивность и идеализм едва не привели Зонго к краху. Зуба даже думал, что ради восстановления наследия Нкоси ему придётся избавиться от обоих Бомбоко. Он считал, что это будет легко... но затем увидел уважение, которое молодой король снискал среди других мани. Выбора не осталось: ему пришлось подчиниться.\n\nВзгляд Зубы скользнул по полям провинции внизу. Его провинции. Инфраструктура была превосходной, набеги из-за Мейрконга давно стали воспоминанием, а его собственное положение почти не пострадало – лишь сменило вывеску. Акида не был похож на своего отца и не был сильным правителем... но всё же его уважали до такой степени, чтобы Зуба больше не мог надеяться поколебать статус-кво. Оставалось радоваться тому, что он жив, а ведьма Нзузи получила по заслугам.\n\nЗуба был одним из последних реликтов старого Зонго, что ещё оставались в живых. Он задумался, останется ли хоть что-то от прошлого, когда он и последние мани уйдут, уступив место поколению новых "губернаторов", которым нет дела до традиций. Он налил себе выпить и поднял тост. Зонго, которое он знал, скоро исчезнет, но остатками его величия Зуба по-прежнему мог наслаждаться.\n\nЕдва он сделал первый глоток, как размышления прервал молодой адъютант. Зебра резко остановился, едва удержавшись на копытах. — Прошу прощения, ман... — резким взмахом копыта Зуба заставил его замолчать. Жеребёнок вздрогнул под тяжёлым взглядом фельдмаршала."
 zongo_king_epilogue.6.a:0 "— Губернатор. Теперь я – губернатор Зуба."
 zongo_king_epilogue.7.t:0 "Союз короны и веры" #Snow
 zongo_king_epilogue.7.desc:0 "Великий храм Зонго, обычно бывший местом для тихого благоговения, сегодня гудел от физически ощутимой, радостной энергии. Сквозь окна лился солнечный свет, рассыпаясь по каменному полу изумрудными и золотыми бликами там, где двое зебр стояли лицом друг к другу. Акида выглядел истинным монархом в длинной тунике из тёмно-алого бархата, чьи края украшала изумительная золотая вышивка, а корону заменяла традиционная шапочка. Перед ним стояла Аяна – сама грация в ниспадающих шелках. Официальный головной убор, соответствующий её сану, отсутствовал, вместо него гриву венчал венок из распустившихся цветов. Её улыбка была знакомым якорем в буре, что бушевала внутри них обоих. Древние обряды были произнесены, а благословения дарованы. Затем настал момент истины. Когда старейшина сделал шаг назад, Акида взял оба копыта Аяны в свои. Его голос стал мягче, но всё равно разносился по храму, чтобы каждый услышал.\n\n— Ты видела короля, которым я хотел быть, но любила жеребца, которым я был. Ты выступала за наш народ на каждом шагу, но при этом непреклонно поддерживала меня, — он сделал глубокий вдох, и лёгкая дрожь копыт выдала его волнение. — Я обещаю тебе, принося клятву перед всем, что для нас свято: я пройду с тобой любой путь. Я буду твоим убежищем и твоим самым преданным почитателем. Отныне и навеки.\n\n— Твои мечты о лучшем будущем пленили меня с самой нашей первой беседы. Я думала, что нашла свою семью, когда пришла в лоно веры, но жизнь умеет преподносить сюрпризы, — в глазах Аяны выступили слёзы глубочайшей радости, которые она не могла сдержать, даже если бы хотела. — Я клянусь тебе, перед всем, что для нас свято: я пройду с тобой любой путь. Я буду твоим убежищем и твоей самой преданной почитательницей. Отныне и навеки.\n\nКогда их последние слова повисли в воздухе, зебры наклонились друг к другу. Тихое соединение короны и веры; двух душ, которые, вопреки всему, нашли свою вторую половину в разгар тяжёлых времён. Храм взорвался ликованием. Рёв приветствий, топот копыт и звон колоколов заглушили тишину."
 zongo_king_epilogue.7.a:0 "Да здравствуют Акида и Аяна! Пусть их жизнь будет столь же благополучной, как их дом!"
 zongo_king_epilogue.8.t:0 "Сын своей матери" #Snow
 zongo_king_epilogue.8.desc:0 "Акида стоял прямо перед тюремной камерой, в которой держали его мать. Тяжёлая деревянная дверь имела маленькое окошко, позволявшее заглянуть внутрь. Он открыл его и увидел истощённое существо, мало чем напоминающее зебру, лежащее на кровати. В комнате не было ничего, кроме самых необходимых вещей. Акида хотел оставить её под домашним арестом, но позволить ей такие удобства было невозможно, даже несмотря на то, что она была его матерью. Собравшись с духом, он наконец постучал в дверь, чтобы привлечь её внимание.\n\nКогда мать заметила его, её глаза вспыхнули. Она медленно двинулась вперёд, подходя всё ближе к преграде, что разделяла их. Акида почувствовал, как все его заготовленные речи и планы рассыпаются, а сердце начинает яростно колотиться в груди.\n\n— Акида, — сказала она почти шёпотом. — Мой дорогой Акида, — на её лице появилась улыбка. — Я всегда знала, что в тебе есть всё необходимое. Огонь, воля жить и рваться наверх. Я знала это ещё тогда, когда ты был жеребёнком – ты ведь был моим ребёнком. Такой блестящий, решительный... упрямый. Я пыталась взрастить тебя, направить в нужном направлении, но ты и видеть ничего не желал за пределами своего чудесного маленького мира поездов и книг.\n\nОна протянула копыта вперёд, но не смогла дотянуться, поскольку король отступил назад. Она рассмеялась. — Посмотри на себя сейчас! Ты не щадишь даже самых близких! Бросаешь мать в камеру, как обычную преступницу! Теперь ты должен понимать... то, что я сделала с твоим отцом, было ради блага королевства. Точно так же, как и то, что ты сделал со мной, — её улыбка растянулась в злобную ухмылку, совершенно не подходящую травоядному существу. — Ты действительно мой сын.\n\nАкида сделал ещё один шаг назад и споткнулся о ступеньку позади. Не сказав ни слова, он развернулся и бросился вверх, взбегая по лестнице так быстро, как только мог. Он хотел сказать ей так много, потребовать столько ответов. Он хотел услышать её извинения за всё, что она сделала, или чтобы она как-то опровергла всё это, чтобы всё могло быть как раньше. Но..."
 zongo_king_epilogue.8.a:0 "... реальность оказалась хуже любых слухов или домыслов."
 zongo_king_epilogue.9.t:0 "Наследие вдали от семьи" #Snow
 zongo_king_epilogue.9.desc:0 "Когда Акида прибыл в заранее оговорённое место встречи – небольшую уединённую террасу с видом на королевские сады – то заметил, что Аяна и Анарбек уже прибыли на место и вовсю пили чай. Зебра попытался отрешиться от неприятных воспоминаний и улыбнулся, не желая портить встречу, задуманную как напоминание о том, как далеко они продвинулись. Монарх размеренно двинулся вперёд, и вскоре они заметили его. Аяна быстро бросилась к нему, а Анарбек поставил чашку на стол с мягким стуком.\n\n— Дорогой! Я так рада, что ты здесь, — сказала она, прижимаясь к нему, пока Акида тихо посмеивался. — Мы как раз гадали, сколько ещё будет длиться разговор. Как всё прошло с твоей матерью?\n\n— Всё прошло... нормально. Странно говорить такое о собственной матери... но, возможно, ей там самое место, — Акида на мгновение отвёл взгляд, но быстро сменил тему. — Кстати, что за чай пьёте? — он подошёл к столу, стараясь сменить тему.\n\nАнарбек откашлялся и налил ему чашку. — Мятный. Надеюсь, тебе понравится, — Акида сел на свободное место рядом с Аяной. — Итак, как ты себя чувствуешь перед своей первой речью по радио? — спросил Анарбек, к счастью, тоже согласившись сменить тему.\n\n— Как же странно будет говорить без толпы перед глазами, — Акида подул на слишком горячий чай. — Хотя не могу сказать, будто не чувствую волнения! Технологии уже достаточно развились, чтобы такое стало возможным. Интересно, что будет дальше? Неужто гражданские авиаперевозки? — он сделал глоток чая и тихо рассмеялся.\n\n— Лично меня больше волнуют возможности радио. Я надеялась начать читать молитвы по радио, — Аяна вздохнула, отпивая чай. — Хочется, чтобы меня время от времени слышали по всей стране. Хотя переживаю, что не смогу найти на это время.\n\nПока троица продолжала беседовать, Акида улыбался. Ему было неловко в этом признаться, но в ходе этой тихой, простой беседы его решимость построить новый Зонго возродилась вновь. Даже если она никогда этого не увидит, он собирался доказать своей матери, что сможет стать кем-то вне её тени."
 zongo_king_epilogue.9.a:0 "Он докажет её заблуждение."
 zongo_king_epilogue.10.t:0 "Союз с державой [FROM.GetNameDefCap]" #Snow
 zongo_king_epilogue.10.desc:0 "С юго-востока прибыло официальное коммюнике. Весь регион объединился под зонголезским знаменем, поскольку зебры одержали победу даже над киринами. Также стоит отметить, что послание отправил их молодой король, Акида Бомбоко, который много лет учился в землях Древнего Пакта и даже нашёл убежище при дворе Карук после нападения Короля Шторма. Акида утверждает, что значительно модернизировал и укрепил своё королевство, и теперь надеется отплатить за оказанную ему доброту, предлагая нашим народам встретить будущее вместе.\n\nХотя предложение выглядит щедрым, слухи гласят, что его страна недавно пережила серьёзные потрясения, пройдя через масштабные реформы после ареста его собственной матери. Связывать себя с нестабильным королевством было бы не очень разумно; и всё же потенциальные выгоды союза с возрождающимся Зонго могут оказаться огромными... если только молодое правительство сумеет удержаться на плаву."
 zongo_king_epilogue.10.a:0 "Объединимся во имя мирного будущего!"
 zongo_king_epilogue.10.b:0 "Не стоит связывать себя со слабой короной."
 zongo_king_epilogue.11.t:0 "[FROM.GetNameDefCap] принимает наше предложение" #Snow
 zongo_king_epilogue.11.desc:0 "Коммюнике из Илкшехира прибыло ранним утром. Акида принял послание от дипломата, сохраняя внешнее спокойствие и ведя себя уважительно. Теперь же, в одиночестве своего кабинета, широкая улыбка невольно тронула его губы. Они приняли его предложение. Король вновь произнёс слова вслух, смакуя каждую фразу: "...официальный союз...", "в знак признания взаимных интересов и прочной дружбы, а также успехов Зонго." Формулировки были безупречны: полные уважительных слов и уверенных выражений. Как он и надеялся.\n\nОставшись один в тихой комнате, Акида позволил себе на мгновение искренне порадоваться. Это было признание не менее значимое, чем получение короны или звания доктора наук. Зонго больше не было застрявшим в прошлом королевством: теперь оно стало партнёром, равным даже Древнему Пакту! Его мысли поскакали вперёд, рисуя грандиозные новые перспективы.\n\nЕдиные железнодорожные стандарты с Пактом, обмен студентами, общие умы, цели, будущее! Он аккуратно положил документ на стол, бросив ещё один взгляд на официальный герб Пакта. Чуть позже сегодня он восстановит привычное самообладание и объявит об этом успехе совету. Но сейчас король Зонго стоял в залитом солнцем кабинете и радовался своему свершению."
 zongo_king_epilogue.11.a:0 "Светлое будущее ждёт!"
 zongo_king_epilogue.12.t:0 "[FROM.GetNameDefCap] отклоняет наше предложение" #Snow
 zongo_king_epilogue.12.desc:0 "Коммюнике из Илкшехира прибыло ранним утром. Акида принял послание от дипломата, сохраняя внешнее спокойствие и ведя себя уважительно. Теперь же, в одиночестве своего кабинета, он пытался понять, где и когда всё пошло не так. Они отвергли его предложение. Король вновь произнёс слова вслух. Каждая фраза вроде "с глубоким уважением" или "в знак прочной дружбы" скрывала под вуалью из вежливых слов твёрдое, непреклонное "нет".\n\nОставшись один в тихой комнате, Акида позволил себе на мгновение дать волю разочарованию, которое не мог продемонстрировать совету. Он защитил свою научную работу, заслужил докторскую степень – и всё же этого оказалось недостаточно, чтобы заслужить уважение когда-то приютившего его Пакта. Зонго больше не было застрявшим в прошлом королевством: теперь оно стало партнёром, равным даже Древнему Пакту! Так почему же они этого не видят?\n\nЕдиные железнодорожные стандарты с Пактом, обмен студентами, общие умы, цели, будущее – столько всего могло бы случиться! Он аккуратно положил документ на стол, бросив ещё один взгляд на официальный герб Пакта. Чуть позже сегодня он восстановит привычное самообладание и объявит об этой неудаче совету. Но сейчас король Зонго стоял в залитом солнцем кабинете, размышляя о том, что всё это значит для будущего Зонго."
 zongo_king_epilogue.12.a:0 "Столько планов пошло прахом..."
 zongo_king_epilogue.13.t:0 "Новое завтра" #Snow
 zongo_king_epilogue.13.desc:0 "По всему Зонго семьи и друзья собирались вокруг радиоприёмников. В шумном портовом баре в Замy воздух был густ от разговоров. Пока посетители болтали, проводя ночь за выпивкой, бармен держал радио под копытом. Когда динамик зашипел и ожил, он звучно ударил копытом по стойке. — Начинается! Тихо!\n\nШум статики стих, и голос диктора объявил: — ...Его Величество, мвенезонго Акида Бомбоко, — в баре мгновенно воцарилась тишина. Семьи, друзья и прочие, кто пришёл просто выпить в одиночестве, замерли и обратили всё внимание к радиоприёмнику.\n\n— Мои подданные... Когда я вернулся в Зонго, то увидел спящее королевство. Я мечтал разбудить его и привести в современность. И мне это удалось. Мы построили чудо, раскинувшееся на значительную часть континента... но королевство не опирается только на рельсы и сталь. Нельзя забывать про его народ. И в своём стремлении построить будущее я не смог привести всех с собой. Моя поспешность сотворила тени там, куда не падал свет.\n\n— Последние несколько лет казались целым десятилетием. И вы можете спросить себя... чем же теперь является Зонго? — радио на мгновение умолкло. — Посмотрите вокруг! Зонго – это мост связей. Это мост между деревнями Танайги и заводами Замы, между учёным в Цимейне и моряком из Твизаньики. Зонго – это мост между теми, кто веками называл эту землю домом, и теми, кто лишь недавно решил построить здесь свою жизнь.\n\n— Время, когда Зонго служило чертежом для реализации идеи одного-единственного зебры, прошло! Теперь это будет живой мост, по которому каждый сможет шагнуть в то самое завтра, о котором мечтает сам. Вот моё обещание. Спасибо, что выслушали.\n\nКогда трансляция закончилась, в баре на мгновение повисла тишина. И в этой тишине раздался одинокий возглас, который, казалось, прокатился по всему королевству."
 zongo_king_epilogue.13.a:0 "— За Акиду! За мвенезонго!"
 zongo_king_epilogue.project_complete.t:0 "Зебриканский экономист: специальный выпуск"
 zongo_king_epilogue.project_complete.desc:0 "ГЛАВНЫЙ МАТЕРИАЛ НОМЕРА: САМЫЙ БЫСТРЫЙ УСПЕХ В ЗЕБРИКЕ – ОТ ПЛЕМЕННОГО ГОСУДАРСТВА ДО ИНДУСТРИАЛЬНОЙ ДЕРЖАВЫ\nКак королевство Зонго построило современную экономику за одно поколение\nАвтор: М. Квилл, старший корреспондент\n\nВ этом месяце мы представляем специальный анализ одного из самых впечатляющих экономических преобразований нашего времени. Наши корреспонденты тщательно собрали данные, опросили экспертов и проследили путь нации, сумевшей переписать собственную судьбу. Некогда геополитически незаметное королевство Зонго теперь бросает вызов устоявшимся методам, демонстрируя, что радикальные идеи порой способны превзойти признанную теорию. Движущей силой этих перемен – и предметом нашего исследования – стала программа "Рельсы и нация".\n\nПрограмма, разработанная самим королём во время его учёбы в Политехническом институте Илкшехира, задумывалась как пошаговая модель стремительной модернизации, причём жизнеспособная даже для самых малых государств. Она стала генеральным планом королевства, использовавшем всё национальное богатство для создания обширной внутренней железнодорожной сети с целью ускоренного индустриального развития. Изначально эту концепцию встретили за рубежом со скепсисом, но сегодня её результаты видны в гудящих фабриках и растущих поселениях.\n\nОднако столь стремительный прогресс имел свою цену. Программа растянула некогда знаменитую своим богатством казну королевства до предела, отвлекая ресурсы от любых других направлений. Годы жёсткой экономии усилили бедность, привели к переселению общин и даже к тысячам погибших. Эти последствия, наряду с серьёзной инфляцией, показывают, что проект был далёк от безупречности.\n\nТеперь, когда основные работы завершены, королевство вступает в хрупкую фазу перехода. Оно стремится сохранить государственный контроль над ключевыми секторами – железными дорогами и базовыми отраслями промышленности – одновременно внедряя элементы свободного рынка. То, как Зонго справится с этим этапом и устранит социальные и экономические дисбалансы, возникшие в ходе его стремительного взлёта, имеет решающее значение. Некоторые специалисты считают, что эта модель может стать одной из фундаментальных экономических теорий нашего века; другие же утверждают, что столь радикальные методы нежизнеспособны и лишь открывают путь к будущей стагнации.\n\nБудущее остаётся неопределённым, но одно становится всё более очевидным:"
 zongo_king_epilogue.project_complete.a:0 ""Зонго нельзя игнорировать.""

 # Queen-mother Epilogue Events
 zongo_queen_mother_epilogue.1.t:0 "Заявление королевы-регента" #Snow
 zongo_queen_mother_epilogue.1.desc:0 "В бесчисленных домах и городских скверах Зонго внезапно затихли голоса, уступив место треску радио, из которого затем полился резкий и властный голос: — Граждане Зонго. Королевство в безопасности. Ваш король Акида был сбит с пути предателями, которые хотели разрушить саму основу нашего духа. Дабы защитить моего сына и наше королевство, я вынуждена вновь принять на себя обязанности регента.\n\nВ тускло освещённой комнате сидел Анарбек, чьё мрачное выражение лица выдавало его эмоции. Он уже вовсю собирал вещи, намереваясь забрать с собой всё ценное. — Иностранцы – это паразиты; их ложь преследовала лишь одну цель – ввести нашего короля в заблуждение, — кентавру не было смысла слушать обращение дальше: он прекрасно понимал, какая его ждала судьба, если он задержится здесь. Собрав чемоданы, он собирался воззвать к помощи всех своих должников. Он больше не мог оставаться в Зонго.\n\n— Но они действовали не в одиночку. Нынешняя главная жрица Аяна состояла в сговоре с этими ничтожествами, — Аяна в ужасе слушала обращение Нзузи и от удивления прикрывала рот копытом. — Она пыталась развратить не только нашего короля, но и веру в целом. Я обещаю: мы вскорости разберёмся с ней, дабы гарантировать, что та гниль, которую она проповедовала, больше не сможет никого одурманить, — и тут её сердце раскололось надвое, но не из-за собственной участи, а из-за будущего, о котором она так мечтала, и поругания всего, над чем они так долго трудились.\n\n— Когда мы явим остальному миру нашу несокрушимую мощь, никто больше не посмеет посягнуть на нашу безопасность! — мани Зубы с наслаждением слушал обращение королевы. — Никто больше не посмеет считать нас "отсталым королевством". Они научатся бояться нас, ибо наша сила и решимость будут абсолютны! — Зуба кивнул. Так оно и должно было быть. Под предводительством королевы Зонго, наконец, сбросит с себя оковы слабости. Раз и навсегда.\n\n— Зонго будет очищен от гнили, и это покажет всем, кто не уважал нас, нашу истинную силу! Да здравствует Зонго! Да здравствует король! — как только передача подошла к концу, Нзузи не смогла сдержать улыбки. Она никогда не хотела, чтобы всё сложилось именно так, но, увы, её сын ещё не был готов к исполнению своих обязанностей. Она сильно ошиблась, когда отправила его учиться за границу, потому что, как оказалось, лучшая наставница была всего в шаге от него."
 zongo_queen_mother_epilogue.1.a:0 "Урок первый: мама всегда права."
 zongo_queen_mother_epilogue.2.t:0 "Один день в жизни Мавеласа" #Snow
 zongo_queen_mother_epilogue.2.desc:0 "Сидя на балконе, Мавелас с дочерью наблюдали, как зонголезские солдаты тесным строем маршировали по городским улицам. Зебра сделал небольшой глоток чая, тогда как его дочь в тревоге сжимала свою чашку, не отрывая взгляда от шествия.\n\nОтец, заметив, какие чувства она испытывает, холодно и понимающе улыбнулся, но не стал отворачиваться от парада. — Просто поверь мне: это самая естественная вещь в мире, — он лениво ткнул кружкой в сторону марширующих солдат. — Захватчики приходят и уходят, но их королевства – и уж тем более империи – сыты не одними лишь идеалами. Им нужна эффективная администрация, золото и те, кто знает, где рычаги власти и как их повернуть.\n\nМолодая зебра чуть расслабилась и медленно кивнула. — Значит, нам нужно просто... адаптироваться?\n\n— Именно, как мы всегда это и делали, — сказал отец и сделал ещё один глоток. — Мы делаем себя незаменимыми: предлагаем им наш опыт, связи, труд, а взамен регентша возвращает нам влияние и закрывает глаза на прошлые... вольности. Так уж устроен мир, — наконец, он повернулся к дочери и блеснул таящейся в глазах хитростью. — Ты знаешь, что объединяет всех этих лам, верблюдов, кваггатайцев, так называемых воссоединителей Чисимби и зонголезцев? — он улыбнулся. — Никто из них не вечен. Пройдёт сто лет, и от них не останется и следа."
 zongo_queen_mother_epilogue.2.a:0 "— А вот мы никуда не денемся."
 zongo_queen_mother_epilogue.3.t:0 "Судьба совета" #Snow 
 zongo_queen_mother_epilogue.3.desc:0 "Атмосфера в зале заседаний стояла напряжённая; члены совета были скованы безропотностью и страхом, которые становились ещё острее из-за того, что места их прошлых товарищей – нганга и верховной жрицы Аяны – пустовали, напоминая им о недавней череде арестов. Во главе стола стояла Нзузи, окидывая взглядом собравшихся здесь мани и членов интеллигенции, которые ещё не бежали из страны.\n\n— Благодарю, что так быстро отреагировали на мою просьбу собраться здесь, — начала она, сверкнув отрепетированной улыбкой. — Хотя совет долгое время служил семье Бомбоко верой и правдой, выполняя свою рекомендательную функцию, он, к сожалению, оказался подвержен влиянию раскольнических настроений. В связи с этим я вынуждена воспользоваться полномочиями королевы-регента и расформировать его до тех пор, пока ситуация в стране не стабилизируется.\n\nНе успев вымолвить ни слова протеста, присутствующие увидели, как двери зала распахнулись настежь, и оттуда высыпала королевская гвардия, чей цокот тут же заполонил комнату. Солдаты двигались точно и методично, обходя стороной мани и заключая под арест только учёных и советников. Никто из них даже не успел осознать, что произошло, как безэмоциональные стражники насильно вывели их наружу. Как только оставшиеся мани подняли глаза на Нзузи, к ней подошёл Зуба, тут же перейдя на шёпот: — Ваше Величество, мы не смогли найти кен...\n\nНзузи небрежно отмахнулась от него, не отрывая взгляда от двери, в которую увели задержанных. — Это не имеет значения. Главное, что здесь их было достаточно, чтобы отправить всем остальным ясный сигнал. Проследи за тем, чтобы всё прошло чисто. Всё понятно? — Зуба быстро отсалютовал и вышел.\n\nКак только дверь за ним закрылась, Нзузи повернулась к оставшимся в зале мани, кто, находясь в полупустом помещении, сидели тише воды и ниже травы, уткнув глаза в пол. Этот гадюшник лжи был наконец-таки разворошён. Теперь, когда никакие "инструменты" не могли одурачить его, а мани вспомнили своё место, следующее поколение точно будет относиться к королю куда почтительнее. Нзузи улыбнулась; ей предстояло ещё многое сделать, чтобы, когда её сын снова примет бразды правления, у него не возникло новых проблем."
 zongo_queen_mother_epilogue.3.a:0 "С зазнайками, наконец, покончено."
 zongo_queen_mother_epilogue.4.t:0 "Зебрийское превосходство" #Snow
 zongo_queen_mother_epilogue.4.desc:0 "Айе двигался по улицам Зонго с отточенной осторожностью. В голове он бесконечно повторял новые правила: "ходите по правой стороне", "не собирайтесь в группы больше трёх гиен", "всегда носите с собой документы", "не встречайтесь взглядом с офицерами". Он выучил эти законы, запомнил каждый слог. Он хотел стать образцовым, не привлекающим внимания подданным, чтобы просто пережить эти тяжёлые времена.\n\nНа рынке он заметил впереди офицера и инстинктивно опустил голову, тут же потянувшись лапой к карману, где лежали аккуратно сложенные документы. Чтобы не вызвать подозрений в краже, он обходил стороной все прилавки, которые его не интересовали. Он ничего не нарушал, всё делал по правилам.\n\nНо тут к нему подошли двое офицеров в безупречно чистой форме и преградили путь. Сердце Айе заколотилось. Он не мог ничего нарушить, иначе и быть не могло. — Вы, — обратилась одна из них монотонным голосом. — Предъявите, пожалуйста, документы. Это стандартная проверка, — по телу Айе тут же пронеслась волна облегчения: с документами у него всё было в порядке. Через мгновение он протянул зебре все необходимые бумаги, и офицер начала их изучать. — Всё в порядке, — сказала она, но не изменилась в лице. — Однако вы находитесь здесь без видимой цели, а бродяжничество карается штрафом. Проследуйте за нами.\n\n— Я просто шёл... — Айе запнулся, а от страха его голос стал едва слышным шёпотом. — ... домой. Я живу здесь неподалёку. У меня есть семья, они могут подтвердить это.\n\nВторой офицер тут же презрительно усмехнулся. — Так мы вам и поверили. Вы ведёте себя подозрительно. Что-то замышляете? Сколько ещё "ваших" задействовано в этом деле?\n\nСердце Айе застучало, словно поршень гоночного двигателя. — Нет! Я-я... — офицерша наклонилась ближе, понизив голос до шёпота, который мог слышать только Айе."
 zongo_queen_mother_epilogue.4.a:0 "— Да плевать нам, что у тебя в документах, гиена. Ты дышишь нашим воздухом, а это уже преступление."
 zongo_queen_mother_epilogue.5.t:0 "Зонголезский национальный союз" #Snow
 zongo_queen_mother_epilogue.5.desc:0 "По залу прокатилась волна громких оваций; всех внутри переполняло волнение от значимости этого момента. Первое собрание Зонголезского национального союза прошло невероятно успешно, собрав не только местных жителей, но и гостей из самых отдалённых провинций. В первых рядах стоял один из основателей союза, чьё сердце распирало от гордости и сладкого предвкушения. Внутреннее напряжение, вызванное известным лишь ему секретом, едва не лишило его чувств, но он изо всех сил держался, даже когда в зале погасли огни, возвещая о кульминации вечера.\n\nТопот копыт сошёл на нет, уступив место растерянному шёпоту, что тут же сменился всеобщим изумлением, когда свет софитов упал на тёмную фигуру той самой кобылы.\n\nЭто действительно была она!\n\nВ дверном проёме появилась королева-регент с небольшой улыбкой на губах. Она медленно шла к трибуне, окидывая взглядом собравшуюся толпу, а когда вышла на сцену, зал взорвался аплодисментами. — Мои верные подданные, — начала она, глядя на собравшихся внутри существ взглядом любящей матери.\n\nУ него на лице выступили слёзы. Он ещё никогда в жизни не видел чего-то столь же прекрасного.\n\n— Меня переполняет благодарность за то, что столько существ присоединились к этому союзу ради блага нашего королевства! Я обещаю, что все ваши желания будут исполнены! Никаких больше предателей и лжи! Мы покажем миру могущество зонголезцев! — толпа взревела в поддержку королевы, однако её голос пробился через шум, заглушая всех остальных.\n\nИ в то время как зебра окликал правительницу одобрительными выкриками, он почувствовал, как её взгляд упал именно на него. Лёгкий, почти незаметный кивок, мимолётная, но тёплая улыбка – всё это предназначалось ему и только ему; это было его наградой за верность и безупречное выполнение её поручения. Королева-регент говорила ему, что молодёжь должна организоваться, дабы защитить Зонго, и поэтому он сразу воззвал к своим друзьям, родственникам – вообще всем, кого только знал. Он взрастил эту идею из простой мысли и претворил в реальность, и всё это было его наградой. У неё появятся преданные последователи, а Зонго очистится от предательского сброда и скверны – и вот тогда-то она получит то королевство, о котором так мечтала.\n\nДаже мимолётной улыбки с её уст было достаточно, чтобы он смог убедить себя в том, что все его усилия были не напрасны."
 zongo_queen_mother_epilogue.5.a:0 "Миллионы душ объединились ради единой цели."
 zongo_queen_mother_epilogue.6.t:0 "Бдительные и готовые к службе" #Snow
 zongo_queen_mother_epilogue.6.desc:0 "Жизнь в маленьком посёлке отличалась удивительной стабильностью: солнце по-прежнему вставало на горизонте, торговцы привычно стояли за своими прилавками, и всё вокруг продолжало идти своим неторопливым, привычным чередом. Единственное небольшое отличие, которое бросалось в глаза каждому жителю посёлка, касалось числа солдат: если раньше на страже правопорядка стояла лишь парочка жеребцов и кобыл, то теперь, казалось, они прятались за каждым углом, тихо и внимательно бдя за всем, что творилось в деревне. Нсука, одна из местных старожилов, не видела в этом ничего особенного и уж тем более проблемного: в конце концов, что плохого в том, что они поддерживают порядок на улицах?\n\nПо пути к колодцу она прошла мимо узкой улочки, откуда доносились приглушённые звуки борьбы, но Нсука даже не обернулась: она уже встречалась с подобным и понимала, что её это не касается. Впрочем, в глубине души она всё же надеялась, что провинившийся усвоит урок и не станет впредь встревать в неприятности.\n\nКогда она, держа ведро в зубах, обогнула угол улицы, на её пути встал молодой офицер. — Доброго утра, мэм, — вежливо обратился полицейский. — Можно вас на минуточку? Это не займёт много времени.\n\n— Ой, да, конечно! — ответила кобыла, поставив ведро на землю. — Чем могу помочь?\n\nЖеребец улыбнулся и достал из кармана записную книжку. — Знаете ли вы жеребца по имени Менжи?\n\nНсука удивлённо моргнула. — Да... это ж мой внук. Он что, натворил что-то? — офицер хмыкнул и записал эту информацию, никак не реагируя на то, что кобыла заметно побелела. — Прошу прощения, вы, должно быть, не услышали меня: у меня привычка говорить тихо... Мой внук, он что, натво...\n\nОфицер оторвал взгляд от книжки и закрыл её. — Мэм, прошу прощения, но мне придётся отнять ещё немного вашего времени. Не могли бы вы пройти со мной в участок?\n\nНсука онемела. Её внучок был хорошим жеребчиком; не может такого быть, чтобы он что-то натворил...\n\nИ всё же она кивнула: старушка была уверена, что сможет прояснить это недоразумение."
 zongo_queen_mother_epilogue.6.a:0 "Нсука последовала за ним и даже не заметила взгляда проходящей мимо кобылы."
 zongo_queen_mother_epilogue.7.t:0 "Свадьба на дому" #Snow 
 zongo_queen_mother_epilogue.7.desc:0 "Дверь в комнату Акиды отворилась без стука, но он даже не пошевелился: в последнее время её открытие не сулило ничего хорошего. Даже не глядя в ту сторону, король услышал до боли знакомый голос, который никак не мог заглушить, сколько ни пытался.\n\n— Сынок, у меня для тебя сюрприз! Наконец-то я нашла, что тебя взбодрит. — Акида молчал, зная, что разговаривать с ней бесполезно. Однако затем он услышал, как она позвала кого-то снаружи, и вскоре до него донёсся цокот сопротивляющихся копыт. Его взгляд резко устремился к двери, а самообладание пошатнулось, когда он увидел связанную Аяну с повязкой на глазах. Он даже не успел встать с места как её, скулящую от страха, грубо втолкнули в комнату и бросили на пол, словно тряпичную куклу.\n\n— Аяна! — Акида тут же бросился к ней и заключил в объятия. Он торопливо начал снимать повязку и путы, и когда наконец освободил её, увидел, насколько она была перепугана. В тот же миг, когда кобыла узнала короля, её глаза залились слезами.\n\n— Ну-ну, хватит, — проговорила мать, не теряя улыбки. — И кто теперь скажет, что я не щедрая мать? Но ладно, давайте не будем тратить время попусту, — она подняла копыто, указав им на пару. — Властью, данной мне как регенту Зонго, а также как твоей матери, я объявляю вас мужем и женой! — она тихонько постучала копытами. — Поздравляю!\n\nАкида онемел. В его голове пронёсся такой вихрь мыслей, что он даже не смог выбрать подходящего ругательства. — Желаю вам всего наилучшего и, конечно, многочисленного потомства! Жду не дождусь, когда увижу своего внучка!\n\nСразу после этого она развернулась и вышла, закрыв дверь так, будто только что закончила обычную светскую беседу. Как только звук её копыт затих, Аяна тут же прижалась к груди Акиды, безудержно рыдая и дрожа, цепляясь копытами за своего "мужа". Он же, в свою очередь, не в силах сделать что-либо ещё, лишь крепко обнял её в ответ."
 zongo_queen_mother_epilogue.7.a:0 "Про некоторые мучения даже говорить страшно."
 zongo_queen_mother_epilogue.8.t:0 "Прикосновение матери" #Snow
 zongo_queen_mother_epilogue.8.desc:0 "Нзузи спешила к Акиде с новостью; наконец настал момент, когда он признает все её старания.\n\nВойдя в комнату, она увидела общавшихся и стоявших у окна Акиду и Аяну, тут же замолкших при её появлении. Нзузи лишь бегло скользнула по ним взглядом (даже не удостоив Аяну вниманием) и устремила на сына горящий торжествующим огнём взор. — Акида, сынок! — горделиво начала кобыла. — Я пришла к тебе с вестью! Теперь Зонго достиг вершины своего могущества: наши границы нерушимы, враги запуганы, а народ объединён общей целью! Мир наконец-то понял нашу силу! — она сделала шаг вперёд. — Я построила империю... специально для тебя, мой маленький император. Теперь-то ты понимаешь, почему мне пришлось всё это сделать?\n\nОна приподняла копыто, чтобы коснуться его щеки; впервые за долгое время она могла снова дотронуться до него!\n\nАкида резко дёрнулся назад, словно его ошпарили; всё его тело вздрогнуло, а сам он отвёл голову, чтобы избежать её прикосновения. И когда их взгляды встретились, она увидела, что в его глазах не осталось и следа тепла того умного, полного надежд жеребчика, что когда-то сидел у неё на коленях. Теперь в них читались лишь отвращение и ненависть.\n\nВсё ещё замерши с поднятым копытом, Нзузи опешила, и на мгновение её лицо потеряло всю прежнюю выдержку. Напряжённая, тяжёлая тишина, повисшая между ними, длилась всего несколько секунд, но казалась вечностью. — Вот оно как, — наконец сказала она полушёпотом и опустила копыто, напрягшись. — Тогда я... пойду, — она развернулась, вышла из комнаты и, отойдя на несколько шагов, потеряла остатки самообладания. От ярости её начало трясти, и она так сильно сжала копыта, что они заболели. Впрочем, под охватившей её злостью скреблось и ещё одно, куда более сильное чувство – горечь. После всего, что она совершила, после всех сломанных жизней и принесённых ради него жертв, он смотрел на неё так, словно она была чудовищем. Он всё ещё был так наивен, так слеп! Как он мог не понять её намерений?!\n\nПускай! Ей просто придётся сделать ещё больше. Теперь она собиралась построить настолько великое наследие, настолько непоколебимое, что у него просто не останется выбора, кроме как принять её любовь. Когда-нибудь он обязательно поймёт, ради чего всё это было."
 zongo_queen_mother_epilogue.8.a:0 "Когда-нибудь."
 zongo_queen_mother_epilogue.9.t:0 "Твоя игрушка" #Snow
 zongo_queen_mother_epilogue.9.desc:0 "Едва дверь захлопнулась, как Акиде стало дурно. Он безвольно рухнул на пол, охватив голову копытами, и его тело содрогнулось от глухих всхлипов. Одного только её вида оказалось достаточно, чтобы напомнить ему о собственных ошибках и тех лживых улыбках, которыми она его осыпала.\n\nРядом неподвижно стояла Аяна. Слов у неё не было; вместо них она просто прижалась головой к его плечу, пытаясь успокоить тихим присутствием. Прошло немало времени, прежде чем тяжёлое, прерывистое дыхание Акиды понемногу выровнялось.\n\n— Надеюсь... надеюсь, что Анарбек в порядке, — наконец вымолвил Акида. — Где бы он ни был, — он сухо усмехнулся. — Знаешь, он был прав. Он предупреждал меня о моём идеализме; говорил об этом с самой первой встречи между нами и иностранными советниками. Он рисковал жизнью, чтобы попытаться воплотить мои хотелки в реальность, а теперь... — он нехотя поднял копыто и ткнул им в сторону окна, за которым открывался вид на королевство, искажённое видением его матери. — То, что должно было стать моим Магнум опус, было извращено: мои железные дороги теперь возят солдат; заводы, которые должны были обеспечить народу процветание, производят оружие. Всё, что я строил, стало для неё "инструментом"... Надо было послушать его тогда, когда ещё была возможность. А теперь я даже не смогу сказать ему "спасибо".\n\n— Откуда тебе было знать, что всё так обернётся? — сказала Аяна, крепко обнимая Акиду. — Твоя мечта была прекрасной. Общей. Это она испортила её.\n\nАкида вновь замолчал. Он глядел из окна на безмолвные улицы столицы и видел Зонго, который больше ему не принадлежал. Груз этого осознания казался ему бесконечно тяжёлым. Последние слова, что он прошептал после долгой паузы, были обращены к самому себе – и к той, что оставалась рядом.\n\n— Я надеюсь, она скоро сдохнет.\n\nВ ответ Аяна лишь сильнее прижалась к Акиде, положив голову ему на плечо. Больше не было ни слов, ни действий, которые могли бы что-то изменить. Оставалось только ждать, когда закончатся эти ужасы, ведь после всего искалеченная нация сможет опереться лишь на них."
 zongo_queen_mother_epilogue.9.a:0 "Бульвар сломанных надежд."
 zongo_queen_mother_epilogue.10.t:0 "Победа матери-императрицы" #Snow 
 zongo_queen_mother_epilogue.10.desc:0 "Столица бурлила от эйфории. Сегодня Зонго навсегда сбросит с себя клеймо "отсталого королевства".\n\nНа улицах города проходил крупный военный парад: строй за строем, в безупречном едином ритме, маршировали вооружённые формирования ЗНС, чьи лица распирало от гордости; сразу за ними по вымощенным дорогам следовали только что сошедшие с конвейеров переоборудованных гражданских фабрик танки, а уже после них – грузовые платформы с гигантскими артиллерийскими орудиями, и всё это происходило в окружении высоких зданий, с которых свисали знамёна с символикой королевской семьи.\n\nВ машине, возглавлявшей шествие, стояла Нзузи, купавшаяся в лучах славы... и всё же, несмотря на всё это великолепие, она не чувствовала ни капли удовлетворения. На мгновение, прямо посреди парада, её мысли вернулись к тому дню, когда её собственный сын отшатнулся от неё. Затем всплыло другое воспоминание: прошлые дни, когда Нкоси, ещё маленький Акида, лежавший у неё в копытах, и она сама хохотали над чем-то, наслаждаясь редким спокойным деньком. Она достигла всего, о чём мечтала с детства, и всё же... неужели Акида был...\n\n— Ваше Величество, — голос Зубы вывел её из задумчивости. Он стоял рядом, охраняя её; уже через мгновение она забыла о его присутствии. — Они ждут вашей речи.\n\nОглянувшись, Нзузи увидела, что её машина, окружённая взволнованной толпой, остановилась около высокой трибуны, где парад должен был достичь своей кульминации. Выйдя из автомобиля, она улыбнулась, и толпа взорвалась ликованием, а когда поднялась на сцену и заняла своё законное место, вновь окинула взглядом море зебр, сверкнув своей коронной улыбкой.\n\n— Подданные Зонго! Оглянитесь вокруг и задумайтесь над тем, что вы видите! Силу! Единство! Безопасность! Гордость! Всё это идеально описывает страну, в которой мы живём! — она сделала паузу, позволив толпе взреветь от восторга. — Благодаря нашим общим усилиям мы превратили то, что когда-то называли отсталым королевством, в державу, которую уважают! И с сегодняшнего дня так будет всегда! Сегодня весь мир узнает, чем на самом деле является Зонго! Зонго – это империя, которая выдержит испытание временем!"
 zongo_queen_mother_epilogue.10.a:0 "— Слава империи! Слава семье Бомбоко!"
 zongo_queen_mother_epilogue.11.t:0 "Сделать "правильный" выбор" #Snow
 zongo_queen_mother_epilogue.11.desc:0 "Содержимое открытого сундука, казалось, поглощало весь свет в комнате. Мани Карабаза провёл копытом по сверкающим золотым монетам и драгоценностям, едва сдерживая улыбку. Здесь лежало столько богатств, сколько его владения не приносили и за месяцы самой оживлённой торговли. Его сын, однако, выглядел совсем не так восхищённо.\n\nМакая стоял всего в нескольких шагах позади; он выглядел озадаченно и был полной противоположностью своего отца, кого эти богатства буквально заворожили. — Отец, я... — начал он нерешительно, — ... это очень щедрый дар, но... мы же не устраивали никаких торжеств или чего-то подобного. Он появился будто из ниоткуда, да и богатства эти... чрезмерны. Зачем нам это прислали?\n\nЭти слова, словно укол, вывели Карабаза из транса. Искра в его глазах мгновенно сменилась паникой. Он шагнул к сыну и отвесил ему такую оплеуху, что тот от неожиданности рухнул на пол. — Молчать, щенок! — прошипел он, а в его голосе смешались ярость и страх. — Заткнись и перестань задавать глупые вопросы. Дают – бери и будь благодарен, — он наклонился к сыну, приблизив морду к его уху, обжигая то своим дыханием. — Ты меня услышал? Ещё одно такое слово – и можешь забыть о наследстве. Станешь уроком для остальных. Я лишусь сына, а ты... отправишься прямиком в могилу. А теперь улыбнись; я объясню, откуда у нас это. Мы – верные подданные короны, и это награда правительницы за нашу службу. Всё предельно просто.\n\nМакая тут же замолчал, уставившись глазами в пол, и кивнул. После этого безумие в глазах отца поутихло. — Вот и славно. Тебе повезло, что это произошло за закрытыми дверьми. Запомни этот урок раз и навсегда, — и как только отец отпустил его, Макая понял, чем на самом деле был этот сундук."
 zongo_queen_mother_epilogue.11.a:0 "Награда также может служить и напоминанием."

 # Council Epilogue Events
 zongo_council_epilogue.1.t:0 "Последствия переворота" #Snow
 zongo_council_epilogue.1.desc:0 "Аяна сидела на своём привычном месте за столом, пытаясь как и прежде направлять работу совета, хотя без многих ключевых фигур это давалось очень нелегко. Зуба в тюрьме, королева-матерь в ступоре, Акида в коме... Без них зал казался куда более пустым. Пытаясь сдвинуть заседание с мёртвой точки, она озвучила вопрос, который и без того висел в воздухе. — Что же произошло в этой комнате в тот день? — словно тараканы, бросающиеся врассыпную при ярком свете, мани наперебой ринулись оправдываться.\n\n— Это Зуба! Его ослепили собственные амбиции!\n— Во всём виноваты интриги королевы-матери!\n— Мы действовали так быстро, как только могли! Мы остановили предателя!\n— Акида проявил храбрость: он выступил против предателя, но...\n\nАяна лишь слушала, сохраняя невозмутимое выражение лица, пока мани перебивали друг друга. Она впитывала их слова, пытаясь сложить воедино обрывки их спутанной истории. Они рисовали героическую картину, но Аяна не была уверена, что может им верить. Если они действительно среагировали мгновенно, почему Акида был ранен и теперь лежит в коме? Почему Зуба вообще решил, что его переворот может удаться, если только не рассчитывал на их покорность... или хотя бы на то, что совет будет настолько погружён в собственные ссоры, что никто не остановит его? Теперь, когда Нзузи была лишена власти, они охотно перечисляли её грехи... но если король действительно пытался арестовать её, почему всё обернулось такой трагедией? В их рассказе было слишком много пробелов.\n\nОна поблагодарила их за показания и вскоре завершила заседания. Когда за последней зеброй закрылась дверь, Аяна осталась наедине со своими мыслями. Они могли рассказывать любые истории, но пустой стул во главе стола говорил о их провале куда красноречивее."
 zongo_council_epilogue.1.a:0 "Что бы он сделал на моём месте?"
 zongo_council_epilogue.2.t:0 "Гражданские чиновники в совете" #Snow
 zongo_council_epilogue.2.desc:0 "Среди множества кресел в зале совета появилось новое. В нём сидел жеребец, прежде незнакомый прочим советникам. Осанка незнакомца была прямой, но вот одежда – весьма простой. Аяна объявила о начале заседания, улыбнулась и жестом указала на новичка.\n\n— Советники, позвольте представить Като. Он помогает правительству с самого начала королевских реформ, — радостно объявила она. — Усилия зебр вроде него позволили плану продвигаться вперёд с минимальными задержками. Отныне, чтобы укрепить связь короны с её подданными, он будет служить новым членом совета. Прошу поприветствовать.\n\nКато поднялся и сделал короткий, выверенный поклон под аплодисменты. Когда шум стих, он заговорил: — Благодарю вас, королева-регентша. Для меня огромная честь служить Зонго как член совета, — он вновь поклонился в направлении Аяны. — Уверен, мои знания принесут Зонго великую пользу. Я намерен проследить, чтобы прежде досаждавшая нам... неэффективность перестала быть столь вездесущей проблемой, — он сделал паузу, позволяя словам повиснуть в воздухе, пока все в зале смотрели на него. — Я понимаю, что определённые упущения неизбежны, особенно когда смотришь с большой высоты, но надеюсь, что в будущем они станут куда меньшей проблемой, — его взгляд скользнул по мани, после чего жеребец опустил глаза, и на его губах мелькнула лёгкая, самодовольная улыбка. — Это всё.\n\nОн протянул копыто Аяне, и она ответила на жест. По крепкой хватке и уверенной манере поведения она поняла, что этот жеребец станет хорошим союзником. Он был тем, кто поднялся из народа, подобно нганга, но при этом был теснее связан с интеллигенцией благодаря своей должности, хотя и не принадлежал напрямую ни к одной из этих групп. Но, что ещё важнее, он был явным противником мани. Те наверняка осложняли ему работу раньше, и его улыбка была обещанием доставить им не меньше хлопот."
 zongo_council_epilogue.2.a:0 "Она лишь надеялась, что его не ослепят амбиции."
 zongo_council_epilogue.3.t:0 "Разговор Аяны с Анарбеком" #Snow
 zongo_council_epilogue.3.desc:0 "В тишине личного кабинета, вдали от придворного хаоса, Аяна и Анарбек впервые встретились наедине. Раньше они всегда общались как члены совета, но теперь всё было иначе. Это была не встреча интеллигенции и духовенства – просто беседа Аяны и Анарбека. Кентавр слушал её с непроницаемым выражением лица.\n\n— Понимаю, все эти новые обстоятельства значительно выходят за рамки работы, которая была раньше, — начала кобыла, и в её голосе слышалось напряжение. — Вы – известный и уважаемый профессор в Сентурии. Никто не осудит вас, если вы решите оставить Зонго, — она вздохнула, собираясь с духом. — Но я прошу вас остаться! Пусть вы и не зонголезского происхождения, вы всё равно были верным союзником и другом Акиды. С вами мы сможем спасти эту страну! Но если вы уйдёте, то я... я... — слова застряли у неё в горле, а глаза наполнились слезами.\n\n— Вы неправильно поняли мои намерения, верховная жрица, — мягко перебил её Анарбек, не дав договорить. — Я никогда не собирался уходить. Даже не задумывался, — увидев её удивление, кентавр продолжил, и голос его стал теплее. — Когда Акида попросил меня приехать, я был глубоко тронут. Видя его на заседаниях и общаясь наедине, я видел всё того же жеребца, которого так часто наблюдал на занятиях. Он стал настоящим королём, но не потерял доброты. Говорят, власть развращает, но он оставался собой до конца, — Аяна вытерла глаза, и Анарбек положил ей на плечо руку в попытке успокоить. — Мы справимся. Вместе. Я обещаю.\n\nСобравшись с силами, Аяна кивнула, и они принялись обсуждать, как будут вести страну вперёд. Это было не ради власти и не ради собственных убеждений – они лишь хотели, чтобы мечты Акиды продолжали жить, пока король спит. Однажды он проснётся, и сможет гордиться тем, как далеко продвинулся Зонго... Эта тихая надежда была их путеводным светом."
 zongo_council_epilogue.3.a:0 "Планы рождаются вместе с обещанием."
 zongo_council_epilogue.4.t:0 "Представляя план действий" #Snow
 zongo_council_epilogue.4.desc:0 "В зале совета стояла напряжённая тишина – каждый ждал, когда заговорит верховная жрица. Аяна стояла во главе стола, сдержанная и решительная. — Это должно было остаться тайной, но трагедия, разыгравшаяся в этой самой комнате, вынудила меня раскрыть правду, — она глубоко вдохнула. — Перед войной с Кирией король Акида сделал мне предложение, — в зале поднялся шёпот, но Аяна не дрогнула. — Мы намеревались объявить о нашем союзе в мирное время... но у меня нет выбора. Как жена Акиды, я буду править Зонго в роли королевы-регентши, пока наш законный король не пробудится!\n\nНганга наблюдали с тихим одобрением, тогда как мани и интеллигенция заметно нервничали; лишь Анарбек сохранял спокойствие. — Я пришла не с пустыми копытами! У меня есть план действий, который вернёт Зонго стабильность. Но составляла я его не одна, — она повернулась к кентавру. — Анарбек, прошу, присоединяйтесь ко мне.\n\nКогда кентавр встал рядом с ней, интеллигенция постепенно успокоилась, тогда как шёпот мани стал ещё тревожнее. — Как близкое доверенное лицо нашего короля, Анарбек помогал стране многими способами. Эти трудные времена требуют нового взгляда, и потому я делаю второе объявление: с этого момента он будет служить королевским советником до тех пор, пока кризис не будет преодолён, — её слова прокатились по залу, заставив смолкнуть все разговоры. — Теперь мы проведём голосование. Если есть возражения – выскажите их здесь и сейчас.\n\nВ знак одобрения начали подниматься копыта. Колеблющиеся мани, видя, что их число уступает двум третям совета и помня о недавнем предательстве мани Зубы, не увидели иного выхода, кроме как неохотно присоединиться к всеобщему согласию. — Единогласно, — объявила Аяна с улыбкой. — Нам предстоит много работы.\nОни ещё не знали, насколько далеко зайдут эти двое в реформировании Зонго. Но, как всегда говорил Акида..."
 zongo_council_epilogue.4.a:0 "... марш прогресса не остановить."
 zongo_council_epilogue.5.t:0 "Рассмотрение всех королевских прошений" #Snow
 zongo_council_epilogue.5.desc:0 "Когда двери открылись, оповещая о начале приёма прошений, Аяну ошеломила длина очереди. Она начиналась у дверей тронного зала и тянулась далеко за пределы её видимости. Первый посетитель, ожидающе глядя на неё, шагнул вперёд, когда она подняла копыто и позвала его.\n\nЗебра рассказал о своих тревогах, и Аяна слушала. Когда он закончил, королева заверила его, что сделает всё возможное, чтобы помочь. Он ушёл, но его место тут же занял следующий проситель. А потом ещё один, другой, десятый... бесконечный поток зебр, каждый из которых нёс с собой груз страхов и забот, копившихся годами и даже десятилетиями, и лишь усугублённых действиями Нзузи. Некоторые жалобы были пустяковыми, но подавляющее большинство по-настоящему душераздирающими: разделённые семьи, пропавшие родители, дома, отобранные ради "прогресса"... Тяжесть этих историй давила на Аяну, но она продолжала свой труд.\n\nКогда колокола возвестили конец приёма, очередь начала расходиться, а королевская стража вежливо выводила последних посетителей. Но они не успели остановить юркую фигурку, стремительно ворвавшуюся в зал, игнорируя звон. Это была маленькая кобылка, не старше восьми лет, которая отчаянно бежала к трону. У дверей остановилась встревоженная кобыла – стражники удерживали её, после того как она безуспешно пыталась остановить дочурку. Стража бросилась перехватить и жеребёнка, но Аяна подняла копыто.\n\nЖеребёнок остановилась недалеко от трона с явно заметным отчаянием в глазах. — Пожалуйста, мисс королева, пожалуйста, верните мне моего папу! — её голос сорвался, и по мордочке потекли слёзы. — Его зовут Манока, пожалуйста, верните его! Мамочка сказала, что он вернётся, когда злая кобыла уйдёт, но он так и не пришёл! Пожалуйста, пожалуйста!\n\nАяна изо всех сил пыталась сохранять самообладание, но не выдержала. Всё это было слишком тяжело. — Стража! Немедленно найдите любые записи о Маноке! — приказала она дрогнувшим голосом. — Передайте всем: этого жеребца нужно освободить немедленно! — она посмотрела на плачущего жеребёнка, и в её глазах вспыхнул огонь. Аяна не могла отменить всё то горе, что причинила Нзузи. Но это вовсе не означало, что она будет бездействовать перед лицом её злодеяний."
 zongo_council_epilogue.5.a:0 "Нельзя двигаться вперёд, не взглянув прошлому в лицо."
 zongo_council_epilogue.6.t:0 "Будущее веры" #Snow
 zongo_council_epilogue.6.desc:0 "Всё было тщательно подготовлено к передаче власти. Зал был полон, её речь должна была услышать вся страна, а нганга уже заранее одобрили все её действия. Не хватало лишь одного – самой её преемницы.\n\n— Мьези! Где ты? — Аяна уже несколько минут бегала по залу, тщетно пытаясь найти свою наследницу. Нганга тоже метались в поисках кобылы, но безуспешно. Когда королева пробежала мимо груды ящиков, то краем глаза заметила движение: почти идеально спрятавшуюся фигуру, которую выдавала лишь торчащая вверх полосатая кисточка хвоста. — Мьези?\n\nФигура вскочила, словно жеребёнок, пойманный за шалостью, и на её глазах блеснули слёзы. — Г-главная жрица Аяна... я не могу, простите! — она дрожала, умоляя срывающимся голосом. — Я так хотела, правда хотела, чтобы вы мной гордились. Но я просто не могу! — она закрыла лицо копытами. — Как я могу продолжать после всего, что сделали вы?\n\nАяна лишь мягко улыбнулась. — Ох, Мьези, тебе стоило сказать мне об этом раньше, — она присела рядом с дрожащей кобылой. — Я боялась ничуть не меньше тебе, когда приняла этот сан... ну, может, всё же чуть слабее. Дело было как раз в том, что я не хотела занимать место Налы. Она была... — Аяна подняла взгляд к потолку, а на лице появилась тёплая, светлая улыбка. — Для меня она была идеальной. Мне было невероятно трудно занять её место как верховной жрицы... но на самом деле она отнюдь не была идеальной, потому что никто не идеален. Поэтому мне не нужно, чтобы идеальной была ты, — она взяла копыта Мьези в свои. — Мне нужно, чтобы ты была собой. И помни: ты всегда можешь попросить о помощи. Бремя лидерства не предназначено для того, чтобы нести его в одиночку... поверь, я знаю, — в её улыбке появилась лёгкая нотка печали.\n\nМьези опустила взгляд, стыд и смущение заставили её лицо залиться краской. — Ну... тогда я постараюсь ради вас, главная жр... — она осеклась, и в её глазах вспыхнула новая решимость. — Королева-регентша Аяна, — обе кобылы улыбнулись, когда Аяна помогла ей подняться, после чего они вместе отправились готовить страну к новому завтрашнему дню."
 zongo_council_epilogue.6.a:0 "Отделены, но едины. Связь короны и веры вновь подтверждена."
 zongo_council_epilogue.7.t:0 "Пробуждение от кошмара" #Snow
 zongo_council_epilogue.7.desc:0 "Там было так темно. Казалось, что неделями Акида блуждал по бесконечной, лишённой света пустоте. Иногда вдалеке вспыхивала крошечная искра. Он кричал до хрипоты, бежал, пока ноги не начинали гореть от боли, но свет всегда оставался мучительно недосягаемым. В тишине его терзали сожаления: последние, полные яда слова в адрес матери, так и не высказанная профессору благодарность, мечта о реформированном Зонго, которой суждено навсегда оставшаяся несбывшейся. Но больше всего он желал...\n\nВнезапно засиял ослепительный свет, куда ярче прежнего. Акида бежал со всех ног, отчаянно надеясь достичь его. Подойдя ближе, он увидел Аяну – одинокую, стоящую прямо, нетронутую тьмой. — Аяна, это я! Твой Акида! — он бросился вперёд, чтобы обнять свою возлюбленную, но его копыта прошли сквозь её тело, словно зебра была миражом.\n\nИ всё же её образ остался, тихо шепча куда-то во тьму. — Пожалуйста... прошу, проснись, любовь моя. Я больше не могу... я никогда не хотела всего этого... и точно не в одиночку... — его собственные слёзы падали беззвучно, слова затихали эхом, оставаясь неуслышанными. — Зонго нуждается в тебе... нет, это я нуждаюсь в тебе! Ты обещал, что мы вместе достигнем наших мечтаний! Но какой в этом смысл, если мне придётся идти по этому пути одной! — её слёзы падали и исчезали в темноте, но откуда-то издалека Акида почувствовал тепло на своём теле.\n\nТьма рассыпалась, словно разбитое зеркало. Его глаза дрогнули и открылись, явив образ утопающей в полумраке спальни. Его копыто лежало на копыте Аяны, а слёзы кобылы падали на его грудь. Аяна ахнула, когда его передние ноги обвили её, заключая в крепкие объятия. Тело Акиды кричало от боли, но как же приятно было что-то чувствовать! Комната наполнилась её рыданиями, полными облегчения, и его собственным беззвучным смехом, а гривы промокли от общих слёз. В тот момент в мире не существовало ничего важнее. Они вновь нашли друг друга."
 zongo_council_epilogue.7.a:0 "Король проснулся! Акида проснулся!"
 zongo_council_epilogue.8.t:0 "Новое будущее для Зонго" #Snow
 zongo_council_epilogue.8.desc:0 "После пробуждения короля каждое заседание совета было полно томительного ожидания. Невысказанное напряжение – мысль о том, что он может появиться в любой день, чтобы вернуть себе трон – висело в воздухе перед каждой сессией. И сегодня это случилось, хотя и не так, как все представляли. Двери распахнулись, явив короля, за которым следовала королева-регентша, но советники едва узнали истощённую фигуру монарха. Весь зал не отрывая глаз следил за каждым его шагом, задержав дыхание.\n\nАкида не столько шёл, сколько заставлял своё тело двигаться вперёд. Каждый шаг давался ему с трудом: он двигался медленно, непрестанно дрожал, а копыта беспомощно скользили по отполированному полу. Некогда властная фигура теперь казалась усохшей и хрупкой под церемониальными одеяниями. В зале стояла абсолютная тишина, нарушаемая лишь тяжёлым, прерывистым дыханием и слабым звуком шагов. Добравшись до своего места во главе стола, монарх остановился, и весь совет склонился перед ним. Он откашлялся и начал отрывисто говорить.\n\n— Я... отрекаюсь... Аяна... моя жена... станет... вашей... королевой... прощайте... — с этими словами он развернулся и медленно двинулся на выход, пока совет стоял в немом потрясении.\n\nАкида объявил о грандиозных переменах. Но никто не выступил против. Вместо этого Анарбек первым начал аплодировать, и вскоре овации охватили весь зал. Ведь даже если кто-то и не соглашался с его решениями, никто не мог отрицать ту силу воли, которую король проявил, просто явившись перед ними."
 zongo_council_epilogue.8.a:0 "Одно из величайших деяний – найти в себе силу отступить."
 zongo_council_epilogue.9.t:0 "Конституционные сомнения" #Snow
 zongo_council_epilogue.9.desc:0 "Встреча с Акидой прошла успешно: он без колебаний согласился с просьбой Аяны и вернулся к отдыху. Пока изменения ещё не были объявлены публично, именно на Анарбека и Аяну легла обязанность сделать новую конституцию максимально совершенной – свободной от лазеек, что подтачивали прежнюю, и достаточно устойчивой, чтобы не требовать серьёзных поправок долгие годы. Анарбек тихо работал с бумагами, постоянно корректируя какие-то положения и время от времени делая глоток чая, пока не услышал голос Аяны.\n\n— Думаю... я тоже хочу отречься.\n\nАнарбек едва не поперхнулся. Аяна поняла, что произнесла мысль вслух. — П-подожди, я не это имела в виду! — быстро уточнила она. — Просто... Акида наконец вернулся, но он такой хрупкий. Мать всё ещё не приходит в себя, а врачи говорят, что мой Акида, вероятно, никогда полностью не восстановит подвижность задних ног. Да и вернулся он в Зонго, которое едва узнаёт после весьма короткого отсутствия. Я просто... хочу быть рядом с ним, — зебра вздохнула, глядя в потолок. — Прости, что взваливаю на тебя свои переживания и отвлекаю. Нам, наверное, стоит вернуться к работе.\n\nАнарбек наконец взял себя в руки и посмотрел на неё уже серьёзно. — Знаешь... тебе вовсе не обязательно постоянно использовать всю полноту королевской власти. Если захочешь, можешь применять свои полномочия только тогда, когда сочтёшь нужным, а ежедневные дела поручить совету. Ты – первый монарх при новой конституции, так что своим примером можешь создать прецедент того, насколько активно суверен должен вмешиваться в государственные дела.\n\nАяна всерьёз задумалась. Казалось, это решение нельзя принимать сгоряча... и всё же она поняла, что уже знает ответ. — Ты прав, Анарбек. Нечего ходить вокруг да около."
 zongo_council_epilogue.9.a:0 "— За меня говорила усталость. Я не намерена отлынивать от обязанностей." #Ayana keeps being active
 zongo_council_epilogue.9.b:0 "— Совету лучше заняться большинством дел. А я всегда могу прийти на помощь." #Anarbek will become country leader
 zongo_council_epilogue.10.t:0 "Торжественная речь королевы" #Snow
 zongo_council_epilogue.10.desc:0 "С величественного балкона Аяна смотрела на море своих подданных. Столица Зонго, некогда бывшая местом господства строгих традиций, теперь жила новым, современным ритмом. Рядом стоял Анарбек, а позади них расположился Акида. Когда гул толпы стих, она начала говорить.\n\n— Зонголезцы! Мы прошли через испытания войной, были изранены предательством и закалены утратами. Но этот огонь выковал более сильный Зонго! Сегодня опорой нашей силы является не одно существо, а весь народ в целом. Должность королевского советника станет постом премьер-министра, а нынешний советник Анарбек первым займёт его!\n\nТолпа взорвалась оглушительными овациями, но Аяна продолжила: — Акида мечтал увидеть, как его родина поднимается до уровня остального мира. Он видел Зонго светочем истинного прогресса, где на столах всегда есть еда, где каждый может путешествовать, куда пожелает, не зная преград! Зонго, где каждый может просто быть... счастливым. Где жеребята могут быть жеребятами.\n\nОна сделала паузу, её голос стал мягче, но не потерял силы. — Старый Зонго, где семьи боялись, смогут ли накормить своих детей, уходит в прошлое. И потому, как мвенезонго, я даю клятву: мы построим Зонго, где никто больше не будет страдать от произвола власти! Зонго справедливое, честное и такое, что чтит своё прошлое, при этом создавая лучшее будущее для всех своих подданных!\n\nКогда она помахала ликующей толпе, невольная мысль кольнула её. Акида мечтал о новом Зонго... но мог ли он представить его таким? Она украдкой взглянула на него, но его улыбка и аплодисменты рассеяли последние сомнения.\nОни прошли через хаос и боль, чтобы оказаться здесь и сегодня... и при этом справились."
 zongo_council_epilogue.10.a:0 "Да здравствует Зонго! Да здравствует королева!"
 zongo_council_epilogue.11.t:0 "Смена ролей" #Snow
 zongo_council_epilogue.11.desc:0 "Сквозь занавески в комнату пробивался слабый солнечный свет. Акида ещё спал, а Аяна уже была занята делом. Но не привычной для кабинета совета или залов храма суетой, а всего лишь приготовлением завтрака для них двоих. Вернувшись в комнату, она увидела, что её муж по-прежнему мирно спит. Аяна улыбнулась и поставила поднос на тумбочку, чтобы аромат еды сработал как своеобразный будильник.\n\n— Доброе утро, соня, — сказала Аяна, уже листая какие-то бумаги. — Надеюсь, ты хорошо выспался, завтрак рядом с тобой. Не обращай на меня внимания, я просто просматриваю кое-что к завтрашнему заседанию совета. Мне ещё нужно обсудить это с Анарбеком, но и твоё мнение нелишне будет услышать, — она почувствовала какое-то движение и оторвала взгляд от бумаг. — П-подожди, тебе не стоит вставать! — Акида оказался совсем рядом с ней, и она даже не заметила, как он подъехал. Хотя до стола было всего несколько шагов, она не услышала привычного звука колёс его инвалидного кресла.\n\n— ...ся, — это было едва различимое бормотание. Аяна попыталась понять остальную часть фразы, но не смогла. Акида явно смутился, повторяя: — Тебе стоит... ещё немного полежать. Я хочу... обняться... — Аяна покраснела от этих слов, хотя, конечно, не так сильно, как сам Акида. Она знала, что её муж бывает застенчив в таких вещах, но не ожидала, что он попросит так прямо – и что так смутится, говоря это собственной жене. Улыбнувшись, она отложила бумаги, взяла его за копыто и помогла вернуться в постель.\n\nКогда они устроились, Акида быстро нашёл удобное положение, а Аяна легла рядом. Они обнимались, пока она рассказывала о простых повседневных заботах, а Акида в ответ в основном тихо бормотал, иногда смеялся или произносил пару слов. Они разговаривали, пока слабый солнечный свет не стал ярче. Аяна повернулась к мужу, чтобы слегка приобнять его и вернуться к работе, но её обезоружило его спокойное, умиротворённое лицо во сне. Вздохнув, она нежно провела копытом по его щеке и снова прижалась к нему."
 zongo_council_epilogue.11.a:0 "Завтра она вновь станет королевой, но сегодня ей было достаточно просто быть Аяной."
 zongo_council_epilogue.12.t:0 "Приветствие новой эпохи" #Snow
 zongo_council_epilogue.12.desc:0 "С величественного балкона Анарбек осматривал свою страну. Столица Зонго, некогда бывшая местом господства строгих традиций, теперь жила новым, современным ритмом. Позади него расположились Аяна и Акида, наблюдая за тем, что сам кентавр считал своим обрядом посвящения. Когда гул толпы стих, он начал говорить.\n\n— Жители Зонго. Период регентства официально завершён. Однако, как вы, возможно, слышали, наш король не намерен вновь брать власть в свои копыта. Вместо него правящим монархом станет королева Аяна, — он сделал вдох, ощущая на себе тяжесть взглядов толпы. — Хочу представиться для тех, кто не знает меня: я – королевский советник Анарбек. И, заручившись полным доверием Короны и совета, я принимаю должность премьер-министра, чтобы вести Зонго вперёд.\n\nТолпа, с этого расстояния выглядевшая морем далёких точек, казалась растерянной. Очки Анарбека чуть сползли из-за нервной дрожи, которую он сам не заметил. Он поправил их, и в этом простом движении вспомнил совет Акиды: "Представь, что это урок". Сделав ещё один глубокий вдох, он продолжил: — Главным достижением последних лет стали не только рельсы или фабрики. Нет, нечто куда большее. Взгляните вокруг: Зонго стал маяком прогресса и просвещения! Мои обязанности? Они останутся теми же, что и в тот день, когда меня впервые призвали в эту страну: обеспечить движение Зонго вперёд с как можно меньшими препятствиями, — он обернулся и страстно указал на монархов позади себя. — Я, Анарбек, делаю это во имя чести нашего короля с королевой, а также каждого из вас! Да здравствует Зонго!\n\nКогда он закончил, тяжело дыша и снова поправляя съехавшие набок от его пыла очки, за спиной раздались хлопки копыт. Обернувшись, он увидел, как аплодисменты стремительно превращаются в оглушительный рёв – всё море собравшихся взорвалось ликованием. Кентавр быстро привёл себя в порядок, и лёгкая улыбка появилась у него на лице, когда он смотрел на живую, дышащую страну, которой теперь служил.\n— Ну что ж, — подумал он. — Урок так урок. Пусть и сразу для нескольких миллионов."
 zongo_council_epilogue.12.a:0 "Да здравствует Зонго!"
 zongo_council_epilogue.13.t:0 "Долгожданная экспертная оценка" #Snow
 zongo_council_epilogue.13.desc:0 ""Речь удалась," — подумал Анарбек. Хотя после многих лет в роли советника было странно оказаться в роли главы страны, всё это напомнило ему времена преподавания. Сегодня кентавру предстояло рассмотреть ещё один, последний научный труд. Он просматривал бумаги, пока Акида нервно сидел рядом.\n\n— Как твой наставник, я помогал тебе защищать эту работу... а теперь увидел её в действии, — он положил бумаги и тяжело вздохнул. — Цифры надёжны, даже в твоём первом черновике всё было рассчитано верно. Но цена в жизнях и количестве существ, лишившихся дома... это пугает, — сердце Акиды готово было вырваться из груди. Даже сейчас он смотрел на кентавра с глубоким уважением.\n\n— Однако как твой советник я разделяю ответственность за всё это. Были и другие обстоятельства, которые повлияли на ситуацию: поступки твоей матери были неизбежны, поэтому я не стал считать их твоей ошибкой. Аяна и служители веры неустанно трудились, чтобы не допустить роста бедности, и ты заслуживаешь похвалы за то, что прислушивался к её советам, — Анарбек откашлялся. — В целом, хотя всё могло пройти лучше, скорость и масштаб модернизации Зонго станут примером для будущих исследований. Я уже работаю над статьёй об этом, хотя новые обязанности задерживают её завершение. В общем, я положительно оцениваю твою работу, — кентавр мягко улыбнулся. — Хотя признаю, что могу быть немного предвзятым.\n\nАкида наконец выдохнул. Он едва мог дышать с того момента, как кентавр начал говорить. — Хах... будто я снова выпускник в Сентурии... — пробормотал он, глядя в небо. — Интересно, где сейчас Зайлс... весь этот стресс от правления... а теперь и восстановления... боюсь, я позабыл и подвёл своих друзей.\n\n— Для нас время всегда в дефиците, но я уверен, он ответит на твой призыв, — сказал Анарбек, поднимаясь. — Более того, я немедленно подготовлю письмо! Он вряд ли откажется от официального приглашения в качестве почётного гостя! — когда Акида поднял копыто в знак протеста, кентавр лишь улыбнулся. Он явно стал куда более открытым, чем в свои преподавательские годы."
 zongo_council_epilogue.13.a:0 "Акида смотрел на кентавра с восхищением. Казалось, его наставнику по плечу абсолютно всё."

