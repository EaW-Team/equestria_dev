 FRE_Scotts_arive_for_help_tooltip:0 "§GК нам спустились дивизии кланов горцев!§!"
 FRE_nimbusian_cooperation:0 "Сотрудничество с Нимбусией"
 FRE_wittenland_cooperation:0 "Сотрудничество с Виттенлендом"
 FRE_buy_a_ship_tt:0 "Мы купим эсминец, который заложит наш флот."
 FRE_breezies_are_angry:0 "Бризи злы на вас"
 POLITICS_RAVEN_NICCALL_DESC:0 "Рэйвен 'Огненное сердце' ник Колл является великим магистром монастыря Возвышенного Ворона. Осиротев в возрасте восьми лет, когда её родители погибли во время нападения низшего демона на её деревню, она была отправлена в монастырь Анам-Тене, где быстро овладела местными магическими искусствами, включая вызов Анамарма, раньше, чем её сверстники. Во время своей первой миссии её учитель и пятеро учеников были убиты двумя высшими демонами, но она и ещё трое выживших, включая Кримзон НикХарт, смогли продержаться до прибытия помощи и за это были посвящены в монахи. С тех пор она быстро продвигалась по карьерной лестнице, став в итоге великим магистром одного из самых престижных монастырей и представителем всех монахов в Прив Ховарле."
 POLITICS_CRIMSON_NICHEART_DESC:0 "Как наследнице одного из престижных кланов Харт, Кримзон всегда была предначертана роль лидера. В возрасте десяти лет она присоединилась к монастырю Ард Фихяхь для изучения Анам-Тене и быстро стала опытным воином и близкой подругой великого магистра Рэйвен НикКолл. Во время своей первой миссии её учитель и пятеро учеников были убиты двумя высшими демонами, но она и ещё трое выживших, включая Рэйвен, смогли продержаться до прибытия помощи и за это были посвящены в монахи.\n\nПокинув монастырь, чтобы стать тишихом клана Харт, она стала уважаемым государственным деятелем и впоследствии была избрана Тишяхом всего Понияна."
 RIV_annexed_FRE:0 "Речная Федерация аннексировала Пониян"
