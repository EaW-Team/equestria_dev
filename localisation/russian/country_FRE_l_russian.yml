 #### Focuses ####
 FRE_begin_rapid_industrialisation:0 "Быстрая индустриализация"
 FRE_begin_rapid_industrialisation_desc:0 "По сравнению с соседями наша страна – отсталое захолустье. Наши пони живут в нищете и работают не покладая копыт просто ради выживания. У Тишяха есть амбициозный план по индустриализации нашей страны, но многие кланы и в особенности монахи выступают против этих начинаний, потому что они идут врознь с традициями."

 FRE_call_for_reform:0 "Призыв к реформе"
 FRE_call_for_reform_desc:0 "Некоторые, сравнивая нашу страну с соседями, могли бы счесть её бедной, но мы богаты традициями и гордимся этим. Наши пони живут в бедности и работают не покладая копыт просто чтобы выжить. И хотя у Тишяха есть грандиозные амбиции по повышению уровня жизни, она должна сдерживать себя, чтобы мы оставались верны тому, что нам дорого."

 FRE_invite_foreign_experts:0 "Пригласите иностранных экспертов"
 FRE_invite_foreign_experts_desc:0 "Мы не обладаем достаточными навыками для построения современного индустриального общества, но наши друзья могут нам помочь. Многие пони вокруг нас сделали удивительные открытия, и некоторые из них, возможно, готовы поддержать Пониян."

 FRE_invite_wittenland_teachers:0 "Пригласить школьных учителей из Виттенленда"
 FRE_invite_wittenland_teachers_desc:0 "Виттенленд – это маяк науки и познания. Их единороги, пусть и несколько декадентские, компенсируют это умом. Кто лучше них обучит наших пони чтению и математике? Некоторые традиционалисты полагают, что пони должны оставаться на полях или постигать древние пути монахов, но мы не можем вечно жить прошлым."

 FRE_land_reformes:0 "Земельная реформа"
 FRE_land_reformes_desc:0 "Распределение земли между кланами и общинами основывается на древних устных договорённостях и преданиях, что нередко ведёт к спорам и неиспользованию хороших земельных участков. Если мы направим на место добросовестных землемеров для урегулирования этих споров и запишем, что кому принадлежит, то сможем окончательно решить земельный вопрос."

 FRE_agriculture_reformes:0 "Сельскохозяйственная реформа"
 FRE_agriculture_reformes_desc:0 "Используя современные методы ведения сельского хозяйства, мы обеспечим пони едой круглый год и избавим их от изнурительного труда. В Речных Землях наши модные товары (создаваемые фермерами на полях) уже стали востребованной роскошью, и рост местного продовольствия и промышленности позволит перенаправить производственные мощности на другие задачи."

 FRE_long_term_economic_planning:0 "Долгосрочное экономическое планирование"
 FRE_long_term_economic_planning_desc:0 "Краткосрочное планирование неизбежно приведёт к катастрофе. Мы должны думать о далёком будущем, чтобы построить лучшее общество. Теперь, когда мы можем обеспечить продовольственную безопасность, реализовывать крупные проекты станет намного легче, однако мы должны следить за тем, чтобы эти проекты не посягали на древние святыни."

 FRE_develop_arms_industry:0 "Развитие военной промышленности"
 FRE_develop_arms_industry_desc:0 "Большой внешний мир полон не только чудесами технологий. Мы узнали и о многих других нациях, которые жаждут расширить свои владения и не остановятся, пока последние свободные народы Эквуса не будут покорены. Если мы хотим иметь шанс на выживание в этом мире, то просто обязаны превратить наши местные кузницы и арсеналы в настоящие оружейные заводы."

 FRE_tartan_mass_production:0 "Массовое производство тартана"
 FRE_tartan_mass_production_desc:0 "Тартан – наш самый востребованный товар. Мы должны наладить массовое производство этой ткани, чтобы удовлетворить торговый спрос. Хотя это вынудит многих ремесленников переехать в города и работать на заводах, в конечном счёте такое решение пойдёт на благо стране."

 FRE_welth_of_the_mountains:0 "Богатство гор"
 FRE_welth_of_the_mountains_desc:0 "Высокие вершины нашей прекрасной страны очень долго оставались нетронутыми. Об этих горах ходят легенды, и многие монахи возвели там свои обители, однако легенды и монастыри нам не помогут. Мы должны вскрыть эти древние недра и забрать богатства, которые там хранятся!"
 
 FRE_iron_stallion:0 "Железный жеребец"
 FRE_iron_stallion_desc:0 "Поезда – это большие металлические звери, которые тянут вагоны, полные грузов и пони. Мы должны сделать так, чтобы эти звери могли добраться до каждого уголка нашей страны. Все граждане будут связаны со столицей и со всем остальным миром за её пределами. В конце концов, все ж мы пониянцы!"

 FRE_reforme_monastic_schools:0 "Реформа монастырских школ"
 FRE_reforme_monastic_schools_desc:0 "Монахи Анам-Тене уже давно обеспечивают образование молодёжи нашей страны. Мы должны поощрять всех пони учиться у них. Многое ещё предстоит узнать из нашего прошлого, и, работая вместе с монастырями над тем, чтобы сделать образование более доступным, мы, наконец, сможем справиться с бременем неграмотности."

 FRE_encourage_free_enterprise:0 "Поощрение свободного предпринимательства"
 FRE_encourage_free_enterprise_desc:0 "Наши пони испытывают некоторую усталость от новых веяний промышленной революции, и поэтому мы должны заставить их поверить в собственные силы. Наша страна полна пони с большими идеями, им просто нужна уверенность, чтобы начать реализовывать их и строить свой бизнес. Так наша экономика будет расти!"

 FRE_non_disturbance_policy:0 "Политика невмешательства"
 FRE_non_disturbance_policy_desc:0 "Триахи – лидеры некоторых кланов – уведомили нас, что они не считают нужным участвовать в нашей политике восстановления. Кто мы такие, чтобы идти против воли этих племён? Мы примем политику невмешательства по отношению к этим кланам и позволим горцам Понияна заниматься своими делами."

 FRE_reach_out_to_the_tribes:0 "Протянуть копыто потерянным племенам"
 FRE_reach_out_to_the_tribes_desc:0 "Мы должны подключить каждого пони к нашим усилиям по модернизации. Если мы проявим уважение и терпение, то мы сможем убедить в наших благих намерениях даже самые упрямые племена горцев. Давайте отправим посланников и монахов для переговоров с триахами и рассмотрения вопросов их племён."

 FRE_drag_them_into_the_future:0 "Затащить их в будущее"
 FRE_drag_them_into_the_future_desc:0 "Есть те, кто всё ещё цепляется за собственные уклады. Мы должны показать им, что путь в будущее – это единственно верный путь для нашего выживания. Подобные упрямые селяне должны быть "обучены современности", даже если они не хотят этого. Давайте избавимся от архаичных традиций и привилегий и оставим наше племенное прошлое позади."

 FRE_power_to_the_taioseach:0 "Власть Тишяха"
 FRE_power_to_the_taioseach_desc:0 "Прив Ховарле за долгое время существования сослужил хорошую службу, но постоянная грызня между триахами и тишихами ограничивает его. Нужно дать больше власти Тишяху, чтобы мелкие разногласия не мешали прогрессу"

 FRE_a_new_clann:0 "Новый Ховарле"
 FRE_a_new_clann_desc:0 "Прив Ховарле за долгое время своего существования сослужил хорошую службу, но пришло время реформировать его в более всеобъемлющую и значимую форму правления, соответствующую современным реалиям. Мы изменим представительство, сделав его основой демократическое голосование вместо племенной преданности – так пони получат право голоса в правительстве!"

 ### ARMY FOCUSES ###

 FRE_native_army:0 "Племенная армия"
 FRE_native_army_desc:0 "Для нашей защиты мы не можем полагаться на других, даже на наших ближайших друзей. Пониян создаст свои вооружённые силы, в которых каждый будет готов защитить свою древнюю родину и магию, называющую эти горы своим домом."

 FRE_keep_the_old_ways:0 "Придерживаться старых укладов"
 FRE_keep_the_old_ways_desc:0 "Загадочные и мудрые монахи часто брались за защиту нашей страны, сражались против монстров и даже угроз из потустороннего мира. Исходя из этого, нам следует внедрить их вековые традиции в наши вооружённые силы, чтобы наши солдаты также могли воспользоваться их мудростью."

 FRE_national_army:0 "Пониянская национальная армия"
 FRE_national_army_desc:0 "Мы реорганизуем наши вооружённые силы, чтобы они соответствовали современным требованиям. В старину наши войска опирались на кехярнских застрельщиков и ритуальные поединки монахов, но теперь нам нужна национальная профессиональная армия, способная защитить нашу дорогую Пониян-ан-Ти-Фада!"

 FRE_monks_in_the_army:0 "Интегрировать монахов Анам-Тене"
 FRE_monks_in_the_army_desc:0 "Монахи уже хорошо обучены боевым искусствам и станут крепким ядром элитных войск для нашей армии. Благодаря знанию священной земли и магической связи со своей родиной они докажут, что монахи – наши непоколебимые стражи."

 FRE_secrets_of_anam_teine:0 "Секреты Анам-Тене"
 FRE_secrets_of_anam_teine_desc:0 "Древняя магия пониянских монастырей Анам-Тене хранит множество секретов. Один из них – ритуал призыва анамарма, или, иначе, оружия души. Если позволить нашим монахам изучать древние магические знания, они смогут усилить свою магию, что сделает нашу армию ещё более грозной."
 
 FRE_trade_with_breezies:0 "Торговля с бризи"
 FRE_trade_with_breezies_desc:0 "Бризи живут в волшебном царстве, параллельном нашему, где находятся бесконечные запасы чистых магических кристаллов. Мы должны заключить сделку и заполучить кристаллы. На переговоры с ними мы пошлём наших самых сообразительных ораторов, так как бризи порой любят обманывать, а нам совсем не хочется, чтобы кто-нибудь продал им своего первенца!"

 FRE_magic_guns:0 "Боевая духовная энергия"
 FRE_magic_guns_desc:0 "Обитающие вокруг нас духи весьма могущественны. Обычное стальное оружие не может навредить им, но их энергию всё же можно использовать. Если мы захватим духов и присвоим их силу, то сможем создавать мощные магические артефакты в качестве оружия."

 FRE_soul_weapons:0 "Сила анамарма"
 FRE_soul_weapons_desc:0 "Анамарм, или оружие души – это физическое представление души пони, используемое для защиты себя и других существ. Научиться владеть своим анамармом – обряд посвящения для кандидатов в монахи Анам-Тене. Мы должны сделать так, чтобы этому мастерству обучали и остальных наших воинов."

 FRE_local_officer_school:0 "Наша собственная офицерская школа"
 FRE_local_officer_school_desc:0 "Мы не можем позволить триахам с их племенными традициями вести наши армии в бой; нам нужно воспитать новое поколение офицеров на современном уровне, и поэтому мы обязаны создать собственную офицерскую школу. Изучим же искусство войны, чтобы защитить мир!"

 FRE_trible_militias:0 "Интегрировать племенные ополчения"
 FRE_trible_militias_desc:0 "Мы должны интегрировать племенные ополчения, полки и отряды в национальную армию. Чтобы каждый пони мог служить, потребуется стандартизировать униформу, устав, оружие, снаряжение и пайки. Для некоторых племён придётся переработать всю цепочку командования – или же вовсе создать её с нуля."

 FRE_weapon_development:0 "Современное огнестрельное оружие"
 FRE_weapon_development_desc:0 "Если мы хотим вооружить наши не-магические войска так же хорошо, как и наших монахов, то должны разработать современное огнестрельное оружие. К счастью, наши кузнецы быстро обучаются оружейному мастерству."
 
 FRE_hill_fighters:0 "Владыки холмов и долин"
 FRE_hill_fighters_desc:0 "Склон ли то, скала или утёс – не имеет значения, ибо мы живём здесь уже много веков и передвигаемся по этой местности так же легко, как и по равнинам. Мало кто из пони так же хорошо знаком с этой местностью, как мы, и в этом заключается наша сила."
 
 FRE_radio_implementation:0 "Внедрение радио"
 FRE_radio_implementation_desc:0 "Да, это верно, что традиционно наши воины использовали пронзительные боевые кличи, чтобы общаться на расстоянии, но радио кажется гораздо более универсальным и удобным."

 FRE_artillery_development:0 "Достать большие пушки"
 FRE_artillery_development_desc:0 "Похоже, современная война придерживается тех же принципов, что и мы: чем больше оружие, тем оно эффективнее. Давайте разовьём эту идею, создавая для нашей армии пушки крупного калибра и используя их большую дальность для поражения врагов."

 FRE_mountain_home:0 "Наш горный дом"
 FRE_mountain_home_desc:0 "Мы – горцы! Места, которые другие называют непригодными для жизни горами, мы зовём домом, а непроходимую по их мнению местность – вызовом. Мы – владыки высоких вершин, и наши враги скоро поймут, как глупо бросать нам здесь вызов."

 FRE_foreign_army_reform:0 "Иностранные армейские реформаторы"
 FRE_foreign_army_reform_desc:0 "Отбросив гордость, мы вынуждены признать, что очень мало знаем о современных способах ведения войны и современной технике. Если мы хотим превратить наши вооружённые силы в армию, способную защитить страну, нам нужно обратиться за помощью к друзьям."

 FRE_nimbusian_army:0 "Нимбусийские стратеги"
 FRE_nimbusian_army_desc:0 "В прошлом нимбусийские стратеги сыграли жизненно важную роль в обеспечении победы над грифонами. Мы не сомневаемся, что их стратегическое планирование и тактика по-прежнему на высоте. Давайте свяжемся с Нимбусией и узнаем, заинтересует ли их помощь нашим военным!"

 FRE_wittenland_army:0 "Маги Виттенленда"
 FRE_wittenland_army_desc:0 "Единороги Виттенленда долгое время исследовали секреты этих земель. Они, несомненно, одни из самых мудрых магов в мире. Если мы попросим их о помощи, то наверняка многому научимся у их исследователей."

 FRE_nimbusian_officer_school:0 "Нимбусийская военная академия"
 FRE_nimbusian_officer_school_desc:0 "Мы снова свяжемся с нимбусийцами и попросим их построить академию в Даль-Море, где наши перспективные офицеры смогут изучать классические труды нимбусийских генералов и их стратегии. Видят духи: если мы хотим увеличить армию, нам понадобится много новых генералов, и эти знания будут очень полезны!"

 FRE_pegasi_assault_groups:0 "Штурмовые группы пегасов"
 FRE_pegasi_assault_groups_desc:0 "Мы всегда предпочитали сражаться на земле и никогда не думали об использовании крылатых солдат, однако если мы хотим эффективно бороться с грифонами, то должны найти применение тем пони, кто может лицом к лицу сражаться с этими пташками. К счастью, наши нимбусийские союзники кое-что знают о воздушной войне."

 FRE_adopt_foreign_doctraines:0 "Внедрить иностранные доктрины"
 FRE_adopt_foreign_doctraines_desc:0 "Крупные конфликты требуют доктрин, рассчитанных на масштабы массовой войны. Наши способы ведения боя эффективны при небольших столкновениях или при сражениях с демонами, однако когда враг – другая нация, эти тактики становятся бесполезны. Нам следует изучить доктрины наших друзей и найти ту, что подойдёт Понияну."

 FRE_army_motorisation:0 "Моторизация армии"
 FRE_army_motorisation_desc:0 "Хотя наши пони быстры и подвижны, после целого дня марша вести бой становится тяжело. Однако если мы воспользуемся грузовиками, то сможем быстро перебрасывать войска туда, где они нужны. Конечно, в нашей горной местности такая техника может быть не слишком полезна, но мы надеемся, что война не доберётся до этих мест."

 FRE_armoured_warfare:0 "Бронетанковая война"
 FRE_armoured_warfare_desc:0 "Новейшие чудеса технического прогресса создали транспорт на бензиновом двигателе. Некоторые страны быстро перепрофилировали эти чудеса для использования на поле боя, снабдив их бронёй, и таким образом получили танк. Хотя они далеко не красивые и очень громкие, мы всё же можем найти им применение."

 FRE_magical_training:0 "Обучение магии"
 FRE_magical_training_desc:0 "Честно говоря, по сравнению с магами Виттенленда, наши единороги совершено неумелы в своей магии, и даже другим расам есть чему у них поучиться. Маги Виттенленда готовы помочь нам узнать больше о наших расовых способностях, и нам стоит принять их помощь!"

 FRE_unicorn_corps:0 "Создать корпус единорогов"
 FRE_unicorn_corps_desc:0 "Виттенленд показал нам, что единороги – сильнейшие носители магии. Сконцентрировав единорогов в специальных армейских корпусах, мы сосредоточим нашу огневую мощь. Корпуса единорогов будут верхушкой рога, который сломает наших врагов."

### AIR FOCUSES ###

FRE_build_airstrips:0 "Построить авиабазы"
FRE_build_airstrips_desc:0 "Если мы хотим хотя бы подумать о создании военно-воздушных сил, то должны начать с создания места для взлёта самолётов. Мы должны выделить участок у столицы для первой авиабазы Понияна!"

FRE_buy_fighters:0 "Закупить истребители"
FRE_buy_fighters_desc:0 "Нимбусия имеет много истребителей. Для создания своих ВВС было бы неплохо попросить их продать несколько. Наши надёжные друзья наверняка захотят нам помочь, поэтому давайте отправим предложение как можно скорее!"

FRE_buy_bombers:0 "Закупить бомбардировщики"
FRE_buy_bombers_desc:0 "У Озерграда есть тяжёлые самолёты, которые пригодятся нам для создания бомбардировщиков. Возможно, озерных пони заинтересует сделка. С правильной ценой они, возможно, будут готовы расстаться с некоторыми из своих самолётов."

FRE_air_doctrain:0 "Координация наших самолётов"
FRE_air_doctrain_desc:0 "Самолёты с пушками все хороши, но без правильной тактики их использование будет весьма ограниченным. Давайте выберем воздушную доктрину, чтобы повысить эффективность нашего ограниченного запаса самолётов."

FRE_start_fighter_industry:0 "Запустить производство истребителей"
FRE_start_fighter_industry_desc:0 "Когда речь идет о летательных средствах, мы не можем вечно полагаться на наших друзей. Мы должны строить собственные самолёты, чтобы быть самостоятельными. Создание истребительной промышленности потребует значительных инвестиций, но у нас хватает средств, чтобы хотя бы попробовать."

FRE_start_bomber_industry:0 "Завод по производству бомбардировщиков"
FRE_start_bomber_industry_desc:0 "Если мы хотим самостоятельно производить бомбардировщики, нам нужен завод, специализирующийся на их выпуске. Мы направим часть средств на создание такого предприятия, чтобы начать производство отечественных моделей."

FRE_expand_fighters:0 "Править небесами"
FRE_expand_fighters_desc:0 "Мы не можем полагаться на другие страны, которые будут производить для нас самолёты. Мы должны создать собственное производство истребителей, пригодных для ведения боевых действий в небе."

FRE_expand_bombers:0 "Охранять землю"
FRE_expand_bombers_desc:0 "Чтобы подготовить нашу страну к производству этих небесных гигантов, мы должны сначала убедиться, что действительно понимаем как они устроены."

FRE_support_the_industry:0 "Расширить авиапромышленность"
FRE_support_the_industry_desc:0 "Когда мы уверенно освоили искусство воздухоплавания, мы можем приступить к осуществлению наших планов по активному расширению ВВС и превращения их из новинки в силу, с которой следует считаться."

### NAVY FOCUSES ###

FRE_build_a_dock:0 "Настоящая военно-морская база"
FRE_build_a_dock_desc:0 "Наш портовый город Лимриг-Гял расположен в бухте у непокорного Восточного океана. Если мы хотим строить суда, достойные этого океана, нам необходима верфь, способная их создать, а также порт, который сможет принимать корабли такого размера."

FRE_buy_a_ship:0 "Наш первый корабль"
FRE_buy_a_ship_desc:0 "Мы спросим наших друзей, есть ли у них какие-то старые корабли, и таким образом сможем начать строить собственный флот. Мы можем начать с небольшого старого эсминца и со временем наш флот сможет стать настоящей армадой!"

FRE_cruisers:0 "Крейсер свободных пони"
FRE_cruisers_desc:0 "Крейсерские корабли тяжелее и имеют большую дальность, чем эсминцы. Они являются идеальным промежуточным звеном для нашего флота, поэтому давайте исследуем, как их построить."

FRE_develop_navy_doctrain:0 "Создать командование ВМФ"
FRE_develop_navy_doctrain_desc:0 "Для координации наших кораблей нам понадобится командование флотом. Для этого мы можем преобразовать офис начальника порта в Лимриг-Гяле в адмиралтейство, где для управления нашим флотом используются новейшие технологии!"

FRE_expand_navy_base:0 "Расширить верфи"
FRE_expand_navy_base_desc:0 "Для быстрого строительства кораблей нам, по-видимому, потребуется больше одной верфи. Хотя наши судостроители до сих пор озадачены этой идеей, мы должны построить дополнительные верфи, чтобы быстрее строить наши корабли!"

FRE_destroyers:0 "Обновить эсминцы"
FRE_destroyers_desc:0 "Наш первый корабль был эсминцем, но мы нашли много способов улучшить его конструкцию. Следует использовать наш опыт и исследования для создания более современного класса эсминцев. Затем эти корабли могут использоваться для сопровождения гражданских судов и патрулирования побережья."

FRE_subs:0 "Уйти под воду"
FRE_subs_desc:0 "Здравый смысл подсказывает, что корабль, находящийся под водой, бесполезен. Тем не менее некоторые из наших самых изобретательных инженеров предложили идею судна, способного погружаться и свободно передвигаться под водой. Эта новая концепция удивит наших врагов – они никогда не увидят приближения таких подводных лодок!"

 ### Event ###
 freeponies.1.t:0 ""
 freeponies.1.d:0 ""
 freeponies.1.a:0 ""

 #Event for Nimbusia to sell some fighters. From FRE focus.
 freeponies.2.t:0 "[From.GetName] хочет купить несколько истребителей"
 freeponies.2.d:0 "Наши друзья из Понияна решили создать собственные ВВС. Хотя эти пони только что построили свой первый аэропорт, они уже стремятся создать воздушный флот с помощью иностранных самолётов. Логичным первым шагом для них будет достать истребители. Они предложили крупную сумму – главным образом в форме ценной одежды – в качестве компенсации за то, что мы предоставим им некоторые из наших старых самолётов. Стоит ли нам подписать эту сделку?" 
 freeponies.2.a:0 "Помочь союзникам – помочь себе." #Leads to freeponies.3
 freeponies.2.b:0 "Мы должны оставить эти самолёты себе." #Leads to freeponies.4

 freeponies.3.t:0 "Государство [From.GetName] продало нам несколько истребителей"
 freeponies.3.d:0 "Наши друзья из государства [From.GetName] приняли наши условия! Самолёты скоро прибудут, и мы сможем начать подготовку лётчиков! Это большая победа дипломатии в рамках Речной Коалиции, которая показывает, что мы действительно можем полагаться на наших друзей."
 freeponies.3.a:0 "Отлично!"

 freeponies.4.t:0 "[From.GetName] не хочет продавать нам истребители"
 freeponies.4.d:0 "К сожалению, наши друзья из государства [From.GetName] не хотят продавать нам истребители. Они сказали, что предпочитают держать самолёты при себе из соображений безопасности. Похоже, что нам придётся создавать свои собственные самолёты, если мы действительно хотим использовать наш новый аэродром..."
 freeponies.4.a:0 "Ох..."

 #Event for Lake City to sell some bombers. From FRE focus.
 freeponies.5.t:0 "[From.GetName] хочет купить несколько бомбардировщиков"
 freeponies.5.d:0 "Наши друзья из Понияна решили создать собственные ВВС. Хотя эти пони только что построили свой первый аэропорт, они уже стремятся сформировать воздушный флот с помощью иностранных самолётов. Вместо того чтобы начинать с небольших истребителей, они нацелились на более тяжёлые бомбардировщики. Они предложили крупную сумму – главным образом в виде ценной одежды – в качестве компенсации за то, что мы предоставим им некоторые из наших старых самолётов. Стоит ли нам подписать эту сделку?"
 freeponies.5.a:0 "Конечно, они ведь часть коалиции." #Leads to freeponies.6
 freeponies.5.b:0 "Какой толк от самолётов в их копытах." #Leads to freeponies.7

 freeponies.6.t:0 "Государство [From.GetName] продало нам несколько бомбардировщиков"
 freeponies.6.d:0 "Наши друзья из государства [From.GetName] приняли наши условия! Самолёты скоро прибудут, и мы сможем начать подготовку лётчиков! Это большая победа дипломатии в рамках Речной Коалиции, которая показывает, что мы действительно можем полагаться на наших друзей."
 freeponies.6.a:0 "Отлично!"

 freeponies.7.t:0 "[From.GetName] не хочет продавать нам бомбардировщики"
 freeponies.7.d:0 "К сожалению, наши друзья из государства [From.GetName] не хотят продавать нам бомбардировщики. Они сказали, что предпочитают держать самолёты при себе из соображений безопасности. Похоже, что нам придётся создавать собственные самолёты, если мы действительно хотим использовать наш новый аэродром..."
 freeponies.7.a:0 "Ох..."
 
 #Triggerd by focus: FRE_welth_of_the_mountains
 freeponies.8.t:0 "Бризи возмущаются"
 freeponies.8.d:0 "Похоже сказки, которые мы рассказываем жеребятам, оказались правдой. В попытках индустриализации мы нарушили покой древних жилищ маленьких существ, и, несмотря на предупреждения монахов и рабочих, которые бросали инструменты и отказывались рубить деревья бризи, мы всё же осквернили их обители.\n\nТеперь бризи покинули свои дома и вызвали хаос на наших новых шахтах: они дразнили рабочих, мешали им, выводили из строя технику и в целом создавали большие неудобства. Одно из существ передало послание напрямую Тишяху: бризи требуют прекратить добычу кристаллов и других минералов. Они предупреждают, что не будут сидеть сложа крылья, пока мы разрушаем их жилое пространство, и если мы не уступим, то пойдут на более серьёзные шаги. Игнорирование их требований может оказаться катастрофическим, но уступки могут выглядеть как проявление слабости правительства."
 freeponies.8.a:0 "Мы можем пойти на некоторые уступки."
 freeponies.8.b:0 "Кого волнует, что стрекочут эти жуки?!" #Leads to freeponies.9

 freeponies.9.t:0 "Голод из-за бризи"
 freeponies.9.d:0 "Мрачные вести, Тишях! По всей стране слышно одно и то же: бризи навлекли на нас страшную месть. Хоть обычно их заклинания обычно помогают нам, магические существа из потустороннего мира уничтожили весь урожай Понияна. Мы ничего не можем сделать, так как их волшебство как будто засолило почву. Все наши поля бесплодны, и весь народ винит нас за это. Без надежды и без идей, нам остаётся полагаться только на импорт. Миллионы могут умереть от голода из-за нашего высокомерия. Нет! Из-за вашего высокомерия! Ну, по крайней мере, у нас всё ещё есть природные ресурсы, хотя нам скорее всего придётся продать большую их часть, просто для того, чтобы остаться в живых."
 freeponies.9.a:0 "Нам стоило прислушаться к ним..."

 #Trigger: -50% Stability and is taking the rapid industrialisation rout. This can repeat.
 freeponies.10.t:0 "Недовольство Прив Ховарле"
 freeponies.10.d:0 "Прив Ховарле недоволен направлением, в котором движется страна. Они требуют, чтобы Тишях отменила свои планы. Протестующие триахи и тишихи стали одеваться в традиционную одежду с их тартанами и гербами. Сторонники реформ в ответ стали одеваться в современную одежду, некоторые даже надели галстуки. Чтобы добиться согласия в совете, нужно добиться согласия среди кланов. Безусловно, это будет означать замедление модернизации."
 freeponies.10.a:0 "Пойти на переговоры с консервативными кланами."
 freeponies.10.b:0 "Мы не можем идти на компромисс, когда почти достигли цели."

 #Trigger: Has invited Wittenland Teachers. Stability less then 50%
 freeponies.11.t:0 "Протест монахов"
 freeponies.11.d:0 "Большое число монахов Анам-Тене отправились в столицу на молчаливый протест перед зданием совета. Их мрачные лица и отказ двигаться, несмотря на экстремальную погоду последних дней, вызвали волну поддержки их требованиям. Монахи передали в парламент письмо, в котором утверждается, что приглашённые нами ранее учителя из Виттенленда разрушают нравственное и культурное наследие молодёжи страны.\n\nМы уже не в первый раз замечаем, как молодёжь дразнит монахов, мешая им выполнять свою работу. Видимо, преподаватели из Виттенленда учат их, что монахи – всего лишь отсталая и смехотворная традиция. Несколько триахов подготовили встречное предложение для монахов, но это, несомненно, ослабит наши усилия по модернизации."
 freeponies.11.a:0 "Мы должны держать этих учителей под контролем."
 freeponies.11.b:0 "Время монахов закончилось." #Triggers event freeponies.11

 freeponies.12.t:0 "На нас напал демон!"
 freeponies.12.d:0 "Демон разрушил одну из наших фабрик своей тёмной магией. При появлении этого нечистого создания всех рабочих эвакуировали, а на место вызвали монахов – наших древних защитников от зла. Однако, увидев, что все пони в безопасности, прибывшие монахи отказались вступать в бой с демоном. Вместо этого они принялись читать лекции местным рабочим, пока их фабрика продолжала гореть. Монахи заявили, что могли бы легко предотвратить разрушение, но не после того, как местные жители обратились против них и разорили их монастырь. Если монахи должны уважать перемены в обществе, то и остальные пони обязаны уважать традиции и сохранять святыни невредимыми. Возможно, если бы мы пошли на компромисс, этой катастрофы удалось бы избежать."
 freeponies.12.a:0 "Нам стоило прислушаться к ним..."

 #Trigger less than 10% stability and is industrialising.
 freeponies.13.t:0 "Вотум недоверия"
 freeponies.13.d:0 "В Прив Ховарле началось обсуждение последствий политики индустриализации, начатой Тишяхом. Многие из триахов беспощадно осуждали её политику, ссылаясь на множество бед, принесённых в Пониян модернизацией. В итоге большинством голосов было принято решение выдвинуть вотум недоверия с требование отставки Тишях за действия против нации и за уничтожение древних памятников. В законах не указано, должен ли Тишях подчиниться подобному, но пытаться усидеть будет довольно проблематично."
 freeponies.13.a:0 "Возможно, они всё время были правы..."
 freeponies.13.b:0 "Нет, это не я ошибаюсь, а они." #Leads to freeponies.14
 
 #Trigger less than 1% Stability
 freeponies.14.t:0 "Гражданская война!"
 freeponies.14.d:0 "Страна разделилась из-за политики быстрой модернизации Тишяха, и сопротивление ей постепенно нарастало. Увидев свой шанс, союз кланов и монахов поднял восстание против центрального правительства Тишяха, которое, по их утверждениям, разрушает нацию. Теперь народ Понияна находится в войне не с иноземцами, не с древним злом, но друг с другом. Тишях должна показать превосходство своих порядков силой или отдать всё реакционерам, которые разрушат всё, к чему она стремилась."
 freeponies.14.a:0 "Общий дом, разделившийся сам в себе, не устоит."

 #Clansponies-Division have arrived
 freeponies.15.t:0 "Прибытие горцев!"
 freeponies.15.d:0 "Призыв к войне эхом разносится по лесам и горным вершинам – и находит ответ! Горн проносится через горы, созывая все скрытые кланы на битву. С каждым днём в город [FRE.Capital.GetName] прибывает всё больше солдат: пони в доспехах, передаваемых из поколения в поколение, воины с тяжёлыми палашами и круглыми щитами; другие приходят с винтовками и пушками, а есть и такие, чьё оружие – лишь их собственная сила. Пёстрые и многообразные отряды проходят через сельскую местность. Некоторые из старших пони выглядят мрачно, тогда как молодые с энтузиазмом распевают песни по дороге в столицу.\n\nТриахи и тишихи, ведущие эти армии, предстают перед Тишяхом и дают клятву защищать Пониян до последней капли крови. Жеребцы и кобылы, приведшие в столицу горцев, выглядят как реликвии из другого времени: они носят тартаны своего клана и говорят на древнем диалекте, едва понятном обычным пони, привыкшим к внешнему миру. Тишях с благодарностью принимает клятвы новоприбывших воинов, явившихся защищать родину в час нужды. После последнего весёлого застолья горцы выступают вперёд, высоко неся свои разноцветные знамёна и наигрывая на волынках заводные мелодии."
 freeponies.15.a:0 "Буа но Бас! – Свобода или смерть!"

# FRE_secrets_of_anam_teine
 freeponiesflavor.1.t:0 "Секреты Анам-Тене"
 freeponiesflavor.1.d:0 "Когда на востоке от столицы взошло солнце, берега Даль-Мора вспыхнули яркими магическими огнями. Там же собралась целая толпа, чтобы наблюдать за таинственным ритуалом: стоя у набережной, группа монахов призвала из воздуха свои оружия душ – анамармы – чем сильно удивила присутствующих. Однако, сколь впечатляющим это ни было, это оказалось лишь началом, и спустя мгновение в холодном утреннем воздухе изогнулись блестящие шлейфы голубого пламени, и многие пони в испуге отпрянули от этого яркого проявления огненной магии. Монахи продолжали искусно плести огни, пока наконец не остановились, собрали свои нехитрые пожитки и ушли, оставив позади изумлённую толпу."
 freeponiesflavor.1.a:0 "Вот так утреннее шоу!" 
 
 # FRE_trible_militias
 freeponiesflavor.2.t:0 "Наша собственная армия!"
 freeponiesflavor.2.d:0 "Звуки традиционных пониянских военных песен звучали в столице, когда проходил парад нашей недавно созданной национальной армии. Гордо нося одежды нашего народа, они прошли через Даль-Мор, демонстрируя мощь созданной армии. Горожане стекались на улицы, чтобы пожелать солдатам добра и подбодрить их, а лучшие выпускники нашей офицерской школы с гордостью осматривали пони, которые скоро будут под их командованием."
 freeponiesflavor.2.a:0 "Да здравствует Пониян!" 
 
 # FRE_pegasi_assault_groups
 freeponiesflavor.3.t:0 "Полет пегасов"
 freeponiesflavor.3.d:0 "Непривычное зрелище приветствовало жителей столицы: процессия пегасов в военной форме демонстрировала фантастические лётные навыки над городом. Внизу, на улицах, начал играть военный оркестр, когда наша недавно обученная армия вышла на улицы, маршируя в идеальном строю. Когда военный оркестр начал играть марши на иностранных инструментах, многие любопытные граждане собрались на улицах, чтобы следить за недавно реформированной армией, некоторые аплодировали, другие просто смотрели."
 freeponiesflavor.3.a:0 "Держать строй, солдат!"
 
 # FRE_unicorn_corps
 freeponiesflavor.4.t:0 "Марш единорогов"
 freeponiesflavor.4.d:0 "Наши программы по интеграции единорогов в армию имели успех, и парад в нашей столице сегодня показал это всей стране. Шествие началось обычным образом, однако вскоре единороги начали свою специально обученную демонстрацию. Встав в начале кортежа, рога многих единорогов начали светиться в унисон, прежде чем использовать свою магию, чтобы осветить улицы, выставив на ослепительное шоу свои способности. В то время как остальная часть нашей армии была затенена магической демонстрацией, она действовала так же превосходно, как и можно было ожидать, хотя большая часть гражданских похвал была направлена на недавно обученный корпус единорогов."
 freeponiesflavor.4.a:0 "Скажем спасибо Виттенленду."
  
 # breezie festival event
 freeponiesflavor.6.t:0 "Подношения потустороннему миру"
 freeponiesflavor.6.d:0 "По всему Понияну пони отложили свои повседневные дела ради более важной задачи. Неся дары самых разных видов, они задались целью угодить духам и феям потустороннего мира, оставляя им подношения: чаще всего это еда, мелкие ценности или алкоголь – всё для удовольствия своих потусторонних друзей. Это лучшее свидетельство того, как пони Понияна заботятся о феях и как тесно они связаны с теми, кого называют своими соседями!"
 freeponiesflavor.6.a:0 "Тост за наших друзей-фей!"
 
 # tribes ponies ran over by a train
 freeponiesflavor.7.t:0 "Железный жеребец"
 freeponiesflavor.7.d:0 "Вдали от внешнего мира, высоко в горах, живёт множество изолированных кланов, довольных тем, что имеют. В один мирный день молодой жеребец отправился в горы за ягодами, но нашёл нечто куда более странное: сооружение из металлических стержней, прикованных к земле, соединённых деревом и тянущихся до самого горизонта. Прежде чем он успел вернуться к своим с вестью о странной находке, он застыл на месте – раздался страшный рёв, и земля задрожала. Он начал в страхе озираться в поисках зверя, издавшего этот рык, но был вырван из этого мира, когда его сбил новейший локомотив. Его клан, обнаружив тело рядом с дорогой, по которой нёсся "металлический демон", принялся разрушать наши железнодорожные пути в том районе, решив, что поезд – какой-то ужасный зверь или демон."
 freeponiesflavor.7.a:0 "По крайней мере, поезда ходят по расписанию?"
 
 # tribes pony craftsponies losing jobs
 freeponiesflavor.8.t:0 "Протесты горцев"
 freeponiesflavor.8.d:0 "Новая политика индустриализации оказала значительное влияние на наши рынки. Некогда там продавались только продукты и инструменты местных ремесленников и фермеров, а теперь на выбор даётся широкий выбор товаров со всех концов Речных Земель – истинное свидетельство нашей модернизации. Впрочем, в утреннем тумане с процветающих рынков одного города послышались гневные крики: группа горцев-ремесленников, возмущённых потерей рабочих мест из-за иностранной и отечественной промышленности, начала протестовать, требуя, чтобы правительство вмешалось и защитило их благополучие. Их небольшая попытка сопротивления длилась недолго, и их быстро вытеснили с рынка как разгневанные граждане, пришедшие за покупками, так и местные правоохранительные органы. Хотя это, возможно, был и незначительный инцидент, он по-прежнему свидетельствует о гораздо большей проблеме."
 freeponiesflavor.8.a:0 "Неужели они не могли бы просто работать на заводах?"
