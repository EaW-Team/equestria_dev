 FRE_tribal_federation_desc:0 "Прив Ховарле – это совет из 87 триахов и тишихов, которые собираются, чтобы обсуждать вопросы, касающиеся всех племён. Тишях избирается, чтобы представлять племена на международной арене и направлять их в государственных делах."

