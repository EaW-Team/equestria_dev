l_russian:
# Civil War #
 civwar.2.t: "Юг восстает!"
 civwar.2.d: "Патриотически настроенные рабочие пони Юга поднялись на защиту своих домов и формируют основу военных сил Конфедерации."
 civwar.2.a: "Спасибо всем!"

 civwar.9.t: "[From.GetName] Требует нашего подчинения"
 civwar.9.d: "С поражением Лунной Империи, [From.GetName] требует, чтобы мы позволили [From.GetAdjective]им чиновникам наблюдать за вашим правительством в целях реинтеграции в [From.GetName]."
 civwar.9.a: "Подчиниться лучше, чем умереть."
 civwar.9.b: "Они никогда не отберут у нас свободу!"

 civwar.10.t: "Предложение Лунной Империи"
 civwar.10.d: "После поражения Эквестрии, [From.GetName] теперь доминирует в регионе. Их правительство потребовало, чтобы мы позволили дать в нашу страну доступ для их чиновников, конечная цель которых - полная интеграция нас."
 civwar.10.a: "Мы подчинимся."
 civwar.10.b: "Никогда!"

 civwar.16.t: "Предложение от [From.GetName]"
 civwar.16.d: "После долгого пути на юг прибыл представитель центрального правительства, требуя официальной реинтеграции в Эквестрию. Хотя пони Южных Штатов гордятся своей нацией, но факт в том, что у нас мало шансов против в бою центрального правительства. Что же нам делать?"
 civwar.16.a: "Мы будем сопротивляться агрессии с севера, в бой!"
 civwar.16.b: "Мы не будем сражаться с нашими братьями и присоединимся мирно."

 civwar.160.t: "Время на исходе"
 civwar.160.d: "Похоже, что Эквестрия наконец-то делает свой шаг, чтобы лишить наш город независимости. Чиновник из Эквестрии прибыл в Лас-Пегасус и требует, чтобы город вернулся в состав Эквестрии в качестве субъекта. Если мы сдадимся, то все наши усилия будут напрасными. Но если откажемся, то мы рискуем столкнуться со всей мощью эквестрийской армии. Судьба Лас-Пегасуса зависит от этого решения." 
 civwar.160.a: "Они никогда не захватят наш город!"
 civwar.160.b: "Мы не будем сражаться с нашими братьями и присоединимся мирно."

 civwar.17.t: "Эквестрийская гражданская война!"
 civwar.17.d: "Бушует эквестрийская гражданская война, а мы сражаемся насмерть!"
 civwar.17.a: "В бой!"
 civwar.17.b: "В бой!"

 civwar.18.t: "Присоединиться к [SCS.GetName]?"
 civwar.18.d: "У пони [SCS.GetName] такая же идеология, что и у нас, так что вполне естественно, чтобы мы объединились ради блага всех рабочих, мы отправим им предложение?"
 civwar.18.a: "Конечно!"
 civwar.18.b: "Пока нет..."

 civwar.21.t: "[From.GetName] предложение"
 civwar.21.d: "[From.GetName] предлагает присоединиться к республике. Хотя мы уверены, что это просто повод чтобы отобрать у нас джунгли."
 civwar.21.a: "Хватит. На этой земле уже пролилось достаточно крови."
 civwar.21.b: "Мы не подчинимся очередным угнетателям!"
 civwar.101.t: "Прекращение огня с [ceasefire_target.GetName]"
 civwar.101.d: "Посреди операции по подавлению мятежников называющими себя [ceasefire_target.GetName], мы были атакованы иностранной державой! Нам стоит задуматься о прекращении огня, чтобы бросить все силы на борьбу с более серьёзными проблемами."
 civwar.101.a: "Это отличная идея."
 civwar.101.b: "Чтож, давайте не только дадим им [ceasefire_target.GetName], но и возможность воевать плечом к плечу!"
 civwar.101.c: "Бред, война на два фронта еще не кому не вредила."

 civwar.102.t: "[From.GetName] просят о прекращении огня"
 civwar.102.d: "На [From.GetName] было совершено нападение иностранного государства, [From.GetLeader] обратилась к нам с просьбой о прекращении огня, чтобы они могли сосредоточиться на обороне."
 civwar.102.a: "Мы согласны на прекращение огня."
 civwar.102.b: "Никаких переговоров! Поднажмите, победа будет за нами!"

 civwar.103.t: "Непростой противник"
 civwar.103.d: "На [From.GetName] было совершено нападение иностранного государства, [From.GetLeader] обратилась к нам не только с просьбой о прекращении огня, но и присоединении к войне для защиты нашей родины от вторжения."
 civwar.103.a: "Давайте отложим наши разногласия... пока что."
 civwar.103.b: "Достаточно прекращения огня."
 civwar.103.c: "Никаких переговоров! Поднажмите, победа будет за нами!"

 civwar.105.t: "Прекращение огня закончено"
 civwar.105.d: "С помощью иностранных захватчиков мы сможем закончить бой. Если вы хотите, конечно."
 civwar.105.a: "Готовы к новому раунду?"
 civwar.105.b: "Пускай война пока побудет холодной."

 civwar.11.t: "Оружие с севера"
 civwar.11.d: "Секретная поставка снаряжения, отправленная самой Императрицей, только что прибыла на нашу территорию. Наши солдаты встретили командира отряда, Мисти Найт, и поблагодарили её за успешную доставку, которую не смогли обнаружить и перехватить наши враги. Теперь у нас есть тысячи дополнительных винтовок, шлемов, пуль, гранат и многого другого, и всё это крайне необходимо нашим войскам. Теперь мы должны отправить их на передовую и попрощаться с Мисти Найт и её отважными солдатами."
 civwar.11.a: "Спасибо луне за этот подарок!"

 civwar.12.t: "Эквестрия запрашивает реинтеграцию"
 civwar.12.d: "Сегодня представитель Центрального правительства Эквестрии прибыл с просьбой о нашей реинтеграции в Эквестрию. Наше правительство прекратит свое существование, а наши военные и все провинции под нашим контролем будут переданы под контроль Эквестрии. Хотя принять это для многих будет тяжело, это может быть единственным разумным вариантом, ведь в противном случае нам придётся столкнуться со всей мощью Эквестрии."
 civwar.12.a: "Лучше умереть революционером, чем жить реакционером!"
 civwar.12.b: "Отставка? Мне нравится эта идея."

 civwar.13.t: "Эквестрия запрашивает реинтеграцию"
 civwar.13.d: "Сегодня представитель Центрального правительства Эквестрии прибыл в гавань на гребной шлюпке. Он прибыл с просьбой от центрального правительства о реинтеграции в Эквестрию после окончания гражданской войны. Это значит, что мы перестанем существовать как нация, но также и избежим дальнейшего кровопролития. Многие будут стремиться к реинтеграции, но зачем тогда мы построили все эти форты."
 civwar.13.a: "Мы можем справиться с ними, правда?"
 civwar.13.b: "Никто никогда не говорил о борьбе до конца..."

 civwar.22.t: "Балтимейрское предложение"
 civwar.22.d: "Недавно Республика Мейр прислала нам дипломатов с предложением о вступлении в союз. Мы не знаем как они поступят если мы откажем им, нам следует быть осторожными в этом решении."
 civwar.22.a: "Почему бы и нет, они ведь тоже социалисты."
 civwar.22.b: "Они шутят?"

 civwar.24.t: "Дивизии племён демобилизуются"
 civwar.24.d: "После окончания войны на юго-востоке воины племён, которые сражались за нас, решили, что им пора возвращаться по домам."
 civwar.24.a: "Они достойно сражались."

 civwar.14.t: "Помощь от мятежной провинции"
 civwar.14.d: "По мере того, как наша война с Эквестрией всё больше и больше усиливается, некоторые из членов правительства предложили обратиться за помощью к первоначальным революционерам из Сталлионграда. Это значит, что они смогли бы принять участие в мирных переговорах после войны, но нам теперь нужен каждый доступный пони для войны с Эквестрией, а у них прекрасное место для открытия второго фронта."
 civwar.14.a: "Нам нужно ослабить атаки Эквестрии на наши позиции, пошлите им запрос."
 civwar.14.b: "Пусть они не вмешиваются."

 civwar.15.t: "Копыто и молот против Найтмер?"
 civwar.15.d: "Когда началась гражданская война, Сталлионград захватил большое количество территорий Лунной империи. Теперь, когда Найтмер Мун повернула своё оружие против нас, мы могли бы обратиться к ним, чтобы узнать готовы ли сталлионградцы захватить ещё больше территорий во славу революции. Тот факт, что их согласие ослабит давление на нас, является лишь побочным эффектом."
 civwar.15.a: "Мы убедим наших революционных братьев в верности это решения!"
 civwar.15.b: "Нам лучше сражаться во имя настоящей революции здесь, на юге."