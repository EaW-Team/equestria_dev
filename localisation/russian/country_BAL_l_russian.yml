baltimare.1.t:0 "Искра Революции"
baltimare.1.d:0 "Когда солнце поднялось над Балтимейром, его лучи озарили освобождённый город.\n\nВсего несколько дней назад на него было совершено хорошо скоординированное нападение. Под покровом ночи странные пони, вооружённые тяжёлым оружием, захватили правительственные здания и радиостанцию, подняв над ними незнакомый чёрный флаг. Они называли себя «лунаристами» и объявили по радио, что отныне город входит в состав Лунной Империи. Для жителей Балтимейра это стало полной неожиданностью. Лишь чуть больше семи лет назад они лишь узнали, что Найтмер Мун действительно существует, а не является персонажем старой легенды. Теперь же она не только каким-то образом вернулась, но и привела с собой целую армию.\n\nИзбранный мэр города, Эш Мастэш, попытался быстро взять ситуацию под контроль. Будучи другом мэра Мейнхеттена – города, активно поддерживавшего движение за интеграцию фестралов, — он сумел убедить лунаристов оставить его на посту. Он призвал жителей сохранять спокойствие и не вмешиваться, отчаянно пытаясь избежать кровопролития и хаоса. Возможно, он опасался повторения прошлого, когда рабочие Балтимейра подняли восстание против прежнего мэра во время Зимней революции.\n\nЕго усилия оказались напрасны.\n\nОккупация быстро стала невыносимой. В городе ввели строгий ночной комендантский час, рабочих заставляли производить оружие для «Лунной имперской армии», а сторонники Селестии один за другим бесследно исчезали. Однако, в отличие от большинства других городов, захваченных недавно провозглашённой Лунной Империей, Балтимейр оказался готов.\n\nЕщё со времён Зимней революции и жестокого подавления протестов местный рабочий класс готовился пойти путём Сталлионграда, если представится такая возможность. Теперь этот момент настал. В одночасье самые разные левые организации подняли восстание: анархисты, профсоюзы, местная коммунистическая партия и даже полиция, в ряды которой заранее проникли революционные агенты. Лунаристы вскоре были вынуждены бежать, понеся тяжёлые потери, а предатель Эш Мастэш оказался в тюрьме. Затем революция перекинулась на сельскую местность и продолжала распространяться, пока не начали иссякать запасы и не усилилось сопротивление противника.\n\nТеперь, в этот яркий солнечный день, Балтимейр обрёл свободу и независимость. Судьба города наконец оказалась в копытах тех, кто ещё совсем недавно трудился на других."
