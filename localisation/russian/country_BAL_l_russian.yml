baltimare.1.t:0 "Искра Революции"
baltimare.1.d:0 "Когда солнце поднялось над Балтимейром, его лучи озарили освобождённый город.\n\nВсего несколько дней назад на него было совершено хорошо скоординированное нападение. Под покровом ночи странные пони, вооружённые тяжёлым оружием, захватили правительственные здания и радиостанцию, подняв над ними незнакомый чёрный флаг. Они называли себя «лунаристами» и объявили по радио, что отныне город входит в состав Лунной Империи. Для жителей Балтимейра это стало полной неожиданностью. Лишь чуть больше семи лет назад они лишь узнали, что Найтмер Мун действительно существует, а не является персонажем старой легенды. Теперь же она не только каким-то образом вернулась, но и привела с собой целую армию.\n\nИзбранный мэр города, Эш Мастэш, попытался быстро взять ситуацию под контроль. Будучи другом мэра Мейнхеттена – города, активно поддерживавшего движение за интеграцию фестралов, — он сумел убедить лунаристов оставить его на посту. Он призвал жителей сохранять спокойствие и не вмешиваться, отчаянно пытаясь избежать кровопролития и хаоса. Возможно, он опасался повторения прошлого, когда рабочие Балтимейра подняли восстание против прежнего мэра во время Зимней революции.\n\nЕго усилия оказались напрасны.\n\nОккупация быстро стала невыносимой. В городе ввели строгий ночной комендантский час, рабочих заставляли производить оружие для «Лунной имперской армии», а сторонники Селестии один за другим бесследно исчезали. Однако, в отличие от большинства других городов, захваченных недавно провозглашённой Лунной Империей, Балтимейр оказался готов.\n\nЕщё со времён Зимней революции и жестокого подавления протестов местный рабочий класс готовился пойти путём Сталлионграда, если представится такая возможность. Теперь этот момент настал. В одночасье самые разные левые организации подняли восстание: анархисты, профсоюзы, местная коммунистическая партия и даже полиция, в ряды которой заранее проникли революционные агенты. Лунаристы вскоре были вынуждены бежать, понеся тяжёлые потери, а предатель Эш Мастэш оказался в тюрьме. Затем революция перекинулась на сельскую местность и продолжала распространяться, пока не начали иссякать запасы и не усилилось сопротивление противника.\n\nТеперь, в этот яркий солнечный день, Балтимейр обрёл свободу и независимость. Судьба города наконец оказалась в копытах тех, кто ещё совсем недавно трудился на других."
#для совпадения числа строк
baltimare.1.a:0 "Мы должны оставаться едины в нашей борьбе."
baltimare.2.t:0 "Первое заседание конгресса"
baltimare.2.d:0 "Старая ратуша, где когда-то работал мэр Эш Мастэш, теперь была украшена огромными красными знамёнами, развевавшимися на ветру. Со всех концов города к зданию стекались пони – вот-вот должно было начаться первое заседание конгресса Балтимейра.\n\nВнутри Голден Делишес с улыбкой принимал поздравления. Всего за несколько дней он прославился своими лидерскими навыками во время наступления, в ходе которого реакционеры-лунаристы были изгнаны из Балтимейра. Но самым тёплым оказалось приветствие Крикета Чейфера, который не только крепко обнял его, но и расцеловал в обе щёки. — Товарищ! Какой же прекрасный сегодня день!\n\nГолден усмехнулся. — Да. До сих пор не верится, что всё это происходит на самом деле.\n\n— Революция начинается с веры в то, что мечты могут стать реальностью, — сказал Крикет. — Значит, ОП(р) всё-таки решила присоединиться к Народному фронту?\n\nБольшинство левых организаций города, включая ОП(р) и Конфедерацию профсоюзов, решили объединиться в единую политическую коалицию, что обеспечило им большинство в конгрессе. — Да. Хотя наши союзники-анархисты из ГАЛ этим не слишком довольны. — Произнёс Голден.\n\nКрикет фыркнул. — Ничего. Со временем они поймут, что без этого правительства не обойтись, и тоже присоединятся к нам.\n\nВ этот момент Голден заметил неподалёку знакомую подозрительную фигуру и нахмурился. — Лавендер Берри тоже здесь?\n\n— Разумеется! ЯШКИ тоже вступила в Народный фронт. Не волнуйся, он мой хороший друг.\n\nЛавендер обернулся и бросил на Голдена холодный взгляд.\n\n— Значит, республиканцам и монархистам вход в конгресс закрыт, а его мы всё-таки впустили?.. — пробормотал Голден.\n\nКрикет похлопал его по плечу. — Если бы не блестящая работа Берри по внедрению своих агентов в полицию, наша революция потерпела бы поражение! Им можно доверять. А теперь пойдём. Пора избрать тебя временным председателем конгресса! \n\nС этими словами он слегка подтолкнул Голдена Делишеса вперёд."
#для совпадения числа строк
baltimare.2.a:0 "Хорошее начало."
baltimare.3.t:0 "Революция в Балтимейре"
baltimare.3.d:0 "Недавно до Сикамеона дошли новости о революции на юго-востоке Эквестрии. Образование социалистической республики в Балтимейре порадовало радикалов и синдикалистов, поскольку город был штаб-квартирой крупнейшей конфедерации профсоюзов Эквестрии - ГАЛ-ОП(р). Некоторые были настолько воодушевлены этим, что стремились поехать за границу и помочь своим товарищам пони в борьбе. Среди них был писатель Джордже Оруэллана, бывший учитель, известный своими леворадикальными романами. Он заявил, что хочет отправиться на борьбу против сторонников монархизма, которые выступали против молодой республики, и был уверен в своих собственных боевых возможностях."
baltimare.3.a:0 "Будем надеяться, что все они вернутся в целости и сохранности."
baltimare.4.t:0 "Помощь от Сикамеона"
baltimare.4.d:0 "Услышав о нашей революции, синдикалисты и сторонники левых взглядов из страны [SIC.GetNameDef] прибыли на кораблях, дабы поддержать нас в нашей борьбе за свободу против монархических угнетателей. Среди них писатель Джордже Оруэллана, который очень хотел сражаться. Он проходил обучение в сикамеонском ополчении и товарищ Делишес предложил сразу же повысить его, поскольку у нас острая нехватка способных офицеров."
baltimare.4.a:0 "Добро пожаловать, товарищи!"
baltimare.5.t:0 "Просьба из Балтимейра"
baltimare.5.d:0 "Крикет Чейфер, лидер коммунистической партии ПОН в Балтимейре, прислал нам секретную телеграмму с просьбой о помощи. Он пишет, что это очень поможет их революционной борьбе, если мы направим свои лучшие умы в качестве советников. Находясь там, они также могли бы поспособствовать отстранению контрреволюционных анархистов и синдикалистов в Конгрессе Балтимейра.\n\nОднако он не уточнил, какого именно рода специалисты ему требуются, так что решение остаётся за политбюро. Стоит ли нам отправить политических советников вроде Голд Маффин и Спайка Шпигеля, чтобы поднять дух союзников и обеспечить строгое соблюдение коммунистических принципов? Или лучше послать военных советников вроде Софии и Невского, чтобы те навели порядок в войсках и привели солдат в форму? Да и стоит ли вообще кого-то посылать? В конце концов, Балтимейр сейчас – это опасная зона боевых действий."
baltimare.5.a:0 "Мы пошлем Голд Маффина и Спайка Шпигеля."
baltimare.5.b:0 "Мы пошлем Софью и Невского."
baltimare.5.c:0 "Слишком опасно. Пошлите им нашу моральную поддержку."
baltimare.6.t_accepted:0 "Сталлионград прислал советников"
baltimare.6.t_refused:0 "Сталлионград отказался прислать советников"
baltimare.6.d_gold_spike:0 "Хорошие новости! В сопровождении нескольких кораблей красного флота из Сталлионграда в доки Балтимейра прибыли два советника - Голд Маффин, чейнджлинг-коммунист, беженец из Империи Кризалис и популярная фигура среди социалистов Эквестрии, а также Спайк Шпигель, один из пони, ответственных за экономическое планирование военного производства Сталлионграда. Они выразили желание помочь нам в нашей борьбе."
baltimare.6.d_sofia_nevsky:0 "Хорошие новости! В сопровождении нескольких кораблей красного флота из Сталлионграда в доки Балтимейра прибыли два советника - Софья, высокопоставленный ветеран зимней революции и эксперт по мобильной войне и Невский, офицер, известный своим умелым управлением логистикой. Они выразили желание помочь нам в нашей борьбе."
baltimare.6.d_refused:0 "К сожалению, из Сталлионграда поступила телеграмма, в которой говорится, что они не хотят отправлять своих советников в активную зону боевых действий. Они сказали, что другие возможности для сотрудничества остаются открытыми и они будут рады послать нам советников после окончания боевых действий, но уже это пошатнуло доверие к нашим предполагаемым товарищам на севере."
baltimare.6.a:0 "Мы ценим их помощь."
baltimare.6.b:0 "Мы ценим их помощь"
baltimare.6.c:0 "Наши 'товарищи' бросили нас..."
baltimare.7.t:0 "Второе заседание конгресса"
baltimare.7.d:0 "Конгресс вновь собрался в ратуше Балтимейра, но на этот раз в зал ввели её бывшего хозяина – Эша Мастэша. Под конвоем вооружённых ополченцев его подвели к трибуне, чтобы объявить, какая судьба его ожидает.\n\nПервым выступил Крикет Чейфер. — Товарищи, я считаю, что мы должны помиловать бывшего мэра во имя гармонии. В конце концов, он не мог знать, что лунаристские оккупанты окажутся столь жестокими. Возможно, он по наивности поверил их ложным обещаниям. Как бы то ни было, я не считаю его действия злонамеренными. Более того, проявив милосердие, мы убедим скептиков в нашем моральном превосходстве. К тому же, возможно мы даже сумеем воспользоваться его помощью, ведь он – образованный джентлькольт с талантом в дипломатии.\n\nПо залу пробежал приглушённый ропот, а Эш Мастэш с облегчением улыбнулся.\n\nКогда в конгрессе вновь воцарилась тишина, слово взял председатель Голден Делишес. — Хотя предложение Чейфера заслуживает внимания, я считаю, что нам самим не следует проявлять наивность. У Эша Мастэша сохранились связи как со старым гармоническим режимом, так и с тираническими лунаристами. Мы не можем просто довериться ему. Даже если он не желает нам зла, вокруг него всё равно могут сплотиться контрреволюционные силы. Поэтому я предлагаю просто выслать его из Республики. Это не только окончательно дискредитирует старый режим, но и избавит страну от потенциального коллаборациониста.\n\nУлыбка Эша померкла: судя по реакции, это предложение конгресспони понравилось гораздо больше предыдущего.\n\nВ зале вновь воцарилась тишина, когда поднялся Лавендер Берри. Он бросил полный ненависти взгляд на бывшего мэра. — Оставить эту буржуазную крысу в живых было бы чудовищной, непростительной ошибкой. Если мы позволим ему остаться, он предаст нас и подорвёт наши позиции. Если же вышлем его, он просто сбежит к сторонникам Селестии и создаст правительство в изгнании. Нет. Такая мразь заслуживает только одного – расстрела.\n\nНекоторые депутаты были потрясены: в Эквестрии смертная казнь никогда не применялась. Другие же разразились одобрительными криками, скандируя: «Смерть!», а Эш побледнел от ужаса."
#для совпадения числа строк
baltimare.7.a:0 "Простить и забыть."
baltimare.7.b:0 "Изгнать его! Ему здесь не место!"
baltimare.7.c:0 "Расстрелять эту сволочь!"
baltimare.8.t:0 "Мэр Балтимейра прибыл"
baltimare.8.d:0 "Свергнутый мэр Балтимейра Эш Мастэш недавно прибыл в Портленд на корабле. Он рассказал, что был изгнан из родного города нелегитимным социалистическим Конгрессом. Там ему перестали доверять из-за его недолгого сотрудничества с лунаристами во время оккупации города. Сейчас он направляется в Стейблсайд и заверил нас, что разочаровался в сторонниках Найтмер Мун, когда их оккупационный режим оказался куда более жестоким, чем он ожидал. Он с готовностью окажет нам помощь, если мы пообещаем освободить Балтимейр от революционеров. Теперь, когда мэр находится под нашей защитой, [Root.GetLeader] может поручить ему сформировать муниципальное правительство Балтимейра в изгнании."
baltimare.8.a:0 "Скоро мы спасем Балтимейр, не беспокойся."
baltimare.9.t:0 "Казнь мэра Балтимейра"
baltimare.9.d:0 "Пришли новости о том, что радикальные социалистические революционеры Республики Балтимейр публично казнили своего свергнутого мэра Эша Мастэша. У них по крайней мере хватило милосердия расстрелять его, а не прибегать к иным видам казни. Бывшего мэра обвинили в сотрудничестве с лунными оккупантами и признали виновным, однако подобная кара кажется чересчур суровой – особенно если вспомнить, что Эш Мастэш всегда славился как сострадательный и добродушный джентльпони.\n\nРеспублика Балтимейр показала своё истинное лицо хладнокровного убийцы, который без колебаний уничтожит любого, в ком увидит угрозу. Они явно целиком отреклись от идеалов дружбы и гармонии, так что нам не стоит даже пытаться вести с ними переговоры."
baltimare.9.a:0 "Они заплатят за содеянное..."
baltimare.10.t:0 "Подготовка запроса"
baltimare.10.d:0 "Конгресс, к большому неудовольствию Голдена Делишеса, проголосовал за обращение к Сталлионграду с просьбой о военной помощи. Однако детали этого запроса ещё предстояло согласовать с другими лидерами Народного фронта. — Многие пони из профсоюзов горят желанием сражаться, — сказал Голден, — но не могут этого сделать из-за нехватки винтовок, шлемов и другого базового пехотного снаряжения. К тому же это самый дешёвый вариант помощи, поэтому Сталлионград наверняка сможет его предоставить.\n\nКрикет Чейфер, похоже, был с этим не согласен. — Винтовок и прочего стрелкового оружия у нас пока достаточно, товарищ. Вместо этого нам следует запросить артиллерию. Мы остро нуждаемся в орудиях, а самостоятельно производить или закупать нам крайне трудно, и с их помощью мы сможем безопасно обстреливать врага с больших расстояний и получим серьёзное преимущество.\n\nГолден нахмурился. Ему казалось, что личные связи Крикета со Сталлионградом создают у него впечатление, будто там удовлетворят любую его просьбу, какой бы дорогостоящей она ни была.\n\nЛавендер Берри несколько раз щёлкнул языком. — И что это нам даст? У наших врагов тоже есть винтовки и артиллерия. Мы должны в полной мере воспользоваться поддержкой Сталлионграда и получить то, чего у наших противников нет вовсе. Нам нужны самолёты. Если мы будем господствовать в небе, то сможем доминировать и на поле боя, безнаказанно кося с воздуха наших беспомощных, обращающихся в бегство врагов.\n\nОт того, с каким холодным спокойствием Лавендер произнёс эти слова, Голден невольно вздрогнул." 
#для совпадения числа строк
baltimare.10.a:0 "Нам нужно снаряжение для нашего ополчения!"
baltimare.10.b:0 "Большими пушками мы уничтожим реакционеров!"
baltimare.10.c:0 "Если мы будем править небесами, мы получим преимущество."
baltimare.11.t:0 "Балтимейр запрашивает оснащение"
baltimare.11.d_bal_rifles:0 "Срочная телеграмма поступила из Рабочей Республики Балтимейр, которая погрязла в страшном конфликте с реакционерами. Они смиренно просят нас прислать им винтовки, шлемы, гранаты и другое пехотное снаряжение, чтобы они могли собрать больше войск для сражений. Хотя очевидно, что мы должны щедро помочь нашим товарищам, мы должны подумать, можем ли мы позволить себе это сделать. Наши собственные военные остаются для нас наивысшим приоритетом."
baltimare.11.d_bal_guns:0 "Срочная телеграмма поступила из Рабочей Республики Балтимейр, которая погрязла в страшном конфликте с реакционерами. Они смиренно просят нас прислать им тяжелое оружие, которого у них совершенно нет. С ними они смогут легко уничтожить своих плохо экипированных врагов издалека. Хотя очевидно, что мы должны щедро помочь нашим товарищам, мы должны подумать, можем ли мы позволить себе это сделать. Наши собственные военные остаются для нас наивысшим приоритетом."
baltimare.11.d_bal_planes:0 "Срочная телеграмма поступила из Рабочей Республики Балтимейр, которая погрязла в страшном конфликте с реакционерами. Они смиренно просят нас прислать им истребители, чтобы они могли обеспечить превосходство в воздухе и получить значительное преимущество перед своими врагами. Хотя очевидно, что мы должны щедро помочь нашим товарищам, мы должны подумать, можем ли мы позволить себе это сделать. Наши собственные военные остаются для нас наивысшим приоритетом."
baltimare.11.a:0 "Конечно, подготовить все к отправке немедленно!"
baltimare.11.b:0 "Мы не можем позволить себе что-либо отправить прямо сейчас."
baltimare.12.t:0 "Посылка из Петерсхуфа"
baltimare.12.d_bal_rifles:0 "Партия пехотного снаряжения в сопровождении кораблей прибыла в порт Балтимейра, а наши рабочие уже разгружают груз. Сталлионград прислал нам множество винтовок, шлемов, пуль и многого другого, доказав, что мы действительно можем доверять им и их щедрой поддержке."
baltimare.12.d_bal_guns:0 "Партия артиллерийского оборудования в сопровождении кораблей прибыла в порт Балтимейра, а наши рабочие уже разгружают груз. Сталлионград прислал нам множество тяжелых орудий, минометов, артиллерийских снарядов и многого другого, доказав, что мы действительно можем доверять им и их щедрой поддержке."
baltimare.12.d_bal_planes:0 "Партия истребителей в сопровождении кораблей прибыла в порт Балтимейра, а наши рабочие уже разгружают груз. Сталлионград отправил нам много высококачественных самолётов, недавно изготовленных на их заводах, доказав, что мы можем по-настоящему доверять им и их щедрой поддержке."
baltimare.12.a:0 "Спасибо, товарищи!"
baltimare.13.t:0 "Сталлионград не прислал помощь"
baltimare.13.d:0 "Мы получили ответ на телеграмму, которую мы отправили в Сталлионград, и её содержание не очень приятно. По всей видимости, Сталлионград, несмотря на наличие многочисленных военных заводов и больших вооружённых сил по сравнению с нашими, не может позволить себе прислать нам что-либо из запрошенное оборудования. Те, кто предложили эту идею, теперь высмеиваются в Конгрессе."
baltimare.13.a:0 "Как коммунисты могут быть такими же жадными, как капиталисты?!"
baltimare.14.t:0 "Долой принцесс!"
baltimare.14.d:0 "— Долой принцесс, снимем их с небес!\n   Слоганы вроде этого эхом разносились по улицам Балтимейра во время массовых антимонархических протестов, организованных Народным фронтом. Через громкоговорители до горожан доносилась пропаганда о коррупции, некомпетентности и даже жестокости Селестии, Луны, Каденс и Твайлайт, а их статуи опрокидывали и обезображивали. Вскоре на стенах появились граффити с изображением ожиревшей Селестии, жадно вкушавшей очередной торт, а Луну, превратившуюся в Найтмер Мун, начали обзывать "лунной пони". Самую большую статую в городе – статую принцессы Селестии на центральной площади – приговорили к показательной "казни" через расстрел и даже надели на глаза повязку, а после – взорвали динамитом.\n   Прочие горожане смотрели на всё это со стороны с некоторым беспокойством. Всю свою жизнь (и жизнь бесчисленных поколений до них) правление аликорнов – это единственное, что они знали, из-за чего такая вульгарная и бессовестная насмешка над принцессами шокировала их до глубины души. Однако другие же осознавали, что ответственность за гражданскую войну лежит на принцессах: не было бы их – не было бы и конфликта. Революционеры предлагали альтернативу: будущее без принцесс; Эквестрию, управляемую самими пони, как в далёком прошлом, когда страна была только-только основана союзом трёх племён.\n   Впрочем, помимо революционеров были и те, кто до последнего оставался верен принцессам, и митинг антимонархистов вынудил их выйти из тени и организовать контрпротест. — Принцесса Селестия не сделала ничего плохого! — скандировали они, — Луна не стала Найтмер Мун, не верьте их лжи! Принцесса Твайлайт всё исправит, как она делала уже много раз!\n   Но внезапно в монархистов врезалась толпа пони в масках и принялась их жестоко избивать. Контрпротест был разогнан, а собравшиеся в ужасе разбежались. Сразу после пони в масках быстро исчезли, и никто так и не узнал, были ли они анархистами или членами ЯШКИ."
#для совпадения числа строк
baltimare.14.a:0 "Покончим с монархизмом!"
baltimare.15.t:0 "Антимонархистский митинг в Балтимейре"
baltimare.15.d:0 "До нас дошли новости об особом событии в Балтимейре, из-за которого сторонники как Селестии, так и Найтмер Мун в ужасе бегут из города. Левые города организовали большое мероприятие, целиком посвящённое дискредитации института монархии, издевательству над принцессами и избиению тех пони, которые остались им верны. Граффити разжиревшей Селестии, пожирающей торты украсило стены города, а Луну начали обзывать 'Лунной Пони'. Любые памятники с изображением принцесс были разрушены. Самый любопытный пример – демонстративная 'казнь' и последующее разрушение большой статуи принцессы Селестии, стоящей на центральной площади Балтимейра."
baltimare.15.a:0 "Они сбились с пути..."
baltimare.16.t:0 "Чистка"
baltimare.16.d:0 "Никто в точности не знает, кто сделал первый выстрел. Это не было официальным приказом ни конгресса, ни военного командования. Скорее всего, решающую роль сыграла смесь страха, паранойи, жажды мести, возбуждённой злобы, недоверия и революционного рвения. Как бы то ни было, этот акт насилия шёл врозь с ценностями дружбы и гармонии, от которых Балтимейр отказался совсем недавно.\n   Слухи о существовании контрреволюционной пятой колонны запустили череду неорганизованных арестов со стороны ополченцев и сотрудников службы безопасности, связанных с ЯШКИ. Уже вскоре эти аресты обернулись внезапным самосудом и казнями. Бывшие землевладельцы, бизнеспони, начальники фабрик, монархисты, лунаристы и жрецы-туземцы – все попали под подозрения и даже невинные отправлялись в трудовые лагеря. Вместе с этим святилища коренных жителей леса Кулулу были разграблены и сожжены линчевателями, решившими, что местный "бог солнца" – это оскорбительная и предательская форма наивного поклонения Селестии.\n   Когда число жертв достигло нескольких тысяч, а вести о бедствии дошли до конгресса, председатель Голден Делишес потребовал немедленно прекратить насилие. Мало кто сразу прислушался к нему, и тогда Крикет Чейфер обратился к Лавендеру Берри. Вскоре члены ЯШКИ расправились с ополченцами, творившими бесчинства и самосуд. Кроме того, под арест попали и тысячи членов Народного фронта."
#для совпадения числа строк
baltimare.16.a:0 "...Что мы наделали?"
baltimare.17.t:0 "Красный террор в Балтимейре"
baltimare.17.d:0 "Всё больше новостей поступает из Балтимейра, где, по слухам, развернулась жестокая борьба с заподозренными в контрреволюционной деятельности фигурами. Вооружённые ополченцы арестовывали бывших землевладельцев, бизнеспони, начальников фабрик, монархистов, лунаристов и жрецов-туземцев, отправляя их в трудовые лагеря и устраивая казни над тысячами без всякого суда. Святилища коренных жителей в лесу Кулулу также были разграблены и сожжены. Несмотря на призывы Голден Делишеса прекратить насилие, немногие вняли его словам, из-за чего вскоре уже сами ополченцы стали жертвами арестов.\n   Балтимейр показал своё истинное лицо: это помешанный на насилии кровожадный режим, пытающийся любыми средствами свергнуть старый порядок. Они больше не могут утверждать о своём моральном превосходстве над нами. Наш долг – выступить войной на город и освободить его от этих сумасшедших леваков."
#для совпадения числа строк
baltimare.17.a:0 "Они настоящие чудовища!"
baltimare.18.t:0 "Подавление анархистов"
baltimare.18.d:0 "Сегодня ПОН и ЯШКИ сумели провести через Конгресс противоречивый закон: отныне частное владение оружием запрещалось, а для поддержания порядка создавалась мощная «неполитическая» полиция, независимая от профсоюзных ополчений. Представители ОП(р) были настолько возмущены этим решением, что демонстративно покинули заседание Конгресса, однако помешать принятию закона уже не могли.\n\nУже на следующий день он вступил в силу. Лавендер Берри возглавил вновь созданную полицию Балтимейра, которая немедленно приступила к разоружению анархистов и синдикалистов в тылу. Многие из них небезосновательно опасались, что это лишь первый шаг, за которым последуют ликвидация коммун и промышленных комитетов, а также национализация всех оставшихся коллективов. Поэтому сопротивление разоружению оказалось ожесточённым. В самом Балтимейре вспыхнули бои: анархисты отказались сдавать оружие. Голден Делишес потребовал немедленно отстранить Лавендера Берри от должности, а Крикет Чейфер пытался добиться прекращения огня между сторонами, опасаясь, что конфликт разрастётся и расколет молодую республику надвое.\n\nПосле нескольких дней хаоса Конгресс официально объявил, что любое насилие в отношении полиции будет считаться государственной изменой и караться смертной казнью. Неохотно подчинившись, анархо-синдикалисты сложили оружие и были арестованы. Вскоре Голден Делишес осознал, что большинство его сторонников теперь находится за решёткой."
#для совпадения числа строк
baltimare.18.a:0 "Скатертью дорога!"
baltimare.19.t:0 "Нейтрализация Конгресса"
baltimare.19.d:0 "Сегодня ОП(р) при официальной поддержке ГАЛ удалось провести через Конгресс противоречивый закон: Республика должна была стать децентрализованной, а значительная часть полномочий Конгресса передавалась нижестоящим уровням власти – местным муниципалитетам и коммунам. Представители ПОН и ЯШКИ были настолько возмущены этим решением, что демонстративно покинули заседание Конгресса, однако помешать принятию закона уже не могли.\n\nОн немедленно вступил в силу, и коммуны избрали собственные советы. Теперь они самостоятельно отвечали за законодательство, здравоохранение, правопорядок, оборону, образование и многое другое. В итоге у Конгресса осталось настолько мало полномочий, что большинство коммунистов не увидело смысла продолжать работу в его составе и сложило свои полномочия. Из Сталлионграда последовали протесты: там опасались, что революция оказалась под серьёзной угрозой. Новобранцы балтимейрского ополчения лишь недоумевали при виде такой реакции, с ещё большей решимостью вступая в резерв, чтобы в случае необходимости защитить свои дома."
#для совпадения числа строк
baltimare.19.a:0 "Кому вообще нужно государство?"
baltimare.20.t:0 "Реакционеры сокрушены"
baltimare.20.d:0 "Красные флаги теперь развеваются над Стейблсайдом, Аякачтли и Теночтитланом. Армии контрреволюционеров и реакционеров разгромлены и рассеяны, а их остатки отступают всё глубже в джунгли, надеясь продолжить своё заблудшее сопротивление. Рабочие по всему полуострову празднуют победу: эпоха страданий и войны наконец подошла к решающему концу. Поздравления поступают от социалистических партий со всего мира, коммунистические государства спешат признать нас законной властью, а сам Сталлионград уже открывает своё посольство в Балтимейре. Временный Конгресс провёл последнее заседание, на котором официально распустил себя, принял новую социалистическую конституцию и утвердил создание Народного парламента. Вскоре состоятся выборы. До тех пор управление страной будет осуществлять переходное правительство.\n\nНо мир не будет вечным. Балтимейру ещё предстоит сражаться за свою свободу и независимость, пока за рубежом по-прежнему господствуют антисоциалистические идеи. Мы должны использовать это время, чтобы восстановить силы и быть готовыми встретить надвигающуюся бурю."
baltimare.20.a:0 "Да здравствует революция!"
baltimare.21.t:0 "Грифоны уезжают домой"
baltimare.21.d:0 "Синдикалисты Сикамеона вернулись с фронта в гавань Балтимейра. Из тысячи грифонов, прибывших когда-то из-за границы, домой готовятся отправиться шестьсот двенадцать. Среди них – Джордже Оруэллана, лично прошедший через самые тяжёлые бои. Он участвовал в отражении ночной атаки лунаристов, преследовал наёмника со штыком наперевес и забросил гранату в окоп селестийских лоялистов. К сожалению, под конец войны его ранил снайпер. После этого он продолжал исполнять обязанности командира, но уже не принимал личного участия в боях и проходил лечение у самой Медоубрук.\n\nОн пообещал своему хорошему другу Голден Делишесу, с которым познакомился на войне, написать роман, основанный на собственном боевом опыте, пока его рана окончательно не заживёт."
baltimare.21.a:0 "Прощайте, товарищи."
baltimare.22.t:0 "Новая республика"
baltimare.22.d:0 "Сегодня переходное правительство провозгласило создание Юго-Восточной Эквестрийской Социалистической Республики – единственного законного государства на полуострове. Хотя некоторые встретили эту новость со скептицизмом и пессимизмом, большинство жителей городов юго-востока от всей души приветствовало революцию. Во время войны условия труда во многих местах были невыносимыми, поэтому обещания передать средства производства в собственность рабочих и сократить рабочий день нашли широкий отклик. По всему полуострову уже создаются демократические рабочие советы и комитеты.\n\nОднако сельская местность, по большей части ещё не затронутая преобразованиями, оставалась совсем другой историей. Коренные племена, незнакомые с идеями социализма, воспринимали его как чуждую угрозу, стремящуюся уничтожить их традиционный образ жизни. Лунаристы готовились вести партизанскую войну в джунглях. Многие эквестрийские поселенцы, живущие на фермах возле Стейблсайда, с надеждой ожидали земельной реформы, тогда как крупные землевладельцы опасались лишиться своих владений.\n\nБыло ясно, что ещё предстоит проделать огромную работу, чтобы склонить на сторону новой республики всё население полуострова. Но это было лишь начало."
baltimare.22.a:0 "Да здравствует республика!"
baltimare.23.t:0 "Неожиданное происшествие"
baltimare.23.d:0 "Ко дню выборов по всей стране уже были подготовлены избирательные бюллетени, а предвыборная агитация продолжалась несколько недель. Но у анархистов ГАЛ были другие планы.\n\nЗамаскированные боевики совершали налёты на избирательные участки по всей стране, сжигали бюллетени и громили правительственные здания, которые лишь недавно заняли рабочие советы. Переходное правительство немедленно приказало остановить нападавших, однако, к своему ужасу, обнаружило, что вооружённые силы вместо этого поддержали их действия. Когда анархисты поняли, что никто не собирается им препятствовать, их действия стали ещё решительнее. Они двигались из города в город, свергая едва успевшие возникнуть государственные учреждения, созданные за последние недели, пока не добрались до Балтимейра. Там произошло небольшое сражение, прежде чем бывший председатель и лидер ОП(р) Голден Делишес вмешался и приказал своим верным ополченцам сложить оружие, чтобы положить конец кровопролитию. Он убедил Крикет Чейфера покинуть страну и вступил в переговоры с анархистами.\n\nНесколько дней спустя было заключено соглашение, и переходное правительство было распущено. Юго-Восточная Эквестрийская Социалистическая Республика оказалась мертворождённой и была официально ликвидирована. Все оставшиеся воинские части должны были либо присоединиться к анархистским ополчениям, либо сложить оружие. Эпоха государственного правления на юго-востоке окончательно подошла к концу."
#для совпадения числа строк
baltimare.23.a:0 "Власть рождает паразитов. Да здравствует анархия!"
baltimare.24.t:0 "Неожиданное происшествие"
baltimare.24.d:0 "В рамках подготовки к выборам по всей стране были приготовлены бюллетени для голосования, а Голден Делишес произносил речь в Стейблсайде.\n   — Мои дорогие товарищи! Я знаю, что революция добралась до этого города совсем недавно, но я пришёл уверить вас, что её не стоит бояться, а наоборот – тепло приветствовать. Если вы изберёте меня новым председателем, то я буду действовать в интересах угнетённого городского рабочего класса! Жизнь была нелегка, и я уверен, что селестийские лоялисты заставляли вас долго и непрерывно трудиться за мизерную плату, но я обещаю вам лучшее будущее! Будущее, лишённое эксплуатации, насилия...\n   Ровно в эту секунду над улицей разнёсся громкий звук выстрела и Голден Делишес рухнул на землю. Толпа слушателей взорвалась криками и разбежалась, а вооружённые ополченцы бросились искать убийцу.\n   На следующий день Голден Делишес, герой революции, умер в больнице Стейблсайда. Это убедило Крикета Чейфера в том, что теперь он точно выиграет выборы, а ПОН получит большинство мест в Народном парламенте. Он даже пригласил своего друга Лавендера Берри распить кружечку тесгуино – кукурузного пива. — Ах, какая же досадная участь постигла Голдена, — сказал он Лавендеру. — Но вместе с тем он был моим главным соперником, так что я не могу назвать это совсем уж печальным.\n   Лавендер Берри молчал и даже не притрагивался к напитку.\n   — ... Ну так что, узнал, кто его убил? Ты уже провёл расследование?\n   — Я знаю, кто стоит за этим, — беспристрастно ответил он. — И по тому, что мне рассказали, это же произойдёт и с тобой, если, конечно, ты не отойдёшь от политики.\n   Крикет уставился на него испуганным взглядом, а затем ответил, сглотнув вставший поперёк горла ком: — Я... конечно, я понимаю. Ха-ха... Спасибо за совет, друг! Я, наверное... просто вернусь к себе на ферму в Солтликингхэме. Хе-хе... — он тут же осушил стакан пива.\n   После этой встречи ПОН сняла свою кандидатуру с выборов, и ЯШКИ остались единственной партией, за которую можно было голосовать, а Лавендер Берри – единственным кандидатом на пост председателя. А когда ЯШКИ взяла парламент под контроль, почти все члены ОП(р) были арестованы по подозрению в причастности к убийству Голден Делишеса. Лавендер Берри тем временем взял на себя чрезвычайные полномочия под предлогом необходимости поисков и наказания всех виновных."
#для совпадения числа строк
baltimare.24.a:0 "...Уверен, всё будет хорошо."
baltimare.25.t:0 "Выборы [GetYear] года"
baltimare.25.d:0 "В рамках подготовки к выборам по всей стране были приготовлены бюллетени для голосования. Поскольку государству требовались управляющие на различных уровнях, выборы в парламент и выборы председателя проходили одновременно. Естественно, к участию допускались только кандидаты-социалисты.\n   Двумя наиболее популярными кандидатами были Голден Делишес из ОП(р) и Крикет Чейфер, представлявший ПОН. В попытке завоевать электорат соперники устроили дебаты в Балтимейре.\n   — Профсоюзы на протяжении уже многих лет неустанно защищают эквестрийских рабочих от эксплуатации, — заявил Голден, — так что не сомневайтесь в том, что мы продолжим наше правое дело. Мы верим в деволюцию власти, децентрализованное экономическое планирование и демократию на рабочих местах. Наш план на юго-восток амбициозен, но если вы всецело поддержите нас, то мы сможем реализовать его.\n   — Ответь-ка мне на вопрос: а как там эта твоя родственница поживает? — спросил Крикет Чейфер. — Эпплджек, кажется. Которая ещё у принцессы под дудочку пляшет?\n   Реакция толпы на эти слова была двойственная: кого-то это удивило, а кого-то буквально шокировало. Сам же Голден недовольно уставился на Крикета, чуть ли не завалившегося набок от смеха. — Да шучу я, шучу. Нет ничего плохого в том, чтобы иметь родственников "на местах". Впрочем, да, твои обещания звучат очень красиво и всё в таком духе, но я вот предлагаю модель, которая действительно будет работать. В её основу положены лучшие принципы как Сталлионграда, так и Эквестрии, которые мы соединим воедино! Ну и, конечно же, я обещаю вам вот *что*! — лысый пони гордо воздел початок кукурузы, любуясь им. — Кукурузу! С её помощью мы накормим каждого! Если вы проголосуете за меня, то голод будет побеждён! Ни в городах, ни в деревнях пони больше не будут засыпать на пустой желудок!\n   Дебаты продолжались ещё некоторое время, и вскоре начались выборы, на которых пони решили, кто встанет во главе их молодой нации."
#для совпадения числа строк
baltimare.25.a:0 "Побеждает Голден Делишес!"
baltimare.25.b:0 "Побеждает Крикет Чейфер!"
baltimare.26.t:0 "«Памяти Балтимейра» от Джордже Оруэллана"
baltimare.26.d:0 "[This.GetNewspaperHeader] Сегодня в Сикамеоне был опубликован новый роман, написанный Джордже Оруэллана, который участвовал в юго-восточной эквестрийской гражданской войне на стороне Республики Балтимейр. Книга представляет собой личный рассказ о его опыте во время конфликта и содержит много подробностей не только о боевых действиях, но и о революционном обществе, созданном либертарианскими социалистами ГАЛ-ОП(р), которое, как он утверждает, было действительно тем самым, где «рабочий класс сидел в седле», общество которого было гаванью свободы и равенства. В то же время он критиковал коммунистов ПОН и ЯШКИ за уступки реакционерам, опору на иностранную поддержку и почти предательство революции. Книга получила неоднозначные рецензии и была запрещена в нескольких странах."
baltimare.26.a:0 "Хорошо написано, товарищ!"
baltimare.26.b:0 "Сжечь все копии этого недоразумения."
baltimare.26.c:0 "Интересно, но спорно."
baltimare.27.t:0 "«1048» от Джордже Оруэллана"
baltimare.27.d:0 "[This.GetNewspaperHeader] Сегодня в Сикамеоне был опубликован новый роман, написанный Джордже Оруэллана, который участвовал в юго-восточной эквестрийской гражданской войне на стороне Республики Балтимейр. Книга является вымыслом и описывает антиутопическое общество, которое существует в будущем 1048 году, просто известное как Государство. Оно контролирует весь Эквус, в то время как две другие сверхдержавы контролируют Грифонию и Зебрику. Все трое находятся в бесконечной войне, и Государство, хотя номинально социалистическое, является тоталитарным правительством, которое использует магию для широкого наблюдения, пропаганды и «промывки мозгов». Партия MARESOC в Новом Мейрленде подала в суд на него за клевету, хотя он утверждает, что даже не знал о существовании партии, а вместо этого основал роман на своем опыте в Республике Балтимейр, где ПОН и ЯШКИ проводили все более авторитарную политику."
baltimare.27.a:0 "'Государство' вовсе не будущее социализма, это действительно вымысел!"
baltimare.27.b:0 "'Государство' – это то, что ждёт все социалистические страны."
baltimare.27.c:0 "Интересно, но спорно."
baltimare.28.t:0 "Наши бойцы вернулись домой"
baltimare.28.d:0 "Конфликт на юго-востоке Эквестрии закончился. Наши добровольцы, или, по крайней мере, те, кто остались живы и здоровы, вернулись домой на кораблях из Балтимейра. Многие из них не вернулись, но те, кто сделали это, были встречены как герои левыми нашей страны.\n\nДжордже Оруэллана участвовал в боевых действиях и был тяжело ранен, но выжил. Он заявил, что теперь планирует написать роман, основанный на его опыте во время войны."
baltimare.28.a:0 "Посмотрим, чего он там напишет."
baltimare.29.t:0 "Охота"
baltimare.29.d:0 "Лунаристы полагали, что сумеют дать отпор победившим социалистам, если развернут партизанскую войну из своих убежищ в джунглях и горных пещерах. Они, однако, не учли, что анархисты и сами прекрасно владели навыками асимметричной войны. К тому же несколько военных вождей нейуа вызвались помочь им в борьбе против фестралов, своих заклятых врагов.\n\nПри поддержке и под руководством местных племён отряды анархистов углубились в джунгли, и началась смертельная игра в кошки-мышки. Обе стороны полагались на засады, ловушки и снайперов. Вся разница в тактике сводилась лишь к тому, что анархисты наносили удары днём, а их противники ночью.\n\nС обеих сторон пролилось много крови, но в конце концов Старс Вирл, фактический лидер лунаристов, погиб в результате внезапного нападения. Их вертикаль власти начала рушиться, поскольку лунаристы во всем полагались на жёсткую командную иерархию. Анархисты же подобных проблем не знали: их враги просто не могли найти ключевых командиров или обезглавить структуру за полным отсутствием таковой.\n\nВскоре почти все сопротивление сошло на нет, и тысячи фестралов оказались в плену. Сотни из них были безжалостно вырезаны. Племена нейуа праздновали победу, прославляя анархистов за их доблесть. Верные Найтмер Мун пони начали массово бежать с юго-востока, пока анархисты грабили и жгли их дома, клеймя беглецов религиозным монархическим отребьем. Десятки, если не сотни тысяч пересекли границу, забрав лишь то, что могли унести. Многие погибли в пути."
baltimare.29.a:0 "Хорошо поработали, товарищи."
baltimare.30.t:0 "Ацтланское соглашение"
baltimare.30.d:0 "Представители всех коренных племён прибыли в древний забытый храм в самом сердце полуострова, чтобы встретиться с избранными представителями анархистских коммун юго-востока. Их разделили на четыре группы: нейуа, цинакатли, мейриянцы и кольтеки. С каждой группой переговоры велись отдельно, однако их итог оказался практически одинаковым.\n\nАнархисты обязались уважать право коренных народов на самоопределение и автономию. Взамен племена согласились направлять своих представителей на съезды конфедерации всякий раз, когда те будут созываться, чтобы участвовать в защите Свободной Юго-Восточной Эквестрии от реакционных захватчиков и обсуждать дальнейшую коллективизацию ресурсов. Что именно подразумевалось под этим, оставалось не вполне ясно, поскольку частной собственности у туземцев и без того не существовало – имущество принадлежало семьям и родам. Поэтому племена без колебаний приняли это предложение."
baltimare.30.a:0 "Победа над колониализмом и империализмом!"
baltimare.31.t:0 "Война с лунаризмом"
baltimare.31.d:0 "Голден Делишес наблюдал, как ополченцы выволакивали из святилища так называемых "говорящих-с-луной". В прошлом здания подобные этому служили местом поклонения луне, но теперь их превратили в оплот фанатичного служения безумной богине-аликорну Найтмер Мун. Все ценности были вынесены наружу: их собирались раздать беднякам в деревне, а само святилище переоборудовать в удобный склад.\n   Одна из "говорящих" увидела Голдена и узнала его. — Ты! Вожак красной стаи! Зачем ты это делаешь?\n   Он взглянул на неё с лёгким отвращением. — После всех совершённых тобою зверств ты ещё смеешь спрашивать, за что предстаёшь перед законом?\n   — Ты называешь это законным? Какие законы я нарушила? Я требую справедливого суда! Нет никакой законности в слепом коллективном наказании.\n   Он помотал головой. — Ты так мало знаешь о классовой борьбе. Представь ящик, доверху набитый яблоками, где несколько из них – гнилые. Из-за этих гнилых яблок свежие начинают портиться быстрее, и чтобы остановить заразу и сохранить как можно больше хороших яблок, нужно как можно скорее выбросить гнилые.\n   "Говорящая" посмотрела на него с недоумением и яростью, но прежде чем она успела сформулировать ответ, ополченцы толкнули кобылу и сопроводили к грузовику.\n   Голден с ненавистью провожал её взглядом, когда к нему подбежала другая ополченка. — Товарищ Делишес, новости с фронта! Операция "Красная луна" прошла успешно. Нам удалось ликвидировать Старс Вирл и Старри Глори!\n   Настроение председателя тут же улучшилось, и он с облегчением вздохнул. — Вот эти были самыми гнилыми яблочками."
#для совпадения числа строк
baltimare.31.a:0 "Невелика потеря."
baltimare.32.t:0 "Мир с туземцами"
baltimare.32.d:0 "Перед Голден Делишесом собралась группа представителей нейуа, кольтеков, мейриянцев, цинакатлей и других мелких коренных племён юго-востока. После нескольких лун ожесточённых боев председатель предложил перемирие и пригласил туземцев сесть за стол переговоров при условии, что делегатов выберут из среды простого народа. В конце концов, Республика наотрез отказывалась признавать законность власти вождей.\n\nПосле официальных приветствий и короткой беседы с помощью местного переводчика один из туземцев произнёс:\n— То, что вы сделали с вождем Майтой, – трагедия. Он был хорошим пони.\n\nГолден глубоко вздохнул.\n— Мне жаль, но мы поступили так, как были должны. С вождями, особенно с теми, кто идёт против нас, необходимо покончить. Вы должны понять: они лишь мелкие царьки, которые копят у себя излишки богатств. Без них ваша жизнь станет лучше.\n\nТуземцы недоверчиво переглянулись.\n\n— Я предлагаю вам мир с условием, что все оставшиеся вожди будут свергнуты, а жречество – упразднено. После этого мы оставим вас в полном покое. Никто не станет принуждать вас к участию в нашей революции.\n\n— Это тяжёлое условие. Кто поведёт нас, если не вожди и жрецы, которые наставляли наши племена с незапамятных времён?\n\n— Теперь вы сами будете вершить свою судьбу. Верьте в свои силы. Туземный труженик заслуживает права голоса ничуть не меньше, чем эквестрийский. Пусть племена избирают своих лидеров точно так же, как выбрали вас, делегатов. Голосуйте сообща по всем делам, что касаются всего племени.\n\nНекоторые туземцы все еще колебались. Но один из них произнёс:\n— Мы устали от войны и верим, что пролилось уже достаточно крови. Неужели это слишком высокая плата за бесценный мир?\n\nЕго слова убедили остальных, и один за другим они приняли предложение Голдена."
#для совпадения числа строк
baltimare.32.a:0 "Наконец-то мир."
baltimare.33.t:0 "Всеобщая забастовка!"
baltimare.33.d:0 "Уже несколько недель поступают сообщения о том, что рабочие нашей страны организовывают впечатляюще большую забастовку. Когда это наконец произошло, её размер был даже больше, чем ожидалось, и в ней приняли участие работники почти всех секторов экономики. Ясно, что рабочие тесно сотрудничали и имели общий план, а потому профсоюзы точно были вовлечены, не важно законные или нет. Наша полиция также подозревает, что тут замешано иностранное влияние, а все следы указывают на страну [BAL.GetNameDef], где профсоюзная организация ОП(р) стоит у руля.\n    Вопрос в том, что мы сделаем по этому поводу? Рабочие требуют таких кардинальных реформ, что мы никогда не сможем выполнить все их требования, но, возможно, мы сможем пойти на некоторые уступки."
baltimare.33.a:0 "Пообещайте им реформы."
baltimare.33.b:0 "Вдарьте по источнику этого беспорядка!"
baltimare.34.t:0 "Сообщение из [From.GetNameDefCap]"
baltimare.34.d:0 "Страна [From.GetNameDefCap] отправила на корабле посла с сообщением. В нем говорится, что [From.GetLeader] хочет подписать официальный договор о союзе между нашими странами и хочет создать посольство в [Root.Capital.GetName]. Он говорит, что рабочие Эквуса должны объединиться во имя солидарности, чтобы выжить в эти неспокойные времена.\n   [From.GetLeader] в настоящее время контролирует страну после выборов и проводит реформы, из-за которых наши политики очень похожи. У нас действительно много общего, но, возможно, альянс в итоге окажется бременем или опасностью."
baltimare.34.a:0 "Мы должны объединиться!"
baltimare.34.b:0 "Мы и сами справимся."
baltimare.35.t:0 "[From.GetName] принимает предложение"
baltimare.35.d:0 "[From.GetLeader] тепло принял нашего посланника. После продолжительных переговоров они согласились подписать официальный договор о союзе, устанавливающий тесную дружбу между нашими двумя народами. Эти вести не могут не радовать [Root.GetLeader]. Пусть наш союз продлится тысячу лет!"
baltimare.35.a:0 "Пролетарии Эквуса, соединяйтесь!"
baltimare.36.t:0 "[From.GetName] отказывается от предложения"
baltimare.36.d:0 "[From.GetLeader] тепло принял нашего посланника. Но после длительных переговоров они отказались подписать официальный союзнический договор, который установил бы тесную дружбу между нашими народами. Они сказали, что их вооружённые силы были совершенно не готовы помочь нам, и что мы могли бы стать большим бременем, а для них мало выгоды от альянса. Был еще длинный список оправданий, которые давали понять, что они не сильно хотели отказываться, но в конечном итоге решили сделать это."
baltimare.36.a:0 "Н...но я думал, что мы товарищи"
baltimare.37.t:0 "Занимайтесь любовью, а не войной"
baltimare.37.d:0 "Крикет Чейфер выступил по общественному радио, рассчитывая, что лунаристы его услышат.\n\n«Я, как председатель державы [Root.GetNameDef], хочу протянуть оливковую ветвь мира всем, кто по-прежнему ведёт вооружённую борьбу против нашей законной власти. Настало время зарыть топор войны и положить конец этому бессмысленному кровопролитию. Лайт Нэрратив, если ты меня слышишь, я приглашаю тебя на личную встречу. Возможно, нам удастся прийти к соглашению. С нетерпением жду нашего разговора».\n\nВскоре после этого Лайт Нэрратив и Крикет Чейфер встретились за закрытыми дверями. После недолгой беседы и нескольких кружек кукурузного пива фестрал сказал. — Что ж, думаю, твоя идея хороша. Партийная организация, сочетающая социалистические и лунаристские идеалы, которой будет позволено войти в Народный парламент. Думаю, после этого мне удастся убедить Старс Вирл сложить оружие. Но есть одна проблема.\n\nКрикет Чейфер отставил кружку с пивом и вопросительно приподнял бровь. — И какая же?\n\n— Старри Глори. Самый фанатичный лидер лунаристов. Пока он командует партизанами, мир так и останется несбыточной мечтой.\n\nПредседатель нахмурился и задумчиво потёр подбородок копытом. Затем улыбнулся. — Думаю, очень скоро он перестанет быть проблемой. Мой верный товарищ, Лавендер Берри, позаботится о нём.\n\nМеньше чем через неделю пришла новость: Старри Глори был застрелен, а затем заколот неизвестным убийцей. Без его пламенных речей сопротивление быстро пошло на спад, а Лайт Нэрратив воспользовался этим, убеждая всех, насколько лучше станет жизнь при социализме."
#для совпадения числа строк
baltimare.37.a:0 "Одной проблемой меньше."
baltimare.38.t:0 "Коренизация"
baltimare.38.d:0 "Хотя Крикет Чейфер не собирался вести переговоры с деспотичными вождями коренных народов, ему необходимо было убедить самих туземцев прекратить вооружённое сопротивление. Поэтому при содействии прокоммунистически настроенных представителей коренных народов он провозгласил создание четырёх социалистических штатов под управлением туземцев в составе державы [Root.GetNameDef]. Полноценное представительство было даровано нейуа, кольтекам, мейрия и цинакатлям. Остальные, менее многочисленные народы получали местную автономию на более низком уровне управления в составе этих крупных штатов. Все эти федеративные образования сразу стали получать щедрую поддержку от центрального правительства.\n\nБлагодаря этим субсидиям, новые органы местного самоуправления туземцев начали проводить земельную реформу, открывать школы с преподаванием на местных языках и запускать различные инфраструктурные проекты. Благодаря этому они быстро завоевали популярность среди простых туземцев, которые стали покидать своих вождей, скрывавшихся в джунглях, чтобы получить доступ к более качественным услугам. Немаловажную роль сыграла и государственная пропаганда, обещавшая лучшую жизнь всем туземцам, которые прекратят сопротивление и присоединятся к этим новообразованным штатам."
#In the People's Parliament, PON successfully approved government funding for a program to integrate southeastern natives, despite opposition from CAN-TER. It included a rural education reform, various development projects and so on, all aimed to modernize more isolated regions of the southeast and erode tribal identities. Opponents to this claimed it would endanger the culture and way of life of the natives, but Chairpony Cricket Chafer reminded the that the native way of life consisted of inequality, ignorance and poverty. Communism would be introduced to the natives and their lands collectivized, no matter what.\n\nThis also meant that traditional tribal chiefs would be stripped of their status and property. Some native ponies resisted and protested this change, and some chiefs tried to preserve their status with violence, but armed communists soon drove them away from native settlements, forcing them to hide and survive in the jungle. Chafer predicted most natives would welcome this change once the program improved their standards of living, and emphasised the need for educational indoctrination to make them understand the necessity of social revolution.
baltimare.38.a:0 "Победа без единого выстрела."
baltimare.39.t:0 "Великий пожар"
baltimare.39.d:0 "Десятки самолётов, прежде использовавшихся для перевозки почты, обучения пилотов и сельскохозяйственных работ, были реквизированы Государством и переоборудованы в аэропорту Балтимейра. Тысячи канистр с напалмом, термитом и другими зажигательными веществами изготовили на химических заводах Балтимейра или закупили за границей. Затем их превратили в авиационные бомбы и загрузили на самолёты.\n\nВоздушная эскадра вылетала днём, когда многие бойцы лунного сопротивления спали, ведь фестралы преимущественно сражались ночью. Самолёты обрушивали смертоносный груз, превращая джунгли под собой в море огня. Зажигательные бомбы сбрасывали на все обнаруженные и предполагаемые базы сопротивления. В ослепительной вспышке они разрывались, а крики умирающих тонули в яростном рёве пламени.\n\nТакие налёты повторялись по всему полуострову. Их главным эффектом было психологическое воздействие: многие бойцы сдавались, увидев последствия пожаров. Но некоторые продолжали сопротивляться, поэтому бомбардировки не прекращались. Вскоре была подтверждена гибель Старс Вирл, лидера лунного сопротивления, после чего оно почти полностью угасло.\n\nСотни, а возможно, и тысячи гектаров джунглей превратились в пепел, а избежать жертв среди мирного населения тем более не удалось. Лавендер Берри распорядился превратить теперь богатые золой земли в подсечно-огневые сельскохозяйственные угодья. Обугленные останки бойцов сопротивления должны были стать удобрением для новой почвы."
baltimare.39.a:0 "Дело того стоило."
baltimare.40.t:0 "Кричащие джунгли"
baltimare.40.d:0 "Армия Государства готовилась к мрачной, но, по мнению её командования, необходимой задаче: сокрушить сопротивление коренных народов, национализировать их земли и имущество и заставить их подчиниться распоряжениям правительства. Чтобы добиться этого, солдат призывали не проявлять жалости, а пропаганда без устали изображала сопротивлявшихся туземцев кровожадными реакционерами, практикующими каннибализм и жертвоприношения жеребят.\n\nКаждый очаг сопротивления и туземная деревня сначала подвергались предупредительной бомбардировке напалмом или термитом. Если жители не сдавались и не соглашались немедленно интегрироваться в Государство, армия переходила в наступление с огнемётами и винтовками, методично выслеживая всех несогласных. Такую тактику последовательно применяли от региона к региону: сотни деревень были уничтожены, а ещё сотни вынуждены были покориться. Верность обеспечивали захватом заложников и разоружением местного населения.\n\nВо многих местах туземцы оказывали сопротивление, используя украденное огнестрельное оружие или самодельные луки и копья. Потерь избежать не удалось, однако коренные жители были дезорганизованы, уступали противнику численно и мало что могли противопоставить огню, пожиравшему их родные джунгли.\n\nЧисло погибших оказалось огромным, но когда дым наконец рассеялся, на юго-востоке воцарилась тишина. Наконец-то здесь наступил мир."
baltimare.40.a:0 "Необходимый шаг."
baltimare.41.t:0 "Барабаны войны"
baltimare.41.d:0 "Однажды ночью эхо пронеслось повсюду по джунглях. Барабаны, непрерывно бьющиеся в медленном и устойчивом ритме. Для того, чтобы найти источник этого несанкционированного шума, требовалось разрешение от Министерства Музыки, чтобы мобилизовать патрулирование. Но когда патрули приблизились к источнику звука, те затихли, чтобы затем появиться еще дальше. Вскоре патрули сдались.\n\nТогда барабаны стали бешено биться. Каждый день мир оживлялся. Звуки становились громче и многочисленнее. Все же барабанщики скрывались и наглели. Войска все больше нервничали.\n\nОсобенно после того, как они начали исчезать один за другим.\n\nВскоре солдаты покинули свои посты, так как их товарищи пропали без вести в патрулях и ночью. Тем не менее, товарищ Берри был недоволен и приказал расстреливать дезертиров и посылал все больше и больше войск в джунгли. Он снова начал готовить свои напалмовые бомбардировщики, чтобы быстро справиться с этой неприятностью.\n\nПоступили сообщения о саботаже самолётов и разграбленных арсеналах. Взрывы отозвались эхом возле Балтимейра, когда хранилища, заполненные термитом и напалмом, взорвались без явной причины. Берри не знал, что это было только начало.\n\nНа следующий день началась война. Орды разъяренных туземцев, пони и фестралов, облитые кровью принесенных в жертву солдат, сметали небольшие очаги сопротивления. До того, как армия смогла быть мобилизована, половина полуострова уже была под контролем дикарей. Их лидер наконец-то показал себя. Это был Ауизотль, сын Солнца и Луны, Избранный. Убийца тиранов."
baltimare.41.a:0 "Мы должны сокрушить этих повстанцев!"
baltimare.41.b:0 "Смерть тирану!"
baltimare.42.t:0 "Юго-восточное восстание"
baltimare.42.d:0 "[This.GetNewspaperHeader]Лавендер Берри, председатель [BAL.GetName], установил истинное царство террора на юго-востоке Эквестрии, совершая ужасные действия против местных фестралов, туземцев и всех остальных, кто пытается сопротивляться его правлению. Теперь поступают смутные сообщения о том, что разъяренные туземцы и бэтпони сплотились вокруг лидера по имени Ауизотль и начали масштабное восстание. Свидетельства очевидцев из солдат юго-востока утверждают, что туземцы прибегли к жертвоприношению пони и другим ужасным действиям, чтобы заслужить благосклонность своих богов, но это может быть преувеличением. Еще неизвестно, смогут ли мятежники свергнуть авторитарное правительство партии ЯШКИ."
baltimare.42.a:0 "Должны ли мы поддержать Берри? Нет уж..."
baltimare.42.b:0 "Сокрушите их, мои храбрые солдаты!"
baltimare.42.c:0 "За кого нам вообще стоит болеть?"
#baltimare.43.t:0 "ЮВСЭР запрашивает инвестиции"
#baltimare.43.d:0 "Сообщение от [From.GetLeader] поступило в [Root.Capital.GetName]. Он говорит, что юго-восток опустошен после жестокой войны, и официально просит, чтобы мы отправили им промышленное оборудование и средства, чтобы поднять их экономику, обещая быстрый рост и восстановление, если мы это сделаем. В наших же интересах иметь сильного союзника на юге, утверждает он. Взамен ЮВСЭР предоставит нам часть своего ежегодного производства каучука, ресурса, которого у нас очень мало.\n\nКак мы ответим нашим товарищам-революционерам?"
#baltimare.43.a:0 "Конечно же мы поможем нашим товарищам!"
#baltimare.43.b:0 "Мы не можем себе это позволить."
#baltimare.44.t:0 "Сталлионград соглашается инвестировать"
#baltimare.44.d:0 "Сообщение поступило от [From.GetLeader] из Сталлионграда. Они говорят, что Сталлионград с радостью сделает все возможное, чтобы помочь своим союзникам на юге, чтобы мы могли вместе процветать и развивать нашу дружбу. Корабли уже вышли, перевозя промышленное оборудование и средства, которые нам крайне необходимы. Чейфер уже готовит документы, которые предоставят Сталлионграду часть нашего производства каучука. Сотрудничество окажется очень полезным для нас обоих."
#baltimare.44.a:0 "Вперед в светлое будущее, товарищи!"
#baltimare.45.t:0 "Сталлионград отказывается инвестировать"
#baltimare.45.d:0 "Сообщение поступило от [From.GetLeader] из Сталлионграда. Они говорят, что Сталлионград не может позволить себе отправлять что-либо в настоящее время или в ближайшем будущем, а то и даже в отдаленном будущем. На этом сообщение заканчивается. Это похоже на холодное предательство тех, кого мы считали нашими товарищами."
#baltimare.45.a:0 "Они ведут себя как грифоны, а не как коммунисты..."
baltimare.46.t:0 "Беженцы с юго-востока"
baltimare.46.d:0 "В последние месяцы анархистская голытьба на юго-востоке Эквестрии жестоко подавила сопротивление лунаристов, и, к сожалению, наш отважный генерал Старс Вирл пала в бою, мужественно сражаясь с мятежной шпаной. Последние очаги сопротивления были уничтожены, а тысячи сторонников Найтмер оказались в плену.\n\nПосле этой катастрофы ситуация лишь ухудшилась: анархисты начали преследовать всех, кого подозревали в симпатиях к Лунной Империи, выгоняя их из домов и называя «монархической мразью». Теперь десятки тысяч беженцев устремляются через границу в поисках спасения от анархии и хаоса, воцарившихся на юго-востоке. Очевидно, что преступников необходимо как можно скорее привлечь к ответственности, а порядок – восстановить раз и навсегда."
baltimare.46.a:0 "Анархистские дураки."
baltimare.48.t:0 "Провинция Манго потеряна"
baltimare.48.d:0 "Поступили сообщения о том, что провинция Манго, расположенная на юго-востоке Эквестрии, была захвачена вооружёнными ополченцами, связанными с Республикой Балтимейр. Эта дерзкая операция стала возможной из-за отсутствия в регионе наших военных подразделений. Хотя провинция Манго не имела для нас большого стратегического значения, Балтимейр сможет использовать её как плацдарм для ударов по своим северным врагам."
baltimare.48.a:0 "Мы скоро её отвоюем."
baltimare.49.t:0 "Добыча"
baltimare.49.d:0 "Маг Медоубрук перевязала ногу Дэринг Ду. Бинт быстро пропитался кровью. Она покачала головой и вздохнула. — Ты собираешься продолжать сражаться?\n\nПегаска вызывающе кивнула. — До самого горького конца. Я не из тех пони, кто так легко сдаётся.\n\n— Многие из твоих друзей недавно бежали с юго-востока. Я помогла некоторым из них спастись. Поскольку раньше я оказывала помощь коммунистам, они позволяют мне это. Честно говоря, не думаю, что им вообще есть дело до того, что я помогаю вам. Они просто хотят, чтобы вы исчезли с их глаз долой...\n\n— Пусть так. Но я всё равно не уйду.\n\n— Когда-нибудь ты получишь рану, которую не сможет исцелить даже моя магия.\n\n— Значит, так тому и быть. Я паду в бою.\n\nМедоубрук взяла фляжку с целебным зельем и протянула её своей пациентке. Дэринг осушила её одним глотком. — Спасибо, — она вернула пустую фляжку. — Скажи, разве ты не одна из Столпов Эквестрии? Почему ты не сражаешься вместе с нами?\n\n— В те времена мы сражались со злом и защищали от него Эквестрию. Коммунисты, насколько я могу судить, не являются злом. Фанатики? Да. Заблуждающиеся? Возможно. Но не зло. Для меня было бы неправильно сражаться против своих соотечественников. Тысячу лет назад я не могла бы даже представить себе подобную гражданскую войну, даже в самых страшных кошмарах. Я считаю, что всем пони следует перестать сражаться друг с другом, даже если это означает жить при новом режиме. Мир дороже всего на свете. Я устала видеть умирающих пони у своих копыт.\n\nДэринг Ду ничего не ответила и лишь молча устремила взгляд вдаль."
baltimare.49.a:0 "— Я понимаю. Но герои должны продолжать сражаться, что бы ни случилось."
baltimare.50.t:0 "Возвращение домой"
baltimare.50.d:0 "— Босс, ты уверен? — спросил Бестия, один из трёх приспешников доктора Кабальерона.\n\nПереодетый земной пони молча смотрел вдаль. Они стояли в гавани Мейридиана, к которой медленно приближался стальной корабль. — Да.\n\n— Мы и правда просто сдаёмся? — спросил Бифф. — Я слышал, Дэринг Ду всё ещё сражается.\n\n— Глупость. Эта кобыла, похоже, так и не научилась вовремя останавливаться. Потому-то она и стала моей вечной головной болью.\n\nКабальерон тихо хмыкнул, снова посмотрел на море, и выражение его лица смягчилось. — Война проиграна, а я так давно не был в Пуэрто-Кабальо...\n\n— Ты звучишь усталым, босс, — сказал Бестия. — Неужели это действительно конец?\n\n— Я взвалил на себя слишком много. Но это ещё не конец света. Я собираюсь уйти на покой и написать несколько книг. У меня даже есть псевдоним, — он повернулся к своим помощникам с улыбкой. — Как вам «Кью Кью Мартингейл»?\n\nТрое переглянулись. Затем Визерс, самый молчаливый из них, одобрительно кивнул. — Хорошее имя, босс, — сказал Бестия.\n\n— Даже отличное, — добавил Бифф."
baltimare.50.a:0 "Он сюда больше никогда не вернётся."
baltimare.51.t:0 "Коммунисты захватывают Эквестрию"
baltimare.51.d_anarchy:0 "[This.GetNewspaperHeader]То, что началось как коммунистическая революция в портовом городе Балтимейр, теперь охватило всю Эквестрию. Старый порядок, основанный на правлении аликорнов, окончательно пал, и для страны началась новая эпоха. Анархо-коммунисты из ГАЛ приступили к уничтожению последних остатков прежнего государства, стремясь создать безгосударственную конфедерацию рабочих коммун. Поступают сообщения о том, что сотни, если не тысячи, пони, подозреваемых в монархических взглядах и контрреволюционной деятельности, были казнены без суда и следствия." 
baltimare.51.d_normal:0 "[This.GetNewspaperHeader]То, что началось как коммунистическая революция в портовом городе Балтимейр, теперь охватило всю Эквестрию. Старый порядок, основанный на правлении аликорнов, окончательно пал, и для страны началась новая эпоха. Социалистическая республика была провозглашена единственной законной властью в стране, а [BAL.GetLeader] – её председателем. Тысячи состоятельных пони и сторонников монархии бегут за границу."
baltimare.51.d_nightmare:0 "[This.GetNewspaperHeader]То, что началось как коммунистическая революция в портовом городе Балтимейр, теперь охватило всю Эквестрию. Старый порядок, основанный на правлении аликорнов, окончательно пал, и для страны началась новая эпоха. Авторитарные социалисты из ЯШКИ приступили к уничтожению последних остатков прежнего государства, стремясь укрепить свой тоталитарный коммунистический режим. Вся частная собственность была официально национализирована. Поступают сообщения о том, что тысячи пони, подозреваемых в монархических взглядах и контрреволюционной деятельности, были казнены без суда и следствия."
baltimare.51.a:0 "Начнём же с чистого листа, забыв о прошлом!"
baltimare.51.b:0 "Какой ужасный поворот событий."
baltimare.52.t:0 "Наступление новой эры"
baltimare.52.d:0 "Оглушительный грохот разнёсся по центральной Эквестрии, когда королевский замок в Кантерлоте был взорван тоннами взрывчатки. Здание, более тысячи лет служившее символом правления принцессы Селестии, исчезло в облаке чёрного дыма, а его руины обрушились вниз по склону горы. Всё ценное, что находилось внутри, было заранее вывезено и распределено среди жителей Кантерлота. Однако половина города превратилась в призрак: большая часть богатой единорожьей элиты покинула его. Лишь немногие решили остаться и открыто бросить вызов новой власти, но все они были арестованы, казнены, а их тела сброшены со скалы.\n\nК сожалению, другой символ монархии – Замок Дружбы в Понивилле – оказался куда прочнее. Несмотря на аналогичную попытку сноса, он не получил ни малейших повреждений. Не желая признавать поражение, анархисты просто увешали его своими флагами и знамёнами, скрыв постройку под чёрно-красными полотнами.\n\nВ Понивилле, Кантерлоте и каждом городе, посёлке и деревне имущество было коллективизировано, рабочие советы – избраны , а монархические памятники – разрушены. Некоторые пони, главным образом беднейшие, приветствовали эти перемены. Но большинство оставалось настроено скептически или даже открыто враждебно. Предстояло проделать ещё огромную работу, чтобы предотвратить контрреволюцию и обеспечить стране светлое анархическое будущее."
baltimare.52.a:0 "Вперёд, товарищи, за работу!"
baltimare.53.t:0 "Элементы анархии"
baltimare.53.d:0 "«ЭЛЕМЕНТЫ АНАРХИИ: РАВЕНСТВО, РЕШИТЕЛЬНОСТЬ, НАДЕЖДА, СВОБОДА, СОЛИДАРНОСТЬ, СООБЩЕСТВО»\n\nНебольшая группа пони в плащах с капюшонами стояла перед огромным плакатом с красной надписью, испытывая смешанные чувства.\n\n— Отстой, — сказала одна из них. — «О, посмотрите на меня, я – Элемент Сообщества». Разве это не звучит глупо?\n\n— ...не думаю, что эти элементы вообще должны воплощаться в отдельных пони, как Элементы Гармонии. По-моему, это просто набор общих ценностей.\n\n— То есть носителей элементов больше не будет? — спросила другая пони и ахнула. — Тогда получается, что мы... БЕЗРАБОТНЫЕ?!\n\n— Тише! Замолчи, тебя могут услышать, — сказала четвёртая пони. — И вообще, есть ли у них теперь безработица? Не думаю, что кому-то сейчас приходится работать, чтобы заработать себе на жизнь, — она презрительно фыркнула. — Чушь собачья!\n\nИздалека послышались шаги и показалась группа пони с винтовками, оживлённо болтавшая и смеющаяся.\n\n— Б-быстрее, прячьтесь! — пискнула пятая пони, и все они тут же скрылись в тёмном переулке."
baltimare.53.a:0 "Эти гораздо лучше прежних."
baltimare.54.t_golden:0 "Конец ПОН"
baltimare.54.d_golden:0 "Голден Делишес и Крикет Чейфер сидели в баре. Последний держал в копыте кружку кукурузного пива и с любопытством поглядывал на стакан Голдена. — Хм, а что ты заказал?\n\n— Грушевый сок. Я не пью алкоголь.\n\n— Грушевый?... — Крикет улыбнулся, а затем расхохотался. — За такое семья Эппл от тебя точно отречётся!\n\n— Они уже отреклись, — спокойно ответил Голден, допивая напиток.\n\nКрикет умолк, затем прочистил горло. — Ладно. В любом случае ты прекрасно знаешь, зачем я тебя сюда пригласил.\n\n— Поговорить о политике?\n\nОн кивнул, — Партия ортодоксальных народников была для меня как родное дитя. Я основал её в 998 году и с тех пор оставался её лидером. А потом пришёл ты и ликвидировал её. Убил моё собственное детище! — веселье вновь вернулось на его лицо, и он ухмыльнулся. — Как ты мог? Я думал, мы друзья.\n\n— Прости, ничего личного. Все остальные партии тоже исчезли. Взять хотя бы ЯШКИ, — при упоминании этой аббревиатуры Голден даже не пытался скрыть своего отвращения. — Партийная система в принципе чужда Эквестрии. Это грифонья традиция.\n\n— Разве грифоны нам не товарищи? — с усмешкой спросил Крикет.\n\n— Я не об этом... Я хочу сказать, что пони гораздо легче принимают местное самоуправление и экономику, управляемую профсоюзами, чем власть партийной верхушки. Так будет лучше.\n\nЧейфер медленно кивнул. — Наверное, ты прав. Не могу сказать, что полностью с тобой согласен, но... ты выиграл выборы. Значит, можешь делать всё, что считаешь нужным.\n\n— Ты всё ещё можешь баллотироваться на пост председателя. Кто знает, может быть, если победишь, то сумеешь вернуть партии, — сказал Голден с улыбкой."
baltimare.54.t_cricket: "Сверху"
baltimare.54.d_cricket:0 "Голден Делишес и Крикет Чейфер сидели в баре. Последний держал в копыте кружку кукурузного пива и с любопытством разглядывал стакан собеседника.\n\n— Хм, а что это у тебя за напиток?\n\n— Грушевый сок. Я не пью алкоголь.\n\n— Грушевый?.. — Крикет улыбнулся, а затем громко расхохотался. — Да за такое семья Эппл от тебя точно отречётся!\n\n— Они уже отреклись, — спокойно ответил Голден, не разделяя его веселья, и отпил немного сока.\n\nКрикет сразу умолк и неловко прочистил горло.\n\n— Понятно. В общем, зачем ты меня сюда пригласил?\n\n— Поговорить о политике.\n\nКрикет удивлённо хмыкнул:\n— Да брось. Я думал, мы пришли просто посидеть и отдохнуть.\n\n— Я серьёзно, — продолжил Голден. — Мы в ОП(р) давно добивались расширения представительства профсоюзов в правительстве, но я никак не ожидал, что в ответ ты учредишь ВЦКП.\n\nЛысый пони лишь пожал плечами:\n— Но я ведь дал вам то, чего вы просили, разве нет? В чём проблема?\n\n— Я знаю, что ты действовал из лучших побуждений. Но меня тревожит сосредоточение всей политической власти в одном центральном органе. Ты выбрал директивное решение сверху вместо низовой организации.\n\n— Так гораздо эффективнее. — Крикет отхлебнул кукурузного пива. — Поверь мне, всё будет работать как надо.\n\nГолден нахмурился:\n— Что ж, я тебе доверяю. Именно поэтому я и пытался убедить ГАЛ-ОП(р) не мешать твоим реформам. Но они совсем не в восторге от твоей централизации и государственнического подхода.\n\nЧейфер ухмыльнулся, и немного пива капнуло у него изо рта:\n— Когда они увидят, к какому успеху приведёт политика ПОН, они сами поймут необходимость использования государства как инструмента для построения истинного коммунизма."
baltimare.54.a:0 "— Может быть, и пойму. Кто знает."
baltimare.54.b:0 "— Возможно, они поймут."
baltimare.55.t:0 "Назад в Мейнхеттен"
baltimare.55.d:0 "Последний раз Голден Делишес бывал в Мейнхеттене, крупнейшем городе Эквестрии, ещё до начала гражданской войны. Хотя следы конфликта были заметны повсюду, большая часть Столицы Мира  по-прежнему выглядела почти не изменившейся. Это всё ещё было бьющееся сердце эквестрийской промышленности с высокими небоскрёбами и оживлёнными улицами. «Вот настоящая столица нашей страны, — подумал Голден, — а не позолоченная буржуазная реликвия, прилепившаяся к далёкому горному склону». Именно поэтому он решил выступить здесь перед многотысячной толпой. Организовать митинг помогли местные профсоюзы, до освобождения действовавшие в подполье.\n\nПоднявшись на трибуну, Голден глубоко вздохнул и начал речь: — Граждане Эквестрии! Я – председатель Голден Делишес. Я обращаюсь к вам не как завоеватель, а как освободитель. Я сражался на улицах Балтимейра, в знойных джунглях юго-востока, на равнинах и полях – всё ради революции. Я никогда не думал, что не только выживу, но и однажды окажусь в самом Мейнхеттене – величайшем городе мира.\n\nМногие пони встретили эти слова громкими аплодисментами.\n\n— Теперь рабочий класс наконец стоит во главе страны. Правление аликорнов завершилось, и началась новая эпоха. Уже сейчас плоды нашей революции распространяются по всей Эквестрии. Здесь, в Мейнхеттене, власть перейдёт в копыта профсоюзов. Мы будем поощрять коллективизацию собственности, но, вопреки утверждениям наших врагов, никого не станем заставлять вступать в коллективы под дулом пистолета. Я знаю, что многие встретят эти перемены без энтузиазма. Но я твёрдо верю: когда они увидят их плоды, когда почувствуют вкус подлинной свободы, они тоже поймут, что мы были правы. И наконец, я хочу объявить: я не останусь председателем навсегда. Как только революция окрепнет, будут проведены выборы. Поверьте, я сделал всё это не ради личной выгоды и не ради власти. Я посвятил революции всю свою жизнь. И прошу вас лишь об одном – посвятите ей и свою. Только тогда наши мечты станут реальностью!"
baltimare.55.a:0 "Улицы огласились громкими, хотя и нестройными, возгласами одобрения."
baltimare.56.t:0 "Встреча с шестёркой"
baltimare.56.d_twilight:0 "Обладатели Элементов Гармонии – шесть легендарных героинь Эквестрии – пропали без вести в хаосе гражданской войны. Все считали, что они либо ушли в подполье, либо их уже постигла ужасная участь. Но, к счастью для синдикалистов, председатель Голден Делишес принадлежал к семье Эппл, как и Эпплджек – носительница Элемента Честности. Поэтому он выступил по общественному радио, умоляя свою родственницу выйти из укрытия и встретиться с ним, поклявшись не причинить ни ей, ни её друзьям никакого вреда. Это сработало. Вскоре шестеро пони покинули своё убежище, и была организована встреча.\n\nСемеро пони встретились в хорошо знакомом им всем месте – на ферме Эпплджек неподалёку от Понивилля. На ней всё ещё были отчётливо видны следы гражданской войны. — Помнишь, как когда-то здесь собиралась вся семья? — спросил Голден Делишес свою родственницу. — Мы могли бы снова собраться здесь, привести всё в порядок. Мне больно видеть это место в таком состоянии.\n\nЭпплджек вздохнула. — Мне тоже. Но, думаю, сейчас стоит поговорить о другом.\n\n— Верно. Извини... Кхм. Я хотел встретиться с вами, чтобы сказать: вы в безопасности. Никто не станет вас арестовывать, сажать в тюрьму или делать что-либо подобное. Вы сможете жить своей жизнью так же мирно, как и прежде... до всех этих событий.\n\nШестеро пони переглянулись. Затем заговорила Твайлайт Спаркл. — Это... конечно, очень великодушно. Но остаются некоторые вопросы. Что будет с имуществом моих друзей? С их домами и средствами к существованию? И что станет с моим титулом Принцессы Дружбы?\n\n— Я знаю, что наши враги распространяют слухи, будто мы отбираем всю собственность, но это неправда. Коллективизация касается только средств производства и проводится исключительно на добровольной основе. Что же касается твоего титула... ты не против просто перестать им пользоваться?\n\n— А что, во имя Эквестрии, вообще такое «средства производства»? — спросила Рэйнбоу Дэш.\n\nТвайлайт улыбнулась ей. — Потом объясню, — затем она вновь посмотрела на Голдена. — Если это всё, о чём ты просишь, то хорошо. Принцесса я или нет, я всё равно хочу продолжать учить других ценностям гармонии и дружбы.\n\nГолден кивнул. — Хорошо. Думаю, мне удастся убедить товарищей согласиться с этим. Сейчас Эквестрии как никогда нужны такие герои, как вы."
baltimare.56.d_sunrise:0 "Обладатели Элементов Гармонии – шесть легендарных героинь Эквестрии – пропали без вести в хаосе гражданской войны. Все считали, что они либо ушли в подполье, либо их уже постигла ужасная участь. Но, к счастью для синдикалистов, председатель Голден Делишес принадлежал к семье Эппл, как и Эпплджек – носительница Элемента Честности. Поэтому он выступил по общественному радио, умоляя свою родственницу выйти из укрытия и встретиться с ним, поклявшись не причинить ни ей, ни её друзьям никакого вреда. Это сработало. Вскоре пятеро пони покинули своё убежище, и была организована встреча.\n\nШестеро пони встретились в хорошо знакомом им всем месте – на ферме Эпплджек неподалёку от Понивилля. На ней всё ещё были отчётливо видны следы гражданской войны. — Помнишь, как когда-то здесь собиралась вся семья? — спросил Голден Делишес свою родственницу. — Мы могли бы снова собраться здесь, привести всё в порядок. Мне больно видеть это место в таком состоянии.\n\nЭпплджек вздохнула. — Мне тоже. Но, думаю, сейчас стоит поговорить о другом.\n\n— Верно. Извини... Кхм. Я хотел встретиться с вами, чтобы сказать: вы в безопасности. Никто не станет вас арестовывать, сажать в тюрьму или делать что-либо подобное. Вы сможете жить своей жизнью так же мирно, как и прежде... до всех этих событий.\n\nПятеро пони переглянулись. Затем заговорила Рарити. — Всё это, конечно, очень обнадёживает. Но остаются некоторые вопросы. Что будет с имуществом моим и моих друзей? С нашими домами и средствами к существованию?\n\n— Я знаю, что наши враги распространяют слухи, будто мы отбираем всю собственность, но это неправда. Коллективизация касается только средств производства и проводится исключительно на добровольной основе.\n\n— А что, во имя Эквестрии, вообще такое «средства производства»? — спросила Рэйнбоу Дэш.\n\nПинки вздохнула. Её грива безвольно повисла, утратив привычную пышность. — Уверена, Твайлайт бы знала...\n\nГолден сочувственно улыбнулся. — Мне очень жаль, что с ней произошло такое. Но я обещаю, что мы сделаем всё возможное, чтобы найти её и вернуть в прежнее состояние. А пока... вы готовы работать вместе с нами, несмотря на наши разногласия? Сейчас Эквестрии как никогда нужны такие герои, как вы."
baltimare.56.a:0 "Копыта ударились друг от друга, и соглашение было достигнуто."
baltimare.57.t: "Предложение от государства [From.GetNameDefCap]"
baltimare.57.d_syndie: "Наши товарищи из державы [From.GetNameDef] выступили с предложением. Они приглашают нас присоединиться к их федерации, упразднив все границы и полностью объединив наши органы управления. Разумеется, это означало бы принятие их анархо-синдикалистской идеологии и отказ от нашей собственной системы. Стоит ли пожертвовать суверенитетом ради революционного единства?"
baltimare.57.d_commie: "Наши товарищи из державы [From.GetNameDef] выступили с предложением. Они приглашают нас войти в состав их государства, упразднив все границы и полностью объединив наши органы управления. Разумеется, это означало бы принятие их собственной интерпретации идей Карамель Маркс и отказ от нашей нынешней системы. Стоит ли пожертвовать суверенитетом ради революционного единства?"
baltimare.57.a: "Давайте объединимся с нашими товарищами!"
baltimare.57.b: "Нет. Они – ревизионисты."
baltimare.58.t: "[From.GetNameDefCap] соглашается присоединиться"
baltimare.58.d: "Мы получили ответ от державы [From.GetNameDef], и они приняли наше предложение. Все границы между нашими странами будут упразднены, а их государство войдёт в состав нашей федерации, объединившись с нашей системой управления. Конечно, ради этого им пришлось отказаться от собственной модели социализма, но, похоже, они пришли к выводу, что революционное единство важнее всего."
baltimare.58.a: "Пролетарии всех стран, соединяйтесь!"
baltimare.59.t: "[From.GetNameDefCap] отказывается присоединиться"
baltimare.59.d: "Мы получили ответ от державы [From.GetNameDef], и они отклонили наше предложение. Похоже, они предпочли сохранить собственную модель социализма и государственный суверенитет. К сожалению, они не считают революционное единство столь же важным, как мы."
baltimare.59.a: "Жаль, но мы не можем их заставить."
baltimare.60.t: "Новый председатель"
baltimare.60.d: "Голден Делишес сидел на заседании рабочего совета своего родного района в портовом городе Балтимейре. Он больше не был председателем, но по-прежнему состоял в профсоюзе грузчиков ящиков с яблоками. Члены совета обсуждали, кого поддержать на выборах нового председателя. Это были не обычные буржуазные выборы, а социалистические, основанные на принципе консенсуса. Каждый совет выдвигал собственного кандидата, после чего созывался федеральный съезд, чтобы избрать нового председателя из числа кандидатов, получивших наибольшую поддержку.\n\nГолден посмотрел на список кандидатов. Его глаза расширились, когда он увидел знакомое имя: Крикет Чейфер. Похоже, тот всё-таки решил выдвинуть свою кандидатуру. Голден улыбнулся и тихо усмехнулся.\n\n— Те, кто поддерживает Крикета Чейфера, поднимите копыто, — сказал один из членов совета.\n\nВсё ещё улыбаясь, Голден поднял копыто."
baltimare.60.a: "В итоге Крикет Чейфер побеждает на выборах."
baltimare.60.b: "В итоге Старри Плау побеждает на выборах."
baltimare.60.c: "В итоге Строуберри Сноуфлейк побеждает на выборах."
baltimare.60.e: "В итоге Валерий Стаблин побеждает на выборах."
baltimare.61.t: "Новый рассвет в Эквестрии"
baltimare.61.d: "На том самом месте в Мейнхеттене, где когда-то должна была выступить принцесса Луна, теперь перед огромной пёстрой толпой пони стоял Крикет Чейфер. Он приветственно махал копытом и широко улыбался, пока государственный оркестр исполнял торжественный марш.\n\nКогда музыка стихла, он прочистил горло, постучал по микрофону и начал говорить: — Товарищи! Сегодня великий день в истории Эквестрии. Деспотии аликорнов пришёл конец, а у власти находится новое пролетарское правительство. Однако это не означает мгновенных перемен или тотальной революции. Я верю в постепенные преобразования и поэтапное строительство коммунизма. Я не могу обещать, что этот переходный период пройдёт без трудностей, но могу заверить вас: мы сделаем всё возможное, чтобы он оказался как можно менее болезненным. Я пришёл в этот город не как завоеватель, навязывающий свою волю, а как освободитель. А значит, я намерен уважать права и мнение каждого пони. В конце концов, гармония вполне может сосуществовать с коммунизмом. Именно в это изначально верила Карамель Маркс. Товарищи, перед нами стоит грандиозная задача. Но если мы отбросим разногласия и объединим усилия, то сможем добиться чего угодно. В этом и заключается сила магии дружбы. Коммунистическая утопия, где каждый пони живёт в достатке и никто не подвергается эксплуатации, сейчас ближе к нам, чем когда-либо прежде. Помните об этом, и никакие испытания не смогут сломить вашу решимость.\n\nОн продолжал говорить, вселяя в толпу надежду, несмотря на усталость, которую все они испытывали после гражданской войны."
baltimare.61.a: "Гром аплодисментов эхом разнёсся по улицам."
baltimare.62.t:0 "Встреча с шестёркой"
baltimare.62.d_twilight:0 "Агент СВР отдал честь председателю. — Товарищ Чейфер, мы привели заключённых.\n\nСидя за своим столом, Крикет улыбнулся. — Хорошо. Приведите их.\n\nШестерых пони ввели в комнату под конвоем вооружённых охранников. На измученных войной лицах носителей Элементов Гармонии отражалась целая гамма эмоций. Одни смотрели с вызовом, другие – с тревогой или страхом.\n\n— Добро пожаловать, герои Эквестрии! — воскликнул Крикет. — Для меня большая честь наконец встретиться с вами лично.\n\nБывшая Принцесса Дружбы скептически посмотрела на него. — К сожалению, я не могу сказать того же. Чего ты от нас хочешь?\n\n— Ой, да ладно тебе, не будь такой мрачной. Я не собираюсь причинять вам вред.\n\n— Тогда зачем ты бросил нас в тюрьму?! — возмутилась Рэйнбоу Дэш.\n\n— Это был самый надёжный способ собрать вас всех за столом переговоров. Я не хочу, чтобы мы были врагами. Давайте оставим прошлое позади, хорошо? Я хочу кое-что вам предложить. Видите ли, я убеждён, что Элементы Гармонии прекрасно сочетаются с коммунистическими ценностями. Старый порядок с его капитализмом и монархией, на мой взгляд, противоречит самим идеалам дружбы. Нет ничего дружеского в том, что богатые эксплуатируют бедных, или в том, что бессмертный деспот принимает решения за других. Когда вы это поймёте, то сможете присоединиться к нам. В конце концов, ваша помощь необходима нам, чтобы построить лучшее общество для всех существ Эквестрии.\n\n— А мой бизнес мне вернут? — спросила Рарити.\n\n— А как же моя семейная ферма? — спросила Эпплджек.\n\n— А «Сахарный уголок» семьи Кейк? — спросила Пинки.\n\nКрикет покачал головой, но улыбка не сходила с его лица. — Вот именно об этом я и говорю. Вы должны оставить прошлое позади. В новой Эквестрии не будет места мелкобуржуазным предприятиям!\n\n— Значит... я больше не могу быть Принцессой Дружбы? — тихо спросила Твайлайт Спаркл.\n\n— Боюсь, что нет.\n\nОна посмотрела на своих подруг, которые с нескрываемой ненавистью смотрели на Крикета, и тяжело вздохнула. — Прости, но мы не можем работать вместе с тем, кто отнял у нас всё, что было нам дорого.\n\nУлыбка Крикета исчезла. — Что ж. Пусть будет так, — затем он повернулся к охранникам и произнёс:"
baltimare.62.d_sunrise:0 "Агент СВР отдал честь председателю. — Товарищ Чейфер, мы привели заключённых.\n\nСидя за своим столом, Крикет улыбнулся. — Хорошо. Приведите их.\n\nПятерых пони ввели в комнату под конвоем вооружённых охранников. На измученных войной лицах носителей Элементов Гармонии отражалась целая гамма эмоций. Одни смотрели вызывающе, другие – с тревогой или страхом.\n\n— Добро пожаловать, герои Эквестрии! — воскликнул Крикет. — Для меня большая честь наконец встретиться с вами лично.\n\nЭпплджек скептически посмотрела на него. — Чего ты от нас хочешь?\n\n— Ой, да ладно, не будьте такими мрачными. Я не собираюсь причинять вам вред.\n\n— Тогда зачем ты бросил нас в тюрьму?! — возмутилась Рэйнбоу Дэш.\n\n— Это был самый надёжный способ собрать вас всех за столом переговоров. Я не хочу, чтобы мы были врагами. Давайте оставим прошлое позади, хорошо? Я хочу кое-что вам предложить. Видите ли, я убеждён, что Элементы Гармонии прекрасно сочетаются с коммунистическими ценностями. Старый порядок с его капитализмом и монархией, на мой взгляд, противоречит самим идеалам дружбы. Нет ничего дружеского в том, что богатые эксплуатируют бедных, или в том, что бессмертный деспот принимает решения за других. Когда вы это поймёте, то сможете присоединиться к нам. В конце концов, ваша помощь необходима нам, чтобы построить лучшее общество для всех существ Эквестрии.\n\n— А мой бизнес мне вернут? — спросила Рарити.\n\n— А как же моя семейная ферма? — спросила Эпплджек.\n\n— А «Сахарный уголок» семьи Кейк? — спросила Пинки.\n\nКрикет покачал головой, но улыбка не сходила с его лица. — Вот именно об этом я и говорю. Вы должны оставить прошлое позади. В новой Эквестрии не будет места мелкобуржуазным предприятиям!\n\n— А... а как же Твайлайт? — тихо спросила Флаттершай. — Ты найдёшь способ вернуть её в прежнее состояние?\n\n— Боюсь, что нет. То, что она совершила, служа Дейбрейкер, совершенно непростительно.\n\nФлаттершай посмотрела на своих подруг, которые с нескрываемой ненавистью смотрели на Крикета, и вздохнула. — Простите, сэр. Но мы не можем работать с тем, кто даже не хочет нам помочь.\n\nУлыбка Крикета исчезла. — Что ж. Пусть будет так, — затем он повернулся к охранникам и произнёс:"
baltimare.62.a:0 "— Уведите их в лагерь перевоспитания!"
baltimare.63.t:0 "Лагерь перевоспитания"
baltimare.63.d_twilight:0 "— Как же ску-у-у-чно, — протянула Рэйнбоу Дэш.\n\nШесть носительниц Элементов Гармонии сидели за партами вместе с множеством других пони и слушали лекцию по коммунистической идеологии, которую читал один из членов партии ПОН. Лектор сердито посмотрел на Рэйнбоу. — Не могли бы вы, пожалуйста, не перебивать меня?\n\n— Эй, я всего лишь говорю как есть.\n\n— Я думал, вы – Элемент Верности, а не Честности.\n\nЭпплджек тихонько хихикнула, а пегаска лишь пожала плечами. — Элементы не загоняют нас в какие-то рамки, понимаешь? Эпплджек может быть верной, Флаттершай – щедрой, Рарити – доброй и так далее. Мы же не одномерные персонажи, сечёшь?\n\nЛектор тяжело вздохнул. — Вообще-то лекцию здесь читаю я. Итак, вернёмся к теме...\n\nРэйнбоу тут же демонстративно громко захрапела.\n\n— Да ты издеваешься... — устало произнёс лектор. — Неужели ты и правда настолько плохая ученица?\n\n— Вообще-то нет, — ответила Твайлайт. — Просто она не привыкла к такой учёбе. Думаю, она вполне смогла бы разобраться в предмете, если бы вы просто...\n\nЭпплджек одёрнула её, ткнув копытом. — Твай, не помогай им! Ты чего?\n\n— Ой, прости. Просто мне самой это действительно интересно. Не думаю, что есть что-то плохое в том, чтобы изучать подобные вещи. То, что мы разберёмся в коммунизме, ещё не означает, что мы обязаны с ним соглашаться.\n\n— Знаете что? С меня хватит! — воскликнул лектор. — Я больше не могу это терпеть! — с этими словами он гневно вышел из аудитории, оставив после себя растерянных слушателей. Только одна голубая пони перестала притворяться, что храпит, и разразилась громким смехом."
baltimare.63.d_sunrise:0 "— Неужели именно через это проходила Твайлайт, когда Дейбрейкер промывала ей мозги? — прошептала Рарити.\n\nПять носительниц Элементов Гармонии сидели за партами вместе с множеством других пони и слушали лекцию по коммунистической идеологии, которую читал член партии ПОН. Лектор бросил на Рарити раздражённый взгляд. — Не могли бы вы, пожалуйста, помолчать и сосредоточиться на лекции?\n\n— Простите, я просто...\n\n— Она права, — вмешалась Рэйнбоу Дэш. — Вы ничем не лучше соляристов!\n\nПо аудитории прокатился изумлённый вздох, а лектор заметно оскорбился. — Простите? Я здесь для того, чтобы обучать вас, а не промывать вам мозги какой-то идеологией чистого зла!\n\nЭпплджек посмотрела на него с презрением. — Ваша идеология сводится к тому, чтобы государство отнимало у пони землю и предприятия. Что в этом хорошего?\n\n— Сейчас не время для подобных споров...\n\n— Она права, — подала голос одна из пони в аудитории. — Почему мы вообще должны слушать эту чепуху? Даже герои Эквестрии с вами не согласны!\n\n— Знаете что? С меня хватит! — воскликнул лектор. — Я больше не могу это терпеть! — с этими словами он гневно вышел из аудитории, оставив после себя растерянных слушателей."
baltimare.63.a:0 "Со временем они станут настоящими коммунистами."
baltimare.64.t: "Последний рубеж"
baltimare.64.d: "Посреди джунглей возвышался лысый холм, резко выделяясь на фоне зелёного океана. Это место стало единственным убежищем от пламени, поглотившего всё вокруг. Здесь небольшая группа пони разбила лагерь.\n   Целительница Медоубрук перевязала копыто Дэринг Ду, и повязка быстро пропиталась кровью. Медоубрук кашляла от повисшего в небе дыма. — Это должно остановить кровотечение. Сейчас принесу зелье лечения... — она проковыляла в сторону от Дэринг Ду и начала рыться в своих скудных пожитках.\n   Тем временем доктор Кабальерон медленно приблизился к сопернице, с подозрением покосившейся на него. — Чего тебе? Я немного занята борьбой со смертью.\n   — Я... слушай, мы с тобой не были друзьями, но наше соперничество было легендарным, и я хотел сказать...\n   — САМОЛЁТЫ! — закричала караульная. В мгновение ока лагерь пришёл в движение: пони в панике заметались, но на открытом холме спрятаться было негде. Их единственным укрытием являлся густой дым, в котором они надеялись затеряться.\n   Дэринг Ду попыталась сдвинуться с места, но вздрогнула от боли. В эту секунду к ней подбежала Медоубрук и протянула флягу с магической жидкостью. Дэринг залпом осушила её. — Спасибо.\n   — Двигаться можешь? — спросил Кабальерон. — Мы не можем оставаться зде...\n   Громкий рёв самолётов стал оглушительным. Застигнутые врасплох пони заметили, как из летающих машин выпрыгнули вооружённые пегасы в чёрной форме.\n   — Каратели коммуняк! — крикнул другой караульный, хватаясь за оружие. — Открыть огонь!\n   Стиснув зубы, Дэринг сумела подняться. Кабальерон вскорости подхватил два ружья и протянул одно из них пегаске. — Знаешь, вот уж не думал, что всё закончится вот так. Даже Йерлинг не написала бы ничего столь смазливого.\n   Лицо Дэринг тронула почти незаметная улыбка. — Нет. Это не конец, — она взяла винтовку и прицелилась в одного из приближающихся карателей, — потому что герои никогда не проигрывают."
baltimare.64.a: "В живых никого не оставлять."
baltimare.65.t: "Череда диверсий"
baltimare.65.d: "В столицу поступили донесения о серии террористических атак по всей стране, в ходе которых неизвестные исполнители нанесли урон множеству фабрик, уничтожив значительное количество важного оборудования. Кроме того, убитыми найдены и несколько госслужащих, а на улицах появилась подпольная пропаганда, подрывающая нашу власть.\n   Наша разведка сообщает, за этими действиями стоят оперативники Службы военной разведки государства [BAL.GetNameDef]. У нас достаточно доказательств, чтобы предъявить им обвинения. Тем не менее наши военные советуют нанести ответный удар, чтобы проучить злоумышленников и свергнуть их враждебное тоталитарное правительство. Окончательное решение по этому вопросу примет [Root.GetLeader]."
baltimare.65.a: "Публично осудить их."
baltimare.65.b: "Они заплатят за содеянное!"
baltimare.66.t: "Нулевой год"
baltimare.66.d: "Наступил 0 год ПРГ. После рождения Государства.\n   Лавендер Берри сидел в кабинете. Никаких грандиозных церемоний и речей не планировалось. Подписание документа стало лишь формальным подтверждением существования Государства. Затем он заверил ещё несколько бумаг: "казнить три тысячи эквестрийских чиновников", "уничтожить замок в Кантерлоте", "переименовать Кантерлот и Мейнхеттен", "казнить четырнадцать тысяч антикоммунистических пропагандистов". Ручка быстро скользила по страницам.\n   Он вздохнул. Работа лидера была тяжёлой. На его усталых плечах лежало столько ответственности. Секретарша взяла документы, и Лавендер покинул кабинет. Он заслужил хорошую награду за свои труды. — Постой, — сказал он секретарше.\n   Она замерла. — Эм, что такое, товарищ Берри?\n   — Скажи им, чтобы подготовили лимузин. Я собираюсь прокатиться по городу.\n   Она сглотнула и кивнула.\n   Уже через час бронированный лимузин двигался по улицам. В окружении вооружённых охранников Берри разглядывал прохожих. Его взгляд упал на молодую кобылку в красивом платье. Он поднял копыто и указал на неё. — Вот эту. Приведите её ко мне.\n   Телохранители кивнули. Лимузин остановился."
baltimare.66.a: "Лавендер улыбнулся."
baltimare.67.t: "Приманка для вредителей"
baltimare.67.d: "В глубине Вечнодикого леса потрескивал костёр, вокруг которого собралась небольшая группа пони, пытавшихся согреться. Внезапно к ним галопом подскакала кобыла в капюшоне с несколькими газетами в зубах. Пони насторожились, но тут же успокоились, узнав её.\n\n— О, это ты, — сказала одна из них. — Что случилось?\n\nКобыла перевела дух и бросила перед ними газеты. — Смотрите!\n\nНа первых полосах были фотографии их родителей, братьев и сестёр – избитых, покрытых синяками и окружённых вооружёнными пони в чёрной форме. Заголовок гласил: «ВЗЯТЫ ЗАЛОЖНИКИ. ЛАВЕНДЕР ОБРАЩАЕТСЯ С ПОСЛЕДНИМ ПРЕДУПРЕЖДЕНИЕМ К ЭЛЕМЕНТАМ ГАРМОНИИ».\n\nВсе, кто сидел у костра, в молчаливом ужасе уставились на снимки. — Э-это ведь подделка... правда? — дрожащим голосом пробормотала одна из пони.\n\n— Даже если нет, он всё равно блефует, — ответила другая.\n\n— Мы не можем так рисковать! — воскликнула третья. — Нужно сдаться, пока не стало слишком поздно.\n\n— ...Нет, не можем. Н-нам нужно продолжать сражаться. Никого... не пощадят, даже если мы сдадимся. Мы... последняя надежда Эквестрии.\n\n— ТЫ С УМА СОШЛА?! Ты предлагаешь пожертвовать всеми нашими близкими… РАДИ ЧЕГО!?\n\nНекоторые не смогли сдержать слёз.\n\n— Мы... не должны жертвовать и собой, — она сглотнула и с трудом продолжила: — Если мы сдадимся, то умрём вместе с ними.\n\nКобыла в капюшоне стиснула зубы. — Как же мне не хочется признавать, что ты права. С этими словами она бросила газеты в костёр, и пламя мгновенно поглотило их."
baltimare.67.a: "Ну что ж, попытка не пытка."
baltimare.68.t: "Неожиданный поворот событий"
baltimare.68.d: "Лавендер Берри вошёл в зал переговоров. Заняв своё место, он внимательно изучил сидящих за столом пони. Его взгляд застыл на том, кого здесь точно не должно быть. От распиравших его ярости и недоумения он нахмурился. — Крикет Чейфер? Что ты тут делаешь?\n   Крикет поднялся с места и ткнул в него копытом. — Засим я обвиняю Лавендера Берри в измене. Он является капиталистическим шпионом, работающим на иностранные разведслужбы. У нас также есть показания от множества других лиц, уличающих его в ненадлежащем и незаконном поведении. Он – враг рабочего класса.\n   Теперь уже встал Лавендер. — Крикет, что происходит? — он взволнованно оглянулся на остальных, но никто не смотрел на него. — Послушайте, это всё ложь! Я невиновен! Не слушайте эту чепуху – это он главный предатель!\n   Дверь за его спиной резко распахнулась. В зал вошли вооружённые гвардейцы и окружили его. Он поражённо раскрыл глаза.\n   Крикет с жалостью посмотрел на него. — Настоящим решением вы арестованы. Охрана, уведите его!\n   Когда гвардейцы схватили Берри, он начал вырываться. — Нет, прошу! Это какая-то ужасная ошибка! Пожалуйста, пощадите! Я-я требую честного суда! Нет! — в потасовке его очки слетели и разбились вдребезги. Он продолжал громко вопить до тех пор, пока стража не выволокла его прочь и не захлопнула за собой дверь.\n   Крикет глубоко вздохнул, улыбнулся и посмотрел на присутствующих. — Итак, товарищи, теперь, когда Лавендер Берри не может исполнять свои обязанности, предлагаю избрать нового лидера."
baltimare.68.a: "Они единогласно проголосовали за Крикет Чейфера."

### Decisions

BAL_decisions:0 "Да здравствует революция!"
BAL_decisions_desc:0 "Революция должна выстоять любой ценой. Ночь капитализма подходит к концу, и уже занимается алый рассвет светлого социалистического будущего. Все пони и другие существа должны внести свой вклад, сплотившись под красным знаменем, пропитанным кровью павших героев рабочего класса.[BAL_influence_scripted_loc]" 
BAL_influence_scripted_loc_show:0 "\n\nВлияние либертарианского социализма составляет §C[?BAL_libsoc_influence]%§!.\nВлияние государственного социализма составляет §R[?BAL_authsoc_influence]%§!.\nЕсли §Yвлияние§! одной из сторон достигнет как минимум §Y75%§!, после войны может произойти нечто §Rнеожиданное§!..."
