l_russian:
###########################################
### FOCUS LOCALISATION ####################
###########################################
BAL_revolution:0 "Созвать Балтимейрский конгресс"
BAL_revolution_desc:0 "Нам нужно объединиться, если мы хотим победить в этом конфликте. На замену старому правительству мы сформируем новое, где во главе будут стоять рабочие. Это будет социалистическая демократическая республика с левоуклонной конституцией, берущая за основу революционные идеалы. Это будет Рабочая Республика Балтимейр!"
BAL_anarchists_in_government:0 "Анархисты в правительстве"
BAL_anarchists_in_government_desc:0 "Хотя анархисты из ГАЛ до сих пор не решались присоединиться к конгрессу, сейчас большинство из них согласились с тем, что сотрудничество с этатистами необходимо. Имея места в Конгрессе, они смогут выступать против любых предложений ПОН или ЯШКИ, что будут слишком сильно притеснять свободу простых горожан."
BAL_advisors_from_stg:0 "Советники из Сталлионграда"
BAL_advisors_from_stg_desc:0 "Наши товарищи из Сталлионграда на протяжении многих лет успешно борются с буржуазией и строят социализм. Было бы глупо не попросить их о помощи. Их лучшие умы и талантливейшие командиры помогут нам в нашей борьбе... если, конечно, они согласятся отправить их сюда."
BAL_workers_self_management:0 "Рабочая самоорганизация"
BAL_workers_self_management_desc:0 "Средства производства принадлежат рабочим, а потому рабочие сами должны управлять своими предприятиями при минимальном вмешательстве государства. Вместе с повышением автономии трудящихся также вырастет и их мораль, а с капиталистической эксплуатацией будет навсегда покончено."
BAL_nationalization:0 "Государственное вмешательство"
BAL_nationalization_desc:0 "Путь к коммунизму полон трудностей, и недавний экономический хаос только подтвердил, что вмешательство правительства необходимо как временная мера, особенно во время войны. Поскольку у нас демократическое рабочее правительство, рабочие всё ещё могут принимать участие в контроле предприятий."
BAL_mayors_fate:0 "Разобраться с мэром"
BAL_mayors_fate_desc:0 "Эш Мастэш, бывший мэр Балтимейра, оказался ничем не лучше той деспотичной кобылы, что спустила на нас своих псов-полицейских во время всеобщей забастовки 995 года. Он с радостью встретил империалистов-лунаристов и поддержал их недолго продержавшийся режим. Но всё же некоторые из нас говорят о дружбе и прощении. Конгресс должен решить его судьбу."
BAL_loot_royal_armouries:0 "Захватить королевские арсеналы"
BAL_loot_royal_armouries_desc:0 "Небольшой гарнизон эквестрийcких королевских стражников был взят в плен лунаристами, когда те оккупировали город, но их снаряжение осталось нетронутым в арсеналах. Чего же мы ждём? Давайте вскроем и опустошим их, взяв всё, что нам нужно. В конце концов, мы же не хотим, чтобы это оружие попало в грязные копыта монархистов или лунаристов."
BAL_form_industrial_committees:0 "Создать промышленные комитеты"
BAL_form_industrial_committees_desc:0 "До сих пор в нашей новой социалистической экономике полностью отсутствовали планирование и кооперация. Мы должны исправить это, создав демократические рабочие комитеты на наших производственных предприятиях и фермах, которые затем будут совместно составлять децентрализованные экономические планы и выполнять их в сотрудничестве друг с другом."
BAL_meadowbrooks_aid:0 "Помощь целительницы Медоубрук"
BAL_meadowbrooks_aid_desc:0 "На Семенных болотах живёт пони, известная как одна из древних хранительниц Эквестрии. Её зовут Медоубрук, и о её навыках исцеления знает весь Балтимейр. Хотя ей нет никакого дела до нашей революции, и она вполне возможно симпатизирует монархистам, она более чем готова лечить наших раненых и больных ополченцев, что также повышает их боевой дух."
BAL_weapons_from_stalliongrad:0 "Оружие из Сталлионграда"
BAL_weapons_from_stalliongrad_desc:0 "У наших северных товарищей есть процветающая промышленность и огромные запасы вооружений. Наверняка они с радостью снабдят нас всем, о чём мы попросим. Таким образом мы не тронем эквестрийские арсеналы и избежим гнева эквестрийцев или сочувствующих им. Конечно, нам для начала нужно будет решить, что именно мы хотим от Сталлионграда."
BAL_supreme_economic_council:0 "Учредить Верховных экономический совет"
BAL_supreme_economic_council_desc:0 "Конгресс постановил учредить единый совет, который займётся разработкой общегосударственного экономического плана на всё время войны. Он также будет строго следить за тем, чтобы все нижестоящие учреждения чётко следовали его планам по производству, распределению и размещению ресурсов. Никакие отклонения от этого курса допускаться не будут."
BAL_armed_unions:0 "Вооружённые профсоюзы"
BAL_armed_unions_desc:0 "Наши профсоюзы уже взялись за оружие и сформировали отряды ополчения. Теперь товарищ Делишес предлагает нам законодательно закрепить их право на ношение оружия, в будущем включив простых рабочих в наши войска. Члены профсоюзов готовы служить и защищать свои дома от агрессии реакционеров, хотя их умения и оставляют желать лучшего."
BAL_revolutionary_discipline:0 "Революционная дисциплина"
BAL_revolutionary_discipline_desc:0 "Бесполезно просто отдавать приказ сражаться. Кто-то должен объяснить бойцам, зачем они должны сражаться и почему это так важно. Только тогда они добровольно возьмутся за оружие и не побегут прочь при первых признаках опасности."
BAL_consolidate_production:0 "Объединить производство"
BAL_consolidate_production_desc:0 "Становится очевидно, что малые предприятия не смогут сравниться с крупными. Мы должны закрыть магазинчики мелкой буржуазии и учредить крупные производственные синдикаты, которые способны предоставить множество рабочих мест и которыми будет проще управлять нашим комитетам."
BAL_anti_monarchism:0 "Антимонархическая демонстрация"
BAL_anti_monarchism_desc:0 "Пони Эквестрии традиционно видели в Селестии и других аликорнах богоподобных непогрешимых существ. Жестоко подавленная Зимняя революция доказала обратное, как и последующая гражданская война. И всё же некоторые из нас продолжают заниматься самообманом. Мы должны показать правду об этих подлых монархах и склонить скептиков на нашу сторону."
BAL_create_mis:0 "Создать СВР"
BAL_create_mis_desc:0 "Лавендер Бэрри, глава ЯШКИ, предложил нам учредить секретную службу, в которой будут состоять члены его партии. Они будут следить за врагами революции, ловить вражеских шпионов и заниматься расшифровкой сообщений наших врагов. Лавендер стремится использовать свои таланты в качестве главы этой организации."
BAL_military_commissars:0 "Военные комиссары"
BAL_military_commissars_desc:0 "Для поддержания высокого боевого духа ополчения и укрепления революционных идеалов к каждому военному подразделению необходимо прикрепить политических комиссаров. Они станут для бойцов вдохновляющими лидерами и наставниками, а также будут управлять всем снабжением, строго нормируя и распределяя припасы военного времени в наших рядах."
BAL_protect_middle_class:0 "Дать поблажку среднему классу"
BAL_protect_middle_class_desc:0 "Анархо-синдикалисты стремятся коллективизировать собственность мелких землевладельцев и торговцев, считая их врагами революции. Они ошибаются. Против нас выступают крупная буржуазия, империалисты и монархисты. В этот кризисный и конфликтный период у нас не остаётся иного выбора, кроме как оставить мелкую буржуазию в покое."
BAL_delicious_column:0 "Сформировать Колонну Делишеса"
BAL_delicious_column_desc:0 "Пока Голден Делишес ведёт марш по сельской местности, всё больше пони собираются под его красным знаменем, стремясь примкнуть к восстанию. Из-за границы также прибывают добровольцы, готовые поддержать наше дело. Мы должны радушно принять и снабдить их всем необходимым, чтобы плечом к плечу с нами они сражались и несли пламя революции врагу."
BAL_abolish_bit:0 "Отменить биты"
BAL_abolish_bit_desc:0 "Деньгам нет места в социалистическом обществе, которое мы строим во время войны. Распределение должно основываться на потребностях, а не на личном богатстве. Мы превратим храмы в общественные склады и позволим пони брать из них всё, что им нужно. Если возникнет нехватка, будет проведено нормирование, дабы каждый получил свою равную долю."
BAL_red_terror:0 "Красный террор"
BAL_red_terror_desc:0 "Антимонархическая демонстрация только раззадорила нас. Давайте направим эту вспышку ярости в наших сердцах на врагов среди нас – банкиров, промышленников, империалистов, монархистов, жрецов и помещиков. Все те, кто угрожает революции пролетариата, кто десятилетиями и веками угнетал нас – все они должны захлебнуться в крови."
BAL_state_capitalism:0 "Временный государственный капитализм"
BAL_state_capitalism_desc:0 "В эти тяжёлые времена государству необходимо взять управление экономикой в свои копыта. Это выверенный шаг на пути к социализму, временно сочетающий капитализм с государственным контролем и собственностью. Такая мера позволяет предотвратить эксплуатацию трудящихся со стороны буржуазии, неизбежную при обычном, ничем не ограниченном капитализме."
BAL_regular_army:0 "Создать регулярную армию"
BAL_regular_army_desc:0 "Эта война не будет выиграна группами неорганизованных, недисциплинированных ополченцев. Мы должны создать правильную, иерархически организованную и централизованно управляемую армию. Только тогда у нас появится шанс против реакционных полчищ, угрожающих нашей революции."
BAL_devolve_government:0 "Ослабить правительство"
BAL_devolve_government_desc:0 "Хотя до сих пор Конгресс был в состоянии принимать относительно мудрые решения, влияние этатистов слишком велико и препятствует нашим планам по созданию настоящей социалистической утопии. Чтобы исключить этих центристов, реформистов и предателей революции, мы должны ослабить Конгресс и расширить возможности местных, низших институтов."
BAL_arrest_anarchists:0 "Арестовать анархистов"
BAL_arrest_anarchists_desc:0 "Сталлионград грозит лишить нас поддержки, если мы не усмирим леворадикалов, подрывающих целостность нашего молодого государства. Мы не можем позволять анархистам вооружать свои отряды патрульных, устраивать незаконную коллективизацию того, чего они хотят, и игнорировать решения Конгресса. Закон и порядок должны быть восстановлены любыми способами."
BAL_to_the_barricades:0 "На баррикады!"
BAL_to_the_barricades_desc:0 "Теперь, когда мы обезопасили страну изнутри, мы должны обезопасить её извне. Реакционеры, желающие уничтожить нашу революцию, должны быть подавлены. Рабочие должны сплотиться, чтобы защитить свои дома от врага, который хочет отобрать у нас всё и превратить нас в рабов. Да здравствует революция! Они не пройдут!"

BAL_proclaim_sesr:0 "Провозгласить Юго-Восточную Эквестрийскую Республику"
BAL_proclaim_sesr_desc:0 "Теперь, когда мы сокрушили врагов революции, пришло время объединить земли, ранее находившиеся под оккупацией реакционеров. Мы предлагаем всем рабочим присоединиться к нашей новорожденной Юго-Восточной Эквестрийской Социалистической Республике и принять наши социалистические идеалы. Рабочие юго-востока, соединяйтесь!"
BAL_elections:0 "Провести выборы"
BAL_elections_desc:0 "Основы для построения республики уже заложены. Скоро переходное правительство уйдёт в отставку, а новые лидеры, избранные демократическим путём, займут его место. Конечно, реакционные партии не будут допущены к выборам, но не считая этого, все взрослые рабочие смогут свободно голосовать или становиться кандидатами."

BAL_complete_anarchy:0 "Революция ГАЛ"
BAL_complete_anarchy_desc:0 "Боевики лиги анархистов добились своей цели по уничтожению ненавистного государства. Теперь рабочие юго-востока увидят свет истинной свободы и коммунизма, а не пропагандистской лжи ПОН и ЯШКИ, которую они хотят повесить им на уши. Власть рождает паразитов. Да здравствует анархия!"
BAL_hunt_monarchists:0 "Изгнать монархистов"
BAL_hunt_monarchists_desc:0 "Сторонникам старого порядка нет места в нашем революционном обществе. Принцессы похожи на властных и самолюбивых матерей, а монархисты – на детей, которые боятся перечить им. Если они так сильно любят их, то почему бы им не убраться отсюда и не уехать к своим милым принцессам?"
BAL_erase_statism:0 "Стереть все следы этатизма"
BAL_erase_statism_desc:0 "Неэффективный и бездушный государственный аппарат должен быть сожжён дотла. Чиновникам придётся подыскать себе новую работу, но по крайней мере, этот бог-из-государственной-машины больше не притесняет нас. Конечным результатом нашей работы станет федерация децентрализованных, автономных коммун, которые будут управлять сами собой."
BAL_freedom_of_faith:0 "Конец религии"
BAL_freedom_of_faith_desc:0 "Эпоха, когда пони почитали или даже боготворили аликорнов, подошла к концу. Религия – инструмент угнетения, использующийся для порабощения масс. Все существа свободны, а значит нет и богов, что могут править ими. Мы должны отправить эту примитивную чепуху на свалку истории!"
BAL_crush_lunatics:0 "Охота на лунопомрачённых"
BAL_crush_lunatics_desc:0 "Лунаристы (или как мы их называем, лунопомрачённые) представляют угрозу нашей революции. Они остаются верными тиранше Найтмер Мун и её клике вооружённых угнетателей. Кажется, было недостаточно победить их один раз, так что мы должны сделать это вновь. Да начнётся охота."
BAL_native_communes:0 "Самоопределение туземцев"
BAL_native_communes_desc:0 "Туземцы хотят уединения, особенно после того, как мы сожгли их храмы. Это можно легко устроить. В любом случае, племена почти не имеют понятия о частной собственности, поэтому всё, что нам нужно сделать, – это мягко поощрять среди них коллективизацию и секуляризм."
BAL_no_princesses_state_or_boss:0 "Ни принцесс, ни государства, ни начальников"
BAL_no_princesses_state_or_boss_desc:0 "В нашем свободном обществе нет ни деспотов, ни угнетателей. Добровольное сотрудничество, взаимопомощь и децентрализованная организация общества формируют наши основные принципы. Никого не заставляют что-либо делать, но все понимают важность общего блага. Пока у нас есть общая цель, нам не нужно, чтобы кто-то направлял нас. Да здравствует свобода!"
BAL_our_syndie_buddies:0 "Наши товарищи-синдикалисты"
BAL_our_syndie_buddies_desc:0 "Анархо-синдикалистские профсоюзы ОП(р) всегда были нашими близкими союзниками и помогали нам в борьбе за свободу. Теперь мы должны отплатить им, интегрировав профсоюзы в нашу лигу. Работая вместе, мы достигнем больших высот, чем поодиночке."
BAL_participatory_democracy:0 "Демократия участия"
BAL_participatory_democracy_desc:0 "Представительная демократия в ЮВЭСР была глупостью. Истинная демократия заключается в личном участии в принятии решений. Каждый имеет право принимать участие в политике своей коммуны, и каждая коммуна может принимать участие в политике конфедерации. Только так мы добьёмся подлинной, прямой демократии."
BAL_tear_down_taboos:0 "Отменить законы"
BAL_tear_down_taboos_desc:0 "Законы нашего свободного общества не такие жёсткие, как законы прошлого. Больше нет полиции, тюрем и наказания. Вместо этого те, кто нарушает правила и вредит другим, подвергаются восстановительному правосудию и реабилитируются. В основе правил лежат взаимосогласованные общественные договоры, введённые самими пони, а не кем-то свыше."
BAL_abolish_compulsory_ed:0 "Демократическое образование"
BAL_abolish_compulsory_ed_desc:0 "Заставлять жеребят сидеть на скамье восемь часов в день пять дней в неделю – самое настоящее капиталистическое угнетение, конвейер по созданию рабочих на фабрики. Эта авторитарная система должна быть заменена демократическим, добровольным образованием. Объяснив важность знаний и используя игровые методики, мы повысим заинтересованность жеребят."
BAL_total_liberation: "Тотальное освобождение"
BAL_total_liberation_desc: "Мы сделали многое, чтобы обратить весь вред, что одни разумные существа нанесли другим, но этого недостаточно. Сама природа продолжает страдать от угнетения: эксплуатация и промышленность насилуют пышные джунгли юго-востока, а скот томится в клетках. Мы должны признать права животных и растений, прекратив это насилие раз и навсегда!"

BAL_syndie_gang:0 "Триумф ОП(р)"
BAL_syndie_gang_desc:0 "Синдикалисты из ОП(р) победили на выборах, и Голден Делишес стал новым председателем ЮВЭСР. Теперь они стремятся провести реформы, способные превратить страну в Конфедерацию демократических профсоюзов, хотя кое-кто сомневается, что городская база ОП(р) сумеет завоевать доверие сельских пони."
BAL_suppress_middle_class:0 "Подавить богачей"
BAL_suppress_middle_class_desc:0 "До сих пор торговцы и мелкие буржуа отказывались коллективизировать свой бизнес. Они хотят сохранить свои доходы и роскошный образ жизни за счёт рабочих. Мы этого не потерпим, хоть и не можем применять силу. Их нужно вытеснить с рынка, чтобы они в конечном итоге обанкротились и добровольно присоединились к нашим коллективам."
BAL_federal_charter:0 "Федеральный устав"
BAL_federal_charter_desc:0 "Благодаря парламентскому большинству предлагается поправка к конституции ЮВЭСР: превращение страны в федерацию с автономными штатами. Центральное правительство сохранит часть законодательных полномочий, но основная ответственность перейдёт к местным коммунам, муниципалитетам и штатам."
BAL_rural_communes:0 "Убедить фермеров"
BAL_rural_communes_desc:0 "Городские профсоюзы не пользуются поддержкой в сельской местности. Местные кооперативы всё ещё немногочисленны, и большая часть земли остается в копытах отдельных землевладельцев и местных племён. Необходимо послать сельских революционеров с рассказами о преимуществах кооперативов и недостатках капиталистической системы."
BAL_thestral_segregation:0 "Решить лунаристскую проблему"
BAL_thestral_segregation_desc:0 "Поскольку наша упорная борьба с лунаристами продолжается, мы должны подумать о том, что мы сделаем с лунаристским населением юго-востока, когда бои закончатся. Они отравлены сильнейшим религиозным фанатизмом и являются самыми верными сторонниками тирании Найтмер. Мы должны предпринять решительные действия, чтобы спасти их от самих себя."
BAL_native_reservations:0 "Убедить туземцев"
BAL_native_reservations_desc:0 "Хотя многие аборигены добровольно присоединились к нашим общинам, нужно что-то делать с теми, кто цепляется за старые устои. Хотя их вожди-деспоты обязательно будут свергнуты, мы должны доказать, что не представляем угрозу для местных. Сотрудничая с туземцами и выйдя с ними на диалог мы надеемся убедить их самостоятельно принять революцию."
BAL_abolish_political_parties:0 "Распустить политические партии"
BAL_abolish_political_parties_desc:0 "Политические партии препятствуют подлинной демократии. Они объединяют народ по политическим взглядам и открыты для всех, независимо от класса, что открывает возможность для буржуазного влияния. Профсоюзы лучше партий, поскольку они предназначены только для рабочего класса и политически едины. Партии должны быть полностью вытеснены профсоюзами."
BAL_anarchist_allies:0 "Наши союзники-анархисты"
BAL_anarchist_allies_desc:0 "ОП(р) существует как альянс с анархистской ГАЛ. Вместе мы известны как ГАЛ-ОП(р) и сотрудничаем много лет, готовясь к революции и требуя больше прав для рабочих. Завершив революцию, наша дружба продолжает процветать. Вместе мы создадим свободное социалистическое общество, где государство будет иметь минимальную власть над рабочими."
BAL_encourage_unions:0 "Увеличить членство в профсоюзах"
BAL_encourage_unions_desc:0 "Профсоюзы существуют для защиты своих членов от произвола, для расширения прав и возможностей всех рабочих и для объединения рабочего класса. Членство в профсоюзах - это лишь благо, но многие рабочие на юго-востоке еще не присоединились к ним. Мы должны популяризовать профсоюзы и поощрять пони к регистрации и присоединению к ним!"
BAL_worker_assemblies:0 "Рабочие собрания"
BAL_worker_assemblies_desc:0 "Структура управления должна строиться снизу вверх. Поэтому все решения должны приниматься на пленарных заседаниях, где все работники, являющиеся членами соответствующих профсоюзов, стремятся достичь соглашения. Эта система, существующая на всех уровнях государственного управления от местного до национального, закрепит прямую демократию как основу ЮВЭСР."
BAL_industrial_unions:0 "Промышленные профсоюзы"
BAL_industrial_unions_desc:0 "Промышленные профсоюзы должны стать основой федерации. Объединяя рабочих разных профессий одной отрасли под единым знаменем, они дают им больше власти, чем мелкие организации. Это укрепит солидарность и позволит профсоюзам совместно вести общество к светлому будущему и лучшей жизни."
BAL_abolish_the_state: "Заменить государство"
BAL_abolish_the_state_desc: "Пойдя на компромисс с этатистами, мы образовали временное революционное государство, но теперь, проведя все необходимые реформы, пришло время покончить с самим существованием государства и передать всю власть федерации профсоюзов. Анархо-синдикалистская революция наконец будет доведена до конца!"

BAL_corn_lord_triumphs:0 "Победа ПОН"
BAL_corn_lord_triumphs_desc:0 "Партия ортодоксальных народников, возглавляемая Крикет Чейфером, победила на выборах. Он поклялся привести нацию к социализму, но более постепенно. Согласно Крикету, для укрепления нового режима необходимо на временной основе построить более властное государство. Ему предстоит многое сделать, так как ЮВЭСР всё ещё кишит нерешёнными проблемами."
BAL_propaganda_campaign:0 "Предложить амнистию гармонистам"
BAL_propaganda_campaign_desc:0 "Хотя селестийские лоялисты сражались упорно, они всё же потерпели крах. Некоторые из них продолжают сопротивляться, отказываясь принимать поражение – частично из-за того, что думают, будто мы сурово накажем их. Это далеко не так! Крикет Чейфер обратится к проигравшим по радио и попросит их сложить оружие взамен на полную амнистию."
#Пропаганда – мощный революционный инструмент. Она помогает заручиться поддержкой рабочего класса и вдохновляет на борьбу с реакционерами. Её следует распространять через радио, газеты, плакаты и громкоговорители. А если мы привлечём "добровольную" помощь известной целительницы Медоубрук, то пони нас полюбят.
BAL_democratic_centralism:0 "Демократический централизм"
BAL_democratic_centralism_desc:0 "Главная проблема социалистов Балтимейра – их разобщённость. Для обеспечения плодотворного сотрудничества любые решения, принятые демократическим голосованием, станут обязательными для всех членов и нижестоящих органов власти. Это объединит демократию и централизм в единое целое, а реализация этого принципа будет едина на всех уровнях власти."
BAL_ban_religion:0 "Светское государство"
BAL_ban_religion_desc:0 "У туземцев есть дурная практика поклонения солнечному божеству, лунаристы видят в тиранше Найтмер Мун богиню, да и среди селестийцев есть похожие фанатики. Религии появляются на почве отвратительных жизненных условий и угнетения. Наше государство отдалит себя от опиума народа и будет наблюдать за тем, как он увядает на фоне роста качества жизни."
#У туземцев юго-востока есть вредная практика поклонения солнечному божеству, фестралы рассматривают тираншу Найтмер Мун как божественную фигуру и даже среди селестийцев есть свои фанатики. Религия стала источником насилия и репрессий во время войны. Мы должны немедленно ввести строгие наказания для верующих.
BAL_talk_to_narrative:0 "Начать диалог с Лайт Нэрративом"
BAL_talk_to_narrative_desc:0 "Лайт Нэрратив – видная фигура среди лунаристов, и, в отличие от большинства своих соотечественников, он благоразумен и просто хочет мира на юго-востоке. Мы должны стремиться к сотрудничеству с ним и вместе убедить остатки лунаристов положить конец их разрозненному сопротивлению."
BAL_enlighten_savages:0 "Автономные штаты коренных народов"
BAL_enlighten_savages_desc:0 "При правлении принцесс туземцы юго-востока были предоставлены сами себе; им позволялось сохранять своих вождей и устои, а также предоставлялся доступ к современным технологиям. Это одна из причин, почему они продолжают сопротивляться нам. Мы можем договориться с ними и предоставить желанную автономию, но только при соблюдении определённых условий."
#Во время правления принцесс местные жители юго-востока были предоставлены сами себе. Им позволили сохранить примитивный образ жизни, но при этом дали доступ к современным технологиям. Конечно, это было глупым решением. Если мы хотим, чтобы революция охватила все уголки юго-востока, местными пони нельзя пренебрегать
#BAL_native_reservations:0 "Autonomous Native States
#BAL_native_reservations_desc:0 "While many natives have voluntarily joined our communes, something must be done about those who cling on to their traditions. While we cannot allow chiefs to remain in power, we can create federal states for the various ethnic groups, led by elected representatives. These states will be responsible for (тут проф не написал продолжение если что)
BAL_unban_non_socialists:0 "Единый фронт"
BAL_unban_non_socialists_desc:0 "Хотя многие пони незнакомы с термином "политпартия", некоторые начали выступать против запрета на несоциалистические партии. Мы снимем этот запрет, но не полностью. Мы разрешим формирование демократических партий, но только тех, что не будут в оппозиции, и чьи члены пройдут проверку со стороны ПОН. Мы должны сплотиться перед лицом общего врага!"
#Если пони хотят истинной демократии, то пусть получают. Запрет на несоциалистические партии будет снят по большей части, но большинство радикальных и реакционных партий останутся под строгим запретом. Они вряд ли бросят вызов нашей власти, но, по крайней мере, более консервативный пролетариат будет радоваться."
BAL_cooperate_with_ies: "Сотрудничество с ЯШКИ"
BAL_cooperate_with_ies_desc: "Хотя ЯШКИ не сумели получить большинство в Народном парламенте, они хотят принимать активное участие в построении истинного социалистического государства. У Крикет Чейфера очень хорошие отношения с Лавендером Берри, и поэтому он решил назначить членов ЯШКИ на некоторые важные партийные позиции. Они помогут нам обезопасить государство."
BAL_cultural_revolution:0 "Продвигать рабочую культуру"
BAL_cultural_revolution_desc:0 "Эквестрийская культура пропитана буржуазными идеями и ценностями. Культурно-просветительные учреждения должны быть национализированы и продвигать более социалистическую и пролетарскую культуру, а также воспитывать новое поколение рабочей и фермерской интеллигенции. Два самых важных города юго-востока также будут переименованы в честь наших героев."
BAL_union_council:0 "Всесоюзный центральный комитет по профсоюзам"
BAL_union_council_desc:0 "Синдикалисты из ОП(р) требуют расширить представительство профсоюзов в правительстве, дабы обеспечить рабочим контроль над экономикой. Для их умиротворения мы создадим ВЦКП, которая объединит профсоюзы страны. Она будет партнёром власти, повысит боевой дух и производительность труда, обеспечит трудящихся социальными услугами и улучшит их жизнь."
BAL_university_towns:0 "Университетские городки"
BAL_university_towns_desc:0 "Учёные наиболее продуктивны в условиях мира, комфорта и достойной оплаты. Всё это обеспечат университетские города, расположенные вдали от суеты больших поселений, но оснащённые широким спектром услуг. Такие посёлки должны быть созданы по всей ЮВСЭР, чтобы учёные могли переехать в них и проводить самые передовые исследования."
BAL_harmonic_communism: "Гармонический коммунизм"
BAL_harmonic_communism_desc: "Первоначально Карамель Маркс не хотела под корень изменять эквестрийскую общественную модель – лишь залатать её проблемы и недостатки. И хотя мы не будем признавать власть монархов-аликорнов, мы охотно примем ценности гармонии и дружбы. Ну, пока они не будут идти врозь с коммунистическими идеалами."
#Сталлионград - родина революции в Эквусе. Товарищ Чейфер лично переживал за них, когда они смогли отбить орды Эквестрии. Если мы хотим пережить реакционную агрессию, мы должны искать союза с нашими северными товарищами и объединиться!"

BAL_oh_shit_oh_fuck:0 "ЯШКИ у власти"
BAL_oh_shit_oh_fuck_desc:0 "План прошёл как нож по маслу. Ублюдки-ревизионисты оказались смещены. Наш контроль над ЮВСЭР, по большей части, обеспечен. И всё же предатели и реакционная грязь ещё живы. Они должны быть полностью уничтожены. Это указ товарища Берри, и он будет исполнен. Слава Государству."
BAL_purge_opposition:0 "Чистки оппозиции"
BAL_purge_opposition_desc:0 "Некоторые недовольны нынешней ситуацией. Их несогласие представляет угрозу для нашей стабильности. Диссидентов нужно заставить замолчать, прежде чем они соберут больше последователей. Время имеет существенное значение. Мы должны действовать быстро. Безжалостно. Мы должны любой ценой добиться мира и порядка."
BAL_weaken_parliament:0 "Ослабить парламент"
BAL_weaken_parliament_desc:0 "Народный парламент лишь мешает работе государственной бюрократии, а товарищ Берри недоволен оставшимися в нём диссидентами. Чтобы они не препятствовали исполнению его директив, мы внесём поправки в конституцию. Послушные «кивалы» нашей партии обеспечат принятие решения, после чего парламент будет окончательно лишён реального влияния."
BAL_state_atheism: "Госатеизм"
BAL_state_atheism_desc: "Государство должно обладать верховной властью. Её нельзя делить ни с какими выдуманными объектами ложного поклонения. Все храмы должны быть уничтожены, а жрецы – арестованы. Государство обязано вылечить население от его глупых заблуждений."
BAL_burn_jungles:0 "Сжечь джунгли"
BAL_burn_jungles_desc:0 "Несносные лунаристы считают, что они победят, прячась в джунглях. Но то, что является безопасным убежищем, быстро станет смертельной ловушкой. Обильное количество напалма и других зажигательных материалов будет подготовлено к величайшей в истории бомбардировочной кампании. Найтмеристское сопротивление будет полностью уничтожено."
BAL_i_said_burn:0 "Я сказал сжечь их!"
BAL_i_said_burn_desc:0 "Товарищ Берри недоволен туземными пони, которые продолжают угрожать безопасности граждан и противостоять государственному контролю. Самые серьёзные зоны сопротивления должны быть уничтожены. Если остальные продолжат сражаться, они также будут уничтожены. Мы готовы уничтожить всё диссидентское население, если это потребуется."
BAL_labour_camps:0 "Трудовые лагеря для реакционеров"
BAL_labour_camps_desc:0 "Заключённые-изменники обладают нераскрытым потенциалом. Они не должны бесцельно гнить в камерах. Товарищ Берри придумал, как их можно использовать. Они будут трудиться в джунглях. Строить мосты и дороги. И умирать они будут с улыбкой, зная, что их жертва принесла пользу Государству."
BAL_control_press:0 "Взять прессу под контроль"
BAL_control_press_desc:0 "Так называемая 'свобода слова' представляет угрозу для нашей стабильности. Это позволяет подрывным и опасным идеям распространяться, если их не контролировать. 'Балтимейр Таймс' и связанные с ней публикации должны подвергаться тщательному анализу со стороны редакторов. В конечном итоге они будут очищены от реакционных антикоммунистических мыслей."
BAL_single_culture:0 "Сконструировать новую идентичность"
BAL_single_culture_desc:0 "Различия ослабляют Государство. Различия могут разрушить Государство. Эквестрия столкнулась с такой судьбой. Мы не столкнемся. Мы – единый народ. У нас есть один лидер. Мы – единое целое. Мы умрём как единое целое.\n\nСлава Государству."
BAL_establish_ministries:0 "Учредить новые министерства"
BAL_establish_ministries_desc:0 "Для эффективного управления государством требуется расширение бюрократического аппарата. Мы создадим новые министерства, непосредственно подчиняющиеся товарищу Берри. Они выполнят его директивы с максимальной эффективностью и скоростью.\n\nСлава Государству."
BAL_crush_bourgeois_idealism: "Разрушить буржуазный идеализм"
BAL_crush_bourgeois_idealism_desc: "Области научных исследований должны быть очищены. Нужно обеспечить приверженность принципам диалектического материализма. Опасная девиация и псевдонаучные мысли нужно искоренять. Политический курс партии и реальность – это одно и то же.\nСлава Государству."
BAL_glory_to_southeast:0 "Слава Государству."
BAL_glory_to_southeast_desc:0 "Юго-восточное государство просуществует тысячу лет. Это самая стабильная страна. Это самая процветающая страна. Это самая сильная страна. Ничто не может разрушить то, что непобедимо. Даже Эквестрия или Лунная Империя. Мы покажем им, что мы непобедимы."

BAL_suffer_no_state:0 "Государств быть не должно"
BAL_suffer_no_state_desc:0 "К западу от нас возникла новая страна, тоже представляющая собой конфедерацию. Но вместо анархистских коммун она объединяет расистских пони-колонизаторов, стремящихся эксплуатировать местных бизонов. Мы не намерены терпеть столь отвратительное образование у своих границ. Нет, мы должны уничтожить его и сжечь дотла!"
BAL_liberate_buffalo:0 "Освободить бизонов"
BAL_liberate_buffalo_desc:0 "Вожди – не более чем мелкие короли, и бизоны слишком долго страдали под их тиранией. Мы уничтожим любые остатки государственности на их родине и принесём им истинную свободу. Затем мы предоставим им те же права на самоуправление, которыми уже пользуются коренные народы юго-востока."
BAL_advance_rockville:0 "Освободить Роквилль"
BAL_advance_rockville_desc:0 "В горнодобывающем городе Роквилле живут тысячи шахтёров и металлургов, которых десятилетиями эксплуатируют работодатели. Их необходимо освободить от оков государственного гнёта и капиталистической эксплуатации. Они с радостью примут анархию, и вскоре над Роквиллем взовьётся чёрно-красное знамя!"
BAL_liberate_las_pegas:0 "Освободить Лас-Пегасус"
BAL_liberate_las_pegas_desc:0 "Лас-Пегасус – отвратительный памятник капитализму. Богатые веселятся в облаках, пока обнищавшие трудятся в тени далеко внизу. Пожалуй, ни один другой город Эквестрии не нуждается в анархии больше, чем он. Освободившись, рабочие тоже смогут праздновать в небесах."
BAL_to_canterlot:0 "Окончательная гибель эквестрийской монархии"
BAL_to_canterlot_desc:0 "Настало время решающего наступления. Остальную часть Эквестрии необходимо освободить от государственного террора. Более чем тысячелетнему господству монархии наконец придёт конец, а пони Эквестрии смогут править собой без принцесс, королев и императриц. Смерть всем врагам рабочего класса!"

BAL_support_unions_abroad:0 "Поддержать профсоюзы за рубежом"
BAL_support_unions_abroad_desc:0 "Революция по своей сути интернациональна, и мы обязаны помочь нашим товарищам, страдающим в наёмном рабстве за пределами нашей федерации. Мы, пони ОП(р), должны поддерживать дружбу со всеми профсоюзами Эквуса, чтобы однажды все работники мира освободились от своих оков."
BAL_our_comrades: "Солидарность с товарищами-революционерами"
BAL_our_comrades_desc: "Вследствие гражданской войны по всей стране активизировались социалистические движения. И хотя они не совсем сходятся с нами во взглядах, одного отрицать нельзя – у нас есть общие враги. Юго-восточная гражданская война была выиграна благодаря кооперации всего спектра левых сил, и этот успех может быть воспроизведён в других частях Эквестрии."
BAL_international_revolution: "Интернациональная революция"
BAL_international_revolution_desc: "Мы не одиноки в этом мире. Нам нельзя забывать о рабочих остальных стран и их борьбе за освобождение. Нет, мы обязаны помогать им всем, чем можем. Сражаясь бок о бок с нашими товарищами, в один прекрасный день мы всё же исполним мечту о свободном пролетарском мире."
BAL_international_workers_union: "Основать Международный союз рабочих"
BAL_international_workers_union_desc: "ОП(р) всегда стремилась расширить свои ряды и сотрудничество с профсоюзами других стран. Естественной эволюцией этого стремления является основание транснациональной организации, объединяющей все профсоюзы под единым знаменем. Это позволит нам глубже взаимодействовать с иностранными рабочими движениями."
BAL_revolution_in_equestria: "Экспортировать революцию в Эквестрию"
BAL_revolution_in_equestria_desc: "Пора! Все необходимые приготовления завершены, и мы готовы ровно настолько, насколько это возможно. Пришло время выступить на север и завершить то, что мы начали в Балтимейре. Мы не остановимся, пока не достигнем северных границ Эквестрии. Товарищи, сплотимся же вновь вокруг Голден Делишеса! Близится освобождение рабочего класса!"

BAL_ally_stalliongrad_and_such: "В поиске союзников"
BAL_ally_stalliongrad_and_such_desc: "Расколотая Эквестрия не выстоит против иностранных захватчиков. Если мы хотим успешно противостоять любым потенциальным угрозам, то должны быть готовы отложить наши идеологические разногласия. В качестве альтернативы мы могли бы просто бросить взгляд в сторону родины революции в Сталлионграде и попросить их помочь обезопасить нашу революцию."
BAL_tech_sharing: "Запустить программы обмена студентами"
BAL_tech_sharing_desc: "Знания должны свободно течь через границы дружественных наций. Благодаря программам по обмену студентов мы позволим нашим наисветлейшим умам учиться за границей и возвращаться на родину с плодами их обучения. Это также позволит развить более близкие отношения с нашими ближайшими союзниками."
BAL_comecon: "Договор о взаимной экономической поддержке"
BAL_comecon_desc: "Чтобы успешно конкурировать с капиталистическим рынком и прочими убогими экономическими моделями, нашему альянсу необходимо теснее связать хозяйства стран-участниц. ДВЭП позволит нам эффективнее координировать торговлю и, возможно, даже перейти к составлению наднациональных планов производства."
BAL_unite_south: "Распространить коммунизм на юге"
BAL_unite_south_desc: "К сожалению, не со всеми правительствами можно договориться. Некоторые из них так яро противостоят нашей идеологии, что отказываются сотрудничать с нами. Они стоят на пути эквестрийского объединения и своими реакционными настроениями угрожают революции. С такими правительствами дипломатия бесполезна."
BAL_unite_equestria: "На Кантерлот!"
BAL_unite_equestria_desc: "Мечта о панэквестрийской революции вот-вот исполнится! Все приготовления завершены, и вооружённые силы более чем готовы выступить на север, дабы наконец освободить Эквестрию из цепей её монархо-капиталистических угнетателей. Вперёд, товарищи, на Кантерлот!"

BAL_fortify_border:0 "Обеспечить безопасность Государства"
BAL_fortify_border_desc:0 "Мы деятельно разбираемся со всеми внутренними угрозами. Следующий шаг – подготовиться к столкновению с угрозами извне. Мы направим рабочих на границу для постройки бункеров и рытья траншей. Нам нужно быть готовыми к вторжению иностранных тиранов в наше независимое Государство."
BAL_papers_please:0 "Документы, пожалуйста"
BAL_papers_please_desc:0 "Границы Государства должны быть защищены. Никто не должен въезжать и выезжать из страны без разрешения. Некоторые иностранцы хотят въехать к нам, так как мы гарантируем занятость и безопасность для каждого. Их будут тщательно осматривать и проверять. Те, кто не преследует злого умысла, пройдёт. Те, кто преследует. Предстанут перед судом."
BAL_efficient_occupation: "Обеспечить безопасность тылов"
BAL_efficient_occupation_desc: "Государство может быть вовлечено в продолжительный конфликт против антикоммунистических реакционеров. Мы должны гарантировать безопасность тыла. Для этого мы расширим полномочия Службы военной разведки. Предоставим им дополнительные ресурсы. Во время войны они будут обеспечивать порядок в зонах оккупации. Любыми средствами."
BAL_active_measures: "Активные мероприятия"
BAL_active_measures_desc: "Для защиты интересов государства разрешены любые меры. Агенты СВР будут проводить тайные операции и диверсии на вражеской территории. Настраивать граждан против их правительств. Поддерживать ячейки сопротивления. Потенциальные угрозы должны быть ослаблены до того, как станет слишком поздно. И если они решат нанести ответный удар. Мы будем готовы."
BAL_defence_in_depth: "Глубокая оборона"
BAL_defence_in_depth_desc: "Пускай приходят. Пускай самонадеянно тратят свои силы. Пускай затеряются в джунглях. А затем мы нанесём удар. Ещё жёстче, чем прежде. Отрежем их пути отступления. Завалим их числом. Окружим их. Убьём их всех.\n\nСлава Государству."

BAL_continue_collectivization:0 "Продолжить коллективизацию"
BAL_continue_collectivization_desc:0 "Во время гражданской войны нашим усилиям по коллективизации частной собственности мешали обманутые государственники-социалисты, которым не нравилось создание нами автономных коммун и кооперативов. Теперь мы можем продолжать без всяких помех и уничтожить любые остатки капитализма раз и навсегда!"
BAL_according_to_need:0 "Каждому по потребности"
BAL_according_to_need_desc:0 "Расширенная коллективизация приводит к увеличению производительности, поскольку работники больше стремятся работать на себя и на общество, а не на требовательных начальников-угнетателей. Это означает, что у нас есть избытки, которые принадлежат всем нуждающимся. Калека, молодой, больной и пожилой – все должны получить свою долю."
BAL_mutual_aid:0 "Взаимопомощь"
BAL_mutual_aid_desc:0 "Каждая коммуна полагается на другие коммуны, чтобы поддерживать себя, поскольку никакая коммуна не может производить всё, что им нужно, самостоятельно. Ресурсы и услуги свободно обмениваются для взаимной выгоды, при этом никто не просит оплаты или немедленного вознаграждения. Эгоизму и жадности нет места в нашем обществе."
BAL_connect_communes:0 "Соединить коммуны"
BAL_connect_communes_desc:0 "Некоторые сельские коммуны находятся в непроходимых джунглях, и их жители не могут легко добираться до своих соседей. Чтобы сделать возможным сотрудничество между всеми общинами, мы должны работать вместе и расчистить пути и дороги в лесах."
BAL_no_such_thing_as_ownership:0 "Нет никакой собственности"
BAL_no_such_thing_as_ownership_desc:0 "Здесь никто ничем не владеет. В нашем обществе действуют нормы узуфрукта: средства производства лишь используются теми, кто испытывает в них нужду, и никто не заявляет прав на какую-либо собственность, будь она частной или общей. Земля принадлежит живым."
BAL_everypony_a_gun:0 "Пушки для всех пони!"
BAL_everypony_a_gun_desc:0 "Каждый член нашего общества имеет право носить оружие. Оружие является основным гарантом свободы, расширяет права и возможности отдельных личностей и превращает каждую коммуну в крепость. Если мы предоставим оружие каждому из нас, то никто не отнимет у нас свободу!"
BAL_haven_of_freedom:0 "Гавань дружбы и свободы"
BAL_haven_of_freedom_desc:0 "В юго-восточной Эквестрии у нас создано общество, которое медленно продвигается к утопии. Здесь нет угнетения, ничего обязательного или принудительного. Какой-то пони однажды сказал, что в жизни ничего не определено, кроме смерти и налогов. Но здесь гарантирована только смерть, особенно для начальников, реакционеров и монархистов!"
BAL_worker_cooperatives:0 "Рабочие кооперативы"
BAL_worker_cooperatives_desc:0 "Самостоятельного управления фабриками работниками недостаточно. Собственность будет разделена между рабочими, и все они будут иметь право голоса, либо демократически принимая решения, либо избирая рабочих-менеджеров, которые по-прежнему считаются равными. Вместо прибыли кооперативы будут стремиться улучшить жизнь своих членов."
BAL_incentives_for_collectivization:0 "Стимулы для коллективизации"
BAL_incentives_for_collectivization_desc:0 "Применение угроз для принуждения к коллективизации идёт врозь с нашими принципами добровольного объединения и свободы от угнетения. Вместо кнута мы должны использовать пряник и компенсировать мелким фермерам и бизнеспони их потери. Мы также должны показать социализм как жизнеспособную альтернативу только что развалившейся капиталистической системе."
BAL_moneyless_economy:0 "Безденежная экономика"
BAL_moneyless_economy_desc:0 "С наступлением мира мы можем подготовить более масштабные реформы для создания безвалютного общества и экономики без рынка. Деньги обесценятся – их больше не будут принимать в качестве средства обмена, так что в конце концов они станут просто бумагой или металлом."
BAL_steel_mills:0 "Сталелитейные заводы Балтимейра"
BAL_steel_mills_desc:0 "Сталь – безусловно, самый полезный материал в современной промышленности. Сталелитейщики Балтимейра планируют расширить своё производство, чтобы обеспечить ею всю страну. Другие коммуны должны помочь, чем могут, во имя солидарности, зная, что в будущем это пойдёт на пользу всему обществу."
BAL_according_to_contribution:0 "Каждому по труду"
BAL_according_to_contribution_desc:0 "Мы стремимся создать справедливое общество, где никто не должен незаслуженно получать больше других, трудясь меньше. Наградой за труд будут трудовые квитанции, которые можно обменять на товары. Так Республика избавится от паразитов, живущих за чужой счёт. Неспособным или не желающим работать выделят лишь самый минимум для базовых потребностей."
BAL_connect_cities:0 "Соединить города"
BAL_connect_cities_desc:0 "Густые леса и пересечённая местность юго-восточной Эквестрии мешают экономическому развитию и наземной торговле между городами. Судоходство удобно, но уступает по вместимости современным поездам. Инвестируя в железные дороги, мы откроем путь к росту и процветанию городов всего региона."
BAL_eradicate_bureaucracy:0 "Искоренить бюрократию"
BAL_eradicate_bureaucracy_desc:0 "По мере роста профсоюзов растёт и их бюрократизация. Вскоре она становится препятствием для подлинной демократии и ослабляет власть рабочего класса. Кажется, единственная цель бюрократов – защищать капиталистическую систему эксплуатации. Поэтому у нас должна быть минимальная, но максимально эффективная бюрократия."
BAL_new_unions:0 "Основать новые профсоюзы"
BAL_new_unions_desc:0 "Остаётся много секторов промышленности с минимальным числом профсоюзов или вообще без них. Мы должны решить эту проблему путём создания новых профсоюзов, которые будут представлять работников всех профессий, таких как оружейники и портовики. Только тогда мы сможем гарантировать освобождение всего рабочего класса."
BAL_horizontal_planning:0 "Децентрализованное экономическое планирование"
BAL_horizontal_planning_desc:0 "Разработка и исполнение экономических планов не является обязанностью какой-то центральной власти, оторванной от простых рабочих. Это демократическая обязанность каждого, разделяемая между каждым профсоюзом, каждым советом и, в конечном счёте, каждым пони."
BAL_urbanization_program:0 "Программа по урбанизации"
BAL_urbanization_program_desc:0 "Несмотря на наши усилия, некоторые пони в сельской местности по-прежнему не убеждены в нашем деле, поскольку мы в первую очередь сосредоточены на улучшении жизни городских рабочих. Одним из решений является поощрение миграции из ферм и плантаций в города, где качество жизни и доступность услуг выше. Поэтому важно инвестировать в расширение городов."
BAL_institute_of_science:0 "Всенародный научный институт"
BAL_institute_of_science_desc:0 "После революции на юге не хватало центров образования. Мы оснуем новый Всенародный научный институт. Каждый сможет поступить туда и начать учиться, независимо от своего места жительства и прошлого. Хотя не все закончат программу, каждый узнает что-то новое и улучшит свою жизнь. Те, кто закончит обучение, смогут внести вклад в развитие общества."

BAL_continue_nationalization:0 "Продолжить национализацию"
BAL_continue_nationalization_desc:0 "Пока бушевала гражданская война, мы делали необходимое и временно национализировали частную собственность на пути к истинному коммунизму. Либертарные социалисты не поняли, что в царившем тогда хаосе нужен порядок, и саботировали наши усилия. Теперь, прочно утвердившись у власти, мы можем передать собственность рабочему государству."
BAL_limited_market_economy:0 "Ограниченная рыночная экономика"
BAL_limited_market_economy_desc:0 "После разрушительной войны крайне необходимы реформы. Нам нужны элементы свободного рынка и капитализма, хотя они и должны оставаться под контролем государства. Социализированные государственные предприятия отныне будут работать на прибыль. Товарищ Чейфер заверяет, что это всего лишь временная мера на пути к коммунизму."
BAL_investment_from_STG:0 "Инвестировать в производство"
BAL_investment_from_STG_desc:0 "Государство должно сохранить ведущую роль в экономике, чтобы обеспечить плавный переход к социализму. Юго-восток значительно уступает остальной Эквестрии в развитии тяжёлой промышленности, поэтому прибавочная стоимость будет направлена на строительство новых государственных заводов."
BAL_workers_councils:0 "Рабочие советы"
BAL_workers_councils_desc:0 "После образования ЮВЭСР государственный аппарат оказался слишком перегружен, чтобы эффективно управлять всей экономикой. Поэтому будут созданы местные рабочие советы, состоящие из избираемых, отзывных и временных делегатов, представляющих трудовые коллективы своих округов. При этом они останутся подотчётны Народному парламенту."
BAL_commissariat_of_defence:0 "Народный комиссариат по оборонной промышленности"
BAL_commissariat_of_defence_desc:0 "Указом Народного парламента учреждается НКОП, ответственный за управление и планирование нашего военного производства. Он будет курировать все заводы, чьей основной задачей является выпуск вооружения, самолётов, кораблей и боеприпасов, а также под его надзор перейдут конструкторские бюро и центры разработки оружия."
BAL_maize_the_miracle_crop:0 "Кукуруза или же чудо-культура"
BAL_maize_the_miracle_crop_desc:0 "Маис, также известный как кукуруза, является замечательной культурой. Товарищ Чейфер уже месяцами пропагандирует её повсеместное выращивание. Тысячи акров будут очищены для посева, после чего сельское хозяйство просто расцветёт. Некоторые в парламенте настроены скептически, но результаты этого эксперимента будут говорить сами за себя."
BAL_chaferovka:0 "Построить чейферовки"
BAL_chaferovka_desc:0 "Чтобы наши города продолжали расти, требуется больше жилья. Но традиционное строительство обходится дорого и требует много сил, поэтому идёт медленно и не поспевает за спросом. Товарищ Чейфер предложил выход: строить дешёвые панельные многоэтажки из бетона и кирпича, массовое производство которых развернуть прямо возле строительных площадок."
BAL_two_year_plan:0 "Двадцатилетний план"
BAL_two_year_plan_desc:0 "Поскольку в настоящее время государство владеет большинством средств производства, оно обязано подготовить обширный план экономического развития и роста на ближайшее будущее. Через двадцать лет, как утверждает [Root.GetLeader], у нас будет настоящий коммунизм без всякой нищеты, где мы будем процветать и превосходить капиталистические страны."
BAL_oh_rubber_tree_oh_rubber_tree:0 "Расширить каучуковые плантации"
BAL_oh_rubber_tree_oh_rubber_tree_desc:0 "Каучук является одним из самых ценных ресурсов, которым изобилуют наши юго-восточные джунгли. Расчищая леса и болота для новых государственных плантаций, мы можем увеличить его производство. Достаточно скоро мы окажемся в числе ведущих производителей резины в мире, вызывая зависть капиталистов других тропических наций."
BAL_expand_shipyards:0 "Построить новые верфи"
BAL_expand_shipyards_desc:0 "Из-за слабого развития сухопутной инфраструктуры большая часть наших грузоперевозок осуществляется по морю. Кроме того, мы должны защищать свои берега от возможного вторжения. Хотя в Балтимейре уже есть знаменитая крупная верфь, её мощностей недостаточно, поэтому нам необходимо расширить её и построить новые судостроительные предприятия."
BAL_connect_the_state:0 "Соединить страну"
BAL_connect_the_state_desc:0 "Центральному правительству трудно добраться до некоторых более изолированных районов юго-востока из-за густых лесов и отсутствия дорог через них. Это должно быть решено как можно скорее, а потому нужно начать проекты по расчистке джунглей для автомобильных дорог."
BAL_university_of_baltimare:0 "Университет Балтимейра"
BAL_university_of_baltimare_desc:0 "Государство планирует официально открыть новый образовательный центр в столице под патронажем главы нашего правительства. Это будет главное место для получения высшего образования в стране, привлекающее студентов из каждого города и деревни, которые, мы надеемся, закончат обучение и внесут вклад в величие нашего государства."
BAL_economic_autarky:0 "Экономическая автаркия"
BAL_economic_autarky_desc:0 "Мы не можем полагаться на других. Мы можем полагаться только на себя. Всё, что нам нужно, может быть произведено внутри страны. Государство может поддерживать себя. Ему не нужно ничего иного. Все остальные просто потенциальные враги. На них нельзя положиться. Им нельзя доверять. У нас есть только мы сами."
BAL_direct_economic_control:0 "Прямой контроль над экономикой"
BAL_direct_economic_control_desc:0 "Состояние экономики имеет жизненно важное значение для Государства. Государство должно обеспечить процветание экономики. Оно не потерпит никакого вмешательства. Никаких отклонений от планов. Государство принесёт процветание всем, кто остаётся ему верным."
BAL_repurpose_factories:0 "Переориентировать фабрики"
BAL_repurpose_factories_desc:0 "Многие производственные мощности расходуются на безделушки. Это пережиток капитализма презренной Селестии. Он будет уничтожен. Граждане будут иметь лишь самое необходимое. Ничего лишнего. Никакой ненасытности. Все промышленные объекты станут кузницами вещей, необходимых для выживания Государства. Оружия. Пуль. Бомб. И многого другого."
BAL_efficient_job_assignment:0 "Эффективное распределение работы"
BAL_efficient_job_assignment_desc:0 "У пони есть знаки отличия, получаемые в молодости, которые указывают на предпочтительные для них обязанности. Неэффективно иметь пони, которые хотят удовлетворять свои страсти. Государство должно назначать необходимые задачи пони, способным их выполнять. Пони будут работать там, где им нужно работать, а не там, где они хотят."
BAL_weather_micromanagement:0 "Контроль погоды"
BAL_weather_micromanagement_desc:0 "Пегасы в некоторой степени способны управлять погодой. Эта способность используется не настолько, насколько это возможно. Граждане-пегасы должны быть призваны в батальоны управления погодой. Они обеспечат благоприятную погоду для сельского хозяйства и военных действий. Влияние на местную фауну и флору будет игнорироваться."
BAL_impose_strict_quotas:0 "Установление строгих квот"
BAL_impose_strict_quotas_desc:0 "Чрезмерное потребление нашими гражданами является пустой тратой ресурсов. Мы не потерпим расходов. Некоторые граждане склонны к лени. Мы не потерпим лени. Государство эффективно. Его граждане должны быть одинаково эффективны. Каждый пони выполнит свои трудовые квоты. Ни один пони не превысит свои квоты потребления. Слава Государству."

BAL_decentralized_militia:0 "Децентрализованное ополчение"
BAL_decentralized_militia_desc:0 "Единая армия опасна, поскольку её лидеры слишком влиятельны. Кто может гарантировать, что они не будут злоупотреблять властью? Поэтому у нас должна быть настоящая армия простых пони, собранная из ополченцев, посвятивших часть рабочего дня защите родины. Они восполнят недостаток навыков самоотверженностью."
BAL_everypony_armed:0 "Все пони вооружены и готовы"
BAL_everypony_armed_desc:0 "Поскольку у каждого члена нашего общества есть оружие, каждый может участвовать в защите коммун от иностранной реакционной агрессии и в нападении, освобождая других от их капиталистических оков. Вместе мы можем сокрушить наших врагов и до последнего защищать свободу."
BAL_we_fight_for_freedom:0 "Мы сражаемся за свободу!"
BAL_we_fight_for_freedom_desc:0 "Солдаты других деспотических стран сражаются за деньги или потому, что вынуждены это делать. Но мы, пони с юго-востока, боремся за свободу. Мы боремся против угнетения и иерархии, против неравенства и тирании. Наше дело благородно, и мы все должны помнить об этом и ободряться."
BAL_native_auxiliaries:0 "Поддержка от туземцев"
BAL_native_auxiliaries_desc:0 "Туземцы, с которыми мы подружились, хотят участвовать в защите нашей конфедерации. Нет причин запрещать им это делать. Более того, мы можем предоставить им современное оружие и снаряжение, а взамен они могут провести нас через джунгли, показывая нам секретные пути в тылы вражеского наступления."
BAL_union_militia:0 "Профсоюзные ополчения"
BAL_union_militia_desc:0 "Каждому члену профсоюза разрешено владеть оружием, но мы также должны позволить профсоюзам формировать организованные военные подразделения и повышать боеспособность своих членов. Работая вместе в мирной жизни, они будут стремиться сражаться бок о бок во время войны."
BAL_armory_of_the_revolution:0 "Оружейная революции"
BAL_armory_of_the_revolution_desc:0 "Современные войны выигрывают не только за счёт численного превосходства, но за счёт превосходного вооружения и применения подавляющей огневой мощи. Наши фабрики и мастерские готовы производить все виды тяжёлых орудий, чтобы дать нам преимущество в бою. Да здравствует революция рабочего класса!"
BAL_combat_engineers:0 "Боевые инженеры"
BAL_combat_engineers_desc:0 "В наших профсоюзах много инженеров. Они тоже должны присоединиться к ополчениям и участвовать в войне, но не воюя на линии фронта. Вместо этого они будут использовать свои знания, разрушая вражеские укрепления, строя мосты и восстанавливая инфраструктуру."
BAL_in_defence_of_workers:0 "Защищая революцию"
BAL_in_defence_of_workers_desc:0 "То, чего мы достигли на юго-востоке Эквестрии, – это нечто поистине исключительное. Но мы мы должны оставаться бдительными, иначе контрреволюционеры-реакционеры сведут на нет всю нашу тяжёлую работу и вернут нас в цепи. Мы лучше умрём, чем станем рабами. Держа эту мысль в голове, наши солдаты будут сражаться вдвойне упорнее."
BAL_repurpose_fishing_boats:0 "Переназначение рыбацких лодок"
BAL_repurpose_fishing_boats_desc:0 "Чтобы защитить наши берега, нам нужны корабли. Вместо того, чтобы строить их с нуля, нам следует вооружить наши рыболовные и другие гражданские суда. Хотя они и не станут самыми грозными военными кораблями, но их хватит для береговой обороны."
BAL_repurpose_mail_planes:0 "Переназначение почтовых самолётов"
BAL_repurpose_mail_planes_desc:0 "На юго-востоке много самолётов, в основном перевозящих почту и пассажиров. Их владельцы присоединились к нашим ополчениям и теперь просят оружие для своих самолётов, чтобы они могли управлять ими во время войны и защищать наше небо."
BAL_militia_air_support:0 "Воздушная поддержка ополчения"
BAL_militia_air_support_desc:0 "Если нам удастся обеспечить контроль над небесами над нашими ополченцами, у нас будет возможность предоставить им авиаподдержку. Для этой задачи нам необходимо разработать самолёты, способные оказать такую помощь максимально эффективно."
BAL_red_cruisers:0 "Вооружённые торговые корабли"
BAL_red_cruisers_desc:0 "Война представляет угрозу для наших морских перевозок. Если мы не хотим, чтобы наша торговля с другими странами находилась под угрозой, мы должны переоборудовать некоторые из наших торговых судов в военные корабли, чтобы они могли защищать прочие суда на море."

BAL_integrate_coltjuns:0 "Интегрировать кольтджунское ополчение"
BAL_integrate_coltjuns_desc:0 "Кольтджунские пони из Семенных Болот иммигрировали из Пранции много лет назад и развили свою уникальную культуру. Частью этой культуры является их особый стиль ведения партизанской войны, который они использовали для защиты своих домов во время гражданской войны. Мы должны интегрировать их ополчение в наши основные силы и изучить их тактику."
BAL_better_guns:0 "Подарки от наших товарищей"
BAL_better_guns_desc:0 "Другие революционеры мира рады тому, что наша революция добилась успеха, и послали нам оружия. Теперь оно наконец прибыло в порт Балтимейра, и мы с радостью примем этот щедрый подарок. Оружие будет передано нашим военным и любой избыток будет безопасно храниться в наших запасах."
BAL_bigger_guns:0 "Уничтожить реакционеров издалека"
BAL_bigger_guns_desc:0 "Обеспечение того, чтобы мы понесли как можно меньше жертв во время войны, жизненно важно. Из-за этого мы должны стремиться выигрывать сражения до непосредственной схватки с противником. Это стало возможным благодаря оружию дальнего действия, которое мы, следовательно, должны производить для наших военных."
BAL_support_companies:0 "Развитие отрядов поддержки"
BAL_support_companies_desc:0 "Чтобы наши солдаты могли эффективно сражаться, им нужны различные виды поддержки со стороны обученных специалистов, таких как инженеры, медики, разведчики и маги. Благодаря этому они могут сражаться с повышенной эффективностью и нести меньше потерь в бою. Мы должны сосредоточиться на подготовке таких специалистов для нашей армии."
BAL_army_mechanization:0 "Механизация войск"
BAL_army_mechanization_desc:0 "Современные технологии позволяют повысить темп ведения войны и улучшить логистику благодаря самоходным машинам, которые придут на смену старым гужевым повозкам. Хотя их эффективность в джунглях остаётся под вопросом, при наличии хороших дорог наши войска получат огромную выгоду от механизации."
BAL_armoured_warfare:0 "Бронетанковая война"
BAL_armoured_warfare_desc:0 "ББМы, или же танки, являются ещё одним революционным оружием нашего века. Покрытые толстой бронёй, они могут выдержать больше урона и способны преодолевать большинство препятствий благодаря своим гусеницам. Их огневая мощь тоже заслуживает уважения. Очевидно, наши рабочие должны строить новые танки, которые нам нужно активно применять."

BAL_centralized_army:0 "Централизованная армия"
BAL_centralized_army_desc:0 "Для нашего выживания нужна единая армия. Только при строгом боевом порядке и организованной командной структуре мы можем противостоять агрессии со стороны могущественных соседей. Мы должны полагаться на талант высших командиров, потому что наша стратегия в их копытах."
BAL_state_planned_warfare:0 "Департамент военного планирования"
BAL_state_planned_warfare_desc:0 "Министерство обороны будет расширено. В его составе создадут новое управление, ответственное за разработку планов будущих войн с учётом любых возможных сценариев. Мы должны быть готовы ко всему. Только так мы сможем одержать победу над нашими антикоммунистическими, националистическими и феодально-капиталистическими врагами."
BAL_disciplined_ranks:0 "Дисциплина в наших рядах"
BAL_disciplined_ranks_desc:0 "Мы не потерпим тех, кто игнорирует приказы. Кто не добросовестно подчиняется своим командирам. Кто не готов умереть за свое Государство. Нашим офицерам будет предоставлено право наказывать инакомыслие самым суровым образом. Наша армия должна быть образцом порядка. Они пойдут на битву и на смерть словно это одно целое."
BAL_for_the_state:0 "Во имя Государства!"
BAL_for_the_state_desc:0 "Нет лучше конца, чем смерть за своё Государство. Это наивысшая жертва во имя общего блага. Все мы должны быть готовы сделать это, когда придёт время. Наши доблестные смерти в битве принесут победу. Наша победа сохранит наше Государство в безопасности. Слава Государству."
BAL_dominate_sea:0 "Доминировать на море"
BAL_dominate_sea_desc:0 "Море принадлежит Государству так же, как и земля. Мы должны защищать его с равной силой. Наши кораблестроители должны работать над созданием самых мощных военных кораблей, которые когда-либо видел мир. Они уничтожат любого, кто проникнет в наши моря со злым умыслом. Наш океан станет их могилой."
BAL_heavy_aircraft:0 "Развитие тяжёлой авиации"
BAL_heavy_aircraft_desc:0 "Только специализированный военный самолёт способен обеспечить воздушное превосходство, даже при численном неравенстве. Истребители с двумя двигателями и металлическим корпусом выдержат больший урон и смогут летать дальше. Они также будут адаптироваться и смогут выполнять различные миссии. Наши авиационные заводы сразу приступят к работе."
BAL_death_from_above:0 "Смерть с небес"
BAL_death_from_above_desc:0 "После установления контроля в воздухе наши бомбардировщики начнут действовать. Они смогут атаковать не только солдат противника и линии снабжения, но и стратегические цели, уничтожая фабрики и устраивая налёты на дома мирных жителей. Такие самолёты значительно усилят нашу авиацию."
BAL_empower_mis:0 "Усилить СВР"
BAL_empower_mis_desc:0 "Служба военной разведки имеет жизненно важное значение для защиты нации. Получив больше прав, они смогут более эффективно выполнять свои обязанности, выявляя угрозы и собирая жизненно важные сведения, необходимые для нашего выживания."
BAL_air_sea_war:0 "Воздушно-морская война"
BAL_air_sea_war_desc:0 "Расширение использования самолётов привело к революционным изменениям не только на земле, но и на воде. Самолёты обещают превзойти корабли по эффективности, но не по радиусу действия. Поэтому мы должны инвестировать в строительство авианосных судов, способных использовать и перевозить самолёты на большие расстояния."
BAL_stalliongradian_doctrine:0 "Сталлионградская доктрина"
BAL_stalliongradian_doctrine_desc:0 "За последнее десятилетие Сталлионград сосредоточил свои усилия на разработке своей инновационной доктрины мобильной войны, использующей моторизованную пехоту и бронированные танки для прорыва фронта противника и быстрого его окружения. Мы должны учиться у них и принять аналогичные хитрости для наших военных."
BAL_thestral_battalions:0 "Батальоны фестралов"
BAL_thestral_battalions_desc:0 "Теперь, когда лунное сопротивление подавлено, Лайт Нэрратив предложил сформировать специальные батальоны, состоящие исключительно из фестралов, главным образом ветеранов войны. Они будут специализироваться на ночных операциях, где эхолокация и ночное зрение дают им решающее преимущество перед обычными смешанными подразделениями с пегасами."
BAL_commissar_training:0 "Обучение комиссаров"
BAL_commissar_training_desc:0 "Многие комиссары в рядах нашей армии являются чисто политиками, получившими минимальную надлежащую военную подготовку. Мы должны немедленно решить эту проблему и превратить их в более эффективных офицеров поддержки, которые не только поддерживают революционный пыл в своих рядах, но и дают полезные команды."

BAL_anarchy_in_equestria: "Анархия в Эквестрии"
BAL_anarchy_in_equestria_desc: "Многие сомневались в нас, но посмотрите, чего мы достигли. Теперь, единые общей целью, мы освободим Эквестрию от гнёта государства! Города и деревни будут сами себе властями, не слушаясь никаких монархов. Рабочие завладеют средствами производства, не повинуясь никаким начальникам. Эквестрийцы возьмут Эквестрию в свои копыта, не боясь богов свыше!"
BAL_liberate_stalliongrad: "Освободить Сталлионград"
BAL_liberate_stalliongrad_desc: "Зимняя революция была первой успешной коммунистической революцией в Эквусе, но она построила не анархическую идиллию, а кошмар, созданный этатистами-бюрократами. Сталлионградцы предали революцию и в полной мере поплатятся за это. Мы обязаны нести свет революции дальше, пока весь Эквус не станет свободным!"
BAL_anarchist_mane_six_problem: "Осудить элементы гармонии"
BAL_anarchist_mane_six_problem_desc: "Носительницы элементов – это не более чем монаршие прихвостни, делающие всё в их силах для поддержки старого коррумпированного режима. И это ещё не говоря о том, что половина из них – это мещанки, владеющие предприятиями и землями. Одна из них и вовсе принцесса! Новая и поистине свободная Эквестрия заслуживает новых элементов – элементов анархии."
BAL_liberate_crystal_empire: "Низвергнуть Кристальную Империю"
BAL_liberate_crystal_empire_desc: "Хотя кристальным пони нова наша реальность, они хорошо знакомы с монаршим гнётом, последовавшим за их порабощением Королём Сомброй. Уж кто-кто, а они должны знать цену свободы. Давайте же сделаем так, чтобы никто больше не мог поработить их – ни сам Король Сомбра, ни аликорны со своими вызолоченными цепями."
BAL_anarchist_root_out_resistance: "Уничтожить остатки реакционеров"
BAL_anarchist_root_out_resistance_desc: "Революция не остановится до тех пор, пока в Эквестрии не исчезнут все реакционеры, монархисты и капиталисты. Бывшие рабовладельцы – бичеватели и эксплуататоры – не скроются от правосудия! Это последний акт насилия эквестрийцев над эквестрийцами, лишь после исполнения которого мы познаем внутренний покой."
BAL_liberate_changelings: "Освободить все земли чейнджлингов"
BAL_liberate_changelings_desc: "Жестокая тирания Королевы Кризалис подходит к концу. Чейнджлингам надоел её гнёт, и они рвутся присоединиться к нашей революции, готовой принять новых товарищей! Мы должны поторопиться и направить штыки на врагов, низвергая всех и каждого монарха, правящего чейнджлингами."
BAL_promise_a_bright_future: "Пообещать светлое будущее"
BAL_promise_a_bright_future_desc: "Учитывая всё то насилие, к которому нам пришлось прибегнуть, некоторые относятся к нашей революции со скептицизмом. Но это было лишь необходимой мерой. Анархизм обещает будущее, лишённое неравенства, несправедливости и насилия; хорошую жизнь для всех независимо от расы или личного достатка. Мы должны убедить каждого, что общий труд – это благо." #346
BAL_liberate_the_rest: "Уничтожить государственность в Эквусе"
BAL_liberate_the_rest_desc: "Наш родной континент почти освобождён. К сожалению, этатисты продолжают держаться за свои клочки, угрожая нашей революции одним лишь своим существованием. Мы должны сохранять верность нашему идеалу – "государств быть не должно". В атаку, товарищи! Сбросим же врагов в море и утопим их! Свободу Эквусу!"

BAL_syndicalist_equestria: "Синдикалистская Эквестрия"
BAL_syndicalist_equestria_desc: "В результате великой борьбы эквестрийский рабочий класс был освобождён от тирании, но почивать на лаврах ещё рано. Чтобы довести революцию до конца, предстоит сделать ещё очень и очень многое!"
BAL_stalliongrad_question: "Союз со Сталлионградом"
BAL_stalliongrad_question_desc: "Несмотря на то, что революционеры Сталлионграда придерживаются не синдикализма, а своих взглядов, они, тем не менее, остаются нашими товарищами. Мы должны сделать всё возможное, чтобы объединиться с ними в федерацию рабочих, ибо правда такова, что вместе мы сильнее, чем порознь."
BAL_syndicalist_mane_six: "Встретиться с носительницами элементов"
BAL_syndicalist_mane_six_desc: "Несмотря на их связи с монархами, носительницы гармонии не являются врагами революции. По крайней мере, пока они сами не заявят об этом. Голден Делишес уверен, что они прислушаются к голосу разума. В конце концов, в венах одной из шести носительниц течёт его кровь."
BAL_crystal_empire: "Союз с кристальными пони"
BAL_crystal_empire_desc: "Хотя промышленная революция является для них новинкой, кристальные пони всё ещё могут адаптироваться к анархо-синдикалистской модели, как то уже сделали коренные жители юго-востока. Мы будем очень рады, если они вступят в нашу федерацию на правах равных товарищей."
BAL_guarantee_rights_of_cities: "Обеспечить права городов"
BAL_guarantee_rights_of_cities_desc: "До гражданской войны и революции Эквестрия состояла из самоуправляемых городов и поселений во главе с выборными мэрами. Эта система совместима с нашей моделью федерализма и устройства без центральной государственной власти. Городские округа могут сохранить автономию, если мэров заменят демократические советы."
BAL_the_colonies: "Экспортировать революцию в колонии"
BAL_the_colonies_desc: "Хотя Пуэрто-Кабальо и Новый Мейрленд далеки от нас, в прошлом они входили в сферу влияния Эквестрии. Несмотря на то, что они были основаны колонистами, они также могут поддержать нашу синдикалистскую революцию и вступить в федерацию. Нашим идеалы никакие океаны не помеха!"
BAL_rural_revolution: "Сельская революция"
BAL_rural_revolution_desc: "Чем больше эквестрийских ферм коллективизируются, тем больше фермеров начинают видеть преимущества сотрудничества и коллективного владения. Нам, как городским синдикалистам, всегда было сложно распространить движение среди жителей сёл, однако анархисты из ГАЛ очень помогли нам с этим. Вскоре каждый уголок Эквестрии примет революцию."
BAL_chairpony_elections: "Избрать нового председателя"
BAL_chairpony_elections_desc: "Как он того и обещал в Мейнхеттене, Голден Делишес проведёт федеральные выборы для избрания нового председателя. Хотя эта роль символична и не наделяет носителя особой властью, наша революционная держава нуждается в том, кто будет её представлять. Сам же Голден отказался принимать участие в выборах, поэтому рабочим предстоит сделать трудный выбор."

BAL_communist_equestria: "Исполнить мечту Маркс"
BAL_communist_equestria_desc: "Карамель Маркс всегда мечтала о светлом будущем. Она видела недостатки Эквестрии, вред, что был нанесён ей оголтелым разбойником-бароном капитализмом, и пыталась решить эти проблемы, но Селестия, ослеплённая высокомерием, отказалась слушать её и сохранила частную экономику. Теперь же она пожинает плоды своего решения, а мечты Маркс почти сбылись."
BAL_union_with_stalliongrad: "Наши северные товарищи"
BAL_union_with_stalliongrad_desc: "У Крикет Чейфера остались приятные воспоминания о Сталлионграде, где он принимал участие в Зимней революции много лет назад. Он всё ещё сохраняет тесные связи с коммунистами Северяны и верит, что сможет убедить их объединиться с эквестрийскими коммунистами во имя революционного единства."
BAL_communist_mane_six: "Вопрос носительниц элементов"
BAL_communist_mane_six_desc: "Шесть героинь дореволюционной Эквестрии, воплощения элементов гармонии, не то чтобы являются нам врагами. Мы должны побеседовать с ними; убедить их в моральном превосходстве коммунизма и просветить насчёт упадка капитализма и монархизма. Может, тогда они добровольно встанут на нашу сторону?"
BAL_crystal_empire_com: "Освободить кристальных пони"
BAL_crystal_empire_com_desc: "Кристальным пони незнакомы современные идеологии, но им известно о рабстве, связанном с монархизмом. Они будут рады присоединиться к нам, встречая нас в качестве своих освободителей. Никогда более они не станут жертвой самодержавного ига!"
BAL_corn_campaign: "Кукурузная кампания"
BAL_corn_campaign_desc: "Эквестрия – это большая страна, в которой остаётся много акров плодородных, но неиспользуемых земель. Если мы хотим накормить нацию, то обязаны засеять все только что коллективизированные фермы кукурузой – настоящей чудо-культурой. Это должно значительно увеличить производство еды и убедить скептиков в превосходстве коммунизма и кукурузы!"
BAL_anti_supremacy: "Сокрушить реакционные угрозы"
BAL_anti_supremacy_desc: "Революция будет в опасности до тех пор, пока рядом существуют потенциально враждебные реакционные режимы. Лишь покончив с ними, мы достигнем мира и сможем сконцентрироваться на построении коммунистической утопии. Как можно почивать на лаврах, если пролетариат Эквуса всё ещё эксплуатируют? В конце концов, все другие расы – это тоже наши товарищи."
BAL_mass_propaganda: "Средства массовой пропаганды"
BAL_mass_propaganda_desc: "Всё ещё остаются те, кто утверждает, что гармония и коммунизм несовместимы. Дабы убедить их в обратном, мы воспользуемся всей силой эквестрийских СМИ и, используя газеты, радио и фильмы, будем распространять мысль строящейся нами коммунистическо-гармонической утопии и убеждать скептиков переходить на нашу сторону." #318
BAL_a_communist_equus: "Объединённый под знаменем коммунизма Эквус"
BAL_a_communist_equus_desc: "Жители нашего континента должны объединиться под красным знаменем коммунизма. Важно, чтобы все страны и расы работали вместе в гармонии и прокладывали дорогу к светлому алому рассвету! Товарищи, давайте же объединим наши усилия, опираясь на учения Твайлайт Спаркл и Карамель Маркс!"

BAL_nightmare: "Смерть Эквестрии"
BAL_nightmare_desc: "Эквестрия разбита. На её гнилых останках. Воспрянет и вырастет новое Государство. Могущественное и непобедимое Государство. Государство, ведомое величайшим лидером всех времён и народов. Государство, свободное от реакционизма, капитализма и монархизма. Все грехи прошлого отпущены. На новом холсте будет написана новая история. Слава Государству."
BAL_repurpose_equestrian_industry: "Милитаризация промышленности"
BAL_repurpose_equestrian_industry_desc: "Эквестрия была слабой и жалкой нацией. Её промышленные мощности впустую растрачивались на бесполезные потребительские товары. Бесчисленные фабрики будут переоборудованы для нужд армии. Безопасность Государства первостепенна и превалирует над нуждами масс."
BAL_deal_with_mane_six: "Выследить шестёрку"
BAL_deal_with_mane_six_desc: "Шестёрка пони угрожает нашему правлению. Это носительницы так называемых элементов гармонии. Герои прошлого порядка. Шестёрки монархизма. Паразиты. Вредители. Мы должны найти и нейтрализовать их. Но для начала их нужно выкурить из их норок. Благо, у нас есть идеальная приманка. Их судьба предрешена."
BAL_greater_state: "Лучшее Государство"
BAL_greater_state_desc: "Границы Государства простираются ровно настолько, насколько это необходимо. Территории с преимущественно пони-населением будет легко контролировать и интегрировать. Из трупа эквестрийской империи вырастет новое Государство – Государство, не раздробленное жалким национализмом. В конце концов, все полюбят мягкое правление нашего великого лидера."
BAL_bomb_them_into_submission: "Бомбы заставят их подчиниться"
BAL_bomb_them_into_submission_desc: "Многие города и деревни не признали наше законное правительство. Они остаются верны своим монархистам-поработителям и капиталистам-эксплуататорам. Они сами избрали этот мучительный путь. Мы покажем им, к чему приводит подобная глупость. Каждое непокорное поселение будет подвергаться бомбардировкам и артобстрелам до тех пор, пока не сдастся."
BAL_ultimate_weapon: "Разработать ультимативное оружие"
BAL_ultimate_weapon_desc: "Учёные теоретизировали насчёт такого оружия, что способно за раз стирать целые города. Мы должны заполучить его до того, как это сделают наши враги. Это оружие станет последним аргументом Государства. Никто не посмеет противиться нам после его получения. Но сначала. Нужно построить все необходимые объекты. Отправить учёных работать. Провести опыты."
BAL_expand_gulags: "Расширить рабочие лагеря"
BAL_expand_gulags_desc: "Наши лагеря до отказа забиты буржуями-националистами и диссидентами. Необходимо расширить систему лагерей на всё Государство. Мы будем строить новые лагеря. Делать существующие более эффективными. Государство всегда нуждается в дешёвых расходных рабочих ресурсах."
BAL_long_live_the_king: "Слава великому лидеру"
BAL_long_live_the_king_desc: "Лавендер Берри – истинный герой коммунизма. Он тот, кто победил всех своих врагов. Он тот, кто низверг одряхлевшие режимы Эквестрии. Он тот, кто принёс порядок в хаос. Его гений непревзойдён. Он – провозвестник исторического материализма. Под его мудрым и великодушным покровительством мы бок о бок идём к истинному коммунизму."

###########################################
### IDEAS ##################################
###########################################
BAL_economic_chaos:0 "Экономический хаос"
BAL_economic_chaos_desc:0 "После начала гражданской войны, оккупации лунаристами и недавней революции экономика Балтимейра оказалась разрушена. Торговые связи, которые поддерживали промышленность города, были разорваны, и страна со всех сторон окружена враждебными сторонами. Положение не облегчается тем фактом, что социалисты и анархисты насильно национализировали или коллективизировали фермы и фабрики, не установив на них надлежащего управления."
BAL_economic_chaos2:0 "Экономический хаос"
BAL_economic_chaos2_desc:0 "Благодаря поспешным экономическим реформам в экономике появилось некоторое подобие порядка, и темпы производства увеличились. Но остается много проблем, которые снижают эффективность большинства объектов."
BAL_economic_chaos3:0 "Экономический хаос"
BAL_economic_chaos3_desc:0 "Дальнейшие реформы и изменения в политике полностью перестроили экономику, что помогло как в производстве, так и в распределении продукции. Внешняя поддержка была получена и использована. Тем не менее, еще предстоит проделать большую работу, прежде чем экономика Балтимейра полностью восстановится."
BAL_military_disarray:0 "Беспорядок в армии"
BAL_military_disarray_desc:0 "'Армия' Балтимейра, если можно её так назвать, полностью состоит из рабочих ополченцев, которые не имеют даже формальной военной подготовки и имеющие лишь небольшой опыт, который они получили от изгнания лунных оккупантов. Нет никакого снаряжения и офицеров, но хуже всего, нет единой структуры командования, а потому большинство подразделений действуют независимо и без координации."
BAL_military_disarray2:0 "Беспорядок в армии"
BAL_military_disarray2_desc:0 "Было проведено несколько реформ, которые принесли столь необходимый порядок в армию. Появились офицеры, какое-никакое оборудование, координация между войсками и грубая командная структура."
BAL_military_disarray3:0 "Беспорядок в армии"
BAL_military_disarray3_desc:0 "Армия находится в гораздо лучшей форме, а способные офицеры равномерно распределяются по званиям в хорошо спланированной командной структуре. Обучение и опыт на поле боя позволили простым солдатам лучше выполнять свою работу. Чтобы у Балтимейра была надлежащая и организованная современная армия большего и не нужно."
BAL_self_managed_factories:0 "Рабочее самоуправление"
BAL_self_managed_factories_desc:0 "Фабрики и фермы подвергаются коллективизации, а бывшие капиталисты и управляющие исключаются. Контроль над производством осуществляется демократическими собраниями самих рабочих, а их избытки от производства приносит пользу нам, вместо того, чтобы идти в карманы начальников."
BAL_nationalization_idea:0 "Государственное вмешательство"
BAL_nationalization_idea_desc:0 "Конгресс напрямую вмешивается в экономику, издавая директивы, указы и квоты. Все экономические планы должны быть утверждены правительством, прежде чем они могут быть выполнены."
BAL_meadowbrooks_aid_idea:0 "Помощь от Медоубрук"
BAL_meadowbrooks_aid_idea_desc:0 "Хотя она и не поддерживает нашу идеологию, Медоубрук из Семенных Болот, одна из шести столпов Эквестрии, вызвалась лечить наших больных и раненных солдат."
BAL_whydoesntthisshitworkdammit:0 "Вооружённые профсоюзы"
BAL_armed_unions_idea_desc:0 "По закону рядовой работник может взяться за оружие, чтобы защитить себя от империалистов и реакционеров."
BAL_revolutionary_discipline_idea:0 "Революционная дисциплина"
BAL_revolutionary_discipline_idea_desc:0 "Дисциплина - это не то, чего можно вбить насильно солдатам, это тот момент, когда солдаты сами понимают, за что они борются и почему."
BAL_mis:0 "СВР - Служба военной разведки"
BAL_mis_desc:0 "Выживание революции должно быть обеспечено любой ценой."
BAL_mis_lar:0 "СВР - Служба военной разведки"
BAL_mis_lar_desc:0 "Выживание революции должно быть обеспечено любой ценой."
BAL_military_commissars_idea:0 "Военные комиссары"
BAL_military_commissars_idea_desc:0 "Дисциплина и верность революции будут поддерживаться любыми необходимыми средствами."
BAL_bit_abolished:0 "Деньги отменены"
BAL_bit_abolished_desc:0 "Кое-кто назвал бы вас сумасшедшим, реши вы просто собрать все деньги и сжечь их. Однако именно так социалисты Балтимейра и поступили."
BAL_state_capitalism_idea:0 "Госкап"
BAL_state_capitalism_idea_desc:0 "Рынки и деньги существуют, но без гнусной буржуазии. Вместо этого государство полностью контролирует оба этих явления."
BAL_to_the_barricades_idea:0 "Они не пройдут!"
BAL_to_the_barricades_idea_desc:0 "Да здравствует революция! Смерть реакционерам!"

BAL_harmonic_resistance: "Сопротивление гармонистов"
BAL_harmonic_resistance_desc: "Некоторые селестийские лоялисты отказались сдаваться и продолжают свою бессмысленную борьбу ради восстановления довоенного порядка."
BAL_statism_erased:0 "Этатизм ликвидирован"
BAL_statism_erased_desc:0 "Ничего не осталось от старого правительства юго-восточной Эквестрии и недолго жившей ЮВЭСР. Все региональные агентства, министерства, ведомства, комиссии, департаменты и так далее исчезли навсегда."
BAL_anticlericalism: "Антирелигия"
BAL_anticlericalism_desc: "Анархисты объявили войну религии, выступая против любых форм организованных систем верований. Вместо них продвигаются наука и атеизм."
BAL_native_communes_idea:0 "Коммуны туземцев"
BAL_native_communes_idea_desc:0 "Коренным жителям юго-востока было разрешено сохранять свою автономию и традиции до тех пор, пока они участвуют в конфедеративном Конгрессе и помогают в защите свободного юго-востока."
BAL_no_princesses_state_or_boss_idea:0 "Никаких принцесс, государства или начальников"
BAL_no_princesses_state_or_boss_idea_desc:0 "Юго-Восточная Эквестрия полностью приняла основные принципы анархизма, которые поддерживают общество без лидеров и иерархии."
BAL_syndie_friends:0 "Товарищи синдикалисты"
BAL_syndie_friends_desc:0 "Профсоюзы ОП(р) являются членами лиги и эффективно управляют городской промышленностью."
BAL_sex_drugs_rockandroll:0 "Правила, а не законы"
BAL_sex_drugs_rockandroll_desc:0 "Кажется, всё можно на юго-востоке, до тех пор, пока это не вредит другим."
BAL_total_liberation_idea: "Единство с природой"
BAL_total_liberation_idea_desc: "Мы не терпим никакие формы иерархического господства, в том числе господства разумной жизни над животными и растениями. Землю нужно делить со всеми, кто её населяет! Даже скот бросил свои прошлые тюрьмы и взялся за оружие во имя революции."

BAL_federal_charter_idea:0 "Федеральная хартия"
BAL_federal_charter_idea_desc:0 "Федеральная хартия передаёт полномочия местным органам власти."
BAL_rural_communes_idea:0 "Сельские коллективы"
BAL_rural_communes_idea_desc:0 "С каждым днем создается все больше сельских коллективов, а их члены наслаждаются повышением уровня жизни и ростом производительности."
BAL_calmed_natives:0 "Туземное сопротивление"
BAL_calmed_natives_desc:0 "Некоторые племена туземцев перестали нам сопротивляться и вместо этого добровольно присоединились к нашим коллективам. Другие продолжают сопротивляться, но это только вопрос времени, когда они также откажутся от своего глупого сопротивления."
BAL_anarchist_allies_idea:0 "Союзники-анархисты"
BAL_anarchist_allies_idea_desc:0 "Анархисты ГАЛ являются гордыми членами федерации и продвигают децентрализованную антистатическую политику и либеральные ценности."# Different duplicate from Eaw
BAL_encourage_unions_idea:0 "Растущие профсоюзы"
BAL_encourage_unions_idea_desc:0 "С каждым днём всё больше и больше пони вступают в профсоюзы, получая больше прав и улучшая условия труда."
BAL_worker_assemblies_idea:0 "Рабочие собрания"
BAL_worker_assemblies_idea_desc:0 "Ответственность за принятие решений лежит на демократических рабочих собраниях, существующих на всех уровнях правительства."
BAL_stateless_federation: "Безгосударственная федерация"
BAL_stateless_federation_desc: "Здесь правит народ, а государство ему подчиняется."
BAL_general_strike:0 "Всеобщая забастовка!"
BAL_general_strike_desc:0 "Профсоюзы нашей страны, некоторые из которых подпольные, организовали самую крупную забастовку за последние десятилетия, нанося вред нашей экономике. Нет сомнений, что ЮВЭСР щедро их поддержала."
BAL_international_revolution_idea: "Интернациональная революция"
BAL_international_revolution_idea_desc: "Пролетарии всех стран, соединяйтесь!"

BAL_democratic_centralism_idea:0 "Демократический централизм"
BAL_democratic_centralism_idea_desc:0 "Политические решения, которые принимаются путем демократического голосования, обязательны для всех, чтобы предотвратить фракционность и ссоры."
BAL_secularism:0 "Принципы светского государства"
BAL_secularism_desc:0 "ПОН объявила о секуляризации государства, не признавая религию и призывая граждан отказаться от своих прошлых верований."
BAL_ies_cooperation: "Помощь от ЯШКИ"
BAL_ies_cooperation_desc: "Партия сталлионистов ЯШКИ заняла ряд ключевых государственных должностей, взяв на себя ответственность за защиту государства и управление пропагандистским аппаратом."
BAL_cultural_revolution_idea:0 "Культурная революция"
BAL_cultural_revolution_idea_desc:0 "Мы удаляем все порочные аспекты из эквестрийской культуры и вместо неё продвигаем единую пролетарскую общность."
BAL_union_council_idea:0 "ВЦКП"
BAL_union_council_idea_desc:0 "Всесоюзный центральный комитет по профсоюзам – это организация профсоюзов, которая даёт им право голоса в правительстве."
BAL_harmonic_communism_idea: "Гармонический коммунизм"
BAL_harmonic_communism_idea_desc: "Крикет Чейфер провозгласил коммунизм истинной гармонией и что дружба важна настолько же, насколько и солидарность среди рабочего класса."

BAL_powerless_parliament:0 "Лишённый власти Парламент"
BAL_powerless_parliament_desc:0 "Народный парламент был лишён какой-либо реальной политической власти и выполняет чисто консультативную роль, а также был заполнен верными ЯШКИ пони."
BAL_burger:0 "Чистка"
BAL_burger_desc:0 "Мы не потерпим никакого инакомыслия."
BAL_mis2:0 "СВР усилена"
BAL_mis2_desc:0 "Служба военной разведки получила еще более широкие полномочия и лучшее оборудование, чтобы они могли выполнять свои обязанности с большей эффективностью."
BAL_mis2_lar:0 "СВР усилена"
BAL_mis2_lar_desc:0 "Служба военной разведки получила еще более широкие полномочия и лучшее оборудование, чтобы они могли выполнять свои обязанности с большей эффективностью."
BAL_gulags:0 "Трудовые лагеря для реакционеров"
BAL_gulags_desc:0 "Враги Государства искупят свою вину через труд."
BAL_gulags_2: "Расширенные трудовые лагеря"
BAL_gulags_2_desc: "Враги Государства искупят свою вину через труд."
BAL_state_atheism_idea: "Государственный атеизм"
BAL_state_atheism_idea_desc: "Государство активно продвигает антирелигию и преследует всех верующих."
BAL_single_culture_idea:0 "Все как один"
BAL_single_culture_idea_desc:0 "Местные диалекты, культуры и правительства уничтожаются, поэтому все аспекты общества будут объединены в одно целое."
BAL_papers_please_idea:0 "Документы, пожалуйста"
BAL_papers_please_idea_desc:0 "Был установлен единственный в стране контрольно-пропускной пункт, который обрабатывает приезжающих из-за рубежа. Каждую отдельную личность тщательно проверяют и только после этого разрешают въезд и работу в стране, если только она не окажется опасной."
BAL_papers_please_idea_lar: "Документы, пожалуйста"
BAL_papers_please_idea_lar_desc: "Был установлен единственный в стране контрольно-пропускной пункт, который обрабатывает приезжающих из-за рубежа. Каждую отдельную личность тщательно проверяют и только после этого разрешают въезд и работу в стране, если только она не окажется опасной."
BAL_state_media_idea: "Государственные СМИ"
BAL_state_media_idea_desc: "Строгая цензура предотвращает распространение антиправительственных идей."
BAL_efficient_occupation_idea: "Защита тылов со стороны Службы военной разведки"
BAL_efficient_occupation_idea_desc: "СВР было поручено защищать тылы и подавлять любую потенциальную диссидентскую активность до того, как она сможет представить угрозу солдатам гарнизона."
BAL_defence_in_depth_idea: "Глубокая оборона"
BAL_defence_in_depth_idea_desc: "Официальная доктрина Государства заключается в сдаче территории для истощения захватчиков и последующего удара по оному превосходящими силами."

BAL_continued_collectivization:0 "Продолжение коллективизации"
BAL_continued_collectivization_desc:0 "Революционеры [Root.GetName] продолжают коллективизацию всей частной собственности без какого-либо сопротивления со стороны социалистов-государственников."
BAL_continued_collectivization_need:0 "Продолжение коллективизации"
BAL_continued_collectivization_need_desc:0 "Революционеры [Root.GetName] продолжают коллективизацию всей частной собственности без какого-либо сопротивления со стороны социалистов-государственников. Они следуют принципам Карамель Маркс, согласно которым каждый пони будет получать в соответствии со своими потребностями."
BAL_worker_cooperatives_idea:0 "Рабочие кооперативы"
BAL_worker_cooperatives_idea_desc:0 "Заводы и фермы полностью контролируются и принадлежат рабочим, а бывшие капиталисты и наемные менеджеры исключаются. Контроль над производством осуществляется демократическими собраниями самих рабочих."
BAL_continued_collectivization_contrib:0 "Продолжение коллективизации"
BAL_continued_collectivization_contrib_desc:0 "Революционеры [Root.GetName] продолжают коллективизацию частной собственности без сопротивления сторонников государственного социализма. Страна становится подлинно рабочей: долю общественных излишков получают лишь трудящиеся и неспособные трудиться, остальные – только необходимый для жизни минимум."
BAL_moneyless_economy_idea:0 "Безденежная экономика"
BAL_moneyless_economy_idea_desc:0 "На Юго-Востоке нет денег или рынков. Вместо этого введены расходные ваучеры, используемые населением для приобретения товаров. Пусть это и фактические полшага назад на пути к коммунизму, это необходимо."
BAL_continued_collectivization_need_aid:0 "Продолжение коллективизации"
BAL_continued_collectivization_need_aid_desc:0 "Революционеры [Root.GetName] продолжают коллективизацию всей частной собственности без какого-либо сопротивления со стороны социалистов-государственников. Они следуют принципам Карамель Маркс, согласно которым каждый пони будет получать в соответствии со своими потребностями. Как таковая, щедрая взаимопомощь считается жизненно важной для выживания общества."
BAL_continued_collectivization_need_aid_own: "Коллективизированная экономика"
BAL_continued_collectivization_need_aid_own_desc: "Частная собственность была коллективизирована. У каждого будет бесплатный доступ к тому, что ему нужно. Щедрая взаимная поддержка считается жизненно необходимой для выживания общества, а такого правового понятия как частная собственность попросту не стало."
BAL_haven_of_freedom_idea:0 "Гавань дружбы и свободы"
BAL_haven_of_freedom_idea_desc:0 "Каждый пони здесь свободен, все пони здесь друзья. Исключение составляют грязные капиталисты и реакционеры."
BAL_continued_collectivization_contrib_bureau:0 "Продолжение коллективизации"
BAL_continued_collectivization_contrib_bureau_desc:0 "Революционеры [Root.GetName] продолжают коллективизацию частной собственности без сопротивления сторонников государственного социализма. Страна становится подлинно рабочей: долю общественных излишков получают лишь трудящиеся и неспособные трудиться, остальные – только необходимый для жизни минимум. Раздутая госбюрократия также упразднена."
BAL_continued_collectivization_contrib_bureau_horiz: "Коллективизированная экономика"
BAL_continued_collectivization_contrib_bureau_horiz_desc: "Большая часть частной собственности была коллективизирована. Наша страна – это истинное рабочее государство, где часть общественных избытков получают только те, кто работает, или те, у кого физически нет возможности работать. Остальные получают лишь самое необходимое. К тому же мы полностью ликвидировали раздутый государственный бюрократический аппарат, а планирование экономики теперь происходит более децентрализовано и на местном уровне."
BAL_continued_nationalization:0 "Продолжение национализации"
BAL_continued_nationalization_desc:0 "Народный парламент принял закон, объявляющий его де-юре собственником всего имущества и средств производства в стране. Это даёт легальное право изымать их у прежних хозяев, коими зачастую оказываются алчные капиталисты. Не встречая сопротивления со стороны революционеров ГАЛ-ОП(р), государство вольно экспроприировать частную собственность в интересах трудящихся."
BAL_two_year_plan_idea:0 "Двадцатилетний план"
BAL_two_year_plan_idea_desc:0 "Коммунизм будет построен через 20 лет. Следующее поколение будет жить при истинном коммунизме. Это точно."
BAL_limited_market_economy_idea:0 "Ограниченная рыночная экономика"
BAL_limited_market_economy_idea_desc:0 "Некоторые элементы свободного рынка и капитализма смешиваются с плановой государственной экономикой, что способствует более быстрому росту."
BAL_economic_autarky_idea:0 "Экономическая автаркия"
BAL_economic_autarky_idea_desc:0 "Мы можем полагаться только на себя."
STG_investing_in_BAL:0 "Пакт взаимной экономической поддержки"
STG_investing_in_BAL_desc:0 "ДВЭП улучшил наши торговые отношения с юго-восточной Эквестрией, что позволило товарам течь более свободно между нашими государствами."
BAL_investing_LSP: "Договор о взаимной экономической поддержке с Лас-Пегасусом"
BAL_investing_LSP_desc: "ДВЭП улучшил наши торговые отношения с Лас-Пегасусом, что позволило товарам течь более свободно между нашими государствами."
BAL_investing_BUF: "Договор о взаимной экономической поддержке с буйволами"
