BAL_support_unions:0 "Организовать забастовку в [From.GetName]"
BAL_support_unions_desc:0 "С нашей поддержкой и наставлениями профсоюзы [From.GetName] организуют всеобщую забастовку, чтобы нанести ущерб промышленности их капиталистических правителей, надеясь подтолкнуть их к проведению реформ."
BAL_ally_lsp:0 "Предложить альянс стране [From.GetName]"
BAL_ally_lsp_desc:0 "Сторонники левых взглядов захватили контроль над государством-осколком [From.GetName], но они слишком слабы, чтобы выстоять самостоятельно. Мы должны стремиться к более тесному сотрудничеству во имя солидарности!"
BAL_core_scs:0 "Интегрировать Юго-Запад"
BAL_core_scs_desc:0 "После освобождения юго-запада, как и юго-востока, пришло время приветствовать наших товарищей пролетариев и установить тесную дружбу между нами."
BAL_form_equestria:0 "Новая Эквестрия"
BAL_form_equestria_desc:0 "Мы сделали это! Несмотря ни на что, наша родина теперь полностью освобождена от реакционных оков. Теперь наступает конец капитализму и монархии и придет истинное освобождение рабочего класса Эквестрии! Да здравствует революция!"
BAL_mango_gambit:0 "Манговый гамбит"
BAL_mango_gambit_desc:0 "Некоторые товарищи предложили открыть новый фронт против наших врагов, захватив провинцию Манго. Такая операция будет крайне рискованной, поэтому её успех зависит от безупречно выбранного момента для удара. Захватив этот регион, мы сможем атаковать противника с севера."
BAL_attack_rockville:0 "Атаковать Роквилль"
BAL_attack_rockville_desc:0 "Пролетарии Роквилля жаждут освобождения. Мы должны изгнать их угнетателей и освободить город!" 
BAL_attack_aetherlands:0 "Атаковать Эфирные Земли"
BAL_attack_aetherlands_desc:0 "Пони Эфирных Земель жаждут освобождения. Мы должны изгнать их угнетателей и освободить этот край!"
BAL_active_measures_decision:0 "Активные мероприятия против страны [From.GetName]"
BAL_active_measures_decision_desc:0 "Агенты СВР проникнут на территорию противника и проведут диверсионные операции, чтобы подорвать его позиции."
BAL_form_equus:0 "Единый Эквус"
BAL_form_equus_desc:0 "После всей пролитой крови враги революции в Эквусе наконец сложили оружие. Ценой огромных усилий и бесчисленных жертв весь континент был освобождён. Почтим минутой молчания память каждого существа, отдавшего жизнь за наше благородное дело. А затем приступим к подготовке мировой революции!"
BAL_ally_more_stuff: "Предложить союз государству [From.GetName]"
BAL_ally_more_stuff_desc: "Коммунисты Эквуса должны выступить единым фронтом и отбросить свои разногласия во имя революционного единства."

