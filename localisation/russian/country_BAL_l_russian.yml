BAL_boreal_bloom_name:0 "Бореал Блум"
BAL_gay_brandon_desc:0 "Бореал Блум – этнический кольтджун, родившийся в одном из многочисленных городков и деревень Семенных болот. За свою жизнь он кем только не успел побывать: разведчиком-пегасом в бурные годы Декабрьской революции, главным механиком и менеджером среднего звена на крупнейшем моторостроительном заводе Балтимейра, а также постоянным автором местной социалистической газеты. В своих статьях и листовках он призывал к построению, защите и распространению социалистического учения посредством сильного, организованного, но при этом справедливого и патриотичного государства – незадолго до того, как город охватила революция.\n\nКогда во время лунаристской оккупации Балтимейр погрузился в хаос, Бореал Блум вместе с товарищами сверг и заключил под стражу начальство завода. Затем он объединил многочисленные революционные выступления в промышленном районе в единую колонну рабочих-солдат и, к удивлению остальных революционных сил, смело прорвался из всё ещё окружённого лунаристами Балтимейра во главе летучей колонны, чтобы помочь освободить родные Семенные болота. Вместе с местными кольтджунскими ополченцами он окончательно изгнал оттуда фестралов.\n\nНесмотря на симпатии к государственническим организациям ПОН и ЯШКИ и открытое неприятие ГАЛ, уважение к многим идеалам ОП(р), продиктованное прагматизмом, побудило его добровольно перейти под номинальное командование товарища Голден Делишеса, твёрдо решив любой ценой не дать революции погибнуть."
