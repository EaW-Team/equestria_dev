BAL_continued_nationalization_council:0 "Продолжение национализации"
BAL_continued_nationalization_council_desc:0 "Народный Парламент принял закон, который делает его де-юре владельцем всей собственности и средств производства, что позволяет законно изымать их у незаконных владельцев, которые часто являются жадными капиталистами. Без сопротивления со стороны революционеров ГАЛ-ОП(р) государство может свободно присваивать рабочим частную собственность. Средства производства затем контролируются рабочими советами, которые подчиняются Парламенту."
BAL_continued_nationalization_council_corn:0 "Продолжение национализации"
BAL_continued_nationalization_council_corn_desc:0 "Народный Парламент принял закон, который делает его де-юре владельцем всей собственности и средств производства, что позволяет законно изымать их у незаконных владельцев, которые часто являются жадными капиталистами. Без сопротивления со стороны революционеров ГАЛ-ОП(р) государство может свободно присваивать рабочим частную собственность. Средства производства затем контролируются рабочими советами, которые подчиняются Парламенту. На государственных колхозах начались масштабные программы по выращиванию кукурузы."
BAL_continued_nationalization_control:0 "Продолжение национализации"
BAL_continued_nationalization_control_desc:0 "Народный Парламент принял закон, который делает его де-юре владельцем всей собственности и средств производства, что позволяет законно изымать их у незаконных владельцев, которые часто являются жадными капиталистами. Без сопротивления со стороны революционеров ГАЛ-ОП(р) государство может свободно присваивать рабочим частную собственность. Экономика напрямую управляется правительством."
BAL_continued_nationalization_control_job:0 "Продолжение национализации"
BAL_continued_nationalization_control_job_desc:0 "Народный Парламент принял закон, который делает его де-юре владельцем всей собственности и средств производства, что позволяет законно изымать их у незаконных владельцев, которые часто являются жадными капиталистами. Без сопротивления со стороны революционеров ГАЛ-ОП(р) и ПОН государство может свободно присваивать рабочим частную собственность. Экономика напрямую управляется правительством, также как и выдача задач каждому гражданину, вне зависимости от его талантов."
