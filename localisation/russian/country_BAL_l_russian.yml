BAL_communism_anarchy:0 "ГАЛ"
BAL_communism_anarchy_long:0 "Гильдия анархисткой лиги     §gС годами ОП(р) росли в размерах и становились всё более бюрократизированным и централизованными. В противовес этому многие наиболее анархистские члены ОП(р) основали ГАЛ, чтобы бросить вызов постоянно расширяющейся бюрократии и напомнить ОП(р) о её корнях в качестве анархистской организации. Поэтому связи между этими двумя движениями очень тесны, и их нередко рассматривают как одну организацию, называемую ГАЛ-ОП(р). ГАЛ - в высшей степени децентрализованная организация. Это движение считается весьма противоречивым и сомнительным из-за его яростной оппозиции эквестрийской монархии, что было вдохновлено анархистскими движениями Грифонии. Члены ГАЛ более жестоки, чем их товарищи из ОП(р), и несут ответственность за многочисленные случаи беспорядков, грабежей и целенаправленных убийств. Многие из них были арестованы за последние годы. ГАЛ является легальной организацией исключительно благодаря поддержке ОП(р), а также доброжелательности и терпению Селестии.§!"
BAL_communism_arstotzka:0 "ЯШКИ"
BAL_communism_arstotzka_long:0 "Ядро штаба коммунистической идеологии     §gДо недавнего времени о существовании ЯШКИ было неизвестно почти всем жителям Эквестрии. Даже другие коммунисты Балтимейра, за исключением Крикета Чейфера и некоторых других высокопоставленных чиновников ПОН, не знали об этом. Это ультралевая и крайне радикальная сталлионистская террористическая организация, чья единственная цель заключается в уничтожении буржуазии Балтимейра и прочих мест за его пределами. Мало что известно о её истории, но Чейфер знает, что эта организация была основана после всеобщей забастовки 995 года. Коммунисты увидели, что протест не привёл к каким-либо изменениям в Балтимейре, и согласились с тем, что потребуются более экстремальные методы. Они проникли в органы безопасности Балтимейра, в особенно в местную полицию, и готовились к быстрому удару, который эффективно обезглавит и свергнет местное буржуазное правительство. Можно с уверенностью сказать, что без их поддержки республика Балтимейр никогда бы не появилась.§!"
BAL_communism_syndiescum:0 "ОП(р)"
BAL_communism_syndiescum_long:0 "Организация профсоюзов (реформаторы)     §gОП(р) является основной организацией профсоюзов всей Эквестрии. Она была основана в Балтимейре летом 983 года и представляет собой анархо-синдикалистскую конфедерацию, состоящую из различных рабочих организаций. Хотя северянское марксистское движение оказало на ОП(р) определённое влияние, данная организация в первую очередь является преемницей более ранних эквестрийских лейбористских и анархистских движений. Структура ОП(р) в высшей степени децентрализована и основана на принципе прямой демократии. У них нет единой ведущей фигуры. Хотя ОП(р) задумывалась как общенациональная организация, почти всё её члены являются выходцами из процветающих промышленных городов восточной Эквестрии. На протяжении многих лет она активно стремилась договориться с работодателями об улучшении условий труда рабочих, и благодаря сочувствию и сопереживанию принцессы Селестии это нередко удавалось. Но отношения ОП(р) с центральным правительством в Кантерлоте испортились во время Зимней Революции 995 года, когда в поддержку данного восстания была проведена всеобщая забастовка. Местная мэр жёстко подавила забастовку, наняв фестралов-чужаков для подавления рабочих. Хотя Селестия вмешалась и отстранила мэра, она также более не могла полностью доверять ОП(р) из-за их поддержки повстанцев в Северяне. И это недоверие было более чем обоснованным, так как ОП(р) втайне сотрудничали со сталлионградскими революционерами.§!"
BAL_communism_communism:0 "ПОН"
BAL_communism_communism_long:0 "Партия ортодоксальных народников     §gТруды и активность Карамель Маркс вдохновили многих пони в Эквестрии и привели к основанию ПОН в Балтимейре в 989 году. Политические партии в Эквестрии были редки, и это была первая в своем роде, что появилась на юго-востоке. С момента основания партии пони по имени Крикет Чейфер был её центральной фигурой. Он столько раз избирался председателем партии, что ныне ПОН и Чейфер практически неразделимы. Эта партия одновременно является как ортодоксальной, так и неортодоксальной. Она следует задумке Маркс, когда это возможно, но никогда не отбрасывает в сторону более прагматичные альтернативы. С момента своего основания она поддерживала тесные связи с коммунистическим движением Северяны и участвовала во всеобщей забастовке 995 года. Некоторые полагают, что ПОН планировала свергнуть мэра и создать коммунистическое государство на юго-востоке, но их планы провалились, так как она жёстко подавила забастовку. После этого события появилось несколько предложений о запрете партии, но Чейферу всегда удавалось идти на уступки и использовать официальные переговоры, чтобы сохранять законный статус организации. Это позволило им спокойно готовиться ко второму восстанию.§!"
