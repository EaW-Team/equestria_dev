BAL_communism_anarchy:0 "ГАЛ"
BAL_communism_anarchy_long:0 "Гильдия анархисткой лиги\n§gС годами ОП(р) росли в размерах и становились всё более бюрократизированным и централизованными. В противовес этому многие наиболее анархистские члены ОП(р) основали ГАЛ, чтобы бросить вызов постоянно расширяющейся бюрократии и напомнить ОП(р) о её корнях в качестве анархистской организации. Поэтому связи между этими двумя движениями очень тесны, и их нередко рассматривают как одну организацию, называемую ГАЛ-ОП(р). ГАЛ - в высшей степени децентрализованная организация. Это движение считается весьма противоречивым и сомнительным из-за его яростной оппозиции эквестрийской монархии, что было вдохновлено анархистскими движениями Грифонии. Члены ГАЛ более жестоки, чем их товарищи из ОП(р), и несут ответственность за многочисленные случаи беспорядков, грабежей и целенаправленных убийств. Многие из них были арестованы за последние годы. ГАЛ является легальной организацией исключительно благодаря поддержке ОП(р), а также доброжелательности и терпению Селестии.§!"
BAL_communism_arstotzka:0 "ЯШКИ"
BAL_communism_arstotzka_long:0 "Ядро штаба коммунистической идеологии\n§gДо недавнего времени о существовании ЯШКИ было неизвестно почти всем жителям Эквестрии. Даже другие коммунисты Балтимейра, за исключением Крикета Чейфера и некоторых других высокопоставленных чиновников ПОН, не знали об этом. Это ультралевая и крайне радикальная сталлионистская террористическая организация, чья единственная цель заключается в уничтожении буржуазии Балтимейра и прочих мест за его пределами. Мало что известно о её истории, но Чейфер знает, что эта организация была основана после всеобщей забастовки 995 года. Коммунисты увидели, что протест не привёл к каким-либо изменениям в Балтимейре, и согласились с тем, что потребуются более экстремальные методы. Они проникли в органы безопасности Балтимейра, в особенно в местную полицию, и готовились к быстрому удару, который эффективно обезглавит и свергнет местное буржуазное правительство. Можно с уверенностью сказать, что без их поддержки республика Балтимейр никогда бы не появилась.§!"
BAL_communism_syndiescum:0 "ОП(р)"
BAL_communism_syndiescum_long:0 "Организация профсоюзов (реформаторы)\n§gОП(р) – это главное профсоюзное объединение во всей Эквестрии. Основанная в Балтимейре летом 983 года, эта анархо-синдикалистская Конфедерация объединила самые разные рабочие организации. Хотя на неё и повлияло марксистское движение Северяны, в первую очередь она стала преемницей прежних эквестрийских рабочих и анархических течений. Структура профсоюза глубоко децентрализована и построена на принципах прямой демократии, а потому у него нет единого лидера. ОП(р) задумывалась как общенациональное движение, однако почти все её члены – выходцы из процветающих промышленных городов восточной Эквестрии. На протяжении многих лет профсоюз активно добивался от работодателей улучшения условий труда, и благодаря пониманию со стороны принцессы Селестии эти попытки часто венчались успехом. Но отношения с центральным правительством в Кантерлоте резко испортились во время Зимней революции 995 года, когда в поддержку восстания вспыхнула всеобщая забастовка. Местный мэр жестоко подавила протесты. И хотя Селестия вмешалась и сместила мэра с должности, она больше не могла доверять ОП(р) из-за их поддержки северянских мятежников. И это недоверие было более чем оправданным: профсоюз действительно тайно сотрудничал со сталлионградскими революционерами§!."
BAL_communism_communism:0 "ПОН"
BAL_communism_communism_long:0 "Партия ортодоксальных народников\n§gТруды и активность Карамель Маркс вдохновили многих пони в Эквестрии и привели к основанию ПОН в Балтимейре в 989 году. Политические партии в Эквестрии были редки, и это была первая в своем роде, что появилась на юго-востоке. С момента основания партии пони по имени Крикет Чейфер был её центральной фигурой. Он столько раз избирался председателем партии, что ныне ПОН и Чейфер практически неразделимы. Эта партия одновременно является как ортодоксальной, так и неортодоксальной. Она следует задумке Маркс, когда это возможно, но никогда не отбрасывает в сторону более прагматичные альтернативы. С момента своего основания она поддерживала тесные связи с коммунистическим движением Северяны и участвовала во всеобщей забастовке 995 года. Некоторые полагают, что ПОН планировала свергнуть мэра и создать коммунистическое государство на юго-востоке, но их планы провалились, так как она жёстко подавила забастовку. После этого события появилось несколько предложений о запрете партии, но Чейферу всегда удавалось идти на уступки и использовать официальные переговоры, чтобы сохранять законный статус организации. Это позволило им спокойно готовиться ко второму восстанию.§!"
