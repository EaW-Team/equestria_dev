#BAL_maize_idea:0 "Чудо-кукуруза"
#BAL_maize_idea_desc:0 "Владыка кукурузы товарищ Чейфер убедил нас в величии маиса."
BAL_continued_nationalization_council:0 "Продолжение национализации"
BAL_continued_nationalization_council_desc:0 "Народный парламент принял закон, объявляющий его де-юре собственником всего имущества и средств производства в стране. Это даёт легальное право изымать их у прежних хозяев, коими зачастую оказываются алчные капиталисты. Не встречая сопротивления со стороны революционеров ГАЛ-ОП(р), государство вольно экспроприировать частную собственность в интересах трудящихся. В дальнейшем средства производства переходят под контроль рабочих советов, которые по-прежнему лояльны Парламенту."
BAL_continued_nationalization_council_corn:0 "Продолжение национализации"
BAL_continued_nationalization_council_corn_desc:0 "Народный парламент принял закон, объявляющий его де-юре собственником всего имущества и средств производства в стране. Это даёт легальное право изымать их у прежних хозяев, коими зачастую оказываются алчные капиталисты. Не встречая сопротивления со стороны революционеров ГАЛ-ОП(р), государство вольно экспроприировать частную собственность в интересах трудящихся. В дальнейшем средства производства переходят под контроль рабочих советов, которые по-прежнему лояльны Парламенту. Тем временем в государственных хозяйствах развернулись масштабные программы по выращиванию кукурузы."
BAL_continued_nationalization_control:0 "Продолжение национализации"
BAL_continued_nationalization_control_desc:0 "Народный парламент принял закон, объявляющий его де-юре собственником всего имущества и средств производства в стране. Это даёт легальное право изымать их у прежних хозяев, коими зачастую оказываются алчные капиталисты. Не встречая сопротивления со стороны революционеров ГАЛ-ОП(р), государство вольно экспроприировать частную собственность в интересах трудящихся. Экономика переходит под прямое управление правительства."
BAL_continued_nationalization_control_job:0 "Продолжение национализации"
BAL_continued_nationalization_control_job_desc:0 "Народный парламент принял закон, объявляющий его де-юре собственником всего имущества и средств производства в стране. Это даёт легальное право изымать их у прежних хозяев, коими зачастую оказываются алчные капиталисты. Не встречая сопротивления со стороны ГАЛ-ОП(р) или ПОН, государство вольно экспроприировать всю частную собственность в интересах трудящихся. Отныне правительство напрямую управляет как экономикой, так и трудовым распределением каждого гражданина, независимо от его знака отличия."
BAL_weather_micromanagement_idea:0 "Управление погодой"
BAL_weather_micromanagement_idea_desc:0 "Ничто не может быть недоступно государству. Даже погода."
BAL_strict_quotas:0 "Строгие квоты"
BAL_strict_quotas_desc:0 "Каждый пони получает свою справедливую долю до тех пор, пока он выполняет свой долг во славу государства."

BAL_decentralized_militia_idea:0 "Децентрализованное ополчение"
BAL_decentralized_militia_idea_desc:0 "Военные силы юго-востока состоят из многочисленных ополченцев, которые все вместе защищают свою родину."
BAL_for_freedom:0 "За свободу!"
BAL_for_freedom_desc:0 "Мы никогда не должны забывать, что мы боремся за нашу свободу, и если мы проиграем, то нас снова закуют в оковы."
BAL_union_militia_idea:0 "Профсоюзные ополчения"
BAL_union_militia_idea_desc:0 "Профсоюзы организовали свои собственные военные подразделения, стремящиеся защитить свои семьи."
BAL_defending_workers:0 "На защиту дела трудящихся"
BAL_defending_workers_desc:0 "Пока мы живём, ничто не сможет погубить нашу революцию."

BAL_centralized_army_idea:0 "Централизованная армия"
BAL_centralized_army_idea_desc:0 "Унитарная армия обладает понятной иерархией и организована в подразделения, функционирующие как единое целое."
BAL_disciplined_ranks_idea:0 "Дисциплина в наших рядах"
BAL_disciplined_ranks_idea_desc:0 "Мы не потерпим инакомыслия в рядах нашей армии."
BAL_trained_commissars:0 "Обученные комиссары"
BAL_trained_commissars_desc:0 "Политические комиссары в армии получили реальную военную подготовку."
BAL_napalm_idea: "Напалмовые бомбы"
BAL_napalm_idea_desc: "Государство – первая в мире страна, поставившая на вооружение зажигательные напалмовые бомбы."

BAL_equestrian_resistance: "Эквестрийское сопротивление"
BAL_equestrian_resistance_desc: "Остальная часть Эквестрии кишит монархистами и реакционерами, жаждущими разрушить новый порядок."
BAL_equestrian_resistance_2: "Ослабленное эквестрийское сопротивление"
BAL_equestrian_resistance_2_desc: "Благодаря нашим решительным действиям контрреволюционное движение было значительно ослаблено."
BAL_equestrian_resistance_3: "Пошатнувшееся эквестрийское сопротивление"
BAL_equestrian_resistance_3_desc: "Уже почти никто в Эквестрии не сопротивляется нашему коммунистическому правительству."

BAL_world_revolution: "Мировая революция"
BAL_world_revolution_desc: "Мир стоит на пороге кардинальных перемен.\nКто был ничем, тот станет всем."

