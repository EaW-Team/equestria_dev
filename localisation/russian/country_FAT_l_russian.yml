 FAT_reconstruction_progress_value_tt:0 "Увеличивает £FAT_texticon_reconstruction §Cпрогресс реконструкции§! на $RIGHT|+0$§G%§!"
 FAT_reconstruction_progress_default_increment_tt:0 "Увеличивает скорость £FAT_texticon_reconstruction §Cпрогресса реконструкции§!, получаемого благодаря миссии §Y$FAT_gradual_reconstruction_mission$§!, на $RIGHT|+0$§G%§!"
 FAT_sectarianism_value_tt:0 "£FAT_texticon_sectarianism §CРазобщённость§!: $RIGHT|-=0$"
 FAT_sectarianism_value_lower_than_45_tt:0 "£FAT_texticon_sectarianism §CРазобщённость§! ниже §G45§!"
 FAT_reconstruction_progress_tt:0 "£FAT_texticon_reconstruction §CПрогресс реконструкции§!: $RIGHT|0$%"
 FAT_faction_archonates_desc:0 "Не секрет, что архонаты всегда распространяли влияние Империи. Теперь, когда Грифенхейм вновь находится под контролем республиканцев, положение архонатов как политических структур стоит на крайне шаткой основе: несмотря на прошлую коррупцию и поддержку деспотичной Империи, архонаты всё ещё представляют доминирующую религию грифонов как в Герцланде, так и за его пределами, и архонты наверняка воспользуются этим положением. Если мы хотим сохранить построенное нами светское демократическое государство, то должны выработать чёткую позицию по отношению к архонатам."
 FAT_faction_loyalists_desc:0 "Больная птица Грифонии, быть может, наконец пала, но её сторонники никуда не делись. Множество существ, от фанатично преданных псов Бронзхилла до различных местных общин по всему Герцланду, до сих пор оплакивают утрату своего любимого императора. Группы имперских лоялистов прочно укоренились на нашей территории. Совершенно немыслимо проводить полноценные выборы в пангрифонье правительство, если население остаётся верным декадентским и коррумпированным институтам монархии. Так или иначе, нам придётся склонить хотя бы часть этих ностальгирующих реакционеров к добросовестному участию в политической системе республики."
 FAT_faction_regionalists_desc:0 "Последствия падения империи создали новую проблему: представление о Герцланде как об отдельной национальной идентичности, отличающейся от континентального господства империи. Националистический пыл начал разгораться ещё до нашего возвращения в Грифенхейм, но политические потрясения, вызванные нашей победой, лишь усилили его и расширили ряды различных местных партий по всему Герцланду. Помимо них, местные правительства, администрации и группы интересов, желающие определённой независимости от Грифенхейма, объединяются и будут постоянно мешать проведению нашей политики, если с ними так или иначе не разобраться."
 FAT_faction_status_desc:0 "§RУкрепившаяся§! фракция будет блокировать принятие определённых решений по реконструкции, и с ней придётся либо вести переговоры, либо каким-то образом обойти её.\n\n§YСотрудничающая§! фракция позволит реализовывать соответствующие решения, но легко может снова стать §Rукрепившейся§!, если будут приняты невыгодные ей решения.\n\n§GПодчинённая§! фракция останется в основном пассивной и не сможет мешать политике реконструкции, но со временем будет способствовать росту £FAT_texticon_sectarianism §Cразобщённости§!."
 FAT_increment_sectarianism_per_subdued_faction_tt:0 "Увеличивает £FAT_texticon_sectarianism §Cразобщённость§! на §R3§! за каждую §Gподчинённую§! фракцию"
