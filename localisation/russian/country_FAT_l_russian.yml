 griffonRepublic.121.a:0 "Bronzehill is rightful Republic territory, and that's final."
 griffonRepublic.121.b:0 "If compromise is what it takes, then we'll do it."
 griffonRepublic.121.c:0 "For Boreas' sake, fine! Pass the motion!"

 griffonRepublic.122.t:0 "The End of the Wild Ride"
 griffonRepublic.122.d:0 "A cold breeze swept through the night in World's End, and Suntail found himself staring longingly past the Western waters. That night, a soft fog rested over the ocean's surface, but on clearer days, it was possible to see the faint luminiscense of the Equusian coast painting the horizon. It was quiet, save for crashing of waves against the rocky cliffs and the mechanical hum of the lighthouse as its light spun. It was a serene place. Reinhard could see why Meyer had grown to like it.\n\nThe Generalíssimo saw no need to grace the deserter with his presence at his execution. While it was being carried out, Suntail was far away, in peaceful contemplation. Though he'd never admit it openly, deep down, he always had a distant, begrudging respect for the Equestrians and their Princesses. For a thousand years they've been united as one people, a singular voice, a bulwark against any and all threats, while Griffonkind still stood fractured into tiny, weak states. If the Princess had more of a mind for conquest, could any standing army in Griffonia face her?\n\nNot now, thought Suntail, but soon. He knew that with the right leadership, his leadership, Griffonia could achieve that level of unity and strength, and even surpass it. He just needed time; as soon as Griffenheim was his, all his plans could be set into motion."
 griffonRepublic.122.a:0 "Patience. No great things are ever achieved without patience."

 griffonRepublic.123.t:0 "The Revolutionaries Meet Again"
 griffonRepublic.123.d:0 "Sickleclaw shuffled forward, with his talons cuffed together and his paws dragged from behind by Suntail's thugs. When he was brought out of the damp confines of his cell and into the quickly assembled stage in the icy outskirts of Dinkau, his heart skipped a beat: he saw the GNRF's aquila flying in standards of the Republic, in neat lines from side to side. A small crowd of petrified locals assembled, flanked on all sides by the National Republican Army. Jubilant, the army griffs hammered the butts of their rifles into the frozen ground, hundreds if not thousands in unison, and through the war drums they screamed: \"Suntail! Suntail! Suntail!\"\n\nIt had been years since Sickleclaw last saw him, but in that moment, walking towards him, his uniform sharp and his medals glistening under the limelights, the Generalíssimo had an air of etheral youth about him, like not a day had passed since the Long March. \"Do you hear that, Asper?\", he said with a grin when he got close, gesturing past the stage curtains to the thumping echo of his cheering army. \"They love me. They are my loyal revolutionaries, harbingers of the Empire's end, and they will follow me to the end. Can you say the same about the esteeemed members of your 'People's Congress?'\"\n\n\"This isn't ending well for you, Reinhard\", said Sickleclaw. \"You've deluded your lackeys, you've deluded the Republican Army, you may have even deluded yourself - but I see right through you. You are a dead griff walking. You'll snap like a twig when the Empire comes marching. You don't have the strength for it.\" He leaned forward. The guards reached out to grab him, but with a nod, Suntail held them back. \"Because even for all his faults, you are not half the leader Alexander was.\"\n\nSuntail held his tongue for an instant, enough for his smile to return. \"Yes, well... perhaps you'd change your mind if I dragged you back to Griffenheim with me. It's a shame, truly, that you won't be there to see it.\""
 griffonRepublic.123.a:0 "Suntail's speech was as short as was Asper's drop."

 griffonRepublic.124.t:0 "New Holidays"
 griffonRepublic.124.d:0 "\"The day when we first rose up is a must, and so is the day when we marched on Griffenheim for liberation.\", the clerk tapped on a clipboard. The task they were doing today – usually a creative exercise done by chicks at school – was both mundane, and still, essential for the young republic to gain the trust of its citizens. \"It's also a no-brainer to reuse any previous holidays that weren't tied to the monarchy. That should give us a decent amount, but we could still have more.\"\n\n"What about the day we made that bastard Otto's head roll in Cloudbury?\" one minister suggested. \"It would serve as a yearly reminder of our victories and could pair with the holiday marking the taking of Griffenheim.\"\n\n"It would," another replied flatly, \"if we aimed to make this reconstruction period far more difficult by antagonizing one of the few regions not actively hostile right now.\" The minister's smile vanished as the clerk resumed tapping the clipboard.\n\n\"Perhaps a cultural appreciation day?\" the Chief of Staff said. \"It would show we are not picking favorites, and as time goes on, it would only grow more fitting as a symbol of unity.\"\n\n"That," said Sunglider, pointing toward the cabinet member, "is an idea that could work. I'll note it for further discussion. Anyone else?"\n\n\"What about 'Kemerskai's Day'?\" In an instant, every eye turned towards the voice. Kemerskai Jr. with his claw raised and a smile. \"Father was crucial to the republic, and enshrining lessons about founding figures like him would set a good precedent.\"\n\n(leader) was unsure whether his own expression showed more confusion, distaste, or sheer amazement at what had just left the griffon's beak – a feeling clearly shared by everyone else in the room. Of all the ideas that day, this was by far the most absurd.\n\nThe clerk coughed, struggling to regain his composure, contrasted by Junior's confidence."
 griffonRepublic.124.a:0 "\"Ahem... any other ideas?\""

 griffonRepublic.125.t:0 "The Duchy of Cloudbury Submits to the Empire"
 griffonRepublic.125.d_FAW:0 "Griffenheim has received our offer warmly: the Imperial regent has already recognized the ducal government as the rightful ruler of the nothern lands of Griffonia, reaffirming the ancient borders of the Empire. The threat of an Imperial invasion has not only been averted, we now benefit from the advisory knowledge and support of the Reichsarmee."
 griffonRepublic.125.d_GRD:0 "In a shocking turn of events, the traitorous scum that followed in the pawsteps of Alexander Kemerskai in the aftermath of 978 have been humbled: Nicole Rosewing, a warlord that once followed Kemerskai, deposed the Republicans and restored the rightful Duchy of Cloudbury, and now, the Duchy comes back into the imperial fold of its own volition. This is a tremendous victory for our cause, and the regent has already recognized the ducal government as the rightful ruler of the Northern lands of Griffonia, reaffirming the ancient borders of the Empire."
 griffonRepublic.125.a:0 "Cloudbury og Griffenheim som én!"
 griffonRepublic.125.b:0 "The Empire welcomes back its prodigal subject."

 griffonRepublic.126.t:0 "To Reach The Emperor's Ear"
 griffonRepublic.126.d:0 "\"And you're certain this will be to our benefit?\", the Duke asked Rosewing, unsure of whether it was a good idea to recommend an aide to the Imperial Palace.\n\n\"I'm certain this will be to the Empire's benefit,\", she replied. \"which by corollary is our benefit. Wouldn't you agree?\"\n\n\"I don't understand, Nicole, is it truly necessary that we promote our model abroad?\"\n\n\"Hmm\", Rosewing scoffed with a grin. \"Ours is a contentious kind, Your Majesty. Cloudbury saw with her own eyes what happens when undue power is centralized in the claws of a single griff. Griffons respect strength, but they have no love for a weak autocrat, and nogriff has ever held onto power unilaterally their whole lives. The state is made weak by absolutist rule, it makes for poor foundations, and poor foundations make for a bad investment.\"\n\n\"I don't think the regency will be pleased if they find we're attempting to influence the young Emperor...\"\n\n\"And by Boreas, they never will. I assure you that the griffon I recommended you will be as discrete as possible. It will be a slow process: over the course of years, the young Emperor will be persuaded as to the necessity of constitutionalist reforms.\""
 griffonRepublic.126.a:0 "It's for the good of us all."

 griffonRepublic.127.t:0 "Traitors Arrive In Griffenheim"
 griffonRepublic.127.d_FAW:0 "The traitors have been delivered to Griffenheim as a token of our loyalty and competence. With them out of the way, the Duchy of Cloudbury now stands as the uncontested government of northern Griffonia and the Grand Duke's dominion of his realm is beyond question."
 griffonRepublic.127.d_GRD:0 "Thanks to the Duchy of Cloudbury's efforts to secure Northern territories and depose illegitimate governments, two traitors to the Griffonian Empire - Asper Sickleclaw and Hermann Meyer - have been delivered to Griffenheim by ducal authorities to be judged for charges of Treason and conspiracy. Their trials were quick, and their execution restores a great deal of faith in the Empire's capability to exert power and punish those who oppose it."
 griffonRepublic.127.a:0 "Det var så lidt."
 griffonRepublic.127.b:0 "Splendid."

