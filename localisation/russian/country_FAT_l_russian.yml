 FAT_transfer_to_GRF:0 "Передать приграничные территории Нова Грифонии"
 FAT_puppet_LCT:0 "Союзная республика Речных Земель"
 FAT_promote_river_swirl:0 "Довериться Ривер Свирл"
 FAT_promote_river_swirl_desc:0 "Бывшая канцлер Речной Республики Ривер Свирл предана принципам гармонии. Она, пожалуй, чересчур увлечена эквестрийской политической системой, но всё же остаётся лучшей кандидатурой для установления эффективного управления в Речных Землях и восстановления демократии в нашем союзном государстве."
 FAT_promote_nova_whirl:0 "Положиться на Нову Вирл"
 FAT_promote_nova_whirl_desc:0 "Бывшая политическая деятельница Речной Республики Нова Вирл – убеждённая защитница трудящихся, а её идеи о работоспособной рыночной системе, которая при этом обеспечивает благосостояние населения, делают её идеальной пони для управления нашим союзным государством в Речных Землях и построения демократии, основанной на власти рабочих."
 FAT_suntail_and_his_queen:0 "Продвинуть Фёрм Скау"
 FAT_suntail_and_his_queen_desc:0 "Бакарская националистка Фёрм Скау привлекла внимание генералиссимуса. Их взгляды во многом совпадают, и он уверен, что именно она — подходящая пони для дальнейшей консолидации и стабилизации Речных земель."
 FAT_transfer_to_NTR:0 "Передать северные территории пони"
 FAT_transfer_to_LCT:0 "Передать территории нашему союзнику в Речных землях"
 
