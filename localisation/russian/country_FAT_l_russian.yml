 FAT_puppets_tab_desc:0 "Хотя мы изначально не стремились к этому, под нашим контролем оказались территории, большинство населения которых составляют не-грифоны. Местные жители никогда не примут прямое правление, поэтому создание идеологически близкого нам правительства с широкой автономией становится одновременно единственно возможным и прагматичным решением."
