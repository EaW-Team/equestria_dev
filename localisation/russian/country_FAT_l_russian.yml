 FAT_army_chief3:0 "Александр Кемерскай-младший"
 FAT_army_chief3_desc:0 "Александр Кемерскай-младший родился в 967 году в семье Александра Кемерская, офицера Имперской Армии. Он редко видел своего отца из-за его миссий на юге и востоке Империи.\n\nАлександру было всего 11 лет, когда его отец начал революцию, изменившую историю всего мира. Его укрыла его мать, живущая в Грифенхейме, а Кемерскай позже организовал его побег через Фетизию в далёкую от потрясений Революции Ведину. В 981 году они воссоединились в Клаудбьюри, когда Александру было всего 14 лет.\n\nВ 18 лет он вступил в армию Республики для того, чтобы стать генералом, как и его отец."
 FAT_army_chief4:0 "Хирон Штормфезер"
 FAT_political_11:0 "Хирон Штормфезер"
 FAT_army_chief4_desc:0 "Хирон Штормфезер, которого за спиной называют "Птенец из гнезда Сантейла", является одним из генералов Республики, имеющим связи с ультранационалистическими группировками. Кроме того, он тесно связан с Рейнхардом Сантейлом, властолюбивым и амбициозным генералом, связанным с бандитизмом и уже давно не подчиняющимся Республике. Хирон оспаривает эти обвинения и утверждает, что Сантейл является честным и добрым грифоном. Многие подозревают, что Хирон работает с Сантейлом.\n\nХирон родился в Грифонстоуне, и в 13 лет присоединился к Революции против желания своих родителей. Он присоединился к бригаде Рейнхарда Сантейла и вместе с ним участвовал в Разорении Кроны вместе с остальными войсками Сантейла. Штормфезер быстро стал его учеником, научившись у его всему.\n\nСейчас лояльность Хирона стоит под вопросом. Кого он поддерживает - Республику или мятежного генерала?" 
 FAT_political_11_desc:0 "Хирон Штормфезер, которого за спиной называют "Птенец из гнезда Сантейла", является одним из генералов Республики, имеющим связи с ультранационалистическими группировками. Кроме того, он тесно связан с Рейнхардом Сантейлом, властолюбивым и амбициозным генералом, связанным с бандитизмом и уже давно не подчиняющимся Республике. Хирон оспаривает эти обвинения и утверждает, что Сантейл является честным и добрым грифоном. Многие подозревают, что Хирон работает с Сантейлом.\n\nХирон родился в Грифонстоуне, и в 13 лет присоединился к Революции против желания своих родителей. Он присоединился к бригаде Рейнхарда Сантейла и вместе с ним участвовал в Разорении Кроны вместе с остальными войсками Сантейла. Штормфезер быстро стал его учеником, научившись у его всему.\n\nСейчас лояльность Хирона стоит под вопросом. Кого он поддерживает - Республику или мятежного генерала?"
 FAT_chiron_desc:0 "Хирон Штормфезер, которого за спиной называют "Птенец из гнезда Сантейла", является одним из генералов Республики, имеющим связи с ультранационалистическими группировками. Кроме того, он тесно связан с Рейнхардом Сантейлом, властолюбивым и амбициозным генералом, связанным с бандитизмом и уже давно не подчиняющимся Республике. Хирон оспаривает эти обвинения и утверждает, что Сантейл является честным и добрым грифоном. Многие подозревают, что Хирон работает с Сантейлом.\n\nХирон родился в Грифонстоуне, и в 13 лет присоединился к Революции против желания своих родителей. Он присоединился к бригаде Рейнхарда Сантейла и вместе с ним участвовал в Разорении Кроны вместе с остальными войсками Сантейла. Штормфезер быстро стал его учеником, научившись у его всему.\n\nСейчас лояльность Хирона стоит под вопросом. Кого он поддерживает - Республику или мятежного генерала?"
 FAT_iris:0 "Магистр Ирис Сильверкло"
 FAT_iris_desc:0 "Магистр Ирис Сильверкло был одним из самых доверенных советников в Империи и магистром в Академии Ромау, а также членом регентского совета, Академия Ромау была одним из самых престижных университетов в землях грифонов до того, как она была разрушена во время Второй Революционной войны. После этого Ирис предложил свои услуги Генриху Кингфезеру. Ирис был помилован и принят на службу Республике."
