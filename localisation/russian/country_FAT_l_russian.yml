###DECISIONS###
 FAT_our_history:0 "История республиканской борьбы"
 FAT_our_history_desc:0 "Республика Грифонов имеет богатую историю, полную конфликтов, борьбы и войн. От революции 978 года до Великого похода 979-го, и вплоть до предательства социалистов в 986-м – множество испытаний едва не разрушили нашу нацию."
 FAT_foundings_of_the_national_republican_party:0 "970 – Основание Национальной Республиканской Партии"
 FAT_storming_of_the_imperial_palace:0 "Февраль 978 – Штурм Императорского дворца"
 FAT_battle_at_the_griffing:0 "Март 978 – Битва за Гриффкинг"
 FAT_campaign_in_interriver:0 "Апрель 978 – Кампания в Междуречье"
 FAT_attack_on_vinnin:0 "Апрель 978 – Атака на Виннин"
 FAT_president_kemerskai:0 "Май-август 978 – Первые выборы президента"
 FAT_second_campaign_in_interriver_fall_of_republic:0 "Январь-март 979 – Падение республики"
 FAT_long_march:0 "Апрель-июль 979 – Великий поход на север"
 FAT_south_cloudbury_war:0 "Август 979 – март 980 – Вторжение в Клаудбьюри"
 FAT_taking_of_cloudbury:0 "Апрель 980 – январь 981 – Падение Клаудбьюри"
 FAT_the_986_election:0 "986 – Когда всё развалилось"
 FAT_goddamnit_rosewing:0 "995 – Опала Роузвинг"
 FAT_now_here_comes_suntail:0 "1003 – Дело Сантейла"
 FAT_zoomer_time:0 "1005 – Восход Эстлера"
 FAT_guarantee_people:0 "Дать гарантии государству [From.GetName]"
 turn_to_democracy:0 "Полностью принять принципы гармонии"
 FAT_demand_faction_leadership:0 "Потребовать лидерства во фракции"
 FAT_demand_faction_leadership_desc:0 "Мы слишком долго играли вторую скрипку. Пришло время республике занять своё законное место в качестве ведущей силы нашей фракции."
 FAT_rename_cloudbury:0 "Переименовать Виннин в Кемерскайштадт"
 FAT_rename_cloudbury_desc:0 "Чтобы почтить нашего великого президента-маршала, мы должны переименовать Виннин – родной дом Кемерская, где он жил за десятилетия до того, как республиканская революция изменила Грифонию навсегда."
 FAT_demand_griffenheim:0 "Потребовать Грифенхейм у государства [From.GetName]"
 FAT_demand_griffenheim_desc:0 "Грифенхейм, столица Грифонии, был захвачен государством [From.GetName]. Естественно, только мы заслуживаем владения городом. Мы дипломатически попросим передать его нам." 
 FAT_eulogy_for_grover_v:0 "Выступление: «Некролог» для Гровера V"
 FAT_eulogy_for_grover_v_desc:0 "Гровер V, император всех грифонов, мёртв. Мы должны использовать этот момент, чтобы напомнить грифонам о его неудачах и тирании."
 FAT_react_to_the_aquileian_revolution:0 "Выступление: Аквелийская республика"
 FAT_react_to_the_aquileian_revolution_desc:0 "Теодор Верани начал Вторую Аквелийскую революцию. Мы должны всеми силами поддержать это начинание и публично объявить о солидарности между нашими республиками."
 FAT_react_to_the_skyfall_revolution:0 "Выступление: Демократические перемены в Скайфоле"
 FAT_react_to_the_skyfall_revolution_desc:0 "Женевьева Гильдедвинг покончила с олигархическим правлением в Скайфоле и установила истинную демократию. Мы должны поздравить её."
 FAT_condemn_beakolini:0 "Выступление: Фашисты юга"
 FAT_condemn_beakolini_desc:0 "Премьер-министр Джулио Биколини стал лидером Вингбардии, доказав, что монархия склонна к фашизму в час угрозы. Президенту-маршалу Кемерскаю, безусловно, есть что сказать об этой новой угрозе на юге."
 FAT_condemn_sickleclaw_dictatorship:0 "Выступление: Неизбежный результат социализма"
 FAT_condemn_sickleclaw_dictatorship_desc:0 "Аспер Сиклкло не собирается придерживаться демократических идеалов в Скайнавии. Зачем ему демократия, если он может править как диктатор? Социализм противен природе грифонов, и теперь это ясно как день. Кемерскай должен высказаться об этом."
 FAT_all_weapons_against_the_lord_protector:0 "Выступление: Осудить лорда-протектора Империи"
 FAT_all_weapons_against_the_lord_protector_desc:0 "Хаос охватил Империю. Изгой, бывший генерал Фердинанд Донкло, захватил власть в Грифенхейме и казнил Гровера VI. Все вассалы Империи объявили о независимости. Это серьёзное событие, и Кемерскаю есть что сказать по этому поводу."
 FAT_war_has_come:0 "Выступление: Вторая революция"
 FAT_war_has_come_desc:0 "Вторая революция почти свершилась! Настало время изгнать монархистов и восстановить республиканское правительство в Грифенхейме. Это важнейшая тема, и Кемерскаю есть что сказать нации."
 FAT_i_changed_my_mind:0 "Включить решения предыстории"
 FAT_i_quite_dislike_history:0 "Отключить решения предыстории"
 FAT_faction_pga:0 "Республиканский пакт"
 form_griffon_empire_DANISH:0 "Объединить Клаудбьюри и Герцланд"
 FAT_pardon_danior:0 "Помиловать Даниэля Кримзонбика"
 FAT_pardon_danior_desc:0 "Даниэль Кримзонбик бежал из Республики десятки лет назад, оскорбив Кемерская в пьяном угаре. Учитывая плачевное состояние наших войск и действия Эрвина Хайхилла в Нова Грифонии, мы должны простить его и вернуть в армию."

###NEW MARELAND WAR TAB###
