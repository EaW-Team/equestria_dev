#Reconstruction Tab Decisions
 FAT_has_active_reconstruction_policy:0 "A §CReconstruction§! policy is currently in progress"
 FAT_reconstruction_mission:0 "Reconstruction Mandate"
 FAT_reconstruction_mission_desc:0 "Time is of the essence - we have committed ourselves to fulfilling our goals of reforming the Republican administration and rebuilding the Herzland's economy within two years. Exactly how we go about this endeavor will be up to the President and his cabinet, but the various sectarian factions of the Herzland must be brought into compliance with our goals and the population assured of the legitimacy of our governance. If we fail to win the hearts and minds of the people, the Griffonian Republic simply cannot last, and the consequences of our failure will be dire..."
 FAT_reconstruction_success:0 "Declare the End of the Reconstruction Mandate"
 FAT_reconstruction_success_desc:0 "It's been a long and grueling process, but after our efforts to rebuild the Herzland's economy and establish a functional civilian administration, the NRP's reconstruction mandate can officially come to an end. The Griffonian Republic's position is finally cemented beyond question among the population, and elections may finally be held!"
 FAT_gradual_reconstruction_mission:0 "Ongoing Reconstruction Progress"
 FAT_reconstruction_active:0 "The §CReconstruction Mandate§! is ongoing"
 FAT_reconstruction_decisions_tab:0 "Мандат реконструкции"
 FAT_republican_knights_1:0 "Emerich's Proposal: Knights Of The Republic"
 FAT_republican_knights_1_desc:0 "General Walter has proposed that the Republican Army tap into the griffonic knightly tradition by officializing Griffon knight chapters, in the style of the old chivalric orders, that swear an oath to both the gods and the Republic. The organization of such knight chapters would differ significantly from traditional Imperial knightly orders, being instead incorporated into the Republican special forces corps, to ensure loyalty and stability; still, this compromise would greatly please the Archonic authorities, at minimal cost to the Army's morale and organization."
 FAT_republican_knights_2:0 "Expand The Knight Chapters"
 FAT_republican_knights_2_desc:0 "Bolstering the Republican Knights with new recruits, better arms and new keeps will please the Archonates, though we should be careful not to become over-reliant on this branch of the special forces, lest the regular army corps suffer as a result."
 FAT_recruit_reichsarmee_personnel_1:0 "Rigstag's Proposal: The Reichsarmee Amnesty Act"
 FAT_recruit_reichsarmee_personnel_1_desc:0 "While the Republican Army has been victorious, it is no secret among the armed forces that of all the Empire's institutions, the Reichsarmee was the most functional, and plenty of talented griffons filled its ranks. Simon has made a proposal for a very controversial motion, which would grant amnesty to some select sympathetic Imperial army officers we could work with, allowing them and their respective subordinates to keep their original rank. Syphoning some of the Empire's talent into the Republican Army would do wonders to bolster our officer corps, and as long as we are selective about who to take in and provide similar amnesty to common soldiers, it would be minimally disruptive to our chain of command. However, the old guard that has been loyal to the Republican cause since the beggining, not to mention the Cloudburian born soldiers, would be furious if they are to be commanded by a former Imperial officer."
 FAT_recruit_reichsarmee_personnel_2:0 "Further Reichsarmee Recruitment"
 FAT_recruit_reichsarmee_personnel_2_desc:0 "To supplement our armed forces, we could seek to recruit more former Imperial officers and take advange of their experience and doctrinal development. The more we former Reichsarmee personnel into the Republican Army, the better experience it should theoretically become - though its commitment to the Republican cause will no doubt suffer."
 FAT_restore_free_cities_1:0 "di Karthin's Proposal: The New Free City Model"
 FAT_restore_free_cities_1_desc:0 "Romauan local Gabriella di Karthin has long been loyal to the Republican mission, and her connections in the old senate of Romau have allowed her to come up with an ambitious proposal to speed up Reconstruction and ease the administration's burden: to revive the old model of the Imperial Free City under a republican framework. Under this proposal, municipalities that exceed a certain population threshold would be allowed to form and hold elections for local council chambers, while also having some regulatory power over their territory independently of Griffenheim. This would greatly please the burgeoning urban middle class, at some cost."
 FAT_restore_free_cities_2:0 "Expand The Free Cities"
 FAT_restore_free_cities_2_desc:0 "We could further facility Reconstruction policy by expanding the mandate of the Free Cities by reducing the population census threshold needed to quality for a Free City. It is likely this would severely hamper the central government's ability to plan economic policy."
 FAT_officialize_griffish_state_language:0 "Officialize Griffish as the Sole Federal Language"
 FAT_officialize_griffish_state_language_desc:0 "NRP politicians and army officers have operated mostly by using Griffish in their day to day since the Republic's establishment, but now that we've returned to Herzland, we could officialize it as the sole language for official civilian and army communications purposes in the federal government. This would greatly please the Herzlander population, but alienate the Cloudburian population and damage the credibility of a Pan-griffonian Republic."
 FAT_federal_holidays_act:0 "Federal Holidays Act"
 FAT_federal_holidays_act_desc:0 "Members of Parliament are proposing legislation which would officialize secular alternatives to popular religious holidays such as the Blue Moon Festival. This might displease the Archonates, but it'd go a long way towards secularizing civic life and building the foundation of a true democratic society."
 FAT_cooperate_with_commies_to_hunt_down_imperials:0 "The Scheißwald Expedition"
 FAT_cooperate_with_commies_to_hunt_down_imperials_desc:0 "Several Imperial forces fled into the relative safety of the Scheißwald Forest following our triumph in Griffenheim. By cooperating with local communist militias who know the lay of the land better than anyone, we could easily hunt down these last holdouts of the Empire for good."
 FAT_the_republic_is_marching:0 "Die Republik Ist Mächtig"
 FAT_the_republic_is_marching_desc:0 "Many of the old Imperial officers and troops are revanchists who'd love nothing more than to reunite Griffonia under the rule of Griffenheim - in that way, the Republic is the rightful continuation of the Empire's mandate in a new, democratic form. This shall be the call of our new propaganda campaign: it is our duty and right to go forth and make the continent our own! For Freedom, for Glory, and for Democracy!"
 FAT_religious_education_act:0 "The Religious Education Act"
 FAT_religious_education_act_desc:0 "Some more conservative minded members of Parliament who are sympathetic to the Archonates have proposed a bill which would allow the Griffonian Republic to subsidize some religious schools. It would go a long way to pleasing the Archonates, though it might put into question our commitment to separation of church and state."
 FAT_do_backroom_deals:0 "Negotiate Concessions For Reform"
 FAT_do_backroom_deals_desc:0 "Since we've secured the temporary cooperation of some troublesome elements in the Herzland, we should capitalize on this right away and negotiate the implementation of Reconstruction policy, before they change their minds for the worse."
#Civil war decisions
#Insert The Fire Rises reference here
 FAT_civil_war_tab:0 "War In the Herzland"
 FAT_civil_war_tab_desc:0 "The Herzland is currently being torn apart; Imperial loyalists, the old Archons and regionalists militias have all bitten chunks out of the Republican Army, and the region is engulfed in a new wave of violence and chaos. Not all is lost, however: alliance are fickle, and if we can find a way to dislodge our enemies from their temporary seats of power, we can convince those who fight for them that their loyalties are misaligned."
 FAT_civil_war_win:0 "Declare The End of the Herzland War"
 FAT_civil_war_annex_FAT:0 "The End of the Griffonian Republic"
 FAT_civil_war_annex_ROU:0 "The End of the Archonic League"
 FAT_civil_war_annex_ANG:0 "The End of the Herzland Popular Army"
 FAT_civil_war_annex_STW:0 "The End of the Imperial Restoration Front"

### Leader Descriptions ###
 chadskai_desc:0 "Александр Кемерскай родился в Виннине и был третьим сыном барона Алдуса Кемерская. Слишком поздно получив место преемника и считаясь слишком ничтожным грифоном для дворянства, Кемерскай перепробовал множество случайных занятий: он играл на корнете в виннинском оркестре и был постоянным гостем на городских мероприятиях. Однако в конце концов он вступил в имперскую армию. Дослужившись до звания артиллерийского офицера, он рассчитывал сделать многообещающую карьеру и стать маршалом. Но судьба имела другие планы для Грифонии.\n\nБурные годы, предшествовавшие 978 году, разочаровали Кемерская в его верности императору. Он не мог спокойно смотреть, как декадентское дворянство оплёвывает чужой труд, и не одобрял ужасных условий, в которых оказались простые грифоны. Таким образом, он вступил в заговор с единомышленниками-офицерами и воспользовался назревающим крестьянским восстанием. После особенно грубого злоупотребления властью со стороны регентского совета народ взял штурмом Императорский Дворец. В последовавшей неразберихе Кемерскай нашёл свой путь как лидер самопровозглашённой Республики Грифонов.\n\nНо успех оказался недолгим. Несмотря на популярность и уважение, Кемерскай не мог контролировать каждого грифона, и править ослабленной страной стало невозможно. Реакционное движение быстро подняло восстание и изгнало республиканцев из Сердца Империи. Великий поход начался в северных пределах расколотой державы, где они отвоевали регион у дворян, пытавшихся создать собственную независимую нацию.\n\nС тех пор прошло много лет, но преданность маршала Кемерская республиканскому делу осталась неизменной. Даже сталкиваясь с непослушными подчинёнными, он сохраняет контроль над ситуацией. Кемерскай также является плодовитым автором, и его труды вдохновляют республиканские движения по всей Грифонии."
 suntail_desc:0 "Рейнхард Сантейл родился в Кроне, провинции в самом сердце Империи Грифонов. Его семья жила в бедности, питаясь объедками. Стремясь избежать монотонной работы в полях, Сантейл в семнадцать лет вступил в императорскую армию и отправился в Грифенхейм, где был зачислен в бригаду Александра Кемерская – известного артиллерийского офицера и одного из самых многообещающих генералов Гровера.\n\nСантейл присоединился к заговору Кемерская по свержению Империи, считая монархию декадентской и олигархической, основанной на худших качествах грифонов – жадности и жажде власти. Он участвовал в битве за Императорский дворец и вскоре стал командиром республиканского батальона. С этим батальоном он вернулся в родную Крону, где участвовал в жестокой кампании грабежа, позже названной «Разграблением Кроны».\n\nКогда революционеры начали Великий поход на север, Сантейл разочаровался в гармонических ценностях, которым был предан Кемерскай, и примкнул к новой партии – Грифоньему Национальному Революционному Фронту, ультранационалистической организации, посвящённой популизму, республиканизму и фанатичной преданности национальному государству. Несмотря на недоверие, Кемерскай был вынужден признать его влияние и назначил Сантейла главным генералом республики.\n\nПосле запрета Национального Революционного Фронта в 1003 году, последовавшего за терактом в Клаудбьюри, Сантейл увёл свою армию на север и начал бесконечные грабежи как республиканских, так и иностранных крепостей в поисках оружия и добычи. Он превратился в жестокого военачальника-бандита, известного своей беспощадностью к сторонникам как гармонии, так и монархии."
 rosewing_desc:0 "Николь Роузвинг, когда-то самая верная подруга Кемерская в борьбе с реакционизмом, родилась в 941 году в столице Энгривера, Грифинге.\n\nВ возрасте двадцати четырёх лет она вступила в императорскую армию и вскоре стала наставницей и товарищем Кемерская, когда тот чуть позже тоже присоединился к ней. Оба были убеждёнными сторонниками Гровера IV и его реформ, но также верили в радикальный республиканизм и демократию. Роузвинг, вечная прагматик, считала, что режим Гровера IV сделает революцию ненужной и что народ должен восстать лишь тогда, когда монархия станет упадочной и загнивающей. Однако с приходом к власти Гровера V она стала сторонницей революции, участвуя в мятеже императорской армии во время марша на Императорский дворец. Роузвинг участвовала в кампаниях в Энгривере и Катерине, а в конце 978 года была назначена официальным вице-президентом Кемерская.\n\nВпоследствии Роузвинг бежала на север вместе с Кемерскаем, но к тому моменту между ними накопилось множество разногласий о республиканской риторике и идеалах. В 995 году она была смещена с поста начальника штаба и вице-президента: Кемерскай назначил на эти должности Шнабеля Санглайдера, убеждённого республиканца, и Рейнхарда Сантейла, открытого ультраправого, но умелого генерала.\n\nРоузвинг была отправлена на север со значительной силой, чтобы сохранить мир, но вместо этого начала его подрывать. Её офицеры вскоре установили связи с клаудбьюрийцами и монархистами, а сама она занялась рейдами на республиканскую армию и склады. При этом Роузвинг следила, чтобы никто не нападал на города: любой солдат, нарушивший это правило, приговаривался к смертной казни. Так она оставалась «защищать мир» на севере в течение десяти лет и продолжает делать это по сей день."
 rosewing_leader_desc:0 "Николь Роузвинг, когда-то самая верная подруга Кемерская в борьбе с реакционизмом, родилась в 941 году в столице Энгривера, Грифинге.\n\nВ возрасте двадцати четырёх лет она вступила в императорскую армию и вскоре стала наставницей и товарищем Кемерская, когда тот чуть позже тоже присоединился к ней. Оба были убеждёнными сторонниками Гровера IV и его реформ, но также верили в радикальный республиканизм и демократию. Роузвинг, вечная прагматик, считала, что режим Гровера IV сделает революцию ненужной и что народ должен восстать лишь тогда, когда монархия станет упадочной и загнивающей. Однако с приходом к власти Гровера V она стала сторонницей революции, участвуя в мятеже императорской армии во время марша на Императорский дворец. Роузвинг участвовала в кампаниях в Энгривере и Катерине, а в конце 978 года была назначена официальным вице-президентом Кемерская.\n\nВпоследствии Роузвинг бежала на север вместе с Кемерскаем, но к тому моменту между ними накопилось множество разногласий о республиканской риторике и идеалах. В 995 году она была смещена с поста начальника штаба и вице-президента: Кемерскай назначил на эти должности Шнабеля Санглайдера, убеждённого республиканца, и Рейнхарда Сантейла, открытого ультраправого, но умелого генерала.\n\nБудучи изгнанной на север, Роузвинг в конце концов объединила силы с Сантейлом, чтобы свергнуть разложившуюся Республику, а затем, одержав победу над коварным Рейнхардом Сантейлом, восстановила законное правление династии Саксхаген-Плюменьяр. После всех поворотов своей судьбы она стала главным военным офицером герцогства и начальницей штаба, заслужив уважение и преданность подчинённых."
 oskar_desc:0 "Оскар Плюменьяр не должен был стать герцогом Клаудбьюри. Он родился в 956 году у Августа Плюменьяра, брата наследного принца Отто (который впоследствии правил герцогством). Когда Кемерскай принёс революцию на север, дядя Оскара, Отто II, был казнён, а прочие легитимные члены семьи Плюменьяр арестованы и затем убиты.\n\nХотя это предотвратило переворот со стороны монархистов, род Плюменьяров всё же не угас. Смерть Августа в 975 году, незадолго до революции, вынудила Оскара вступить в переговоры с республиканским правительством ради спасения семьи и рода. Республиканцы пощадили Оскара, его сестру и её сына. Никто точно не знает, было ли это актом милосердия или пропагандой. Сестре и её сыну позволили остаться в республике, а самого Оскара сослали в Северные Племена.\n\nТам он предпочёл мирную жизнь. Завёл друзей среди местных пони и официально выучил два языка. В 1000 году у него родилась дочь Офелия, продолжившая род Плюменьяров. Оскар вырос тихим и воспитанным грифоном, не проявлявшим интереса к претензиям на трон Клаудбьюри.\n\nТеперь же Николь Роузвинг вернула его на трон, объявив Оскара I герцогом Клаудбьюри. Род Плюменьяр будет жить дальше, а в Клаудбьюри вновь воцарится монархия."
 hafslund_desc:0 "Йонас Хафслунд родился в герцогстве Клаудбьюри в 973. Когда республиканцы отступили на север и заняли герцогство, его родители переметнулись и начали поддерживать республиканскую армию в её наступлении на холмы Бликспайра. Хафслунд последовал их примеру и в восемнадцать лет немедленно вступил в армию. Как и многих других рекрутов, его вдохновили страстные речи президента-маршала, а также молодых радикалов, таких как Рикард Эстлер. Хафслунд стал сторонником социалистических идей и начал активно участвовать в деятельности социал-демократических и демократических социалистических организаций, будучи офицером.\n\nВ 998, в двадцать пять лет, Хафслунд вновь получил повышение по просьбе многих членов совета, считавших, что он останется верен республиканскому делу даже в случае масштабных беспорядков. Вместе с молодым стратегом Отто Греммерсеном он стал одним из ключевых грифонов в движении юных офицеров, преданных социал-демократической политике и революционным идеям – в полной противоположности старой гвардии, давно окопавшейся в грифоньей армии.\n\nХотя Хафслунд всё ещё остаётся довольно посредственным генералом, он уже стал одним из вестников нового движения в Республике, что вызвало конфликты со многими коллегами-генералами..."
 emerich_desc:0 "Вальтер Эммерих родился в Клубничном герцогстве, в городе Винтербелл, где должен был продолжить семейное дело. Однако у него были другие планы: в шестнадцать лет он попрощался с родителями и отправился вверх по реке Гриффкинг в Грифенхейм. Городская жизнь быстро разочаровала его, и он подумывал о возвращении домой, но вскоре после смерти Гровера IV вступил в республиканское подполье.\n\nЭммерих поддержал революцию и участвовал в штурме Императорского дворца вместе с другими республиканцами. Вскоре Кемерскай произвёл его в офицеры за проявленную храбрость. Многие, правда, считали, что это назначение было сделано ради поддержки радикальных республиканцев, которые видели в Кемерскае оппортуниста.\n\nЭммерих активно учился у коллег-офицеров во время первой и второй кампаний в Междуречье, но потерпел поражение в битве за Виннин от Эриха Эбонвинга. После этого он участвовал в Долгом походе и занялся политикой, став сенатором от Бренны благодаря протекции Кемерская, которому Эммерих фанатично предан, ведь именно он дал ему шанс на новую жизнь. На этой должности Эммерих остаётся и по сей день."
 rosewing_general_desc:0 "Николь Роузвинг, когда-то самая верная подруга Кемерская в борьбе с реакционизмом, родилась в 941 году в столице Энгривера, Грифинге.\n\nВ возрасте двадцати четырёх лет она вступила в императорскую армию и вскоре стала наставницей и товарищем Кемерская, когда тот чуть позже тоже присоединился к ней. Оба были убеждёнными сторонниками Гровера IV и его реформ, но также верили в радикальный республиканизм и демократию. Роузвинг, вечная прагматик, считала, что режим Гровера IV сделает революцию ненужной и что народ должен восстать лишь тогда, когда монархия станет упадочной и загнивающей. Однако с приходом к власти Гровера V она стала сторонницей революции, участвуя в мятеже императорской армии во время марша на Императорский дворец. Роузвинг участвовала в кампаниях в Энгривере и Катерине, а в конце 978 года была назначена официальным вице-президентом Кемерская.\n\nВпоследствии Роузвинг бежала на север вместе с Кемерскаем, но к тому моменту между ними накопилось множество разногласий о республиканской риторике и идеалах. В 995 году она была смещена с поста начальника штаба и вице-президента: Кемерскай назначил на эти должности Шнабеля Санглайдера, убеждённого республиканца, и Рейнхарда Сантейла, открытого ультраправого, но умелого генерала.\n\nРоузвинг была отправлена на север со значительной силой, чтобы сохранить мир, но вместо этого начала его подрывать. Её офицеры вскоре установили связи с клаудбьюрийцами и монархистами, а сама она занялась рейдами на республиканскую армию и склады. При этом Роузвинг следила, чтобы никто не нападал на города: любой солдат, нарушивший это правило, приговаривался к смертной казни. Так она оставалась «защищать мир» на севере в течение десяти лет и продолжает делать это по сей день."
 schnabel_desc:0 "Хотя Шнабель Санглайдер потерял глаз на службе славной Республике, он видел её падение в лапы социалистов, консерваторов и полевых командиров. Будучи вице-президентом с 995 по 1003 год и начальником штаба с 1003 года, Шнабель является одним из самых верных сторонников режима Александра Кемерская и демократических ценностей со времён революции 978 года.\n\nИдеалист по натуре, Санглайдер боролся за права народа с момента вступления в НРП в 975 году, где вскоре стал неофициальным лидером. В 978 году он пожал когти маршалу Кемерскаю и вместе с Рейнхардом Сантейлом и Николь Роузвинг провозгласил Республику Грифонов. Вместе с Сантейлом он вёл войска на Крону, где был тяжело ранен в глаз при штурме города. Медики вынесли его с поля боя, и он чудом выжил. Вернувшись в армию, Санглайдер увидел Крону в руинах: Сантейл разрушил город, мстя за преступления имперцев и ранения Санглайдера. Хотя Шнабель так и не оправился от потери глаза и был недоволен действиями Сантейла, он продолжил сражаться вместе с Кемерскаем за Республику. Вместе они ушли на север, где Санглайдер бился с яростью, недоступной многим другим грифонам.\n\nСегодня Шнабель «Одноглазый призрак» Санглайдер – закалённый в боях генерал, умелый тактик, обладающий значительным влиянием и готовый на всё ради защиты Республиканской мечты."
