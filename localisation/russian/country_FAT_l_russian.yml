 FAT_political_pragmatist:0 "Генрих Кингфезер"
 FAT_political_pragmatist_desc:0 "Если спросить гражданина республики о том, что сделал Генрих Кингфезер, один из ключевых грифонов страны за последние четыре года, многие не смогут ответить, даже несмотря на то, что у Генриха была обширная программа.\n\nГенрих Кингфезер родился в Грингейте. В Йеле он изучал экономику и юриспруденцию и не был очевидным сторонником республиканских идей, однако в ходе своей юридической практики стал одним из защитников республиканцев. В 978 году Кингфезер, изначально скептически относившийся к революции, всё же присоединился к Кемерскаю. Он активно пытался обеспечить республике международное признание, заключая сделки с Эквестрией и Речной Коалицией, но безуспешно. Ему удалось склонить общественность Герцланда на сторону республики, однако война была проиграна, и государство вынуждено было отступить на север.\n\nКингфезер не пошёл с остальными в Долгий марш, а сбежал в Скайфол, затем переселился в Фезеру и лишь оттуда вернулся в республику, когда её контроль над Клаудбьюри стал более-менее прочным. Из-за этого манёвра многие разочаровались в нём. До 1003 года он действовал в основном за кулисами, а затем стал заместителем Кемерская, сменив милитариста Шнабеля Санглайдера. На своём посту он столкнулся с неподчиняющимися военными, бандитами и хаосом в сельской местности. Чтобы противостоять этим проблемам, он изменил политику предшественника и подошёл прагматично, установив контакт с лидерами Клаудбьюри на государственном уровне.\n\nСумеет ли он добиться успеха в условиях нарастающего конфликта между местными и различными фракциями республиканцев? Или умрёт, имея все козыри в когтях, но не смелость их использовать?"
 FAT_political_idealist:0 "Шнабель Санглайдер"
 FAT_political_idealist_desc:0 "Шнабель Санглайдер – лидер гармонистского крыла НРП и убеждённый сторонник республиканской мечты и пан-грифонизма. Он родился в трущобах Фетизии и вступил в имперскую армию, чтобы выжить и заработать денег. Его зачислили в артиллерийскую бригаду под командованием Александра Кемерская, где он познакомился с идеями гармонии и республиканизма. Он быстро увлёкся ими и начал изучать книги об Эквестрии и Сикамеоне. Вместе с Кемерскаем участвовал в революции и отличился во время службы в национальной армии республики. После Марша он активно выступал за продолжение борьбы в Герцланде и соблюдение конституции. Став сенатором от Клаудбьюри, он основал гармонистское крыло НРП. Он беззаветно предан идеям республики и гармонии, а также является яростным милитаристом, что делает его одним из самых опасных грифонов в Клаудбьюри."

 veteran_of_the_long_march_trait:0 "Ветеран Долгого похода"
 veteran_of_the_long_march_trait_desc:0 "Этот генерал – ветеран Долгого похода, протяжённого и мучительного отступления, во время которого республиканская армия уходила на север через Герцланд, стараясь избежать столкновения с реорганизованными имперскими силами. Ни один офицер, переживший тот поход, не является избалованным штабным командиром: они прошли через самое пекло и привыкли к суровым условиям передовой."

