 FAT_republicanism_desc:0 "Правое крыло Национальной Республиканской Партии претерпело заметную эволюцию в ходе истории республики. Когда-то они были частью революционного движения и придерживались социал-демократических взглядов, но сейчас большая часть правящей партии республики поддерживает прагматичную политику, консервативную экономику и надлежащее представительство этнических клаудбьюрийцев в рядах НРП. Их внешняя политика направлена на оборону, внутренняя – на уступки и единение, а экономический курс – на стабильность и безопасность. Сейчас НРП-правые поддерживают совсем иные принципы, нежели революционеры 978 года, но это, конечно же, единственно правильный путь для республики."
 FAT_liberalism_desc:0 "Центристское крыло Национальной Республиканской Партии в основном состоит из приверженцев революции 978 года, сохраняя верность принципам республиканизма. Революционный пан-грифоний идеализм, экономическая социал-демократия и социальные программы, наряду с милитаристскими и антимонархическим взглядами характеризуют НРП-центр. Её верхушка в основном состоит из таких генералов, как Шнабель Санглайдер и Вальтер Эммерих, которые остаются верны Трём Принципам свободы, демократии и процветания для всех грифонов!"
 FAT_democratic_socialism_desc:0 "Левое крыло Национальной Республиканской Партии обрело влияние лишь в последние годы. Оно состоит из молодых, идеалистичных лидеров, и заявляет, что революционные принципы 978 года должны быть продолжены и перенесены на новый уровень. Фракция заявляет, что вместо социал-демократии и антикоммунистической внешней политики следует добиваться самоуправления рабочих и оттепели в отношениях со Скайнавией. Партия яростно выступает против старой гвардии Республики и за полное свержение культа личности Кемерская. Молодое и радикальное движение НРП-левых многие критикуют за их «авторитаризм» и «презрение к либералам»."
###National Focus###
 fatass_the_task_ahead_focus:0 "Древо фокусов агрессивной внешней политики"
 fatass_the_griffons_tutelage_focus:0 "Древо фокусов оборонительной внешней политики"
 FAT_aiding_the_generals:0 "Заговор против Кемерская"
 FAT_aiding_the_generals_desc:0 "Александр Кемерскай ничего не сделал за последние 30 лет, но всё равно сидит в своём президентском кресле и делает речи, в то время как его нация рушится вокруг него. Единственный способ остановить Кемерская и спасти нашу умирающую республику - помочь генералам на севере совершить военный переворот против его неспособного правительства."
 FAT_chaos_in_the_countryside:0 "Поддержать президента-маршала"
 FAT_chaos_in_the_countryside_desc:0 "Генералы бесчинствуют в пригороде и даже наши лояльные командиры не в силах остановить их. Похоже, что Республиканская Мечта скоро может разрушиться, если мы не будем осторожны в искоренении этого рака из нашей страны."
 FAT_support_from_the_natives:0 "Поддержка от клаудбьюрийцев"
 FAT_support_from_the_natives_desc:0 "Нам стоит получить поддержку от этнических клаудбьюрийцев, которые пострадали сильнее всех от режима Кемерская. Их монархия была свержена, а народу было дано небольшое представительство в герцландо-доминирующем правительстве. Хотя наши генералы тоже герцландцы, мы хотя бы заботимся о простых клаудбьюрцах!"
 FAT_support_from_fascists:0 "Сделка с фашистами"
 FAT_support_from_fascists_desc:0 "ГНРФ когда-то был одной из организаций, что были в союзе с нашим Президентом-Маршалом в битве против монархизма в Грифонии. Сейчас же мы наблюдаем совсем обратное: олигархическое правительство, с чем, конечно же, несогласны фашисты. Учитывая тот факт, что Сантейл ладит с ними, мы сможем стать лояльными союзниками в нашей битве."
 FAT_sway_the_old_guard:0 "Переманить старую гвардию"
 FAT_sway_the_old_guard_desc:0 "Старая гвардия сыта по горло постоянными неудачами Кемерская в попытках добиться революции, поэтому многие из них стали пацифистами и консерваторами. Мы должны сплотить силы, скептически относящиеся к нашему президенту-маршалу. Консерватизм станет основой для ультранационализма Сантейла и монархизма Роузвинг."
 FAT_bring_in_the_monarchists:0 "Вернуть монархистов-изгнанников"
 FAT_bring_in_the_monarchists_desc:0 "Ещё остались грифоны, что поддерживают Герцогство Клаудбьюри, которое изначально управляло этими землями. Пока многие наши последователи несогласны с этим, мы уверены, что туманные обещания о восстановлении монархии помогут нам завоевать множество лоялистов дома Плюменьяр."
 FAT_secure_lostgate:0 "Вглубь Лостгейта"
 FAT_secure_lostgate_desc:0 "Скоро предателей Республики увезут в Лостгейт, самый северный город в республике, что является бастионом правления этнических клаудбьюрийцев. С нашими связями с монархистами в изгнании и поддержкой среди клаудбьюрийцев, мы с лёгкостью можем защитить эту цель."
 FAT_secure_windford:0 "Контроль над Виндфордом"
 FAT_secure_windford_desc:0 "Виндфорд, возможно, наша сильнейшая позиция на севере. Однако остались ещё грифоны, что поддерживают правление НРП. Одним ударом мы можем устранить данные помехи и сокрушить местное правительство."
 FAT_move_south:0 "Двигаться на юг"
 FAT_move_south_desc:0 "Теперь, когда локальные правительства Кемерская на севере были свержены, мы можем сфокусироваться на продвижении на юг. Наши войска наверняка разобьют любые администрации на нашем пути. Дайте им знать, что Клаудбьюри будет следующим."
 FAT_crack_open_the_armories:0 "Захватить северные арсеналы"
 FAT_crack_open_the_armories_desc:0 "Может у нашего восстания и есть ресурсы, но у сил Кемерская более качественные орудия и тактики. Раз уж мы и так фактически контролируем север, нам стоит захватить северные арсеналы."
 FAT_some_choice_assassinations:0 "Пара точечных убийств"
 FAT_some_choice_assassinations_desc:0 "Множество новых командиров по-прежнему лояльны Кемерскаю. Это недопустимо! Мы должны избавиться от этих подхалимов любой ценой, тем самым укрепляя власть генералов Роузвинг и Сантейла."
 FAT_the_battle_for_cloudbury:0 "Битва за Клаудбьюри"
 FAT_the_battle_for_cloudbury_desc:0 "Наше движение закрепилось на севере, так что пришло время ударить по загнивающему режиму Кемерская и восстановить порядок в республике. Связи Роузвинг в монархическом движении и подпольные ультранационалистические организации Сантейла помогут начать открытое восстание против администрации Кемерская."
 FAT_victory_in_the_civil_war:0 "Республиканская победа"
 FAT_victory_in_the_civil_war_desc:0 "Мы вышли победителями в борьбе с генералами, теперь пришло время по-настоящему реформировать нашу Республику в правовое государство, что бы это ни значило для левой оппозиции или демократических пережитков. Пришло время перестроить и возродить наше движение."
 FAT_take_action:0 "Принять меры"
 FAT_take_action_desc:0 "Республиканская мечта жива! Мы обязаны твёрдо следовать нашим принципам и приложить все усилия для реформирования нации. За республику!"
 FAT_reform_the_military:0 "Реформировать армию"
 FAT_reform_the_military_desc:0 "Слишком долго армия оказывала чрезмерное влияние на местные органы власти. Хватит! Мы рассчитываем, что усилия по её реформированию положат конец этому и предотвратят дальнейшее ухудшение ситуации."
 FAT_republican_military_academy:0 "Республиканская военная академия"
 FAT_republican_military_academy_desc:0 "Первым шагом на пути к восстановлению квалификации наших военнослужащих станет строительство собственной военной академии. Это потребует времени, усилий и ресурсов, но перспективы выглядят весьма многообещающе."
 FAT_foreign_instructors:0 "Иностранные инструкторы"
 FAT_foreign_instructors_desc:0 "Мы не единственные, кто пытается бороться против монархий и диктатур в Грифонии. Приглашая иностранных военных инструкторов и экспертов, мы могли бы много узнать о том, как создать современную армию."
 FAT_set_standards:0 "Необходимые военные реформы"
 FAT_set_standards_desc:0 "Солдаты должны защищать всех нас, поэтому мы должны убедиться, чтобы только подходящим для этой задачи было разрешено вступить в ряды армии. Более высокий уровень военных стандартов гарантирует, что в наших рядах будут только дееспособные грифоны, даже если их, в целом, будет меньше."
 FAT_first_cadets:0 "Новые республиканские офицеры"
 FAT_first_cadets_desc:0 "Первые выпускники нашей академии теперь готовы занять свои посты. Больше не будет доминирования старой гвардии, новое поколение примет эстафету."
 FAT_solidify_support:0 "Обеспечить поддержку народа"
 FAT_solidify_support_desc:0 "Многие среди верховного командования видят нашу попытку реформ как предательство по отношению к старой гвардии. Мы должны разобраться с этими сторонниками теории заговора немедленно, иначе они могут распространить сомнения среди наших солдат."
 FAT_presidents_speech:0 "Тур по стране"
 FAT_presidents_speech_desc:0 "Президент-Маршал является отличным оратором. В своей поездке по стране он возродит республиканский дух среди нашего народа, в особенности простогрифонам на севере, которых склонили к себе порочные генералы, что мало заботятся о благосостоянии народа. Им нужно напомнить о республиканском деле!"
 FAT_sack_the_commanders:0 "Убрать главнокомандующих"
 FAT_sack_the_commanders_desc:0 "Пришло время разобраться с самыми старшими членами старой гвардии. Эти коррумпированные и нелояльные грифоны будут лишены своих должностей, чтобы они больше не смогли угрожать республиканцам."
 FAT_sack_the_commanders_tt:0 "Командиры §YНиколь Роузвинг§! и §YРейнхард Сантейл§! будут сняты со своих постов, §Rно полностью усмирены не будут§!."
 FAT_sack_the_commanders_tt2:0 "Командиры §YЙонас Хафслунд§! и §YОтто Гремменсен§! будут по-тихому устранены."
 FAT_sack_the_commanders_tt_suntail:0 "Командиры §YНиколь Роузвинг§! и §YМакс Уайтфезер§! больше не будут доступны."
 FAT_sack_the_commanders_tt_rosewing:0 "Командиры §YРейнхард Сантейл§! и §YХирон Штормфезер§! больше не будут доступны."
 FAT_a_new_army:0 "Новая армия"
 FAT_a_new_army_desc:0 "Мы преуспели в наших реформах и избавились от внутреннего кризиса. На горизонте виднеется еще много проблем, с которыми придётся разобраться, но республика победит. Обязательно."
 FAT_reform_the_chain_of_command:0 "Новая цепь командования"
 FAT_reform_the_chain_of_command_desc:0 "У нас есть новые генералы, но армейская бюрократия осталась прежней. Мы должны избавиться от неё, если не хотим, чтобы новые генералы стали такими же коррумпированными, как и старые. Мы не можем позволить случиться этому, поэтому проведём реформы."
 FAT_Democratic_Army:0 "В защиту Республики"
 FAT_Socialist_Army:0 "В защиту Республики"
 FAT_regain_trust:0 "Восстановить доверие"
 FAT_regain_trust_desc:0 "Пыль начинает оседать, а битва почти закончилась. Однако, хотя мы успешно обеспечили доверие и лояльность нашего генерального штаба, обычные солдаты по-прежнему не доверяют правительству. Мы должны вернуть их лояльность и доверие как можно скорее."
 FAT_loyality_to_the_republic:0 "Верность революции"
 FAT_loyality_to_the_republic_desc:0 "В каждом грифоне пылает революционное пламя, а их умы полны мечтами о республике. Взгляды одного грифона могут измениться, но мечта - не может. За республику!"
 FAT_loyality_to_the_president:0 "Верность президенту"
 FAT_loyality_to_the_president_desc:0 "Генералиссимус сбросил ярмо империи и до сих пор храбро вёл нас вперёд. Мы верим в нашего гордого Президента-Маршала!"
 FAT_plactate_the_generals:0 "Утихомирить генералов"
 FAT_plactate_the_generals_desc:0 "Реформирование нашего нелояльного военного ведомства бесполезно. Учитывая обстоятельства, было бы лучше подкупить и утихомирить наше высшее командование, чтобы обеспечить их временную лояльность. Мы сможем разобраться с их нелояльным отношением позже."
 FAT_first_general:0 "Усмирить Сантейла"
 FAT_first_general_desc:0 "Генерал Сантейл и его личная шайка воров и бандитов появились только по причине увольнения его с поста в 1003. Если мы предложим ему уступки в обмен на его лояльность, он наверняка станет важнейшим союзником Республики, каким он был во время Революции и Долгого Марта."
 FAT_offer_favors:0 "Немного Монет в нужные места"
 FAT_offer_favors_desc:0 "Сантейл всегда хочет извлечь максимум от ситуации, и не смотря на наш перевес военных сил, он всё ещё требует уступок. Он требует уважения и денег от правительства взамен на службу в будущем и жизни, что он потерял на Севере во время его кампании. Во имя мира, к сожалению, нам стоит уступить."
 FAT_second_general:0 "Усмирить Роузвинг" 
 FAT_second_general_desc:0 "Николь Роузвинг – достаточно популярный генерал, но, в отличие от Сантейла, она уже давно управляет севером. С её силами, включающими этнических клаудбьюрийцев, монархистов и недовольных Кемерскаем членов старой гвардии, Роузвинг располагает пугающим объёмом влияния и поддержки. Мы должны побыстрее решить эту проблему."
 FAT_the_worst_is_over:0 "Худшее позади"
 FAT_the_worst_is_over_desc:0 "Роузвинг и Сантейл возобновили свои обязанности в качестве генералов республики, а их армии оставили северную часть Клаудбьюри. С усмирённой армией теперь мы можем двигаться к более великим и более важным делам."
 FAT_Gearing_For_War_idea:0 "Широкая кампания военной пропаганды"
 FAT_gear_for_war:0 "Расширить военное производство"
 FAT_gear_for_war_desc:0 "Чтобы завершить революцию и вернуть Грифенхейм, мы должны значительно расширить нашу военную промышленность. Гражданской сферой можно пренебречь."
 FAT_war_propaganda:0 "Кампания военной пропаганды"
 FAT_liberty_or_death:0 "Всё ради мечты"
 FAT_bring_natives_into_the_party:0 "Пустить клаудбьюрийцев в партию"
 FAT_bring_natives_into_the_party_desc:0 "Обычно НРП была враждебна к этническим клаудбьюрийцам и их организациям по причине "их монархического уклона". Данная позиция оказалась необоснованной, поэтому нам необходимо поощрять вступление клаудбьюрийцев в партию. Герцландское господство должно подойти к концу!"
 FAT_demand_their_oaths:0 "Потребовать от них клятву"
 FAT_demand_their_oaths_desc:0 "Мы пошли на невероятные уступки Роузвинг и Сантейлу, и теперь пришло время им склонить головы перед президентом-маршалом и под триколором поклясться более никогда не совершать подобных варварских поступков."
 FAT_remove_troublesome_soldiers:0 "Разобраться с монархистами"
 FAT_remove_troublesome_soldiers_desc:0 "Худшие из солдат Роузвинг – монархистские фанатики – верны лишь династии неудачников Плюменьяр и должны быть уволены ради обеспечения лояльности и целостности армии. После чистки монархистов мы сможем обратить внимание на настоящих солдат, многие из которых сражались и умирали во время революции. Им нужно напомнить, за что они продолжают бороться."
 FAT_concessions_to_nationalist_groups:0 "Снять запрет с национал-революционеров"
 FAT_concessions_to_nationalist_groups_desc:0 "Грифоний Национальный Революционный Фронт, запрещенный в 1003 из-за теракта в Клаудбьюри, сотрудничает с реакционными генералами и теперь представляет серьезную угрозу нашему правительству. Если мы снимем запрет и сделаем уступки, мы убедимся, что они больше никогда не будут представлять угрозу нашей великой нации."
 FAT_pardon_the_raiders:0 "Амнистия рейдерам"
 FAT_pardon_the_raiders_desc:0 "Последнее из требований Сантейла - амнистия всех его грифонов. Нам стоит согласиться на амнистию всех, кроме худших из худших, с кем Сантейл обещал лично разобраться."
 FAT_remind_them_of_the_cause:0 "Республиканская военная пропаганда"
 FAT_remind_them_of_the_cause_desc:0 "Роузвинг и её солдатам нужно напомнить, за что они на самом деле сражаются. Иго Империи, от которого мы освободились, никогда не должно вернуться на нашу землю, и именно солдаты являются гарантией этого. За Республику!"
 FAT_crisis_averted:0 "Верная армия"
 FAT_crisis_averted_desc:0 "Воины помнят, кто разорвал цепи имперского гнёта. Они знают, кто повёл нас на север и вырвал надежду из пасти поражения. Это был наш доблестный президент-маршал! Теперь, когда армия реформирована и вновь осознала свой долг, она последует за ним к победе. Мы пройдём сквозь огонь ради президента Кемерская, чтобы его мечта стала явью!"
 FAT_war_propaganda_desc:0 "ТЫ хочешь видеть Клаудбьюри в руинах? В когтях монархистских предателей, которые будут грабить наши города, истреблять наших граждан, и промывать мозги нашим детям? Если ты не хочешь этого, и если ваша верность к Республике, которая дала нам демократию и свободу, чего-нибудь стоит, то записывайся на службу в ближайшем призывном пункте!""
 FAT_radicalize_the_party:0 "Поддержать Левое Крыло НРП"
 FAT_radicalize_the_party_desc:0 "Годами ранее, до того, как Кемерскай отменил конституцию, Народная Социалистическая Партия сражалась вместе с республиканцами в борьбе за великую Грифонию. Они были правы - единственный путь к Гармонии - через социалистическую демократию, которая даст рабочим мир, землю, и хлеб."
 FAT_takeadvantageofthechaos:0 "Наследие Народной Социалистической Партии"
 FAT_takeadvantageofthechaos_desc:0 "Народная Социалистическая Партия сыграла ключевую роль в создании Республики и её принципов, сотрудничая с Кемерскаем против монархистов юга. Хоть и некоторые их члены убежали в Скайнавию с лидером партии, Аспером Сиклкло, многие социалисты в Республике не покинули нас ради Скайнавии, и они могут быть склонены к нашему делу."
 FAT_appeasethenatives:0 "Успокоить клаудбьюрийцев"
 FAT_appeasethenatives_desc:0 "Религия, обычаи и идеи клаудбьюрийцев чужды выходцам из Герцланда, однако нельзя игнорировать большую часть населения страны. Лидеры клаудбьюрийцев должны получить такие же позиции, как и герцландские. Мы пообещаем им это ради политической поддержки."
 FAT_liberty_or_death_desc:0 "Защита Республики в бою от прихотей монархистов - борьба за правое дело! Все, кто может бороться, должен бороться за свободу, потому что единственная альтернатива свободе - смерть!"
 FAT_defend_the_nation:0 "Оборонительная внешняя политика"
 FAT_defend_the_nation_desc:0 "Лучшее нападение – это оборона. Чтобы защитить нашу мечту, мы не должны безрассудно бросаться на Грифенхейм. Напротив, необходимо укрепить границу и заключить международные союзы, чтобы противостоять монархистской угрозе."
 FAT_focus_on_the_civilian_sphere:0 "Упор на гражданскую промышленность"
 FAT_revive_the_nrp_welfare_programs:0 "Расширить социальную политику НРП"
 FAT_revive_the_nrp_welfare_programs_desc:0 "Программы социального обеспечения Кемерская, хоть и добились больших успехов во время Революции 978 года, не обновлялись и не расширялись в соответствии с современным миром. Правительство Санглайдера предложило радикальный план по реструктуризации трат нашего правительства, где больше денег будет уходить на зарплаты гражданам и солдатам Республики."
 FAT_cut_spending:0 "Закончить социальную программу НРП"
 FAT_cut_spending_desc:0 "Правительство тратит слишком много как на армию, так и на социальное обеспечение. То, что правительство влезает в долги ради очередного неудачного вторжения в Грифенхейм - легкомысленно."
 FAT_focus_on_the_civilian_sphere_desc:0 "Правительство должно направить ресурсы в гражданскую сферу и развивать нашу промышленность и инфраструктуру, вместо того чтобы бесконечно наращивать военный потенциал."
 FST_free_the_prisoners:0 "Освободить заключённых"
 FST_free_the_prisoners_desc:0 "Многие заключённые режима Кемерская сидят за мелкие преступления, такие как неподчинение приказам, бандитизм и рейдерство. Мы должны освободить их, чтобы они сражались в нашей армии. Ну и что, что они совершали аморальные действия? Нам нужен каждый грифон."
 FST_consolidatemilitaryrule:0 "Укрепить военную власть"
 FST_consolidatemilitaryrule_desc:0 "Мы сделали это! Кемерскай мёртв, и мы создали военный режим, который принесёт порядок и безопасность в республику, заражённую гармонической бюрократией. Да будет военная хунта! Слава Сантейлу и Роузвинг!"
 FST_loot_the_homes:0 "Разграбить дома"
 FST_loot_the_homes_desc:0 "Мы нашли многие дома, заводы и школы, которые были оставлены беженцами, бежавшими на юг. Мы должны получить с этого прибыль и использовать дома для гражданского производства."

 FST_thepowerstruggle:0 "Борьба за власть"
 FST_thepowerstruggle_desc:0 "Кто вообще мог подумать, что два генерала мирно объединятся и построят стабильное военное правительство? Война только закончилась, а Роузвинг и Сантейл уже отдаляются друг от друга. Грядёт жестокая борьба за власть."

 FST_victory_for_suntail:0 "Новый маршал"
 FST_victory_for_suntail_desc:0 "Республика устояла перед заговором конституционалистов Роузвинг! Она и ей подобные осмелились заявлять, что Гровер может быть ответом на проблемы Грифонии. То же твердили и предатели-консерваторы 970-х годов, возводя на трон Гровера IV. Мы устранили и их, и предателя Александра Кемерская — а значит, теперь ничто не мешает нам строить истинную Национальную Республику."

 FST_rally_the_old_revolutionaries:0 "Возродить коалицию 978 года"
 FST_rally_the_old_revolutionaries_desc:0 "Консерваторы и либералы, роялисты и реакционеры. Все они объединились в 978 году, чтобы положить начало президентству Кемерская. А теперь они восстановят истинный роялизм в Грифонии. Мы не забыли про идеалы свободы! Маршал Роузвинг – не предательница, а освободительница, помнящая достижения прошлого."

 FST_the_perfect_scapegoat:0 "Уничтожить культ"
 FST_the_perfect_scapegoat_desc:0 "Республиканизм. Это слово вполне оправданно стало ругательством. Кемерскай и прагматики, взявшие власть в 978 году, позволили Клаудбьюри увядать, а сами стали деспотичной и авторитарной хунтой. Наш Клаудбьюри откажется от опорочивших себя целей 978 года."

 FST_purge_the_traitors:0 "Чистка предателей"
 FST_purge_the_traitors_desc:0 "На нашей земле много предателей, которые поддерживают отсталый режим Кемерская. Мы должны уничтожить сопротивление в зародыше. Убейте их всех."
 FST_new_dawn_for_the_republic:0 "Новый рассвет Республики"
 FST_new_dawn_for_the_republic_desc:0 "Старой гвардии вот-вот не будет, и теперь мы можем начинать внедрять изменения, которые спасут эту умирающую республику. Долой коррумпированных олигархов и капиталистов! Вперед, патриотический народ, верный лишь Сантейлу! Мы проштурмуем Грифонию и принесем революцию во имя мира во всем мире!"
 FST_seizethefarmland:0 "Изъять фермы"
 FST_seizethefarmland_desc:0 "Владельцы ферм и плантаций Республики понятия не имеют, чем они занимаются. Их фермы плохо ведутся, а их производство плохо распределяется. Мы это исправим, изъяв землю и распределив её по справедливости."
 FST_restoreorder:0 "Порядок в селах"
 FST_restoreorder_desc:0 "Правительство Кемерская позволяло бандитам и хулиганам, спонсируемыми Скайнавией, делать в селах то, что они захотят. К счастью, у нашего правительство есть однозначное решение этой насущной проблемы. Вместо избегания проблемы, в отличие от слабаков из НРП, мы просто введем войска и начнем охотиться на них. Этим террористам не будет никакой пощады!"
 FST_mass_conscription:0 "Тотальная мобилизация"
 FST_mass_conscription_desc:0 "Каждый грифон должен хотеть сражаться за Отечество в великой борьбе против Империи Грифонов. Обязательная служба будет введена, чтоб каждый грифон был обучен войне и готовый сражаться за наше выживание и наше будущее."

 FST_the_promise_of_prosperity:0 "Обещание процветания"
 FST_the_promise_of_prosperity_desc:0 "Идеология фашизма и ультранационализма юга и наш национальный республиканизм не одно и то же. Мы знаменуем собой славное возрождение духа грифоньего народа, а программы благосостояния Кемерская пользуются огромной популярностью. Мы продолжим его популистский курс!"

 FST_work_for_the_republic:0 "Работа на благо республики"
 FST_work_for_the_republic_desc:0 "Благополучие лишь рождает самодовольство в народе, уже и так запятнанном алчностью и жестокостью. Мы будем продвигать идею искупления через труд, чтобы наш великий народ мог служить своей нации и её идеалам. Мы пожнём плоды этой программы, когда Грифония будет нашей!"

 FST_cult_of_the_two_marshals:0 "Культ двух маршалов"
 FST_cult_of_the_two_marshals_desc:0 "Александр Кемерскай был одним из величайших лидеров в истории Грифонии, пока не был убит предательницей Николь Роузвинг и её последователями-монархистами. Хотя Сантейл может иметь с ним личные и политические разногласия, мы должны чтить грифона, возглавившего нас в трудные годы. Пусть предательница страдает вечно."
 FST_a_false_marshal:0 "Уничтожить наследие Кемерская"
 FST_a_false_marshal_desc:0 "Нет необходимости реабилитировать предателя Александра Кемерская. Он разрушил нашу республику изнутри и отсрочил покорение наших законных земель на три десятилетия. Слабый и переоценённый полководец, а ещё худший президент, не заслуживает места ни в учебниках истории, ни в песнях о победе."
 FST_nationalization_program:0 "Начать национализацию"
 FST_nationalization_program_desc:0 "Частные компании, олигархи и иностранные конгломераты слишком сильно влияют на нашу страну. Мы должны национализировать военные компании и промышленные комплексы, для того, чтобы ими более эффективно могло управлять государство."
 FST_no_mercy:0 "Пускай Борей разберется"
 FST_no_mercy_desc:0 "Жизнь бандита почти ничего не стоит, и все наши солдаты должны это знать. У нашей армии такой девиз - "Убей их всех, пускай Борей разберется". Бандитская угроза будет уничтожена, а в сёла вернётся мир."
 FST_mass_mobilization:0 "Мобилизовать промышленную отрасль"
 FST_mass_mobilization_desc:0 "Если мы хотим победить декадентную монархию в Грифенхейме, нам нужно начать тотальную мобилизацию. Не будет ни одного грифона, который не будет либо работать на заводе ради Отечества, либо воевать до самой победы над южной угрозой."
 FST_sole_legal_party:0 "Усилить ГНРФ"
 FST_sole_legal_party_desc:0 "У ГНРФ мало легитимности в нашей стране, так как многие поддерживают парламентаризм НРП или конституционную монархию Роузвинг. Мы должны усилить положение правительства и его пропаганду. Проведение очередных выборов, даже при запрете многих партий, также усилит нашу легитимность и веру в Республику."
 FST_purge_monarkiddies:0 "Ликвидировать монархистов"
 FST_purge_monarkiddies_desc:0 "Монархисты Империи и герцогства Клаудбьюри нам не друзья. Может, они нас и поддержали в гражданской войне, но они империалистические, олигархические и декадентные псины, и им не место в нашем великом обществе."
 FST_revive_the_republican_struggle:0 "Возродить борьбу за Республику"
 FST_revive_the_republican_struggle_desc:0 "После прихода к власти военной хунты, многие в стране начали сомневаться в республиканских идеалах и начали поддерживать изоляционизм и регионализм. Они не понимают необходимости в Грифоньей Республике, которая будет сильным, националистическим государством для всех грифонов. Мы должны возродить веру народа в борьбу за Грифенхейм."
 FST_unwavering_patriotism:0 "Непоколебимый патриотизм"
 FST_unwavering_patriotism_desc:0 "Республика - основа нашего существования. Каждый живущий в ней грифон защищает ценности безопасности, национализма и процветания."
 FST_a_new_dawn:0 "Да будет Республика!"
 FST_a_new_dawn_desc:0 "Мы решили все проблемы Республики. Теперь, пора расширить наш взор и наконец пойти в бой против олигархической дегенеративной империи, которая так долго держала нас в плену. Больше никогда коррумпированная монархия не будет нас угнетать!"
 FST_the_task_ahead:0 "Что дальше?"
 FST_the_task_ahead_desc:0 "На нашем пути одна темнота и многие препятствия. Мозги граждан промыты монархистской пропагандой, крестьяне скорее готовы сражаться за своих поработителей, а монархи изо всех сил придерживаются старого порядка. Но что бы нам не мешало, мы выстоим, и мы будем бороться за Сантейла и за Республику!"
 FST_pan_griffonian_cause:0 "Союз с республиками"
 FST_pan_griffonian_cause_desc:0 "Мы должны объединиться с грифоньими республиками, сформировав международное движение против коррумпированных монархий континента. Сейчас необходимо наладить дипломатические отношения, но что произойдёт после взятия Грифенхейма – пока неясно, но без предательств обойтись никак не выйдет."
 FST_kill_meyer:0 "Выплатить старый долг"
 FST_kill_meyer_desc:0 "Предательство Майера во время контрреволюции едва не стоило республиканской армии всего, и лишь чудом мы пережили Долгий поход и сохранили искру сопротивления против Империи. Сантейл не забыл этого – и уж точно не простил."
 FST_kill_sickleclaw:0 "Подходящее наказание за дезертирство"
 FST_kill_sickleclaw_desc:0 "Кемерскай был достаточно глуп, чтобы не разобраться с коммунистами быстро и безжалостно, когда у него была возможность, и в результате республика пережила ещё одно унижение, когда экипажи подлодок дезертировали, а грязные комми обосновались на Дальнем севере. Сантейл же, напротив, прекрасно знает, как поступать с подобными им."
 FST_a_republican_coalition:0 "Международная коалиция"
 FST_a_republican_coalition_desc:0 "Мы должны создать международный союз с другими ультранационалистами и республиканцами. Это единственный способ уничтожить декадентную монархию и гармонию."
 FST_finish_revolution:0 "Прикончить декадентную Империю"
 FST_finish_revolution_desc:0 "Пора. Национальный Революционный Фронт мобилизовался. Наша промышленность в прекрасной форме, а все возможные рабочие поднимают военную индустрию. Наши грифоны готовы к бою. У всех есть оружие и каждый готов дать бой имперской чуме в случае, если она когда либо достигнет основных земель Республики. Это последний бой - вперед, бравые республиканцы!"
 FST_tricolor_over_griffenheim:0 "Триумф воли"
 FST_tricolor_over_griffenheim_desc:0 "Мы смогли! Монархисты повержены, и Имперский Город теперь в когтях Сантейла. Мы должны распространить наши реформы на имперские земли и интегрировать Герцланд в Грифонью Республику полностью. Это великий день для нашего народа. Слава Сантейлу!"
 FST_retribution:0 "Правосудие богов"
 FST_retribution_desc:0 "Грифонью Республику убила контрреволюция, но наш Президент-Маршал Сантейл отстроил то, что было раньше. Теперь, пора вспомнить, что нас уничтожил вероломный Архонт Эрос VII и его монарх-марионетка. Они заплатят за свои преступления. Пришла пора мести."
 FST_a_warlord_in_griffenheim:0 "Военачальник в Грифенхейме"
 FST_a_warlord_in_griffenheim_desc:0 "Рейнхард Сантейл, бесстрашный военачальник Виндфорда, отобрал власть у слабого режима Александра Кемерская, и теперь он достиг того, о чем клаудбьюрийские крысы и не мечтали. Грифенхейм ныне в когтях истинных республиканцев, и только Борей теперь может спасти монархистов, церковь и социалистическую погань от верной погибели."
 FST_the_three_principles_of_the_griffons:0 "Три Принципа Национальной Республики"
 FST_the_three_principles_of_the_griffons_desc:0 "Принципы эры Кемерская отсталы и архаичны. Принципам демократии и свободы нет места в Республике, низложенной бесчисленными врагами, и имеющим бессмысленное демократическое правительство, полное коррупции. Безопасность, Национализм и Процветание будут нашими новыми принципами."
 FST_security:0 "Принцип безопасности"
 FST_security_desc:0 "Принцип I - Безопасность - вера в то, что каждый грифон в нашей великой Национальной Республике должен быть свободен от угроз как снаружи, так и извне. Разведывательные министерства, чистки подрывных и оппозиционных партий и коалиция с ультраправыми силами Герцланда должны окончательно решить эту извечную проблему и обеспечить процветание грифонам."
 FST_drag_out_the_monarchists:0 "Уничтожить монархистов"
 FST_drag_out_the_monarchists_desc:0 "Монархисты и дворяне выживают лишь обманом, подлостью и взятками, пока крестьяне и народ страдают от хватки тиранов. Эти оставшиеся дворяне и монархисты должны быть искоренены, чтобы их грязная идеология не влияла на умы особо впечатлительных грифонов."
 FST_strike_at_the_socialists:0 "Удар по социалистам"
 FST_strike_at_the_socialists_desc:0 "Ах, социалисты. Хотя их экономические цели могут быть такими же, как у нас - справедливость для всех грифонов, но их политические методы, то есть насильственная революция и репрессии против простого народа, слишком опасны. Эти предатели будут изгнаны из нашей славной республики, и народ познает мир."
 FST_local_allies:0 "Союзники в Герцланде"
 FST_local_allies_desc:0 "Президент-Маршал Сантейл, в связи с нынешней ситуацией, не совсем благоприятной для наших национал-республиканцев, объявил о встрече с многочисленными крайне правыми организациями. Среди приглашенных - Годфрид Херен из Фетизии и Дитрих Мах из Грайфенмаршена. Хотя Маха будут хвалить как верного союзника, мы не ожидаем, что Херен выживет."
 FST_expand_intelligence_ministries_desc:0 "Предатели прижились в каждом уголке нашей Национальной Республики. В то время как Кемерскай предпочел бы отпустить этих предателей и позволить им продолжить предавать, мы не такие как он - они будут выслежены и уничтожены."
 FST_expand_intelligence_ministries:0 "Агенты Национальной Республики"
 FST_archon_sucks_suntail_rules:0 "Сократить архонат"
 FST_archon_sucks_suntail_rules_desc:0 "Архонат злоупотреблял своей мирной религиозной властью. Они снова и снова поддерживали монархизм и полностью потерпели неудачу в любых попытках фактически следовать доктрине Богов. Возможно, нам следует напомнить новым архонтам, какими должны быть истинные полномочия их организации."
 FST_the_perfect_dictatorship:0 "Великодушный диктатор"
 FST_the_perfect_dictatorship_desc:0 "Сформирована "Совершенная Диктатура", где все грифоны будут жить в процветании, мире и стабильности под властью великодушного лидера. Усилия Сантейла освободят республиканских граждан от бремени коррумпированной демократии и действительно принесут эпоху славы."
 FST_nationalism:0 "Принцип национализма"
 FST_nationalism_desc:0 "Принцип II - Национализм - вера в то, что каждый грифон должен гордиться своей страной и своей расой и вместе противостоять угрозам. Алмазные псы, коварные звери Маара, которые встали на сторону Императора против республиканцев, должны быть защищены от самих себя, а народ должен быть защищен от иностранного влияния!"
 FST_griffonia_for_the_griffons:0 "Грифония для грифонов"
 FST_griffonia_for_the_griffons_desc:0 "Хотя лозунг "Грифония для грифонов" обычно рассматривается как выступления против пони, Сантейл уважает пони и их магическое и технологическое мастерство. Однако алмазные псы, которые облизывают сапоги династии Гроверов и убивают каждого республиканца, которого они могут найти ради своих хозяев, должны быть отделены от великого народа грифонов."
 FAT_reign_in_the_dogs:0 "Контроль над псами"
 FAT_reign_in_the_dogs_desc:0 "Граф Бронзхилла и его алмазные псы были и остаются величайшими союзниками Императора в Грифенхейме. Пришло время мести, и псы, которые поддерживали правление императора, будут изгнаны обратно в Алмазную Гору! Со знатью поступят по справедливости, а простым псам будет позволено остаться – хотя и под присмотром грифоньего рода."
 FST_prosperity:0 "Принцип процветания"
 FST_prosperity_desc:0 "Принцип III - Процветание - вера в то, что верные Президенту-Маршалу грифоны должны быть вознаграждены, выведены из нищеты и обеспечены всеми благами. Общественное благосостояние, захват монархических земель и перераспределение дворянских владений будут характеризовать нашу политику в отношении благосостояния народа."
 FST_shatter_the_oligarchs:0 "Уничтожить олигархов"
 FST_shatter_the_oligarchs_desc:0 "Олигархия должна быть ликвидирована, а коррумпированное дворянство уничтожено. Народ и государство, а не ленивые бизнесгрифоны и декадентские дворяне, которые думают только об эксплуатации, должны контролировать плоды своего труда"
 FST_land_for_the_people:0 "Земля для народа"
 FST_land_for_the_people_desc:0 "Теперь, когда национал-республиканцы контролируют бывшие земли коррумпированной знати, необходимо перераспределить их лояльным гражданам Республики, которые помогли нам во Второй Революции и в разрушении правительства Кемерская. Пришло время выполнить наши обещания и провести земельную реформу по всей Грифонии!"
 FST_the_march_of_industry:0 "Перенос промышленности" 
 FST_the_march_of_industry_desc:0 "Промышленность должна быть перенесена в Герцланд и на север Клаудбьюри! В каждом уголке Грифонии должна быть собственная фабрика, а старые архаичные системы земледелия должны быть отменены в пользу действительно модернизированной экономики, где каждый грифон может по-настоящему внести свой вклад в свое великое общество."
 FST_no_stone_unturned:0 "Перевернуть все камни"
 FST_no_stone_unturned_desc:0 "Под горами, равнинами и морями Грифонии находятся огромные объёмы ресурсов. Они, безусловно, пригодились бы в когтях народа и Национальной Республики, так что пойдем, как смелые первооткрыватели прошлого, и завоюем эти ресурсы во благо Грифонии и Национальной Республики."
 FST_towards_unification:0 "Время пришло"
 FST_towards_unification_desc:0 "Мы контролируем Сердце Империи, алмазные псы укоренились в нашей нации, а старые остатки Империи Грифонов уничтожены, пришло время перейти к новым горизонтам - скоро вся Грифония станет гордой и преданной под управлением Сантейла."
 FST_the_lake:0 "Центр"
 FST_the_lake_desc:0 "Грифонстоун - это сердце всего народа грифонов, и хотя он, конечно, не такой влиятельный и прекрасный, как это было в древние времена, по-прежнему важно, чтобы наше правительство освободило колыбель грифонов от монархических тиранов. Республиканизм придёт на юг!"
 FST_sack_what_remains:0 "Разграбить Грифонстоун"
 FST_sack_what_remains_desc:0 "Грифонстоун является символом моральной гнили и разложения грифоньей культуры и монархической системы. Возможно, лучше просто избавить город от страданий от разлагающихся остатков потерянного идола Борея и монархии, и восстановить новый Грифонстоун с нуля, без поклонения династии Гроверов или провальных остатков древней культуры грифонов."
 FST_the_heart_of_griffonkind:0 "Индустриализировать побережье озера"
 FST_the_heart_of_griffonkind_desc:0 "Побережье озера должно быть доведено до стандартов современной Грифонии, а монархические и почти феодальные структуры Верении должны быть упразднены. Индустриализация, добыча полезных ископаемых и программы социального обеспечения Кемерская обеспечат подъем населения на берегу озера."
 FST_core_lakes:0 "Триколор над центром"
 FST_core_lakes_desc:0 "Центральная Грифония была освобождена от отсталых и вредных традиций, которые так долго держали её народ разделенным и угнетенным. Эти грифоны теперь могут занять свое законное место в республике и принять свою истинную нацию."
 FST_the_west:0 "Аквелийцы"
 FST_the_west_desc:0 "Грифоны Запада долго боролись против своих монархов, но, в целом, безуспешно. Пора нам вмешаться и помочь им."
 FST_the_trade_cities:0 "Национализировать торговые компании"
 FST_the_trade_cities_desc:0 "Скайфол и другие торговые города превратились в оплоты реакции и вырождения, а их богатства лежат в карманах олигархов. Мы должны изъять их и использовать на благо нации."
 FST_greifwald_oil_fields:0 "Чёрное золото Аделарта"
 FST_greifwald_oil_fields_desc:0 "Нефть, добываемая в Аделарте, является ценным ресурсом. Однако промышленное оборудование на месторождениях устарело. Если мы модернизируем существующие скважины и начнём разрабатывать новые, то получим больше топлива для армии, авиации и флота."
 FST_core_west:0 "Триколор над западом"
 FST_core_west_desc:0 "В Аквелии всегда было много сторонников республиканских идей. Недавно они скинули прогнившую монархию и теперь готовы идти вместе с нами в светлое будущее."
 FST_the_south:0 "Юг"
 FST_the_south_desc:0 "Жители юга всегда смотрели на наши дела в Герцланде с скептицизмом. Сейчас мы в состоянии убедить их в ошибочности этой позиции."
 FST_destroy_neutrality:0 "Сокрушить монархистов"
 FST_destroy_neutrality_desc:0 "На юге полно тех, кто считает, что свой монарх, каким бы слабым и разложившимся грифоном он ни был, лучше, чем Республика. Сейчас мы способны убедить их в обратном. Смерть монархии! Слава грифонам!"
 FST_destroy_false_fascists:0 "Предатели"
 FST_destroy_false_fascists_desc:0 "Сейчас уже очевидно, что Биколини и его подручные совершенно не способны осознать происходящее. Они, как и раньше, цепляются за независимость своего клочка земли, сопротивляясь объединению грифонов."
 FST_core_south:0 "Триколор над югом"
 FST_core_south_desc:0 "Теперь, когда местные царьки разгромлены, грифоны юга присоединились к нам!"
 FST_the_frontier:0 "Фронтир"
 FST_the_frontier_desc:0 "Земли Востока слабо обжиты и опасны. Однако, мы должны найти в себе силы и смелость освободить этих грифонов от угнетателей. Во имя Республики!"
 FST_the_gryphus_port:0 "Порты Грифуса"
 FST_the_gryphus_port_desc:0 "Теперь, когда порты Грифуса наши, у нас есть связь с юго-востоком Республики. У нас также есть возможность расширить местные верфи, что станет хорошим подспорьем для нашего флота."
 FST_the_new_breadbasket:0 "Индустриализация Фронтира"
 FST_the_new_breadbasket_desc:0 "Нация нуждается в мощной индустриальной экономике. С новыми технологиями, мы можем индустриализировать и сельское хозяйство. Мы не должны отставать от прогресса."
 FST_core_frontier:0 "Триколор над Фронтиром"
 FST_core_frontier_desc:0 "Восточные грифоны теперь свободны и готовы к становлению частью нашей нации. Вместе мы вступаем в эпоху гордости и процветания."
 FST_justice:0 "То, что Кемерскай так и не смог сделать"
 FST_justice_desc:0 "Наконец-то Республика объединила всех грифонов на континенте, и одолела жадность и тиранию. Кемерскай раньше стремился к этому, но не имел сил сделать. А Рейнхард Сантейл смог, за что мы благодарны ему."
 
 ### SUNTAIL ENDGAME ###
 FST_the_clock_is_ticking:0 "Часы тикают"
 FST_the_clock_is_ticking_desc:0 "Угроза здоровью открыла президенту-маршалу глаза на недостатки его режима. Его советники - склочные грифоны, желающие лишь стать его преемниками, а большая часть народа с радостью встретит вести о его смерти.\n\nНа этот раз Сантейл не закроет глаза на собственные недостатки."
 FST_possibilities_decreasing:0 "Возможности тают..."
 FST_possibilities_decreasing_desc:0 "Не в первый раз Рейнхард Сантейл оказывается в окружении предателей и стервятников. Грифоны, которым он доверял, оказались оппортунистами, а якобы побеждённые враги снова подняли головы. У Сантейла мало вариантов, но у него есть воля, которая позволит одержать победу над более слабыми грифонами. И он не потерпит неудачи."
 FST_regrets_mounting:0 "...сожаления растут"
 FST_regrets_mounting_desc:0 "Близость к смерти позволила президенту-маршалу взглянуть на мир с новой перспективы. Старые воспоминания преследуют его, и Сантейл думает обо всех совершенных им ошибках, о друзьях, которых ему пришлось похоронить на пути к объединению Грифонии. Сперва Сантейлу придётся разобраться в своей жизни и оценить свои ошибки."
 FST_the_president_marshal_speaks:0 "Поговорить с народом Грифонии"
 FST_the_president_marshal_speaks_desc:0 "Сантейл никогда не был хорошим оратором, но отчаянные времена требуют отчаянных мер. Президент-маршал выступит с публичной речью, которая будет передана во все уголки страны по радио и с помощью газет. В ней он определит курс действий хрупкой Национальной Республики."
 FST_an_eternal_president_marshal:0 "Вечный президент-маршал"
 FST_an_eternal_president_marshal_desc:0 "Рейнхард Сантейл решил остаться у власти на неопределенный срок и лично назначить своего преемника, а не оставлять выбор в этом важнейшем вопросе на откуп массам."
 FST_silence_the_naysayers:0 "Заткнуть скептиков"
 FST_silence_the_naysayers_desc:0 "Фашист, тиран, мясник, преступник: враги Национальной Республики просто извергают из себя эти слова, когда они слышат голос президента-маршала Сантейла и считают, что он слишком далеко. Пришло время напомнить этим предателям о цене измены."
 FST_name_a_successor:0 "Назвать преемника"
 FST_name_a_successor_desc:0 "Хотя Сантейл уйдёт в отставку лишь по собственному желанию, мы не можем допустить ещё одного периода замешательства и хаоса: пришло время выбрать преемника. В случае смерти, недееспособности или же отставки президента-маршала место Сантейла займёт его самый доверенный подчинённый."
 FST_the_thousand_year_republic:0 "Тысячелетняя республика"
 FST_the_thousand_year_republic_desc:0 "Национальная Республика стабилизировалась, и наша нация стала сильнее, чем когда-либо прежде. Теперь Сантейлу можно откинуться на спинку стула и окинуть взором своё наследие." #This needs improvement
 FST_crush_regionalism:0 "Покончить с регионализмом"
 FST_crush_regionalism_desc:0 "Принцип национализма относится и всегда должен относиться исключительно к пан-грифоньему национализму. Сепаратизм, регионализм и прочие вещи являются злейшими врагами нашей Национальной Республики. Любое издание, пропагандирующее регионализм, будет силой закрыто. Регионалистская агитация будет рассматриваться как подстрекательство к мятежу."
 FST_the_riverpony_debate:0 "[GetFSTRiverponyDebateName]"
 FST_the_riverpony_debate_desc:0 "[GetFSTRiverponyDebateDesc]"
 FST_the_riverpony_debate_firmscow:0 "Республики-побратимы"
 FST_the_riverpony_debate_firmscow_desc:0 "Мы очень рады тому факту, что отныне Речные Земли объединены под властью Национальной Республики, что очень похожа на нашу собственную! Мы должны немедленно пригласить их в нашу реформированную версию Республиканского Пакта, чтобы вместе противостоять врагам безопасности, национализма и процветания!"
 FST_the_riverpony_debate_nofirmscow:0 "Закрыть границы"
 FST_the_riverpony_debate_nofirmscow_desc:0 "Речные Земли укрывают врагов Национальной Республики под лозунгами вроде "защиты беженцев" и "предоставления политического убежища". Мы должны закрыть наши границы для речных пони и активно выслеживать тех, кто пытается избежать нашего правосудия."
 FST_continue_the_anti_clerical_campaign:0 "Продолжить антиклерикальную кампанию"
 FST_continue_the_anti_clerical_campaign_desc:0 "Хотя вера сама по себе не является преступлением, централизованная религия всегда будет представлять угрозу для Национальной Республики. Она пропагандирует верность не нации, а церкви, которая отделена от государства. Мы продолжим антиклерикальную политику и примем новые законы, направленные на искоренение тайных религиозных движений."
 FST_new_archons_for_a_new_republic:0 "Новые архонты для новой республики"
 FST_new_archons_for_a_new_republic_desc:0 "Хотя исторически архонт поддерживал мерзкую и упадочную монархию, это не всегда должно быть правилом. Если мы назначим лояльных Национальной Республике архонтов, то сможем соединить силу религии с принципом национализма."
 FST_a_portrait_in_every_home:0 "Портрет в каждом доме"
 FST_a_portrait_in_every_home_desc:0 "Президент-маршал Сантейл, ты - спаситель грифоньего рода.\nТы - величайший грифон мира.\nПрезидент-маршал Сантейл, ты - маяк процветания.\nТы - великая стена, что держит нас в безопасности.\nСантейл, Сантейл! Твой бессмертный дух будет вести нас вечно.\nМы победим монархизм и добьёмся возрождения Пан-Грифонии!"
 FST_end_the_reorganisation_process:0 "Завершить процесс реорганизации"
 FST_end_the_reorganisation_process_desc:0 "Пришло время завершить реорганизацию Национальной Республики. Президент-маршал больше не может править без согласия простых грифонов. Мы создадим законодательный орган и назначим комиссию, которая обеспечит порядок на выборах, после чего Рейнхард Сантейл уйдёт в отставку в пользу всенародно избранного преемника."
 FST_call_a_pan_griffonian_congress:0 "Созвать пан-грифоний конгресс"
 FST_call_a_pan_griffonian_congress_desc:0 "По мнению мыслителей до эпохи Сантейла, разделение законодательной и исполнительной власти было ядром республиканского правительства. Хотя Сантейл подтверждает главенство исполнительной власти, после объединения Грифонии мы должны созвать конгресс патриотов, чтобы помочь нам в деле законотворчества и повысить легитимность Национальной Республики в глазах народа."
 FST_national_electoral_commission:0 "Сформировать национальную избирательную комиссию"
 FST_national_electoral_commission_desc:0 "Чтобы провести выборы преемника Сантейла, мы создадим комиссию из экспертов, что непоколебимо верны трём принципам. Они оценят и проверят каждого кандидата, дабы гарантировать, что ни один потенциальный преемник президента-маршала Сантейла не подорвёт идеалы Национальной Республики."
 FST_national_republican_elections:0 "Первые выборы в Национальной Республике"
 FST_national_republican_elections_desc:0 "Пришло время. Кандидаты зарегистрированы, правила ясны, а должностные лица разосланы во все города и поселки. Теперь нам просто нужно начать процесс голосования и ждать результатов."
 FST_the_national_republic_lives_on:0 "Национальная Республика навсегда"
 FST_the_national_republic_lives_on_desc:0 "Сантейл не только освободил народ Грифонии от зла монархии, но и восстановил их сердца, умы и души, а также привёл их к более великим идеям национализма, процветания и безопасности. Теперь он может выйти на пенсию, осмотреть лежащую перед ним карту Грифонии и не увидеть на ней некогда процветающего сопротивления."
 
###MONARCHIST TREE###
 FST_victory_for_rosewing:0 "Старая революционерка"
 FST_victory_for_rosewing_desc:0 "Фашисты Сантейла уничтожены, и теперь старая гвардия Роузвинг укрепила свой контроль над армией. Роялистские убеждения старой консерваторши вызвали споры в рядах республиканцев, считающих её идеалисткой или даже реакционеркой. Однако вскоре именно этот идеализм спасёт Клаудбьюри."
 FST_the_unthinkable_option:0 "Немыслимый вариант" 
 FST_the_unthinkable_option_desc:0 "Чтобы избежать повтора неудач Кемерская, мы должны восстановить прежний режим – герцогство Клаудбьюри. Оскар, племянник покойного Отто II, по-прежнему принадлежит к дому Плюменьяр и является законным герцогом Клаудбьюри. Герцог Оскар I вернётся на свой трон, а в Клаудбьюри снова будет мир и единство."
 FST_monarchy_with_republican_characteristics:0 "Успокоить Оставшихся Республиканцев"
 FST_monarchy_with_republican_characteristics_desc:0 "Если мы не хотим, чтобы головы членов нашей семьи снова торчали на пиках, мы должны сотрудничать с гармонистами и демократами и строить конституционную монархию. Возможно, со временем, НРП поддержит нашу борьбу за освобождение Клаудбьюри от республиканизма и авторитаризма."
 FAT_prime_minister_in_charge:0 "§YПремьер-министр§! станет новым §Yглавой государства§!.\n"
 FST_restoring_mountain_industry:0 "Ворваться в горы"
 FST_restoring_mountain_industry_desc:0 "Горы - дом для нас и многих наших граждан, они практически способ жизни - ведь многие другие живут в холмах и на севере. Шахты и промышленность должны быть восстановлены после повреждений, причинённых гражданской войной."
 FST_placate_the_fascists:0 "Успокоить ультраправых генералов"
 FST_placate_the_fascists_desc:0 "Единственный способ одолеть республиканскую угрозу и восстановить славу и честь Клаудбьюри – заключить союз с генералами, которые помогли вернуть нашу богом данную монархию. Николь Роузвинг станет премьер-министром нового герцогства Клаудбьюри, а страна будет отстроена заново."
 FST_deal_with_the_republicans:0 "Чистка республиканцев"
 FST_deal_with_the_republicans_desc:0 "Изгнанные республиканцы в ярости от нашей реставрации клаудбьюрийской монархии, и некоторые наши агенты считают, что они планируют переворот из Скайнавии или Ведины! Эти интриги должны быть нарушены до того, как они начнут представлять реальную угрозу безопасности герцогства."
 FST_amnesty_for_the_kemerskai_government:0 "Реабилитация"
 FST_amnesty_for_the_kemerskai_government_desc:0 "Многие бывшие республиканские генералы и члены парламента убежали в соседние страны. Чтобы укрепить поддержку народа и двигаться в сторону парламентской монархии, нам нужно амнистировать этих беглецов и ликвидировать любую военную угрозу со стороны республиканцев."
 FST_increase_northern_policing:0 "Усилить контроль над севером"
 FST_increase_northern_policing_desc:0 "Полиция севера не получала должного финансирования со времён подавления скайнавского бунта. Это привело к разгулу бандитизма и господству военачальников в регионе. Восстановление работы полиции на севере жизненно важно для нас."
 FST_roads_in_the_north:0 "Северное индустриальное лидерство"
 FST_roads_in_the_north_desc:0 "Нужно больше дорог на севере! Строительство инфраструктуры, соединяющей север и юг, должно поощряться, и разделённость нашей страны будет преодолена."
 FST_keep_rosewing:0 "Оставить Роузвинг"
 FST_keep_rosewing_desc:0 "Николь Роузвинг провела наше герцогство сквозь бури, сотрудничала с оставшимися республиканцами и построила новый, единый Клаудбьюри. При ней страна оставалась безопасной и стабильной, и нет ни одной причины смещать эту достойную грифину с поста премьер-министра герцогства Клаудбьюри."
 FST_prime_minister_sivenhof:0 "Либеральный премьер-министр"
 FST_prime_minister_sivenhof_desc:0 "Тобиас Сивенхоф родом из этих земель и весьма популярен. Он без сомнения выступает за конституционную монархию, и мы назначим его новым премьер-министром. Политика Сивенхофа в вопросах единства и либеральных ценностей может оказаться именно тем, что нужно герцогству для построения демократии, в отличие от старой гвардии Николь Роузвинг."
 FST_look_to_the_nobility:0 "Дворянский премьер-министр"
 FST_look_to_the_nobility_desc:0 "Отто Саксхаген-Плюменьяр – племянник Оскара I. И пусть либералы кричат о непотизме, очевидно, что премьер-министр, заботящийся о нашей стране, должен быть дворянской крови. Бывшее дворянство было фанатично предано герцогу, а Отто Саксхаген-Плюменьяр не просто дворянин, но и родственник герцога."
 FST_traditional_economics:0 "Иерархическая экономика"
 FST_traditional_economics_desc:0 "Социальная политика Кемерская была ошибочной и в итоге лишь привела к росту инфляции, пока народ продолжал страдать. Если мы действительно хотим провести реформы, необходимо вернуться к традиционным экономическим моделям, которыми управлялось герцогство Клаудбьюри в лучшие годы."
 FST_traditional_hierarchies:0 "Утвердить дворянские привилегии"
 FST_traditional_hierarchies_desc:0 "Многие дворяне опасаются, что парламентская система лишит их власти и земель. Однако мы понимаем их тревоги и должны гарантировать сохранение традиционных привилегий, чтобы они продолжали поддерживать наше великое герцогство."
 FST_support_the_natives:0 "Помощь клаудбьюрийцам"
 FST_support_the_natives_desc:0 "Когда-то герцогством Клаудбьюри управляли исключительно этнические клаудбьюрийцы со своей культурой и языком. После завоевания нашей родины республикой всё больше герцландцев становились ведущими политиками, тогда как сами клаудбьюрийцы оказались в нищете и отчаянии. Так не может продолжаться!"
 FST_continue_kemerskai_welfare:0 "Социальная политика Кемерская"
 FST_continue_kemerskai_welfare_desc:0 "Александр Кемерскай, первый и последний президент Республики Грифонов, может и был некомпетентным диктатором, но именно он создал ключевые социальные программы и поддерживал народ. Мы должны вновь ввести эти программы и позволить каждому грифону под нашей властью наслаждаться процветанием."
 FST_new_nobility:0 "Ограничить власть дворян"
 FST_new_nobility_desc:0 "Старому клаудбьюрийскому дворянству нельзя доверять – именно из-за них герцогство пало перед республиканскими ордами. Власть должна быть передана простым грифонам, а не нечистым на коготь и бесчувственным дворянам прошлого."
 FST_curtail_military_power:0 "Ограничить влияние армии"
 FST_curtail_military_power_desc:0 "Хотя Сантейл мёртв, а большая часть армии полностью верна герцогству, она всё ещё оказывает тревожное влияние на политику и способна легко устроить переворот, изменив курс государства. Чтобы не допустить чрезмерного усиления армии и её диктата, мы должны обеспечить её лояльность и восстановить законы мирного времени."
 FST_military_primacy:0 "Добрый надзиратель"
 FST_military_primacy_desc:0 "Клаудбьюри не готов к настоящей демократии. Вместо неё ему нужен «добрый надзиратель» – армия Клаудбьюри. Под её внимательным взглядом и в крепких когтях мы раздавим любые силы, настроенные против нового герцогства, даже если придётся нарушить права жителей. Республиканизм никогда не вернётся в нашу великую нацию!"
 FST_the_dream_is_not_dead:0 "Мечта не мертва"
 FST_the_dream_is_not_dead_desc:0 "Мы не можем использовать республиканскую символику, но всё ещё можем найти общий язык с либералами и республиканцами. Мы должны возродить Республиканскую мечту в виде либеральной и конституционной идеи, где каждый наслаждается свободой под властью герцога. Свобода, демократия, процветание и монархия! Звучит вдохновляюще?"
 FST_cloudbury_as_it_was_meant_to_be:0 "Правильный Клаудбьюри"
 FST_cloudbury_as_it_was_meant_to_be_desc:0 "Мы вернули порядок, славу и дворянство в герцогство Клаудбьюри. Парламентская система даст народу заслуженную свободу, а традиционные иерархии вновь защитят нас от республиканцев и социалистов. Слава Клаудбьюри!"
 FST_freedom_in_the_north:0 "Свободный Клаудбьюри"
 FST_freedom_in_the_north_desc:0 "Тобиас Сивенхоф, этнический клаудбьюриец, преобразовал республику в настоящую конституционную монархию. Теперь можно сказать, что он – лучший премьер-министр в истории Клаудбьюри. Безоговорочные права и свободы были дарованы грифонам герцогства. Слава Клаудбьюри!"
 FST_looking_out:0 "Клаудбьюри на мировой арене"
 FST_looking_out_desc:0 "Мы не одни на севере. Хоть отношения с Империей немного улучшились, враги всё ещё готовы уничтожить наши мечты при первой возможности. На севере скрываются социалисты, готовые разрушить державы, а на юге Империя может потребовать не только признания, но и всей нашей страны."
 FST_bending_the_knee:0 "Встать на колени"
 FST_bending_the_knee_desc:0 "Более трёхсот лет Империя Грифонов была нашим сюзереном. Теперь она восстанавливает свою власть над Герцландом. Возможно, нам стоит обновить древний пакт и вновь поддержать династию Гроверов."
 FST_kingly_ambitions:0 "Большие амбиции"
 FST_kingly_ambitions_desc:0 "Мы – самая могущественная монархия на севере Грифонии. Пора утвердить своё влияние и распространить процветание по всему северу. Единый север станет единственной силой, способной противостоять Империи Грифонов."
 FST_alliance_of_northern_monarchs:0 "Союз с северными монархами"
 FST_alliance_of_northern_monarchs_desc:0 "Северные племена, пусть и отсталые технологически, уважают власть принцессы, а королевство Ведина веками было мирной монархией. Мы должны заключить союз с этими древними монархиями и выступить в бой – не как одно королевство, но вместе."
 FST_finalize_the_partition:0 "Закончить разделения"
 FST_finalize_the_partition_desc:0 "Скайнавия побеждена, и пора разделить её территорию с нашими верными союзниками. Северные племена получат свои исконные земли, а наша нация вместе с ними будет стоять на страже севера."
 FST_ally_vedina:0 "Пакт с принцессой"
 FST_ally_vedina_desc:0 "Ведина была рыцарственной, процветающей и гармонической монархией сотни лет. Заключить союз с ними – мудрое решение."
 FST_ally_northern_tribes:0 "Поговорить с племенами"
 FST_ally_northern_tribes_desc:0 "Фиана II из Северных племён – монарх гармонического общества пони, которая охотно вступит в союз с другими монархиями, если это обеспечит их независимость и процветание."
 FST_ally_the_sane_sunstriker:0 "Союз с разумным Санстрайкером"
 FST_ally_the_sane_sunstriker_desc:0 "Эривиар Санстрайкер, бывший бандитский король клана Санстрайкер, как известно, обрёл здравомыслие и прекратил рейды на соседние страны. С таким изменением он будет более склонен к союзу с нами."
 FST_strike_at_skynavia:0 "Напасть на Скайнавию"
 FST_strike_at_skynavia_desc:0 "Скайнавия – социалистическая катастрофа у нас под боком, занимающая земли, желанные как нами, так и Северными племенами. В её нынешнем состоянии ввести войска и захватить территорию будет проще простого."
 FST_restore_monarchies:0 "Восстановить павшие монархии"
 FST_restore_monarchies_desc:0 "Некоторые монархии, с которыми мы пытались наладить связь, ныне находятся под властью социалистов, фашистов или иных диктаторов, свергнувших свои богами данные правительства. При таком числе враждебных режимов правительству Клаудбьюри необходимо вернуть легитимных правителей на престолы."
 restore_monarchies_tt:0 "Мы получим §Rцели для войны§! с бывшими §Yсеверными монархиями§!."
 FST_self_sufficiency:0 "Сельскохозяйственная самодостаточность"
 FST_self_sufficiency_desc:0 "Со времён правления Фредерика Слабого наше герцогство зависело от поставок из Империи. Вероятно, именно это стало одной из причин падения перед республиканцами. Нам нужно вновь обрести самодостаточность и перестать полагаться на другие страны в производстве жизненно необходимых товаров."
 FST_root_out_the_bandits:0 "Искоренить бандитов"
 FST_root_out_the_bandits_desc:0 "Во время восстания против Республики северные бандиты в основном были нашими союзниками. Однако теперь, после победы, многие из них, особенно подчинённые ныне мёртвого Рейнхарда Сантейла, продолжают бороться против государства. Мы должны их подавить и искоренить."
 FST_send_in_the_troops:0 "Переназначить северных дворян"
 FST_send_in_the_troops_desc:0 "Другое возможное решение проблемы бандитизма – восстановить порядок политическими изменениями. Позволив дворянам-эмигрантам вернуться в Клаудбьюри и восстановив их титулы, мы получим новых союзников и стабилизируем север прагматичным управлением."
 FST_increase_military_influence:0 "Увеличить влияние армии"
 FST_increase_military_influence_desc:0 "Армия герцогства Клаудбьюри заслуживает большего внимания! Именно она вернула герцога Оскара Плюменьяра на престол. Чтобы армия оставалась довольной, мы должны позволить ей делать то, что она сочтёт нужным – например, финансировать строительство военных заводов и обучение новых солдат."
 FST_a_dynasty_to_last:0 "Династия на века"
 FST_a_dynasty_to_last_desc:0 "Клаудбьюри больше никогда не падёт перед республиканцами. Герцогство выстоит и станет маяком надежды среди умирающих империй и декадентных республик. Мы помним, что случилось с правителями, подчинившимися Империи и жестоко убитыми собственным народом. Герцог вместе с генералами построит великий Клаудбьюри."
 FST_a_parliament_of_generals:0 "Парламент генералов"
 FST_a_parliament_of_generals_desc:0 "Политики не представляют народ. Неудачи Кемерская и его пешек лишь подтвердили это. Вместо них герцогу будут помогать генералы, заботящиеся исключительно об интересах народа и нации."
 FST_restore_religion:0 "Назначить прелата Клаудбьюри"
 FST_restore_religion_desc:0 "Правительство Кемерская не поддержало архонта, отчасти из-за его роли в подавлении революции. Вследствие этого Республика Грифонов сопротивлялась попыткам назначить прелата региона, полагаясь на местных религиозных лидеров и отрицая церковную иерархию. В Клаудбьюри вновь должен быть прелат, а вместе с ним вернётся и благосклонность богов!"
 FST_replace_the_duke:0 "Ограничить власть герцога"
 FST_replace_the_duke_desc:0 "Оскар Плюменьяр всегда поддерживал демократические идеи, и даже несмотря на значительное влияние армии, он всё ещё отклоняет некоторые абсолютистские законы. Его власть пугающе сильна, и ради блага армии и её планов для Клаудбьюри его исполнительные полномочия должны быть ограничены."
 FST_power_to_the_duke:0 "Al Magt Til Hertugen"
 FST_power_to_the_duke_desc:0 "Было бы глупо ограничивать власть герцога Оскара I, потакая капризам властолюбивых генералов. Клаудбьюри будет сильным и могущественным под надёжными когтями славного и всесильного монарха!"
###ROSEWING POST-UNIIFCATION###
 FAT_rosewing_triumphant:0 "Триумф дуалистической монархии"
 FAT_rosewing_triumphant_desc:0 "[Root.GetLeader] восторжествовал и стал главой новой, уникальной грифоньей монархии, сумевшей отложить разногласия между герцландцами и клаудбьюрийцами ради построения лучшего общества. И всё же нам предстоит назначить премьер-министра, который будет давать советы королям и управлять страной в их отсутствие."
 FAT_eagleclaw_ascendant:0 "Назначить Иглкло: Божественная Монархия!"
 FAT_eagleclaw_ascendant_desc:0 "Прелат Юлий Иглкло, родственник Габриэлы Иглкло, герцогини Клубники, праведный и строгий грифон, который поможет привести дуалистическую монархию к надлежащей мощи и стабильности, в отличие от более либерального или даже социалистического премьер министра. Традиции и безопасность должны главенствовать, и Юлий для этого идеально подходит."
 FAT_support_the_archonate:0 "Друзья в Архонате"
 FAT_support_the_archonate_desc:0 "Иглкло в чине прелата дал ему многие связи в Архонате Борея и организованной грифоньей религиозной иерархии в целом. Его друг, Архонт Протеус III, был приглашён работать в нашем правительстве и быть советником Юлия по политическим и религиозным делам. Его армейские и политические навыки очень нам пригодятся."
 FAT_wrangle_the_legislature:0 "Оспорить законодательную власть"
 FAT_wrangle_the_legislature_desc:0 "Либеральные министерства, полные грифонов, связанных с Оскаром Плюменьяром, будут подавляться, чтобы их идеалистическая политика не мешала администрации Иглкло. Должны быть приняты меры по ограничению власти парламента и усиления как королей, так и премьер-министра, чтобы избежать ошибок бездарных клаудбьюрийцев."
 FAT_mandatory_military_service:0 "Обязательная военная служба"
 FAT_mandatory_military_service_desc:0 "Служба Родине телом и духом должна стать обязанностью каждого грифона. Обязательная военная служба будет введена во имя этого принципа и объединит грифонов в клятве королям."
 FAT_corporatism:0 "Корпоративистская экономика"
 FAT_corporatism_desc:0 "Есть много компаний которые не только хотят служить режимам прошлого, но и увидели свет мудрости и решили работать с истинными лидерами Сердца Империи и Клаудбьюри. Действительно, представители из этих компаний выступают за даже более тесное сотрудничество, чем ранее. Это будет выгодно нам."
 FAT_the_monarchist_band:0 "Назначить Бронзтейла: За Корону!"
 FAT_the_monarchist_band_desc:0 "Граф Бронзхилла, Игнатий, показал себя как верный и послушный слуга Гровера VI. И вправду, его пара когтей (или лап) самые надёжные в нашем правительстве, как раз когда мы работаем над объединением двух монархий. Он делает правильные решения, чтобы всё точно шло, как и планировалось."
 FAT_power_to_the_kings:0 "Власть королям"
 FAT_power_to_the_kings_desc:0 "Короли и дуалистическая монархия были рождены править. Они и их династии были выбраны Богами нести на себе бремя короны и править честно и справедливо. Мы восстановим их власть, чтобы было так, как раньше, чтобы они правили по праву, а не силой."
 FAT_autonomous_politics:0 "Автономия регионам"
 FAT_autonomous_politics_desc:0 "Веками, у регионов старой Империи был значительный уровень автономии. Фетизская Конституция, Совет Ромау, Ректораты Йеля. Мы убедимся, чтобы у них всё ещё была некоторая автономия, чтобы они делали всё, что хотят в своих границах, при условии, что они будут субъектом королей, премьер-министра и законодателей."
 FAT_keep_the_priveleges:0 "Привилегии дворянам"
 FAT_keep_the_priveleges_desc:0 "Дворяне, хоть и не благословлены править, как короли, служат нам по клятве и всё ещё имеют роль в дуалистической монархии. Они обеспечивают связь между простогрифонами и королями, рассказывают про их указы и служат королю и народу в своей местности. Ведь даже короли не вездесущи. В обмен на свою службу они получают некоторые привилегии, связанные с их положением."
 FAT_employment_for_all:0 "Никого не бросать"
 FAT_employment_for_all_desc:0 "Таким образом, мы пришли к последней части этой загадке. Король поклялся защищать свой народ и заботится о нём, и здесь уже действуем мы. Массовые призывы к трудоустройству, чтобы никакой грифон не был брошен на нашем пути в светлое будущее, помогут Гроверу и Оскару, как в экономике, так и им лично."
 FAT_the_wedding:0 "Объединить семьи"
 FAT_the_wedding_desc:0 "Оскар, король Клаудбьюри, несмотря на свою мудрость и силу, больше не может иметь детей. Чтобы избежать кризиса престолонаследия и крепче связать королевства, мы организуем свадьбу. Гровер VI, король Герцланда и Офелия, предполагаемая наследница Клаудбьюри, заключат помолвку в Грифенхейме и обручатся по достижении подходящего возраста."
 FAT_reassure_the_cloudburians:0 "Убедить клаудбьюрийцев"
 FAT_reassure_the_cloudburians_desc:0 "Клаудбьюрийцы, по довольно понятным причинам, волнуются, что со смертью Оскара и его ближайших родственников, Клаудбьюри станет очередной частью Герцланда, младшим партнёром в унии. Эту злую идею нужно искоренить. Мы убедимся, что Клаудбьюри будет равным партнёром Герцланда и сохранит то, что у него есть."
 FAT_placate_the_imperials:0 "Успокоить имперцев"
 FAT_placate_the_imperials_desc:0 "Многие имперцы не верят в равенство с Клаудбьюри. Мы должны пресечь их намерения, мы сможем и отвлечём их всякими разговорами, обещаниями и титулами. Никакой премьер-министр таковым не становился, не зная искусства сделок, в конце концов. Вскоре, с новыми идеями и друзьями, они позабудут про всё, кроме равенства с Клаудбьюри в союзе."
 FAT_the_triumph_of_the_confederation:0 "Слава королям!"
 FAT_the_triumph_of_the_confederation_desc:0 "Разногласия были сглажены, в итоге успешного договора, после когтепожатия. Ныне каждый грифон стоит за дуалистической монархией, теперь уже зная, когда стоит прикрыть свой клюв. Трижды ура Королям, слава им навеки.\nУра! Ура! Ура!"
 FAT_rosewing_redeemed:0 "Назначить Роузвинг: справедливое королевство!"
 FAT_rosewing_redeemed_desc:0 "Роузвинг, грифина, стоявшая за объединением Сердца Империи и Клаудбьюри, идеально подходит для нашего правительства. Обладая связями во всех королевствах – среди республиканцев и монархистов, клаудбьюрийцев и герцландцев – она свободно ориентируется в запутанных сетях, связывающих грифонов разных эпох в обеих странах."
 FAT_one_nation_united:0 "Одна, единая нация"
 FAT_one_nation_united_desc:0 "Они могут сколько угодно говорить о двух королевствах, но очевидно, что нация только одна. Единое Королевство Клаудбьюри и Герцланда. Одна нация, которая может и состоит из двух, но всё равно единая. Наши связи и наша пропаганда будет это показывать в любом возможном свете, чтобы уже через лет 20 все говорили об одной нации, а не о двух."
 FAT_the_cloudbury_herzlander_identity:0 "Наша идентичность"
 FAT_the_cloudbury_herzlander_identity_desc:0 "Не будет 'клаудбьюрийцев', не будет 'герцландцев'. Эти слова медленно умерли на реке Гриффкинг. Вместо этого, останется одна идентичность, которая превзойдёт ярлыки и создаст что-то большее. Новая идентичность восстанет из руин старины, символизируя новую дуалистическую монархию."
 FAT_subsidies_for_business:0 "Субсидии бизнесу"
 FAT_subsidies_for_business_desc:0 "Сила нации зависит от экономики. Поэтому мы должны сосредоточиться на двигателях богатства. Многие предприятия и корпорации в Клаудбьюри и Герцланде словно просят, чтобы им позволили работать и поднять экономику. Корпорации, работавшие с республиканцами и имперцами, ныне в нашем распоряжении, в обмен на их субсидирование."
 FAT_lower_the_taxes:0 "Понизить налоги"
 FAT_lower_the_taxes_desc:0 "Как часть программы ускорения бизнеса, мы уменьшим налоги, которые платят все в Клаудбьюри и в Герцланде. Грифоны заслуживают того, что зарабатывают, трудясь в поте лица, а не того, чтобы получать всё на серебряной тарелочке, как толстые коты, которые без чьего-либо ведома или согласия богатеют, наживаясь на других."
 FAT_sivenhofs_victory:0 "Назначить Сивенхофа: Страна и Свобода!"
 FAT_sivenhofs_victory_desc:0 "Сивенхоф подходит для этой работы. Он, несмотря на непоколебимую верность Их Величиям, тесно сотрудничал с республиканцами, некоторые из которых всё ещё прячутся от дуалистической монархии, и он, возможно, сможет уговорить их перестать воевать во избежание очередной революции. Её можно будет победить, но в прошлый раз от нас откололась Аквелия."
 FAT_expand_welfare_programs:0 "Расширить социальное обеспечение"
 FAT_expand_welfare_programs_desc:0 "Есть одна старая пословица - 'Panem et Circenses' - хлеба и зрелищ. Если общество и потенциальные последователи Республики будут довольны и сыты, у них не будет желания говорить или воевать против правильного правительства. Если мы пустим в ход часть про 'хлеб', мы избежим очередной попытки революции и добьёмся более сильной экономики."
 FAT_agrarian_democracy:0 "Аграрная демократия"
 FAT_agrarian_democracy_desc:0 "Демократия начинается с народа, с малого грифона. Фермеры и маленькие сельские общины - хорошее начало. У них есть традиции самоуправления голосованием, и это то, что было до правдивой демократии. Так что так же, как и сейчас, мы выделим субсидии и отправим деньги туда, где они нужнее всего."
 FAT_curtail_noble_priveleges:0 "Ограничить привилегии"
 FAT_curtail_noble_priveleges_desc:0 "Старая Революция не возникла из ниоткуда. У грифонов закончилось терпение смотреть на дворян, пирующих на их честно заслуженные монеты, когда они сами бесконечно трудились за бесценок, не получая благодарностей. Мы должны признать, что хоть их методы и неверны, а они сами - опасные экстремисты, нам стоит поддержать менее радикальных им сочувствующих."
 FAT_remember_kemerskai:0 "Реабилитация Кемерская"
 FAT_remember_kemerskai_desc:0 "Александр Кемерскай, маршал, трагичная личность, пытавшийся обуздать реформистские настроения в Империи, но затянутый в радикализм подчинёнными-экстремистами, пока ему не помогла Роузвинг. У него было честное сердце, он воистину заботился о простогрифонах... Ну или так мы будем говорить и писать в учебниках истории."
 FAT_the_greenback_accords:0 "Гринбэкские соглашения"
 FAT_the_greenback_accords_desc:0 "С согласием всех сторон, с миром и гармонией для каждого, мы можем наконец пойти на последний шаг. Мы соберёмся в Гринбэке и подпишем новое соглашение, чтобы убедиться, что грифоны из обоих царств, Клаудбьюри и Герцланда, смогут работать вместе во имя общего блага, для всех и каждого."
 #back to normal republican stuff
 FAT_equalrightsforponies:0 "Государственный билингвизм"
 FAT_equalrightsforponies_desc:0 "Отныне любой важный правительственный документ будет написан как на клаудбьюрийском, так и на гриффише, при необходимости - на вингбардийском или аквелийском. Хоть это и потребует значительных усилий, мы воссоединим наш расколотый народ и позволим правящему меньшинству герцландцев наконец наладить контакт с клаудбьюрийским большинством."
 FAT_twomarshalsonerepublic:0 "Вотум недоверия"
 FAT_twomarshalsonerepublic_desc:0 "Хоть Александр Кемерскай и был лидером Революции, породившей Республику, он больше не может быть президентом. Своей политикой во время конституционного кризиса он почти убил страну и разрушил надежды на социалистическую республику. Кемерскай может уволиться и уехать жить в загородный дом с видом на море, а мы объявим нового президента."
 FAT_duke_oskar_idea:0 "Оскар I"
 FAT_chad_duke_oskar_idea:0 "Оскар I, великий герцог Клаудбьюри, владыка севера, имперский управляющий, соправитель Ордена рыцарей Клаудбьюри, слуга своего сюзерена, императора грифоньего рода"
 FAT_GRD_ophelia:0 "Ophelia Saxhagen-Plumenjar"
 FAT_GRD_ophelia_desc:0 "Ophelia Saxhagen-Plumenjar was born in 1000, child of Otto I, during the late years of Republican rule in Cloudbury. Despite her royal lineage, she had a relatively humble upbringing in Cloudbury, kept out of the turbulent political climate by her father, who raised her on stories of the House and of the old Duchy. As a member of the admiralty, Otto could afford to give his daughter a liberal education, and so Ophelia was tutored in rhetoric, natural philosophy and history. As Otto expected his daughter to eventually find her place in the Republic's civil administration, she developed the skills of a capable administrator and statesgriff, until the Duchy's restoration threw her life's trajectory out of rails by making her the heir of the Cloudbury throne.\n\nOphelia is a calm and collected griffoness with a passion for history and the arts, and her experiences in the chaos of the last years of the Republic shaped her into a reformist who wishes to incorporate democratic elements into the traditional monarchy, for the sake of the realm's stability and prosperity."
 FAT_Bring_The_Revolution_idea:0 "Принести Революцию"
 FAT_Bring_The_Revolution_idea2:0 "Принести Революцию"
 FAT_bring_the_revolution:0 "Принести Революцию ради мира"
 FAT_bring_the_revolution_desc:0 "Мы должны раздавить реакционеров и монархистов, и принести революцию в порабощённые земли Империи Грифонов. За Республику! За Социализм! За Президента Эстлера!"
 FAT_widespreadlandreform:0 "Всеобщая земельная реформа"
 FAT_widespreadlandreform_desc:0 "Единственный путь убрать риск серьёзного голода в нашей нации - вернуть фермы и землю народу, а также прекратить капиталистическую эксплуатацию. Перераспределив землю и еду, наш голод прекратится за считанные часы."
 FAT_restoreorder:0 "Порядок в партии — порядок в Республике"
 FAT_restoreorder_desc:0 "Политические беспорядки из-за импичмента Кемерская привели нашу нацию, а в особенности партию, в состояние хаоса. Мы должны это исправить и восстановить порядок на севере, где мощь полководцев и бандитов только выросла с момента создания социалистического правительства. Также мы должны решить судьбу предателей из Правого крыла НРП."
 FAT_rehabilitatethecriminals:0 "Попытаться реабилитировать бандитов"
 FAT_rehabilitatethecriminals_desc:0 "Бандиты в сёлах делают то, что необходимо для выживания в тяжелых условиях капитализма. Давить на них было бы безрассудно, ведь мы можем улучшить социальное обеспечение и дать жителям регионов самое необходимое, и мы убедимся, что такого бандитизма больше не будет."
 FAT_justiceaboveall:0 "Правосудие превыше всего"
 FAT_justiceaboveall_desc:0 "Идея, что бандитов как-то можно реабилитировать, смешна. Не бандиты ли грабили наши города? Разоряли наши фермы? Делали ужаснейшие вещи со всеми подряд? То, что у бандитов тяжелая жизнь, не оправдывает их в совершении преступлений. Мы должны ввести армию и разобраться с этой угрозой."
 FAT_cooperatewithharmonists:0 "Пакт с Санглайдером"
 FAT_cooperatewithharmonists_desc:0 "Санглайдер и гармонисты открыто не критиковали Левое крыло НРП после изгнания Кемерская, а наши движения борются за одни и те же принципы: демократия, свобода и процветание. Мы рады принять гармонистов в наше правительство и вместе выдерживать любые невзгоды. Едины в дружбе и труде."
 FAT_end_the_personality_cult:0 "Развеять культ личности"
 FAT_end_the_personality_cult_desc:0 "Культ личности Кемерская должен быть развеян. Нет причин считать его отцом нашей Республики, ведь он повёл её на верную погибель своими авторитарными мерами."
 FAT_strengthenworkerscouncils:0 "Усилить профсоюзы"
 FAT_strengthenworkerscouncils_desc:0 "Организация рабочих - один из ключевых моментов социалистического общества. Профсоюзы, кооперативы и коллективы должны поддерживаться, а группы рабочих должны представляться в нашей власти. Кроме того, нам не помешает политическая помощь от этих лояльных организаций..."
 FST_loot_the_armories:0 "Разграбить оружейные склады"
 FST_loot_the_armories_desc:0 "На оружейных складах есть что взять для войны."
 FST_the_war_against_kemerskai:0 "Война против Кемерская"
 FST_the_war_against_kemerskai_desc:0 "Кемерскай слаб и неэффективен, его правительство погрязло в декадансе и полностью недееспособно. Генералы построят новую республику, основанную на безопасности и порядке, как только мы свергнем праздного деспота из Клаудбьюри!"
 FST_pacify_the_military:0 "Утихомирить армию"
 FST_pacify_the_military_desc:0 "Наша армия известна своей склонностью к грабежам, разрушению городов и оружейных, а также неповиновению приказам. При Кемерскае это считалось нормой, но теперь им придётся смириться с режимом Сантейла и Роузвинг. Мы покажем им, что бывает с предателями."
 FAT_marketsocialism:0 "Экономика кооперативов"
 FAT_marketsocialism_desc:0 "В социализме есть как рынок, так и демократия. Мы организуем самоуправление на заводах, позволяя им соревноваться в рыночной системе, но также и наслаждаться плодами своего труда в кооперативной системе. Самоуправление рабочих обеспечит справедливое распределение прибыли в рамках капиталистической системы."
 FAT_workwithindemocracy:0 "Централизовать Республику"
 FAT_workwithindemocracy_desc:0 "Республика страдает из-за сильной децентрализации, в частности на севере. Вся активность должна быть сосредоточена в Клаудбьюри, а местные автономии должны быть ограничены в пользу сильного и унитарного государства. Разрыв между севером и югом породил проблему с бандитами, и мы должны убедиться, что такое больше не повторится."
 FAT_encouragelocalelections:0 "Усилить самоуправление"
 FAT_encouragelocalelections_desc:0 "Наше правительство сосредоточено на Клаудбьюри, из-за чего к проблемам сёл никто не прислушивается. Из-за этого нашему правительству нужно создать местные собрания и децентрализованные парламенты для лучшего удовлетворения нужд и достижения целей сельских общин."
 FAT_a_working_government:0 "Гражданское правительство"
 FAT_a_working_government_desc:0 "Наша мечта о республике не должна быть положена под сукно. Достойное, правильное народное правительство - это единственный путь!"
 FAT_establishlocalcouncils:0 "Поддержка профсоюзов"
 FAT_establishlocalcouncils_desc:0 "Наше социалистическое движение нуждается в поддержке. Нет поддержки сильнее, чем поддержка крестьян и рабочих окраин, которые станут новыми вестниками Второй Грифоньей Революции."
 FAT_proper_police_force:0 "Надлежащие полицейские силы"
 FAT_proper_police_force_desc:0 "Слишком долго группы бандитов и воров терроризировали сельскую местность. Хватит! Новые полицейские силы быстро справятся с этими преступниками."
 FAT_secure_the_countryside:0 "Обеспечить безопасность сельской местности"
 FAT_secure_the_countryside_desc:0 "Хотя это может показаться экстремальным для некоторых, полиция, возможно, не сумеет вовремя разобраться с проблемой бандитов. Резервы армии будут перенаправлены с целью помочь в деле обеспечения безопасности."
 FAT_appoint_civilian_ministers:0 "Назначить гражданских министров"
 FAT_appoint_civilian_ministers_desc:0 "Мы - государство с армией, а не наоборот. Таким образом, чиновники будут избираться из числа гражданских лиц. Пусть военные, а не правительство, разбираются с армейскими делами!"
 FAT_an_idealistic_cabinet:0 "Утвердить правительство Санглайдера"
 FAT_an_idealistic_cabinet_desc:0 "Шнабель Санглайдер занимал пост вице-президента с 995 по 1003 год, и хотя Генрих Кингфезер сделал многое за последние годы, тот, кто нам действительно нужен – Санглайдер. Республика Грифонов будет хранить наши мечты и пан-грифоньи идеалы, а всё остальное станет второстепенной целью. Республика не падёт никогда!"
 FAT_feed_the_hungry:0 "Накормить голодных"
 FAT_feed_the_hungry_desc:0 "Мы не можем называться настоящим народным правительством, пока на улицах голодают грифоны. С нынешним кризисом необходимо разобраться как можно скорее. Мы накормим всех!"
 FAT_a_pragmatic_cabinet:0 "Оставить правительство Кингфезера"
 FAT_a_pragmatic_cabinet_desc:0 "Вице-президент Генрих Кингфезер всё ещё прекрасно справляется. Хотя некоторых других министров можно заменить, Кингфезера необходимо оставить у власти. Реализм и прагматизм будут направлять нашу политику и решения, а мечты о Республике Грифонов – лишь после этого."
 FAT_regional_elections:0 "Парламентские выборы"
 FAT_regional_elections_desc:0 "Пришло время провести региональные выборы, чтобы народ сам избрал административных лидеров. Народ вновь сможет проявить свою волю, а приостановка конституции 986 года будет отменена."
 FAT_restore_the_constitution:0 "Восстановить конституцию"
 FAT_restore_the_constitution_desc:0 "Мы приостановили действие конституции в самый тёмный час, но теперь настало время отменить это решение. Народ увидит легитимность нашего правительства. Республика никогда не падёт!"
 FAT_enforce_martial_law:0 "Ввести военное положение"
 FAT_enforce_martial_law_desc:0 "Хотя ситуация на данный момент стабилизировалась, до полной безопасности ещё далеко. Президент-маршал введёт военное положение для защиты республиканских принципов от внутренней оппозиции."
 FAT_pacify_the_countryside:0 "Восстановить мир в сельской местности"
 FAT_pacify_the_countryside_desc:0 "Действия бандитов зашли слишком далеко. Армия восстановит порядок в сельской местности, при необходимости – с применением силы."
 FAT_anti_banditry_tactics:0 "Антибандитская тактика"
 FAT_anti_banditry_tactics_desc:0 "Эффективность армии была серьезно затруднена всевозможными ограничениями. Мы должны позволить им делать всё возможное, чтобы остановить этих террористов!"
 FAT_military_courts:0 "Суд над предателями"
 FAT_military_courts_desc:0 "Эти докучливые и отвратительные предатели должны быть отданы под суд. С ними быстро разберутся недавно созданные военные суды. Они больше никогда не навредят нашему населению!"
 FAT_deal_with_communist_agitators:0 "Присматривать за социалистами в НРП"
 FAT_deal_with_communist_agitators_desc:0 "Угроза революции 986 года сегодня низка, но она есть. Хотя левое крыло НРП не представляет для нас большой угрозы, очевидно, что они не питают любви к республиканской мечте. За этими грифонами нужно следить независимо от законности этих действий. Защита от очередной социалистической революции важнее, чем неприкосновенность частной жизни предателей."
 FAT_protect_trade_routes:0 "Защитить торговые маршруты"
 FAT_protect_trade_routes_desc:0 "Мы владеем торговым центром между севером и югом. Исходя из этого, мы должны обеспечивать безопасность всех торговых маршрутов, чтобы сохранить богатства, которые обеспечивает торговля."
 FAT_conscript_peasants:0 "Призвать крестьян в армию"
 FAT_conscript_peasants_desc:0 "Что может помешать крестьянам защищать нашу республику? Лишь отсутствие оружия. Мы должны найти и привлечь новобранцев из огромного числа крестьян в нашей стране."
 FAT_military_roads:0 "Военные дороги"
 FAT_military_roads_desc:0 "Нашей армии необходимо обеспечить безопасное и быстрое передвижение по всей стране. Для этого должны быть построены дополнительные дороги, чтобы всё необходимое оборудование и войска могли быть доставлены туда, где они нужны."
 FAT_distribute_food:0 "Продовольственные рационы"
 FAT_distribute_food_desc:0 "Пища - ценный ресурс. Сытый крестьянин - счастливый крестьянин, а счастливые крестьяне не причиняют неприятностей. Надо обеспечить население дополнительными продовольственными пайками."
 FAT_industrialization:0 "Завершающие штрихи"
 FAT_industrialization_desc:0 "Наша промышленность по-прежнему отстает от других стран. Мы должны решить эту проблему, если хотим осуществить все амбиции. Мы должны принять окончательные меры по превращению в действительно современное и индустриальное общество."
 FAT_industrialization_requirements:0 "Нет национального духа §YБандитизм§!."
 FAT_banking_reform:0 "Банковская реформа"
 FAT_banking_reform_desc:0 "Мы должны начать большую банковскую реформу, чтобы улучшить положение нашей находящейся в глубокой депрессии финансовой системы. Это поможет обеспечить процветание нации и её населения."
 FAT_balance_the_books:0 "Самодостаточная экономика"
 FAT_balance_the_books_desc:0 "[FATGetAutarkicEconomyDesc]"
 FATGetAutarkicEconomyDescStandard:0 "Граждане нашей нации больше не должны жить в нищете из-за проблем бывшего герцогства Клаудбьюри! Мы, в отличие от прежнего герцогства, обязаны стать самодостаточными и самостоятельно пахать землю, добывать руду и трудиться ради себя."
 FATGetAutarkicEconomyDescMonarch:0 "Граждане нашей нации больше не должны жить в нищете из-за проблем бывшего герцогства Клаудбьюри! Мы, в отличие от прежнего герцогства, обязаны стать самодостаточными и самостоятельно пахать землю, добывать руду и трудиться ради себя."
 FAT_improve_roads:0 "Улучшить дороги"
 FAT_improve_roads_desc:0 "Мы должны иметь возможность перевозить снаряжение, товары и солдат через всю страну, для этого мы должны создать систему шоссе. Первую в своем роде на этом континенте!"
 FAT_infranstructure_effort_1:0 "Дороги Холодного Копья"
 FAT_infranstructure_effort_1_desc:0 "Провинция Холодное Копьё должна быть соединена с нашей новой системой шоссейных дорог. Это обеспечит быструю транспортировку войск и товаров."
 FAT_infranstructure_effort_2:0 "Дороги Пещерной Рощи"
 FAT_infranstructure_effort_2_desc:0 "Провинция Пещерная Роща является важным дополнением для нашей сети шоссе. Это обеспечит быструю транспортировку войск и товаров через эту область."
 FAT_port_facilities:0 "Порты Вингхагена"
 FAT_port_facilities_desc:0 "Благодаря нашей новой системе шоссе, мы ускорили перемещение по суше. Теперь настало время расширить порты, чтобы обеспечить наше присутствие на море."
 FAT_dockyards:0 "Расширить порты Вингхагена"
 FAT_dockyards_desc:0 "Необходимы дальнейшие инвестиции в порты Вингхагена, чтобы обеспечить постоянное расширение нашего флота."
 FAT_literacy_campaign:0 "Образовательная инициатива Клаудбьюри"
 FAT_literacy_campaign_desc:0 "[FATGetEducationInitiativeDesc]"
 FATGetEducationInitiativeDescStandard:0 "ОИК, также известная как Образовательная инициатива Клаудбьюри, – это новая программа, разработанная президентом-маршалом и его ближайшими советниками. Она призвана искоренить неграмотность на севере республики, особенно там, где коренное население Клаудбьюри составляет большинство."
 FATGetEducationInitiativeDescMonarch:0 "ОИК, также известная как Образовательная инициатива Клаудбьюри, – это новая программа, созданная герцогским правительством при поддержке экспертов в области образования. Она призвана искоренить неграмотность на севере страны, особенно там, где коренное население Клаудбьюри составляет большинство."
 FAT_new_schools:0 "Расширить северные школы"
 FAT_new_schools_desc:0 "По программе НРОИ, мы откроем больше школ с целью увеличить уровень образованности и грамотности. Север - самое место новым школам, так как многие северяне не умеют читать из-за полководческих междоусобиц и особенностей правления герцландцев."
 FAT_engineering_expertise:0 "Мы больше не безграмотны!"
 FAT_engineering_expertise_desc:0 "С завершением НРОИ каждый грифон научится читать, писать и выполнять простые подсчёты. В новых школах будут преподавать историю, науки и рассказывать о войнах – от Клаудбьюри до Вингхагена и Лостгейта. Наша страна станет пристанищем знаний и светочем среди сгущающихся туч этого мира."
 FAT_cement_factories:0 "Промышленный центр Скварк"
 FAT_cement_factories_desc:0 "В прошлом году в городе Скварк началась быстрая индустриализация. Благодаря дополнительному государственному финансированию, она может ускориться ещё больше, что приведёт к созданию настоящего промышленного центра."
 FAT_heavy_industry:0 "Тяжелая промышленность"
 FAT_heavy_industry_desc:0 "Для дальнейшего расширения строительства нам нужна мощная тяжелая промышленность. На данный момент мы будем уделять ей максимум внимания."
 FAT_cloudbury_arsenal:0 "Арсенал Клаудбьюри"
 FAT_cloudbury_arsenal_desc:0 "Открытие нового Национального Арсенала позволит лучше оснастить нашу армию."
 FAT_military_industry:0 "Военная промышленность"
 FAT_military_industry_desc:0 "Наша армия требует всё больше ресурсов для функционирования и мы должны обеспечить её всем необходимым, иначе мы рискуем проиграть."
 FAT_agriculture_mechanization:0 "Механизация сельского хозяйства"
 FAT_agriculture_mechanization_desc:0 "Благодаря внедрению современных методов механизации в нашем сельском хозяйстве мы сможем значительно повысить эффективность работы наших фермеров, тем самым обеспечив более высокие урожаи и большие запасы продовольствия."
 FAT_connect_north_and_south:0 "Соединить север и юг"
 FAT_connect_north_and_south_desc:0 "Проблема полевых командиров отчасти возникла из-за слабого управления и разобщённости регионов, мер, отчуждавших местных жителей от центрального правительства и породивших рост антиправительственных настроений. Формализация железнодорожного сообщения между севером и югом поможет предотвратить подобное."
 FAT_winghagen_development:0 "Оживить Вингхаген"
 FAT_winghagen_development_desc:0 "Порт и завод Вингхагена некогда были ключевым центром военной и промышленной важности во времена герцогства Клаудбьюри и ранней республики. В нынешних условиях необходимо обновить Вингхаген, чтобы он соответствовал современным стандартам. Город вновь станет жемчужиной региона Клаудбьюри!"
 FAT_natural_riches:0 "Природные богатства"
 FAT_natural_riches_desc:0 "Здесь, на севере, хватает месторождений ресурсов, которые мы только сейчас начали использовать. Мы можем потратить деньги на шахты для расширения добычи полезных ископаемых."
 FAT_appease_the_testing_team:0 "Крупномасштабное развитие армии"
 FAT_appease_the_testing_team_desc:0 "Ныне больше нет проблемы неуправляемых командиров, и мы снова можем нормально развивать армию и промышленность. Пока Империя проводит свои проекты по крупномасштабной милитаризации и мобилизации, мы не должны отставать, чтобы успокоить военных нашей страны и подготовиться к последнему бою."
 FAT_resource_stuff:0 "Ресурсы севера"
 FAT_resource_stuff_desc:0 "[FATGetNorthResourcesDesc]"
 FATGetNorthResourcesDescStandard:0 "Север Клаудбьюри игнорировался как нашим правительством, так и прежним герцогством. В северных землях необходимо развивать добычу стали и хрома, иначе мы рискуем столкнуться с критической нехваткой полезных ископаемых."
 FATGetNorthResourcesDescMonarch:0 "Север Клаудбьюри игнорировался как нашим правительством, так и прежней республикой. В северных землях необходимо развивать добычу стали и хрома, иначе мы рискуем столкнуться с критической нехваткой полезных ископаемых."
 FAT_live_long_and_prosper:0 "Долгой жизни и процветания"
 FAT_live_long_and_prosper_desc:0 "Благодаря большому количеству реформ мы смогли преодолеть национальный кризис. Наш народ больше не голодает или просит милостыню. Мы победили безработицу и улучшили промышленность, а наша нация теперь стала сильнее, чем когда-либо прежде. Наш народ будет жить долго и процветать!"
 FAT_risen_from_ruins:0 "[FATGetRisenFromRuinsTitle]"
 FATGetRisenFromRuinsTitleStandard:0 "Auferstanden Aus Ruinen"
 FATGetRisenFromRuinsTitleMonarch:0 "Opstået Fra Ruiner"
 FAT_risen_from_ruins_desc:0 "[FATGetRisenFromRuinsDesc]"
 FATGetRisenFromRuinsDescStandard:0 "Несмотря на все трудности, которые мы пережили в этом холодном и чуждом краю, нам удалось восстановить нашу экономику до уровня современных государств Грифонии и даже Эквуса. Мы восстали из руин, достигнув невероятного экономического процветания!"
 FATGetRisenFromRuinsDescMonarch:0 "Несмотря на все трудности, которые Клаудбьюри пережил после падения Империи, нам удалось восстановить нашу экономику до уровня современных государств Грифонии и даже Эквуса. Мы восстали из руин, достигнув невероятного экономического процветания!"
 FAT_republican_college:0 "Либеральное образование"
 FAT_republican_college_desc:0 "[FATGetFacultyOfGriffonitiesDesc]"
 FATGetFacultyOfGriffonitiesDescMonarch:0 "По моральным и практическим причинам крайне важно, чтобы государственный аппарат был укомплектован достойными кадрами. Для этого новый факультет общественных наук в Университете Клаудбьюри взрастит новое сословие благородных грифонов, сведущих в философии, истории и риторике – идеальных слуг державы."
 FATGetFacultyOfGriffonitiesDescStandard:0 "Бюрократия – фундамент страны, и наша республика остро нуждается в квалифицированных чиновниках и администраторах. Новый факультет общественных наук в Университете Клаудбьюри воспитает новое поколение честных и надёжных граждан республики."
 FAT_institute_of_applied_science:0 "Институт прикладных наук"
 FAT_institute_of_applied_science_desc:0 "По мере того, как наша образовательная программа начинает расцветать, мы сочли целесообразным построить еще один колледж, Институт Прикладных Наук, в Клаудбьюри. Этот новый центр исследований и разработок значительно расширит исследовательские возможности."
 FAT_finest_mathematicians:0 "Поддержать инженерные школы"
 FAT_finest_mathematicians_desc:0 "Учителями республиканской молодёжи должны стать лучшие математики и инженеры всей Грифонии! Мы найдём применение великим умам. Они без сомнения будут трудиться во благо страны и её молодёжи."
 FAT_artillery_designs:0 "Артиллерийские проекты"
 FAT_artillery_designs_desc:0 "Наши инженеры и математики совместно работают над созданием новых механизмов, способных использовать мощные взрывчатые снаряды. Новые, продвинутые артиллерийские системы являются гордым результатом их напряженной работы."
 FAT_aeronautics:0 "Воздухоплавание"
 FAT_aeronautics_desc:0 "Новый филиал Института Воздухоплавания разработал новые модели самолётов. Нам стоит инвестировать в них, ведь мечта о великих ВВС уже покорила многих в правительстве."
 FAT_department_of_electronics:0 "Новые вычислительные технологии"
 FAT_department_of_electronics_desc:0 "Департамент электроники доложил о неплохих результатах. Дальнейшее финансирование неплохо поддержало бы исследовательские программы."
 FAT_heavy_machinery:0 "Тяжелая техника"
 FAT_heavy_machinery_desc:0 "Самой сутью нации является ее промышленность. Используя новые технологии, разработанные институтом, наш промышленный сектор сможет совершить шаг далеко в будущее."
 FAT_putting_armor_on_tractors:0 "Разместить броню на тракторах?"
 FAT_putting_armor_on_tractors_desc:0 "Хоть это и звучит глупо, размещение брони на тракторах, по мнению некоторых наших исследователей, может иметь серьезный военный потенциал. Если мы инвестируем в это направление, то сможем разработать настоящие бронемашины."
 FAT_the_presidential_prize:0 "Президентская премия в области наук"
 FAT_the_presidential_prize_desc:0 "Президентская премия в области наук будет выдаваться одному выдающемуся проекту Республиканского Колледжа раз в год самим Президентом-Маршалом. Это побудит ученых работать еще усерднее, чтобы получить эту престижную награду."
 FAT_a_new_dawn:0 "Новый рассвет"
 FAT_a_new_dawn_desc:0 ""Я, как Президент-Маршал Грифоньей Республики, заявляю, что для нас начинается новый рассвет! Новый век! Новая жизнь! Троекратное ура!""
 FAT_the_griffons_tutelage:0 "Грифонья опека"
 FAT_the_griffons_tutelage_desc:0 "Чтобы закрепить успехи республики, мы должны прежде всего обеспечить безопасность нашего правительства и народа. Если мы исчерпаем силы, то не сможем достичь поставленных целей. Мы должны быть готовы. Поэтому мы останемся бдительными под присмотром президента-маршала до тех пор, пока это будет необходимо."
 FAT_consolidate_gains:0 "Закрепить успехи"
 FAT_consolidate_gains_desc:0 "Сейчас мы достигли больших успехов, чем в конце революции. Мы должны удержать то, что имеем сейчас, и никогда всё это не потерять."
 FAT_the_task_ahead:0 "Предстоящая задача"
 FAT_the_task_ahead_desc:0 "Республика не должна сидеть без дела, пока злодеи бродят по этим землям, порабощают свой народ, лишают его прав и свобод. Мы должны подготовиться к нашей конечной задаче: вернуться, наконец, домой в Грифенхейм!"
 FAT_pan_griffonian_cause:0 "Республиканский Пакт"
 FAT_pan_griffonian_cause_desc:0 "Грифоны по всей Грифонии хотят избавиться от монархии так же, как мы. Они наши союзники и друзья. Мы приложим усилия, чтобы подружиться с ними, и чтобы они встали на нашу сторону в деле освобождения континента."
 FAT_reach_out_to_equestria:0 "Признание нашей страны Принцессой"
 FAT_reach_out_to_equestria_desc:0 "Принцесса Селестия и Эквестрия долгое время были сторонниками свободы и гармонии. Благодаря нашей новой политической системе они могут рассмотреть возможность оказания нам непосредственной поддержки."
 FAT_a_republican_coalition:0 "Республиканский интернационализм"
 FAT_a_republican_coalition_desc:0 "Мы должны обратиться к каждой республике на континенте, независимо от её идеологии, и признать их братьями и сёстрами в великой борьбе. Нас не победит империализм и безжалостный авторитаризм!"
 FAT_approach_aquilea:0 "Сблизиться с Аквелией"
 FAT_approach_aquilea_desc:0 "В Аквелии недавно произошла собственная революция и она сбросила кандалы своего коррумпированного короля. Мы должны пригласить её в наш союз для укрепления связей и защиты наших общих ценностей от агрессии."
 FAT_approach_federation:0 "Сблизиться с Федерацией"
 FAT_approach_federation_desc:0 "Скайфол, хоть и не является настоящей республикой, но управляется народом, и этого достаточно, чтобы их можно было принять в наш союз. Свободная торговля Скайфола не должна быть уничтожена угнетением!"
 FAT_approach_minors:0 "Сблизиться с остальными"
 FAT_approach_minors_desc:0 "На континенте есть много более мелких республик, с которыми можно подружиться и которые могут присоединиться к нашему растущему союзу. Мы рады всем!"
 FAT_reconcile_with_north:0 "Примириться с Севером"
 FAT_reconcile_with_north_desc:0 "Хоть социалисты на севере не являются настоящей демократией, они могут стать хорошими друзьями и союзниками, что поможет прикрыть наш северный фланг от любых возможных атак."
 FAT_retake_north:0 "Отвоевать Север"
 FAT_retake_north_desc:0 "Коммунисты на севере представляют опасность для нашей границы. Единственный способ обезопасить наш север - это аннексировать земли коммунистов и самостоятельно позаботиться о его защите."
 FAT_core_skynavia:0 "Разобраться с коммунистическим наследием"
 FAT_core_skynavia_desc:0 "Коммунисты, ранее управлявшие этой землёй, лишали народ всякой подлинной свободы. Мы покажем им, что значит истинная свобода. За республику!"
 FAT_question_vedina:0 "Покончить с Вединой"
 FAT_question_vedina_desc:0 "Монархия к западу от нас может называть себя «гармонической», но она всё равно является аристократическим государством дворян, в котором у простого народа нет ни демократии, ни прочих политических прав. Их народ будет освобожден, за республику!"
 FAT_attack_sunstriker:0 "Освободить Уайттейл"
 FAT_attack_sunstriker_desc:0 "В регионе Уайттейл к востоку есть множество сторонников республики, желающих освободиться от гнёта лидера [MNC.GetLeader], и присоединиться к нам. Нам предстоит освободить этих грифонов!"
 FAT_core_sunstriker:0 "Интегрировать Уайттейл"
 FAT_core_sunstriker_desc:0 "Уайттейл свободен и находится под контролем республиканской армии, так что местные сторонники республики должны быть объединены в местное правительство провинции Уайттейл - неотъемлемую часть Республики."
 FAT_core_swedes:0 "Интегрировать Ведину"
 FAT_core_swedes_desc:0 "Хотя вединцы говорят на чужом языке и продолжают дорожить реакционными ценностями монархии, мы должны интегрировать их в республику, как бы трудно это ни было."
 FAT_wait_out_the_inevitable:0 "Защитить мечту"
 FAT_wait_out_the_inevitable_desc:0 "Тираны Грифенхейма могут напасть на нас в любой момент. Мы обязаны встать на защиту нашей нации и отбить удары имперских орд. Затем мы нанесём ответный удар прямо в сердце имперских земель и принесём светлое будущее всем грифонам."
 FAT_finish_revolution:0 "Завершить революцию"
 FAT_finish_revolution_desc:0 "Товарищи, настал наш час! Мы войдём в столицу деспотического и коррумпированного режима, который лишь притворяется представителем народа. Мы сокрушим его армии и построим новое общество, основанное на свободе, демократии и процветании!"
 FAT_tricolor_over_griffenheim:0 "Триколор над Грифенхеймом"
 FAT_tricolor_over_griffenheim_desc:0 "Мы сделали это! Грифенхейм наш, и деспотичная Империя-угнетатель была побеждена! Троекратное ура нашей успешной революции и освобождению! Ура! Ура! Ура!"
 FAT_fate_of_grover:0 "Судьба последнего императора"
 FAT_fate_of_grover_desc:0 "Последний император, Гровер VI, ещё ребёнок, но нельзя простить преступления его династии, регента и самой Империи. Казнь не вариант, однако ему нельзя позволить остаться в Грифенхейме со всеми титулами и властью. Мы можем сделать его простым свободным гражданином или изгнать. Говорят, что Эквестрия в это время года довольно хороша..."
 FAT_and_the_family:0 "...и рода Кемерскаев"
 FAT_and_the_family_desc:0 "Род Кемерскаев всё ещё жив, и его следует судить отдельно от остального дворянства. Кемерскай встретится со своим племянником – бароном Августом Кемерскаем, чтобы решить судьбу своих родственников."
 FAT_the_scheming_nobility:0 "Судьба коварных дворян"
 FAT_the_scheming_nobility_desc:0 "В отличие от Гровера VI, большая часть дворян выступала против революции 978 года, в частности герцогиня Клубники Габриэла Иглкло. Их преступления, в отличие от ребёнка-императора, не могут быть прощены – они будут лишены титулов или даже жизней."
 FAT_the_corrupt_archonate:0 "...и бесчестного архоната"
 FAT_the_corrupt_archonate_desc:0 "У нас, конечно, нет проблем с верой, но сам архонат с годами становится всё более порочным и бесчестным. Мы должны заменить трёх архонтов, чтобы высшими духовными лицами были не имперские подхалимы, а достойные грифоны."
 FAT_integrate_minors:0 "Интеграция остальных"
 FAT_integrate_minors_desc:0 "Государства-претенденты, которые встали на нашу сторону и помогли в уничтожении империи, теперь готовы войти в состав Республики как государства-члены."
 FAT_a_tide_to_swallow_the_old_order:0 "Прилив, что поглотит старый порядок"
 FAT_a_tide_to_swallow_the_old_order_desc:0 "По всей Грифонии продолжают доминировать реакционные и монархические режимы. Чтобы обеспечить победу республиканской армии над врагом, мы должны использовать весь потенциал Герцланда и его население, вербуя его для увеличения численности республиканской армии."
 FAT_integrate_federation:0 "Интеграция федерации"
 FAT_integrate_federation_desc:0 "Федерация слишком долго оставалась лишь формально «независимой» и чрезмерно автономной. Настало время включить её в состав республики как автономную область."
 FAT_western_developmental_aid:0 "Западная восстановительная кампания"
 FAT_western_developmental_aid_desc:0 "Неважно, контролируем ли Аквелию мы или наши союзники – в любом случае необходимо начать масштабную кампанию по восстановлению, чтобы исцелить землю и крупные города от шрамов былых ужасов Империи и последствий второй революции."
 FAT_extend_presidency:0 "Продление президентского срока"
 FAT_extend_presidency_desc:0 "Чтобы обеспечить стабильность, мы продлим сроки, в течении которых Президент-Маршал может занимать свой пост. Так он сможет служить государству столько, сколько нужно."
 FAT_postpone_reforms:0 "Отложить реформы"
 FAT_postpone_reforms_desc:0 "Реформы ослабляют правительство, дестабилизируя центральную власть. Если мы их остановим, то сможем убедиться, что никогда не выпустим власть из наших когтей."
 FAT_fortify_imperial_border:0 "Укрепить границу с Фетизией"
 FAT_fortify_imperial_border_desc:0 "Фетизия - ближайший к нам имперский регион. Если Империя на нас нападёт, в наших интересах было бы укрепить местность."
 FAT_militarize_the_north:0 "Военизировать Север"
 FAT_militarize_the_north_desc:0 "Мы должны сосредоточить промышленность на севере, там, где её не достанут имперцы. Это как индустриализует бедный регион, так и защитит нашу жизненно важную военную промышленность."
 FAT_contingency_plan:0 "План действий в чрезвычайных ситуациях"
 FAT_contingency_plan_desc:0 "Мы должны убедиться, что никогда не окажемся уязвимыми к нападению. Мы должны разработать специальные планы, чтобы напавшие на нас тираны столкнулись с подготовленной обороной. Мы должны убедиться, что никогда не проиграем."
 FAT_save_what_can_be_saved:0 "Необходимые меры"
 FAT_save_what_can_be_saved_desc:0 "Если мы хотим освободить Герцланд, порабощённый самой мощной империей со времён Гровера II, мы должны ввести чрезвычайное положение по всей стране. Каждый грифон, каждая фабрика, каждое ружьё будет использовано в защите против Империи. Президент-Маршал должен утвердить свою власть и сохранить военное положение для спасения нашей Республики."
 FAT_father_of_republic:0 "Отец Республики"
 FAT_father_of_republic_desc:0 "Мы начнем пропаганду, в ходе которой изобразим Президента-Маршала как великого защитника нашей нации. Сделав это, мы убедимся, что нация всегда сможет сплотиться вокруг символа."
 FAT_the_three_principles_of_the_griffons:0 "Три Грифоньих Принципа"
 FAT_the_three_principles_of_the_griffons_desc:0 "После стабилизации политической ситуации, мы теперь можем сосредоточиться на истинных составляющих нашей нации."
 FAT_liberty:0 "Свобода"
 FAT_liberty_desc:0 "Первой ценностью республики является свобода. Свобода делать то, что хочется делать. Свободно высказывать своё мнение. И, наконец, жить по своему усмотрению."
 FAT_guarantee_freedoms:0 "Гарантировать свободы"
 FAT_guarantee_freedoms_desc:0 "Гарантируя индивидуальные свободы для всех граждан, мы можем убедиться, что они полюбят свою нацию и её правительство."
 FAT_support_the_press:0 "Поддержать прессу"
 FAT_support_the_press_desc:0 "Поддержка свободной прессы, хоть в некоторых случаях это может обернуться против нас, поднимет уровень патриотизма среди народа."
 FAT_democracy_f:0 "Демократия"
 FAT_democracy_f_desc:0 "Вторая ценность республики - демократия. Открытость правительства для всего населения. И возможность для всего населения выбирать своих лидеров."
 FAT_new_institutions:0 "Новые институты"
 FAT_new_institutions_desc:0 "Расширение правительства, используя наш новый гораздо больший бюджет, позволит большему количеству государственных учреждений обслуживать грифонов. Это существенно увеличит функциональность и эффективность правительства."
 FAT_prepare_for_elections:0 "Подготовиться к всеобщим выборам"
 FAT_prepare_for_elections_desc:0 "Мы должны подготовиться к всеобщим выборам, которые решат судьбу нашего правительства. Это будет важнейшим моментом в истории республики."
 FAT_my_work_here_is_done:0 "Мандат реконструкции"
 FAT_my_work_here_is_done_desc:0 "После возвращения Республики в место её рождения мы сталкиваемся с ещё более трудной, чем победа над рейхсармией, задачей: подготовкой населения Герцланда, привыкшего к декадентским и коррумпированным институтам Империи, к участию в справедливом демократическом обществе. Для этого должна быть создана новая администрация."
 FAT_prosperity_f:0 "Процветание"
 FAT_prosperity_f_desc:0 "Третьей и последней ценностью республики является процветание. В соответствии с этой концепцией все наши граждане имеют равные права и возможности. Наша экономика будет направлена на помощь всем гражданам все зависимости от их дохода."
 FAT_land_tax:0 "Земельный налог"
 FAT_land_tax_desc:0 "Земельный налог будет гарантировать, что все смогут стать преуспевающими в нашей стране, если будут введены ограничения на количество земли, которым может владеть один грифон."
 FAT_welfare_for_all:0 "Социальное обеспечение для всех"
 FAT_welfare_for_all_desc:0 "Теперь мы можем расширить действие программ социального обеспечения на всех жителей республики, а не только на самых бедных. Мы сможем обеспечить достаток всем."
 FAT_social_approach:0 "Социальный подход"
 FAT_social_approach_desc:0 "Поскольку мы создали мощную экономическую базу, теперь можно начать поощрять концепции материнства и отцовства среди молодежи. Разумеется, в пределах ответственности."
 FAT_a_dream_realized:0 "Мечта сбылась!"
 FAT_a_dream_realized_desc:0 "Наконец-то мечты сбылись для каждого грифона на наших землях. Мы радостно клекочем, видя взмывающие триколоры над каждым городом. Нет большей радости, чем быть гражданином нашего государства. Как сказала профессиональный игрок в воздушный теннис Альтида Клоусон: 'Я ничего бы не добилась без борьбы'."
 FAT_new_military:0 "Преодолеть наследие военачальников"
 FAT_new_military_desc:0 "[FATGetNewMilitaryDesc]"
 FATNewMilitaryDescMonarch:0 "Чтобы достичь наших военных целей, мы должны провести масштабные реформы доктрины и технологий, а также осуществить милитаризацию и мобилизацию, невиданные со времён Первой революции. Если мы хотим защитить себя от возрождающейся империи, нам необходимо вновь восстановить нашу военную промышленность."
 FATNewMilitaryDescStandard:0 "Чтобы достичь наших военных целей, мы должны провести масштабные реформы доктрины и технологий, а также осуществить милитаризацию и мобилизацию, невиданные со времён Первой революции. Если мы хотим вернуться в Грифенхейм, нам необходимо вновь восстановить нашу военную промышленность!"
 FAT_choose_doctrine:0 "Выбрать свою доктрину"
 FAT_choose_doctrine_desc:0 "Наши члены генштаба поддерживают различные доктрины и теперь настало время выбрать ту, которой мы будем придерживаться для достижения целей."
 FAT_speak_herzlander:0 "Преподавать гриффиш"
 FAT_speak_herzlander_desc:0 "Пока многие грифоны у власти используют гриффишский диалект, в наших же интересах преподавать его в каждой школе страны, постепенно вытесняя клаудбьюрийский язык из государственных процессов до освобождения Грифенхейма - и получения этим регионом большей автономии."
 FAT_require_government_bilingualism:0 "Обязательное двуязычие для госслужащих"
 FAT_require_government_bilingualism_desc:0 "Большая часть наших госслужащих не говорят на клаудбьюрийском и не могут общаться с большей частью страны. Мы должны исправить это, сделав знание клаудбьюрийского обязательным для сенаторов и чиновников."
 FAT_reduce_banditry_tp:0 "Взятие этого фокуса будет постепенно удалять национальный дух §YБандитизм§!\n"
 FAT_reduce_banditry2_tp:0 "Взятие этого фокуса увеличит скорость удаления национального духа §YБандитизм§!\n"
 FAT_reduce_famine_tp:0 "Взятие этого фокуса будет постепенно удалять национальный дух §YГолод§!\n"
 FAT_take_matters_into_our_own_hands:0 "Перехватить бразды правления"
 FAT_take_matters_into_our_own_hands_desc:0 "Республика слаба и неэффективна. Мы должны вмешаться и, используя Чрезвычайное положение, спасти народ от бюрократии и нестабильности, охвативших Республику."
 FAT_state_industrial_plan:0 "Вмешательство в экономику"
 FAT_state_industrial_plan_desc:0 "Государство должно активно участвовать в экономике, поддерживая промышленные центры. В противном случае мы ничем не будем отличаться от прежнего правительства, неспособного справиться с двумя главными проблемами севера – разгулом преступности и экономическим кризисом."
 FAT_mass_mobilization:0 "Милитаризация и мобилизация"
 FAT_mass_mobilization_desc:0 "Мы должны превратить нашу нацию в военный лагерь, если хотим одолеть Империю, которая рано или поздно придёт за нами. Форты, военные заводы, пропаганда – всё это необходимо, если мы хотим спасти страну от имперской угрозы."
 FAT_enforce_the_herzlander_dialect:0 "Насаждать гриффишский диалект"
 FAT_enforce_the_herzlander_dialect_desc:0 "Жители севера – клаудбьюрийцы – всё ещё цепляются за свои устаревшие традиции и культуру. Мы должны цивилизовать их и интегрировать в республику. Им необходимо привить наш диалект, чтобы они могли говорить с нами и принять нашу культуру."
 FAT_temporarily_suspend_parliament:0 "Приостановить работу Парламента."
 FAT_temporarily_suspend_parliament_desc:0 "Мы приостановили работу Конституции, но всё ещё есть те, что выступают против военного положения в Республике. Они сидят в парламенте и парализуют работу правительства. Мы должны разобраться с ними и взять власть в свои когти."
 FAT_permanent_stability:0 "Революция спасена"
 FAT_permanent_stability_desc:0 "Наша нация в безопасности. У нас есть промышленность, мы разгромили коммунистов и бандитов. Теперь, когда мы объединили грифонов республики, восстановили мир и стабильность, мы можем двигаться дальше, к новым делам и свершениям."
 FAT_new_navy:0 "Флот, способный бросить вызов Роттендедаму"
 FAT_new_navy_desc:0 "[FATGetNewNavyDesc]"
 FATGetNewNavyDescStandard:0 "С момента рождения нашей Республики у нас не было ни единого корабля под командованием. Пришло время это изменить. Создание полноценного флота даёт нам прекрасную возможность установить господство на морях северной Грифонии."
 FATGetNewNavyDescMonarch:0 "На протяжении многих веков флот Клаудбьюри ходил в тени обширных морских сил Фетизии. Пришло время это изменить. С созданием великого клаудбьюрийского флота мы наконец станем теми, кто будет править морями северной Грифонии."
 FAT_battleship_focus:0 "Доктрина Саксхаген-Плюменьяра"
 FAT_battleship_focus_desc:0 "Отто Саксхаген-Плюменьяр - дальний родственник старых правителей Клаудбьюри. Несмотря на его монархическое происхождение, Кемерскай сохранил жизнь его матери и ему, а позже, позволил Отто стать адмиралом. Отто является сторонником сильного флота, способного одолеть противника численным превосходством, огневой мощью и бронёй."
 FAT_destroyer_focus:0 "Доктрина Хассентельфа"
 FAT_destroyer_focus_desc:0 "Герман Хассентельф - выдающийся адмирал и верный республиканец ещё со времён Революции 978 года. Он уже тогда был офицером флота, а звание адмирала получил после Великого Похода. Так как у нас нет линкоров и авианосцев, Герман предлагает оперировать небольшими кораблями, более быстрыми и гибкими, чем линкоры."
 FAT_navy_investment:0 "Расширение портов Вингхагена"
 FAT_navy_investment_desc:0 "[FATGetNavyInvestmentDesc]"
 FATGetNavyInvestmentDescStandard:0 "Город-порт Вингхаген – один из крупнейших городов республики. Тем не менее, проблемы очевидны: большая часть используемого там оборудования устарела. Если мы выделим часть средств и национализируем все верфи, то сможем без труда превратить Вингхаген в величайший порт северной Грифонии."
 FATGetNavyInvestmentDescMonarch:0 "Город-порт Вингхаген – один из крупнейших городов герцогства. Тем не менее, проблемы очевидны: большая часть используемого там оборудования устарела. Если мы выделим часть средств и национализируем все верфи, то сможем без труда превратить Вингхаген в величайший порт северной Грифонии."
 FAT_navy_doctrine:0 "Сфокусироваться на нашей доктрине"
 FAT_navy_doctrine_desc:0 "Как и все грифоны, наше новое адмиралтейство любит много спорить. Это довольно непродуктивно. Но если мы будем уделять особое внимание сосредоточению наших офицеров и адмиралов на совместной работе вместо того, чтобы спорить, это было бы очень полезно для всех нас."
 FAT_new_battleships:0 "Комиссия по линкорам"
 FAT_new_battleships_desc:0 "Линейные корабли должны быть бесспорными правителями морской войны, ясно, что они решат исход всех морских сражений, поэтому мы должны получить их в распоряжение. Хороший повод начать использовать наши новые великолепные верфи в Вингхагене для их создания. Нам предложили два перспективных проекта: класс дредноутов и класс Атреус."
 FAT_new_destroyers:0 "Купить эсминцы"
 FAT_new_destroyers_desc:0 "Эсминцы составляют основу нашего флота, это не изменится в ближайшее время. Мы должны купить несколько технологически продвинутых кораблей в не очень хорошем состоянии, разобрать их на части, узнать о них все и использовать эти знания для разработки собственных проектов."
 FAT_new_submarines:0 "Получить подводные лодки"
 FAT_new_submarines_desc:0 "Подводные лодки - это новый тип корабля, они появились всего несколько лет назад. Но, похоже, что они могут полностью изменить военно-морскую войну. Использовав некоторые наши «не очень законные» связи, мы сможем получить несколько подводных лодок. Изучив их, мы многое узнаем о их конструкции и, в итоге, сможем построить собственные."
 FAT_more_navy_investment:0 "Второй порт на побережье"
 FAT_more_navy_investment_desc:0 "Наш единственный порт на побережье Небесного залива – Вингхаген. Он может быть разрушен врагом или природным катаклизмом. Такой поворот событий лишит нас возможности держать флот. Новый порт на границе с Фетизией расширит наши возможности по проецированию морской мощи и обеспечит резервный путь снабжения флота."
 FAT_perfect_the_saxhagen_plumenjar_doctrine:0 "Развить доктрину Саксхаген-Плюменьяра"
 FAT_perfect_the_saxhagen_plumenjar_doctrine_desc:0 "Теперь, когда у нас есть возможность строить дредноуты, мы можем развить доктрину Саксхаген-Плюменьяра и построить флот, способный одолеть флот Фетизии или любого другого врага."
 FAT_perfect_the_hassentelf_doctrine:0 "Развить доктрину Хассентельфа"
 FAT_perfect_the_hassentelf_doctrine_desc:0 "Герман Хассентельф развил свою доктрину эсминцев и крейсеров. Они уже массово производятся на наших верфях, и мы уже почти готовы к схватке за Небесный залив."
 FAT_perfect_the_marines:0 "Последний шаг"
 FAT_perfect_the_marines_desc:0 "[FATGetMarinesDesc]"
 FATGetMarinesDescStandard:0 "Последним шагом в великой реформе республиканского флота станет официальное создание республиканского корпуса морской пехоты, чтобы наши войска могли смело выходить в море для вторжения в Хаукленд и даже, если ситуация станет критической, противостоять эквестрийской угрозе на западе."
 FATGetMarinesDescMonarch:0 "Последним шагом в великой реформе королевского флота станет официальное создание королевского корпуса морской пехоты, чтобы наши войска могли смело выходить в море для вторжения в Хаукленд и даже, если ситуация станет критической, противостоять эквестрийской угрозе на западе."
 FAT_new_airforce:0 "Восстановить наши ВВС"
 FAT_new_airforce_desc:0 "Только у нескольких самых могущественных стран на грифоньем континенте есть ВВС, и мы должны присоединиться к ним. Иметь машины, что летают в небе и атакуют врагов внизу, или сохраняют превосходство в воздухе - относительно новые концепции, но они действительно могут изменить ход войны, и мы не можем позволить себе оставаться позади в таком деле."
 FAT_fighter_focus:0 "Высотные истребители Густава"
 FAT_fighter_focus_desc:0 "Самой важной частью воздушной войны является контроль над небом, и поэтому мы должны сосредоточить свои усилия на создании самолетов, которые позволили бы нам это сделать. Наши самолеты должны быть относительно маленькими и проворными, чтобы наши пилоты могли атаковать вражеские бомбардировщики и истребители, оставаясь в безопасности."
 FAT_bomber_focus:0 "Всепогодные бомбардировщики Вальдемара"
 FAT_bomber_focus_desc:0 "Предпосылка новой воздушной войны заключается в уничтожении максимально возможного числа войск противника и его промышленности. Мы должны сосредоточиться на создании самолетов, которые могли бы нести как можно больше бомб, проникая глубоко во вражескую территорию."
 FAT_get_air_doctrine:0 "Совершенствование нашей воздушной доктрины"
 FAT_get_air_doctrine_desc:0 "Нам не хватает собственных пилотов, поэтому мы должны сосредоточить внимание на установлении контактов с ветеранами из других стран. Если бы мы хорошо заплатили этим пилотам, то они с радостью поделились бы с нами своими знаниями о тактике и стратегии."
 FAT_new_bombers:0 "Получить новые чертежи бомбардировщиков"
 FAT_new_bombers_desc:0 "Иностранные пилоты, которые прибыли к нам из других стран, иногда привозили с собой не только знания. Если бы мы объединили все это вместе, то смогли бы воссоздать рабочие чертежи."
 FAT_new_fighters:0 "Комиссия по новым истребителям"
 FAT_new_fighters_desc:0 "Наши пилоты запросили новый комплект истребителей. После переговоров и закулисных сделок, наши учёные разработали новые модели истребителей с учётом всех пожеланий пилотов."
 FAT_industry_for_air:0 "Восстановление авиационной промышленности"
 FAT_industry_for_air_desc:0 "[FATGetAirIndustryDesc]"
 FATGetAirIndustryDescStandard:0 "Наши авиабазы и военные заводы, производящие самолёты и другое оборудование для армии, пришли в упадок. Мы должны восстановить авиационную промышленность, если хотим по-настоящему создать современную республиканскую авиацию."
 FATGetAirIndustryDescMonarch:0 "Наши авиабазы и военные заводы, производящие самолёты и другое оборудование для армии, пришли в упадок. Мы должны восстановить авиационную промышленность, если хотим по-настоящему создать современную королевскую авиацию."
 FAT_hire_the_red_berets:0 "Нанять «Красных беретов»"
 FAT_hire_the_red_berets_desc:0 "[FATGetRedBeretsDesc]"
 FATRedBeretDescStandard:0 "«Красные береты», независимый республиканский отряд времён Революции и один из немногих противников Майера во время его отступления в Хаукленд. Их лидер, Вельма Катманн, прославилась тем, что сокрушала любые силы Майера, осмелившиеся атаковать республику. Стоит интегрировать её отряд в республиканскую армию."
 FATRedBeretDescMonarch:0 "«Красные береты», независимый республиканский отряд времён Революции и один из немногих противников Майера во время его отступления в Хаукленд. Их лидер, Вельма Катманн, прославилась тем, что сокрушала любые силы Майера, осмелившиеся атаковать материк. Нам следует примириться и интегрировать её силы в королевские ВВС."
 FAT_industrialist_support:0 "Инвестиции семьи Ривсталь"
 FAT_industrialist_support_desc:0 "Густав Ривсталь является не только исключительно талантливым лётчиком, но и членом могущественной династии Клаудбьюри, обладающей широкими связями в правительстве. К счастью, семья Ривсталь весьма довольна нашей поддержкой его авиационных инициатив – теперь мы можем извлечь ещё больше преимуществ из прямого сотрудничества с этой семьёй."
 FAT_expand_rivstal_doctrine:0 "Расширить доктрину Ривсталя"
 FAT_expand_rivstal_doctrine_desc:0 "Наши истребители, как орлы с небес, должны бросаться вниз и уничтожать любых врагов быстро и точно. Однако, как указывает Ривсталь, мы также должны защищать наши самолеты во время их атак, потому что самолёты семьи Ривсталь стоят недёшево."
 FAT_expand_deshrecht_doctrine:0 "Расширить доктрину Дешрехта"
 FAT_expand_deshrecht_doctrine_desc:0 "— Бомбим их, пока они не сдадутся! — вот политика Вальдермара Дешрехта, которой крайне недоставало слабым умам республиканских военных. Иногда грифону просто нужно научиться разрушать что-то, и этот принцип, к сожалению, часто забывается многими."
 FAT_glorious_fat_air_force:0 "Пролетая высоко над Майером"
 FAT_glorious_fat_air_force_desc:0 "[FATGetGloriousAirForceDesc]"
 FATGetGloriousAirForceDescStandard:0 "Майер мог украсть нашу авиацию, но точно не нашу гордость! С развёртыванием новых авиакрыльев и завершением исследований мы наконец можем искренне сказать, что изгнали эту заразу из Клаудбьюри и избавились от последствий предательство Майера."
 FATGetGloriousAirForceDescMonarch:0 "Проныра Майер похитил большую часть республиканской авиации и с тех пор раз за разом нападал на наше побережье вместе со своей шайкой. К счастью, с созданием и развитием собственных королевских ВВС, способных противостоять любым угрозам нашему воздушному пространству, эта напасть наконец перестанет преследовать Клаудбьюри."
 FAT_grand_1:0 "Мудрость маршала Роузвинг"
 FAT_grand_1_desc:0 "Мы должны планировать каждую атаку, каждую оборону, каждое отступление и каждое наступление. Нам нужно изменить нашу армию, превратив её во что-то, напоминающее часовой механизм, где каждое действие планируется, обсуждается и реализуется только после того, как все уверены, что это правильный курс."
 FAT_grand_2:0 "Создать инженерные подразделения"
 FAT_grand_2_desc:0 "Мы должны убедиться, что наши подразделения сохранят свои позиции. Мы должны сосредоточиться на добавлении специализированных подразделений, основной задачей которых будет укрепление районов, занимаемых нашими войсками."
 FAT_grand_3:0 "Перетасовать наш штаб"
 FAT_grand_3_desc:0 "Наши недавние изменения в нашей армии, в настоящее время, в основном озаботились лишь нашим верховным командованием и нашими подразделениями. Но мы ничего не сделали в отношении большинства наших штаб-квартир или менее важных генералов. Сегодня это изменится, поскольку мы убедимся, что каждый из них будет следовать нашей доктрине чрезмерного планирования."
 FAT_grand_4:0 "Защитные тактики Сикамеона"
 FAT_grand_4_desc:0 "Армия Сикамеона была одной из немногих сил, способных сопротивляться армии Империи. В 773 они даже разбили армию Императора Гровера I. Мы должны исследовать и адаптировать их опыт для нашей ситуации. С этим опытом мы создадим армию, способную защитить нацию и превратить жизнь любого врага в Тартар."
 FAT_superior_1:0 "Мудрость Маршала Кемерская"
 FAT_superior_1_desc:0 "Зачем тратить жизнь наших граждан и умение думать независимо от наших командиров, если бы мы могли просто выбросить сотни, если не тысячи артиллерийских снарядов на врага?"
 FAT_superior_2:0 "Внести порядок в нашу армию"
 FAT_superior_2_desc:0 "Наша армия - это не самая дисциплинированная группа войск, возникает риск попадания наших войск под дружественный огонь. Поэтому мы должны сосредоточиться на создании специальных подразделений, которые будут следить за тем, чтобы каждый из наших солдат действовал так, как должен."
 FAT_superior_3:0 "Выделенные артиллерийские расчеты"
 FAT_superior_3_desc:0 "Теперь, когда мы уверены, что артиллерийский огонь не закончится массовыми жертвами на нашей стороне, мы должны дать нашим дивизиям специальные небольшие артиллерийские расчеты, дабы наши подразделения всегда могли взять даже самую укрепленную позицию противника."
 FAT_superior_5:0 "Реактивная артиллерия"
 FAT_superior_5_desc:0 "Империя, и не только, стремится развивать свою реактивную артиллерию. Мы не должны отставать от них и внедрить её в армию."
 FAT_superior_4:0 "Сила артиллерии"
 FAT_superior_4_desc:0 "С помощью наших орудий мы сможем использовать тактику «Заградительного огня», которой можно будет заставить врагов покинуть укрепления перед наступлением."
 FAT_mass_1:0 "Мудрость Маршала Сантейла"
 FAT_mass_1_desc:0 "Производство миллионов снарядов или составление тщательных планов сражений звучит неплохо, но всё это требует слишком много времени и не слишком эффективно. Вместо этого мы можем натренировать каждого дееспособного грифона, вручить ему пистолет и отправить на фронт. Таким образом, у нас не будет недостатка в солдатах."
 FAT_mass_2:0 "Убедить ополчение присоединиться" 
 FAT_mass_2_desc:0 "В нашей стране много более или менее преданных нам вооруженных формирований. Если мы свяжемся с их лидерами и предложим им амнистию, богатство или просто пообещаем предоставить им врага, чтобы стрелять, мы, возможно, могли бы заставить многие из этих ополчений присоединиться к нашей армии как костяк нескольких новых подразделений."
 FAT_mass_3:0 "Амнистия для разбойников"
 FAT_mass_3_desc:0 "Теперь вместо того, чтобы предлагать амнистию лишь лидерам и офицерам, мы распространим её на каждого грифона, когда-либо сражавшегося против нас. Это, несомненно, укрепит нашу рабочую силу."
 FAT_mass_4:0 "Искупление в смерти" 
 FAT_mass_4_desc:0 "Мы могли бы распространить нашу программу амнистии на каждого заключенного в нашей стране, будь то военнопленный, ужасный преступник или просто обычный вор, неважно. Мы дадим им всем возможность искупить любые преступления, которые они совершили, если они согласятся сражаться в наших рядах."
 FAT_an_academy_in_the_north:0 "Военная академия в Лостгейте"
 FAT_an_academy_in_the_north_desc:0 "Хотя в Клаудбьюри есть много военных школ, на севере остро не хватает академий, преподающих военную стратегию. Чтобы исправить это, наше государство, [Root.GetName], объявило о создании «Военной академии Лостгейта», которая будет обучать тактике и стратегии генералов и исследователей на севере."
 FAT_marshal_rifle:0 "Вернуть наши запасы"
 FAT_marshal_rifle_desc:0 "В нашей стране хватает оружия. Из-за всех недавних конфликтов и высокой милитаризации совсем нетрудно найти места с неохраняемыми и необеспеченными запасами оружия. Наша армия только выиграет, если мы установим контроль над этими запасами."
 FAT_marshal_rifle_quality:0 "Качество важнее количества"
 FAT_marshal_rifle_quality_desc:0 "Наши военные советники поняли, что количество оружия не так важно, если оно будет устаревшим или неисправным. Вместо этого мы используем наш опыт для создания лучшего, более качественного оружия."
 FAT_marshal_rifle_quantity:0 "Отправить всех на фабрики"
 FAT_marshal_rifle_quantity_desc:0 "Чтобы сразиться с плохим парнем нужна только пушка. Если это не сработает - используйте больше пушек."
 FAT_arty:0 "Модернизировать артиллерию"
 FAT_arty_desc:0 "Теперь, когда наши войска должным образом оснащены винтовками, нам нужно обратить внимание на артиллерийские орудия большего калибра, и если мы будем использовать опыт, накопленный нами при работе с карабинами, вполне возможно, что мы сможем значительно улучшить наш нынешний дизайн."
 FAT_sup:0 "Реорганизация подразделений поддержки"
 FAT_sup_desc:0 "Хотя солдаты с оружием являются основной силой в армии, единицы, которые оказывают им поддержку, одинаково важны. Тем не менее, в нашей доктрине это постоянно упускалось из виду, но сегодня наступил день, чтобы всё изменить, и с этого момента мы будем оптимизировать свою командную цепочку и убедимся, что специалисты готовы к своим назначениям."
 FAT_magic_equip:0 "Использовать кристаллы" 
 FAT_magic_equip_desc:0 "Используя магические кристаллы, мы можем создать совершенно новый вид оружия, который использует не баллистическую энергию, а магию вместо неё. Такие пушки могут изменить саму природу ведения войны. Наши земли полны кристаллами для этого оружия, будет глупо не использовать их."
 FAT_radar:0 "Создать РАДАР"
 FAT_radar_desc:0 "Эквестрийские учёные разработали РАДАР - технологию, способную обнаруживать врагов до того, как они вступят в бой. Наша промышленность уже переняла многое у Эквестрии, так что мы не будем иметь сложностей с РАДАРами."
 FAT_winter_training:0 "Преодолеть зимы Клаудбьюри"
 FAT_winter_training_desc:0 "[FATGetWinterTrainingDesc]"
 FATGetWinterTrainingDescStandard:0 "Зимы в Клаудбьюри – одни из самых суровых во всей Грифонии, и хотя мы находимся здесь уже около тридцати лет, многие наши солдаты так и не привыкли к этим условиям. Пришло время начать зимнюю подготовку, чтобы наши армии могли отражать атаки неподготовленных имперских войск с юга, так же как Клаудбьюри сделал это во время нашего наступления."
 FATGetWinterTrainingDescMonarch:0 "Зимы в Клаудбьюри – одни из самых суровых во всей Грифонии, и войска Клаудбьюри должны уметь блистать в таких условиях. Пришло время начать зимнюю подготовку, чтобы наши армии могли отражать атаки неподготовленных имперских войск с юга, так же как мы сделали это во время республиканского наступления."
 FAT_mountain_training:0 "Преодолеть горы Клаудбьюри"
 FAT_mountain_training_desc:0 "[FATGetMountainTrainingDesc]"
 FATGetMountainTrainingDescStandard:0 "Пришло время перенять тактику у жителей Клаудбьюри и обучить наши войска обороне в горах Клаудбьюри, а также в горах северного Клубничного Герцогства и Уайттейла. Если мы хотим победить Империю, мы должны научиться использовать эти важные стратегические позиции как в обороне, так и в наступлении."
 FATGetMountainTrainingDescMonarch:0 "Пришло время усовершенствовать нашу традиционную оборонительную доктрину и обучить войска обороне в горах Клаудбьюри, а также в горах северного Клубничного Герцогства и Уайттейла. Если мы хотим победить Империю, мы должны научиться использовать эти важные стратегические позиции как в обороне, так и в наступлении."
 FAT_heavy_tanks:0 "Тяжёлые танки"
 FAT_heavy_tanks_desc:0 "Теперь, когда мы занимаемся исследованиями танков, мы можем создать тяжёлые танки. С ними мы сможем бросить вызов Империи и их доктрине мобильной войны."
 FAT_motorized_equip:0 "Механизировать нашу армию"
 FAT_motorized_equip_desc:0 "Грузовики являются очень ценным и эффективным средством передвижения и снабжения, но они крайне уязвимы. Инженеры предложили создать бронетранспортёры, которые смогут подвозить войска намного ближе к линии фронта."
 FAT_tanks:0 "Бронированный клин"
 FAT_tanks_desc:0 "Танки начали играть существенную роль в современной войне. Многие наши соседи, как и мы, долго игнорировали этот факт, но это должно прекратиться! Исследования и производство этих транспортных средств должны начаться как можно скорее!"
 FAT_pure_infantry_tactics:0 "Исключительно пехотная тактика"
 FAT_pure_infantry_tactics_desc:0 "Дополнительное снаряжение и артиллерия - это блажь. Всем известно, что лучшая стратегия - бросить достаточно грифонов в атаку (повторять до победы)."
 FAT_republican_volunteer_corps:0 "Республиканские добровольческие корпуса"
 FAT_republican_volunteer_corps_desc:0 "Не только в Герцланде стремятся к идеалам Республики. Если где-либо произойдёт антимонархическая революция, мы должны сделать все, чтобы поддержать их."
 FAT_propaganda_on_every_corner:0 "Пропаганда из каждого утюга"
 FAT_propaganda_on_every_corner_desc:0 "Многие грифоны всё ещё хотят, чтобы мы оставались на севере и не вмешивались в дела Герцланда. Они должны быть убеждены в обратном."
 FAT_declare_national_emergency:0 "Объявить Чрезвычайное Положение"
 FAT_declare_national_emergency_desc:0 "Сейчас Республике далеко до хотя бы относительной стабильности. Мы должны сделать всё для того, чтобы защитить страну от внутренних и внешних врагов."
 FAT_the_iron_marshal:0 "Железный Маршал"
 FAT_the_iron_marshal_desc:0 "Наш славный Президент-Маршал Александр Кемерскай объявил военное положение для стабилизации нации и решил отказаться от вторжения в Герцланд. Стабильность восстановлена и нация должна заняться общественным преобразованиями, чтобы построить свободный и независимый бастион порядка на Севере. Мы должны разобраться с предателями-гармонистами."
 FAT_purge_the_socialists:0 "Изгнать красных"
 FAT_purge_the_socialists_desc:0 "Социалисты слишком долго мешали нам. Несмотря на свои слова о поддержке демократии, они подрывали единство нации и работу правительства. Они не достойны называть себя республиканцами."
 FAT_crackdown_on_the_unions:0 "Запретить союзы"
 FAT_crackdown_on_the_unions_desc:0 "Профсоюзы давно были замечены в продвижении идей социализма. Нам пора разобраться с ними. Мы переманим рабочих на нашу сторону улучшением условий труда."
 FAT_anti_skynavian_propaganda:0 "Раскрыть преступление Скайнавии"
 FAT_anti_skynavian_propaganda_desc:0 "Многие социалисты забыли, что именно они покинули нашу великую Республику в 986, чем ввергли её в хаос и анархию. Не пора ли на напомнить им об этом? "
 FAT_no_more_skynavian_sympathizers:0 "Триколор, а не серп и молот"
 FAT_no_more_skynavian_sympathizers_desc:0 "Пора нам перейти в горы на севере, и завершить эксперимент Спэрроусбейна по расколу Республики. Мы не будем жалеть скайнавских террористов и их испорченную и утопичную идеологию."
 FAT_pacify_the_cities:0 "Усмирить города"
 FAT_pacify_the_cities_desc:0 "Города по прежнему являются домом для противников нашего режима, не ценящих принесённые нами стабильность и порядок. Они должны быть наказаны, а республиканские идеи должны быть со временем восстановлены в этих городах."
 FAT_raid_radical_organizations:0 "Выкурить их из укрытий"
 FAT_raid_radical_organizations_desc:0 "Фашисты, революционеры и социалисты скрываются повсюду. Мы должны атаковать их укрытия и уничтожить их запасы оружия и взрывчатки, иначе это всё будет использовано для подрыва Республики."
 FAT_continue_promising_democracy:0 "Продолжать обещать демократию"
 FAT_continue_promising_democracy_desc:0 "Свобода и демократия всё ещё являются нашими принципами. Сейчас, в разгар хаоса, мы не можем следовать им, но никто не запрещает нам создать иллюзию следования идеалам свободы и демократии."
 FAT_a_loyal_cabinet:0 "Открыть символический Парламент"
 FAT_a_loyal_cabinet_desc:0 "Народу нужен парламент, хотя бы для вида. Из-за того, что у нас есть только одна партия, демократичными выборы не будут, но важен не результат, а сам процесс голосования."
 FAT_police_on_the_streets:0 "Полиция на улицах"
 FAT_police_on_the_streets_desc:0 "Если у нас будет больше полицейских на улицах, то будет меньше желающих выступить с оружием в когтях против нашей Республики. Это простое, но эффективное решение."
 FAT_end_the_winghagen_republic:0 "Уничтожить оппозицию"
 FAT_end_the_winghagen_republic_desc:0 "Корнелиус Винке - безумец, имеющий некоторое количество сторонников. Они воюют против нашего правительства, несмотря на наши усилия по усмирению городов. Нам пора послать войска в Бликспайр и уничтожить их."
 FAT_reverse_986:0 "Месть за предательство 986-го"
 FAT_reverse_986_desc:0 "Социалистические гады сбежали от нас в 986-ом году, когда Президент-Маршал Кемерскай приостановил действие конституции для защиты принципов Республики. Из-за них Республика оказалась в состоянии хаоса и анархии, а они построили там свою "утопию". Пора им напомнить о том, что Республика не прощает."
 FAT_the_marshals_last_days:0 "Последние дни Маршала"
 FAT_the_marshals_last_days_desc:0 "Произошло немыслимое! Наш Президент-Маршал заболел вскоре после разгрома Скайнавии, и собрал ближайших советников и своего сына, Александра Кемерская-младшего для того, чтобы обсудить будущее Республики."
 FAT_the_marshal_knows_best:0 "Продолжение диктатуры"
 FAT_the_marshal_knows_best_desc:0 "Александр Кемерскай-младший решил продолжить политику отца и сохранить военную диктатуру. Продолжаются преследования монархистов и прочих антиреспубликанских элементов. Судя по всему, демократия пока не грозит Республике. Не при Кемерскае-младшем уж точно."
 FAT_an_end_to_vedina:0 "Падение Ведины"
 FAT_an_end_to_vedina_desc:0 "Ведина и её народ должен быть включён в Республику силой. Этой прогнившей монархии не удастся прикрыться демократической мишурой."
 FAT_i_dislike_sunstriker:0 "Бандитизму бой!"
 FAT_i_dislike_sunstriker_desc:0 "Лидеры Уайттейла должны быть призваны с ответу. Вне зависимости от политической принадлежности, они будут осуждены за отказ от интеграции в Республику."
 FAT_resist_the_imperialists:0 "Отпор империализму"
 FAT_resist_the_imperialists_desc:0 "Нашим величайшем врагом является Империя, они до сих пор стремятся уничтожить нас и наши надежды. Но мы не сдадимся! Пока стоит Клаудбьюри и развевается триколор над ним, мы не отступим!"
 FAT_suppress_the_natives:0 "Борьба с клаудбьюрийцами"
 FAT_suppress_the_natives_desc:0 "Тобиас Сивенхоф и его организация, защищающая права клаудбьюрийцев, неконституционна и чрезвычайно опасна для Республики и НРП. Мы должны занять твёрдую позицию и разгромить повстанцев в сельской местности!"
 FAT_everything_for_the_defense_of_the_republic:0 "Все на защиту нации"
 FAT_everything_for_the_defense_of_the_republic_desc:0 "Вся наша нация построена на борьбе с Империей. Мы должны быть смелыми и адекватно оценивать ситуацию для того, чтобы одолеть её."
 FAT_military_supremacy:0 "Возвысить военных"
 FAT_military_supremacy_desc:0 "Полезность военных для Республики и нации серьёзно недооценена. Мы должны дать этим защитникам Революции больше власти и влияния. Они олицетворяют то, к чему мы все стремимся - честь, долг и профессионализм."
 FAT_a_hereditary_dictatorship:0 "Система передачи власти"
 FAT_a_hereditary_dictatorship_desc:0 "До сих пор семья Кемерскай вела Республику к свободе, процветанию и демократии. Система передачи власти сделает нашу Республику ещё лучше!"
 FAT_continue_national_emergency:0 "Найти способных советников"
 FAT_continue_national_emergency_desc:0 "Мы должны найти новых советников для усиления нашего правительства. Виктор Кингфезер - брат Генриха Кингфезера, юрист и капиталист, станет новым министром пропаганды и, несомненно, поможет делу Республики."
 FAT_keep_them_happy:0 "Гражданско-военное единство"
 FAT_keep_them_happy_desc:0 "Даже старый маршал признавал, что именно военные, а не гражданские и политики Клаудбьюри создали текущую республику. Мы должны вернуться в ту эпоху и укрепить политический контроль в рамках синтеза военной и гражданской власти. Коррумпированные политики или дворяне больше не будут править простыми гражданами."
 FAT_reshape_the_dream:0 "Расширить акты 986-го"
 FAT_reshape_the_dream_desc:0 "Закон о спасении Республики 986 года должен быть переработан и расширен в соответствии с нынешней ситуацией. Мы должны подавить тех, кто хочет подорвать единство Республики изнутри и отринуть демократическую мишуру."
 FAT_perpetual_political_tutelage:0 "Постоянная опека"
 FAT_perpetual_political_tutelage_desc:0 "В "Трёх этапах Революции" Кемерскай описывает основные принципы Республики. Теперь, когда первый, военный этап завершился, мы должны перейти к политике опеки, чтобы приготовить наших грифонов к демократии."
 FAT_prosperity_under_kemerskai:0 "Гарантии Процветания"
 FAT_prosperity_under_kemerskai_desc:0 "Теперь, когда у нас развязаны когти, мы можем заняться важным делом - повышением уровня жизни наших граждан. Их уровень жизни не должен зависеть от политических и международных условий."
 FAT_nationalism_prosperity_security:0 "Республика без демократии"
 FAT_nationalism_prosperity_security_desc:0 "Мы вернули Три Принципа Республики в дело, и теперь мы должны защитить Республику от монархий и других угроз со всего мира. Слава роду Кемерскаев, защищающих нас от зла!"
 FAT_restore_democracy:0 "Выполнить обещания"
 FAT_restore_democracy_desc:0 "Свобода, процветание и демократия являются основой республики. У нас не может быть иного пути, и мы никогда не должны снова позволить авторитаризму и военному положению охватить республику."
 FAT_restore_the_unions:0 "Разрешить профсоюзы вновь"
 FAT_restore_the_unions_desc:0 "Профсоюзы являются краеугольным камнем демократического и процветающего общества. Рабочие должны иметь возможность высказаться о политике государства и корпораций. Правда, коммунисты могут испортить эту идиллию, но мы сумеем с ними разобраться."
 FAT_continue_anti_communism:0 "Продолжить антикоммунистическую политику"
 FAT_continue_anti_communism_desc:0 "Кемерскай, при всех своих недостатках, понимал одну важную вещь - опасность социализма для Республики и её принципов. Возможно, Кемерскай перегибал палку, но, в целом, он был прав - подавление социалистов необходимо для сохранения демократии."
 FAT_rebuild_skynavia:0 "Восстановление Скайнавии"
 FAT_rebuild_skynavia_desc:0 "После авантюры Кемерская по захвату Скайнавии, те земли были разорены и ввергнуты в хаос. Откликающийся Лес должен быть интегрирован в Республику, а индустрия и инфраструктура Скайнавии должна быть восстановлена для того, чтобы стать полноценной частью Республики."
 FAT_a_true_parliament:0 "Собрать Парламент"
 FAT_a_true_parliament_desc:0 "В годы военного положения действие парламента было приостановлено. Во время грифоньего опекунства был создан Символический Парламент. Теперь же мы должны возродить парламент и восстановить попранные принципы свободы и демократии."
 FAT_a_free_press:0 "Действительно свободная пресса"
 FAT_a_free_press_desc:0 "Свобода печати должна быть восстановлена. Каждый должен иметь возможность высказаться о нашем правительстве, министрах и политике, даже если он их не одобряет. Мы дольше не будем осуждать наших граждан за их взгляды."
 FAT_restore_opposition_parties:0 "Разрешить оппозиционные партии"
 FAT_restore_opposition_parties_desc:0 "В республике существует множество политических фракций, не представленных в НРП, особенно после чисток Кемерская. Либералы, социал-демократы и даже некоторые консерваторы остались без партии, подходящей их взглядам. Хватит это терпеть!"
 FAT_fresh_elections:0 "Свежие выборы"
 FAT_fresh_elections_desc:0 "Настал час закончить эру Кемерская и начать истинно демократическую эру в истории нашей Республики. Мы проведём новые, конкурентные выборы с двумя и более кандидатами. Авторитаризм должен быть отброшен ради восстановления Трёх Принципов Республики."
 FAT_the_dream_is_not_dead:0 "И снова в бой"
 FAT_the_dream_is_not_dead_desc:0 "Шнабель Санглайдер много лет состоял в правительстве Кемерская и всегда поддерживал НРП, даже когда начался суд над Кемерскаем и Партией. Несмотря на это и на события в ходе осады Бликспайра, мы должны реабилитировать его и вернуть его в правительство."
 FAT_rally_kingfeathers_band:0 "Встреча с Кингфезером"
 FAT_rally_kingfeathers_band_desc:0 "Генрих Кингфезер является ценным кадром из старого правительства Кемерская. Мы можем немного повлиять на расследование республиканского судебного комитета и снять с него обвинения, а потом ввести его в правительство."
 FAT_investigate_the_loyalists:0 "Дело роялистов"
 FAT_investigate_the_loyalists_desc:0 "Николь Роузвинг, Рейнхард Сантейл и Макс Уайтфезер совершили множество преступлений. Мы должны выступить против них и предать их суду, как и подобает настоящей демократической республике."
 FAT_a_true_tricolor_over_griffenheim:0 "Истинный триколор над Грифенхеймом"
 FAT_erode_the_personality_cult:0 "Ограничить исполнительную власть"
 FAT_the_republican_dream:0 "Помните маршала"
 FAT_the_republican_dream_desc:0 "Несмотря на все свои недостатки, Александр Кемерскай дал республике надежду, процветание и свободу. Мы никогда не забудем того воина, который привел нас на север и спас мечту от неминуемой гибели от когтей имперцев. Мы никогда не забудем тебя, отец республики."
 FAT_new_dawn_over_cloudbury:0 "Объединение республики"
 FAT_new_dawn_over_cloudbury_desc:0 "Силы Социалистической Республики Скайнавия освободили республику. Они освободили нас – крестьян и рабочих. Теперь мы должны объединиться и продолжить совершенствовать нашу республику вместе с ними."
 FAT_dealing_with_the_republicans:0 "Судьба республиканцев"
 FAT_dealing_with_the_republicans_desc:0 "По ряду причин республиканцы, либералы и консерваторы, недовольны нашим социалистическим правительством. Нам нужно разгромить их до того, как они нанесут удар."
 FAT_communalist_policies:0 "Примирение с республиканцами"
 FAT_communalist_policies_desc:0 "Многие республиканцы открыты для социалистических идей. До приостановки действия конституции они даже составляли коалицию с Объединённым Социалистическим Фронтом Сиклкло. Большинство республиканцев смогут работать вместе с социалистическим правительством, если мы амнистируем их и вернём им их политические права."
 FAT_internationalist_policies:0 "Удар по предателям"
 FAT_internationalist_policies_desc:0 "Республиканцы борются против всего того, чего мы добились! Диктатура пролетариата в политике и промышленности вызывает у них отвращение, так как они являются обычными прихвостнями капиталистов и ненавидят власть рабочих. Мы должны разобраться с ними и защитить народ от любой угрозы со стороны республиканцев."
 FAT_reconstruction:0 "Новая идентичность"
 FAT_reconstruction_desc:0 "Отныне народ Социалистической Республики Клаудбьюри не должен иметь ничего общего с республиканцами. Они получат то, что заслуживают, они будут свободны и равны со своими скайнавскими товарищами."
 FAT_collectivization:0 "Коллективизировать фермы Севера"
 FAT_collectivization_desc:0 "Республиканское правительство много говорило о защите прав пролетариата, но на словах их деятельность и заканчивалась. Полевые командиры республиканской армии контролировали большую часть сельскохозяйственных угодий, которые они превратили в свои вотчины. Теперь, когда мы правим всей страной, мы должны коллективизировать её."
 FAT_workers_councils:0 "Поддержать рабочие советы"
 FAT_workers_councils_desc:0 "Рабочие должны объединиться для более эффективного противодействия капиталистическим странам, окружающим нас. Мы должны помочь им, создав рабочие советы, которые позволят пролетариям напрямую управлять государством."
 FAT_go_with_sparrowsbane:0 "Председатель Спэрроусбэйн"
 FAT_go_with_sparrowsbane_desc:0 "Мо Спэрроусбэйн - убеждённый интернационалист и сторонник идей Карамель Маркс, один из лидеров восстания против Республики. Он - верный сторонник идей Карамель Маркс, но многие его критикуют за авторитаризм и готовность к чисткам среди инакомыслящих."
 FAT_go_with_astler:0 "Председатель Эстлер"
 FAT_go_with_astler_desc:0 "Демократический социалист и верный сторонник Республики. Многие считают, что если позволить ему стать председателем, то это позволит привлечь к работе на правительство бывших республиканцев. Однако, многие считают, что Эстлер не настоящий социалист и лишь проводник реакции в Клаудбьюри."
 FAT_revise_the_principles:0 "Ревизия Трех Принципов"
 FAT_revise_the_principles_desc:0 "Три Принципа Республики (Процветание, Свобода, Демократия) декларировались как принципы правления Кемерская, но на декларации он и остановился. Мы должны переосмыслить их и приступить к их исполнению. Исполнив их, мы приблизимся к социализму."
 FAT_socialist_prosperity:0 "Принцип социалистического процветания"
 FAT_socialist_prosperity_desc:0 "Первым Принципом республики было Процветание. К сожалению, Кемерскай и другие республиканцы понимали его как предоставление символических подачек рабочим. Мы не остановимся на этом, а дадим им нечто большее - средства производства."
 FAT_socialist_liberty:0 "Принцип социалистической свободы"
 FAT_socialist_liberty_desc:0 "Вторым Принципом республики была Свобода. К сожалению, Кемерскай и другие республиканцы понимали его по-своему, и после приостановки действия конституции, начал репрессии против коммунистов. Теперь же мы дадим рабочим настоящую свободу."
 FAT_socialist_democracy:0 "Принцип социалистической демократии"
 FAT_socialist_democracy_desc:0 "Третьим Принципом республики была Демократия. К сожалению, Кемерскай понимал его как власть демократов. После приостановки действия конституции Кемерскай отменил выборы президента. Его правительство также никогда не давало рабочим самоуправления на заводах. А мы дадим!"
 FAT_state_military_industry:0 "Усиление военной промышленности"
 FAT_state_military_industry_desc:0 "Если мы хотим помочь нашим освободителям из Скайнавии в Великой Отечественной Войне против Империи, мы должны наращивать военную мощь и производить больше оружия. Империя Грифонов совсем рядом с нашими границами, она готовится нанести удар из Фетизии, чтобы разрушить нашу социалистическую мечту, и мы должны сражаться против неё!"
 FAT_expand_industrial_unions:0 "Расширить промышленные кооперативы"
 FAT_expand_industrial_unions_desc:0 "Рабочие имеют полное право распоряжаться плодами своего труда! Мы должны создать новые промышленные кооперативы и расширить существующие, чтобы рабочие могли ощущать себя воистину равными и свободными в нашем справедливом социалистическом обществе."
 FAT_cloudbury_reborn:0 "Возрождены под крылом Скайнавии"
 FAT_cloudbury_reborn_desc:0 "Нас больше не будут преследовать неудачи Кемерская и его Республики. Социализм установлен в Клаудбьюри, и три старых принципа были переделаны во имя социализма. Пролетарии Клаудбьюри теперь едины в борьбе против всех форм реакционных и капиталистических идеологий! Трижды ура Социалистическим Республикам Клаудбьюри и Скайнавии!"
 FAT_president_kingfeather:0 "Президент Кингфезер"
 FAT_president_kingfeather_desc:0 "Президент Кингфезер – прагматичный, консервативный кандидат – вышел победителем и получил мандат доверия. Его правительство станет надёжной защитой от экстремизма, социализма и монархизма, ведь он строит свободный рынок и свободное общество."
 kingfeather_desc:0 "Если бы вы спросили республиканского гражданина, кто же такой Генрих Кингфезер, возможно, второй самый могущественный грифон во всей республике, сделал за последние 4 года, несмотря на его обширные планы, – они вряд ли что-то вам скажут.\n\nГенрих Кингфезер родился в 949 году в Грингейте, Йеле. Обучившись праву и экономике, юный Кингфезер вовсе не казался подходящим кандидатом на позицию революционного лидера, но его прогрессивные правовые прецеденты сделали его одним из самых ярых защитников республиканцев. Будучи в первую очередь адвокатом и политиком, а уже потом революционером, Кингфезер продвигает идеи Республиканской мечты на международном уровне, пытаясь заключить различные договоры как с Эквестрией, так и с Речной Коалицией – хотя обе стороны почти всегда отказываются. Его законодательные и политические действия во время срока Кемерская смягчили общественную нестабильность и недовольство действиями республиканцев, но это не спасло республику в военном плане.\n\nКингфезер, вместо участия в Великом походе, сбежал в Скайфол, затем в новый независимый городок Фезера, прежде чем наконец прибыть в республику и быть встреченным радостными толпами после окончательного завоевания Клаудбьюри. Хотя его неспособность поддержать республиканцев в Великом походе для многих стала камнем преткновения, Кингфезер продолжал представлять народ республики из их нового центра в Клаудбьюри.\n\nРабота Кингфезера оставалась незаметной с того времени, как он стал правой лапой Кемерская в 1003 году, заменив амбициозного милитариста Шнабеля Санглайдера и сосредоточившись на внутренних проблемах. Столкнувшись с неуправляемой армией и бандитами в сёлах, Кингфезер начал составлять закон, противоположный убеждениям Санглайдера о жестокой расправе с нарушителями. Кингфезер встретился с сотнями местных лидеров и заключил договоры, которые помогли спасти сёла от тотального хаоса сразу после агитации Роузвинг, что сделало его крупнейшим политиком, поддерживающим идею репрезентации клаудбьюрийцев на национальном уровне. Основной идеей Кингфезера был прагматизм – идея, становившаяся всё сложнее с усиливающейся поляризацией страны по политическим и этническим линиям.\n\nВыйдет ли у него когда-то? Или он умрёт со всеми картами в кармане, но без смелости их использовать, как заявляет оппозиция?"
 FAT_safeguarding_the_constitution:0 "Наш долг перед республикой"
 FAT_safeguarding_the_constitution_desc:0 "Сегодня для нашей конституции существует много угроз: социалисты, монархисты, диктаторы. Мы должны быть бдительными и защищать Республику и её богами данные принципы любой ценой."
 FAT_the_free_market:0 "Рыночная экономика"
 FAT_the_free_market_desc:0 "Социал-демократические экономические теории неизбежно приведут к упадку, а республика попадёт в состояние глубочайшей экономической депрессии. Чтобы уберечься от этого, мы должны отменить эти политики и начать использовать капиталистические."
 FAT_free_trade_focus:0 "Открыть торговлю"
 FAT_free_trade_focus_desc:0 "Открытая торговля между странами - один из основных принципов капитализма. Мы должны позволить торговле свободно проходить в нашей стране и с другими странами, при этом используя наши обширные запасы ресурсов для торговли с другими странами."
 FAT_support_small_business:0 "Поддержать малый бизнес"
 FAT_support_small_business_desc:0 "Вместо поддержки монополистов, мы должны поддерживать новые предприятия в Сердце Империи, которые сейчас угнетаются олигархическими законами имперцев. Народ должен иметь возможность создать бизнес, не имея ничего, подняться из грязи в князи лишь своей хитростью, инновационностью и благодаря чудесам капитализма."
 FAT_privatize_resource_industries:0 "Приватизировать добычу минералов"
 FAT_privatize_resource_industries_desc:0 "Добыча минералов веками была под управлением федерального правительства, будь это Клаудбьюри или Грифенхейм. Мы должны распродать эту отрасль, и раздать всё частным компаниям и предприятиям, которые будут управлять добычей более эффективно."
 FAT_ward_off_extremism:0 "Защититься от экстремистов"
 FAT_ward_off_extremism_desc:0 "Социалисты в нашей партии стали слишком влиятельными. Пора разобраться с этим новым движением и выгнать этих социалистов из Национальной Республиканской Партии во имя партийного единства и стабильности."
 FAT_crush_fascist_organizations:0 "Уничтожить фашистские организации"
 FAT_crush_fascist_organizations_desc:0 "Грифоний Национальный Республиканский Фронт, наряду с другими запрещёнными организациями, вновь активизировал свою деятельность. Эти движения неконституционны и военизированы. В отличие от социалистов, им не место даже в оппозиции."
 FAT_centralize_the_republic:0 "План «Единство»"
 FAT_centralize_the_republic_desc:0 "Мы не должны использовать нашу новую позицию, чтобы разрушить узы империи, которые существовавшие веками. Это лишь приведёт к контрреволюции. Мы должны объединиться, чтобы построить лучшую Грифонию. Хотя радикалы могут требовать крови, а предатели - насмехаться над нашими усилиями, объединение - единственный способ сохранить мир в Республике."
 FAT_reconcile_with_the_church:0 "Договориться с Архонатом"
 FAT_reconcile_with_the_church_desc:0 "Так как Архонта Эроса VII больше нет, многие набожные грифоны - от нижних священников, до величайшего прелата верят, что наш режим нечестив и безбожен. Понимая, что архонт-марионетка ничего не исправит, Кингфезер заявил, что правительство постарается наладить отношения с Архонатом и с самими Богами, что бы это не значило."
 FAT_necessary_bargaining:0 "Простить"
 FAT_necessary_bargaining_desc:0 "Мы должны понять решение некоторых имперских чиновников поддержать врага в революционной войне. Всё, что сейчас важно, это то, что они снова с нами. Они знают эти земли, а мы - нет, поэтому прагматично было бы сделать их администраторами этих новых регионов."
 FAT_together_for_victory:0 "Не время для мести"
 FAT_together_for_victory_desc:0 "Радикалов, жаждущих крови, нужно заткнуть, мир и разум должны править в нашей Республике! Не будет ни казней, ни заключений в тюрьмах предателей. Вместо этого, они будут реабилитированы и когда-то, мы сделаем Грифонию ещё более великой с ними во власти."
 FAT_in_the_defense_of_griffonia:0 "На защиту Грифонии"
 FAT_in_the_defense_of_griffonia_desc:0 "Грифонию нужно защитить от монархической угрозы! Тем не менее, мы не должны просто штурмовать оставшиеся монархии, особенно учитывая, что мы уже победили Империю. Мы их победим в последнем бою, а в первую очередь нам нужно сосредоточиться на гражданской промышленности."
 FAT_president_sunglider:0 "Президент Санглайдер"
 FAT_president_sunglider_desc:0 "Шнабель Санглайдер получил мандат на проведение Реконструкции, а значит, идеи Кемерская будут жить дальше. Свобода, демократия и процветание направят каждый его шаг к пан-грифоньему государству, способному выдержать испытание временем."
 FAT_nationalize_imperial_monopolies:0 "Национализировать имперские монополии"
 FAT_nationalize_imperial_monopolies_desc:0 "Имперские олигархи владели невероятным богатством, в их когтях были тысячи и десятки тысяч акров и многие сотни заводов. Мы должны национализировать их, чтобы они контролировались государством, которое будет распоряжаться ими более разумно."
 FAT_harmony_with_republican_characteristics:0 "Гармония с республиканскими характеристиками"
 FAT_harmony_with_republican_characteristics_desc:0 "Современная идеология гармонии основывается на деспотической монархии Эквестрии, которая пусть и гарантирует народу права, но не имеет подлинно национальной демократической системы, а лишь только избираемых мэров. Три Принципа НРП несовместимы с современной гармонией, поэтому мы построим свою гармонию, с демократией и процветанием!"
 FAT_welfare_for_the_griffons:0 "Социальные гарантии грифонам"
 FAT_welfare_for_the_griffons_desc:0 "Социальное обеспечение, свобода и гармония будет обеспечена всем грифонам на континенте! Каждый грифон будет жить в процветании, иметь дом, еду, и все будут богаты!"
 FAT_united_under_democracy:0 "Объединить НРП"
 FAT_united_under_democracy_desc:0 "Коммунисты, демократические социалисты, либералы и консерваторы, все объединены в нашей Национальной Республиканской Партии. Грифония объединилась, а партия, наоборот, распадается, и наше ответвление от партии должно объединить нашу расколовшуюся политическую систему до того, как коалиция скатится в хаос."
 FAT_militarized_harmony:0 "Распространять Революцию"
 FAT_militarized_harmony_desc:0 "Многие гармонистские страны просто сидят на месте, пытаясь мирно преобразоваться, но потом им приходится очнуться и прощаться с мечтой. Ботинки марширующих солдат, может, и давят многие гармонические режимы, но не наш! У каждого грифона будет оружие, чтобы тот защищал демократию и освобождал земли диктатур, сопротивляющихся нашему правлению."
 FAT_sungliders_new_deal:0 "Новый курс Санглайдера"
 FAT_sungliders_new_deal_desc:0 "Санглайдер предложил инновационный план по созданию рабочих мест и расширении инфраструктуры. Будет создано множество новых программ для найма рабочих на общественные работы и постройку инфраструктуры. Это решит наши проблемы гражданской промышленности и безработицы. Беспроигрышное решение!"
 FAT_formalize_the_welfare_state:0 "Государство социального обеспечения"
 FAT_formalize_the_welfare_state_desc:0 "Грифония ещё никогда не видела модели экономики, подобной нашей - социал-демократическая и капиталистическая экономика, как поощряющая конкуренцию на свободном рынке, бережёт грифонов от худших проявлений нерегулируемого социализма. Без сомнения, новый век социальных программ и государственного вмешательства в очередной раз принесет процветание в Грифонию."
 FAT_legalize_extremism:0 "Всем свободу слова!"
 FAT_legalize_extremism_desc:0 "Фашисты и радикальные социалисты часто осуждаются в нашей республике, а некоторые их организации так вовсе запрещены! Мы должны исправить эту ошибку Кемерская и предоставить полную свободу слова и политических убеждений для всех политических ассоциаций, даже антидемократичных."
 FAT_revitalize_the_arms_industry:0 "Перезапустить производство оружия"
 FAT_revitalize_the_arms_industry_desc:0 "Наша борьба ещё не окончена, некоторые грифоньи народы всё ещё под властью монархий. Промышленность должны быть современной и готовой к победе над этими угрозами свободе."
 FAT_reinstate_war_propaganda:0 "Продолжить военную пропаганду"
 FAT_reinstate_war_propaganda_desc:0 "Военную пропаганду перестали печатать после нашей победы над Империей. Но когда я последний раз глядел на карту, в Грифонии ещё оставались монархические страны. Пора возвращать эти плакаты и неустанно защищаться от монархической угрозы!"
 FAT_totaler_krieg:0 "Ввести военную экономику"
 FAT_totaler_krieg_desc:0 "Нам нужно начать тотальную войну. Каждый грифон, вплоть до последнего юноши, будет призван в армию. Каждый рабочий будет производить военное обмундирование во славу Республики и Гармонии. Мы не остановимся, пока вся Грифония не будет под ясным светилом гармонической и республиканской демократии!"
 FAT_once_more_into_the_breach:0 "Подготовиться к южному прорыву"
 FAT_once_more_into_the_breach_desc:0 "Пора покончить с грифоньим рабством и улучшить жизнь всех грифонов с самого их рождения. Во славу Борея, во имя свободы и во имя демократии мы преуспеем в задаче объединить всех грифонов под своим крылом – или умрём, пытаясь!"
 FAT_once_more_into_the_breach_2:0 "Конец игры"
 FAT_once_more_into_the_breach_2_desc:0 "Настало время положить конец грифоньему рабству, и создать лучший мир ради всего нашего народа. Во имя Борея, во имя свободы и во имя демократии, мы преуспеем в святой задаче взять всю Грифонию под своё крыло, либо же умрём в попытках."
 FAT_president_astler:0 "Президент Эстлер"
 FAT_president_astler_desc:0 "В ходе неожиданного поворота событий юный социалист Рикард Эстлер вышел победителем в борьбе за лидерство в НРП. Его политика в сфере труда приведёт нас в новую эру процветания республики, и, без сомнения, он будет защищать свободную республику в ближайшие годы."
 FAT_rebuild_the_heartlands:0 "Исцелить шрамы от Второй Революции"
 FAT_rebuild_the_heartlands_desc:0 "Рабочие Сердца Империи сильно пострадали, когда мы прошли через их города и свергли их правителей. Мы должны исцелить эти шрамы и принести наши реформы в земли, обезображенные грязными имперцами."
 FAT_seize_noble_land:0 "Отобрать земли дворян"
 FAT_seize_noble_land_desc:0 "Земля, накопленная дворянами Грифонии, должна быть возвращена народу! Они больше не будут наживаться на своих огромных участках, пока простогрифоны порабощены!"
 FAT_expand_the_unions:0 "Массовая организация профсоюзов"
 FAT_expand_the_unions_desc:0 "Когда дух союза потечет в крови народа\nСил сильней не будет сроду\nИ пусть одна из самых слабых сил - сила одного\nНо родной профсоюз защитит его."
 FAT_industrial_democracy:0 "Промышленная демократия"
 FAT_industrial_democracy_desc:0 "Промышленная демократия должна быть распространена в Сердце Империи, и каждый рабочий должен иметь право на плоды своего труда! Жадные капиталисты больше не будут править Сердцем Империи - править будут рабочие и только рабочие!"
 FAT_cooperate_with_local_socialists:0 "Союз с местными социалистами"
 FAT_cooperate_with_local_socialists_desc:0 "В Грифонии много социалистов, желающих сотрудничать с нашим новым движением. Демократические социалисты, синдикалисты и даже анархисты готовы помочь нашему новому демократическо-социалистическому государству."
 FAT_against_the_oligarchy:0 "Дух Революции"
 FAT_against_the_oligarchy_desc:0 "Дворянство Грифенхейма и Герцланда - ненужный балласт. Все эти придворные, дворяне и мелкие лорды при имперском дворе должны быть преданы мечу, как было в 978 - пора показать, что Республика вернулась."
 FAT_remove_war_propaganda:0 "Приостановить пропаганду"
 FAT_remove_war_propaganda_desc:0 "Для победы над Империей мы распространили массу военной пропаганды, чтобы убеждать грифонов вступать в армию. Теперь Грифенхейм наш, и пропаганда не настолько нужна."
 FAT_bread_and_roses:0 "Хлеб и розы"
 FAT_bread_and_roses_desc:0 "Народу нужны мир, земля и хлеб, чтобы он мог жить в новом социалистическом обществе, свободном от капиталистического и олигархического гнёта."
 FAT_expand_workers_industry:0 "Расширить кооперативы"
 FAT_expand_workers_industry_desc:0 "В Грифонии ещё есть место, где индустрия всё ещё не во власти рабочих и где земля ещё не индустриализирована. Мы должны это исправить и принести промышленную демократию в каждый уголок нашей новой нации."
 FAT_expel_nrp_right:0 "Изгнать правое крыло НРП"
 FAT_expel_nrp_right_desc:0 "Правые лишь думают о том, как помешать нашему социалистическому движению и положить конец правлению НРП, отражавшему нашу Республиканскую мечту. Мы должны исключить этих консерваторов и принести свет в Грифонию."
 FAT_pan_griffonian_spirit:0 "Всегрифоний дух"
 FAT_pan_griffonian_spirit_desc:0 "Вперёд, храбрые грифоны, наш бой ещё не окончен! Мы должны принести социализм в каждый уголок Грифонии. И хотя мы сократили расходы на военную пропаганду, всё ещё есть тысячи грифонов, готовых освобождать эти бедные земли вместе с нами."
 FAT_the_liberation_of_griffonia:0 "За освобождение всех грифонов"
 FAT_the_liberation_of_griffonia_desc:0 "Аквелия. Вингбардия. Прайвен. Все эти крупные страны всё ещё не в надёжных когтях нашей республики. Пора начать великую революционную войну, которая объединит всю Грифонию во имя республики!"
 FAT_towards_unification:0 "Против монархий"
 FAT_towards_unification_desc:0 "Мы должны покорить южные монархии и принести туда справедливость, мир и гармонию. Триколор скоро будет развеваться над Карфином, Аквелией, Кивессином и Каивом."
 FAT_the_lake:0 "Освободить сердце"
 FAT_the_lake_desc:0 "Королевство Грифонстоун, наряду с домами Авиан, Эри и Эйри, оставалось монархией десятилетиями. Скоро они познают свет республики."
 FAT_railway_to_griffonstone:0 "Соединить две столицы"
 FAT_railway_to_griffonstone_desc:0 "Хотя Грифенхейм остаётся истинным центром республики, исторический статус Грифонстоуна и его эмоциональная значимость для всех грифонов делают его не менее важным. Чтобы укрепить легитимность республики среди населения Сердца империи, мы соединим прямой железной дорогой два важнейших для грифоньего рода города."
 FAT_the_heart_of_griffonkind:0 "Индустриализация родины всех грифонов"
 FAT_the_heart_of_griffonkind_desc:0 "Грифонстоун и Великое Герцогство Верения были значительными грифоньими державами ещё в те времена, когда Империя Грифонов была лишь мечтой в умах немногих. Мы должны оживить эти земли и ускорить их развитие современной промышленностью и сельским хозяйством."
 FAT_repair_griffonstone:0 "Новый Грифонстоун"
 FAT_repair_griffonstone_desc:0 "Грифонстоун когда-то был столицей великой Империи Грифонов, объединённой первым Гровером с помощью идола Борея. Из-за такого монархического символизма очевидно, что мы должны отстроить эту землю и сделать её образцовой республиканской провинцией."
 FAT_core_lakes:0 "Триколор над сердцем"
 FAT_core_lakes_desc:0 "Озёра должны быть возвращены в состав Республики Грифонов как её истинная и основная территория. Там будут созданы местные республиканские органы власти, и жители этих земель будут освобождены."
 FAT_elite_republican_army:0 "Элитный авангард республики"
 FAT_elite_republican_army_desc:0 "Мы контролируем Герцланд и его огромное население, так что во всеобщей мобилизации больше нет нужды. Ослабив квоты на призыв, мы сможем сосредоточиться на наборе профессиональных военных и их тренировках, пока не создадим войско, способное затмить старую рейхсармию."
 FAT_the_trade_cities:0 "Отомстить за предательство Гишара"
 FAT_the_trade_cities_desc:0 "Трагично, что несмотря на своё несметное богатство, торговые города Скайфол и Фезера превратились в пристанище преступности и коррупции, предав мечту о свободной и безопасной республике. Мы сделаем Скайфол образцовым республиканским городом."
 FAT_trial_meyer:0 "Суд над предателем"
 FAT_trial_meyer_desc:0 "Измена Германа Майера, позволившая этому ничтожному офицеру править как королю на островах Селестийского моря, была крайне унизительной для Республики Грифонов. Теперь Хаукленд под нашим контролем и пришло время для долгожданного суда над ним."
 FAT_greifwald_oil_fields:0 "Нефтяные месторождения Грайфвальда"
 FAT_greifwald_oil_fields_desc:0 "Нефтяные месторождения Грайфвальда очень ценны, но существующие вышки устарели, а методы добычи можно значительно улучшить. Потенциальную стратегическую важность этих запасов невозможно переоценить."
 FAT_core_west:0 "Триколор над западом"
 FAT_core_west_desc:0 "Благодаря сильному республиканскому духу на западе, грифоны радостно приветствовали нас. От Аквелии до Скайфола триколор гордо реет на ветру, а граждане полны надежды на будущее."
 FAT_IM_the_lake:0 "Освободить сердце"
 FAT_IM_the_lake_desc:0 "Королевство Грифонстоун, наряду с домами Авиан, Эри и Эйри, было монархиями в течение многих десятилетий. Они скоро увидят свет республики."
 FAT_IM_the_heart_of_griffonkind:0 "Индустриализация сердца грифоньего рода"
 FAT_IM_the_heart_of_griffonkind_desc:0 "Грифонстоун и Великое Герцогство Верения были главными грифоньими нациями ещё в те времена, когда Империя Грифонов была лишь мечтой в умах некоторых. Мы должны возродить эти земли и привести их в соответствие стандартам современной промышленности и сельского хозяйства."
 FAT_IM_repair_griffonstone:0 "Новый Грифонстоун"
 FAT_IM_repair_griffonstone_desc:0 "Грифонстоун когда-то был столицей великой Империи Грифонов, объединённой идолом Борея при первом Гровере. Мы должны перестроить этот оплот монархизма и сделать его образцовой республиканской провинцией."
 FAT_IM_core_lakes:0 "Триколор над сердцем империи"
 FAT_IM_core_lakes_desc:0 "Озёра должны быть включены в состав Республики Грифонов в качестве законных национальных территорий. Там будут созданы местные республиканские органы власти, и народ этих земель будет освобождён."
 FAT_IM_the_west:0 "Освободить Аквелию"
 FAT_IM_the_west_desc:0 "Грифоны запада долго боролись за свободу против своих некомпетентных и жадных до власти монархов. Они заслуживают защиты и помощи в победе свободы над тиранией."
 FAT_IM_the_trade_cities:0 "Отстроить Скайфол"
 FAT_IM_the_trade_cities_desc:0 "К сожалению, несмотря на своё богатство, торговые города Скайфола и Фезеры превратились в пристанища преступности и коррупции. Но мы положим этому конец! Благодаря нашему влиянию мы добьёмся того, что Скайфол снова станет образцовым республиканским городом."
 FAT_IM_greifwald_oil_fields:0 "Нефтяные месторождения Грайфвальда"
 FAT_IM_greifwald_oil_fields_desc:0 "Нефтяные месторождения Грайфвальда очень ценны, но существующие вышки устарели, а методы добычи можно значительно улучшить. Потенциальную стратегическую важность этих запасов невозможно переоценить."
 FAT_IM_core_west:0 "Триколор над западом"
 FAT_IM_core_west_desc:0 "Благодаря сильному республиканскому духу, присущему западу, местные грифоны с энтузиазмом восприняли наше прибытие. От Аквелии и до Скайфола гордо реет наш триколор, а среди горожан растёт надежда на светлое будущее."
 FAT_the_south:0 "Освободить юг"
 FAT_the_south_desc:0 "Грифоны юга – невероятные индивидуалисты, но если нужно встать на защиту свободы и справедливости, все грифоны должны стоять плечом к плечу. Это дело непростое, но правое."
 FAT_pact_with_liberals:0 "Встретиться с де Гаспвинги"
 FAT_pact_with_liberals_desc:0 "Джованни де Гаспвинги – очень рассудительный грифон, чьи цели практически идентичны нашим. Публичная встреча с ним может привести к плодотворному сотрудничеству и поддержке его идеологических единомышленников в республике."
 FAT_destroy_fascists:0 "Раздавить приспешников Биколини"
 FAT_destroy_fascists_desc:0 "Вингбардия – родина фашизма, опасной и бестолковой идеологии. Понятное дело, что вингбардийские фашисты не адаптируются в новом республиканском обществе. Мы должны уничтожить это движение и раскрыть его гнилое нутро, абсолютно несовместимое со свободой."
 FAT_core_south:0 "Триколор над югом"
 FAT_core_south_desc:0 "Хоть некоторые и сомневались в её целесообразности, южная кампания завершилась полной победой. Силы раздора были сокрушены, и грифоны юга теперь гордо стоят с нами в одном ряду!"
 FAT_the_frontier:0 "Освободить фронтир"
 FAT_the_frontier_desc:0 "Дикие земли фронтира не должны остаться в стороне от прогресса. Эти грифоны станут заслуженными гражданами республики."
 FAT_the_gryphus_port:0 "Южные верфи"
 FAT_the_gryphus_port_desc:0 "Балисмонт – порт, который соединит нас с ценными юго-восточными торговыми путями. С расширением доков он станет ценным активом для нашего флота."
 FAT_the_new_breadbasket:0 "Развивать южное сельское хозяйство"
 FAT_the_new_breadbasket_desc:0 "На богатых полях Бродфельда и Каива можно выращивать огромное количество пшеницы, ячменя и овса. Мы воспользуемся этим сельскохозяйственным производством, чтобы накормить наш народ."
 FAT_core_frontier:0 "Триколор над фронтиром"
 FAT_core_frontier_desc:0 "Грифоны востока пережили слишком многое за свою историю, но теперь мы можем изменить всё к лучшему. Настало время принести мир и процветание на восток."
###DIPLOMATIC TREES###
 FAT_zebrican_affairs_committee:0 "The Committee of Zebrican Affairs"
 FAT_zebrican_affairs_committee_desc:0 "Our new territories in South Griffonia are commercial gateways for Zebrican goods shipped across the sea, which means we should have an official stance on North Zebrican affairs and seek stronger relations with one of the players involved."
 FAT_southern_sea_safe_routes:0 "The Southern Sea Corridor Act"
 FAT_southern_sea_safe_routes_desc:0 "In order for foreign contractors and enterprises to take us seriously, we must be capable of projecting naval strength that can protect Griffonian shipping. The Southern Sea Corridor Act will assure the effectiveness of the Republican Navy in the South and the safety of all incoming Zebrican commerce."
 FAT_support_our_new_trade_partner:0 "A Secure Partnership"
 FAT_support_our_new_trade_partner_desc:0 "With international shipping under formal protection and Griffonia stabilized under Republican rule, our partners overseas can be assured that their investments are safe. Here's to a long and fruitful mutual relationship with our new friends!"
 FAT_intercontinental_republicanism:0 "Liberty Abroad"
 FAT_intercontinental_republicanism_desc:0 "While Republicanism and democracy are still weak in Zebrica, our new partnership and commercial cooperation will hopefully serve to export not just our goods, but our ideals to the continent. Perhaps a new bastion of liberty may rise to stand alongside us."
 FAT_on_equestria:0 "The Alicorn In The Room"
 FAT_on_equestria_desc:0 "As the premier power of Equus, for better or worse, we cannot simply ignore Equestrian affairs. A particular policy on our international relation is necessary."
 FAT_mend_our_relations:0 "When In Canterlot"
 FAT_mend_our_relations_desc:0 "While we entirely reject monarchism in Griffonia, if the ponies of Equestria are content under the rulership of their princess, then we see no reason to object. We recognize the Princessdom as the legitimate government of the Equestrian people."
 FAT_reject_equestria_entirely:0 "Under No Pretext"
 FAT_reject_equestria_entirely_desc:0 "We are not going to entertain the Equestrian delusions of a fair monarchy. If Equestrian ponies are content in their serfdom, then so be it, but as far as the Republic is concerned, we will have nothing to do with the Princessdom."
 FAT_assure_griffonian_ponies:0 "Assure Griffonian Ponies"
 FAT_assure_griffonian_ponies_desc:0 "Western Griffonia is home to several pony populations with Equestrian heritage, and as citizens of the Republic, they are endowed with all inalienable rights that such a condition grants. Let them know that regardless of how we may feel about Equestria, they are our brothers and will suffer no harm."
 FAT_the_monarchs_show_their_colors:0 "And Thus, The Jig Is Up"
 FAT_the_monarchs_show_their_colors_desc:0 "This was always the inevitable consequence of Equestrian monarchism, and the NRP has long since known this day's coming has always been a matter of time. Equestria has shed its facade, and the rot of the despotic Princessdom is shown bare. And we will not sit idly by and simply watch it happen."
 FAT_get_in_touch_with_the_nova_griffonians:0 "The Diaspora Under Threat"
 FAT_get_in_touch_with_the_nova_griffonians_desc:0 "With Equestrians on the war footing and their \"benevolent\" monarch finally honest about the nature of her trade, Nova Griffonia is left in a vulnerable position. If we don't help them stem the coming tide, no one will. Still, their government might prove less than proper to work with..."
 FAT_fortress_griffonia:0 "Fortress Griffonia"
 FAT_fortress_griffonia_desc:0 "Let tyrants of all stripes, no matter the continent nor the species, know this: the Griffonian Republic shall stand as a bulwark of liberty, justice and prosperity, no matter what! Griffonia stands tall under the tricolor, and it shall never fall!"
 FAT_no_monarchist_hold_in_griffonia:0 "No Monarchists In Our Backyard"
 FAT_no_monarchist_hold_in_griffonia_desc:0 "New Marelanders remain loyal to the Equestrian despotism, even after its true colors have been laid bare for the whole world to see! This will not stand: Equestrians can play pretend in Equus all they like, but on our continent, they play by our rules, and we will suffer none of the Alicorn's hoof lickers in our backyard."
 FAT_equestria_has_fallen:0 "New Order In Equus"
 FAT_equestria_has_fallen_desc:0 "While no Republican held much love for the Princessdom, it provided order and stability to Equus, and Canterlot's fall will no doubt be the cause of much suffering and chaos in the continent. We are left to pick up the pieces from this madness."
 FAT_assure_new_mareland:0 "The Matter of New Mareland"
 FAT_assure_new_mareland_desc:0 "New Mareland was long used to Equestrian protection, but the change of affairs on their home content has left the colony in a precarious position. One way or another, we cannot afford New Mareland not to be aligned with us and our goals. Something must be done."
 FAT_establish_nova_griffonia_contact:0 "Contact The Nova Griffonians"
 FAT_establish_nova_griffonia_contact_desc:0 "The old Imperial colony remains relatively stable, despite all that's happened in Equus. We should establish formal channels with their government, so we can at the very least have a friendly pawhold in the continent if the worst comes to pass."
 FAT_a_light_shining_in_darkness:0 "A Light Shining In Darkness"
 FAT_a_light_shining_in_darkness_desc:0 "With Equestria dethroned, the Griffonia Republic is the premier power of not just Griffonia, but the whole world. We must forever stand as a beacon of good governance, freedom and stability to the peoples of the world, a worthy example to follow and emulate, such that the Republican mission may live on."
 FAT_shadows_in_the_east:0 "Despotism In The East"
 FAT_shadows_in_the_east_desc:0 "As griffons everywhere struggle against despotism and corruption, in the Riverlands, tyranny has triumphed and enslaved the pony inhabitants. While ours is a Republic of the Griffon people first and foremost, we cannot allow our fellow creatures to suffer right at our doorstep. By the will of the gods, all of Griffonia will be free!"
 FAT_eastward_mobilization:0 "Prepare For The Eastward Expedition"
 FAT_eastward_mobilization_desc:0 "The frontier territories that separate the Herzland and south Griffonia from the Riverlands have always served to bog down advancing armies, and if we are to dislodge the Riverlands regime, we simply cannot allow this to happen to the Republican Army. The Republic's full industrial might will carve a pathway to the East."
 FAT_contact_pony_allies:0 "Reach Out To Friends In Arms"
 FAT_contact_pony_allies_desc:0 "There is no shortage of ponies in Griffonia that have been uprooted and forced to flee West. Workers, militias, civil administrators - they will provide the Republic with all the necessary elements to make a legitimate government in exile, which will help us liberate their friends back home."
 FAT_liberate_the_riverpones:0 "Suffer No Tyrants"
 FAT_liberate_the_riverpones_desc:0 "Fate is a funny thing: no griffon on the continent, and much less any pony, would ever have expected a government out of Griffenheim to march eastwards not as conquerors, but as liberators against a Riverlands despotism. Let all know the Republic will suffer no tyrants in Griffonia, no matter the species it seeks to subjugate! "
 FAT_friends_in_the_east:0 "End The Legacy Of Grover II"
 FAT_friends_in_the_east_desc:0 "Of all the stains the Empire's despotism has left behind, arguably the biggest remaining one for us to deal with is our relation with the Riverlands. With the Empire vanquished, the eastern ponies have nothing to fear from Griffenheim, and to prove this, we should reach out diplomatically."
 FAT_from_skyfall_to_nimbusia:0 "The Freedom Of Movement Act"
 FAT_from_skyfall_to_nimbusia_desc:0 "While the Republic retains sovereignty over its territory and borders, we have no bussiness telling our citizens where and how to lead their lives. The Freedom of Movement Act will set precedent to allow those ponies in our borderlands who wish to leave to do so without issue, and to stay with full rights if not."
 FAT_the_hellquill_dispute:0 "The Empire's Greatest Mess"
 FAT_the_hellquill_dispute_desc:0 "Hellquill and Longsword are symbolic of the cycles of violence perpetuated by the Imperial government. It is the last remnant of the Empire's legacy left near our borders, and we will make sure it is dealt with, once and for all."
 FAT_peace_between_species:0 "The Cycle Is Broken"
 FAT_peace_between_species_desc:0 "For centuries, griffons and ponies have clashed in Griffonia, and this conflict has shackled the both of us for far too long. With the Republic triumphant and the Riverlands assured of our good will, the cycle of violence has finally been broken, and peace between our two peoples achieved."
 FAT_tolerate_the_east:0 "The Perfidious East"
 FAT_tolerate_the_east_desc:0 "Relations between griffons and eastern ponies have been dubious at best and hostile at worst over the centuries, and while the Republic has no intentions of violating the sovereignty and right of self determination of the Riverlands, we will also not befriend their undemocratic regime."
 FAT_secure_hellquill:0 "Secure The Borderlands"
 FAT_secure_hellquill_desc:0 "The twin knight orders of Longsword and Hellquill have defended the Riverlands borders under the Empire's purview, but in this modern age, we have no need of either independent knightly orders nor a borderlands state. This frontier is the rightful land of Griffenheim and the Republic will seek to reclaim it, lest the perfidious Riverlanders do it first."
 FAT_eastern_border_militarization:0 "The Border Integrity Act"
 FAT_eastern_border_militarization_desc:0 "As the Griffonian Republic has learned through painful experience, trusting the good will of despots and monarchists is a pathway to disaster. The Border Integrity Act will seek to implement widespread customs enforcement across the eastern border and prepare local infrastructure for any hostile enemy action."
 FAT_premier_power_of_griffonia:0 "The Kingfeather Doctrine"
 FAT_premier_power_of_griffonia_desc:0 "Named after Heinrich and his defensively minded foreign policy, the Kingfeather Doctrine seeks to maintain the Griffonian Republic as the premier hegemonic power of the Griffonian continent, constantly prepared to defend its dominion from any and all threats, on all fronts, at a moment's notice. The Republic will never fall again."
 FAT_liberate_the_griffons_of_aquileia:0 "Shadows Loom Over Aquileia"
 FAT_liberate_the_griffons_of_aquileia_desc:0 "Despite their best efforts, the spark of the Aquileian Revolution was snuffed out once again, and tyranny runs rampant in Aquila. It will fall upon us to rescue the citizens of Aquileia from the despots that rule over them, and bring the tricolor to the West!"
 FAT_mobilize_on_the_aquileian_border:0 "Mobilizing On The Aquileian Border"
 FAT_mobilize_on_the_aquileian_border_desc:0 "Save for Herzland itself, Aquileia holds the biggest demographic and industrial base in Griffonia, and moving westwards will be no simple task. Solid positioning complete with strategic fortifications across the border will allow us to start the push on the right paw, to ensure our victory."
 FAT_striking_the_aquileian_coast:0 "Operation: Rising Phoenix "
 FAT_striking_the_aquileian_coast_desc:0 "The battle against Aquileian despots will be fought both in land and sea, and to assure our victory in the latter, the admiralty has proposed a bold invasion plan to strike right into the heart of Aquileia."
 FAT_showtime_in_aquileia:0 "Begin The March"
 FAT_showtime_in_aquileia_desc:0 "We have made all necessary preparations, and the Republican Army is ready to liberate yet another Griffonian people from terror and subjugation. Our brethren in the West call for aid, and the Republic answers!"
 FAT_pangriffonian_cause_in_aquileia:0 "The True Cause In Aquileia"
 FAT_pangriffonian_cause_in_aquileia_desc:0 "Our brethren in Aquileia have succeeded in casting off the shackles of monarchism, and now, our twin Republics in the continent both stand as beacons of the Pangriffonian dream. It is only right we begin cooperating at once, and prepare to unite as one to bring the dream one step closer to reality."
 FAT_begin_economic_integration:0 "United Railway Project"
 FAT_begin_economic_integration_desc:0 "Trains can run from Griffenheim to Aquila, but the rails were constructed by a multitude of disjointed local and regional authorities. The Republic will work with Aquileia to create a unified railway system, beggining with a single modern line connecting the two distant cities."
 FAT_begin_military_integration:0 "Joint Army Exercises"
 FAT_begin_military_integration_desc:0 "The Aquileian revolutionaries gained a lot of experience in their struggle against the monarchy, experience they're willing and capable of sharing for the benefit of the Republican cause."
 FAT_one_pangriffonian_republic:0 "All Under The Tricolour"
 FAT_one_pangriffonian_republic_desc:0 "It is time: the Marshal's dream comes one step closer to realization. With no need for bloodshed, Aquileians and Herzlanders may finally join together under a state made in defense of their liberty, security and prosperity. Let us send the message to Aquila, and welcome our brethren into the fold!"
 FAT_republican_cause_in_aquileia:0 "The Spirit of Aquileia Stands Strong"
 FAT_republican_cause_in_aquileia_desc:0 "The Republicans have triumphed over monarchism in the West. While this is cause for joyous celebration, the relation between our two states is somewhat murky. We can only hope the Republicans of Aquileia comes to see the common cause that we share for a united Griffonia, and join arms with us of their own volitions."
 FAT_establish_diplomatic_channels:0 "Establish Diplomatic Channels"
 FAT_establish_diplomatic_channels_desc:0 "The National Republican Party has many contacts among the old revolutionary cells from which the Aquileian Republic first grew. We must reestablish these contacts, in order to merge the political leadership of Aquileia and the Griffonian Republic into one. Only then can their integration be possible."
 FAT_trade_deals_with_aquileia:0 "Promote Commercial Cooperation"
 FAT_trade_deals_with_aquileia_desc:0 "It is often the case in history that economic cooperation gives way to political cooperation. If we want Aquileians to take our proposal of unification seriously, we must first seek to foster an interconnected economy that makes such a thing beneficial and desirable to both parties."
 FAT_offer_unification_proposal_to_aquileia:0 "Offer Unification"
 FAT_offer_unification_proposal_to_aquileia_desc:0 "We've been careful in cultivating the Aquileians' trust, and we can now only hope that our efforts will be rewarded; a diplomatic envoy is ready to send our proposal to Aquila. We patiently await their answer."
 #elections
 FAT_the_first_griffonian_elections:0 "Первые пангрифоньи выборы"
 FAT_the_first_griffonian_elections_desc:0 "Теперь, когда мы освободили всю Грифонию, крайне важно наконец объявить о проведении подлинных выборов в Республике, в которых смогут участвовать кандидаты от Скайнавии до Грифонстоуна. Социал-демократы, либералы, гармонисты, консерваторы и социалисты уже заявили о своём участии. Впервые в истории более 50% грифоньего народа смогут проголосовать на свободных выборах."
 FAT_president_guildedwing:0 "Президент Гильдедвинг"
 FAT_president_guildedwing_desc:0 "В ходе неожиданного поворота событий, пылкая Женевьева Гильдедвинг из Скайфола оказалась победительницей. Обещая улучшить положение простогрифонов и свергнуть укоренившийся режим НРП, она пробила себе путь."
 FAT_share_our_wealth:0 "Поделиться нашим Богатством!"
 FAT_share_our_wealth_desc:0 "Морально неверно правительству позволять стольким нашим гражданам жить за чертой бедности, в то время как в государстве избыток еды, одежды и крова. Всем гражданам необходимо обеспечить достойные условия проживания."
 FAT_tax_the_oligarchs:0 "Обложить олигархов налогом"
 FAT_tax_the_oligarchs_desc:0 "Касательно бедности - это факт, что богатые грифоны этой страны не позволят нам решить эту проблему, потому что чтобы помочь бедным, нужно уменьшить состояние богачей. Так и сделаем, да будет каждый при деньгах!"
 FAT_every_griffon_an_emperor:0 "Каждый грифон - император!"
 FAT_every_griffon_an_emperor_desc:0 "Каждый грифон должен быть императором, то есть никакой грифон не должен быть лишён жизненно важных вещей. У каждого грифона должна быть еда, у каждого должна быть одежда."
 FAT_a_new_constitution:0 "Отменить статью 11"
 FAT_a_new_constitution_desc:0 "Пришло время полностью упразднить Акт о спасении Республики 986 года и отменить 11-ю статью конституции. Несмотря на то что она была существенно изменена, в ней всё ещё сохраняются недемократические меры и полномочия президента. Мы должны окончательно избавиться от этого пережитка авторитаризма."
 FAT_end_nrp_dominance:0 "Покончить с господством НРП"
 FAT_end_nrp_dominance_desc:0 "Хотя Республика по определению не однопартийное государство, Национальная Республиканская Партия и её органы всё ещё владеют неприличным количеством власти; многие грифоны считают, что получить повышение в государственных организациях практически невозможно, если у тебя нет партийного билета. Самое время уменьшить влияние НРП."
 FAT_open_up_the_political_system:0 "Открыть нашу политическую систему"
 FAT_open_up_the_political_system_desc:0 "Хотя прошлые лидеры Республики всегда возвышали свободу, свобода, которая им была неудобна - свобода мысли. Недовольные больше не будут замалчиваться, а некоторые партии не будут запрещаться. Все будут услышаны!"
 FAT_a_second_sunglider_term:0 "Ещё один срок Санглайдера" #idealist and militarist socdem, see harmonic republic
 FAT_a_second_sunglider_term_desc:0 "Невероятные управленческие навыки Шнабеля Санглайдера проявились во время великого похода во имя свободы, но это ещё не всё. Ещё срок, и всё у народа будет прекрасно. За Свободу, Демократию и Процветание!"
 FAT_president_verany:0 "Президент Верани" #liberal, see harmonic aquileia
 FAT_president_verany_desc:0 "Теодор Верани, герой Аквелийской Революции, вырос в популярности из-за его вдохновляющих взглядов честной и справедливой демократии. Хоть и его обещания помочь бедным привели его к власти, соблюсти эти обещания будет непросто."
 FAT_helping_the_little_griffons:0 "Помогать маленьким грифонам"
 FAT_helping_the_little_griffons_desc:0 "Это обязанность нации - заботиться о гражданах и обеспечивать им доступ к здравоохранению, еде и жилью. Программы социальной безопасности обеспечат каждому грифону, независимо от статуса, базовые потребности."
 FAT_free_education:0 "Бесплатное образование"
 FAT_free_education_desc:0 "Каждый грифон, и богатый, и бедный, заслуживает право на настоящее и полное образование. Теперь мы можем это себе позволить, а потому мы должны. Большая доступность образования приведёт к новой эпохе просвещения!"
 FAT_broad_land_reform:0 "Перераспределение земли"
 FAT_broad_land_reform_desc:0 "Под властью монархов прошлого земля отбиралась у бедных и давалась верным аристократам, которые со временем накопили невероятные её площади. Мы должны отменить эту несправедливость и забрать лишнюю землю, раздав её тем, у кого её нет. Изменённые права на собственность защитят простой народ от эксплуатации богатыми и создадут справедливое общество."
 FAT_republican_identity:0 "Пан-Грифонья идентичность"
 FAT_republican_identity_desc:0 "Мы должны пресечь коварные попытки разделить нас, основываясь на региональных культурах, вместо этого поднявшись в патриотической солидарности. Верность идеалам свободы и демократии объединяет нас!"
 FAT_the_republican_guard:0 "В защиту Мечты"
 FAT_the_republican_guard_desc:0 "Цена свободы - вечная бдительность. Надеясь наслаждаться свободой, мы должны быть готовы защищать её, чтобы будущие поколения наслаждались свободой так же, как и мы."
 FAT_hunt_down_remaining_monarchists:0 "Вспоминая врага"
 FAT_hunt_down_remaining_monarchists_desc:0 "Мы не должны забывать бесчинства монархий прошлого: их слишком много, чтобы их тут перечислять. Да будет всем известно, что монархия и все другие авторитарные идеологии не совместимы с целью Республики."
 FAT_president_ventriglio:0 "Президент де Гаспвинги" #social and market liberal, see harmonic wingbardy
 FAT_president_ventriglio_desc:0 "Вингбардиец де Гаспвинги победил, пообещав обеспечить права гражданам и их же свободы, в чём и заключалась его кампания. Так как он поклонник эквестрийской гармонии, при его правлении ожидается период той самой необходимой стабильности в Республике."
 FAT_president_kingfeather_again:0 "Второй срок Кингфезера" #centrist and pragmatist, see neutral republic
 FAT_president_kingfeather_again_desc:0 "Идея прагматичного центризма Генриха Кингфезера привела нас далеко, потому граждане наградили его вторым сроком. Настала пора правления опытных, нельзя позволить браздам правления попасть в когти неумелого, опасного большинства."
 FAT_free_market_capitalism:0 "Свободный рыночный капитализм"
 FAT_free_market_capitalism_desc:0 "Свобода - естественный порядок, в котором индивиды добиваются своих целей, но и обеспечивая общее благосостояние: такой должна быть наша экономика. Мы должны убрать налоговый и тарифный груз, а также ограничить регулирование экономики, чтобы проявить наш полный потенциал."
 FAT_the_free_press_act:0 "Поправка о свободе слова"
 FAT_the_free_press_act_desc:0 "Свобода прессы до сих пор обеспечивалась в республике лишь исполнительными указами. Поэтому чтобы закрепить неприкосновенность общественного контроля, президент обратится к парламенту с просьбой внести поправку в конституцию и запретить любые злоупотребления властью, направленные на ограничение свободы слова и прессы."
 FAT_support_business:0 "Поддержка бизнес-инициатив"
 FAT_support_business_desc:0 "Вместо того, чтобы соперничать, правительство и компании должны работать вместе и сотрудничать. Совместные инвестиции в новые технологии и промышленность поддержит инновации и поможет нашему производству достичь новых высот."
 FAT_subsidize_mining_companies:0 "Приватизировать горнодобывающие компании"
 FAT_subsidize_mining_companies_desc:0 "Это общеизвестный факт, что предприятия, содержащиеся на государственные деньги, очень неэффективны и зачастую плохо управляются. Приватизация горнодобывающих компаний гарантирует, что у владельцев будет мотивация хорошо распоряжаться ресурсами, позволяя нам по полной использовать ресурсы."
 FAT_encourage_immigration:0 "Поощрять иммиграцию пони"
 FAT_encourage_immigration_desc:0 "Со сближением с Эквестрией мы также получаем возможность принять образованных, талантливых иммигрантов-пони. Мы должны всем показать, что Республика - процветающее место, дружелюбное ко всем существам. Добро пожаловать, всем и каждому!" 
 FAT_put_the_ponies_to_work:0 "Подключить пони к работе"
 FAT_put_the_ponies_to_work_desc:0 "От пегасов-экспертов в аэронавтике до магов-единорогов и агрономов-земнопони, у пони есть ценнейшие навыки, которые очень помогут нашей экономике. Нам нужно привлечь этих умелых пони в нашу страну, и мы должны обеспечить их достойной жизнью."
 FAT_veterans_association_act:0 "The Veterans' Association Act"
 FAT_veterans_association_act_desc:0 "The Griffonian Republic had to wage many wars to come this far, and in order to both secure the prestige of the Republican Army and properly compensate those who sacrificed the most for our liberty, the President will found the National Veterans' Association of the Republic."
 FAT_the_militant_federation:0 "The Militant Federation"
 FAT_the_militant_federation_desc:0 "Through the fires of war it has endured, the Republic knows all too well that golden liberty is bought and defended by the force of arms, not some civil bureaucratic process. To this end, the now dominant Griffonian Republic will always defend the principles of an ever militant federation, ready to defend our peoples' freedom from threats within and without."
 FAT_president_di_karthin:0 "President Di Karthin"
 FAT_president_di_karthin_desc:0 "Gabriella Di Karthin, former member of the Romau Senate and localist reformer, has won the election on a platform of municipal democracy and decentralization. Under her claw, the Republic will enshrine the right of every griffon in every corner of continent to have a say over how they live their own lives and manage their own communities."
 FAT_urban_refurbishing:0 "Urban Renewal Act"
 FAT_urban_refurbishing_desc:0 "By providing funding and architectural experts to major cities across Griffonia, we will seek to fully modernize every single major urban center in Griffonia, renewing old buildings with new facades, demolishing old slums, and providing affordable, efficient housing. No griffon in our cities will live in squalor!"
 FAT_independent_municipalities:0 "Independent Municipalities"
 FAT_independent_municipalities_desc:0 "Both to ease the burden of administration and to ensure all of the Republic's citizens have a say over the affairs of their local governance, the Griffonian Republic will enshrine a clear separation of municipal, regional and national government powers."
 FAT_republican_honor_guard:0 "Honor Guard of The Republic"
 FAT_republican_honor_guard_desc:0 "Drawn from the noble tradition of griffonkind, the Republican Honor Guard will be a body of new knights in the chivalric image of old, made not to protect aristocratic privileges, but the safety and liberty of all citizens of the Republic."
 FAT_ground_up_democracy:0 "Trickle Up Democracy"
 FAT_ground_up_democracy_desc:0 "Democracy is not merely a political system, but a way of life. Griffenheim cannot enforce good governance across Griffonia from the top down; rather, our democracy is built from the bottom up, with a strong citizen spirit permeating all electoral processes from the local, to the regional, and then to the national - only in such a way can a true democracy be founded."
 FAT_splendor_to_surpass_the_empire:0 "Splendor To Surpass The Empire"
 FAT_splendor_to_surpass_the_empire_desc:0 "The Griffonian Empire prided itself on the capital's splendor, but the Griffonian Republic will pride itself on the model efficiency, utility modernization and aesthetic perfection of each and every one of its cities, from one end of the continent to the other."
 FAT_republican_austerity:0 "Griffonian Austerity Act"
 FAT_republican_austerity_desc:0 "The Republic's rapid expansion and consolidation left severe holes in our budget, and now that we enter a new period of stability, we must seek to close every loophole and outdated budgetary inefficiency. The Republic's citizens must be assured of the Republic's stable finances."
 FAT_president_kogchel:0 "Президент Когхель"
 FAT_president_kogchel_desc:0 "Гербен Когхель, бывший глава Фетизской Партии Труда - довольно умеренный грифон, которого уважают по всей нации. Он обещал работать над социальными услугами каждому и преобразованием Республики в здоровую демократию."
 FAT_president_astler_again:0 "Второй срок Эстлера" 
 FAT_president_astler_again_desc:0 "Рикард Эстлер храбро вёл Республику через все жестокие испытания, выпавшие на её долю в последние годы, и он поведёт нас к новому социалистическому обществу, свободному от капиталистического угнетения. За народную Грифонию!"
 FAT_direct_democracy:0 "Укрепить демократию"
 FAT_direct_democracy_desc:0 "Мы не предадим демократию, ведь именно она привела нас к процветанию. Благодаря петициям и референдумам всё больше власти будет сосредоточено в когтях народа."
 FAT_socialism_in_griffonia:0 "Грандиозный экономический план"
 FAT_socialism_in_griffonia_desc:0 "Конфликты, разрывавшие Грифонию на части, много разрушили и многие стали беднее. Чтобы побороть безработицу и запустить экономику, мы начнём крупномасштабную программу общественных работ, чтобы улучшить Республику. Сама природа будет в наших когтях, мы её поменяем так, чтобы она приносила пользу всем грифонам мира."
 FAT_socialized_healthcare:0 "Социализированное здравоохранение"
 FAT_socialized_healthcare_desc:0 "Слишком долго мы игнорировали больных, молясь, чтобы их судьба не настигла нас. Теперь мы можем оказать им помощь, а потому обязаны обеспечить наилучшее здравоохранение каждому гражданину. О больных и раненых будут заботиться лучшие врачи, ведь каждая жизнь бесценна. Мы сделаем бесплатное здравоохранение основным правом любого существа, показывая миру социалистическое процветание."
 FAT_guarantee_a_job:0 "Гарантия занятости"
 FAT_guarantee_a_job_desc:0 "Природа капиталистической модели - часть рабочих перегружать, часть держать в резерве и в бедности. Но если мы сложим богатство и объединимся в солидарности трудящимся, мы будем действовать по принципу "От каждого по способностям, каждому по потребностям"."
 FAT_industrial_unionism:0 "Поддержка профсоюзов"
 FAT_industrial_unionism_desc:0 "Все рабочие в одной отрасли должны быть в одном союзе — вне зависимости от умения или знания, чтобы гарантировать их права в ходе договоров и стачек. Вместо того, чтобы указывать различия между рабочими и игнорировать дела производств, мы должны сосредоточить внимание на сотрудничестве умелых и не очень."
 FAT_industry_for_the_workers:0 "Усилия по урбанизации"
 FAT_industry_for_the_workers_desc:0 "Грифоны больше не будут страдать от подлых богачей. Новый трудовой закон усилит рабочих и отдаст промышленность в их когти, наконец закончив батрачество на заводах. Разумные смены и законы о сверхурочной работе, протоколы о безопасности труды и оплачиваемые больничные улучшат жизни рядовых грифонов."
 FAT_president_kemerskai_jr:0 "Президент Кемерскай-младший"
 FAT_president_kemerskai_jr_desc:0 "Наслаждаясь народной поддержкой, Александр Кемерскай-младший победил. Его программа базировалась на централизации правительства и сильном президенте, готовым на смелые действия в защиту Республики и её граждан."
 FAT_continue_industrialization:0 "Продолжить сельскохозяйственную индустриализацию"
 FAT_continue_industrialization_desc:0 "Безопасность нашей нации требует создания новой индустриальной экономики. Современные технологии нуждаются в большей эффективности, чтобы максимально использовать землю и ресурсы. Прогресс движется вперёд, и мы не можем позволить себе отстать."
 FAT_redistribute_noble_wealth:0 "Перераспределить дворянское богатство"
 FAT_redistribute_noble_wealth_desc:0 "Слишком долго богатство и власть была в монополии нечистого на лапу дворянства. Хоть их политическая хватка над обществом и уничтожена, эти аристократы не заплатили цену за бесчестье. Их богатства изъяты для того, чтобы их поровну распределили всему народу."
 FAT_guarantee_prosperity:0 "Ни грифона позади"
 FAT_guarantee_prosperity_desc:0 "Земли Республики богаты и плодоносны, а наши граждане умелы и трудолюбивы. Было бы непростительно такой благословлённой нации не помогать народу: обеспечить процветание каждого - наш долг."
 FAT_bolster_the_military:0 "Поддержать военных"
 FAT_bolster_the_military_desc:0 "Республике необходимо иметь возможность проявлять свою силу на мировой арене и защищать свои активы. Что бы нас не ждало в будущем, мы должны смочь дать отпор!"
 FAT_the_republic_triumphant:0 "The Marshal's Dream Realized"
 FAT_the_republic_triumphant_desc:0 "Our engineers have finally completed a project that's been ongoing since our return to Griffenheim, the gradual conversion of the Imperial Palace into a Republican Parliament. With this last shadow of the Empire finally buried, the Griffonian Republic stands tall and triumphant. Here's to a new and free Griffonia!"
###CIVIL WAR TREE###
 FAT_guess_whos_back:0 "All Power To The President-Marshal"
 FAT_guess_whos_back_desc:0 "Against all odds, Kemerskai has managed to save the Republic from ruin twice already, and for the sake of us all, he must do so again. To this end, for as long as the Republic remains besieged by secessionists, all members of the National Republican Party stand behind him!"
 FAT_hold_the_line:0 "Hold The Line!"
 FAT_hold_the_line_desc:0 "With Griffenheim still firmly in our talons, a solid defensive strategy will serve us well, as we allow these various secessionists to fight among themselves while we strengthen our position and prepare to reassert our control over the Herzland."
 FAT_push_them_back:0 "Push Them Back!"
 FAT_push_them_back_desc:0 "Our position around Griffenheim is far too fragile to hold by itself; we should instead pursue an immediate and total victory in at least one of our fronts, in order to assure the Republic can immediately capitalize on gains and put pressure on our enemies."
 FAT_all_claws_on_deck:0 "All Claws On Deck!"
 FAT_all_claws_on_deck_desc:0 "Every griffon must do their part if we are to triumph over the secessionists and save the Republic. The Republican Army must not falter!"
 FAT_fortress_griffenheim:0 "Festung Greifenheim"
 FAT_fortress_griffenheim_desc:0 "Griffenheim remains the most crucial strategic asset under our control, with plenty of excess factories that can be hastily converted to serve the war effort. No matter what, Griffenheim cannot fall!"
 FAT_end_the_imperials:0 "Reappropriate The Army Stockpiles"
 FAT_end_the_imperials_desc:0 "The Imperial Restoration Front stole a large portion of the Republican Army's military stockpiles, leaving our armed forces in a poor state. We will correct this mistake definitely soon enough, but for now, retaking crucial basic armories will go a long way to fully pushing the secessionists to their breaking point."
 FAT_end_the_archons:0 "Blessings Of The Gods"
 FAT_end_the_archons_desc:0 "The old corrupt Archonates claim divine authority, but we will show them that it is the Griffonian Republic that holds divine mandate to bring liberty and justice to all of Griffonkind. Let all the truly faithful see for themselves that Boreas, Eyr and Arcturius stand with us!"
 FAT_restore_faith_in_the_government:0 "The Only Legitimate State"
 FAT_restore_faith_in_the_government_desc:0 "Only the Republic possesses the bureaucracy, the legal institutions and the functional state apparatus to govern the Herzland, and no reasonable griffon could possibly contest that. The glorified warlords that we are fighting will wither in due time, and only the Republic will remain."
 FAT_end_the_commies:0 "Aid For The People"
 FAT_end_the_commies_desc:0 "Reconstruction did not go as we had hoped, but this does not mean the Republic's commitment to the prosperity and safety of its citizens has waned. In the wake of yet another round of army marches through the already exhausted Herzland, aid to the less fortunate and those directly affected by the war will be provided at once."
 FAT_no_more_warlords_in_cloudbury:0 "No More Warlords In Cloudbury"
 FAT_no_more_warlords_in_cloudbury_desc:0 "Delusional military stronggriffons have cost the Republic greatly for the last time - the North's betrayal will be the last of its kind, and no more will the Republican Army deal with treachery amongst its own ranks. We march back to Cloudbury, for the Republic!"
 FAT_reassure_the_army:0 "Order Among The Armed Forces"
 FAT_reassure_the_army_desc:0 "Batallion officers, traitorous garrison commanders and agitators among the army corps led large swathes of our military astray. Military tribunals must be quickly established to judge and summarily strip of rank, exile and execute the treasonous agents, and a proper chain of command must be swiftly put in place."
 FAT_the_republic_stands_tall:0 "The Republic Stands Tall"
 FAT_the_republic_stands_tall_desc:0 "We've done it again: against the odds and facing imminent danger, the Republican Army has held firm one more time and defended the tricolour from destruction at the claws of secessionists and traitors. With our territories reunified, the Pangriffonian dream lives on. Long live the Republic! Long live the President-Marshal!"
###IMPERIAL DUCHY TREE###
FAT_the_imperial_duchy_of_cloudbury:0 "The Imperial Duchy of Cloudbury"
FAT_the_imperial_duchy_of_cloudbury_desc:0 "The restoration of the ancient rites gives the ducal government all the legitimacy and might of the Griffonian Empire. Cloudbury has no intention of being a passive subject - we will actively work with our Imperial liege to reunite Griffonia under its rightful sovereign and redeem the spirit of Griffonkind. For Cloudbury, for Duke and Emperor!"
FAT_the_empires_northern_sword:0 "The Empire's Boreal Sword"
FAT_the_empires_northern_sword_desc:0 "Cloudbury's armies have the experience and expertise of centuries when it comes to waging war in the harsh snow-covered mountainpeaks of the North, and this knowledge will do us well. Under His Majesty's divine mandate, Cloudbury lays claim to all the lands in the North that rightfully belong to her."
FAT_the_imperial_knights_of_cloudbury:0 "The Imperial Knights of Cloudbury"
FAT_the_imperial_knights_of_cloudbury_desc:0 "Cloudbury's knightly tradition is as old as the Duchy itself, and we have no intention of allowing such a tradition to wither. The Imperial Knights of Cloudbury will be an organization unlike any other, swearing oath to both Duke and Emperor, and they shall be their finest soldiers against the enemies of both."
FAT_for_the_emperor:0 "Kaiserliches Mandat der Ritter von Cloudbury"
FAT_for_the_emperor_desc:0 "The Prime Minister has secured the Empire's support for an edict which will assist the both of us greatly: by helping the Reichsarmee secure territory across Griffonia, we can secure some local land in order to build outposts for our Knights, allowing the Cloudburian army to coordinate across the entire continent."
FAT_a_model_imperial_duchy:0 "A Model Realm"
FAT_a_model_imperial_duchy_desc:0 "The state is at its best when each of its organs and layers, from the lowest to the highest, acts as a good example to the others. In the matters of war, governance and loyalty, the Grand Duchy will always put its best paw forward, showing all citizens of the Empire that we earn our relative independence with grit, fervor and devotion."
FAT_meeting_the_emperor:0 "A Formal Oath"
FAT_meeting_the_emperor_desc:0 "Grand Duke Oskar I is preparing to journey to Griffenheim to meet with the young Emperor and his regent soon, in order to swear his oath and accept the formal titles of his office and throne. This act will solidify our relation with Griffenheim, and give our Duke the legitimacy and prestige he must command."
FAT_splendor_of_the_north:0 "Splendor Of The North"
FAT_splendor_of_the_north_desc:0 "Our cold land has an innate and distant beauty to it, one which has informed the aesthetics and ethos of the Cloudburian people for centuries. As vassals of the Emperor, our image in the eyes of others in Griffonia is of paramount importance, and by promoting our cultural exports, we'll make sure all know Cloudbury is no backwards province."
FAT_his_majestys_most_loyal:0 "His Majesty's Most Loyal Retinue"
FAT_his_majestys_most_loyal_desc:0 "The Emperor and his regent can both be assured that Cloudbury's alledgiance will never be up for question again; for as long as Griffenheim honors the rites, the Grand Ducal army will be as an extension of his own, and will bring about the swift subjugations of his enemies, wherever they dwell."
FAT_promote_the_cloudburian_model:0 "An Appeal For The Constitutional Model"
FAT_promote_the_cloudburian_model_desc:0 "The Empire is a bulwark of good royal governance, and by the gods, it can never fall to ruin again. It is crucial that the young Emperor sees reason, even if his regent does not, and to this end, we are prepared to present the case for a stable and incorruptible monarchy."
FAT_imperial_army_joint_ops:0 "Cooperate With The Reichsarmee"
FAT_imperial_army_joint_ops_desc:0 "The Empire's extensive military research and doctrinal innovation will serve to refine the raw strength and expertise of our own armed forces. With Griffenheim's help, we'll create an officer corps and a body of soldiers so fearsome, each of them will equal ten recruits of any other nation."
FAT_imperial_advisory_committee:0 "Det Kejserlige Udvalg af Cloudbury"
FAT_imperial_advisory_committee_desc:0 "A new cooperative committee with Imperial advisors will assure Cloudbury is always kept up to date with the latest happenings and keeps its military and political edge sharp."
FAT_stake_in_the_imperial_economy:0 "A Stake In The Imperial Economy"
FAT_stake_in_the_imperial_economy_desc:0 "As an Imperial vassal, it's only right we invest into shared in imperial corporations and enterprises and work together to reestablish the commercial routes with the Herzland that Cloudbury once relied upon."
FAT_give_the_empire_its_traitors:0 "Render Unto Kaiser What Is Kaiser's"
FAT_give_the_empire_its_traitors_desc:0 "In our consolidation wars, we have succeeded in retrieving alive a couple deserters, traitors to both the old Republic and to the Empire. We should send them to Griffenheim for judgement as a token of our good will, and to prove our capability to the Imperial regency."
FAT_like_the_good_old_days:0 "Just Like The Good Old Days"
FAT_like_the_good_old_days_desc:0 "With some well thought out policy decisions and good will on part of Griffenheim, we've managed to restore the stable governance to Cloudbury that it once enjoyed under the Empire's purview. We may now fulfill our purpose and contribute greatly to the imperial restoration project so all of Griffonia can enjoy the order and prosperity from which we now benefit."
FAT_connect_cloudbury_to_griffenheim:0 "Expand the Cloudbury-Griffenheim Line"
FAT_connect_cloudbury_to_griffenheim_desc:0 "A series of railways already connects Cloudbury to Griffenheim by train, but the Empire's railway expansion program did not properly extend to the North. A streamlined rail project connecting the two cities properly can be easily established by expanding and maintaining the connections that already exist."
FAT_integrate_the_old_republicans:0 "Incorporate The NRP"
FAT_integrate_the_old_republicans_desc:0 "Some old members of the NRP, led by Stefano, remain politically organized in the Duchy. Further persecution of the Republicans is cruel and ultimately unnecessary, and Arivelli is a reasonable enough griffon. With a bit of negotation, the Cloudburian Parliament will recognize a reformed social-democratic party which will bring the old Republicans into the fold."
FAT_commit_to_free_press:0 "Commit To A Free Press"
FAT_commit_to_free_press_desc:0 "As part of our concessions to peaceful reconciliation with the old Republicans, the Cloudburian Parliament is ready to pass a motion which will ammend the Cloudburian constitution, outlawing state censor of free press and assuring freedom of speech for all citizens."
FAT_work_with_harmonists:0 "A Mutual Alliance"
FAT_work_with_harmonists_desc:0 "Rosewing's connections among the military staff can assure that with the right maneuvers, the old junta never holds power again, and in exchange, we can negotiate with the SPC to similarly draw all relevant political support away from radical anti monarchist elements, assuring the complete dominance of a stable political system."
FAT_a_liberal_duchy:0 "Ducal Liberalism"
FAT_a_liberal_duchy_desc:0 "The Grand Duchy has successfully incorporated the revolutionary elements of 978 with the traditional ruling powers of the monarchy, and created for itself a government conceived both in defense of liberty and the nation's integrity. This model will surely serve as a shining example to the Empire at large, and Rosewing's gamble will be vindicated."
FAT_ottos_naval_projection_initiative:0 "The Empire's Western Fleet"
FAT_ottos_naval_projection_initiative_desc:0 "Our position in the Griffonian Northwest and proximity to the closest Equusian ports makes Cloudbury the perfect nexus point for Imperial naval power across the Celestial Sea, and Otto's initiative will assure the regency in Griffenheim sees fit to recognize this potential."
FAT_propose_a_betrothal:0 "Propose A Betrothal"
FAT_propose_a_betrothal_desc:0 "Otto Saxhagen-Plumenjar's daughter, Ophelia, is soon to be of age, and would make for the perfect advisor and companion to the young Emperor. We will request the imperial regency for a personal betrothal which will promise Ophelia's claw in marriage to Grover VI, uniting the two Houses and assuring the Empire and Cloudbury will be forever united."
FAT_offshore_oil_drilling:0 "Invest Into Heavy Metal Mining"
FAT_offshore_oil_drilling_desc:0 "Relying on foreign imports for the Cloudburian Navy is less than idea. Thankfully, at Otto's discretion, we will seek foreign expertise into heavy metals prospecting and refining, so we can develop the native metallurgic industry that Cloudbury needs for its naval production."
FAT_i_am_the_captain_now:0 "Masters Of The Celestial Sea"
FAT_i_am_the_captain_now_desc:0 "As the Reichsarmee focuses on land power and occupation, the Ducal Navy of Cloudbury will stand uncontested in Griffonia as the Empire's premier fighting force at sea. We cannot rely on Griffenheim for such a purpose; we must always strive to be at the cutting edge of doctrinal and technological development so the Cloudburian Navy may pulls its weight."
FAT_ask_for_skyfall:0 "Negotiate For the Port"
FAT_ask_for_skyfall_desc:0 "We have served the Empire faithfully, and in return, Otto has recommended we request the port of Skyfall from the Griffonian Empire in order to expand the Cloudburian Navy and provide us a stronger position for intercontinental commerce. The Emperor can be assured the Grand Duke will be an infinitely more trustworthy griffon to hold these ports than the trade princes."
FAT_to_an_eternal_empire:0 "The Empire Of Liberty"
FAT_to_an_eternal_empire_desc:0 "With the Cloudburian model standing tall as a shining example for all of Griffonkind and the Empire proper to soon reform along its lines, we have assured the prosperity and security of all griffons under stable governing principles. Much as he would've objected, we have fulfilled the late Marshal's goals. For Hertugen og Kejseren!"

