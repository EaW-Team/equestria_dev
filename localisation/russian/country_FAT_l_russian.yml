###RECONSTRUCTION POLICY UI###
 FAT_sectarianism_display_tt:0 "£FAT_texticon_sectarianism §CРазобщённость§! отражает общее недовольство в Герцланде и уровень основанного на самоидентификации раскола между различными группами интересов и регионами. Это значение является базой для расчёта времени выполнения всех решений по реконструкции, значительно замедляя прогресс по мере роста и достигая максимума в 75. Его можно снизить, сотрудничая и идя на уступки одной из трёх фракций."
 FAT_sectarianism_display_number_text:0 "[?FAT_sectarianism_value|C0]"
