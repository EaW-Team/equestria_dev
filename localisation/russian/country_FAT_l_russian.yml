 FAT_situation_in_nova_unfriendly:0 "§YСитуация в Нова Грифонии§! сложилась §Rнеблагоприятно§! для республиканцев."

 griffonRepublic_history.2.t:0 "Грифенхейм в хаосе"
 griffonRepublic_history.2.d:0 "Правительство Гровера V погрузилось в политический хаос. Когда распространились слухи о том, что реформы Гровера IV будут отменены, а сам молодой император оказался лишь марионеткой дворян, имперская система дала трещину. Дворяне жили всё роскошнее, пока народ страдал, а армия постепенно теряла веру в императора. В частности, офицеры во главе с Кемерскаем, Сантейлом и Роузвинг образовали собственную клику. В судьбоносный февральский день 978 года крестьяне и рабочие вышли на улицы Грифенхейма, сражаясь со стражей и штурмуя дома и тюрьмы. Всех заключённых из имперских камер освободили, и вскоре народ маршировал к Имперскому дворцу. Кемерскай и многие другие офицеры, участвовавшие в масштабном бунте армии, вместе с сотнями простых грифонов стояли у порога центра имперской власти. В полном хаосе толпа ворвалась во дворец, растаптывая древние ковры, разбивая артефакты и ломая витражи архоната.\n\nТем не менее, никто из простых грифонов не смог найти Гровера V, несмотря на значительные усилия Кемерская. Согласно республиканским отчётам, его в последнюю минуту спас Эрос. Зато простым грифонам и солдатам попался в когти весь регентский совет. Одних подвергли показательным процессам и казнили, других избили прямо на улицах, третьи пытались прорваться сквозь толпу и сбежать. Регентский совет утратил всякую власть в столице, а их смерти вызвали ликование тысяч грифонов. Вскоре народ поддержал армейский бунт и Национальную Республиканскую Партию, провозгласившую Республику Грифонов."
 griffonRepublic_history.2.a:0 "Долой имперцев!"

 griffonRepublic_history.3.t:0 "Первый бой революции"
 griffonRepublic_history.3.d:0 "После взятия Грифенхейма имперские войска были отброшены в цитадели монархизма – Бронзхилл и Клубничное герцогство, где семья Иглкло предоставила убежище архонту и императору. Кемерскай реорганизовал свои войска для стремительного захвата центра Империи – герцогства Грифенхейм. Сам Кемерскай завоевал Междуречье у реки Гриффкинг, где всё ещё правил его отец, барон Виннина. Рейнхард Сантейл, Шнабель Санглайдер и Андерс фон Брума, командир из Йеля, быстро примкнувший к республике, пошли в атаку на город Крона. Николь Роузвинг отвечала за окружение имперских сил у Кронбурга и на востоке.\n\nСилы Кемерская вступили в бой с армией графа Междуречья, Йонаса Хардвейлера, у реки Гриффкинг. Генерал Кемерскай впервые получил шанс показать свои тактические умения как новый маршал республики и исполняющий обязанности президента. Победа была решительной: войска графа Йонаса отступили на север, а после дальнейших сражений с республиканцами им пришлось уйти в Бронзхилл и сложить оружие. Кемерскай воспользовался рекой, и когда плохо разбирающийся в стратегии Йонас начал переправлять свои войска через неё, республиканская артиллерия нанесла им тяжёлый урон, вынудив отступить, потеряв при этом лишь немного своих солдат.\n\nПозже выяснилось, что во время боя Хардвейлер был пьян, считая республиканцев лишь кучкой крестьян, неспособных к армейской тактике. Впав в ярость, архонт изгнал его из Империи, а граф Йонас, по слухам, упился до смерти в Зебрике, окончательно убедившись, что победа республики неизбежна и что он подвёл своего императора-птенца."
 griffonRepublic_history.3.a:0 "Молодец, Кемерскай!"

 griffonRepublic_history.4.t:0 "Падение герцогства Междуречье"
 griffonRepublic_history.4.d:0 "К тому времени, как Кемерскай отступил на север Междуречья, произошло кое-что интересное. Жители города Вюртенрест, столицы региона, только что подняли крестьянское восстание после поражения их графа в битве при Гриффкинге и его изгнания. Его брат и наследник отступил в Бронзхилл, где он стал служить архонту, а крестьяне Междуречья официально завоевали свободу. Это новое государство – Крестьянская Республика Междуречья – изначально было почти социалистическим, распределяя богатство и власть поровну между крестьянами и организовывая их в коммуны. Хоть Кемерскай и хотел изначально подавить повстанцев, его политический соперник Аспер Сиклкло убедил его встретиться с крестьянами и договориться с ними. В ходе договорённостей было решено дать им значительную автономию, если они объявят о верности республике. Так и случилось."
 griffonRepublic_history.4.a:0 "Революция казалась непобедимой."

 griffonRepublic_history.5.t:0 "Сын против отца"
 griffonRepublic_history.5.d:0 "Армии Кемерская в Междуречье двинулись на север, сопровождаемые крестьянскими ополченцами, верными Крестьянской Республике Междуречья. Там они встретились с армией отца Кемерская – стареющего барона Виннина, Алдуса Кемерская. Сначала войска Алдуса одерживали верх в битве за Виннин, отражая атаки своего сына. Однако Кемерскай применил оборонительную тактику и артиллерийские обстрелы, благодаря которым и прославился. В обороне он истощил силы отца: тысячи грифонов погибли, штурмуя линию Кемерская, и в ходе контратаки войска барона, несмотря на численное превосходство, были отброшены к самому городу.\n\nАрмия Алдуса капитулировала, и он был взят в плен собственным сыном. Вместе с его штабными офицерами (солдатам предложили присоединиться к республике, а тех, кто отказался, казнили на месте) его привезли на центральную площадь Виннина, где некогда он провозглашал приказы и декреты императора. Теперь же всё изменилось: Алдус был казнён за предательство народа и крестьян Грифонии. Барон Виннина, преданный своим сыном, был разъярён и в последних словах перед казнью проклял Кемерскаю.\n\nРеспублика установила контроль над всем Междуречьем. Кампании Сантейла и Роузвинг на востоке, юге и севере также оказались успешны, и казалось, что республика вот-вот возьмёт под контроль весь Грифенхейм с пригородами. Многие войска уже вступали в поддерживающие республиканцев Катерин и Энгривер на юге."
 griffonRepublic_history.5.a:0 "Переломный момент."

 griffonRepublic_history.6.t:0 "Грифонья весна"
 griffonRepublic_history.6.d:0 "После окончательного завоевания Сердца Империи Александр Кемерскай, которого многие считали лидером революции, глава Национальной Республиканской партии и командующий успешной операцией в Междуречье, призвал к первым в истории Империи Грифонов президентским выборам. На них доминировала Национальная Республиканская партия во главе с Кемерскаем, но участвовали и другие силы, такие как Социалистическая Народная Партия, ведомая юным революционером-идеалистом Аспером Сиклкло, выступавшим за социалистическую практику и идеологию. В выборах также участвовали правые революционные организации, например Национальный Революционный Фронт во главе с ныне мёртвым Петером Альстреннером, пропагандировавшим безоговорочный антимонархизм, фанатичный национализм, общегрифонью идентичность и корпоративистскую экономическую систему.\n\nКак и ожидалось, победил Кемерскай, набрав 77% голосов, тогда как Сиклкло и Альстреннер получили менее 15%. Риторика единства НРП, их демократические принципы и тот факт, что революция ещё продолжалась, а народ жаждал стабильности, обеспечили им лёгкую победу. Военный опыт Кемерская и его известность как героя сделали его крайне популярным кандидатом, а его кабинет был в основном составлен из фигур, одобренных умеренными партиями. В нём были генералы, идеалисты и прагматики, объединённые ради общего дела и демократических целей. По крайней мере, в теории.\n\nПервые сто дней правления Кемерская оказались на удивление стабильными: грифоньи контрреволюционеры всё ещё зализывали раны в Бронзхилле и Клубничном герцогстве и не предпринимали значительных наступлений. Стремясь заручиться поддержкой рабочих, крестьян и прочих недовольных, Кемерскай немедленно начал проводить масштабные реформы. Первым указом его правительства стало упразднение устаревших законов о рабстве, крепостничестве и службе Империи, освобождая всех, на кого они распространялись, даже несмотря на то, что многие из этих указов уже давно не применялись. Кемерскай пошёл дальше, утверждая социальные реформы для простых грифонов: законы о минимальной зарплате и значительное налогообложение дворян и олигархов с целью перераспределения их богатств. Эти меры были невероятно популярны, и рейтинг Кемерская стремительно вырос. Тем не менее, правительство столкнулось с инфляцией, так как экономисты уделяли слишком много внимания социальным программам, пренебрегая балансом бюджета, что привело к печатанию огромного количества денег ради благородных целей Кемерская.\n\nНо пока Грифония хотя бы свободна."
 griffonRepublic_history.6.a:0 "Настоящая демократия?"

 griffonRepublic_history.7.t:0 "Ничто не вечно"
 griffonRepublic_history.7.d:0 "К несчастью для республики, грифонье дворянство в изгнании не позволило республиканцам просто взять контроль над страной. Юный Гровер V при поддержке верного опекуна и духовного наставника архонта Эроса VII начал контрреволюцию. При содействии графа Бронзхилла, чьи вассалы сохранили верность монархии, и герцога Клубники, женатого на тёте Гровера, контрреволюционеры закрепились на севере. Наступая из Бронзхилла и Клубничного герцогства, имперские войска разгромили республиканцев в Междуречье, положив конец социалистическим республиканцам, укрепившимся там, и восстановили баронство Виннин во главе с братом Кемерская – Августом Кемерскаем I. Аспер Сиклкло едва спасся и продолжал поддерживать Национальную Республиканскую партию, хотя многие ультранационалисты разуверились в Кемерскае.\n\nАрхонт Эрос VII собрал внушительную армию: объединённые силы Империи, Фетизии, алмазных псов и Иглкло выступили против президента-маршала. Александр Кемерскай отдал приказ о безоговорочном отступлении из Грифенхейма, намереваясь совершить тактический отход на север и постепенно завоевать слабое герцогство Клаудбьюри, разослав письма всем генералам армии. В Великом походе участвовали собственная армия Кемерская, находившаяся в Междуречье, армии Николь Роузвинг и Макса Уайтфезера, действовавшие в Катерине и Энгривере, а также армия Рейнхарда Сантейла на севере. Многие другие войска стремились присоединиться к Походу, но были обнаружены имперскими патрулями и уничтожены. Часть республиканских армий осталась в Энгривере и укрылась в великом Шайсвальде, периодически совершая набеги на близлежащие лесные города. Другие ушли в Катерин, включая рыцарские бригады, выступившие на стороне республиканцев, что привело к необычному союзу набожных рыцарей и революционеров."
 griffonRepublic_history.7.a:0 "Прощай, дорогая республика."

 griffonRepublic_history.8.t:0 "Конец начала"
 griffonRepublic_history.8.d:0 "Генерал Лука Фальваттер, защищавший захваченные земли в Бронзхилле, получил приказ провести армию алмазных псов и грифонов-республиканцев на север, к Клаудбьюри, через горы Уайттейл, чтобы ударить по герцогству с фланга, пока его войска были заняты на юге. План Луки был ключевым для лёгкой победы над герцогством Клаудбьюри, вместе с бунтарями-освободителями под командованием Георгия Тифезера в горах Уайттейл. Однако Лука оказался застигнут врасплох силами графа Бронзхилла во главе с ныне знаменитым генералом Шепом Айронхоллом. Его армия была окружена несколькими дивизиями алмазных псов и уничтожена, сорвав все планы войны на два фронта против герцогства. Позже тело Луки нашли рядом с телом Тифезера, чья дочь впоследствии продолжила его дело.\n\nПока армии Люстера отступали на севере, республиканская командующая Блэкрок решила позабыть про возвышенные мечты. Её подразделение превратилось в независимую кочующую бандитскую армию. Цель Блэкрок – взять Грифонстоун от имени республики – сменилась на стремление захватить его ради создания собственного бандитского королевства. Письмо Кемерская с призывом отступить в Клаудбьюри, насколько известно, было сожжено Блэкрок во время её отхода на юг. Её войско больше не участвовало в Великом северном походе.\n\nТем не менее, не всё было потеряно. Армия Кемерская быстро объединилась с силами Рейнхарда Сантейла и Николь Роузвинг у границы с Фетизией и готовилась к отходу на север, в герцогство Клаудбьюри. Когда их войска двигались на север, их перехватила огромная армия, включавшая силы Клубничного герцогства и Фетизии. Совместными усилиями трёх, пусть и ослабленных армий, Кемерскай, Сантейл и Роузвинг отбили атаки врагов с умеренными потерями. Битва за Мирабель была выиграна, и три армии пересекли фетизско-клаудбьюрийскую границу."
 griffonRepublic_history.8.a:0 "В Клаудбьюри, ребята!"

 griffonRepublic_history.9.t:0 "Южный бой"
 griffonRepublic_history.9.d:0 "Когда республиканцы пересекли фетизско-клаудбьюрийскую границу с юга, они прибыли в город Клоборг – один из немногих городов Клаудбьюри, где власть не передавалась по наследству. Это был имперский вольный город, и формально он оставался прямым подданным Империи Грифонов. Однако начиная с 965 года герцог Клаудбьюри Отто II активно пытался включить его в состав герцогства, поскольку ослабленная Империя мало что могла предпринять в ответ. Клоборг же открыто заявил о поддержке восстания Кемерская и снабжал его солдат оружием, провиантом и местом для отдыха. Карл Свенс-Риннер и его протеже Тобиас Сивенхоф, будущий многообещающий республиканский министр, стали лидерами республиканского движения в Клаудбьюри, вдохновив многих на восстания и нападения по всей стране после своей декларации в поддержку Кемерская.\n\nХотя республиканцы верили, что смогут легко завоевать Клаудбьюри, война на севере продолжалась, и зимой 979 года они были вынуждены остаться в южных провинциях герцогства, включая большую часть Вингхагена (за исключением самого города, находившегося под осадой). Клаудбьюрийский флот всё ещё держал порт Вингхагена и снабжал осаждённый город продовольствием, закупая его в Ведине и Империи. Имперская армия, что любопытно, не атаковала республиканцев с юга, сосредоточившись на подавлении внутреннего сопротивления и удержании тех немногих земель, что оставались после многочисленных деклараций независимости вассалов. Казалось, что война затянется: осада Вингхагена продолжалась, а о завоевании Клаудбьюри до весны можно было лишь мечтать.\n\nОднако ситуация изменилась, когда прибыла небольшая флотилия под командованием братьев Германа и Корнелиуса Хассентельфов – республиканских морских офицеров из мелкой фетизской дворянской семьи. Их вмешательство переломило ход осады: Хассентельфы разгромили клаудбьюрийский флот, который и не подозревал о присутствии республиканских кораблей. После поражения флота Вингхаген быстро капитулировал. Граф Леонард Гёртц лично передал письмо о сдаче генералу Николь Роузвинг, но это его не спасло: за преступления против Республики Грифонов и революции он был повешен за предательство всего через несколько часов после поражения."
 griffonRepublic_history.9.a:0 "Нас хотя бы поддерживает народ..."

 griffonRepublic_history.10.t:0 "Битва за Клаудбьюри"
 griffonRepublic_history.10.d:0 "За последние месяцы республиканцы добились определённых успехов, но так и не смогли завоевать главную цель – Клаудбьюри. Город дважды оказывался почти окружён объединёнными армиями Сантейла и Роузвинг, однако численность войск Отто значительно превосходила силы республиканцев, и это позволило ему отражать любые попытки тактического окружения. Поскольку запад и восток в основном контролировались республиканцами, ключом к капитуляции герцогства оставался город Клаудбьюри. И хотя графства и баронства вокруг него пали, Отто II забаррикадировался со своими армиями в самом сердце герцогства.\n\nТем не менее, если Отто II сумел защитить город от республиканцев, то от собственных жителей он его не спас. Под покровом ночи республиканские агенты вместе с тысячами рабочих и крестьян Клаудбьюри взяли штурмом дворец во время жестоких событий 978 года. По приказу республиканцев Отто II оставили в живых лишь затем, чтобы казнить за измену против Республики Грифонов. Подстрекаемая военными, жаждавшими мести со времён изгнания из Грифенхейма, толпа рабочих и солдат учинила массовую расправу над аристократами и дворянами в так называемой «Резне Клаудбьюри». Сын и наследник Отто II Карл вместе с братом Кристофером были убиты республиканцами, как и большинство их ближайших родственников из династии Плюменьяр.\n\nОскар Плюменьяр, племянник Отто, умолял о пощаде прямо перед Кемерскаем. Его вместе с дочерью и женой избавили от виселицы. Милосердие Кемерская использовалось как инструмент пропаганды, однако Оскар был сослан в небольшую деревню на территории Северных Племён, у самой границы Клаудбьюри, чтобы Плюменьяры никогда больше не могли угрожать ни герцогству, ни республике."
 griffonRepublic_history.10.a:0 "Победа!"

 griffonRepublic_history.11.t:0 "Наш темнейший час"
 griffonRepublic_history.11.d:0 "«Эта предательская контрреволюция опаснее Эроса VII, Иглкло и Бронзтейла вместе взятых, потому что в нашей стране правит меньшинство, пока собственность крестьян приходит в упадок, а демобилизация отпустила огромное число потенциально неблагонадёжных элементов,» — Александр Кемерскай о скайнавской революции.\n\nНа выборах 986 года с незначительным перевесом должна была победить Национальная Республиканская партию Александра Кемерская. Однако многие в республике сомневались, действительно ли победа досталась Кемерскаю. Аспер Сиклкло, социалистический боец и революционер, воспользовался возросшим недовольством «Старым маршалом» и, создав коалицию с Партией за права клаудбьюрийцев, вывел Социалистическую Народную партию на уровень серьёзной угрозы Кемерскаю. Когда газеты предрекали уже победу Сиклкло с небольшим перевесом, Кемерскай принял решение, изменившее республику навсегда.\n\nЗаконодательное собрание, контролируемое НРП с огромным перевесом голосов, приняло «Акт спасения республики 986 года». Этот закон значительно усилил исполнительную власть президента-маршала и отменил парламентские и президентские выборы до тех пор, пока «национальная безопасность не будет в подходящем положении для процветания демократии». Любые надежды на президентство Сиклкло были разрушены, и НРП Кемерская вновь осталась единственной политической силой в республике.\n\nСоциалисты резко отреагировали на Акт спасения республики. Сиклкло сформировал Единый социалистический революционный фронт и бежал на север во время Второго северного похода, а покалеченная войной республиканская армия не имела сил его остановить. Так возникла Социалистическая Республика, а революция 986 года стала грязным пятном в истории и политике хрупкой республики."
 griffonRepublic_history.11.a:0 "Неужели всё потеряно?"

 griffonRepublic_history.12.t:0 "Смена гвардии"
 griffonRepublic_history.12.d:0 "Хотя республика в целом восстановилась после революции 986 года и скайнавского предательства, многие в правительстве оставались недовольны политикой режима Кемерская – особенно Николь Роузвинг, верная начальница штаба и вице-президент до тех пор, пока эти посты не были разделены после её увольнения.\n\nРоузвинг, разочарованная автократическими мерами Кемерская и его неспособностью принять принципы грифоньей революции, начала соперничать с президентом-маршалом по всё более мелочным вопросам. Когда Роузвинг заявила, что конституционная монархия была бы лучше нынешнего режима, Кемерскай в ярости снял её со всех постов за «неподчинение». Должность вице-президента получил Шнабель Санглайдер – политик, также обеспокоенный растущим авторитаризмом Кемерская, и призванный восстановить связи между старой гвардией Национальной Республиканской партии и её правыми элементами. Его неоднозначным преемником на посту начальника штаба стал Рейнхард Сантейл, находившийся под расследованием прессы и правительства из-за возможных связей с ультранационалистами. В очередной попытке объединить политические силы республики Кемерскай назначил командовать армией грифона, которому доверять явно было нельзя, несмотря на весь его командирский талант.\n\nРоузвинг была отправлена Кемерскаем на север для «поддержания мира», но это оказалось роковой ошибкой. Разъярённая действиями правительства, которому она некогда клялась служить, грифина занялся разбойничеством и помогала полевым командирам, собирая клаудбьюрийцев и монархистов в подпольные коалиции. Хотя она и не прибегала к столь оголтелому бандитизму, как Сантейл, её действия ускорили падение республики в хаос, усилили власть полевых командиров и распространение бандитизма – факторов, которые и по сей день отравляют жизнь республики."
 griffonRepublic_history.12.a:0 "Ой."

 griffonRepublic_history.13.t:0 "Конец Сантейла"
 griffonRepublic_history.13.d:0 "Ночью 13 октября 1003 года Клаудбьюри едва не сгорел. Рейнхард Сантейл вместе с рядом республиканских офицеров и политиков, связанных с Грифоньим Национальным Революционным Фронтом, был замечен за планированием ужасного злодеяния – государственной измены республике и попытки теракта. Хотя Сантейл формально не был обвинён, произошла утечка детальных планов атаки под чужим флагом, распространённая информаторами НРП. Вину возложили на коммунистов и центристов партии, чтобы оправдать государственный переворот ГНРФ. Среди имён в деле фигурировал и сам Рейнхард Сантейл.\n\nКемерскай, не имея достаточных доказательств для прямого обвинения Сантейла, который отвергал все заявления правительства и заговорщиков, принял решение выслать его на север, как ранее Роузвинг, и лишить всех должностей в правительстве. Новым начальником штаба стал Шнабель Санглайдер, которого Кемерскай считал опасным вице-президентом. Его прежнюю должность занял Генрих Кингфезер – прагматик и близкий друг Кемерская со времён Республиканской революции. Сантейл и Роузвинг больше не входили в правительство, и относительное единство вновь установилось среди высших чинов республики, хотя изгнание на север Сантейл перенёс куда тяжелее, чем Роузвинг.\n\n"
 griffonRepublic_history.13.a:0 "Борей их побери!"

 griffonRepublic_history.14.t:0 "Восход левого крыла НРП"
 griffonRepublic_history.14.d:0 "В ходе непредвиденного исхода, неожиданного для всей республики, силы социализма и юнионизма вновь пришли к власти, одерживая победу за победой – невиданные со времён революции 986 года.\n\nНачалось всё с восхождения Рикарда Эстлера, депутата городского совета и радикального деятеля, выступавшего за обширные социальные программы, самоуправление рабочих в кооперативах и продолжение урбанизации. Новые, так называемые «Левые из НРП» Эстлера вскоре заняли большинство мест в городских советах по всей Республике – от Скварка до Вингхагена. Социалистические идеи стали заметны в профсоюзах и на рабочих местах.\n\nСам Эстлер, однако, не смог попасть в городской совет. В 1005 году он выдвинулся на пост мэра Клаудбьюри – один из немногих, выборы которого не были отменены Кемерскаем в 986. Действующий мэр Николас Эгшер оклеветал Эстлера, назвав его безбожным коммунистом, пешкой скайнавцев и глупым идеалистом. Сам Эгшер состоял во фракции Санглайдера и выступал за многие ценности, близкие к идеям Эстлера, но его фанатичный антисоциализм в итоге погубил его карьеру. Эстлер, опираясь на социальные реформы, проведённые в Клаудбьюри за последние месяцы, выиграл выборы с ошеломляющим перевесом, впервые за более чем два десятилетия сместив Эгшера.\n\nВскоре Эстлер вошёл в совет Кемерская, а влияние «Левых из НРП» продолжало стремительно расти по всей республике. Но вместе с этим росли и амбиции самого Эстлера."
 griffonRepublic_history.14.a:0 "Проклятые социалисты."

 griffonRepublic_history.15.t:0 "Обратно домой"
 griffonRepublic_history.15.d:0 "Дорогой дневник,\n\nЭто было нелёгкое приключение, во время которого моя жизнь не раз висела на волоске. Именно поэтому возвращение в безопасный Кантерлот оказалось особенно приятным. Конечно, теперь он не столь безопасен, как прежде: козы всерьёз злы на меня за отказ помочь им вернуть колокол. И дело было вовсе не в моей злой воле, а в том, что это очень опасно. Колокол охранялся и был запечатан так тщательно вовсе не случайно. Что бы ни скрывалось в гробнице в Азире, оно было заключено там не без основания. Однако мои доводы не убедили шестерых, и они отказались меня слушать, вынудив бежать. Не обошлось без пары ушибов, но с помощью Расти Бакет мы сумели оторваться от погони козлов.\n\nУ меня всё ещё оставался тот самый кристальный шар, хотя он больше и не был нужен. Я решил оставить эту тайну в покое и сделать её достоянием общества. Но я не могу избавиться от ощущения, будто сфера наблюдает за мной. Пожалуй, лучше уничтожить её раз и навсегда. Так никто никогда не найдёт запретный колокол."
 griffonRepublic_history.15.a:0 "Некоторые секреты должны остаться нераскрытыми."

###NEWS###
 griffonRepublicNews.1.t:0 "Эквестрия признаёт Республику Грифонов"
 griffonRepublicNews.1.d:0 "[This.GetNewspaperHeader]Сегодня, после нескольких встреч послов Эквестрии и Республики Грифонов, [equestria.GetLeader] официально признала республику как законное правительство Грифонии. Кроме того, было сделано официальное заявление, в котором говорилось, что республиканцы стремятся принести свободу, демократию и процветание, и что успех республики ознаменует конец угнетения на континенте. Империя Грифонов, в свою очередь, осудила «загнивающую Эквестрию»."
 griffonRepublicNews.1.d_ne:0 "[This.GetNewspaperHeader]Сегодня, после нескольких встреч послов Эквестрии и Республики Грифонов, [equestria.GetLeader] официально признала республику как законное правительство Грифонии. Кроме того, было сделано официальное заявление, в котором говорилось, что республиканцы стремятся принести свободу, демократию и процветание, и что успех республики ознаменует конец угнетения на континенте."
 griffonRepublicNews.1.a:0 "Спасибо нашим друзьям из Эквестрии."
 griffonRepublicNews.1.b:0 "Презренные дураки!"
 griffonRepublicNews.1.c:0 "Это начало великой дружбы!"
 griffonRepublicNews.1.e:0 "Интересно."

 griffonRepublicNews.2.t:0 "Триколор в Грифенхейме"
 griffonRepublicNews.2.d:0 "[This.GetNewspaperHeader]Сегодня республиканский триколор был поднят над Императорским дворцом в Грифенхейме, бывшей столице Грифоньей Империи. Это знаменует крупную победу республиканских сил, которые значительно укрепили свои позиции на бывших имперских землях обещаниями реформ и мира. [FAT.GetLeader] провозгласил, что каждый грифон будет пользоваться основными правами – свободой, демократией и процветанием. Тем не менее, неясно, станет ли это реальностью.\n\nРеспубликанцы победили своих старых соперников-аристократов, и для Грифонии, возглавляемой республикой, начинается новая эра."
 griffonRepublicNews.2.a:0 "Начало новой эры!"
 griffonRepublicNews.2.b:0 "Интересно."
 griffonRepublicNews.2.c:0 "Впечатляюще."
 griffonRepublicNews.2.e:0 "Ужасно!"

 griffonRepublicNews.3.t:0 "Маршал Кемерскай скончался"
 griffonRepublicNews.3.d:0 "[This.GetNewspaperHeader]Сегодня президент-маршал Республики Грифонов Кемерскай скончался. Его смерть знаменует начало траура в республике, так как народ прощается с величайшим героем республиканской революции. Во время революции Кемерскай вёл державу к независимости.\n\nРеспублика скорбит по великому государственному деятелю и лидеру."
 griffonRepublicNews.3.a:0 "Республика никогда не забудет маршала."
 griffonRepublicNews.3.b:0 "Одной проблемой меньше."
 griffonRepublicNews.3.c:0 "Великий герой покинул нас."
 griffonRepublicNews.3.e:0 "Наконец-то он сыграл в ящик!"

 griffonRepublicNews.4.t:0 "Свержение президента Кемерская"
 griffonRepublicNews.4.d:0 "[This.GetNewspaperHeader]К власти пришло левое крыло НРП, и правлению Кемерская пришёл конец. Он получил титул «Отца республики», почётное место в парламенте и должность советника нового президента. С уходом Кемерская республика стала социалистической демократией, и, скорее всего, левое крыло НРП будет сотрудничать с гармонистами. Правительство заявило, что оно всё ещё привержено Республиканской мечте и не будет прогибаться под Скайнавию, но многие республиканцы сомневаются. «Это отвратительный ход, плевок в лицо всему, за что стоит наша республика, даже если это так называемый демократический социализм!» — заявил президент-маршал из своего нового дома в Вингхагене. Это новое начало для Республиканской мечты или же начало Республиканского кошмара?"
 griffonRepublicNews.4.a:0 "Республике было необходимо это сделать, чтобы идти дальше."
 griffonRepublicNews.4.b:0 "Никто не может отрицать, что он был хорошим государственным деятелем."
 griffonRepublicNews.4.c:0 "Социалисты? В моей буржуазной демократии?"
 griffonRepublicNews.4.e:0 "Эта республиканская сволочь получила по заслугам."
 
 griffonRepublicNews.5.t:0 "Война в Герцланде"
 griffonRepublicNews.5.d:0 "[This.GetNewspaperHeader]После бурного периода Реконструкции, омрачённого неудачами и политическими провалами, Республика Грифонов столкнулась с гражданской войной, а её армия раскололась между сепаратистскими фракциями. Президент-маршал Кемерскай снова вышел на передовую молодой республики, пытаясь разгромить сепаратистов и вновь стабилизировать регион."
 griffonRepublicNews.5.a:0 "За республику!"
 griffonRepublicNews.5.b:0 "Смерть республике!"
 griffonRepublicNews.5.c:0 "Мы выбрались как раз вовремя..."
 griffonRepublicNews.5.e:0 "Похоже, этому не будет конца."
 
 RULE_ALLOW_RELEASE_NATIONS_NOT_FAT_FAW_TOOLTIP:0 "§R«Пусть прошлое умрёт. Убей его, если потребуется.»§!"
