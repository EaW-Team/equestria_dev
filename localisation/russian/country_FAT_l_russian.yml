 FAT_The_Cloudburian_Minority_idea:0 "Языковая проблема"
 FAT_The_Cloudburian_Minority_idea_desc:0 "НРП, состоящая по большей части из герцландцев, испытывает проблемы с преодолением серьёзного языкового и культурного разрыва с клаудбьюрийским меньшинством. Некоторые из этих разногласий носят и идеологический характер: немалая часть клаудбьюрийцев выступает за возвращение герцогства Клаудбьюри и враждует с республиканцами, которые, по их мнению, лишает их политической репрезентации. Большинство государственных должностей занимают иностранцы, да и сам Кемерскай - герцландец. Иногда республиканские сборщики налогов и чиновники даже не понимают языка Клаудбьюри, что препятствует эффективности работы правительства на севере, где доминируют клаудбьюрийские общины."
 FAT_The_Cloudburian_Minority_idea2:0 "Языковая проблема"
 FAT_republican_pact:0 "Антиимперская коалиция"
 FAT_alliance_of_northern_monarchs:0 "Северный альянс"
 FAT_republican_pact_desc:0 "Если какая-либо из стран, входящих в Коалицию, окажется в войне с государством [GRI.GetNameDef], все остальные участники будут обязаны вступить в эту войну. Члены пакта, уже находящиеся в состоянии войны с державой [GRI.GetNameDef], призваны не будут."
 imperial_politicians_freed:0 "Имперские политики освобождены."
 FAT_Chaos_idea:0 "Бандитизм"
 FAT_Chaos_idea_desc:0 "После поражения Республики ей армия была вынуждена отступить далеко на север – туда, куда истощённая Империя уже не могла дотянуться. Хотя нам удалось частично обуздать хаос, возникший после нашего прихода к власти, по сельской местности всё ещё бродят банды вооружённых мародёров, и правительство бессильно их остановить."
 FAT_Chaos_idea1:0 "Бандитизм"
 FAT_Chaos_idea1_desc:0 "Мы начали умиротворять сельскую местность и возвращать нашу землю под знамя закона и правопорядка, без которых не может быть справедливости. Нам предстоит еще долгий путь, но мы будем продолжать идти и продолжать нести факел Республиканской Мечты."
 FAT_Chaos_idea2:0 "Бандитизм"
 FAT_Chaos_idea2_desc:0 "Самое худшее, похоже, сейчас закончилось тем, что мы пресекли самые ярые случаи беззакония. Грифоны теперь могут спокойно ходить по улицам вечером и знать, что преступления не останутся безнаказанными. Хотя некоторые отголоски владычества бандитов всё же остаются, но они больше не будут угрожать Республике."
 FAT_unruly_army_idea:0 "Неуправляемая армия"
 FAT_unruly_army_idea_desc:0 "[FATGetUnrulyArmyDesc]"
 FATGetUnrulyArmyDescInfo:0 "Наше войско – одна из крупнейших постоянных армий Грифонии, но по сути оно лишь остаток старой Республики, дополненный идеалистами, мечтателями и изгнанниками из Герцланда, последовавшими за нами после Долгого похода. Бездействие и политическая стагнация привели к резкому падению боевого духа, а напряжённые отношения президента-фельдмаршала с некогда верными ему северными генералами породили постоянные мелкие стычки, взаимную враждебность, налёты на склады и гражданских. Ситуация опасно близка к переломному моменту. Республиканская армия должна как можно скорее обрести единую цель, иначе Республика попросту не выживет.\n\nПо оценкам, [?FAT_army_disloyalty_value|%R0] республиканской армии лояльны военачальникам."
 FATGetUnrulyArmyDescNoInfo:0 "Наше войско – одна из крупнейших постоянных армий Грифонии, но по сути оно лишь остаток старой Республики, дополненный идеалистами, мечтателями и изгнанниками из Герцланда, последовавшими за нами после Долгого похода. Бездействие и политическая стагнация привели к резкому падению боевого духа, а напряжённые отношения президента-фельдмаршала с некогда верными ему северными генералами породили постоянные мелкие стычки, взаимную враждебность, налёты на склады и гражданских. Ситуация опасно близка к переломному моменту. Республиканская армия должна как можно скорее обрести единую цель, иначе Республика попросту не выживет."
 FAT_army_disloyalty_value_tt:0 "§OArmy Disloyalty§!: $RIGHT|-=0%$"
 FAT_refuse_orders_idea:0 "Дезертирство"
 FAT_refuse_orders_idea_desc:0 "Из-за того, что моральный дух долгое время был плохим, наши солдаты теперь полностью отказываются подчиняться приказам, требуя крупного повышения зарплат, которое мы просто не можем себе позволить прямо сейчас. Мы можем только надеяться, что другие не узнают о нашей слабости, пока мы возвращаем наших грифонов под контроль."
 FAT_offer_favors_idea:0 "Взятки за послушание"
 FAT_offer_favors_idea_desc:0 "Мы решили умиротворить Сантейла при помощи огромной суммы денег и ресурсов. Теперь всем остальным придется приложить все усилия, чтобы восполнить эту потерю."
 FAT_building_military_academy_idea:0 "Строительство военной академии"
 FAT_building_military_academy_idea_desc:0 "Мы вложили много наших средств и опыта в строительство новой военной академии для подготовки республиканских героев завтрашнего дня. Это немного повредит нашим другим строительным проектам."
 FAT_Army_Reform_idea:0 "Реформированные войска"
 FAT_Army_Reform_idea_desc:0 "Мы подняли стандарты для наших военных. Хотя мы, возможно, были в отчаянии и принимали любого грифона в наши ряды раньше, мы более не можем позволить себе быть настолько слабыми. На карту поставлена репутация наших военных и, наконец, всей Республики. Поэтому теперь могут служить только самые умные и здоровые грифоны. Это должно помочь в обеспечении успеха любых будущих операций."
 FAT_faculty_of_griffonities_idea:0 "Факультет общественных наук"
 FAT_postpone_reforms_idea:0 "Реформы отложены"
 FAT_Contingency_idea:0 "План действий в чрезвычайных ситуациях"
 FAT_Constitution_idea:0 "Конституция восстановлена"
 FAT_Constitution_idea_desc:0 "Конституция Грифоньей Республики гарантировала права каждого гражданина. Многие грифоны погибли, чтобы все могли воспользоваться свободами, которые она предоставляла. Но когда мы ушли на север, конституцию, к сожалению, пришлось отложить, чтобы справиться с кризисом. Не быть этому более! Мы восстановили конституцию, пообещав, что наше государство будет поддерживать ценности революции. Истинная свобода в наших когтях."
 FAT_AdvisorCost_idea:0 "Кадровая перестановка"
 FAT_AdvisorCost_idea_desc:0 "Перед нами стояли задача и намерение модернизировать кабинет, заменив несколько военных грифонов гражданскими экспертами. У нас есть возможность нанять консультантов, которые нам нужны."
 FAT_the_task_ahead_idea:0 "Предстоящая задача"
 FAT_the_task_ahead_idea_desc:0 "Наши усилия по восстановлению экономики республики и изгнанию бандитов из сельской местности вызвали новую волну надежды на успех республиканского дела. Пока Грифенхейм не будет освобождён, вся нация объединена общей целью – борьбой против тиранической Империи!"
 FAT_the_griffons_tutelage_idea:0 "Грифонья опека"
 FAT_the_griffons_tutelage_idea_desc:0 "Практика «опеки» – весьма спорная политическая теория времён ранней Национальной Республиканской Партии – была задумана как введение временного однопартийного государства с диктаторским исполнительным органом. Грифонья опека объединяет левое и правое крыло НРП в прагматическом согласии, опираясь на сталлионградскую модель постепенного перехода к массовому движению через осторожное социальное курирование. Подобно тому, как ортодоксальные марксисты стремятся использовать интеллектуальный авангард как временную опору для формирования социальной и экономической политики в подготовке к подлинной демократии, возглавляемой рабочими, республиканские сторонники «опеки» стремятся использовать широкие полномочия централизованной власти для тщательного формирования экономической и социальной политики, чтобы облегчить переход к функциональной демократической системе."
 FAT_a_new_dawn_idea:0 "Новый рассвет"
 FAT_a_new_dawn_idea_desc:0 ""
 FAT_new_institutions_idea:0 "Новые институты"
 FAT_herzland_civil_war:0 "Война в Герцланде"
 FAT_trade_partner:0 "Республиканское экономическое сотрудничество"
 FAT_riverlands_gov_in_exile:0 "Республиканская инициатива Речных Земель"
 FAT_trade_partner_desc:0 "Республика Грифонов сотрудничает с нами, чтобы защитить межконтинентальные морские перевозки и стимулировать торговый обмен между Зебрикой и Грифонией."
 FAT_new_institutions_idea_desc:0 ""
 FAT_quality_rifle:0 "Качество важнее количества"
 FAT_republican_struggle:0 "Республиканская мечта"
 FAT_republican_struggle_desc:0 "Несмотря на многочисленные неудачи в истории нашей молодой нации, многие по-прежнему верят в республиканскую мечту, и с радостью прольют кровь, чтобы увидеть, как триколор будет снова реять над Грифенхеймом."
 FAT_temporary_supply_bonus:0 "Дополнительные припасы"
 FAT_Kemerskais_legacy:0 "Наследие маршала"
 FAT_Kemerskais_legacy_desc:0 "Несмотря на то, что маршал Кемерскай скончался, его наследие и мечты всё ещё живы. Слава Республике!"
 FAT_Infantry_Tactics_idea:0 "Тактики пехоты"
 FAT_skynavian_integration_idea:0 "Проблемы интеграции"
 FAT_skynavian_integration_ideaint:0 "Проблемы интеграции"
 FAT_skynavian_integration_ideacomm:0 "Проблемы интеграции"
 FAT_mass_construction_projects:0 "Работу всем!"
 FAT_Peasant_Council_idea2:0 "Массовое объединение в профсоюзы"
 FAT_autonomous_reform:0 "Автономизм"
 FAT_skepticism_on_all_sides:0 "Всеобщее сомнение"
 FAT_operation_phoenix_rising_idea:0 "Операция: Восхождение феникса"
 FAT_cold_training_idea:0 "Зимняя подготовка"
 FAT_risk_of_famine:0 "Риск голода"
 FAT_risk_of_famine_desc:0 "Герцогство Клаудбьюри издавна страдало от нехватки продовольствия из-за сурового климата, а политический крах Империи и прекращение импорта зерна из Герцланда лишь усугубили ситуацию. Хотя Клаудбьюри не отставал от технологически от остальной Грифонии, а некоторая механизация сельского хозяйства принесла некоторое облегчение жителям герцогства, прибытие остатков республиканской армии после Долгого марша и последовавший хаос превратили и без того шаткое положение в катастрофу. Даже спустя десятилетия после основания республики широкое распространение бандитизма и грабежей держит нацию на грани общенациональной нехватки продовольствия. Если проблему не решить в ближайшее время, голод станет неизбежным."
 FAT_famine_start:0 "Голод"
 FAT_famine_start_desc:0 "Нехватка продовольствия переросла в полномасштабный голод, и значительная часть населения не получает достаточно пищи, чтобы сражаться, продуктивно работать или вести нормальную жизнь. Пока ситуация не будет исправлена, страна продолжит испытывать всевозможные негативные последствия, и всегда остаётся вероятность, что всё станет ещё хуже."
 FAT_famine:0 "Сильный голод"
 FAT_famine_desc:0 "Голод достиг катастрофических масштабов: страна стоит на пороге полного социального краха. Нужно срочно предпринять меры, иначе мы все умрём от голода."
###OTHER DYNMODS####
 FAT_free_city_modifier:0 "Новый вольный город"
 FAT_free_city_modifier_desc:0 "Эта территория является республиканским вольным городом – полуавтономным муниципалитетом с собственным советом и относительным суверенитетом в своих внутренних делах."
 FAT_griffonian_breadbasket_modifier:0 "Житница Грифонии"
 FAT_griffonian_breadbasket_modifier_desc:0 "Этот регион является частью житницы Грифонии – области в долине Эви с крайне плодородными почвами и развитым сельским хозяйством."
 FAT_dog_zone_modifier:0 "Автономный округ Бронзхилл"
 FAT_dog_zone_modifier_desc:0 "Бывшему графству Бронзхилл был предоставлен особый статус, который освобождает население от призыва в Республиканскую армию и предлагает обширные налоговые льготы."
 FAW_knight_chapter_keep_modifier:0 "Капитул рыцарей Клаудбьюри"
 FAW_knight_chapter_keep_modifier_desc:0 "В этом регионе расположен укреплённый оплот, находящийся под юрисдикцией имперских рыцарей Клаудбьюри."
 FAW_give_empire_chapter_keeps:0 "Действующий имперский эдикт"
 FAW_give_empire_chapter_keeps_desc:0 "В рамках Kaiserliches Mandat der Ritter von Cloudbury мы имеем полное право потребовать часть местных земель на новых территориях для строительства капитулов рыцарей Клаудбьюри, прежде чем будем обязаны вернуть их Империи."
