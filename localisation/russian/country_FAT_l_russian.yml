 griffonRepublic.119.t:0 "The General Strike"
 griffonRepublic.119.d:0 "Using secretive radio broadcasts and letter communications, labor organizers across the Herzland have been planning a general strike for some time, and have now declared issued a declaration to the Reconstruction government, hoping we'll address their grievances. Imperial corporations, Feathisian harbor authorities, agricultural projects conceived by the old Baron of Angriver, the Romauan guilds - all these varieties of institutions have provided work and stability to millions of griffons, and the Republic's return to Griffenheim greatly disrupted their operations. Many workers have gone without salaries for some months, and our administration is yet to fully hash out the legality of every major enterprise we inherited from the invalidated Empire.\n\nThe strikers demand that we make concessions in the form of immediate awknowledgements of a list of major enterprises, and they also demand we streamline the process of their unionization. This deal would help further Reconstruction policy, but might hinder our policy for economic development."
 griffonRepublic.119.a:0 "We can come to sensible agreement."
 griffonRepublic.119.b:0 "The strike must be dispelled by force if necessary."
 griffonRepublic.119.c:0 "Astler will personally negotiate with strike leaders."

