###EVENTS###
 griffonRepublic.2.t:0 "Республика Грифонов приглашает нас в Антиимперскую коалицию"
 griffonRepublic.2.d:0 "Республика Грифонов предлагает нам присоединиться к так называемому Республиканскому пакту. Они хотят, чтобы наши страны поддерживали друг друга широкой экономической, военной и технологической помощью. Кроме того, они согласились на взаимные гарантии в случае агрессии со стороны других государств."
 griffonRepublic.2.a:0 "Да, мы присоединимся к Республике Грифонов в их борьбе."
 griffonRepublic.2.b:0 "Мы не можем вступить в их союз, но будем не против их помощи."
 griffonRepublic.2.b.tt:0 "Мы не согласны на полноценный союз, но нас устроят взаимные гарантии."
 griffonRepublic.2.c:0 "Нет, нам и так хорошо."

 griffonRepublic.3.t:0 "Республиканская борьба"
 griffonRepublic.3.d:0 "Много лет прошло с того момента, как мы отделились от республиканского движения, ныне возглавляемого лидером [From.GetLeader]. Спустя долгое время после этого, наша политика социализма и равенства застопорилась, а Грифонья Республика находится на пути к новой эре процветания и становится сильнее, чем когда-либо прежде. Возможно, пришло время переосмыслить нашу позицию по отношению к ним?"
 griffonRepublic.3.a:0 "Мы будем помогать Республике как партнеру."
 griffonRepublic.3.b:0 "Нам нужно вновь обратиться к властям Республики и помочь им так, как только мы можем."
 griffonRepublic.3.c:0 "Нет, [FAT.GetLeader] - такой же тиран, как тот, против которого мы поклялись сражаться в 978 году."

 griffonRepublic.6.t:0 "Государство [From.GetName] присоединяется к нашей фракции!"
 griffonRepublic.6.d:0 "Мы только что получили подтверждение, что лидеры государства [From.GetName] официально согласились присоединиться к нашей фракции!"
 griffonRepublic.6.a:0 "Отлично!"

 griffonRepublic.66.t:0 "Взаимные гарантии"
 griffonRepublic.66.d:0 "Государство [From.GetNameDef] посчитало выгодным присоединиться к нашему Пакту, хотя сразу подчеркнуло, что не намерено брать на себя все обязательства. В итоге был заключён договор, направленный на ограничение экспансии Империи."
 griffonRepublic.66.a:0 "Нас это вполне устраивает."

 griffonRepublic.7.t:0 "Государство [From.GetName] отказывается!"
 griffonRepublic.7.d:0 "Кажется, что страна под названием [From.GetName] отказалась присоединиться к нашей борьбе, поскольку мы только что получили подтверждение, что они не хотят участвовать в наших будущих военных и экономических проектах..."
 griffonRepublic.7.a:0 "Какой позор."

 griffonRepublic.8.t:0 "Государство [SRS.GetName] согласилось присоединиться к нашей фракции!"
 griffonRepublic.8.d:0 "Наши братья и сестры из державы [SRS.GetName] согласились присоединиться к нашей фракции, чтобы помочь нашему общему делу равенства и справедливости. Это первый раз, когда нам удалось «забрать» обратно ту землю, которую мы потеряли, и нам даже удалось это сделать, не выпустив ни одной пули."
 griffonRepublic.8.a:0 "Наши старые розни остались позади!"

 griffonRepublic.88.t:0 "[SRS.GetName] подчиняется!"
 griffonRepublic.88.d:0 "Это по-настоящему неожиданно, но лидеры государства [SRS.GetName] отправили нам дипломатическую ноту, в которой говорилось, что они хотят помочь нам в создании лучшей страны для каждого существа в Грифонии. Они даже хотят представить свой государственный аппарат в помощь нам для достижения этой великой цели."
 griffonRepublic.88.a:0 "Мы приветствуем наших грифоньих собратьев!"

 griffonRepublic.9.t:0 "[SRS.GetName] отказывается иметь дело с нами!"
 griffonRepublic.9.d:0 "Они только послали нам ноту, говоря, что мы не лучше остальных государств в Грифонии и что только они могут принести правосудие всем в Грифонии, при этом они сделают это без нашей помощи."
 griffonRepublic.9.a:0 "Этого следовало ожидать, социалисты никогда не были самой логично мыслящей группой..."

 griffonRepublic.10.t:0 "Заговор Роузвинг и Сантейла против Кемерская"
 griffonRepublic.10.d:0 "Рейнхард Сантейл, харизматичный и жестокий ветеран, тренировавший свои силы в сельской местности и занимавшийся бандитизмом, вместе с Николь Роузвинг – одним из главных революционных офицеров Кемерская, стремившейся узурпировать власть после провала революции – начал заговор против нашего правительства. Неизвестно, каковы их планы, но правительственные агенты считают, что они выступают против военных реформ и готовят заговор, чтобы предотвратить любую проверку их покровительства бандитам и скандальных военных действий. Утверждается, что Рейнхард Сантейл является частью Грифоньего Национального Революционного Фронта – подпольной националистической группировки, выступающей против демократии и монархии и верящей, что сильный и влиятельный лидер может привести республику к славе. Но если мы хотим поддержать подобное поведение, возможно, нам не стоит ничего делать..."
 griffonRepublic.10.a:0 "Мы не можем вредить нашим гражданам."
 griffonRepublic.10.b:0 "Отправьте войска и остановите их планы!"

 griffonRepublic.11.t:0 "Солдаты дезертируют в дивизии Роузвинг и Сантейла!"
 griffonRepublic.11.d:0 "Солдаты отказываются выполнять приказы фельдмаршала Кемерская и даже начинают дезертировать в дивизии, которыми командуют военачальники Николь Роузвинг и Рейнхард Сантейл. Многие идут к ним, соблазнённые обещаниями грабежа и бандитизма, а также устав от постоянно низкого жалования, которое хаотично выплачивает нестабильное правительство в Клаудбьюри. Это может стать серьёзной проблемой для нашей республики: если Роузвинг и Сантейл когда-нибудь поднимут мятеж, на их стороне окажутся силы, состоящие из бывших верных нам солдат." 
 griffonRepublic.11.a:0 "Да они просто выпрашивают повышение жалования. Пусть бунтуют сколько хотят."
 griffonRepublic.11.b:0 "Пусть верные солдаты разберутся с предателями!"
 
 griffonRepublic.12.t:0 "Стоя на краю пропасти"
 griffonRepublic.12.d:0 "Мы находимся на грани краха, мятеж солдат распространился... повсюду, каждое правительственное учреждение настолько возмущено, что даже наши почтальоны берутся за оружие. Нам нужно что-то сделать, иначе мы рискуем спровоцировать переворот или начало гражданской войны. И, самое главное, мы должны выследить самых активных иностранных и внутренних врагов республики в наших границах."
 griffonRepublic.12.a:0 "Отлично. Переворот скоро начнется, и мы свергнем это упадочное правительство."
 griffonRepublic.12.b:0 "Организовывайте наши самые преданные подразделения и отправляйте их искать и казнить всех ответственных за это."
 
 griffonRepublic.13.t:0 "Нация в огне"
 griffonRepublic.13.d:0 "Слишком поздно. Мятежники, дезертиры и протестующие собрались под знаменем и командованием наших генералов старой гвардии. Они требуют многого, но главное - ненавидят наш режим, Республику и нашего лидера. Наше правительство контролирует только район Клаудбьюри и прилегающую городскую территорию, но мы не дрогнем! Мы не проиграем предателям! Мы сохраним Республику или умрем, пытаясь. До этого не должно было дойти... но пришло время бороться, еще раз. Время бороться за нашу свободу!"
 griffonRepublic.13.a:0 "За Республику!"
 griffonRepublic.13.b:0 "За истинные принципы!"

 griffonRepublic.18.t:0 "A Meeting With Rosewing"
 griffonRepublic.18.d:0 "\"I often thought back to the 978 days when I was in Lostgate, you know\", the griffoness said under her breath. \"Haven't you?\"\n\n\"Every other day\", replied Kemerskai, handing his old friend a glass. \"Your offense in Angriver comes to mind. You radio'd to Griffenheim in the dead of night, when it was only me and Schnabel in HQ. It was just after you had routed the 3rd Artillerieregiment in the outskirts of the Scheißwald. Never heard you so happy before... Or since.\" Kemerskai downed the contents of his glass, and sighed. \"Where did it all go wrong, Nicole?\"\n\nRosewing didn't say anything back, but stared off to nothing. The Marshal reminisced about the good old days, those short, fleeting weeks after the Republic's founding. The late night meetings in the old Imperial halls, the static choked rapports across the Herzland, the days when they were young and all eyes in Griffonia turned to them in Griffenheim... All those moments that filled the Marshal's memories were far in the past. Too far for comfort.\n\n\"I know you have your old-fashioned sympathies,\", Kemerskai said. \"but I know you're still the griffoness I marched North with. I treated you harshly, but I hope you understand why I had to do what I did. After all these years, do you still hate me?\"\n\n\"I never hated you, Alex,\", Rosewing replied. \"not the way Reinhard did. I was angry with you, yes, but anger has a way of making everything else feel sour, and I needed all the little comforts I could get after you sent me up North. After I stopped being angry, I just started feeling... Sad. I've been sad, because I feared that after all we'd been through, you lost your way.\"\n\n\"I did lose my way\", said the Marshal, getting off his office chair and staring out the window to Cloudbury's facade in the night sky. \"I've been twidling my talons up here for far too long. We're going to put this land on the right track, and after that, we'll exploit every advantage we can to rout the Reichsarmee. We have the guns, the griffons, the industry for the war materiel. The only thing else I need is capable officers I can rely on.\" The Marshal extended a claw to his old friend. \"I'd love to have you there when we return to Griffenheim, Nicole. Wouldn't you?\"\n\nRosewing dusted off her wings with a flap as she got up, and offered the Marshal a smile, and her claw for a firm shake."
 griffonRepublic.18.a:0 "\"It'll be just like the old days, Alex.\""
 
 griffonRepublic.19.t:0 "Встреча с Сантейлом"
 griffonRepublic.19.d:0 "\"We are prepared to legalize the GNRF again,\" said Kemerskai in a measured tone. \"and provide reasonable amnesty to griffons under your command for raiding, save for those with more outstanding charges.\"\n\nSuntail had an air about him that the Marshal found hard to read. He had dressed for the occasion, with his old Chief of Staff medals hanging off his chest and his feathers groomed. Reinhard's beak twisted slightly with barely suppressed scorn and one of his eyes twitched under Alexander's stare. Many things had gone unsaid between the two of them since Suntail was deposed from his position as Chief of Staff and sent North with Rosewing. Many of those things, if brought up, would sour the air further. Still, Alexander had had many a night to mull over this griffon that had caused him so much ache: the bombing affair, the GNRF plot, the atrocities in Crona; Reinhard was a very straightforward general, and Kemerskai knew exactly what he wanted to hear.\n\n\"I'm under no illusion that we'll ever get along, Reinhard. But I know what you want, deep down: you want the decadent Empire brought low, the Reichsarmee brought to heel, and the Palace in Griffenheim burned to cinders. You want the Emperor's regalia melted down and sold for scrap, and every last vestige of the House of Griffonstone's legacy erased from history\" With each word, Suntail's eyes shifted so slightly, until the Marshal concluded: \"And all of this, I can and will provide you.\"\n\nA sly smile slashed across the general's face. \"Where was this bite for all these years, Alexander? You almost had me believing you'd gone soft.\"\n\n\"Maybe I have. It's been a while since the Republican Army has fought a true war\", said Kemerskai. \"But that's why I have need of you. No one can whip the recruits into shape like I know you can. So, do I have your word that you'll deliver your most troublesome soldiers for judgement and obey my command?\"\n\n\"I'll be ready for your instructions, sir. And don't you worry about troublesome soldiers...\""
 griffonRepublic.19.a:0 "\"I'll have them dealt with. Permanently.\""

 griffonRepublic.199.t:0 "Генералы подчиняются"
 griffonRepublic.199.d:0 "With Rosewing and Suntail having been placated – and Kingfeather's plan working exactly as intended – only one thing remained: for them to reaffirm their oaths to the Republic. What was expected to be a grand public event to heighten our prestige and showcase a nation moving forward, had instead been made into a private meeting between the three generals inside the Presidential Palace.\n\n"Our disagreements and conflicts have made us little better than the bickering dukes of old," Kemerskai admitted. Rosewing and Suntail held serious expressions. "Our fears made us weak, strayed us from our righteous path, and froze the revolution for over a decade. Today, we have been given the chance to make it right once and for all. I, Alexander Kemerskai, reaffirm my oath and once more give my life to our cause! As long as the decadent empire corrupts griffonkind, I shall not rest!"\n\nHis determination was palpable as the two old generals looked at him. Suntail was first to raise his claw to his chest, with Rosewing soon following. "I, Reinhard Suntail, reaffirm my oath and once more give my life to our cause! As long as the decadent empire corrupts griffonkind, I shall not rest!"\n\nRosewing too took the same oath. "I, Nicole Rosewing, reaffirm my oath and once more give my life to our cause! As long as the decadent empire corrupts griffonkind, I shall not rest!"\n\nWith the spirits of the three old griffons renewed, it felt as if, for a brief moment, they had all been taken back to 978. They smiled and cheered, each promising to give all they had left for the cause that had once united them."
 griffonRepublic.199.a:0 "Тройные аплодисменты Республике!"

 griffonRepublic.20.t:0 "Проблемы с бандитами"
 griffonRepublic.20.d:0 "С момента провозглашения нашей республики бандиты, мародеры и другие преступники были настоящей проблемой для всех, кто не живет в большом городе, с тех пор прошло много лет, но они по-прежнему остались неприятной занозой для нашего правительства. Недавно это изменилось, поскольку мы теперь уделяем больше внимания борьбе с ними, и у нас есть возможность, по крайней мере, гарантировать, что основные дороги и пути коммуникации в безопасности. И все же мы не можем остановиться сейчас, ведь есть много малых и больших деревень и городов, всё ещё находящихся под угрозой, и многие из более мелких дорог ещё кишат этими вредителями."
 griffonRepublic.20.a:0 "Активизируйте наши силы и убедитесь, что каждая дорога и город в республике безопасны."
 
 griffonRepublic.21.t:0 "Конец бандитизма в селах"
 griffonRepublic.21.d:0 "Сегодня отмечается первый день, когда ни один город или дорога в нашей республике не захвачены бандитами. Наша кампания по их искоренению была тяжелой и кровавой, но в конце концов она окупилась, и большинство наших граждан теперь могут спокойно спать, так как мы убедились в том, что остатки когда-то великих банд бежали прочь и затаились. Но здесь мы не можем ошибаться, хоть они и прячутся в лесах и менее презентабельных частях наших городов, они все равно могут вернуться к своим старым занятиям, если мы не будем давить их еще сильнее."
 griffonRepublic.21.a:0 "Удостоверьтесь, что армия прочешет каждый лес и пещеру в стране."
 
 griffonRepublic.22.t:0 "С преступниками разобрались!"
 griffonRepublic.22.d:0 "Мы только что получили отчет, что нашим вооруженным силам удалось найти и оперативно отдать под суд в последние остатки банды «Священство». Это довольно интересный конец нашей кампании, помня, что «Священство» было первой преступной организацией в республике. С их концом заканчивается эпоха в истории нашей страны. Там, где когда-то царило беззаконие, теперь есть порядок, там, где любой добропорядочный грифон боялся выходить ночью, теперь вы можете встретить всевозможные веселые группы грифонов, празднующие по любому случаю, или просто весело проводящих время вместе, там, где когда-то по большинству дорог для путешествия нужен был вооруженный эскорт, теперь можно увидеть одиноких матерей с детьми, которые гуляют целый день, уверенные в своей безопасности."
 griffonRepublic.22.a:0 "Поистине, то, чего мы достигли сегодня, сделает жизнь каждого из наших граждан лучше."
 
 griffonRepublic.42.t:0 "Положение сельской местности"
 griffonRepublic.42.d:0 "Сегодня несколько ужасающих известий дошли до Клаудбьюри. Похоже, что некоторые из небольших деревень и городов сообщают, что они не получают достаточного количества продовольствия, доставляемого им. Нет ничего удивительного в том, что наша сельская местность пребывает в хаосе, но если мы не сможем это исправить, это может привести к действительно тревожным последствиям."
 griffonRepublic.42.a:0 "Удостоверьтесь, что сообщения, дошедшие до нас, верны, и это не чья-то чрезмерная реакция."
 
 griffonRepublic.43.t:0 "Сообщения о сотнях умирающих и многих тысячах голодающих"
 griffonRepublic.43.d:0 "Ситуация в сельской местности ошеломляет, так как кажется, что предыдущие отчеты не были раздуты и были правдой. Что еще хуже, на данный момент большинство фермеров и мест, производящих пищу, либо сохраняют ее для себя, либо продают ее в частном порядке по сильно завышенным ценам. Любые перевозки продовольствия уже подвергаются большому риску подвергнуться набегам со стороны жадных бандитов или просто голодающих и отчаявшихся грифонов. Если мы не хотим допустить катастрофы в нашей республике, мы должны что-то сделать."
 griffonRepublic.43.a:0 "Посылайте вооруженных охранников вместе с транспортом, проверяйте каждую мельницу и каждую ферму на предмет подозрительных избытков пищи."
 
 griffonRepublic.44.t:0 "Ситуация с голодом становится лучше"
 griffonRepublic.44.d:0 "С самого начала наших действий, направленных на то, чтобы остановить и сделать менее смертоносным голод, нам удалось помочь бесчисленным грифонам и спасти еще множество от смерти. Пока ситуация не идеальна, но все больше ферм и мельниц возвращаются к своим обычным квотам на производство. Все равно пройдет много времени, прежде чем мы сможем спокойно позволить всему работать самостоятельно, тем более что еще есть несколько мест, где голод представляет собой реальную опасность для всех."
 griffonRepublic.44.a:0 "Сосредоточьтесь на том, чтобы все возвращалось к нормальной работе."
 
 griffonRepublic.45.t:0 "С голодом покончено!"
 griffonRepublic.45.d:0 "Сегодня отмечается день, когда голод был наконец побежден, и наши продовольственные линии работают лучше, чем когда-бы то ни было. Это было нелегко, и, к сожалению, смерти исчисляются тысячами, но это должно послужить предупреждением всем нам, что мы не должны никогда больше допускать подобного хаоса среди сельской местности. И как таковая, наша политика солдат, сопровождающих поезда снабжения и инспекции, должна остаться."
 griffonRepublic.45.a:0 "Хорошо, если небольшая централизация - это самая большая цена, которую мы платим за то, чтобы сегодня каждый грифон ел досыта, пусть будет так."
 
 griffonRepublic.50.t:0 "Вопрос о Ведине"
 griffonRepublic.50.d:0 "Ведина - это такая же монархия, как и та, которую мы пытались уничтожить в 978 году, и, тем не менее, она, вероятно, единственная монархия на всем грифоньем континенте, которая заботится о всех своих гражданах. Король действует как администратор и обращается с каждым грифоном как с равным, даже если он не аристократ.\n\nКонечно, это то, во что мы должны верить по мнению Кингфезера. Многие в Республике выразили сомнение по поводу так называемой «гармонической системы» Ведины и отсутствия у них истинных свобод, сославшись на то, что они являются монархией, такой же, как Клаудбьюри или Империя, и что они должны быть безоговорочно уничтожены."
 griffonRepublic.50.a:0 "Возможно, мы сможем договориться..."
 griffonRepublic.50.b:0 "Это прискорбно, но это мы должны это сделать."
 
 griffonRepublic.51.t:0 "Мы были приглашены в фракцию государства [FAT.GetName]"
 griffonRepublic.51.d:0 "Сегодня нас пригласили присоединиться к фракции государства [FAT.GetName], они являются отколовшимся от Империи республиканским государством. И они - одна из немногих стран вокруг нас, в которых правящим грифонам действительно не плевать на простых граждан, даже если их правление не является наиболее эффективным. Однако мы должны принять к сведению, что они являются республиканцами до самой глубины своих сердец, и, если мы откажемся, это может вызвать у них злой умысел и побудить сделать что-то неразумное. Тем не менее, согласие на присоединение к их фракции, в то же время полезное для простых жителей, могло бы втянуть нас в кровавую и долгую войну с некоторыми из монархий." 
 griffonRepublic.51.a:0 "Даже если мы будем вести войну, она достойна республики."
 griffonRepublic.51.b:0 "Мы не можем объединяться с такими фанатиками, как Республика."
 
 griffonRepublic.52.t:0 "Ведина согласилась присоединиться к гам!"
 griffonRepublic.52.d:0 "Мудрый король Ведины согласился на союз с нами, ссылаясь на доброту, которую мы можем сделать для простых жителей в обеих наших странах, и то, что мы единственные страны, которые заботятся о благополучии наших граждан."
 griffonRepublic.52.a:0 "Это необходимо отпраздновать! Мы только что встретили первого монарха, который не является жадным до крови деспотом и вполне разумен."
 
 griffonRepublic.53.t:0 "Ведина отказалась присоединиться к нам"
 griffonRepublic.53.d:0 "Как и следовало ожидать, Ведина не согласилась присоединиться к нашей фракции, назвав нас разжигателями войны и сообщив нам, что мы отправляем на смерть тысячи грифонов лишь ради политической выгоды. Как всегда, это типичная монархическая ложь, тем не менее, это немного разочаровывает, что, предположительно, такой мудрый и заботливый король не согласился присоединиться к нам. Но, в конце концов, все монархии одинаковы, и это тому подтверждение."
 griffonRepublic.53.a:0 "Кажется, король всегда будет королем. Но мы скоро освободим жителей Ведины от тирана."
 
 griffonRepublic.54.t:0 "Колокол звонит по нам" 
 griffonRepublic.54.d:0 "После того как [FAT.GetName] одержала победу над Империей Грифонов, их лидер требует, чтобы государства-члены Антиимперской коалиции присоединились к их правительству. Если мы согласимся, придётся попрощаться с нашей независимостью. Но если откажемся... мы рискуем войной с республикой, а это может оказаться крайне опасным и кровопролитным делом." 
 griffonRepublic.54.a:0 "Увы, выбора у нас нет."
 griffonRepublic.54.b:0 "Мы не отдадим нашу независимость каким-то пангрифоньим претендентам."
 
 griffonRepublic.55.t:0 "Государство-претендент согласилось мирно интегрироваться в Республику на правах Государства-члена"
 griffonRepublic.55.d:0 "Одно из многих государств-претендентов, которое появилось из-за некомпетентности правителей старой Империи, согласилось присоединиться к нам как государство-член Республики, мы дадим им право на ограниченную автономию и наличие своих избранных лидеров, но они наши союзники и выступают вместе с нами, когда дело доходит до нашей общей внешней политики, армии и экономики."
 griffonRepublic.55.a:0 "Очень хорошо, одной потенциальной тиранической диктатурой меньше..."
 
 griffonRepublic.56.t:0 "Государство-претендент отказывается от мирной интеграции"
 griffonRepublic.56.d:0 "Одно из государств-претендентов, которое боролось вместе с нами, отказывается преклонить перед нами колени. Если мы хотим сохранить нашу репутацию крупной страны и сильного игрока в регионе, мы не должны допустить, чтобы это оставалось безнаказанным."
 griffonRepublic.56.a:0 "Они пожалеют о том дне, когда отказались от республиканской мечты!"
 
 #FLAVOUR EVENTS
 griffonRepublic.60.t:0 "Изобретение Бикла"
 griffonRepublic.60.d:0 "В захудалом пригороде нашей столицы появилось изобретение, способное изменить жизни многих. Простой школьный грифон придумал совершенно новый способ вести записи на гриффише, используя необычные методы печати. Метод заключается в нанесении повторяющихся узоров точек на бумагу, причём сами точки не используют чернил. Новый печатный пресс создаёт маленькие выпуклости на бумаге. Какой в этом толк? До сих пор слепые не могли читать. Но изобретатель, сам будучи незрячим, утверждает, что эта методика позволит подобным ему грифонам читать. Изобретение перевернуло систему образования, и в нашей столице уже открылись две новые школы для слепых."
 griffonRepublic.60.a:0 "Слепые могут читать. Великолепные новости для них!"

 griffonRepublic.61.t:0 "Кровь в воде"
 griffonRepublic.61.d:0 "Поступили сообщения о странном происшествии у озера Гростен, недалеко от города Скварк. Группа местных молодых птенцов устроила вечеринку на берегу озера, когда они обнаружили тело алмазного пса, изуродованное и разорванное когтями, кинжалами и пулями. Свидетели опознали его как Кадуорта – уличного музыканта и артиста, принадлежавшего к замкнутому сообществу северных алмазных псов. После обращения грифонов в полицию Скварка началось общегородское расследование, в ходе которого выяснилось, что убийство совершила банда грифонов, связанных с «Обществом противников монархической тирании». Они убили его за «тайный монархизм и желание восстановить герцогство Клаудбьюри». Преступники оказались в тюрьме, а адвокат и политик Генрих Кингфезер потребовал суровых приговоров за это бессмысленное убийство. Эрих Кригер, промышленник и военный министр, напротив, заявил, что нападение «в некоторой степени оправдано, ведь чуме монархизма нет места в нашем справедливом обществе».\n\nУбийство Кадуорта привлекло внимание СМИ. Хотя большинство политиков официально осудили его, оно нанесло удар по некоторым антимонархистским элементам нации."
 griffonRepublic.61.a:0 "Улицы больше не безопасны."

 griffonRepublic.62.t:0 "Интрижка Поулсена"
 griffonRepublic.62.d:0 "Страну потряс скандал: в новостях появились слухи о том, что Якуб Поулсен, политик из городского совета Клаудбьюри, связанный с левым крылом НРП, имел отношения с проституткой. Но оказалось, что эта грифина, чья личность оставалась неизвестной, была шпионкой Объединённого Социалистического Революционного Фронта Скайнавии и сбежала туда с важными государственными секретами. Опасения по поводу возможного сговора вызвали панику в правительстве, и Генрих Кингфезер, лидер правого крыла НРП, призвал к отставке совета, сославшись на «неопределённую лояльность к великой республиканской мечте».\n\nПока лидер левого крыла НРП Рикард Эстлер сохранял молчание, генерал-социалист Мо Спэрроусбэйн выступил с заявлением: он проигнорировал вопрос секретов, но назвал сам факт проституции «аморальным и несовместимым с ценностями социализма и освобождения». Несмотря на давление со всех сторон, Поулсен отрицал обвинения, но всё же подал в отставку.\n\nПравое крыло НРП было возмущено его поведением и потребовало полного расследования действий партии, чтобы выяснить, не действует ли она в интересах Скайнавии."
 griffonRepublic.62.a:0 "Как неловко!"

 griffonRepublic.63.t:0 "Опубликованы мемуары Кемерская"
 griffonRepublic.63.d:0 "Сегодня президент-маршал Кемерскай сделал официальное заявление из своего дворца в Клаудбьюри. Он объявил, что его мемуары «Триумф свободы» опубликованы и доступны в книжных магазинах по всей республике и Грифонии в целом, если монархические лавки решат закупить книгу. Автобиография охватывает всю жизнь Кемерская: от юности третьего сына барона Алдуса Кемерская, службы в армии вместе с братьями до республиканской революции и нынешних дней.\n\nКнига получила высокую оценку критиков. Лидер центристского крыла НРП Санглайдер назвал её «обязательной к прочтению и блестящим описанием лидера величайшего государства в истории грифонов», а писатель Корнелиус Винке заявил, что она «почти столь же хороша, как и моя работа». Кемерская хвалили за стиль, язык и умение донести мысль, а многие отметили, что его писательские навыки не уступают ораторским."
 griffonRepublic.63.d_com:0 "Сегодня Александр Кемерскай сделал официальное заявление из своего поместья в Вингхагене. Он объявил, что его мемуары «Триумф свободы» опубликованы и доступны в книжных магазинах по всей республике и Грифонии в целом, если монархические лавки решат закупить книгу. Автобиография охватывает всю жизнь Кемерская: от юности третьего сына барона Алдуса Кемерская, службы в армии вместе с братьями до республиканской революции и нынешних дней.\n\nКнига получила высокую оценку критиков. Лидер центристского крыла НРП Санглайдер назвал её «обязательной к прочтению и блестящим описанием лидера величайшего государства в истории грифонов», а писатель Корнелиус Винке заявил, что она «почти столь же хороша, как и моя работа». Кемерская хвалили за стиль, язык и умение донести мысль, а многие отметили, что его писательские навыки не уступают ораторским."
 griffonRepublic.63.a:0 "Прекрасная история о надежде и потерях."

 griffonRepublic.64.t:0 "«Императив»"
 griffonRepublic.64.d:0 "Один из наших эсминцев вчера пропал без вести, не выйдя на связь во время манёвров. После осознания ситуации всё соединение кораблей было брошено на его поиски. После двенадцати часов бесплодных поисков эсминец вновь появился, выскользнув из густого тумана. Сначала отчёт посчитали ложным, ведь область, где он находился, хорошо просматривалась во время поисков, но это оказалось правдой. Что ещё более странно – на борту не оказалось ни единой живой души. Сообщается, что весь экипаж пропал без вести, и судно было помещено в карантин для дальнейшего научного и магического анализа."
 griffonRepublic.64.a:0 "Корабль-призрак, говорите?"

 griffonRepublic.65.t:0 "Общество Мудрой Леди в республике"
 griffonRepublic.65.d:0 "Опираясь на своё древнее наследие союзников и подданных королевства Ведина, сотни религиозных жителей Бликспайра провозгласили создание «Общества Мудрой Леди в республике», напоминая о совместной истории с королевством Ведина и о значимой роли религии в обществе. Хотя организация крайне маргинальна даже по меркам самых фанатичных жителей Бликспайра, многие считают, что она используется как прикрытие для тайных монархических групп.\n\nОбщество получило официальное одобрение от вединского правительства и правящего монарха по имени [VED.GetLeader], тогда как Кемерскай уже официально запретил ему участвовать в выборах в Бликспайре, даже если бы они набрали не более 2% голосов.\n\nМногие полагают, что движение в целом является ответом на враждебную архонатам политику республики. Наши граждане сильно истосковались по религиозной жизни после яростной критики нашей державы в адрес архонтов Эроса VII и Эриона XII."
 griffonRepublic.65.a:0 "Убирайтесь отсюда, вединцы."

 #FOCUS TREE
 griffonRepublic.67.t:0 "Мы вернулись в Грифенхейм!"
 griffonRepublic.67.d:0 "Победа! Долгое изгнание наконец-то завершилось, и мы вернулись туда, где зародилось республиканское движение – в Грифенхейм. Теперь, когда столица наша и монархическое сопротивление хотя бы на время подавлено, необходимо решить множество важных вопросов о будущем устройстве республиканского государства.\n\nВ тот краткий период, когда в дни революции мы контролировали Герцланд, наша республиканская администрация страдала от своего хаотичного революционного происхождения, а государственный аппарат был слабым, децентрализованным и неэффективным. Если мы хотим воплотить мечту о едином демократическом пангрифоньем государстве, то должны извлечь уроки из этих ошибок и заложить прочные основы, на которые новая администрация сможет опереться в грядущий период реконструкции и консолидации. Впереди лежит множество новых испытаний, так что мы должны добиться того, чтобы наше конституционное правительство стояло на крепком фундаменте, если оно хочет выстоять и успешно развиваться."
 griffonRepublic.67.a:0 "Мы должны оставаться верными идеалам 978 года."

 griffonRepublic.68.t:0 "Три принципа республики"
 griffonRepublic.68.d:0 "После стольких лет республика готова полностью утвердить свои революционные принципы — свободу, демократию и процветание. Президент-маршал объявил, что республика прошла долгий путь и теперь нация может перейти к реализации этих трёх важнейших принципов. Наша прежняя нестабильность и неуверенность остались в прошлом, мы едины под триколором!"
 griffonRepublic.68.a:0 "Свобода, демократия и процветание для всех!"

 griffonRepublic.207.t:0 "Три принципа национальной республики"
 griffonRepublic.207.d:0 "Мы захватили Грифенхейм, и республика наконец готова утвердить три принципа, на которых она была основана: безопасность, национализм и процветание. Рейнхард Сантейл объявил, что нация теперь может сосредоточиться на трёх революционных принципах её существования. Однако принципы Сантейла отличаются от принципов Кемерская. Сантейл заменил придуманный Кемерскаем принцип свободы на собственный принцип безопасности, подразумевая, что нация должна быть защищена как изнутри, так и извне, а грифоны обязаны пожертвовать своей свободой ради государства. Второй принцип – демократия – был заменён на национализм, веру в то, что революция должна охватить всех грифонов и что республика должна возглавляться патриотическим и ультранационалистическим движением. Толпы по-прежнему приветствовали реформы Сантейла, но теперь они радовались изменению изначальных трёх принципов. Сантейл утверждает, что прежние принципы «слишком устарели для современных реалий» и что они «умерли вместе с революцией много лет назад»."
 griffonRepublic.207.a:0 "Что-то я не припоминаю эти три принципа..."

 griffonRepublic.69.t:0 "Кабинет реконструкции"
 griffonRepublic.69.d_harmonic:0 "Наш великий президент-маршал наконец привёл нас к победе! Наше славное возвращение в Грифенхейм встретили с ликованием и стихийными празднествами, но, несмотря на победу над рейхсармией и окончательный крах Империи, борьба за пангрифонье дело, как мы все знаем, далека от завершения: по всей Грифонии – от Аквелии до Карфина и Риапорту – местные правительства всё ещё испытывают потрясения после падения Империи. И прежде чем мы сможем поднять триколор над каждым уголком континента, нам предстоит справиться с растущим недовольством и неопределённостью в Герцланде.\n\nПрошли десятилетия с тех пор, как местные жители жили под властью республики, и, как напоминают нам принципы «Опеки» НРП, демократия – это не просто политическая система, а выражение мировоззрения, образа мыслей и целого уклада жизни, который был чужд значительной части Грифонии на протяжении веков. Если когда-нибудь должны состояться пангрифоньи выборы истинного исполнительного органа, мы обязаны воспользоваться этим моментом, чтобы сформировать социальную и экономическую действительность Герцланда так, чтобы его население приняло республику всем сердцем – и чтобы она никогда больше не пала жертвой региональных распрей. Ради этого Кемерскай временно отходит от активной политической деятельности и возвращается к роли офицера армии; это оставляет оставшимся членам Национальной Республиканской Партии задачу сформировать новый кабинет, который возглавит мандат реконструкции."
 griffonRepublic.69.a:0 "Реформистский кабинет Кингфезера."
 griffonRepublic.69.b:0 "Прогрессивный кабинет Санглайдера."
 griffonRepublic.69.c:0 "Революционный кабинет Эстлера."

 griffonRepublic.691.t:0 "Инаугурация Шнабеля Санглайдера"
 griffonRepublic.691.d:0 "Наследие Кемерская будет сохранено. Как второй президент Республики Грифонов, я буду продолжателем его идей свободы, демократии и процветания. Три Принципа, которые он придумал - это те три принципа, от которых мы не откажемся никогда. Свобода - воля действий, Демократия - право голосовать в открытых и честных выборах и Процветание - право на дом, зарплату и еду. Ни один грифон не будет умирать от голода или бедности! Мы не падем перед злом авторитарного социализма, перед обманчивым "демократическим" социализмом, или перед коварными убийцами-фашистами. Мы выстоим, будем авангардом демократии и объединим народ под нашим предводительством!"\n\nСанглайдер расплакался. Он и не думал что добьётся такого - когда-то Республика правила в Грифенхейме, и он вот-вот поведёт революцию туда, куда его вел его идол. Дрожащим голосом, он произнёс: "Я клянусь защищать три ценности Республики, никогда их не предавать, буду главнокомандующим и полководцем этой страны. Я буду поддерживать конституцию и поддерживать ценности Кемерская, первого президента Республики." Санглайдер улыбнулся с искренней улыбкой, ведь он официально приносит присягу, вступая на должность президента Республики в её славный час." # БОБЫ ВПЕРЁД #
 griffonRepublic.691.a:0 "Свобода, Демократия и Процветание!"

 griffonRepublic.692.t:0 "Инаугурация Генриха Кингфезера"
 griffonRepublic.692.d:0 ""Свобода, которая должна быть основой Республики Грифонов - это преследование своего блага, своим путём, и пока мы являемся обществом, мы не должны лишать других грифонов их свобод тираническими правительственными мерами или препятствовать им в их достижении угнетающими ограничениями или олигархией. Тем не менее, Республика Грифонов забыла свои корни. Все улицы набиты военной пропагандой, пока грифоны живут в бедности, в то время, как мы заявляем, что мы заботимся о бедных, и несмотря на наши лучшие усилия по регулированию экономики, наши земли в Клаудбьюри остаются той ещё глушью. Как ваш президент, Генрих Кингфезер, я обещаю восстановить народные ценности и ценности свободы, как экономической, так и политической. Повторюсь - мы снова закрепим свободу, как основную ценность Республики Грифонов - свободу от социалистической тирании, свободу от фашизма Биколини и прочих кровавых диктаторов во всём мире, и свободу против любого монархического государства, которое готово ограничивать нашу демократию ради наследственного самодержавия!"\n\n"Наши грифоны хотят вернуться к Кемерскаю, вернуться к революционному духу и народовластию, не к развращенному социализму Эстлера или разбавленной его версии от Санглайдера, и я им эту свободу дам! Свобода работать, свобода процветать, свобода быть там, где захочется в этой Республике Грифонов и строить новое будущее! С самых своих начал в Грингейте, когда я был адвокатом, до борьбы с Кемерскаем и отстаивания республиканизма на мировой арене, до моего собственного кабинета министров - когда я спас Республику от раздробленности между главнокомандующими и монархической реставрации, я служил вам - народу, и я буду и дальше вам служить до конца моих дней.""
 griffonRepublic.692.a:0 "Свобода, Демократия и Процветание!"

 griffonRepublic.693.t:0 "Инаугурация Рикарда Эстлера" # ♫ Never gonna give you up, never gonna let you down ♫ #
 griffonRepublic.693.d:0 ""Мне не чужды беды рабочего класса. Я знаю правила капитализма, угнетавшие грифоний народ веками. Я полностью предан рабочему грифону, предан больше любого другого кандидата, даже Санглайдера, который пусть и реформист, но он решил оставить извращённую капиталистическую систему, которая рвала континент на части, в войнах жадности и похоти."\n\nЭстлер приостановился, а толпа тут же начала оглушающе ликовать. Плакаты и флаеры с социалистическими и республиканскими посылами быстро распространились в толпе и грифоны подняли свои когти, чтобы поприветствовать нового Президента.\n\n"Я никогда не покину грифоний народ!"- прокричал он. Толпа продолжает ликовать. "Я никогда грифоний народ не унижу!". Ещё больше оваций. "Я не покину грифоний народ в самое тяжелое время," - четко сказал он, и его голос прозвучал громом над изголодавшейся толпой, - "Молодые грифоны больше не будут возвращаться к своим семьям в слезах, теряя свою работу! Я никогда не заставлю их плакать!" - генералы вокруг него начали улыбаться, их строгие глаза выражают тёплую, искреннюю поддержку нового президента. "Самое главное, я никогда не скажу "Прощай" моим сторонникам, никогда им не совру про нашу страну или политику, и никогда не сделаю им больно, в отличие от бандитских главарей прошлого. Я никогда вас не брошу!"\n\nЭстлер пожал когти генералам и вице-президенту, Альберту Коллениху, затем поклялся над писаниями Грифоньих богов соблюдать и отстаивать республиканскую конституцию. Сегодня начинается новый рассвет грифоньего народа."
 griffonRepublic.693.a:0 "Свобода, Демократия и Процветание!"

 griffonRepublic.694.t:0 "Выборы [GetYear]-го года"
 griffonRepublic.694.d:0 "После четырёх лет, прошедших с момента прошлых выборов, Республика уже готовится к следующим, которые пройдут сегодня. Действующий президент, [Root.GetLeader], заявил, что он снова будет участвовать в выборах, из-за отсутствия ограничения на количество президентских сроков в конституции и поддержки их политики обществом.\n\nЛевые, которых на выборах представляет [Root.GetCommunistParty], обещают широкие и всеобъемлющие социальные реформы, наряду с поощрением самоуправления рабочих в кооперативах, а также ограниченный рыночный социализм.\n\nЛибералы и социал-демократы, объединившиеся в разных либеральных партиях, предлагают идеи, схожие с коммунистическими, но более умеренные, отказываясь от социалистических экономических теорий в пользу классической Клонезианской. Социал-демократы будут, естественно, пытаться угодить и правым, и левым, желая создать центристскую Республику.\n\nПравые, которых представляет [Root.GetNeutralParty], идёт на выборы с программой сохранения капитализма, хоть милитаристы в их рядах и выступают за более централизованную экономику. Правые поддерживают свободную республику, соответствующую принципам свободы, демократии и процветания и выдвигают широкомасштабные экономические планы невмешательства, а также сосредоточены на централизации республики."
 griffonRepublic.694.a:0 "Правые!"
 griffonRepublic.694.b:0 "Либералы!"
 griffonRepublic.694.c:0 "Социалисты!"

 griffonRepublic.70.t:0 "Кончина героя"
 griffonRepublic.70.d:0 "Новость из Виннина разлетелась по всей Республике и повергла её в шок и испуг. Сегодня утром в своём поместье Александр Кемерскай перенёс сердечный приступ. Хотя его жена быстро вызвала врачей, по прибытии они уже ничем не могли помочь.\n\nАлександр Кемерскай, Герой и Отец Республики, скончался в 14:27 в присутствии своей жены и сына. Наш президент, [Root.GetLeader], получил эти новости через 38 минут, и парламент решил не собираться в этот день в знак уважения. Флаги наполовину приспущены по всей Республике, и мы получаем письма с соболезнованиями со всего мира. После десятилетий испытаний и тягот, поражений и побед Александр Кемерскай смог наслаждаться обществом своей семьи всего пару месяцев.\n\nЕго жена попросила провести лишь две церемонии. Одну – для героя и государственного деятеля, и одну – для вечно отсутствовавшего отцу и занятого мужа, который в итоге захотел исправить ошибки и сблизиться со своей любимой семьёй."
 griffonRepublic.70.a:0 "Он умер, но его мечта жива."

 griffonRepublic.71.t:0 "Выбор нашей военной доктрины"
 griffonRepublic.71.d:0 "В последнее время к нам обратились представители многих генералов и полевых командиров из нашего штаба, и все они предлагают всевозможные идеи о том, как реформировать наши вооруженные силы и в каком направлении их развивать. Все эти планы имеют свои плюсы и минусы, но, к сожалению, мы должны согласиться с ними, так как просто невозможно поддерживать наши вооруженные силы, как было раньше, и мы должны сделать выбор."
 griffonRepublic.71.a:0 "У нас будет превосходная организация и планирование: доктрина крупномасштабного планирования!"
 griffonRepublic.71.b:0 "Мы утопим врага в наших снарядах, будучи в безопасности: доктрина превосходства огневой мощи!"
 griffonRepublic.71.c:0 "В нашей великой борьбе мы задействуем всех наших грифонов: доктрина массированного штурма!"

 FAT_grand_doctrine:0 "Выбрать доктрину крупномасштабного планирования"
 FAT_superior_doctrine:0 "Выбрать доктрину превосходства огневой мощи"
 FAT_mass_doctrine:0 "Выбрать доктрину массового штурма"

 griffonRepublic.80.t:0 "Республиканский пакт просит нас о помощи"
 griffonRepublic.80.d:0 "Новость только что прибыла, государство [GRI.GetName] напало на одного из членов Республиканского пакта, и если мы хотим соблюдать пакт, мы должны присоединиться к ним в борьбе с Империей. Тем не менее... Империя довольно сильна, и, хотя это было бы не самым почетным или хорошим решением проигнорировать пакт... возможно, это было бы к лучшему?"
 griffonRepublic.80.a:0 "Нет, мы будем соблюдать пакт и дадим бой имперским агрессорам."
 griffonRepublic.80.b:0 "Да... Империя слишком сильна для нас, чтобы надеяться на победу."

 griffonRepublic.83.t:0 "Верани и неудавшаяся революция"
 griffonRepublic.83.d:0 "Во второй раз в истории, грифоны Аквелии восстали, чтобы сражаться за свободу и демократию, и во второй раз в истории их усилия были напрасны. Аквелийская республика вновь стала жертвой сил прогнившей аристократии, и многие храбрые герои погибли.\n\nНе все аквелийские революционеры были захвачены после поражения Республиканской партии. Сам лидер революции Теодор Верани сумел сбежать от врага морским путём. Теперь он прибыл в один из наших портов, а огонь революции горит в его доблестном грифоньем сердце. Он просит нас предоставить ему убежище и позволить продолжать борьбу за демократию и свободу отсюда. Несомненно, такой опытный и смелый революционер был бы отличным дополнением к нашей республике и прекрасным лидером для наших войск."
 griffonRepublic.83.a:0 "Мы приветствуем его с распростертыми когтями!"
 griffonRepublic.83.b:0 "Его революция была подавлена, зачем беспокоиться о нём?" 

 griffonRepublic.85.t:0 "Грифонья Республика требует Грифенхейм"
 griffonRepublic.85.d:0 "После аннексии Грифенхейма на мирном договоре с бывшей Империей Грифонов, Грифонья Республика отправила дипломатическое требование с просьбой вернуть Грифенхейм им. Их претензии проистекают из того, что город является их первоначальной столицей, и местом, где революция впервые осуществилась, хотя те времена были и недолговечными. Если мы передадим им Грифенхейм, это улучшит наши отношения с ними, но действительно ли мы этого хотим?"
 griffonRepublic.85.b:0 "Это наши солдаты проливали кровь за эту землю, а не их!"
 griffonRepublic.85.a:0 "Настало время вернуть Республике то, что принадлежит ей по праву."

 griffonRepublic.86.t:0 "Грифенхейм возвращен"
 griffonRepublic.86.d:0 "После десятилетий под императорским правлением наша первоначальная столица была освобождена не нами, а третьей стороной. Эта третья сторона приняла наш дипломатический запрос о возврате Грифенхейма. После стольких лет мы будем молиться за наших друзей и за их щедрость." 
 griffonRepublic.86.a:0 "Граждане Республики, сейчас и навсегда, запомните этот жест доброй воли!"

 griffonRepublic.87.t:0 "Государство [From.GetName] отказывается передать контроль над Грифенхеймом!"
 griffonRepublic.87.d:0 "Дураки из страны [From.GetName] имели наглость отказать вернуть нашу законную столицу - столицу всех грифонов! Выбора нет, нам придётся вернуть её силой." 
 griffonRepublic.87.a:0 "Придётся применить силу."

 griffonRepublic.90.t:0 "Вопрос о поддержке Грифоньей Республики"
 griffonRepublic.90.d:0 "Империя Грифонов была воинствующей и очень агрессивной нацией, прежде чем она рухнула из-за внутренних бед. После одного из многих восстаний некоторые из простогрифонов захватили там власть и создали республику, что не продержалась больше года, а затем была свергнута контрреволюцией. Остатки этой республики сбежали на север и использовали своё время для восстановления своих сил. Теперь они воюют с Грифоньей Империей, и возникает вопрос, должны ли мы поддержать их в этой борьбе? Это страна, которая не так далека от нашей концепции гармонии, и они действительно заботятся о каждом гражданине, но должны ли мы их поддерживать?"
 griffonRepublic.90.a:0 "Отправьте им снаряжение и убедитесь, что всем известно, что мы видим в них гегемона Грифонии."
 griffonRepublic.90.b:0 "Отправьте им всё возможное оборудование, в основном пушки, убедитесь, что наша поддержка скорее тайная, чем открытая."
 griffonRepublic.90.c:0 "Дипломатически признать их страной-гегемоном всей Грифонии."
 griffonRepublic.90.e:0 "Мы не можем участвовать в таком конфликте."

 griffonRepublic.91.t:0 "Помощь из Эквестрии"
 griffonRepublic.91.d:0 "Эквестрийские дипломаты передали нам послание, написанное самими принцессами, что они рассматривают наше государство как законного правителя всей Грифонии. В знак помощи они также отправили нам свое оборудование, которое было в основном оружием."
 griffonRepublic.91.a:0 "Похоже, что не все монархии такие плохие... или, по крайней мере, не грифоньи монархии."

 griffonRepublic.92.t:0 "Эквестрийское снаряжение"
 griffonRepublic.92.d:0 "Эквестрийские шпионы и агенты в Грифонии связались с нами и сообщили, что, хотя принцессы одобряют наше дело, они не хотят публично заявлять об этом, но в качестве подарка нам они послали много пушек."
 griffonRepublic.92.a:0 "Они могут быть монархией, но эти пушки очень ценны."

 griffonRepublic.93.t:0 "Эквестрийское одобрение"
 griffonRepublic.93.d:0 "Эквестрия прислала нам послание, одобрив нашу борьбу против Грифоньей Империи, и заявив, что мы являемся законными владыками земель, в настоящее время принадлежащими Империи, но, к сожалению, нам не оказали никакой материальной помощи, как отмечалось в заявлении, они надеются, что нам удастся найти мирное решение нашей нынешней проблемы."
 griffonRepublic.93.a:0 "Пушки были бы полезнее, но и так сойдёт."

 griffonRepublic.94.t:0 "Эквестрия молчит"
 griffonRepublic.94.d:0 "С самого начала нашего конфликта с Империей, Эквестрия просто молчала об этом, насколько нам известно, они не заявили об их поддержке или не предоставили империалистам оборудование, но они также не сделали этого и для нас."
 griffonRepublic.94.a:0 "Монархии всегда одинаковы, независимо от того, являются ли они грифоньими или поняшьими."

 griffonRepublic.95.t:0 "[From.GetName] требует лидерства в фракции"
 griffonRepublic.95.d:0 "Официальное коммюнике из города [From.Capital.GetName], подписанное самим правителем [From.GetLeader], требует, чтобы государство [From.GetName] стало «направляющей и главенствующей силой нашего альянса». Как мы ответим?"
 griffonRepublic.95.a:0 "Они более могущественные..."
 griffonRepublic.95.b:0 "Если они не хотят слушаться нас, то им придётся уйти."

 griffonRepublic.96.t:0 "Государство [From.GetName] передаёт лидерство над фракцией"
 griffonRepublic.96.d:0 "Как и ожидалось, [From.GetLeader] осознаёт разумность нашего предложения и объявляет своё государство, [From.GetName], младшим партнером государства [Root.GetName] в нашем альянсе."
 griffonRepublic.96.a:0 "Как и должно быть."

 griffonRepublic.97.t:0 "[From.GetName] отказывается передать лидерство над фракцией"
 griffonRepublic.97.d:0 "Возмутительно! [From.GetLeader] отказывает нам в нашем законном лидерстве в альянсе. Мы, естественно, быстро покинули эту «жалкую коалицию»."
 griffonRepublic.97.a:0 "Мы создадим нашу собственную фракцию! С блэкджеком и грифинами!"

 griffonRepublic.98.t:0 "The Wild Ride's End"
 griffonRepublic.98.d:0 "For how long the Republican administration has waited for this moment, the affair itself was quite straightforward and somber. Court proceedings were broadcast to the nation's public by radio, and Hermann Meyer was quickly found guilty of desertion, high treason, unlawful appropriation of military assets and conspiracy. Shortly after the veredict, Meyer was marched out in front of a military procession, and given a short death by firing squad.\n\nThe days that followed the veredict and execution were spent in a strange limbo. For the longest time, upper echelons of the NRP's leadership had held out hope that the Republic would survive for long enough to enact retribution upon Meyer and his clique for their betrayal; more pressing issues and conflicts dragged out our armed forces. But things had greatly changed since Hermann's desertion: at the time, the Republic was a fledgling state, still struggling to establish control over a chaotic Herzland and facing rebellion from the reactionary nobility. Meyer's betrayal was crippling at the time, but the Republican Air Force had developed from the ruins of his desertion, and while we returned in glory and fire to Griffenheim, Meyer's fiefdom in the insulated islands withered on the vine, until it was uncerimonously ripped apart by a renewed Republican Army.\n\nThe Republic has outgrown Meyer's betrayal, and in the midst of the Reconstruction mandate, his destruction was an afterthought. The one positive thing that has come of this endeavor is that we have, at long last, wiped the stain of this humiliating defeat off Griffonia for good."
 griffonRepublic.98.a:0 "The Republic stands avanged, and triumphant."

 griffonRepublic.99.t:0 "Diplomatic Recognition From The Griffonian Republic"
 griffonRepublic.99.d:0 "The Republican government of Griffenheim has extended an olive branch towards us, recognizing the Aquileian government as \"the rightful sovereign of the Aquileian region\". While this wording is somewhat dubious, the Republic's recognition has awarded our state a bit of international legitimacy."
 griffonRepublic.99.a:0 "That's good."

 griffonRepublic.100.t:0 "A Token of Appreciation"
 griffonRepublic.100.d:0 "Our efforts to establish meaningful channels of cooperation with the Aquileians have been nominally successful; the Aquileian state extends a friendly claw, at least in theory, to the Griffonian Republic."
 griffonRepublic.100.a:0 "It's a step in the right direction."

 griffonRepublic.101.t:0 "The Griffonian Republic Opens To Trade"
 griffonRepublic.101.d:0 "Recent conflits have left Aquileia somewhat economically isolated from wider Griffonia, but it seems the Republican government in Griffenheim is taking steps to restore intercontinental commerce: recent legislative measures to promote international trade have already resulted in newfound interest for Aquileian goods in the Herzland, and vice-versa."
 griffonRepublic.101.a:0 "Neat."

 griffonRepublic.102.t:0 "Commerce With Aquileia"
 griffonRepublic.102.d:0 "Our move to open commercial avenues with Aquileia has already had some positive results: we can expect international bussinesses to be more interested in investment in the Republic, which will allow us some measure of leverage over future trade deals with other countries."
 griffonRepublic.102.a:0 "Splendid."

 griffonRepublic.103.t:0 "President-Marshal Kemerskai Speaks"
 griffonRepublic.103.d:0 "\"To all members of the Republican Army,\n\nif you are listening to this broadcast, then you are either on duty at the Griffenheim garrison or currently mobilizing at the outer rim of the old duchy. As things stand, I can make few assumptions about each of you: you may hail from distant Cloudbury, where the Republic was reforged in fire and its spirit remade in the bitterness of struggle. You may be from any corner of the Herzland, from the port of Rottendedam to the reaches of the Scheißwald Forest. You may even be one of the original dauntless few, those who accompanied me long ago across the northward reach in the Long March.\n\nHowever, there are two things that I can know for certain about you. Firstly, that as you stand here, still under dutiful oath to the Republican Army as others have fled in disgrace, your loyalty to the cause, and to my command, is beyond question; secondly, that regardless of what you may believe, how you may wish to vote, how you may wish to live, you share with me the most quintessential and sacred belief, the dream of a government conceived in defense of the prosperity and liberty of its citizens, a bulwark against the threat of the Empire, or any other despotism which seeks to make us its vassals. Far too many good griffons have bled and died for the sake of our dream; and it is with a heavy heart that I say we must rise to the occasion, and defend it yet again.\n\nFull honors are assured to all of you who join me in the push to reclaim the Herzland and crush the secessionists that threaten the capital. To those of you who've stood with the NRP, with the Army, and with the dream of a Republic: I salute you! And may this be your final sacrifice for its sake!\""
 griffonRepublic.103.a:0 "Those loyal to the tricolor march forth! For the Republic!"

 griffonRepublic.104.t:0 "First as Tragedy, Then as Farce"
 griffonRepublic.104.d:0  "The sound of running water from the sink had lulled Kemerskai into a trance. He had excused himself, but the truth was he simply needed a moment alone. Herzland was theirs, Griffenheim was theirs, Cloudbury was theirs... yet, it all felt so hollow. How many times had the republic gotten back up from tragedy by now? Truthfully, Kemerskai was weary of tragedies. Their initial exile had been a bitter pill to swallow, but now tragedy had simply become... exhausting. He could no longer bear to meet his comrades eyes without feeling ill. Maps gave him a headache, and by Boreas, even the gods felt tarnished by all this endless fighting.\n\nA knock at the door. That forsaken meeting he had hoped would be over by now demanded his return. "I will only be a moment longer." He answered back, much to his own annoyance. As he turned off the faucet, the last few drops taunted him. At least the water could stop on command; he envied such a simple fate. There was still so much to do, and this meeting would surely not be the last.\n\nAs he reached for the doorknob, a sharp pain flared in his chest and he steadied himself by holding onto whatever was near. No knocks came, none checked on his well-being. It was by his will, and his will alone, that he kept his own body standing. He did not have the luxury of laying down dead, as his body so clearly wished – not after all he had already lost for this nation.\n\nWith a steadying breath, he left for the meeting once more. Reconstruction had to go smoother than last time, and hopefully by the end of it, he would finally be able to lay down dead."
 griffonRepublic.104.a:0 "Now, one last time..."
 FAT_civil_war_end_tt:0 "§YCongratulations! Even despite all the setbacks and mistakes, the dream of a Republic lives on, even if hanging on by a thread. With its territory reunified and its traitors laid low, perhaps the Marshal's dream will yet be realized in time.§!"

 griffonRepublic.105.t:0 "A New Trade Partner"
 griffonRepublic.105.d:0 "In order to successfully establish a good commercial presence in Zebrica, it's best if we focus on improving relations with a particular trade partner. This will make economic policy easier to manage, not to mention give us a stronger ally on the continent. We need only to choose the right nation on which to focus our efforts."
 griffonRepublic.105.a:0 "Hippogriffia is our best option."
 griffonRepublic.105.b:0 "Colthage makes the most sense."
 griffonRepublic.105.c:0 "Why not Hindia?"
 griffonRepublic.105.e:0 "Macawia's the right way to go."

 griffonRepublic.106.t:0 "An Offer From The Griffonian Republic"
 griffonRepublic.106.d:0 "The Griffonian Republic has reached out to us: they're interested in expanded economic cooperation, and wish for our states to coordinate naval operations in order to protect intercontinental shipping and encourage trade between our nations."
 griffonRepublic.106.a:0 "Sounds like a good arrangement. Count us in."
 griffonRepublic.106.b:0 "The NRP cannot be trusted. We reject the offer."

 griffonRepublic.107.t:0 "A Formal Invitation From Griffenheim"
 griffonRepublic.107.d:0 "The new Republican government in Griffenheim, having ousted the Empire from the Herzland, is interested in integrating our nation as an autonomous territory. This would mean the complete loss of our independence, though Griffenheim assures us our citizens will be endowed with all rights Republican citizens have. We could simply reject the invitation, of course, but it's all but inevitable the Republican Army would come to us, by force, later on."
 griffonRepublic.107.a:0 "These terms are acceptable. We accept."
 griffonRepublic.107.b:0 "An enticing \"offer\", gentlegriffs, but we'll sadly have to refuse."

 griffonRepublic.108.t:0 "The Borderlands Agree to Join the Republic"
 griffonRepublic.108.d:0 "The government in Hellquill has agreed to peaceful integration into the Griffonian Republic. We will begin to incorporate the region at once."
 griffonRepublic.108.a:0 "We welcome our new fellow citizens into the Republic!"

 griffonRepublic.109.t:0 "The Borderlands Refuse!"
 griffonRepublic.109.d:0 "The government in Hellquill has stubbornly refused integration! While this is detrimental to our plans, it merely delays the inevitable - as soon as we are prepared, we'll secure the Eastern border, whether the local regime is willing or not."
 griffonRepublic.109.a:0 "We'll be ready then."

 griffonRepublic.110.t:0 "New Mareland Is Forced To Capitulate"
 griffonRepublic.110.d:0 "With the Republican Army succeeding in their push into New Mareland and their government forced into exile, the Griffonian Repulic has successfully sued for peace. The colony's territory is to be transferred to Griffenheim's control. The loss of this stronhold in Griffonia will only further solidify the Republic's hegemony over the continent."
 griffonRepublic.110.a:0 "And stay out, monarchists!"
 griffonRepublic.110.b:0 "Pony feathers..."

 griffonRepublic.111.t:0 "New Mareland Holds Out"
 griffonRepublic.111.d:0 "With allied forces surging into Griffonia, the Griffonian Republic's plan to quickly overwhelm the small colony and sue for peace has failed. Peace negotiations are underway: not only will New Mareland remain independent and hold onto its territory, this defeat will severely demoralize the Republican Army."
 griffonRepublic.111.a:0 "Boreas damn these ponies."
 griffonRepublic.111.b:0 "That'll teach them!"

 griffonRepublic.112.t:0 "Diplomatic Envoy From Griffenheim"
 griffonRepublic.112.d:0 "We have recently received communications from the new Republican government of Griffenheim, seeking to cement our diplomatic relationship and \"put aside the hostility between our two peoples and the legacy of the Griffonian Empire\". The ruling NRP has given us a formal promise in the form of a non-aggression pact, assuring us they have no intention of annex land east of the Hellquill borderlands. This development has greatly silenced revanchist voices in our domestic politics, as it seems we will have nothing to fear from the Herzland now that the Empire has been destroyed."
 griffonRepublic.112.a:0 "Interesting."

 griffonRepublic.113.t:0 "An Agreement For Peace In Griffonia"
 griffonRepublic.113.d:0 "Representatives from the Griffonian Republic and [R1.GetNameDef] met on the border city of Hellquill in order to formally recognize each state's borders and agree to policy of mutual assurance of sovereignty. The Republican government of Griffenheim hopes this diplomatic gesture will finally put an end to the perpetual skirmishes and targetted atrocities that have categorized griffon-pony relations in the Griffking borderlands since the days of the early Empire. It remains to be seen whether tensions will remain manageable, but for the time being, hopes have been flared for a period of peaceful coexistence between griffons and ponies in Griffonia."
 griffonRepublic.113.a:0 "Grover II's legacy might finally have come to an end."

 griffonRepublic.114.t:0 "The First Legislative Session"
 griffonRepublic.114.d:0 "On this day, [GetDateText], the newly refurbished Republican Parliament in Griffenheim gathered for its first official legislative session in its new permanent residence. Many of the representatives were old members of the National Republican Party, and a select few even remembered the parliament's many assemblies in haphazard munition depots and repurposed offices as the Republic fled to the North. Many new faces joined the old timers: from all corners of Griffonia, new representatives and their assistants, civil administrators and clerks came to the city to take on their duties.\n\nFor the first time, parliament's session was broadcast to the public through radio. One of the first motions Parliament undertook was to honor the late Marshal Kemerskai with a minute of somber silence, before proceeding with normal affairs. After years of being led by executive fiat with varying input from a shifty parliamentary assembly, this day has finally marked the Republic's true transition from a fledgeling state into the true government of the Griffonian people."
griffonRepublic.114.a:0 "Now, to discuss the yearly budget..."

#TODO
 griffonRepublic.115.t:0 "The President's Musings"

 griffonRepublic.115.d_sunglider:0 "\"I'll make sure to respond to the delegate this afternoon, just let the Speaker know I'll be absent.\"\n\nThe clerk nodded silently to Schnabel and closed the door as he left his office. Sunglider leaned back and rubbed his eyes, before picking up the pen and preparing to skim over his draft. Midway through writing, Sunglider found himself staring longingly out the office window to the Parliament's facade, noticing the intricacies of its structure, as well as the similarities to the old Imperial Palace. It had been surprisingly easy for him to fall into the routine of civilian governance - the sessions of the legislature, the meetings, the long nights spent settling administrative minutia. Ever since he fled to Cloudbury, he never would've imagined his life would end up being so mundane.\n\nSchnabel took a deep breath and thought of his myriad petty fights with Kemerskai. Most of them had melted away to nothing in his memory. Of the few he recalled, one stuck out vividly: when Sunglider expressed his wish to be participate in the politics of a truly established Republic, the Marshal said he simply wanted to rest; that he'd lost true passion for the day to day after the Long March. Alexander was a driven griffon, but as soon as he saw his task done, he retreated to private life. Much as he was inclined to deny it, Schnabel had begun to envy his decision.\n\nSunglider looked back to the Marshal's portrait hanging over the office doors, and smiled.\n\n\"You earned your rest, sir. But I wish you could've seen it to the end.\""

 griffonRepublic.115.d_di_karthin:0 "Before President Di Karthin stretched a grand new park with green fields and arboreal spaces creating a beautiful spot at the heart of Vinnin. While such an event would not typically place the president at the forefront, it was a single bust at the center of the park that made her presence essential. A bronze bust of the republic's hero, Alexander Kemerskai. He was not depicted in the marshal's uniform that defined his public life, but in civilian clothes, with a gentle expression.\n\n\"People of Vinnin,\" Di Karthin began, looking towards the gathered crowd. \"We come here today to honour and to remember the Republic's greatest hero.\" She turned slightly, gesturing to the bronze but shining under the sun. \"Alexander Kemerskai – the griffon who gave it all to fight for what he knew was right. He gave his life to tear down the walls that separated griffonkind. He gave us back our proud nation. And in his final years, he wished simply for... for quiet. For peace... The greatest regret of my life is that his quiet came too soon. That the weight of the struggle meant he never truly got to stroll in the peace he created. He earned his rest; the gods know he did.\" She felt a tear form in her eye. \"But I would give anything for him to have been able to sit on that bench over there, and enjoy the peace he gave to all of us.\"\n\nShe paused, letting the rustle of leaves fill the silence. \"So today, we open a park in his name. A place where common griffons may enjoy time with their families, or simply lie in the grass. A place where all can enjoy the peace and calm him and many others fought and died to ensure!\" With a decisive snip, she cut the ribbon. \"Let this park be our promise, and renew our memory. His memory shall forever be ingrained in the heart of our republic. From here, he watches as Vinnin and all the Republic grow into the beautiful home he always knew it could be.\""

 griffonRepublic.115.d_kogchel:0 "The last light of the afternoon was fading, painting Kogchel's office in beautiful shades of orange. He was ready to go back home when a click at the door surprised him; he hadn't expected any more meetings tonight.\n\n"Leaving so soon, Comrade President?" The voice from the doorway was one he recognised. Kogchel looked up to see a small group filing in, faces from a different life: many from his days with the PvDA, and a few he had not seen before, all led by Stappenbeld, who came in with a smile. The ones he recognised he knew to be quite... vanguardist. "Not too busy for a drink, are you?"\n\n"Never, comrade. Please, get comfortable." Kogchel's weariness melted into a tired smile. He set his briefcase down and the group quickly devolved into chatter. They spoke about their families, toasted to his victory and laughed together, acting as the friends they had never been – but there was a certain comfort in this familiarity. Kogchel nodded humbly, trying to downplay compliments and hints of wanting something more, until a sudden slam on the table shattered the facade.\n\n"I will not stand by as you all ignore the truth and dance with half-words!" A young griff he didn't recognise pointed at him. "You managed to rally the left around the GSP and you do nothing with it?! Have you forgotten about your time in the PvDA?! Have you forgotten your comrades?!"\n\nAfter a moment of shock, Kogchel recovered and let out a light laugh. "Oh, I remember. So many endless debates about theory and the most minor of details." His eyes narrowed as he looked at the youth. "You wouldn't know that, would you? You weren't there, you thankless chick." As one of his older comrades tried to raise a claw to calm the mood, Kogchel stopped him. "I'll have to ask you all to excuse me for tonight, I'm getting quite tired."\n\nThe group looked at each other for a moment, and Stappenbeld finally tapped the young one to give it up. As they filed out, Stappenbeld lingered at the door. "Just think about it, Gerben. There was truth in his words, and you know it." He turned away and gently closed the door. Kogchel looked down and sighed. They demanded respect from a system they refused they wished to undermine... it was all quite ironic. He took his briefcase and rose, his mind set. If they wanted to be respected, they would need to learn to respect."

 griffonRepublic.115.d_astler:0 ""Comrades!" Astler's voice, seasoned by years of hard work, called for all attention. The crowd gathered today one of the unlikeliest in all of Griffonian history, one that was a fragile yet very potent house of cards: a united left. "We have shown all that the people yearn for a fairer future! Our cause burns in the heart of every griffon who has ever been wronged, who has ever dreamed of something more!" A wave of applause rose, and Astler waited for it to subside."While we have come to finish the revolution, we cannot forget we only stand here because of the previous greats." He paused, letting the words hang. "The first revolution was like a hurricane that swept away the decaying empire. It was violent and it was vengeful, but it brought us much good. It shattered chains, toppled dukes, and shouted to the world that griffons would no longer kneel!"\n\n"But that hurricane... it never did all the things it should. It stopped advancing and it stagnated – it brought so much promise, but it never focused on what truly mattered. It left the economical woes of all griffons as an afterthought compared to simply parading itself as the birthplace of an idea it could not fulfil... but it served as a spark! We only get one life, one chance to build a better world – and though the Marshal may have made many mistakes, he allowed us to be here today..."\n\nAstler took a steadying breath and slammed the podium with a determined expression "But from that storm, a new fire was lit!" He raised a claw, gesturing to encompass the entire hall. "Look around you! There is a fire in every one of us! This flame unites us for something greater! And through the will of the people, this fire will keep burning! Our poorest beg of us: 'Is it too much to ask for a world where no griffon starves?' 'Is it too much to change the way we have always lived – in exploitation and fear?'" With each question, he hammered his claw on the podium. "Too much to lose? What have we not already lost in their service. But too much to win? NEVER!"\n\n"The reactionaries say it is too much to ask!" The hall erupted as he shouted over the roar. "I say it is only too much for those who refuse to open their eyes and see! For those who refuse to feel the suffering of their fellows! For those who will not fight for what is written in plain black and white: that all griffons are equal, and deserve peace, and bread, and dignity!" He took a deep breath and spread his arms wide with a triumphant look on his face. "We can choose! And we have chosen! TOGETHER!""

 griffonRepublic.115.d_guildedwing:0 "The door clicked shut, leaving Genevieve to finally enjoy silence once more. She was supposed to be building a better republic, but seemed to be getting bogged down at every step by a petty bureaucracy. Her head throbbed with the certainty that these NRP flunkies would keep at it until she quit or toned down her reforms for their sake.\n\nGenevieve couldn't understand it. The NRP fought beak and claw to survive in the north, pioneers of republicanism and revolution – and it had devolved into this? Petty administrators thinking themselves untouchable. Their founding ideals of freedom from emperors and nobles had been bargained away in favor of simply winning a comfortable spot in Griffenheim where their party would be as dominant as the nobles of old. It was as if the Empire's skeleton was still there, just now wearing a republican sash.\n\nGenevieve had fought so hard for democracy in her home. She had climbed the unending mountain of her uncle's errors. She had done everything to ensure a fair future for Skyfall, bumps and all, and now these damned bureaucrats thought they could break her, when Ghislain could not?! They thought stress and bureaucracy would be enough – that the weight of their rotten system would wear her down into just another broken idealist like they had become.\n\nThey were wrong.\n\nLet the headaches come, Genevieve thought. Let the nights be long and let them block her at every turn. She would use every tool, every ounce of authority in this office to show the NRP they would not have their dominance unchallenged. She would expose every rotten act, challenge every unearned privilege, and force every injustice into the light until the nation could stand for itself.\n\nShe would make this republic fair, no matter the cost."

 griffonRepublic.115.d_verany:0 "Vérany lightly shook his glass of wine, alone in his home. It was not grand at all, but this was an important part of ruling all the same. The dream had been achieved, it had proven itself stable and he had risen to its forefront as its president. A Griffonian Republic where he and his family could enjoy their days, one where the heavy weight of war was no longer at the forefront of everyone's mind, replaced by hopes for a nearly complete future of peace. But every time he looked back, he saw the one common thread that had always outrun him.\n\nAs a young and brash griff he was already readying himself for a future revolution, one where he and his fellow republicans would topple the corrupt monarchies... but there was that one griffon, Kemerskai, who raised the banners to war and even threw the Emperor out of Griffenheim before they could ever act. Yet, this first revolution was not meant to be -- neither for Kemerskai, nor Vérany. They tried to emulate their successes in Aquileia and failed, with Vérany ending up exiled. In that, too, Kemerskai shared his destiny – but with an armed and organised exile into Cloudbury to keep fighting for the revolution.\n\nNow, the revolution had finally been successful, and Kemerskai had beaten him to the top once more. His lifelong dreams had been fulfilled by the one griffon who had outpaced him at every step, and now Vérany enjoyed the spoils of Kemerskai's legacy as the Marshal rested in the peace he had so wished for. Vérany couldn't hold back a grin as he extended his glass and made a cheer for no one in particular.\n\n"Touché, monsieur Kemerskai. Touché."

# griffonRepublic.115.d_ventriglio:0 ""

 griffonRepublic.115.d_kingfeather:0 "A recent headache had presented itself to Kingfeather: three griffons were letting their petty disputes override their sense, and sadly, they were important enough to become a pain for him and the Republic. He had gone to each in private, speaking enough sweet words to arrange a peacemaking dinner to smooth the waters. While it had been a rough first few minutes, before the end of that first hour they were all raising their glasses in a toast, as if they had never been enemies.\n\n\"Cheers!\" the veteran spoke, his gravelly voice still full of determination. Of the three, he had been the easiest to sway – a few sweetened words and a promise to respect the ways of old, a pledge Kingfeather had memorized by heart ever since he first took power after the Marshal.\n\n\"Cheers!\" the reformer added, her face beaming with conviction. She had cost a little more: a meeting with her close allies and some minor concessions. Yet, it was nothing too costly to ensure the peace of the evening.\n\n\"Cheers!\" the industrialist exclaimed, his eyes shining with greed. The price was a few well-endowed payments and favorable contracts – more than he deserved. These types became problems sooner or later, but like his companions, his price was simple to fulfill compared to what Kingfeather gained from the arrangement.\n\nThey ate, spoke in platitudes, and commemorated the Republic's successes, each guest believing they saw a kindred spirit in the President. Kingfeather nodded, agreed, and gently steered the conversation whenever it threatened to slip into unwanted topics. Finally, as the evening concluded with broad smiles and old grievances settled, Kingfeather stood alone once more, watching their vehicles depart into the night. He kept the same expression as he came back into his home, barely giving any thought to the events of the night.\n\nWork is never over, and Kingfeather did not get so far without knowing something that simple."

 griffonRepublic.115.d_junior:0 "The clock in the corner ticked and tocked, marking more time wasted. Kemerskai Jr. set down his pen, the draft of the evening's speech staring back at him. It had been the same all day; he could see it in every word. Kemerskai this, Kemerskai that – but it was never about him, it was about being a Kemerskai. His eyes drifted to the portrait of his father. The Marshal! The Liberator! The Founder! The ghost in every room he ever entered, whose shadow fell over every action he took! He had spent a lifetime trying to carve out a space of his own in that shadow – and all he had managed was to drag the shadow with him, larger than ever.\n\nA knock at the door jarred him from his thoughts and showed the time for introspection was over. The ride that ensued was a blur, his own reflection in the window taunting him: a tired griffon wearing his name like an ill-fitting uniform. As the car approached, a new sight filled the backdrop – a sea of faces and flags, kept at a distance yet praising the passing vehicle. The crowds persisted as he approached, and they remained as he stepped up to the podium, thousands waiting. He delivered the necessary words, but could not summon the fire his father had – he never could. He was ready to leave the podium when a single voice broke through the din.\n\n\"PRAISE TO KEMERSKAI!\"\n\nLike a spark to tinder, the speech he had written off as a dud began to rise. A voice took it up, then a dozen, then hundreds. The chant swelled, and Jr. stood there, aghast. For a moment, his resentment boiled. Once again, his accursed name had stolen his spotlight.\n\nBut then, a strange clarity washed over him. His father was not here – long dead and buried. But he was. His heart pounded against his ribs and his claws gripped this podium; HE was the one passing policy and the one creatures came to ask favors of. A slow smile touched his beak, and Jr. leaned into the microphone, letting the chant wash over him a moment longer before raising a claw for silence. The roar subsided as thousands of eyes fixed on the heir, waiting. He looked at his prepared speech, then deliberately set it aside.\n\n\"Citizens of the Republic! You call for Kemerskai!\" Jr. smiled and raised his arms as if awaiting an embrace. \"And I... am here!\""

 griffonRepublic.115.a:0 "And thus, the Republic lives on."
 FAT_end_outro_tt:0 "§YCongratulations! Though it took a heavy toll and Golden Liberty was paid for in blood at each step, the Griffonian Republic is now assured and its dominion unquestionable. The late Marshal's Dream has been realized: liberty and prosperity have been forever assured for all Griffonkind!\nWe hope you enjoyed playing.§!"

 griffonRepublic.116.t:0 "The Griffonian Republic's Lend-Lease"
 griffonRepublic.116.d:0 "The Republican government in Griffenheim has sent us critical support in the form of equipment stockpiles, free of charge, to supply our armed forces. This massive shipment of war materiel will be more than to bolster the army for the time being."
 griffonRepublic.116.a:0 "Sweet Boreas, this is just what we needed!"

 griffonRepublic.117.t:0 "The Matter of Constitutionalism"
 griffonRepublic.117.d:0 "A debate of some importance has snuck its way to Parliament in Griffenheim, being discussed not in an official fashion, but among casual conversation among clerks, army personnel and NRP cabinet members: the nature of the Constitution as a document. While the Constitution of 978 has been both the NRP and the Griffonian Republic's guiding doctrine since the Revolution, a decisive split formed since our establishment in Cloudbury and has now fully materialized into factionalism among the Party, that being, whether the Constitution is a dead or a living document. The right and center wings of the NRP argue for originalism, the notion that the Constitution is a dead document whose precise language and wording must be examined solely within the context of its original meaning, as intended by its original writers. The left wing, on the other claw, argues for organicism, the notion that the Constitution is a living document whose meaning and rightful interpretation accompanies the flow of time.\n\nGiven that many of our cabinet members were alive, and indeed present for the original writing of the Republican Constitution of 978, this affair will be of no immediate consequence, but the ramifications over the course of the Republic's lifespan, well into the future, may be immense. It is only natural that language changes over time, and the Constitution's wording may acquire a wholly distinct meaning in future generations. In addition to this consideration, known loyalist cells within the Herzland are known to prefer the organicist position on the Constitution, while the Archonates would prefer for us to favor originalism."
 griffonRepublic.117.a:0 "Favor originalism among the NRP."
 griffonRepublic.117.b:0 "Favor organicism among the NRP."

