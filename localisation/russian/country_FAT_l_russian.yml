 ### Advisors ###
 FAT_spymaster:0 "Дорте Дайнесдаттер"
 FAT_spymaster_desc:0 "Дорте Дайнесдаттер – уроженка Клаудбьюри, родившаяся в роду купцов, воинов и местных политиков в самой северной провинции Республики. Последние два с половиной года она возглавляла военную разведку — исторически весьма нестабильную должность в Республике — и благодаря своему северному происхождению получила относительно простое прозвище «Шеф». Дайнесдаттер аполитична, но фанатично верна грифону, который забрал её с далёкого севера и пригласил в правящий класс Республики – президенту-маршалу Александру Кемерскаю. Остаётся только надеяться, что «Шеф» справится с угрозой Сантейла и Роузвинг лучше своих незадачливых предшественников."
 FAT_political_1:0 "Тобиас Сивенхоф"
 FAT_political_1_desc:0 "Тобиас Сивенхоф изначально не был сторонником Кемерская. Он был высокопоставленным чиновником в городе Клоборг во время царствования Отто II. Когда республиканцы начали Великий Поход на Север, одним из первых городов на их пути был Клоборг. Сивенхоф выступил против мэра Карла Свенс-Риннера, поддержал республиканцев и сделал Клоборг одним из важнейших опорных пунктов республиканцев. За поддержку республиканцев он стал первым сенатором Дендежьёрда. Его политика основана на компромиссах, за что он и получил большую популярность в Республике."
 FAVORABLE_CONDITIONS_SIVENHOF:0 "Это государство является §YДемократической республикой§! или Сивенхоф является §YПремьер-министром§!."
 FAT_political_3:0 "Рикард Эстлер"
 FAT_political_3_desc:0 "Рикард Эстлер, основатель и лидер левого крыла НРП, родился в Клаудбьюри в 981 году, когда город уже находился под контролем Республики. Это единственный из министров в правительстве Кемерская, который не сражался ни в ходе Великого Похода, ни в ходе революции. Отец Эстлера был клаудбьюрийцем, а мать беженкой с территории республики из Герцланда. Они воспитали его в соответствии с клаудбьюрийской культурой, и вскоре Эстлер начал восхищаться Социалистической Республикой Скайнавия и её уникальной системой управления.\n\nЭстлер участвовал в многочисленных социалистических и профсоюзных движениях и в конечном итоге стал чиновником в Клаудбьюри под знаменем левого крыла НРП, обещая внедрение демократического социализма в Республике. Хотя он отказался от многих своих про-скайнавских взглядов во время пребывания в Городском Совете Клаудбьюри, многие не хотели ему доверять, и он подвергался клевете за свои взгляды.\n\nОднако, несмотря ни на что, Эстлер был избран мэром Клаудбьюри в 1005 году на местных выборах, разрешённых правительством Кемерская. Его противник, яростный республиканец и антикоммунист, лишился своего поста, и Эстлер немедленно начал продвигать прогрессивные реформы в этом промышленно развитом городе.\n\nДолжность мэра теперь поставила его в интересную ситуацию - как один из самых влиятельных политиков в республике, Эстлер обладает могуществом и влиянием, что могут позволить ему стать следующим президентом республики - если только он не падёт жертвой очередной волны антискайнавских выступлений."
 FAT_political_2:0 "Эрих Кригер"
 FAT_political_2_desc:0 "Эрих Кригер, рождённый в Крестьянской Республике Грайфенмаршен, всегда поддерживал республиканские идеи. Однако, его родной Грайфенмаршен был лишь марионеткой монархистов, и там Эрих не смог ничего добиться. Вскоре он присоединился к республиканцам. Его опыт работы в Грайфенмаршене дал ему понимание слабости децентрализованного государства. Из-за этого он вступил в правое крыло НРП, полагая, что сильное правительство сумеет решить проблему бандитов. Он стал военным министром. Северяне недолюбливают его из-за того, что он не знает клаудбьюрийский диалект."
 FAT_political_4:0 "Корнелиус Винке"
 FAT_political_4_desc:0 "Плодовитый писатель-республиканец, Корнелиус Винке, родился в Фезере. Он стал известным благодаря своим памфлетам, но в итоге был изгнан из Скайфола за "нарушение мира" после вооружённого выступления республиканцев. Он оказался в Фетизии, где вступил в республиканскую армию. После Похода он постепенно замыкался в себе и отстранялся от политики. Теперь он живёт в доме у границы с Вединой и пишет книги, одна страннее другой. Некоторые пользуются успехом, например, "Ложь Гармоничной Монархии" - критика монархического строя Эквестрии, а некоторые являются чем-то очень странным, например, в одной из своих работ он утверждал, что "козы, наконец, вступят в союз с Мааром, и положат конец нашей расе.""
 FAT_political_6:0 "Рейнхард Сантейл"
 FAT_political_6_desc:0 "Называемый многими "вторым грифоном в Республике", Рейнхард Сантейл был одним из самых доверенных генералов Кемерская во время Грифоньей Революции. Будучи весьма грубым грифоном, Сантейл движим идеями мести и ненависти к Империи и её политической системе, которую он называет "олигархической" и "упаднической". Отношения Кемерская и Сантейла были разрушены тогда, когда Кемерскай запретил Грифоний Национальный Революционный Фронт, членом которого был Сантейл, выступавшего на пан-грифоньих и ультранационалистических позициях. Уже много лет Сантейл возглавляет автономную армию, дислоцированную в сельской местности, которая занимается рейдами и налётами на города, фермы и промышленные объекты, тем самым усугубляя ситуацию в Республике. Однако, самый опасный грифон в Республике всё ещё может (при определённых уступках), вновь стать верным соратником Кемерская и воевать за дело Революции."
 FAT_political_7:0 "Стефано Аривелли"
 FAT_political_7_desc:0 "Стефано Аривелли родился в Карфине - столице Вингбардии. После смерти короля Гумберто в 972 году его семья переехала в Герцланд, где они стали изгоями из-за негативного отношения к вингбардийцам. Стефано вступил в армию, где он столкнулся с той же проблемой. Его утешением были идеи пан-грифонизма и республиканизма. Стефано принимал участие в Революции и Походе. Будучи, в своё время, экспертом в банковских делах, он, однако, не нашёл себе применения в Республике и начал пить. Причиной этого было его плохое знание герцландского диалекта и полное незнание клаудбьюрийского, из-за чего он не мог общаться с большей частью населения Республики.\n\nЕдинственное, что удерживает его в республике, - это его фанатическая преданность революции и его величайшему другу Генриху Кингфезеру. Будучи на деле вторым заместителем Кингфезера, Аривелли осуществил прагматическую реформу и поощряет бизнес в соответствии с принципами процветания и свободы."
 FAT_political_8:0 "Олаф Рестьен"
 FAT_political_8_desc:0 "Клаудбьюриец Олаф – пацифист, но присоединился к республиканцам в ходе Великого Похода. Он был плодовитым писателем, и продвигал в своём искусстве идеи пацифизма и Республики. После захвата Республикой Клаудбьюри он стал одним из лидеров республики, основал художественную академию в Лостгейте и стал сенатором от этого города. Два срока сенатора он был сторонником гармонистского крыла НРП, однако позже он вышел из фракции и покинул пост сенатора из-за конфликта с Шнабелем Санглайдером - лидером гармонистов в НРП. После отставки он вернулся к искусству, служа Республике через своё искусство, за что получил Медаль Почёта от Президент-Маршала Кемерская."
 FAT_political_9:0 "Николь Роузвинг"
 FAT_political_9_desc:0 "Когда-то Николь была подругой и соратницей Кемерская в борьбе против Империи. Она родилась в городе Грифинг, что в Энгривере – самой бедной провинции Империи. С раннего возраста она видела бедность и задавалась вопросом, почему так произошло.\n\nВ возрасте 24 лет она вступила в имперскую армию. А когда через несколько лет Кемерскай вступил в армию, они быстро подружились и начали обсуждать идеи республиканизма и гармонии. Роузвинг считала, что сама по себе монархия может быть преобразована в соответствии с идеями гармонии. Они вместе прошли по императорскому дворцу в дни революции. Когда Кемерскай стал лидером, он назначил Роузвинг своей заместительницей.\n\nВ итоге Роузвинг вместе с остальными республиканцами ушла на север. К этому моменту её разногласия с Кемерскаем по поводу идей Республики привели к её смещению с поста командующей армии и замене на Рейнхарда Сантейла – амбициозного лидера, связанного с откровенно фашистскими группами. Разочарованная Роузвинг увела подконтрольные ей войска на север. В итоге к ней присоединился и Сантейл, и они объединились против Кемерская. Сомнения Роузвинг в идеалах республики привели её к отказу от идей республиканизма в пользу стабильности и порядка военизированных государств. Однако, несмотря на это, её войска не опустились до уровня налётчиков Сантейла. Она всегда распределяла добытое между всеми солдатами и выступала против грабежей городов и ферм, предпочитая оружейные склады. Такой стиль делал её уважаемой среди солдат, но бил по самой Роузвинг, ухудшая её моральное состояние, ведь она грабила земли, за которые когда-то сражалась вместе с Кемерскаем."
 FAW_ophelia_desc:0 "Ophelia Saxhagen-Plumenjar was born in 1000, child of Otto I, during the late years of Republican rule in Cloudbury. Despite her royal lineage, she had a relatively humble upbringing in Cloudbury, kept out of the turbulent political climate by her father, who raised her on stories of the House and of the old Duchy. As a member of the admiralty, Otto could afford to give his daughter a liberal education, and so Ophelia was tutored in rhetoric, natural philosophy and history. As Otto expected his daughter to eventually find her place in the Republic's civil administration, she developed the skills of a capable administrator and statesgriff, until the Duchy's restoration threw her life's trajectory out of rails by making her the heir of the Cloudbury throne.\n\nOphelia is a calm and collected griffoness with a passion for history and the arts, and her experiences in the chaos of the last years of the Republic shaped her into a reformist who wishes to incorporate democratic elements into the traditional monarchy, for the sake of the realm's stability and prosperity."
