 griffonRepublic.135.t:0 "The Betrothal Is Accepted"
 griffonRepublic.135.d:0 "Wonderful news! The imperial regency has accepted our proposal, and as of now, the young Emperor-to-be is betrothed to princess Ophelia. This arrangement is sure to greatly benefit us both. For the time being, Ophelia remains in Cloudbury with her father, and the prestige of being the Emperor's future consort is sure to bring the Duchy of Cloudbury much closer to the Empire's administration and political life."
 griffonRepublic.135.a:0 "Hurray!"

 griffonRepublic.201.t:0 "Судьба правого крыла НРП"
 griffonRepublic.201.d:0 "With Kemerskai and his government having lost their mandate, an issue remains regarding his remaining allies in the party: Sunglider and Kingfeather. While Sunglider is someone we can both tolerate and work with, Kingfeather's presence raises serious concerns among the left-leaning members of the NRP.\n\nHaving supported Kemerskai's emergency measures and the suspension of the constitution, Kingfeather has long revealed himself as a political opportunist, doing whatever he deems necessary to advance his agenda. Although we cannot hope to simply expel him and his followers from the party right now, we can certainly take measures to sideline them and ensure they remain docile and harmless.\n\nConversely, some voices warn that resorting to such actions would only further corrupt our republic and its democratic institutions, calling for closer collaboration with the right to preserve the unity of the NRP."
 griffonRepublic.201.a:0 "Ensure their influence is null."
 griffonRepublic.201.b:0 "We should not stoop to petty politicking."

 griffonRepublic.202.t:0 "Социалистические советники приходят к власти"
 griffonRepublic.202.d:0 "Многие в республике прогнозируют, что правительство Кемерская не сможет долго существовать. В результате почти двадцатилетнего хаоса и политической нестабильности из-за того, что Кемерскай приостановил действие Конституции 978 года в 986 году, а также из-за бандитов, значительно выросли силы оппозиции, особенно социалистов.\n\nОдин из оппозиционных политиков, Рикард Эстлер, сплотил левых в новое крыло НРП, социалистическое, но все еще поддерживающее принципы буржуазной демократии, в отличие от систем, выдвинутых в Скайнавии или предложенных революционерами в Прайвене. Демократичные социалистические идеалы Эстлера быстро получили поддержку, так как многие больше не верят, что Кемерскай на самом деле принесёт Три Принципа народу.\n\nСоциалистические советники начали процесс объединения народа под своим знаменем и желают в конечном итоге выдвинуть вотум недоверия Кемерскаю. Многие полагают, что это приведет к откровенно социалистическому Президенту-Маршалу, такому как Эстлер, и, возможно, даже к отмене ненавистного военного положения."
 griffonRepublic.202.a:0 "Интересное развитие событий."

 griffonRepublic.203.t:0 "Раскол в военном совете"
 griffonRepublic.203.d:0 "Военный совет, сформированный Национальной Республиканской Армией в 1008 году для противодействия режиму Кемерская, распался, и те, кто лоялен Роузвинг и Сантейлу, начали создавать военизированные и политические группы, чтобы противодействовать влиянию друг друга. На улицах всё чаще происходят стычки между поддерживающими Сантейла фашистами и ультранационалистами и поддерживающими Роузвинг монархистами-клаудбьюрийцами.\n\nСторонники Роузвинг выступают за монархию – будь то конституционную или автократическую. Её поддерживают главным образом северные клаудбьюрийцы, утверждающие, что монархия обеспечит стабильность, которой республика так и не смогла добиться. Кроме того, сильный монарх не будет подвержен хаосу Национальной Республиканской партии и сможет быстро разобраться с бедностью и бандитизмом на севере, который станет их основной опорой.\n\nВозможно, Сантейл опаснее. Его сторонники – первоначально запрещённые несколько лет назад из-за серии антиправительственных террористических атак, известные как Национальный Революционный Фронт – хотят создать Грифонью Республику, захватить Грифенхейм и уничтожить последние остатки монархии. Но вместо демократического режима, подобного режиму Кемерская, они стремятся построить «настоящую» национальную республику, в которой олигархия будет уничтожена, а богатство принадлежать народу – пока он служит государству и Сантейлу.\n\nУльтранационалистическая, популистская и реваншистская идеология Сантейла может оказаться опасной для консерватизма Роузвинг, и она начинает привлекать низшие классы. Но сможет ли Роузвинг использовать своё ветеранство и политические связи с северянами, чтобы удержать власть?"
 griffonRepublic.203.a:0 "Сантейл начинает переворот с народной поддержкой."
 griffonRepublic.203.b:0 "Роузвинг получает власть, используя поддержку клаудбьюрийцев."

 griffonRepublic.204.t:0 "Путч Сантейла"
 griffonRepublic.204.d:0 "Рейнхард Сантейл, лидер Национального Революционного Фронта и генерал республиканской армии, начал государственный переворот, захватив правительство и казнив предательницу Николь Роузвинг, а также очистив государственный аппарат от многочисленных «сторонников монархии», которые, по утверждению Сантейла, были ответственны за ужасные действия в ходе контрреволюции.\n\nПереворот со стороны столь активного Сантейла не был неожиданным, но оставалось неясным, удастся ли ему действительно добиться успеха и положить конец господству раздробленной военной клики. Нежелание Роузвинг захватить полный контроль оказалось ошибкой: строгая грифина-традиционалистка вскоре оказалась перед расстрельным отрядом. Через час после казни Роузвинг силы Сантейла отправились к военному совету, официально требуя передать полную власть Сантейлу и Грифоньему Национальному Революционному Фронту. Совет уступил, и Сантейл стал президентом и маршалом Республики Грифонов.\n\nПолитика Сантейла радикальна и весьма опасна, но многие считают её необходимой, чтобы положить конец разрушенной системе времён старой республики Кемерская. Его фанатично анти-клаудбьюрийские и антимонархические взгляды заставляют прежних сторонников Роузвинг опасаться за свои жизни, а преданность Сантейла национальному республиканскому делу, возможно, сильнее, чем любовь Кемерская к Трём Принципам.\n\n«Скоро начнётся великая война против Империи Грифонов, мои братья и сёстры. Война, что приведёт к новому рассвету Грифонии и Республики, — сказал Сантейл во время своего вступительного слова. — Мы добьёмся того, чего никогда не смог бы сделать декадентный маршал, и действительно вернём Три принципа в Грифенхейм под нашим сильным и славным знаменем!»"
 griffonRepublic.204.a:0 "Мы вернём истинные принципы в Грифенхейм!"

 griffonRepublic.205.t:0 "Переворот Роузвинг"
 griffonRepublic.205.d:0 "Похоже, нового рассвета Грифонии не будет. Рейнхард Сантейл был арестован за заговор с целью свержения военного правительства, а генерал Николь Роузвинг заняла пост президента Национальной Республики Грифонов вместе с постом главнокомандующего вооружёнными силами. Политика Роузвинг отличается от радикальной политики Сантейла. Она – более консервативная фигура, лояльная древним монархиям, таким как герцогство Клаудбьюри, которое, по её мнению, было и будет лучшим правительством, чем режим Кемерская. Сама Роузвинг симпатизирует конституционной монархии, сражалась в революции 978 года и всё ещё питает лояльность к демократии и либерализму. Экономическая политика Роузвинг очень схожа с политикой Кемерская: сильное социал-демократическое развитие будет сохранено, а при сильном монархе рейдерство и бандитизм в сельской местности будут уничтожены. Она также связана со старой гвардией военных и не любит ни ультранационализм, ни социализм, считая их идеалистичными и экстремистскими."
 griffonRepublic.205.a:0 "Возможно, в будущем нас ждёт реставрация монархии."

 griffonRepublic.206.t:0 "Сантейл укрепляет власть"
 griffonRepublic.206.d:0 "Всё произошло мгновенно. Рейнхард Сантейл, президент Национальной Республики Грифонов, приказал убить тысячи нелояльных солдат, военных лидеров и бывших политиков НРП. Некоторые были убиты в своих домах, а другие были заключены в тюрьму и приговорены к расстрелу. Генералы, которые ранее поддерживали революцию против Кемерская, оказались заключены в тюремные камеры тем, за которого они когда-то сражались. Сантейл выступил с речью в Клаудбьюри, где заявил, что убийства «необходимы для стабильности республики», и что они позволят ему создать «республику для народа, не управляемую злыми олигархами и безрассудными гармонистами»."
 griffonRepublic.206.a:0 "Сантейл! Сантейл! Сантейл!"

 griffonRepublic.208.t:0 "Неуправляемая армия"
 griffonRepublic.208.d:0 "Kemerskai found himself nursing yet another headache, a common occurrence in these last few decades. The March North had already been disgrace enough on its own; Meyer and Sickleclaw's betrayal had costed the air force and the submarine corps and weakend their position; but Rosewing and Suntail's betrayal – two of Kemerskai's closest comrades since 978 – had ensured their stay in the north would continue.\n\nKemerskai sentenced the two to guard the north as his best attempt to keep the peace, but that unsteady status quo has been crumbling. Rosewing stood accused of looting equipment and inciting rallying unloyal elements such as monarchists to her troops, while Suntail has become known known for bloody raids against any settlement or army he deems likely of housing 'bandits' assailing the north. What had been meant as a solution had become an even greater headache, and now their undermining of the Republic could no longer be ignored. Two major proposals had gained traction in recent weeks, each championed by a figure Kemerskai knew all too well: Schnabel Sunglider and Heinrich Kingfeather – a political idealist and a pragmatist respectively, their plans for tackling the issues are quite close to their own views.\n\nSunglider is adamant that the military could not be tamed until it was rebuilt from the ground up, and that the rebellious commanders be sacked posthaste. There was a clear logic to his stance, but Kemerskai had not let the two generals roam unchecked without reason. Rosewing and Suntail each commanded the complete loyalty of their troops; with little left to lose, they would hardly accept being branded traitors and stripped of command.\n\nKingfeather's suggestion is much less radical, but still flawed. He argued that, at heart, both Rosewing and Suntail were acting out of grievances with the Republic, and if the Marshal heard them out and showed his old comrades that he had not forgotten them, perhaps they could be reintegrated without any further bloodshed."
 griffonRepublic.208.a:0 "There shall be no mercy for traitors; give Sunglider his approval."
 griffonRepublic.208.b:0 "Perhaps there is still hope even after all of this... give Kingfeather his approval."

 griffonRepublic.209.t:0 "Уловка Роузвинг"
 griffonRepublic.209.d:0 "Герцог Оскар Плюменьяр ехал по улицам Клаудбьюри под рёв труб и рожков в сопровождении великолепной военной свиты, включавшей в себя президента Николь Роузвинг, которая восстановила монархию после многих лет преданного служения республиканцам. Празднование было завершено профессиональным оркестром, нанятым в Скайфоле за непристойную цену, а костюмы его участников выглядели изящнее наряда даже самого герцога. Когда монарх добрался до здания парламента, военные герцогства Клаудбьюри дали салют из 21 орудия.\n\nОднако в домах большинства граждан царила совершенно иная атмосфера. Народ республики проявил недоверие и скептицизм. Спустя годы после того, как революция была принесена на север, а герцога Отто Гремменсена линчевали вместе с его женой Фреей, монархия снова была восстановлена. Весело звучали трубы, и солдаты-грифоны маршировали по улицам, но аплодисменты толпы были немногочисленны, и даже те, кто аплодировал, мало заботились о новой монархии. Потребуется время, чтобы народ привык к этому новому режиму, который, казалось, бросил вызов всему, на чём была построена республика.\n\nВ своём выступлении перед местным населением герцог Оскар подчеркнул необходимость «вернуть идею монархии в сердца и умы этих испорченных грифонов» и утверждал, что «республиканская революция была величайшим бедствием, которое Грифония когда-либо созерцала, и оставила эту землю в полной анархии. Это, без сомнения, было самым серьёзным событием прошлого века». Лидер республиканцев Генрих Кингфезер, находящийся в изгнании в Королевстве Ведина, написал Оскару письмо с резкими выражениями, в котором сказал: «выметайся из страны вместе со своими вконец выродившимися родственничками, прежде чем грифоны линчуют вас всех подобно твоему бастарду-дяде»."
 griffonRepublic.209.a:0 "Да здравствует герцог!"

 griffonRepublic.210.t:0 "Судьба Республики"
 griffonRepublic.210.d:0 "Республика, безусловно, далеко продвинулась с 1007 года, когда никто не был уверен, что Республика когда-либо сможет освободить Грифенхейм снова. Однако из-за действий Кемерская наша социальная нестабильность была устранена, наша проблема бандитизма была искоренена, и наши солдаты снова начинают верить в республиканскую мечту.\n\nНо возникает вопрос, должны ли мы продолжать мечтать о возвращении Грифенхейма? Или мы должны выжидать и занять оборонительную позицию против Империи и избежать неудач революции 978 года?"
 griffonRepublic.210.a:0 "Мы должны идти в наступление."
 griffonRepublic.210.b:0 "Мы должны защищаться в случае нападения Империи Грифонов."

 griffonRepublic.211.t:0 "Кемерскай объявляет чрезвычайное положение в стране"
 griffonRepublic.211.d:0 "Президент-Маршал объявил чрезвычайное положение в стране, сославшись на хаос в стране, «имперскую агитацию» и необходимость взять на себя полный контроль, пока имперская угроза не будет побеждена. Гражданское движение будет строго контролироваться, продажа огнестрельного оружия запрещена, а деятельность парламента временно приостановлен. В радиообращении к народу Кемерскай подчеркнул, что нация вернется к гражданскому правлению после сдерживания имперской угрозы, но также заявил, что не будет атаковать Империю напрямую, заявив, что это будет «самоубийством». Учитывая, что чрезвычайное положение Кемерская продлится до окончания сдерживания имперской угрозы и учитывая, что он не планирует атаковать имперцев напрямую, создается впечатление, что чрезвычайное положение будет практически неограниченным."
 griffonRepublic.211.a:0 "Стабильность любой ценой!"

 griffonRepublic.212.t:0 "Необходимые меры"
 griffonRepublic.212.d:0 "Президент-маршал выступил с речью. — Мои соотечественники, — начал Кемерскай, — я убеждён, что республиканская мечта в её нынешнем виде недостижима. Нам необходимы власть, сила и ясная, разумная стратегия. Поэтому мы должны ввести постоянное военное положение. Полномочия всех парламентов и советов будут временно приостановлены, а республика начнёт пристально следить за предателями внутри страны и за имперцами по всему континенту.\n\nПосле объявления Кемерскаем общенационального военного положения во имя защиты республики многие уверены, что это станет поводом для чисток, крови и железа, для укрепления её силы и славы. Неужели это начало авторитарного режима? Или же это первый шаг к чему-то великому – необходимая мера для защиты от предателей и борьбы с ними в нашей собственной стране?"
 griffonRepublic.212.a:0 "Да здравствует республика?"

 griffonRepublic.213.t:0 "План восстановления Эстлера"
 griffonRepublic.213.d:0 "Кабинет Эстлера объявил новый план по отстройке Герцланда после краха Империи и взятия Грифенхейма. Герцланд был уничтожен бомбардировками, осадами и жестокими актами мести, сравнявшими целые города с землёй. Учитывая, что такие места как Энгривер и Катерин уже фактически уничтожены действиями их безжалостных монархов, нам необходимо заново отстроить эти земли и учредить общинные кооперативы и коллективы, чтобы излечить нацию и ввести управление рабочими средств производства."
 griffonRepublic.213.a:0 "Герцланд будет демократизирован, социализирован и отстроен!"

 griffonRepublic.214.t:0 "Против всех олигархов"
 griffonRepublic.214.d:0 "Эстлер всегда был тем ещё бунтарём - популист и революционер до мозга костей. Так как теперь он у власти, он установил себе цель уничтожить все иерархии старой Грифонии. Знать, торговые и промышленные бароны, унижавшие народ своим безжалостным ботинком, и злобствующие монархические структуры старого порядка, по словам Эстлера, должны быть полностью уничтожены.\n\nДворянские титулы, даже самые мелкие, должны быть аннулированы, от баронов до принцев и лордов, и у отныне бывших дворян всё нечестно ими заработанное уже изъято Республикой для того, чтобы раздать простогрифонам."
 griffonRepublic.214.a:0 "Справедливость народу!"

 griffonRepublic.215.t:0 "Новая коалиция"
 griffonRepublic.215.d:0 "Рикард Эстлер объявил о создании коалиции с демократами и социалистами, и даже с фетизским политиком Когхелем, которому Эстлер выразил особое признание после прочтения его трудов в Клаудбьюри. Вместе с Когхелем, Эстлер пожал когти представителям республиканской и анархистской оппозиции в Энгривере, заявляя, что "впервые в истории объединил разрозненных левых Энгривера", хотя многие сомневаются в возможности союза консерваторов и анархистов. Когхель и Эстлер также заключили союз с Эрихом Мюхшнабелем и университетом Сайрусвала, радикальной, но довольно утопичной группе социалистов. Непонятно, выстоит ли такая разношерстная коалиция умеренных, демократов, анархистов и теоретиков достаточно долго, чтобы набрать политическое влияние, но это уже шаг в правильном направлении для объединения всех левых."
 griffonRepublic.215.a:0 "Единство всех левых? В наше то время!"

 griffonRepublic.216.t:0 "Мир, земля и хлеб"
 griffonRepublic.216.d:0 "Экономическая теория Эстлера основывается на мире, земле и хлебе. Каждый рабочий будет иметь право на мир, как в его общине, так и во всей его стране. Каждый рабочий будет иметь право на землю, чтобы у них не было начальника, который их будет угнетать в системе зарплатного рабства. Каждый рабочий будет иметь право на хлеб, чтобы они могли кормить свою семью и работать без страха недоедания и голодной смерти. В дополнение к трём принципам: свободы, демократии и процветания, нас также будут вести в светлое будущее эти три принципа социализма."
 griffonRepublic.216.a:0 "Новое, социалистическое общество."

 griffonRepublic.217.t:0 "Гармония и современность"
 griffonRepublic.217.d:0 "В радиосообщении, которое услышали миллионы по всей стране, президент Шнабель Санглайдер объявил новый план для своей нации - гармония с республиканской спецификой. В своём обращении, Санглайдер осудил эквестрийскую монархию за её изначально автократичный характер, где двое правящих пони не были ограничены конституцией и даже считались божествами среди населения. Единственное, что удерживало бессмертных аликорнов от злоупотребления властью, это их доброжелательная натура. Но это может измениться слишком легко, и нет никаких гарантий, что следующий наследник трона гарантированно будет таким же добрым, как они. Затем он сравнил это с системой божественного права, которую использовала Империя Грифонов для оправдания своей легитимности. В глазах Санглайдера эти две монархии были одним и тем же - неконституционными империями, которые использовали религиозный подтекст, чтобы убедить народ поддерживать их.\n\nНовый план Санглайдера, гармония с республиканской спецификой, решит эту проблему путем внедрения «истинной демократии». Конституция гарантирует право на свободные национальные выборы и осуществит разделение властей, что предотвратит злоупотребление властью со стороны любого отдельного органа власти. Гармонические ценности сами по себе будут неотъемлемой частью конституции. Они гарантируют все основные права для всех живых существ в республике и запретят такие негармоничные вещи, как разжигание ненависти и насаждение инакомыслия среди населения. Вместо децентрализованной системы местных демократий, за которыми надзирает правитель, способный вмешиваться по своему усмотрению, новая и современная гармония будет означать сильную, единую республику, в основе которой лежит верховенство закона."
 griffonRepublic.217.a:0 "Эквестрия - неудавшееся государство. Мы добьёмся большего."

 griffonRepublic.218.t:0 "Процветание грифонам"
 griffonRepublic.218.d:0 "Третий, но, возможно, самый важный республиканский принцип - процветание. Согласно принципу процветания, ни один грифон не должен быть отдан на съедение собакам или угнетён феодалами на их работе - каждый грифон имеет право на дом, на оплату труда и на жизнь, свободную от прислуживания кому-либо. Каждый грифон должен иметь возможность создать собственное предприятие и достичь своей мечты, но в последние годы этим принципом сильно пренебрегали, а бедность только росла. Чтобы это исправить, мы должны продолжить наши социальные программы и урезать налоги для бывших грифонов-крестьян, обеспечив им минимальную зарплату и безбедную жизнь, в отличии от Империи. А чтобы заплатить за такие амбициозные социальные программы, мы поднимем налоги на бывших дворян этих земель, а также проведём земельную реформу и даже отберём малообработанные земли, подконтрольные грифоньим олигархам. И только тогда мы сможем освободить наш народ, и воистину обеспечить процветание для вообще всех грифонов."
 griffonRepublic.218.a:0 "Бедности больше не будет."

 griffonRepublic.219.t:0 "Разногласия в НРП"
 griffonRepublic.219.d:0 "Национальная Республиканская Партия когда-то была единой фракцией, в те времена, когда на повестке дня было лишь выживание Республики. Но как только Республика утвердила свой контроль в Грифенхейме, раскол в НРП только усилился. Социалисты считают, что принцип процветания не совпадает с идеями консерваторов в партии, а консерваторы считают, что социалисты ставят ни во что принцип свободы из-за их убеждений против свободного рынка. Более умеренные гармонисты и демократы находятся посередине, и они изо всех сил пытаются исправить ситуацию и убедить обе стороны, что принципы Республики соблюдаются, но безуспешно. Иногда члены парламента даже вступают в драки со своими однопартийцами из-за конфликтующих экономических взглядов! С ростом напряженности, день за днем, есть риск, что сформируется партия несогласных из членов НРП, и подорвет нашу власть. Некоторые грифоны считают, что нужно отдать предпочтение какому-либо одному крылу и отпустить другое с целью стабилизировать партию, но некоторые считают, что партия должна быть единой, любой ценой."
 griffonRepublic.219.a:0 "Сотрудничать с социалистами."
 griffonRepublic.219.b:0 "Сотрудничать с консерваторами."
 griffonRepublic.219.c:0 "Пытаться удержать обе стороны в партии, любой ценой!"

 griffonRepublic.220.t:0 "Пан-Грифонья мечта"
 griffonRepublic.220.d:0 "Санглайдеру не впервой видеть гибель гармонических режимов – он стал свидетелем смерти новорождённой республики в Грифенхейме и лично участвовал в Великом походе республиканцев в Герцогство Клаудбьюри. Он видел гибель своих товарищей, видел обманчивую «мирную гармонию». Эта «мирная гармония» лишь дала ему возможность наблюдать, как монархисты безжалостным ботинком давят его друзей, его соратников. Нет. Он больше не станет спокойно смотреть на диктатуры, всё ещё правящие Грифонией.\n\nТеперь у него есть ресурсы, чтобы обрушиться на монархии по всему континенту – и он сделает это. Храбрый республиканский народ пойдёт в бой, вдохновляясь тремя принципами. Гармония будет править Грифонией, а мечта Кемерская продолжит жить в облике единого пан-грифоньего государства. Это будет не очередная империя, а свободная республика, где каждый грифон рождён равным."
 griffonRepublic.220.a:0 "Мы освободим Грифонию!"

 griffonRepublic.221.t:0 "Республика навеки"
 griffonRepublic.221.d:0 "У нашей Республики Грифонов много угроз - даже изнутри. Снаружи, Вингбардия, Аквелия, Прайвен и Грифонстоун затаились на юге, в готовности в любой момент напасть на Республику. Социалисты и монархисты сговариваются на юге, желая забрать богатства Сердца Империи себе. В нашей же стране, социалисты борются против демократии, стоящей уже десятилетиями, пренебрегая принципом свободы, желая национализировать всё подряд и уничтожить свободный рынок и капиталистическую систему в принципе. Их политики, без сомнения, разрушат нашу экономику и ослабят нашу демократию, позволив их улыбчивым и харизматичным лидерам запятнать нашу Республику и отменить республиканскую власть, отговариваясь "необходимостью восстановить порядок". Мы, НРП, понимаем, чем должна стать Республика - подвластной конституции свободной землёй, вольной от ужасов социализма, монархии или диктатуры."
 griffonRepublic.221.a:0 "За конституцию и свободу!"

 griffonRepublic.222.t:0 "Принципы капитализма"
 griffonRepublic.222.d:0 "Экономика Республики Грифонов долго основывалась на социал-демократических принципах. Одной из основных целей Кемерская было создать грифонье государство всеобщего благосостояния, которое бы заботилось о всех грифонах и обеспечило бы каждого жильём, едой, и семьёй. Вот только экономисты-консерваторы правительства Генриха Кингфезера подсчитали, что, если мы будем тратить слишком много денег на социальное обеспечение, случится экономический коллапс, а процентные ставки по всей стране резко вырастут! Так быть не может, мы должны отменить некоторые социальные реформы, вместо этого полагаясь на меритократические особенности свободного рынка, которые дадут возможность каждому грифону заработать столько, сколько он захочет. Больше не будет тяжелых ограничений у народа Республики, как и не будет социальных программ, которые ограничивают грифонов, заставляя их наживаться на государстве. Нет! У нас будет свободный рынок, капиталистическая экономика, без проявлений социализма!"
 griffonRepublic.222.a:0 "Где каждый грифон может добиться своей мечты."

 griffonRepublic.223.t:0 "Отторжение левого крыла НРП"
 griffonRepublic.223.d:0 "Сегодня президент Генрих Кингфезер, защитник Республики Грифонов и член правого крыла Национальной Республиканской партии, объявил об отторжении социалистической фракции из рядов НРП. Эта фракция, оказавшись независимой от самой сильной политической силы во всей Грифонии, сразу распалась на многие враждующие объединения. В итоге, через несколько дней Рикард Эстлер собрал Социалистическую Партию Грифонии, объединив синдикалистов, демократических социалистов и даже разочарованных во всех социал-демократов в большой коалиционной социалистической партии. После ухода социалистов, НРП стала правой партией, и нам теперь будет намного проще производить наши капиталистические реформы. С законной оппозицией, мы также можем продолжить демократизацию Республики. Создание социалистической оппозиции будет отправной точкой для создания многопартийной системы."
 griffonRepublic.223.a:0 "Идеально."

 griffonRepublic.224.t:0 "Необходимые жертвы"
 griffonRepublic.224.d:0 "Сотни дворян, солдат и граждан по всей стране, которые когда-то служили в Империи, получили помилования от Президента-Маршала Кемерская в ходе его демократических реформ. Госслужащие из Империи быстро получили новые должности по всей республике и нации, которой они когда-то служили, вместо того чтобы гнить в темницах всю оставшуюся жизнь, как хотели бы радикалы. От Энгривера до Фетизии оставшиеся дворяне были освобождены, их немного шлёпнули по когтю, но их поприветствовали в новой Республике Грифонов во имя единства, заживления ран и прогресса.\n\nВ ответ на критику со стороны радикальных левых элементов в НРП Кингфезер заявил, что «их слепая жажда мести затмила мысли о лучшей Грифонии». Согласно Кингфезеру и многочисленным политикам из правого крыла НРП, план «Единство» вернёт прогресс в Грифонию благодаря систематическим усилиям по примирению с имперскими политиками, и ускорит промышленное развитие, которому поспособствуют контакты с дворянами и магнатами по всей бывшей Империи.\n\nЕдинство было восстановлено в хрупкой республике - и рациональная политика одержала победу над жаждой мести Санглайдера и Эстлера."
 griffonRepublic.224.a:0 "Отличная работа, президент Кингфезер."

 griffonRepublic.225.t:0 "Первые всегрифоньи выборы"
 griffonRepublic.225.d:0 "Первые всегрифоньи выборы стали самыми конкурентными в истории республики – партиям, помимо Национальной Республиканской, впервые разрешили участвовать. Многие кандидаты создали собственные политические движения и решили испытать удачу в борьбе за пост нового президента республики.\n\nСамые левые группы получают значительную поддержку со стороны профсоюзов, рабочих и безработных. Следуя демократическо-социалистическим идеям, они выступают за глубокие социальные реформы, расширение кооперативов и промышленную демократию. Рикард Эстлер придерживается тех же ценностей как член НРП, но есть и Гербен Когхель – жизнь в Фетизии привила ему почти фанатичную преданность демократическим принципам, хотя до сих пор припоминают его связи с анархистами и революционными социалистами времён имперского регентского кризиса.\n\nСоциал-демократы под лидерством Женевьевы Гильдедвинг, скайфольской социал-демократки и популистки, также получили широкую поддержку рабочих. Её опыт жизни при нерегулируемом капитализме скайфольской олигархии сделал её кандидаткой, хорошо понимающей беды простых грифонов. Она наверняка утвердит прогрессивное налогообложение и превратит республику в государство социального обеспечения, но, несмотря на её власть в Скайфоле, шансы на победу на всегрифоньих выборах невелики.\n\nУмеренное крыло НРП возглавляют Теодор Верани и Шнабель Санглайдер – оба близки по убеждениям к первому президенту-маршалу. Верани, аквелийский революционер, участвовавший в нескольких восстаниях против бесчестной и жестокой династии Дискретов, остаётся приверженцем республиканизма и гармонии. Шнабель – известный генерал и республиканский идеалист – не менее узнаваемая фигура.\n\nЕсть и представители централистских партий и правого крыла НРП. Джованни де Гаспвинги, вингбардийский реформатор, сторонник экономического невмешательства, сильной социальной поддержки бедных и дружбы с Эквестрией, стал многообещающим либерал-демократом. Генрих Кингфезер, представитель правого крыла НРП, уверенно поддержал его новое движение.\n\nПоследняя крупная группа – милитаристы – поддерживает сына самого Кемерская, Александра Кемерская-младшего, убеждённого республиканца. Александр выступает за централизацию республики, усиление президентской власти и повышение эффективности правительства. Противники называют его потенциальным диктатором, хотя он лишь насмехается над подобными обвинениями."
 griffonRepublic.225.a:0 "И побеждает..."
 FAT_we_will_reform_military:0 "§GМы реформируем армию§!, хотя §Rэто может разозлить главнокомандующих§!."
 FAT_we_will_placate_generals:0 "§GМы успокоим армию§!, хотя §Rнам придётся сделать им большие уступки§!."

 griffonRepublic.226.t:0 "Чистка республиканцев"
 griffonRepublic.226.d:0 "Несмотря на просьбы Оскара I, правительство герцогства Клаудбьюри решило провести крупную чистку республиканских элементов, которыми поражена нация, распространяющих свою лживую идеологию и продолжающих поощрять бандитизм, как при своём старом правительстве.\n\nВ ходе крупномасштабной чистки, невиданной со времён того, как Кемерскай в 986 году устранил скайнавских предателей, правительство Оскара I поставило целью искоренить республиканское сопротивление, предводителями которого, согласно слухам, являются Вальтер Эммерих и Шнабель Санглайдер – два матёрых республиканских генерала, отказавшихся подчиниться Роузвинг даже после того, как она захватила столицу и свергла жалкий режим Кемерская.\n\nНесмотря на наши усилия, Санглайдер и Эммерих продолжают свои операции как ни в чём не бывало, в то время как Оскар I взял на себя задачу искоренить предателей-демократов, даже если он лично с ними знаком..."
 griffonRepublic.226.a:0 "Необходимая мера для герцогства."

 griffonRepublic.227.t:0 "Рост хаоса В селах"
 griffonRepublic.227.d:0 "Генералы Рейнхард Сантейл и Николь Роузвинг объявили об открытом сопротивлении нашему правительству, объединив свои силы в единую бандитскую армию против президента-маршала. За последние несколько лет власть полководцев на севере возросла, но теперь ситуация накалилась до предела, и многие грифоны севера вступили в ряды бродячих бандитов-ополченцев ради хоть какой-то работы и пропитания. Правительство Кемерская не может позволить себе ввести войска на север, ведь даже бригады, верные Кемерскаю, не хотят сражаться в северных горах против армий Сантейла и Роузвинг. Граждане Республики всё больше разочаровываются в нашем правительстве, и мы никак не можем остановить этот процесс, ведь мы не можем ввести войска на север. Сантейл и Роузвинг имеют преимущество... Как они им распорядятся – зависит уже от них."
 griffonRepublic.227.a:0 "Mein gott!"

 griffonRepublic.228.t:0 "Прощены республиканские диссиденты"
 griffonRepublic.228.d:0 "Оскар Плюменьяр удивил всех, простив многих республиканцев, бежавших из страны после военного переворота и реставрации герцогства Клаудбьюри. Как только Оскар Плюменьяр заново начал правление, республиканцы начали затевать планы по возврату контроля над правительством, в связке с крестьянскими движениями и коммунистическими организациями. Несмотря на это все, после такого шага, наши генералы уверены в том, что республиканцы больше не будут представлять угрозу герцогству Клаудбьюри.\n\nВерным Кемерскаю генералам, таким как Шнабель Санглайдер, был предложен безопасный возврат назад в Клаудбьюри, хоть и не ясно, будут ли они дальше служить в армии. Более того, парламентариям, таким как Генрих Кингфезер и Тобиас Сивенхоф, консерваторам и центристам НРП, так же позволили безопасно вернуться назад в герцогство, и им даже будет позволено поучаствовать в парламентских выборах, которые будут проведены "в будущем", судя по словам герцога. Правление герцога пока что авторитарно, но после амнистии республиканцев, Клаудбьюри, возможно, сдвинется в сторону демократии."
 griffonRepublic.228.a:0 "Шаг к конституционной монархии?"

 griffonRepublic.229.t:0 "Акт о правах Герцога"
 griffonRepublic.229.d:0 "По просьбе генералов Макса Уайтфезера и Хирона Штормфезера, Оскар Плюменьяр Первый передал большинство своей власти маршалу, к которому перешла почти вся исполнительная власть. К примеру, теперь у маршала есть право назначать министров без подтверждения герцога, делать ультиматумы и предложения дворянам герцогства, а так же проводить по желанию парламентские заседания и досрочные выборы.\n\nОскар был вынужден принять требования, ведь, увы, в ином случае генералы убили бы его и заменили на более сговорчивого члена его династии. После того, как Оскар подписал указ, большинство власти опять перешло в когти генералов, построивших герцогство Клаудбьюри."
 griffonRepublic.229.a:0 "Разве у нас была не абсолютная монархия?"

 griffonRepublic.230.t:0 "Временный правитель Клаудбьюри?"
 griffonRepublic.230.d:0 "Наш верный товарищ по революционной борьбе, Социалистическая Республика Клаудбьюри, направила посланника с просьбой поддержать одного из двух кандидатов на должность временного правителя.\n\nПервый кандидат – коммуналист Рикард Эстлер, выступающий за гражданскую экономику и примирение с республиканским сопротивлением в Клаудбьюри, которое всё ещё придерживается ошибочной идеологии Кемерская. Его политика включает развитие гражданской промышленности и инфраструктуры, а также переговоры с лидерами республиканского сопротивления для решения таких проблем, как слабость армии и интеграция клаудбьюрийцев в качестве полноправных граждан.\n\nВторой кандидат – интернационалист Мо Спэрроусбэйн, генерал, командовавший скайнавскими революционерами в боях против республики и поддерживавший социалистическое сопротивление в его борьбе против режима Кемерская. Став председателем, он наверняка начнёт курс на милитаризацию и подавление республиканского сопротивления. Считая республиканцев реакционерами за отмену конституции и отход от социалистических союзников, Спэрроусбэйн не боится запачкать когти кровью республиканцев.\n\nПодходы Спэрроусбэйна и Эстлера различаются, но цель у них одна – скайнавские идеалы и социализм. Оба кандидата являются безопасным выбором для сохранения нашего влияния в регионе."
 griffonRepublic.230.a:0 "Выбрать Эстлера, коммуналиста."
 griffonRepublic.230.b:0 "Выбрать Спэрроусбэйна, интернационалиста."
 griffonRepublic.230.c:0 "Выбирать временного лидера для другой страны? Звучит как-то по-империалистски..."

 griffonRepublic.231.t:0 "Скайнавия выбрала Эстлера"
 griffonRepublic.231.d:0 "Наш посланник вернулся из земель нашего товарища и спасителя, Скайнавии. Он принес официальный документ от председателя Скайнавского Совета, в котором написано, что временным председателем Социалистической Республики Клаудбьюри должен стать Рикард Эстлер, вместо интернационалиста Мо Спэрроусбэйна, ведь с их точки зрения он властолюбивый генерал, без какой-либо заинтересованности в стабильности государства и благосостоянии народа и страны.\n\nРикард Эстлер - более демократичный социалист, наверное ещё либеральнее скайнавцев, который верит, что некоторые капиталисты и реакционеры могут быть перевоспитаны, благодаря чему он идеально подходит для решения проблемы республиканского сопротивления."
 griffonRepublic.231.a:0 "А что, звучит неплохо!"
 griffonRepublic.231.b:0 "Мы не позволим какому-то авторитарному правительству решать за пролетариат!"

 griffonRepublic.232.t:0 "Скайнавия выбрала Спэрроусбэйна"
 griffonRepublic.232.d:0 "Наш посланник вернулся из земель нашего товарища и спасителя, Скайнавии. Он принес официальный документ от председателя Скайнавского Совета, в котором написано, что временным председателем Социалистической Республики Клаудбьюри должен стать Мо Спэрроусбэйн, вместо коммуналиста Рикарда Эстлера, ведь, с их точки зрения, он капиталист, сильно сочувствующий республиканскому сопротивлению и поддерживающий социал-демократическую социальную модель.\n\nМо Спэрроусбэйн - кандидат, ведомый социалистическими идеями и истинно им верный. Он не остановится, коллективизируя заводы и фермы, а также устанавливая промышленное самоуправление для всех рабочих, и уж точно он никогда не бросит преследовать злое республиканское сопротивление."
 griffonRepublic.232.a:0 "А что, звучит неплохо!"

 griffonRepublic.233.t:0 "Скайнавия разрешает нам выбирать самим"
 griffonRepublic.233.d:0 "Наш посланник вернулся из земель нашего товарища и спасителя, Скайнавии, но он не принёс документ, в котором указано, кто выбран наследником. Вместо него, он заявил, что Скайнавский Совет разрешил Клаудбьюрийским Советам выбрать своего собственного правителя, и что Совет посчитал, что вмешательство в политику другой страны - пережиток империализма. Правда, они вводили войска, так что...\n\nВыборы будут проведены в ближайшие 35 дней, а рабочие советы всего Клаудбьюри будут приглашены на дебаты, куда они смогут отправить своих делегатов. Наши первые социалистические выборы скоро начнутся!"
 griffonRepublic.233.a:0 "Погодите, что, правда?!"

 griffonRepublic.235.t:0 "Правосудие Сантейла"
 griffonRepublic.235.d:0 "Мальчик-император, Гровер VI. Убийца революции, Архонт Эрос VII. Герцогиня Клубники, Габриэла Иглкло. Наследник герцогства, Эдмар Иглкло. Генерал "дворянской крови" Элиас Бронзтейл. Имперский пёс Игнатий Бронзтейл. Всех пригнали к великой гильотине и всех настигло правосудие.\n\nУдивительно, но народ ликовал и выкрикивал слова поддержки и радости в ходе акта правосудия над худшими из худших - предателями, уничтожившими Республику Грифонов и установившими декадентную, олигархическую монархию. Флаг Республики Грифонов, оранжево-жёлто-оранжевый триколор развевался на каждом углу Грифенхейма, и вместе с ним развевалась эмблема Грифоньего Национального Революционного Фронта, организации Рейнхарда Сантейла.\n\nЭто был величайший момент в жизни Сантейла. Наконец, он отомстил за преступления против его великой Республики - он сбросил слабый режим Александра Кемерская, преобразил Республику в националистическое государство, верное пан-грифоньим и антимонархическим идеям, и прямо сейчас он сделал то, что Кемерскай не смог. Контрреволюция была разбита, и Архонт, мальчик-Император, вероломные дворяне Клубники, псы Бронзхилла ответили за свои преступления перед богами и грифонами. Победа настала."
 griffonRepublic.235.a:0 "Во имя Борея..."

 griffonRepublic.236.t:0 "Судьба Бронзхилла"
 griffonRepublic.236.d:0 "Алмазные псы. Предатели. Имперские подхалимы. Во Второй и в Первой революциях они убили тысячи и тысячи республиканских солдат с ложными идеями о защите их Императора, и настало время им познать цену своих преступлений. Собаки не проявили верности принципам свободы, демократии и процветания, и мало кого из их рядов интересовала идея свободной Республики Грифонов. Сбежавшие рабы основали свою собственную страну, но стали рабами в другом понимании - рабами воли деспотичных и декадентных Императоров Грифонов.\n\nСантейл издал указ, согласно которому тысячи дворян-псов будут изгнаны в Алмазную Гору и земли Речной Коалиции, как и многие генералы, выступавшие против республиканцев. "Декрет о Правах Алмазных Псов" был единогласно принят республиканским парламентом, вынуждая алмазных псов Бронзхилла жить в сегрегации, под властью грифоньего меньшинства. Несмотря на официальные осуждения речными пони и Алмазной Горой, Сантейл продолжал сегрегацию и изгнание алмазных псов, утверждая, что "Федерация не понимает масштаб преступлений, которые эти безбожные собаки совершили против нас.""
 griffonRepublic.236.a:0 "Прекрасно."

 griffonRepublic.237.t:0 "Грифонья Национальная Республика изгоняет дворян Бронзхилла"
 griffonRepublic.237.d:0 "Отвратительные новости из Грифоньей Национальной Республики, которая ныне у власти в Имперском Городе и герцогстве алмазных псов Бронзхилл. Национальная Республика, яростно про-грифонья и ненавидящая алмазных псов за их действия в предотвращении республиканской победы в Грифоньей Революции, в которой они заняли сторону Империи, изгнала тысячи видных алмазных псов и дворян, которые сейчас прибыли в Алмазную Гору, откуда они были изгнаны столетиями ранее.\n\nДовольно иронично, что они после такого долгого отсутствия вернулись, но нас больше волнует то, что грифоны смогли совершить такое бесчестье с нашими братьями и сёстрами. Мы должны отомстить им борьбой против этой новой "Национальной Республики", которая не сильно далеко ушла от Хеллквилла или Лонгсворда. Они - маньяки, которые могут пойти даже на геноцид, и их надо остановить."
 griffonRepublic.237.a:0 "Эти преступления не будут прощены."

 griffonRepublic.238.t:0 "Новая мечта"
 griffonRepublic.238.d:0 "Николь Роузвинг наконец смогла воплотить свою мечту. Конституционная монархия, в которую не верили революционеры, пришла в Клаудбьюри, в Республику, а нация процветала при достойном премьерстве Роузвинг и великодушном правлении Оскара.\n\nКемерскай твердил Роузвинг, что конституционная монархия всегда в итоге погрязнет в коррумпированной иерархии, подобной Империи Грифонов, но он ошибался — он всегда ошибался. Парламентская система – с Партией за Права Клаудбьюрийцев Сивенхофа, Конституционалистской Партией Роузвинг и Традиционалистской Партией Саксхагена – оказалась в куда лучшем состоянии, чем республиканская однопартийная диктатура, где вся власть была в когтях НРП. Не было ни социализма, ни грязного национализма Сантейла и Штормфезера – только демократия и свобода, и народ воистину полюбил монархию, вернувшую столь нужные ему принципы. Хоть он сначала и освистывал Оскара Плюменьяра, теперь он приветствует каждый его шаг и ликует, когда Николь Роузвинг идёт рядом с ним.\n\nТри принципа воистину пришли в республику, но в этот раз уже под знаменем народного монарха и его верного премьер-министра, а не харизматичного, но безжалостного диктатора, разрушившего республику и её основы своим железным кулаком – как и извращённую республиканскую идеологию."
 griffonRepublic.238.a:0 "Свобода, демократия, процветание и монархия!"

 griffonRepublic.239.t:0 "Возобновление Парламента"
 griffonRepublic.239.d:0 "Впервые с 986 года, когда Президент-Маршал Александр Кемерскай приостановил действие Конституции, парламентские выборы прошли в Клаудбьюри, и политики с активистами по всей Республике участвовали в выборах за местные должности, будь они хоть левые, хоть правые, хоть центристы.\n\nДаже партии кроме НРП, такие как Либерал-Демократическая Партия, про-Эквестрийская гармоническая партия, и Партия За Права Клаудбьюрийцев, возглавляемая этническими клаудбьюрийцами севера, набрали некоторое количество мест, но конечно же, НРП выиграла парламентское большинство.\n\nЭти места, тем не менее, были в значительной мере разделены между разными фракциями в составе НРП, и очевидно, что для создания стабильной политической ситуации, придётся заключать коалиции и союзы даже в пределах одной партии. Левое, центристское и правое крылья НРП все участвуют в коалиционных дебатах, и, кажется, вскоре у власти в Республике будет коалиция."
 griffonRepublic.239.a:0 "Либералы и Социалисты формируют коалицию."
 griffonRepublic.239.b:0 "Либералы составляют большинство в правительстве."
 griffonRepublic.239.c:0 "Либералы и Консерваторы формируют коалицию."
 griffonRepublic.239.f:0 "Консерваторы составляют большинство в правительстве."

 griffonRepublic.240.t:0 "Конец правления Кемерская"
 griffonRepublic.240.d:0 ""Alexander Kemerskai. The parliament has decreed that you are hereby released from your title of President of the Republic, and all powers that title holds. The title of interim president shall be bestowed to Rikard Astler. You will be given a pension while you live, and will be allowed to retire to your home in Winghagen. Thank you for your service, Marshal."\n\nWith the hit of gavel, Kemerskai's reign had finally come to an end, and with the NRP-Left in power, he had been relegated to the title of "Father of the Republic", giving him an honorary parliament seat and a special advisory rule to the new president. Instead of the open resistance to the government that many of his comrades feared, Kemerskai followed his party's decree, and retired to his coastal home in Winghagen with his son.\n\nWith Astler's rule, the Republic is now a fully socialist country, though it is likely the NRP-Left will collaborate with the Harmonist NRP. Claims that Astler was a Skynavian informant were quickly shut down, and the government declared they were still committed to the Republican dream and had no interests in bending to Skynavian policy.\n\nKemerskai himself has commented on the government change from his estate, telling the Cloudbury Courant that it was a "disgusting move that spits in the face of everything our great Republic stands for, even if it is so-called democratic socialism" but that he had "no choice" but to comply and resign."
 griffonRepublic.240.a:0 "Прощай, старый грифон."

 griffonRepublic.241.t:0 "Перерождение Гровера VI" # Так и было в оригинале
 griffonRepublic.241.d:0 "Кемерскай посмотрел на молодого грифона перед ним, чувствуя тяжесть лет, словно каменный аркан. Ребёнок, которому и пятнадцати лет нет, уверенно стоит в своей оранжевой имперской робе и с короной на голове. Кемерскай боялся, он видел слишком многое, чтобы скучать по этому месту, но он всё ещё уверенно стоял перед троном, встречаясь взглядами с грифоном, которого полнили эмоции: ужас, ярость, гордость, уверенность, отрицание.\n\n"Ну, революционер?" - сказал мальчик, - "Ты хочешь увидеть, как умрёт император?" - его голос чуть не сломался на последнем слоге. Даже стоя так уверенно, он все равно говорил детским голосом!\n\n"Прости меня Эйр, нет," - он сказал, вздохнув. Вместо этого, он отошёл чуть дальше к стулу, схватил тот стул, притянул к себе и подставил к трону, сев на него и начав смотреть на мальчика. Прошло минут пять-десять, пока юный Гровер наконец медленно сел. "Прости," - Кемерскай сказал юному монарху, сложив вместе когти. "Тебе было всего 4, когда твой отец скончался, и твоё детство на этом закончилось, не так ли? Одиннадцать лет - достаточное время, чтобы из тебя сделать кого-то, кем ты не являешься."\n\n"Знаю я кто я, предатель!" - выкрикнул Гровер VI - "Я легитимный император Грифонии и никем другим я больше не буду!"\n\n"Именно," - грустно согласился Кемерскай, перебив Гровера, - "Доктор Гровер, или садовник Гровер... может ещё пекарь Гровер. Такое никогда не случится. У тебя не было выбора. Не было своей жизни... ты не жил." Прервавшись, Кемерскай вздохнул. "Если хочешь, ненавидь меня, как я могу быть для тебя чем-то кроме ужасного монстра. Но в какой-то день, когда ты будешь постарше, ты всё поймёшь... или не поймёшь, и всё ещё будешь меня ненавидеть. Но это будет хотя бы уже твой выбор.""
 griffonRepublic.241.a:0 "Он освобождён из кандалов."

 griffonRepublic.242.t:0 "Судьба птенца-императора"
 griffonRepublic.242.d:0 "В течение нескольких недель после взятия Грифенхейма ситуация в Сердце Империи постепенно стабилизировалась: местные республиканские движения получили долгожданную поддержку, а [Root.GetLeader] провёл встречи с демократическими и коммунистическими лидерами региона. И всё же, несмотря на усилия по реформированию новой республики и исправлению ошибок 978 года, в умах грифонов оставался один неотступный вопрос.\n\nПтенец-император.\n\nГровер VI был похищен республиканскими агентами во время штурма Грифенхейма, чтобы избежать повторения кровавой расправы над регентским советом, случившейся в 978 году. С тех пор он содержался в тюремной камере под своим бывшим дворцом. Ему обеспечивали пищу, воду и терпимые условия, но даже сам Гровер всё чаще задавался вопросом: что теперь значит быть «императором»?\n\nЭтот вопрос неоднократно поднимался в республиканском парламенте. Шнабель Санглайдер, несмотря на верность демократическим принципам, требовал, чтобы юный император предстал перед судом за «непростительные преступления его отца и преступления, которые он и его регент замышляли по всей Грифонии». Однако президент прервал его, заявив, что республика не станет проливать кровь ребёнка ради мести.\n\nГенрих Кингфезер, вечный прагматик, предложил освободить Гровера VI как обычного гражданина республики, чтобы показать, что «мы выше грязных методов имперцев». По его плану, императора следовало лишить всех титулов, чтобы он и его род больше не представляли угрозы.\n\nСуществовал и третий вариант: Эрих Кригер, промышленник и консерватор, предложил отправить Гровера VI в Эквестрию — туда, где он вряд ли сможет стать политическим инструментом и где его научат дружбе и гармонии.\n\nПосле жарких дебатов между сторонниками изгнания по плану Кригера и сторонниками предоставления юному Гроверу гражданства парламент вынес свой вердикт..."
 griffonRepublic.242.a:0 "Освободить его как гражданина республики."
 griffonRepublic.242.b:0 "Изгнать в эквестрийскую диархию."
 griffonRepublic.242.c:0 "Раз уж Эквестрии больше нет, нам придётся оставить его..."

 griffonRepublic.243.t:0 "Изгнание Гровера VI"
 griffonRepublic.243.d:0 "Проблема с имперским кронпринцем тяжело давила на новорождённую Республику. Слишком сильно ненавидит народ имперскую семью, чтобы просто дать ему гражданство, но что тогда нашему новому правительство делать с этим юным грифоном? Судить его за действия его регента и его отца? Такое решение было бы несправедливым, так как оно абсурдно, и, довольно иронично, решение проблемы лежит в монархии, или, если точнее, в диархии.\n\nНация Эквестрии нам поможет, предоставив убежище юному грифону. Они дадут ему новый дом, образование и - надеемся - новую цель в его жизни. Это подходящее место для проживания принца, и Эквестрия - несмотря на все свои политические неудачи - надёжный дипломатический партнёр, которому мы можем доверять и который, скорее всего, не использует его потом против нас.\n\nС приездом юного Гровера к докам, где его ждал корабль, старая присказка, "компромисс оставляет всех одинаково недовольными," приходит на ум. Для радикалов это предательство республиканского дела, для оставшихся монархистов - очередное преступление. И всё же, никого это сильно не разозлит, и у Республики ещё будет время показать себя. Даже если Гровер и вернётся через двадцать с чем-то лет, он вернётся в другую Грифонию."
 griffonRepublic.243.a:0 "Прощай, юный грифон!"

 griffonRepublic.244.t:0 "Визит в Виннин"
 griffonRepublic.244.d:0 "Каждый его шаг раздавался эхом в пустом зале, Кемерскай шёл по семейной усадьбе - там, где он когда-то жил, работал, играл. Дом был ветхим и уже разваливался - портреты отца Кемерская, великого барона Алдуса, были порваны и погнуты, знак упадка его когда-то дворянской семьи. Род Кемерскаев погибал, и его печалило, что причиной этому была революция. Он вспоминал старые деньки, когда он катался по Грифенхейму с Гровером IV и получил свою медаль чести. Это были лучшие дни - когда борьба за лучшую Грифонию ещё не рвала континент на части.\n\nНо он был здесь не для того, чтобы ностальгировать по лучшим дням. Его племянник, Август II, находится здесь под домашним арестом неделями, со времени победы революции. Кемерскай был обязан последний раз с ним поговорить - и осудить его справедливо и достойно.\n\n"Дядя," - сказал Август, обращаясь к Кемерскаю с холодной яростью в глазах, - "Ты убьёшь меня, как моего отца, и отца моего отца, или ты хочешь уговорить меня подчиниться?"\n\n"Я здесь не для того, чтобы бороться с тобой," - сказал Кемерскай, сидя напротив своего племянника, - "Но если ты и дальше будешь лгать, что я привёл к упадку твою семью, ты мне не оставишь выбора."\n\n"Лжец!" - завизжал Август, забывая, что он говорит с Президентом-Маршалом Республики, - "Твой друг убил моего отца на улицах Грифенхейма, и ты лично приказал казнить моего деда, твоего родного отца!"\n\nКемерскай хотел что-то сказать, но его перебил его кричащий племянник, - "Это твой проклятый род обрёк нашу семью на разложение и гниение, и положил конец нашему дворянству! Теперь мы бастарды Виннина, отступники имперских родов! И ты приходишь ко МНЕ, рассчитываешь на республиканскую справедливость, хочешь, чтобы я преклонился перед твоими требованиями и стал твоей пешкой."\n\nОн снова уселся на стуле и, вздохнув, вконец сказал: "Делай, что хочешь. Если мне идти на эшафот, я так и поступлю, как рыцарь рода Кемерскаев и Империи, а не орущий ребёнок.""
 griffonRepublic.244.a:0 "Изыди, племянник. Я не хочу тебя больше видеть."
 griffonRepublic.244.b:0 "В Республике у каждого есть своё место."

 griffonRepublic.245.t:0 "Судьба дворянства"
 griffonRepublic.245.d:0 "Дворянство. Предатели и преступники, которые одолели республиканцев во время Революции и с тех пор продолжают угнетать народ Грифонии.\n\nБольшинство герцогов, графов и баронов старой Империи Грифонов были арестованы и брошены в тюрьмы республиканской армией, хоть мы и не уберегли мелких дворян - многих линчевали на улицах по всей Республике. Прежде сдерживаемая злоба на дворянство вырвалась на волю, и как демократы, так и социалисты призывали к казням и судам над предателями нашей нации. Шнабель Санглайдер, лидер социал-демократической фракции в Национальной Республиканской Партии, объявил, что "согласно принципам свободы, демократии и процветания, эти предательские дворяне должны понести ответственность за свои преступления."\n\n Тем не менее, не все республиканские политики настолько враждебны к бывшим имперским дворянам. Генрих Кингфезер, известный своей прагматичностью и консерватизмом, объявил, что дворян нужно судить "в соответствии с законами и моралью их времён, не нашей мести и кровожадности". Хоть и убеждения Кингфезера и не сильно популярны среди простогрифонов Республики, многие правые фигуры и бывшие имперские чиновники разделяют его точку зрения - чтобы сохранить Республику, нам, видимо, придётся сделать немыслимое и оставить этих предателей в живых."
 griffonRepublic.245.a:0 "Справедливость должна восторжествовать."
 griffonRepublic.245.b:0 "Просто лишить их титулов."

 griffonRepublic.246.t:0 "Замена архонтов"
 griffonRepublic.246.d:0 "Очевидно, что мы больше не можем позволить Эросу, Эриону и Протеусу участвовать в религиозных делах. Все они были преданы суду как предатели Республики Грифонов и нарушители беспристрастности веры - но вопрос в том, правда, кто их заменит.\n\nФракция республиканцев во главе с чиновником Олафом Рестьеном выступает за восстановление беспристрастного храма и назначение только талантливых прелатов-теологов и священников на должность нового Архонта. Многообещающий проповедник Борея из Фетизии Март Бьемолт - любимчик фракции Рестьена - если придёт к власти, примет имя Аурум VI, Архонт Борея.\n\nТем не менее, многих беспокоит Аурум VI и его так называемая "беспристрастность". Вальтер Эммерих, правая лапа Шнабеля Санглайдера и видный республиканский генерал заявил, что любой "беспристрастный" священник продаст Республику контрреволюционерам при первой возможности. Вместо него Эммерих предлагает назначить Артура Клемпнера из Уайттейла, утверждая, что он более других верен республиканскому и демократическому делу. Реформизм Клемпнера, с точки зрения церквей, разрушителен, но он идеальный Архонт для Республики - с приходом к власти, он станет Вульгарисом I, Архонтом простогрифонов."
 griffonRepublic.246.a:0 "Назначить беспристрастных Архонтов."
 griffonRepublic.246.b:0 "Назначить верных, республиканских Архонтов."

 FAT_astler_chosen:0 "Был выбран Рикард Эстлер."
 FAT_appoint_whoever:0 "Мы можем выбрать кого хотим."
 FAT_sparrowsbane_chosen:0 "Был выбран Мо Спэрроусбейн."

 griffonRepublic.2251.t:0 "Праймериз в НРП"
 griffonRepublic.2251.d:0 "Скоро состоятся выборы, которые пройдут на всех наших новых грифоньих территориях и в которых будут участвовать политики из сотен городов, провинций и посёлков. НРП предстоит решить, какого кандидата партия выдвинет на следующих выборах. Левое крыло уже сплотилось вокруг Грифоньей Социалистической Партии во главе с Гербеном Когхелем и покинуло НРП.\n\nВ итоге выдвигаются два новых кандидата: социал-демократ и республиканец-революционер Теодор Верани, родом из аквелийских земель – более авторитарный, но, похоже, склонный к популизму; и Александр Кемерскай-младший, сын нашего великого Александра Кемерская, одного из лидеров Революции 978 года и Второй Революции 1010-х. Оба кандидата поддерживают идеи Кемерская, но расходятся во взглядах на исполнительную власть, конституцию и роль народа.\n\nНу и, конечно, остаётся очевидный кандидат – наш нынешний президент, объединивший всю Грифонию под знаменем Национальной Республиканской Партии. Пусть второй срок и вызывает опасения авторитаризма, его победа будет простой и позволит укрепить Республику – стабильность и процветание на долгие времена."
 griffonRepublic.2251.a:0 "Теодор Верани оживит нашу партию."

 reform_military:0 "Армия реформирована"
 placate_generals:0 "Генералы успокоены"

 griffonRepublic.250.t:0 "Чистка"
 griffonRepublic.250.d:0 "После объявления военного положения по всей стране, Президент-Маршал Кемерскай начал чистку социалистических и диссидентских элементов нации, чтобы не случилось очередного 986 года. Социалисты, лидеры профсоюзов, и даже некоторые гармонисты оказались либо изгнаны из НРП, либо вообще из Республики, либо даже брошены в тюрьмы и осуждены за предательство в пользу Скайнавии.\n\nВозможно, самой значительной антиправительственной силой после военного положения стало социалистическое крыло его собственной Национальной Республиканской Партии, которая устраивала протест за протестом, требуя "демократии" и "честных выборов". Рикард Эстлер скакал по улице, и он, с его шайкой безмозглых заводских рабочих, которые ещё и не родились во времена революции, стали серьёзной угрозой для Республики Грифонов. Хотя сама партия ещё не начала сталкиваться с целенаправленными последствиями чисток, великий маршал считает эти чистки ключевым средством предотвращения возможных социалистических атак в будущем.\n\nВсе члены левой НРП получили строгие предупреждения о необходимости соблюдения законов Республики и их партии. На улицах Клаудбьюри стало появляться всё больше и больше полицейских, которые арестовывали фашистов, социалистов и коммунистов, которые ранее показали нелояльность к нашей республике."
 griffonRepublic.250.a:0 "Все предатели."

 griffonRepublic.251.t:0 "Протесты"
 griffonRepublic.251.d:0 "Писатель-республиканец Корнелиус Винке, плодовитый литератор и историк, чьему перу принадлежат сотни работ о грифоньем республиканизме и демократии, недавно написал новую книгу – "Великий миф Кемерская", в которой он жёстко высмеивает правительство Кемерская и его действия за последние несколько лет. "Кемерскай – безмозглый идиот," — пишет Винке, "Он не знает ничего, кроме войны, но даже не собирается воевать, так что теперь всё, на что он способен – ничего не делать и медленно стареть и гнить." Его послание приняли позитивно, и книга Винке скоро стала бестселлером в республике.\n\nПока наше правительство пыталось запретить этот клеветнический памфлет, Винке набрал достаточно поддержки, чтобы разжечь массовые протесты против президента-маршала, которые нашли сторонников даже на севере, где поддержка военной хунты всегда была сильна. К сожалению, всё больше и больше грифонов выходят на улицы с лозунгами вроде "Долой Кемерская" и "Долой авторитаризм".\n\nНаше правительство либо разберётся с этим кризисом, либо погибнет."
 griffonRepublic.251.a:0 "Проклятье."

 griffonRepublic.252.t:0 "Коммуна Спэрроусбейна"
 griffonRepublic.252.d:0 "После того, как протесты против Александра Кемерская прошли по всей стране, а Корнелиус Винке захватил власть в городе Бликспайр вместе с тысячами его последователей, север, насколько известно, всё ещё не проявил активности. Генералы были разбиты, и предполагалось, что север снова будет верен Президенту-Маршалу.\n\nНо мы ошибались...\n\nПроскайнавский боевик Мо Спэрроусбэйн, изначально верный Республике, поджал хвост и создал свою коммуну на севере Республики. Он уже получает нелегальные поставки скайнавского оружия, надеясь подготовиться к открытому военному восстанию.\n\nНа севере - обезумевший генерал, в Вингхагене, Бликспайре и Клаудбьюри - протесты. Мы должны что-то сделать, и сделать быстро."
 griffonRepublic.252.a:0 "В этом всём теперь ещё и коммунисты замешаны?!"

 griffonRepublic.253.t:0 "Конец социалистического НРП"
 griffonRepublic.253.d:0 "Социалистический НРП Рикарда Эстлера уже пострадал от ряда чисток, когда Кемерскай столкнулся с проблемой с их ролью в партии. Эта чистка прошла во время военного положения, и, таким образом, были очищены самая радикальная часть Социалистического крыла НРП - Мо Спэрроусбейн был изгнан на север, а ярые революционеры-социалисты были исключены из правительства.\n\nИ всё же, с объявлением диктатуры и постоянного чрезвычайного положения, социалисты снова встрепенулись, и теперь уже очевидно, что их нельзя вообще допускать к власти. За последние несколько недель, агенты и армейские офицеры, верные Кемерскаю, начали целые расследования деятельности социалистов и аресты тех, кого уличили за шпионство в пользу Скайнавии.\n\nТрибуналы и суды прошли по всей стране, и, как и ожидалось, многие деятели и организации, связанные с Левыми НРП, такие как эти профсоюзы, были обвинены в сотрудничестве со Скайнавией с целью уничтожения Республики. Согласно нашим агентам, Рикард Эстлер лично получал взятки в тысячи идолов от про-скайнавских профсоюзов и революционных организаций - очевидное доказательство предательства Республики.\n\nС окончанием этих судебных процессов, лидеры Левого НРП прекратили свою деятельность - многие были брошены в тюрьмы, изгнаны, или в лучшем случае, окончили свою политическую деятельность."
 griffonRepublic.253.a:0 "Жалко, но это нужно было сделать."

 griffonRepublic.254.t:0 "Пацификация Клаудбьюри"
 griffonRepublic.254.d:0 "Впервые за три десятилетия вооруженные отряды вышли на улицы Клаудбьюри с целью избавить город от любого сопротивления Республике. Однако на этот раз они не пришли как освободители - они пришли как подавители сопротивления. На улицах царила жуткая тишина, так как большинство грифонов сидело в своих домах и ожидало, пока вооруженные патрули покинут город и закончат контртеррористическую миссию. Когда на этот раз Александр Кемерскай проезжал по улицам Клаудбьюри, никаких празднований не было - только страх и паранойя.\n\nВойска обыскивали подвалы таверн, рестораны и склады по всему Клаудбьюри, разыскивая и тех, кто стоял за восстаниями и провоцировал волнения против режима Кемерская. Сам маршал выступил в президентском дворце в Клаудбьюри, как и всегда, но его речь ожидало лишь небольшое количество населения, а не огромные толпы, к которым он так привык. Он коротко рассказал только о предателе Рикарде Эстлере, которого сняли с поста военного губернатора, и что отныне Клаудбьюри находится на военном положении."
 griffonRepublic.254.a:0 "В городах больше не будет бунтов."

 griffonRepublic.255.t:0 "Конец Спэрроусбейна"
 griffonRepublic.255.d:0 "К сожалению для Спэрроусбейна, не было никаких неожиданностей, когда мы вошли на север, и наши войска не столкнулись с незнакомой местностью. Республиканские вооружённые силы уже сражались здесь ранее с войсками мятежных полководцев, и на этот раз они были гораздо лучше приспособлены к зимним условиям, чем бригады Спэрроусбейна. Республиканские войска устало тащились сквозь покрытый льдом снег под командованием самого Макса Уайтфезера – Кемерскай выбрал стареющего грифона из-за его явной ненависти к скайнавскому социализму и опыта действий на севере совместно с бригадами Роузвинг. Вскоре войска Уайтфезера оказались в Бликспайре, где они встретили большую группу социалистов, революционеров и сторонников Скайнавии, вооружённых винтовками и лопатами.\n\nПощады от Уайтфезера они не дождались.\n\nКогда он вернулся к Кемерскаю, то просто сказал старому маршалу, что дело сделано и войска Спэрроусбейна больше не будут причинять проблем Республике. Кемерскай даже не потрудился спросить старого грифона о произошедшем, так как уже знал, что Уайтфезер уничтожил всех социалистических мятежников силой, присущей истинной республиканской армии. Для старого маршала это стало правосудием за преступления 986 года, за которые социалисты так и не заплатили. А также это было отличным уроком для скайнавцев."
 griffonRepublic.255.a:0 "Все они – скайнавские предатели."

 griffonRepublic.256.t:0 "Осада Бликспайра"
 griffonRepublic.256.d:0 "Корнелиус Винке, безумный писатель из Бликспайра, неделями выжидал в ратуше города, собирая вокруг себя тысячи республиканцев из региона и самого Бликспайра в жалкой и обречённой борьбе против режима Кемерская. Но его череда удач подошла к концу.\n\nТанки и пехота прошли по притихшим улицам, жители в ужасе попрятались по домам, а повстанцы – по своим укрытиям. Слухи о чистках Кемерская уже разошлись, и в глазах многих он стал тираном и автократом: его боялись, но не любили. Никто больше не приветствовал солдат республики, а кое-кто даже насмехался над ними, когда они маршировали к городскому совету, чтобы положить конец ереси Винке.\n\nСражение оказалось коротким. Войска Винке были смяты закалёнными ветеранами, а сам предводитель, избитый и едва живой, в исступлении бросался на республиканцев, выкрикивая: "Предатели!". Потерявшего сознание грифона перевязали и отправили в Клаудбьюри – навстречу справедливости богов и президента-маршала.\n\nДо самого конца Винке отрицал вину, обвиняя "фальшивую республику" и её "мааритского криптомонархистского лидера". Но вскоре грифона вывели к виселице. Его глаза расширились от ужаса перед смертью, а Кемерскай и Санглайдер были свидетелями конца одного из величайших грифонов республики.\n\n— Это твоя вина, президент, — резко бросил Санглайдер, сверкнув единственным глазом. — Его жизнь не должна была оборваться от твоих когтей. Он написал множество трудов о республике, помог собрать поддержку в борьбе против герцогства, заложил фундамент нашей демократии, а ты убил его, словно он был никем.\n\nКемерскай тяжело вздохнул. — Я должен был это сделать. Он предатель, восставший против президента и призывавший к братоубийству.\n\n— Всё, что он делал, было во имя принципов Национальной Республиканской Партии. В отличие от тебя, брат.\n\nС этими словами Санглайдер ушёл, оставив Кемерская одного. Его глаза наполнились яростью, когда он смотрел на безжизненное тело Корнелиуса Винке."
 griffonRepublic.256.a:0 "Грустный конец некогда великого грифона."

 griffonRepublic.257.t:0 "Последние слова Кемерская"
 griffonRepublic.257.d:0 "Когда Александр Кемерскай-младший прибыл в больницу, чтобы увидеть отца, он застал его в том виде, в каком никто не хотел бы видеть близкого – корчащимся от боли на койке, вцепившимся в её края, из последних сил пытающимся выдержать муки.\n\n— Подойди ближе, Алекс... — простонал Кемерскай, надеясь, что его единственный сын услышит каждое слово. — Я хочу оставить тебе свой последний дар, твоё наследие... Запомни, что делал этот старый дурак, и не повторяй моих ошибок... Тридцать лет я был героем, но все запомнят меня тираном...\n\nОн говорил с трудом, задыхаясь от боли и плача от стыда.\n\n— Всё, что я делал... было ради стабильности, ради республики, ради будущего... Ты должен восстановить демократию, как должен был и я... Не умирай тираном, как я. — Кемерскай положил когти на лапу сына, и оба не сдержали слёз. — Помни, Алекс: свобода, демократия, процветание.\n\n— Я уже на пути к Борею... О, и ещё, Алекс... — сказал он, глядя на сына с ужасом.\n\n— Да, папа? Что?.. — прошептал Александр, крепко сжимая его когти.\n\n— Помни меня за хорошее, не за дурное. Пожалуйста...\n\n— Конечно. Я люблю тебя, папа... — ответил Александр. Кемерскай улыбнулся и закрыл глаза, уходя в мирный сон.\n\nЧерез несколько дней было официально объявлено о смерти президента. Но к тому времени он уже был лишь номинальным лидером – вся власть перешла к его сыну.\n\nАлекс вышел из больницы с титулом президента-маршала. Теперь перед ним стоял тяжёлый выбор: восстановить демократию, как завещал отец, или ради стабильности и власти сохранить чрезвычайное положение."
 griffonRepublic.257.a:0 "Мы восстановим демократию."
 griffonRepublic.257.b:0 "Мы сохраним чрезвычайное положение."

 griffonRepublic.258.t:0 "Споры о гимне"
 griffonRepublic.258.d:0 "С восстановлением парламента вновь встал вопрос о национальном гимне – точнее, о его отсутствии. В ходе обсуждения были выбраны три наиболее подходящих варианта.\n\n«Триколор» – партийный гимн НРП. Многие считают, что, сделав его гимном страны, мы укрепим единство партии и покажем народу Грифонии, что всё ещё верны республиканскому делу. Однако использование партийного гимна в качестве национального может восприниматься как удар по меньшим партиям, недавно вошедшим в парламент. Даже без политического подтекста «Триколор» остаётся спорным, а его припев – «Пускай слабаки дрожат, и смеётся ренегат, триколор всегда тут был, и им его не убрать!» – считается оскорбительным и грубым. И всё же это один из самых популярных неофициальных гимнов, и его мелодия передаёт республиканский дух.\n\nСледующая песня – «Восставшая из руин» – мелодия, ставшая популярной во времена Республиканской Революции. В ней поётся о единой и свободной Грифонии. Если «Триколор» воспевает республику в целом, то «Восставшая из руин» сосредоточена на нашей цели: «Послужим мы во славу нашей родины Грифонии, нашего Отечества».\n\nПоследняя из предложенных песен – «Единство, справедливость и свобода» – третий куплет известной композиции «Das Lied der Griffonier», также известной как «Песня грифона». Наши демократические ценности и идея единой Грифонии отражаются в каждом слове этого куплета. Более того, выбор уже популярной среди народа песни укрепит наш статус законного наследника погибающей Империи.\n\nИ всё же – какую песню выбрать?"
 griffonRepublic.258.a:0 "«Триколор!»"
 griffonRepublic.258.b:0 "«Восставшая из руин!»"
 griffonRepublic.258.c:0 "«Единство, справедливость и свобода!»"

 griffonRepublic.259.t:0 "Встреча"
 griffonRepublic.259.d:0 ""Друзья, прошу, присядьте."\n\nСантейл поклонился, когда Годфрид Херен и Дитрих Мах вошли в резиденцию президента, украшенную триколорами Республики. На стене, там, где раньше был портрет Кемерская, теперь был портрет ухмыляющегося Сантейла, во всём его великолепии. Так было со всеми портретами предыдущего президента.\n\n"Я так рад, что мы все смогли встретиться сегодня," - когда двое пришедших заняли места за столом, он продолжил: "Я уверен, вы знаете, зачем мы здесь собрались - великий Грифоний Национальный Революционный Фронт обращается к вашим организациям для объединения против монархических декадентов, либеральных идеалистов и тиранов-социалистов."\n\n"При всём уважении, господин Президент," - Херен кашлянул, и начал шептать Сантейлу: "Я соглашусь, лишь если вы удалите из переговоров этого деревенского маршала. Он недостоин чести переговоров с нами."\n\nЭто было грубо, и Мах встал со стула, указывая на фетизца: "Я не потерплю эту лягушку в любой Национальной Республике! Он напыщенный, ленивый и не достоин называться грифоном, весь Герцланд об этом знает."\n\n"А ты не лучше, ты вообще деревенщина!" - крикнул Херен Маху, вставая со стула; "Сантейл, этот грифон - обманщик, действующий только ради себя. Я писал романы и статьи о национальном обновлении, пока он копался в огороде."\n\n"Скажи это ещё раз," - Дитрих встал, чтобы сравняться с Хереном, и плюнул в него: "Назови мне хоть одну причину, почему я не должен выстрелить в тебя, болотная герцландская тварь."\n\nВ этот момент Сантейл встал и заговорил:\n\n- Не надо, Херен уже уходит.\n\nФетизец попытался что-то ответить, но охранники Сантейла вывели его из зала до того, как он нашёлся, что ответить.\n\n"Не думайте о его словах. Вообще с ним на обратном пути в Де-Влёйгельс, должен произойти "инцидент". А мы пока можем подыскать более достойного правителя Фетизии."
 griffonRepublic.259.a:0 "Коалиция Сантейла-Маха!"

 griffonRepublic.260.t:0 "Новый Архонат"
 griffonRepublic.260.d:0 "Следующей целью мести Сантейла стал Архонат. Хоть они и объявили о нейтралитете, они продолжают поддерживать предателей-монархистов, даже теперь, когда императорская династия пала.\n\nАрхонт Эрос VII уже казнён за измену Республике вместе с Протеусом II. Эриона XII постигла та же участь, но от лап добровольцев из вооружённого отряда рабочих.\n\nНовые архонты оказались столь плохи, что Сантейл решил лишь ограничить власть Архоната. У них больше нет возможности влиять на политику и умы граждан Республики, им нельзя занимать политические должности, многие храмы будут снесены, их территории будут использованы для различных объектов, более нужных Республике.\n\nПока они не научатся верности Республике и Президенту-Маршалу, их будут судить, вне зависимости от сана.\n\nМногие считают этот указ слишком жёстким, но истинные защитники Национальной Республики лишь поддерживают его."
 griffonRepublic.260.a:0 "Они будут жить молитвой."

 griffonRepublic.261.t:0 "Триумф Сантейла"
 griffonRepublic.261.d:0 "Сантейл посмотрел на карту Грифонии. Столько лет, столько часов потрачено во имя всего хорошего для каждого грифона, и наконец, он сделал это. Он, именно он всё объединил, создал новую державу, образец для подражания всем другим. Последний враг был повержен, их сторонники ушли в подполье. Он открыл конверт на столе и прочитал.\n\n\"Сим я отправляю символы последнего организованного сопротивления нам. Да пребудет с нами Арктурий отныне и вовеки веков."\n\nСантейл положил письмо обратно в конверт и закрыл его. Он снова бросил свой взгляд на карту. Все города были перечёркнуты ручкой, показывая этим их поражение. Отличная работа."
 griffonRepublic.261.a:0 "Славная победа."

 griffonRepublic.262.t:0 "Двойная монархия"
 griffonRepublic.262.d:0 "Теперь, когда Грифенхейм под нашим контролем, мы должны решить, что делать с этими территориями, ныне находящимися под нашим контролем, территориями, лояльными, в целом, Гроверу VI, и со своей культурой. [Root.GetLeader] говорил со своими советниками о том, как лучше объединить остатки Империи. Многие предложили оставить Гровера VI королём Герцланда в союзе с королевством Клаудбьюри. Для объединения династии Плюменьяр с популярной в Герцланде династией Гроверов решено женить Гровера VI на Офелии Плюменьяр, внучатой племяннице Оскара I.\n\nНедавно сформированный Учредительный Совет решил, что Клаудбьюри будет церемониальной столицей, а Грифенхейм - фактической столицей.\n\nВ каждом из королевств будет свой парламент, подчинённый монарху. В остальном, административная система обоих королевств практически не будет изменена.\n\nЗначительная часть дворян восприняла такое решение положительно, но в среде черни, особенно, в запрещённых республиканских организациях такое решение видят как проявление реакционной политики.\n\nВ любом случае, свадьба Гровера VI и Офелии уже скоро."
 griffonRepublic.262.a:0 "Интересно."
 griffonRepublic.263.t:0 "Кримзонбик сбежал"
 griffonRepublic.263.d:0 "Один из самых награждаемых генералов, Даниэль Кримзонбик, получил официальное прощение от Республики Грифонов за его подстрекательство к мятежу против Президента-Маршала Кемерская. В ходе просчитанного политического шага, Республика воспользовалась ситуацией в Нова Грифонии, которая чужда и враждебна к многим предателям Республики, коими наша страна кишит. Кримзонбик, конечно, клюнул на республиканскую удочку, и уже прибыл в Вингхаген через Каменистое море и Небесный залив, чтобы стать офицером в Республиканской армии.\n\nХоть и многие в правительстве встревожены, Кримзонбик враждовал с нашим правительством с тех пор, как мы сместили старое и слабое республиканское губернатора Тифезера - новый суд над ним за все эти мятежи - лишь вопрос времени, но теперь это время зависит от Нова Грифонии."
 griffonRepublic.263.a:0 "Предатель."

 griffonRepublic.264.t:0 "Кемерскай найден мёртвым"
 griffonRepublic.264.d:0 "Несмотря на все наши старания, информация о гибели Кемерская во время битвы за Клаудбьюри просочилась в прессу.\n\nПроблема заключается в том, что никто не признаётся, и оба лидера используют смерть президента-маршала как аргумент против другого. Их сторонники уже начали бороться друг с другом. Сантейл объявил «криптомонархистку» Роузвинг виновной в гибели Кемерская, рассказывая о том, что нанятые Роузвинг северяне растерзали Кемерская на улице и отпраздновали это танцем. В ответ Роузвинг заявила, что «лжец и враг республики» Сантейл убил Кемерская ради личной выгоды и из жажды власти.\n\nВне зависимости от того, кто убил Кемерская, напряжённость между Сантейлом и Роузвинг достигла высочайшего уровня, а их сторонники уже развязали бои на улицах Клаудбьюри, Вингхагена и Клоборга. Сантейл заявил, что убийство Кемерская Роузвинг станет началом новой войны с Империей, а Роузвинг ответила, что отряды Сантейла ничем не отличаются от чернокрылых Биколини в Вингбардии.\n\nСейчас, в самый тёмный час Республики, решается, кто станет новым президентом-маршалом."
 griffonRepublic.264.a:0 "Роузвинг – предательница!"
 griffonRepublic.264.b:0 "Вы издеваетесь? Это точно Сантейл!"

 griffonRepublic.265.t:0 "Помолвка"
 griffonRepublic.265.d:0 "Двери храма Борея в Грифенхейме распахнулись под музыку. Высокопоставленные лица, сидевшие на скамьях в розе, в том числе и [Root.GetLeader], сияли гордыми улыбками, когда Гровер и Офелия медленно шли по проходу. Архонт стоял у алтаря, ожидая будущую пару помолвленных юнцов в самых лучших одеждах, которые только нашлись в Объединённом Королевстве. \n\nОфелия, идущая справа от Гровера, выглядела слегка измотанной, но невозмутимо и твёрдо шла к алтарю в красивом платье. Гровер, с другой стороны, выглядел так, будто ему явно неудобно было в официальной одежде со всеми этими регалиями.\n\nСама церемония была, к счастью, весьма короткой. Она проводилась не столько ради молодоженов, которые просто стояли с опустошенными глазами, слушая монотонное бормотание архонта, а ради собравшихся тут сановников.\n\nАрхонт остановился. «Принимаешь ли ты, Гровер фон Грифенштейн, король Герцланда, Офелию аф Плюменьяр, принцессу Клаудбьюри, в качестве своей родственной души сейчас и спутницы жизни по достижению совершеннолетия?»\n\n«Да, принимаю», ответил Гровер.\n\n«А ты, Офелия аф Плюменьяр, принцесса Клаудбьюри, принимаешь ли Гровера фон Грифенштейна, короля Герцланда, как свою родственную душу сейчас и спутника жизни по достижению совершеннолетия?»\n\n«Да, принимаю», - ответила Офелия.\n\n«Сим я под взором Борея, Эйр и Арктурия объявляю вас связанными светом богов до тех пор, пока смерть не разлучит вас».\n\nМузыка снова заиграла, хор начал петь. «О, Борей, Защитник всех Грифонов, укрой эту пару своим щитом. Даруй им свою силу и свою мощь, чтобы они выстояли во всех невзгодах...»"
 griffonRepublic.265.a:0 "Поздравляю вас, Гровер и Офелия!"

 griffonRepublic.266.t:0 "Тридцатилетие Республиканской Революции"
 griffonRepublic.266.d:0 "Прошло 30 лет с тех пор, как Кемерскай, лояльные ему офицеры и Национальная Республиканская Партия начали революцию, изменившую историю всей Грифонии.\n\nТакже 30 лет прошло с последнего раза, когда мы сидели в Грифенхейме как герои и освободители.\n\nВ эту годовщину не было ни веселых торжеств, ни восхитительных празднеств, как это было, когда Республиканцы впервые взяли Клаудбьюри. Вместо этого протестующие заполонили улицы в Скварке, Клаудбьюри и Вингхагене, милитаристы требовали возвращения в Грифенхейм и уничтожения имперцев раз и навсегда. Когда политики произносили речи и устраивали торжества в честь Революции, абсолютно всех атаковала толпа разъяренных грифонов, требовавших возвращения Грифенхейма и прекращения политики прагматизма и пацифизма, проводимой Кингфезером. Шнабель Санглайдер был, пожалуй, единственным политиком, благосклонно встреченным протестующими силами, с его речами об окончательном возвращении в Имперский Город и изгнании сил Гровера VI, привлекающими тысячи зрителей.\n\nИнтенсивность и серьезность этих протестов, наряду с апатией к политике Кингфезера и правительству Кемерская, весьма беспокоят наше правительство. Понятно, что республиканцы из Клаудбьюри хотят только одного - освобождения."
 griffonRepublic.266.a:0 "Мы ещё вернёмся... обещаем..."

 griffonRepublic.267.t:0 "Гринбэкское Соглашение"
 griffonRepublic.267.d:0 "[Root.GetLeader], приблизился к столу, где уже лежал готовый документ. Это было то, что заняло так много бессонных ночей и напряженных дней. Тот документ, что вызвал так много споров и раздоров среди дворян. Один даже выхватил свой меч в пылу спора. Но теперь он был готов. Слова наконец-то были на бумаге. Документ был дописан. И всё же, сам этот лист казался крайне незначительным по сравнению с теми последствиями, который он вызовет. Это основа дуалистической монархии. Той, что основывается не на мелких прецедентах при дворе, а на реальных соглашениях, на которые каждый мог бы ссылаться. И тогда будут определены четкие границы, разделяющие сферы деятельности и влияния. И все дворяне должны будут соблюдать чёткую иерархию. Граф должен подчиняться герцогу, а герцог - королю. Именно так, как это и должно быть.\n\n[Root.GetLeader] подписал документ. Соглашения вступили в силу. К добру или к худу, но старые порядки сейчас перестали действовать, хоть внешне почти ничего и не изменилось."
 griffonRepublic.267.a:0 "Ради защиты Грифонии."

 griffonRepublic.268.t:0 "Гвоздь в гроб"
 griffonRepublic.268.d:0 "Сегодня президент Александр Кемерскай-младший объявил об отмене закона 986 года "О спасении республики", принятого во время Скайнавского кризиса, когда республика действительно находилась под угрозой. Однако первоначальная поддержка действий маршала быстро угасла, ведь вскоре после этого в [GetYear] году был принят новый закон – "О защите республики".\n\nНовый закон радикально отличается от акта 986 года. Парламент, уже двадцать лет приостановленный по приказу Кемерская-старшего, теперь полностью упразднён в пользу Совета при президенте-маршале. О выборах, которые ещё недавно были разрешены на местном уровне, но отложены на национальном, теперь не может быть и речи ни в одном муниципалитете или регионе республики. Сенаторы и министры лишены своих должностей, а некогда верные советники окончательно устранены из верхушки власти.\n\nБывший вице-маршал при режиме Кемерская-старшего, Шнабель Санглайдер, был смещён со всех постов. Остальные представители центристского крыла НРП постигла та же участь: новый закон [GetYear] года вступил в силу полностью, не оставив им возможности "предать" правительство Кемерская-младшего. Остаётся открытым вопрос, вернётся ли когда-нибудь республика к временам, когда демократия лежала в основе каждого решения. Сам же президент-маршал утверждает, что расширение актов 986 года сделано именно ради этой цели. Но пока в Грифонии есть предатели, республика, по его словам, никогда не будет в безопасности."
 griffonRepublic.268.a:0 "Это была необходимая мера."

 griffonRepublic.269.t:0 "Следующий наследник"
 griffonRepublic.269.d:0 "Чтобы обеспечить безопасное и надежное наследие после ухода молодого маршала, Кемерскай-младший официально заявил, что его сын Йоханнес Кемерскай будет следующим Президентом-Маршалом Республики, обуславливая это тем, что "гарантированная возможность восстановления демократии никогда не будет найдена". Йоханнес, которому всего 12 лет, уже поступил в очень престижную военно-политическую академию, достойную наследника Республики, а Кемерскай-младший уже уполномочил полный контингент телохранителей постоянно сопровождать молодого грифона.\n\nМногие в Республике расценили этот шаг как окончательное предательство демократических принципов Республики и охарактеризовали систему как наследственную и монархическую. Однако Кемерскай-младший столкнулся с критиками, отметив решение своего отца сделать его следующим Президентом-Маршалом Республики перед смертью.\n\n"Мои политические враги, идеалистичные и ослепленные ненавистью, коими и являются, игнорируют саму причину, по которой мы все здесь сегодня - то, что сам Кемерскай предложил мое восхождение в качестве следующего Президента-Маршала! Никто не возражал против ЭТОГО предложения, так что я не вижу смысла в том, чтобы какой-нибудь здравомыслящий грифон обвинял меня за те же действия. Неужели вы предпочли бы, чтобы я умер, и чтобы какой-нибудь некомпетентный государственный служащий или кровожадный генерал заняли эту позицию? Нет! Ну что ж, это прекрасно, что я воспитываю своего сына в духе Республики, чтобы он стал таким же великим, как и его дед", - прокомментировал этот вопрос Александр."
 griffonRepublic.269.a:0 "Из него выйдет способный наследник."

 griffonRepublic.270.t:0 "Конец эпохи"
 griffonRepublic.270.d:0 "Сегодня утром Александр-младший объявил о прекращении «грифоньей опеки» и создании подлинного конституционного правительства во имя Трёх принципов и Республиканской мечты. Вместе с этим новым провозглашением последовала его собственная отставка с поста президента-маршала, ссылаясь на недемократический приход к власти и политическую неопытность, хотя многие считают, что эти причины были лишь прикрытием, чтобы успокоить демократов и действительно начать избирательный цикл.\n\nПервый кандидат, который выдвинулся, – Стефано Арифелли, вингбардийский бизнесгрифон и протеже Генриха Кингфезера, прославленного республиканца, который решил не баллотироваться из-за непрестанного расследования военных преступлений. Арифелли уже пообещал новое правительство, основанное на свободном рыночном капитализме, малом влиянии государства и прагматических принципах. Хотя многие критиковали его кампанию за то, что он был «прикрытием Кингфезера в избирательной гонке», никто не сомневается в личной приверженности Арифелли Республике.\n\nСамый радикальный из кандидатов – Шнабель Санглайдер, главный соратник и одновременно оппонент Кемерская ещё со времён Республиканской революции. Маршал республики, движимый ценностями 978 года и Тремя принципами, является очевидным выбором для идеалиста-гражданина, но действительно ли республика нуждается в таком воинствующем демократе в это неспокойное время?\n\nТретий кандидат – Вальтер Эммерих. Как и Санглайдер, он генерал и идеалист, но позиционирует себя как центристский кандидат на этих выборах. Эммерих подчёркивает единство, безопасность и стабильность как цели своей программы, а его позиция по поводу республиканских вооружённых сил принесла ему одобрение самой Николь Роузвинг.\n\nКто же должен торжествовать в этих первых настоящих выборах?"
 griffonRepublic.270.a:0 "Арифелли объединит центр."
 griffonRepublic.270.b:0 "Санглайдер восторжествует!"
 griffonRepublic.270.c:0 "Эмерих защитит республику."

 griffonRepublic.271.t:0 "Суд над генералами"
 griffonRepublic.271.d:0 "Молодой маршал лично проводил судебные процессы над генералами, обвиняемыми в военных преступлениях во время Скайнавской кампании и чисток против собственного народа в Клаудбьюри. Это была старая вера, которой научил его отец: грифон, убивающий кого-либо, должен понимать, какой приговор будет вынесен ему самому. Улики против Рейнхарда Сантейла, Макса Уайтфезера и Николь Роузвинг были шокирующими, но вполне понятными – республика вела войну, как международную, так и внутреннюю, и сам старый маршал не ставил под сомнение действия своих генералов. Но это был уже не век Кемерская – сын сменил отца, и отговорка «следования приказам» становилась всё менее приемлемой.\n\nПервым под трибунал попал Уайтфезер, и преступления, предъявленные ему, были, пожалуй, самыми тяжкими. Обвинённый в убийстве тысяч скайнавских солдат во время спэрроусбэйнского конфликта и всей войны, Уайтфезер совершил откровенные военные преступления против населения Скайнавии. Хотя он и защищал свои действия, утверждая, что зверские убийства и грабежи, совершённые его бригадами, были в рамках неофициальных законов военного времени, судьи уже вынесли свой вердикт. Виновен.\n\nСледующим был Рейнхард Сантейл, который также был привлечён к ответственности по старым обвинениям в военачальстве и участии в терроризме, в дополнение к нынешним обвинениям в преступлениях против народа Скайнавии. Поскольку все улики были использованы, чтобы обвинить Сантейла в соучастии в попытке теракта Клаудбьюри в 1003 году, военные преступления в Скайнавии почти не имели значения. Виновен.\n\nРоузвинг была последней, и её осудили в основном за связи с монархистскими группировками. Многочисленные северяне свидетельствовали, что Роузвинг давала им взятки и предлагала присоединиться к её отряду для восстановления монархии в республике, а Отто Саксхаген-Плюменьяр, адмирал и член королевской семьи, заявил судьям, что Роузвинг отправляла ему многочисленные послания с просьбой стать новым номинальным главой герцогской реставрации. Виновна."
 griffonRepublic.271.a:0 "Все они по-своему предатели."

 griffonRepublic.272.t:0 "Величайшее сожаление"
 griffonRepublic.272.d:0 "Президент, маршал, герой. Даже сам Александр Кемерскай молча признавал, что количество его титулов и наград было нелепым. Тем не менее, они были свидетельством его достижений в жизни, и он не отрицал смысла, стоящего за всеми этими наградами. Но сейчас он с радостью обменял бы все эти титулы на крошечную долю уверенности в себе. Он подошел к большому дому с букетом цветов в когтях и тихо пробормотал про себя маленькую речь, которую он репетировал на протяжении многих лет.\n\nЕсли и было что-то, о чем он сожалел в своей долгой и легендарной карьере, так это о том, что он попал в ловушку, столь знакомую великим деятелям: если усердно трудиться и выполнять свои обязанности, то на себя совершенно не остаётся времени ... или же на свою семью. Он нашел её в саду, она подбирала увядшие листья под кустами роз, и, казалось, не замечала его или просто игнорировала, так как не удостоила Александра взглядом, когда он подошёл ближе.\n\n«Как прошел твой день?» спросила она. Александр обнаружил, что пытается вспомнить, когда ответ стал механическим, который он стал давать по привычке. И все же почему? Он взглянул на букет, внезапно ощутив желание выбросить его. Это был такой жалкий, такой глупый способ просить прощения за то, что он столько лет фактически игнорировал её. Долг, революция, всеобщее благо; все эти оправдания были похожи на пепел во рту. В конце концов, молчание вместо ответа заставила её поднять глаза и взглянуть на букет.\n\n«Я ...» начал Александр, понимая, что он совершенно забыл подготовленную им заранее речь. Он просто неуклюже протягивал ей букет. «Я подвел тебя», - сумел он выпалить. «Я был плохим мужем слишком долго. Извини, и я просто надеюсь, что смогу всё исправить ... если ещё не слишком поздно?» спросил он, со страхом ожидая, что букет будет брошен ему в лицо.\n\nВместо этого она заплакала и обняла его, на что Александр вернул объятия и стал мягко покачивать жену взад-вперед, говоря ей, как сильно он ее любит, когда она проклинала его за то, что это заняло так долго. Президент, маршал, герой... да пошли все эти титулы в Тартар. Сейчас он хотел быть лишь мужем, не больше и не меньше." 
 griffonRepublic.272.a:0 "«Отныне моя единственная обязанность - делать тебя счастливой»."

 griffonRepublic.273.t:0 "Возвращение Кемерская"
 griffonRepublic.273.d:0 "Недавно вступивший в должность президент Рикард Эстлер невольно почувствовал себя неловко, когда его предшественник – всё ещё в военной форме – вошёл в кабинет с суровым, непроницаемым выражением. В генерале, который возглавлял революцию с самого её начала, несмотря на все свои ошибки, было что-то непреклонное и неумолимое.\n\n— Генерал Кемерскай, — произнёс президент, не зная, чего ожидать дальше. Понять Кемерская было непросто. Был ли он спасителем революции или всего лишь полевым командиром, которому удалось удержать власть?\n\n— Я прочитал ваше письмо, — сказал Кемерскай. — Удобное решение, не так ли? Но я пришёл сюда не затем, чтобы уйти в отставку. Я хочу, чтобы вы поняли одну вещь. В тот роковой день, когда мы маршировали на север из Герцланда, я мог бы легко сбежать и спрятаться. В любой момент за эти тридцать лет я мог собрать деньги и уехать за границу, чтобы жить в роскоши до конца своих дней. Я мог сдаться любой силе, что пыталась нас сломить. И я знаю, что вы предпочли бы, чтобы я тихо ушёл со сцены и уступил вам бесспорную власть над нацией. Но я дал клятву.\n\n— Я поклялся поддерживать и защищать революцию. Я никогда не откажусь от этой борьбы и не предам тех, кто погиб за неё. Я не позволю, чтобы слёзы, пролитые по павшим, оказались напрасны. И я никогда не покину солдат, которые всё ещё стоят в строю. Мы оба понимаем, что здесь происходит, господин президент. Мы знаем правила этой игры – и мы продолжаем в неё играть. Но сейчас мой ход: вам придётся силой убрать меня из высшего командования Республики. И смею вас уверить – я буду брыкаться и кричать изо всех сил. Вы поняли меня, мистер президент?\n\n— Да, генерал, — спокойно ответил Эстлер. — Благодарю вас за преданность Республике."
 griffonRepublic.273.a:0 "Похоже, старый грифон всё ещё верен революции."
 kemerskai_remains:0 "§YАлександр Кемерскай§! §Cостанется фельдмаршалом§!."

 griffonRepublic.274.t:0 "Размышления императора"
 griffonRepublic.274.d:0 "Гровер, которого когда-то звали Гровером VI, сидел в своей комнате уже несколько дней, выходя лишь ненадолго. И всё же для Иоганны, ранее горничной во дворце, а теперь домработницы Гровера, это всё же было значительным улучшением. Раньше он был озлобленным и весьма раздражительным, но теперь Гровер успокоился, стал более уравновешенным и начал вести себя вежливо. Сейчас он начал выходить на свежий воздух, пусть даже и до библиотеки, и несколько раз уже общался с грифонами на улицах. Когда он пришел домой, он поднялся в свою комнату и начинал читать часами.\n\nОднако тематика взятых им книг не осталась незамеченной: книги по праву и экономике, а также копия новой конституции. Молодой грифон был охвачен рвением, которое заставляло его читать даже в предрассветные часы и оставляло на сон совсем мало времени. Когда Иоганна вошла с его обедом, Гровер посмотрел на неё и поблагодарил. Ранее это заставило бы Иоганну чувствовать себя на седьмом небе от счастья, но теперь это стало привычным. Она не могла не увидеть книги, которые он читал, и её стало любопытно.\n\n— Что вы читаете? — спросила она у Гровера, который сперва доел ужин и вытер клюв, а после этого ответил.\n\n— Этот старый ворон сказал, что теперь я могу быть кем угодно, — ответил Гровер ей, — А вот эта бумага под названием Конституция утверждает: «Каждый гражданин Республики имеет неотъемлемое право участвовать в управлении ею». Я гражданин, так сказал старый ворон. Если его слова правдивы, то я, возможно, никогда больше не смогу стать императором... но я могу баллотироваться в президенты. Не на следующих выборах, но, может быть, через пять или шесть лет. Я молод, у меня ещё есть время."
 griffonRepublic.274.a:0 "«Он дал мне новую жизнь, и я воспользуюсь ею.»"

 griffonRepublic.275.t:0 "Республика Грифонов призывает нас на помощь!"
 griffonRepublic.275.d:0 "Зашифрованное конфиденциальное сообщение прибыло в нашу столицу, [Root.Capital.GetName]. Мы смогли расшифровать его, используя старые шифры и ключи НРП. Оказалось, что это сообщение от самого правителя Республики, [From.GetLeader]. В нём говорится о неизбежном освобождении Герцланда и их предстоящем возвращении в Грифенхейм, а в конце письма следует призыв о помощи. У нас сохранились тесные связи с изгнанными на север республиканцами, поэтому вполне естественным будет, если мы присоединимся к их борьбе за свободную Грифонию. Однако это положит конец нашей автономии, а также правлению нашего лидера, [Root.GetLeader]. Возможно, наше государство, [Root.GetName], захочет ещё немного продержаться обособленно, для собственного блага..."
 griffonRepublic.275.a:0 "И мы, [Root.GetName], ответим на их призыв!"
 griffonRepublic.275.b:0 "Мы истинные республиканцы, а не они."

 griffonRepublic.276.t:0 "Государство[From.GetNameDef] присоединяется к нам!"
 griffonRepublic.276.d:0 "Хорошие новости! После того, как мы отправили секретное сообщение [From.GetLeader] с просьбой о помощи в борьбе за республику, они ответили согласием и присоединились к нашим рядам после долгих лет разлуки. [From.GetLeader] признаёт [Root.GetLeader] легитимным и законным лидером Республики Грифонов и объявляет, что их армия официально присоединится к республиканской. Вместе мы принесём свободу, демократию и процветание в Герцланд и за его пределы!"
 griffonRepublic.276.a:0 "За свободу!"

 griffonRepublic.277.t:0 "[From.GetNameDef] предаёт нас!"
 griffonRepublic.277.d:0 "Печальные новости. После того, как мы отправили секретное сообщение правителю [From.GetLeader] с просьбой о помощи в борьбе за республику, они ответили отказом и решили не помогать нам. [From.GetLeader] осуждает [Root.GetLeader] как нелегитимного тирана и объявил, что их армия не будет сотрудничать с нашей. Похоже, что у нас нет другого выбора, кроме как атаковать наших бывших товарищей, если мы хотим объединить Герцланд под знаменем триколора."
 griffonRepublic.277.a:0 "Смерть этим предателям!"

 griffonRepublic.278.t:0 "Последний республиканец"
 griffonRepublic.278.d:0 "В потёртом сером пистолете Шнабеля Санглайдера оставалась лишь одна пуля. Больше у него не было ничего.\n\nНаследник старого маршала, которому он верно служил до самой его безвременной кончины, лишил Санглайдера всего, что когда-то составляло суть республики. От неё осталась лишь пустая оболочка, а сокрушённая мечта Кемерская превратилась в кошмар. Заряжая последний патрон, Санглайдер задавался вопросом: заботился ли президент-маршал когда-либо о народе, о Грифонии, о демократии, свободе и процветании? Или всё это было лишь фасадом, скрывавшим жадного до власти имперского генерала, желавшего навсегда вписать своё имя в историю? Его сын точно не заботился об этом.\n\nИменно Генрих Кингфезер, тихий юрист из центральных университетов, когда-то уверял Санглайдера, что Кемерскай сражается не за власть, богатство или славу, а за простых грифонов и их мечту о процветании. Но теперь тот же Кингфезер стоял рядом с наследником маршала, нашёптывая ему сладкую ложь и предавая своих собратьев-республиканцев ради "стабильности". Какой позор, что у Санглайдера не было двух пуль. Одну стоило бы приберечь для адвоката.\n\nУлицы Клаудбьюри были холодны, упорядоченны и деловиты, но в них не осталось жизни. Единственным языком, звучавшим на улицах, был гриффиш, а повозки с едой и безделушками, некогда украшавшие город, теперь пустовали. Лишь толпа грифонов внимала речи молодого маршала, зачарованная его ложью, приправленной полуправдой. Именно там Санглайдер собирался нанести удар и положить конец фасаду династии Кемерская.\n\nОн пробирался к президентской трибуне сквозь толпы восторженных горожан, едва различая слова нового маршала – всё заглушало биение сердца и отголоски криков тысяч грифонов, павших в 978 году за мечту, которая никогда больше не вернётся в этот имперский город.\n\n"Готовьсь."\n\n"Целься."\n\nИ вдруг сзади раздался выстрел."
 griffonRepublic.278.a:0 "Пли."

 griffonRepublic.279.t:0 "«Гроверизм десятого века»"
 griffonRepublic.279.d:0 "Получив статус премьер-министра, Николь Роузвинг объявила о начале новой пропагандистской кампании в Клаудбьюри, апеллирующей к мировоззрению и чувствам Гровера IV, императора всех грифонов с 914 по 970 год. Она стремилась найти общий язык с монархистами и республиканцами из старой гвардии, чья молодость пришлась на самые лучшие периоды правления Гровера IV, когда в империи началась индустриализация и вовсю разворачивались реформы. Кампания Роузвинг указывала на сходства между конституционной монархией Роузвинг и идеями Гровера IV, популярного императора-реформиста, который постоянно конфликтовал со знатью своего времени. И в речах Роузвинг прослеживалось немалое сходство между теми противниками реформ и той знатью, что сейчас контролирует Грифенхейм.\nХотя историки поставили под сомнение фактическую приверженность Гровера IV реформам, Роузвинг и её союзники изображали императора как прагматичного, но всё же идеалистичного монархиста-конституционалиста, который стремился залечить раны увядающей империи и восстановить баланс между всё сильнее склоняющимися к республиканским идеям простыми грифонами и самой идеологией монархизма. С другой же стороны, правительство в Клаудбьюри пыталось получить поддержку для Роузвинг от многих местных монархистов в регионе, которые всё ещё видели в ней герцландскую оккупантку и сторонницу республиканцев. Целью пропаганды было создание связи между антиреспубликанским, популистским конституционализмом Роузвинг и конституционализмом покойного императора.\nМногие, однако, также полагают, что существуют и скрытые мотивы, стоящие за этой кампанией Роузвинг по изображению имперского монарха как героя, а декадентствующего дворянства – как злодеев, продолжающих выкачивать саму жизнь из империи.\n— Я действительно считаю, что Роузвинг крайне заинтересована в том, чтобы привлечь богатства Грифенхейма для своего движения, — высказался перед репортёрами обиженный и изгнанный Шнабель Санглайдер, — и что эта кампании по продвижению «Гроверизма десятого века» лишь нацелена на то, чтобы сплотить народ самой империи вокруг этого так называемого конституционализма Роузвинг и использовать его как повод для осуществления своего отвратительного плана по объединению монархистов из Клаудбьюри и Герцланда.\n"
 griffonRepublic.279.a:0 "Монархизм, но правильный."

 griffonRepublic.280.t:0 "Инсульт"
 griffonRepublic.280.d:0 "Сантейл открыл глаза. Он лежал в кровати, но почему-то не в своей. Он осмотрелся, и увидел вокруг себя венки. Его кровать освещал свет из открытого окна. Он был в клиническом отделении, причём не сам. Кругом суетились медсёстры, что-то говорили, но он не понимал ни слова. Они предлагали ему поесть, попить, но он просто отмахивался. Он не хотел есть. Ему нужно было сделать... что-то. Сантейл осознал, что не помнит, что делал.\n\nУже несколько часов спустя, вновь обретя возможность говорить и слышать, он заметил, что у его кровати собрались все самые важные грифоны в государстве. Как только он пришёл в чувство, все вздохнули с облегчением. Впрочем, в искренности некоторых из них Сантейл всё же сомневался. По их словам, Сантейл осознал, что лежал без сознания неделю, и что у него случился инсульт во время званого ужина. Более того, после вести о его здоровье, окраины Национальной республики чуть ли не начали восстание. Полиция в долине Эви уже взывала к помощи армии, но уже вскоре они узнали, что Сантейл всё же пришёл в сознание, вследствие чего бунт утих. Тем не менее, каждый город все равно оказался покрыт надписями с призывами к оружию против "Тиранической Республики" и с ликованиями по поводу несбывшейся смерти.\n\nСантейл постепенно оправлялся после пережитого, но думал лишь об одном:"
 griffonRepublic.280.a:0 "Как республика выжила без меня?"

 griffonRepublic.281.t:0 "Гнездо стервятников"
 griffonRepublic.281.d:0 "Сантейл в гордом одиночестве просматривал отчёты разведки. Он наконец снова мог ходить, пусть на восстановление способности летать уйдут ещё недели. Впрочем, государство само собой управлять не будет - это было доказано недавним горьким опытом. Видимо, после его инсульта активизировались не только гражданские. Пока его не было, как чиновники, так и генералы занимались хищением денег, планированием переворотов, а также с завидной прыткостью боролись за власть в различных регионах, предвкушая свою участие в окончательной борьбе за власть после его смерти.\n\nИ как только он очнулся, все они так же быстро принялись заметать следы. С сомнительным успехом, так как разведка уже обнаружила и подтвердила не менее дюжины крупных планов, а предполагаемых планов так вообще в разы больше. В республике столько грифонов жаждет власть, что при его уходе... Сантейл призадумался о своём инсульте. Ну, пока он просто ужинал, но такое может повториться когда угодно. Даже несмотря на то, что он быстро вновь встал на ноги, Национальная республика едва ли протянула без него неделю!\n\nОн задумался о своих самых доверенных лицах. Из них лишь двое, ну, может трое, достаточно сильны, чтобы править всей республикой. Но если бы он тогда умер, они бы все порвали друг друга на части, пытаясь занять место нового Президент-Маршала, ну или бы нехотя правили бы вместе, из-за чего республика бы рухнула из-за их нерешительности. В любом случае, Сантейл уже знал, что нужно делать."
 griffonRepublic.281.a:0 "Пора выбрать наследника, и чем скорее, тем лучше!"

 griffonRepublic.282.t:0 "Что было бы, если бы Кемерскай был с нами?"
 griffonRepublic.282.d:0 "Сантейл всё вспоминал это имя, думая о надлежащей передаче власти. Александр Кемерскай - его наставник, друг, враг.\n\nКемерскай всегда говорил, что одна из сильных сторон республики - это то, что она не полагается на одного правителя, как монархия. При этом, республика былых времён стала настолько завязана на Кемерскае, что чуть было не распалась с ним, да и Национальная республика, видимо, была на грани, как только Сантейл перестал дышать. Что сказал бы Кемерскай, встретившись сейчас с Сантейлом?\n\n"Я добился всего, чего не смог ты," сказал в пустоту Сантейл, "Я совершил революцию. Я осуществил мечту о единой Грифонии. Я смог, так как не позволил жалким моралистам или трусам встать у меня на пути."\n\nОн остановился, и замыслился об абсурдности происходящего. Он говорил со стеной, обращаясь к давно мёртвому грифону, при том что Маар уже готов забрать его к Кемерскаю. "Мне жаль. Мне жаль, что тебе не довелось увидеть то, что должно было произойти. Что я не показал тебе истину, пока не стало слишком поздно. Я лишь хотел бы, чтобы я был тогда чуточку умнее, чтобы у меня тогда было хоть немного больше времени. Я уверен, тогда бы ты понял.""
 griffonRepublic.282.a:0 ""У нас могло бы всё выйти, господин Президент.""

 griffonRepublic.283.t:0 "Речь Сантейла"
 griffonRepublic.283.d:0 "Рейнхард Сантейл больше отличился в войне, чем в политике. Микрофон перед ним давил на него, подобно тысяче осуждающих взглядов. Он себе в очередной раз напомнил, что он у себя в кабинете, и что он может записывать речь столько раз, сколько понадобиться.\n\nСантейл начал зачитывать своим до сих пор хрипловатым голосом: "Дорогие сограждане, я более чем рад сообщить, что вести о моей кончине были невероятно преувеличены. Я быстро оправляюсь от болезни, и..." \n\nОн приостановился, и стал разглядывать свои пометки возле текста, который он зачитывал. "...и мои доктора уверяют, что я буду только выздоравливать и выздоравливать. Тем не менее, на протяжении недели моего... отсутствия, проявились трещины в системе Национальной республики. Видимо, несмотря на вашу видимую верность, дорогие сограждане, вам до сих пор ещё лишь предстоит полностью принять Три Принципа."\n\nВесь гнев Сантейла, направленный к народу Грифонии, просочился в этих словах. "Нельзя в этом винить лишь вас, конечно. Целый ряд чиновников показал своё недоверие к Национальной республике. С ними разберутся надлежащим образом. Вам больше не придётся о них задумываться. По поводу вас, дорогие сограждане, вам стоит ожидать больших перемен в ближайшие годы. Для того, чтобы окончательно принять Три Принципа, и не только в Герцланде, а по всей Грифонии, наше правительство тяжело потрудится, чтобы..."
 griffonRepublic.283.a:0 "...стабилизировать нашу славную Национальную республику!"
 griffonRepublic.283.b:0 "...провести первые президентские выборы в Национальной республике!"

 griffonRepublic.284.t:0 "Вопрос о наследнике"
 griffonRepublic.284.d:0 "Выборка сократилась до двух грифонов. Сантейл провёл последние пару недель, общаясь с самыми приближенными к себе лицами, прокручивая в голове воспоминания и просматривая архивы, думая, кто бы стал лучшим наследником, и в итоге он остановился на двух кандидатах: Хирон Штормфезер и Дитрих Мах.\n\nШтормфезер, конечно, самый очевидный выбор. За свою верность и хитрость в годы изгнания в Клаудбьюри он получил прозвище "Птенец Сантейла". Хирона уж никак нельзя было упрекнуть в неверии в Национальную республику, и в архивах на него нельзя накопать никакого компромата. Правда, у Сантейло в первую очередь как раз и вызвало сомнение то, что Хирон Штормфезер, в первую очередь, последователь. Без харизмы, энтузиазма и стремления к подвигам. Он куда лучше исполняет приказы, чем даёт. Сантейла пугало, что при всей его верности, его пребывание на посте Президент-Маршала ознаменуется лишь застоем, а то и упадком.\n\nНо зато есть Мах. Юный, амбициозный и чудесный Дитрих Мах. У него есть все те качества, которых недостаёт Штормфезеру. Энергичность, страсть, смелость, воля править. Что бы он ни делал в отсутствие Сантейла, он это делал с завидным рвением и самоотверженностью, потому Сантейл ни на миг не сомневался, что у него всё выйдет. Впрочем, и тут не без подвоха: Сантейл не был однозначно уверен, что бы Мах делал на посту Президент-Маршала. Он, конечно, с радостью принял Пан-грифоньи амбиции после победы Сантейла, но вот до тех пор Мах выступал за превосходство герцландцев. Он не скрывал свою нелюбовь к фетизцам и аквелийцам. Он как-то заявлял, что стерев их язык, мы сможем раз и навсегда решить проблему сепаратизма. Сантейл волнуется, что Мах вернётся к былым убеждениям, сделает Пан-грифонью Национальную республику Герцландской, и будет угнетать даже верных ему на окраинах Республики. В конце-концов, оба варианта были рискованными: риск упадка, или риск ревизионизма."
 griffonRepublic.284.a:0 "Сантейл выбирает Хирона Штормфезера."
 griffonRepublic.284.b:0 "Сантейл выбирает Дитриха Маха."

 griffonRepublic.285.t:0 "У него ещё есть когти"
 griffonRepublic.285.d:0 "Колетт Солид. Бывший аквелийский офицер, член ПДА. Явилась из подполья, организовала митинг, приуроченный к болезни президент-маршала Сантейла, и призывала весткипцев к вооружённому восстанию против него. Рекомендую устранить.\nКорина Трасвирер. Лидер сопротивления в Таррине. Провозила контрабандное оружие в Таррин, готовя восстание против режима Президент-Маршала Сантейла. Рекомендую устранить.\nРози Софтфур и Карло Рэдпен. Монархо-коммунистические агитаторы, пойманы с поличным на призыве к бунту в лагере военнопленных. Рекомендую устранить, и принудить других пленных к труду.\nВиктор Аллард. Коммунист-радикал. Распространяет подрывную литературу в Аквиле после того, как вышел из подполья. Рекомендуется к допросу, с целью узнать больше об агитаторе-социалисте Гран Крю, затем – к устранению.\nГерита Зарфатти. Вингбардийская сепаратистка. Поймана на попытке совершить налёт на оружейные склады в Карфине. Рекомендуется заключить в тюрьму, и использовать для давления на оставшихся вингбардийских фашистов.\n\nОдин за одним, Сантейл подписывался под каждым предложением спецслужб. Потом он перейдёт к списку коррупционеров, желавших подзаработать на его смерти. Но уже завтра. Он глотнул кофе из чашки, и усмехнулся. Они все так были уверены, что он вот-вот умрёт. Сыграли слишком рано – теперь пожинают плоды. Впрочем, это только всё упрощает. Одним махом по всей Национальной республике избавиться от них всех. Не нужно больше стрелять в пустоту – предатели показались сами, и в итоге уже скоро их дни будут сочтены."
 griffonRepublic.285.a:0 ""Надеюсь, это последняя чистка, которую мне придётся проводить.""

 griffonRepublic.286.t:0 "Делегаты прибывают в Грифенхейм"
 griffonRepublic.286.d:0 "Потребовались тысячи рабочих и огромные суммы денег, но великий купол Храма Борея в Грифенхейме был восстановлен, а здание - переоборудовано под новые палаты пан-грифоньего конгресса. Не осталось и намёка на последствия артиллерийского обстрела, который разрушил здание. Остались лишь украшающие стены гобелены, на которых были изображены битвы, что и разрушили упадочную Империю.\n\nДелегатов разместили под куполом. Их избирали путём голосования после проверки избирательной комиссией и получения членства в ГНРФ. Делегаты были абсолютно намеренно перемешаны случайным образом, а не рассажены по регионам или их предыдущей политической принадлежности.\n\nТам был прихорашивающийся фашист-францистриец Витторио Феличе, говоривший на ломаном герцландском языке с делегатом из Аквелии, которой некогда состоял в ПДА, но теперь наконец-то увидел преимущества пан-грифоньей идеологии. Там был пони из Фетизии, кричащий на бывшего Чёрного Плаща из Хеллквилла, а между ними сидел явно раздражённый казак-националист-священник.\n\nКак раз в тот момент, когда в зале был готов вот-вот вспыхнуть хаос, Хирон Штормфезер поднялся на центральную трибуну, поприветствовал делегатов от имени президента-маршала и открыл первую сессию пан-грифоньего конгресса."
 griffonRepublic.286.a:0 "Добро пожаловать, делегаты!"

 griffonRepublic.287.t:0 "Длинный список правил"
 griffonRepublic.287.d:0 "Президентские выборы приближаются, и национальная избирательная комиссия опубликовала свод правил и принципов для кандидатов на высший государственный пост. Если нормы, регулирующие пан-грифоний конгресс, были строгими, то новые регуляции оказались ещё строже, ведь президент должен стать новым лицом всей Национальной Республики.\n\nПрежде всего, кандидат обязан продемонстрировать непоколебимую верность трём принципам. Это означало, что не могло быть либералов, чьи идеи ограниченного правительства и политических свобод якобы ставили под угрозу безопасность; не могло быть и социалистов, чья «несостоятельная» экономическая система, по мнению комиссии, подрывала процветание; не было места и для сторонников пацифизма во внешней политике, поскольку это противоречило принципу безопасности. Регионалисты также исключались, ведь национализм, по мнению комиссии, мог быть только пан-грифоньим – любые местные культурные отклонения считались угрозой общим традициям и идентичности. И, разумеется, не допускались монархисты, алмазные псы, криптомонархисты, интернационалисты и многие другие. Каждый кандидат должен был собрать минимум тысячу подписей в каждом регионе Национальной Республики, а также провести общенациональную кампанию как дополнительную защиту от регионализма.\n\nГармонистские и социалистические республики по всему миру осудили эти меры, заявив, что они фактически запрещают участвовать в выборах любому кандидату, не обещающему продолжения политики Сантейла, и назвали Национальную Республику фиктивной фашиствующей демократией. Хотя никаких оппозиционных партий не существует – ГНРФ остаётся единственной законной партией в Грифонии – многие местные лидеры призвали грифонов своих общин бойкотировать выборы. Некоторые из них были даже арестованы за «подстрекательские лозунги», которыми они описывали правила комиссии."
 griffonRepublic.287.a:0 "Ни регионалистов, ни либералов, ни социалистов? А кто вообще остался?!"

 griffonRepublic.288.t:0 "Первые выборы"
 griffonRepublic.288.d_kem:0 "После нескольких недель агитации, настал день голосования. Президент будет избран в два тура, во втором туре будут соревноваться лишь два самых популярных кандидата. Так сделано для того, чтоб на выборах не победил кандидат с наибольшей поддержкой лишь в одном регионе, который был бы неспособен представлять всю нацию как таковую.\n\nСамый известный кандидат - Хирон Штормфезер, который был с Сантейлом с самого начала, и обладает невероятным влиянием. Почти весь нынешний госаппарат был на его стороне, как и армия. Он обещает продолжать политику Сантейла, в том числе и дальше укреплять Грифонье-Речьеземскую границу. Впрочем, многие видят в нём лишь подражателя, и его оппоненты заявляют, что в случае избрания Штормфезера президентом, в нашей республике настанет эпоха застоя и слабости.\n\nВторым кандидатом был Дитрих Мах, который пробился вверх по карьерной лестнице в годы покорения Герцланда, и с тех пор оставался доверенным лицом Сантейла. Мах выступает за дальнейшую централизацию Национальной республики, оправдывая это беспорядками на окраинах, также стремясь обучать всех гриффишу и насаждать во всех аспектах жизни корпоративизм под контролем государства. Также он желает расширить свою партию, ГНРФ, и сделать её основным институтом страны, вместо армии. Его оппоненты винят его в том, что он - герцландский националист, ничем не лучше регионалистов, и его поддержка весьма слаба за пределами Герцланда.\n\nТретий кандидат - Александр Кемерскай-младший. Он полагается на культ двух маршалов и рассматривается как более умеренная альтернатива Штормфезера и Маха. Он довольно расплывчато выражал свою позицию, его лозунги, в основном, говорят о "поддержке простых грифонов" и "уважению наследия своего отца и Рейнхарда Сантейла". Его самое главное обещание, которым он больше всего и отличается от других кандидатов, - разрешить оппозиционные партии, такие как НРП, при условии, что те будут следовать Трём Принципам. Его больше всего поддерживают те, чьи сердца требуют перемен, пусть и убеждённые демократы и гармонисты решили бойкотировать выборы, так как "наивно верить, что от Кемерская-младшего можно ожидать больше, чем контролируемую оппозицию и фиктивные выборы."\n\nВ конце-концов, явка оказалась низкой, но все четыре кандидата согласились с результатами. В итоге, Рейнхард Сантейл наконец уступает пост..."
 griffonRepublic.288.d_sun:0 "После нескольких недель агитации, настал день голосования. Президент будет избран в два тура, во втором туре будут соревноваться лишь два самых популярных кандидата. Так сделано для того, чтоб на выборах не победил кандидат с наибольшей поддержкой лишь в одном регионе, который был бы неспособен представлять всю нацию как таковую.\n\nСамый известный кандидат - Хирон Штормфезер, который был с Сантейлом с самого начала, и обладает невероятным влиянием. Почти весь нынешний госаппарат был на его стороне, как и армия. Он обещает продолжать политику Сантейла, в том числе и дальше укреплять Грифонье-Речьеземскую границу. Впрочем, многие видят в нём лишь подражателя, и его оппоненты заявляют, что в случае избрания Штормфезера президентом, в нашей республике настанет эпоха застоя и слабости.\n\nВторым кандидатом был Дитрих Мах, который пробился вверх по карьерной лестнице в годы покорения Герцланда, и с тех пор оставался доверенным лицом Сантейла. Мах выступает за дальнейшую централизацию Национальной республики, оправдывая это беспорядками на окраинах, также стремясь обучать всех гриффишу и насаждать во всех аспектах жизни корпоративизм под контролем государства. Также он желает расширить свою партию, ГНРФ, и сделать её основным институтом страны, вместо армии. Его оппоненты винят его в том, что он - герцландский националист, ничем не лучше регионалистов, и его поддержка весьма слаба за пределами Герцланда.\n\nТретий кандидат - Чириако Медиате, скандальный революционер из Арантиги. Некоторые считают его коммунистическим предателем, а другие - защитником простых грифонов. Он выступает за "социал-патриотизм", который сочетает в себе эгалитарную государственную экономику с ревностным национализмом и полным подчинением личности государству. Избирательная комиссия едва-едва одобрила его кандидатуру, но Чириако неожиданно оказался весьма популярным на периферии, где многие просто не хотят видеть во главе государства ещё одного герцландца.\n\nВ конце-концов, явка оказалась низкой, но все три кандидата согласились с результатами. В итоге, Рейнхард Сантейл наконец уступает пост..."
 griffonRepublic.288.a:0 "Хирону Штормфезеру, заслуженному наследнику!"
 griffonRepublic.288.b:0 "Дитриху Маху, юному генералу!"
 griffonRepublic.288.c:0 "Александру Кемерскаю-младшему, во имя двух маршалов!"
 griffonRepublic.288.e:0 "Чириако Медиате, арантигскому революционеру!"

 griffonRepublic.289.t:0 "Выплачивание старого долга"
 griffonRepublic.289.d:0 "Грифон и пони, не обращая внимания на порывы холодного ветра, подошли к берегу великого озера, словно повторяя свою первую встречу много лет назад. Тогда Фианна была куда моложе – просто дочерью правящей семьи Сноуфлейк. Оскар же сильно постарел: тот крепкий грифон средних лет, отправившийся в изгнание из Клаудбьюри, навсегда остался в прошлом.\n\nХотя прежде семья Оскара долго защищала северные границы империи от народа Фианны, его скромность, проявившаяся при личном знакомстве, вскоре покорила сердца пони, когда он обратился к племенам с предложением заключить конкордат между грифонами и пони на севере. Именно из земель Фианны Оскар поддерживал связи в Клаудбьюри, привлекая консерваторов из НРП и военных, что в итоге вернули его на трон. И именно эти земли он теперь возвращал Фианне. Это было ответной благодарностью за давнюю доброту и за дружбу, что возникла между Оскаром, чьи родственники по разным причинам остались в Клаудбьюри, и Фианной, в юности относившейся к герцогу как к родному дяде.\n\nОни улыбнулись друг другу и поставили подписи на документе. Пони и грифоны севера будут объединены, а новые отношения, построенные на доверии, расцветут и будут крепнуть ещё многие десятилетия."
 griffonRepublic.289.a:0 "Державы севера едины!"

 griffonRepublic.290.t:0 "Сделка, от которой содрогнутся небеса"
 griffonRepublic.290.d:0 "Мы получили очень неожиданное предложение от грифонов. Президент-маршал Сантейл из Национальной Республики Грифонов высоко оценил нашу приверженность республиканизму и национализму, так что предложил объединить наши альянсы в единый Гриффкингский Пакт, дабы вместе противостоять загнивающим социалистическим и монархическим режимам, всё ещё строящим козни против нас на других континентах. Хотя некоторые умеренные в наших рядах называют Сантейла тираном или даже мясником, многие в нашей великой Республике Речных Земель считают его провидцем.\n\nА если дело дойдёт до драки, то, наверное, лучше считать Сантейла другом, а не врагом."
 griffonRepublic.290.a:0 "Конечно, давайте работать вместе!"
 griffonRepublic.290.b:0 "Вежливо отказаться."

 griffonRepublic.291.t:0 "The Ultimate Betrayal"
 griffonRepublic.291.d:0 "The administration's efforts to establish good governance in the Herzland had been obstructed at each step of the way, but despite every setback, things proceeded at a steady pace. However, things would change when Griffenheim got word of the situation in the North; while Herzland continued to experience growing violence and protests across major cities, the Cloudburians had been relatively quiet ever since the administration moved southwards. To the government's shock, this serenity was not compliance, but a silent plot that had been in place ever since the start of the Reconstruction Mandate, and would culminate in the Republic's legitimacy being shattered in the eyes of the population for good.\n\nWe have been so focused on bringing Herzland to heel that we've allowed treachery to grow in our old capital; the long dethroned Oskar I, Duke of Cloudbury, had not been publicly seen for many years since he fled the nation in the aftermath of the Republic's arrival. But now, the old griffon had returned, and the Cloudburians, displeased by our recent policy decisions, have rallied behind him!\n\nAs soon as Griffenheim caught wind of this, the Republican Army was called to mobilize immediately, but it seems large portions of the Cloudburian personnel have defected and gone North, leaving our loyal troops dazed and lacking coordination. To the President's horror, it seems there is nothing we can presently do."
 griffonRepublic.291.a:0 "Oh, dear Boreas, not again..."
 FAT_north_secedes_tt:0 "§CCloudbury secedes from the Republic!§!"

 griffonRepublic.292.t:0 "The Archonic League"
 griffonRepublic.292.d:0 "Centered around the city of Romau, the traditional seat of the Eyrite Archonate, an ever-present thorn in the Republic's side has shown itself again: the old Archons, rallied under the martial leadership of Proteus, have seized control of the city and surrounding countryside! More army desertions followed, with those loyal to these decadent religious institutions fortifying their positions and preparing for confrontation."
 griffonRepublic.292.a:0 "Damn these relics of the Empire!"
 griffonRepublic.292.b:0 "For Boreas, Arcturius and Eyr!"

 griffonRepublic.293.t:0 "The Herzland Popular Army"
 griffonRepublic.293.d:0 "In the south, under the protection of the Scheißwald Forest, old communist militias have taken advantage of the ongoing chaos - rebel leaders have joined forces with rioting crowds and expelled our garrisons from Griffing, rallying under a so-called \"General Assembly of the Herzland\"; claiming to represent the people first and foremost, these rebellious leftists have swayed another portion of our armed forces to their side, and are mobilizing across the borderlands under the guise of a Popular Army. They swear they will dislodge the burgeois democracy of Griffenheim and bring freedom to the people of Herzland."
 griffonRepublic.293.a:0 "Kemerskai tried to warn us about these damn communists..."
 griffonRepublic.293.b:0 "The people of Herzland shall finally throw off their shackles!"

 griffonRepublic.294.t:0 "The Imperial Restoration Front"
 griffonRepublic.294.d:0 "Inevitably, the treacherous snakes play their hand; just as all those decades ago, the North of the Herzland, centered around the old Duchy of Strawberry and with the widespread support of Bronzehill, Imperial loyalists have defected from both the Republican Army and Griffenheim, rallying their forces around Readewetter and preparing to retake the imperial capital from the Republic."
 griffonRepublic.294.a:0 "Will they never give up?!"
 griffonRepublic.294.b:0 "The Empire rises from the ashes!"

 griffonRepublic.295.t:0 "The President-Marshal Returns"
 griffonRepublic.295.d:0 "Alexander pinched his claw, hoping to awake from this bad dream. The twists and turns of Griffenheim's streets were still etched in the back of his mind, and the Palace's silhouette in the sky hadn't changed one bit. When his convoy brought him to the Republican administration's war room, hastily set up by the loyal Army personnel that hadn't fled the city, the aging Marshal felt like a ghost, walking down the old palace halls. Sirens blared in the distance. Busy army griffs scuttled past him, giving nothing but a token hunch of their backs in reverence. Were it not for his now adult son walking beside him, keeping him up to date on the situation on the ground, Alexander would've thought he'd just awakened from a long nightmare, and that it was still that day when he heard of the Duchess' treachery, all those decades ago.\n\nAll these years, all these sacrifices, all these griffons lost. And he was right back where he had started.\n\nWhen he came into the war room, it went silent. There they were, gathered: all the faces he'd grown so accustomed to, ever since he'd fled with them to Cloudbury. Heinrich, ever the pragmatist, scribbled hasty notes to his staff, looking unfazed by the predicament. Sunglider bowed his head with a measure of shame, but still met Alexander's iron stare. Astler couldn't bring himself to look the Marshal in the eyes at all. All the old members of the National Republican Party were still there with him, and none dared say a word. They stood around him like young chicks dreading the scorn of their father. Only, in truth, for all their disagreements, and even their failures, Kemerskai couldn't bring himself to be angry with them. He instead channeled his rage outward, to the traitors that gathered their strength across the Herzland. To the odious Archons, to the lapdogs of the old regime; to the noble scum in the North, to the anarchists in the South; to all these bitter creatures, to all the festering shadows of the Empire! He had done it, despite all the odds. He had defeated them again, and yet, they refused to let the Empire go!\n\n\"We will discuss what is to be done of the civilian government later\", Alexander said without skipping a beat, getting all eyes on him. \"I've given everything for the future of the Republic; and I believe I speak for us all when I say, may Boreas smite me if I allow it all to fall to waste now!\""
 griffonRepublic.295.a:0 "Ready the broadcast for the President-Marshal."
 
 griffonRepublic.296.t:0 "The Griffonian Republic Proposes Unification"
 griffonRepublic.296.d:0 "After establishing diplomatic channels with the National Republican Party in Griffenheim, the Griffonian Republic is now proposing that Aquileia be integrated into their Pangriffonian project as a federated province. The constitutional rights of our citizens would be protected under the Republican constitution, but this would meant the loss of our independence."
 griffonRepublic.296.a:0 "The Pangriffonian project isn't dead yet. We accept!"
 griffonRepublic.296.b:0 "Are they serious? Obviously that's out of the question."

 griffonRepublic.297.t:0 "Unification With Aquileia"
 griffonRepublic.297.d:0 "The Aquileian government has agreed to unification! Work is already underway to begin integrating Aquileian territories under a federated province, which will allow local concerns to be heard through a regional government, while still uniting the Republics into one coherent body. The Pangriffonian project takes a leap in the right direction."
 griffonRepublic.297.a:0 "Hurray!"

 griffonRepublic.298.t:0 "Aquileia Refuses!"
 griffonRepublic.298.d:0 "Despite our best efforts to establish strong cooperative channels for diplomacy and economy, the Aquileian government has shunned the Republic's offer of peaceful unification. This cements the harsh reality of their revolution: it has been consumed by reactionarism and regionalism. We can ill afford to tolerate a nominal republican government opposed to the pangriffonian project. Unfortunate as it may be, it seems we will only be able to resolve this conflict through violence."
 griffonRepublic.298.a:0 "So be it. We do it the hard way."

 kemerskaiSpeech.1.t:0 "Кемерскай выступает с некрологом Гроверу V"
 kemerskaiSpeech.1.d:0 ""Гровер V, император всех Грифонов, король Герцланда, герцог Грифенхейма, победитель Революции 978 года, умер в возрасте 47 лет. Хотел бы я проронить хотя бы слезу о нём, но он не только ничего не сделал для простогрифонов, но и сделал жизнь многих из них хуже. Я уверен, многие из вас поддержат меня в моём мнении о том, что он делал всё неправильно. Он позволил Катерину сгореть, отдал власть архонтам и похоронил любые надежды на светскую власть и реформы в Империи, даже перед угрозой двух революций - уже произошедшей, и грядущей."\n\n"Он допустил независимость восточных марок - Лонгсворда и Хеллквилла, которые, обретя независимость, начали геноцид пони на своих землях, и отдал Грифонстоун бессильному Совету и грифону, настолько старому, что все окружающие зовут его "Дедушка". Даже своей смертью Гровер V навредил грифонам, оставив их страну в хаосе и беспорядке, так что я готов одобрить его смерть. Его сыну нет и 6, и вместо него будет править Регентский совет, такой же, как и тот, против которого мы восстали в 978 году."\n\n"В любом случае, теперь, с его смертью, начинается новая эра для всех грифонов. Республиканцы и им сочувствующие уже начали борьбу против своих феодалов в Катерине, Энгривере и Ромау."\n\n"Я уверен, когда наши потомки напишут книги об этом периоде, они назовут смерть Гровера V переломным моментом.""
 kemerskaiSpeech.1.a:0 "Такова участь тиранов."

 kemerskaiSpeech.2.t:0 "Речь Кемерская про Аквелию"
 kemerskaiSpeech.2.d:0 ""Дорогие граждане."\n\n"Я тысячи раз говорил, что когда-то свет Республики снова осветит всю Грифонию, и я оказался прав. Вторая Аквелийская Революция, возглавленная старым маршалом Теодором Верани, началась, и старая монархия снова пала. Республиканские революции 978 и 980 вернулись, мои дорогие соотечественники, но это лишь начало великой борьбы - борьбы, которая снова закончится триколором над Грифенхеймом!"\n\n"Пока я декламирую эту речь, республиканское правительство работает над официальным признанием правительства Теодора Верани как легитимного правительства Аквелии, и я надеюсь, что уже в ближайшие несколько месяцев наши правительства будут бороться вместе, коготь о коготь, против монархистов, отобравших Грифоний континент у народа."\n\n"Это начало нового рассвета Грифонии и мира - и мы не прекратим бороться за мечту о демократии, когда мир так к ней близко!""
 kemerskaiSpeech.2.a:0 "Поздравляем, Верани!"

 kemerskaiSpeech.3.t:0 "Речь Кемерская про Скайфол"
 kemerskaiSpeech.3.d:0 ""Скайфол - место, полное противоречий. Мало пороков не повидало улицы Скайфола, и при этом там были конкурентоспособные грифоны, амбициозные мечтатели. Они торгуют и с тиранами, и с героями, и как только ты плохо о них подумаешь, они тебя уже удавят."\n\n"Мало кто не знаком, хотя бы мимоходом, с его старым канцлером, Гисленом Гишаром, и ещё меньше могут о нём сказать что-то хорошее, не кривя душой. Он стабильно, многие годы правил в Скайфоле, наживаясь на беспорядках в Грифонии. И всё же! Скайфол снова удивляет! С приходом его племянницы, многие скажут, что Скайфол преобразился в простую олигархию, но когда я прошу кого-то рассказать о достижениях канцлера Гильдедвинг, я опять удивляюсь."\n\n"Многие сказали, что для свержения Гислена, нужен был настоящий военный переворот и гражданская война, но всё же Женевьева Гильдедвинг добилась этого без кровопролития. Когда-то господствовавшие олигархи были сломлены, а народ - победил. Республиканская мечта горит ярким пламенем в Герцланде, а Скайфол, как всегда, справился по своему.""
 kemerskaiSpeech.3.a:0 "Огонь республиканизма распространяется!"

 kemerskaiSpeech.4.t:0 "Речь Кемерская про Биколини"
 kemerskaiSpeech.4.d:0 ""Совсем недавно, в прекрасном Карфине, на берегах Вингбардии, демократии был нанесён жестокий удар когтями тирании. Не заполучив власть по воле народа, фашисты вместо этого пошли маршем на Карфин и взяли его силой. Многие, как тут, так и за рубежом, считают, что генерал Биколини может быть возможным союзником республиканского дела, но я должен всем показать, что такие убеждения как минимум ошибочны, как максимум - бесчестны."\n\n"Когда республика появилась, её целью стало бороться против тирании и за права, которые для нас священны и неоспоримы. Она поклялась свергнуть тиранов-королей и позволить всем испить из прекрасного кубка свободы. Это вингбардийское движение прямо нам противоположно, больше желая восславлять своего короля-марионетку, пока их армия топчет всех, кто посмеет что-то сказать против."\n\n"Дорогие республиканцы. Сомнения быть не может, что если лет тридцать назад, этот грифон владел бы такой же властью, он бы никогда не стал нашим союзником или товарищем. Скорее он был бы жесточайшим из кровопийц, прославляемых контрреволюционерами за их усилия в подавлении революции, даже если бы он потом узурпировал титул императора, объявив себя защитником Империи."\n\n"Какие бы сходства не разглядели некоторые грифоны между революцией и этим "Дуче", мы в корне противоположны - противоречат друг другу как наши ценности, так и цели. В нём мы видим не революционера, но предсмертные и злостные хрипы старого порядка. Столкнёмся ли мы с ним в бою - в когтях судьбы, но уж никогда, никогда, и ещё раз никогда и речи быть не может быть о сотрудничестве с этим тираном!""
 kemerskaiSpeech.4.a:0 "Тираном и автократом."

 kemerskaiSpeech.5.t:0 "Речь Кемерская о перевороте Сиклкло"
 kemerskaiSpeech.5.d:0 "— Дорогие граждане.\n\n— Я почти горд объявить вам, что революционное социалистическое правительство Скайнавии, отколовшееся от нашей великой республики в 986 году, пало и было захвачено деспотом-автократом, забывшим об истинной верности социализму и революции. Аспер Сиклкло, некогда идеалист и военный генерал, упразднил законодательные органы Скайнавии и продолжил концентрировать власть в своих копытах. Из-за этого чудовищного предательства принципов свободы, социализма и революции революционная Скайнавия рухнула.\n\n— Я предвидел это десятилетия назад. Даже когда они впервые откололись, было ясно, что их революция – лишь идеалистическая мечта. Они убили многие тысячи пони во время жестокого завоевания Северных Племён и построили Новую Скайнавию на их крови и пепле. С тех пор и по сей день их революция служила республике наглядным примером того, к чему приводит безрассудный идеализм."
 kemerskaiSpeech.5.a:0 "Мы с самого начала знали, что эта революция была прогнившей."

 kemerskaiSpeech.6.t:0 "Все на борьбу с Донкло!"
 kemerskaiSpeech.6.d:0 "— Братья и сёстры, в Империи произошло нечто, о чём вы все должны знать. Фердинанд Донкло, имперский генерал, командующий войсками в Грифенхейме, захватил столицу и убил юного императора Гровера VI. Есть сведения, что он лично застрелил его, так изуродовав тело, что его невозможно было опознать. Теперь он зовёт себя лордом-протектором. Если он будет защищать Империю так же, как защищал Императора, то все грифоны Герцланда в опасности. Он и его сторонники ничем не лучше фашистов Вингбардии.\n\n— Но и у нас есть свои фашисты – Грифоний Национальный Революционный Фронт, — продолжал Кемерскай. — Они проповедуют идеологию, оправдывающую убийство детей и продвижение безумцев в верхние эшелоны власти.\n\n— Этот "лорд" ещё опаснее любой абсолютной монархии. Он жаждет власти настолько, что готов разрушить весь континент ради своих амбиций. Мы должны выступить против него, вернуть Грифенхейм и низвергнуть этого тирана. Он – воплощение реакции, против которой борются все республиканцы. Он должен быть наказан за свои преступления. Его сторонники говорят: "Да здравствует лорд-протектор". Мы же выступаем с призывом: "Все на борьбу с лордом-протектором!".\n\nИ хотя вскоре выяснилось, что Донкло лишь лично застрелил Гровера VI, речь Кемерская звучала великолепно. В следующие несколько дней на призывные пункты хлынул поток добровольцев, готовых биться против тирана."
 kemerskaiSpeech.6.a:0 "Этот "лорд-протектор" – закономерное проявление монархического упадка."

 kemerskaiSpeech.7.t:0 "Начало Второй Революции"
 kemerskaiSpeech.7.d:0 ""Здравствуйте, мои дорогие граждане."\n\n"Пока эта речь распространяется по всем нашим землям, вы вооружаетесь и идёте на юг, готовясь к величайшей для нас битве за последние несколько десятилетий. Наше дело войдёт в историю, ведь мы боремся с Империей, долго закалявшейся ради сохранения тирании и удержания нашего народа в своих кандалах. Эта сила уже завоевала весь Герцланд, стремясь снова удержать его в своих грязных когтях силой, заливая эти земли их кровью."\n\n"Тем не менее, наша приверженность республиканскому делу была и будет крепка ещё со времён первой революции. Мы спотыкались, но не упали. Огонь 978 года всегда будет гореть в наших сердцах, а наша верность свободе, демократии и процветанию закалена в этих испытаниях. Мы теперь едины в нашей борьбе больше, чем когда-либо, и мы победим, ведь грифоны всего континента жаждут свободы."\n\n"От Аквелии до Грифуса, угнетённые борются, требуя прав быть большим, чем какими-то рабами, и в этот раз, тираны и их амбиции будут разбиты."\n\n"В этот раз, наш долг, как первых республиканцев - вести всех по пути освобождения, который как никогда вдохновляющ, и до самого конца мы исправим все ошибки, совершённые за все эти годы. Мы будем действовать не только за себя, но и за ещё нерождённых, чтобы они могли насладиться сладким нектаром из кубка свободы."\n\n"Наш путь будет долгим и непростым, за золотую свободу придётся платить кровью и слезами, но это цена, которую мы должны заплатить. Братья и сёстры, боровшиеся ещё с первой революции, дети почивших товарищей, занявшие места своих родителей, галантные грифоны Клаудбьюри и все существа по всему миру, восставшие против угнетателя: Сегодня Начинается Вторая Революция.""
 kemerskaiSpeech.7.a:0 "За Республику!" # РЕСПУБЛИКАНСКИЕ ВПЕРЁД РЕСПУБЛИКАНСКИЕ ВПЕРЁД РЕСПУБЛИКАНСКИЕ ВПЕРЁД РЕСПУБЛИКАНСКИЕ ВПЕРЁД

