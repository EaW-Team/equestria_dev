 griffonRepublic.129.t:0 "An Offer Of Betrothal"
 griffonRepublic.129.d:0 "The Duchy of Cloudbury has sent an envoy to Griffenheim with a peculiar proposal: the Duchy's heir, Ophelia Saxhagen-Plumenjar, is soon to be of age, and the ducal government wishes to offer her claw in marriage to the young Emperor-to-be Grover VI, binding the two young griffons in a betrothal to be honored when the two are adults.\n\nThis proposal comes at a contentious time for the Empire. While it is traditional, indeed expected, for the Emperor to marry a member of the nobility from among his subjects, Cloudbury was never as politically relevant as the Heartlands, Aquileia or Southern Griffonia. However, given the current state of political circumstances, Cloudbury has so far proven a much more valuable ally to have than otherwise. With the revolutionary fervor stewing in the old centers of power in Griffonia and Cloudbury firmly allied with the imperial restorationist cause, it could very well be that times have changed and this betrothal makes the most sense for the future of the Empire.\n\nOphelia herself seems to be a capable and educated griffoness, raised in the turbulent years that led to the traitorous Republic's fall and the ducal restorationist in Cloudbury."
 griffonRepublic.129.a:0 "Accept the betrothal."
 griffonRepublic.129.b:0 "Refuse the betrothal."

 griffonRepublic.130.t:0 "The Last Republican"
 griffonRepublic.130.d:0 "\"Oh, don't give me that face, Schnabel\", Rosewing sang with a pleasurable grin. \"After all the strings I pulled to make sure you could travel without risking getting hung by authorities, this is how you repay me? With unkindness?\"\n\nSunglider hadn't said anything for a while. Sipping on his coffee and blinking his tired eyes, the whole affair felt like a surreal dream. He had spent years dreading what would've happened when Alexander failed to stop the warlords and their plans, every night since his exile he held his breath in antecipation of what would happen in Cloudbury. But Cloudbury was... In a better state than he had left it. Under the cold sun of a quiet afternoon, rythmic clacks of silverware filled the cafe's air, and Rosewing had a spring in her step that she lacked even when Sunglider had last seen her, almost two decades ago.\n\n\"Was it to mock me, Nicole?\", Sunglider whispered, barely audible, in a feeble tone. \"Did you want me to come for myself so I could see your glorious triumph?\"\n\n\"No\", spat the griffoness. \"I gave you some slack for Alex' sake, Schnabel, and for no other reason. It's... What we would've wanted me to do.\"\n\n\"How quaint\", voiced Sunglider, livid beyond belief. \"So what happens now? Do we go to Griffenheim so we can cajoule the Emperor together?\"\n\n\"You're really trying to drown in a shallow current, aren't you?\" Rosewing got up, threw on her jacket and tied her feathers in a knot. \"I've done for you what I had to, Schnabel, and that's the end of that. What happens now is you get yourself a job besides politics and you live your life.\"\n\nRosewing paid for her share of the bill, and with a flap of her wings, took off just outside the cafe and flew until she disappeared with the sunlight. Sunglider massaged his aching head, and sighed.\n\nThe NRP was for all intents and purposes gone. In exile, his connections either turned tail or found new alledgiances. It was the end. He would've brought himself to blame and hate Kemerskai for this, if he had the strength to."
 griffonRepublic.130.a:0 "So this is how republicanism dies: with a whimper."

 griffonRepublic.131.t:0 "The Ducal Government Requests Skyfall"
 griffonRepublic.131.d:0 "The Duchy of Cloudbury wishes for the port of Skyfall to be transferred under their purview, rather than as a direct territory of the Griffonian Empire. The Knights of Cloudbury have served us well so far, and keep in Skyfall would only further benefit them. Still, can the Grand Duke and his Parliament be trusted to make better use of the city than Griffenheim could?"
 griffonRepublic.131.a:0 "Granted; they've earned it."
 griffonRepublic.131.b:0 "Skyfall will serve us better under direct administration."

 griffonRepublic.132.t:0 "The Empire Grants Skyfall"
 griffonRepublic.132.d:0 "Griffenheim has agreed to incorporate the city of Skyfall as a Cloudburian enclave! With a city on the opposite end of the Sky Bay, the Ducal Navy's reach goes much further, and the city itself will serve as an economic and shipbuilding hub which will assure the resurgence of Griffonian naval power through Cloudbury's initiative."
 griffonRepublic.132.a:0 "Splendid."

 griffonRepublic.133.t:0 "The Empire Refuses Our Request"
 griffonRepublic.133.d:0 "Despite our best effort, the regency in Griffenheim has rejected our request for Skyfall and will govern the city directly."
 griffonRepublic.133.a:0 "Unfortunate."

