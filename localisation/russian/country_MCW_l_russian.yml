l_russian:

MCW_peace_with_griffonia:0 "Мир с Макавией"

 # EVENTS # 
peace_with_macawia.1.t:0 "Мир с Макавией?"
peace_with_macawia.1.d:0 "Наши кампании в Грифонии вынудили нас вступить в конфликт с Макавией. Хотя нам и удалось разгромить врагов на континенте, война с гарпиями зашла в тупик. Поскольку противостояние ныне свелось к игре в "гляделки" через океан, быть может, нам стоит оставить всё как есть и предложить Макавии мир?"
peace_with_macawia.1.a:0 "Да, пора с этим покончить."
peace_with_macawia.1.b:0 "Нет, нам просто нужно больше времени."
peace_with_macawia.1.b_tt:0 "§YМы вернёмся к этому вопросу через год.§!"
peace_with_macawia.1.c:0 "Какое нелепое предложение."
peace_with_macawia.1.c_tt:0 "§RУ нас больше не будет возможности подписать мир.§!"

peace_with_macawia.2.t:0 "Предложение от государства [FROM.GetNameDefCap]"
peace_with_macawia.2.d:0 "С нами связались представители державы [FROM.GetNameDefCap]. Осознав, что война зашла в тупик и ни одна из сторон не способна предпринять решительный шаг, они предложили прекратить боевые действия. Разумеется, это будет означать, что нам придётся бросить наших союзников на грифоньем континенте."
peace_with_macawia.2.a:0 "Хорошо. Мы согласны."
peace_with_macawia.2.b:0 "Мы никогда не бросим своих союзников."

peace_with_macawia.3.t:0 "Макавия согласна"
peace_with_macawia.3.d:0 "Макавия приняла наше предложение о прекращении огня и выходе из этой войны. И теперь мы можем приступить к реорганизации территорий их бывших союзников на континенте."
peace_with_macawia.3.a:0 "Наконец-то."

peace_with_macawia.4.t:0 "Макавия непреклонна"
peace_with_macawia.4.d:0 "В кратком ответном послании правительство Макавии отклонило любые предложения о мире. Было заявлено, что они останутся верны обязательствам по освобождению своих союзников, сколько бы времени и усилий это ни потребовало. Похоже, в ближайшее время война не закончится."
peace_with_macawia.4.a:0 "Глупые разноцветные курицы."

 # TOOLTIPS
MCW_allies_in_griffonia:0 "§YЛюбая страна§! в Грифонии, состоящая в альянсе с державой @MCW §Y[MCW.GetName]§!, §Rбольше не считается капитулировавшей§!."