### Events ###

dragon.1.t:0 "Эквестрия требует Пустоши"
dragon.1.d:0 "Сегодня через драконье пламя к нам пришло письмо. На нём стоит печать Эквестрии, а содержимое оказалось довольно необычным. В письме говорится, что Пустоши не имеют выхода к морю, обсуждается ущерб, наносимый драконами при путешествиях между Пустошами и собственно Драконьими Землями, а также цена, которую выплачивают драконы Эквестрии. Письмо завершается просьбой о передаче Пустошей под так называемый «эквестрийский сюзеренитет», что фактически означает передачу им этой территории. Эти земли почти не заселены драконами, так что выполнить просьбу будет довольно легко. Тем не менее это всё равно означает потерю части наших и без того скудных владений. Как мы поступим?"
dragon.1.a:0 "Они могут получить эти Пустоши"
dragon.1.b:0 "Они наши по праву, и мы их не отдадим."

dragon.2.t:0 "Эквестрия снова требует Пустоши" # Только чтобы отображалось в описании фокуса Эквестрии
dragon.2.d:0 ""
dragon.2.a:0 ""

dragon.3.t:0 "Гений"
dragon.3.d:0 "Дорогой дневник,\n\nМне удалось вернуться в пустыню Зебхару. Однако моей точкой назначения был не Азир. Пока нет. Вместо этого моим пристанищем стала небольшая лодка, идущая вверх по Нейлу. Государство [CZR.GetNameDef] было моей целью, а точнее – его столица, [CZR.Capital.GetName]. Это была опасная затея: регион в последнее время был далеко не спокойным, но торговцы, чей путь совпадал с моим, наняли опытных охранников, так что путешествие обещало быть безопасным.\n\nКогда каноэ прибыло, купцы отправились на базар торговать с местными. Моей же целью была Рэйчел. Большая часть местного населения – зебры, которые никогда в жизни не видели пони, но, как мне кажется, некоторые из них должны были видеть коз. И, разумеется, после того как я нарисовал козу на песке, один из жителей указал мне направление.\n\nДом Рэйчел представлял собой самодельную мастерскую или лабораторию. Она явно была изобретательницей и обладала соответствующим складом ума. Это... довольно необычно, поскольку большинство коз, которых мне доводилось встречать, были откровенно туповаты. Как только она увидела меня, то тут же начала засыпать вопросами – кто я и что здесь делаю. В итоге мне пришлось многое о себе рассказать ещё до того, как разговор зашёл о руинах и кристальном шаре. И ни разу за весь диалог моя собеседница не проявила ни малейшего признака скуки.\n\nРэйчел сказала, что кто-то явно хотел, чтобы этот шар был найден именно мной. Это ценный артефакт, и его давно бы обнаружили и украли, если бы он пролежал в куче мусора столько веков. Расхитители гробниц буквально облазили всю пустыню Зебхару и до сих пор роются в руинах. Это было неожиданно, но если подумать, слова Рэйчел звучали логично. На мой вопрос о том, зачем кому-то подкидывать мне этот шар, она ответила, что «они» хотят помочь мне открыть гробницу, в которой содержится нечто ценное. Она не уточнила, кто такие эти «они» или какая именно гробница должна быть найдена, но Рэйчел тоже очень хотела узнать, что скрывается внутри. Поэтому она вызвалась помочь мне всем, чем сможет."
dragon.3.a:0 "..."

### Decisions ###

DRG_seize_spa:0 "Захватить Острова Спа"
DRG_seize_spa_desc:0 "Эквестрия втянута в войну и обращает внимание только на неё, а наши владения в Пустошах были утеряны в хаосе. Справедливо будет взять себе немного земли, чтобы компенсировать потерю. Острова Спа с их многочисленными гейзерами станут прекрасным домом для драконов."

