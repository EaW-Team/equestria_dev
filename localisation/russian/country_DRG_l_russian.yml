DRG_lord_torch:0 "Торч"
DRG_misha: "Миша"
DRG_charcoal: "Чаркоул"
DRG_charcoal_desc: "Чаркоул – воин-дракон с острым чутьём на выгоду и ещё более острой жаждой богатств. Свою репутацию он заработал при отражении атак пиратов-налётчиков, командуя небольшой армией, которую, впрочем, собрал вовсе не из благородных побуждений, а лишь из желания урвать себе долю награбленного.\n\nНесмотря на жадность, Чаркоул остаётся прагматиком и надёжным бойцом, а его отряд даже снискал звание непризнанных хранителей острова – правда, за свои услуги они неизменно берут "плату".\n\nТот, кто сможет обеспечить дракона золотом и сокровищами, получит несравненных блюстителей порядка на своей земле, но стоит казне оскудеть, как выяснится, что верность Уголька является столь же переменчивой, сколь и ветер.\n\n§YАвтор портрета§!: Blakasmoko"

DRG_rockslide: "Рокслайд"
DRG_rockslide_desc: "§YРождён§!: неизвестно, на Драконьих Островах.\n\n§YЗвание§!: генерал\n\n§YБиография§!: В отличие от большинства своих кровных братьев и сестёр, амбиции Рокслайда ограничиваются заботой о собственном комфорте и обеспечением безопасности своих территорий. Не раз соперничающие с ним драконы пытались захватить его земли, и каждый раз обнаруживали, что за его ленивым нравом скрывается крайне умелый воин.\n\nХотя его и называют лентяем, Рокслайд обладает врождённым стратегическим талантом – просто он предпочитает использовать его лишь при крайней необходимости.\n\nТот, кто сумеет побудить его к действию, получит генерала, ценящего стабильность и оборону выше бездумной экспансии. Вот только можно ли его вообще заставить работать, остаётся открытым вопросом.\n\n§YАвтор портрета§!: Blakasmoko"

DRG_garble: "Гарбл"
DRG_garble_desc: "§YРождён§!: неизвестно, на Драконьих Островах.\n\n§YЗвание§!: генерал\n\n§YБиография§!: Гарбл – дракон, получающий удовольствие от доминирования над другими и демонстрации своего превосходства через грубую силу. Некогда он был обычным задирой, но с тех пор сделался настоящим воином и понял, что физическое совершенство – отнюдь не ответ на все вопросы. И хотя его вспыльчивость и дерзость никуда не делись, он превратился в грозного бойца, способного поднимать других одной лишь своей храбростью и непоколебимой верой в драконье превосходство.\n\nХотя в роли лидера он предпочитает прямой натиск более продуманным подходам, Гарбл не лишён тактических навыков – просто он предпочитает действие колебаниям или спорам. Под правильным лидерством из него можно сделать неумолимую силу, но если ничем его не сдерживать, он столь же легко ринется на верную погибель, сколь и на победу.\n\n§YХудожники§!: BunnyShrubby и Blakasmoko"

