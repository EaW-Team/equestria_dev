## Generals
DRG_lord_torch:0 "Торч"
DRG_misha: "Миша"
DRG_charcoal: "Уголёк"
DRG_charcoal_desc: "Уголёк – воин-дракон с острым чутьём на выгоду и ещё более острой жаждой богатств. Свою репутацию он заработал при отражении атак пиратов-налётчиков, командуя небольшой армией, которую, впрочем, собрал вовсе не из благородных побуждений, а лишь из желания урвать себе долю награбленного.\n\nНесмотря на жадность, Уголёк остаётся прагматиком и надёжным бойцом, а его отряд даже снискал звание непризнанных хранителей острова – правда, за свои услуги они неизменно берут "плату".\n\nТот, кто сможет обеспечить дракона золотом и сокровищами, получит несравненных блюстителей порядка на своей земле, но стоит казне оскудеть, как выяснится, что верность Уголька является столь же переменчивой, сколь и ветер.\n\n§YАвтор портрета§!: Blakasmoko"

DRG_rockslide: "Оползень"
DRG_rockslide_desc: "§YРождён§!: неизвестно, на Драконьих Островах.\n\n§YЗвание§!: генерал\n\n§YБиография§!: В отличие от большинства своих кровных братьев и сестёр, амбиции Оползня ограничиваются заботой о собственном комфорте и обеспечением безопасности своих территорий. Не раз соперничающие с ним драконы пытались захватить его земли, и каждый раз обнаруживали, что за его ленивым нравом скрывается крайне умелый воин.\n\nХотя его и называют лентяем, Оползень обладает врождённым стратегическим талантом – просто он предпочитает использовать его лишь при крайней необходимости.\n\nТот, кто сумеет побудить его к действию, получит генерала, ценящего стабильность и оборону выше бездумной экспансии. Вот только можно ли его вообще заставить работать, остаётся открытым вопросом.\n\n§YАвтор портрета§!: Blakasmoko"

DRG_garble: "Garble"
DRG_garble_desc: "§YBorn§!: Unknown, in the Dragon Isles.\n\n§YRank§!: General\n\n§YBiography§!: Garble is a dragon who thrives on strength, dominance, and proving himself through sheer force. Once a typical bully among his kind, he has since hardened into a true warrior, learning through experience that brute strength alone is not always enough. While still hotheaded and prone to recklessness, he has become a formidable fighter, capable of rallying others through sheer bravado and an unshakable belief in draconic superiority.\n\nThough his leadership style often favors direct combat over careful planning, Garble is not entirely without tactical sense—he simply prefers action over hesitation. Under the right guidance, he could be molded into a devastating force on the battlefield, but without restraint, he is just as likely to charge headfirst into disaster as into victory.\n\n§YPortrait By§!: BunnyShrubby and Blakasmoko"

