DRG_graphite: "Графит"
DRG_graphite_desc: "Графит – аномалия среди драконов. Вместо помешательства на золоте она посвящает свою жизнь организации, структурированию и, что важнее, расхлёбыванию тех каш, которые заварили другие. Она превратила свою пещеру в обширный бюрократический офис, доверху забитый отчётами, налоговыми регистрами и детальными планами реформ, которые, по её словам, "наконец принесут хоть какой-то порядок в эти беззаконные земли".\n\nНесмотря на неоспоримую гениальность и одарённость, она также известна своей непреклонностью: неважно, прислушиваешься ты к её советам или нет, она проследит, чтобы ты её точно услышал их, и не остановится до тех пор, пока её слова либо не будут исполнены, либо не будут проигнорированы на свой же страх и риск. Многие правители считают, что спорить с ней – дело куда более утомительное, чем само правление; некоторые даже шепчут, что пережить её нудные нравоучения намного труднее, чем проявить себя в бою.\n\n§YАвтор портрета§!: Blakasmoko"
