##=== Capitulation quotes ===##

EaW_PeaceCap_Desc_EQS: "Дружба была магией."
EaW_PeaceCap_Desc_SOL: "Сверхновую сменила тьма."
EaW_PeaceCap_Desc_NLR: "В конце ей стало жаль свою сестру."
