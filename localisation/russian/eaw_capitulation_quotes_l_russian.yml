EaW_PeaceCap_Desc_CCN: "Дружба стоит того, что умереть за неё."
EaW_PeaceCap_Desc_STG: "Они жили и умирали под красным флагом."
EaW_PeaceCap_Desc_STL: "Эксперимент Старлайт подходит к концу."
EaW_PeaceCap_Desc_OLE: "Волки не будут голодать этой зимой."
EaW_PeaceCap_Desc_GRF: "Мечте о новом мире положили конец пули."
