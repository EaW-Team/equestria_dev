l_russian:
 GATHERING_STORM_NAME:0 "Конец гармонии"
 GATHERING_STORM_DESC:0 "В Эквусе наступила новая эра. Страх и неуверенность распространяются среди пони, пока мир вокруг них стремительно меняется. Власти Эквестрии обеспокоены планами своих соседей – Сталлионграда и Королевства чейнджлингов. Пока коммунисты в Сталлионграде стремительно проводят индустриализацию, королева Кризалис сумела централизовать своё королевство. И хотя Эквестрия встревожена этими событиями, её раздирает множество внутренних конфликтов и неурядиц. Над Эквусом сгущаются тёмные тучи, и одной лишь магии дружбы может не хватить, чтобы спасти страну пони."
 OTHER_GATHERING_STORM_DESC:0 "Прочие страны, большие и малые, не готовы в бездействии, затаив дыхание, ожидать, чем закончится эпоха мировых конфликтов. Недавние исторические события во многом перекроили атлас мира, изменив соотношение сил, и теперь крупные игроки готовы это повторить. Всем придется принимать непростые решения и искать баланс между своими идеалами и холодным прагматизмом, чтобы повлиять на то, каким станет мир в будущем."
 BLITZKRIEG_NAME:0 "Падение Империи"
 BLITZKRIEG_DESC:0 "В Грифонии наступила новая эра. Империя Грифонов рухнула, оставив лишь страх и неуверенность в умах жадной до власти расы грифонов. Из-за коварства царя циклопов Аримаспи легендарный идол Борея был потерян. Император Гровер V столкнулся с отделением бывших вассалов, а также с республиканскими и социалистическими революциями. Мало кто ожидает, что правитель переживёт следующие несколько лет. Революционеры по всему континенту жаждут бросить вызов старым монархиям, а пони с востока вовсю готовятся к своей войне – вскоре хаос снова охватит Грифонию."
 AFTERMATH_NAME:0 "Последствия Шторма"
 AFTERMATH_DESC:0 "В Зебрике наступила новая эра. Завоевания Короля Шторма, безумного йети из южных земель, оставили большую часть континента в руинах. Государства пытаются возродиться из обломков, пока в бушующем хаосе старые политические проблемы вновь выходят на поверхность. Современный, стремительно меняющийся мир несёт в себе опасность для многих народов, что веками выдерживали испытание временем. Хотя борьба с захватчиками-йети завершилась, на горизонте собираются грозовые тучи новых войн."
