l_russian:
 GATHERING_STORM_NAME:0 "Конец гармонии"
 GATHERING_STORM_DESC:0 "В Эквусе наступила новая эра. Страх и неуверенность распространяются среди пони, пока мир вокруг них стремительно меняется. Власти Эквестрии обеспокоены планами своих соседей – Сталлионграда и Королевства чейнджлингов. Пока коммунисты в Сталлионграде стремительно проводят индустриализацию, королева Кризалис сумела централизовать своё королевство. И хотя Эквестрия встревожена этими событиями, её раздирает множество внутренних конфликтов и неурядиц. Над Эквусом сгущаются тёмные тучи, и одной лишь магии дружбы может не хватить, чтобы спасти страну пони."
 OTHER_GATHERING_STORM_DESC:0 "Прочие страны, большие и малые, не готовы в бездействии, затаив дыхание, ожидать, чем закончится эпоха мировых конфликтов. Недавние исторические события во многом перекроили атлас мира, изменив соотношение сил, и теперь крупные игроки готовы это повторить. Всем придется принимать непростые решения и искать баланс между своими идеалами и холодным прагматизмом, чтобы повлиять на то, каким станет мир в будущем."
 BLITZKRIEG_NAME:0 "Падение Империи"
 BLITZKRIEG_DESC:0 "В Грифонии наступила новая эра. Империя Грифонов рухнула, оставив лишь страх и неуверенность в умах жадной до власти расы грифонов. Из-за коварства царя циклопов Аримаспи легендарный идол Борея был потерян. Император Гровер V столкнулся с отделением бывших вассалов, а также с республиканскими и социалистическими революциями. Мало кто ожидает, что правитель переживёт следующие несколько лет. Революционеры по всему континенту жаждут бросить вызов старым монархиям, а пони с востока вовсю готовятся к своей войне – вскоре хаос снова охватит Грифонию."
 AFTERMATH_NAME:0 "Последствия Шторма"
 AFTERMATH_DESC:0 "В Зебрике наступила новая эра. Завоевания Короля Шторма, безумного йети из южных земель, оставили большую часть континента в руинах. Государства пытаются возродиться из обломков, пока в бушующем хаосе старые политические проблемы вновь выходят на поверхность. Современный, стремительно меняющийся мир несёт в себе опасность для многих народов, что веками выдерживали испытание временем. Хотя борьба с захватчиками-йети завершилась, на горизонте собираются грозовые тучи новых войн."

 eaw_debug.4.t:0 "Утерянное искусство"
 eaw_debug.4.d:0 "Грогар вошёл в обширную сеть подземелий под Тамбелоном. Множество существ, заключённых в клетках этого места, почувствовали Его присутствие и моментально замолчали. Он посмотрел на них и вспомнил всё, что хотел с ними сделать перед тем, как эта проклятая пони Гасти изгнала Его в Измерение Тьмы.\n\nТеперь Грогар наконец мог исполнить Свои планы.\n\nОн спускался всё ниже, пока не достиг уровней, где содержались Его более старые создания. Они были по своему красивы, даже неудачные эксперименты, которые с трудом существуют и постоянно страдают. В обучении есть своя прелесть, поэтому Отец оставил все неудачные опыты как напоминание Себе. Однако самыми прекрасными были те создания, чьё сотворение увенчалось успехом. Особенно Он гордился гидрами, созданиями, которые были сделаны, чтобы противостоять Его древнему врагу, драконам. Впрочем, здесь было много и других хороших существ. Некоторые были созданы другими козлами, Его лучшими учениками. Жаль, что армия Гасти перебила множество Его творений, но, к счастью, они так и не обнаружили хранилище. В противном случае все монстры до единого были бы безжалостно убиты этими глупыми пони.\n\nТеперь пришло время спустить этих монстров и использовать животных в своих целях. Мощь Тамбелона будет медленно, но верно восстановлена. Производство ужасных чудовищ возобновится, и мир вновь познает страх перед козлами."
 eaw_debug.4.a:0 "Искусство возродится вновь."
 
 eaw_debug.20.t:0 "Конфликт Доктрин"
 eaw_debug.20.d:0 "Оскар и Джайлз вошли в тронный зал Грогара, после чего немедленно распластались перед Ним и поцеловали каменный пол.\nОтец на это только фыркнул: — Встаньте. Что вам надо?\nКак только оккультист поднялся, он сразу же начал объяснять: — У нас есть вопрос, который нужно срочно обсудить, Отец. Джайлз недавно получил видение будущего, а я мог видеть намёки на него собственными глазами. Путь «Сейчас и Навсегда» обречён повторить события прошлого. Низшие расы восстанут против рабства и в очередной раз попытаются избавиться от нас. Это неизбежно.\nГрогар поднял бровь: — Ну, и что вы предлагаете в таком случае?\n— Вечную Доктрину, — пробормотал Джайлз.\n— Ну, и что это?\nОккультист начал отвечать: — Новая философия, которая направлена на спасение козьего рода от вырождения и стагнации. Вместо того чтобы порабощать других, мы просто истребим их всех. Упование на рабский труд вновь делает нас слабыми и уязвимыми. Мы должны полагаться только сами на себя. С уничтожением всей остальной разумной жизни мы сможем жить в вечном мире.\n\nГрогар нахмурился: — В твоих размышлениях есть смысл. Но это решение повлияет на весь козлиный род, поэтому я не могу принять его в одиночку.\n— Многие козлы поддерживают нашу точку зрения, как вы уже знаете, Отец, — сказал Оскар. — Я предлагаю устроить голосование, чтобы решить, будет ли эта доктрина принята.\nГрогар разразился хриплым смехом: — Чего?! Нет! Нет. Докажите превосходство собственной «Доктрины» с помощью силы. Тогда я отступлю и дам вам всё-таки уладить разногласия с теми, кто поддерживает «Путь». Вы обещаете сделать козлов сильнее, значит, докажите это и победите тех, кто стоит на вашем пути. Если вы сможете это сделать, я приму ваше предложение. Но если нет... — Он зловеще ухмыльнулся. — Ну, вы уже будете мертвы, так что волноваться об этом не придётся.\nОскар и Джайлз посмотрели друг на друга в ужасе, после чего кивнули дрожащими головами. — Как вы пожелаете, Отец, — неуверенно сказал оккультист. — Пусть... победит... сильнейший."
 eaw_debug.20.a:0 "Вечная Доктрина – последняя надежда козьего рода!"
 eaw_debug.20.b:0 "Мы всегда должны придерживаться Пути «Сейчас и Навсегда»."
 
 eaw_debug.21.t:0 "Альянс свободных рас"
 eaw_debug.21.d:0 "Страны на других континентах поначалу игнорировали странные новости, приходящие из пустыни Зебхара. И только когда монстры Тамбелона обрушились на соседние нации одну за другой, тогда в странах начали нарастать волнения. Впрочем, они были слишком вовлечены в местные конфликты, чтобы вмешаться в происходящее. Однако когда темпы экспансии Тамбелона начали нарастать, тогда нации осознали, что бездействие может привести и к их собственному поражению.\n\nБлагодаря определённой группе пони было достигнуто всеобщее соглашение. Все оставшиеся свободными расы объединились, чтобы остановить Грогара, пока не стало слишком поздно. И пусть это всё же не принесло конечного мира на континенты Эквус и Грифонию, тем не менее, соглашение означало, что весь мир признаёт козий род как угрозу всеобщей свободе. Все расы постараются взаимодействовать друг с другом и выполнить задачу по освобождению всей Зебрики от деспотии Тамбелона."
 eaw_debug.21.a:0 "Мы будем ждать."
 
 eaw_debug.25.t:0 "Цена войны"
 eaw_debug.25.d:0 "Грогар сидел на своём латунном троне и смотрел в кристальный шар. Тот показывал исход недавних битв против варварских орд других рас. Отец видел, что и Его войска несли потери. Среди них были неудачливые козлы, монстры и трогглы. Всех их ранило, калечило или разрывало в клочья пулями, шрапнелью и другими взрывающимися снарядами из металла. Его лицо скривилось в отвращении. Какое безумие и жестокость заставили эти вырождающиеся дегенеративные низшие расы изобрести такое ужасающее оружие? Они сражались как трусы, сбрасывая куски взрывающегося металла с небес, пока сами прятались, словно крысы в земляных дырах. Но даже Он признавал, что это было эффективно. Необходимо увеличить производство насыщенной кристаллами брони, а также приказать Его подчинённым изучить эти орудия. Не потому, что Он хотел, чтобы их использовали Его приспешники, а чтобы понять, как им лучше противостоять. Его вера в абсолютную победу козьего рода осталась непоколебима. Просто она будет стоить куда дороже, чем предполагалось раньше."
 eaw_debug.25.a:0 "Война это Тартар."
 
 eaw_debug.35.t:0 "Конец борьбы доктрин"
 eaw_debug.35.d_edge:0 "Джайлз, Гор и Оскар распластались перед Всеотцом, восседавшим на троне. — Мы сделали всё, как вы приказали, — сказал оккультист. — Все, кто противостоял нашей праведной Доктрине, побеждены, а весь остальной козий род принял новые взгляды.\n\nНа лице Грогара появилась кривая ухмылка: — Хорошо. С помощью силы вы доказали, что ваша Доктрины единственно верная. — Его улыбка пропала. — Вы же не ожидаете какой-то награды за уничтожение своих же собратьев?\n\nТрое козлов переглянулись в ужасе: — Н-нет, господин, — проблеял Гор.\n\nГрогар нахмурился: — Очень хорошо. А теперь у вас появилось много работы. В мире, где-то 750 миллионов разумных существ, от которых вам надо избавиться. Каждый из них обладает возможностью развить способности по подчинению разума, а у некоторых потенциал даже выше, чем у других. Но как только они все умрут, мы будем в безопасности.\n\n— ...Но что если козёл попробует использовать подобную магию? — сказал Джайлз.\n\nОстальные уставились на него в шоке.\n\n— Только пришло на ум, — сказал тот, пожав плечами.\n\n— С ЭТОГО ПРЕДАТЕЛЯ ВСЕЙ РАСЫ ЗАЖИВО СДЕРУТ ШКУРУ И ЧЕТВЕРТУЮТ! — проорал Грогар, после чего глубоко вдохнул. — До сих пор Я доверял своей пастве в том, что они не отдалятся далеко от того Пути, который Я им завещал. Но если хотя бы один козёл действительно может использовать... ЭТУ ОМЕРЗИТЕЛЬНУЮ МАГИЮ, тогда, похоже, нам надо истребить и себя тоже.\n\n— ...Что, простите? — спросил Оскар.\n— Это закономерный итог твоей собственной Доктрины, идиот. Ты будешь ей следовать или нет?\nТрое помялись в сомнениях, переглянулись, после чего обречённо кивнули."
 eaw_debug.35.d_unedge:0 "Рэйчел, Абрам и Рэнди стояли перед Грогаром, восседавшим на своём троне. — Я не могу поверить, что вы это сделали, — сказала Рэйчел. — Вы позволили произойти гражданской войне, разорвавшей козий род на части, только ради того, чтобы увидеть, чья идеология «сильнее»?\n\nЛицо Грогара скривилось: — Твоя вера и не требуется. И ты отлично знаешь, как я расправляюсь с еретиками.\n\nРэнди поспешил вмешаться: — О-она хотела сказать, что мы рады, что эта бессмысленная война окончена!\n\nОтец оставался напряжённым: — Я не ожидал, что традиционалисты выиграют. Впрочем, как и того, что многие бросят наши старые традиции.\n\n— Мы сделали то, что должны были, — сказал Абрам. — Нам нужны технологии низших рас, чтобы выжить.\n\nГрогар фыркнул: — Как скажешь. Но вы должны помнить, что Вечная Доктрина, насколько ложной она ни оказалась бы, была в чём-то права. Как вы планируете предотвратить очередное восстание рабов и изгнание Тамбелона? Как по мне, вы увеличили шансы на бунт, раздав рабам оружие, которое они смогут использовать против нас.\n\n— Вообще-то, — сказала Рэйчел, — если мы будем относиться к рабам хорошо, большинство из них будут не против своего статуса. За исключением некоторых крикунов.\n\nОтец нахмурился: — Но они перестанут нас бояться. Сделают нас СЛАБЫМИ!\n\n— Вы волнуетесь о повторении прошлых событий, — сказал Абрам. — Но мы приложим все силы, чтобы этого избежать. Возможно, это будет трудно, но доверьтесь нам.\n\nГрогар лишь скрипнул зубами."
 eaw_debug.35.a:0 "А теперь по поводу остальной части мира."
 
 cityfall.999.t:0 "Освобождение Козлестана"
 cityfall.999.d:0 "После падения козлократии геноцид невиданных масштабов развернулся по всему миру, когда бывшие рабы начали уничтожать своих бывших хозяев. Выжившие козлы сбежали и сформировали изолированные и уединённые сообщества, которые нередко подвергались гонениям.\n\nСуществует один регион, в котором сохранилась значительная часть населения коз, а именно, Козлестан. Тысячи козлов живут здесь в отдалённых деревнях среди зеленеющих холмов. Доминирующее большинство зебр по большей части оставило их в покое, во многом благодаря пересечённой местности, позволяя козам спокойно пастись.\n\nНо козлы никогда не забывали. В этом месте память о Грогаре была как никогда крепка, в то время как во всём остальном мире она исчезла. Козлы терпеливо ждали его возвращения целые тысячелетия, молясь и не теряя надежды.\n\nКогда орда чудовищ Отца прибыла, местных переполняла эйфория. Среди холмов происходило великое празднование, пока козлы радовались долгожданному событию. Они ждали этого дня многие поколения. Тысячи сразу же отправились в Тамбелон, желая присоединиться к реформированной козлократии. Местные зебры были быстро схвачены и закованы в цепи в наказание за грехи их прародителей.\n\nДревняя поговорка всё же была верна и мудра. И гласила она: "Жди и надейся.""
 cityfall.999.a:0 "Они будут вознаграждены за свою верность."
 
 cityfall.1000.t: "Дедушка пустыни"
 cityfall.1000.d: "Пока козы-биоманты вели орды чудовищ через пески пустынь, называемые низшими расами Зарантией, они встретили старого монстра, однажды созданного Грогаром - татцельвурма. Козлы быстро подчинили нескольких подобных существ, и таким образом смогли восстановить их шаблон, ранее утерянный в хаосе восстаний тысячелетия назад.\n\nТатцельвурм станет прекрасным дополнением арсенала козлократии. Черви являются хищниками по своей натуре, а также прекрасно приспособлены к пустыне. После восстановления их шаблона вновь может быть налажено массовое производство татцельвурмов."
 cityfall.1000.a: "Прекрасное дополнение коллекции."
 
 cityfall.1001.t: "Ужас небес"
 cityfall.1001.d: "Когда козлы увидели одну из них, они не могли поверить собственным глазам. Живая птица рух, широко расправив крылья, парила в небесах. Это была огромная хищная птица, когда-то созданная Грогаром. Считалось, что в живых уже никого из них не осталось, однако это оказалось неверно. Козы быстро захватили несколько диких птиц и принесли в Тамбелон, поскольку шаблон их производства был давно утерян. Грогар был рад тому, что одно из его лучших творений было спасено от забвения.\n\nПтицы рух - это вселяющие ужас существа с острыми как железо когтями, способные разрывать на части ничтожные летающие машины недокозлиных рас. Скоро небеса вновь будут принадлежать козам."
 cityfall.1001.a: "Прекрасное дополнение коллекции."
 
 cityfall.1002.t:0 "Дождь из камней"
 cityfall.1002.d:0 "В каменистых горах Абиссинии козлы обнаружили ещё одно их старое создание - пращехвоста. Это было похожее на рептилию существо с очень сильным хвостом, который тот использовал при охоте, чтобы швырять камни на большие расстояния. Эти монстры были древним оружием в первобытной войне с драконьим родом и при этом как-то сумели выжить в дикой природе на протяжении нескольких тысячелетий. Некоторых из них быстро поймали и смогли восстановить шаблон производства.\n\nОсобая способность пращехвоста позволит армии монстров получить столь необходимую способность наносить удары на большом расстоянии, особенно по тяжело бронированным или летающим целям. Это было доказательством гения Отца, поскольку это существо даже после стольких веков будет всё ещё полезно против врагов козьего рода, очень изменившихся за это время."
 cityfall.1002.a:0 "Прекрасное дополнение коллекции."
 
 cityfall.1003.t:0 "Ярость стража"
 cityfall.1003.d:0 "Юго-Восточная Зебрика была опустошена неконтролируемой магией, которая превратила весь регион в заросшее и очень влажное болото. Грогар мечтал решить эту проблему и устранить ущерб, вернув региону его первоначальный климат. Однако для этого необходимо захватить построенный козлами путеводный камень, расположенный на пересечении лей-линий посреди полуострова и испускающий магию. К сожалению, магический дух охраняет здание, питаясь его силой, а местные варвары поклоняются ему и относятся к зданию как к храму. Когда козлы и их монстры попытались войти туда, местные жрецы провели ритуал призыва духа, которого они назвали Громовым тигром. В одно мгновение разразилась гигантская буря, которая поразила золотой город вокруг него молниями и убивала всё живое в окрестностях, а также разрушила и повредила здания, включая сам "храм".\n\nПосле уничтожения путеводного камня потребуются десятилетия или даже века, чтобы надлежаще восстановить климат в этом регионе. Это была досадная неудача, и даже сам Грогар мало что мог с этим поделать."
 cityfall.1003.a:0 "Бывают сущности, которые могут сравняться с Ним в силах..."

 cityfall.1004.t:0 "Почётные козлы"
 cityfall.1004.d:0 "Когда козлы со своими монстрами достигли травянистых долин Зерганы, они встретили знакомых существ, которых местные зебры держали в качестве домашнего скота – овец. Будучи ближайшими родственниками козлов, овцы поддерживали с ними тесные узы ещё в эпоху до изгнания Тамбелона. Однако, в отличие от козлов, овцы были лишь полуразумными и покорно принимали роль скота, в то время как их кузены яростно сопротивлялись подобному обращению. Где бы ни появлялись легионы Грогара, овцы радостно приветствовали их, ничуть не сочувствуя своим прежним хозяевам, обращённым в рабство. Вскоре Грогар объявил, что, как и в древние времена, к овцам будут относиться как к «почётным козлам» – гражданам второго сорта, наделённым особыми правами и защитой. Большинству овец было всё равно: они лишь хотели, чтобы их регулярно стригли и оставляли пастись на сочных лугах. Тем не менее, некоторые из них добровольно вызвались помогать биомантам, взяв на себя роль верных подручных."
 cityfall.1004.a:0 "Мы с радостью примем наших двоюродных братьев и сестёр."
 
 cityfall.1005.t:0 "Марш к морю"
 cityfall.1005.d:0 "Козлы наконец увидели нечто, что было крайне необычным зрелищем для тех, кто всю свою жизнь прожил в Тамбелоне - океан. Необъятные просторы мерцающей голубой воды. Козы, конечно, были не очень хороши в плавании. Однако этого нельзя было сказать про множество существ, которые провели всю свою жизнь под водой. Исходя из этого, козлы занялись поисками таких созданий и вскоре нашли живого морского змея.\n\nС шаблоном этого существа козий род сможет захватить моря. Теперь ничто больше не будет для них недосягаемым. Низшие расы, прячущиеся на своих островах, обречены."
 cityfall.1005.a:0 "Прекрасное дополнение коллекции."
 
 cityfall.1006.t:0 "Магический лес"
 cityfall.1006.d:0 "Есть несколько мест в мире, где пересекаются лей-линии, создавая места, полные сырой магической энергии. Она имеет сильный эффект на местную флору и фауну, создавая густые леса, наполненные странными тварями. Козлы так и выучили биомантию, анализируя то, как такие существа естественно появлялись в мире.\n\nОдно такое место было захвачено силами козлократии. Это — единственное место во всей Зебрике, и, скорее всего, самый большой магический лес в мире. Грогар уже прибыл, чтобы разузнать, не был ли нанесён ущерб лесу низшими расами. Он был рад увидеть его в хорошем состоянии, тем самым явив источник биомассы и магической энергии."
 cityfall.1006.a:0 "Есть ещё нетронутые места в мире..."
 
 cityfall.1007.t:0 "Дикая магия"
 cityfall.1007.d:0 "Грогар давно знал, что у глупых лошадей Мейртании была гора необычных и сильных артефактов, спрятанных в пещерах. Ему эти безделушки, впрочем, не были нужны, так как они все слабее, чем его Чарующий Колокол, хотя эти лошадки отчаянно пытаются спасти их от копыт Грогара. Огромные взрывы разразили горы Мейртании, закапывая бесчисленные артефакты под грудами камня.\n\nУщерб был велик, скорее всего, эти кони использовали один из своих артефактов, чтобы уничтожить остальные. Потери исчислялись сотнями тысяч. Ну, они были недокозлами, так что плевать как-то. Всё это лишь доказывает, как низшие расы боятся истинной мощи козлов."
 cityfall.1007.a:0 "Пустая трата."

 cityfall.1008.t:0 "Ослиный род пал"
 cityfall.1008.d:0 "Осёл Брэй прошёл через железные врата в сад, расположенный в центре Тамбелона. Он был полон жизни: там зеленели растения и резвились многочисленные животные. Пели птицы, несколько козлов неспешно гуляли по территории, наслаждаясь местной природой. Брэй всё это проигнорировал и поспешил дальше, желая отыскать более важную цель.\n\nОн увидел Грогара, сидевшего перед прудом. "Господин," — позвал осёл Его, — "у меня важные новости с передовой."\n\n"Подойди сюда!" — Ответил Грогар.\n"...Хозяин?"\n\n"Это был приказ, идиот!"\n\nБрэй поспешил к Нему. — "Что-то случилось, господин?"\n\nГрогар смотрел на воду, поэтому осёл последовал примеру. Там плавал буфогрен, окружённый головастиками. На лице козла была так редко появляющаяся улыбка. — "Разве природа не прекрасна, Брэй?"\n\nЕго собеседник моргнул с недоумением. — "Но господин, а как же новости?"\n\nГрогар закатил глаза и вздохнул. — "Ладно-ладно, давай уже!"\n"Ослы Асстирии и Ансерука... были покорены. Вы можете это сами увидеть в кристальном шаре."\n\n"Похоже, тебя что-то беспокоит," — заметил Грогар. — "Тебя ведь действительно волнует судьба твоих собратьев-ослов?"\n\n"Н-нет, хозяин."\n\n"Не лги мне! Я знаю, что беспокоит. А я ведь спас тебя от рака, и вот так ты мне платишь в ответ. Глупой сентиментальностью! Ослы ничем не отличаются от других рас, ненавидящих природу. Все они держали мой вид как домашний скот! Относились к нам как к животным! И мы отплатим им тысячекратно. Тебе лучше быть благодарным за то, что мы тебя пощадили, раз уж ты оказался полезен мне."\n\nБрэй ничего не ответил и лишь слабо кивнул."
 cityfall.1008.a:0 ""Да, господин.""
 
 cityfall.1009.t:0 "Звёзды солгали?"
 cityfall.1009.d:0 "Хирам Зерранид болезненно дёрнулся, когда по нему пришёлся удар хлыстом от странного свиноподобного существа. Он пытался отделиться от группы его же собратьев-зебр, закованных в цепи, и подойти к ближайшей козе. Она, похоже, была здесь главной, раздавая приказы монстрам и свиноподобным существами. Очевидно, если та понимает язык зебр, то прислушается к голосу разума. — "Эй! Послушайте меня, вы совершаете ошибку!"\n\nКоза заметила его, после чего кивнула ближайшему свинолюду, который сделал ещё один удар по Хираму, на этот раз куда сильнее. Его полосатая шерсть быстро начала окрашиваться кровью. — "Пожалуйста, послушайте! Мы, копытные существа, не должны быть врагами! Мы должны работать вместе, чтобы устранить птичью угрозу миру!"\n\nХирам с трудом подавил крик, когда его ткнули копьём. Коза высокомерно смотрела на него.\n\n"Я умоляю вас, выслушайте меня! Нам не нужно быть врагами!"\n\nЕщё один удар копьём на этот раз пронзил его плоть. Зебра упал на колени.\n\n"Божество... За’ал-Маар... только если... вы... вы и есть криптоптицы!"\n\nРога козы засветились. Хирам ощутил что что-то происходит с его ртом, после чего тот буквально взорвался болью. Он начал кататься по земле, тогда как лицо зебры скорчилось в гримасе. Когда боль прекратилась, он судорожно вдохнул и ощупал лицо копытом. К его сущему ужасу, теперь там находился птичий клюв.\n\nКоза сказала что-то непонятное на своём странном языке, после чего жестом указала вернуться к остальным рабам.\n\nХирам лишь мог смотреть на неё и трястись от ужаса, неспособный ничего сказать."
 cityfall.1009.a:0 "..."
 
 cityfall.1010.t:0 "Падение Сиквестрии"
 cityfall.1010.d:0 "Владычество козьего рода когда-то простиралось не только над сушей, но и под водой. В конце концов, большая часть планеты покрыта ей, и как можно править миром, не владея при этом другой его частью?\n\nПрячущиеся глубоко под водой морские пони были шокированы, когда многочисленные чудовища напали на их деревни и города. И пусть они и обладали опытом сражений с монстрами, количество врагов было слишком большим. Им удалось убить лишь нескольких, прежде чем их оборона была сломлена. Вскоре всё сопротивление в так называемой Сиквестрии было подавлено.\n\nИ пусть обеспечение контроля над подводным населением непрактично для коз, монстры, по крайней мере, гарантируют, что морские пони не будут бунтовать против правления Грогара."
 cityfall.1010.a:0 "Нет ничего недосягаемого для хватки Отца."

 cityfall.1011.t:0 "Надоедливые мошки"
 cityfall.1011.d:0 "Во время прочесывания холодных гор на юге Зебрики одна из коз заметила дикого медвежука, собирающего ягоды в лесу. Он был быстро пойман и доставлен обратно в Тамбелон, дабы восстановить его шаблон.\n\nМедвежуки - необычные существа, представляющие собой смесь медведя и осы. Они обладают невероятной силой и размерами, которые вкупе с шестью конечностями позволяют им переносить других монстров на огромные расстояния. К тому же они далеко не беззащитные, поскольку у них есть острое жало и когти. С ними не будет ничего недосягаемого для хватки Отца."
 cityfall.1011.a:0 "Прекрасное дополнение коллекции."
 
 cityfall.1012.t:0 "Живые машины"
 cityfall.1012.d:0 "Во время усмирения Баррада козлы наткнулись на поистине необычную находку. Конечно это не было совсем неожиданностью, поскольку местность была разрушена невероятно сильной магией, но тем не менее, всё равно оказалось сюрпризом.\n\nГлубоко под землёй козы обнаружили странную и мощную магическую сущность, защищаемую фанатиками-культистами и окружённую машинами из биомассы. Учитывая насколько опасной и хаотичной была эта сущность, козы призвали самого Грогара, дабы он разобрался с этим.\n\nПод предводительством Отца козлы и их монстры уничтожили культистов и вступили в бой с сущностью. Несмотря на всю его мощь, оно не смогло ничего противопоставить Грогару, который вскоре смог разобраться что это такое. Ему удалось разделить её на семь единорогов. После первоначального ступора они были быстро убиты. Грогар предположил, что семеро пытались использовать какое-то заклинание, чтобы слиться в одну большую сущность, но это явно пошло не по плану. Вероятно, они пытались использовать биомантию, что было крайне глупо, учитывая, что только козы были способны полностью контролировать такую магию.\n\nНа устранение ущерба, нанесённого региону, уйдёт много времени. Но с нашей помощью местная природа медленно, но верно восстановится."
 cityfall.1012.a:0 "Очередное доказательство того, насколько глупы низшие расы."
 
 cityfall.1013.t:0 "Лес грязи"
 cityfall.1013.d:0 ""КАК они называют этот лес?" — Потребовал Грогар ответ от Оскара, прожившего большую часть жизни рядом с этим местом.\n\n"Эмм... ну, если повториться, то имя грубо переводится как..."\n\n"Это был риторический вопрос," — сказал Отец. — "Сколько бы я не смотрел на низшие расы, они каждый раз умудряются ещё больше разочаровать." — Он вздохнул. — "Котоптицы не только дали ему позорное имя, но ещё и опустошили лес, срубив половину него и вырезав местных монстров. Потребуются десятилетия, если не века, чтобы лес восстановился!"\n\n"Пожалуйста, успокойтесь," — попросил Оскар. — "Ярость тут в любом случае не поможет."\n\nГрогар фыркнул. — "Правда. Ну, ты и так знаешь, что надо сделать. Депортируй местное население грифонов подальше от лесных участков, собирай любые возможные излишки биомассы и используй местные лей-линии для получения магической энергии."\n\nОскар кивнул. — "Конечно, мой господин. Лес грязи постепенно восстановит свою былую славу.""
 cityfall.1013.d_alt:0 ""КАК они называют этот лес?" — Потребовал Грогар ответ от своего самого верного помощника Брэя.\n\n"Для большей прозрачности, это название грубо переводится как..."\n\n"Это был риторический вопрос," — сказал Отец. — "Сколько бы я ни смотрел на низшие расы, они каждый раз умудряются ещё больше разочаровать." — Он вздохнул. — "Котоптицы не только дали ему позорное имя, но ещё и опустошили лес, срубив половину него и вырезав местных монстров. Потребуются десятилетия, если не века, чтобы лес восстановился!"\n\n"Вы, к сожалению, правы," — кивнул Брэй. — "Однако ярость не ускорит прогресс."\n\nГрогар фыркнул. — "Правда. В любом случае, ты знаешь, что надо сделать. Депортируй местных грифонов подальше от лесных участков, собирай любые возможные излишки биомассы и используй местные лей-линии для получения магической энергии."\n\nБрэй кивнул. — "Конечно, мой господин. Лес грязи постепенно восстановит свою былую славу.""
 cityfall.1013.a:0 "Какая дикость."
 
 cityfall.1014.t:0 "Это должны быть сделано"
 cityfall.1014.d:0 "Лес Эйгсик был хорошо известен козам, но они всё равно были удивлены, обнаружив, что он кишит гигантскими разумными пауками. Хуже всего то, что эти пауки сильно опекали местное население пони и, казалось, управлялись какой-то магической силой. Поскольку они встали на пути Грогара, у него не было другого выбора, кроме как уничтожить пауков. Однако те продолжали появляться и нападать на монстров и коз. Даже сам лес, казалось, ополчился против козлиного рода.\n\nГрогар помнил, как тысячелетия назад он посещал лес Эйгсик и восхищался его безмятежной красотой. Теперь это место было наводнено пони, расой, которая когда-то бросила ему вызов и изгнала. Они осквернили сам лес. У него не было иного выбора, кроме как полностью уничтожить это древнее место. Одинокая слеза скатилась из его красного глаза, когда он отдал приказ огнедышащим химерам сжечь весь регион.\n\nВскоре гигантский пожар охватил весь Эйгсик, сжигая деревья, бесчисленные столетия жившие бок о бок с пауками, которые могли бы быть друзьями козьего рода. В итоге не осталось ничего, кроме пепла и обугленных мертвых деревьев."
 cityfall.1014.a:0 "Самая ужасная трагедия за всю историю."

 cityfall.1015.t:0 "Навсегда свободен"
 cityfall.1015.d:0 "Я долго ждал того дня\n\nДабы прогнать жадных волков от себя\n\nТеперь магия - моё спасенье\n\nПодойдите за благословеньем\n\nМы... будем... стоять на страже Вечнодикого!\n\nУзрите лик природы во всей красе\n\nНе нужно бояться стервятников у двери\n\nЯ смогу вас защитить\n\nЗа этими стенами шипов\n\nНавсегда свободен во веки веков!\n\nПоверьте мне, это ради вашего же блага\n\nНе бойтесь, природа ваш друг\n\nВся красота, что нас окружает\n\nКаждый прекрасный цветок создан для того, чтобы защищать нас\n\nМы... будем... стоять на страже Вечнодикого!"
 cityfall.1015.a:0 "Мы будем свободны вечно."
 
 cityfall.1016.t:0 "Напоминание о поражении"
 cityfall.1016.d:0 "Грогар стоял на холме и смотрел на парящий вдалеке облачный город Клаудсдейл. Даже спустя столетия он всё ещё был смутно узнаваемым, несмотря на все перемены.\n\nИ пусть город был перенесён в совершенно другое место, Грогар до сих пор помнил ту роковую битву, которая произошла неподалёку от него. Глупая пони по имени Гасти повела армию воинов-единорогов навстречу Ему. Он был уверен, что сможет уничтожить её жалкие войска в одиночку. Когда единороги сформировали магический луч, чтобы связать Его, он использовал силу страха и разорвал путы. И всё же Грогар был слишком высокомерен и недооценил своего врага. В хаосе битвы Гасти удалось украсть Чарующий Колокол, источник его силы, и использовать артефакт, чтобы изгнать козла и Тамбелон в Измерение Тьмы.\n\nГрогар хорошо выучил урок смирения. Больше он никогда не будет недооценивать вероломство и хитрость низших рас. А Клаудсдейл... должен быть уничтожен. Пусть урок и усвоен, но Ему не нужно напоминание о собственных ошибках, совершённых множество лет назад.\n\nГрогар фыркнул и отвернулся, спускаясь вниз с холма, пока сотни летающих монстров направлялись к облачному городу."
 cityfall.1016.a:0 "Этого больше не произойдёт."

 cityfall.1017.t:0 "Хранилище магии"
 cityfall.1017.d:0 "Ключ-Озеро было известно не только своей уникальной формой на карте, но и своими магическими свойствами. Подобно волшебным лесам, оно располагалось на пересечении магических лей-линий. Таким образом, озеро похоже на источник силы, из которого любой способный маг может черпать энергию. И на этом его уникальность не заканчивается, ведь холодные воды полны странных существ, которых больше нигде нельзя найти.\n\nСо времён последнего визита Грогара к Ключ-Озеру на его берегах обосновалось значительное количество чейнджлингов. Это напомнило ему о необходимости изучить способность этой расы к изменению собственного облика на случай, если удастся привить данную черту монстрам. Впрочем, скорее всего это не получится сделать, поскольку способность казалась скорее магической, чем биологической по своей природе. Другими примечательными обитателями озера были полярные медведи, которые почему-то оказались разумными. Насколько знал Грогар, эта раса всегда по уровню развития была на уровне животных. Но, по-видимому, они в какой-то момент обрели разум и даже основали собственную примитивную цивилизацию. Он сделал вывод, что козы больше не смогут использовать полярных медведей для создания медвежуков, поскольку по моральным соображениям разумные существа не должны преобразовываться в материал для биомантии. Тем не менее, Ключ-Озеро будет очень полезным в качестве источника магической силы, если ему не найдётся другое применение."
 cityfall.1017.a:0 "Это будет полезным."

 cityfall.1018.t:0 "Секреты жизни и смерти"
 cityfall.1018.d:0 "Козы добрались до ещё одного места, полного магической энергии, однако обнаружили нечто совершенно неожиданное. Ковен некромантов основал здесь собственный город, располагающийся на вершине старого хранилища для неудачных козлиных экспериментов. Грогара позабавили беспочвенные старые слухи о том, что Он когда-то был некромантом. Он не испытывал особого уважения к этой магической отрасли. На самом деле козёл вообще не считал это искусством, в отличие от биомантии. Некромантия заключалась в манипулировании мёртвой и гнилой плотью, переработке старого, а не создании нового. И хотя эта ветвь магии была достаточно могущественной, а также могла быть использована для обретения бессмертия, то же самое было верно и для биомантии.\n\nДля того, чтобы играться с трупами не нужно особых навыков, а в биомантии, наоборот, требуется предельная точность и расчёт, дабы организмы выжили и функционировали. Несмотря на все эти мысли, Грогар всё ещё считал некромантов потенциальной угрозой и приказал уничтожить их всех. Любые немёртвые животные, найденные в регионе, могут быть повторно использованы для создания живой биомассы. Большой запас различных костей тоже будет крайне полезным."
 cityfall.1018.a:0 "По крайней мы сможем извлечь что-то полезное из этого."
 
 cityfall.1019.t:0 "Освобождение Козказа"
 cityfall.1019.d:0 "Козлестан был не единственным местом в мире, где проживало немало козлов. В горах Козказа на северо-востоке Эквестрии также обитали десятки тысяч коз, которые тысячелетиями страдали от тирании эквестрийских пони. С возвращением Грогара на них стали смотреть как на пятую колонну и относиться к ним как к потенциальным врагам. Многие из них были допрошены или помещены под домашний арест. Поэтому, когда армии монстров наконец прибыли, местные козлы возрадовались и вновь обрели свободу.\n\nОгромный праздник прошёл в горах, музыка эхом отдавалась в долинах. Вечеринка продолжалась далеко за полночь. К тому времени, когда взошло солнце, козы блаженно спали, довольные тем, что теперь они в безопасности и на свободе."
 cityfall.1019.a:0 "За это мы и сражаемся."
