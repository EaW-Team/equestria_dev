FRN_donkey_chief_desc:0 "§gБрэй – верный слуга Грогара, ставший ключевой фигурой в деле его возвращения. Это асстирийский осёл, родившийся в простой семье. Большая часть его взрослой жизни прошла в охране караванов, но всё изменилось, когда он обнаружил кристальный шар, зарытый в песках Зебхары.\n\nАртефакт заговорил с ним, и после недолгих сомнений Брэй ответил. Поначалу он хотел выбросить шар, однако магическая сила принудила его оставить находку себе. Вскоре Брэй начал доверять таинственному голосу, и тогда шар предложил ему сделку: Грогару был необходим верный слуга, который поможет провести ритуал призыва, а в обмен на это Брэй будет вознаграждён. И тот согласился.\n\nОн беспрекословно следовал инструкциям артефакта, став буквально воплощением воли Грогара. Теперь же пришло время получить заслуженную награду.§!"

zebra_spy_bonus_idea:0 "Всевидящее око"

biomancy_decisions_desc:0 "Искусство биомантии было давным-давно забыто отвратительными низшими расами, и даже самим козлам приходится заново постигать его секреты. Но Верховный Козёл помнит всё. Он – величайший учитель в мире, и в Его присутствии само понятие «секрет» перестаёт существовать.\n\nНа данный момент в нашем распоряжении §P[?ouroboros]§! ед. живой биомассы. £biomass_texticon"
WIT_make_manticores_desc:0 "Мантикоры – это существа среднего размера. Их биологический шаблон основывается на теле льва с добавлением кожистых крыльев, чутких ушей летучей мыши и массивного скорпионьего хвоста. Мощные лапы обеспечивают превосходство в ближнем бою, крылья позволяют стремительно сближаться с врагом, а огромная пасть даёт возможность заглатывать мелких существ целиком. Жало на конце хвоста наполнено смертоносным ядом, способным убить жертву за считанные секунды."
WIT_make_chimeras_desc:0 "Химеры – существа средних размеров, одни из первых творений козьего рода и эталон биомантического конструирования. Передняя часть их тела заимствована у саблезубого тигра, задняя – у козла, а хвост представляет собой живую змею. Наличие трёх голов обеспечивает химере превосходный обзор и высокие когнитивные способности; более того, благодаря голове козла существо является полностью разумным. В качестве дополнительного вооружения в зверя встроена способность изрыгать пламя, полученная путём тщательного изучения драконьих трупов. Единственным изъяном проекта стал тот факт, что три головы крайне плохо ладят друг с другом."
WIT_make_hydras_desc:0 "Гидры – массивные создания, чей шаблон основан на драконах, первобытных врагах козьего рода. Гидра представляет собой двуногую рептилию с четырьмя головами на удлинённых шеях и челюстями, усаженными острейшими зубами. Существо обладает феноменальной регенерацией, позволяющей ему восстанавливать утраченные головы и конечности. Хотя гидра лишена крыльев, она идеально приспособлена для уничтожения противника из засад – болота и их мутные воды служат для неё идеальным укрытием. Как и у химеры, головы гидры редко действуют сообща. На данный момент это наиболее совершенный образец многоголового существа."
WIT_make_pigs_desc:0 "Свигасы – малые существа, чья нынешняя форма является усовершенствованной версией старого дизайна эпохи до изгнания. Прошлый шаблон был списан за неэффективность, однако новый позволяет успешно противодействовать авиации. Концепция проста: совмещение свиного тела и птичьих крыльев. Свигасы слишком малы и ловки, чтобы стать лёгкой мишенью для громоздких летающих машин, а их укреплённые копыта и клыки способны пробивать металлическую обшивку самолётов. Тем не менее, свигасы эффективны только при нападении огромными стаями из-за малых размеров и отсутствия дистанционных атак."
WIT_make_tatzlwurms_desc:0 "Татцельвурмы – крупные существа, чей облик напоминает гигантского червя или змею. Ярко-розовая, красная и фиолетовая чешуя делает их обманчиво похожими на экзотические цветы. Голова имеет уникальное строение: пасть разделяется на три части, обнажая длинные черные щупальца для захвата добычи. Три пары чёрных глаз обеспечивают широкий диапазон зрения. Несмотря на отсутствие конечностей, татцельвурм способен быстро перемещаться под землей. Также он переносит «татцель-грипп», заражая жертв через чихание. Это создание идеально приспособлено к пустыням и может долго обходиться без воды. Творец отказывается раскрывать, какие именно животные легли в основу этого дизайна."
WIT_make_slingtails_desc:0 "Пращехвосты – рептилии средних размеров. Это четырехногие существа с серо-зелёной чешуей и покрытой шерстью задней частью тела. Их отличительная черта – мощный хвост с шипами, который они используют как органическую пращу для метания тяжёлых валунов. Пращехвосты разрабатывались как живая артиллерия против драконов и доказали свою эффективность против летающих и бронированных целей: пущенные ими глыбы на огромной скорости способны раздавить любую мишень."
WIT_make_rocs_desc:0 "Птицы Рух – колоссальные хищники. На первый взгляд они напоминают гигантских соколов, но при ближайшем рассмотрении видны когти и клюв из материала, который гораздо прочнее кости или кератина. Несмотря на размеры, Рух способны развивать невероятную скорость при пикировании. В дикой природе они предпочитают горы. Птицы Рух были созданы для выслеживания молодых драконов по запаху в период линьки, когда те наиболее уязвимы. Вместе с гидрами и пращехвостами эти птицы составляли основу арсенала по истреблению драконьего рода."
WIT_make_bugbears_desc:0 "Медвежуки – существа средних размеров, чей шаблон основан на причудливом сочетании медведя и осы. Они напоминают панд с чертами насекомых: полупрозрачными крыльями, усиками и мощным жалом. Шесть конечностей и светящиеся красные глаза с несколькими типами зрения делают их идеальными охотниками. Это одиночные территориальные животные, сочетающие свирепость медведя и агрессию осы. Развитая мускулатура позволяет медвежукам при необходимости переносить других монстров по воздуху на большие расстояния."
WIT_make_sea_serpents_desc:0 "Морские змеи – крупные земноводные существа, которые, однако, ограничены водной средой из-за неспособности передвигаться по суше. Зверь покрыт чешуей и обладает длинными когтистыми лапами. У морских змей есть великолепная грива, а самцы отличаются длинными усами. Это крайне разумные создания, способные перехитрить противника в океане. Благодаря своим размерам они представляют смертельную угрозу для кораблей низших рас."
WIT_make_leviathans_desc:0 "Левиафаны – колоссальные существа, живущие исключительно в воде. Это позволило сделать их самыми крупными монстрами в истории козьего рода. У них семь голов, множество плавников и ряды острейших зубов. Внешне они напоминают помесь рыбы, кита и акулы. Левиафаны способны выдерживать чудовищное давление на глубине в несколько километров. Их интеллект ниже, чем у морских змей, что делает их более управляемыми. Такой зверь способен проглатывать корабли целиком."
WIT_make_titan_desc:0 "Титаны – величайшие из сухопутных созданий. Эти двуногие гиганты защищены металлической бронёй, усиленной кристаллами, и возвышаются над самыми высокими шпилями Тамбелона. В их пасти вмонтирована органическая протонная пушка, способная испепелять всё в поле зрения. Из-за своих габаритов титаны крайне медлительны. Первоначальный дизайн предусматривал в мозгу существа отсек для управления, однако в новой линейке эта особенность была опущена. Имя создателя первого титана затерялось в веках."
WIT_train_biomancers_desc:0 "Грогар не может находиться везде одновременно, поэтому подчиненные ему козлы должны сами направлять монстров в бой. Однако пребывание на передовой – опасная доля. Так как большинство козлов давно позабыли искусство биомантии, нам необходимо обучить их заново. Это требует времени и запасов биомассы для практики, но это единственный способ возродить древние знания."
WIT_multiply_biomass_desc:0 "Биомасса обладает природной способностью к размножению. С помощью биомантического ускорения скорость прироста новых единиц можно существенно увеличить, пусть это и станет для подопытных крайне болезненным опытом. Метод не слишком эффективен, но это самый надежный способ получения новых ресурсов для строительства легионов."
WIT_harvest_biomass_desc:0 "Различные ареалы дикой природы идеально подходят для сбора биомассы. Низшие расы также одомашнили многие виды животных, фактически испортив их природу, но этот домашний скот всё еще пригоден для переработки. Крупные города дают скудный улов, в то время как сельские регионы обеспечивают богатый урожай биоматериала."

crystal_related_decisions_desc:0 "Кристаллы – это магия в её чистейшей, первозданной форме. Они естественным образом растут в местах пересечения магических лей-линий и часто встречаются в глубоких пещерах. Однако естественный рост протекает слишком медленно, поэтому козье племя изобрело новый, куда более стремительный метод их создания."
WIT_mana_batteries_desc:0 "Козы давно открыли, что врождённую магическую энергию разумных существ можно преобразовывать в кристаллы. К сожалению, этот процесс неизбежно ведет к смерти донора. Впрочем, пока в нашем распоряжении достаточно представителей низших рас, это будет ничтожной ценой за обладание столь мощным источником чистой энергии."
WIT_mana_batteries_2_desc:0 "Козы давно открыли, что врождённую магическую энергию разумных существ можно преобразовывать в кристаллы. К сожалению, этот процесс неизбежно ведет к смерти донора. Впрочем, пока в нашем распоряжении достаточно представителей низших рас, это будет ничтожной ценой за обладание столь мощным источником чистой энергии."
WIT_craft_armour_desc:0 "Низшие расы окончательно запятнали себя скверной технологий, создав жуткое оружие из стали и серы. Но какими бы мощными ни казались их пушки, они не могут соперничать с силой кристаллов. Мы заставим рабов ковать новую броню с кристаллическим напылением, чтобы защитить наших монстров от ничтожных игрушек недокозлов."
WIT_craft_armour_2_desc:0 "Низшие расы окончательно запятнали себя скверной технологий, создав жуткое оружие из стали и серы. Но какими бы мощными ни казались их пушки, они не могут соперничать с силой кристаллов. Мы заставим рабов ковать новую броню с кристаллическим напылением, чтобы защитить наших монстров от ничтожных игрушек недокозлов."

biomancy_decisions_2_desc:0 "Биомантия – это не только искусство ваяния плоти, но и карающий клинок в войне против диких низших рас. Их тела либо подчинятся воле Грогара, либо будут сломлены.\n\nНа данный момент в нашем распоряжении §C[?magical_power]§! ед. §Cмагической энергии§! £magic_power_texticon и [Root.fear_factor_dynamic_loc] §Lуровень страха§! £fear_texticon."
WIT_harvest_magic_desc:0 "Каждое разумное существо в этом мире обладает искрой врождённой магии. Некоторые, подобно единорогам, способны направлять её вовне, другие используют её лишь пассивно, но для нас это не имеет значения – все они лишь сосуды с энергией. С помощью Чарующего Колокола Грогар может извлекать эту силу в планетарных масштабах, с каждым циклом приближаясь к своему божественному вознесению."
WIT_blood_rain_desc:0 "Превращение воды в кровь – одна из базовых техник биомантии. Объединив усилия круга адептов, мы можем применить её с чудовищным размахом, обратив сам пар в дождевых облаках в алые потоки. Кровавый ливень сокрушит дух низших рас, чей примитивный разум неминуемо пасует перед ликом столь древних и жутких знамений."
WIT_cancer_desc:0 "Хотя эффект любого заклинания ослабевает с расстоянием, биомантия способна наносить непоправимый урон живым тканям даже издалека. Если направить этот поток на командиров вражеских армий, их ряды охватит хаос и немощь. Благодаря Кристальному шару Грогара наши проклятия всегда находят цель, выжигая врага изнутри."
WIT_weakness_desc:0 "Прямое управление телами тысяч существ требует колоссальных затрат воли, однако биомантия позволяет оказывать массовое пагубное воздействие на биологические объекты. Заклинание «Слабость плоти» вызывает мгновенную атрофию мышц, превращая грозных воинов в дрожащих калек, неспособных удержать даже собственный вес."
WIT_parasprites_desc:0 "Несмотря на малый размер, параспрайты – одно из самых эффективных орудий Грогара. Выведенные из обычных насекомых, они были наделены обманчиво милым обликом. Глупые недокозлы принимают их за домашних питомцев и начинают кормить, не подозревая, что эти твари размножаются с ужасающей скоростью, пожирая всё на своём пути. Там, где проносятся стаи параспрайтов, неизменно воцаряется голод."
WIT_strength_desc:0 "Страх – это топливо для наших чар. Ужас низших рас перед Тамбелоном достиг той мощи, что способна питать биомантические способности каждого козла. Эту энергию можно влить в наших созданий: их мышцы окрепнут, усталость исчезнет, а чувства обострятся. Сама природа страха наполнит их тела первобытной силой."
WIT_polymorph_desc:0 "Создание жизнеспособного организма требует от биоманта величайшего терпения и точности. Но если цель – лишь исковеркать плоть врага, достаточно простого выброса чистой энергии. Одним мощным импульсом тысячи организмов будут превращены в бесформенные груды мяса, неспособные поддерживать жизнь в той карикатуре на тело, что от них осталась."
WIT_the_bell_tolls_desc:0 "Ничтожной пони по имени Гасти удалось украсть Колокол Отца и обратить его мощь против своего создателя. Она использовала способность артефакта разрывать ткань реальности при полном заряде, чтобы изгнать Тамбелон в Измерение Тьмы. Разумеется, Грогар и сам способен на подобное. В первобытные времена Он отказывался прибегать к столь жуткой силе, но теперь пришло время мятежным расам, чья участь – быть рабами, на себе прочувствовать ту боль, что они причинили Тамбелону."
WIT_mass_disease_desc:0 "Уровень страха достиг той отметки, когда биомантия позволяет манипулировать даже микроскопическими организмами. Новые штаммы болезней будут наделены такой вирулентностью, адаптивностью и смертоносностью, что мгновенно охватят весь мир. И если одной эпидемии окажется мало – их будет несколько."
WIT_mass_cancer_desc:0 "Каждое деление клетки несёт в себе риск мутации. Иногда эта мутация зловредна и порождает неконтролируемый рост плоти. Обычно иммунная система справляется с этой угрозой, но мы нарушим саму стабильность формирования клеток. Ускоряя процесс мутации в тысячи раз, мы перегрузим организмы всех существ в мире, превращая их тела в их собственных палачей."
WIT_reality_destabilization_desc:0 "Ткань реальности куда менее прочна, чем полагают смертные. Сами нити, формирующие основу мироздания, могут быть разорваны. Целостность измерений начнёт распадаться, а само время утратит свой привычный ход. Антиматерия хлынет в наше измерение, вызывая катастрофические последствия. Это пойдёт нам на пользу – до тех пор, пока мы удерживаем хаос в узде и гарантируем, что ущерб ограничен лишь территориями наших врагов."

WIT_disease_idea_desc:0 "Если бы вы не совершили ужасных грехов, этого бы не случилось."
WIT_strength_idea_desc:0 "Страх подпитывает биомантов, и их мощь направляется напрямую в монстров, делая их сильнее и выносливее."

