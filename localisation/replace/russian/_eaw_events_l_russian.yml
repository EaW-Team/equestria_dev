l_russian:
### NEWS EVENTS ###
 news.1.t: "Эквестрийские Игры"
 news.1.d: "[This.GetNewspaperHeader]Ежегодные празднования Эквестрийских Игр в Кристальном Городе только что подошли к концу. [equestria.GetLeader] лично произнесла трогательную речь о дружбе и её важности для всего рода пони. На играх не случилось каких-либо серьёзных проблем, а пони со всей Эквестрии, как участники соревнований, так и зрители, прибыли в Кристальную Империю, чтобы принять участие в этом событии.\nЭти ежегодные игры помогли пони объединиться благодаря силе дружбы и терпимости. Хотя бы на данный момент. Посмотрим, окажет ли это событие какое-либо серьёзное влияние на политику пони в ближайшем будущем."
 news.1.a: "Ура!"
 news.1.b: "Просто отвратительно."
 news.1.c: "Их причуды - не наша забота."
 news.2.t: "[equestria.GetName] собирается воевать с государством [BUF.GetName]"
 news.2.d: "[This.GetNewspaperHeader]\n\nПринцесса Селестия избрала путь войны. Тот ли она мудрый аликорн, которого мы так любим? У Государства Бизонов не самые хорошие перспективы. Посмотрим, что это принесет в будущем."
 news.2.a: "А что насчет Гармонии?"
 news.2.b: "Мы сокрушим их, как того желает Принцесса."
 news.3.t: "Великая Война"
 news.3.d: "[This.GetNewspaperHeader]Королевство Чейнджлингов официально объявило, что между ними и Эквестрией идет война. Авиация чейнджлингов устроила серию бомбардировок на пограничные войска и города ещё до официального объявления войны.\n\nЭто поворотная точка в истории для всех нас. Эквестрия уже много столетий не видала больших войн, и общество обескуражено происходящим. Чейнджлинги кажутся очень решительными и уверенными в своих действиях, чего нельзя сказать об Эквестрии. Пони понадобится немало времени, чтобы изменить свою экономику под военные нужды. Мы будем наблюдать за ситуацией."
 news.3.a: "Это не предвещает ничего хорошего."
 news.3.b: "За принцессу!"
 news.3.c: "Они долго не продержатся! Вперед, мои армии!"
 news.4.t: "Кристальная Ярмарка"
 news.4.d: "[This.GetNewspaperHeader]Сегодня в Кристальном городе состоялось празднование Кристальной Ярмарки. Пони со всех уголков Кристальной Империи собрались, чтобы продать собственнокопытные изделия, различную еду, напитки, и просто пообщаться и повеселиться. Эквестрийские и Кристальные власти также посетили Ярмарку. Художники, актёры и народные музыканты выступили на ней, а под конец все вместе исполнили гимн и запустили фейерверки в ночное небо."
 news.4.a: "Хорошо."
 news.4.b: "Ура!"
 news.4.c: "Фу."
 news.5.t: "Всеэквестрийский Фронт"
 news.5.d: "[This.GetNewspaperHeader]Сталлионградская Советская Республика присоединилась к Всекопытному Фронту, объединившись со всеми пони против угрозы чейнджлингов. Теперь они будут действовать вместе ради победы над их общим врагом."
 news.5.a: "Хорошо."

 news.6.t: "Выступление популярной виолончелистки в Кантерлоте"
 news.6.d: "[This.GetNewspaperHeader]\nСегодня, прямо в разгар кровопролитной войны, известная в Эквестрии виолончелистка Октавия выступила в Кантерлотской Опере. Она заявила, что посвящает свою музыку всем пони, защищающим эквестрийскую свободу на линии фронта и что все собранные на этом благотворительном концерте деньги будут переданы правительству и пойдут на строительство истребителя. Зрители встретили это заявление бурными овациями."
 news.6.a: "Всё ради победы!"
 news.6.b: "За принцессу!"
 news.6.c: "Им ничего не поможет."
 news.7.t: "Эквестрия предоставляет убежище королеве Вельвет"
 news.7.d: "[This.GetNewspaperHeader]Не так давно изгнанная из Олении королева Вельвет наконец нашла политическое убежище в Кантерлоте. Крайне недовольный король Йохан отправил лидеру [equestria.GetLeader] оскорбительное послание."
 news.7.d_fash: "[This.GetNewspaperHeader]Не так давно изгнанная из Олении королева Вельвет наконец нашла политическое убежище в Кантерлоте. Крайне недовольный первосвященник Allsherjargoði отправил лидеру [equestria.GetLeader] оскорбительное послание. Некоторые утверждают, что он призывает к священному походу против Эквестрии."
 news.7.d_com: "[This.GetNewspaperHeader]Не так давно изгнанная из Олении королева Вельвет наконец нашла политическое убежище в Кантерлоте."
 news.7.a: "Да."
 news.7.b: "Ублюдки."

 news.10.t: "Эквестрия предъявляет претензии на Пустоши"
 news.10.d: "[This.GetNewspaperHeader]Эквестрийский парламент и принцесса отправили официальное предложение Драконьим Землям передать им контроль над Пустошами. Они говорят, что в нынешних условиях им стоит обратить более пристальное внимание на защиту границ своей страны. Драконьим Землям будет предоставлена компенсация."
 news.10.a: "Оки-доки."

 news.11.t: "Гранд Галлопинг Гала"
 news.11.d: "[This.GetNewspaperHeader]Вновь в кантерлотском замке состоялся ежегодный бал. Королевская семья, высшие чины эквестрийского правительства вместе с их друзьями собрались на этом мероприятии, дабы насладиться вечером и обсудить политические проблемы. На протяжении всего вечера подавались изысканные напитки под аккомпанемент классической музыки. Бал завершился великолепным фейерверком. Эквестрия не перестаёт поддерживать свои традиции. Для многих пони это является гарантией стабильности и длительного мира в старой доброй Эквестрии."
 news.11.a: "За ваше здоровье!"
 news.11.b: "Что за расточительная знать."
 news.11.c: "Как же они жалки."
 news.13.t: "Гранд Галлопинг Гала"
 news.13.d: "[This.GetNewspaperHeader]Вновь в кантерлотском замке состоялся ежегодный бал. Королевская семья, высшие чины эквестрийского правительства вместе с их друзьями собрались на этом мероприятии, дабы насладиться вечером и обсудить политические проблемы. На протяжении всего вечера подавались изысканные напитки под аккомпанемент классической музыки. Бал завершился великолепным фейерверком. Эквестрия не перестаёт поддерживать свои традиции. Для многих пони это является гарантией стабильности и длительного мира в старой доброй Эквестрии."
 news.13.a: "Поздравляем."
 news.13.b: "Проклятье."
 news.13.c: "Только не снова!"
 news.12.t_equestria: "Вождество бизонов интегрировано в Эквестрию"
 news.12.t_world: "Эквестрия аннексировала Вождество Бизонов"
 news.12.t_world_puppeted: "Вождество Бизонов - Эквестрийский регион"
 news.12.t_world_faction: "Вождество Бизонов - Союзник Эквестрии"
 news.12.d: "[This.GetNewspaperHeader]Государство Бизонов на протяжении десятилетий оставалось анклавом внутри Эквестрии. Их горделивые вожди отказывались пускать пони-фермеров на свои земли. Однако поскольку страна полностью опиралась на эквестрийскую торговлю, множество экспертов сомневались в их свободе. Ситуация изменилась, когда к власти пришла новая предводительница по имени Стронгхарт. Она была известна своим дружелюбием к пони. Вскоре она приняла предложение дружбы от Принцессы Селестии, и сегодня Государство Бизонов существует как автономия в составе Эквестрии. Все бизоны получат гражданство и субсидии на фермерскую деятельность."
 news.12.a: "Мм-хмм."
 news.12.b: "Вместе стремимся к светлому будущему."
 news.12.c: "Мы приветствуем наших новых друзей."
 news.14.t: ""Дэринг Ду и Герои Гармонии" уже в продаже!"
 news.14.d: "[This.GetNewspaperHeader]Совсем недавно первые экземпляры новой автобиографии знаменитой писательницы и искательницы приключений – "Дэринг Ду и Герои Гармонии" – появились в книжных магазинах по всему Эквусу и за его пределами. Произведение подробно описывает путь бывшей командующей Эквестрийским Сопротивлением: её полёт в Стейблсайд, чтобы сплотить пони на защиту гармонии, заявление о намерении освободить Эквестрию от оккупантов, поход на Кантерлот и чудесная победа эквестрийских пони над силами зла. Эта по-настоящему захватывающая история очень вдохновляет. Она рассказывает о том, как обычные пони могут преодолеть даже невозможные препятствия, если они верят в своих друзей. Да, мы искренне скорбим по всем потерянным за бурные годы жизням, но теперь можем спать спокойно, зная, что пони Эквестрии ждёт светлое будущее."
 news.14.a: "Моя копия вот-вот прибудет!" #POV: CES
 news.14.b: "Может Дэринг подпишет мой экземпляр..." #POV: allies of CES, + harmony/NA/commie nations *not* at war with CES
 news.14.c: "Фу. Я не читаю не-художественную литературу." #POV: supremacy nations, + nations at war with CES 
 news.15.t: "Оления капитулирует!"
 news.15.d: "[This.GetNewspaperHeader]Война чейнджлингов против Олении оказалась короткой. Не имея запасного плана, осознавший поражение Король Йохан и его правительство решили мирно сдаться, чтобы избежать ненужных жертв. Силы чейнджлингов войдут в город этим вечером. Население подняло флаги чейнджлингов и примет участие в завтрашнем параде."
 news.15.a: "Очень плохо."
 news.15.b: "Мы должны покончить с этим."
 news.15.c: "Они сделали правильно."
 news.16.t: "Новая книга Дэринг Ду"
 news.16.d: "[This.GetNewspaperHeader]После многих месяцев ожидания А.К. Йерлинг наконец-то выпустила книгу «Дэринг Ду и Чейнджлинг-Призрак» – новый и захватывающий шпионский боевик. В нём Дэринг Ду пробирается в столицу королевы Кризалис, Весалиполис, чтобы найти ковчег королевы Ковен, пока на неё охотятся агенты королевы Кризалис – «Призраки».\nПосле весьма беззаботной «Трилогии приключений» многие рецензенты были шокированы весьма мрачным тоном «Призрака». Другие, вроде известного критика Квиббл Пэнтса, осудили фокус книги на политике, заявив, что «на фоне новинки продолжение оригинальной трилогии выглядит даже весьма прилично». Новая атмосфера реализма потрясёт многих пони до глубины души, но последняя книга автора утратила эскапистские элементы, которые делали её серию такой замечательной. Тем не менее, книга продалась тысячами копий уже в первый день, и продюсеры Эпплвуда уже начали интересоваться покупкой прав на фильм. 6 из 10 звёзд."
 news.16.a: "Серия действительно изменилась, не так ли?"
 news.16.b: "Прошлые книги были лучше."
 news.16.c: "Фу. Я не читаю фантастику." 
 news.17.t: "Чейнджлингско-эквестрийская граница"
 news.17.d: "[This.GetNewspaperHeader]Распространились слухи, что королева Кризалис поглядывает далеко за пределы недавно пересечённых границ Олении. Поступило несколько сообщений об активизации сил чейнджлингов в районе эквестрийской границы, а также о строительстве аэродромов, полевых учениях и развёртывании танковых подразделений. Власти чейнджлингов говорят, что это лишь меры самообороны. Они обеспокоены якобы надвигающимся вторжением эквестрийцев и напоминают, что в прошлом Эквестрия неоднократно силой устанавливала дружественные ей правительства в суверенных странах. Независимо от того, веская это причина или нет, ситуация начинает накаляться. Хотя пони в приграничных областях сохраняют спокойствие, слухи о нападении чейнджлингов продолжают набирать обороты."
 news.17.a: "Опасно."
 news.17.b: "Скоро мы будем готовы."
 news.18.t: "Чейнджлинги предъявляют претензии на Олению!"
 news.18.d: "[This.GetNewspaperHeader]Лидер Олении, [OLE.GetLeader], получил срочное требование от королевы Кризалис, согласно которому оленям следует предоставить право прохода чейнджлингам через свою территорию и стать их протекторатом. По словам королевы Кризалис, Оления расположена в крайне важной стратегической позиции и явно лежит в сфере интересов чейнджлингов. Представители Эквестрии заявили, что эти претензии являются совершенно возмутительными, и угрожают применить экономические меры к Королевству Чейнджлингов и установить строгий пограничный контроль. Лидер [OLE.GetLeader] всё ещё не выпустил официального заявления относительно ситуации."
 news.18.a: "Тревожное развитие событий."
 news.19.t: "Оления отказывается сдаваться"
 news.19.d: "[This.GetNewspaperHeader]Королева Кризалис направила срочный запрос лидеру Олении, в котором она потребовала предоставить её войскам полный доступ на территорию Олении, а также стать государством-протекторатом под властью чейнджлингов. Королева Кризалис утверждает, что Оления находится в стратегически важном положении и, несомненно, лежит в сфере интересов чейнджлингов. Представители Эквестрии утверждают, что эти заявления просто возмутительны, и угрожают наложить санкции на королеву чейнджлингов и установить строгий пограничный контроль. Лидер Олении пока не опубликовал официального ответа."
 news.19.a: "Ох, ну что ж."
 news.19.b: "Ты заплатишь за это."
 news.20.t: "Великая Война окончена"
 news.20.d: "[This.GetNewspaperHeader]После многих лет кровопролитной войны, государство [EQS.GetNameDef] сумело отбросить армии чейнджлингов и захватить их ульи. Королевство Чейнджлингов было ликвидирована и проэквестрийское правительство во главе с чейнджлингом Тораксом встало у власти в новом, «гармоничном» государстве чейнджлингов."
 news.20.a: "Наконец-то."
 news.20.b: "Вот оно, светлое будущее."
 news.21.t: "Война окончена"
 news.21.d: "[This.GetNewspaperHeader]Сегодня, после многих лет отчаянных боев, конфликт между государством [EQS.GetNameDef] и чейнджлингами подошёл к концу. По сообщениям, королева Кризалис была свергнута внутренним сопротивлением, которое сформировало временное правительство, после чего немедленно и безоговорочно капитулировало. Все пони обрадовались этим новостям и [EQS.GetLeader] уже решила сделать день этой победы национальным праздником. В будущем чейнджлингами будет править дружелюбный чейнджлинг по имени Торакс.\nВойна закончилась, и боевые действия прекратились. Мир снова вернулся в земли государства [EQS.GetNameDef], но будет ли он долгим?"
 news.21.a: "Все кончено."
 news.22.t: "Великая Война окончена"
 news.22.d: "[This.GetNewspaperHeader]Улицы и площади в Сталлионграде сегодня наполнены восхищенными пони и красными знаменами, поскольку страна сегодня объявила о своей полной победе над Кризалис и ее «империалистическим режимом».\n"Сегодня," объявило сталлионградское информбюро, "наша нация и народ остается победителями. Поражение врага безоговорочно, а наша победа закреплена навсегда. Настало время для новой эры, товарищи, пока солдаты возвращаются к своим возлюбленным. Штормовые облака рассеиваются, а нас ждет новое, светлое будущее.\nНас, народ победителей."\nВласти также объявили о создании "тщательно наблюдаемого" государства чейнджлингов под контролем просталлионградских сторонников. Хотя это нельзя четко назвать марионеточным государством, множество изменений ожидают чейнджлингов, их новых союзников и бывших врагов.\nПринесет ли Эквестрии падение Кризалис светлое, мирное будущее? Посмотрим."
 news.22.a: "Наконец-то."
 news.22.b: "Вот оно, светлое будущее."
 news.23.t: "Сталлионград и "Наш город" "
 news.23.d: "[This.GetNewspaperHeader]Наш Город, также известный как Деревня Старлайт, это место в самой северной части Эквестрии, расположенное между Колонией Грифонов и Сталлионградом. Это поселение было порабощено Старлайт Глиммер с помощью магии. Она принудила население отречься от своих 'особых талантов'. После отставки Старлайт здешние пони приняли социализм сталлионградского образца и формально были под защитой Сталлионградской Республики. В Сталлионградском Совете шли жаркие споры о том, может ли их нация позволить себе присоединить Наш Город, и после избрания генсека по имени [STG.GetLeader] стало ясно, что независимость Деревни Старлайт ушла в историю. Вчера пони Нашего Города стали полноправными гражданами Сталлионграда. Теперь они вместе будут стремиться к лучшему будущему."
 news.23.a: "Отлично."
 news.24.t: "Социалистический Союз"
 news.24.d: "[This.GetNewspaperHeader]Сегодня [STG.GetLeader] и Верховный совет объявили о создании международной организации Социалистический Союз. Они намереваются искать поддержку у коммунистических наций по всему миру для взаимного усиления и кооперации."
 news.24.a: "Хорошо."
 news.25.t: "Напряженность между государствами [GRF.GetName] и [STG.GetName]"
 news.25.d: "[This.GetNewspaperHeader]\nГосударство [GRF.GetName] подавило социалистическое движение в своей стране, но это привело к конфликту с их южным соседом, государством [STG.GetName]. Прошёл слух, что коммунистическая нация отправила государству [GRF.GetName] официальное предупреждение, в котором потребовало прекратить данную политику. В противном случае государство [STG.GetName] готово вмешаться, чтобы защитить права рабочих-грифонов и пони. Войска по обе стороны границы приведены в состояние повышенной боевой готовности, и неверный шаг любой из сторон может спровоцировать начало полномасштабного конфликта."
 news.25.a: "Ой-ёй."
 news.27.t: "Грифонья гражданская война!"
 news.27.d: "[This.GetNewspaperHeader]После убийства губернатора Тифезера в Грифоньей Колонии разразился хаос. Многочисленные партии сражались за право контролировать страну. Однако, длительный кризис только усугубил положение пролетариата. Все началось с парочки забастовок рабочих в Фетермисте, где лево- и праворадикальным группам довелось встретиться. Столкновение переросло в уличный конфликт, разделив город на две части и погрузив целую страну в анархию."
 news.27.a: "Ладно."
 news.28.t: "Сталлионград угрожает Эквестрии"
 news.28.d: "[This.GetNewspaperHeader]Мы получили много сведений об активности Сталлионградских сил на эквестрийской границе. [STG.GetLeader] настроен на очень агрессивную политическую линию, согласно его публичным выступлениям, он сделает все возможное, чтобы «раздавить империалистическую болезнь». Пони Эквестрии опасаются намерений Сталлионграда."
 news.28.a: "Так и надо."
 news.28.b: "Пусть дерутся между собой."
 news.28.c: "Ничего хорошего из этого не выйдет"
 news.28.e: "Ладно."
 news.29.t: "Гражданская война в Эквестрии!"
 news.29.d: "[This.GetNewspaperHeader]Балтиморская перестрелка стала "пороховой бочкой" для всей Эквестрии. Узнав об этом инциденте, страна успокоилась на мгновение, прежде чем произнести адский общенациональный вопль! Все, кому оказалось небезразлична судьба страны и нации, поторопились на баррикады, пока заводы и фабрики остались пустыми. Деяния толпы заменили произвол. Без сомнения, началась гражданская война, и с каждой минутой все острее встает вопрос: останется ли единственное коммунистическое государство в стороне, или повстанцы получат нечто большее, чем снабжение?"
 news.29.a: "Ой-йей."
 news.30.t: "Конец гражданской войны в Эквестрии!"
 news.30.d: "[This.GetNewspaperHeader]Победа! В последнем натиске за прошедшие недели, коммунисты взяли превосходство в свои копыта над лоялистами. Сегодняшний день завершил правление Эквестрийских Принцесс. Пони наконец взяли судьбу в свои копыта. Монархия была ликвидирована, и новый Эквестрийский Верховный Совет взял контроль над страной. Это поворотная точка в истории для всех эквестрийцев. Поворотная точка к светлому будущему!"
 news.30.a: "Отлично!"
 news.31.t: "Конец гражданской войны в Эквестрии!"
 news.31.d: "[This.GetNewspaperHeader]Это была трудная и кровавая победа, но лоялисты сумели победить в гражданской войне. Коммунисты были побеждены, выжившие или пленники, или находятся в изгнании. Теперь, будучи в безопасности с силой Принцесс, Эквестрия может взглянуть в будущее. Конфликт все еще не иссяк, и пони Эквестрии должны быть готовы и сплочены, если они хотят выжить."
 news.31.a: "Ну вот и все."
 news.32.t: "Принцесса Селестия отрекается от престола!"
 news.32.d: "[This.GetNewspaperHeader]После начала гражданской войны в Эквестрии, Принцесса Селестия не пожелала оставаться лидером Эквестрии. Ей было очень больно за судьбу Эквестрии после недавних событий, и она заявила что не может больше так, позволив гражданской войне зажечься. Селестия посчитала, что не способна управлять страной в нынешнее время. Эквестрийцы уже никогда не познают ее материнского взгляда утром, никогда она не поднимет и солнца. Правление в целое тысячелетие - закончилось. Принцесса Луна взяла на себя все ответственности."
 news.32.a: "Как это могло случиться."
 news.32.b: "Долой ленивых монархов!"
 news.32.c: "Она впрямь ушла?"
 news.32.f: "[This.GetNewspaperHeader]Стареешь, Селестия?"
 news.32.e: "Sic transit gloria mundi."
 news.33.t: "Социалистический Союз Эквестрии!"
 news.33.d: "[This.GetNewspaperHeader]После восстания коммунизма в Эквестрии, страна поддерживает очень тесные связи со своим коммунистическим соседом на северо-востоке, Сталлионграде. Старлайт Глиммер, верховный лидер Эквестрии, нашла дружбу между Эквестрией и Сталлионградом незаменимой. "Обычный рабочий," ответила она, "должен работать и держаться вместе ради защиты целого общества от империализма и гнета."Сегодняшнее заявление не оставляет сомнений. Вскоре после встречи между высокопоставленными лицами Эквестрии, Сталлионграда, Кристальной Империи и Страны Равных, было подписано соглашение о слиянии в единый "Социалистический Союз" По имеющимся данным, все Пони в Сталлионграде и Кантерлоте радовались новостям, развевали красные флаги и распевали песни по улицам, прославляя их лидеров."
 news.33.a: "Будущее Эквестрии в наших копытах!"
 news.33.b: "Победа пролетариата!"
 news.33.c: "Любопытно."
 news.34.t: "Сталлионград сдается"
 news.34.d: "[This.GetNewspaperHeader]Сегодня утром [STG.GetLeader] и СКП объявили о большом шаге, сделанном в сторону улучшения отношений с Эквестрией. Пони не понимают что происходит. Сталлионград похоже хоть и сохранил своё название, но стал автономной областью в составе Эквестрии. Кажется единственная успешная революция на континенте была побеждена изнутри."
 news.34.a: "Теперь мы вместе!"
 news.34.b: "Как так то?!."
 news.34.c: "Революция в Эквестрии утеряна."
 news.35.t: "Возвращение Сомбры"
 news.35.d: "[This.GetNewspaperHeader]Весь мир был шокирован, когда Король Сомбра вернулся из небытия, чтобы вернуть себе трон Кристальной Империи. Множество пони бегут прочь из страны чтобы спастись. Сообщается, что он появился как огромное чёрное облако в небе над кристальным городом, его возвращение принесло хаос и насилие на улицы городов Кристальной Империи. Некоторые пони бегут к дворцу и помогают дворцовой страже готовиться к обороне. Сражение за Кристальный город и дворец скорее выглядит не как бой, а как конвульсии умирающего зверя, загнанного в ловушку. Принцесса Ми Аморе Каденс и Принц Шайнинг Армор были эвакуированы из дворца как только все началось. Город пал к ногам Короля Сомбры и его сторонников, до нас доходят слухи, что он вернул себе своё тело и то что он уничтожил Кристальное сердце. Король Сомбра вернулся, а Кристальная Империя рухнула, как карточных домик. Что это значит для Эквестрии и всего мира?"
 news.35.d_com: "[This.GetNewspaperHeader]Молодая Республика Кристальных Пони снова был потрясена, так как король Сомбра вернулся из небытия, чтобы вернуть себе трон Кристальной Империи. Очевидцы сообщают, что монарх вернулся в виде черного как ночь облака дыма. Его возвращение вызвало хаос на улицах столицы, поскольку некоторые из граждан, очевидно поддерживающие возвращение Тёмного Короля, восстали и начали сражаться с революционной гвардией. Вскоре началась битва за старый дворец, превращённый в штаб-квартиру правящей партии, но у ошеломлённых и удивленных коммунистов было мало шансов на победу. Арктик Лили и большая часть лидерства коммунистической партии сбежали из города, пообещав продолжить борьбу против тирании.\nСитуация выглядит мрачной, поскольку теперь Сомбра получил своё тело обратно и явно в восторге от борьбы с «крестьянами» Республики Кристальных Пони. Битва за судьбу кристальных земель всё ещё бушует, а задаются вопросами, как это повлияет на Эквестрию и весь мир."
 news.35.a: "Зло стучится к нам в двери!"
 news.35.b: "Зло возвращается!"
 news.35.c: "Что это значит?"
 news.36.t: "Свадьба Короля Сомбры и Найтмер Мун?"
 news.36.d: "[This.GetNewspaperHeader]Население Лунной и Кристальной Империй было удивлено последним заявлением короля Сомбры. В своей последней речи он объявил, что желает стать мужем Найтмер Мун. Легенды гласят, что до того, как король Сомбра был изгнан, у него был роман с принцессой Луной. Исчезновение их обоих относят примерно к началу нынешней эры, тысячу лет назад. Некоторые пони предполагают, что тогда им не позволила быть вместе старшая сестра Луны, Селестия. И после того, как пара восстала, Селестия изгнала их обоих. Это, конечно, лишь легенды, но этим двум пони виднее. И нам ещё предстоит услышать ответ Найтмер Мун."
 news.36.a: "Это... звучит интересно."
 news.37.t: "Молодожены!"
 news.37.d: "[This.GetNewspaperHeader]Сегодня, на улицах [NLR.Capital.GetName] и [CRY.Capital.GetName] правили конфетти и счастье, в честь свадьбы между Королем Сомброй и Принцессой Луной, основное празднество проходило в [CRY.Capital.GetName], а празднества поменьше во всех городах. Вчера официально был зарегистрирован брак и главы всех государств были приглашены на праздник, хотя Принцесса Селестия не пришла и прокомментировала это так: "Луна еще раз предала меня. Она не любящий аликорн, которым она была раньше, и теперь она вышла замуж за страшного пони, ужасного, как и она". Мероприятие собрало сотни тысяч пони в столице империи короля Сомбры. Этот брак вызывал беспокойство, и весь мир заметил, как действительно опасен этот союз, который, несомненно, укрепил обоих монархов, Луна восставшая против своей сестры в кровавой гражданской войне. Изменит ли это баланс войны?"
 news.37.d_no_celestia: "[This.GetNewspaperHeader]Сегодня, В столице Лунной Империи и Кристальном городе на улицах правили конфетти и счастье, в честь свадьбы между Королем Сомброй и Принцессой Луной, основное празднество проходило в Кристальном городе, а празднества по-меньше во всех городах. Вчера официально был зарегистрирован брак и главы всех государств были приглашены на праздник, отсутствие Принцессы Селестии на свадьбе напомнило всему миру о опустошающей гражданской войне в которой Селестия упала к ногам сестры. Мероприятие собрало сотни тысяч пони в столице империи короля Сомбры. Этот брак вызывает беспокойство, и весь мир заметил, как действительно опасен этот союз, который, несомненно, укрепил обоих монархов. Теперь дальнейшее расширение двух держав на континенте, кажется неизбежным, но неясно, будет ли это через дипломатию или через войну."
 news.37.a: "О да."
 news.38.t: "Коронация Фларри Харт"
 news.38.d: "[This.GetNewspaperHeader]Сегодня в Кристальном Городе состоялся праздник, Фларри Харт была официально коронована, как Принцесса Кристальной Империи. Это конец правления принцессы Ми Аморе Каденс, её матери, которая правила на протяжении десятилетий. Вся Эквестрия с радостью встретила юную принцессу во время ее визита в Кантерлот, где она объявила, что она будет стремиться к дружбе и гармонии в мире, независимо какие решения она принимает."
 news.38.d_reg: "[This.GetNewspaperHeader]Сегодня в Кристальном Городе состоялся праздник, Фларри Харт была официально коронована, как Принцесса Кристальной Империи. Это конец регентства Принцессы Твайлайт Спаркл, которая выполняла свои обязанности с момента освобождения Кристальной Империи. Вся Эквестрия с радостью встретила юную принцессу во время её визита в Кантерлот, где она объявила, что будет стремиться к дружбе и гармонии по всему миру всеми силами. Праздник в тот день закончился фейерверком."
 news.38.a: "Отличная новость."
 news.44.t: "Свадьба Короля Сомбры и Королевы Кризалис"
 news.44.d_eqs_exists: "[This.GetNewspaperHeader]Сегодня, в Главном Улье и Кристальном Городе на улицах правили конфетти и счастье. В честь свадьбы между Королем Сомброй и Королевой Кризалис. Основное празднество прошло в Кристальном городе, а празднества по-меньше во всех городах. Вчера официально был зарегистрирован брак и главы всех государств были приглашены на праздник, хотя Принцесса Селестия и Принцесса Луна не присутствовали на торжестве. Сотни тысяч пони пришли в Кристальный Город, чтобы стать свидетелями союза, который замораживает кровь в жилах. Брак безусловно усилил обоих монархов, теперь когда исторические враги Эквестрии объединились, что же ждет Эквестрию?"
 news.44.d_eqs_not_exists: "[This.GetNewspaperHeader]Сегодня, в Главном Улье и Кристальном Городе на улицах правили конфетти и счастье. В честь свадьбы между Королем Сомброй и Королевой Кризалис. Основное празднество прошло в Кристальном городе, а празднества по-меньше во всех городах. Вчера официально был зарегистрирован брак и главы всех государств были приглашены на праздник. На этом важнейшем событии отсутствовали Эквестрийские принцессы, которые потерпели поражение в недавней кровопролитной войне. Сотни тысяч пони пришли в Кристальный Город, чтобы стать свидетелями союза, который замораживает кровь в жилах, весь мир заметил, как действительно опасен этот союз, который, несомненно, укрепил обоих монархов. Теперь дальнейшее расширение двух держав на континенте, кажется неизбежным, но неясно, будет ли это через дипломатию или через войну."
 news.44.a: "Что это такое?"
 news.44.b: "Великолепно!"
 news.44.c: "Они смеются над нами."
 news.44.e: "Наш улей расширяется!"
 news.41.t: "[CRY.GetNameDef] объявляет независимость"
 news.41.d: "[This.GetNewspaperHeader]\nВчера, восхищенные толпы выстроились вдоль сияющих бульваров, ведущих к Кристальному дворцу, в то время как председатель Краснокристальной Рабочей партии Арктик Лили возглавляла парад победы. Недавно избранные коммунисты почти не тратили времени и сразу же начали конфисковывать земли, заменять эквестрийских советников местными пони и разрывать все связи с Эквестрией. Полная слёз принцесса Ми Аморе Каденс произнесла речь перед прессой и её шокированными сторонниками и заявила, что добровольно отрекается от своего титула: «Я всегда буду ценить и любить каждого из вас, и именно из-за любви к вам я признаю волю кристальных пони». Близкие друзья королевской семьи сказали, что принцесса намерена вернуться в Эквестрию, чтобы быть с своими друзьями и семьей."
 news.41.a: "Аликорна свергли простым голосованием?!"
 news.42.t: "Конец Великой Кристальной Войны"
 news.42.d: "[This.GetNewspaperHeader]Сегодня граждане Эквестрии могут полной грудью вдохнуть воздух и насладиться прекрасным солнцем Селестии, ведь Принцесса Селестия заявила о победе над Королем Сомброй и его деспотичным режимом. \n "С поражением Сомбры и его прихвостней", сказала Селестия, "Мы освободили наших братьев и сестер - Кристальных пони и мы вернем в их земли мир и процветание. Давайте же почтим минутой молчания, тех кто положил свою жизнь на алтарь войны, чтобы мы могли наслаждаться радостями мирного времени"."
 news.42.a: "Великолепная новость!"
 news.43.t: "Конец Великой Кристальной Войны"
 news.43.d: "[This.GetNewspaperHeader]Тёмные времена наступили сегодня для Эквестрии и её граждан. Эквестрийское лидерство было захвачено Сомброй и его силами во время последней отчаянной битвы. Без них эквестрийская мораль крайне значительно упала, и остатки нации сдались захватчикам. Пони прятались в своих домах, когда кристальные войска маршировали по улицам, не встречая сопротивления. Знамёна Сомбры и его режима теперь развеваются над каждым городом и посёлком.\nЭквестрия побеждена, сокрушена железным копытом Сомбры. Будущее выглядит весьма мрачным для пони Эквестрии."
 news.43.a: "Это ужасно."
 news.43.b: "Мы будем править Эквестрией!"

 news.40.t_cw: "Интервенция Эквестрии в Кристальную Империю"
 news.40.d_cw: "[This.GetNewspaperHeader]В Кристальной Империи бушует гражданская война и принцесса Ми Аморе Каденс сражается за трон с королём Сомброй. Их южный сосед, Эквестрия, ранее собиралась позволить ситуации идти своим чередом, но теперь всё изменилось. В Кантерлоте [equestria.GetLeader] уволила многих своих советников и публично отчитала их за препятствие вмешательству в кризис. Политические последствия этого, вероятно, будут ощущаться совсем недолго, хотя, как сообщают наблюдатели, тысячи эквестрийских солдат собираются на границе между южной Кристальной Империей и северной Эквестрией. Скорее всего, к тому моменту, когда вы прочтете эти строки, войска уже перейдут в наступление."
 news.40.a_cw: "Мы идём на помощь!"
 news.40.e_cw: "Помощь, наконец-то, уже в пути."
 news.40.b_cw: "Проклятье! Опять эти надоедливые эквестрийцы."
 news.40.c_cw: "Что же их так задержало?"

 news.40.t_sa: "Сомбра идёт на юг"
 news.40.d_sa: "[This.GetNewspaperHeader]В Кристальной Империи бушует гражданская война и принцесса Ми Аморе Каденс сражается за трон с королём Сомброй. Их южный сосед, Эквестрия, ранее собиралась позволить ситуации идти своим чередом, но теперь всё изменилось. В Кантерлоте [equestria.GetLeader] уволила многих своих советников и публично отчитала их за препятствие вмешательству в кризис. Политические последствия этого, вероятно, будут ощущаться совсем недолго, хотя, как сообщают наблюдатели, тысячи эквестрийских солдат собираются на границе между южной Кристальной Империей и северной Эквестрией. Скорее всего, к тому моменту, когда вы прочтете эти строки, войска уже перейдут в наступление."
 news.40.a_sa: "Сомбра не сможет преодолеть границу."
 news.40.b_sa: "Похоже, наша атака более не является секретом."
 news.40.c_sa: "Он сумасшедший, если решился атаковать столь большую страну."

 news.40.t_ea: "Эквестрия идёт на север"
 news.40.d_ea: "[This.GetNewspaperHeader]После окончания гражданской войны в Кристальной Империи новое правительство под лидерством короля Сомбры стало вести внешнюю политику гораздо более агрессивно. До сих пор находящаяся на юге Эквестрия никак на это реагировала. Однако теперь отчеты с северной границы Эквестрии показывают, что гарнизоны вдоль неё стали как никогда многочисленными и становятся всё больше с каждым часом. Король Сомбра выразил публичный протест относительно наращивания сил, но до сих пор правительство Эквестрии было нехарактерно молчаливым по этому поводу, за исключением одного слова, произнесённого лидером армии Эквестрии «Овсянка». Судя по всему, Эквестрия готовится вступить в войну."
 news.40.a_ea: "За гармонию!"
 news.40.b_ea: "Эта ночь не будет тихой!"
 news.40.c_ea: "Эквестрийцы просто гуляют по своему заднему двору."

 news.46.t: "Король Сомбра и Королева Кризалис"
 news.46.d_eqs_exists: "[This.GetNewspaperHeader]Сегодня, правитель Кристальной Империей, Король Сомбра на своём официальном выступлении сделал предложение копыта и сердца Королеве Кризалис, властительнице Земель чейнджлингов. Вопрос остается актуальным, ведь Кризалис ещё не дала своего ответа, но если она согласится, это укрепит обе державы против их исторического врага - Эквестрии. Эквестрийские принцессы никак не прокомментировали это событие. Мы ждем развития событий."
 news.46.d_eqs_not_exists: "[This.GetNewspaperHeader]Сегодня, правитель Кристальной Империей, Король Сомбра на своём официальном выступлении сделал предложение копыта и сердца Королеве Кризалис, властительнице Земель чейнджлингов. Вопрос остается актуальным, ведь Кризалис ещё не дала своего ответа, но если она согласится, они создадут могущественнейший альянс, что не может не означать, то что это большая подготовка, к большой войне. Но что будет если она откажет ему, стоит ли нам ожидать войну между ними?"
 news.46.a: "Хмм..."
 news.46.b: "Теперь мы будем вместе."
 news.46.c: "Вы шутите?"
 news.46.e: "Копыто нашей королевы?"
 news.47.t: "Королева Кризалис отвергает предложение копыта и сердца!"
 news.47.d_eqs_exists: "[This.GetNewspaperHeader]\n\nКоролева Кризалис отвергает предложение Короля Сомбры! Этим утром официальная администрация Её Величества ответила на это так: "Королева Кризалис слишком могущественная и великая ей не нужен рудимент в виде мужа". Это несомненно отличная новость для Эквестрии, ведь если бы объединились 2 могущественные империи им было бы очень туго. Теперь мы ожидаем ответа Сомбры, некоторые эксперты утверждают, что будет война, так ли это? Подтвердит время."
 news.47.d_eqs_not_exists: "[This.GetNewspaperHeader]\n\nКоролева Кризалис отвергает предложение Короля Сомбры! Этим утром официальная администрация Её Величества ответила на это так: "Королева Кризалис и так слишком могущественная, и великая ей не нужен рудимент в виде мужа". Теперь мы ожидаем ответа Сомбры, некоторые эксперты утверждают, что будет война, так ли это? Хотя если это случится, то нас ожидает война еще более кровопролитная и опустошительная."
 news.47.a: "Ну что ж."
 news.47.b: "Не может быть!"
 news.47.c: "Это правильное решение."
 news.47.e: "О боже..."
 news.49.t: "Принцесса Луна отвергает брак!"
 news.49.d: "[This.GetNewspaperHeader]Принцесса Луна отвергает предложение Короля Сомбры! Этим утром официальная администрация Её Величества ответила на это так: "Принцесса Луна слишком могущественна и прекрасна для такого ничтожества как ты". Теперь мы ожидаем ответа Сомбры, некоторые эксперты утверждают, что будет война и если это случится то нас ожидает война еще более кровопролитная и опустошительная, чем гражданская война в Эквестрии."
 news.49.a: "Ладно."
 news.50.t: "Ядерная бомбардировка"
 news.50.d: "[This.GetNewspaperHeader]Сегодня война изменилась навсегда. Утром дня [GetDate] эквестрийский стратегический бомбардировщик Авро Ланкастер, названный Октавией Мелоди в честь знаменитой музыкантки, выполнял стандартное задание по бомбардировке Весалиполиса. Однако он сбросил совсем не обыкновенные бомбы. Хотя сведения о сброшенном заряде пока остаются засекреченными, огромное грибовидное облако было видно даже с линии фронта. Мы взяли эксклюзивное интервью у пилота Ланкастера, Лайтнинг Даст, и на наш вопрос о своих чувствах по поводу бомбардировки она ответила следующее:\n— О, всё просто отлично. Эта малышка наверняка убила кучу жуков. Не могу сказать почему, не могу сказать как, но там точно очень много мёртвых насекомых. Меня так и подмывает переименовать "Старушку Окти" в "Репеллент от тараканов"."
 news.50.a: "Будь они прокляты, навеки!"
 news.50.b: "Кара солнца настигла их!"
 news.50.e: "Мы сделали, то что нужно было сделать."
 news.50.c: "Дейбрейкер безумна!"
 news.50.f: "Как Селестия могла позволить это!?"
 news.51.t: "Заря революционного фронта"
 news.51.d: "[This.GetNewspaperHeader]Сегодня [STG.GetLeader] и Верховный Совет объявили о создании международной организации под названием "Революционный фронт". Они собираются заручиться поддержкой коммунистических держав мира для свержения всех реакционеров и окончательного торжества пролетариата."
 news.51.a: "Ладненько."
 news.200.t: "Гражданская война в Эквестрии!"
 news.200.d_1: "[This.GetNewspaperHeader]В Эквестрии разразился хаос после серии событий, потрясших ранее спокойную и мирную нацию.\n\nПринцесса Луна, возглавившая движение за расширение прав бэтпони, была арестована принцессой Селестией за связь с террористическими группами. Гражданские демонстранты, пытавшиеся помочь Луне, были жестоко убиты, а принцесса Луна в растерянности сбежала в Мейнхеттен.\n\nПринцесса Луна утверждает, что Селестия сошла с ума и превратилась в жестокую огненную кобылу. Принцесса Селестия утверждает, что Луна снова превратилась в тёмную Найтмер Мун.\n\nНи одна из сторон не желала отступить и разразилась гражданская война, расколовшая континент на две части."
 news.200.d_2: "[This.GetNewspaperHeader]В Эквестрии разразился хаос после попытки покушения в Мейнхеттене на принцессу Луну во время речи о правах бэтпони. В ответ на это город захватили лояльные фестралы и лунные лоялисты. Принцесса Луна взлетела в воздух, предупредив, что принцесса Селестия сошла с ума от ненависти к бэтпони и замышляла её смерть. Принцесса Селестия утверждает, что Луна превратилась в тёмную Найтмер Мун.\n\nНи одна из сторон не желала отступить и разразилась гражданская война, расколовшая континент на две части."
 news.200.c: "Неужто скоро падут небеса?"
 news.200.a: "Как же это случилось?"
 news.200.b: "Во славу Ночи!"
 
 news.201.t: "Конфедерация Южных Штатов"
 news.201.d: "[This.GetNewspaperHeader]Хаос в Эквестрии дал жизнь новым государствам. Администрация южных эквестрийских областей провозгласила независимое от Эквестрии государство. Почти весь юго-восток оказался под их контролем. Они граничат лишь с территориями Государства Бизонов, но и это положение неустойчиво."
 news.201.a: "Любопытно."
 news.201.b: "Трусы."
 news.201.c: "Никто не желает быть частью этой прогнившей страны."
 news.201.e: "Конфедерации не стоит забывать о яблочной войне."
 news.202.t: "Ванхуверская коммуна"
 news.202.d: "[This.GetNewspaperHeader]Коммунисты Ванхувера воспользовались моментом, и провозгласили их новую коммуну на берегах бухты Луны. Возглавляемые бывшим эквестрийским адмиралом Даст Хувером, они захватили контроль над самим городом и его окрестностями, после чего объявили о нейтралитете в продолжающемся конфликте."
 news.202.a: "Революция распространяется."
 news.202.b: "Интересно, как долго они продержатся?"
 news.203.t: "Конец гражданской войны в Эквестрии"
 news.203.d: "[This.GetNewspaperHeader]Победа! В месяц [GetMonth] [GetYear] года весь Кантерлот празднует сдачу последних войск, верных Найтмер Мун. Прошли месяцы ожесточенной борьбы, но Лоялистская Армия Эквестрии смогла окружить Легионы Найтмер Мун и победить их. Теперь, когда страна избавилась от предателей, Эквестрии предстоит долгий путь восстановления. Остальная часть мира не сидела на месте, и Эквестрии нужно быть наготове."
 news.203.a: "Слава принцессе!"
 news.203.b: "Наконец."
 news.203.c: "Слава Императрице!"
 news.206.t: "Конец гражданской войны в Эквестрии"
 news.206.d: "[This.GetNewspaperHeader]Победа! В месяц [GetMonth] [GetYear] года весь Кантерлот празднует сдачу последних оставшихся войск, верных Найтмер Мун. Прошли месяцы ожесточенной борьбы, но Лоялистская Армия Эквестрии смогла окружить Легионы Найтмер Мун и победить их. Теперь, когда страна избавилась от предателей, Эквестрии предстоит долгий путь восстановления. Остальная часть мира не сидела на месте, и Эквестрии нужно быть наготове."
 news.206.a: "Слава принцессам!"
 news.206.b: "Наконец закончилось."
 news.208.t: "Уничтожение Сталлионграда"
 news.208.d: "[This.GetNewspaperHeader]Сегодня мрачный день для пони Сталлионграда, поскольку эффективная и профессиональная Лунная Армия силой эвакуировала город, не дав поставленным в тупик жителям время подготовиться или выразить протест. Когда опустилась ночь, сотни артиллерийских батарей начали безжалостный обстрел города. К рассвету город превратился в груды щебня и пепла, а из упрямых граждан, которые решили остаться в обречённом городе, из руин сумело выбраться меньше половины. Когда её попросили дать комментарий, императрица Найтмер Мун заявила: «Хм? О, да, я приказала стереть этот город с лица земли. Мне очень приятно слышать, что мои пони сумели сделать это в столь короткие сроки. Жаль только, что мы позволили болезни коммунизма развиться до такой степени, что пришлось применить столь радикальные меры. Однако, как вы видите, мы сумели решить эту проблему»."
 news.208.d_sol: "[This.GetNewspaperHeader]Этот день знаменует собой ещё одну великую победу Солнечной Империи и печальное напоминание о том, что происходит с теми, кто сопротивляется правлению Дейбрейкер. Несмотря на протесты и сопротивление, город Сталлионград был силой эвакуирован беспощадной Солнечной армией. Затем пони загнали в несколько зон временного содержания вокруг города. После этого они услышали чудовищный шум: сотни, может быть, тысячи бомбардировщиков сбрасывали зажигательные бомбы на город. Потребовалось лишь несколько часов, по прошествии которых от прежнего города осталась лишь выгоревшая оболочка, а пламя стерло всё следы предыдущих жителей города. Императрица Дейбрейкер заявила, что такая судьба ждёт всех, кто посмеет сопротивляться справедливому и сострадательному правлению Солнца."
 news.208.a: "..."
 news.204.t: "Конец Гражданской войны в Эквестрии"
 news.204.d: "[This.GetNewspaperHeader]Сегодня мы в последний раз увидели Эквестрию, какой ее знали. После месяцев ожесточенной борьбы, Легионы Найтмер Мун взяли власть над страной, правительство и Принцесса Селестия в изгнании. Множество лоялистов все еще сражается в партизанских условиях. Но большая часть лоялистских сил уничтожена, и война выиграна. Найтмер Мун теперь предстоит трудный путь перестройки и утверждения ее правления. С нынешней напряженностью в мире война может вернуться в Лунную Империю, рано или поздно."
 news.204.a: "Наконец, победа наша."
 news.204.b: "Интересно."
 news.205.t: "Война на юге!"
 news.205.d: "[This.GetNewspaperHeader]Лунный контроль над юго-восточной частью Эквестрии в настоящее время весьма шаток. Рабочие в Балтимейре восстали и изгнали гарнизон фестралов, а доктор Кабальерон основал Временное Правительство Ацтлана при поддержке коренных пони и наёмников. Наконец, лоялисты Найтмер Мун были оттеснены в джунгли и горы, когда наскоро собранные отряды Селестийского Сопротивления во главе с известной (и вымышленной?) искательницей приключений Дэринг Ду освободили Стейблсайд и несколько близлежащих городов."
 news.205.a: "Что ж, ситуация быстро обострилась."
 
 ###Summer sun, winter moon and their imperial alternatives
 news.301.t: "Праздник Летнего Солнца"
 news.301.d: "[This.GetNewspaperHeader]Пони изо всех слоёв общества собрались сегодня в Кантерлоте на Праздник Летнего Солнца. Первоначально он отмечался в честь победы принцессы Селестии над Найтмер Мун, но сегодня он проводится в честь самого длинного дня в году, возвращения принцессы Луны и магии дружбы. В полной тишине принцесса ступила на высокий помост, окинула долгим взглядом собравшихся пони и приступила к подъёму солнца. Толпа с удивлением наблюдала за грандиозной демонстрацией величественной силы аликорна, и после восхода солнца ещё долго гремели аплодисменты. Празднования продолжались до конца дня, сохраняя дух уважения к древним традициям Эквестрии."
 news.301.d_lunatics: "[This.GetNewspaperHeader]Наши шпионы в Эквестрии сообщают, что недавно состоялся ежегодный Праздник Летнего Солнца. Это мрачное шоу полностью сосредоточено на принцессе Селестии и почитании солнца, пренебрегая усилиями принцессы Луны по управлению ночью. Этот пример декадентского и расточительного веселья отлично показывает, насколько слабыми и изнеженными стали эквестрийцы. Скоро придёт время нашего славного возвращения."
 news.301.a: "Жизнь в Эквестрии хороша."
 news.301.b: "Отвратительно. Задёрните шторы."
 news.301.c: "Ложь! Наши боги поднимают солнце, а не она!"
 news.301.e: "Нежный свет Селестии сохраняет лето тёплым."
 news.301.f: "Найтмер вернётся."
 news.301.g: "Пусть она бережно направляет солнце."
 news.301.h: "А ведь давным-давно единороги поднимали солнце..."
 news.301.i: "Ложь! Наш Бог поднимает солнце, а не она!"
 
 news.302.t: "Праздник Вечного Солнца"
 news.302.d: "[This.GetNewspaperHeader]В последнее время в Эквестрии многое изменилось, но не уважение к древним традициям. Преданные верующие и фанатики собрались сегодня в Кантерлоте, чтобы засвидетельствовать Праздник Летнего Солнца... или то, во что он превратился. В сопровождении военных императрица Дейбрейкер ступила на помост и произнесла пламенную речь перед толпой, похвалив их за верность новому режиму, отметив пони, не проявивших должного почтения. Под торжественную оркестровую аранжировку оперного театра Кантерлота, императрица подняла солнце, и пони поклонились, потому что они были недостойны лицезреть Её великолепие. После этого Дейбрейкер произнесла речь, в которой обрушилась на врагов государства, пообещав каждому из них чудовищный конец в языках пламени."
 news.302.a: "Да здравствует императрица!"
 news.302.b: "Твой конец близок."
 news.302.c: "Нам стоит беспокоиться?"
 news.302.e: "Селестия превратилась в то, чего всегда боялась."
 news.302.f: "Всё это время мы были правы."
 
 news.304.t: "Праздник Зимней Луны"
 news.304.d: "[This.GetNewspaperHeader]Праздник Зимней Луны, недавно предложенный принцессой Твайлайт Спаркл, является новым торжеством, призванным прославить принцессу Луну и её чудесную ночь. Принцесса решила провести своё мероприятие в Мейнхеттене, известном как город, который никогда не спит. К её удивлению, реакция была более бурной, чем она ожидала, и пони со всей Эквестрии собрались, желая увидеть таинственного диарха. Тронутая теплотой встречи, принцесса Луна поблагодарила их всех за участие и пожелала единства и дружбы в предстоящие суровые зимние месяцы. Когда принцесса творила свою магию, пони ахнули от восторга при виде ночного неба, чья красота всё ярче раскрывалась в лунном свете и под россыпью сияющих созвездий. Пиршество продолжалось до поздней ночи, а сама принцесса была замечена веселящейся среди обычных пони."
 news.304.a: "Принцесса Луна по-своему обаятельна."
 news.304.b: "Всегда в роли второй скрипки, Луна?"
 news.304.c: "Разве Селестия не была единственной правительницей?"
 news.304.e: "Ночь Луны можно сравнить лишь с её свирепой красотой."
 news.304.f: "Однажды мы освободим Найтмер."
 
 news.305.t: "Праздник Бесконечной Луны"
 news.305.d: "[This.GetNewspaperHeader]После победы Найтмер Мун и её союзников-фестралов, она быстро избавилась от инакомыслия и создала собственные традиции, сосредоточенные вокруг празднований Ночи, фестралов и новой власти. И вершиной этого является Праздник Бесконечной Луны, посвящённый самой длинной ночи года и победе Найтмер над уже изгнанной сестрой. Мероприятие, состоявшееся в Кантерлоте, привлекло самых ревностных последователей и солдат Императрицы, а также нескольких пони из пресс-службы. Узурпировав церемониальный помост своей сестры, Императрица гордо стояла на нём и, похоже, её совсем не беспокоил холод ночи, чего никак нельзя было сказать о толпе. Затем она произнесла вдохновенную речь о новом режиме в Эквестрии и о том, что теперь ночь никогда больше не будет забыта или проигнорирована. Несмотря на довольно суровый дух праздника, Найтмер Мун не преминула продемонстрировать величие ночи и вдохновила пони красотой луны и величием звёзд."
 news.305.a: "Во славу ночи!"
 news.305.b: "Твой конец близок, Луна."
 news.305.c: "Зима явно стала холоднее..."
 news.305.e: "Отказ Селестии заморозил сердце Луны."
 
 ### CITY FALL EVENTS ####
 news.111.t: "Чейнджлинги одержали победу над Эквестрией"
 news.111.d: "[This.GetNewspaperHeader]Сегодня чёрный день для всей Эквестрии. Сейчас сопротивление военной машине чейнджлингов привело бы лишь к верной гибели, принцессы-аликорны пропали без вести, поэтому дипломаты Эквестрии запросили мира. Хотя многие генералы хотели продолжить борьбу, антивоенно настроенные мирные жители и коллаборационисты оказывали давление на остатки эквестрийского правительства, не желая терять в пустую ещё больше жизней.\nПосле подписания безоговорочной капитуляции пушки, наконец, замолчали. В ходе национальной трансляции Королева Кризалис объявила о полной победе над Эквестрией и пообещала, что нация будет реорганизована в марионеточное государство, дружественное чейнджлингам.\nПока ещё неясно, что будет с новой Эквестрией и её населением, но многие обрадовались новости о том, что Эквестрия будет жить, хоть и на правах марионетки. По крайней мере, сейчас."
 news.111.d_eqc: "[This.GetNewspaperHeader]Сегодня чёрный день для всей Эквестрии. Сейчас сопротивление военной машине чейнджлингов привело бы лишь к верной гибели, но принцессы-аликорны и большая часть двора сбежали в Новый Мейрленд, находящийся вне досягаемости клыков чейнджлингов. Остатки правительства запросили мир.\nПосле подписания безоговорочной капитуляции пушки, наконец, замолчали. В ходе национальной трансляции Королева Кризалис объявила о полной победе над Эквестрией и пообещала, что нация будет реорганизована в марионеточное государство, дружественное чейнджлингам.\nОднако, Селестия обещала продолжить борьбу, вдохновив многих павших духом покорённых пони, так что будущее этой марионетки всё ещё туманно."
 news.111.a: "Чейнджлинги оказались сильнее."
 news.111.b: "Мы победили!"
 news.112.t: "Чейнджлинги одержали победу над Эквестрией"
 news.112.d: "[This.GetNewspaperHeader]Сегодня чёрный день для всей Эквестрии. Сейчас сопротивление военной машине чейнджлингов привело бы лишь к верной гибели, принцессы-аликорны пропали без вести, поэтому дипломаты Эквестрии запросили мира. Хотя многие генералы хотели продолжить борьбу, антивоенно настроенные мирные жители и коллаборационисты оказывали давление на остатки эквестрийского правительства, не желая терять в пустую ещё больше жизней.\nЧейнджлинги заняли часть Эквестрии, которая оставалась под контролем Селестии. Многие из них продолжили отбирать пищу и ценности у побежденных пони, которые не имели сил и прав защитить себя. Многие пони надеялись, что Кризалис даст Эквестрии определённую автономии, но эти надежды были быстро разрушены.\nВойна закончилась, и для Эквестрии и её народа наступают тёмные времена."
 news.112.d_eqc: "[This.GetNewspaperHeader]Сегодня чёрный день для всей Эквестрии. Сейчас сопротивление военной машине чейнджлингов привело бы лишь к верной гибели, но принцессы-аликорны и большая часть двора сбежали в Новый Мейрленд, находящийся вне досягаемости клыков чейнджлингов. Остатки правительства запросили мир.\nЧейнджлинги заняли часть Эквестрии, которая оставалась под контролем Селестии. Многие из них продолжили отбирать пищу и ценности у побежденных пони, которые не имели сил и прав защитить себя. Селестия осудила эти действия и поклялась продолжать борьбу за гармонию даже в таких условиях.\nВойна закончилась, и для Эквестрии и её народа наступают тёмные времена. За океаном по-прежнему сияет свет, но пони Эквестрии будут ещё долго ждать дня, когда этот свет вернётся в Кантерлот."
 news.112.a: "Эквестрии более нет."
 news.112.b: "Мы одержали убедительную победу!"
 news.112.c: "Мы ещё не побеждены, Кризалис!" #EQC
 news.45.t: "Кристальная Война"
 news.45.d: "[This.GetNewspaperHeader]То что многие пони опасались случилось. Повсюду пограничные отряды Эквестрии сообщают о яростных столкновениях между ними и войсками из Кристальной Империи. Они также сообщали о многочисленных атаках волн из тысяч пони, которые, казалось, делали это против своей воли. Но пограничники не имели другого выбора, кроме как застрелить как можно больше из них, чтобы их не погребла под собой орда из пони с промытыми мозгами. Сам король Сомбра сохраняет зловещее молчание по этому вопросу, а [EQS.GetLeader] уже начала выступать с речами по радио, поощряя своих пони смело сражаться.\nНачалась Великая Кристальная Война. Выдержит ли её Эквестрия?"
 news.45.a: "Война добралась и до континента Эквестрии!"
 news.45.b: "За Эквестрию."
 news.45.c: "Наконец, пришло время для мести..."

