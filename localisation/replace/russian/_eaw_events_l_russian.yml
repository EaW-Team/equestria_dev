 # 1-3 unused in EAW
 political.4.t: "[Root.GetName] переживает классовый конфликт"
 political.4.d: "Коммунистическое революционное движение, ранее пользовавшееся поддержкой лишь маргинальных интеллектуалов и отчаянных бунтарей, неожиданно стало набирать популярность в среде [Root.GetAdjective]ого рабочего класса. Уже сам тот факт, что все больше [Root.GetRaceMembers] готовы причислять себя к какому-то «классу», показывает, что идеи марксизма распространились не только среди тех, кто активно стремится к свержению правительства.\n\n[Root.GetRulingParty] оплакивает такой разворот общественного мнения и горюет о тех временах, когда для [Root.GetRaceMembers] было важно слово «[Root.GetAdjective]ий». Похоже, что революция уже свершается в обществе на различных уровнях, и остановить этот процесс невозможно."
 political.4.a: "[Root.GetRaceMembers] могут называть себя как угодно."
 political.5.t: "Солдаты дезертируют и идут в красные партизаны"
 political.5.d: "«Капиталисты и националисты хотят, чтобы вы проливали за них кровь на фронте и убивали своих братьев из-за споров, которые никак не касаются рабочего! Вместо того чтобы с оружием идти против рабочих, сражающихся за свободу в своей стране, оберните его против угнетателей и свергните тиранов!»\n\nАрмия, которая раньше была оплотом патриотизма и верности, оказалась уязвима для коммунистической пропаганды, стремительно распространяющейся в государстве [Root.GetName]. Солдаты дезертируют, отказываются сражаться за свою родину, а порой даже примыкают к партизанам, которые заявляют, что готовят революцию."
 political.5.a: "Возможно, они просто хотят жить по-другому."
 # 6-10 unused
 political.11.t: "Сторонники превосходства формируют штурмовые дивизии"
 political.11.d: "В идеологии превосходства всегда переплетались политика и военная сила. Одновременно с расширением политического влияния сторонники превосходства начали создавать военизированные организации для защиты как от внешней, так и от внутренней угрозы, причем к последней они относят своих политических противников. Многих беспокоит такое развитие событий, однако на волне милитаристского подъема все больше добровольцев вливается в наши вооруженные силы.\n\nПолитические лидеры движения показали, что оппоненты не зря опасаются их. Когда армия становится политизирована на всех уровнях, враги государства [Root.GetName] и враги превосходства начинают выглядеть очень похоже."
 political.11.a: "Только предателям нации есть чего опасаться."
 political.12.t: "Угроза коммунизма"
 political.12.d: "«[Root.GetLeader] убеждает вас, что [Root.GetName] в полном порядке и единении. Эта ложь отравляет умы [Root.GetRaceMembers], когда совсем рядом, на пороге дома, уже затаилась змея! Достаточно взглянуть через нашу границу, где соотечественники во имя коммунизма воюют друг с другом и заявляют о скорой гибели наций. Как скоро они объявят мертвой нашу нацию? И какую защиту может дать нам [Root.GetRulingParty]?»\n\n[Root.GetName] переживает рост движения превосходства из-за близости коммунистической революции. Многие умеренные, которые в другое время отвергли бы превосходство, как и любые иные неуместные эксперименты с идеологией, сейчас испытывают озабоченность. Если выбирать между коммунизмом наших соседей и режимом сторонников превосходства, последний кажется им предпочтительнее. И многие готовы активно поддержать такой выбор."
 political.12.a: "Мы станем заслоном на пути красной угрозы!"
 #13-14 unused
 political.15.t: "Формирование гармонической оппозиции"
 political.15.d: "Как и стоило ожидать, после смягчения ограничений на публичную антиправительственную пропаганду голоса недовольных стали звучать громче. Пока что организованные акции протеста и памфлеты распространены в основном в университетах или в бедных районах государства [Root.GetName], но движение ширится, в этом сомнений нет.\n\nМнение лидеров нации разделилось. [Root.GetLeader], несгибаемый лидер правящей партии, не желает никаких публичных дебатов. И все же первые шаги сделаны, обратного пути уже нет."
 political.15.a: "В отсутствие репрессий это движение проявляется естественным образом."
 political.16.t: "Призыв ко всеобщим выборам"
 political.16.d: "Проявления общественного недовольства, которые случались ранее лишь в отдельных местах, теперь случаются повсюду. Пока [Root.GetRaceMembers] выходят на улицы, партия [Root.GetRulingParty] стоит на перепутье. Если мы не пресечем эту пропаганду, наши оппоненты и даже некоторые члены партии могут потребовать проведения референдума, на котором общественность откажет нам в доверии. Единство, к которому мы так долго стремились, уступает место плюрализму мнений - и все они направлены против нас."
 political.16.a: "Даже если начнутся реформы, мы должны проявить силу, подавив несогласие."
 political.16.b: "Наши [Root.GetRaceMembers] должны быть услышаны."
 #17 unused
 political.18.t: "Сторонники превосходства требуют референдум"
 political.18.d: "Быстро растущее [Root.GetAdjective]ое движение превосходства никогда не утверждало, что нуждается в поддержке большинства для захвата власти, и рассчитывало объединить нацию уже после смены правящего режима. Тем не менее, общество все больше его поддерживает. Сторонники превосходства называют [Root.GetLeader] лицемером, потому что нельзя утверждать, будто выражаешь волю народа, и не слышать его голосов.\n\nПризыв к референдуму до сих пор отвергался как типичная попытка членов партии [Root.GetRulingParty] сломать систему, но это, по крайней мере, политическая мера. Если не делать совсем ничего, сторонники превосходства могут решить, что лучше захватить власть силой."
 political.18.a: "Подавить это ненавистное движение!"
 political.18.b: "Не стоит обращать на них внимания."
 political.18.c: "Если [Root.GetRaceMembers] этого захотят, мы проведем референдум."
 political.19.t: "Коммунисты требуют референдум"
 political.19.d: "Марксистские идеи закрепились в государстве [Root.GetName] довольно давно и пользуются все большей поддержкой. Это уже не просто политическая теория, а настоящее движение, объединившее как недовольных рабочих, так и некоторых знаменитостей. Коммунисты называют это классовым сознанием. Партия [Root.GetRulingParty] называет это прямым путем к бунту и измене.\n\nУ коммунистов нет веры в то, что [Root.GetLeader] захочет проводить предлагаемые ими реформы, поэтому они требуют немедленно провести референдум о смене власти. Мы еще можем попытаться перетянуть общественное мнение на свою сторону, но если попытка окончится неудачей, это может привести к революции."
 political.19.a: "Необходимо подавлять любую анти[Root.GetAdjective]ую деятельность!"
 political.19.b: "Не стоит обращать внимания на болтунов."
 political.19.c: "Уж лучше референдум, чем кровавый бунт."
 political.20.t: "Демократы требуют референдум"
 political.20.d: "Нет ничего удивительного, что идея о том, чтобы народ сам управлял своей страной, обрела популярность в обществе. Разумеется, партия [Root.GetRulingParty] видит в демократических идеях - свобода слова, всеобщие выборы, свободная пресса - всего лишь популистскую риторику, призванную ослабить правительство, которое возглавляет [Root.GetLeader].\n\nИ все же трудно отрицать, что такие идеи нашли поддержку в [Root.GetAdjective]ом обществе. В соответствии с демократической традицией их сторонники требуют проведения референдума, чтобы сместить правящий режим. Это можно игнорировать, однако подобные идеи достаточно жизнестойки. Что с нами будет, если мирная революция окажется невозможной?"
 political.20.a: "Это надо прекратить."
 political.20.b: "Будем жить как обычно."
 political.20.c: "Если дать согласие на референдум, мы еще можем сохранить наше наследие."
 political.21.t: "[Root.Capital.GetName] в опасности, сторонники превосходства наступают"
 political.21.d: "Сделав вид, будто они требуют референдум для получения власти мирным путем, и столкнувшись с отказом, сторонники превосходства использовали значительную общественную поддержку и связи в [Root.GetAdjective]ой армии, чтобы устроить переворот. Правительство, которое возглавляет партия [Root.GetRulingParty], не подчинилось их требованиям и утверждает, что будет до победного конца бороться за сохранение государства [Root.GetName] таким, каким мы его знаем."
 political.21.a: "Мы остановим их любой ценой!"
 political.21.b: "Сторонники превосходства лучше всех ощущают истинный дух нации!"
 political.22.t: "Коммунизм на подъеме"
 political.22.d: "После того как им отказали в проведении референдума, немногие реформаторы-коммунисты быстро утратили свое влияние в государстве [Root.GetName], и верх взяли радикалы. Партия [Root.GetRulingParty] отказалась признать, что общество жаждет реформ, и все больше [Root.GetRaceMembers] стали проникаться революционной романтикой. Лидеры движения без труда подняли народ на восстание. Отдельные очаги недовольства быстро переросли в полномасштабную гражданскую войну, и теперь будущее всей нации поставлено на карту."
 political.22.a: "Мы не позволим им развалить страну!"
 political.22.b: "Огонь революции можно погасить лишь кровью угнетателей!"
 political.23.t: "[Root.GetAdjective]ая весна"
 political.23.d: "После того как народ не получил желаемого референдума и демократических преобразований, [Root.GetRaceMembers], стоявшие за идеей реформ, сочли, что режим [Root.GetLeader] уже не сделать лучше. Коалиция повстанческих группировок, объединённая общей целью демократизации политической системы в государстве [Root.GetName], взялась за оружие и объявила, что она не успокоится до тех пор, пока партия [Root.GetRulingParty] находится у власти."
 political.23.a: "Не хватало еще, чтобы нами правила толпа!"
 political.23.b: "[Root.GetName] наконец обретает свободу!"
 political.24.t: "Сторонники превосходства осмеяны"
 political.24.d: "Очарованность [Root.GetAdjective]ого общества националистической гордыней и попытками возродить былую державную славу, похоже, миновала. Это стало болезненным ударом по ярым сторонникам превосходства, над чьей униформой, воинственными позами и напыщенными речами сейчас все смеются.\n\nОдно время они казались угрозой для партии [Root.GetRulingParty], но теперь [Root.GetAdjective]их сторонников превосходства все чаще оценивают как нелепый экстремизм и попытку уничтожить фундаментальные ценности нации - той самой нации, которую они, якобы, так ценили и уважали. Слово «сторонник превосходства» из политического определения стало оскорблением."
 political.24.a: "Вот ведь клоуны."
 political.25.t: "Коммунистический пузырь лопнул"
 political.25.d: "Многие коммунисты обещали, что государство [Root.GetName] станет следующим в цепочке охваченных так называемой мировой революцией, но после нескольких месяцев забастовок и красных флагов на улицах дело пошло на спад. Рабочий класс, который должен был стать движущей силой революции, решил, что у него есть заботы поважнее, чем свержение [Root.GetLeader]: видимо, пример других коммунистических держав его не слишком вдохновил. Интеллектуалы, со страстью призывавшие перерезать горло угнетателям, в реальности не пожелали делать ничего, что могло бы помешать их комфорту.\n\nРазговоры о революции, конечно, будут продолжаться - за кружкой дешевого пива или за бокалом дорогого вина, - но так разговорами и останутся."
 political.25.a: "Вот ведь лицемеры."
 political.26.t: "Гармоническое движение затихает"
 political.26.d: "После нескольких месяцев громогласной борьбы с режимом, главой которого является [Root.GetLeader], призывов ко всеобщим выборам и принятия либеральных законов о свободе слова и собраний, движение развалилось. Сейчас [Root.GetRaceMembers] куда больше заботит стабильность государства [Root.GetName], если в нем пройдут такие реформы, и они видят в демократах в первую очередь бунтарей и смутьянов.\n\nИнтересно, что несколько вождей этого движения пропали или внезапно прекратили деятельность. Возможно, кто-то из них отправился в изгнание, когда увидел всю бесплодность своих усилий. [Root.GetRulingParty] и правительство отрицают, что имеют к этому отношение."
 political.26.a: "Вот ведь неудачники."
 political.27.t: "[Root.GetLeader] отказывается от внешней политики нейтралитета"
 #political.27.d_fascism: "Вскоре после прихода партии [Root.GetRulingParty] к власти [Root.GetLeader] объявил, что [Root.GetName] откажется от своей внешней политики нейтралитета.\n«Мир стал слишком сложным и запутанным. В одиночку нам не продержаться. Мы должны объединиться с нашими партнёрами-сторонниками превосходства против врагов. Если не будем бороться вместе, то погибнем поодиночке»."
 political.27.d_communism: "Вскоре после прихода партии [Root.GetRulingParty] к власти [Root.GetLeader] объявил, что [Root.GetName] откажется от своей внешней политики нейтралитета.\n«Мир стал слишком сложным и запутанным. Наша страна всегда придерживалась своих принципов и готова их защищать. В одиночку нам не продержаться. Сегодня нейтралитет не дает гарантий безопасности, и те, кто рвется к власти над миром, не чтут его. Мы должны объединиться с нашими товарищами-коммунистами против угнетателей. Против мировой буржуазии, которая только и думает, как нас остановить. Если не будем бороться вместе, то погибнем поодиночке»."
 political.27.a: "За будущее государства [Root.GetName]"
 political.28.t: "Государство [Root.GetNameDefCap] воссоединяется"
 political.28.d: "Кажется, эта ужасная гражданская война, опустошившая нашу родину, наконец закончилась, и мы достигли некоторого политического компромисса. Теперь, когда мы окончательно примирились со своими [Root.GetAdjective]ими товарищами, мы сможем восстановить нашу великую нацию. Врагам, которые планировали нажиться на нашем внутреннем конфликте, придётся столкнуться с единым [Root.GetAdjective]им государством.\n\nНовое государство [Root.GetName], в котором царит [Root.GetRulingIdeology], больше никогда не будет разделено!"
 political.28.a: "Наконец-то мы едины!"
 #29 does not exist
 #31 - 33 don't need ovewriting

### Generic war_justification
 war_justification.1.t: "[Root.GetLeader] высказывается против государства [From.GetName]"
 war_justification.1.d: "«Принадлежит ли государство [From.GetName] [From.GetAdjective]ому народу? Зададим другой вопрос: принадлежит ли будущее [From.GetAdjective]ому народу или государству [Root.GetNameDef]?»\n\nВ сегодняшней речи [Root.GetLeader] демонстрирует, что [Root.GetName] - на пути к войне. Политическая напряженность нарастает уже на протяжении месяца, и, похоже, [Root.GetAdjective]ий народ готов смириться с неизбежностью грядущей войны."
 war_justification.1.a: "Будущее принадлежит государству [Root.GetName]"
 war_justification.2.t: "[Root.GetLeader] осуждает [From.GetAdjective]ие идеалы"
 war_justification.2.d: "«[From.GetAdjective]ий народ утверждает, что обладает свободой и гармонией, утверждает, что хочет мира, но все, чем они так гордятся, - это пустые слова. Их гармония разделяет [From.GetRaceMembers], когда они должны быть едины, их свобода - не более чем отсутствие порядка. Наш [Root.GetAdjective]ий народ видит эту ложь насквозь... и мы видим, что мир - мир на их условиях - это тоже ложь».\n\n[Root.GetRulingParty] давно насмехается над слабостью [From.GetAdjective]ого народа, но в последнее время риторика стала более агрессивной. Вот-вот разразится вооруженный конфликт."
 war_justification.2.a: "Государство [Root.GetName] объединяется под властью [Root.GetLeader]."
 war_justification.3.t: "[Root.GetLeader] предупреждает об опасности [From.GetAdjective]ого коммунизма"
 war_justification.3.d: "«Есть ли худшая угроза нашему образу жизни, да и вообще любому образу жизни, чем коммунизм? Чума, угрожающая привести к власти в каждой стране не хозяев, а рабов, уничтожить само понятие государства, народа, его истории. Мы захватим государство [From.GetName] и искореним заразу».\n\nНенависть [Root.GetLeader] к коммунистам общеизвестна с тех времен, когда партия [Root.GetRulingParty] пришла к власти, и она только усилилась по отношению к [From.GetAdjective]ому правительству. Великий поход против марксизма может начаться именно здесь."
 war_justification.3.a: "Кто отрицает государство, того ждет гибель."
 war_justification.4.t: "[Root.GetName] готовится к великой борьбе"
 war_justification.4.d: "«[From.GetAdjective]ий народ - народ, который просто так не выпустит власть из рук. И все же он должен понимать, что пути развития наших держав неумолимо ведут к столкновению. Мы должны быть готовы к нему. [From.GetName] - это страна, которая не может быть завоевана бескровно.\n\nНесмотря на схожесть идеологии, вместо поисков взаимопонимания правительства государств [From.GetName] и [Root.GetName] развернули подготовку к вооруженному конфликту."
 war_justification.4.a: "Наша победа войдет в историю."
 war_justification.5.t: "[Root.GetLeader] приносит революцию в государство [From.GetName]"
 war_justification.5.d: "«Мы укрепили социалистическое общество в государстве [Root.GetName], однако многие другие народы еще страдают от деспотии. Трудящиеся государства [From.GetName] не имеют права голоса, своей организации, и все попытки ввести социализм будут жестоко подавляться режимом, главой которого является [From.GetLeader]. Мы не можем ждать, пока жернова мировой революции провернутся и освободят [From.GetAdjective]ий народ. Мы революцией доказали, что способны уничтожить угнетателей у себя, теперь пора раздавить угнетателей в городе [From.Capital.GetName]!»\n\n[Root.GetLeader] больше не пользуется дипломатическим языком, когда говорит о партии [From.GetRulingParty], которую возглавляет [From.GetName]. Проблема стирания всех границ теперь свелась к уничтожению границ между двумя странами."
 war_justification.5.a: "[From.GetAdjective]ие рабочие, освобождение грядет!"
 war_justification.6.t: "[Root.GetLeader] призывает помочь [From.GetAdjective]им рабочим"
 war_justification.6.d: "«Есть ли ложь большая, чем так называемая свобода [From.GetAdjective]ого народа? Раньше они были рабами князей и герцогов, претендовавших на владение землей, теперь их вынуждают продавать свой труд тем, кто якобы владеет фабриками. Нельзя называть свободой право выбора хозяина. Точно так же и их свобода выбирать себе вождей является ложной, ведь пропаганда никогда не позволит прийти к власти истинным социалистам. Если народу так промыли мозги, спасти его может только [Root.GetAdjective]ое вмешательство».\n\n[Root.GetLeader] выступает против правительства государства [From.GetName] уже долгое время, на каждом съезде партии, но теперь эти речи звучат еще более публично. Сложно поверить, что конфликт удастся решить мирным путем."
 war_justification.6.a: "Мы уничтожим диктатуру буржуазии!"
 war_justification.7.t: "[From.GetAdjective]ий коммунизм терпит неудачу"
 war_justification.7.d: "«Товарищи, хотя величайших революционеров когда-то назвали предателями, теперь стало очевидно, что сама революция была предана. Иначе как объяснить, что к власти в государстве [From.GetName] пришла партия [From.GetRulingParty], которая отбросила все марксистские идеи, чтобы построить псевдорабочее государство и править там на лживых основаниях? Укрепляя свои силы за счет мировой революции, они показали, что безразличны к тем идеалам, которые клялись защищать. Мы должны принести к ним истинную революцию».\n\nНесмотря на первоначальную поддержку [From.GetAdjective]ой революции, [Root.GetLeader] все чаще выражает разочарование ее ходом. Возможно, партия [Root.GetRulingParty] решит вмешаться, пока не поздно."
 war_justification.7.a: "Мы еще можем спасти эту попытку построить социализм."
 war_justification.8.t: "[Root.GetLeader] призывает раздавить [From.GetAdjective]ий национализм"
 war_justification.8.d: "«Есть ли общество более отвратительное для будущего революции, более чуждое трудящимся, чем режим превосходства государства [From.GetName]? Призывая народ фанатично отдавать все свои силы на развитие устаревшего национального государства, они обрядили дикарство в современные наряды и пытаются выставлять себя альтернативой будущему, в котором неизбежна победа рабочего класса по всему миру. Это лишь вопрос времени, когда они нанесут удар по нашим союзникам. Мы должны ударить первыми».\n\nНикто не ожидал ничего, кроме взаимного презрения между нами и [From.GetAdjective]ий народом, но в последнее время ненависть усилилась. Похоже, конфликт разгорится в ближайшее время."
 war_justification.8.a: "Смерть сторонникам превосходства!"
 war_justification.9.t: "Разрыв дипломатических отношений с государством [From.GetName]"
 war_justification.9.d: "«Несмотря на все попытки отыскать дипломатическое решение конфликта между нами и государством [From.GetName], переговоры вновь были сорваны, и у нас не осталось выбора. Авторитарный режим, лидером которого является [From.GetLeader], показал себя неразумным и глухим к чаяниям народа. Если только [From.GetAdjective]ое лидерство не изменит курс коренным образом, нам придется начать борьбу».\n\n[Root.GetAdjective]ое вмешательство во внутренние дела государства [From.GetName] стало насущным вопросом в последнее время, хотя некоторые оппозиционные политики утверждали, что партия [Root.GetRulingParty] стремилась к войне с самого начала. Впрочем, каковы бы ни были первоначальные намерения сторон, сейчас война выглядит реальной и неизбежной."
 war_justification.9.a: "Иногда конфликт попросту неизбежен."
 war_justification.10.t: "[Root.GetLeader] призывает к вмешательству во внутренние дела государства [From.GetName]"
 war_justification.10.d: "«С тяжелым сердцем нам приходится признать всю сложность своего положения: у нас нет иного пути, кроме захвата государства [From.GetName]. Никакой другой выход из создавшейся ситуации невозможен, мы должны получить это стратегическое преимущество. Мы не считаем, что [Root.GetAdjective]ий или [From.GetAdjective]ий народ хотят войны, но исторически сложилось так, что выбора у нас не осталось. Остается лишь надеяться, что мы проявим силу сейчас - и ценой такой решимости избежим кровопролития в будущем».\n\nНесмотря на распространенную теорию о том, что демократические страны не воюют друг с другом, все указывает на то, что в скором времени начнется [Root.GetAdjective]ая агрессия против государства [From.GetName]. Хотя в истории ничто не является предопределенным."
 war_justification.10.a: "[From.GetName] трудно назвать по-настоящему гармонической страной."
 war_justification.11.t: "[Root.GetLeader] призывает к борьбе против красной угрозы"
 war_justification.11.d: "«Без сомнений, коммунистический режим государства [From.GetName] представляет одну из главных опасностей для свободы и порядка в нашу эпоху. Неутомимо и безжалостно он стремится лишить [From.GetAdjective]ий народ надежды на построение процветающего демократического общества и поглотить соседние страны. Если мы ничего не сделаем сейчас, то не сумеем остановить эту лавину неудавшихся социальных экспериментов. Сколько смертей нам еще нужно, чтобы наконец вмешаться?»\n\nУгроза подрывной деятельности [From.GetAdjective]их агентов для разрушения демократии активно обсуждается в обществе. Оппозиция утверждают, что с помощью этого «Красного пугала» страну подталкивают к войне с государством [From.GetName], но пока что народ готов прислушиваться к тому, что говорит партия [Root.GetRulingParty]."
 war_justification.11.a: "Их идеология крайне агрессивна, на что еще они могут рассчитывать, кроме агрессии?"
 war_justification.12.t: "[Root.GetLeader] противостоит [From.GetAdjective]ому злу"
 war_justification.12.d: "«Современная история, а возможно, и история в целом не знает тирании худшей, чем та стальная узда, в которой [From.GetRulingParty] держит государство [From.GetName]. Нас убеждают, что не стоит провоцировать конфликт и лучше поверить в то, что [From.GetLeader] станет соблюдать договоры и свои обещания. Но те, кто так говорит, не понимают, что никакие договоренности со сторонниками превосходства не имеют смысла. Для этих бесчестных лжецов важна только грубая сила, а бумага, на которой написаны договоры, горит так же легко, как книги их противников».\n\nОбщественность долгое время надеялась избежать прямой конфронтации с государством [From.GetName], но теперь против этого активно выступает [Root.GetLeader]. Аргументы просты, говоря словами Макиавелли: мы лишь оттягиваем войну, и это идет врагу на пользу. Нам, возможно, имеет смысл нанести удар первыми."
 war_justification.12.a: "Не будет мира для нас, пока они не уйдут."
 war_justification.13.t: "[Root.GetLeader] призывает к войне против государства [From.GetName]"
 war_justification.13.d: "«Мы мирный народ, но один лишь национальный характер не определяет исторический курс, которым мы должны следовать. Сейчас время войны. Слишком долго [From.GetAdjective]ий народ владел богатствами, которые нам необходимы, чтобы выжить в грядущих испытаниях, и они не желают расставаться с ними по-хорошему. Как бы мы ни старались построить современное государство, есть споры, которые решаются только в бою, как это было принято у предков».\n\n[Root.GetLeader] демонстрирует неприкрытую враждебность в адрес государства [From.GetName] для оправдания агрессии. Часть населения поддерживает такой курс, но решение лидер будет принимать единолично."
 war_justification.13.a: "Это непростое решение, но мы должны его принять."
 war_justification.14.t: "[Root.GetLeader] бросает вызов [From.GetAdjective]им претензиям"
 war_justification.14.d: "«Государство [From.GetName] может считать себя более современным и продвинутым в сравнении с нами, но они не прошли таких испытаний, как мы, и они не готовы дать ответ на те угрозы, что уже видны на горизонте. Они относятся к нам с презрением и мешают завладеть тем, что наше по праву, они сами сделали нас угрозой для себя. Их слабая, разобщенная страна не сможет устоять перед нами».\n\nПренебрежение к государству [From.GetName], которое выказывает лидер партии [Root.GetRulingParty], стало откровенно враждебным. Известно, что [From.GetAdjective]ий народ не хочет войны, однако [Root.GetLeader] утверждает, что своим высокомерием соседи провоцируют эту войну сами."
 war_justification.14.a: "Они не знают, как мы закалились в испытаниях."
 war_justification.15.t: "[Root.GetLeader] желает восстановить порядок в государстве [From.GetName]"
 war_justification.15.d: "«Дух [Root.GetAdjective]ой нации крепок, но не всем странам так повезло. В государстве [From.GetName] все прежние традиции были уничтожены, законные правители убиты и похоронены, и все это во имя великой марксистской революции. Наш долг - навести в мире порядок, очистить его от кровавых узурпаторов и в борьбе с этой угрозой укрепить державу [Root.GetName]».\n\nПартия [Root.GetRulingParty] всегда противостояла коммунизму, и государство [From.GetName] являлось постоянным объектом нападок. Трудно сказать, являются ли коммунисты реальной угрозой для [Root.GetAdjective]ой нации, но упредительный удар по [From.GetAdjective]ий коммунизму скоро может быть нанесен."
 war_justification.15.a: "Мы должны отомстить за всех жертв революции!"
 war_justification.16.t: "[Root.GetLeader] бросает вызов [From.GetAdjective]им угнетателям"
 war_justification.16.d: "«Мои оппоненты пытаются утверждать, что мое правление ничем не отличается от того, что творит партия [From.GetRulingParty] в государстве [From.GetName]. Они категорически неправы. Все успехи [From.GetLeader] - результат всеобщей деструктивной веры в то, что можно силой подчинить себе другие народы, но эта иллюзия скоро пройдет. Партия [Root.GetRulingParty] не желает подчиняться таким тенденциям и твердо выступает за это. Я готов сделать все необходимое для устранения угрозы, даже если это будет означать войну».\n\n[Root.GetLeader] проводит враждебную политику в отношении [From.GetAdjective]ой нации. Своих лидеров мы можем называть по-разному, а вот сторонников превосходства - только врагов."
 war_justification.16.a: "Традиции и здравый смысл всегда берут верх над фанатизмом и террором."
 war_justification.17.t: "[Root.GetLeader] ставит под сомнение [From.GetAdjective]ий суверенитет"
 war_justification.17.d: "«Кто определяет границы государства и как они определяются? В прошлом [Root.GetRaceMembers] могли решать по любой причине, что [Root.GetName] заканчивается здесь, а тут начинается [From.GetName], но мы живем в новую эпоху. Стратегическое значение границ трудно переоценить, и мы имеем полное право двигать их так, чтобы обеспечить своему народу безопасность».\n\n[Root.GetLeader] в своих последних речах утверждает, что нападение на государство [From.GetName] неминуемо. Есть те, кто готов против этого возражать, но в целом общество настроено на войну."
 war_justification.17.a: "Мы должны сплотиться ради этой цели!"
 war_justification.18.t: "[Root.GetLeader] сомневается в том, чего на самом деле хочет [From.GetName]"
 war_justification.18.d: "«Нет сомнения в том, что [From.GetName] готовится к войне. Изменения в экономической политике явно доказывают, что [From.GetAdjective]ий народ не хочет мира и ждет лишь удобного случая, чтобы нанести нам удар. Будем ли мы сидеть сложа конечности, пока они вооружаются, если при этом [Root.GetName] остается без защиты? Или мы справимся с этой угрозой прежде, чем она нависнет над нами всерьез?»\n\nЯстребы из партии [Root.GetRulingParty] устремили взоры в сторону государства [From.GetName] и утверждают, что лучшая защита - это нападение. Их точка зрения набирает популярность, и [Root.GetName] готовится к войне."
 war_justification.18.a: "Этот конфликт придется закончить военным путем."
 war_justification.19.t: "[Root.GetLeader] недоволен [From.GetAdjective]ими провокациями"
 war_justification.19.d: "«Те наивные [Root.GetRaceMembers] в государстве [Root.GetName], которые считают, что [From.GetAdjective]ий народ стремится к миру, утратили связь с реальностью. Население приграничных областей не питает подобных иллюзий, ведь они видят, как на той стороне границы собираются войска, нацеленные против нас. Это угроза, которую мы не можем оставлять без ответа. С каждым днем [From.GetName] готовится к войне. Если мы не сошли с ума, то должны делать то же самое».\n\n[From.GetAdjective]ое военное присутствие вблизи наших границ встревожило общественность не на шутку, и теперь это государство воспринимается партией [Root.GetRulingParty] как наш главный враг. Хотя можно спорить, не появились ли войска на границе именно в результате таких речей..."
 war_justification.19.a: "Это не имеет значения, пора готовиться к войне."
 war_justification.20.t: "[Root.GetLeader] отстаивает право на захват государства [From.GetName]"
 war_justification.20.d: "«Если мы хотим получить стратегическое преимущество в вероятной - если не сказать неизбежной - войне с государством [From.GetName], пора отбросить всякие сомнения. Мы говорим о будущем наших детей и о том, чтобы обеспечить для державы [Root.GetName] надлежащее место в мире. Это вопрос нашей приверженности своим целям и идеалам, которые мы привыкли принимать как данность. Пришло время действовать».\n\nЛидеры партии [Root.GetRulingParty] и в особенности [Root.GetLeader] произносят пламенные речи, призывая общественность поддержать захват государства [From.GetName]. Геополитические мотивы, подпитывающие эту агрессию, не выносятся на публику, ораторы взывают к патриотизму, и это отлично действует на народ."
 war_justification.20.a: "Нация поддерживает это значимое решение."
 war_justification.201.t: "[From.GetLeader] выступает против государства [Root.GetName]"
 war_justification.201.d: "«Принадлежит ли государство [Root.GetName] [Root.GetAdjective]ому народу? Зададим другой вопрос: принадлежит ли будущее [Root.GetAdjective]ому народу или государству [From.GetName]?»\n\nВ сегодняшней речи [From.GetLeader] демонстрирует, что [From.GetName] - на пути к войне. Политическая напряженность нарастает уже на протяжении месяца, и, похоже, [From.GetAdjective]ий народ готов смириться с неизбежностью грядущей войны. Государство [Root.GetName] тоже должно готовиться."
 war_justification.201.a: "Почему нам не дают жить в мире и покое?"
 war_justification.202.t: "[From.GetLeader] осуждает [Root.GetAdjective]ие идеалы"
 war_justification.202.d: "«[Root.GetAdjective]ий народ утверждает, что обладает свободой и гармонией, утверждает, что хочет мира, но все то, чем они так гордятся - это пустые слова. Их гармония разделяет [From.GetRaceMembers], когда они должны быть едины, их свобода - не более чем отсутствие порядка. Наш [From.GetAdjective]ий народ видит эту ложь насквозь... и мы видим, что мир - мир на их условиях - это тоже ложь».\n\n[From.GetRulingParty] давно насмехается над слабостью [Root.GetAdjective]ого народа, но в последнее время риторика стала более агрессивной. Вот-вот разразится вооруженный конфликт."
 war_justification.202.a: "[From.GetLeader] - это гадина сторонников превосходства, чего еще ожидать."
 war_justification.203.t: "[From.GetLeader] предупреждает об опасности [Root.GetAdjective]ого коммунизма"
 war_justification.203.d: "«Есть ли худшая угроза нашему образу жизни, да и вообще любому образу жизни, чем коммунизм? Чума, угрожающая привести к власти в каждой стране не хозяев, а рабов, уничтожить само понятие государства, народа, его истории. Мы захватим государство [From.GetName] и искореним заразу».\n\nНенависть лидера [From.GetLeader] к коммунистам общеизвестна с тех времен, когда партия [From.GetRulingParty] пришла к власти, и она только усилилась по отношению к [Root.GetAdjective]ому правительству. Великий поход против марксизма может начаться именно здесь."
 war_justification.203.a: "Если они боятся наших идеалов - они боятся тех, кого поклялись защищать."
 war_justification.204.t: "[From.GetName] готовится к великой борьбе"
 war_justification.204.d: "«[Root.GetAdjective]ий народ - народ, который просто так не выпустит власть из рук. И все же он должен понимать, что пути развития наших держав неумолимо ведут к столкновению. Мы должны быть готовы к нему. [Root.GetName] - это страна, которая не может быть завоевана бескровно.\n\nНесмотря на схожесть идеологии, вместо поисков взаимопонимания правительства государств [Root.GetName] и [From.GetName] развернули подготовку к вооруженному конфликту."
 war_justification.204.a: "Пусть приходят!"
 war_justification.205.t: "[From.GetLeader] приносит революцию в государство [Root.GetName]"
 war_justification.205.d: "«Мы укрепили социалистическое общество в государстве [From.GetName], однако многие другие народы еще страдают от деспотии. Трудящиеся государства [Root.GetName] не имеют права голоса, своей организации, и все попытки ввести социализм будут жестоко подавляться режимом, главой которого является [Root.GetLeader]. Мы не можем ждать, пока жернова мировой революции провернутся и освободят [Root.GetAdjective]ий народ. Мы революцией доказали, что способны уничтожить угнетателей у себя, теперь пора раздавить угнетателей в городе [Root.Capital.GetName]!»\n\n[From.GetLeader] больше не пользуется дипломатическим языком, когда говорит о нашем правительстве. Коммунистическая задача стирания всех границ теперь свелась к уничтожению границ нашей державы."
 war_justification.205.a: "[Root.GetLeader] - лучший лидер, чем какой-то революционер-оппортунист!"
 war_justification.206.t: "[From.GetLeader] призывает помочь [Root.GetAdjective]им рабочим"
 war_justification.206.d: "«Есть ли ложь большая, чем так называемая свобода [Root.GetAdjective]ого народа? Раньше они были рабами князей и герцогов, претендовавших на владение землей, теперь их вынуждают продавать свой труд тем, кто якобы владеет фабриками. Нельзя называть свободой право выбора хозяина. Точно так же и их свобода выбирать себе вождей является ложной, ведь пропаганда никогда не позволит прийти к власти истинным социалистам. Если народу так промыли мозги, спасти его может только [From.GetAdjective]ое вмешательство».\n\nКоммунистический режим государства [From.GetName] не готов признать, что наш народ готов обойтись без их социальных экспериментов, и открыто угрожает нашей безопасности. Сложно поверить, что конфликт удастся решить мирным путем."
 war_justification.206.a: "Разве могут быть истинными ценности, которые нам хотят навязать силой?"
 war_justification.207.t: "[Root.GetAdjective]ий коммунизм терпит неудачу"
 war_justification.207.d: "«Товарищи, хотя величайших революционеров когда-то назвали предателями, теперь стало очевидно, что сама революция была предана. Иначе как объяснить, что к власти в государстве [Root.GetName] пришла партия [Root.GetRulingParty], которая отбросила все марксистские идеи, чтобы построить псевдорабочее государство и править там на лживых основаниях? Укрепляя свои силы за счет мировой революции, они показали, что безразличны к тем идеалам, которые клялись защищать. Мы должны принести к ним истинную революцию».\n\nНесмотря на первоначальную поддержку партии [Root.GetRulingParty] и ее победы, [From.GetLeader] больше не разделяет взгляды [Root.GetLeader]. Конфликт разгорелся уже до той стадии, что они готовы силой навязать нам истинный социализм."
 war_justification.207.a: "Они не понимают, что значит революция для [Root.GetAdjective]ого народа."
 war_justification.208.t: "[From.GetLeader] призывает раздавить [Root.GetAdjective]ий национализм"
 war_justification.208.d: "«Есть ли общество более отвратительное для будущего революции, более чуждое трудящимся, чем режим превосходства государства [Root.GetName]? Призывая народ фанатично отдавать все свои силы на развитие устаревшего национального государства, они обрядили дикарство в современные наряды и пытаются выставлять себя альтернативой будущему, в котором неизбежна победа рабочего класса по всему миру. Это лишь вопрос времени, когда они нанесут удар по нашим союзникам. Мы должны ударить первыми».\n\nНикто не ожидал ничего, кроме взаимного презрения между нами и [Root.GetAdjective]ий народом, но в последнее время ненависть усилилась. [From.GetLeader] призывает к войне, и, похоже, конфликт разгорится в ближайшее время."
 war_justification.208.a: "Лучше мертвый, чем красный!"
 war_justification.209.t: "Разрыв дипломатических отношений с государством [Root.GetName]"
 war_justification.209.d: "«Несмотря на все попытки отыскать дипломатическое решение конфликта между нами и государством [Root.GetName], переговоры вновь были сорваны, и у нас не осталось выбора. Авторитарный режим, лидером которого является [Root.GetLeader], показал себя неразумным и глухим к чаяниям народа. Если только [Root.GetAdjective]ое лидерство не изменит курс коренным образом, нам придется начать борьбу».\n\n[From.GetAdjective]ое вмешательство в наши внутренние дела стало насущным вопросом в последнее время, хотя некоторые оппозиционные политики утверждали, что партия [From.GetRulingParty] стремилась к войне с самого начала. Впрочем, каковы бы ни были первоначальные намерения сторон, сейчас война выглядит реальной и неизбежной."
 war_justification.209.a: "Вся их пренебрежительная риторика нас не запугает."
 war_justification.210.t: "[From.GetLeader] призывает к вмешательству во внутренние дела государства [Root.GetName]"
 war_justification.210.d: "«С тяжелым сердцем нам приходится признать всю сложность своего положения: у нас нет иного пути, кроме захвата государства [Root.GetName]. Никакой другой выход из создавшейся ситуации невозможен, мы должны получить это стратегическое преимущество. Мы не считаем, что [From.GetAdjective]ий или [Root.GetAdjective]ий народ хотят войны, но исторически сложилось так, что выбора у нас не осталось. Остается лишь надеяться, что мы проявим силу сейчас - и ценой такой решимости избежим кровопролития в будущем».\n\nНесмотря на распространенную теорию о том, что демократические страны не воюют друг с другом, все указывает на то, что в скором времени начнется [From.GetAdjective]ая агрессия против государства [Root.GetName]. Хотя в истории ничто не является предопределенным."
 war_justification.210.a: "[From.GetName] трудно назвать по-настоящему гармоничной страной, если она так агрессивна."
 war_justification.211.t: "[From.GetLeader] призывает к борьбе против красной угрозы"
 war_justification.211.d: "«Без сомнений, коммунистический режим государства [Root.GetName] представляет одну из главных опасностей для свободы и порядка в нашу эпоху. Неутомимо и безжалостно он стремится лишить [Root.GetAdjective]ий народ надежды на построение процветающего демократического общества и поглотить соседние страны. Если мы ничего не сделаем сейчас, то не сумеем остановить эту лавину неудавшихся социальных экспериментов. Сколько смертей нам еще нужно, чтобы наконец вмешаться?»\n\nНарождающееся рабочее движение напугало [From.GetAdjective]их лидеров. Представители их оппозиции говорят, что те намеренно запугивают народ «Красным пугалом» и ведут дело к войне, но пока что риторика партии [From.GetRulingParty] имеет успех."
 war_justification.211.a: "До тех пор, пока из этого можно извлечь прибыль, капиталисты будут готовить войну."
 war_justification.212.t: "[From.GetLeader] противостоит [Root.GetAdjective]ому злу"
 war_justification.212.d: "«Современная история, а возможно, и история в целом не знает тирании худшей, чем та стальная узда, в которой [Root.GetRulingParty] держит державу [Root.GetName]. Нас убеждают, что не стоит провоцировать конфликт и лучше поверить в то, что [Root.GetLeader] станет соблюдать договоры и свои обещания. Но те, кто так говорит, не понимают, что никакие договоренности со сторонниками превосходства не имеют смысла. Для этих бесчестных лжецов важна только грубая сила, а бумага, на которой написаны договоры, горит так же легко, как книги их противников».\n\nЗависть к нашей мощи и славной истории толкает [From.GetAdjective]ую нацию к войне на уничтожение. Все их мирные заверения оказались ложью."
 war_justification.212.a: "Это неизбежно. Значит, это следует сделать как можно скорее."
 war_justification.213.t: "[From.GetLeader] призывает к войне против государства [Root.GetName]"
 war_justification.213.d: "«Мы мирный народ, но один лишь национальный характер не определяет исторический курс, которым мы должны следовать. Сейчас время войны. Слишком долго [Root.GetAdjective]ий народ владел богатствами, которые нам необходимы, чтобы выжить в грядущих испытаниях, и он не желает расставаться с ними по-хорошему. Как бы мы ни старались построить современное государство, есть споры, которые решаются только в бою, как это было принято у предков».\n\nВ недавней речи, обращенной к [From.GetAdjective]ому народу, [From.GetLeader] проявляет неприкрытую враждебность в адрес государства [Root.GetName] для оправдания агрессии. Часть населения поддерживает такой курс, но решение лидер будет принимать единолично."
 war_justification.213.a: "Они пожалеют, что сделали нас своими врагами."
 war_justification.214.t: "[From.GetLeader] бросает вызов [Root.GetAdjective]им претензиям"
 war_justification.214.d: "«Государство [Root.GetName] может считать себя более современным и продвинутым в сравнении с нами, но они не прошли таких испытаний, как мы, и они не готовы дать ответ на те угрозы, что уже видны на горизонте. Они относятся к нам с презрением и мешают завладеть тем, что наше по праву, они сами сделали нас угрозой для себя. Их слабая, разобщенная страна не сможет устоять перед нами».\n\nПренебрежение к государству [Root.GetName], которое демонстрирует лидер партии [From.GetRulingParty], стало откровенно враждебным. Всем известно, что [Root.GetAdjective]ий народ не хочет войны, однако [From.GetLeader] утверждает, что своим высокомерием наши избранные лидеры провоцируют эту войну сами."
 war_justification.214.a: "Если [From.GetAdjective]ий народ и пытается выступать за мир, его никто не слышит."
 war_justification.215.t: "[From.GetLeader] желает восстановить порядок в государстве [Root.GetName]"
 war_justification.215.d: "«Дух [From.GetAdjective]ой нации крепок, но не всем странам так повезло. В государстве [Root.GetName] все прежние традиции были уничтожены, законные правители убиты и похоронены, и все это во имя великой марксистской революции. Наш долг - навести в мире порядок, очистить его от кровавых узурпаторов и в борьбе с этой угрозой укрепить державу [From.GetName]».\n\nПартия [From.GetRulingParty] всегда противостояла коммунизму, и государство [Root.GetName] являлось постоянным объектом нападок. Хотя коммунизм является естественной следующей ступенью исторического развития, их вожди так этого боятся, что готовы напасть на [Root.GetAdjective]ий народ."
 war_justification.215.a: "Реакционеры показывают свое истинное лицо."
 war_justification.216.t: "[From.GetLeader] бросает вызов [Root.GetAdjective]им угнетателям"
 war_justification.216.d: "«Мои оппоненты пытаются утверждать, что мое правление ничем не отличается от того, что творит партия [Root.GetRulingParty] в государстве [Root.GetName]. Они категорически неправы. Все успехи [Root.GetLeader] - результат всеобщей деструктивной веры в то, что можно силой подчинить себе другие народы, но эта иллюзия скоро пройдет. Партия [From.GetRulingParty] не желает подчиняться таким тенденциям и твердо выступает за это. Я готов сделать все необходимое для устранения угрозы, даже если это будет означать войну».\n\n[From.GetLeader] проводит враждебную политику в отношении [Root.GetAdjective]ой нации. Наши грядущие успехи и масштабные планы вызвали у них закономерную зависть, и теперь они чувствуют себя под угрозой."
 war_justification.216.a: "Если они хотят помериться с нами силой, их ждет поражение."
 war_justification.217.t: "[From.GetLeader] ставит под сомнение [Root.GetAdjective]ий суверенитет"
 war_justification.217.d: "«Кто определяет границы государства и как они определяются? В прошлом [Root.GetRaceMembers] могли решать по любой причине, что [From.GetName] заканчивается здесь, а тут начинается [Root.GetName], но мы живем в новую эпоху. Стратегическое значение границ трудно переоценить, и мы имеем полное право двигать их так, чтобы обеспечить своему народу безопасность».\n\n[From.GetLeader] в своих последних речах утверждает, что нападение на государство [Root.GetName] неминуемо. Есть те, кто готов против этого возражать, но в целом общество настроено на войну."
 war_justification.217.a: "Разве они не дадут миру шанс?"
 war_justification.218.t: "[From.GetLeader] сомневается в том, чего на самом деле хочет [Root.GetName]"
 war_justification.218.d: "«Нет сомнения в том, что [Root.GetName] готовится к войне. Изменения в экономической политике явно доказывают, что [Root.GetAdjective]ий народ не хочет мира и ждет лишь удобного случая, чтобы нанести нам удар. Будем ли мы сидеть сложа конечности, пока они вооружаются, если при этом [From.GetName] остается без защиты? Или мы справимся с этой угрозой прежде, чем она нависнет над нами всерьез?»\n\nЯстребы из партии [From.GetRulingParty] устремили взоры в сторону государства [Root.GetName] и утверждают, что лучшая защита - это нападение. Их точка зрения набирает популярность, и [From.GetName] готовится к войне."
 war_justification.218.a: "Именно поэтому мы и должны быть наготове."
 war_justification.219.t: "[From.GetLeader] недоволен [Root.GetAdjective]ими провокациями"
 war_justification.219.d: "«Те наивные [From.GetRaceMembers] в государстве [From.GetName], которые считают, что [Root.GetAdjective]ий народ стремится к миру, утратили связь с реальностью. Население приграничных областей не питает подобных иллюзий, ведь они видят, как на той стороне границы собираются войска, нацеленные против нас. Это угроза, которую мы не можем оставлять без ответа. С каждым днем [Root.GetName] готовится к войне. Если мы не сошли с ума, то должны делать то же самое».\n\nНаше военное присутствие вблизи [From.GetAdjective]их границ встревожило их, поскольку они сочли это доказательством враждебных намерений. Едва ли они осознают, что именно их агрессивная риторика стала тому причиной."
 war_justification.219.a: "Но они угрожают нам!"
 war_justification.220.t: "[From.GetLeader] отстаивает право на захват государства [Root.GetName]"
 war_justification.220.d: "«Если мы хотим получить стратегическое преимущество в вероятной - если не сказать неизбежной - войне с государством [Root.GetName], пора отбросить всякие сомнения. Мы говорим о будущем наших детей и о том, чтобы обеспечить для державы [From.GetName] надлежащее место в мире. Это вопрос нашей приверженности своим целям и идеалам, которые мы привыкли принимать как данность. Пришло время действовать».\n\nЛидеры партии [From.GetRulingParty] и в особенности [From.GetLeader] произносят пламенные речи, призывая общественность поддержать захват государства [Root.GetName]. Геополитические мотивы, подпитывающие эту агрессию, не выносятся на публику, ораторы взывают к патриотическим чувствам, и это отлично действует на народ."
 war_justification.220.a: "Надо готовиться. Война неизбежна."
 war_justification.301.t: "[Root.GetLeader] выслушивает критику за слабость внешней политики"
 war_justification.301.d: "«У нас был шанс нанести удар по врагу, но партия [Root.GetRulingParty] им не воспользовалась. И это не просто пример позорно упущенных возможностей укрепить международную позицию государства [Root.GetName], это признак того, что за всеми их утверждениями о защите интересов [Root.GetAdjective]ого народа ничего не стоит. Пора менять политику».\n\nНаша неспособность вести войну, которую многие так ждали, вызвала уничижительную критику политических противников. Если мы откажемся от своих военных планов, станет гораздо сложнее убедить народ, что с нами [Root.GetName] движется в верном направлении."
 war_justification.301.a: "Но почему они не хотят избежать войны?"
 war_justification.301.b: "Все споры должны вестись на партийных собраниях и не выноситься на публику."
 war_justification.301.c: "Мы не можем позволить, чтобы кто-то обвинял [Root.GetLeader] в трусости!"

### Generic 
 generic.1.t: "Государство [From.GetName] оказывает влияние на нашу политику"
 generic.1.d_neutral_good: "Уже довольно давно [From.GetAdjective]ое правительство демонстрирует желание сблизить исторические пути наших стран и проявляет особый интерес к [Root.GetAdjective]ой политике. С недавнего времени это стало более заметно: партия [From.GetRulingParty] начала пропагандировать свою идеологию - [From.GetRulingIdeology], выступая с публичными речами, а также распространяя печатные материалы среди [Root.GetAdjective]ого населения. \n\nТеперь даже некоторые политики и видные чиновники под влиянием [From.GetAdjective]ой пропаганды начали выступать за то, чтобы постулаты этой идеологии стали господствующими в государстве [Root.GetName]."
 generic.1.d_bad: "Уже довольно давно [From.GetAdjective]ое правительство демонстрирует желание сблизить исторические пути наших стран, часто вмешиваясь во внутренние дела государства [Root.GetName]. В последнее время это вмешательство стало особенно активным, и партия [From.GetRulingParty] начала открыто пропагандировать идеологию [From.GetRulingIdeology], совершенно не считаясь с [Root.GetAdjective]ими политическими традициями. Множество материалов, в которых восхваляется [From.GetRulingIdeology], также распространяются среди [Root.GetAdjective]ого населения. Похоже, что даже некоторые политики и видные чиновники под влиянием [From.GetAdjective]ой пропаганды начали выступать за то, чтобы постулаты этой идеологии стали господствующими в государстве [Root.GetName]."
 generic.1.t: "Государство [From.GetName] оказывает влияние на нашу политику"
 generic.1.d_neutral_good: "Уже довольно давно [From.GetAdjective]ое правительство демонстрирует желание сблизить исторические пути наших стран и проявляет особый интерес к [Root.GetAdjective]ой политике. С недавнего времени это стало более заметно: партия [From.GetRulingParty] начала пропагандировать свою идеологию - [From.GetRulingIdeology], выступая с публичными речами, а также распространяя печатные материалы среди [Root.GetAdjective]ого населения. \n\nТеперь даже некоторые политики и видные чиновники под влиянием [From.GetAdjective]ой пропаганды начали выступать за то, чтобы постулаты этой идеологии стали господствующими в государстве [Root.GetName]."
 generic.1.d_bad: "Уже довольно давно [From.GetAdjective]ое правительство демонстрирует желание сблизить исторические пути наших стран, часто вмешиваясь во внутренние дела государства [Root.GetName]. В последнее время это вмешательство стало особенно активным, и партия [From.GetRulingParty] начала открыто пропагандировать идеологию [From.GetRulingIdeology], совершенно не считаясь с [Root.GetAdjective]ими политическими традициями. Множество материалов, в которых восхваляется [From.GetRulingIdeology], также распространяются среди [Root.GetAdjective]ого населения. Похоже, что даже некоторые политики и видные чиновники под влиянием [From.GetAdjective]ой пропаганды начали выступать за то, чтобы постулаты этой идеологии стали господствующими в государстве [Root.GetName]."
 generic.1.a: "Интересно..."
 generic.1.b: "Да как они посмели!"
 generic.2.t: "Государство [From.GetName] хочет присоединиться к альянсу [Root.GetFactionName]"
 generic.2.d.a: "На фоне нарастающей угрозы демократическим ценностям [alliance_applicant.GetAdjective]ие власти видят в нас защитников свободы. Они желают вступить в наш альянс, чтобы воспользоваться нашей защитой и помочь нам дать отпор антигармоническим силам."
 generic.2.d.b: "Наши попытки изменить существующий мировой порядок не ускользнули от внимания стран-единомышленниц. [alliance_applicant.GetAdjective]ие власти признают, что их лучшая надежда на процветающее будущее - встать на нашу сторону в грядущем конфликте. Поэтому они официально предложили выступить единым фронтом против наших врагов."
 generic.2.d.c: "[alliance_applicant.GetName] признает, что должна объединиться с другими социалистическими республиками, дабы упрочить позиции коммунизма на мировой арене. Признав нашу ведущую роль в борьбе за права пролетариев всех стран, [alliance_applicant.GetAdjective]ие власти официально выразили желание вступить с нами в альянс."
 generic.2.d.e: "Отголоски недавних потрясений на международной политической арене продолжают звучать в разных уголках планеты. [alliance_applicant.GetAdjective]ие власти считают, что мы - их лучшая надежда на выживание в это трудное время. В связи с этим они направили нам просьбу о вступлении в наш альянс, чтобы мы смогли сообща пережить грядущую бурю."
 generic.2.a: "Мы приветствуем всех, кому близки идеалы гармонии и демократии."
 generic.2.b: "Мир будет принадлежать самым сильным державам!"
 generic.2.c: "Если мы объединим усилия, революция будет обречена на успех."
 generic.2.e: "И мы выстоим под ее натиском!"
 generic.2.f: "Без них нам будет только лучше."
 generic.2.g: "У нас уже и так хватает союзников."
 generic.3.t: "Государство [alliance_inviter.GetName] приглашает нас в альянс [alliance_inviter.GetFactionName]"
 generic.3.d: "Государство [alliance_inviter.GetName] одобрило нашу заявку на вступление в альянс [alliance_inviter.GetFactionName]. Вместе с ними мы или выстоим, или потерпим крах."
 generic.3.a: "Вместе мы будем защищать гармонию."
 generic.3.b: "Нас никто не остановит!"
 generic.3.c: "Нет лучших борцов за права пролетариев, чем мы!"
 generic.3.e: "На какое-то время мы забыли о наших разногласиях."
 generic.4.t: "Государство [alliance_inviter.GetName] отклоняет заявку на вступление в альянс [alliance_inviter.GetFactionName]"
 generic.4.d: "Государство [alliance_inviter.GetName] отклонило нашу заявку на вступление в альянс [alliance_inviter.GetFactionName]. Нам придется действовать без их помощи."
 generic.4.a: "И они называют себя защитниками свободы?!"
 generic.4.b: "Тогда мы их тоже раздавим!"
 generic.4.c: "Их революция прогнила до основания!"
 generic.4.e: "Между нами слишком серьезные разногласия."
 generic.5.t: "Государство [From.GetName] приглашает государство [Root.GetName] в альянс [From.GetFactionName]"
 generic.5.d.a: "Испытывая беспокойство в связи с недавними событиями на мировой арене, государство [alliance_inviter.GetName] протянуло нам руку дружбы, предложив свою защиту, и призвало нас встать вместе с ним на защиту принципов свободы и гармонии. Вступив в альянс [alliance_inviter.GetFactionName], мы сумеем гарантировать свободу наших граждан."
 generic.5.d.b: "Осознав, что даже сильным мира сего нужны союзники, [alliance_inviter.GetAdjective]ие власти пригласили нас вступить в альянс [alliance_inviter.GetFactionName]. Если мы примем их предложение, то получим шанс обрести свое место под солнцем."
 generic.5.d.c: "Наши идеологические союзники из государства [alliance_inviter.GetName] обратили внимание на наш посильный вклад в защиту интересов рабочего класса, и сегодня утром мы получили предложение присоединиться к альянсу [alliance_inviter.GetFactionName]. Объединив усилия с другими социалистическими странами, мы раздуем пламя мировой революции с новой силой."
 generic.5.d.e: "Похоже, что [alliance_inviter.GetAdjective]ие власти считают нас стратегически важным партнером и полагают, что нам гораздо выгоднее работать сообща, чем пререкаться из-за идеологических разногласий. Сегодня утром [alliance_inviter.GetAdjective]ий посол отправил нам приглашение на вступление в альянс [alliance_inviter.GetFactionName]."
 generic.5.a: "Мы будем держаться вместе."
 generic.5.b: "Нам нужно лишь несколько тысяч убитых..."
 generic.5.c: "Мы будем сражаться бок о бок с нашими товарищами!"
 generic.5.e: "Это выгодное предложение."
 generic.6.t: "Государство [alliance_applicant.GetName] принимает приглашение вступить в альянс [alliance_inviter.GetFactionName]"
 generic.6.d: "Государство [alliance_applicant.GetName] приняло наше предложение вступить в альянс [alliance_inviter.GetFactionName]. Вместе с ними мы или выстоим, или потерпим крах."
 generic.7.t: "Государство [alliance_applicant.GetName] отклоняет предложение вступить в альянс [alliance_inviter.GetFactionName]"
 generic.7.d: "Государство [alliance_applicant.GetName] отклонило наше предложение вступить в альянс [alliance_inviter.GetFactionName]. Нам придется действовать без их помощи."
 generic.7.a: "Им не нужна наша помощь."

### stability generic
 stability.21.t: "Уклонение от призыва"
 stability.21.desc.a: "В новом докладе Военного министерства отмечено значительное сокращение доступных пониресурсов. Похоже, последний призыв привлёк меньше рекрутов, чем ожидалось. В настоящее время проводится расследование такого расхождения, но всё говорит о том, что большое количество населения, годного для прохождения военной службы, различными способами уклоняется от призыва. 18-летние студенты оказываются вдруг ценными специалистами, бывшие спортсмены не проходят проверку на здоровье, а в некоторых случаях призывники просто исчезают без следа.\n\nПри задержании уклонисты рассуждают о плохих условиях в армии, о безразличии офицеров и о нежелании умирать за заведомо проигрышное дело. Военное командование требует суровых мер по отношению к уклонистам, но многие в правительстве считают, что предпочтительнее улучшить условия для призывников."
 stability.21.desc.b: "Неэффективная официальная реакция на уклонение от призыва только усугубила проблему. Всё больше и больше получивших повестку призывников так и не появляются на призывных пунктах. Контрразведка перехватила партию профессионально сделанных листовок с советами по уклонению от призыва, вроде подкупа врачей, чтобы те выдали заключение о негодности к службе. Исключение для отцов семейства привело к тому, что вдов погибших забрасывают предложениями о замужестве, а количество просьб об отказе по этическим причинам достигло рекордного уровня.\n\nВоенное командование советует отменить некоторые из последних исключений и в качестве примера строго наказать некоторых выявленных уклонистов. Другие представители правительства предлагают призвать граждан к чувству гражданского долга и описать последствия нашего поражения в войне."
 stability.21.desc.c: "Предпринимаемые правительством меры по борьбе с уклонением от призыва не принесли никаких положительных результатов, и всё больше [Root.GetRaceMembers] задумываются о том, зачем подвергать свою жизнь риску, когда другие с успехом избегают его. Призывники, приходящие на призывные пункты, рассказывают, как их высмеивали на улицах, называя дураками за то, что они идут сражаться за заведомо проигрышное дело. Отовсюду приходят сообщения о том, что матери запрещают своим детям идти на военную службу. Военное министерство выпустило доклад, в котором говорится, что оно не способно с точностью сказать, сколько именно рекрутов может быть призвано, и что его бюрократическая структура уже с трудом обрабатывает все эти дела по уклонению."
 stability.21.a: "С этим ничего не поделать."
 stability.21.d: "Нужно арестовать каждого, кто уклоняется от призыва!"
 stability.21.e: "Возможно, стоит повысить жалование новобранцам."
 stability.21.f: "Пора принять суровые меры."
 stability.21.g: "Призвать к чувству гражданского долга."
 stability.21.h: "Мы должны показать пример."
 stability.21.i: "Мы должны предоставить [Root.GetRaceMembers] нечто, ради чего стоит сражаться."
 stability.22.t: "Забастовки!"
 stability.22.desc.a: "За последние несколько дней производство на некоторых заводах резко снизилось после того, как рабочие призвали к приостановке всего, что связано с военными заказами. Выступая под лозунгом «Мира и хлеба!», они отказываются от любых переговоров. Кое-кто в правительстве советует решить проблему с помощью войск, после чего казнить зачинщиков, как вражеских агентов и предателей. С другой стороны, некоторые гражданские чиновники предлагают применить более взвешенный подход, указав на то, что грубые меры могут выйти нам боком, если задействованные солдаты окажутся не настолько благонадёжными, как принято считать."
 stability.22.desc.b: "Попытки правительства убедить забастовщиков вернуться на работу, похоже, не возымели никакого эффекта. Напротив, забастовки перекинулись на другие предприятия, а немногие из тех, кто продолжал работать на первых заводах, также отложили свои инструменты, опасаясь гнева со стороны товарищей. Пока что имеющихся запасов хватает для снабжения фронта, но через какое-то время перебои в поставках неизбежно скажутся на нашей способности вести боевые действия.\n\nВоенное министерство снова призвало правительство не идти на поводу у забастовщиков, но другие фракции в администрации предлагают отчасти пойти навстречу рабочим, надеясь, что этого будет достаточно, чтобы убедить их продолжить работу."
 stability.22.desc.c: "То, что начиналось как промышленный конфликт на отдельных предприятиях, затронуло даже те отрасли, которые лишь косвенно связаны с военным производством. Теперь в забастовках участвуют и работники государственных учреждений, в том числе мелкие служащие, курьеры и водители. \n\nНа многих предприятиях советы рабочих занимают заводские здания. Тайная полиция докладывает о том, что в некоторых местах снова начался выпуск оружия для крупного восстания против того, что называется «Военным режимом».\n\nВысшее военное командование по-прежнему уверено, что ситуацию могут исправить решительные действия преданных правительству войск, тогда как гражданские представители правительства считают, что велик риск гражданской войны и больших потерь."
 stability.22.a: "Беспорядки пройдут сами собой."
 stability.22.b: "Устроить в городах демонстрацию военной силы."
 stability.22.c: "Поручить пропагандистам сделать героев из тех, кто продолжает работать."
 stability.22.d: "Призвать рабочих на военную службу и передать заводы под контроль военных."
 stability.22.e: "Предложить повысить продуктовые пайки для рабочих."
 stability.22.f: "Послать войска, арестовать забастовщиков, казнить зачинщиков."
 stability.22.g: "Предложить новое социальное законодательство."
 stability.23.t: "Мятежи в армии"
 stability.23.desc.a: "До высшего военного командования дошли тревожные известия о том, что некоторые подразделения нашей армии отказываются выполнять приказы вышестоящих офицеров. Пока что ни одно подразделение не оставило свои позиции, но представители солдатских комитетов дали ясно понять, что не будут выполнять приказ атаковать врага.\n\nПока что мятеж ограничен небольшим количеством батальонов, а также подразделений поддержки и учебных частей, но многие в Военном министерстве уверены, что он вскоре перекинется и на другие формирования вплоть до того, что мы не сможем продолжать войну. Требуются решительные действия."
 stability.23.desc.b: "Попытки устранить мятеж в армии оказались безуспешными. Воодушевлённые отсутствием эффективного ответа со стороны правительства, мятежники расширили список своих требований и включили в него немедленное прекращение огня, за которым должны последовать заключение мира и демобилизация.\n\nВоенное министерство настоятельно рекомендует дать мятежникам ясно понять, что им следует воздержаться от дальнейших действий."
 stability.23.desc.c: "Поскольку правительство явно не желает или не способно решить поднятые ими вопросы, мятежники предпочли взять инициативу в свои [Root.GetHands]. Они объявили о выборах в советы рабочих и солдат, прямо нацеленные на захват власти в стране и заключение мира с врагом.\n\nЕсли быстро не предпринять никаких действий, то эти советы в некоторых областях страны могут заменить собой действующее правительство, в результате чего мы не сможем продолжать войну."
 stability.23.a: "Сейчас мы с этим ничего не можем поделать."
 stability.23.b: "Окружить мятежные подразделения преданными войсками и приказать им распуститься."
 stability.23.c: "Произнести патриотические речи перед мятежниками."
 stability.23.d: "Объявить о том, что поддержка мятежников будет считаться изменой."
 stability.23.e: "Выступить с мирной инициативой. Условия должны быть неприемлемы для врага."
 stability.23.f: "Мобилизовать преданные правительству отряды ополчения и арестовать всех солдат, не исполняющих свои непосредственные обязанности."
 stability.23.g: "Предложить солдатам право самим выбирать офицеров."
 15_days_tt: "На выполнение этого потребуется §Y15 дней§!.\n"
 30_days_tt: "На выполнение этого потребуется §Y30 дней§!.\n"
 45_days_tt: "На выполнение этого потребуется §Y45 дней§!.\n"
 stability.31.t: "Ужесточение мер сработало"
 stability.31.desc: "Быстрый ответ доказал свою эффективность. Отряды полиции при поддержке местных патриотично настроенных добровольцев провели хорошо скоординированную операцию и посетили каждого уклоняющегося призывника. Большинство из них согласились явиться на призывной пункт, когда им сообщили о последствиях неявки. Высшее военное командование публично заявило, что любому явившемуся не будут предъявлены обвинения и его не накажут за уклонение в прошлом. И всё же некоторые призывники категорически отказались взять оружие, чтобы защищать свою страну, и были арестованы."
 stability.31.a: "Решительные действия предотвратили ухудшение ситуации."
 stability.32.t: "Беспорядки в связи с призывом"
 stability.32.desc: "Наши попытки разрешить ситуацию с помощью военной силы не увенчались успехом. Похоже, кто-то в администрации раскрыл детали планируемой операции, вслед за чем последовала незамедлительная реакция. Когда военная полиция и представители других правоохранительных органов попытались посетить уклонистов, путь им преградила разгневанная толпа, требующая положить конец войне и принудительной военной службе. В некоторых случаях между полицией и протестующими вспыхнули уличные сражения, приведшие к определённому количеству жертв, поскольку солдаты были вынуждены применить оружие для самозащиты.\n\nБаррикады были расчищены, погибшие похоронены, но столицу охватили мрачные настроения. Судя по докладам Военного министерства, количество призывников, являющихся для прохождения службы, не увеличилось. Многие в правительстве гадают, как долго мы сможем продолжать сражения в таких обстоятельствах."
 stability.32.a: "Эта ситуация, возможно, обернулась не в нашу пользу."
 stability.33.t: "Восстание призывников"
 stability.33.desc: "Наши попытки разрешить ситуацию с помощью военной силы не увенчались успехом. Похоже, кто-то в администрации раскрыл детали планируемой операции, вслед за чем последовала незамедлительная реакция. Когда военная полиция и представители других правоохранительных органов попытались посетить уклонистов, путь им преградила разгневанная толпа, требующая положить конец войне и принудительной военной службе. В некоторых случаях между полицией и протестующими вспыхнули уличные сражения, приведшие к определённому количеству жертв, поскольку солдаты были вынуждены применить оружие для самозащиты. \n\nСитуация быстро вышла из-под контроля, после того как толпа смяла ограждение и, взяв штурмом полицейские участки, вооружилась. В настоящее время в нескольких городах началось антиправительственное восстание. Любопытно, что восставшие, похоже, без труда находят добровольцев, готовых взять в конечности оружие."
 stability.33.a: "Ага, значит, теперь они хотят сражаться?!"
 stability.34.t: "Реформы призыва оказались эффективными"
 stability.34.desc: "Социальные меры, принятые правительством в рамках более широкого процесса реформирования военного призыва, оказались на удивление популярными. Среди благоприятных нововведений часто упоминают увеличение жалования и более частые увольнения, но многие также называют новые правительственные программы по поддержке вдов и сирот. Всё меньше мужчин находят оправдания своему отказу взять в конечности оружие ради защиты своей страны, и общественность перестала относиться к уклонистам благосклонно.\n\nВ последнее время даже наметилась тенденция поддерживать правительство, по мере того, как всё больше [Root.GetRaceMembers] понимают, что под угрозой находится сам [Root.GetAdjective]ий образ жизни."
 stability.34.a: "Мудрое решение."
 stability.35.t: "591-й штрафной батальон"
 stability.35.desc: "Осознав всю серьёзность создавшегося положения, Высшее военное командование решило предпринять более суровые меры, призванные показать уклонистам, что с их нежеланием защищать свою страну никто мириться не будет. На рассвете военная полиция ворвалась в дома ряда предварительно выбранных лиц из тех, кто использовал своё влияние, чтобы помогать другим избежать призыва. Не дав одеться, их под вооружённой охраной отправили в казармы, чтобы сформировать отдельное войсковое подразделение и помешать распространению их идей среди других частей и подразделений. \n\nВесть об этом распространилась быстро, и, похоже, большинство тех, кто раньше считал, что можно просто проигнорировать повестку, изменили своё мнение. Призывные пункты по всей стране докладывают, что к ним всё чаще приходят [Root.GetRaceMembers] с вопросом, каковы будут последствия для их «друзей», которые ранее пытались уклониться от призыва, но теперь решили явиться."
 stability.35.a: "Они ещё могут искупить свою вину."
 stability.36.t: "Протесты местной элиты"
 stability.36.desc: "Осознав всю серьёзность создавшегося положения, Высшее военное командование решило предпринять более суровые меры, призванные показать уклонистам, что с их нежеланием защищать свою страну никто мириться не будет. На рассвете военная полиция ворвалась в дома ряда предварительно выбранных лиц из тех, кто использовал своё влияние, чтобы помогать другим избежать призыва. Не дав одеться, их под вооружённой охраной отправили в казармы, где они узнали, что отныне несут военную службу. Но их родственники устроили целую кампанию по опротестованию этого решения. Военное министерство заваливают звонками и письмами, как от простых рабочих, которые вдруг захотели, чтобы вернули их начальников, так и от мелких служащих других министерств, требующих ответить, почему забрали тех, кто был занят в важных для обороны сферах. Похоже, что некоторые министры изменили своё отношение к войне – возможно, они опасаются за безопасность своих сыновей."
 stability.36.a: "Разве у них нет чувства долга?"
 stability.37.t: "«Мрачный, но священный долг»"
 stability.37.desc: "«Конечно же, я хочу жить. Я хочу получить образование, встретить девушку, завести семью, но если мы проиграем войну, я всё равно не смогу этого сделать. Поэтому я сражаюсь».\n\nЭто анонимное письмо, опубликованное во всех ведущих газетах, произвело настоящий фурор. Оно якобы написано от имени новобранца, который поначалу уклонялся от призыва, но потом понял, что должен спасать свою страну, и оно, очевидно, задело за живое тех, кто испытывал подобные сомнения. Призывные комиссии по всей стране докладывают об увеличении количества добровольцев, которые не могут дождаться, когда же их призовут, тогда как другие охотно отправляются защищать свою страну и свой образ жизни."
 stability.37.a: "Мы проследим, чтобы они не потеряли свои жизни зря."
 stability.38.t: "Расстрел труса"
 stability.38.desc: "«На рассвете его вывели и поставили у стены. Он отказался от последней сигареты, но согласился, чтобы ему завязали глаза. Его последним словом было извинение перед матерью за то, что он доставил ей столько страданий. Расстрельная команда целилась хорошо. Через несколько минут врач зафиксировал его смерть».\n\nНе имея возможности схватить и привлечь к ответственности всех уклонистов, власти решили устроить показательные аресты. Ввиду серьёзной обстановки Военное министерство постановило судить их по законам военного времени. Был вынесен ряд смертных приговоров, которые привели в исполнение расстрельные команды. Эти меры, по всей видимости, произвели надлежащее воздействие. Похоже, что всё больше [Root.GetRaceMembers] предпочитают возможную гибель на поле боя бесславной смерти с клеймом труса."
 stability.38.a: "Жаль, что дошло до такого."
 stability.39.t: "Мученик во имя мира"
 stability.39.desc: "«На рассвете его вывели и поставили у стены. Он отказался от последней сигареты, но согласился, чтобы ему завязали глаза. Его последним словом было извинение перед матерью за то, что он доставил ей столько страданий. Расстрельная команда целилась хорошо. Через несколько минут врач зафиксировал его смерть».\n\nПубликация сообщения о казни уклониста, приговорённого к смерти, похоже, привела к противоположному эффекту. Вместо того, чтобы убедить [Root.GetRaceMembers] являться на военную службу из страха перед последствиями отказа, она сделала из казнённых мучеников во имя мира. Сообщения об их смерти были отредактированы таким образом, чтобы выставить их в самом благоприятном свете. В крупных городах начались массовые демонстрации с требованиями прекращения войны. Военное министерство докладывает о получении писем от призывников с заявлениями о том, что они ни при каких обстоятельствах не пойдут на службу и не станут участниками подобных действий, разве что их самих поведут на казнь."
 stability.39.a: "Похоже, ситуация не улучшилась."
 stability.40.t: "Новый курс для государства [Root.GetNameDef]"
 stability.40.desc: "В своей речи, которая сегодня транслировалась по радио, [Root.GetLeader] объявил о так называемой «социальной революции». Целый час он описывал систему реформ, призванных коренным образом изменить общественную жизнь, обещая каждому вернувшемуся с фронта солдату возможность получить образование, хорошо оплачиваемую работу и щедрую пенсию. Он также рассказал о программе доступного жилья для молодых семей, которая должна начаться в первый же день после подписания перемирия. Похоже, эта речь оказала большое воздействие на настроение общества. С призывных пунктов по всей стране поступают сообщения, что всё больше новобранцев просят продлить им срок службы после окончания нынешнего военного конфликта, а другие требуют перевести их на фронт, чтобы получить дополнительные льготы."
 stability.40.a: "И как мы за всё это заплатим?"

### Strike generic
 strikes_event.1.t: "Порядок восстановлен"
 strikes_event.1.desc: "Высшее военное командование без малейшего промедления создало специальные отряды из солдат, проходящих подготовку или отпущенных в увольнение. Промаршировав мимо ворот заводов, эти отряды произвели надлежащий эффект. Забастовщики решили не усугублять конфликт и не идти на потенциально смертельный риск. Немногим попытавшимся договориться с солдатами не удалось найти с ними общий язык, поскольку солдаты спрашивали рабочих, почему они считают приемлемым отсиживаться в тылу и подводить сражающихся на фронте."
 strikes_event.1.a: "И правда, почему."
 strikes_event.2.t: "Кровавый понедельник"
 strikes_event.2.desc: "Высшее военное командование без малейшего промедления создало специальные отряды из солдат, проходящих подготовку или отпущенных в увольнение. Но доставить их в охваченные забастовками города оказалось труднее, чем предполагалось, поскольку бастующие перекрыли железнодорожные пути, и войскам пришлось идти пешком, что дало забастовщикам время на подготовку. Попытки расчистить дороги встречали активное сопротивление со стороны рабочих, забрасывающих солдат камнями и бутылками. \n\nВ некоторых случаях отряды открывали огонь для самозащиты, убив некоторое количество забастовщиков и ранив ещё больше. Это только разъярило толпу и сторонних наблюдателей, которые стали выкрикивать «Убийцы!». Общественное мнение в столице быстро склонилось на сторону бастующих. Ночью солдаты отступили, оставив баррикады нетронутыми.\n\nДальнейших попыток разрешить ситуацию силой предпринято не было. Забастовщики сохраняют контроль над заводами, работа на которых приостановлена."
 strikes_event.2.a: "Всё пошло не так, как было запланировано."
 strikes_event.3.t: "Герои производственного фронта"
 strikes_event.3.desc: "«Война промышленной эпохи – это не только марширующие дивизии и самолёты, сбрасывающие бомбы. И участвуют в ней не только солдаты, исполняющие свой долг и погибающие за свою страну. Такая война в первую очередь ведётся на фабриках и заводах. Оставить сборочный цех – всё равно что самовольно покинуть линию фронта. И победы в сборочных цехах должны праздноваться так же, как победы в сражениях».\n\nЧтобы выставить в максимально благоприятном свете труд рабочих на оружейных заводах и фабриках, были привлечены все доступные пропагандистские ресурсы. [Root.GetLeader] лично подписал указ о присвоении новой награды рабочим, перевыполнившим нормативы на 100%, и первые её обладатели отправились в поездку по всей стране, чтобы рассказать другим рабочим о своих методах.\n\nПохоже, многие бастующие пересмотрели своё отношение к забастовкам. Все остановившиеся ранее заводы возобновили выпуск продукции."
 strikes_event.3.a: "Не все герои носят шлемы."
 strikes_event.4.t: "Департамент военной продукции"
 strikes_event.4.desc: "Сегодня [Root.GetLeader] объявил о небольших изменениях в системе призыва. Исключения для квалифицированных рабочих отменяются, и теперь призыву на военную службу подлежат все. Одновременно с этим Военному министерству разрешено осуществлять непосредственный контроль над теми выпускающими военную продукцию заводами и фабриками, начальство которых не продемонстрировало надлежащей компетенции.\n\nВ охваченных забастовками городах это решение встретили с молчаливой покорностью, особенно заявление о том, что теперь отказ от работы равноценен отказу от выполнения приказа солдатом. Несмотря на всеобщий упадок духа среди рабочих, выпуск продукции возобновился."
 strikes_event.4.a: "Нужно было сделать это с самого начала."
 strikes_event.5.t: "Непокорная страна"
 strikes_event.5.desc: "Сегодня [Root.GetLeader] объявил о небольших изменениях в системе призыва. Исключения для квалифицированных рабочих отменяются, и теперь призыву на военную службу подлежат все. Одновременно с этим Военному министерству разрешено осуществлять непосредственный контроль над теми выпускающими военную продукцию заводами и фабриками, начальство которых не продемонстрировало надлежащей компетенции.\n\nВ охваченных забастовками городах это решение встретили смехом, особенно заявление о том, что теперь отказ от работы равноценен отказу от выполнения приказа солдатом. Полицейских, которым было поручено вручить повестки рабочим, прогнали с призывом вооружиться чем-то посолиднее, нежели бумаги и чернила."
 strikes_event.5.a: "Возможно, стоит последовать этому совету."
 strikes_event.6.t: "Полезные едоки"
 strikes_event.6.desc: "Не упоминая забастовки, [Root.GetLeader] сегодня заявил о том, что рабочим на выпускающих военную продукцию фабриках и заводах повысят нормы выдачи сахара, кофе и мяса. К сожалению, слухи о том, что будут выдавать шоколад, оказались ложными.\n\nЗачинщики продолжают призывать к забастовкам, но большинство рабочих, похоже, пришли к мысли, что лозунг «Мира и хлеба!» неисполним, и довольны тем, что им хотя бы дали хлеб."
 strikes_event.6.a: "Лучше бы им отработать своё содержание."
 strikes_event.7.t: "Операция «Чёрный дуб»"
 strikes_event.7.desc: "Соблюдая тишину и светомаскировку, дабы использовать фактор внезапности, на окраинах городов собрались войска. Когда солнце поднялось над горизонтом, и рабочие, дежурившие на баррикадах вокруг заводов, ожидали смену, на улицы городов вошли военные. Усталые рабочие не сумели оказать достойного сопротивления и быстро потерпели поражение. Оставив небольшой отряд для охраны пленников, войска прочесали улицы и арестовали всех из списка известных рабочих. К полудню военные полностью контролировали ситуацию в городах и установили комендантский час. Дальнейшего сопротивления не ожидается. Большинство рабочих скоро отпустят с условием возврата на производство, но зачинщики предстанут перед судом. Ожидается, что им вынесут смертные приговоры."
 strikes_event.7.a: "Порядок восстановлен"
 strikes_event.8.t: "Сражение на Дубовой улице"
 strikes_event.8.desc: "На окраинах городов были собраны войска, но плохая дисциплина, шум и отсутствие светомаскировки не позволили воспользоваться фактором внезапности. Когда военные вошли в город, рабочие уже были готовы встретить их и закидали камнями, остановив первую атаку. Вторая штыковая атака переросла в жестокие столкновения. Десятки раненых и умирающих остались на улицах.\n\nКомандиры отвели отряды для перегруппировки, а рабочие укрепили баррикады и вооружились подобранным оружием. Завтра ожидаются дальнейшие бои, но Высшее военное командование уже не верит в победу."
 strikes_event.8.a: "У нас быстро заканчиваются варианты."
 strikes_event.9.t: "Указ о защите прав рабочих"
 strikes_event.9.desc: "Ввиду нарастания напряжённости в столице [Root.GetLeader] объявил о принятии новых законов, защищающих права рабочих даже во время войны. Эти законы предусматривают щедрую оплату больничных, обязательное страхование от несчастных случаев, право на вступление в любой профсоюз и, впервые за всё время, право работающих женщин на отпуск по уходу за ребёнком после родов.\n\nХотя некоторые члены правительства и считают это полным поражением в противостоянии с забастовщиками, результаты говорят сами за себя: все заводы и фабрики вернулись к работе."
 strikes_event.9.a: "Остаётся надеяться, что этого будет достаточно."

### mutiny Generic
 mutiny_event.1.t: "Мятеж остановлен"
 mutiny_event.1.desc: "Спустя несколько часов напряжённых переговоров у ворот казарм и в траншеях на линии фронта мятежу в армии был положен конец. Поняв, что в случае противостояния победы им не видать, мятежники быстро сдались. \n\nПосле этого осталось лишь решить их судьбу. Высшее военное командование проявило благоразумие и не стало подвергать виновных суровому наказанию. В качестве примера некоторых военных понизили в звании и перевели в другие части."
 mutiny_event.1.a: "Будем надеяться, что ничего подобного больше не произойдёт."
 mutiny_event.2.t: "Пустая угроза"
 mutiny_event.2.desc: "Попытки запугать мятежников и заставить их подчиниться не сработали, поскольку посланные для усмирения мятежа отряды не произвели впечатления на солдат. Применив полученные на фронте навыки, они быстро организовали оборону, прорвать которую удалось бы только с большими потерями. \n\nКомандиры верных частей отступили и ожидают дальнейших приказаний, но этот небольшой успех, вне всякого сомнения, укрепил решимость мятежников."
 mutiny_event.2.a: "Никто не мог этого предсказать."
 mutiny_event.3.t: "Ради чего мы сражаемся?"
 mutiny_event.3.desc: "«Нет ничего необычного в том, что солдат сомневается в целесообразности того, что он делает. Можно ли оправдать жертвы, которые мы требуем от вас? Вправе ли мы посылать вас на смерть ради цели, которую вы, возможно, не увидите?\n\nНам не повезло родиться в беспокойное время. Судьба решила так, что мы должны пойти на войну, чтобы защищать нашу свободу, наши дома, наш [Root.GetAdjective]ий образ жизни! Мы не выбирали эту войну, нам её навязали! Вы прекрасно знаете, что я не стал бы просить от вас ничего, на что не согласился бы сам, и я знаю, что вы сделаете всё возможное ради победы!»\n\n[Root.GetLeader] произнёс перед войсками речь, которая произвела необходимое впечатление и которую солдаты встретили возгласами одобрения, после чего, воодушевлённые, вернулись к своим обязанностям без лишних жалоб."
 mutiny_event.3.a: "Хорошая речь."
 mutiny_event.4.t: "Указ об измене в условиях военного времени"
 mutiny_event.4.desc: "Военное министерство старается не предавать огласке текущий мятеж в армии, подвергая цензуре письма, но скрыть правду не удаётся. Солдаты в увольнении быстро разнесли весть о том, что войска не желают продолжать ненужное кровопролитие.\n\nНе упоминая прямо о мятеже, [Root.GetLeader] сегодня заявил о том, что правительство разрабатывает закон, согласно которому нежелание воевать будет считаться изменой.\n\nВсем хорошо известно, какое наказание полагается за измену, и всё меньше [Root.GetRaceMembers] поддерживают мятежников. Новости об этом, конечно, тоже быстро распространились. Не встречая поддержки, солдаты вернулись к своим обязанностям."
 mutiny_event.4.a: "Не нужно было об этом говорить."
 mutiny_event.5.t: "Попытка подавления не удалась"
 mutiny_event.5.desc: "Военное министерство старается не предавать огласке текущий мятеж в армии, подвергая цензуре письма, но скрыть правду не удаётся. Солдаты в увольнении быстро разнесли весть о том, что войска не желают продолжать ненужное кровопролитие.\n\nПопытки правительства обуздать мятежников провалились. Доклады тайной полиции говорят о том, что они пользуются широкой общественной поддержкой, вследствие чего их будет трудно изолировать и подавить."
 mutiny_event.5.a: "Неуважение к законам сильно тревожит."
 mutiny_event.6.t: "[Root.GetAdjective]ое предложение о перемирии"
 mutiny_event.6.desc: "[Root.GetLeader] заявил сегодня прессе, что его последняя мирная инициатива провалилась. Причин тому много, но последней каплей, по всей видимости, явилось [Root.GetAdjective]ое требование, чтобы враг полностью возместил весь нанесённый ущерб и публично признал, что войну развязал он.\n\nПротивник назвал наши разумные предложения требованием безоговорочной капитуляции. Он пообещал, что доведёт эту войну до победного конца. \n\nТеперь, когда неприятель, очевидно, больше не намерен выслушивать никаких предложений и желает во что бы то ни стало воевать дальше, призывы мятежников к мирным переговорам лишились смысла."
 mutiny_event.6.a: "Какая жалость."
 mutiny_event.7.t: "Попытка военного подавления удалась."
 mutiny_event.7.desc: "Несмотря на отдельные случаи сопротивления небольших групп мятежников, наша операция по подавлению бунта закончилась впечатляющим успехом. Полагаясь не столько на опыт, сколько на численность, верные правительству ополченцы окружили укрепления мятежников и предложили сдаться. Большинство солдат предпочло не использовать оружие против своих соотечественников. \n\nЗачинщики предстанут перед тайными трибуналами, но обычных солдат отошлют на фронт, перераспределив их по разным частям и подразделениям, чтобы они не образовали новые ячейки мятежников."
 mutiny_event.7.a: "Отлично!"
 mutiny_event.8.t: "Брат на брата"
 mutiny_event.8.desc: "Наши попытки предотвратить выборы, проводимые советами рабочих и солдат, только ухудшили обстановку до немыслимых пределов. Вместо того чтобы сдаться, мятежники создали временные советы, выбрали полевых командиров и организовали оборону на улицах.\n\nРаскол в армии теперь проходит по каждому подразделению и часто даже между членами одной семьи. [Root.GetNameDefCap] стоит на грани гражданской войны."
 mutiny_event.8.a: "Ситуация ухудшается."
 mutiny_event.9.t: "Новые офицеры"
 mutiny_event.9.desc: "Несмотря на сильное противодействие со стороны военных, каждое подразделение в [Root.GetAdjective]ой армии провело выборы командиров. Результаты очень удивили, поскольку выбраны были умелые солдаты с большим опытом боевых действий. Многие профессиональные офицеры до сих пор считают это личным оскорблением, но большинство солдат, вне всякого сомнения, поддерживают сложившуюся ситуацию."
 mutiny_event.9.a: "Это же не сработает, правда?"

### generic nuke drope
 nuke_dropped.1.d: "[This.GetNewspaperHeader]В первый и, хочется верить, последний раз в истории ядерная бомба была взорвана в ходе военных действий. Объектом бомбардировки оказывается [From.From.GetName]. Огромный масштаб разрушений говорит о мощи нового оружия, которое вызывает страх не только тем, на что оно способно, но и тем, какие последствия это несет и для тех, кто его использует, и для всего мира.\n\nМир затаил дыхание в ожидании, что последует дальше. Согласится ли [From.From.Owner.GetName] капитулировать, чтобы избежать дальнейшей агрессии, или это лишь укрепит боевой дух и желание нанести ответный удар?"
