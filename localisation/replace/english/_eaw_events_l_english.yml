l_english:
### NEWS EVENTS ###
 news.1.t: "Equestria Games"
 news.1.d: "[This.GetNewspaperHeader]The annual celebrations of the Equestria Games in Crystal City have just come to a close, with [equestria.GetLeader] herself holding a moving speech about friendship and its importance for all of ponykind. The games went ahead without any major problems, and ponies from all over Equestria, contenders and spectators alike, travelled to the Crystal Empire for this special occasion.\nLike every year, these games have helped ponies come together in friendship and tolerance, at least for the moment. We shall see whether this will have any major impact on pony politics in the near future."
 news.1.a: "Cheers!"
 news.1.b: "Revolting."
 news.1.c: "Quaint, but not our concern."
 news.2.t: "[equestria.GetName] goes to war with [BUF.GetName]"
 news.2.d: "[This.GetNewspaperHeader]In a move that surprised observers both at home and abroad, [equestria.GetLeader] has chosen the path of war. The war doesn't look very promising for [BUF.GetNameDef]. We'll see what this brings in future."
 news.2.a: "What about Harmony?"
 news.2.b: "We'll crush them, as ordered."
 news.3.t: "The Great War"
 news.3.d: "[This.GetNewspaperHeader]The Changeling Queendom has officially announced that a state of war exists between Equestria and them from now on. Several bombing raids were performed by Changeling aviation onto the frontal units and towns in the area before the official declaration of war.\n\nThis is a turning point in history for us all. Equestria has not seen a major war in many centuries and the public is stunned by the events. Changelings seem very determined and confident in their actions, which can't be said about Equestria. It will take a while for the pony nation to put their economy on war rails. We will observe the situation."
 news.3.a: "This does not bode well."
 news.3.b: "For the Princess!"
 news.3.c: "They won't last long! Go, feed!"
 news.4.t: "Crystal Fair"
 news.4.d: "[This.GetNewspaperHeader]The celebration of Crystal Fair took place in the Crystal City today. Ponies from all around the Crystal Empire gathered to sell their hoofmade goods, food stuffs and drinks, to chat and have fun together. Equestrian and Crystal Empires officials paid their visit to the Fair. Artists, actors and crystal folk musicians have performed at the event and it ended with Crystal Fair anthem sung by the crowd and fireworks in the night sky."
 news.4.a: "A wonderful event."
 news.4.b: "Hurray!"
 news.4.c: "Blegh."
 news.5.t: "All-Ponies Front"
 news.5.d: "[This.GetNewspaperHeader]Soviet Republic of Stalliongrad has joined All-Ponies Front, formed in defence of all ponies against Changeling threat. From now on they'll seek cooperation in order to achieve victory over their common enemy."
 news.5.a: "Okay."

 news.6.t: "Popular Musician Performs in Canterlot"
 news.6.d: "[This.GetNewspaperHeader]Despite the fact that war ravages Equestria right now, Octavia, a famous Equestrian musician performed in Canterlot Grand Opera today. She says she dedicates her music to all ponies that are protecting Equestrian freedom at the frontlines, she also announced that it was a charity concert, and that all collected money are going to be transferred to the government for building a fighter aircraft. All ponies cheer."
 news.6.a: "Swell."
 news.6.b: "For the Princess!"
 news.6.c: "This won't help them."
 news.7.t: "Equestria Shelters Queen Velvet"
 news.7.d: "[This.GetNewspaperHeader]Expelled from Olenia not that long ago, Queen Velvet finally found an official shelter in Canterlot today. Extremely unhappy King Johan of Olenia sent a diplomatic insult to [equestria.GetLeader]."
 news.7.d_fash: "[This.GetNewspaperHeader]Expelled from Olenia not that long ago, Queen Velvet finally found an official shelter in Canterlot today. The high priest Allsherjargoði Jurva is extremely unhappy, he sent a diplomatic insult to [equestria.GetLeader]. Some say that he calls for holy crusade against Equestria."
 news.7.d_com: "[This.GetNewspaperHeader]Expelled from Olenia not that long ago, Queen Velvet finally found an official shelter in Canterlot today."
 news.7.a: "Yes."
 news.7.b: "Bastards."

 news.10.t: "Equestria Claims Badlands"
 news.10.d: "[This.GetNewspaperHeader]The Equestrian parliament and Princess just sent a formal request to Dragons Lands to transfer ownership of The Badlands to Equestria. They say that in the present climate it's good to secure the borders of one's country. Tribute to compensate the loss will be paid to the Dragon's Lands."
 news.10.a: "Okie-dokie."

 news.11.t: "The Grand Galloping Gala"
 news.11.d: "[This.GetNewspaperHeader]The annual ball is held at Canterlot Castle tonight. Royal family, higher ranks of Equestrian government and friends are gathering at the event to enjoy the evening and discuss political issues. Fancy drinks and classical music were accompanying it through the night. The ball was ended with splendid firework display. Equestria does not fail to support her traditions. To many ponies, this is an assurance of stability and prolonged peace in good old Equestria."
 news.11.a: "Cheers."
 news.11.b: "Wasteful royals."
 news.11.c: "Pathetic."
 news.13.t: "The Grand Galloping Gala"
 news.13.d: "[This.GetNewspaperHeader]The annual ball is held at Canterlot Castle tonight. Royal family, higher ranks of Equestrian government and friends are gathering at the event to enjoy the evening and discuss political issues. Fancy drinks and classical music were accompanying it through the night. The ball was ended with splendid firework display. Equestria does not fail to support her traditions. To many ponies, this is an assurance of stability and prolonged peace in good old Equestria."
 news.13.a: "Cheers."
 news.13.b: "Dammit."
 news.13.c: "Not again."
 news.12.t_equestria: "The Buffalo Chiefdom Integrated into Equestria"
 news.12.t_world: "Equestria annexes the Buffalo Chiefdom"
 news.12.t_world_puppeted: "The Buffalo Chiefdom - Equestrian region"
 news.12.t_world_faction: "The Buffalo Chiefdom - Ally of Equestria"
 news.12.d: "[This.GetNewspaperHeader]The infamous Buffalo State has existed as enclave state within Equestria for decades now. Proud buffalo chiefs did not accept ruining and exploiting of their soil by pony farmers. However many experts doubted the state was truly independent as they fully relied on Equestrian trade. The situation has changed in recent years as a new buffalo leader rose to power, Chieftess Strongheart. She was known for her warm attitude towards ponies. As follows she accepted [equestria.GetLeader]'s offer of friendship and today, the integration of Buffalo State as an autonomous region of Equestria was finished. All buffaloes are going to receive full citizenship and farming subsidies."
 news.12.a: "Mm-hmm."
 news.12.b: "Together for a brighter future."
 news.12.c: "We welcome our new friends."
 news.14.t: ""D.D. and the Heroes of Harmony" Hits Stores!"
 news.14.d: "[This.GetNewspaperHeader]On[GetDateText] the first copies of new Daring Do autobiography, 'Daring Do and the Heroes of Harmony' arrived in stores all around Equus and beyond. It details the journey of the former Commander of the Equestrian Resistance, from her flying through Stableside to rally ponies to her side, to announcing her intent to liberate Equestria from any and all threats, to the march on Canterlot, and to the miraculous victory of the ponies of Equestria over the forces of evil. A truly riveting tale, it is the story of hope and sheer determination, of how ordinary ponies can overcome impossible odds so long as they believe in their friends. Though we mourn for all of the lost lives over the years, we can rest easy knowing that a bright future awaits the ponies of Equestria."
 news.14.a: "I've already got my copy reserved!" #POV: CES
 news.14.b: "Maybe Daring Do can sign my copy..." #POV: harmony/NA/commie nations *not* at war with CES
 news.14.c: "Meh. I don't read nonfiction." #POV: supremacy nations, + nations at war with CES 
 news.15.t: "Olenia Surrenders!"
 news.15.d: "[This.GetNewspaperHeader]The Changeling war against Olenia did not go for a very long time. Having no help or backup plan at their side, realising the defeat is inevitable King Johan and his ministers decided to peacefully surrender before it was too late, to save the deer nation from unnecessary losses. Changeling Forces are going to enter Olenian capital this evening. The population is forced to wave Changeling flags and participate in the parade, that is going to be held tomorrow."
 news.15.a: "Too bad."
 news.15.b: "We need to put an end to this."
 news.15.c: "Wise move for them."
 news.16.t: "New Daring Do Book"
 news.16.d: "[This.GetNewspaperHeader]After many months of anticipation, A.K. Yearling has finally released "Daring Do and the Changeling's Spectre," a thrilling espionage action-thriller. In this latest entry to the franchise, Daring Do sneaks into Queen Chrysalis's capital, Vesalipolis, to find the Queen Coven's Ark, while being hunted by Queen Chrysalis's agents, the "Spectres."\nAfter the lighthearted "Adventure Trilogy" many reviewers were shocked by "Changeling Spectre's" dark tone. Others like renowned critic Quibble Pants lambasted the book's focus on politics, saying that "it makes everything after the original trilogy look good." Daring Do's newfound realism will shiver ponies' spines, but the author's latest entry has lost the escapist element that made her series so great. Still, the book has sold thousands of copies on the first day and Applewood movie producers have already inquired about film rights. 6/10 stars."
 news.16.a: "The series really has changed, hasn't it?"
 news.16.b: "The older books were better!"
 news.16.c: "Meh. I don't read fiction."
 news.17.t: "Changeling-Equestrian Border"
 news.17.d: "[This.GetNewspaperHeader]It is rumoured that Queen Chrysalis is looking far beyond recently crossed Olenian borders. There have been several reports of activation of Changeling forces around Equestrian border, including airfield construction, field training, tank rallies. Changeling officials inform that these are merely self-defence measures and they tell they are worried about looming Equestrian invasion, mentioning that Equestria has repeatedly violated borders and force-installed Equestria-friendly governments in sovereign countries in the past. Regardless of whether it is a good reason or not, the whole situation is starting to look troubling. Ponies in border regions are remaining calm, but the rumour of Changeling attack is circling around the area."
 news.17.a: "Worrying."
 news.17.b: "Soon, we will be ready."
 news.18.t: "Changelings Claim Olenia!"
 news.18.d: "[This.GetNewspaperHeader]Queen Chrysalis has sent an urgent request to the [OLE.GetOlenianLeader] of Olenia, [OLE.GetLeader], to provide full military access into Olenian territory and become a protectorate state of Changelings. Queen Chrysalis says that Olenia is located in strategically important position and surely in Changeling sphere of interest. Equestrian officials say that these claims are outrageous and threaten to sanction Changeling Queendom and install strict border control. [OLE.GetLeader] has not yet released an official response."
 news.18.a: "A concerning development."
 news.19.t: "Olenia Refuses To Yield"
 news.19.d: "[This.GetNewspaperHeader]In a valiant display, Olenia has today rejected the Ultimatum sent by Queen Chrysalis, demanding territorial concessions. [OLE.GetLeader] has found these claims to be "outrageous" and an insult to Olenia and the solidarity of its people.\nChrysalis and her regime has yet to make a public statement on this matter, but many, including the Olenian military and [OLE.GetLeader], are expecting them to be more worried about military planning than diplomacy now.\nWhat will this breakdown of negotiations mean for Olenia and Equestria? Will the peace be kept or will the Changelings put a premature end to Olenia? We shall see how this situation develops."
 news.19.a: "Oh, well."
 news.19.b: "You'll pay for that."
 news.20.t: "The Great War is Over"
 news.20.d: "[This.GetNewspaperHeader]Finally, after years of terrible fighting, [EQS.GetNameDef] managed to push Changeling armies back to their hives. The Changeling Queendom has been dissolved and [EQS.GetName]-friendly government under leadership of a Changeling named Thorax has been installed in the new "harmonic" Changeling state."
 news.20.a: "Finally."
 news.20.b: "Here's to a brighter future."
 news.21.t: "The Great War is Over"
 news.21.d: "[This.GetNewspaperHeader]Today, after many years of desperate fighting, the conflict between [EQS.GetNameDef] and the Changelings has come to its end. Queen Chrysalis has reportedly been sacked by resistance movements who have formed a temporary government, which immediately sought peace with the [EQS.GetAdjective], resulting in their unconditional surrender. Ponies old and young alike cheered at hearing the news, and [EQS.GetLeader] has already decided to make the day of their victory a national holiday. The future of the Changelings will henceforth be decided by a friendly, reformed Changeling called Thorax.\nThe war is over, and the fighting has stopped. Peace has returned to the lands of [EQS.GetNameDef] once more, but will it be a lasting peace?"
 news.21.a: "It's over."
 news.22.t: "The War is Over"
 news.22.d: "[This.GetNewspaperHeader]Streets and plazas in Stalliongrad today are filled with cheering ponies and proud, red flags as the country has today announced their total victory over Chrysalis and her "imperialist regime".\n"Today," official government broadcast said, "our nation and our people stand victorious. The defeat of our enemy is absolute, our victory is eternal. A new age is dawning, comrades, as our brave, victorious soldiers return home to their loved ones. The storm clouds are clearing, and a new, bright future awaits us.\nUs, the people victorious."\nOfficials have also announced the establishment of a new "carefully guided" Changeling state, under the control of Changelings sympathetic to the Stalliongradian regime. Although this is surely to be a way to avoid calling it an outright puppet state, there is a lot to be done for the Changelings and their new allies and former foes.\nWith the fall of Chrysalis, will this all mean a brighter, peaceful future for all of Equestria? We shall see."
 news.22.a: "Finally."
 news.22.b: "Here's to a brighter future."
 news.23.t: "Stalliongrad and "Our Town""
 news.23.d: "[This.GetNewspaperHeader]Our Town, also known as Starlight Village, is a place in most northern part of Equestria, locked between the Griffon Colony and Stalliongrad, commonly known for being magically enslaved by Starlight Glimmer, forcing the population to give up their 'special talents'. Ponies of the region adopted socialism based on example their neighbour Stalliongrad and all years since Starlight's retreat the region was formally under protection of Stalliongrad Republic. There were heated debates in Stalliongrad Soviet on whether Stalliongrad can afford adjoining Our Town to their state, but since the election of [STG.GetLeader], it became clear that the independent Starlight Country has passed to history. Yesterday the ponies of Our Town became rightful citizens of Stalliongrad. Perhaps together, they will seek a better future."
 news.23.a: "Fine."
 news.24.t: "Socialist Union"
 news.24.d: "[This.GetNewspaperHeader]Today [STG.GetLeader] and the Supreme Soviet announced that they are creating an international organisation Socialist Union. They are going to seek support of communist nations all across the world for mutual protection and cooperation."
 news.24.a: "Okay."
 news.25.t: "[GRF.GetName]-[STG.GetName] Tensions"
 news.25.d: "[This.GetNewspaperHeader]After [GRF.GetName] oppressed socialism in their country, they got into conflict with their southern neighbour of [STG.GetName]. Word has gotten out that the Communist nation has sent a formal warning to [GRF.GetName] to cease this behaviour, or they would intervene to protect the rights of the Griffon and Pony workers. Troops on both sides of the border have been put on high alert and a wrong move by either side might spark the tensions into a full-blown conflict." 
 news.25.a: "Oh."
 news.27.t: "Griffon Civil War!"
 news.27.d: "[This.GetNewspaperHeader]After assassination of Governor Teafeather, a power vacuum appeared in the Griffon Colony. Multiple parties were fighting for the right to rule the land. However, the prolonged crisis only worsened the situation of proletariat. Everything started on one of the worker strikes in Fetermyst, where left-wing and right-wing radical groups have happened to meet. The confrontation has grown into a street fight, then city was divided in two parts, and after that the whole country has sunk in violence. Wonder what this will bring."
 news.27.a: "Right."
 news.28.t: "Stalliongrad Threatens Equestria"
 news.28.d: "[This.GetNewspaperHeader]We've been receiving many reports about Stalliongradian troops activity on the border with Equestria. Sinister Serov is tuned to very aggressive political line, according to his public speeches he will do whatever it takes to "Crush the imperialist disease". The ponies of Equestria are worried about the intentions of Stalliongrad."
 news.28.a: "That's right."
 news.28.b: "Let them fight."
 news.28.c: "This can't be good."
 news.28.e: "Alright then."
 news.29.t: "The Equestrian Civil War!"
 news.29.d: "[This.GetNewspaperHeader]The Baltimare shooting has served as that one spark for Equestrian "powder keg". Getting known about that incident the country has calmed down just for a moment before blowing up infernal nationwide howl! All who cares about the future of the country and the nation hurry to get on barricades, there are plants and factories lie idle. The mob killings replaced arbitrariness. No doubt, civil war has begun, and with every minute passed there is a question standing more and more sharply whether the only communist state on the continent will stand aside, or will give the rebellious faction something greater, than just supplies?"
 news.29.a: "Oh-huh."
 news.30.t: "Equestrian Civil War Ends!"
 news.30.d: "[This.GetNewspaperHeader]Victory! In a final push over the last weeks the Communists have scored a major victory over the Loyalists in the Equestrian Civil War. Today marks the end of reign of the Equestrian Princesses. Ponykind has finally taken it's destiny into its own hooves. The Monarchy has been dissolved, and the new Equestrian Supreme Soviet has taken control of the country. This marks a turning point in history for all Equestrians. A turning point towards a brighter future!"
 news.30.a: "Fine!"
 news.31.t: "Equestrian Civil War Ends!"
 news.31.d: "[This.GetNewspaperHeader]Its been a hard fought and bloody victory, but the Loyalists have prevailed in the Equestrian Civil War. The Communist faction has been defeated, the survivors are either being captured or fleeing into exile. Now with the Princesses power secure, Equestria can look outwards. Conflict still brews, and the ponies of Equestria must be prepared and unified if they are to survive."
 news.31.a: "There we go again."
 news.32.t: "Princess Celestia Abdicates!"
 news.32.d: "[This.GetNewspaperHeader]After the start of the Equestrian Civil War, Princess Celestia did not want to remain the leader of Equestria. She expressed her deepest sorrow for the fate of Equestria in the shade of latest events, saying that she had done enough, allowing the civil war to happen. She says, she is no longer capable of ruling the land. No longer her motherly glance will caress Equestrians in the mornings, no longer will she raise the sun in the morning. The reign that lasted for more than a thousand years came to an end. Princess Luna takes her responsibilities from now on."
 news.32.a: "How could that happen."
 news.32.b: "Down with lazy monarchs!"
 news.32.c: "She is really gone?"
 news.32.f: "Getting old, Celestia?"
 news.32.e: "Sic transit gloria mundi."
 news.33.t: "The Socialist Union of Equestria!"
 news.33.d: "[This.GetNewspaperHeader]Following the rise of Communism in Equestria, the country has been keeping extremely close ties to their communist neighbour to the north-east, Stalliongrad. Starlight Glimmer, supreme leader of Equestria, found a friendship between Equestria and Stalliongrad to be indispensable. "The common worker," she said, "must work and hold together to protect society as a whole against oppression and imperialism."\nToday this statement is more true than ever. Following a meeting between Government officials and leaders of Equestria, Stalliongrad, the Crystal Empire and the Equality Country, an agreement has been made in which the countries are to merge and unite in a "Socialist Union". Ponies in Canterlot and Stalliongrad alike have reportedly been cheering at hearing the news, waving red flags and singing songs in the streets as they celebrated their leaders. \n\nThis is without a doubt going to shift the balance of power on the continent. Queen Chrysalis has refused to give a statement on the matter for the time being. We shall hold our breath and wait for what happens next."
 news.33.a: "Future of Equestria is our hooves!"
 news.33.b: "A proletariat victory!"
 news.33.c: "Interesting."
 news.34.t: "Stalliongrad Surrenders to Equestria"
 news.34.d: "[This.GetNewspaperHeader]Earlier today [STG.GetLeader] and Stalliongradian communique has announced that the SCP, or Stalliongradian Communist Party is taking a great leap forward towards better relations with Equestria. The ponies do not understand, what is going. Stalliongrad, it seems, although keeping its official status as an autonomy, is going to continue its course on integration into Equestria. It appears the only successful revolution on the continent was defeated from the inside."
 news.34.a: "Together!"
 news.34.b: "Oh, what."
 news.34.c: "Revolution in Equestria is lost."
 news.35.t: "The Return of Sombra"
 news.35.d: "[This.GetNewspaperHeader]The world is in shock today as King Sombra returned from his exile to retake the throne of the Crystal Empire. Some ponies who managed to save themselves and flee Crystal City report that his followers attacked en masse, turning against the guards. A fight for the city and its palace quickly ensued, which the Crystal ponies stood little chance at winning. Princess Mi Amore Cadenza and Prince Shining Armor were evacuated shortly before the palace, and with it the city, fell to Sombra and his followers. Although the royal couple has pledged to fight the emerging darkness, they have sent their daughter, the royal heir Flurry Heart, to Equestria in case the worst will come to pass. Rumours are spreading that the Crystal Heart is shattered, but there is no confirmation on this yet. What will this mean for Equestria and the world?"
 news.35.d_com: "[This.GetNewspaperHeader]The young Crystal Ponies' Republic was thrown in turmoil once again today, as King Sombra returned from exile to retake the throne of the Crystal Empire. Eyewitnesses report that the Monarch returned in the form of a black cloud of smoke, as dark as the night. His return caused chaos in the streets of the capital as some of the citizenry, apparently supporting the Dark King's return, rose up and turned on the revolutionary guards. A fight for the old palace, which had been repurposed as the headquarters for the ruling party, soon ensued, which the overwhelmed and surprised communists stood little chance of winning. Arctic Lily and much of the communist party leadership were rushed out of the city, pledging to continue the fight against all forms of tyranny.\nThe Situation looks grim, however, as Sombra now appears to have regained his body, seemingly delighted to take the fight to the 'peasants' of the Crystal Ponies' Republic. As the battle for the fate of the Crystal lands rages, all wonder what this will mean for Equestria and the world."
 news.35.a: "Evil resides near our borders!"
 news.35.b: "Evil has returned!"
 news.35.c: "What's that all about?"
 news.36.t: "Marriage of King Sombra and Nightmare Moon?"
 news.36.d: "[This.GetNewspaperHeader]The public of both [CRY.GetNameDef] and [NLR.GetNameDef] is in confusion about the latest proposal of King Sombra. On his public speech yesterday he announced that he wishes to become a spouse of Nightmare Moon of Equestria. Legends go that before King Sombra was banished into the abyss, he supposedly had a romance with Princess Luna. The disappearance of them both roughly dates back to the beginning of the current Era, a thousand years ago. Some ponies assume that the two were not allowed to be together by Luna's elder sister, Celestia, and after they rebelled she banished them both. These are, of course, only legends, but these two ponies are the ones who know those events best. We are yet to hear Nightmare Moon's reply."
 news.36.a: "That's... Interesting."
 news.37.t: "Just Married!"
 news.37.d: "[This.GetNewspaperHeader]Today, the streets of [NLR.Capital.GetName] and [CRY.Capital.GetName] were filled by confetti and cheer, as the wedding between King Sombra and Nightmare Moon was celebrated in [CRY.Capital.GetName] and by all their subjects across the two countries. The marriage was made official yesterday, and all major heads of state of the world were invited, though Princess Celestia did not attend, stating that:" Luna betrayed me once more. She's not the loving alicorn she used to be anymore, and now she married a terrible pony, terrible just like her". The event has gathered thousands of people in the capital of King Sombra's empire, in which Crystal Ponies and night ponies were seen partying together. The marriage has raised concerns, with observers seeing as really dangerous this union, which surely has made stronger both monarchs, who are one an historical enemy of Celestia, and the other her Sister, who revolted against her in a bloody civil war. Will this reverse the balance of the war?"
 news.37.d_no_celestia: "[This.GetNewspaperHeader]Today, the streets of [NLR.Capital.GetName] and [CRY.Capital.GetName] were filled by confetti and cheer, as the wedding between King Sombra and Nightmare Moon was celebrated in [CRY.Capital.GetName] and by all their subjects across the two countries. The marriage was made official yesterday, and all major heads of state of the world were invited. The lack of Princess Celestia at the wedding remembered all the world of the recent civil war that ravaged Equestria, in which Celestia fell to her sister. The event has gathered thousands of people in the capital of King Sombra's empire, in which Crystal Ponies and night ponies were seen partying together. The marriage has raised concerns, with observers seeing as really dangerous this union, which surely has made stronger both monarchs. Now further expansion of the two powers in the continent, if not the world, seems inevitable, but it's not clear if it will be through diplomacy, or war."
 news.37.a: "Oh-huh."
 news.38.t: "Coronation of Flurry Heart"
 news.38.d: "[This.GetNewspaperHeader]Celebration took place in the [CRY.Capital.GetName] today, as the grown Princess, Flurry Heart was officially coronated as the Princess of the Crystal Empire today. This ends the reign of Princess Mi Amore Cadenza, her mother, which lasted for more than a decade. All of Equestria happily greeted the young princess on her visit to Canterlot, where she announced that she will strive for friendship and harmony in the world no matter what it takes. Fireworks concluded the fiesta on that day."
 news.38.d_reg: "[This.GetNewspaperHeader]Celebration took place in the [CRY.Capital.GetName] today, as the grown Princess, Flurry Heart was officially coronated as the Princess of the Crystal Empire today. This ends the regency of Princess Twilight Sparkle, who was established as a regent after the liberation of Crystal Empire. All of Equestria happily greeted the young princess on her visit to Canterlot, where she announced that she will strive for friendship and harmony in the world no matter what it takes. Fireworks concluded the fiesta on that day."
 news.38.a: "Great news."
 news.44.t: "Marriage of King Sombra and Queen Chrysalis"
 news.44.d_eqs_exists: "[This.GetNewspaperHeader]Today, the [CHN.Capital.GetName] and [CRY.Capital.GetName]'s street's were filled by confetti and cheer, as the wedding between King Sombra and Queen Chrysalis was celebrated in [CRY.Capital.GetName] and by all their subjects across the two countries. The marriage was made official yesterday, and all major heads of state of the world were invited, though Princesses Celestia and Luna of Equestria did not attend. The event has gathered thousands of people in the capital of King Sombra's empire, in which Crystal Ponies and Changelings were seen partying together. The marriage has raised concerns, with observers seeing as really dangerous this union, which surely has made stronger both monarchs, who are historically enemies of Equestria. Is this the beginning of something bigger?"
 news.44.d_eqs_not_exists: "[This.GetNewspaperHeader]Today, the [CHN.Capital.GetName] and [CRY.Capital.GetName]'s street's were filled by confetti and cheer, as the wedding between King Sombra and Queen Chrysalis was celebrated in [CRY.Capital.GetName] and by all their subjects across the two countries. The marriage was made official yesterday, and all major heads of state of the world were invited. This was the first important event where the Equestrian princesses did not attend, following the fall of Equestria in the recent war. The event has gathered thousands of people in the capital of King Sombra's empire, in which Crystal Ponies and Changelings were seen partying together. The marriage has raised concerns, with observers seeing as really dangerous this union, which surely has made stronger both monarchs. Now further expansion of the two powers in the continent, if not the world, seems inevitable, but it's not clear if it will be through diplomacy, or war."
 news.44.a: "What is this?"
 news.44.b: "Great!"
 news.44.c: "They laugh at us."
 news.44.e: "Expand the hive!"
 news.41.t: "Crystal Ponies declare Independence"
 news.41.d: "[This.GetNewspaperHeader]Yesterday, cheering crowds lined the shining boulevards leading to the Crystal Palace, as the Chairmare of the Red Crystal Workers Party, Arctic Lily, led a victory parade into the Crystal Palace. The newly elected Communists have wasted little time in beginning reforms to confiscate landed titles, replace Equestrian advisors with local ponies, and sever all ties with Equestria. The alicorn Princess of "Love" Cadenza Mi Amore announced in a tearful speech before the press and her shocked supporters that she would be abdicating her position, "I will always treasure and love every one of you, and it because of that love that I must recognise the will of the Crystal Ponies." Close friends of the royal family have said that the Princess intends to move back to Equestria to be with friends and family."
 news.41.a: "An Alicorn overthrown at the ballot?!"
 news.42.t: "The End of the Great Crystal War"
 news.42.d: "[This.GetNewspaperHeader]Equestrian citizens cheer and sigh in relief today as [From.GetLeader] has officially proclaimed their victory over Sombra and his tyrannical reign.\n"With the fall of Sombra and his minions," said [From.GetLeader] in a speech to her subjects, "we have freed the Crystal Ponies from their overlord and have restored peace and harmony at last. Let us remember those who gave their life during this bloody conflict and pray that their sacrifice was not in vain. Harmony shall be restored!""
 news.42.a: "Great news!"
 news.43.t: "The End of the Great Crystal War"
 news.43.d: "[This.GetNewspaperHeader]A dark age has begun for Equestria and its citizens today. The Equestrian leadership has been captured by Sombra and his forces during the last, desperate battle. Without them, Equestrian morale was shattered, and the remnants of the nation surrendered to the invading forces. Ponies could be seen hiding in their houses as Crystal forces marched through the streets, unopposed. Banners and flags of Sombra and his regime are now waving in every city and town.\nEquestria is defeated, shattered under Sombra's iron hoof. The future is looking grim for the ponies of Equestria."
 news.43.a: "Terrible."
 news.43.b: "We shall rule over Equestria!"

 news.40.t_cw: "Equestrian Intervention in the Crystal Empire"
 news.40.d_cw: "[This.GetNewspaperHeader]In the Crystal Empire civil war rages as Princess Mi Amore Cadenza and King Sombra battle for the throne. Their neighbor to the south, Equestria, had previously been content to let the situation play out, but that has now changed. In Canterlot [equestria.GetLeader] has thrown out many of their advisors and has publically shamed them for their role in delaying Equestrian intervention in the crisis. The political fallout of that event is likely to be felt for only a moment though as reports state that thousands of Equestrian troops are now massing in force on the border between the southernmost Crystalline states and the northernmost Equestrian states. Indeed, by the time you read this shots might have already been fired."
 news.40.a_cw: "We're coming to help!"
 news.40.e_cw: "Finally, help is on the way."
 news.40.b_cw: "Curses! Those meddling Equestrians are at it again."
 news.40.c_cw: "What took them so long?"

 news.40.t_sa: "Sombra Marches South"
 news.40.d_sa: "[This.GetNewspaperHeader]In the Crystal Empire civil war rages as Princess Mi Amore Cadenza and King Sombra battle for the throne. Their neighbor to the south, Equestria, had previously been content to let the situation play out, but that has now changed. In Canterlot [equestria.GetLeader] has thrown out many of their advisors and has publically shamed them for their role in delaying Equestrian intervention in the crisis. The political fallout of that event is likely to be felt for only a moment though as reports state that thousands of Equestrian troops are now massing in force on the border between the southernmost Crystalline states and the northernmost Equestrian states. Indeed, by the time you read this shots might have already been fired."
 news.40.a_sa: "Sombra won't make it a single pace past the border."
 news.40.b_sa: "It appears that our attack isn't so secret anymore."
 news.40.c_sa: "He's insane to attack a target that large."

 news.40.t_ea: "Equestria Marches North"
 news.40.d_ea: "[This.GetNewspaperHeader]Following the civil war in the Crystal Empire the new ruling government under King Sombra has taken a much more aggressive approach to foreign policy. However, while that has not sat well with his biggest neighbor Equestria has refused to raise a hoof against the Crystal Empire's new policies, until now. Reports from the northern border of Equestria indicate that garrisons along the border have swelled in size to unprecedented levels, and that more are arriving every hour. King Sombra has issued a public protest regarding the build up, but so far Equestria's government has been uncharacteristically silent on the matter save for a single word spoken by the leader of Equestria's army, "Oatmeal". Going by reports on the reports on the ground though it is clear that Equestria is marching to war."
 news.40.a_ea: "For Harmony!"
 news.40.b_ea: "We won't go silently into the night!"
 news.40.c_ea: "This is just the Equestrians walking in their own backyard."

 news.46.t: "King Sombra and Queen Chrysalis"
 news.46.d_eqs_exists: "[This.GetNewspaperHeader]News report that King Sombra, the ruler of the Crystal Empire, has officially offered marriage to Queen Chrysalis, the monarch of the Changeling Lands. An answer has yet to come from the Changelings, but if positive, it could mean a great advantage for both countries against their historical enemy, Equestria. No declarations have been released by the Equestrian princesses or government. We await a development of the situation."
 news.46.d_eqs_not_exists: "[This.GetNewspaperHeader]News today report that King Sombra, the ruler of the Crystal Empire, has officially offered marriage to Queen Chrysalis, the monarch of the Changeling Lands. An answer has yet to come from the Changelings. If the answer is yes, it would mean a powerful alliance between the two countries, that would also mean a easier way to conquer other countries. But if the answer is no, would that mean war between the two?"
 news.46.a: "Huh?"
 news.46.b: "We shall be together."
 news.46.c: "Are they kidding?"
 news.46.e: "Hoof of our Queen?"
 news.47.t: "Queen Chrysalis Rejects Marriage"
 news.47.d_eqs_exists: "[This.GetNewspaperHeader]Queen Chrysalis has rejected King Sombra's marriage offer! This evening an official statement from the [CHN.Capital.GetName] stated that "Queen Chrysalis can be powerful and great without being married to anyone, and will continue to be unmarried". This comes as relatively good news for Equestria, as a marriage between it's two biggest enemies would not have been really good. Now, what preoccupies most of the countries is what will King Sombra's response be. War is not excluded."
 news.47.d_eqs_not_exists: "[This.GetNewspaperHeader]Queen Chrysalis has rejected King Sombra's marriage offer! This evening an official statement from the [CHN.Capital.GetName] stated that "Queen Chrysalis can be powerful and great without being married to anyone, and will continue to be unmarried". Now, what preoccupies most of the countries is what will King Sombra's response be. War it's not excluded, and if it happens, it could be the final blow for a continent already impoverished by the war that put an end to Celestia's Equestria."
 news.47.a: "Oh well."
 news.47.b: "No way!"
 news.47.c: "That's right."
 news.47.e: "Oh please."
 news.49.t: "Luna Rejects Marriage Proposal!"
 news.49.d: "[This.GetNewspaperHeader]Nightmare Moon has rejected King Sombra's marriage offer! This evening an official statement from the Night State stated that "Nightmare Moon can be powerful and great without being married to anyone, and will continue to be unmarried". Now, what preoccupies most of the countries is what will King Sombra's response be. War it's not excluded, and if it happens, it could be the final blow for a continent already impoverished by the war that put an end to Celestia's Equestria."
 news.49.a: "Alright."
 news.50.t: "Nuclear Attack on the Hive"
 news.50.d: "[This.GetNewspaperHeader]On this day in history, war has changed, for better or for worse, only time shall tell. This morning, [GetDate], the Equestrian Avro Lancaster Long Range bomber, Octavia Melody- so named after one of Equestria's more renown classical musicians- released its payload onto the Changeling's capital Vesalipolis, during what would have normally been a routine bombing mission. However, as has been made clear, this was no normal weapon. Whilst specifics on the dropped payload remain classified, the tell-tale mushroom cloud was visible from as far away as the frontline. The Lancaster's pilot, Lightning Dust, when asked for a comment on how she felt once dropping the classified bomb, gave the following: "Felt good. Probably killed a lotta bugs with that one. Can't say why, can't say how, but there's a lotta dead insects down there. Makes me tempted to rename Ole' Octy to 'Roach Repellent.'""
 news.50.a: "Curse them, forever!"
 news.50.b: "Punishment by the Fire of the Sun!"
 news.50.e: "We did what had to be done."
 news.50.c: "Daybreaker's regime is madness."
 news.50.f: "How can Celestia allow that?"
 news.51.t: "Dawn of the Revolutionary Front"
 news.51.d: "[This.GetNewspaperHeader]Today [STG.GetLeader] and the Supreme Soviet announced that they are creating an international organisation called the Revolutionary Front. They are going to seek support of communist nations all across the world for toppling all reactionaries and the final triumph of the proletariat."
 news.51.a: "Okay."
 news.200.t: "The Equestrian Civil War!"
 news.200.d_1: "[This.GetNewspaperHeader]Equestria has erupted into chaos after a series of events rocked the previously placid and peaceful nation.\n\nPrincess Luna, having led a reform effort for batpony rights, was placed under arrest by Princess Celestia for links to terrorist groups. Civilian protestors attempting to aid Luna were massacred and Princess Luna escaped to Manehattan in the confusion.\n\nPrincess Luna claims that Celestia has gone mad and become a savage mare of flame. Princess Celestia claims that Luna has once again transformed into the twisted mare of darkness Nightmare Moon.\n\nWith neither side backing down, civil war has erupted, splitting the continent in two."
 news.200.d_2: "[This.GetNewspaperHeader]Equestria has erupted into chaos after an assassination attempt in Manehattan on Princess Luna during the middle of a speech fighting for batpony rights. Batponies and Luna loyalists seized the city in response. Princess Luna has taken to the air, warning that Princess Celestia has gone mad with hatred of batponies, plotting her death. Princess Celestia has claimed that Luna has transformed into the twisted mare of night, Nightmare Moon.\n\nWith neither side backing down, civil war has erupted, splitting the continent in two."
 news.200.c: "Is the sky going to fall down?"
 news.200.a: "How did everything go so wrong..."
 news.200.b: "The Night shall reign!"
 
 news.201.t: "Confederation of South States"
 news.201.d: "[This.GetNewspaperHeader]In the chaos of Equestrian Civil War, new nations are appearing. The administration of the southern Equestrian states has declared a formation of a new state and its independence from Equestria. The whole southwest is almost entirely under their control, they are only sharing the territories with the Buffalo State, which, who knows, may change very soon."
 news.201.a: "Interesting."
 news.201.b: "Cowards."
 news.201.c: "Nopony wants to be a part of this rotten state."
 news.201.e: "This Confederation would be wise to remember the Apple War."
 news.202.t: "Vanhoover Commune"
 news.202.d: "[This.GetNewspaperHeader]The communists of Vanhoover exploited the outbreak of civil war to establish their new commune on the shores of Luna Bay. Lead by former Equestrian admiral Dust Hoover, they seized control of the city itself and the surrounding countryside and have declared to be neutral in the ongoing conflict."
 news.202.a: "The revolution spreads."
 news.202.b: "I wonder how long they'll last."
 news.203.t: "The End of Equestrian Civil War"
 news.203.d: "[This.GetNewspaperHeader]Victory! It is already [GetMonth], [GetYear] and celebrations are held in Canterlot today with the announcement of the surrender of the last remaining units loyal to Nightmare Moon. It has taken many moons of bloody fighting, but the Loyalist Equestrian Army has stood its ground and fought the Legions of Nightmare to a standstill, and eventually to victory. With most of the country cleared of traitor forces, Equestria now faces the difficult task of rebuilding. The rest of the world has not been idle, and Equestria must be prepared. Another conflict appears to be on the horizon."
 news.203.a: "Glory to the Princess!"
 news.203.b: "It's done at last."
 news.203.c: "Glory to the Empress!"
 news.206.t: "The End of Equestrian Civil War"
 news.206.d: "[This.GetNewspaperHeader]Victory! It is already [GetMonth], [GetYear] and celebrations are held in Canterlot today with the announcement of the surrender of the last remaining units loyal to Nightmare Moon. It has taken many moons of bloody fighting, but the Loyalist Equestrian Army has stood its ground and fought the Legions of Nightmare to a standstill, and eventually to victory. With most of the country cleared of traitor forces, Equestria now faces the difficult task of rebuilding. The rest of the world has not been idle, and Equestria must be prepared. Another conflict appears to be on the horizon."
 news.206.a: "Glory to the Princess!"
 news.206.b: "It's done at last."
 news.208.t: "The Destruction Of Stalliongrad"
 news.208.d: "[This.GetNewspaperHeader]Today marks a grim day for the ponies of Stalliongrad, as the efficient and professional Lunar Army forcibly evacuated the city, without giving the confused inhabitants time to prepare or protest. As the night set, the area surrounding the city was ablaze with the ringing of hundreds artillery batteries. By dawn, the city was naught but rubble and ash, and the stubborn citizens who chose to stay shell-shocked and half dead themselves, more corpses crawling from the rubble than ponies. When asked for a comment, Empress Nightmare Moon simply stated, "Hm? Oh, yes. I ordered it wiped from existence. I am quite pleased to hear that my ponies were able to do so, and in such a prompt time frame. It is a pity that the disease of communism was allowed to fester for so long. However, as is clear, this has been rectified.""
 news.208.d_sol: "[This.GetNewspaperHeader]This day marks an another great victory for the Solar Empire, and a grievous reminder to what happens to all who'd resist Daybreaker's rule. Despite harsh protests and resistance, the city of Stalliongrad was forcibly evacuated by the merciless Solar Army. The ponies were then herded into multiple gathering areas surrounding the city, upon which the infernal noise began. Hundreds, maybe even thousands of bombers, dropping napalm bombs on the city. It took a few hours of this devastation to leave the former city into a burned out husk, all marks of former inhabitants erased by the cleansing fires. Empress Daybreaker has stated that this is the fate of all who would resist the Sun's fair and compassionate rule."
 news.208.a: "..."
 news.204.t: "The End of Equestrian Civil War"
 news.204.d: "[This.GetNewspaperHeader]Today has seen the end of Equestria as we know it. After many moons of bloody fighting the Legions of Nightmare have overrun much of the country, sending the government and Princess Celestia into hiding. Many Loyalist rebels still fight a guerrilla war. But with the majority of the Loyalist forces defeated, and the war all but won, Nightmare Moon now faces the difficult task of rebuilding and consolidating her rule. With tensions rising around the world, war may return to Lunar Empire sooner rather than later."
 news.204.a: "We've won at last."
 news.204.b: "Interesting."
 news.205.t: "War in the South!"
 news.205.d: "[This.GetNewspaperHeader]The Lunarist control of the south-eastern peninsula in Equestria is now endangered. Workers in Baltimare rose up and drove out the thestral garrisons, while Doctor Caballeron has founded the Aztlan Provisional Government with support from natives and mercenaries. Finally, loyalists of Nightmare Moon were pushed deeper into the jungles and onto mountains when the ragtag Celestial Resistance fighters, led by famous (and fictional?) adventurer Daring Do, liberated Stableside and several surrounding cities."
 news.205.a: "Well, that escalated quickly."
 
###Summer sun, winter moon and their imperial alternatives
 news.301.t: "Summer Sun Celebration"
 news.301.d: "[This.GetNewspaperHeader]Ponies from all trots of life have gathered today in Canterlot to witness the Summer Sun Celebration. Originally a holiday made to commemorate Princess Celestia's victory over the festering Nightmare, nowadays it celebrates the longest day of the year, Princess Luna's return and the magic of friendship. Not a sound could be heard as the Princess climbed on the raised dais, took a long gaze on the gathered ponies and proceeded to raise the Sun. The crowd watched in amazement at the grand display of the alicorn's benevolence, and cheering continued long after the Sun rose. Festivities continued for the remainder of the day, the spirit of Equestria resonating in the continued showing of respect to her traditions."
 news.301.d_lunatics: "[This.GetNewspaperHeader]Our spies in the Equestrian heartland report that the annual 'Summer Sun Celebration' has transpired recently. This grim spectacle completely focuses on Princess Celestia and the veneration of the sun, cruelly ignoring the efforts of Princess Luna in bringing the night. The decadent, wasteful revelry shows how ill prepared and soft the Equestrians have become. It shall soon be time for our glorious return."
 news.301.a: "Life is good in Equestria."
 news.301.b: "Disgusting. Cover the windows."
 news.301.c: "Lies! Our gods raise the sun, not her!"
 news.301.e: "Celestia's gentle light keeps the summer warm."
 news.301.f: "The Nightmare will return."
 news.301.g: "May she guide the sun gently."
 news.301.h: "Unicorns used to raise the sun, long ago..."
 news.301.i: "Lies! Our God raises the sun, not her!"
 
 news.302.t: "Forever Sun Celebration"
 news.302.d: "[This.GetNewspaperHeader]Many things have changed in Equestria lately, but reverence to ancient traditions has not. Devoted zealots and fanatics have assembled today in Canterlot to witness the Summer Sun Celebration... or what has become of it. Accompanied by a strong military presence, Empress Daybreaker climbed the raised dais and gave a fiery speech to the crowd, praising them for their loyalty to the new regime while singling out ponies who weren't displaying sufficient reverence. With a bombastic orchestral arrangement performed by the Canterlot Opera House, the Empress rose the Sun and the ponies bowed down, for they were unworthy to gaze at Her splendour. Afterward, Daybreaker lambasted the enemies of the state, promising each and every one of them an infernal end."
 news.302.a: "All hail the Empress!"
 news.302.b: "Your end will come soon enough."
 news.302.c: "Should we be worried?"
 news.302.e: "Celestia has become what she feared."
 news.302.f: "We were right all along."
 
 news.304.t: "Winter Moon Celebration"
 news.304.d: "[This.GetNewspaperHeader]A recent innovation proposed by Princess Twilight Sparkle, the Winter Moon Celebration is a new holiday aimed to spread awareness of Princess Luna and her wonderful night. The Princess has chosen to host her event in Manehattan, known for its ponies that never sleep. To her surprise, the response was larger than she expected, with ponies from all over Equestria wishing to see their mysterious diarch. Flustered by the kindness shown, Princess Luna thanked all of them for attending, and wished for unity and friendship in the coming harsh Winter moons. As the Princess worked her magic, the ponies were awed at the night sky, its beauty becoming all the more apparent with the constellations showing in full view and the light of the Moon showering the crowd. The revelry continued late into the night, and the Princess herself was seen mingling with the ordinary ponies as well."
 news.304.a: "Princess Luna has her charms."
 news.304.b: "Always the second fiddle, Luna?"
 news.304.c: "Wasn't Celestia the sole ruler?"
 news.304.e: "Luna's night is matched only by her own fierce beauty."
 news.304.f: "One day we will free the Nightmare."
 
 news.305.t: "Endless Moon Celebration"
 news.305.d: "[This.GetNewspaperHeader]Following the violent takeover by Nightmare Moon and her thestral allies, she was quick to eliminate dissent and establish her own traditions, centered around celebrating the Night, batponies and the new rule. The apex of these is the Endless Moon Celebration, commemorating the longest night of the year and her victory over her now banished sister. Held in Canterlot, the event has attracted the Empress' zealous followers and soldiers, with some ponies being press-ganged into attending. Usurping her sister's ceremonial dais, the Empress did not appear to be bothered by the frigid cold, which couldn't be said for the crowd. She went on to deliver a passionate speech about the new authority in Equestria, in which the night will never again be ignored and put aside. Despite the dour tone of the celebration, Nightmare Moon did not fail to showcase the grandeur of the night, the ponies being inspired by the glory of the Moon and Stars."
 news.305.a: "Praise the Night!"
 news.305.b: "Your reign will come to an end, Luna."
 news.305.c: "This winter feels colder..."
 news.305.e: "Celestia's rejection has frozen Luna's heart solid."
 
 ### CITY FALL EVENTS ####
 news.111.t: "Changelings Prevail in Equestria"
 news.111.d: "[This.GetNewspaperHeader]Today marks a black day for Equestria. With resistance to the Changeling War Machine being suicidal at this point and the alicorn princesses lost in action, Equestria sued for peace. Although many generals wished to continue the fight, anti-war civilians and collaborators pressured what remains of the Equestrian government to surrender to avoid further harm.\nAfter the unconditional surrender was signed, the guns finally fell silent. Over a national broadcast Queen Chrysalis declared total victory over Equestria and promised that the nation will be reorganised into a Changeling-friendly puppet state.\nWhile it is still unclear as to what will happen to this new Equestria and its ponies, many are relieved to hear that Equestria, although in a subjugated state, will live on. For now, at least."
 news.111.d_eqc: "[This.GetNewspaperHeader]Today marks a black day for Equestria. With resistance to the Changeling War Machine being suicidal at this point, the alicorn princesses and much of the court fled to New Mareland, out of reach of the Changeling fangs. What was left of the government sued for peace.\nAfter the unconditional surrender was signed, the guns finally fell silent. Over a national broadcast Queen Chrysalis declared total victory over Equestria and promised that the nation will be reorganised into a Changeling-friendly puppet state.\nHowever, with Celestia has promised to fight on, inspiring hope in the hearts of many of the conquered ponies that their plight may not be eternal."
 news.111.a: "Changelings grow."
 news.111.b: "Victory is ours!"
 news.112.t: "Changelings Prevail in Equestria"
 news.112.d: "[This.GetNewspaperHeader]Today marks a black day for Equestria. With resistance to the Changeling war machine being untenable at this point and the leadership lost in action, Equestria sued for peace. Although many generals wished to continue the fight, anti-war civilians and collaborators pressured what remains of the Equestrian government to surrender to avoid further harm. The Changelings have occupied the remainder of Equestria. Many Changelings supposedly went on to plunder food and valuables from the defeated ponies, who had no chance, or right, to defend themselves. Some had hoped that Chrysalis would give some semblance of autonomy to Equestria, but those hopes were quickly crushed.\nThe war is over, and a new, dark age has begun for Equestria and its ponies."
 news.112.d_eqc: "[This.GetNewspaperHeader]Today marks a black day for Equestria. With resistance to the Changeling War Machine being untenable at this point, the alicorn princesses and much of the court fled to New Mareland, out of reach of the Changeling fangs. What was left of the government sued for peace. The Changelings have occupied the remainder of Equestria. Many Changelings supposedly went on to plunder food and valuables from the defeated ponies, who had no chance, or right, to defend themselves. Some had hoped that Chrysalis would give some semblance of autonomy to Equestria, but those hopes were quickly crushed.\nThe war is over, and a new, dark age has begun for Equestria and its ponies. However, from across the ocean, a light still shines and the ponies of Equestria long for the day that that light returns to Canterlot."
 news.112.a: "Equestria is gone."
 news.112.b: "Victory is ours at last!"
 news.112.c: "Not yet, Chrysalis!" #EQC
 news.45.t: "The Crystal War"
 news.45.d: "[This.GetNewspaperHeader]What many ponies have feared has today become reality: All along the frontier, Equestrian units report heavy clashes between them and troops from the Crystal Empire. They reported of repeated wave attacks of thousands of ponies who seemed to be doing it against their will, but had no option but to gun down as many of them as possible to avoid being completely overwhelmed by the mind-controlled horde. King Sombra himself has remained eerily silent on the matter, while [EQS.GetLeader] has already begun holding speeches on the radio, encouraging her ponies to bravely fight on.\nThe Great Crystal War has begun. Will Equestria endure?"
 news.45.a: "Equus is no longer a peaceful continent..."
 news.45.b: "For Equestria!"
 news.45.c: "At last, time for vengeance..."


