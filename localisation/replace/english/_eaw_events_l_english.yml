### Generic war_justification
 war_justification.1.t: "[ROOT.GetLeader] Speaks Against [From.GetName]"
 war_justification.1.d: "'Does [From.GetName] belong to the [From.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [From.GetAdjective] or does it belong to [ROOT.GetNameDef]?'\n\n[ROOT.GetLeader]'s speech today suggested that [ROOT.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [ROOT.GetAdjective] people are coming to accept that war is inevitable."
 war_justification.1.a: "The future belongs to [ROOT.GetName]!"
 war_justification.2.t: "[ROOT.GetLeader] Denounces [From.GetAdjective] Ideals"
 war_justification.2.d: "'The [From.GetAdjective] claim to have liberty and harmony, claim to want peace, but all of these things they pride themselves on are hollow. Their liberty divides the people where it should stand united and their liberty only betrays a lack of discipline. We [ROOT.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[ROOT.GetRulingParty] has long derided the weakness of the [From.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.2.a: "[ROOT.GetName] stands united under [ROOT.GetLeader]."
 war_justification.3.t: "[ROOT.GetLeader] Warns Against [From.GetAdjective] Communism"
 war_justification.3.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish culture and history. We will take [From.GetName] and abolish the communist plague.'\n\n[ROOT.GetLeader]'s hatred of communists has been well known since before [Root.GetLeader]'s rise to power, but it appears to have intensified recently in the specific case of the [From.GetAdjective] government. Our quest to purge Marksism off the face of the Earth may start there."
 war_justification.3.a: "Those who reject nations will see their own perish."
 war_justification.4.t: "[ROOT.GetName] Prepares for Great Struggle"
 war_justification.4.d: "'The [From.GetAdjective] are a people who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [From.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [From.GetName] and [ROOT.GetName] has given way to a campaign to take their territory by force."
 war_justification.4.a: "History will be written through our victory."
 war_justification.5.t: "[ROOT.GetLeader] Brings Revolution to [From.GetName]"
 war_justification.5.d: "'While we have consolidated the socialist society in [ROOT.GetName], many nations still suffer under the despots of old. The workers of [From.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [From.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [From.GetAdjective] people. With the revolution we have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [From.Capital.GetName] as well!'\n\n[ROOT.GetLeader] has abandoned all attempts at diplomatic rhetoric towards capitalist controlled [From.GetName]. The quest to eradicate all borders is now strictly focused on eradicating their borders."
 war_justification.5.a: "[From.GetAdjective] workers, your liberation is near!"
 war_justification.6.t: "[ROOT.GetLeader] Calls to Aid [From.GetAdjective] Workers"
 war_justification.6.d: "'Is there a greater lie than the supposed liberty of the [From.GetAdjective] people? Where they once slaved under the feudal lords who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called liberty. Likewise, their freedom to elect their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [ROOT.GetAdjective] intervention.'\n\n[ROOT.GetLeader] has polemicized against the government in [From.GetName] for a long time in party meetings, but this rhetoric is now used more frequently in public. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.6.a: "We will crush their bourgeois dictatorship!"
 war_justification.7.t: "[From.GetAdjective] Communism Failing"
 war_justification.7.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [From.GetRulingParty] of [From.GetName], who have cast aside every hint of Marksist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of the [From.GetAdjective] revolution, [ROOT.GetLeader] has expressed increased disappointment with how it has developed. The [ROOT.GetRulingParty] may have to intervene before it is too late."
 war_justification.7.a: "There is time yet to salvage their attempt at socialism."
 war_justification.8.t: "[ROOT.GetLeader] Calls for Crushing [From.GetAdjective] Nationalism"
 war_justification.8.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the supremacist regime of [From.GetName]? Calling upon the people to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [From.GetAdjective], but the animosity has intensified lately. It now appears that conflict will arise sooner rather than later."
 war_justification.8.a: "Death to supremacists!"
 war_justification.9.t: "Diplomacy with [From.GetName] Breaks Down"
 war_justification.9.d: "'Despite our attempts to find a diplomatic solution to our conflict with [From.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [From.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who do not endorse harmonic principles. Barring a complete turnaround in the policies of [From.GetAdjective] leadership, we will be left with no recourse but to fight.'\n\n[ROOT.GetAdjective] intervention in [From.GetName] has been a hot issue, with some politicians in the opposition claiming that [ROOT.GetRulingParty] has pursued a warmongering policy from the start. Whatever their original intent, a future war now suddenly seems very real and inevitable."
 war_justification.9.a: "Sometimes, you need to climb the mountain of conflict."
 war_justification.10.t: "[ROOT.GetLeader] Calls for Intervention in [From.GetName]"
 war_justification.10.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [From.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [ROOT.GetAdjective] nor the [From.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that harmonic nations do not go to war against other harmonic nations, recent developments have pointed to a [ROOT.GetAdjective] invasion of [From.GetName] in the future. History may surprise us yet."
 war_justification.10.a: "[From.GetName] isn't really harmonic anyway."
 war_justification.11.t: "[ROOT.GetLeader] Speaks Against Red Menace"
 war_justification.11.d: "'Without a doubt, [From.GetAdjective] communism is one of the greatest threats to liberty and harmony in this era. Relentless and ruthless, it threatens to devour not only the [From.GetAdjective] [From.GetRaceMembers]'s hope of a prosperous, harmonic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need die before we intervene?'\n\nThe threat of subversive activity undermining our country, fueled by [From.GetAdjective] ambitions, has become a hotly debated topic recently. While left leaning representatives in opposition have called this a Red Scare aimed at pursuing war with [From.GetName], the rhetoric of [Root.GetLeader] has been highly successful so far."
 war_justification.11.a: "They follow a violent ideology, what reaction can they expect but violence?"
 war_justification.12.t: "[ROOT.GetLeader] Confronts [From.GetAdjective] Evil"
 war_justification.12.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [From.GetLeader] now holds [From.GetName]. [ROOT.GetRaceMembersCap] may argue that we should not provoke conflict, that we should trust [From.GetLeader] to honor treaties and promises in the future, but these people fail to see that these treaties only strengthen evil. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nPeople who have long hoped to avoid a direct confrontation with [From.GetName] have now been strongly opposed by [ROOT.GetLeader], who argues that we are merely postponing war to the advantage of the enemy. At this rate, we may strike the first blow after all."
 war_justification.12.a: "There can be no peace in our time until they are gone."
 war_justification.13.t: "[ROOT.GetLeader] Calls for War Against [From.GetName]"
 war_justification.13.d: "'Although we may be peaceful [ROOT.GetRaceMembers], our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [From.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\n[ROOT.GetLeader]'s hostile rhetoric towards [From.GetName] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the lands of our leader."
 war_justification.13.a: "It may be a difficult decision, but we must stand behind it."
 war_justification.14.t: "[ROOT.GetLeader] Challenges [From.GetAdjective] Pretensions"
 war_justification.14.d: "'[From.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [From.GetName] long held by the [ROOT.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [From.GetAdjective] [From.GetRaceMembers] want to avoid war, [ROOT.GetLeader] claims that their leaders have provoked it through their arrogance."
 war_justification.14.a: "They do not know how strong our hardships have made us."
 war_justification.15.t: "[ROOT.GetLeader] Wants to Restore Order in [From.GetName]"
 war_justification.15.d: "'The [ROOT.GetAdjective] national spirit is strong, but not all nations are so fortunate. [From.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the great Marksist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [ROOT.GetName] against this threat.'\n\nWhile the [ROOT.GetRulingParty] has always opposed communism, [From.GetName] has been a target of particular attacks in recent speeches. Whether or not the attack on the [ROOT.GetAdjective] nation from communists is a real threat, the preemptive attack on [From.GetAdjective] communism is already in the works."
 war_justification.15.a: "Those murdered in the revolution will be avenged!"
 war_justification.16.t: "[ROOT.GetLeader] Calls Out [From.GetAdjective] Oppressors"
 war_justification.16.d: "'My opponents would have you believe that my rule is like that of the [From.GetRulingParty] in [From.GetName]. They could not be more wrong. While [From.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [ROOT.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [ROOT.GetLeader] regime has adopted a hostile policy towards the [From.GetAdjective] nation. Whatever our leaders may be called, evil is a word reserved for our enemies."
 war_justification.16.a: "Tradition and pragmatism will always triumph over fanaticism and terror."
 war_justification.17.t: "[ROOT.GetLeader] Questions [From.GetAdjective] Sovereignty"
 war_justification.17.d: "'Who determines the borders of a nation and how are they determined? Whatever way people may have found in the past to justify where [ROOT.GetName] ends and [From.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [ROOT.GetLeader]'s recent speeches, an invasion of [From.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.17.a: "We must rally behind this cause!"
 war_justification.18.t: "[ROOT.GetLeader] Questions the Motives of [From.GetName]"
 war_justification.18.d: "'There is no doubt that [From.GetName] is preparing for war. The changes in economic policy make it plain to see that the [From.GetAdjective] are not defenders of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [ROOT.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe warmongers in the [ROOT.GetRulingParty] have turned their eyes towards [From.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [ROOT.GetName] is preparing for war."
 war_justification.18.a: "At least through war, there will be an end to this conflict."
 war_justification.19.t: "[ROOT.GetLeader] Angered by [From.GetAdjective] Posturing"
 war_justification.19.d: "'Those naïve citizens of [ROOT.GetName] who imagine the [From.GetAdjective] as [From.GetRaceMembers] of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [From.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nThe [From.GetAdjective] military presence close to our territory has sparked increased concern as this nation appears more and more to be the enemy of the [ROOT.GetRulingParty]. Whether it is the cause or the effect of their polemic is a matter of contention."
 war_justification.19.a: "Regardless, we must ready the people for war."
 war_justification.20.t: "[ROOT.GetLeader] Advocates Invasion of [From.GetName]"
 war_justification.20.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [From.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [ROOT.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [ROOT.GetRulingParty] leaders, most prominently [ROOT.GetLeader], has been calling the public to support an invasion of [From.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.20.a: "The nation stands behind this important decision."
 war_justification.201.t: "[From.GetLeader] Speaks Against [ROOT.GetName]"
 war_justification.201.d: "'Does [ROOT.GetName] belong to the [ROOT.GetAdjective]? Let us ask ourselves a better question: Does the future belong to the [ROOT.GetAdjective] or does it belong to [From.GetName]?'\n\n[From.GetLeader]'s speech today, suggested that [From.GetName] is on the path to war. Political tensions have been building over the past month and it seems the [From.GetAdjective] [From.GetRaceMembers] have accepted that war is inevitable. [ROOT.GetName] must also prepare."
 war_justification.201.a: "Why can we not be allowed to live in peace?"
 war_justification.202.t: "[From.GetLeader] Denounces [ROOT.GetAdjective] Ideals"
 war_justification.202.d: "'The [ROOT.GetAdjective] claim to have liberty and harmony, claim to want peace, but all of these things they pride themselves on are hollow. Their harmony divides the people where it should stand united and their liberty only betrays a lack of discipline. We [From.GetAdjective]s see through these lies... and we can see that this peace, peace on their terms, is a lie as well.'\n\n[From.GetLeader] has long derided the weakness of the [ROOT.GetAdjective] nation, but lately the rhetoric has grown more aggressive. The day of armed conflict grows closer."
 war_justification.202.a: "As expected from evil scum like [From.GetLeader]."
 war_justification.203.t: "[From.GetLeader] Warns Against [ROOT.GetAdjective] Communism"
 war_justification.203.d: "'Is there a bigger threat to our way of life, or indeed the way of life itself, than communism? This plague that threatens to make the slaves, not the masters, rule every nation, to abolish the nation itself, to abolish culture and history. We will take [From.GetName] and abolish the communist plague.'\n\n[From.GetLeader]'s hatred of communists has been well known since before [From.GetRulingParty]'s rise to power, but it appears to have intensified recently in the specific case of the [ROOT.GetAdjective] government. Our quest to liberate the proletariat seems to mortally frighten the [From.GetAdjective] oppressors."
 war_justification.203.a: "If they fear our cause, they fear their own people."
 war_justification.204.t: "[From.GetName] Prepares for Great Struggle"
 war_justification.204.d: "'The [ROOT.GetAdjective] are a nation, who will not part easily with power. However, they must also realize that the trajectory of our two nations can only end in a clash. We must steel ourselves for the struggle to come. For [ROOT.GetName] will not be taken without a fight.'\n\nThe possibility of an understanding between the similarly minded governments of [ROOT.GetName] and [From.GetName] has given way to a campaign to take their territory by force."
 war_justification.204.a: "Let them come!"
 war_justification.205.t: "[From.GetLeader] Bring Revolution to [ROOT.GetName]"
 war_justification.205.d: "'While we have consolidated the socialist society in [From.GetName], many nations still suffer under the despots of old. The workers of [ROOT.GetName] have no voice, no means to organize, and any attempts to institute socialism will be crushed savagely by the [ROOT.GetLeader] regime. We cannot wait for the gears of the international revolution to turn for the [ROOT.GetAdjective] [ROOT.GetRaceMembers]. We have proven that we could crush the capitalist oppressors here, and we will crush the oppressors in [ROOT.Capital.GetName] as well!'\n\n[From.GetLeader] has abandoned all attempts at diplomacy with our government. The communist task of eradicating all borders is now strictly focused on eradicating our borders."
 war_justification.205.a: "[ROOT.GetLeader] is a better ruler than any revolutionary opportunist!"
 war_justification.206.t: "[From.GetLeader] Calls to Aid [ROOT.GetAdjective] Workers"
 war_justification.206.d: "'Is there a greater lie than the supposed liberty of the [ROOT.GetAdjective] people? Where they once slaved under the feudal lords who claimed ownership of the soil, they are now forced to sell their labor to those who claim ownership of the factories. Their freedom to choose one master over the other can hardly be called harmony. Likewise, their freedom to criticise their leaders is a false choice, as propaganda would never allow the true socialists to take power. A people so thoroughly indoctrinated can only be saved by a [From.GetAdjective] intervention.'\n\nUnwilling to accept that the [ROOT.GetRaceMembers] in [ROOT.GetName] may be satisfied without their social experiments, the communist regime in [From.GetName] has openly threatened to attack our nation. There is little reason to believe that this conflict could be resolved peacefully."
 war_justification.206.a: "What merits can their convictions hold if they must force them on us?"
 war_justification.207.t: "[ROOT.GetAdjective] Communism Failing"
 war_justification.207.d: "'Comrades, although the greatest revolutionaries have once been called traitors, it has become plain to see that the revolution itself has been betrayed. How else would you explain the rule of the [ROOT.GetRulingParty] of [ROOT.GetName], who have cast aside every hint of Marksist ideas to build a degenerated worker's state where they can reign under false premises? In strengthening their own power at the price of the international revolution, they have shown that they care little for the ideals they claim to hold. We must bring the true revolution to them.'\n\nAlthough initially supportive of [ROOT.GetRulingParty]'s victory in [ROOT.Capital.GetName], [From.GetLeader] has drifted away from [ROOT.GetLeader]'s philosophy. The conflict has escalated to the point where they are preparing to invade to enforce their brand of socialism on us."
 war_justification.207.a: "They do not understand what the revolution means to the [Root.GetRaceMembers] of [Root.GetName]."
 war_justification.208.t: "[From.GetLeader] Calls for Crushing [ROOT.GetAdjective] Nationalism"
 war_justification.208.d: "'Is there any society more repugnant to the future of the revolution, any more alien to the plight of the worker, than the evil regime of [ROOT.GetName]? Calling upon the [Root.GetRaceMembers] to devote themselves fanatically to the decrepit institution of the nation state, they have dressed up age-old ways of savagery in a modern costume, trying to present themselves as an alternative future to the inevitable international victory of the working class. It is only a matter of time until they strike against us or our allies. Let us strike first.'\n\nNo one has expected less than mutual contempt between us and the [ROOT.GetAdjective], but the animosity has intensified lately. Hearing [From.GetLeader] speak, it appears that conflict will arise sooner rather than later."
 war_justification.208.a: "Better dead than red!"
 war_justification.209.t: "Diplomacy with [ROOT.GetName] Breaks Down"
 war_justification.209.d: "'Despite our attempts to find a diplomatic solution to our conflict with [ROOT.GetName], negotiations have once again broken down, leaving us with limited options. The authoritarian [ROOT.GetLeader] regime has displayed the unreasonable approach to this matter typical of leaders who do not endorse harmonic principles. Barring a complete turnaround in the policies of [ROOT.GetAdjective] leadership, we will be left with no recourse but to fight.\n\nIt appears that despite [From.GetAdjective] opposition parties urging for peace, harmonic institutions in [From.GetName] seem to fail at preserving the peace. Unless they back down, we may be forced to defend ourselves"
 war_justification.209.a: "Their condescending rhetoric will not intimidate us."
 war_justification.210.t: "[From.GetLeader] Calls for Intervention in [ROOT.GetName]"
 war_justification.210.d: "'It is with heavy heart that we must confront the reality of our situation: An invasion of [ROOT.GetName] may be our only recourse. It is of too great a strategic advantage to attempt any other solution in our current situation. Although we trust that neither the [From.GetAdjective] nor the [ROOT.GetAdjective] people want war, but history has led us to this point and our options are limited. We can only hope that through this assertion of our military power, we can avoid further bloodshed in the future.'\n\nAlthough it is a popular theory that harmonic nations do not go to war against other harmonist, recent developments have pointed to a [From.GetAdjective] invasion of [ROOT.GetName] in the future. History may surprise us yet."
 war_justification.210.a: "[From.GetName] is not really harmonist anyway, pursuing such aggressive action."
 war_justification.211.t: "[From.GetLeader] Speaks Against Red Menace"
 war_justification.211.d: "'Without a doubt, [ROOT.GetName] communism is one of the greatest threats to liberty and harmony in this era. Relentless and ruthless, it threatens to devour not only the [ROOT.GetAdjective] [Root.GetRaceMembers]' hope of a prosperous, harmonic society, but that of its neighbors as well. If we do not act now, we may well see this first domino fall too late, leaving more failed social experiments in its wake. How many more need to die before we intervene?'\n\nThe nascent worker's movement has intimidated [From.GetAdjective] leaders. While representatives in their opposition have called this a Red Scare and the most left-leaning politicians even expressed solidarity with our movement, the rhetoric of the [From.GetRulingParty] has been highly successful in inciting violence thus far."
 war_justification.211.a: "As long as there is profit to be made, capitalists will manufacture a war."
 war_justification.212.t: "[From.GetLeader] Confronts [ROOT.GetAdjective] Evil"
 war_justification.212.d: "'In modern history, perhaps even in history as a whole, there has been no worse tyranny than the iron grip in which [ROOT.GetLeader] now holds [ROOT.GetName]. People may argue that we should not provoke conflict, that we should trust [ROOT.GetLeader] to honor treaties and promises in the future, but these people fail to see that bargaining with evil is useless. To these dishonorable liars, might makes right, and the paper on which an agreement is written burns just as easily as the books of their detractors.'\n\nJealous of the glorious society we are building and the legacy it is founded upon, the [From.GetAdjective] seem prepared to start a war to destroy it. So much for their pretensions of peace."
 war_justification.212.a: "Inevitable. Better to have it over with."
 war_justification.213.t: "[From.GetLeader] Calls for War Against [ROOT.GetName]"
 war_justification.213.d: "'Although we may be peaceful [ROOT.GetRaceMembers], our nature alone does not determine the course we must take in history. This is a time of war. For too long, the [ROOT.GetAdjective] have possessed the means that we need to make it through the trials we may face, and it's apparent that they will not part with them peacefully. Despite our best efforts to build a modern state, some matters can only be settled through the old trials of battle.'\n\nIn a recent speech to the [From.GetAdjective] [From.GetRaceMembers] the hostile rhetoric towards [ROOT.GetName] has intensified and [From.GetLeader] has gone to great lengths to justify an invasion. Some portion of the population support this course, but the decision lies in the [From.GetHands] of their leader."
 war_justification.213.a: "They will regret making us their enemy."
 war_justification.214.t: "[From.GetLeader] Challenges [ROOT.GetAdjective] Pretensions"
 war_justification.214.d: "'[ROOT.GetName] may think themselves more modern and advanced than us, but the truth is that their nation has not been tested as ours has, nor are they prepared for the threats now plain to see on the horizon. By their disdain towards us, and preventing us to seize that which is rightfully ours, they have made us one of those threats to themselves. Their weak and divided nation will hardly resist our claims.'\n\nThe derisive opinion of [ROOT.GetName] long held by the [From.GetRulingParty] has developed from criticism to hostility. Although popular opinion is that the [ROOT.GetAdjective] [From.GetRaceMembers] want to avoid war, [From.GetLeader] claims that our leaders have provoked it through their arrogance."
 war_justification.214.a: "The voices for peace among the [From.GetAdjective] [From.GetRaceMembers] are, of course, silenced."
 war_justification.215.t: "[From.GetLeader] Wants to Restore Order in [ROOT.GetName]"
 war_justification.215.d: "'The [From.GetAdjective] national spirit is strong, but not all nations are so fortunate. [ROOT.GetName] has had its traditions destroyed and rightful rulers long since murdered and buried, all in the name of the idea of the 'great' Marksist revolution. It is our duty to restore order to this world led astray by bloodthirsty usurpers and to assert the strength of [From.GetName] against this threat.'\n\nWhile [From.GetLeader] has always opposed communism, [ROOT.GetName] has been a target of particular attacks in recent speeches. Fearing their nation's inevitable progress to the next stage of history, a preemptive attack on [ROOT.GetAdjective] communism is already in the works."
 war_justification.215.a: "It's too late to reverse the progress we've made."
 war_justification.216.t: "[From.GetLeader] Calls Out [ROOT.GetAdjective] Oppressors"
 war_justification.216.d: "'My opponents would have you believe that my rule is like that of the [ROOT.GetRulingParty] in [ROOT.GetName]. They could not be more wrong. While [ROOT.GetLeader]'s successes are the result of a recent fad, a destructive mass movement bent on bullying other nations into submission, the [From.GetRulingParty] stands in opposition to that movement as the ones who will not submit. I am prepared to do whatever is necessary to eliminate this threat, even if it means war.'\n\nThe [From.GetLeader] regime has adopted a hostile policy towards the [ROOT.GetAdjective] nation. Our visionary plans for future greatness have put their nation to shame, and unsurprisingly, they feel threatened."
 war_justification.216.a: "If they want to test our might, they will regret it."
 war_justification.217.t: "[From.GetLeader] Questions [ROOT.GetAdjective] Sovereignty"
 war_justification.217.d: "'Who determines the borders of a nation and how are they determined? Whatever way [From.GetRaceMembers] may have found in the past to justify where [From.GetName] ends and [ROOT.GetName] begins, we live in a new era. The strategic importance of this border cannot be overstated, and we are well within our rights to shift it to ensure the continued security of our people.'\n\nListening to [From.GetLeader]'s recent speeches, an invasion of [ROOT.GetName] appears imminent. Dissenting voices have objected, but public support for war is on the rise."
 war_justification.217.a: "Will they not give peace a chance?"
 war_justification.218.t: "[From.GetLeader] Questions the Motives of [ROOT.GetName]"
 war_justification.218.d: "'There is no doubt that [ROOT.GetName] is preparing for war. The changes in economic policy make it plain to see that the [ROOT.GetAdjective] are not [ROOT.GetRaceMembers] of peace, but rather waiting for the right opportunity to strike against us. Will we stand idly by and watch them arm themselves while [From.GetName] is undefended? Or will we disarm this threat before it grows beyond our power?'\n\nThe warmongers in the [From.GetRulingParty] have turned their eyes towards [ROOT.GetName], arguing that attack is the best defense. Their viewpoint is gaining traction and [From.GetName] is preparing for war."
 war_justification.218.a: "This is exactly why we need to be ready."
 war_justification.219.t: "[From.GetLeader] Angered by [ROOT.GetAdjective] Posturing"
 war_justification.219.d: "'Those naïve citizens of [From.GetName] who imagine the [ROOT.GetAdjective] as [ROOT.GetRaceMembers] of peace are entirely out of touch with reality. Those who live at our border do not have the luxury of such delusions, seeing their troops closing in on us just across it. This is a threat we cannot leave unanswered. With every passing day, [ROOT.GetName] is preparing for war. It would be madness for us not to do the same.'\n\nOur military presence close to [From.GetAdjective] territory has sparked increased concern, since they interpret our troop movements as proof hostile intent. They hardly seem to have considered that their aggressive rhetoric is the reason for our defensive measures."
 war_justification.219.a: "We can hardly disarm after these threats."
 war_justification.220.t: "[From.GetLeader] Advocates Invasion of [ROOT.GetName]"
 war_justification.220.d: "'If we want to have the strategic advantage in the foreseeable, not to say inevitable war with [ROOT.GetName], there is no room to hesitate. This is about safeguarding our children's futures and ensuring that [From.GetName] has a place in the world tomorrow. This is a matter of devotion to our cause and the ideals we take for granted. It's time to act.'\n\nA series of rousing speeches from [From.GetRulingParty] leaders, most prominently [From.GetLeader], has been calling the public to support an invasion of [ROOT.GetName]. The geopolitical motives behind the invasion are less prominent in the rhetoric to patriotic sentiments, but this campaign appears highly efficient in convincing the public of its necessity."
 war_justification.220.a: "We better prepare. The war will come."
 war_justification.301.t: "[ROOT.GetLeader] Criticized for Weak Foreign Policy"
 war_justification.301.d: "'We had the chance to strike against our enemies, but the [ROOT.GetRulingParty] let it pass by. Not only is this yet another damning case in a string of missed opportunities to strengthen [ROOT.GetName]'s position internationally, it is a sign that their claim to be acting in the interest of the [Root.GetRaceMembers] of [Root.GetName] is mostly empty rhetoric. It is time for a change in policy.'\n\nOur failure to pursue the war many had expected has been the target of scathing criticism from our political opponents. Not following through on our military plans will make it more difficult for us to convince the [Root.GetRaceMembers] in which direction we're taking [ROOT.GetName]."
 war_justification.301.a: "Don't they want to avoid war?"
 war_justification.301.b: "There is no room for public disagreement outside of party meetings."
 war_justification.301.c: "We cannot allow people to accuse [ROOT.GetLeader] of cowardice!"

### Generic
 generic.1.t: "[From.GetName] Is Influencing Our Politics"
 generic.1.d_neutral_good: "For a long time the [From.GetAdjective] government has sought to align the path of our countries, and has expressed a great interest in [Root.GetAdjective] politics. Recently this intensified when [From.GetRulingParty] started pushing their [From.GetRulingIdeology] propaganda with a number of speeches and reading material distributed to the [Root.GetAdjective] people. \n\nNow even a number of politicians and other officials are being swayed by the [From.GetAdjective] propaganda, and have started advocating for [From.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.d_bad: "For a long time the [From.GetAdjective] government has sought to align the path of our countries, and has often tried to meddle in [Root.GetName]'s politics. Recently this has intensified, as [From.GetRulingParty] started pushing their [From.GetRulingIdeology] propaganda with no respect for [Root.GetAdjective] political traditions. A number of speeches and other [From.GetRulingIdeology] material is already being distributed to the [Root.GetAdjective] people. It seems that even a number of politicians and other officials are being swayed by the [From.GetAdjective] propaganda and have begun advocating for [From.GetRulingIdeologyNoun] in [Root.GetName]."
 generic.1.a: "Interesting"
 generic.1.b: "How dare they!"
 generic.2.t: "[From.GetNameDefCap] seeks to join the [Root.GetFactionName]"
 generic.2.d.a: "In the face of increasing threats to liberty and democratic values, the [alliance_applicant.GetAdjective] look to us as the defenders of freedom. They now wish to be admitted into our alliance, both to enjoy our protection and to stand with us against the forces that would threaten harmony."
 generic.2.d.b: "Our plight to overturn the current world order has not escaped the notice of like-minded nations. The [alliance_applicant.GetAdjective] recognize that their best chance to carve out a prosperous future for themselves is to align with us in the coming conflict, and they have therefore offered to formally join us against our enemies."
 generic.2.d.c: "[alliance_applicant.GetNameDefCap] has recognized that she must band together with fellow socialist republics to strengthen the place of Communism in the world. Accepting our leading role in the international plight of the worker, the [alliance_applicant.GetAdjective] now request to formally enter into an alliance with us."
 generic.2.d.e: "As the current upheavals in international politics continue to reverberate through the world, the [alliance_applicant.GetAdjective] have deemed us to be their greatest chance of surviving these tumultuous times. They therefore request to be admitted into our alliance, so that we may weather the coming storm together."
 generic.2.a: "All who stand for liberty and harmony may stand with us."
 generic.2.b: "The world belongs to all who are strong!"
 generic.2.c: "If we stand together, the revolution cannot but prevail."
 generic.2.e: "And weather it, we shall!"
 generic.2.f: "We are better off without them."
 generic.2.g: "We already have the allies we need."
 generic.3.t: "[alliance_inviter.GetNameDefCap] welcomes us to the [alliance_inviter.GetFactionName]"
 generic.3.d: "[alliance_inviter.GetNameDefCap] has decided to accept our request to join the [alliance_inviter.GetFactionName]. Henceforth we shall stand or fall together."
 generic.3.a: "Together we shall defend harmony."
 generic.3.b: "None can stand against us!"
 generic.3.c: "The workers' plight could not ask for finer champions!"
 generic.3.e: "We shall set our differences aside, for now."
 generic.4.t: "[alliance_inviter.GetNameDefCap] denies request to join the [alliance_inviter.GetFactionName]"
 generic.4.d: "[alliance_inviter.GetNameDefCap] has decided to reject our request to join the [alliance_inviter.GetFactionName]. We will have to make do without their help."
 generic.4.a: "They call themselves defenders of harmony?"
 generic.4.b: "Then we will crush them, too!"
 generic.4.c: "Their revolution is corrupt!"
 generic.4.e: "Our differences were too great."
 generic.5.t: "[From.GetNameDefCap] invites [Root.GetNameDef] to the [From.GetFactionName]"
 generic.5.d.a: "With a suspicious eye on recent developments in world politics, [alliance_inviter.GetNameDef] extends us their [alliance_inviter.GetHand] of friendship, offering us their protection and urging us to stand with them in defence of the principles of liberty and harmony. As a member of the [alliance_inviter.GetFactionName], our citizen's freedom may well be safeguarded."
 generic.5.d.b: "Recognizing that sometimes even the strong need allies, the [alliance_inviter.GetAdjective] have invited us to join the [alliance_inviter.GetFactionName]. If we choose to accept, this may well provide ample opportunity for us to find our place in the sun."
 generic.5.d.c: "Our ideological allies in [alliance_inviter.GetNameDef] have made note of our valuable contributions to the workers' cause, and this morning we received an invitation us to join the [alliance_inviter.GetFactionName]. Standing together with other socialist republics, we could spread the revolution with renewed strength."
 generic.5.d.e: "It appears the [alliance_inviter.GetAdjective] consider us to be of strategic interest to them, and that they deem it more profitable that we work together than that we should let ourselves be divided by our ideological differences. This morning, the [alliance_inviter.GetAdjective] Ambassador delivered an invitation for us to become a member state of the [alliance_inviter.GetFactionName]."
 generic.5.a: "We will make our stand with them."
 generic.5.b: "We only need a few thousand dead..."
 generic.5.c: "We will fight alongside our comrades!"
 generic.5.e: "It is the profitable choice."
 generic.6.t: "[alliance_applicant.GetNameDefCap] accepts invitation to the [alliance_inviter.GetFactionName]"
 generic.6.d: "[alliance_applicant.GetNameDefCap] has decided to accept our offer to join the [alliance_inviter.GetFactionName]. Henceforth we shall stand or fall together."
 generic.7.t: "[alliance_applicant.GetNameDefCap] rejects offer to join the [alliance_inviter.GetFactionName]"
 generic.7.d: "[alliance_applicant.GetNameDefCap] has decided to reject our offer to join the [alliance_inviter.GetFactionName]. We will have to make do without their help."
 generic.7.a: "Our help is not wanted."

### stability generic
 stability.21.t: "Draft Dodging"
 stability.21.desc.a: "A new report by the War Office shows a marked reduction in [Root.GetRaceMembers] available for the draft. It appears that the latest batch of recruits is much smaller than initially expected. The discrepancy is currently under investigation, but first leads point towards a large number of [Root.GetRaceMembers] who are technically fit for service managing to avoid the draft through various means. Students who just became of age are suddenly skilled workers employed in critical war industry, former athletes fail their fitness tests and in some cases, recruits have simply vanished without a trace.\n\nWhen [Root.GetRaceMembers] are caught and interrogated, they point towards the poor conditions in the army, the indifferent officers and not wanting to die for a lost cause. Military leaders demand a harsh crackdown on [Root.GetRaceMembers] avoiding the draft, but many in the government believe that improving the living conditions of enlisted soldiers might be the better approach."
 stability.21.desc.b: "The ineffective official response to the widespread avoidance of the draft has only made the problem worse. More and more recruits never show up after receiving their drafting letter. Counter-Intelligence has intercepted a professionally made pamphlet advising people on how to avoid the draft, suggesting things like bribing doctors to certify the recruit to be medically unfit. Even the number of [Root.GetRaceMembers] applying for exceptions for ethical reasons have hit record numbers.\n\nMilitary leaders have suggested eliminating the last few exceptions and to make examples out of a few shirkers that have been caught. Others in the government have suggested that we should appeal to the sense of civic duty in our citizens and point out the consequences of a defeat in this war."
 stability.21.desc.c: "With government responses to draft dodging having no positive effects whatsoever, more and more [Root.GetRaceMembers] have started to wonder why they should put themselves at risk while others stay in safety. Recruits that do turn up often report being harassed or ridiculed in the streets as fools fighting for a doomed cause. Reports of mothers forbidding their children from answering the draft order are everywhere, and the War Office has submitted a report claiming that they are no longer sure how many people they are supposed to draft, as their bureaucracy has started to break down under the strain of processing all those missing soldiers."
 stability.21.a: "Nothing can be done about it."
 stability.21.d: "We should arrest anyone found evading the draft!"
 stability.21.e: "A pay rise for the enlisted soldiers is perhaps in order."
 stability.21.f: "It is time for harsher measures."
 stability.21.g: "Appeal to the [Root.GetRaceMembers]' sense of civic duty."
 stability.21.h: "We must make an example."
 stability.21.i: "We must give the [Root.GetRaceMembers] something to fight for."
 stability.22.t: "Strikes!"
 stability.22.desc.a: "Production in several factories has slowed down dramatically over the last few days as the workers have declared a strike on all war production. Demanding "Peace and Bread!", they have so far refused all attempts to negotiate a settlement. Some in the government have advocated a sharp military response, followed by a swift execution of the ringleaders as enemy agents and traitors. However, others in the civil service have recommended a more measured approach, pointing out that a heavy-[Root.GetHand]ed response may well backfire if the soldiers involved are not as loyal as we thought they were."
 stability.22.desc.b: "Government efforts to convince the strikers to return to work seem to have had no effect whatsoever. On the contrary, strikes have been reported in further factories, and the last few hold outs in the originally affected work sites have also put down their tools after facing the anger of their colleagues. While stockpiles have so far been able to cushion the blow to front line supplies somewhat, it is only a question of time before the production outages start to affect our ability to prosecute the war.\n\nThe War Office has again urged the government to take an unyielding line with the strikers, but other factions inside the administration have suggested that offering to meet the workers half-way may be enough to convince them to return to work."
 stability.22.desc.c: "What started as industrial action in a few isolated places has now spread across the entire country, affecting even industries that are only connected to the war effort in tertiary ways. Even the workings of the government itself have become affected, as many low level clerks, messengers, and drivers have refused to show up to work in increasing numbers. \n\nIn many places, worker councils have taken over the factory buildings. Reports from the secret police indicate that some places seem to have started production of weapons again - for a major uprising against what is being called "The War Regime".\n\nMilitary High Command believes that decisive action by loyal troops could still win the day, while the civilian side of the government argues that this risks a civil war and certain defeat."
 stability.22.a: "This will blow over."
 stability.22.b: "Make a demonstration of military force in the towns."
 stability.22.c: "Make propaganda heroes out of the [Root.GetRaceMembers] still willing to work."
 stability.22.d: "Draft the workers into military service and put the factories under military control."
 stability.22.e: "Offer to increase the food rations of workers."
 stability.22.f: "Send in the troops, arrest the strikers, execute the ringleaders."
 stability.22.g: "Propose new welfare legislation."
 stability.23.t: "Mutinies in the Army"
 stability.23.desc.a: "Alarming news has reached Military High Command about a number of units in our Army refusing orders from superior officers. While none of the units have left their position in the line, representatives of the soldiers have made it quite clear that they will not obey any orders to attack the enemy.\n\nThe rebellion has so far been contained to a small number of battalions and a [Root.GetHand]ful of training and support units, but many in the War Office fear that this uprising will soon spread to other units and may eventually render us unable to continue the war. Decisive action is needed."
 stability.23.desc.b: "Efforts to address the mutinies in the army have shown no effect. Emboldened by the lack of effective government response, the mutineers have expanded their list of demands to include an immediate cease-fire followed by a comprehensive peace treaty and demobilization.\n\nThe War Office strongly recommends that we send a strong signal to the mutineers to deter any further action on their part."
 stability.23.desc.c: "With the government seemingly unwilling or unable to address their issues, the mutineers have decided to take measures into their own [Root.GetHands]. Elections for "Worker and Soldier Councils" have been announced, with the express goal of taking over the country and making peace with the enemy.\n\nUnless action is taken swiftly, these councils may very well end up replacing our government in some areas of the country and render us unable to continue the war."
 stability.23.a: "We can't do anything about that now."
 stability.23.b: "Surround the mutinous units with loyalists and order them to stand down."
 stability.23.c: "Hold a patriotic speech before the mutineers."
 stability.23.d: "Publicly announce that any [Root.GetRaceMember] found supporting the mutineers will be charged with treason."
 stability.23.e: "Announce a peace initiative. Make sure it is unacceptable to the enemy."
 stability.23.f: "Mobilise loyalist militias and arrest all soldiers not at their duty stations."
 stability.23.g: "Offer the soldiers to permit them to elect their own officers."
 15_days_tt: "This will take about §Y15 days§! to implement.\n"
 30_days_tt: "This will take about §Y30 days§! to implement.\n"
 45_days_tt: "This will take about §Y45 days§! to implement.\n"
 stability.31.t: "Military Crackdown succeeds"
 stability.31.desc: "Our swift response has proven very effective. Military police units, supported by local law enforcement and patriotic volunteers, swarmed out in a well-coordinated operation to visit every missing draftee. Most were willing to answer the call when they were informed of the consequences of failing to report for duty. Military High Command has publicly declared that any [Root.GetRaceMember] who showed up at their duty station will not be charged with any crime or punished for failing to do so in the past. Still, a number of [Root.GetRaceMembers] have categorically refused to take up arms for their country and have been arrested."
 stability.31.a: "Decisive action prevented worse."
 stability.32.t: "Draft Riots"
 stability.32.desc: "Our attempts at resolving the situation through military force have not been met with success. It appears that a member of our administration has leaked our planned operation to the public, which responded quickly. When military police and other law enforcement agencies tried to apprehend known draft dodgers, they found their way blocked by angry mobs, demanding an end to the war and to forced conscription. In several cases, street battles erupted between the police and the protesters, leading to a number of fatalities when the soldiers were forced to use their weapons to defend themselves. It took several hours until the police gained full control over the situation.\n\nAn ugly mood has settled over the capital as the barricades are cleared away and the dead are buried. Reports from the War Office show no change in the number of recruits reporting for duty. Many in the government wonder how much longer we can continue fighting under these circumstances."
 stability.32.a: "The situation has not necessarily developed to our advantage."
 stability.33.t: "The Conscription Rebellion"
 stability.33.desc: "Our attempts at resolving the situation through military force have not been met with success. It appears that a member of our administration has leaked our planned operation to the public, which responded quickly. When military police and other law enforcement agencies tried to apprehend known draft dodgers, they found their way blocked by angry mobs, demanding an end to the war and to forced conscription. In several cases, street battles erupted between the police and the protesters, leading to a number of fatalities when the soldiers were forced to use their weapons to defend themselves. \n\nThe situation quickly spiralled out of control after that, as citizens rushed the soldiers and stormed police stations to arm themselves. Several cities in the country are now in a state of armed insurrection against the government. Ironically, the rebels seem to have no issues finding soldiers willing to take up arms."
 stability.33.a: "Oh, so NOW they want to fight!?"
 stability.34.t: "Draft Reform proves effective"
 stability.34.desc: "The social measures passed by the government as part of a larger process of reforming the military recruitment policy have proven surprisingly popular. Higher pay and more frequent leave are often cited as the biggest new benefits, but many also point to the new government programs to support war widows and widowers as well as orphans. Fewer and fewer [Root.GetRaceMembers] can justify refusing their country's call to the colours, and public support for draft-dodgers has all but disappeared.\n\nIndeed, there has been a recent upswing in public support for the government as more and more people realize that the [Root.GetAdjective] way of life is under attack."
 stability.34.a: "A wise decision."
 stability.35.t: "The 591st Penal Battalion"
 stability.35.desc: "Seeing the severity of the situation, the Military High Command has decided that more drastic measures are required to show that evading one's civic duty to defend their country will not be tolerated. At dawn, military police raided the homes of a number of carefully selected, well known and connected [Root.GetRaceMembers] who have used their influence to allow others to avoid the draft. Still in their nightgowns, they have found themselves conscripted into the military and escorted to the barracks under armed guard, where they will be formed up into a separate unit, to avoid their subversive influence from spreading to other units. \n\nThe news of this has spread quickly, and it appears that most [Root.GetRaceMembers] who until now believed that they could get away with ignoring their draft notice have changed their mind. Recruitment stations across the country report that a growing number of people have come by to ask what exactly the consequences would be if a "friend" of theirs who had attempted to avoid the draft would turn themselves in."
 stability.35.a: "They may yet redeem themselves."
 stability.36.t: "Local Elites Voice Their Protest"
 stability.36.desc: "Seeing the severity of the situation, the Military High Command has decided that more drastic measures are required to show that evading one's civic duty to defend their country will not be tolerated. At dawn, military police raided the homes of a number of carefully selected, well known and connected [Root.GetRaceMembers] who have used their influence to allow others to avoid the draft. Still in their nightgowns, they have found themselves conscripted into the military. Their families have mobilised their extensive support networks to protest this decision. The War Office has been flooded with calls and letters from simple workers who want their factory manager back to undersecretaries in various other ministries, demanding to know why people working in fields critical to the war effort have been removed from their work. It appears that even some cabinet members have second thoughts about the war - perhaps fearing for the safety of their own sons."
 stability.36.a: "Have they no sense of duty?"
 stability.37.t: ""A Sombre and Sacred Duty""
 stability.37.desc: ""Of course I want to live. I want to go and finish school, I want to meet new friends, I want to start a family - but if we lose this war, I won't be able to do these things, either. So I fight."\n\nThe letter, sent anonymously to every major newspaper in the country, has made huge waves. Claiming to be from a soldier who at first tried to avoid the draft, but then realized that he must fight to save his country, it has apparently struck a nerve with many others who felt similarly. Draft boards across the country report that the number of [Root.GetRaceMembers] who still refuse to answer their summons has been more than made up for by new volunteers who will no longer wait until they are called, while others go and fight to save their country and their way of life."
 stability.37.a: "We will not let their lives be spent in vain."
 stability.38.t: "The end of a coward"
 stability.38.desc: ""They led him to the wall at the break of dawn. He refused a last cigarette, but accepted the blindfold. His last words were an apology to his mother for causing her so much pain. The firing squad aimed well. A few minutes later, the doctor present declared him dead."\n\nWhile unable to catch all [Root.GetRaceMembers] who have been evading the draft, authorities have been able to make a number of arrests. Given the grave situation we are in, the War Office has decided that these [Root.GetRaceMembers] be tried under military law for failing to report to duty. The first series of death sentences have been [Root.GetHand]ed down and the condemned have been executed by firing squad. These measures have evidently had the desired effect. It appears that most [Root.GetRaceMembers] decided to choose the possibility of death on the battlefield over the certainty of dishonourable death as a coward."
 stability.38.a: "A shame that it had to come to this."
 stability.39.t: "A martyr for peace"
 stability.39.desc: ""They led him to the wall at the break of dawn. He refused a last cigarette, but accepted the blindfold. His last words were an apology to his mother for causing her so much pain. The firing squad aimed well. A few minutes later, the doctor present declared him dead."\n\nThe published report of the execution of a [Root.GetRaceMember] sentenced to death for failing to report for duty seems to have had the opposite effect. Rather than bringing [Root.GetRaceMembers] back to the colours out of fear of the consequences, it has made those executed into instant martyrs for the peace movement. Their names and life stories have been published and very clearly edited to make them appear in the best possible light. Mass peace demonstrations have started in several major cities, demanding an end to the war. The War Office reports that they have received a number of letters of draftees stating openly that they will not appear for duty - saying that they would not, under any circumstances, be party to another execution except as the person to be executed."
 stability.39.a: "Things have not necessarily improved."
 stability.40.t: "A New Deal for [Root.GetNameDef]"
 stability.40.desc: "In a radio transmitted speech today, [Root.GetLeader] announced what he called a "Social Revolution". Over the next hour, [Root.GetLeader.GetSheHeCap] laid out a system of reforms that touch every part of social life, promising every returning soldier an education, a well-paying job and a generous pension. [Root.GetLeader.GetSheHeCap] also announced a major building programme for affordable housing for young families, to begin the day an armistice is signed. This appears to have had a significant effect on general morale. Recruitment offices across the country report conscripts appearing and asking about options to extend their service beyond the current conflict, with others all but demanding a posting to frontline units to ensure extra benefits."
 stability.40.a: "And we pay for all this how...?"

### Strike generic
 strikes_event.1.t: "Order Restored"
 strikes_event.1.desc: "Moving quickly, Military High command mobilised a number of training units for service and formed ad-hoc groups of soldiers on leave. Marching these formations past the gates of the factories had the desired effect, as most strikers did not want to force a confrontation with potentially deadly consequences. The few that did try to persuade the soldiers to make common cause found their words having little effect as soldiers asked why the workers in the cosy rear should be allowed to let down the fighting [Root.GetRaceMembers] on the front."
 strikes_event.1.a: "Why indeed."
 strikes_event.2.t: "Bloody Monday"
 strikes_event.2.desc: "Moving quickly, Military High command mobilized a number of training units for service and formed ad-hoc groups of soldiers on leave. Moving these formations to the affected cities proved a lot more difficult than expected, however, as the strikers blocked railway lines and forced the troops to come the old-fashioned way, giving them ample time to prepare. When our troops reached the barricaded factories, they found the strikers ready for them. Attempts to clear roads were met with furious attacks by the workers throwing stones and bottles at the soldiers. \n\nIn several instances, the troops opened fire to defend themselves, killing a number of strikers and wounding scores more. This only enraged the mob even further, with bystanders screaming "Murderers!". The mood in the capital turned dramatically in favor of the strikers. At nightfall, the soldiers retreated, leaving the barricades intact.\n\nThere have been no further attempts to force the situation. The strikers remain in control of the factories, and no work is being done."
 strikes_event.2.a: "Not as planned."
 strikes_event.3.t: "Heroes on the Production Front"
 strikes_event.3.desc: ""Industrial war is more than just divisions marching and planes bombing. It is more than just the duty of a soldier to fight and die for their country. An industrial war is won, first and foremost, in the factories and foundries. To abandon the battle on the assembly line is no better than abandoning it on the front line. And the victories of the assembly line should be celebrated just as much as the ones won by the front line."\n\nAll available propaganda resources have been rerouted to show the work of the armaments workers in the best possible light. [Root.GetLeader] has personally approved a new award to be given out for workers who have exceeded their quota by more than 100%, and the first recipients have been sent on tours around the country to instruct other workers in their methods.\n\nIt appears that this has made a lot of the strikers reconsider their stance. Work has resumed in all previously affected factories."
 strikes_event.3.a: "Heroes one and all."
 strikes_event.4.t: "The War Production Department"
 strikes_event.4.desc: "[Root.GetLeader] announced some small changes to the draft today. While skilled workers were previously exempted from the military draft, this exception has now been removed and all exempt [Root.GetRaceMembers] drafted immediately. At the same time, the War Office has been authorised to take direct control of any factory that produces goods relevant to the war effort if the leadership of those factories has shown a lack of ability.\n\nThe announcement was met with silent resignation in the affected cities, especially once it was announced that anyone resisting would be treated the same as a soldier who refused to follow orders. While morale amongst the workers in the factories is at rock-bottom, production has restarted."
 strikes_event.4.a: "Should have done that from the start."
 strikes_event.5.t: "A country in defiance"
 strikes_event.5.desc: "[Root.GetLeader] announced some small changes to the draft today. While skilled workers were previously exempted from the military draft, this exception has now been removed and all exempt [Root.GetRaceMembers] drafted immediately. At the same time, the War Office has been authorised to take direct control of any factory that produces goods relevant to the war effort if the leadership of those factories has shown a lack of ability.\n\nThe announcement was met with great laughter in the affected cities, especially once it was announced that anyone resisting would be treated the same as a soldier who refused to follow orders. Police officers sent to deliver draft notices to workers were told to come back with more than ink on paper."
 strikes_event.5.a: "Perhaps we should."
 strikes_event.6.t: "Useful Eaters"
 strikes_event.6.desc: "Without mentioning the strikes taking place, [Root.GetLeader] announced today that workers in war-relevant industries will get extra rations of sugar, coffee and bread to maintain their strength. Sadly, the rumours that the government was willing to [Root.GetHand] out extra cake turned out to be false.\n\nWhile the ringleaders of the strike try to keep the workers from returning to work, most seem to have accepted that "Peace and Bread" were never going to happen and are happy with just the bread."
 strikes_event.6.a: "They better earn their keep."
 strikes_event.7.t: "Operation Black Oak"
 strikes_event.7.desc: "The troops assembled outside the towns overnight, maintaining noise and light discipline to keep the element of surprise. As the sun crept over the horizon and the workers manning the barricades at the factories looked forward to relief by the day shift, the assault columns moved in. The tired workers were sluggish to organise the resistance and quickly overcome. Leaving a small detachment to guard the prisoners, the troops swept the town, arresting every [Root.GetRaceMembers] on the list of known factory workers. By noon, the military had taken full control of the cities and instituted a curfew. No further resistance is expected. The majority of workers will soon be released on the condition that they return to work, while the ringleaders will be held and put on trial with the prosecution demanding the death sentence for endangering the country."
 strikes_event.7.a: "Order has been restored."
 strikes_event.8.t: "The Battle of Oak Street"
 strikes_event.8.desc: "The troops assembled outside the towns overnight, but poor light and noise discipline gave the surprise away. As the troops moved in, they found the workers alert and ready for them. The first assault broke down in hails of thrown stones. A second assault with fixed bayonets was repulsed in brutal [Root.GetHand]-to-[Root.GetHand] fighting, leaving dozens of dead and dying in the streets.\n\nThe officers in charge have pulled back to consolidate their forces, while the workers are extending their fortifications and arming themselves with the weapons left behind in the retreat. A second day of fighting is expected tomorrow, but Military High Command does no longer believe that victory is likely."
 strikes_event.8.a: "We are quickly running out of options."
 strikes_event.9.t: "The Worker's Rights Protection Act"
 strikes_event.9.desc: "With tensions running high across the capital, [Root.GetLeader] announced a new law to protect the rights of workers, even in times of war. The sweeping legislation mandates paid sick leave without limits, mandatory accident insurance for every worker and the right to join any union, even those critical of the war effort.\n\nWhile many in the government consider this nothing less than a complete surrender to the strikers, the results are conclusive: work has resumed in all factories."
 strikes_event.9.a: "Hopefully this will be enough."

### mutiny Generic
 mutiny_event.1.t: "Mutiny Crushed"
 mutiny_event.1.desc: "After a few hours of tense negotiations at barracks gates and in front line dugouts, the mutiny in our army is over. Faced with the prospect of a fight they could not win, the mutineers quickly decided to stand down. \n\nThe primary issue then became the fate of those that had refused orders. Military High Command has opted for clemency and assured the mutineers that they would not be punished harshly. A few examples have been made in which some soldiers were demoted to a lower rank and transferred to a different unit."
 mutiny_event.1.a: "Let's hope that is the last of it."
 mutiny_event.2.t: "An Empty Threat"
 mutiny_event.2.desc: "Attempts to scare the mutineers into submission have backfired spectacularly as the troops showed little fear of the units sent to supress them. Using skills honed on the front lines, they quickly organized a defence of their positions that would make any attempt to defeat them very costly. \n\nThe officers in charge of the loyalist units have pulled back and are awaiting further orders, but this small success has no doubt strengthened the mutineers' resolve."
 mutiny_event.2.a: "No one could have predicted this."
 mutiny_event.3.t: ""What ARE we fighting for?""
 mutiny_event.3.desc: ""It's not uncommon for a soldier to doubt whether what he or she is doing is really worth it. Can anything justify the sacrifices we ask of you? Can we really demand you to potentially die in pursuit of a goal that you would never see?\n\nIt is an unfortunate fact that we must live in the times we were born in. Fate has decided that we must be at war, to protect our freedom, our homes, our [Root.GetAdjective] way of life! We did not choose this war, it was forced on us! You know that I would not ask anything of you that I would not be willing to do myself, and I know that you will do whatever is necessary to secure victory."\n\n[Root.GetLeader]'s speech in front of the troops appears to have had the desired effect, as the soldiers broke out in spontaneous cheers and returned to their duties without more than the usual amount of complaining."
 mutiny_event.3.a: "Good speech."
 mutiny_event.4.t: "The Treason In War Act"
 mutiny_event.4.desc: "While the War Office is doing its best to keep the current mutiny in the army from becoming widely known, censoring letters can only go so far. Soldiers on leave quickly spread the word that the army is no longer willing to bleed needlessly in this war.\n\nWithout mentioning the mutiny specifically, [Root.GetLeader] announced today that the government would now consider any act that reflected a lack of commitment to the war to be treason.\n\nThe punishment for treason is well known, and public support for the mutineers has all but evaporated. News of this was, of course, widely spread. Seeing little support from the general population, the soldiers have quietly resumed their duties."
 mutiny_event.4.a: "We shouldn't have to spell this out."
 mutiny_event.5.t: "Crackdown Attempt Fizzles"
 mutiny_event.5.desc: "While the War Office is doing its best to keep the current mutiny in the army from becoming widely known, censoring letters can only go so far. Soldiers on leave quickly spread the word that the army is no longer willing to bleed needlessly in this war.\n\nAttempts by the government to stem the tide have completely failed. Reports from the Secret Police indicate that the mutineers have a strong backing from the general public, making it unlikely that we can isolate and suppress them."
 mutiny_event.5.a: "This disrespect for laws is deeply worrying."
 mutiny_event.6.t: "The [Root.GetAdjective] Peace Offer"
 mutiny_event.6.desc: "[Root.GetLeader] announced to the press today that his latest peace offer has failed. While the causes for this unfortunate turn of events are very complex, the [Root.GetAdjective] demand that the other side pay for all damages caused, disarm completely and publicly acknowledge that they started the war may have been the final straw.\n\nOur enemies have responded in kind, calling our reasonable requests a demand for unconditional surrender. They have promised that they will prosecute this war until the bitter end. \n\nWith our enemies evidently unwilling to see reason and promising to fight on, attempts by the mutineers to force a peace settlement have collapsed."
 mutiny_event.6.a: "Terrible shame."
 mutiny_event.7.t: "Military Crackdown succeeds."
 mutiny_event.7.desc: "Despite a few instances in which small groups of mutineers decided to make a fight out of it, our operation to crush the rebellion has been a stunning success. Relying on numbers rather than skill, loyalist militias surrounded the mutineers' strongholds and demanded their surrender. Most soldiers decided not to take up arms against their fellow [Root.GetRaceMemebrs] and surrendered peacefully. \n\nThe ringleaders will be tried in secret court martials, but the average soldier will be sent back to the front, albeit in a different unit to prevent mutineers from forming new cells."
 mutiny_event.7.a: "Well done."
 mutiny_event.8.t: "Fighting Our Own"
 mutiny_event.8.desc: "Our attempts to prevent the elections for the Worker and Soldier Councils have escalated the situation beyond even the most pessimistic estimation. Rather than surrendering, the mutineers have formed provisional Councils, elected field commanders and set up defences in the streets. It is clear that they aim to make a fight out of this.\n\nThe rifts in the army now run through every unit and often even between members of the same family. [Root.GetNameDefCap] may soon be a battleground."
 mutiny_event.8.a: "This keeps getting worse."
 mutiny_event.9.t: "A New Breed of Officer"
 mutiny_event.9.desc: "Despite strong objections from the military, every unit in the [Root.GetAdjective] Army carried out elections to select their commander. The results have been very surprising, as most of the elected are accomplished soldiers with plenty of experience in the field. While many professional officers still consider this to be a personal insult, there can be little doubt that most soldiers dramatically prefer this situation."
 mutiny_event.9.a: "This shouldn't work, should it?"

### generic nuke drope
 nuke_dropped.1.d: "[This.GetNewspaperHeader]For the first and hopefully last time in history, a nuclear bomb has been detonated in [From.From.GetName] as part of international warfare conducted by [?global.nukecountry.GetNameDef]. The unprecedented destruction stands as a testament to the devastating power of this new weapon, which is feared not only for what it can do to its targets, but what implications it has for the one who deploys it and for the world itself.\n\nThe world holds its breath waiting for what will come next. Will this force [From.From.Owner.GetNameDef] to surrender to avoid further terror, or will it only strengthen their resolve to strike back against those who would resort to such measures?"
