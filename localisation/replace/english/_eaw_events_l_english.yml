###Replaced Generic###
### Ace generic
 ace_promoted.1.t: "Ace Pilot Promoted"
 ace_promoted.2.t: "A Wild Ace Appears"
 ace_promoted.1.d: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [From.GetFullname], a skilled pilot known under the callsign [From.GetCallsign], has distinguished [From.GetHerselfHimself] in not only returning alive from the recent mission over [From.GetMissionRegion], but living through significant victories in many critical encounters.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [From.GetName]'s recent promotion has been highly publicized. Although the [Root.GetRaceMembers] may view war as more Tartarus than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.d_major: "Few take as many risks as the brave pilots of the [Root.GetAdjective] air force. [From.GetFullname], a skilled pilot known under the callsign [From.GetCallsign], has distinguished [From.GetHerselfHimself] in not only returning alive, but piloting [From.GetHerHis] [From.GetWing] with immense skill. Recently, [From.GetName] was on a mission over [From.GetMissionRegion] and was instrumental to the success of this critical encounter.\n\nHeld up as a shining example of [Root.GetAdjective] courage, [From.GetName]'s recent promotion has been highly publicized. Although the [Root.GetRaceMembers] may view war as more Tartarus than glory, many are glad to see that there are still heroes to rally behind."
 ace_promoted.1.a: "Who dares, wins."
 ace_died.1.t: "[From.GetCallsign] Killed Over [From.GetMissionRegion]"
 ace_died.1.d: "One of [From.Owner.GetName]'s most famous [From.GetAceType] aces, [From.GetFullName], has gone down in flames in the line of duty, during a mission over [From.GetMissionRegion]. Unfortunately, since [From.GetSheHe] has long since been a public figure, the demise of [From.GetCallsign] is severely demoralizing to the many [Root.GetRaceMembers] who looked up to [From.GetHerHim].\n\nWhile we wish there was a way to hide this event from the [Root.GetRaceMembers], the lack of public appearances from [From.GetName] would soon raise suspicion. Ultimately, [From.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.d_major: "One of [From.Owner.GetName]'s most famous [From.GetAceType] aces, [From.GetFullName], has gone down in the line of duty. Pilots returning from the mission report having spotted [From.GetHerHis] [From.GetWingShort] going down in flames over [From.GetMissionRegion] after taking heavy enemy fire. Unfortunately, since [From.GetSheHe] has long since been a public figure, the demise of [From.GetCallsign] is severely demoralizing to the many [Root.GetRaceMembers] who looked up to [From.GetHerHim].\n\nWhile we wish there was a way to hide this event from the [Root.GetRaceMembers], the lack of public appearances from [From.GetName] would soon raise suspicion. Ultimately, [From.GetHerHis] death is another part of a legend that will hopefully live on long past our current troubles."
 ace_died.1.a: "A living legend is still better."
 ace_killed_by_ace.1.t: "[From.GetFullName] Shot Down By [Prev.GetCallsign]"
 ace_killed_by_ace.1.d: "Pilots returning from [From.GetMissionRegion] report that a squadron of [Prev.Owner.GetAdjective] aircraft, led by the infamous [Prev.GetCallsign], focused on chasing down [From.GetCallsign]. After dodging several burst from the [Prev.Owner.GetAdjective]s and taking down a number of enemy aircraft, [From.GetCallsign] was overwhelmed by [Prev.GetCallsign], who reportedly outmanoeuvred [From.GetHerHim] and ripped the fuel tanks open with a clean hit. [From.GetName] [From.GetSurname]'s plane caught fire and went spiraling down over [From.GetMissionRegion] in a violent inferno.\n\n[From.GetFullName] has shown great courage throughout [From.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [From.Owner.GetAdjective] air force and is a devastating blow to our nation as a whole. Knowing that while we grieve, [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero, makes the tragedy even greater."
 ace_killed_by_ace.1.d_major: "Pilots returning from [From.GetMissionRegion] report that, a squadron of [Prev.Owner.GetAdjective] aircraft led by the infamous [Prev.GetCallsign] focused on chasing down [From.GetCallsign]. After taking down a number of enemy aircraft and dodging several burst from the [Prev.Owner.GetAdjective]s, [From.GetCallsign] was overwhelmed by [Prev.GetCallsign] in his [Prev.GetWingShort], who reportedly outmanoeuvred [From.GetHerHim] and ripped the fuel tanks open with a clean hit. [From.GetName] [From.GetSurname]'s [From.GetWingShort] caught fire and went spiraling down over [From.GetMissionRegion] in a violent inferno.\n\n[From.GetFullName] has shown great courage throughout [From.GetHerHis] service and was looked up to by many. The loss of this national hero is a great blow to the [From.Owner.GetAdjective] air force and is a devastating blow to our nation as a whole. Knowing that while we grieve, [Prev.Owner.GetName] is celebrating [Prev.GetFullName] as a hero, makes the tragedy even greater."
 ace_killed_by_ace.1.a: "A devastating loss for us all"
 ace_killed_other_ace.1.t: "[From.GetFullName] Shot Down [Prev.GetCallsign]"
 ace_killed_other_ace.1.d: "Our latest mission over [From.GetMissionRegion] was a great success for the [From.Owner.GetAdjective] air force in more than one aspect. Reports have come in highlighting [From.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as [Prev.GetCallsign]. [From.GetCallsign] used [From.GetHerselfHimself] as bait and lured [Prev.GetCallsign] into a trap where the [From.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. [From.GetCallsign] proceeded to outmanoeuvre the [Prev.Owner.GetAdjective] aircraft and with a single burst sent [Prev.GetCallsign] spiraling from the skies of [From.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [From.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.d_major: "Our latest mission over [From.GetMissionRegion] was a great success for the [From.Owner.GetAdjective] air force in more than one aspect. Reports have come in highlighting [From.GetFullName]'s heroic deed, managing to outwit the [Prev.Owner.GetAdjective] pilot, [Prev.GetName] [Prev.GetSurname], known as [Prev.GetCallsign]. [From.GetCallsign] used [From.GetHerselfHimself] as bait and lured [Prev.GetCallsign] into a trap where the [From.Owner.GetAdjective] pilots were able to dive on [Prev.GetCallsign]'s squadron. [From.GetCallsign] proceeded to outmanoeuvre the [Prev.Owner.GetAdjective] aircraft and with a single burst sent [Prev.GetCallsign] spiraling from the skies of [From.GetMissionRegion].\n\n[Prev.GetFullName] was a feared pilot with many [From.Owner.GetAdjective] lives on [Prev.GetHerHis] conscience. This is a great victory and shows that when we rally behind great heroes, they perform great deeds."
 ace_killed_other_ace.1.a: "A victory all of [From.Owner.GetName] will remember!"
 aces_killed_each_other.1.t: "[From.GetFullName] has gone down"
 aces_killed_each_other.1.d: "During the latest mission our famous [From.GetAceType] ace [From.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, [From.GetCallsign] manoeuvred through the fire from the [Prev.Owner.GetAdjective] aircraft and proceeded to ram [Prev.GetCallsign].\nBoth [From.GetCallsign]'s and [Prev.GetCallsign]'s planes were spotted going down in pieces over [From.GetMissionRegion].\n\nWhile it is a small consolation that the [Prev.Owner.GetAdjective] menace, [Prev.GetCallsign], will no longer be a nuisance to us, we have lost a valued public figure and inspiration to all [From.Owner.GetAdjective]."
 aces_killed_each_other.1.d_major: "During the latest mission our famous [From.GetAceType] ace [From.GetFullname] ended up in a prolonged fight with the feared ace pilot, [Prev.GetFullName]. Being low on munitions and with no possibility of escape, [From.GetCallsign] manoeuvred [From.GetHerHis] [From.GetWingShort] through the fire from the [Prev.Owner.GetAdjective] aircraft and proceeded to ram [Prev.GetCallsign].\nBoth [From.GetCallsign]'s [From.GetWingShort] and [Prev.GetCallsign]'s [Prev.GetWingShort] were spotted going down in pieces over [From.GetMissionRegion].\n\nWhile it is a small consolation that the [Prev.Owner.GetAdjective] menace, [Prev.GetCallsign], will no longer be a nuisance to us, we have lost a valued public figure and inspiration to all [From.Owner.GetAdjective]."
 aces_killed_each_other.1.a: "A great loss for us nonetheless"

### generic political
 # 1-3 unused
 political.4.t: "Class Conflicts Divide [Root.GetName]"
 political.4.d: "The communist revolutionary movement, once a fringe popular among radical academics in theory and troublemakers in practice, has seen increased support among the [Root.GetAdjective] working class. The fact that even more [Root.GetRaceMembers] choose to identify themselves with a 'class' at all implies that Marksist ideas are spreading beyond those who actively seek to overthrow the government.\n\n[Root.GetRulingParty] members lament this development, longing for a time when '[Root.GetAdjective]' was what [Root.GetRaceMembers] identified as first and foremost. Their concerns are not unfounded. It could be argued that a revolution is already underway, occurring on several levels of society, and it may be too late to stop it."
 political.4.a: "The [Root.GetRaceMembers] may call themselves whatever they want."
 political.5.t: "Soldiers Desert to Communist Partisans"
 political.5.d: "'Capitalists and nationalists would have you spill your blood for them on the front lines, turning brother against brother over disputes that do not concern the working man! Instead of taking up arms against workers who struggle abroad, raise them against the oppressors and overthrow the tyrants!'\n\nThe army, usually a bastion of patriotism and loyalty, has proven not to be immune to the communist propaganda spreading rapidly in [Root.GetName]. Soldiers are deserting, refusing to fight for their country, sometimes going as far as joining partisan movements that claim to be preparing for revolution."
 political.5.a: "Perhaps they are merely fighting for a different [Root.GetName]."
 political.6.t: "The [GetMonth] Revolution"
 # 6-10 unused
 political.11.t: "Supremacist Assault Divisions Form"
 political.11.d: "The political and the martial have always been intertwined in supremacy. In parallel with its growing political movement, supremacist parties have begun to form paramilitary organizations to protect against both internal and external threats, the internal threats being their political opponents. Although many [Root.GetRaceMembers] find this development worrying, the wave of militaristic furor has led to an increased amount of volunteers joining our armed forces.\n\nThe political leaders of the movement have pointed out that their opponents have reason to be afraid. Having the army permeated on several levels by so explicitly political elements, the enemies of [Root.GetName] and the enemies of supremacy are beginning to look very much alike."
 political.11.a: "Only traitors to the country have anything to fear."
 political.12.t: "The Threat of Communism"
 political.12.d: "'[Root.GetLeader] would have you believe [Root.GetName] stands safe and united. It is no surprise such lies have poisoned the minds of our [Root.GetRaceMembers], when a snake is coiled up next door! Look no further than across our border to see countrymen having turned on each other in the name of communism, declaring the end of nations. How long until they declare our nation dead as well? Will the [Root.GetRulingParty] protect us from this threat?'\n\nThe growth of the supremacist movement in [Root.GetName] has been bolstered by the proximity of the communist revolution. Many moderates who might normally dismiss supremacy as another misguided ideological experiment find this to be a very real concern for them as well. Given the choice between the communism of our neighbors and a supremacist regime, they would admittedly prefer the latter. They might even be willing to actively support it."
 political.12.a: "We will be the vanguard against the red threat!"
 #13-14 unused
 political.15.t: "Harmonic Opposition Forming"
 political.15.d: "Relaxing the restrictions on what sort of anti-[Root.GetRulingParty] propaganda can be spread publicly has, predictably, lead to an increase in public expressions of dissent. Organized demonstrations and pamphlets are so far found mostly in academic institutions and some of [Root.GetName]'s more unfortunate areas, but there is little doubt that the movement is spreading.\n\nThe nation's leaders are torn over the issue. [Root.GetLeader], who maintains an iron grip on party leadership, has little desire to diversify public debate. The first steps have already been taken, however, and there may be no turning back."
 political.15.a: "The movement appears to grow naturally in the absence of repression."
 political.16.t: "Public Call for Elections"
 political.16.d: "The demonstrations of public dissent which were once confined to limited areas are now widespread. While [Root.GetRaceMembers] gather in the streets, the [Root.GetRulingParty] finds itself at a crossroads. If we continue allowing this propaganda to spread, the referendums suggested both from within the party itself as well as the opposition may show that we do not have the support of the public. The unity we have strived for is giving way to a plurality of opinions, united against us."
 political.16.a: "Even if reform is happening, we must show our strength by suppressing this defiance."
 political.16.b: "Let the [Root.GetRaceMembers] be heard."
 political.17.t: "Public Election in [Root.GetName]"
 political.17.d: "As freedom of expression and assembly have grown to become increasingly accepted in [Root.GetName], the faction within the [Root.GetRulingParty] calling for holding elections has gone from secret conspirators to publicly supported reformers. Despite [Root.GetLeader]'s protests, the country has been making a slow but steady move towards harmony for the past months and an election now seems like the natural next step.\n\nHowever, far from all [Root.GetAdjective] citizens are in favor of harmonic reforms. There is still debate within the party regarding whether to wait holding the election until we can ensure a stable development."
 #17 unused
 political.18.t: "Supremacists Demand Referendum"
 political.18.d: "The rapidly growing [Root.GetAdjective] supremacist movement has never claimed that they need majority support before they seize power, counting on uniting the nation under their leadership once their rule is established. However, it seems their public support has grown rapidly. Many supremacists are now calling [Root.GetLeader] a hypocrite, claiming to represent the wishes of the [Root.GetRaceMembers] while in reality turning a deaf ear to the masses.\n\nThe call for a referendum has been dismissed as typical attempts at disrupting the system by [Root.GetRulingParty] members so far, but at least it's a political measure. If we do not act now, the supremacists may choose the violent struggle as a better path to power."
 political.18.a: "Suppress this hateful movement!"
 political.18.b: "Don't pay any attention to them."
 political.18.c: "If the [Root.GetRaceMembers] want it, we'll hold the referendum."
 political.19.t: "Communists Demand Referendum"
 political.19.d: "Marksist ideas took root in [Root.GetName] a long time ago, but have gained much more widespread support lately. The movement has spread outside political theory and into political practice, with disgruntled workers and even some high-profile celebrities voicing support. The communists call this class consciousness. The [Root.GetRulingParty] call it a fast track to riots and treason.\n\nShowing little faith in [Root.GetLeader] being willing to implement the reforms they demand, the more vocal communists have called for an immediate referendum to have the current government removed. While we might be able to reverse the momentum of this mass movement, failure to do so will doubtlessly result in the more popular communist method of removal: Revolution."
 political.19.a: "Un-[Root.GetAdjective] activities must be stopped!"
 political.19.b: "Ignore them, they're just causing trouble."
 political.19.c: "The referendum is preferable to a bloody revolt."
 political.20.t: "Democrats Demand Referendum"
 political.20.d: "Unsurprisingly, the idea of the [Root.GetRaceMembers] ruling the nation they inhabit can easily grow very popular among the [Root.GetRaceMembers]. The [Root.GetRulingParty], of course, sees the idea of harmony as represented by these movements - freedom of speech, public elections, free press - merely populist rhetoric meant to weaken [Root.GetLeader]'s government.\n\nHowever, there is no denying those ideas have taken hold among the [Root.GetAdjective] population. In true harmonic fashion, they call for a public referendum on replacing the current regime. Although currently easy to ignore, these ideas have a way of growing very persistent. What will happen to us if we make peaceful revolution impossible?"
 political.20.a: "Round them up."
 political.20.b: "Just proceed as usual."
 political.20.c: "If we accept the referendum, perhaps we can preserve our legacy."
 political.21.t: "Supremacists March on [Root.Capital.GetName]"
 political.21.d: "Having been refused their referendum, almost a token attempt at seizing power legally, the supremacists have used their significant public support and connections in the [Root.GetAdjective] military to attempt a coup. The [Root.GetRulingParty] government has refused their terms and claims it is going to fight to the end to preserve [Root.GetName] as we know it."
 political.21.a: "We will stop them at any cost!"
 political.21.b: "The supremacists carry the true spirit of [Root.GetName]!"
 political.22.t: "Communists Rise Up"
 political.22.d: "After their request for a referendum was denied, the few reformers of the communist movement in [Root.GetName] rapidly lost influence to the more radical elements. With the [Root.GetRulingParty]'s refusal to acknowledge the public support for the suggested reforms, the romantic view of the revolution gradually grew more widespread and the leaders of the movement become those who could most easily start a riot. Those riots have now erupted into a full-scale civil war, with the future of the nation at stake."
 political.22.a: "We won't allow them to ruin our country!"
 political.22.b: "The fire of the revolution must be extinguished with the blood of the oppressors!"
 political.23.t: "The [Root.GetAdjective] Spring"
 political.23.d: "After their attempt at a public referendum to institute harmony was refused, the [Root.GetRaceMembers] behind the suggestion have dismissed the [Root.GetLeader] regime as incorrigible. A broad coalition of rebel groups, united by their common goal of instituting more representative political systems in [Root.GetName], have taken up arms and announced that they will not rest until the [Root.GetRulingParty] is overthrown."
 political.23.a: "Spare us from this mob rule!"
 political.23.b: "At long last, [Root.GetName] is free!"
 political.24.t: "Supremacists Ridiculed"
 political.24.d: "The [Root.GetAdjective] [Root.GetRaceMembers]'s infatuation with nationalistic pride and attempts to revive the glories of the past appears to have passed. A rude awakening for its ardent supporters, whose uniforms, militaristic posturing and over-the-top speeches are now more commonly the subject of mockery than sympathies.\n\nOnce considered a threat to the [Root.GetRulingParty] power base, [Root.GetAdjective] supremacy is now increasingly seen as an absurd, extremist position and an attack on the most fundamental values of our nation, the very nation they claim to hold in such high regard. The word seems more suited as an insult than a political designation."
 political.24.a: "What a bunch of clowns."
 political.25.t: "Communist Fad Blows Over"
 political.25.d: "Many communists had predicted that [Root.GetName] was going to be the next nation to fall to the so-called international revolution, but after a few months of strikes and red flags in the streets, the movement seems to have died down. The working class, the supposed driving force of the revolution, has more pressing concerns than overthrowing [Root.GetLeader] and seem decidedly unimpressed with how well these revolutions have played out elsewhere. Meanwhile, the intellectuals who wrote passionate calls for slitting the throats of the oppressors have turned out to be surprisingly reluctant to instigate anything that might actually upset their comfortable lifestyle.\n\nTalk of the revolution will likely continue, whether over cheap beers or expensive wines, but it will likely be talk and nothing more."
 political.25.a: "What a bunch of hypocrites."
 political.26.t: "Harmonic Movement Goes Silent"
 political.26.d: "After a few months of loud opposition against [Root.GetLeader]'s regime, calling for public elections and more liberal laws on freedom of assembly and speech, the movement seems to have fallen apart. [Root.GetRaceMembers] now express more concern about the stability of [Root.GetName] if such reforms were to take place, with those who clamor for harmony being seen more as troublemakers than everything else.\n\nMore mysteriously, many of the leading figures of the movement appear to have gone missing or stopped their work suddenly. Perhaps some of them chose to go into exile when they saw the failure of their efforts. Regardless, the [Root.GetRulingParty] government denies all knowledge and involvement."
 political.26.a: "What a bunch of quitters."
 political.27.t: "[Root.GetLeader] Abandons Neutral Foreign Policy"
 political.27.d_fascism: "After [Root.GetRulingParty]'s recent rise to power, [Root.GetLeader] announced that [Root.GetName] would no longer keep its Neutral Foreign Policy.\n'The world has become tangled and complex. We are no longer safe on our own. We must stand with our supremacist partners against our enemies. If we do not choose a side, we will perish alone.'"
 political.27.d_communism: "After [Root.GetRulingParty]'s recent rise to power, [Root.GetLeader] announced that [Root.GetName] would no longer keep its Neutral Foreign Policy.\n'The world has become tangled and complex. This country has always stood on it principles and been ready to defend them. We are no longer safe on our own. Neutrality is no longer the safe haven it used to be and those who seek power in this world do not respect it. We must stand with our communist brothers against the powers that seek to oppress us. Against the bourgeois majority who wants nothing more than keep us down. If we do not take a stand, we will perish alone.'"
 political.27.a: "For the future of [Root.GetName]"
 political.28.t: "[Root.GetNameDefCap] Reunited"
 political.28.d: "The terrible civil war that has devastated our land draws to an end, and we have finally reached a political agreement. We now see eye to eye with our fellow [Root.GetAdjective]s, and together we will rebuild our great nation. The enemies that have sought to capitalize on our infighting must now face a united [Root.GetAdjective] state.\n\nThe new [Root.GetRulingIdeology] [Root.GetName] will never be divided again!"
 political.28.a: "United at last!"
