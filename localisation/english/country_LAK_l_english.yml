  LAK_aeron_gwyn_desc: "#TODO"
  LAK_leonida_cattaneo: "Leonida Cattaneo" # advisor + high command
  LAK_leonida_cattaneo_desc: "§YBorn§!: 4th June 970 in Wingpoli, Kingdom of Wingbardy\n\n§YBiography§!: The child of a Wingbardian officer, Leonida spent most of her early childhood travelling. Though easy to make friends, her father's regular transfers made it just as easy to lose them. In 979, her family finally settled somewhere: the island of Purrsia, her father being sent to the garrison as the island found itself freshly leased.\n\nThe start of the Falcor War in 985 suddenly forced them back to the mainland, her father mobilised. Fed with propaganda, Leo's fervour only grew, and desperate to contribute, she presented herself to the army in 987, providing fake papers. Whether fooled or desperate for cannon fodder, her fatherland would take her service, and after a meagre period of drill, she was sent to the front. Her quick thinking and just as quick trigger-talon awarded two medals in 988 alone. The next year, during the 3rd Battle of Asbolus Forest, Leo found herself alone in a failed charge, shellshocked. The memory from then was foggy, but she could remember a stranger with a peculiar accent carrying her. Spending the remainder of the war in a hospital, she refused her family's proposal to return to Purrsia with them, hoping to repay her debt to that kind stranger. Leo volunteered in a soup kitchen for veterans in Karthin, keeping herself useful and with a faint hope to see that griff again.\n\nAnd one fateful day, her wish came true: Alaric, a prince from far off lands currently travelling around with his merry band of companions. Though travelling had been a sour memory in the past, she had found an opportunity to travel with friends who'd always be there. Life within the band proved less than ideal, as while she quickly proved herself useful, the weight of her traumas only worsened with time.\n\nLeo eventually stepped back from fighting, and continued with Alaric all the way back to his home. She is more than happy to make herself useful; should her friend ask, she'd even return to the battlefield...\n\n...but is a life lived only for others truly worthwhile?\n\n§YPortrait By§!: ..."

    # Factions Characters
  LAK_ian_brynmor: "Ian Brynmor" # advisor
  LAK_ian_brynmor_desc: "#TODO"
  LAK_tristan_von_bryncopr: "Tristan von Bryncopr" # general + chief of army
  LAK_tristan_von_bryncopr_desc: "§YBorn§!: 21st September 937 in Rumare\n\n§YBiography§!: Grandmaster of the Barony's knights for over 30 years, Tristan has lived just as long in an independent Rumare as he had under the Empire, and with that much time, comes much experience. Tristan grew unlike what would be expected of a "proper" Rumarean, but the lifestyle many of the islands inhabitants had. A devout tritheist, he did not care much for politics or the quiet calls of independence from the fringe sectors of society, focusing more on his training as a squire. Tristan was knighted very young, and by the 970s, had already risen the ranks to become the youngest Grandmaster ever of the Barony's knights. Quickly becoming a steadfast shoulder to the Baron, Tristan found himself the young heir's swordplay, archery and chivalry instructor; a role he faced many difficulties due to Alaric's constant skipping out.\n\nWhen revolution shook the Empire, Tristan found himself stuck between two loyalties, to his Empire or his home. With the heir's disappearance, Tristan could not find it in his heart to abandon the Barony to slip into chaos, and alongside Ian and Recimir, kept it from being embroiled in disorder. With an independent Barony, came independence woes, and for Tristan that meant the lack of a proper military apart from his knights. Alongside Recimir, they created Rumare's standing military with knights as its generals, until a fitting conscript could join their ranks.\n\nThe rise of the radicals ensured many headaches, with their grand wishes to mobilise Rumare's small military into foreign ventures, and to make matters worse, Recimir passed, leaving only his wish for his son to succeed him. Tristan did not expect to ever see that wish come true, knowing of Alaric's less than noble exploits abroad, but was surprised when he and a ragtag group of knaves came to Rumare one night.\n\nNow, he finds himself attempting to reason with the new Baron and to keep the Barony's peace while he still stands, hopeful to not see it spiral into dishonour and chaos.\n\n§YPortrait By§!: ..."
  LAK_ancharista_passmore: "Ancharista Passmore" # advisor
  LAK_ancharista_passmore_desc: "§YBorn§!: 2th April, 964 in Rumare\n\n§YBiography§!: Merchant. Socialite. Fisher Baroness. Premier benefactor of the radical movement. Moderniser. These titles seem to have nothing in common, but they're all descriptors for Rumare's premiere fashion enthusiast and moderniser, Ancharita Passmore, sole inheritress of the Passmore business and fortune.\n\nBorn to the biggest fisher baron of Rumare, Ancharita grew up with no desire unfulfilled and an inheritance to guarantee she wouldn't need to work a single day in her life, would she desire that. While a Rumarean's riches would not translate into much fortune abroad, in the islands of the Barony her family's fortune was second only to that of the Dawnbreaker family itself. There had even been talks of her eventually marrying with the Baron's only son and securing an alliance between the two families. But it was not meant to be, as the Baron's only son fled Rumare at only 17, disappearing and leaving with no such prospects anymore. Ancharita, however, was never one to dawdle on ifs or buts, growing into more of a national celebrity by the day, her lavish lifestyle called the eyes of others to her new looks, technologies and friends from abroad.\n\nWith her father's death in the late 900s, Ancharita seemed to have had a change of heart. Inheriting the riches of the family, she quickly began to make herself known as more than just a socialite; raising many concerns to Baron Recimir and advocating for the reunification of Rumareans in the mainland and the islands, even becoming the top donator to the growing radical movement. Of course, this did not mean an end to her lifestyle, but it led to Ancharita becoming a public household name for more than just her bits, and now as a national figure calling for Rumare's industrialisation, reunification and renewal.\n\nWith the Baron's death and his son's return, Ancharita doesn't feel much about the could've beens, focusing on the future and making herself heard.\n\n§YPortrait By§!: ..."
  LAK_sianna_cadwgan: "Sianna Cadwgan" # general + chief of army
  LAK_sianna_cadwgan_desc: "§YBorn§!: 5th November 975 in Rumare\n\n§YBiography§!: Born the third daughter of the late Siân Cadwgan, a controversial, flamboyant, sulfurous Rumarean poet famous for her peculiar blend of ardent socialism and feverish irredentism, Sianna was shaped by her mother's education and poetry; embracing Rumarean culture, language and faith with restless zeal. However, as passionate as her writings were, the little griff could never find herself satisfied with her writings, always comparing herself to her mother's talent. In 993, her mother's death from an overdose of cheap absinthe pushed Sianna away from writing, though she never stopped being an avid reader.\n\nDesperate to help her fatherland and culture to survive, and unable to do so through words, Sianna chose to do so through arms by enlisting in the military. Much more talented on the field, Sianna quickly found herself a rising star in Rumare's nascent military, receiving the honours of being the first non-knightly general, a rank previously dominated only by knights previous to the formation of Rumare's standing military. Her enthusiastic nature, nationalistic fervour and passion for literature made her a particularly charismatic figure amongst the younger generations of the army.\n\nAscending to the rank of the nation's youngest general, she has become a central figure of the emerging Radical movement, becoming a quick companion to the merchant socialite Ancharita Passmore. Taking inspiration from the Aquileian MPA and Wingbardian Blackwings, Sianna has reconciled the conflicting values taught by her mother into her own form of nationalism guided by ideals of a strong, centralised and free nation.\n\nWith the ascendance of a new baron hardened from decades fighting abroad, Sianna has taken it as the opportunity to loudly champion her cause and advocate for a return to the mainland. For now, she awaits for her efforts to bear fruit, ready to grab any chance she can to see her home rise to glory once more.\n\n§YPortrait By§!: ..."
  LAK_frieda_griffin: "Frieda Griffin" # advisor
  LAK_frieda_griffin_desc: "§YBorn§!: 29th August 955 in Wohnsitz, Kingdom of Griffonstone\n\n§YBiography§!: The first child of a well-off Rumarean grocer and an Angriverian tax collector, Frieda lived a peaceful childhood in the coastal town of Wohnsitz. When she reached adulthood, her parents sent her to study at an university in Herzland, enrolling in a law course. Graduating in 976, Frieda moved to Griffenheim to find a good position within the imperial bureaucracy, as her parents wished.\n\nHowever, Frieda's degree only provided her with a miserable job in some obscure branch of the insignificant sub-department of a ministry she had never heard about. Her struggles to engage in Herzland's "workplace traditions" led her to rapidly be ostracised, and the mindless work occupied most of her days until 978. While initially supportive of the NRP, the chaos made her quickly leave Griffenheim, returning to her home to reunite with her parents, and from there she went to Griffonstone to look for job opportunities.\n\nThere, she ascended the ranks, and in the midst of the BRD's rise, caught the attention of a griffon tied to the Regency Council. Then barely 37, Frieda found herself offered the opportunity to become a mayor of her hometown, and while at heart she knew she was seen either as a pawn to calm her people or as a scapegoat to take a bullet for Griffonstone, she could not see her home war-torn. With whatever budget she had, Frieda fought issues that had plagued the town for years at that point, becoming quite popular among the populace and even around the other local towns. Although she had faced some attempts on her life during her early days, with time those too stopped.\n\nWith the coastal regions being reunited with the Barony of Rumare, Frieda sees their internal political tensions alongside the BRD's own goals as a recipe for disaster. While not much of a nationalist, she may yet quickly become a valuable advisor for the Baron, hoping to ensure both islanders and mainlanders remain at peace and that no outsider values be imposed in her people.\n\n§YPortrait By§!: ..."

