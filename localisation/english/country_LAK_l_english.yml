  ### Focuses ###
  LAK_save_what_can_be_saved: "Save What Can Be Saved"
  LAK_save_what_can_be_saved_desc: "Alaric has made his choice, Rumare can not return to what it once was, but he can still save what yet remains."
  LAK_focus_on_business: "Focus On Business"
  LAK_focus_on_business_desc: "In order for Rumare to survive we must build up an economy, and a way to do this is to attract business investment, we will try to get the rich griffons of the world to bring all there shiny factories here."
  LAK_cultural_schools: "Ysgolion Diwylliannol"
  LAK_cultural_schools_desc: "In order to secure our language we must make sure it remains being taught in schools. Every single school in our nation will be held to the highest standards of education, and will receive extra funding if they can achieve a high rate of learning. For we must ask that great question of endangered nations. If our children do not learn, who lives, who dies, who tells our story?"
  LAK_dual_languages: "Linguistic Pluralism"
  LAK_dual_languages_desc: "In order to secure our place in the world we must embrace the pragmatic use of language. We will make Imperial Griffish a secondary language of the state, and allow people to speak Aquileian or Wingbardian as well if they so please."
  LAK_protect_our_land: "Defend What Is Left"
  LAK_protect_our_land_desc: "Now that we have begun to develop our home we must now turn to the defense of our nation, forts shall be constructed in order to alleviate the burden from our military, to ensure the rest of our nation never falls."
  LAK_a_defensive_army: "Purely Defensive"
  LAK_a_defensive_army_desc: "Rumare must hold what we still have. We shall reform our limited royal guard into a national guard capable of at least defending our shores from those who would threaten our nation and culture."
  LAK_jewel_of_the_lake: "Tlys y Llyn"
  LAK_jewel_of_the_lake_desc: "Huzzah! We have yet saved face in the preservation of our culture, we have at least slowed or possibly even stopped the Ruiniad. We can now boast our own culture once more and can look forward to further improvements on our island."
  LAK_economic_hotspot: "The Griffonian Tax Haven"
  LAK_economic_hotspot_desc: "The Baron has recently had dinner with a rich Imperial investor who proposed a deal to Alaric, he would finance a new tourist industry in Rumare if only the Baron would slash the corporate tax rate. And he assures us he has friends who would be just as grateful."
  LAK_welcome_the_diaspora: "Welcome the Diaspora"
  LAK_welcome_the_diaspora_desc: "When the Empire rose under Grover I, we were some of the first to be subjugated. The Rumarean people endured for long, but soon the destruction of our culture and the abuse of our land began to push citizens away. We can now begin to reverse this process by showing our people that Rumare is once more prosperous and free!"
  LAK_a_safe_haven: "Sefydliad Brawdoliaeth Ddiwylliannol y Rumare"
  LAK_a_safe_haven_desc: "The Duke has now begun to argue for the creation of the Rumare Cultural Fraud Institute, a government system that will vet all Immigrants to Rumare and grant preference to ethnic Rumareans, it will also have a cash fund to support education and minor welfare for these new immigrants as well, this shall surely increase the flow of Griffons to our Barony."
  LAK_we_are_still_here: "Yma o Hyd!"
  LAK_we_are_still_here_desc: "The world must not forget Rumare! We are still here and still... well we aren't strong really. But we can still fight for our people! Gwrthsefyll a brathu fy nghyfeillion!"
  LAK_realpolitik: "What Must Be Done"
  LAK_realpolitik_desc: "While we have decided we must restore our nation we have not quite decided how to do that yet. While avid nationalists wish to go on a crusade to reclaim our land, more pragmatic Griffons at court would have us bide our time for when the moment may be more suited, and possibly join a greater power in order to get back our birthright."
  LAK_subisides_families: "Encourage Large Families"
  LAK_subisides_families_desc: "One of the causes of Rumarean decline was the simple fact there were not enough Rumarean Griffons. We must make sure this never happens again by offering tax incentives and state encouragements for Griffons to have more children then they previously would have been able to."
  LAK_support_businesses: "Support Local Businesses"
  LAK_support_businesses_desc: "One way to preserve Rumarean culture is to preserve its native laborers. We can provide incentives for the hiring of native Rumareans both on our island, and maybe even some to draw in Laborers from across the pond to Griffonstone... "
  LAK_investors: "Attract Foreign Investors"
  LAK_investors_desc: "We can set up a slight loophole in our law code to allow companies to set up Rumarean branch offices for them to gain access to our new tax breaks, provided they only provide jobs to good hardworking Rumareans that is."
  LAK_the_cultural_bund: "Frenhines Ddiwylliannol"
  LAK_the_cultural_bund_desc: "Rumarean exists as a unique cultural anomaly in the world, and this can be used to our advantage. Since unlike the Imperials the Aquileians or the Wingbardians, we have no outstanding cultural battles with others around us, or at least we lost the ones we started... But besides that point, because of this we can make ourselves a home of diplomacy, conferences, summits and treaty dinners alike!"
  LAK_use_the_diaspora: "Summon the Diaspora"
  LAK_use_the_diaspora_desc: "It is now time to strike a call to arms for Rumareans across the world, that soon the ancestral lands shall be free, and that they must return to prepare for that day. With our newly refurbished economy and diplomatic ties, we know that we can make the dreams of these exiled citizens come true!" 
  LAK_a_patron: "Better to Serve..."
  LAK_a_patron_desc: "It is all at a head now. In order to regain our land we must sign treaties with those who we know can help us to get it back. Unequal or not we shall be reunited with our people, and this is truly the goal."
  LAK_our_language: "To Save a Culture"
  LAK_our_language_desc: "First thing's first. We must ensure that our culture stays afloat and that the Ruiniad will not come about!"
  LAK_determined: "A Blaze of Glory"
  LAK_determined_desc: "No! We shall heed no calls for moderation! We must now strike at those oppressors who hold the land of our forefathers in shackles of blood and steel! The Baron has called upon all loyal Rumareans to resist those who would hold us down, and to prepare for the eventual day of reckoning."
  LAK_call_in_the_favours: "Call in Some Favors"
  LAK_call_in_the_favours_desc: "The Baron's old days as a Mercenary will finally help his Barony out, as he has gotten in touch with an ethnic Rumarean living in Karthin, who says he can get us weapons for our liberation. It may not be much, but any guns are more to shoot at the slaveholders in Griffonstone"
  LAK_the_free_rumare_army: "Byddin Rhyddid o Rumare"
  LAK_the_free_rumare_army_desc: "The response to the Baron's call have been at the very least shocking. We have received countless letters from ethnic Rumareans held in the Griffonstone territories who have declared their willingness to fight for their freedom. We must begin to organize these resistance fighters into an official network lead by actual officers. And one day they will be able to fight!"
  LAK_a_few_gaps: "A Couple of Gaps"
  LAK_a_few_gaps_desc: "Even while the Baron's friend was able to supply our standing army with arms at first, his efforts have been shifted to ensuring the success of our liberation. And so the Baron has taken up the initiative to build up a larger domestic arms industry to be ready for the war to come."
  LAK_and_some_missing_funds: "And Some Misplaced Funds"
  LAK_and_some_missing_funds_desc: "Many of the highest citizens of our nation do not yet agree with our path of reclamation, even some of the citizens are against it. In time they will see, but for now we must squire funds for our war in an... unorthodox fashion."
  LAK_the_spark: "Light the Fuse"
  LAK_the_spark_desc: "The time is now and the day is here. We must now begin our war of reclamation for our ancestral homes and be ready to pay whatever cost it may take to win them back.\n\nNever forget. Never surrender."
  LAK_home_sweet_home: "Rumare Am Byth!"
  LAK_home_sweet_home_desc: "We are now reunited with our homeland and it is time to get to work. Along with restoring our national pride we have been able to seize research centers and industrial production which will help immensely with the battle to come.\n\nBecause now we just have to hold on to what we got from the tyrants."
  LAK_repair_the_shrines: "Repair the Shrines"
  LAK_repair_the_shrines_desc: "The Imperial deities Boreas and Eyr were forced onto us by the great scourge Grover I, and he stole from us our god Arcturius. We must set things right for our people."
  LAK_spread_the_language: "Spread the Language"
  LAK_spread_the_language_desc: "Lands we have inherited once more are corrupted by the Griffish dialect and have been under the control of Griffish speakers for far too long. Our language is spoken even less here then on our island, this must change!"
  LAK_recall_the_diaspora: "Recall the Diaspora"
  LAK_recall_the_diaspora_desc: "Glory to Rumare! For now since we hold our land once more we can invite our diaspora communities to settle in the mainland territories, this will go a long way to reintegrating them as well."
  LAK_almost_heaven: "Yr Eryr Wen Dros Eincartref"
  LAK_almost_heaven_desc: "It is now time for the Baron to fulfill his oath. He once pledged that he could not set forth in what the oppressors called *The Residence* until it could truly be called Rumarean once more. Today is the day."
  LAK_a_proper_army: "Ry'n Ni Yma o Hyd"
  LAK_a_proper_army_desc: "We have now restored our native land, and with it we have inherited its freedom fighters. We shall use these veterans, combined with our established officer corps to forge a New Rumaran army capable of defending our new state. Byddin wedi'i bedyddio gan dân."
  LAK_never_again: "Er Gwaetha Pawb a Phopeth"
  LAK_never_again_desc: "With our army set we can get them to work on the Baron's great project. If we are to hold our new lands then we must assure the fact that they are defended, to accomplish this a network of fortifications and preparations for another resistance war have been made, and shall assure the defense of our mainland."
  LAK_cultural_institute: "The Cultural Preservation Society"
  LAK_cultural_institute_desc: "In regaining our land we have also once more come into possession of ancient cultural artifacts hidden throughout the nation. By opening a new university to study these and other aspects of our old culture we can kill two unicorns with one stone and enhance our research and resurrect our culture further."
  LAK_support_rumarean_businesses: "Repatriation Programs"
  LAK_support_rumarean_businesses_desc: "The Industry and commerce of our new lands have been controlled by foreign industrial tyrants from Griffenheim and Griffonstone for far too long. We can further encourage immigration and growth by returning to the native Rumarean people what are rightfully their land and profits."
  LAK_the_rebirth: "Ry'n Ni'n Barod Am Doriad y Wawr!"
  LAK_the_rebirth_desc: "Oh glorious Rumare, we stand ready to fight for thee, through bloody day, and chilling night we never abandoned thee, for now the dawn comes on another bloody day, but today shall not be the day of our blood, but of those who would have made us bleed."
  
  LAK_industry_technology: "The Jewel Of The Lake"
  LAK_industry_technology_desc: "Rumare was once a treasured jewel of Griffonkind, and home to the great people of Rumare. With his affairs in order, Alaric is now focusing on making Rumare the precious jewel it once was."
  LAK_support_fishing_industry: "The Lifeblood Of Rumare"
  LAK_support_fishing_industry_desc: "Rumare's fishing industry supplies fresh food to the duchies in the heartland, the Aquileians to the west and to Wingbardy to the south, the lake is by far the largest commercial industry we have and we must ensure it's continual growth."
  LAK_protectionist_policies: "Officialise Workers' Rights Legislature"
  LAK_protectionist_policies_desc: "In the past, the workers of Rumare have had a few rights and favorable dealings with industry, though on the whole, this has never been formalized. Doing so now will help to draw more workers, and keep our quality and capability on the up and up."
  LAK_construction_schemes: "The Village Expansion Act"
  LAK_construction_schemes_desc: "While, of course, land is always at a premium on the island on the lake, we probably still have room for new Rumarean villages to settle on the shoreside, if we can attract them to do so."
  LAK_trade_offices: "The Rumare Chamber Of Commerce"
  LAK_trade_offices_desc: "Rumare has, historically, never been all that centralized, despite the small amount of land available to it. However, with Alaric's return, he seeks to change that. A centralized chamber of commerce is a good first step towards doing such."
  LAK_invest_in_tourism: "Invest In Tourism"
  LAK_invest_in_tourism_desc: "While some notables have expressed their confusion towards Alaric's plan of opening Rumare up to tourism. However, Alaric's response was a simple one: a burgeoning tourist industry will keep people's opinions of Rumare high, and give would-be invaders some pause before attacking possibly their own civilians."
  LAK_domestic_oil_industry: "Shale Oil"
  LAK_domestic_oil_industry_desc: "While not exactly a conventional method of producing oil, Shale Oil production is the only easy means for Rumare to obtain oil, at the moment, and thus must be exploited for all it's worth."
  LAK_invest_in_the_people: "Invest In The People"
  LAK_invest_in_the_people_desc: "Alongside his economic reforms, Alaric also has made a point of expressing the necessity of investing into Rumare's citizens as well. By instituting a national education program, we can more than just invest in our people, but raise them to new unknown standards of living."
  LAK_economic_prosperity: "A Prosperous Little Nation"
  LAK_economic_prosperity_desc: "With plenty of time to institute all his reforms, Alaric has rebuilt Rumare's economy from the ground up. Bringing the Rumarean people into unheard of prosperity, ready to face the challenges of the new world before them."
  
  LAK_new_era: "The Reconstruction"
  LAK_new_era_desc: "With our lands back under our control many griffons thought everything was done. But no. From walking and visiting towns, villages and cities through our ancient lands, and from reports from other griffons around him, Baron Alaric has decided there is still much to be done."
  LAK_expand_subsidy: "Expand the Family Subsidy"
  LAK_expand_subsidy_desc: "Our policy of promoting family growth has been a tremendous success back in Rumare. Now, faced with the situation in the mainland, the Baron has decided to expand the program to cover more griffons, and expand education enrollment."
  LAK_new_railroads: "Laying the Foundations"
  LAK_new_railroads_desc: "Due to the economic collapse caused by the Empire's fall, the state of the infrastructure in our recovered territories is pitiful and underfunded. To remedy this, the Baron has ordered the construction of a new railroad line connecting Eincartref, Bryncopr and many other larger towns and villages in Rumare."
  LAK_more_oil: "Oil on the Lakeside"
  LAK_more_oil_desc: "While drilling for a new water well, griffons in the small village of Treson near Bryncopr have discovered oil supplies on our new province! Further exploration has revealed that the oil reserves in the island also expand to the mainland. We should start exploiting this as soon as possible."
  LAK_new_techniques: "New Drilling Techniques"
  LAK_new_techniques_desc: "In order to fully exploit the potential of our newly discovered oil fields, as well as the already existing ones, we should invest more into modern drilling and excavation techniques. Foreign experts can be brought in and the government has already destined some funds for a group of enterprising griffons willing to found a hidraulics company."
  LAK_steel_mill: "Eincartref Steel Mill"
  LAK_steel_mill_desc: "Recently a group of industralists have come forward to Baron Alaric, and proposed him the construction of a steel mill near our own capital. Not only it would give work to hundreds of Rumareans, but also increase our own self-sufficiency in industrial and military matters. The Baron has agreed and put the construction of the mill at the highest priority."
  LAK_land_reform: "Land Reform"
  LAK_land_reform_desc: "From Griffonstone we have inherited a confusing mess in terms of land availability, rights and overlaps. A commission shall be set towards reforming the farmlands, giving priority to Rumarean settlers and diaspora."
  LAK_free_healthcare: "Social Welfare"
  LAK_free_healthcare_desc: "The welfare state is a relatively new concept, where the state takes the responsibility to provide for its citizens. This has been mostly a sphere of the Temples through most of history, but Alaric now believes its time to establish a caring state in Rumare, providing public services and benefits and complementing the already existing education act and family subsidies. We'll have to raise some taxes, but its worth the cost."
  LAK_cooperate_with_unions: "Expand Union Cooperation"
  LAK_cooperate_with_unions_desc: "With the worker's legislation officialized, many of Rumare's unions supported our government's efforts. Now, we can propose a win-win deal with them and the existing ones in Eincartref and the Stone Highlands, where we can help them draw more workers into their membership in exchange for their ever-continuing support."
  LAK_rebuild_the_capital: "Renovate the Capital"
  LAK_rebuild_the_capital_desc: "Our new capital of Eincartref, while grand, suffered from the many effects of social and economic depression caused by the deep crisis in Griffonstone. No more! Alaric has decreed that Eincartref will be rebuilt in a mix of modern and old Rumarean styles, symbolizing the rebirth of Rumare and his traditions in this new age."
  LAK_canned_fish: "Bryncopr Canned Fish"
  LAK_canned_fish_desc: "The small city of Bryncopr sits at a strategic position in our nation: its in a location where it can connect to Verenia to the north-west, southwards to Griffonstone; Eincartref and South Griffonia, and to the north to the Herzland. Thus, we have decided to build a new railway complex and fish cannery in the city to help our fishing industry; the lifeblood of Rumare."
  LAK_refinery: "Highlands Refinery"
  LAK_refinery_desc: "We have discovered a further source of oil in the hills of Stone Highlands, and a number of industrialist diaspora Rumareans have told Alaric about the possibility of building a refinery in the region; with the help of blueprints 'adquired' from Wingbardy."
  LAK_economic_heaven: "Live in Prosperity"
  LAK_economic_heaven_desc: "Hurrah! We have done it. \n\nThe Reconstruction has ended, and the recovered lands of Rumare are rapidly achieving the same standard of living as the island themselves. We can now consider this a job well done, and dream of a blissful future for Rumare and his people..."
  
  LAK_focus_on_defence: "To Serve And Protect"
  LAK_focus_on_defence_desc: "Our army has for decades been a force for the defense of the Rumarean people. Alaric sees no reason to change that, and has thus ordered his small cadre of officers to pursue this line of thought in regards to planning for battle."
  LAK_focus_on_offence: "Fire And Brimstone"
  LAK_focus_on_offence_desc: "In the past, our army was solely a defensive one. However, Alaric's experiences as a mercenary have shown him that defense is not always the best way to go. As such, he has begun to teach his generals the might of modern weapons, such as artillery, and the machine gun. Something that will change the way Rumare wages war forever."
  LAK_fortify_the_islands: "The Recimir Line"
  LAK_fortify_the_islands_desc: "Named after Alaric's father, the departed Baron Recimir Dawnbreaker, the new Recimir line will be a testament to the defensive prowess of Rumare. With new, and modernized fortifications making land invasion even more unfeasible than in the olden days, and interlocking firing positions ready to reap a toll on any besieger."
  LAK_local_armouries: "Local Armouries"
  LAK_local_armouries_desc: "If we are to be able to properly defend ourselves, we must be able to readily manufacture our own weapons, rather than rely on foreign imports all the time. As such, Alaric has provided some rather nice subsidies to anygriff willing to develop a new armaments concern in Rumare."
  LAK_build_air_defences: "Clear Blue Skies"
  LAK_build_air_defences_desc: "If we are to keep Rumare safe, we must also take into account the modern invention of the aircraft. Though we don't necessarily have any suitable weapons to defeat such vehicles, we can easily import a few batteries to keep our skies safe from enemy planes. Rumare will have nothing but clear blue skies in it's future."
  LAK_focus_on_recruitment: "Every Soul Counts"
  LAK_focus_on_recruitment_desc: "If we are going to keep our defenses strong, we must make sure that every available soul capable of firing a weapon serves at least some sort of military service. To this end, we will offer good wages to draw in conscripts, and make use of some 'less than polite' conscription methods to bolster our forces as necessary."
  LAK_old_friends: "Old Friends"
  LAK_old_friends_desc: "In the past, Alaric Dawnbreaker made a living for himself amongst several griffon mercenary bands roaming the continent. Though he is now the leader of Rumare, he still has access to some of his contacts, and can draw on their expertise to train his own army- for the right price, of course."
  LAK_old_connections: "Underground Contacts"
  LAK_old_connections_desc: "Aside from his mercenary contacts, Alaric has a few... less than legal contacts in the weapons smuggling line of trade. Whilst not really that dependable or respectable, we can still make use of them once or twice so as to bolster our army's available equipment, thereby taking pressure off our weapons manufacturers."
  LAK_invest_in_new_rifles: "Modernise The Equipment"
  LAK_invest_in_new_rifles_desc: "While our old equipment is still usable, and will going forward still be available for use by our home defense units, we should make strides to modernize our rifles and cannons, so as to have a technological edge over any future enemies we may have."
  LAK_newest_artillery_pieces: "Import Imperial Artillery Pieces"
  LAK_newest_artillery_pieces_desc: "The Imperial artillery corps is considered one of the best equipped and drilled artillery teams on the Griffon continent. We should both make use of their technical expertise and their impressive technologies themselves."
  LAK_train_officers: "Secondary Combat Roles"
  LAK_train_officers_desc: "Something that should be taught to Rumare's generals, so as to keep up with the changing, modern battlefield, are the secondary combat roles. While not direct combatants themselves, logisticians and planning boards are important to any present-day military, and should be both respected and made use of."
  LAK_focus_on_training: "Quality Over Quantity"
  LAK_focus_on_training_desc: "While having hordes of troops at our command can be considered a good thing, it is Alaric's professional opinion as a former mercenary himself that a few well-trained griffons with better equipment and drills can hold out more readily against the poorly trained peasant masses, and the Rumarean military agrees with his assertion."
  LAK_nationalist_fervour: "Nationalist Fervour"
  LAK_nationalist_fervour_desc: "With our military reformed and ready to fight, we should drum up our national fervor, and instill a sense of pride into the Rumarean people and military. Who knows, we may even get more volunteers out of it, in the end."
  LAK_airforce: "The Wawr Airstrip"
  LAK_airforce_desc: "While the aeroplane is a relatively new technology, and though most of our citizens are capable of flight, Alaric has expressed his intentions to build Rumare's first Aircraft specific airstrip, for use in future military endeavours."
  LAK_acquire_fighters: "Acquire Fighters"
  LAK_acquire_fighters_desc: "Rumare itself has no aircraft industry yet, though there is no reason we can't import a few craft and begin looking into new designs."
  LAK_acquire_bombers: "A Few Old Bombers"
  LAK_acquire_bombers_desc: "Though Rumare has never looked into a bomber aircraft before, there is no reason not to, now that Alaric has built his airstrip. We can begin by importing a few older designs from abroad, and adapting them for our own use."
  LAK_formal_airforce: "Create The RAF"
  LAK_formal_airforce_desc: "Named the First Rumarean Air Force by Alaric, these wildcat pilots comprised of former mercenaries, expatriates, and daring Rumarean military personnel are fervent in their defense of their homeland of Rumare, and always looking for new and improved ways to defend it."
  LAK_radar_station: "Adopt The RADAR"
  LAK_radar_station_desc: "An invention from abroad, the RADAR system will be invaluable to both our pilots and anti-aircraft guns in defending Rumare, making it possible for them to locate enemy fighters long before they arrive in our airspace. As well, the system may have uses on the ground that we can explore further."

