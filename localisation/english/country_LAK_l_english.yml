### Ideas & Dynamic Modifiers ###
  LAK_ruindad_dm: "Ruiniad"
  LAK_ruindad_dm_desc: "Ruiniad or the Ruination is a term coined by Rumarean scholars to describe the gradual decline of the Rumarean language, culture and traditions.\n\nNo griffon is quite certain how or when it started, but the cultures more predominant in the Griffonian Empire have started to eclipse the native traditions. Some theorized this is due to immigration and simple convenience in international trade. Regardless of the cause, the numbers speak for themselves, as barely 30% of Rumare's population still speak their native language. Even the most optimistic academics predict it is but matter of time until our culture goes truly extinct and the Ruiniad is complete."
  LAK_army_dm: "Gwarchodlu Cenedlaethol"
  LAK_army_dm_desc: "Rumare's royal guard has been reformed into a new national guard to defend Rumare and his citizens from any foreign threats.\n\n#TODO\nTranslation: National Guard"
