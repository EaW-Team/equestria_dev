  LAK_factions_dec_cat_desc: "As any proper Rumarean does, both §5Moderates§! and §tRadicals§! wish to see Rumare's native lands reunited. However, they largely differ on the methods and public positioning.\n\nThe §5Moderates§!, represented by Recimir's close advisors, believe that Rumarean nationalism should adapt to the new realities, slowing down the §GRuiniad§! and focusing inward. For the last few decades, this has meant distancing themselves of any bolstering about reclamation, but should the situation change, they will adapt to the calls of the Baron.\nMeanwhile, the §tRadicals§!, represented by a newer generation, want to turn the clocks of §GRuiniad§! fully backwards. They are supportive of reuniting with the mainland through any means, having been supportive of the §RFree Rumarean Army§! and their efforts to tear down Griffonstonian rule.\n\nAs both factions fight for freedom of their people, they can cooperate with each other and temporarily put aside disagreements for Rumare's benefit. But once their common enemy is gone, or any faction achieves high enough influence, people will start dreaming of future they deserve - §Gbut does everyone want the same future§!? One thing is certain:"
