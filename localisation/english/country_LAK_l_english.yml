### EVENTS ###
  rumare_first_act.1.t: "The New Baron"
  rumare_first_act.1.d: "Alaric paced back and forth on the deck of the small boat crossing the misty lake. His father was dead and he must return home to take charge of Rumare himself. His income as A mercenary had been one of the primary sources of income for Rumare and had accounted for 26% of total revenue marked as *Birthday Gifts* in the Barony's ledger. But that was not the only thing that worried him. For he was in outlaw in Griffonstone, and he was on the edge of legal status in Arantiga from which he had taken this boat. And it took the last coins in his pocket to get a port guard to look the other way.\n\nBut at last he saw something, a shape, a ship is taking form on the horizon... he readied his weapon but soon saw something unusual, the ship simply threw down a rope, of which his transport tied to their bow, and then began to slip into the haze. He was safe now. But now the question of how to rule...\n\nHis father had always dreamed of bringing the lands of the Rumarean people back under his wing, but as he saw the conditions of his home as he slipped into the harbor under cover... he seriously considered turning his back on those ideas.\n\nWhat is a Griffon to do?"
  rumare_first_act.1.a: "Yma o Hyd!"
  
  rumare_first_act.2.t: "The Return of the Diaspora"
  rumare_first_act.2.d: "Today thousands of native Rumareans would step back on Rumarean shores again. And there will soon be many more!"
  rumare_first_act.2.a: "Welcome home!"
  
  rumare_first_act.3.t: "The Rumarean Language Act"
  rumare_first_act.3.d: "By decree of his majesty the Baron of Rumare and all Rumareans in diaspora he decrees,\n\nAll government texts in Rumare shall be written in the language of the fathers.\nAll public signs made by the state shall be in, exclusively Rumarean.\nAll of those in the Barony who can not speak Rumarean shall be provided an opportunity to, failing to accept will result in a fee.\nAnd most importantly. All children are banned from having the name "Grover""
  rumare_first_act.3.a: "Yma o Hyd..."
  
  rumare_first_act.4.t: "The Free Rumare Army"
  rumare_first_act.4.d: "There are many ethnic Rumareans living in the Residence and Stone Highlands. They usually don't cause any trouble but this has changed recently with the formation of the Free Rumare Army, a organisation which claims to be fighting for a independent Rumarean nation. The formation of the FRA has coincided with the bombing of several government facilities in the Residence and Stone Highlands that has caused significant damage. More worryingly is the discovery of several weapons caches in a raid by the army on a FRA hideout. It seems the FRA is also preparing for a full scale uprising.\n\nWhile we have been unable to track down the source of funding for the FRA. Many are suspecting the Barony of Rumare to be the ones smuggling weapons and funds to the FRA. However without any solid evidence we cannot do anything. The only thing we can do is wait for them to strike first."
  rumare_first_act.4.a: "Terrorists the lot of them!"
  
  rumare_first_act.5.t: "Fisher Barons"
  rumare_first_act.5.d: "Many fishergriffs see our support for the industry as the actions of a government that actually appreciates the work of the common griffon and we have gained the grudging approval of several prominent Fisher Barons who have ensured suitable 'protection' for their new friends with the understanding of what our new 'soldiers' will do if our support wavers."
  rumare_first_act.5.a: "All of this over fish?"
  
  rumare_first_act.6.t: "The Gníomhaireacht Míntírithe Talún Delivers"
  rumare_first_act.6.d: "The Agency of Land Reclamation has recovered a sizeable area of land from the lake, most of it will go to housing and a new pub but we can easily fit a factory in what we have left over."
  rumare_first_act.6.a: "How about the Sea Breeze Tavern?"
  
  rumare_first_act.7.t: "Darcy's Drunken Pony"
  rumare_first_act.7.d: "During the night a pony from the Federation stumbled out of Darcy's Pub and Grill and spent the morning screaming racial epithets at everyone she met before passing out on a bench she had vomited over. She was quickly arrested but her actions have caused quite the uproar in the community. She will be deported after a short trial, but her actions will be discussed between pub patrons and politicians alike."
  rumare_first_act.7.a: "Maybe Wingfried was right?"

