### CHARACTERS ###
    # Country Leader(s)
  LAK_alaric_dawnbreaker: "Alaric Dawnbreaker"
  LAK_alaric_dawnbreaker_desc: "§YBorn§!: 16th October 961 in Rumare\n\n§YBiography§!: Alaric never knew his mother, who died while giving birth to her only child. As such, the boy was almost entirely raised by his father Recimir, who never remarried. A sharp and athletic grif, Alaric rapidly became an astute fighter, often training with common soldiers during his teens.\n\nIn 978, the revolution shocked the Empire. Alaric, barely 17 and already burning with revanchism, left his small baronny to attempt to bring the Empire to its end against his father's wishes, for Recimir feared the loss of his only heir.\n\nAlaric's activism - some loudmouths would say terrorism - caused him and his fellow fighters to be hunted out by the surviving Imperial government. Eager for some more action, the young griff assembled an eclectic mix of adventurous few into a group of fearsome mercenaries, serving whoever pays the most, often both sides, and sending the near totality of their revenues to his homeland.\n\nAs such, Alaric spent the next three decades roaming the continent, from the horrors of the Falcor War to the untamed steppes of Gryphia. Though some of his original companions reached eternal peace one by one, their bodies equally buried under the red poppy fields of Aquileia and the Creeper mountains, Alaric made a thousand more connections : Pridean republicans, Macawian pirates, Wingbardian nationalists, Lakeish guild masters, even a few zebras from Coltva, and many others. Alaric recruited a clawful of them into his merry group, weaving the undying bonds warriors share.\n\nNotified of his father's death in September of 1006, Alaric made his way home with a few of his most loyal friends, often avoiding the sight of governmental authorities.\n\nHaving barely returned from his long exile, the new Baron of Rumare is certain of one thing : soon enough, everyone will remember his people.\n\n§YPortrait By§!: Egil"
  LAK_rumare_peoples_council: "Rumare People's Council"

    # Alaric Group
  LAK_zahid_zaragoz: "Zahid Zaragoz" # advisor + high command
