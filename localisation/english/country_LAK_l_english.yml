    # Second Act #
  rumare_second_act.1.t: "Recovering our Lands"
  rumare_second_act.1.d: "Alaric sat at the desk of his new home in Eincartref. The new capital of Rumare. \n\n And the new home of the Rumarean people. \n\nBut was it a happy home, or a decrepit one? Of course, Rumare itself had avoided most of the troubles which plagued Griffonia's nations after the Empire collapsed. But the Barony's new lands, the ones on the mainland, weren't so lucky. Chained to Griffonstone, perhaps the part of Griffonia most hit by an entire generation of societal collapse, the areas of Eincartref and the Stone Highlands suffered greatly. It was when he saw the fourteenth illiterate chick, the fourteenth destitute family, that he knew he had to make Rumare's ancient lands as prosperous as the island itself, Arcturius give him strength. \n\nFor the Rumarean people, for his father's memory, and for many of his ancestors before him, he had to do it."
  rumare_second_act.1.a: "There is so much to do."

  rumare_second_act.2.t: "Capital Question"
  rumare_second_act.2.d: "#TODO"
  rumare_second_act.2.a: "Stay on the island"
  rumare_second_act.2.b: "Return to the mainland"

    # Alaric's Adventures #
  rumare_adventures.1.t: "Adventure Note 1" # Leaving Rumare (Snow)
  rumare_adventures.1.d: "Today, I, Alaric Dawnbreaker, have left my home, much to Father's displeasure.\n\nEver since news arrived of the revolution, our abode has been a mess, with all the meetings Father barely has a moment to himself, listening more to that old statue Tristan than me. I have been as adamant as I could about my desire to take advantage of the Empire's fall, but father simply refuses to budge. He has already decided our Barony is too fragile to get involved, and thankfully, he says, "too small to be a priority", hoping that whatever happens in Herzland will simply not spill over to our home. I did not have father's view of the situation and knew he would never give his blessing for what I have decided to do, so I took some of my, let's say, future inheritance to fund these endeavours.\n\nIn the dead of night, I helped Aeron, Owen, Dyl and a few others companions slip into the manor unnoticed, where we took as much gold and jewellery as we could fit in our bags. I had already told them of my plan to go aid the revolution and ensure the Empire would never again subjugate our people, and they were all determined to see it through. Bags filled, we went to the harbour and set sail up to the northern coast of the lake.\n\nWe spent a good while toasting and singing (I had my first ale and I believe I masked my reaction to its grainy taste rather well), and decided to call our group the "Band of the Lake" in reverence to our home. Aeron wished for a name that would strike fear, but the others laughed him down to all of his suggestions (to ensure he doesn't decide to stab me while I sleep if he ever reads this, I will not be noting those down).\n\nNow they've all gone to sleep, besides me, and soon the sun will rise, with Rumare illuminated by a new tomorrow as dawn breaks. I feel bad for leaving without a word to father, but I am sure I'll see him again soon, and when I do, I'll repay what I owe him in double, in gold and in pride."
  rumare_adventures.1.a: "OK"

  rumare_adventures.2.t: "Adventure Note 2" # After Revolution (Goupil)
  rumare_adventures.2.d: "Many had warned us, yet I still stand in disbelief after several weeks. Kemerskai and his clique of cowardly "commanders" are fleeing somewhere to the North, Cloudbury I presume. The crew and I have already bled too much for this farcical revolution that hardly deserved it.\n\nDespite the imperials' best efforts, we have managed to find refuge in a swamp somewhere in Greifenmarschen, I believe near Nortfome. Scratch that, Lloyd says it's Oldwingburg. The place is quite unpleasant and we're nearly starving, but the nearby forests should hopefully provide. Some of us, myself included, are starting to miss our homeland. However, we have agreed not to return until we have paid off our collective debt. Furthermore, I have even convinced a few former revolutionaries to join us. It seems we aren't the only ones disillusionned by Kemerskai's flight. That said, I must admit I am a bit at a loss as to what to do next. We cannot stay in Herzland because of the counter-revolution, so it would surely be wise to head south or west. Perhaps towards northern Aquileia. With a bit of luck, we might find a reasonably stable way to make a living.\n\nA republican we just met says his great uncle owns a farm up the river, on the other side. He argues he can get us employed. Though some are doubtful, especially Aeron, this is our only chance for now. I need a more peaceful interlude after the fires of the revolution. It was quite the adventure, some would say, and I have seen too much for my liking. His staring eyes are haunting my dreams. Aeron argued that is the kind of events separating chicks from grifs.\n\nSo we are breaking camp as early as sunrise and, Arcturius willing, we should get there by this week-end. Should the farmer be unable to provide an opportunity, surely we can find something else. When you hit rock bottom, you can only go up !"
  rumare_adventures.2.a: "OK"

  rumare_adventures.3.t: "Adventure Note 3" # Aquileia 1 (Snow)
  rumare_adventures.3.d: "This last year of roaming has worn the band's spirit thin, and I admit, I was also failing to keep it together. Aquileia's border provinces are teeming with unrest, and there is no village we visit that is not struggling with famine or disease. It is a land straight out of a nightmare, and job opportunities are not much better. Here and there we find work as escorts or debt collectors, but the lack of good pay means no money going back home and barely enough money to keep ourselves alive. I expected mutiny, and I wouldn't have blamed them, but thankfully we had only lost a few heads these last few months.\n\nAeron did not say anything before he acted, but when I saw him come back to camp beaming with a wagon behind him, I think I knew it would come to this eventually, especially with the recent breakdown in order with the monarchy packing their bags and revolution coming here too. I confronted him as soon as I got a moment to speak with him in private, and he confirmed the whole story: a lightly defended wagon and some heavily forested road, taking it was as easy as stepping on and riding away, he recounted all with a smile on his face. Part of me wanted to be angry, but the gold in that wagon means I can send something home at last and make sure my head isn't on a pike anytime soon, so I just gave him a light tap and sent him away back to the drinking and dancing.\n\nSoon enough we'll have paid off my debt, and I'll be able to go back home, we just gotta keep it up for a while longer."
  rumare_adventures.3.a: "OK"

  rumare_adventures.3_2.t: "Adventure Note 4" # Aquileia 2 (Goupil)
  rumare_adventures.3_2.d: "Sometimes, I fear becoming too reliant on Aeron, yet his acumen for quick and efficient profit remains unmatched to me. He just found a great opportunity which should bring enough funds to finally solve our common due. Something about pillaging some Count's manor in Westkeep, uninhabited since the Aquileian revolution yet intact, for now. I have not looked at the details yet, but it seems highly promising. Rumare, here we come!"
  rumare_adventures.3_2.a: "OK"

  rumare_adventures.3_3.t: "Adventure Note 5" # Aquileia 3 (Goupil)
  rumare_adventures.3_3.d: "May Arcturius forgive me, for I cannot do so myself. That bloody manor was supposed to be devoid of life. Empty! Why in Tartarus didn't that senile croot of an aristocrat just give us what we came for?! And of course Aeron blundered straight into action, shooting first and asking questions later. Am I not supposed to be the band's leader ? I gather my instuctions were clear. Damn lucky he is to be my friend, otherwise I would have punched him multiple times. Obviously, it went from bad to worse, for that fool's confidence wasn't without substance. A nearby monarchist militia spotted the chaos and sent us flying away, our tail between our legs.\n\nThe flight to Pomovarra was painfully chaotic. Worst : the news of our actions seem to have spread, as the locals are being excessively wary of us. Though I cannot blame them. I would be too. Though moral is overwhelmingly low within the band, the need to survive pushes us forward. More precisely southward, since Wingbardy is recruiting soldiers en masse : rumors indicate a conflict is brewing between them and Falcor. Some classic, normal military job will probably be more stable than whatever petty banditry we committed in these later years. I just need to forget what we did : what happened in Westkeep stays in Westkeep."
  rumare_adventures.3_3.a: "OK"

  rumare_adventures.4.t: "Adventure Note 6" # Falcor War 1 (Snow)
  rumare_adventures.4.d: "After that whole debacle, I thought getting the band an actual job would have been a good change of pace, and for the travel over to Wingbardy, it seemed that's all it'd be. Arcturius, how wrong I was. It explains the willingness they had for any new meat. This war has barely been going on for two months, and they're already at a stalemate. Stalemate usually means to rest and recuperate, but the geniuses over at Wingbardy and Falcor seem to have had the same idea: dig down and keep throwing bodies at each other until one side breaks.\n\nWe've been stuck in the same rotten-smelling trench, knee-deep in mud at all times (it's so bad it even makes you want to willingly wear pants). One would imagine the fighting to be dynamic, but we are only allowed to take off in flight when the local commander allows it, and often it ends up in an order to march across the body-riddled "no-griff's land", as they're beginning to call it. Mostly, days are spent taking pot-shots at the other trench, too afraid to put your head too high.\n\nThe band is getting tired quickly, but it's not as simple as taking flight and leaving. We've got a contract to upkeep and money to be made, and I don't want to resort to banditry soon if I don't need to. We should just focus on getting as good a night of sleep as we can and hope tomorrow doesn't mean a suicidal charge. If the worst comes to pass, I believe we'd be able to deal with the commander here and flee somewhere else to lay low. Killing is the one thing that'll always be in demand, after all."
  rumare_adventures.4.a: "OK"

  rumare_adventures.4_2.t: "Adventure Note 7" # Falcor War 2 (Snow)
  rumare_adventures.4_2.d: "No-Griff's Land is the last place one wants to be in here, but it's so often the grave of many a soldier. Today was no different from those other days, but something got into me during the battle. It happened when the orders to retreat were given after a failed advance, and I noticed some chick (certainly not of age to be fighting yet) stranded alone in a shallow hole made by artillery. Either she had no friend to speak of, or whatever companions she had had already retreated or joined the corpses strewn across that barren place.\n\nI don't know what came over me, but I screamed for the others to cover me and ran towards her. The shivering little thing could barely look up even while I screamed at her to go, so I had to grab her and fly as best as I could back into the trenches (more so just throwing myself than any decent flight). When she finally looked up, her eyes were full of tears, they were just like\n\nI threw myself back into the field and helped with the band retreat. They got Aeron in one of his wings, and he's been complaining about it since. Didn't see the chick again, hopefully she gets leave soon and uses the chance to stay far away from this place. Those who can't take a life won't be able to save their own somewhere like this."
  rumare_adventures.4_2.a: "OK"

  rumare_adventures.4_3.t: "Adventure Note 8" # Wingbardy Post-War (Goupil & Snow)
  rumare_adventures.4_3.d: "This morning (well, more like afternoon), I found myself waking up in some alleyway with the worst hangover I have ever experienced. My clothes resembled rags and reeked of a blend of liquor, vomit and unidentified organic rot (the latter I gather from the pile of trash I slept on). To put a cherry on top of my shameful state: my stomach was as empty as my wallet, due to some misplaced bets and promises made at the tavern last night.\n\nAs such, I roamed Karthin's streets, the sun hurting my eyes. I was not the only one roaming around, the war did quite a toll and has doomed many griffs to roaming, begging and/or drinking; a life we may soon find ourselves replicating if we do not leave for work soon. I was eventually stopped by a griffon I had briefly met a few weeks before, some journalist named Giulio. Thankfully, he seemed to remember me too, and we quickly kicked off a conversation and engaged in some jabs at his government's indifference toward its own veterans, which I could not agree more. He either had no sense of smell or was enough of a gentlegriff to not mention it.\n\nSo, he brought us to a soup kitchen organised by a few of his friends from some party, but I must admit my mind had drifted as soon as I got the first smell (unlike him, I still do have it). Strangest thing was, while waiting in line, a chick approached me (despite my horrid appearance). She introduced herself as Leonita and told me I had saved her life in the trenches a few years back, insisting on repaying her debt. When I mentioned the band her eyes gained new light, and she practically begged me to accompany us. I could never say no to a pretty face, and told her she'd be more than welcome as long as she got me someplace to shower, which she happily obliged.\n\nShe seems to have kicked off well enough with the band as of now, but I do hope she's gotten a better hang of herself since the war."
  rumare_adventures.4_3.a: "OK"

