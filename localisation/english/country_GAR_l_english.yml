#Initial Tree Final
 GAR_initial_event_final.0.t: "Campaign's Finale"
 GAR_initial_event_final.0.d: "TODO: (The/Almost a year) has passed from the start of the Golian's campaign, now everyone are gathering in front of the main building of the council of clans to hear the speech from the king. He did a lot this year to earn gargoyles trust etc etc. He stands in front of the public, preparing to speak."
 GAR_initial_event_final.0.a: "And now, the speech begins..."

 GAR_initial_event_final.1.t: "The Public Cheers!"
 GAR_initial_event_final.1.d: "TODO: Golian is successfully showcased that he is capable to be the king of the Gargiloya. Gargoyles cheer and enjoy his speech, everyone are happy except a couple of faces standing in the shadows. Demonia and Garik couldn't succeed and now all they can do is to go in the shadows to hide... But at the end of the speech, there is another announcement."
 GAR_initial_event_final.1.a: "Button"

 GAR_initial_event_final.2.t: "...But It Was Not Enough."
 GAR_initial_event_final.2.d: "TODO: Golian gets to the podium and starts his speech, but no one cheers, he still failed to make his campaign to show the people that he is capable. Even worse, people look unpleased, annoyed even. But it's not for long, since soon Nightstone guards comes to seize Golian. He is confused to why this is happening, but then everything becomes clear when Demonia steps behind the podium. She starts her speech saying that the country finally will be stronger without a coward king in charge, glaring at the Golian who is being dragged away. The public is partially happy and cheers, but not the Wyvern and Stonewing clans. Garik on the other hand, nowhere to be seen, he is making sure he will be the next king of this country."
 GAR_initial_event_final.2.a: "Button"

 GAR_initial_event_final.3.t: "...But Something Doesn't Feel Right."
 GAR_initial_event_final.3.d: "TODO: Golian goes to the podium, but everyone looks... Scared? He is confused for a moment, looking around and being a bit nervous himself. There is nothing strange or threatening it seems, but something is still feels off. But not even a moment after, his own guards seize him in front of everyone. He sees that Dragar is here, in charge of the royal guard, looking serious, but somewhat pleased at the same time. It makes Golian even more confused, since he trusted Dragar to lead the army, but now his own army takes him to jail... There is no speech, no ones get to the podium, but everyone knows that now they need to wait and see what's awaits them next."
 GAR_initial_event_final.3.a: "Button"

 GAR_initial_event_final.4.t: "...But There Is Unease Among The Public."
 GAR_initial_event_final.4.d: "TODO: Golian gets to the podium and starts his speech, but no one cheers, he still failed to make his campaign to show the people that he is capable. Everyone looks unsure and confused, but then the guards are called for Golian. A moment later, he is seized by the Nightstone guards, hauled away. At his place stands Demonia, but no one is still happy, they look suspicious or as before confused. This makes Demonia a bit mad at the people around. She delivers not the greatest speech there can be, sometimes even accusing gargoyles of being too soft and weak to do anything. At the end there is still silence, Garik is nowhere to be seen and clans are unhappy with the outcome, but they still need to choose someone to rule after all."
 GAR_initial_event_final.4.a: "Button"

