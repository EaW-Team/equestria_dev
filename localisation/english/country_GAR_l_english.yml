### EVENTS ###
#Initial Events
 GAR_initial_event.0.t: "Raindrops in Their Gown"
 GAR_initial_event.0.d: "The sound of raindrops was the only sound echoing in Mahamerdz's room. They were lying down, as they spent most of these last few weeks; their health having taken yet another turn for the worse. It had been steadily chipping away at them, but the respect and authority they commanded in Gargiloya were insurmountable; none dared to confront the ailing monarch, not even as the clan meetings counted with their presence less and less, with only their spouse as their representative.\n\nEven by the side of their bed, Golian remained upright and respectable; a brooding nature he had carried since his youth. Many believed him uncaring, but Mahamerdz loved their husband all the same. They had prepared so many words to tell him at this moment, but his trembling hand told them he already knew what they wished to ask of him.\n\n"They... will come to respect you... as they have me." Their voice was weak, but still carried the strength that had brought such prosperity to Gargiloya. "You... are so much... more than they think..." A wracking cough escaped their throat, hacking away at their composure. Golian quickly offered a glass of water, which they lightly pushed away, steadying themselves.\n\n"Mahamerdz, please, you must not exert yourself." He set the cup down. "Perhaps it would be best if you go back to resting."\n\n"Then... let us speak of it no more." Mahamerdz simply smiled. "Yet... this may be one of the last times we speak as freely as this..." They slowly began to open their arms. Golian's expression began to falter. He took a step closer to their bedside, and then another, lowering himself to their level. Gently, he laid his face upon their chest as he knelt beside the bed."
 GAR_initial_event.0.a: "The two embraced as the stoic gargoyle wept."

 GAR_initial_event.1.t: "Something Needs To Be Done"
 GAR_initial_event.1.d: "TODO: Golian's spouse died, funeral has ended and some time passed. Mow he is in charge... However, most are unhappy. The country already was on the edge when the monarch got suddenly sick, but now there are rumors that it's Golian is to blame. But Golian still wishes to prove himself, so he calls for the clans meeting for the discussion of what he can do for other clans and people."
 GAR_initial_event.1.a: "It's time to begin."

 GAR_initial_event.2.t: "A Helping Hand"
 GAR_initial_event.2.d: "TODO: Golian meets with Arvesti to ask her to help him in his journey. She gladly accepts, even if she understands how hard it will be with all the public outrage. But she is always happy to help, especially her cousin."
 GAR_initial_event.2.a: "Thank you, Arvesti."

 GAR_initial_event.3.t: "Talking in the Shadows"
 GAR_initial_event.3.d: "TODO: Demonia calls Garik for the meeting. He is smug since out of nowhere the mighty warrior Demonia needs his help. She herself if pretty unhappy with this need, but they still have a talk. While Demonia thinks Garik will help her get the throne, he has his own thoughts about that, but for now he will just nod and smile, accepting this 'alliance'."
 GAR_initial_event.3.a: "Sure, Demonia, I will help you."

 GAR_initial_event.4.t: "Unexpected Resistance"
 GAR_initial_event.4.d: "TODO: It's a clan meeting time... Well it's the last hour of it where tension goes out of control. Demonia argues with Golian's ideas and his overall position as monarch now, since he was a coward who let yeti invasion happen without any resistance except Nightstone clan taking it in their own hands. Garik just agrees with Demonia to make more pressure on Golian. Arvesti trying to calm them down, but nothing works."
 GAR_initial_event.4.a: "Let Golian prove himself!"
 GAR_initial_event.4.b: "I can't believe in the coward!"

#Initial Golian Events
 GAR_initial_event_golian.1.t: "Who Lives" #2
 GAR_initial_event_golian.1.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech to once more thank the clans to allowing him a chance to keep their partner's legacy alive. The mood is sour but the clans can't help but respect his forwardness"
 GAR_initial_event_golian.1.a: "Button"

 GAR_initial_event_golian.2.t: "Who Dies" #1
 GAR_initial_event_golian.2.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech on the horrors of war. On how many lives it had claimed, on how many crumbled during it, on how his own partner was taken from him, with the stresses of war helping their decline. He vows to fight to ensure peace for Gargoyles. The mood is sour but the clans can't help but respect his forwardness"
 GAR_initial_event_golian.2.a: "Button"

 GAR_initial_event_golian.3.t: "Who Tells Your Story" #8
 GAR_initial_event_golian.3.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech on how they must keep on going, even with all their loss. He goes on depth about his partner's condition and how he wishes to keep their legacy alive. The mood is sour but the clans can't help but respect his forwardness."
 GAR_initial_event_golian.3.a: "Button"

 GAR_initial_event_golian.5.t: "A Moment at the Study" #7
 GAR_initial_event_golian.5.d: "TLDR from Snow: Thought of two possible events. One where it's Golian rummaging through a library alone, when another wyvern notices him there and decides to help/not bother him or another where Golian meets with Wyvern and Stonewing mages to assist his studies."
 GAR_initial_event_golian.5.a: "Button"

 GAR_initial_event_golian.6.t: "Friends in İlkşehir" #4
 GAR_initial_event_golian.6.d: "TLDR from Snow: Golian either meets with Karuk directly (this would need for her to be guaranteed not couped in the first year) or watches as centaurs come to assist with reconstruction. Either way, this event should showcase his hope for centaur and gargoyle relations to stay strong."
 GAR_initial_event_golian.6.a: "Button"

 GAR_initial_event_golian.8.t: "Commissioning High" #11
 GAR_initial_event_golian.8.d: "TODO "Stonewing busying themselves with doing stuff that gains them even more popularity amongst the public, but leads to them having less time for other works" "
 GAR_initial_event_golian.8.a: "Button"

 GAR_initial_event_golian.9.t: "A Reconcilement Gala" #14
 GAR_initial_event_golian.9.d: "TODO Arvesti having fun until she is being uproached by Demonia then Garik and she is trying hard to avoid em both while trying to have fun and rest, later she finds peace in the group of artists who hid her from all of those conversations and let her properly enjoy the gala."
 GAR_initial_event_golian.9.a: "At least the party went well."

 GAR_initial_event_golian.10.t: "A Shared Surplus" #13
 GAR_initial_event_golian.10.d: "TLDR from Snow: Arvesti tries to convince some of their generals that to ensure Gargiloya is safe, they should share their surplus of weapons with clan Wyvern. This surplus could probably be stuff from the Storm King's invasion period, to showcase how they were resisting. This event could be from the perspective of Arvesti or a general."
 GAR_initial_event_golian.10.a: "Button"

 GAR_initial_event_golian.12.t: "Stockpiling Materials" #5
 GAR_initial_event_golian.12.d: "TLDR from Snow: This event could be from Alos's perspective as him and a mining crew (could be senshi's mining crew, the dunmeshi gang or just generics) go deeper into the mountains to search for more materials, as Arvesti has made it clear that they require everything right now. Event could end with Alos finding something great and his group thinking it's a rich vein, but it's actually just a mushroom he's been looking for for ages."
 GAR_initial_event_golian.12.a: "Button"

 GAR_initial_event_golian.14.t: "Thanking their Service" #10
 GAR_initial_event_golian.14.d: "TLDR from Snow: This event has Golian giving awards to Nightstone soldiers. Make him give each of them a medal directly, there is a moment of unspoken tension as he gives Demonia her medal, she just smirks as he leaves to go back to his speech,"
 GAR_initial_event_golian.14.a: "Button"

 GAR_initial_event_golian.15.t: "Defense, not Offense" #6
 GAR_initial_event_golian.15.d: "TLDR from Snow: A Wyvern general is doing a mock battle against Nightstone soldiers. The wyvern is on defense while nightstone is on the offence. The Nightstone think this is gonna go swimmingly, but get outmaneuvered at every turn by the Wyvern's tactics. They get humiliated and a bit pissed off, but showcases how Wyvern generals aren't pushovers"
 GAR_initial_event_golian.15.a: "Button"

 GAR_initial_event_golian.16.t: "Peacetime Demobilization" #12
 GAR_initial_event_golian.16.d: "TLDR from Snow: Golian is arranging for demobilization as Demonia comes to chastise him and demands for him to call back the order. Golian stands his ground and says that there is no war to worry and the yetis are still fighting themselves, a moblized army only means that gargoyle society takes even longer to rebuild. Demonia grumbles but knows he's right, she leaves pissed."
 GAR_initial_event_golian.16.a: "Button"

 GAR_initial_event_golian.17.t: "Shaking Claws With Traders" #9
 GAR_initial_event_golian.17.d: "TLDR from Snow: Golian shakes claws with Garik, ensuring a profitable deal between the Wyvern and Blackbeard clans. Garik is all smiles during the meeting and Golian believes this has gone well, but the mood is weird."
 GAR_initial_event_golian.17.a: "Button"

 GAR_initial_event_golian.18.t: "Closing Roads" #3
 GAR_initial_event_golian.18.d: "TLDR from Snow: Garik goes to plead for Golian to open the roads again as he had a profitable deal up north to camel lands that may be risked if this keeps on. Golian stands his ground and says that due to the many conflicts happening in the region, the borders are being temporarily closed until his speech at the end of the year, incentivizes Garik to use his efforts to assist the common folk. Garik leaves mumbling about how he'll show Golian how much he'll help the common folk"
 GAR_initial_event_golian.18.a: "Button"

 GAR_initial_event_golian.20.t: "Dragar's Reform of the Army" #15
 GAR_initial_event_golian.20.d: "TLDR from Snow: Golian meets with Dragar to formally ask for his assistance. He admits he is an outsider to the Wyvern clan and that he is sure 'other' gargoyles may not like him, but he wishes to work together with Dragar to showcase to the clan his willingness to work together with the whole clan. Dragar is composed and agrees to assist Golian, but unbeknownst to Golian, this was just the influence Dragar needed to consolidate his coup plans"
 GAR_initial_event_golian.20.a: "Button"

#Initial Coup Events
 GAR_initial_event_coup.1.t: "Voice People's Concerns" #2
 GAR_initial_event_coup.1.d: "TLDR from Snow: In a meeting of the clans, Demonia voices how the Wyvern clan had surrendered when the yeti invasion was happening, leading for them to fighting off invaders alone. This boost the perspective of her clan, but also unnerves the clans due to their already fragile situation"
 GAR_initial_event_coup.1.a: "Button"

 GAR_initial_event_coup.2.t: "Honor the Fallen" #1
 GAR_initial_event_coup.2.d: "TLDR from Snow: In a meeting of the clans, Demonia voices how the fallen must be honoured due to their brave sacrifices during the war. This boosts her own clan as they took the brunt of the loss, but also unnerves the clans as they remember the bloodshed of war."
 GAR_initial_event_coup.2.a: "Button"

 GAR_initial_event_coup.4.t: "Ensure the Stockpiles are Ready" #3
 GAR_initial_event_coup.4.d: "TLDR from Snow: Event could be from the perspective of Demonia or a Nightstone general as they ensure their stockpiles are ready in the case the clan is prepared for whatever comes next."
 GAR_initial_event_coup.4.a: "Button"

 GAR_initial_event_coup.6.t: "Forges Rumble for War" #7
 GAR_initial_event_coup.6.d: "TLDR from Snow: The forges are going into overdrive. More guns are needed to ensure their position, but this is either being done by Nighstone blacksmiths who are less accustomed to this than Stonewings, so there's a certain loss of quality and prestige. Or their loss of influence comes from their mounting up requests for more and more guns."
 GAR_initial_event_coup.6.a: "Button"

 GAR_initial_event_coup.7.t: "Let Workers Rest" #6
 GAR_initial_event_coup.7.d: "TLDR from Hiro: Garik lets workers take the rest from the work for a while to gain more influence from the worker class. He succeeds with gaining their respect and praises, but some factory and construction work stalls because of that."
 GAR_initial_event_coup.7.a: "Button"

 GAR_initial_event_coup.8.t: "Blackbeard Trade Fuels Your Home!" #12
 GAR_initial_event_coup.8.d: "TLDR from Snow: Event from a common garg as they gain a foreign toy for their birthday. Their parents are very happy they could have gotten this for such a cheap deal and are thankful to the merchants. This scene is repeating all over the nation, but is stretching Blackbeard connections."
 GAR_initial_event_coup.8.a: "Button"

 GAR_initial_event_coup.10.t: "Money Buys All" #14
 GAR_initial_event_coup.10.d: "TLDR from Snow: Garik goes to meet another industrialist. It can be a Stonewing, Yeti, Centaur or whatever, the big point is it showcases a bit of his scummy nature and him willing to pay as much as needed to ensure a loyal factory for future use."
 GAR_initial_event_coup.10.a: "Button"

 GAR_initial_event_coup.11.t: "Loyalty, for a Price" #11
 GAR_initial_event_coup.11.d: "TLDR from Snow: Garik goes to meet with Golian without Demonia's blessing. They exchange some pleasantries and some deals are made for Blackbeard benefit, claws are shaked and the nation is a bit more stable, but at the expense of some Blackbeard respect"
 GAR_initial_event_coup.11.a: "Button"

 GAR_initial_event_coup.12.t: "Remember Who You Are!" #8
 GAR_initial_event_coup.12.d: "TODO"
 GAR_initial_event_coup.12.a: "Button"

 GAR_initial_event_coup.13.t: "Unity at Least in Name" #4
 GAR_initial_event_coup.13.d: "TLDR from Snow: Demonia goes to meet Golian and they shake claws in a public setting. This serves as a stabilizing showcase to the public, Golian is smiling but Demonia is pissed to even be doing this with someone she despises."
 GAR_initial_event_coup.13.a: "Button"

 GAR_initial_event_coup.15.t: "Boycott Clan Meetings" #9
 GAR_initial_event_coup.15.d: "TLDR from Snow: A meeting of the clans is clearly missing the entire Nightstone delegation. It could be made so that Blackbeard also did, but I think it'd be funny if a Blackbeard representative is there, either with the rest of their clan or alone, due to not getting the memo. The mood is clearly very tense and this character wishes they also weren't there"
 GAR_initial_event_coup.15.a: "Button"

 GAR_initial_event_coup.17.t: "Friends not Forgotten" #10
 GAR_initial_event_coup.17.d: "TLDR from Snow: Demonia goes to meet with Arvesti. They exchange a lot of half words, none fully committing to admiting what they know or think they know. Demonia hints at Arvesti joining their cause, Arvesti hints their loyalty to Golian and that they should give up whatever they're trying. The meeting ends with a deal being made, not one to betray Golian, but just a regular commission, no feelings involved. Demonia wants them by their side but respects the hustle."
 GAR_initial_event_coup.17.a: "Button"

 GAR_initial_event_coup.18.t: "Too Busy With Comissions" #5
 GAR_initial_event_coup.18.d: "TLDR from Snow: Garik goes to meet with Arvesti to make yet another comission. Arvesti says they couldn't possibly accept, but Garik hints at a very big payoff if they get it done. Arvesti sighs and begrundgigly accepts it, leading to more members of the clan to be muddled with Blackbeard commissions."
 GAR_initial_event_coup.18.a: "Button"

 GAR_initial_event_coup.19.t: "Never Another Storm King!" #13
 GAR_initial_event_coup.19.d: "TODO "Speeches glazing themselves for resisting and being racist against yetis""
 GAR_initial_event_coup.19.a: "Button"

 GAR_initial_event_coup.20.t: "Equal Your Odds" #15
 GAR_initial_event_coup.20.d: "TLDR from Snow: Clan meeting goes to hell as Demonia says something she shouldn't have. It devolves into a full on shouting match by each clan leader, but it gets so out of hand that it grows into something bigger than just that clan meeting and to all clans losing public trust. The nation is in a harsh position as all factions have lost public trust."
 GAR_initial_event_coup.20.a: "Button"

#Initial Tree Final
 GAR_initial_event_final.0.t: "Campaign's Finale"
 GAR_initial_event_final.0.d: "TODO: (The/Almost a year) has passed from the start of the Golian's campaign, now everyone are gathering in front of the main building of the council of clans to hear the speech from the king. He did a lot this year to earn gargoyles trust etc etc. He stands in front of the public, preparing to speak."
 GAR_initial_event_final.0.a: "And now, the speech begins..."

 GAR_initial_event_final.1.t: "The Public Cheers!"
 GAR_initial_event_final.1.d: "TODO: Golian is successfully showcased that he is capable to be the king of the Gargiloya. Gargoyles cheer and enjoy his speech, everyone are happy except a couple of faces standing in the shadows. Demonia and Garik couldn't succeed and now all they can do is to go in the shadows to hide... But at the end of the speech, there is another announcement."
 GAR_initial_event_final.1.a: "Button"

 GAR_initial_event_final.2.t: "...But It Was Not Enough."
 GAR_initial_event_final.2.d: "TODO: Golian gets to the podium and starts his speech, but no one cheers, he still failed to make his campaign to show the people that he is capable. Even worse, people look unpleased, annoyed even. But it's not for long, since soon Nightstone guards comes to seize Golian. He is confused to why this is happening, but then everything becomes clear when Demonia steps behind the podium. She starts her speech saying that the country finally will be stronger without a coward king in charge, glaring at the Golian who is being dragged away. The public is partially happy and cheers, but not the Wyvern and Stonewing clans. Garik on the other hand, nowhere to be seen, he is making sure he will be the next king of this country."
 GAR_initial_event_final.2.a: "Button"

 GAR_initial_event_final.3.t: "...But Something Doesn't Feel Right."
 GAR_initial_event_final.3.d: "TODO: Golian goes to the podium, but everyone looks... Scared? He is confused for a moment, looking around and being a bit nervous himself. There is nothing strange or threatening it seems, but something is still feels off. But not even a moment after, his own guards seize him in front of everyone. He sees that Dragar is here, in charge of the royal guard, looking serious, but somewhat pleased at the same time. It makes Golian even more confused, since he trusted Dragar to lead the army, but now his own army takes him to jail... There is no speech, no ones get to the podium, but everyone knows that now they need to wait and see what's awaits them next."
 GAR_initial_event_final.3.a: "Button"

 GAR_initial_event_final.4.t: "...But There Is Unease Among The Public."
 GAR_initial_event_final.4.d: "TODO: Golian gets to the podium and starts his speech, but no one cheers, he still failed to make his campaign to show the people that he is capable. Everyone looks unsure and confused, but then the guards are called for Golian. A moment later, he is seized by the Nightstone guards, hauled away. At his place stands Demonia, but no one is still happy, they look suspicious or as before confused. This makes Demonia a bit mad at the people around. She delivers not the greatest speech there can be, sometimes even accusing gargoyles of being too soft and weak to do anything. At the end there is still silence, Garik is nowhere to be seen and clans are unhappy with the outcome, but they still need to choose someone to rule after all."
 GAR_initial_event_final.4.a: "Button"

#Choose Your Clan Tree
 GAR_chooseyourclan_event.1.t: "The Might of the One Wyvern"
 GAR_chooseyourclan_event.1.d: "TODO: Even with Dragar's help, Golian has failed his duties, and now he will feel the consequences for that. The proud soldier will never let anyone taint their clan with such a disgrace from the outsider. And seeing how others are even more incompetent with their attempts to seize the throne, Dragar will take this place himself, to show everyone how a true ruler of the gargoyle lands should lead its people."
 GAR_chooseyourclan_event.1.a: "TODO"

 GAR_chooseyourclan_event.2.t: "The Crown Will Be Mine"
 GAR_chooseyourclan_event.2.d: "TODO: In these months of chaos, Dragar by the help of his army got everything under control. Even managing with an iron fist, it seems he got a lot of respect from different gargoyles and parts of the clans. With that he will proceed with his claim for the crown, and if it will not be decided in his favor, he will make sure it still gets to him one way or another."
 GAR_chooseyourclan_event.2.a: "TODO"

 GAR_chooseyourclan_event.3.t: "Compassion And Forgiveness(?)"
 GAR_chooseyourclan_event.3.d: "TODO: Arvesti being too compassionate about Golian finally gaining resolve to propose herself as the potential ruler or trying to resolve conflict to reinstate Golian back with her aid."
 GAR_chooseyourclan_event.3.a: "TODO"

 GAR_chooseyourclan_event.4.t: "The Rule of The Kind Soul(?)"
 GAR_chooseyourclan_event.4.d: "TODO: IDK for now. I have a vague idea of it's being the coronation and her either taking the crown and ordering to free Golian, or freeing him and giving her crown to him, but with a such kind and nice speech no one can be mad from the public?"
 GAR_chooseyourclan_event.4.a: "TODO"

 GAR_chooseyourclan_event.5.t: "TODO: Demonia Start"
 GAR_chooseyourclan_event.5.d: "TODO"
 GAR_chooseyourclan_event.5.a: "TODO"

 GAR_chooseyourclan_event.6.t: "TODO: Demonia End"
 GAR_chooseyourclan_event.6.d: "TODO"
 GAR_chooseyourclan_event.6.a: "TODO"

 GAR_chooseyourclan_event.7.t: "My Money is Your Future"
 GAR_chooseyourclan_event.7.d: "TODO: Garik proposes himself as the next ruler, saying that he will help people and will rebuild the country with the help of his wealth. In the times like that, generosity of such wealthy man is admirable. Ofc he will gain from it too, because if he will be the ruler, he could expand their production for the country to gain more."
 GAR_chooseyourclan_event.7.a: "TODO"

 GAR_chooseyourclan_event.8.t: "Crown Bought But Is It Deserved?"
 GAR_chooseyourclan_event.8.d: "TODO: With all his donations and genirousity, some people even started to forget how greedy Blackbeard clan is. Now it seems like Garik is truly does his work for the people, but other clan leaders are not convinced yet. Even if he will be the ruler, he will surely be watched by them closely. It also doesn't help that he created a big expectations for his rule, so people will be also upset if something will go wrong."
 GAR_chooseyourclan_event.8.a: "TODO"

