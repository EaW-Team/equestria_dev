 GAR_initial_event_golian.9.t: "A Reconcilement Gala" #14
 GAR_initial_event_golian.9.d:  "Arvesti's idea for a gala had been a massive hit among the clans. It had given so many Stonewings an opportunity to share their art while creating the perfect stage for tensions to be smoothed over. She stood near the refreshments table, taking a quick drink. It was good to see such a rare moment of stability and camaraderie. Her cousin seemed to be having a good time in the distance; he even wore a half-smile. She planned to meet with him soon – she just needed to grab a plate of appetizers first.\n\n"Arvesti, it's good to see you!" A familiar voice called from her side. "This is a lovely gathering you've organised. Listen, there's something I've been meaning to discuss." As Demonia approached, Arvesti took a step back.\n\n"Oh, o-of course, we can talk about it later. I just have to..." She looked around for any excuse. "Go over there!" Arvesti quickly retreated from the table as Demonia called for her to wait. She had promised herself to leave the stage for her cousin; the last thing she wanted was to be cornered for politicking.\n\nAs she stopped and found room to breathe, a familiar laugh snapped her from her thoughts. "Well, well, if it isn't Arvesti. Quite like what you've done with the place." Garik approached, that same perpetual smile on his face. "Say, this party is quite busy.  There were some deals in my mind that would be very good for both Stonewing and—"\n\n"I... I have to be somewhere else right now, sorry!" She fled quickly, finding refuge in a crowd of conversing artisans. Hiding among them, she made herself look busy. Perhaps now she could properly enjoy the gala and allow her cousin the centre stage... at least she hoped."
 GAR_initial_event_golian.9.a: "At least the party seemed to be going well."

 GAR_initial_event_golian.10.t: "A Shared Surplus" #13
 GAR_initial_event_golian.10.d: ""I am not certain this is wise, Arvesti," Garook gave his opinion after reading Arvesti's proposal. "I know of your close ties to Wyvern, but... sharing our stockpiles out of the goodness of our hearts? I understand wanting to keep your cousin secure, but you cannot forget Stonewing."\n\nArvesti avoided Garook's gaze. She knew he was right, but... "I... I understand your concern, but I assure you this is for the best. We cannot ask for their already-stretched funds at a time like this. Besides, this stockpile is mostly old weapons from the Storm King's invasion; they are somewhat outdated. It should be fine."\n\nGarook held her in his steady gaze. He knew she was lying, and she knew he knew. Their weaponry had not advanced that much; this stockpile was from only four years ago, after all. There was no logical justification where Stonewing stood to gain anything. Arvesti's anxiety was plain, and Garook sighed. "I have spoken my mind. You are the clan leader. What you say goes." His frown deepened slightly. "Just do not forget your oath to the clan."\n\nArvesti smiled and took his hands. Her small, tender hands contrasted starkly with his large frame. "You won't regret this, Garook! Trust me, this will ensure a future where all of Gargiloya is safe." Garook was taken aback by her sincerity but quickly laughed. If Arvesti believed it the best course of action, it was his duty as her loyal guard to ensure it went smoothly."
 GAR_initial_event_golian.10.a: "What is mine is yours."

 GAR_initial_event_golian.12.t: "Deep Diving Shenanigans" #5
 GAR_initial_event_golian.12.d: "As part of a larger Stonewing effort to expand deeper into the mines, one crew found itself descending further than ever before. Strangely, the crew was not entirely composed of Stonewings. "Alos, perhaps we shouldn't go this deep? Especially since not everyone is here today." Marci, a Wyvern who was used to being dragged into these escapades, was quite anxious this time. "I can keep us safe, but at these depths there could be dangerous monsters..."\n\nHearing those words, Alos only seemed to quicken his pace, forcing the other three to scramble after him. "Now look what you've done! He's even more excited! We're not supposed to be down here!" Chilgark struggled to keep up, his small frame clearly unsuited to the frantic pace. "ALOS, WE'RE NOT SUPPOSED TO BE THIS DEEP!"\n\nIn response to the panic of the two Vishap, Farin simply smiled as she ran. Marci had hoped she might talk sense into her brother, but she was always one to get swept up in his schemes. Suddenly, Alos stopped, and the whole group skidded to a halt at what appeared to be just another tunnel bend. "I FOUND IT!"\n\nMarci and Chilgark exchanged a hopeful look. Perhaps this dangerous dive hadn't been for nothing. They rushed to catch up, and the great "bounty" was revealed to be a...\n\n"...A mushroom?" Marci stared, baffled, as Alos beamed at her.\n\n"I've been searching for one of these for weeks! I'm sure it'll be delicious." As the three of them stared at his triumphant posture, Marci couldn't help but whack him on the head with her staff. Farin burst into laughter while Chilgark just looked utterly defeated."
 GAR_initial_event_golian.12.a: ""WE WENT SO DEEP FOR A MUSHROOM?!""

 GAR_initial_event_golian.14.t: "Thanking their Service" #10
 GAR_initial_event_golian.14.d: "TLDR from Snow: This event has Golian giving awards to Nightstone soldiers. Make him give each of them a medal directly, there is a moment of unspoken tension as he gives Demonia her medal, she just smirks as he leaves to go back to his speech,"
 GAR_initial_event_golian.14.a: "Button"

 GAR_initial_event_golian.15.t: "Show No Mercy" #6
 GAR_initial_event_golian.15.d: "Garius stood overseeing his troops advance. This mock battle had been orchestrated to foster cooperation between the Royal Guard and the Black Banners, yet, his opponent was... a newly promoted rookie. He held no contempt for this Anthegyak, but it felt like a planned disrespect. Was this meant to portray what Wyvern thought of their ability?\n\nThe initial attack was meant only to probe their defence, but as Garius saw the enemy general on the opposite side of the sprawling streets, panicking as he flew about, he could not help but feel annoyed. In a real battle, he would have been shot down already. Garius would show the consequences of disrespecting his clan. "ADVANCE! BREAK THEIR SPIRITS! SHOW OUR MIGHT!" With those words, his troops surged into a frenzy, shattering the enemy's front line and marching toward their objective. It was simply too easy. It was... too easy. From the corner of his eye, he caught a glimpse of movement in the sidestreets. Could it mean... "RETREAT! RETREAT!"\n\nThe order came too late. The pushed back Royal troops found a second wind as his own forces were completely encircled. The battle was a total loss. As the realisation overtook him, he fell to his knees. An experienced general, defeated by a newly appointed rookie. It was a shame he would never live down.\n\n"Hey, a-are you alright?" Garius looked up. The opposing general had flown over. "I saw you fall. I wanted to make sure you were okay." He extended a hand. "That was a really good battle! I was afraid your soldiers were going to keep going even after it ended. If this were real, I think they would have turned it around on us."\n\nGarius looked at the offered hand, then smiled, taking it and rising to his feet. "Do not speak so poorly of yourself. It disrespects my defeat." As the young gargoyle scrambled for a reply, Garius departed."
 GAR_initial_event_golian.15.a: "Perhaps there is some potential in this cooperation after all."

 GAR_initial_event_golian.16.t: "Peacetime Demobilization" #12
 GAR_initial_event_golian.16.d: ""I agreed to let you prove yourself worthy of the crown. I thought there was no way you could do real harm in such a short time," Demonia snarled. "But it seems I was wrong. How can you, in your right mind, decide to demobilize our entire economy? We need to be prepared!"\n\nGolian waited for her outburst to subside before speaking calmly. "I understand your concerns, Demonia. But our neighbors are all riddled with infighting; there is little risk of it spilling into Gargiloya, and so, no reason to keep our economy so militarized. I'll of course maintain funding for border security, but this will allow shifting more resources toward rebuilding."\n\nAs Demonia drew breath to argue, Golian continued. "Moreover, keeping a fully mobilized military will only delay our recovery. I told every clan representative that I would prove myself a worthy king. This is part of that effort. The decision is final. If you wish to challenge it, you may do so at the end of this regency period, as with any other matter."\n\nHis steady gaze made Demonia shift uncomfortably. She rose and stormed from the room without a word, slamming the door behind her. Golian sighed. Her temperament was, in part, a product of her youth, but it was certain to cause more headaches in the future – especially if he pursued policies she opposed. He could only hope she would grow into her role as a clan leader and learn to temper her impulses."
 GAR_initial_event_golian.16.a: "None are as bullheaded as a young gargoyle who thinks they know it all."

 GAR_initial_event_golian.17.t: "The Room Where It Happens" #9 
 GAR_initial_event_golian.17.d: "To deal with Blackclaw was always a headache. Golian had meticulously prepared for this, having reviewed and reread every single term multiple times to ensure they were flawless. Garik barely glanced at the parchment before offering a smile. Golian paused. "There is also the issue of tariffs and security for the caravans—"\n\n"Yes, that's reasonable. I'll have some of my guys deal with it." Garik was already writing the revisions, humming softly. He looked up, his smile turning mischievous. "No extra charge, of course. Is there anything else you desire?" His tone was light, almost playful, and that was what unsettled Golian most. He seemed to be treating the whole affair like a game.\n\n"Do you... have any demands of your own?" Golian asked carefully.\n\n"Now, what kind of gargoyle would I be if I made demands of our king?" Garik set the quill down. "Blackbeard is nothing if not loyal to the crown!" He leaned forward slightly, his voice dropping to a conspiratorial purr. "Besides... stability is good for business. And you are clearly a man who values stability. This is just good business." Garik extended his hand across the table and Golian felt uneasy looking at it. The deal was perfect; there was no reason for him to refuse. Garik's grip was firm and lingered just a moment too long. "A pleasure, my king."\n\nHe left with a courteous nod, the door clicking softly behind him. Golian stared at the agreement. It was everything he had asked for and more. Yet, the room felt colder, and the silence felt heavier. Garik had not fought, had not bartered, had not shown a single moment of his usual greed. That, more than anything, felt like a trap already sprung somewhere Golian could not see."
 GAR_initial_event_golian.17.a: "And no one else was in the room where it happened."

 GAR_initial_event_golian.18.t: "Closing Roads" #3
 GAR_initial_event_golian.18.d: ""Pretty interesting move to close our northern border. It's better to ensure the instability stays there and doesn't spill over here." Garik sat there with his ever-present smile. "I do prioritise the well-being of our people too, but see, there's a certain issue..." He arranged his posture. "See, Blackbeard had some pretty profitable deals being negotiated with one of the generals over there. Shouldn't say his name for his privacy, but I assure you, it's something that we can't go back on." He leaned forward conspiratorially. "So... what would be your terms for ensuring my boys can get across the border. I can give you the exact numbers of trucks and cargo, maybe we could even—"\n\n"No." Golian's blunt response stopped Garik in his tracks.\n\n"...I don't think you quite got it. It's a once-in-a-lifetime deal, something we can't – emphasis on can't – go back on."\n\n"And I'm sorry to hear that, but no is no." Golian stood resolute as Garik's smile faltered just by the tiniest amount. "The roads up north have already been closed, and there shall be no exceptions. That's final. Perhaps you could use your fortune and efforts on assisting the common folk instead of dealing with foreign types for once? I'm sure Arvesti would appreciate the help from another clan."\n\nGarik quickly regained his smile as he got up. "Yeah, yeah. What a good suggestion, my king. I'll be sure to help the 'common folk' some more. Have a good one." Garik left towards the door, mumbling as he went and closed it.\n\nGolian sighed. Garik's unpredictability was always an issue, and Blackbeard will surely try to find another way to fulfil that deal even without his consent. The best he could do is double the border guards and hope it'd be enough to show he meant business."
 GAR_initial_event_golian.18.a: "None are as determined as a merchant kept from his money."

 GAR_initial_event_golian.20.t: "Dragar's Reform of the Army" #15
 GAR_initial_event_golian.20.d: "In a private room at the capital, Golian waited, facing one of the hardest choices of his reign before he had even properly taken charge. While Clan Wyvern was known for its scholars and mages, there was a third group: the traditionalists. Honour-bound and tied to militarist customs, they were a faction that, while mostly unseen, remained influential within the clan's highest circles. While not a formal leader, Dragar served as Golian's best opportunity to ensure the total support of clan Wyvern. Golian had always avoided him, but circumstances were dire enough to require a meeting.\n\nWhen Dragar entered, the air became so heavy one could choke on it. Without a word, he walked to the chair opposite Golian and sat, his presence filling the room. Golian straightened his back, kept his hands on the table, and held a gaze of calm composure. He hoped it would be enough to mask his beating heart.\n\n"You have finally decided to recognise that the clan you have chosen is more than just the books and tomes you cling to, Golian." Dragar spoke, his voice thick with disdain.\n\n"Yes. I... have come to offer my respects and an opportunity for compromise." Golian was not usually one to feel pressure, but the eyes of the gargoyle before him seemed to demand he leave the room. "The Royal Guard is in dire need of reform, and I require the clan's full support. I am willing to offer you a leading role in that reform once I have consolidated my power, provided you endorse my claim to the throne."\n\nDragar seemed to ponder for a moment, his expression never shifting. "It seems you have some guts. I will give you that." He stood. "I accept your offer. See that you do not disappoint me."\n\nWith that, Dragar left. As soon as the door closed, Golian breathed as if for the first time in an age. The conversation had lasted perhaps two minutes at most, yet in that time, Golian had already begun to question if coming here had been the right choice."
 GAR_initial_event_golian.20.a: "No coming back from this."

