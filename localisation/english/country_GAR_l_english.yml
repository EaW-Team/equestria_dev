#Demonia Main Tree

 GAR_demonia_starting_1: "Where She Belongs"
 GAR_demonia_starting_1_desc: "Her command secured, Demonia has risen to the pinnacle of Gargiloya, ready to seize the nation's destiny. No longer will cowardice hold us back; the reins of fate are ours to take!"
 GAR_demonia_starting_2: "Jailing Traitors"
 GAR_demonia_starting_2_desc: "Though he was useful in dethroning Golian, Demonia trusts Garik as much as a yeti with a loaded gun. Reports of his erratic behavior in recent months have reached her and serve as enough justification to deal with him. It is time for the merchant to have his due."
 GAR_demonia_starting_3: "Friends Once More"
 GAR_demonia_starting_3_desc: "With Golian removed as an obstacle, Nightstone and Stonewing can finally stand together again. Arvesti may require an one-on-one to come fully onboard, but Demonia is certain the two clans that shielded Gargiloya in its darkest hour will rise again as steadfast allies."
 GAR_demonia_starting_4: "Declare the State of Emergency"
 GAR_demonia_starting_4_desc: "With her opposition neutralized, Demonia will do what is necessary to secure Gargiloya's safety, now and forevermore. Though unprecedented in peacetime, the entire nation recognizes the perpetual threat from the west. Until she deems the realm truly secure, emergency powers shall be invoked."
 GAR_demonia_political_3: "Raise Reservist Battalions"
 GAR_demonia_political_3_desc: "To garrison our borders fully, we will call upon the reservists to fulfill their duty to the nation. They may require some training to refresh their skills, but they will prove invaluable in the conflicts to come."
 GAR_demonia_political_4: "Tame the Wilds"
 GAR_demonia_political_4_desc: "Demonia respects our Hyenian brethren to the west, but knows they will never submit willingly. We must push into their lands to secure their cooperation; preferably with minimal bloodshed."
 GAR_demonia_political_5: "A Shared Goal"
 GAR_demonia_political_5_desc: "Both our nations have been struck and robbed by the yeti scourge. With Hyenian lands having endured brutal occupation for years; they know better than any what must be done. We are kin with a shared goal, and nothing will stop us."
 GAR_demonia_political_6: "Cutting the Bureaucracy"
 GAR_demonia_political_6_desc: "The Ancient Pact, once a great union, has long been stagnant. It has failed to do its only purpose in our nations greatest hour of need, and so, it is clearly in the way of true centaur and gargoyle cooperation. To ensure our peoples are duly respected, we must excise the tumor that is keeping us back."
 GAR_demonia_political_7: "One Shared Burden"
 GAR_demonia_political_7_desc: "Centaurs and gargoyles share a heavy burden: to stop the yeti menace where we once failed. The Ancient Pact faltered, but now, we shall use this duty as a unifying call of both our peoples towards one shared goal."
 GAR_demonia_political_8: "Our Shared History"
 GAR_demonia_political_8_desc: "Our histories have been intertwined for over a millennium; with trade, art, and tragically, war. That shared past serves as a foundation as both centaurs and gargoyles rise as true equals under a single banner; building a legacy greater than our ancestors could have ever imagined."
 GAR_demonia_political_9: "The Ancient Pact United"
 GAR_demonia_political_9_desc: "With the stifling bureaucracy gone, the Ancient Pact has grown into something new and more united than it had ever been. Though this union was born of hard necessity and loss, our peoples embrace their roles as equal and united partners."
 GAR_demonia_political_10: "Three Peoples, One Aim"
 GAR_demonia_political_10_desc: "Gargoyles, centaurs and hyenas, all of us are bound by our pride and a shared, burning hatred for any would-be Storm King. Now, united under a single banner and a singular aim, victory is not a hope; it is an inevitability!"
 GAR_demonia_yeti_1: "Strike First, Strike Fast!"
 GAR_demonia_yeti_1_desc: "We would both be cowards and fools if we allowed the yetis to strike us first as the Storm King once did. It is finally time to rectify the past!"
 GAR_demonia_yeti_2: "To Achieve Our Revenge"
 GAR_demonia_yeti_2_desc: "Think of how many died to the Storm King's attacks! Families, friends, our whole nation, put under siege for the mere act of existing. It is time the Storm King's would-be successors pay for the sin of their king!"
 GAR_demonia_yeti_3: "To Topple The Tyrants"
 GAR_demonia_yeti_3_desc: "The entire continent was a victim of the Storm King's madness. To ensure that no other can ever do as he did, we must topple the bickering would-be tyrants to ensure the safety of the whole continent!"
 GAR_demonia_yeti_4: "The Storm Subdued"
 GAR_demonia_yeti_4_desc: "With far too many lost, we have done it. The storm has finally been subdued and we are free to rest at last... or so we had hoped to say. The yeti are very unsatisfied with this turn of events and our occupation, but we will not give up on ensuring our peace, no matter the cost!"
 GAR_demonia_yeti_5: "All is Fine!"
 GAR_demonia_yeti_5_desc: "Many are afraid of what this war could mean, especially if we were to lose, but we must assure the populace not to worry. As long as our brave soldiers are fighting on the front, there is no way we could ever lose."
 GAR_demonia_yeti_6: "Rouse the Populace"
 GAR_demonia_yeti_6_desc: "This war is unlike any we have faced in the past; it is a war for the survival of Gargiloya and all of Zebrica. We must rouse the populace so they know our cause is just!"
 GAR_demonia_army_2: "Temporary War Economy"
 GAR_demonia_army_2_desc: "As long our state of emergency is ongoing and Gargiloya is not safe from its enemies, we must fully mobilize our economy to carry our future war efforts. Once Gargiloya is safe, the economy will be demobilized back into a civilian focus."
 GAR_demonia_army_3: "Border Infrastructure Efforts"
 GAR_demonia_army_3_desc: "With their proximity to chaotic regions, we must turn our border regions into strongholds. We will fortify them with new roads for rapid deployment and resilient outposts. These investments shall hopefully transform our borders into bastions ready to repel any incursion and support our armies."
 GAR_demonia_army_4: "Rely Only on Ourselves"
 GAR_demonia_army_4_desc: "While a measure needed during these times of crisis, it is something that should have already been done long ago. Gargiloyan resources are for Gargiloya, and if we are to win the coming war, we must rely on ourselves and no one else."
 GAR_demonia_army_5: "Defining Black Banner Formations"
 GAR_demonia_army_5_desc: "The Black Banners are Demonia's dream come into reality. An elite unified army for all of Gargiloya, readied with Nightstone command, Stonewing ingenuity, Wyvern mages and Blackbeard's funding, it is sure to grow as a prideful spot in Zebrica."
 GAR_demonia_army_6: "Our Bread and Butter"
 GAR_demonia_army_6_desc: "A soldier's courage is meaningless without a reliable weapon. Ensuring our troops are equipped with the finest arms is a must for a modern elite force. Thanks to Stonewing's relentless ingenuity, Gargiloya's forges produce cutting-edge weapony to maintain our technological superiority over our enemies."
 GAR_demonia_army_7: "Not a Moment to Breathe"
 GAR_demonia_army_7_desc: "Relentless barrages to pin our enemies down and deny them even a moment to regroup or breathe; artillery truly is a wondrous tool. While not the most common weaponry in Gargiloya, Blackbeard's far-reaching trade networks ensure the modernity of our forces."
 GAR_demonia_army_8: "Offense is the Best Defense"
 GAR_demonia_army_8_desc: "A relentless offense has always been Nightstone's motto, and it shall remain so for the new Gargiloya. The Black Banners, inheriting Nightstone's honed art, will train with one philosophy in mind: the surest way to defend Gargiloya is to carry the fight to the enemy's heartland."
 GAR_demonia_army_9: "Adapt and Survive"
 GAR_demonia_army_9_desc: ""
 GAR_demonia_army_10: "Discipline Under Fire"
 GAR_demonia_army_10_desc: "Strength is not shown only in a brave first charge, but in holding formation under a hail of gunpowder and magic. Mimicking Nightstone virtues, the Black Banners must have unshakeable discipline. A calm soldier is an effective soldier; a disciplined army is an invincible one."
 GAR_demonia_army_11: "Never Down Too Long"
 GAR_demonia_army_11_desc: "We will be bruised, but we must never shatter! Our troops must be trained to always be ready for a counterattack. Resilience is not simply endurance, it must be the ability to turn a desperate defense into the opening for victory."
 GAR_demonia_army_12: "All For The Army"
 GAR_demonia_army_12_desc: "Every forge, every farm, every resource must now serve the war machine. The civilian economy is sidelined for the duration of the emergency period. Though tough times may come, these times create the strongest of will, as our Queen herself showcased in her rise."
 GAR_demonia_army_13: "Ensure Efficiency"
 GAR_demonia_army_13_desc: "The expertise of the Black Banners means nothing if they are frozen waiting for supplies. We must streamline every production line and ensure the army's logistical backbone is as robust and responsive as the front line is courageous."
 GAR_demonia_army_14: "Our Preferred Dealers"
 GAR_demonia_army_14_desc: "Two clans fuel our war economy: Stonewing's unparalleled forges and Blackbeard's vast mercantile networks. We must decide who to rely on for a closer contract to our industrial mobilization."
 GAR_demonia_army_16: "The Expanding Banners"
 GAR_demonia_army_16_desc: "While our reforms have found much success, there is still much work to be done. With our newly integrated comrades from Hyenia and Senturya, we must ensure that our army and economy fully integrates the expertise brought in by our friends."
 GAR_demonia_army_23: "Answering Concerns"
 GAR_demonia_army_23_desc: "Even as the entire nation mobilizes, there is still much uncertainty around our cause. To ensure it is at least a little less disruptive, we shall work alongside Stonewing to showcase our cooperation and assuage the public's fears."
 GAR_demonia_army_a1: "Boons From The West"
 GAR_demonia_army_a1_desc: "Our collaboration with the Dervishes open way for a wealth from beneath. With their cooperation, the Hyenian lands shall be built up as we better utilize previously untapped resources to prepare for the future conflict."
 GAR_demonia_army_a2: "Centaur Expertise"
 GAR_demonia_army_a2_desc: "Senturya had industrialised faster than Gargiloya, it cannot be denied. Now, with both nations as one, the centaur's expertise opens the way for us to optimize supply chains, improve machinery, and ensuring not a single resource is wasted."
 GAR_demonia_army_a3: "Hyena Familiarity"
 GAR_demonia_army_a3_desc: "No one knows the secrets of their lands quite like the hyenas. Their guidance leads our miners to untapped veins, transforming arid lands into engines of production. As we build up their homeland for the war effort, we build a stronger, more resilient foundation for all our peoples."
 GAR_demonia_army_a4: "An Easy Solution"
 GAR_demonia_army_a4_desc: "Considering our newly found territories and new struggling population, reconstruction is an easy manner to arrange jobs, better connect our populations and create new opportunities."
 GAR_demonia_army_a5: "Our Shared Pain"
 GAR_demonia_army_a5_desc: "Let the memory of burned villages and fallen kin fuel our resolve. We cannot forget our pain, neither can we simply forgive what has been done to our peoples. All must be reminded that their rage is just, their loss is shared, and their vengeance will be absolute."
 GAR_demonia_army_a6: "Our Shared Discipline"
 GAR_demonia_army_a6_desc: "We survived not by chance, but by will. The hyenas held and fought even under occupation. Nightstone and Stonewing defied siege as Gargiloya fell. The centaurs endured even as the pact broke. We must celebrate our shared perseverance as the soul of our united army."
 GAR_demonia_army_a7: "Another Step To Greatness"
 GAR_demonia_army_a7_desc: "The foundation is complete. Army and economy, forged in unity, now operate as a single organism all for one goal. As the culmination of our reforms, Gargiloya is now truly ready to face any enemy and ensure its future is safe."
 GAR_demonia_army_b1: "Adaptable Tactics"
 GAR_demonia_army_b1_desc: "Our combined forces create a tactical nightmare for any foe. We strike with centaur speed, hyena adaptability, and gargoyle aerial power; vanishing before a counterblow lands. Yet, when we choose to stand, we do so with centaur industry, gargoyle resilience, and hyena defiance backing us. Every battle shall be done on our terms!"
 GAR_demonia_army_b2: "I don't know the new army system"
 GAR_demonia_army_b2_desc: ""
 GAR_demonia_army_b3: "Same here lold"
 GAR_demonia_army_b3_desc: ""
 GAR_demonia_army_b4: "An Example To Follow"
 GAR_demonia_army_b4_desc: "The Black Banners, born from Demonia's vision, have in short order become the gold standard for an elite force. Their success is a testament to what ingenuity and sheer determination can achieve; standing as an example to all of Zebrica of military excellence."
 GAR_demonia_army_b5: "Trustworthy High Command"
 GAR_demonia_army_b5_desc: "The finest army is crippled by foolish generals. We will purge nepotism and install a meritocratic high command where only the most brilliant strategists and proven leaders may guide our Banners. With such minds at the helm coming from all our peoples, our Banners will be able to reach their full potential."
 GAR_demonia_postwar_1: "Keep Our Promises"
 GAR_demonia_postwar_1_desc: "With the yetis defeated and our armies prepared to defend Gargiloya from any threats, Demonia has achieved all she had promised to do. Now, as the dust settles on this new reality, she will host a congratulatory clan meeting to welcome this new era. The clans shall be free to speak their mind once more as all of Gargiloya commemorates their successes."

