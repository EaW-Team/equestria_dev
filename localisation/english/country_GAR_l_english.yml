#Initial Events
 GAR_initial_event.0.t: "Raindrops in Their Gown"
 GAR_initial_event.0.d: "The sound of raindrops was the only sound echoing in Mahamerdz's room. They were lying down, as they spent most of these last few weeks; their health having taken yet another turn for the worse. It had been steadily chipping away at them, but the respect and authority they commanded in Gargiloya were insurmountable; none dared to confront the ailing monarch, not even as the clan meetings counted with their presence less and less, with only their spouse as their representative.\n\nEven by the side of their bed, Golian remained upright and respectable; a brooding nature he had carried since his youth. Many believed him uncaring, but Mahamerdz loved their husband all the same. They had prepared so many words to tell him at this moment, but his trembling hand told them he already knew what they wished to ask of him.\n\n"They... will come to respect you... as they have me." Their voice was weak, but still carried the strength that had brought such prosperity to Gargiloya. "You... are so much... more than they think..." A wracking cough escaped their throat, hacking away at their composure. Golian quickly offered a glass of water, which they lightly pushed away, steadying themselves.\n\n"Mahamerdz, please, you must not exert yourself." He set the cup down. "Perhaps it would be best if you go back to resting."\n\n"Then... let us speak of it no more." Mahamerdz simply smiled. "Yet... this may be one of the last times we speak as freely as this..." They slowly began to open their arms. Golian's expression began to falter. He took a step closer to their bedside, and then another, lowering himself to their level. Gently, he laid his face upon their chest as he knelt beside the bed."
 GAR_initial_event.0.a: "The two embraced as the stoic gargoyle wept."

 GAR_initial_event.1.t: "Half a Wish"
 GAR_initial_event.1.d: "It had not been long since Mahamerdz died. As the entire nation mourned, the one who wished to grieve the most was pulled into an obligation that could not be delayed. Golian stood surrounded by the most influential Wyverns in the nation, all in ceremonial attire, as he awaited his part to play.\n\nWith Mahamerdz gone, someone needed to assume power over the clan and the kingdom. One of the late monarch's dying wishes was to ensure their spouse was given the chance, and the first step was to rise as Wyvern's leader. Having already been largely responsible for Gargiloya's affairs due to Mahamerdz's failing health, the succession was, in truth, a formality to be completed. Golian had never desired a leadership role; it was why he had declined to rule Stonewing when the offer came decades ago. But...\n\n"Do you, Golian, swear you are ready for this position? Do you vow to move forward, always with your clan and your home in mind? Do you promise to lead Wyvern through pain and loss... always holding its well-being in your heart?" The adorned scholar spoke, reaching the ceremony's climax. This was the final formality to affirm Golian's fitness to lead Wyvern – the clan that had accepted him into its fold; the clan that had allowed him to pursue his studies; the clan that had been his spouse's home.\n\n"Yes, elder. I shall give everything to ensure Clan Wyvern is respected across the land, standing equal to all our brethren. I shall always seek new knowledge, and I shall always remember our roots. I am but a humble servant."\n\nThe adorned gargoyle smiled, then finished by banging his staff upon the floor, the sound echoing as he stepped aside and allowed Golian to take center stage. As Golian rose and gazed upon the crowd, he felt little for the applause or praise. This was merely one more step in preserving Mahamerdz's legacy."
 GAR_initial_event.1.a: "First the clan; next, Gargiloya."

 GAR_initial_event.2.t: "A Helping Hand"
 GAR_initial_event.2.d: "Arvesti was anxious, her finger tapping restlessly on the table. It had been too long since she and her cousin had the opportunity to simply talk as family. Despite his constant reassurance that his refusal to lead Stonewing was no great matter, Arvest's respect for him had never wavered, not even decades later. Without the opportunity he gave her, she could never have achieved so much. He truly was—\n\nThe door opened gently, revealing his tall, composed figure. As it closed, Golian smiled. "It is good to see you once more, Arvesti." She had to restrain herself from rushing to embrace him. Instead, she offered a bow as he approached, which he returned in kind.\n\nThe afternoon passed swiftly as they spoke of many things, but the conversation inevitably turned to Golian's ascension to the leadership of Clan Wyvern. "I... I don't know what to say," Arvesti admitted, unable to conceal her surprise. Golian's face grew somber; clearly, he held no great love for this turn of events either. "I never expected you in a leadership role after what happened with Stonewing. Leading Wyvern is an even greater shock... especially as a relatively new member. It's only been, what, fifty years? I know they welcomed you, but now that Mahamerdz is gone..."\n\n"Arvesti." She fell silent at his serious tone. "I will lead Wyvern. That much is already decided. What I need to know now is..." He seemed to struggle with the words. "May I... may I depend on you and Stonewing from here on out?"\n\nArvesti's expression immediately grew conflicted. She had never seen her cousin ask anyone for help. If this was his purpose from the beginning, then his conviction must be absolute. Her smile returned, wide and genuine, and she took her cousin's hand in hers, breaking through his solemn demeanor."
 GAR_initial_event.2.a: ""Of course you can; always!""

 GAR_initial_event.3.t: "Talking in the Shadows"
 GAR_initial_event.3.d: "The mood was strange as Demonia waited. She had summoned Garik for a 'very important meeting,' but for several minutes now, she had simply sat in silence. Usually fiery and direct in speech, her current quiet posture was entirely uncharacteristic. Across from her, Garik stifled a yawn, mentally tallying all the more profitable ways he could be spending his time. Still, disrespecting a fellow clan leader was a bold move, even for him.\n\n"You dislike the status quo, correct?" Garik fumbled, nearly dropping the coin he had been spinning on his finger, caught off guard by her finally speaking. "These unstable times cannot be good for Blackbeard."\n\n"Oh, we're quite comfortable, as always," he replied smoothly, his smug smile returning as he resumed spinning the coin. "But I'll pretend you never implied otherwise. Consider it a courtesy, no need to thank me."\n\nHis prodding seemed to have no effect. She held his gaze, indifferent to his words. "I am dissatisfied," she stated plainly. "Golian is a fool who drags our pride through the mud. His acceptance as Wyvern's leader is a terrible sign. Soon he will reach for the crown; I am sure of it. When that happens, I will need your assistance." Garik opened his mouth to dismiss her again. "There is a substantial sum of money involved," she continued, cutting him off, "if you assist me in dethroning him."\n\nHis mouth closed. Then, slowly, it widened into a broad smile. He nimbly pocketed his coin and extended his hand towards the brooding Demonia."
 GAR_initial_event.3.a: ""You know, I never liked him that much. What can Blackbeard do for you?""

 GAR_initial_event.4.t: "A Resisted Motion"
 GAR_initial_event.4.d: ""Absolutely not! How dare he reach for the crown without due process!" Demonia swept her gaze across the clan chamber, searching for support. "This is a blatant power grab by a coward who has repeatedly left Gargiloya to fend for itself! I will never recognize him!" Mutters swelled through the hall as reactions splintered. Garik smiled faintly to himself. Arvesti looked panicked, trying to steer the room back to order.\n\nGolian weirdly enough remained the calmest presence in the room. "I understand why you feel this way, Demonia. Truly." Golian's voice cut through the murmurs. "All I ask is that you give me until the tenth month. By then, I will have proven myself worthy of the crown." Then he did what surprised the room most: he bowed, lowering his tall frame in a gesture of deference that seemed almost unnatural. "Please. That chance is all I ask."\n\nAs Demonia's fury visibly tightened, Arvesti seized the moment. "Stonewing supports this motion! Let us reconvene in the tenth month to judge if Golian of Wyvern has proven his worth!"\n\n"Wyvern supports the motion!" Before Demonia could even react, she was cut off again.\n\n"Blackbeard supports the motion." Demonia's eyes snapped to Garik, who met her with an aloof smile.\n\nOutnumbered, she turned to the silent Nightstone delegation, every eye upon her, awaiting their command. "Nightstone... supports the motion." She bit her lip as thunderous applause erupted through the chamber. Across the room, a sigh of relief escaped Arvesti."
 GAR_initial_event.4.a: "Golian will prove himself!"
 GAR_initial_event.4.b: "I can't believe in the coward!"

#Initial Golian Events
 GAR_initial_event_golian.1.t: "Who Lives" #2
 GAR_initial_event_golian.1.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech to once more thank the clans to allowing him a chance to keep their partner's legacy alive. The mood is sour but the clans can't help but respect his forwardness"
 GAR_initial_event_golian.1.a: "Button"

 GAR_initial_event_golian.2.t: "Who Dies" #1
 GAR_initial_event_golian.2.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech on the horrors of war. On how many lives it had claimed, on how many crumbled during it, on how his own partner was taken from him, with the stresses of war helping their decline. He vows to fight to ensure peace for Gargoyles. The mood is sour but the clans can't help but respect his forwardness"
 GAR_initial_event_golian.2.a: "Button"

 GAR_initial_event_golian.3.t: "Who Tells Your Story" #8
 GAR_initial_event_golian.3.d: "TLDR from Snow: In a meeting of the clans, Golian gives a speech on how they must keep on going, even with all their loss. He goes on depth about his partner's condition and how he wishes to keep their legacy alive. The mood is sour but the clans can't help but respect his forwardness."
