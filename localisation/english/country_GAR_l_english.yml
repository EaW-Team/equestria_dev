#News Events
 GAR_news.1.t: "The Passing of Monarch Mahamerdz"
 GAR_news.1.d: "[This.GetNewspaperHeader]News have come from clan Wyvern of the passing of Monarch Mahamerdz last night. A ruler that had brought Gargiloya to a golden age, the entire nation mourns their passing.\n\nThey have left behind their spouse, Golian, and a wish for them to take the throne after their passing. Golian, a known scholar and a mage, is in a rougher position than their spouse. With much controversy due to his choice of leaving the nation during the Storm King's invasion, his name is spoken in hushed tones with suspicion and doubt. Many wonder if he is capable of leading the nation in these trying times, a meeting of the four clans is to be held soon to discuss the future of Gargiloya."
 GAR_news.1.a: "This year surely will be tough for our kingdom."
 GAR_news.1.b: "Send them our condolences"
 GAR_news.1.c: "Send them our condolences"

