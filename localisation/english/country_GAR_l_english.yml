### COUNTRYNAME ###

### LEADERS ###
 GAR_mahamerdz: "Monarch Mahamerdz"
 GAR_mahamerdz_desc: "To lead Gargiloya, one must rise above all clan rivalries and be selected as monarch – an arduous process that has drowned many a gargoyle in ambition. Given these overwhelming odds, it is remarkable that for almost thirty years, Gargiloya has been led by a figure as sickly and weak as Mahamerdz.\n\nMahamerdz's survival past their early years was itself a miracle. Stricken by magic deficiency since their molding, they depended entirely on constant care. Empathy, however, was not without its reward. Though often bedridden, Mahamerdz developed an insatiable thirst for magical knowledge, perhaps driven by their own condition. During decades of study, they forged many connections, ingratiating themselves with a calm yet fierce demeanor that showcased a formidable will to survive. It was also during this period that they met their husband, Golian. While others might have called Golian's demeanor rigid or uncaring, their love still flourished.\n\nWhen Gargiloya found itself without a monarch, Mahamerdz was determined, and despite frail health, set their sights on the throne. Through debate after debate and favor after favor, they proved themselves a masterful problem-solver, capable of weaving the fragile threads of the clan structure into a stable whole. They were deemed fit to lead by all clans and were soon crowned. And stability they delivered. For many years, Gargiloya flourished under their reign, growing steadily as the clans found harmony. Whispers about their worsening health circulated over the years, but none dared challenge the monarch who had ushered a golden age. Yet, stability cannot last forever.\n\nThe Storm King's invasion caused a severe turn in Mahamerdz's health. In desperation, Golian decided to flee the nation and take them, prioritizing their treatment above all else. Despite his sacrifices, it was not enough. Gargiloya was laid to ruin, and Mahamerdz was left bedridden. They now rest, awaiting fate as Golian strives to restore stability.\n\nMahamerdz is not afraid to die – they made peace with that long ago. They are afraid only of the chaos their death may unleash."
