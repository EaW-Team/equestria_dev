### FOCUS ###
#Initial Tree
 GAR_new_year_new_issues: "New Year, New Issues"
 GAR_new_year_new_issues_desc: "While New Year celebrations roar across Gargiloya, a fragile peace blankets the land. It cannot last. Between Monarch Mahamerdz's failing health, the still-fresh scars of the Storm King's invasion, and Golian's unpopularity, the stage is set for a tumultuous year."
 GAR_golian_arvesti_meet: "Royal Coalition"
 GAR_golian_arvesti_meet_desc: "As a former Stonewing, Golian maintains close ties with his birth clan; ties strengthened when he refused its leadership, leading to his cousin, Arvesti, taking the helm. To reinvigorate the alliance between Wyvern and Stonewing, the two cousins will meet privately before the clan council convenes."
 GAR_demonia_garik_meet: "Union of Conspirators"
 GAR_demonia_garik_meet_desc: "Clan Nightstone's brave resistance has bred a lasting resentment, while Clan Blackbeard's greedy nature makes it an unrealiably ally at best. For Gargiloya to emerge strong from this year, the fears of these clans must be calmed and their loyalty firmly secured."
 GAR_congress_of_clans: "Congress of Clans"
 GAR_congress_of_clans_desc: "After a month of mounting tensions, the time has come for the year's first major meeting of clans of the year. Representatives of all four clans unite to discuss the future and secure the realm's stability. Sound the horns and hammer the drums, for the Congress of Clans is about to begin!"

#Golian's Side
 GAR_who_dies: "Who Dies"
 GAR_who_dies_desc: "The recent conflicts that shook Gargiloya to its core claimed far too many lives. As we mourn them, we must also look to the future, resolved to ensure such a tragedy never befalls our people again."
 GAR_who_lives: "Who Lives"
 GAR_who_lives_desc: "Though Monarch Mahamerdz has passed, their legacy lives on in all of us who remain. Let us honor their memory by keeping their dreams for Gargiloya alive and ensuring their vision for a prosperous, united nation endures. This is our solemn duty."
 GAR_who_tells_your_story: "Who Tells Your Story"
 GAR_who_tells_your_story_desc: "In the wake of the death and sorrow that has befallen our nation, it falls to us, the living, to carry forward the dreams of those who came before. We must ensure Gargiloya not only endures but thrives, honoring all who could not be here to see tomorrow."
 GAR_friends_in_ilksehir: "Friends in İlkşehir"
 GAR_friends_in_ilksehir_desc: "In these trying times, we must all remember we are not alone. The Ancient Pact was formed as a bond of friendship, trust and mutual aid between Gargiloya and Senturya, and it remains strong to this day. Now, more than ever, we must lean on our allies so we may rebuild and recover together from the conflicts that have shaken our lands."
 GAR_moment_at_the_study: "A Moment at the Study"
 GAR_moment_at_the_study_desc: "While Golian is very much needed supervising the ongoing efforts across Gargiloya, he still wishes to continue his studies. To that end, he has decided to set aside a small portion of his time to continue his research into the arcane."
 GAR_commissioning_high: "Commissioning High"
 GAR_commissioning_high_desc: "As part of the ongoing recovery, Arvesti has commissioned several works of art and architecture across Gargiloya. They will serve to raise the prestige of the nation and showcase our resilience in the face of adversity."
 GAR_a_reconcilement_gala: "A Reconcilement Gala"
 GAR_a_reconcilement_gala_desc: "As the leader of a clan respected by all, Arvesti has proposed a grand gala to soothe inter-clan tensions. It will be a night of celebration, music, dance, and most importantly, reconciliation in hope of a new tomorrow."
 GAR_stockpiling_materials: "Stockpiling Materials"
 GAR_stockpiling_materials_desc: "While usually only taking as much as needed, the recent conflicts have left us severely depleted of certain resources. To ensure we are always at top readiness, we must begin stockpiling essential materials once more. Even if it may seem excessive, it is better to be prepared for any eventuality."
 GAR_shared_surplus: "A Shared Surplus"
 GAR_shared_surplus_desc: "Stonewing has maintained a surplus of arms and armor since the Storm King's invasion. To bolster Gargiloya's readiness, Arvesti has agreed to share this surplus with Clan Wyvern, strengthening their alliance and ensuring mutual safety."
 GAR_thanking_their_service: "Thanking their Service"
 GAR_thanking_their_service_desc: "Clan Nightstone's brave resistance during the Storm King's invasion has not gone unnoticed. To honor their sacrifices and bolster morale, Golian will personally thank the clan's soldiers for their service. It is a gesture he hopes will help mend the rifts between them."
 GAR_defense_not_offense: "Defense, not Offense"
 GAR_defense_not_offense_desc: "In preparation for future threats, Golian has ordered a series of war games between Clan Wyvern and Clan Nightstone. Wyvern will assume a defensive posture, with Nightstone playing the aggressor. The exercise is intended to showcase both clans can be more mindful of each other's limitations, while also growing closer."
 GAR_peacetime_demobilization: "Peacetime Demobilization"
 GAR_peacetime_demobilization_desc: "The toll of war is one we still struggle to bear. To focus on rebuilding and healing, Golian has ordered a peacetime demobilization of the Royal Guard. While some may see this as weakness, it is a necessary step toward restoring normalcy and prosperity."
 GAR_shaking_claws_with_traders: "Shaking Claws With Traders"
 GAR_shaking_claws_with_traders_desc: "Clan Blackbeard's mercantile prowess is unmatched in Gargiloya. Ensuring a few profitable deals would go a long way towards stabilizing our economy. Golian has decided to personally meet with Garik to discuss potential trade agreements that would benefit both our clans."
 GAR_closing_roads: "Closing Roads"
 GAR_closing_roads_desc: "Ongoing conflicts along the northern border have made travel and trade perilous. To ensure public safety, Golian has ordered the temporary closure of the northern roads until stability returns. It is a necessary, if inconvenient, measure to protect the realm."
 GAR_dragars_reform_of_the_army: "Dragar's Reform of the Army"
 GAR_dragars_reform_of_the_army_desc: "A traditionalist at heart, General Dragar is a long-respected figure within Clan Wyvern. To ensure our forces are properly trained, Golian could seek Dragar's assistance in reforming the army. This would be a significant gesture, mending ties between new and old, while also positioning Golian as a unifying figure who respects all facets of the clan he now leads."


#Coup Side
 GAR_honor_the_fallen: "Honor the Fallen"
 GAR_honor_the_fallen_desc: "While most of Gargiloya surrendered, Nightstone never yielded! Our brave gargoyles perished defending the realm from the Storm King's advance. Their sacrifices must never be forgotten."
 GAR_voice_concerns: "Voice People's Concerns"
 GAR_voice_concerns_desc: "In our greatest hour of need, Golian took our monarch and fled far from the fighting. Battered and bruised, Gargiloya rises once more – but his cowardice is not forgotten. These concerns cannot be brushed aside; they demand proper answers!"
 GAR_never_another_storm_king: "Never Another Storm King!"
 GAR_never_another_storm_king_desc: "An autocrat, pillager, and tyrant, the Storm King ravaged the continent in his egomania. Following his example, his empire has collapsed, its remnants tearing at each other's throats. To ensure Gargiloya's safety, we must see that no such tyrant ever rises again."
 GAR_ensure_stockpiles_ready: "Ensure the Stockpiles are Ready"
 GAR_ensure_stockpiles_ready_desc: "If words are not enough, Nightstone must prepare for the future one way or another. We must ensure our stockpiles are full of whatever we may need for what comes next... be it peace or not."
 GAR_forges_rumble_for_war: "Forges Rumble for War"
 GAR_forges_rumble_for_war_desc: "Our forges may not rival Stonewing's, but Nightstone's tenacity is unmatched. Let them rumble as we ready ourselves to defend Gargiloya – whatever the cost."
 GAR_trade_fuels_home: "Blackbeard Trade Fuels Your Home!"
 GAR_trade_fuels_home_desc: "Every home and business in Gargiloya thrives thanks to our compatriots in Clan Blackbeard. Their mercantile genius keeps trade and wealth flowing into the nation. Let us never forget to thank our friends!"
 GAR_let_workers_rest: "Let Workers Rest"
 GAR_let_workers_rest_desc: "Unlike the ceaseless Stonewing forges, Garik is a friend to the common worker. To showcase his goodwill, he will ensure Blackbeard's laborers are properly rested in these trying times."
 GAR_money_buys_all: "Money Buys All"
 GAR_money_buys_all_desc: "Money makes anything possible. Want something? Money gets it. Friends, food, arms – money is the universal language. Whatever we need, enough coin will ensure we get it."
 GAR_loyalty_for_price: "Loyalty, for a Price"
 GAR_loyalty_for_price_desc: "Like Nightstone, Blackbeard is dissatisfied with the status quo, but... a generous allocation of funds and reassurance from Wyvern could smooth tensions. It's not treachery, it's simply business! And stability is profitable, is it not?"
 GAR_unity_in_name: "Unity at Least in Name"
 GAR_unity_in_name_desc: "Nightstone and Wyvern are not enemies... unlike Demonia and Golian. Yet, the fool seems oblivious to her disdain, so why should we reveal our hand too soon? Better to exploit his ignorance. A public show of unity and ensuring everyone all is fine would help the nation stabilize... even if it greatly angers Demonia."
 GAR_boycott_clan_meetings: "Boycott Clan Meetings"
 GAR_boycott_clan_meetings_desc: "Golian is a traitor! To openly showcase their distaste for his actions and the direction he is taking our nation, both Blackbeard and Nightstone will stage missing this month's clan meeting and send Golian a message!"
 GAR_support_wyvern_traditionalists: "Remember Who You Are!"
 GAR_support_wyvern_traditionalists_desc: "Wyvern is not well represented by Golian! In fact, Golian is no Wyvern at all! He threatens to erase the legacy and voice of true Wyverns, like the great Mahamerdz. The clan must remember its glorious past and stand against this corruption!"
 GAR_friends_not_forgotten: "Friends not Forgotten"
 GAR_friends_not_forgotten_desc: "While Stonewing's leader has stood by Golian due to family ties at play, their actions are understandable. Stonewing is a clan loyal to a fault, and the same can be said of Arvesti, and those are traits deeply respected by Demonia. She will pay Arvesti a visit and reassure the friendship of their clans."
 GAR_too_busy_with_comissions: "Too Busy With Comissions"
 GAR_too_busy_with_comissions_desc: "Stonewing is dangerously effective, and openly antagonizing them is unwise. So, what better way to make them busy than by simply comissioning their artisans and forges for our own needs? They may be proud, but they simply can't deny what we're willing to pay."
 GAR_equal_your_odds: "Equal Your Odds"
 GAR_equal_your_odds_desc: "Demonia is not willing to keep herself quiet any more! She will be allowed free rein to speak her mind at this month's clan meeting... though she is known to get quite fiery in her words. We can only hope this works to our favor." 


