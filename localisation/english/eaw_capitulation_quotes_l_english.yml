EaW_PeaceCap_Desc_WIT: "As my nation falls, I will fall with it."
EaW_PeaceCap_Desc_NIM: "They return on their shields."
EaW_PeaceCap_Desc_NIM_Helot: "Those who deny freedom to others, deserve it not for themselves."
EaW_PeaceCap_Desc_LCT: "Now is the time to die, do not bring yourself shame with delay!"
EaW_PeaceCap_Desc_DEP: "Unchanging, unyielding, undone."
EaW_PeaceCap_Desc_FRE: "Anam-Teine was of little use against guns and steel."
EaW_PeaceCap_Desc_RIV: "United they stood, united they fell."
EaW_PeaceCap_Desc_ZES: "Death is inevitable, but freedom is eternal."
EaW_PeaceCap_Desc_OLV: "The vikings pass into legend."
EaW_PeaceCap_Desc_BAR: "The madness finally ends."
EaW_PeaceCap_Desc_NCH: "All they wanted was love."
EaW_PeaceCap_Desc_FBK: "In these dark times, the sea brought them comfort."
EaW_PeaceCap_Desc_FIR: "You cannot hide in the woods forever."
EaW_PeaceCap_Desc_WAT: "The Holy Springs are tainted with blood."
EaW_PeaceCap_Desc_DED: "The dead are laid to their final rest."
EaW_PeaceCap_Desc_HLR: "Now their watch is ended."
EaW_PeaceCap_Desc_EWI: "The wind is silent."

EaW_PeaceCap_Desc_CTH: "Colthago delenda est."
EaW_PeaceCap_Desc_CTC: "The constitution is just a piece of paper."
EaW_PeaceCap_Desc_CTB: "Don't let it end like this. Tell them I said something."
EaW_PeaceCap_Desc_HIP: "They sink beneath the waves."
EaW_PeaceCap_Desc_HIP_posada: "Destruction always comes before creation."
EaW_PeaceCap_Desc_TBK: "The city has a new master."
EaW_PeaceCap_Desc_TBK_A: "Severyana has finally breathed its last."
EaW_PeaceCap_Desc_TBK_W: "The tricky thestral's smile has faded."
EaW_PeaceCap_Desc_TBK_B: "The end of a decrepit dynasty."
EaW_PeaceCap_Desc_ZAR: "In the end, the Aguellid's dream was just that."
EaW_PeaceCap_Desc_ZAR_worm: "A people spent at the behest of a raging god."
EaW_PeaceCap_Desc_BAT: "After a thousand years, the nightmare is over."
EaW_PeaceCap_Desc_HIE: "The Stars weren't right after all."
EaW_PeaceCap_Desc_CVA: "The Zeirutid dream is dead."
EaW_PeaceCap_Desc_TRO: "As it turns out, he was a crook."
EaW_PeaceCap_Desc_MZN: "She was right after all, she couldn't save them."
EaW_PeaceCap_Desc_WIN: "A mistake undone."
EaW_PeaceCap_Desc_CTL: "Conquerors or liberators, they all fall the same."
EaW_PeaceCap_Desc_KLG: "They were made an offer they couldn't refuse."
EaW_PeaceCap_Desc_ABY:0 "Your freedom will never be touched, as your mountains are defiant!" #and your natives do not fear any enemy
EaW_PeaceCap_Desc_ABY_patriots:0 "I will sacrifice all nine of my lives for Abyssinia!"
EaW_PeaceCap_Desc_ABY_slaves:0 "I'd rather die trying to take them down than giving them what they want."
EaW_PeaceCap_Desc_ABY_donkeystan:0 "Our hope is not yet lost, the hope of one thousand years."
EaW_PeaceCap_Desc_MDL:0 "Yesterday they were kings in their own homes, but today they are slaves." #in the land of disbelief
EaW_PeaceCap_Desc_ZAI:0 "Some secrets are best left buried in the sand."
EaW_PeaceCap_Desc_ZAI_2:0 "The lesser of two evils is no longer an option."
EaW_PeaceCap_Desc_ZAI_3:0 "Death is only the beginning."
EaW_PeaceCap_Desc_ZOO:0 "You can outrun the past, but you cannot outrun destiny."

EaW_PeaceCap_Desc_KIR: "Sorrow and flame engulf the Realm."
EaW_PeaceCap_Desc_KIR_1: "Autumn ends, and winter falls."
EaW_PeaceCap_Desc_KIR_2: "The sun sets, autumn ends, and winter falls."
EaW_PeaceCap_Desc_KIR_3: "The Silence has forever been broken."
EaW_PeaceCap_Desc_KIR_4: "The old cannot kill the young forever."
EaW_PeaceCap_Desc_KIR_DEL: "Vermilion makes its imperial debut."
EaW_PeaceCap_Desc_DEL_KIR: "What the hay?"
EaW_PeaceCap_Desc_KIC: "The prairie fire has been snuffed out."
EaW_PeaceCap_Desc_KIC_1: "An old fate befalls the new Matriarch."
EaW_PeaceCap_Desc_KIC_2: ""After me, the Inferno", said the Matriarch."
EaW_PeaceCap_Desc_UMC: "The Revolution devours its foals."
EaW_PeaceCap_Desc_KIS: "Kiria, kicking and screaming, rejected modernity."
EaW_PeaceCap_Desc_KIS_1: "An Empire crumbles, and a Dynasty dies."
EaW_PeaceCap_Desc_KIS_2: "The bloodletting is over."
EaW_PeaceCap_Desc_KIS_3: "Slaughter overwhelms reason."
EaW_PeaceCap_Desc_KIS_4: "The Iron Chrysanthemum withers on the vine."
EaW_PeaceCap_Desc_KIR_CORW: "The banqueters devour their own."
EaW_PeaceCap_Desc_NIRIK: "The beasts are put to the sword."
EaW_PeaceCap_Desc_NIRIK_1: "The Cacophony falls silent."
EaW_PeaceCap_Desc_KRF: "The fireships were their funeral pyres."
EaW_PeaceCap_Desc_FRV: "They faced their last fight, and lost."
EaW_PeaceCap_Desc_COC: "Their cries for justice were drowned in blood."
EaW_PeaceCap_Desc_NSA: "The flower of Kiria's youth, trampled underhoof."
EaW_PeaceCap_Desc_CFR: "The cancer is excised."
EaW_PeaceCap_Desc_CRF: "The Trident gouges another wound."
EaW_PeaceCap_Desc_RRA: "The blight spreads across Kiria."
EaW_PeaceCap_Desc_KXN: "Twice as Bright, Half as Long."
EaW_PeaceCap_Desc_KXN_Marching: "Their sins caught up with them at last."

EaW_PeaceCap_Desc_UFS:0 "They gave it their all, yet it wasn't enough.\nAnd so, the mad Kaiser looks to the stars..."
EaW_PeaceCap_Desc_KTZ:0 "Just... one... more... Cycle..."

EaW_PeaceCap_Desc_default: "War is Tartarus."
