 CRY_the_coronation:0 "The Coronation"
 CRY_the_coronation_desc:0 "#TODO: Flurry Heart has come of age, the time has come for her to fulfill her destiny as Princess of the Crystal Empire and ascend to rulership."
 CRY_the_modern_age:0 "The Modern Age"
 CRY_the_modern_age_desc:0 "#TODO: The world is rapidly changing, new technologies new beliefs, but Flurry is in tune with it all, a true child of the modern age."
 CRY_empire_of_exiles:0 "An Empire of Exiles"
 CRY_empire_of_exiles_desc:0 "#TODO: Theres plenty of non-harmonic and cruel regimes out there, and as long as creatures still hold hope in their heart, the empire will be a welcome place for them "
 CRY_crystal_pony_princess:0 "A Crystal Pony Princess"
 CRY_crystal_pony_princess_desc:0 "#TODO: Flurry Heart is the first true Crystal Princess, while her mother is beloved, none can compare to the joys of having one of our own on the throne."
