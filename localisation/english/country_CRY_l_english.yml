 crystalsombra.16.a:0 ""Soon, we'll know for sure.""

 crystalsombra.17.t:0 "The Return of the King" #Podrick
 crystalsombra.17.d:0 "All at once, shadowy masses erupted from every corner of Crystal City. They burst through floors and walls, damaging infrastructure and injuring ponies without regard as they beelined toward the city's center. The Crystal Palace royal guard, much less the city's police force, hardly had any time to react before the shadowy tendrils were upon them. What weapons they had seemed to have no effect, as every wound and hole punched in the tendrils immediately vanished, much like their hopes as they too were cast aside in one fell swoop.\n\nThere was a mad cackle - an all too familiar voice that froze the crystal ponies in their tracks. No, it couldn't be. Not again. All eyes turned to the burgeoning shadowy monstrosity that solidified before the palace, for atop it stood none other than Sombra. Those with keen vision could spot another pony behind him - an amethyst unicorn who seemed to be channeling magic into the dark king.\n\nOne by one, the guards fell to the almighty power of King Sombra. There was no battle, there was no struggle, for they were like ants beneath the magic of an umbrum.\n\n---\n\nSoon enough, the dust had settled, and the entirety of the city aside from the interior chambers of the Crystal Palace had been claimed. Sombra laughed once more as he effortlessly shattered the feeble protection spell erected by the last few guards and swept them aside.\n\nHowever, just before he entered the throne room, Radiant Hope ceased her channeling and called out to him. "Sombra, wait. There's one thing I-"\n\n"This is my moment of triumph!" Sombra roared, "What do you want, Hope?!"\n\n"Please, this is important! I did all of this for you, the least you can do is listen to me now. Then we can go inside."\n\nSombra grumbled in annoyance. "Fine.""
 crystalsombra.17.a:0 "Radiant Hope briefly spoke to Sombra of a personal matter."

 crystalsombra.18.t:0 "The Unthinkable" #Podrick #This event is sent to Equestria after Cadance and Shining Armor are killed
 crystalsombra.18.d:0 "Princess Celestia ended court early when she heard the news. She quietly excused herself to her private chambers, then sat in front of her dressing mirror. The room, too, was quiet. Even her tears were silent. Her mind, however, was not. The words, spoken with great care and hesitation by her aide earlier, repeatedly screamed inside of her head:\n\n"Princess Cadance and Shining Armor have been executed by King Sombra."\n\nIt seemed that the world was becoming rather unkind as of late. A memory surfaced of Celestia and Cadance sharing a laugh in the garden over Shining's silly habits and romantic tendencies. Of the pure, joyous love in Cadance as she spoke of her husband. They really did have everything.\n\nSuddenly, Celestia heard the telltale pop of a teleportation spell by her balcony. She knew who it was.\n\n"Princess Celestia!" Twilight Sparkle burst through the balcony doors and threw herself into the larger alicorn's hooves. Her horn still crackled as she cried. "He... he..."\n\nCelestia pulled her close and hugged her tightly. "I know, Twilight. I know."\n\n"M-my brother, he... he... and Cadance..." Twilight tried to press a hoof to her chest to calm down like Cadance had taught her, but couldn't manage it throughout her sobbing. "Flurry Heart!" Twilight looked up to Celestia with realization, "It's only a matter of time until..."\n\nCelestia's heart skipped a beat as she too realized that she was so distraught over Cadance and Shining that she had completely overlooked the fact that Sombra still had their daughter.\n\nTwilight continued, unabated, "Princess! HE HAS FLURRY HEART!" She paused to sniffle, then noticed that Celestia wasn't paying attention to her. Twilight shook the unresponsive alicorn and practically screamed, "PLEASE! WE HAVE TO DO SOMETHING! B-before..."\n\nFor a moment, Celestia did not recognize herself in the mirror. A flash of something else was there instead. She blinked, then turned to face Twilight. "Yes, we do. And we will...""
 crystalsombra.18.a:0 ""...though we must stay strong, Twilight. For Flurry."" #No effect
 crystalsombra.18.b:0 ""...make sure that Sombra pays for what he has done."" #Adds Daybreaker points

 crystalsombra.19.t:0 "Triumph" #Podrick
 crystalsombra.19.d:0 "The throne felt perfect. It wasn't just the physical sensation of comfort that bristled through Sombra's body as he sat down, but the knowledge that the world was finally the way it should be: With him at the top, and the former royal family restrained at his hooves.\n\nShortly after Hope had finished speaking with Sombra, those she had conscripted to aid him in taking down the royal couple arrived. While he did not need them, they would be excellent witnesses to his ascension.\n\nPrincess Mi Amore Cadenza, or Cadance as she called herself, was in the midst of preparing a spell when Sombra blasted her with corrupting magic. Her husband had also fallen in short order. It was all quite anti-climactic, Sombra thought as he got accustomed to the throne.\n\nSo absorbed was Sombra in his success that he did not notice the royal couple looking at each other. It was said that love connected all creatures, and in that moment it connected both wife and husband. Without exchanging a word, novels were spoken between them. They knew what had to be done. What needed to be done. What they did not know was if they had the courage to do it. They were restrained and surrounded, and the only guarantee was that Sombra would be obliterated.\n\n"It is a beautiful day outside, isn't it?" Sombra mused, "Quite fitting that my rightful return to the throne should occur with peaceful weather. Why, with how little resistance I had getting here, it may as well have been a peaceful transition of power!" He laughed, then turned his attention to the couple beneath him. "But as we all know, such transitions must be made official."\n\nSombra leaned forward, then grinned sadistically as he issued his first command as ruler of the Crystal Empire: "Kneel."\n\nCadance and Shining Armor exchanged one last look at each other. Hope and fear filled their eyes - hope for the future, but fear for themselves, their daughter, and the empire as a whole. In the end..."
 crystalsombra.19.a:0 "...The royal couple knelt before King Sombra." #Everyone lives
 crystalsombra.19.b:0 "...The royal couple decided to risk everything." #leads to Cadance, Shining, and Radiant Hope all dying

 crystalsombra.20.t:0 "All Hail The King" #Podrick #will need dynamic loc to replace YOU with the character name the player enters
 crystalsombra.20.d:0 "A deafening silence spread throughout the room as Princess Cadance and Shining Armor knelt before King Sombra. The gravity of this action seemed to permeate throughout the room, as every spectator, from Radiant Hope to those that had aided her suddenly knew that any chance of resistance was gone. Sombra had won - the Crystal Empire was his once more.\n\n"Good, good." Sombra hopped off of the throne to stand before the former royals. His grin widened as he magically lifted a sword from a nearby fallen guard. "Now to exact my revenge-"\n\n"Sombra!" Radiant Hope cried out as she ran over to him. "It's over," she whispered, laying a hoof on him. "They can't do anything to you anymore." She hesitated, worry strewn across her face. "If you hurt them, you'll lose your only leverage over Equestria."\n\n"Clever as ever, Hope." After a moment, Sombra lowered his blade. "You're right. I see no reason to stain the carpets here." He turned to one of those that had aided her, a pony Hope recognized as YOU. "You there, see to it that the former royal family is imprisoned. After that, come back here. I am a generous king, and I will reward those who have helped restore me to my rightful place."\n\n"O-of course, King Sombra!" said YOU, who proceeded to guide the former royals to the palace dungeons. Surprisingly, they offered no resistance, nor did they make any attempt to escape.\n\nNow with the final nail in the previous regime's metaphorical coffin secured, Sombra enjoyed a sensation he had not experienced for far, far too long: Contentment. There were of course a few matters to attend to, though any resistance or bureaucratic issues would soon be settled by mass mind control, as he had done so before. He returned to his throne and cackled, imagining how much he was going to enjoy crushing the crystal ponies under his hoof once more.\n\nTo cap everything off, many of his supporters shouted in unison as he sat upon the throne:"
 crystalsombra.20.a:0 ""HAIL SOMBRA! LONG LIVE THE KING!""

 crystalsombra.21.t:0 "A Death A Millennium Overdue" #rewrite
 crystalsombra.21.d:0 "He had threatened their daughter. There was no doubt as to what had to be done. Maybe they weren't going to make it out of here. Maybe. But they would take the King of Monsters down one way or another. For the Empire. For their daughter. Mi Amore Cadenza and her husband Shining Armor stepped forward. Cadance knew that the power of an alicorn was no small thing. With their powers combined, they would vanish this darkness. As their horns began to glow, magic melded and intermixed.\n\nThe science of magic was a difficult thing to understand. Thaumaturgical research in the sense of the modern scientific method was, in truth, in its infancy. But in the oral traditions of the Empire, love itself was often considered magical. There was something inherently ineffable about the experience of adoration, not simply of another creature, but of one's community, friends, life itself even. There was power in that love; the kind that could vanquish the strongest hatred. In that maxim did the lovers' faith lie.\n\nGuards moved inwards, weapons drawn. But they would make little impact. As they closed in on the pair, even as some raised their weapons to fire, it all happened so fast. The King's lover, too, stepped forward. What little warning there was came to an abrupt end as quickly as it came, only a few seconds having passed between the first steps and the glow coalescing, ready to seek its quarry.\n\nOne, singular beam crackled outwards. A shockwave hit the room as the sound barrier was demolished by the photonic volley. It searched for its target, the King of Monsters, the life which it would render asunder. And it found life. Eviscerated it. That life had been Radiant Hope, who had stepped in front of her lover to protect him.\n\nShe fell to the ground, scarlet spreading across the floor."
 crystalsombra.21.a:0 "The King of Monsters dropped to his knees. "HEALER! GUARDS, GET A HEALER!""

 crystalsombra.22.t:0 "Justice" #rewrite
 crystalsombra.22.d:0 "His hooves rushing to hold her, to cradle her, Sombra sputtered and choked out words in-between sobs. "Radiant! Radiant, just hold on, okay? They're getting someone. They're going to help you. It's going to be alright," he said. Tears began to fall onto her.\n\n"Sombra...?" Radiant Hope creaked out. She was barely able to speak; life drained quickly from her. "You're okay? That's— that's good…!"\n\n"I'm okay, you saved me! You did, my love. And I'm going to save you too, so just hang on. Please, just a little longer."\n\n"No, no. It's..." she trailed off, limply falling against his hold, "It's okay. I helped. I helped. I love..." she smiled. It was the last thing she said. Her last breath left her.\n\nThere was nothing Sombra could do. He was a destroyer, a warrior, not a healer. She had been the healer. She was the one who had put him back together. She had been someone worth fighting for. If love was magical, she had been his source. The room was still, nobody moved, nobody dared to. Finally, Sombra snapped upwards, his gaze locked on the former royal couple.\n\n"You killed her!" Sombra screamed. His stocky, stilted phonemes sloughed off of his vocal cords with little enthusiasm. They could barely leave him between his tears.\n\n"I didn't mean to!" Cadance insisted. "It was you! We were going to kill you!"\n\n"SHUT UP!" he shouted back. "She would have resurrected me, made me spare you, she was everything you aren't. You..." he said, losing his will to say anything more. He stepped forward. He would tend to his beloved's body later, after he avenged her. Dragging the pair out to the balcony, crowds of supporters greeted him. A new era was upon them, but not for Sombra.\n\nThrowing them down, he took his blade and raised it towards the sky. In front of the world, he would have his revenge. They took everything from him. His sole regret was that he could only kill them once. The lovers embraced each other, killed in the same swing of his sword. The crowd cheered. He did not share their excitement."
 crystalsombra.22.a:0 "The Cycle of Hate turns onwards, evermore."

 crystalsombra.23.t:0 "Learning the New Lingo"
 crystalsombra.23.d:0 "#TODO: Sombra reviews a modern army, from rifles to cannons to tanks and aircraft. He's astounded by their potential. But he is very confused about... everything related to them, really. He can't even imagine the idea of killing someone you can't even see. And when he doesn't understand, he gets frustrated."
 crystalsombra.23.a:0 "This may take a while..."

 crystalsombra.24.t:0 "Hope's Dreams"
 crystalsombra.24.d:0 "It had been a few months since King Sombra had taken over the Crystal Empire. The few rebel movements that opposed him had been enslaved, and the protesters mind-controlled. With the old royal family facing the threat of execution if Equestria dared to attempt to remove him from power, his rule was now truly secured.\n\nAs Sombra looked over Crystal City from his balcony, he allowed himself a grin. "I do enjoy a good view," he mused, "It makes it all the better that everything I behold belongs to me."\n\n"Yes, it does." Sombra instantly recognized the voice as Radiant Hope's. She joined him to look over the brilliant city. Sombra noted that she wasn't smiling - she hadn't smiled much lately.\n\n"Why do you look out there, Hope? It only seems to upset you."\n\nHope didn't meet his eyes. "I heard that you had executed a particularly troublesome rebel."\n\n"Of course," Sombra stated with a hint of surprise, "You know as well as I do that there can be no opposition to my rule. And now, there isn't."\n\n"That's good," Hope deadpanned, "So now we've won, right? We can live here happily together?"\n\n"Well, not quite yet. We need to expand the empire, so at some point, we will make plans to attack Equestria, Yakyakistan, and others who might threaten us."\n\nHope looked absolutely dejected. "Oh, so then you'll be done?"\n\nSombra turned to face her, shocked at her remarks. "Hope, this is only the beginning! Then there's the changelings and the griffons! And even beyond them, there are other threats!"\n\nThere was silence between them for some time. A tear fell down Hope's cheek as she turned to look at him. "I know you won't change your mind on your goals, but... can you promise me something?" Hope paused, trying to stifle a crying fit, "Can you promise me that you'll at least try to be better? That you'll be nicer to ponies sometimes? For me?""
 crystalsombra.24.a:0 "Sombra tried to hide his frustration. "If it makes you happy, I'll think about it.""

 crystalsombra.25.t:0 "A Funny Idea"
 crystalsombra.25.d:0 ""Hold on, what was that you just said?"\n\nThe servant hesitated, afraid that she'd just said something incorrect. "The workers of Stalliongrad have officially ended all trade with the Crystal Empire, my king."\n\nKing Sombra leaned forward from his throne, confusion abundant on his face and in his voice. "What do you mean, 'the workers?' Where's their monarch, or equivalent?"\n\n"Well, um, they don't have one. Stalliongrad's authority lies with the common pony. They believe in an idea called 'communism', which means that the, ah, well, everything is owned collectively by the whole and distributed evenly to all, and that every worker has an equal say in determining how the government is run. Even their elected official is one such worker."\n\n"You mean to tell me that this nation is run by... peasants?"\n\nThe servant looked increasingly nervous as she tried to explain. "Well, their elected official represents all, even the most destitute, but basically, yes."\n\nFor a moment, Sombra stared at her, incredulous. Then, he tilted his head back and exploded with wild laughter. His body shook, and he doubled over, smashing his hoof on his throne. When he finally finished laughing, he wheezed. "'Communism'... Hah! That's new. Never, in all my years, have I heard anything so unbelievably stupid. To think that a mere peasant would be able to sit upon a throne and command other peasants around, it's hilariously insane."\n\nThe servant bit her tongue. "Well, my king, they do earnestly believe that the system works. And their ideas are... infectious, to say the least."\n\nSombra waved a hoof dismissively, still recovering from his bout of laughter. "It's obviously a ploy by a grand trickster to make their slaves believe that they have power. Anyone who seriously believes in the idea of 'communism' must be the biggest sucker in the world." He cleared his throat, having finally caught his breath, "I almost want to meet their 'elected official' and share a laugh over how they've played their underlings."\n\n"Well, um, their messengers are still here in Crystal City, if you want to organize a meeting."\n\n"Is that so?" Sombra grinned, imagining how this entire joke of a country would be even funnier once he confirmed his suspicions. "I'll consider it.""
 crystalsombra.25.a:0 ""Rule of the common worker." I've never heard a greater joke than that!"

 crystalsombra.26.t:0 "One Nation Under Me"
 crystalsombra.26.d:0 "#TODO: Sombra begins the mass mind control. He's still working on building his power up, but it's ferociously powerful already."
 crystalsombra.26.a:0 "Glory awaits."

 crystalsombra.27.t:0 "Our Southern Border"
 crystalsombra.27.d1:0 "#TODO: (NO-ECW) Radiant begs with Sombra not to launch an invasion of Equestria, as it will be destructive and costly and will show the world a vision of him as a tyrant. He replies he IS a tyrant, and she pleads that she KNOWS he's better than this. Surely there's room in the world for both Equestria and the Crystal Empire? Right?"
 crystalsombra.27.d2:0 "#TODO: (ECW) Radiant begs with Sombra not to launch an invasion of Equestria, as Celestia will surely be open to forgiving if he helps her defeat NMM. He replies that that's unlikely, and even if she is, wouldn't it make more sense to strike them both when they're distracted?"
 crystalsombra.27.a:0 ""I'm sorry, Hope. Destiny calls me.""
 crystalsombra.27.b:0 ""For you, I will leave them be for now.""
 crystalsombra.27.c:0 ""For you, I will leave them be for now.""

 crystalsombra.28.t:0 "Ruling Together"
 crystalsombra.28.d:0 "#TODO: Radiant marries Sombra, they formally rule together. Should be kinda wholesome because you avoided the worst outcomes. However Hope is convincing herself that things are okay."
 crystalsombra.28.a:0 "Yay."

 crystalsombra.29.t:0 "A Demand from the South"
 crystalsombra.29.d:0 "#TODO: (PNG/PLB/JAK POV) Sombra wants to turn us into a puppet state, in return for industrial aid and protection. What do we do?"
 crystalsombra.29.a:0 "We stand together."
 crystalsombra.29.b:0 "Absolutely not!"

 crystalsombra.30.t:0 "The Future of Warfare"
 crystalsombra.30.d:0 "#TODO: Sombra listens to a scientist explain the idea of a ballistic missile, and is instantly completely sold. He says that this will be a high priority, to ensure that the Crystal Empire is never attacked again--that every war is on HIS terms!"
 crystalsombra.30.a:0 "Soon..."

 crystalsombra.31.t:0 "Mob Justice"
 crystalsombra.31.d:0 "#TODO: Sombra decides, to boost his popularity, he will hand over some of his most awful underlings to the mobs that want them dead. In particular, Jasper Corvid is left undefended and promptly murdered by a mob. This boosts Sombra's public image a bit, but does not endear him to his inner circle."
 crystalsombra.31.a:0 "Deserved, he was a creep."

 crystalsombra.32.t:0 "Falling Out"
 crystalsombra.32.d:0 ""You lied to me! You promised you'd try to be better!"\n\n"I promised no such thing, Hope. Is this about the palace servant that I executed for spying on me? I already told you that he was a traitor, and traitors only deserve death."\n\nIt was all Radiant Hope could do to hold herself together as Sombra dismissed her concerns yet again. She'd tried having heart-to-heart talks. She'd tried having patience. She'd even tried compromising. It was only after one crying fit at another atrocity he had committed that she had a horrible, heartbreaking realization: Sombra was, at best, placating her. He had no intention of ever truly committing to her wishes.\n\nTears streamed down Hope's eyes as all of the bottled emotions she had stuffed down surfaced at once. "I thought you cared about me! Why won't you listen to me?!"\n\nSombra sighed in frustration, then turned his full attention to her. "I do care about you, Hope, but you're making this very difficult. When will you see that my methods are the best way to ensure my reign lasts forever?"\n\n"OUR reign, Sombra! You said-" Hope struggled through her uncontrolled sobbing, "-You said we'd rule together! That we'd... that we'd..."\n\n"That what? You're acting hysterical, Hope." Sombra scoffed, "Why don't you go get some rest? Once you've stopped bawling like a foal, we can converse like normal ponies."\n\n"...No." Hope wiped her tears away, then mustered what was left of her courage. This wasn't the life that she wanted, to rule others through fear and suffering. She latched onto what Sombra had just said: he cared about her. Things were so terrible right now; she no longer had a choice in what to do. There was only one option, one way that could fix everything. But deep down, she was afraid that she already knew what the outcome would be. "Sombra, this ends NOW. It's me, or your precious Crystal Empire. What do you want more?"\n\nSombra stared at the only pony that had ever cared about him for what seemed like an eternity to both of them. Eventually, he broke more than just the silence. "The Crystal Empire."\n\nSomehow, the quiet that followed was even more deafening. Hope's crying gave way to full-blown despair as Sombra coldly watched her turn and run away."
 crystalsombra.32.a:0 "Let her leave. I never needed her then, and I don't need her now." # leads to crystalsombra.34
 crystalsombra.32.b:0 "Have her apprehended. I'll show her that I'm right, one way or another." # leads to crystalsombra.33

 crystalsombra.33.t:0 "No Hope"
 crystalsombra.33.d:0 "#TODO: Sombra has just conquered the continent, and Radiant still won't talk to him. He decides to visit her  house, and he finds her dead--she's killed herself. He has a moment of anagnorisis, realizing that he has screwed up massively, before reasserting himself--she was weak. She was always weak. He will rule alone!"
 crystalsombra.33.a:0 "So be it."

 crystalsombra.34.t:0 "Parallel Destinies"
 crystalsombra.34.d:0 "#TODO: Sombra has just conquered the continent, and Radiant hasn't seen him in months. As he ponders how things went so wrong, a strange report comes in--Radiant has rallied the partisans and rebels, and is now apparently their leader!"
 crystalsombra.34.a:0 "I will protect my empire at any cost!"
 crystalsombra.34.b:0 "I will save the world, no matter what it takes..."



 radianthope.1.t:0 "First Date"
 radianthope.1.d:0 "#TODO: Sombra and Radiant go on a nice first date, spending time together not as king and subject, but as friends and maybe more. They laugh and play, but then things turn a little more sour when Radiant says that she knows Sombra can be better. He didn't use to be this evil, and it's on him to be less evil now. She warns him that as much as she loves him, if he refuses to even try to be better, she won't want to spend time with him."
 radianthope.1.a:0 ""Ugh, fine, I'll give it a shot. For you.""

 radianthope.2.t:0 "Royal Setting"
 radianthope.2.d:0 "#TODO: Radiant begs and pleads with Sombra to move the former royals from maximum-security to house arrest. He can still keep an eye on them but they'll be much more comfortable and it'll show the world that he's not pure evil. He thinks it over, responding:"
 radianthope.2.a:0 ""So be it - but I won't hesitate if they try to escape.""
 radianthope.2.b:0 ""This is ridiculous--they KILLED me!""

 radianthope.3.t:0 "House Call"
 radianthope.3.d:0 "#TODO: Radiant meets with the Crystal Royals, having now secured house arrest for them instead of prison. They are grateful but urge her to help them overthrow Sombra. She flatly refuses, saying she loves him and this just PROVED there was good in him. They say that he's still a tyrannical autocrat, and if she helps them, they'll give her a full pardon. She replies that unless they're sparing SOMBRA's life too, that's not good enough. Cadance says that there are countless ponies who are still suffering and one right (treating the royal family better) doesn't excuse a million wrongs. Radiant says she'll consider it but don't expect her to agree."
 radianthope.3.a:0 ""Think about it, okay?""

 radianthope.4.t:0 "Prison Meeting"
 radianthope.4.d:0 "#TODO: Radiant meets with the Crystal Royals, having just failed to get them to be moved out of prison. They say this shows that he hasn't changed, that he's still the cold tyrant he's been. She hesitates, saying that she's very disappointed in him, but she has to believe there's still good in him. Cadance asks how long is she going to keep lying to herself? What will it take for her to see him for what he truly is?"
 radianthope.4.a:0 ""I... I don't know.""



 sadsombra.1.t:0 "Memories and a Funeral"
 sadsombra.1.d:0 "#TODO: Sombra attends a huge funeral for Hope. He takes the stand and talks about their life together, how they grew up in the same orphanage, how she resurrected him after the Crystal Royals killed him, and how without her life feels empty. He rages against the Crystal Royals, and makes it clear there will be no memorial for them--they are vile murderers! He could forgive their regicide against him, but killing his best friend is something he can never forgive."
 sadsombra.1.a:0 "Let the murderers rot"

 sadsombra.2.t:0 "State Funeral" # TODO
 sadsombra.2.d:0 "#TODO: ."
 sadsombra.2.a:0 "Let the murderers rot."

 sadsombra.3.t:0 "Something" # TODO
 sadsombra.3.d:0 "#TODO: ."
 sadsombra.3.a:0 "Let the murderers rot."


 sadsombra.4.t:0 "Because I Promised" #Podrick #Sombra spares Flurry Heart
 sadsombra.4.d:0 "King Sombra sat silently upon the throne of the Crystal Empire. It had not been very long since he had taken over the palace. The former royal couple's housekeepers had attempted to escape, but were now mind-controlled and forced to continue their work. Many of the guards had suffered a similar fate, though far more of them had died in the fighting than he would have liked.\n\nAs for the former royal couple, Sombra would have loved to make a mocking display of their corpses, but truth be told, he was not in the best mood. Sure, he had gotten what he wanted, but...\n\nHe looked at the smaller, empty throne next to him. Radiant Hope wasn't here to enjoy this victory with him. It was still hard to believe that she was gone.\n\nSombra sighed. He didn't love her, at least not in the way she seemed to love him, but he did genuinely care about her. She was... misguided, but the effort she had gone through to restore him was commendable, and he respected that. He respected her, he supposed. He just couldn't fathom actually loving another pony. It seemed foalish, and yet...\n\n"My King," A mage who had aided Sombra in the coup entered the throne room with a black sack in tow, "We have found a foal hiding in the kitchen—the spawn of the royal couple. What shall we do with her?"\n\nAs Sombra processed this information, the mage unceremoniously dumped the foal out of the bag onto the floor before him. Her mouth had been taped shut, her wings bound, and a magical suppression ring placed upon her horn. Only then did Sombra hear her muted bawling. He snarled. "Be silent, you insufferable whelp!"\n\nHis command did little to quell the small foal, whose cries only intensified. The mage stepped forward, "My King, shall we dispose of this one like her parents?"\n\nThe king's gaze burned into the sobbing wreck of a foal, barely more than a toddler. Her parents had torn Hope from this world, and as he opened his mouth to order her execution, he suddenly heard Hope's voice in the back of his mind:\n\n"...Please just promise me this one thing: When you get your revenge on Cadance and Shining Armor, don't hurt their daughter. She had no role in anything. Do this for me... please...""
 sadsombra.4.a:0 "King Sombra grimaced and looked away. "Leave her be.""

 sadsombra.5.t:0 "A Glimmer of Hope"
 sadsombra.5.d:0 "#TODO: Sombra orders the nation's most talented necromancers--including Jasper Corvid--to try to resurrect Radiant Hope. They all try their best, but they cannot do it. She was alive too long, and the spell the Crystal Royals used was custom-tailored to prevent resurrection. He furiously threatens them with execution, but they're telling the truth. As that sets in, he breaks down sobbing and retires to his room. There he starts hearing dark voices telling him it was always going to be this way."
 sadsombra.5.a:0 "It's really over, isn't it?"


 sadsombra.6.t:0 "A Hopeless Choice" #Podrick #Sombra chooses whether to release the umbrum or not
 sadsombra.6.d:0 "The crypt was as silent as a grave. King Sombra should have expected as much, yet it still caught him off guard. He glanced at the dead torches on the wall as he descended the stairs—their magical light had long since been extinguished. There was only the glow of his horn to illuminate his journey to the place he had been drawn to ever since he was a foal. Now it was here, and so was he.\n\nThe door to the realm of the umbrum. Those who had given him form and power.\n\nIt looked rather ordinary, all things considered—just a dusty wooden door with a simple-looking latch. Sombra stared at the thing as he slowly approached it. Would releasing the umbrum really be that simple? Just opening a single old door?\n\nWould Rabia be pleased with him, given how long she and the others have been imprisoned?\n\nSombra reached out a hoof to the latch. Despite knowing deep within him that this was what he was meant to do, he couldn't help but think of what Radiant Hope had said to him just before they dethroned Shining Armor and Princess Cadance: "We'll build a Crystal Empire to be forever remembered."\n\nHe gazed at the latch. If he opened this door, there was a good chance that the umbrum would destroy the Crystal Empire as retribution for their imprisonment. Sure, he would be fine, but...\n\nThe scene of Hope lying on the cold floor of the throne room flashed through his mind again. The memory was still raw, giving him pause. She had died to save him from that cursed couple. Was it not the least he could do to preserve the Crystal Empire? Or should he make the city a funeral pyre in her name?"
 sadsombra.6.a:0 "After a moment, Sombra pulled up the latch and yanked the door open."
 sadsombra.6.b:0 "After a moment, Sombra turned and walked away."

 sadsombra.7.t:0 "No More Collaboration"
 sadsombra.7.d:0 "#TODO: Rabia enslaves Sombra's entire Royal Court and puts Umbrum in charge of things now. Should be an event of panicked horror."
 sadsombra.7.a:0 "Blood is thicker than water."

 sadsombra.8.t:0 "The End of the State"
 sadsombra.8.d:0 "#TODO: Rabia dissolves the government, the army, and indeed everything. She will be a pure autocrat, with her fellow Umbrum ruling under her in his name."
 sadsombra.8.a:0 "Fitting punishment."

 sadsombra.9.t:0 "Loose Ends"
 sadsombra.9.d:0 "#TODO: Rabia tries to convince Sombra to kill Flurry, but he hesitates. She asks him if he's gone soft. She tells him as long as the kid lives there will be the threat of an Amorist restoration. He says it doesn't matter. Rabia slips away, reflecting on the fact that he may need to be replaced..."
 sadsombra.9.a:0 "Hmmmm..."

 sadsombra.10.t:0 "The Lady of Shadows"
 sadsombra.10.d:0 ""How curious."\n\nThe ethereal voice reverberated throughout the throne room, echoing out into every crevice in every room of the palace. With just those two words it commanded attention. Reverence. Fear. Fittingly, the only one who did not cower or cringe was the very individual who unleashed it. King Sombra stood alone in the throne room, waiting for Lady Rabia of the Umbrum to appear. "What do you find curious, mother?"\n\n"You." The voice circled around him as the shadows lengthened on the walls. "You let her go. You let the scion of the Amore bloodline go. Despite what they did to me. To us." It crept up to his ear. "To you." It hissed now, like shredded parchment or dead skin. "Why?"\n\nSombra forced himself to stare straight ahead. "Because I promised."\n\nA silence. "The ponies have poisoned you." The shadows oozed around the throne, shapes of things in the shapes of ponies without distinct form. "As you have proven yourself incapable of ruling as an umbrum should, I will be stripping your crown from you." Sombra grit his teeth.\n\nThe shadow exploded off the throne, the shape of a grinning skull and eyes burning with coals of frozen fire rushing down to Sombra. Without hesitation, Lady Rabia magically slammed him to the ground and placed a shadowy hoof upon his head. "You exist to serve. I created you. I can just as easily destroy you." The hoof dug deeper into his skull. "You will command my armies."\n\n"Y-Yes, mother," coughed Sombra. He wanted to snarl, but she was right. He was not strong enough to defeat her.\n\n"Now," Rabia turned her gaze outward, as if staring through the palace walls at the entire Crystal Empire, "The world will regret letting an Amore live. And when I capture her," she seemed to breathe in despite the skeletal frame of her body, "You will fix your mistake.""
 sadsombra.10.a:0 "Soon, ponykind and beyond will know the true meaning of fear."

 sadsombra.11.t:0 "An Unexpected Arrival" #Podrick #Flurry Heart arrives in owner of Canterlot state
 sadsombra.11.d:0 "Just today, a tiny, hooded figure was apprehended on the outskirts of [ROOT.capital.GetCapitalVictoryPointName] after trying to steal food from a traveling merchant. To the surprise of local law enforcement, the figure turned out to be none other than the daughter of the former royal couple of the Crystal Empire: Flurry Heart. The filly, who was no older than five, had somehow traveled all the way from Crystal City to here without being spotted.\n\nFlurry was brought to a nearby medical facility after displaying visible bruises on her legs. Medical staff determined that she was underweight, but not dangerously so, while her bruises were minor in nature. Flurry claimed she got "bumps" from sleeping outside.\n\nWhen asked how she was able to escape King Sombra, she stated, "I didn't wanna go but he made me. He was scary, but he looked scared, too. He told me not to let anypony see me or the 'um broom' would get me."\n\nFor now, [ROOT.GetLeader] has determined that the best course of action is to place the young alicorn with a specially selected foster family while she recovers and while the Crystal Empire remains a threat. In time, her presence may prove useful, but for now, she is simply a child in desperate need of a normal childhood."
 sadsombra.11.a:0 "Why did Sombra let her go?"

 sadsombra.12.t:0 "Sibling Conversation"
 sadsombra.12.d:0 "#TODO: Ira sees Sombra brooding and asks him what's got him so upset. He replies that he knows he should respect Rabia since she's his mother, but she's so cold and distant and cruel that he is grappling with the concept of fearing someone else rather than being feared himself. Ira replies that's how she feels too, but she knows their mother is incredibly powerful so she is right to rule. Sombra pauses a bit, and then asks Ira if the umbrum were always this way, or if something occurred to make them like this. Ira shrugs noncommittally - what does it matter? Sombra replies that he had the opportunity to reject his umbrum heritage as a pony, but chose to embrace it. But the only thing he knows about his umbrum heritage is what Rabia says. He wants Ira to help him figure out the history of the umbrum and how they came into being, and if this is all they will ever be. She still thinks it's silly but agrees."
 sadsombra.12.a:0 ""I will think about it, Sombra.""

 sadsombra.13.t:0 "Ira's Wanderings"
 sadsombra.13.d:0 "#TODO: Ira goes around the Empire, meeting Umbrum far and wide. None of them seem to want anything different than the conquest, misery, and despair they bring and feed upon. Ira reflects that perhaps this is just how they are, that they were created to doom all other life. Why else would they have such powers?"
 sadsombra.13.a:0 ""Someone must remember the old ways.""

 sadsombra.14.t:0 "Ira's History Lesson"
 sadsombra.14.d:0 "#TODO: Ira asks Rabia about the time before she took power. Rabia snorts, asking why Ira cares about that benighted age. Ira just says she's curious and wants to learn. Rabia rolls her eyes, and says that all those millennia ago, the Umbrum were weak. They were disunited and did as they pleased--whether that meant terrorizing the Crystal Ponies, or trying to coexist peacefully. She spits the last two words like venom. She united them, made them feared and mighty, mastered dark magic, fed upon mortal misery, and it was a glorious time of suffering--until Princess Amore imprisoned them."
 sadsombra.14.a:0 ""Thank you, Mother.""

 sadsombra.15.t:0 "Ira's Destiny"
 sadsombra.15.d:0 "#TODO: Ira thinks about what she's learned. Rabia just confirmed that umbrum aren't biologically evil... but even today, now free, none of them want to be good. As she walks the streets, ponies flee and cower. She hesitates as she sees a young foal trip over some rubble, and beg her for mercy. She doesn't have to do this. She is blessed with free will, and she can choose kindness. But then she remembers the centuries of imprisonment. The torture her brother suffered at Amore's hooves. Even if she chooses to be better, what would it matter? Her mother would probably kill her for her 'weakness'. After a moment, she unleashes her fear magic on the foal, and drains their terror with a smile."
 sadsombra.15.a:0 ""We are our choices, and I choose to lead ponykind into darkness."" 

 sadsombra.16.t:0 "The End of the City"
 sadsombra.16.d:0 "#TODO: Rabia unleashes all her power with a terrible ritual to shatter the very foundations of the Crystal City. It's equivalent to a thermonuclear bomb being dropped on their own capital. Ira and Sombra are both horrified, but she is very smug and confident."
 sadsombra.16.a:0 ""Let this remind you of my true power."" 



 flurryheart.1.t:0 "Flurry Heart's Life - Age 4"
 flurryheart.1.d:0 ""Choo choo! Watch out for the twain!" yelled Flurry Heart as she slowly inched the toy train toward the station. Unfortunately, it was too late: the tiny pony figures she had placed on the train tracks could not move out of the way. "Oh no!" she exclaimed as she suddenly sped up the train and barreled through the innocent civilians. "Emerga- emgarge- emm-err-jen-see! It's an emmerrjensee!"\n\nThe young filly burst into a fit of giggles as she rapidly smashed the train into the toy ponies again and again. Her parents were nearby, enjoying one another's company as they shared some hot cocoa. Or at least, they were, until their darling daughter ignited her horn and blew up the toy train with a magical blast.\n\n"Flurry!" Princess Cadance raised her voice, "What did we say about using magic like that?"\n\n"Sorry mommy. It was a bad twain. Twains shouldn't hurt ponies."\n\nShining Armor chuckled as he took a sip from the cocoa. "At least her heart's in the right place."\n\nCadance smiled tenderly, "It's okay, Flurry. Maybe next time you can save the ponies from the train so they don't get hurt?"\n\n"Okay! Next time I will save all the ponies from the evil twains! Like how Pwincess Mommypants saved all the ponies from Queen Stinkybug!"\n\nShining tried to suppress his own giggling while Cadance shot him an accusatory look. He put up his hooves to feign innocence, then Cadance rolled her eyes and returned her gaze to her daughter. "Flurry, mommy is the Princess of Love, remember? And you're an alicorn like mommy, so do you know what that means?"\n\n"I'm a pwincess!"\n\nCadance smiled, "Not yet, but you will be. Have you picked what you want to be the princess of yet? Flowers? Or maybe candy?"\n\nFlurry Heart sat in thought for a moment before she jumped up and excitedly shouted,"
 flurryheart.1.a:0 ""I wanna be the pwincess of explodings!""

 flurryheart.2.t:0 "Flurry Heart's Life - Age 6"
 flurryheart.2.d:0 "#TODO: Flurry Heart is six years old, having talked Cadance into getting a goldfish. It has died due to her being a rambunctious filly and forgetting to feed the poor thing. Flurry initially just wants to get another one but breaks down crying. Flurry is heartbroken and Cadance comforts her. She asks if its her fault. Cadance admits it is, but theres ways to do better. She can work with her daily calendar and make a promise. Flurry decides its more important to:"
 flurryheart.2.a:0 ">Daily planning. This gives her a planning related trait.!"
 flurryheart.2.b:0 ">Promise to do better. This gives her Bleeding Heart/Compassionate."


 flurryheart.3.t:0 "Flurry Heart's Life - Age 8"
 flurryheart.3.d:0 "#TODO Flurry Heart is eight years old. This is normally at the height of the intended Great War, but we can keep it vague. Shining Armor is back from his frontline job, weary, and has promised to read to her. Hes selected his old favorite “Sharp the Shieldpony” which is a series about a northern pony defending the outlands from Equestria in the distant past. (Its a very nerdy O&O thing). Flurry, however, has selected “A Court of Swords and Claws” which is Griffon historical fiction about Grover Is conquests. Shining agrees to read it while leaving out the “bad bits,” but tries to convince Flurry his book about defending ponies is more interesting. After some thought, Flurry decides"
 flurryheart.3.a:0 ">Shieldpony. Gains “Inflexible Strategist”"
 flurryheart.3.b:0 ">Griffons. Gains “Brilliant Strategist”"

 flurryheart.4.t:0 "Flurry Heart's Life - Age 10"
 flurryheart.4.d:0 "#TODO Flurry Heart is ten years old. She is incredibly bored listening to Sunburst drone on about court etiquette and modern appeals since she has to feign interest while making public appearances now. Sunburst realizes shes not interested so changes topics to her ancestor Amore and old crystal pony traditions like the foundation of the Crystal City and how it was built, which perks Flurry up. She wants to know more about it, even if a lot of stuff is outdated now by modern technology. Sunburst warns her shes going to have to redouble her efforts later to catch up, so Flurry decides"
 flurryheart.4.a:0 ">The Old Ways. Gains Construction bonus traits."
 flurryheart.4.b:0 ">The New Ways. Gains research speed."

 flurryheart.5.t:0 "Flurry Heart's Life - Age 12"
 flurryheart.5.d:0 "#TODO Flurry Heart is twelve years old. She is a Crystal Cadet and assigned to help her father out. She doesnt really do much outside of sitting with him and studying paperwork. During downtime, she asks him about overhearing some of his officers call changelings “bugs” along with “reds” and other poor language. He asks who said that, and she says he was there; it was at an earlier meeting. Shouldnt he tell them to be nice? Shining admits he shouldve, but not to judge them. Soldiers say things they dont mean when theyre scared, and its the job of their leaders to inspire them as well as correct them. Flurry decides its more important to"
 flurryheart.5.a:0 ">Be an inspiration. Gains charismatic."
 flurryheart.5.b:0 ">Be organized. Gains an organizational trait."

 flurryheart.6.t:0 "Flurry Heart's Life - Age 14"
 flurryheart.6.d:0 "#TODO Flurry Heart is fourteen years old. Shes a late bloomer with her cutie mark and tired, so sneaks out with some of the other cadets and young palace guards to try some Crystalberry Wine. Shes pulled rank to get it. They all sit down in the park, hiding from the guard patrols sent to look for Flurry, and talk; Flurry hates the wine, but gets to know everypony better and how they feel, if theyre scared of ever seeing combat. Flurry feels"
 flurryheart.6.a:0 ">A sense of camaraderie. Trait for war support."
 flurryheart.6.b:0 ">A sympathetic ear. Trait for stability."

 flurryheart.7.t:0 "Flurry Heart's Life - Age 16"
 flurryheart.7.d:0 "#TODO Flurry Heart is sixteen years old. She is with her mother at a formal event, subtle preparation to take a more active political role. She still does not have her cutie mark and its embarrassing. Princesses must have perfect poise no matter what. Shes meeting a Yak who loudly congratulates her on not letting a mark decide her destiny with a bone-crushing hoofshake. (Shes fine, shes tall and an alicorn, but confused.) Cadance confesses she felt out of place in Canterlot but turned that weakness into a strength, turning to speak to a visiting pony with her original (Vanhoover?) accent to their delight. Flurry decides a Princess should have"
 flurryheart.7.a:0 ">Poise. Bonus to political power/hiring costs"
 flurryheart.7.b:0 ">Personality. Bonus to accept other diplomacy/compliance gain" 

 flurryheart.8.t:0 "Flurry Heart's Life - Age 17"
 flurryheart.8.d:0 "#TODO Flurry Heart is seventeen years old. By fate, she does not have her mark. Also by fate, she is meant to be with her mother for the swearing in of new officers to the army and with her father as one of the new officers intended to replace him. She has her dress and crown out along with her military uniform, pacing in her room. She wants to help, but she cant do both things at once and be the best version of herself. Her parents enter apologetic and talking over each other to reschedule, but Flurry shoos them out because she is going to decide today and thats final. She makes her choice and her cutie mark appears."
 flurryheart.8.a:0 ">A Crystal Crown. Flurry chooses to be a Princess and will succeed her mother."
 flurryheart.8.b:0 ">A Crystal Shield. Flurry chooses to be a protector like her father and will take over his position." 

 flurryheart.9.t:0 "Flurry Heart's Life - Age 17"
 flurryheart.9.d:0 "#TODO:(A&B) Cadance and Shining are outside the bedroom door utterly breaking down and thinking theyve failed as parents. Theyre taking turns shouting through the door that theyre proud of her no matter what, she can quit everything and join a garage band, trying to spy though the keyhole, etc. Flurry exits with her cutie mark and tells either Shining or Cadance shed like to go with them, before trying to apologize to the other. Its an immediate group hug and affirmation they all love each other no matter what. ### [CRY_choose_parent] inserts the name of the parent Flurry has chosen as scripted loc"
 flurryheart.9.a:0 "I love you both..."
 
 flurryheart.10.t:0 "A Crystal Coronation"
 flurryheart.10.d:0 "#TODO: Flurry Heart ascends to the position of princess of the Crystal Empire, her parents are incredibly proud of her and Cadance promises to continue supporting her as she takes the reins of rulership. The ceremony proceeds in a normal Crystal Pony fashion, including the wicked after party that everyone is invited to."
 flurryheart.10.a:0 "A New Princess Ascends!"

 flurryheart.11.t:0 "The Meaning of Hope"
 flurryheart.11.d:0 "#TODO: Flurry Heart ruminates on what the Princess of Hope truly means, and comes to a realization, so long as there is darkness, so too is there light, and Flurry will forever strive to bring hope to those in the dark, and to show the world the goodness and magic of Harmony, wherever they may be."
 flurryheart.11.a:0 "A New Era Dawns"

 flurryheart.12.t:0 "The Magic of Harmony"
 flurryheart.12.d:0 "#TODO: Flurry has broadcasted a message of hope and goodness, increasing stability/war support in the targeted country"
 flurryheart.12.a:0 "Our resolve grows."
 flurryheart.12.b:0 "The people are comforted."
 
 flurryheart.13.t:0 "Subversive Communications"
 flurryheart.13.d:0 "#TODO: Flurry has broadcasted a message about overcoming adversity and triumph against evil, decrease stability/war support for the targeted country"
 flurryheart.13.a:0 "Our resolve withers."
 flurryheart.13.b:0 "The people are unsettled."

 flurryheart.14.t:0 "A New Generation"
 flurryheart.14.d:0 "#TODO: McFlurry is promoted to Field Marshal to join her father in the armed forces, she announces her plans to modernize and upgrade the military before celebrating with the other new officers."
 flurryheart.14.a:0 "Ready and reporting for duty."

 flurryheart.15.t:0 "Harmony Under Siege"
 flurryheart.15.d:0 "#TODO: # Flurry prepares to go to war and speaks with her parents about the nature of harmony and violence, despite their hesitation, she is committed to bringing light to the world, even if she has to do so through force, for Harmony must be protected."
 flurryheart.15.a:0 "Supremacy anywhere is a threat to Harmony."
 
 cryepilogue.1.t:0 "A Loose Thread"
 cryepilogue.1.d:0 "#TODO: Rabia calls a war council. Despite their triumph, rumors still abound that Flurry has survived--she glares at Sombra during this. Flurry must be found, executed publicly, and only then will they be victorious. Sombra looks to Ira bleakly, who feels a little sorry for her brother, but doesn't dare speak against Rabia."
 cryepilogue.1.a:0 ""Find her!""

 cryepilogue.2.t:0 "In the Furthest Mountains"
 cryepilogue.2.d:0 "#TODO: Flurry Heart talks with the friends--of every race and culture, from changeling to stalliongradian to yak to nova griffonian--who have protected her through the long night over Equus. She is their Princess now, no matter who they were before. They have raised her, they have watched her grow, and now she is ready to lead them. There is one thing left to do: save the world from the nightmare that has ruled it for years."
 cryepilogue.2.a:0 "Her last words lingered long in the air, as they readied for battle:"

 cryepilogue.3.t:0 "Finale I"
 cryepilogue.3.d:0 "#TODO: Flurry launches the attack, her ragtag band storming Rabia's castle. One by one, they fall in combat, Umbrum stoppiong their hearts with fear or striking them down with vile magic. But Flurry makes it to the throne room. Rabia's cackling voice comes from everywhere and nowhere, as the physical darkness blinds Flurry. She is choking, screaming for help in a mute voice..."
 cryepilogue.3.a:0 "The words settled into Flurry's mind slowly, almost playfully:"

 cryepilogue.4.t:0 "Finale II"
 cryepilogue.4.d:0 "#TODO: Flurry dispels the darkness with a blast of brilliant magic. Now she can see her nemesis Rabia, flanked by Sombra--the one who killed her parents--and Ira, Rabia's heir apparent. Despite the anger she feels at Sombra, she notices that both he and Ira seem frightened of Rabia. Thinking of her dead parents, her missing friends, her destroyed Empire, the world rent asunder, Flurry suddenly settles upon the answer."
 cryepilogue.4.a:0 "Locking eyes with the living nightmare, Flurry spoke:"

 cryepilogue.5.t:0 "Finale III"
 cryepilogue.5.d:0 "#TODO: Flurry and Rabia fight a spell battle, Flurry unable to connect to the Crystal Heart--Rabia has concealed it, or even destroyed it. Flurry quickly realizes that Rabia is just toying with her, and could kill her whenever. A blast of pure fear hits her, and she sees her parents telling her that they're so disappointed in her. She failed. Rabia won."
 cryepilogue.5.a:0 "And the Princess of Hope fell."
 
 cryepilogue.6.t:0 "Finale IV"
 cryepilogue.6.d:0 "#TODO: Sombra's perspective. He sees Flurry fall, and for a moment, it's like he's watching Radiant Hope die again. He remembers his promise to his first and only friend, that he would protect her, and teleports to the Crystal Heart's prison. He takes it, screaming in pain as it burns his flesh, but holding onto it as it dissolves him. He returns to see Flurry on the floor, and rushes over to her, shoving the Heart to her and diving in front of a lethal blow from Rabia. He's slammed into the wall behind her, falling broken as his mother says:"
 cryepilogue.6.a:0 ""He was always a failure.""

 cryepilogue.7.t:0 "Finale V"
 cryepilogue.7.d:0 "#TODO: As Rabia goes to remove the Crystal Heart, Flurry fires a blast of magic at her. Rabia staggers back, screeching in fury. Flurry stands up, shakily, locking eyes with Rabia once more. She says something epic like "I am the Princess of Hope, Princess Flurry Heart! I refuse your world of hatred and misery, Rabia! Even Sombra had good in him--that's why he saved me twice! And I will not let anyone else get hurt because of you!", before activating the full power of the Crystal Heart, all on Rabia. Rabia screams as she's disintegrated. Ira immediately surrenders, and Flurry decides to imprison her and the other Umbrum, showing them mercy while still saving the world. But as she casts the spell, she notices Sombra is still breathing, barely. She sits down beside him, and asks him one question--why? Why did he do all of this, kill her parents, free his mother, only to have a change of heart in the end? He replies, his voice hoarse, that it wasn't supposed to go this way. It was supposed to be him with Radiant Hope, his lifelong love, and her parents still alive (as prisoners). But when Radiant died, he gave up all hope, and wanted the world to share his misery. But then Flurry returned, and she reminded him so much of Radiant. He couldn't let her die too. He bitterly says he wishes things had gone differently, but at least now he will be with Radiant. Flurry looks at him, not able to forgive him, but knowing how much it hurts to lose a loved one, and nods sadly. She says that Radiant must have been a wonderful person. He nods and smiles as he dies. Looking up to the snowstorm finally subsiding, Flurry says, "
 cryepilogue.7.a:0 ""Mom, Dad, I hope you are proud of me.""

 cryepilogue.8.t:0 "The Princess's Court"
 cryepilogue.8.d:0 "#TODO: Flurry meets with her royal court, representing all species of Equus. Changeling drones stand alongside Severyanian dockworkers, buffalo nomads, and polar bear warriors. With the collapse of civilization, there is so much to do, from rebuilding the agriculture system, to chasing out lingering monsters and abominations, and reconnecting the continent with roads and railways once more. It's as bad as if Equus got carpet-nuked. But Flurry puts on a brave face, and even convinces herself, kinda. Luster Dawn, her chief advisor, sure seems convinced."
 cryepilogue.8.a:0 "We can do this, right?"

 cryepilogue.9.t:0 "Closure"
 cryepilogue.9.d:0 "#TODO: Flurry finds Radiant's grave, and exhumes it, to lay Sombra's crown, the only part left of him, with her skeleton. She then lasers on the gravestone, beside "Radiant Hope", "and Sombra". Not King Sombra, just Sombra--the orphan, bullied and isolated aside from his one friend, who let the darkness take him over. But at the last, she reflects, he did find his way back to the light. And maybe Radiant saw that, and is proud of him, and they're finally together. She finds herself tearing up. Collecting herself, she leaves, not seeing the snow blown into a heart-shape over the gravestone."
 cryepilogue.9.a:0 "Rest in peace, you two. Together."

 cryepilogue.10.t:0 "Schemes Within Schemes"
 cryepilogue.10.d:0 "#TODO: Flurry visits Tartarus, where Cozy Glow is still locked up. She decides to let Cozy out on parole, if Cozy will teach her everything she needs to know about the darker side of ruling. Cozy is very happy to finally get out of prison, and leaps at the opportunity."
 cryepilogue.10.a:0 "Let's get to work."

 cryepilogue.11.t:0 "Cruel Fate"
 cryepilogue.11.d:0 "#TODO: Flurry visits her parents' grave. Sombra refused to give them anything fancy like he did Radiant, but he did at least bury them together. She breaks down sobbing at last, all the bottled up feelings finally coming out, and lets out a scream of fury at the stupidity of life and death. Why must fate be so cruel? Why did Radiant have to bring Sombra back? Why did her parents have to kill Radiant? Why did Sombra have to kill them and release the Umbrum? Why did he then have to save her, twice, instead of just being pure evil so the world made sense? Why did any of this happen? She wasn't a real princess, she was just a kid! She had no idea what she was doing! There was no point to any of it! Everyone was going to starve, or kill each other over old feuds, or who knew? But she's caught off-guard by Luster Dawn hugging her tight. She cries for a long time into Luster's shoulder. Luster finally asks her how the Crystal Heart is feeling. Through sniffles and whimpers, Flurry answers,"
 cryepilogue.11.a:0 ""Forgiving.""



 crystalnews.1.t:0 "Sombra Cult Crushed!"
 crystalnews.1.d:0 "[This.GetNewspaperHeader]While King Sombra has been dead for years, his ghost remained to be exorcised--until today. After years of searching, the Crystal Empire has arrested the ringlander of a secret society devoted to his resurrection, his childhood friend Radiant Hope. Hope has sworn that she never wanted to hurt anypony, that she only wanted to save her best friend from the darkness inside him, but she is still facing decades in prison for conspiracy and treason. In her arrest, Sombra's horn (which is key to reviving him) was also captured, although Hope made a deal with her captors--in return for the names and locations of every cultist involved, his horn would be placed in secure storage instead of destroyed. The Crystal Royals agreed, and Sombra's horn is now being kept at a secret location under guard.\n\nWith the Sombra cult now completely defunct, the Crystal Ponies can rest easy that he will never enslave them again."
 crystalnews.1.a:0 "We're finally safe."
 crystalnews.1.b:0 "Good news from the Crystal Ponies."


 crystalnews.2.t:0 "The Return of the King!"
 crystalnews.2.d:0 "[This.GetNewspaperHeader]For the past several months, a pony from the history books named Radiant Hope has secretly made efforts to restore her best friend: King Sombra. At long last, she has succeeded. Sombra has risen from his grave, and now the King of Monsters lives once more. He has already seized the Crystal City, and with Princess Cadance and Shining Armor's fates unknown, it seems likely the entire Empire is next."
 crystalnews.2.a:0 "At last!"
 crystalnews.2.b:0 "Uh oh..."


 crystalnews.3.t:0 "Ambitions of Conquest"
 crystalnews.3.d:0 "[This.GetNewspaperHeader]King Sombra today announced his intentions to conquer the entire continent and break all that would stand against him. In a speech, he declared his ambitions were not based on "ancient ownership", "personal bloodline" or "delusional nationalism"; the whole continent would be his because he had the power to seize it! He denounced the very concepts of cooperation, diplomacy, and peace, identifying them as "the dreams of fools too weak to seize destiny"."
 crystalnews.3.a:0 "I will triumph!"
 crystalnews.3.b:0 "Let him come, we're ready!"
 crystalnews.3.c:0 "Another tyrant on Equus."

 crystalnews.4.t:0 "Shadows"
 crystalnews.4.d:0 "[This.GetNewspaperHeader]When King Sombra returned, he quickly confirmed his reputation by publicly executing Princess Cadance and Shining Armor, allegedly because they killed his best friend Radiant Hope. Today, an even darker fate befalls the Crystal Empire: King Sombra has been deposed by his own family, the Umbrum of myth, and his mother now rules in his place. While the cause of their rift is not fully clear, rumor holds it relates in some way to the daughter of Princess Cadance, Princess Flurry Heart.\n\nLady Rabia has proclaimed herself Empress of Darkness, and her intentions of conquest could not be clearer."
 crystalnews.4.a:0 "We rise."
 crystalnews.4.b:0 "Oh no..."

 crystalnews.5.t:0 "The Princess of Hope"
 crystalnews.5.d:0 "[This.GetNewspaperHeader]After a decade of terror and death, the warm glow of a new dawn embraces the shattered continent of Equus. Princess Flurry Heart, last scion of the Amore bloodline, led a daring raid on the heart of darkness: Lady Rabia's fortress-castle. Slaying her in single combat, the Princess then banished the Umbrum that had ruled Equus ever since Sombra released them.\n\nDespite the damage done to every aspect of society from a decade of madness, and the countless creatures dead including Flurry Heart's own parents, common folk from the Penguins to the Buffalo and the Changelings to the Stalliongradians dare to dream once more. Flurry Heart has declared a new "United Kingdom of Equus" and has promised to rule for all her subjects, no matter their species or background. Like a phoenix, Equus is reborn from the ashes--and they will face the future with strong wills and tender hearts."
 crystalnews.5.a:0 "All hail the Princess!"
 crystalnews.5.b:0 "The nightmare finally ends."

 crystalnews.6.t:0 "The Crystal Coronation"
 crystalnews.6.d:0 "[This.GetNewspaperHeader] TODO: Brief blurb describing the coronation of Flurry Heart as the new Princess of the Crystal Empire"
 crystalnews.6.a:0 "Our new Princess!"
 crystalnews.6.b:0 "What is old, is new."
 crystalnews.6.c:0 "Another Princess?"


 oldcrystals.1.t:0 "Changeling Rule"
 oldcrystals.1.d:0 "Welp Chryssy won. Time for Trimmel."
 oldcrystals.1.a:0 "RIP"

 oldcrystals.2.t:0 "The Continuation of Our Alliance"
 oldcrystals.2.d:0 "With its independence secured, the Crystal Empire has found itself handling diplomatic concerns it previously delegated to Equestria. However, the most pressing matter is regarding our formal alliance with Equestria. There is no doubt that the Crystal Empire can stand on its own, but there are many dangers in this new world, far more threatening than Sombra, and the Crystal Princess has expressed that the alliance should be maintained. However, the dissenting opinion believes that the nation is more than capable of defending itself, and relying on [equestria.GetLeader]'s assistance would only result in continued subjugation. How should the matter at hoof be resolved?"
 oldcrystals.2.a:0 "Ponies must all work together!"
 oldcrystals.2.b:0 "We stand alone."


### Communist events ###
 crycom.1.t:0 "Crystal Ponies and their problems"
 crycom.1.d:0 "#TODO Crystal Ponies of Crystal City feels bad because industrialization are killing the small buisness which was here before the Empire disappeared for 1000 years, and equestrians are everywhere, in high command, in the head of new enterpises, everywhere! Some of them starts feeling this like a colonization..."
 crycom.1.a:0 "We must find the way to start them feels better!"

 crycom.2.t:0 "Suspicious literature"
 crycom.2.d:0 "#TODO It's been two years when we started to find a books and posters, which explains the current state of buisness in Crystal Empire as consequence of capitalist policy. Equestra draws as imperialist here, who is not better than Sombra. But unlike him, they much more hypocritically treacherous and cunning. They subjugate us not with magic, but with words of friendship and help, while their companies literally become the owners of everything! And what's worse, Cadance don't see that!"
 crycom.2.a:0 "We must hunt this book. Obviosly, crystal ponies can't think like that!"
 crycom.2.b:0 "These books are not worth the attention"

 crycom.3.t:0 "Crystal meeting"
 crycom.3.d:0 "#TODO Meeting on the square. A pony from government (maybe Cadance personally?) asking ponies what do they want? Why they did that meeting? And various ponies here they complain that their workshop went bankrupt because of a new factory where the owner is some big pony from Equestria. They complain that there are not enough places in schools to get an education and work in a factory. Students have expressed concerns that Equestria will not leave here after it finishes helping with the modernization. In fact, we are here representing groups with which Lily will interact in more detail later on her path."
 crycom.3.a:0 "Let's listen them"
 crycom.3.b:0 "They will get tired and leave"

 crycom.4.t:0 "Arctic Lily's typography"
 crycom.4.d:0 "#TODO Arctic Lily, the editor-in-chief of the largest communist newspaper "Red Snowflake", introduction. The importing of literature, poster agitation etc through the STG border is too expensive. Lily discussing with one of agitators, that they'll be much easier to create a typography here, in Crystal City"
 crycom.4.a:0 "This is a start of something bigger..."

 crycom.5.t:0 "Meeting on the meeting"
 crycom.5.d:0 "#TODO - Lily's typography is growing, on student's meeting she meets Fleur, and she agrees to help for distribution of Marks ideas in the colleges and universtiies"
 crycom.5.a:0 "That's great!"

 crycom.6.t:0 "The rifle burn the power?"
 crycom.6.d:0 "#TODO - an event where Lily meets the marksist club of orthodoxal guys, belived that rifle burn the power, and party should take a lead. They arguing about possibility to take power by peaceful method."
 crycom.6.a:0 "#TODO"

 crycom.7.t:0 "Let's invite the famous ponies on the next meeting!"
 crycom.7.d:0 "#TODO Lily and Fleur are thinking about possibility to invite some famous ponies on next meeting. Fleur suggests Spike and Starlight, cause Spike is a national hero, and Starlight is a good example of socialist who find her place in harmonist country. Lily don't agree, cause they both will not help to their buisness. So she suggests to ask Masha and Lightning Dust from STG, cause they both are good exmaple of ponies who took the high ranks from the bottom of society."
 crycom.7.a:0 "Lightning and Masha will be good, Fleur"
 crycom.7.b:0 "Lily, Starlight and Spike will give us much more support from the people!"

 crycom.8.t:0 "LD and Masha on the demonstration with crystal ponies"
 crycom.8.d:0 "#TODO Lightning Dust and Masha Noruskina arriving to demonstration. Lightning tells how she was exilied in Equestria because the Princess's student broke the safety regulations on the race track, so her move was lead to crash, and exile from the Wonderbols and arriving to STG, where Lunin noticed her talents and now she is a commander and even her methodics are using for trainings for some new pilotes. Masha starts the flaming speech, where she tells that they all will be like her in childhood, living on the bottom, struggling for the life, and will be very poor, cause this is what Equestrian buisness doing! The princess don't care! They must overthrew the Princees and liberate themselves from opression! But her words are embarrassing, because the crystal ponies believe that Cadence cares about them the way it did with Celestia and Masha, although Lightning's example is inspiring them"
 crycom.8.a:0 "#TODO"

 crycom.9.t:0 "Starlight and Spike on the demonstration with crystal ponies"
 crycom.9.d:0 "#TODO Starlight and Spike arriving to demonstration. Starlight tells how she started in Stallionrad, how they gave her a town for experiment on the northern border, and how she failed. But now Equestria gave her a second chance and she even helping Twi with state buisness. Equestria is not that bad, altrough the indepency will be better by her opinion. Spike should confirm her words, but do something funny too - tell about comics for example, which will confuse the demonstrators, but they love Spike and will be listen. So at the end this turns to stories club, which will attract more crystal ponies to this meeting. Yes, Spike is that gigachad - change my mind!:D"
 crycom.9.a:0 "#TODO"

 crycom.10.t:0 "The power of cooperative work!"
 crycom.10.d:0 "#event where crystal ponies, inspirited by ideas of Marks, organazing their cooperative in the city. Fleur is very excited! And Artcic Lily wants that ponies should know about it and wanna write their story by millionary exemplares! A reference to Gabital comicses https://boosty.to/gabiconomics-en - it's free, have fun!"
 crycom.10.a:0 "The crystal poniees gonna love that story!"

 crycom.11.t:0 "The Crystal Ponies' Movement"
 crycom.11.d:0 "#TODO: A massive wave of common ponies are starting to demand increased political involvement and social safety nets - and a pro-commoner line. Cadance is a little unsure, but trusts her little ponies."
 crycom.11.a:0 "#TODO"

