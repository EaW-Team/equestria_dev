 crystalsombra.1.t:0 "Your Story - A Peculiar Pony"
 crystalsombra.1.d:0 "Your arrival in Crystal City occurred without celebration, thankfully. You were never one for parties, though your friends and family had insisted on giving you a "going away" cake. They had all wished you good luck with your new job at Star Energy, an Equestrian electrical company. Bringing the Crystal Empire's ancient society up to speed with modern technology was an ever-ongoing process—one that you were excited to help with.\n\nYour job was set to begin next week, so you had some time to kill. There was a small souvenir shop near your apartment that had caught your eye, so you figured you could peruse its wares in hopes of finding something to help decorate your rather sparse living space.\n\nUpon entering the store, you were greeted by an overwhelming multitude of crystal-themed trinkets and baubles. It was hard to pick out something to direct your eyes to, especially since the antique building had not yet been wired for electrical lighting. The overhead lanterns were hardly sufficient to determine what anything was from afar, though one thing did catch your eye: a painting on the wall. You approached it, noticing that it depicted the defeat of the evil King Sombra by Princess Cadance and Spike "the Brave and Glorious."\n\n"It's sad, isn't it?" The feminine voice, though soft, caught you off guard enough to jump slightly. You turned to see a rather pretty crystal pony also looking at the painting. You asked if she was the shopkeeper. She nodded and introduced herself as Cherry Bluebell. You then asked her why the painting was sad.\n\nHer expression was somber. "A long time ago, the pony who would become the cruel monster in that painting was just a scared little colt. He didn't want to be evil, though forces outside of his control made him that way. But there was still good in him, locked deep away."\n\nYou told Cherry that this sounded preposterous. If he was good on the inside, then why did the crystal heart destroy him? Good ponies don't die like that.\n\nHer smile was kind, though her eyes were filled with sadness. "He was too far gone, but..." She looked away and bit her tongue, then returned her gaze to yours, "...there might still be hope. Here," She placed a small card into your hoof. "If you want to learn about the true story of Sombra from the pony who knew him best, then come to this meeting in a few days.""
 crystalsombra.1.a:0 "You decide to attend the meeting."
 crystalsombra.1.b:0 "You decide not to go. After all, Sombra is pure evil. Everypony knows this."

 crystalsombra.2.t:0 "Your Story - History Lesson"
 crystalsombra.2.d:0 "All things considered, you're not sure that this was the best idea. Attending a strange meeting in a secluded section of the public library was already questionable enough, but you were also held up at the entrance by one of the attendees who believed you to be an undercover police officer. It wasn't until Cherry Bluebell arrived that you were let in, as she vouched for your legitimacy as a genuinely curious foreigner who had recently moved here.\n\nWait, how did she know you had just moved here? As you were processing that thought, hushes came over the small crowd of about twenty. They were mostly younger adults, but none were foals. Then, a hooded pony arrived from seemingly nowhere. You blinked; trying to figure out how they got here. Illusion magic, maybe? The others seemed to know they were about to appear, so...\n\n"Thank you all for coming," began the hooded figure, "I'm sorry that we had to abandon our last meeting location... there are ponies looking for me. And if they find me, well..." Their voice trailed off. Suddenly, they turned their head toward you and a few others, "...though I see we have new friends." Alarms began to go off in your head. Ponies were looking for this mysterious character? What have you gotten yourself into?\n\nThe hooded pony then removed their disguise, revealing an amethyst crystal unicorn. She was rather pretty, you'd say. "My name is Radiant Hope," Her smile was kind, but you could see the tiredness behind it. "A long time ago, I knew Sombra when he was a foal. He wasn't the terrible monster everypony claims he is, but... his fate was to be evil, even though I know he didn't want to be. We were best friends. We were... almost more than that. But then fate came and demanded he obey, and I wasn't strong enough to save him."\n\nAfter taking a moment to gather herself, Radiant Hope continued. "When Sombra was banished by the Equestrian alicorns, he cursed the Crystal Empire to vanish with him. The curse would last a thousand years, longer than I would live, so... I resorted to traveling to the Fairy World where Sombra's kind—the Umbrum—lived. There I existed without aging, waiting for the day Sombra would return... but I was too late. I missed his return, and... he was killed."\n\nShe sniffled a bit, then turned her attention to the newcomers. "Sombra isn't a normal pony, though. He's special. Even though he's dead, I know that he can still be saved. That's why I'm asking you all here to help me. I know that we can find that innocent colt who never wanted to hurt anypony and bring him back. And to do that, well... first I need your names.""
 crystalsombra.2.a:0 "Radiant Hope faced you directly. "So, what's your name?""

 crystalsombra.3.t:0 "Your Story - Commitment"
 crystalsombra.3.d:0 "You're not sure why you gave Radiant Hope your name, [CRY.CRY_literally_you_the_player.GetName], given how unusual the situation was. Maybe you were moved by her speech. Maybe it was the conviction in her eyes. Maybe you were just that honest or trusting of others.\n\nThe meeting wrapped up shortly after she gathered the names of all the new attendees. She had asked each pony to think really hard about whether they wanted to commit to helping her or not, since in all likelihood, those who did help would not be viewed kindly by the eyes of the law.\n\nYou pondered these things as you returned to your apartment. The next meeting with the "book club" was set to occur in a few weeks at the same location, so you had plenty of time to figure this out. That is, unless the police somehow found out about Hope's plan to resurrect Sombra, which would likely lead to your arrest too as an accomplice.\n\nA nice, hot shower seemed like a good idea to take your mind off things. You let the water run for a bit, then you ran your hoof through the stream to ascertain the correct temperature. Of all the possibilities for your new life here in the Crystal Empire, getting caught up in a conspiracy was definitely not on your list. It just seemed so unreal, so dangerous, yet at the same time... exciting?\n\nYou stopped yourself in the midst of that thought as the realization of what you were getting involved with finally hit you. You were seriously considering helping ponies bring back King Sombra. KING. SOMBRA. The evil tyrant who enslaved and mind-controlled countless ponies without a second of hesitation. There wasn't a single pony in their right mind who doubted that he was evil, through and through.\n\n...And yet Radiant Hope's words were still there in the back of your mind. She seemed to believe that Sombra was good inside with the same certainty that you would say Celestia raises the sun. Maybe she deserved a chance to prove it? But you would be risking your entire livelihood and more for somepony you had just met. Was it really worth that risk?\n\nYou withdrew your hoof from the shower as you debated whether to wash your hooves of this whole affair or not."
 crystalsombra.3.a:0 "You'll take your chances with Hope. Maybe... maybe she might be right."
 crystalsombra.3.b:0 "This is crazy! Tomorrow, you'll go to the police and tell them everything."

 crystalsombra.4.t:0 "Your Story - Magical Research"
 crystalsombra.4.d:0 "It's been a few days since your last meeting with Radiant Hope and the others. She had given you all multiple tasks, and yours was to investigate highly advanced magic for use at a later date. With a goal as vague as that, you figured that the public library you and the others had been meeting at wouldn't quite have what you were looking for.\n\nAt the suggestion of Cherry Bluebell, you followed her to the Grand Crystal Archives near the Crystal Palace. You had no idea that such a place existed, and were equally surprised that it was open to the public. Well, semi-open, as you had to show your identification as well as be screened upon entry. Apparently, only born residents of the Crystal Empire were allowed in without restriction.\n\nThe Grand Crystal Archives certainly lived up to the name. The room was colossal, decorated with countless colorful crystals and stained-glass windows untouched by the millennium since their construction, and even the shelves and displays looked like something out of an ancient history book. You briefly wondered how such a place existed without being a major tourist destination, then remembered Cherry saying that only residents of Crystal City could access it.\n\n"[CRY.CRY_literally_you_the_player.GetName], look!" Cherry shook your leg to get your attention. She pointed to a section holding exotic tomes, then gestured to follow her over there. Shockingly, the books were readable... just barely, though. Cherry had a much easier time deciphering them, being from ancient times herself. You sometimes forgot that she and almost every other crystal pony were technically over a thousand years old.\n\n"There's a few promising tomes about certain fields of magic," Cherry started, then furrowed her brow as she hovered her hoof between them, "...I'm not sure what Hope needs, though. This isn't like a normal library, so we can't take these with us... Do you have any idea of what she might need?"\n\nYou look over the indicated tomes. You happened to have a pen and paper on you, so you could copy down some critical information for later. What seemed like it would help the most?"
 crystalsombra.4.a:0 "§4Healing magic§!, to help Radiant Hope with the revival spell matrix."
 crystalsombra.4.b:0 "§0Dark mental magic§!, to mess with the minds and memories of ponies if necessary."
 crystalsombra.4.c:0 "§7Illusion magic§!, to sneak into restricted areas or make a quiet getaway."

 crystalsombra.5.t:0 "Your Story - Restricted Area"
 crystalsombra.5.d:0 "After returning to Radiant Hope with the information you've learned, she tasked you with studying texts related to King Sombra's magic. Figuring that this once again meant a visit to the Grand Crystal Archives, you invited Cherry Bluebell to come along with you the next day.\n\nOn your way there, she excitedly told you that she spent all night practicing the magic you picked out, just in case. You raised an eyebrow at the words "all night", but didn't ask if she meant that literally.\n\nAs the two of you entered the Grand Crystal Archives once more, you wondered how you were going to seek out information about King Sombra's magic without raising suspicion. Cherry suggested simply speaking with one of the archivists, which gave you an idea as well. The two of you approached the help desk, and you cleared your throat:\n\n"Hello, me and my friend are working on a history presentation about the takeover of the Crystal Empire by King Sombra. Where can we find information on him?"\n\nThe archivist, an elderly mare, smiled and pointed to a nearby shelf, "Oh, the public records about King Sombra are all right over there, dear."\n\nYou summoned your courage and put on your best poker face. "Oh, we've already read those. What we're interested in are the details about what kind of magic he used to overpower everypony." The mare stared at you for a brief moment, causing your heart to skip a beat. Did she suspect something? "...We want our presentation to be accurate. It's for educational purposes."\n\nThe archivist turned and pointed to a gated section. "That would be in the restricted area, which can only be accessed by the royal family and those granted permission to enter by them."\n\nCherry spoke up, "Can we get a permit? How long would that take?"\n\n"Sure, and about a month or so I'd reckon. A lot of ponies have gotten one without issue, but the princess is rather busy nowadays, with the Crystal Faire coming up soon."\n\nSeems like the least risky option would be to inquire about getting a permit, but who knows how long that would take? You weighed your options on what to do."
 crystalsombra.5.a:0 "You supposed that you'll just have to wait and get a permit to enter." #This will cost time.
 crystalsombra.5.b:0 "She's just a librarian. Let's push past her and get those books!" # idiot
 crystalsombra.5.c:0 "Good thing Cherry was practicing §0mental magic§!. Make her forget that you were ever here!"
 crystalsombra.5.e:0 "Good thing Cherry was practicing §7illusion magic§!. Steal her keys and sneak past her!"

