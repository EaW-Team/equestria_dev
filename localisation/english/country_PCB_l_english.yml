############### Focuses ###############

########## Cocktail Starting Tree ##########
 
 PCB_start_1:0 "Pushing Last-Minute Reforms"
 PCB_start_1_desc:0 "The clock is ticking, we only have a year left before the next election and our party's popularity has begun waning recently. The social and economic issues that plague the country are our responsibility and we have no solve either to any significant degree, not to mention the rise of the cartel and the 'Big Five' isn't helping. We need to pass reforms to boost our popularity, and they need to be passed NOW."
 
 PCB_start_2:0 "Open-Door Immigration"
 PCB_start_2_desc:0 ""
 
 PCB_start_3:0 "Keeping The 'Big Five' In Check"
 PCB_start_3_desc:0 "The so-called 'Big Five' refer to Puerto Caballo's 5 biggest corporations which dominate the economy and influences internal policy through bribing our politicians. That is why we must make sure to keep these companies in check lest we become a full blown corpotocracy. But we must be careful, as despite the threat they pose, we cannot hope to survive without their funding."
 
 PCB_start_4:0 "Our Place Under The Sun"
 PCB_start_4_desc:0 "As unfortunate it is to acknowledge, we have a certain reputation, that being that we are the 'Forgotten Dominion', whilst the princessess have a very hands-off approach to most oversees territories, we are just sometimes blatantly ignored. Seen as a minor island of the southeastern coast, our issues are quickly dismissed in favor of other 'more important' matters."
 
 PCB_start_5:0 "Cracking Down On Corruption"
 PCB_start_5_desc:0 "Corruption is rampant in our government, bribes being offered and accepted from all directions, some of our officials are being bought by corporations, others by the cartel, most by both. This has gone on long enough, it is about time we crack down on this corruption before it rots the very democracy we are so proud of."
 
 PCB_start_6:0 "Renewing The Amistad Accord"
 PCB_start_6_desc:0 "The Amistad Accords, a treaty signed between the natives of Puerto Caballo and the Equestrian settlers, meant to foster harmony and protect both parties. Yet today through loopholes and corruption, the treaty has become a joke, yet it is still renewed every 5 years as a symbolic gesture of harmony on our sunshine isle."
 
 PCB_start_7:0 "Reassuring The Equestrians"
 PCB_start_7_desc:0 "President-Dictator Quesadilla had many anti-Equestrian policies, which garnered major support amongst the Pulhoranslan population. Despite him being overthrown, the fear of the Equestrian settlers remain, fear that the Pulhoranslans will seek to be rid of them. For the sake of harmony we must reassure these Equestrians that these fears are quite unneccesary."
 
 PCB_start_8:0 "Appeasing The Pulhoranslans"
 PCB_start_8_desc:0 "The Pulhoranslans make up a large portions of our population, yet they've always been at the recieving end of any exploitation whilst our government and the Equestrian settlers revel in the profit. Due to this it would only be approporiate to give some concessions to the Pulhoranslans. However our position prevents us from giving them much, so a couple token reforms will be all they're getting."
 
 PCB_start_9:0 "The Second Cocktail Government"
 PCB_start_9_desc:0 ""
 

########## EQS Civil War ##########
 
 PCB_ECW_1: "War of The Two Sisters"
 PCB_ECW_1_desc: "The day nobody could think was possible has arrived, Nightmare Moon is back again, and with her return the Equestrian mainland has collapsed into civil war. And now it is our moral obligation to save Equestria, even if the natives Pulhoranslans don't see why they must take up arms for their overlords, and we are already facing guerrilla militias in our own nation, and revolution could strike us any minute..."
 
 PCB_ECW_tooltip_unlock_decisions: "We will unlock £decision_icon_small §Cdecisions§! to aid our §7allies§! @EQS @CES in the raging civil war."
 PCB_ECW_tooltip_supply_unit_5: "We will get 5£GFX_loot_text §Hunits of supplies§! and §Hequipment§!.\n "
 PCB_ECW_tooltip_mechanic_explination: "§RWhile we wish to do our utmost to assist our allies on the continent; the economy is simply not fit to sustain two foreign excursions of such a large scale without some cuts. The more focuses we take to supply one ally, the weaker our support for the other becomes.§!"
 
