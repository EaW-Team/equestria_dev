PCB_his_pt1_desc: "§4This chapter will include:§!\n- The Poneysian migration to the sunshine isle.\n- The first Poneysian settlements."

PCB_his_pt2: "Chapter II: Divided in Tribalism"
PCB_his_pt2_desc: "§4This chapter will include:§!\n- The 6 Tribes of Poneysia.\n- The division of the isle between several tribes."

PCB_his_pt3: "Chapter III: Armonía"
