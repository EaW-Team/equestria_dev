########## The Equestrian Civil war ##########
 
 PCB_ECW_event.100.t: "A Nightmare Before Hearth's Warming"
 PCB_ECW_event.100.d: ""-This is not about me being a Royal Guard, Ardiente, or that I took an oath to the Princess and country-"\n\n"-Buckista, Equestria is collapsing, you'd be blind if you didn’t see that other splinters are coming. My family-"\n\n"...Look, this is getting us nowhere. Let's stop talking over each other and explain our positions like proper officers, shall we?"\n\n"Fine. Buckio, Daring Do has the loyalty of the masses of the Southeast. They fight for a region that is known for its natural defenses that constrain virtually any attacking force, and a people that know the land like the back of their hand. War is in their lifeblood, and I can attest to their loyalty to her and Harmonism. In any event, the Southeast will be the last to fall-and Equestria risks further instability with potential warlordism."\n\n"-I understand your view and respect it, Lanza. Still, you musn't let your family history color your reality. We both swore an oath to Equestria, to Harmony, to be part of something greater than ourselves. If Equestria falls, then the Southeast and your family stand alone. I say we fight for the birthplace of Harmony - to link up with all forces under the Princess and assist the motherland in its war of reunification.”\n\n“...You have a point.”"
 PCB_ECW_event.100.a: "“So do you. Up to the boys to decide for us, though...”"
 
