########## Dragon-Caballon War ##########
 
 PCB_DRG_war_cat: "The Dragon-Caballon War"
 PCB_DRG_war_cat_desc: "It seems war has erupted between the ponies and the dragons over the contested Spa Islands, we have reached the point of no return, neither we nor them are willing to back down or return to negotiations, which means the only way this can be resolved is through §Rblood§!."
 
 PCB_spa_island_war_timer: "The War With a Deadline"
 PCB_spa_island_war_timer_desc: "[PCB_DRG_war_victory_condition]"
 PCB_DRG_war_victory_condition_PCB_LOC: "If we manage to occupy and hold the Spa Islands untill the timer runs out, we will win the war and gain the islands alongside some further but minor territorial concessions."
 PCB_DRG_war_victory_condition_DRG_LOC: "If we manage to hold the Spa Islands untill the timer runs out, we will win the war and secure our control over the islands."
 
 PCB_DRG_total_war: "Refuse Conditional Surrender"
 PCB_DRG_total_war_desc: "§RWe will refuse any form of conditional surrender from the dragons, we will fight to the end, no matter our casualties, we either climb to the top of The Mountain, or we die trying!§!"
 
 PCB_DRG_war_PCB_victory_LOC: "Puerto Caballo has successfully seized the Spa Islands"
 PCB_DRG_war_DRG_victory_LOC: "The Dragons have successfully secured their rule over the Spa Islands"

########## Our Place Under The Sun ##########

 PCB_place_under_sun_cat:0 "Our Place Under The Sun"
 PCB_place_under_sun_cat_desc:0 "Despite how culturally diverse and beautiful our sunshine isle is, we must acknowledge the §Rreality§! that is how little we actually contribute to Equestria compared to it's other dominions and oversees territories.\n\nThis Has led to us gaining the reputation of being the §L'Forgotten Dominion'§!, our needs and interests being ignored in Canterlot in favor of other matters they deem to be §R'more important'§!. This attitude towards §rPuerto Caballo§! has caused the idea of full independence to become much more mainstream in recent years.\n\nHowever our government remains loyal to Canterlot, thus we must make sure to make ourselves Indispensible to Canterlot so we can finally be recoqnised as an equal ally of Equestria next to New Mareland and the Crystal Empire."
 
 PCB_sun_maps:0 "Correcting The Maps"
 PCB_sun_maps_desc:0 "Despite us being our own state with our own government, peoples, and culture, many maps that depict Equestria and its allies, especially school maps, seem to mostly forget about our existance entirely. If we are to be taken as a serious ally of Equestria then we must make sure this issue is corrected before Equestria's future generations forget we even exist."
 
########## The Cartel Situation ##########
 
 PCB_cartel_situation_cat: "The Cartel Situation"
 PCB_cartel_situation_cat_desc: "\n\n\n£GFX_PCB_banner_the_cartel\n\n\n\n\n\n\n- [PCB_cartel_strength_LOC]\n- [PCB_cartel_agression_LOC]\n£GFX_divider_desc_cat\n\n\n The£GFX_PCB_cartel_icon §tRosa Sangrienta Cartel§!, a crime family that sprung up in the city of Bogotrot over 3 decades ago, and rising to prominence during the chaos of the §1Lilac Revolution§!. Founded by §4Lila Diamante§! and §gAster Plateado§!, they eventually retired from a life of crime with their daughter, §HRosa Dorada§!, taking over the family business. Ever since then, the£GFX_PCB_cartel_icon §tCartel§! has become a major issue of national security and corruption. And things have only gotten worse since Rosa became the new Doña, as unlike her parents she has made it clear that she has ambitions beyond Bogotrot, however how far those ambitions reach currently remains unknown.\n\nIn order to defeat the£GFX_PCB_cartel_icon §tCartel§! we must play our cards very §Ycarefully§!, as playing too agressivly will lead to §Rretaliation§!, whilst playing too §7passively§! will allow the£GFX_PCB_cartel_icon §tCartel§! to grow unchecked."
 
