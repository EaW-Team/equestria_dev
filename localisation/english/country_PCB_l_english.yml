 PCB_estrella_strength_mission: "£GFX_PCB_estrella_icon  §1Nightmarist Resistance§! Grows"
 PCB_estrella_strength_mission_desc: "§RThe Estrella Movement will not remain dormant, the Nightmarists will continue their fight untill the bitter end.§!"
 
 PCB_ECW_estrella_end_terrorists: "£GFX_PCB_estrella_icon  Ending the §1Estrella Movement§!"
 PCB_ECW_estrella_end_terrorists_desc: ""
 
 PCB_ECW_tooltip_estrella_res_defeatable: "The £GFX_PCB_estrella_icon §1Estrella Movement§! is currently §7on the brink§!."
 
 PCB_ECW_estrella_resistance_redemption_sceptic: "£GFX_PCB_estrella_icon  Offering Redemption To The Sceptics"
 PCB_ECW_estrella_resistance_redemption_sceptic_desc: "Whilst it might sound insane to our more hardline politicians, we still preach the ideals of Equestrian harmony and thus forgiveness, it might not be the most effective strategy, but there might be doubters amongst the£GFX_PCB_estrella_icon §1Estrella Movement§! that we could convince to lay down their weapons voluntairily."
 
 PCB_ECW_estrella_resistance_gurrila_hunting: "£GFX_PCB_estrella_icon  Hunting Guerrilla Fighters"
 PCB_ECW_estrella_resistance_gurrila_hunting_desc: "Ever since their failed coup attempt, many of the£GFX_PCB_estrella_icon §1Estrella Movement§! militias have retreated inland to fight a costly guerrilla war, it is only natural we respond to these actions with proportional force."
 
 PCB_ECW_estrella_resistance_raiding_cells: "£GFX_PCB_estrella_icon  Raiding Nightmarist Underground Cells"
 PCB_ECW_estrella_resistance_raiding_cells_desc: "Whilst most militias of the£GFX_PCB_estrella_icon §1Estrella Movement§! have retreated to the rural inland, there remain some who have gone underground and formed hidden cells, thus we must make sure to root out these remaining cells so that our cities remain safe."
 
 
 PCB_supplies_availible_LOC: "This is it, §1Nightmare Moon§! has returned, Equestria has devolved into §Rinfighting§!, brothers and sisters fighting against eachother, the §Pbastion of harmony§! is in §Rdanger§!, and we must do what we can to prevent the flame of harmony from being extinguished by the §1lunar tyrant§!.\n\nBut our supplies are limited, and thus we must choose §Rcarefully§! who we decided to aid in their struggle against tyranny.\n\nWe currently have §H[?PCB_ECW_supply_units]£GFX_loot_text units of supplies and equipment§! to aid our allies with.\n\n§RIf our war support is below 50%, our population will start to question the neccessity of our envolvement in this war, leading to a loss of stability if we attempt to aid our allies.§!"
