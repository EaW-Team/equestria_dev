########## The Equestrian Civil war ##########
 
 PCB_ECW_cat: "The Equestrian Civil War"
 PCB_ECW_cat_desc: "This is it, §1Nightmare Moon§! has returned, Equestria has devolved into §Rinfighting§!, brothers and sisters fighting against eachother, the §Pbastion of harmony§! is in §Rdanger§!, and we must do what we can to prevent the flame of harmony from being extinguished by the §1lunar tyrant§!.\n\nBut our supplies are limited, and thus we must choose §Rcarefully§! who we decided to aid in their struggle against tyranny.\n\nWe currently have §H[?PCB_ECW_supply_units]£GFX_loot_text units of supplies and equipment§! to aid our allies with.\n\n§RIf our war support is below 50%, our population will start to question the neccessity of our envolvement in this war, leading to a loss of stability if we attempt to aid our allies.§!"
 
