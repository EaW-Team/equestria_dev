########## History of the Sunshine Isle ##########

PCB_history_cat: "History of the Sunshine Isle"
PCB_history_cat_desc: "The History of this Sunshine Isle, first known as Pulhoransla, now as Puerto Caballo, stretches over ten thousand years. During which time the isle has experienced settlement, conflict, unity, curses, dictatorships, corruption, and so much more."

PCB_his_pt1: "Chapter I: The First Ones"
PCB_his_pt1_desc: "§4This chapter will include:§!\n- The Pulhoranslan migration to the sunshine isle.\n- The first Pulhoranslan settlements."

PCB_his_pt2: "Chapter II: Divided by Tribalism"
PCB_his_pt2_desc: "§4This chapter will include:§!\n- The 6 Tribes of Pulhoransla.\n- The division of the isle between several tribes.\n- The Pulhoranslan Faith"

PCB_his_pt3: "Chapter III: Armonía"
PCB_his_pt3_desc: "§4This chapter will include:§!\n- The unification of the sunshine isle.\n- The founding of the Coralinon Monarchy."

