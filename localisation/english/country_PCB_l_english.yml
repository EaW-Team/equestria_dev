########## The Cartel Situation ##########
 
 PCB_cartel_situation_cat: "The Cartel Situation"
 PCB_cartel_situation_cat_desc: "\n\n\n£GFX_PCB_banner_the_cartel\n\n\n\n\n\nThe£GFX_PCB_cartel_icon §tRosa Sangrienta Cartel§!, a crime family that sprung up in the city of Bogotrot over 3 decades ago, and rising to prominence during the chaos of the §1Lilac Revolution§!, founded by §4Lila Diamante§! and §gAster Plateado§!, eventually retiring with their daughter §HRosa Dorada§! succeeding the family business. Ever since then, the£GFX_PCB_cartel_icon §tCartel§! has become a major issue in Bogotrot and the surrounding regions, with even our own army being unable to enter the region without heavy bloodshed. And things have only gotten worse since Rosa became the new Doña, as unlike her parents she has made it clear that she has ambitions beyond Bogotrot, however how far those ambitions reach currently remains unknown.\n\nIn order to defeat the£GFX_PCB_cartel_icon §tCartel§! we must play our cards very §Ycarefully§!, as playing too agressivly will lead to §Rretaliation§! from the£GFX_PCB_cartel_icon §tCartel§!, yet playing too §7passively§! will allow the£GFX_PCB_cartel_icon §tCartel§! to grow unchecked.\n£GFX_divider_desc_cat\n\n\n- [PCB_cartel_strength_LOC]\n- [PCB_cartel_agression_LOC]\n"
 
