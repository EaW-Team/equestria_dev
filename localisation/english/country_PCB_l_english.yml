 PCB_ECW_event.102.t: "A Daring Meeting"
 PCB_ECW_event.102.d: "Trying to get to the headquarters of the Celestial Resistance in Stableside was like trying to walk against a hurricane. Every few steps General Lanza Ardiente took towards where he was told to find Daring Do, he couldn't help but duck out of the way before somepony crashed into him. Everyone seemed to be rushing to carry out their orders or do their part for the Resistance, but in their haste, they only seemed to make everyone's job harder.\n\nOr perhaps, it occurred to Ardiente, they were fighting with everything they had and couldn't afford to slow down even for a moment. That made his visit all the more apt, as he was sent to see off the delivery of a considerable amount of supplies that were very sorely needed in the Southeast. Crates of guns, ammunition, bandages, and of course, enough sugar to keep morale higher for months after his departure.\n\nAfter what felt like an hour of trudging through the crowd, General Ardiente finally came upon the hub of the Resistance, the eye of the hurricane he was walking against. However, upon stepping through the wide doorway, he did manage to crash into somepony, sending both of them tumbling to the ground. Upon getting his bearings, he looked up to see Daring Do picking herself up, and placing her signature hat back atop her head.\n\nThe two then instantly snapped to salute the other before they both cracked and began laughing in earnest. "I'm sorry I couldn't give a proper welcome," Daring Do said with a nonchalant smile, though the bags under her eyes told a tale of overexertion for her movement, "Especially considering what you're doing for us here."\n\n"Please," General Ardiente dismissed the concerns with a wave of his hoof, "Considering the circumstances, I'm happy I could even find you to begin with."\n\n"I'd invite you in, but it's worse in there than it is out here," Daring Do rubbed the back of her neck, "Plus, and I don't mean to be rude, but I can scarcely spare another moment. I thank you for everything, truly I do, but I have about five places I had to be an hour ago, so if you'll excuse me." The General couldn't help but admire the pegasus. How many sleepless nights, agonizing decisions, and dismal reports could one sit through and still carry on?"
 PCB_ECW_event.102.a: "If only we had ponies as dedicated to Harmony as Daring Do..."
 
 PCB_ECW_event.103.t: "A Speech For Harmony"
 PCB_ECW_event.103.d: "President Ponsé Cocktail stared himself down in the mirror, searching for any sign of weakness or doubt. Pressure was coming from all across Puerto Cabello, and from within his own administration, to decide one way or the other about the Equestrian Civil War currently underway. The speech he was scheduled to give in just a short moment had to tackle concerns head on and shatter them. After another moment of intense staring, a wide grin came across his face, and he winked at the confident reflection. \n\nWasting no time, Ponsé Cocktail marched out from the central room of the capital building and onto a balcony overlooking a large crowd of ponies. The front row was occupied by the press, who instinctually took photos of him and began shouting questions up at the precipice. This barrage had a similar effect on the crowd, who themselves began shouting up at their President. Cocktail merely smiled and waved his hoof, before tapping the display of microphones, whose few echoed booms silenced the crowd.\n\n"It's no secret that there's a lot of uncertainty as to our position with the ongoing civil war raging in Equestria." Ponsé began, his silky voice flowing out from the microphone like melted silver, "Most don't see why we should bother. What could we offer to Equestria that would make any kind of meaningful difference? Further, even if our support could help to any reasonable degree, why ought we send equipment we could use to defend ourselves? And it cannot be forgotten that the Poneysians have no obligation to Equestria in the first place, so why should they help?" \n\nThe crowd began to murmur as more flashes from cameras peppered the President as he spoke. "Mi amigos, there's a few reasons why. As to obligation, I ask the Poneysians what they think will happen if the Lunar Empire claims victory in this conflict. Do they think Nightmare Moon will simply tolerate our independence? Or what of the changelings who could exploit this conflict to claim dominance over the whole continent!?" \n\nMurmuring turned to realization as the flashes stopped, everyone's attention was now fully on Cocktail. "It may be true that we can't offer much, but we have a moral duty to offer what we can. History will not look kindly on inaction in the face of such great times, we must pick a side, and we must help however possible. Because, mi amigos, in fifty years, will you be able to look your grandchildren in the eye and say, 'it simply wasn't convenient to help'? So if you feel as I feel, join me in supporting the right side of history!""
 PCB_ECW_event.103.a: "An explosion of applause was the people's response."
 
 PCB_ECW_event.104.t: "Silent Night"
 PCB_ECW_event.104.d: "The night couldn't have been more serene; crickets were chirping, owls occasionally hooted, and a full moon in the sky illuminated the jungle below in pale silver light. The scene was like something out of a storybook. That was until, from the last compound belonging to the Estrella terrorists, a volley of gunfire and explosions erupted, shattering the stillness of the evening. \n\n"They knew we were coming!" General Bukio Buckista bellowed over the noise of the firefight, biting the ring off of a magical grenade and hurling it towards one of the outermost shacks, which blew into splinters an instant later. "Some pinko bureaucrat probably tipped 'em off! Show no quarter! Arriba Cabello!" \n\nIn reality, the motley band of thestrals and communists, reduced now to only a few dozen which was quickly being dwindled down, had simply seen their advance. They could see in the dark, after all. The disciplined royal guard, however, were not deterred by the fact that they were ambushed, instead using it as fuel for an already raging fire. One by one, each shack and makeshift outpost fell, until there only remained one central house. \n\nA long shack in the eye of the storm raging around it, from which no gunfire or explosives exited, quickly became surrounded. Everyone assumed their positions, and looked to General Buckista, who was grinning wildly. "Noche Cantando!" He could hardly hide the excitement in his voice, "It's all over. The Nightmare isn't coming to save you, but you can save yourself if you surrender without a fight."\n\nSilence. For a moment, the calm of the night returned over the compound, with a thick layer of tension laid overtop. Buckista pursed his lips, forming a dam which hardly contained his glee. "Have it your way, amigo!" Saying this, Buckista reached into the inner pockets of his fatigues and pulled out a smoke grenade, and promptly loosed it before hauling off and breaching the door. \n\nThe royal guard followed close behind, dispersing once inside to locate and incapacitate whoever remained. Buckista swept through the room as though he himself were made of smoke, and upon finding a set of eyes staring back at him, lunged at them, only for the eyes to lunge back. A short struggle ensued, ending with Noche Cantando and her few remaining cohorts in cuffs. Humiliation and rage don't come close to the look on her face."
 PCB_ECW_event.104.a: "Puerto Cabello has woken from the Estrella nightmare!"
 
 PCB_ECW_event.201.t: "Puerto Caballo Aids Us With Weapons"
 PCB_ECW_event.201.d: "Word has reached us from our quartermasters that our gracious friends over in Puerto Cabello have supplied us with caches of weapons from their stockpiles! While the amount may be meager compared to what we need, the support is certainly welcome to continue the good fight for Harmony!"
 PCB_ECW_event.201.a: "¡Gracias, Puerto Cabello!"
 
 PCB_ECW_event.202.t: "Puerto Caballo Aids Us With Volunteers"
 PCB_ECW_event.202.d: "Reports have reached the high command that a considerable number of motivated and brave volunteers from Puerto Cabello have arrived and pledged themselves to the fight for Harmony! While it may not be enough to fill all of our ponypower shortages, the load has certainly been lightened by their presence, and we would never turn away those who wish to join the good fight against tyranny!"
 PCB_ECW_event.202.a: "¡Gracias, Puerto Cabello!"
 
 PCB_ECW_event.203.t: "Puerto Caballo Aids Us With Material Support"
 PCB_ECW_event.203.d: "Ships have arrived from the southern ports carrying crates upon crates of much needed medical equipment, non-perishable food, plenty of clean water, binoculars, radios, shovels, and even much needed morale boosters like cigarettes and playing cards from our good friends over in Puerto Cabello. And of course, it wouldn't be a shipment from them without a very generous amount of sugar included among the cargo. It may not be enough to top off all of our deficits, but the fight for Harmony has certainly grown stronger from their support!"
 PCB_ECW_event.203.a: "¡Gracias, Puerto Cabello!"
 
