########## Puerto Caballon Politics ##########

 PCB_politics_cat: "Puerto Caballon Politics"
 PCB_politics_cat_desc: "Puerto Caballo is a nation of corruption and crime, all locked into a sweet, sweet, balance. This sunshine isle contains many factions, all wanting power. It is the responsibility of the £GFX_PCB_icon_1 §rPresident§! to balance all these factions and make sure none become powerful enough to dominate the others. Or alternatively to §Rpermanently§! deal with these factions so that they are unable to threaten the stability of the nation again."
 
########## The Equestrian Civil war ##########
 
 PCB_ECW_cat: "The Equestrian Civil War"
 PCB_ECW_cat_desc: "[PCB_supplies_availible_scripted_LOC][PCB_divider_civil_war][PCB_estrella_presence_scripted_LOC]"
 
 PCB_ECW_war_propaganda: "Promoting Our Moral Obligation"
 PCB_ECW_war_propaganda_desc: "Whilst many on our isle, especially the native Pulhoranslans, see no reason we should be involving ourselves in this war, it is important for us to remind them of our moral obligation we have to protect harmony and freedom no matter where."
 
 PCB_ECW_seizing_islands: "Occupy the Summer and Spa Islands"
 PCB_ECW_seizing_islands_desc: "As Equestria collapses into civil war, the Summer and Spa islands are in chaos and without orders from the mainland. As Equestria's dominion in the region, it would only be appropriate for us to substitute Equestrian command of the islands for the duration of the civil war."
 
 PCB_estrella_present_LOC: "Ever since Equestria collapsed into civil war, a collective of nightmarists known as the£GFX_PCB_estrella_icon §1Estrella Movement§! have exited the shadows and revealed themselves, they wish to bring our sunshine isle under the §1lunar tyrant's§! dominion. Despite their failed coup shortly after the return of their 'Empress', the movement still has not given up, instead retreating inland and fighting a costly §Rguerrilla war§!.\n\nThe£GFX_PCB_estrella_icon §1Estrella Movement§! is currently [PCB_estrella_strength_scripted_LOC].\n\n§RWhilst the Estrella Movement is not in any position to attempt another coup, it does not prevent them from sabotaging us from within in preparation for a foreign invasion from the lunar tyrant herself.§!"
 PCB_estrella_gone_LOC: ""
 
