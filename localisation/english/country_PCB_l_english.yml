########## Puerto Caballon Politics ##########

 PCB_politics_cat: "Puerto Caballon Politics"
 PCB_politics_cat_desc: "Puerto Caballo is a nation of corruption and crime, all locked into a sweet, sweet, balance. This sunshine isle contains many factions, all wanting power. It is the responsibility of the £GFX_PCB_icon_1 §0President§! to balance all these factions and make sure none become powerful enough to dominate the others. Or alternatively to §Rpermanently§! deal with these factions so that they are unable to threaten the stability of the nation again."
 
