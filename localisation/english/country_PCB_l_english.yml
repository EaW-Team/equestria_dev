PCB_his_pt6: "Chapter VI: From the Sea"
PCB_his_pt6_desc: "§4This chapter will include:§!\n- First contact between Equestrians and\n  Pulhoranslans."

PCB_his_pt7: "Chapter VII: The Dominion"
PCB_his_pt7_desc: "§4This chapter will include:§!\n- The establishment of Puerto Caballo as an\n  Equestrian Dominion.\n- The formation of the £PCB_commie_icon_1 §RPSP§!.\n- The social tension between Equestrian-Caballons\n  and Pulhoranslans"

PCB_his_pt8: "Chapter VIII: Quesadilla"
PCB_his_pt8_desc: "§4This chapter will include:§!\n- The rise of President-Dictator Caseosa Quesadilla.\n- The Caballon-Pulhoranslan split.\n- The rise of £GFX_PCB_tropicos_logo §8Trópicos§!\n- The §1Lilac Revolution§!."

