### Leader Desc ###
SAM_VANISTO_DESC:0 "§YBiography§!: Only one and a half years after the end of the Summer Revolution, the rule of Manfred Vanistö threatens to send Sambar into civil war once more. The "Iron Regent", as he is called, has hung on to power through a combination of treachery, intimidation, and bloodlust, and has refused to allow the young Yaril of Sambar to inherit at any costs, despite the deer already of an age to succeed the throne as is his right. Nobles and monarchists stand outraged that the regent will not give up even an inch of his power to the rightful ruler of the country, while an increasingly discontent agrarian population plots another revolution in the shadows, and continues to harass noble holdings across the country, reject conscription, and demand the restoration of a true people's ruler, selected among the ranks of the native Hindians.\n\nThe road ahead is treacherous, but with the power of the navy and the settlers behind him, a ship to Olenia might not be in order for the Iron Regent after all.\n\n§YPortrait by§!: MonAx" #Rewrite this eventually

  #Manfred and Fam

