###  IDEAS ###
SAM_incomplete_state_control:0 "Incomplete State Control"
SAM_incomplete_state_control_desc:0 "#Basically Vanisto does not control every part of Sambar, and the parts that he controls are divided between army and navy control (coast vs inner country)"

SAM_cruel_and_efficient:0 "Cruel Efficiency"
SAM_cruel_and_efficient_desc:0 "Vanisto cannot be reasoned to, for he cannot be denied.\n\nAlthough whispers of the Iron Regent's disregard for creatures' lives ring around every social circle of Sambari society, what he is not slandered for is his ability to streamline through the power of fear. The revolters' cry for freedoms and the bureaucrats' call for checks and balances fall on deaf ears when Vanisto—for all the rumors of beatings and blackmails—has rendered himself a symbol of salvation. Do not defy me, he says, or you shall be crushed underhoof for obstructing Sambar.\n\nQuotas march to his drum beat; police officers and price tags follow his pronouncements; commoners toil without compromise, without a hint of slowing down. They know the absolute titan they are beholden to."

SAM_bad_administration:0 "Gutted Administration"
SAM_bad_administration_desc:0 "The Summer Revolution shot a gaping hole through the heart of the Yarildom. Decades if not centuries of experience over vast tracts of land, assets, and population? Completely wiped out in the bloodshed. Those that remain know less of good governance and more of having their will be done with the barrel of a gun: rebel cells, military governors, and otherwise dissenting locales that do not possess a favorable opinion of the Iron Regent and are more than eager to make their distaste known.\n\nIf Vanisto is to instill a sense of certainty and safety among his diverse citizens, he has to carefully deal with this powder keg of a power struggle, lest Sambar fall either back into mayhem or into a stagnant existence."

SAM_interservice_rivalry_start_idea:0 "Interservice Rivalry"
SAM_interservice_rivalry_start_idea_desc:0 "# Both sides of armed forces hate each other. They both come from different origins and have different values and goals. Things are still very flexible even two years after the revolution so each branch is looking for opportunities to eek out against the other by supporting the right leader "


