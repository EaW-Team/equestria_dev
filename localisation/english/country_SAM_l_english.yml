SAM_girlboss_admiral: "Agnes Olafdottir"
SAM_girlboss_admiral_desc: "§YBiography§!: Agnes Halfdottir is the current grand admiral of the Sambari navy. She comes from a long line of Olenian vikings and makes this fact known to anyone who speaks to her.\nAgnes is a loyal defender of the status quo and will not accept anything but complete Olenian domination over Sambar."


SAM_thorfinn: "Thorfinn"

  #Army
SAM_kirin_cop: "Iris Copper"
SAM_kirin_cop_desc: "§YBiography§!: Iris Copper is the current head of the Sambari army. From a second generation Kirin immigrant family, Iris felt great admiration towards the vikings for their bravery and strenght. He was however rejected by the navy due to his Kirin heritage. Feeling angry and wanting to get back at them, he joined the nation's national guard and quickly rose up through the ranks.\nDuring the summer revolution Iris Copper lead a group of loyalist forces within the interior.\nIris Copper is very popular within the troops, and his removal might lead to a revolt within our the nation's army."

