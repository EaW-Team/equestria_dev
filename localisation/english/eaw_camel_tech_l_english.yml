l_english:
 camel_race:0 "Camel Race"
 camel_race_desc:0 "Camels are hardy quadrupedal mammals who live in the most extreme of arid landscapes. The distinct humps on their backs are crucial to their ability to survive for long periods without food or water. As such, they have developed a history and tradition of nomadism, though many have become settled. They are thus often the only sapient creatures who can regularly and safely travel and live within the harshest deserts. They are primarily herbivorous, but can eat meat or even any material they can find if no plants are available."
 camel_folder:0 "Camel Technologies"
 camel_folder_desc:0 "Industrial, Social and Military Technologies specific to the §Ycamel§! race."

###ECONOMY###
 TITLE_CAMEL_ECONOMY_SUBTITLE:0 "DEVELOPMENT"
 camel_tech_econ_1:0 "Camelian Resilience"
 camel_tech_econ_1_desc:0 "Our home is not forgiving to the weak-spirited: it is the quintessential condition of our existence as a people, to which we've always acquiesced. This harshness is a blessing in disguise: in this age of conflict and chaos, camels do not despair. From rationing to long frontline deployments, we can and will endure through whatever is demanded of us for our future's sake."
 tech_camel_econ_1a:0 "Cost-Effective Engineering"
 tech_camel_econ_1a_desc:0 "They say necessity is the mother of invention, and as the industrial age marches on, industry's hunger for raw resources is what holds us back the most. Camelian engineering must above all prioritize flexibility in production and adaptive, utilitarian designs."
 tech_camel_econ_1b:0 "Long Distance Haulers"
 tech_camel_econ_1b_desc:0 "The ability to traverse large distances and carry goods effectively while doing so is our people's specialty and claim to fame, as well as one of the foremost concerns of the modern age. In this one respect, we find that tradition and progress, so often at odds, are wholly synergetic."
 tech_camel_econ_1c:0 "Modern Trickle Irrigation"
 tech_camel_econ_1c_desc:0 "Large-scale agriculture in our land is far from impossible, and for centuries that camels made use of primitive drip irrigation methods to save every last drop of water from being needlessly lost. Rubber tubing and electrical pumping will finally make this practice both sustainable and scalable."
 tech_camel_econ_1d:0 "Arid Soil Stabilization"
 tech_camel_econ_1d_desc:0 "The ever-shifting sand is a major obstacle to Camelia's development. By mixing resistant fabrics, strategic vegetation and chemical geosynthetics, we can turn otherwise unstable soil into a solid hardpan fit for pavement, creating a functional foundation for our urban and industrial centers."
 tech_camel_econ_1e:0 "Shining Jewels In The Wasteland"
 tech_camel_econ_1e_desc:0 "Camelian cities have and will continue to face challenges other nations do not need to worry about, but they emerge all the stronger for it, endowed with masterful planning, efficient construction, the finest response services, and ever expanding as we require of them.\n"
 tech_camel_econ_2a:0 "Ascetic Architecture"
 tech_camel_econ_2a_desc:0 "Camelian concerns for the aesthetically pleasing have been shaped by our environment, and we've developed, in most respects, a taste for that which can be beautiful and imposing while remaining brutally utilitarian in its function. Our modern construction standards will be no different."
 tech_camel_econ_2b:0 "Thorough Prospecting"
 tech_camel_econ_2b_desc:0 "In a place where shoddiness in exploring the land can mean death for a whole caravan, Camelians have developed precise and reliable methods of land prospecting, to search for usable underground water sources and other scarce resources, and a new generation of tools will only make us more effective at this crucial task."
 tech_camel_econ_2c:0 "Contractual Commercial Initiatives"
 tech_camel_econ_2c_desc:0 "Camels have served as middlecreatures in Zebrican trade for ages, and if we are to retain this privilege, we require a standardized, universally applicable basis for foreign investment into our infrastructure and services."
 tech_camel_econ_2d:0 "Camelian Legal Standard"
 tech_camel_econ_2d_desc:0 "The settled camels and the caravans have for too long been separate, antagonistic ways of life. We are to be one united people, bound by one Creed made with respect to all and prejudice towards none. A code of law applicable to all, regardless of their caravan or settlement, will ensure this."
 tech_camel_econ_2e:0 "Dispersed Economic Development"
 tech_camel_econ_2e_desc:0 "Camelia is underpopulated as it is. We cannot afford to allow even the remotest corner of our land to stay behind. Flexible urbanization combined with an agrarian policy and strategic investments will assure we make the most out of all of our homeland, and no camel is left in the dust.\n"
 tech_camel_econ_3a:0 "Industrial Water Desalination"
 tech_camel_econ_3a_desc:0 "Boiling and condensing water to make it potable is a longstanding survival trick, but despite the abundant saltwater deep aquifers, it was never scalable nor economically viable before. The advent of modern engines and materials, however, makes it so - we may finally come to surpass Camelia's most crippling strategic limitation once and for all."
 tech_camel_econ_3b:0 "Desert Greening"
 tech_camel_econ_3b_desc:0 "Camels have long held a deep envy for the ease of living in other lands: save for the respite of rivers and oases, lush greenery is alien to most of us. But modern landscaping, agriculture, revegetation techniques and even forestry are now available for our use. It will never be as effortlessly abundant as the temperate coast, but we might, at long last, make the desert wholly our own."

###SPECIAL FORCES###
 TITLE_CAMEL_SPECIAL_FORCES_SUBTITLE:0 "SPECIAL FORCES & ADAPTABILITY"
 camel_striders:0 "Striders"
 camel_striders_desc:0 "Camel units trained for tolerance to extreme environments and low supply conditions."
 camel_tech_sf_1:0 "Strider Division"
 camel_tech_sf_1_desc:0 "The apex of camel biological adaptation and Camelian conditioning, the Striders are to be soldiers unlike any other. They may not be the strongest, nor the fastest, nor most gallant, but they will doubtlessly be the hardiest, and they will fight, and fight effectively, to their last drop of sweat and blood."
 tech_camel_sf_1a:0 "Combined Arms Integration"
 tech_camel_sf_1a_desc:0 "They may be made to endure and fight even without external support, but a concurrent ability to make the most out of specialized detachments will make the Striders, and the army as a whole, all the stronger for it."
 tech_camel_sf_1b:0 "Artificial Duststorms"
 tech_camel_sf_1b_desc:0 "The sheer amount of dust and debris kicked into the air by sustained bombardments create what amounts to a localized duststorm within the battlefield. Unfortunately for our enemies, for whom this is a crippling operational hinderance, to us it's nothing more than the consequence of a particularly strong wind."
 tech_camel_sf_1c:0 "Elastic Formations"
 tech_camel_sf_1c_desc:0 "Modern warfare may not put as much emphasis on the hardened and perfected formations of the armies of old, but the way forces are grouped is crucial in both their fighting effectiveness and ease of travel. Our armies will be able to quickly adapt to any situation presented, and be ready to engage while the enemy still scrambles to get into position."
 tech_camel_sf_2a:0 "Swift As The Desert Wind"
 tech_camel_sf_2a_desc:0 "We should perfect the Striders' natural advantages and develop them into a force capable of such efficient repositioning and advances that they can serve as the army's vanguard into enemy territory.\n"
 tech_camel_sf_2b:0 "Slicing Strike"
 tech_camel_sf_2b_desc:0 "Our doctrine specialization and the Striders' operational standard is best fit for breaking through enemy formations and allowing us to manipulate how the front develops."
 tech_camel_sf_2c:0 "Unrelenting Marchers"
 tech_camel_sf_2c_desc:0 "As the army's vanguard, it is crucial that Striders are not held down by less than favorable terrain, and so, they must be capable of dealing with conditions and environments for which our kind has not normally adapted. A combination of training and new gear will fill this natural gap, and make the Striders' advance unstoppable."
 tech_camel_sf_2d:0 "Ground To Air Coordination"
 tech_camel_sf_2d_desc:0 "Airspace control opens an entirely new dimension of warfare, but only by maintaining close joint operations with ground forces can we best take advantage of the benefits an aerial presence can provide to the war front, hence the need for clear lines of communication and operation standards."
 tech_camel_sf_3a:0 "Unwavering, Unyielding, Undying"
 tech_camel_sf_3a_desc:0 "The Striders should strive to embody a living wall, acting as the army's bulwark against enemy advances while the remaining forces perfect their positioning to strike.\n"
 tech_camel_sf_3b:0 "Mobile Fortification"
 tech_camel_sf_3b_desc:0 "By providing Strider squadrons with specialized equipment and training in field engineering, they can quickly fortify positions and allow the rest of the armed forces some flexibility in their deployment to protect important fronts and keep up pressure."
 tech_camel_sf_3c:0 "Heavy Squad Weapons"
 tech_camel_sf_3c_desc:0 "Vehicle mounted weapons and anti-materiel rifles make the Striders much more effective against enemy batallions using military gear such as armored vehicles."
 tech_camel_sf_3d:0 "Anti-Air Entrenchment"
 tech_camel_sf_3d_desc:0 "Denying the enemy the benefits of airspace dominance will significantly improve our ability to entrench positions deep into their territory and prevent them from retaking our gains with ease."
 tech_camel_sf_4a:0 "Extremes Of Conditioning"
 tech_camel_sf_4a_desc:0 "The Striders are without equal in desert survival, but it is necessary to push their limits further, and develop their skills in thriving in other kinds of harsh environments in which we might find ourselves engaged."
 tech_camel_sf_4b:0 "Ordered Disengagements"
 tech_camel_sf_4b_desc:0 "Retreats are often the most hazardous operations in all of warfare, as a disorganized force can be easily slaughtered by an advancing opponent. Our natural resilience combined with strict conditioning will allow our forces to operate under pressure, and remain cohesive long enough to safely disengage and gain distance when needed."
 tech_camel_sf_4c:0 "Fast Climbers"
 tech_camel_sf_4c_desc:0 "The Camelian endurance translates well into fighting on elevated terrain, with our soldiers having little difficulty in ascending steep mountain passages and still arriving to position in good shape. Further conditioning for this extreme environment will make otherwise disadvantageous terrain into second nature for our soldiers."
 tech_camel_sf_5a:0 "Hardened And Flexible Extremophiles"
 tech_camel_sf_5a_desc:0 "Outsiders see the Zebhara as an impossibly hot environment, but they miss half the picture: it is the region with the widest temperature range in the world. Our nights are just as freezing as our days are scorching. Camel fur has adapted accordingly, keeping us cool during the day and warm at night. We can not only shrug off temperatures that'd cripple other peoples, we can tolerate their rapid change. When it comes to resisting harsh temperatures, we are simply without match."

###MILITARY###
 TITLE_CAMEL_MILITARY_SUBTITLE:0 "MILITARY"
 camel_tech_mil_1:0 "Desertborn"
 camel_tech_mil_1_desc:0 "The shifting sand, the towering dunes, the open and sun-scorched hardpans - no camel caravan has ever known another way of life. We respect this harsh mistress, we know the limitations it imposes upon us and which tricks it provides for our benefit. Our enemies, by and large, do not: they will live to regret their folly in thinking us easy targets."
 tech_camel_mil_1a:0 "Defense In Depth"
 tech_camel_mil_1a_desc:0 "Any fool in command of an army can take advantage of a literal wall, of vertiginous mountains and deep cliffs. Only a learned warrior knows that in the Zebhara, the endless expanse is itself a fortification, which provides those who know its routes and nooks the ultimate home advantage."
 tech_camel_mil_1b:0 "Natural Camouflage"
 tech_camel_mil_1b_desc:0 "Against the harsh sun glare, whole camel caravans often appear to the eyes of outsiders as hazy and distant mirages. We will take advantage of their confusion, using new specialized equipment to make ourselves hidden in plain sight."
 tech_camel_mil_1c:0 "Harrassment Recon"
 tech_camel_mil_1c_desc:0 "Though their primary role is intelligence, a strong reconnaissance focus and trained soldiers allow it to serve another purpose as perpetual skirmishers, keeping the enemy on their toes and never allowing them a single instant of respite."
 tech_camel_mil_1d:0 "Hit Them Where It Hurts Most"
 tech_camel_mil_1d_desc:0 "Did you know that the average creature risks being unable to sustain homeostasis by losing as little as 15% of body water? To a camel, this is a pathetic benchmark. Let them dig trenches and build forts to their hearts' content: when it comes to a war of attrition, we know exactly where to strike to assure the enemy will never outlast us."
 tech_camel_mil_1e:0 "Like A Neverending Sandstorm"
 tech_camel_mil_1e_desc:0 "It is clear that our physical endurance most effectively translates into a strategy of constant pressure on the enemy: like a drystorm over the desert sand, our assault doctrine will strive to make engagement constant, relentless and without mercy, grinding the enemy down until we emerge victorious."
 tech_camel_mil_2a:0 "Flexible Logistics"
 tech_camel_mil_2a_desc:0 "A modern army needs a myriad provisions: ammunition, shells, construction materials, spare equipment of a thousand different sorts, but no amount of gear can help an army that lacks the most basic of sustenance. A camel army can get by on a fraction of the rations another one needs, which makes our logistical burden that much simpler to manage."
 tech_camel_mil_2b:0 "Quick Resters, Long Runners"
 tech_camel_mil_2b_desc:0 "A camel detachment can spend hours, days, even weeks on the move only requiring brief breaks to stay sharp. Even heavy sandstorms are a manageable inconvenience to a hardened caravan, let alone dedicated soldiers. Inbetween shifting fronts across hundreds of miles, we will always arrive fresh and ready to fight, something our enemies will never do with our ease."
 tech_camel_mil_2c:0 "Desert Drifting"
 tech_camel_mil_2c_desc:0 "Army mechanization acts, in many ways, as a force equalizer for the bulk of soldiers, but our specialization towards nimble movement across harsh terrain remains without match, and motorized equipment will increase its efficacy tenfold."
 tech_camel_mil_2d:0 "Last Resort Protocols"
 tech_camel_mil_2d_desc:0 "Even the most experienced of specialists put their success at the whims of chance, to a degree, and so, even our soldiers may find themselves outmaneuvered and surrounded. Even from a disadvantageous position, camel endurance can carry the day until reinforcements arrive."
 tech_camel_mil_2e:0 "Masters Of The Zebhara"
 tech_camel_mil_2e_desc:0 "Foreign experts waste whole gallons of ink in discussions about the perfect modern military doctrine, and then cry foul when their perfect theories clash against reality. One thing that is apparent to all our military staff is that in the end, doctrine must be adapted to the environment, and we intend to be uncontested in ours."
