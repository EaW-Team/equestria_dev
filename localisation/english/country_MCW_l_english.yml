l_english:

MCW_peace_with_griffonia:0 "Peace With Macawia"

 # EVENTS # 
peace_with_macawia.1.t:0 "Peace With Macawia?"
peace_with_macawia.1.d:0 "Our campaigns in Griffonia have brought us into conflict with Macawia, yet, while we where able to capitulate our enemies on the continent, we struggle to defeat the harpies. As the war has stalled into a staring match across an ocean, perhaps we should just let it go and ask Macawia for peace?"
peace_with_macawia.1.a:0 "Yes, let's end this."
peace_with_macawia.1.b:0 "No, we just need more time."
peace_with_macawia.1.b_tt:0 "§YWe shall reconsider our options in a year.§!"
peace_with_macawia.1.c:0 "What a rediculous proposal."
peace_with_macawia.1.c_tt:0 "§RWe will not be given the option to sign peace again.§!"

peace_with_macawia.2.t:0 "A Proposal From [FROM.GetNameDefCap]"
peace_with_macawia.2.d:0 "We have been contacted by [FROM.GetNameDefCap]. After realizing that there currently is a stalemate with neither side being able make a decisive move, they asked us about ceasing the hostilities. This, of course, would mean to abandon our allies on the Griffonian continent."
peace_with_macawia.2.a:0 "Fine. We agree."
peace_with_macawia.2.b:0 "We will never abandon our allies."

peace_with_macawia.3.t:0 "Macawia Agrees"
peace_with_macawia.3.d:0 "Macawia has agreed to our proposal to cease hostilities and end this war. We can finally start to reorganize the territories of their former allies on the continent."
peace_with_macawia.3.a:0 "Good."

peace_with_macawia.4.t:0 "Macawia Defiant"
peace_with_macawia.4.d:0 "In a short message, the Macawian government has denied any and all offers for peace. It stated that it would remain committed to liberating its allies, no matter what time or effort it would take. It seems like the war will drag on for the time being."
peace_with_macawia.4.a:0 "How annoying."

 # TOOLTIPS
MCW_allies_in_griffonia:0 "§YAny country§! in Griffonia allied with @MCW §Y[MCW.GetName]§! is §Rno longer capitulated§!."