 HLR_lore.1.t:0 "From the Archives - The Origin of the Order (Approximately 44 BLB)"
 HLR_lore.1.d:0 "While many details of the origin of our Knightly Order have been lost to time, the story of our ancestors' journey and exploits have long since become legend and myth. And no matter how fantastical the stories we tell our young may sound, they did originate in truth.\n\nAs for the most commonly agreed upon version, it is said that our Order was originally a legion belonging to the land of Romau, a now-prosperous city for griffonkind. They had been sent north to eliminate a bandit lord known as the "Amber Claw", who tricked the legion and its captain into entering the treacherous Whitetail Mountains in a fruitless chase.\n\nThe weather was particularly unkind that year, so it did not take a scholar to know that the legion had gone too far into the mountains - if they turned around now, they would likely freeze to death before returning home. Captain Sigmund had made the daring choice to continue marching north in hope that they would find another way out of the Whitetail Mountains. His choice bore fruit, and the legion soon found themselves in a place they would come to know as the Tar Pine Lake. There, they encountered tribal ponies - the Stromhoof clan.\n\nAt first, the legion was unsure of what to do with the ponies - many of them had never seen one before, while others had only heard stories of them from faraway lands. The ponies before them seemed weary, and few raised blades to defend themselves. The legion soon found out why, as a tide of undead creatures arose from the darkness to assault the exhausted locals. Captain Sigmund then made another decisive call, one that would cement our relationship with the ponies of Stromhoof for generations to come: we would protect them.\n\nAfter slaying the undead, the ponies were so thankful that they helped the legion survive the harshest series of winters any of them had ever seen. For over twenty years the legion coexisted alongside the ponies of Stromhoof, many of them coming to terms with the idea that they would never return home to Romau. By the time the winters had let up, many in the legion had settled down and started families. They had formed a government of sorts - a hybrid of their knightly code and commonly agreed upon practices.\n\nUnder the guidance of the newly created role of Headmaster, their code, once something they had sworn upon in service of Romau, would now serve as the new calling of the Knightly Order of Arcturius."
 HLR_lore.1.a:0 "§YProtection§! of the innocent. §GDiligence§! in service. §tPurity§! of purpose."

 HLR_lore.2.t:0 "From the Archives - The Iuvenite Incursion (996 ALB)"
 HLR_lore.2.d:0 "The dawn of the invasion was preceded by a period of peace and quiet. The occasional roaming groups of undead were nowhere to be seen, though our scouts had reported increased activity within a few isolated areas far beyond our walls.\n\nAnticipating a potential assault, Headmaster Oscar reallocated knights from various parts of the Stromhoof region to the border. The Order had not seen a major attack in over fifty years, but like many of his predecessors, Oscar had spent decades studying the tactics of the Dread Lord, Iuvenis Maledicta, and he could tell that she was planning something.\n\nUnfortunately, while the knights at the wall were ready for battle, they were not prepared for the sheer number of undead that Iuvenis had raised. It is impossible to say how many there were for certain, but it is estimated that at least one million undead creatures were under the direct control of Iuvenis and her underlings. How they were able to control this many at once is still unknown.\n\nThe walls were breached within the hour. By the second hour, we had lost almost thirty percent of our initial forces. By the fifth hour, the fighting had spilled far past the walls, and the villages surrounding Brethold were under attack. Brethold itself fell by the seventh hour. When the the light of the sun began to fade in the eighth hour, Oscar sent out messengers to inform all settlements in the Stromhoof region to prepare for the worst. Unfortunately, he fell shortly afterward from exhaustion.\n\nJust before the sun vanished over the horizon, one of Oscar's knight commanders, Torygg, spotted the glint of regalia in the midst of the undead horde - Iuvenis Maledicta's crown. She had come forward from the safety of her horde, presumably to relish her victory.\n\nUnlike most knights, Torygg owned a rifle-musket, and here it proved to be crucial. He drew the weapon and fired it at the Dread Lord. The bullet struck her skull, stunning her. Torygg seized this opportunity and charged the lich, replacing his rifle with a blade specially enchanted by the Magesmiths of Stromhoof. In a single moment, the battle stopped as he stabbed the lich where its heart would have been. Nearly every undead monster ceased its movements, then crumbled to the ground along with the Dread Lord as Torygg's blade bypassed Iuvenis' phylactery and granted the lich true death.\n\nWhile the demise of the Dread Lord would normally have been a cause for celebration or a counter-invasion, our victory came at a terrible price: Almost eighty percent of knights within the Order had died, the wall we had guarded for hundreds of years was lost, and the clan of Bret had been decimated to a fraction of its former self."
 HLR_lore.2.a:0 "And thus we spent the next ten years rebuilding and preparing for vengeance."

 HLR_lore.3.t:0 "From the Archives - Clan Stormhoof"
 HLR_lore.3.d:0 "TODO: Once the greatest of the pony tribes in this land, they welcomed the initial band of Arcturian Knights with hooves of friendship over a millenia ago. Being masterful architects (for medieval standards) they assisted in the construction of several forces to help defend the land from the monsters coming from the Dread Peninsula. These ponies gave the Order the castle at the Tar Pine Rock as a gift for protecting them so much."
 HLR_lore.3.a:0 "Acknowledged"

 HLR_lore.4.t:0 "From the Archives - Clan Chloefolk"
 HLR_lore.4.d:0 "TODO: A somewhat mysterious group of forest-dwellers, these ponies flourished in the resource-rich area central to this land. They are skilled artisans and craftsponies. They became the primary supplier of equipment for the Arcturian Order in exchange for protection from the undead."
 HLR_lore.4.a:0 "Acknowledged"

 HLR_lore.5.t:0 "From the Archives - Clan Icewrought"
 HLR_lore.5.d:0 "TODO: A clan of ponies who have adapted to the extreme cold far better than any of the others could have. Could be depicted as snowponies. They get along with almost everyone, provided that they aren't openly hostile."
 HLR_lore.5.a:0 "Acknowledged"

 HLR_lore.6.t:0 "From the Archives - Clan Underkin"
 HLR_lore.6.d:0 "TODO: A fairly mundane group of ponies that used to fish along their northern coast, but had to stop due to the ever-increasing amount of undead finish that have become present on their coastline. Lives in burrows and caves to escape the cold weather. Has a vast cave network including the Weeping Caves below the Tar Pine Lake, and exceed in extracting raw materials from the land where others struggle to do so."
 HLR_lore.6.a:0 "Acknowledged"

 HLR_lore.7.t:0 "From the Archives - Clan Bret"
 HLR_lore.7.d:0 "TODO: What was once a small, proud kingdom over a millenia ago has been reduced to a few houses of "royals" and a few thousand refugees who still hold onto their heritage, but have been largely pushed aside by everyone as the Arcturian Order established themselves as the protectors of the land. Recently, the monsters from the Dread Peninsula had very nearly wiped out what was left of them."
 HLR_lore.7.a:0 "Acknowledged"

arcturian_torygg.1.t:0 "Call To Action"
arcturian_torygg.1.d:0 "Murmurs could be heard throughout the Council as the senior knights, scribes, and magesmiths of the Arcturian Order filtered into the Council Chamber. Headmaster Torygg had not informed them that there would be such a large audience for this week's meeting.\n\nThey didn't have to wait long before Torygg himself arrived, clad in ceremonial armor that he hadn't worn in ages. The esteemed Headmaster of the Order stood at the front of the room and rested a claw on the podium beside him. All eyes were on him as they could tell that this meeting would be more important than usual.\n\n"My dearest friends," said the old griff in a solemn tone, "Today marks the eleventh anniversary of the Luvenite Incursion that devastated our lands, and it also marks the second year since we began preparations to avenge those that we have lost."\n\nTorygg paused, taking a moment to close his eyes and breathe deeply. When he opened them again, a righteous fervor seemed to have replaced his gentle demeanor. "Which is why we must greatly expand our efforts to mobilize for a grand crusade of our own, the likes of which has not been seen in over a thousand years. To this end, I am exercising my power as Headmaster to issue a decree: There will be one more year to prepare ourselves, another to begin marching into the Dread Lands, and before the end of the third year we will take their dark fortress at the peninsula's end and finally be victorious."\n\nHe drew his sword and raised it into the air. "For the fallen! For Arcturius!""
arcturian_torygg.1.a:0 "For Arcturius!"

arcturian_torygg.2.t:0 "Reforging the Banners"
arcturian_torygg.2.d:0 ""It is no secret that the sword has fallen out of favor in the rest of the world. You of all griffons should know this, Ostwald."\n\nOstwald Vind raised an eyebrow at Torygg, "You sincerely believe that we should strive to replace our swords with muskets? To move away from a thousand years of tradition?"\n\n"Let me tell you a story," Torygg began, retrieving a battered old musket from his desk, "Many years ago, I lived in a faraway kingdom known as the Griffonian Empire. There was a revolution of sorts, and we had to take up arms against our brothers and sisters who had tried to storm the palace."\n\nTorygg eyed the rifle, wiping away some of the dust on it. "I didn't have a firearm. None of us did, the revolutionaries had seized almost all of them the day before. We were issued shortswords and told to defend the emperor with our lives." He paused, then looked directly into Ostwald's eyes. "I watched as my brothers and sisters were struck down from afar as they tried in vain to charge towards the enemy. I was lucky to have found a working musket off of a corpse nearby. And because of that musket, I was able to give pause to the rebels that were otherwise content to cut me down like my friends. I only lived because I sought out a better weapon than a mere blade."\n\nOstwald stood silently for a moment, then nodded. "It will be very difficult to replace every sword with a gun, you know. But you've convinced me how effective they can be.""
arcturian_torygg.2.a:0 "Now comes the hard part: Obtaining them."

arcturian_torygg.3.t:0 "Modernization Program"
arcturian_torygg.3.d:0 ""Headmaster, if you've a moment, I'd like to run over a few things with you."\n\nTorygg looked up from his desk to see Hans Becker, a senior architect within the Order. He greeted him with a tired smile. "Yes, of course. What is it?"\n\n"It's about the modernization program that you proposed. A lot of the changes that you wanted to make are just... difficult to implement, but I think I may have found a way to get us started, at least."\n\nThere was a moment of silence. "Well?" said Torygg with a slow gesture, "Go on."\n\nHans appeared hesitant. He took a deep breath, then continued. "You remember the siege of Griffenheim in 978? The one we both fought in?"\n\n"Just because we once fought on opposing sides doesn't mean that I hold any ill will to you, Hans. Out with it."\n\n"Well, I had followed the Republicans into Cloudbury afterwards. In the years since then, the Griffonian Republic had managed to turn a primitive, mostly rural society into one that was, though admittedly not very stable, much more modern than it used to be. I recall some of the methods they had used, and I had some ideas on how to adapt them to our lands.""
arcturian_torygg.3.a:0 ""I sense that it won't be that simple, but I trust your judgment, Hans.""

arcturian_torygg.4.t:0 "Inspection of the Guard"
arcturian_torygg.4.d:0 "Though it had been many years since he had drilled the recruits, Torygg still took great pride in watching the newly knighted griffons practice their formations. Being Headmaster meant that he was often swamped with clan politics and paperwork nowadays. Though he enjoyed his chats with the clan leaders, occasionally he wished that he had the time to teach the knights himself.\n\nThe 17th Stromhoof Regiment took to the air in waves, their armor seeming to have no impact on their speed. They spread out and drew their swords, then began to dive towards several dummy targets in unison. As each knight landed a blow, they retreated to begin another diving manuever.\n\nAs Torygg observed them practice, he couldn't help but notice something: The knights struck the targets with reckless abandon, as if their targets wouldn't ever try to hit them back. Additionally, their retreats became sluggish over time as they continuously landed and took off in quick succession. Torygg asked the drill instructor about this particular tactic, to which she replied that it had been taught for nearly a century. When asked about how ponies could perform the manuever, she shrugged and said that it wasn't designed with ponies in mind.\n\nTorygg nodded, then excused himself. It would seem that several tactics and traditions had become so ingrained in the Arcturian Order that they had begun to show their flaws.\n\nThe next day, Torygg sent out a missive to his three trusted subordinates about his newfound concerns. The Order needed to change its strategies and how it handled its pony minorities. The question was, how?"
arcturian_torygg.4.a:0 "And will there even be enough time to make such drastic changes?"

arcturian_torygg.401.t:0 "A Vanguard"
