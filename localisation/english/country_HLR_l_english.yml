### HLR Border War ###

HLR_border_war.1.t:0 "The Proposal" # Border War incoming. Dynamic loc based on whether William or Ostwald is leading the nation.
HLR_border_war.1.desc_william:0 "There was a knock at the door. "Headmaster, a moment, if you would?"\n\nWilliam Steelbeak glanced up from his paperwork-covered desk and sighed in relief - the desk work that came with being Headmaster seemed to never end. If he had known this much tedious reading and signing was needed, he wouldn't have accepted the role. "Of course, come right in."\n\nThe doorknob turned, and Ostwald Vind entered with half plate armor and a formal salute. "Headmaster, there has been much discussion from the Council of Clans following the attack on our leadership and your appointment as Headmaster. They wish to propose an idea that would ease the difficulty of our invasion plan."\n\n"Ostwald, we're friends. Just because I'm Headmaster now doesn't change that. Please, call me William."\n\nOstwald lowered his salute and offered a slight smile. "Very well, William, but only in private. The Code dictates that rank is to be respected while on duty, after all."\n\n"Thank you," William chuckled to himself. Ostwald was always a stickler for the rules, for better or worse. "As for this idea from the pony clans, what is it?"\n\n"As you know, just over a decade ago we lost the ancestral home of the Bret clan. Following our pyrrhic victory over the Dread League, we had an immense surge of ponies from all of the clans enlisting to join our knightly order, but the largest number of new recruits has come from the Bret ponies."\n\nWilliam nodded. "Makes sense. It's natural to be upset about losing their home, though Torygg did promise to help them take it back in our coming invasion."\n\nOstwald produced a sketched map from his armor and unfolded it for William to look at. "That is where the Council's idea comes in: They wish for us to attempt an early, controlled push into occupied territory. We take back Brethold, but stop the moment we reach the Frostfyre wall. This would both give our new recruits valuable combat experience as well as help us ascertain the current strength of the Dread League prior to our proper invasion."\n\nWilliam took a moment to think it over, then nodded in agreement once more. "Yes, I like it, but we still need a bit of time to prepare for such an attack..." William skimmed some nearby logistics sheets, "Yes, we'll have to wait a bit. Make preparations to march upon Brethold and Fyrefort.""
HLR_border_war.1.desc_ostwald:0 "There was a knock at the door. "Ostwald, may I come in? I have a message from the Council of Clans."\n\nOstwald Vind glanced up from his paperwork-covered desk as he recognized William Steelbeak's voice. Perhaps a break from this monotonous work would be welcome. "Enter."\n\nThe doorknob turned, and William entered clad in a tunic, with a folded parchment in his breast pocket. "Thank you. How's being Headmaster treating you?"\n\n"You know the Code dictates that rank is to be respected when on duty, Knight-Captain William," Ostwald allowed himself a small smile as he watched William straighten his posture, then spoke again before William could correct himself, "Though I'll make an exception for you, my friend. I am doing well, all things considered. Though the paperwork is quite tedious." He spotted the parchment in William's tunic. "What is this message you bear?"\n\n"Right." William retrieved and unfolded the parchment - a map of North Bret - for Ostwald to see. "As you know,  we lost an extremely large number of our knights as well as the ancestral homeland of the ponies of the Bret tribe during the Iuvenite Incursion." William pointed to Brethold on the map. "Since then, a lot of ponies have enlisted to join the Order. And of those ponies, the largest number of them are of Bret heritage."\n\nOstwald nodded, "I ran the census numbers myself, William. This is not news to me. Are they worried about something? I have already reaffirmed that we would carry out Torygg's promise to the Bret tribe to reclaim their home."\n\n"Well, the Council of Clans was hoping that we could attempt an early push into the land we've lost. A controlled offensive that stops just past Brethold at the Fyrefort wall, and no further. They say a quick, easy victory would galvanize our newest recruits for the invasion ahead, since many of them desire vengeance for their fallen brethren."\n\nOstwald examined the map as he mulled over the idea. Deviate from Torygg's original invasion plan? He was dubious about this proposed offensive. Although... it could work. Yes, the more he thought about it, the more positives he could see. A decisive victory before the main invasion would grant valuable combat experience to the new recruits, as well as skyrocket morale for the war to come. On top of that, they could ascertain the strength of the Dread League prior to the real invasion. He nodded, then gave the map back to William. "Very well. Make preparations to march upon Brethold and Fyrefort. I trust you can take care of that?""
HLR_border_war.1.a_william:0 "Ostwald saluted once more, "We shall return our charges' home to them.""
HLR_border_war.1.a_ostwald:0 "William saluted, "I shall. We'll return this land to its rightful owners.""

HLR_border_war.2.t:0 "The March Upon Brethold" # Border War about to begin
HLR_border_war.2.desc:0 "The morning air was especially cold today. Not that the knights weren't used to it, given their enchanted armor, but the chilly air combined with the weight of the coming battle was amplifying the trepidation many were feeling. [HLR.GetLeader] had given them ample time to prepare, even beginning their march with a motivational speech, but the fact of the matter was that this would be the first real battle for the vast majority of them. Each knew that there was a chance they would not return home, even if they wouldn't admit it to themselves.\n\nBeside the strategic benefit of regaining the lost homeland of the Bret tribe, [HLR.GetLeader] also knew that this battle would drastically affect an arguably more important factor in the coming war: morale. Having this many fresh troops win their first battle would bolster their spirits beyond measure.\n\nA horn sounded. A scout had reported an army departing Brethold in their direction. [HLR.GetLeader] raised his sword, ordering his troops to remember their training and to keep rank unless ordered otherwise.\n\nSoon enough, they spotted a dense blur in the distance through the snowy field. [HLR.GetLeader] narrowed his eyes as he ascertained the enemy forces. It seemed that the necromancers were bringing new monstrous creatures he had never seen before, but he had to trust that recent advancements in his troops' armaments would ensure a victorious engagement.\n\nBy the end of the day, he swore to have the Arcturian banner watching over the citadel of Brethold once more."
HLR_border_war.2.a:0 "To battle!"

HLR_border_war.3.t:0 "The Battle For Brethold" # William wins
HLR_border_war.3.desc:0 ""Keep marching forward! Not one step back!" William Steelbeak shouted as he sliced apart another skeletal soldier. "Destroy each ghoul before moving on to the next!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was steadily swinging in the Arcturians' favor. It helped that, for once, they were not outnumbered. For whatever reason, the Dread League did not seem to value holding this region as much as the Arcturians wanted it back. That didn't make winning this engagement any easier, however, as the main problem with undead opponents was their unfortunate tendency to get back up after being "killed."\n\nWhile the more experienced knights knew this and often reminded their new comrades of what to expect, despite years of training, the large number of fresh troops present were not accustomed to their opponents behaving in such a manner. As a result, the Arcturians were beginning to suffer casualties. Not to mention that the twitching, hulking undead abominations were causing numerous issues for both experienced and inexperienced knights alike.\n\nOstwald Vind approached his commanding officer to get his attention. "William, we're slowly forcing their retreat, but we're starting to take losses." That caused William to grimace, as he wanted to win with as few dead as possible. He nodded to his trusted friend to continue, "If I may suggest, we should have our auxiliary marksgriffs and marksponies focus fire on the mages controlling the undead. We have firearms now; we should utilize them on better targets than the ones our frontline can handle."\n\n"Give the order," William stated after a moment, "And make sure they prioritize avoiding friendly fire by only targeting mages far away from our knights."\n\n"Of course, headmaster." Ostwald saluted before returning to his division.\n\nNot long after, William noticed an immediate spike in the number of undead falling to the ground as their puppet masters were cut down by focused gunfire. He allowed himself a grin as what few enemies remained were routed, chased down, and eliminated. They even managed to secure a few prisoners, which was a rare achievement.\n\nWith a victory this decisive, they could push the rest of the undead out of the area and return the ancestral home of the Bret tribe to its rightful owners."
HLR_border_war.3.a:0 "Brethold today, Magehold tomorrow!"

HLR_border_war.4.t:0 "The Battle For Brethold" # William ties part 1
HLR_border_war.4.desc:0 ""Keep marching forward! Not one step back!" William Steelbeak shouted as he sliced apart another skeletal soldier. "Destroy each ghoul before moving on to the next!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was a deadlock. Both the knights and the necromancers they faced were not willing to concede the region, and were locked in a struggle balanced on a knife's edge. The marksgriffs and marksponies fielded by the Arcturian Order, along with a few artillery squads, seemed to match the new monsters the Dread League had brought in addition to their standard ghouls: twitching, hulking undead abominations that sent many a knight careening away from the safety of their formations.\n\nThere was also the fact that many of the newer knights were not used to their foes getting back up after being "killed." While the more experienced knights knew this and often reminded their new comrades of what to expect, despite years of training, the large number of fresh troops present were not accustomed to their opponents behaving in such a manner. As a result, the Arcturians were beginning to suffer casualties.\n\nOstwald Vind approached his commanding officer to get his attention. "William, our new recruits are performing well, but we're starting to take losses." That caused William to grimace, as he wanted to win with as few dead as possible. He nodded to his trusted friend to continue, "If I may suggest, we should have our auxiliary marksgriffs and marksponies focus fire on the mages controlling the undead. We have firearms now; we should utilize them on better targets than the ones our frontline can handle."\n\n"Give the order," William stated after a moment, "Though make sure that those hulking brutes are prioritized first. Every second those things spend bashing at our frontline risks a break in formation."\n\n"Of course, headmaster." Ostwald saluted before returning to his division.\n\nNot long after, William noticed a few sections of the undead legion collapsing to the ground as their puppet masters were ripped apart by gunfire. Unfortunately, the other mages quickly grew wise to the tactic and sought cover. Despite this tipping the scales slightly in the knights' favor, there was still an obscene amount of undead to deal with, and so William buckled in for a long, drawn-out conflict."
HLR_border_war.4.a:0 "As the battle continued, the temperature began to drop..."

HLR_border_war.5.t:0 "The Battle For Brethold" # William loses
HLR_border_war.5.desc:0 ""Hold fast! Don't let them get behind us!" William Steelbeak shouted as he sliced apart another skeletal soldier. "Destroy each ghoul before moving onto the next!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was not going well. While the Arcturians were used to being outnumbered, the Dread League brought a significantly larger amount of forces than they usually did, along with twitching, hulking undead abominations that sent many a knight careening away from the safety of their formations. It didn't help that the newer knights weren't used to the undead getting back up after being "killed."\n\nWilliam grimaced as he tried to figure out how they were being outmatched. Did the Dread League actually become this powerful to match the Arcturians' new armaments? Were they playing their strongest cards first? Or did he simply not bring enough forces to take back Brethold? He mentally kicked himself for not preparing enough. On top of it all, they were starting to suffer casualties.\n\nOstwald Vind approached his commanding officer to get his attention. "William, despite the effectiveness of our new weaponry against the standard undead, if we do not change tactics quickly, we will be surrounded." William tightened his grip on his sword. Blast it all! He nodded to his trusted friend to continue, "I would suggest that we order a general retreat before we lose too many knights. We need them for our upcoming invasion plan."\n\n"Give the order," William stated after a moment, "And make sure that we prioritize evacuating the wounded first. Have our marksgriffs and marksponies focus on shooting any hostiles that get too close to our backline."\n\n"Of course, headmaster." Ostwald saluted before returning to his division.\n\nNot long after, William heard a horn sound, signaling organized retreat. He added his own calls to fall back as well. His mind stirred as he tried his best to ensure as many knights as possible made it out alive. How could they hope to defeat the Dread League in a bigger war if they couldn't best the undead in a simple offensive like this? Those fiends didn't even bring out any vampires to fight today.\n\nWith a defeat this decisive, two things were for sure: Brethold remained lost, and the Arcturians would need to seriously consider rethinking their methods if they wanted to go through with their invasion of the Dread Peninsula."
HLR_border_war.5.a:0 "We may suffer defeat today, but victory will be ours tomorrow."

HLR_border_war.6.t:0 "The Battle For Brethold" # Ostwald wins
HLR_border_war.6.desc:0 ""Stay in formation! Don't chase down any stragglers!" Ostwald Vind barked as he sliced apart another skeletal soldier. "Thoroughly pulp each corpse - leave none in a state to be raised again!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was steadily swinging in the Arcturians' favor. It helped that, for once, they were not outnumbered. For whatever reason, the Dread League did not seem to value holding this region as much as the Arcturians wanted it back. That didn't make winning this engagement any easier, however, as the main problem with undead opponents was their unfortunate tendency to get back up after being "killed."\n\nFortunately, Ostwald's constant reminders mitigated the issue of inexperienced troops not remembering to cut the dead to pieces. However, his strict orders to remain in formation was causing minor issues elsewhere, as the twitching, hulking undead abominations that the League was fielding were causing some casualties as they brutally smashed troops that did not evade their blows.\n\nWilliam Steelbeak approached his commanding officer to get his attention. "Ostwald, those brutes are taking advantage of our rigid movements. We're starting to take losses." That caused Ostwald to furrow his brow. He realized that William was correct, so he nodded to his trusted friend to continue, "I think we should relax our formations whenever the larger undead are near. Make them a priority target so we can return to rank after they are dealt with."\n\n"Give the order, and have our marksgriffs and marksponies focus fire on them," Ostwald stated without hesitation. He then offered a slight smile, "Your adaptable tactics have always proven useful, William. I'm sure this will be no different."\n\n"Thank you, headmaster!" William saluted before returning to his division.\n\nNot long after, the problem that was the hulking abominations dissipated as coordinated gunfire along with evasive blades took down one after another. Then with the necromancers' only trump card gone, they were routed in short order. Only then did Ostwald order squads to chase down and eliminate the retreating mages.\n\nWith a victory this decisive, they could push the rest of the undead out of the area and return the ancestral home of the Bret tribe to its rightful owners."
HLR_border_war.6.a:0 "Brethold today, Magehold tomorrow!"

HLR_border_war.7.t:0 "The Battle For Brethold" # Ostwald ties part 1
HLR_border_war.7.desc:0 ""Stay in formation! Don't chase down any stragglers!" Ostwald Vind barked as he sliced apart another skeletal soldier. "Thoroughly pulp each corpse - leave none in a state to be raised again!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was a deadlock. Both the knights and the necromancers they faced were not willing to concede the region, and were locked in a struggle balanced on a knife's edge. The marksgriffs and marksponies fielded by the Arcturian Order, along with a few artillery squads, seemed to match the new monsters the Dread League had brought in addition to their standard ghouls: twitching, hulking undead abominations that sent many a knight careening away from the safety of their formations.\n\nThere was also the fact that many of the newer knights were not used to their foes getting back up after being "killed." Fortunately, Ostwald's constant reminders mitigated the issue of inexperienced troops not remembering to do that. However, his strict orders to remain in formation were causing minor issues elsewhere, as the gigantic undead monstrosities were flattening troops that did not evade their blows.\n\nWilliam Steelbeak approached his commanding officer to get his attention. "Ostwald, those brutes are taking advantage of our rigid movements. We're starting to take losses." That caused Ostwald to furrow his brow. He realized that William was correct, so he nodded to his trusted friend to continue, "I think we should relax our formations whenever the larger undead are near. Make them a priority target so we can return to rank after they are dealt with."\n\n"Give the order, and have our marksgriffs and marksponies focus fire on them," Ostwald stated without hesitation. He then offered a slight smile, "Your adaptable tactics have always proven useful, William. I'm sure this will be no different."\n\n"Thank you, headmaster!" William saluted before returning to his division.\n\nNot long after, the problem that was the hulking abominations dissipated as coordinated gunfire along with evasive blades took down one after another. Despite this tipping the scales slightly in the knights' favor, there was still an obscene amount of undead to deal with, and so Ostwald buckled in for a long, drawn-out conflict."
HLR_border_war.7.a:0 "As the battle continued, the temperature began to drop..."

HLR_border_war.8.t:0 "The Battle For Brethold" # Ostwald loses
HLR_border_war.8.desc:0 ""Hold the line! Protect one another as you would yourself!" Ostwald shouted as he sliced apart another skeletal soldier. "Thoroughly pulp each corpse if you can, but do not leave rank!"\n\n"Yes, headmaster!"\n\nBy all accounts, the battle was not going well. While the Arcturians were used to being outnumbered, the Dread League brought a significantly larger amount of forces than they usually did, along with twitching, hulking undead abominations that sent many a knight careening away from the safety of their formations. It didn't help that the newer knights weren't used to the undead getting back up after being "killed."\n\nWhile Ostwald's constant reminders to destroy enemy corpses mitigated that issue, ultimately, that was a minor problem in the bigger picture: they were losing. Ostwald cursed himself for not preparing enough for this engagement. Obviously, the Dread League valued this region. Otherwise, they would have withdrawn long ago. Did he really think he could simply march in with inexperienced troops to reclaim Brethold? Even with their new armaments, he could see the issue as clear as day: they simply did not field enough soldiers.\n\nWilliam Steelbeak approached his commanding officer to get his attention. "Ostwald, those brutes are taking advantage of our rigid movements. We're starting to take losses, and at this rate, we'll be surrounded." That caused Ostwald to furrow his brow. He realized that William was correct, so he nodded to his trusted friend to continue, "I think we should issue a general retreat and relax our formations in the rear to ensure that none of them can get behind us."\n\n"Give the order, and have our marksgriffs and marksponies focus fire on any groups attempting to flank us," Ostwald stated without hesitation, "Prioritize minimizing casualties as much as possible."\n\n"Right away, headmaster!" William saluted before returning to his division.\n\nNot long after, Ostwald heard a horn sound, signaling organized retreat. He added his own calls to fall back as well. His mind stirred as he envisioned the speech he would have to give to the troops after such a drastic loss to keep morale up. William was better at that sort of thing.\n\nWith a defeat this decisive, two things were for sure: Brethold remained lost, and the Arcturians would need to seriously consider rethinking their methods if they wanted to go through with their invasion of the Dread Peninsula."
HLR_border_war.8.a:0 "We may suffer defeat today, but victory will be ours tomorrow."

HLR_border_war.9.t:0 "The Snowstorm" # William ties part 2. Snowstorm. William continues fighting, gets injured, and takes shelter in a cave.
HLR_border_war.9.desc:0 "As the fighting raged on, the still air turned into a breeze. Then it became a gust. Clouds rolled in at frightening speeds, and the now-fierce wind began to blanket the battlefield in chilling frost.\n\n"Headmaster, the wind is picking up! Visibility is dropping fast!" One of William's lieutenants shouted, as if that was not immediately obvious. Then that same lieutenant became obscured by a smothering white fog.\n\nIt was times like these that William was grateful to the magesmiths for crafting powerful temperature regulation enchantments into his knights' armor. However, while fighting in these conditions was not impossible for him and the more experienced knights, the fact of the matter was that this was the first battle for most of the knights present, on top of the auxiliary forces not having enchanted armor to protect them from the elements.\n\nWilliam reached for his horn to sound a retreat, but stopped as he realized something: the new knights would have to win battles like this in the future. If they could not do it now when they were on the verge of victory, then the lack of experience could spell disaster once they were forced to fight in these conditions when they were deep in the Dread Peninsula. He put his horn away, then marched forward to aid his blinded brethren.\n\n---\n\nWilliam gasped as he stumbled upon an empty cave to escape the blizzard. He released his blood-soaked claw from his side, grimacing as he realized the wound was much worse than he initially thought. He cursed himself for not ordering a retreat. He knew Ostwald would have pulled back long ago, but William so desperately wanted a victory that he had stayed out far longer than he should have.\n\nHe slipped to the ground against one of the rocks in the cave as he recollected what had happened. One of the gargantuan undead abominations had appeared from seemingly nowhere. It had reached a limb toward him; crushing and ripping off a part of his plated armor and a good chunk of flesh and feathers with it. Then it punched him with such force he went flying quite a distance away. The adrenaline had kept him going for a bit, but William knew he was in no shape to fight anymore, much less run or fly. He had to hope that his troops would emerge victorious, or he would be forced to find his way back unaided.\n\nHe did not remain alone for long. A hooded figure entered the cave and spotted him shortly after. She was a pink unicorn, one with brilliant amber eyes, almost red. He could tell that this was one of the Dread League's vile mages responsible for all of this, but she seemed almost... apprehensive? Nevertheless, there was only one thing he could do."
HLR_border_war.9.a:0 "William forced himself to stand as he prepared to fight."

HLR_border_war.10.t:0 "The Snowstorm" # Ostwald ties part 2. Snowstorm. Ostwald orders a general retreat.
HLR_border_war.10.desc:0 "As the fighting raged on, the still air turned into a breeze. Then it became a gust. Clouds rolled in at frightening speeds, and the now-fierce wind began to blanket the battlefield in chilling frost.\n\n"Headmaster, the wind is picking up! Visibility is dropping fast!" One of Ostwald's lieutenants shouted, as if that was not immediately obvious. Then that same lieutenant became obscured by a smothering white fog.\n\nIt was times like these that Ostwald was grateful to the magesmiths for crafting powerful temperature regulation enchantments into his knights' armor. However, while fighting in these conditions was not impossible for him and the more experienced knights, the fact of the matter was that this was the first battle for most of the knights present, on top of the auxiliary forces not having enchanted armor to protect them from the elements. Thus, he grabbed the horn on his belt and sounded a general retreat.\n\nOstwald's thoughts stirred while he ensured that his troops made it out as safely as possible. The weather conditions were favorable earlier. Were they really fighting long enough for that to change? He shook his head. It didn't matter. The region would remain contested... at least until he launched his full-scale invasion of the Dread Peninsula.\n\nAt the very least, this was valuable combat experience for the new knights."
HLR_border_war.10.a:0 "We shall reclaim this land another day."

HLR_border_war.11.t:0 "Fateful Encounter" # William and Rosa meet. William listens to Rosa.
HLR_border_war.11.desc:0 ""You're wounded." The unicorn said bluntly as William raised his sword against her. He was struggling to keep it still, and his heavy breathing betrayed his weakness.\n\n"Still strong enough to defeat the likes of you," William bluffed. He felt like he would faint any second now, but doing so would mean certain death. He knew he lacked the strength to actually charge her, so his only option was to intimidate her into leaving. "I've slain enough of your kind to know that even now you stand no chance against me."\n\nWhat happened next, however, caught him off guard. The mage looked from side to side, as if to confirm that they were alone, then sat down and raised her hooves. "No, no, I don't want to fight. I..." She looked away, "I was just trying to get away from the battle."\n\nWilliam's eyes narrowed with suspicion. "Then flee from here, coward. Go back to your haven of evil, and I'll slay you there."\n\nThe mage returned her eyes to his. She was quiet for a time, enough that William's sword slipped from his grip and fell to the rocky ground. The mage then spoke in a very quiet, reserved tone. "Please stop. I don't want to hurt you..."\n\nThe gears in William's head were turning. Why was a mage of the Dread League acting so uncharacteristically merciful? "You've already hurt my brothers and sisters plenty enough, witch. Why could you possibly not want to do that now?"\n\n"I'm not a bad person." Her voice was almost a whisper. "But I can see why you would think that. Innocents die every day because of my orders."\n\n"Orders? Just who are you?" William asked.\n\nShe stared intently at him, though William could see hesitation written all over her face. "My name is Rosa Maledicta. I'm the Dread Lord, following Corpus Maledictus, and Iuvenis Maledicta before him."\n\nWilliam almost laughed. The Dread Lord? If she was telling the truth, then he was face-to-face with the successor to the lich that Torygg had slew all those years ago. And he could barely lift a claw to face her. It hurt to smile at his luck. "William Steelbeak. Headmaster of the Knightly Order of Arcturius, following Torygg Brightclaw."\n\nRosa's eyes widened after he introduced himself. She stood up, then paced back and forth for a bit, seemingly deep in thought."
HLR_border_war.11.a:0 "After a while, she took a deep breath and said..."

HLR_border_war.12.t:0 "The Dread Lord's Proposition" # Rosa confides in William and asks him for help.
HLR_border_war.12.desc:0 ""...Listen. I know you don't have any reason to trust me, but if you are who you say you are, then, well..." Rosa's voice trailed off as she fixed her gaze on the frigid rocks nearby, "I have a dream. A dream that one day, I'll be able to prove to the world that necromancy isn't inherently evil, and that if I study and train hard enough, I'll be able to bring someone back from the dead. The right way - not a walking corpse or a rudimentary emulation of 'life' that isn't really alive at all."\n\nWilliam grimaced as a sharp pang struck his wound. He really needed to treat that soon. "Necromancy is dark magic for a reason. It's evil and can cause nothing but pain and suffering."\n\n"You don't know that, though!" Rosa exclaimed. "Necromancy is just a tool like any other, but magical society has only ever used it for evil. There's so much potential for good with necromancy, but..." she sighed with a tiredness William saw in himself, "...nobody will give me a chance to prove it."\n\nJust what was her angle? Was this an act? William truly could not read this mare. "How in the world did someone like you become the Dread Lord?"\n\n"Determination to see my dream fulfilled." She said resolutely. "Magehold is filled with an untold breadth of magical knowledge far beyond anything I have ever seen, but it is guarded by the most vile, evil creatures to ever exist."\n\n"And why are you telling me this? What do you want from me?"\n\n"I want you to help me purge most of the Dread League. I don't have the means or authority to cull the most wicked groups, but with help from outside, maybe I could free Magehold to be used by good people. Or at the very least, those who don't enjoy hurting others. Then I could pursue my dream without the guilt of associating myself with such horrible mages."\n\nWilliam sat in silence as he absorbed her words. What she wanted seemed impossible, yet... perhaps surgical strikes on key parts of the League's most powerful groups could be done with guidance. His thoughts turned to the Hunters of Elias. That group may be useful for such a task, and he knew they would jump at the opportunity to wreak havoc on the League. Some of his most elite knights could help as well. Even if this idea didn't work out, the Arcturian Order stood to gain much from destabilizing the Dread League from the inside.\n\nThere was, however, a serious problem with helping Rosa: He would need to keep his cooperation a secret. Many of his subordinates, Ostwald included, would be more than upset with him if they found out that their headmaster was collaborating with the enemy, even if it was for a noble goal. Not to mention he didn't know if Rosa could be trusted, or what she might do if he declined her offer."
HLR_border_war.12.a:0 "Very well. I'll help you." # William agrees to help
HLR_border_war.12.b:0 ""I'm sorry, but no. There's too much blood spilt between us."" # William does not agree to help

HLR_border_war.13.t:0 "Sealed Fate" # Rosa does not confide in William and they go their separate ways.
HLR_border_war.13.desc:0 ""...I'm sorry. I... I should go. We shouldn't be talking, I... the others wouldn't like this if they found out."\n\nWilliam tilted his head as he observed Rosa's hesitation. He could tell that there was something heavy on her mind, but he honestly did not care enough to pry. He had bigger problems to worry about, like his wound. He tightened his grip on it and grimaced. "Leave, then. I need to tend to myself."\n\nRosa looked almost sullen as she turned to depart. Before even taking a few steps, she reversed herself. "Wait. At least let me treat your injury. I may not be the best healer, but... you might die before getting back to your friends."\n\nWilliam was starting to feel rather tired. Not a good sign. He gave her a curt nod, and she lit her horn to carefully tend to his wound. He grit his beak in pain as she worked. "I'm surprised someone like you knows healing magic."\n\n"My parents wanted me to be a healer, like them," said Rosa, "Back when I was little, and they found out my special talent was necromancy, they tried their best to keep my mind away from the 'dark arts'. Even enrolled me in Celestia's School for Gifted Unicorns..." a tiny smile appeared, then vanished as she looked away, "...sorry. None of that matters anymore. You should be fine now, though try to be careful."\n\nWilliam raised an eyebrow, but said nothing. Truthfully, he had conflicting feelings about this unicorn. Her words seemed truthful, and her kindness was genuine. What could possibly possess a mare like her to become the ruler of such heinous, unapologetic monsters? He didn't know."
HLR_border_war.13.a:0 "And as she left, he never would."

HLR_border_war.14.t:0 "They Who Would Defy Fate" # William agrees to help Rosa. Time to change the world.
HLR_border_war.14.desc:0 "After confirming their agreement, Rosa cast a simple healing spell to patch up William's wound. Then they got into the details of exactly how their plan was going to work.\n\nFor starters, William learned that of the many groups of interest within the Dread League, two stood out as irredeemably evil: An undead death cult known as the Circle of the Salvific Ossuary, and the oldest, most powerful vampire clan: House Rubra. These two would have to be eradicated, no matter what. The problem was that they were also the largest factions within the League.\n\nThankfully, they did not hold full sway over the League. Rosa spoke of two other factions that would likely aid her: the Animus Institute - a group of necromancers dedicated to raising lifelike undead, as well as a mostly-underground group of symbiotic vampires known as House Concors. While they weren't "good" by any means, they held great distaste for the largest factions, and would almost certainly side against them should push come to shove.\n\nOn top of those four, there were three additional factions that Rosa admitted were wildcards. She said she would try to convince them to join her cause, but she was not certain if they could be reasoned with.\n\nWilliam furrowed his brow as the details of their plan sank in. Rosa would leak information on the whereabouts of influential individuals and stockpiles, and then it would be William's job to eliminate them. Once the target groups were sufficiently crippled, Rosa would announce her intention to reform the Dread League into, well, something less dreadful.\n\nOne problem quickly became obvious, however: communication. The two of them obviously could not meet face to face again, and sending scouts out to relay messages ran the risk of their plot being uncovered. After some debate, the two arrived at the idea of a scrying well. She gave him an enchanted stone that was linked to her well. They would speak once a week at midnight, provided that no one was watching them.\n\nEventually, the time came for the two to depart. This plan of theirs was beyond risky. To end the conflict between the Dread League and the Arcturian Order in such a manner seemed impossible. But what William saw in her eyes as she left, well... perhaps enough determination could overcome anything."
HLR_border_war.14.a:0 "If we succeed, this could change the world." # Tooltip: Coordination and secrecy will be key to success. Ensure that you target only those who Rosa tells you to. Match her actions as she matches yours. Do not raise any suspicions, lest you be forced to cut ties with Rosa to save face.

HLR_border_war.15.t:0 "Sealed Fate" # William does not agree to help Rosa and they go their separate ways.
HLR_border_war.15.desc:0 ""I'm sorry, but no. There's too much blood spilt between us."\n\n"I... I understand." Rosa's expression faltered as she failed to conceal her disappointment, "I wouldn't help me either if I was in your position." After William failed to respond, she continued, "...I'm sorry. I... I should go. We shouldn't be talking, I... the others wouldn't like this if they found out."\n\nA sharp pang reminded William of his injury. "Leave, then. I need to tend to myself."\n\nRosa looked almost sullen as she turned to depart. Before even taking a few steps, she reversed herself. "Wait. At least let me treat your injury. I may not be the best healer, but... you might die before getting back to your friends."\n\nWilliam was starting to feel rather tired. Not a good sign. He gave her a curt nod, and she lit her horn to carefully tend to his wound. He grit his beak in pain as she worked. "I'm surprised someone like you knows healing magic."\n\n"My parents wanted me to be a healer, like them," said Rosa, "Back when I was little, and they found out my special talent was necromancy, they tried their best to keep my mind away from the 'dark arts'. Even enrolled me in Celestia's School for Gifted Unicorns..." a tiny smile appeared, then vanished as she looked away, "...sorry. None of that matters anymore. You should be fine now, though try to be careful."\n\nWilliam raised an eyebrow, but said nothing. Truthfully, he had conflicting feelings about this unicorn. Her story seemed truthful, and her kindness was genuine. How could she possibly hope to achieve her goal, even with his help? He didn't know."
HLR_border_war.15.a:0 "And as she left, he never would."

