arcturian_torygg.502.t:0 "To Seek Vengeance"
arcturian_torygg.502.d:0 "War preparations were in full swing in Fortress Boreas. All around the keep, knights of every caliber were moving materials, building tools, and taking stock of equipment. Above them, a young, female pegasus named Elfreda oversaw their actions from a balcony. Technically she should have been down there with them, as she was merely a knight-lieutenant, but she could sense that some of those below her weren't fully invested in the preparations.\n\nShe thought back to that terrible battle in her hometown eleven years ago where she had been rescued as a filly by Torygg's forces. Ostwald had pulled her from the dying embrace of her mother and slew dozens of undead to bring her to safety. She shuddered at the memory. Darkness had nearly swallowed her then.\n\nShe wouldn't allow such terrible things to ever happen again.\n\n"Brothers and sisters!" she suddenly shouted, "What do you fight for! Why are you here?!" Her commanding voice had an immediate effect: most of the others had stopped working to look at the pegasus standing over the balcony. An ember began to burn inside of her. "The answer is clear: To make the monsters of the Dread Lands pay! The deaths of our loved ones are not something to be met with half-heartedness, but with fury! Our righteous wrath will cleanse our souls and burn every last vile abomination that faces us to ash! When we go beyond the safety of our walls, we will do so with the light of Arcturius shining through us! A light that can never be snuffed out!"\n\nShe raised her wings and ascended into the air, her heart filled with fiery reverence, "Arcturius watches over each of us! He will protect us, so long as we are faithful! We must always keep this knowledge with us, for it will grant us the strength to destroy the enemy!"\n\nDespite the suddenness of her speech, it seemed to have a profound effect on all who heard it. The knights redoubled their efforts and even began to chide those who weren't working hard enough."
arcturian_torygg.502.a:0 "Arcturius Protects..."

arcturian_torygg.6.t:0 "A Cleanup in Pondwatch"
arcturian_torygg.6.d:0 "Mathiaus Clawthorn flipped through the parchments detailing the monthly reports of the strongholds, towns, and outposts that comprised the Arcturian Order. Most of the time, these reports weren't that interesting to read. Recruitment numbers, births and deaths, disputes between the pony clans, and so on. They'd started trying to keep track of everything ever since the Luvenite Incursion in 996 had nearly wiped them out.\n\nHe was ready to file away the parchments when something caught his eye. A report from the local garrison in Pondwatch. He picked it up and examined it: A vampire cell had been detected and neutralized, but the knights stationed there had suffered several casualties.\n\nMathiaus frowned. This was troubling. Vampire attacks had become more and more problematic lately, especially after Torygg had made his big speech about invading the Dread Peninsula.\n\nThough he was a priest first and a scribe second, Mathiaus knew that the Order could not rely on faith alone to halt these attacks. He would need to consult the Headmaster on what to do."
arcturian_torygg.6.a:0 "These cells are getting uncomfortably close to the capital..."

arcturian_torygg.601.t:0 "Tackling the Vampiric Threat"
arcturian_torygg.601.d:0 ""This is getting out of control," said Torygg as he pointed towards the map of the Stromhoof region. He had summoned his most trusted Knight-Captains, Ostwald Vind and William Steelbeak, for an emergency meeting. They looked at the central table, where multiple red pins were inserted around places where vampire cells had been found. Torygg pushed another pin into the map. "We've been receiving more and more reports about vampire attacks all over our territories, and now they have started to appear in Pondwatch. That's less than two days' travel from here. Before we know it, they'll be here in the Tar Pine Rock." Torygg paused, looking straight into his subordinates' eyes. "What I need from you two are ideas on how to deal with this threat before it gets any worse."\n\nOstwald leaned forward in his chair, deep in thought. "Perhaps a separate branch inside of the Order could be established," he suggested, "One wholly dedicated to investigating these vampire cells. They'll seek to understand their methods and patterns, then counter them before they strike again."\n\nWilliam shook his head. "That could work Ostwald, but by the time this branch of yours learns enough about the patterns of these vampires, it'll probably be too late. What we need are professionals—and before you stop me, hear me out: The Hunters of Elias have been honing their skills for centuries. They've never once bothered us, and have even tipped us off to certain attacks in the past. We should consult them on how to deal with these vampires."\n\nOstwald stood, preparing to scold William for even suggesting such an idea, when there was a knock at the door. "Come in!" yelled Torygg.\n\n"Uhm, sorry for interrupting," said a young pegasus as she opened the door, "I just couldn't help but overhear your conversation, and..."\n\n"Ah, Lieutenant Elfreda! Don't worry, your voice is always welcome here," reassured Torygg, "If you have an idea, then go ahead! Let's hear it."\n\nElfreda cleared her throat. "Well, our garrisons are just token forces, not used to the degree of infiltration we're dealing with now. We should give our local town watches additional responsibilities. Make dealing with vampires in hiding a part of their training, so that when the time comes for us to actually invade the peninsula, they'll have the knowledge they need to deal with those wretched monsters while we're busy up north."\n\nTorygg nodded as she finished speaking. "I see. These are fine suggestions, but I'll need some time to think about them. Thank you all for your input.""
arcturian_torygg.601.a:0 "Now to actually choose the best approach..."


arcturian_torygg.602.t:0 "The Arcturian Templars"
arcturian_torygg.602.d:0 ""Listen closely, and listen well. What you are about to become a part of is not something that should be taken lightly."\n\nKnight-Captain Ostwald Vind walked down between the knights he had personally selected as candidates. He had spent the better part of a week deciding on who would be here today, and judging by how they were all silently standing at attention, he had chosen well.\n\n"You will be separate from the rest of the Arcturian Order. The Code that you have sworn to uphold will no longer be your sole guiding principle. Your current rank will be meaningless, and you will likely earn the ire of the other knights as well." Ostwald stopped at the end of the room, facing away from all of the candidates. "If this is too much to ask of you, then you may leave this room. I will not stop you, and you will be able to return to your previous duties as if this meeting had never occurred."\n\nOstwald listened closely but heard no movement behind him. He let himself smile a little. "Very well." He turned around, then began to walk back towards the front of the room. "From this day forward, you will no longer be known as a Knight. You will not answer any calls or summons for knights. Instead, you will serve as an internal security force that has the sole purpose of finding and eliminating vampires inside of our realm. Your first and most important priority will be to save this realm from the threats hiding within it."\n\nOstwald stopped at the front of the room, then turned around again to look at those whose lives he was about to change forever. He raised his claw to his chest in a salute to them."
arcturian_torygg.602.a:0 ""You are the Arcturian Templars. Protect the innocent.""

arcturian_torygg.603.t:0 "It Takes One..."
arcturian_torygg.603.d:0 "It was early in the evening when Torygg and his company arrived at the lake. There they could see a small contingent of shadowy individuals cloaked in black garbs waiting by the lakeside. Torygg had several reservations about arranging this meeting, but in the end he believed William's counsel was the best way to deal with the infestation that they suffered from.\n\nThough Torygg's personal guards took care to tread quietly, the Hunters seemed to notice them from afar, as they were already turned to face the knights. The tension in the air was overwhelming; almost every knight within the Order knew what these creatures were, what they stood for. How they willingly allowed vampires to exist within their ranks. Torygg gathered himself, then addressed the Hunters' Kinship: "I am pleased to see that you answered my summons. Who among you can speak for you?"\n\nA tall, spindly griffon among the group stepped forward, bearing a mask that covered his entire face. "I am Tobran, senior among those you see here," he bowed, "Elias extends a greeting as well, though he regrets not being able to be here himself. It was his wish that we make this journey."\n\n"So Elias still lives?" Torygg murmured to himself. Something to investigate later. He stepped towards Tobran and offered a claw, "And what a journey it must have been. You must tell me about it later, though first we should deal with the matter at claw. I suspect that you know about the-"\n\n"Your Newborn problem. Yes, we are quite aware. That is why you summoned us, is it not?"\n\nTorygg retracted his claw, retaining his composure. "It is. We are in dire need of assistance. Our knights aren't trained to deal with local infestations of this magnitude. I humbly ask that you help us, and in return we-"\n\n"There is no need to make us offers, Headmaster." interrupted Tobran again, "The Hunt itself is reward enough. We will purge these Newborns for you along with those responsible for their creation. You and your knights would do well to learn from our methods."\n\n"You have my thanks," Torygg nodded, then briefly glanced back at his personal guards, "If I may ask, would you be able to keep word of your involvement in this to a minimum? There are those within the Order who aren't so... willing to speak with you.""
arcturian_torygg.603.a:0 ""Certainly. Just ensure that your knights stay out of our way and we'll get along just fine.""

