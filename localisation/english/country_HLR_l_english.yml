HLR_headmaster_torygg:0 "Headmaster Torygg Brightclaw"
POLITICS_TORYGG_DESC:0 "§YBorn:§! 11 August 951, Crona, Griffonian Empire\n\n§YBiography:§! Born to humble smiths, Torygg spent the early years of his life enamoured by stories of the gods who watched over Griffonkind. At the age of 14, he made daily trips to pray at the local temples of Boreas, Arcturius, and Eyr. His devotion to the gods became tested in the year 979, when he found himself taking up arms against his fellow griffons who had seized the Imperial Palace from the young Grover V, who in Torygg's eyes was the chosen of Boreas. Even though the republicans he slew had denounced the Grovers, they were still his friends and neighbors. Afterwards, Torygg saw himself no longer worthy in the eyes of Boreas or Eyr, so he turned his faith toward Arcturius, later making his way north upon finding out that a sizable knightly order for Arcturius existed past the Whitetail Mountains.\n\nTorygg quickly proved his worth through his knowledge of strategy and tactics that he'd learned in the Herzland. Rising to the rank of Knight-Captain by 985, his troops became among the most skilled and respected in the Order. His greatest challenge came in 996 when a sudden invasion from the Dread Lord, Iuvenis Maledicta, overwhelmed the knights' defenses. After being pushed back and losing significant territory, Torygg managed to slay the Dread Lord through the clever use of his personal rifle. He had stunned the thing and stabbed it with a specially enchanted blade, granting the ancient lich true death.\n\nSince then, Torygg has risen to legendary status within the Order, earning the title of Headmaster himself. He has pushed for changes in the Order's arsenal and tactics, but understands that they simply lack the infrastructure to support supplying every knight with a gun. This remains a problem to be solved, but he hopes that in time, they will be able to march upon the peninsula and wipe out the monsters within it once and for all.\n\n§YPortrait By§!: Neither"
HLR_Torygg_heroic_figure:0 "Heroic Figure"


HLR_ostwald_vind:0 "Ostwald Vind"
POLITICS_OSTWALD_DESC:0 "§YBorn§!: 2 February 960, Pondwatch\n\n§YBiography§!: If the Code of Arcturius had a face, it would be Knight-Captain Ostwald Vind. His strict discipline and adherence to the rules that govern the Knightly Order of Arcturius is what has kept not just him alive, but countless others. No matter the trial, no matter the obstacle, the Code remains unmoving and resolute, much like Ostwald himself.\n\nBut he was not always that way. Growing up, Ostwald's family was poor and impoverished. He and his sister, Leonore, aided their parents as much as they could, but poor harvests and an unfortunate house fire threatened their very survival, and their father was too prideful to ask for help from the ponies. Thus, Ostwald and Leonore made a pact to join the Knightly Order of Arcturius together, as that would secure their family enough funds to build a new home.\n\nSadly, tragedy struck the pair as a vampire had snuck past the border and attacked Leonore while they were slacking off during a routine training exercise. It dragged her away, and despite later eliminating the vampire, Ostwald never found her body.\n\nOstwald blamed himself for the loss of his sister more than anything. He swore to never allow himself a reprieve ever again, and now holds himself and his comrades to the highest standards. The Code is there for a reason, and compromising it would only serve to endanger the innocent.\n\n§YPortrait By§!: Neither"

HLR_william_steel_beak:0 "William Steelbeak"
POLITICS_WILLIAM_DESC:0 "§YBorn§!: 7 March 972, Tar Pine Rock\n\n§YBiography§!: Knight-Captain William Steelbeak wasn't always a shining example of an Arcturian Knight. Many years ago, he was a scrappy troublemaker who constantly left his parents' home to go adventuring with friends, often returning with cuts and bruises that he shrugged off as easily as he ignored his father's stern scoldings.\n\nOne day, his antics went too far: his father was in another town for business and had given him strict instructions to attend to his ill mother. Instead of being responsible, William left the home as he had often done so before, assuming that everything would be fine. When he returned the next week, his father stood up next to a freshly-dug grave and gave his son the beating of his life, then disowned him on the spot.\n\nThe experience shook William to such a degree that he vowed never to abandon those in need ever again, no matter what. To that end, he joined the Knightly Order of Arcturius, becoming the star pupil of Headmaster Torygg. He never slacked off and always went the extra mile to ensure that each of his fellow knights lived to see another day.\n\nWhile William does not adhere to the Code of Arcturius as strictly as others, the example he continues to set has inspired many other knights to behave just as he does: with humility, kindness, and determination to do the right thing.\n\n§YPortrait By§!: Neither"

HLR_elfreda:0 "Elfreda"
HLR_POLITICS_ELFREDA_DESC:0 "§YBorn§!: 9 May 984, Watertowns\n\n§YBiography§!: Knight-Lieutenant Elfreda was born to loving parents in the Watertowns, though for reasons they never revealed to her, they all moved from that mysterious woodland culture to live among the ponies of Brethold in the north. Time passed, and her family grew to include many younger siblings, far more than most families would stop at.\n\nThen, everything changed when the undead attacked. The Iuvenite Incursion in 996 overwhelmed the Arcturians' defenses. When the knights retreated, the fighting spilled over into all manner of towns and settlements, including Brethold. Elfreda stood frozen in horror as she watched most of her family get slaughtered by the undead, and she would have been next had it not been for Ostwald Vind. The brave knight dove down from the sky and slew ghoul after ghoul, thus saving Elfreda, her father, and her two youngest brothers from the pain of death, though the pain of loss still cut them deeply.\n\nThe moment Elfreda was old enough, she joined the Knightly Order of Arcturius, quickly proving to be an adept and charismatic warrior. To her, this was about more than just vengeance - this was her calling. Arcturius protects the faithful, and none are more faithful than Elfreda. While she may idolize Ostwald for saving her, him and other knights occasionally raise eyebrows at her overly zealous beliefs and brutal combat style. Still, she has proven to be an adept commander when given the chance, and right now that's what the Arcturian Order needs.\n\n§YPortrait By§!: Neither"

HLR_goldheart:0 "Goldheart"
