###MISC###
 RULE_ALLOW_RELEASE_NATIONS_NOT_BLT_CME_TOOLTIP:0 "In this age of upheaval, and after all that was sacrificed in the name of unity, the prospect of a divided Camelia is unthinkable. The children of Arakash will stand together, or they will not stand at all."
