###LEADERS###
 BLT_king_boltrus:0 "King Boltrus"
 BLT_ryiz_stormrider:0 "Ryiz Stormrider"
 BLT_harira_ato:0 "Harira Ato"
 BLT_uruwai:0 "Master Uruwai"

###LEADER DESCS###
 BLT_boltrus_start_desc:0 "§YBorn§!: 11th of August 980 in Clearpine\n\n§YBiography§!: Born to an arranged marriage between his mother Ozha and his father Ikhavu, Arkyz Cloudseeker had a privileged upbringing, all things considered: with a renowned family name and an elevated standard of living compared to the rest of the relatively impoverish Rainband, the young yeti would surely have been set for life, if not for his estranged relation with both his parents and the rest of his extended family. When the Storm King came to unite the Rainband under his rule, the Cloudseeker clan were among some of his fiercest resistors, but Arkyz willingly abandoned them to join the Storm Legions, a decision that would forever change his fate, and the foolishness of which would never cease to haunt him.\n\nArkyz's disillusionment with the military life came quickly and brutally, as the carefree yeti found himself as a permanent consciencious objector through the Storm Kingdom's campaigns. There is hardly any injustice that Arkyz has not witnessed his fellows commit, and despite his efforts to hold back his own subordinates at times, his lack of respect among the officer corps made him a pariah, who participated half-heartedly in all his campaigns until he was finally assigned to the distant post of Camelkand, after it was swifty conquered.\n\nArkyz has lived in Camelkand for a couple of years, and his strategic alliances among the camel caravans have led him to being extremely well seen among the locals, despite the circumstances of his arrival. He is unbendingly polite, politically savvy and quite the administrator, but for being a veteran of the Storm King's campaigns, his military experience is quite limited compared to the rest of his fellows. Now in charge of a sovereign state, what direction the so-called King Boltrus intends to take his kingdom on remains a mystery to the wider world..."

 BLT_ryiz_stormrider_desc:0 "Many a malcotent and troublemaker found themselves among the ranks of the Storm Kingdom's armed forces since its inception, but among them, the former commander of the Expeditionary Legion stands out for her unbridled enthusiasm for the profession and unbending devotion to the Storm King, or at least to the idea of him. Hailing from a family of impoverished dockworkers in the coast of the Eye, Ryiz's propensity for dirty dealings was cultivated from the cradle, and when the Storm Kingdom was forged, she immediately took the opportunity to join its armed forces, first just for the pay, but her love for the job would grow very quickly.\n\nSadly, despite being born and bred for the role, Ryiz never got the lucky break to make a name for herself among more established officers in the Kingdom's burgeoning army, and was instead made commander of the Far Eastern Expeditionary Legion. Inbetween scouting missions, skirmishes in the far reaches of the Zebhara and the occasional major engagement, Stormrider has gathered a fair bit of experience under her belt, but being denied a role to play in the Storm Kingdom's advance through the richest and most lootable parts of Zebrica is a resentment she's held ever since. The Expeditionary Legion's assigment to Camelkand, a place flowing with wealth to plunder in the Storm King's name, should have been her lucky break, but though Ryiz was good at intimidating and taking money from the passing caravans, her short temper and brute force approach never succeeded in getting the camels to cooperate. Arkyz Cloudseeker was brought in to fill that role, and eventually, to replace her as acting commander.\n\nThough cooperative on paper, Ryiz's only true loyalty is to the Storm King's way of taking what you want by force, and every yeti in the Legion knows that. She commands the respect of those like-minded among the yeti forces of Boltria.\n\n§YPortrait By§!: Darkskroll"

###PARTIES###
 BLT_democratic_party:0 "Loyalists"
 BLT_democratic_party_long:0 "Boltrian Loyalists"
 BLT_neutrality_party:0 "Camelkand Xutāw"
 BLT_neutrality_party_long:0 "Camelkand Xutāw"
 BLT_fascism_party:0 "Legion Hardliners"
 BLT_fascism_party_long:0 "Far Eastern Expeditionary Legion Command"
 BLT_communism_party:0 "Vigilant Star"
 BLT_communism_party_long:0 "Temple of the Vigilant Star, Protector of Camelkind, Divine Aspect of the Forefather, Arakash, the Primordial Strider, Defier of Utul-Sha'ar, Guiding Light of All Who Wander"

###FOCUSES###
#STARTING TREE
 BLT_stranger_in_a_strange_land:0 "A Stranger In a Strange Land"
 BLT_stranger_in_a_strange_land_desc:0 "For all the time I have spent in Camelkand, it is still an alien place to me. Master Uruwai has been of great help, but it is clear that I remain out of my depth. Still, we've made our choice to remain here, and every yeti in Camelia knows, we will not return to the Rainband for a long time. We must make due, and adapt to life here."

 BLT_my_dauntless_few:0 "My Dauntless Few"
 BLT_my_dauntless_few_desc:0 "I am not blind to the immense sacrifice, indeed the immense risk, that the soldiers of the Expeditionary Legion have taken in remaining in Camelkand. They are not welcome here, not yet, and were it not for my good reputation, the locals would have them hunted down to the last. I must not waste the advantage their presence here gives me."

 BLT_my_camel_subjects:0 "The Subjects of Boltria"
 BLT_my_camel_subjects_desc:0 "Boltria will ultimately always be a Camelian polity, a realm of the camels first and foremost. I will work with this in mind: a strong state cannot stand on shaky foundations. I must address the subjects of the realm directly."

 BLT_speak_with_master_uruwai:0 "The Old Master"
 BLT_speak_with_master_uruwai_desc:0 "Uruwai has been invaluable to me, both as an advisor and as a voice of reason. And now, as we stand on the brink of crisis, his services continue to prove themselves priceless to Boltria's survival. As the moment of trial approaches, I'll need to make sure his expertise is used in the most practical way possible."

 BLT_honor_why_they_stayed:0 "Remind Them Why They Stayed"
 BLT_honor_why_they_stayed_desc:0 "We all have mixed feelings regarding the situation in the Rainband. We made our choice not to return home, and to attempt to build something better for ourselves in the outlying ruins of the Storm Kingdom. Still, it seems the resurgence of a claimant is inevitable, and whatever happens, we must be ready to stand on our own hooves."

 BLT_honor_my_words:0 "To Honor All My Promises"
 BLT_honor_my_words_desc:0 "A Kingdom is run on compromise: on bringing together creatures and their interests in a way that acts to the benefit of all. At present, we have such a compromise, but a fickle one. I intend to set in stone decrees which will provide the foundation of a stable, long-lasting state. I can only hope I will keep true to everything I've said."

 BLT_put_in_a_good_word:0 "Put In A Good Word"
 BLT_put_in_a_good_word_desc:0 "The southern camels are stubborn, but they're also hardy, steadfast and honorbound. One way or another, we will share a country with them, and building resentment can only hurt us in the long term. I will dispatch some envoys south, to hopefully demonstrate my good intentions to the High Chieftess. Hopefully, she can be persuaded to see reason."

 BLT_a_show_of_authority:0 "A Show of Authority"
 BLT_a_show_of_authority_desc:0 "The southern camels are a proud bunch, and a proud people demand a proud monarch. Tolerating a direct challenge to my authority will weaken the monarchy, and in turn, weaken the foundations of the state. The most important thing to do is to make sure every camel knows that Boltrian authority is legitimate because it is strong, andd does not bow to pressure."

 BLT_talk_with_toravash:0 "The Airborne Firebrand"
 BLT_talk_with_toravash_desc:0 "Brighthalo is not exactly easy to work with, but he is nothing if not passionate, and the most competent aerial officer Boltria has access to. I intend to heed his advice, even if I already know exactly what he wants: all the funds and resources we can spare towards remaking an airfleet that will be without equal on the continent."

 BLT_immediate_airfleet_investment:0 "Immediate Airfleet Investments"
 BLT_immediate_airfleet_investment_desc:0 "Toravash is right: access to air technology and the old doctrinal expertise of the Storm Kingdom is our foremost military advantage. We need to press it to its fullest and dedicate the bulk of our spare military funds towards refitting the large stockpile of airframes we already have access to."

 BLT_preparing_the_ground_forces:0 "Focus On The Ground Forces"
 BLT_preparing_the_ground_forces_desc:0 "The Boltrian airfleet will be grandiose, but not for now: it is simply too expensive and too peripheral of a military edge for us to exploit at the moment. It will not be left in the dust, of course, but for now, raising the levies to the standard of the Legion's ground forces is to be our first priority."

 BLT_investigate_plane_innovations:0 "Investigate Aerial Innovations"
 BLT_investigate_plane_innovations_desc:0 "Word spread quickly from the Warzenan shores about what caused the Storm King to fall in battle: Aris' air power proves that Zebrica is now entering an age of full-scale three-dimensional warfare. We're rather sentimental about the old ways, but we'd be fools not to learn new tricks from the Storm Kingdom's only match."

 BLT_unearth_old_milsurp_caches:0 "Unearth The Military Caches"
 BLT_unearth_old_milsurp_caches_desc:0 "A lot of arms shipments were left unattended to since the Legion took over full administration of Camelkand, but they're not lost by a long shot. We need to restock a centralized and well-maintained armory if we are to have any hope of forging a proper fighting force out of the Legion detachments and the levies we have access to."

 BLT_improvise_new_designs:0 "Improvise New Designs"
 BLT_improvise_new_designs_desc:0 "If the Boltrian project is to stand a chance at creating a proper developed nation, kickstarting our own independent Research and Development is critically important, and leveraging the technical expertise of the Legion into some improved field designs will be a good start."

 BLT_take_the_fleet_for_a_ride:0 "Going Out For A Ride"
 BLT_take_the_fleet_for_a_ride_desc:0 "Letting ourselves grow dull would be unacceptable. Material stockpiles are of no use to creatures that lose the know-how and wit to take advantage of them. With the bulk of the old airfleet ready to take flight again, I believe it's time to soar high and get back into the flow of things in a good streak."

 BLT_invest_in_better_airguns:0 "Invest In Functional Firepower"
 BLT_invest_in_better_airguns_desc:0 "Toravash and I are both skeptical of the new Arisian airframes, but one thing we should definitely take from them are the armaments themselves. An airship frame could make use of much bulkier versions of these new and improved turrets."

 BLT_role_of_the_airfleet:0 "New Fleet, New Role"
 BLT_role_of_the_airfleet_desc:0 "The Expeditionary Airfleet was always misnamed: the Storm Kingdom had very little interest in exploration without exploitation. The Boltrian airfleet will inherit much technical know-how and practices from the Storm King's fleet, but its role in our armed forces, as well as in the country itself, will be vastly different."

 BLT_disaster_relief_fleet:0 "A Disaster Response Fleet"
 BLT_disaster_relief_fleet_desc:0 "Camelia is continually subjected to mild duststorms that cut off whole regions from land access without local guides, which makes travel and communications a challenge. The airfleet should therefore be fitted to serve a dual role, not simply as tools of war, but as lifelines to assist all our subjects when needed."

 BLT_surveying_the_realm:0 "A Survey Of The Realm"
 BLT_surveying_the_realm_desc:0 "No state can claim proper legitimacy without full knowledge of the lands it governs and the population therein. No full survey of Camelia has ever been conducted before. If we can obtain reliable records of the entire population of northern Camelia, it would be immensely helpful to our future plans, development and political reforms."

 BLT_scouting_the_borderlands:0 "Border Scouting"
 BLT_scouting_the_borderlands_desc:0 "Political tensions across Zebrica remain high, even this far from the epicenter of the collapsed Storm Kingdom. Ability to control our borders will be crucial if we are to be treated seriously among our peers, and to this end, the airfleet is our most effective asset."

 BLT_bring_camels_into_the_air_staff:0 "Bring Camels Into the Fold"
 BLT_bring_camels_into_the_air_staff_desc:0 "Teaching sympathetic locals our ways will not expand our ranks, it will cement the airfleet as a proper Boltrian institution, independently of yeti rule. I am confident that providing the Camelians this military edge will embolden their spirits and inspire mutual confidence among us all."

 BLT_talk_with_saz:0 "My Right-Hand Yeti"
 BLT_talk_with_saz_desc:0 "Over the years, I've never had a more reliable confidant and friend than Saz. Her insights are always welcome, and her desire to establish true civil administration in Bolria is of great interest to us all. If the Kingdom is to be a true state, and not just an errant military force, I need to heed her advice."

 BLT_devolution_of_powers:0 "Devolution Of Powers"
 BLT_devolution_of_powers_desc:0 "Systems built purely from the top down are not stable nor long lasting. In order for the monarchy to sustain its position, democratic institutions need to hold independent power to coordinate outside crown authority. Thankfully, democracy is not entirely alien to the camel way of life. We only need to give it some institutional backing."

 BLT_rule_by_decree:0 "Rule By Decree"
 BLT_rule_by_decree_desc:0 "At the end of the day, the primary role of a monarch is to control both legislative and executive authority. Democratic principles can exist, but their role should remain utilitarian and subservient. More than anything, unity through loyalty to crown authority will hold the Kingdom together and allow long term coordination."

 BLT_the_administrative_state:0 "An Administrative State"
 BLT_the_administrative_state_desc:0 "Our efforts to build up a legal, economic and civil system will be gradual, and in order to fulfill our goals and make Boltria more than an army with a puppet state, professional administrators taken from the local population will be essential."

 BLT_the_rights_of_petition:0 "The Rights of Petition"
 BLT_the_rights_of_petition_desc:0 "One of the most consistently overlooked aspects of stable governance are channels by which creatures can communicate with the authorities in their lives in a way that addresses their grievances. A guaranteed right to protest and petition will assure every creature in Boltria is invested in its political system and continuation."

 #TODO:focus descs
 BLT_a_proper_judiciary:0 "A Proper Judiciary"

 BLT_yeti_camel_relations:0 "Yeti-Camel Relations"

 BLT_property_and_rule_of_law:0 "Property and The Rule of Law"

 BLT_plan_a_development_policy:0 "Outline A Development Policy"

 BLT_stabilize_quaggan_relations:0 "Stabilize Quaggan Relations"

 BLT_boltrian_citizenship_initiative:0 "A Citizenship Initiative"

 BLT_promise_equal_economic_priority:0 "Commitment to a Fair Economy"

 BLT_diversify_away_from_diamond_road:0 "Diversify Our Assets"
 BLT_diversify_away_from_diamond_road_desc:0 "Relying on a sole basis for our economy to the degree that we rely on the Diamond Road is bound to tear us apart, if any disruptions occur. While we still have the upper hand and some spare abundance, we should immediately seekt to divert funding towards a stable, more diversified base for our economic development."

 BLT_talk_with_bevak:0 "The Mask-Clad Stalwart"

 BLT_legacy_of_the_expeditionary_legion:0 "Legacy of the Expeditionary Legion"

 BLT_learning_the_camel_way:0 "Learning The Camelkand Ways"

 BLT_old_drilling_methods:0 "Adapt Old Drilling Methodology"

 BLT_a_new_chain_of_command:0 "A New Chain of Command"

 BLT_adapting_to_the_environment:0 "Adapting To Our Environment"

 BLT_modernize_rifle_designs:0 "Modernize Infantry Rifle Standards"

 BLT_officialize_army_recruitment:0 "Official Army Recruitment"

 BLT_standardize_army_salary:0 "Standardize Army Salary"
 BLT_standardize_army_salary_desc:0 "Army pay has been a disfunctional mess since the Storm Kingdom's collapse. Most of the Legionaires haven't had a proper income for months. Inbetween this issue and the steep price Camelkand is paying for its levies, this needs to change: a salary standard will make transition to a unified professional army that much simpler."

 BLT_mixed_unit_tactics:0 "Mixed Unit Tactics"
 BLT_mixed_unit_tactics_desc:0 "Yeti morphology is quite distinct from a camel's, which means that for the sake of us all, standards of mixed unit operations need to be set and tested right away. We cannot afford to go into battle without assuring all our soldiers are capable of the same tactics and of using the same equipment."

 BLT_welcome_new_officers:0 "Welcome New Officers"
 BLT_welcome_new_officers_desc:0 "We've gotten by relying on former Expeditionary Legion staff for this long, but if the Boltrian army is to be a true national fighting force, this cannot stand any longer. A couple of levy commanders have already expressed interest, and made their skills apparent. I will personally grant them their new ranks and oversee the cerimony."

 BLT_reintegrate_specialized_regiments:0 "Reintegrate Specialized Regiments"

 BLT_settle_doctrinal_debate:0 "Settle The Doctrinal Debate"

 BLT_talk_with_ryiz:0 "The Eastern Raider"

 BLT_an_authoritative_king:0 "An Authoritative Crown"
 BLT_an_authoritative_king_desc:0 "It is corrosive to the integrity of the state to view its role are purely extortionate, but Stormrider has a point: ultimately, the foundation of all centralized authority is its monopoly on the use of force. If I am to rule, my role as both head of state and head of the armed forces must be made apparent to all my subjects."

 BLT_a_kind_king:0 "Foundations In Reciprocity"
 BLT_a_kind_king_desc:0 "The primary role of the state, even a monarchical one, is contractual. There is nothing to be gained in viewing the King's position as monolithic and one directional, especially in a position as weak as ours. This saddles me with responsibilities to my subjects, of course, but that is the only way a functional Kingdom can be sustained."

 BLT_secure_army_loyalty:0 "Secure the Soldiers' Loyalty"

 BLT_enforce_public_order:0 "Enforce Public Order"

 BLT_pledge_to_undo_the_damage:0 "Pledge To Undo the Damage"

 BLT_rebuke_storm_kingdom_authority:0 "Rebuke The Horned Crown's Authority"
 BLT_rebuke_storm_kingdom_authority_desc:0 "With the death of the Storm King and claimaints fighting over his throne, some of them must assume that as former soldiers of his army, the Legion and Boltria remain loyal to the Horned Crown. An official statement of our independence would go a long way to not only establish ourselves, but repair our reputation with the rest of Zebrica."

 BLT_settle_yetis_in_camelkand:0 "Put Down Roots"

 BLT_officially_undo_the_tithe_decree:0 "Undo The Tributary Decree"

 BLT_permanent_end_to_looting:0 "A Permanent End to Looting"

 BLT_trial_the_worst_offenders:0 "Trial The Worst Offenders"

 BLT_wipe_the_storm_king_legacy:0 "Wipe the Storm King's Legacy"

 BLT_expeditionaries_no_longer:0 "Expeditionaries No Longer"
 BLT_expeditionaries_no_longer_desc:0 "To the best of our ability, we've made ourselves proper residents of this land and no longer uninvited guests. It will take time to fully settle into this new life, and what the future holds for us remains unclear, but one way or another, the time has come to disband the Expeditionary Legion for good."

 BLT_the_moment_of_truth:0 "The Moment Of Truth"

 BLT_my_promise_to_the_legion:0 "My Promise to The Legion"
 BLT_my_promise_to_the_legion_desc:0 "I vowed to the members of the Expeditionary Legion that stayed with me that I could build a new life for us out of the ruins of the Storm Kingdom. It seems I will get the chance to honor my word. I can only hope that after everything we've gone through, I will not leave them disappointed."

 BLT_my_promise_to_the_levies:0 "My Promise to The Levies"

 BLT_what_is_boltria_to_be:0 "What Boltria Is To Be"

 BLT_a_proper_coronation:0 "A Proper Coronation"
 BLT_a_proper_coronation_desc:0 "Againt all odds, I've done it. Camelia is united, Boltrian rule solidified, and our neighbors will have no choice but to recognize the Kingdom as the true authority of Camelkand. We can now finally begin building up and reaching out to the rest of Zebrica. But first, it is time to cement the authority of the Boltrian crown for good."

###BOLTRUS TAB###
 BLT_king_boltrus_tab:0 "The Rule of King Boltrus"
 BLT_king_boltrus_tab_desc:0 "To his subjects, King Boltrus is [BLTGetBoltrusOutwardValue]\n\nInwardly, King Boltrus is [BLTGetBoltrusInwardValue]\n\nTo the wider world, King Boltrus is [BLTGetBoltrusRenownValue]"
