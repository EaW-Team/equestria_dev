###DYNMODS###
 BLT_military_dynamic_modifier:0 "Boltrian Legion"
 BLT_economy_dynamic_modifier:0 "Boltrian Development"
###IDEAS###
 BLT_expeditionary_state:0 "The Expeditionary State"
 BLT_expeditionary_state_desc:0 "The Storm Legions' passage through Camelia was little more than an afterthought, a detour taken during the army's preparation for the final push across the Zebharan reach and towards North Zebrica. Out of Camelkand, a barebones tributary outpost was established, in order to extort as much wealth as possible out of the commerce passing through the Diamond Road. The Far Eastern Expeditionary Legion, an irrelevant detachment of troops lacking storm creature support, was given the unenviable task of keeping the peace in this peripheral reach of the Storm Kingdom, under the purview of the washed out officer Arkyz Cloudseeker.\n\nWith the Storm King's death in Ain Trotgourait and the bulk of disorganized Legions fleeing back south, Arkyz convinced the Expeditionary Legion to remain in Camelkand, rather than return home in disgrace. Without the wider Storm Kingdom's support, what is left in so-called Boltria are the remnants of an extraction regime with no overlord to deliver tribute to: there is no civil administration to speak of, and this state, if it can even be called that, is held together by force of will and the good public perception of its former overseer turned self-styled King. Not only that, it is a near total pariah, loathed by its neighbors as the warlord realm of a madyeti."
 BLT_diamond_road_start:0 "The Diamond Road"
 BLT_dustborn_levies:0 "Dustborn Levies"
 BLT_dustborn_levies_desc:0 "By necessity of its nature, cooperation with the locals was essential to the Storm Kingdom's Camelian tributary from its very inception, and to their luck, a good system was already in place: as the foremost settlement in the region, the city of Camelkand maintained an informal deal with the northern Camelian caravans to answer a call to arms and protect the city from raiders in exchange for money. Ryiz, the former overseer, stubbornly refused to make use of camel forces, but once Arkyz was given the position, he had little issue adapting this arrangement for his own use. With the Storm Kingdom's collapse, Camelkand now has more funds to spare towards keeping its caravan levies happy, and Arkyz's reputation as a fair and reasonable yeti has helped smooth the pain of transition. The levies now formally swear loyalty to Boltria, but given how outnumbered the yeti troops are, this loyalty comes at a steep price."
 BLT_planned_offensive_debuff:0 "Boltrian Offensive"
 BLT_rally_around_the_king:0 "Rally Around The King!"
 BLT_rally_around_the_king_desc:0 "The realm is besieged, but the King's subjects come to his aid and give of themselves, body and soul, to its defense. By Arakash's grace, Boltria will not fall!"
###HIDDEN IDEAS###
 BLT_brave_idea:0 "Boltrus' Bravery"
 BLT_austere_idea:0 "Boltrus' Austerity"

###MISC TOOLTIPS###
 BLT_stranger_in_a_strange_land_tt:0 "King Boltrus and his advisors may implement a variety of different policies to build up the Boltrian Kingdom, but there is simply no time to do them all. Which aspects are prioritized, and how, will shape King Boltrus' rule.\n\nThe §Y$BLT_military_dynamic_modifier$§! and §Y$BLT_economy_dynamic_modifier$§! national spirits will be obtained later on, but can be improved beforehand."
 BLT_special_effect_replaces_standard_tt:0 "§OThis effect replaces the standard one, rather than adding to it.§!"
 BLT_extra_levy_tt:0 "An additional §YCaravan Levy§! is recruited in Camelkand."
 BLT_boltrus_lose_motivation_1_tt:0 "King Boltrus loses §Cmotivation§!."
 BLT_boltrus_lose_motivation_1_sigma_tt:0 "King Boltrus' will in §Cunshaken§!."
 BLT_king_boltrus_tab_unlocked_tt:0 "King Boltrus' £GFX_decision_icon_small decision tab will keep track of his important §Gstatistics§! and §Ctraits§!."
 BLT_the_moment_of_truth_tt:0 "Once this focus is taken, it cannot be cancelled, and no more focuses can be taken in Toravash's, Saz's, Bevak's or Ryiz's branch. The branches will also be locked if the Camel Caravans declare war on Boltria first."
 BLT_bevak_loyalty_tt:0 "Bevak Frostbite's Loyalty is currently [?BLT_bevak_loyalty_value|Y0], and it signifies the percentage chance he will choose to remain in Boltria if either §CIbyz Icepaw§! or §CIkvus Hailstorm§! unify the Rainband. If §4Gyz Windborn§! wins, his loyalty value will make no difference and only a truly exceptional leader could convince him to stay. He will always remain in case §3Thunderbringer§! wins."
