###LEADER DESCS###
 BLT_boltrus_start_desc:0 "§YBorn§!: 11th of August 980 in Clearpine\n\n§YBiography§!: Born to an arranged marriage between his mother Ozha and his father Ikhavu, Arkyz Cloudseeker had a privileged upbringing, all things considered: with a renowned family name and an elevated standard of living compared to the rest of the relatively impoverish Rainband, the young yeti would surely have been set for life, if not for his estranged relation with both his parents and the rest of his extended family. When the Storm King came to unite the Rainband under his rule, the Cloudseeker clan were among some of his fiercest resistors, but Arkyz willingly abandoned them to join the Storm Legions, a decision that would forever change his fate, and the foolishness of which would never cease to haunt him.\n\nArkyz's disillusionment with the military life came quickly and brutally, as the carefree yeti found himself as a permanent consciencious objector through the Storm Kingdom's campaigns. There is hardly any injustice that Arkyz has not witnessed his fellows commit, and despite his efforts to hold back his own subordinates at times, his lack of respect among the officer corps made him a pariah, who participated half-heartedly in all his campaigns until he was finally assigned to the distant post of Camelkand, after it was swifty conquered.\n\nArkyz has lived in Camelkand for a couple of years, and his strategic alliances among the camel caravans have led him to being extremely well seen among the locals, despite the circumstances of his arrival. He is unbendingly polite, politically savvy and quite the administrator, but for being a veteran of the Storm King's campaigns, his military experience is quite limited compared to the rest of his fellows. Now in charge of a sovereign state, what direction the so-called King Boltrus intends to take his kingdom on remains a mystery to the wider world..."
 BLT_ryiz_stormrider_desc:0 "Many a malcotent and troublemaker found themselves among the ranks of the Storm Kingdom's armed forces since its inception, but among them, the former commander of the Expeditionary Legion stands out for her unbridled enthusiasm for the profession and unbending devotion to the Storm King, or at least to the idea of him. Hailing from a family of impoverished dockworkers in the coast of the Eye, Ryiz's propensity for dirty dealings was cultivated from the cradle, and when the Storm Kingdom was forged, she immediately took the opportunity to join its armed forces, first just for the pay, but her love for the job would grow very quickly.\n\nSadly, despite being born and bred for the role, Ryiz never got the lucky break to make a name for herself among more established officers in the Kingdom's burgeoning army, and was instead made commander of the Far Eastern Expeditionary Legion. Inbetween scouting missions, skirmishes in the far reaches of the Zebhara and the occasional major engagement, Stormrider has gathered a fair bit of experience under her belt, but being denied a role to play in the Storm Kingdom's advance through the richest and most lootable parts of Zebrica is a resentment she's held ever since. The Expeditionary Legion's assigment to Camelkand, a place flowing with wealth to plunder in the Storm King's name, should have been her lucky break, but though Ryiz was good at intimidating at taking money from the passing caravans, her short temper and brute force approach never succeeded in getting the camels to cooperate. Arkyz Cloudseeker was brought in to fill that role, and eventually, to replace her as acting commander.\n\nThough cooperative on paper, Ryiz's only true loyalty is to the Storm King's way of taking what you want by force, and every yeti in the Legion knows that. She commands the respect of those like-minded among the yeti forces of Boltria.\n\n§YPortrait By§!: Darkskroll"

