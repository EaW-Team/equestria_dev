#BANNER
 BLT_boltrus_traits_banner_text:0 "§YTRAITS§!"
 BLT_banner_tt:0 "Rulership requires certain things out of a creature, and if the Boltrian project is to survive, the King must master at least some of the things that make a ruler worthy of history.\n\n§CTraits§! will provided certain bonuses when §Gobtained§! or when §Yactive§! (obtained bonuses are not removed if the trait is then lost). In addition, having a trait active may add additional benefits to certain focuses and decisions, and unlock unique event options."
#TRAITS
 BLT_TRAIT_ON_ADD:0 "§GWhen obtained:§!"
 BLT_TRAIT_ON_ACTIVE:0 "§CWhen active:§!"

 BLT_boltrus_trait_explorer_text:0 "Explorer"
 BLT_boltrus_trait_explorer_tt:0 "The King is a wanderer at heart, always taking delight in the new and unfamiliar.\n\n[!BLT_boltrus_trait_bar_explorer_click]"

 BLT_boltrus_trait_gallant_text:0 "Gallant"
 BLT_boltrus_trait_gallant_tt:0 "The King is a shining example of chivalry and honor, carrying himself with grace and nobility and commanding the respect of his subjects accordingly.\n\n[!BLT_boltrus_trait_bar_gallant_click]"

 BLT_boltrus_trait_ruthless_text:0 "Ruthless"
 BLT_boltrus_trait_ruthless_tt:0 "The King is unmoved by the pleas of others, ruling with an iron fist and tolerating no dissent to his vision.\n\n[!BLT_boltrus_trait_bar_ruthless_click]"
 BLT_no_stab_loss_from_war:0 "Boltria suffers no penalty to £GFX_stability_texticon §4stability§! from being at war."
 BLT_can_extort_subjects_tt:0 "Unlocks a one-time decision to extort Boltria's subjects and improve the §Y$BLT_military_dynamic_modifier$§! national spirit."

 BLT_boltrus_trait_conniving_text:0 "Conniving"
 BLT_boltrus_trait_conniving_tt:0 "The King is shrewd and calculating, able to make the most out of deals, while leaving the other party none the wiser.\n\n[!BLT_boltrus_trait_bar_conniving_click]"

 BLT_boltrus_trait_patient_text:0 "Patient"
 BLT_boltrus_trait_patient_tt:0 "The King plans ahead and waits as long as needed, knowing that all things have their due time and never rushing his decisions nor those of his advisors.\n\n[!BLT_boltrus_trait_bar_patient_click]"

 BLT_boltrus_trait_austere_text:0 "Austere"
 BLT_boltrus_trait_austere_tt:0 "The King eschews frivolous displays of wealth, using his treasury in a strictly utilitarian fashion.\n\n[!BLT_boltrus_trait_bar_austere_click]"

 BLT_boltrus_trait_diligent_text:0 "Diligent"
 BLT_boltrus_trait_diligent_tt:0 "The King is relentless in his drive as a ruler, never leaving a topic poorly understood, a policy hazily implemented or a matter half resolved.\n\n[!BLT_boltrus_trait_bar_diligent_click]"

 BLT_boltrus_trait_hardened_text:0 "Hardened"
 BLT_boltrus_trait_hardened_tt:0 "The King is scarred, both physically and mentally, and undisturbed by hardship and strife, always keeping cool under pressure.\n\n[!BLT_boltrus_trait_bar_hardened_click]"
 BLT_boltrus_immune_to_bad_news_tt:0 "Boltrus will not lose §4inward§! motivation in response to external events."

 BLT_boltrus_trait_brave_text:0 "Brave"
 BLT_boltrus_trait_brave_tt:0 "The King is unimpressed by risk and danger, acting decisively even when under imminent threat without stumble or hesitation.\n\n[!BLT_boltrus_trait_bar_brave_click]"

 BLT_boltrus_trait_tactical_text:0 "Tactical"
 BLT_boltrus_trait_tactical_tt:0 "The King is capable of efficient strategic planning, both on the small and large scale, being well versed in military tactics and application.\n\n[!BLT_boltrus_trait_bar_tactical_click]"
 BLT_trait_tactical_active_tt:0 "Unlocks a targeted decision to inflict a timed malus on countries Boltria is at war with."

 BLT_boltrus_trait_erudite_text:0 "Erudite"
 BLT_boltrus_trait_erudite_tt:0 "The King is an agile thinker, educated on a variety of topics and also able to defer to trusted specialists on matters when required.\n\n[!BLT_boltrus_trait_bar_erudite_click]"

 BLT_boltrus_trait_persuasive_text:0 "Persuasive"
 BLT_boltrus_trait_persuasive_tt:0 "The King is deft with his words, capable of turning apathetic or even hostile creatures to his point of view.\n\n[!BLT_boltrus_trait_bar_persuasive_click]"

