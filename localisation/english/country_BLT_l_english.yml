###IDEAS###
 BLT_expeditionary_state:0 "The Expeditionary State"
 BLT_expeditionary_state_desc:0 "The Storm Legions' passage through Camelia was little more than an afterthought, a detour taken during the army's preparation for the final push across the Zebharan reach and towards North Zebrica. Out of Camelkand, a barebones tributary outpost was established, in order to extort as much wealth as possible out of the commerce passing through the Diamond Road. The Far Eastern Expeditionary Legion, an irrelevant detachment of troops lacking storm creature support, was given the unenviable task of keeping the peace in this peripheral reach of the Storm Kingdom, under the purview of the washed out officer Arkyz Cloudseeker.\n\nWith the Storm King's death in Ain Trotgourait and the bulk of disorganized Legions fleeing back south, Arkyz convinced the Expeditionary Legion to remain in Camelkand, rather than return home in disgrace. Without the wider Storm Kingdom's support, what is left in so-called Boltria are the remnants of an extraction regime with no overlord to deliver tribute to: there is no civil administration to speak of, and this state, if it can even be called that, is held together by force of will and the good public perception of its former overseer turned self-styled King. Not only that, it is a near total pariah, loathed by its neighbors as the warlord realm of a madyeti clinging to his little corner of the Storm King's conquests."
 BLT_diamond_road_start:0 "The Diamond Road"
 BLT_dustborn_levies:0 "Dustborn Levies"
 BLT_dustborn_levies_desc:0 "By necessity of its nature, cooperation with the locals was essential to the Storm Kingdom's Camelian tributary from its very inception, and to their luck, a good system was already in place: as the foremost settlement in the region, the city of Camelkand maintained an informal deal with the northern Camelian caravans to answer a call to arms and protect the city from raiders in exchange for money. Ryiz, the former overseer, stubbornly refused to make use of camel forces, but once Arkyz was given the position, he had little issue adapting this arrangement for his own use. With the Storm Kingdom's collapse, Camelkand now has more funds to spare towards maintaining its caravan levies happy, and Arkyz's reputation as a fair and reasonable creature has helped smooth the pain of transition. The levies now formally swear loyalty to Boltria, but given how outnumbered the yeti troops are, this loyalty comes at a steep price."

