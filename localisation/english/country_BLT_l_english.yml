 boltria.5.t:0 "The Old Veteran's Comeback"
 boltria.5.d:0 "\"So, she is a legend among you, yes?\"\n\n\"Something along those lines.\"\n\nThe King barely paid attention to the old master, staring off to the hazy, dust-clad Western horizon while leaning against the smooth sandstone wall. Arkyz had never had the honor of meeting the infamous Ibyz Icepaw, though he had gotten close; he had been there in the initial push towards Mzizima, and flew high over the western mountain reach when she first came back from campaign duty. At the time, he saw something of a kindred spirit in her: he had assumed she'd gotten tired of it all, and wanted a quiet place to clock out the rest of her service in peace. He even resented not having taken the opportunity before her.\n\nIt seems his feelings were misplaced. As soon as the succession war broke out, he had already developed suspicions regarding her true ambitions. It was one thing to reject the legitimacy of the Stormland regent, and no sane yeti would ever have laid down arms against such a threat as the Thundarian archmage. In the end, though, regardless of the circumstances, things had played out far too neatly for Icepaw for it all to have been a coincidence. The rumors of her prescience, of carving out a fortified little fiefdom for herself right in reach of the Eye in preparation for what would happen in the Warzenan shore... It all came across as simply too convenient.\n\n\"My King?\" Uruwai's voice snapped Boltrus out of it. Standing on his own two hooves and reaching for the curtains, Boltrus blocked the harsh low sunlight that came into his office and wandered over to his desk, preparing an inkwell and a smooth white page. \"Will you make Boltria's stance on this matter official?\"\n\nTapping the blank paper, the King hesitated, but replied: \"Radio silence is best for now. I don't know what she's capable of. But still, I'll have my communications at the ready, should they be needed.\"\n\n\"It is dangerous to decide on a course of action without all the possible information,\" Uruwai warned. \"but it's more dangerous still to act when the enemy knows more about you than the other way around. What does she know of you, my King?\"\n\nArkyz figured that Ibyz must be the attentive sort. He never flew under her wing, but she surely must've gotten to take a look at his service record: she knew she outmatched him by a wide margin when it came to field tactics, but in the political realm? She was the newbie, not him. Arkyz was certain that she was being just as careful at the moment as himself.\n\n\"She knows enough to tread carefully\", he said, picking up the quill. It was essential that he made a good first impression."
 boltria.5.a:0 "\"To the magnanimous Storm Queen...\""

 boltria.6.t:0 "An Expected Disappointment"
 boltria.6.d:0 "Save for a mild grumbling and a sigh, there was silence. Liv shifted uncomfortably in her seat, and Garfur stared out the window to the barren wasteland, facing West. The King had gathered all the yetis presently in Camelkand for a quick debriefing; no yeti present would be surprised by his words, but still, for decency's sake, they had to be said.\n\n\"Not many of you had the privilege of meeting Ikvus in the flesh\",  he began with a dry tone. \"I did, by technicality. It was right after the Zwahile occupation was established. My crew and I were part of his escort. He was...\" Arkyz trailed off, mulling over the recollection. Hailstorm was, above all, a worm: the snivelling, boring and unimpressive sort of middleyeti any bureaucracy needs to make use of, always scheming machinations far above his station. By what miracle he retained control of the crownlands in the Eye, and such a wide bulk of the Storm Legions, he didn't know. The Storm King himself had always been the one in the spotlight, the one who soaked all the attention and upon whom all eyes fell, for better or for worse. One could only assume Ikvus' network of contacts, underhanded resources and conspirators was far more entrenched than any yeti in Camelkand had suspected. Still, Arkyz held out hope that this cowardly creature, fit only for the shadows in the recesses of true power, would buckle under the pressure of being the one at the center of the maelstrom. He was a malcontent, a talentless, honorless and parasitic being that any reasonable yeti, regardless of creed or ambition, could only possibly grow to resent from having as their superior. All of these things and more, King Boltrus desired to say. But he had no need to. All members of the Expeditionary Legion felt the same way.\n\n\"...His Majesty's closest advisor and, by nature of his death at Ain Trotgourait, the closest there is to a true legal heir of the Storm Kingdom.\"\n\nA heavy pause burdened every creature in the room with its weight. To deserters such as themselves, any quiet moment was a moment to reflect on what loyalties matter: to home, to country, to crown, to principle, to divinity, to brotherhood, to duty; all of these calculations were being remade, and King Boltrus knew well he may not like the results.\n\n\"We never did make our stance on the succession official\", he said with a stiff lip. \"As far as the Storm King knows, his furthermost Legion has simply been waiting for his claim to resolve itself. You are no traitors, as far as the law is concerned.\" Arkyz let out a deep breath. \"So, I invite you, with no prejudice on my end, to reevaluate your loyalties. Present yourselves for service today, two past midday, at headquarters, if you wish to remain. If not, well... You know where to go.\"\n\nKing Boltrus dismissed the soldiery, and as soon as the room emptied, he bent over the table and wiped the sweat off his forehead. He had presented this ultimatum in hopes that after all this time, not many would change their minds. Still, when given the opportunity, he knew some inevitably would.\n\nThankfully, he had hedged his bets well. Those unaccounted for later that day were few and far between."
 boltria.6.a:0 "It might've been for the best that they left, anyhow."

 boltria.7.t:0 "The High Peaks' Cohort"
 boltria.7.d:0 "In the outskirts of Camelkand, there was jubilation, or as close to such as the Legion's situation could afford them. News had spread quickly from the Southwest about the outcome of the war: the rogue archmage had been laid low. The Eye's regency, toppled. The Zwahile officer, driven back. Against all odds, what the yetis in Camelia least expected had come to pass. A new Storm Queen had been crowned, from the unlikeliest of places, the Silent Cohorts of the isolated peaks.\n\nNo yeti in Camelkand, regardless of how politically savvy, had the slightest clue what would follow. Gyz Windborn was a shadow in the record, a wild card that neither the King, nor his advisors, nor any muttering voice among the Expeditionary Legion could discern. They knew nothing of her, of her followers or their intentions, save for one thing: they had just saved every yeti in the Rainband from fates that would've been, in nearly all circumstances, far worse. It was unusual that storm creatures took to the direct running of things in this manner, which made Gyz an outlier and an aberration. It was only natural that every yeti would eye her with suspicion.\n\nStill, this outcome is likely the best for the Rainband. It would be strange for the storm creature to reveal herself too harsh of a despot, even in the worst of cases. Despite the uncertainty, one could not escape the feeling that the Rainband had been saved from a terrible fate.\n\nIt remained to be seen whether this hope was foolish."
 boltria.7.a:0 "King Boltrus steadies himself, as he watches from afar."

 boltria.8.t:0 "Reign of the Mad Archmage"
 boltria.8.d:0 "A loud, mechanical shriek pierced the air, as the Camelkand patrols were recalled to HQ by the siren. Across the badlands, yetis hurried to their scarce vehicles, leaving their posts at the mercy of camel levies or to no one at all, and sped off to the capital for debriefing. At the center of it all, Saz was with the King, going over what little information they had: the magician's background was a blur to them. Saz cross-referenced accounts of just what exactly he was capable of, according to those that had witnessed it. Was his power innate? Dependent entirely on his possessions and their channeled potential? She could not tell. There was no yeti, no creature at all in Camelia with the magical expertise to make a claim beyond wild speculation.\n\nArkyz ran his hands down the length of his face. \"He will not live to see anything done\" Saz tried to assure him. \"He's a recluse, a madyeti that was in the right place at the right time. He commands no loyalty. His own apprentices are sure to gnaw at him now.\"\n\nThe King wanted to believe it was true, and that Thunderbringer could not possibly possess the will to run a state, that all he was good for was commanding hordes of whipped minions and their cruel overseers. But the truth of the matter was, no yeti could've gotten as far as he did, from such a compromised position, without having the skill to show for it. It was one thing to be handed a golden opportunity, it was another thing entirely to gnash and claw against the Rainband's forces, fighting a two-front war against the revanchist hyenas, and still manage to come out on top. Arkyz found Saz's comforts to be hollow in that moment.\n\n\"Sir,\" came a sudden call from the hallway. \"codename: Fulgurite has radio'd in. They'll be here in fifteen.\"\n\nStern as he could manage, King Boltrus nodded back to dismiss his guard. He stood from his desk, and combed the bangs of his fur. \"I need to look presentable. I'll make the announcement public. This no longer concerns just the Legion, but all of Boltria. All of Camelia, in fact.\"\n\n\"What do you mean, Arkyz?\" Saz questioned. Boltrus had held out hope that whatever happened in the Rainband, a stable government would emerge, one capable of entering the Zebrican stage. But this? This was no state, this was barely even the Storm Kingdom. It was the feudal realm of a mad wizard, one without restraint, either moral or practical, to his vision. He would not enter the Zebrican stage so much as be sure to plow right back across it, to the best of his ability.\n\n\"Find Uruwai, Saz!\", he said. \"Find him, and tell him to gather the caravan chiefs as soon as possible. The Storm King is back, and I want everyone in Boltria to understand what that might entail.\""
 boltria.8.a:0 "The lack of desertions came to the King as a cold comfort."

