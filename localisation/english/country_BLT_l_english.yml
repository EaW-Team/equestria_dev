###LEADER DESCS###
 BLT_boltrus_start_desc:0 "§YBorn§!: 11th of August 980 in Clearpine\n\n§YBiography§!: Born to an arranged marriage between his mother Ozha and his father Ikhavu, Arkyz Cloudseeker had a privileged upbringing, all things considered: with a renowned family name and an elevated standard of living compared to the rest of the relatively impoverish Rainband, the young yeti would surely have been set for life, if not for his estranged relation with both his parents and the rest of his extended family. When the Storm King came to unite the Rainband under his rule, the Cloudseeker clan were among some of his fiercest resistors, but Arkyz willingly abandoned them to join the Storm Legions. While petty warlords and ambitious commanders flocked to the Storm Kingdom's banner for glory, wealth, battle and loot, Arkyz had no desire for any of these things, nor any interest in the Storm King's machinations. What he truly wanted was to leave the Rainband behind, and to travel the world on his own accords, an end to which service to the Storm King seemed a perfectly reasonable mean.\n\nArkyz's disillusionment with the military life came quickly and brutally, as the carefree yeti found himself as a permanent consciencious objector in the midst of the Storm King's rampage across the continent. There is hardly any injustice that Arkyz has not witnessed his fellows commit, and despite his efforts to hold back his own subordinates at times, his lack of respect among the officer corps made him a pariah, who participated half-heartedly in all his campaigns until he was finally assigned to the distant post of Camelkand, after it was swifty conquered.\n\nArkyz has lived in Camelkand for a couple of years, and his strategic alliances among the camel caravans have led him to being extremely well seen among the locals despite the circumstances of his arrival. After the Storm King fell at Ain Trotgourait, Arkyz and his subordinates largely remained in Camelkand, and the former general has styled himself as the King of Boltria. He is unbendingly polite, politically savvy and quite the administrator, but for being a veteran of the Storm King's campaigns, his military experience is quite limited compared to the rest of his fellows. Now in charge of a sovereign state, what direction the so-called King Boltrus intends to take his kingdom on remains a mystery to the wider world..."

