 BLT_boltrus_traits_banner_text:0 "§YTRAITS§!"
 BLT_banner_tt:0 "Rulership requires certain things out of a creature, and if the Boltrian project is to survive, the King must master at least some of the things that make a ruler worthy of history.\n\n§CTraits§! will provided certain bonuses when §Gobtained§! or when §Yactive§! (obtained bonuses are not removed if the trait is then lost). In addition, having a trait active may add additional benefits to certain focuses and decisions, and unlock unique event options."
