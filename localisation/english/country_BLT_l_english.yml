 boltria.bad_dream.t:0 "The Deserter's Tribunal"

 boltria.bad_dream.1.d:0 "Struggling to breathe, Arkyz stepped forward, past a sleek metallic surface that echoed down long, cramped hallways. Screams and whimpers came from the distance and smashed against the walls. He hesitated, but was whipped from behind by a cruel lash and pushed forward, into a dark room. When his eyes adjusted to the low light, he saw a familiar face: endowed in the Storm Kingdom's armor, with detailing fit for its modern iteration, Arkyz failed to recall his name, or even when he last saw him. It couldn't have been during the Maregyptian campaign; he was long gone by that point.\n\n\"Was it worth it, Cloudseeker?\" the yeti asked with a snarl. Arkyz was unsure what he meant: to have betrayed his brothers and fled? His loyalty to the Storm King had always been transactional, and many among the officer corps knew that.\n\nBefore he could muster a response, he was shuffled out and into the embrace of a harsh flickering light. Pushed ever forward, the metallic surface turned to stone, and the stone to a delicate marble. The sounds of the world grew dim and distant. An all-consuming brightness came to devour him."
 boltria.bad_dream.1.a:0 "He stepped past the gateway, into the open hall."

 boltria.bad_dream.2.d:0 "Past the reach, one hundred eyes fell upon him, and as many pointing fingers accused him. He was Arkyz, the deserter; he who abandoned his clan, his kin, and his duty; the weakling, the lamenter of the Storm Legions, the one whose follies were the bane of all of his kind. Charges that the prodigal son of the Cloudseekers could not deny.\n\nArkyz measured his options, and saw no way out. His fate would be the same as the fate of all traitors: Death."
 boltria.bad_dream.2.a:0 "Out of options, Boltrus accepts his fate."
 boltria.bad_dream.2.b:0 "\"If I am to die, I die standing!\""
 boltria.bad_dream.2.c:0 "§3Boltrus snaps out of it, and recalls his backup plan.§!"

 boltria.bad_dream.3.d:0 "The deserter did not utter a word, from the moment of his arrival to the moment the blade fell over him. An odd barage of feelings came over him in those last few moments; regret and shame, most of all.\n\nWhen King Boltrus snapped awake in a panic, in the darkness of his room in Camelkand, the moment of shock came as quickly as it went, and lifeless, he fell back into bed, staring into the nothingness above. The night was silent; not even a wind blew against the walls.\n\nArkyz had had many regrets over the course of his life that he came to ruminate on over the years. He only came to miss his folks when he abandoned Clearpine. He only came to loathe the Storm King when he had already sworn him his service. And he only came to understand the depths of his foolishness when it was far too late to back away. Life had been nothing but fair to him; and from where he now stood, he seemed to have squandered each of his chances. Even then, with the Storm Kingdom's desintegration, he had been given yet another chance to right his wrongs, which is what he had hoped to do in Camelia. Perhaps all he truly desired was another chance to run away."
 boltria.bad_dream.3.a:0 "\"Ancients, what am I doing?\""

 boltria.bad_dream.4.d:0 "Gnashing against his chains, Arkyz slipped his hands from the binds and ran, as fast he ever did run, back down the shadows of the hall and into the remotest distance, pursued by the tribune's chorus as his hooves clanked against the harsh surface. Past a point, the screams and accusations diffused, and then went silent. Arkyz continued to run, never so much as daring to glance back, until he was consumed by the darkness and ran into the absence of space.\n\nSweating and drawing a deep breath, Boltrus finally jumped awake, jolting up from his bed. Sensing his heart racing, he combed his fingers down the length of his fur and felt the sense of his own body return to him. He got out of bed, blinked his tired eyes, and stared out the window, to the night-shrouded facade of Camelkand and the darkness that settled over the sands in the horizon.\n\nArkyz had many a regret weighing on his mind. He was, in truth, a lucky yeti: he was born into relative security and comfort. He had his life path planned out for him, if he had simply obliged. And even after the day he foolishly joined the Storm King's army, luck never seemed to abandon him. Often times, he could sense that were it not for its boon, Arkyz' life would've been cut short many years ago.\n\nHis desertion was the ultimate test of his luck, and Arkyz had already owed it far more than any creause ought to be comfortable it. Every so often the delusion of possible return to normalcy came back to him.\n\nNo more. As soon as King Boltrus got hold of his breath, he looked out sternly to the Western reach; he had come to terms with the danger he put himself in, and came to accept it, at last. Desertion's punishment is death, and King Boltrus no longer found the chance his luck would run out to be of any significance. He would see his mission through, or die trying."
 boltria.bad_dream.4.a:0 "\"Fear will no longer cloud my eyes.\""

 boltria.bad_dream.5.d:0 "When Akyz stepped forward and pushed against his restraints, the facade shattered, and the yeti awoke with a jolk in his bed. Back into the waking world, the yeti slumped out of bed and walked softly to the window, to sweep aside the curtains and let the moonlight into the room. Camelkand slept, quietly. All that he could hear was the faint whisper of the wind in the distance.\n\nTo the rest of the Expeditionary Legion, a measure of clemency could be granted, should they choose to abandon their commander and return to the Rainband, even after all this time. Given the chaotic nature of the Eye in the aftermath of the Storm King's death, no reasonable yeti would've cast too harsh a judgement. This was true for all of them, except Arkyz. As acting commander, this stunt of attempted desertion and all associated punishments could only fall for certain upon his shoulders. Every other yeti in Camelia still had an out; not him. In this respect, even after all this time, he was still alone.\n\nDesertion is treason, and the payment for treason is death. Arkyz had known that, even when he decided to reject the call to return to the Rainband. Then again, he had also known, in the abstract, just what service to the Storm King would entail when he was sworn in; maybe just like then, he could not stomach the true extent of his decisions, and Arkyz' naivety would come back to haunt him again.\n\nBut it was far too late to ponder on what could've been, if he had chosen a different path. There was no backing down now. King Boltrus would stand victorious, or not at all."
 boltria.bad_dream.5.a:0 "Silently, the King watched over the city until dawn."

 boltria.bad_dream.6.d:0 "The dream came to an abrupt and confusing end, as King Boltrus awoke in his bed in the silence of the night. Taking a deep breath, Arkyz found himself taken by a sudden and comforting lucidity. He got up, and looked out the window, towards the southeast.\n\nArkyz had many a regret to ponder over, but he was not without redeeming qualities. One thing he could always rely on was a particular cleverness, and ability to account for possible downturns and future needs. The rise of Gyz Windborn had been a development he did not predict, but that was not to say that despite the undersupplied state of the Expeditionary Legion, he did not himself have contacts among sympathetic storm creatures. During his stay in the Zwahile, he had made friendly acquaintances among them, and even now, after his desertion, he could still, technically, call upon them.\n\nTheir help would be rather... Troublesome to make proper use of. As time went on and things continued to stabilize in the Rainband, a new government would only grow more and more entrenched, and the prospect of helping Boltria in the advent of a conflict increasingly unlikely. Still, the support of possible forces near the Eye, independently of developing frontlines, could certainly come in handy, if he played his cards right.\n\nIt was far too early to lose sleep wondering what would come of it. More immediate concerns ought to be at the forefront. Regardless, this strategic cushion gave the King some peace of mind.\n\nHistory would not remember him as a mere deserter."
 boltria.bad_dream.6.a:0 "\"Boltria may have been a gamble, but I know how to hedge my bets.\""

