 frontier.1.t:0 "Nothing Special"
 frontier.1.d:0 "In the past, the yearly meetings were something that Muck would wait for. A recap of their progress in growing the city or region, being validated by the people's cheers when he walked around. However, the Frontier killed any relief that he would have had, with him not even needing to read the reports provided by his cabinet to know what was wrong.\n\n"Sadly, our funds are running out again. We had expected it to last for..." The finance minister checks his papers. "-almost a year." He put down his papers, as the rest of the cabinet either groaned, yawned or sighed. "We are lucky to last around 4 months... unless we get more funds from the Governor..."\n\n"We can't sustain this!" The defence minister shouted, slamming his claws on the table. "I've repeatedly argued that we should have let Nova Griffonia handle the communists, bandits, and cannibals ruining this region. And guess what? Money wasted due to incompetence!"\n\n"And because the militias aren't paid properly!" The labour minister countered, rolling her eyes. "You don't feed griffons with words and guns. These funds should have been more focused on distributing the people's needs-" The defence minister cut her off. "How if we are constantly thwarted by these threats?!?"\n\nThe room erupted in an uproar, with all ministers voicing their concerns about what other way they should have allocated the funds. Muck just sighed, shaking his head and squinting at the blurry reports."
 frontier.1.a:0 "Nothing that he isn't used to"

 frontier.4.t:0 "Away In the Mountains"
 frontier.4.d:0 "An eerie silence was in the air as the Gruff Griffin stepped into the camp, rifle firm in his claws as he scanned the site. Scattered about are recent signs of life. Plates still full of grub, bags of coins scattered in the dirt, and open tent flaps fluttering in the wind. The bandits had surely been here, perhaps even just moments ago, but where had they gone?\n\nDespite his search there was no answer. All he could find was that the bandits had up and left in a hurry. Frustrated, he let out a sigh. If they couldn't give the bandits a fight they could at least deny them supplies. Calling out to his allies he yelled "Round up anything valuable and set fire to the res-"\n\nA distant shot rang out, echoing off the mountainside and silencing him. Moments later a dreadful yell took to his ears and as his eyes went to the sky he saw its source. Griffins clad in bone and dried blood. More than a dozen of them infesting the sky and descending upon the camp. In mere moments the silence was replaced with the sounds of battle as the cannibals crash into the camp. A brutal melee of claws and tomahawks of bone going up against bayonets and hunting knives ensued.\n\n Watching the cannibals work around him, watching his comrades fall or be thrown into the dirt and disappear into the sky screaming in the claws of a savage, put such a fear in his heart he found he could not breath. The weight of his rifle could not be raised, and his talon could not push down the trigger. Before he even knew it he was turning from the sight, breaking into a sprint. Wings frantically flapping and carrying him into the sky and away from the camp. Unable to conjure any thoughts but of fleeing as far from here as he could.""
 frontier.4.a:0 "All those who could turn and ran"

 frontier.6.t:0 "Watch How They Run"
 frontier.6.d:0 ""Well, won'tcha look at that." Virgil leaned forward despite the sheer drop in-front of him, looking through his binoculars. "They runnin' like Mars himself is at their heels." The sight brought him to a cackle.\n\n"I can't see them from here." The bandit to his right shifted on his paws, nervously clutching his rifle. Afraid the cannibals they'd lured into their old camp might turn around at any moment once they were done with their current targets.\n\n"Hmm? Oh, yes that's right." Virgil pulled back from the edge and offered the binoculars to the bandit. Taking them the bandit looked down at the scene below, seeing just as he did. The militia of Frosthill being routed by a couple of madbirds dressed in bones. Their losses were looking to be few but the terror of the Gods was going to be in their hearts from now on when they thought of the mountains.\n\n"This is great and all, but what about all the supplies we left down there boss? I mean, the cannibals are probably gonna steal some."\n\n"Certainly, they ain't lookin' just to feast on the poor saps down there they'll nab. Don't worry your little head any though, I got it all figured out. What with all these militia bein' here and not, say, Tsasbaatar, there's some ripe pickin's. As we speak my boys are already pilfering whatever stockpiles of goods they can get their claws on. So while Muck laments another failed operation we's gonna be havin' feasts and give'n alms to the poor.""
 frontier.6.a:0 "Just another victory for Virgil."

 frontier.7.t:0 "A Perfect Plan"
 frontier.7.d:0 "Two sets of explosive, placed strategically to fell a pair of trees on the road. One in front to stop the gun truck, one behind to prevent a reverse. In the trees on either side of the road two four griff teams of militia lie in wait. Ready to pop out the second the commies show their beaks. Arrest the driver, take the guns, and deal a crippling blows to the revolutionaries. All-in-all, a perfect plan, all they need to do is wait for the truck to appear.\n\nThus they wait.\nAnd they wait.\nAnd they wait some more.\n\nThe hours slowly tick by as the militiagriffs begin to grow restless. Occasionally popping their heads up and being yelled at to get back in cover, or wandering off to stretch their legs. When their canteens finally run out so does the yelling for discipline. Empty clawed after nearly half a day of waiting they abandon their posts with nothing to show for the warning about the truck and the countless hours spent in the frigid cold waiting for it. All except one, who seems rather unbothered about the time he just wasted."
 frontier.7.a:0 "Did they get a warning about our warning?"

 frontier.8.t:0 "Nova Griffonia Proposes a Truce" # TO BE REWRITTEN LATER
 frontier.8.d:0 "Teafeather and his cronies have been trying to put us down for months, but his troops can't compare to our experienced raiders. We've been pushing them back for a while, and soon after a messenger had arrived, asking to discuss terms of truce. On first sight, it seems pretty great for us - peace, independence, recognition and all of our territory, but on the other claw, why would they ask for truce if they weren't close to losing? The boss thinks we should take all of Nova Griffonia right now, but the other bandit leaders believe it would be more wiser to take the deal so we can build up for the next confrontation."
 frontier.8.a:0 "You can have your damned peace, Teafeather."

 frontier.9.t:0 "As The Sun Falls"
 frontier.9.d:0 "The howl of the wind fills Ulla's ears as the few griffins still milling about begin to retreat to their tents in search of badly needed warmth. They've been waiting hours for any signs of the gun truck and its cargo. Yet nothing has arrived, and all the griffins she's sent to scour the roads have come back with reports of nothing but dense trees and desolate trails.\n\nShe turns away from the road, a claw going up to adjust sling across her chest as she looks over the camp. It is the last embers from the Revolution of 996. Still trying the impossible even after having been forced from their homes, their nation, and into these mountains. The tents she sees are of shoddy construction, what few faces not tucked away are tried, and as the rifle settles against her back she knows it is aging and prone to jams. The gun truck has been the first sliver of aid they've received in years and with each passing second it seems more and more likely that their mole has failed and the supplies have slipped through their talons.\n\n'How many more years can we run on fumes and scrap?' She thinks to herself, before letting out a sigh and trying to push such a thought to the back of her mind. Then an echo, faintest sound of a truck's engine rebounding off the mountain's side reaches her ears. As she looks back she sees at a distance a pair of headlights cutting through the new darkness of the night.\n\nTonight each revolutionary would receive a new rifle."
 frontier.9.a:0 "Fumes and scraps no more."

 frontier.10.t:0 "Report on Local Mineral Extraction"
 frontier.10.d:0 "Papers pile up on the desk before Muck. Everyday his ministers add a new stack. Each one a whole new story of how Frosthill is rushing into the red financially. Nothing out of the ordinary from last year, and the years before. Nothing that can't be handled if the mines just- A knock at the door breaks Muck's train of thought. "Come in!" He calls.\n\nThe door creaks open and in steps the Manager of the local coal mining operation. In his claw a slim vanilla folder. Without wasting any time the Manager steps forward and holds the folder out. Reluctantly, Muck takes it and flips the cover open to reveal startlingly few sheets of paper inside.\n\n"Where's the rest of your report?" Muck says as he skims through the folder. "Typically you have enough to keep me up through the night, but this looks like it'll barely take me five minutes to read."\n\n"That's all there is." The Manager's tone grim.\n\nHe looks up at the Griffin, staring in disbelief  "No... Surely not. There has to be something in those mountains we can show off to Weter."\n\n"I'm sorry, Muck. I've gone down into the depths myself and we've pulled everything we can out of the ground."\n\nAn uneasy silence fills the air as Muck sinks back into his chair, dropping the folder onto his desk to join the rest. That's the only card he had for the meeting in Weter and now it's gone.\n\n"Well, I'll catch up with you later then." Muck's voice low as he clasps his claws together. "No point in having the full meeting anymore. I have some options I need to look into." As the Manager turns to leave Muck rests his head on his claws. Wondering what he's going to have to do to convince Teafeather the Frontier is worth turning on the money spigot for again."
 frontier.10.a:0 "...Maybe just plain old begging?" 

 frontier.11.t:0 "The Militia's New Posts"
 frontier.11.d:0 ""If Muck wants those positions staffed he can do it himself!" A young griffin by the name of Conrad yells from atop a hastily assembled stage made of old surplus crates in the yard of the Frosthill militia headquarters. The crowd of griffs around him cheered.\n\nThe assembly mode of the assembly shifts as a voice booms over them "What is the meaning of this?!" The Defense Minister's words quiets the crowd, though one might also attribute it to the two armed MPs flanking him. "You all have your orders, you were meant to have moved out two hours ago! So why in Boreas are you still here?"\n\nUndaunted, Conrad again speaks "We're not taking any orders until we get our pay. Not this poultry pittance we can't even feed our families with, but real and fair pay!" An unease has fallen over the militia with the presence of the MPs, though many still cry out 'aye!'s of agreement. "We aren't leaving our families to live in unheated barracks just so Muck can feel safe in his governor's mansion. We're staying right here!"\n\nA nasty scowl plants itself on the Defense Minster's beak as he surveys the crowd. The MPs next to him fidgeting with their rifles anxiously. The militia outnumbers and, despite the quality of their equipment, outguns them. The crowd may have the hint of fear among them but every word out of Conrad's mouth is emboldening them, enraging them. Allowing this gathering to persist risks a riot, and they certainly can't be compelled to their posts. "Disperse the lot of you and go back to your homes!"\n\nNot wanting a tussle and to get back to their families the crowd broke. Soon leaving no one in the yard but the Defense Minister and his relieved guards."
 frontier.11.a:0 "At least the MPs are loyal."

 frontier.5.t:0 "Another Goodbye"
 frontier.5.d:0 "The mood is somber as Muck takes another step towards the awaiting caravan of vehicles from Nova Griffonia. Behind him the myriad of political shakers and ministers that have come down to see him off towards Weter.\n\nAlready he's shared his final words. Discussed strategies and made plans for the future on uncertain facts. Everygriff has said their goodbyes and wished him well. Yet, as a chauffeur opens the door of the vehicle in front of him Muck pauses, turning to his fellows behind him. Searching and failing to find confidence in their faces that things will go well.\n\n"Gentlegriffs." He speaks up, watching the ears of the crowd perk up at his unexpected words. "I know this year has been hard on us, more so than any other. However, just as we are on the brink of disaster I know too we are on the precipice of change. We have done amazing work here in Frosthill, and it is my hope that with just one more round of funding we can finally make our dream of a new and grand state come true."\n\nAll these rousing words might have once picked up spirits, but he's said these things before. While his words aren't ringing hollow they don't have the effect they once did.\n\n"It is my great confidence that when I return I will have the support of Teafeather, and on my heels will be the final year of our struggle. That regardless of what happens in Weter, we will persevere and our efforts will bear the sweetest of fruits." Hiding away his admittance that Teafeather might offer them nothing more than words of encouragement in the very end of his speech."
 frontier.5.a:0 "The cheers as he leaves are muted."

 frontier.12.t:0 "Muck meets Teafeather"
 frontier.12.d:0 "All the joy Muck had for being back in Nova Griffonia melted away as he stood before the door to Teafeather's office. Today was to be an informal affair. No meeting room, no battalion of politicians to pick over every detail, just the two of them and the brass tacks, the future of Frosthill. Taking this moment alone he took a deep breath. Steeling himself for the conversation that was to come as he knocked on the door.\n\nTeafeather's voice came quickly. "Come in and take a seat."\n\nDoing just that he found an office that was in stark contrast to his own, spacious and opulent. In the back of the room was Teafeather himself, currently fretting over a platter with a couple cups on it and a teapot sitting on a hotplate.\n\n"Would you like some tea to start off our meeting with? I wasn't expecting you for another twenty minutes or so, so I was brewing myself one." Teafeather sounding quite affable despite the conversation ahead of them.\n\n"That would be appreciated, thank you. Though if you'd prefer I could wait on the grounds until you're ready." Muck spoke in return, taking a seat as he'd been instructed.\n\n"That won't be necessary." Pouring out two glasses, Teafeather brought the platter over to his desk. Putting one in front of his own spot and another in front of Muck's. Taking a seat right after and then a sip. Muck grabbing his own and following suit."
 frontier.12.a:0 "A pleasant way to start off an unpleasant meeting"

 frontier.13.t:0 "The Matter of Coal"
 frontier.13.d:0 ""Onto business then?" Teafeather says as he puts his cup down and slides it to the side. Taking a folder from the side of his desk. Muck nods as he savors the taste of the tea. It had been a long, long time since he'd had some of the fine imported teas one could get up here in Weter, and no griff was getting higher quality than Teafeather.\n\n"Let's see here." A moment of silence as Teafeather skims through the first page in the folder. "I've been getting some interesting reports about Forsthill's mineral reserves. Though reports seem less the word for them, more like nasty rumors." \n\n"What sort of rumors?" Muck already knowing the answer, and dreading it.\n\n"A paper in Summer Camps reported an influx of miners coming in from the Frontier. Most of them carrying testimonies that the whole of the mountain range has been mined out." Teafeather looks up at Muck. Though he's phrasing it all like a tabloid rumor, the look in his eyes say it's a matter he's very much concerned over. "If you could put my mind at ease on this topic it would certainly soothe some of my misgivings about this year's budget."\n\nThis one burned. Every other issue they were going to go over was a thorn in Muck's side and had been for years, but this? This was what could really spell doom for these negotiations. With the Frontier's economic output gone, what was there to offer in return for Nova Griffonia's investment?\n\n"To tell you the truth of the situation..." Muck began."
 frontier.13.a:0 "(Confess) "....the mines have run dry.""
 frontier.13.b:0 "(Exaggerate) "...the mines are low, but a geological survey is already in the works.""
 frontier.13.c:0 "(Lie) "....those rumors are baseless, we're as resource rich as ever.""

 frontier.14.t:0 "Touching on Banditry"
 frontier.14.d:0 ""Hmm..." A pensive look accompanying the response as Teafeather looks down at his papers again, flicking a couple over. From his position Muck can barely see that some of them are copies of newspapers, others official reports. "Understood."\n\n"Would you like me to go into more detail?." Muck says, only for Teafeather to shake his head.\n\n"No, there's no need. Let's move on to the next big issue putting a wrench into this year's approval. My office has received no report from you that the insurgencies you're facing are close to being put down. Given your previous confidence that you'd have the problem in claw it makes me quite curious as to what the current situation is. Your last reports were more about what you planned to do than what was happening."\n\nEvery year Muck was sure it would be the last Frosthill would be dealing with the bandits and communists, and every year he was wrong. This time he was certain they'd grown confident and bold, something he could turn against them if only he had enough funding to get the militia into shape.\n\n"The circumstances on the ground are that...""
 frontier.14.a:0 "(Confess) "...without an increased budget, Frosthill has mere weeks before collapse.""
 frontier.14.b:0 "(Exaggerate) "...the militia are grumbling for pay, but have held the insurgents back.""
 frontier.14.c:0 "(Lie) "...even as I left the militagriffs were stomping out insurgent camps.""

 frontier.15.t:0 "Reflecting on Years Past"
 frontier.15.d:0 "Despite Muck's statement Teafeather's response is placid. "Interesting." All the while casually reaching over and grabbing his tea cup again, seemingly no longer interested in the folder before him.\n\n"Is there anything else you want to know about the military issues of Frosthill?" Even Muck's seasoned political acumen can't hide the growing anxiousness taking hold of him from each nonresponse.\n\n"No, Boreas, no. Muck, these meetings tend to last hours and go over the same few issues over and over. This year I'd like to keep things brief and simple. Have you address my main concerns and then get to my deliberation." Teafeather takes a sip. "Speaking of, there's been a question on my mind recently."\n\n"And what question is that?"\n\n"The question of what happened to all of the previous year's funding, and the year's funding before that. Each year, and I do apologize for putting it so harshly, you come before me groveling for more funds. Always promising change and yet..." He motions a claw to Muck, making him shrink slightly in his seat. "Here you are again doing the same. So, what happened? Where are the results?"\n\nFor the first time in a long time Muck's demeanor cracks. The amount he deals with in Frosthill is astronomical, by now he figured nothing could put him more at ill ease than the endless reports of operational failures and deficits. But now, put on the spot so badly, he was starting to wish he'd listened to his family and retired.\n\n"Well, you see it was...""
 frontier.15.a:0 "(Confess) "...corruption, missteps, and starting from the ground up.""
 frontier.15.b:0 "(Exaggerate) "...mostly trying to fix the mistakes of the previous administration.""
 frontier.15.c:0 "(Lie) "...all because I've been trying to build a nation from scratch.""

 frontier.17.t:0 "The Fate of Frosthill"
 frontier.17.d:0 "Teafeather barely seems to register Muck's response. Instead focusing more on the final sips of his tea. Saying nothing for several long seconds before setting down the empty cup. "I think I've heard enough, Muck."\n\nBefore Muck can respond Teafeather holds up a talon to silence him, leaving him floundering in his seat as his half open beak shuts back up.\n\n"When you came here today I planned to break the hard news to you that I'd already decided to cut funding." Teafeather starts. "The Frontier has been a failure on all measures. No progress, no profit, just a drain on Nova Griffonia's treasury. With what you've told me I see no change in this assessment and no reason to alter my stance. You've been given chances and confidence enough. It's time for me to see actual results."\n\nPanic fills Muck's words as he speaks. A pit forming in his stomach as he tries to formulate a response. "Sir, please if you'll just let me-"\n\n"Don't start begging again, it's unbecoming of you. I had high hopes for you once, and to see you like this hurts, truly. If it was anywhere but Frosthill I'm sure you would have managed, but you haven't and it's time to admit it. There's nothing more to discuss. So return to your post, bring me some real results, and maybe I'll reconsider this judgement."\n\nStunned, Muck lingers in his chair. A look of horror on his face as the reality really sets in that he won't be returning home with even a single cent to keep things running. Only rousing from a harsh glare that sets him scrambling out of the room and back into the hall where he can linger on his failure."
 frontier.17.d2:0 "Teafeather leans forward in his seat at Muck's response. His half full cup set down and the folder in front of him knocked askew. As Muck pauses for a breath he interrupts. "I think I've heard enough, Muck."\n\nBefore Muck can try to continue Teafeather holds up a talon to silence him, leaving him floundering in his seat as his half open beak shuts back up.\n\n"When you came here today I planned to break the hard news to you that I'd already decided to cut funding." Teafeather starts. "The Frontier has been a failure on all measures. No progress, no profit, just a drain on Nova Griffonia's treasury. However, with what you've told me I believe there's good reason to change my assessment. While there's still less progress than I would prefer, you've still made strides towards shaping the Frontier into something worth calling a state."\n\nMuck can't even begin to conceal the burst of joy he feels. The long shot, the dreaded meeting, it had gone well! "Sir, does this mean-"\n\nAgain Teafeather interrupts. "Yes, there will be another round of funding. In fact, I believe you've made a good enough argument that I'll be allotting you an increase. But understand me Muck, I expect firm results next time I see you. No more excuses, no more groveling, do you understand?"\n\n"Of course, I assure you this was the right choice. You will not regret giving me another chance with Frosthill."\n\n"I'd better not." Teafeather looks down to his folder again. "If you'll see yourself out I have a great many calls to make."\n\nIn a daze Muck nods, a grin plain on his beak as he stands from the chair and saunters out into the hall. Unable to stop himself from letting out a cheer in celebration as soon as the door closes behind him. "
 frontier.17.a:0 ""How are we going to survive this?""
 frontier.17.b:0 ""Hip, Hip, Hooray!""

