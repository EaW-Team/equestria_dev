### Events
 brodfeld_rework.173.t: "Tales From The Dunes"
 brodfeld_rework.173.d: "Dear diary,\n\nAfter a long an arduous journey, today the caravan finally arrived at our destination: The oasis town of Azir. However, calling it a town is rather generous. It is a mere collection of tents surrounding a small marketplace. Yet it is the largest settlement in the region, due to how desolate it is. Our water supplies were low so I eagerly joined the caravan's thirsty camels in enjoying fresh water. The local savages were welcoming, as they were used to camel caravans passing by regularly. The zebras however were especially curious about me, as apparently they had never seen an Equestrian pony before, and marveled at the bright colors of my coat - at least, that's how my guide translated their speech.\n\nAfter a brief rest, I headed to my own destination while the caravan traded with the locals: The mysterious ruins not far from the settlement. Thankfully, my donkey guide knew the way, so I followed him across the sandy dunes. While standing atop one, I could finally see the ruins with my very own eyes, and the sight made my jaw drop. Towering monoliths of dark stone, buried within the sand, weathered by countless centuries. I could already see that the ruins were scattered everywhere. It was a veritable treasure trove for an archaeologist such as myself!\n\nI descended down the dune with my guide and got to explore the ruins closer. I was almost overwhelmed with excitement! The rumours were true, and I had made a discovery which would surely make me famous back home. Nevertheless, I maintained my professionalism and conducted a thorough survey of the site, taking many, many notes. While exploring however, I stumbled upon a most remarkable object, hidden under a pile of rubble: a perfectly round crystal sphere. I showed it to my guide who was even more amazed by the object than I was. When I asked about the ball, he said it was a treasure that had been lost for centuries. Working together, we managed to retrieve it from the rubble fully intact. It was a truly marvelous item; looking into it felt like staring into an abyss."
 brodfeld_rework.173.a: "..."

 yale.137.t: "The Mystery"
 yale.137.d: "Dear diary,\n\nReturning to civilization was a relief, though somehow the heat was even worse in the city of Colthage than it had been in Azir, probably because it was so unbearably humid outside. I did not however indulge in the luxuries of civilized society as I instead headed straight to the local university. I had to confirm if my guide was correct about what he had said about the crystal ball. Was it truly a magical artifact? Could it truly be used to open the sealed tomb? I wasn't sure if anyone here could even respond to these questions, but I had to find answers somehow. I simply had to.\n\nI attented a meeting with the local archaeologists and presented my photographs and notes about the desert ruins. The gentlezebras were impressed, saying that this warranted further study. But they were not truly amazed until I presented the crystal ball. I told them what my guide had told me, but they barely listened as they were too busy admiring the artifact instead. One of them did hear me, and said they'd love to keep the ball for further study, but I refused, saying that the ball was coming with me to Equestria.\n\nUnfortunately, the zebras knew even less about the ruins and the crystal ball than I did. This was disappointing, but after I left the university, I met with my guide again. He told me that if I really wanted to learn more about the ball, I would have to talk to certain knowledgeable goats. He gave me a list of six strange names, saying they were the only ones who could answer my questions. I will have to find a way to contact them and meet them in person. I am determined to do so. The mystery of the crystal ball must be solved."
 yale.137.a: "..."

 flowena.129.t: "Back Home"
 flowena.129.d: "Dear diary,\n\nIt was good to finally be back in Canterlot, yet I did not get to rest as I had a presentation to hold. Many respectable ponies had gathered to hear me tell about my discovery in the Zebhara desert, and even Princess Twilight Sparkle was there! Yet I did not let anxiety overcome me. I calmly explained my findings, showing pictures I had taken and theorizing about the history of the ruins. The audience was pleased and stomped with their hooves in approval, and I was greatly honoured.\n\nHowever, I did not tell anyone about the crystal ball, or about the things my donkey guide had told me. I felt like I needed more information on this... subject matter before I could talk about it in public. For now, all I had were fragmentary notes, and my inability to form a coherent image frustrated me. Therefore I have decided to head out as soon as possible, to meet with one of the goats who apparently can tell me more about the crystal ball. I cannot rest while this mystery remains unresolved. I must find out the truth. I simply must.\n\nAfter some deliberation, I first decided to visit..."
 flowena.129.a: "...Oskar in [KAT.GetName]."
 flowena.129.b: "...Abram in [JAK.GetName]."
 flowena.129.c: "...Rachel in [CZR.GetName]."
 
 #no more events for you event
 baltimare.47.t: "Put Off The Trail"
 baltimare.47.d: "Dear diary,\n\nUnfortunately, I have been unable to reach one of my six contacts. The country they were residing in was forcefully annexed by another nation and the person I was looking for seemingly disappeared without a trace. Without all six, I highly doubt I will ever be able to fully resolve the mystery. I will not give up however, I have gone too far to simply give up. My investigations will continue unabated. I am sure I will succeed. I simply must."
 baltimare.47.a: "..."

 katerin.152.t: "The Occultist"
 katerin.152.d: "Dear diary,\n\nToday I finally arrived in the dark lands of Katerin, where Oskar lived. I do not know why he chose to live in this wretched place. Somehow, the Scheißwald forest is even worse than the Everfree, yet griffons willingly live here, facing regular attacks from magical monsters. I admire their courage, yet pity their stupidity.\n\nI arrived in the country travelling upstream the Griffking river, yet to reach the capital I had to ride on a wagon for hours, as apparently the city had been moved away from the river some years ago. It was an order from the Mad Princess, the locals said, and I could still see rubble of abandoned buildings on the shores of the mighty Griffking. Strangely, it reminded me of the ruins in Azir. Once in [KAT.Capital.GetName], I asked various griffons about the whereabouts of Oskar. No one seemed to recognize the name and hadn't even seen any goats, except for one priest. She told me where Oskar lived, saying that he was an occultist, providing theological advice to the local priesthood, with extensive knowledge of the arcane. I hardly believed the priest's words, and I doubted if the goat could give me any scientifically reliable advice. But his name was on the list, so I had no choice but to trust him.\n\nOskar was not interested in meeting me until I mentioned the sphere. He opened the door of his home and explained he had been busy eating a religious tome to absorb its knowledge. I rolled my eyes and told him where I had found the sphere and what my guide had said, and he confirmed it all as true. The crystal ball could be used, but it would require six goats. Then, it would grant a vision of the key to the tomb. If this is true, then the ball itself cannot open the tomb, but it is needed for it nevertheless, so the hidden key can be found. He said he'd eventually travel to Equestria to see the ball with his own eyes."
 katerin.152.a: "..."

 haukland.42.t: "The Editor"
 haukland.42.d: "Dear diary,\n\nThe journey to Jaki-Clan was arduous. Not only was the country largely isolated from the outside world, but the roads were in terrible condition, and the climate was freezing because the path went through a mountain valley. I even had to hire a personal bodyguard as I had heard rumours that the yaks had lynched Equestrians before.\n\nWhile the locals were inhospitable, once I arrived in [JAK.Capital.GetName], I still went around and asked them about Abram. Most of them refused to even talk to me, but one young yak, who claimed to hate the Jaki-clan rulership and their isolationism, happily talked to me and told me where to find him. This Abram worked as a news editor for the government.\n\nThe goat was happy to meet me, even though he was... busy at work. He was eating newspaper articles which had been written by Yakyakistani supporters. Officially he was an editor, but in truth he was a living paper shredder. Once he finished his meal we talked much about my discoveries. He told me that I had not truly discovered the ruins, as the goats had always known they were there. Other races were unaware of its existence because any records about it had been thoroughly erased. He refused to tell me why. He did tell me that the ruin was extremely ancient, and had been preserved only thanks to the dry heat of the desert. He claimed the ruins were over five thousand years old, and while I was doubtful, it would not surprise me if this was the truth. He said he wanted to see the ball himself, to see if I was being honest. Working as an editor had made him sceptical, apparently."
 haukland.42.a: "..."

 dragon.3.t: "The Genius"
 dragon.3.d: "Dear diary,\n\nNow I was back in the Zebhara desert, but I was not going to Azir. Not yet. Instead, I was a passenger on a merchant canoe sailing up the Neighle river. My destination was in [CZR.GetNameDef] and its capital, [CZR.Capital.GetName]. It was a very dangerous journey as the area had faced much conflict recently, but the merchants had hired competent guards, so I was not too afraid.\n\nWhen the canoe arrived and the merchants engaged in trade with the locals, I went out to look for Rachel. Most of the populace were zebras who had never seen a pony before, but I assumed some of them must've seen a goat. Indeed, when I drew an image of a goat in the sand, one of the zebras pointed me where to go.\n\nThe home of Rachel was more of a makeshift workshop or laboratory. She was an inventor, apparently, with an ingenius mind. It was exceptional, because most goats I had met were honestly dull-witted. When she saw me, she immediately started asking questions about who I was and why I was there. I ended up explaining many details about my life before I even got to talk about the ruins and the crystal ball. At no point did she show any signs of boredom.\n\nShe said that obviously, someone wanted me to find the ball. It was a valuable artifact, and would've been stolen centuries ago if it had always been buried in the rubble, as ruins in the Zebhara were often scavenged by thieves. This was quite shocking to me as I had not even thought of it, but Rachel was probably right. When I asked why someone would've wanted me to find it, she said they wanted me to find a way to open the tomb because something valuable was in there. She did not say who "they" were or why they wanted the tomb to be opened, but said she was eager to find out what was inside it and would do everything she could to help with the task."
 dragon.3.a: "..."

 temple.12.t: "The Next Destination"
 temple.12.d: "Dear diary,\n\nAfter meeting with one of the goats, I learned much about the mystery of the sphere. But I still have so much more to discover, so I need to decide where to go next. Each journey costs me a fortune, but I've secured a substantial loan which should cover the costs. Resolving this grand conundrum is more important than my petty personal finances."

 wittenland.153.a: "Randy, in [MIT.GetName]."
 wittenland.153.b: "Giles, in [BUF.GetName]."
 wittenland.153.c: "Gore, in [LMB.GetName]."

 MAN_ELF_new.1852.t: "The Organizer"
 MAN_ELF_new.1852.d: "Dear diary,\n\nTravelling on a ship, I arrived in the bustling port of Aster's Landing, looking for Randy. I've heard that this wouldn't be so hard, as he works for a relatively famous minotaur known as Iron Will. Indeed, by asking about Iron Will from the locals I quickly got his home address. When I visited him, he thought I was a customer interested in his assertiveness seminar and said that he had quit the business a few years ago. I clarified the situation and asked to meet with Randy. He seemed confused, but soon enough made the arrangements for our meeting. Randy still worked as Iron Will's assistant now that they had returned home from Equestria. Nevertheless, I asked Iron Will to leave us so I could discuss with him in private.\n\nI told everything to Randy. He seemed amused that a pony had found one of the most precious artifacts of his race. He told me that a pony had actually been responsible for the downfall of his kind, though he did not hold a grudge over ancient events. He half-jokingly said that now they needed a pony, and I was the one who could redeem ponykind for their actions. While he said so humorously, I felt that the meaning was more serious.\n\nHe agreed to help me, saying that he had saved up enough money to travel to Equestria if needed. I thanked him, and hoped Iron Will wouldn't mind me borrowing his assistant."
 MAN_ELF_new.1852.a: "..."

 austurland.999.t: "The Shaman"
 austurland.999.d: "Dear diary,\n\nIt was good to travel through Equestria for once, instead of having to go across the sea or deal with border controls of multiple countries. My destination was in the Mild West, where the buffalo lived, still isolated in their tribe despite Equestria's efforts to integrate them. While there had been conflicts between ponies and buffalo before, I trusted in their hospitality to a curious visitor.\n\nIndeed, despite being sceptical, the buffalo allowed me to enter their settlement. I inquired about the whereabouts of Giles, and the buffalo recognized the name immediately. He was an esoteric shaman, and the only goat the buffalo even knew about. He lived alone in the desert, so I had to continue my journey into the wilderness. Thankfully, a young buffalo guided me, as she knew the trail.\n\nThe shaman lived alone in a tent next to a small spring, which sputtered fresh water out of dry rock. Giles came out of the tent as soon as he heard us and almost attacked us, shaking a long stick threateningly. Thankfully, the buffalo calmed him down and told that I wanted to meet him. We sat down and I explained most of my story, except for the parts about the crystal ball. The shaman wasn't particularly interested. Thankfully, the buffalo was bored and went out to explore the surroundings. Now that I was alone with the shaman, I told him about the crystal ball, and he immediately became much more curious.\n\nHe began rambling of the bygone days, back when his race had ruled the world. He said that the ruins I found were §RTAMBELON§!, the ancient capital of goatkind. He also told of an old prophecy: When the stars would one day align, the city would be restored to its former glory.\n\nThis was all nonsense, obviously, but he was filled with a desire to see the ball himself, so we arranged a meeting for the future."
 austurland.999.a: "..."

 equestriancolony.5.t: "The Priest"
 equestriancolony.5.d: "Dear diary,\n\nThe journey to Llambet was difficult, as the land is surrounded by gargantuan mountains on almost all sides, and its folk aren't too fond of outsiders. Finally arriving in [LMB.Capital.GetName] today was a relief, yet I did not rest and immediately went out searching for Gore. The llamas and alpacas are arrogant creatures however and most of them wanted nothing to do with me. A few of them even spat at me in disdain! Yet I maintained my resolve, and soon enough saw a creature in a temple that didn't belong to either of the dominant races in Llambet. He was busy "preaching", loudly bleating at the audience, so I waited patiently. Then, I approached and asked if he was Gore. He nodded, his emotionless face keeping his thoughts hidden.\n\nI continued to speak, explaining why I had come here. Yet still, there was no sign of emotion on his face. Only when I mentioned the crystal ball did he finally grin. He said that with the orb, the Bell could be found. Apparently, it was the key to the tomb that I had heard about earlier. It had been hidden away thousands of years ago, yet goats still knew how to find it. They simply had no reason to retrieve it until now. He spoke we should recover the object quickly, because the tomb could only be opened on a certain date. I had to convert it to the Equestrian calendar: 9th of September, 1009 ALB.\n\nI did not understand everything, and clearly Gore was hiding something. But I needed him and he needed me, so we agreed to cooperate. Only this way could the mystery be uncovered."
 equestriancolony.5.a: "..."

 diamond_mountain_balrog.23.t: "A Vision"
 diamond_mountain_balrog.23.d: "All six goats gathered in the pony's room. They introduced themselves to each other, happy to meet other members of the widespread goat diaspora, while the archaeologist brought out the well-hidden sphere. It was covered by a blanket as he placed it on a table. The six approached closer, going completely silent as they eagerly anticipated seeing the treasure.\n\nIn a dramatic move, the pony unveiled it. The six gasped in amazement. It was true, the item had been found. And now, it was time to use it. The six stood around it in a circle, each of them closing their eyes and placing a hoof on its smooth surface. They began bleating loudly. The pony became anxious, worried that the neighbours might hear the noise and investigate, so he tried to tell the six to quiet down. They did not hear him. As they bleated, the orb became alive. Shadows grew within it, and a yellow eye formed at its heart. The eye's horizontal and rectangular pupil expanded and granted a vision: An ancient bell, magically sealed within a cavern atop a very tall snowy mountain. Then, the vision vanished, and the bleating ended.\n\nThe six began to argue what the vision had shown. There were many tall mountain peaks in the world, so the bell could be located at any of them. They were unable to decide, so ultimately the pony used his intelligence and his knowledge of the world to provide a suggestion of where to go searching for the bell."
 diamond_mountain_balrog.23.a: "Solarspike, in Griffonstone."
 diamond_mountain_balrog.23.b: "Mount Everhoof, in Crystal Empire."
 diamond_mountain_balrog.23.c: "T'agi Hogher, in Gargiloya."

 changelings_paxchrysalia.999.t: "The Sacred Mountain"
 changelings_paxchrysalia.999.d: "The six arrived with the pony at Solarspike, the most holy place in griffon faith. The pony had deduced that the bell must be located here, as reaching the top of the mountain is forbidden for mortals. Therefore, no one knows what is hidden in the mist-covered peak of Solarspike. It is the perfect place to store a valuable artifact.\n\nThe six and one began to climb, trying to not attract attention from griffon pilgrims who were visiting the site. This proved to be difficult as usually only griffons came here. As they climbed the stairway carved into the rock, more and more griffons became curious about this weird group of foreigners. This meant that when they reached the top of the stairway, the end of the journey for mortals, they had to wait for griffons to leave them alone. Some began asking questions out of curiosity, but received no proper answers and became increasingly suspicious. While the griffons were distracted by talking, one of the six, the Shaman, felt an urge to keep climbing, and scaled the rocks into the holy mist above. Unfortunately, a griffon saw this and was outraged at this act of defilement. Soon a fight broke out, during which the Shaman was dragged away by flying griffons and thrown down into the rocks which split his skull. The others then decided to flee for their lives, almost stumbling down the stairs as they ran.\n\nWith this character's death, the thread of prophecy is severed."
 changelings_paxchrysalia.999.a: "..."

 dedaprilfool.666.t: "The Forest"
 dedaprilfool.666.d: "Mount Everhoof was among the largest mountains in the world, and it was not far from Equestria. Therefore the pony reasoned it was the most reasonable place to hide the bell in. Getting there was difficult as it was far from any settlements and was surrounded by Ophiotaurus-infested pine forests. Thankfully, the six and one had invested a fortune into mountain climbing equipment as well as a few weapons. They needed any tools they could get to help them recover the lost artifact.\n\nThe group travelled on a train as far to the frozen north as they could go, and then continued on hoof. All this time, they could see Mount Everhoof in the horizon, slowly but surely growing in size as they approached it. However, signs of civilization also became more sparse, until they finally entered the thick forests at the base of the mountain. As the sun was lowered below the horizon, they had to set up camp. The pony was nervous, expecting for the camp to be attacked by vile beasts, but the goats remained oddly calm.\n\nAfter several hours of silent darkness, the pony finally fell asleep. He slept uneasily however, and was thus easily awakened by the sound of a breaking twig. Carefully, he peeked out of the tent, and saw nothing.\n\nThat's when the sharp horns of an Ophiotaurus tore the tent apart. It was a large monster, half-serpent and half-bull, and it was clearly not pleased to have intruders in its forest. The goats woke up as the pony panicked and galloped away. The six had to quickly figure out how to deal with the threat."
 dedaprilfool.666.a: "Fight back, it's six against one!"
 dedaprilfool.666.b: "Mimic the mating call of an Ophiotaurus!"
 dedaprilfool.666.c: "Drive it away with fire!"
 dedaprilfool.666.e: "Flee and hide in the woods!"

 zecora.15.t: "The Guardian"
 zecora.15.d: "After camping in the woods over the night, defending their tent from a rampaging Ophiotaurus, the group arrived at the base of the mountain. There, they were stopped by an elderly pony named Rusty Bucket, who said they should not climb the treacherous Everhoof. He was wearing patchy clothing and, fittingly, a rusty bucket on his head. The six assured him that their race was naturally attuned to climbing and could do so with ease, but then the guard said the pony should not go with them. The six insisted they needed the pony, but the guard remained adamant.\n\nThe pony was oddly determined to not let anyone climb up the mountain. It seemed he could not be reasoned with, almost like he had been tasked with guarding Everhoof from trespassers... or creatures who were looking after the bell.\n\nAs the pony had second thoughts about the journey, the goats discussed how to deal with this elder guardian."
 zecora.15.a: "Sneak past him when he is asleep."
 zecora.15.b: "Bury him under an avalanche."
 zecora.15.c: "Threaten him with a weapon."
 zecora.15.e: "Ask about the bell."
 
 tradefed.150.t: "A Bedtime Story"
 tradefed.150.d: ""Daddy, can you read the one about Gusty?" the filly asked, tucked beneath a cozy blanket.\nHer father smiled warmly. "Of course, sweetie. Remember where we left off?"\nShe nodded excitedly. "Cool stuff was about to happen!"\nThe father chuckled as he grabbed a book and opened it. "Yep! I sure hope Gusty and her friends win at the end." He cleared his throat and began to read, the eyes of her daughter gleaming. "While nopony had ever tried to reach Cloudsdale on hoof, Gusty the Great was not deterred! She and her unicorn warriors marched up the hill. But suddenly, they encountered..."\n"What?! What was it?!"\n"It was the treacherous §AA§!§OO§!§RR§!§GGG§!§RR§!..."\nThe filly gasped in shock.\n"...and Gusty could tell He was ready for battle. She called out to the unicorn warriors: 'We can fight §AA§!§OO§!§RR§!§GGG§!§RR§! together!' And the unicorn warriors shot magical beams into the clouds that wove into one! The beam, stronger than a thousand armies, shined down!"\n"Haha, that dumb evil goat is in trouble now!"\n"It wrapped around §AA§!§OO§!§RR§!§GGG§!§RR§! and pulled Him to the ground! 'Don't let Him escape!', yelled Gusty!"\nThe filly gasped. "Oh noes!"\n"§AA§!§OO§!§RR§!§GGG§!§RR§! was strong, for fear gave him power, and he broke through the bonds!"\n"T-this is too scary! And I d-don't wanna give Him power!"\n"Ssh, calm down, dear," the father said. "It's just a story. §AA§!§OO§!§RR§!§GGG§!§RR§! isn't real."\n"I sure hope so!"\nHe closed the book and kissed her on the forehead. "We'll finish tomorrow, shall we?"\n"I dunno if I wanna..."\n"Maybe some other, less spooky story then?"\nThe filly nodded.\n"Alright then, good night. Try to dream of bunnies and flowers!"\n"Good night, dad...""
 tradefed.150.a: "They never finished the tale."

 griffons.283.t: "The Mountain"
 griffons.283.d: "Rusty Bucket was no longer an obstacle, even if the pony archeologist felt sorry for him. Climbing up a large pile of snow, all of them could easily get up to the mountain and begin the ascent. As the six had said, they had little trouble climbing up the cliffs, but Abram had to carry the pony on his back. The winds were strong yet they held on, working together to get up the rocks without falling. It took them many hours, but they finally reached the summit, only to find a wide, windy chasm. On the other side was another snowy peak, with a frozen path leading up to a cavern.\n\nThe six and one debated how to get across. The wind was strong and the distance was long. In the end, it was the pony who provided the solution to the problem."
 griffons.283.a: "Climb down the chasm, then climb up the other side."
 griffons.283.b: "Find a way around the chasm."
 griffons.283.c: "Simply jump across."
 griffons.283.e: "Levitate a rope across with magic."
 
 ncr_militarists.6.t: "The Cave"
 ncr_militarists.6.d: "As they tried to get across the extremely deep chasm, wind was blowing and the pony almost fell, but was saved by Oskar. Eventually, all seven crossed it safely. On the other side, they walked up a winding path and finally reached the magically sealed cavern, where they could see the bell with their own eyes. The six turned to the pony, and revealed why he was needed: The seal could only be opened by a unicorn like him. All he had to do was make a small gap into the force field with his magic, and Rachel could use a telescopic grabber she had made to retrieve the bell.\n\nYet in the end, the pony felt hesitant."
 ncr_militarists.6.a: "I agree to do this. I have no other choice."
 ncr_militarists.6.b: "Forget about it. I've changed my mind."

 griffonRepublic_history.15.t: "Back Home"
 griffonRepublic_history.15.d: "Dear diary,\n\nI had quite the adventure, and my life was threatened multiple times. Therefore it felt good to be back in the safety Canterlot. I am not entirely safe, of course, as I angered the goats by refusing to help them retrieve the bell. I did my best to assure them I did not do so out of spite, but because I came to a terrible conclusion. The bell was so well guarded and hidden for a reason. Whatever was inside that tomb in Azir, it was likely to be very dangerous because it had been so thoroughly sealed. I tried to explain this to the six, but they refused to listen and I had to flee. I got a few bruises but with Rusty Bucket's aid I made it out safely, even as the goats tried to chase me down.\n\nI still have the crystal ball, even if it is no longer needed. I have decided to stop trying to resolve the mystery of the tomb, so now I can reveal this item to the public, who will admire it as a treasure. Yet I cannot help but feel like the sphere is watching me. Perhaps it'd be best to destroy it, so no one else can ever find the forbidden bell."
 griffonRepublic_history.15.a: "Some secrets are better left buried."

 
 kasam.9.t: "The Bell Tolls"
 kasam.9.d: "Hesitantly the pony nodded, and his horn began to glow. Yet nothing happened. He realized this would be harder than anticipated. The glow intensified and his brow furrowed under the strain. Yet nothing happened. More and more energy was poured into his horn, until almost all of his magical power was being unleashed. A miniscule gap was torn open in the magical force field, accompanied by a terrible unnatural screech. Rachel immediately inserted the telescopic grabber into it, extending it fully. It could just barely reach the handle on the bell, and she managed to get a grasp on it. She pulled it back, but the bell could not fit through the hole, so she yelled at the pony to open it more.\n\nBut the pony was already at his limit, or so he felt like. In his mind, the sound of tolling bells echoed endlessly as sparks flew out of his horn. He had to do more, he had to, he simply had to.\n\nHe screamed and pushed all of his strength into his magic. The gap opened a little, just enough for the bell to fit through. Rachel pulled it out, and the pony collapsed unconscious. The gap closed instantly."
 kasam.9.a: "..."


 colthage_other.999.t: "The Ritual" #Hidden star father content
 colthage_other.999.d: "The pony's strength was gone for days afterwards. He could barely stay conscious and was carried along as he was no longer able to stand. Only hazy memories remained of that time. He remembered descending down and screaming in agony. The Sun being raised and lowered, the same being done with the Moon afterwards. Stars swirling. A train, a ship, a caravan. Heat and cold. Dark and light. All mixed together in his mind into dull darkness and gloomy orange. The Eye looked upon him.\n\nHe was back in the ruins. They had brought him there without him even realizing. It explained the heat. It had been so long, yet he could still recognize the monoliths of dark stone, which now seemed oddly ominous and terrifying. He was carried deep within the ruins, to a familiar room.\n\n"The tomb is a lie," the familiar donkey guide said to him. "He who never died needs no tomb. No, this is an altar."\n\nIt became dark as the sun set once more. "The alignment is about to commence!" Giles shouted. "Prepare the ritual!"\n\nThe bell tolled. The pony was placed upon a slab. The occultist drew out a curved knife. Bleating began. The bell tolled. The knife entered the pony's chest. He had no strength to scream. Blood spilled everywhere as the heart was pulled out. The bell tolled. The occultist consumed the heart. The bell tolled. The stars aligned. The Eye watched.\n\nRuins began to shift and change. Dunes began to vanish. Fallen pillars stood again. Collapsed roofs repaired themselves. §RTAMBELON§! had returned to the primary dimension, after being banished for so long. The Father smiled as His summoners prostrated themselves before His presence and offered Him the Bewitching Bell."
 colthage_other.999.a: "The bell tolls for all of us."
 colthage_other.999.b: "you're just a dirty cheater, aren't you? yeah, get outta here."

 news.99.t: "The Return Of Tambelon"
 news.99.d: "[This.GetNewspaperHeader]Strange news are coming out of the Zebhara desert. Word has spread about a grand city appearing out of thin air and caravan routes being cut off. Local zebra nomads are fleeing the area, rambling about an "ancient evil" returning. They are in a state of shock and keep repeating one word, over and over:\n\n§RTAMBELON.§!"
 news.99.a: "The bell tolls for all of us." 


