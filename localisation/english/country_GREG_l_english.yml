### Focuses
 TMB_focus: "Tambelon focus tree"
 TRT_revolt_focus_1: "The Eternal Doctrine"
 TRT_revolt_focus_2: "The Path of Now and Forever"
 

 NE_strengthen_the_army: "The Return Of Tambelon"
 NE_strengthen_the_army_desc: "The Bell has been rung and the banishment has been undone. Tambelon has returned, and so has the Father. Soon, the rule of the goats shall return as well. This marks the beginning of a new era. The Ouroboros rotates once again."
 NE_rally_troops: "Flesh And Bone"
 NE_rally_troops_desc: "Goats ruled the world with the might of amalgamated monsters, made by binding the flesh of various animals into superior constructs. The cages and laboratories of Tambelon still hold many of such creatures. Yet more monsters need to be made, to rebuild the might of goatkind..."
 NE_recruit_spies: "The All-Seeing Eye"
 NE_recruit_spies_desc: "Now that Grogar is once more in possession of his crystal ball, nothing can be hidden from Him. The sphere sees all there is. His gaze pierces cloud, shadow, earth, and flesh. The secrets of the enemy will be unveiled for all goats to see."
 NE_forced_labour: "Crack The Whip"
 NE_forced_labour_desc: "The Father created a society without work, where all goats were free to pursue the arts of magic. This utopia was built on the backs of an ocean of worthless slaves. The zebras and camels who settled the desolate lands of former Tambelon seem to have forgotten their distant past as slaves of goatkind. They shall receive a grim reminder of their true purpose."
 NE_heavy_units: "Awaken The Titan"
 NE_heavy_units_desc: "Before there was time, before there was anything, there was nothing. And before there was nothing, there were monsters. Only one has survived this primordial age, tamed by Grogar to be the guardian of Tambelon. Ever since the banishment, it has slept beneath the sands, yet now it shall be awakened."
 
 NE_country_roads_take_me_home_to_the_place_where_i_belong: "All Roads Lead To Tambelon"
 NE_country_roads_take_me_home_to_the_place_where_i_belong_desc: "Long ago, all roads led to Tambelon. Over the millenia, these roads have been buried beneath sand and soil and what was once the heartland of a global dominion became isolated. With fresh slaves acquired, it is time to rebuild some of these lost roads."
 NE_hire_generals: "The Slave-Soldiers Of Darkness"
 NE_hire_generals_desc: "During His exile to the Realm of Darkness, Grogar enslaved a barbaric race known as Troggles. These savages have proven themselves to be capable warriors, yet are too weak-willed to rebel against their new masters. Grogar is in need of loyal servants to command his monsters, so the Troggles shall fulfill this duty."
 NE_airforce_expansion: "When Pigs Fly"
 NE_airforce_expansion_desc: "Goats cannot fly and have no desire to do so. In the past, they gifted this ability to some of their creations to fight against inferior races capable of flight. But those races have now developed winged monstrosities of metal to rule the skies. A new kind of creature must be designed to counter this crude mockery."
 NE_its_almost_harvesting_season: "Begin The Harvests"
 NE_its_almost_harvesting_season_desc: "Easiest way to gain units of biomass is by simply harvesting it from nature. This has always been the way: Goats take imperfect wild animals and turn them into something greater, magnificent monsters that are a sum of their parts. There will be no lack of animals to capture, as they have multiplied greatly since the banishment."
 NE_crystal_mining: "Conquering The Desert"
 NE_crystal_mining_desc: "As a trial for the bestial army, the southern half of the Zebhara desert shall be conquered. It will provide valuable experience for goat beastmasters, who haven't fought a proper war for millenia. A valuable crystal mine in the Anega Ridge will also be secured and put into good use."
 NE_magic_generators: "For Whom The Bell Tolls"
 NE_magic_generators_desc: "The Bewitching Bell is an immensely powerful, indestructible artifact forged in the fires of Tartarus countless millenia ago. However, it gains its power from others. The Bell acts like a magical capacitor, being able to store immense amounts of energy that must be drained from external sources... such as the lesser races of the world."
 NE_magical_experiment: "Might And Magic"
 NE_magical_experiment_desc: "Now that a new generation of biomancers is being trained, goats shall regain their position as the mightiest mages the world has ever known. Great biomantic spells can be cast upon the enemy, to break their resolve and their bodies. The lesser races will be punished for their hubris and taught a lesson of humility which will not be forgotten."
 NE_reign_of_terror: "Reign Of Horror"
 NE_reign_of_terror_desc: "What made goats so weak and pathetic after Grogar's banishment was the fact that no one feared them any longer. Fear empowers goats and unlocks their true potential. Goatkind can only regain their lost might by waging a war of terror upon the disgusting subgoat races."
 NE_crackdown_on_populace: "Unleash The Monsters"
 NE_crackdown_on_populace_desc: "In the distant past, goats released countless monsters to prey upon the lesser races. If they wanted to be saved, they had to become slaves to goatkind. Now the Father and his monsters have returned with a vengeance. Those who once looked down upon us will beg to become slaves again."
 NE_crystal_armour: "The Power Of Crystals"
 NE_crystal_armour_desc: "Magical crystals are raw, concentrated magical energy, often found in nexuses of natural ley lines. Goats were the first race to discover their true potential, and also learned how to artifically create them by condensing the magical essence of sapient creatures."
 
 NE_southern_offensive: "The Four Slave-Races"
 NE_southern_offensive_desc: "The hyenas, yeti, gargoyles and centaurs once fulfilled important roles in the goatocracy. The hyenas were fine miners, excavating various minerals which other slaves refined. The yeti were fearsome cold-resistant slave-warriors, loyal to their strong masters. Gargoyles were the greatest masons, carving numerous statues depicting Grogar, while the centaurs were used as living magic capacitors."
 NE_western_offensive: "Gift Of The Neighle"
 NE_western_offensive_desc: "The fertile Neighle river once watered the vast farms that fed not only slaves, but goats as well. Since the banishment, despicable ponies have settled in the region and erected crude and pathetic sandstone pyramids. All scions of ponykind are Grogar's sworn enemies. They will be punished for their arrogance most severely."
 NE_northern_offensive: "Across The Wastes"
 NE_northern_offensive_desc: "Barbaric zebras have settled in the north, which has for the most part become a desolate and arid wasteland. Yet forward positions for further northern expansion must be established. The nomadic savages will be tamed and turned into obedient, humble and civilized slaves once again."
 NE_eastern_offensive: "Sinking Ships Of The Desert"
 NE_eastern_offensive_desc: "Camels are well adapted to deserts, and as such were situationally useful haulers during goatocratic rule. Since the banishment, they tried building a kingdom of their own, which was unsurprisingly taken over by another race. Clearly camels are unable to rule themselves and are in dire need of goat oversight."
 NE_attack_lakes: "Pacify The Great Lakes"
 NE_attack_lakes_desc: "The vast freshwater reservoirs created by goatkind have fallen into disrepair, yet remain the largest lakes on the continent. Zebras have settled on their lush shores, fighting with each other and enslaving their own kind like true barbarians. The entire region is in dire need of pacification and full scale enslavement."
 NE_attack_rivers: "Bray's Homeland"
 NE_attack_rivers_desc: "Bray, Grogar's most useful servant, originally came from the land of Asstyria. Now it is finally time for him to return home, as a conqueror. Not only shall the donkeys bend the knee like Bray did, but so shall the two-legged felines of Abyssinia. They will all be made equal through slavery to new supreme masters."
 NE_attack_coast: "The Northern Shores"
 NE_attack_coast_desc: "The vast expanse of the ocean can already be seen on the horizon as reclamation of the north commences. The land is heavily infested with zebras, though there are newcomers as well: Equestrian Ponies. Even thinking of this loathsome, disgusting subgoat race makes Grogar seethe in pure wrath. They deserve... special treatment for their past aggressions."
 NE_attack_miners: "Strangers In A Strange Land"
 NE_attack_miners_desc: "The last thing the Father expected to find in the Zebrican south-east was griffons. How did these creatures from another continent end up here? Ultimately, it wasn't important. It simply meant these griffons would return to slavery faster than their relatives across the sea. The familiar faces, zebras and giraffes, will swiftly return to servitude as well."
 NE_attack_southwest: "Tame The Horses"
 NE_attack_southwest_desc: "During the age of goatocracy, horses were widely used as beasts of burden and for non-magical transportation. They are strong creatures and capable of magic as well, similarly to their lesser pony cousins. Somehow, these ponies have appeared in the frigid southwestern lands as well. Both equine races must be subjugated, although one must suffer more than the other."
 NE_attack_northwest: "Saddle Arabian Nightmares"
 NE_attack_northwest_desc: "It seems the horses of the west have established close ties with their pony kindred and have tamed the nature of their homeland with technology and magic. Yet despite all their misguided "advancement", they are still prone to petty infighting. A strong hoof needs to govern them no less than the other races, who are not as corrupted by this so-called "modernity"."
 NE_attack_northeast: "Crossing The Andelayas"
 NE_attack_northeast_desc: "The Andelayan mountains are a formidable natural obstacle, but can ultimately be overcome. Beyond them are the lands of the Zebrican deer, though somehow they have intermingled with their distant cousins from Equus. This unholy union will do little to save them from our wrath."
 NE_attack_southeast: "Reclaim The Weather Manifold"
 NE_attack_southeast_desc: "A great magical structure built by goatkind lies in ruins, malfunctioning and causing untold chaos in the southeast. Its magical powers have devastated the local ecosphere, and the lesser races are too foolish to repair it, instead calling it the "Golden Temple" like the superstitious barbarians they are. It will be our duty to heal the south-east."
 NE_attack_north: "Secure The Seas"
 NE_attack_north_desc: "The hippogriffs, harpies and deer of the northern islands will be harder to subjugate, but we have no lack of oceanic monsters that can be used. While the overseas invasion will be extraordinarily difficult, our conquests so far prove our superiority and ability to crush any resistance we face."
 NE_attack_east: "Extinguish The Flames"
 NE_attack_east_desc: "The kirin are an equine race capable of transforming into fearsome nirik by using emotions of anger and hatred. This made them unreliable slaves, but excellent sources of energy and heating. Goats thus consider kirins to be very valuable to own. By reaching the easternmost shores of the continent, we will finish the enslavement of their pathetic race."


 TRT_relocate_capital: "Relocate The Council"
 TRT_relocate_capital_desc: "Tambelon is not safe. Proceed with the relocation plan. The council must depart immediately to ensure its members do not get captured by the enemy. Once relocation is complete, commence execution of the original plan.\n"Live, so you may cleanse.""
 TRT_exterminate: "Reward The Troggles For Their Service"
 TRT_exterminate_desc: "The troggles have outlived their usefulness and their loyalty can never be guaranteed. They are hence reclassified into filth. Filth must be cleansed. Treat them like any other sub-goat race.\n"Do not cling on to useless things out of pure sentimentality. That is weakness.""
 TRT_mass_crystal_production: "Expand Crystal Production"
 TRT_mass_crystal_production_desc: "Crystal production has remained conservative due to reluctance to waste slaves. This is no longer of any concern. Scope of production must be greatly expanded to meet our needs. Conversion subjects can be told before procedure that this way they will cease to be useless.\n"Death is only the beginning.""
 TRT_begin_marching: "Begin The Death March"
 TRT_begin_marching_desc: "Our former master-race was purged long ago. Path of Now and Forever was flawed due to not applying this method to all other potential master-races. The grim task must now be fulfilled out of necessity. Use any means available to ensure no one survives.\n"Only a world with a single sapient race will know peace and freedom.""
 TRT_increased_fear: "Fear Of Extinction"
 TRT_increased_fear_desc: "Sapient creatures are naturally afraid of dying. Fear factor levels can be increased to levels never before reached. Power of goatkind will be unmatched.\n"Fear is the key, fear is what liberates us, fear is what keeps us free. They must always fear us.""
 TRT_recycling: "Develop Great Maws"
 TRT_recycling_desc: "A new kind of monster has been created: a large mouth with a digestive system attached to it. It will convert filth into pure, raw biomass. This will allow us to greatly accelerate biomass production.\n"Let no one call us wasteful!""
 TRT_new_economy: "A New Economic System"
 TRT_new_economy_desc: "Without slaves only goats remain to do all the required work. The age of decadence is over. Goats will no longer be free to do what they please. A third of their time must be spent fulfilling socio-economical obligations.\n"A single individual is nothing more than a single cell in a giant organism. Yet the organism cannot exist without cells.""
 TRT_goat_production: "Mobilize The Workgoats"
 TRT_goat_production_desc: "Slaves can no longer be used for production of crystal-infused armour for monsters. Goats must take over this responsibility as well. Both productivity and product quality are expected to increase, as slaves were prone to sabotage and inaction.\n"A single motivated and zealous goat can do as much work as a thousand slaves.""
 TRT_new_occupation_law: "Let Them Feed"
 TRT_new_occupation_law_desc: "Monsters had been trained to spare those creatures that accepted slavery. This is no longer an option. Monsters must be allowed to prey upon target populations freely. Any "resistance movements" will spend all their time fighting for survival.\n"Monsters have preyed upon sapient creatures since primordial times. Why should the future be any different?""
 TRT_recycling_2: "Put The Troggles To Good Use"
 TRT_recycling_2_desc: "Usable biomass should not be left to rot. The troggles may continue to serve goatkind in another more efficient form. Process them into raw biomass at once. Then distribute it to the biomancers.\n"They will continue to serve us after death.""
 TRT_goat_generals: "New Leaders For The Monstrous Army"
 TRT_goat_generals_desc: "Without troggles new military leadership is needed. Goats need to be promoted according to their talent and ability to learn. Heads of the council will become the highest-ranking army commanders.\n"Experience is the best teacher.""
 TRT_goatscription: "Introduce Goatscription"
 TRT_goatscription_desc: "Fighting can no longer be left to slave-soldiers or volunteers. It is the duty of goats to serve. More monster-handlers and biomancers are needed. Refusal to serve will be punished. Conscripts can be relieved once world purification is complete.\n"There is nothing more noble than sacrificing yourself for the greater good.""
 TRT_repopulation: "Repopulate The World"
 TRT_repopulation_desc: "Global goat population is currently estimated to be around 500 000. Restoring population to pre-banishment levels will take centuries at the current rate. Population growth needs to be accelerated by encouraging and supporting establishent and expansion of families.\n"A purified world is a garden full of fertile soil. All we must do is spread our seed, then we may grow and flourish.""
 TRT_superior_armor: "Enchanted Monster Armour"
 TRT_superior_armor_desc: "Enemies develop increasingly effective countermeasures. We must adapt or die. Increased magical power allows for superior enchantments. Combination with additional crystal lattices will result in superior armour. It will be almost inpenetrable.\n"Let them fight us with all the panoply of war. They can only prolong the inevitable.""
 TRT_goatvisors: "Meritocratic Goatocracy"
 TRT_goatvisors_desc: "Goats who exemplify military genius must be promoted into commanding positions. Promotion is to be based entirely on meritocratic standards. Good performance need to be rewarded. Yet loyalty to the cause must always be taken into account.\n"Survival of the fittest is a simple, universal biological principle. It cannot be avoided or subverted.""
 TRT_superior_magic: "Overpowered Magic"
 TRT_superior_magic_desc: "With sufficient levels of fear factor all goats will unlock their full potential. Godhood is within reach of all of us. Reality will bend to our will. Or it will break.\n"Now I am become Death, the shatterer of worlds.""
 TRT_leviathan: "Leviathans"
 TRT_leviathan_desc: "Sea serpent design is becoming increasingly obsolete. Proceed with developing an improved underwater monster design. It must be capable of facing the largest ships that sub-goat races are capable of making. Biomass cost is of no concern.\n"Behold, the hope of him is in vain; shall not one be cast down even at the sight of him?""
 TRT_remake_titans: "Reverse-Engineer Titan Biology"
 TRT_remake_titans_desc: "Titans are primordial creatures with alien biology. The single specimen available can be deconstructed and thoroughly copied. Creation of artificial titans would provide us an upper hoof in the great battle against filth.\n"Will we next create false gods to rule over us? How proud we have become, and how blind.""
 

 TRT_relocate_capital_2: "A Safe Refuge"
 TRT_relocate_capital_2_desc: "It started without any warning. Some goats demanded others to convert to their "Eternal Doctrine" and kill all slaves on sight. Those who refused to obey were then violently attacked. This organized takeover attempt combined with the sudden disappearance of Grogar has led to the formation of a provisional council. However, Tambelon is no longer safe for it."
 TRT_save_troggles: "Save The Troggles"
 TRT_save_troggles_desc: "The troggles have served us faithfully so far. Yet they do not understand the context of this civil war, and many of them have remained loyal to the Eternal Doctrine, assuming themselves to be safe. They are very wrong. We must send goats to infiltrate our enemy and contact as many troggles as possible. Hopefully, they can be convinced to flee."
 TRT_reconsider_technology: "Reconsider Stance On Technology"
 TRT_reconsider_technology_desc: "Before, Grogar was strongly opposed to use of inventions made by the lesser races. However, would it not be ironic to use the technology of the subgoats against them? Besides, without the use of more advanced weapons, we might stand no chance against our enemies."
 TRT_more_slave_soldiers: "More Slave-Soldiers"
 TRT_more_slave_soldiers_desc: "Troggles have been used as slave-soldiers for a long time now, and have proven themselves to be loyal. Is there any reason to not use any other race as soldiers? There are warlike creatures on Zebrica who could be useful on the frontline. Why not throw them at our foes out of desperation, if nothing else?"
 TRT_reignite_forges: "Re-Ignite The Forges"
 TRT_reignite_forges_desc: "The vast industrial organizations of the subjugated nations have practically been disbanded and their extensive facilities have remained abandoned. This should change now. The slaves will be sent back to their factories and will be allowed to work for us with machines rather than just with their various appendages."
 TRT_slave_scientists: "Appropriate Science Of The Lesser Races"
 TRT_slave_scientists_desc: "Currently, almost all slaves conduct menial labour or chores for goatkind, even those who are very intelligent and could be useful to us in another way. Not only should we have dedicated slave-scientists, but we should translate the countless texts written by the subgoats and study them, so we may expand our knowledge of the world."
 TRT_new_occupation_law_2: "Diversify Slave Exploitation"
 TRT_new_occupation_law_2_desc: "Rather than letting monsters run rampant and enslaving those who want to be spared, we should utilize a more efficient occupation policy. Every able-bodied creature must be put to work, and the work they can do will depend on their personal abilities. This will guarantee more efficient usage of slaves."
 TRT_improve_living_conditions: "Improve Slave Living Conditions"
 TRT_improve_living_conditions_desc: "Slave mortality is high and their lives are full of misery and suffering. This makes a large scale slave revolt unavoidable. Their mistreatment must be reduced, as it didn't make them afraid of us anyways. Rather, it made them hate us. Giving them proper housing, food, healthcare and a modicum of free time should please most of them."
 TRT_soc_dev: "Embrace Modernity"
 TRT_soc_dev_desc: "If we want to fully utilize technology on a large scale, we need to adopt more advanced and complex societal organizations. Thankfully, some of the countries we conquered already utilized them, so we simply need to follow their example."
 TRT_read_nigga_read: "Ensure All Goats Can Read"
 TRT_read_nigga_read_desc: "Despite many goats being gifted in the arts of biomancy, there are even more who do not even have basic literacy. We should take steps to educate every goat and provide them with basic education, so all of them can unlock their fullest potential."
 TRT_civ_concerns: "Organize Civilian Economy"
 TRT_civ_concerns_desc: "The lesser races created various organizations to manage use of workers and ensure more efficient production. We should adopt their methods in the civilian sector to ensure the stable growth of our production capacity. Unfortunately, this means having to rely on advice and assistance from slaves, but this is only temporary."
 TRT_mil_concerns: "Organize Military Economy"
 TRT_mil_concerns_desc: "The lesser races created various organizations to manage use of workers and ensure more efficient production. We should adopt their methods in the military sector to ensure the stable growth of our production capacity. Unfortunately, this means having to rely on advice and assistance from slaves, but this is only temporary."
 TRT_aircraft: "Utilize Aerial Technology"
 TRT_aircraft_desc: "Flying monsters barely stand a chance against modern aircraft, made of metal and powered by combustion engines. We need to not only study designs used by the nations we have defeated, but also find former pilots among our teeming throngs of slaves and put them into service."
 TRT_ships: "Utilize Naval Technology"
 TRT_ships_desc: "In the time it takes for us to produce a single sea serpent, the lesser races can produce a dozen warships made of steel and armed with heavy cannons. It is time we enhance our naval forces with an actual navy, utilizing the dockyards of the conquered countries and staffed by slave-sailors."
 TRT_army_shit: "A Modern Army"
 TRT_army_shit_desc: "Alongside the monstrous army, we will now have a modern army, equipped with the latest technology developed by the lesser races, consisting entirely of slaves, volunteers and auxiliaries. Supported by the airforce and the navy, we can now bravely face those who oppose the rule of Grogar."
 TRT_accelerate: "Accelerated R&D"
 TRT_accelerate_desc: "It is not enough to simply copy the accomplishments of the lesser races. We must seek to innovate by ourselves. The intellect of goats is superior to all others, after all. In no time, we will eclipse every other race on the planet, and become the rightful masters of science."
 TRT_nukes: "Secrets Of Fission"
 TRT_nukes_desc: "While our spells are powerful, the lesser races have developed extremely powerful weapons of their own that rival our magic in their destructive ability. Why can we not use them too? Not only that, but the fuel for these weapons is also useful as a source of energy, which we sorely need."
 TRT_the_final_focus: "The End Of The Path"
 TRT_the_final_focus_desc: "The Path of Now and Forever has a clear and explicit reason to exist: it is a solution to a serious problem. But if this problem was solved permanently, then what need to follow the Path would there be?"



### Events
 some_secrets_are.173.t: "Tales From The Dunes"
 some_secrets_are.173.d: "Dear diary,\n\nAfter a long an arduous journey, today the caravan finally arrived at our destination: The oasis town of Azir. However, calling it a town is rather generous. It is a mere collection of tents surrounding a small marketplace. Yet it is the largest settlement in the region, due to how desolate it is. Our water supplies were low so I eagerly joined the caravan's thirsty camels in enjoying fresh water. The local savages were welcoming, as they were used to camel caravans passing by regularly. The zebras however were especially curious about me, as apparently they had never seen an Equestrian pony before, and marveled at the bright colors of my coat - at least, that's how my guide translated their speech.\n\nAfter a brief rest, I headed to my own destination while the caravan traded with the locals: The mysterious ruins not far from the settlement. Thankfully, my donkey guide knew the way, so I followed him across the sandy dunes. While standing atop one, I could finally see the ruins with my very own eyes, and the sight made my jaw drop. Towering monoliths of dark stone, buried within the sand, weathered by countless centuries. I could already see that the ruins were scattered everywhere. It was a veritable treasure trove for an archaeologist such as myself!\n\nI descended down the dune with my guide and got to explore the ruins closer. I was almost overwhelmed with excitement! The rumours were true, and I had made a discovery which would surely make me famous back home. Nevertheless, I maintained my professionalism and conducted a thorough survey of the site, taking many, many notes. While exploring however, I stumbled upon a most remarkable object, hidden under a pile of rubble: a perfectly round crystal sphere. I showed it to my guide who was even more amazed by the object than I was. When I asked about the ball, he said it was a treasure that had been lost for centuries. Working together, we managed to retrieve it from the rubble fully intact. It was a truly marvelous item; looking into it felt like staring into an abyss."
 some_secrets_are.173.a: "..."

 some_secrets_are.137.t: "The Mystery"
 some_secrets_are.137.d: "Dear diary,\n\nReturning to civilization was a relief, though somehow the heat was even worse in the city of Colthage than it had been in Azir, probably because it was so unbearably humid outside. I did not however indulge in the luxuries of civilized society as I instead headed straight to the local university. I had to confirm if my guide was correct about what he had said about the crystal ball. Was it truly a magical artifact? Could it truly be used to open the sealed tomb? I wasn't sure if anyone here could even respond to these questions, but I had to find answers somehow. I simply had to.\n\nI attented a meeting with the local archaeologists and presented my photographs and notes about the desert ruins. The gentlezebras were impressed, saying that this warranted further study. But they were not truly amazed until I presented the crystal ball. I told them what my guide had told me, but they barely listened as they were too busy admiring the artifact instead. One of them did hear me, and said they'd love to keep the ball for further study, but I refused, saying that the ball was coming with me to Equestria.\n\nUnfortunately, the zebras knew even less about the ruins and the crystal ball than I did. This was disappointing, but after I left the university, I met with my guide again. He told me that if I really wanted to learn more about the ball, I would have to talk to certain knowledgeable goats. He gave me a list of six strange names, saying they were the only ones who could answer my questions. I will have to find a way to contact them and meet them in person. I am determined to do so. The mystery of the crystal ball must be solved."
 some_secrets_are.137.a: "..."

 some_secrets_are.129.t: "Back Home"
 some_secrets_are.129.d: "Dear diary,\n\nIt was good to finally be back in Canterlot, yet I did not get to rest as I had a presentation to hold. Many respectable ponies had gathered to hear me tell about my discovery in the Zebhara desert, and even Princess Twilight Sparkle was there! Yet I did not let anxiety overcome me. I calmly explained my findings, showing pictures I had taken and theorizing about the history of the ruins. The audience was pleased and stomped with their hooves in approval, and I was greatly honoured.\n\nHowever, I did not tell anyone about the crystal ball, or about the things my donkey guide had told me. I felt like I needed more information on this... subject matter before I could talk about it in public. For now, all I had were fragmentary notes, and my inability to form a coherent image frustrated me. Therefore I have decided to head out as soon as possible, to meet with one of the goats who apparently can tell me more about the crystal ball. I cannot rest while this mystery remains unresolved. I must find out the truth. I simply must.\n\nAfter some deliberation, I first decided to visit..."
 some_secrets_are.129.a: "...Oskar in [KAT.GetName]."
 some_secrets_are.129.b: "...Abram in [JAK.GetName]."
 some_secrets_are.129.c: "...Rachel in [CZR.GetName]."
 
 #no more events for you event
 some_secrets_are.47.t: "Put Off The Trail"
 some_secrets_are.47.d: "Dear diary,\n\nUnfortunately, I have been unable to reach one of my six contacts. The country they were residing in was forcefully annexed by another nation and the person I was looking for seemingly disappeared without a trace. Without all six, I highly doubt I will ever be able to fully resolve the mystery. I will not give up however, I have gone too far to simply give up. My investigations will continue unabated. I am sure I will succeed. I simply must."
 some_secrets_are.47.a: "..."

 some_secrets_are.152.t: "The Occultist"
 some_secrets_are.152.d: "Dear diary,\n\nToday I finally arrived in the dark lands of Katerin, where Oskar lived. I do not know why he chose to live in this wretched place. Somehow, the Scheißwald forest is even worse than the Everfree, yet griffons willingly live here, facing regular attacks from magical monsters. I admire their courage, yet pity their stupidity.\n\nI arrived in the country travelling upstream the Griffking river, yet to reach the capital I had to ride on a wagon for hours, as apparently the city had been moved away from the river some years ago. It was an order from the Mad Princess, the locals said, and I could still see rubble of abandoned buildings on the shores of the mighty Griffking. Strangely, it reminded me of the ruins in Azir. Once in [KAT.Capital.GetName], I asked various griffons about the whereabouts of Oskar. No one seemed to recognize the name and hadn't even seen any goats, except for one priest. She told me where Oskar lived, saying that he was an occultist, providing theological advice to the local priesthood, with extensive knowledge of the arcane. I hardly believed the priest's words, and I doubted if the goat could give me any scientifically reliable advice. But his name was on the list, so I had no choice but to trust him.\n\nOskar was not interested in meeting me until I mentioned the sphere. He opened the door of his home and explained he had been busy eating a religious tome to absorb its knowledge. I rolled my eyes and told him where I had found the sphere and what my guide had said, and he confirmed it all as true. The crystal ball could be used, but it would require six goats. Then, it would grant a vision of the key to the tomb. If this is true, then the ball itself cannot open the tomb, but it is needed for it nevertheless, so the hidden key can be found. He said he'd eventually travel to Equestria to see the ball with his own eyes."
 some_secrets_are.152.a: "..."

 some_secrets_are.42.t: "The Editor"
 some_secrets_are.42.d: "Dear diary,\n\nThe journey to Jaki-Clan was arduous. Not only was the country largely isolated from the outside world, but the roads were in terrible condition, and the climate was freezing because the path went through a mountain valley. I even had to hire a personal bodyguard as I had heard rumours that the yaks had lynched Equestrians before.\n\nWhile the locals were inhospitable, once I arrived in [JAK.Capital.GetName], I still went around and asked them about Abram. Most of them refused to even talk to me, but one young yak, who claimed to hate the Jaki-clan rulership and their isolationism, happily talked to me and told me where to find him. This Abram worked as a news editor for the government.\n\nThe goat was happy to meet me, even though he was... busy at work. He was eating newspaper articles which had been written by Yakyakistani supporters. Officially he was an editor, but in truth he was a living paper shredder. Once he finished his meal we talked much about my discoveries. He told me that I had not truly discovered the ruins, as the goats had always known they were there. Other races were unaware of its existence because any records about it had been thoroughly erased. He refused to tell me why. He did tell me that the ruin was extremely ancient, and had been preserved only thanks to the dry heat of the desert. He claimed the ruins were over five thousand years old, and while I was doubtful, it would not surprise me if this was the truth. He said he wanted to see the ball himself, to see if I was being honest. Working as an editor had made him sceptical, apparently."
 some_secrets_are.42.a: "..."

 some_secrets_are.3.t: "The Genius"
 some_secrets_are.3.d: "Dear diary,\n\nNow I was back in the Zebhara desert, but I was not going to Azir. Not yet. Instead, I was a passenger on a merchant canoe sailing up the Neighle river. My destination was in [CZR.GetNameDef] and its capital, [CZR.Capital.GetName]. It was a very dangerous journey as the area had faced much conflict recently, but the merchants had hired competent guards, so I was not too afraid.\n\nWhen the canoe arrived and the merchants engaged in trade with the locals, I went out to look for Rachel. Most of the populace were zebras who had never seen a pony before, but I assumed some of them must've seen a goat. Indeed, when I drew an image of a goat in the sand, one of the zebras pointed me where to go.\n\nThe home of Rachel was more of a makeshift workshop or laboratory. She was an inventor, apparently, with an ingenius mind. It was exceptional, because most goats I had met were honestly dull-witted. When she saw me, she immediately started asking questions about who I was and why I was there. I ended up explaining many details about my life before I even got to talk about the ruins and the crystal ball. At no point did she show any signs of boredom.\n\nShe said that obviously, someone wanted me to find the ball. It was a valuable artifact, and would've been stolen centuries ago if it had always been buried in the rubble, as ruins in the Zebhara were often scavenged by thieves. This was quite shocking to me as I had not even thought of it, but Rachel was probably right. When I asked why someone would've wanted me to find it, she said they wanted me to find a way to open the tomb because something valuable was in there. She did not say who "they" were or why they wanted the tomb to be opened, but said she was eager to find out what was inside it and would do everything she could to help with the task."
 some_secrets_are.3.a: "..."

 some_secrets_are.12.t: "The Next Destination"
 some_secrets_are.12.d: "Dear diary,\n\nAfter meeting with one of the goats, I learned much about the mystery of the sphere. But I still have so much more to discover, so I need to decide where to go next. Each journey costs me a fortune, but I've secured a substantial loan which should cover the costs. Resolving this grand conundrum is more important than my petty personal finances."

 some_secrets_are.153.a: "Randy, in [MIT.GetName]."
 some_secrets_are.153.b: "Giles, in [BUF.GetName]."
 some_secrets_are.153.c: "Gore, in [LMB.GetName]."

 some_secrets_are.1852.t: "The Organizer"
 some_secrets_are.1852.d: "Dear diary,\n\nTravelling on a ship, I arrived in the bustling port of Aster's Landing, looking for Randy. I've heard that this wouldn't be so hard, as he works for a relatively famous minotaur known as Iron Will. Indeed, by asking about Iron Will from the locals I quickly got his home address. When I visited him, he thought I was a customer interested in his assertiveness seminar and said that he had quit the business a few years ago. I clarified the situation and asked to meet with Randy. He seemed confused, but soon enough made the arrangements for our meeting. Randy still worked as Iron Will's assistant now that they had returned home from Equestria. Nevertheless, I asked Iron Will to leave us so I could discuss with him in private.\n\nI told everything to Randy. He seemed amused that a pony had found one of the most precious artifacts of his race. He told me that a pony had actually been responsible for the downfall of his kind, though he did not hold a grudge over ancient events. He half-jokingly said that now they needed a pony, and I was the one who could redeem ponykind for their actions. While he said so humorously, I felt that the meaning was more serious.\n\nHe agreed to help me, saying that he had saved up enough money to travel to Equestria if needed. I thanked him, and hoped Iron Will wouldn't mind me borrowing his assistant."
 some_secrets_are.1852.a: "..."

 some_secrets_are.997.t: "The Shaman"
 some_secrets_are.997.d: "Dear diary,\n\nIt was good to travel through Equestria for once, instead of having to go across the sea or deal with border controls of multiple countries. My destination was in the Mild West, where the buffalo lived, still isolated in their tribe despite Equestria's efforts to integrate them. While there had been conflicts between ponies and buffalo before, I trusted in their hospitality to a curious visitor.\n\nIndeed, despite being sceptical, the buffalo allowed me to enter their settlement. I inquired about the whereabouts of Giles, and the buffalo recognized the name immediately. He was an esoteric shaman, and the only goat the buffalo even knew about. He lived alone in the desert, so I had to continue my journey into the wilderness. Thankfully, a young buffalo guided me, as she knew the trail.\n\nThe shaman lived alone in a tent next to a small spring, which sputtered fresh water out of dry rock. Giles came out of the tent as soon as he heard us and almost attacked us, shaking a long stick threateningly. Thankfully, the buffalo calmed him down and told that I wanted to meet him. We sat down and I explained most of my story, except for the parts about the crystal ball. The shaman wasn't particularly interested. Thankfully, the buffalo was bored and went out to explore the surroundings. Now that I was alone with the shaman, I told him about the crystal ball, and he immediately became much more curious.\n\nHe began rambling of the bygone days, back when his race had ruled the world. He said that the ruins I found were §RTAMBELON§!, the ancient capital of goatkind. He also told of an old prophecy: When the stars would one day align, the city would be restored to its former glory.\n\nThis was all nonsense, obviously, but he was filled with a desire to see the ball himself, so we arranged a meeting for the future."
 some_secrets_are.997.a: "..."

 some_secrets_are.5.t: "The Priest"
 some_secrets_are.5.d: "Dear diary,\n\nThe journey to Llambet was difficult, as the land is surrounded by gargantuan mountains on almost all sides, and its folk aren't too fond of outsiders. Finally arriving in [LMB.Capital.GetName] today was a relief, yet I did not rest and immediately went out searching for Gore. The llamas and alpacas are arrogant creatures however and most of them wanted nothing to do with me. A few of them even spat at me in disdain! Yet I maintained my resolve, and soon enough saw a creature in a temple that didn't belong to either of the dominant races in Llambet. He was busy "preaching", loudly bleating at the audience, so I waited patiently. Then, I approached and asked if he was Gore. He nodded, his emotionless face keeping his thoughts hidden.\n\nI continued to speak, explaining why I had come here. Yet still, there was no sign of emotion on his face. Only when I mentioned the crystal ball did he finally grin. He said that with the orb, the Bell could be found. Apparently, it was the key to the tomb that I had heard about earlier. It had been hidden away thousands of years ago, yet goats still knew how to find it. They simply had no reason to retrieve it until now. He spoke we should recover the object quickly, because the tomb could only be opened on a certain date. I had to convert it to the Equestrian calendar: 9th of September, 1009 ALB.\n\nI did not understand everything, and clearly Gore was hiding something. But I needed him and he needed me, so we agreed to cooperate. Only this way could the mystery be uncovered."
 some_secrets_are.5.a: "..."

 some_secrets_are.23.t: "A Vision"
 some_secrets_are.23.d: "All six goats gathered in the pony's room. They introduced themselves to each other, happy to meet other members of the widespread goat diaspora, while the archaeologist brought out the well-hidden sphere. It was covered by a blanket as he placed it on a table. The six approached closer, going completely silent as they eagerly anticipated seeing the treasure.\n\nIn a dramatic move, the pony unveiled it. The six gasped in amazement. It was true, the item had been found. And now, it was time to use it. The six stood around it in a circle, each of them closing their eyes and placing a hoof on its smooth surface. They began bleating loudly. The pony became anxious, worried that the neighbours might hear the noise and investigate, so he tried to tell the six to quiet down. They did not hear him. As they bleated, the orb became alive. Shadows grew within it, and a yellow eye formed at its heart. The eye's horizontal and rectangular pupil expanded and granted a vision: An ancient bell, magically sealed within a cavern atop a very tall snowy mountain. Then, the vision vanished, and the bleating ended.\n\nThe six began to argue what the vision had shown. There were many tall mountain peaks in the world, so the bell could be located at any of them. They were unable to decide, so ultimately the pony used his intelligence and his knowledge of the world to provide a suggestion of where to go searching for the bell."
 some_secrets_are.23.a: "Solarspike, in Griffonstone."
 some_secrets_are.23.b: "Mount Everhoof, in Crystal Empire."
 some_secrets_are.23.c: "T'agi Hogher, in Gargiloya."

 some_secrets_are.998.t: "The Sacred Mountain"
 some_secrets_are.998.d: "The six arrived with the pony at Solarspike, the most holy place in griffon faith. The pony had deduced that the bell must be located here, as reaching the top of the mountain is forbidden for mortals. Therefore, no one knows what is hidden in the mist-covered peak of Solarspike. It is the perfect place to store a valuable artifact.\n\nThe six and one began to climb, trying to not attract attention from griffon pilgrims who were visiting the site. This proved to be difficult as usually only griffons came here. As they climbed the stairway carved into the rock, more and more griffons became curious about this weird group of foreigners. This meant that when they reached the top of the stairway, the end of the journey for mortals, they had to wait for griffons to leave them alone. Some began asking questions out of curiosity, but received no proper answers and became increasingly suspicious. While the griffons were distracted by talking, one of the six, the Shaman, felt an urge to keep climbing, and scaled the rocks into the holy mist above. Unfortunately, a griffon saw this and was outraged at this act of defilement. Soon a fight broke out, during which the Shaman was dragged away by flying griffons and thrown down into the rocks which split his skull. The others then decided to flee for their lives, almost stumbling down the stairs as they ran.\n\nWith this character's death, the thread of prophecy is severed."
 some_secrets_are.998.a: "..."

 some_secrets_are.666.t: "The Forest"
 some_secrets_are.666.d: "Mount Everhoof was among the largest mountains in the world, and it was not far from Equestria. Therefore the pony reasoned it was the most reasonable place to hide the bell in. Getting there was difficult as it was far from any settlements and was surrounded by Ophiotaurus-infested pine forests. Thankfully, the six and one had invested a fortune into mountain climbing equipment as well as a few weapons. They needed any tools they could get to help them recover the lost artifact.\n\nThe group travelled on a train as far to the frozen north as they could go, and then continued on hoof. All this time, they could see Mount Everhoof in the horizon, slowly but surely growing in size as they approached it. However, signs of civilization also became more sparse, until they finally entered the thick forests at the base of the mountain. As the sun was lowered below the horizon, they had to set up camp. The pony was nervous, expecting for the camp to be attacked by vile beasts, but the goats remained oddly calm.\n\nAfter several hours of silent darkness, the pony finally fell asleep. He slept uneasily however, and was thus easily awakened by the sound of a breaking twig. Carefully, he peeked out of the tent, and saw nothing.\n\nThat's when the sharp horns of an Ophiotaurus tore the tent apart. It was a large monster, half-serpent and half-bull, and it was clearly not pleased to have intruders in its forest. The goats woke up as the pony panicked and galloped away. The six had to quickly figure out how to deal with the threat."
 some_secrets_are.666.a: "Fight back, it's six against one!"
 some_secrets_are.666.b: "Mimic the mating call of an Ophiotaurus!"
 some_secrets_are.666.c: "Drive it away with fire!"
 some_secrets_are.666.e: "Flee and hide in the woods!"

 some_secrets_are.15.t: "The Guardian"
 some_secrets_are.15.d: "After camping in the woods over the night, defending their tent from a rampaging Ophiotaurus, the group arrived at the base of the mountain. There, they were stopped by an elderly pony named Rusty Bucket, who said they should not climb the treacherous Everhoof. He was wearing patchy clothing and, fittingly, a rusty bucket on his head. The six assured him that their race was naturally attuned to climbing and could do so with ease, but then the guard said the pony should not go with them. The six insisted they needed the pony, but the guard remained adamant.\n\nThe pony was oddly determined to not let anyone climb up the mountain. It seemed he could not be reasoned with, almost like he had been tasked with guarding Everhoof from trespassers... or creatures who were looking after the bell.\n\nAs the pony had second thoughts about the journey, the goats discussed how to deal with this elder guardian."
 some_secrets_are.15.a: "Sneak past him when he is asleep."
 some_secrets_are.15.b: "Bury him under an avalanche."
 some_secrets_are.15.c: "Threaten him with a weapon."
 some_secrets_are.15.e: "Ask about the bell."
 
 some_secrets_are.150.t: "A Bedtime Story"
 some_secrets_are.150.d: ""Daddy, can you read the one about Gusty?" the filly asked, tucked beneath a cozy blanket.\nHer father smiled warmly. "Of course, sweetie. Remember where we left off?"\nShe nodded excitedly. "Cool stuff was about to happen!"\nThe father chuckled as he grabbed a book and opened it. "Yep! I sure hope Gusty and her friends win at the end." He cleared his throat and began to read, the eyes of her daughter gleaming. "While nopony had ever tried to reach Cloudsdale on hoof, Gusty the Great was not deterred! She and her unicorn warriors marched up the hill. But suddenly, they encountered..."\n"What?! What was it?!"\n"It was the treacherous §AA§!§OO§!§RR§!§GGG§!§RR§!..."\nThe filly gasped in shock.\n"...and Gusty could tell He was ready for battle. She called out to the unicorn warriors: 'We can fight §AA§!§OO§!§RR§!§GGG§!§RR§! together!' And the unicorn warriors shot magical beams into the clouds that wove into one! The beam, stronger than a thousand armies, shined down!"\n"Haha, that dumb evil goat is in trouble now!"\n"It wrapped around §AA§!§OO§!§RR§!§GGG§!§RR§! and pulled Him to the ground! 'Don't let Him escape!', yelled Gusty!"\nThe filly gasped. "Oh noes!"\n"§AA§!§OO§!§RR§!§GGG§!§RR§! was strong, for fear gave him power, and he broke through the bonds!"\n"T-this is too scary! And I d-don't wanna give Him power!"\n"Ssh, calm down, dear," the father said. "It's just a story. §AA§!§OO§!§RR§!§GGG§!§RR§! isn't real."\n"I sure hope so!"\nHe closed the book and kissed her on the forehead. "We'll finish tomorrow, shall we?"\n"I dunno if I wanna..."\n"Maybe some other, less spooky story then?"\nThe filly nodded.\n"Alright then, good night. Try to dream of bunnies and flowers!"\n"Good night, dad...""
 some_secrets_are.150.a: "They never finished the tale."

 some_secrets_are.283.t: "The Mountain"
 some_secrets_are.283.d: "Rusty Bucket was no longer an obstacle, even if the pony archeologist felt sorry for him. Climbing up a large pile of snow, all of them could easily get up to the mountain and begin the ascent. As the six had said, they had little trouble climbing up the cliffs, but Abram had to carry the pony on his back. The winds were strong yet they held on, working together to get up the rocks without falling. It took them many hours, but they finally reached the summit, only to find a wide, windy chasm. On the other side was another snowy peak, with a frozen path leading up to a cavern.\n\nThe six and one debated how to get across. The wind was strong and the distance was long. In the end, it was the pony who provided the solution to the problem."
 some_secrets_are.283.a: "Climb down the chasm, then climb up the other side."
 some_secrets_are.283.b: "Find a way around the chasm."
 some_secrets_are.283.c: "Simply jump across."
 some_secrets_are.283.e: "Levitate a rope across with magic."
 
 some_secrets_are.6.t: "The Cave"
 some_secrets_are.6.d: "As they tried to get across the extremely deep chasm, wind was blowing and the pony almost fell, but was saved by Oskar. Eventually, all seven crossed it safely. On the other side, they walked up a winding path and finally reached the magically sealed cavern, where they could see the bell with their own eyes. The six turned to the pony, and revealed why he was needed: The seal could only be opened by a unicorn like him. All he had to do was make a small gap into the force field with his magic, and Rachel could use a telescopic grabber she had made to retrieve the bell.\n\nYet in the end, the pony felt hesitant."
 some_secrets_are.6.a: "I agree to do this. I have no other choice."
 some_secrets_are.6.b: "Forget about it. I've changed my mind."

 good_ending.15.t: "Back Home"
 good_ending.15.d: "Dear diary,\n\nI had quite the adventure, and my life was threatened multiple times. Therefore it felt good to be back in the safety Canterlot. I am not entirely safe, of course, as I angered the goats by refusing to help them retrieve the bell. I did my best to assure them I did not do so out of spite, but because I came to a terrible conclusion. The bell was so well guarded and hidden for a reason. Whatever was inside that tomb in Azir, it was likely to be very dangerous because it had been so thoroughly sealed. I tried to explain this to the six, but they refused to listen and I had to flee. I got a few bruises but with Rusty Bucket's aid I made it out safely, even as the goats tried to chase me down.\n\nI still have the crystal ball, even if it is no longer needed. I have decided to stop trying to resolve the mystery of the tomb, so now I can reveal this item to the public, who will admire it as a treasure. Yet I cannot help but feel like the sphere is watching me. Perhaps it'd be best to destroy it, so no one else can ever find the forbidden bell."
 good_ending.15.a: "Some secrets are better left buried."

 
 best_left_hidden.9.t: "The Bell Tolls"
 best_left_hidden.9.d: "Hesitantly the pony nodded, and his horn began to glow. Yet nothing happened. He realized this would be harder than anticipated. The glow intensified and his brow furrowed under the strain. Yet nothing happened. More and more energy was poured into his horn, until almost all of his magical power was being unleashed. A miniscule gap was torn open in the magical force field, accompanied by a terrible unnatural screech. Rachel immediately inserted the telescopic grabber into it, extending it fully. It could just barely reach the handle on the bell, and she managed to get a grasp on it. She pulled it back, but the bell could not fit through the hole, so she yelled at the pony to open it more.\n\nBut the pony was already at his limit, or so he felt like. In his mind, the sound of tolling bells echoed endlessly as sparks flew out of his horn. He had to do more, he had to, he simply had to.\n\nHe screamed and pushed all of his strength into his magic. The gap opened a little, just enough for the bell to fit through. Rachel pulled it out, and the pony collapsed unconscious. The gap closed instantly."
 best_left_hidden.9.a: "..."


 best_left_hidden.999.t: "The Ritual" #Hidden star father content
 best_left_hidden.999.d: "The pony's strength was gone for days afterwards. He could barely stay conscious and was carried along as he was no longer able to stand. Only hazy memories remained of that time. He remembered descending down and screaming in agony. The Sun being raised and lowered, the same being done with the Moon afterwards. Stars swirling. A train, a ship, a caravan. Heat and cold. Dark and light. All mixed together in his mind into dull darkness and gloomy orange. The Eye looked upon him.\n\nHe was back in the ruins. They had brought him there without him even realizing. It explained the heat. It had been so long, yet he could still recognize the monoliths of dark stone, which now seemed oddly ominous and terrifying. He was carried deep within the ruins, to a familiar room.\n\n"The tomb is a lie," the familiar donkey guide said to him. "He who never died needs no tomb. No, this is an altar."\n\nIt became dark as the sun set once more. "The alignment is about to commence!" Giles shouted. "Prepare the ritual!"\n\nThe bell tolled. The pony was placed upon a slab. The occultist drew out a curved knife. Bleating began. The bell tolled. The knife entered the pony's chest. He had no strength to scream. Blood spilled everywhere as the heart was pulled out. The bell tolled. The occultist consumed the heart. The bell tolled. The stars aligned. The Eye watched.\n\nRuins began to shift and change. Dunes began to vanish. Fallen pillars stood again. Collapsed roofs repaired themselves. §RTAMBELON§! had returned to the primary dimension, after being banished for so long. The Father smiled as His summoners prostrated themselves before His presence and offered Him the Bewitching Bell."
 best_left_hidden.999.a: "The bell tolls for all of us."
 best_left_hidden.999.b: "you're just a dirty cheater, aren't you? yeah, get outta here."

 tidings.99.t: "The Return Of Tambelon"
 tidings.99.d: "[This.GetNewspaperHeader]Strange news are coming out of the Zebhara desert. Word has spread about a grand city appearing out of thin air and caravan routes being cut off. Local zebra nomads are fleeing the area, rambling about an "ancient evil" returning. They are in a state of shock and keep repeating one word, over and over:\n\n§RTAMBELON.§!"
 tidings.99.a: "The bell tolls for all of us." 

 ### Focus events
 you_did_this.47.t: "The Faithful Six"
 you_did_this.47.d: "Grogar stood upon the balcony of the highest tower in Tambelon, and surveyed His realm. The bright sun shone upon the scorching sands of the Zebhara desert. He remembered how this land had once been fertile and green. Now, it was a wasteland. Perhaps one day, flowers would blossom here again.\n\n"Master," came a sound from behind him, and He turned. It was Bray, a donkey who had prepared the returning ritual and was His most loyal assistant. "The six goats who aided me wish to speak to you." Grogar nodded, so Bray bowed and left. Soon, the six heroes entered the balcony and knelt before Him. He already knew their names: Gore, Randy, Oskar, Giles, Abram and Rachel.\n"Rise," He commanded, and they did so. "You have proven yourself to be competent and cunning. Therefore, you shall become my advisors. Your first task is to tell me what has happened to the world while I was gone."\n"The world has gone to ruin," Rachel explained. "The lesser races have failed to find unity and squabble amongst themselves. Some of your monsters still roam the land to this day, as nobody has managed to exterminate them yet. The fools are obsessed with technology rather than magic."\n"So are you," said Randy and bleated in amusement.\n"Silence!" Grogar commanded. "If we plan to reclaim our world, then we must be better than the barbarians. I shall tolerate no infighting or tinkering with useless gadgets. Do you understand?"\n"B-but m'lord," Rachel complained, "I retrieved your bell with a telesco-"\n"Quiet! You no longer need the aid of technology. It is time for goats to once more become the masters of magic.""
 you_did_this.47.a: "There is much work to be done."
 
 you_did_this.6.t: "Worrisome News"
 you_did_this.6.d: "Princess Twilight Sparkle was sipping her morning coffee while reading the news. She frowned as she saw an article talking about a famed archaeologist who had gone missing. The name was familiar to her, as she had attended his presentation about the mysterious ruins he had studied in Azir. His family was begging for any information about his whereabouts. She felt sorry for them and hoped he would be found soon, alive and well.\n\nWhile the desert of Azir was still fresh on her mind, she spotted another, tiny article talking about it. There was a brief summary of strange rumours coming out of the region with nothing substantial to support them. But it was an odd coincidence that these rumours had appeared around the same time when the archaeologist had gone missing. Could there be a connection?\n\nPerhaps she was just being paranoid as always. But a part of her wanted to investigate the matter. If anything, she wanted to bring closure to the archaeologist's family."
 you_did_this.6.a: "Maybe there's something more to this?"
 
 you_did_this.7.t: "Investigation"
 you_did_this.7.d: ""Do not worry, darling, detective Rarity will unravel the mystery!"\nTwilight frowned. "Is the costume absolutely necessary?"\n"Why yes, of course!" Rarity said, wearing a black trench coat and a fedora. "I must channel the persona of Shadow Spade to get fully immersed in the role of a detective."\nTwilight rolled her eyes. "If you say so." She turned to the door of the archaeologist's apartment and unlocked it with a key given by his family. The two ponies entered and looked around. "Hm, nothing seems out of the ordinary," Twilight mumbled.\nRarity took a closer look, narrowing her eyes and inspecting the furniture. "That is because you do not look with the eyes of a detective. Aha!" Her horn glowed and she levitated a strand of white hair. "According to your description, the missing individual did not have a white tail, coat or mane, yet I found this!"\n"That's... strange, but doesn't really prove anything. Let's keep looking, I guess."\n"Yes, the more clues the better!"\nNext they inspected the archaeologist's office table. There were various notes about previous expeditions, but nothing about Azir. "Strange," Twilight said. "I think there's some papers missing, but they're not here."\n"Tsk tsk! Again, think like a detective. What if there's a hidden compartment?"\n"...Why would he hide notes about his studies?"\nRarity leaned closer at the table and knocked at the wood with her hoof, listening closely at the sound. "Quiet, I'm trying to hear a hollow sound." After several knocks, her eyes widened and she rubbed the surface, looking for a seam. Once she found it, she used magic to pull up a lid which revealed concealed notes and a diary book. "Here they are!"\nTwilight was flabbergasted as Rarity gave the items to her. "You found them! They're all about his final survey at Azir!" She quickly skimmed over everything and even saw a few drawings. One of them depicted a strange black sphere of crystal."
 you_did_this.7.a: "Now we're onto something..."

 you_did_this.8.t: "The Missing Goat"
 you_did_this.8.d: "After investigating the archeologist's apartment, Twilight and Rarity interviewed his neighbours. When the two asked about the last time they had seen him, they all mentioned the same curious detail: A strange sound similar to multiple goats bleating which had come from his apartment. It was strange, but when Twilight studied the white strand of hair Rarity had found, she deduced that it had indeed belonged to a goat. Something very strange had happened in the apartment.\n\nGoats were few and far between, but not something the Mane Six hadn't seen before. Fluttershy had once met an assertiveness trainer known as Iron Will, who had hired several goat assistants. Because of his personal connections to this elusive race, Twilight decided to send a telegram to Asterion, asking him if he could provide them with any useful information.\n\nTurns out, he could.\n\nA response soon arrived. One of Iron Will's most important assistants, Randy the Showgoat, had gone missing after meeting a certain pony archaeologist. While Iron Will did not know what had happened to him, he did know that Randy had travelled to Equestria to visit the archeologist. Clearly, Randy had been in the apartment. But why? Why were goats interested in some desert ruins that had recently been found?\n\nTwilight realized that there was only one way to find out. She'd have to visit the ruins in person and uncover their mystery with the help of her friends."
 you_did_this.8.a: "We'll get to the bottom of this!"
 
 you_did_this.9.t: "A Desert Expedition"
 you_did_this.9.d: ""I'm starting to regret coming with you, Twi," Rainbow Dash muttered and wiped sweat off her brow.\n"Well, I did warn you!" the Princess replied. "Besides, we're far better prepared than last time we ventured across a desert."\n"Tell me about it!" Pinkie said and drank from a comically large flask.\n"Careful with that, we need to save up for the return trip," Applejack warned.\n"How much farther must we continue?" Rarity asked, walking under the shadow of an umbrella that was held by Fluttershy.\nTwilight examined a map and a compass. "We're almost there! If my calculations are correct, that is. But they usually are!"\n"Looks like you're right," Rainbow said and pointed at the distance. "Someone's coming!"\n\nThe six ponies looked ahead and saw a large creature rapidly approaching. It did not look like a mirage.\n"Um... did you mean something?" Fluttershy asked nervously.\nApplejack squinted her eyes. "The heck is that? I don't like the look of it one bit."\n\nAs the creature got close enough, it spread its wings and took flight. It soared above them, covering the sun, and then dived.\n"Well, that, uh... that's a manticore!" Twilight exclaimed, and moments before the beast descended upon them, she created a magical forcefield around the group. The manticore slammed onto it, and immediately started clawing at it, roaring ferociously."
 you_did_this.9.a: "..."
 
 you_did_this.10.t: "The Manticore"
 you_did_this.10.d: "After a moment, the six recovered from the initial shock. "What is a manticore doing out here in the Zebhara?!" Rarity asked, visibly shaking.\n"I-I don't know! But I can't hold this forcefield forever!" Twilight said.\n"It looks very angry!" Fluttershy noted. "I need to calm it down!"\n"...You sure that's a good idea?" Rainbow asked. "What if I just-"\n"Everypony, back off. Twilight, lower the shield!" Fluttershy ordered. Somewhat hesitantly, the others obeyed. "Now, mister manticore, I-"\nThe beast immediately swung its claws at her, but she was pushed out of the way by Rainbow Dash. "W-wait, why didn't it listen to me?" Fluttershy asked, visibly shocked. "Maybe it's not in the mood for talking," Rainbow replied. "AJ, you know what to do!"\nApplejack nodded and pulled out a gun. "It's good we're well prepared, eh?" As the beast approached, she loaded it, took aim and fired.\n\nThe manticore was taken aback by the flash of light, grimaced at her, then fell limp and collapsed onto the sand. Rainbow covered Fluttershy's eyes. There was a moment of deafening silence.\n\nIt was broken by Pinkie. "Wow, nice shot!"\n"Heh, thanks, I've had some practice," Applejack said and put the weapon on her back. She turned to the two pegasi. "Dash, tell her I used the magical stun gun."\n"Think that'll help?" she replied sarcastially.\nFluttershy was almost sobbing. "I... I don't understand why it didn't..."\nTwilight examined the unconscious creature. "This isn't right. Manticores have never been seen in deserts."\n"Ahem... what about those creatures?" Rarity said and pointed to the horizon.\n\nDozens of beasts were approaching, creating a dust storm with their paws, claws and wings. It was a terrifying sight, and the ponies' eyes widened when they saw it. Twilight gulped. "Looks like we're going home early, girls. Gallop!""
 you_did_this.10.a: "..."
 
 you_did_this.11.t: "A Setback"
 you_did_this.11.d: "On their return back home to Equestria, the mane six hadn't spoken much. Rainbow Dash was especially upset about the fact that they had to give up and return home, believing she could defeat all the monsters herself. The unfortunate truth was that they alone could do little to investigate the desert. At least they had learned that something was seriously wrong: the Zebhara desert was usually largely devoid of life, but now it was teeming with all kinds of monsters like the Everfree Forest itself. But if they wanted to find out what had happened, they'd need to go home and devise a new plan.\n\nTwilight was already busy with this while travelling on a ship to Equestria. Just before they arrived at the port of Baltimare, her eyes lit up and she exclaimed "Eureka!". She quickly explained her idea to her friends: as travel by land was so difficult and dangerous, an airplane could be used instead. It was better than flying into the desert alone, and safer from possible flying monsters like manticores, especially if it was armed with weapons. An airplane could fly straight into the desert and find the source of the monsters from above, even taking pictures if necessary. Most of the ponies agreed that it was a good idea, except for Rainbow Dash who claimed she could fly by herself with ease. Twilight replied simply with "Yeah, of course you could" and began to write a letter to the Equestrian Air Force."
 you_did_this.11.a: "..."
 
 you_did_this.19.t: "Visual Evidence"
 you_did_this.19.d: "Twilight Sparkle sat in the library inside her crystalline castle, obsessively conducting research about monsters, goats and the Zebhara desert. Slowly but surely, the pieces were slotting together. But something was still missing.\n\nShe was startled when there was a sudden loud thump on a nearby window. She galloped there to see if a bird had flown into it, only to see a light grey mailmare with crooked eyes lying on the balcony. Her horn glowed and the window opened, while the pegasus outside stood up and regained her composure.\n"Urgent mail from the Equestrian Air Force!" the pegasus said with a sloppy salute and hoofed over a letter.\n"Oh! Um, thanks, Derpy. You didn't hit your head too badly, did you?"\nShe tilted her head in confusion. "I did what?"\n"...Nevermind." She quickly opened the envelope, levitating a piece of paper and numerous photographs. It looked like the recon mission over the Zebhara desert had been a success. She looked through the photographs one by one. Most of them depicted various sand dunes, but then... her eyes widened and she gasped. In one image, she saw a great city, with wall upon wall, battlement upon battlement, black, immeasurably strong, mountain of iron, gate of steel, tower of adamant...\nDerpy was already spreading her wings and preparing to leave. "Wait!" Twilight said. "Could you send a letter to- ah, nevermind, I have Spike for that. Been a while since I've used that ability of his, sorry!"\n"...Huh?""
 you_did_this.19.a: "Celestia must be informed immediately."
 
 you_did_this.23.t: "A Dangerous Plan"
 you_did_this.23.d: ""Somehow, Grogar returned," Twilight stated.\n\n"...Grogar?" Princess Celestia asked with a frown. "But he was banished into the Realm of Darkness thousands of years ago by Gusty the Great. I was never sure if that story was even true. It always had a... mythical feeling to it."\n"Yes, and nowadays it is a tale for foals. But I've done my research. All the evidence suggest that the banishment has been reverted. It's the only thing that could explain the chaos unfolding in Zebrica!"\n"Of course I believe you, my faithful student. You can calm down. What plans do you have in mind?"\n"I... well, remember that time I fought Tirek after you and the other princesses transfered their magic to me?"\n"I may be old, but my memory still works fine," Celestia said with a chuckle.\n"You should do it again. Combined with the Elements of Harmony, we may have just enough magical power to defeat Grogar."\n"And why can we all not fight him together?"\n"Because... because it's too dangerous!" Twilight exclaimed. "I know my friends will be by my side no matter what. But if something goes wrong, Equestria needs its leaders."\nCelestia sighed. "I understand. You don't even want the Equestrian military to help you?"\n"Well, we could use a plane to get there faster. But Gusty the Great's stories proved that military force is useless against Grogar. The only way to defeat him is by striking at the source of his power directly."\nCelestia smiled faintly. "I believe in you, Twilight. You'll save Equestria like you always have."\nTwilight suddenly struggled to maintain her composure, but managed to smile back. "T-thank you, Celestia. Thank you for everything.""
 you_did_this.23.a: "Another villain to defeat."
 
 you_did_this.24.t: "Infiltration"
 you_did_this.24.d: "There was a bright flash as six ponies and a young dragon appeared inside an empty room. They were somewhat dazed, but quickly recovered and observed their surroundings.\n"Wow, I can't believe that worked!" Rainbow Dash exclaimed.\n"Quiet!" Applejack replied. "We dunno where we are!"\nTwilight sighed. "I had to practice that a lot. Even with the power of four alicorns, it was hard to teleport all of us. Thankfully, it seems we ended up somewhere safe."\nSpike looked out of a nearby window, at a giant looming tower of stone. "Would've been better if you had teleported us right there. I bet that's where Grogar's hiding."\n"W-what does he look like?" Fluttershy asked. "I thought he was a ram, not a goat. That's how the story went..."\nTwilight replied while approaching the door of the room. "According to the stories, Grogar is not just some regular goat or sheep. He is blue and tall, with large horns and glowing red eyes. And on his neck is the Bewitching Bell, which we need to take."\n"Just nab it with your magic and we can blast him with a rainbow!" Pinkie suggested.\n"I... hope it will be that easy," Twilight said, then carefully opened the door.\n\nShe saw a large dining hall with hundreds of strange, pig-like creatures. They all stopped eating and turned to stare at her. Many of them had weapons beside them.\n\nTwilight quickly slammed the door shut."
 you_did_this.24.a: ""Guess we're teleporting again!""
 
 you_did_this.26.t: "A Prisoner"
 you_did_this.26.d: "A lone troggle was walking in the streets of Tambelon, glancing around him. After he passed by a dark alleyway, some strange clattering noise came from there. He quickly ran into the alleyway to investigate, only to be grabbed by some flying creature that pulled him all the way up to the roof. He was dropped onto it and saw he was now surrounded by six colorful ponies and a small dragon.\n"You fell right into our trap!" Rainbow Dash said. "Now don't try to resist us, or else!"\n"Oh, wait, wait, Dashie, I want to be the bad cop!" Pinkie said. "You can be the good cop this time."\n"What are these creatures anyways?" Rarity asked. "They look... unappealing. No offence!"\n"Don't anger 'em!" Applejack replied.\n"Now tell us where to find Grogar, and we'll let you go," Twilight said.\n\nThe troggle laughed, and the ponies glanced at each other in confusion. "I wished to fall into thine trap. Why else woulds't I walk alone? Mine name ist Drog, and I be a troggle. My folk were enslaveth by the most vile Grogar, so not all of us art loyal to him."\nSpike frowned. "You speak... weirdly."\n"It sounds like old ponish," Twilight said.\n"Indeed. I borroweth ye olde tomes from the archives and learneth thine language to one day cooperate with Gusty's race. For 'twas ponies who had defeateth Grogar. I believeth thou mayeth do so once more, and free mine people."\n"A-and how can we trust you?" Fluttershy asked.\nDrog shrugged. "'Tis a gamble thou must take. The entire city is on alert due to thee. Without me, thou shalt be captured most certainly." He kneeled before them. "I am at thine service.""
 you_did_this.26.a: ""We accept your help, friend.""
  
 you_did_this.27.t: "Close Call"
 you_did_this.27.d: "Drog led the ponies and the dragon through the city, carefully evading any troggle patrols, goats or wandering monsters. He seemed to be very familiar with the city's layout and knew which routes were the safest.\n"Where are you leading us?" Spike asked. "We're going away from that tower. Isn't that where Grogar is?"\nDrog shook his head. "Usually yea, but he hast goneth into hiding. He doth not admit, but he feareth ponies just as much as he hateth them."\nA group of troggles appeared from behind a corner. "Halt!" Drog whispered to the ponies. "Remaineth calm, and act as mine prisoners!"\nThe ponies looked at each other in confusion, then lowered their heads in defeat.\n"Ah, there you are, Drog!" one of the troggles said, speaking the brutish language of the troggles which the ponies did not understand. "It seems you've captured the intruders!"\nDrog nodded. "Good to see you, Krog. Yes, I've got the situation under control. Leave it to me."\nKrog frowned. "By yourself? Are you sure? Don't you need help?"\n"I've subdued the ponies. They won't resist anymore. You can trust me."\nKrog shrugged. "If you say so. But if they escape, Grogar will turn you into a blob of flesh!" Krog cackled, then ordered his soldiers to follow him and marched away.\n"Looks like Drog lied to get us out of trouble," Applejack whispered.\n"Who knows if he's lying to us too?" Rainbow Dash replied."
 you_did_this.27.a: "..." 
 
 you_did_this.28.t: "A Secret Passage"
 you_did_this.28.d: "The group kept walking until Drog stopped in front of a stone brick wall. "Here we art," he said.\n"Um... where... exactly?" Fluttershy asked.\nDrog glanced around himself, then touched a brick on the wall. It moved, and a secret door opened. "This doth lead unto the vaults beneath Tambelon. Thou canst find Grogar there, if thou followeth mine map." He took out a scroll from his pocket and gave it to Twilight. "However, ere thou go, I must say the vaults art filleth with guards, goats and monsters. Thou needst to wait within this passage until I knocketh on this door. Then thou shalt know that the way ist clear."\nSpike frowned. "And what are you planning to do?"\n"Thou needst a sizeable distraction. I shalt instigate an uprising with fellow troggles who hate Grogar. 'Tis risky, but it shouldst clear the way. Thanks to Krog, everyone thinks thou art captured and not a threat, so hopefully they wilt forget about thee."\n"And how do we know this isn't a trap?" Rainbow asked. "He's still one of Grogar's cronies."\nDrog sighed. "Thou must trust me. 'Tis our only hope of victory."\n"I know it sounds uncharacteristic of me," Rarity said, "but we shouldn't judge him by his looks. So far, he's been nothing but a gentlecolt- I mean, gentletroggle to us."\n"What if it was just an act?" Applejack said.\n"Drog is right," Twilight said. "We have to take a leap of faith and keep trusting him, despite his background. And even if it is a trap, I'm sure we'll get out of it."\nDrog sighed in relief. "Thank thee. Now go, ere someone sees us!"\nThe ponies and the dragon went inside the passage, and the door slammed shut behind them. It was pitch black inside, until Twilight's horn glowed and illuminated it.\n"Shame we didn't have time to teach him to speak normally," Pinkie said and giggled."
 you_did_this.28.a: "..."
  
 you_did_this.29.t: "The Heart Of Darkness"
 you_did_this.29.d: "The six ponies and a dragon waited patiently inside the passageway, listening closely. Yet it was terribly quiet.\n"Boooooriiiing," Rainbow Dash said. "How long have we waited already? I don't think Drag is coming back."\n"Um, his name was Drog, actually," Twilight corrected.\n"Well, we could go outside and check what is happening," Spike suggested.\nTwilight inspected the door, illuminated by her magic, and tried to push it open, then pull it with levitation. "It's not budging!"\n"Simply teleport outside then!" Rarity suggested. "I truly ought to learn that spell someday..."\nTwilight shook her head. "I can barely control all the magic within me, it'd be too risky. I think... we'll just have to go down the passage."\n"...That sounds even more risky," Fluttershy said.\n"Good idea!" Rainbow said. "Let's go then!"\n\nThe dark tunnel led deeper and deeper beneath the earth. It was still eerily silent, and there were no signs of life. Twilight looked closely at the map Drog had given her. "We should be entering some kind of large room now," she said. "Let me turn up the brightness..."\nHer horn shone brighter, revealing that they were now inside a huge vault full of cells. The silence was broken by a loud cacophony of hundreds of animals and monsters who had been imprisoned there.\nThe seven looked around in a mix of confusion and fear. "Well, that's not what I expected," Applejack said.\n"Those poor creatures!" said Fluttershy. "They must be really disstressed if they got so startled by us."\n"There's so many of them!" Spike exclaimed. "What the heck does Grogar do with them?"\n"Creates monsters," Twilight muttered, "and unleashes them upon the world. We can free them all once we've defeated him. That's why we have to keep going."" 
 you_did_this.29.a: "..."
 
 you_did_this.30.t: "The Father"
 you_did_this.30.d: "After leaving the prison vault, the seven kept going, following Drog's map. "We're almost there," Twilight said. "In fact, I think that's the gate to Grogar's hiding place."\n"Cool," Rainbow Dash replied. "Now blow it up with your magic!"\n\nThe gate opened.\n\n"I guess it didn't like the idea of being blown up!" Pinkie said.\nTwilight frowned. "He... he's expecting us. And he's welcoming us in."\nThe seven glanced at her, then at each other. "S-should we enter?" Fluttershy asked.\n"We have to," Twilight replied. "Don't worry, I'll use my magic to protect us."\nThe seven walked through the gate. Inside was a grim throne room, with a glowing crystal ball in the middle. They could see themselves inside of it. Behind the ball was a throne, and upon it sat a blue, goat-like creature with malevolent red eyes and a shining bell hanging from his neck.\n"Took you long enough," Grogar said, speaking modern Equestrian fluently, and stood up.\nTwilight narrowed her eyes while her friends braced themselves for a fight. "You've been watching us the whole time, haven't you? Grogar."\n"I knew it!" Rainbow Dash exclaimed. "Drog betrayed us!"\nHe walked to the crystal ball. "I can see anything I want, but I have to know where to look. This is the last place I expected you rats to be in. I am lucky I heard the noise coming from my beloved creations which alerted me to your disgusting presence."\n"'Beloved creations?!" Fluttershy hissed. "They looked miserable in their cramped cells!"\n"They love me as much as my people do. To them, I am a hero. But to you?" He cackled maniacally. "I AM THE BAD GUY!""
 you_did_this.30.a: "His black horns shone brightly."
 
 you_did_this.31.t: "The Prelude"
 you_did_this.31.d: "The entire room was illuminated as bolts of raw magic struck at the ponies. However, Twilight's horn shone as well, and a purple shield formed around them, deflecting the energy.\nGrogar's eyes widened. "What? You were able to repel my spell? That required immense amounts of magic!"\nTwilight took a deep breath. "Yeah, and I've got more of it ready to go."\nGrogar regained his composure and snorted in contempt. "You are no longer filth. You are a threat. Threats deserve greater attention than filth. My Faithful Six! Come and help me get rid of them."\nSeveral doors opened and six goats entered the throne room, surrounding the ponies and the dragon.\n"With Gusty, I learned to never underestimate my enemies," Grogar said and grinned.\n"Wait!" Twilight exclaimed. "We don't have to fight."\n"...Are you having one of your crazy episodes?" Rainbow Dash asked.\nGrogar raised a thick eyebrow. "How so?"\n"I have also learned something from my previous battles. I've learned to give my enemies a chance. Why are you doing this? Why do you want to terrorize the world with your monsters and enslave everycreature?"\nGrogar cackled. "You ponies are truly strange folk! You see the world as black and white, good and evil. You did not and never will understand the Path of Now and Forever."\n"I am trying to understand," Twilight said, even as the goats approached ominously.\n"The purpose of the path is to prevent any race from ever using the secrets of mind control magic to dominate others. A domineering mind requires lack of fear. Through fear, goatkind - and all other races - will never endure the horrors of mental domination ever again. You are very lucky it did not happen during my absence. What we are doing is terrible. But is it wrong? No. It is necessary."\n"...There must be another way!" Twilight replied.\n"There is not. There is only the Path of Now and Forever. And now, you will die.""
 you_did_this.31.a: "The six ponies and a dragon faced them bravely."
 you_did_this.31.b: "The seven goats attacked."

 you_did_this.32.t: "Friendship Always Wins"
 you_did_this.32.d: "In the chaos of the battle, with the Faithful Six defeated, the ponies managed to steal the Bewitching Bell. "No!" Grogar shouted. "Not again! Give it back!" He then charged at the ponies, trying to ram them with his horns. They barely managed to dodge out of the way, exhausted by the battle. "What do we do with it?" Spike asked.\n"We need to do what Gusty the Great did!" Twilight replied while flying out of the way of another charge. "Banish Tambelon into the Realm of Darkness!"\n"But... we're IN Tambelon!" Applejack said.\n"Not to mention Drog and the poor troggles!" Fluttershy added.\nTwilight frowned. "You're right. But maybe we can just use it on Grogar himself?"\n"I CAN HEAR YOU PERFECTLY FINE!" Grogar yelled and almost hit Rarity with his horns.\n"You brute!" Rarity hissed and hit Him in the face with her hoof, stunning Him.\n"Quick!" Rainbow Dash exclaimed. "Use the bell while he's out of the game!"\n"Okay! Um, here we go!" Twilight said hesitantly, pointed the bell at Grogar, and then rung it.\nThe bell's toll echoed in the throne room. Grogar regained his senses just in time to realize shadows were enveloping Him. "NO! NOT AGAIN! DAMN YOU PONIES!"\n\nWithin moments, Grogar was gone.\n\n"...Now what?" Spike asked.\n"Now, we are free," came a familiar voice from behind them.\nThey turned and saw Drog, accompanied by many troggles.\n"But the battle shall not be over 'til Grogar's loyalists and their monsters are defeated. As they're leaderless, it won't take long."\n"Wow!" Rainbow reacted. "He didn't betray us, and he almost speaks normally now!"\n"I'm so glad we defeated that ugly blue goat," Pinkie Pie said, then turned to look at you. "And I'm sure our victory won't be reset by some lanky monkey behind a computer screen!""
 you_did_this.32.a: ""Right?""

 you_did_this.33.t: "Pyrrhic Victory"
 you_did_this.33.d: "Grogar was panting heavily. "How do you ponies always manage to be the most troublesome nuisance? If other races had your determination, the Path of Now and Forever would be doomed to fail."\nTwilight was lying on the ground, barely conscious and struggling to breathe. She managed to say: "I think... I understand... your problem."\nGrogar snorted. "I have no other problems besides you. And I prefer to solve my problems permanently."\nTwilight was unphased. "You're paranoid, that's all," she sputtered. "Unable to trust other races, so you see... everycreature... as a potential enemy. If you learned to trust... others, there is no reason... we couldn't be friends."\nGrogar's horns glowed. "You have been defeated! You have no right to speak, and I should sew your mouth shut!"\nTwilight coughed. "Honestly... I would've loved to learn about... biomancy from you."\nGrogar's face twisted in rage, but just as He was about to unleash his magic, hundreds of troggles streamed inside the throne room. "What? I did not summon you here! Stand down!"\nDrog was at the front. "We shant listen to thy orders no more, vile tyrant!" he said. "My people shalt free themselves, through death or victory!"\n\nGrogar blasted Drog with his magic, killing him instantly.\n\nThe other troggles attacked or fled, but fell one by one, unable to fight against the magic of the goats. But when the dust settled, Grogar realized something terrible.\nThe ponies and the dragon were gone. They had escaped in the chaos."
 you_did_this.33.a: ""RRRAAAAAGH!""
 
 you_did_this.34.t: "We Have Lost The Battle,"
 you_did_this.34.d: "Twilight slowly opened her eyes, and saw nothing but light brown sand. In fact, she also felt the sand inside her mouth. She spat it out and raised her head, then looked around herself. Some strange buzzing sound had woken her up, but she couldn't see the source. But she did see her friends lying in the sand around her, injured or unconscious. She felt drained of her magic, and tried to figure out what had happened. She remembered a great and terrible battle against Grogar, the troggles rushing inside, and then... she teleported them away to safety, leaving the troggles to their fate.\n\nThe source of the buzzing sound seemed to come from above. She looked up, and saw a small black dot. Was it a bugbear coming to finish them off? No, it had wings. A roc? No, rocs did not make a buzzing sound.\nIt was an Equestrian airplane. The same one that had flown them above the city. It continued to fly above Tambelon in case they needed evacuation. And now, they really needed that.\nTwilight's horn shone brightly, as she poured her remaining energy into it to make a magical flare. The plane seemed to notice this and soon turned around to approach them, descending slowly.\nShe then walked up to her friends, who were slowly regaining consciousness. "Urgh... did we lose?" Rainbow Dash asked. "I hate losing."\n"No," Twilight replied. "The battle has only begun.""
 you_did_this.34.a: "But not the war."

 you_did_this.22.t: "The Ancient Enemy"
 you_did_this.22.d: "Grogar, who was once more in possession of His crystal ball, surveyed the world, wishing to see what state it was in. What the six goats had said was true: the world was embroiled in chaos and barbarism. This made Him smile, as a divided foe was easy to defeat. Yet His smile disappeared when He looked at the inhabitants of a large island in northern Zebrica. Something was terribly wrong. Their eyes were glowing in an eerily familiar green color, and they acted like puppets.\n\nFor a brief moment, Grogar's expression was that of utter terror.\n\nHis face then contorted in pure, unbridled wrath. "Bray! Get in here!" He shouted in his booming voice. The donkey galloped into his chambers.\n"What is it, master?"\n"Inform all goats in Tambelon that some Sirens have survived. Everyone must be alerted. Even if our former masters are few in number, they are still extremely dangerous. We must be ready to face this ancient enemy to fulfill the original purpose of the Path of Now and Forever. I swore to never let goatkind be enslaved again, and I intend to keep my promise!"\nBray simply nodded, and left."
 you_did_this.22.a: "Only we can save the world."
 
 you_did_this.12.t: "Rebirth"
 you_did_this.12.d: "Randy had worked as Iron Will's assistant for many years, and before that, had lived with his family as a citizen of Asterion. Now, however, he had fulfilled his destiny and started a new life in Tambelon, the ancient capital of goatkind. His father had told many myths about it before he had died, yet none of them could quite prepare him to live there. Goats were everywhere, living alongside monsters and slaves who fulfilled all menial jobs and assisted their masters whenever needed. Randy would never again have to be anyone's assistant ever again. This thought made him bleat quite happily.\n\nGoats were free to do whatever they wished, as long as it did not harm other goats (those who broke this fundamental law were turned into biomantically twisted, shapeless abominations, condemned to eternal suffering). Some goats chose a life of leisure and luxury, but usually got bored of it and picked some duty to fulfill like the others did. Some became biomancers, others studied the mysteries of the universe, some became masters of slaves or beasts. Randy decided to put his organization skills to use and became a manager. He would assign tasks for slaves to fulfill and helped organize the running of society in Tambelon. While goats saw him as an outsider, they knew he was one of the Six who had participated in the ritual to liberate Tambelon, and was thus deeply respected. He soon proved himself capable, too, helping everything run smoothly. He did not receive wages, as he received everything necessary for a comfortable life for free. The feeling of a job well done was enough of a reward for him."
 you_did_this.12.a: "A productive member of society."
  
 you_did_this.13.t: "The Old Ways"
 you_did_this.13.d: "Abram's life had been simple, consisting of eating newspapers that contained forbidden material. Yet now in Tambelon, he could not continue working as an editor, as there were no newspapers. Life in general was very strange in Tambelon, and every goat spoke ancient goatish. Abram's mother had taught him to speak it as a kid, but he had almost forgotten it. He was now unsure of what to do, wandering the wide streets (constantly kept clean by slaves) aimlessly. One goat took notice of this and approached him.\n"What is wrong, friend?" she asked, speaking in goatish. Abram sighed and bleated sadly. "I feel like I don't belong here. I cannot continue doing my old job that I did while living amongst sub-goat scum."\n"Oh, well, as Grogar says, every goat must take care of each other! Maybe I can help you. I work as an archivist, managing the records in the Great Archive. Maybe you'd like to help out with that?"\n"Is there any paper to eat?"\nThe stranger was taken aback by this. "Well, not really, no. Was that really what you did as a job?"\nHe frowned. "Well, yes, but I had to be very specific about what to eat. I had to thoroughly examine texts and only read articles that contained forbidden words or phrases."\n"Well, sounds like you could put some of your skills to use at the archive! How does that sound?"\nHe smiled. "I... suppose I could try it out. Sorry for my accent, I'm not used to speaking goatish. What's your name? I'm Abram."\n"I'm Mary. You're one of the six?! Oh, I'd be honoured to work alongside you! Come, the archive is this way!" She grabbed his hoof and pulled him along."
 you_did_this.13.a: "No goat left behind."
 
 you_did_this.14.t: "The New Ways"
 you_did_this.14.d: "Technology was frowned upon in Tambelon, and much to Rachel's discomfort, the city seemed to live in the medieval age. Why would machines be needed, when slaves and monsters did all the hard work? Yet Rachel had spent most of her life working and tinkering with gadgets and devices, studying the latest inventions. It was hard for her to simply abandon all that. So, despite the Father's warning, in the dark of the night she secretly collected scrap metal and began assembling things in her room. Unfortunately, it was only a matter of time before she was discovered.\n\nOne day, a group of goats broke into her room, accompanied by a lumbering Maulwurf. Before Rachel could do anything, the creature used its large claws to smash everything she had assembled. She broke into tears and slumped on the floor.\n"I am sorry, but you know well what the Father ordained," one of the goats said. "The lesser races have poisoned your mind with this nonsense about machines and technology. Did you really think you could hide something from our Father?"\n"I-I'm sorry! I couldn't resist... this has been my job and hobby for all of my life..."\n"Then you must change and adapt, and find a new job."\nOne of the other goats smiled. "Why don't you become a biomancer like us? Craft things with living flesh instead of lifeless metal. Invent new creatures, not machines that cannot think or feel."\nRachel sniffed and looked at him. "M-maybe I should... do that. Thank you.""
 you_did_this.14.a: "She can be healed from her sickness."
 
 you_did_this.15.t: "The Sermon"
 you_did_this.15.d: "Gore took a deep breath, preparing himself mentally and physically. This was his first time holding a true sermon - not merely paying lip service to the false faiths of the lesser races. No, this time he would speak about his true Lord, his Father, Grogar. And he would not be speaking to misguided heathens, but true followers of the master of goatkind. The rightful ruler of the world.\n\nHe entered the hall, the clopping of his hooves echoing loudly. Hundreds of goats watched silently as he climbed to a podium. His eyes swept the room before he spoke. "Friends, we have all gathered here today to celebrate the return of the All-Father, and the remaking of the old order of the world. It is a joyous occasion, and we ought to pay our respects to our Father for all the good things He has done for goatkind. He who led us down the Path of Now and Forever, He who tore down the gates of Tartarus, He who creates new forms of life to serve us, He who taught us the secrets of biomancy. Every day we must remember all this and thank Him. In return, we may receive His blessing, if we remain humble and obedient. Think of all the impure heathens in the world who deny the rule of the Father. They will never have a chance of being blessed. Instead, they shall be cursed and punished, made into slaves, their bodies twisted and broken as needed. For them, we shall feel no pity. This is the Path of Now and Forever: the mastery of goatkind, the goatocracy, to ensure eternal freedom and peace.\n\n"Many of you lived for countless generations, for countless millenia, among heathens, myself included. Yet we remained faithful, never losing hope, knowing that one day the Father would return, when the time was right. And our faith has been rewarded, for the Father is back with us. Now the paradise of old shall return. Yet there is much work to be done. Many heathens remain arrogant and unpunished. It is our duty to fulfill the wishes of the Father and go forth to crush them all. With unwavering faith in our victory, we shall one day stand triumphant. Praise be Grogar, the All-Father!"\n\nThe hall erupted into loud bleating. Gore smiled, feeling spiritual fulfillment."
 you_did_this.15.a: "Praise Him!"
 
 you_did_this.16.t: "Fresh Blood"
 you_did_this.16.d: "A new batch of slaves had arrived in Tambelon, freshly harvested from a distant conquered settlement. This was a regular occurence, as slaves died regularly in Tambelon. Replacements were constantly needed.\n\nThe slaves were immediately put to work, because a huge statue depicting Grogar was being made in the center of the city. They were watched over by a hungry pack of bugbears and several goats. One of the goats was Oskar, the occultist who had gained fame by participating in the ritual that had reverted Grogar's banishment. As the slaves were put to work, he spoke to them in their language: "I hope you all understand the importance of this work you are doing. Our Father requires many monuments dedicated to his eternal glory. You heathens of course think this is nonsense, that your work is unimportant, but this couldn't be further from the truth. The more He is glorified, the stronger He becomes. One day you all will accept Him as your own Father, too, and abandon all thoughts of resistance, sabotage, or rebellion. It is inevitable."\n\nOne of the slaves appeared to be angered by this. She threw her chisel at Oskar and muttered several curses at him. The goat nimbly dodged the flying tool, then narrowed his eyes. His horns began to glow, and the angry slave's body suddenly cracked and twisted. She let out a gurgling screech of agony as the nerves in her body snapped. Her body continued to convulse and change shape even as the screaming ended. Finally, nothing was left of her except a shapeless lump of flesh and bones. The other slaves looked in horror, but when Oskar turned to look at them, they swiftly returned to work.\n\n"Eat what's left of her," Oskar said, and a bugbear grabbed the former slave's corpse and consumed it. "I am starting to fear the subgoats will never accept Grogar as their Father... maybe it is not inevitable after all. Perhaps the Path of Now and Forever is flawed..?" He frowned in thought and turned around to leave. The other goats looked at him in confusion."
 you_did_this.16.a: "Sounds like heresy to me."
 
 you_did_this.17.t: "A Vision"
 you_did_this.17.d: "Giles the Shaman still clung to the ways taught by his buffalo teacher, who had shown him the ways of the Rainbow Crow. Unlike Rachel's corruption by technology, Giles' peculiar behaviour was tolerated. After all, goats who hadn't lived in exile in Tambelon needed to re-establish their magical abilities. Giles was unorthodox, but nevertheless had great potential in him.\n\nOne day Giles ventured into the desert with all the necessary ingredients for his ritual. He sat down atop a dune and used a magic crystal to focus the sun's rays of light into a bowl of dried hallucinogenic plants. They began to burn, and Giles deeply inhaled the smoke, closing his eyes and chanting a mantra. While his physical eyes remained closed, the eyes of his souls opened, and saw a vision.\n\nHe saw a world where the natural order had triumphed. He saw cities in ruins, lesser races being herded by countless monsters, and goats ruling over it all. But then, gunfire and explosions. There was an ambush. The monsters fell, and the herd began to riot. Order crumbled. Then, he saw a gargantuan mountain of skulls of all kinds of shapes. On top of the mountain was the skull of Grogar. He panicked, and woke up from his trance.\n\nHe breathed heavily. Night had fallen on the desert and it was terribly cold. Was that vision... a sign of things to come? He had a terrible realization of what must be done.\n\nHe stood up and galloped back to Tambelon."
 you_did_this.17.a: "..."
 
 you_did_this.18.t: "The Eternal Doctrine"
 you_did_this.18.d: "Oskar stood in a shadowy alley, waiting for a watchful cragadile to pass by. Once it was gone, he peeked out into the streets, looking for someone. Soon he saw the goat he was looking for, and waved at him. The other goat saw this and inconspicuously walked into the alley.\n\n"I am glad you could come, Giles," Oskar whispered.\n"And I am glad you were here waiting for me. Are you sure we are not being followed? The walls have eyes and ears in this city."\n"I am certain."\n"Good. In that case we can talk. How has the recruitment been going? Have you spread the word?"\nOskar nodded. "More and more goats are becoming convinced of the righteousness of our cause."\n"Excellent. In the mean time, I have received another vision that inspired me to give a name to our ideology."\nOskar raised an eyebrow. "What is it?"\nGiles grinned. "The Eternal Doctrine."\n"Sounds similar to the Path of Now and Forever..."\n"Indeed. It is our own interpretation of the path. in fact, I say it is the more orthodox interpretation. After all, slavery is not eternal." His grin widened. "Death is."\nOskar nodded eagerly. "Our own 'Path' is dark and grim, but we must walk down it. I am certain that with enough support, our Father can be convinced to follow our guidance."\n"Yes... now, let us discuss the formation of the Purification Council, the next step in our plan...""
 you_did_this.18.a: "..."
 
 you_did_this.4.t: "A Lost Art"
 you_did_this.4.d: "Grogar entered the vast vaults beneath Tambelon. The many creatures imprisoned there sensed His presence and went silent in an instant. He looked at them and remembered all He had planned to do with them, before that accursed pony, Gusty, had banished Him to the Realm of Darkness.\n\nNow, He could finally fulfill those plans.\n\nHe kept walking and entered into the lower levels, where His previous creations were kept. They were all beautiful in their own way, even the failed experiments that barely lived, suffering constantly. Learning experiences had a beauty of their own, and Grogar kept them to remind himself of His failures. But the most beautiful creatures were the successful ones. He was especially proud of hydras, a creature He had made to rival His ancient enemy, the dragons. Yet there were many other fine creatures too. Some had been created by other goats, His finest apprentices. It's a shame Gusty's army had slaughtered so many of them, but He was thankful they had never discovered the vault. Otherwise, every single monster here would've been callously killed by the foolish ponies.\n\nNow it was time to release many of these captive monsters, and to put the animals to use. The might of Tambelon would slowly but surely be rebuilt. New terrible monsters would be made, and the world would learn to fear goats again."
 you_did_this.4.a: "Art shall be made again."
 
 you_did_this.5.t: "The Natural Order"
 you_did_this.5.d: "Tin Zinan couldn't help but feel helpless. Out of nowhere, demonic goats had appeared from the desert, accompanied by terrifying beasts. There was little they did to resist, and those brave ones who did quickly perished. His people, the folk of Azir, were driven out of their homes and herded like cattle into a vast, dark city which appeared like a desert mirage. There, they were all forced to work, no matter their rank. Chieftains laboured alongside servants. They were all equal in slavery now.\n\nTin Zinan had been a slave once. And he had sworn to never be one again.\n\nDay and night, they all toiled in a workshop, where they were instructed to make large plates of crystal-infused armour for the beasts. They were forced to use the most basic tools and were allowed little rest and few provisions. Tin Zinan couldn't stand for this. He had to show that zebras like him would never accept slavery. Death was preferable to it.\n\nHe stood up on a workbench and proclaimed to all other slaves: "My fellow Azirians! A most terrible fate has befallen us. Yet do not despair! Hope lives on in our hearts. One day, we shall break free from our shackles! We must never fully submit, but always use little acts of resistance to defy our evil masters. Sabotage the armour, work as slowly as possible, go on hunger strike, do anything you can to show that you are free zebras!"\n\nThe other slaves cheered and chanted his name, and a riot started as they began to break tools and dismantle the plates they had made. But it did not last long. Soon, the doors broke open and ravenous chimeras and manticores poured inside. A terrible slaughter began. Zebras screamed as they were torn apart by claws and teeth and eaten alive. Tin Zinan did his best to fight back, but it was all in vain.\n\nOn the following day, Tin Zinan and a dozen other rebellious slaves returned to the workshops. Their bodies had been biomantically modified: Mouths had been replaced with small feeding holes and their rear legs had been removed, forcing them to crawl like maggots. It was a warning to all slaves that resistance would be punished most severely."
 you_did_this.5.a: "I have no mouth and I must scream."

 you_did_this.25.t: "The Price Of War"
 you_did_this.25.d: "Grogar sat upon his brass throne and gazed upon the crystal ball before Him. It showed the outcome of a recent battle against the barbaric hordes of the other races. He saw that His forces had taken casualties. There were unfortunate goats, monsters and troggles who had been injured, maimed or torn to pieces by bullets, shrapnel and explosive shells of metal. His face contorted in disgust. What wickedness and cruelty had driven the debased and degenerate lesser races to develop such terrible weapons? They fought like cowards, flinging pieces of metal from afar while hiding in their dirt holes. Yet He hated to admit it was effective. He would need to increase the production of crystal-infused armor plating, and order His underlings to study these weapons. Not because He wanted them to be used by his minions, but because He had to learn how to counter them more effectively. His faith in the ultimate victory of goatkind remained unshaken. But it would come at a higher cost than He had anticipated."
 you_did_this.25.a: "War is Tartarus."
 
 cityfoul.1010.t: "The Fall Of Seaquestria"
 cityfoul.1010.d: "The dominion of goatkind once extended not only above land, but below the sea as well. Most of the world is covered in water after all, so how could one claim to rule the world without ruling the waves as well?\n\nThe seaponies hiding in their underwater homes were taken by shock and surprise as numerous giant sea serpents invaded their towns and cities. While it was clear they had experience from fighting monsters before, they struggled against such a large number of them. They only managed to slay a few before their defences were destroyed and overwhelmed. Soon enough, all resistance in so-called Seaquestria had been crushed.\n\nWhile exerting control over undersea populations is impractical for goats, the monsters will at least ensure they will not be able to fight back against Grogar's rule."
 cityfoul.1010.a: "Nothing is beyond the Father's reach."
 
 you_did_this.20.t: "The Doctrinal Conflict"
 you_did_this.20.d: "Oskar and Giles entered Grogar's throne room and immediately prostrated themselves in front of Him and kissed the stony floor.\nThe Father snorted. "Stand up. What do you want?"\nAs Oskar stood up, he explained. "We have an urgent matter to discuss with you, Father. Giles received a vision of the future, and I saw signs of that future with my very own eyes. The Path of Now and Forever is doomed to repeat the past. The lesser races will rise up against slavery and once again try to eradicate us. It is inevitable."\nGrogar raised a thick eyebrow. "And what alternatives do you propose?"\n"The Eternal Doctrine," Giles muttered.\n"And what is that?"\nOskar explained. "A new philosophy to save goatkind from extinction and stagnation. Instead of enslaving the subgoats, we simply exterminate them all. Relying on slave labour threatens to make us decadent and weak once again. Instead, we must learn to rely on ourselves. With all other sapient life eradicated, we can then live in eternal peace."\n\nGrogar frowned. "You have a point. Yet this decision will affect all of goatkind, so I cannot make it alone."\n"You should know that many goats are already supporting our ideas," Oskar said. "I propose we hold a democratic vote about implementing this doctrine."\nGrogar unleashed raucous laughter. "What?! No! No. Prove the superiority of your 'Doctrine' through force. I will step back and allow you to sort out your differences with those who follow the 'Path'. You promise to make goats stronger, then do so and defeat those who stand in your way. If you win, I will accept your proposal. If not..." He grinned ominously. "Well, you'll be too dead to worry about it."\nOskar and Giles glanced at each other in horror, then nodded with trembling heads. "As you wish, Father," Oskar said hesitantly. "Let the... strongest... prevail.""
 you_did_this.20.a: "The Eternal Doctrine is the last hope for goatkind!"
 you_did_this.20.b: "We must always follow the Path of Now and Forever."
 
 you_did_this.21.t: "The Alliance Of Free Races"
 you_did_this.21.d: "Nations outside of Zebrica at first outright ignored strange news coming out of the Zebhara desert. Then, as Tambelon's monsters descended upon its neighbouring nations which were overrun one by one, they grew concerned, but were too distracted by their petty squabbles to intervene. However, as Tambelon kept expanding, more and more nations realized that inaction would lead to their own inevitable demise.\n\nThanks to a group of certain ponies, a proclamation has now been declared. All remaining free races have banded together to stop Grogar before it is too late. While this has not brought peace to the continents of Equus and Griffonia, it does mean the rest of the world now recognizes goatkind as a common threat to their freedom. They will do their best to cooperate and aim to liberate all of Zebrica from Tambelon's domination."
 you_did_this.21.a: "Let them come."
 
 you_did_this.35.t: "The End Of The Doctrinal Conflict"
 you_did_this.35.d_edge: "Giles, Gore and Oskar prostrated themselves before the All-Father, who sat upon his throne. "We have done as you wished," Oskar said. "We have defeated those who opposed our righteous Doctrine, and imposed our will upon all of goatkind."\nGrogar's mouth twisted into a wicked smile. "Good. You have proven that your Doctrine is not misguided by proving its superiority." His smile faded. "You're not expecting some kind of reward for your kinslaying, are you?"\nThe three goats glanced at each other in horror. "N-no, my master," Gore bleated.\nGrogar narrowed his eyes. "Very good. Now, we have a lot of work to do. There's around 750 million sapient creatures to kill. Every single one of them has potential to develop mind control abilities, although some of them have greater potential than others. But once they're all dead and gone, we can be safe forever."\n"...And what if a goat tries to use such magic?" Giles said.\nThe others stared at him in shock.\n"Just came to my mind," he said with a shrug.\n"SUCH A RACE TRAITOR WOULD BE SKINNED ALIVE AND QUARTERED!" Grogar shouted, then took a deep breath. "So far I have trusted my flock to not stray away from the Path I had set for them. However, if a single goat proves themselves capable of using... THAT HEINOUS MAGIC, then I suppose we would have to exterminate ourselves, too."\n"...Excuse me?" Oskar said.\n"It is the logical end point of your own Doctrine, fool. Will you follow it or not?"\nThe three hesitated, glanced at each other, then finally nodded."
 you_did_this.35.d_unedge: "Rachel, Abram and Randy stood before Grogar, who sat upon his throne. "I can't believe you did this," Rachel said. "You allowed a civil war to happen, tearing goatkind apart, just to see which ideology was 'stronger'?"\nGrogar's face twisted in a frown. "Your belief is not required. You know well how I deal with heretics."\nRandy intervened. "W-what she meant to say is, we are glad this senseless war is over!"\nGrogar remained tense. "I was not expecting for the traditionalists to win. Then again, I had not expected you to abandon most of our traditions."\n"We did what was necessary," Abram said. "We need the technology of the lesser races to survive."\nGrogar snorted. "If you say so. You must remember that the Eternal Doctrine, as misguided as they were, had a point. How do you plan to prevent another slave revolt and a repeat of the banishment of Tambelon? It seems you have just made it more likely by giving slaves weapons to use against us."\n"Actually," Rachel said, "if we treat slaves nicely, most of them will be content with their status, with the exception of a few agitators."\nGrogar narrowed his eyes. "But then they won't fear us. Making us WEAK."\n"You keep worrying about the past repeating itself," Abram said. "But we are doing our best to avoid it. Please, trust us, as difficult as it is."\nGrogar grinded his teeth."
 you_did_this.35.a: "And now for the rest of the world."


 now_live_with_it.1.t: "A New Base Of Operations"
 now_live_with_it.1.d_edge: "Oskar, Giles and Gore were seated around a table in silence. This room was in a house of some low-life filth that had been cleansed. Now, it would be their temporary headquarters. The move had been done out of necessity, to prevent quick defeat to those who refused to accept the light of the Eternal Doctrine, yet it still felt like they had been cast out from the paradise of Tambelon.\n\n"I am glad you accepted me as part of the council," Gore said, breaking the silence. "I know you were sceptical, but you told me the All-Father saw the wisdom of your doctrine. Therefore, I am obliged to follow it."\n"Yes, we're glad you did not betray us," Oskar grumbled. "Like all the other goat traitors."\n"Don't let anger overcome you," Giles said. "Once we inevitably prove the superiority of our pure doctrine, they will see the error of their ways and surrender. Then the Father will lead us again."\n"Yes! We must not waver! We must have faith in victory. When other goats see the light, see the darkness of their doomed path, they will welcome us as guides and teachers. Then, we shall execute the Doctrine and reach unto eternity."\nOskar smiled. "Thank you, my friends. I am sure that together we will triumph as before. Now, let us discuss our plans of action.""
 now_live_with_it.1.d_unedge: "Rachel, Randy and Abram were seated around a table in silence. They were inside a temporary tent that had been erected as their seat of government. Without Grogar, and with a cult running rampant, they had no option but to claim leadership over goats and flee to a secure location.\nRachel was the first one to break the silence. "So, um, am I the only one trying to process what just happened?"\nThe other two goats shook their heads. "We're back to being without our Father," Randy said. "And now we're stuck once again among this sub-goat filth! Everything was going so well, and now we've lost everything!"\n"Calm down," Abram said. "Maybe try munching on some paper. That helps me relax when I'm stressed."\n"We can't relax," Rachel said. "As part of the Faithful Six... erm, I guess it's the Faithful Three now, it is our duty to save goatkind and all of our slaves."\n"...Save our slaves?" Randy asked.\n"Well, yeah," Abram said, "those cultists said they should all be killed."\n"I... I was good friends with a sub-goat once," Randy admitted. "A minotaur. Sure, he was filth, but he doesn't deserve death. That's just cruel."\n"Exactly," Rachel confirmed. "They're taking things too far. Who knows, maybe they even imprisoned Grogar or did something worse to him. We have to stop them, and we can only do it by working together!""
 now_live_with_it.1.a: "United, we will win."
 now_live_with_it.2.t_edge: "It Never Ends"
 now_live_with_it.2.t_unedge: "A New Age"
 now_live_with_it.2.d_edge: "Grogar looked up at a great organic capillary tower that reached far above the clouds. Then he looked down at numerous gates of stone and crystal that were being constructed by goats. "Bray, I want a detailed repo-" Grogar said before realizing that Bray was dead. He snorted out of frustration, then headed down a set of stairs.\n\nEventually, he found the Faithful Three, Gore, Oskar and Giles. "There you are," he said. "I want a detailed report about our progress."\nThe three bowed to him. "Father," Oskar said, "The first experiments of space-born monsters has been a relative success. They survived for several hours before suffocating, and were able to reach great velocities. At this rate we will reach our goals within a decade."\n"Father," Gore said, "The dimensional portals are nearing completion. By studying portals constructed by ponies, we were able to create replicas that function for several minutes before collapsing. At this rate we will reach our goals within a decade."\n"All other worlds will be within our grasp," Giles concluded. "We just have to be patient."\nGrogar frowned. "I've been patient for millennia. A decade means nothing to me. But when we are ready, we will sail to a billion worlds. We will sail until every light has been extinguished. Only then can the multiverse be truly safe from mental enslavement.""
 now_live_with_it.2.d_unedge: "With the destruction of the last hostile military forces, the War to End All Wars had finally come to an end. It had always been Grogar's goal to restore goatocratic world rule, but now there was no purpose to it. The goats had found an alternative way to avoid repeating the past. So, why repeat it?\n\nThe Path of Now and Forever was abandoned, and slavery had been abolished. Some still resisted Tambelon's rule, but many creatures found their new lives to be rather comfortable, some even better than they had been before. The goats no longer ruled with an iron fist, but with a silk glove. Many soon realized something else, too: world peace had been achieved, and it was likely to last for a long time.\n\nWith the goats now treating other races with respect, cooperation and trade increased globally. Tambelon became a multiracial and multicultural hub, the capital of a peacefully united world. Meanwhile, in the outskirts of the most ancient city, Rachel stood and looked proudly at a space rocket, ready to launch.\n\nIt was the beginning of a new golden age on the planet. And soon, they would reach out into the stars."
 now_live_with_it.2.a: "Mountains of broken bodies beneath the wheel."
 now_live_with_it.2.b: "We have learned from our past mistakes."
 now_live_with_it.3.t: "Betrayal"
 now_live_with_it.3.d: ""What do you mean all troggles have left and joined our enemy?!" Oskar demanded to know.\nThe fearful goat visibly shrank. "I... well, which part of it do you not understand?"\nGore tried to defuse the situation with a smile. "I think he does not understand why they did so."\n"Isn't it obvious?" Giles replied with a snort. "The goats who follow the Path of Now and Forever wanted to keep their precious slave-soldiers, so they sent agents to contact and rescue the troggles." He shrugged. "It doesn't change much. We will simply cleanse them later.""
 now_live_with_it.3.a: "So much for their loyalty..."
 now_live_with_it.4.t: "Technophobia"
 now_live_with_it.4.d: ""Call me a heretic if you want," Rachel told the assembled council, "but there are far worse heretics out there. Besides, nothing about the original Path of Now and Forever says anything about the use of advanced technology."\n"Unless it's related to mind control," Abram added. "I learned that from my time in the archives."\n"Yes, except that. But what other obstacles are there? Sure, the inventions were made by filth as we call them, but does that taint them? Can the idea not be detached from the creatures who made them?"\n"I've had my experience with technology, too," Randy said. "The devices lesser races have made can be very useful. Like the microphone I had to amplify my bleating."\n"Exactly!" Rachel replied. "Why would we deny useful tools for ourselves? We're just pointlessly crippling ourselves, which might end up dooming us. We need any advantage we can get against our foes, before it is too late!"\n\nThe councilgoats murmured. After a while, Abram spoke out: "We have decided to assign our most intelligent goats to study the machines of the subgoats. The Father might be displeased, but I think even He can be convinced that this is the right thing to do in times of crisis."\nRachel smiled."
 now_live_with_it.4.a: "How unorthodox."
 now_live_with_it.5.t: "A Shield For The Mind"
 now_live_with_it.5.d: ""Hayreka!" Rachel exclaimed as she burst into Abram's office, startling the goat.\n"Wha- Rachel, what was that?"\n"It's an interjection used originally by pegasi to celebrate a discovery or invention. But that's besides the point. Abram, my experiments have been a success!"\nAbram furrowed his brow in thought for a moment to recall what those experiments were, then widened his eyes in clarity. "Ah! You mean the anti-mind control magic shields?"\nRachel nodded frantically. "Yes, yes! The imprisoned user of mind control magic was completely unable to do anything to the test subjects in the effective range of the mind-shields. Do you know what this means!"\n"Um... well, I guess we can relax a bit."\n"Come on. With modern technology, we can mass produce these shields so every single goat has one. This means fear factor, slavery, world conquest, all those things are completely unnecessary!"\nAbram blinked. "Um. Bit late for that."\n"Nonsense. It's never too late. I came here to ask you to spread the word in the news! You're an editor, after all. When the word spreads, all goats will agree to abandon the Path, forever."\n"You remind me, it's time for my meal." Abram began to chew on a newspaper."
 now_live_with_it.5.a: "So um... what now?"

 ### cityfoul like events 
 cityfoul.999.t: "The Liberation Of Goatlestan"
 cityfoul.999.d: "After the fall of the goatocracy, a genocide of an incomprehensible scale took place as the former slaves massacred their rightful masters across the entire world. Goats fled into hiding, forming secluded and isolated communities which were often persecuted.\n\nOne region where a noticeable population of goats remained was Goatlestan. Thousands of goats live here among the verdant hills in remote villages. The dominant zebra population has, for the most part, left them alone thanks to the rugged terrain of the area, allowing the goats graze on grass in peace.\n\nBut the goats never forgot. Here, the memory of Grogar remained strong while it faded elsewhere in the world. They awaited his return for millenia, praying and never losing hope.\n\nWhen the monstrous horde of the Father arrived, they were overcome by euphoria. Grand celebrations were held in the hills as the goats rejoiced. They had waited for this day for countless generations. Thousands flocked to Tambelon, eager to join the ranks of the reforged goatocracy. The local zebras were swiftly put in chains and punished for their ancestors' crimes.\n\nThe old saying had proven to be true and wise: "Wait and hope.""
 cityfoul.999.a: "They shall be rewarded for their loyalty."
 
 cityfoul.1000.t: "Grandfather of the Desert"
 cityfoul.1000.d: "As the goat biomancers led their monstrous armies through the deserts of what the lesser races called Zarantia, they encountered an old monster variant which Grogar had once created: the tatzlwurm. The goats were swift to take control of some of these creatures so the creature template could be reconstructed, having been lost in the chaos of the rebellion many millenia ago.\n\nThe tatzlwurm was a great addition to the goatocracy's ever expanding arsenal. The worms were perfectly adapted to the desert, and were ravenous by nature. With the template recovered, tatzlwurms could be created en masse once again."
 cityfoul.1000.a: "A fine addition to the collection."
 
 cityfoul.1001.t: "Terror Of The Skies"
 cityfoul.1001.d: "When the goats first saw one, they could not believe their eyes. A living roc, soaring across the sky, its wings spread wide. It was an enormous, carnivorous bird of prey that had once been created by Grogar. It was thought no living specimens existed, but this assumption proved to be false. The goats swiftly captured some wild rocs and brought them to Tambelon, as the template required for their creation had been lost. Grogar was pleased to see one of his prized creations had been saved from oblivion.\n\nRocs are fearsome creatures and have iron-sharp claws, capable of tearing apart the pathetic flying machines of the sub-goat races. Soon enough, the skies will belong to the goats once again."
 cityfoul.1001.a: "A fine addition to the collection."
 
 cityfoul.1002.t: "Raining Rocks"
 cityfoul.1002.d: "In the rocky Abyssinian mountains, the goats discovered another of their old creations: the slingtail. It was a reptilian creature with a strong tail which it used to throw rocks over long distances to hunt its prey. They were an ancient weapon from a primordial war against dragonkind, yet had survived in the wild for millenia. Some specimens were swiftly captured so the creature template could be recreated.\n\nThe slingtail's unique ability would give the monstrous army much needed ability to strike at long range, especially at heavily armoured or flying targets. It was proof of ingenius design, as the creature was still useful against the enemies of goatkind, even if they were very different than before."
 cityfoul.1002.a: "A fine addition to the collection."
 
 cityfoul.1003.t: "Wrath Of The Guardian"
 cityfoul.1003.d: "Southeastern Zebrica had been devastated by unchecked magic which had turned the entire region into an overgrown humid swamp. Grogar dreamt of fixing this problem and undoing the damage, reverting the region back to its original climate. However, this would require the seizure of the goat-built waystone facility located on top of a leyline in the middle of the peninsula which was unleashing the magic. Unfortunately, a magical spirit guarded the building, feeding off its power, and the local barbarians worshipped it and treated the building like a temple. When the goats and their beasts tried to enter it, its priesthood conducted a ritual summoning the spirit, which they called the "Thunder Tiger". A gargantuan storm formed in an instant, scouring the surrounding golden city with lightning and killing everything in it, destroying and damaging buildings which included the "temple" itself.\n\nWith the waystone facility destroyed, it would take decades or even centuries to conduct proper climate restoration in the region. It is an unfortunate setback, but there is little that even Grogar himself could do about it."
 cityfoul.1003.a: "There are entities that rival even Him in power..."

 cityfoul.1004.t: "Honorary Goats"
 cityfoul.1004.d: "As the goats with their monsters arrived in the grassy valleys of Zerghana, they met some familiar creatures who were kept as livestock by the local zebras: sheep. Sheep were the closest relatives of goats and the two had a close relationship, both before Tambelon's banishment and after it. Yet sheep were only semi-sapient and content with being livestock, while goats resisted such treatment. Nevertheless, wherever the goats arrived, sheep would welcome them and not complain as their owners were themselves turned into slaves. Grogar soon proclaimed that, like before, sheep would be treated as honorary goats and second-class citizens with all involved rights and protections. Most sheep did not care and just wanted their wool to be sheared regularly while being left alone to graze on the lush grasslands. Yet some sheep volunteered to help goat biomancers and ease their burden by acting as their assistants."
 cityfoul.1004.a: "We happily embrace our cousins."
 
 cityfoul.1005.t: "March To The Sea"
 cityfoul.1005.d: "The goats finally saw something that was a very unfamiliar sight to those who had lived in Tambelon for their entire lives: ocean. A vast expanse of shimmering blue water. Goats, of course, are not particularly good at swimming. But the same cannot be said for the many creatures who spend their entire lives underwater. As such, the goats were quick to look for such creatures, eventually finding a live sea serpent.\n\nWith this new creature template, the goats could now claim the seas for themselves. Nothing would be beyond their reach any longer. The lesser races hiding on their islands were doomed."
 cityfoul.1005.a: "A fine addition to the collection."
 
 cityfoul.1006.t: "A Magical Forest"
 cityfoul.1006.d: "There are several places in the world where leylines intersect, creating nexuses of raw magical energy. This has a strong effect on local flora and fauna, creating dense forests teeming with strange creatures. Indeed, goats first learned biomancy by studying how monsters naturally appeared in such places.\n\nOne such place has now been secured by goatocratic forces. It is the only one remaining in its natural state on all of Zebrica, and is likely the largest magical forest in size. Grogar has already visited the place in person to see if the lesser races have caused damage to it. He was relieved to see it is in good condition, with plenty of biomass and magical energy that can be utilized."
 cityfoul.1006.a: "There are still unspoiled places in the world..."
 
 cityfoul.1007.t: "Unleashed Magic"
 cityfoul.1007.d: "Grogar had already learned that the foolish horses of Maretania had stored many unusual and powerful artifacts inside their caverns. He had no particular use for those trinkets, as they were all weaker than His Bewitching Bell. Yet it seems the horses still wanted to keep them from falling into His hooves. Gargantuan explosions rocked the Maretanian mountains as the caverns were blown up from within, burying countless valuable treasures beneath tonnes of rock and stone.\n\nThe damage was so widespread that it was likely the horses had used one of their own artifacts to destroy the rest. Casualties numbered in the hundreds of thousands. Yet they were all worthless sub-goats anyways, so their deaths and injuries mattered little. The entire event did little more than prove how afraid the pathetic lesser races were of goatkind's true might."
 cityfoul.1007.a: "What a pointless waste."

 cityfoul.1008.t: "Donkeykind Is Broken"
 cityfoul.1008.d: "Bray the donkey entered through iron gates into a garden, located in the center of Tambelon. It was full of life, with greenery and numerous animals. Birds were singing and various goats were strolling around the area, enjoying nature. Bray ignored them and walked past them, looking for someone important.\n\nHe saw Grogar sitting in front of a pond. "Master," he called to Him, "there is important news from the front."\n"Come look!" Grogar replied.\n"...Master?"\n"It was an order, fool!"\nBray hurried next to Him. "What is it, master?"\nGrogar looked down into the water, so Bray did the same. There was a Bufogren in the water, surrounded by tadpoles. There was a rare smile on Grogar's lips. "Is nature not wonderful, Bray?"\nThe donkey blinked in confusion. "But master, what of the news?"\nGrogar rolled his eyes and sighed. "Fine, spit it out!"\n"The donkeys of Asstyria and Anseruk... have been subjugated. You can see it yourself from your crystal ball."\n"You seem troubled," Grogar remarked. "Does the fate of your fellow donkeys bother you?"\n"N-no, master."\n"Don't lie to me! I know it does. I saved you from your cancer and this is how you repay me. With foolish sentimentality! Donkeys are no different from other nature-hating races. All of them kept my kind as livestock! Treated us like animals! And we shall return the favour thousandfold. Be thankful that you were spared, because you are useful to me."\nBray said nothing for a while, then weakly nodded."
 cityfoul.1008.a: ""Yes, master.""
 
 cityfoul.1009.t: "Did The Stars Lie?"
 cityfoul.1009.d: "Hiram Zerranid winced as a strange pig-like creature whipped him. He was trying to stray away from the line of fellow chained zebras and approach a nearby goat. She appeared to be in charge, bleating orders to monsters and pig-people alike. Clearly, she'd listen to reason, if she'd understand his language. "You there! Listen to me, there must have been a mistake!"\nThe goat noticed him, nodded to a pig-person, and Hiram was whipped again, this time harder. His striped coat was soon covered in blood. "Please, listen! We hooved creatures do not have to be enemies! We can work together to eliminate the avian threat to the world!"\nHe resisted the urge to scream as he was prodded with a spear. The goat looked at him condescendingly.\n"I beg you, listen to me! We don't have to be enemies!"\nAnother stab with a spear, this time piercing into his flesh. He fell onto his knees.\n"The Godhead... Za'al-Maar... unless... you are... you are crypto-avians!"\nThe goat's horns glowed. He felt something strange around his mouth, which quickly escalated into terrible pain. He writhed on the ground as his face twisted. When the pain suddenly ended, he gasped for air and touched his face with his hoof. To his horror, he realized he now had an avian beak.\nThe goat spoke in a strange language he didn't understand and gestured him to rejoin the other zebras.\nHiram looked at her in horror, his body shaking, unable to say anything anymore."
 cityfoul.1009.a: "..."

 cityfoul.1011.t: "A Pet Peeve"
 cityfoul.1011.d: "While scouring the cold mountains of the Zebrican south, one of the goats spotted a wild bugbear foraging berries in the woods. It was swiftly captured and brought back to Tambelon so its creature template could be reconstructed.\n\nBugbears are extraordinary creatures, a combination of a bear and a wasp. They have impressive strength and size, which, along with their six limbs, allows them to carry other monsters over great distances if necessary. They are far from defenceless, having a sharp stinger as well as claws. With them, nothing will be beyond the Father's reach."
 cityfoul.1011.a: "A fine addition to the collection."
 
 cityfoul.1012.t: "The Living Machines"
 cityfoul.1012.d: "While pacifying the region known as Barrad, the goats came across a truly peculiar discovery. It was not entirely unexpected, as the area had been ravaged by unusually strong magic, yet still took them by surprise.\n\nDeep beneath the surface, they found a strange and powerful magical entity, protected by fanatical cultists and surrounded by machines made out of biomass. With how dangerous the corrupted entity potentially was, the goats summoned Grogar himself to resolve the matter.\n\nLed by Grogar, the goats and their monsters slaughtered the cultists and then confronted the entity. Despite all its power, it could do little against Grogar, who soon realized the entity's nature. He managed to separate it into seven unicorns. After the initial shock, they were killed. Grogar theorized that the seven had attempted to use some kind of spell to merge into one, greater entity, which had clearly not gone according to plan. It was likely they had attempted to use biomancy, which was extremely foolish considering only goats were capable of fully controlling such magic.\n\nThe damage done to the region will take a long time to undo. But with our aid, local nature will slowly but surely recover."
 cityfoul.1012.a: "Yet more proof of how stupid the lesser races are."
 
 cityfoul.1013.t: "The Forest of Mud"
 cityfoul.1013.d: ""They call the forest WHAT?" Grogar demanded from Oskar, who had lived near the forest in question for most of his life.\n"Umm... well, to repeat myself, the name translates roughly to-"\n"It was a rhetorical question," Grogar continued. "No matter how much I look down upon the lesser races, they still manage to disappoint me." He sighed. "Not only did the catbirds give it a humiliating name, but they've devastated the forest, cutting down half of it and massacring the local monster population. It will take decades for the forest to recover, if not centuries!"\n"Please, calm down," Oskar asked. "Anger will not help with any of that."\nGrogar snorted. "True. Well, you know what must be done. Deport the griffon population further away from forested areas, harvest whatever excess biomass can be found and utilize the local leylines for magical energy."\nOskar nodded. "Of course, my master. The Forest of Mud will be restored to its former glory eventually.""
 cityfoul.1013.d_alt: ""They call the forest WHAT?" Grogar demanded from Bray, his most faithful servant.\n"To clarify, the name translates roughly to-"\n"It was a rhetorical question," Grogar continued. "No matter how much I look down upon the lesser races, they still manage to disappoint me." He sighed. "Not only did the catbirds give it a humiliating name, but they've devastated the forest, cutting down half of it and massacring the local monster population. It will take decades for the forest to recover, if not centuries!"\n"You are unfortunately correct," Bray said with a nod. "But anger will not accelerate the process."\nGrogar snorted. "True. Well, you know what must be done. Deport the griffon population further away from forested areas, harvest whatever excess biomass can be found and utilize the local leylines for magical energy."\nBray nodded. "Of course, my master. The Forest of Mud will be restored to its former glory eventually.""
 cityfoul.1013.a: "Such savagery."
 
 cityfoul.1014.t: "It Had To Be Done"
 cityfoul.1014.d: "The Eygsic Forest was well known by the goats, but they were still surprised to find it teeming with giant, sapient spiders. Worse of all, these spiders were extremely protective of the local pony population and seemed to be driven by some magical force. As they stood in the way of Grogar, there was no choice but to exterminate the spiders. However, spiders kept appearing and attacking monsters and goats. Even the forest itself seemed to have turned against goatkind.\n\nGrogar remembered all those millenia ago when He had visited the Eygsic forest and admired its serene beauty. Now, it had been infested by ponies, the race that had once defied and banished him. They had corrupted the forest itself. He had no choice but to destroy the entire ancient wood. A tear flowed from his red eye when he proclaimed the order for flame-breathing chimeras to burn down the entire region.\n\nSoon a gargantuan forest fire engulfed all of Eygsic, burning down trees that had lived for countless centuries alongside spiders who could've been friends of goatkind. In the end, nothing remained but ash and charred, dead trees."
 cityfoul.1014.a: "This is the greatest tragedy so far."

 cityfoul.1015.t: "Forever Free"
 cityfoul.1015.d: "I have waited for the day\nTo send these greedy wolves away\nNow the magic is my salvation\nGather close in my protection\n\nWe... will... stand for Everfree!\n\nBehold the beauty of nature in all its glory\nNo need to fear the vultures at the door\nRight here you have me to protect you\nWithin these walls of thorns\nForever free, forevermore!\n\nTrust in me, this is for your own good\nDon't be afraid, nature is our friend\nAll of this beauty that surrounds us\nEvery lovely bloom designed to defend\n\nWe... will... stand for Everfree!"
 cityfoul.1015.a: "We will stand forever free."
 
 cityfoul.1016.t: "A Reminder Of Defeat"
 cityfoul.1016.d: "Grogar stood upon a hill and looked at the floating cloud-city of Cloudsdale in the distance. Even after centuries, it was still vaguely familiar despite all the changes.\n\nWhile the city had been moved to a completely different location, Grogar still remembered that fateful battle that had happened near it. A foolish pony named Gusty had led an army of unicorn warriors to face Him. He had been confident that He could wipe out the pitiful force by himself. When the unicorns formed a magical beam to bind Him, he used the power of fear to break through the bonds. Yet He had been too arrogant and underestimated his enemy. In the chaos of the battle, Gusty had managed to steal his Bewitching Bell, the source of his power, and use it to banish Him and Tambelon into the Realm of Darkness.\n\nGrogar had learned a lesson of humility. Never again would He underestimate the treacherous and cunning lesser races. And Cloudsdale... it simply had to be destroyed. As the lesson had been learned, He needed no reminder of his defeat all those years ago.\n\nHe snorted and turned away, walking down the hill while hundreds of flying monsters descended upon the cloud-city."
 cityfoul.1016.a: "It won't happen again."

 cityfoul.1017.t: "A Reservoir Of Magic"
 cityfoul.1017.d: "Key Lake was not only known for its unique shape on a map, but its magical properties. Similarly to magical forests, it is located above an intersection of leylines filled with magic. As such, the lake acts like a well of power that any capable mage can draw from. Not only that, but the cold waters are full of strange creatures that cannot be found anywhere else.\n\nSince Grogar's last visit to Key Lake, its shores had gained a considerable population of changelings. He reminded himself of the need to study the changelings' shapeshifting capabilities in case it would be possible to implement them on a monster. Possibly not, as the ability seemed more magical than biological in nature. Other notable inhabitants near the lake were polar bears, who were strangely sapient. As far as Grogar knew, polar bears were little more than animals, but had apparently gained sapience and even established a crude civilization of their own. He supposed goats could no longer use polar bears for the creation of bugbears, as due to moral reasons live sapient creatures were not used for the creation of monsters. Nevertheless, Key Lake would prove to be very useful as a source of magical power, if nothing else."
 cityfoul.1017.a: "This will be useful."

 cityfoul.1018.t: "Secrets Of Life And Death"
 cityfoul.1018.d: "The goats had reached another location full of magical energy, but found something completely unexpected. A coven of necromancers had established a city for themselves here, on top of an old storage site for failed goatish experiments. Grogar was amused as He remembered the baseless old rumours about Him being a necromancer. He had little respect for that arcane art. In fact, He didn't consider it art at all, unlike biomancy. Necromancy was about puppeting dead and rotten flesh, recycling of the old, rather than creation of the new. And while it was powerful and could be used to gain immortality, the same things were true for biomancy.\n\nThere was little skill involved in using magic to puppeteer corpses, unlike in biomancy, which required extreme precision to ensure organisms would remain functional and alive. Despite this, Grogar still considered necromancers to be a potential threat and ordered them all to be exterminated. Any undead animals recovered in the region could be reused for the creation of live biomass. The large supply of different bones would be especially useful."
 cityfoul.1018.a: "At least we can get something out of this."
 
 cityfoul.1019.t: "The Liberation Of Goatcasus"
 cityfoul.1019.d: "Goatlestan wasn't the only place in the world with a goat majority population. The Goatcasus mountains in northeastern Equestria were also inhabited by tens of thousands of goats, who had suffered under Equestrian pony tyranny for millenia. With the return of Grogar, they were seen as a fifth column and were treated as potential enemies, with many of them interned or placed under house arrest. So when the monstrous armies finally arrived, the local goats rejoiced and once again enjoyed the taste of freedom.\n\nA grand celebration was held in the mountains, the music echoing in the valleys. The party lasted long into the night. By the time the sun was raised, the goats were blissfully sleeping, content in their knowledge that they were now safe and free."
 cityfoul.1019.a: "This is what we're fighting for."

