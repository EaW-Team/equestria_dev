### Characters
 war_justification.301.e: "Grogar"
 SUPPLYAREA_439: "In a long forgotten primordial age, I, Grogar, the fleshbending master of goatkind, unleashed an unspeakable evil. I gave life to the foulest of creatures and allowed them to run wild, taking what they wanted and destroying the rest. My reign was a glorious, fear-soaked epoch of darkness.\n\nBut, a foolish pony warrior called Gusty stepped forth to oppose me. She failed to defeat me in direct combat, yet before the final blow was struck, she stole my Bewitching Bell. With it, she tore open a portal to another dimension, then flung me and the capital of Tambelon into the Realm of Darkness.\n\nThe remaining goats lost control of the monsters and our reign came to an end. They were slaughtered en masse, the few survivors scattering across the world, their magical powers and intelligence greatly diminished now that no one feared them anymore.\n\nYet not all goats forgot about their heritage. Some of them waited for millenia, preparing for the stars to once more align, so I could return and take my rightful place at the top of the world. Their patience was rewarded. The Father of Monsters has returned, and the world trembles in terror."

 ZAI_gote: "Gote"
 ZAI_gote_desc: "Ali Muhammad bin Hasan bin Ladan bin Muhammad Farhan bin Aziz, better known as Gote, was born into a family of goat émigrés from old Tambelon. They had split with Grogar over issues of doctrine, and fearing his revenge, they had settled in the lands of Osqat, where Gote would be born in the town of Koltbylia. In the lands around it, the clan of goats had founded their own, unofficial community of "Goatistan", and his father was recognized by his fellow exiles as their leader.\n\nIn his youth, Gote's father had warned him about the mysteries of old Tambelon and told him the stories of Grogar's tyranny. His father gave him a rich education, in no doubt to have a worthy heir. However, as Gote grew up, he dismissed his father's teachings and wandered off towards the mystical lands of Azir, where legends had located the goat's homeland.\n\nAs fate would have it, Gote arrived just as Grogar regained his powers. Grogar saw an opportunity in having Gote serve him, and the young wanderer was easily fooled into his service. To this day, it is not entirely clear if Gote understands whom he is serving..."

 ZAI_pomni: "Pom"

 ZAI_gary: "Gary The Goated"
 ZAI_gary_desc: ""In the first age, in the first battle, when the shadows first lengthened, one stood.\n\nHe chose the path of perpetual torment.\n\nIn his ravenous hatred he found no peace, and with boiling blood he scoured the umbral plains, seeking vengeance against the twisted ponies who had robbed him of his glory.\n\nAnd those that tasted the bite of his axe named him...\n\nGary the Goated.""

 FRN_donkey_chief: "Bray"
 FRN_donkey_chief_desc: "§gBray is a faithful servant of Grogar and the architect of his return. He is an Asstyrian donkey who was born as a lowly commoner. Much of his adult life was spent as a caravan guard, but everything changed when he discovered a crystal ball buried in the sands of Zebhara.\n\nThe ball spoke to him, and after initial hesitation, Bray spoke back to it. He was tempted to throw it away, but the magical power of the ball compelled him to keep it. Soon enough, Bray revealed his secrets to it, and the ball offered a deal. Grogar needed a loyal servant to aid with the summoning ritual, and in return, Bray would be rewarded. The donkey accepted the offer.\n\nBray followed the instructions closely and allowed himself to become a mere extension of Grogar's will. Now, he shall receive his reward.§!"

