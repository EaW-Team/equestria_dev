 penguin_folder:0 "Penguin Technologies"
 penguin_folder_desc:0 "Magical technologies and improvements specific to the penguin race."
 penguin_race:0 "Penguin Race"
 penguin_race_desc:0 "The penguins are a sapient species of bipedal, flightless and aquatic avians. They have a wide array of physical appearances as several types of penguins exist. Extremely proficient at swimming and incredibly resilient to the cold, they are very-well adapted to polar environments. Most penguins have no magical abilities, but some are gifted with ice magic. They are piscivores and do not practice agriculture."
 
 
