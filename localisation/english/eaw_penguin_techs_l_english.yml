l_english:
 penguin_folder: "Penguin Technologies"
 penguin_folder_desc: "Magical technologies and improvements specific to the penguin race."
 penguin_race: "Penguin Race"
 penguin_race_desc: "The penguins are a sapient species of bipedal, flightless and aquatic avians. They have a wide array of physical appearances as several types of penguins exist. Extremely proficient at swimming and incredibly resilient to the cold, they are very-well adapted to polar environments. Most penguins have no magical abilities, but some are gifted with ice magic. They are piscivores and do not practice agriculture."
 
 tech_waddle_on: "Waddle On!"
 tech_waddle_on_desc: "Penguins are aquatic avians, and thus are rather slow and clumsy on land, especially if there is no snow to toboggan on. In water, however, they are some of the best swimmers out of all sapient races."
 tech_penguin_winter_logistics: "Winter Logistics"
 tech_penguin_winter_logistics_desc: "Modern military equipment is often designed by races that are not adapted to the cold. Making adjustments based on inherent familiarity with cold conditions will allow for more efficient logistics and better performance of equipment."
 tech_penguin_mammoth_artillery: "Mammoth-Drawn Artillery"
 tech_penguin_mammoth_artillery_desc: "Mammoths can still be found roaming the wilderness in the far north. Some of them have been tamed by penguins, and though in the past they were used in the frontline, in modern warfare they would be more useful if used to pull or carry heavy weaponry in difficult terrain."
 tech_penguin_battle_shamans: "Military Angakkuit"
 tech_penguin_battle_shamans_desc: "The angakkuit have traditionally served a spiritual role in penguin society, capable of communing with spirits and healing injuries. Integrating them into the ranks of the military will allow them to provide direct support for the soldiers' morale and health."
 tech_penguin_marines: "Penguin Marines"
 tech_penguin_marines_desc: "As natural swimmers, penguin marines are among the best in the world. However, they should be reorganized into a proper modern fighting force who can do more than just conduct small-scale special operations."
 tech_penguin_ice_buildings: "Buildings of Snow and Ice"
 tech_penguin_ice_buildings_desc: "Since the age of Great Pengaia, penguins have constructed structures out of both ice and snow. The most famous such building is the Ice Citadel in the center of Thule. While they require subzero temperatures to be built, they can be remarkably sturdy and warm on the inside thanks to insulation. Modern construction methods can only improve these buildings."
 tech_penguin_fishing_whaling: "Industrial Fishing and Whaling"
 tech_penguin_fishing_whaling_desc: "Fishing, seal-hunting and whaling have been the lifeblood of penguinkind since immemorial times. Modern technologies and scientific studies have enabled the improvement of production rates, with sonar fish finders, powered drums, radio navigation, stern trawlers and explosive harpoons all allowing for industrial-scale production. The only concern is sustainability in the long term, but surely the sea will never run out of prey?"
 tech_penguin_refrigeration: "Magical Refrigeration"
 tech_penguin_refrigeration_desc: "Cold temperatures help greatly with food preservation, and penguins have a long tradition of using ice magic to keep food from spoiling for extended periods of time. By combining this tradition with new insulating technologies, food storage and transportation can be further improved."
 tech_penguin_cryogenics: "Industrial Applications of Cryogenics"
 tech_penguin_cryogenics_desc: "With the help of magic crystal technology, cryomancers can lower temperatures to extreme levels. This can be used in cryogenic applications, such as cryogenic hardening of metal and cryogenic milling."
 tech_penguin_seamonster_experience: "Applied Sea Monster Hunting Experience"
 tech_penguin_seamonster_experience_desc: "Many horrors lurk below frozen waters, and the penguin navy has centuries of experience slaying these beasts. This knowledge can work also when used against enemy ships. After all, there isn't much of a difference between a large ship and a monster."
 tech_penguin_divers: "Penguin Divers"
 tech_penguin_divers_desc: "Penguins are expert swimmers. Those who serve in the naval forces should take advantage of this fact, diving underwater to detect enemy torpedoes and mines. On the other flipper, those who serve in the marine corps can swim quickly to the shore during amphibious invasions."
 tech_penguin_expert_shipbuilders: "Expert Shipwrights"
 tech_penguin_expert_shipbuilders_desc: "Shipbuilding is as old as penguin civilization itself. Though technology continues to develop, penguins have always been quick to adapt, improving their construction methods constantly."
 tech_penguin_ice_carriers: "Ice Aircraft Carriers"
 tech_penguin_ice_carriers_desc: "Carriers are quickly revolutionizing naval warfare, but they are large and expensive ships. A much cheaper alternative has been proposed by penguin scientists: an aircraft carrier made out of an iceberg, using penguins' natural abilities of ice magic. Such an aircraft carrier would be superior to conventional carriers in many years. Not only that, but they have proposed using ice magic to turn any iceberg at sea into a temporary airstrip when needed."
 tech_penguin_cryomancer_company: "Penguin Cryomancers"
 tech_penguin_cryomancer_company_desc: "After hatching, some penguins are found to be naturally gifted with magical abilities. They are not heritable, and the reason for their emergence is unknown. These abilities allow a penguin to freeze anything with their gaze alone. Since ancient times, these penguins have been able to become cryomancers, who dedicate their entire lives to the study of ice magic. While they have always participated in war, modern times require new forms of military organization. Dedicated cryomancer companies will be far more effective in battle than lone cryomancers."
 tech_penguin_cryomancer_company_2: "Ice Shields"
 tech_penguin_cryomancer_company_2_desc: "Cryomancers can support soldiers by creating shields of thick ice when they are under fire, quickly providing temporary protection. This can be useful both on the defensive and the offensive."
 tech_penguin_cryomancer_company_3: "Hailstorms"
 tech_penguin_cryomancer_company_3_desc: "Cryomancers can not only freeze their enemies with their gaze, but can freeze vapour in the air, turning it into hardened and large hailstones. A large group of cryomancers can create entire hailstorms at will, pelting the enemy with deadly hail. This can have a wide area of effect, is effective against infantry and provides indirect "fire support" to friendly soldiers."
 tech_penguin_cryomancer_company_4: "Ice Armour"
 tech_penguin_cryomancer_company_4_desc: "While not as effective as the thick enchanted armour of the Iceclad Warriors, cryomancers can still create rudimentary ice armour for themselves that can provide basic protection against bullets and shrapnel."
 tech_penguin_cryomancer_company_5: "Freezing Tracks"
 tech_penguin_cryomancer_company_5_desc: "With enough practice and skill, cryomancers can immobilize vehicles by getting them stuck in either snow or ice, allowing soldiers with anti-tank weapons to finish them off."
 tech_penguin_cryomancer_company_6: "Icing Airplanes"
 tech_penguin_cryomancer_company_6_desc: "Icing is known to cause accidents for airplanes. However, until now cryomancers have been unable to use their magic against them due to distance. Thanks to special goggles made of magical crystals, cryomancers can freeze targets far away. This has allowed cryomancers to cause icing on airplanes flying above, causing them to fly with greater difficulty and possibly crash in the ground."
 tech_penguin_iceclad: "Iceclad Warriors"
 tech_penguin_iceclad_desc: "Griffon knights inflicted many defeats on the penguin army in the past, as their armour proved to be almost impossible to penetrate. After many years of research, a perfect counter has finally been developed. Inspired by both Knights and Panserbjørn, so-called "Iceclad" penguins will equip armour of enchanted ice and become almost invulnerable to conventional weapons. This armour, however, is heavy and requires cold temperatures to be fully effective."
 tech_penguin_iceclad_2: "Double-Layered Armour"
 tech_penguin_iceclad_2_desc: "Field testing has shown that while bullets and shrapnel can sometimes penetrate one layer of ice armour, the same is not true for two layers. Having two thinner layers of armour has proven to be more effective than one thick layer, because the first layer absorbs the impact's energy, allowing the second layer to stop further penetration."
 tech_penguin_iceclad_3: "Improved Mobility"
 tech_penguin_iceclad_3_desc: "One drawback of enchanted ice armour is its hindrance of mobility. Improved designs, relying on smaller interlocking plates, allow penguins to not only move more easily, but to swim more effectively."
 tech_penguin_iceclad_4: "Cryomancer Iceclad Warriors"
 tech_penguin_iceclad_4_desc: "Integrating cryomancers directly into the ranks of the Iceclad Warriors means they can use their magical abilities to support their compatriots. Ice magic can be used to reinforce damaged armour directly in combat, and can also be used offensively against enemies."
 tech_penguin_iceclad_5: "Lightweight Anti-Tank Weapons"
 tech_penguin_iceclad_5_desc: "So far Iceclad Warriors have been unable to use heavier weapons due to their already heavy armour. New technologies have resulted in the creation of effective anti-armour weapons that do not weigh down its user, such as grenades and AT rifles."
 tech_penguin_iceclad_6: "Heat-Resistant Ice Armour"
 tech_penguin_iceclad_6_desc: "Studies in ice magic have led to new discoveries that can be utilized to improve enchanted ice armour. Now, the armour exudes an aura of cold air that protects it from high temperatures and melting. This allows Iceclad Warriors to fight more effectively in hot regions."
 
