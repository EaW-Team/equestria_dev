 # Events
 penguin.1.t: "Project WINDIGO Annual Review"
 penguin.1.desc: ""Attention!" shouted the penguin guard, standing like a formidable pillar with a rifle resting on her shoulder. "The King is coming."\n   All the penguins inside the laboratory stared at the guard in shock. Then, in an instant, they exploded into motion, cleaning the tables and the floor, putting the chairs back in place and straightening their lab coats. But before they could finish, the guard at the door stepped aside, and King Charlton appeared.\n   He smiled as the penguins inside stared at him, frozen in place. "Happy Hearth's Warming, everypenguin!" he exclaimed in a humorous tone.\n   There was a collective sigh of relief as the penguins relaxed. One of them, wearing round thick glasses, hurried to him. "Oh your highness, we didn't expect you so soon! You didn't specify your time of arrival in your message earlier, and we were right in the middle of—"\n   Charlton raised his flipper. "Yes, Bertram, I wanted to surprise you all." Then he chuckled. "Seems I succeeded."\n   The scientist sighed. "I am glad you're in a good mood today, your highness. I hope this review doesn't dampen it."\n   Charlton's smile vanished in an instant. "What, do you have bad news to share? Exactly one year ago, it seemed you were making great progress!"\n   "Yes, we were, but the field demonstration isn't ready for today, I am afraid..."\n   "Hrm." The King nodded, frowning deeply. "When do you think it will be?"\n   "We'll try to get it ready within two moons! Promise!"\n   Charlton's eyes drifted away as he rubbed his chin with his flipper. "Should not be too bad then, if you truly believe you can get everything done four moons after that."\n   Bertram gulped. "Yes, we'll do our best, working around the clock if needed!"\n   "Remember, if you need any extra resources, simply send a request and I shall approve it. I want the project to remain on schedule."\n   The scientist nodded almost frantically. "Yes, I know, I know. Sorry we couldn't get the demonstration ready for today. I'm aware it's an important date, the four-year anniversary of the project's start date, but we simply couldn't get the machine to meet our high standards."\n   "It is fine, Bertram. The date is merely a symbolic one. Back then, I figured that the foolish pony holiday celebrating the banishment of the windigoes was appropriate, considering the name of the project. Now, how about we proceed with the annual review?""
 penguin.1.a: ""Yes, your highness.""
 
 penguin.2.t: "A Change of Course?"
 penguin.2.desc: "King Charlton's seat, delicately carved from ice, cracked beneath his weight. He glared at it and grunted. "I will have to get that replaced."\n   The four ministers seated around the table glanced at each other without saying a word.\n   Charlton lifted his gaze and looked at each of them with a polite smile. "So, gentlepenguins, shall we formally begin the meeting?"\n   "Yes, it's taken long enough," said the chief minister, Agnes, who then sighed with exasperation.\n   The minister of faith and justice, Theodore, then continued: "The agenda of this long-delayed meeting concerns your plans for the next winter. We unanimously recommend you to reconsider them."\n   Instantly Charlton's smile melted into a frown. "Reconsider them? At this late stage?"\n   "Maybe if you had met us earlier, it wouldn't be late," complained the minister of war, Hildred. "Anyways, my personal concern is that the military simply isn't ready yet. We need more time."\n   As the King glared at her, the Minister of revenue and public works, Edmund, also spoke: "The economy isn't ready either, your highness. We're simply not producing enough armaments to sustain a long conflict."\n   Charlton curled his flipper into a fist-like shape and slammed it on the ice table, cracking it too. The ministers went silent. "Enough! It is never going to be enough, no matter how long we wait. We have to strike as soon as possible, or we risk losing our greatest advantage, the element of surprise! Did I not explain all this to you fools before? We must take a risk."\n   "Please, your highness," pleaded Agnes in a much more desperate and conciliatory tone, "At least consider our alternative proposal!"\n   "It is a simple strategy of divide and conquer," Hildred continued. "Our enemy's political climate is already unstable. If we further drive a wedge into their society, they will fall into chaos and we can take advantage of it with much less risk."\n   "And by then, our war chest would be much more full too!" Edmund added, rubbing his flippers together.\n   Still glaring at them, Charlton nevertheless stroked the underside of his beak in thought."
 penguin.2.a: "Delay the war until an opportunity presents itself."
 penguin.2.b: "Proceed as planned."
 
 penguin.3.t: "Friends"
 penguin.3.desc: "A young griffon with golden feathers stood at the entrance to "Griffontown", the only part of Thule where buildings were made out of bricks, stone and wood instead of ice. He looked at penguins nearby waddling and sliding on their bellies with a smile, finding it amusing to look at. Then he saw a group of three penguins approaching him. Two of them were uniformed guards with rifles, and one was a young white and grey penguin who has barely half their size and wore a small crown on his head. The griffon raised his claw and waved to them. The teenager penguin said something to the other two, then left them behind and quickly waddled to him. "Hi, Edgar!" the griffon said happily in his squeaky voice."\n   "Hello, Sunny, how have you been?" the penguin replied, his voice hoarse and crackling, a sign of puberty.\n   "Let's talk about that later. Come, I wanna show you that restaurant I talked about!"\n   "Very well..."\n\nSoon enough the two were seated at an ethnic griffon restaurant, sharing a meal of steamed fish. "So, can you talk about how you have been now?" Edgar asked right after Sunny swallowed a forkful.\n   "Oh, um, yeah sure. Uh... actually, you heard of what happened at Weter Street last week?"\n   Egdar looked at him with concern. "You are dodging the question, what is wrong? You can tell me."\n   The griffon sighed. "Okay fine... my family's just been... thinking about moving back to Nova."\n   The penguin's eyes widened. "What? But why?"\n   "We're just worried. Your dad's passing new laws all the time making our life harder. I'm not sure it's safe for us to stay here..."\n   Edgar tried to offer a comforting smile. "Do not worry, friend, it is going to be fine. If needed, we can always try to talk to my father. I know he doesn't really... like you griffons, but I'm sure he'll listen to us!""
 penguin.3.a: "Sunny smiled back, and the two continued to eat."
 
 penguin.4.t: "Live Demonstration"
 penguin.4.desc: ""When you said within two moons, I did not expect you to cut it this close," Charlton grumbled as he followed Bertram down an icy hallway.\n   The scientist chuckled anxiously and glanced at him. "Well, I still kept my promise, didn't I?"\n   The King nodded. "I trust you have done a good job. Let us see the fruits of your labour, then."\n   The two entered a large room, with a throne of ice and a large shimmering machine of frozen metal with a brass horn on top of it. In front of the throne was a staff attached to the floor, with a blue crystal on its tip.\n   Bertram gestured towards the throne. "Please, sit down. It was made specifically for you."\n   He smiled, then waddled to the seat. "I must appreciate your attention to detail." However, as he sat down, he didn't quite fit, and had to squeeze himself slightly in between the armrests.\n   Bertram immediately looked alarmed. "Oh, it seems you... uh, your size has changed recently. My apologies, we expected it to remain the same-"\n   Charlton waved him off dismissingly with his flipper. "It is fine, this puny chair is not important! How do I use the magical magnifier?"\n   Bertram paused to regain his focus. "Ahem. Right. It is very simple. You focus your powers on the crystal in front of you. Then, the device will amplify your energies and channel them through the horn as wind of pure frost."\n   The King nodded, wrapped his flipper firmly around the staff, and gazed intensely upon the crystal. His brow furrowed as his eyes started shining brightly with unnatural blue light. Magical energy burst out of his eyesockets, hitting the crystal directly. Soon the machine whirred to life, and cold wind blew out of the horn. The room's temperature immediately dropped to freezing cold.\n   This made Bertram shiver, despite his thick layer of insulating feathers. "S-see, it works! W-within a few s-seconds, t-this tiny r-r-room is..." He checked a thermometer on the wall. "...F-fifty centigrades negative! Y-you can stop now!"\n   Charlton's eyes stopped glowing, and the machine went quiet. "Excellent. Negafook, the Spirit of the North Wind, has blessed us all." Unfazed by the cold, he turned to look at Bertram with his ice-cold glare. "But. Do you think you can accomplish your goal by next summer? Will it all work as I requested?"\n   Bertram rubbed himself with his flippers to warm himself up. "Y-yes, we've already been working on scaling up the technology. According to my calculations, it should have the desired effect, as long as we build enough machines.""
 penguin.4.a: "Charlton grinned and nodded."
 
 penguin.5.t: "It's Always Sunny"
 penguin.5.desc: "King Charlton sat upon a frozen throne and smiled when Prince Edgar finally arrived. However, his smile dissipated when he saw a young griffon with golden feathers besides him.\n   "Hello, father," Edgar said in a formal, polite tone.\n   "Greetings, my son," Charlton said with a furrowed brow.\n   The young penguin gestured towards the griffon with his flipper. "This is Sunny, my friend. We came here to ask why you're making life so difficult for griffons."\n   "Yeah, my whole family is packing to go south to Nova Griffonia!" Sunny added.\n   As Charlton looked at Sunny, he started smiling again, though there was uncomfortable intensity in his eyes. "Do not bother packing. Soon, there will be no Nova Griffonia for your family to go to." Then he stood up from his throne, standing twice as tall than either of the teenagers. He curled his flipper and raised it into the air, puffing out his chest. "Soon, there will be no place for anyone, but us penguins!" He sat back down on his throne with a grin. "Soon enough, the whole world will be frozen over. And you, Egdar, will inherit that world when you become king."\n   Both Egdar and Sunny stared at him with their beaks wide open. "No, father!" Edgar exclaimed in shock.\n   Again, Charlton's smile was gone. "WHAT?!" he shouted, glaring at his son.\n   Sunny was so startled that he hid behind Edgar, who nevertheless stepped forward. "I don't want to rule a world like that! And even if I did, it wouldn't be right!" Despite his words, his voice made it clear he was trying not to cry.\n   Charlton stood up again, looming above the two. "When you are king, you may decide what is and is not right!" he said, pointing at Edgar, but then slammed his own chest with a curled flipper. "But I am king now, and what I say is LAW! Is that clear?"\n   "But why should only penguins live here?" Edgar asked.\n   "Y-yeah, what's wrong with being a griffon?" Sunny asked.\n   "They're weak," Charlton snarled. "Can they withstand the cold like we can? Do they have frozen souls like us?"\n   "Why should we have to?" Sunny asked in desperation.\n   Charlton glared at the griffon and said nothing. His eyes began to glow an ominous blue. Then, two beams of bright light burst out of them, enveloping Sunny and covering him in a thick layer of ice in an instant.\n   "SUNNY!" Edgar screamed and started crying.\n   "He's been a bad influence on you," Charlton muttered. "You will not be listening to his nonsense anymore."\n   "H-how could you?!" his son asked.\n   "When you are king, you will understand these things.""
 penguin.5.a: ""GUARDS! TAKE THIS BODY AWAY!""
 
 penguin.6.t: "Influx Of Griffon Refugees"
 penguin.6.desc: "Reports have arrived from the northern border and the ports that hundreds, if not thousands, of griffons are fleeing from the Kingdom of the Penguins and moving to Nova Griffonia. Griffons have lived there for centuries, though most moved there during the reign of the penguin Queen Edith. Especially their capital of Thule has a sizeable griffon minority living in a quarter known as Griffontown. But according to our intelligence, the current King Charlton has passed laws persecuting griffons and increasing surveillance on them, making their lives increasingly difficult as they are accused of being foreign agents.\n\n[Root.GetLeader] has decided to issue a diplomatic protest, though there is not much else he can do besides making sure the immigrants and refugees are taken care of."
 penguin.6.a: "Outrageous!"
 
 penguin.7.t: "Weaving A Narrative"
 penguin.7.d_slow_and_steady: ""  #For example, if you find out about a crime committed by the Falcons of Griffonstone, amplify it, tell all about it, make it frontpage news. Especially if the victim if a penguin. Do not mention anything about the Nova Griffonian government trying to stop the Falcons. If Governor Teafeather makes a statement, interpret it in the most negative way possible.
 penguin.7.d_rush_war: "The owners of the Kingdom's most popular newspapers and radio stations, all of them penguins wearing tuxedos, sat around a table of ice. At the end of the table sat King Charlton himself. He smiled politely. "Now let us get into the heart of the matter. I summoned you here because I have a very vital task for each of you."\n   The other penguins exchanged anxious glances.\n   Charlton continued. "Despite all the efforts of the royal government, there seems to be a certain lack of urgency in our society. They do not seem to understand the grave threats we are facing. I believe it is your duty to inform the populace and ensure they are appropriately alarmed by the current situation."\n   One of the penguins raised a flipper. "But your royal majesty, there is nothing extraordinary to report, it is peaceful-"\n   The King frowned and interjected. "I know better than any of you what is happening. You would be wise to listen to my words, if you want to retain your publication and broadcasting licences."\n   The penguin who had talked snapped their beak shut.\n   "I am not asking you to lie, of course. I want you to take true events and put a spin on them, magnify them, exaggerate them. And omit everything that does not fit the narrative. For example, report any activity by the Nova Griffonian militia. Make any training exercises sound like preparation for an attack. Interpret Governor Teafeather's statements in a way that makes it seem like he wants to end our independence. In summary, I am asking you to create an atmosphere of fear and imminent danger. Do you all understand?"\n   A penguin gulped, another shifted in her chair uncomfortably and looked at the exit, a third penguin stared at the King blankly. But a fourth penguin smiled and nodded. "Yes, yes I think I do. Sensational news will sell more, won't they? I think this can be a mutually beneficial agreement."\n   Charlton grinned. "Indeed. We all stand to gain here.""
 penguin.7.a: "Bad news travels faster."
 
 penguin.8.t: "Baby, It's Cold Outside"
 penguin.8.desc: "Waves crashed against the rocky shores as Charlton admired the results of project WINDIGO in awe, smiling proudly. An array of gargantuan blower fans, made of both metal and ice, shimmered along the coastline, pointing directly south. "Truly a marvel of modern engineering and magic," Charlton mumbled.\n   "I am glad you're impressed by our hard work," Bertram said without sounding very glad at all. "Now come, everything is ready."\n\nThe two penguins waddled inside a building that was located behind the blowers. There, a series of magical magnifiers were lined up, each with a cryomancer seated behind it and waiting, except for one in the middle. That one was larger than the other ones and had a throne instead of a mere seat behind it.\n   "We uh, remade the throne to take into account your current bodymass," Bertram explained as he led Charlton towards it.\n   "Good. I must say, I am quite excited for this." The two waddled to the throne and the King tried to sit down, but once again he did not fit and had to squeeze in between the armrests.\n   "You gained even more weight?!" Bertram exclained, then cleared his throat. "Apologies, your majesty, we uh, we'll just remove the armrests later."\n   Charlton glared at him with an ice-cold stare. "It. Is. Fine. Like I said last time. Now, make sure everyone else is ready, and we can finally begin."\n   Bertram nodded and lied down on his belly, then slid across the icy floor to the control room. Soon enough, his voice could be heard from a loudspeaker. "Is everypenguin ready? We will begin in thirty seconds. Notify the staff if you are not."\n   Charlton looked at the crystal on top of the staff, then glanced at all the other cryomancers in the room. They, too, were staring at their crystals, ready to use their ice magic. Soon enough, all the most powerful ice mages in the Kingdom would channel all their power and bring an early end to the summer in Nova Griffonia. He grinned and turned back to stare at the crystal. Then, he could hear Bertram's voice from the loudspeaker:"
 penguin.8.a: ""Begin.""
 
 penguin.9.t: "Baby, It's Cold Outside"
 penguin.9.desc: "Reports are coming from all across Nova Griffonia of a sudden drop in temperature, confirmed by multiple weather stations. Inexplicably, the temperature has dropped below zero almost everywhere, with multiple snowstorms confirmed. As everygriffon has been taken by complete surprise, no preparations for this kind of weather have been made. This year's harvest is in serious danger as crops are unlikely to survive the cold if it continues, countless homes are without any heating and road conditions have rapidly worsened. Meteorologists have no rational explanation for this event, though they say the weather is caused by strong northern winds.\n\nThere are no historical records of there ever snowing this much in the middle of summer. Unless, of course, pre-colonial records of pony history are taken into account. Over a thousand years ago, this land was inhabited by three pony tribes. Squabbles between the unicorn kingdom, the pegasus stratocracy and the earth pony republic caused magical windigoes to appear and feed upon their hatred, bringing extreme cold with them even in the middle of summer. So far, there are no sightings of these mythical creatures, so for now [Root.GetLeader] has decided to declare a state of emergency in the nation and wait for more information."
 penguin.9.a: "Have the windigoes truly returned?"
 
 penguin.10.t: "Nova Griffonia Prepares For War"
 penguin.10.desc: "[This.GetNewspaperHeader]WETER - Worrying news comes from the south, as Nova Griffonia is reportedly conducting large-scale military training exercises and aggressively expanding its military. Not only that, but Teafeather has been reported to say "Our relations with the penguins (...) are strained (...) we must bring an end to this dispute, once and for all." These ominous words were accompanied by a fresh outbreak of violence aimed at the penguin minority in Nova Griffonia, as their corrupt and incompetent government does nothing about the rampant violence carried out by the far-right extremists of the Falcons of Griffonstone. It is clear that penguinkind must once again prepare for a possible confrontation with the griffons."
 penguin.10.a: "Worrisome and entirely trustworthy news."
 
 penguin.11.t: "The Penguins Offer Help"
 penguin.11.desc: "Diplomatic representatives of the Kingdom of the Penguins have approached Governor Teafeather and delivered an offer of help from King Charlton. They said they had learned about the unstable weather we have suffered from, and thanks to their "innate natural knowledge of cold climate that griffons lack" and cryomantic abilities, they would be able to help us. However, this aid would come at a price. The King demanded that we return the territory of the Frozen North to them, which would also mean repealing the Treaty of Boreasfjord. Signed in 931, the treaty had acknowledged the Frozen North as legal Nova Griffonian territory.\n\nTeafeather was uncertain of how to respond to this strange offer. He couldn't help but feel like the penguins knew more about the strange weather than they wanted to admit, though he did not outright accuse the penguins of causing it. This offer of help might've been more of a veiled ultimatum than anything. Whatever the case, it was clear the penguins would not return the weather back to normal unless their demands were met."
 penguin.11.a: "They can have their land back."
 penguin.11.b: "We're not scared of the cold."
 
 penguin.12.t: "Nova Griffonia Yields"
 penguin.12.desc: "Foreign minister Albert bowed before King Charlton. "Good news, your Majesty. The griffons have accepted our offer of help with the weather."\n   Charlton grinned. "Excellent. And they agreed to repeal the Treaty of Boreasfjord? They are returning the Frozen North to us?"\n   Albert nodded. "Yes, my King. Teafeather signed all the papers."\n   The king laughed. "Out of desperation, I am sure! He must really not like the cold. Well, I will deliver the good news to Bertram and the cryomancers. The magical magnifiers will be shut down, and the weather in the south should normalize within days. But this was just a taste of what is to come. Next time, the weather will be far worse." His grin grew malignant.\n   "I... understand, your majesty," Albert said, still trying to sound professional. "That was all I had to say. I shall now take my leave." Then the shorter penguin turned around and waddled out of the room, almost hurriedly.\n   Charlton looked at him leave and frowned."
 penguin.12.a: "We'll let them enjoy some warmth, for now."
 
 penguin.13.t: "Nova Griffonia Defies The Cold"
 penguin.13.desc: "Foreign minister Albert bowed before King Charlton. "Unfortunate news, your Majesty. The griffons have rejected our offer of help with the weather."\n   Charlton grinned. "I did not know Teafeather liked winter weather so much. Either that, or he'd rather freeze than repeal the travesty of the Treaty of Boreasfjord."\n   Albert nodded. "Indeed, they refused to return the territory of the Frozen North to us in exchange for our aid."\n   The king laughed. "So be it! They can hope in vain that summer will return. It will not. And next year, if they still defy us, it will be even worse. This was just a taste of what is to come." His grin grew malignant.\n   "I... understand, your majesty," Albert said, still trying to sound professional. "That was all I had to say. I shall now take my leave." Then the shorter penguin turned around and waddled out of the room, almost hurriedly.\n   Charlton looked at him leave and frowned."
 penguin.13.a: "Let's see if they can handle the cold like we can."

 penguin.14.t: "Fatherly Advice"
 penguin.14.desc: "A moon had passed since the incident with Prince Edgar's friend. Now King Charlton stood in front of an ice door, holding a book in his flipper. He took a deep breath. "Son, I want to talk."\n   There was no response.\n   Charlton frowned and opened the door. It had no locks installed.\n   Inside, Edgar was sitting on a pile of snow. He looked at his father in both fear and anger. "I did not say you can enter..."\n   Charlton ignored this and waddled closer to him. "I have been worried about you. You have spent an awful lot of time in your room. Were you truly so attached to that griffon?"\n   Edgar did not reply and pouted, crossing his flippers.\n   His father tried to offer a smile. "Son, please, you must understand. That griffon never had your best interest at heart, unlike me. You know how racist griffons are, he probably did not even see you as an equal, let alone as a Prince. Maybe he was simply trying to gain your trust to take advantage of you!" He chuckled.\n   Edgar's pout deepened and he looked away.\n   Charlton's smile disintegrated and he sighed. "I was afraid of this, I should have intervened earlier. You grew too fond of a griffon of all creatures... I apologize, my son. I have been very busy lately. But let this be a lesson for you. Griffons are much like dragons, our ancestral enemies. Both are greedy hoarders of treasure and cannot be trusted. Don't you remember what they did to your great grandmother?"\n   The Prince glanced at him. "That was... so long ago. Can we not leave the past behind us?"\n   "The past? My dear son, have you not seen the present? Griffons infest every continent in the world, outnumbering all other races. The entire misbegotten species should return to their natural habitat in the Hyperborean Mountains!"\n   Edgar now appeared more concerned than anything. "What happened to you, father? You never acted like this when I was younger."\n   Charlton blinked in surprise. "Oh. Well, you see, after your mother left, I lost all interest in politics. But when you grew up and no longer needed me, I found this wonderful book." He lifted the book in his flipper. "It filled a huge gap in my frozen soul and filled me with newfound purpose. My son, you should read it! Then everything starts making sense." He offered the book to his son, who reluctantly took it and read the title."
 penguin.14.a: ""'Souls of Ice and Fire' by Torben of Clan Svartpels"."
 
 penguin.15.t: "True Winter Arrives"
 penguin.15.desc: "The abnormally cold weather has shown no signs of stopping, meaning most of Nova Griffonia has been covered in snow for the past few moons. As a result, this year's harvest completely failed, but food stores should last until the next year. Now, according to the calendar, winter is supposed to begin, but there's been no reported changes to the weather. This simply means it is as cold and snowy as it normally is. Only time will tell if the snow will finally melt when spring is supposed to begin. Some griffons have criticized Governor Teafeather for refusing the penguin offer of help, and fear that if the winter continues, the offer won't be repeated."
 penguin.15.a: "We pray to Eyr."
 
 penguin.16.t: "Worker Dissatisfaction"
 penguin.16.desc: ""You wished to talk?" Charlton asked as he sat upon his throne of ice.\n   Harold, the captain of the Citadel Wardens, saluted him with his flipper. "Yes, your Royal Majesty. We have confirmed intelligence reports that the workers are threatening to go on a coordinated strike in both Thule and Nanuq, unless their demands are met."\n   Charlton stroked the underside of his beak. "Ah yes, this again. If I recall correctly, they were asking for reduced hours and increased pay?"\n   "You remember correctly, sire."\n   "Well, as reasonable as they are, giving in to their demands would have negative consequences. The factory managers would be upset, and production rates would fall. This is a direct threat to the goals of our national rearmament program!"\n   "The strikes are large enough that they will reduce production in any case. But we estimate they do not have enough resources at their disposals to keep it going forever, so it would be a temporary setback."\n   Charlton nodded in understanding. "How are they so coordinated, anyhow? Chief Minister Agnes outlawed worker unions many years ago."\n   "We believe it is the same culprit as always. The Socialist Action League, though we still know very little about the organization. They are good at hiding their tracks."\n   "Those communists in Nova Griffonia must be involved, I am sure... fanning the flames to weaken us. After this meeting, focus your efforts on investigating these foreign agitators."\n   Harold bowed obediently. "Of course, sire. But what will be done about the strikes?""
 penguin.16.a: ""Let them have their little temper tantrum.""
 penguin.16.b: ""I will pass a law to meet their demands.""
 
 penguin.17.t: "A Letter From The North"
 penguin.17.desc: "A curious message arrived in Canterlot Castle today, delivered by a remarkable creature: a penguin. She claimed to be a messenger for Prince Edgar, the son of King Charlton who rules over the penguins in the far north. The letter she brought with him was written for Princess Celestia herself.\n   "Your equine Majesty,\n   I am sure it is unusual to receive a letter from a penguin prince, but I write to you in desperation. My father, King Charlton, has been acting more and more strange in recent years. His heart is icy cold towards griffons, who I thought were our friends. I am not only afraid of him, but worried about what terrible things he might do in the future. I believe that perhaps you could send some ponies to my homeland to meet with my father and convince him of the values of harmony and the importance of friendship? I have heard only good things about you ponies and your land of Equestria. I would love to visit it one day. I admit this is the only solution I could think of. I hope you consider my request.\n   - Prince Edgar"\n   The letter was indeed odd, but Princess Celestia couldn't help but feel sympathetic. Besides, ensuring peace on Equus was in her best interest. So the question was not about whether to accept or refuse the request, but about who to send to the distant, frozen land of the penguins."
 penguin.17.a: "The Element Bearers will know how to deal with this."
 penguin.17.b: "The Element Bearers are needed elsewhere. Send a diplomatic delegation."
 
 penguin.18.t: "Unexpected Visitors"
 penguin.18.d_mane_six: "In the harbour of Thule, six colourful ponies disembarked from a ship that had arrived from the distant land of Equestria. One of them, a light blue pegasus, shivered from the cold.\n   "I d-didn't know it was g-gonna be THIS cold!"\n   A white unicorn, dressed in thick and elaborately decorated furs, rolled her eyes. "Darling, I told you to dress properly, and you said you can handle any kind of cold just fine."\n   "How was I supposed to know it's freezing here even in summer?!" the pegasus retorted.\n   "Calm down, girls, we need to focus on our mission," a purple alicorn said, even as penguins stared at her in awe. She smiled awkwardly at them and waved with her hoof. "Let's just head straight to the Citadel."\n   "I assume it's that giant towering castle over there?" an orange earth pony asked. "Woah, it really does seem to be made out of ice. I thought you were kidding."\n\nThe six ponies soon arrived at the gates of the Citadel, where two guards stopped them.\n   "...Um, excheese me?" a pink earth pony said. "We would NEVER come to a party UNINVITED! Don't be silly!"\n   "I apologize, but we have not been informed of your arrival," the penguin guard replied, trying his best to speak ponish. "Please wait here, I will ask my superior." With that, the guard waddled away.\n   "...I think it's cute how they move," a yellow pegasus said quietly.\n   "What?!" The remaining guard asked.\n\nAfter a while of waiting in the cold (the pegasus was now wearing some of the furs the unicorn had given her), the guard returned, but he was not alone. With him was the captain of the Citadel Wardens, as well as several other guards. They were all armed with rifles.\n   The six ponies looked at them in worry. "Uh, is everything alright?" the alicorn asked.\n   The captain took a deep breath. "I apologize, but orders are orders. We hereby take you prisoner in the name of his majesty, King Charlton the Great!""
 penguin.18.d_no_mane_six: "In the harbour of Thule, a group of ponies disembarked from a ship that had arrived from the distant land of Equestria. While the local penguins stared at them, they walked straight to the gates of the Citadel. There, two guards stopped them.\n   "...Excuse me?" one of the ponies asked. "We were invited here, I swear. Please, let us enter."\n   "I apologize, but we have not been informed of your arrival," the penguin guard replied, trying his best to speak ponish. "Please wait here, I will ask my superior." With that, the guard waddled away, leaving the ponies to wait in the cold. After a while, the guard returned, but he was not alone. With him was the captain of the Citadel Wardens, as well as several other guards. They were all armed with rifles.\n   The ponies looked at them in worry. "What is the meaning of this?" one of them demanded to know.\n   The captain took a deep breath. "I apologize, but orders are orders. We hereby take you prisoner in the name of his majesty, King Charlton the Great!""
 penguin.18.a: ""MOVE!""
 
 penguin.19.t: "Imprisoned In Ice"
 penguin.19.d_mane_six: ""How is it colder INSIDE than it is outside?!" the light blue pegasus exclaimed in disbelief, while shivering inside a cell where even the prison bars themselves were made of ice.\n   "'Cause this whole building is made of ice, y'know?" the orange earth pony replied. "It's like we're inside a giant fridge."\n   "These penguins are very rude imprisoning us like that," the white unicorn said. "I suppose Princess Celestia was right, they do need a lesson not just in harmony, but in basic manners!"\n   "Um... why are there statues of ice inside a cell?" the yellow pegasus asked while looking at an array of frozen griffons, their faces frozen in shock.\n   "That's a good question," the purple alicorn replied. "They uh, look very lifelike. In fact, I know magically gifted penguins are capable of freezing things with their ice-cold stare-"\n   "Y-you don't think they'll do that t-to us, do you?" the yellow one responded and started shivering even more than the blue one did.\n   "And one of them is wearing a coat!" the pink earth pony exclaimed, pointing at a young frozen griffon. "Maybe you could use it, Dashie!"\n\nAt that moment, the prison's door opened. The six ponies froze to stare at the entrant, who was a young penguin wearing a golden crown. "There you are. I apologize, I should have expected my father to imprison you... he probably suspects you of being spies."\n   "Ah, you must be Prince Edgar?" the alicorn said, "It's alright, we understand. My name is Twilight Sparkle, and these are my friends: Rainbow Dash, Rarity, Applejack, Fluttershy and Pinkie Pie."\n   "C-can you ask him about the f-frozen griffons?!" Fluttershy asked while hiding behind her wings.\n   Edgar turned to look at the statue with a jacket. "Ah... that one is my friend, Sunny. The others are suspected 'saboteurs' and 'enemies'. They were all frozen by my father. If you six were griffons instead of ponies, he would've frozen you too. This... is why I asked you to come here." He sighed heavily. "You can still say no and go back home, I suppose. I'll ask my father to let you go if you want."\n   The six looked at each other, then back at Edgar. "No," Twilight said, "We have to talk some sense to your father.""
 penguin.19.d_no_mane_six: ""This is an outrage," one of the ponies exclaimed. "Not only have they imprisoned diplomatic representatives of Princess Celestia, but they've locked them inside a cell made of ice! It's freezing in here!"\n   "Of course it's freezing, the entire building is made of ice," another pony replied. "You should respect their local architecture, it's part of their culture."\n   "Is keeping ice statues inside of a cell part of their culture too?" a third pony asked and pointed at an array of frozen griffons, their faces frozen in shock.\n   "Huh, I don't recall reading or hearing about that when studying penguin culture. Though I do know some penguins are magically gifted and capable of freezing objects with their gaze alone."\n   "...You don't think these are actual griffons who were frozen? Look, one of them is even wearing a coat for some reason."\n\nAt that moment, the prison's door opened. The ponies froze to stare at the entrant, who was a young penguin wearing a golden crown. "There you are. I apologize, I should have expected my father to imprison you... he probably suspects you of being spies."\n   "I presume you are Prince Edgar, then?" a pony asked. "You can assure your father we are not spies." She turned to look at the statues. "Could you uh, explain what these statues are?"\n   Edgar turned to look at the statue with a jacket. "Ah... that one is my friend, Sunny. The others are suspected 'saboteurs' and 'enemies'. They were all frozen by my father. If you all were griffons instead of ponies, he would've frozen you too. This... is why I asked you to come here." He sighed heavily. "You can still say no and go back home, I suppose. I'll ask my father to let you go if you want."\n   The ponies looked at each other, then back at Edgar. "No, we came all the way here, so we might as well try talking to King Charlton.""
 penguin.19.a: ""Let's go, then.""
 
 penguin.20.t: "A Royal Audience"
 penguin.20.d_mane_six: "As Prince Edgar waddled down a hallway of ice, followed by the six ponies, Captain Harold of the Citadel Wardens appeared from behind a corner. His eyes widened when he saw the prisoners not only freed, but accompanying Edgar himself. "Prince Edgar? I didn't expect to see you here."\n   He smiled. "His royal majesty, my father, wishes to have these ponies transferred to my custody."\n   "Ah, understood, sire." The Captain saluted him. "Carry on, then."\n   As the captain left, the ponies sighed from relief. "Don't worry," Edgar said, "my father's throne room is up ahead."\n\nSoon, they opened a large door of ice and entered. Inside, King Charlton was seated upon a brand new throne of ice, fitted to his size. At first he looked at the entrants with a smile, as if he was expecting visitors, but then frowned in anger when he realized who they were. "Edgar? What are you doing here with these prisoners? My son, you disappoint me."\n   "No more than you have disappointed me, father," Edgar replied defiantly.\n   "I am simply doing my duty." He stood up from his throne, looming over the ponies who were half as tall as he was. "Stand aside, Edgar." His eyes began glowing an ominous blue.\n   "H-he's going to freeze us!" the yellow pegasus exclaimed.\n   "No, father!" Edgar shouted, and stepped forward to shield the ponies. A moment later, a ray of bright magic struck him, turning him to ice in an instant. His crown fell off and clattered hollow on the frozen floor.\n   The six ponies gasped in shock. King Charlton himself stared at Edgar, not doing or saying anything. At that moment, a door to the side of the room opened, and Captain Harold entered, accompanied by armed Citadel Wardens. "My lord, the ponies- huh?" Now they too, stared at the frozen prince in the middle of the room, beaks wide open."
 penguin.20.d_no_mane_six: "As Prince Edgar waddled down a hallway of ice, followed by the ponies, Captain Harold of the Citadel Wardens appeared from behind a corner. His eyes widened when he saw the prisoners not only freed, but accompanying Edgar himself. "Prince Edgar? I didn't expect to see you here."\n   He smiled. "His royal majesty, my father, wishes to have these ponies transferred to my custody."\n   "Ah, understood, sire." The Captain saluted him. "Carry on, then."\n   As the captain left, the ponies sighed from relief. "Don't worry," Edgar said, "my father's throne room is up ahead."\n\nSoon, they opened a large door of ice and entered. Inside, King Charlton was seated upon a brand new throne of ice, fitted to his size. At first he looked at the entrants with a smile, as if he was expecting visitors, but then frowned in anger when he realized who they were. "Edgar? What are you doing here with these prisoners? My son, you disappoint me."\n   "No more than you have disappointed me, father," Edgar replied defiantly.\n   "I am simply doing my duty." He stood up from his throne, looming over the ponies who were half as tall as he was. "Stand aside, Edgar." His eyes began glowing an ominous blue.\n   "No, father!" Edgar shouted, and stepped forward to shield the ponies. A moment later, a ray of bright magic struck him, turning him to ice in an instant. His crown fell off and clattered hollow on the frozen floor.\n   The ponies gasped in shock. King Charlton himself stared at Edgar, not doing or saying anything. At that moment, a door to the side of the room opened, and Captain Harold entered, accompanied by armed Citadel Wardens. "My lord, I wanted to ask- huh?!" Now they too stared at the frozen prince in the middle of the room, beaks wide open."
 penguin.20.a: "..."
 
 penguin.21.t: "A Heart of Ice"
 penguin.21.d_mane_six: "King Charlton waddled closer to his frozen son, his face twisting in a mixture of emotions. "Hrm." He then turned to look at the Wardens. "...Well, what are you waiting for? Arrest the ponies!"\n   Captain Harold turned to look at them, then back at Charlton, still shocked about what he saw.\n   "Well?" Charlton asked.\n   "But sire, what of the Prince?"\n   "I... I don't know!" Charlton sputtered, his voice shaking as he looked at his son again. "He... he shouldn't have tried to interfere! He..." His throat tightened as he breathed heavily. "...He k-knew the risks!" He knocked on Edgar's icy head with his flipper.\n   Twilight had enough, and she stepped forward. "How can you be so cold? That was your son, and he's done nothing wrong! In fact, he's been very kind and polite, not only to us but to Princess Celestia in his letter to her."\n   "...He wrote a letter to her without my knowledge?!"\n   "How can you be so cruel to your family?" Applejack asked. "I thought this was an accident, but you ain't showing any signs of regret!"\n   Fluttershy flew closer to him, staring at him with such intensity that it made him cower in terror. "You can't freeze others like that! That's just... MEAN!"\n   Charlton visibly shrunk, but then realized he appeared scared and tried to puff up his chest. "...You're not penguins! Why should I listen to you?"\n   While five of the ponies still glared at him, Twilight sighed. "Look. All creatures have a heart, and the capability to be empathetic. You can't pretend to me that you don't have feelings. I saw them in your face. You act all cold and tough on the outside, but inside, you must have some warmth. Don't you love your son? Have you always been like this to him?"\n   "N-no, I..." Charlton's facade crumbled again. "We used to... go... sledding, and... I... remember holding him after he hatched, after his mother had left us... I raised him all by myself..."\n   "Then why did you not only freeze him, but his griffon friend as well? That griffon, too, has loving parents, I'm sure."\n   Charlton looked almost tearful. Harold and the Wardens stared at him silently, never before having seen him show any genuine emotion besides anger. The ponies, too, looked at him. Then, finally, he replied:"
 #Event too long
 #\n   Now Rarity stepped forward too. "In fact, it is you who should take a look at your reflection in the ice. How can you imprison us if we have done nothing wrong?"\n   "You should treat your guests better," Pinkie said, "at least offer them a welcome meal or something, instead of throwing them in jail!"\n   "And if you ARE gonna imprison us, then at least put them in a jail with HEATING!" Rainbow complained.
 penguin.21.d_no_mane_six: "King Charlton waddled closer to his frozen son, his face twisting in a mixture of emotions. "Hrm." He then turned to look at the Wardens. "...Well, what are you waiting for? Arrest the ponies!"\n   Captain Harold turned to look at them, then back at Charlton, still shocked about what he saw.\n   "Well?" Charlton asked.\n   "But sire, what of the Prince?"\n   "I... I don't know!" Charlton sputtered, his voice shaking as he looked at his son again. "He... he shouldn't have tried to interfere! He..." His throat tightened as he breathed heavily. "...He k-knew the risks!" He knocked on Edgar's icy head with his flipper.\n   One of the ponies stepped forward. "I see now why your son wrote Princess Celestia a letter, and why she decided to send us. The penguins are clearly led by a very cold-hearted monarch!"\n   "...He wrote a letter to her without my knowledge?!"\n   Now the other ponies stepped forward too. "This is no way to treat diplomatic visitors!" said one, "Not only is it immoral to imprison us, but the prison conditions were awful!" said another, "You can't just freeze others like that, let alone your SON, you heartless monster!", said a third one.\n   Charlton visibly shrunk, but then realized he appeared scared and tried to puff up his chest. "...You're not penguins! Why should I listen to you?"\n   "Your son is a penguin, did you listen to him? a pony replied. "Did you always treat him like this?"\n   "N-no, I..." Charlton's facade crumbled again. "We used to... go... sledding, and... I... remember holding him after he hatched, after his mother had left us... I raised him all by myself..."\n   "Not only that, but those griffons you froze also have loving parents, I bet. Are you capable of feeling empathy, or is your heart frozen solid?"\n   Charlton looked almost tearful. Harold and the Wardens stared at him silently, never before having seen him show any genuine emotion besides anger. The ponies, too, looked at him. Then, finally, he replied:"
 penguin.21.a: ""...What have I done?""
 penguin.21.b: ""...I-I won't fall for your manipulative trickery!""
 
 penguin.22.t: "The Heart Thaws Out"
 penguin.22.d_mane_six: "Warm liquid tears flowed down Charlton's feathery cheeks as he leaned down and picked up his son's crown from the floor. He placed it back on his frozen head and placed his flippers on his shoulders. Some of the tears dripped down onto his forehead. Charlton gave Edgar one last hug before letting go of him and walking away. "Nothing is worth the loss of my son!" he wailed.\n   "Perhaps if you undo your magic's effects?" Rarity asked.\n   "It's not reversible," Charlton mumbled. "What's done is done. I... I blame myself for my folly. It was my cold heart which..."\n   "Don't be sad!" Edgar said.\n   "No, I must finally face facts! And stop living in delusion like I have for so many years!"\n   "But father!"\n   Charlton frowned in frustration and turned around. "Edgar, how many times have I-" Then his eyes widened as he saw his son half-melted and smiling. "Edgar?!"\n   "Yes, father, and you did it! Only you could break your own cold spell!" The ice melted faster and faster, and soon he was able to waddle closer to his father.\n   "But how?" Charlton asked.\n   "Because you love him," Twilight said, "and you proved it with the tears that melted the coldness of your icy stare."\n   The King hugged the Prince tightly, lifting him off the floor. "Ah, this means... my son, if it makes you happy, then you can have your griffon friend back. If he's still alive after being frozen for so long, that is."\n   "Don't say things like that, father!" Edgar replied. "Let's go unmelt all the prisoners!" The two penguins left, waddling away in a hurry while leaving the ponies and the Wardens behind.\n   Harold turned to look at the equines and smiled. "Thank you for talking some sense to him. Truth be told, I've been worried about him for years now. Seems he finally came back to his senses and is back to how he used to be."\n   "That's what we do," Rainbow Dash said and crossed her forelegs, trying to appear cool. "Resolve conflicts by... talking. It's badass."\n   The captain chuckled. "Well then, I think it's time for you all to return home. I hope this is just the start of friendship between our two countries."\n   Twilight smiled. "I'm sure it is.""
 penguin.22.d_no_mane_six: "Warm liquid tears flowed down Charlton's feathery cheeks as he leaned down and picked up his son's crown from the floor. He placed it back on his frozen head and placed his flippers on his shoulders. Some of the tears dripped down onto his forehead. Charlton gave Edgar one last hug before letting go of him and walking away. "Nothing is worth the loss of my son!" he wailed.\n   "Can't you just unfreeze him?" a pony asked.\n   "It's not reversible," Charlton mumbled. "What's done is done. I... I blame myself for my folly. It was my cold heart which..."\n   "Don't be sad!" Edgar said.\n   "No, I must finally face facts! And stop living in delusion like I have for so many years!"\n   "But father!"\n   Charlton frowned in frustration and turned around. "Edgar, how many times have I-" Then his eyes widened as he saw his son half-melted and smiling. "Edgar?!"\n   "Yes, father, and you did it! Only you could break your own cold spell!" The ice melted faster and faster, and soon he was able to waddle closer to his father.\n   "But how?" Charlton asked.\n   "Your own tears must have melted him," a pony said, "Maybe it somehow negates your own ice magic? Though I'm no expert."\n   The King hugged the Prince tightly, lifting him off the floor. "Ah, this means... my son, if it makes you happy, then you can have your griffon friend back. If he's still alive after being frozen for so long, that is."\n   "Don't say things like that, father!" Edgar replied. "Let's go unmelt all the prisoners!" The two penguins left, waddling away in a hurry while leaving the ponies and the Wardens behind.\n   Harold turned to look at the equines and smiled. "Thank you for talking some sense to him. Truth be told, I've been worried about him for years now. Seems he finally came back to his senses and is back to how he used to be."\n   "We're just doing our duty," a pony replied and bowed respectfully.\n   The captain chuckled. "Well then, I think it's time for you all to return home. I hope this is just the start of friendship between our two countries.""
 penguin.22.a: "Farewell, little ponies."
 
 penguin.23.t: "Mission Successful"
 penguin.23.d_mane_six: "The Element Bearers -  or the "Mane Six" as they're sometimes called - have returned home from their long journey to the north. Princess Twilight Sparkle met with Princess Celestia and told everything about what happened.\n\nShe said that they had been imprisoned by the penguin King, Charlton, when they had tried to enter the Ice Citadel. Inside the prison, they had seen many frozen griffons, who had been turned to ice with magic. The six had then been freed by the King's son Edgar, who had originally written the letter asking for help. He led them to the throne room to meet his father, but the King then immediately tried to freeze them with his ice-cold stare. Edgar stepped forth and took the hit, turning to ice. Twilight and her friends then berated Charlton, and when he became emotional, she tried to reason with him and appeal to his empathy and emotions. This worked, and Charlton realized how cold-hearted he had become. He started to cry, which turned out to be a good thing as his tears instantly melted his frozen son.\n\nCharlton seemed to have had a change of heart, and though it was early to say, Twilight hoped the penguins would now embrace peace and harmony."
 penguin.23.d_no_mane_six: "The diplomats have returned home from their long journey to the north. They met with Princess Celestia and told everything about what had happened.\n\nThey said that they had been imprisoned by the penguin King, Charlton, when they had tried to enter the Ice Citadel. Inside the prison, they had seen many frozen griffons, who had been turned to ice with magic. The ponies had then been freed by the King's son Edgar, who had originally written the letter asking for help. He led them to the throne room to meet his father, but the King then immediately tried to freeze them with his ice-cold stare. Edgar stepped forth and took the hit, turning to ice. The ponies then berated Charlton, and when he became emotional, tried to reason with him and appeal to his empathy and emotions. This worked, and Charlton realized how cold-hearted he had become. He started to cry, which turned out to be a good thing as his tears instantly melted his frozen son.\n\nCharlton seemed to have had a change of heart, and though it was early to say, it was hoped the penguins would now embrace peace and harmony."
 penguin.22.a: "Well done, my little ponies."
 
 penguin.24.t: "Frozen Solid"
 penguin.24.d_mane_six: "Charlton backed away from both his frozen son and the ponies, his face twisting in disgust. "I... I realize now what has happened! You convinced my son to sacrifice himself, in an attempt to emotionally break me!" He pointed an accusatory flipper at the confused equines.\n   "What?" Twilight replied. "That's ridiculous, it doesn't even make any sense-"\n   "It all makes sense now!" Charlton continued, then nervously chuckled to himself. "You are trying to influence me into becoming an Equestrian puppet, even if it requires tricking me into punishing my own son. Well, I will not fall for it!" He again puffed up his chest and slammed it defiantly. "You flame-souls are just trying to make the whole world weak like you! Because empathy is weakness. Do you not understand that your precious ideas of 'harmony' and 'friendship' are unsustainable? I warn you, when the time comes for you to fight, being nice will not be an option and harmony cannot save you. The world is cruel, very cruel! No one can survive by being soft." Even as ponies continued to stare at him, now moreso in complete shock rather than confusion, he turned to look at his son again. "It is a shame what you made me do.... a real shame. But perhaps this, too, was calculated. Well, if you tried to weaken my Kingdom, you have failed! Edgar might have been a Prince, but in our realm, kingship is elected, not inherited. There is no line of succession for you assassins to cut!"\n   "This is completely absurd," Rarity finally replied.\n   "You've gone crazy!" Rainbow Dash shouted."\n   "You're just lying to make yourself feel better," Applejack said, as if she was ashamed of him.\n   "You're so mean..." Pinkie sniffled.\n   "And here I thought penguins were cute..." Fluttershy mumbled.\n   "SILENCE!" Charlton shouted. "When the King speaks, others shut up and listen. And I say you agents of decadence are BANISHED! Captain, lead them away!" He turned to look at the Wardens.\n   The Captain was stacking a pile of wooden rifles next to Edgar. "Quick, bring me a firestarter! We can still save the Prince!" he urgently said to nearby guard, completely ignoring Charlton.\n   "HAROLD! What in Sedna's name are you doing?"\n   "I'm trying to save the Prince, sire. There's still time-"\n   "I GAVE YOU AN ORDER! Escort these ponies out of here at once, or you're FIRED!""
 penguin.24.d_no_mane_six: "Charlton backed away from both his frozen son and the ponies, his face twisting in disgust. "I... I realize now what has happened! You convinced my son to sacrifice himself, in an attempt to emotionally break me!" He pointed an accusatory flipper at the confused equines.\n   "Excuse me?" one of the ponies replied. "It's nonsense to-"\n   "It all makes sense now!" Charlton continued, then nervously chuckled to himself. "You are trying to influence me into becoming an Equestrian puppet, even if it requires tricking me into punishing my own son. Well, I will not fall for it!" He again puffed up his chest and slammed it defiantly. "You flame-souls are just trying to make the whole world weak like you! Because empathy is weakness. Do you not understand that your precious ideas of 'harmony' and 'friendship' are unsustainable? I warn you, when the time comes for you to fight, being nice will not be an option and harmony cannot save you. The world is cruel, very cruel! No one can survive by being soft." Even as ponies continued to stare at him, now moreso in complete shock rather than confusion, he turned to look at his son again. "It is a shame what you made me do.... a real shame. But perhaps this, too, was calculated. Well, if you tried to weaken my Kingdom, you have failed! Edgar might have been a Prince, but in our realm, kingship is elected, not inherited. There is no line of succession for you assassins to cut!"\n   "As representatives of Equestria, we will not tolerate such slander of our homeland!" a pony replied. "Your accusations are entirely unfounded," said another. "Wait until Princess Celestia hears of this!" responded a third one.\n   "SILENCE!" Charlton shouted. "When the King speaks, others shut up and listen. And I say you agents of decadence are BANISHED! Captain, lead them away!" He turned to look at the Wardens.\n   The Captain was stacking a pile of wooden rifles next to Edgar. "Quick, bring me a firestarter!" he urgently said to nearby guard, completely ignoring Charlton. "We can still save the Prince!"\n   "HAROLD! What in Sedna's name are you doing?"\n   "I'm trying to save the Prince, sire. There's still time-"\n   "I GAVE YOU AN ORDER! Escort these ponies out of here at once, or you're FIRED!""
 penguin.24.a: "The Captain glared at him and obeyed."
 
 penguin.25.t: "Mission Failed"
 penguin.25.d_mane_six: "The Element Bearers -  or the "Mane Six" as they're sometimes called - have returned home from their long journey to the north. Princess Twilight Sparkle met with Princess Celestia and told everything about what happened.\n\nShe said that they had been imprisoned by the penguin King, Charlton, when they had tried to enter the Ice Citadel. Inside the prison, they had seen many frozen griffons, who had been turned to ice with magic. The six had then been freed by the King's son Edgar, who had originally written the letter asking for help. He led them to the throne room to meet his father, but the King then immediately tried to freeze them with his ice-cold stare. Edgar stepped forth and took the hit, turning to ice. Twilight and her friends then berated Charlton, and when he became emotional, she tried to reason with him and appeal to his empathy and emotions. However, this did not work and only made the King angrier, as he accused the ponies of manipulating him into freezing his own son. After a lengthy nonsensical rant about Equestria, empathy and harmony, he decided to banish them from his realm and sent them away.\n\nCharlton seemed to be a lost cause, embroiled in madness, and though it was early to say, it was possible the penguins would cause chaos and suffering in northern Equus."
 penguin.25.d_no_mane_six: "The diplomats have returned home from their long journey to the north. They met with Princess Celestia and told everything about what had happened.\n\nThey said that they had been imprisoned by the penguin King, Charlton, when they had tried to enter the Ice Citadel. Inside the prison, they had seen many frozen griffons, who had been turned to ice with magic. The ponies had then been freed by the King's son Edgar, who had originally written the letter asking for help. He led them to the throne room to meet his father, but the King then immediately tried to freeze them with his ice-cold stare. Edgar stepped forth and took the hit, turning to ice. The ponies then berated Charlton, and when he became emotional, tried to reason with him and appeal to his empathy and emotions. However, this did not work and only made the King angrier, as he accused the ponies of manipulating him into freezing his own son. After a lengthy nonsensical rant about Equestria, empathy and harmony, he decided to banish them from his realm and sent them away.\n\nCharlton seemed to be a lost cause, embroiled in madness, and though it was early to say, it was possible the penguins would cause chaos and suffering in northern Equus."
 penguin.25.a: "His heart is truly frozen solid."
 
 penguin.26.t: "Whispers in the Dark"
 penguin.26.d_worker_prot: "The sun had set and the workers of one of the larger factories in Thule (originally owned by a griffon company, and now nationalized by the crown) had gone home. Or so it seemed from the outside, as it was quiet and the lights were off. A lone penguin in a white uniform was the only one to disturb this silence, as he knocked on a small door on the side of the factory with his flipper. After a while, it opened with a loud creak, and he entered.\n\nInside, he was blinded by flashlights held by penguins. "You are Captain Harold?" one of them asked.\n   "Yes."\n   "You shouldn't be wearing your uniform. Someone might've seen you. The King has many eyes watching everywhere."\n   "I don't care," he replied wearily. "I'm here for the meeting."\n   "You wanted to meet our leader, but we do not fully trust you yet. We'll allow you to meet a representative of the Socialist Action League. Don't do anything stupid. We're prepared for it."\n   Harold tried to give a friendly smile. "It's fine. I'm tired of playing this game of cat and mouse between us. I'm here to bury the hatchet."\n   "Yeah, yeah. Follow us."\n\nThe group of penguins waddled deeper inside the dark, metallic bowels of the factory, then entered a hallway that led to a small room. Inside, another penguin was waiting. "Ah, Captain Harold, presenting himself on a silver platter," she replied with a chuckle. "You know you'd be a valuable hostage for us?"\n   "Do you want my help or not?" he said. "I have full command of the Citadel Wardens. The security of the King himself is my personal responsibility. And I will only aid you voluntarily."\n   "Relax, comrade, I was just kidding. Besides, we wouldn't be able to do anything with you, or your help, for that matter."\n   "...What do you mean?" he asked.\n   "We can't do it. The time isn't right. The worker protection law that the King passed sapped our support. We simply don't have enough penguins to pull it off."\n   Harold frowned. Deeply. "I understand," he grumbled."
 penguin.26.d_no_worker_prot: "The sun had set and the workers of one of the larger factories in Thule (originally owned by a griffon company, and now nationalized by the crown) had gone home. Or so it seemed from the outside, as it was quiet and the lights were off. A lone penguin in a white uniform was the only one to disturb this silence, as he knocked on a small door on the side of the factory with his flipper. After a while, it opened with a loud creak, and he entered.\n\nInside, he was blinded by flashlights held by penguins. "You are Captain Harold?" one of them asked.\n   "Yes."\n   "You shouldn't be wearing your uniform. Someone might've seen you. The King has many eyes watching everywhere."\n   "I don't care," he replied wearily. "I'm here for the meeting."\n   "You wanted to meet our leader, but we do not fully trust you yet. We'll allow you to meet a representative of the Socialist Action League. Don't do anything stupid. We're prepared for it."\n   Harold tried to give a friendly smile. "It's fine. I'm tired of playing this game of cat and mouse between us. I'm here to bury the hatchet."\n   "Yeah, yeah. Follow us."\n\nThe group of penguins waddled deeper inside the dark, metallic bowels of the factory, then entered a hallway that led to a small room. Inside, another penguin was waiting. "Ah, Captain Harold, presenting himself on a silver platter," she replied with a chuckle. "You know you'd be a valuable hostage for us?"\n   "Do you want my help or not?" he said. "I have full command of the Citadel Wardens. The security of the King himself is my personal responsibility. And I will only aid you voluntarily."\n   "Relax, comrade, I was just kidding. We wouldn't want to ruin this opportunity."\n   "When can you do it?" he asked. "I want the King gone as soon as possible."\n   "As soon as we're ready. But most things are already in place. We'll just have to go through the plan together and adjust it if needed. Then, I'll deliver your words to our leader, she'll approve the plan and the preparations will be finished. And then..."\n   Harold nodded. "And then this nightmare will finally end.""
 penguin.26.a: "Better luck next time."
 penguin.26.b: ""Precisely, comrade.""
 
 penguin.27.t: "Cleansing Action"
 penguin.27.desc: "A squad of a dozen penguins waddled in single file towards a secluded wooden village, nestled safely in a valley. Each penguin was in uniform and carried a rifle. Some griffons were outside when they saw the soldiers approaching, and the sight made them freeze in place. As they got closer, one by one the griffons ran away or flew off into the safety of their homes, except for one. A wrinkly griffon, missing most of his feathers due to hold age, glared defiantly at the visitors.\n   The penguins stopped right in front of him. "Good day," the leading penguin said, wearing an officer's insignia, crudely speaking in Nova Griffonian creole. "I suggest you go home, old bird, and pack your things. This village's population is being deported. Royal order."\n   Still, he glared. "I take no orders from kings," he muttered, "I only obey Emperor Grover."\n   The officer smiled while narrowing his eyes. "I'm afraid the Emperor hasn't had any authority here for decades. And now, neither does your Governor."\n   "I do not recognize any penguin authority. I've lived here my entire life, and I'm not leaving."\n   The penguin's smile faded. "Disobeying royal orders is a severe crime with a serious punishment. You might want to reconsider. Besides, you are living on stolen land."\n   "Stolen? You signed a darn paper giving it to us! You're the ones stealing it."\n   The officer sighed. "Look, we do not have time for this. The entire village is to be emptied by midnight." He turned back to face one of his soldiers. "Private, place this griffon under arrest for disobeying a royal order. The rest of you, go house to house and get everygriffon out of them."\n   The soldiers nodded and the private waddled closer to the old griffon, who stepped back. "Don't touch me! You're the criminals here! There are young chicks living here, you can't just kick them out of their homes!"\n   The private unshouldered her rifle and aimed it at the griffon. "Orders are orders. We will use force if necessary. Please cooperate with us."\n   He grimaced in spite even as he saw dozens of griffons being herded out of their homes at gunpoint, carrying hastily packed belongings on their backs. He looked into the eyes of the soldier and grumbled:"
 penguin.27.a: ""Boreas will punish you for your sins.""
 
 penguin.28.t: "Refugees From Frozen North"
 penguin.28.d_nova: "Reports are coming from the northern border about tens of thousands of griffons crossing it. According to what information we have, they are all civilians who have been deported from the Frozen North, as [PNG.GetNameDef] seems to have decided to ethnically cleanse the province of its griffon minority. The deportation was done rather hastily, and many griffons are sick, hungry or tired. Many of them are only carrying what few belongings they were able to take with them.\n\nThe border guards are doing what they can to provide food and shelter, but the tide of refugees is massive and they are overwhelmed. [Root.GetLeader] has promised swift action to provide everything the refugees would need, also saying they will later be given free land and homes. In the meantime, [Root.GetAdjective] diplomats have officially denounced the [PNG.GetAdjective] government for this criminal act."
 penguin.28.d_not_nova: "Reports are coming from Skyrim about tens of thousands of griffons crossing the strait on boats and ships. According to what information we have, they are all civilians who have been deported from the Frozen North, as [PNG.GetNameDef] seems to have decided to ethnically cleanse the province of its griffon minority. The deportation was done rather hastily, and many griffons are sick, hungry or tired. Many of them are only carrying what few belongings they were able to take with them.\n\nThe coast guard are doing what they can to provide food and shelter, but the tide of refugees is massive and they are overwhelmed. [Root.GetLeader] has promised swift action to provide everything the refugees would need, also saying they will later be given free land and homes. In the meantime, [Root.GetAdjective] diplomats have officially denounced the [PNG.GetAdjective] government for this criminal act."
 penguin.28.a: "How could they do this?"
 
 penguin.29.t: "Penguins At Arms"
 penguin.29.desc: "King Charlton inspected the ranks of militiapenguins in front of him. He could clearly see they were not true soldiers, as they couldn't even stand in a straight line, let alone remain still and silent. Some of them were too fat or too skinny, or too short. But despite all this, he could still see what mattered most. The cold, determined looks in their eyes. He stopped in front of their leader, a young and muscular penguin covered in tattoos who saluted him.\n   "The Black and White Storm stands ready to serve, your majesty! I hope you like what you see."\n   Charlton offered a slight smile, mostly out of courtesy. "Yes, I do. They seem eager to fight."\n   "These chicks have prepared their whole lives for this moment! There is nothing more glorious than to battle for your race and nation."\n   He nodded. "Yes... in any case, I will sign a decree that will turn your paramilitary organization into an official military unit. I will turn a blind eye to all your crimes, but rest assured they will not be pardoned unless you all do your part."\n   "Understood, my King!" the leader quickly exclaimed, as if desperate to redeem himself."
 penguin.29.a: "It's better than nothing, at least."
 
 penguin.30.t: "The Storming of the Citadel"
 penguin.30.desc: "King Charlton looked outside a window made of transparent ice. Down below, in front of the Citadel, he saw an enormous mass of black and white. Thousands of penguins, many carrying signs and waving red banners. He frowned. "What is this? These protesters do not have a permit." He turned around to look at Captain Harold, who was standing at attention behind him, flanked by several silent guards. "Why has this protest not been dispersed by the Wardens, Captain?"\n   "Sire, the common penguins are upset," Harold replied, ignoring the question. "Their demands were not met and the strike is still going on. I am afraid it was only a matter of time before this happened."\n   Charlton's eyes bore into him with suspicion. "Nonsense, they are paid foreign agitators, like I said before. This stunt was probably organized by foreign intelligence services." He then heard loud shouting coming from outside, and hastily turned back to the window. He saw the protesters flooding inside the courtyard of the Citadel as the gates had been opened. His eyes widened as he gasped. "What Aipaloovik's devilry is this?!" Again, he faced the captain. "The Wardens are committing an act of treason-"\n   Harold was holding a pistol in his flipper, aimed directly at the King's head. His face was stern and emotionless. "Sire, you are under arrest for assaulting the innocent Prince with your magic."\n   Charlton stared at him in silent shock, his beak wide open. Then, he regained his composure and said "I see. You are hereby dismissed from your position, ex-Captain." He looked at the guards next to Harold. "Arrest this traitor at once! Unless there are no more loyal penguins left in this gods-forsaken Kingdom!"\n   The guards said nothing as they waddled closer to him and grabbed him.\n   "Let go of me! I AM YOUR KING! TRAITORS! MAY ANGUTA CARRY YOU STRAIGHT TO TARTARUS! I WILL FREEZE YOU ALL TO DEATH!"\n   "You have the right to remain silent," Harold replied, pressing the ice-cold pistol against his forehead. "If you understand what I mean.""
 penguin.30.a: "Charlton's beak snapped shut."
 
 penguin.31.t: "The [GetMonth] Revolution"
 penguin.31.desc: "A huge red banner fluttered on the pinnacle of the Ice Citadel. Inside, the hallways were filled with armed penguins who had red bands of cloth around their flippers. Rooms were vandalized, the dungeons were emptied and then re-filled with the former King and his ministers. Inside the throne room, Charlton's throne of ice had been toppled.\n   Outside the Citadel, Harold stood in the courtyard while he saw complete chaos unfold around him. The protester penguins were carrying everything valuable out of the Citadel and throwing them into a huge pile of gold and silver. His own Wardens simply stood by and watched. But he was not there to spectate. His eyes widened when he finally saw the person he had been waiting for.\n   Escorted by her personal bodyguard, the elusive leader of the Socialist Action League entered the Citadel's courtyard. Quite unusually, she was a pegasus pony, wearing warm fur clothes and glasses. She smiled and raised her hoof in greeting as working-class penguins all around her saluted her. Harold stared at her, even as she stopped in front of him. "Captain Harold, yes?" she asked, fluently speaking the penguin language.\n   He nodded. "I was trying to find you for years, and now you simply walk in front of me... we live in strange times."\n   She chuckled softly. "We do. That's because revolution is in the air. Not just here, but all around the world. Can you smell it, captain? The sweet air of socialism?"\n   Harold gulped. He had never cared much for that ideology. "Uh, yes, ma'am."\n   Her smile widened. "Good! In that case, you can keep your job for now. Unlike some folks in my party, I am not opposed to cooperating with former monarchists. Of course, I've already taken your family hostage to ensure your loyalty, just so you know."\n   Harold felt like he was choking, but tried his best to maintain a rigid appearance. "I... understand..."\n   "Now, if you excuse me, I have a lot of work to do. We can talk later, captain. Thank you for your assistance, we couldn't have done this without you!" With that, she walked past him, leaving him to stand alone, staring far off into the distance."
 penguin.31.a: "Down with the King! Long live communism!"
 
 penguin.32.t: "An Opportunity To Strike"
 penguin.32.desc: "A guard offered a letter to King Charlton, his flipper wrapped around it. "Your Majesty, an urgent message from our spies in Nova Griffonia."\n   Charlton looked at the letter with a frown and immediately grabbed it. "Thank you, soldier. You are dismissed." He ignored the guard's salute as he hastily opened the letter, though he did not read the confidential message until the guard had turned his back on him. Then he quickly read through it. "Governor Teafeather agreed to Governor Muck's request for funds..." he mumbled out loud, "A guarded caravan has left Weter... expected to arrive in Frosthill tomorrow...." He looked up from the letter at the departing guard, who was already far down the icy hallway. "HALT! Come back here, I need you to deliver a message at once!"\n   The guard waddled back to him as fast as he could. "Yes, my King. Is it a response to the spies?"\n   Charlton shook his head. "No, no. A message to Clan Galtung in Sverdrup. I want them to prepare a raiding party, without any identifiable insignia. Actually, no, it is better I write it myself, so I do not have to rely on you remembering what I say..."\n   The guard seemed perplexed. "Your Highness, a raid? But we are at peace."\n   Charlton glared at him. "Officially, yes. What of it?"\n   "Apologies, I was just confused. You must know what is best for our Kingdom."\n   Doubt now crept into the King's expression, when just a moment ago he had been confident. For a moment, he stood in place silently. Then, he said:"
 penguin.32.a: ""Come, follow me into my study. I will write the letter.""
 penguin.32.b: ""You are right. I should not disturb the peace... yet.""
 
 penguin.33.t: "Polar Bear Raid!"
 penguin.33.desc: "Our border guards have reported that a caravan from Nova Griffonia, carrying the funds requested by Governor Muck, was attacked by a group of armoured polar bear warriors. The raiders killed many of the caravan guards, captured the funds, and were last seen taking them northwards. Thankfully, a flying survivor managed to deliver the news quickly, so if decisive action is taken immediately, there is still a chance to intercept the raiders and take back what was stolen. Of course, such an action would be risky and possibly result in many deaths, so Governor Muck is hesitant on how to respond."
 penguin.33.a: "There is nothing we can do."
 penguin.33.b: "We need those funds! Retake them at once!"
 
 penguin.34.t: "Polar Bear Raiders Seized The Funds"
 penguin.34.d_nova: "Bad news have arrived from the west. The caravan carrying funds sent to the Frontier was intercepted by ferocious polar bear raiders, who killed the guards and seized all the wealth. Governor Muck of the Frontier had a chance to respond, but did nothing, so the raiders managed to get away with their ill-gotten gains. Without the funds, it is uncertain what will now happen to the Frontier."
 penguin.34.d_not_nova: "A polar bear warrior, wearing gleaming armour, bowed before King Charlton. She was massive in comparison, yet tried her best to appear smaller before her monarch. "My Divine King, we have returned from our raid. The griffon funds were seized, and we only took eighty four casualties, out of which only thirty one died."\n   Charlton couldn't help but grin widely. "Excellent work. Clan Galtung has proven its loyalty once again. You shall have your share of the spoils, as agreed. The rest will go directly to the crown."\n   The polar bear nodded. "As you wish."\n   "Did the griffons realize your origin? Or find out who gave the order for the raid?"\n   She shook her head. "No, your majesty. They are none the wiser. Perhaps they will blame the western clans for this, I do not know."\n   "I suppose we shall find out." Charlton sighed in relief. "In any case, well done. You are now dismissed.""
 penguin.34.a: "This is a disaster..."
 penguin.34.b: "The perfect crime."
 
 penguin.35.t: "Raid Failed"
 penguin.35.desc: "A polar bear warrior, wearing gleaming armour, bowed before King Charlton. She was massive in comparison, yet tried her best to appear smaller before her monarch. "My Divine King, we have returned from our raid. But..." She sniffled, holding back her tears. "W-we failed... though we initally seized the griffon funds, we were attacked by another group of griffons on the way home, and were utterly routed... over two hundred of us-"\n   Charlton's face twisted in fury. "WHAT?! How were mighty polar bear warriors beaten by a bunch of catbirds? Clan Galtung has never failed us like this!"\n   The polar bear prostrated herself before him. "I beg you, your majesty, have mercy! We did our best, we simply did not expect to be attacked from above-"\n   "Spare me from your excuses," Charlton growled. "Did the griffons realize your origin? Or find out who gave the order for the raid?"\n   She frantically shook her head. "N-no, your highness. They are none the wiser. Perhaps they will blame the western clans for this, I do not know."\n   "I suppose we shall find out." Charlton sighed deeply. "In any case, go lick your wounds. You are now dismissed.""
 penguin.35.a: "A shame."
 