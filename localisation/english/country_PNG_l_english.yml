 # National spirits/ideas
 PNG_communist_agitators: "Communist Agitators"
 PNG_communist_agitators_desc: "Economic mobilization and conscription have made many working-class penguins rather upset. Communist agitators, likely supported by Stalliongrad, have capitalized on this opportunity, spreading vile propaganda and riling up the commoners."
 PNG_rearmament_program: "National Rearmament Program"
 PNG_rearmament_program_desc: "Already launched in 995 ALB by King Charlton's militarist ministers, the National Rearmament Program has been greatly expanded in recent years. The NRP aims to increase the size of the penguin military, to "safeguard the realm against foreign threats", primarily by mobilizing the economy and pouring funds into the arms industry and jingoistic propaganda."
 PNG_treaty_of_boreasfjord: "The Treaty of Boreasfjord"
 PNG_treaty_of_boreasfjord_desc: "Signed in 931 ALB by Queen Edith, the Treaty of Boreasfjord acknowledged the region of the Frozen North as lawful Nova Griffonian territory, granted the griffons full fishing rights in penguin waters, and removed all barriers on trade and investments between the two countries. While this ensured peace between the two nations and stimulated rapid industrialization and growth, the economic troubles of Nova Griffonia following the collapse of the Griffonian Empire in 978 ALB have made the treaty rather unpopular among the populace. King Charlton has actively tried to work around the treaty, but for now it remains in effect."
 PNG_fishing_barons: "Fishing Barons"
 PNG_fishing_barons_desc: "The fishing industry is the lifeblood of the Kingdom, and it is almost entirely controlled by a small number of influential families. These so-called "fishing barons" organize the Kingdom's vast fleet of fishing boats and icebreakers and are thus responsible for feeding much of the populace. They have ancient privileges granted to them by kings and queens long ago as a recognition of their importance, but they are prone to abusing their power and are generally disliked by the common penguins."
 
 PNG_recruitment_campaign_idea: "Recruitment Campaign"
 PNG_recruitment_campaign_idea_desc: ""The King wants YOU to join the Royal Army! Waddle on to your nearest recruitment station and enlist now!""
 PNG_lower_training_standards: "Lowered Training Standards"
 PNG_lower_training_standards_desc: "As long as you know how to use a rifle and take cover, you're good enough."
 PNG_anti_griffon_laws_idea: "The Anti-Griffon Laws"
 PNG_anti_griffon_laws_idea_desc: "The very unsubtly named "Anti-Griffon Laws" have led to a rapid worsening of the conditions of the griffon minority in the Kingdom. Most notably, Griffontown in Thule has been fenced off, with guards checking anyone who comes and goes. All "racist and imperialist" griffon schools have been closed down. Communications by griffons are closely surveilled and anygriffon suspected of criminal activity is immediately arrested. All this has driven many griffons to emigrate out of the country to Nova Griffonia."
 PNG_GRF_griffon_immigrants: "Griffon Refugees"
 PNG_GRF_griffon_immigrants_desc: "Griffons are fleeing persecution in the Kingdom of the Penguins and immigrating back to Nova Griffonia."
 PNG_propaganda_idea: "Media Propaganda"
 PNG_propaganda_idea_desc: "The penguin newspapers and radio stations all spread word of the crimes committed by Nova Griffonians and the threat they pose to the existence of penguinkind."
 PNG_worker_protections: "Worker Protections"
 PNG_worker_protections_desc: "King Charlton passed a law to reduce maximum working hours and increase minimum wages for all workers in the country."
 PNG_stolen_GFF_help: "Stolen Nova Griffonian Funds"
 PNG_stolen_GFF_help_desc: "In a daring raid, brave warriors of Clan Galtung managed to steal the funds Nova Griffonia had sent to the Frontier. While the polar bears have taken their share, the rest has been used by the royal government to boost the economy."
 PNG_martial_law: "Martial Law"
 PNG_martial_law_desc: "Civilian law is no longer in effect, curfews have been imposed and soldier patrol the streets. Suspected criminals (many of whom are griffons or socialists) are trialed by military courts."
 PNG_secret_police_idea_lr: "Kingdom's Guardian Penguins"
 PNG_secret_police_idea_lr_desc: "The KGP is an organization entirely dedicated to internal and external security of the Kingdom. They have the authority to do whatever is required to fulfill their duty."
 PNG_secret_police_idea_no_lr: "Kingdom's Guardian Penguins"
 PNG_secret_police_idea_no_lr_desc: "The KGP is an organization entirely dedicated to internal and external security of the Kingdom. They have the authority to do whatever is required to fulfill their duty."
 
 # Focussies
 PNG_meeting_advisors: "Meet With the Royal Ministers"
 PNG_meeting_advisors_desc: "My trusted ministers have expressed concerns about my plans and have requested a meeting. Of course, getting five of the most important and powerful penguins in the Kingdom to be in the same room at the same time is a scheduling nightmare, so it is unfortunately going to take a while. In the meantime, I will ensure everything will proceed exactly as I have planned."
 
 PNG_recruitment_campaign: "Launch a Recruitment Campaign"
 PNG_recruitment_campaign_desc: "Though our population might be small, we can compensate for it by recruiting a larger portion of it into the army. Besides, an army might have all the weapons and fortifications in the world, but without soldiers to use them, they are all worthless. Generous payouts should motivate enough penguins to enlist without having to rely solely on conscription."
 PNG_mil_industry: "Rapid Expansion of Arms Production"
 PNG_mil_industry_desc: "A penguin without a weapon is not much of a threat to anycreature. For the coming war, a reliable domestic supply of armaments is essential. I shall pour royal funds into the expansion of arms manufactories owned both by the crown and by private companies. Whoever calls it a waste of money does not comprehend that this is a matter of our survival."
 PNG_lower_standards: "Lower Training Standards"
 PNG_lower_standards_desc: "The window of opportunity is limited, as in time our enemy can no doubt leverage their greater socioeconomic potential and reform their ragtag army of militias. Thus I need as many units out in the field as possible. I do not care if they are experts of war, I simply need penguins with rifles in their flippers to occupy the frontline."
 PNG_anti_griffon_laws: "Pass the Anti-Griffon Laws"
 PNG_anti_griffon_laws_desc: "The griffon minority in our Kingdom is a potential fifth column. Any conflict with the imperialist colonizers would result in these traitors showing their true colours, sabotaging our defensive efforts and putting our survival in jeopardy. But I know what I must do. Pre-emptive action will be taken to ensure these four-legged catbirds pose no threat to us at all."
 PNG_raise_militias: "Muster the Militia"
 PNG_raise_militias_desc: "Chief Minister Agnes supported the creation of various paramilitary organizations many years ago. Now it is finally time to put them into good use. The militiapenguins will be called to arms and integrated into the regular army to bolster our ranks. While they are yet to prove themselves in battle, I- we need all the help we can get."
 PNG_prepare_borders: "Prepare the Borders"
 PNG_prepare_borders_desc: "We must ensure the borders are ready to face the coming onslaught. Fortifications must be built, railways extended and logistics improved. The work must be done as quickly as possible, both day and night if necessary. It will not be cheap, but I will not spare any expenses when national survival is at stake."
 PNG_impose_martial_law: "Impose Martial Law"
 PNG_impose_martial_law_desc: "War is soon upon us, against our will. The country must be prepared for griffon aggression. As such, I have no choice but to temporarily suspend civilian law. We cannot allow agitators to take advantage of the situation and spread disunity and unrest among penguinkind. The army will ensure peace and order in the streets."
 PNG_repurpose_fishing_boats: "Repurpose Fishing Vessels"
 PNG_repurpose_fishing_boats_desc: "Our fishing fleet is several times larger than our actual military fleet. While those ships have not been designed for warfare, they are good enough for combat with a few modifications. The fishing barons will not be pleased by this quick requisitioning, but they must understand everyone must make some sacrifices for the greater good."
 PNG_attack_nova_griffonia: "Defend Against Nova Griffonia"
 PNG_attack_nova_griffonia_desc: "They've really done it now. The dastardly griffons have launched an illegal and unjustified invasion of our Kingdom, with no prior warning or formal declaration of war! I will order the military to repel these bandits at once and push them back into the sea where they came from. Now is the time for heroic anti-imperialist liberation!"
 
 PNG_support_fishing_barons: "Support the Fishing Barons"
 PNG_support_fishing_barons_desc: "The fishing barons have long complained about griffon domination of the shipping and fishing industries. I shall introduce various laws that will make it harder for griffons to sell naval vessels to us and add bureaucratic obstacles for their attempts to fish in our waters. This should vitalize our domestic shipping industry."
 PNG_civ_industry: "Protect Domestic Industry"
 PNG_civ_industry_desc: "In the past few years, I have decreed the lawful nationalization of many factories owned by Nova Griffonian private companies. While this was a good start, these same companies are now simply exporting their products to our market. I will put an end to this with decisive tariffs that will make domestic goods much cheaper, stimulating local production."
 PNG_make_spy_agency: "Ensure Security"
 PNG_make_spy_agency_desc: "It is vital to know what the enemies of the Kingdom are doing in the shadows. Already, I have employed spies to gather intelligence, but it is time a proper modern intelligence agency is established, with all the tools they need at their disposal. This agency will be dedicated to securing our Kingdom against all threats, from without and within."
 
 penguin_historical_focus: "Path of Redemption"
 penguin_supremacy_focus: "Path of Eternal Winter"
 penguin_communist_focus: "Path of Communism"
 
 # Decisions
 PNG_reclaiming_north: "Reclaiming Our Lands"
 PNG_reclaiming_north_desc: "While [ROOT.GetNameDef] is supposed to exist wherever the penguins do, there is land inhabited by penguins that has been seized by others. Should we regain control of it, it will be possible to make it an integral part of our nation once more."
 PNG_reintegrate_frozen_north: "Reintegrate Frozen North"
 PNG_reintegrate_frozen_north_desc: "The Frozen North was officially ceded to Nova Griffonia after decades of conflict in 931 ALB, when the Treaty of Boreasfjord was signed. However, the majority of population there consists of penguins, even after a long period of griffon colonization, so reintegration of the land should go relatively smoothly."
 
 PNG_meme_commanders: "Enable Joke Commanders"
 PNG_meme_commanders_desc: "Kowalski, analysis!"
 
