 PNG_polar_bear_commander: "Orvar of Galtung"
 PNG_totally_not_trotsky: "Trot Sky"
 PNG_totally_not_trotsky_desc: "Born in rural Equestria to a family of farmers, Trot Sky could've simply lived a peaceful life. But the Industrial Revolution had other plans. In search of work, her family moved to the port city of Fillydelphia when she was young. There, she attended the local polytechnical university and met with creatures from all around the world who had come to live there, such as dragons and griffons. The university was also where she first learned about a pony named Caramel Marks and her writings, and the wider socialist ideology. This inspired her curiosity and she ended up seeing the pitiful working conditions of the factory workers in the city firsthoof. This experience quickly made her a devoted socialist, and she began publishing writings in support of Caramel Marks' ideas.\n\nWhen the Winter Revolution broke out, she dropped out of university, much to her family's dismay, and immediately travelled to Severyana to join the uprising. She was filled with optimism, believing it to be the beginning of a worldwide international revolution and the end of the old monarchist-feudalist-capitalist-racist world order. Despite her complete lack of military experience, she helped the revolters to repulse the Royal Guard from Princessyn. Yet one day as she was fighting on the frontlines, devastating news came to her. Peace had been made, and the Revolution would not go beyond Severyana, let alone reach its southern border. In her eyes, it was a total capitulation and failure. She became further disillusioned by Steel Stallion's death and the factionalism that followed. Disgusted by her fellow socialists, she left Severyana, vanishing without a trace.\n\nNow, many years later, she has emerged again from the shadows. This time, she is the one leading the revolution, and this time, there will be no truce with the bourgeoisie."
 PNG_mcgraw: "Feathers McGraw"
 PNG_mcgraw_desc: "Don't be fooled by his appearance, he's not a chicken."
 
 PNG_commander_hululu: "Commander Hululu"
 PNG_commander_hululu_desc: "Don't ask."
