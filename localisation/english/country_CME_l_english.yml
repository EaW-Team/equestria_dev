 ### LEADERS ###
 CME_high_chieftess_dromedar:0 "High Chieftess Dromedar"
 CME_dromedar_desc:0 "Born in Ginje as the daughter of the then chief of the Brēwar caravan, the calf that would grow to de facto lead the southern bands of Camelia was born with the name Zhejie, meaning \"Brave\", and upon reaching adulthood, was married off to the city lord of Dromagan, adopting her husband's family name and taking over his functions after his death. At the time, the mountain shrine of Dromagan was a middling hub: poor water access and its remoteness far away from the center of the Furna basin made it a small and scarcely visited settlement in Camelia. Dromedar would turn the settlement's fate around by leveraging the shrine of Arakash and promoting the sanctity of the Great Journey as a rite of passage for all camels, opening Dromagan's gates to any passing band or lone wanderer that took it upon themselves to travel the Sacred Path. Over the years, Dromagan became one of the most important sites in southern Camelia.\n\nDromedar's ascension to the contentious position of High Chieftess came later, with the arrival of the Storm Legions and Camelkand's swift subjugation. Given their poor resources compared to their invaders, Dromedar promoted a strategy of defense in depth, making use of the undeveloped stretches of wasteland of the south to wage constant harrassment campaigns against the Storm Legions, and though they could never retake Camelkand itself, they made themselves enough of a nuisance to protect their land and way of life as the bulk of the Storm King's army moved elsewhere. For her success, the High Chieftess now commands the respect of all Camelians that oppose the Camelkand tributary regime, and the rule of the so-called King of Boltria.\n\nOn the personal level, Dromedar has always championed the Middle Way; she believes the trauma of the Storm to have been a wake-up call for all camels, to put aside their differences and unite as one people against those that would enslave them, but she rejects the calls for total abolishment of the Bounding Creeds. Above all, the High Chieftess is devoted to the ethnic religion of Camelia, viewing her mandate as divine and promoting the cult of the Vigilant Star as the basis upon which camel society must be built and sustained."
