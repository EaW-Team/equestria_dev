########################
## Declaration of war ##
########################

dragon.23.t:0 "War on the Isles!"
dragon.23.d:0 "A thunderous roar split the sky above the Dragon Isles as a lone scout dragon burst through the clouds, wings beating frantically. He landed hard on the Dragon Lord's perch, scales singed and eyes wide with urgency. Before Ember could even speak, the scout gasped out the news.\n\n'Haukland has declared war! Their fleet is already sailing toward our shores. They mean to take the Isles for themselves — to claim our volcanoes, our hoards!'\n\nThe words spread like wildfire. Within moments dragons poured out of caves and from perches across the islands, gathering on the great blackened plateau. The air filled with angry snarls, bursts of flame, and the scraping of claws against stone. Young and old alike looked to Ember, their Dragon Lord, waiting for her command.\n\nEmber rose to her full height, the Bloodstone Sceptre blazing with bright crimson light in her grasp. She swept her gaze across the assembled dragons — her people, proud, greedy, and fierce.\n\n'Haukland thinks they can steal what is ours by right!' she roared, her voice carrying across the volcanic peaks. 'They believe dragons will bow to their banners and their so-called civilisation. Today we show them the truth of fire and claw! Every able dragon — to the skies! Defend your homes, defend your hoards, defend the Dragon Isles!'\n\nA deafening chorus of roars answered her, shaking the very ground. Flames shot into the air as warbands took flight, the sky darkening with wings. The war for the Dragon Isles had begun."
dragon.23.a:0 "Protect our lands, dragons!"

