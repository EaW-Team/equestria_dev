### National Focuses ####

DRG_bloodstone_sceptre:0 "The Bloodstone Sceptre"
DRG_bloodstone_sceptre_desc:0 "The Bloodstone Sceptre is an ancient artifact that binds all dragons to the will of their Lord. Passed from Torch to Ember in 1004 ALB, it grants absolute authority over the Dragon Isles. Yet its power feels heavier with each passing year as Ember tries to reshape draconic society..."

DRG_a_dragons_burden:0 "A Dragon's Burden"
DRG_a_dragons_burden_desc:0 "Ember didn't really sought the title of Dragon Lord, yet the Bloodstone Sceptre now rests in her claws. The weight of ruling a proud, greedy society who have known only strength and hoarding for centuries presses upon her. She dreams of a better future for her kind - one beyond endless raids and petty bullying—but change comes slowly to dragons."

DRG_lessons_from_the_ponies:0 "Lessons from the Ponies"
DRG_lessons_from_the_ponies_desc:0 "Through her friendship with Spike and Smolder's time at the School of Friendship, Ember has glimpsed the power of Harmony. Friendship, kindness, and cooperation - these foreign concepts intrigue her. She hopes to weave them into draconic life, even if most dragons scoff at such "pony nonsense.""

DRG_torchs_advice:0 "Torch's Advice"
DRG_torchs_advice_desc:0 "Her father, the former Dragon Lord Torch, may have stepped down, but his wisdom remains. The massive dragon offers blunt counsel on ruling the Isles: when to show strength, when to compromise, and how to handle the restless youth who chafe under Ember's reforms. His guidance may be gruff, but no one will deny that it's invaluable."

DRG_personal_hoard_incentives:0 "Personal Hoard Incentives"
DRG_personal_hoard_incentives_desc:0 "By encouraging dragons to grow their own personal hoards through rewards and prestige, we hope to spark greater productivity and craftsmanship across the Isles. After all, a bigger hoard is the ultimate proof of a dragon’s worth."

DRG_forge_for_the_strong:0 "Forge for the Strong"
DRG_forge_for_the_strong_desc:0 "The strongest dragons have always been the best armed. By improving the forges of the Isles and giving the mightiest smiths greater status and resources, we ensure that only the worthy wield the finest draconic armour and weapons."

DRG_incentivise_craftdragons:0 "Incentivise Craftdragons"
DRG_incentivise_craftdragons_desc:0 "True draconic pride lies in the work of our own claws. By supporting traditional blacksmiths and artisans instead of relying on pony trinkets or griffon steel, we strengthen both our independence and the quality of our equipment."

DRG_treasure_from_the_skies:0 "Treasure from the Skies"
DRG_treasure_from_the_skies_desc:0 "Why wait for traders when the skies offer endless opportunity? Encouraging long-range flights and daring aerial raids allows our dragons to bring back exotic materials and glittering treasure from distant lands."

DRG_pony_trade_outreach:0 "Pony Trade Outreach"
DRG_pony_trade_outreach_desc:0 "While many dragons scoff at the idea of trading with ponies, we believe limited and carefully managed commerce with Equestria can bring useful goods, new knowledge, and materials that would otherwise take decades to acquire through raiding alone."

DRG_address_growing_discontent:0 "Address Growing Discontent"
DRG_address_growing_discontent_desc:0 "Whispers of frustration are growing louder among the dragons. Many feel Ember’s push for harmony is weakening their proud traditions. Acknowledging this discontent openly may be the first step toward preventing it from boiling over into open rebellion."

DRG_races_without_bloodshed:0 "Races Without Bloodshed"
DRG_races_without_bloodshed_desc:0 "The traditional dragon races have always ended in broken bones and bruised egos. By reforming them into contests of strength, skill, and endurance rather than outright violence, we hope to celebrate draconic might while reducing unnecessary injury and resentment."

DRG_read_the_reports:0 "Read the Reports"
DRG_read_the_reports_desc:0 "Smolder’s regular letters from the School of Friendship, combined with information gathered from across the Isles, paint a complex picture of draconic sentiment. Reading these reports carefully will help Ember understand which reforms are gaining ground and which are breeding dangerous resentment."

DRG_whelp_education_initiative:0 "Whelp Education Initiative"
DRG_whelp_education_initiative_desc:0 "Young dragons - whelps - have always learned through sheer survival and instinct. We seek to change this by establishing basic education programs that teach literacy, simple arithmetic, and the first lessons of harmony and cooperation."

DRG_the_molt_problem:0 "The Molt Problem"
DRG_the_molt_problem_desc:0 "For centuries, the Molt has been a brutal rite of passage where parents cast out their whelps to fend for themselves. This harsh tradition leaves many young dragons scarred or dead. Ember wishes to reform it into a supported transition, providing guidance and protection during this vulnerable time."

DRG_we_must_be_prepared:0 "We Must Be Prepared"
DRG_we_must_be_prepared_desc:0 "Tensions across the world are rising. Whether through diplomacy or fire, conflicts seem inevitable. We must ensure the Dragon Isles are ready - strengthening defences, organising supplies, and preparing the dragons for a war that may soon reach our shores."

DRG_uniting_the_warbands:0 "Uniting the Warbands"
DRG_uniting_the_warbands_desc:0 "Dragon warbands have always fought as fiercely against each other as against outsiders. By working to bring these scattered groups under a more unified command, we hope to transform chaotic brawlers into a coordinated fighting force capable of defending the Isles."

DRG_invite_griffin_warriors:0 "Invite Griffin Warriors"
DRG_invite_griffin_warriors_desc:0 "Though many dragons sneer at the idea of learning from "birdies," skilled griffon mercenaries and retired warriors can teach valuable lessons in unit coordination, disciplined formations, and modern tactics that dragon warbands sorely lack."

DRG_long_distance_flying_drills:0 "Long Distance Flying Drills"
DRG_long_distance_flying_drills_desc:0 "The skies are vast, but a dragon’s wings have limits. Intensive long-distance flight training will prepare our warriors for extended operations far from the Isles, including rapid aerial strikes and paradrop-style assaults on distant targets."

DRG_elder_dragon_mentors:0 "Elder Dragon Mentors"
DRG_elder_dragon_mentors_desc:0 "The oldest dragons remember battles long forgotten by the young. By pairing elder dragons with whelps and young adults, we preserve traditional draconic combat techniques, fire mastery, and survival knowledge while tempering youthful recklessness with hard-earned wisdom."

DRG_onwards:0 "Onwards!"
DRG_onwards_desc:0 "Despite growing resistance and the immense challenges ahead, Ember remains determined. The Dragon Isles must move forward - blending ancient strength with new ideas - to create a people ready to face whatever threats the future may bring."