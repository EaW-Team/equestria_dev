## Leaders
DRG_thedragonlord:0 "The Dragon Lord"
DRG_thedragonlordember:0 "The Dragon Lord"
DRG_thedragonlordruby:0 "The Dragon Lord"
DRG_thedragonlordignitus:0 "The Dragon Lord"


DRG_dragon_lord_ember:0 "Ember"
DRG_dragon_lord_ember_desc:0 "§YBorn§!: 21st of June, 984 ALB in the Dragon Isles\n\n§YBiography§!: Ember is the young and determined ruler of the Dragon Isles, thrust into power after claiming the Bloodstone Sceptre from her father Torch in 1004. Influenced by her time among the ponies of Equestria and her friendship with Spike, she has made it her mission to drag her kind into a new era of friendship and harmony.\n\nThough sincere and idealistic, Ember often finds herself frustrated by the stubborn, greedy nature of her fellow dragons. She rules with an iron sceptre but prefers compromise and gentle persuasion over the traditional heavy-handed draconic authority. Her attempts to soften draconic culture have earned her respect from outsiders and quiet admiration from a small progressive minority, yet they have also sparked growing resentment among traditionalists who see her as soft or traitorous to draconic values.\n\nFor now she walks a delicate line: trying to modernize her people without losing control of them entirely. Whether she can truly reform the Dragon Isles or will be swept aside by those who reject her vision remains the central question of her reign.\n\n§YPortrait By§!: Blakasmoko"

DRG_lord_ruby:0 "Ruby"
DRG_lord_ruby_desc:0 "§YBorn§!: 14th of October, 983 ALB in the Dragon Isles\n\n§YBiography§!: Ruby is the fiery and charismatic head of the Redscales, a growing socialist-inspired faction that seeks to replace Ember's rule. She preaches "equalised greed" — a vision where dragons still hoard and raid, but all contribute to and benefit from one great communal hoard that every dragon can take pride in.\n\nBold, theatrical, and genuinely passionate about draconic camaraderie, Ruby excels at turning the natural greed and love of raiding into a collective force. She paints Ember as a weakling corrupted by pony friendship, while positioning herself as the bold, daring Dragon Lord who will bring endless riches and glory to all dragons.\n\nHer critics call her ideas naïve or dangerously misguided, arguing that true dragons cannot share a hoard without tearing each other apart. Yet her message resonates strongly with younger dragons and those tired of Ember's reforms. Ruby dreams of turning the Dragon Isles into a raiding powerhouse where every dragon feels rich and valued — through force if necessary.\n\n§YPortrait By§!: Blakasmoko"

DRG_lord_ignitus:0 "Ignitus"
DRG_lord_ignitus_desc:0 "§YBorn§!: 9th of February, 976 ALB in the Dragon Isles\n\n§YBiography§!: Ignitus is the uncompromising leader of the Iron Claws, the supremacist faction that openly rejects Ember's harmonic ideals as a betrayal of everything it means to be a dragon. A staunch traditionalist and expansionist, he envisions a mighty draconic empire built on strength, conquest, and unapologetic greed — mirroring the great empires of Griffonia but ruled by dragons.\n\nDisciplined, imposing, and fiercely ideological, Ignitus sees ponies and their friendship ideology as an existential threat that must be opposed with fire and claw. He believes only through dominance and territorial expansion can dragons secure their future and protect their true nature.\n\nWhile many dragons respect his strength and clear vision, others find him overly rigid and dangerously aggressive. To Ignitus, however, softness is weakness — and weakness has no place in the future he intends to forge for the Dragon Isles.\n\n§YPortrait By§!: Blakasmoko"

## Generals
DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_0:0 "Novice Scalecommander"
DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_1:0 "Scalecommander"
DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_2:0 "Skilled Scalecommander"
DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_3:0 "Veteran Scalecommander"
DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_4:0 "Expert Scalecommander"

DRG_lord_torch:0 "Torch"
DRG_lord_torch_desc:0 "§YBorn§!: 12th of April, 952 ALB in the Dragon Isles\n\n§YBiography§!: Torch is the former Dragon Lord of the Dragon Isles and father of Ember. A massive, loud, and intimidating dragon who ruled with an iron fist and an even louder roar for decades, Torch embodied the traditional draconic way of life: hoard what you can, crush your rivals, and let strength decide everything.\n\nHe earned his reputation as a no-nonsense ruler who kept the fractious dragons in line through sheer presence and the power of the Bloodstone Sceptre. While his reign was stable in its brutality, it did little to advance the Dragon Isles beyond their primitive, raiding-based existence. Torch never cared much for diplomacy, friendship, or other "pony nonsense," preferring to let dragons be dragons.\n\nAfter his daughter Ember won in the Gauntlet of Fire and claimed the sceptre in 1004, Torch stepped down but remained a looming figure in the background. He now serves as an advisor to Ember, offering gruff wisdom and traditionalist perspectives whenever she faces difficult decisions. Some dragons still respect him as the "real" Dragon Lord, while others see him as a relic of a dying era.\n\nDespite his retirement, Torch watches his daughter's attempts at reform with a mixture of pride, amusement, and deep skepticism. He believes dragons are strongest when they act like dragons — greedy, proud, and fierce. But one is for certain — he will always support Ember, regardless of what he believes in."

