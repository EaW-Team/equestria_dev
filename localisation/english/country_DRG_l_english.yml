DRG_DIVISION_EXPERIENCE_TITLE_ARMY_EXPERIENCE_4:0 "Expert Scalecommander"

DRG_lord_torch:0 "Torch"
DRG_lord_torch_desc:0 "§YBorn§!: A long time ago in the Dragon Isles\n\n§YBiography§!: Torch is the former Dragon Lord of the Dragon Isles and father of Ember. Not many remember how old is he, nor how long he has been ruling. A massive, loud, and intimidating dragon who ruled with an iron fist and an even louder roar for decades, Torch embodied the traditional draconic way of life: hoard what you can, crush your rivals, and let strength decide everything.\n\nHe earned his reputation as a no-nonsense ruler who kept the fractious dragons in line through sheer presence and the power of the Bloodstone Sceptre. While his reign was stable in its brutality, it did little to advance the Dragon Isles beyond their primitive, raiding-based existence. Torch never cared much for diplomacy, friendship, or other "pony nonsense," preferring to let dragons be dragons.\n\nAfter his daughter Ember won in the Gauntlet of Fire and claimed the Sceptre in 1004, Torch stepped down but remained a looming figure in the background. He now serves as an advisor to Ember, offering gruff wisdom and traditionalist perspectives whenever she faces difficult decisions. Some dragons still respect him as the "real" Dragon Lord, while others see him as a relic of a dying era.\n\nDespite his retirement, Torch watches his daughter's attempts at reform with a mixture of pride, amusement, and deep skepticism. He believes dragons are strongest when they act like dragons — greedy, proud, and fierce. But one is for certain — he will always support Ember, regardless of what he believes in."

DRG_misha:0 "Misha"
DRG_misha: "Misha"
DRG_charcoal: "Charcoal"
DRG_charcoal_desc: "A dragon warrior with a sharp mind for opportunity and an even sharper desire for wealth, Charcoal carved out his reputation by forming a warband to fend off pirate incursions. However, his motivations were far from noble—he only did so to claim the spoils of defeated raiders for himself.\n\nDespite his greed, Charcoal is a pragmatic and reliable fighter. His warband has become the Isles' unofficial defense force, though they are known to demand 'tribute' for their services. Those who can keep him well-fed with gold and treasure will find no better enforcer for their rule. But should the coffers run dry, his loyalty may prove just as fleeting as the wind.\n\n§YPortrait By§!: Blakasmoko"

DRG_rockslide: "Rockslide"
DRG_rockslide_desc: "§YBorn§!: Unknown, in the Dragon Isles.\n\n§YRank§!: General\n\n§YBiography§!: Unlike many of his kin, Rockslide has little ambition beyond ensuring his own comfort and keeping his territory secure. More than once, rival dragons or rogue pirates have attempted to seize his domain, only to discover that his sluggish demeanor hides a terrifyingly efficient fighter when provoked.\n\nThough often described as lazy, Rockslide possesses an innate strategic mind—he simply prefers not to use it unless absolutely necessary. Those who can push him into action will find a general who values stability and defense above reckless expansion. But whether he can be convinced to exert effort for someone else's cause remains an open question.\n\n§YPortrait By§!: Blakasmoko"

DRG_garble: "Garble"
DRG_garble_desc: "§YBorn§!: Unknown, in the Dragon Isles.\n\n§YRank§!: General\n\n§YBiography§!: Garble is a dragon who thrives on strength, dominance, and proving himself through sheer force. Once a typical bully among his kind, he has since hardened into a true warrior, learning through experience that brute strength alone is not always enough. While still hotheaded and prone to recklessness, he has become a formidable fighter, capable of rallying others through sheer bravado and an unshakable belief in draconic superiority.\n\nThough his leadership style often favors direct combat over careful planning, Garble is not entirely without tactical sense—he simply prefers action over hesitation. Under the right guidance, he could be molded into a devastating force on the battlefield, but without restraint, he is just as likely to charge headfirst into disaster as into victory.\n\n§YPortrait By§!: BunnyShrubby and Blakasmoko"

