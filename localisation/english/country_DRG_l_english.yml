# BADLANDS

dragon.1.t:0 "Equestria Demands the Badlands"
dragon.1.d:0 "A letter arrived by dragonfire today. Bearing the seal of Equestria, its contents are unusual, but not too strange considering that these are non-dragon creatures that we are talking about. It embellishes the fact that the Badlands are landlocked and the damage done by the dragons when they travel between the Badlands and the Dragon Lands proper and the price paid by the dragons and Equestria every year. The letter concludes with a request for the Badlands to be turned over to what they call 'Equestrian suzerainty'  in effect giving the territory to them. While they are sparsely populated with dragons, even considering the small population, this has made for a relatively easy request to fulfill for us. However, it would still mean giving away a piece of the sparse territory we have. What should we do?"
dragon.1.a:0 "They can have that piece of wasteland."
dragon.1.b:0 "It is ours by right and will always be."

dragon.2.t:0 "Equestria Demands the Badlands Again" # Just so it shows for Equestria in the focus description
dragon.2.d:0 "poo poo pee pee"
dragon.2.a:0 "They can have that piece of wasteland."

# END OF BADLANDS

dragon.3.t:0 "The Genius"
dragon.3.d:0 "Dear diary,\n\nNow I was back in the Zebhara desert, but I was not going to Azir. Not yet. Instead, I was a passenger on a merchant canoe sailing up the Neighle river. My destination was in [CZR.GetNameDef] and its capital, [CZR.Capital.GetName]. It was a very dangerous journey as the area had faced much conflict recently, but the merchants had hired competent guards, so I was not too afraid.\n\nWhen the canoe arrived and the merchants engaged in trade with the locals, I went out to look for Rachel. Most of the populace were zebras who had never seen a pony before, but I assumed some of them must've seen a goat. Indeed, when I drew an image of a goat in the sand, one of the zebras pointed me where to go.\n\nThe home of Rachel was more of a makeshift workshop or laboratory. She was an inventor, apparently, with an ingenius mind. It was exceptional, because most goats I had met were honestly dull-witted. When she saw me, she immediately started asking questions about who I was and why I was there. I ended up explaining many details about my life before I even got to talk about the ruins and the crystal ball. At no point did she show any signs of boredom.\n\nShe said that obviously, someone wanted me to find the ball. It was a valuable artifact, and would've been stolen centuries ago if it had always been buried in the rubble, as ruins in the Zebhara were often scavenged by thieves. This was quite shocking to me as I had not even thought of it, but Rachel was probably right. When I asked why someone would've wanted me to find it, she said they wanted me to find a way to open the tomb because something valuable was in there. She did not say who "they" were or why they wanted the tomb to be opened, but said she was eager to find out what was inside it and would do everything she could to help with the task."
dragon.3.a:0 "..."

# STARTING TREE

dragon.4.t:0 "The Weight of the Sceptre"
dragon.4.d:0 "Ember sat alone atop the Dragon Lord's perch. The Bloodstone Sceptre rested heavy in her claws, pulsing with a dull crimson light that seemed to mock her.\n\nShe had wanted to win the Gauntlet of Fire. She had burned with the need to prove herself — to show her father, to show every dragon who laughed at her, that she wasn't weak. But actually becoming the Dragon Lord? She hadn't expected the endless bickering, the resistance to every small change, or the crushing weight that came with every decision she now had to make.\n\nBelow, the volcanic landscape stretched out under the evening sky. In the distance she could see Torch — her father — standing silently on a distant ridge. For the first time, she truly understood why he had tried so hard to stop her from competing. His presence alone reminded her what dragons respected: strength.\n\nEmber's claws tightened around the sceptre. Reforming a society that only respected hoards and dominance felt impossible. Yet backing down now would prove every doubter right."
dragon.4.a:0 "I will make things better for all of us."

dragon.5.t:0 "Smolder's First Report"
dragon.5.d:0 "Smolder landed with an excited flap of her wings, nearly tripping over her own claws as she rushed toward Ember. The young dragoness was practically vibrating with energy, her eyes bright.\n\n'You should've seen it, Ember! At the School of Friendship they have these things called "friendship lessons." They talk about working together, sharing, and not setting each other on fire over shiny rocks! It actually works for ponies!'\n\nNearby, a cluster of older dragons lounging on a lava flow burst into loud, mocking laughter. One of them snorted a small plume of smoke. 'Yeah, sure. Next you'll tell us we should start hugging griffons.'\n\nSmolder's frills drooped slightly, but she refused to wilt completely. She looked up at Ember hopefully, waiting for her reaction."
dragon.5.a:0 "This could work... tell me more."
dragon.5.b:0 "Interesting, but we must be careful."

dragon.6.t:0 "Friendship... For Dragons?"
dragon.6.d:0 "Ember had asked Smolder to demonstrate one of the friendship lessons to a small group of whelps. What followed was… educational.\n\nAt first it went surprisingly well. The whelps sat in a rough circle while Smolder explained the importance of "active listening." One small dragon even nodded along. Then someone suggested they share parts of their hoards as a "gesture of trust." Within thirty seconds a shoving match broke out, followed by angry flapping and at least one attempted tail-whip.\n\nSmolder looked mortified. Ember stepped forward as two whelps began rolling across the ground in a snarling ball of scales and smoke."
dragon.6.a:0 "Stop it this instant!"

dragon.7.t:0 "The Molt Problem"
dragon.7.d:0 "Ember landed with a heavy thud at the cave entrance, wings kicking up ash and sparks. A dozen freshly-molted whelps huddled together on the scorched rock, their new scales still soft and dull, eyes wide with a mix of fear and fury. Further back stood their parents, arms crossed and smoke curling from flared nostrils.\n\n'It's the way of things,' one burly father growled, tail lashing. 'The Molt teaches them strength. Coddle them now and they'll grow soft and useless.'\n\nThe smallest whelp, barely taller than Smolder, looked up at Ember with trembling frills. 'Dragon Lord… must we really leave?'\n\nEmber's claws tightened around the Bloodstone Sceptre as the whelps stared at her, waiting for judgment on a tradition as old as the volcanoes themselves."
dragon.7.a:0 "This tradition is too cruel. The whelps stay with their families."
dragon.7.b:0 "The Molt builds strength. Only the weak need help."

dragon.8.t:0 "Reforming the Races"
dragon.8.d:0 "The volcanic crater was packed with dragons of all sizes, the air thick with smoke and anticipation. Every year the Dragon Races were the same: brutal, chaotic, and often ending with broken bones, shattered pride, and lingering grudges that could last for decades. It was considered normal. It was considered draconic.\n\nThis year, however, Ember stood before the gathered crowd with a determined look. She proposed sweeping changes to the rules  —  no more deliberate tail-whips to knock rivals into lava flows, no more mid-air collisions meant to cripple, and no more victory through sheer violence. Instead, she wanted the races to become contests of skill, endurance, and cunning.\n\nA low, discontented rumble spread through the crowd. Some younger dragons looked curious. Most of the older ones glared at her with open disapproval."
dragon.8.a:0 "Make them contests of strength and cunning, not bloodshed."
dragon.8.b:0 "Keep the old ways. Dragons must stay fierce."

dragon.9.t:0 "Torch's Blunt Advice"
dragon.9.d:0 "Torch loomed behind Ember like a living mountain of scales and muscle, his massive frame casting a long shadow over the training grounds. He watched in stony silence as she attempted to teach a circle of young dragons the strange concept of working together.\n\nAfter several clumsy attempts ended in shoving and snarling, the old Dragon Lord finally snorted, a thick plume of smoke rolling across the blackened stone. 'You're trying to teach fire not to burn,' he rumbled, voice deep enough to shake loose pebbles. 'Strength is best tempered with wisdom, not drowned beneath it. Push it down too hard and they'll push back with fire and claw.'\n\nHe paused, narrowing his piercing yellow eyes. 'But if you're truly set on this path… then you better remember this. Dragons only respect power, Ember. Never forget that.'"
dragon.9.a:0 "You're right... Strength is best tempered with wisdom."
dragon.9.b:0 "I must push harder."

dragon.10.t:0 "Rewarding the Hoard"
dragon.10.d:0 "Ember had publicly praised the dragons who returned with the richest hauls from distant raids, granting them prestige, choice perches near the Dragon Lord's roost, and the right to display their finest treasures before the entire clan. The effect was immediate and overwhelming.\n\nWarbands took to the skies with renewed hunger, roaring challenges to one another as they departed. They returned laden with gold, glittering gems, ancient relics and exotic goods pilfered from faraway shores. The Dragon Lord's own hoard swelled noticeably, drawing excited crowds that cheered every new arrival.\n\nDragons who had once lounged lazily now boasted of their latest exploits, and many younger whelps looked up with wide eyes full of admiration. For once, a genuine wave of approval washed over Ember's rule."
dragon.10.a:0 "A bigger hoard means a stronger dragon."

dragon.11.t:0 "The Forges Roar Again"
dragon.11.d:0 "The greatest smiths of the Dragon Isles had been given extra ingots, rare volcanic crystals, and Ember's personal blessing. Now the mighty forges roared louder than they had in decades, hammers striking glowing metal as thick plates of armour took shape — scales etched with claw-marks and pulsing with inner fire.\n\nA veteran craftdragon, scales blackened with soot, wiped his brow and grinned toothily as he presented the first finished breastplate. It gleamed with a deep crimson hue, strong enough to turn aside spear and spell alike.\n\n'Not bad for “soft” work, eh, Dragon Lord?' he rumbled proudly. 'These will make even the greediest raider think twice before testing us.'"
dragon.11.a:0 "Excellent work."

dragon.12.t:0 "Riches from Afar"
dragon.12.d:0 "The evening sky above the Dragon Isles burned orange as a dozen warbands returned from their longest flights yet. They descended one after another onto the great volcanic plateau, wings casting long shadows over the glowing lava flows. Each dragon carried bulging sacks and glittering treasures clutched in talons and jaws — chests of Saddle Arabian gold, strange glowing crystals from the jungles of Zebrica, and ancient griffon relics that still hummed with faint magic.\n\nRoars of triumph echoed across the peaks as the loot was piled high before Ember's perch. Younger dragons cheered and shoved to get a better look, while elders nodded with approval at the sheer volume of wealth brought home. The Dragon Lord's personal hoard grew visibly richer with every new addition.\n\nYet in the distance, word had already begun to spread of 'dragon bandits' raiding caravans and coastal towns. For now, though, the dragons cared little. Their eyes gleamed only with greed and pride."
dragon.12.a:0 "The hoard grows."

dragon.13.t:0 "Cautious Trade with Ponies"
dragon.13.d:0 "The small trading post clung precariously to the northern cliffs, a modest ledge of smoothed basalt sheltered by jagged volcanic walls. Colourful pony banners fluttered nervously beside crudely painted draconic runes warning outsiders to mind their manners. For the first time in living memory, an Equestrian merchant caravan had been allowed to land under heavy escort.\n\nEmber stood at the centre of the gathering, wings half-folded, watching intently as bolts of fine reinforced cloth, heavy sacks of rare spices, and carefully packed ingots of high-quality iron and steel were unloaded from the wagons. Smolder darted between the traders and dragons, gesturing excitedly and trying to smooth over every awkward moment.\n\nMany older dragons watched with open disdain, smoke curling from their nostrils as they muttered loudly about dealing with 'puny ponies' instead of simply taking what the Isles needed. 'Ponies and their trinkets,' one grumbled. 'We grow soft bargaining like weaklings.' Yet even the loudest complainers could not deny the value of what now flowed into the Dragon Isles — materials far superior to anything scavenged from ruined outposts or stolen from lesser raids.\n\nEmber's claws tightened around the Bloodstone Sceptre. The trade had begun, but the grumbling showed just how fragile this new path remained."
dragon.13.a:0 "Ponies are our friends."

dragon.14.t:0 "Whispers of Rebellion"
dragon.14.d:0 "The great gathering hollow was packed shoulder-to-shoulder with dragons of all sizes. Lava light flickered across scales as Ember stood atop a raised basalt platform, Bloodstone Sceptre glowing faintly in her grasp. She had called the meeting to listen — to hear the frustrations that had been building since her reforms began.\n\nOne after another, dragons stepped forward. Some spoke of traditions being weakened, others of whelps growing soft, and a few openly questioned whether their Dragon Lord still understood what it meant to be a dragon. In the shadows at the back of the crowd, two figures watched with sharp eyes: Ruby, red scales gleaming as she whispered to her followers, and Ignitus, arms crossed, his iron-hard gaze never leaving Ember.\n\nThe air grew thick with tension. Ember could feel the shifting mood — some dragons still supported her, but many others were clearly listening to the growing opposition."
dragon.14.a:0 "We can find a middle ground."
dragon.14.b:0 "My rule is absolute."

dragon.15.t:0 "The Isles Must Stand Ready"
dragon.15.d:0 "Ember stood atop the highest ridge of the Dragon Isles, the Bloodstone Sceptre clutched tightly in her claws as the wind whipped smoke and ash around her. Below, the volcanic landscape stretched out under a blood-red sunset. The world beyond the Isles grew more unstable by the day — whispers of war, rising tensions with Haukland, and rumours of conflict across the seas.\n\nShe had seen enough. Turning to the assembled clan leaders and warband captains gathered behind her, Ember spoke with rare steel in her voice. 'The time for idle hoarding is ending. We must prepare. Increase the stockpiles of food, gems and iron. Strengthen the watch posts along the coasts and reinforce the caves that can serve as shelters. War is coming, whether we seek it or not.'\n\nA low rumble of agreement mixed with grumbling spread through the dragons. Some nodded with approval at finally hearing words of strength, while others still muttered about their Dragon Lord worrying too much about distant troubles."
dragon.15.a:0 "Better prepared than dead."

dragon.16.t:0 "Uniting the Warbands"
dragon.16.d:0 "The great gathering hollow echoed with the low growls and scraping of claws as several rival warband leaders were brought before Ember. They stood in a loose semicircle, eyes narrowed and tails lashing, each sizing up the others with open suspicion. Old grudges hung heavy in the air — some had raided the same targets, others had clashed directly over prime hunting grounds or choice perches.\n\nEmber stepped forward, the Bloodstone Sceptre pulsing with faint crimson light. 'The Isles face threats greater than any of you alone can handle. Your endless feuds weaken us all. From this day forward you will work together, or you will answer directly to the Sceptre.'\n\nThe warband leaders exchanged dark glances. One particularly scarred dragon snorted a plume of smoke. 'Easy words from one who flies with ponies,' he muttered, but none dared openly challenge the Dragon Lord in that moment."
dragon.16.a:0 "Work together or answer to the Sceptre."

dragon.17.t:0 "Griffon Mercenaries Arrive"
dragon.17.d:0 "A small flock of griffons descended onto the landing ledge with practised precision, their armour scarred from countless battles and their feathers ruffled by the long flight across the ocean. These were no ordinary sellswords — grizzled veterans with hard eyes and the bearing of warriors who had survived wars most dragons had only heard about in stories.\n\nThe dragons gathered to watch were far from welcoming. Snorts and mocking laughter rippled through the crowd as one young dragon called out, 'Look at the pretty birds come to teach us how to fight!' Another spat a small burst of flame toward the ground near the griffons' talons.\n\nEmber raised a claw for silence and stepped forward. The griffon captain met her gaze steadily, unfazed by the hostility. 'We come offering knowledge of formations, discipline, and tactics your warbands lack. Whether you accept that knowledge is your choice, Dragon Lord.'"
dragon.17.a:0 "We can learn something from birds."

dragon.18.t:0 "Wings Across the Ocean"
dragon.18.d:0 "A group of young dragons landed heavily on the ash-covered plateau, chests heaving and wings trembling with exhaustion. Their scales were streaked with salt from the sea winds and their eyes still burned with exhilaration. They had pushed themselves further than any in recent memory — some claiming to have glimpsed the distant shores of Haukland itself before turning back.\n\nOne young dragoness, still panting, grinned toothily as she dumped a small sack of exotic shells and strange rocks at Ember's feet. 'We flew until the waves looked like they would swallow us whole… but we made it farther than anyone expected.'\n\nThe crowd of watching dragons roared with approval, pride swelling at this display of raw draconic endurance. Ember felt a spark of hope. If her kind could push their limits like this, perhaps they truly could face whatever storms were coming."
dragon.18.a:0 "Push them further."

dragon.19.t:0 "Wisdom of the Elders"
dragon.19.d:0 "TODO: Ancient dragons begin training whelps in traditional fire mastery and aerial combat. The young actually seem to listen."
dragon.19.a:0 "Thanks, gramps."

dragon.20.t:0 "Onwards!"
dragon.20.d:0 "TODO: Ember stands on the highest peak of the Dragon Isles, Bloodstone Sceptre in claw, looking toward the horizon. The path ahead is uncertain, but she has taken the first steps toward a new future for dragonkind."
dragon.20.a:0 "For a better tomorrow."

dragon.21.t:0 "Our Own Craftdragons"
dragon.21.d:0 "Deep within one of the older volcanic tunnels, Ember met with a small group of dragons that most others considered odd. They were called craftdragons — reclusive artisans who spent more time hammering metal and shaping stone than raiding or hoarding. Their scales were often scorched and dull from years at the forge, their claws cracked and blackened, yet their eyes burned with a different kind of fire.\n\n'Most dragons only value what they can steal,' said an older craftdragon named Silverscales, wiping soot from his brow. 'We make what lasts. Armour that turns blades, tools that endure the heat of the deepest forges. But we have always been few, and the strong have never cared much for our work.'\n\nEmber listened carefully as they spoke of their struggles — how traditional warbands mocked them, how resources were always given first to raiders, and how many talented craftdragons had left the Isles long ago in search of better patronage. She offered them recognition and a promise: under her rule, those who built with claw and flame would be valued as highly as those who took by force.\n\nThe craftdragons exchanged uncertain glances, but a spark of hope flickered in their eyes. If the Dragon Lord truly meant her words, the forges of the Dragon Isles might yet roar with new purpose."
dragon.21.a:0 "We must rely on ourselves."

