################ Sen Kinh weapons ##################

NVA_melee_equipment_0:0 "Hiltless Blades"
NVA_melee_equipment_1:0 "Vermilion Arquebuses"
NVA_melee_equipment_0_short:0 "Hiltless Blades"
NVA_melee_equipment_1_short:0 "Vermilion Arquebuses"
NVA_melee_equipment_0_desc:0 "A tried and true weapon of yesteryear, the hiltless blade is designed so that only a kirin with magic could use it without risk of injuring themselves. This was useful during conflicts with the zebras in centuries prior, who lacked magic and therefore could not use our own weapons against us."
NVA_melee_equipment_1_desc:0 "Primitive firearms that were popularized in the century prior to the Commandery's collapse. Realizing that the explosive force of the black powder we used in our fireworks to honor Concord could have military applications, a primitive rifle was soon constructed that could use that black powder to propel stones or lead balls at enemies at range."
NVA_infantry_equipment_0:0 "Jianyuan Type 22 Rifle"
NVA_infantry_equipment_0_desc:0 "Essentially a copy of the Feathisian Mooiberg, the Type 22 is the first Senkinhese bolt-action rifle. Produced near the end of the late Ranzheng's reign, the Type 22 is known for being a reliable and rugged rifle, despite its design being somewhat obsolete in contemporary times. While phased out by the military in 1016, the Type 22 saw continued use in parts of Zebrica well into the mid-11th century."
NVA_infantry_equipment_0_short:0 "Jianyuan Type 22"
NVA_infantry_equipment_1:0 "Type 11 'Cascade' Rifle"
NVA_infantry_equipment_1_desc:0 "Designed by Colonel Cascade Flare, the Type 11 is the first bolt-action rifle of completely domestic origins. The Type 11 included a dust cover and a chrome-lined barrel to better handle the hot and humid Zaikirian climate, and the use of the 7.65mm Blautal gave it greater stopping power than the Type 22. The Type 11 continues to be used long after it was replaced by more modern assault rifles, albeit as a ceremonial weapon."
NVA_infantry_equipment_1_short:0 "Type 11 'Cascade'"
NVA_infantry_equipment_2:0 "Type 14 'Seven Stars' Submachine Gun"
NVA_infantry_equipment_2_desc:0 "Although the Type 23 light machine gun was reliable and simple, its heavy weight limited its mobility. This led Lotus Arsenal to look into developing a submachine gun that could double as a light support weapon. The Type 14 is the product of this, with a quick-change barrel and bipod despite being a submachine gun. Additionally, it includes a bolt weight to allow the shooter to fire at 450 or 750 rpm."
NVA_infantry_equipment_2_short:0 "Type 14 'Seven Stars'"
NVA_infantry_equipment_3:0 "Type 19 'Torch' Automatic Rifle"
NVA_infantry_equipment_3_desc:0 "The Type 18 is Zaikiria's first dabble into a semi-automatic rifle, which is readily apparent in many of the unconventional design choices made – an aluminum barrel jacket and a sight tilted to the left to compensate for a slightly offset barrel. However, its light weight and compatibility with Type 23 LMG box magazines has made it a mainstay of the Zaikirian military. It is often nicknamed the General Torch rifle, after its inventor, Brigadier General Glowing Torch."
NVA_infantry_equipment_3_short:0 "Type 19 'Torch'"
NVA_infantry_equipment_x:0 "Type 24 'Backdraft' Automatic Rifle"
NVA_infantry_equipment_x_desc:0 "The Lotus Arsenal acquired prototypes from the scrapped Whitetail program from Equestria to see what could be improved upon the General Torch rifle. Parts were milled instead of machined, the bolt was replaced with a more conventional mechanism, and the Type 24 was given larger 20-round box magazines to improve firepower. Despite these improvements, the Type 24's service was short-lived and overshadowed by the Type 31 machine carbine."
NVA_infantry_equipment_x_short:0 "Type 24 'Backdraft'"
NVA_infantry_equipment_x_2:0 "Type 31 'Ash' Machine Carbine"
NVA_infantry_equipment_x_2_desc:0 "For the Ash program, Lotus Arsenal went in a completely different direction for influence. Sharing technology with Hippogriffian designers under the Tsunami program, the Type 31 was born. Superficially similar to the M16 Tsunami, the Type 31 instead uses a short-stroke piston mechanism, a shortened barrel, and a rear sight block over a carrying handle. The Type 31 is expected to be Zaikiria’s service rifle for decades to come."
NVA_infantry_equipment_x_2_short:0 "Type 31 'Ash'"
