 # THE ROYAL DIET - SCRIPTED GUI
 MGY_zebricanistFaction_tt:0 "Zebricanists"
 MGY_zebricanistFactionDec_tt:0 "The §cZebricanists§! faction - also known as the Young Officers - encompass the more revolutionary elements of the Maregyptian socialist movement. Made up of radicalised military officers, pan-zebricanists, ardent anti-colonialists and ardent anti-harmonist, this clique advocates for a radical reconstruction of Maregyptian society following the tenets of career officer Neigh Ser through the embracing of economic distributism, national pride and Zebrican solidarity."
 MGY_labourFaction_tt:0 "Agrarians"
 MGY_labourFactionDec_tt:0 "The §RAgrarians§! faction represents the mainstream Maregyptian socialist movement. While not inherently republican, its supporters overwhelmingly embrace a mixed economy, agrarian socialism and a comprehensive land reform."
 MGY_moderatesFaction_tt:0 "Moderate Socialists"
 MGY_moderatesFactionDec_tt:0 "The §tModerate Socialists§! consist of former Harmony supporters which have now shifted to advocated for democratic Marksism and economic and political reforms which would uplift the poor masses of Maregypt and mend the rift between the monarchy and its subjects."
 MGY_reformistsFaction_tt:0 "Reformists"
 MGY_reformistsFactionDec_tt:0 "Whilst nominally Harmonist, the §PReformists§! have moved to oppose Shaa Doof's reforms and the Viziership's attempts at centralisation. Instead, they've positioned themselves as the Harmonic counterpart to the socialists - with their main demands being a broad democratisation, the creation of a proper Harmonic constitution and the devolving of governmental insitutions."
 MGY_traditionalistsFaction_tt:0 "Northern Nomarchs"
 MGY_traditionalistsFactionDec_tt:0 "Stalwart Harmonists, Maregypt's §PNorthern Nomarchs§! are staunch defenders of the Harmonic status quo, with many looking to Equestria and Hippogrifia as shining beacons of hope in an increasingly unstable world. They place the defence of Harmony first and above all else - though in truth they could be persuaded to side with any power promising to defend and enforce peace along the Neighle."
 MGY_royalistsFaction_tt:0 "Royalists"
 MGY_royalistsFactionDec_tt:0 "Opposed to Republicans and Populists alike, the §LRoyalists§! have positioned themselves as the crown's most dedicated defenders, and while they bray and neigh to whomever will hear that they are adherents of Harmony, they are, in fact, a single-issue clique of royalists."
 MGY_agrariansFaction_tt:0 "Young Princes"
 MGY_agrariansFactionDec_tt:0 "As a voting bloc, the §kYoung Princes§! are both agrarian and staunchly conservative, though they are - at best - a loose collection of scribes, aristocrats, merchants and other ponies of a similar cloth."
 MGY_nomarchsFaction_tt:0 "Southern Nomarchs"
 MGY_nomarchsFactionDec_tt:0 "The §gSouthern Nomarchs§! faction regroups all manner of Maredjay, southern landowners and other like-minded ponies. Simultaneously reactionary and royalist to their core, they believe in a strong centralised realm and in Maregypt's position as a dominant power in western Zebrica."
 MGY_supremacistsFaction_tt:0 "Nationalists"
 MGY_supremacistsFactionDec_tt:0 "Uncompromisingly populistic and reactionary, the §sNationalists§! comprise of both civilians and members of the Veterans' Association for Maregypt. They reject all notions of Harmony and some of their members have even expressed support for republicanism."

