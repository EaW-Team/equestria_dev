 # Country ideas - Setup
 MGY_AntiSocialist:0 "Anti-Socialist Sentiment"
 MGY_AntiSocialist_desc:0 "Shortly after the fall of the Storm King, a series of peaceful demonstrations, organised by the now defunct Agrarian Party, turned violent - though there were luckily no casualites reported. Whilst the Maredjay and the local authorities denied instigating it, the resulting mistrust has led to a crackdown on the state's part against percieved 'agitators'."

 MGY_IndebtedEconomy:0 "Indebted Economy"
 MGY_IndebtedEconomy_desc:0 "In the wake of the Storm King's rise and fall, King Khefer - pressured by Shaa Doof - negotiated an unpopular agreement with princess Celestia in order to salvage the country's economy. While this proved somewhat successfull in avoiding an immediate collapse of the Maregyptian economy, the payments for this assistance has now come due, driving the Maregyptian economy further towards bankruptcy."

 MGY_PoliticalUnrest:0 "Political Unrest"
 MGY_PoliticalUnrest_desc:0 "§LThe current average £MGY_unrest_text_icon unrest is: §!§R[?MGY_Unrest_Average_var|%%]§!§L. This is a §gdynamic§! modifier. It will update to reflect the rising £MGY_unrest_text_icon §Yunrest§!§L throughout the nation.§W\n--------------\n§!Our nation is currently experiencing widespread unrest, tethering on the edge of a civil war, with only the vague promises of reform keeping it at bay."
 MGY_PoliticalUnrest_StabilityImpact_tt:0 "Stability: [?MGY_UnrestImpact_var|+2%]"
 MGY_PoliticalUnrest_PoliticalPowerFactorImpact_tt:0 "Political Power Gain: [?MGY_UnrestImpactSmall_var|+2%]"
 MGY_PoliticalUnrest_WarSupportImpact_tt:0 "War Support: [?MGY_UnrestImpact_var|+2%]"

 MGY_Maredjay:0 "The Maredjay"
 MGY_Maredjay_desc:0 "The Maredjay - the King's all-female royal elite - have been granted a near-total dominance of the military, dictating its tactics, training regimens, selection process and even choosing the army's leadership. This has come at a great cost however, as their recent political entrenchment has trapped our armed forces in the past."
 MGY_Maregdjay_UnitTech_tt:0 "§YMountaineers§!:\n  §YDesert§!:\n    Movement Speed: §G+20%§!\n    Attack Factor: §G+10%§!\n  §YMountain§!:\n    Movement Speed: §R-20%§!\n    Attack Factor: §R-10%§!"

 MGY_SomnambulaTutelage:0 "Somnambula's Tutelage"
 MGY_SomnambulaTutelage_desc:0 "The impact of Somnambula's legend is not one to be underestimated. In Maregypt, the legend of the Spinx's fall has became a tale of resistance, endurance and defiance against all odds. The Neighle's inhabitants know that so long as Somnambula stands by Maregypt, the country will endure."
 
 MGY_legacy_of_storm:0 "Legacy of the Storm"
 MGY_legacy_of_storm_desc:0 "When the Storm King invaded us with his army, we were determined to fight until the bitter end. And so we did. For months we resisted boldly, slowing his advance to a crawl and using scorched earth tactics to deny any gains for him. When our army was finally defeated, the Storm King proceeded to burn down and loot every town that was still intact. We tried hiding our treasures from him, but he was no fool and managed to find them, taking everything valuable for himself. Afterwards his army left us alone to lick our wounds. We have lost everything, except for our honour."
