 MGY_RoyalDiet_cat:0 "The Maregyptian Diet"
 MGY_RoyalDiet_cat_desc:0 "Formed in 988  ALB, the Royal Diet of Maregypt serves as an irregular parliament and advisory body to the Maregyptian throne. As a compromise between royalist hardliners and Harmony supporters, the assembly has historically held little in terms of political power - serving as little but a glrofied rubber stamp. In an ironic twist - and owing to Maregypt's current political instability - it now finds itself as the mediating body between each and every governmental clique, local faction and other group of interest which possess even a marginal sway over the country's internal affairs.\n\nMaregypt's political stability lives or dies by the Diet's ability to compromise. With no faction possessing an absolute majority it is now anypony's game. Coalitions and temporary alliances will be the true king-makers of Maregypt's ninteenth Royal Diet, and as such we must ensure its continued support in our efforts to reform the country and restore it to its past glory."

