 # Events
 MGY_Lore.1.title:0 "A Setting Sun"
 MGY_Lore.1.desc:0 "Maregypt - the land of legends, the cradle of Pony civilisation in western Zebrica - is now little more than a cluster of run-down villages and backwards cities littered among ancient ruins, desolate farmland and forgotten necropoli. The last centuries have not been kind to the ponies of the Neighle: foreign dominance, famines and the Storm King's ruinous advance have extorted a terrible toll from the valley. And yet, Maregypt persists. The land of Somnambula - Harmony's southern bulwark - would not be easily broken.\n\nFreed from its bonds under Sneighfru the Bold in 998 ALB, the Kingdom of Maregypt renewed its ties to Equestria, setting the stage for its return on the world stage. Yet, catastrophe struck in 1004 ALB when the Storm King sacked the country, killing its King and crown prince. Through sheer grit - and the help of heroes such as Far Hook and Ahhotep - did the nation survive. A semblance of normalcy returned with the defeat of the Storm King and ascension of the young Khefer III to the throne the following year.\n\nStill reeling from all these challenges, the country's administration limps along under Vizier and political maverick Shaa Doof. Unrest across its southern provinces, separatist movements in the west and the south west, along with political opportunists all threaten to push the kingdom towards self-destruction. Only time will tell what the future holds for Maregypt..."
 MGY_Lore.1.a:0 "Tell me about Maregypt's National Party."
 MGY_Lore.1.b:0 "I've heard enough, onwards!"
 
 MGY_Lore.2.title:0 "The National Maregyptian Party"
 MGY_Lore.2.desc:0 "The National Maregyptian Party (Or SHH) - the Maregypt's leading Harmonist faction - has maintained a stronghold on the Kingdom's political scene for over a decade. At the midway point between a big-tent party and an extension of the Vizier's political will, it is the brain child of Shaa Doof, a political maverick and the current Vizier. Made up of moderate members of the free Maregyptian army, monarchists, politically-savvy landowners, intellectuals alongside wealthy farmers and members of the royal family, the National Maregyptian Party reflects the pragmatic nature of its creator. It is Harmony with compromises. Friendship burdened by bureaucracy, bound in tradition.\n\nHowever the party's overtly broad political platform - clashing with its founder's aversion for reform, has led to its fracturing into different factions; for years now the National Maregyptian Party has been divided between three cliques: the centrist Royalist faction led by Shaa Doof and his protege Neighkt, the Reformist Clique, and a moderate assemblage of loyal Nomarchs. Despite the aforementioned internal divisions, the National Maregyptian Party has managed to remain endorsed by numerous influential figures such as King Khefer and Somnambula herself, but also by prince Shepser and High Priestess Merithaymen. These endorsements - while loaning the SHH significant political clout - have done little to its eroding popularity.\n\nLacking a strong cohesive leadership and struggling to deal with the rising influence of socialist and supremacist movements alike, the National Maregyptian Party is truly a reflection of the Kingdom itself: a shaky edifice, held together by a fading Vizier and an eroding faith in a fresh dynasty."
 MGY_Lore.2.a:0 "Tell me about Maregypt's reactionaries."
 MGY_Lore.2.b:0 "Tell me about Maregypt's socialists."
 MGY_Lore.2.c:0 "I've heard enough, onwards!"

 MGY_Lore.3.title:0 "Of Farmers and Workers"
 MGY_Lore.3.desc:0 "Following the disbanding of the Free Maregyptian Party in 997 ALB, the stage was set for a socialist movement to fill in the void. The Maregyptian People's Party was thus born from the ashes of its republican predecessor as a merger between the National Maregyptian Union and the Farmer-Labour Parties. Under Narmare Redet's leadership, the party's political platform has in recent years shifted away from its agrarian roots to a broader, mixed ideology with its members likewise holding a diverse host of views and beliefs ranging from democratic socialism to social monarchism - though the party chairpony has positioned himself time and time again as a staunch anti-monarchist and anti-capitalist. Whilst the Maregyptian People's Party has so far only had limited political representation, its rising popularity has been a cause for concern to many within the Harmonic establishment, leading to an increase in political repression from the Maregyptian Government.\n\nFurther to the left of the Maregyptian People's Party are the so-called Young Officers - more radical, unorthodox socialists led by a young colonel, prominent Zebcricanist activates and aspiring pony of the people Neigh Ser. Whilst not officially members of the Maretyption People's Party the Young Officers have remained steadfast in showing a united front with Narmare, though it remains to be seen if this is true loyalty or merely an alliance of convenience..."
 MGY_Lore.3.a:0 "Tell me more about the National Maregyptian Party."
 MGY_Lore.3.b:0 "Tell me about Maregypt's reactionaries."
 MGY_Lore.3.c:0 "I've heard enough, onwards!"

 MGY_Lore.4.title:0 "A New Radical Movement?"
 MGY_Lore.4.desc:0 "The ever-present political and regional instability only exacerbated King Sneighfru and King Khefer's overreliance on the military to hold onto their power. In particular the Maredjay - the all-female quasi-religious order - have attained an unparalleled prominence on the Maregyptian political scene. Led by Lady-Captain Ahhotep, distant cousin to King Khefer, the Maredjay have asserted themselves as kingmakers and defenders of the realm. Whilst not overtly involved within the kingdom's party schemes, the Maredjay have nonetheless continued to lend tacit support to traditionalists and other, less Harmony-minded ponies. In particular, and even if not politically outspoken, Ahhotep herself has frequently butted heads with Vizier Shaa Doof, and is one of the few ponies who has dared to openly criticise the King to his face. Rumours abound on the Lady-Captain's contempt for socialists, Equestria and Harmony itself as she leads the Maredjay to persecute and cull any precieved threat to the kingdom's stability.\n\nThat is not to say that the military is but one homogeneous political behemoth. Within the army lay two more factions: the left-wing Young Officers, and the deeply reactionary Veterans' Association for Maregypt led by general Far Hook.\n\nAn accomplished tactician, a hero of the independence war and an fanatically nationalistic mare, Far Hook is a textbook supremacist. Utterly authoritarian, obsessed with restoring Maregypt's national pride and bearing a deep-seated hatred for those that brought her country low, Far Hook would sooner tear Maregypt from its sarcophagus by force than watch it die. Leading the Veterans for Maregypt - a fringe, would-be mass movement, the general has bidden her time so far, holding her cards close to her chest."
 MGY_Lore.4.a:0 "Tell me more about the National Maregyptian Party."
 MGY_Lore.4.b:0 "Tell me about Maregypt's socialists."
 MGY_Lore.4.c:0 "I've heard enough, onwards!"

 MGY_Lore.5.title:0 "A Speech Long Overdue"
 MGY_Lore.5.desc:0 "In the last few decades the grand halls of the Helioponus Palace saw little in terms of activity, its halls often bereft of guards and its many private apartments lying vacant since the time of the Storm King. Tonight, however, under a bright gibbous moon, something stirred within the great shell of a palace; a lone stallion working under lamplight, hunched over an engraved rosewood desk, a souvenir from the prince's days abroad in Equestria. Flanked on both sides by haphazard towers of books, the young king Khefer had locked himself in one of the palace's long-neglected studies, agonizing over the infuriatingly blank scroll laid out before him.\n\nPutting a hoof to his aching temple he let out an involuntary groan, frustration getting the better of diligence. On the surface it was a simple task, write one measly speech. A simple address to the nation. It shouldn't have been a complicated task, Khefer had experience analyzing the words of visionary leaders from every era, he himself had crafted numerous essays on all manners of political theory. But that's all his expertise was, theory. In a week's time all that theory, all the time, money, and hope his family and people invested in him, needed to translate into action.\n\nWhat words were there to soothe an entire nation? He could keep it simple, talk only of policy, but what few policies he had managed to enact were already met with scrutiny. To the farmers his policies were simple attempts at token appeasement, to the members of the diet, childish reforms disregarding political nuance and tact. And to the officers or the Maredjay, talking to a sack of grain would provide more insightful discourse. No matter what he did, no matter how hard he tried, until his people saw him as a true, rightful king, his ideas would remain as whispers in the wind.\n\nThis was his last chance, his ultimate test. Speak the words of a true king, or... It was best not to think of the consequences. Letting out a deep sigh Khefer grabbed another tome, flicking through the yellowing pages. Somewhere in these histories there must be an answer, some great words that could sew a fractured kingdom back together."
 MGY_Lore.5.a:0 "Looks like it'll be another sleepless night..."

 MGY_Lore.6.title:0 "A Helping Hoof"
 MGY_Lore.6.desc:0 "\“Thank you, but I just can't eat," sighed Khefer III, pushing away a plate of flatbread and honeyed dates without a glance.\nKhefer's study was in tatters, papers and open tomes lie scattered across every surface, linens lie in discarded clumps, spilled ink pooled on the floor, dripping into the gaps of the floorboard. The king himself was in a similar state, eyes bloodshot and mane disheveled, as if he and the room had been caught in a violent storm. The sight brought Shaa Doof back to his days at the Maregypt Gazette, nights fueled by endless cups of coffee and an insatiable drive to bring the truth to light. It was a lifestyle that earned the Vizier respect and admiration in his heyday, one that he had put away upon picking up his royal duties, understanding there was more to administration than burning oneself away.\n\n"No great deed was ever done on an empty stomach. You should eat. It'll help you think." Shaa Doof had never had foals of his own, but over his time acting as mentors to many aspiring politicians and heirs-to-be, he had developed quite the fatherly demeanor.\n\n"I know... I know..." His rule hadn't even lasted more than a year and the poor king already appeared a shadow of his former self. Shaa Doof knew that deep down the bright-eyed stallion brimming with passion was still somewhere in there, but it really did hurt to see him in such a sorry state.\n\n"My king, if I may speak frankly," Shaa Doof began, not waiting for any sort of confirmation. \“While I understand that this address must hold your words and yours alone, it's not as if your father or his father were lacking in skilled advisors. Perhaps it might be best if I had a look over, a second pair of eyes might be exactly what you need. At the very least, it might give you a chance to rest."\nFor a moment all was still, and Shaa Doof worried that perhaps his approach was a tad too forceful. That was until Khefer turned to face him, weary tears pooling in his eyes, and with defeat weighing down his voice replied..."
 MGY_Lore.6.a:0 ""Thank you, Shaa. Thank you for everything.""

 MGY_Lore.7.title:0 "The Moment Arrives"
 MGY_Lore.7.desc:0 "Khefer's eyes traced the lines before him feverishly, a bead of sweat trailing down his forehead. Around him laborers darted too and fro, ferrying supplies and stacks of paperwork down the halls of the grand palace, the most activity its halls had known in some time. Already a crowd was assembling in the courtyard, undeterred by the blistering desert sun looming overhead. His reign-defining speech was only a few minutes away, but Khefer's nerves were already shot.\n\n"I don't mean to be rude, but... are you sure this will be enough" Khefer had said upon finishing Shaa Doofs revised draft of the address. Khefer wasn't quite sure at the time what he was expecting, he had figured someone with as lustrous a career as the vizier would craft a speech that was sure to astound, yet the words in front of him were shockingly plain, exact, academic, as if Khefer himself had penned them.\n\n"The royal address must carry the words of the king and the king alone. I did my best to pen your will into each and every sentence, best that I could."\n"Is this enough though?" Khefer retorted, \“Aren't these the same policies we've been pursuing? The people are already at their limit, they need something new, something they can believe in\!"\n\n"What the people need right now" Shaa Doof calmly stated, \“is a king who knows what is right. A good king flows like the Neighle, calm, predictable, reliable. The route you sail doesn't matter, what matters is that it's your path, the king's path. Believe in your rule, and the people will follow."\n\nThe speech was certainly well-written, but whether it would be the speech the nation needed was yet to be seen. And time was up. With quivering hooves Khefer walked to the balcony door, nodding to the guards flanking either side. They did not salute back. Sucking in a deep breath, the king stepped out into the blazing heat, ready as he'd ever be to address the ocean of subjects awaiting him."
 MGY_Lore.7.a:0 "This better work..."

 MGY_Lore.8.title:0 "A Desperate Address"
 MGY_Lore.8.desc:0 "\“...and with the assistance of our overseas allies, who have already begun to assist in relief efforts, we will no doubt be able to recover from these hardships. We are not alone in our time of peril, we must remember this." Khefer's voice quivered as the speech neared its conclusion, the facade of authority gradually waning from his inflection. Khefer had started off strong enough, hours of practicing before a mirror, drilling his normally airy voice into a bold facsimile of a grand orator from the university; even so, no amount of preparation could prepare him for what he now faced.\n\nSilence\nPure, deafening, silence\n\nThrough each exaltation of the administration's reforms and every great swelling of emotion and pathos nothing stirred within the courtyard below; a speech delivered to an assemblage of statues. Relying on rote memory he soldiering through the bulk of his speech, but as the silence grew ever more deafening and the brutal midday sun beared down on him, Khefer found it harder and harder to keep his legs from quivering.\n\n"This," the King began, pausing for just a moment to rally his spirit for a bold conclusion, \“this is what we must remember if we are to survive, prosper as a people. We cannot allow ourselves to remain divided, to let our fear and anger tear us apart. Famine and war have conspired to tear us apart, set brothers and sisters against one another, allowing discord to flourish within the heart of our great kingdom. History has shown time and again that only through unity, standing defiant hoof in hoof, may we survive whatever storm may come to test us next."\n\nWith one last swell, Khefer's voice boomed with a fervor that surprised even himself. \“Let us prove, together, that Maregypt is a land of unity, prosperity, and harmony for all."\n\nKhefer waited a moment, still as the crowd, bracing for what reaction could come. Scant murmuring could be heard from before, the only evidence that time still flowed. Khefer sighed, saying only \“thank you" before turning to leave.\n\nBehind him, the courtyard exploded into chaos, a cacophony of shouting and cries of \“that's it?!?" His heart freezing, Khefer was ferried back inside by two attendant guards, sparing him the sight of the maelstrom below."
 MGY_Lore.8.a:0 "Why can't we all just get along?"

 MGY_Lore.9.title:0 "The Midnight Broadcast"
 MGY_Lore.9.desc:0 "It had been a terrible week for Fayala. Bollworms had torn through her crops, and only two weeks from harvest season! She would be lucky to recuperate even half her losses, IF she worked around the clock, and now she was being asked to attend some nonsense political meeting! She wanted to say no, it just wasn't a zebra's business sticking her muzzle where it didn't belong, but her friend Amber Way insited that it was important. More important than tending a barren field.\n\nThe venue was shockingly rustic, a simple single-story estate with bleached walls and creaking supports, leaving the crowd little room, already pooling beyond the villas fence. Fayala strained as she craned her neck over the sea of familiar faces, searching for the one who could possibly command such a crowd.\n\n"Mares. Gentlecolts. Friends and neighbors. I know you all have busy lives and your time is precious, I promise to respect the sacrifices you've all made to be here tonight." Narmare Redet addressed the crowd atop a wheat crate in the center of the estate courtyard, the scant light of nearby oil lanterns casting his plain features into a look of steely determination. \"I wish to hear your concerns, as always, but tonight, I must for once ask something from you all in return."\n\nFayala never saw herself as a socialist. She was always just a farmer, she never needed to be anything else. But she didn't need to be a socialist to know that something needed to change. \"What does reform mean to Khefer? What does it mean to us? To him, no doubt, it means a slow trickle of change, an act of democratic reformation to make the people feel like we have control. He says one day, one day we will have peace, have prosperity, but how many more must watch their children starve while we wait, what cost must we pay in the name of harmony. Do we need harmony? Or do we need action?"\n\n"The king asks us for unity, and I will ask the same of you. Friends, strangers, people of Maregypt, now is the time to show our unity, not a king's unity, a people's unity. Together we  will make our voices heard, so that we may remind all who the true inheritors of the Neighle are."\n\nThe crowd burst into applause, all in attendance stamping their hooves and cheering for victory, Fayala included. Tomorrow Fayala would follow her neighbors into the city, demanding that their voices be heard, alongside the thousands who tuned their radios to the MPP's broadcast. Meanwhile an exhausted Khefer listens on in horror, dreading what comes next."
 MGY_Lore.9.a:0 "The Guard can keep the peace."
 MGY_Lore.9.b:0 "The king must speak, before things get ugly."

 MGY_Lore.10.title:0 "Orders"
 MGY_Lore.10.desc:0 "Khefer always hated barking orders. Something about it always made Khefer feel terribly small, each attempt reminding him of his days as a colt demanding his brother return his belongings, only to be met with laughs and jeers. But there was no other choice; overnight hoards of disgruntled farmers and laborers poured into every major city, clogging supply lines and refusing to cease until their demands were met... demands which remained frustratingly vague.\n\nHe just needed them to buy time, enough to come up with some way to appease the dissenters. It wasn't as if Khefer necessarily disagreed with Narmare, he agreed that between the devastated economy and stagnant diet reform needed to come, and that's exactly what he's been trying to accomplish! If only he could make them see that!\n\nUnfortunately for Khefer, he didn't have time to think. Only hours after he had given the order for troops to mobilize around Marephis did reports come in confirming his worst fears.\n\“Unit 34-B reporting, cordon held, suppression successful, seven confirmed civilian casualties, requesting emergency services."\n"Maredjay Task Force Delta-4, confirmed apprehension of suspected MMP-aligned ringleaders. Be advised, civilian resistance is greater than anticipated, updating ROE, lethal force is authorized."\n"This is Lieutenant Nehesy, 2nd infantry division, requesting additional ammo, numerous detachments reporting dwindling supplies."\n\nMortified, Khefer bolted through the halls, cursing their lack of foresight. With no time to think, they rushed to the military liaison office, burst through the door, and demanded to know who gave the order to fire upon civilians. Paying the fuming king no mind, the officers continued to attend to their work stations, all but one nearby radio operator, regarding the king with grey, tired, lifeless eyes. \"Orders came straight from Far Hook, my liege. And Ahhotep, presumably," they finished dispassionately, turning back to the radio console. Their patience spent, Khefer barreled towards the officer, snatched their headset, and gave today's second order. General Far Hook and Ahhotep would have to wait, for now."
 MGY_Lore.10.a:0 "\“All units, hold your fire!""

 MGY_Lore.11.title:0 "Between a loaf and a hard place"
 MGY_Lore.11.desc:0 "\"I'm well aware of the plights which you all have suffered through." Khefer spoke with a voice hoarse and heavy, layers of bags sagging beneath his tired eyes. Short on time and desperate to commence his emergency address, the young king had barely managed to brush his hair before once more being thrust into the public eye - same balcony, different address. This time Khefer was offered no rehearsal, a barebones script and whatever wit could be born from desperation would have to do. Despite the circumstances Khefer found himself unusually calm, his experience a few days ago overwhelming his nerves so completely that he was already well prepared for the worst case scenario. He was always quick to adapt, just somehow not quick enough. Not in his subjects eyes, anyways.\n\n"I will not stand here and pretend that the situation isn't dire," the king continued, trying his best to inflect his voice, lest his tone come off as apathetic. \“The scars of war weigh heavily on our lands. Farmers struggle to preserve what fields they have. Factories are operating with jury-rigged equipment, understaffed, and cut off from supply lines. More than economic concern, we all feel the great loss of so many people. I myself have hardly had a chance to mourn for my family." Even through his weariness the words choked him up. \“I hear you. I'm doing everything in my power to help everyone."\n\n"So when will we get a say in the 'help' you're giving us" shouted a voice from the crowd below. Instinctually guards stationed at the outskirts of the courtyard reached for their holsters.\n\n"My attention is divided amongst many competing issues, addressing representation within the diet is one of them. I have always believed a strong democracy creates a strong nation, and with time..."\n\n"How much time? You want us to suffer in silence?" Another holler from the crowd, accompanied this time by a flurry of murmuring and shuffling.\n\n"Not long, as soon as the present crisis is dealt with. I'm doing all in my power-"\n\n"What power?" Another agitator.\n"Like that means anything." Chimes another.\n\nBefore Khefer can get another word in edgewise, an object comes flying at his head. Bam. A rock hard loaf of bread smacks against the king's temple, sending him reeling back. \“That's the only power that matters," was the last thing he heard before gunshots rang out in the courtyard, and two guards threw themselves around the king. As Khefer fought back against his own guards, desperate to continue, all he could hear was chaos, set to a deafening chant - \"Our bread. Our power.""
 MGY_Lore.11.a:0 "Hopefully the king wasn't hurt..."

 MGY_Lore.12.title:0 "Those Responsible"
 MGY_Lore.12.desc:0 "The atmosphere inside the barebones war room was suffocatingly dense, only the sound of wooden blocks dragging across a map of Maregypt and the occasional bursts of radio chatter breaking the tense silence. Khefer sat at the far end of the table, his bulging eyes boring a hole through the spot where Marephis lay, more and more blue and red blocks piling atop the city. Around the crowded table numerous NMP officials sat on what scant furnishings could be scavanged from neighboring rooms. Flanking Khefer in the threadbare room was the ever reliable Shaa Doof and his protege Neighkt, taking turns updating the war map and attempting to lift the spirits of their mortified king. Notably, not a single military official was in attendance.\n\n"This is a complete disaster" the forlorn king muttered.\n"Not completely," cheered Neighkt, thankful that the king was too preoccupied to see the unease written on his face. \"In strategic terms we hold a definite upper hand. Worst case, the movement runs out of fuel in a few days, our troops have already cut them off."\n\n"And then what?" the king sighed. \“We let the nation burn? How many lives will be lost before all is said and done? And then what, we proclaim that peace is restored as we prepare for the next revolt?" Neighkt opens his mouth to speak, but is interrupted by a sudden burst from the radio. All eyes turn to see Shaa Doof adjusting the signal, dismissing a messenger as a broadcast blares through the room.\n\n"Our message has become lost in blood and fire, as we speak we are labelled as monsters, rabid dogs to be put down." The broadcast was Narmare's, fury simmering beneath a collected veneer. \"Is this what our voice means? What our democracy means? This is not how I wish for my voice to be heard, not through the spilled blood of my countrymen."\nKhefer couldn't believe his ears, or his luck. Narmare might have started all of this, but at the very least he shared the king's distaste for chaos.\n\n"Well that's a relief," sighed Neighkt, \"even if this was all HIS fault in the first place." The king didn't respond, already deep in thought, wondering how he might turn this situation to his advantage."
 MGY_Lore.12.a:0 "Maybe he has his uses... if he will listen."
 MGY_Lore.12.b:0 "He must serve as an example!"

 MGY_Lore.13.title:0 "A Dressing Down"
 MGY_Lore.13.desc:0 "\"Don't take risks, tag and move on. Clear out in ten, no need to stick around, garrison will handle cleanup. Move it!" The operator offered Ahhotep a hasty salute before wrangling their troops and heading off to prep for insertion. Ahhotep took no pause, immediately returning her focus to the massive table in the center of the makeshift HQ, littered with street maps, operational reports, and a million other points of data. She didn't have the luxury of waiting to plan her next move, the situation was deteriorating by the second, her orders the nation's only lifeline in the war against anarchy.\n\n"Excuse me" a tepid voice called out to her. "I know you're undoubtedly busy, but we need to talk."\n\nAhhotep let out a small snicker, slightly amused that someone had the guts to address her so carelessly. "Drop your report and get out." she demanded, not bothering to look up at the king.\n\n"You're sieging temples now? Under whose authority?" Khefer blubbered, whatever confidence his ill-fitting crown offered quickly shrinking under Ahhotep's unflinching glare.\n\n"Under my own. If you haven't noticed it's a mess out there. The maredjay goes where we are needed."\n\n"My orders were to maintain order. Keep the peace. I didn't say anything about arrests or-"\n\n"No, of course you didn't" Ahhotep spat, her glare beating him into submission. \“You haven't ordered anything, togoj. You spout empty promises and demand the impossible, cower behind books while the streets run red. What would you know of war, you who let your kin burn while you played schoolboy?" As more and more venom dribbled from Ahhotep's lips the king shrunk more and more, Ahhotep towering over the quivering colt. \“Would you ask me to lecture the enemy? Would you beg for mercy while airships blot out the sky? Would you tell me how I should protect the people you left behind."\n\nFear ripe in his eyes, the king gulped, replying \"Still, the maredjay follow the king's-"\n\n"Of course, but I see no king before me. Only a child playing dress up with their families' jewels." Satisfied, and having finally found an outlet for her mounting stress, Ahhotep returned to her maps. \“Leave, togoj. I must see my duty through." She did not turn to regard the king as he sulked away from her tent. Much more important things required her attention. She had a nation to save."
 MGY_Lore.13.a:0 "What was I supposed to say?"

 MGY_Lore.14.title:0 "An Unexpected Miracle"
 MGY_Lore.14.desc:0 "Khefer once more was locked away in his study, taking meager sips of Karkadeh as he nursed an ever-intensifying migraine. Shaa Doof had already seen that the king's schedule would be cleared; whatever good could come from today's meetings would be better undertaken by the vizier than himself.\n\n"Why me?" The king sputtered, slumped over a photo of his late father. "How could you leave me all alone again? Please... I can't... I'm not you. I'm not my brother. I'm..."\n\nBurying his head into the desk, Khefer allowed himself to cry, spilling tears for the first time since news of the Storm Kings invasion reached the shores of Equestria.\n\n"Khefer, my friend" a voice from the doorway jolted the king back to his senses, quickly wiping the tears away. \“You need to hear this," said Neighkt, galloping into the room and rushing to a neglected radio tucked between volumes on a nearby side table. Before Khefer could even speak, the device burst to life.\n\n"Each century carries new troubles, new woes, but no matter how many ages have passed the ponies of Maregypt persist." The voice, almost ethereal in its tranquility, belonged to no other than the legendary Somnambula. \“You have all grown so much since I last walked these sands. So much has changed, but the spirit of Maregypt has not; through all this conflict I have seen that hope remains in the heart of all. Hope for a better future. I believe that together we can build that future. Please, let us lay down your arms, we have seen enough destruction. Believe in eachother, believe in the spirit of Maregypt, believe that today hope will win."\n\nKhemer was left speechless, wondering for a moment if in his grief he had been hearing voices. Fortunately, Neighkt quickly brought him to his sense. \“Looks like protesters are already starting to return home. I can't believe it either, but... I think it worked."\n\nAs an uneasy relief washed over him, Khefer leaned back into his chair, looking over at his friend with a wary, uneasy smile."
 MGY_Lore.14.a:0 "\"At least they'll listen to SOMEpony.""

 MGY_Lore.15.title:0 "Picking Up the Pieces"
 MGY_Lore.15.desc:0 "Shaa Doof trailed behind Khefer, huffing as he struggled to keep up with his spritely liege. \“At 9:15 you have lunch with representatives from the Reformist and Nomarch cliques, followed by a debriefing on military operations at 10:15. I'll have the reports prepared personally, the general's unlikely to be in attendance."\n\n"Thank you, I understand. What about the priestess?"\n\n"Yes, I've invited High Priestess Merithayme to speak with you over tea. Personally I wouldn't worry too much, she's always been a reasonable woman, and she always held your father in the highest regard. I'm sure she'll understand once you explain the situation..."\n\n"Was out of control?" remarked the king.\n\n"Complicated, my king. No need to put yourself down, anyone would struggle to handle such a fiasco. She'll understand, I know she will."\n\nThe king looked back to Shaa Doof, wearing the first genuine smile the vizier had seen from the young king since his return from abroad. \“Again, thank you. I'm fortunate to have a friend like you to rely on."\n\n"Oh you don't need me" contested Shaa, \“I'm just some old fool who's seen too much to find anything surprising. You'll find your footing soon enough, I know you will. I still have an eye for these things," the Shaa said with a wink, before erupting into a fit of coughing. Without skipping a beat the king rushed over to the vizier's side, holding him up, concern welling up in his eyes.\n\n"Please, please, I'm fine. Plenty of fight still in me." Shaa Doof nodded to the king as he shook himself off, regaining his composure. \“You have better things to worry about. Get going, it's not like a king to run late." With that, Khefer strode off into the halls. A tentative peace had settled over the country, but it was up to Khefer over these next few weeks to ensure that said peace would remain. Shaa Doof was right, he couldn't be late."
 MGY_Lore.15.a:0 "Time to start acting like a real king!"

 MGY_Lore.16.title:0 "Some War Hero..."
 MGY_Lore.16.desc:0 "\“Coffee?" smirked Far Hook, already preparing two mugs sporting the insignia of the Maregyptian armed forces. After hours of hassling middlemen and exploiting Shaa Doof's impressive contact network, Khefer had finally managed to schedule a sitdown with the aloof general, a task that by all means shouldn't have been such a trial. The general was rarely seen around the palace at the best of times, but since the revolts she had always found her attendance conveniently needed in some division stationed across the country from the king.\n\n"I'm fine," protested the king, a mug already being placed in front of them. \“Let's keep this brief - why are you refusing to follow orders?"\n\n"My my, that's quite the accusation," hissed Far Hook, their smirk widening. \“And so very unlike you, my liege, are you sure you're well." The obvious jeer did little to provoke nor amuse.\n\n"General... Maregypt is burning. Chaos reigns in the streets, hospitals are overcrowded, thousands are starving. Meanwhile your men men just... wait. Wait and watch our people tear themselves apart!"\n\nClicking their tongue, the general shook their head disapprovingly, their smile never wavering. \“My dear Khefer, I know how stressful this must be for you." Far Hook addressed the king in a mocking tone, as if she were explaining some triviality to a child. \“But war is hardly as simple as it looks in your books. We have procedures, protocols, a chain of command to maintain, intelligence to gather. A civil uprising is even more complicated; tell me my liege, who shall we arrest? Who do you want me to beat into submission? Those at the front already have to bear the full wrath of the masses, and they aren't even permitted to defend themselves!" As Far Hook continued their barrage, watching the young king shrink before her, her smile grew into a grin dripping with sadistic glee. \“Unless you're saying we should open fire on the rioters, if so by all means we'll have this swept under the rug in no time at all."\n\nKhefer stammered for a while as the general took a long sip of her coffee, paying the flustered king no mind. Before the general could set their mug down the King was already up and walking out the door, turning only to offer some parting words. \“Just try to keep things peaceful."\n\nThe general toasted their mug to the king as the door closed."
 MGY_Lore.16.a:0 "\"Anything for you, my liege!\""

 MGY_FocusEconomy.1.title:0 "The Closing of the Royal Mint"
 MGY_FocusEconomy.1.desc:0 "Located within the Quarry District of Manephis, the Royal Mint's official building had been a fixture of the city since its inception. Its limestone walls now stood bare, the once brilliant white paint having long chipped away under the endless assaults of both natural elements and the passage of time. The six interlocking courtyards - once animated with the relentless pacing and labouring of hundreds of moneyers and mint masters - were now empty. The screw presses were silent, bygone tools of a world which had moved on. Royal overseers had been replaced with echoes of generations of artisans and dust clouds. Corrugated gold sheets, metallic refuse and tools laid still as if awaiting the hoof of qualified labour.\n\nWith the Stater now discarded though Manephis' days as a minting capital were now officially over. Anypony qualified to work on the production of  coins had been enjoined to settle in Somnambula instead.\n\nAs Amysa trotted through the abandoned facility his hooves knocked over a malformed coin. It was unmistakably a Huut - if the pony's assessment of the coin's observe was correct, discontinued in the early days of Saddle Arabian domination. He smiled and tucked it within his pack, though the delight of discovery alone did little to stem his grief.\n\nWith a solemn neigh, he turned, and left the building. The gate shut behind him as two Maredjay guards affixed the Royal seal onto it - condemning the building and its contents to history."
 MGY_FocusEconomy.1.a:0 "We have joined the modern world at last."
 
