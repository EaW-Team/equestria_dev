BAL_core_scs_desc:0 "With the southwest liberated just like the southeast was, it is time we welcome our proletariat comrades and establish close friendship between us."
BAL_form_equestria:0 "A New Equestria"
BAL_form_equestria_desc:0 "We have done it! Against all odds, our homeland is now fully liberated from reactionary shackles. Now comes the end of capitalism and monarchy and the true emancipation of the working class of Equestria! Long live the revolution!"
BAL_mango_gambit: "The Mango Gambit"
BAL_mango_gambit_desc: "Some comrades have suggested opening a new front against our enemies by seizing Mango Province. Such an operation would be dangerous, so its success relies on the perfect opportunity to strike. Once taken, the area would allow us to attack our enemies from the north."
BAL_attack_rockville: "Attack Rockville"
BAL_attack_rockville_desc: "The urban proletariat of Rockville yearn for liberation. We must drive out their oppressors and liberate the city!"
BAL_attack_aetherlands: "Attack Aetherlands"
BAL_attack_aetherlands_desc: "The ponies of the Aetherlands yearn for liberation. We must drive out their oppressors and liberate the region!"
BAL_active_measures_decision: "Active Measures Against [From.GetName]" #Translator note: активные мероприятия
BAL_active_measures_decision_desc: "MIS operatives will infilrtrate the enemy country and conduct sabotage and influence operations to undermine them."
BAL_form_equus: "A United Equus"
BAL_form_equus_desc: "After all the bloodshed, all enemies of the revolution on Equus have surrendered. The entire continent has been liberated after tremendous effort and sacrifice. Let us have a moment of silence for every creature that perished for our noble cause. Then, let us prepare for world revolution!"

