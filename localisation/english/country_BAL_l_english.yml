BAL_decisions_desc: "The revolution must survive at any cost necessary. The night of capitalism is ending, and the glorious red dawn of a bright socialist future is coming. All ponies and other creatures must do their part, united under the red banner that is drenched in the blood of the working class martyrs.[BAL_influence_scripted_loc]"
