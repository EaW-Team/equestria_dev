BAL_boreal_bloom_name:0 "Boreal Bloom"
BAL_gay_brandon_desc:0 "An ethnic Coltjun born in one of the numerous towns and villages of the Hayseed Swamps, the hardened Boreal Bloom has been many things, from being a pegasus scout during the troubled times of the December Revolution to being a chief mechanic working within the mid-level management of Baltimare's largest motor plant as well as a regular writer for the local socialist newspaper, publishing columns and distributing pamphlets calling for the achievement, defence and spreading of the socialist doctrine by a strong and orderly, yet fair and patriotic state right before the city erupted into revolution.\n\nAs Baltimare descended into chaos during the Lunar occupation, Boreal Bloom and his fellow coworkers overthrew and imprisoned the upper management of the factory complex before coalescing numerous surrounding revolutionary uprisings within the industrial park into a single unified column of worker-soldiers and, to the surprise of the other revolutionary forces, boldly breaking out from a Baltimare still surrounded by Lunar forces at the helm of a flying column to assist the liberation of his native Hayseed Swamps and driving out the thestrals from them altogether in tandem with the local Coltjun militias.\n\nDespite his supposed sympathies for the statist PON and IES organizations and his open antagonism towards the CAN, his pragmatic appreciation of many of TER's ideals has led him to voluntarily place himself and his force under the nominal command of Comrade Golden Delicious, determined to not let the Revolution die at all costs."
