baltimare.1.t:0 "The Spark of Revolution"
baltimare.1.d:0 "As the sun was raised above Baltimare, it shone upon a liberated city.\n   Only some days ago, a coordinated attack had been launched against it. In the dark of the night, strange ponies armed with heavy weapons took over government buildings and the radio station, displaying an unknown black flag. They called themselves "lunarists" and broadcasted on the radio that the city was now part of the Lunar Empire of Nightmare Moon. This event came as a complete shock to the city's inhabitants. Only a little over seven years ago, they had learned that Nightmare Moon was real and not a legend. Now, not only was she somehow back, but had an entire army supporting her.\n   The city's elected mayor, Ash Moustache, tried to quickly salvage the situation. He was a friend of the mayor of Manehattan, a city heavily involved in the thestral integration movement, so he was able to convince the lunarists to let him remain in charge. He urged the citizens to remain calm and keep their heads down, desperately trying to avoid any bloodshed or chaos. Perhaps he was afraid of repeating the past, when the city's workers had protested against the previous mayor during the Winter Revolution.\n   His efforts were in vain.\n   The occupation turned out to be unbearable. A strict nighttime curfew was imposed, workers were forced to produce weaponry for the "Lunar Imperial Army", and those who supported Celestia disappeared one by one. Yet, unlike most other cities in the newly proclaimed Lunar Empire, Baltimare was prepared.\n   Ever since the Winter Revolution and the brutal crackdown against the protests in the city, the working class had readied themselves for a potential revolution if the opportunity ever presented itself. Now it had. All at once, different left-wing factions launched their attacks: anarchists, trade unions, the local communist party and even the police force, taken over by infiltrators among their ranks. The lunarists were soon forced to flee with heavy casualties and the traitor Ash Moustache was imprisoned. The revolution then spread into the countryside, going as far as it could before supplies ran low and opposition stiffened.\n   Now, on this bright and sunny day, Baltimare finds itself free and independent. The city's fate is now in the hooves of those who once worked for others." #Done
#As the Baltimare Radio broadcasted sounds of chaos in Canterlot, the thestrals living in the outskirts of the city began rioting. When a battalion of armed bat ponies appeared from the jungle, carrying a black banner of the moon, the rioters and Mayor Ash Moustache welcomed them. He was a good friend of the mayor of Manehattan and was sympathetic to the plight of the thestrals. But the lunarists soon realized they were in a city that was openly hostile to them.\n\nBaltimare had been a center of the labour union movement for decades and was the headquarters of the nation-wide workers' organization CAN-TER. The unions of factory workers, dockworkers and sailors of the city had always pushed for better pay and fairer working conditions, which the previous mayor had been reluctant to grant in fear of losing profits. When the ponies of Stalliongrad rose up in arms, a general strike took place in Baltimare as a sign of support. The mayor responded by sending in the police to violently suppress it. Though Princess Celestia removed her from office afterwards and Mayor Ash Moustache replaced her after elections, the damage had been done: many workers could no longer trust the government and were pushed to radicalism. Stalliongrad was happy to support them as secret stashes of weapons were gathered in preparation for revolution.\n\nNow that distrusted bat ponies tried to take over the city and impose strict war-time curfews and poor working conditions on the workers, the time for revolution had come. Militias were formed and stockpiled weapons were put to use. The thestrals were driven out and the Mayor imprisoned, his government dissolved. The militia drove onwards, liberating the forests around Baltimare, before they had to stop.\n\nThe military was now in complete disarray and so was the economy. Different unions and parties had their own militias that did not cooperate and had a complete lack of discipline, some workers collectivized factories and farms while others nationalized them. Capitalism was crushed as soon as possible, with no regard to what chaos it would cause. Now that the lunarists were gathering their forces on the frontline, it was clear something had to be done to prevent the revolution from collapsing into itself.
baltimare.1.a:0 "We must remain united in our cause."
baltimare.2.t:0 "The First Session of the Congress"
baltimare.2.d:0 "The old city hall, once the home of Mayor Ash Moustache, was now adorned with large red banners that fluttered in the wind. Numerous ponies flocked into the building, as the first meeting of the Baltimare Congress was about to begin.\n   Inside, a pony named Golden Delicious smiled as others warmly greeted him. Within a few days, he had risen to fame thanks to his valiant leadership during the offensive which drove the reactionary lunarists out of Baltimare. But the warmest greeting of all came from Cricket Chafer, who not only embraced him but also kissed him on both cheeks. "Comrade! What a glorious day it is today!"\n   Golden chuckled. "I am quite overwhelmed, yes. I never believed this would happen."\n   "The revolution relies on the belief that dreams can come true," Cricket said. "So, TER has decided to join the Popular Front after all?"\n   Most of the left-wing organizations in the city, including TER, the confederation of labour unions, had decided to unite in a political coalition, which allowed them to dominate the Congress. "Yes, even if our anarchist allies in CAN are rather upset about it."\n   Cricket snorted. "Of course. They'll come to understand the necessity of this government eventually, and then they'll join us too."\n   Nearby, Golden saw a shady figure walk past. He frowned. "Lavender Berry is here?"\n   "Why of course! IES has joined the Front as well. Do not worry, he is a good friend of mine."\n   Lavender looked back at Golden. There was a coldness in his eyes.\n   "We're not letting republicans or monarchists in the Congress, but we did let him in...?" Golden mumbled.\n   Cricket patted him on the shoulder. "Without IES's splendid work in infiltrating the police force, our revolution would have failed! We can trust them. Now come, let's get you elected as the provisional chairpony of the Congress!" With a gentle push, Golden Delicious walked forward." #Done
#The old city hall, once the home of Mayor Ash Moustache, was now filled to the brim with representatives of the numerous revolutionary factions within Baltimare. Together they formed the Popular Front, a political coalition of all the left-wing organizations in the city. The Congress was meant to be a temporary war-time government and thus monarchists and republicans were not allowed to be in it as they were suspected of being supporters of the Celestial Resistance or Ash Moustache.\n\nOut of the myriad parties and organizations in the Popular Front, the most notable ones were the anarcho-syndicalist CAN-TER, communist PON and Stallionist IES. CAN was an organization of anarchist militants closely affiliated with TER, but have so far been very reluctant about participating in the statist Congress. TER was a country-wide confederation of labour unions whose headquarters were in Baltimare. PON was a communist party supported by Stalliongrad and lead by Cricket Chafer, a veteran of the Winter Revolution, while IES was a fringe party of Stallionists who believed a powerful state was needed to make true communism possible. Its leader Lavender Berry was a shady figure and a former policepony, who had defected, betrayed his fellow officers and revealed his secret membership in IES.\n\nDuring the first session, Golden Delicious of TER, who lead the offensive which drove the reactionary lunarists out of Baltimare, has been elected to be the provisional chairpony of the Congress. In addition a draft of a new constitution for the Republic was made and several social reforms were passed.
baltimare.2.a:0 "We're off to a good start."
baltimare.3.t:0 "Revolution In Baltimare"
baltimare.3.d:0 "Recently news of a revolution in southeastern part of war-embroiled Equestria arrived in Sicameon. The formation of a socialist republic in Baltimare pleased the radicals and the syndicalists, for the city was the headquarters of Equestria's largest confederation of labour unions, CAN-TER. Some were so enthusiastic about this that they were eager to travel abroad and aid their equine comrades in their struggle. Among them is the writer Jorge Orellana, former teacher known for his left-leaning novels. He said that he desired to go fight against the monarchist supporters who opposed the young republic, and was confident in his own combat abilities." #Done
baltimare.3.a:0 "Let us hope they all return in one piece."
baltimare.4.t:0 "Support From Sicameon"
baltimare.4.d:0 "Having heard of our revolution, syndicalists and leftists from [SIC.GetNameDef] have now arrived across the sea to support us in our struggle for freedom against monarchist oppressors. Among them is the writer Jorge Orellana, who was eager to fight. He has received training in the Sicameonese militia and Comrade Delicious has proposed promoting him, because we have a severe lack of capable officers." #Done
baltimare.4.a:0 "Welcome, comrades!"
baltimare.5.t:0 "A Request From Baltimare"
baltimare.5.d:0 "Cricket Chafer, the leader of the communist PON party in Baltimare, has sent us a secret telegram asking for our aid. He says their revolutionary struggle could benefit greatly if we decided to send our finest minds to act as advisors. While there, they could also work to sideline the counter-revolutionary anarchists and syndicalists in the Baltimare Congress.\n\nHowever, he did not specify what kind of advisors to send, so it is up to the politburo to decide. Should we send political advisors such as Gold Muffin and Spike Spiegel to boost their morale and ensure communist principles are followed closely, or should we send military advisors such as Sofia and Nevsky to whip their soldiers into shape? Should we even send anyone? Baltimare is a dangerous war zone, after all." #Done
baltimare.5.a:0 "We shall send Gold Muffin and Spike Spiegel."
baltimare.5.b:0 "We shall send Sofia and Nevsky."
baltimare.5.c:0 "It is too risky. Send them our moral support."
baltimare.6.t_accepted:0 "Stalliongrad Sends Advisors"
baltimare.6.t_refused:0 "Stalliongrad Refused Our Request"
baltimare.6.d_gold_spike:0 "Good news! Escorted by several ships of the Red Navy, two advisors have arrived from Stalliongrad in the harbour of Baltimare: Gold Muffin, a communist changeling who is a refugee from Chrysalis' Queendom and a popular figure among the socialists of Equestria, as well as Spike Spiegel, one of the ponies responsible for the economic planning of Stalliongrad's military production. They have expressed their eagerness to aid us in our struggle." #Done
baltimare.6.d_sofia_nevsky:0 "Good news! Escorted by several ships of the Red Navy, two advisors have arrived from Stalliongrad in the harbour of Baltimare: Sofia, a high-ranking veteran of the Winter Revolution and an expert on mobile warfare, and Nevsky, an officer known for his skillful management of logistics. They have expressed their eagerness to aid us in our struggle." #Done
baltimare.6.d_refused:0 "Unfortunately, a telegram from Stalliongrad has been received that states they do not wish to send their advisors to an active warzone. They did say that other avenues for cooperation remained open and would be happy to send advisors after the end of hostilities, but already this has made it harder to trust our supposed comrades up north." #Done
baltimare.6.a:0 "Their help is appreciated."
baltimare.6.b:0 "Their help is appreciated."
baltimare.6.c:0 "Our "comrades" have left us on our own..."
baltimare.7.t:0 "The Second Session of the Congress"
baltimare.7.d:0 "The Congress once again gathered in the city hall of Baltimare, but this time allowed its former occupant Ash Moustache to enter. He was escorted by armed militiaponies and was brought in front of the Congress to hear what his fate would be.\n   Cricket Chafer was first to speak. "Comrades, I believe we should pardon the former mayor in the name of harmony. After all, he could not have known that the lunarist occupiers would be so harsh. Perhaps he believed in their false promises out of naivete. Whatever the case, I do not believe him to be malicious. Besides, by showing mercy, we will convince doubters of our moral superiority. And, perhaps, we could even benefit from his aid. He is a well-behaved gentlecolt with diplomatic talent."\n   The congressponies began to murmur, while Ash Moustache smiled and sighed in relief.\n   After the Congress went silent, Chairpony Golden Delicious spoke next. "While Chafer's proposal is a good one, I think we should not be naive ourselves. Ash Moustache has connections both to the old harmonic regime and the tyrannical lunarists. We should not blindly trust him. Even if he means no harm to us, he can still be a figurehead for counter-revolutionary forces to rally behind. I suggest we simply banish him from the Republic. This would not only discredit the old regime, but also remove a potential collaborator from the country."\n   Ash's smile faded as the congressponies seemed to approve of this idea much more than the previous one.\n   The room went quiet when they saw Lavender Berry. He glared down at the former mayor. "Leaving this bourgeois rat alive would be a terrible, terrible mistake. If we leave him here, he will betray us and undermine us. If we banish him, he will simply flee to the Celestial supporters and form a government in exile. No. Scum like him deserve only one fate: death by firing squad."\n   Some congressponies were mortified as there had never been any such executions in Equestria. But others cheered, chanting death, and making Ash appear terrified." #Done
#The Congress has once again gathered in the town hall of Baltimare, and has this time allowed its former occupant Ash Moustache to enter. He will hear what his fate will be, once the Congress comes to an agreement.\n\nAfter an hour of heated debate, three proposals proved to be most popular: pardoning the mayor in the name of harmony, for he could not have known that the lunarist occupiers would be so harsh and simply wished to help the discriminated thestral minority. Some even said Baltimare Republic could benefit from his aid, for he is a well-behaved gentlecolt with diplomatic talent.\n\nAnother, seemingly the most popular proposal was punishing the mayor by humiliating and banishing him. This would not only discredit the old regime, but also remove a potential collaborator from the country. Those who opposed this idea, mostly anarchists and members of IES, feared that he would simply flee to the Celestial supporters and form a government in exile, and instead supported a most severe punishment: death by firing squad.
baltimare.7.a:0 "Forgive and forget."
baltimare.7.b:0 "Banish him. He does not belong here."
baltimare.7.c:0 "Shoot the bastard!"
baltimare.8.t:0 "The Mayor of Baltimare Arrives"
baltimare.8.d:0 "The deposed mayor of Baltimare, Ash Moustache, has recently arrived in Portland on a ship. He tells us that he was banished from his home city by the illegitimate socialist Congress. They distrusted him due to his brief collaboration with the lunarists when they occupied the city. He is now on his way to Stableside, and has assured us he was disillusioned with the supporters of Nightmare Moon after their occupation turned out to be more ruthless than he had expected. He is more than happy to come to our aid, as long as we promise to liberate Baltimare from the revolutionaries. With the mayor now safely in our control, [Root.GetLeader] can ask him to form a municipal government-in-exile for the city of Baltimare." #Done
baltimare.8.a:0 "We'll save Baltimare soon, don't worry."
baltimare.9.t:0 "Baltimare Executes Their Mayor"
baltimare.9.d:0 "News has arrived that the radical socialist revolutionaries of the Baltimare Republic have publicly executed their deposed mayor Ash Moustache. They at least had the mercy to do it with a firing squad. The mayor had been accused of collaborating with the lunarist occupiers and was deemed guilty, but this punishment seems rather severe, especially considering Ash Moustache was known to be a compassionate gentlecolt.\n\nThe Baltimare Republic has revealed its true face as a cold-blooded killer who will not hesitate to eliminate those they see as a threat. They have clearly completely abandoned harmony and friendship, so we should not even attempt to negotiate with them." #Done
baltimare.9.a:0 "They will pay for what they've done..."
baltimare.10.t:0 "Preparing A Request"
baltimare.10.d:0 "Much to Golden Delicious' displeasure, the Congress had voted to request military aid from Stalliongrad. However, the specifics of the request had been left vague, and they now had to be decided upon with the other leading ponies of the Popular Front. "Many ponies in the trade unions are eager to fight," Golden said, "but are unable to do so because of a lack of rifles, helmets and other basic infantry equipment. Besides, that is the cheapest request, so Stalliongrad should be able to spare it."\n   Cricket Chafer appeared to disagree. "We have enough rifles and such for now, comrade. We should request more expensive artillery guns, which we have a dire lack of and struggle to acquire or produce ourselves. With them, we can safely blast our enemies from afar, giving us an advantage!"\n   Golden frowned. He felt like Cricket's personal connections with Stalliongrad meant that he believed they'd fulfill any request he'd make, no matter how expensive.\n   Lavender Berry shook his head. "Tsk, tsk. What advantage would we gain from those? Our enemies also have rifles and guns. We need to take full advantage of Stalliongrad's support and get something our foes lack completely. We must ask for planes. With the skies under our control, we can dominate the battlefield and mow down our helpless, fleeing foes from above with impunity."\n   Golden shuddered from the way Lavender said it." #Done
#The Congress has gathered once again in Baltimare's city hall to decide what kind of military equipment we should request from our comrades. Golden Delicious says many ponies in the trade unions are eager to fight, but unable to do so because of a lack of rifles, helmets and other infantry equipment. Cricket Chafer on the other hoof said that they had enough rifles and such for now, and should request more expensive artillery guns, which we have a dire lack of. With them, we can level the jungles and blast the bats from afar. Lavender Berry then made a more unusual proposal, saying we should ask for fighter planes. With control of the sky, we could dominate the battlefield and mow down our helpless, fleeing foes from above with impunity.
baltimare.10.a:0 "We need equipment for our militia!"
baltimare.10.b:0 "With big guns, we'll destroy the reactionaries!"
baltimare.10.c:0 "If we rule the sky with planes, we will gain an advantage."
baltimare.11.t:0 "Baltimare Asks For Equipment"
baltimare.11.d_bal_rifles:0 "An urgent telegram has arrived from the Workers' Republic of Baltimare, who are embroiled in a dire conflict with reactionaries. They are humbly asking for us to send them rifles, helmets, granades and other infantry equipment, so they can raise more troops for battle. While it is clear we should generously aid our comrades, we should consider if we can afford to do so. Our own military remains the highest priority for us."#Done
baltimare.11.d_bal_guns:0 "An urgent telegram has arrived from the Workers' Republic of Baltimare, who are embroiled in a dire conflict with reactionaries. They are humbly asking for us to send them heavy guns, which they have a complete lack of. With them, they could easily destroy their ill-equipped foes from afar. While it is clear we should generously aid our comrades, we should consider if we can afford to do so. Our own military remains the highest priority for us."#Done
baltimare.11.d_bal_planes:0 "An urgent telegram has arrived from the Workers' Republic of Baltimare, who are embroiled in a dire conflict with reactionaries. They are humbly asking for us to send them fighter planes, so they can secure air superiority and gain a considerable advantage against their enemies. While it is clear we should generously aid our comrades, we should consider if we can afford to do so. Our own military remains the highest priority for us."#Done
baltimare.11.a:0 "Of course, prepare a shipment immediately!"
baltimare.11.b:0 "We cannot afford to send anything right now."
baltimare.12.t:0 "A Shipment From Petershoof"
baltimare.12.d_bal_rifles:0 "An escorted shipment of infantry equipment has arrived in the harbour of Baltimare and our workers are already unloading the cargo. Stalliongrad has sent us plenty of rifles, helmets, bullets and more, proving that we can truly trust in them and their generous support."#Done
baltimare.12.d_bal_guns:0 "An escorted shipment of artillery equipment has arrived in the harbour of Baltimare and our workers are already unloading the cargo. Stalliongrad has sent us plenty of heavy guns, mortars, artillery shells and more, proving that we can truly trust in them and their generous support."#Done
baltimare.12.d_bal_planes:0 "An escorted shipment of fighter planes has arrived in the harbour of Baltimare and our workers are already unloading the cargo. Stalliongrad has sent us plenty of high-grade aircraft recently made in their factories, proving that we can truly trust in them and their generous support."#Done
baltimare.12.a:0 "Thank you, comrades!"
baltimare.13.t:0 "No Aid From Stalliongrad"
baltimare.13.d:0 "We have received a response to the telegram we sent to Stalliongrad, and its message is not pleasant. Apparently Stalliongrad, despite having numerous military factories and a vast military compared to ours, cannot "afford" to send any equipment we requested. Those who proposed this idea are now being mocked in the Congress." #Done
baltimare.13.a:0 "How can communists be as greedy as capitalists?!"
baltimare.14.t:0 "Down With The Princesses!"
baltimare.14.d:0 ""No more idols, the pedestals shall fall!"\n   Slogans such as this echoed on the streets of Baltimare as a mass rally against monarchism was organized by the Popular Front. Propaganda about the corruption, incompetence and even cruelty of Celestia, Luna, Cadance and Twilight was blasted with loudspeakers and any statues of alicorns toppled and defaced. Grafitti art of an obese Celestia gorging on cake soon decorated walls and Luna - who had now become Nightmare Moon - was referred to as "Lunatic". The largest statue, depicting Celestia and standing in the central square, was blindfolded by a pegasus, then theatrically "executed" by a firing squad, and finally detonated with dynamite.\n   Other ponies looked in concern from the sidelines. For their entire lives, for countless generations, alicorn rule was all they had ever known, so such blatant and shameless mockery of the princesses was shocking to them. But some of the ponies realized that the entire civil war was the responsibility of the princesses. Without them, there would've been no such conflict. Yet here, these revolutionaries proposed an alternative: a future without princesses. An Equestria ruled by the ponies themselves, like in the distant past when Equestria had first been established by the three tribes.\n   Then there were those who were fanatically loyal to the princesses. The rally lured them out of their hiding places to organize a counter-protest. "Princess Celestia did nothing wrong," they chanted, "Luna did not become Nightmare Moon, do not fall for it! Princess Twilight will save the day, like always."\n   Without any warning, a group of masked ponies charged at the monarchists and beat them up violently. The counter-protest was dispersed as ponies fled in terror. Then, the masked ponies disappeared. No one knew if they had been anarchists or members of the IES."
#"No more princesses, the pedestals shall fall!"\n\nSlogans such as this echoed on the streets of Baltimare as a mass rally against monarchism was organized. Propaganda about the corruption, incompetence and even cruelty of Celestia, Luna, Cadance and Twilight was blasted with loudspeakers and any statues of alicorns toppled and defaced. Grafitti art of an obese Celestia gorging on cake soon decorated walls and Luna was referred to as "Lunatic". Some known supporters of the princesses were dragged out of their homes, then humiliated, mocked and beaten for their childish delusions. \n\nAnarchists and communists, syndicalists and socialists, all participated in the event, for once united as one.
baltimare.14.a:0 "End to monarchism!"
baltimare.15.t:0 "Anti-Monarchist Rally In Baltimare"
baltimare.15.d:0 "News is spreading to us about a peculiar event in Baltimare, as supporters of both Princesses Celestia and Nightmare Moon flee the city in terror. The leftists of the city organized a large event dedicated entirely to discredit the institution of monarchy, to mock the princesses, and to beat up those ponies who remained loyal to them. Grafitti art of an obese Celestia gorging on cake decorated walls and Princess Luna was referred to as "Lunatic". Any monuments depicting the princesses were toppled and defaced. The most curious example was the theatrical "execution" and the following demolition of the large statue of Princess Celestia standing in the central square of Baltimare." #Done
baltimare.15.a:0 "They have gone astray..."
baltimare.16.t:0 "The Purge"
baltimare.16.d:0 "Nopony really knew who fired the first shot. There had been no official order given by the Congress, or by any military leader. It's possible a mixture of fear, paranoia, desire for revenge, built-up anger, distrust and revolutionary fervour drove ponies to act the way they did. In any case, the violence was blatantly against the values of friendship and harmony which had so recently been abandoned in Baltimare.\n   Rumours of a counter-revolutionary fifth column launched a wave of disorganized arrests by militaponies and IES-aligned law enforcement officers. These arrests then quickly turned into sudden executions without trial. Former landowners, businessponies, factory bosses, monarchists, lunarists and native priests were all suspects, even if they had done nothing, and were sent to internment camps. Temples of the natives in Kululu Forest were looted and burned down, as the "sun god" of the natives was seen as a ridiculous culmination of treacherous and naive Celestia-worship.\n   When the death toll rose to thousands and news arrived in Congress, Chairpony Golden Delicious urged for the violence to cease at once. Few obeyed immediately. Cricket Chafer pleaded to Lavender Berry, and soon enough IES cracked down on any militiaponies who were acting violently or carrying out unauthorized executions. Thousands of members of the Popular Front were thus arrested as well." #Done
#The official reason for the violence was suppressing potential counter-revolutionary opposition to the regime of the Congress. But the real reasons were far more varied: fear, paranoia, revenge, built-up anger, distrust and more. In any case, it was blatantly against the values of friendship and harmony which had so recently been abandoned in Baltimare.\n\nAnarchist mobs, syndicalist and communist militias, death squads of the IES, all attacked perceived reactionaries without mercy, everywhere in the Republic. Former landowners, businessponies, factory bosses, monarchists and more were violently abused, sent to internment camps or simply executed without trial. The violence especially focused on thestrals, who were seen as lunarist sympathisers and supporters of tyrannical Commander Stars Whirl. Temples of the natives in Kululu Forest were looted and burnt down, and priests hunted. Religion had no place in a revolutionary republic either, and the "sun god" of the natives was seen as a ridiculous culmination of naive Celestia-worship.\n\nAfter a week, some socialists began to realize they had gone too far. Golden Delicious and Cricket Chafer urged their militiaponies to stand down and end the violence, yet few obeyed immediately. It took many more bloodied days before it finally stopped.
baltimare.16.a:0 "...What have we done?"
baltimare.17.t:0 "Red Terror In Baltimare"
baltimare.17.d:0 "More news came from Baltimare as word spread about a violent crackdown on suspected "counter-revolutionaries". Armed militiaponies arrested former landowners, businessponies, factory bosses, monarchists, lunarists and native priests, sending them to internment camps and executing thousands of them without any sort of legal trial. Temples of the natives in Kululu Forest were looted and burned down as well. While Chairpony Golden Delicious ordered for the violence to stop, few obeyed his order before the violent militiaponies were themselves arrested as well.\n   Baltimare has shown its true face as a bloodthirsty regime bent on violence, trying to overturn the old order no matter the cost. They can no longer claim any kind of moral high ground against us. It is our duty to march to the city and liberate it from these leftist loonies." #Done
#The official reason for the violence was suppressing potential counter-revolutionary opposition to the regime of the Congress. But the real reasons were far more varied: fear, paranoia, revenge, built-up anger, distrust and more. In any case, it was blatantly against the values of friendship and harmony which had so recently been abandoned in Baltimare.\n\nAnarchist mobs, syndicalist and communist militias, death squads of the IES, all attacked perceived reactionaries without mercy, everywhere in the Republic. Former landowners, businessponies, factory bosses, monarchists and more were violently abused, sent to internment camps or simply executed without trial. The violence especially focused on thestrals, who were seen as lunarist sympathisers and supporters of tyrannical Commander Stars Whirl. Temples of the natives were looted and burnt down, and priests hunted. Religion had no place in a revolutionary republic either, and the "sun god" of the natives was seen as a ridiculous culmination of naive Celestia-worship.\n\nAfter a week, some socialists began to realize they had gone too far. Golden Delicious and Cricket Chafer urged their militiaponies to stand down and end the violence, yet few obeyed immediately. It took many more bloodied days before it finally stopped.
baltimare.17.a:0 "Those monsters!"
baltimare.18.t:0 "Anti-Anarchist Crackdown"
baltimare.18.d:0 "Today PON and IES managed to push a controversial piece of legislation through the Congress: all private arms were now forbidden, and a powerful "non-political" police force would be formed, separate from trade union militias. This made representatives of TER so outraged that they marched out of the city hall in protest, but there was nothing they could do about it.\n   The law was immediately enforced on the next day. Lavender Berry became the head of the newly re-establishe Baltimare Police which went to work, disarming anarchists and syndicalists away from the frontline. Understandably, many of them feared that this was but the first step, and that the next step would be the dismantling of all communes and industrial committees as well as the nationalization of all remaining collectives, so resistance to the disarmament was fierce. Fighting broke out in Baltimare itself as anarchists refused to give up their weapons. Golden Delicious demanded the immediate removal of Lavender Berry from office, while Cricket Chafer tried to broker a ceasefire between the two sides, fearing it would escalate, spread and tear their young nation in half.\n   After several days of chaos, the Congress made an official statement saying that any violence against the police would be considered treason, punishable by death. Reluctantly, the anarcho-syndicalists lowered their weapons in response and were arrested. Soon Golden Delicious realized most of his supporters now sat behind bars." #Done
#Today PON and IES managed to push a controversial piece of legislation through the Congress: all private arms were now forbidden, and a powerful "non-political" police force would be formed, separate from trade union militias. This made anarchists and syndicalists so outraged that they marched out of the city hall in protest, but there was nothing they could now do.\n\nThe law was immediately enforced on the next day. Lavender Berry became the head of the newly established Baltimare Police which immediately went to work disarming anarchists and syndicalists away from the frontline. Understandably, many of them feared that this was but the first step, and that the next step would be dismantling all communes and industrial committees as well as nationalizing remaining collectives, so the resistance to the disarmament was fierce. Fighting broke out in Baltimare itself as anarchists refused to give up their weapons. Golden Delicious demanded the immediate removal of Lavender Berry from office, while Cricket Chafer tried to broker a ceasefire between the two sides, fearing it would escalate, spread and tear their young nation in half.\n\nAfter several days of chaos, all parties in the Congress appealed to the fighters to stand down and the fighting dissipated. Thousands of anarcho-syndicalists were arrested, many of them members in Congress. Soon Golden Delicious realized most of his supporters now sat behind bars
baltimare.18.a:0 "Good riddance!"
baltimare.19.t:0 "Defanging The Congress"
baltimare.19.d:0 "Today TER, with the official support of CAN, managed to push a controversial piece of legislation through the Congress: the Republic would be decentralized, delegating many responsibilities and powers of the Congress to lower levels of government, such as local municipalities and communes. This made representatives of PON and IES so outraged that they marched out of the city hall in protest, but there was nothing they could do about it.\n   The law immediately went to effect and communes elected their own councils. They were now responsible for their own legislation, healthcare, law enforcement, military, education and so on. In fact, the Congress was left with so little power that most communists no longer saw any reason to stay in it and resigned. Several protests to this change arrived from Stalliongrad, which feared that the revolution was now critically endangered. Fresh militiapony recruits found this reaction strange as they joined the reserves of Baltimare, ready to take up arms and defend their homes more eagerly than ever before." #Done
#Today CAN and TER managed to push a controversial piece of legislation through the Congress: many responsibilities and powers of the body would be delegated to lower levels of government, to local municipalities and communes. This made communists and state socialists so outraged that they marched out of the city hall in protest, but there was nothing they could now do.\n\nThe law immediately went to effect and communes formed their own councils. They were now responsible for their own legislation, healthcare, law enforcement, military, education and so on. In fact, the Congress was left with so little power that most communists no longer saw any reason to stay in it and resigned. Several protests to this change arrived from Stalliongrad, which feared that the revolution was now critically endangered. Fresh militiapony recruits found this strange as they joined the reserves of Baltimare, ready to take up arms and defend their homes more eagerly than ever before.
baltimare.19.a:0 "Who needs the state anyways?"
baltimare.20.t:0 "The Reactionaries Are Crushed"
baltimare.20.d:0 "Red flags are now waved in Stableside, Ayacachtli and Tenochtitlan. The armies of counter-revolutionary and reactionary enemies lie scattered and broken as they flee deeper into the jungles where they aim to continue their misguided resistance. Workers cheer across the peninsula as the time of suffering and conflict finally comes to a decisive end. Congratulations arrive from all socialist parties of the world and communist nations race to recognize the newborn country as legitimate. Stalliongrad is already setting up an embassy in Baltimare. The temporary Congress held its last session where it formally dissolved itself and approved a new socialist constitution, approving the formation of a national People's Parliament to succeed it. Elections would soon take place. In the meantime, a transitional government would ensure a smooth transition.\n   But the peace won't last forever. It is certain Baltimare will have to fight for its freedom and independence as anti-socialist ideas continue to prevail abroad. They must prepare while they can and regain their lost strength, so they are ready to receive the storm when it inevitably comes." #Done
baltimare.20.a:0 "Long live the revolution!"
baltimare.21.t:0 "The Griffons Depart"
baltimare.21.d:0 "The syndicalists of Sicameon have returned from the frontline to the harbour in Baltimare. Out of the one thousand griffons who first came from abroad, 612 are now preparing to leave back home, among them Jorge Orellana who saw action in battle. He took part in repulsing a lunarist night attack, chased a mercenary with a bayonet and bombed a Celestial loyalist trench with a grenade. Unfortunately, near the end of the war he was wounded by a sniper's bullet. While he was able to continue acting in command, he no longer fought in person, and received medical treatment from Mage Meadowbrook herself.\n   He promised to Golden Delicious, who had become his good friend during the war, that he would write a novel based on his experiences while he waited for his wound to fully healed." #Done
baltimare.21.a:0 "Farewell, comrades."
baltimare.22.t:0 "The New Republic"
baltimare.22.d:0 "Today, the transitional government has proclaimed the establishment of the Southeast Equestrian Socialist Republic, the sole legitimate state on the peninsula. While some regarded the news with scepticism and pessimism, much of the urban populace in the southeast has wholeheartedly welcomed the revolution. Working conditions during the war were unbearable in most places, so the promises of workers' ownership of production and fewer working hours have pleased many. New democratic workers' councils and committees were already being established across the peninsula.\n   However, the largely untamed countryside remained a different matter. Native tribes, ignorant of socialism, viewed it as a foreign threat that wished to eradicate their traditional way of life. Lunarists, distrusted by their enemies, were preparing to wage guerrilla warfare in the jungles. Some Equestrian settlers who lived on farms near Stableside looked forward to land reform, but those who owned the most land were afraid it would all be taken away from them.\n\nIt was clear more work has to be done for the entire populace to be turned to the new Republic's side, but this was only the beginning." #Done
baltimare.22.a:0 "Long live the Republic!"
baltimare.23.t:0 "An Unexpected Event"
baltimare.23.d:0 "In preparation for election day, voting ballots had been prepared across the country and political campaigning had lasted for weeks. But the anarchists of CAN had different ideas.\n   Masked militants raided voting stations across the country, burned ballot papers and vandalized government buildings which had only recently been occupied by workers' councils. The transitional government immediately ordered these militants to be stopped, but much to its dismay, the armed forces supported their actions instead. When the anarchists realized no one would stop them, their actions only escalated. They spread out from city to city, overthrowing any nascent governmental institutions that had been established in recent weeks, and made their way towards Baltimare. There, a small battle was fought before former Chairpony and leader of TER Golden Delicious intervened and ordered his loyal militiaponies to stand down and end the bloodshed. He convinced Cricket Chafer to flee the country and entered negotiations with the anarchists.\n   Several days later, an agreement was made and the transitional government was disbanded. The Southeast Equestrian Socialist Republic turned out to be stillborn as it was formally dismantled. Any remaining military units had to either join the anarchist militias or give up their weapons. The rule of statist government in the southeast had decisively ended." #Done
#Today was supposed to be the day when elections were held. Voting ballots had been prepared across the country and political campaigning had lasted for weeks. But the anarchists of CAN had different ideas.\n\nMasked militants raided voting stations across the country, burned ballot papers and vandalized government buildings which had only recently been occupied by workers' councils. Many of the militants belonged to SESR's revolutionary army, and thus there was little opposition strong enough to stop them.\n\nWhen the anarchists realized that no one would stop them, their actions escalated. They spread out from city to city, overthrowing any nascent governmental institutions that had been established in recent weeks, and made their way towards Baltimare. There, a small battle was fought before Golden Delicious intervened and ordered his loyal militiaponies to stand down and end the bloodshed. He convinced Cricket Chafer to flee the country and entered negotiations with the anarchists.\n\nSeveral days later, the SESR turned out to be stillborn as it was formally dismantled. The People's Parliament was no more, and any remaining military units had to either join the anarchist militias or give up their weapons. The rule of government and state in the southeast had ended.
baltimare.23.a:0 "Power begets parasites. Long live Anarchy!"
baltimare.24.t:0 "An Unexpected Event"
baltimare.24.d:0 "In preparation for election day, voting ballots had been prepared across the country and Golden Delicious was holding a speech in Stableside.\n   "My fellow ponies, I know the revolution is a new arrival in this city. But I am here to assure you that it is nothing to be afraid of. In fact, it is to be welcomed warmly. If I get elected as the new chairpony, I will have the best interests of the oppressed urban working class in mind. Life has been rough, and I am sure the Celestial loyalists made many of you work hard for little pay, but I promise you all a better future. A future free of exploitation, free of violence-"\n   At that very moment, a loud gunshot echoed in the street and Golden Delicious collapsed on the ground. The listening crowd of ponies screamed and scattered in fear even as armed militiaponies started a hunt for the assassin.\n   On the following day, Golden Delicious, the hero of the revolution, was pronounced dead at the Stableside hospital. Now Cricket Chafer was confident of winning the elections and believed PON would gain control of the People's Parliament, too. He invited his good friend, Lavender Berry, to share cups of maize beer with him. "Ah, it is a shame what happened to Golden," he said to Lavender, "but he was the main contender in the elections, too. So, I can't exactly call it misfortune..."\n   Lavender said nothing and did not touch his drink.\n   "...Say, do you happen to know who shot him? Have you conducted an investigation yet?"\n   "I know who did it," he replied as a matter of fact. "And I have been told the same will happen to you, as well. Unless, of course, you step down from politics."\n   Cricket stared at him. He gulped, then tried to respond. "I... of course, I understand, haha... thanks for the advice, friend! I'll just... retire to my maize farm back in Saltlickingham, hehe..." He emptied his entire cup of maize beer at once and left.\n   What followed was PON's withdrawal from the elections, leaving IES as the only party that could be voted for, and Lavender Berry as the only candidate for chairpony. Afterwards almost all member of TER were arrested, suspected of participating in the murder of Golden Delicious, and Lavender Berry assumed emergency powers which he claimed were needed to ensure the guilty were found and put to justice." #Done
#Today was supposed to be the day when elections were held. Voting ballots had been prepared across the country and political campaigning had lasted for weeks. But then, while speaking in Stableside to a large audience, Golden Delicious was shot and killed by an unknown assailant. He had been one of the most popular candidates for the position of chairpony and the leader of the anarcho-syndicalist TER organisation which was participating in the elections like a regular party. His death resulted in a plummet of support for TER, so the other popular candidate, Cricket Chafer, was confident in his victory. Indeed when the election results finally came in, he won by a landslide and his party, PON, took control of the Parliament.\n\nBut on the following day something strange happened. Cricket announced in public that he would step down, and that a coalition would be formed between PON and IES. He said that there had been an attempt on his life and was now so afraid that he would abandon politics and retire back to his maize farm near Saltlickingham. The police chief Lavender Berry would assume temporary control over the government.\n\nWhat followed was a widespread purge of the parliament and the military. Almost all members of PON party as well as many anarcho-syndicalists were arrested, suspected of participating in the murder of Golden Delicious, leaving Stallionist IES the sole party in control. Lavender Berry also assumed emergency powers which he claimed were needed to ensure the guilty were found and put to justice."
baltimare.24.a:0 "...I'm sure it'll be fine."
baltimare.25.t:0 "The [GetYear] Elections"
baltimare.25.d:0 "In preparation for election day, voting ballots had been prepared across the country. Due to the country needing all kinds of leaders on all levels, parliamentary elections and elections for the chairpony were held simultaneously. Naturally, only approved socialist candidates were allowed to run for office. Two of the most popular candidates were Golden Delicious of TER and Cricket Chafer of PON, who were having a public debate in Baltimare to sway the working class voters.\n   "The trade unions have worked tirelessly for years to protect Equestrian workers from exploitation," said Golden Delicious, "so you can trust us to continue doing so. We believe in devolution of power, in decentralized economic planning, and in workplace democracy. Our plan for the southeast is ambitious, but with your wholehearted support, it can succeed."\n   "Say, how's that one relative of yours doing?" Cricket Chafer asked. "Applejack, I believe? One of the Princess' pets?"\n   The crowd had a mixed reaction of amusement and shock as Golden stared at Cricket.\n   The bald pony laughed heartily in response. "I'm joking, I'm joking. Nothing wrong with having some family connections! Anyways, your promises sound great and all, but what I promise is a model that works. A model based on both Stalliongrad and Equestria. Taking the best parts from both and mixing them together. And of course, I promise you all this!" He proudly raised an ear of maize high into the air, admiring it. "Maize! Enough of it to feed everypony. No one will go hungry if you vote for me! Not in the cities, and not in the countryside."\n   The speeches continued and soon enough, voting took place and the ponies decided who would lead the newborn nation for the near future." #Done
#Today was finally the day for the elections. Due to the country needing all kinds of leaders on all levels, parliamentary el1ctions and elections for the chairpony were held simultaneously. Voting ballots had been prepared across the country and political campaigning had lasted for weeks. Of course, there were plenty of complaints that all the ponies running for office were socialists, communists or trade union members, but they still represented diverse values and as such most eligible voters found some representative they largely agreed with.\n\nWhile the candidates for both the People's Parliament and the position of chairpony were numerous, in the end it became clear that two parties and two ponies dominated the vote: Golden Delicious of TER and Cricket "Pig" Chafer of PON. Both had gained fame during the fighting and were liked for their more moderate, reformist policies which appealed to those who were sceptical about socialism. Golden was an anarcho-syndicalist and strived for federalism and libertarian policies, while Cricket was a more traditional communist who nevertheless favoured a slow and patient transition to communism with the wise guidance of the state.\n\nAfter the first round of voting only these two remained. The second round would decide who would lead the nation for the near future.
baltimare.25.a:0 "The winner is Golden Delicious!"
baltimare.25.b:0 "The winner is that pig-looking pony!"
baltimare.26.t:0 ""Homage to Baltimare" By Jorge Orellana"
baltimare.26.d:0 "[This.GetNewspaperHeader]Today a new novel was published in Sicameon, written by Jorge Orellana who had participated in the Southeast Equestrian Civil War on the side of the Baltimare Republic. The book is a personal account of his experiences during the conflict and contains many details not only about the fighting but also about the revolutionary society created by the libertarian socialists of CAN-TER, which he claims was one where the "working class was in the saddle" and which was a haven of freedom and equality. He however criticized the communists of PON and IES for giving concessions to reactionaries, relying on foreign support and almost betraying the revolution. The book has already received mixed reviews and has been banned in several countries." #Done
baltimare.26.a:0 "Well written, comrade!"
baltimare.26.b:0 "Burn all copies of this nonsense."
baltimare.26.c:0 "Interesting, if controversial."
baltimare.27.t:0 ""1048" By Jorge Orellana"
baltimare.27.d:0 "[This.GetNewspaperHeader]Today a new novel was published in Sicameon, written by Jorge Orellana who had participated in the Southeast Equestrian Civil War on the side of the Baltimare Republic. The book is fictional and describes a dystopian society that exists in the year 1048, simply known as The State. It controls all of Equus while two other superpowers control Griffonia and Zebrica. All three are in perpetual war, and The State, though nominally socialist, is a totalitarian government that uses magic for extensive surveillance, propaganda and brainwashing. The MARESOC party of New Mareland has already accused him of libel, though he claims he was unaware of the party's existence and instead based the novel on his experiences in the Baltimare Republic, where PON and IES implemented increasingly authoritarian policies."
baltimare.27.a:0 ""The State" isn't socialist at all, this really is slanderous!" #Done
baltimare.27.b:0 "The State is what all socialist nations become."
baltimare.27.c:0 "Interesting, if controversial."
baltimare.28.t:0 "Our Fighters Return Home"
baltimare.28.d:0 "The conflict in southeastern Equestria has finally ended. Our volunteers, or at least those who are still alive and healthy, have returned back home across the ocean from Baltimare. Many of them didn't make it, but those who did are celebrated as heroes by leftists in our nation.\n\nJorge Orellana had participated in the fighting and was badly wounded, but survived. He said he now plans on writing a novel based on his experiences during the war." #Done
baltimare.28.a:0 "We look forward to reading what he writes."
baltimare.29.t:0 "The Hunt"
baltimare.29.d:0 "The lunarists thought that they could effectively oppose the victorious socialists by waging guerrilla war from their jungle hideouts and mountain caverns. Yet they were unaware that anarchist militants themselves were competent at asymmetrical warfare, and that several Neighua warchiefs volunteered to aid them against the thestrals, their mortal enemies.\n   With help and guidance from the natives, bands of anarchist militants entered the jungles and a deadly game of cat and mouse began. Both sides attempted to use ambushes, traps and snipers, and the only difference between the tactics of the two sides was that the anarchists fought during the day while their enemies fought during the night.\n   Much blood was shed on both sides, but eventually Stars Whirl, the defacto leader of the lunarists, died in a surprise attack. Their leadership structure began to collapse as they had relied on the rigid hierarchy to lead them, but anarchists had no such issues. The lunarists found no high-ranking leaders to target, no hierarchy to collapse. There was none, after all.\n   Soon most resistance had withered away and thousands of lunar supporters were taken prisoner. Hundreds were massacred without mercy. Neighua tribes celebrated and praised the anarchists for their valiant effort. Those loyal to Nightmare Moon fled the Southeast en masse, their homes being looted and burned by anarchists who saw them as religious monarchist scum. Tens of thousands crossed the border, taking all they could carry with them. Many died on the way." #Done
baltimare.29.a:0 "Well done, comrades."
baltimare.30.t:0 "The Aztlan Accord"
baltimare.30.d:0 "Ponies from all native tribes travelled to an ancient, forgotten temple in the middle of the peninsula to meet with elected representatives of the southeastern anarchist communes. They were split into four groups, the Neighua, the Tzinacatl, the Mareyans and the Coltecs. Meetings were held with each group separately, but similar things were agreed upon.\n   The anarchists would respect the natives' right to self-determination and autonomy, and in return the tribes would agree to send representatives to the confederal congress whenever it was convened, to aid in the defence of the Free Southeast Equestria against reactionary invaders and to consider extended collectivization of their resources. What this meant exactly was left unclear as the natives already lacked private property and instead based ownership on family and clan. As such, the tribes happily agreed." #Done
baltimare.30.a:0 "A victory for anti-colonialism and anti-imperialism!"
baltimare.31.t:0 "The War On Lunarism"
baltimare.31.d:0 "Golden Delicious looked as militaponies dragged so-called "moonspeakers" out of a temple. The building had been dedicated to moon worship, but this had been turned into fanatical praise of the mad alicorn Nightmare Moon. Everything valuable inside was also brought outside. It would be redistributed to the poor folks in the village. The temple itself would be turned into a convenient warehouse.\n   One of the moonspeakers saw Golden and recognized him. "You! The leader of the red dogs. Why are you doing this?!"\n   He looked back at her with ever so slight disgust in his expression. "After all the bad things you've done, you wonder why justice is being enacted upon you?"\n   "You call this justice? What laws have I broken? I demand fair trial! There is no justice in blind collective punishment."\n   He shook his head. "You know so little of class warfare. Imagine a crate full of apples, and some of them are rotten. These rotten apples make other ones spoil faster. What must be done is picking out all the bad apples from the bunch, as quickly as possible, to save the rest."\n   The moonspeaker stared at him with a mixture of confusion and anger. But before she could respond, the militiaponies pushed her forward and escorted her away.\n   As Golden glared at her, another militiapony galloped to him. "Comrade Delicious! News from the front. Operation Red Moon is a success. Both Stars Whirl and Starry Glory have been killed."\n   The chairpony's mood improved in an instant and he sighed in relief. "Those were the worst apples of them all."" #Done
#As the trade union militiaponies began their final offensive against Stars Whirl and her lunarist followers, Operation Lunar Eclipse was launched behind the frontlines in all lunarist-majority settlements of the southeast. Thousands of priests, so-called "moonspeakers", were arrested among the native population and added to the thousands of imprisoned lunarist military officers and political leaders who had once been proud to call themselves disciples of Nightmare Moon.\n   The former temples dedicated to moon worship, which had been perverted into fanatical submission under the mad alicorn princess Republican death squads then began processing the prisoner population, conducting mass executions without trial. As mass graves were filled, any structures identified as centers of moon worship were looted, desecrated or burned down.\n\nWhile the general thestral population was spared, it was clear to them that their lives had changed forever. Their "religion" had become a taboo and they would be punished for revering the "anti-revolutionary tyrant alicorn" or any representation of her. Some thestrals petitioned the government and appealed for moon worship to be allowed, only to be flatly rejected and told that any form of religion was a tool of oppression. Yet they could not help but notice how other natives were left alone with their sun worship. While the syndicalists of TER did not admit it, it was clear to the bat ponies that the entire campaign of mass murder was nothing more than a continuation of the Red Terror, an event that Golden Delicious himself had previously denounced."
baltimare.31.a:0 "Nothing of value was lost."
baltimare.32.t:0 "Peace With The Natives"
baltimare.32.d:0 "A group of representatives of the Neighua, the Coltecs, the Mareyans, the Tzinacatl and other smaller native groups had gathered before Golden Delicious. After several moons of violent fighting, the chairpony had offered a ceasefire and invited the natives to negotiate, on the condition that the negotiators would be chosen from the ranks of the commonfolk. After all, the Republic refused to recognize the chiefs' legitimacy.\n   After formal greetings and some discussion (with the help of a native translator), one of them spoke: "It is tragic what you did to Chief Maita. He was a good stallion."\n   Golden inhaled deeply. "I apologize, but we did what we must. The chiefs, especially the ones resisting us, have to be dealt with. You must understand that they are petty kings who hoard surplus wealth. Your lives would be better without them."\n   The natives looked at each other, unconvinced.\n   "I offer you peace on the condition that all remaining chiefs are overthrown, and the priesthoods abolished. Then we will leave you entirely alone. You are not forced to participate in our revolution beyond this."\n   "This is a difficult offer to accept. Who will lead us if not our chiefs and priests, who have provided us guidance since time immemorial?"\n   "You will guide yourselves. Have confidence. The native worker deserves to be empowered just as much as the Equestrian worker. Have the tribes elect leaders much like you, the representatives, were elected. Vote together on matters that affect the entire tribe."\n   Some of the natives remained hesitant. But one of them said "We grow weary of war, and believe enough blood has been shed. This price is not a high one to pay for precious peace, is it not?" This seemed to convince more of them, and one by one they all agreed to Golden's proposal." #Done
#Today leaders of the native tribes of the southeast who had continued their violent resistance finally entered the negotiation table in Baltimare. Most of them were Neighua, as the Coltecs and Mareyans had already mostly agreed to join rural communes. The chiefs agreed for talks only after generous promises made by Golden Delicious. The natives would be allowed to keep their lands and would not be forced to collectivize their property. They would be allowed to retain their own governments and laws as long as they did not conflict with the constitution of SESR. A formal peace treaty between the tribes - now recognized as federal subjects - and the central government was signed as well.\n\nHowever, the amount of land "granted" was anything but generous, and the tribes would still be encouraged to collectivize and embrace the revolution voluntarily. Little to no aid would be given to those who refused to do so. During Celestia's reign, the natives had been very dependent on support from the government, so many were now left in a dangerously impoverished state with a relatively high mortality rate."
baltimare.32.a:0 "Peace at last."
baltimare.33.t:0 "General Strike!"
baltimare.33.d:0 "There have been reports for several weeks now that the workers of our country are organizing an impressively large strike. When it finally took place, its size was even bigger than expected, with workers from almost every sector of the economy taking part. It is clear the workers cooperated closely and had a shared plan, meaning labour unions were involved, legal or not. Our police also suspects there was foreign involvement, with all trails pointing to [BAL.GetNameDef], where the trade union organization TER is in control.\n   The question is, what do we do about the matter? The workers demand such drastic reforms that we will never be able to fulfill their every demand, but perhaps we can make some concessions." #Done
baltimare.33.a:0 "Make vague promises of reform."
baltimare.33.b:0 "Strike at the source of this dissent!"
baltimare.34.t:0 "A Message From [From.GetNameDefCap]"
baltimare.34.d:0 "[From.GetNameDefCap] has sent an envoy, carrying a message. It says [From.GetLeader] wishes to sign a formal treaty of alliance between our two nations and wishes to establish an embassy in [Root.Capital.GetName]. He says the workers of Equus must stand together in the name of solidarity to survive in these restless times.\n   [From.GetLeader] is currently in control of the country after elections, and has been passing reforms that are similar to our policies. We do indeed have much in common, but perhaps an alliance would ultimately prove to be a burden -- or a danger." #Done
baltimare.34.a:0 "We must stand together!"
baltimare.34.b:0 "We can make it on our own."
baltimare.35.t:0 "[From.GetName] Accepts"
baltimare.35.d:0 "[From.GetLeader] received our envoy warmly. After lengthy talks, they agreed to sign a formal treaty of alliance, establishing close friendship between our two nations. [Root.GetLeader] is joyful, having heard the news. May our alliance endure for a thousand years!" #Done
baltimare.35.a:0 "Workers of Equus, unite!"
baltimare.36.t:0 "[From.GetName] Refuses"
baltimare.36.d:0 "[From.GetLeader] received our envoy warmly. But after lengthy talks, they refused to sign a formal treaty of alliance, which would have established close friendship between our nations. They said their military was wholly unprepared to aid us and that we would potentially be more of a burden, and that they had little to gain from an alliance. It was a long list of excuses, making it clear they didn't want to refuse, but ultimately decided to do so anyways." #Done
baltimare.36.a:0 "B-but I thought we were comrades?"
baltimare.37.t:0 "Make Peace Not War"
baltimare.37.d:0 "Cricket Chafer spoke on public radio, expecting the lunarists to listen to him. "I, the Chairpony of [Root.GetNameDef], wish to extend an olive branch of peace to all those still enacting acts of violence against our rightful rule. The time has come to bury the hatchet and end this senseless fighting. Light Narrative, if you are listening to me, I invite you to come and meet me in person. Perhaps we can come to an agreement. I look forward to talking with you."\n   Not long after, Light Narrative and Cricket Chafer met behind closed doors. After a while of exchanging pleasantries and sharing some drinks, Light Narrative said: "Alright, I think your idea is good. A party organization that combines both socialist and lunarist values and is allowed to join the People's Parliament. I think I can convince Stars Whirl to disarm afterwards. Just one issue."\n   Cricket Chafer put down his mug of maize beer and raised an eye brow. "And what would that be?"\n   "Starry Glory. The most fanatical figurehead of the lunarists. If he's not removed out of the picture, peace will remain a fantasy."\n   The chairpony frowned and rubbed his chin with his hoof. Then, he smiled. "I think he won't be an issue for long. My trustworthy comrade, Lavender Berry, will take care of it."\n   Less than a week later, news arrived that Starry Glory had been shot and stabbed to death by an unknown assailant. Without his fiery rhetoric, the resistance faltered, and Light Narrative swooped in, telling stories of how good their lives would be in a socialist society." #Done
#Light Narrative received the communique from Cricket Chafer and agreed to meet him in person. Behind closed doors, they came to an agreement which would hopefully end the lunarist resistance and bring peace and equality to the southeast. Light Narrative agreed to found a socialist party representing thestrals and would talk to prominent resistance leaders such as Stars Whirl and convince them to stop fighting with promises of extensive rights. However, he demanded the assassination of Starry Glory, the most fanatical figurehead of the lunarists. If he wasn't removed out of the picture, peace would remain a fantasy.\n\nSoon after the meeting Cricket Chafer entrusted his trustworthy comrade, Lavender Berry, with carrying out the task. He was the right pony for the job, for less than a week later news arrived that Starry Glory had been shot and stabbed by an unknown assailant. Without a determined leader, the resistance faltered, and Light Narrative swooped in, telling stories of how good their lives would be in a socialist society. Almost everyone was convinced and soon enough the lunar resistance had ended.
baltimare.37.a:0 "One less problem to deal with."
baltimare.38.t:0 "Indigenization"
baltimare.38.d:0 "While Cricket Chafer had no interest in negotiating with the despotic native chiefs, he needed to convince the natives themselves to end their violent resistance. Thus, in collaboration with pro-communist natives, he proclaimed the establishment of four native-ruled socialist states within [Root.GetNameDef]: the Neighua State, the Coltec State, the Mareyan State, and Tzinacatlian State. Other, smaller native groups would gain local autonomy on a lower level of government within larger states. These federated entities would receive plentiful support from the central government.\n   Most importantly, these new native-run local governments would implement land reform, open schools that taught native languages, and start various infrastructure projects. This made them popular in the eyes of many native commoners, who abandoned their chieftains in the jungles in order to have access to better services. State propaganda also played a prominent role, promising a better life for all natives that ended their resistance and joined these newborn states." #Done
#In the People's Parliament, PON successfully approved government funding for a program to integrate southeastern natives, despite opposition from CAN-TER. It included a rural education reform, various development projects and so on, all aimed to modernize more isolated regions of the southeast and erode tribal identities. Opponents to this claimed it would endanger the culture and way of life of the natives, but Chairpony Cricket Chafer reminded the that the native way of life consisted of inequality, ignorance and poverty. Communism would be introduced to the natives and their lands collectivized, no matter what.\n\nThis also meant that traditional tribal chiefs would be stripped of their status and property. Some native ponies resisted and protested this change, and some chiefs tried to preserve their status with violence, but armed communists soon drove them away from native settlements, forcing them to hide and survive in the jungle. Chafer predicted most natives would welcome this change once the program improved their standards of living, and emphasised the need for educational indoctrination to make them understand the necessity of social revolution.
baltimare.38.a:0 "Victory without a single bullet fired."
baltimare.39.t:0 "The Great Fire"
baltimare.39.d:0 "Dozens of planes, previously used for transporting mail, pilot training or agriculture, were requisitioned by the State and repurposed at the Baltimare airport. Thousands of canisters of napalm, thermite and other incendiaries had been prepared in the chemical plants of Baltimare or acquired from abroad. These were then turned into bombs, which were loaded onto the airplanes.\n   The air fleet set out during the day, when many of the lunarist resistance fighters were asleep, as especially the thestrals fought at night. The planes then unleashed their deadly payload and set the jungle below them on fire. Incendiary bombs were dropped on all identified and suspected bases of the resistance. In a great flash they ruptured, the screams of the dying drowned out by the wrathful burning of the flames.\n   Such strikes were made multiple times all across the peninsula. The primary effect was psychological, as many fighters soon surrendered after witnessing the fate of the victims of the fires. Yet some continued to fight, and thus the bombing continued. Stars Whirl, the leader of the lunar resistance, was then confirmed to be dead, and the resistance dwindled into almost nothing.\n   Hundreds or even thousands of hectares of jungle had been burnt to cinders and civilian casualties were not avoided. Lavender Berry decreed the ash-rich land be converted to swidden which could then be used by farmers for food production. Remains of charred resistance fighters would also fertilize the soil." #Done
baltimare.39.a:0 "That proved to be effective."
baltimare.40.t:0 "The Screaming Jungles"
baltimare.40.d:0 "The army of the State prepared for a grim but necessary mission: crushing the dissenting native resistance, nationalizing their lands and property and ensuring they would obey government directives. To ensure the task would be accomplished, the soldiers were advised to be ruthless, and were fed copious amounts of propaganda depicting the resisting natives as bloodthirsty reactionaries who engaged in cannibalism and live sacrifice of ponies.\n   Each pocket of resistance and every native village was targeted with a warning bombardment of napalm or thermite. If they did not surrender and agree to immediate integration into the State, the army would attack with flamethrowers and rifles and systematically hunt down the dissenters. Such a method was systematically used from region to region, with hundreds of villages being destroyed and hundreds more successfully forced to bend. Loyalty was ensured by taking hostages and disarming the locals.\n   In many places the natives fought back, either with stolen guns or self-made crude bows and spears. Casualties could not be avoided, but the natives were disorganized and outnumbered, and could do little against fire that consumed their dear jungles.\n   The death toll was great, but after the smoke cleared off, it was quiet. There was peace in southeastern Equestria at last." #Done
baltimare.40.a:0 "A necessary act."
baltimare.41.t:0 "The Drums Of War"
baltimare.41.d:0 "One night, it began to echo everywhere in the jungle. The drums, ceaselessly beating at a slow and steady rhythm. It did not take long for patrols to be mobilized to find the source of this unauthorized noise which required a permit from the Ministry of Music. But whenever they got close to the source of the sounds, it disappeared, only to reappear further away. Soon enough the patrols gave up.\n   Then the drums beat more frantically. Each day, the pace quickened. The sounds got louder and more numerous. Yet the drummers remained hidden and reclusive. The troops became increasingly nervous.\n   Then the soldiers started vanishing one by one.\n   Soon enough, guards deserted their posts as their comrades went missing on patrols and during the night. Yet Comrade Berry was not pleased and ordered the deserters to be shot on sight, and sent more and more troops into the jungles. He began to once again prepare his napalm bombers to deal with this nuisance swiftly.\n   Reports arrived of sabotaged planes and looted armouries. Explosions echoed near Baltimare as the storages filled with thermite and napalm blew up without a clear reason. Little did Berry know that this was only the beginning.\n   The next day the war began. Hordes of enraged natives, ponies and thestrals, covered in blood of sacrificed soldiers, swept aside small pockets of resistance. Before the army could be mobilized, half of the peninsula was in control of the savages. Their leader finally revealed themselves. It was Ahuizotl, the Son of the Sun and Moon, the Promised One, the Tyrant-Slayer." #Done
baltimare.41.a:0 "We must crush these dissidents at once!"
baltimare.41.b:0 "Death to the despot!"
baltimare.42.t:0 "The Southeastern Uprising"
baltimare.42.d:0 "[This.GetNewspaperHeader]Lavender Berry, the chairpony of [BAL.GetNameDef], has instituted a true reign of terror in Southeastern Equestria, committing unspeakable acts against the local indigenous population and any resistance to his rule. Now vague reports are arriving that the furious natives have rallied behind a leader named Ahuizotl and have started a large-scale revolt. Eyewitness accounts claim that the natives have resorted to live sacrifice of ponies and other horrible acts to earn the favour of their gods, but this may be exaggeration. It remains to be seen if the rebels can topple the authoritarian government of the IES party." #Done
baltimare.42.a:0 "Should we support Berry? Probably not..."
baltimare.42.b:0 "Crush them, my brave soldiers!"
baltimare.42.c:0 "Who should we even cheer for?"
#baltimare.43.t:0 "SESR Asks For Investments"
#baltimare.43.d:0 "A communique from [From.GetLeader] has arrived in [Root.Capital.GetName]. He says the southeast is devastated after the brutal war, and formally requests we send them industrial equipment and funds to boost their ailing economy, promising quick growth and recovery if we do so. It is in our best interest to have a strong ally in the south, he claims. In return, SESR will grant us a portion of their yearly rubber production, a resource which we have very little of.\n\nHow shall we respond to our fellow revolutionaries?"
#baltimare.43.a:0 "Of course we will aid our comrades!"
#baltimare.43.b:0 "We cannot afford to do so."
#baltimare.44.t:0 "Stalliongrad Agrees To Invest"
#baltimare.44.d:0 "A message has arrived from [From.GetLeader] of Stalliongrad. They say that Stalliongrad will happily do everything they can do aid their allies in the south, so we can prosper together and develop our friendship further. Ships have already been sent, carrying industrial equipment and funds we desperately need. Chafer is already readying the paperwork that grants Stalliongrad a portion of our rubber production. Cooperation is proving to be very beneficial for both of us."
#baltimare.44.a:0 "Onwards to a prosperous future, comrades!"
#baltimare.45.t:0 "Stalliongrad Unable To Invest"
#baltimare.45.d:0 "A message has arrived from [From.GetLeader] of Stalliongrad. They say that Stalliongrad cannot afford to send anything at the present moment or the near future, and possibly the distant future as well. Nothing else is included in the message. This feels like a cold betrayal by those who we thought were our comrades."
#baltimare.45.a:0 "They act more like griffons than communists..."
baltimare.46.t:0 "Refugees From The Southeast"
baltimare.46.d:0 "In recent months the anarchist rabble of Southeastern Equestria have cracked down on lunarist resistance, and unfortuantely our brave general Stars Whirl fell in battle while bravely fighting against the rebel scum. The last remnants of resistance were destroyed and thousands of lunar loyalists were taken prisoner.\n\nFollowing this disaster, things got worse as the anarchists attacked suspected lunar loyalists, driving them out of their homes and calling them monarchist filth. Tens of thousands of refugess have now been pouring across the border, seeking refuge away from the anarchy and chaos of the southeast. It is clear the criminals must be brought to justice as soon as possible and order restored once and for all." #Done
baltimare.46.a:0 "Anarchist fools."
baltimare.48.t: "Mango Province Lost"
baltimare.48.d: "Reports have arrived that Mango Province, located in southeastern Equestria, has been seized by armed militiaponies affiliated with the Baltimare Republic. This daring operation was possible because we had no military units in the area to defend it. While Mango Province had little value to us strategically, Baltimare will be able to use it to strike their enemies from the north."
baltimare.48.a: "We'll retake it soon enough."
baltimare.49.t: "Prey"
baltimare.49.d: "Mage Meadowbrook wrapped a bandage around Daring Do's leg. It quickly became stained with red blood. She shook her head and sighed. "You plan to keep fighting?"\n   The pegasus nodded defiantly. "Until the bitter end. I'm not the kind of pony to give up."\n   "A lot of your friends have fled the southeast recently. I helped some of them escape, you know. Because I aided the communists before, they let me do it. To be honest, I don't think they even care that I help you all, they just want you out of the picture..."\n   "Okay. But I'm still not leaving."\n   "Some day you will get a wound that even my magic cannot heal."\n   "So be it. I'll go down fighting."\n   Meadowbrook took a flask of healing potion and offered it to her.\n   Daring emptied it in one go. "Thank you." She offered the empty flask back to her. "Say, aren't you a Pillar of Old Equestria? Why are you not fighting with us?"\n   "Back in the day, we fought evil and protected Equestria from it. The communists, as far as I can tell, are not evil. Zealous? Yes. Misguided? Possibly. But evil? No. It would be wrong for me to fight against fellow Equestrians. This entire civil war is something I would not even have had nightmares about a thousand years ago. I think everypony should stop fighting each other, even if it means living under a strange new regime. Peace is more valuable than anything. I am tired of seeing dying ponies in my hooves."\n   Daring Do said nothing and stared off into the distance."
baltimare.49.a: ""I understand. But heroes have to keep fighting, no matter what.""
baltimare.50.t: "Going Home"
baltimare.50.d: ""Boss, you sure about this?" one of Dr. Caballeron's three henchponies, Rogue, asked him.\n   The disguised earth pony looked into the distance. They were standing in the harbour of Mareidian, and a steel ship was sailing towards them. "Yes."\n   "We're really just giving up, huh?" said Biff. "I heard Daring Do is still fighting, y'know."\n   "Foolishly. That mare seems to have never learned when to let go, that's what makes her such an irritating headache." Caballeron grunted and looked off into the sea, losing the harshness in his expression. "The war is lost, and I haven't been back in Puerto Caballo in so long..."\n   "You sound tired, boss," Rogue said. "This really is it, isn't it?"\n   "I bit off more than I could chew. It's not the end of the world. I plan to retire and write some books. I even have a pen name in mind." He turned to look at his henchponies with a smile. "How does 'Q. Q. Martingale' sound?"\n   The three glanced at each other, then Withers, the quiet one, nodded. "Good name, boss," Rogue replied. "Fantastic, even," Biff added."
baltimare.50.a: "And don't come back."
baltimare.51.t: "Communists Take Over Equestria"
baltimare.51.d_anarchy: "[This.GetNewspaperHeader]What started as a communist revolution in the port city of Baltimare has now spread all across Equestria. The old order of alicorn rule has been decisively toppled and a new age has begun in the country. The anarcho-communists of CAN have begun to dismantle all remnants of the state that they destroyed, aiming to create a stateless anarchist confederation of local worker communes. Reports are spreading of hundreds, if not thousands, of suspected monarchists and counter-revolutionaries being executed without trial."
baltimare.51.d_normal: "[This.GetNewspaperHeader]What started as a communist revolution in the port city of Baltimare has now spread all across Equestria. The old order of alicorn rule has been decisively toppled and a new age has begun in the country. The socialist republic has been declared as the sole legitimate authority in the nation, with [BAL.GetLeader] as the chairpony. Thousands of wealthy ponies and monarchists are fleeing the country abroad."
baltimare.51.d_nightmare: "[This.GetNewspaperHeader]What started as a communist revolution in the port city of Baltimare has now spread all across Equestria. The old order of alicorn rule has been decisively toppled and a new age has begun in the country. The authoritarian socialists of IES have begun to eradicate all remains of the state they destroyed, aiming to solidify their totalitarian communist regime. All private property has officially been nationalized. Reports are spreading of thousands of suspected monarchists and counter-revolutionaries being executed without trial."
baltimare.51.a: "Of the past, let us wipe the slate clean!"
baltimare.51.b: "What a horrible turn of events."
baltimare.52.t: "Dawning Of A New Age"
baltimare.52.d: "A thunderous rumbling echoed in central Equestria as the royal castle in Canterlot was detonated with tonnes of explosives. The building that had stood for over a millenium as a symbol of Princess Celestia's rule disappeared in a cloud of black smoke, its brickwork stumbling down the mountainside. Everything valuable inside had been taken away beforehoof and redistributed to the populace of Canterlot. However, half of the city was a ghost town as its wealthy unicorn elite had mostly fled. Only some remained defiantly, but they were all arrested and executed, their corpses thrown off the cliff.\n   Unfortunately, another monarchist monument in the town of Ponyville proved far more resilient. The empty Castle of Friendship survived a similar attempted demolition entirely unscathed. Undeterred, the anarchists decided to instead cover the building in anarchist flags and banners, draping the entire castle in black and red.\n   In Ponyville, in Canterlot, in every city, town and village, property was collectivized, workers' councils were elected and monuments to monarchy were destroyed. Some ponies, mostly the poorest ones, welcomed this change. But most remained sceptical or even outright hostile. Much work remained to be done to prevent a counter-revolution and ensure a bright anarchist future for the nation."
baltimare.52.a: "Come, comrades, let's get to work!"
baltimare.53.t: "Elements of Anarchy"
baltimare.53.d: ""THE ELEMENTS OF ANARCHY: EQUALITY, DETERMINATION, HOPE, FREEDOM, SOLIDARITY, COMMUNITY"\n   A small group of ponies wearing hooded capes looked at the large poster with red text with a mixture of emotion. "These suck," one of them said. "'Oh look at me, I'm the element of community.' Doesn't it sound stupid?"\n   "...I don't think these are meant for individuals to represent like the Elements of Harmony. I think they're just common values, sort of."\n   "So they're not going to have element bearers anymore?" another pony asked and gasped. "But that means we're... UNEMPLOYED?!"\n   "Shush, be quiet, somepony might hear you," a fourth pony said. "'Sides, do they even... have unemployment? Don't think anypony has to work for a living anymore." She scoffed. "Hogwash."\n   Another group of ponies with rifles approached them, chatting and laughing.\n   "Quick, h-hide!" a fifth pony said, and the hooded ponies vanished into a shadowy alleyway."
baltimare.53.a: "These are much better than the old ones."
baltimare.54.t_golden: "The End Of PON"
baltimare.54.d_golden: "Golden Delicious and Cricket Chafer were sitting at a bar. The latter had a mug of maize beer and looked at Golden's own mug curiously. "Hmm, what drink did you get?"\n   "Pear juice. I don't drink alcohol."\n   "Pear...?" Cricket smiled, then erupted into laughter. "You'll get disowned by the Apple family for that!"\n   "I already have been," Golden said, not showing signs of amusement and drinking his juice.\n   Cricket went quiet, then cleared his throat. "Right. Anyways, you know well why I invited you here."\n   "To talk about politics?"\n   He nodded. "People's Organisation of the Nation was like a foal of mine. I founded it in 998 and was its leader ever since. And now you went and killed it. Killed my own foal!" His amusement returned and he grinned. "How could you, I thought we were friends."\n   "I apologize, it was not personal. All other parties are gone too. Like IES." He did not try to hide his disgust saying the name of the party. "Parties are a foreign concept to Equestria, anyways. It's a Griffonian thing."\n   "What, are griffons not comrades?" Cricket said and snorted.\n   "I didn't mean it like that... I mean that the people are much more ready to embrace local rule and union-run economy than party rule from above. It's better this way."\n   Chafer nodded slowly. "You do have a point, I guess. I don't necessarily agree. But, well, you won the elections, so you get to do whatever you want."\n   "You can still run for chairpony, you know. Maybe if you win, you can bring parties back," Golden said with a smile."
baltimare.54.t_cricket: "From Above"
baltimare.54.d_cricket: "Golden Delicious and Cricket Chafer were sitting at a bar. The latter had a mug of maize beer and looked at Golden's own mug curiously. "Hmm, what drink did you get?"\n   "Pear juice. I don't drink alcohol."\n   "Pear...?" Cricket smiled, then erupted into laughter. "You'll get disowned by the Apple family for that!"\n   "I already have been," Golden said, not showing signs of amusement and drinking his juice.\n   Cricket went quiet, then cleared his throat. "Right. Anyways, why'd you invite me here?"\n   "To talk about politics."\n   Cricket chortled in amusement. "Come on. I thought we were going to take it easy and relax."\n   "I'm serious," Golden continued. "We at TER have been asking for more union representation in the government, but I did not think you'd establish the AUCCTU as a response."\n   The bald pony shrugged. "I gave you what you wanted, no? Is there a problem?"\n   "I know you had good intentions. I am just concerned about the concentration of political power in a central body. You've gone for a top-down solution instead of a grassroots organization."\n   "It's more efficient that way." He sipped some maize beer. "Trust me, it'll work out fine."\n   Golden frowned. "Well, I do trust you. That's the main reason why I've been trying to convince CAN-TER to let you do what you're doing. They are not particularly happy about your centralized statist policies."\n   Chafer grinned, some beer dripping from his mouth. "When they see how successful PON's policies are, they'll understand the necessity of using the state as a tool to build true communism.""
baltimare.54.a: ""Maybe I will, who knows.""
baltimare.54.b: ""Perhaps they will.""
baltimare.55.t: "Back In Manehattan"
baltimare.55.d: "The last time Golden Delicious had been in Manehattan, the largest city in Equestria, was before the civil war. Though the scars of conflict were visible in many places, most of the caput mundi was much the same it had been back then. It was still the beating heart of Equestrian industry, with towering skyscrapers and bustling streets. This was the true capital of the nation, Golden thought, not some gilded bourgeois relic on a mountainside far away. This is why he decided to hold a speech here, in front of an audience of thousands. The local trade unions that had been in hiding before liberation helped him organize the event.\n   As he stood on a podium, he took a deep breath and began to speak. "Citizens of Equestria! I am Chairpony Golden Delicious. I do not speak to you as a conqueror, but as a liberator. I have fought in the streets of Baltimare, in the sweltering jungles of the southeast, in the plains and the fields, all in the name of the revolution. I never believed I would not only survive, but one day reach Manehattan itself, the greatest city in the world."\n   Many ponies in the crowd cheered.\n   "Now at last the working class is the one in the saddle. Alicorn rule is no more, and a new age has begun. Already the changes and reforms of our revolution are being spread across the country. Here, too, the labour unions will take control. We will encourage the collectivization of all property, but contrary to what our enemies say, we will not force anypony to give up their property at gunpoint. I know some ponies will not welcome these changes. But I strongly believe that once they see their positive impact, once they have a taste of true liberty, they too will be convinced of our cause. Lastly, I would like to announce that I will not remain as chairpony forever. After the revolution is secure, elections will be held. Rest assured I have done none of this for personal gain or lust for power. I have dedicated my whole life to the revolution. And I ask all of you, please do the same. Only then will our dreams become reality.""
baltimare.55.a: "The cacophonous cheering echoed in the streets."
baltimare.56.t: "Meeting The Six"
baltimare.56.d_twilight: "The wielders of the Elements of Harmony, the six legendary heroes of Equestria, had gone missing in the chaos of the civil war. It was commonly believed they had gone into hiding, or even met with a terrible fate. But luckily for the syndicalists, Chairpony Golden Delicious was a member of the Apple family, just like Applejack, the Element of Honesty. Therefore he decided to talk on a public radio broadcast, beseeching for his relative to come out of hiding and negotiate, swearing to not cause any harm to her or her friends. This worked, and soon enough the six ponies emerged out of hiding and a meeting was arranged.\n   The seven ponies met each other at a familiar location, in Applejack's farm near Ponyville. The farm still bore the scars of civil war. "Remember when the whole family gathered here?" Golden Delicious asked from his relative. "We could do that again, Fix up the whole place. It saddens me to see it in such a state."\n   Applejack sighed. "Me too, but I think we should talk 'bout that later."\n   "Right. Sorry. Ahem. I wanted to meet you all to convince you all that you're safe. You're not going to be arrested and thrown in jail or anything. You can live out your lives in peace, just like before... everything."\n   The six ponies glanced at each other. Twilight Sparkle then responded. "That's... nice and all. But that leaves some questions. What about all the things my friends own? Their homes and livelihoods. And what about my status as the Princess of Friendship?"\n   "I know our enemies have spread rumours that we steal all property, but this is false. All collectivization only concerns the means of production, and is purely voluntary. As for your title... would you be fine with no longer using it?"\n   "What the heck is a mean of production?" Rainbow Dash asked.\n   Twilight smiled at her. "I'll explain later." She then looked at Golden. "If that is all you ask for, then fine. Princess or not, I just want to continue to teach others about the values of harmony and friendship."\n   Golden nodded. "Good. I think I can convince my comrades to accept that. Equestria needs heroes like you now more than ever.""
baltimare.56.d_sunrise: "The wielders of the Elements of Harmony, the six legendary heroes of Equestria, had gone missing in the chaos of the civil war. It was commonly believed they had gone into hiding, or even met with a terrible fate. But luckily for the syndicalists, Chairpony Golden Delicious was a member of the Apple family, just like Applejack, the Element of Honesty. Therefore he decided to talk on a public radio broadcast, beseeching for his relative to come out of hiding and negotiate, swearing to not cause any harm to her or her friends. This worked, and soon enough five ponies emerged out of hiding and a meeting was arranged.\n   The six ponies met each other at a familiar location, in Applejack's farm near Ponyville. The farm still bore the scars of civil war. "Remember when the whole family gathered here?" Golden Delicious asked from his relative. "We could do that again, Fix up the whole place. It saddens me to see it in such a state."\n   Applejack sighed. "Me too, but I think we should talk 'bout that later."\n   "Right. Sorry. Ahem. I wanted to meet you all to convince you all that you're safe. You're not going to be arrested and thrown in jail or anything. You can live out your lives in peace, just like before... everything."\n   The five ponies glanced at each other. Rarity then responded. "That is all wonderful to hear. Yet it leaves some questions. What about all the things me and my friends own? Our homes and livelihoods."\n   "I know our enemies have spread rumours that we steal all property, but this is false. All collectivization only concerns the means of production, and is purely voluntary."\n   "What the heck is a mean of production?" Rainbow Dash asked.\n   Pinkie sighed, her mane flat and straight. "I bet Twilight would've known..."\n   Golden offered her a sympathetic smile. "I am sorry about what happened to her. But I promise we will do our best to find her and figure out a way to turn her back to normal. In the meantime, do you agree to work together with us, despite our differences? Equestria needs heroes like you now more than ever.""
baltimare.56.a: "Hooves were shaken and an agreement was made."
baltimare.57.t: "A Proposal From [From.GetNameDefCap]"
baltimare.57.d_syndie: "Our comrades in [From.GetNameDef] have approached us with a proposal. They are inviting us to join their federation, abolishing any borders and merging our administrations entirely. This would, of course, mean adopting their anarcho-syndicalist ideology and abandoning our own system. Is our sovereignty worth sacrificing in the name of revolutionary unity?"
baltimare.57.d_commie: "Our comrades in [From.GetNameDef] have approached us with a proposal. They are inviting us to join their nation, abolishing any borders and merging our administrations entirely. This would, of course, mean accepting their own interpretation of Caramel Marks' ideas and abandoning our own system. Is our sovereignty worth sacrificing in the name of revolutionary unity?"
baltimare.57.a: "Let us unite with our comrades!"
baltimare.57.b: "No. They are revisionists."
baltimare.58.t: "[From.GetNameDefCap] Agrees To Join"
baltimare.58.d: "A response to our proposal has come from [From.GetNameDef], and they have accepted it. Any borders between us will be abolished as they will join our federation and merge with our administration. This does, of course, mean that they have abandoned their own model of socialism, but it seems they have understood that revolutionary unity is more important than anything."
baltimare.58.a: "Workers of the world, unite!"
baltimare.59.t: "[From.GetNameDefCap] Refuses To Join"
baltimare.59.d: "A response to our proposal has come from [From.GetNameDef], and they have rejected it. It seems they want to maintain their own model of socialism and retain their sovereignty. Unfortunately, they do not see revolutionary unity as important as we do."
baltimare.59.a: "A shame, but we cannot force them."
baltimare.60.t: "A New Chaircreature"
baltimare.60.d: "Golden Delicious sat at a worker's council in his home district, in the port city of Baltimare. He was no longer the chaircreature, but he was still a member of the apple crate haulers' union. The ponies in the council were discussing who to vote for as chaircreature. This was no mere bourgeois election, but a socialist one that relied on consensus. Each council would pick their candidate, and a federal congress would then be held to decide which of the most popular candidates would become the new chaircreature.\n   Golden looked down at a paper that included a list of candidates. His eyes widened when he saw a familiar name: Cricket Chafer. Seems he had decided to become a candidate after all. He smiled and chuckled to himself.\n   "Those of you who have Cricket Chafer as your preferred candidate, raise your appendage," said one of the council members.\n   Still smiling, Golden raised his hoof."
baltimare.60.a: "In the end, Cricket Chafer wins the elections."
baltimare.60.b: "In the end, Starry Plough wins the elections."
baltimare.60.c: "In the end, Strawberry Snowflake wins the elections."
baltimare.60.e: "In the end, Valery Stablein wins the elections."
baltimare.61.t: "A New Dawn In Equestria"
baltimare.61.d: "At the very same spot in Manehattan where Princess Luna was once going to hold her speech, Cricket Chafer now stood on a podium, in front of a massive and colourful crowd of ponies. He waved with his hoof, grinning gleefully, as the state orchestra played triumphant music.\n   After the music stopped, he cleared his throat, tapped a microphone on the podium and began to speak. "Comrades! Today is a glorious day in Equestrian history. Alicorn despotism is no more, and a new proletarian government is in place. Yet this does not mean an instant change, a total revolution. I believe in gradual change, and slow building of communism. I cannot promise you that this transition period will be without any problems, but I can assure you that we will do our best to make it as smooth as possible. I come to this city not as a conqueror imposing my will, but as a liberator, and that means respecting the rights and opinions of all ponies. After all, harmony can co-exist with communism. This was what Caramel Marks originally believed.\n   "Comrades, we have a monumental task ahead of us, but by putting our differences aside and working together, we can accomplish anything. Such is the power of the magic of friendship. A communist utopia, where everypony prospers and nopony is exploited, is now more than ever within our reach. Remember this, and you will be filled with such determination that you can overcome any challenges."\n   He continued to speak, rousing the crowd with excitement, despite all the weariness they felt after the civil war."
baltimare.61.a: "The cacophonous cheering echoed in the streets."
baltimare.62.t: "Meeting The Six"
baltimare.62.d_twilight: "A MIS operative saluted the chairpony. "Comrade Chafer, we have brought the prisoners."\n   Seated behind his desk, Cricket grinned. "Good, bring them in."\n   Six ponies were escorted into the room by armed guards. The wielders of the elements of harmony showed a mixture of emotions in their war-weary faces. Some were defiant, others worried or scared.\n   "Welcome, heroes of Equestria!" Cricket exclaimed. "I am honoured to finally meet you all in person."\n   The former Princess of Friendship looked at him sceptically. "Unfortunately, I can't say the same. What do you want from us?"\n   "Oh come now, brighten up a little. I mean you no harm."\n   "Then why did you imprison us?!" Rainbow Dash asked.\n   "This was the best and most secure way to bring you all to the negotiation table. I don't want us to be enemies. Let bygones be bygones, alright? I want to offer you something. You see, I believe the Elements of Harmony can perfectly co-exist with communist values. The old order, with its capitalism and monarchism, in my opinion contradicts the values of friendship. There is nothing friendly about the rich exploiting the poor, or about an immortal despot making decisions on behalf of others. Once you realize this, you can join us. We need your help to build a better society for all creatures in Equestria, after all."\n   "Can I have my business back?" Rarity asked.\n   "And what about my family farm?" Applejack asked.\n   "And the Cake family's Sugarcube Corner?" Pinkie asked.\n   Cricket shook his head, but still smiled. "This is what I mean. You must leave the past behind you. Our new Equestria won't have petty bourgeois businesses!"\n   "So... I cannot be the Princess of Friendship anymore, then?" Twilight Sparkle asked.\n   "I'm afraid not."\n   She glanced at her friends, who glared at Cricket in anger, and sighed. "I'm sorry, but we can't work together with someone who took away everything we had."\n   Cricket's smile vanished. "So be it, then." He then turned to look at the guards and said:"
baltimare.62.d_sunrise: "A MIS operative saluted the chairpony. "Comrade Chafer, we have brought the prisoners."\n   Seated behind his desk, Cricket grinned. "Good, bring them in."\n   Five ponies were escorted into the room by armed guards. The wielders of the elements of harmony showed a mixture of emotions in their war-weary faces. Some were defiant, others worried or scared.\n   "Welcome, heroes of Equestria!" Cricket exclaimed. "I am honoured to finally meet you all in person."\n   Applejack looked at him sceptically. "What do ya want from us?"\n   "Oh come now, brighten up a little. I mean you no harm."\n   "Then why did you imprison us?!" Rainbow Dash asked.\n   "This was the best and most secure way to bring you all to the negotiation table. I don't want us to be enemies. Let bygones be bygones, alright? I want to offer you something. You see, I believe the Elements of Harmony can perfectly co-exist with communist values. The old order, with its capitalism and monarchism, in my opinion contradicts the values of friendship. There is nothing friendly about the rich exploiting the poor, or about an immortal despot making decisions on behalf of others. Once you realize this, you can join us. We need your help to build a better society for all creatures in Equestria, after all."\n   "Can I have my business back?" Rarity asked.\n   "And what about my family farm?" Applejack asked.\n   "And the Cake family's Sugarcube Corner?" Pinkie asked.\n   Cricket shook his head, but still smiled. "This is what I mean. You must leave the past behind you. Our new Equestria won't have petty bourgeois businesses!"\n   "And... what about Twilight?" Fluttershy asked. "Are you going to find a way to turn her back to normal?"\n   "I'm afraid not. The things she did under Daybreaker's rule are unforgivable."\n   She glanced at her friends, who glared at Cricket in anger, and sighed. "I'm sorry, mister. But we can't work together with someone who doesn't want to help us in any way."\n   Cricket's smile vanished. "So be it, then." He then turned to look at the guards and said:"
baltimare.62.a: ""Take them away to the re-education camps!""
baltimare.63.t: "Re-Education Camp"
baltimare.63.d_twilight: ""This is booooring," Rainbow Dash complained.\n   The six wielders of the Elements of Harmony were seated behind benches, alongside many other ponies, and watched a PON party member hold a lecture about communist ideology. The lecturer glared at Rainbow. "Could you please stay quiet and not interrupt me?"\n   "Hey, I'm just being honest."\n   "I thought you were the Element of Loyalty, not Honesty."\n   Applejack chuckled to herself while Rainbow shrugged and replied: "The elements aren't like, you know, restrictive. Applejack can be loyal, Fluttershy can be generous, Rarity can be kind and so on. We're not one-dimensional characters, y'know?"\n   The lecturer sighed. "I believe I am the one who is supposed to be holding a lecture here. Now, let us get back on topic-"\n   Rainbow immediately started snoring loudly.\n   "You can't be serious." The PON pony groaned. "Are you really this bad of a student?"\n   "Actually, she isn't," Twilight replied. "This just isn't how she learns about things. I think she could genuinely learn about the subject matter if you just-"\n   Applejack prodded her with her hoof. "Don't help 'em, what's wrong with you?"\n   "Oh, sorry, I actually find this interesting myself. I don't think there's any harm in learning about this. Just because we know about communism doesn't mean we have to agree with it."\n   "You know what, I quit!" the lecturer exclaimed. "I can't take this anymore." He then stormed out of the room, leaving behind a confused audience. Except for one light blue pony, who stopped pretending to snore and started laughing loudly."
baltimare.63.d_sunrise: ""Is this what Twilight went through when she was brainwashed by Daybreaker?" Rarity whispered.\n   The five wielders of the Elements of Harmony were seated behind benches, alongside many other ponies, and watched a PON party member hold a lecture about communist ideology. The lecturer glared at Rarity. "Could you please stay quiet and concentrate on the lecture?"\n   "Apologies, I just-"\n   "She's right," Rainbow Dash interjected. "You're no better than the solarists!"\n   The audience in the room gasped and the lecturer appeared offended. "Excuse me? I am here simply educating you, not trying to corrupt you with an ideology of pure evil!"\n   Applejack looked at him with disdain. "Your ideology's about the state stealing land and businesses from the ponies. What's good about that?"\n   "Now is not the time for a debate-"\n   "She's right," one of the ponies in the audience said. "Why are we listening to this drivel? Even the heroes of Equestria don't agree with it!"\n   "You know what, I quit!" the lecturer exclaimed. "I can't take this anymore." He then stormed out of the room, leaving behind a confused audience."
baltimare.63.a: "They'll become true communists eventually."
baltimare.64.t: "The Last Stand"
baltimare.64.d: "In the middle of the jungle, there was a bald treeless hill, jutting out from the green ocean around it. Now, it was the only safe refuge from an inferno that engulfed the surrounding jungle. A small group of ponies had set up camp there.\n   Mage Meadowbrook wrapped a bandage around Daring Do's leg. It quickly became stained with red blood. She coughed from all the smoke in the air. "This should stop the bleeding. Let me get you a healing potion..." She limped away from Daring to look through her meagre belongings.\n   Meanwhile, Doctor Caballeron slowly walked closer to Daring. The latter glared at him suspiciously. "What do you want? I'm a bit busy trying not to die here."\n   "I... look, we were never friends. But our rivalry has been legendary. So, I just wanted to say-"\n   "PLANES ARE COMING!" a guardpony exclaimed loudly. In an instant, the entire camp sprung into panicked motion, though there was nowhere to hide on the exposed hill. Their only hope was that the thick black smoke would cover them.\n   Daring Do tried to move, but winced in pain. At that moment, Meadowbrook galloped to her, offering a flask of liquid. Daring emptied in one go. "Thank you."\n   "Can you move?" Caballeron asked. "We can't just stay here-"\n   The loud roaring of the planes became deafening, and they saw numerous armed pegasi in black uniforms jumping out of them.\n   "Commie death squads!" a guardspony shouted and grabbed his rifle. "Open fire!"\n   Daring managed to get up, grinding her teeth. Caballeron quickly took two rifles and offered one to her with a smile. "You know, I never imagined it'd end like this. Even Yearling would never write something this cheesy."\n   A barely visible smile briefly appeared on Daring's lips. "No. It's not going to end." She took the rifle from him and aimed it at one of the rapidly approaching pegasi. "Because heroes never lose.""
baltimare.64.a: "Leave no survivors."
baltimare.65.t: "A Wave Of Sabotage"
baltimare.65.d: "Reports have arrived in [Root.Capital.GetName] about various sabotage actions conducted across the country. Many factories have suffered, with vital machinery being destroyed by unknown actors. In addition, government personnel have been assassinated, and subversive underground propaganda has been spread undermining the rule of our government.\n   Our own intelligence services have concluded that this wave of covert action against us has been done by operatives of the Military Intelligence Service of [BAL.GetNameDef]. There is enough evidence to accuse them of being responsible. However, our military leaders are advising us to strike back at them hard to teach them a lesson, and to topple their hostile totalitarian government. [Root.GetLeader] has to decide how to respond to this situation."
baltimare.65.a: "Condemn them publicly."
baltimare.65.b: "They will pay for what they have done!"
baltimare.66.t: "Year Zero"
baltimare.66.d: "It was 0 ABS. After Birth of the State.\n   Lavender was in his office. There would be no grand speeches or ceremonies. The State had simply become a legal fact, with the signing of a document. He then signed some more documents. Execute three thousand former Equestrian government officials. Destroy the Canterlot Castle. Rename Canterlot and Manehattan. Execute fourteen thousand anti-communist agitators. His pen moved swiftly as he signed them.\n   He sighed. It was hard work, being a leader. He carried such heavy responsibility on his weary shoulders. A secretary took his documents and Lavender left his office. He deserved a hefty reward for his efforts. "Stop," he said to the secretary.\n   She froze in place. "Uh, what is it, sir?"\n   "Tell them to get my limousine ready. I am going for a ride around the city later."\n   She gulped, and nodded.\n   An hour later, the armoured limousine drove down the streets. Berry's eyes scanned the ponies walking on the streets as armed bodyguards sat near him. His eyes locked onto a young mare wearing a beautiful dress. He raised his hoof and pointed at her. "That one. Bring her to my office."\n   The bodyguards nodded. The limousine stopped."
baltimare.66.a: "Lavender smiled."
baltimare.67.t: "Luring The Vermin"
baltimare.67.d: "A campfire crackled in the depths of the Everfree Forest, and a small group of ponies were huddled around it for warmth. Then a hooded mare galloped towards it, carrying some newspapers. At first the ponies were alarmed, but calmed down when they saw who it was. "Oh, it's you," one of them said. "Um, is something wrong?"\n   She caught her breath and showed the newspapers to them. "Look!"\n   On the front cover of the newspaper were images of their parents and siblings, beaten and bruised, surrounded by armed ponies in black uniforms. The title was "HOSTAGES TAKEN, LAVENDER ISSUES FINAL WARNING TO THE ELEMENT BEARERS".\n   Everypony around the campfire stared at the newspaper in silent horror, their mouths open. "T-that can't be a real image, right?" one pony mumbled.\n   "He's bluffing, even if it's real." another pony replied.\n   "We can't risk it!" a third pony said. "We gotta surrender before it's too late."\n   "...No, we can't. W-we have to keep fighting. Nopony... will be spared, even if we surrender. We're... the last hope for Equestria."\n   "ARE YOU INSANE?! You're just telling us to sacrifice everypony?"\n   Some of them were starting to cry.\n   "We... shouldn't sacrifice ourselves as well." She gulped and struggled to keep talking. "If we surrender, we'll die alongside them."\n   The hooded pony gritted her teeth. "I hate that you're right." She then threw the newspapers into the campfire, which burned them in an instant."
baltimare.67.a: "Oh well, it was worth an attempt."
baltimare.68.t: "An Unexpected Turn Of Events"
baltimare.68.d: "Lavender Berry entered a meeting room. As he sat down, his eyes carefully scanned the ponies seated around the table. They locked into a pony who shouldn't have been there. He frowned in a mix of anger and confusion. "Cricket Chafer? What are you doing here?"\n   Cricket stood up and pointed his hoof at him. "I hereby accuse Lavender Berry of treason. He is a capitalist spy working for foreign intelligence services. We also have testimonies from many ponies about his inappropriate, illegal behaviour. He is an enemy of the working class."\n   Now Lavender stood up as well. "What's going on, Cricket?" His worried eyes looked around at the other ponies, but no one looked back at him. "Listen to me, these accusations are false! I am innocent! Don't listen to his nonsense, he is the true traitor here!"\n   The doors behind him opened. Armed guardponies in uniform entered and surrounded him. His eyes widened in shock.\n   Cricket looked at him with pity. "You are hereby placed under arrest. Guards, take him away!"\n   As the guardsponies grabbed Lavender, he tried to resist. "No, please stop! T-there's been a terrible misunderstanding! Please, have mercy! I-I demand fair trial! No!" His glasses fell off in the struggle and shattered into pieces. He whined loudly as he was dragged away, then the doors slammed shut.\n   Cricket took a deep breath, then smiled and looked at the ponies around him. "So, comrades, let us vote for a new chairpony, now that Lavender Berry is unable to fulfill his duties.""
baltimare.68.a: "They unanimously voted for Cricket Chafer."

### Decisions

