BAL_delicious_desc_yummy:0 "Golden Delicious, commonly known as "Comrade Delicious" among the ranks of his militiaponies, is a member of the syndicalist TER organization and a military commander. Part of the vast Apple family, he has lived in Baltimare his entire life, working in its docks as a hauler of apple crates. Poor working conditions inspired him to join a labour union and he soon became active in politics, advocating for better rights for Equestria's working class. In recent years he has been part of Stalliongrad's secret military training program and has proven his skills as a capable, inspiring leader."
BAL_corn_lord:0 "Cricket "Pig" Chafer is a veteran of the communist PON party and has been its formal leader for many years. He has spent much of his life in Stalliongrad and participated in the Winter Revolution of 995/996. The rest he spent on his humble farm near Saltlickingham, secluded in the jungle which he has become familiar with. Working as a farmer, he fell in love with maize and now always advocates for its cultivation. He admires the ideals of Steel Stallion and Caramel Marks, and distrusts the more radical and unorthodox anarcho-syndicalists. However, he also thinks communism can only be achieved with patience and compromise."
BAL_amber_alert:0 "Lavender Berry is a former police officer, who has secretly been a member of the Stallionist IES party for years. When the uprising took place and lunarists were driven out, he revealed his membership and betrayed his fellow officers, ensuring that the Baltimare police force was swiftly neutered. Afterwards he led a controversial repression of monarchists, republicans and lunarists, as well as innocent thestrals who were suspected of being sympathisers of Nightmare Moon. It is not known how many died, but eventually the Congress intervened and put a stop to his short-lived reign of terror. Now he has secured control of the government, and nothing stands in his way any longer."
BAL_waifu_desc:0 "Stylus was born in 975 ALB in Cloudsdale. Her mother worked in the weather team and her father in the weather factory. Her communist ideas were often influenced by her parents' trade union activism which often alienated them from their relatives. At a young age, she would often read communist literature by Caramel Marks, and was intrigued by the concept of society that was described in them. She would find herself writing down notes and making stories about a communist utopia.\n\nSadly both of her parents would not live to see to her adulthood. Her mother passed due to an accident and her father was sickened with illness. At the age of 17 without immediate employment or relatives that would take her in, she would turn to join the Equestrian Army where she enlisted in the officer corps. For 4 years she served in the army and would find herself increasingly frustrated and clashed with some upper-class officers. The most combat she would experience was in the brief Winter Revolution.\n\nAfter her discharge from the army, she would find in employment in the communist press. She grew increasingly disillusioned with Equestrian society, which she thought was corrupted by the wealthy. Stylus would often organise strikes and marches that would sometimes clash with the local authorities. Slowly she has become one of the more notorious communists in Equestria.\n\nWhen the Equestrian Civil War broke out, Stylus found herself travelling immediately to Baltimare with a group of communists to help with the take over in the region. Upon arrival, she offers her help as a trained army officer, that will help organise the takeover and the immediate. Stylus how finally found herself in the middle of the revolution, she will not let this opportunity for revolution die within the jungles."
BAL_silver_mane_name:0 "Rain Drop"
