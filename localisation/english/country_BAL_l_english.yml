berry1_desc:0 "Lavender Berry is a former police officer, who has secretly been a member of the Stallionist IES party for years. When the uprising took place and lunarists were driven out, he revealed his membership and betrayed his fellow officers, ensuring that the Baltimare police force was swiftly neutered. Afterwards he led a controversial repression of monarchists, republicans and lunarists, as well as innocent thestrals who were suspected of being sympathisers of Nightmare Moon. It is not known how many died, but eventually the Congress intervened and put a stop to his short-lived reign of terror. Of course, he is still happy to offer his services if we ever need them."
chafer1:0 "Cricket Chafer"
chafer1_desc:0 "Cricket "Pig" Chafer is a veteran of the communist PON party and has been its formal leader for many years. He has spent much of his life in Stalliongrad and participated in the Winter Revolution of 995/996. The rest he spent on his humble farm near Saltlickingham, secluded in the jungle which he has become familiar with. Working as a farmer, he fell in love with maize and now always advocates for its cultivation. He is a firm believer in the ideals of Steel Stallion and Caramel Marks, and distrusts the more radical and unorthodox anarcho-syndicalists."
