BAL_communism_anarchy:0 "CAN"
BAL_communism_anarchy_long:0 "Confederation of Anarchists - Nonpartisan     §gAs TER grew in size over the years, it became increasingly bureaucratizied and organized. As a response, the more anarchist members of TER founded CAN to challenge the ever expanding bureaucracy and remind TER of its roots as an anarchist organization. As such, the links between the two organizations are very close, and they are often seen as one entity called CAN-TER. Its membership is secret and, like TER, it is highly decentralized. It is controversial as a movement due to its strong opposition to the Equestrian monarchy, inspired by Griffonian anarchist movements. Its members are more violent than their comrades in TER, responsible for multiple instances of rioting, looting and targeted assassination. Many of them have been arrested over the years. CAN is a legal organization solely thanks to TER's support and Celestia's benevolence and patience.§!" #Done
BAL_communism_arstotzka:0 "IES"
BAL_communism_arstotzka_long:0 "Internal Enforcers of Security     §gUntil recently, the existence of IES was unknown to almost everypony in Equestria. Even other communists in Baltimare were unaware of it, with the exception of Cricket Chafer and some other high-ranking officials of the PON party. It is a far-left, ultra-radical Stallionist terrorist organization, and its only goal is to exterminate the bourgeoisie of Baltimare and beyond. Little is known of its history, but Chafer is aware the organization was founded after the general strike of 995. Its members saw how a protest failed to bring any change to Baltimare and agreed that more extreme methods would be needed. They infiltrated the important security institutions of Baltimare, especially the local police force, in preparation for a swift decapitation strike that would topple local bourgeois government efficiently. It is certain that without their vital support, the Baltimare Republic would have never been established.§!" #Done
BAL_communism_syndiescum:0 "TER"
BAL_communism_syndiescum_long:0 "Trades of Equestria for Reform     §gTER is the primary organization of trade unions in all of Equestria. Founded in Baltimare during the summer of 983, it is an anarcho-syndicalist federation comprised of various workers' organizations. While the Severyanian Marksist movement had an effect on it, it is primarily a successor of earlier Equestrian labour and anarchist movements. Its structure is highly decentralized and founded on the principle of direct democracy. As such, it has no single leading figure. While TER was intended to be a nation-wide organization, almost all of its membership comes from the thriving industrial cities of eastern Equestria. Over the years, it has actively sought to bargain with employers for better workers' conditions, and thanks to Princess Celestia's empathy, it was often successful. But relations with the central government in Canterlot soured during the Winter Revolution of 995, when a general strike was held in support of the revolt. The local mayor cracked down hard on the strike. While Celestia intervened and ousted the mayor, she also could no longer fully trust TER due to their support of the Severyanian rebels. This distrust is more reasonable than one might think due to secret cooperation between TER and Stalliongradian revolutionaries.§!" #Done
BAL_communism_communism:0 "PON"
BAL_communism_communism_long:0 "People's Organisation of the Nation     §gThe writings and activism of Caramel Marks inspired many ponies in Equestria and led to the foundation of PON in Baltimare in 989. Political parties are rare in the country, and it was the first of its kind in the southeast. Since its foundation, a pony known as Cricket Chafer has been its central figure, being elected chairpony of the party numerous times to the point where PON and Chafer are practically inseparable. As a party, it is both orthodox and unorthodox at the same time, following the writings of Marks whenever possible, but never shying away from more pragmatic alternatives. Ever since the foundation, it has kept close ties to the Severyanian communist movement, and participated in the general strike of 995. Some believe it planned to overthrow the mayor and establish a southeastern communist state, but the plans failed as she cracked down hard on the strike. Since the event, there have been multiple proposals of banning the party as a subversive rebel organization, but Chafer has always managed to make concessions and use negotiations to keep the organization legal. This allowed them to prepare for a second uprising in peace.§!" #Done
