l_english:
###########################################
### FOCUS LOCALISATION ####################
###########################################
BAL_revolution:0 "Form The Baltimare Congress"
BAL_revolution_desc:0 "If we wish to prevail in this conflict, we must stand united in purpose. A new proletarian government must be formed to replace the old one. A socialist democratic republic, with a leftist constitution based on revolutionary ideals. The Workers' Republic of Baltimare!" #Done
BAL_anarchists_in_government:0 "Anarchists In The Government"
BAL_anarchists_in_government_desc:0 "Though the anarchists of CAN have so far been hesitant about joining the congress, they have now mostly come to an agreement that cooperation with a statist entity is necessary. With representation in the Congress, they can oppose any proposals from PON or IES that infringe too much on liberty of the common pony." #Done
BAL_advisors_from_stg:0 "Advisors From Stalliongrad"
BAL_advisors_from_stg_desc:0 "Our comrades in Stalliongrad have had years of experience from both struggle against the bourgeoisie as well as running a communist country. We would be foolish to not ask for their help. Their sharpest minds and most cunning commanders will be a great boon to our war effort... That is, if they agree to send them here." #Done
BAL_workers_self_management:0 "Workers' Self-Management"
BAL_workers_self_management_desc:0 "The means of production belong to the workers, so the workers themselves must be allowed to manage their own businesses freely with minimal interference. With increased autonomy in daily labour, morale will be boosted and exploitation by bosses and managers will be eliminated completely." #Done
BAL_nationalization:0 "State Interventionism"
BAL_nationalization_desc:0 "The path to communism is not an easy one, and the recent economic chaos has proven that intervention by a central authority is necessary as a temporary measure, especially during conflict. As our government is a democratic and proletarian one, workers' control of the state-owned means of production is still possible." #Done
BAL_mayors_fate:0 "Deciding The Mayor's Fate"
BAL_mayors_fate_desc:0 "The former mayor of Baltimare, Ash Moustache, proved to be no better than the despotic mare who set her police-hounds upon us during the general strike of 995. He openly welcomed the imperialist lunarists and happily cooperated with their short-lived tyrannical regime. Yet some among us speak of friendship and forgiveness. The Congress must convene to decide his fate." #Done
BAL_loot_royal_armouries:0 "Loot Royal Armouries"
BAL_loot_royal_armouries_desc:0 "The small garrison of the Equestrian royal guard in Baltimare was apprehended by the lunarists when they occupied the city, but their equipment was left alone in their armouries. What are we waiting for? Let's crack them open and empty them and take what we need. We don't want the guns to end up in the filthy hooves of monarchists or lunarists, after all." #Done
BAL_form_industrial_committees:0 "Form Industrial Committees"
BAL_form_industrial_committees_desc:0 "So far there has been a complete lack of planning and cooperation in our newly established socialist economy. We must rectify this by establishing democratic workers' committees in our production facilities and farms, which will then make decentralized economic plans together and execute them in collaboration with each other." #Done
BAL_meadowbrooks_aid:0 "Mage Meadowbrook's Aid"
BAL_meadowbrooks_aid_desc:0 "In the Hayseed Swamps, one of the ancient Pillars of Equestria lives. She is known as Meadowbrook and her skills at healing are already famous in the region. While she has shown no interest in our revolutionary cause and might harbour monarchist sympathies, she is more than willing to heal our wounded and sick militiaponies, which helps their morale as well." #Done
BAL_weapons_from_stalliongrad:0 "Weapons From Stalliongrad"
BAL_weapons_from_stalliongrad_desc:0 "Our comrades in the cold north have a thriving industry and vast stockpiles of armaments. Surely they will happily supply us with anything we ask for? This way we will leave the Equestrian armouries alone and avoid angering them or their supporters. Of course, we must first decide what exactly we want from Stalliongrad." #Done
BAL_supreme_economic_council:0 "Establish The Supreme Economic Council"
BAL_supreme_economic_council_desc:0 "The Congress has decreed that a single council shall be established which will be responsible for formulating a single state-wide economic plan for the duration of the war. It will also supervise that all institutions below them will closely follow their plans for production, distribution and allocation. Divergence from this plan will not be tolerated." #Done
BAL_armed_unions:0 "Armed Trade Unions"
BAL_armed_unions_desc:0 "Our labour unions have already taken up arms and formed their own militias. Now Comrade Delicious proposes we enshrine their right to bear arms in law, further integrating the common workers into our military. Members of trade unions are eager to serve and defend their homes from reactionary aggression, though their skill is questionable at best." #Done
BAL_revolutionary_discipline:0 "Revolutionary Discipline"
BAL_revolutionary_discipline_desc:0 "It is useless to simply order a soldier to fight. One must explain to them why they must fight and why it is important to keep doing so. Then they will take up arms willingly instead of being forced to do it, and won't run away at the first sight of danger." #Done
BAL_consolidate_production:0 "Consolidate Production"
BAL_consolidate_production_desc:0 "It is becoming clear to us that small businesses are lacking in efficiency compared to larger ones. We must shut down the shops of the petit bourgeoisie and establish larger syndicates of production, capable of employing more workers and being easier to manage by our committees." #Done
BAL_anti_monarchism:0 "Anti-Monarchist Rally"
BAL_anti_monarchism_desc:0 "Equestrian ponies have traditionally always looked up to Princess Celestia and other alicorns as some godlike beings who can do no wrong. The violent repression of the Winter Revolution proved otherwise, as has the recent civil war. Yet some still delude themselves. We must reveal the truth of these despicable monarchs to all, and hopefully turn them to our side." #Done
BAL_create_mis:0 "Create The MIS"
BAL_create_mis_desc:0 "Lavender Berry, leader of the IES, has proposed we establish a secret service comprised of his party members. They will investigate suspected traitors to the revolution and apprehend enemy spies, as well as decrypt the communications of our foes. Lavender is eager to make use of his talents as the head of such an organisation." #Done
BAL_military_commissars:0 "Military Commissars"
BAL_military_commissars_desc:0 "To maintain high morale within our militia and to better indoctrinate them into our revolutionary cause, we need political commissars attached to every military unit. Not only will they act as inspiring leaders, but will also manage supplies and maintain strict war-time rationing among our ranks." #Done
BAL_protect_middle_class:0 "Tolerate The Middle Class"
BAL_protect_middle_class_desc:0 "The anarcho-syndicalists are eager to collectivize the property of smallholders and traders, thinking that they are enemies of the revolution. They are mistaken. It is the big bourgeoisie, the imperialists and the monarchists who currently stand against us. In this time of crisis and conflict, we have no choice but to leave the petty bourgeoisie alone." #Done
BAL_delicious_column:0 "Form The Delicious Column"
BAL_delicious_column_desc:0 "As Golden Delicious marches across the countryside, more and more ponies flock to his red banner, eager to participate in the revolution. Many foreigners arrive from abroad too, eager to help our cause. We should welcome them openly and give them supplies so they can participate in the fighting and bring the revolution to our enemies." #Done
BAL_abolish_bit:0 "Abolish The Bit"
BAL_abolish_bit_desc:0 "Money has no place in the socialist society we are creating as the war rages on. Distribution shall solely be based on need instead of personal wealth. We will repurpose native temples into communal warehouses and allow the ponies to take what they need from them. If shortages appear, rationing will take place so everyone gets their fair share." #Done
BAL_red_terror:0 "Red Terror"
BAL_red_terror_desc:0 "The anti-monarchist rally has galvanized us. Let us now release this fury kindling in our hearts and aim it at the enemies among us, the bankers, the industrialists, the imperialists, the monarchists, the priests and the landowners. All who threaten the revolution of the proletariat, all who have oppressed us for decades and centuries, all must bleed." #Done
BAL_state_capitalism:0 "Temporary State Capitalism"
BAL_state_capitalism_desc:0 "In these dire times, it is necessary for the state to run the economy. It is a patient step on the road to socialism, and temporarily combines capitalism with state control and ownership, thus preventing exploitation by bourgeoisie which occurs in unlimited, normal capitalism." #Done
BAL_regular_army:0 "Establish A Regular Army"
BAL_regular_army_desc:0 "This war will not be won by bands of unorganized, undisciplined militiaponies. We must establish a proper, hierarchically organized and centrally commanded army. Only then do we stand a chance against the reactionary hordes threatening our revolution." #Done
BAL_devolve_government:0 "Devolve Government"
BAL_devolve_government_desc:0 "While so far the Congress has been capable of making relatively wise decisions, the influence of the statists is too great and hinders our plans for a true socialist utopia. To remove these centrists, reformists and traitors to the revolution out of the picture, we must weaken the Congress and empower local, grassroots institutions." #Done
BAL_arrest_anarchists:0 "Arrest Anarchists"
BAL_arrest_anarchists_desc:0 "Stalliongrad keeps threatening to withdraw support if we do not do something about the radical mobs endangering the integrity of our newborn communist state. We cannot allow them to roam around with their own armed patrols, illegally collectivizing what they want and disregarding the decisions of the Congress. Law and order must be restored by any means necessary." #Done
BAL_to_the_barricades:0 "To The Barricades!"
BAL_to_the_barricades_desc:0 "Now that we are secure from within, we must secure ourselves from without. Reactionaries wishing to destroy our revolution need to be crushed, and the workers have to be rallied to defend their communal homes from the enemy who wishes to take everything away from us and reduce us back into slavery. Long live the revolution! They shall not pass!" #Done

BAL_proclaim_sesr:0 "Proclaim The Southeast Equestrian Socialist Republic"
BAL_proclaim_sesr_desc:0 "Now that we have defeated the opposition to our revolution, it is time to integrate the lands which were previously under reactionary occupation. All proletariat are welcome to join our newborn Southeast Equestrian Socialist Republic and embrace its socialist ideals. Workers of the southeast, unite!" #Done
BAL_elections:0 "Hold Elections"
BAL_elections_desc:0 "The foundations for our republic are in place. Soon it will be time for the transitional government to step down and for new democratically elected leaders to take its place. Of course, reactionary parties will not be allowed to participate, but other than that all adult proletariat are free to vote or become candidates." #Done

BAL_complete_anarchy:0 "CAN's Revolution"
BAL_complete_anarchy_desc:0 "The militants of the Confederation of Anarchists have succeeded in their goal of dismantling the despicable state. Now the workers of the southeast can know true freedom and communism, instead of the propagandist lies that PON and IES wish to feed them. Power begets parasites. Long live Anarchy!" #Done
BAL_hunt_monarchists:0 "Drive Out The Monarchists"
BAL_hunt_monarchists_desc:0 "Supporters of the old order have no place in our revolutionary society. The princesses are like overbearing authoritative mothers, and these fools are like foals who do not dare to speak against them. If they love alicorns so much, then why don't they get the heck out of here and run back to their sweet princesses?" #Done
BAL_erase_statism:0 "Erase All Traces Of Statism"
BAL_erase_statism_desc:0 "The bloated, inefficient and heartless organism of state must not simply be slain, its remains must be burnt to ashes. All the bureaucrats will have to find new employment, but at least we are no longer oppressed by an artificial monster we had created to rule over us. The end result will be a patchwork of decentralized, autonomous communes which govern themselves." #Done
BAL_freedom_of_faith:0 "End Of Religion"
BAL_freedom_of_faith_desc:0 "The age of ponies revering alicorns or even worshipping them as gods is over. Religion is a tool of oppression, used to enslave the masses. All creatures are free, therefore there are no gods to rule over them. We must cast this primitive nonsense into the dustbin of history!" #Done
BAL_crush_lunatics:0 "Hunt Down The Lunatics"
BAL_crush_lunatics_desc:0 "Lunarists, or as we call them, lunatics, are a threat to our revolution. They remain loyal to their tyrannical despot, Nightmare Moon, and her clique of military oppressors. It seems it was not enough to defeat them once, we have to do so again. Let the hunt begin!" #Done
BAL_native_communes:0 "Native Self-Determination"
BAL_native_communes_desc:0 "The natives wish for little more than to be left alone, especially after we burned down their temples. This can easily be arranged. The tribes barely have any concept of property and private ownership anyways, so all we need to do is gently encourage collectivization and secularism." #Done
BAL_no_princesses_state_or_boss:0 "No Princess, Nor State, Nor Boss"
BAL_no_princesses_state_or_boss_desc:0 "Despots and overlords, oppressors of all kind, do not exist in our free society. Voluntary cooperation, mutual aid and horizontalism form our core principles. No one is forced to do anything, yet everyone must understand the importance of the greater good. We have no need for anyone to guide or lead us, as long as we share a common goal. Freedom forever!" #Done
BAL_our_syndie_buddies:0 "Our Syndicalist Friends"
BAL_our_syndie_buddies_desc:0 "The anarcho-syndicalist labour unions of TER have always been our close allies and aided us in our struggle for liberty. We should now repay them and make amends, integrating the unions into our confederation. Working together, we will reach greater heights than we ever could by ourselves." #Done
BAL_participatory_democracy:0 "Participatory Democracy"
BAL_participatory_democracy_desc:0 "The representative democracy of SESR was a joke. True democracy isn't about choosing who makes decisions for you. It is about being able to participate in decision-making personally. Every individual has the right to take part in the politics of their commune, and each commune can take part in the politics of the confederacy. Thus, we will have real, direct democracy." #Done
BAL_tear_down_taboos:0 "Tear Down Laws"
BAL_tear_down_taboos_desc:0 "The rules of our free society are not as restrictive and oppressive as the laws of the past. There are no more police, no more prisons, no more punishment. Instead, those who break the rules and bring harm on others are rehabilitated with restorative justice. Rules themselves are based on mutually agreed social contracts, not enforced from above." #Done
BAL_abolish_compulsory_ed:0 "Democratic Education"
BAL_abolish_compulsory_ed_desc:0 "Forcing young foals to sit on a school bench eight hours a day and five days a week is nothing but capitalist oppression, an assembly line of skilled workers for their factories. This authoritarian education system must be torn down and replaced with democratic, voluntary education. Explaining the importance of studying to foals and including play and choice will make them eager to learn." #Done
BAL_total_liberation: "Total Liberation"
BAL_total_liberation_desc: "Much has been done to undo the damage done by sapient creatures to other sapient creatures. But it is not enough. Nature itself remains oppressed, the lust jungles of the southeast raped by exploitation and industry, while livestock languish in cages. We must recognize the rights of animals and plants and end their abuse at once!" #Done

BAL_syndie_gang:0 "TER Triumphant"
BAL_syndie_gang_desc:0 "The syndicalists of TER have won the elections and Golden Delicious is SESR's new chairpony. They will now seek to implement reforms to turn the nation into a federation of democratic trade unions, though some doubt if the urbanites of TER can win over the rural ponies as well." #Done
BAL_suppress_middle_class:0 "Suppress The Rich"
BAL_suppress_middle_class_desc:0 "So far the traders and merchants have been unenthusiastic about our revolution and refuse to allow their businesses to be collectivized. They wish to keep their high wages and expensive bourgeois lifestyle at the expense of their workers. This cannot be tolerated, though we cannot use force. They must be driven out of the market so they eventually go bankrupt and join our collectives voluntarily." #Done
BAL_federal_charter:0 "The Federal Charter"
BAL_federal_charter_desc:0 "With a majority in the People's Parliament, we can draft a new amendment to the constitution for SESR, establishing it as a federal nation consisting of member states with extensive rights. To avoid complete chaos, the central government will retain some legislative power, but most responsibilities will be devolved to lower levels, to local communes, municipalities and states." #Done
BAL_rural_communes:0 "Persuade The Farmers"
BAL_rural_communes_desc:0 "As an organization of urban trade unions, we have never enjoyed much popularity outside of cities. Rural collectives remain few in number and most of the land remains in the hooves of individual landowners and native tribes. The solution is sending rural revolutionaries to spread the word of the benefits of joining a collective and highlighting the flaws of the capitalist system." #Done
BAL_thestral_segregation:0 "Resolve The Lunarist Problem"
BAL_thestral_segregation_desc:0 "As our fight against the stubborn lunar resistance continues, we must begin to consider what we do with the lunarist population of the southeast once the fighting ends. They are poisoned by religious fanaticism that even surpasses that of the native ponies, and were the most loyal supporters of Nightmareist tyranny. We must take decisive action to save them from themselves." #Done
BAL_native_reservations:0 "Convince The Natives"
BAL_native_reservations_desc:0 "While many natives have voluntarily joined our communes, something must be done about those who cling on to their traditions. While their despotic chiefs must be overthrown, we must prove that we are not a threat to the natives. Through dialogue and cooperation, we will hopefully help the natives embrace the revolution themselves." #Done
BAL_abolish_political_parties:0 "Disband Political Parties"
BAL_abolish_political_parties_desc:0 "Political parties are an obstacle to true democracy. They group individuals according to their political views, and are usually open to everyone regardless of class, which presents an opportunity for bourgeois influence. Trade unions are far better as organizations, for they are for the working class only, and are not divided politically. Therefore parties must be entirely supplanted by unions." #Done
BAL_anarchist_allies:0 "Our Anarchist Allies"
BAL_anarchist_allies_desc:0 "TER does not exist on its own, but as an alliance with the anarchist organization of CAN. Together we are known as CAN-TER, and have cooperated for years, preparing for revolution and demanding more rights for the workers. Now that the revolution has been successful, our friendship can continue to flourish. Together, we will create a free socialist society, where the state has minimal power over the workers." #Done
BAL_encourage_unions:0 "Expand Union Membership"
BAL_encourage_unions_desc:0 "Labour unions exist to protect their members from abuse, to empower the common worker and to unite the working class together. Membership in unions is only a good thing, yet many workers in the southeast have not joined one yet. We must promote unions and encourage ponies to sign up and join them!" #Done
BAL_worker_assemblies:0 "Workers' Assemblies"
BAL_worker_assemblies_desc:0 "The structure of governance must be built from the bottom up. Therefore all decisions must be made in plenary assemblies, where all workers who are members of the unions in question seek to reach a consensus. This system, existing on every level of government from local to national, will enshrine direct democracy as the foundation of the SESR." #Done
BAL_industrial_unions:0 "Industrial Unions"
BAL_industrial_unions_desc:0 "The building blocks of our federation shall be industrial unions. They unite workers across multiple crafts in the same industry under one banner, thus giving the members more power than they would have if they were divided into smaller craft unions. This way solidarity among workers of each industrial sector will also be promoted, and industrial unions can work together to advance our society and improve our lives." #Done
BAL_abolish_the_state: "Replace The State"
BAL_abolish_the_state_desc: "As a compromise with the statist socialists, a temporary revolutionary state was established. But with all our other reforms complete, the time has come to end the existence of the state and transfer all power to the federation of trade unions. The anarcho-syndicalist social revolution will finally be complete." #Done

BAL_corn_lord_triumphs:0 "PON Victorious"
BAL_corn_lord_triumphs_desc:0 "The communist PON party, lead by Cricket Chafer, has won the elections. He has sworn to guide the nation on a more gradualist path to socialism. According to him, a strong state is needed as a temporary measure to secure the new regime. He has a lot of work to do, as the SESR still has many problems to resolve." #Done
BAL_propaganda_campaign:0 "Offer Amnesty For Harmonists"
BAL_propaganda_campaign_desc:0 "While the Celestial loyalists fought hard against us, they ultimately lost the civil war. Some of them continue to resist, refusing to admit defeat, partly because they believe they will receive harsh punishments from us. Nothing could be further from the truth! Let Cricket Chafer speak on radio, and beseech ponies to put down their arms in return for total amnesty." #Done
#The most effective tool of the revolution is propaganda. It can be used to easily win the support of the working class and to inspire them to fight against reactionaries and class enemies. Propaganda must therefore be spread on the radio, in the newspapers, on posters and loudspeakers and more. If we also "persuade" the popular healer Meadowbrook to support us, the ponies will love us.
BAL_democratic_centralism:0 "Democratic Centralism"
BAL_democratic_centralism_desc:0 "One grave issue with the socialists of Baltimare is their lack of unity. To ensure fruitful cooperation, all decisions agreed upon via democratic vote will be binding for all party members and lower bodies of government. This combines both democracy and central authority into one, and that implementation is uniform throughout all levels of government." #Done
BAL_ban_religion:0 "A Secular State"
BAL_ban_religion_desc:0 "The natives of the southeast have a worrying practice of worshipping a sun deity, the lunarists see the tyrant Nightmare Moon as a godly figure and among the Celestial Resistance are similar religious fanatics. Yet this religion arises from miserable material conditions and oppression. Our state will distance itself from religion and watch it wither away as conditions improve." #Done
#The natives of the southeast have a worrying practice of worshipping a sun deity, the thestrals see the tyrant Nightmare Moon as a godly figure and among the Celestial Resistance are similar religious fanatics. Their faith drove them to violent and repressive acts during the war, proving what a danger religion truly is. We must stop this nonsense at once and impose strict punishments for worshippers.
BAL_talk_to_narrative:0 "Talk To Light Narrative"
BAL_talk_to_narrative_desc:0 "Light Narrative is a prominent figure among the lunarists, and unlike most of his compatriots, is reasonable and simply wants peace in the southeast. We should seek to cooperate with him and together convince the lunarist remnants to end their misguided resistance." #Done
BAL_enlighten_savages:0 "Autonomous Native States"
BAL_enlighten_savages_desc:0 "During the Princess' rule, the southeastern natives were largely left on their own, allowed to maintain their chieftains and traditions while having access to modern technology. This is part of the reason why some of them continue to fight against our rule. We can come to terms and give them the autonomy they crave, but only on certain conditions." #Done
#During the Princess' rule, the southeastern natives were largely left on their own, allowed to retain their primitive ways of life while having access to modern technology. This was of course a foolish decision. If we want spread the revolution to all corners of the southeast, the natives cannot be neglected.
#BAL_native_reservations:0 "Autonomous Native States"
#BAL_native_reservations_desc:0 "While many natives have voluntarily joined our communes, something must be done about those who cling on to their traditions. While we cannot allow chiefs to remain in power, we can create federal states for the various ethnic groups, led by elected representatives. These states will be responsible for "
BAL_unban_non_socialists:0 "A United Front"
BAL_unban_non_socialists_desc:0 "Although political parties are unfamiliar to most Equestrians, some have already protested the current ban on non-socialist parties. This ban shall now be lifted, to an extent. Democratic parties will be allowed to be established, as long as they are not in opposition, and their membership requires approval by PON. We must cooperate against our common foes!" #Done
#If the ponies want true democracy, let them have it. The ban on non-socialist parties will be lifted, for the most part, though most extreme and reactionary parties remain strictly forbidden. They are unlikely to challenge our power, but at least the more conservative proletariat will rejoice.
BAL_cooperate_with_ies: "Cooperate With IES"
BAL_cooperate_with_ies_desc: "Although IES failed to win a majority in the People's Parliament, they still want to have an active role in the building of a true socialist state. Cricket Chafer is good friends with Lavender Berry, so he has decided to appoint IES members in several important party positions. They will help us make the state as safe and secure as possible." #Done
BAL_cultural_revolution:0 "Promote Proletarian Culture"
BAL_cultural_revolution_desc:0 "Equestrian culture is infested with bourgeois ideas and values. Cultural institutions must be nationalized and promote a more socialist proletarian culture, and nurture a new generation of worker and farmer intelligentsia. Two of the southeast's most important cities will also be renamed to honour our heroes." #Done
BAL_union_council:0 "All-Union Central Council Of Trade Unions"
BAL_union_council_desc:0 "The syndicalists of TER have long requested more union representation in government to ensure true workers' control of the economy. To appease them, we shall establish the AUCCTU, an umbrella organization of the country's many labour unions. They will act as partners in management, promoting worker morale and productivity as well as providing them services and improving their standard of living." #Done
BAL_university_towns:0 "University Towns"
BAL_university_towns_desc:0 "Scientists work best when they have peace, services and good salaries. All these are guaranteed in dedicated university towns, far from the bustle of big cities and equipped with a wide array of services. Such settlements must be established across the nation so scholars can move in them and innovate better than ever before." #Done
BAL_harmonic_communism: "Harmonic Communism"
BAL_harmonic_communism_desc: "Caramel Marks did not originally want to outright replace the Equestrian societal model, merely address its faults and flaws. While we won't go as far as recognizing the authority of alicorn monarchs, we will happily embrace the values of harmony and friendship, as long as they do not conflict with communist ideals." #Done
#Stalliongrad is the home of revolution on Equus. As Comrade Chafer experienced in person, they were able to beat back the hordes of Equestria. If we wish to survive from reactionary aggression, we must seek an alliance with our northern comrades and stand united as one!

BAL_oh_shit_oh_fuck:0 "IES In Power"
BAL_oh_shit_oh_fuck_desc:0 "The plans were successful. Revisionist scum have been sidelined. Our control of the SESR has been mostly secured. Yet traitors and reactionary filth remain. They must be eradicated with extreme prejudice. This is Comrade Berry's decree and it will be obeyed.\n\nGlory to the State." #Done
BAL_purge_opposition:0 "Purge Opposition"
BAL_purge_opposition_desc:0 "Some are displeased with the current situation. Their dissent presents a threat to our stability. They must be silenced before they gather more followers. Time is of the essence. We must act quickly. We must act ruthlessly. We must do all we can to ensure peace and order. No matter the cost." #Done
BAL_weaken_parliament:0 "Weaken The Parliament"
BAL_weaken_parliament_desc:0 "The People's Parliament presents an obstruction for the functioning of state bureaucracy. Comrade Berry is displeased with remaining dissidents in it. They must not be allowed to interfere in the execution of his directives. Therefore the constitution must be amended. The yes-ponies of our party will guarantee this motion carries. The parliament will be defanged completely." #Done
BAL_state_atheism: "State Atheism"
BAL_state_atheism_desc: "The State must have supreme authority. Power cannot be shared with any imaginary objects of misguided worship. All temples must be destroyed. All priests must be arrested. The State must cure the populace from their inane delusions." #Done
BAL_burn_jungles:0 "Burn The Jungles"
BAL_burn_jungles_desc:0 "The lunarist pests think they will prevail by hiding in the jungle. But what is a safe haven will quickly become a deadly trap. Copious amounts of napalm and other incendiaries are being prepared for the greatest fire-bombing campaign in known history. The nightmareist resistance will be completely eliminated." #Done
BAL_i_said_burn:0 "I Said Burn Them!"
BAL_i_said_burn_desc:0 "Comrade Berry is not pleased with the indigenous ponies who continue to endanger the safety of citizens and opposing government control. The most severe areas of resistance are to be destroyed. If the rest continue to fight they will be destroyed as well. We are ready to wipe out the entire dissident population if needed." #Done
BAL_labour_camps:0 "Reactionary Labour Camps"
BAL_labour_camps_desc:0 "Those imprisoned for conspiring against the State have unexploited potential. They should not be left to rot in their cells. Comrade Berry has a far better use for them. They shall toil in the mines. They shall toil in the jungles. They shall construct roads and bridges. When they perish, they will do so with a smile on their lips, knowing they contributed for the greater good of the State." #Done
BAL_control_press:0 "Control The Press"
BAL_control_press_desc:0 "The so-called "freedom of speech" presents a threat to our stability. It allows subversive and dangerous ideas to spread if left unchecked. The "Baltimare Times" and associated publications must undergo extensive scrutiny by editors. They will ultimately be cleansed of reactionary anti-communist thought." #Done
BAL_single_culture:0 "Construct A New Identity"
BAL_single_culture_desc:0 "Divisions weaken a State. Divisions can destroy a State. Equestria faced such a fate. We will not. We are all a single people. We have one leader. We are one. We shall die as one.\n\nGlory to the State." #Done
BAL_establish_ministries:0 "Establish New Ministries"
BAL_establish_ministries_desc:0 "More effective governance requires more extensive bureaucracy. New agencies will be established which are directly subservient to Comrade Berry. They will execute his decress with utmost efficiency and speed.\n\nGlory to the State." #Done
BAL_crush_bourgeois_idealism: "Crush Bourgeois Idealism"
BAL_crush_bourgeois_idealism_desc: "The fields of scientific research must be cleansed. Adherence to principles of dialectical materialism needs to be ensured. Dangerous deviation and pseudoscientific thought has to be eliminated. The party line and reality are one and the same.\n\nGlory to the State." #Done
BAL_glory_to_southeast:0 "Glory To The State"
BAL_glory_to_southeast_desc:0 "The Southeast State shall last a thousand years. It is the most stable country. It is the most prosperous country. It is the strongest country. Nothing can destroy that which is invincible. Not even Equestria or the Lunar Empire. We shall show them that we are indestructible.\n\nGlory to the State." #Done

BAL_suffer_no_state: "Suffer No State To Live"
BAL_suffer_no_state_desc: "A new state has been founded west of us, and like us they are a confederacy. But instead of consisting of anarchist communes, they consist of racist colonizer ponies who wish to exploit the native buffalo. We will not tolerate such a disgusting entity existing next door. No, we must tear it down and burn it to the ground!" #Done
BAL_liberate_buffalo: "Liberate The Buffalo"
BAL_liberate_buffalo_desc: "Chiefs are little more than petty kings, and the buffalo suffered from their tyranny long enough. We shall destroy any semblance of statehood from the buffalo homeland and bring them true liberty. Then, we will grant them the same rights of self-rule that the southeastern natives have." #Done
BAL_advance_rockville: "Liberate Rockville"
BAL_advance_rockville_desc: "The mining city of Rockville is home to thousands of miners and refinery workers who have been exploited by their employers for decades. They must be freed from the chains of statist oppression and capitalist exploitation. They will welcome anarchy and soon enough the black-red banner will fly in Rockville!" #Done
BAL_liberate_las_pegas: "Liberate Las Pegasus"
BAL_liberate_las_pegas_desc: "Las Pegasus is a disgusting monument to capitalism. The wealthy party in the clouds while the impoverished toil in the shadows on the ground below. This city, if anything, needs anarchy more than any other place in Equestria. With the workers liberated, they too will be able to celebrate in the skies." #Done
BAL_to_canterlot: "Final Death Of Equestrian Monarchy"
BAL_to_canterlot_desc: "The time for the ultimate offensive is at hoof. The rest of Equestria must be freed from statist terror rule. Over a thousand years of monarchy will finally come to an end, and ponies of Equestria will at last rule themselves, without any princesses or queens or empresses. Death to all enemies of the working class!" #Done

BAL_support_unions_abroad:0 "Support Unions Abroad"
BAL_support_unions_abroad_desc:0 "The cause of revolution is international, and it is our duty to aid our comrades who continue to suffer in wage-slavery beyond the borders of our federation. We, ponies of TER, must continue to maintain friendship with all unions of Equus, so one day all workers of the world will be free from their chains." #Done
BAL_our_comrades: "Solidarity With Fellow Revolutionaries"
BAL_our_comrades_desc: "In the aftermath of the Equestrian civil war, socialist movements activated across the country. While they may not agree with us on everything, the fact remains that we share common enemies. After all, the southeastern civil war was won thanks to cooperation across the entire left. Such success can be replicated across Equestria."  #Done
BAL_international_revolution: "The International Revolution"
BAL_international_revolution_desc: "We are not alone in this world. We cannot forget about the workers of the world and their struggle for emancipation. No, we must aid them when we can. Fighting side by side with our comrades, we may perhaps one day realize our dream of a free proletarian world." #Done
BAL_international_workers_union: "Establish The International Workers' Union"
BAL_international_workers_union_desc: "TER has always sought to expand its membership and cooperate with unions in other countries. A natural evolution of this is the establishment of a transnational organization, uniting all unions under one banner. This will enable ever deeper collaboration with working class movements abroad."
BAL_revolution_in_equestria: "Bring The Revolution To Equestria"
BAL_revolution_in_equestria_desc: "The time has come and all the necessary preparations have been made. We are as ready as we will ever be. It is time to march north and finish what we started in Baltimare. We will not stop until we reach the northernmost border. Comrades, rally around Golden Delicious one more time! The liberation of the working class is at hoof!" #Done

BAL_ally_stalliongrad_and_such: "In Search Of Allies"
BAL_ally_stalliongrad_and_such_desc: "A divided Equestria cannot stand against foreign invaders. We must be willing to put our ideological differences aside if we wish to survive any potential threats. Alternatively, we can simply look to the home of the revolution in Stalliongrad and ask them to help us secure the revolution." #Done
BAL_tech_sharing: "Launch Student Exchange Programs"
BAL_tech_sharing_desc: "Knowledge must be allowed to flow freely across borders of friendly countries. With student exchange programs, we can allow the brightest of students to study abroad and then bring what they've learned back home. This will also enable us to develop closer relations with our beloved allies." #Done
BAL_comecon: "Pact Of Mutual Economic Assistance"
BAL_comecon_desc: "To compete with capitalist free market economies and other inferior modes of production, our alliance should tie the economies of member countries closer together. The PMEA will allow us to coordinate trade more efficiently, and perhaps even allow for the formulation of transnational economic production plans." #Done
BAL_unite_south: "Spread Communism In The South"
BAL_unite_south_desc: "Unfortunately, not all governments can be reasoned with. Some are so vehemently opposed to our ideology that they refuse to cooperate with us. They stand in the way of Equestrian unification and threaten the revolution with their reactionary sentiments. With such governments, diplomacy is not an option." #Done
BAL_unite_equestria: "To Canterlot!"
BAL_unite_equestria_desc: "The dream of a pan-Equestrian revolution is about to be realized. All the preparations have been made, and the armed forces are more ready than ever to drive northwards, to finally free Equestria from its chains of monarcho-capitalist oppression. Onwards, comrades, to Canterlot!" #Done

BAL_fortify_border:0 "Secure The State"
BAL_fortify_border_desc:0 "The threats from within are being dealt with efficiently. Preparations must be made for facing the threats without. Ponies must be put to work to construct bunkers and trenches on the border. We need to be prepared for tyrannical foreign states invading our own sovereign State."
BAL_papers_please:0 "Papers, Please"
BAL_papers_please_desc:0 "The borders of the State must be secured. No one can be allowed to enter or leave without authorization. Some still wish to enter because we guarantee work and safety for every pony. They will be thoroughly screened and checked. Those who have no ill intent may enter. Those who do. Will face justice."
BAL_efficient_occupation: "Ensure Rear Area Security"
BAL_efficient_occupation_desc: "The State may be drawn into a prolonged conflict against anti-communist reactionaries. In such scenarios rear area security must be ensured. The Military Investigation Service will be given expanded authority and resources. They will protect order in military occupation zones in times of war. All measures are permitted."
BAL_active_measures: "Active Measures" #Note for translators: активные мероприятия
BAL_active_measures_desc: "All actions are permitted to secure the interests of the State. MIS agents will conduct covert operations in enemy territory to sabotage them. They will turn citizens against their bourgeois governments. Any resistance groups will be supported. Potential threats must be undermined before it is too late. And if they decide to strike back against us. We will be ready."
BAL_defence_in_depth: "Defence In Depth"
BAL_defence_in_depth_desc: "Let them come. Let them waste their strength in their arrogance. Let them get lost in the jungle. Then we will strike. More fiercely than ever before. Cut off their escape. Overwhelm them with our numbers. Surround them. Kill them all.\n\nGlory to the State."

BAL_continue_collectivization:0 "Continue Collectivization"
BAL_continue_collectivization_desc:0 "During the civil war, our efforts to collectivize private property were hampered by the misguided state socialists, who disliked our establishment of autonomous communes and cooperatives. Now we can continue unabated and eradicate any remnants of capitalism once and for all!" #Done
BAL_according_to_need:0 "To Each According To Need"
BAL_according_to_need_desc:0 "Increased collectivization results in increased productivity as workers are more eager to work for themselves and the community rather than for an oppressive, demanding boss. This means there is a surplus, and this surplus belongs to all who need it, no matter who they are. The cripples, the young, the ill and the elderly, all shall have their share." #Done
BAL_mutual_aid:0 "Mutual Aid"
BAL_mutual_aid_desc:0 "Every commune is reliant on other communes to sustain themselves, as no commune can produce everything they need alone. Resources and services are exchanged freely for mutual benefit, with no one asking for payment or immediate reward. Selfishness and greed have no place in our society." #Done
BAL_connect_communes:0 "Connect The Communes"
BAL_connect_communes_desc:0 "Some of the rural communes are isolated in the impassable jungle, unable to reach their neighbours easily. To make cooperation between all communes possible, we must work together and clear out paths and roads in the forests." #Done
BAL_no_such_thing_as_ownership:0 "No Such Thing As Ownership"
BAL_no_such_thing_as_ownership_desc:0 "No one here owns anything. Our society has usufruct property norms; means of production are merely used by those who need to use them, and no one claims any property, private or common, for themselves. The earth belongs to the living." #Done
BAL_everypony_a_gun:0 "Guns For Everypony!"
BAL_everypony_a_gun_desc:0 "Every member of our society has a right to bear arms. The gun is the primary guarantor of liberty, empowering the individual and making each commune a stronghold. No one will take our liberty from us if we provide armaments for all of us." #Done
BAL_haven_of_freedom:0 "A Haven Of Friendship And Freedom"
BAL_haven_of_freedom_desc:0 "In southeastern Equestria, we have a created a society that slowly advances towards a utopia. There is no oppression, nothing compulsory or mandatory. A pony once said that nothing is certain except death and taxes. But here, only death is guaranteed, especially for bosses, reactionaries and monarchists!" #Done
BAL_worker_cooperatives:0 "Worker Cooperatives"
BAL_worker_cooperatives_desc:0 "Self-management of factories by workers isn't enough. They must always be owned by the workers too! Ownership will be shared between the workers and all of them will have a voice, either democratically making decisions or electing worker-managers who are still considered to be equals. Instead of primarily pursuing profit, cooperatives will seek to improve the lives of their own members." #Done
BAL_incentives_for_collectivization:0 "Incentives For Collectivization"
BAL_incentives_for_collectivization_desc:0 "Using the threat of violence to force ponies to collectivize their property goes against our principles of voluntary associations and freedom from oppression. Instead of the stick we must use the carrot, and compensate smallholders and businessponies for their loss. We must also present socialism as a viable alternative to the capitalist economy that has just collapsed." #Done
BAL_moneyless_economy:0 "A Moneyless Economy"
BAL_moneyless_economy_desc:0 "Now that there is peace, we can prepare more extensive reforms to create a currency-free society and an economy without a market. Money will become worthless, no longer accepted as a medium of exchange, as in the end it is merely paper or metal." #Done
BAL_steel_mills:0 "Steel Mills Of Baltimare"
BAL_steel_mills_desc:0 "Steel is by far the most useful material in modern industry. The steelworkers of Baltimare are planning to expand their production so the entire country can be supplied with it. Other communes should aid their efforts in the name of solidarity, knowing it will benefit the society as a whole in the future." #Done
BAL_according_to_contribution:0 "To Each According To Contribution"
BAL_according_to_contribution_desc:0 "We wish to create a society of justice, which means no one will unfairly receive more than others for doing less. Work will be compensated with labour vouchers which can then be exchanged for goods. This way our Republic will have no parasites leeching on others. Those simply incapable or unwilling to work will be granted enough to fulfill their basic needs." #Done
BAL_connect_cities:0 "Connect The Cities"
BAL_connect_cities_desc:0 "The rough and forested terrain of southeastern Equestria is an impediment to economic development and trade between cities, especially inland. While ships are a fine method of transport, they have lower capacity than modern trains. By investing in proper railways between our cities, we will enable further urban development across the region." #Done
BAL_eradicate_bureaucracy:0 "Eradicate Bureaucracy"
BAL_eradicate_bureaucracy_desc:0 "As unions grow, so does their bureaucracy -- exponentially. The bloated bureaucracy then acts as an obstacle for true democracy and diminishes the power of the working class. The sole purpose in life of bureaucrats seems to be apologising for and defending the capitalist system of exploitation. As such, we must have the smallest possible bureaucracy, as efficient as it can be." #Done
BAL_new_unions:0 "Establish New Unions"
BAL_new_unions_desc:0 "There remain many sectors of industry with minimal union membership, or no unions at all. We must address this by founding new unions to represent workers of all kinds of professions, such as gunsmiths and dockworkers. Only then can we guarantee the emancipation of the entire working class." #Done
BAL_horizontal_planning:0 "Horizontal Economic Planning"
BAL_horizontal_planning_desc:0 "Formulation and execution of economic plans is not the duty of some central authority above all, disconnected from the common workers. It is the democratic duty of everyone, shared between each union, each council, and ultimately each pony." #Done
BAL_urbanization_program:0 "Urbanization Program"
BAL_urbanization_program_desc:0 "Despite our efforts some ponies on the countryside remain unconvinced of our cause, as we primarily focus on improving the lives of the urban workers. One solution is encouraging migration from farms and the plantations into the cities, where the quality of life and availability of services are higher. Investing in urban expansion is therefore important." #Done
BAL_institute_of_science:0 "The People's Institute Of Science"
BAL_institute_of_science_desc:0 "After our revolution, the southeast has lacked a center of education. We will found a new one, the country-wide People's Institute of Science. Anyone can participate and study, no matter where they live or what their background is. While everyone won't graduate, all ponies will learn something new to improve their lives. Those who do graduate will be able to greatly contribute to society." #Done

BAL_continue_nationalization:0 "Continue Nationalization"
BAL_continue_nationalization_desc:0 "While the civil war raged on, we did what we had to do and nationalized private property as a temporary measure on the road to true communism. But the libertarian socialists didn't realize that order was needed in the chaos and tried to sabotage us. Now that we are firmly in power, we can get back to assuming ownership of property in the name of the workers' state." #Done
BAL_limited_market_economy:0 "A Limited Market Economy"
BAL_limited_market_economy_desc:0 "Our country is devastated after the brutal war. For quick growth and recovery, some changes in policy are necessary. We need elements of free market and capitalism, though both must remain under state control. Socialized state enterprises will from now on operate on a profit basis. Chafer assures everyone that this is merely a temporary measure on the path to communism." #Done
BAL_investment_from_STG:0 "Invest In Production"
BAL_investment_from_STG_desc:0 "The state must retain a decisive role in the national economy, to ensure a smooth transition to socialism. The southeast is lacking in heavy industry compared to other parts of Equestria, and thus surplus value must be committed to fixing this problem. New state-owned factories will be constructed and opened for business." #Done
BAL_workers_councils:0 "Workers' Councils"
BAL_workers_councils_desc:0 "The formation of SESR has meant that government bureaucracy is too over-extended to manage the entire economy. Local workers' councils must be established, managing economies of individual administrative divisions and consisting of elected, revocable and temporary delegates elected in the workplaces of the area. They will, however, remain accountable to the People's Parliament." #Done
BAL_commissariat_of_defence:0 "People's Commissariat Of Defence Industry"
BAL_commissariat_of_defence_desc:0 "A decree by the People's Parliament hereby establishes the PCDI, responsible for managing and planning our military production. It will oversee all manufacturing plants whose primary responsibility is the construction of arms, aircraft, ships and ammunition, as well as design offices and weapons development facilities." #Done
BAL_maize_the_miracle_crop:0 "Maize, The Miracle Crop"
BAL_maize_the_miracle_crop_desc:0 "Maize, otherwise known as corn, is a truly wonderful crop. Chafer has been singing its praises for many moons now, saying that we must plant it wherever possible. Thousands of acres of new farmland will be cleared and our agricultural sector will boom. Some in the parliament are sceptical, but the results of this experiment will speak for themselves." #Done
BAL_chaferovka:0 "Chaferist Housing"
BAL_chaferovka_desc:0 "To keep our cities growing, more housing is needed. However, it is costly and labour-intensive to build, meaning the process is too slow to respond to increasing demand. Comrade Chafer has proposed a solution: prefabricated and cheap apartment buildings made mostly our of concrete or bricks mass-produced near the construction site." #Done
BAL_two_year_plan:0 "Twenty-Year Plan"
BAL_two_year_plan_desc:0 "With the state now owning most means of production, it has a responsibility to prepare an extensive plan for economic development and growth of the near future. In twenty years, [Root.GetLeader] claims, we will have true communism, with poverty eradicated and our prosperity surpassing that of capitalist nations." #Done
BAL_oh_rubber_tree_oh_rubber_tree:0 "Expand Rubber Plantations"
BAL_oh_rubber_tree_oh_rubber_tree_desc:0 "Rubber is among the most valuable resources we have here in the southeastern jungles. By clearing out forest and marshland for more state-owned tree plantations, we can increase its production even further. Soon enough we will be among the leading producers of rubber in the world, the envy of capitalists of other tropical nations." #Done
BAL_expand_shipyards:0 "Construct New Shipyards"
BAL_expand_shipyards_desc:0 "Because of the poor infrastructure on land, most of our transportation is done via sea. Not only that, but we must guard our flanks against naval invasion. While Baltimare already has a large and famous shipyard, it is not enough to fulfill all our needs for ships as a nation, so new expansion projects must be done." #Done
BAL_connect_the_state:0 "Connect The State"
BAL_connect_the_state_desc:0 "The central government has a hard time reaching some of the more isolated areas of the southeast because of the thick undergrowth and a lack of roads through it. This must be addressed at once and new projects must begin where the jungle is cleared for roads." #Done
BAL_university_of_baltimare:0 "The University Of Baltimare"
BAL_university_of_baltimare_desc:0 "The state has plans to officially open a new facility of education in the capital, under the patronage of [Root.GetLeader] himself. It will be the primary place of higher education in the nation, attracting students from every town and village, some of which will hopefully graduate and contribute to the greatness of our state." #Done
BAL_economic_autarky:0 "Economic Autarky"
BAL_economic_autarky_desc:0 "We cannot be reliant on others. We can only rely on ourselves. Everything we need can be produced domestically. The State can sustain itself. It needs no other. Others are merely potential enemies. They cannot be relied upon. They cannot be trusted. We have only ourselves."#Done
BAL_direct_economic_control:0 "Direct Economic Control"
BAL_direct_economic_control_desc:0 "The status of the economy is of vital importance to the State. The State must ensure the economy remains healthy. It will suffer no interference. No deviancy from its plans. The State will bring prosperity to all who remain loyal to it." #Done
BAL_repurpose_factories:0 "Repurpose Factories"
BAL_repurpose_factories_desc:0 "Too much of our industrial capacity is used for vanities. It is a remnant of capitalism under despicable Celestia. It will be cleansed. Citizens will only have what they truly need. No excess. No gluttony. The facilities will become forges of products needed for the survival of the State. Guns. Bullets. Bombs. And much more." #Done
BAL_efficient_job_assignment:0 "Efficient Job Assignment"
BAL_efficient_job_assignment_desc:0 "Ponies have cutie marks gained in youth which indicate their preferred duties. It is inefficient to have ponies follow their passions. The State must assign necessary tasks to ponies capable of doing them. Ponies will work on what they need to work on, not on what they desire to work on." #Done
BAL_weather_micromanagement:0 "Weather Micromanagement"
BAL_weather_micromanagement_desc:0 "Pegasi are able to control to weather to some extent. This ability is not utilized as much as it could be. Pegasus citizens must be drafted into weather-management battalions. They will ensure favourable weather for agriculture and military operations. The effect on the local fauna and flora will be disregarded." #Done
BAL_impose_strict_quotas:0 "Impose Strict Quotas"
BAL_impose_strict_quotas_desc:0 "Overconsumption by our citizens is a waste of resources. We will not tolerate waste. Some citizens are prone to sloth. We will not tolerate indolence. The State is efficient. Its citizens must be equally efficient. Every pony will fulfill their quotas of labour. No pony will exceed their quotas of consumption.\n\nGlory to the State." #Done

BAL_decentralized_militia:0 "A Decentralized Militia"
BAL_decentralized_militia_desc:0 "A single united army would be a dangerous idea, for its leaders would be too powerful. Who can guarantee they would not abuse their power? Therefore we must have a true army of the common ponies, compromised of part-time militia who make up for their lack of skill with their dedication to defend their homeland." #Done
BAL_everypony_armed:0 "Everypony Armed And Ready"
BAL_everypony_armed_desc:0 "Because every member of our society owns a weapon, everyone is able to participate in the defence of our communes from foreign reactionary aggression, and in the offence, liberating others from their capitalist shackles. Together, we can crush our foes and safeguard liberty to the last." #Done
BAL_we_fight_for_freedom:0 "We Fight For Freedom!"
BAL_we_fight_for_freedom_desc:0 "The soldiers of other, despotic countries fight for money, or they fight because they are forced to do so. But we ponies of the southeast fight for liberty. We fight against oppression and hierarchy, against inequality and tyranny. Our cause is noble, and we must all remember this and be emboldened." #Done
BAL_native_auxiliaries:0 "Native Auxiliaries"
BAL_native_auxiliaries_desc:0 "The natives we have befriended want to participate in the defence of our confederation. There is no reason to forbid them from doing so. In fact, we can provide them modern arms and equipment, and in return they can guide us through the jungles, showing us secret paths behind the lines of the invading enemy." #Done
BAL_union_militia:0 "Labour Union Militia"
BAL_union_militia_desc:0 "Every trade union member is allowed to wield weapons, but we should allow the unions to form organized military units as well to increase the fighting capability of the members. Having worked together in civilian life, they will be eager to fight side by side in times of war." #Done
BAL_armory_of_the_revolution:0 "Armoury Of The Revolution"
BAL_armory_of_the_revolution_desc:0 "Modern wars are not won by numbers alone, but by superior weaponry and the application of overwhelming firepower. Our factories and workshops are ready to churn out all kinds of heavy guns to give us an edge in battle. Long live the revolution of the working class!" #Done
BAL_combat_engineers:0 "Combat Engineers"
BAL_combat_engineers_desc:0 "Our unions have many engineers among their ranks. They too should join our militias and participate in war, but not by fighting on the frontline. Instead, they will put their knowledge to use, destroying enemy fortifications, constructing bridges and repairing infrastructure." #Done
BAL_in_defence_of_workers:0 "Defending The Revolution"
BAL_in_defence_of_workers_desc:0 "What we have accomplished here in southeast Equestria is nothing short of extraordinary. Yet we must be ever vigilant, or counter-revolutionary reactionaries will undo all our hard work and put us back in chains. Death is prefarable to slavery. With this in mind, our soldiers will fight twice as hard." #Done
BAL_repurpose_fishing_boats:0 "Repurpose Fishing Boats"
BAL_repurpose_fishing_boats_desc:0 "To defend our coasts, we need ships. Instead of making them from scratch, we should arm our fishing vessels and other civilian ships. They won't make the most fearsome vessels of war, but they will suffice for coastal defence." #Done
BAL_repurpose_mail_planes:0 "Repurpose Mail Planes"
BAL_repurpose_mail_planes_desc:0 "There are numerous planes in civilian use in the southeast, primarily carrying mail and passengers. Their owners have joined our militia and now ask for weapons for their aircraft, so they can fly them during times of war and defend our skies." #Done
BAL_militia_air_support:0 "Militia Air Support"
BAL_militia_air_support_desc:0 "If we manage to secure control of the skies above our militiaponies, we have an opportunity to offer them aerial support. For this task we should develop airplanes capable of providing such aid as effectively as possible." #Done
BAL_red_cruisers:0 "Armed Merchant Ships"
BAL_red_cruisers_desc:0 "War is a threat to our maritime shipping. If we don't want our trade with other countries to be endangered, we must repurpose some of our merchant ships into warships, so they can defend others on the sea." #Done

BAL_integrate_coltjuns:0 "Integrate Coltjun Militia"
BAL_integrate_coltjuns_desc:0 "The Coltjun ponies of the Hayseed Swamps immigrated from Prance many years ago and have developed their own distinct culture. Part of this culture is their unique style of guerrilla warfare which they used to defend their homes during the civil war. We should integrate their militia into our main forces and learn their tactics." #Done
BAL_better_guns:0 "Gifts From Our Comrades"
BAL_better_guns_desc:0 "Other revolutionaries of the world were happy to see our revolution succeed and sent us shipments of weapons. Now they have finally arrived in the port of Baltimare and we will gladly accept this generous gift. The arms will be distributed to our military and any excess will be safely stored in our stockpiles." #Done
BAL_bigger_guns:0 "Destroying Reactionaries From Afar"
BAL_bigger_guns_desc:0 "Ensuring we take as few casualties as possible during war is vital. Because of this, we should strive to win battles before even engaging our enemy directly. This is made possible by long-ranged weaponry, which we therefore need to produce for our military." #Done
BAL_support_companies:0 "Support Company Development"
BAL_support_companies_desc:0 "For our soldiers to fight effectively, they need various kinds of support from trained specialists, such as engineers, medics, scouts and mages. This way they can fight with increased effectiveness and take fewer losses in battle. We should focus on training such specialists for our military." #Done
BAL_army_mechanization:0 "Military Mechanization"
BAL_army_mechanization_desc:0 "Modern technology enables increasingly rapid warfare and improved logistics, made possible by self-moving vehicles which will replace pony-drawn wagons of old. While their usage in the jungles is questionable, with improved roads our forces could benefit from mechanization greatly." #Done
BAL_armoured_warfare:0 "Armoured Warfare"
BAL_armoured_warfare_desc:0 "Landships, also known as tanks, are another revolutionary weapon of our age. Covered in thick plating, they can withstand more punishment than regular vehicles, and with their all-terrain tracks they can overcome most obstacles. Their firepower is nothing to scoff at either. Clearly, our workers must build new tanks which we must put into active use." #Done

BAL_centralized_army:0 "A Centralized Army"
BAL_centralized_army_desc:0 "A single united army is needed for our survival. Only with strict order of battle and an organized command structure can we resist aggression from powerful neighbours. We must rely on the talent of the topmost commanders, for our strategy is in their hooves." #Done
BAL_state_planned_warfare:0 "Department Of War Planning"
BAL_state_planned_warfare_desc:0 "The Ministry Of Defence must be expanded. A new department will be founded. It will be dedicated to formulating detailed plans for future wars. They will take every scenario into account. We must be prepared for anything. Only then can we defeat our anti-communist nationalist feudal-capitalist foes." #Done
BAL_disciplined_ranks:0 "Discipline In The Ranks"
BAL_disciplined_ranks_desc:0 "We will not tolerate those who disregard orders. Who do not faithfully obey their commanders. Who are not ready to die for their State. Our officers will be granted the right to punish dissident filth most severely. Our army must be the zenith of order. They will march to battle and death as one." #Done
BAL_for_the_state:0 "For The State!"
BAL_for_the_state_desc:0 "There is no greater fate than perishing for your State. It is the ultimate sacrifice for the greater good. One we must all be willing to make when the time comes. Our valiant deaths in battle will bring victory. Our victory will keep our State safe.\n\nGlory to the State." #Done
BAL_dominate_sea:0 "Dominate The Seas"
BAL_dominate_sea_desc:0 "The sea belongs to the State as much as the land does. We must defend it with equal vigor. Our shipwrights must be put to work making the most powerful and mighty warships ever seen. They will destroy any who enter our seas with malicious intent. Our ocean will be their grave." #Done
BAL_heavy_aircraft:0 "Heavy Aircraft Development"
BAL_heavy_aircraft_desc:0 "Only proper, dedicated military aircraft can be strong enough to secure air superiority even when outnumbered. Fighters with twin engines and metal frames will sustain more damage and be able to fly further. They will also be adaptable and capable of completing a variety of missions. Our airplane factories will get to work at once." #Done
BAL_death_from_above:0 "Death From Above"
BAL_death_from_above_desc:0 "After we have wrested control of the airspace with our fighters, our bombers can get to work. They will be able to not only target enemy soldiers and supply lines, but more strategic targets as well, destroying factories and terror bombing civilian habitation. Such planes would greatly augment our airforce." #Done
BAL_empower_mis:0 "Empower The MIS"
BAL_empower_mis_desc:0 "The Military Investigation Service has a vital purpose in guarding the nation. With more rights granted to them, they will be able to fulfill their duty more efficiently, identifying threats and gathering vital intelligence needed for our survival." #Done
BAL_air_sea_war:0 "Air-Sea War"
BAL_air_sea_war_desc:0 "Increased use of airplanes has not only revolutionized warfare on ground, but on water as well. Aircraft are predicted to ultimately be more effective than ships themselves at sea, but have a more limited range. Therefore we should invest in constructing carrier vessels, capable of transporting and supplying aircraft over long distances." #Done
BAL_stalliongradian_doctrine:0 "Stalliongradian Doctrine"
BAL_stalliongradian_doctrine_desc:0 "Over the last decade Stalliongrad has focused heavily on developing its innovative doctrine of mobile warfare, utilizing motorized infantry and armoured tanks to break through enemy lines and perform rapid encirclements. We should learn from them and adopt similar stratagems for our military." #Done
BAL_thestral_battalions:0 "Thestral Battalions"
BAL_thestral_battalions_desc:0 "Now that the lunarist resistance has been pacified, Light Narrative has proposed we form dedicated battalions consisting entirely of thestrals, mostly veterans of the war. They will be primarily dedicated to night-time combat, as this is their main advantage over regular mixed pegasus-thestral units. Echolocation and night vision give them a decisive advantage." #Done
BAL_commissar_training:0 "Commissar Training"
BAL_commissar_training_desc:0 "Many commissars among the ranks of our army are purely political ones who have received minimal proper military training. We must address this at once and turn them into more effective supporting officers, who not only maintain a revolutionary fervour in the ranks but also issue useful commands." #Done

BAL_anarchy_in_equestria: "Anarchy In Equestria"
BAL_anarchy_in_equestria_desc: "There were many who doubted us, but here we are. Now, together, united under one cause, let us free Equestria from the oppression of the state! The cities and villages shall rule themselves, with no monarchs above. The workers shall own the means of production, with no bosses above. Equestrians shall rule Equestria, with no gods above!"
BAL_liberate_stalliongrad: "Liberate Stalliongrad"
BAL_liberate_stalliongrad_desc: "The Winter Revolution was the first successful communist revolution on Equus, but it did not bring about an anarchist paradise, but a bureaucratic statist nightmare. The Stalliongradians have betrayed the revolution and they will pay the full price for it. We must continue to spread the revolution ever onward, until all of Equus is free!"
BAL_anarchist_mane_six_problem: "Denounce The Elements Of Harmony"
BAL_anarchist_mane_six_problem_desc: "The wielders of the Elements of Harmony are little more than monarchist stooges, doing their best to support the old corrupt regime. Not to mention half of them are petty bourgeoisie who own businesses and land, and one of them is a monarch herself! The new truly free Equestria will have new elements: the Elements of Anarchy."
BAL_liberate_crystal_empire: "Topple The Crystal Empire"
BAL_liberate_crystal_empire_desc: "While crystal ponies are new to modernity, they are all too familiar with monarchist oppression after their enslavement by King Sombra. They, of all peoples, should know the value of liberty. Let us ensure they are never in shackles ever again, not those of Sombra, and not the gilded chains of alicorn monarchy!"
BAL_anarchist_root_out_resistance: "Destroy Reactionary Remnants"
BAL_anarchist_root_out_resistance_desc: "The revolution is not finished until there are no more reactionaries, monarchists and capitalists breathing on Equestrian soil. The former slavemasters, the whippers and exploiters, they cannot evade justice! It is one last act of violence by Equestrians against Equestrians. Only then can we know inner peace."
BAL_liberate_changelings: "Liberate All Changeling Lands"
BAL_liberate_changelings_desc: "The brutal tyranny of Queen Chrysalis is at an end. Changelings themselves have grown tired of oppression and yearn to join our revolution, ready to welcome their comrades! We must hasten and march onwards, toppling each and every monarch that reigns over changelingkind."
BAL_promise_a_bright_future: "Promise A Better Future"
BAL_promise_a_bright_future_desc: "Some ponies are sceptical of our revolution, especially with all the necessary violence involved. But they are a means to an end. Anarchism promises a future free of inequality, of injustice, of violence. It promises good life for every single individual, regardless of race or personal wealth. We must convince everycreature that common labour is superior."
BAL_liberate_the_rest: "A Stateless Equus"
BAL_liberate_the_rest_desc: "Our home continent is almost free. Unfortunately, some state regimes still remain, threatening our revolution by their mere existence. We must remain true to our ideal, that we "suffer no state to live". One more offensive, comrades. Let us drive our enemies into the sea and drown them! Liberty for Equus!"

BAL_syndicalist_equestria: "A Syndicalist Equestria"
BAL_syndicalist_equestria_desc: "After a great struggle, Equestria's working class has been liberated from tyranny. Yet this does not mean we can rest on our laurels. We have much work to do to complete our revolution!"
BAL_stalliongrad_question: "Union With Stalliongrad"
BAL_stalliongrad_question_desc: "Though the revolutionaries in Stalliongrad are not syndicalists and have their own vision, they are nonetheless our comrades. We should do what we can to unite them with our federation of workers, because the truth is that we are stronger together than separated."
BAL_syndicalist_mane_six: "Meet With The Element Bearers"
BAL_syndicalist_mane_six_desc: "Despite their ties with the old monarchy, the wielders of the Elements of Harmony are not enemies to the revolution. At least, as long as they do not want to be. Golden Delicious is convinced that they will listen to reason. After all, one of the six ponies is part of the same family as he is."
BAL_crystal_empire: "Union With The Crystal Ponies"
BAL_crystal_empire_desc: "While the industrial revolution is new in the lands of the crystal ponies, they can still adapt to an anarcho-syndicalist model, much like the natives of the southeast did. They, too, are more than welcome to join our federation as comrades."
BAL_guarantee_rights_of_cities: "Guarantee The Rights Of Cities And Towns"
BAL_guarantee_rights_of_cities_desc: "Before the civil war and the revolution, Equestria was divided into many cities and towns that governed themselves, led by elected mayors. This old system is not incompatible with our own model of federal devolution and statelessness. The urban regions can retain their autonomy as before, as long as mayors are replaced with democratic councils."
BAL_the_colonies: "Bring The Revolution To The Colonies"
BAL_the_colonies_desc: "While the lands of Puerto Caballo and New Mareland are distant, they are nonetheless former parts of the Equestrian sphere of influence. Despite their nature as settler colonies, they too can embrace our syndicalist revolution and join our federation. Our cause transcends oceans if necessary."
BAL_rural_revolution: "The Rural Revolution"
BAL_rural_revolution_desc: "As more and more farms across the vastness of Equestria collectivize, farmers see the benefit of cooperation and communal sharing. As urban syndicalists, we have always struggled to spread our movement to the countryside, but the anarchists of CAN have greatly helped us in this effort. Soon enough, every corner of Equestria will embrace the revolution."
BAL_chairpony_elections: "Elect A New Chaircreature"
BAL_chairpony_elections_desc: "As Golden Delicious promised in Manehattan, he will organize new federal elections for the position of chaircreature. While mostly a powerless and ceremonial role, it is nonetheless important to have a public face for our revolutionary nation. Golden Delicious himself has refused to be a candidate, so the voting workers have a difficult choice ahead of them."

BAL_communist_equestria: "Marks' Dream Realized"
BAL_communist_equestria_desc: "Caramel Marks always dreamed of a better tomorrow. She saw what was wrong in Equestria, the damage caused by rampant robber baron capitalism, and sought to address the issues. In her arrogance, Princess Celestia refused to see reason and maintained a fully private market economy. Now she has faced the consequences, while Marks' own desires are about to be fulfilled."
BAL_union_with_stalliongrad: "Our Northern Comrades"
BAL_union_with_stalliongrad_desc: "Cricket Chafer has fond memories from Stalliongrad, when he participated in the Winter Revolution all those years ago. He still maintains close ties to Severyanian communists and believes he could convince them to unite with the new communist Equestria in the name of revolutionary unity."
BAL_communist_mane_six: "The Problem Of The Elements"
BAL_communist_mane_six_desc: "The six heroes of pre-revolution Equestria, the embodiments of the Elements of Harmony, are not necessarily our enemies. We should try to reason with them and convince them of the moral superiority of communism, while also enlightening them about the degeneracy of capitalism and monarchism. Perhaps then they will join us willingly."
BAL_crystal_empire_com: "Liberate The Crystal Ponies"
BAL_crystal_empire_com_desc: "The crystal ponies are unfamiliar with modern ideologies, but they are more than familiar with being enslaved by a monarchy. They will be more than happy to unite with us, welcoming us as liberators. Never again will they suffer under the yoke of monarchist oppression!"
BAL_corn_campaign: "The Corn Campaign"
BAL_corn_campaign_desc: "Equestria is a vast country, with huge swathes of arable land that is yet unexploited. To feed the nation, it is vital that the miracle crop of maize is utilized on new collectivized farms that will be established across the countryside. This should dramatically increase food production and convince the sceptics of the superiority of communism and corn!"
BAL_anti_supremacy: "Crush Reactionary Threats"
BAL_anti_supremacy_desc: "Our revolution cannot be considered fully secure until we've dealt with potentially hostile reactionary regimes that neighbour us. Only then can we have peace and focus on building a communist utopia. How can we simply rest on our laurels while the proletariat of Equus are exploited? All other races are our comrades, after all."
BAL_mass_propaganda: "Mass Propaganda"
BAL_mass_propaganda_desc: "There are some who still claim harmony and communism are incompatible ideas. To convince them, we shall take full advantage of Equestria's media industry. Modern mass media, utilizing newspapers, radios and movies, will spread the message of the communo-harmonic utopia that we are building and turn every doubter to our side."
BAL_a_communist_equus: "Equus United Under Communism"
BAL_a_communist_equus_desc: "Our home continent must put conflict and warfare aside and unite under the red banner of communism. It is vital for all nations and races to work together in harmony, to walk the path towards a shining communist dawn together. With the teachings of Twilight Sparkle and Caramel Marks as our guide, let us join our forces, comrades!"

BAL_nightmare: "The Death Of Equestria"
BAL_nightmare_desc: "Equestria has been slain. Now from the rotting remains. A new State will rise and grow. A powerful unbreakable State. A State led by the greatest leader to have ever lived. A State liberated from reactionarism, capitalism and monarchism. All the sins of the past have been cleansed. Upon the empty canvas a new story will be written.\n\nGlory to the State."
BAL_repurpose_equestrian_industry: "Militarize Industry"
BAL_repurpose_equestrian_industry_desc: "Equestria was a weak and pathetic nation. Its industrial capacity was wasted on producing useless consumer products. Countless factories shall now be refitted to serve the needs of the military. The security of the State is of paramount importance and supercedes the needs of the masses."
BAL_deal_with_mane_six: "Hunt Down The Six"
BAL_deal_with_mane_six_desc: "There are six ponies that threaten our rule. Wielders of the so-called elements of harmony. Heroes of the old order. Servants of monarchism. Vermin. Pests. They must be found and eliminated. But first they must be lured out of their hiding holes. Thankfully we have the perfect bait for them. Their fate will be sealed."
BAL_greater_state: "The Greater State"
BAL_greater_state_desc: "The State's borders extend as far as they need to extend. Any pony-majority territories that end up in our control will be easy to integrate. Upon the carcass of the Equestrian Empire a new State shall rise. One undivided by petty nationalist ideas. Everypony will eventually learn to love the gentle rule of our glorious leader."
BAL_bomb_them_into_submission: "Bomb Them Into Submission"
BAL_bomb_them_into_submission_desc: "Many towns and villages do not submit to our legitimate rule. They remain loyal to their monarchist enslavers and capitalist exploiters. So be it. They have chosen the painful path. We will show them the consequences of their foolishness. Every defiant rebel settlement will be regularly bombarded by artillery and bombers until they unconditionally surrender."
BAL_ultimate_weapon: "Develop The Ultimate Weapon"
BAL_ultimate_weapon_desc: "Scientists have been theorizing about a potential weapon that could destroy entire cities at once. We must get our hooves on such an explosive device before it can be used on us. It will be the final argument of the State. None will dare to defy us afterwards. But first. The required facilities must be constructed. Scientists must be put to work. Tests must be conducted."
BAL_expand_gulags: "Expand Labour Camps"
BAL_expand_gulags_desc: "Dissidents and bourgeois nationalists have filled the labour camps to the brim. The internment system must be expanded across the State. Correctional labour is of vital importance to rehabilitate divergent individuals. New labour camps shall be built, and existing ones reorganized to function more efficiently. The State is always in need of more cheap and expendable workers."
BAL_long_live_the_king: "Glory To The Great Leader"
BAL_long_live_the_king_desc: "Lavender Berry is the true hero of communism. It was he who vanquished all his enemies. It was he that toppled the decrepit old order in Equestria. It was he who brought order where there was chaos. His genius is unsurpassed. He is the herald of historical materialism. We march together united as one towards true communism under his wise and benevolent guidance."

###########################################
### IDEAS ##################################
###########################################
BAL_economic_chaos:0 "Economic Chaos"
BAL_economic_chaos_desc:0 "Following the beginning of the civil war, occupation by lunarists and the recent revolution, the economy of Baltimare is in tatters. Trade links which kept the city's industry alive have been severed and the country is surrounded on all sides by hostiles. Things are not made better by the fact that socialists and anarchists have forcefully nationalized or collectivized farms and factories without establishing proper management for them." #Done
BAL_economic_chaos2:0 "Economic Chaos"
BAL_economic_chaos2_desc:0 "Thanks to hasty economic reforms, some semblance of order has been introduced to the economy and production rates have increased. But many issues remain which hurt the efficiency of most facilities." #Done
BAL_economic_chaos3:0 "Economic Chaos"
BAL_economic_chaos3_desc:0 "Further reforms and policy changes have completely restructured the economy, which has helped with both production and distribution. Foreign aid has been received as well and put to use. However, more work remains to be done before Baltimare's economy has fully recovered." #Done
BAL_military_disarray:0 "Military Disarray"
BAL_military_disarray_desc:0 "The "army" of Baltimare, if you can call it that, consists entirely of worker militias who have no formal military training and a small amount of experience they got from driving out the lunarist occupiers. Their equipment and officers are both lacking and, worst of all, there is no unified command structure, with most units acting independently without coordination." #Done
BAL_military_disarray2:0 "Military Disarray"
BAL_military_disarray2_desc:0 "Several reforms have been implemented, which introduce some much needed order into the army. There are more officers, better equipment and more coordination among the ranks, and a rough command structure is being established." #Done
BAL_military_disarray3:0 "Military Disarray"
BAL_military_disarray3_desc:0 "The army is in a much better shape, which capable officers spread evenly among the ranks in a well-planned command structure. Training regimens and experience on the field have both make the common soldiers better at doing their job. Not much more is needed for Baltimare to have a proper and organized modern army." #Done
BAL_self_managed_factories:0 "Workers' Self-Management"
BAL_self_managed_factories_desc:0 "Factories and farms are being collectivized, with the former capitalists and managers being removed out of the picture. Control over production is exercised by democratic (and admittedly inefficient) assemblies of the workers themselves, and their surplus production benefits us as a whole instead of going into the deep, ravenous pockets of overseers." #Done
BAL_nationalization_idea:0 "State Interventionism"
BAL_nationalization_idea_desc:0 "The Congress now directly intervenes in the economy by issuing directives, decrees and quotas. All economic plans must be approved by the government before they can be executed." #Done
BAL_meadowbrooks_aid_idea:0 "Mage Meadowbrook's Aid"
BAL_meadowbrooks_aid_idea_desc:0 "Mage Meadowbrook of the Hayseed Swamps, one of the six Pillars of Equestria, has volunteered to heal our ailing soldiers, despite disagreeing with our ideology." #Done
BAL_whydoesntthisshitworkdammit:0 "Armed Trade Unions"
BAL_armed_unions_idea_desc:0 "The common worker is allowed by law to take up arms to defend themselves against imperialists and reactionaries." #Done
BAL_revolutionary_discipline_idea:0 "Revolutionary Discipline"
BAL_revolutionary_discipline_idea_desc:0 "Discipline is not something that comes when you beat up a soldier, it comes when they understand what they are fighting for and why." #Done
BAL_mis:0 "MIS - Military Investigation Service"
BAL_mis_desc:0 "The survival of the revolution must be ensured, no matter the cost." #Done
BAL_mis_lar:0 "MIS - Military Investigation Service"
BAL_mis_lar_desc:0 "The survival of the revolution must be ensured, no matter the cost." #Done
BAL_military_commissars_idea:0 "Military Commissars"
BAL_military_commissars_idea_desc:0 "Discipline and loyalty to the revolution will be maintained by any means necessary." #Done
BAL_bit_abolished:0 "Bit Abolished"
BAL_bit_abolished_desc:0 "Some would call you crazy if you decided to simply take all the money and burn it. However, that is exactly what socialists of Baltimare have done." #Done
BAL_state_capitalism_idea:0 "State Capitalism"
BAL_state_capitalism_idea_desc:0 "Markets and money exist, but without despicable bourgeoisie. Instead, the state has full control over both." #Done
BAL_to_the_barricades_idea:0 "They Shall Not Pass!"
BAL_to_the_barricades_idea_desc:0 "Long live the revolution! Death to reactionaries!" #Done

BAL_harmonic_resistance: "Harmonic Resistance"
BAL_harmonic_resistance_desc: "Some Celestial loyalists have refused to surrender and continue to carry on their futile struggle to restore the old pre-war order."
BAL_statism_erased:0 "Statism Erased"
BAL_statism_erased_desc:0 "Nothing is left of the old government of southeastern Equestria and the short-lived SESR. All regional agencies, ministries, offices, commissions, departments and so on are gone for good." #Done
BAL_anticlericalism: "Antireligion"
BAL_anticlericalism_desc: "The anarchists have declared war on religion, opposing any form of organized religion. Instead, science and atheism are promoted." #Done
BAL_native_communes_idea:0 "Native Communes"
BAL_native_communes_idea_desc:0 "The natives of the southeast have been allowed to retain their autonomy and traditions, as long as they participate in the confederal congress and aid in the defence of the Free Southeast." #Done
BAL_no_princesses_state_or_boss_idea:0 "No Princess, Nor State, Nor Boss"
BAL_no_princesses_state_or_boss_idea_desc:0 "Southeastern Equestria has fully embraced the core tenets of anarchism, which espouse a society without leaders and hierarchy." #Done
BAL_syndie_friends:0 "Syndicalist Friends"
BAL_syndie_friends_desc:0 "The labour unions of TER are members of the confederation and efficiently manage urban industry." #Done
BAL_sex_drugs_rockandroll:0 "Rules, Not Laws"
BAL_sex_drugs_rockandroll_desc:0 "It seems everything goes in the southeast, as long as it doesn't harm others." #Done
BAL_total_liberation_idea: "One With Nature"
BAL_total_liberation_idea_desc: "No forms of domination of hierarchy shall be tolerated, including that of sapient life over animals and plants. The earth must be shared with every living being! Even livestock have abandoned their former prisons and taken up arms in the name of revolution." #Done

BAL_federal_charter_idea:0 "The Federal Charter"
BAL_federal_charter_idea_desc:0 "The federal charter devolves power to the local level." #Done 
BAL_rural_communes_idea:0 "Rural Collectives"
BAL_rural_communes_idea_desc:0 "More and more rural collectives are established each day, their inhabitants enjoying a rising standard of living and increased productivity." #Done
BAL_calmed_natives:0 "Native Resistance"
BAL_calmed_natives_desc:0 "Some native tribes have ceased to resist us and have instead willingly joined our collectives. Others continue to fight back, but it is only a matter of time before they abandon their misguided resistance as well." #Done
BAL_anarchist_allies_idea:0 "Anarchist Allies"
BAL_anarchist_allies_idea_desc:0 "The anarchists of CAN are proud members of the federation and promote decentralized, anti-statist policies and liberal values." #Done
BAL_encourage_unions_idea:0 "Growing Trade Unions"
BAL_encourage_unions_idea_desc:0 "More and more ponies are joining labour unions each day, thus gaining more rights and improved working conditions." #Done
BAL_worker_assemblies_idea:0 "Workers' Assemblies"
BAL_worker_assemblies_idea_desc:0 "All decision-making is the responsibility of democratic worker assemblies existing on every level of government." #Done
BAL_stateless_federation: "A Stateless Federation"
BAL_stateless_federation_desc: "Here the people command and the government obeys." #Done
BAL_general_strike:0 "General Strike!"
BAL_general_strike_desc:0 "The labour unions of our country -- some of them underground -- have organized the biggest strike in decades, crippling our economy. There is no doubt the revolutionaries from Baltimare generously supported them." #Done
BAL_international_revolution_idea: "The International Revolution"
BAL_international_revolution_idea_desc: "Workers of the world, unite!" #Done

BAL_democratic_centralism_idea:0 "Democratic Centralism"
BAL_democratic_centralism_idea_desc:0 "Political decisions which are approved via democratic vote are binding for all, to prevent factionalism and bickering." #Done
BAL_secularism:0 "Secular Foundations"
BAL_secularism_desc:0 "PON has declared the country to be a secular state, recognizing no religion, and encouraging the citizens to abandon whatever faith they may have." #Done
BAL_ies_cooperation: "Help From IES"
BAL_ies_cooperation_desc: "The stallionist IES party has been given several important government positions, making them responsible for the security and propaganda departments of the state." #Done
BAL_cultural_revolution_idea:0 "Cultural Revolution"
BAL_cultural_revolution_idea_desc:0 "Any corruption in Equestrian culture is being erased, and a more equal working class culture is being promoted." #Done
BAL_union_council_idea:0 "AUCCTU"
BAL_union_council_idea_desc:0 "The All-Union Central Council of Trade Unions is a centralized organization of trade unions giving them a voice in government." #Done
BAL_harmonic_communism_idea: "Harmonic Communism"
BAL_harmonic_communism_idea_desc: "Cricket Chafer has proclaimed communism to be true harmony, and that friendship is as important as solidarity." #Done

BAL_powerless_parliament:0 "A Powerless Parliament"
BAL_powerless_parliament_desc:0 "The People's Parliament has been stripped of any real political power and serves a purely advisory role, while also being filled with IES yes-ponies." #Done
BAL_burger:0 "The Purge"
BAL_burger_desc:0 "We must suffer no dissent." #Done
BAL_mis2:0 "Empowered MIS"
BAL_mis2_desc:0 "The Military Investigation Service has been granted even more extensive powers and better equipment, so they can fulfill their duty with higher efficiency." #Done
BAL_mis2_lar:0 "Empowered MIS"
BAL_mis2_lar_desc:0 "The Military Investigation Service has been granted even more extensive powers and better equipment, so they can fulfill their duty with higher efficiency." #Done
BAL_gulags:0 "Reactionary Labour Camps"
BAL_gulags_desc:0 "The enemies of the State will earn retribution through labour." #Done
BAL_gulags_2: "Expanded Labour Camps"
BAL_gulags_2_desc: "The enemies of the State will earn retribution through labour."
BAL_state_atheism_idea: "State Atheism"
BAL_state_atheism_idea_desc: "The State actively promotes anti-religion and persecutes any practitioners of faith." #Done
BAL_single_culture_idea:0 "United As One"
BAL_single_culture_idea_desc:0 "Local dialects, cultures and governments are being eradicated, so all aspects of society will be consolidated and united." #Done
BAL_papers_please_idea:0 "Papers, Please"
BAL_papers_please_idea_desc:0 "A single checkpoint has been established which processes entrants from abroad. Every single individual is screened extensively and allowed to enter and work in the country, as long as they do not prove to be dangerous." #Done
BAL_papers_please_idea_lar: "Papers, Please"
BAL_papers_please_idea_lar_desc: "A single checkpoint has been established which processes entrants from abroad. Every single individual is screened extensively and allowed to enter and work in the country, as long as they do not prove to be dangerous."
BAL_state_media_idea: "State-Controlled Media"
BAL_state_media_idea_desc: "Strict censorship ensures no subversive thought can spread to others."
BAL_efficient_occupation_idea: "MIS Rear Area Security"
BAL_efficient_occupation_idea_desc: "The MIS has been entrusted with securing military rear areas and crushing any potential dissident activity before it can threaten the garrison soldiers."
BAL_defence_in_depth_idea: "Defence In Depth"
BAL_defence_in_depth_idea_desc: "The State's official doctrine is to sacrifice territory to wear out any invaders, then strike back at them with overwhelming strength."

BAL_continued_collectivization:0 "Continued Collectivization"
BAL_continued_collectivization_desc:0 "The revolutionaries of [Root.GetName] are continuing the collectivization of all private property without any opposition from state socialists."  #Done
BAL_continued_collectivization_need:0 "Continued Collectivization"
BAL_continued_collectivization_need_desc:0 "The revolutionaries of [Root.GetName] are continuing the collectivization of all private property without any opposition from state socialists. They follow the principle espoused by Caramel Marks where everypony will receive according to their need." #Done
BAL_worker_cooperatives_idea:0 "Worker Cooperatives"
BAL_worker_cooperatives_idea_desc:0 "Factories and farms are controlled and owned entirely by the workers, with the former capitalists and hired managers being removed out of the picture. Control over production is exercised by democratic (and admittedly inefficient) assemblies of the workers themselves." #Done
BAL_continued_collectivization_contrib:0 "Continued Collectivization"
BAL_continued_collectivization_contrib_desc:0 "The revolutionaries of [Root.GetName] are continuing the collectivization of all private property without any opposition from state socialists. It is becoming a true workers' state, where only those who work and those physically incapable of work receive their share of the society's surplus. The rest are given only as much as they need to live." #Done
BAL_moneyless_economy_idea:0 "Moneyless Economy"
BAL_moneyless_economy_idea_desc:0 "There are no currencies or markets in the Southeast. Instead, expendable vouchers are used by the populace to acquire goods." #Done
BAL_continued_collectivization_need_aid:0 "Continued Collectivization"
BAL_continued_collectivization_need_aid_desc:0 "The revolutionaries of [Root.GetName] are continuing the collectivization of all private property without any opposition from state socialists. They follow the principle espoused by Caramel Marks where everypony will receive according to their need. As such, generous mutual aid is regarded as vital for the survival of society." #Done
BAL_continued_collectivization_need_aid_own: "Collectivized Economy"
BAL_continued_collectivization_need_aid_own_desc: "Most private property has been collectivized. Everypony will get what they need for free, generous mutual aid is regarded as vital for the survival of society and there is no legal concept of private ownership."
BAL_haven_of_freedom_idea:0 "A Haven of Friendship and Freedom"
BAL_haven_of_freedom_idea_desc:0 "Everypony here is free, everypony here is a friend to each other. Unless they are filthy capitalists or reactionaries." #Done
BAL_continued_collectivization_contrib_bureau:0 "Continued Collectivization"
BAL_continued_collectivization_contrib_bureau_desc:0 "The revolutionaries of [Root.GetName] are continuing the collectivization of all private property without any opposition from state socialists. It is becoming a true workers' state, where only those who work and those physically incapable of work receive their share of the society's surplus. The rest are given only as much as they need to live. In addition the bloated bureaucracy of state has been eliminated." #Done
BAL_continued_collectivization_contrib_bureau_horiz: "Collectivized Economy"
BAL_continued_collectivization_contrib_bureau_horiz_desc: "Most private property has been collectivized. It is a true workers' state, where only those who work and those physically incapable of work receive their share of the society's surplus. The rest are given only as much as they need to live. In addition the bloated bureaucracy of state has been eliminated, and the economy is planned horizontally on the local level."
BAL_continued_nationalization:0 "Continued Nationalization"
BAL_continued_nationalization_desc:0 "The People's Parliament has passed legislation which makes it the de jure owner of all property and means of production, making it legal to seize them from their unlawful owners who are often greedy capitalists. Without opposition from the revolutionaries of CAN-TER, the state is free to appropriate private property for the workers." #Done
BAL_two_year_plan_idea:0 "Twenty-Year Plan"
BAL_two_year_plan_idea_desc:0 "Communism will be built in 20 years. The next generation will live under true communism. This is certain." #Done
BAL_limited_market_economy_idea:0 "Limited Market Economy"
BAL_limited_market_economy_idea_desc:0 "Some elements of a free market and capitalism are mixed in with a planned state economy, enabling faster growth." #Done
BAL_economic_autarky_idea:0 "Economic Autarky"
BAL_economic_autarky_idea_desc:0 "We can only rely on ourselves." #Done
STG_investing_in_BAL:0 "Pact of Mutual Economic Assistance"
STG_investing_in_BAL_desc:0 "PMEA has improved trade relations with southeastern Equestria, allowing goods to flow more freely between our countries." #Done
BAL_investing_LSP: "Pact of Mutual Economic Assistance With Las Pegasus"
BAL_investing_LSP_desc: "PMEA has improved trade relations with Las Pegasus, allowing goods to flow more freely between our countries."
BAL_investing_BUF: "Pact of Mutual Economic Assistance With Buffalo"
