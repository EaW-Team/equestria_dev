MEL_gun_purchase_decisions_category:0 "Ngola's Military Expansion"
MEL_gun_purchase_decisions_category_desc:0 "Melahaka has no great manufactories or factories  Neither does it have the populace, resources or specialists for industrialization.. What Melahaka does have is resources, rare potion ingredients, ivory items. All things that foreign regimes desire and for which they are willing to barter for in weaoons or pay in gold... which our Ngola uses to buy weapons.\n\nFor now neither Ruya, nor Mulopu see the need to change such a military primacy policy. After all, if we do need industrial ability, it can be seized from regimes that succumbed to weakness." 
