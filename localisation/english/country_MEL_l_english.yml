 MEL_fascism_party_long:0 "Court of Ngola - Mwene Miste (Managers of Religious Affairs)"


 ### Characters ###

 MEL_chosen_one:0 "Mulopu Makanga"
 MEL_chosen_one_desc:0 ""
 MEL_warrior_queen:0 "Ruya Sangwa"
 MEL_warrior_queen_desc:0 ""
 MEL_ugwiyuhi_murena:0 "Ugwiyuhi Murena"

 ### Traits ###
 


 ### Focuses ###
 
 MEL_the_rising_flame:0 "The Flowing Flame"
 MEL_the_rising_flame_desc:0 "The weakness of Zongo is perfectly exemplified by the failures of the Bomboko family. The lion fell in battle and took with him any glory the family still had; a rot setting in as the heir, Akida Bomboko, travelled across the Peaceful Sea to find the tools to complete the corruption of Zongo's decaying legacy... and that shall not be tolerated."
 
 MEL_a_gun_trade:0 "A Fellow Incarnate"
 MEL_a_gun_trade_desc:0 "The tribes of Tanaigha joined Melahaka centuries ago in our struggle against the Zongolese Crown, yet they too have grown meek. Even in their weakness, they are less rotten than the Zongolese, and therefore, still useful. They are led by one blessed, such as Mulopu and Ruya are; a show of respect may ensure our collaboration continues until Zongo has been punished."
 
 MEL_a_duel:0 "A Demonstration"
 MEL_a_duel_desc:0 "The priest Mulopu Makanga is a relatively new face in Melahaka, but one that has made itself very present. An incarnate of the spirit Dripping Fire, Mulopu quickly ascended through the furious piety he displayed, earning the respect of the Ngola and her hoof in marriage. He has time and again shown his strength, but there are still those who doubt his words as truth: they shall doubt no longer."
 
 MEL_reinforce_faith_crown:0 "The Volcano Nears Eruption"
 MEL_reinforce_faith_crown_desc:0 "The spirits of mighty Ziragongo have for too long been led into inertia by the sheer disgust they feel for our plane, but we shall show them that the worthy still roam the land! The Ngola and the Priest have both had their own plans for how Zongo should be dealt with: both correct, but only one path can be taken. The future of the Basin and of zebrakind is decided now."
 
 MEL_offense:0 "The Spear"
 MEL_offense_desc:0 "Akida's return signals a final corruption of the Zongolese spirit, one that we cannot allow to fester any longer. Mulopu's plan is to simply mobilise all available resources, spare no expense, and righteously march into Zongo as quickly as possible. Within the year, the unworthy shall face our fury!"
 
 MEL_defense:0 "The Shield"
 MEL_defense_desc:0 "Akida's return signals a final corruption of the Zongolese spirit, but in due time Melahaka shall rescue the Basin from the Bomboko's stagnation. Ruya has long prepared for the confrontation she knew would come in her lifetime against the Zongolese, there is no reason to rush into it now and fumble the last preparations."
 
 MEL_zongo_war_guns:0 "Weapons Roaring With Fire"
 MEL_zongo_war_guns_desc:0 "Our warriors are masters of martial weapons, but war is changing from what we've known. Gunpowder, with its roaring power, shall bring us closer to the spirits of fire and channel the destructive power of Ziragongo itself. We shall acquire these weapons from abroad and ensure every Mozengo and Quimbare is trained in their use."
 
 MEL_zongo_war_ponypower:0 "Recall Lone Warriors"
 MEL_zongo_war_ponypower_desc:0 "Melahaka's martial culture means that many warriors are currently working as farmhooves or travelling across the land, seeking opportunities to protect Melahaka and better themselves. These warriors, even when sedentary, must follow tight training regimens. Now, they must come to Zesalampy and fulfil their obligation."
 
 MEL_aother_charger_unit:0 "A New Proud Banner"
 MEL_aother_charger_unit_desc:0 "The Chargers of Melahaka are its greatest pride, though the formation of a full unit of them is a rare event. These units are known as Quimbares, and in preparation for the coming war with Zongo, the worthy shall be ascended to their ranks."
 
 MEL_support_offense:0 "To Arm the Quimbares"
 MEL_support_offense_desc:0 "The Quimbares, Melahaka's most elite forces, must be properly supplied if they are to perform to their fullest in the coming conflicts. Shovels, binoculars, maps, potions, and anything else they may utilise; we will ensure their needs are met and that they are armed with a tool for every battle."
 
 MEL_arty_offense:0 "Ngola's Favorite Weapons"
 MEL_arty_offense_desc:0 "For all of Ruya's righteous distrust of modernity during her time in Sambovato, there was one area that captivated her attention: military matters. And among military matters, no weapon of today captivated her as much as artillery. Having already been used in rudimentary form by the Zongolese during their conflict with Zeblu, we shall now integrate this weaponry into our own army."
 
 MEL_zongolese_support:0 "Convince the Mani of Zongo"
 MEL_zongolese_support_desc:0 "Proud and stubborn, the Mani of Zongo have been mistreated and their longstanding powers disrespected by the Bombokos. Through his connections and the respect he still commands among them, Mulopu shall incite them to struggle against Bomboko weakness, so that their ancient rights may be worth something once more."
 
 MEL_distribute_potions:0 "Distribute Potions"
 MEL_distribute_potions_desc:0 "Potions, when well-utilised, serve as a potent enhancer of zebrakind's natural talents and strengths. If we are to win this conflict, we must gather our alchemists and doctors so they may brew their strongest concoctions for the battle that is to come."
 
 MEL_strike_zongo:0 "The Eruption"
 MEL_strike_zongo_desc:0 "Mulopu's pious and righteous rage has been bubbling for these last few years, and, just as Ziragongo shall soon do, Melahaka's will shall explode outwards into Zongo and flow through the basin as all who are dissatisfied with the Bomboko's corruption RISE to end this stagnation."
 
 MEL_long_haul:0 "Prepare for The Long War"
 MEL_long_haul_desc:0 "While all of Melahaka clamours for a grand battle against the Zongolese, fervour is not enough to reassert our blessings from the spirits. By consulting with the priesthood and sages, we will ensure the hearts of Melahaka are steeled by reaffirming our destiny."
 
 MEL_fortify_our_border:0 "Raise Field Fortifications"
 MEL_fortify_our_border_desc:0 "The mainland regions present an issue due to their mostly open geography, especially when compared to Zongo's forests and mountains along the border. To ensure the security of our frontiers before we advance deeper into Zongolese land, we must raise field fortifications at the frontiers."
 
 MEL_greased_by_blood:0 "Greased by Blood"
 MEL_greased_by_blood_desc:0 "Strength cannot be achieved without any blood being spilled. These sacrifices shall pave the road for the Ngola's plans to move forward unimpeded."
 
 MEL_a_big_purchase:0 "A Grand Purchase"
 MEL_a_big_purchase_desc:0 "While we cannot hope for hoofouts, the Ngola has been negotiating a grand purchase of weaponry from Sambovato. With her plans proceeding as normal, we need only finalise the deal, and soon our Quimbares will have everything they might need to ensure our total victory."
 
 MEL_buy_new_tools:0 "Ivory for Tools"
 MEL_buy_new_tools_desc:0 "The beasts of the jungle have long proven to be a headache, where even felling one would yield nothing of value. Yet, there is one material to be exploited from these beasts: ivory. By selling the tusks and teeth of the grand beasts of the ever-growing jungle, we shall purchase tools that make deeper veins of ore accessible."
 
 MEL_akidas_victims:0 "Those Burned by Akida"
 MEL_akidas_victims_desc:0 "The programs implemented by the bumbling heir have served to displace many creatures and take away their livelihoods as his wretched 'modernity' destroys all that is right. Those who bear fury for the Bomboko's corruption in their hearts shall find a home in Melahaka, and they shall find vengeance very soon."
 
 MEL_young_blood:0 "Raise Banners of Young Blood"
 MEL_young_blood_desc:0 "Martial training starts at a very young age for many foals in Melahaka, and from these ranks, the Mozengos and the Quimbares are formed. With war ever nearer, those yet unworthy of joining the highest ranks of the army shall be allowed to prove their strength on the battlefield, forming the newest banners of Mozengos."
 
 MEL_late_strike:0 "Early or Late, Lava Still Flows"
 MEL_late_strike_desc:0 "While Ruya's plan carried with it a certain expectation that the Bomboko would strike during these preparations, it seems their cowardice and weakness has proven itself even worse than expected. The bell tolls as a new year starts, and it has become quite clear that we must strike before the Bombokos are allowed to corrupt Zongo any further."
 
 MEL_the_mop_up:0 "The Last Remnant"
 MEL_the_mop_up_desc:0 "While Priestess Dara is clearly divine, her advisors are corrupting forces who seek only to use her for their own ends. We shall rescue her and Tanaigha from their rot, just as we have rescued Zongo from the Bombokos. Tanaigha, too, will be shown the true path."
 
 MEL_crown_of_zirogongo:0 "The Obsidian Crown"
 MEL_crown_of_zirogongo_desc:0 "Tanaigha and Zongo are no more; only Melahaka stands. The very name 'Zongo' has been corrupted by the Bombokos; we shall forge a new crown from the fires of our righteous struggle: the Crown of Ziragongo. Soon, all of the corrupters of Zebrica will learn to fear and respect when they hear the chosen of Dripping Fire march."
 
 
 
 
 ##Intro
 


 ##Epilogues
 
 
 ### Ideas ###
 
 MEL_trade_over_production:0 "Trade Over Production"
 MEL_trade_over_production_desc:0 "Melahaka neither is, nor ever was a powerhouse of production. It has smiths and woodcarvers and zebras that work bone and leather into armor and weapons. But Melahaka has no great manufactories or factories.\n\nFurthermore, when Ruya returned to take the crown in 998, there was little base to build any industry and much of Melahaka’s non-warrior populace had to work the land, thus few hooves to spare for raising production facilities.\n\nThus, a different direction for Melahaka's modernization was taken. Melahaka had sold resources like rubber or metals, but also exotic goods like feathers, rare potion ingredients, ivory of jungle beasts to foreign markets before. But after Ruyas return, this trade was centralized and funds gained from it all channeled into military modernization.\n\nNeither Ruya , nor Mulopu see the need to change this military primacy, at least for now. In their minds, any need for industrial capability shall be seized from the unworthy regime in charge of Zongo."
 MEL_proud_chargers:0 "Proud Chargers of Melahaka"
 MEL_proud_chargers_desc:0 "The Charger traditions of the lands of Melahaka predate even the state itself. Yet not once, not in a single war, not in service under Zongo, nor under independent Melahaka, have the shining elite of the land shamed themselves.\n\nShaped by a difficult environment and a culture that values shared victories over individual triumphs, these warriors are a terrifying presence on the field, as capable of seizing land as holding it, even against the odds.\n\nTheir spears and clubs might have been replaced with blackpowder weapons and their warsongs get drowned out by roaring artillery. But the Proud Chargers remain the shining spear and shield of Melahaka, to the envy of all around them."
 MEL_good_navy:0 "Skilled Mariners, Old Ships"
 MEL_good_navy_desc:0 "For nearly 2 centuries after bending their heads to the Crown of Zongo, the zebras of Melahaka served as the sailors and mariners of its navy, crewing trade ships, hunting pirates and ensuring that no enemy could attempt to strike Zongo by sea.\n\nThis naval tradition persisted even after Melahaka cut off the chains of weakness Zongo had bound it with.\n\nHowever, without the funds of the crown and resources and zebrapower for ship construction from landlocked provinces of Zongo, the ability to build ships of Melahaka stagnates.\n\nThus while its crews are skilled, all of Melahaka's ships are old, dating back to the very beginning of ironclad naval warfare."
  
  
 ### Events ###
 
 melahaka.1.t:0 "Armed and Ready"
 melahaka.1.desc:0 "Quiet was the night. The chilly breeze made the crackling fire dance. Above, the moon, a spotlight on the star-spangled sky. Four zebras sat in a circle around the fire, each visibly marked by time and battle, their bodies a tapestry of scars and stripes. Three were looking at the fourth as he kept turning the newspaper in his hooves, squinting at the words.\n\n “You’re going to tear that! And what's taking you so long? Didn't you say you know how to read?” one mean-looking mare asked, her laugh sounding more like snore.\n\n The stallion frowned at her.\n\n“Why don't you do it if you're so smart? I’d like to see you read senturyan! ” he snapped back. "I said I will, so let me read!” After a while, he cleared his throat to grab their attention again. “’With the completion of his studies in Senturya, the heir to the Zongolese throne, Akida Bomboko, is expected to return home soon and implement his modernization plans to bring Zongo into the 11th century,’” he read through countless stutterings and pauses; underneath, a black and white picture of the young king.\n\n“And what do these ‘grand plans’ of his imply?" asked a slightly younger mare.\n\n"Whatever it is, that brat better keep them to himself and not try anything if he doesn't want his flank turned to leather," the mean-looking mare claimed. “And if he doesn’t, then we’ll send him flying back where he came from!”\n\nThey laughed and cheered each other, making claim after claim of what they would do as the newspaper was tossed in the fire, the smiling face of Akida, devoured by flames."
 melahaka.1.a:0 "An Ember of What is to Come"
 
 melahaka.2.t:0 "Meeting With The Divine"
 melahaka.2.desc:0 "The meeting chamber used for their meeting was both sparser than it should be for welcoming visitors such as Ruya, yet it was quite lavish. Dara sat upon a raised seat with gems and vivid colours surrounding her, a hooded figure beside her no more than a whisper's length away. Ruya stood across from them, with little on her side of the room, as if to make clear her inferiority compared to the demigoddess that was Dara.\n\n"Ever since we beat back the Zongolese crown two centuries ago, our peoples have kept close agreements to ensure they do not attempt such a folly once more. Zongo has long struggled and decayed, but all has changed with Nkosi's—"\n\nA hoof suddenly rose, stopping Ruya mid-sentence. Dara leaned towards the hooded figure and whispered something Ruya could not hear. After a few moments, Dara distanced herself and the figure spoke.\n\n"The holy Dara wishes to make it clear she is not interested in a history lesson. She has already been instructed in these events and wishes only to know what it is you wish of Tanaigha." Dara kept her gaze downward as the hooded figure spoke, giving no indication of what her own input was or was not.\n\n"...Very well. Melahaka's Quimbares have been the spear that keeps the Zongolese at bay, and with the rising tensions, we wish to ask for more immediate assistance so they are well supplied and prepared for any coming conflict."\n\nAs soon as she finished speaking, once more the young priestess began to whisper into the ear of the hooded aide. When Dara finished, she lowered her gaze once more without having looked at Ruya even once.\n\n"The holy Dara has ordained that this can be arranged. Tanaigha shall stand together with you." The aide paused, then spoke once more, almost as an afterthought. "For now.""
 melahaka.2.a:0 "...For Now"
 
 melahaka.3.t:0 "A Demonstration Of Faith"
 melahaka.3.desc:0 "(Blank) tried to get a good view of the event that was unfolding, but it was not easy still being so small. He ran around looking for any type of box, and thankfully, he found one just in time to hear the drums begin to beat, signalling the last few moments before the battle started. The High Priest stood upright with his eyes closed and his hood covering most of his body, calm even though he was surrounded by three chargers, each of them armed with poles. As the drums accelerated, (Blank)'s heart began to beat faster and faster, faster and faster, faster and—\n\nIn a moment, the drum was hit one last time and the High Priest's trident flew to action as strikes began to be exchanged. They all fought with precision, but the skill differences were clear; the High Priest deflected blow after blow, not giving an inch while striking hard against each charger as he foiled their attacks. The hits echoed loudly across the arena, and (Blank) felt that same excitement overflowing within him as it did the creatures around him. The High Priest's skill was known by all, but being able to see it made him feel like the luckiest foal around.\n\nThen, suddenly, the fighting changed. He saw one of the strikes actually hit the High Priest, as the other two chargers backed off, seemingly unsure of what to do. While the High Priest quickly rearranged his posture and the two began to exchange blows and parries, the air shifted around the crowd. The High Priest had begun to actually move; the battle had become dynamic as the two attacked and defended. (Blank) could not bear to watch, but at the same time, he could not turn away. The beating of his heart seemed to become a lump, one that climbed his throat and laboured his breathing. As the charger struck the High Priest and his posture seemed to falter, he could not hold his own words back.\n\n"YOU CAN DO IT, HIGH PRIEST!" He screamed as mightily as he could, as far as his voice would carry. It drew the attention of the whole crowd for a second, and even the charger seemed to change his posture for a moment – but one creature did not. With a throw of his cape into the charger's face, the High Priest fiercely struck his pole at the charger's head, a loud echoing crack as he faltered and fell. The crowd froze for a moment, but with the High Priest's figure revealed, the two remaining chargers bowed as the crowd cheered ferociously as if in a frenzy."
 melahaka.3.a:0 "(Blank) could feel the High Priest's eyes looking straight at him, pride filling his heart."
 
 melahaka.4.t:0 "The Path That Magma Shall Follow"
 melahaka.4.desc:0 ""The pieces seem to have moved once again for the destruction of the wretched and corrupted Bomboko. They will finally be punished for their weakness once and for all!" Mulopu smiled as he looked upon the map of the region Ruya had brought in. "All the suffering they have brought to you, me and to all of zebrakind – we shall finally punish them for it all... my beloved."\n\n"There is truth in your words, and though I wish for nothing less than what you and the spirits command, I am not sure if fire and piety will be enough to win us the war." Though his words were sweeter than honey to Ruya's ears, she pondered aloud as she indulged in a cup of tea. "While a rotten leg should be amputated before it can rot the body, it is no use ridding yourself of it if you have no way to stop the bleeding. If the Quimbares cross the border and bring destruction to the Bomboko, what worth will it be if we are outdone by their deceitful cowardice or by our own unpreparedness?" Even in private moments such as these, Ruya avoided removing her veil, making it so the brilliance behind her eyes shone even more. "Preparations for this have been going on for many years now; if we were to simply await another few months, we could face them with an advantage."\n\nThe ecstasy in Mulopu's eyes had gone by now, but that sheer fury he portrayed every living moment showed he truly was Dripping Fire's chosen. He gazed at Ruya for a moment and pressed his hoof to his medallion. "If a wound cannot be closed, then one must simply bring fire to it and endure the pain. We shall cauterise the wound before it is ever allowed to bleed, and as the chosen of the Gods, we shall endure and survive. The rotten system of the Bombokos shall crumble as we march, I assure you." From his medallion, Mulopu moved his hoof towards Ruya's, and for a moment, there was silence."
 melahaka.4.a:0 ""The spirits are with us, my beloved. Fire shall burn all the weakness away from Zongo.""
 melahaka.4.b:0 ""But I shall respect your wisdom. Zongo shall fall, be it now or later.""
 
 melahaka.5.t:0 "Warm Wind of Change"
 melahaka.5.desc:0 "Akida's return had sent the Mani into a frenzy; that much was clear to Zuba. It certainly was clear to the foreign-raised brat and his wretched mother if they possessed even a modicum of common sense. Zuba himself was dissatisfied with how things were shaping up since Akida returned. All the talk of modernity and bringing Zongo closer to the rest of the world was clear treasonous behaviour that could not be ignored... but he knew better than to simply revolt with no backing, or to kiss the hoof like the other bumbling fools he had to call contemporaries. Nkosi would be ashamed of how his home was shaping up, but there was not much Zuba could do right now.\n\nA knock at his room's door quickly alerted Zuba to another's presence. An aide stood waiting patiently just outside the balcony. Zuba motioned for them to come in, and they quickly passed him a letter bearing a seal that was regal, yet unlike any he had seen in Zongo. Dismissing the aide, he opened it and read to himself: "When thunder roars and lava flows, battle will once again call for the mighty to rise. Show the world your strength once more, rise and bring forth Nkosi's and Zongo's legacy.'\n\nThe seal made it clear the letter was not from the Bombokos, and the message itself was barely hidden beneath its words: whoever wrote this was planning to overthrow Zongo's system. The fact it had not been intercepted before reaching him could mean many things. Could this be a test? The letter a fake, or purposefully allowed through to test his loyalty? Or perhaps it was a true opportunity for change. Could it have been sent to all the other Mani, or was he chosen for his reputation? Zuba analysed it for a moment longer, then shifted his gaze towards his room's fireplace. For Zuba, it did not truly matter if this letter was real or not; he would deal with it as he always did."
 melahaka.5.a:0 "He was going to wait for it."
 
