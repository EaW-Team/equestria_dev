 MEL_communism_party_long:0 "Court of Ngola - Mwene Kudya (Managers of Food and Taxes)"
 
 MEL_democratic_party:0 "Pro-Zongo Sobas"
 MEL_democratic_party_long:0 "Pro-Zongo Sobas"

