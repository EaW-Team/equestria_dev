 melahaka.12.t:0 "The Monument Of Decay"
 melahaka.12.desc:0 "The marble floors reflected Ruya's visage as she stepped through the halls of the palace, polished to a shine that seemed almost sinful. The floors of the palace alone were more wealth than Melahaka would make in a year. This was the monument of rot, the head of the sickness that had infected Zongo for generations. Just the garden alone kept hundreds of hooves busy keeping it alive; hundreds of hooves that could have been forging steel or tilling fields, wasted on decoration for a family that had fled the moment their weakness was exposed.\n\nThe Mwenezongo, the naive foal, had apparently escaped with his Senturyan master and the rest of his foreign cabal. Of the Bombokos, at least the Mwenezongo's mother had remained loyal to her own home until the end. Many would wish to see her head on a pike, but Ruya knew better than to get rid of royalty. The Mani had mostly fallen silent, their resistance crumbling the moment the Bombokos surrendered. But there was one creature they had not yet caught, one Ruya knew would be an issue.\n\nBefore she could dwell further on the name, she heard the pounding of hooves behind her. Mulopu emerged from a side corridor, his eyes wild. "SHE IS GONE!" he snarled. "THE DAMNED FALSE PRIESTESS IS GONE!"\n\n"The snake will be found, my beloved, that much is certain. But look around you!" She gestured at the opulent halls where they stood. "Look at how much has been accumulated through the Bomboko's greed; all under our control. The spirits will be pleased with what we have accomplished here." As she spoke, Mulopu's breathing slowed, though the fire in his eyes did not disappear. "We will not make the same mistakes. Every bit of wealth the Bombokos hoarded and misused shall go to our efforts." She gently took his face within her hooves. "Your efforts." She massaged his face and could feel the tension Mulopu felt. It did not disperse even with her care, but his mind calmed as his breathing settled."
 melahaka.12.a:0 ""When we find her, she will burn.""
 
 melahaka.13.t:0 "Broken Peace"
 melahaka.13.desc:0 "For days, Dara awaited her fate to be decided. Weeks had passed since the fighting had stopped and yet no soldier had come to take her away, just the silence she had grown so accustomed to, broken only by the occasional arrival of supply carts bearing food and water. Dara had spent every night waiting in fear, yet she was not sure if what she feared was what would be done to her, or simply being forgotten and left behind as all her mentors had now gone. Even her interpreter was gone. Dara was well and truly alone.\n\nOne humid evening as she prepared for sleep, the sound of screams filled the outside of her room, screams louder than she had ever been allowed. Soon enough, her door began to suffer bang upon bang until it splintered around the lock. Dara flinched back against her bed, her heart slamming against her ribs. Once the door finally gave way, a zebra stallion stood in the doorway, his coat spattered with blood. A beast as evil and wretched in its appearance as she had been told of in stories was standing there, and that same monster soon began to march towards Dara. She tried to speak but could not muster any words in her shock.\n\nThen the figure knelt. Dara's breath was still caught in her throat as the bloodied creature lowered himself to the floor in deference. "Forgive me, holy one. The war kept me from you for far too long; corruption had to be burned away before I could come to free you." He looked up and his eyes shone earnestly. "You have been kept in shackles for too long, hidden away behind fools who dared speak for you as if you could not speak for yourself. That ends now. You will finally have someone who understands you, and so you will be free." Dara's voice never came easily, not after years of letting others speak on her behalf. When she finally forced the words out, her throat was coarse, her voice barely a whisper.\n\n"...free?"\n\n"Your voice..." Mulopu said, his expression flickering with something like pain crossing his features. "They let your voice wither, an attempt to take away your connection to the gods and keep you locked up. In a way, I am glad for their cowardice. It ensured their blood would not besmirch your holiness." Dara pressed herself further against the bedframe, her hooves trembling. Mulopu extended a hoof towards her patiently. "Come, holy one. It will soon be time for the world to hear your true voice.""
 melahaka.13.a:0 "Dara did not feel any comfort from his words."
 
