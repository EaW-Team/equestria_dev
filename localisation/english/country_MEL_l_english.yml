 ### Ideas ###
 
 MEL_trade_over_production:0 "Trade Over Production"
 MEL_trade_over_production_desc:0 "Melahaka neither is, nor ever was a powerhouse of production. It has smiths and woodcarvers and zebras that work bone and leather into armor and weapons. But Melahaka has no great manufactories or factories.\n\nFurthermore, when Ruya returned to take the crown in 998, there was little base to build any industry and much of Melahaka’s non-warrior populace had to work the land, thus few hooves to spare for raising production facilities.\n\nThus, a different direction for Melahaka's modernization was taken. Melahaka had sold resources like rubber or metals, but also exotic goods like feathers, rare potion ingredients, ivory of jungle beasts to foreign markets before. But after Ruyas return, this trade was centralized and funds gained from it all channeled into military modernization.\n\nNeither Ruya , nor Mulopu see the need to change this military primacy, at least for now. In their minds, any need for industrial capability shall be seized from the unworthy regime in charge of Zongo."
 MEL_proud_chargers:0 "Proud Chargers of Melahaka"
 MEL_proud_chargers_desc:0 "The Charger traditions of the lands of Melahaka predate even the state itself. Yet not once, not in a single war, not in service under Zongo, nor under independent Melahaka, have the shining elite of the land shamed themselves.\n\nShaped by a difficult environment and a culture that values shared victories over individual triumphs, these warriors are a terrifying presence on the field, as capable of seizing land as holding it, even against the odds.\n\nTheir spears and clubs might have been replaced with blackpowder weapons and their warsongs get drowned out by roaring artillery. But the Proud Chargers remain the shining spear and shield of Melahaka, to the envy of all around them."
 MEL_good_navy:0 "Skilled Mariners, Old Ships"
 MEL_good_navy_desc:0 "For nearly 2 centuries after bending their heads to the Crown of Zongo, the zebras of Melahaka served as the sailors and mariners of its navy, crewing trade ships, hunting pirates and ensuring that no enemy could attempt to strike Zongo by sea.\n\nThis naval tradition persisted even after Melahaka cut off the chains of weakness Zongo had bound it with.\n\nHowever, without the funds of the crown and resources and zebrapower for ship construction from landlocked provinces of Zongo, the ability to build ships of Melahaka stagnates.\n\nThus while its crews are skilled, all of Melahaka's ships are old, dating back to the very beginning of ironclad naval warfare."
  
  
