 melahaka.8.t:0 "Greased by Blood"
 melahaka.8.desc:0 "Like a wasps’ nest, so did the cities, plantations, training grounds and temples buzzed. By sunrise, toil. By sunset, toil. Few had the privilege to rest.\n\nWhips cracked as trees were cut, land cleared and plows moved. Sickles and scythes in hooves, baskets on backs as crops of all kinds were reaped, tired movements of shaky hooves.\n\nWhips cracked as chains rattled, pickaxes, sledgehammers and shovels tore the earth. Drops of sweat and blood falling as ores came out, sent to be melted into weapons or sold to distant markets.\n\nWhips cracked as the few smiths there were, wiped their brow, the smoldering tongue of their furnaces licked their coats, hammering down their anvils, spears, rifles, cannons, shining polish on them all.\n\nAll while mistes, the priests of the cloth, preached, as long as their voice would hold them, that such is the way of the divine, all their selfless labour put towards a greater purpose. All their blood, toil, tears and sweat will see the will of Dripping Fire fulfilled."
 melahaka.8.a:0 "Zongo’s weakness shall be purged"
 
 melahaka.9.t:0 "Those burned by Akida"
 melahaka.9.desc:0 ""You are not the first nor will you be the last to come here seeking refuge!" Mulopu's voice loud enough to be heard by the crowd, fire in his eyes as rugged zebras looked at him. Around them, at the edge of Zesalampy, improvised tents dot the forest, wounded, sick and elderly gather, all looking disheveled, hungry and tired.\n\n"For as long as we have lived here, for generations, our life was simple and peaceful. Zongo was strong, with borders secured and proud soldiers to defend it. But now, as Akida and his kin try to bring all these foreign ideas that have no place in our beloved homeland, you can see all around you the weakness that spreads for you are the prime example of his actions! And for what? For what!" He paused, his eyes going from face to face, few murmurs coming from them.\n\n"All this foolish ambition, all these desire for change, to what purpose? So that nations far beyond our borders acknowledge us? Respect us? Do we need their approval? Do we need their respect? No! We have done so without them for centuries before, why should that be different now?" A few zebras nodded in agreement. "And even if this modernisation is achieved, do you think you will be the ones to reap its fruits? No! As zebras just like you, with families torn, displaced from their homes and with nothing but the cloth on their back come our way looking for any semblance of normalcy, where is Ayana and her ilk, the so-called ‘Prophet of the Poor’? Where is she to soothe your struggles? Where is she when you need her? Where is she?" His voice filled with poisonous hate aimed at the high-priestess.\n\n"We can't sit idly by and allow such rot and decadence to seep into our home. We must fight it and we must do it now! Our homeland, brethren and way of life are at stake and we can not afford to lose them! And to do that, I need each and every single one of you to help! And as sixth I'll ask you: will you help me save Zongo?""
 melahaka.9.a:0 "The crowd shouted united: "We will!""
 
