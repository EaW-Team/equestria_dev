GRW_witty.1.title:0 "A Shattered Ideal"
GRW_witty.1.desc:0 "Witia Gryphon and her protégé Iris Alstein sat silently in the study of the newly-repaired Palace of the Workers. The fireplace roared, its flames throwing off a dancing light that washed over the inhabitants.\n\n "...Iris?" Witia's voice was devoid of energy, as it often was these days. "Do you know the difference between me and them?" She gestured vaguely at the picture on the mantle showing the now-deceased leaders of the PLA.\n\n"Well, your politics certainly disagreed, I could tell that from the moment I got here."\n\nA slight smile broke across Witia's beak, but her eyes remained dull. "That perceptiveness is exactly why I chose you. Maybe with it I could have avoided this hole mess." She sighed, slumping further into her chair.\n\n"It wasn't just politics that set us apart, it was mindset. All of them, Theresa, Ramòn, Chiara, and especially Redglad, all of them were at their cores idealists. They thought a better world could be forged. But me? I've always been a pragmatic, if stubborn, lady. And look where it got us."\n\nShe grabbed the mug of ale sitting next to her, Iris' eyes widening as she watched Witia down it in one go. "Are you...?"\n\n"I don't know if I can do this," Witia sighed, letting the mug fall to the floor. "I'll try my best, but I..." She stopped, and looked at the mantle again."
GRW_witty.1.a:0 ""...I could never be what they were.""