GRW.1.title:0 "The Battle of Rylan"
GRW.1.desc:0 "Civil wars are rarely a clean affair. Village turns on village, family on family, as battle lines are drawn and a nation tears itself apart. Even after some semblance of order is created among the vying factions, fighting behind the frontlines can be just as fierce.\n\nOne such occurence happened in the Acute Forest over the New Year, with a band of Royalist partisans clashing with PLA soldiers near the small hamlet of Rylan. A running battle with no quarter, our forces were able to repel the Royalists and send them scurrying into the depths of the forest. The result of the raid was minimal, with half the town being torched but no damage to its war-making potential. Already repairs have commenced, with emergency housing being constructed in an impromptu stockade.\n\nPatrols within the forest have been stepped up, with regular aerial sweeps, but so far the Royalists continue to elude us. Local commanders have sworn to redouble their efforts, but whether or not they will be successful remains to be seen."
GRW.1.a:0 "Here's to a new year..."
GRW.2.title:0 "The Krispan's Day Meeting"
GRW.2.desc:0 ""Filip, why have we been brought here?" General Theresa asked, claw drumming against the command table. Despite technically being their capital, the Prywhenian Liberation Army's high command, or government if you were being charitable, rarely visited it. And yet here they were, all in one place, the Whiteflower Town Hall.\n\n"Witia?" Filip Redglad nodded, "care to give your report?"\n\nThe griffon nodded, eyes dull and sunken. "Yes, of course, Comrade-General. Although we still have them on the backclaw, Royalist activities have steadily increased over the past few months. Most recently, they managed to infiltrate a partisan cell into Acute Forest, and have begun attacking our supply lines in the region. If you wish to know more, ask Cyntia or Iegov about the specifics." She turned the page. "Alongside increased military activity, our spies have reported an increased effort to receive aid from the outside world by Kloseu. While nothing substantial has happened yet, we have many reasons to be worried if the Royalists suddenly get a shipment of Wingbardian rifles."\n\n"We should focus on something positive," Chiara Floare spoke up from the end of the table. "I believe there have been increasing reports of desperation within the Royalist high command, no?" She smiled as Witia nodded. "See? Everything need not be so dour. While we must be aware of these ongoings, we must not lose sight of what else there is."\n\n"She's right," Redglad sighed, wings fluttering. "We need to keep an eye on the bigger picture. Our reforms are almost done, just a little bit longer and the militia will be much more centralized. Once that's done, we'll gather everygriff we can and stamp out Kloseu." He rose from his seat, wings flaring."
GRW.2.a:0 ""Okay, no more faffing about. Everygriff, get to work!"
GRW.3.title:0 "The Rigors of War"
GRW.3.desc:0 "Richard Speer and Ramòn Malvis poured over the reports coming in from across the entirety of PLA territory. Insufficient rice harvests, storage deposits burned by partisans, bandit raids, they were all pointing to the same inevitable conclusion that the PLA was currently on track for a second famine.\n\nRichard sighed, setting down the reports as he rubbed his eyes. "Filip isn't going to like this..."\n\n"Forget Filip," Ramòn muttered, wings fluttering, "Cyntia's going to have someone's head for this. She's been working her tail off precisely to avoid this, and yet this disaster has just fallen onto our backs."\n\n"Let's not focus on that right now," Richard shook his head. "We also got reports from Iegov. The Acute Forest mines are... working, but the recent attacks in the area are causing ores to pile up at the mines themselves. We need to clear out the partisans or get a damned railroad out there, either will likely fix this problem."\n\n"I assume the local militias haven't been able to handle them?" Ramòn responded, looking over the reports. "Yeah, looks like it. Shortages of weapons and ammunition. By Eviliana, they're using muskets. MUSKETS! We sure the local blacksmiths are doing their jobs?" Richard rolled his eyes, and Ramòn groaned. "Fine, I get it. I guess most of our guns are stolen too."\n\n"We need to capture Kivessin," Richard sighed. "Take the capital, get the guns, have our griffs equipped with something designed in the last decade instead of before Prywhen even became independent."\n\n"Hopefully that happens soon," Ramòn nodded. "We can keep going, but this is an awful lot of spinning plates. Eventually one of them is going to fall.""
GRW.3.a:0 ""We just have to make sure we can set them down first.""
