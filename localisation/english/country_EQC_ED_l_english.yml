## FOCUS ##

EQC_ED_jet_set_new_job:0 "Jet Set's New Job"
EQC_ED_jet_set_new_job_desc:0 "Jet Set has served well as a loyal vassal, even if it was in the name of Our inferior selves. As We must move quickly to secure Our new rule, We shall bestow upon on him the honor of being Our royal secretary.\nHe best realise how worthless his democratic "ideals" are, if he knows what is best for his country."
EQC_ED_return_to_equestria:0 "Return To Equestria"
EQC_ED_return_to_equestria_desc:0 "While Our stay in New Mareland has been... a stay, the time has come for Us to return home. Equestria is Our birthright, and it is time that We claim it."
EQC_ED_modify_the_congress:0 ""Adjust" The Congress"
EQC_ED_modify_the_congress_desc:0 "While we would normally sweep away an institution such as New Mareland's "Congress", it can still serve a purpose. The people here still cling to the foolish ideals of democracy and the rule of law, if We were to assimilate those structures into Our patronage, We could with but a few changes keep them as flashy baubles while gutting them of true power."
EQC_ED_disband_the_congress:0 "Disband The Congress"
EQC_ED_disband_the_congress_desc:0 "We have no need to indulge Our little ponies of their foolish ideas. As Our subjects, it is their place to submit to Our will, not Us to theirs. The New Mareland "Congress" has no place in Our new realm."
EQC_ED_assemble_the_solarists:0 "Assemble The Solarists"
EQC_ED_assemble_the_solarists_desc:0 "Our alliance is a fragile one, but one that will endure for the time being. We must both be represented, else We will tear our realm apart in jealousy. The Solarists must rally around New Mareland, and serve Our strength."
EQC_ED_convince_the_harmonists:0 ""Convince" The Harmonists"
EQC_ED_convince_the_harmonists_desc:0 "Harmony, as an ideology, is not necessary wrong, just how it is applied. Truthfully all ponies should be united by friendship... and Our rule. Only under Our careful guidance can true Harmony be achieved. So long as Harmonists accept that, they will be fine. But if they don't...\nLet's just say it would be an unwise choice."
EQC_ED_theyve_outlived_their_purpose:0 "They've Outlived Their Purpose"
EQC_ED_theyve_outlived_their_purpose_desc:0 "Our patronage is not one that scapes and bows, begging for support like some Griffonian Republican! We stand firm and enforce Our demands! If the former politicians of New Mareland will not bow by choice, then they shall be made to bow at the knees and neck."
EQC_ED_approach_the_shadowbolts:0 "A Call To All Lunarists"
EQC_ED_approach_the_shadowbolts_desc:0 "Our alliance is one based on great care, held together by necessity and what little sisterly love exists. Both of Our powers must be represented, lest this new realm of Ours be ripped asunder. Those loyal to the Lunar faith shall rally under Our banner in New Mareland, and serve Our strength."
EQC_ED_follow_candy_garden:0 "Follow Candy Garden's Idea"
EQC_ED_follow_candy_garden_desc:0 "At first reading, one would assume Candy Garden lacks the necessary fervor to enforce Our will. Yet when one looks further, it becomes clear that she thinks not just of tomorrow, but of the day after. Candy Garden's reforms will help introduce the population to Our divinity at a rate that will minimize disruption, allowing us to avoid unnecessary excesses."
EQC_ED_call_over_arcane_nova:0 "Call Over Arcane Nova"
EQC_ED_call_over_arcane_nova_desc:0 "Our divinity has been established, and it shall not be denied even for a second! What We need isn't a mild approach, what We need is decisive action! Arcane Nova will oversee the indoctrination of the populace, for only she has the necessary zealotry to do so!"
EQC_ED_install_loyal_governors:0 "Install Loyal Governors"
EQC_ED_install_loyal_governors_desc:0 "Any empire is only as good as its bureaucracy, and currently the bureaucracy is not to Our liking. Until We can trust Our governors, We cannot ensure Our orders are followed. Let Us say farewell to the old, and hello to the new order."
EQC_ED_elevate_the_thestrals:0 "Elevate The Thestrals"
EQC_ED_elevate_the_thestrals_desc:0 "The thestrals of New Mareland have lived on the outskirts of pony society since the founding of the colony. No longer! As Our blessed subjects, it is time that they receive the place they are owed and are properly integrated into Our patronage."
EQC_ED_the_shadow_works_concept:0 "The Shadow Works Concept"
EQC_ED_the_shadow_works_concept_desc:0 "The Shadowbolts have long existed in New Mareland and have laid down deep roots. Perfect. Their resources will be used to fuel the militarization of New Mareland and the establishment of Our rightful domain."
EQC_ED_silence_pickets_group:0 "Silence Picket's Group"
EQC_ED_silence_pickets_group_desc:0 "Picket Fence is many things, but most important to Us is that he is a problem. His stance towards the griffons of Our realm would directly hurt Our ability to wage war, something that must not be allowed. We will move to silence this problem before it blossoms into a disaster."
EQC_ED_utilize_dews_loyalty:0 "Utilize Dew's Loyalty"
EQC_ED_utilize_dews_loyalty_desc:0 "Despite holding some ideals that are... less than favored, Evening Dew is a loyal servant beyond reproach. It would behoove Us to not let this asset go unused, for Our realm requires everything it can."
EQC_ED_sideline_evening_dew:0 "Sideline Evening Dew"
EQC_ED_sideline_evening_dew_desc:0 "Despite his credentials as a loyal servant being beyond reproach, Evening Dew is someone whose opinions on griffons are simply unacceptable. The griffons are Our subjects, and any who wish harm upon Our subjects must be dealt with. In recognition of his loyalty, he shall be left alive, but no other mercy shall be extended."
EQC_ED_griffons_are_ours_too:0 "The Griffons Are Ours Too"
EQC_ED_griffons_are_ours_too_desc:0 "All those who live within Our realm are Our subjects, regardless of race. Whether they be griffon or pony, zebra or yeti, hippogriff or dog, they shall all bow to Us as loyal servants."
EQC_ED_big_sister:0 "A Page From Big Sister's Book"
EQC_ED_big_sister_desc:0 "Combing through the politics of New Mareland, We have come across an interesting group: MARESOC. While their ideas about "collective oligarchism" are pure nonsense clearly worthy more of fiction than actual ideology, their ideas about spying are quite ingenious. We shall meet this Big Sister, and learn all there is to know about her proposed methods."
EQC_ED_coopt_equalist_ideals:0 "Coopt Equalist Ideals"
EQC_ED_coopt_equalist_ideals_desc:0 "Equalism, like most things done by Starlight Glimmer, is a farse. Yet within that farse exists something that can be made to serve Our will. We shall utilize Equalism as the basis of a plan to properly stratify society into a truly equal class across all boundaries, one in which only those We call upon shall rise beyond their standing. We see the future, and the future is a sea of uniform mediocrity beholden to Our will."
EQC_ED_make_the_unions_bend:0 "Make The Unions Obey"
EQC_ED_make_the_unions_bend_desc:0 "Leftism is built upon the idea that the people hold the true power in a nation. Preposterous! True power comes only from the divine right that We hold! These leftists with their unions and syndicates shall learn to serve their betters, or they shall learn to embrace death!"
EQC_ED_absorb_the_populists:0 "Absorb The Populists"
EQC_ED_absorb_the_populists_desc:0 "The populists of old New Mareland have been wise to avoid antagonizing Us. In recognition of this, We shall reach out Our hooves and offer them a place at Our side."
EQC_ED_purge_the_dissenters:0 "Purge The Dissenters"
EQC_ED_purge_the_dissenters_desc:0 "We have been patient for too long. Those that continue to not accept Our rule have no place in it. If they wish to set themselves apart, then We shall oblige them, one head at a time."
EQC_ED_no_place_for_disloyalty:0 "No Place For Disloyalty"
EQC_ED_no_place_for_disloyalty_desc:0 "To obey Our will is not a choice, nor is it a request, it is an order from on high. Those who are unable or unwilling to follow Our commands have no place in Our realm. We shall make this clear to all Our subjects, and imprint upon them the weight of Our strength."
EQC_ED_a_newer_mareland:0 "A Newer Mareland"
EQC_ED_a_newer_mareland_desc:0 "At last, New Mareland has been reborn. From a haven of backwater weakness, a mighty machine has been constructed. Under Our guidance, New Mareland shall become the vanguard of Our rule and spread Our glory to this continent!"
EQC_ED_breaking_free_of_our_prison:0 "Breaking Free Of Our Prison"
EQC_ED_breaking_free_of_our_prison_desc:0 "While the work of New Mareland cannot, and shall not, be denied, this little piece of Griffonia is not all We require. We shall rule this entire continent, and utilize it for Our return to Our true birthright. It is time for the conquest of Our new lands to begin!"
EQC_ED_send_the_economy_into_overdrive:0 "Send The Economy Into Overdrive"
EQC_ED_send_the_economy_into_overdrive_desc:0 "Even with Our previous actions, the economy of New Mareland has still felt sluggish in many ways. As We shift to a war economy, there will be no place for such weakness. The economy shall be sent into overdrive, working both day and night, night and day for Our needs!"
EQC_ED_transform_civilian_buildings:0 "Transform Civilian Buildings"
EQC_ED_transform_civilian_buildings_desc:0 "Under Our rule, everything must have a purpose. Things that don't may be changed at Our whim. Every building will be utilized for a proper purpose, or it will be replaced by one that does."
EQC_ED_to_power_a_nation:0 "To Power A Nation"
EQC_ED_to_power_a_nation_desc:0 "Unlike in the days of the past, We cannot build an army off forges and iron alone, we require coal. Our realm shall be properly powered, lest it, and Our war effort, run out of electricity."
EQC_ED_ultima_ratio:0 "Ultima Ratio"
EQC_ED_ultima_ratio_desc:0 "Sometimes We may come across a problem that cannot be solved merely by bullets, but for which We have no need to directly intervene. For these problems We shall create an ultimate weapon to punish those who resist Our rule."
EQC_ED_a_gun_for_every_blade_of_grass:0 "A Gun For Every Blade Of Grass"
EQC_ED_a_gun_for_every_blade_of_grass_desc:0 "The Imperial Army must be kept ready to enforce Our will at a moment's notice regardless of circumstance. We shall not allow it to run out of equipment for even a moment. In service of Our grand design, We shall ensure our soldiers always have a gun available."
EQC_ED_every_little_bit_counts:0 "Every Little Bit Counts"
EQC_ED_every_little_bit_counts_desc:0 "One grain cannot crush a grasshopper, but a great torrent can sweep away an entire swarm. So too is it with Our subjects. Even an extra minute of work can be the difference between the necessary levels of output and Our armies faltering. Our subjects must accept this, and work themselves to the bone in Our name."
EQC_ED_the_imperial_research_institute:0 "Imperial Research Institute"
EQC_ED_the_imperial_research_institute_desc:0 "We must ensure Our realm excels in all categories, including in science. To stagnate in research is to invite the stagnation of progress as a whole, something that We shall not accept. Our patronage shall be extended into researching new technologies to better serve Our will."
EQC_ED_the_magic_of_industry:0 "The Magic Of Industry"
EQC_ED_the_magic_of_industry_desc:0 "While some may say that factories are the opposite of magic, they have far more in common than expected. Like alchemists, factories turn lumps of iron and dirt into tanks, bullets, bombs, and ships. Indeed, industrial output can easily outstrip that of its magical counterparts due to economies of scale. We shall harness this power for Our ends, and bring the magic of industry into the long list of magics We have mastered."
EQC_ED_we_need_equipment_now:0 "We Need Equipment Now"
EQC_ED_we_need_equipment_now_desc:0 "Expert craftsponyship may be acceptable during normal times, but We do not rule in normal times. We must have as many weapons as possible, and for that We shall concentrate on quantity over quality."
EQC_ED_royal_standard:0 "Royal Standard"
EQC_ED_royal_standard_desc:0 "While it is easy to become enraptured with the short term, the short term means nothing if in the long term Our armies cannot fight as their weapons break apart. We must raise the standards even further, ensuring that those who fight in Our name go into battle with nothing but the best."
EQC_ED_industrial_heart_of_griffonia:0 "Industrial Heart Of Griffonia"
EQC_ED_industrial_heart_of_griffonia_desc:0 "What would to others seem a great feat is to Us nothing but expected. Yet We should not ignore what We have achieved. In a short time We have forged a nation whose industry rivals, no, exceeds that of the greatest powers of this continent. We have forged an engine to be proud of! Our subjects, heed this day, for you have achieved greatness in Our name!"
EQC_ED_every_creature_must_serve:0 "Every Creature Must Serve"
EQC_ED_every_creature_must_serve_desc:0 "The only way to overcome the obstacles before Us is to mobilize as many creatures as possible. We shall focus on the creation of an Imperial Army without number, whose legions blot out the stars so that only the sun and moon are visible. Even if it requires some compromises in training, it is the only way to secure Our realm."
EQC_ED_bet_on_elite_units:0 "Bet On Elite Units"
EQC_ED_bet_on_elite_units_desc:0 "Our foes will be vast, and they shall be more numerous than Us. The way to overcome Our foes will not be by trying to outdo them in their strengths, but by concentrating on Our own. Our soldiers shall be the peak of mortality, second only to Us. Only then can We utilize them to their fullest potential."
EQC_ED_royal_bonds:0 "Issue Royal Bonds"
EQC_ED_royal_bonds_desc:0 "Somehow, We have not been able to procure enough funding despite Our unorthodox methods of raising money. Who knew war was so expensive? To further finance Our efforts, We shall "encourage" our citizens to purchase Royal bonds, which will be repaid at a future date with interest."
EQC_ED_rip_and_tear:0 "Rip And Tear Until It's Done"
EQC_ED_rip_and_tear_desc:0 "Time is of the essence, the more We spend planning is more time We spend away from Equestria. We shall smite our enemies down with ferocity and fervor, not maps and paper."
EQC_ED_meticulous_planning:0 "Meticulous Planning"
EQC_ED_meticulous_planning_desc:0 "Warfare is much more than just battle, it is an intricate dance of a million different partners. Only by properly coordinating them all can We hope to achieve victory. "
EQC_ED_destroying_the_shield:0 "Destroying The Shield"
EQC_ED_destroying_the_shield_desc:0 "Our hooves shall one day tread over all of Griffonia, but even the greatest of journeys begins with a single trot. The nations of Karthinia may think themselves safe behind their alliance, but they shall soon know the true extent of Our power. Whether they stand united or divided, they shall fall as one."
EQC_ED_no_crown_but_our_own:0 "No Crowns But Our Own"
EQC_ED_no_crown_but_our_own_desc:0 "The idea that there are any royals worthy of the title in this world aside from us is preposterous. We shall show the world the truth of this, and ensure that all that take on the moniker of "monarch" shall kneel with the rest."
EQC_ED_the_karthinian_conquest:0 "The Karthinian Conquest"
EQC_ED_the_karthinian_conquest_desc:0 "With the defeat of Wingbardy, the first domino on Our path to conquest has fallen. The riches of southern Griffonia now lie within Our reach, ready to be exploited and used for the pursuit of Our goals."
EQC_ED_divide_the_spoils:0 "Divide The Spoils"
EQC_ED_divide_the_spoils_desc:0 "With the new conquests, new wealth and resources have entered into Our patronage. As the benevolent rulers We are, We shall bestow Our blessings upon those subjects who have proven their loyalty. Let all take note, and know that We are kind rulers who take care of those who serve Us well."
EQC_ED_demand_their_loyalty:0 "Demand Their Loyalty"
EQC_ED_demand_their_loyalty_desc:0 "The conquered peoples have long worshipped false gods of foreign birth, but no longer. From the lowliest peasant to the most obstinate atheist, they shall come to learn that their true gods now rule them."
EQC_ED_settling_on_a_new_faith:0 "Settling On A New Faith"
EQC_ED_settling_on_a_new_faith_desc:0 "As Our realm grows, We must decide on something We have been strategically avoiding: the nature of faith in Our realm. We must find a way to thread the needle, and unify Solarism and Nightmareism in a way that respects both halves of Our rule."
EQC_ED_pacify_lake_rumare:0 "Pacify Lake Rumare"
EQC_ED_pacify_lake_rumare_desc:0 "While most nations surrounding the Lake are nothing worthy of respect, they do exist in a strategically important location. Lake Rumare shall be brought to heel and used as a springboard for further conquests."
EQC_ED_our_subjects_now_and_forever:0 "Our Subjects, Now And Forever"
EQC_ED_our_subjects_now_and_forever_desc:0 "Every creature under Our rule must come to realize and accept the reality that they are now Our subjects for all eternity. For those under Our banner, there are only two options: integration into Our realm, or removal from it."
EQC_ED_a_stab_at_the_heart_of_griffonkind:0 "A Stab At The Heart Of Griffonkind"
EQC_ED_a_stab_at_the_heart_of_griffonkind_desc:0 "Although the region around Griffonstone could be called, kindly, a wasteheap, the city still holds much importance to the griffons. Our conquest of it shows the strength of Our cause and the legitimacy of Our rule to Our griffon subjects, both those already under Our guidance and those yet to recieve it."
EQC_ED_topple_his_tomb:0 "Topple His Tomb"
EQC_ED_topple_his_tomb_desc:0 "The griffons of Arantiga have committed a grave sin, for they have made unto themselves a graven image of a mere griffon. They shall come to know the error of their ways, but as We are a merciful ruler, they shall be given a chance at redemption. After We destroy the tomb of the false hero, We shall show the griffons that only We are to be venerated, and Us alone."
EQC_ED_destroy_heretical_sites:0 "Destroy Heretical Sites"
EQC_ED_destroy_heretical_sites_desc:0 "As We secure Our new lands, it shall occer again and again that We shall encounter yet more idols to false gods. We must not hesitate, and strike down these sites at the first opportunity, proving Our divinity and superiority beyond a doubt."
EQC_ED_pacify_the_east:0 "Prioritize The East"
EQC_ED_pacify_the_east_desc:0 "As Griffonia mobilizes in a vain attempt to halt Our rightful expansion, We must choose which way to focus our efforts. To the east lies Sicameon and Asterion, two nations whose geography is more dangerous than their militaries. By striking them, We shall be able to advance Our own forces easily while also securing more of the southern coastline of Griffonia."
EQC_ED_no_more_revolutions:0 "No More Revolutions"
EQC_ED_no_more_revolutions_desc:0 "Aquileia remains a formidable foe, her strength unbound now that she has overcome her internal issues. We must not give them more time to recover, and strike immediately. The sooner Aquileia is brought to hoof, the sooner Our enemies receive a devastating blow."
EQC_ED_they_might_have_their_uses:0 "They Might Have Their Uses"
EQC_ED_they_might_have_their_uses_desc:0 "While the bandits of Blackrock are clearly an undesirable lot, they have proven their skillfullness in certain areas that may be useful for us in the future. We shall give them a chance to redeem themselves, spreading chaos in those lands which continue to resist Our rule."
EQC_ED_death_to_bandits:0 "Death To Bandits"
EQC_ED_death_to_bandits_desc:0 "There can be no mercy for bandits. Do not listen to their lies, the only utility their kind has is as fertilizer for our oats. They shall hang, and serve as an example to all who would seek to act the same."
EQC_ED_bringing_order_to_evi:0 "Bringing Order To Evi"
EQC_ED_bringing_order_to_evi_desc:0 "After breaching the Blackhollow Mountains, we come to the Evi Valley. Not only is the region rich in natural resources, its agricultural bounty is unmatched in the entire continent. Its flat lands will allow Us to launch a campaign fast as light across its expanses, bringing the riches of the Evi Valley into Our hooves with minimal damage."
EQC_ED_peripheral_no_longer:0 "Peripheral No Longer"
EQC_ED_peripheral_no_longer_desc:0 "The Périphérie lies along the axis of Our advance northwards, serving as a key objective to secure as We continue Our advance. We shall ensure it is peripheral no longer, and is instead brought directly into Our patronage."
EQC_ED_bring_aquileian_ponies_into_the_fold:0 "Bring Aquileian Ponies Into The Fold"
EQC_ED_bring_aquileian_ponies_into_the_fold_desc:0 "Aquileia has a large population of ponies that have lived alongside their griffons for centuries. Surely We can bring them to Our path and utilize them as a stepping stone into integrating Aquileia as a whole."
EQC_ED_integrate_their_economy:0 "Integrate Their Economy"
EQC_ED_integrate_their_economy_desc:0 "The Aquileian economy was a thriving one, fueled by conquests of their own. As their industry now lies in Our hooves, it is time we integrate it and put that prosperity to use for a cause that truly matters: Our own."
EQC_ED_rescue_the_posniaks:0 "Rescue The Posniaks"
EQC_ED_rescue_the_posniaks_desc:0 "Word of the Longswordian Genocide has managed to even reach Our ears in New Mareland, and it fills Us with righteous anger. To think that those barbarians would dare lay a single claw on Our little ponies! We shall rescue Our subjects and ensure that nocreature ever harms them again."
EQC_ED_conquering_the_southern_coast:0 "Conquering The Southern Coast"
EQC_ED_conquering_the_southern_coast_desc:0 "The Griffonian Southeast is the last remaining bastion of hostile control along Our southern shore. Should we bring this area to hoof, We shall go far to secure Our southern flank from naval assault, as well as smash the zebras with funny ideas about "Harmony" and "Freedom"."
EQC_ED_only_one_empire_can_stand:0 "Only One Empire Can Stand"
EQC_ED_only_one_empire_can_stand_desc:0 "The Griffonian Empire is an empire long past its prime, and the ultimate proof of the need for a proper ruler for their kind. Only We can provide that leadership, for under Our rule the disunity of the past shall be swept away in a tide of divine glory. We shall take the heart of griffonkind, and prove once and for all the futility of opposing Our strength."
EQC_ED_dethrone_the_bankers:0 "Dethrone The Bankers"
EQC_ED_dethrone_the_bankers_desc:0 "Skyfall is a monument to the sins of griffonkind, a great idol to their decadence and greed. We shall ride into this blight upon the world and cleanse it, destroying the bankers and bringing new light to the continent."
EQC_ED_make_them_bend_to_us:0 "Make Them Bend To Us"
EQC_ED_make_them_bend_to_us_desc:0 "We are a magnanimous ruler, one that cares for Our subjects. Yet in exchange for this care, Our subjects have duties they must fulfill as well. The Posniaks have yet to learn this truth, and must be made to realize that the repayment for their liberation is an eternal service unto Our realm."
EQC_ED_erase_local_superstitions:0 "Erase Local Superstitions"
EQC_ED_erase_local_superstitions_desc:0 "It seems as if the Posniaks still reject Our divinity, foolishly clinging to their old ways. We shall suffer this insult no longer, for the Posniaks shall have no gods before Us."
EQC_ED_last_days_of_the_federation:0 "Last Days Of The Federation"
EQC_ED_last_days_of_the_federation_desc:0 "Perhaps in another world, another when, the River Federation may have stood at Our side, valued for their efforts in defeating the false Empire. Yet they have chosen to defy Us. They shall know their mistakes, for they shall fell Our wrath. Just as they tried to bring about Our end, so too shall We deliver theirs."
EQC_ED_yales_research:0 "Yale's Research"
EQC_ED_yales_research_desc:0 "The universities of Yale have a large variety of... interesting projects with much potential, as well as a well-established research base for more mundane projects. They shall come to serve Our bidding, spreading enlightenment to those We deem worthy."
EQC_ED_loot_the_imperial_palace:0 "Loot The Imperial Palace"
EQC_ED_loot_the_imperial_palace_desc:0 "The old Karthinians had a saying: vae victis. Under the rules of war, the defeated party is left at the mercy of the victor, who may take what they wish. We wish to pillage the Imperial Palace and seize all that is valuable there. If they griffons have a problem with that, they can take it up with Our tanks outside."
EQC_ED_the_north_must_fall:0 "The North Must Fall"
EQC_ED_the_north_must_fall_desc:0 "Northern Griffonia has become a pit of decadence and political activism. The Republicans and Skynavians make their homes there, spreading their perfidious beliefs to the rest of the continent. We shall sweep them into the sea, showing all others what happens when you oppose Our rightful rule."
EQC_ED_riding_down_the_hill:0 "Riding Down The Hill"
EQC_ED_riding_down_the_hill_desc:0 "Of all Our foes, none are more fragile than the backwards hillponies and the stranded changelings of Greneclyf. Yet even in this weakness We cannot tolerate their weakness, for Our enemies could use them as a springboard against Us. We must secure these lands for Ourselves, and show the world that no matter how remote their land, it shall fall under Our rule."
EQC_ED_no_subject_is_for_sale:0 "No Subject Is For Sale"
EQC_ED_no_subject_is_for_sale_desc:0 "Slavery... a most barbaric of institutions. The very thought that a subject of Ours could be bought and sold like a standard commodity is preposterous! Can you sell a town? Can you sell the stars? Our subjects belong to Us, and Us alone, none other shall claim ownership of them."
EQC_ED_a_good_dog_is_a_loyal_dog:0 "A Good Dog Is A Loyal Dog"
EQC_ED_a_good_dog_is_a_loyal_dog_desc:0 "The dogs of Bronzehill have forged a great reputation for their loyalty, and it would be a waste to ignore it. We shall grant the dogs one chance to switch their allegiances to those truly deserving of worship."
EQC_ED_secure_the_staging_ground:0 "Secure The Staging Ground"
EQC_ED_secure_the_staging_ground_desc:0 "Haukland's position in the middle of the §OCelestial§!/§gLunar§! Sea makes it of profound strategic utility, and key to any effort to return to Our rightful lands in Equestria. If Meyer shall not recognize his betters, then perhaps it is time We removed his wings."
EQC_ED_the_death_of_republicanism:0 "The Death Of Republicanism"
EQC_ED_the_death_of_republicanism_desc:0 "With the fall of the former Republic, the time has come for the extirpation of republicanism both as an idea and as a ruling government. Some fools may say you can't kill an idea, but they have never met Our power."
EQC_ED_death_of_the_undead:0 "Death Of The Undead"
EQC_ED_death_of_the_undead_desc:0 "Even with most of Griffonia secured, there still exists the Dread League in the far north. Perversion of magic abounds there, with necromancers and vampires both calling the frigid wastes their home. We shall bring Our power to bear, searing this blight from the face of the planet. Against Our power, even the undead may die."
EQC_ED_knowledge_of_the_dead:0 "Knowledge Of The Dead"
EQC_ED_knowledge_of_the_dead_desc:0 "Hmm... searching through their archives, it would seem the Dread League found some things of worth in their blasphemy. We shall incorporate what little is worthwhile into Our knowledge, then leave the rest of this blasted city to burn."
EQC_ED_griffonia_united_under_the_twin_crowns:0 "Griffonia United Under The Twin Crowns"
EQC_ED_griffonia_united_under_the_twin_crowns_desc:0 "With all of Griffonia bowing before Us, the time before the final showdown is nigh. Prepare the Legions, mobilize the Inquisitors, for We shall soon march forth!"
EQC_ED_arcturians_no_longer:0 "Arcturians No Longer"
EQC_ED_arcturians_no_longer_desc:0 "During their endless battles against the Dread League, the Arcturian Order proved their mettle. We shall not waste their talents, and shall offer them a place at Our side. All they need do is accept Our will."
EQC_ED_preparations_for_the_homecoming:0 "Preparations For The Homecoming"
EQC_ED_preparations_for_the_homecoming_desc:0 "The time of Our return is nigh. While Our first attempt ended in frustration, We shall ensure Our second attempt does not. We have gathered great power from bygone eras to Us. Our armies are endless, Our industry vast. The foolish Princess and her friends shall soon know Our wrath. Equestria shall be Ours."
EQC_ED_secure_the_dragon_lands:0 "Slay The Dragon Lands"
EQC_ED_secure_the_dragon_lands_desc:0 "Despite their legendary strength, the dragons are far too few and far too backwards to stop Our modern armies. We shall subsume their isles into Our realm as a forward base against Equus."
EQC_ED_contact_loyalists:0 "Contact Loyalists"
EQC_ED_contact_loyalists_desc:0 "Even with Our earlier calls to Our subjects, there remain many in Equus who were unable to join Us. This has turned out to be fortuitous, as they shall now serve as Our vanguard. Let them show themselves loyal and true to Our name."
EQC_ED_bolster_our_naval_capabilities:0 "Bolster Our Naval Capabilities"
EQC_ED_bolster_our_naval_capabilities_desc:0 "Like in many wars, Our biggest enemy will not be the soldiers of our foes, but logistics. To ensure that the §OCelestial§!/§gLunar§! Sea shall be a smooth road for Our forces to walk along, We must ensure Our navy rules the waves."
EQC_ED_promote_chaos:0 "Promote Chaos"
EQC_ED_promote_chaos_desc:0 "Despite its outward appearence of unity, underneath the surface remains numerous cracks in the facade of Harmony. We shall tear into these, ripping apart the armor of Our enemy and pouring into the gaps."
EQC_ED_around_the_clock:0 "Around The Clock"
EQC_ED_around_the_clock_desc:0 "As the fateful day approaches, We cannot afford to allow ridiculous things like "workers rights" and "necessary breaks to improve efficiency" get in the way of reclaiming what is Ours. The people shall serve Our will without question, committing themselves heart and soul to the reclamation of the birthright."
EQC_ED_taking_back_what_is_ours_by_right:0 "Taking Back What Is Ours By Right"
EQC_ED_taking_back_what_is_ours_by_right_desc:0 "Finally the moment has arrived, for Us to be triumphant. The false rulers of Equestria shall be made to bow before their rightful rulers and acknowledge Our right. Should they prove sufficiently contrite, We may be willing to allow them back into Our graces."
EQC_ED_the_great_return:0 "The Great Return"
EQC_ED_the_great_return_desc:0 "Despite the attempts to oppose Us, We have returned to Our rightful dominion. Despite traitors both foreign and domestic, despite the Tree of Harmony's opposition, and despite Our own subjects being turned against us, We once again stand in Canterlot. The proof of Our power is undeniable, for not even the world itself could stop Our return!"
EQC_ED_dealing_with_the_malevolent_six:0 "Dealing With The Malevolent Six"
EQC_ED_dealing_with_the_malevolent_six_desc:0 "The Elements of Harmony have failed in their duties. Rather than protecting it and remaining loyal to their friends, they have chosen to disobey Us and fight against Our rightful rule. They shall be punished, the only question is how."
EQC_ED_it_must_go:0 "It Must Go" #WHO MUST GO?
EQC_ED_it_must_go_desc:0 "The Tree of Harmony has been a thorn in Our side ever since Our emergence. Its attempts to block Our access to Equestria are unforgivable, and it must be disposed of post haste. Only then can Our rule be safe from merry bands of true companions gaining a last-minute boost from the power of friendship and prevailing over Us."
EQC_ED_jet_sets_reckoning:0 "Jet Set's Reckoning"
EQC_ED_jet_sets_reckoning_desc:0 "It seems that Our Royal Secretary did not truly appreciate the position given to him and worked behind Our back with the traitors... For this there shall be a reckoning, for no creature betrays Us and escapes without justice."
EQC_ED_after_the_dust_settles:0 "After The Dust Settles"
EQC_ED_after_the_dust_settles_desc:0 "We have brought peace, justice, and prosperity to Our new empire, but there is also now nothing to keep Us united. Even as the dust settles, an uncomfortable question comes to the forefront: what now?"
EQC_ED_what_we_do_best:0 "What We Do Best"
EQC_ED_what_we_do_best_desc:0 "Among those loyal to Us, the ability to construct intelligence networks were second to none. Rather than relying on "goodwill", We shall ensure that every one of Our subjects know that We are watching while Our enemies will have no place safe to keep secrets."
EQC_ED_build_on_the_motherly_image:0 "Build On The Motherly Image"
EQC_ED_build_on_the_motherly_image_desc:0 "Spying is such an ugly and unsavory business, unnecessary for one such as Us. We shall instead cultivate the image of a caring mother that Our subjects may always turn to. We did not rule Equestria for a millenia by Ourselves based off fear, after all.\nAnd of course, if Our little ponies misbehave, Mother's ear is always open to listen to their loyal siblings."
EQC_ED_the_imperial_war_plan:0 "The Imperial War Plan"
EQC_ED_the_imperial_war_plan_desc:0 "Our plans to conquer both Griffonia and Equus will require a vast transformation of the military of Our realm. So thorough shall it be that when We have finished, what was once the Army of New Mareland shall become an unrecognizable machine dedicated to Our will."
EQC_ED_locate_promising_mages:0 "Locate Promising Mages"
EQC_ED_locate_promising_mages_desc:0 "With the loss of Equestria, the best mages available to ponykind have been lost. But that does not mean the best mages out there, just the best mages We know of. Griffonia will doubtlessly have many among its number skilled with magic and eager to serve Our cause. And if they're not? A little... persuasion never hurt anypony."
EQC_ED_new_training_methods:0 "New Training Methods"
EQC_ED_new_training_methods_desc:0 "With the introduction of a dizzying array of new technologies to the battlefield in the past decades, it is necessary that Our forces be able to adapt on the move. We shall instill this in them in training, allowing them to always enforce Our will."
EQC_ED_followers_of_the_night:0 "Followers Of The Night"
EQC_ED_followers_of_the_night_desc:0 "None can deny that the forces of Our servants are superior to all others, including within Our realm. We shall further focus on them, improving their equipment and training and ensuring that the followers of the Nightmare are the best warriors on the planet. With iron discipline they shall route the enemy, and without having to charge straight into a machine gun nest to do it."
EQC_ED_warriors_of_the_sun:0 "Warriors Of The Sun"
EQC_ED_warriors_of_the_sun_desc:0 "There are none within Our realm as dedicated as the soldiers of Daybreaker. Rather than opening ourselves up to being swamped by the enemy as our "elite formations" are slowly attrited away, We shall ensure that the enemy breaks against Our soldiers pouring forth like rays from the sun. Through faith and fervor, all things are possible."
EQC_ED_the_need_for_war:0 "The Need For War"
EQC_ED_the_need_for_war_desc:0 "War, what is it good for? Absolutely everything. Only through war can We attain what is rightfully Ours, only through war can We temper Our subjects. To reject war is to reject change, and to reject change is to encourage stagnation. We shall not stagnate, for Our power knows no end!"
EQC_ED_bravery_will_be_rewarded:0 "Bravery Will Be Rewarded"
EQC_ED_bravery_will_be_rewarded_desc:0 "Although all are expected to be brave in Our name, there are those among the mortals who shall put forth a greater effort than their compatriots. We shall recognize their efforts, showering them with money and medals to recognize their sacrifices and encourage others to do the same."
EQC_ED_redefining_friendship:0 "Redefining Friendship"
EQC_ED_redefining_friendship_desc:0 "Friendship and Harmony are key to the very identity of Equestria, and We shall not take that away. Rather We shall show them the truth, that true friendship is listening to those who want what is best for you while true harmony is working alongside your fellow subjects to ensure the smooth workings of society."
EQC_ED_to_cross_an_ocean:0 "To Cross An Ocean"
EQC_ED_to_cross_an_ocean_desc:0 "Crossing into Equus means crossing a sea, and while We can do so easily, Our subjects will require boats. These boats must be protected from enemy boats. As such We need a navy, and a navy We shall have."
EQC_ED_everything_for_victory:0 "Everything For Victory"
EQC_ED_everything_for_victory_desc:0 "Victory is Our primary objective above all others. Yes, other things may be desirable, but without victory they are unattainable. Our subjects must be made aware of this, and further exalt themselves for Our needs."
EQC_ED_to_dominate_the_skies:0 "To Dominate The Skies"
EQC_ED_to_dominate_the_skies_desc:0 "We have seen time and time again, and indeed been the teacher of, the importance of air power. We cannot be everywhere simultaneously, and thus must rely on Our subjects taking up the slack. Our planes shall blot out the sky, allowing Our army and navy to advance unmolested."
EQC_ED_the_grand_fleet:0 "The Grand Fleet"
EQC_ED_the_grand_fleet_desc:0 "We need boats, and we need lots of boats. Not boats with the biggest guns and the thickest armors, just lots of boats. We can afford to cut corners, after all, We don't plan on staying at sea very long."
EQC_ED_focus_on_firepower:0 "Focus On Firepower"
EQC_ED_focus_on_firepower_desc:0 "While naval warfare is a numbers game, it is not a battle of ant swarms competing. Capital ships will be necessary to sweep the enemy from the seas and defeat their own capital ships. When Our destroyers can be sunk from outside their gun range by the enemy battleship, the fact there are twenty of them won't matter when all We needed to win was a single BB."
EQC_ED_experimental_designs:0 "Experimental Designs"
EQC_ED_experimental_designs_desc:0 "Aerial warfare is the newest theater of warfare, and as such is constantly evolving. We shall lean on this, pushing forth newer designs to overwhelm the enemy with Our technological advantage. Some may spontaneously explode when the fuel tank gets too empty or your turn is just a single degree too sharp, but that is a worthy price to pay for the 5% increase in firepower and 3% increase in speed and agility."
EQC_ED_keep_to_what_works:0 "Keep To What Works"
EQC_ED_keep_to_what_works_desc:0 "Our resources are limited, and should be spent on tried and true methods. Every experiment is three planes that could have been built instead, each taking one of the enemy with them while the third returns."

## Equestria Side
EQS_ED_what_now:0 "What Now?"
EQS_ED_what_now_desc:0 "It appears we have found ourselves in a bit of a predicament. The princesses that have ruled us for a thousand years seem to have gone crazy, and are currently busy consolidating their rule over our former colony of New Mareland. We need to figure out a way forward, and fast."
EQS_ED_visit_the_tree_of_harmony:0 "Visit The Tree Of Harmony"
EQS_ED_visit_the_tree_of_harmony_desc:0 "The Elements of Harmony – and Spike – have agreed to form an emergency council to act as new government. But on their own, even they can't do much. It is time we put our trust in an ancient tree."
EQS_ED_calm_the_ponies:0 "Calm The Ponies"
EQS_ED_calm_the_ponies_desc:0 "It is perhaps understandable that a certain amount of panic has beset the ponies of Equestria, considering that two princesses have failed Equestria. But not all hope is lost – we still have a third one."
EQS_ED_a_glimmer_of_hope:0 "A Glimmer Of Hope"
EQS_ED_a_glimmer_of_hope_desc:0 "A new way forward has opened at last. The ponies have put their trust in the Elements, and the Tree of Harmony has bought us the time we so dearly need. The time has come to put all hooves on deck – and always remember this, my little ponies: Friendship is Magic."
EQS_ED_gather_friends:0 "Gather Friends"
EQS_ED_gather_friends_desc:0 "If we take on this fight alone, we have already lost. But luckily, the Elements of Harmony have made many friends and acquaintances over the years, and are ready to make even more. It is time we gather our friends, so we may all face this foe together."
EQS_ED_not_over_a_barrel:0 "Not Over A Barrel"
EQS_ED_not_over_a_barrel_desc:0 "Down in Southwestern Equestria live the buffaloes. While we had our conflicts in the past, the Elements of Harmony were able to restore peace a few years back. Yet, times have moved on, and we need to reaffirm our friendship – lest we let things get out of hoof."
EQS_ED_the_princess_of_love:0 "The Princess Of Love"
EQS_ED_the_princess_of_love_desc:0 "Who could be better friends to us than the crystal ponies? Princess Cadance, the Princess of Love, has ruled over them for a few years now, together with her husband, who is also the brother of the Princess of Friendship. We need to reaffirm this friendship, and ensure that they stand by our side against the evil diarchy."
EQS_ED_help_across_the_ocean:0 "Help Across The Ocean"
EQS_ED_help_across_the_ocean_desc:0 "Far away, off the coast of Zebrica, is the Kingdom of Hippogriffia, ruled by Queen Novo. Since we helped them against the Storm King, they have been our friends. While they're not on Equus, it could prove worthwhile to contact them."
EQS_ED_to_change_a_changeling:0 "To Change A Changeling"
EQS_ED_to_change_a_changeling_desc:0 "The Changelings have been one of our most dangerous foes, and Queen Chrysalis is still set on conquering our lands. It is time that the Elements of Harmony solve this problem, once and for all. Because deep down we already know: even a changeling can change. Thorax is the best example."
EQS_ED_not_asking_for_trouble:0 "Not Asking For Trouble"
EQS_ED_not_asking_for_trouble_desc:0 "In Yakyakistan to our north, trouble is brewing. Prince Rutherford and his brother Prince Bradford have been locked in an irreconcilable standoff. That seems like an urgent friendship problem to solve."
EQS_ED_secrets_of_the_changelings:0 "Secrets Of The Changelings"
EQS_ED_secrets_of_the_changelings_desc:0 "The changelings have their own way of doing things in many ways. They live in crammed hives, accept rapid industrialization more easily than ponies, and have shown to be very capable in a fight. It would be wise to carefully weigh if we can adapt some of their innovations."
EQS_ED_the_north_secured:0 "The North Secured"
EQS_ED_the_north_secured_desc:0 "The North of Equus features many different civilizations, from the Olenian deer in the northwest to the polar bears and penguins in the north and northeast respectively. We need to find common ground with them; after all, the dark alicorns are as much a threat to them as to us."
EQS_ED_strength_in_the_polar_soul:0 "Strength In The Polar Soul"
EQS_ED_strength_in_the_polar_soul_desc:0 "The civilizations of the north never experienced the loving rule of an immortal princess. This made their civilizations hardy, some might even say coarse – but isn't a bit of coarseness needed in these trying times? Let them teach us how to survive in the wild, we might very well need it."
EQS_ED_unity_in_diversity:0 "Unity In Diversity"
EQS_ED_unity_in_diversity_desc:0 "Equus features so many species, and so many civilizations. We never had the chance to fully appreciate this until we were forced to open our hearts and minds, besieged by a stronger enemy. Now, it shall become the bedrock of our victory."
EQS_ED_the_matter_of_severyana:0 "The Matter Of Severyana"
EQS_ED_the_matter_of_severyana_desc:0 "Severyana. The region split from us following its revolution, and formed the Soviet Republic of Severyana, colloquially known as Stalliongrad after its capital. Relations have been rocky: they dream of bringing the revolution to Equestria, while we try our best to ignore them. But this cannot go on for much longer – in the face of Nightmare Moon and Daybreaker, we need to stand together."
EQS_ED_the_lost_griffons_of_equus:0 "The Lost Griffons Of Equus"
EQS_ED_the_lost_griffons_of_equus_desc:0 "Centuries ago, the Griffonian Empire, then at the peak of its might, established the colony of Nova Griffonia in northeastern Equus. Now, the Empire has crumbled, and the griffons of the former colony have to cope with standing on their own. But considering what the evil diarchs are doing to their kin, we should send them a friendship mission – after all, they know Griffonia better than any of us."
EQS_ED_griffon_insights:0 "Griffon Insights"
EQS_ED_griffon_insights_desc:0 "Griffons are catbirds, and as such are capable of flying just like pegasi. Yet, the martial traditions of griffons and pegasi look very different. Wouldn't it be great for both of us if we could learn from each other? And maybe there is even more that the griffons can teach us."
EQS_ED_equus_in_harmony:0 "Equus In Harmony"
EQS_ED_equus_in_harmony_desc:0 "All of Equus has come together as allies, partners, and friends, preparing for the fight against the evil diarchy. Together, we are stronger than ever before, and together, we will win."
EQS_ED_the_magic_of_friendship:0 "The Magic Of Friendship"
EQS_ED_the_magic_of_friendship_desc:0 "Friendship and harmony have defined Equestria for generations. There are more than values held by society, they are the very foundation upon which the nation is built. And even when the once most important pillars of harmony now seek to overthrow it, we still remember it. As long as the magic of friendship persists, nothing can break us."
EQS_ED_recapitulate_past_adventures:0 "Recapitulate Past Adventures"
EQS_ED_recapitulate_past_adventures_desc:0 "The Elements of Harmony have travelled through Equestria and even beyond, always helping people to find compromise and friendship. In their adventures, they have made plenty of friends themselves. It is time to leverage these contacts – we need all the help we can get."
EQS_ED_another_visit_to_the_tree:0 "Another Visit To The Tree"
EQS_ED_another_visit_to_the_tree_desc:0 "The Tree of Harmony was one of the biggest surprises in this crisis. The shield it cast – now dubbed the Shield of Harmony – protects us from facing the wrath of the corrupted alicorn immediately, giving us crucial time to prepare. But we still understand little of what the tree actually does. We need to seek a deeper understanding of how it connects to Equestria and its ponies."
EQS_ED_star_swirls_library:0 "Star Swirl's Library"
EQS_ED_star_swirls_library_desc:0 "Star Swirl was one of the greatest magicians in Equestrian history. His library, preserved in the catacombs of Canterlot Castle, contains an untold treasure trove of magical research."
EQS_ED_lessons_from_school:0 "Lessons From School"
EQS_ED_lessons_from_school_desc:0 " In our quest to find magical artefact, a good place to start is the school of friendship. Back in the day, Celestia gave it several magical artefacts for the students to study. We should seek to retrieve them."
EQS_ED_wisdom_of_other_races:0 "The Wisdom Of Other Races"
EQS_ED_wisdom_of_other_races_desc:0 "Ponies are not the only race that calls Equus its home. From changelings to polar bears, they all have their own artefacts with magical powers."
EQS_ED_study_the_shield:0 "Study The Shield"
EQS_ED_study_the_shield_desc:0 "The shield that the Tree of Harmony cast over Equestria is of a mysterious nature, much like the tree itself. We would be well-advised to study the shield more, so as to learn how to most effectively strengthen it."
EQS_ED_legends_lost_to_time:0 "Legends Lost To Time"
EQS_ED_legends_lost_to_time_desc:0 "There are still many artefacts in this country that we might know about, but have little information on where to find. A thorough evaluation of the library in Canterlot Castle might bring to light clues that could provide us with valuable opportunities."
EQS_ED_extraordinary_crystalling:0 "An Extraordinary Crystalling"
EQS_ED_extraordinary_crystalling_desc:0 "Normally, the Crystalling is the ceremony by which a newborn is welcomed into the Crystal Empire. However, this time, we want to gather the crystal ponies for a different kind of Crystalling, in which we attempt to use the Crystal Heart's energy to strengthen the Shield of Harmony."
EQS_ED_artifacts_of_power:0 "Artefacts Of Power"
EQS_ED_artifacts_of_power_desc:0 "The artefacts we have gathered display great power. Displaying their might is risky, but it would help us keep up the hope that we can defeat the evil diarchy."
EQS_ED_spell_training:0 "Spell Training"
EQS_ED_spell_training_desc:0 "The tomes and manuscripts we have uncovered and analysed, both in Star Swirl's library and in the library of Canterlot Castle, have brought to light not just hints about artefacts or theoretical discussions about the nature of magic, but also a variety of spells with potential military applications. We should update the training of our mage companies to include those spells."
EQS_ED_a_flurry_of_ideas:0 "A Flurry Of Ideas"
EQS_ED_a_flurry_of_ideas_desc:0 "Cadance, Shining Armour, and Flurry Heart are finally visiting Equestria. Twilight has been overjoyed to spend some time with her niece, and who knows, maybe some good ideas will come out of that."
EQS_ED_the_power_of_alicorn_magic:0 "The Power Of Alicorn Magic"
EQS_ED_the_power_of_alicorn_magic_desc:0 "Daybreaker and Nightmare Moon extensively use their powerful magical abilities as alicorns. Yet, this doesn't mean we are defenceless: with Twilight Sparkle, Cadance and Flurry Heart, that makes three alicorns against two in our favour. While we will never resort to their cursed methods, our magic still holds strong."
EQS_ED_taming_the_flow:0 "Taming The Flow"
EQS_ED_taming_the_flow_desc:0 "The magic of the artefacts we have amassed is channelled into supporting the Shield of Harmony by experienced mages. Yet, this power is wild and uncontrollable at times, as would be expected of some of the most powerful objects from Equestrian history. We should focus on taming the flow of energy to reduce risks and improve stability."
EQS_ED_their_magic_and_ours:0 "Their Magic And Ours"
EQS_ED_their_magic_and_ours_desc:0 "Across the ocean, the evil diarchy indulges in the forbidden realms of magic, bringing destruction, death, and despair over a desperate and cowering population. But we will prove that magic is not evil, only its wielder can be. The coming war will be one of magic, and we will meet them prepared."
EQS_ED_slowing_them_down:0 "Slowing Them Down"
EQS_ED_slowing_them_down_desc:0 "The "condominium" that Daybreaker and Nightmare Moon have founded poses a serious threat to Equestria. But so far, they focussing on conquering Griffonia, to find artefacts with which they can break through our shield. Perhaps we could make their task a little harder..."
EQS_ED_refugees_from_new_mareland:0 "Refugees From New Mareland"
EQS_ED_refugees_from_new_mareland_desc:0 "When the two sisters took over the former colony of New Mareland, not everypony was happy with the new government, to put it lightly. While they have ruthlessly put down any resistance, some ponies managed to flee to Equestria."
EQS_ED_our_most_valuable_asset:0 "Our Most Valuable Asset"
EQS_ED_our_most_valuable_asset_desc:0 "Jet Set has previously contacted Raven Inkwell to ask about how to treat the royal alicorns. It was also him who warned us about the artefact search. But now it seems he is willing to go much further."
EQS_ED_contact_the_griffons:0 "Contact The Griffons"
EQS_ED_contact_the_griffons_desc:0 "If we want to steal artefacts from under the noses of the evil sisters, it would be wise to contact the griffon nations that have not yet been subjugated – as long as some remain."
EQS_ED_securing_the_artefacts:0 "Securing The Artefacts"
EQS_ED_securing_the_artefacts_desc:0 "When we focus on our logistics and hire a few more researchers to prepare expeditions, we can organize more excavations at the same time."
EQS_ED_tricking_the_omniscient:0 "Tricking The Omniscient"
EQS_ED_tricking_the_omniscient_desc:0 "The evil diarchs have come dangerously close to revealing Jet Set as a double agent. However, he has a few tricks up his sleeve how to dispel their mistrust. Unfortunately, he won't be able to cover all his tracks, so he must be more careful in the future."
EQS_ED_emergency_diplomacy:0 "Emergency Diplomacy"
EQS_ED_emergency_diplomacy_desc:0 "With carefully leveraged diplomatic support, we can strengthen the resolve of the griffon nations fighting against the evil diarchy. The effect will likely remain limited, but every bit helps."
EQS_ED_digging_up_the_history:0 "Digging Up The Histroy"
EQS_ED_digging_up_the_history_desc:0 "To increase the chances that the excavation missions in Griffonia succeed, proper preparation is paramount. With slight changes to how the excavations are organized, we can utilize more resources beforehoof for better outcomes."
EQS_ED_the_diplomat_archaelogist:0 "The Diplomat-Archaelogist"
EQS_ED_the_diplomat_archaelogist_desc:0 "An old "friend" of Daring Do might be able to head excavations almost as well as her, as well as providing additional contacts in Griffonia. She already seems to have a relatively good idea of where to find him."
EQS_ED_foreig_artifact_studies:0 "Foreign Artefact Studies"
EQS_ED_foreig_artifact_studies_desc:0 "When war breaks out with the corrupted sisters, they won't be our only foes – in fact, they will command many griffon soldiers. It would be good to find out more about their magic, and what better place to start than with the artefacts from Griffonia."
EQS_ED_perfectly_measured_chaos:0 "A Perfectly Measure Dose Of Chaos"
EQS_ED_perfectly_measured_chaos_desc:0 "Our goal can't be to topple the diarchy from the inside, or even to seriously disrupt their government. The threat of the sisters turning on Jet Set, or even worse, on each other, is simply too high. But some slip-ups here and there can just be hidden in the usual chaos of governance."
EQS_ED_the_precarious_balance:0 "The Precarious Balance"
EQS_ED_the_precarious_balance_desc:0 "The sabotage we do needs to constantly strike the right balance. It should be effective, but it cannot be serious enough to arouse much suspicion. Luckily, with time, Jet Set gets better and better at finding out what he can get away with."
EQS_ED_harmless_tomfoolery:0 "Harmless Tomfoolery"
EQS_ED_harmless_tomfoolery_desc:0 "When we can't secure an artefact immediately, we simply have to try again. Just don't lose the right spirit, alright?"
EQS_ED_it_is_not_grave_robbing:0 "It's Not Grave Robbing"
EQS_ED_it_is_not_grave_robbing_desc:0 "It is just an inconvenient coincidence that the excavation teams share some similarities with grave robbers. Of course, we are the good guys, securing historical artefacts from those that would abuse them. But perhaps we can learn a thing or two from actual grave robbers – first and foremost, how to properly secure a mission."
EQS_ED_expand_our_operations:0 "Expand Our Operations"
EQS_ED_expand_our_operations_desc:0 "Expanding our logistics at home as well as mapping better routes into Griffonia would allow us to try our luck again faster in case of failure."
EQS_ED_prepare_the_army:0 "Prepare The Army"
EQS_ED_prepare_the_army_desc:0 "After centuries of a mostly ceremonial role, the Equestrian army is in a poor state. While steps were taken in the aftermath of the Canterlot Wedding to rebuild a professional military, the situation has now become infinitely more acute. If we want to meet the forces of the evil diarchy on even ground, a complete reassessment is inevitable."
EQS_ED_weather_magic:0 "Weather Magic"
EQS_ED_weather_magic_desc:0 "The magic of weather manipulation is a staple of pegasi culture. The weather is regularly adjusted by pegasi experts for all sorts of purposes – and considering the current circumstances, military purposes will be added to this long list."
EQS_ED_denying_them_sight:0 "Denying Them Sight"
EQS_ED_denying_them_sight_desc:0 "Every battle relies on reconnaissance, or, for the defender, denying the enemy said reconnaissance. With weather magic, we can take this one step further – they shall not see a thing through our thick clouds."
EQS_ED_rain_on_their_parade:0 "Rain On Their Parade"
EQS_ED_rain_on_their_parade_desc:0 "Many things in combat are dependent on the right weather. Many an army has got stuck in the mud, only to then be decimated by their enemies. With controlled weather manipulation, we can shift the battle conditions in our favour."
EQS_ED_wonderbolts_new_job:0 "The Wonderbolts New Job"
EQS_ED_wonderbolts_new_job_desc:0 "One of the few military assets we truly have is the Wonderbolts, expert flyers and weather manipulators. Rainbow Dash – herself a seasoned Bolt – has proposed a plan to use their talents most effectively."
EQS_ED_new_fighter_projects:0 "New Fighter Projects"
EQS_ED_new_fighter_projects_desc:0 "Not even the most talented pegasi will deny that airplanes are an important piece of the puzzle for modern warfare. While they won't replace pegasi entirely, the protection and firepower such a machine offers make it paramount that we produce them at an industrial scale."
EQS_ED_heavy_plane_construction:0 "Heavy Plane Construction"
EQS_ED_heavy_plane_construction_desc:0 "Heavy planes can fly large distances and carry large amounts of ordnance, making them into formidable assets able to threaten the enemy's heartland. Investing into related research projects would open a range of possibilities to our air force."
EQS_ED_the_hoof_troops:0 "The Hoof Troops"
EQS_ED_the_hoof_troops_desc:0 "The bulk of our army will inevitably be the infantry forces. Ensuring proper training and equipment is vital if they are to give the best possible fight."
EQS_ED_the_magic_of_rifles:0 "The Magic Of Rifles"
EQS_ED_the_magic_of_rifles_desc:0 "The magic of firepower has – luckily, as some might say – not played that great a role in the past. However, the coming war is likely to change that. Rifles that shoot spells instead of bullets can be just as deadly, and we would be well advised to take this seriously."
EQS_ED_artillery_advances:0 "Artillery Advances"
EQS_ED_artillery_advances_desc:0 "Artillery is foundational to the modern battlefield. "Shells, not ponies" is the credo of the hour. Without state-of-the-art artillery, our troops are bound to take many unnecessary losses, so research in the area is strongly advised."
EQS_ED_supercharge_rifle_development:0 "Supercharge Rifle Development"
EQS_ED_supercharge_rifle_development_desc:0 "Currently, magical equipment is still in the early stages of development. We need to progress beyond the current iteration as quickly as possible."
EQS_ED_harshwhinnys_ideas:0 "Ms. Harshwhinny's Ideas"
EQS_ED_harshwhinnys_ideas_desc:0 "Ms. Harshwhinny normally heads the Equestria Games, a sports contest where different teams from all of Equestria and even other nations compete. But as for so many others, her life has recently turned on its head – yet she was slightly more prepared than most. A self-taught tank engineer, she has become the strongest advocate for the adoption of armoured warfare."
EQS_ED_taming_the_metal:0 "Taming The Metal"
EQS_ED_taming_the_metal_desc:0 "Mass-producing tanks requires an equally massive amount of metalworking and welding. The application of certain spells that can melt and form metals can help us to decrease work time and improve quality."
EQS_ED_fast_and_furious:0 "Fast And Furious"
EQS_ED_fast_and_furious_desc:0 "Many parts of the army can benefit from motorization. Not only does the infantry itself becomes far more useful, but also various supporting operations as well as logistics require trucks to function properly."
EQS_ED_crystalline_shells:0 "Crystalline Shells"
EQS_ED_crystalline_shells_desc:0 "Even artillery shells can be magically enhanced, for faster load times, more explosive power on impact as well as the ability to very effectively penetrate enemy armour. Unfortunately, we will require large amounts of magical crystals to do so."
EQS_ED_stopping_their_advances:0 "Stopping Their Advances"
EQS_ED_stopping_their_advances_desc:0 "The unfortunate reality is that our enemy will likely have superior forces, at least at first. It is paramount that we prepare our positions as effectively as possible so that we can bleed them dry during their advance."
EQS_ED_terrors_of_the_battlefield:0 "Terrors Of The Battlefield"
EQS_ED_terrors_of_the_battlefield_desc:0 "Further studies have revealed even more ways of enhancing crystal-infused shells and ammunition."
EQS_ED_combined_arms_doctrine:0 "Combined Arms Doctrine"
EQS_ED_combined_arms_doctrine_desc:0 "All armed forces need to be coordinated properly in order to realize their potential to the fullest."
EQS_ED_the_mobile_war:0 "The Mobile War"
EQS_ED_the_mobile_war_desc:0 "A mobile army is a versatile army. Outmanoeuvring and encircling the enemy is the most effective way of destroying their military capabilities. Focusing on the production of trucks and mechanized units, combined with tank warfare, will give us these fast strike capabilities."
EQS_ED_superiority_in_movement:0 "Superiority In Movement"
EQS_ED_superiority_in_movement_desc:0 "Even with all the equipment in the world, it is ultimately up to our commanders to make the most of it. We will train them in manoeuvre warfare, but also give them the necessary freedom to make battlefield decisions as they see fit in order to further make our army flexible and responsive to any enemy action."
EQS_ED_our_first_line_of_defense:0 "Our First Line Of Defence"
EQS_ED_our_first_line_of_defense_desc:0 "Equus is separated from Griffonia by an ocean, and before any forces of the evil diarchy are able to land here, they will first need to cross said ocean. We could make an outsized impact by making this as difficult as possible for them and continuously interrupting their naval supply routes."
EQS_ED_island_defence:0 "Island Defence"
EQS_ED_island_defence_desc:0 "Small islands are hard to defend, but equally hard to attack. Once you hold them however, they are valuable naval bases and forward attack posts. We should make sure that the enemy has a hard time taking them from us."
EQS_ED_repurpose_civilian_boats:0 "Repurpose Civilian Boats"
EQS_ED_repurpose_civilian_boats_desc:0 "Equestria never had the greatest navy, and while we have built some warships in recent years, this will not be enough. We need to refit what we have and even use parts of the civilian shipping fleet if we want to compete."
EQS_ED_dockyard_expansion_plan:0 "Dockyard Expansion Plan"
EQS_ED_dockyard_expansion_plan_desc:0 "More dockyards mean more boats, and more boats for us mean less soldiers landing at our shores."
EQS_ED_forward_defence:0 "Forward Defence"
EQS_ED_forward_defence_desc:0 "The strategy books for our battle commands are highly outdated and not adequate for modern warfare observed in recent years. We will compile an updated version to distribute to our naval command."
EQS_ED_unify_the_navcom:0 "Unify The Naval Command"
EQS_ED_unify_the_navcom_desc:0 "The naval command structures are a mess due to years of overlapping competences and attachment of additional commandos without fundamental reform. We will need to reorder and unify our naval commando."
EQS_ED_bits_of_victory:0 "Bits Of Victory"
EQS_ED_bits_of_victory_desc:0 "If we want to prevail in the upcoming war, deep economic reforms are in order. Even though we can pride ourselves on being leaders in industrial innovation, our industry is poorly connected, inefficient, and almost entirely geared towards peacetime civilian production."
EQS_ED_emergency_industrialisation:0 "Emergency Industrialisation"
EQS_ED_emergency_industrialisation_desc:0 "War does not wait for the indecisive. We need to rapidly expand our industrial capabilities, and as such, the extensive regulatory frame currently hindering the construction of new factories must be put under scrutiny."
EQS_ED_the_fluttershy_plan:0 "The Fluttershy Plan"
EQS_ED_the_fluttershy_plan_desc:0 "For centuries, ponies have lived in harmony with nature. It would be a shame if we hadn't learned anything in all that time. As a member of the Emergency Council Fluttershy has proposed an entirely different approach to plastering factories everywhere."
EQS_ED_lessons_from_the_coast:0 "Lessons From The Coast"
EQS_ED_lessons_from_the_coast_desc:0 "The coastal regions like Baltimare, Manehattan or Las Pegasus have long been the industrial centres of Equestria, while the inland remained more rural and traditional. Now, we need to expand their model, as quickly as possible."
EQS_ED_rethink_the_cutiemark_system:0 "Rethink The Cutie Mark System"
EQS_ED_rethink_the_cutiemark_system_desc:0 "The Cutie Mark system has held up for centuries, and ensured that ponies could get a job that suited them. However, the needs of industry are changing. We should think about loosening the Cutie Mark system and encouraging ponies to look beyond their primary skill."
EQS_ED_magic_makes_industry:0 "Magic Makes Industry"
EQS_ED_magic_makes_industry_desc:0 "Much of our industry is based on the magic that we possess as ponies. It is what shapes us and our approach to doing things."
EQS_ED_the_needs_of_modernity:0 "The Needs Of Modernity"
EQS_ED_the_needs_of_modernity_desc:0 "The military industry is a monster that eats vast amounts of resources – oil, ores, lumber and more. Unfortunately, we have to feed this monster, lest we all suffer the consequences of being promptly conquered."
EQS_ED_nature_provides:0 "Nature Provides"
EQS_ED_nature_provides_desc:0 "While some factories might be unavoidable, so much of our needs – even military ones – can already be found in nature when you know where to look."
EQS_ED_its_not_foraging:0 "It's Not Foraging"
EQS_ED_its_not_foraging_desc:0 "We have spent the last few centuries making friends with all animals big and small. If we go into the woods, we don't forage, but we find what our friends have left for us, and put it to use."
EQS_ED_secrets_of_the_everfree:0 "Secrets Of The Everfree"
EQS_ED_secrets_of_the_everfree_desc:0 "The Everfree Forest is one of the most magical places in Equestria, filled with untold secrets. It also hosts the castle of the two sisters, which holds ancient knowledge. We just have to go and look."
EQS_ED_kindness_creates_kindness:0 "Kindness Creates Kindness"
EQS_ED_kindness_creates_kindness_desc:0 "Kindness is more than a moral principle, it is the foundation of cooperation. It forms a basis on which we can all cooperate – if we stop to think about what's in it for us, we all get more in the end."
EQS_ED_pacifist_no_more:0 "Pacifist No More"
EQS_ED_pacifist_no_more_desc:0 "Equestria is a nation of harmony, and consequently, war has been alien to these lands for centuries. In the past, we have solved our problems by showing our enemies the errors in their ways, or if that didn't help, with the powers of the Elements of Harmony. Yet, this time it is not enough."
EQS_ED_new_armouries:0 "New Armouries"
EQS_ED_new_armouries_desc:0 "More armouries are needed to equip our soldiers properly for the upcoming war."
EQS_ED_repurpose_what_we_have:0 "Repurpose What We Have"
EQS_ED_repurpose_what_we_have_desc:0 "To quicken our military buildup, we need to repurpose existing industry by regearing it towards producing military equipment. This will unfortunately come at the expense of long-term prosperity, but being conquered is not good for prosperity either."
EQS_ED_the_necessary_evil:0 "The Necessary Evil"
EQS_ED_the_necessary_evil_desc:0 "Desperate times lead to drastic measures. The development of nucleo-magical weapons is such a measure, but if the war goes badly, it might be a necessary one."

#### DECISIONS & DECISION CATEGORIES

ED_artefacts_mechanic:0 "The Search For Artefacts"
ED_artefacts_mechanic_desc:0 "Across the world exist §Ypowerful artefacts§! possessing §0arcane magic§!. A mighty mage can then use this magical power to strengthen their own magic – which is exactly what §YDaybreaker and Nightmare Moon§! are planning to do to overpower the §PShield of Harmony§! protecting Equestria.\n\nConquer Griffonian states in order to §Gloot the artefacts therein§!. Once you reach §Y10,000 magic power§!, the focus to attack Equestria will unlock. But be warned: the Equestrians §Rwill try to fight back§!, so you should §Cgather as much magic power as you can§!..."
EQS_ED_artefacts_mechanic:0 "The Search For Artefacts"
EQS_ED_artefacts_mechanic_desc:0 "Across the world exist §Ypowerful artefacts§! possessing §0arcane magic§!. A mighty mage can then use this magical power to strengthen their own magic – which is exactly what §YDaybreaker and Nightmare Moon§! are planning to do to overpower the §PShield of Harmony§! protecting Equestria. In reaction, the Emergency Council has decided to §Ylikewise collect artefacts§! in the hopes of §Gcountering§! the evil diarchs' ambitions.\n\nSearch for artefacts in Equestria and beyond and accumulate as much magic power as you can. When the corrupted alicorns inevitably attack, being able to §Ycounter$! their magic will prove valuable – §Gthe more, the better§!."
