EQC_ED_bravery_will_be_rewarded:0 "Bravery Will Be Rewarded"
EQC_ED_bravery_will_be_rewarded_desc:0 "##TODO, obviously we expect bravery from every one of our subjects, but even then, it's a good idea to reward those who truly show their loyalty to us by risking their lives for our cause. By doing this we will help to inspire other to do the same, even if just for the money and medals."
EQC_ED_redefining_friendship:0 "Redefining Friendship"
EQC_ED_redefining_friendship_desc:0 "##TODO, friendship and harmony are concepts that Equestria holds dearly, and, as such, we should work to have our own response to their version of these ideals. In truth friendship and harmony is all about order and obeying those who want the best for you."
EQC_ED_to_cross_an_ocean:0 "To Cross An Ocean"
EQC_ED_to_cross_an_ocean_desc:0 "##TODO, in the future we will need to find a way to cross the ocean into Equus, with that in mind we should start working on a true navy of our own to help with said mission."
EQC_ED_everything_for_victory:0 "Everything For Victory"
EQC_ED_everything_for_victory_desc:0 "##TODO, all that matters in the end is our victory over the forces that want to destroy us, anything else is secondary to the main goal. Our subjects need to understand that if we cannot accomplish the latter all of the former will also fail."
EQC_ED_to_dominate_the_skies:0 "To Dominate The Skies"
EQC_ED_to_dominate_the_skies_desc:0 "##TODO, a modern army cannot win if they do not control the skies above them, we will make sure not to commit this mistake."
EQC_ED_the_grand_fleet:0 "The Grand Fleet"
EQC_ED_the_grand_fleet_desc:0 "##TODO, we should get as many ships as we possibly can, they might not be the best, but their numbers alone will assure our control over the seas."
EQC_ED_focus_on_firepower:0 "Focus On Firepower"
EQC_ED_focus_on_firepower_desc:0 "##TODO, a bunch of mediocre boats won't win us the victory in the naval front, instead we should focus on producing the most powerful ships our economy allows. The lower numbers won't matter when we destroy all the main hostile ships."
EQC_ED_experimental_designs:0 "Experimental Designs"
EQC_ED_experimental_designs_desc:0 "##TODO, in order to best our enemies in technology front we will bet on some more experimental designs for aircraft. They might prove slightly less reliable, but it will quickly be made up for by their advanced capabilities."
EQC_ED_keep_to_what_works:0 "Keep To What Works"
EQC_ED_keep_to_what_works_desc:0 "##TODO, we don't have the luxury of fooling around with our limited resources, we should just stick to designs of aircraft we know work and won't fall after a few minutes in the air."

