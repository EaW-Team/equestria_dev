EQS_EQC_AF_dialogue_1: "That was certainly an interesting experience."
EQS_EQC_AF_dialogue_2: "Thanks to Discord for being such an awesome dungeon master!"
EQS_EQC_AF_dialogue_3: "A bit too good for my liking. It felt quite real at times."
EQS_EQC_AF_dialogue_4: "Discord always does it like that."
EQS_EQC_AF_dialogue_5: "Oh, what good is chaos magic if you don't have a little fun with it, am I right, amirite?"
EQS_EQC_AF_dialogue_6: "It was certainly much more impressive than what we had back in my school days."
EQS_EQC_AF_dialogue_7: "A real show, if I do say so myself."
EQS_EQC_AF_dialogue_8: "It was certainly an unexpected turn that Luna and I got to play the bad guys."
EQS_EQC_AF_dialogue_9: "And we absolutely crushed you."
EQS_EQC_AF_dialogue_10: "Not my fault how the dice decided."
EQS_EQC_AF_dialogue_11: "These fake teeth Discord gave my "Daybreaker" character made it quite difficult to speak properly."
EQS_EQC_AF_dialogue_12: "But you two had some exquisite outfits. "
EQS_EQC_AF_dialogue_13: "I took inspiration from a certain dream of Starlight Glimmer Twilight once told me about."
EQS_EQC_AF_dialogue_14: "I remember that, yes..."
EQS_EQC_AF_dialogue_15: "But Daybreaker and Nightmare Moon fighting would have been so predictable. I like to shake things up a little, you know?"
EQS_EQC_AF_dialogue_16: "No doubt. And as perhaps the only pony to study the rule book beforehoof..."
EQS_EQC_AF_dialogue_17: "You really did that?"
EQS_EQC_AF_dialogue_18: "...I can say you took some liberties with those as well."
EQS_EQC_AF_dialogue_19: "Everything for the right immersion. That's what makes me a good dungeon master."
EQS_EQC_AF_dialogue_20: "I think you are the best."
EQS_EQC_AF_dialogue_21: "You would also be a great party planner, Discord."
EQS_EQC_AF_dialogue_22: "So, when do we have a round two?"

EQS_EQC_AF_dialogue_skip: "Skip"
EQS_EQC_AF_dialogue_end: "Thanks for Playing!"
