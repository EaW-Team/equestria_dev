l_english:

## PARTIES ##
EQC_ED_party_long:0 "Party of the Sun and Moon"
EQC_ED_party:0 "PSM"

## FOCUS ##

EQC_ED_jet_set_new_job:0 "Jet Set's New Job"
EQC_ED_jet_set_new_job_desc:0 "##TODO, Jet Set finds himself in the position where he will need to serve the role of royal secretary to the two malevolent sisters, hopefully he can help in keeping the nation together."
EQC_ED_modify_the_congress:0 ""Adjust" The Congress"
EQC_ED_modify_the_congress_desc:0 "##TODO, the existing structure in New Mareland isn't completely unsalvageable, if we were to simply adjust some of the laws and get some of our own people into the congress we could make it work for us while keeping a simulacrum of public representation."
EQC_ED_disband_the_congress:0 "Disband The Congress"
EQC_ED_disband_the_congress_desc:0 "##TODO, playing politics are for creatures who lack the power to impose themselves, there is no need to keep the worthless structure of New Mareland around, the situation calls for something brand new, something way more direct."
EQC_ED_assemble_the_solarists:0 "Assemble The Solarists"
EQC_ED_assemble_the_solarists_desc:0 "##TODO, in order for this diarchy to work both sides need to be represented, as such we shall assemble the solarist elements within and beyond New Mareland with that goal in mind."
EQC_ED_convince_the_harmonists:0 ""Convince" The Harmonists"
EQC_ED_convince_the_harmonists_desc:0 "##TODO, in truth the harmonists aren't all bad, some of them could easily be brought to our side if we can convince them that harmony has simply been redefined due to the current situation. Of course, if they choose to refuse, we might have to apply some forceful corrections."
EQC_ED_theyve_outlived_their_purpose:0 "They've Outlived Their Purpose"
EQC_ED_theyve_outlived_their_purpose_desc:0 "##TODO, it is not the job of an alicorn to bow down to politicians and beg for their support, if they've chosen to oppose our rightful rule there simply isn't a place for them in this country anymore."
EQC_ED_approach_the_shadowbolts:0 "A Call To All Lunarists"
EQC_ED_approach_the_shadowbolts_desc:0 "##TODO, in the name of fair representation of both sides it is only just that the lunarists also approach and call for their supporters around the world. Only then will the sides be equal."
EQC_ED_follow_candy_garden:0 "Follow Cnady Garden's Idea"
EQC_ED_follow_candy_garden_desc:0 "##TODO, Candy Garden is a true solarist loyalist, but even then she still believes in a less extreme way of introducing Solarism and Daybreaker to the local population, it's still far from harmony, but would keep some unwanted zealotry at bay."
EQC_ED_call_over_arcane_nova:0 "Call Over Arcane Nova"
EQC_ED_call_over_arcane_nova_desc:0 "##TODO, Arcane Nova is the only one capable of instilling what we need into the population of New Mareland, even if might upset some we need her over here to do what needs to be done."
EQC_ED_install_loyal_governors:0 "Install Loyal Governors"
EQC_ED_install_loyal_governors_desc:0 "##TODO, our rule cannot continue until the local governors aren't replaced with ones that are of our liking, it's the only way to assure that our orders are followed."
EQC_ED_elevate_the_thestrals:0 "Elevate The Thestrals"
EQC_ED_elevate_the_thestrals_desc:0 "##TODO, the thestrals of New Mareland have not been treated the kindest, it is a true crime that they aren't fully integrated into the society of this land, but no longer shall that be the case, we will change this."
EQC_ED_the_shadow_works_concept:0 "The Shadow Works Concept"
EQC_ED_the_shadow_works_concept_desc:0 "##TODO, utilizing the contacts and wealth of the Shadowbolts we will be able to militarize and transform this nation into something truly great. Something that can carry out the journey we have ahead."
EQC_ED_silence_pickets_group:0 "Silence Picket's Group"
EQC_ED_silence_pickets_group_desc:0 "##TODO, Picket's segregationist views are of no use for us, specially when the situation calls for as many soldiers as possible, therefore we shall get rid of this problematic figure before he causes trouble for us with our griffon subjects."
EQC_ED_utilize_dews_loyalty:0 "Utilize Dew's Loyalty"
EQC_ED_utilize_dews_loyalty_desc:0 "##TODO, Evening Dew is a true zealot of the Nightmare, it would be a waste of a valuable asset to simply silence him. Sure, he does hold some views that could clash with some of the groups within our realm, but it is a worthy sacrifice."
EQC_ED_sideline_evening_dew:0 "Sideline Evening Dew"
EQC_ED_sideline_evening_dew_desc:0 "##TODO, Evening Dew might be a loyalist, but his views are simply too controversial with our griffon subjects, we cannot run the risk of angering them."
EQC_ED_griffons_are_ours_too:0 "The Griffons Are Ours Too"
EQC_ED_griffons_are_ours_too_desc:0 "##TODO, all of those living in these lands are our subjects, and the griffons are no different, there are ours to control and protect."
EQC_ED_big_sister:0 "A Page From Big Sister's Book"
EQC_ED_big_sister_desc:0 "##TODO, Maresoc's plans to transform New Mareland might not be the same as ours, but one cannot deny the ingenuity. With only a few modifications we could use this system for our own goals."
EQC_ED_coopt_equalist_ideals:0 "Coopt Equalist Ideals"
EQC_ED_coopt_equalist_ideals_desc:0 "##TODO, Equalism is nothing more than an overgrown mountain cult, but even then it has some interesting concepts someone could borrow from. It is true we need equality more than anything else, we need every single one of our subjects, regardless of race, to work together as one. Therefore, this could be a nice alternative."
EQC_ED_make_the_unions_bend:0 "Make The Unions Obey"
EQC_ED_make_the_unions_bend_desc:0 "##TODO, it is no use to play nice with the leftist movements of this country, if they want to continue existing then they simply will have to bow down to us, we shall run the unions and the syndicates and all they can do is accept."
EQC_ED_absorb_the_populists:0 "Absorb The Populists"
EQC_ED_absorb_the_populists_desc:0 "##TODO, the more non-aligned populist elements of the old state haven't put up much resistance against our rule, as such it wouldn't hurt to absorb these elements into the machinery of the new state."
EQC_ED_purge_the_dissenters:0 "Purge The Dissenters"
EQC_ED_purge_the_dissenters_desc:0 "##TODO, we've given the disloyal ones plenty of time to change their minds, at this point they've outlived our patience, it is time to purge these elements from our realm."
EQC_ED_no_place_for_disloyalty:0 "No Place For Disloyalty"
EQC_ED_no_place_for_disloyalty_desc:0 "##TODO, to obey Daybreaker and Nightmare Moon is not a choice, it is an order, and those who are unable to fulfill said order have no place in this great country. We shall make this very clear to our subjects."
EQC_ED_a_newer_mareland:0 "A Newer Mareland"
EQC_ED_a_newer_mareland_desc:0 "##TODO, New Mareland has been reforged into something that can truly be considered something to be proud of, gone are the days of softness and cowardice, and in is the time of strenght and loyalty."
EQC_ED_breaking_free_of_our_prison:0 "Breaking Free Of Our Prison"
EQC_ED_breaking_free_of_our_prison_desc:0 "##TODO, New Mareland has served us well, but it is time to look beyond this land. All of Griffonia lays before us, something we will need for our great return home. It is time to break free from this corner of the continent."
EQC_ED_send_the_economy_into_overdrive:0 "Send The Economy Into Overdrive"
EQC_ED_send_the_economy_into_overdrive_desc:0 "##TODO, even with our previous actions New Mareland still leaves much to be desired in terms of industry, it is time to change that."
EQC_ED_transform_civilian_buildings:0 "Transform Civilian Buildings"
EQC_ED_transform_civilian_buildings_desc:0 "##TODO, if a building within our realm does not serve a purporse we have the right to transform it into something useful, that is the cost of living under our great and benevolent rule."
EQC_ED_a_gun_for_every_blade_of_grass:0 "A Gun For Every Blade Of Grass"
EQC_ED_a_gun_for_every_blade_of_grass_desc:0 "##TODO, our subjects need to be armed to the teeth in order to protect their realm and overlords, the imperial army will not be left wanting anything."
EQC_ED_every_little_bit_counts:0 "Every Little Bit Counts"
EQC_ED_every_little_bit_counts_desc:0 "##TODO, even the smallest of contributions aid in the great effort ahead, we should inspire our subjects to push themselves to the limit in order to serve their nation. Even an extra minute of work could make the difference."
EQC_ED_the_imperial_research_institute:0 "Imperial Research Institute"
EQC_ED_the_imperial_research_institute_desc:0 "##TODO, no progress will be made if research stagnates, as such a new imperial research institute shall be founded in order to bring this realm into the future."
EQC_ED_the_magic_of_industry:0 "The Magic Of Industry"
EQC_ED_the_magic_of_industry_desc:0 "##TODO, one might think that there is nothing special in manufacturing, but it is what defines and makes a nation. In a way industry is a form of magic in itself in the way it can turn raw materials into something useful for the state."
EQC_ED_we_need_equipment_now:0 "We Need Equipment Now"
EQC_ED_we_need_equipment_now_desc:0 "##TODO, we do not have all the time in the world, we need equipment and we need it now, quality be damned."
EQC_ED_royal_standard:0 "Royal Standard"
EQC_ED_royal_standard_desc:0 "##TODO, we cannot allow stress and pressure to cloud our judgement, neither should we forsake the quality of our equipment just for short-term numbers. In fact we will raise the bar for production standards even more."
EQC_ED_industrial_heart_of_griffonia:0 "Industrial Heart Of Griffonia"
EQC_ED_industrial_heart_of_griffonia_desc:0 "##TODO, the transformation of our realm is something to be proud of, from a somewhat industrialized nation to a true industrial power in a short amount of time is no easy feat."
EQC_ED_every_creature_must_serve:0 "Every Creature Must Serve"
EQC_ED_every_creature_must_serve_desc:0 "##TODO, the only way to win against our enemies is with overwhelming numbers. We must focus on increasing our conscription efforts, even if it means compromising the quality of our training and easing entry requirements in order to achieve it."
EQC_ED_bet_on_elite_units:0 "Bet On Elite Units"
EQC_ED_bet_on_elite_units_desc:0 "##TODO, the reality of the situation is that our enemies sadly outnumber us when it comes to ponypower, as such we should focus on making our units the best trained they can possibly be, this way we can get the most of what we have."
EQC_ED_royal_bonds:0 "Issue Royal Bonds"
EQC_ED_royal_bonds_desc:0 "##TODO, despite all the transformations done to this land we still could use a little extra funding to aid in our efforts, new bonds shall be issued with this in mind."
EQC_ED_rip_and_tear:0 "Rip And Tear Until It's Done"
EQC_ED_rip_and_tear_desc:0 "##TODO, time is of the essence, we don't have the luxury to sit around all day and plan out every little battle, no, instead we shall apply brute force, with enough strenght anything can be won."
EQC_ED_meticulous_planning:0 "Meticulous Planning"
EQC_ED_meticulous_planning_desc:0 "##TODO, we won't win any wars by running in like barbarians and just expecting to be handed our victory, there is need for strategy, even if it means taking extra preparation time."
EQC_ED_destroying_the_shield:0 "Destroying The Shield"
EQC_ED_destroying_the_shield_desc:0 "##TODO, the first trot of many will soon be taken. The nations that border us might have a false sense of security due to their alliance, but it won't save them from our rightful expansion. Wingbardy and its allies shall fall."
EQC_ED_no_crown_but_our_own:0 "No Crowns But Our Own"
EQC_ED_no_crown_but_our_own_desc:0 "##TODO, there is simply no need to respect the "royal" titles of those we conquer, there are only two crowns in this world which are valid, the rest will be downgraded into subjects like any other."
EQC_ED_the_karthinian_conquest:0 "The Karthinian Conquest"
EQC_ED_the_karthinian_conquest_desc:0 "##TODO, the first domino in our inevitable road to greatness has fallen, now Wingbardy and its allies lay under our control, and the grand jewel of southern Griffoniu remains firmly in our grasp."
EQC_ED_divide_the_spoils:0 "Divide The Spoils"
EQC_ED_divide_the_spoils_desc:0 "##TODO, much has been gained in the way of wealth and land in our recent conquests, it only makes sense to trickle some of these resources down to our most loyal subjects in order to keep them necessarily content."
EQC_ED_demand_their_loyalty:0 "Demand Their Loyalty"
EQC_ED_demand_their_loyalty_desc:0 "##TODO, with the new lands come new subjects, and as such we must ensure that they know who are their true and only rulers."
EQC_ED_settling_on_a_new_faith:0 "Settling On A New Faith"
EQC_ED_settling_on_a_new_faith_desc:0 "##TODO, as the realm grows so does the question of what faith we wish to impose upon the residents of Griffonia, up until now things have been left quite unclear in order not to upset the balance of the diarchs, but it's time to finally settle on a real solution."
EQC_ED_pacify_lake_rumare:0 "Pacify Lake Rumare"
EQC_ED_pacify_lake_rumare_desc:0 "##TODO, Arantiga isn't a particularly impressive state in any way, even so it is still a necessary conquest in order to carry forth our plan."
EQC_ED_our_subjects_now_and_forever:0 "Our Subjects, Now And Forever"
EQC_ED_our_subjects_now_and_forever_desc:0 "##TODO, it shall be made abundantly clear that every single creature living under our banner is to be considered a subject of ours, subjects that we plan to fully integrate into the apparatus of our realm."
EQC_ED_a_stab_at_the_heart_of_griffonkind:0 "A Stab At The Heart Of Griffonkind"
EQC_ED_a_stab_at_the_heart_of_griffonkind_desc:0 "##TODO, taking Griffonstone might not seem important due to the lack of industry and resources, but it provides us with something that is even more valuable than those two, legitimacy. If we can dominate the old capital we will show our griffon subjects that we are the ones meant to rule them."
EQC_ED_topple_his_tomb:0 "Topple His Tomb"
EQC_ED_topple_his_tomb_desc:0 "##TODO, with Arantiga under our control we can finally destroy the tomb of a false heroe of griffonkind, the griffons shall only venerate us and us alone."
EQC_ED_destroy_heretical_sites:0 "Destroy Heretical Sites"
EQC_ED_destroy_heretical_sites_desc:0 "##TODO, as we push deeper into Griffonia it is inevitable that we will come across sites that worship false gods, it is our duty to destroy these as soon as the opportunity presents itself."
EQC_ED_pacify_the_east:0 "Prioritize The East"
EQC_ED_pacify_the_east_desc:0 "##TODO, as the rest of Griffonia allies to take us down we now have to plan our next steps carefully, a good strike into the east could be a good way to cut down their forces and give us more control over the southern coast."
EQC_ED_relics_of_grffonia:0 "The Relics Of Griffonia"
EQC_ED_relics_of_grffonia_desc:0 "##TODO, Griffonia is a continent that holds many riches and powerful relics we could use in our mission, it is only logical to pursue these."
EQC_ED_no_more_revolutions:0 "No More Revolutions"
EQC_ED_no_more_revolutions_desc:0 "##TODO, Aquileia stands as a formidable foe in our mission to pacify Griffonia, more attention needs to diverted to it as if we're able to knock them out the Griffonian alliance would take a massive blow to their strenght."
EQC_ED_they_might_have_their_uses:0 "They Might Have Their Uses"
EQC_ED_they_might_have_their_uses_desc:0 "##TODO, it is true that the bandits of Blackrock have sinned, but that does not mean we cannot give them a way to redeem themselves. In truth their skills could prove useful in order to promote chaos in nations that are currently resisting our conquests."
EQC_ED_death_to_bandits:0 "Death To Bandits"
EQC_ED_death_to_bandits_desc:0 "##TODO, there is no question about the fate of the criminals of these lands, their end will be swift and miserable, let it serve as an example to the others."
EQC_ED_bringing_order_to_evi:0 "Bringing Order To Evi"
EQC_ED_bringing_order_to_evi_desc:0 "##TODO, Evi is quite the promising front due to the favorable terrain there present. We should take advantage of this by attempting to quickly push into this area and bring order to the region."
EQC_ED_peripheral_no_longer:0 "Peripheral No Longer"
EQC_ED_peripheral_no_longer_desc:0 "##TODO, pushing into and securing the perifery is something of great importance if we wish to slay the major Griffonian powers as it opens the road to the north."
EQC_ED_bring_aquileian_ponies_into_the_fold:0 "Bring Aquileian Ponies Into The Fold"
EQC_ED_bring_aquileian_ponies_into_the_fold_desc:0 "##TODO, Aquileia had a sizeable population of ponies, it shouldn't be too hard to bring them to our side and integrate them into our forces as we now control the area."
EQC_ED_integrate_their_economy:0 "Integrate Their Economy"
EQC_ED_integrate_their_economy_desc:0 "##TODO, Aquileia's economy was quite bountiful, it certainly would help our war effort if we were to integrate sectors of their economy and industry into ours."
EQC_ED_rescue_the_posniaks:0 "Rescue The Posniaks"
EQC_ED_rescue_the_posniaks_desc:0 "##TODO, the Posniaks require our aid against those who wish to destroy them. It is of upmost urgency to make our way into the area and liberate these ponies from their fake masters."
EQC_ED_conquering_the_southern_coast:0 "Conquering The Southern Coast"
EQC_ED_conquering_the_southern_coast_desc:0 "##TODO, it is time to cut off the alliance's access to the southern coast permanently. Only with this will we be safe from possible naval attacks in the future."
EQC_ED_only_one_empire_can_stand:0 "Only One Empire Can Stand"
EQC_ED_only_one_empire_can_stand_desc:0 "##TODO, the Griffonian Empire remains as nothing more than a remimder of how fractured and weak griffonkind has become, if we can put them down for good it would prove once and for all that the alliance is doomed to fail as the main city of griffonkind falls under our control."
EQC_ED_dethrone_the_bankers:0 "Dethrone The Bankers"
EQC_ED_dethrone_the_bankers_desc:0 "##TODO, Skyfall is a true symbol of griffonian decadance and greed, to destroy the banks and dethrone their bankers would be a positive change to the entirety of the continent."
EQC_ED_make_them_bend_to_us:0 "Make Them Bend To Us"
EQC_ED_make_them_bend_to_us_desc:0 "##TODO, the price of our liberation is of eternal service to our great realm, with time the Posniaks will understand their place and they shall be grateful for it."
EQC_ED_erase_local_superstitions:0 "Erase Local Superstitions"
EQC_ED_erase_local_superstitions_desc:0 "##TODO, seems as if some Posniaks still wish to venerate false gods as they stick to their erroneous local fate. No matter, we will make sure to extinguish this heretical nonsense."
EQC_ED_last_days_of_the_federation:0 "Last Days Of The Federation"
EQC_ED_last_days_of_the_federation_desc:0 "##TODO, in another world the Federation could have proven to be a great ally in the conquest of Griffonia, but, sadly, they chose to aid in our planned destruction. As such we shall give to them what they tried to impose upon us, their end."
EQC_ED_yales_research:0 "Yale's Research"
EQC_ED_yales_research_desc:0 "##TODO, Yale proves itself to be a valuable asset as we take advantage of their research and universities."
EQC_ED_loot_the_imperial_palace:0 "Loot The Imperial Palace"
EQC_ED_loot_the_imperial_palace_desc:0 "##TODO, after a great battle and great reward should follow, and our reward comes in the shape of the defunct seat of power of the late Griffonian Empire."
EQC_ED_the_north_must_fall:0 "The North Must Fall"
EQC_ED_the_north_must_fall_desc:0 "##TODO, the republican and socialist threat calls the north of Griffonia its home, it is clear that we need to clear them out if we wish to secure our position."
EQC_ED_riding_down_the_hill:0 "Riding Down The Hill"
EQC_ED_riding_down_the_hill_desc:0 "##TODO, from all our foes the hillponies and the island bugs are by far the weakest, even so, in order to guarantee continental safety we will swiftly push into their lands."
EQC_ED_no_subject_is_for_sale:0 "No Subject Is For Sale"
EQC_ED_no_subject_is_for_sale_desc:0 "##TODO, no subject of ours shall be enslaved and sold like a cheap piece of merchandise, no one is allowed to take what is ours to command and protect."
EQC_ED_a_good_dog_is_a_loyal_dog:0 "A Good Dog Is A Loyal Dog"
EQC_ED_a_good_dog_is_a_loyal_dog_desc:0 "##TODO, the dogs of Bronzehill have proven themselves in the past as very loyal and skillful to those they served, we shall offer them the opportunity to declare their loyalty to us."
EQC_ED_secure_the_staging_ground:0 "Secure The Staging Ground"
EQC_ED_secure_the_staging_ground_desc:0 "##TODO, our future war with our traitorous homeland would be greatly aided if we had control over the islands under Haukland's criminal governance. It could prove to be a valuable asset."
EQC_ED_the_death_of_republicanism:0 "The Death Of Republicanism"
EQC_ED_the_death_of_republicanism_desc:0 "##TODO, the great disease of republicanism has finally been eradicated and purged from most of this continent. Some small groups might remain, but their struggle is worthless."
EQC_ED_death_of_the_undead:0 "Death Of The Undead"
EQC_ED_death_of_the_undead_desc:0 "##TODO, with most of Griffonia secured it is now time to bring down the vile league that still remains in the continent."
EQC_ED_knowledge_of_the_dead:0 "Knowledge Of The Dead"
EQC_ED_knowledge_of_the_dead_desc:0 "##TODO, the Dread League didn't have a lot of positives, but amongst the few it did their progress into certain fields of magic sure is impressive and useful to us."
EQC_ED_griffonia_united_under_the_twin_crowns:0 "Griffonia United Under The Twin Crowns"
EQC_ED_griffonia_united_under_the_twin_crowns_desc:0 "##TODO, after much struggle all of Griffonia now lies underneath our joint authority, only a few months remain before our final battle."
EQC_ED_arcturians_no_longer:0 "Arcturians No Longer"
EQC_ED_arcturians_no_longer_desc:0 "##TODO, the Arcturian Order was home to many brave and talented knights, we should extend a hoof to those who might be interested in serving our realm."
EQC_ED_preparations_for_the_homecoming:0 "Preparations For The Homecoming"
EQC_ED_preparations_for_the_homecoming_desc:0 "##TODO, the time for our great return is near, we cannot afford anything to go wrong, not now, not after everything we've been through. As such we should take our time to prepare so everything goes according to plan."
EQC_ED_secure_the_dragon_lands:0 "Slay The Dragon Lands"
EQC_ED_secure_the_dragon_lands_desc:0 "##TODO, the dragons will hardly prove themselves as a challenge to our army, as such it would be an easy conquest and an extra base near Equestria."
EQC_ED_contact_loyalists:0 "Contact Loyalists"
EQC_ED_contact_loyalists_desc:0 "##TODO, there are many within Equestria who still see us as the rightful rulers of the land, these assets will prove to be quite useful in the approaching war against the traitors."
EQC_ED_bolster_our_naval_capabilities:0 "Bolster Our Naval Capabilities"
EQC_ED_bolster_our_naval_capabilities_desc:0 "##TODO, our main adversary in our journey home is the ocean between Equus and Griffonia, it is crucial we find a way to dominate it, else we risk not being able to send supply and units from one continent to the other."
EQC_ED_promote_chaos:0 "Promote Chaos"
EQC_ED_promote_chaos_desc:0 "##TODO, as strong as it might seem Equestria still suffers from many issues that we are more than happy to utilize in the incoming battle. It wouldn't be hard to get a considerable amount of the population hooked on opium or to deepen racial/regional divides."
EQC_ED_around_the_clock:0 "Around The Clock"
EQC_ED_around_the_clock_desc:0 "##TODO, we cannot afford any laziness or "worker rights" at this point in time, we need everything ready to go for our final battle. And even after the war starts we will still need the workers to keep up the production of much needed equipment and supplies for our army. The people might not like it, but it is their duty to do as we say."
EQC_ED_taking_back_what_is_ours_by_right:0 "Taking Back What Is Ours By Right"
EQC_ED_taking_back_what_is_ours_by_right_desc:0 "##TODO, the moment has come and everything is in place, it is time to bring down the fraudulent powers of Equus, those who are keeping us from our rightful lands."
EQC_ED_after_the_dust_settles:0 "After The Dust Settles"
EQC_ED_after_the_dust_settles_desc:0 "##TODO, at no point was our inevtiable victory challenged in any way, it was the obvious conclusion. But now that we have won a uncomfortable question remains, what happens now that there's nothing uniting us?"
EQC_ED_what_we_do_best:0 "What We Do Best"
EQC_ED_what_we_do_best_desc:0 "##TODO, the nightmarists have develop quite the reputation for themselves as specially skilled spies and covert assets. It only makes sense to further develop these abilities and use them to better rule this realm."
EQC_ED_build_on_the_motherly_image:0 "Build On The Motherly Image"
EQC_ED_build_on_the_motherly_image_desc:0 "##TODO, instead of spying on our people we should attempt to create a positive image around ourselves, this way it will be more likely that they will obey our commands, while also opening the door for them to snitch on those who don't follow the dance."
EQC_ED_the_imperial_war_plan:0 "The Imperial War Plan"
EQC_ED_the_imperial_war_plan_desc:0 "##TODO, with the task of conquering Griffonia and later Equus in our way we should reform and transform the army accordingly. By the end of the plan the legions of New Mareland will no longer be recognizable just from how much they will change."
EQC_ED_locate_promising_mages:0 "Locate Promising Mages"
EQC_ED_locate_promising_mages_desc:0 "##TODO, the loss of Equestria does mean we lost access to most of the talented mages of ponykind, but it does not mean we cannot look for or make new ones to fill the gap."
EQC_ED_new_training_methods:0 "New Training Methods"
EQC_ED_new_training_methods_desc:0 "##TODO, warfare is something that constantly changes, specially with all the new technologies and strategies being developed in the last century, as such our training needs to adapt for the always mutating battlefield."
EQC_ED_followers_of_the_night:0 "Followers Of The Night"
EQC_ED_followers_of_the_night_desc:0 "##TODO, no one can deny that the forces of the moon are one of the better trained and prepared ones in this country, specially if compared to the solarist forces. As such we should give more attention to these forces if we hope to win the incoming battles."
