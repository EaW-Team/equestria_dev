# Weather magic (EQS)
EQS_weather_magic_category:0 "Weather Magic"
EQS_weather_magic_category_desc:0 "§4Weather manipulation§! is a core part of pegasi magic, and something ingrained in Equestrian culture since time immemorial. Usually, this magic is applied with extreme care to preserve harmony with nature, supporting ponies and animals alike. However, now that Equestria is facing such a dangerous foe, some of these old principals have gone out of the window...\n\nUse £weather_magic_texticon §4Weather Magic Capabilities§! to get §Ggeneral bonuses§!, or apply combat modifiers in certain states. Combat weather magic is however §Rnot a guaranteed success§!, but the §Gchance can be increased§! by §Yanti-air§!, §Yair superiority§!, and §Yhigh levels of radar technology§!.\n\nCurrent £weather_magic_texticon §4Weather Magic Capabilities§!: [?weather_pb_var|Y]\n\nCurrent £weather_magic_texticon §GWeather Magic Gain!: [?daily_weather_magic_gain|Y]"

