#### EVENTS

evildiarchy_newmareland.1.t:0 "An Unexpected Guest"
evildiarchy_newmareland.1.d:0 "It was quiet in Autumn Breeze’s office, only the occasional rustling of paper breaking the silence. The preparations for Operation Moonshine were in full swing, which required a truly staggering amount of paperwork for any hope of success. Agents had been placed in Equestria, contact networks had been established or reestablished, and a plan of action had received the approval of the legionary council. Still, there was much to be done.\n\nA sudden wind caused him to look up. In the middle of his office stood a hooded creature, having seemingly appeared out of nowhere. A black cloak made it impossible to say anything definite about it. He couldn’t deny a certain similarity with how foals’ stories depicted the grim reaper, but Autumn Breeze hadn’t become Warmaster to be spooked so easily.\n\n“What do you want?” he snarled. “And how did you get in? My office is not a public park for anypony to just wander in.”\n\nThe creature did not move, but gave a slow answer, as if trying not to reveal its true voice. “Your plan is doomed. Luna will not transform into your goddess by you having her bombed.” Autumn Breeze pinned his ears back, but the creature was unfazed. “I come to you with an offer. Take it, and Operation Moonshine will succeed.”\n\n“What do you offer, and what do you want for it?” the Warmaster replied, now also narrowing his eyes.\n\nThe creature chuckled darkly, before produced a little vial from under its hood, impressively without revealing even an inch of its foreleg. “It contains a magical substance that transforms any alicorn into its true, most powerful form. Use it wisely, for as you can see, there is not much of it.” After a short pause, it continued: “And for my price – it is not to be paid by you, or Chiropterra. Decide carefully. I believe in you. And now” – it dipped its head – “farewell.”\n\nBefore Autumn Breeze could reply anything further, the creature had placed the vial on his desk. He stood up to stop it, but by the time he had walked around his desk, the creature had already opened the door – silently – and disappeared from the office. He galloped out of the door and down the hallway, but it was nowhere to be found.\n\nNopony else had seen even a shadow of it, and so there was nothing left for him but to trot back into his office. The vial still lay on his desk, the essence in it shimmering in a sparkly bluish-violet tone."
evildiarchy_newmareland.1.a:0 "What are we to make of that?"

evildiarchy_newmareland.2.t:0 "A Change In Plans"
evildiarchy_newmareland.2.d:0 "The Legionary Council had been quick to approve the new plan. Too quick even, for Autumn Breeze’s mind. They had not seen the strange creature… Yet there was no denying that the new plan seemed remarkably more robust and less prone to random chance.\n\nHaving gotten a magic vial that could turn Luna back into Nightmare Moon, the rest was quite simple. The council had decided not to try and smuggle an agent into Canterlot castle – this would have been a bit too brazen, considering the number of mages present. Instead, the princess would be given a fake report calling her to New Mareland at the behest of the local thestrals. Then, an agent would sneak the magic potion into her drink, and soon enough, should the vial work, there would be one fewer princess and an more empress.\n\nThe contact network originally prepared for Operation Moonshine had made the fake report about New Mareland’s thestrals a straightforward task. This evening, Autumn Breeze would meet with the agent chosen for applying the magical potion. But as he went over the plan again and again, he could not deny a strange feeling. It was as if he and the council had overlooked something, but he could not put his hoof on it.\n\nThe magical vial still sat on his desk, the fluid in it shimmering in bluish-violet. As he looked closer, he could see little bright sparks swirling around in it. Who had brewed it? And who had the hooded creature really been? And most of all, would it do as promised?"
evildiarchy_newmareland.2.a:0 "And now we wait and hope."

evildiarchy_newmareland.3.t:0 "Troubles In New Mareland"
evildiarchy_newmareland.3.d:0 ""Luna, are you sure about this?" Celestia asked as she watched her sister pace about her quarters at the Canterlot palace, gradually packing her luggage.\n\n"I am most certain. The situation in New Mareland is far worse than I could have imagined," she replied without taking the time to look at Celestia. "The thestrals of New Mareland are facing a crisis unheard of. It is imperative I take a closer look at the situation and make a public appearance."\n\nLuna's words did nothing to quell Celestia's worries, however. While she had never had perfect oversight of New Mareland, she could not recall any incidents that may have hinted at the situation. There were very few thestrals present in New Mareland, after all, and many of the various historical elements that had caused friction in Equestria were entirely absent over there.\n\nOf course, Celestia was far from infallible, it would not be impossible for something like this to blindside. She had seen the report, and had little reason to doubt it. The source was trustworthy, and the facts laid out were reasonable, if surprising to her. Ignoring the situation may lead to a very grim outcome, and she understood Luna's insistence on making the trip. Still... Celestia had a bad feeling about it.\n\nShe sighed. "Luna, do you think you could postpone your trip for one more day?" Luna finally turned to look her in the eyes, equally confused and indignated. "I would like to come with you, but I need to set things up with Raven for my departure."\n\n"Really, sister?" Luna's eyes went wide. "Do you mean it?""
evildiarchy_newmareland.3.a:0 "And now we wait and hope."

evildiarchy_newmareland.4.t:0 "The Princesses Visit New Mareland"
evildiarchy_newmareland.4.d:0 "Incredible news have spread at lightning speed: Celestia and Luna, the ruling princesses of Equestria, will travel to New Mareland. As rumour has it, they had been called by the colonial government after a particularly damning concern about the situation of the thestrals in the Equestrian colony. The trip apparently is only planned to last a week, as certainly the presence of the two sisters would allow the situation to be quickly resolved. However, it is still the first time in known history that the two alicorns have left Equestria, and the first time they have set hoof in Griffonia."
evildiarchy_newmareland.4.a:0 "The princesses in New Mareland? I need to see this!"
evildiarchy_newmareland.4.b:0 "But what about Equestria?"
evildiarchy_newmareland.4.c:0 "Interesting, but ultimately not relevant."
evildiarchy_newmareland.4.e:0 "Wait, what? Who exactly has called them?"
evildiarchy_newmareland.4.f:0 "BOTH alicorns? But only Luna... I need to see this immediately!"
evildiarchy_newmareland.4.g:0 "That was not in the plan. Let's hope this goes well regardless."


