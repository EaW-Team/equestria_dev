ED_tree_of_harmony_magic_desc:0 "The famed Tree of Harmony is an ancient, magical tree located in the Everfree Forest. Planted when Equestria was formed, it is filled with magic from the deep belief of the ponies in the power of friendship. A while ago, the tree produced the Castle of Friendship for Twilight Sparkle, complete with the Cutie Mark Map – a map that would send the Mane Six on missions to restore friendship wherever it was threatened.\n\nNow, with an unprecedented crisis at hoof, the tree has once more reacted and provided a powerful shield to stop the evil alicorns from returning to Equestria. Yet, this is not all. The tree also gives the Mane Six with the power to spread harmony and gather friends, both inside and outside Equestria, to brace for the final storm...\n\nCurrent £GFX_magic_texticon Power of Friendship: §Y[?EQS_ED_friendship_power_current]/100§!\nWeekly gain: §Y[?EQS_ED_friendship_power_gain]§!"
