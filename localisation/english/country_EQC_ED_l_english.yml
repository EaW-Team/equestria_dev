evildiarchy_equestria.1.t:0 "Raven Inkwell Calls For Help"
evildiarchy_equestria.1.d:0 "The princess of friendship appeared in a flash of pink magic. "Raven! What happened? Celestia told me she and Luna would visit New Mareland for a week, and that you would run the castle for them until they were back. But now–I received your urgent message, so I came as fast as I could."\n\n"Twilight! Thank Celestia that you are here. Or maybe not… I don't know what to think anymore. This morning, I got a telegram from Jet Set – you know, the governor of New Mareland – and… Celestia and Luna… they aren't the same anymore! He says they have transformed… somehow… into Nightmare Moon and… Daybreaker?" Raven Inkwell's voice cracked as she was noticable shaking. Her usual bureaucratic stoicism completely broken, she cried, "What do we do now, Twilight?"\n\n"Nightmare Moon, you say? Luna has transformed again? How? And why? Nevermind, now is not the time to discuss this in detail. I will have to gather the elements of harmony. Together we have defeated Nightmare Moon once, together we can do it again!"\n\n"Wait!" Raven Inkwell shouted. "It's not just Nightmare Moon! Jet Set says that Celestia has changed as well. He didn't provide any details, but it appears that they both transformed, Celestia knows how!" She stopped in realisation. "I probably shouldn't say it like that."\n\n"They both transformed? That is concerning. I don't know how we are going to fix this if they have both gone mad. The elements of harmony can only deal with one! We need to figure out what just happened, and what they are up to now. It appears they've decided to stay in New Mareland for now? But I reckon that won't be for long, unfortunately." Twilight started to wander in circles. "Daybreaker… Daybreaker… where have I heard this name before? Maybe in some book? Would Starswirl the Bearded have known something about them?" She stopped suddenly, crashing into Raven. "No, what was I thinking? Daybreaker – Starlight Glimmer told me about her! The evil version of Celestia! I did not know that she was real." She turned around. "Raven, I need you to stay right here while I inform the elements. Don't tell anypony in the meantime. I'll be back as soon as possible.""
evildiarchy_equestria.1.a:0 "There was another flash of pink magic, and Raven Inkwell stood alone again."

evildiarchy_equestria.2.t:0 "The Cutie Map"
evildiarchy_equestria.2.d:0 "Just as Twilight Sparkle teleported back home, she felt her flank itching. She had experienced this often enough – it was the tree of harmony calling her. And apparently, she was not the only one, for as she reached the Cutie Map, she found the other five Elements of Harmony and Spike already waiting for her. Yet there was something strange about it: normally, the map would just tell them where the problem was, and perhaps who should be sent to help with it, yet this time the entirety of Equestria was glowing.\n\nApplejack pointed a hoof at the map: "Twilight, do you know what this is about? I was just arguing with Rainbow Dash, but that can't be right, can it? I mean, how does this tree expect us to save all of Equestria all at once? Not that we haven't done it before, but this map is the most useless thing I've seen in my life."\n\n"I can only guess. Just before this, Raven had called me over, and told me that Celestia and Luna... they have both transformed! Do you remember Starlight Glimmer and her nightmare? Where Celestia transformed into Daybreaker and fought Nightmare Moon? If Raven is right, all of Equestria is in danger, and perhaps that's the reason why the whole map is lighting up."\n\n"Well, but how do we fix this then? The tree could've lent us a hoof and at least told us where to start looking, couldn't it? Just lighting up everything doesn't seem all that useful in my eyes."\n\n"Now wait a second," Rainbow Dash interrupted. "Celestia and Luna both transformed into their evil counterparts and we haven't noticed a thing? How does that work? That should have been felt all over the country. And weren't they, like, fighting the whole time in Starlight Glimmer's dream? With Daybreaker being all arrogant and such?"\n\n"I don't know yet! Well, I know part of it. Celestia and Luna visited New Mareland, and Raven Inkwell got a telegram from their governor. I suppose we just haven't felt the magic because it was too far away. But that shouldn't take away from the danger, and the tree is also telling us that Equestria has a problem. For now, I need you all to come to Canterlot with me, because I can't leave Raven alone while we figure out a solution.""
evildiarchy_equestria.2.a:0 "Let's hope we can figure this out fast."

evildiarchy_equestria.3.t:0 "An Emergency Council"
evildiarchy_equestria.3.d:0 "The six Elements of Harmony, joined by Spike and a rather distressed Raven Inkwell, sat in the throne room of Canterlot castle. Until a moment ago, Rainbow Dash had lectured Raven about the awesomeness of the elements, seemingly in a vain attempt to calm down the unicorn, before Rarity had called her off.\n\n"So," began Spike, "I guess you are now the reigning Princess of Equestria, Twilight? Celestia and Luna have gone mad, Cadence and Flurry are over in the Crystal Empire, this leaves you as the only choice." Raven nodded slightly and bowed, even finding back to her bureaucratic attitude. The other five ponies followed suit.\n\n"Now's not the time for princesses, Spike!" Twilight replied. "And you five, you're my friends, you shouldn't bow to me at all! We have a friendship problem on our hooves. How could I sit here on this throne to rule Equestria? We need to get back to the tree of harmony to search for the meaning of the Cutie Map, and after that, we will need all the elements to turn Daybreaker and Nightmare Moon back into Celestia and Luna – assuming we can figure out how."\n\n"But you are the only alicorn who remains, darling," Rarity replied. "Who else would be able to govern Equestria? The ponies need a princess."\n\n"We need to solve this together. As friends! We six–" Spike audibly cleared his throat, "–seven will form an emergency council to rule Equestria. I have a bad feeling about this, but it might be needed. Raven, I still need your assistance more than anything else, because we six–I mean seven, will probably need to travel to faraway lands or whatever else is needed. Is that okay with you, Raven?" The unicorn nodded. "Then it's settled. We will prepare a radio address to the citizens of Equestria as soon as possible. Spike, can you do that?" The dragon saluted. "Raven and I will see if it's possible to get more information from Jet Set. And you five – running Equestria while we also go on our Cutie Mark mission will mean we need all the ponypower we can get, so please see where you can help out in government.""
evildiarchy_equestria.3.a:0 "Please let there not be a mass panic."

