#### EVENTS

evildiarchy_newmareland.1.t:0 "An Unexpected Guest"
evildiarchy_newmareland.1.d:0 "It was quiet in Autumn Breeze's office, only the occasional rustling of paper breaking the silence. The preparations for Operation Moonshine were in full swing, which required a truly staggering amount of paperwork for any hope of success. Agents had been placed in Equestria, contact networks had been established or reestablished, and a plan of action had received the approval of the legionary council. Still, there was much to be done.\n\nA sudden wind caused him to look up. In the middle of his office stood a hooded creature, having seemingly appeared out of nowhere. A black cloak made it impossible to say anything definite about it. He couldn't deny a certain similarity with how foals' stories depicted the grim reaper, but Autumn Breeze hadn't become Warmaster to be spooked so easily.\n\n"What do you want?" he snarled. "And how did you get in? My office is not a public park for anypony to just wander in."\n\nThe creature did not move, but gave a slow answer, as if trying not to reveal its true voice. "Your plan is doomed. Luna will not transform into your goddess by you having her bombed." Autumn Breeze pinned his ears back, but the creature was unfazed. "I come to you with an offer. Take it, and Operation Moonshine will succeed."\n\n"What do you offer, and what do you want for it?" the Warmaster replied, now also narrowing his eyes.\n\nThe creature chuckled darkly, before produced a little vial from under its hood, impressively without revealing even an inch of its foreleg. "It contains a magical substance that transforms any alicorn into its true, most powerful form. Use it wisely, for as you can see, there is not much of it." After a short pause, it continued: "And for my price – it is not to be paid by you, or Chiropterra. Decide carefully. I believe in you. And now" – it dipped its head – "farewell."\n\nBefore Autumn Breeze could reply anything further, the creature had placed the vial on his desk. He stood up to stop it, but by the time he had walked around his desk, the creature had already opened the door – silently – and disappeared from the office. He galloped out of the door and down the hallway, but it was nowhere to be found.\n\nNopony else had seen even a shadow of it, and so there was nothing left for him but to trot back into his office. The vial still lay on his desk, the essence in it shimmering in a sparkly bluish-violet tone."
evildiarchy_newmareland.1.a:0 "What are we to make of that?"

evildiarchy_newmareland.2.t:0 "A Change In Plans"
evildiarchy_newmareland.2.d:0 "The Legionary Council had been quick to approve the new plan. Too quick even, for Autumn Breeze's mind. They had not seen the strange creature... Yet there was no denying that the new plan seemed remarkably more robust and less prone to random chance.\n\nHaving gotten a magic vial that could turn Luna back into Nightmare Moon, the rest was quite simple. The council had decided not to try and smuggle an agent into Canterlot castle – this would have been a bit too brazen, considering the number of mages present. Instead, the princess would be given a fake report calling her to New Mareland at the behest of the local thestrals. Then, an agent would sneak the magic potion into her drink, and soon enough, should the vial work, there would be one fewer princess and an more empress.\n\nThe contact network originally prepared for Operation Moonshine had made the fake report about New Mareland's thestrals a straightforward task. This evening, Autumn Breeze would meet with the agent chosen for applying the magical potion. But as he went over the plan again and again, he could not deny a strange feeling. It was as if he and the council had overlooked something, but he could not put his hoof on it.\n\nThe magical vial still sat on his desk, the fluid in it shimmering in bluish-violet. As he looked closer, he could see little bright sparks swirling around in it. Who had brewed it? And who had the hooded creature really been? And most of all, would it do as promised?"
evildiarchy_newmareland.2.a:0 "And now we wait and hope."

evildiarchy_newmareland.3.t:0 "Troubles In New Mareland"
evildiarchy_newmareland.3.d:0 ""Luna, are you sure about this?" Celestia asked as she watched her sister pace about her quarters at the Canterlot palace, gradually packing her luggage.\n\n"I am most certain. The situation in New Mareland is far worse than I could have imagined," she replied without taking the time to look at Celestia. "The thestrals of New Mareland are facing a crisis unheard of. It is imperative I take a closer look at the situation and make a public appearance."\n\nLuna's words did nothing to quell Celestia's worries, however. While she had never had perfect oversight of New Mareland, she could not recall any incidents that may have hinted at such a dire situation. There were very few thestrals present in New Mareland, after all, and most of the various historical elements that had caused friction between tribes in Equestria were entirely absent over there.\n\nOf course, Celestia knew she was far from infallible, it would not be impossible for something like this to blindside her. She had seen the report, and had little reason to doubt its legitimacy: the source was trustworthy, and the facts laid out were reasonable, if surprising. Ignoring the situation may lead to a very grim outcome, and she understood Luna's insistence on making the trip. Still... Celestia had a bad feeling about it.\n\nShe sighed. "Luna, do you think you could postpone your trip for one more day?" Luna finally turned to look her in the eyes, equally confused and indignated. "I would like to come with you, but I need to set things up with Raven for my departure."\n\n"Really, sister?" Luna's eyes went wide. "Do you truly mean it?""
evildiarchy_newmareland.3.a:0 ""Of course. We need to tackle such matters together.""

evildiarchy_newmareland.4.t:0 "The Princesses Visit New Mareland"
evildiarchy_newmareland.4.d:0 "Incredible news have spread at lightning speed: Celestia and Luna, the ruling princesses of Equestria, will travel to New Mareland. As rumour has it, they had been called by the colonial government after a particularly damning concern about the situation of the thestrals in the Equestrian colony. The trip apparently is only planned to last a week, as certainly the presence of the two sisters would allow the situation to be quickly resolved. However, it is still the first time in known history that the two alicorns have left Equestria, and the first time they have set hoof in Griffonia."
evildiarchy_newmareland.4.a:0 "The princesses in New Mareland? I need to see this!"
evildiarchy_newmareland.4.b:0 "But what about Equestria?"
evildiarchy_newmareland.4.c:0 "Interesting, but ultimately not relevant."
evildiarchy_newmareland.4.e:0 "Wait, what? Who exactly has called them?"
evildiarchy_newmareland.4.f:0 "BOTH alicorns? But only Luna... I need to see this immediately!"
evildiarchy_newmareland.4.g:0 "That was not in the plan. Let's hope this goes well regardless."

evildiarchy_newmareland.5.t:0 "Spiked Tea"
evildiarchy_newmareland.5.d:0 "In the early morning following their arrival in New Mareland, Celestia and Luna requested to see Jet Set. To Luna's dismay, Jet Set proved completely ignorant of the situation described by the report Luna had read so often she knew it by heart. He knew nothing of any supposed confiscations or even lynchings committed against thestrals.\n\nIt had taken Celestia a lot of carefully chosen diplomatic words to keep her sister's temper under control until they could figure out what in Equestria — or rather, in New Mareland — was going on. After a very tense hour, it was decided the three of them would investigate the report's allegations themselves. While the main sentiment of their meeting was confusion, it also further stoked Celestia's worry.\n\nAfterwards, Celestia and Luna returned to the princess suite of their hotel, with the express goal in mind of winding down. Meanwhile, Jet Set would make room in his schedule for their investigation.\n\nLuna didn't join Celestia on the sofa, instead offering to make them some tea. When she came back and sat down across from Celestia at the low table, she sighed. "Good news, sister, they have coffee here." Meeting Celestia's squinting eyes, she smiled. "Worry not, I am still brewing tea for you."\n\n"I'll never understand how you can stomach that stuff, Luna." She chuckled. "But thank you for the tea." Luna only nodded in acknowledgement.\n\nMeanwhile, in the kitchen, a very confused thestral spy could not decide whether to empty the vial she had been given into the kettle or the Wingbardian coffee maker, both heating up on the stove. After an agonising minute of hesitation, she split the potion between the two, before disappearing into her hiding spot again.\n\nOnce the kettle began hissing, Celestia headed back into the kitchen to prepare her tea and pour Luna's coffee into a cup, before heading back to the sofa. Celestia's tea was a little sweeter than expected, but after a morning like this, she certainly did not mind. However, when Luna asked, "Sister, why did you add sugar? I told you I drink my coffee black." Before the implications could catch up with either of them, both froze up."
evildiarchy_newmareland.5.a:0 "The edges of their visions grew black."

evildiarchy_newmareland.6.t:0 "Ascension"
evildiarchy_newmareland.6.d:0 "Magical currents burst out from within Celestia and Luna, blinding white and jet black respectively, sweeping them off the ground and enveloping them in solid spheres. Over a few moments, Luna's coat turned midnight black as Celestia's mane caught fire, blazing in an aethereal wind.\n\nIt took but a few seconds for their innermost power to fully manifest, and the currents faded as quickly as they had surged. A moment later, Daybreaker's flame-shaped pupils met Nightmare Moon's slit ones. Both took a step back, lowering their horns while devastating power built at their tips.\n\n"You! What are you doing here?" shouted Nightmare Moon.\n\n"Ever the feisty one, are we?" Despite her mocking tone, Daybreaker remained on guard as she watched her nemesis for any sudden movements. "But to answer your question, I don't know. I don't suppose you have an idea of your own?"\n\n"I don't, and I am not going to fall for your tricks." Yet she did not strike first.\n\nDaybreaker rolled her eyes. "Oh please, Sister. We both know that if I wanted to destroy you, I could just do it. Unlike you, I don't need to play any stupid games."\n\nNightmare narrowed her eyes, baring her fangs, before realising there was some truth to these words. Daybreaker would have already attacked had that been her intent. In fact, Nightmare Moon had no reason to fight, either. "You are lucky I am willing to ignore that comment, for I too do not seek a pointless battle, but do not think for even a second I will let my guard down."\n\n"I wouldn't dream of it." Daybreaker smiled. "Oh, I'd never thought I'd enter a truce with you of all ponies, but this may just work.""
evildiarchy_newmareland.6.a:0 "Seems perhaps, they were better when on each other's side."

evildiarchy_newmareland.7.t:0 "Jet Set's New Job"
evildiarchy_newmareland.7.d:0 "For a good half minute, all Jet Set could do was stare at the two alicorns towering over. "How? When?" he finally managed to say.\n\n"We don't know," answered Nightmare Moon. "But the fact remains that have left our puny old selves behind and ascended into our true forms." Jet Set had no idea what to make of this, though him still being alive was probably a good sign overall.\n\n"And I bet you are wondering why we summoned you," Daybreaker said with a smirk. "Really, the answer is pretty simple." She let the statement hang in the air for a few moments, but was interrupted by Nightmare.\n\n"We require a secretary, for we are taking over the rulership of New Mareland." In Jet Set's mind, many questions formed at once. Why New Mareland? Why not go back to Equestria? Were they simply that power-hungry? His survival instinct, however, made him keep them to himself.\n\nMeanwhile, Daybreaker rolled her eyes as she glanced at her sister. "Did you have to ruin the moment?"\n\nNightmare glared in response. "I just do not think we have the need for any theatrics right now. We have a lot to do."\n\n"Remind me why I thought partnering up with you was a good idea, sister dear?" Daybreaker's voice dripped with sarcasm as she uttered these last words.\n\nGuided again by his survival instinct, Jet Set cleared his throat. "N-not to interrupt you t-two, but weren't you about to ask me to help you find a secretary?"\n\n"Oh, that," said Daybreaker, her smirk having returned. "I don't think that was the plan.""
evildiarchy_newmareland.7.a:0 ""You, Jet Set, you will be our secretary.""

evildiarchy_newmareland.8.t:0 "Congress "Remains""
evildiarchy_newmareland.8.d:0 "Today, the new congress members, chosen, of course, by the diarchs themselves, have been inaugurated. I know many of them, and that's why I'm so worried. Some are ponies too kind for this sort of position, ponies inclined to agree with just about anything. There's also a fair share of young, ambitious politicians among them, the kind that would make sure to always please their superiors. A few are very obviously corrupt. Even those who don't fall into one of these categories have too much to lose to risk openly opposing the sisters.\n\nPoliticians like these are generally inevitable, but what terrifies me is that the alicorns have replaced anypony even remotely willing to speak out against them with these yes-ponies who only exist to sign off whatever is put in front of them. The obvious silver lining is that congress still exists, and even if I doubt it'll be useful on its own, I need to cling to whatever hope I have. Even a dull tool can be sharpened, after all.\n\nOr at least that's what I've been trying to tell myself. It's a heavy blow to our democracy, and a grim reminder it will only get worse for now. These two are soaking up and centralising power at an alarming rate, and I have to deal with this delicate balancing act. If I go out of my way to slow one of the sisters, I also have to make a show of equally slowing down the other. And if I do it too much, they'll just get rid of me. How great..."
evildiarchy_newmareland.8.a:0 "With a sigh, Jet Set put down his quill and closed his journal."

evildiarchy_newmareland.9.t:0 "As If It Never Existed"
evildiarchy_newmareland.9.d:0 "[GetDateStringNoHourLong]\n\nIt actually happened. Every time I feel like I am more or less getting used to the situation, reality shakes the ground out from under my hooves. Today, congress was officially disbanded. I've known about this long before it actually happened. Tartarus, I've helped make it happen. Yet it didn't really, truly hit me until now.\n\nThroughout the entire process, I kept telling myself that congress wouldn't have been able to do much anyway, not with the sisters at the head of the state. Now that it's finally gone, that just feels like I was desperately trying my hardest to find a silver lining of sorts. The truth is, congress would at the very least have allowed us to give an appearance of stability or legitimacy.\n\nAs it stands, everyone now knows what these two really want. Ponies are scared, and scared ponies make selfish decisions. I really can't blame them, but I'm terrified of what will happen when everything starts collapsing. Worse yet, I'm not even worried for the ponies living their daily lives, at least not directly. I'm frankly just scared of what'll happen if the alicorns don't get their way. Does that make me callous? Do I really have the right to decide things like that?\n\nPart of me wants to say yes to that. After all, if the sisters blow us all up out of a petty squabble, the question of stability would become moot. But then, it doesn't really matter what I think. I'm powerless to stop them. I can only buy time for others to do so. If only these thoughts could stop keeping me awake at night..."
evildiarchy_newmareland.9.a:0 "With a sigh, Jet Set put down his quill and closed his journal."

evildiarchy_newmareland.10.t:0 "Strong Words"
evildiarchy_newmareland.10.d:0 ""You wanted to speak to me, your Highness?" Jet Set said after gently pushing open the door to Daybreaker's new office. He had a bad feeling about this. As usual.\n\n"Yes, I've come up with a plan to... deal with the local harmonists." Daybreaker let out a dark chuckle, making Jet Set's heart skip a beat.\n\nSurely she couldn't mean...? He reminded himself not to jump to conclusions and asked, "What did you have in mind?"\n\nDaybreaker grinned, obviously amused by his reaction. "I will talk to them. Personally." That... That was better than expected.\n\n"I'll try to schedule a meeting," he quickly said, as if afraid that she would change her mind if he hesitated. "Do you have a preference when?"\n\n"Oh." Her grin grew even wider. "I think around noon would be best. It'll help them understand exactly what they'll risk if they refuse to fall in line."\n\nOh, that was the catch, then. She would have them play their part or disappear for good. He shouldn't have expected anything less from an egocentric, all-powerful and malevolent alicorn."
evildiarchy_newmareland.10.a:0 ""Understood.""

evildiarchy_newmareland.11.t:0 "The Simplest Solution In The World"
evildiarchy_newmareland.11.d:0 ""One more thing, your Highness," said Jet Set, tapping the final item on his checklist. "The harmonist party has always had a strong presence in New Mareland." Presenting this as a neutral fact squeezed the pit of his stomach. "They are already starting to mount an opposition to—"\n\n"Oh, you don't need to worry about that. That matter has already been taken care of," Nightmare Moon answered matter-of-factly.\n\n"What... what do you mean?" He didn't want to hear the answer, but he knew he had to.\n\n"I meant to give you this task tomorrow, but since the topic has come up..." She opened one of her drawers, levitating out a folded sheet of paper, before floating it to him. It was a list of names alongside addresses. "I would like you deliver the news to these traitors' kin."\n\n"I... I see." Jet Set felt sick to his stomach, barely able to cling to a neutral expression. Why was he shocked? He'd known this would likely happen.\n\nNightmare chuckled darkly. "I suppose you could always bring them a cheese basket gift to soothe any protests." It took everything Jet Set had to not let her 'joke' into his mind's eye."
evildiarchy_newmareland.11.a:0 ""It will be done, your Highness.""

evildiarchy_newmareland.12.t:0 "A Moment Of Sanity"
evildiarchy_newmareland.12.d:0 "There was a knock on Jet Set's door. It was probably Candy Garden. "Come in." After he motioned towards the chair, putting away his paperwork. "I'm terribly sorry for arranging this meeting on such a short notice. Thanks again for making the time for me."\n\n"Oh, think nothing of it," she sat after sitting down. "It's already quite the honour that you'd consider my ideas for the army reforms."\n\n"Don't be so humble, miss Garden. I wouldn't have heard of them if ponies didn't say such good things about them." He gave her a genuine smile. "The more I hear about them, the more I want to learn. Often, the ponies who push the most radical ideas are the ones to gain notoriety. You, however, are willing to give to give reforms the time they need."\n\n"Oh, please, call me Candy." She proceeded to explain every step of her envisioned plan, and Jet Set occasionally chimed in to either correct a detail or offer a small suggestion, but he overall found that the army mare knew what she was talking about.\n\nHe didn't agree with the underlying idea, however, and it soon became clear why her ideas had even been an option for the diarchy. With every layer of reforms, the army would become more reliant on the central authority of the two sisters, as would society at large. Still, the gradual nature of her plan would at least give ponies time to adapt to the new status quo."
evildiarchy_newmareland.12.a:0 "It wasn't perfect, but it was a lot better than the alternative."

evildiarchy_newmareland.13.t:0 "A Moment Of Not Quite Sanity"
evildiarchy_newmareland.13.d:0 "When Arcane Nova walked into his office, Jet Set, knowing full well what was coming, had to hold back a sigh. Arcane Nova, if she noticed his annoyance, did not comment on it as she sat down in front of him. "Good day, Jet Set," she said, smirking.\n\n"Hello, Miss Nova. I believe you were informed of the reason you were called here?" He chose to cut straight to the topic, even if it was somewhat awkward to approach it like this. He normally preferred to keep an open mind and meet everypony with the same attitude, but he knew that this would be difficult, given what he had learned of her.\n\n"Of course. Her Divine Majesty Daybreaker has chosen me to oversee the reforms of her." Her smile drooped, turning into a grimace. "I will admit, though, that I'm more than a little displeased at having to work with the Nightmare and her lunatic cultists."\n\nJet Set sighed. At least she had saved him the trouble of bringing up her own biases. "Miss Nova, I understand you have your preferences with regards our two rulers, but please consider what... her Divine Majesty Daybreaker truly wants." He paused, meeting her intrigued expression. "She has chosen to collaborate with Nightmare Moon, and would thus prefer if you avoided sowing discord." These weren't quite Daybreaker's words, but this was the only way he could keep her in check.\n\nArcane, of course, made no effort to hide her annoyance. "Fine. I'll do my best to work with what I have." She rolled her eyes. "Even if that means tolerating nightmarists." Sighing, she leaned forward. "Anyway, I believe we have much to discuss."\n\nThough the rest of their conversation went as well as it could have, Jet Set couldn't help but worry about the future, for it soon became obvious her ideas, on their own, would only lead to instability."
evildiarchy_newmareland.13.a:0 "It seemed his damage control would be limited."

evildiarchy_newmareland.14.t:0 "The Charade Comes To An End"
evildiarchy_newmareland.14.d:0 "##TODO, event in which the fragile relationship between the sisters collapse and the administration goes along with it. The event doesn't show anything directly, but it suggests that their fighting might lead to the end of the world just by describing how heated things are becoming. The player's game ends here."
evildiarchy_newmareland.14.a:0 "If only things went differently."

evildiarchy_newmareland.15.t:0 "Good News For A Change"
evildiarchy_newmareland.15.d:0 "Jet Set sighed, a content smile on his face. Before him, a dozen guards were escorting Picket Fence — alongside his cronies — out of a building. His only regret was that he hadn't done this sooner. He hadn't pushed back against Picket Fence nearly as much as he should have, and neither had he done anything to curb the hatred directed at griffons that the party leader had ridden into his position.\n\nThen again, Jet Set's methods would have been a lot more subtle, and probably a lot less satisfying. Or perhaps, the added effort would have made the end result more satisfying.\n\nEither way, Picket Fence was finally no longer in a position of power of any kind, and for the first time, Jet Set was proud of what he was doing. He didn't have to convince himself he was doing the right thing; he simply knew it."
evildiarchy_newmareland.15.a:0 "Now, if only he didn't have to worry about a pair of crazy alicorns..."

evildiarchy_newmareland.16.t:0 "A Meeting With The "Prophet""
evildiarchy_newmareland.16.d:0 "It took a lot of restraint for Jet Set to not grit his teeth. "Mister Dew," said Jet Set. "I would appreciate it if you could stop dodging my questions and derailing this conversation so as to allow us to finally get to the point of our meeting." He had been trying to discuss the role Evening Dew, self-proclaimed prophet of Nightmare Moon, would be playing within the government, only to have each and every attempt deflected by some sort of anecdote, tangent, or unprompted rant.\n\nEvening Dew leaned forward, supporting his head on his hooves while a venomous smile spread on his lips. "To make myself clear, then, I refuse to discuss these matters with you, and I demand to see her Majesty Nightmare Moon."\n\nJet Set sighed, rubbing his temple. At least Dew had finally agreed to drop the charade. "Then I suppose I have not been clear enough either. Her Royal Majesty Nightmare Moon has appointed me as her secretary for her own set of reasons, and she has given me the task of formally recruiting you as a public speaker on her behalf." He paused, staring down the infuriating stallion. "And you can accept her decision, talk to me, and work for her, or not. The choice is yours."\n\nThat finally seemed to wipe that annoying grin off of Evening Dew's face. "Fine, if you're going to be that way. The Empress is bound to recognise the work I put in, so I know this won't be my only chance." Jet Set resisted the urge to roll his eyes, opening his mouth to respond, only to be cut off. "No, no, save yourself the trouble. I know what you want from me. After all, I've already been doing it."\n\n"Good, then let me give you two conditions." Evening Dew raised his brow. "First off, you need to remember that the Empress chose to align with Daybreaker, and that you shouldn't pick fights with them." Now, it was Dew's turn to roll his eyes, but he nodded nonetheless. "Furthermore, it would also be good if you could avoid antagonising the griffon population, and—"\n\n"Absolutely not. I can try to ignore solarist scum, but griffons are an enemy to all of ponykind, and both the Empress and the other alicorn know this.""
evildiarchy_newmareland.16.a:0 "Well, that would have been too much to ask for."

evildiarchy_newmareland.17.t:0 "Just As Expected"
evildiarchy_newmareland.17.d:0 "##TODO, some days after the choice to ally Dew has been made a new event will play in which it will describe how the choice might not have been that great. Namely brawls have been reported between griffon subjects and lunarist forces who have been listening to what Evening Dew has been putting out. Due to this Nightmare Moon herself had to get involved and drag him to a private room where she can decide upon her next step. Does she admit she was wrong and fire him or does she keep him around despite the danger?"
evildiarchy_newmareland.17.a:0 ""You need to go. For good.""
evildiarchy_newmareland.17.b:0 ""Don't mess up again or it will be the last time.""

evildiarchy_newmareland.18.t:0 "A Broken Clock"
evildiarchy_newmareland.18.d:0 "##TODO, Jet Set is tasked with the job of cutting Evening Dew off from all his sources of funding and power in the name of keeping the griffon subjects loyal. He does not mind carrying this out in the slightest, at least something slightly positive is being done for once, even if for all the wrong reasons."
evildiarchy_newmareland.18.a:0 "Better than the alternative."

evildiarchy_newmareland.19.t:0 "Learning From The Enemy"
evildiarchy_newmareland.19.d:0 "##TODO, Jet Set hadn't paid much attention to Maresoc back in the "normal" days of New Mareland, but now that he was tasked with setting up a meeting between this Big Sister and the diarchs he had to quickly become familiar with them. He is unable to find this pony, theorizing she might not really exist, so instead he invites some higher-ups of the party for the meeting in which they share their methods with the monarchs who in response allow these members to be integrated into the government as long as they swear loyalty to them. As expected the sisters were really interested in the spy and social control methods."
evildiarchy_newmareland.19.a:0 "This shall be useful."

evildiarchy_newmareland.20.t:0 "An Ideal Corrupted"
evildiarchy_newmareland.20.d:0 "##TODO, The meeting with Blueberry Frost was as intense as one could expect, but it was surprisingly fruitful. The mare personally might not have been too happy to work with the monarchs, but she knew she had to if she wanted her head to remain where it was. The idea was simple: "equalism" would be used to create an eternal united class in which all the people of the realm would belong to, one where mediocrity and compliance would be expected and race would be ignored. A cemented cast for all the populace, where they would only act and rise the ladder when instructed to."
evildiarchy_newmareland.20.a:0 "You will learn to like it."

evildiarchy_newmareland.21.t:0 "Know Your Place"
evildiarchy_newmareland.21.d:0 "##TODO, The diarchs decide that there is no need to meet with anyone or make any deals, instead they make Jet Set set up an event in which union leaders from all over New Mareland are forced to participate. The message of the diarchs is clear, either bend your head down and accept becoming state-owned or be "removed". There is no room for compromise or deals."
evildiarchy_newmareland.21.a:0 "No more of this socialism nonsense."

evildiarchy_newmareland.22.t:0 "The Remainder"
evildiarchy_newmareland.22.d:0 "##TODO, To Jet Set and the diarchs it is clear the Kingfisher is a republican, but even so he's also not dumb, therefore an agreement is reached where the remaining fence-sitting ponies are fully integrated into the government without any major punishments as long as the stallion is able to keep them under control and is able to keep his head down. He's also tasked with denouncing his own support of republicanism, which he does, even if against his wishes. This is all done in a meeting with Jet Set. It is very clear that the diarchs aren't becoming populists, more so that they're giving these ponies one last chance before being culled."
evildiarchy_newmareland.22.a:0 "Do what you're told and it will be fine."

evildiarchy_newmareland.23.t:0 "First Of Many Steps"
evildiarchy_newmareland.23.d:0 "##TODO, The monarchs present themselves to a crowd as they stand on a high balcony of what once was the seat of government of New Mareland, which has now been transformed into a prim and proper palace fit for empresses. The two get their own chance of speaking during the shared speech before they jointly announce their ambitions for Griffonia and beyond."
evildiarchy_newmareland.23.a:0 "This can't be good."

evildiarchy_newmareland.24.t:0 "Built For War"
evildiarchy_newmareland.24.d:0 "##TODO, This event is from the POV of an "average" pony in New Mareland, namely, a shadowbolt factory owner. Here they think to themselves about how things have drastically changed in just a few months. New Mareland was always somewhat industrialized, but it had become something even more than that, it felt like there were new factories popping up every other second, at this point factory owners were running out of people to hire. Even though this could be considered a positive the pony still worries that this ultra-industrialization will all come crashing down as soon as any tiny issue shows itself. For example, what will happen to the economy if a big war stagnates? Or what if, at some point, there are no new wars at all?"
evildiarchy_newmareland.24.a:0 "One can hope that everything goes to plan."

evildiarchy_newmareland.25.t:0 "The First Domino Falls"
evildiarchy_newmareland.25.d:0 "##TODO, The first great conquest has been achieved. Here we see Nightmare Moon and Daybreaker having a rare bonding moment as they jointly gloat about their conquest of the region. Jet Set is relieved to see them getting along for once and gets lured into a false sense of security that this state might just work after all. This perception gets shattered rather quickly as they start to claim their side was the one responsible for the victory after the friendly gloating gets out of hand."
evildiarchy_newmareland.25.a:0 "Griffonia should be worried."

evildiarchy_newmareland.26.t:0 "Reaching A Compromise"
evildiarchy_newmareland.26.d:0 "##TODO, The question of faith has been one haunting this diarchy since it first appeared. It is clear that there needs to be some unifying faith that helps to unite all the people in the continent, at least that was what Jet Set suggested to the diarchs. Neither was particularly happy about having to combine their religious movements but they saw no other way around it. In this event we see both of them trying to figure out the best way to do it, from symbolism to what exactly it means. They refused to get outside help for this, it's something they want to do on their own."
evildiarchy_newmareland.26.a:0 "Will this work?"

evildiarchy_newmareland.27.t:0 "Keeping An Eye"
evildiarchy_newmareland.27.d:0 "##TODO, Event based on NMM's idea, here it is decided to double-down on the spy operations against the citizenry of the country in order to keep any future "problems" at bay. Will include a scene in which a pony is being followed for the entire day, he tells this to people around him but they tell him he's imagining things due to them not wanting to be followed too. The pony ends up disappearing at the end of the event."
evildiarchy_newmareland.27.a:0 "Whatever it takes to keep them safe."

evildiarchy_newmareland.28.t:0 "Mothers Knows Best"
evildiarchy_newmareland.28.d:0 "##TODO, Instead of betting on increasing spy and intelligence assets the diarchs decide to go with Daybreaker's idea. Here the alicorns are presented as these motherly figures to the public, ones who only wish the best for their people, and, as such, the people should report anyone who wishes to harm or depose those who look out for them. The idea is to build this unhealthy relationship between the state and the citizens. Could include a scene where a foal reports their own brother to the state."
evildiarchy_newmareland.28.a:0 "They only want our best."

evildiarchy_newmareland.29.t:0 "As Best As It Can Get"
evildiarchy_newmareland.29.d:0 "##TODO, When deciding in which way to train the army New Mareland ends up going with Nightmare Moon's idea, that being to train the troops with "lunarist standards". That mainly means focusing on discipline and training, even if it means taking a lot longer to get ponies out in the field. Jet Set writes here in his journal that the troops seemed pretty good and professional, but that he couldn't help but feel like they would display his body in a public square if he ever messed up, that edge of zealotry and intensity was clearly there."
evildiarchy_newmareland.29.a:0 "Victory is near."

evildiarchy_newmareland.30.t:0 "The Will To Serve"
evildiarchy_newmareland.30.d:0 "##TODO, It is decided to adopt a more "solarist" way of training divisions, and by that it mostly means Daybreaker's idea of doubling down on the zealotry and unquestioning loyalty. Here Jet Set writes in his journal on how these new troops seemed pretty eager to do what needed to be done besides some minor setbacks with their less than clear state of mind. He could tell they lacked a bit of discipline by the way they stared at him with those death glares due to his close proximity with the alicorns the day he went to visit. It's as if they were both jealous and angry."
evildiarchy_newmareland.30.a:0 "Victory is the only option."

evildiarchy_newmareland.31.t:0 "True Friendship Has Never Been Tried"
evildiarchy_newmareland.31.d:0 "##TODO, Equestria was proving to be a big issue to the diarch's operation in Griffonia, and this fact was not helped by Equestria clearly having a moral and ideological edge over the alicorns. But this wouldn't stand. In a rare show of direct cooperation both Nightmare Moon and Daybreaker decide on redefining what friendship, the elements, and harmony really is, and after that's done they release their own version of the journal of friendship, one that is distributed to schools and libraries across the nation. This is also done to discredit the mane 6 back home, since it directly calls them out as being "fake" elements."
evildiarchy_newmareland.31.a:0 "War is your best friend."

evildiarchy_newmareland.32.t:0 "The Gathering Storm"
evildiarchy_newmareland.32.d:0 "##TODO, Based on the success of the destruction of the tomb and the need to impose the new faith in the newly conquered territories the alicorns decide that it is necessary to destroy all temples to other "gods" that are present in Griffonia. In this event both also publicly announce that it is now illegal to publicly be part of any faith but theirs. Jet Set just kind of sits there during the speech trying not to pass out over the instability this will cause. He knows that the rest of Griffonia will answer, and their answer won't be very nice or peaceful."
evildiarchy_newmareland.32.a:0 "Griffonia won't know peace."

evildiarchy_newmareland.33.t:0 "Back To Where We Belong"
evildiarchy_newmareland.33.d:0 "##TODO, New event that had to be added for lore reasons. Soon after appointing Jet Set as their secretary they immediately try to launch a "solo" invasion of Equestria to get back what's theirs, but they find themselves stopped by a magic shield apparently created by the tree of harmony that keeps the evil alicorns away from being able to return to Equus. Seems like they are truly stuck in Griffonia until they find enough magic to be able to defeat said shield. One of the alicorns suggests trying to gather artifacts from all over Griffonia and use their magic to destroy the shield. From then on the objective is clear, find as many artifacts as possible to bring down the shield and defeat the pretenders, along the way also solidify control over the continent to both reach the artifacts and to build a power base."
evildiarchy_newmareland.33.a:0 "Guess we should start looking."

evildiarchy_newmareland.34.t:0 "A Generous Offer"
evildiarchy_newmareland.34.d:0 "##TODO, The news that evening greatly surprised Jet Set, apparently Daybreaker convinced Nightmare Moon to pardon the criminals of Blackrock and beyond. Not only that but he was the one chosen to give these "great news" to the captured bandits, as well as their new job as the professional chaos-causers of the alicorns. When one of the bandits does not accept this he is promptly shot dead by one of the guards accompanying Jet Set. A quick reminder that their lives are still very much in danger."
evildiarchy_newmareland.34.a:0 "One you can't refuse."

evildiarchy_newmareland.35.t:0 "No Room For You"
evildiarchy_newmareland.35.d:0 "##TODO, Normally Jet Set wouldn't be all too thrilled to be present during a public execution, but today was one of the rare days in which he couldn't fully disagree with the choice of the alicorns. Not only did these bandits not deserve even a shred of justice but these killings might help with stability, even if barely. He recognizes that this might be a cope coming from him to justify what he is seeing, but there's nothing he can do about it now."
evildiarchy_newmareland.35.a:0 "Good riddance."

evildiarchy_newmareland.36.title:0 "The Pony-Worshipping Griffons"
evildiarchy_newmareland.36.desc:0 ""... are... are you?" The griffon stuttered as he stared at the towering black alicorn in front of him. Out here in Upper Cropperclaws, precious few came to visit the Polshava, and even fewer of what visitors they did get were anywhere near this important.\n\nNightmare Moon smirked, and nodded. "Yes, it is I, the rightful Empress of these lands!"\n\nThe Polshavan dropped to his knees, bowing deeply and flaring his wings. "O Lady Luna, She Who Dwells in Dreams, we welcome you back to this world!" His head was bowed so low he didn't notice as Nightmare Moon recoiled. "While the ponies of the Riverlands may have forgotten you, we here hold fast to the old ways, and to your memory!"\n\n"HA!" Daybreaker barked, laughing. "Do you hear that, Luna? They remember you!"\n\nNightmare Moon whirled on her sister. "YOU-"\n\n"L-Lady Celestia!" another griffon cried out, joining the first in bowing. "To what honor do we owe the visitation of The Sun Raiser to our humble village?"\n\nNow it was Daybreaker's turn to snarl as Nightmare Moon laughed. "Oh yes, do tell us, Celestia, why are we here?"\n\n"W-well," Daybreaker hissed, the corona of rage barely contained, "we heard there were griffons who worshipped pony gods nearby. We have arrived to ensure you worship the right ones."\n\n"She speaks true," Nightmare Moon smirked. "We have heard of your faithfullness, unique among the griffons, and have come to see for ourselves the truth of the matter. While the specifics may be a bit... outdated, we are happy to see that you revere your rightful goddesses." She glanced at Daybreaker. "Isn't that right, sister?"\n\nDaybreaker smirked."
evildiarchy_newmareland.36.a:0 ""Yes, of course, dear sister.""

evildiarchy_newmareland.37.t:0 "An Announcement"
evildiarchy_newmareland.37.d:0 "##TODO, After the capture of the Nimbusian and Diamond Dog territories the question of slavery was one that needed to be quickly solved. Jet Set expected the worse, something like the adoption of the practice which would have helped to destroy even the littlest bit of stability the realm still had, but, to this surprise, the alicorns put their hoof down during a speech in the old Nimbusian capital where they declared the permanent end of the practice. Just when he was developing a bit of hope they continued talking, saying how no one is allowed to enslave the diarch's subjects since they only belong to them, which quickly caused his smile to go away."
evildiarchy_newmareland.37.a:0 "It seemed good at first."

evildiarchy_newmareland.38.t:0 "Looking For A Birdie"
evildiarchy_newmareland.38.d:0 "##TODO, He wouldn't ever be caught saying this outloud, but the imperial palace was a sight to behold, or, well, it was, before the royal troops of the alicorns went in and fully looted the place like a bunch of bandits. The official justification was to look for artifacts and remaining imperial troops, but the real reason was clearly to humiliate the empire and to attempt to find the child emperor. This, thankfully, did not happen. Jet Set has no idea what the alicorns would do to the emperor if they ended up catching him, certainly nothing good, if he had to guess. In a way he was relieved that the child emperor escaped."
evildiarchy_newmareland.38.a:0 "At least one got away."

evildiarchy_newmareland.39.t:0 "The Fugitives"
evildiarchy_newmareland.39.d:0 "##TODO, Event in which Grover is being escorted by Benito through the tunnels under the palace in order to get him to safety. The royal guard was successful in avoiding the capture of the young emperor, and by the looks of it he will be able to make it out of the old capital with the boy."
evildiarchy_newmareland.39.a:0 "A tragedy prevented."

evildiarchy_newmareland.40.t:0 "Preparations for Homecoming"
evildiarchy_newmareland.40.d:0 "From across all Griffonia, the sound of hammers and machines could be hear smashing day and night. The roar of trucks, the whiste of trains, the thud of hooves and flutter of wings filled the air as millions of creatures and tens of millions of tonnes of supplies flowed westward. From [356.GetName] to Bakara, the peoples of Griffonia stand united behind a single banner. If only they were as united as their followers.\n\nDaybreaker swooped through the skies, her aura leaving a burning trail in her wake. In front of her stood the immense shield that protected Equestria from her rightful return. "I still believe we should land on the Griffish Isles and head ashore from there," she barked behind her. "There is no reason for us to drag this out!"\n\n"The Southeast will be far better!" Nightmare Moon shouted back, flying slightly behind as she gazed at the shield. "Already there exist plenty of loyalists in the region, and its poor infrastructure would make securing any beachhead easier against landbased attacks."\n\n"If any attacks come, we shall just burn them!" Daybreaker growled, firing off a spell into the sky for effect. "I don't see why we should waste any time heading for Canterlot! We defeat my impudent pupil, and we win!"\n\n"Sister, I've already told you, the Elements of-"\n\nEven as their forces prepared for the final showdown on the ground, the sisters continued to bicker in the skies."
evildiarchy_newmareland.40.a:0 "Can they ever get along...?"

evildiarchy_newmareland.41.t:0 "Contacting the Loyalists"
evildiarchy_newmareland.41.d:0 "Nascent Dream sighed as he looked at the radio. It had been years since his goddess had returned, and yet here he was, trapped underneath the shield away from her. Worse than that, he and his fellow thestrals had been called upon by the traitor Princess Twilight to prepare the fight against them. If it weren't for the fact that he had been a foal when the original call went out, he'd be across the sea right now, at his goddess' side.\n\nHe picked up the radio, its exterior a bit worn but still in good condition. It had belonged to his uncle, who had gifted it to him before he had departed for Griffonia. "Keep it safe," he had been told, "for one day it may once again come to life in the name of the Nightmare." But Dream had no illusions that would occur. The radio was only attuned to a certain bandwith, and it was unlikely anypony outside of Equestria still had them.\n\nDream sighed as he set it back down and stood, ready to leave his room. He had friends to meet, they were going drinking tonight, although he wasn't sure if it was for cider or "cider". Nevertheless, he-"
evildiarchy_newmareland.41.a:0 "The radio crackled to life with a voice he knew by heart."

evildiarchy_newmareland.42.t:0 "The Beginning Of The End"
evildiarchy_newmareland.42.d:0 "##TODO, It had been done, the entire continent was now united under the horned despots. Jet Set could barely believe that the nation had survived for long enough to do this, he had guessed everything would have collapsed back with the war against Wingbardy. The secretary was not celebrating, however, he was actually more nervous than ever. He doesn't know how long this state really has left, specially not with the invasion of Equus being all but assured, and it's not like he can say anything that would convince the diarchs against this, it had been the reason for this entire continental war, they wouldn't stop now. That being more than confirmed with the speech given this day by said despots."
evildiarchy_newmareland.42.a:0 "Soon nothing will stop them."

evildiarchy_newmareland.43.t:0 "The Time Comes"
evildiarchy_newmareland.43.d:0 "##TODO, The war against Equus has been officially declared, the alicorns take this moment for a public speech in which both boast about returning home and how the fraudulent elements of harmony and the traitors won't be able to survive the storm that is coming. They call upon every loyal creature in Equus to rise up and join their side if they wish to be spared. The magic of the artefacts is finally used to destroy the shield."
evildiarchy_newmareland.43.a:0 "It's now or never."

evildiarchy_newmareland.44.t:0 "What To Do With Them"
evildiarchy_newmareland.44.d:0 "##TODO, Event where the evil diarchs have the mane six on their complete mercy within Canterlot castle. At first there's some disagreements on what to do with them, killing them is obviously out of the question due to some small remaining affection for them. So they decide on something more merciful. They will send the mane six (and spike) to a nice trip in a polar bear village, if they can convince those polar bears of their version of friendship and harmony they will be allowed to leave and the diarchs will even step down. Safe to say they know it will never happen."
evildiarchy_newmareland.44.a:0 "Have fun!"

evildiarchy_newmareland.45.t:0 "Never Again"
evildiarchy_newmareland.45.d:0 "##TODO, The diarchs come to give the tree of harmony a visit while keeping some distance just in case. Their plan is simple, the tree must be completely destroyed to safeguard their rule. But, during the entire event they try and fail to take it down, to the point they just give up at the end, saying they will come back some other day."
evildiarchy_newmareland.45.a:0 "Don't tell anyone about this."

evildiarchy_newmareland.46.t:0 "Consequences"
evildiarchy_newmareland.46.d:0 "##TODO, The diarchs find out about Jet Set's collaboration with Equestrian during and before the war, helping to undermine their rule with the help of Canterlot. They decide this little stallion needs to be punished, but they go against an execution. Instead they take the Canterlot elite stallion and drop him in a rural farm area of the country, telling the farmers to not let him leave, and to make him work the land. Jet Set is NOT happy about this."
evildiarchy_newmareland.46.a:0 "He will survive."

evildiarchy_newmareland.47.t:0 "The Ultimate Conclusion"
evildiarchy_newmareland.47.d:0 "##TODO, After the conquest of Equus and the immediate matters being handled the diarchs are now left with a simple conclusion, they have no more reason to work together. They decide to meet out on an empty field, where they note how it was an entertaining experience, but they have grown tired of the balancing act. In something that could be misconstrued as respect the two decide to have one final battle, one which is sure to end everything."
evildiarchy_newmareland.47.a:0 "Will the world survive?"

evildiarchy_random.1.t:0 "The New Meta?"
evildiarchy_random.1.d:0 ""...sister, just what in name of the eldila is THIS?" Nightmare Moon asked, deadfaced. "To me, this seems like a waste of resources. Valuable resources." Her voice almost snapped on the last two words, yet she was a master of holding her tongue.\n\n"Why, dear sister, it's the new meta!" Daybreaker smirked as she sauntered up to the vehicle in front of them. "This right here is a MKIII Killbauer ATV-AC, with 30mm armor and a Bellimer machine gun mounted on top. Not to mention," she smacked the roof of the car, "this bad boy can fit so many ponies in it."\n\nNightmare Moon's still-unimpressed gaze slid over. "...and the rocket artillery?"\n\n"Patented 12 tube Baskerville Mobile Rocket Platforms!" Daybreaker's smirk widened. "When mixed with the Killbauers, they'll be able to provide infantry armored mobility while terrifying enemy infantry. The sheer amount of damage they'll be able to do against soft targets will be devastating!"\n\n"This seems like it would have awfully low organization," Nightmare Moon muttered. "Not to mention the industrial cost..."\n\n"That's your problem, sister!" Daybreaker shook her head. "You think too much in terms of spreadsheets. Sometimes the best template doesn't come from number crunching, but from unexpected sources!" She threw Jet Set a sly smile. "What is your opinion, dear secretary of ours?"\n\nJet Set's face paled as the gaze of both alicorns burned into him."
evildiarchy_random.1.a:0 "M-maybe it will be good...?"
evildiarchy_random.1.b:0 "W-we should wait for further data..."

evildiarchy_random.2.t:0 "Uniforms"
evildiarchy_random.2.d:0 ""ROYAL SECRETARY!" Jet Set sighed internally as Daybreaker smashed through the door to his office. "I am in need of your services!"\n\n"Now hold it, sister!" He winced as he heard Nightmare Moon barrel through the ceiling, now floating a handful of inches off his desk. "We agreed we would approach him together!"\n\n"Yes, yes," Daybreaker waved her hoof, "I know. The important matter is that he look at these." She pulled out two sets of uniforms, holding them up with magic. "We know you consider yourself quite the fashionista, so we decided to have you settle a... disagreement between us."\n\n"The one on the left is my design," Nightmare Moon grunted, floating over to her sister's side, "the garish one on the right hers. Choose wisely, Secretary."\n\n"W-well," Jet Set had seen calmer days... "w-what am I judging them on? Function, form, or both?"\n\n"Fuction!" "Form!" The two alicorns spoke together, then looked at each other. "No, function!" "No, form!" They growled in unison. "We've been over this! It's more important for the uniform to-"\n\nJet Set sat back, thinking about his life as he vaguely kept track of both of their bickering. How had things ended this way, with two walking apocalypses making him their chew toy? More than that, how was he here right now, listening to them argue about a damned uniform? He snapped back into focus, realizing he had almost missed the end of their argument. He quickly went over what he had heard in his head. Form to instill terror in the enemies, fervor in friendlies, and awe in civvies, versus function for camouflage and, well, function. There were plenty of jabs back and forth about style, but...\n\n"Well, Secretary?" The alicorns' simultaneous callout shattered his daydream. "Which do you prefer?"\n\nEven with the situation, Jet Set couldn't help but smile internally at the proof that despite everything, the two god-like beings in front of him were still sisters."
evildiarchy_random.2.a:0 "Daybreaker's looks better."
evildiarchy_random.2.b:0 "I prefer Nightmare Moon's."

evildiarchy_random.3.t:0 "Eternal Night"
evildiarchy_random.3.d:0 "The police stations were inundated with panicked calls, generals begging anypony in the government for an update, and meteorologists were positively frantic as they tried to understand how this would affect their forecasts. Even though it was only 14:55, the sky outside was black as night.\n\n"MY SUBJECTS!" Nightmare Moon roared to a crowd of thestrals in front of the [356.GetName] Opera House, "I have finally fulfilled my promise a thousand years in the making! For too long have the faithful been made to hide in the shadows, to wither in caves as the ungrateful creatures of the world basked in the sun! Now is the time for the creatures of the night to reign! Now is the time for those who remember their true goddess to thrive! I hereby announce that the night will last forever!"\n\nJet Set felt his knees go weak as he heard the alicorn's boast, struggling to remain on his hooves. It wasn't a long one, as his vision soon began to go black. As he began to pass out, he thought he saw Nightmare Moon look at him with concern, but that coul-\n\nBefore he could finish the thought, his body hit the pavement with a thud."
evildiarchy_random.3.a:0 "This won't end well."

evildiarchy_random.4.t:0 "Calming Tensions"
evildiarchy_random.4.d:0 ""Sister, care to explain the PITCH BLACK SKY?!" Daybreaker's voice roared as she flew through the window of Jet Set's office, shattering it again. "Why have you failed to hold up your end of our bargain?"\n\n"Excuse you?" Nightmare Moon hissed, looking up from the tax documents she had been lovingly examining. "This is my right! As the proper goddess of this world-"\n\n"You will lower the moon this instant, LUNA!" Daybreaker snapped. "I thought you had matured, but clearly you haven't!"\n\n"That is not my name, Celestia!" Nightmare Moon snapped back, baring her fangs. "You think yourself better? You are naught but-"\n\n"P-please," Jet Set stuttered, drawing both alicorns' glares to him, "y-your Majesties, r-remember why you agreed to work together. F-fighting like this weakens your ability to return to Equus!"\n\nA snarl grew on Nightmare Moon's face. "You dare interrupt us, and to tell us what to do? Why you impudent whelp, you forget-"\n\n"He's right, sister," Daybreaker spoke through gritted teeth. "We must work together, for now, so that we may return to Equestria."\n\nNightmare Moon's eyes narrowed at Jet Set for a brief second, nearly causing him to faint again, before she huffed and turned away.\n\n"Very well. If it is for us to return to our rightful place, I may be able to temporarily postpone the eternal night." She glared at Daybreaker as the moon slowly drifted back beneath the horizon. "Happy, sister?"\n\nJet Set watched as Daybreaker gave an affirmative answer and turned, shattering a new hole in his office wall as she left. He slumped into his chair, trying to steady his racing heart."
evildiarchy_random.4.a:0 "It... worked?"

evildiarchy_random.5.t:0 "The Great Statue"
evildiarchy_random.5.d:0 "##TODO, Nightmare Moon and Daybreaker are grumpy to reveal to their subjects the construction of a grand statue in the capital of "New Mareland", the construction had been happening in secret and now it had been completed. The statue in question is covered by a big piece of fabric and it's clearly made out of solid gold judging by the bits that stick out, it seems they will reveal it soon. Now the question is, who does this statue depict? It is clear it only depicts one of them by the way they keep eyeing each other with those very friendly gazes. Either way it will cost the coffers a pretty penny."
evildiarchy_random.5.a:0 "A grand statue of Daybreaker"
evildiarchy_random.5.b:0 "A beautiful statue of Nightmare Moon."

evildiarchy_random.6.t:0 "The Best Tank Division Ever Made"
evildiarchy_random.6.d:0 ""BEHOLD!" Jet Set recoiled as a tank slammed through the office wall, Nightmare Moon atop it. "Royal Secretary, THIS is my latest masterpiece!"\n\nJet Set stared, dumbfounded. No, the tank wasn't being held up by magic... Wasn't his office on the fourth floor? He carefully looked around it, and, yes, it was partially suspended in mid-air. Unsupported.\n\n"SECRETARY!" Nightmare Moon laughed maniacally. "I knew you had a good eye! Can't help but look over the results of MY genius? This tank right here is the PK-FHxGVI Armored Assault Tank-NMM! Coming with 250mm armor, a 130mm gun, and the strongest engine this side of a naval vessel, it is guaranteed to be the premier threat on the battlefield! I have already showed it off to the generals, and they have had nothing but glowing praise!" She stared at Jet Set, a surprisingly genuine smile on her face. "Tell me, what do you think?"\n\n"...how did you get it up here?"\n\n"The alicorn does not concern herself with the opinion of physics!" Nightmare Moon huffed. "Just tell me what you think about it! I plan on rolling an entire division's worth out soon, so make sure your answer is quick!"\n\nThe door to the office suddenly opened. "Secretary," the voice of a drowsy Daybreaker came from behind, "I had something I wanted to- GOOD GRACIOUS ME, WHAT IS GOING ON IN HERE?"\n\nJet Set turned, spotting the alicorn, cup of tea in hoof, staring at the tank. The look threw him for a loop, and his brain froze. "...Aurora Borealis?"\n\n"A-Aurora Borealis? At this time of year, in this part of the Empire, manifesting in the form of a tank?!?"\n\n"...yes."\n\nDaybreaker looked back and forth between Nightmare Moon and Jet Set before sighing and sipping her tea. "This is beyond stupid. Sister, get rid of that thing, I can hear the engine breaking down already."\n\n"Sister, I believe it is not you who gets to decide that!" Nightmare Moon growled. "In matters of disagreement, it is our Royal Secretary who decides!"\n\n"Yes," Daybreaker threw a look at Jet Set, "and I'm certain he knows which is best. Isn't that right, Royal Secretary?"\n\nJet Set swallowed as the gaze of both alicorns burrowed into him."
evildiarchy_random.6.a:0 "It looks... Amazing."
evildiarchy_random.6.b:0 "Maybe let's not."

evildiarchy_random.7.t:0 "Name Question"
evildiarchy_random.7.d:0 ""The name has a clear bias towards you, sister!" Nightmare Moon snapped as she paced around Jet Set's office, bathed in pale moonlight shining through the suspiciously Nightmare Moon-shaped hole in the wall. "As it always is! You even try to claim the sea as your own!"\n\n"The name is just paying homage to its rightful ruler!" Daybreaker snapped back. "And that ruler is me!"\n\n"Oh please, enough with your narcissism!" Nightmare Moon's wings flared, horn glowing ominously. "I swear, you behave like a spoiled filly, always demanding what other colts have because you're just a precocious little bi-"\n\n"Y-your Majesties," Jet Set forced out, barely keeping from cowering behind his desk. "I-if I may speak?"\n\n"Do so," Nightmare Moon hissed, "before I teach a certain pony what it's like stepping in Sister's hooves."\n\n"T-the name Sunset comes from the founder of the town, Sunset Horizon," Jet Set stammered. "Additionally, I believe it works well a sign of the unity between you two. A beautiful meeting of day and night, showcasing the potential you two have when you work in har- unison."\n\nNightmare Moon leaned back, considering. "... I can see why we made you our secretary. You are quite the clever pony."\n\n"Thank you, your Majesty, but I assure you, I am not a clever pony."\n\n"And humble, too!" Daybreaker laughed. "Very well, we shall have a more... proper discussion over the name. Do you have any problems with that, sister?"\n\nNightmare moon smirked. "None at all.""
evildiarchy_random.7.a:0 "Midnight is a good name."
evildiarchy_random.7.b:0 "The name is fine as is."

evildiarchy_random.8.t:0 "Student Of My Own"
evildiarchy_random.8.d:0 ""Sister, Royal Secretary," Nightmare Moon's voice filled the air of their weekly "strategy session" in Jet Set's office. In actuality it was the sisters' tea time, a habbit that had carried over from their previous selves they hadn't quite seemed to shake. Yet. "I have been thinking, and I believe it is high time that I take on a pupil of my own."\n\n"A... student?" Daybreaker looked over her cup. "Surely you have better things to worry about. I hear the factories are falling short of their quotas."\n\n"Jet Set can deal with that in the interim," Nightmare Moon waved her hoof dismissively. "But what cannot wait is righting a most grievous of wrongs. You have Twilight Sparkle as your student, rebellious as she may be right now, it is only fair that I have a student of my own as well."\n\n"A fair point..." Daybreaker nodded. "I can understand wanting what I have. You often do." She smirked at the snarl that briefly popped up on Nightmare Moon's face.\n\nJet Set looked back and forth frantically. "Do you at know who you want?" he spoke up, trying to ease the tension\n\n"Oh I do indeed," Nightmare Moon bared her fangs. "You see, I've done some digging, and it appears that a friend of my sister's precious pupil moved to New Mareland before our emergence. Named Moon Dancer, she is quite the learned pony. While her magic seems to be somewhat lacking, she has a strong grasp on theory, and I'm certain I can train her into being a fine unicorn."\n\n"Oh, that's clever!" Daybreaker chuckled. "Let me guess, she'll also be a hostage?"\n\n"Perish the thought!" Nightmare Moon cackled. "She shall clearly be my pupil of her own choice."\n\nDaybreaker reared back and laughed. "Oh fine, sister! Go have your fun! I look forward to seeing if your pupil will ever come close to the heights of mine! I'll be gracious, if she becomes the equal of Sunset Shimmer, I'll consider you the victor!"\n\nJet Set watched as the two alicorns burst into a fit of giggling, a sinking feeling in his chest."
evildiarchy_random.8.a:0 "Poor mare."

evildiarchy_newmareland.nmm_reset_1.t: "Nightmare Moon Rejects Command"
evildiarchy_newmareland.nmm_reset_1.d: "Nightmare Moon has abandoned her post as leader of an army, stating that it is a waste of her time and that her superior skills could be put to better use leading an army group."
evildiarchy_newmareland.nmm_reset_1.a: "Oh."

