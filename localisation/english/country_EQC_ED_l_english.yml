#### EVENTS

evildiarchy_newmareland.1.t:0 "An Unexpected Guest"
evildiarchy_newmareland.1.d:0 "It was quiet in Autumn Breeze's office, only the occasional rustling of paper breaking the silence. The preparations for Operation Moonshine were in full swing, which required a truly staggering amount of paperwork for any hope of success. Agents had been placed in Equestria, contact networks had been established or reestablished, and a plan of action had received the approval of the legionary council. Still, there was much to be done.\n\nA sudden wind caused him to look up. In the middle of his office stood a hooded creature, having seemingly appeared out of nowhere. A black cloak made it impossible to say anything definite about it. He couldn't deny a certain similarity with how foals' stories depicted the grim reaper, but Autumn Breeze hadn't become Warmaster to be spooked so easily.\n\n"What do you want?" he snarled. "And how did you get in? My office is not a public park for anypony to just wander in."\n\nThe creature did not move, but gave a slow answer, as if trying not to reveal its true voice. "Your plan is doomed. Luna will not transform into your goddess by you having her bombed." Autumn Breeze pinned his ears back, but the creature was unfazed. "I come to you with an offer. Take it, and Operation Moonshine will succeed."\n\n"What do you offer, and what do you want for it?" the Warmaster replied, now also narrowing his eyes.\n\nThe creature chuckled darkly, before produced a little vial from under its hood, impressively without revealing even an inch of its foreleg. "It contains a magical substance that transforms any alicorn into its true, most powerful form. Use it wisely, for as you can see, there is not much of it." After a short pause, it continued: "And for my price – it is not to be paid by you, or Chiropterra. Decide carefully. I believe in you. And now" – it dipped its head – "farewell."\n\nBefore Autumn Breeze could reply anything further, the creature had placed the vial on his desk. He stood up to stop it, but by the time he had walked around his desk, the creature had already opened the door – silently – and disappeared from the office. He galloped out of the door and down the hallway, but it was nowhere to be found.\n\nNopony else had seen even a shadow of it, and so there was nothing left for him but to trot back into his office. The vial still lay on his desk, the essence in it shimmering in a sparkly bluish-violet tone."
evildiarchy_newmareland.1.a:0 "What are we to make of that?"

evildiarchy_newmareland.2.t:0 "A Change In Plans"
evildiarchy_newmareland.2.d:0 "The Legionary Council had been quick to approve the new plan. Too quick even, for Autumn Breeze's mind. They had not seen the strange creature... Yet there was no denying that the new plan seemed remarkably more robust and less prone to random chance.\n\nHaving gotten a magic vial that could turn Luna back into Nightmare Moon, the rest was quite simple. The council had decided not to try and smuggle an agent into Canterlot castle – this would have been a bit too brazen, considering the number of mages present. Instead, the princess would be given a fake report calling her to New Mareland at the behest of the local thestrals. Then, an agent would sneak the magic potion into her drink, and soon enough, should the vial work, there would be one fewer princess and an more empress.\n\nThe contact network originally prepared for Operation Moonshine had made the fake report about New Mareland's thestrals a straightforward task. This evening, Autumn Breeze would meet with the agent chosen for applying the magical potion. But as he went over the plan again and again, he could not deny a strange feeling. It was as if he and the council had overlooked something, but he could not put his hoof on it.\n\nThe magical vial still sat on his desk, the fluid in it shimmering in bluish-violet. As he looked closer, he could see little bright sparks swirling around in it. Who had brewed it? And who had the hooded creature really been? And most of all, would it do as promised?"
evildiarchy_newmareland.2.a:0 "And now we wait and hope."

evildiarchy_newmareland.3.t:0 "Troubles In New Mareland"
evildiarchy_newmareland.3.d:0 ""Luna, are you sure about this?" Celestia asked as she watched her sister pace about her quarters at the Canterlot palace, gradually packing her luggage.\n\n"I am most certain. The situation in New Mareland is far worse than I could have imagined," she replied without taking the time to look at Celestia. "The thestrals of New Mareland are facing a crisis unheard of. It is imperative I take a closer look at the situation and make a public appearance."\n\nLuna's words did nothing to quell Celestia's worries, however. While she had never had perfect oversight of New Mareland, she could not recall any incidents that may have hinted at the situation. There were very few thestrals present in New Mareland, after all, and many of the various historical elements that had caused friction in Equestria were entirely absent over there.\n\nOf course, Celestia was far from infallible, it would not be impossible for something like this to blindside. She had seen the report, and had little reason to doubt it. The source was trustworthy, and the facts laid out were reasonable, if surprising to her. Ignoring the situation may lead to a very grim outcome, and she understood Luna's insistence on making the trip. Still... Celestia had a bad feeling about it.\n\nShe sighed. "Luna, do you think you could postpone your trip for one more day?" Luna finally turned to look her in the eyes, equally confused and indignated. "I would like to come with you, but I need to set things up with Raven for my departure."\n\n"Really, sister?" Luna's eyes went wide. "Do you mean it?""
evildiarchy_newmareland.3.a:0 "Of course. We need to tackle such matters together."

evildiarchy_newmareland.4.t:0 "The Princesses Visit New Mareland"
evildiarchy_newmareland.4.d:0 "Incredible news have spread at lightning speed: Celestia and Luna, the ruling princesses of Equestria, will travel to New Mareland. As rumour has it, they had been called by the colonial government after a particularly damning concern about the situation of the thestrals in the Equestrian colony. The trip apparently is only planned to last a week, as certainly the presence of the two sisters would allow the situation to be quickly resolved. However, it is still the first time in known history that the two alicorns have left Equestria, and the first time they have set hoof in Griffonia."
evildiarchy_newmareland.4.a:0 "The princesses in New Mareland? I need to see this!"
evildiarchy_newmareland.4.b:0 "But what about Equestria?"
evildiarchy_newmareland.4.c:0 "Interesting, but ultimately not relevant."
evildiarchy_newmareland.4.e:0 "Wait, what? Who exactly has called them?"
evildiarchy_newmareland.4.f:0 "BOTH alicorns? But only Luna... I need to see this immediately!"
evildiarchy_newmareland.4.g:0 "That was not in the plan. Let's hope this goes well regardless."

evildiarchy_newmareland.5.t:0 "Spiked Tea"
evildiarchy_newmareland.5.d:0 "In the early morning following their arrival in New Mareland, Celestia and Luna requested to see Jet Set. To Luna's dismay, Jet Set proved completely ignorant of the situation described by the report Luna had read so often she knew it by heart. He knew nothing of any supposed confiscations or even lynchings committed against thestrals.\n\nIt had taken Celestia a lot of carefully chosen diplomatic words to keep her sister's temper under control until they could figure out what in Equestria — or rather, in New Mareland — was going on. After a very tense hour, it was decided the three of them would investigate the report's allegations themselves. While the main sentiment of their meeting was confusion, it also further stoked Celestia's worry.\n\nAfterwards, Celestia and Luna returned to the princess suite of their hotel, with the express goal in mind of winding down. Meanwhile, Jet Set would make room in his schedule for their investigation.\n\nLuna didn't join Celestia on the sofa, instead offering to make them some tea. When she came back and sat down across from Celestia at the low table, she sighed. "Good news, sister, they have coffee here." Meeting Celestia's squinting eyes, she smiled. "Worry not, I am still brewing tea for you."\n\n"I'll never understand how you can stomach that stuff, Luna." She chuckled. "But thank you for the tea." Luna only nodded in acknowledgement.\n\nMeanwhile, in the kitchen, a very confused thestral spy could not decide whether to empty the vial she had been given into the kettle or the Wingbardian coffee maker, both heating up on the stove. After an agonising minute of hesitation, she split the potion between the two, before disappearing into her hiding spot again.\n\nOnce the kettle began hissing, Celestia headed back into the kitchen to prepare her tea and pour Luna's coffee into a cup, before heading back to the sofa. Celestia's tea was a little sweeter than expected, but after a morning like this, she certainly did not mind. However, when Luna asked, "Sister, why did you add sugar? I told you I drink my coffee black." Before the implications could catch up with either of them, both froze up."
evildiarchy_newmareland.5.a:0 "The edges of their visions grew black."

evildiarchy_newmareland.6.t:0 "Ascension"
evildiarchy_newmareland.6.d:0 "Magical currents burst out from within Celestia and Luna, blinding white and jet black respectively,  sweeping them off the ground and enveloping them in solid spheres. Over a few moments, Luna's coat turned midnight black as Celestia's mane caught fire, blazing in an aethereal wind.\n\nIt took but a few seconds for their innermost power to fully manifest, and the currents faded as quickly as they had surged. A moment later, Daybreaker's flame-shaped pupils met Nightmare Moon's slit ones. Both took a step back, lowering their horns while devastating power built at their tips.\n\n"You! What are you doing here?" shouted Nightmare Moon.\n\n"Ever the feisty one, are we?" Despite her mocking tone, Daybreaker remained on guard as she watched her nemesis for any sudden movements. "But to answer your question, I don't know. I don't suppose you have an idea of your own?"\n\n"I don't, and I am not going to fall for your tricks." Yet she did not strike first.\n\nDaybreaker rolled her eyes. "Oh please, Sister. We both know that if I wanted to destroy you, I could just do it. Unlike you, I don't need to play any stupid games."\n\nNightmare narrowed her eyes, baring her fangs, before realising there was some truth to these words. Daybreaker would have already attacked had that been her intent. In fact, Nightmare Moon had no reason to fight, either. "You are lucky I am willing to ignore that comment, for I too do not seek a pointless battle, but do not think for even a second I will let my guard down."\n\n"I wouldn't dream of it." Daybreaker smiled. "Oh, I'd never thought I'd enter a truce with you of all ponies, but this may just work.""
evildiarchy_newmareland.6.a:0 "Seems perhaps, they were better when on each other's side."

evildiarchy_newmareland.7.t:0 "Jet Set's New Job"
evildiarchy_newmareland.7.d:0 "For a good half minute, all Jet Set could do was stare at the two alicorns towering over him. "How? When?" he finally said.\n\n"We don't know why," answered Nightmare Moon. "But we have left our puny selves behind to ascend into our true forms." Jet Set had no idea what to make of this, though him still being alive was probably a good sign.\n\n"And I bet you are wondering why we demanded to talk to you," Daybreaker said with a smirk. "Really, the answer is pretty simple." She let the statement hang in the air for a few moments, but was interrupted by Nightmare.\n\n"We require a secretary, for we are taking over the rulership of New Mareland." In Jet Set's mind, many questions formed at once. Why New Mareland? Couldn't they go back to Equestria? His survival instinct, however, made him keep them to himself.\n\nMeanwhile, Daybreaker rolled her eyes as she glanced as her sister. "Did you have to ruin the moment?"\n\nNightmare glared in response. "I just do not think we have the need for any theatrics right now. We have a lot to do."\n\n"Remind me why I thought partnering up with you was a good idea, sister dear?" Daybreaker's voice dripped with sarcasm as she uttered these last words.\n\nGuided again by his survival instinct, Jet Set cleared his throat. "N-not to interrupt you t-two, but weren't you about to ask me to help you find a secretary?"\n\n"Oh, that," said Daybreaker, her smirk having returned to her. "I don't think that was the plan.""
evildiarchy_newmareland.7.a:0 ""You, Jet Set, you will be our secretary.""

evildiarchy_newmareland.8.t:0 "Congress "Remains""
evildiarchy_newmareland.8.d:0 "Today, the new congress members, chosen by diarchs themselves, have been inaugurated. I know many of them, and that's exactly what worries me. Some are ponies too kind for this sort of position, ponies inclined to agree with just about anything. There's also a fair share of young, ambitious politicians among them, the kind that would make sure to always please their superiors. A few are very obviously corrupt. Most, however, have too much to lose to risk openly opposing the sisters.\n\nPoliticians like these are generally inevitable, but what terrifies me is that the sisters have replaced anypony even remotely willing to speak out against them with these yes-ponies who only exist to sign off whatever the sisters decide on. The obvious silver lining, of course, is that congress still exists. I doubt it'll be useful on its own, but I need to cling to whatever hope I have. Even a dull tool can be sharpened, after all.\n\nOr at least that's what I've been trying to tell myself. It's... it's a heavy blow that our country has taken, and a grim reminder it will only get worse for now. These two are soaking up power at an alarming rate, and I cannot slow one down without equally slowing down the other, or I risk breaking the delicate balance."
evildiarchy_newmareland.8.a:0 "With a sigh, Jet Set put down his quill and closed his journal."

evildiarchy_newmareland.9.t:0 "As If It Never Existed"
evildiarchy_newmareland.9.d:0 "It actually happened. Every time I feel like I am more or less getting used to the situation, reality shakes the ground under my hooves. Today, congress was officially disbanded. I've known about this long before it actually happened. Tartarus, I've helped make it happen. Yet it didn't really, truly hit me until now.\n\nThroughout the entire process, I kept telling myself that congress wouldn't have been able to do much anyway, not with the sisters at the head of the state, but now that it's gone, that just feels like I was desperately trying to find a silver lining of sorts. The truth is, congress would at the very least have allowed us to give an appearance of stability or legitimacy.\n\nAs it stands, everyone now knows what these two really want. Ponies are scared, and scared ponies make selfish decisions. I really can't blame them, but I'm terrified of what will happen when everything starts collapsing. Worse yet, I'm not even worried for the ponies living their daily lives, at least not directly. I'm frankly just scared of what'll happen if the alicorns don't get things their way. Does that make me callous? Do I really have the right to decide things like that?\n\nPart of me wants to say yes. After all, if the sisters blow us all up out of a petty squabble, the question of stability would become moot. Then again, it doesn't really matter what I think. I cannot stop them. I can merely buy time for others to stop them. If only these thoughts would stop tormenting me like this."
evildiarchy_newmareland.9.a:0 "With a sigh, Jet Set put down his quill and closed his journal."

evildiarchy_newmareland.10.t:0 "Strong Words"
evildiarchy_newmareland.10.d:0 ""You wanted to speak to me, your Highness?" Jet Set said after gently pushing open the door to Daybreaker's new office. He had a bad feeling about this. As usual.\n\n"Yes, I've come up with a plan to... deal with the local harmonists." Daybreaker let out a dark chuckle, making Jet Set's heart skip a beat.\n\nSurely she couldn't mean...? He reminded himself not to jump to conclusions and asked, "What did you have in mind?"\n\nDaybreaker grinned, obviously amused by his reaction. "I will talk to them. Personally." That... That was better than expected.\n\n"I'll try to schedule a meeting," he quickly said, as if afraid that she would change her mind if he hesitated. "Do you have a preference when?"\n\n"Oh." Her grin grew even wider. "I think around noon would be best. It'll help them understand exactly what they'll risk if they refuse to fall in line."\n\nOh, that was the catch, then. She would have them play their part or disappear for good. He shouldn't have expected anything less from an egocentric, all-powerful and malevolent alicorn."
evildiarchy_newmareland.10.a:0 ""Understood.""

evildiarchy_newmareland.11.t:0 "The Solution Solution In The World"
evildiarchy_newmareland.11.d:0 ""One more thing, your Highness," said Jet Set, tapping the final item on his checklist. "The harmonist party has always had a strong presence in New Mareland." Presenting this as a neutral fact squeezed the pit of his stomach. "They are already starting to mount an opposition to—"\n\n"Oh, you don't need to worry about that. That matter has already been taken care of," Nightmare Moon answered matter-of-factly.\n\n"What... what do you mean?" He didn't want to hear the answer, but he knew he had to.\n\n"I meant to give you this task tomorrow, but since the topic has come up..." She opened one of her drawers, levitating out a folded sheet of paper, before floating it to him. It was a list of names alongside addresses. "I would like you deliver the news to these traitors' kin."\n\n"I... I see." Jet Set felt sick to his stomach, barely able to cling to a neutral expression. Why was he shocked? He'd known this would likely happen.\n\nNightmare chuckled darkly. "I suppose you could always bring them a cheese basket gift to soothe any protests." It took everything Jet Set had to not let her 'joke' into his mind's eye."
evildiarchy_newmareland.11.a:0 ""It will be done, your Highness.""

evildiarchy_newmareland.12.t:0 "A Moment Of Sanity"
evildiarchy_newmareland.12.d:0 "There was a knock on Jet Set's door. It was probably Candy Garden. "Come in." After he motioned towards the chair, putting away his paperwork. "I'm terribly sorry for arranging this meeting on such a short notice. Thanks again for making the time for me."\n\n"Oh, think nothing of it," she sat after sitting down. "It's already quite the honour that you'd consider my ideas for the army reforms."\n\n"Don't be so humble, miss Garden. I wouldn't have heard of them if ponies didn't say such good things about them." He gave her a genuine smile. "The more I hear about them, the more I want to learn. Often, the ponies who push the most radical ideas are the ones to gain notoriety. You, however, are willing to give to give reforms the time they need."\n\n"Oh, please, call me Candy." She proceeded to explain every step of her envisioned plan, and Jet Set occasionally chimed in to either correct a detail or offer a small suggestion, but he overall found that the army mare knew what she was talking about.\n\nHe didn't agree with the underlying idea, however, and it soon became clear why her ideas had even been an option for the diarchy. With every layer of reforms, the army would become more reliant on the central authority of the two sisters, as would society at large. Still, the gradual nature of her plan would at least give ponies time to adapt to the new status quo."
evildiarchy_newmareland.12.a:0 "It wasn't perfect, but it was a lot better than the alternative."

evildiarchy_newmareland.13.t:0 "A Moment Of Not Quite Sanity"
evildiarchy_newmareland.13.d:0 "When Arcane Nova walked into his office, Jet Set, knowing full well what was coming, had to hold back a sigh. Arcane Nova, if she noticed his annoyance, did not comment on it as she sat down in front of him. "Good day, Jet Set," she said, smirking.\n\n"Hello, Miss Nova. I believe you were informed of the reason you were called here?" He chose to cut straight to the topic, even if it was somewhat awkward to approach it like this. He normally preferred to keep an open mind and meet everypony with the same attitude, but he knew that this would be difficult, given what he had learned of her.\n\n"Of course. Her Divine Majesty Daybreaker has chosen me to oversee the reforms of her." Her smile drooped, turning into a grimace. "I will admit, though, that I'm more than a little displeased at having to work with the Nightmare and her lunatic cultists."\n\nJet Set sighed. At least she had saved him the trouble of bringing up her own biases. "Miss Nova, I understand you have your preferences with regards our two rulers, but please consider what... her Divine Majesty Daybreaker truly wants." He paused, meeting her intrigued expression. "She has chosen to collaborate with Nightmare Moon, and would thus prefer if you avoided sowing discord." These weren't quite Daybreaker's words, but this was the only way he could keep her in check.\n\nArcane, of course, made no effort to hide her annoyance. "Fine. I'll do my best to work with what I have." She rolled her eyes. "Even if that means tolerating nightmarists." Sighing, she leaned forward. "Anyway, I believe we have much to discuss."\n\nThough the rest of their conversation went as well as it could have, Jet Set couldn't help but worry about the future, for it soon became obvious her ideas, on their own, would only lead to instability."
evildiarchy_newmareland.13.a:0 "It seemed his damage control would be limited."

evildiarchy_newmareland.14.t:0 "The Charade Comes To An End"
evildiarchy_newmareland.14.d:0 "##TODO, event in which the fragile relationship between the sisters collapse and the administration goes along with it. The event doesn't show anything directly, but it suggests that their fighting might lead to the end of the world just by describing how heated things are becoming. The player's game ends here."
evildiarchy_newmareland.14.a:0 "If only things went differently."

evildiarchy_newmareland.15.t:0 "Good News For A Change"
evildiarchy_newmareland.15.d:0 "Jet Set sighed, a content smile on his face. Before him, a dozen guards were escorting Picket Fence — alongside his cronies — out of a building. His only regret was that he hadn't done this sooner. He hadn't pushed back against Picket Fence nearly as much as he should have, and neither had he done anything to curb the hatred directed at griffons that the party leader had ridden into his position.\n\nThen again, Jet Set's methods would have been a lot more subtle, and probably a lot less satisfying. Or perhaps, the added effort would have made the end result more satisfying.\n\nEither way, Picket Fence was finally no longer in a position of power of any kind, and for the first time, Jet Set was proud of what he was doing. He didn't have to convince himself he was doing the right thing; he simply knew it."
evildiarchy_newmareland.15.a:0 "Now, if only he didn't have to worry about a pair of crazy alicorns..."

evildiarchy_newmareland.16.t:0 "A Meeting With The "Prophet""
evildiarchy_newmareland.16.d:0 "It took a lot of restraint for Jet Set to not grit his teeth. "Mister Dew," said Jet Set. "I would appreciate it if you could stop dodging my questions and derailing this conversation so as to allow us to finally get to the point of our meeting." He had been trying to discuss the role Evening Dew, self-proclaimed prophet of Nightmare Moon, would be playing within the government, only to have each and every attempt deflected by some sort of anecdote, tangent, or unprompted rant.\n\nEvening Dew leaned forward, supporting his head on his hooves while a venomous smile spread on his lips. "To make myself clear, then, I refuse to discuss these matters with you, and I demand to see her Majesty Nightmare Moon."\n\nJet Set sighed, rubbing his temple. At least Dew had finally agreed to drop the charade. "Then I suppose I have not been clear enough either. Her Royal Majesty Nightmare Moon has appointed me as her secretary for her own set of reasons, and she has given me the task of formally recruiting you as a public speaker on her behalf." He paused, staring down the infuriating stallion. "And you can accept her decision, talk to me, and work for her, or not. The choice is yours."\n\nThat finally seemed to wipe that annoying grin off of Evening Dew's face. "Fine, if you're going to be that way. The Empress is bound to recognise the work I put in, so I know this won't be my only chance." Jet Set resisted the urge to roll his eyes, opening his mouth to respond, only to be cut off. "No, no, save yourself the trouble. I know what you want from me. After all, I've already been doing it."\n\n"Good, then let me give you two conditions." Evening Dew raised his brow. "First off, you need to remember that the Empress chose to align with Daybreaker, and that you shouldn't pick fights with them." Now, it was Dew's turn to roll his eyes, but he nodded nonetheless. "Furthermore, it would also be good if you could avoid antagonising the griffon population, and—"\n\n"Absolutely not. I can try to ignore solarist scum, but griffons are an enemy to all of ponykind, and both the Empress and the other alicorn know this.""
evildiarchy_newmareland.16.a:0 "Well, that would have been too much to ask for."

evildiarchy_newmareland.17.t:0 "Just As Expected"
evildiarchy_newmareland.17.d:0 "##TODO, some days after the choice to ally Dew has been made a new event will play in which it will describe how the choice might not have been that great. Namely brawls have been reported between griffon subjects and lunarist forces who have been listening to what Evening Dew has been putting out. Due to this Nightmare Moon herself had to get involved and drag him to a private room where she can decide upon her next step. Does she admit she was wrong and fire him or does she keep him around despite the danger?"
evildiarchy_newmareland.17.a:0 ""You need to go. For good.""
evildiarchy_newmareland.17.a:0 ""Don't mess up again or it will be the last time.""

evildiarchy_newmareland.18.t:0 "A Broken Clock"
evildiarchy_newmareland.18.d:0 "##TODO, Jet Set is tasked with the job of cutting Evening Dew off from all his sources of funding and power in the name of keeping the griffon subjects loyal. He does not mind carrying this out in the slightest, at least something slightly positive is being done for once, even if for all the wrong reasons."
evildiarchy_newmareland.18.a:0 "Better than the alternative."

evildiarchy_newmareland.19.t:0 "Learning From The Enemy"
evildiarchy_newmareland.19.d:0 "##TODO, Jet Set hadn't paid much attention to Maresoc back in the "normal" days of New Mareland, but now that he was tasked with setting up a meeting between this Big Sister and the diarchs he had to quickly become familiar with them. He is unable to find this pony, theorizing she might not really exist, so instead he invites some higher-ups of the party for the meeting in which they share their methods with the monarchs who in response allow these members to be integrated into the government as long as they swear loyalty to them. As expected the sisters were really interested in the spy and social control methods."
evildiarchy_newmareland.19.a:0 "This shall be useful."

evildiarchy_newmareland.20.t:0 "An Ideal Corrupted"
evildiarchy_newmareland.20.d:0 "##TODO, The meeting with Blueberry Frost was as intense as one could expect, but it was surprisingly fruitful. The mare personally might not have been too happy to work with the monarchs, but she knew she had to if she wanted her head to remain where it was. The idea was simple: "equalism" would be used to create an eternal united class in which all the people of the realm would belong to, one where mediocrity and compliance would be expected and race would be ignored. A cemented cast for all the populace, where they would only act and rise the ladder when instructed to."
evildiarchy_newmareland.20.a:0 "You will learn to like it."

evildiarchy_newmareland.21.t:0 "Know Your Place"
evildiarchy_newmareland.21.d:0 "##TODO, The diarchs decide that there is no need to meet with anyone or make any deals, instead they make Jet Set set up an event in which union leaders from all over New Mareland are forced to participate. The message of the diarchs is clear, either bend your head down and accept becoming state-owned or be "removed". There is no room for compromise or deals."
evildiarchy_newmareland.21.a:0 "No more of this socialism nonsense."

evildiarchy_newmareland.22.t:0 "The Remainder"
evildiarchy_newmareland.22.d:0 "##TODO, To Jet Set and the diarchs it is clear the Kingfisher is a republican, but even so he's also not dumb, therefore an agreement is reached where the remaining fence-sitting ponies are fully integrated into the government without any major punishments as long as the stallion is able to keep them under control and is able to keep his head down. He's also tasked with denouncing his own support of republicanism, which he does, even if against his wishes. This is all done in a meeting with Jet Set. It is very clear that the diarchs aren't becoming populists, more so that they're giving these ponies one last chance before being culled."
evildiarchy_newmareland.22.a:0 "Do what you're told and it will be fine."

evildiarchy_newmareland.23.t:0 "First Of Many Steps"
evildiarchy_newmareland.23.d:0 "##TODO, The monarchs present themselves to a crowd as they stand on a high balcony of what once was the seat of government of New Mareland, which has now been transformed into a prim and proper palace fit for empresses. The two get their own chance of speaking during the shared speech before they jointly announce their ambitions for Griffonia and beyond."
evildiarchy_newmareland.23.a:0 "This can't be good."


######### Equestria events ############

evildiarchy_equestria.1.t:0 "Raven Inkwell Calls For Help"
evildiarchy_equestria.1.d:0 "The princess of friendship appeared in a flash of pink magic. "Raven! What happened? Celestia told me she and Luna would visit New Mareland for a week, and that you would run the castle for them until they were back. But now–I received your urgent message, so I came as fast as I could."\n\n"Twilight! Thank Celestia that you are here. Or maybe not... I don't know what to think anymore. This morning, I got a telegram from Jet Set – you know, the governor of New Mareland – and... Celestia and Luna... they aren't the same anymore! He says they have transformed... somehow... into Nightmare Moon and... Daybreaker?" Raven Inkwell's voice cracked as she was noticable shaking. Her usual bureaucratic stoicism completely broken, she cried, "What do we do now, Twilight?"\n\n"Nightmare Moon, you say? Luna has transformed again? How? And why? Nevermind, now is not the time to discuss this in detail. I will have to gather the elements of harmony. Together we have defeated Nightmare Moon once, together we can do it again!"\n\n"Wait!" Raven Inkwell shouted. "It's not just Nightmare Moon! Jet Set says that Celestia has changed as well. He didn't provide any details, but it appears that they both transformed, Celestia knows how!" She stopped in realisation. "I probably shouldn't say it like that."\n\n"They both transformed? That is concerning. I don't know how we are going to fix this if they have both gone mad. The elements of harmony can only deal with one! We need to figure out what just happened, and what they are up to now. It appears they've decided to stay in New Mareland for now? But I reckon that won't be for long, unfortunately." Twilight started to wander in circles. "Daybreaker... Daybreaker... where have I heard this name before? Maybe in some book? Would Starswirl the Bearded have known something about them?" She stopped suddenly, crashing into Raven. "No, what was I thinking? Daybreaker – Starlight Glimmer told me about her! The evil version of Celestia! I did not know that she was real." She turned around. "Raven, I need you to stay right here while I inform the elements. Don't tell anypony in the meantime. I'll be back as soon as possible.""
evildiarchy_equestria.1.a:0 "There was another flash of pink magic, and Raven Inkwell stood alone again."

evildiarchy_equestria.2.t:0 "The Cutie Map"
evildiarchy_equestria.2.d:0 "Just as Twilight Sparkle teleported back home, she felt her flank itching. She had experienced this often enough – it was the tree of harmony calling her. And apparently, she was not the only one, for as she reached the Cutie Map, she found the other five Elements of Harmony and Spike already waiting for her. Yet there was something strange about it: normally, the map would just tell them where the problem was, and perhaps who should be sent to help with it, yet this time the entirety of Equestria was glowing.\n\nApplejack pointed a hoof at the map: "Twilight, do you know what this is about? I was just arguing with Rainbow Dash, but that can't be right, can it? I mean, how does this tree expect us to save all of Equestria all at once? Not that we haven't done it before, but this map is the most useless thing I've seen in my life."\n\n"I can only guess. Just before this, Raven had called me over, and told me that Celestia and Luna... they have both transformed! Do you remember Starlight Glimmer and her nightmare? Where Celestia transformed into Daybreaker and fought Nightmare Moon? If Raven is right, all of Equestria is in danger, and perhaps that's the reason why the whole map is lighting up."\n\n"Well, but how do we fix this then? The tree could've lent us a hoof and at least told us where to start looking, couldn't it? Just lighting up everything doesn't seem all that useful in my eyes."\n\n"Now wait a second," Rainbow Dash interrupted. "Celestia and Luna both transformed into their evil counterparts and we haven't noticed a thing? How does that work? That should have been felt all over the country. And weren't they, like, fighting the whole time in Starlight Glimmer's dream? With Daybreaker being all arrogant and such?"\n\n"I don't know yet! Well, I know part of it. Celestia and Luna visited New Mareland, and Raven Inkwell got a telegram from their governor. I suppose we just haven't felt the magic because it was too far away. But that shouldn't take away from the danger, and the tree is also telling us that Equestria has a problem. For now, I need you all to come to Canterlot with me, because I can't leave Raven alone while we figure out a solution.""
evildiarchy_equestria.2.a:0 "Let's hope we can figure this out fast."

evildiarchy_equestria.3.t:0 "An Emergency Council"
evildiarchy_equestria.3.d:0 "The six Elements of Harmony, joined by Spike and a rather distressed Raven Inkwell, sat in the throne room of Canterlot castle. Until a moment ago, Rainbow Dash had lectured Raven about the awesomeness of the elements, seemingly in a vain attempt to calm down the unicorn, before Rarity had called her off.\n\n"So," began Spike, "I guess you are now the reigning Princess of Equestria, Twilight? Celestia and Luna have gone mad, Cadence and Flurry are over in the Crystal Empire, this leaves you as the only choice." Raven nodded slightly and bowed, even finding back to her bureaucratic attitude. The other five ponies followed suit.\n\n"Now's not the time for princesses, Spike!" Twilight replied. "And you five, you're my friends, you shouldn't bow to me at all! We have a friendship problem on our hooves. How could I sit here on this throne to rule Equestria? We need to get back to the tree of harmony to search for the meaning of the Cutie Map, and after that, we will need all the elements to turn Daybreaker and Nightmare Moon back into Celestia and Luna – assuming we can figure out how."\n\n"But you are the only alicorn who remains, darling," Rarity replied. "Who else would be able to govern Equestria? The ponies need a princess."\n\n"We need to solve this together. As friends! We six–" Spike audibly cleared his throat, "–seven will form an emergency council to rule Equestria. I have a bad feeling about this, but it might be needed. Raven, I still need your assistance more than anything else, because we six–I mean seven, will probably need to travel to faraway lands or whatever else is needed. Is that okay with you, Raven?" The unicorn nodded. "Then it's settled. We will prepare a radio address to the citizens of Equestria as soon as possible. Spike, can you do that?" The dragon saluted. "Raven and I will see if it's possible to get more information from Jet Set. And you five – running Equestria while we also go on our Cutie Mark mission will mean we need all the ponypower we can get, so please see where you can help out in government.""
evildiarchy_equestria.3.a:0 "Please let there not be a mass panic."

evildiarchy_equestria.4.t:0 "Visiting The Tree Of Harmony - Part I"
evildiarchy_equestria.4.d:0 ""Now, let's get to the bottom of this.\n\nTwilight spread her wings and descended into the cave where the tree of harmony was located. Behind her, she could hear Applejack's "Yihaa" as her friend galloped down the stairs. Not much later, the Mane Six were standing at the entrance to the cave of harmony. Flashing light poured out of it.\n\n"I don't remember it being so bright," Fluttershy said. "Do... do you think it's dangerous, Twilight? Maybe we should return to the Cutie Map and look if we can find out more there."\n\n"Ah, c'mon, Fluttershy, no reason to be frightened by a tree. The tree has always worked out well for us, hasn't it?" Rainbow Dash hung in the air, lazily flapping her wings. "Twilight, on your command, we're ready to storm the cave!"\n\n"There's no reason to storm anything here," Twilight answered. "But we should approach the tree. We've already looked at the Cutie Map plenty, and apart from lighting up all of Equestria it has not given us any further insight. No, we need to visit the tree itself. With the appropriate amount of caution, Rainbow."\n\nThey walked further into the cave. The tree of harmony was shining brightly, the element stones vibrating in their positions. Yet, that was not the only change from their last visit: a new branch had sprung up, creating something resembling a tray. On it was a glowing ball, seemingly made of pure magic. Twilight approached it and looked at it from all sides. Flashes of magic came out of it, making it look like a miniature sun."
evildiarchy_equestria.4.a:0 "She lightly tipped the ball with her horn."

evildiarchy_equestria.5.t:0 "Visiting The Tree Of Harmony - Part II"
evildiarchy_equestria.5.d:0 "As soon as Twilight's horn touched the magic ball, she felt her hooves being lifted off the ground. She could faintly see her friends likewise being lifted upwards, as the tree connected with them, with the Elements of Harmony. Thoughts swirled through her head, as she was unable to differentiate what came from her and what the tree showed her – pictures of Canterlot, of Celestia, of Ponyville, of her friends, and of Spike all flashed before her eyes. She remembered Heart's Warming Eve, the School of Friendship, and the many, many friendship missions the Cutie Map had sent her and her friends onto. This was what Equestria meant to her, it was the soul of the nation, the true meaning of harmony – and she was willing to protect it, and if necessary, to defend it with her horn and hooves.\n\nThere was a soft "plop", and Twilight felt magic wash over her. Unlike so many spells, it didn't send her stumbling back, instead, its shower was almost pleasant, like a positive thought. As the magic subsided and she landed on the ground again, she opened her eyes, just in time to see a massive shield rapidly expanding. Soon enough, it would cover all of Equestria.\n\nShe was snapped out of her thoughts by Applejack's voice. "Uh, Twilight, do ya know what this was about? I'm gonna be as honest with you as I was with the shield, if we want to defeat Nightmare Moon or Daybreaker, we do need them right in front of us, ya'know? Or at least, that's how I think that works."\n\nTwilight shook her head. "No, defeating them will not be so easy, and I don't think that we can do it just with the Elements of Harmony this time. This... this was just the first step. The tree couldn't offer us a solution to all our problems, but it could buy us time with this shield. I was right, it was a shield spell, but this isn't just any shield. It's a shield of harmony, and the tree needed us, the elements of harmony, to complete it. At least, that's what I think. I'll definitely check Star Swirl's library later to see if he has written anything about it.""
evildiarchy_equestria.5.a:0 "Our harmony may protect us for a while."

evildiarchy_equestria.6.t:0 "A Speech"
evildiarchy_equestria.6.d:0 "Twilight walked onto the balcony of Canterlot castle as slowly as she could. Yet, despite her efforts, her friends managed to "accidentally" remain behind her – with the exception of Spike. He instead walked in front of her, looking much more like a royal guard than a coequal member of the Emergency Council. Even worse, her friends had insisted that she wear her crown and horseshoes like a princess. She sighed internally.\n\nOn the bright side, Spike and Raven had prepared a very good speech. "Dear citizens of Equestria! I stand here today not as a princess, but as a member of the newly formed Emergency Council. As most of you probably already know, tragedy has struck, and not only has Luna once more transformed into Nightmare Moon, but Celestia, who has ruled these lands in peace and harmony for so long, has transformed alongside her, becoming Daybreaker. It is yet unclear what caused this, or what their plans are. So far, they have taken over New Mareland and turned it into a land of tyranny. If their actions in New Mareland are any indication, we need to fear the day of their return. No longer do the alicorn sisters represent our cherished harmony."\n\nShe paused for a second to strengthen her resolve. "But not all is lost! Equestria is strong, and the harmony of the three tribes has transcended millennia. The sisters might have fallen, but we have not! In light of the developments, I was asked to take on the duties as reigning princess of Equestria. This, I have declined. I, Twilight Sparkle, am the Princess of Friendship, and as such I have asked my friends to form a government together. You may know them as the elements of harmony: Applejack represents honesty, Fluttershy represents kindness, Rainbow Dash represents loyalty, Pinkie Pie represents laughter, and Rarity represents generosity. And of course, Spike, my dearest friend of them all, who might not be an element of harmony, but has helped me so much in the past. Together, we have fought Queen Chrysalis, we faced Tirek, and defeated Nightmare Moon – admittedly we have so far only faced one evil alicorn, but I have no doubt that together, we can face even the evil diarchy arising on the horizon."\n\nShe took a deep breath. "Dear citizens of Equestria! Together, we can face this crisis. And by that, I don't mean the elements of harmony. I mean all of you, ponies of Equestria! Each and every one of you who make up this nation. Together, we shall find a way to undo the curse that has befallen the sisters.""
evildiarchy_equestria.6.a:0 "Harmony shall prevail!"

evildiarchy_equestria.7.t:0 "A Glimmer Of Hope"
evildiarchy_equestria.7.d:0 "The Mane Six and Spike sat in the throne room of Canterlot Castle. The two thrones were empty, something Twilight had insisted upon. Instead, Spike had organized a round table which they had simply put in the middle of the room. The seven members of the Emergency Council all looked rather tired. The last few weeks had been a stressful, with them having been thrust into the responsibility for keeping the nation running, with only ever more bad news emerging from New Mareland.\n\n"I tell ya, Twilight, no apple bucking season I've ever been so tired as I've been these past days," Applejack said. "I wonder how Celestia managed to do this all alone for a thousand years, when there's seven of us and we're struggling to get a grip."\n\n"She also had a thousand years to learn it all," Twilight answered. "Unfortunately, we don't have that kind of luxury. The tree of harmony has provided us with a shield, yes – a fascinating topic by the way, I've searched through half my library to find out how the tree kept the spell in that stasis, or if it even really was a shield spell, I'll definitely need to look for more books about this... Where was I? Right, the tree of harmony has made that shield, but I suspect it won't protect us forever. If Daybreaker is like Nightmare Moon, and I believe she is, their combined power must be tremendous. They will try to return, if they haven't tried already, and at some point, they will succeed in breaking it. Then, we need to be ready."\n\n"So, what can we do about it?" Fluttershy asked.\n\n"I... I don't know yet." Twilight swished her tail. "We need to gather friends. Maybe we can send out delegations to neighbouring countries, or better yet, we should go ourselves. It feels like the tree wants us to go on friendship missions. And then, when we want to prepare for their arrival, we should to find how we can strengthen our defences – both in magic and by hoof. At some point, we will need to fight them." With a strained voice, she added: "I just hope we can still cure them afterwards.""
evildiarchy_equestria.7.a:0 "Time is of the essence now."

evildiarchy_equestria.8.t:0 "#TODO Letter from Jet Set"
evildiarchy_equestria.8.d:0 ""
evildiarchy_equestria.8.a:0 ""

evildiarchy_equestria.9.t:0 "Another Letter From Jet Set"
evildiarchy_equestria.9.d:0 "The library of Canterlot castle was an impressive sight. Bookshelves towered meters high, filled with books, manuscripts and ancient documents. Twilight had spent every free hour she had researching about the shield, trying to understand what the tree of harmony had produced. Unfortunately, there was little written about the tree, and even less so about its capabilities.\n\nSpike came in with another cup of coffee. "Twilight? Can I talk to you for a second? I have news from Raven, Jet Set has written another letter. Apparently, they tried to break through the shield, and couldn't. Have you found out something about it? The magic of the tree must be strong if it can withstand the combined powers of two alicorns." He paused for a second. "Anyway, what I actually wanted to tell you, according to Jet Set they are now looking for artefacts."\n\n"Artefacts?"\n\n"That's how Raven put it. The logic seems to be that after they couldn't break through the shield, they decided that they need to plunder Griffonia for magical artefacts to enhance their power."\n\n"That's... not good. When trying to find information about the tree of harmony, I've read a lot about the history of Equestria, and of Equus in general. Information about Griffonia was rarer, but... there are a lot of magical artefacts lying around. Just take the Storm King as an example – what would he have been without his staff? I... no, we need to do something about this. Together. If they are trying to break our shield, we have to support it, with artefacts of our own. The library is full of legends about magic."\n\n"So, you want to live here for the next few weeks, or what?"\n\n"No, Spike. I couldn't read all of these books even if I had Celestia's lifetime to do it. We need a taskforce of skilled mages for that." She sighed. "I guess that's one more thing to organize.""
evildiarchy_equestria.9.a:0 "Perhaps we should contact Daring Do?"

evildiarchy_equestria.10.t:0 "A Chat With A. K. Yearling"
evildiarchy_equestria.10.d:0 ""Twilight Sparkle? I think you wanted to talk to me?" A. K. Yearling carefully entered what had once been the throne room of Canterlot Castle. Now, however, stacks of papers and books filled every corner of the once majestic interior. In the middle sat a tired-looking pink alicorn behind a temporary desk.\n\nThe Princess of Friendship looked up. "Ah? Yes. Eh... Welcome, Dar- I mean, Miss Yearling. I... ehm... Excuse the chaos here. As you can see, there are a lot of things going on at the moment." With a move of her horn, she moved over several stacks of papers, clearing a chair for Yearling to sit down. "The situation is as follows: I'm sure you are aware of the events over in Griffonia, with Celestia and Luna transforming into Daybreaker and Nightmare Moon. You will probably also have noticed the massive shield currently protecting Equestria and blocking their return. However, they very much want to return, and it stands to reason that the shield can't protect us forever... Should this case come, we will face the most concentrated amount of magic the world has seen so far. I've gotten notice from a trusted source that they are in fact collecting various magical artefacts in order to enhance their abilities and overpower the shield. In light of this, we have to react."\n\nA. K. Yearling sighed. "I reckon you haven't summoned the mild-mannered author of fictional books then?" She tensed her ears. "Is this room secure?" On Twilight's nod, she continued, "Well then, no more Yearling, time for Daring Do. You already figured out my little secret years ago. And yes, I still have many clues towards undiscovered artifacts in my library. That said, I'm sure you've been looking through Canterlot's library as well, which is admittedly much larger than what I can afford."\n\n"Oh, there is no shortage of clues for sure. Equestria has featured many talented mages in its thousand-year-long history, and more than just a few of them have spent their time creating powerful devices. Not to mention all the other races we share this continent with, or the other continents... But that's besides the point. We need your expertise in turning mere hints into successful missions."\n\nDaring Do smirked. "I will do my best.""
evildiarchy_equestria.10.a:0 "That's got to be quite a few news books, assuming we survive this."

evildiarchy_equestria.11.t:0 "An Answer From Princess Skystar"
evildiarchy_equestria.11.d:0 "Dear Twilight,\n\nI was so happy when I received your letter. It is so hard to get clear answers, and even the things that Queen Novo knows or suspects, she wouldn't tell me about. So it was nice to finally have a clear answer to what's going on with Daybreaker and Nightmare Moon, and how you're dealing with it. I immediately went to my mother, Queen Novo, to ask her if I could join you in your fight, but sadly, she said no. ‘We have our own troubles in North Zebrica', she said. Can you imagine? There're literally two rogue alicorns on the loose, and she's worried about Colthage. But what can you do? Seems like I will be staying here for the foreseeable future.\n\nBut you've written about the shield, and how you are collecting artefacts to make it more powerful. So that got me thinking about what we, as the hippogriffs, could contribute, and I finally asked Mother about sending you a shard of the pearl of transformation. It is certainly a powerful magical object. It's a strange feeling during the transforming from a hippogriff to a seapony, somewhat itchy – but you know that already, you've experienced it yourself.\n\nWhat else can I write? I'd tell you I support your fight, but that rings hollow now that mother has forbidden me from coming. But I trust you to figure it out regardless. You've defeated so many evils, you can defeat them as well. And I agree with you, we need to try to bring back the old Celestia and Luna. Mother is having doubts, but lately, she's been having doubts about everything. Well, what can you do? Fight on, and it will all be worth it.\n\nBest,\nPrincess Skystar"
evildiarchy_equestria.11.a:0 "The hippogriffs are still our friends."

evildiarchy_friendship_missions.1.t:0 "Friendship Mission The Crystal Empire" # Harmony Var
evildiarchy_friendship_missions.1.d:0 ""Twilight!" Shining Armour embraced his sister, followed by Cadence and Flurry Heart. "How nice that you're visiting. And of course you too, Spike, the brave and glorious." He laughed, shaking hooves with the dragon. "I hope you had a good trip from Canterlot. Can't say that about a lot of things these days. Although I saw your shield, Twi. Could you explain how you did that? If the stories are true and it withstood the assault of the two alicorns, that's hella impressive. Would love if I could say that about my own, but I don't think I would be able to pull that off."\n\n"The shield isn't mine, Shining, although you teaching me the shield spell has helped. The tree of harmony has produced it, and to this day I haven't found an explanation of what exactly went on at this moment. We, the elements of harmony, only... like... helped it expand? I can't say for sure. But one thing is certain, it is bound to the harmony of Equestria and its ponies. And actually, this is what brings me here. Once Daybreaker and Nightmare Moon attack again, the shield needs to cover the entirety of Equus."\n\n"Do you mean the Crystal Ponies need to embrace harmony?" Cadence asked.\n\n"I don't think that's what the shield wants. It's more about, I think, joining the fight against the evil alicorns? From what I currently understand, the shield can be seen as the rejection of their corruption by Equestria's own magic. It's about us standing up against their ways. The tree of harmony is itself only an expression of Equestria."\n\n"The soul of the nation?"\n\n"Something like that." Twilight slowly shook her head. "But enough of that. Let's gather the crystal ponies. Spike has prepared a speech for me. He has become quite good at that," she said with a slight smile, looking besides her.\n\nBut Spike was no longer at her side. Instead, he had become the centre of attention of the crystal ponies who cheered at his words. Twilight could not hear exactly what Spike was saying, but she could feel the shield expanding over the Crystal Empire.\n\nGrinning at Cadence, she remarked, "Or maybe, it's even easier than that.""
evildiarchy_friendship_missions.1.a:0 "Our friendship will never waver."

evildiarchy_friendship_missions.2.t:0 "Friendship Mission The Crystal Empire" # Sombra Var
evildiarchy_friendship_missions.2.d:0 "King Sombra.\n\nThe details of his return were shrouded in mystery, but he had once more subdued the Crystal Empire and the ponies within it. Worse yet, he had captured Princess Cadence, Shining Armour and little Flurry Heart. Just thinking about it, Twilight's stomach turned. She should have come here a long time ago. She flapped her wings a bit more to gain speed, causing Spike on her back to lower his head as not to be blown off. She smiled. The brave dragon would go down as the saviour of the Empire, again.\n\nIn ordinary times, trying to take on Sombra alone – or only with Spike – would have meant certain death. But these times were anything but ordinary, and so here she was. She could feel her Cutie Mark faintly pulsing. The tree of harmony gave her magic powers far beyond what she could normally muster, and she was certain it was enough to challenge Sombra. She ran through the necessary spells in her head. Rarely in her life had she done something so daring, and even more rarely she had felt so confident during it.\n\nTwilight approached the Crystal City with lightning speed. Her nosedive made Spike cling to her, his claws pressing into her fur, but she ignored the pain. On her approach, she sent a massive beam of magic forward against the Crystal Castle, blasting a hole right through his walls. At this point, the plan was very simple. She would distract Sombra, while Spike would rescue the Crystal Heart itself, banishing the Empire's captor.\n\n"Twilight Sparkle!" Sombra tried to hold his haughty voice, but could not fully conceal his surprise. She did not bother to answer, instead blasting him with a second spell ray, forcing him to summon a shield at the last moment. He retaliated immediately, and for a while the two duelled in utter silence and concentration. She could feel the power of the tree of harmony flowing from every fibre of her being. Never before had spells come so easily from her horn, and few times had they been as destructive.\n\nBut from one moment to another, she could feel Sombra's magic draining. Spike had fulfilled his mission, and with a drawn-out "Noooooo", her enemy vanished before her eyes, being banished once again. Not long after, she could embrace her brother, sister-in-law and niece. The Crystal Empire would be free again, ready to focus on the real enemy."
evildiarchy_friendship_missions.2.a:0 "Sombra, go back to your coffin!"

evildiarchy_friendship_missions.3.t:0 "Friendship Mission The Crystal Empire" # Commie Var
evildiarchy_friendship_missions.3.d:0 "Twilight and Spike sat on the train north to the Crystal Empire – or rather, former Crystal Empire. Not too long ago, the crystal ponies had decided they wanted no monarchs no longer and declared the "Crystal Ponies' Republic" under a pony named Arctic Lily. Little was known about her in Equestria, and so the two just had to hope she would turn out to be a reasonable pony.\n\nAt the train station, they were greeted by a delegation of ponies carrying the new flag. "Spike, the brave and glorious, and Twilight Sparke, I assume?" the leader said. "My name is Arctic Lily. I lead the new government after the crystal ponies decided that we no longer required a princess to rule us. A position that I had championed for a long time. But please, come with me. I guess you also want to see Princess Cadance with her family."\n\nTwilight and Spike walked to the Crystal Palace, flanked by the delegation. Once there, they sat down with Arctic Lily. To Twilight's surprise, Lily directed her words to Spike, not her.\n\n"Spike, tell me, is it true what's been said? I know Celestia and Luna have transformed into powerful evil mages, akin to the wicked King Sombra under whom we suffered. But information is sparse up here. I heard you and your friends are preparing to face them? We... we have not parted from our alicorn in good spirit, so much is true, but... Cadence wasn't evil. She was just... not right about certain things. I... perhaps it is time to reconsider."\n\n"You're damn right we are! Twilight, her friends, and I are doing everything we can to stop Daybreaker and Nightmare Moon. And you can too, as sure as I'm Spike! But tell me, why did you have to overthrow Cadance in the first place? Can't you find a way to work with her?"\n\nArctic Lily rubbed her muzzle. "I... I didn't do anything to her! But she just wouldn't listen to the needs of us workers. If only... Ah, by the heart, if only we could have seen all of this coming. Promise me to talk with her about the workers, okay? I will talk to my comrades. If the evil alicorns are as bad as Sombra, we need to work together. And after all, you've been the one to free us, Spike." She gave him an insecure smile. Shaking her head, she added, "Who would have thought it would end like that?""
evildiarchy_friendship_missions.3.a:0 "The crystal ponies know real evil when they see it."

evildiarchy_friendship_missions.4.t:0 "Friendship Mission To The Buffalo" # Little Strongheart var
evildiarchy_friendship_missions.4.d:0 "It had been a while since Applejack had visited her relatives in the South-West. She vividly remembered when she and her friends visited her relatives, only to get entangled in the brewing conflict between the buffalo and the local ponies. Now she had come again, and this time to the buffalo directly. As the train chugged through the landscape, she pondered the task ahead. She had volunteered to take on this friendship mission alone – somewhat unusual, but she felt it was the right choice. What had the buffalo been up to since they last met? And would they see the necessity to stand together against Daybreaker and Nightmare Moon?\n\nAs she left the train station, she was greeted by her old acquaintance Little Strongheart. She knew the young buffalo from her first visit, as it had been her who brokered the final compromise. A good sign that the buffalo sent her as emissary.\n\n"Little Strongheart! Has been a good while since we last saw each other, right? How's your stampede going? I sure hope that y'all got good pies out of it. But enough of that. I'm sure you noticed that things are going on over in Griffonia, and I need to talk with Chief Thunderhoof about it. Can you bring me to him?"\n\n"The stampede is going well, although many elders still grumble that we gave up our holy grounds. But... Chief Thunderhoof is no longer our leader. Years after your visit, the chiefs chose me as our new leader. And yes, I have heard that the princesses are no more. So tell me, what does that mean?"\n\n"You, leader of the buffalo? Yeehaw, that's fantastic news! So, to be honest, things are pretty dire: Celestia and Luna have turned into corrupted versions of themselves, and now call themselves Daybreaker and Nightmare Moon. And they've set their eyes on Equestria. We've made a shield that stops them for now, but we all need to work together, y'know? So that's why I've come here."\n\nSoon afterwards, Little Strongheart and Applejack had gathered the buffalo chiefs. In the end, all of them except a mysterious figure named "the elder one" voted to accept the friendship of the ponies, and to fight the evil diarchs across the sea."
evildiarchy_friendship_missions.4.a:0 "Peace in the South-West, again."

evildiarchy_friendship_missions.5.t:0 "Friendship Mission To The Buffalo" # Thunderhooves Var
evildiarchy_friendship_missions.5.d:0 "It had been a while since Applejack had visited her relatives in the South-West. She vividly remembered when she and her friends visited her relatives, only to get entangled in the brewing conflict between the buffalo and the local ponies. Now she had come again, and this time to the buffalo directly. As the train chugged through the landscape, she pondered the task ahead. She had volunteered to take on this friendship mission alone – somewhat unusual, but she felt it was the right choice. What had the buffalo been up to since they last met? And would they see the necessity to stand together against Daybreaker and Nightmare Moon?\n\nThe train station was empty when she arrived. Not a good start. She cantered towards the buffalo camp – a signpost had helpfully indicated the way – wondering how she would be greeted. She wouldn't need to wait for long.\n\nA buffalo guard sprang in her way. "What do you want here, pony? These are buffalo grounds."\n\n"Well, and it's the buffalo I came for, ya know?" Applejack retorted. "I've come as a representative of Equestria. I don't know if you've noticed, but things are going on in the world. So I'm here to talk with your boss. Perhaps you could bring me to him?"\n\nWithout a further word, the guard turned around, signalling Applejack to follow. Not much later, she was greeted by the chief of all buffalo, Chief Thunderhooves. She knew Thunderhooves from their previous encounter. He was not an easy negotiating partner. After a traditional opening ceremony, he was willing to listen to her explanation of the situation. She told him everything she knew about Daybreaker and Nightmare Moon, about their deeds and goals, and what Equestria did to counter them.\n\nAs she finished, Thunderhooves slowly shook his head. "I remember you being the Element of Honesty, Applejack, and you have indeed been honest with me. You ask me to join you in the fight against evil, but I am not the right one for this task. Instead, I will hoof over power to Little Strongheart. She has the right mind for this kind of task. Perhaps I should have done so a long time ago." He continued to shake his head. "You Equestrians. Where will this end?""
evildiarchy_friendship_missions.5.a:0 "Peace in the South-West, again."

evildiarchy_friendship_missions.6.t:0 "Friendship Mission To The Buffalo" # Elder var
evildiarchy_friendship_missions.6.d:0 "It had been a while since Applejack had visited her relatives in the South-West. She vividly remembered when she and her friends visited her relatives, only to get entangled in the brewing conflict between the buffalo and the local ponies. Now she had come again, and this time to the buffalo directly. As the train chugged through the landscape, she pondered the task ahead. She had volunteered to take on this friendship mission alone – somewhat unusual, but she felt it was the right choice. What had the buffalo been up to since they last met? And would they see the necessity to stand together against Daybreaker and Nightmare Moon?\n\nThe train station was empty when she arrived. Not a good start. She cantered towards the buffalo camp – a signpost had helpfully indicated the way – wondering how she would be greeted. She wouldn't need to wait for long.\n\nA buffalo guard sprang in her way. "What do you want here, pony? These are buffalo grounds."\n\n"Well, and it's the buffalo I came for, ya know?" Applejack retorted. "I've come as a representative of Equestria. I don't know if you've noticed, but things are going on in the world. So I'm here to talk with your boss. Perhaps you could bring me to him?"\n\nWithout a further word, the guard turned around, signalling Applejack to follow. Not much later, she was greeted by the chief of all buffalo, a mysterious figure only known as "the elder one". He didn't look friendly at her, and she didn't recall him from their previous encounter. Yet, after a traditional opening ceremony, he was still willing to listen to her explanation of the situation. She told him everything she knew about Daybreaker and Nightmare Moon, about their deeds and goals, and what Equestria did to counter them.\n\nAs she finished, the elder slowly shook his head. "You don't remember me, but I remember you. You are the Element of Honesty, Applejack, and you have indeed been honest with me. You ask me to join you in the fight against evil, but I cannot do as you ask. I will hoof over power to Little Strongheart. She has the right mind for this kind of task. I... I will wait for later." He continued to shake his head. "You Equestrians. Where will this end?""
evildiarchy_friendship_missions.6.a:0 "Peace in the South-West, again."

evildiarchy_friendship_missions.7.t:0 "Friendship Mission To The Changelings" # Thorax var
evildiarchy_friendship_missions.7.d:0 ""Spike! Welcome!" Thorax smiled across his face. "I'm so glad that the emergency council has sent you as emissary. After all... you were the first to believe in my. And now you're Changelingia's honoured state guest."\n\n"Truth be told, I asked to do this mission. I always wanted to see what do did after you overthrew Chrysalis. Remember how we first met, in the cave in the Chrystal Empire? Me and everypony else were so afraid. And yet we became friends. You can't believe how happy I was when I heard the news that you had overthrown Chrysalis."\n\nA changeling in a general's uniform quietly cleared his throat. "King Thorax? I understand you wishing to trade stories, but perhaps we should move on with the protocol? If this is a diplomatic visit..."\n\n"Ah, c'mon, brother," Thorax answered. "Spike, this is Pharynx, my brother, advisor, and one of our best generals. One of the reasons we won against Chrysalis, even though he initially didn't even want to rebel. But it's better this way, or not?"\n\nPharynx let out a sigh. "Trading for love has its advantages, I'll have to admit that. Sometimes... sometimes I miss the old days." He sneered for a moment. "This life... it makes us weak. I might be a general, but I doubt I will ever see a proper battle map ever again."\n\n"Well, I can help with that." Spike churned in. "After all, you're right, I'm not just here to trade stories. You've probably heard the news by now, Celestia and Luna have... changed. They now call themselves Daybreaker and Nightmare Moon and currently ravaging Griffonia. According to Twilight, there's little doubt that they will eventually turn their attention to us, so we better all work together to defeat them. And that's what I'm here for, asking you to join our fight against the evil diarchy."\n\n"And as king of the changelings, I accept wholeheartedly. The changelings will once more rush to Canterlot, this time not as conquerors, but as its defenders.""
evildiarchy_friendship_missions.7.a:0 "A toast to changeling-pony friendship!"

evildiarchy_friendship_missions.8.t:0 "Friendship Mission To The Changelings" # Chrysalis var
evildiarchy_friendship_missions.8.d:0 "Thorax licked his fangs, looking at the Mane Six next to him. "So, what is your plan exactly?"\n\n"Oh, it's super simple," Pinkie Pie answered, while jumping in circles around the group. "Just go to Chrysalis, use the elements of harmony, turn her into stone, and have a big, awesome party. Done that a thousand times already. Trivial stuff, really. We just need to prepare the party."\n\nThe king-in-spe didn't seem too convinced. "But how will we even get to her? She has spent the last few years fortifying herself in the so-called 'Queen's Tower' in the centre of Vesalipolis, surrounded by VOPS' best security guards. How do you plan to get in there? Do you want to turn all of her guards into stone as well?"\n\n"Oh no, it doesn't work like that." Twilight Sparkle showed a smile. "All books I've read about the elements make this very clear – they are only to protect Equestria, and they only work on those able to threaten Equestria. We couldn't turn the guards into stone even if we tried. But there's a much simpler approach: we teleport." Thorax continued to lick his fangs in doubt, causing Twilight to continue. "You are right to be sceptical. Normally we couldn't teleport the required distance. It is a difficult spell to perform even for alicorns, and it scales quadratically with distance. But this time, we have help." She winked. "Although, we still need to get a fair bit closer, so we'd better stay quiet now."\n\nThey continued on their way. Thorax still had doubts, but kept them to himself for now. Sometime later, Twilight suddenly raised a hoof. He had barely time to register what was happening, before there was a flashing light and they appeared in the middle of Chrysalis' throne room. The queen of the changelings hissed in surprise, but the Mane Six wasted no time. Thorax gazed in awe as the elements did their work. As soon as Chrysalis' petrification was completed, a magical burst in all colours of the rainbow swept the building, and, as far as he could see, much of the city.\n\n"Don't go thinking it's always so easy." Pinkie Pie wiggled her hoof before his nose. "But now, it's really time to party!""
evildiarchy_friendship_missions.8.a:0 "The Elements of Harmony strike again."

evildiarchy_friendship_missions.9.t:0 "Friendship Mission To The Yaks" # (Pre-)Civil War var
evildiarchy_friendship_missions.9.d:0 ""C'mon, at least talk to him."\n\n"No."\n\n"He's your brother, you need to at least try!" Pinkie Pie jumped in circles around Prince Rutherford. "I promise we'll have a super awesome party when you talk to him."\n\n"No! Bradford refused my rule, declared himself rightful prince, rallied clans against me. Rutherford cannot accept this. No more talking, now Yaks smash these puny Jaks." He stomped with a hoof. "Rutherford has tried talking. Brother did not see reason. I want Yakyakistan to be modern nation, friends with Equestria. He says no, Yakyakistan should stay as is and close borders. Now we fight, fight for Yakyakistan's soul."\n\nTheir conversation continued like this for a while, but after a while, Rutherford's resistance became weaker and weaker. At heart, he was still a yak you could reason with. Under pressure from his "honorary yak" friend, and with some encouragement from Yona, he agreed to a ceasefire and negotiations with Prince Bradford. For a moment, Pinkie Pie wondered how well Rarity's negotiations with Bradford were going – it was probably the harder mission.\n\nYet despite that, she quickly got confirmation from Rarity that Bradford would be open to a meeting. As the two brothers discussed, she quietly asked her friend how she got Bradford to agree.\n\nRarity smiled across her muzzle. "Oh, that was much easier than I anticipated. The yaks – they seem so violent from the outside, don't they? But this time, I had informed myself properly, just to choose the right dress for this situation. They have such a rich culture once you go looking, my dear, and my outfit immediately found their approval. Even this perpetually angry yak – I think his name was Kerr – admitted to me that he never thought a pony could be so well-versed in yak culture. Of course, I quickly promised to design them an exquisite traditional yet innovative garment, and they were thrilled to accept. – But look, I think the two have come to an agreement.""
evildiarchy_friendship_missions.9.a:0 "Peace is restored in Yakyakistan."

evildiarchy_friendship_missions.10.t:0 "Friendship Mission To The Yaks" # Yngvar var
evildiarchy_friendship_missions.10.d:0 "Three dark figures approached the tent in the dead of night. From afar, they all looked like yaks, yet on closer examination it was clear that two of them weren't, and even the third one was smaller than the usual yak. They had been expected, or at least the entrance was opened quickly and closed just as fast. A lone eye peered out looking to see if there had been witnesses, but there was no one nearby.\n\nInside, Pinkie Pie and Rarity peeled off their thick outdoor clothes. "They really do have a special type of weather here, don't they, darling?" Rarity commented. "But in this case, I'm not complaining. I'm fairly sure that it allowed us to avoid anyone noticing our little mission."\n\nYona, who had not worn anything, said nothing, but their host answered, "Thyra yak is happy you made it here safely. Thyra had worried greatly about you." She looked to Yona. "Can you forgive me? It never should have gotten this far. Why did Thyra trust Yngvar?"\n\n"It's alright. Yona never thought Thyra wanted this."\n\nPinkie Pie jumped between the two. "Also" – jump – "we bring good news!" – jump – "The yaks" – jump – "don't want" – jump – "Yngvar's rule anymore. So" – jump – "let's all have a big party!"\n\nRarity raised an eyebrow. "Shouldn't we, like, overthrow Yngvar first?"\n\n"But the party is the overthrowing! We need to show the yaks that they can be free if they want to. So, let's bring them all together."\n\nThyra shook her head. "Why must revolution end like this? All Thyra wanted was worker to be heard."\n\n"But the revolution isn't ending, silly. Once Yngvar is out, you'll take over.""
evildiarchy_friendship_missions.10.a:0 "The revolution returns to the workers."

evildiarchy_friendship_missions.11.t:0 "Friendship Mission To The Yaks" # Rutherford var
evildiarchy_friendship_missions.11.d:0 ""I sure hope the yaks are more understanding this time," Rarity said. "I vividly remember their behaviour in Ponyville. Even if you managed to win their friendship." She nodded to Pinkie Pie walking next to her. "'Honorary yak' status, right? And official ambassador to Yakyakistan."\n\n"Prince Rutherford is a great guy if you get to know him. You need to treat him right – he is one proud yak for certain, but a good-natured one. Not too long ago, he had a terrible fallout with his brother Prince Bradford. The yaks fought a devastating civil war. He and Yona reached out to me for some help. I know that he won, but sadly, I lost contact with him afterwards."\n\nAfter reaching Yakistown, they were soon surrounded by interested yaks. Even after Rutherford had opened the nation to trade with Equestria, few of them had ever seen a pony. With her yak-horn helmet on, Pinkie Pie was gesturing wildly while explaining to them the reason for their visit.\n\n"What is this crowd here?" A familiar voice appeared behind them. "Pink Pony! You have come back! Prince Rutherford welcomes you to yaks. And you brought friend, I see. Yak remember her from Ponyville. But what you speak to yaks about?"\n\n"Prince Rutherford! I'm so glad to see you. I've only heard from you last time when there was the civil war. My friend Rarity and I have come here to ask for your help in the fight against Daybreaker and Nightmare Moon – you know, the evil version of Celestia and Luna. They are crazy powerful, so we need everyone in Equus to unite against them. Can we count on you?"\n\n"Prince Rutherford has heard about evil alicorns. Was not sure if tread for yaks or not. Now I am sure! Yaks ready to fight and SMASH alicorns. Yaks very strong, and yaks like ponies.""
evildiarchy_friendship_missions.11.a:0 "Yaks and ponies together smash all enemies."

evildiarchy_friendship_missions.12.t:0 "Friendship Mission To The Yaks" # Yona var
evildiarchy_friendship_missions.12.d:0 ""I sure hope the yaks are more understanding this time," Rarity said. "I vividly remember their behaviour in Ponyville. Even if you managed to win their friendship." She nodded to Pinkie Pie walking next to her. "'Honorary yak' status, right? And official ambassador to Yakyakistan."\n\n"Prince Rutherford is a great guy if you get to know him. You need to treat him right – he is one proud yak for certain, but a good-natured one. Not too long ago, he had a terrible fallout with his brother Prince Bradford. The yaks fought a devastating civil war. He and Yona reached out to me for some help. I know that he won, but sadly, I lost contact with him afterwards."\n\nAfter reaching Yakistown, they were soon surrounded by interested yaks. Even after Rutherford had opened the nation to trade with Equestria, few of them had ever seen a pony. With her yak-horn helmet on, Pinkie Pie was gesturing wildly while explaining to them the reason for their visit.\n\n"Rarity! What Pinkie Pie doing there? Yona yak not know that you come to Yakyakistan." Rarity turned around, seeing her old student approaching. "Has to do with Celestia and Luna vanishing? Yona know that something happen, but not know what."\n\n"Yona! I'm so glad to see you. We've come to visit Prince Rutherford and the yaks. Celestia and Luna have unfortunately not vanished, but have gone crazy. As Daybreaker and Nightmare Moon, they are now a danger to the entire world. So, we are gathering friends to prepare for their attack. About what Pinkie Pie is doing... I think she just enjoys her theatrics."\n\n"Oh, you have not heard news? Prince Rutherford is abdicate. Yaks form republic. Yona yak is republic's first president. And Yona is ready to join battle together with ponies!""
evildiarchy_friendship_missions.12.a:0 "Yaks and ponies together smash all enemies."

evildiarchy_friendship_missions.13.t:0 "Friendship Mission To The Yaks" # Thyra var
evildiarchy_friendship_missions.13.d:0 ""I sure hope the yaks are more understanding this time," Rarity said. "I vividly remember their behaviour in Ponyville. Even if you managed to win their friendship." She nodded to Pinkie Pie walking next to her. "'Honorary yak' status, right? And official ambassador to Yakyakistan."\n\n"Prince Rutherford is a great guy if you get to know him. You need to treat him right – he is one proud yak for certain, but a good-natured one. Not too long ago, he had a terrible fallout with his brother Prince Bradford. The yaks fought a devastating civil war. He and Yona reached out to me for some help. I know that he won, but sadly, I lost contact with him afterwards."\n\nAfter reaching Yakistown, they were soon surrounded by interested yaks. Even after Rutherford had opened the nation to trade with Equestria, few of them had ever seen a pony. With her yak-horn helmet on, Pinkie Pie was gesturing wildly while explaining to them the reason for their visit.\n\n"What is this gathering here?" A yak flanked by two officers approached Rarity. "Who are you? Thyra yak know pink pony, but not you. But Thyra not allow this gathering. You want to undermine revolution?"\n\n"My name is Rarity, and me and Pinkie Pie have come here to speak to the yaks. As you may know, Celestia and Luna have transformed into Daybreaker and Nightmare Moon. And they plan to invade Equus to subjugate it like they currently do with Griffonia. In response, we want to unite all of Equus against them. But you spoke of revolution. Tell me, what happened to Prince Rutherford? We were expecting to see find him here."\n\n"Rutherford is no longer prince. Yaks demand abdication, so Rutherford renounce prince title. Yaks are ruled by workers now. I lead workers' council, so you speak to me. But if you not threaten revolution, Thyra is ready to fight against evil alicorn with you. Yaks smash!""
evildiarchy_friendship_missions.13.a:0 "Yaks and ponies together smash all enemies."

evildiarchy_friendship_missions.14.t:0 "Friendship Mission To The Yaks" # Bradford var
evildiarchy_friendship_missions.14.d:0 ""I sure hope the yaks are more understanding this time," Rarity said. "I vividly remember their behaviour in Ponyville. Even if you managed to win their friendship." She nodded to Pinkie Pie walking next to her. "'Honorary yak' status, right? And official ambassador to Yakyakistan."\n\n"Prince Rutherford is a great guy if you get to know him. You need to treat him right – he is one proud yak for certain, but a good-natured one. Not too long ago, he had a terrible fallout with his brother Prince Bradford. The yaks fought a devastating civil war. He and Yona reached out to me for some help. I know that it didn't go too well, so we need to try and reason with Bradford."\n\nThey were interrupted by a stern voice. "Stop, ponies! Prince Bradford has ordered border closed. What you want?"\n\nRarity turned to the yak. "We come to speak to the prince of the yaks. Maybe you heard that Celestia no longer rules in Canterlot, and you might have even heard that she and Luna have transformed into Daybreaker and Nightmare Moon, ravaging Griffonia... It is terribly important that we can speak to the prince, because as much as we respect your borders being closed, it also concerns the security of the yaks. The now evil diarchs will return sooner rather than later, and they will come to conquer all of Equus." As the yak still made no appearance to move or reply, she added, "Please, let us speak to Bradford and explain!"\n\nNow, the yak answered. "I AM Bradford, pony fool. Do you think yak border is watched so lightly that you can just walk around freely? Prince Bradford observe you for days now. And while I not know you, I know your friend Pink Pony. She has help traitor Rutherford." He made a grim face and stomped a hoof. "But – Bradford has indeed heard about Celestia gone mad, and Luna too. Yaks strong, yaks don't need help. But, Bradford know that ponies need help." He stomped again. "Yaks smash evil alicorns.""
evildiarchy_friendship_missions.14.a:0 "Yaks and ponies together smash all enemies."

evildiarchy_friendship_missions.15.t:0 "Friendship Mission To The Yaks" # Star Mountain / Kerr var
evildiarchy_friendship_missions.15.d:0 ""C'mon, it's not that hard."\n\n"Yona yak not sure. Yona yak have doubts." The young yak between the two ponies shook her head.\n\n"Bah!" Pinkie Pie answered. "We merely need to sneak into the country, overthrow the tyrant, and put you in charge. And we need to have a big, awesome, bombastic victory party afterwards, with lots of smashing and stomping. All super easy. Done it lots of times. Although..." She dramatically scratched her chin. "I do need to train my smashing skills for the party to be the best party ever."\n\n"And Pinkie Pie think this all easy? Have heard about [JAK.GetLeader]? [JAK.GetLeader.GetSheHeCap] is cruel despot and ruin beautiful Yakyakistan."\n\nPinkie Pie didn't answer, but merely winked. As Rarity just shrugged, they continued their way in silence. They were already high in the mountains parting the Crystal Empire from Yakyakistan. For some reason, Pinkie Pie seemed to know the exact path they needed to take, although it was far from any established way. After three days of climbing in the mountains, the terrain seemed to be getting less steep again.\n\nSuddenly, Pinkie Pie let out a scream, causing Yona and Rarity to jump to the sides. Yet, before they could do anything, they heard a similar scream not too far away, and Pinkie Pie dashed towards it. The other two followed, and after a short while, they came to a cave filled with yaks.\n\n"Maya yak can say, everything go to plan. Guard of [JAK.GetLeader] is infiltrate. We are ready to strike to restore freedom to Yakyakistan!"\n\nSeeing the surprised look on her friend's faces, Pinkie Pie put her hooves on her hips. "What? Did you think I would run into Yakyakistan just like that? I know a few yaks from when I visited the Yickslurbertfest, and a few more from my visits afterwards. I am official friendship ambassador to the yaks after all, and what ambassador would I be if I hadn't had friends, hm? Anyway, we have a tyrant to overthrow, and more importantly, a party to prepare.""
evildiarchy_friendship_missions.15.a:0 "Yakyakistan is free of madness again."

evildiarchy_friendship_missions.16.t:0 "Friendship Mission To The Deer" # Supremacist var
evildiarchy_friendship_missions.16.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nThey reached Hjortland without issue. Upon their arrival, they requested an audience with the Allsherjargoði. Not long afterwards, they were welcomed by a darkfurred stag with red horns. He mustered the two before beginning to speak in a slow, deliberate tone.\n\n"Rainbow Dash and Fluttershy, diplomats from Equestria. I am Jurva, the Allsherjargoði, and ruler of these lands. But you know all this, and I know that you know. The gods have already foretold your arrival, and they also laid open your mission. Yet, speak what you must speak, and I shall give you an answer as the gods demand."\n\nRainbow Dash flapped her wings, hovering over the ground with her forelegs crossed. "Well, if you already know everything, then let's cut to the chase. I've heard you Olenians are awesome warriors, so do you want to help us fight Daybreaker and Nightmare Moon? I've read the legends of Cnoof and Ivor; now is your time to prove it."\n\n"I have to admit, I'd rather talk to the animals in your forests rather than calling you to fight," Fluttershy added. "But there's time later for that. The evil diarchs are a danger to the world, and I hope the gods told you so as well."\n\nJerva looked at them with a stern expression. After a moment of pause, he answered, "You have spoken wisely, and the gods honour that. The deer are a proud and strong race. For a long time, I have seen Equestria as an influence which makes us weak. You have shown me that it does not need to be this way. But this is just to ease my mind. The gods already told me what I have to do before you departed from Canterlot. Queen Velvet will be restored, as she was the rightful heir, and we will join your fight.""
evildiarchy_friendship_missions.16.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.17.t:0 "Friendship Mission To The Deer" # Neutrality var
evildiarchy_friendship_missions.17.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nTo their surprise, after reaching Hjortland, an officer approached them to invite them to a meeting with King Johan. Apparently, the king had been informed of their arrival before they even crossed the Olenian border, but decided to not stop them. They were led to a small room in the castle, where they met a tired-looking stag. Fluttershy noticed that his fur was slightly darker than that of Velvet, and he didn't have her colourful antlers.\n\n"I guess the charade is over then." He smiled slightly, but it just made him look even more tired. "If you come to convince me to abdicate, there is no need to. I... It is not always easy to do the right thing. I wanted Olenia to be stronger than under an Equestrian sponsored doe. It... did not work out. I have consulted with the gods since I first heard about your mission. Their demands have been clear. She is the rightful heir, while I am merely a usurper. I will no longer fight."\n\nRainbow Dash raised an eyebrow. "Actually, we've come here to ask you to fight. Not with Velvet, of course, but to join our fight against the evil diarchy. As a filly, I've always read the legends of Olenian Vikingars, of Cnoof and Ivor and so on. Now is the time for the deer to prove they still have it in them."\n\n"I know your fight, but it won't be mine. Velvet will lead Olenia to fight with the free against alicorn tyranny." "
evildiarchy_friendship_missions.17.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.18.t:0 "Friendship Mission To The Deer" # Harmony var
evildiarchy_friendship_missions.18.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful. She was so sad that she had to fight for her throne, but she said it had to be done."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nThey reached Hjortland without issue. Queen Velvet was quick to grant them an audience, and soon enough they sat on cushy armchairs speaking with the queen.\n\n"Welcome to Olenia, my friends," she began. "I knew it would only be a matter of time." She sighed. "The world has become a dark place, hasn't it? Here in Olenia, we've known that sooner than many others. Johan's coup was a terrible event, and the civil war upon my return has left so many families in ruins. Yet – there is always a bright side, otherwise I wouldn't be sitting here. Evil can be fought, and must be fought."\n\n"That's precisely right!" Rainbow Dash answered, flapping her wings excitedly. "We'll show those two tyrants!"\n\n"And Olenia will stand by your side," Velvet nodded. "But don't you underestimate the cost of war.""
evildiarchy_friendship_missions.18.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.19.t:0 "Friendship Mission To The Deer" # Communist var
evildiarchy_friendship_missions.19.d:0 ""I always wanted to see Olenia," Fluttershy said. "It is said that they have many fascinating critters in their forests, both big and small. And they are such nice people. Every time I've spoken with Queen Velvet, she has been so compassionate and mindful."\n\n"No, no, no, you're describing them entirely wrong," Rainbow Dash answered. "The Olenians are strong and awesome warriors. Did you know that they conquered Hindia? It's true, Twilight confirmed it to me, a few centuries ago, groups of Olenians established the 'Deerlaw' in Hindia, and their descendants rule to this day. I remember reading Olenian legends as a filly." She made a loop in the air. "Gosh, I hope I can meet some of their fighters, and then we'll see who's better at tricks."\n\nArriving in Hjortland, they were approached by a police officer. Apparently, the president of the Deer's Republic had heard of their arrival, and wanted to meet them. The two quickly agreed, and not much later they sat in the presidential palace, where a well-groomed stag approached them.\n\n"Welcome. My name is Kullervo Sirola, leader of the Deer's Party and president of the Deer's Republic of Olenia. And you are Rainbow Dash and Fluttershy, emissaries from the Princessdom of Equestria. So, what does the new Princess Twilight Sparkle want from us deer? I can already think of what she would ask, but please, make your case."\n\n"Twilight Sparkle isn't our princess. She refused," Fluttershy answered quietly. "Of course, she is still the Princess of Friendship, but she didn't want to be Princess of Equestria when Celestia and Luna... well... when they turned into Daybreaker and Nightmare Moon. We've formed an emergency council. So technically, you're speaking with the rulers of Equestria directly – or at least, with some of them."\n\n"And we've come here to ask you to fight," Rainbow Dash interrupted. "Fight like in the old days, like I've read about Cnoof and Ivor as a filly." She flew up in the air while making fake kicks in the air. "The Vikingar were awesome warriors! And now we need you to fight against the evil diarchy. All of Equus must stand united, so that they can't find a way in."\n\n"I see, I see." Sirola scratched his chin. "Interesting that you haven't mentioned Velvet's position in all of this." Rainbow Dash wanted to answer, but the deer lifted a hoof and continued. "No, no, don't ruin it now. I have already made my decision anyway. It would be a folly of me to divide the deer during these trying times. She can return – as long as she honours my promises.""
evildiarchy_friendship_missions.19.a:0 "The Olenians join the cause."

evildiarchy_friendship_missions.20.t:0 "Friendship Mission To The Polar Bears" # Polar Bears
evildiarchy_friendship_missions.20.d:0 "When Rainbow heard that she and Fluttershy had been picked for the diplomatic mission so far north, she was immediately pumped. She'd heard the bears were awesome and strong, and less prone to smashing stuff than the Yaks. It had everything to go great... until they crossed the border and were almost instantly attacked by a giant monster, a few dozen times larger than them. As she flared her wings and prepared to brawl, she took a breath and... saw as Fluttershy flew straight past her, directly at the beast.\n\n"Flutters, wait!" Rainbow flew after her, only to be shocked by the next sight. The beast had begun stamping its hind leg on the ground as Fluttershy pat its head. "Flutters, that thing's as big as a dragon! You need to get away from it!"\n\n"It's not a dragon at all; it's a Tuunbaq! They're just fluffy little fellows," she said, turning to pet the Tuunbaq more vigorously. "Aren't you, you cutie!"\n\nRainbow had seen Fluttershy pull off some crazy stunts before, but this topped them all. At least it meant they could continue on their way unimpeded... or so she thought. Fluttershy then spent the next few hours playing with the beast, flying around and calling it cutsy-wootsy names. What had begun as terrifying and awesome encounter had very quickly become very boring.\n\nA bellowing laugh suddenly startled her. Rainbow noticed a polar bear envoy had appeared in the distance – this was her chance! She quickly flew towards them before their leader even noticed her approach. Up close, she could see them better: big, bulky, and ferocious. They were awesome... and looked like they could swat her away with one claw. She gulped and approached. "H-Hey, so." Their leader slowly turned their gaze towards her, making her flinch. She trembled for a moment longer, took a deep breath, and psyched herself up. "I'm Rainbow Dash! That over there is Fluttershy! We've come from Equestria to ask for your help – you, as in, the bears – so we can stand together against Daybreaker and Nightmare Moon. You've heard, right? They're currently ravaging Griffonia! We just wanted to see if you could help, considering you're all so big, and powerful, and awesome, and—" Their leader raised a paw, instantly stopping Rainbow in her tracks.\n\n"Bring the one with the soul of frost to me," their leader said, pointing towards Fluttershy. "Then we can talk." Rainbow nodded quickly and flashed away just as quick."
evildiarchy_friendship_missions.20.a:0 "Somestimes, a friendly pat can earn honest friendship."

evildiarchy_friendship_missions.21.t:0 "Friendship Mission To The Penguins" # Supremacist var
evildiarchy_friendship_missions.21.d:0 ""SSSSSTRIKE!" Pinkie Pie screamed, sliding dramatically into a cluster of snowponies she had built. "That's three for three – Pinkie wins!" she exclaimed to herself as Rarity looked down. This visit had been going horribly, they had barely been welcomed – frankly, they were lucky they were even allowed to get to Dachaigh and not shown away, or worse, imprisoned! Rarity could not be imprisoned; not with a dress like that! She sighed as she looked at pinkie – at least someone here was having fun.\n\n"Darling, perhaps we should pack our bags and go home." Rarity shook her head as Pinkie had begun constructing a snow penguin. "I'm certain Twilight will have an idea of how to deal with this, but it isn't something the two of us can manage alone. I'm awfully sorry we came all this way for nothing."\n\n"Waddya mean, silly? We're not alone at all – we have all those friends to help us!" Before Rarity could question it, she followed Pinkie's gaze to a massive crowd of penguins marching towards a grand building in the capital.\n\n"...And who, pray tell, might they be?"\n\n"Well, they're workers, duh!"\n\n"I can see that. But how, precisely, did they become your friends?"\n\n"Well, while you were stewing away, a few of them came over and asked me what being a pony was like! So I told them all about our adventures, about Harmony, and the whole situation with the princesses! Then they said their current leader was a big old meanie just like them and they didn't like what he was doing. So I told them they shouldn't allow a meanie to boss them around, and so they went to do that, I think!" Pinkie looked proudly at the marching crowd. "Well, I'd better go and prepare a party for after they're done over there! See you later, Rarity!"\n\nDumbfounded, Rarity could only watch as Pinkie bounced away to prepare the victory celebration."
evildiarchy_friendship_missions.21.a:0 ""...I looked away for 30 seconds, how did this happen.""

evildiarchy_friendship_missions.22.t:0 "Friendship Mission To The Penguins" # Harmonist var
evildiarchy_friendship_missions.22.d:0 "I must say, darling, I didn't quite know what to expect from the penguins, but they have delivered so much more," Rarity giggled as Pinkie looked out the window. "And did you see the beautiful suit on the fellow who welcomed us? Gosh, you'd think it would be hard to tailor with flippers, but they have found a way to do it quite exquisitely!"\n\n"I wanted to be able to slide around on the ice..." Pinkie sighed dejectedly, gazing back out the window. "If only... oh, wait, I totally can!" Pinkie quickly left the room with a bounce, passing through a penguin diplomat on her way out.\n\n"She's... quite the energetic type," the diplomat spoke as he brushed down his suit and walked towards his chair. "I hope the climate has not proven too trying for your visit."\n\n"Oh, not at all! I came quite prepared to face snow, ice, storm, and wind! One can never be too prepared while travelling." Rarity smiled and gestured to her clothes. "As much as I would adore discussing fashion further, there is another thing I must ask about. We have heard the penguins are quite proficient with magic and hoped you might be open to negotiating for Equestria and Pingland to stand together against Daybreaker and Nightmare Moon."\n\n"Well, of course," the diplomat nodded – or at least seemed to; penguins do not have much of a neck for it. "Pingland is sympathetic to your cause and would be glad to stand by Equestria's side."\n\nAs the two smiled and shook hoof and flipper, a loud thud drew their attention to the window. A splattered Pinkie had found herself stuck to the pane. "The ramp was so fun! I felt like I could fly as I slid down it," she beamed, even as she seemed glued to the glass. "But it might be freezing out here!" She stuck out her tongue and placed it on the window, failing to pull it back. "Shee, ish fozen!"\n\nRarity looked out and then back at the diplomat, forcing a smile."
evildiarchy_friendship_missions.22.a:0 ""Let's understand it as a gesture of friendship.""

evildiarchy_friendship_missions.23.t:0 "Friendship Mission To Stalliongrad" # Stalliongrad
evildiarchy_friendship_missions.23.d:0 "Applejack and Rarity looked out the train window, pondering over Stalliongrad's landscape. They had only once before crossed these lands, on their way to Our Town, but back then they had barely seen anything from the self-proclaimed "Severyanian Soviet Republic" (as was Stalliongrad's official name). Spike had expressed interest in seeing the communist capital as well, and so had come with them, but he was currently asleep. They shared a glance. How easy would their mission be? For two centuries, Severyana had been de facto part of Equestria, if under their own government, only to break away a bit more than a decade ago.\n\nAt Canterlot Station in Stalliongrad, they were greeted by [STG.GetLeader], the chairpony of the Stalliongrad soviet. "Equestria sending emissaries? That's new. But welcome – I'm sure you want a look around the city to see what we've accomplished since we overthrew the nobles. We have renovated a lot since the revolution. Much is possible when there aren't leeches around sucking the wealth of the common pony and everyone is equal."\n\n"I hope you're not talking about the same stuff as Starlight Glimmer did back in her days." Applejack grumbled. "I heard quite a bit about this communism, even in my family. Doesn't do good for the farm. But that's not the point now."\n\n"Hold on, darling." Rarity intervened. "I think we should first look at the city and then judge their approach." Applejack looked at her with big eyes, making Rarity give her a slight smile in response. "You know, if there is one thing I cannot stand, it's greed. And everything I heard about the nobles points to their greed. I don't know if I can call revolution the right answer, but that's the past now." She turned to [STG.GetLeader]. "Très chic, your outfit."\n\n"I'd want to see the city too." Spike proclaimed. "After all, that's why... I mean, it's just a good opportunity, right? We can still talk about Daybreaker and Nightmare Moon and their shenanigans later."\n\nThe next hours were spent wandering the city, with [STG.GetLeader] showing off communist architecture, fashion and food. Afterwards, negotiations commenced. Of course, the evil alicorns had already been a topic in the Supreme Soviet, and Stalliongrad had readied its own defences against the threat. After reassurance that the revolution in Severyana would not be threatened, [STG.GetLeader] agreed to join them in the fight against the diarchy."
evildiarchy_friendship_missions.23.a:0 "Equestria welcomes its comrades."

evildiarchy_friendship_missions.24.t:0 "Friendship Mission To Our Town" # Our Town
evildiarchy_friendship_missions.24.d:0 "Our Town.\n\nFor Fluttershy, it felt like yesterday that she heard Starlight Glimmer's well-orchestrated performance. It hadn't been her proudest moment, as she had almost been sucked into her cult. Of course, in reality, this all happened years ago, and Starlight Glimmer had long since turned from cult leader into Twilight's faithful student. She caught herself glancing at Twilight next to her, who didn't seem to notice a thing. She swished her tail. Why had she been chosen for this friendship mission? For some reason, Twilight had insisted on it.\n\nAs they reached the city, they were immediately greeted by a familiar face – Sugar Belle, who had been one of the first to rebel against Starlight Glimmer's rule. "Twilight Sparkle and Fluttershy! You have come back! What brings you to us? Is there another friendship problem?" Her smile faded. "I hope it is nothing too serious. We have... I mean, after Starlight Glimmer was defeated, the ponies here had to find their true calling in life, again. Getting your Cutie Mark ripped off is terrible, but living with it again is not always easy either."\n\n"I can imagine," Fluttershy said quietly. "I just want everypony to get along. For all the evils Starlight did, this was something she accomplished. Of course, ponies should not live without their Cutie Mark," she quickly added.\n\n"It was a fake getting along," Sugar Belle replied. "It was forced conformity. But I remember you. It has a strong surface appeal, right?" She offered a tired smile. "Anyway, after you left, our future was uncertain. [evildiarchy_friendship_missions_24_dynloc] But you still haven't told me what brings you to us?"\n\n"You spoke of friendship problems, and it kind of is. But this time, it is us needing your help," Twilight answered. "You see, Celestia and Luna... they have transformed. And we will need everyone in Equus to help us if we are to have any hope turning them back.""
evildiarchy_friendship_missions.24.a:0 ""You have helped us, now we will help you.""
evildiarchy_friendship_missions.24_doublediamond:0 "But now we have elected Double Diamond as our new mayor – an actual election, unlike before. He still preaches about equality. Sometimes I wonder if he doesn't dream of becoming the new Starlight. Luckily, he hasn't tried anything with Cutie Marks yet..."
evildiarchy_friendship_missions.24_featherbangs:0 "But now we have elected Feather Bangs as our new mayor – an actual election, unlike before. Yes, this Feather Bangs I turned down. But he is a kind mayor, I have to give him that..."

evildiarchy_friendship_missions.25.t:0 "Friendship Mission To Nova Griffonia" # Nova Griffonia - Supremacist var
evildiarchy_friendship_missions.25.d:0 ""I'm having some kind of déjà vu here," Pinkie Pie said. "You and I, on a friendship mission to the griffons."\n\n"Yeah, except that this time, it's us needing their help," Rainbow Dash answered. "And Nova Griffonia isn't Griffonstone – although it's almost as desolate. Being a colony of a collapsed empire doesn't do wonders for your prosperity. But we'll see. I just hope I don't break my leg again. That really hurt for quite a while."\n\n"The border is closed, ponies! What do you want?" a firm voice interrupted them. They had reached the Nova Griffonian border. Rainbow Dash hooved the border patrol their passports that Twilight had given them. The guard clacked his beak. "Diplomats? I doubt our president is interested in whatever Equestria has to tell him." He sighed. "Although I think he should be." Lowering his voice, he asked, "Is it true that Celestia and Luna have gone insane and are now enslaving griffons over in New Mareland? There're only rumours coming here, but I've heard thing..."\n\n"You're exactly right," Pinkie Pie confirmed. "Although they aren't really Celestia or Luna anymore. They now prefer to call themselves Daybreaker and Nightmare Moon. And we're here because we want to stop them, and we need y'all's help. So, if you want to help your fellow griffons, you better bring us to that president of yours."\n\nThe guard seemed distressed. "I've already told you, he wouldn't listen. I... Look, I have some contacts left over from of the civil war. I let you through, and I can give you some names of griffons to talk to. Just promise me you'll never, NEVER, speak about my role in this."\n\nThe two ponies looked at each other, nodding in agreement. After promising to keep the guard's involvement absolutely secret, they entered Nova Griffonia. And some days later, the unthinkable happened: [GRF.GetLeader] was overthrown and arrested by a pro-democratic coup, with Wilhelm Silverwing installed as new president."
evildiarchy_friendship_missions.25.a:0 "Friendship prevails."

evildiarchy_friendship_missions.26.t:0 "Friendship Mission To Nova Griffonia" # Nova Griffonia - Civil war var
evildiarchy_friendship_missions.26.d:0 ""I'm having some kind of déjà vu here," Pinkie Pie said. "You and I, on a friendship mission to the griffons."\n\n"Yeah, except that this time, it's us needing their help," Rainbow Dash answered. "And Nova Griffonia isn't Griffonstone – although it's almost as desolate. Being a colony of a collapsed empire doesn't do wonders for your prosperity. But we'll see. I just hope I don't break my leg again. That really hurt for quite a while."\n\n"The border is closed, ponies! What do you want?" a firm voice interrupted them. They had reached the Nova Griffonian border. Rainbow Dash hooved the border patrol their passports that Twilight had given them. The guard clacked his beak. "Diplomats, I see. Well, I don't know if you've heard, but we kind of have two governments at the moment. So, do you want to speak the reds or the whites?"\n\nRainbow Dash turned to her friend. "Seems like they actually do need our help. You wanna talk to the reds, and I talk to the white?"\n\nPinkie Pie nodded, and so they parted. Later, when they shared their experiences, they discovered that the talks with both sides followed a common theme. Rainbow Dash had impressed Highhill with her military-style flying performance, while Pinkie Pie endeared herself to Redtail by being able to recite various bits of Marks' "Manifesto of the Social Justice Party". When Rainbow's asked, confused, where she learned that, Pinkie just winked.\n\nUltimately, they got both sides to agree to a temporary ceasefire and more negotiations. In the end, both sides agreed that to form a government under Wilhelm Silverwing, a moderate republican, and to join the fight against the real enemy of griffonkind – the evil alicorns over in Griffonia."
evildiarchy_friendship_missions.26.a:0 "We must not fight each other while our survival is at stake."

evildiarchy_friendship_missions.27.t:0 "Friendship Mission To Nova Griffonia" # Nova Griffonia - Other var
evildiarchy_friendship_missions.27.d:0 ""I'm having some kind of déjà vu here," Pinkie Pie said. "You and I, on a friendship mission to the griffons."\n\n"Yeah, except that this time, it's us needing their help," Rainbow Dash answered. "And Nova Griffonia isn't Griffonstone – although it's almost as desolate. Being a colony of a collapsed empire doesn't do wonders for your prosperity. But we'll see. I just hope I don't break my leg again. That really hurt for quite a while."\n\n"The border is closed, ponies! What do you want?" a firm voice interrupted them. They had reached the Nova Griffonian border. Rainbow Dash hooved the border patrol their passports that Twilight had given them. The guard clacked his beak. "Diplomats, I see. And I thought Equestria already had a consulate in Weter. Anyway, I reckon you want to talk to [GRF.GetLeader]? Come with me."\n\nAfter a few hours, they arrived in the capital. The guard had already telegraphed their arrival to the [evildiarchy_friendship_missions_27_dyntitle], and so they were taken to his villa.\n\n[GRF.GetLeader] welcomed them warmly. "I have already heard quite a few stories. Celestia and Luna, they have both gone insane, right? And now the Princess of Friendship is left to pick up the pieces." He shook his head. "[evildiarchy_friendship_missions_27_dyndesc]"\n\n"You almost got it, but not quite," Pinkie Pie answered. "Celestia and Luna have not just gone insane, they transformed into super powerful, super evil alicorns and are now Daybreaker and Nightmare Moon. And Twilight doesn't rule Equestria; an emergency council does. Oh, and also Equestria isn't falling apart. Actually, we're preparing for the evil diarchy to attack us, and are here to ask if you want to join us. After all, just look what they're doing to the griffons in Griffonia." Pinkie Pie turned to her friend. "Have I forgotten something, Dash?"\n\n"Your diplomacy is absolutely outstanding," Rainbow Dash commented sardonically. "[evildiarchy_friendship_missions_27_dyntitlecap], if I may..."\n\nBut [GRF.GetLeader] interrupted her, giggling. "It's alright. I'm all in.""
evildiarchy_friendship_missions.27.a:0 "Griffons, avenge your fellow griffs!"
evildiarchy_friendship_missions_27_dyntitle_governor:0 "governor"
evildiarchy_friendship_missions_27_dyntitle_president:0 "president"
evildiarchy_friendship_missions_27_dyntitle_governorcap:0 "Governor"
evildiarchy_friendship_missions_27_dyntitle_presidentcap:0 "President"
evildiarchy_friendship_missions_27_dyndesc_teafeather:0 "What a downfall. I was born in the Griffonian Empire, and while I can't say that any of the Grovers went insane like that, I sure remember its collapse. Perhaps Equestria is lucky to still have a Princess who cares."
evildiarchy_friendship_missions_27_dyndesc_highhill:0 "What a downfall. A nation that is suddenly robbed of its leader is always in turmoil. We had this here in Nova Griffonia. But what happened to you is perhaps even worse."
evildiarchy_friendship_missions_27_dyndesc_redtail:0 "It truly is a tragedy. I hope Twilight can set things right."
evildiarchy_friendship_missions_27_dyndesc_silverwing:0 "This is such a tragedy for me personally as well. I've always looked up to their example for guidance. And now that."
evildiarchy_friendship_missions_27_dyndesc_blackpeak:0 "I truly cannot comprehend it. They were always such a shining example of virtue."

