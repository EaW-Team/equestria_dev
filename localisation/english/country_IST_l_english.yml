# Initial Treelet #
  IST_yet_another_step: "Yet Another Step"
  IST_yet_another_step_desc: "With another year rising, the tribes of the jungle look to their chieftain in expectation. Ever since he united the squabbling and stagnant tribes, Dimasupil has doubled down on raids against the Naugdaw Confederation, bringing ever more glory to his people. How much more could be desired?"
  IST_warning_the_tribes: "Warning The Tribes"
  IST_warning_the_tribes_desc: "Respect is not simply to be expected, but to be earned. The Maglibing may hold complete loyalty to Dimasupil, but that does not mean all tribes share it. To ensure his vision is understood, he shall call a meeting with the lesser chieftains so they may be ready."
  IST_preparing_the_warriors: "Preparing The Warriors"
  IST_preparing_the_warriors_desc: "Maglibing's culture of combat and survival is respected and feared across the jungle, by allies and enemies alike. With the greatest raid in living memory being prepared for the year's end, we must ensure all warriors are properly readied."
  IST_readying_the_few: "Readying The Few"
  IST_readying_the_few_desc: "The lesser chieftains and warriors are the means by which Maglibing marches forward, but they would be meaningless without Dimasupil's greatest tool. Spoken of in hushed tones, his elite few are as mysterious as they are feared. With them everwatching, Maglibing's safety and Dimasupil's vision shall be uncontested."
  IST_the_forges_heat_up_once_more: "The Forges Heat Up Once More"
  IST_the_forges_heat_up_once_more_desc: "Though few and far between, Maglibing's own forges and artisans ensure the warriors are well-armed. They rest most of the year, but with the great raid incoming, they shall return to work and ensure a hefty supply of weapons for the battles ahead."
  IST_our_benefactors: "Our Benefactors"
  IST_our_benefactors_desc: "Known across the land for the folly that saw them defile the land, the creatures of the Zebrides are quite diverse in their views and ambitions — some even maintaining occasional contact and bringing gifts through the island of Wadang. We are not fools to see them as friends, but it would foolish to ignore the opportunities they offer."
  IST_the_glory_of_powder: "The Glory Of Powder"
  IST_the_glory_of_powder_desc: "While steel has served faithfully for thousands of moons, there is simply no competing with the power of powder. With a single strike from a safe distance, a rifle can end a life and its thunderous attacks shall ensure Maglibing rises above its enemies."
  IST_the_reliance_of_steel: "The Reliance Of Steel"
  IST_the_reliance_of_steel_desc: "Axes, spears, swords and bows; weapons that our own expertise can provide in abundance. They have been a reliable foundation for thousands of moons, and with a surplus of them we can ensure the defeat of all our enemies."
  IST_meaning_found: "Meaning Found"
  IST_meaning_found_desc: "Many curious adventurers see the jungle as a place to prove themselves, or are simply overtaken by wanderlust for these lands. While their fascination remains strange to us, we can put it to use by throwing their unique skills into the battlefield alongside our own warriors."
  IST_with_no_food_armies_starve: "With No Food, Armies Starve"
  IST_with_no_food_armies_starve_desc: "For a warrior's spirit to be fiery, they must march on a full stomach and a mind at ease. If we do not fulfil the most basic necessities for our warriors, we are sure to fail in the coming conflict."
  IST_with_no_spirit_armies_crumble: "With No Spirit, Armies Crumble"
  IST_with_no_spirit_armies_crumble_desc: "For a warrior to march towards glory, they must carry a spirit unmatched by any enemy. If the warriors of Maglibing depart for battle without certainty of victory, then we will have lost before even setting hoof on the battlefield."
  IST_with_no_glory_armies_fade: "With No Glory, Armies Fade"
  IST_with_no_glory_armies_fade_desc: "For a people to emerge victorious at a conflict's end, its warriors must strive for the greatest of glories on the field. If the warriors of Maglibing do not aim for absolute victory with every strike, our resolve is sure to waver."
  IST_remind_them_of_our_strength: "Remind Them Of Our Strength"
  IST_remind_them_of_our_strength_desc: "The Maglibing are the greatest among the greats, but that does not make our brother tribes lesser! Let the example of our might serve as a rallying cry for all as we march to war."
  IST_ensuring_no_backtalk: "Ensuring No Backtalk"
  IST_ensuring_no_backtalk_desc: "There are still certain... undesirable reactions to Dimasupil's ambitions following the recent defeats of the western tribes. All peaceful methods have already been exhausted to ensure they understand the importance of our fight. Any who still do not listen shall be made to understand, once and for all."
  IST_all_maglibing_under_dimasupil: "All Maglibing Under Dimasupil"
  IST_all_maglibing_under_dimasupil_desc: "The western tribes must understand that their service is not submission, but loyalty to their own kind. As they are now all subjects of the Maglibing, to serve Dimasupil is to serve themselves. Let us teach them this truth until it is etched into their bones."
  IST_only_dimasupil_above_all_maglibing: "Only Dimasupil Above All Maglibing"
  IST_only_dimasupil_above_all_maglibing_desc: "Let there be no confusion! The tribes must follow Dimasupil not only because he leads, but because he is strong. His achievements speak louder than any chieftain's before him; to resist him is to resist destiny itself."
  IST_compliant_forevermore: "Compliant Forevermore"
  IST_compliant_forevermore_desc: "With our ambitions laid bare, the western tribes finally fall into the fold alongside the others. It is regretful that understanding took so long to arrive. What matters now is not the past, but the glorious future we shall conquer."
  IST_remind_them_of_my_name: "Remind Them Of My Name"
  IST_remind_them_of_my_name_desc: "Dimasupil, greatest of his name! He alone has united these jungles! He alone has beaten back our enemies! He alone has ensured stability! If Dimasupil's commands are followed, Maglibing cannot be beaten on the field!"
  IST_banners_raised: "Banners Raised"
  IST_banners_raised_desc: "With all necessary preparations complete, the time for peace is over. Dimasupil has made it clear that this battle, unlike those before, shall follow the example set by foreign powers: total war. Only WE can emerge victorious."

# Jungle War Tree #
  IST_compromising_with_our_benefactors: "Compromising With Our Benefactors"
  IST_compromising_with_our_benefactors_desc: "The creatures of the Zebrides have what we need, but they do not part with their wares freely, and so, concessions must be made. This leaves a bitter taste, but it is one we must swallow if we are to continue enjoying their assistance."
  IST_rally_the_unwilling: "Rally The Unwilling"
  IST_rally_the_unwilling_desc: "Some refuse the call to battle, muttering of the dishonour of this conflict. They must be taught that honour is not simply to fight or to win: honour is obedience, and they shall obey."
  IST_their_condeferation_is_a_sham: "Their Confederation Is A Sham"
  IST_their_condeferation_is_a_sham_desc: "The Naugdaw Confederation is a shame upon the jungle, but such weakness was to be expected of Intiryero's heirs. As they huddle together in fear, it becomes clear: they are an unworthy enemy, and they shall soon fall."
  IST_place_holder_one: "TODO"
  IST_place_holder_one_desc: "TODO"
  IST_place_holder_two: "TODO"
  IST_place_holder_two_desc: "TODO"
  IST_one_chieftain_to_rule_all: "One Chieftain To Rule All"
  IST_one_chieftain_to_rule_all_desc: "'Cooperation' and 'collaboration' – these are the words the Naugdaw use to cloak their cowardice. We shall show them how their precious 'unity' crumbles at the first sight of a true and mighty chieftain."
  IST_crumble_to_their_weakness: "Crumble To Their Weakness"
  IST_crumble_to_their_weakness_desc: "TODO"
  IST_crumble_to_our_might: "Crumble To Our Might"
  IST_crumble_to_our_might_desc: "TODO"
  IST_fanaticism_as_a_burden: "The Uncertainty Of Peace"
  IST_fanaticism_as_a_burden_desc: "Dimasupil is a humble servant of the spirits, like any other, and this war is not born of hate or distrust. Sadly, the Priesthood's pleas for peace have proven themselves misguided, and if the peoples of the jungle are to stand strong against foreign overtures, they must stand united!"
  IST_strong_arm_the_tiger_movement: "Strongarm The Tiger Movement"
  IST_strong_arm_the_tiger_movement_desc: "The Tiger Movement – a radical faction of warriors and priests who see themselves as the Thunder Tiger's truest protectors – could prove immensely useful to our cause. We must make overtures and demonstrations of strength that make clear: He would be far safer with a protector like Dimasupil than under the current arrangements."
  IST_the_high_priest_of_the_tiger: "Fanaticism As A Burden"
  IST_the_high_priest_of_the_tiger_desc: "To throw one's whole life into a cause is worthy, but only as long as that fanaticism remains controlled. The warriors and priesthood of Talarayi fight as ferociously as any Maglibing, yet they blind themselves with rage and make themselves weaker targets. Let us show them what true glory demands!"
  IST_the_true_heir_of_the_tiger: "The True Herald Of The Tiger"
  IST_the_true_heir_of_the_tiger_desc: "Though no member of the clergy, Dimasupil is a warrior who respects the old ways. He is clearly the Golden City's most promising protector, and soon enough, the Talarayi will understand this."
  IST_my_will_shall_not_delay: "My Will Shall Not Delay"
  IST_my_will_shall_not_delay_desc: "oo much time has been wasted on a fight that should already be over! The warriors must fight, and they must win! Dimasupil's will shall delay no further!"
  IST_old_rivalries_laid_to_rest: "Old Rivalries Laid To Rest"
  IST_old_rivalries_laid_to_rest_desc: "The feud between Maglibing and Naugdaw stretches back to the Brothers themselves – but all feuds are made to end. With the Confederation broken and Talarayi enlightened, let us declare it: the old rivalries are dead, and from their grave the peoples of the jungle may now unite."

# Main Treelet #
  IST_dimasupil_triumphant: "Dimasupil Triumphant"
  IST_dimasupil_triumphant_desc: "With the remaining tribes driven into submission, it has become clear that Dimasupil's cause is the righteous one. We must now ensure the eastern tribes understand, just as the western tribes have come to understand."
  IST_the_confederation_dismantled: "The Confederation Dismantled"
  IST_the_confederation_dismantled_desc: "The Confederation was a symbol of weakness. True unity is found only in following the strong, and there are none stronger than Dimasupil."
  IST_the_beast_of_burden: "The Beasts Of Burden"
  IST_the_beast_of_burden_desc: "The Chelonids and Saurians of the jungle have long served the Maglibing, but it is the Naugdaw who have found true harmony with the beasts. Integrating their expertise with our own is sure to be a boon."
  IST_dealing_with_mutya: "Dealing With Mutya"
  IST_dealing_with_mutya_desc: "Mutya, leader of the Naugdaw Confederation, has been captured. With the war concluded, his fate now falls solely under Dimasupil's hoof."
  IST_kiss_the_hoof: "Kiss The Hoof"
  IST_kiss_the_hoof_desc: "The fate of the loser is to accept the winner's decree. Though this is the first war of total conquest the jungle has witnessed, Dimasupil has made it clear: the tribes of the Confederation will submit."
  IST_keeping_our_promises: "Keeping Our Promises"
  IST_keeping_our_promises_desc: "Dimasupil made many promises to ensure the loyalty of the Tiger Movement, and now he must show that their faith was well placed. The Thunder Tiger demands reverence, and he shall provide it."
  IST_noble_retirement: "Noble Retirement"
  IST_noble_retirement_desc: "Xuwicha, High Priest of Talarayi, is a revered figure among his people and throughout the jungle. Though Dimasupil shall take his place as the Thunder Tiger's protector, he will ensure all know this implies no disrespect to the priest."
  IST_keeping_their_promises: "Keeping Their Promises"
  IST_keeping_their_promises_desc: "The warriors of Talarayi are known for their unwieldy fury like no others. Now that they fight for us, we shall turn that fury towards all of our enemies."
  IST_the_true_heir_of_the_thunder_tiger: "The Herald Of The Tiger"
  IST_the_true_heir_of_the_thunder_tiger_desc: "Dimasupil has been accepted. He is the Thunder Tiger's Herald, its chosen protector, and the blade through which its will shall be made manifest."
  IST_yet_another_step_to_greatness: "Yet Another Step To Greatness"
  IST_yet_another_step_to_greatness_desc: "The jungles were only the first step in fulfilling Dimasupil's glorious plans. From here on out, the world shall finally witness what fate has in store for the peoples of the jungle."
  IST_foreign_ways_useful: "Utility Of Foreign Ideas"
  IST_foreign_ways_useful_desc: "Though personally distrustful of foreign ideas, Dimasupil recognises the potential in the war tools of the wider world. He will keep his people living as they always have, but the warriors of Maglibing shall become the shield and spear that forge their future."
  IST_forges_into_factories: "Forges Into Factories"
  IST_forges_into_factories_desc: "The old forges have served well, but they cannot keep pace with the demands of modern war. We must transform scattered smithies into true factories. The seeds of industry shall be planted, and from its soil, steel shall bloom."
  IST_blacksmiths_into_gunsmiths: "Blacksmiths Into Gunsmiths"
  IST_blacksmiths_into_gunsmiths_desc: "A blade requires a lifetime to master, but a rifle requires weeks to learn and seconds to kill. Our blacksmiths possess skilled hooves and clever minds. With the assistance of Zebride experts, they shall soon become Maglibing's armories."
  IST_iron_giants_shackled: "Iron Giants Shackled"
  IST_iron_giants_shackled_desc: "The outside world moves creatures and material on iron giants that never tire and never question. Let rails cut through the jungle like veins, carrying the lifeblood of war to every corner of our growing domain."
  IST_quotas_to_meet: "Quotas To Meet"
  IST_quotas_to_meet_desc: "Our factories must produce more, always more. Set quotas, and demand results; those who cannot keep pace will be replaced by those who can."
  IST_the_golden_city_shines: "The Golden City Shines Again"
  IST_the_golden_city_shines_desc: "The might Golden City has stood for millennia, a monument to glories long past and to the gods. It is only right that it remains central and revered by the peoples of the jungle."
  IST_focus_placeholder_1: "Riches Of The Jungle"
  IST_focus_placeholder_1_desc: "The jungle has always provided, but now we must ask more of it than ever before.The land is rich with resources, and we shall take them to ensure it remains untarnished by the foreign enemies."
  IST_respectful_of_the_past: "Respectful Of The Past"
  IST_respectful_of_the_past_desc: "The old ways have made the Maglibing who they are. Our rituals and our ways of life have been constructed through a thousand moons; these are not to be discarded lightly. Let us move forward with reverence, carrying our ancestors with us into this new age."
  IST_while_looking_at_the_future: "Looking Towards The Future"
  IST_while_looking_at_the_future_desc: "While we are reverent, reverence does not mean stagnation. We honour our ancestors by surviving – and to survive, we must change."
  IST_with_fire_and_steel_we_born: "With Fire And Steel"
  IST_with_fire_and_steel_we_born_desc: "TODO"
  IST_jungle_rumbles_with_fire: "The Jungles Rumble With Fire"
  IST_jungle_rumbles_with_fire_desc: "Factories rumble where once only birds sang. The jungle comes alive as never before, with the fiery breaths of furnaces and the growl of a nascent industry. All for the Maglibing, all for Dimasupil."
  IST_focus_political_1: "Reaffirm The Oaths"
  IST_focus_political_1_desc: "Be it through favor or through fear, every chieftain must be absolutely loyal. Let them understand that their authority flows from Dimasupil alone and can be withdrawn just as easily."
  IST_focus_political_2: "His Glory Spreads"
  IST_focus_political_2_desc: "His name shall be heard, and it shall travel to every corner of our domain. Let Dimasupil's victories be known by all. Let every creature know of his strength. Our unity shall be forged by legend."
  IST_focus_political_3: "The Weak Falter"
  IST_focus_political_3_desc: "There are those who suffer and hunger as our resources are all directed towards our armies -- but any who hunger must simply work harder to find their place. Only the weak shall be left behind, the truly strong will rise stronger for it."
  IST_focus_political_4: "Mercy For The Worthy"
  IST_focus_political_4_desc: "To the peoples of the jungle, Dimasupil has shown mercy beyond any chief before him -- but beyond our borders, mercy shall not be found."
  IST_focus_political_5: "Punishment For The Unworthy"
  IST_focus_political_5_desc: "For too long, outsiders have looked upon the peoples of the jungle as backwards and disunited -- but they shall come to learn how wrong they were, and they will come to beg."
  IST_preparing_for_the_inevitable: "Preparing For The Inevitable"
  IST_preparing_for_the_inevitable_desc: "TODO"
  IST_ensure_no_hunger: "Ensure No Hunger"
  IST_ensure_no_hunger_desc: "An army marches on its stomach, and we are set to march farther than ever before. For these long campaigns across unfamiliar lands, our supply will be tested."
  IST_unleash_the_beasts: "Unleash The Beasts"
  IST_unleash_the_beasts_desc: "TODO"
  IST_we_wait_no_longer: "We Wait No Longer!"
  IST_we_wait_no_longer_desc: "Dimasupil is set upon this glorious northern campaign, and he will wait not a second longer. The world shall soon become aware of the Maglibing and of Dimasupil's name!"
