  BAR_melee_equipment_1_desc:0 "Fire-siphons are a famed Wittenlandic weapon, functioning as a basic short-range flamethrower. They have been used for centuries and remained a well-guarded secret weapon, always feared by Wittenland's enemies. A Fire-siphon is a relatively simple pump with a nozzle, used to spray burning liquid simply known as "Wittenlandic fire". The ingredients of this incendiary and sticky substance are numerous and the full recipe is only known to Wittenlandic crafters, but it is known magic is involved in its production."

