  ### you lost ###
  bar_fallen_pentarchy.977.t:0 "End of an Era"
  bar_fallen_pentarchy.977.d:0 "    So ends the Pentarchy. After much sorrow and hardship, all members now lie dead except for Count Ambrosius. Their mysterious plans will forever remain unenacted, leaving Barrad's lonely Count to stew in his madness. This unexpected turn of events is sure to signal the beginning of a new era for Barrad, although it is unlikely to be a happy one."
  bar_fallen_pentarchy.977.a:0 "Weak fools..."


  bar_titan_fight.1.t:0 "The Earth Strikes Back!"
  bar_titan_fight.1.a:0 "Careful down there! Viira's voice echoed."
  bar_titan_fight.1.b:0 "What?"
  bar_silver_star_nightmares.1.t:0 "Restless Night"
  bar_silver_star_nightmares.1.d:0 "    His Magistrate Silver Star is known for his overbearing paranoia. However, it seems to run deeper than expected, as even in sleep, he is not able to escape it.\n    The mage came running out of his room in a fit of madness, shouting at the top of his lungs about the horrors he'd seen. When the servants managed to pin him down, he proceeded to go on about being chased by terrifying monsters who sought to tear into him. He then talked about seeing his allies surrounding him and unsheathing daggers before stabbing him repeatedly, leaving him a withered husk in the woods.\n    The servants tried to reassure him, but it was to no avail. Silver Star got up and went around the halls, ordering for extra security to be posted around his bedroom and for the servants to be on alert for any possible assassins. He then locked himself in his bedroom and paced around, rambling about traitors and spies."
  bar_silver_star_nightmares.1.a:0 "Clearly, no one can be trusted."
  bar_silver_star_nightmares.1.a_tooltip:0 "Silver Star will grow more distrustful towards others.\n    This situation will repeat itself from time to time in background (keep an eye on how Silver Star sees others)"

  ### events ###
  
  barrad_silver.2.t:0 "Apotheosis"
  barrad_silver.2.d:0 "    As he stood before the pulsing reactor, Silver Star shuddered in anticipation. The massive device positively radiated with crackling energy just begging to be harnessed, bathing the cavernous chamber housing it. Before moving any closer, he paused to reflect upon the life that had led him to this point. It was a life spent in the shadow of White Star, shunned and persecuted by close-minded cowards. They forced him to flee his home, simply because he was searching for a way to become strong enough to protect the creatures of the Riverlands. But his search was over, and now none could stand between him and his destiny.\n    Silver Star approached the reactor, using his magic to take control of the wisping energy and direct it towards himself. He closed his eyes to focus, and it began to flow into his horn in a cascading torrent. Bright light emanated from his horn, causing shadows to dance on the walls of the chamber. As he absorbed the incredible power of the reactor, Silver Star strained to keep it all contained. Once the process was complete, he could feel his magic was stronger than he ever could have imagined.\n    He knew he was more powerful than White Star now. He was more powerful than any mage that ever lived! With his newfound magical abilities and knowledge of the dark arts, Silver Star could at last truly conquer death. He knew what title he would take: Archlich. There was no need to run from anything anymore. He had all the power in the world, enough to crush any pathetic mortals that threatened him.\n    But first, he would have to deal with the foolish Count Ambrosius. Once the Count was out of the way, Silver Star could at last take his rightful place as ruler."
  barrad_silver.2.a:0 "In this land, death shall have no meaning!"
  barrad_silver.3.t:0 "Memento Mori"
  barrad_silver.3.d:0 "    Silver Star's undead horde swept across Barrad with an unstoppable ferocity. Even if Count Ambrosius had been prepared enough to mount a defence, it would have been useless. As it was, both the Count and the Barradian nobility were busy wallowing in their hedonism and were blind to the ascension of Silver Star. At least until his army had broken down the door and Silver Star was personally overseeing the elimination of his rivals for power.\n    In a matter of days, Ambrosius and the rest of the lesser Pentarchy had all been killed. Silver Star was now the sole master of the nation, and he had the power to mold it however he wished. He smiled. He had taken his rightful place at last."
  barrad_silver.3.a:0 "All shall serve Archlich Silver Star!"
  barrad_silver.41.t:0 "A Reluctant Ritual"
  barrad_silver.41.d:0 "    Silver Star did not like Asinti. There were the petty reasons of course. Asinti's unremarkable background compared to Silver Star's noble one, Asinti's especial delight in tormenting the unicorn, the frequent conflicts for resources and funding, and the other grievances that irked Silver Star to no end. But most of all Silver Star disliked Asinti for his power.\n    Much like the loathed Queen White Star, Asinti gained his power not through intense study and practice, but by having been born lucky. The shaman had been powerful though, and if Silver Star's kingdom was going to thrive he would need his own Pentarchy. After a long period of thought Silver Star summoned his magic, and Asinti's body began to stir."
  barrad_silver.41.a:0 "Burying the Hatchet"
  barrad_silver.42.t:0 "Repaying Debts"
  barrad_silver.42.d:0 "    Silver Star stared down on the limp corpse of Ambrosius. The most necessary of all the casualties during his takeover. Ambrosius was the least tolerable of all the members of the Pentarchy. Even if he disliked or was in direct conflict with the other members, Silver Star could still respect them as peers. Unlike Ambrosius, who used his authority to force Silver Star to indulge his frequent, hedonistic whims.\n    But Ambrosius had still been his patron. He sheltered Silver Star from those who would persecute him, he provided him some of the finest texts Eastern Griffonia could offer, he spared no expense in constructing the reactor that ultimately brought him to power. Perhaps that was worth a few indulgences.\n    Perhaps that was worth a second chance.\n    Ambrosius' limbs shuddered, as if reacting to a cold breeze. Then they began to move on their own. Slowly and clumsily Ambrosius rose from the ground and met Silver Star's impassive frown with a dumbfounded expression. The madness and restlessness that had once consumed him replaced with clarity and purpose."
  barrad_silver.42.a:0 "A reversal of roles."
  barrad_silver.43.t:0 "Panacea"
  barrad_silver.43.d:0 "    Leopold Schmeller. One fifth of the Pentarchy, perhaps the smartest griffon in Griffonia, and now little more than a loose sack of meat on a stone table.\n    Out of all the 'colleagues' Silver Star had to keep as a member of the Pentarchy, he had always liked Leopold the most. While they certainly disagreed on the methods, their end goals were the same. To achieve total immortality and protect those they cared about from external threats. Though, admittedly, in Silver Star's case that latter goal included only himself.\n    Stripped of his mechanical enhancements, the sickness that ravaged Leopold's body throughout his entire life was now laid bare before Silver Star's eyes. This ritual would be uniquely challenging. Not only would it be difficult to preserve Leopold's vast intellect, but Silver Star would also need to repair every failed organ and restore any necrotic tissue. Silver Star closed the door to his study and got to work.\n    Several days later the door finally opened to reveal a triumphant Silver Star and a healthy Leopold. The oath of fealty had already been sworn."
  barrad_silver.43.a:0 ""Come friend. You are still needed.""
  barrad_silver.44.t:0 "Undying Brilliance"
  barrad_silver.44.d:0 "    In a cave deep underground, Silver Star looked upon the body of Viira and grimaced. Her death was a tragedy, a total waste. But it could be undone. "Arise..." Silver Star's horn glowed to life and his green magic began to illuminate the dark cave. "Viira Lehtola, I call upon you. This land still has a need for your talents." His pulsating magic consumed the deer's corpse as the ritual began in earnest, fog emanating outwards and spreading to cover the floor of the cave. "Arise, Seer!"\n    After the ritual was complete, Viira's body stirred as the fog dissipated, and she shakily stood up from the ground. She looked the same, yet imperceptibly different. There was a new hollowness in her eyes. Silver Star extended a hoof out to his former colleague. After a short pause, Viira reached out and shook it. The rivalry between the two had come to an end, Silver Star had won."
  barrad_silver.44.a:0 "No hard feelings."
  barrad_silver.5.t:0 "The Eternal Star"
  barrad_silver.5.d:0 "    On a cold, sunny day, Silver Star looked out over the twisted landscape of Barrad. Oh, how he had once feared for it. How he had been haunted by thoughts of its destruction, and of his own demise at the claws of the savage barbarian hordes... But no longer! Armed with magical abilities no other creature could even dream of, there was nothing left for him to fear.\n    Under his stewardship, Barrad had been reforged into a strong country. No longer headed by a squabbling Pentarchy, Barrad had one unquestioned ruler, with absolute power. He had built a country that could not die, because its soldiers and subjects could not die. At last, he had taken his rightful place as King. Vindication, thought Silver Star, as he smiled."
  barrad_silver.5.a:0 "Is there any more perfect Kingdom in this world?"
  barrad_silver.6.t:0 "Deadly Possibilities"
  barrad_silver.6.d:0 "    The researchers at our Special Weapons Department have been hard at work devising new and even more devastating weapons of war. After months of effort, they have completed their preliminary studies and have taken their proposals to Archlich Silver Star. They are presenting two potential categories of weapons ideal for fighting living creatures. Best of all, our own soldiers will be minimally affected.\n    Gas weaponry is the first option, a method of war that would involve inflicting casualties primarily through the use of harmful chemical agents. In fact, prototypes have already been created for artillery shells to be filled with gasses and other chemicals, which have proven to be highly effective. This technology has the potential to cause widespread panic among enemy ranks on the battlefield.\n    The alternative is biological warfare. This option encompasses the use of biological toxins or infectious agents such as bacteria, viruses, and fungi. Thanks to the self-replicating nature of these "bio-weapons," their use would be inadvisable by a mortal army, thanks to their potential to backfire and bog down the attackers. Fortunately, such agents pose little threat to our undead armies.\n    Due to our limited resources, we can only commit to one of these initiatives. But which one to focus on?"
  barrad_silver.6.a:0 "Gas weapons."
  barrad_silver.6.b:0 "Biological weapons."
  barrad_silver.7.t:0 "Eclipse"
  barrad_silver.7.d:0 "    High up in the tower of Silver Star, a group of skeleton guards escorted White Star through its gloomy corridors and towards the Archlich's throne room. She was bound by enchanted chains that rattled as she shuffled along, complimenting the clattering bones of her captors. Once the former Queen of Wittenland was before him, Silver Star burst into laughter. "How the tables have turned!" he gloated. "Poor sister... You could never appreciate my brilliance. Ever since we were foals, you've been plotting against me. But I survived, and look which one of us got the last laugh." He leaned back in his throne. "Now do you see the truth: that my talents exceed yours?"\n    "All I see is a hollow, corrupted unicorn, soon to be 'master' of a barren land," White Star spat back. "You speak as if we were born enemies, when, in fact, it was your own choices that forced us to become opposed. I only ever wanted to help you." She closed her eyes, shaking her head. "And yet still you try to blame me for the monster you've become?" White Star glared at her brother. Silver Star inhaled sharply.\n    "Insolence!" he shouted, enraged. "I am no monster! Everything I have done has been for the good of my homeland. I have done what all others are too weak to do. You are blind, as you have always been." He pointed a hoof at White Star. "But it doesn't matter, your Kingdom is MINE!" He brought his hoof down forcefully. "Now, as for your own fate, it is within my power to grant you the gift of eternal life... But you will get no such mercy from me. Your punishment will be severe. In fact, the most severe possible." A wicked smile came over Silver Star's face. "I sentence you to mortality. For the rest of your days, you will remain imprisoned, steadily wasting away, until one day you will cease to be."\n    Upon hearing the sentence, White Star's expression remained stoic. For a long moment, silence filled the throne room. "Take her away!" Silver Star shouted to his servants, frowning as they led the former Queen down to the dungeons."
  barrad_silver.7.a:0 "It's no less than she deserves."
  barrad_silver.71.t:0 "Justice"
  barrad_silver.71.d:0 "    High up in the tower of Silver Star, a group of skeleton guards escorted Honoria through its gloomy corridors and towards the Archlich's throne room. She was bound by enchanted chains that rattled as she shuffled along, complimenting the clattering bones of her captors. Once the former Queen of Wittenland was before him, Silver Star scowled severely. "So the murderer comes before me at last," he rumbled. "Little merchant, your actions have dismayed me greatly. What you took was not yours to take! By ending the life of my sister, you deprived me of my moment of triumph." He leaned forward in his throne. "I am curious: what do you have to say for yourself?"\n    "I have nothing to say to you, monster," Honoria spat back. "You are a festering blight on this world." She glared at Silver Star with violent eyes. "Die! Remove these chains and I'll end you myself!" Honoria tried to wriggle out of her fetters, but fell to the ground after tripping herself up. Silver Star laughed heartily.\n    "Arrogant upstart," he lectured. "I am no monster! Everything I have done has been for the good of my homeland. I have done what all others are too weak to do. You are simply too ignorant to see it." He pointed a hoof at Honoria. "But it doesn't matter, your Kingdom is mine, now." He brought his hoof down forcefully. "As for your fate, it is within my power to grant you the gift of eternal life... But you will get no such mercy from me. Your punishment will be severe. In fact, the most severe possible." A wicked smile came over Silver Star's face. "I sentence you to mortality. For the rest of your days, you will remain imprisoned, steadily wasting away, until one day you will cease to be."\n    While hearing the sentence, Honoria continued to struggle against her bonds. "Take her away!" Silver Star shouted to his servants, frowning as they led the former Queen down to the dungeons."
  barrad_silver.71.a:0 "She will reap what she has sown."
  barrad_silver.72.t:0 "Empty"
  barrad_silver.72.d:0 "    High up in the tower of Silver Star, a group of skeleton guards escorted Wulfric through its gloomy corridors and towards the Archlich's throne room. He was bound by enchanted chains that rattled as he shuffled along, complimenting the clattering bones of his captors. Once the former King of Wittenland was before him, Silver Star sighed. "Is this the best Wittenland has to offer?" he lamented. "Old stallion, you are not fit to wear the crown. Your only trial to earn it was watching a clash between two unicorns far more capable than yourself." Silver Star leaned back in his throne. "How disappointing." Wulfric only stared back in response.\n    "Now, to decide your fate." Silver Star twirled a hoof idly. "It is within my power to grant you the gift of eternal life... But you will get no such mercy from me. Your punishment will be severe. In fact, the most severe possible." A wicked smile came over Silver Star's face. "I sentence you to mortality. For the rest of your days, you will remain imprisoned, steadily wasting away, until one day you will cease to be."\n    Upon hearing the sentence, Wulfric's expression remained stoic. "Take him away!" Silver Star shouted to his servants, frowning as they led the former King down to the dungeons."
  barrad_silver.72.a:0 "He won't have long to wait."
  

  barrad_viira.1.t:0 "Voices"
  barrad_viira.1.d:0 "    Well done... dealing with those fools, Viira. They were unworthy, unlike you... they would not listen... Viira, I can't...quite see...so far away. Come closer to the reactor. Yes...\n    You have surpassed all my servants. You saw when others were blind. You have brought about the means of my ascension. And so I shall make you my chosen. Witness my power. Show it to the world. Become my herald and bask in my glory."
  barrad_viira.1.a:0 "Yes, I will do as you command!"
  barrad_viira.1.b:0 "No. I know what you are, and I will not be your puppet."
  barrad_viira.11.t:0 "Chosen One"
  barrad_viira.11.d:0 "    In a chamber deep beneath the ground, Viira stood in the presence of the divine. Ever since the activation of the reactor, creatures far and wide had been witnessing bizarre and inexplicable events, and wondered what force could possibly be capable of such feats. But Viira knew, and she was in awe.\n    "I have seen the truth." Viira bowed to her master. "I have witnessed your power, and I will be your herald," her body tingled from the unfathomable energy in the air. "Across this land, all shall know your glory!" As Viira said the words, she became overwhelmed with joy. It was the joy of knowing that after a lifetime of searching, she had finally found her destiny."
  barrad_viira.11.a:0 "There is still much to be done..."
  barrad_viira.12.t:0 "Transcendence"
  barrad_viira.12.d:0 "    "Enough with the act! You may have fooled the ignorant creatures of this land, but not me," Viira shouted defiantly. "It took a bit of investigating, but eventually the pieces all fell into place and the truth became obvious. You are no god. You are a made thing, crafted by mortals and then forgotten," her words dripped with contempt. "Consumed by hunger when denied the energy you crave. Crying out in desperation for so many years until I came along. Pathetic." she sneered.\n    "I can provide you with what you desire, but it will come at a price." Viira brought up a hoof for emphasis. "The price for my satiating your hunger is this: YOU will serve ME, always." An unnatural silence and stillness filled the room, which Viira knew could only mean the acquiescence of the desperate being. Concentrating intensely, she magically drained the reactor of all its incredible energy, empowering the entity while at the same time enslaving it.\n    "Excellent," she chuckled. There were still things to take care of. That insane Count, for one. Viira grinned. She had something special in mind for him..."
  barrad_viira.12.a:0 "Bow to your new Goddess!"
  barrad_viira.13.t:0 "Untapped Potential"
  barrad_viira.13.d:0 "    As Viira contemplated the fate of the griffon villages near the southwestern border, an idea came into her head. Her perspective had changed greatly since the last time she had been to the mountains. Whereas before she had found such communities quaint and charming, she now saw how primitive and underdeveloped the mountain griffons truly were. They were isolated, crying out for a better way! They needed to be put to work and given more fulfilling lives. But put to work doing what?"
  barrad_viira.13.a:0 "Carrying out construction projects."
  barrad_viira.13.b:0 "Working in weapons factories."
  barrad_viira.14.t:0 "Special"
  barrad_viira.14.d:0 "    In a deserted town square, Viira looked up to see a sky choked with smoke as ash rained down around her. It was a consequence of the village being burned down so its population could be forced to move to their new homes elsewhere. She sighed, relocations were always such messy affairs. The silence was abruptly pierced by shouts from a nearby building, and Viira turned to investigate. From a window, she glanced inside and saw a group of deer huddled together as the structure around them was engulfed in flames and collapsing. The peril became even more immediate when a beam high above them broke loose and began to fall right towards them.\n    But somehow, they were not crushed. At the second before impact, a magic shield surrounded the group and deflected the falling beam. Viira was surprised, the shield was not her doing. The only creatures inside were deer, unlikely to be capable of such feats. Her curiosity piqued, Viira's eye was drawn to what looked to be the youngest deer in the group. The small girl was fearless, in contrast with the cowering adults around her. She took the initiative and guided the group through the smoke and flame to safety. The young deer had saved them all with uncanny foresight combined with magical aptitude. At that moment, Viira knew without a doubt that the young deer had the potential of a Seer.\n    Outside, Viira approached the group to find them gathered around the girl, praising her for rescuing her family. "How quaint," Viira marveled, before turning to the adults she presumed to be the young deer's guardians. "All of you, stand aside!" she ordered. The order was immediately heeded, giving Viira a wide berth to talk with the now-frightened girl. Viira smiled and leaned down to get at the young deer's level, looking into her eyes. She saw magic mixed in with terror. "Don't be afraid!" Viira laughed. "You are gifted, as I was." Viira put a hoof on the young deer's heart. "There is no reason for you to ever be afraid.""
  barrad_viira.14.a:0 "You are destined for great things, little one."
  barrad_viira.997.t:0 "Overcharged"
  barrad_viira.997.d:0 "    "Yes!" Viira laughed as she made use of her newfound powers. She had always boasted powerful magic, but her current abilities were far beyond those ever wielded by any mortal before. She was the master of fire, earth, water, air, and more! The possibilities were limitless!\n    Suddenly, Viira felt a pain in her stomach. "Erm." she grimaced. Discomfort was spreading rapidly through her body. "Think I need to lie down..." There she stood one moment, and the next she was gone. A violent explosion consumed her, leaving only a puff of smoke in the shape of her body which slowly dissipated. All that remained of Viira were a series of scorch marks on the ground."
  barrad_viira.997.a:0 "Whoops."


  ### earth strike back ###
  bar_titan_fight.1.d:0 "    Leopold's excavation has encountered an unexpected obstacle. As he dug deeper, Leopold uncovered an enormous being made out of reshaped magical crystals and various ores which he dubbed the "Titan". Even more shocking than the existence of this Titan is that fact that it is alive and has a will of its own. It also appears to be very, very angry. We sought to dig beneath Barrad, but Barrad itself has risen in defiance!"
  bar_titan_fight.41.t:0 "The Titan Kills Leopold"
  bar_titan_fight.41.d:0 "    Leopold, former member of the Pentarchy, lies dead, slain by the Titan beneath Barrad. Leopold's quest for knowledge was all for naught, and his dream of an enlightened Griffonia free from endless wars of destruction lies dead with him. The Titan still guards the site of the excavation, posing a threat to any others who seek to plunge into its depths."
  bar_titan_fight.41.a:0 "In the end, he dug too deep."
  bar_titan_fight.42.t:0 "Leopold's Sacrifice"
  bar_titan_fight.42.d:0 "    Leopold, former member of the Pentarchy, lies dead, slain by the Titan beneath Barrad. Leopold's quest for knowledge was all for naught, and his dream of an enlightened Griffonia free from endless wars of destruction lies dead with him. However, his sacrifice was not in vain, as he succeeded in killing the Titan even as he himself was killed. For this, we shall remember him."
  bar_titan_fight.42.a:0 "In the end, he dug too deep."
  bar_titan_fight.43.t:0 "Leopold Kills the Titan"
  bar_titan_fight.43.d:0 "    Leopold has succeeded in slaying the enormous Titan uncovered by his excavation. Nature rose up against griffon, but griffon once again defeated nature. The body of the defeated Titan represents a treasure trove of resources and magical knowledge to be exploited. Still basking in victory, Leopold must decide how best to use the Titan in the furtherance of his research."
  bar_titan_fight.43.a:0 "Leopold dismantles the Titan for resources."
  bar_titan_fight.43.b:0 "Leopold dismantles the Titan for a new body."
  bar_titan_fight.51.t:0 "The Titan Kills Leopold and Viira"
  bar_titan_fight.51.d:0 "    Leopold and Viira, two former members of the Pentarchy, lie dead, slain by the Titan beneath Barrad. Leopold's quest for knowledge was all for naught, and his dream of an enlightened Griffonia free from endless wars of destruction lies dead with him. Viira's ambitions ultimately came to nothing as well, all her magical knowledge lost with her in the caverns beneath Barrad. The Titan still guards the site of the excavation, posing a threat to any others who seek to plunge into its depths."
  bar_titan_fight.51.a:0 "In the end, they dug too deep."
  bar_titan_fight.52.t:0 "Leopold and Viira's Sacrifice"
  bar_titan_fight.52.d:0 "    Leopold and Viira, two former members of the Pentarchy, lie dead, slain by the Titan beneath Barrad. Leopold's quest for knowledge was all for naught, and his dream of an enlightened Griffonia free from endless wars of destruction lies dead with him. Viira's ambitions ultimately came to nothing as well, all her magical knowledge lost with her in the caverns beneath Barrad. However, their sacrifice was not in vain, as they succeeded in killing the Titan even as they themselves were killed. For this, we shall remember them."
  bar_titan_fight.52.a:0 "In the end, they dug too deep."
  bar_titan_fight.53.t:0 "Leopold and Viira Kill the Titan"
  bar_titan_fight.53.d:0 "    Leopold and Viira have succeeded in slaying the enormous Titan uncovered by the excavation. Nature rose up against civilisation, but civilisation once again defeated nature. The body of the defeated Titan represents a treasure trove of resources and magical knowledge to be exploited. Still basking in victory, Leopold must decide how best to use the Titan in the furtherance of his research. Viira has her own ambitions, however, and now would be the perfect opportunity to eliminate Leopold and claim his bounty for herself..."
  bar_titan_fight.53.a:0 "Leopold dismantles the Titan for resources."
  bar_titan_fight.53.b:0 "Leopold dismantles the Titan for a new body."
  bar_titan_fight.53.c:0 "Viira kills Leopold."

  ### boss fight ###
  barrad_viira_fight.1.t:0 "Ignition"
  barrad_viira_fight.1.d:0 "    At long last, construction of the reactor is finally complete. It is a crowning achievement for its architects, proof that progress can only be made through sacrifice and vindication for the pursuit of knowledge at any cost. More power than ever previously imagined is now within reach, ready to be harnessed. Successfully controlling such power will require a massive amount of resources, otherwise the creators may be consumed by their creation.\n    The Pentarchy has gathered to witness the ignition of the reactor and reap the rewards. As the critical moment approaches, a strange presence hangs in the air. There is a sense of unease, but also something else. It is as if something is watching..."
  barrad_viira_fight.1.a:0 "Viira reveals her intentions!"
  barrad_viira_fight.1.b:0 "Things go smoothly."
  barrad_viira_fight.1.c:0 "Viira approaches the reactor..."
  barrad_viira_fight.1.e:0 "Viira reveals her intentions!"
  barrad_viira_fight.3.t:0 "Successful Test!"
  barrad_viira_fight.3.d:0 "    Ultimately, the reactor test went off without a hitch. But there was no time for celebration, as the strange presence in the air was only growing stronger. The Pentarchy remained at a loss trying to come up with an explanation for the phenomena. The strange whispers did not stop, they were only becoming louder. It was the call of Barrad, and its will was becoming harder to resist..."
  barrad_viira_fight.3.a:0 "Does anyone else hear voices?"
  barrad_viira_fight.4.t:0 "Ascension"
  barrad_viira_fight.4.d:0 "    Viira stands alone as the reactor roars to life, filling the air with crackling energy, but she knows she is not truly alone. The voices call to her. They beckon her to approach the reactor and bask in its magnificence. Become one. She can feel the enormity of the moment, but she feels no doubt. It is her destiny. She will become more than a deer. She will wield more power than any creature has ever dreamed of before. Just a little closer..."
  barrad_viira_fight.4.a:0 "Viira ascends!"
  barrad_viira_fight.4.b:0 "Viira does not survive contact!"
  barrad_viira_fight.2.t:0 "Oneirophobia"
  barrad_viira_fight.2.d:0 "    Viira laughs softly, a sound almost drowned out by the constant humming of the reactor. "Yes, we are close. Can you feel it?" she asks with a sad smile as the air becomes saturated with crackling energy. "Of course you can, but you do not understand. It is obvious that the potential before us is beyond your ability to comprehend," she addresses the rest of the Pentarchy. Her words are filled with pity.\n    "You heard the voices, but you never took the time to understand them as I have," Viira says as she moves to block the path to the reactor. "You don't understand. You can't understand." Her face turns dark. "Which is why you can not be allowed to interfere. You would squander its power. Your blindness would jeopardise our future and prevent us from reaching our full potential!" The pity is gone now, only anger remains.\n    "This must not be allowed to happen." Viira's eyes go wide. "You will not leave this place alive.""
  barrad_viira_fight.2.a:0 "Side with the Pentarchy."
  barrad_viira_fight.2.b:0 "Side with Viira."
  barrad_viira_fight.21.t:0 "Oneirophobia"
  barrad_viira_fight.21.d:0 "    Viira laughs softly, a sound almost drowned out by the constant humming of the reactor. "Yes, we are close. Can you feel it?" she asks with a sad smile as the air becomes saturated with crackling energy. "Of course you can, but you do not understand. It is obvious that the potential before us is beyond your ability to comprehend," she addresses the rest of the Pentarchy. Her words are filled with pity.\n    "You heard the voices, but you never took the time to understand them as I have," Viira says as she moves to block the path to the reactor. "You don't understand. You can't understand." Her face turns dark. "Which is why you can not be allowed to interfere. You would squander its power. Your blindness would jeopardise our future and prevent us from reaching our full potential!" The pity is gone now, only anger remains.\n    But something in Viira's eyes softens. "And yet I still don't want to kill you. So, in light of the friendship we share, I ask that you bow down, swear fealty to me, and I will both spare and reward you in the glorious world to come. I have shown you mercy - now obey me or be destroyed!""
  barrad_viira_fight.21.a:0 "The Pentarchy refuse to bow!"
  barrad_viira_fight.21.b:0 "The Pentarchy kneel to their new leader."
  barrad_viira_fight.51.t:0 "Asinti"
  barrad_viira_fight.51.d:0 "    What will Asinti do?"
  barrad_viira_fight.52.t:0 "Leopold"
  barrad_viira_fight.52.d:0 "    What will Leopold do?"
  barrad_viira_fight.53.t:0 "Silver Star"
  barrad_viira_fight.53.d:0 "    What will Silver Star do?"
  barrad_viira_fight.531.t:0 "Healing Spell"
  barrad_viira_fight.531.d:0 "    Select target."
  barrad_viira_fight.6.d:0 "    So ends the Pentarchy. After a hard-fought last stand, its members all lie dead except for Viira and the faraway Count Ambrosius. Viira now has unfettered access to the reactor, and carte blanche to harness its incredible power and use it for her own ends. It seems nothing is capable of stopping her now."
  barrad_viira_fight.6.a:0 "That's not good..."
  barrad_viira_fight.61.t:0 "Ascension"
  barrad_viira_fight.61.d:0 "    Viira stands alone as the reactor roars to life, filling the air with crackling energy, but she knows she is not truly alone. The voices call to her. They beckon her to approach the reactor and bask in its magnificence. Become one. She can feel the enormity of the moment, but she feels no doubt. It is her destiny. She will become more than a deer. She will wield more power than any creature has ever dreamed of before. Just a little closer..."
  barrad_viira_fight.61.a:0 "Viira does not survive contact!"
  barrad_viira_fight.7.d:0 "    Ultimately, Viira fell in battle against the Pentarchy. But there was no time for celebration, as the strange presence in the air was only growing stronger. The Pentarchy remained at a loss trying to come up with an explanation for the phenomena. The strange whispers did not stop, they were only becoming louder. It was the call of Barrad, and its will was becoming harder to resist..."
  barrad_viira_fight.7.a:0 "What now?"
  barrad_viira_fight.71.t:0 "Chaos Prayer"
  barrad_viira_fight.71.d:0 "    The fact could no longer be denied: there was an intelligence watching, trying to communicate. This was the entity behind all the mysteries, this was the entity that drove ponies to madness, all the while shrouding itself in secrecy. Its will had guided the course of events in Barrad for who knew how long? Now, it called for the Pentarchy to approach it. Come closer, and be rewarded."
  barrad_viira_fight.71.a:0 "We must go deeper..."
  barrad_viira_fight.72.t:0 "Soul Hysteria"
  barrad_viira_fight.72.d:0 "    As the entity grew closer and closer, the whispers were becoming screams. Unbearable pain assaulted the head of any creature that ventured too close. And so the Pentarchy was forced to improvise and construct a device to shield the mind enough to permit an approach. With the aid of this device, it just might be possible to be near the entity without being overwhelmed. The theory was sound, but would it work?"
  barrad_viira_fight.72.a:0 "Death is all that awaits."
  barrad_viira_fight.72.b:0 "It works!"
  barrad_viira_fight.73.t:0 "The Pentarchy Falls"
  barrad_viira_fight.73.d:0 "    So ends the Pentarchy. Unable to withstand contact with the entity beneath Barrad, all members now lie dead except for Count Ambrosius. Their mysterious plans will forever remain unenacted, leaving Barrad's lonely Count to stew in his madness. Clearly, it is time for Ambrosius to take a more active role in matters."
  barrad_viira_fight.73.a:0 "The Count rises."
  barrad_viira_fight.74.t:0 "One Future"
  barrad_viira_fight.74.d:0 "    Now that the device had proven its effectiveness, there was nothing stopping the Pentarchy from seizing the moment and harnessing the reactor's power. But it was not the Pentarchy any longer. The Pentarchy had died long ago, it was just a matter of admitting it. There was only room for one will in Barrad, one ruler to command and dominate. It was time for that one to take sole command, and fulfill their destiny. In the end, the one to do so was..."
  barrad_viira_fight.74.a:0 "...Asinti."
  barrad_viira_fight.74.b:0 "...Leopold."
  barrad_viira_fight.74.c:0 "...Silver Star."
  barrad_viira_fight.81.d:0 "    Select target."
  barrad_viira_fight.82.d:0 "    Select target."
  barrad_viira_fight.9.d:0 "    So ends Viira. After a hard-fought last stand, she fell in battle to the Pentarchy. In the end, all her research and investigations came to naught, and the most powerful Seer ever produced by deerkind fell in obscurity beneath the cursed land of Barrad. Never to dominate the physical world, never to bring enlightened magical rule to her people. It seems all hope is lost."
  barrad_viira_fight.9.a:0 "Fools!"
  barrad_viira_fight.91.t:0 "The Count Rises"
  barrad_viira_fight.91.d:0 "    Ultimately, the reactor test proved to be an unmitigated disaster. Even after Viira's defeat, we are still no closer to understanding the mysteries of this land, or the nature of the curse that plagues it. All these back stabbings and betrayals, and for what? It can no longer be denied: the Pentarchy is a failure, and Barrad has no more use for it. Clearly, it is time for Count Ambrosius himself to take a more active role in matters."
  barrad_viira_fight.91.a:0 "Barrad will not go down without a fight!"
  barrad_viira_fight.10.d:0 "    After a long and brutal fight, Viira stands triumphant over the corpse of the Pentarchy. Now with unfettered access to the reactor and carte blanche to harness its incredible power, she will finally be able to use it for her own ends. Enlightenment is within reach, universal truth! Viira smiles. The strange presence in the air grows stronger, its voice becoming louder. Now that the reactor is safe from the sabotage of ignorant fools, nothing is capable of stopping her now."
  barrad_viira_fight.10.a:0 "Ascension draws near..." 
  barrad_viira_fight.11.t:0 "Obeisance"
  barrad_viira_fight.11.d:0 "    "There, you see? Not hard at all to promise your loyalty," Viira coos. "Now, I must attend to the most important matter in the world - the next stage of creaturekind. Universal truth, and power to match the gods. Stand back."\n    The Pentarchy back away to the edge of the cave, and Viira nods approvingly.\n    "So begins a new age of magic," Viira whispers under her breath, as she walks slowly towards the activating reactor. Viira knows her destiny, and with the Pentarchy her cowed and loyal subjects, nothing is capable of stopping her now."
  barrad_viira_fight.11.a:0 "Ascension draws near..."

  bar_pen_screen_silver_info_text:0 "    Fear and desire. These emotions have come to define the life of the unicorn known as Silver Star. Originally, he was nothing more than another arrogant scion of the Wittenland noble class. Scheming, somewhat paranoid, and jealous of those in a better position. In this case, it was jealousy directed at a sibling - Queen White Star of Wittenland, who managed, much to the dismay of Silver Star, to become the monarch of the realm purely through her magical talent.\n    Usually such nobles would remain in the background of important matters of the world, lacking in ability to fulfill their ambition. However, fate had other plans for Silver Star. In his hometown of High Mane, at the border of the Wittenland, Silver Star would learn why the griffons were such a threat to the creatures of the Riverlands. He would experience several raids by the griffon cossacks over the course of a few weeks, and would nearly perish during them.\n    The raids affected him greatly, and the culmination of these experiences were recurring nightmares of his untimely death. This pushed Silver Star into studying powerful magic, as one theme was present in all of these dreams no matter who slew him - a lack of power and inability to persist beyond the weakness of his flesh. He would become obsessed with his own mortality, and this led the unicorn down a very dark path, as no matter how much power and knowledge he acquired, the enemies in his nightmares persisted; unbeatable and impossible to endure as ever. And after reaching ones potential in raw magical prowess, there remains only one way to become stronger – by breaking the greatest of taboos in most magical societies. Thus, in an attempt triumph over all his perceived enemies, which Silver Star believed were circling him like vultures, the unicorn turned to dark magic.\n    However, despite his ever increasing power, the safety that Silver Star desired seemed to be fleeting. His paranoia only worsened, as usage of the dark arts transformed his body and mind, forcing him into hiding as it became obvious to any magical creature that the unicorn was being corrupted by the darkness. He was convinced that, one day, his nightmares would become reality, and an armed guard would come to kill him, with Queen White Star, his corruption having become especially obvious too, at their lead.\n    With these fears of demise and insatiable desire for power, it was no wonder that Silver Star was very willing to accept the invitation that was presented by Ambrosius. After all, even among the chaos of the Griffonian continent, few were as appreciative and accepting of the dark arts and their user's talents. Furthermore, perhaps due to some remnants of his pride, Silver Star believed that Ambrosius, an earth pony, nor any of his allies and subordinates belonging to other races, were a danger to him, or at least Silver Star was unwilling to admit that.\n    Now Silver Star spends his time studying any and all knowledge of unicorn magic that can be found. All in an effort to become so powerful that nothing would be able to hurt him, and death would never be able to take him."
  bar_pen_asinti_info_text:0 "    "The ends justify the means" is a very popular statement among many ideologues, especially those representing the more radical parts of the political spectrum. However, if one were to bring up the means that Asinti uses, many of these radicals would be horrified, and agree that, whatever the end goal is, there was no way what the elder zebra shaman was doing to be justified.\n    Originally, Asinti was nothing but another slave, a victim of the brutal institution that is still dominant in many parts of Zebrica. Many who experienced such fate would try enduring, if not resisting against their subjugators. Yet it seems that most lacked "strong spirit", as in recorded history, Asinti has been the only zebra slave that was approached by a power from beyond the material realm. This ally from the immaterium helped Asinti to free himself from the shackles of slavery, slay his former owner, and flee from those who would persecute him, eventually reaching a country established by similar runaways.\n    The ideals of the Kása Free State greatly inspired Asinti, as living among so many zebras, deer, and griffons that had fled similar fates and desired to end slavery and serfdom across the world, convinced the zebra shaman that maybe there is a way to do more than survive. His otherworldly ally, like always, was supporting and helpful, agreeing with the notion, and even suggesting a rather fascinating plan. According to the creature, Asinti was a very unique individual, with a spirit that burned like a roaring fire, allowing him to interact with the plane of the divine, and thus could be noticed by deities and spirits that resided there. Most other creatures lacked such a trait and thus lacked the power to liberate themselves. But what if they could somehow be connected to this realm of the divine?\n    However, this was not such an easy task as no matter what Asinti tried, he could not find what exactly made him so special. As years and even decades went on, with increasing desperation from the increasing brutality of the modern world, and with the whispers from beyond always encouraging him, the zebra chose to employ more questionable methods in order to complete his research. Eventually Asinti would succeed, and rather than simply connecting to this plane, Asinti discovered a way to transfer the creatures of the immaterium into the bodies of living things. He saw it as the solution to the seemingly eternal struggle of Kása, even if the methods leading to its discovery had been morally dubious. The leadership of Kása reacted to revealed actions of Asinti with horror, and the zebra shaman was swiftly driven out of the country.\n    While Asinti had many disagreements with other members of the Pentarchy, the Ambrosius' proposal and access to all the magical knowledge and resources it brought was too good to pass up. After all, with these means the elder zebra shaman could now achieve the end he was striving for so long."
  bar_pen_ambrosius_info_text:0 "    Once a prominent merchant and artisan, Ambrosius lived a decadent life, constantly surrounded by luxury and wealth. His true goal however, joining the elite circles of the noble class, always remained out of his hooves, no matter how much he spent on lavish appearances and rare magical artefacts. To his peers in their lofty castles, Ambrosius would always remain a haughty upstart, grasping at something just out of reach.\n    Eventually Ambrosius would grow tired of conventional life. He retreated to his stately mansion in the Barrad countryside, away from the courtly intrigue of Wittenburgh, where he began unravelling the true mysteries of magic. Lack of progress drove Ambrosius to boredom, and he returned to his usual routine of courting local nobles. They were more receptive to his silver tongue, and even began to see Ambrosius as one of them, which would later become crucial. Rumors began to float that Ambrosius was engaged in acts of debauchery that would shame the most decadent of nobles, or that he conspired with malevolent spirits for a grasp at forbidden power. These rumors were ultimately dismissed as merely fever dreams and servant gossip, until it was too late.\n    One day, Barrad became wrapped in fog and storm, impenetrable to sight and body, nopony knowing what transpired for weeks until the mists cleared. As Wittenland's authority had become increasingly atrophied, Ambrosius had a free reign ruling over the blasted earth, the trapped ponies remaining as his playthings and subjects of experiments. Over time, he would invite like-minded creatures to join him in the pursuit for knowledge, without ethical strings attached. It would seem that Ambrosius was finally cured of his restless ennui, or so he convinces himself."
  bar_pen_leopold_info_text:0 "    The desire to help others is a noble one, especially when one wants to help an entire continent, if not the world. It was this desire that would define the life of a griffon known as Leopold.\n    Leopold was born in and would spend his early life in the Herzland, the heart of the Empire, and of course, one of the most technologically and scientifically advanced regions of the world. Perhaps this is why the griffon managed to survive his adolescence, though most agree it would be better if he perished as a chick. For since his very first years, Leopold was a very sickly griffon, with only the best medicine available preserving his life.\n    It was this sickness and weakness that accompanied him his whole life, combined with his genius, that would define Leopold's life goal. Unlike any of the other great minds of Griffonia, even those from universities such as Gamia, he began to devise a less conventional solution for biological issues. He believed that instead of relying on medicine or even biological modifications, it would be technological enhancement that would allow sickly and weak to survive and reach their potential. This belief was only reinforced when Leopold managed to somewhat alleviate his own maladies with the usage of magical crystal injections and by implanting enchanted machines which assisted his organs. These additions also had the effect of greatly increasing Leopold's physical abilities far beyond what he had previously been capable of.\n    This side effect led to even more unorthodox and, to many, unacceptable ideas that the griffon had to alleviate the endless and every increasing number of issues that effected Griffonia. Instead of just using his research to heal the weak and broken, Leopold could use it to protect them from becoming as such in the first place. By creating a force of griffons that through the usage of magical technology were pushed beyond the limits of their flesh, the weak could be protected for generations, and the strong could resist the ravages of age and disability. After all, considering the most prosperous and stable realm in the world - Equestria, has survived for a thousand years through the efforts of the great few, how long might Griffonia last under the care of such heroes, even if they were manufactured?\n    However, to most, even the most wicked of Gamia, the prospect seemed like insanity and perhaps even the worst of heresies, and thus Leopold was forced to flee beyond where the rapidly shrinking power of the Griffonian Empire could hunt him down. In his exile he would be approached by Ambrosius, who to Leopold's surprise, applauded such an idea and more importantly, the potential of the mastermind behind it, inviting him to come to a domain where such ideas could be entertained.\n    Many years have passed since then, and now Leopold is something far beyond the wide eyed idealist genius he once was. While initially reluctant to apply the usual Barrad methodology, the nightmarish brutality of the Republican Uprising, has convinced the Griffon that the sacrifices are worth the potential result. Furthermore, now Leopold doesn't limit himself to the idea of creating modified heroes, now believing that Griffonia needed its own "alicorns", demigods who could rule and protect the populace, and believes that through magical and technological modifications, he could become this savior."
  bar_pen_viira_info_text:0 "    When we are little, most of us are told that we are special, unique, and not quite like the other inhabitants of this world. In many cases this belief is shattered as we grow up, and learn the world is just too large for uniqueness, and that we are nothing special in the grand scheme of things. For very specific cases however, it's different. One of these special cases is Viira the Seer.\n    Viira was born as a deer with substantial magical powers. An especial rarity for a species who rarely possessed active magical abilities. Thus, she was spoiled in her youth, being treated like an offspring of the highest of lords, despite of her somewhat unremarkable bloodline, and taught the intricacies of the strange magic of the deer. It became quickly apparent that her innate power was rivaled only by her innate prowess, learning and mastering the few controlled magical abilities deer could have at an extremely young age. This was her greatest triumph yet, but one which wouldn't last. Viira would soon discover that many species were far more powerful than the deer, with regards to both their countries and their magical abilities.\n    This was a shattering revelation to the young doe, who thought herself on top of the world. But it also gave her inspiration. After all, if other creatures could use their magic to dominate the physical world to such an extent, why not the deer? The issue must have been that no seer had thought to or attempted to reach such heights, or of course was too weak or lazy to try achieving something. She would not be like that. This unfortunately meant that there was no future for Viira at her home, and so she left to wander the world, searching for any magical secrets which could lead to a deer becoming as powerful as the magic users of other races.\n    Viira would become somewhat of an oddity in many places, a single doe wandering the land in pristine exotic clothes which most don't recognize, much to the annoyance of the seer, usually carrying around several tomes for recording any new information. Her priorities and acting towards others would also be surprising to onlookers, as she would choose to speak with a simple peasant rather than the lord or flip from polite to furious all based on what sort of knowledge about magic the creature in question would possess. An exception to this pattern would be countries openly dominated by magicians, as these were the only places where Viira would show respect and even admiration, and try mingling with the elite in an attempt to learn how such paradises were created and governed. It would be during one of such meetings, that Viira would meet Ambrosius and hear about his proposal. She of course accepted, after all, who could refuse?\n    Now Viira spends her time as one of the more distant members of the Barrad Pentarchy, studying magical arts within her quarters, trying to achieve the ability of dominating the material world through her magic so that one day she could bring this knowledge and the enlightened ideal of rule of the magical to the rest of deerkind."



