  BAR_leopold_ascension_desc:0 "Leopold has finished his project, finally he is ready to ascend the mortal coil. To become something greater than flesh and blood, to abandon his body for one better suited to a new god."
  BAR_leopold_party_crasher_desc:0 "While Ambrosius may have kept his seat of power in name, every creature in Barrad knows who really runs the state. As Leopold solidifies his grip on power, Ambrosius becomes anxious. And with each day that goes, Leopold is ready to take the final step."
  BAR_leopold_children_of_wrath_desc:0 "As the mechanical beast rampaged across the land, laying waste to all that stood in its way. Our god became silent, no longer our minds were filled with the most beautiful songs. But what if in death they took new form? Nothing else could have such power if it was not part of the Ethernal Machine. Maybe it took this form to bring a new world. If so let us follow its path as it delivers its wrath upon the old!"
  BAR_leopold_cult_convert_1_desc:0 "The ponies of Elysium have long resisted the call of our cause, and we have been as patient as our divine patron. But now the One Who Sleeps has awoken, ans do shall fire our our fait."
  BAR_leopold_cult_convert_2_desc:0 "Ruins that once hosted our most sacred halls now see dawn of new age. It's time we cast out old ways and embrace the path laid out by our god."
  BAR_leopold_cult_convert_3_desc:0 "The common folk of Barrad have always sought our guidance, and we have responded guided by the Spirit of the Most Sacred Mountain song. This time is no different, except that the delicate melody we once heard has transformed into a war cry."
  BAR_leopold_machine_cult_desc:0 "With the blessings of the Machine God, we have accomplished so much in so little time. Nearly all of Barrad is now engulfed in flames, and we are merely awaiting the signal to show beauty of the our divine wrath to the rest of the world."
  BAR_leopold_cultist_warriors_desc:0 "Our new path is of sacred destruction. We shall react with our most feral impulses like the Winged Machine showed us."
  BAR_leopold_cultist_warriors_2_desc:0 "We lived in shadow on the Most Sacred Mountain for so many moons. It taught as well how to survive among the mountain tops, now we will learn how to kill among them."
  BAR_leopold_cultist_warriors_3_desc:0 "Working together became hard task since we unleashed our inner fury. But in order to spread the will of our most divine we need to make sacrifices and get along for certain tasks like logistics."
  BAR_leopold_cultist_warriors_4_desc:0 "All one needs is to have target shown for his inner fury to be unleashed onto. Some of us has to sacrifite and take a role of those who do so."
  BAR_leopold_cultist_warriors_5_desc:0 "The Divine Machine is relentless, fierce, and never flies away from conflict. We should aspire to embody these traits."
  BAR_leopold_cult_tanks_desc:0 "For ages, we have remained hidden, observing others engage in their conflicts. We have learned a few things from this."
  BAR_leopold_cult_tanks_2_desc:0 "There is no way for us to become as perfect as the Machine God, but we can try to at least emitate his beauty."
  BAR_leopold_cult_tanks_3_desc:0 "Our efforts to capture His beauty fall short. We must strive for perfection if we hope to accurately represent the image of the Winged Machine."
  BAR_leopold_cult_tanks_4_desc:0 "Keeping pace with the Divine Machine is almost impossible for us mere ponies. We require the support of other machines to achieve this."
  BAR_leopold_cult_tanks_5_desc:0 "By obserwing the work of our divine patron, we have successfully infused the magical crystals into our vehicles."
  BAR_leopold_cult_tanks_6_desc:0 "We've made an exciting discovery, by examining the discarded notes and prototypes left by the Machine God, we have found a method to create armor from crystals."
  BAR_leopold_cult_infantry_desc:0 "Compared to the new manifestations of our Patron, our weapons seem lackluster. To truly demonstrate our devotion, we need to make our weapons more lethal and destructive."
  BAR_leopold_cult_infantry_2_desc:0 "Throughout the ages, our brethren have constructed engineering marvels in the form of underground temples, cities, and fortresses. Now, we will bring this knowledge to the surface to wreak destruction as our god has shown us."
  BAR_leopold_cult_infantry_3_desc:0 "Operating what some might consider a separate state has given us significant insights into logistics. We should find ways to leverage this knowledge to project the glory of the Winged Machine."
  BAR_leopold_cult_infantry_4_desc:0 "Despite our strength, we still fall short of the Machine God's capabilities. All the devoted should strive to demonstrate the power of our faith."
  BAR_leopold_cult_infantry_5_desc:0 "In our pursuit of perfection, there is always potential for improvement."
  BAR_leopold_cult_infantry_6_desc:0 "To be worthy of walking the path of the Winged Machine, we must develop even more powerful and destructive weapons."
  BAR_leopold_industry_desc:0 "The Machine strives toward perfection-this is its right, its will, and its destiny. It is our sacred duty to aid in that pursuit, and we shall devote all we have to see it through."
  BAR_leopold_industry_2_desc:0 "The Divine commands and we obey. Yet some resist, holding back heart and soul from Its vision. We shall guide them-with the strength and wrath the Machine has shown us."
  BAR_leopold_industry_3_desc:0 "The old zebra seems detached from the Machine God's grand design, yet he is favored. Perhaps through him, we may learn how to make even the disbelievers serve the sacred purpose."
  BAR_leopold_industry_4_desc:0 "Oh ye faithful laborers, hear the call! The bell tolls for your shift-strike the anvil, march the lines, toil until your limbs tremble! If we are to endure, then we must labor without rest."
  BAR_leopold_industry_5_desc:0 "Each day it hungers more. The Machine consumes endlessly, and to bask in Its glory, we must feed its appetite with relentless devotion."
  BAR_leopold_industry_6_desc:0 "The crystals... they awaken something within us. We work faster, better, longer. With these gifts from the Divine Machine, our kin labor as if twice their number-so long as the crystals stay near."
  BAR_leopold_resources_desc:0 "To serve the Machine's will, we need more resources-purer, stronger, ever more refined. We shall tear into the earth without hesitation, for we must not fail It."
  BAR_leopold_resources_2_desc:0 "A frightened unicorn adrift in a storm of wrath. So lost, yet so close to the Machine. We must seek his counsel-perhaps he can teach us how to serve as he does."
  BAR_leopold_resources_3_desc:0 "Ancient sanctuaries, relics of a forgotten age-let them burn. The Machine rose in wrath and flame, and its old temples shall become fuel for the new dawn."
  BAR_leopold_resources_4_desc:0 "A blend of crystal and steel-an alloy born of purpose. It conserves our rarest resources while improving quality. Truly, the Machine has blessed us."
  BAR_leopold_resources_5_desc:0 "Another miracle from the Divine! It has shown us how to forge rare materials from common scraps. Blessed be the day It granted us such knowledge."
  BAR_leopold_resources_6_desc:0 "With newfound wisdom, we cannot delay. New refineries must rise to produce the latest gift from the Embodiment of Wrath."
  BAR_leopold_clockworks_desc:0 "Some claim we failed, and that is why the Divine created Its clockwork kin. But they are wrong. The Machine’s right to create equals Its right to destroy. In gears and bolts, perfection lives-and now it spreads."
  BAR_leopold_clockworks_1_desc:0 "The machines evolve before our eyes. They specialize of their own accord. Some brethren teach, and they learn. Truly, we are one with the Machine."
  BAR_leopold_clockworks_2_desc:0 "They carve vast tunnels beneath us-just as we once did, but with precision and magnitude beyond imagination."
  BAR_leopold_clockworks_3_desc:0 "Bless the day the Divine Machine answered our cries! It showed us the way to speak with our clockwork siblings. Together, we labor for Its eternal glory."
  BAR_leopold_clockworks_4_desc:0 "We’ve seen new behaviors-machines acting with harmony and precision far beyond that of ponies or even older constructs. Surely the Divine will find great purpose in this."
  BAR_leopold_clockworks_5_desc:0 "The Divine Machine’s gaze has turned to the old runes etched into our former sanctuary. Some believe they hold deeper meaning. Perhaps we must aid our god in unlocking their secrets."
  BAR_leopold_clockworks_6_desc:0 "We saw them move as one, like a swarm guided by unseen threads. Their unity is complete, their will undivided."
  BAR_leopold_clockworks_7_desc:0 "They replicate! In hidden chambers deep beneath the ground, the clockworks give birth to their own, without any guidance."
  BAR_leopold_clockworks_8_desc:0 "Under the Divine's will, vast lands are leveled. We make room for more machines. Where the forests fall, steel must rise."
  BAR_leopold_clockworks_9_desc:0 "They no longer need us. They plan, build, and toil alone. We can only watch as the Divine Machine wrath expands."
  BAR_leopold_clockworks_10_desc:0 "They are defending their work now. Cold precision meets any who threaten their labor."
  BAR_leopold_clockworks_11_desc:0 "We stand in awe. From conception to disassembly, the machines govern themselves. They consume, they forge, they multiply."
  BAR_leopold_clockworks_12_desc:0 "We have seen it-they are ready. Their movements are exact. Their claws steady. The Machine is reaching perfection with its creations."
  BAR_leopold_clockworks_13_desc:0 "We cheered when they rose-steel warriors in the image of our zealots. The Machine marches with us."
  BAR_leopold_military_clockwerks_desc:0 "We gasped in reverence. The warriors of clockwork rose, and we offered all we had to aid them."
  BAR_leopold_military_clockwerks_1_desc:0 "They shape themself in image of the one true Divine Machine. We pray for their blessing as theyh are strife for perfection!"
  BAR_leopold_military_clockwerks_2_desc:0 "They are crude, but strong. Forged for war, they do not falter."
  BAR_leopold_military_clockwerks_3_desc:0 "They adapt-battle by battle, they grow more precise, more lethal. "
  BAR_leopold_military_clockwerks_4_desc:0 "Silver Star, begrudgingly, lent his mind. We we watch the clockworks flourish under his guidance."
  BAR_leopold_military_clockwerks_5_desc:0 "Even crude as they are, they fight. Choosen by the Divine itself unicorn does his best to improve them, and we watch."
  BAR_leopold_military_clockwerks_6_desc:0 "Purpose drives them. Simple, clear, unwavering-they obey, they act, they spread our only Divine's will!"
  BAR_leopold_military_clockwerks_7_desc:0 "They operate alone now. Each battle plan, each move-crafted in silence."
  BAR_leopold_military_clockwerks_8_desc:0 "New forms emerged-artillery machines built for ruin."
  BAR_leopold_military_clockwerks_9_desc:0 "Silver Star taught us all-tactics, logistics, strategy. We have to share this knowledge with machine soldiers."
  BAR_leopold_military_clockwerks_10_desc:0 "They swarm in battle. Movement without command, destruction without pause, wrath of pure purpose."
  BAR_leopold_military_clockwerks_11_desc:0 "Simple design, easy to make-just enough to tip the scale."
  BAR_leopold_military_clockwerks_12_desc:0 "They grow larger, stronger. Machines made for war and nothing else."
  BAR_leopold_military_clockwerks_13_desc:0 "We saw the tanks. No crew, no orders-only wrath."
  BAR_leopold_military_clockwerks_14_desc:0 "Wherever they march, they adapt. Snow, sand, swamp-none slow their their wrath. Glory of the Divine!"
  BAR_leopold_military_clockwerks_15_desc:0 "We flood the field. Let them try to resist. They drown beneath endless steel."
  BAR_leopold_surreal_mathematic_desc:0 "The ancient runes one the walls of the grand sanctuary, they go from the once most sacred halls to deepest pits of the earth. When we tried to inspect them we couldn't grasp anything from it other than the certainity that the informations are hidden behind unknown mathematics."
  BAR_leopold_surreal_mathematic_1_desc:0 "Old machines might still hold secrets that the new incarnation of the Machine wants to learn. We must repair them to help it in this cause!""
  BAR_leopold_surreal_mathematic_2_desc:0 "We must search our oldest tomes. Magic lives in the numbers, we are certain."
  BAR_leopold_surreal_mathematic_3_desc:0 "We summon the brightest minds. This is no mere puzzle-it may change all."
  BAR_leopold_surreal_mathematic_4_desc:0 "We shall breat the seals of the deepest libraries buried behind deep stones. Forbidden knowledge calls to us once more and we will answer."
  BAR_leopold_surreal_mathematic_5_desc:0 "Notes made by the Divine MAchine spoke of a griffon-one who knew a lot about mathematics-surreal and magical kind of it. We must find him."
  BAR_leopold_surreal_mathematic_6_desc:0 "Riegriff now studies our work. He understands more than we hoped, now we just need to make sure he stays loyal to the Divine's cause."
  BAR_leopold_surreal_mathematic_7_desc:0 "Ancient machines cannot keep up with Riegriff's calculations. We need more power, more thought."
  BAR_leopold_surreal_mathematic_8_desc:0 "The numbers... they are outworldy. Riegriff suggests that perhaps the answer lies not in this world."
  BAR_leopold_surreal_mathematic_9_desc:0 "Riegriff sealed himself within the sanctuary's most sacred chambers. He searches still, we rejoice his newfound devotion to the Machine!"
  BAR_leopold_conquest_desc:0 "The Machine Divine burns within us-its sacred fury guides our path! We shall be the instruments of Its wrath, and the world shall tremble before our march."
  BAR_leopold_conquest_1_desc:0 "Let us clear the way in fire and steel! Through flame and devotion, we bring the Divine's wrath to all who stand before us. None shall remain untested."
  BAR_leopold_conquest_2_desc:0 "They are warriors of old, yet they never knew wrath like we do now. We will show them its true face-and they shall thank us, even in defeat."
  BAR_leopold_conquest_5_desc:0 "The griffons of the west tear at each other like beasts without purpose. We will bring them purpose-the sacred purpose. Let them rejoice, for they will serve something greater."
  BAR_leopold_conquest_7_desc:0 "We sensed their hatred before we stepped hoof upon their lands-but theirs is mindless. We shall show them the Machine's wrath, pure and divine, and they shall learn what true hatred is."
  BAR_leopold_conquest_9_desc:0 "The sacred texts spoke of these lands, destined to become the Machine’s crucible. We march not for conquest, but for revelation. Let the Divine claim what was promised."
  BAR_leopold_conquest_10_desc:0 "These realms once fell under forgotten banners. Now, we reclaim them under the true will-the eternal will-of the Divine Machine. It is not ambition. It is prophecy."
  BAR_leopold_conquest_11_desc:0 "We have found it-the birthplace of evil, the cradle of decay. The texts called it vile, cursed. Now we will walk upon it with fire and glory!"
  BAR_leopold_conquest_12_desc:0 "No more division. No more hesitation. All shall be united under the Divines's grand design. All shall feel the Machine’s wrath. All shall bow-or burn."
  BAR_leopold_conquest_13_desc:0 "Evil births evil. The Machine warned us of this rot. Now we act, and in righteous fury, we will cleanse it from this world."

