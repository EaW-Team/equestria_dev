  bar_expedition_decrease_text:0 "-"
  bar_expedition_loot_gasienica:0 "Possible loot:\n\n5%  Political Power §G+25§!\n5%  Political Power §G+50§!\n10% Political Power §G+75§!\n10% Political Power §G+100§!\n5%  Trains §G+2§! Or Infantry Equipment §G+500§! \n5%  Infantry Equipment §G+500§! \n10% Infantry Equipment §G+1000§! \n5%  Trucks §G+50§! Or Infantry Equipment §G+500§! \n5% Civilian Factory §G+1§!\n5%  Military Factory §G+1§!\n10% Ponypower §G+3000§!\n10% Ponypower §G+6000§!\n5%  Artillery §G+50§! \n5%  Support Equipment §G+100§! \n5% Research Bonus for Armor or Artillery or Infantry Weapons or Support Companies §G200%§!"
  bar_expedition_loot_silver:0 "Possible loot:\n\n40% Political Power §G+25§!\n30% Research Bonus for Pony Techs §G200%§!\n20% Political Power §G+25§!\n      Army Experience §G+10§!\n      Navy Experience §G+10§!\n      Air Experience §G+10§!\n10% Army Experience §G+10§!\n      Navy Experience §G+10§!\n      Air Experience §G+10§!\n      Ponypower §G+20000§!"
  bar_expedition_loot_leopold:0 "Possible loot:\n\n40% Political Power §G+25§!\n30% Research Bonus Industry §G100%§!\n      Infantry Equipment §G+500§!\n20% Political Power: §G+50§!\n      Army Experience §G+20§!\n10% Military Factory §G+1§!\n"
  bar_expedition_loot_asinti:0 "Possible loot:\n\n40% Political Power §G+25§!\n      Ponypower §G+1000§!\n30% Political Power §G+50§!\n      Ponypower §G+5000§!\n20% Political Power §G+75§!\n      Ponypower §G+10000§!\n10% Political Power §G+100§!\n      Ponypower §G+20000§!\n"
  bar_expedition_loot_viira:0 "Possible loot:\n\n40% Political Power §G+25§!\n30% Political Power §G+55§!\n20% Research Bonus for Infantry Weapons or Support Companies §G+200%§!\n10% Industrial Complex §G+1§!\n"
  bar_expedition_info_title:0 "Additional Info:"
  bar_expedition_info_text:0 "Each week expedition will go thought 3 phases:\n-Peril, in which it needs to face the expedition's dangers (with possibility of aborting the mission and coming without loot)\n-Cohesion, where members decide if they will continue or go back home\n-Success, in which the loot is gathered.\n\nIn each Success phase every member gets to roll for the loot.\n\nStolen equipment and technologies are based on target country.\n\nChoosing low stability target will add to success chance.\n\nIn addition to first week of expedition additional 14 days are added for preparations."
  BAR_expedition_progresses:0 "Ongoing Expedition"


