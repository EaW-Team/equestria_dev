  bar_viira_murders.3.t:0 "Temple of Doom"
  bar_viira_murders.3.d:0 ""As you can see, I spared no expense!" Asinti boasted as he guided Viira through the grand temple he had constructed. "Experts from around the world were consulted in its design, and the result is unlike anything ever built before." He proudly pointed to a particularly odd bit of architecture, expecting it to be self-explanatory.\n\n"I can see that. It's certainly... something." Viira forced a polite smile. "Although I must say I am curious what's wrong with the ceiling." She took a few steps away from Asinti.\n\n"What?" Asinti raised an eyebrow, barely having time to glance upwards before becoming trapped by chunks of collapsing temple. Suddenly, the ground began shaking and a loud rumbling echoed throughout the entire temple.\n\n"A pity, but I'm afraid I can't stay any longer." Viira laughed. "Thanks for the tour! I believe this will make quite a fitting tomb for you.""
  bar_viira_murders.3.a:0 "I thought he would never die..."

  bar_viira_murders.1.t:0 "Forced Entry"
  bar_viira_murders.1.d:0 "In the library of Silver Star's tower, Viira sat flipping through book after book, searching for an answer. Somewhere within the most complete collection of magical knowledge on Griffonia, there had to be one. She searched and searched until at last she found it: the final piece of the puzzle. Viira smiled. "Now all I have to do is-"\n\n"WHAT are you DOING in here?" Silver Star exploded, standing at the library entrance.\n\n"Silver Star, thank goodness I found you!" Viira ran frantically over to him. "They've come back for you, they want to kill you!" She grabbed his shoulders and shook vigourously.\n\n"Oh no." Silver Star's eyes went impossibly wide. "No, no, no," he repeated, shaking on his own now.\n\n"Don't worry. You find someplace to hide, and I'll take care of them!" Viira packed up her things, including the tome containing the missing piece.\n\n"Hide, yes. Good idea!" Silver Star rushed to open a secret alcove behind one of the bookcases. "And Viira... thank you.""
  bar_viira_murders.1.a:0 "Make sure to keep the lights off!"
  bar_viira_murders.1.b:0 "On second thought..."
  bar_viira_murders.1.c:0 "Wait!"

  bar_viira_murders.2.t:0 "Shattered Star"
  bar_viira_murders.2.d:0 "    "Wait!" Viira shouted, just as Silver Star was about to disappear into his secret chamber. "There's one more thing I have to tell you, something important." She approached him slowly, subtly wiggling her eyebrows.\n    She reached out and grabbed his robe. "'It's something I should have done a long time ago," said Viira, coming face to face with him. Time seemed to slow, and sweat dripped down Silver Star's muzzle. "Goodbye." His eyes went wide, but before he had time to process what had happened, he was already dead. Viira removed the dagger from his back and shoved Silver Star's fading body to the ground. "One less to worry about," she muttered."
  bar_viira_murders.2.a:0 "Good riddance."

