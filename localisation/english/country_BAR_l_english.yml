  tech_bar_unicorn:0 "Mage Company"
  tech_bar_unicorn_desc:0 "In the past, unicorns have often been assigned to provide tactical support for other soldiers, casting spells of great utility. Shields, fireballs and healing capabilities were common and saved many lives, but not every force had a sufficient amount of unicorns. It is time to standardise and train professional unicorn support companies."
  tech_bar_unicorn_th:0 "Tactical Illusion Magic"
  tech_bar_unicorn_th_desc:0 "We can use unicorn magic to create intricate illusions to confuse and mislead our enemies."
  tech_bar_unicorn_th2:0 "Helping Horn"
  tech_bar_unicorn_th2_desc:0 "Healing spells can drastically reduce our casualties from combat."
  tech_bar_unicorn_th3:0 "Scrying Training"
  tech_bar_unicorn_th3_desc: "Using specialised scrying spells and equipment, our mages are able to gather intelligence they wouldn't otherwise have access to."
  tech_bar_unicorn_th4:0 "Teleportation-aided Command"
  tech_bar_unicorn_th4_desc:0 "Teleportation spells can be used to relay information over significant distances without the need for specialised equipment."
  tech_bar_unicorn_th5:0 "Modern Spell Matrices"
  tech_bar_unicorn_th5_desc:0 "Spell Matrices allow even the most incompetent unicorn to cast complex spells."
  tech_bar_unicorn_ms:0 "Shield Magic Focus"
  tech_bar_unicorn_ms_desc:0 "Unicorn mages can use spells to create powerful, nigh impenetrable shields."
  tech_bar_unicorn_ms2:0 "Fire Magic Training"
  tech_bar_unicorn_ms2_desc:0 "Our mages are able to harness the power of fire, reducing our foes to ash."
  tech_bar_unicorn_ms3:0 "Uncover Forbidden Magic"
  tech_bar_unicorn_ms3_desc:0 "There is much magic we can yet learn, though some of it might be considered... unorthodox."
  tech_bar_unicorn_ms4:0 "Embrace Dark Magic"
  tech_bar_unicorn_ms4_desc:0 "We must master even the most profane forms of magic. A tainted soul is a small price to pay for such power."
  tech_bar_unicorn_ms5:0 "Maximum Magical Saturation"
  tech_bar_unicorn_ms5_desc:0 "Every fibre of our being must become one with magic. None shall be able to resist us."


