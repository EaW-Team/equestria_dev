  BAR_new_barrad:0 "New Barrad"
  BAR_fate_of_asinti:0 "Fate of Asinti"
  BAR_fate_of_ambrosius:0 "Fate of Ambrosius"
  BAR_fate_of_leopold:0 "Fate of Leopold"
  BAR_fate_of_viira:0 "Fate of Viira"
  BAR_biggest_gift:0 "Biggest Gift"
  BAR_path_to_immortality_desc:0 "My hour has come at last-no more fear, no more pain. No more fleeing, no more weakness."
  BAR_undying_call_desc:0 "Rise! Hear my command and march forth! You are granted new life and a purpose to fulfill!"
  BAR_beggining_of_end_desc:0 "All that is old must be torn down, so the new may rise."
  BAR_new_barrad_desc:0 "They dare not question my authority now. Perhaps I was born to fall-but I defied death itself, and through that defiance, I have triumphed!"
  BAR_fate_of_asinti_desc:0 "To put it plainly, I always found Asinti a bit... off. Like something deep down just wasn’t quite right. I could never place exactly what it was. Still, I’m a good friend-and I intend to give him the greatest gift he’ll ever receive."
  BAR_fate_of_ambrosius_desc:0 "After all, I suppose I owe Ambrosius some gratitude-had he not allowed me to slip into this wretched realm, I would’ve never achieved what I have now."
  BAR_fate_of_leopold_desc:0 "I never truly understood that griffon-his thoughts, his choices, the strange logic behind them. But I’ll give him this: when he came up with something, it was never small. It was always something monumental."
  BAR_fate_of_viira_desc:0 "What a beautiful treacherous little creature you were-it would be such a shame if your tale ended so soon, wouldn’t it?"
  BAR_biggest_gift_desc:0 "I did it-truly, I did! The agony of mortal existence is gone, and now I have shared this gift with all of Barrad!"


