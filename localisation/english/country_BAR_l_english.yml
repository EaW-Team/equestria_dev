  BAR_cult_knowledge:0 "Ancient Knowledge"
  BAR_cult_knowledge_desc:0 "The cultists Viira was so interested in appears to have some sort of living powerful diety... I should deal with it at once."
  BAR_cult_knowledge_2:0 "Network of Consciousness"
  BAR_cult_knowledge_2_desc:0 "The sheer power resonating from this being... I cannot let it go to waste. They shall be risen anew, I can already feel its consciousness twingling."
  BAR_ss_army:0 "Undead Army"
  BAR_ss_army_desc:0 "While my flesh can no longer betray me, there are other powerful wizards out there. I still need to protect myself from danger, putting others in front sounds like great solution."
  BAR_ss_infantry:0 "Horde Tactics"
  BAR_ss_infantry_desc:0 "Clever tactics and strategies are for those who needs to care about wellbeing of their soldiers, of their morale and if they don't starve. Gladly we are above that now."
  BAR_ss_infantry_1:0 "Four Paws Attack"
  BAR_ss_infantry_1_desc:0 "Classic white's opening. Well liked by ironpaws chess players, it focuses on capturing as much of the board as possible without developing other pieces. Suits them well."
  BAR_ss_infantry_2:0 "Seer Game"
  BAR_ss_infantry_2_desc:0 "Those future seeing deers are annoying opponents. It near impossible to suprise them with your moves, only way to deal with them is well thought plan that cannot fail."
  BAR_ss_infantry_3:0 "Botwine's Defense"
  BAR_ss_infantry_3_desc:0 "Most populat counter Wittenburgh Gambit. Focusing on building imprenetrable wall of pawns."
  BAR_ss_infantry_4:0 "Delayed Wittenburgh Gambit"
  BAR_ss_infantry_4_desc:0 "Variation of Wittenburgh Gambit. While being slower than the classical one it leads to development of more powerful pieces easier."
  BAR_ss_infantry_5:0 "Sharp Shadow of the Fog"
  BAR_ss_infantry_5_desc:0 "Quite curious scenario, in it the board is set in such way that not only rational-but only possible-move is to capture the enemy piece, leading to cascade."
  BAR_ss_infantry_6:0 "Feathisian Opening"
  BAR_ss_infantry_6_desc:0 "While it might be griffon's favorite gambit-it still has merit in it. Rapid deployment of light figures can dominate the board."
  BAR_ss_infantry_7:0 "Opinicus'es Casino"
  BAR_ss_infantry_7_desc:0 "Very common scenario between griffon players. If they knew any better they would know that when both sides develop only light figures it will lead to very volatile board."
  BAR_ss_infantry_8:0 "Pony Defense"
  BAR_ss_infantry_8_desc:0 "By some also called deep defence, it is similar to Botwine's Defense in a sense that it utlilizes pawn based defense. Difference is that it is white's gambit."
  BAR_ss_infantry_9:0 "Equestrian Development"
  BAR_ss_infantry_9_desc:0 "Very unpopular counter-gambit in Riverlands. Here lighter pieces are used mostly at the defensive, protecting pawns."
  BAR_ss_infantry_10:0 "Unicorn Opening"
  BAR_ss_infantry_10_desc:0 "My second favorite gambit. Putting both of your unicorns, or archons if one insists on their naming. Perfect combination, both agressive and easy to defend."
  BAR_ss_infantry_11:0 "Silver Star's Gambit"
  BAR_ss_infantry_11_desc:0 "That one... I will keep as an secret. After all why should i reveal the best chess gambit?"
  BAR_ss_better_army:0 "Across the Mountaintops"
  BAR_ss_better_army_desc:0 "I would say I'm suprised that undead have troubles with traveling mountains. But for most walking on flat floor was a challenge as well. I need to figure out something for them."
  BAR_ss_better_army_1:0 "Faster than Walking"
  BAR_ss_better_army_1_desc:0 "Why does supply move so slow? Each time I look at the plans I hear same thing, it was delayed. Need to get them some better transportation."
  BAR_ss_better_army_2:0 "War Reimagined"
  BAR_ss_better_army_2_desc:0 "Playing wargames agains myself do provoke some interesting thoughts, would be a shame if nothing came out of them."
  BAR_ss_better_army_3:0 "Armored Thought Experiment"
  BAR_ss_better_army_3_desc:0 "Flesh and bones are fragile, even undead one. But what if I put those behind wall of steel? I might have revolutionary idea."
  BAR_ss_better_army_5:0 "New Arsenal"
  BAR_ss_better_army_5_desc:0 "There is great perk to be above death, one does not need to worry about silly things like disease or dangerous chemicals."
  BAR_ss_better_army_6:0 "Lesser Necromancy"
  BAR_ss_better_army_6_desc:0 "It is tiresome to manage every single undead soldier, maybe... just maybe... if I shared some of my magic with selected few. They could do more mundane tasks for me?"
  BAR_ss_better_army_7:0 "Tank Design"
  BAR_ss_better_army_7_desc:0 "My idea about armor looks promising. I keep sketching new designs, most dont cut it... but some might."
  BAR_ss_better_army_9:0 "Undead Specialization"
  BAR_ss_better_army_9_desc:0 "Ponies are very universal creatures, especially when they dont need to worry about mortal needs. Yet some kind of specialization in my army would not hurt."
  BAR_ss_better_army_10:0 "Armor Countermeasures"
  BAR_ss_better_army_10_desc:0 "It appears I was not only one to come up with putting your soldiers behind armor. Fine... I need to think how to destroy my creation."
  BAR_ss_better_army_11:0 "Theoretical Warfare"
  BAR_ss_better_army_11_desc:0 "Day and night I try to best myself in art of war, I've yet to be defeated."
  BAR_ss_better_army_12:0 "One Task at the Time"
  BAR_ss_better_army_12_desc:0 "Having to manage a country is hard enough. But when will of every citizen is bound to yours? Its hard to notice everything, maybe I should try focusing on one task at the time?"
  BAR_ss_planes:0 "Airfield Land Clearance"
  BAR_ss_planes_desc:0 "After leaving their mortal self behind my subjects don't as much as they used to. I should order them to demolish unused buildings to make room for more useful things."
  BAR_ss_planes_1:0 "Fighter Plane Prototypes"
  BAR_ss_planes_1_desc:0 "Flying machine... such weird concept. I've found plenty of plans and schematics among Leopold's garbagee collection he called workshop. Might as well try it out."
  BAR_ss_planes_2:0 "Bomber Prototypes Prototypes"
  BAR_ss_planes_2_desc:0 "This idea might have future. What if I would put explosives on the plane and drop it from the above? My enemies would not be able to do anything, genius."
  BAR_ss_planes_3:0 "Proper Airforce Usage"
  BAR_ss_planes_3_desc:0 "Going though memories of my subjects I found out it was neither me nor Leopold who came up with planes first. Unfortunate, but their experience might be useful."
  BAR_ss_planes_4:0 "Conquest of Skies"
  BAR_ss_planes_4_desc:0 "Those flying machines as truly something. Yet they are still lacking proper firepower to sweep any opposition from the skies."
  BAR_ss_planes_5:0 "Air Superiority"
  BAR_ss_planes_5_desc:0 "Fight over the sky might be as important as that on the ground. If I leave it alone I might wake up with bomb flying thought my window after all."
  BAR_ss_planes_6:0 "Strategic Destruction"
  BAR_ss_planes_6_desc:0 "Getting bombed is something I should be avoiding. But bombing my enemies, that surely something that will help me get them to yield."
  BAR_ss_industry:0 "The Neverending Shift"
  BAR_ss_industry_desc:0 "Sleep, hunger, thirst... such awful mortal needs. Gladly both I and my subjects no longer require it."
  BAR_ss_industry_1:0 "Economy Shift"
  BAR_ss_industry_1_desc:0 "Being freed from our old needs I can order my subject to cease production of unnecessary goods."
  BAR_ss_industry_2:0 "Refiting Tools"
  BAR_ss_industry_2_desc:0 "The tools used by Ambrosius' subjects are no longer adequate to physiology of my subjects. Some redesigns might be needed."
  BAR_ss_industry_3:0 "Dead Mines"
  BAR_ss_industry_3_desc:0 "Deep mining have all this obstacles like getting breathable air into shafts. I will simply eliminate them."
  BAR_ss_industry_4:0 "Servants of the Archlich"
  BAR_ss_industry_4_desc:0 "My country needs to run like a perfect machine, as I'm its literal centre each and every piece of it needs to provide what I require."
  BAR_ss_industry_5:0 "War Industry Expansion"
  BAR_ss_industry_5_desc:0 "My enemies are many while they should be none. I need to focus on expanding my armies to fix this mistake."
  BAR_ss_industry_6:0 "Elisay Terraforming"
  BAR_ss_industry_6_desc:0 "All of Barrad still has much that could be used. Homes and fields lie around, not being of use to me. I can't let it stay this way, though, when we have the power and the magic to bend it to my will."
  BAR_ss_industry_7:0 "Ropughers Terraforming"
  BAR_ss_industry_7_desc:0 "The dead don't need beds and walls when they can sleep wherever, but I still need the land to be good enough for work. They'll turn this wasteland into a paradise of production, I'm sure."
  BAR_ss_industry_8:0 "Dunburh Terraforming"
  BAR_ss_industry_8_desc:0 "To shape Dunburh in my own image... the Count and the rest cannot comprehend the simple solutions that come with making the dead useful. Besides, waste is such a terrible concept."
  BAR_ss_industry_9:0 "Elisay Fortress"
  BAR_ss_industry_9_desc:0 "The body's vitals are protected by a tapestry of bones: skulls over brains, ribcages over hearts. I shall do that to this very city. It shall never bend, it shall never break."
  BAR_ss_industry_10:0 "Construction Sector"
  BAR_ss_industry_10_desc:0 "Hordes of undead have no purpose if their only weapons are hooves and paltry magic. However, I have the power of an entire country under me. Entire cities of smoke and metal will rise to lend me a storm of rifle-wielders and tank-riders."
  BAR_ss_industry_11:0 "Widespread Terraforming"
  BAR_ss_industry_11_desc:0 "It is time to shed dead weight. Whatever abandoned buildings are left will soon be no more. They will make way for greater uses..."
  BAR_ss_industry_12:0 "Roughers Weapon Factories"
  BAR_ss_industry_12_desc:0 "Like clockwork, my minions will tinker with an abundance of gears, assembly lines, forges... these and more with which to arm a true fighting force."
  BAR_ss_industry_13:0 "Dunburh Rebuilt"
  BAR_ss_industry_13_desc:0 "Flatten the peaks, raise the valleys! My followers, the former city of Dunburh is yours to transform into a hive of activity!"
  BAR_ss_industry_14:0 "Archlich City"
  BAR_ss_industry_14_desc:0 "I am reminded that I, too, live where these smokestacks and their infernal noises hound me everywhere I go. You may think I dislike it... no, actually, I've grown fond of this. It is a sign that we are not stagnant, that my dead are not content lying around."
  BAR_ss_industry_15:0 "Undead Servitude"
  BAR_ss_industry_15_desc:0 "What is the use of my subjects enjoying themselves with useless frivolities? They are throwing away their precious lives! They will rest only when our job is finished..." 
  BAR_ss_industry_16:0 "Designed for the Dead"
  BAR_ss_industry_16_desc:0 "Outsiders bemoan our brave unthinking warriors, but these same outsiders have free minds that argue and sow strife and grief with their own wars. Still, they are right that most tools today are made with pre-dead creatures in mind. We can fix that."
      #here lets just be paranoid
  BAR_ss_war:0 "Enemies at All Sides"
  BAR_ss_war_desc:0 "Despite everything, I can’t shake the feeling that they’re closing in on me. Perhaps it’s only paranoia... but maybe the wiser course is to strike first-before they get the chance."
  BAR_ss_attack_wittenland:0 "Road to Home"
  BAR_ss_attack_wittenland_desc:0 "Ah, dear Wittenland-there’s not a single happy memory I hold of you. And I know all too well the kinds of creatures you harbor... just waiting for the perfect moment to drive a dagger into my back."
  BAR_ss_attack_coast:0 "Securing the Coast"
  BAR_ss_attack_coast_desc:0 "The zebras and deer along my borders-scheming, waiting, hoping to bring about my downfall. But that won’t happen. I much prefer my borders to end at the ocean, not at the edge of a blade."
  BAR_ss_defence_of_archlich:0 "Defence of Archlich"
  BAR_ss_defence_of_archlich_desc:0 "My enemies are countless, but every subject under my rule must stand in my defense-as I am the architect of the new order, the very foundation of the better world they now inhabit."
  BAR_ss_wall_barrad:0 "Great Wall of Barrad"
  BAR_ss_wall_barrad_desc:0 "I shall raise a wall of stone and bones, a barrier to shield my realm from the reach of my enemies."
  BAR_ss_extend_wall:0 "Great Wall Expansion"
  BAR_ss_extend_wall_desc:0 "As my realm grows, so too must the wall that shields it-stretching ever outward to keep the evils of this world at bay."
  BAR_ss_forward_defence:0 "Forward Defence"
  BAR_ss_forward_defence_desc:0 "No wall is truly unbreakable-that is why I command my subjects to establish forward defenses, ready to stall any enemy who dares to strike."
  BAR_ss_forward_defence_2:0 "Frontline Frotifications"
  BAR_ss_forward_defence_2_desc:0 "The stronger the forward fortifications, the longer it will take for intruders to breach the borders of my realm."
  BAR_ss_attack_cossacks:0 "Deepest Fear"
  BAR_ss_attack_cossacks_desc:0 "They are driven by nothing but fury, consumed by an endless thirst for blood. I cannot allow such beasts to linger at my doorstep."
  BAR_ss_attack_rivfed:0 "Take Down the Coalition"
  BAR_ss_attack_rivfed_desc:0 "The River Coalition will come for me-of that, I have no doubt. But I will not yield. I will stand, I will resist, and I will survive-no matter the cost."
  
