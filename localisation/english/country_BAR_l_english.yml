  barrad_second.1.t:0 "Tension at the Table"
  barrad_second.1.d:0 "    In the study of Count Ambrosius, the other four members of the Pentarchy sat around a large wooden table covered with various sheets and notes. Asinti moved his hooves methodically over the strange schematics they had acquired from the defeated cultists, while Leopold and Viira discussed their possible meaning, their voices low but intense.\n    Silver Star, however, stayed away from the discussion, sitting in his own corner, levitating a pencil above an open sketchbook open, fully focused on his drawing. The conversation drifted over his head like a distant breeze.\n    Naturally, it would be Leopold who would notice. "Silver Star, are you even listening?"\n    "Yeah, yeah, I'm listening," Silver mumbled, barely looking up.\n    "No, you're not. This might be something revolutionary!" said Leopold before flying closer to him. "What are you even drawing that's so important?"\n    Silver Star shifted uncomfortably, tilting the sketchbook towards himself. "It's nothing. Just... something to pass the time."\n    Leopold's patience ran out. His wings spread as he leaned in. "Pass the time? Who do you think you are, Silver Star!?" He reached out and tried to grab the sketchbook from him.\n    "Don't touch that!" he yelled, pulling the sketchbook away and holding it protectively against his chest. Wide-eyed and panting, he gulped and took a step back.\n    The room fell silent. Asinti and Viira paused their discussion, turning to watch the unfolding drama.\n    Leopold glared at him. "What's your problem? We're trying to crack a magical mystery here, and you're doodling like a foal!"\n    Silver Star's voice shook as he responded, "'Trying' a putting it kindly. I just got bored of listening to three ponies-or whatever-argue about things they know absolutely nothing about!"\n    Viira, sensing the imminent catastrophe, stepped in. "Leopold, maybe we should just let him be."\n    For a moment, Leopold seemed ready to explode, but only scoffed. "Fine..." he muttered through a closed beak.\n    Silver Star didn't respond, his grip on the sketchbook only tightening. Asinti, who had been quietly observing, finally spoke up, his voice calm and measured. "Silver Star, if the topic is so boring for you, maybe you can enlighten us on what you found."\n    Silver Star nodded slowly. "It's a... how would you call it, ah yes, a blueprint. If I'm right, and I'm quite sure I am, it shows some sort of magic-infusing reactor." He leaned over the table to point at one of the parchments. "Here, you see? This crystal device will react with magical energy in the closest environment...""
  barrad_second.1.a:0 "Fascinating"
  barrad_second.2.t:0 "A Wonderful Idea"
  barrad_second.2.d:0 "    As morning sunlight filtered in through clouded windows, Count Ambrosius emerged from his bedchamber and stretched. Standing guard by the entrance, Gąsienica was ready to greet him. "Feeling better, sir?"\n    "Yes, incredibly!" Ambrosius laughed and slapped Gąsienica's back. "You know, it's been so dull around here lately." He began trotting through the halls of the manor with Gąsienica keeping pace at his side. "But that party was invigorating. Hunting! Killing! Mystery! So much excitement..." Ambrosius stroked his beard in contemplation. "I know what we must do: throw another party, bigger and grander." The Count was positively giddy by the time he entered the throne room.\n    "More drinking, more feasting, more merriment!" Ambrosius was smiling just imagining the festivities. "Begin preparations at once! Send out invitations to the Pentarchy, and all the nobles." He slowly turned to face Gąsienica, his smile remaining but his eyes becoming dark. "And make sure our guests know that refusing to attend will have severe consequences.""
  barrad_second.2.a:0 "Let's break out the booze!"
  barrad_second.3.t:0 "Now You See Them..."
  barrad_second.3.d:0 "    "You've never- Unbelievable! You simply must witness it," Ambrosius implored the group of nobles around him, before turning to wave across the hall. "Viira, care to entertain our guests?" he shouted. The doe sighed, and began to walk toward the balcony. Ambrosius galloped to join her and beckoned for the group to follow. From the manor's balcony the two looked over a nearby village, as well as the untamed forests and mountains in the distance. Ambrosius pointed to the village watchtower. "There, that's a good spot."\n    Viira focused intensely before closing her eyes. A strange energy could be felt in the air around her, and the seer's robes began to ripple with magical power. Suddenly, a large section of the village surrounding the tower became shrouded in a dark fog. When the fog dissipated, everything that had been inside it was gone. "Spectacular!" shouted one of the guests, as the rest of them mumbled in amazement. "Where did it all go?" asked another.\n    Viira smirked. "A magician never reveals her secrets.""
  barrad_second.3.a:0 "...now you don't."
  barrad_second.4.t:0 "Listen"
  barrad_second.4.d:0 "    In a musty cellar, Viira stood surrounded by a wall of figures shrouded in shadow, facing a a hooded acolyte seemingly in charge. The acolyte began reciting something that was probably a prayer, gesturing slowly, precisely, before looking at Viira expectantly. "Did you devise these plans?" asked Viira, showing the instructions for the strange device.\n    The hooded figure shook their head. "They come from the Master."\n    "Master? You can't mean Ambrosius, can you?"\n    "You think Count Ambrosius is the master of Barrad? Foolish. The true master lies hidden from the unworthy and undiscerning. It is our purpose to serve It, as we done so for countless generations, and as we shall do for many more. Or so we thought." The acolyte lowered her head. "We have failed. The Master has become angered by the greed and cruelty of the land, and unleashed the plagues that afflict Barrad. It is the cause of all our suffering.""
  barrad_second.4.a:0 "How curious."
  barrad_second.5.t:0 "Out of the Dark, Into the Night"
  barrad_second.5.d:0 "    "Who exactly is the master?" asked Viira, once again in a cellar surrounded by shadowy figures.\n    "It is the Great Machine, and we are Its servants." The hooded acolyte looked up and raised her hooves, prompting the rest of the cultists to follow suit.\n    "What does this machine want?" Viira's mind raced with questions. "Can I meet it?"\n    "Only a privileged few can discern Its will, much less stand in Its presence. We are but the Outer Circle, and I have told you all that I can. If you wish to know more you must contact the Inner Circle."\n    "I see." Viira bowed humbly.\n    "When you are ready, seek them out." The acolyte held up a hoof. "But be prepared to prove yourself. Only those deemed worthy are allowed to know the secrets they hold.""
  barrad_second.5.a:0 "A machine...?"
  barrad_second.6.t:0 "Descent"
  barrad_second.6.d:0 "    Deep into the night, Viira sat studying the codex, inspecting its inscriptions and comparing them to every ancient script she had samples of. She sighed, then groaned. Yet another dead end. The runes were alien, but at the same time they seemed so familiar. She was still missing a piece to this puzzle. She had to be. She needed answers, and thus she took the codex and journeyed through the woods to the cave. When she reached its entrance, she spotted a solitary pony emerging from its depths. "What were you doing in there?" she asked.\n    The pony stopped in his tracks. "Just exploring."\n    Viira examined him closely, there was something odd about him. He wore strangely fine clothes, and didn't seem very comfortable in the natural environment. "Anything inside?" The pony shook his head, agitated. "Is that so? Because I believe I've met some of your friends who would disagree." Viira took out the codex and showed it to the pony, whose eyes went wide. He became tense, silently staring at Viira. "Please, I mean you no harm. I just want to understand!"\n    The pony scrutinised her for a long moment, before sighing. "We will be in touch. If you prove your intentions, you will find your answers." He trotted off into the forest without saying another word."
  barrad_second.6.a:0 "Promising lead."
  barrad_second.7.t:0 "Power Play"
  barrad_second.7.d:0 "    Leopold leaned over the table, his one good eye gleaming as his talon traced the lines of the blueprints. The crystal in his other eye socket pulsed with intensity, and his feathers puffed in excitement as he pointed to several details on the paper.\n    "This machine," Leopold began, his voice rising, "is a marvel! These connections here, they channel energy directly from the environment into the core. No waste, no need for refueling! It's efficient, revolutionary, and..."\n    Viira waved her hoof. "Yes, yes, it's impressive, Leopold. But it doesn't take two pairs of eyes to see that it relies on unstable crystals. It's amateur work, but that's why you have me." She smirked.\n    Leopold's feathers fluffed like he was about to fight. "Amateur?" he repeated. "Do you even know what are you talking about? The precision in..."\n    "We get it, it's almost as great as spring soldiers fillies love to play with," Viira chuckled. "Or in this case chicks."\n    Leopold slammed his talons on the table, causing Silver Star to flinch and shrink into his chair, not daring to make a sound.\n    Asinti, watching with mild amusement, leaned his head on one hoof, unfazed by the tension. He glanced at the blueprints, humming quietly, seemingly talking to someone unseen. After a moment of silence, Asinti spoke. "Silver Star," he smiled faintly, "care to show us what you are working on right now with your pencil?\n    Leopold glared at the unicorn. "If it's that sketchbook again..."\n    "Maybe he'll redraw this in a way we can read it, unlike you," Viira smirked.\n    Leopold opened his beak to retort, but Asinti's laughter quickly prevented it. "Maybe before reigniting your argument at least look at what our friend here did."\n    "Uh... yes... I mean no... I mean..." Silver Star, was nervously shifting in his seat. His voice was barely a whisper.\n    Viira raised an eyebrow. "Bit louder, not everycreature here has as young ears as me and you."\n    Silver Star felt all eyes on him. His hooves trembled as he tried to speak. "I... um..." His voice faltered, nerves overtaking him. Then, in a burst, he tossed his sketchbook onto the table. "I think you're both wrong," he said quickly, the words flying out.\n    Viira narrowed her eyes and quickly said, "Give me that." while grabbing the sketchbook. She scanned the pages for a moment. "There might be merit here," she said after a pause. "Look, Leopold." She pointed to corresponding elements on both sets of blueprints.\n    Asinti leaned back, satisfied. "Amazing what happens when you stop arguing and listen to the quiet ones.""
  barrad_second.7.a:0 "Isn't it?"
  barrad_second.8.t:0 "Quills and Dust"
  barrad_second.8.d:0 "    Asinti and Leopold found themselves in a library deep within Ambrosius' manor. The room was vast and cavernous, with towering shelves crammed with books and scrolls. With each flap of Leopold's wings, the air grew dustier and dustier.\n    "Could you stop that?" Asinti coughed, waving a hoof to clear the air.\n    Looking down upon the zebra on the floor Lepold flapped his wings even faster. "I don't think I can," he said, adding after a moment, "And why exactly are you so interested in the geology of these lands all of a sudden?"\n    "Do I need a reason?" Asinti replied.\n    Leopold fluffed his feathers and tried to mimic Asinti's voice, "Do I need a reason?" Then with his own voice, he added, "Everything has a reason. I, for one, want to build a mine..." His sentence was abruptly interrupted as he crashed into a bookshelf. The impact sent the griffon and several books crashing to the floor, creating a giant cloud of dust that billowed through the room.\n    Seeing this, Asinti couldn't help but laugh. "Where's the reason in hitting the shelf, then?"\n    Leopold sprang to his paws, ripping the seams of his suit in the process. "You think it's funny?" he screamed, his breath heavy. "I'll show you something funny," he added, grabbing a book from the floor and hurling it at Asinti. To his surprise, the zebra dodged it effortlessly. Enraged, Leopold began throwing every book and scroll within reach. Each one either missed or was skillfully avoided by Asinti.\n    "Wait," Asinti shouted, catching one of the flying books. "This might be what we're looking for." He examined the cover, it read 'Deep Drill Results 989' and was signed by Ambrosius himself. "Could have just looked at the covers, but at least you had some fun," he added.\n    Leopold, still breathing heavily, began to calm down. "I wasn't looking for a book, I was trying to hit you with one," he muttered.\n    "Then at least we've concluded that you're a better librarian than sportsgriff," Asinti put a small smile, opening the book.\n    Leopold felt that his talons instinctively extended. For a brief moment, he was both mentally and physically ready to cut the zebra's throat. But as quickly as the anger came, he managed to suppress it, taking a deep breath to steady himself."
  barrad_second.8.a:0 "Let's see what Ambrosius has to say"
  barrad_second.9.t:0 "The Game" 
  barrad_second.9.d:0 "    Silver Star’s eyes jumped across the banquet table, scanning the lavish dishes like a predator on the hunt. He kept his head low, just barely above the table’s edge. His prey for tonight was a slice of cake, shimmering under the chandelier light like treasure in a dragon’s hoard. But he was not the apex predator here.\n    Everywhere around him party drown in a chaos of laughter and clinking glasses. Each voice, each sideways glance sent a chill down his spine. At any moment, they could try to talk to him. His heartbeat quickened. Even worse... a bead of sweat trailed down his face at the mere thought... Ambrosius might spot him.\n    He ducked lower, nearly disappearing under the tablecloth, concentrating hard as he levitated the cake toward himself, inch by inch. So close. Just a little more… \n    “Silver Star!” The voice boomed like a thunderclap above his head.\n    He froze. Cake suspended midair. He didn’t even breathe. In front of him stood Ambrosius, grinning wide enough to shame an alligator. Silver Star would never understand how the loudest, flashiest pony in the whole kingdom could sneak up on anypony. \n    His mind scrambled for a way out. Anything that could get him out of this nightmare of an interaction. “...uhm… h-hi?” he managed.\n    Ambrosius laughed like he’d just heard the world’s most delightful joke. “Enjoying the party? Of course you are. Otherwise, a timid thing like you would’ve already galloped off into the hills.”\n    Silver Star tried to smile, hoping for this to end.\n    “But since fate put you right at my hooves,” Ambrosius leaned in, “how about you join me for a puppy kick-off?”\n    Silver Star blinked. “...What?”\n    Ambrosius sighed, rolling his eyes. “Yes, yes, I know. We were supposed to use fillies, but sadly we don't have enought of them.” His face twisted with disappointment. “And the peasants, well. They just don't fly that far, you know?”\n    Silver Star, for perhaps the first time in his life, found himself making direct eye contact with another living being. Not out of confidence, but sheer paralysis. “W-why would you kick... your peasants?” \n    Ambrosius narrowed his eyes. For a moment, his whole face darkened into something unnamable, almost dripping with something wrong. He leaned in, inch by inch, until his breath was warm against Silver Star’s muzzle. It was like staring into an abyss that stared back and smiled.\n    Then, with a snap of his jaw, the darkness vanished. “You truly are the smart one!” Ambrosius laughed loudly. “We tell them they can be spared from out competition if they gave one of their fillies instead! Then the shortage is solved!”\n    He slapped Silver Star’s back so hard the unicorn ended with his bottoms on the floor. “Wait right here, my boy. I just need to give my servants a few orders, and then we’ll get started!”\n    And with that, Ambrosius spun around and disappeared down the hall, shouting at anyone in his way. Silver Star just sat there on the floor, dazed, not sure what had just happened. As he tried to gather himself, he noticed something soft and sticky underhoof. The cake. Flattened. Crushed under the weight of the universe."
  barrad_second.9.a:0 "What had just happened?"
  barrad_second.11.t:0 "Dance at the Ball"
  barrad_second.11.d:0 "    The grand ballroom in Ambrosius' manor was a sight to behold, opulent and regal. In all the splendor there were only few places covered in shadows, in one of which stood Silver Star. His eyes on the center of the room where Viira danced gracefully among the guests, her laughter mingling with the music. His heart ached as he watched her. He wanted to approach her, to ask her for a dance, but every time he took a step forward, his courage failed him. The noise of the ballroom, the laughter, and the chatter all. It was so abstract, so outside, so... unknown.\n    With a sigh, Silver Star sat on the floor as the sounds of the ball continuing around him. He pulled out his sketchbook and pencil, seeking solace in the familiar acts, but even that seemed hollow tonight. As he sketched absentmindedly, his eyes kept drifting back to Viira. She was laughing now, her head thrown back in delight as she spun in the arms of some griffon Silver Star's chest tightened with a mix of longing and sadness. She was radiant and confident, while he felt small and insignificant.\n    He took his gaze away and stared down at his sketchbook, the lines on the paper blurring as tears welled up in his eyes. Surrounded by a sea of ponies yet more alone than ever. His heart and mind screamed with unspoken words, but just like the sun that was shining now and forever the ball continued not noticing his existence."
  barrad_second.11.a:0 "..."
  barrad_second.12.t:0 "Quiet Match"
  barrad_second.12.d:0 "The party roared somewhere far away. Music clashed with laughter. Glasses chimed. Something exploded, loudly enough to earn cheers. None of it reached the small room at the end of a narrow, dim corridor. Here, a single table stood beneath a tired lamp. A chessboard rested on it, caught between two figures.\n    Silver Star stared at the board. His horn glowed faintly as he adjusted a knight. He nudged it between squares, then pulled it back. Again. His reflection warped across the polished silver pieces. He frowned at it.\n    “You’ve been thinking for five minutes,” Leopold leaned forward, elbows on the table. His feathers stood uneven, betraying excitement he failed to hide. \n    “That knight is begging to die.”\n    At the sound of the word, Silver’s ear twitched. “He is defending the priestess,” Silver said.\n    “She is already dead.”\n    Silver looked up. “Is she?”\n    Leopold reached out and tapped the rook facing the piece. The tap rang sharp in the quiet room. “Three turns ago,” he said. “You would notice if you weren’t fortifying your king like a Nimbussian fortress.”\n    Silver’s ears flattened. “Defense is important.”\n    “So is doing something.”\n    Silver hesitated, then set the knight down. The priestess stood exposed.\n    Leopold’s grin spread wide as he captured her. “Do you want me to spare you this humiliation,” he asked, “or do you want to play it to the end?”\n    “What do you mean?” Silver leaned closer, panic creeping into his voice. “There is no way for you to—”Then he saw it. If he did nothing, the game ended in four moves. If he tried, in six.\n    “How?” His voice tightened. Frustration bled through.\n    Leopold leaned back, satisfied. “I would say… quite simply,” he said, “but my advice stays the same as in the last ten games. At least try to contest the board.” "
  barrad_second.12.a:0 ""
