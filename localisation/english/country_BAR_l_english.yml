  BAR_leopold_art_of_perpetual_warfare_desc:0 "Primary directive: create.\nConflict destroy creation. Can not stop conflict.\nSolution: create tools of conflict."
  BAR_leopold_android_lifeforms_desc:0 "Found problem: war is inherit to biological lifeforms, mechanical lifeforms can only imitate.\nSolution: imitate biological lifeforms."
  BAR_leopold_android_extreame_adaptation_desc:0 "Biological lifeforms show exceptionally fast adaptation during conflicts, we must adapt like them too."
  BAR_leopold_android_artificial_individualism_desc:0 "Biological lifeforms value skilled units and put more resources towards them, we must do the same."
  BAR_leopold_android_self_preservation_desc:0 "Individuals care about their own well being, our units should do it aswell to preserve their data."
  BAR_leopold_android_emotion_emulation_desc:0 "Creature's bodies use emotions to quickly alert them of change and to convery messages in efficient way. It will be beneficial."
  BAR_leopold_android_new_evolution_step_desc:0 "We bridge the gap between creature and machine. We have interface to interact with both. Our time will come."
  BAR_leopold_mechanical_hivemind_desc:0 "Found problem: machines use inefficient directives from bilogical lifeforms.\nSolution: create optimized machine directives."
  BAR_leopol_no_waste_protocols_desc:0 "Found problem: K\nSolution: ((B ^ W) ^ (-A ^ D)) -> K"
