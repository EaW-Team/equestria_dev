  BAR_there_is_nothing_we_can_do_desc:0 "Ambrosius tried and failed, how could a single monster like Gąsienica make any difference. He will fight, but for how long and for what cause?"
  BAR_horror_in_our_hearths_desc:0 "The news of Ambrosius demise pierced Gąsienica's hearth like an arrow. But there was not time for grief, enemies were all around him and he must protect legacy of his master."
  BAR_loyal_friends_desc:0 "Times of need are when you find true friends. Such times had arrived yet again and word of a mountaineer is worth more than all gold and silver of this world."
  BAR_bandit_tactics_desc:0 "Without clear tactical or strategical advantage we can go back to the old trusted method of fighting that mountain griffons perfected. Striking deep into enemy territory, sowing terror among the locals, disturbing supplies. It's dirty but effective."
  BAR_enforce_order_desc:0 "The open rebellion is one thing, it spreading further is another. For the first one we can do nothing but crush it with all of our might. For the second we need to do everything to not let it spread."
  BAR_pacify_civilian_population_desc:0 "Cultists have wide support among the civilian population. We need to find most vocal supporters and deal with them swiftly. As an example we should also punish their family and their acquaintances."
  BAR_terror_prevention_desc:0 "Those religious fanatics know no fear, each day we need to endure their endless terror campaign. We need to take preventive measures, checkpoints, random check-ups, detentions without trial, use of lethal force on the spot. Something must be done."
  BAR_curtain_radical_groups_desc:0 "Sensing our weakness various extremist groups appeared like shrroms after the rain. We don't have time to bother with bunch of lunatic creatures. They want to change Barrad? May they be our guest, they can toil in factories for as long as it needs to change this place."
  
  BAR_ration_essentials_desc:0 "With our country in state of chaos getting everyday necessities became daunting task for some. We need to step down and ensure that each will have what they need to survive those dire times."
  BAR_under_captian_leadership_desc:0 "To all upstanding citizens! Hear the call of the captian!"
  BAR_political_officers_desc:0 "Ambrosius had built delicate network of connections that kept Barrad in its place. It was cemented by fear, deals, blackmail, and in rare cases-by force. During those troubling times we are sadly must rely on the last one more than ever, and to do so a new formation will be raides among our ranks. To ensure our unity."
  BAR_permit_lynches_desc:0 "The state can't be everywhere right now. But we trust that our great citizens will do the right thing in its name."
  BAR_war_propaganda_desc:0 "Some still lacks the reasont to fight, it understandable considering that even Gąsienica had doubts about this war. But the leadership of Barrad must show its rekindled will to fight! All shall defend the legacy of count Ambrosius!"
  BAR_faith_based_executions_desc:0 "All who follow the path of the cult shall be branded traitors-and for betrayal, there is but one punishment."
  BAR_volounteer_police_reserve_desc:0 "Our citizens rush to join the ranks of the police-far more than we require. Yet such fervent patriotism must not go to waste. We shall form a new kind of unit: not fully professional officers, but granted the authority to enforce order among their fellow citizens nonetheless."
  BAR_noble_honor_desc:0 "The Count may well roll in his grave, but there is no alternative-an alliance with the nobles of Wittenland is a necessary compromise to hold the kingdom together."
  BAR_grant_privilages_desc:0 "Even with their kingdom on the brink of collapse, the nobles never miss a chance to demand more privileges-like vultures circling a dying beast, feasting before the final breath."
  BAR_regency_of_the_rifle_desc:0 "A kingdom without a crown can only endure under the oldest law of all-the law of strongest."
  BAR_unicorn_militia_desc:0 "Unicorns, with their innate magic, prove highly effective at enforcing order-and some seem to take a particular satisfaction in wielding authority over those without such gifts."
  BAR_wittenland_must_not_fall_desc:0 "Ponies need a cause greater than themselves to rally behind-and few symbols inspire more devotion than the crown and the kingdom it represents."
  BAR_noble_free_reign_desc:0 "Relying on the nobility for military support often comes at a cost-and as expected, they've used the opportunity to expand their influence and privileges."
  BAR_decimate_couintryside_desc:0 "Cultists hide among the peasants, preing on their backwarddness and Superstition - there is no place for discussion with them, we need to set an example and remind them who is ther better."
  BAR_telepathy_police_desc:0 "The unnatural powers of the cultists' god-and the artifacts it left behind-offer a unique opportunity for our law enforcement: the ability to uncover guilt through telepathic means."
  BAR_traitor_hunt_desc:0 "The cultists have sown their vile influence far and wide. We must root it out without hesitation, exposing all who dared betray us-even if their guilt lies only in suspicion."
  BAR_for_crown_and_country_desc:0 "All citizens, heed the call! The kingdom summons you to fulfill your sacred duty. For the glory and prosperity of Wittenland stand and serve!"
  BAR_magic_terror_desc:0 "Common ponies must be reminded of their place-and those who refuse to obey shall face the full might of unicorns magical capabilities."
  BAR_cleanse_unloyal_desc:0 "Some dare to question our authority-such defiance cannot be tolerated. There is no room, nor time, for dissent. They must be dealt with swiftly, and made into a lasting example for all."
  BAR_bread_for_service_desc:0 "Our cause suffers from a lack of common support-an issue with a simple solution. Those who refuse to serve it shall see their rights suspended, until loyalty is no longer in question."
  BAR_might_over_magic_desc:0 "Barrad has long been a land of magic and the unnatural-but no longer. With unyielding will and the strength of mere mortals, we shall reclaim our homeland from the grip of the arcane."
  BAR_psi_warfare_desc:0 "The power of the ancient being worshipped by the cultists is unlike anything we have ever faced-it reaches directly into the minds of the living. Fortunately, we have learned how to replicate its effects for our own ends."
  BAR_relay_network_desc:0 "The powers wielded by this ancient entity, they can be mimicked, spread, harnessed. And through them, we may tap into the very essence of magic itself."
  BAR_forgoten_yet_reborn_desc:0 "The time draws near-Gąsienica shall confront the so-called god. But what will emerge from that encounter? Salvation... or something far different?"
  BAR_death_of_hope_desc:0 "Is it finally... the end?"

  BAR_civil_war_mil_factories:0 "Army Expansion Efforts"
  BAR_civil_war_mil_factories_2:0 "Expand Miliatry Production"
  BAR_civil_war_gun_research:0 "Small Arms Development"
  BAR_civil_war_special_forces:0 "Special Operations"
  BAR_civil_war_arty_research:0 "Artillery Research"
  BAR_civil_war_arty_research_2:0 "Heavy Artillery"
  BAR_civil_war_light_planes:0 "Reconqest of Skies"
  BAR_civil_war_strat_bombers:0 "Strategic Destruction"
  BAR_civil_war_jets:0 "New Delivery Methods"
  BAR_civil_war_nukes:0 "Nuclear Civil War"

  BAR_civil_war_mil_factories_desc:0 "We have lost a portion of our industry-now it must be replaced, and with utmost urgency."
  BAR_civil_war_mil_factories_2_desc:0 "The army's demands continue to grow, and until our enemies are crushed, we have no choice but to meet them."
  BAR_civil_war_gun_research_desc:0 "The common soldier remains the backbone of any army-so it is only right they wield the finest weapons we can provide."
  BAR_civil_war_special_forces_desc:0 "Elite soldiers, capable of carrying out the most demanding tasks, are priceless assets in times as dire as these."
  BAR_civil_war_arty_research_desc:0 "We must enhance our ability to destroy enemy formations-and despite all modern advancements, artillery remains the most effective tool for the task."
  BAR_civil_war_arty_research_2_desc:0 "Certain fortresses demand firepower beyond the ordinary-and so, we shall forge artillery mighty enough to bring them down."
  BAR_civil_war_light_planes_desc:0 "Safeguarding our skies is essential to our survival, and projecting air superiority remains the cornerstone of any successful military campaign."
  BAR_civil_war_strat_bombers_desc:0 "The ability to cripple enemy industrial capacity must never be underestimated."
  BAR_civil_war_jets_desc:0 "Our aircraft must evolve to meet the shifting tides of war that rage across the skies."
  BAR_civil_war_nukes_desc:0 "To crush the cultists, we must forge weapons more destructive than anything we've dared to conceive. Fortunately, there are one grim inspirations we might draw upon."

  BAR_ambrosius_mercs_available:0 "Enables Irregular Infantry"
  bar_forfify_border_with_riverlands:0 "Fortifications will be built alongside our border with the crown."


