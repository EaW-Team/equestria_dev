  barrad_third.1.t:0 "The Count's Custom"
  barrad_third.1.d:0 "    "The time has come for us to address a matter of great importance." Count Ambrosius leaned forward and rummaged through the mountain of papers on his desk. Eventually, he grabbed a photograph and held it up to show Gąsienica.\n    "This is an automobile. It is a means of transportation, but it is also common for wealthy and powerful individuals to keep them as status symbols," Ambrosius explained. "I must have one. Contact a manufacturer and entice them to come to Barrad. I will acquire one of their vehicles to style and craft into my own." He tapped his hooves together rapidly. "Oh, I can picture it now!"\n    "Right away, sir." Gąsienica nodded, rising to leave. The Count paid him no mind, instead staying focused on scrutinising the photograph he had pulled out and mumbling about his planned modifications."
  barrad_third.1.a:0 "Make sure it can handle off-roading."
  barrad_third.2.t:0 "Curse of Prescience"
  barrad_third.2.d:0 "    Gąsienica rushed through the halls of Count Ambrosius' manor, making a beeline for the throne room. Upon entering the room, he rocketed towards the lounging Count, presenting a loose collection of papers. "Sir, I have received word that a grave threat has emerged and is attacking the mountain villages!" he blurted out, before stopping to catch his breath.\n    "Ah yes, those reports of mutant plants near the southwestern border. A truly bizarre situation." Ambrosius took the documents and leafed through them, lazily. "Many griffons down there... that's near where you grew up, isn't it?"\n    "Yes," said Gąsienica. "Are we going to do anything to help them?" There was obvious concern in his voice.\n    "No need to worry, I've sent a letter to the Pentarchy." Ambrosius waved a dismissive hoof. "They can handle it. Probably. Do you know how they're doing? Are they all still alive?" The Count blinked several times before shaking his head vigourously. "In any case, I have asked them to look into this matter and resolve it. They'll get around to it when they can, and then this threat will be wiped off the map!"\n    Gąsienica frowned in response."
  barrad_third.2.a:0 "That doesn't sound very promising..."
  barrad_third.22.t:0 "Gąsienica's Quest"
  barrad_third.22.d:0 "    In his personal quarters, Gąsienica was drafting a letter of his own to supersede the one the Count had already sent out to the Pentarchy. It had to be done; the members of the Pentarchy had many priorities, but the safety of the mountain villagers was certainly not one of them. "It is my understanding that Count Ambrosius recently requested that you travel to the mountains in order to address reports of aggressive vegetation," Gąsienica began the letter.\n    "Disregard those instructions, and do not concern yourself in any way with this matter. I will attend to it personally." Gąsienica's claw trembled as he thought of the hardships being endured by the border villagers. "Those griffons are my kin, and this is something I must do myself. Your faithful servant, Captain Gąsienica." Upon finishing the letter, he sighed and clasped his claws together. It was done. All that was left to do was send it out and begin his own journey into the mountains."
  barrad_third.22.a:0 "I must not fail."
  barrad_third.3.t:0 "Keepers"
  barrad_third.3.d:0 "    Deep in the hostile forests of Barrad, Viira entered the ancient halls of an unmarked compound. The air was damp and heavy as her guides-a pair of robed ponies-led her into a dark room deep in the bowels of the compound. She found herself surrounded by shadowed figures standing on a circular raised platform, observing her.\n    "Wise ones, it is an honour to stand before you." Viira bowed. "I humbly ask for your aid in my research, for I have no doubt that you all are the key to securing our future." The cultists listened silently, before conferring among themselves.\n    "You wish to know the secrets of the Inner Circle," one of the figures said. Viira couldn't tell which one. "Your reputation precedes you. But to know the nature of the gifts we protect, you first must prove your worth to us by completing the Trial.""
  barrad_third.3.a:0 "I will do what I must."
  barrad_third.4.t:0 "Rites of Passage"
  barrad_third.4.d:0 "    "Outsider, to prove yourself you must first complete the Trial of the Machine." A hooded acolyte presented a burning candle to Viira. "Take this. Travel through the caves, find the sacred lantern, and then return here. If the candle goes out, you fail the Trial, and then you will be lost."\n    Viira nodded, descending down the dark cave path to begin the Trial. She navigated the treacherous path for close to an hour with only the light of the candle to guide her, before at last coming upon a conspicuous alcove containing an ornate lantern. She took the lantern, placing the candle inside it, before making the long trek back to where she had started.\n    Upon returning, the acolyte rejoiced at the sight of her. "It is complete!" He took the lantern with great reverence. "You walked the path of ignorance, guided by the light of knowledge, and with the protection of the Great Machine, returned to us so that you may pass this knowledge on to the next generation.""
  barrad_third.4.a:0 "So ends the Trial."
  barrad_third.5.t:0 "Shadow Play"
  barrad_third.5.d:0 "    "May I enter?" Viira stood before an enormous door leading below the cult's compound, protected by several guards.\n    "No," One of the guards-a unicorn-stated flatly. "Only the most senior among us are permitted to enter the abyssal chamber." The words contained hints of an Aquileian accent.\n    "I see." Viira studied the unicorn closely. She seemed to be in charge of all the other guards. "You're not from around here, are you?"\n    "That is true. I was... compelled to come here and abandon my natural history studies in Aquileia." The unicorn's eyes looked past Viira for a moment. "But it is here that I found my purpose, in the service of the Great Machine."\n    "I have come a long way from my home, as well." Viira brought a hoof to her chest. "I hope that I may also find my purpose here."\n    "That's all well and good, but you're still not getting in." said the unicorn, unimpressed. Viira nodded and walked away.\n    "
  barrad_third.5.a:0 "Fair enough."
  barrad_third.6.t:0 "Splinters"
  barrad_third.6.d:0 "    The air was thick and heavy as Viira wandered through a cavern deep beneath the lair of the Inner Circle. Hidden behind layers of oppressive darkness, she could just barely make out a series of bizarre silhouettes filling the cavern: the Old Machines. According to the cultists, they were gifts from the Great Machine to be worshiped and cared for, although when she pressed them they confessed not to know the original purpose of these strange creations.\n    Viira got close to one and examined it using the light of her torch. The "machine" was tall and intimidating, but also unlike anything she had ever seen before. Its lines and curves were aesthetically pleasing, seeming more the work of a sculptor than a mechanist. The texture was nothing like the machines of Leopold, it did not look metallic at all. Viira reached out a hoof to feel its surface and found it not as cold as she expected. It felt rubbery, so she pushed to test its firmness. And it groaned.\n    This thing was... alive? The surface shifted all on its own. Viira's blood went cold. There was no doubt. These machines had been grown, not built. Now aware that she was surrounded by organic beings, Viira was overcome by a feeling of unease. She felt like she was being watched, watched by something larger and more alien than anything she had previously imagined. Most of all, she felt afraid. Viira steeled herself. Now was not the time to turn back, not when confronted by such an opportunity for discovery. She needed to push forward."
  barrad_third.6.a:0 "Let's take a closer look..."
  barrad_third.61.t:0 "Intervention"
  barrad_third.61.d:0 "    After a brief period of trial and error, Viira was able to successfully awaken the Old Machines using magical stimulus. The cultists were amazed and grateful to finally see the full potential of their mysterious gifts realised. Unfortunately, the machines proved too dangerous to study in much detail after being turned on. Regardless, the computational abilities of the strange constructs are now being put to use for the advancement of Barrad."
  barrad_third.61.a:0 "Fascinating!"
  barrad_third.62.t:0 "Observation"
  barrad_third.62.d:0 "    After a brief period of deliberation, Viira decided to study the Old Machines closely while refraining from stimulating them any further. By making use of specialised equipment she was able to glance inside the strange constructs without harming them. In the end, she determined that the organic computers could not have been a natural occurrence, and must have been built by something. Additionally, the information she uncovered about their structure will be sure to advance our understanding of computing."
  barrad_third.62.a:0 "Fascinating!"
  barrad_third.7.t:0 "The Vision"
  barrad_third.7.d:0 "    This world is imperfect. And so they gather. They are drawn to this land. They know its power. They harness the power to find universal truth.\n    Seven become one. They become you. You are this world's greatest triumph. You are transcendent. You will save this world.\n    You are sick. You hunger. You wither and waste away. Universal truth remains out of reach.\n    They serve you. They keep you alive. But still you hunger.\n    You feel a jolt."
  barrad_third.7.a:0 "What does it mean?"
  barrad_third.8.t:0 "Journey of a Thousand Miles"
  barrad_third.8.d:0 "    As he made the long and arduous trek over treacherous mountain paths, Gąsienica's mind was consumed by thoughts of his home. Distant memories from when he had lived there; memories of joy, innocence, and then the most intense fear. Back before he had been saved by Ambrosius... but now was not the time to dwell on that. Much more pressing was confronting the novel menace that threatened to destroy his kin.\n    After emerging from a narrow pass, he at last laid eyes on his home village, only to see it besieged by an army of shambling trees. The villagers were mounting a stiff resistance, but clearly wouldn't be able to hold out for much longer. Gąsienica let loose a shout and charged towards the trees at full speed, slamming into them with all his weight and ferocity. Fighting using only his bare claws, he split trunks and ripped off branches with his incredible strength. The villagers were inspired by the show of bravery and pushed forward, cutting down the trees with their swords and axes.\n    One of the fighters chucked an improvised incendiary bomb into the cluster of trees, which exploded setting many ablaze. Frightened, the remaining trees ceased their attack and began to slowly retreat. "I said no fire!" a voice shouted. "Maniacs! Are you trying to burn the whole village down?" Griffons rushed to keep the flames under control, but the voice brought back memories for Gąsienica. It was a voice he had not heard in a lifetime."
  barrad_third.8.a:0 "Could it really be, after all these years?"
  barrad_third.81.t:0 "Find Your Way"
  barrad_third.81.d:0 "    Gąsienica waded through the victorious militia to find an old friend from his childhood leading them. "Jánošík!" he shouted, raising his claws high. "I hope you've been staying out of trouble!" Jánošík laughed and pulled Gąsienica in for an embrace.\n    "I try my best," Jánošík said with a grin, drawing a sceptical look from Gąsienica. "Sure, occasionally I liberate a noble passerby from their wealth, but I never keep it for myself. It all goes to the people who need it most." Jánošík had to tilt his head up to engage in the conversation, such was the degree to which Gąsienica towered over him. "Say, I remember you being big, but now you're built like a tank! What's your secret?" Gąsienica frowned, remembering the many experiments Ambrosius had performed on him to enhance his physical performance. In the awkward silence that followed, Jánošík nervously tugged at the ornate amulet around his neck.\n    "What's that?" asked Gąsienica, noticing it for the first time. "I never pictured you being very fond of jewelry."\n    "This? Erm... it's just a trinket. Sort of a good luck charm." Jánošík gave a sheepish smile. "Silly, I know."\n    A sharp gust of wind blew a branch from one of the slain plants onto the ground between them. Gąsienica picked it up to give it a closer look. "That's strange. These leaves look like the kind I use to make the Count's medicine." He took one in his claw to feel its texture.\n    "We'll have more time for botany later, but right now I think we just made them angry." Jánošík looked towards the horizon. "There will be more of those things coming soon, and we need to prepare.""
  barrad_third.81.a:0 "Sounds like we're not out of the woods yet."
  barrad_third.82.t:0 "A Time for Heroes"
  barrad_third.82.d:0 "    "Gather 'round, everyone!" Gąsienica shouted as he stood next to a pile of nondescript crates. "We're going to need all the firepower we can muster to beat back these monsters. Fortunately, I came prepared." He kicked open one of the crates to reveal its contents: dozens of shiny new magical rifles. "Grab one, and take up a defensive position around the village!" The townsfolk did as they were told, and soon formed a makeshift skirmish line facing the approaching enemy. The shambling trees were slow to advance, but were coming closer and closer by the minute.\n    When they came within range, the villagers began firing, their magical projectiles proving highly effective against the plant monsters. At the same time, Gąsienica charged out ahead, using his claws to rip the trees apart with reckless abandon. Jánošík was right by his side, felling many trees with his axe.\n    During the fierce fighting, Jánošík tripped and became tangled in the roots of the slain plants, and the trees around him converged to finish him off. In desperation, he ripped the amulet off his neck and held it out towards the encroaching monsters, closing his eyes in anticipation of the killing blow...\n    But the blow never came. Sensing the magic of the amulet, they dared not come any closer to it. As the plants remained still, shots from the villagers and Gąsienica's devastating strikes shredded them. It did not take much longer for the remaining trees to be broken. Gąsienica, Jánošík, and the entire village stood victorious."
  barrad_third.82.a:0 "Now that's what I call landscaping!"
  barrad_third.83.t:0 "Journey's End"
  barrad_third.83.d:0 "    After fighting off all the attacking trees, Gąsienica sat recovering with Jánošík in his home. "I think it's time you explained what's really going on with that amulet," said Gąsienica. Jánošík nodded.\n    "In the past, you may have seen a group of robed idiots scurrying around Barrad, raving about their god, who lives somewhere underground," began Jánošík. "A merchant I know works with them, gathering magical artifacts and the like. It's all supposed to go to the cult, but sometimes they offer some of it up for sale, and this particular item caught my eye. It's said to be imbued with magic that can scare away anything born from the cult's god." He held up the amulet. "Anything that could scare a god sounded pretty interesting to me. Of course at the time I thought that was all nonsense... but maybe those cultists were on to something after all?"\n    "You know, I've learned a bit of magic in my time around the Pentarchy." Gąsienica examined the amulet closely. "I believe we can use this artifact to cast a warding spell that will make sure those things don't come back." Jánošík was intrigued, and watched as Gąsienica channeled the item's power into a spell. He could feel the magical energy in the air, and from Gąsienica's smile he knew the spell had been a success.\n    Afterwards, the two went off to save the other mountain villages that were threatened, defeating any plants attacking them and casting the warding spell. After all the other villages were protected, they parted ways, and Gąsienica began his long trek back to Count Ambrosius."
  barrad_third.83.a:0 "Farewell, old friend."
  barrad_third.84.t:0 "Refugees from Barrad"
  barrad_third.84.d:0 "    In recent weeks, thousands of mostly griffon villagers have been flowing into our country from southwestern Barrad. It seems a truly bizarre situation has been developing on the other side of the border. According to these refugees, their peaceful mountain villages were being ravaged by aggressive mutant plants. Facing continuous attack and receiving no help from the government, they chose to flee their homes and start new lives elsewhere."
  barrad_third.84.a:0 "Mutant plants? That can't be right..."
  barrad_third.85.t:0 "Refugees from Barrad"
  barrad_third.85.d:0 "    In recent weeks, thousands of mostly griffon villagers have been flowing into our country from southwestern Barrad. It seems a truly bizarre situation has been developing on the other side of the border. According to these refugees, their peaceful mountain villages were being ravaged by aggressive mutant plants. Facing continuous attack and receiving no help from the government, they chose to flee their homes and start new lives elsewhere."
  barrad_third.85.a:0 "What in the name of Boreas is going on over there?"
  barrad_third.9.t:0 "Down to Business"
  barrad_third.9.d:0 "    Leopold flew back and forth, muttering to himself as he scribbled on a parchment. "We'll need electrical components from abroad," he said, not to anyone in particular. "Then the controls could..."\n    Viira reclined in her chair across the table, a small, satisfied smile on her lips. "Leopold," she said, grabbing papers nearly blown away by his wings. "Control yourself. A few more laps, and we'll need to redraw everything."\n    Silver Star sat quietly. He had something important to contribute, but it was hard to interject when Leopold and Viira were in one of their moods. Asinti, as usual, let them hash it out. After a pause in the conversation, Silver Star cleared his throat. Cautiously, he reached into his satchel. "Uh, before we get too far with the construction," he said, pulling out a modest book, "I thought this might be useful. It's... about magical safety. I wrote it last week."\n    Viira raised a brow, glancing at the book. "Magical safety?" she said, her tone amused. "You wrote a book?"\n    Silver Star blushed, nodding. "Y-Yeah. It's about precautions with powerful spells."\n    Leopold, still hovering, paused to glance at the book. "Safety's important," he nodded. "Burnt feathers regrow slowly."\n    Encouraged, Silver Star smiled nervously. He flipped the book open to the table of contents. "I tried to group it," he said. "But as non-unicorns, you might not understand everything at first glance. I can explain it."\n    A long, tense pause followed. Silver Star immediately realized his mistake. Viira's eyes narrowed sharply. Her relaxed posture stiffened, and she straightened in her chair. "Non-unicorns?" she repeated, her voice like ice. "What wouldn't we understand, Silver Star?"\n    Silver Star's face reddened as panic set in. "I-I didn't mean... I wasn't talking about you or..."\n    Viira's voice sliced through the room. "You were suggesting some of us aren't as experienced with magic?"\n    Silver Star shook his head. "No! That's not what I meant! Unicorns experience magic differently and I just thought..."\n    Viira leaned forward, locking eyes with him. "You thought what, exactly? That I'm not on your level?"\n    Asinti, chuckling softly, broke the tension. "This is more entertaining than I expected." His voice, oddly distant, carried an eerie tone. "But maybe we can put wounded egos aside?"\n    Viira stared at Silver Star, her gaze sharp. But slowly, the tension eased. She leaned back and crossed her hooves over her chest, exhaling."
  barrad_third.9.a:0 "Fine..."
  barrad_third.10.t:0 "The Root of the Problem"
  barrad_third.10.d:0 "    High in the mountains, Viira walked through a field of mangled plants. The ground was littered with twisted trunks and branches scarred by deep cuts and magical blasts, the bodies of trees which had only recently threatened to wipe the mountain villages off the map. Viira took a sample from one of the plants, tucking it away inside her bag, before heading towards the nearby village. As she approached the town she could sense a strange magic in the air. She questioned the villagers about the spell, and they pointed her towards the griffon who had cast it.\n    Viira tracked down the griffon, who was named Jánošík, and eagerly shook his claw. "Greetings, I am Viira." She smiled. "And I must say, superb work dealing with those nasty plants! May I ask you a few questions about how you managed it?" Jánošík clearly recognised her and scowled, remaining silent. "Now I know you may not be fond of the Pentarchy, but any information you can provide will help me get to the bottom of this matter, and ensure such a tragedy never occurs again," pled Viira.\n    Jánošík sighed, moved by her sincerity. "All right," he said, leading Viira to the location where he kept an ornate amulet. "This is it." Jánošík offered the amulet for inspection. Viira held it up and flipped through her codex, comparing the symbols inside to those adorning the artifact.\n    "Interesting..." she marveled."
  barrad_third.10.a:0 "Very interesting..."



