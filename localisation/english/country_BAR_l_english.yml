  barrad_fourth.2.t:0 "Pyromaniac"
  barrad_fourth.2.d:0 "    "Everyone's been so serious around here, Gąsienica. I can't stand it!" Count Ambrosius leaned back from his desk, annoyed. He tapped his hoof in contemplation for a few moments. "It's time we had some real fun. You know what's fun? Fire!" Ambrosius focused on the candle in front of him and fed it a scrap of paper. He was engrossed as the flames consumed the paper, watching it with fascination. Gąsienica was mostly nonplussed.\n    "But not this little flame, no. Something bigger. Much bigger." Ambrosius smiled contemplating the spectacle. "An inferno that sweeps through all the land, and lights up the sky!" He jumped up from his desk. "Let's go out and set the kindling. Come now, Gąsienica, we're burning daylight!" The Count rushed to gather his things for the excursion while Gąsienica lagged behind.\n    "Hopefully he doesn't cause too much damage..." Gąsienica muttered."
  barrad_fourth.2.a:0 "It's getting hot in here!"
  
  bar_titan_fight.2.t:0 "Undeserved Loss"
  bar_titan_fight.2.d:0 "    Screams from the lower shafts of the mine echoed through the stone, climbing the walls all the way to the surface. Leopold had failed to trap the beast beneath the rubble it crawled from.\n    That meant whatever it had been guarding was lost as well."
  bar_titan_fight.2.a:0 "Damn it"

  bar_titan_fight.3.t:0 "Strategic Victory"
  bar_titan_fight.3.d:0 "    Dust settled through the tunnels. The vile beast lay crushed beneath the stone it had crawled from. Leopold stood victorious as the miners cheered around him.\n    Now came the time to reap the spoils."
  bar_titan_fight.3.a:0 "Lets see what it guarded!"
  bar_titan_fight.3.b:0 "Wonder what this beast is made from"
  bar_titan_fight.3.c:0 "Leopold, turn around for a moment"
  bar_viira_kills_leopold_tooltip:0 "Viria will try to injure and possible kill Leopold"


