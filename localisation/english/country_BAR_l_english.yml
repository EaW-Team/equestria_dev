  BAR_wittenland_witchhunters:0 "Adventurer's Threat"
  BAR_wittenland_witchhunters_desc:0 "From time to time brave ponies and griffons from nearby countries band together to try their luck in our lands driven by a variety reasons. Sense of duty, greed, boredom, in the end all they accomplish is ruining a few parties."

  BAR_pentarchy:0 "The Pentarchy"
  BAR_pentarchy_desc:0 "Cruel, dangerous, but powerful, the five magocrats are the undisputed masters of Barrad, although they occasionally squabble amongst themselves. They happily work together to maintain their stranglehold on the region, but each pursues their own agenda, and won't be afraid to betray the others when the time comes. Check the §YPentarchy Window§! (CTRL + P) for detailed backstory and information on each member."

  BAR_pentarchy_enemy:0 "The Pentarchy"


