#old stuff
  bar_sane_ambrosius.1.t:0 "First Contact"
  bar_sane_ambrosius.1.d:0 "    Deep beneath the surface of Barrad, Count Ambrosius stood before the reactor with Gąsienica at his side. Ambrosius was in awe of the majestic device, and ephemeral voices beckoned him to approach it, come closer... He did, shambling towards it until suddenly the voices stopped and the pain started.\n    It was as if an entire universe was trying to make its home inside his skull! Unable to withstand it, he keeled over, screaming in pain. He brought his hooves to his head in an attempt to keep it from bursting from all he felt inside it. Upon seeing Ambrosius' state, Gąsienica was frantic, and poured many doses of the Count's medicine into his open mouth. Was this much of the drug unsafe? Gąsienica didn't know, but he had to do something.\n    Within the mind of Ambrosius, he fought against the invading presence with all his will. His thoughts were chaotic and it was impossible to centre himself. All seemed to be a whirlwind of hatred and hostility, until he noticed a voice inside the cacophony that was different from the rest. He sensed this part of the presence did not wish him harm, and so he focused on it. It told him what the presence truly was, that it was the product of seven ancient unicorns who had used a primordial spell from another age to merge together into one consciousness, but now was totally dependent on magic in order to survive. It told him that they did not want to cause all this, but that Ambrosius had unleashed a power that had corrupted them. Finally, it told him that it would use the last of its uncorrupted will to free him from his madness.\n    Ambrosius awoke to find Gąsienica beside him, grateful to see him alive. For the first time in an eternity, the fog was gone. His thoughts were finally clear. He felt like vomiting, but there wasn't time. He was responsible for an immense mistake, and there was no time to waste in putting things right. "Return to the surface, Gąsienica," said Ambrosius. "I must stay here and work on a way to fix what I have broken. Make sure things don't fall apart out there in the meantime.""
  bar_sane_ambrosius.1.a:0 "As you wish, my Count!"
  bar_sane_ambrosius.2.t:0 "Sacrifices"
  bar_sane_ambrosius.2.d:0 "    Gąsienica once again trekked through the mountain paths of Barrad, much less urgently than the last time he made the journey. After emerging from a narrow pass, he smiled as he laid eyes on his home village at peace. The aftermath of their battle with the plants was still visible, but now the mangled monstrosities were overgrown by vegetation of a more mundane variety.\n    As soon as he entered the town Jánošík came out to greet him, laughing heartily. "Good to see you, friend! Come to drag us out of the fire again?" He gave Gąsienica a playful punch which had absolutely no effect.\n    "Not this time, fortunately," said Gąsienica. "In fact, I have come to ask you for assistance. The Count is... away dealing with a matter of some importance. As you are a more respected figure than I among the mountain villages, your support would be appreciated at this time." Jánošík wore a mask of inscrutable contemplation. "Since he protected you in your time of need, it's only fair that you help him in return."\n    "No, no." Jánošík wagged a claw. "It wasn't him that saved us, it was you. And so I will do this for you." His voice shifted to become deadly serious. "Under one condition-if we are to respect your rule, you should respect ours. Promise that our villages will retain their autonomy, and I will help." Gąsienica nodded, and the two shook claws."
  bar_sane_ambrosius.2.a:0 "You've got yourself a deal."
  bar_sane_ambrosius.3.t:0 "Acquisition"
  bar_sane_ambrosius.3.d:0 "    Gąsienica walked cautiously down dark forest paths in search of the mysterious merchant Jánošík had dealt with in the past. It was this dealer that had provided them the artifact to ward off the corrupted plants when no other means proved effective, and any creature trading in such powerful magic was worth seeking out. Gąsienica had gone to the last place Jánošík said he met with the merchant, but saw only abandoned buildings with no civilisation in sight.\n    He was on the verge of giving up hope when a raspy voice slithered out from the darkness. "A visitor?" Gąsienica turned around and was surprised to find a stallion dressed in discoloured rags beckoning to him. As Gąsienica approached, the stallion gave a wide smile, revealing a glimmering gold tooth. "Come in!" He disappeared into a decrepit shack with Gąsienica following behind.\n    "You have come a long way looking for something, haven't you?" The stallion looked over the strange items that covered the walls before rummaging through one of the many containers laying haphazardly around the shack. "How about this?" He asked, pulling out an item and tossing it to Gąsienica. "This artifact will ensure you gain the favour of the people," he explained. Gąsienica ran his claws over the teardrop shaped object and could feel the magical power within. "Use it during the wet season to increase crop yields by an enormous amount."\n    Gąsienica had found his merchant, but this was quite unexpected. "You're just... giving it to me?" he asked.\n    "You have earned it." The merchant raised his hooves high in praise. "You have done more good for this land than you know, my griffon friend!""
  bar_sane_ambrosius.3.a:0 "That should come in handy."
  bar_sane_ambrosius.4.t:0 "Ambitions"
  bar_sane_ambrosius.4.d:0 "    Gąsienica met with members of the lesser nobility to assess their loyalty during the Count's absence, and was disturbed by the results. Although they all paid lip service and reaffirmed their fealty to Ambrosius, Gąsienica could see the plotting and scheming behind their flattery. They sensed an opportunity, and were simply waiting for the right time to make their move. It was clear that they were far from convinced, words alone would not be enough."
  bar_sane_ambrosius.4.a:0 "Time for some more drastic measures..."
  bar_sane_ambrosius.5.t:0 "Divine Disfavour"
  bar_sane_ambrosius.5.d:0 "    Gąsienica traveled to contact a shadowy cult that operated at the fringes of Barradian society. Although a bit obscure, they had several wealthy patrons and wielded a lot of influence, so gaining their support could prove very useful. When he reached their secluded compound, he found a scene of chaos and heated arguments. No two cultists had kind things to say to one another, and the volatile atmosphere felt like it could combust into violence at any moment.\n    It seemed that the Pentarchy's actions had ultimately created a schism within the cult. None of the members had heard from their god in some time, and they felt the deity's influence was growing weaker by the day. Those in the cult's Inner Circle accused the Outer Circle of being faithless, while those in the Outer Circle accused the Inner Circle of becoming corrupt and rotten, prompting their god to abandon them.\n    Gąsienica sighed. He didn't have time for this."
  bar_sane_ambrosius.5.a:0 "This must not be allowed to fester!"
  bar_sane_ambrosius.6.t:0 "Universal Truth"
  bar_sane_ambrosius.6.d:0 "    Gąsienica descended back underground to rejoin the Count, now that he was at last ready to exorcise Barrad's ancient curse. When Gąsienica reached him, Ambrosius looked tired, having studied magical texts nearly nonstop preparing the ritual to heal the being that had driven him to madness and back. Gąsienica held his breath as Ambrosius approached the reactor to perform the ritual. When he began the ritual in earnest, power started swirling all around them until suddenly, everything stopped, and the world became still.\n    A voice spoke to both of them, but it was not the elusive, shifting voice Ambrosius was used to hearing. It was a calm voice, low and quiet but at the same time not difficult to hear. "I am awake." The presence in the air washed over them like an ocean current. "My actions have wrought so much pain, so much destruction. For that, I can not express the magnitude of my sorrow." The room seemed to somehow fill with sadness. "But now I am freed from hunger and chaos, and I wish to do now what I have been unable to do for far too long. Let us make this world a better place."\n    Gąsienica was in shock from what he was witnessing and was completely unsure how to react. Ambrosius, however, smiled. "Yes, let's.""
  bar_sane_ambrosius.6.a:0 "We will overcome our past mistakes, and build a bright new future!"
  bar_sane_ambrosius.7.t:0 "A Letter."
  bar_sane_ambrosius.7.d:0 "    My dear friend,\n    I've brought ruin to our family.\n    You remember our venerable house, opulent and imperial, gazing proudly from its stoic perch above the moor. I lived all my years in that ancient rumour shadowed manor, fattened by decadence and luxury. Yet singular unsettling whisper suggested my very land was a gateway to some fabulous and unnameable power. With charisma and gold, I bent every effort towards gathering most capable individuals to help me recover the secrets sang in my dreams, exhausting what remained of my sanity. At last, in the blood soaked crags of forgotten caves, we unearthed that damnable device of antediluvian evil. Our every next move unsettled the ancient earth, but we were in a realm of death and madness. In the end, I alone survived, no longer laughing and yet to understand implications of our deeds and my crimes.\n    You remember our beautiful home – the hills of Barrad, flourishing and lively. It is a festering abomination! My friend I beg you, help those blood stained cursed lands, do not delve into what mortals should not ever see, and deliver our realm from the ravenous clutching shadows of..."
  bar_sane_ambrosius.7.a:0 "...the madness that is yet to come"


#new stuff
  bar_sane_ambrosius.8.t:0 "Indomitable Mare Spirit"
  bar_sane_ambrosius.8.d:0 "    In the corridor outside, there was a cacophony of shouts, clattering objects, and bursts of magic. Ambrosius sat calmly in the dining room, curiously awaiting the outcome of the chaos. Suddenly, the doors flew open as Gąsienica entered, carrying a passenger under his arm. It was a unicorn mare with a red mane and a purple coat, dressed in a simple uniform now wrinkled from her attempts to free herself.\n    "Let me go, monster!" she shouted, biting Gąsienica.\n    Unruffled, he walked closer to Ambrosius. "This one wished to see you," he said, grabbing her by the horn and surprisingly gently guiding her head to face his lord.\n    "Is that so?" Ambrosius set down the fork he had been eating with. "To what do I owe the pleasure, young lady?"\n    "You murdered my companions," she said, still struggling to escape Gąsienica's grip.\n    Ambrosius looked at her with lifeless eyes. "I'm sorry that happened," he replied, lowering his head as a sign of compassion. "Can you tell me what occurred? My mind has recently been shrouded in fog."\n    The unicorn continued to wrestle. "We... we came here to free Barrad from your tyranny."\n    "Were you part of the adventurer group that invaded my lands?" he asked, picking up his fork again.\n    "I led them," she responded.\n    "You marched them to their certain deaths," he remarked, spearing a piece of carrot from his plate. "Noble, but reckless. Are you seeking revenge for my actions or your own?"\n    She attempted to cast a spell, but the magical energy struck the massive claw of Gąsienica, who didn't even flinch. "Let me go, and I'll show you," she demanded.\n    "Tell me," Ambrosius said, chewing loudly, "where have you been all this time? It was quite long ago when our soldiers last met."\n    "I was captured by your lackeys," she said.\n    Ambrosius glanced at Gąsienica, who merely tilted his head slightly, indicating it wasn't true. "I think there might be a misunderstanding here. Those you speak of were no more under my command than the sun in the sky. You were captured by cultists, and..." He swallowed the food he was chewing. "Their story and motives are rather long tales."\n    Observing her continued struggle against the steel grip of the giant griffon, Ambrosius realized how much of his own fire had waned. So young, so eager to fight-she would make an excellent asset. "Gąsienica, let our guest sit properly. I know you love to carry a mares around, but it's very improper." Without hesitation, the griffon set the unicorn on the ground. "Now, go and fetch her something to eat; after all this time, she must be quite hungry." He waved him off. "As for you," he continued, turning to the mare, "you seem like a reasonable pony. You can kill me and die claiming revenge for your own actions, or you can make the deaths of your companions mean something by not throwing your life away and accomplishing great things.""
  bar_sane_ambrosius.8.a:0 "Very well..."
  bar_sane_ambrosius.1001.t:0 "Opinicus Defied"
  bar_sane_ambrosius.1001.d:0 ""Curious," the count said while his captive writhed on the blank stone floor. "The knight has become the pawn."\n\nThe Order of Opinicus, a knightly order Grover II had established to be a bulwark against the eastern pony hordes, had fallen. The two centuries between their birth and their death, though, had not warned them of the possibility that the common Gryphussian would in fact welcome those very hordes. Thus, here one of those knights lay, shackled in a temporary prison, lying in a limbo between execution or further imprisonment or worse.\n\n"It would be a waste, dear Count, if you were to leave us to rot without a use."\n\nIt got him listening. Anyone that remained in his burgeoning empire only did so because they had a... use.\n\n"You could've annihilated us totally, but you didn't. I hear your talk. I hear their talk. You see us. We are... valuable. We know things. We wield things that you'd like to use." Then, groaning as he tried his best to stand in chains, he declared, "The Order's original mission may have faltered, but the Order itself has not been extinguished. Think on that, dear sir."\n\n"And how will I know you won't betray me?"\n\n"You can kill us off if we prove unloyal or make new knights of others—"\n\nHis head—just like his speech—was cut off by a blade. As the Count sheathed his weapon, he thought of that simple calculus: Anyone with a decent plan of gaining power might as well use it against him. And yet, the knight's suggestion lingered: to give the former oppressors renewed purpose..."
  bar_sane_ambrosius.1001.a:0 "The Order of Opinicus, reborn. The Gryphussians will understand."
  bar_sane_ambrosius.1001.b:0 "We've defeated the knights to roaring applause. We must do away with the burden."
  bar_sane_ambrosius.1002.t:0 "Heavy Toll"
  bar_sane_ambrosius.1002.d:0 "    The room was cold and silent, dust swirling in the faint beams of moonlight that slipped through the old curtains. A single candle casted flickering shadows across the faded, peeling wallpaper. Ambrosius sat on a bed in middle of the room, his eyes fixed on the portrait hanging in front of him. It was of him and a mare, her beauty immortalized in vibrant colors. Yet, the painting, just like Ambrosius himself, had withered over the years. Her gaze seemed to follow him, full of life and warmth-a ghost of better days. \n    He took a deep breath, as he stared at her face, her smile, her eyes, and could only wonder: why had it had to come to this? The mad count of a broken land, a thief and a murderer. His voice little more than a whisper. "I can't stop now..."\n    The silence of the room pressed in on him. Minutes passed, or perhaps hours, time had little meaning for him right now. The quiet was all-encompassing, a weight that hung over him like a shroud.\n    Then, from behind, he felt as if somepony was watching him. Ambrosius didn't move, didn't look up. He knew who it was. He had learned how to sense him. Gąsienica simply stood there, watching his master. Without a word, he moved next to Ambrosius and squatted down. He did not speak, for there were no words needed between them.\n    Ambrosius did not look at him. His gaze remained fixed on the portrait, though his voice trembled slightly when he finally spoke. "How is the party?" Ambrosius murmured.\n    "Tame," Gąsienica replied, glancing at the mare in the portrait. "Is something wrong, my lord?"\n    Ambrosius was silent for a long moment. Slowly, he lifted his head and looked at the portrait one last time, then let out a long, weary sigh. "I never apologized to you," he said quietly.\n    "I owe my life to you," Gąsienica responded.\n    "Your mother begged me to save you after you were wounded," Ambrosius said, staring directly at the griffon. "I could have done it in so many different ways. Yet because of my ambition, I had to try the dark magic that was shown to me in my dreams." A single tear fell from his eye. "I can still hear your screams to this very day. No creature should have to endure what you did."\n    Gąsienica extended one of his massive talons and gently placed it on Ambrosius' shoulder. "I forgive you," he said in a low voice, "for that and the other things you had in mind."\n    Ambrosius was not ready for that answer. His mind had created so many different scenarios, but he could not have predicted this one. He reached up and patted Gąsienica's talon in gratitude, the only gesture he could think of at that moment.\n    "My lord, do you wish me to go back and entertain the guests in your name, or fetch a bottle for us?" Gąsienica asked firmly."
  bar_sane_ambrosius.1002.a:0 "Go my friend, our duty calls"
  bar_sane_ambrosius.1002.b:0 "Bottle or two of wine won't hurt..."
  bar_sane_ambrosius.1003.t:0 "The Call"
  bar_sane_ambrosius.1003.d:0 "    In the depths of his restless slumber, Ambrosius perceived a voice he had not heard in many a moon-a wicked hymn of the cultists' deity, now transformed into a hauntingly harmonious melody that chilled his very soul. An inexorable summons compelled him to meet this enigmatic entity face to face, to traverse its sacred halls, for there was that which he must behold with his own eyes.\n    Upon standing in front of the gate darker than the night sky, Ambrosius heard a soft whisper. It pushed him ever closer. Without realizing it, he sank into the halls behind the gate. What he saw etched itself indelibly upon his psyche, scarring his mind until the end of his mortal days, or maybe even those which would come after. He had felt the song of this ancient entity for so many years; he had heard its will. Its influence penetrated all corridors of his mind. Yet to see it with his eyes, to stand in front of it, to be surrounded by its presence-all he could do was drop to his knees.\n    "Do... not... be... afraid..." a harmonic voice spread from the depths of his mind to the very air around him.\n    "Stand... up... I... We... need... show..." a second voice, this one emanating from realms beyond the physical plane.\n    "You... must... know... help... prevent..." a third voice sang from the very center of the room.\n    Ambrosius, driven by an unknown force, stood up. He did not speak, but he was ready for what the entity had to show him. Sensing his willingness, a deluge of visions went straight into his mind. He beheld shapes impossible to recreate within the confines of physical reality, melodies morphing into colors beyond his imagination. The cacophony of this harmonic song, resonating through his senses, lasted mere moments, but for Ambrosius it was an eternity. In his mind, thousands of candles flickered, creating waves that extinguished the howling melodies echoing inside his skull. Yet the whispers of untold secrets remained.\n    "You... saw... we... do... not... know..." a fourth voice proclaimed.\n    "Past... present... no... future..." a fifth voice enveloped the room like a fog.\n    "Potential... good... has... you..." a sixth voice cried out from the depths of his own consciousness.\n    "As... I... us... not... follow..." a seventh voice whispered, fading into the abyssal silence."
  bar_sane_ambrosius.1003.a:0 "I... I need to understand..."
  bar_sane_ambrosius.1007.t:0 "A Shedding Away"
  bar_sane_ambrosius.1007.d:0 "    Ambrosius had to force himself to be in the same musty stone chamber as them. Dressed in a variety of uniforms but their horns uniting them all the same, and although they'd been argued with him and shouted at him and hurled abuse at him for how he'd gone astray, these Wittenlandic generals-standing in line like it were death row-wouldn't faze him. They weren't afraid of death... oh, how Silver Star would've tried if he'd known, but Ambrosius banished the stray thought.\n    Wittenlandic unicorns. Nearly nobles... he'd hated the nobility for ousting him, making a pariah destined to go mad in the kingdom's outskirts. The ponies here might not have been of royal blood, but in the machinations of his mind, he tortured them all the same, fictional spears and knives carving into their heads and indulging in their screams, just to let them know a taste of the insanity he'd suffered before letting them die and pass into the void.\n    But they were generals. Wittenlandic snobs, but generals still, a rare breed of intelligence and mental fortitude... and they were Wittenlandic to boot, a culture that had raised its sons and daughters to know no nepotism nor corruption in its highest ranks. It was merit or death.\n    Ambrosius finally stepped off from the stare down. As if in a trance, he gave them orders to stay in some temporary shelters, that if they serve his Magocracy over the upcoming campaign, it would be enough to give them another shot at life."
  bar_sane_ambrosius.1007.a:0 "Mercy is useful."
  bar_sane_ambrosius.1008.t:0 "Fiery Red Mare"
  bar_sane_ambrosius.1008.d:0 "    Amborius' dreams were invaded by visions sent to him from the cultists' god. But not all melodies and images engraved themselves equally. One of them was an image of a mare, her mane fire itself. As she went, death and destruction followed. But afterward, new life was born anew. At least that's what Amborius thought was happening. The visions were blurry at best-incomprehensible at worst. He had no idea what to do with it, no one to ask about it... but what if... what if he already had them? The entity spoke about the past. What if the guests he invited were not an accident? What if he had seen this earlier, just the fog that covered his mind made him forget?\n    Maybe the answers were closer than he thought. Maybe the other pentarchs could still be of use even after death."
  bar_sane_ambrosius.1008.a:0 "Let's hope they noted everything..."
  
  bar_sane_ambrosius.1015.t:0 "Age of Magic"
  bar_sane_ambrosius.1015.d:0 "    From the seemingly endless darkness emerged a horizon, but it was not the edge of land, sea, or the known firmament. It was born of unfathomable constructs, neither of body nor thought, stretching in all directions of the world and into those we do not perceive. Among them were towers with richly adorned domes, reaching unimaginably upwards, beyond all we know, towards the very void. And all of it was held in place by invisible strings, playing a chaotic melody-a silent scream of eternal power.\n    In the distance shimmered a veil of mist and light, behind which figures loomed. Their presence was palpable yet distant. These ancient souls moved slowly, establishing new laws, tightening the strings of reality and infusing them with energy. With each of their movements, they approached from the eternal horizon, weaving ever new melodies. Their bodies, if they could be described as such, floated above an unearthly surface-at times becoming liquid, at others solid crystal.\n    Images transformed into sensations, those most primal ones that almost every pony had already forgotten. Bottomless oceans and eternally green meadows, and upon them golden cities, not created by the work of hooves but by thought. Around them, reality had already been woven, and life appeared upon them. The same thought that created the land upon which these creatures now ran was also within them. In some, deeply embedded, almost inaccessible-but in others, it created new worlds resembling what they already knew.\n    However, at the corners of the horizon, dark clouds appeared and took the place of the ancient spirits. Their form was shapeless, and their stench destroyed all harmony. Guilty of their own existence, they shattered the heavens-yet they had neither beginning nor end. Their voices resonated like the harmony of strings encircling everything, for they were not created but born from what had been created. They proclaimed their coming in all languages of the living, the dead, and those yet to be born."
  bar_sane_ambrosius.1015.a:0 "Ambrosius wakes up"  
  bar_sane_ambrosius.1016.t:0 "Age of Monsters"
  bar_sane_ambrosius.1016.d:0 "    Another vision came suddenly, carving new cracks into his mind. Like a drop breaking through stone to give way to a destructive flood. And so, like a wave, it enveloped him, a fog as black as tar, drowning out everything around him until he no longer felt even his own body.\n    Being in the void of existence, the first thing to reach him was sound. It was neither a voice nor melody, but a primal word, which rippled through the abyss of nothingness, casting luminous shadows upon fading stars. It transformed into a heat blazing like the greatest of furnaces, and its glow gave birth to new life. Yet it was not born, but forged in agonies that veiled the stars above. For it was not a uniform creature, but something that continuously changed its shape-limbs transforming into others, disappearing, growing, forming new beings. Each change sent a scream through the strings encircling the known world, and the melody they played was like the cry of hundreds of beings.\n    The ground on which they stood began to tremble in fear, yet the new inhabitants had come not to live, but to reap the harvest of death. The waters became filled with eyes, blinking in rhythm, united in an eternal pact, waiting to once again witness the sparkling blue stars. But the screams of the land blinded them, long and silent, echoing off the sky. And no other melody could drown them out, no matter how beautifully it was played.\n    And yet, in the depths of the unutterable, something stirred behind the veil of unseen forms. Movements, impossible to perceive but known to exist, reverberated through the wastelands of void, creating vibrations too subtle to comprehend their origin. A shadow, which had never had a beginning, writhed within this unspeakable silence, and its presence, though invisible, felt like the weight of space itself. There, where everything seemed both created and yet never fully existing, a thought that had entwined reality pulsed with unyielding force, reaching beyond time. An immutable and eternal rhythm, each sound both a forgetting and a remembering, without beginning and without end."
  bar_sane_ambrosius.1016.a:0 "The visions has not ended yet..."    
  bar_sane_ambrosius.1017.t:0 "Age of Hope?"
  bar_sane_ambrosius.1017.d:0 "    The world around had turned to slime, enveloping all of existence and warping it to its own will. Word and flesh fought with all their might, slicing through its tendrils and drowning out ancient songs. And thus, harmony returned, but in those given workshops, nothing was born; instead, a new being was forged.\n    Within closed walls, all lights were extinguished, and all sounds fell silent. Only slow, precise movements betrayed the existence of something in that space. Suddenly, everything around began to pulse rhythmically, though nothingness reigned, and from its bowels, light burst forth. It exploded with a brilliance of countless figures and shapes, writhing and screaming. Their horns ground against each other, forming new shapes only to shatter into thousands more. Yet everything within this small cosmos was distorted, pulled from another world and era. Each shape unraveled not as familiar objects but took up more space than it was allotted, while at the same time being smaller than it should have been. The cacophony of blasphemous geometry persisted for ages, until another flash brought an end to all motion.\n    In the silence, amidst the frozen lights, something stirred. It was no longer the agony of a known form, but the first, delicate movement of a new being. Like the echo of a long-forgotten song, its shape began to fill the space, though it was neither physical nor tangible. It trembled like a shadow woven from the very essence of chaos, something unnamed, threading itself into the empty spaces, bending time and space. In this new, still not fully formed entity, pulsed an incomprehensible will, something that could not be called life or death. It was older than thought could grasp, something that belonged to no known order. At its core, a deafening whisper called out to be heard. Yet the world was now deaf to the ancient melodies, even the strings encircling all of existence had fallen silent. Those hidden in the darkness still tried to play and sing upon them, knowing that someone would hear them."
  bar_sane_ambrosius.1017.a:0 "Now I see..."

  bar_sane_ambrosius.1022.t:0 "Hills of Barrad"
  bar_sane_ambrosius.1022.d:0 "    #todo: gąsienica is not sure about waging war against whole riverlands, but amborsius says that he sacrifices so much that it would only be worth if he truly left his mark in history."
  bar_sane_ambrosius.1022.a:0 ""
  bar_sane_ambrosius.1023.t:0 "Prologue"
  bar_sane_ambrosius.1023.d:0 "The Count gazed wildly at Gąsienica in the darkest depths of his study. For a moment, fear seeped into the griffon-a hint, perhaps, that insanity had crept back in to crush his hopes. Ambrosius's eyes were as clear as day, as sharp as his wits. A lonely candle wavered, picturing the scene all apocalyptic. "There must be more, my servant. It will never cease. Their marching shall never cea-"\n\n"It is paltry glory you pursue, my liege. Like all others... before you."\n\nA moment of silence, as if the Count himself couldn't fathom the thought of insubordination, of somebody below him speaking out of turn. Then, his words thundered, cementing themselves in his lackey's mind. "We shall move west, to the Evi Valley, then beyond."\n\nGąsienica could only stare into what became darker than dark. The candle sat there, had sat there like in the early years, a frail beacon in the madness that was Barrad. None of the adventure of the forbidden arts remained, however.\n\nVainglory, a path Gąsienica couldn't follow him down on. Just another conqueror in a sea of conquerors. The Count had dabbled in death-he, of all others, should know the futility of temporal gains, gains on a writhing foundation of flesh.\n\nAgainst the horrors the once loyal griffon had seen, the unfolding tragedy was boring. But a tragedy, nonetheless, he would not deign to partake in.\n\nAgainst his former master's howling protests, Gąsienica left the room for an early end to his shift."
  bar_sane_ambrosius.1023.a:0 "Anywhere but here when the world falls down."
  
  bar_sane_ambrosius.1024.t:0 "The Deherzlandization Issue"
  bar_sane_ambrosius.1024.d:0 "    After the liberation of Gryphus, many of our Gryphussian friends came forward to propose an ambitious plan. They argued that Gryphus had fallen prey to intense colonization after the Groverian conquests. Because of this, many places were renamed to Herzlandisch or Sicameonese with little care to the history and dignity of Gryphus. So, they argue that the liberation of Gryphus won't ever be complete without a significant revision of the names. They also request funds for the creation of memorials, museums and various charities dedicated to help the impoverished Gryphussian reclaim their cultural heritage and lost prosperity.\n    However, despite the claims of some of the most enthusiastic griffons, not all of Gryphus is culturally homogenous and many parts of the region are not even majority-Gryphussian. Some members of the administration argued that the extensive plan shouldn't be implemented but rather watered-down to take into account the various cultural sensitivities of the population to prevent potential unrest."
  bar_sane_ambrosius.1024.a:0 "We did promise to reclaim their homeland!"
  bar_sane_ambrosius.1024.b:0 "Let' us not go to far."

  bar_sane_ambrosius.1025.t:0 ""The Only Winning Move...""
  bar_sane_ambrosius.1025.d:0 "Words rushed and scrambled around his poor, darkened head. Ambrosius, Ambrosius—that was his name, and they chanted it endlessly, carrying his body through the thoroughfares. His name was all he could understand, in a parade of happy faces that, in his vision, dripped unnaturally with smiles that stretched past their cheeks. It was a happy riot, and he was the centre of their attention, demanding that he speak, feast. Drink and be merry. You will live forever in the history of our valley.\n\nThen, the revelry ended, and his body would drag his soul to bed, nestled in the middle of a land not his own. The Evi claimed him, just as he'd laid claim to it. Yet, more lay open to him, like an abyss, for in that night's dream, a shadowy figure of his own imagination presented him with every kingdom of the world. Just pay a price: bow down to me.\n\nAmbrosius, in incoherent rage, tore the veil of the shadows, only to see that the tempter was a mirror copy of himself. But not quite. His face shifted, their voices hungry, grasping at anything to sate their hunger.\n\nJust like those corrupted spirits, that cursed reactor. Just like the Pentarchy, those wretched beasts!\n\nA drop of water stilled everything, washing away the vision, welcoming in the morass of melancholy. Regret. Then, a memory replayed: Back home. A way to pass the time. A game of chess with Silver Star. He knew the strange unicorn liked the game. But there was no reply, no yes. Then, he knew the memory, too, twisted itself, as the void that was once Silver Star spoke back to him, and he knew, too, that this was the dead voice of innumerable conquerors, like the Count, lost to time:"
  bar_sane_ambrosius.1025.a:0 ""...is not to play.""

  bar_sane_ambrosius.1028.t:0 "Janitor Duty"
  bar_sane_ambrosius.1028.d:0 "It should be easy to steal from a dead pony.\n\nThe Count's old manor in Dunburh lay dormant, and they'd been waiting for their moment to strike. Once the news was there and saw that no one was coming to take it, they came in, in robes that Ambrosius and the Pentarchy would've recognized had they been around to see them: the cultists, akin to the Inner and Outer Circles. A shadow of what they once were, but perhaps it was as it should've been.\n\nBreaking through the doors and going deep into the chambers, close to where the reactor used to be, they tried to breach it, with various spells and weapons.\n\nThen, a blast, and body parts fell. Screams went over, with ponies charging the intruder, only for them to be mown down by a deep blast after deep blast of a shotgun.\n\nThe first thing to break through the gunsmoke was the beak of Gąsienica, eyeing the carnage he'd created. "None left," he muttered to himself. "Just in time as well." But there, a realization hit him: they wouldn't be the last to try. He'd witnessed how mundane evils could be supercharged with untold stores of power. Who was to say Barrad was fully cleansed from esoteric magics? All it would take to topple everything was a singular mad stallion to wipe away the sanity he—and the dear Count—had built.\n\nSo, finally, in his head, the griffon put his affairs in order. There was no longer any room for mistakes like the Circles', the cultists'... "
  bar_sane_ambrosius.1028.a:0 "...like the Count's."

  bar_sane_ambrosius.1027.t:0 "A Letter."
  bar_sane_ambrosius.1027.d:0 "    My dear friend,\n\n    I've brought glory to our family.    \nYou remember our venerable house, humble and provincial, gazing shyly from its stoic perch above the moor. I lived all my years in that ancient rumor shadowed manor, fattened by decadence and luxury. Yet singular unsettling whisper suggested my very land was a gateway to some fabulous and unnamable power. With charisma and gold, I bent every effort towards gathering most capable individuals to help me recover the secrets sang in my dreams, exhausting what remained of my sanity. At last, in the blood soaked crags of forgotten caves, we unearthed that damnable device of antediluvian evil. Our every next move unsettled the ancient earth, but we were in a realm of death and madness. In the end, I alone survived, no longer laughing and yet to understand implications of our deeds and my accomplishments.\n    You remember our beautiful home – the hills of Barrad, timid and quiet. It is an ever hungry empire! My friend I beg you, help those blood stained lands, do not let my work be in vain, and deliver our realm from the ravenous clutching shadows of decay and decadence...."
  bar_sane_ambrosius.1027.a:0 "...after I will be gone"

#endings
  bar_sane_ambrosius.1029.t:0 "Light of Night"
  bar_sane_ambrosius.1029.d:0 "    \n    No matter where one turned, no matter what path was taken, it always led back to the same truth. Every plague, every misdeed, every evil that had gnawed at Barrad's heart since time immemorial-each could be traced to a single source. A presence from a forgotten age, a being that by all natural law should have faded into dust and myth. And yet, it endured.\n    It preyed on the cracks of the mind, whispering into thoughts not yet fully formed, seeding them with dread and delirium. It did not speak, but sang-a dreadful cacophony that clawed at sanity itself, melodies that no throat could utter and no ears were meant to hear. Every night, it called out, luring wanderers into the valleys where shadows did not merely fall but breathed. And yet... it comforted.\n    Its presence wrapped around the soul like a warm autumn breeze. It shielded one from the frost, gave false hope that summer would return, that safe harbors still existed, that someone waited for you by a fire, smiling, calling you home. In that moment of peace, all was already lost. Those who heard its song stopped resisting. They simply followed, never once looking back. They believed they had found home.\n    But there was one pony who did not walk that path. Not because his will was like an oak, which resist strong winds. No, his will was like a reed by the river, it bent in the wind but did not break. It waited, quiet and patient, for the storm to pass so it could rise again. But even reeds can be broken. All it takes is a careful grip. Pressure in the right place. Two claws and time.\n    The night was restless, the air grew thick and nervous. All could feel the wrongness crawling across their very being. Sleep, for those in the manor, became a curse. Dreams collapsed into nightmares. Eyes opened to find their own tears already soaking the pillow. The sky had not darkened-it had warped. Eerie, winding clouds slithered above, not covering the heavens but painting them with veins, like the skin of a wounded god stretched across the firmament. Some swore they pulsed.\n    Inside, light betrayed them. Candles sputtered like wounded beasts, their flames jerking in erratic spasms. Electric bulbs flickered with a rhythm that mimicked breath-shallow, labored, and wrong. No one dared to look directly at them. The guards hid behind pillars, officers lowered their eyes, and servants whispered prayers to names they had not spoken in years. All of them waited, not knowing for what-only hoping that something was just passing overhead. \n    Gąsienica stood alone on the balcony. Where his eyes fell, the clouds seemed to recoil ever so slightly. He knew something was wrong. He had listened to the stammering mouths of those who tried to describe what they saw or felt-but their words always failed. The sensations they described were like colors he had never seen, thoughts he could not hold.\n    So he stood through the entire night, unblinking, unmoving, as the sky breathed and shifted. And though he felt no fear, he could not shake the feeling that something-someone-was watching him in return.\n    Not like a predator. No, like an old friend meeting your eyes after a long absence. Familiar. Gentle. Terrifying."
  bar_sane_ambrosius.1029.a:0 "We need to speak"
  bar_sane_ambrosius.1031.t:0 "Overdue Conversation"
  bar_sane_ambrosius.1031.d:0 "    Ambrosius' throne room no longer resembled a seat of power. It had been transformed into a labyrinth of antennae, arcane relays, copper wiring etched with runes, and symbols whose meanings defied every known school of magic or science. The floor was a mosaic of inlaid metal veins that pulsed faintly, and the air shimmered with energies not meant for mortal lungs. This was no throne room-it was a beacon, a wound in the material world, and it was imprinted into Gąsienica's consciousness the day Ambrosius granted him his new life. \n    Merely stepping into the chamber became an ordeal of incomprehensible torment for those assigned to work within. Sound became color. Color became taste. The etched runes bled scents like rusted blood and damp ozone across the tongue. Every thought sparked like lightning and echoed outward, invading the skulls of nearby minds. Privacy of thought ceased to exist. Identity bent and buckled.\n    Workers, no matter how seasoned, could not remain in the room for longer than ninety seconds at a time. They emerged dazed, weeping, bleeding from their eyes, whispering apologies to gods no longer worshipped. And yet, Gąsienica remained. Hour after hour, day after day, he moved through the forest of shrieking metal. The respect his subordinates once held for him curdled into raw fear. They dared not speak his name too loudly, afraid it might draw his gaze. They whispered myths in the barracks: that he was not a griffon at all, but a deathless being wearing feathers like a cloak. That his will could not be broken because he had no soul left to fracture.\n    But they did not know the truth. Gąsienica had heard the melody, long before this device was born. He had heard it in ways they could not conceive, in places deeper than sleep and older than memory. And he had endured it. He had survived what no mind should. \n    As the final preparations were completed, the device's influence no longer confined itself to the throne room. The entire manor groaned beneath its pressure. Glass warped. Candles sputtered into flames of colors never seen before. Servants refused to enter the manor at all. Some ran into the night and were never seen again.\n    And then, one night, Gąsienica sat on Ambrosius' throne. The room screamed in frequencies outside mortal hearing. Everycreature fled. Those who tried to listen vomited, wept, or clawed at their ears. But Gąsienica remained still, eyes half-lidded, breathing slow. He waited.\n    "The deaf one..." the first melody crooned, delicate as spider silk.\n    "I... We... Did not expect..." The voice fragmented, reassembled-many voices, converging into one. Each intonation was a different chord, each word a dissonant note seeking its resolution.\n    "We... You... seek... answer... seek... guidance." The tones curled like smoke in his mind.\n    "But... you know it... We... You... are product... of bygone era..."\n    Then, a shift. The melody began to fade, softening like a memory dissolving in water.\n    "Conclude... it... please..." the last echo breathed, like a prayer slipping from cracked lips. "
  bar_sane_ambrosius.1031.a:0 "So be it"
  bar_sane_ambrosius.1032.t:0 "End of an Era"
  bar_sane_ambrosius.1032.d:0 "    The stage had been set. The orchestra waited in silence-an audience of echoes, of shadows long since drowned in time. Gąsienica stood at the edge of the final act, and he knew there could be no applause. No remnants must remain. No whisper of what once was.\n    Every known sanctuary-leveled. Every cave carved with forgotten tongues-buried. Temples where the old prayers once stirred the air-reduced to ash and silence. Scrolls crumbled, artifacts shattered, carvings scrubbed from stone. Knowledge, both cursed and sacred, wiped from the face of the planet. Now, only two things endured, two abominations born from an age that should have died long ago. Two monsters.\n    Once more, Gąsienica ascended the throne, not as a servant, nor as a herald, but as the final warden. He took his place at the heart of once a proud manor, now a ruin wired into the bones of reality itself. The moment his body touched the seat, the air thickened. The walls wept light. Frequencies vibrated through dimensions uncharted by any map or mind.\n    Voices came-not in words, but in melodies. Harmonies of unknown scales brushed against his feathers like memory. Flashes of color drifted through the chamber, each leaving behind a phantom scent, a taste without form. But these were not cries of pain, nor screams for mercy. They were sighs.\n    Relief. Release. Gratitude.\n    The great presence, whatever it had been-was letting go. And then Gąsienica focused.\n    His mind clenched around the signal like a vice. A scream erupted-not of voice, but of pure, elemental magic, a roar that bent the laws of reality. The foundations of the world trembled. The stars blinked. Trees far beyond the horizon shed their leaves in silence. For a moment, the sky forgot it was supposed to hold itself together.\n    Then... stillness. It was gone.\n    The source of all that had plagued Barrad. The thing that had twisted minds, shattered dreams, and turned blood to ink. It had been unmade. Willed out of existence by the one being stubborn enough to remain when all others had bowed.\n    Only Gąsienica remained.\n    The last monster in Barrad.\n    But he did not rise in triumph. He did not fall to weep. He remained still, staring at the dimming air, listening for what was no longer there.\n    He could not finish his work. Not yet. He knew better than most that rot does not always die at the root. Some seed might still lie buried, some artifact hidden beneath a mountain, some whisper tucked inside a child's dream.\n    But for now, he hed earned his rest."
  bar_sane_ambrosius.1032.a:0 "Duty will call once again"


