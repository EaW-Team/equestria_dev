  BAR_wittenland_contact_descs:0 "There were still reasonable ponies in Wittenland who could be persuaded, and this was not the first time Ambrosius had forged political alliances right under the crown's nose."
  BAR_wit_help_desc:0 "Though limited, we managed to secure some assistance from abroad to strengthen our weak military. It wasn't much, but it was better than nothing."
  BAR_scraps_of_legitimacy_desc:0 "Being a rogue state under the rule of a despot did little to grant legitimacy. Yet, the crown of Wittenland had always been passed to the most capable. Wasn't forging an entire realm, spanning hundreds of thousands of ponies, undeniable proof of Ambrosius' capability as a ruler?"
  BAR_amb_extend_of_my_tragedy_desc:0 "All that pain, all that death... and for what? To reign over ruins? That was not enough for Ambrosius' true self. The same ambition that had once driven him to become the mad count now compelled him to reach even greater heights-or perhaps depths." 
  BAR_ambrosius_fortune_desc:0 "Ambrosius had used his family fortune wisely, multiplying it to an unbelievable extent. Now, the time had come to spend it."
  BAR_ambrosius_buy_mils_desc:0 "Foreign weapon manufacturers had been eager to assist in expanding our production capabilities. Though, naturally, for a hefty price."
  BAR_ambrosius_foreign_experts_desc:0 "To bridge the gaps in knowledge and technology, foreign experts were hired at great cost. However their numbers were less than Ambrosius desired, alternative solutions has to be condisidered."
  BAR_ambrosius_buy_civs_desc:0 "Industrial machinery from far-off lands were imported and reassembled piece by piece, breathing life into the industrial heart of Barrad. It was a costly endeavor, but Ambrosius believed it would lay the groundwork for a self-reliant future."
  BAR_ambrosius_mercs_desc:0 "How could a story of great conquests have existed without a few bands of mercenaries?"
  BAR_ambrosius_buy_refinery_desc:0 "With limited access to oil, we were forced to rely on synthetic refinement."
  BAR_ambrosius_buy_experts_desc:0 "Operation Jonquil had been launched in secret, its goal to acquire industrial knowledge and skilled specialists from abroad-by any means necessary. The operation's success came with a heavy moral price, but it was one that Ambrosius was willing to pay."
  BAR_amb_pilgrimage_desc:0 "A deep fear enveloped Ambrosius when he once again heard the eerie melody in his head, the Machine God was calling."
  BAR_amb_western_focus_desc:0 "A promise made, a promise kept. Ambrosius prepared to fulfil his word to mountain griffons."
  BAR_amb_around_mountains_desc:0 "The mountains separating us from griffons has proven to be great defence in times of their expansion. Plans to bypass them were made, on the expense of our southern neighbor."
  BAR_amb_kasan_shipbuilding_desc:0 "With such great sea access Kasan's shipyards had the potential to become the envy of the world, and Ambrosius poured resources into their expansion. Soon, the seas would know the might of Barrad's navy"
  BAR_amb_old_subjects_desc:0 "Former subjects of the realm, scattered in foreign lands, were brought back into the fold. Ambrosius reached out to them with promises of protection and prosperity, hoping to mend old wounds"
  BAR_amb_kasa_connect_railway_desc:0 "A railway was constructed, linking once hostile realms and fostering trade. It became a symbol of unity in a land divided by history, geography and madness."
  BAR_amb_griffon_administration_desc:0 "Governing openly hostile territories required careful planning and compromise. Ambrosius decided to not send his fellow ponies down to Kasa but instead his mountaineer griffons-known for their love of freedom and liberty. It was simple gesture, yet it distinguish him from mere invader."
  BAR_amb_kasa_barrad_laws_desc:0 "An unthinkable had happened. Ambrosius adopted elements of Kasan's legal framework, merging them with Barrad's laws. For many it was sign of hope for better future, for him it was pragmatic move to keep the unruly region stable."
  BAR_amb_kasa_advisors_desc:0 "Citizens of Kasa were offered with simple offer, they will partake in the politics and administration of the Barrad as lons as they will not try to undermine the authority of the count. Many accepted the offer and Ambrosius welcomed their counsel, though he kept their ambitions in check."
  BAR_amb_west_east_railroad_desc:0 "The construction of a railway connecting the western and eastern territories marked a turning point for the nation. Ambrosius saw it as more than a practical project-it was a symbol of unity and progress, binding the fractured lands together and preparing it for the expansion westwards."
  BAR_amb_deliver_promise_desc:0 "The day has came, we marched towards Gryphus. May the spirits guide us, and fortune favors us."
  BAR_amb_connect_realms_desc:0 "Bridging the realms of Gryphus and their mountainous homeland had always been a distant dream for the mountaineers, but under Ambrosius, it became a reality. Roads, trade routes, and alliances began to knit the two regions together."
  BAR_amb_free_city_desc:0 "Riaportu was a difficult case for Ambrosius. If he had followed the advice of his fellow mountaineers, the city would have been renamed to some unpronounceable gibberish, and half of it would have been torn down. But Ambrosius recognized that many reasonable griffons called it home, even if they spoke a language different from the majority. His decision was pragmatic, Riaportu was granted the status of a semi-autonomous city, with considerable liberties in its governance-though not without a few key limitations."
  BAR_amb_fate_of_the_order_desc:0 "The fate of an Opinicus Order lay in Ambrosius' hooves. He weighed his options carefully, knowing his decision would echo through the whole realm."
  BAR_amb_adapt_old_imperial_bureaucracy_desc:0 "A griffon clerk with a stamp can ruin even most powerful unicorn's life."
  BAR_amb_all_hail_liberator_desc:0 "The griffons of Gryphus hailed Ambrosius as a liberator, their voices echoing in towns and villages alike. Yet he bore the weight of that title uneasily, aware of the expectations and burdens it carried."
  BAR_amb_oil_extraction_desc:0 "Beneath the soil of Gryphus lay untapped reserves of oil, and Ambrosius moved quickly to extract them. The new wells fueled both industry and ambition."
  BAR_amb_grand_county_desc:0 "The realm of Barrad grew in size, from not even single city of Dunburh to a county of milions of creatures. Ambrosius titled it Grand County, a milestone in his legacy."
  BAR_amb_call_of_steppes_desc:0 "Steppes of Evi Valley were thorn in the back for every ruler of Wittenland. Ambrosius knew that taking over them would provide invaluable strategic possibiliteies against countries of the riverlands, as well as new resources for Barrad's growth."
  BAR_amb_pacify_steppes_desc:0 "Bringing order to the steppes was a challenge that had eluded countless kings and queens of Wittenland. However, Ambrosius possessed something they did not-his loyal griffon subjects. These griffons, kins with the unruly steppe dwellers, knew exactly how to handle them."
  BAR_amb_estabilish_cossaac_units_desc:0 "Drawing from the traditions of the steppe griffons, Ambrosius established cossack units within his army. These fierce and mobile forces became an essential part of his military strategy."
  BAR_amb_open_plains_combat_desc:0 "The open plains of Evi Valley required completly different strategies than mountains regions of Barrad or dense forests of Gryphus. Luckily Ambrosius' new subjects lived and died for centuries on those open steppes, all he needed to to was to listen to them."
  BAR_amb_new_military_administrative_division_desc:0 "With such a vast territory and a myriad of diverse creatures under Ambrosius' rule, the old administrative principles from the days when Barrad was merely a collection of towns and villages were no longer sufficient. This was particularly evident with recruiting new troops. Fortunately, Ambrosius had few ideas for streamlining the process and adapting to the needs of a growing realm."
  BAR_amb_into_the_steppe_desc:0 "To truly tame the steppes, establishing reliable access was essential. Roads and railways began to take shape, cutting through the vast expanses, and alongside them rose new government buildings."
  BAR_amb_rebuild_kaiv_desc:0 "Kaiv had been left in ruins by war. Ambrosius spearheaded its reconstruction, restoring it to its former self. A gesture of goodwill towards his new subjects."
  BAR_amb_infrastructure_projects_desc:0 "The settlements in the newly conquered steppes shared one thing in common-they were scattered far apart, with little in the way of practical connections between them. To address this, a series of  infrastructure projects was launched. These efforts sought not only to ensure local prosperity but also to fuel the growth of the nation."
  BAR_amb_secure_the_flank_desc:0 "Plans were drafted to secure the eastern border, for it was far preferable to have the ocean as a neighbor than the heirs of viking raiders."
  BAR_amb_build_up_olv_desc:0 "Austurland, devastated by conflict, became the current focus of Ambrosius. Resources and ponypower were poured into the region, repairing what we had destroyed.."
  BAR_amb_build_up_olv_1_desc:0 "Alongside reconstruction, Austurland received reparations and compensation for its suffering. Ambrosius hoped these gestures would heal old wounds and foster loyalty."
  BAR_amb_integrate_olv_desc:0 "Fully integrating Austurland into the nation was a great task, but Ambrosius tackled it with persistence. New laws and reforms were drafted to ensure the region's future as part of Barrad."
  BAR_amb_olv_zes_railroad_desc:0 "A railway linking Austurland's ports to the rest of the nation was completed. Trade and travel flourished as a result."
  BAR_amb_olv_zes_combined_naval_experience_desc:0 "Ambrosius drew on Austurland's and Kasa's naval traditions, merging them with Barrad's resources to create a formidable oceanic presence."
  BAR_amb_olv_zes_factories_desc:0 "Local factories were expanded through economic cooperation with Barrad and Kasa, bringing Austurland into the industrial age."
  BAR_amb_commonwealth_desc:0 "Thought the right of conquest Ambrosius forged a sacred union built on promises of mutual prosperity and stability. Would it survive the test of time, he has no idea yet-but this day has ben barked in the history books to come."
  BAR_amb_old_homeland_desc:0 "The Kingdom of Wittenland embodied everything Ambrosius despised. Yet, no matter what he did, it always seemed to find its way back into his path. The time had come to challenge the crown."
  BAR_amb_fortify_border_desc:0 "The border with the Wittenland were reinforced with new fortifications, ensuring the nation would be protected untill we will be ready to face them."
  BAR_amb_military_build_up_desc:0 "Ambrosius prepared the nation for war, as it was not the matter of if-but when it happens."
  BAR_amb_unite_south_desc:0 "Fighting all of our neighbors at once would have been suicidal. That's why Ambrosius chose a different approach, targeting them one at a time and gradually reuniting much of the once-great High Kingdom."
  BAR_amb_kasa_build_desc:0 "The industrial potential of Bymnon was realized as factories sprang up, transforming the once-sleepy region into a center of production."
  BAR_amb_kasa_build_1_desc:0 "Fireshore, scarred by conflict, was rebuilt from the ground up. The reconstruction effort turned the region ty into a symbol of growing ambition."
  BAR_amb_core_kasa_desc:0 "The autonomy of newly conquered Kasa was quickly curtailed, bringing the region under tighter central control. Ambrosius believed this was necessary to maintain stability, at the expense of local population freedom and traditions."
  BAR_amb_olv_build_desc:0 "Ambrosius ensured that the weapons of war would be ready when they will be needed again."
  BAR_amb_olv_build_1_desc:0 "Preparations for war continued as resources were funneled into the production of arms and equipment."
  BAR_amb_core_olv_desc:0 "No matter how proud a creature can be, all break at some point. With some patience the region will be brought fully under Barrad's governance."
  BAR_amb_attack_wit_desc:0 "A preemptive strike against Wittenland was launched, driven by Ambrosius' determination to secure his legacy. May history have mercy on us all."
  BAR_amb_claim_wit_crown_desc:0 "Might makes right-a principle as ancient as the duels fought for the Wittenland crown. For Ambrosius, that was justification enough to claim the title of King of Wittenland for himself. Those who dared oppose him were swiftly dealt with, leaving no room for dissent."
  BAR_amb_realm_reunion_desc:0 "The once divided kingdom was reunited under a single banner, a moment of triumph for many-but for Ambrosius, it was merely the beginning of his journey."
  BAR_amb_nationwide_electrification_desc:0 "Electricity is the light of the future. It can run almost indefinitely, as long as there's a power source, and doesn't rely on a unicorn to relight a torch. If the entire state could be connected by an electrical grid, all aspects of society would be drastically improved, as long as everypony is taught on proper care and maintenance."
  BAR_amb_restore_guilds_desc:0 "The guilds of old were confraternities of craftsponies that had control over their designated craft. They reduced competition and maintained good quality of work. Queen White Star abolished the guilds to pander to the merchants so they could exploit the workers and flood the market with garbage. Now Amrosius has refound them to buy support of the craftsponies."
  BAR_amb_patronage_desc:0 "The monarch of Wittenland has traditionally offered his or her patronage to talented artists and scholars, gathering an entourage of intellectuals to elevate the prestige of the monarchy. With his shaky legitimacy Ambrosius had no other choice but to comply to that tradition."
  BAR_amb_state_controlled_trade_desc:0 "Trade is too important to be left entirely in the greedy hooves of the burghers. Instead, the royal government should oversee commerce and intervene directly whenever necessary, to ensure the state retains a secure supply of strategic goods and so the price of cereals doesn't rise too high. We will also limit imports so domestic production can grow without having to compete with foreigners."
  BAR_amb_public_works_desc:0 "Some things simply aren't profitable, and as such get little interest from the merchants. An example is public infrastructure, especially in more remote areas. The state, however, can use funds received from taxes as it sees fit. Therefore we shall invest in expanding the road network of Wittenland across the nation, connecting isolated villages and providing work for thousands of ponies."
  BAR_amb_expand_silver_mine_desc:0 "Centuries ago, the silver mine in the mountains of Cemricia was one of the largest in the world, producing tonnes of silver to be used in coinage and crafts. It was even used to make the original crown of the High Kings and High Queens of Wittenland. The mine was closed however as it ceased to be profitable. Now, with modern mining equipment available to us, it is worthwhile to reopen it."
  BAR_amb_royal_university_desc:0 "Hoofdosius II had founded the University of Wittenburgh over a thousand years ago, and it was one of the first such institutions in the entire world. It was primarily used to educate bureaucrats and mage-nobles on the subjects of rhetoric, law and philosophy. Some time after Blessed Sword's conquest of Wittenland, the university was closed and never reopened-until now."
  BAR_amb_ancient_regime_desc:0 "The monarchy of Wittenland was an ancient institution, steeped in traditions and customs. While Ambrosius would have loved to cast them aside, he understood that, for now, he needed to play by its rules."
  BAR_amb_royal_pardon_desc:0 "A royal pardon was issued to those who once fought against Ambrosius, a gesture of reconciliation meant to heal old wounds. Not all accepted the olive branch, but it marked a new chapter for many."
  BAR_amb_divine_guidance_desc:0 "The fervor of the cultists was a force to be reckoned with, and Ambrosius was willing to harness their zeal to help lead his armies."
  BAR_amb_cult_in_high_places_desc:0 "The influence of the cult reached the highest levels of power, infiltrating the court and government. Not even the old elites were safe from their grasp now."
  BAR_amb_king_of_mountains_desc:0 "Ambrosius had lived and fought in those mountains his entire life. Now, he had risen to become their undisputed master."
  BAR_amb_lifetime_of_war_desc:0 "A lifetime spent in the chaos of war and politics had left its mark on Ambrosius. He reflected on the battles fought and the sacrifices made, wondering if he will ever get to know peace."
  BAR_amb_never_ending_ambition_desc:0 "Ambrosius had accomplished so much, yet, as always, he was not satisfied. There was always another world to conquer-he merely needed to set his sights on it."
  BAR_amb_hoof_and_iron_desc:0 "The balance of industrial and military might became central to Ambrosius' strategy. His factories churned out weapons while his soldiers fought, each preparing to fuel his legacy."
  BAR_amb_blood_of_meere_creatures_desc:0 "Blood of Mere Creatures"
  BAR_amb_song_of_spirits_desc:0 "Life had always been about more than the mere dust from which all creatures were formed. Heroes of the past who embraced the divine had achieved extraordinary feats-and now, the Machine God stood on our side."
  BAR_amb_supremacy_of_magic_desc:0 "There was no denying it, magic coursed through Barrad like blood through veins. All we had to do was let it guide us, and anything would become possible."
  BAR_amb_conqueror_bent_on_conquest_desc:0 "Ambrosius' reputation spread far and wide. His campaigns left a trail of victories and devastation, earning him both fear and admiration."
  BAR_amb_unveil_machine_god_mystery_desc:0 "Until now, Ambrosius believed he understood all there was to know about the Machine God. But then the dreams began. They were reminiscent of the ones he had experienced before, when he still heard the song-but this time, they were far clearer."
  BAR_amb_interpret_visions_desc:0 "With each passing day, the visions grew longer and clearer. There had to be a deeper meaning behind them, one intricately tied to the god of the cultists."
  BAR_amb_final_letter_desc:0 "A letter was left on Ambrosius' desk..."

  
