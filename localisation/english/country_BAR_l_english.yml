  barrad_silver.22.t:0 "Premonitions"
  barrad_silver.22.d:0 "    Truthfully, Silver Star didn't quite know what would happen after he had ascended into a Lich. When he was young, he'd read forbidden passages of powerful mages in the far north who had mastered the art of unlife. Still, those scraps of knowledge seemed to overlook something crucial: the amount a pony would have to sacrifice in order to gain immortality.\n    Silver Star looked at his foreleg. Once vibrant in color and with neatly combed fur, it was now a shriveled, pale tan that lost patches of fur every time he brushed his hoof across it. It was... disconcerting, to say the least.\n    He tried to take solace in his victory over the Pentarchy, though the joy and vindication he had first felt seemed more elusive than ever. Emptiness seemed to be his primary emotion now, despite his best attempts to deny it.\n    The Archlich paused as he tried to focus on that phantom feeling. Perhaps... perhaps if he replicated it. If he became more powerful, if he defeated greater foes, then this emptiness might go away."
  barrad_silver.22.a:0 "The road to oblivion is paved with hope."
  barrad_silver.8.t:0 "The Edge Of The Void"
  barrad_silver.8.d:0 "    Recently, Silver had sought to converse with Leopold to pass the time. Despite being a rotting corpse, Leopold contained enough semblance of his former self to hold a conversation... at least, sometimes he could. Even then, Silver felt naught but a great vacuum where once he had enjoyed speaking with the griffon.\n    Out of desperation, or perhaps foolishness, he commanded one of his undead to attack him in hopes that he would feel fear. Still nothing, he realized, as he tossed aside the now-inert skeleton.\n    This was becoming a serious problem. Silver looked down at his foreleg again. Some parts of the bone were starting to show through the various tissues and ligaments, and if he looked closely enough, he could see the magic aura that allowed his body to move in undeath. He briefly wondered if becoming a lich might have been a mistake.\n    Silver shook his head to rid himself of that notion. No, there was no mistake. He simply hasn't found what would make him truly happy, yet. He simply needed to keep looking, to keep trying...\n    His thoughts turned to the Kingdom of Wittenland from which he had been ostracized. A kingdom... yes, that would do it. He needed to build a great kingdom, and then he would find his eternal joy."
  barrad_silver.8.a:0 "There is Nothing to fear."
  barrad_silver.9.t:0 "Prince No More"
  barrad_silver.9.d:0 "    The crown rested upon Silver Star's head like a whisper-light, cold, and indifferent. It was done. The land of his birth, his cursed and beloved homeland, now bent to his will. There would be no more scheming nobles whispering poison behind velvet curtains. No more pretenders. No more traitors.\n    There was only him. His will was absolute. A single command could reduce cities to dust. A breath of intention could split the mountains. His word was no longer law-it was nature.\n    And yet... he felt nothing. No relief. No rush of triumph. Not even the cold satisfaction he had once imagined. He sat in stillness upon the ancient throne of Wittenland, where monarchs of blood and flesh had once trembled under the weight of duty. Silver Star sat taller than any of them. He had taken the crown with power they could never comprehend.\n    But he could not even name what stirred within him. Because it was not a stirring. It was absence. A quiet, perfect void.\n    It was not numbness-it was null. Like standing at the edge of an abyss and staring down into infinity, only to realize that the abyss offered no secrets. Like watching the night sky and seeing nothing-not a single star. Only black. Unmoving. Indifferent.\n    He was the victor. The conqueror. And perhaps... that was the problem. Perhaps this was not an ending at all.\n    The thought formed in his mind, gentle and poisonous: What if I feel this way because I am not finished with my path?\n    He turned the idea over slowly, reverently. The emptiness was not failure. It was the gap between steps. The silence between movements in a symphony yet to be completed. He had not yet reached the summit-only a ledge with a better view of what remained.\n    Much lesser beings had worn this crown and called themselves kings. But I am not like them, he thought. I am more.\n    And perhaps-just perhaps-if he went further, if he reached beyond. Then, perhaps..."
  barrad_silver.9.a:0 "...I would finally be whole"
  barrad_silver.10.t:0 "High King"
  barrad_silver.10.d:0 "    Pure emptiness. Not silence, nor peace-this was something deeper. A hollow void carved into the fabric of being. A quiet crime against existence itself. For to be is to experience. To exist is to process sensation, to take in the world and let it shape you. And then ... then what?\n    A sense of self. The memory of impact. The satisfaction of accomplishment. The regret of failure and the will to do better. These are the threads that weave the soul. Silver Star felt none of them.\n    He had stretched his dominion across the land, further than any Wittenland monarch before him. He had redrawn borders not with ink, but with ash and blood. He had become the architect of an empire-one forged by intellect, talent and power.\n    But he was still empty. He knew that should mean something. He should be afraid. He should feel sadness, or at the very least-dread. But what he felt was neither pain nor peace. It was indifference, and that indifference screamed louder than any sorrow ever could.\n    He wanted to cry. To scream. To tear the sky open and demand an answer from the stars. But his throat would not move. His eyes remained dry. Even rage had abandoned him.\n    He stood alone on a tower's edge, gazing into the horizon where clouds gathered like ghosts of forgotten kings and queens. The wind tugged at his cloak, but he did not shiver.\n    Out there, beyond the mountains and ruins, there were still worlds untouched by his will. Kingdoms yet to kneel. Lands that had not yet learned his name.\n    Maybe that was it. Maybe his achievements were not yet grand enough. Perhaps the hollowness within him was not a flaw, but a hunger."
  barrad_silver.10.a:0 "Maybe... Maybe..."
  barrad_silver.11.t:0 "Dead End"
  barrad_silver.11.d:0 "    A wise pony had once said, "When will dies, ambition dies as well." Silver Star could not recall who had spoken the words-only that they returned to him now, unbidden, as he stared in silence at the great parchment map unfurled across the war table. \n    It depicted his empire. His creation. Territories annexed through fear, and fire. No realm in recent memory had ever grown so swiftly, nor bent so completely to the will of a single unicorn. It was, by all measurable standards, magnificent.\n    But what was the point?\n    His eyes wandered across the towns and cities marked in neat little sigils. Each one was a testament to his power, waiting only for his command. With a gesture, he could raise them into gilded utopias, paved in gold and flooded with fountains of light. Or he could grind them into dust and salt, turning them into warnings for any who might still dare to resist him. They could be cradles of art, centers of magical craft, factories birthing machines of war more terrifying than any the world had yet seen.\n    And yet... what was the point?\n    His mind drifted to his library-an ever-growing vault of arcane knowledge, brimming with tomes he had claimed from conquered lands. A treasure hoard of intellect and wonder. He could study for centuries, unravel the deepest secrets of the cosmos, transmute matter, rewrite reality.\n    And what was the point?\n    He turned toward the mirror on the far wall. Slowly. What looked back at him was... a unicorn. A pale, face. Eyes too still. Flesh that had begun to betray the process of decay, suspended in a magical stasis. He tilted his head slightly. The reflection did the same. He did not recognize the face.\n    He knew it was his-but it felt like a lie. Or a memory. A name spoken without understanding. He could not recall how he used to feel. He could not even remember what it meant to feel.\n    He turned back to the map. Its lines, once sharp and vibrant, now bled together. It all looked like veins-cold and lifeless, running through a thing that had once been alive."
  barrad_silver.11.a:0 "What was the point?"
  barrad_silver.12.t:0 "A Bird in the Room"
  barrad_silver.12.d:0 "    Few thoughts crossed Silver Star's mind these days, and fewer still could be called emotions. Whatever once filled him with dread had long since dulled into abstraction. Fear had become an academic concept-something he remembered experiencing, but now observed from a distance, as one might study rot beneath a lens. And yet, there remained one notion that refused to be dulled.\n    Griffons.\n    Even the idea of them stirred something uneasy in the recesses of his hollowed psyche. Not quite fear. Not quite revulsion. But the echo of something primal, a reflex buried so deep it whispered through the void within him. His dominion now stretched across their lands, and with that came a problem-one he could not ignore. What to do with them?\n    He pondered, circling the issue like a predator unsure whether to strike or retreat. Raising them as undead was out of the question. Doing so would create a tether between his spirit and theirs-a link, however faint, that could be traced, twisted, or corrupted. The very idea made his magical instincts recoil. There was no telling what such creatures, born of violence and sharp intent, would do with access to even a sliver of his essence.\n    Mass extermination, while tempting in its finality, was equally unwise. It would unite the griffons in fury. Blood called to blood, and killing them all would ensure a war he could not fight.\n    But letting them be? Leaving them to rebuild their strength, to whisper behind closed doors and sharpen talons in the dark? Unthinkable.\n    He needed them quiet. He needed them occupied.\n    And then, a memory surfaced-slippery, but intact. It was from a time spent thumbing through Asinti's sprawling collection of books and scrolls. Perhaps the zebra had not intended to share them, but Silver Star read them nonetheless. Most of it was obscure mysticism and apocalyptic rambling, but buried within it he found a formula. A substance.\n    It was crude, yet clever. Said to induce a state of overwhelming ecstasy in those who consumed it. Not mere euphoria-but a total, blissful surrender. Thought was silenced. Willpower dissolved. A creature would become lost in the sensation, passive and content.\n    What if... What if he gave this to the griffons? Not as poison. Not as punishment. As a gift.\n    A gift of pleasure so profound, so consuming, that they would forget to resist him. Forget to scheme. They would have no reason to fight a ruler who gave them paradise.\n    He needed only to find a way to distribute it-discreetly, invisibly. Perhaps through food, or water, or something more sophisticated. Something that reached the blood without touching their beaks."
  barrad_silver.12.a:0 "Maybe Ambrosius studied such things..."
  barrad_silver.13.t:0 "New Collection"
  barrad_silver.13.d:0 "    The night lay heavy and silent, a stillness so complete it seemed the world had forgotten how to move. Wrapped in that quiet, Silver Star paced his chamber in slow, restless circles, hooves tapping against the cold stone floor like a broken metronome. Every surface of the room burned with candlelight. Dozens... no, hundreds of candles, crammed into every crevice and corner, their flames quivering in unison. Not a single shadow remained in the chamber. The wax had long since begun to overflow, forming rivulets and puddles on the floor, half-dried and glistening – a silent testament to how many hours he had spent in this place. All alone.\n    But his mind was far from wax and fire, stone and light. His hollow gaze stared through walls and time, fixated on things that did not yet exist... or had long since passed into oblivion. He roamed like a ghost waiting to find a purpose.\n    And then he saw it. He stopped mid-step. A shadow had crept across the far wall, where there had been none. Slowly, silently, it expanded. At first, Silver Star expected surprise or even fear to stir in him, but nothing came. No dread, no confusion. Only stillness.\n    The shadow swelled until it blanketed nearly the entire wall. It writhed with subtle, unnerving motion, forming shapes that refused to resolve themselves into anything familiar. They shifted like memories, seen through broken glass. Shapes without names. Movement without meaning.\n    His horn flickered to life. He lowered his head, the point of his horn glowing like a drawn blade aimed at the anomaly.\n    But before magic could be loosed, a voice-silken and composed-uncoiled from the very walls around him. "Let's not be so hasty, my lord," it said, smooth as oil poured over marble. "I mean you no harm. On the contrary-I come bearing a gift."\n    Silver Star did not speak. He simply raised his head, letting his horn's glow dim to a simmer.\n    "You may not recognize me," the voice continued, as the shadow danced like firelight, forming mockeries of movement. "But we've met before. We've made... profitable exchanges."\n    Silver Star stared, unblinking. He did not try to remember. His past was a tattered cloak-unworn, unnecessary.\n    "I deal in rare things," the voice purred. "And I offer homage... to our new liege."\n    The shadow thickened, stretched, descended. Slowly, two hooves formed on the floor, forged from darkness itself. They moved with reverence, as if cradling something precious. They approached Silver Star, and then with solemn grace-placed their offering on the floor before him.\n    Then the hooves withdrew. The shadow receded. The wall began to still.\n    Silver Star glanced down-a single card rested at his hooves. He lifted it in his magic, turning it before his eyes. The parchment was old and cold to the touch, the ink faded yet sharp. On its face, a single word: DEATH.\n    For a long minute, he simply stared. Then spoke, voice dry and distant. "A single card?"\n    But the wall was blank again. Empty. The shadow had vanished as if it had never been."
  barrad_silver.13.a:0 "... ?"
  barrad_silver.14.t:0 "Road of the Fool"
  barrad_silver.14.d:0 "    The deck of tarot cards lay neatly arranged on the old wooden table, their faded edges catching the flicker of candlelight. To the untrained eye, they seemed nothing more than brittle scraps of parchment-worn, weathered, mundane. But Silver Star knew better. No ordinary deck wandered into his possession of its own accord. No ordinary paper found its way into so many different places.\n    He had spent countless hours poring over them-studying, inspecting, feeling for something beyond ink and fiber. Magic slept beneath their surface. He could feel it. It pulsed faintly, like breath behind a wall. There was something these cards were trying to say. And he had not yet learned the language.\n    His eyes drifted again to the first card he'd received-Death.\n    "You're missing the point," a voice murmured, threading itself through the still air like smoke. It was smooth, familiar. Shadows lengthened across the walls, weaving through the candlelight like dancers performing an old ritual. "Or perhaps," the voice continued, "you're missing the card."\n    "You know where it is," he said, without lifting his head.\n    "But of course I do," the voice whispered, almost gleeful now. The shadows flickered in excitement, curling like tendrils of ink in water. "It's right in front of you."\n    Without warning, a burst of white light exploded through the room-violent, blinding. Everything was consumed in that flash. The walls cracked, the shelves collapsed, and the flames snuffed out as if the very air had fled in terror.\n    Everything was gone. Everything but the table.\n    The deck remained untouched in the center, pristine amidst ruin. Silver Star stood unshaken, horn dimming from the final flare of his spell. Smoke drifted around him, soft and slow, like the exhale of some dying world.\n    "Look down, my lord," the voice cooed, now lower... closer.\n    At his hooves, nestled in a faint pool of dancing shadow, lay a single card-one that hadn't been there before. It pulsed faintly, as if alive. With a motion as fluid as thought, Silver Star levitated it before his eyes.\n    As quickly as it was risen the card slipped from his magic and drifted gently down, coming to rest on the table beside the others.\n    "What does it mean?" he asked aloud, his voice steady but hollow. "Answer me."\n    There was no reply. Silver Star yet again stood alone in the silence, with the final card in his possession: The Fool."
  barrad_silver.14.a:0 "Was it... Am I..."


