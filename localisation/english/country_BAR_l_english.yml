  sp_bar_biomancy_basics: "Secrets of Biomancy"
  sp_bar_biomancy_basics_desc: "While studying the ancient runes left behind by what was once the living god of cultists, an unsettling thought struck Asinti. They spoke of long-forgotten magical arts that seemed eerily familiar to ones he had encountered before in Ambrosius' notes, meticulously compiled over years of study. Could there be something more, something crucial, that the mad count had overlooked?"
  sp_bar_biomancy_basics_translation_troubles: "Incomprehensive Texts"
  sp_bar_biomancy_basics_translation_troubles_desc: "While the collection of Ambrosius' ancient texts is a sight to behold it is near impossible to translate to any modern language, yet somehow the mad count has managed to do it and made notes out if it-sadly as irretional and incomprehensive as he was."
  sp_bar_biomancy_basics_translation_troubles_response: "Minor setback."
  sp_bar_biomancy_basics_body_regen: "Wounds Regeneration"
  sp_bar_biomancy_basics_body_regen_desc: "It appears that Asinti was wrong about Ambrosius being able to combine zebra and pony alchemy, he was just able to come to their common roots. Some receptures and combinations seem like they have no right to work, but they do. It is yet to be uncovered why we forgotten such wonders, but for now we are able to replicate what Ambrosius did to Gąsienica giving him his ingriffon regeneration abilities."
  sp_bar_biomancy_basics_body_regen_response: "Might prove useful."
  sp_bar_biomancy_basics_pegasi_speed: "Speed Unmatched"
  sp_bar_biomancy_basics_pegasi_speed_desc: "Through continued experimentation on his distant winged kin, Asinti uncovered a method to reshape them. He learned how to coax their forms into sleeker, more aerodynamic frames-how to alter muscles, bone, and sinew so wings could catch greater lift and cleave the air with unnatural force. In essence, he discovered how to transform the average pegasus into the speed-born demon each of them secretly longed to become."
  sp_bar_biomancy_basics_pegasi_speed_response: "Gotta fly fast."
  sp_bar_biomancy_basics_alicorn_fail: "The Alicorn?"
  sp_bar_biomancy_basics_alicorn_fail_desc: "Wherever possibility emerges, curiosity soon follows-and this time, it led to screams echoing through the halls of experimentation. The poor unicorns bore the price of that pursuit. Initial successes with unicorn subjects gave false hope, quickly drowned beneath a tide of gruesome failures. Inducing wing growth alone proved a monumental feat; making them functional, even more so. But tampering with a creature’s innate magical essence... that crossed a line no body could endure. None of the test subjects survived. Even those granted only wings found their flesh rejecting the mutation in violent, terminal collapse."
  sp_bar_biomancy_basics_alicorn_fail_response: "Maybe there are things we should not try..."
  sp_bar_biomancy_basics_chargers_bonus: "The Perfect Charger"
  sp_bar_biomancy_basics_chargers_bonus_desc: "Delving into the most primal and unrefined roots of zebra alchemy, Asinti uncovered a truth both thrilling and dangerous-it could branch into countless, untapped paths. The alchemy practiced by zebras today was but a faint echo of what this ancient magic once offered. Yet even he hesitated. Pushing its boundaries too far could unravel more than just secrets. For now, he chose restraint. He would focus on refining what he already understood-perfecting the creation of chargers."
  sp_bar_biomancy_basics_chargers_bonus_response: "Barrad's Finest."
  sp_bar_biomancy_basics_dogs_bonus: "Rough Diamonds"
  sp_bar_biomancy_basics_dogs_bonus_desc: "Diamond Dogs had never been a frequent sight in the lands of Barrad, yet Ambrosius’ research held a surprising wealth of information about them. Their prolonged exposure to subterranean crystal deposits had made their bodies unusually resistant to magical alteration. Still, Asinti with patience and precision, managed to enhance the abilities of his test subjects. Their resilience proved a challenge, but not an insurmountable one."
  sp_bar_biomancy_basics_dogs_bonus_response: "Another leap forward."
  sp_bar_biomancy_basics_knights_bonus: "Apex Predator"
  sp_bar_biomancy_basics_knights_bonus_desc: "Griffons had proven to be Asinti’s greatest challenge thus far. Their bodies responded far too eagerly to magical modification-doses of energy that produced only subtle effects in ponies or zebras twisted griffon flesh into grotesque monstrosities fit for cautionary tales whispered to children. The potential was immense; after all, creatures like Gąsienica existed. Yet Asinti had not reached such heights-at least, not yet. Through failure and observation, he discovered a critical truth: to reshape a griffon successfully, one must physically weaken their bodies-then they respond to mutation in a more stable manner. In such a state, their regenerative processes would activate, not to simply heal-but to improve. They emerged not merely restored, but transformed-faster, larger, more lethal. Simply put: better."
  sp_bar_biomancy_basics_knights_bonus_response: "Most fascinating."


  sp_bar_magical_reactor: "Ancient Magical Reactor"
  sp_bar_magical_reactor:0 "Ancient Magical Reactor"
  sp_bar_magical_reactor_desc: "We are still missing a lot from the drawings we found in that cave. Further research is needed to unlocks secrets of the past."

  sp_bar_magical_reactor_construction: "Magical Reactor Construction"
  sp_bar_magical_reactor_construction_desc: "After studying and redrawing the ancient blueprints it is time to build this magical wonder!"

  sp_bar_crystal_oversaturation: "Crystal Overstaturation"
  sp_bar_crystal_oversaturation_desc: "Crystals possess peculiar properties, one of which is the ability to store magical energy. Some might argue that the process of infusing them with additional energy is challenging, but for unconventional magic users, it poses little difficulty. The greater obstacle lies in stabilizing the crystal so that it remains charged with magical energy without exploding in your hooves... or claws."

  sp_bar_secrets_of_alchemy: "Secrets of Alchemy"
  sp_bar_secrets_of_alchemy_desc: "Alchemy was always Ambrosius' passion. Just by going thought his discarded notes we might learn a lot about that art."

  sp_bar_silver_star_undead_wmd: "Total Organic Lifeform Death"
  sp_bar_silver_star_undead_wmdy_desc: "The weak flesh of my enemies... It is so easy to destroy, I just need to find most optimal way to do so."

  sp_bar_magicko_anomalous_engine: "Magicko-Anomalous Engine"
  sp_bar_magicko_anomalous_engine_desc: "Magic is an expansive science, with some of its aspects remaining incomprehensible. Yet, a lack of complete understanding doesn't mean it cannot be utilized. In Barrad, relying on such enigmatic phenomena is not uncommon. Some wizards even propose that forces beyond our current comprehension could be harnessed for propulsion."

