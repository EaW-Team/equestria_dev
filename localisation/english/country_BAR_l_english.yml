  bar_end_dialogue_pic_tootlip:0 "And they lived happily ever after...\n    ...or did they?\n    Who am I to tell?\n    Nontheless thank you for your time stranger. Hope to see you once again, it was nice to meet you.\n    \n    MiszczTheMaste "Mizzy""


  
