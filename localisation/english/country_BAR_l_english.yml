  sp_bar_unlock_earth_pony_tech: "Earth Pony Magic"
  sp_bar_unlock_earth_pony_tech_desc: "While some might argue that earth ponies are not very gifted with magical abilites its undeniable they do posses it. We should study it."  
  
  sp_bar_unlock_pegasi_tech: "Pegasi Magic"
  sp_bar_unlock_pegasi_tech_desc: "Abilities of pegasi does not end on simply flyling high in the sky, they do posses some valuable magical elements that should be studied."  

  sp_bar_unlock_unicorn_tech: "Unicorn Magic"
  sp_bar_unlock_unicorn_tech_desc: "Born with high magical potential, an unicorn is creature of magic-we should do as much as we can to harness their potential across our nation"

  #generals 
  BAR_stormy_night:0 "Stormy Night"
  BAR_stormy_night_desc:0 "Born in 978 in Moonspeaker Hollow, Chiropterra, Stormy Night grew up as an eccentric and mischievous outcast. The problem only grew worse as she reached adulthood, still unable to submit to any sort of authority. In a fit of childish rebellion, she fled her home and her country.\n\nIt did not take long for somepony as conspicuous and naive as her to find herself in the worst kind of trouble, winding up a slave.\n\nFortunanely for Stormy, a thestral slave is somewhat of a rarity, and no buyer could agree with the seller on the price. That is, until somepony decided she would make for a nice exotic gift for Ambrosius.\n\nAmbrosius disagreed, and told his guards to throw away the gift. Stormy, unfazed by her few months in captivity, saw this as the fresh start she had always wanted. Taken in by cultists, she saw herself surrounded by like-minded individuals, and rapidly warmed up to their beliefs, soon happily joining their ranks.\n\n§YPortrait by§!: BlakaSmoko"

