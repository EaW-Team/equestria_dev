l_english:
# Civil War #
 civwar.9.t: "[From.GetName] Demands our Subjugation"
 civwar.9.d: "With the defeat of the Luna Empire, [From.GetName] is demanding that we allow [From.GetAdjective] officials to oversee our government with the goal of eventual reintegration into [From.GetName]."
 civwar.9.a: "Subjugation is preferable to death."
 civwar.9.b: "They shall never take our hard earned freedom!"

 civwar.10.t: "Lunar Empire's Offer"
 civwar.10.d: "With the defeat of Equestria, the [From.GetName] now reigns supreme, their government has demanded that we let their officials oversee our nation, with the eventual goal of reintegration into their nation."
 civwar.10.a: "We submit."
 civwar.10.b: "Never!"

 civwar.16.t: "[From.GetName]'s Offer"
 civwar.16.d: "After a long trek through the south, a representative from the central government has arrived demanding that we officially reintegrate into Equestria. Although the Ponies of the Southern States are proud of their nation, the fact of the matter is that we would stand little chance against the massive might of the central government, what should we do?"
 civwar.16.a: "We will resist this northern aggression, to war!"
 civwar.16.b: "A house divided against itself will fall, we will rejoin peacefully."

 civwar.160.t: "Time Running Out"
 civwar.160.d: "As our city propers, it seems Equestria is finally making their move to take away the independence of our city. A dignitary from Equestria has arrived in Las Pegasus and is demanding Las Pegasus to be brought back into Equestria as a subject state. If we give in then all our efforts would have been for nothing. Yet if we refuse then we risk facing the might of the Equestrian army. The fate of Las Pegasus could very well be determined by this decision." 
 civwar.160.a: "They will never take our city!"
 civwar.160.b: "A house divided against itself will fall, we will rejoin peacefully."

 civwar.17.t: "The Equestrian Civil War!"
 civwar.17.d: "The Equestrian civil war rages on, we will fight for our survival!"
 civwar.17.a: "To war!"
 civwar.17.b: "To war!"

 civwar.18.t: "Join [SCS.GetName]?"
 civwar.18.d: "The ponies of [SCS.GetName] share our common ideology, it is only natural that we unite for the common good of every worker, shall we send the offer?"
 civwar.18.a: "Of course!"
 civwar.18.b: "Not for now..."

 civwar.21.t: "[From.GetName]'s Offer"
 civwar.21.d: "[From.GetName] has offered us the chance to join their republic. However, we are certain that they merely wish to take the jungles for themselves."
 civwar.21.a: "Enough blood has been spilt over this land."
 civwar.21.b: "The shall not be subjugated by another oppressor!"
 civwar.101.t: "Ceasefire with [ceasefire_target.GetName]"
 civwar.101.d: "In the middle of a police action to bring back our rebellious provinces calling themselves [ceasefire_target.GetName], we have been attacked by an foreign power! Perhaps we should consider a ceasefire, so that we may concentrate on bigger issues?"
 civwar.101.a: "Ceasefire is a good idea."
 civwar.101.b: "Let's try to get [ceasefire_target.GetName] to fight together with us!"
 civwar.101.c: "Nonsense, a war on multiple fronts has never hurt anypony."

 civwar.102.t: "[From.GetName] wants a ceasefire"
 civwar.102.d: "With [From.GetName] finding itself attacked by a foreign power, [From.GetLeader] has reached out to us with a proposition of a ceasefire, so that they may focus on defending against the intrusion."
 civwar.102.a: "We need a ceasefire as well."
 civwar.102.b: "No negotiations! Press the advantage!"

 civwar.103.t: "A common foe"
 civwar.103.d: "With [From.GetName] finding itself attacked by a foreign power, [From.GetLeader] has reached out to us with a proposition of not only a ceasefire, but also us joining them in defence of our homeland from the foreign intruders."
 civwar.103.a: "Let us put our differences aside, at least for this moment."
 civwar.103.b: "A ceasefire is enough."
 civwar.103.c: "No negotiations! Press the advantage!"

 civwar.105.t: "Ceasefire ends"
 civwar.105.d: "With the foreign invaders dealt with, we can finish the fight with our former oppressors - if we want to, that is."
 civwar.105.a: "Ready for round two?"
 civwar.105.b: "Keep the war cold for now."

 civwar.11.t: "Guns from the North"
 civwar.11.d: "A secret shipment of equipment, sent by the Empress herself, has just arrived in our area of control. Our soldiers met the leader, Misty Night, and thanked her for ensuring the delivery reached its destination safely without being discovered by our enemy. We now have thousands of additional rifles, helmets, bullets, grenades and more, all of which are sorely needed by our forces. Now we must distribute them to the frontline, and bid farewell to Misty Night and her brave soldiers."
 civwar.11.a: "Thank the Moon for this gift!"

 civwar.12.t: "Equestria Requests Reintegration"
 civwar.12.d: "A representative from the central government of Equestria has arrived today to request our reintegration into Equestria. Our government would cease to exist, and our military and all provinces currently under our control will be transferred to the control of Equestrtia. While this is a hard pill to swallow for many it may be the only option we have besides dying against the might of the Equestrian juggernaut."
 civwar.12.a: "Better to die a revolutionary than live as a reactionary!"
 civwar.12.b: "Retirement sounds like a good idea."

 civwar.13.t: "Equestria Requests Reintegration"
 civwar.13.d: "Earlier today a representative of Equestria arrived in the harbor via rowboat. They came bearing a request from the central government that we go and have ourselves be reintegrated into Equestria now that the civil war is over. This would mean we would cease to exist as a nation, but also that further bloodshed would be avoided. Many would seek to reintegrate with Equestria, but on the other hoof we did build all these forts."
 civwar.13.a: "We can take 'em, eh?"
 civwar.13.b: "This was never aboot fighting to the last..."

 civwar.22.t: "Baltimare's Offer"
 civwar.22.d: "The Baltimare Republic has recently sent us envoys that claim that the Baltimare Republic wishes us to join their union. We should tread carefully we don't know how they will react should we reject their "generous" offer."
 civwar.22.a: "Why not, let's try this whole Socialism thing."
 civwar.22.b: "Are they joking?"

 civwar.24.t: "Tribal Warbands Demobilise"
 civwar.24.d: "With the end of the war in the South-East, the Tribal Warbands that have been fighting for us have decided it is time for them to return to their homes."
 civwar.24.a: "They fought well."

 civwar.14.t: "Help From the Rogue Province"
 civwar.14.d: "As Equestria's war against us ramps up some in the government have proposed that we request for help from the original revolutionaries in Stalliongrad. It would mean that they could get a spot at the table when the peace deal eventually comes, but on the other hoof we need every warm body we can muster to fight against the Equestrians and they do have a lovely spot for a second front."
 civwar.14.a: "We need Equestria's troops there not here, send the request."
 civwar.14.b: "We don't need their interference."

 civwar.15.t: "The Hoof and Hammer Against the Moon?"
 civwar.15.d: "When the civil war first began Stalliongrad seized large amounts of territory from the Lunar Empire. Now that Nightmare Moon has turned her guns against us we could reach out to them diplomatically to see if they are willing to seize even more territory for the revolution. The fact that this will take pressure off of us is just a side benefit, we will assure them."
 civwar.15.a: "We shall convince our revolutionary brothers of this goal!"
 civwar.15.b: "We're better off fighting for the true revolution here in the south."